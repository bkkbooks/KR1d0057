body:
  text: 禮記集說卷十一宋衛湜撰龜策几杖席蓋重素袗絺綌不入公門苞屨扱衽厭冠不入公門書方衰凶器不以告不入公門鄭氏曰龜策嫌問國家吉凶几杖嫌自長老席蓋載喪車也雜記曰士輤葦席以為屋蒲席以為裳帷重素衣裳皆素喪服也袗單也孔子曰當暑袗絺綌必表而出之為其形䙝也苞藨也齊衰藨蒯之菲也問喪曰親始死扱上衽厭猶伏也喪冠厭伏苞或為菲此皆凶服也方板也士喪禮曰書賵于方若九若七若五凶器明器此謂喪在內不得不入當先告君耳孔氏曰此以下明臣入公門當謹慎其物有不得入者席蓋喪車蓋也臣有死於公宫可許將柩出門不得將喪車凶物入也車比棺為緩宜停外也絺綌葛也上無衣表則肉露見為不敬故不著入也若尸乘以几至廟門及八十杖於朝則几杖得入公門也厭冠謂厭帖無梁纚為五服喪所著也書謂條録送死者物件數目多少如今死人移書也百字以上用方板書之故云書方衰喪服也凶器者棺材及棺中明器也臣在公宫而死凶具宜告而入也藍田吕氏曰几所以馮杖所以扶席所以坐蓋所以禦日與雨袗絺綌所以袣袢暑皆燕安之具入公門而用之近不恭也孔子表而出之表謂加上服以蔽之單則䙝也孔子雖不入公門亦表而出之則與衆加恭也吉冠有纚有梁而喪冠無之故厭然也君子不奪人之喪雖入公門無所辟也臣子之義嫌於不祥故舉其重而辟之士所以入公門說齊衰也言脫齊衰則大功以下不脫也大功以下雖不脫衰而厭冠必脫也齊衰厭冠衰屨皆脫也斬衰固脫矣其未成服者雖扱衽亦不入皆嫌於不祥也衰五服之衰也書方衰凶器三者皆為臣妾有死於宫者君亦許之殯而成喪然必告君乃得入也為君使而死公館復私館不復公館者公宫與公所異也明死於公宫者得成喪也馬氏曰先王之時掌蓍龜有官賜几杖有等周官若有祭事則龜人奉龜凡國事筮人共筮龜蓍非君命而入公門則是掌策龜者可以擅卜筮也几杖非尸與七十者而入公門則是人臣可以自長老也扱衽者孝子未成服之飾周官閽人掌王宫中門之禁喪服凶器不入宫蟜固曰士唯公門說齊衰與此同義然閽人潛服賊器不入宫竒服怪民不入官少儀曰大白兵車不入廟門玉藻曰非列采不入公門表裘不入公門襲裘不入公門則公門之禁多矣曲禮之所言特其大略而已山隂陸氏曰苞屨扱衽厭冠不入公門此謂齊衰服者故曰士唯公門說齊衰凡服皆先納屨屨而後服服而已冠厭冠冠在下以此厭冠齊衰喪冠厭於斬衰故也先儒謂扱衽於劈踊為妨則扱衽蓋成服之服廬陵胡氏曰龜策嫌有異謀若南蒯將叛枚筮是也公事不私議鄭氏曰嫌若姦也馬氏曰公事而私議則是弼違者可以後言也然季孫使冉有訪田賦於仲尼仲尼不對而私於冉有何也聖人之於人可與言未嘗不言不可與言未嘗失言季孫之用田賦固非孔子之所能正其私於冉有豈得已哉君子將營宫室宗廟為先廏庫為次居室為後凡家造祭器為先犧賦為次養器為後無田祿者不設祭器有田祿者先為祭服君子雖貧不粥祭器雖寒不衣祭服為宫室不斬於丘木鄭氏曰宗廟為先廏庫為次重先祖及國之用大夫稱家謂家始造事犧賦以稅出牲無田祿者祭器可假有田祿者祭服宜自有粥賣也丘壟也不粥不衣不斬廣敬也孔氏曰自此至於士總論大夫所造祭器衣服并明祭器所寄之事家造大夫始造家事也崇敬祖禰故祭器為先諸侯大夫少牢此言犧謂牛即是天子之大夫祭祀賦斂邑民共出牲牢故曰犧賦養器共養人之飲食器也自贍為私宜後造然諸侯言宗廟大夫言祭器諸侯言廏庫居室大夫言犧賦養器者互言也有地大夫祭器祭服俱造則先造祭服乃造祭器此言祭器為先者對犧賦養器為先其實在祭服之後也然大夫及士有田祿者乃得造器猶不具唯天子大夫四命以上者得備具若諸侯大夫非四命無田祿則不得造故禮運云大夫祭器不假聲樂皆具非禮也據諸侯大夫言之也若有田祿雖得造器必先為祭服後為祭器耳緣人形參差衣服有大小不可假借故宜先造而祭器之品量同官可以共有可暫假也廬陵胡氏曰家謂人家鄭云大夫稱家非也若止謂大夫造祭器則下云祭器不踰竟何以兼士乎犧牛也鄭云天子之大夫祭祀賦邑民共牲牢故曰犧賦然據禮及孟子惟諸侯得有犧牲大夫豈得有乎禮言諸侯大夫少牢亦不言天子大夫大牢也要之犧賦總言牲耳藍田吕氏曰君子之行莫先於敬鬼神誠不欺於鬼神則於天下也何有故言禮者必以祭祀為先營宫室者必以宗廟為先造器者必以祭器為先有田祿者先為祭服示有尊也言營宫室雖大夫有宗廟皆然非獨諸侯也言家造者雖士有田祿者皆然非獨大夫也宗廟祭器事吾先也廏庫犧賦待吾衆也居室養器奉吾私也此先後之序也廏以養牛馬犧牲庫以藏兵也犧賦亦謂器也犧牲之器如牢互盆簝之屬也賦兵賦也其器如弓矢旗物戈劒之屬也孟子曰惟士無田則亦不祭牲殺器皿衣服不備故也不祭則薦而已與庶人同故不設祭器也有田祿則牲殺器皿衣服皆不可不備祭器所以事其先粥之則無以祭無以祭則不仁也祭服所以接鬼神衣之則䙝䙝之不敬也丘木所以庇其宅兆為宫室而斬之是慢其先而濟吾私也是亦不敬也馬氏曰大王之遷豳也宗廟奕奕然後百堵皆興宣王之考室也嗣續妣祖然後築室百堵則古人之營宫室者豈嘗不先宗廟哉檀弓曰喪不慮居為無廟也記以士之臣為家相則士亦可以稱家也周官載師有士田則士之有田祿者亦可以設祭器也嚴陵方氏曰以無田祿者不設祭器故禮運以祭器不假為非禮以有田祿者必具祭器故王制以祭器不假為禮此其辨也山隂陸氏曰不設祭器即用養器可知無田祿者謂若孟子所謂下士與庶人在官者同祿祿足以代其耕亦其一端此雖有祿非田祿也大夫士去國祭器不踰竟大夫寓祭器於大夫士寓祭器於士鄭氏曰祭器用君祿所作取以出竟恐辱親也寓寄也與得用者言寄覬已復還孔氏曰此以下明人臣三諫不從去國之禮踰越也既放出故祭器不得自隨越竟無德而出若猶濫用其器是辱親也物不被用則生蟲蠧既不將去故寄於同僚令彼得用不使毁敗冀還復用大夫士義皆然也長樂劉氏曰祭器出於田祿也棄田祿而去之亦不以祭器踰竟欲以廉潔事其祖先已既不義其祿祖先亦不義其器也嚴陵方氏曰祭器不踰竟者不敢以君祿所造之器而用於他人之國也大夫士寓祭器者不欲使之為無用之器故各寄於得用之家也馬氏曰君之於臣也在竟則有賜環之禮在他國則有幣召之禮故孔子在陳未嘗不思歸魯孟子去齊未嘗不思反豫夫豈悻悻然若小丈夫示其必不復哉此祭器所以必寓也昔微子去殷抱祭器而之周者抱君之祭器也抱己之祭器不可也抱己之祭器猶不可況春秋之時有載祏而行者有載寶而歸者甚有至於己邑自隨者此君子之所疾也傳曰臣之祿君實有之義合則進否則奉身而退若孔悝南宫敬叔孫林父之徒豈知此哉大夫士去國踰竟為壇位鄉國而哭素衣素裳素冠徹緣鞮屨素簚乘髦馬不蚤鬋不祭食不說人以無罪婦人不當御三月而復服鄭氏曰言以喪禮自處也臣無君猶無天也壇位除地為位也徹猶去也鞮屨無絇之菲也簚覆笭也髦馬不鬄落也蚤讀為爪鬋鬋鬢也不自說於人以無罪嫌惡其君也御接見也三月一時天氣變可以遂去也簚或為幕孔氏曰此大夫士三諫不從出在竟上大夫則待放三年聽於君命若豫環則還豫玦便去若士則不待放臨去皆行此禮也壇者除地不為壇也去父母之邦有桑梓之戀故為壇位鄉國而哭衣裳冠皆素為凶飾也緣中衣緣也素服裏有中衣吉時用采緣凶喪故徹緣而純素屨以絇為飾士冠禮云𤣥冠黑屨青絇博寸鄭云絇之言拘也古屨以物繫之為行戒故用繒一寸屈之為絇著屨頭以受穿貫今凶故無絇也素簚白狗皮為之簚車覆闌也禮人君羔幦虎犆大夫鹿幦豹犆今此喪禮故用白狗皮也既夕禮云主人乘惡車白狗幦是也吉則翦剔馬毛為飾凶則無飾不翦而乘之蚤治手足爪也鬋剔治鬚髮也吉則治鬋為飾凶故不翦也不祭食者食盛饌則祭食之先喪凶故不祭也不說人以無罪者善則稱君過則稱已今雖放逐猶不得向人說己無罪也吉時婦人以次侍御今喪禮自貶故不也自貶三月然後事事反還如吉禮而遂去也三月為一時天氣一變則人情亦宜易也臨川王氏曰孔氏云大夫三年待放竟上士不待放恐無此禮孔子屢仕屢去豈常行待放之禮乎或者古之大夫有得罪被放於竟上三年而後聽其去者乎故季孫請囚於費以待察春秋有放大夫之文蓋緣此禮也又三諫不從則去亦不可必以為常要之三諫不從而不能去則苟祿者也如孔子去國乃未嘗一諫也且待放得環則還是以待放要君耳三諫不從以為不合則可以去雖有庶幾其君或改之心如孟子三宿然後出晝可也何待三年藍田吕氏曰大夫士去國喪其位也大夫士喪位猶諸侯之失國家去其墳墓拚其宗廟無祿以祭故必以喪禮處也為壇而哭衣冠裳以素輿馬不飾食不祭內不御心喪之禮也禮庶民為國君齊衰三月寄公為所寓士仕焉而已者大夫以道去而猶未絶者皆服齊衰三月言與民同也今去其君雖非喪也然重絶君臣之義故以心喪自處而期以三月故曰三月而復服也鞮屨革屨也周官鞮屨氏蓋蠻夷之服也革去毛而未為韋非吉屨也孔子去魯以微罪行樂毅云忠臣去國不潔其名以己無罪而說於人則君有罪矣君子不忍為者厚之至也馬氏曰為壇位鄉國而哭以至婦人不當御皆處之以凶禮也既夕禮曰主人乘惡車白狗幦馬不齊髦周禮喪車大䄙則素簚者未練之禮也士虞禮曰既祔則沐浴櫛搔翦則不搔翦者未祔之禮也然喪禮或以菅或以蒯或以繩或以麻而不以鞮屨鞮夷狄之屨也喪不飲酒食肉不特不祭食則不祭食者非盛禮之食也凡此特自貶而已又不必純之以凶禮也古之去國者其仁至於嚮國而哭其義至於不說人以無罪子鮮之去衛不嚮衛國而坐非所謂仁元咺之奔晉則訟其君以求勝非所謂義也山隂陸氏曰素衣素裳素冠徹緣此服蓋準練衣小變也嚴陵方氏曰復服者復其常服之事也以上諸服皆非常服之事故於此言復焉廣安游氏曰古之以凶禮自處者三而喪事不與焉戰勝以喪禮處之凶災以喪禮處之去國以喪禮處之戰勝以喪禮處之重用兵也凶災以喪禮處之重天災也去國以喪禮處之重去本也且非特以喪禮自處也人將以喪禮弔之焉去國則弔之凶災則弔之故夫去國古人之所大患也棄其君者棄其位棄其宗廟棄其父母之邦此其去國之可悲也明矣趙宣子亡不越竟反不討賊董狐以弒君書之蓋不踰竟則其復也易踰竟則其復難不踰竟則其禮未有變也踰竟則變禮而以喪處之二者謂憂之輕重蓋不同矣且假使宣子亡而越竟是潔其身而去國也反而討賊是為國除亂也今也內不討賊外不潔身則弒君之罪將誰任其責哉此董狐所以罪之也大夫士見於國君君若勞之則還辟再拜稽首君若迎拜則還辟不敢答拜鄭氏曰謂大夫士見君既拜矣而復見勞也聘禮曰君勞使者及介君皆答拜還辟不敢答拜嫌與君亢賔主之禮迎拜謂君迎而先拜之孔氏曰自此至相答拜也一節論君臣男女相答拜之法此謂大夫士出聘他國君之禮勞慰也還辟逡巡也稽首頭至地也初至行聘享私覿禮畢而主君又别慰勞己在道路之勤故逡巡而退辟也聘禮無還辟之文者文不備也君若迎拜謂聘賔初至大門外主君迎而拜之賔是使臣不敢當禮則逡巡不敢答主君之拜故聘禮云賔入門左公再拜賔辟不答拜是也藍田吕氏曰還辟再拜稽首以君臣之禮見他國之君也迎拜則還辟他國之君以賔主之禮接己而已不敢亢也馬氏曰禮莫盛於再拜拜莫重於稽首儀禮周官凡賔主君臣之接也皆以再拜為節特鄉飲則主人三拜衆賔一拜而已士相見聘禮至於禮之殺者亦一拜而已再拜所以為盛禮也周官九拜先稽首記曰稽首服之甚孟武伯曰非天子寡君無所稽首知武子曰天子在而君辱稽首寡君懼矣此稽首所以為禮之重也所謂大夫者聘禮之賔也所謂士者聘禮之介也總而言之皆謂之客故周官司儀君勞客客再拜稽首是也然聘禮賔之受几受幣私覿莫不稽首其於郊勞與歸饔餼者亦稽首則大夫之稽首於國君者非特拜勞而已記之所言特一端也聘禮卿勞賔於郊賔再拜勞者不答拜及歸饔餼賔再拜大夫不答拜昏禮賔奠雁再拜主人不答拜則不敢答拜者非特辟君之迎拜而已記之所言亦一端也葉氏棣曰用下敬上謂之貴貴故大夫士見於國君不敢答拜用上敬下謂之尊賢故下文貴賤雖不敵賔主相尊則先拜貴貴者禮也尊賢者義也江陵項氏曰荀子大略篇曰平衡曰拜謂磬折頭與腰平如衡也下衡曰稽首至地曰稽顙大夫之臣拜不稽首以是推之則今之折腰揖即古之拜也今之低首揖即古之稽首也今之拜伏其頭至地乃類古之稽顙耳然今之拜自是古之跪俯伏三事殊與古拜不類今之揖其形用古之拜其聲用今之喏亦是兩事皆與古揖不類也古揖舉手而無聲大夫士相見雖貴賤不敵主人敬客則先拜客客敬主人則先拜主人鄭氏曰尊賢也孔氏曰此謂使臣行禮受勞己竟次見彼國卿大夫也惟賢是敬不計賔主貴賤雖為大夫而德劣亦先拜有德之士也謂異國則爾同國則否藍田吕氏曰尊賢之義貴賤之勢有不得奪之也馬氏曰相見貴於相下相下貴於相先士相見禮若先生異爵者請見之則辭辭不得命則先見之然則拜之禮蓋亦若此故主人敬客則先拜客客敬主人則先拜主人也燕禮賔升自西階主人先拜至聘禮賔入大門主君先拜迎則先拜之禮不特大夫士而已記之所言亦一端也凡非弔喪非見國君無不答拜者大夫見於國君國君拜其辱士見於大夫大夫拜其辱同國始相見主人拜其辱君於士不答拜也非其臣則答拜之大夫於其臣雖賤必答拜之男女相答拜也鄭氏曰禮尚往來喪賔不答拜不自賔客也國君見士不答其拜士賤也自外來而拜拜見也自內來而拜拜辱也非其臣則答拜不臣人之臣也大夫答其臣之拜辟正君也男女嫌逺别不相答拜以明之孔氏曰禮尚往來己雖賢德而必皆相答拜凡拜而不答拜者唯弔喪與士見己君二條耳弔賔本來助執喪事非行賔主之禮士喪禮有賔則拜之賔不答拜是也君不答士拜聘禮士介四人君皆答拜者以其他國之士故也大夫見於國君謂見他國君也故聘禮云公在門左拜是拜其辱也士見於大夫大夫拜其辱者謂平常相答拜非加敬也故聘禮賔朝服問卿卿迎於廟門外再拜是也同國始相見主人拜其辱者前是異國此明同國同國則主人必先拜辱也若君於己士以其賤故不答拜他國之士非己尊所加故答之然聘禮云聘使還士介四人君旅答拜者敬其奉使而還士相見禮士見國君君答拜者以其初為士敬之故也大夫為君宜辟正君故不辨己臣貴賤皆答拜也男女宜别或嫌其不相答故明雖别必宜答也橫渠張氏曰弔喪不答拜主人拜伏以哭弔者難答故辟之君於士不答拜於大夫亦有時而答尊賢也講義曰舉弔喪及見國君二條以明拜之皆答耳藍田吕氏曰弔喪者主人拜賔賔不答少儀曰適有喪者曰比童子曰聽事適公卿之喪曰聽役於司徒諸侯使人相弔辭云寡君有宗廟之事不得承事則凡弔者非以賔客來獨主拜賔之辱而已賔不可申其敬也馬氏曰士喪禮弔者升自西階主人進中庭哭拜稽顙賔出主人拜送於門外三日成服主人拜衆賔此弔喪所以無答拜之禮也士之於君朝則不坐燕則不與大享則旅食而已此君於士所以無答拜之禮也君於他邦之人使介者還其幣則非其臣答拜之可知矣大夫之臣不稽首於大夫所以辟君也則其臣雖賤必答拜之可知矣昏禮主婦一拜壻答再拜則男女相答拜可知矣廬陵胡氏曰左傳哀十二年仲尼弔季孫放絰而拜則喪賔亦拜矣長樂劉氏曰大夫見於國君國君拜其辱者古之士進以道不以祿也道可以固國康民者非禮不足以安之君而無禮雖萬鍾之祿不顧也是故以祿致者不足以為賢又況其君慢之而不顧者乎子曰君使臣以禮臣事君以忠孟子曰君視臣如草芥臣視君如寇仇然則拜其辱為國以致其忠非憚其屈己也矧其下者乎君於士不答拜者始升於鄉去民未逺也大夫之於士猶國君之於大夫焉男女相答拜人倫之義以敬為本國君春田不圍澤大夫不掩羣士不取麛卵鄭氏曰生乳之時重傷其類孔氏曰此明貴賤田獵不同國君諸侯也春時萬物産孕不欲多傷殺故不合圍繞取也夏亦當然不掩羣者羣謂禽獸共聚也羣聚則多不可掩取之麛鹿子之稱凡獸子亦得通稱卵鳥卵也春方乳長故不得取王制言諸侯不掩羣者夏禮也此明周制藍田吕氏曰古之田獵獻禽以共祭祀之用且因農隙以講事也豺祭獸然後田獵則田必在秋冬矣然周官有四時之田王制云天子諸侯無事則嵗三田此亦云春田則春雖亦有田而非田獵之政因時講事而已故不尚多獲而暴天物也言春田而不言夏田夏不田也故言三田異於周官也長樂劉氏曰搜苗獮狩一則驅禽獸不害稼穡二則習戰陳以備盜賊然而春夏蟄蟲孳生雛稚未成雖保息之禮必行而恤物之心猶在王制夏禮也此經周禮也小有不同同出於仁也長樂陳氏曰春秋傳曰惟君用鮮衆給而已是天子諸侯有四時田獵之禮大夫士不與焉故鄭豐卷將祭請田而子産止之也禮書嚴陵方氏曰用大者取愈廣位卑者禁愈嚴圍澤掩羣固四時之田所同禁特以春言之者方孚乳之時尤在所禁故也以其從天子故稱諸侯而已以與其臣故稱國君焉馬氏曰王制曰禽獸不中殺不粥於市榖梁曰不成禽不獻則士不取麛卵可知矣王制又曰天子不合圍諸侯不掩羣與此不同何也蓋諸侯在國則南面以君道而與天子同來朝則北面以全臣道而與天子異則天子不合圍諸侯不掩羣諸侯㑹王田獵之禮也國君不合圍大夫不掩羣諸侯在國田獵之禮也觀車攻言㑹諸侯於東都春秋傳言㑹王之東搜則諸侯㑹王田獵之禮可知矣然則大夫不掩羣士不取麛卵則其從諸侯田獵又可知矣李氏曰君子之於物也愛之而弗仁故春田不圍澤不麛不卵是故物得其養故春搜有一發五豵之多冬狩有辰牡孔碩之美而人得以盡其奉上之誠於悉率左右之際百姓聞之者樂其德之仁見之者喜其儀之鬈先王之田蓋如此也嵗凶年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂鄭氏曰登成也君大夫士皆為嵗凶自貶損憂民也禮食殺牲則祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺也天子食日少牢朔月太牢諸侯食日特牲朔月少牢除治也不治道為妨民取𬞞食也縣樂器鐘磬之屬粱加食也不樂去琴瑟孔氏曰此一節明凶荒人君憂民自貶退禮也嵗凶水旱災害也鄭注太史職中數曰嵗朔數日年釋者云年是據有氣之初嵗是舉年中之稱今謂嵗既凶荒而年中榖稼不登也膳美食名盛食必祭周人重肺故食先祭肺嵗凶饑不殺牲也年豐則馬食榖馳道如今御路君馳走車馬之處不除謂不治其草萊也凶年雖祭而不作樂樂有縣鍾磬因曰縣也大夫食黍稷以粱為加故凶年去之士平常飲酒奏樂今凶年猶許飲酒但不奏樂也君大夫士各舉一邊而言其實互而相通君尊舉大者而言大夫士卑舉小者言耳藍田吕氏曰仁者以天下為一身者也疾痛疴癢所以感吾􅉃怛怵惕之心非有知力與乎其間也以天下為一身者一民一物莫非吾體故舉天下所以同吾愛也故嵗凶年榖不登民有饑色國君大夫士均與其憂君非不能玉食大夫士非無田祿仁人之心與民同之雖食不能飽也馬不食榖則芻秣而已公明儀曰庖有肥肉廏有肥馬民有饑色野有餓莩此率獸而食人也奪人食而食馬與牲仁人所不為也凡此皆與民同憂自貶之道也及乎有九年之蓄雖凶旱水溢民無萊色然後天子食日舉以樂則與之同其憂者無不同其樂也嚴陵方氏曰馬不食榖者雜記言凶年乘駑馬以駑馬之賤不必秣之也士之賤必飲酒然後用樂故以飲酒言之曰膳不祭肺則燕食可知馬不食榖則牲牢可知馳道不除則常行之道可知祭事不縣則賔客之事可知凡此皆舉重以明輕也大夫不食粱則不祭可知士飲酒不樂則不縣可知凡此皆舉小以見大也然君之所以自貶者其類為多臣之所以自貶者其類為少豈非位有貴賤故責有輕重歟馬氏曰大司徒於荒政言弛力眚禮蕃樂則馳道不除弛力也膳不祭肺馬不食榖大夫不食粱眚禮也祭事不縣士飲酒不樂蕃樂也大司樂大凶令弛縣則不縣不特祭事而已於祭事言不縣則膳可知也雜記凶年祀以下牲則祭不特不縣而已言縣則牲可知也司服言大荒則素服玉藻言年不順成君衣布則君不特不祭肺而已言膳則衣可知也大夫以粱為加食君膳不祭肺故大夫不敢食粱士無故不去琴瑟君弛縣故士不敢飲酒以樂凡此皆去備也先王之於凶荒也有珍圭以恤之有委積以待之於關市則無征於刑貶則有慮大至於移民通財糾守小至於舍禁多昏殺禮猶以為未也故膳不祭肺不食粱不樂而損於自養馬不食榖馳道不除而損於自奉凡欲與民同患而已司徒荒政索鬼神大祝天烖彌祀社稷禱祠祭法雩禜祭水旱詩之雲漢靡神不舉則嵗凶莫不祭也司巫大旱則舞雩女巫大烖歌哭而請則祭莫不有樂也然祭則有禱而無祀樂則有歌舞而無縣有禱而無祀郊特牲所謂年不順成八蠟不通榖梁所謂禱而不祀是也有歌舞而無縣曲禮所謂祭事不縣大司樂所謂凡國之大憂令弛縣是也樂者所以薦鬼神也凶年君膳不祭肺可也祭事不縣以虧祭可乎蓋樂雖所以薦鬼神亦所以崇已之德也凶年不祭失德之效也苟失其德安取於樂乎記曰五榖時熟然後賞之以樂長樂陳氏曰君子以得為在人以失為在已故吉事則推先於神凶事則責先於身方其為宫室則先宗廟後宫室為器則先祭器後燕器推先於神也嵗凶則先膳不祭肺而後祭事不縣責先於身也大蠟之禮年之順成而通則曰報神而不可以為人功年不順成而不通則曰謹民財而不以為神羞亦此意也盱江李氏曰掌客凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍烖殺禮在野在外殺禮由是觀之非直以嵗之凶則殺邦用若新建國及札喪禍烖在野在外皆殺禮也禮許儉不許無安得重困於無聊之民求備乎籩豆之事也人主所宜動心矣膳夫大荒則不舉大札則不舉天地有烖則不舉邦有大故則不舉由是觀之非直於外事殺禮若王膳亦為之貶也譬如父母其子之不哺而日飫膏粱可哉人主所宜動心矣如此經所云皆自貶損憂民之道也如此天下為之感人心為之恱用度不足海內不安未之前聞也君無故玉不去身大夫無故不徹縣士無故不徹琴瑟鄭氏曰憂樂不相干也故謂災患喪病孔氏曰此明無災者也君諸侯也玉謂佩也君子於玉比德故恆佩玉徹去也無災變則不去樂也此士謂不命之士若命士則特懸也自士以上皆有玉佩上云君無故不去玉則知下通於士也下言士不去琴瑟亦上通於君也但比德為重故以君上明之又大夫言縣士言琴瑟亦互言耳但縣勝故大夫言之藍田吕氏曰君子致禮以治躬致樂以治心養其血氣志慮無所不在於和使放心邪氣不得接焉此樂所以無故而不得舍也災患喪病方在所憂故不可參以樂古之君子必佩玉右徴角左宫羽趨以采薺行以肆夏故不去身非特為飾亦有玉聲鏘鳴中於五音近於樂也長樂陳氏曰君無故玉不去身禮也大夫無故不徹縣士無故不去琴瑟樂也鐘尚羽而象地磬尚聲而象水皆特縣之以致用也瑟亦琴類也其所異者特絲分而音細耳樂之大者在鐘磬大夫以智帥人之大者也故不徹縣其常御者在琴瑟士則事人有常心者也故不徹琴瑟禮書嚴陵方氏曰故猶事也必謂之故則以有所因焉有吉事而謂之故者有凶事而謂之故者王制言諸侯無故不殺牛蓋吉事故也先儒謂祭饗之類是矣此言君無故玉不去身蓋凶事故也先儒謂災喪之類是矣雖或吉凶之不同然有所因則一而已是以同謂之故也夫公侯山𤣥大夫水蒼士瓀玫則玉固上下之所通佩也諸侯軒縣大夫判縣士特縣則縣亦上下之所通用也詩言我有嘉賔鼓瑟鼓琴又言琴瑟擊鼓以御田祖則琴瑟亦上下之所通御也經之所言亦隨其輕重而繫之耳士有獻於國君他日君問之曰安取彼再拜稽首而后對大夫私行出疆必請反必有獻士私行出疆必請反必告君勞之則拜問其行拜而后對鄭氏曰再拜稽首起敬也必請必告臣不敢自專也私行謂以己事也士言告者不必有獻也告反而已君勞問必拜亦起敬也問行謂道中無恙及所經過孔氏曰此一節論大夫士饋獻之事有獻者謂士有物奉貢於君他日别日也安取彼猶云何處取彼物問何處得前所獻之物士卑德薄嫌其無有也不即問而俟他日者士有貢獻乃自致於外而不敢見恐君答已拜故别日乃見君君得問之也對謂對得物所由也大夫私行謂非為君行也疆界也既非公事故宜必請也然大夫無外交而此有私行出界或是新來大夫姻婭猶在本國故有私行往來但不得執交於外耳大夫還必有獻士告反而已行還而君若慰勞己之勞苦則已拜之若問其行拜竟而起對大夫士通如此先拜後答急謝見問之恩也藍田吕氏曰君之於臣雖名位有等而所以上下相交不間於貴賤故雖士亦有獻於君焉皆所以達臣子若養君親之誠心而不可却也嚴陵方氏曰夫臣之事君猶子之事親子之事親出必告反必面故臣之事君出必請反必告焉他日者以今日為正故明日之後為他石林葉氏曰臣從君之朝聘有私覿則為外交以其二命之事也其在國則有私行而不為外交以其順己之事也然而大夫成德之爵君以賢而尊之不有薦饗則無以重君之答已故反必獻士則職位為卑君所以不答拜也故反必告然則士之出與大夫同其反與大夫異者尊卑而已矣長樂陳氏曰尊者之賜卑者不敢問問則失於不恭卑者之獻尊者不可不問不問則恐其取之不義故士有獻於國君問曰安取彼古之獻於君也大夫使宰士親皆再拜稽首送之士親而君必問之者蓋所謂親者非親進之親致於將命者而已古之為臣也無私行出疆之禮告於君而後可也臣之於君子之於親一也子之於親出必告反必面或有賜焉必獻以示不敢有己而無私蓄也臣於君亦然獻則必告告則不必獻於大夫言有獻於士言告以大夫德足以致人之儀物也聘禮使者歸若有獻則告曰某君之賜也則大夫有獻不特施於私行而已聘禮君使宰賜使者幣則君於大夫之獻不特受之而已聘禮君答拜此不言者君於大夫無所不答拜於士為介則答拜於行則不答廬陵胡氏曰春秋之義臣無竟外交此云私行出疆非正也國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也國君死社稷大夫死衆士死制鄭氏曰奈何去社稷宗廟墳墓皆臣民殷勤之言國君死其所受於天子謂見侵伐也春秋傳曰國滅君死之正也大夫士死其所受於君衆謂軍師制謂君教令所使為之孔氏曰此一節論國君以下去國臣民止留之辭及死其所守之事奈何猶言如何也禮運云君死社稷無去國之義左傳說昔太王居豳狄人攻之乃踰梁山邑於岐山故知有去國之義也大夫士去國皆謂三諫不從及以罪見黜者大夫無社稷故云宗廟雖無臣民而屬吏止之也士亦有廟辟大夫故言墳墓亦與大夫互言也孝經云守其祭祀今不云祭祀者明雖去此之彼猶得祭祀但墳墓不隨耳國君以社稷為主若有寇難則以死衛之大夫當國有寇難必率衆禦之以死為度藍田吕氏曰臣民各止其君使勿去忠厚之至也以社稷宗廟墳墓為言者皆指其所本也先王之建國必為之置社稷使其君守之為土地人民之主此有國者所以以社稷為言也大夫之有宗廟士之保其丘墓義亦猶是大夫士則有以道去其君諸侯有國受之於天子有死而無去也然此去者國滅君死正也苟社稷無隕先君有後則雖有不安其國致位而去特一身去就而已是亦有可去之義禮所以有寓公也人臣受命於君有死無二而已君之有社稷受命於天子者也大夫之衆士之制受命於其君者也故人臣敬君莫先於敬命棄命不死不敬莫大焉長樂劉氏曰社稷危而不可存則國君死之民衆危而不可保則大夫死之禮制隳而不可固則士死之蓋國之治亂以禮制為本而國君大臣隳之則士也必以死爭焉君以民衆為基仇敵侵而伐之則大夫以死捍焉民人以社稷為主仇敵攻而取之則國君以死守焉長樂陳氏曰孟子謂滕文公曰世守也非身之所能為也效死勿去此重去社稷之義也春秋傳曰凡諸侯之大夫違告於諸侯曰某氏之守臣某去宗廟此重去宗廟之義也去國則哭於墓而後行此重去墳墓之義也去則以私止之仁也死則以公責之義也曾子曰吾得正而斃焉斯已矣則正於義而斃與夫正於禮而斃一也國君死社稷而太王去豳大夫死衆士死制而管仲不死子糾何也曰死社稷則為民而已去豳以為民雖不死可也死衆死制為君而已死而非為君雖不死可也彼紀侯之大去其國囊瓦之逃吳則異乎此矣然君子之謀國家也其勇足以無敵其智足以折衝豈以死為善哉記之所言特其所守者當然也嚴陵方氏曰國君既曰死社稷而大夫士不曰死宗廟墳墓何也蓋止其去者存乎私情死其事者存乎公義宗廟墳墓則身之所自出特在乎私情而已獨國君一以社稷為言者以有國之尊無適而不以公故也國君所以重社稷如此而太王得以獨去者蓋此之所言者禮之經彼之所行者禮之權也以太王合於義禮故孟子告滕文公以擇於斯二者君天下曰天子朝諸侯分職授政任功曰豫一人踐阼臨祭祀內事曰孝王某外事曰嗣王某臨諸侯畛於鬼神曰有天王某甫鄭氏曰天子豫一人皆擯者辭也天下謂外及四海也今漢於蠻夷稱天子於王侯稱皇帝覲禮曰伯父實來余一人嘉之孝王某嗣王某天王某甫皆祝辭也唯宗廟稱孝天地社稷祭之郊內而曰嗣王不敢同外內也畛致也鬼神謂百辟卿士也祝告致於鬼神曰有天王某甫某甫且字也不名者不親往也周禮大㑹同過山川則大祝用事焉余豫古今字畛或為祗孔氏曰自此至亦名之論天子稱謂之事擯者稱天子以四海難伏宜尊名以威臨之也父天母地是上天之子又為天所命子養下民此尊名也授政謂授所縣象魏之法於諸侯也任功謂使人專掌委任之功若五侯九伯女實征之也豫我也豫一人者言我是人中之一人自謙損也臣下謂之一人者所以尊王者也以天下之大四海之內所共尊者一人耳踐履也阼主人之階也天子升阼階臨郊廟之祭也內事宗廟是事親事親宜言孝故祝辭云孝王某某為天子名也外事郊社也天地尊逺不敢同親云孝故云嗣王某言此王繼嗣前王而立也鄭謂不敢同外內者若宗廟內事祭辭稱孝山川嶽瀆祭之在外而辭稱嗣今天地社稷既尊祭之在內而用外辭不敢同外內之常例也至若巡狩遍於方嶽臨視諸侯凡所過山川悉不親往使祝致辭故不稱名而曰某甫云某是天子之字甫是男子美稱猶尼父類也鄭注鬼神謂百辟卿士者蓋謂昔為諸侯卿士者也藍田吕氏曰名者人治之大不可以不正也君子之有是名必有是事非守空名以示人也一人之身而名有異者內外尊卑人神死生之際不可以無别也此章所記皆天子之名其所以别者以此也君天下曰天子言天下者外薄四海兼夷狄之稱也古者於中國稱天王於夷狄稱天子夷狄者聲教之所不及非王法所能治故不稱天王而稱天子言天無所不覆也天子者繼天而王者也稱於夷狄則曰天子天子外辭也稱於諸侯及臣下則曰豫一人內辭也豫一人猶言孤與寡人也不敢以勢位驕人自比一人而已書所稱豫一人大抵皆告諸侯之言分職授政任功則凡所以命諸侯命諸臣者莫不然也鬼神之在諸侯竟內者天子不親祀也曰有天王某甫有司不敢名君而告神又不可以無字也畛於鬼神者接於鬼神也畛猶畦畛之相接然與交際之際同義也長樂劉氏曰王畿五服之外蠻夷之君朝貢於王而擯者稱天子以對之也以其不知禮義之所尊而戴者獨天爾故稱天子以臨之不失其所畏也朝諸侯謂分土為九州以封五等之國千有七百七十三國四時各以其職來朝於王六年而後遍也分職謂設六官以法天地四時各專其職以考天下之教而黜陟幽明之也授政謂頒禮樂之成法致中和於庶民也任功謂建邦之六典以任天下之才而興功立事也凡此三者天子所以役中國之賢才措生民於皇極者也乃尊尚其德而謙抑自卑是以自稱曰豫一人也嚴陵方氏曰職欲各有所尊故曰分政欲一其所出故曰授功欲能有所勝故曰任分職然後可以授政授政然後可以任功故其序如此蓋所以朝諸侯之事不過是而已畛於鬼神者謂若巡狩望秩於山川也望秩之禮必於野外故以畛言之畛蓋田間道也祭於畛則謂之畛猶祭於郊而謂之郊也天子之適諸侯非其常也蓋有時焉故於此特言有焉此皆祝者之辭也石林葉氏曰嗣天正位以覆養其生類則曰天子故君天下則稱之所以親之也崇髙富貴而天下無與敵其尊則曰豫一人故分職授政任功則稱之所以尊之也上順天命下得人心曰天王故踐阼臨祭祀諸侯畛於鬼神則稱之廬陵胡氏曰覲禮諸侯至郊稱王命以勞之知其順命於王所則稱天子賜之舍講義曰天下謂四海九州之逺日月所照霜露所隊者皆是也君臨天下則本於天命以為天之子故稱天子焉朝諸侯謂春朝夏宗秋覲冬遇之類分職謂禹作司空契作司徒臯陶作士之類授政謂汝平水土汝播五榖汝敷五教在寬之類任功謂咨汝二十有二人欽哉惟時亮天功之類分職則辨其職任授政則命以政事任功則責以成功皆所以治百官也四明沈氏曰曰天子則非自私之辭曰豫一人則非求助之辭位不可以己有所以歸之於天權不可以人有所以執之於己崩曰天王崩復曰天子復矣告喪曰天王登假措之廟立之主曰帝鄭氏曰天王崩史書䇿辭也天子復矣始死時呼魂辭也不呼名臣不名君也諸侯呼字告赴也登上也假己也上己者若仙去云耳立主曰帝同之天神春秋傳曰凡君卒哭而祔祔而作主孔氏曰自上墜下曰崩王者死如從天墜下故曰崩也復招魂復魄也精氣為魂身形為魄人命終畢精氣離形臣子罔極猶望更生故使人升屋北面招呼死者之魂令還復身中故曰復也男子呼名婦人呼字令魂識知其名字而還王者不呼名字者一則臣子不可名君二則普天率土一人而已故止呼天子復也告喪謂天王崩遣使告天下萬國葬後卒哭竟而祔置於廟立主使神依之天神曰帝今號此主同於天神若文帝武帝之類也崔氏曰古者帝王生死同稱生稱帝者死亦稱帝生稱王者死亦稱王今廟主曰帝蓋是為記時有主入廟稱帝之義記者録以為法也藍田吕氏曰書崩及告喪皆曰天王史書䇿告臣民之辭也復曰天子告天之辭也假至也猶易所謂王假有廟詩所謂來假來饗莊子亦云登假於道是也體魄則降魂氣在上詩云三后在天書曰殷先哲王在天言其精神升至於天臣子不忍斥言故婉其詞也先儒以假為遐音恐未然也措之廟立之主曰帝者祔於廟之詞也周人卒哭而祔殷人練而祔蓋祔而作主始入於廟曰帝者同於天神生事畢而鬼事始也鬼神莫尊於帝以帝名之言其德主以配天也然考之禮經未見有以帝名者惟易稱帝乙亦不知其何帝獨司馬遷史記載夏殷之王皆以帝名疑殷人祔廟稱帝遷據世本而言當有所考至周有諡始不稱帝嚴陵方氏曰天王崩者史之所書而以尊大稱之也廬陵胡氏曰遐逺也竹書紀年帝王沒皆曰陟陟亦登也中山成氏曰主用木木落歸本有始終之義人之生無不死者天子之主尺二寸諸侯一尺四向孔穴五達相通漆書其諡故曰神主葬後孝子之心因無所覩故以神主也主之狀古今異制不得以新禮求之天子未除喪曰豫小子生名之死亦名之鄭氏曰謙未敢稱一人春秋傳曰以諸侯之踰年即位亦知天子之踰年即位以天子三年然後稱王亦知諸侯於其封內三年稱子也生名之曰小子王死亦曰小子王晉有小子侯是僣取於天子號也孔氏曰適嗣於初喪未忍即受天王之稱云豫小子者言我德狹小也鄭引春秋文九年公羊傳文證天子三年之內稱豫小子也嗣王既呼為小子若於喪中而死亦諡為小子王喪質故不變稱也藍田吕氏曰天子未除喪而沒則其祔也不曰帝而曰小子如晉有小子侯之類蓋在喪當稱子故也春秋書王子猛卒不言小子者臣下之稱與史䇿之詞異也此云豫小子者豫衍文也詩書所載豫小子之稱不必未除喪之稱此又承措廟立主曰帝之文而言也則非自稱之詞故知無豫字也生死皆名之曰小子王不稱帝不立諡未成為君也廬陵胡氏曰案書顧命乙丑成王崩癸酉康王尸天子位豈俟踰年也三年之內王自稱不曰王爾臣下未嘗不稱曰王也王乃反喪服是也鄭又云謙未敢稱一人康王何以稱一人釗也禮記集說卷十一
