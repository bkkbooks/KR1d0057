body:
  text: 禮記集説卷一百四十四宋衛湜撰服問第三十六孔氏曰案鄭目録云名曰服問者以其善問以知有服而遭喪所變易之節此於别録屬喪服山隂陸氏曰退問在下著服多微辭奧旨問有不盡也據問喪在上傳曰有從輕而重公子之妻為其皇姑有從重而輕為妻之父母有從無服而有服公子之妻為公子之外兄弟有從有服而無服公子為其妻之父母鄭氏曰皇君也諸侯妾子之妻為其君姑齊衰與為小君同舅不厭婦也從重而輕謂妻齊衰而夫從緦麻不降一等言非服差也從無服而有服謂為公子之外祖父母從母緦麻從有服而無服者凡公子厭於君降其私親女君之子不降也孔氏曰此四條明從服輕重之異言傳曰者舊有成傳記者引之公子之妻為其皇姑公子謂諸侯之妾子也皇姑即公子之母也諸侯在尊厭妾子使為母練冠諸侯沒妾子得為母大功而妾子妻不辨諸侯存沒為夫之母期也其夫練冠是輕也而妻為期是重故云從輕而重謂之皇姑者此妾既賤若唯云姑則有嫡女君之嫌今加皇字自明非女君而此婦所尊與女君同故云君姑也公子之妻為公子之外兄弟者謂公子之外祖父母也公子被厭不服己母之外家是無服也妻猶從公子而服公子外祖父母從母緦麻是從無服而有服也經唯云公子外兄弟知非公子姑之子者以喪服小記云夫之所為兄弟服妻皆降一等夫為姑之子緦麻妻則無服今公子之妻為之有服故知公子之外祖父母從母也此等皆小功之服凡小功者謂為兄弟若同宗直稱兄弟以外族故稱外兄弟也嚴陵方氏曰此一節即釋大傳服術有六之文也故稱傳曰以冠之馬氏曰大傳從服有六而此言其四皆禮之可以變易者則服亦從而隆殺之有從輕而重有從無服而有服者以其人情無所嫌而伸之也有從重而輕有從有服而無服者以其人情有所嫌而屈之也先王制服人情而已矣然而服術之六從服為末而從服之中有至無服則雖禮之微者不可不辨山隂陸氏曰公子之妻為其皇姑謂之皇姑著死而後稱姑避小君也先儒謂春秋之義妾母稱夫人若小君在上堂稱妾下堂稱夫人天一而已矣夫妻之天也雖其父母猶降雖其舅姑猶降即妻齊衰夫亦齊衰是相報也故先王制服為妻之父母其輕重不倫如此婦之黨為昏兄弟壻之黨為姻兄弟又各謂其外家之黨為外兄弟喪服傳曰何如則可謂之兄弟小功以下為兄弟小功以下親不足言也謂之兄弟可故曰四海之內皆兄弟也公子不服其母故為其妻之父母無服據喪服傳公子為其母練冠麻衣縓緣傳曰母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服鄭氏曰雖外親亦無二統孔氏曰此明繼母之黨亦是舊傳之辭嚴陵方氏曰此雖非大傳之文然舊傳之所説故亦以傳曰冠之三年之喪既練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功衰有大功之喪亦如之小功無變也鄭氏曰帶其故葛帶者三年既練期既葬差相似也絰期之葛絰三年既練首絰除矣服其功衰服粗衰也大功之喪亦如之者大功之麻變三年之練葛期既葬之葛帶小於練之葛帶又當有絰亦反服其故葛帶絰期之絰差之宜也此雖變麻服葛大小同爾亦服其功衰凡三年之喪既練始遭齊衰大功之喪絰帶皆麻孔氏曰三年之喪練祭之後又當期喪既葬之節今期喪既葬男子則應著葛帶與三年之葛帶粗細正同以父葛為重故帶其故葛帶三年練後男子除乎首其首空故絰期之葛絰若婦人練後麻帶除矣則絰其故葛絰帶期之麻帶以其婦人不葛帶故也功衰謂七升父之衰也經不云服其父衰而云功衰者經稱三年之衰則父為長子及父卒為母皆是三年今期喪既葬反服其服若言功衰總道三人故不得特言服父衰也有大功之喪明練後有大功之喪既葬也亦如之者亦帶其故葛帶絰期之葛絰大功初死之麻變三年練後之葛首要皆麻矣故間傳謂之重麻也大功既葬葛帶小於練之葛帶故反服練之故葛帶也又要服練之葛帶首服大功既葬之葛絰粗細相似不得為五分去一為帶之差故首絰進與期之既葬同也故鄭云絰期之絰是差次之宜也此注亦主於男子其婦人之服下間傳具釋云此雖變麻服葛大小同爾者大功初死之麻齊衰既葬之葛與初死之麻大小同也小功無變謂先有大功以上喪服今遭小功之喪無變於前服不以輕服減纍於重也橫渠張氏曰三年既練期既葬服其功衰有大功之喪亦如之謂若三年既練期大功既葬止當服其既練功衰不可便受以小功布也以此三年無受小功之節練衰除則自當服以小功練衣必是煆練大功之布以為衣故有言功衰功衰上之衣也以其著衰於上故通謂之功衰必著受服之上稱受者以此得名受蓋以受始喪斬疏之衰而著之變服其意以喪久變輕不欲摧割之心亟忘於內也練衣當既葬之後受以大功之衰及既練也煆練其衰而已或既練則以大功之布而為衰或衰而加煆練此則繫其有亡也小祥乃練其功衰而衣之則練與功衰非二物若正大功之服則有小功之受蓋大功乃亞三年期之重喪其卒哭之稅亦其稱爾若殤則不練矣練亦謂之功衰蓋練其功衰而衣之爾據曾子問三年之喪不弔又雜記三年之喪雖功衰不以弔又服問三年之喪既練矣有期之喪既葬矣則服其功衰絰意蓋謂當練而服後喪之衰即用七八升則前喪易忘故反七八升之衰矣又雜記有父母之喪尚功衰此云尚功衰蓋未祥之前尚衣絰練之功衰爾知既練猶謂之功衰者以下文云則練冠又三年之喪禮不當弔而雜記又云雖功衰不以弔山隂陸氏曰禮父之喪既練服其功衰母之喪既葬服其功衰即有父之喪既練矣母之喪既葬服其功衰而帶以故葛帶絰期之絰男子重首絰期之絰則以母喪尚新故也雜記三年之喪雖功衰既練之衰也藍田吕氏曰此功衰之喪既葬所受之功衰也故曰絰期之絰服期功衰承期文也蓋期之既葬之葛輕於三年之練葛故帶其故葛帶三年之練除首絰而期之既葬未除故絰期之絰期之既葬之功衰重於三年之練故又服期之功衰若三年既練遭大功之喪亦猶是也小功麻斷本故不變三年之練葛首也長樂黃氏曰練再受服經傳雖無明文謂既練而服功衰則記禮者屢言之服問曰三年之喪既練矣期之喪既葬矣則服其功衰雜記曰三年之喪雖功衰不弔又曰有父母之喪尚功衰而袝兄弟之殤則練冠是也案大功之布有三等七升八升九升而降服七升為最重斬衰既練而服功衰是受以大功七升布為衰裳也故喪服斬衰章賈氏疏云斬衰初服粗至葬後練後大祥後漸細加飾斬衰裳三升冠六升既葬後以其冠為受衰裳六升冠七升小祥又以其冠為受衰裳七升冠八升女子之嫁反在父之室疏云至小祥受衰七升總八升又案間傳小祥練冠孔氏疏云至小祥以卒哭後冠受其衰而以練易其冠而橫渠張子之説又曰練衣必煆練大功之布以為衣故言功衰功衰上之衣也以其著衰於上故通謂之功衰必著受服之上稱受者以此得名受蓋以受始喪斬疏之衰而著之變服其意以喪久變輕不欲摧割之心亟忘於內也據橫渠此説謂受以大功之衰則與傳記注疏之説同謂煆練大功之布以為上之衣則非特練中衣亦練功衰也又取成服之初衰長六寸博四寸綴於當心者著之於功衰之上是功衰雖漸輕而長六寸博四寸之衰猶在不欲哀心之遽忘也此説則與先儒異今並存之當考涑水司馬氏曰古者葬既練祥禫皆有受服變而從輕今世俗無受服自成服至大祥其衰無變故於既葬别為家居之服是亦受服之意也麻之有本者變三年之葛既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之鄭氏曰有本謂大功以上也小功以下澡麻斷本既練雖無變緣練無首絰於有事則免絰如其倫免無不絰絰有不免其無事則自若練服也孔氏曰大功以上為帶者麻之根本并留之合糾為帶如此者得變三年之練葛若小功以下其絰澡麻斷本是麻之無本不得變三年之葛也言變三年葛舉其重者其實期之葛有本者亦得變之矣斬衰既練之後遭遇麻之斷本小功之喪雖不變服於小功喪有事於免之時則為之加小功之絰如平常有服之倫類也既免去絰謂小功喪斂殯事竟既免之後則脫去其絰也每可以絰必絰者謂小功以下喪當斂殯之節每可以絰之時必為之加麻不應絰之時則去其絰自若練服也鄭注免無不絰者於免之時必著絰則大斂小斂之節衆主人必加絰也絰有不免者謂葬後虞及卒哭之節但著絰不免以服成故也嚴陵方氏曰本謂麻之根也大功以上之帶則不斷之以示其重焉故可以變三年之葛山隂陸氏曰喪服小記曰下殤小功帶澡麻不絶本此不言小功而言斷本為是故也小功不易喪之練冠如免則絰其緦小功之絰因其初葛帶緦之麻不變小功之葛小功之麻不變大功之葛以有本為稅鄭氏曰稅亦變易也小功以下之麻雖與上葛同猶不變也此要其麻有本者乃變上爾雜記曰有三年之練冠則以大功之麻易之唯杖屨不易也孔氏曰小功以下之喪不合變易三年喪之練冠其期之練冠亦不得易也如當緦小功著免之節則首絰其緦與小功之絰所以為後喪緦絰者以前喪練冠首絰已除故也上經云小功不易明緦不易下經云緦小功之絰兼言緦者恐免絰不及緦故也前經已云於免絰之此經又云如免則絰者前經但云絰不云練冠恐小功以下不得改前喪練冠故重言之也因其初葛帶者言小功以下之喪要中所著仍因其初喪練葛帶上文云期喪既葬則帶練之故葛帶此小功以下之喪亦著練之初葛帶不云故而云初者以期初喪之時變練之葛帶為麻期既葬之後還反服練之故葛帶故言故也謂其小功以下之喪不變練之葛帶故云初葛帶也緦之麻不變小功之葛小功之麻不變大功之葛者謂以輕喪之麻本服既輕雖初喪之麻不變前重喪之葛也以有本為稅者大功以上麻絰有本者得稅變前喪也緦與小功麻絰既無本不合稅變前喪故所緦之麻不變小功也注云此要其麻有本者乃變上耳者麻有本謂大功以上麻絰有本為重下服乃變上服大功得變期期得變三年也引雜記者欲明大功之麻非但得易期喪之葛亦得易三年練冠之絰也嚴陵方氏曰麻以有本者為重故得變易而稅焉以此易彼則彼得以息故曰稅稅猶典路説駕之説山隂陸氏曰於此言小功嫌下殤之小功不斷本可以易喪之練冠稅者脫也然則所謂小功不稅嫌言不服著矣殤長中變三年之葛終殤之月算而反三年之葛是非重麻為其無卒哭之稅下殤則否鄭氏曰謂大功之親為殤在緦小功者也可以變三年之葛正親親也三年之葛大功變既練齊衰變既虞卒哭凡喪卒哭受麻以葛殤以麻終喪之月數非重之而不變為殤未成人文不縟耳下殤則否言賤也男子為大功之殤中從上服小功婦人為之中從下服緦麻孔氏曰殤長中者謂本服大功今降在長中殤男子則為之小功婦人為長殤小功中殤則緦麻如此者得變三年之葛也著此殤服之麻終其月算數如小功則五月緦麻則三月著麻月滿還反三年之葛也言服殤長中之麻不改是非重此麻也以殤服初死服麻已後無卒哭稅麻服葛之法以其質略無文飾之繁數故也注云三年之葛大功變既練者則雜記云三年之練冠以大功之麻易之是也云齊衰變既虞卒哭者則下間傳云斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特是也男子為大功以下喪服傳文山隂陸氏曰下殤則否言為其無卒哭之稅則雖小功有卒哭矣君為天子三年夫人如外宗之為君也世子不為天子服鄭氏曰外宗君外親之婦也其夫與諸侯為兄弟服斬妻從服期諸侯為天子服斬夫人亦從服期喪大記云外宗房中南面世子不為天子服逺嫌也不服與畿外之民同也孔氏曰君謂列國諸侯之君為天子三年也諸侯夫人為天子如諸外宗之婦為君也諸侯外宗之婦為君期則夫人為天子亦期也諸侯世子有繼世之道所以逺嫌不為天子服也鄭注外宗君外親之婦其夫既是君之外姓其婦即是外宗也云其夫與諸侯為兄弟服斬謂在於他國諸侯既死來為之服當尊諸侯不繼本服之親故服斬也案熊氏曰凡外宗有三案周禮外宗之女有爵通卿大夫之妻一也雜記云外宗為君夫人猶內宗是君之姑姊妹之女舅之女從母之女皆為諸侯服斬為夫人服期是二也此文外宗若姑之子婦從母之子婦其夫是君之外親為君服斬其婦亦名外宗為君服期是三也內宗有二周禮云內女之有爵謂其同姓之女悉是一也雜記云內宗是君五屬之內女是二也引喪大記證外宗之義也君所主夫人妻大子適婦大夫之適子為君夫人大子如士服君之母非夫人則羣臣無服唯近臣及僕驂乘從服唯君所服服也鄭氏曰君所主夫人妻大子適婦言妻見大夫以下亦為此三人為喪主也士為國君斬小君期大子君服斬臣從服期大夫不世子不嫌也妾先君所不服也禮庶子為後為其母緦言唯君所服伸君也春秋之義有以小君服之者時若小君在則益不可孔氏曰夫人妻大子適婦此三人既正雖國君之尊猶主其喪也非此則不主也大夫無繼世之道其子無嫌得為君與夫人及君之大子著服如士服也君母非夫人君為之服緦則羣臣為之無服君母是適夫人則羣臣為服期也近臣謂閽寺之屬僕御車者也驂車右也君之母非夫人貴臣乃不服此諸臣賤者隨君之服故云從服君服緦此等人亦服緦故云唯君所服服也天子諸侯為妾無服唯大夫為貴妾服緦故鄭注云妾先君所不服也庶子為父後則為母無服故喪服記云公子為其母練冠麻衣縓緣今君得著緦麻故鄭云唯君所服伸君也鄭既言正禮又引春秋之時不依正禮有以為小君之服服其妾母者文公四年夫人風氏薨是僖公之母成風也又昭十一年夫人歸氏薨是昭公之母齊歸也皆亂世之法穀梁傳曰魯僖公立妾母成風為夫人是子爵於母以妾為妻非禮也左氏説成風妾得立為夫人母以子貴禮也鄭從穀梁説山隂陸氏曰言妻非見大夫以下大夫以下為此三人為喪主不必見也曲禮曰公侯有夫人有世婦有妻有妾公為卿大夫錫衰以居出亦如之當事則辨絰大夫相為亦然為其妻往則服之出則否鄭氏曰辨絰如爵辨而素加絰也不當事則皮辨出謂以他事不至喪所孔氏曰君為卿大夫之喪成服之後著錫衰以居以他事而出亦著錫衰其首則服皮辨當事謂君行往弔卿大夫當大斂及殯并將葬啓殯等事則首著辨絰身衣錫衰若於士雖當事首服皮辨大夫相為亦如君於卿大夫不當事則皮辨當事則辨絰也為其妻謂公於卿大夫之妻及卿大夫相為其妻往臨其喪則服錫衰不恆著之以居若他事出則不服也當殯斂亦辨絰山隂陸氏曰當事則辨絰者據此王為三公六卿錫衰大夫士疑衰其首服蓋當事而後辨絰也大夫相為亦然者雜記曰大夫哭大夫辨絰與殯亦辨絰為其妻往則弔也弔而服之弔而出則除之喪服傳曰大夫弔於命婦錫衰命婦弔於大夫亦錫衰新安朱氏曰古人君臣之際如君臨臣喪坐撫當心要絰而踊今日之事至於死生之際恝然不相關不啻如路人所謂君臣之義安在祖宗時於舊執政亦嘗親臨自渡江以來一向廢此看古禮君於大夫小斂往焉於士既殯往焉何其誠愛之至今乃恝然古之君臣所以事事做得成緣是親愛一體凡見人無免絰雖朝於君無免絰唯公門有稅齊衰傳曰君子不奪人之喪亦不可奪喪也傳曰罪多而刑五喪多而服五上附下附列也鄭氏曰見人謂行求見人也無免絰絰重也稅猶免也古者説或作稅有免齊衰謂不杖齊衰也於公門有免齊衰則大功有免絰也列等比也孔氏曰以絰重縱往朝君亦無免稅於絰也唯至公門已有不杖齊衰則脫去其衰絰猶不去也若杖齊衰及斬衰雖入公門衰亦不稅也其大功非但稅衰又免去絰也君子以己恕物不可奪人喪禮故君所以許臣著絰亦不可自奪喪所以已有重喪猶絰以見君申喪禮也罪之與喪其數雖多其限同五其等列相似故云列也傳是舊記引以明之山隂陸氏曰絰重也以絰該之下云唯公門有稅齊衰則此言斬衰可知然則君子不奪人之喪亦不可奪喪謂奪所重者也唯公門有稅齊衰言有有不稅也大夫以上不稅據士唯公門稅齊衰凡所謂稅皆暫釋喪服反吉服若康王麻冕黼裳是也列若今例矣馬氏曰法者所以齊天下之過失然民之過失浩繁而不勝齊也故法不可以不省禮者所以辨天下之親疏然人之親疏輕重之不易辨也故禮不可以簡是故制為五刑以斷其罪而罪多者有非五刑所屬則隨時而參酌之列為五服以定其喪而喪多而服五上附下附列也故有從輕從重有服無服之别焉蓋先王之制必以五數舉其大者而略言之五典五禮五聲五色五味五行日用不可闕一焉易曰天數五地數五王者之政天地而已嚴陵方氏曰上附下附列也言上下各有所比附而為之等列也間傳第三十七孔氏曰案鄭目録云名曰間傳者以其記喪服之間輕重所宜此於别録屬喪服斬衰何以服苴苴惡貌也所以首其內而見諸外也斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也斬衰之哭若往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也鄭氏曰有大憂者面必深墨止謂不動於喜樂之事三曲一舉聲而三折也偯聲餘從容也枲或為似孔氏曰此明居喪外貌輕重之異苴是黧黑色止平停不動也大功轉輕心無斬刺故貌不為之變又不為之傾若止於二者之間衰因煆布帶屨亦輕其絰色用枲同者自别表義耳小功緦麻其情既輕哀聲從容於理可也嚴陵方氏曰自大功至緦皆有衰止以稱齊斬者以其為凶服之重故也凡物精而致者謂之功粗而略者謂之沽大功小功之布比斬衰齊衰之布則稍精矣故皆謂之功大功之服九月比小功為大故以大稱之小功之服五月比大功為小故以小稱之緦麻則服之細其質則麻也故又以麻稱之自小功以上至於斬衰無非麻之所為者止以之稱緦則以其為凶服之最輕其細至於十五升功又不足以言之也特有以别於絲而已此五服之辨也苴蓋子麻也以之為布凡物精為美粗為惡故曰苴惡貌也蓋孝子之情在內者既極其哀則形於外也亦為之不美故斬衰則服苴以表之故曰所以首其內而見諸外以其所表如此而貌亦宜如之故曰斬衰貌若苴枲亦苴也蓋謂牡麻爾其為布稍精於子麻上言斬衰服苴則知齊衰而下服枲矣且齊衰既以緝而齊其下為義則其服緝之枲固亦宜矣其服如此貌亦宜如之故曰齊衰貌若枲以其哀既殺於斬衰故貌不若苴之惡也往而不反言氣欲絶而不能生也偯則哀之餘聲也夫哀之所感天性然也孝經言喪親曰哭不偯故此至大功始有偯也哀容則其哀從容而不迫馬氏曰喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也故先王因哀以制禮則禮有隆殺因禮以見哀則哀有小大凡喪事以哀為主間傳一篇言哀者六自斬衰以至緦麻輕重等差莫不有當也其曰哀之發於容體則因容體以為禮哀之發於聲音則因聲音以為禮哀之發於言語則因言語以為禮哀之發於飲食則因飲食以為禮哀之發於居處則因居處以為禮哀之發於衣服則因衣服以為禮其始也本於哀其終也成於禮有是哀則不得不行是禮有是禮則不得不致是哀也然而容體聲音言語動乎內者也飲食居處衣服在乎外者也內外俱備哀禮相稱五服之制可坐而定也斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食士與斂焉則一不食故父母之喪既殯食粥朝一溢米莫一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也鄭氏曰議謂陳説非時事也孔氏曰唯而不對但唯於人不以言辭而對也雜記云三年之喪對而不問謂在喪稍久故對也大功稍輕得言他事而不議論時事之是非雜記云齊衰之喪言而不語彼謂言己事為人説為語與此言異也齊衰二日不食謂正服齊衰也喪大記云三不食當是義服齊衰小功緦麻再不食喪大記云一不食再不食則是一不食謂緦麻再不食謂小功異人之説其義别也嚴陵方氏曰唯則順之而已對則有可否焉對則應彼而已言則命物焉言則直言而已議則詳其義焉議則主於事而已樂則通其情焉由其哀有輕重故發於言語有詳略也三不食則日有半也此言食與大記不能無小異溢與孟子言七十鎰之鎰同蓋二十兩也數登於十則滿矣而又益倍之為溢焉疏食者粗疏之食也父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥有醯醬中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉鄭氏曰先飲醴酒食乾肉者不忍發御厚味孔氏曰此明父母終喪以來所食之節大祥食醯醬則小祥食菜果之時但用鹽酪也不能食者小祥食菜果之時得用醯醬故喪大記云小祥食菜果以醯醬醴酒味薄乾肉又澀所以先食之者以喪服除孝子不忍發初御醇厚之味也喪大記云祥而食肉者異人之説父母之喪居倚廬寢苫枕塊不説絰帶齊衰之喪居堊室芐翦不納大功之喪寢有席小功緦麻牀可也此哀之發於居處者也父母之喪既虞卒哭柱楣翦屏芐翦不納期而小祥居堊室寢有席又期而大祥居復寢中月而禫禫而牀斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此哀之發於衣服者也鄭氏曰芐今之蒲蘋也此齊衰多二等大功小功多一等服主於受是極列衣服之差也孔氏曰此明初遭五服之喪居處之異及遭父母喪至終服所居改變之節又明五服精粗之異芐翦不納芐為蒲蘋為席翦頭為之不編納其頭而藏於內也亦有斬衰不居倚廬者則雜記云大夫居廬士居堊室是士服斬衰而居堊室也亦有齊衰之喪不居堊室者喪服小記云父不為衆子次於外注云自若居寢是也有事其縷無事其布曰緦者以三月之喪治其麻縷其細如絲故云緦麻以朝服十五升抽去其半縷細而疏也有事其縷事謂煆治布縷也無事其布謂織布既成不煆治其布以哀在外故也案喪服記云齊衰四升此經云四升五升六升多於喪服篇二等也案喪服記大功八升若九升此云七升八升九升是多喪服一等也喪服記又云小功十升若十一升此云小功十升十一升十二升是多於喪服一等也鄭云服主於受者以喪服之經主於受服者而言以大功之殤無受服不列大功七升以喪服父母為主欲其文相值故略而不言記者於是經極列衣服之差所以齊衰多二等大功小功多一等也嚴陵方氏曰柱廬間之楣以為之固故曰柱楣翦廬傍屏蔽之草而飾之故曰翦屏八十一縷曰升一服而升數不同者以有正服義服故也所謂喪多而服五者此也山隂陸氏曰芐翦不納者翦之而已不納也言翦屏則前此茅茨不翦柱楣於柱置楣而已此期而席居堊室喪服傳既虞寢有席既練舍外寢傳所記尊者居喪之法此言大夫士禮而已知然者以傳上翦屏蓋屏不欲視外尊者之事也故曰前旒蔽明黈纊塞聰亦天子虞之日逺大夫士近若寢有席一施之於虞則疾徐相懸矣其言既虞卒哭柱楣翦屏亦以此然則諸侯五月而葬七月而卒哭其寢有席又在卒哭歟賈氏曰吉服所以表德凶服所以表哀德有髙下章有升降哀有深淺布有精粗儀禮疏河南程氏曰古者八十一縷曰升斬衰三升則是二百四十三絲於今之布為己細緦麻十五升則是千有二百絲今蓋無有矣新安朱氏曰緦十五升抽其半者是一簆只用一經如今廣中疏布又如單經黃草布皆只一經也然小功十五升則其縷反多於緦矣又不知是如何斬衰三升既虞卒哭受以成布六升冠七升為母疏衰四升受以成布七升冠八升去麻服葛葛帶三重期而小祥練冠縓緣要絰不除男子除乎首婦人除乎帶男子何為除乎首也婦人何為除乎帶也男子重首婦人重帶除服者先重者易服者易輕者又期而大祥素縞麻衣中月而禫禫而纎無所不佩鄭氏曰葛帶三重謂男子也五分去一而四糾之帶輕既變因為飾也婦人葛絰不葛帶易服謂為後喪所變也婦人重帶帶在下體之上婦人重之辟男子也其為帶猶五分絰去一耳喪服小記曰除成喪者其祭也朝服縞冠此素縞者玉藻所云縞冠素紕既祥之冠麻衣十五升布深衣也謂之麻者純用布無采飾也大祥除衰杖黑經白緯曰纎舊説纎冠者采纓也無所不佩紛帨之屬如平常也纎或作綅孔氏曰此明父母之喪初死至練冠衰升數之變并明練後除脫之差也成布六升者以言三升四升五升之布其縷既粗疏未為成布也六升以下其縷漸細與吉布相參故稱成布葛帶三重者既虞卒哭受服之節要中之帶以葛代麻帶又差小於前喪服傳云五服絰帶相差皆五分去一以五分去一唯有四分見在三重謂作四股糾之積而相重四股則三重既變麻用葛因以為飾也未受服之前麻帶為兩股相合也此直云葛帶則首絰雖葛不三重猶兩股糾之也小祥練冠縓緣者父沒為母與父同也至小祥又以卒哭後冠受其衰而用練易其冠也又練為中衣以縓為領緣也大祥素縞麻衣者謂二十五月大祥祭此日除脫則首服素冠以縞紕之身著朝服而為大祥之祭祭後哀情未除更反服微凶之服首著縞冠以素紕之身著十五升麻深衣也知用十五升者案雜記云朝服十五升此大祥之祭既著朝服則大祥之後麻衣粗細當同朝服也中月而禫者中間也大祥之後更間一月而為禫祭二十七月而禫禫而纎者禫祭之時玄冠朝服禫祭既訖而首著纎冠身著素端黃裳以至吉祭身著吉服尋常所服之物無不佩也鄭注云婦人葛絰不葛帶者案少儀云婦人葛絰而麻帶又上檀弓云婦人不葛帶故士虞禮曰婦人既練説首絰不説帶此謂齊斬婦人帶不變若大功婦人變服亦受葛也云易服謂為後喪所變者以身先有前喪重今更遭後喪輕欲變易前喪也云其為帶猶五分絰去一耳者以婦人斬衰不變帶以其重要故也婦人既重其要恐要帶與首絰粗細相似故云其帶猶須五分首絰去一分耳以首尊於要但婦人避男子而重要帶爾引喪服小記證祥祭之服非素縞麻衣也引玉藻證此經素縞麻衣是大祥後所服也云謂之麻者純用布無采飾也者若有采飾則謂之深衣深衣篇所云是也緣以素則曰長衣是也緣以布則曰麻衣此麻衣是也黑經白緯曰纎戴德變除禮也賀氏曰斬衰既虞卒哭受以成布六升夫服緣情而制故情降則服輕既虞哀必有殺是故以細代粗以齊代斬耳若猶斬之則非所謂殺也若謂以斬衰命章便謂受猶斬者則疏縗之受復可得猶用疏布乎是以斬衰之名本生於始死之服以名其喪耳不謂終其日月皆不變也晉賀循見通典唐禫變議曰祥禫之義案儀禮云中月而禫鄭玄以中月為間月王肅以中月為月中致使喪期不同制度非一歷代學黨議論紛紜宗鄭者則云祥之日鼓素琴孔子彈琴笙歌乃省哀之樂非正樂也正樂者八音並奏使工為之者也禮記所云二十五月而畢者論喪之大事畢也謂除衰絰與堊室爾餘喪未盡故服素縞麻衣著未吉之服宗王者案禮記云三年之喪再周二十五月而畢又檀弓云祥而縞是月禫徙月樂又魯人有朝祥而暮歌者夫子曰踰月則其善也又夫子既祥五日彈琴而不成聲十日而成笙歌又祥之日鼓素琴以此證無二十七月之禫也夫人倫之道以孝為先上古喪期無數其仁人則終身滅性其衆庶有朝喪暮廢者中代聖人為作制節至重者斬縗以周斷後代君子以周若駟之過隙加以再周至於祥禫之節焚爇之餘其文不備先儒所議互有短長夫喪以周斷加以再周豈非欲重其情而彰孝道者也何乃惜一月之禫不加之以膠柱於二十五月者哉據間傳文勢足知除服後一月服大祥服後一月服禫服今約經傳求其適中可二十五月終而大祥受以祥服素縞麻衣二十六月終而禫受以禫服二十七月終而吉吉而除徙月樂無所不佩夫如此求其情而合乎禮矣通典新安朱氏曰或問成布答曰是稍細成布初來未成布也問縓緣答曰縓今淺絳色小祥以縓為緣一入謂之縓禮有四入之説亦是漸漸加深色耳然古人亦不專把素色為凶蓋古人專用皮辨皮辨純白自今言之則為大凶矣問布升數答曰八十縷為一升古尺一幅只闊二尺二寸算來斬衰三升如今網一般又如漆布一般所以未為成布也如深衣十五升布似如今極細絹一般這處升數又曉未得古尺又短於今尺若盡一千二百縷須是一幅闊不止二尺二寸所謂布帛精粗不中數不粥於市又如何自要闊得這處亦不可曉又曰二十五月祥後便禫看來當如王肅之説於是月禫徙月樂之説為順鄭氏之説未當語録橫渠張氏曰古者紡績其布當有吉凶二種若三四升之粗及細繐之細或去縷之半或不事其布或不事其縷不容吉凶二用者皆是特為有喪者設所謂成布蓋事縷事布供世俗常用成功之布但未加灰練爾其功尤粗略者為大功差細者為小功以蜃灰經練然後謂之練如此解之則練與成布義自兩安衰當單與練冠縓緣此特經文不足不當致疑於衰之有緣也除首者麻葛重雖大功之喪可易三年之練冠舉大功之輕則齊衰可知練冠且去之故言除也若其絰彼既自已除之矣此除服先重亦存舊注藍田吕氏曰始死易羔裘玄冠必以深衣素委貌徒跣扱衽不履不帶也然猶冠者蓋三日而後斂若將復生故未忍悉變也小斂則絰當事不可無變也既斂矣不復生矣然後説髦而袒括髮説髦者不得視其親也袒者將不欲衣也括髮者不能冠也既奉尸夷于堂而拜賔所以奉死者之始也而生者之變亦不可無始故始加麻麻服之重者也散要絰之垂而復與冠屨未變而加絞帶皆變有漸也既殯之明日哀必有殺而不飾不可以久也故成服杖冠屨衣裳帶皆具而變之以惡所以為喪之飾也將啓則免而散帶垂見柩不可以無變也既虞卒哭受以成布變麻服葛哀日殺則服日輕不忍遽變故亦有漸也既練練衣練冠繩屨除首絰冠屨衣裳皆即輕也要絰不除不忍盡變也縓緣黃裏漸有飾也練衣非衰也以練布為衣明至親以期斷加隆而三年故不以衰而以衣也祥夕為期則除而縞冠明其祭漸吉不可以純凶也既祥縞冠麻衣既祥纎明變有漸也嚴陵方氏曰受謂受服也六升而上然後謂之成布者以五升而下縷數漸少若未成然故也疏衰即齊衰也比功布之升為疏故亦謂之疏斬衰又疏矣然不謂疏衰者以斬之義為重而疏不足以名之故也山隂陸氏曰凡喪有變有除有受凡受以大受小以多受寡故三升以六升受之四升以七升受之去麻服葛謂以麻易葛所謂變也練後縓緣祥先素縞大祥彌吉故也絰在上體之上帶在下體之上男子重首婦人重要蓋取諸此作記者雖非一人大抵前後亦相足也若練衣縓緣言其衣矣今言練冠縓緣則著冠亦縓緣也若縞冠素紕言其冠矣今言又期而大祥素縞麻衣則著衣亦素紕也變素紕言素縞則其紕也以縞之素者也若所謂縵白是歟先儒謂染衣純之以素則曰長衣純之以布則曰麻衣非是易服者何為易輕者也斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特既練遭大功之喪麻葛重鄭氏曰此因上説而問之也既虞卒哭謂齊衰可易斬服之節也輕者可施於卑服齊衰之麻以包斬衰之葛謂男子帶婦人絰也重者宜主於尊謂男子之絰婦人之帶特其葛不變之也此言包特者明於卑可以兩施而尊者不可二此説所以易輕者之義既練以下言大功可易斬服之節也斬衰已練男子除絰而帶獨存婦人除帶而絰獨存謂之單單獨也遭大功之喪男子有麻絰婦人有麻帶又皆易其輕者以麻謂之重麻既虞卒哭男子帶其故葛帶絰期之葛絰婦人絰其故葛絰帶期之葛帶謂之重葛孔氏曰此經更釋易輕之意斬衰之喪既虞卒哭者謂士及庶人也故卒哭與虞並言之若大夫以上則虞受服故喪服注云天子諸侯卿大夫既虞士卒哭而受服輕者包言斬衰受服之時而遭齊衰初喪男子輕要得著齊衰要帶而兼包斬衰之帶也若婦人輕首得著齊衰首絰而包斬衰之絰也重者特者男子重首特留斬衰之絰婦人重要特留斬衰要帶也斬衰齊衰既是重服云包云特則知齊衰大功亦包特也鄭注云卑者可以兩施卑謂男子卑要婦人卑首兩施謂施於齊衰又得兼斬衰以其輕卑之也云尊者不可二者尊謂男子尊首婦人尊要故事尊正得尊於重服不可差二兼服輕也云男子有麻絰婦人有麻帶又皆易其輕者以麻謂既練遭大功之喪男子首空著大功麻絰婦人要空著大功麻帶男子又以大功麻帶易練之葛帶婦人又以大功麻絰易練之葛絰是重麻也大功既虞卒哭之後大功葛帶輕於練之葛帶故男子反帶其練之故葛帶也大功既葬男子則絰大功之葛絰婦人則帶大功葛帶鄭注謂之期葛絰期葛帶者粗細與期同其實是大功葛絰帶也藍田吕氏曰此篇所記變節竊求其意以為前後喪輕重之變適同故立此文以表之斬既虞與齊初喪既同矣斬從練齊既虞與大功初喪亦幾同矣故輕包重特止為斬既虞遭齊衰之喪而立麻葛重止為斬既練遭大功之喪而立麻葛兼服則為齊既虞遭大功之喪大功既虞遭小功之喪小功既虞遭緦之喪而立麻葛重者其始也以麻葛變雜記有三年之練冠則以大功之麻易之惟杖屨不易麻葛兼服者其輕者變而兼服之間傳麻同則兼服之服問緦之麻不變小功之麻小功之麻不變大功之葛嚴陵方氏曰輕者謂男子之要帶婦人之首絰重者謂男子之首絰婦人之要帶以其輕則兩施之故曰包以其重則獨留焉故曰特齊衰之喪既虞卒哭遭大功之喪麻葛兼服之鄭氏曰此言大功可易齊衰期服之節也兼猶兩也不言包特而兩言者包特著其義兼者明有絰有帶爾孔氏曰此明以後服易前服之意也兼服即前之義今齊衰既虞卒哭遭大功之喪易換輕者男子則大功麻帶易齊衰之葛帶其首猶服齊衰葛絰是首有葛要有麻故云麻葛兼服之據男子也婦人則首服大功之麻絰要服齊衰之麻帶上下俱麻不得云兼服也鄭注包特著其義以卑者可包尊須特著其尊卑之義故於斬衰重服言之此言兼者不取其義也所以不稱麻葛重者以三年之喪既練之後男子除首絰婦人除要帶於先既單今首絰皆有故須稱重今期以下男子首之與要固當皆有絰帶婦人亦然既不似既練之單所以不得稱重斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同大功之葛與小功之麻同小功之葛與緦之麻同麻同則兼服之兼服之服重者則易輕者也鄭氏曰此竟言有上服既虞卒哭遭下服之差也唯大功有變三年既練之服小功以下則於上皆無易焉此言大功之葛與小功之麻同小功之葛與緦之麻同主為大功之殤長中言之服重者謂特之也則者則男子與婦人也凡下服虞卒哭男子反其故葛帶婦人反其故葛絰其上服除則固自受以下服之受矣孔氏曰此明五服葛之與麻粗細相同同則得服後麻兼前服葛也案服問小功緦不得變大功以上此小功之麻得變大功之葛緦之麻得變小功之葛者謂成人之殤在長中也兼服之服重者則前文重者特是也則易輕者謂男子婦人則換輕者前文輕者包是也以前文麻葛兼服但施於男子今此男子易於要婦人易於首俱得易輕故鄭云則者則男子與婦人也凡後初喪雖易前服之輕後服既葬還須反服前喪之服故鄭云反其故葛帶葛絰也橫渠張氏曰兼服之服重者則易輕者舊注不可用此為三年之喪以上而言故作記者以斬衰及大功明之若斬衰既練齊衰既卒哭則首帶皆葛又有大功新喪之麻則與齊衰之首絰麻葛兩施之兼服之名得諸此蓋既不敢易斬衰之輕以斬葛大於大功之麻也又不敢易齊首之重輕者方敢易去則重者固當存故麻葛之絰兩施於首若大功既葬則服齊首之葛不服大功之葛所謂兼服之服重者則變輕者正謂此爾若齊麻未葛則大功之麻亦止於當免則絰之而已如此則喪變雖多一用此制而前後禮文不相乖戾禮記集説卷一百四十四
