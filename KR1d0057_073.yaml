body:
  text: 禮記集說卷七十三宋衛湜撰玉藻第十三孔氏曰按鄭目録云名曰玉藻者以其記天子服冕之事也冕之旒以藻紃為之貫玉為飾此於别録屬通論金華范氏曰玉藻一萹巨細兼舉自冠冕衣服推之齊明盛服致精明之德於內垂紳正笏固肌膚之㑹筋骸之束於外君有君之威儀臣有臣之威儀至飲食起居之纎悉文若不類然錯綜而觀固雜而不越也天子受命於天故嚴恭以享上帝羣臣受命於君故敬順以事天子亦大學之道與身者天下之本元首又身之本以德服人溫其如玉冕以莊其首服以章其身祭極敬朝極辨各有常儀一飲食一言動各有常度及天時少愆遽為之變禮深自抑損若仰愧俯怍而不自安表儀若此四方訓之故涖卜之嚴齊車之式所以敬天也居寢有常風雷必變所以畏天也將適公所齊戒沐浴洞洞屬屬事君如事天矣惟能事上斯能臨下宜登車之光輝如也君子者通上下而言之也鳴玉搢笏之義將引而伸之姑微倡其端比德之意雖同然隆殺詘伸理一而分殊矣自侍坐之始至禮成而退中間賜食侑食賜爵受爵醬齊之授尊罍之設皆有節法冠一也而品彚有差服一也而名制有别古者垂衣裳而天下治固百王所共由也一或渝之聖人必著失禮之始聲其罪於萬世其諸春秋之筆乎冠冕辨服之既備於是秉笏束帶垂紳被韍動容周旋於禮之中行有環佩之音車有鸞和之聲禮之所興衆之所治外朝濟濟矣而內之命服皆有章百僚師師矣而童子之飾亦有節殽核之微而少長之後先賔主之辭遜無敢慢賜獻之頃而車馬之乘服服食之饋受不敢輕交際㑹盟各有攸當愛親事上而命呼之唯諾門閾之出入必謹君大夫士而步武之疾徐几席之舒斂必中曲矜細行無一物不在禮聖人制之君子由之尊卑大小各安其分此禮義所以養人之欲也凡行容以下乃總結上文之條目舉凡言例必汲汲於廟與朝蓋先立乎其大者餘可概見也舉踵行坐莫非足容拱揖秉持莫非手容稱謂擯詔莫非言容其言曲而中其事肆而隱其委蛇繁密略與少儀曲禮相似而玉藻閎深矣天子玉藻十有二旒前後邃延龍卷以祭鄭氏曰祭先王之服也天子以五采藻為旒旒十有二前後邃延者言皆出冕前後而垂也天子齊肩延冕上覆也𤣥表纁裏龍卷盡龍於衣字或作衮孔氏曰自此至食無樂一節總論天子祭廟朝日及日視朝并饌食牲牢酒醴及動作之事并明凶年貶降之禮天子玉藻者藻謂雜采之絲繩以貫於玉以玉飾藻故云玉藻也藻之前後各有十二旒旒十有二就每一就貫以玉就間相去一寸則旒長尺二寸故垂而齊肩也言天子齊肩則諸侯以下各有差降則九玉者九寸七玉者七寸以下皆依旒數垂而長短為差旒垂五采玉依飾射侯之次從上而下初以朱次白次蒼次黃次𤣥五采玉既貫遍周而復始三采者先朱次白次蒼二色者先朱後緑漢明帝時用曹褒之說皆用白旒珠與古異矣天子十二旒在前後垂而深邃也延用三十升之布染之為𤣥覆於冕上出而前後冕謂以板為之以延覆上故云前後邃延也但延之於板相著為一延覆在上故云延冕也辨師注延冕之覆在上是也卷謂卷曲畫此龍形卷曲於衣以祭宗廟司服及覲禮卷皆作衮其六冕玉飾上下貴賤之殊並具王制疏長樂陳氏曰大裘之冕以質為尚故無玉藻以其內心也衮冕而下以文為尚故有玉藻以其外心也冕之為制方其後而昻之則足以立不變之體而與萬物辨圓其前而俯之則足以致無方之用而與萬物交表之𤣥也地道之所以升裏之朱也天道之所以降聖人南面而聼天下方而昻之以象其升於北圓而俯之以象其降於南乃其所也然名之曰冕象其與萬物交者為主故也延平周氏曰十二者天之數變化者天之道十有二旒所以則天數也龍衮所以體天道也仰有以則天數俯有以體天道然後為可以祭然服有六冕止於五內大裘而外衮衣則雖祭天可也特以其對𤣥端而祭故龍卷為祭先王而𤣥端為祭先君嚴陵方氏曰玉為德之美貫之以藻所以象君子以德為體以方為用也冕必旒所以蔽明而示內視也後亦設之者有戒慎乎其所不覩之意旒以十二為節則天數故也惟天子為能備天數也邃延用以覆之辨師所謂𤣥冕延紐左氏所謂衡紞紘綖皆言是耳延則以前得名邃則以後得名而旒之十二前後各垂故曰前後邃延辨皆不言邃者冕既以俯得名則延固可以該邃矣其他先邃而後延者邃之方則不變之體延之圓則無方之用先邃而後延從體以起用也龍卷蓋九章之服周登龍於山則龍為首章故主於龍而名之夫龍之為物升降自如不見制畜變化而不可知天之所以為用者也以周官司服考之自享先王而上皆衮冕惟祀五帝而上則襲大裘於內耳馬氏曰冕之為物後方而前圓後仰而前俯有延在上有旒在下視之則延長察之則深邃服飾於下隂也故有六衮冕則圓於上陽也故止於五冕止於五則大裘而冕與衮冕一矣蓋祀昊天則大裘而加冕享先王則服衮而已周官於祀昊天不言衮則用衮可知也記於龍衮言以祭不言所祭則昊天先王可知也先儒有云大裘無冕衮而其冕無旒不知何據山隂陸氏曰天子用全故曰玉藻即若諸侯有非玉者矣據瑉玉二采龍卷舉重諸侯𤣥端以祭舉輕相備也賈氏曰傳曰天子升龍諸侯降龍以此言之上得兼下下不得僭上則天子升降俱有諸侯直有降龍而已此據衣服若諸侯建旗則畫交龍升降俱有儀禮疏𤣥端而朝日於東門之外聼朔於南門之外鄭氏曰端當為冕字之誤也𤣥衣而冕冕服之下朝日春分之時也東門南門皆為國門也天子廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聼朔焉卒事反宿路寢亦如之凡聼朔必以特牲告其帝及神配以文王武王孔氏曰凡衣服皮辨尊次以諸侯之朝服次以𤣥端按下諸侯皮辨聼朔朝服視朝是視朝之服卑於聼朔今天子皮辨視朝若𤣥端聼朔則是聼朔之服卑於視朝與諸侯不類且聼朔大視朝小故鄭注知端當為冕謂𤣥冕也是冕服之下按宗伯實柴祀日月星辰則日月為中祀而用𤣥冕者以天神尚質故也魯語云大采朝日少采夕月大采謂衮冕也春分日長故朝日然則夕月在秋分也朝事儀云帥朝侯朝日於東郊故知東門是國城東郊之門也孝經緯云明堂在國之陽故知南門亦謂國城南門也按考工記云夏后氏世室鄭注云謂宗廟殷人重屋注云謂正寢也周人明堂鄭云三代各舉其一明其制同也又周書亦云宗廟路寢明堂其制同月令孟春居青陽左個仲春居青陽大廟季春居青陽右個以下所居各有其處是每月就其時之堂也路寢既與明堂同制故知反居路寢亦如明堂每月異所反居路寢謂視朔之一日也其餘日即在燕寢視朝則恆在路門外也論語曰告朔之餼羊注云天子特牛與以其告朔禮略故用特牛按月令每月云其帝其神故知告帝及神以其在明堂之中故知配以文王武王也橫渠張氏曰據玉藻天子聼朔於明堂諸侯則於大廟就藏朔之處告祖而行嚴陵方氏曰經有曰𤣥冕有曰𤣥冠有曰𤣥端何也蓋𤣥端者祭服燕服之總名衣𤣥衣而加𤣥冕則為祭服衣𤣥衣而加𤣥冠則為燕服或冠冕通謂之端𤣥端而朝日則是𤣥冕者也𤣥端而居則是加𤣥冠者也聼朔亦𤣥冕者敬朔事如祭故也日生於東故朝日於東門之外日月合於朔隂陽交於南故聼朔於南門之外即明堂是也必曰門之外者亦猶迎氣之於郊與馬氏曰周之朝日王搢大圭執鎮圭而圭之藻藉有五采五就乘龍載大旗而旗之象有日月交龍其壇曰王宫其燎則實柴其牲幣則尚赤其樂則黃鐘大吕雲門而與祀天神上帝者大概同矣服不以衮冕而以齊燕之𤣥端祀羣小祀之𤣥冕豈禮所謂稱也國語曰天子大采朝日而虞以大采為五色之繅藉而其服則衮其說是也然記稱朝日以𤣥端蓋非周禮也鄭氏易𤣥端以𤣥冕誤云周禮也覲禮天子拜日於東門之外祀日於南門之外祀月於北門之外祭日於東祭月於西然朝日非不於南不載於記夕月非不於西不見於覲禮日陽也以始事為功而主於東月隂也以終功為事而主於北故也夫告朔告於廟聼朔聼其事告朔春秋所謂朝廟是也聼朔春秋所謂朝覲是也天子告朔於廟聼朔於南門之外諸侯告朔於廟而已尊卑之辨也蓋告朔於廟明其受之於祖也聼朔於南門之外明其受之於天也山隂陸氏曰𤣥端𤣥端而冕謂之端以齊制名故齊服有𤣥端素端𤣥端而冕冕服之齊服也𤣥端而冠冠服之齊服也端冕亦或謂之𤣥冕𤣥冕齊戒是也荀子曰端衣𤣥裳絻而乘路者志不在於茹葷則端冕以齊明矣𤣥端而冠𤣥端而冕雖曰齊服然或服以祭亦服以朝服窮則同故也據士祭以𤣥端諸侯祭以𤣥端又天子𤣥端而朝日士𤣥端莫夕於朝之服南門大廟門也據諸侯皮辨以聼朔於大廟考工記曰門堂三之二閏月則闔門左扉立于其中鄭氏曰閏月非常月也聼其朔於明堂門中還處路寢門終月孔氏曰閏非常月無恆居之處故在明堂門中按大史云閏月詔王居門終月是還處路寢門終月謂終竟一月所聼之事耳於尋常則居燕寢也案皇氏曰明堂有四門即路寢亦有四門閏月各居其時當方之門嚴陵方氏曰夫左陽也為正右隂也時出佐陽而已闔門左扉而由其右以積分者非正故也且開明而發開暗而用者扉之常也今於開明之時而用其左亦以閏月之所居非常故也以居而為之位故曰立于其中延平周氏曰左扉即路門之左扉也左為陽陽主動故闔左扉者有居門終月之意馬氏曰嵗月日時有常也而閏之積則無常堂之居有常也而門之開合則無常天下之理有常者必待無常者而後備焉此王所以閏月居門也昔勾踐伐吳闔左扉而填之以土先儒謂閉陽開隂亦是意也月令言闔扇而此言扉者蓋木曰扉葦曰扇闔門扇扉之合也皮辨以日視朝遂以食日中而餕奏而食日少牢朔月大牢五飲上水漿酒醴酏鄭氏曰餕食朝之餘也奏奏樂也上水水為上餘其次之孔氏曰天子既著皮辨視朝遂以皮辨而朝食所以敬養身體故著朝服至日中之時還著皮辨而餕朝之餘食餕餘之時奏樂而食餕尚奏樂即朝食奏樂可知也月朔禮大故加用大牢按鄭志趙商問膳夫王日一舉鼎十有二物皆有爼則三牲備與此禮數不同者鄭謂禮記後人所集據時而言與周禮或合或否周禮六飲此五飲亦非周法也嚴陵方氏曰以禮朝之服而食不敢慢於所養也日中餕朝之餘不别改造不敢厚於所養也奏而食周官膳夫掌王之食飲以樂侑食正謂是矣且人之養也心志和而後氣體從之奏樂而食則所以和其心志而助氣體之養日少牢朔月太牢則所以為豐儉之節且重朔故也前於朔言聼此於朝言視何也聼主有所受於上視主有所明於下味以淡為本上水則貴本故也以至五齊加明水三酒加𤣥酒者亦此義也以水為上則飲為次矣以清為上則濁為次矣故以漿酒醴酏為之序其名義已見內則解沙隨程氏田先儒相傳謂前旒蔽明黈纊塞聰亦習之誤此獨祭祀之衮冕為然欲其専精神以饗神也若視朝則皮辨服何旒纊之有哉延平周氏曰皮辨之服白布衣積素以為裳用皮者貴自然也衣白而裳素者貴其潔且明也蓋君之於朝當體於自然又欲其潔白於己而明於事也故皮辨以日視朝所謂體其自然與夫自潔於己而明於事者則無終日之間違之故皮辨遂以食日中而餕者約於自奉者也奏而食者非特侑之而已且又使非僻之心無自入也日少牢朔月大牢者重其始也膳夫曰王日一舉鼎十有二物皆有爼以樂侑食大司樂曰王大食三侑皆令奏鐘鼓則所謂鼎十有二物者豈非朔月大牢者乎蓋十二鼎者禮之至隆而無以加者也水漿醴酏以酒為主故其所言如此然考於周官之六飲則不同者豈非夏殷之制乎山隂陸氏曰日中言奏而食則夕食不以樂侑然猶祭也故曰夕深衣祭牢肉牢肉雖非特殺亦非日中所餕之餘餕餘不祭周官王日一舉鼎十有二物此云王日少牢朔月大牢則王日一舉鼎十有二用少牢與朔月月半然後三牲備爾蓋鼎十有二不必皆大牢亦禮君無故不殺牛則王雖尊不應日殺然則楚語云天子舉以大牢祀以㑹諸侯舉以特牛祀以大牢舉謂朔月月半以盛者言之也所謂三酒上𤣥酒五齊上明水則三酒外有𤣥酒五齊外有明水今曰五飲上水則五飲有凉可知然其目不言略之也且水凉無厚薄之齊凉雖上水亦幾於水矣天子言飲諸侯言爼簋飲養陽氣食養隂氣也天子言日中諸侯言夕天子言餕諸侯言祭牢肉善言上也天子言奏而食諸侯言稷食菜羮亦善言上馬氏曰禮俎生魚而匏庶羞先黍稷而飯稻粱疏布尊於黼黻稿鞂尊於莞簟煎鹽貴於醯醢鸞刀貴於割刀以至大羮先鉶羮大圭先琢圭素車先飾車緇布先冕而五齊加明水三酒加𤣥酒皆五飲上水漿之意也蓋物之養人也無窮而人之逐物也無窮聖人有憂之故凡行禮之際以器皿之本素而無文飲酒之本淡而無味於是貴上之使人薄文以厚本節性以反朴則無敗度之過矣金華應氏曰皮辨以食敬且質也日中而餕簡且約也日少牢崇其儉也朔月大牢敬其始也或者見周禮膳人膳用六牲鼎爼十二之說且疑諸侯所奉當半天子而朔月僅為五爼四簋相去遼逺遂以為此篇所說為異代之制是殆未深考周官之說夫食用六穀膳用六牲與夫醬用百有二十罋不言其所實之物初不拘於大牢也特其所用不出於此且於此數者之中隨物而用之耳豈必盡物而用之哉若夫鼎爼之十有二就其想象而為之注釋爾楚觀射父之所謂舉者亦記其舉之大者爾若常日一舉之數亦有所不必言矣故竊以為王鼎爼十有二者乃日食常膳之彌文而未必備也諸侯五爼四簋者乃朔食之定數而不容虧也記禮者皆記其所見必不差也卒食𤣥端而居動則左史書之言則右史書之御瞽幾聲之上下鄭氏曰天子服𤣥端燕居左史右史所書春秋尚書其存者瞽樂人也幾猶察也察其哀樂孔氏曰春秋是動作之事故以春秋當左史左陽陽主動故記動尚書記言誥之事故以尚書當右史右是隂隂主靜故也周禮有內史外史大史小史御史無左史右史之名者按周禮大史職云大師抱天時與大師同車又襄二十五年傳曰大史書曰崔杼弒其君是大史在君左廂記動作之事則大史為左史也周禮內史職凡命諸侯及孤卿大夫則䇿命之僖二十八年左傳云王命內史叔興父䇿命晉侯為侯伯是皆言語之事在君之右故為右史是以酒誥云矧大史友內史友鄭注掌記言記行此論正法若其有闕則得交相攝代故洛誥史逸命周公伯禽服䖍注文十五年傳云史佚周成王大史襄三十年鄭使大史命伯石為卿皆大史主爵命以內史闕故也春秋之時則特置左右史官故襄十四年左史謂魏莊子昭十二年楚左史倚相是也御者侍也瞽人審音使之侍側幾察樂聲上下哀樂防君之失政和則樂聲樂政酷則樂聲哀馬氏曰𤣥所以體道端所以正德其制則先儒謂士之𤣥端身二尺二寸袂長如之袪尺二寸大夫以上侈之蓋半而益一理或然也𤣥端齊服也而天子燕居亦服之者蓋先王之禮入虛如有人燕居如有神此所以不愧屋漏也動見於貌言發於聲貌於時為春陽也故左史書之言於時為秋隂也故右史書之周官大胥於春歌之時合舞於秋詠之時合聲其意亦若此也行止在君而侍焉者御也即動之微而察焉者幾也政有治忽故民有憂樂民有憂樂故聲有上下上下雖殊而憂樂之聲均有焉故其哀心感者其聲噍以殺憂聲之下者也其怒心感者其聲粗以厲憂聲之上者也其愛心感者其聲和以柔樂聲之下者也其喜心感者其聲發以散樂聲之上者也有史以書言動則上無過失有瞽以幾聲音則下無匿情如此則禮樂交修而天下治矣長樂陳氏曰𤣥端則衣袂與袪廣袤等矣無大夫士之辨也果士之袪殺於袂尺非端也大夫之袪侈以半而益一亦非端也深衣之袂圜長衣之袂長弔祭及餘衣之袂侈則𤣥端之袂端可知矣古者端衣或施之於冕或施之於冠樂記曰魏文侯端冕而聼古樂此施之於冕者也冠禮冠者𤣥端緇布冠既冠易服服𤣥冠𤣥端內則子事父母冠緌纓端韠紳公西華曰端章甫以至晉侯端委以入武宫晏平仲端委以立於虎門此施之於冠者也蓋𤣥端齊服也諸侯與士以為祭服玉藻𤣥端以祭特牲冠𤣥端是也大夫士以為私朝之服玉藻朝𤣥端是也天子至士亦以為燕服玉藻天子卒食𤣥端而居內則事父母端韠是也然則端衣所用固不一矣記曰齊之𤣥也以隂幽思也故祭之冕服皆𤣥齊之端衣亦𤣥若夫朝服天子以素諸侯以緇未聞以𤣥端也儀禮大夫祭以朝服士祭以𤣥端冠禮冠者服𤣥端雜記公襲朝服一𤣥端一襚禮自堂受𤣥端則朝𤣥端異矣𤣥端皆𤣥裳或黃裳雜裳可也未聞以素裳也鄭氏下文注云朝服冠𤣥端素裳此說無據禮書又樂書曰周官典同言髙聲䃂下聲肆正聲緩則所謂中聲者非髙而䃂非下而肆一適於正緩而已蓋樂以中聲為本而一上一下非所以為中也古者神瞽考中聲以作樂蓋本諸此然則御於君所之瞽其察樂聲有不以中聲為量乎今夫齊音敖僻喬志則聲失之髙而上者也宋音燕女溺志則聲失之卑而下者也上非中聲也下亦非中聲也御瞽在所幾焉若夫不上不下而要宿於中則中和之紀於是乎在尚何幾察為哉有瞽以幾聲樂則人主無流湎之心矣山隂陸氏曰諸侯言夕深衣舉輕天子言卒食𤣥端而居舉重互相挾則天子夕亦深衣諸侯卒食亦𤣥端而居左史右史諸侯亦應如此諸侯言行或愧於書天子言幾聲諸侯言定體善言上幾聲精矣延平周氏曰天子之於事則無為而其所有為者言動而已故動則左史書之言則右史書之聲音之道與政通故御瞽幾聲之上下慶源輔氏曰𤣥端而居如是然後儼然人望而畏之有左史右史以書言動天子諸侯言而世為天下道動而世為天下法宜也故如是書之豈曰有所禁止之哉魏文侯云鐘聲不比乎左髙雖曰失其職然古意猶存也年不順成則天子素服乘素車食無樂鄭氏曰自貶損也孔氏曰司服云大札大荒大烖素服此是天子諸侯罪己之義素服者謂素衣故下文諸侯年不順成君衣布互文也若其臣下即不恆素服唯助君禱請之時乃素耳故司服𤣥端素端注云為札荒有所禱請也嚴陵方氏曰憂民之憂而以喪禮自貶也延平周氏曰先王之所以應天者雖以實不以文然文者亦在所不廢馬氏曰順在氣成在物不順則逆而水旱至焉不成則虧而饑饉至焉周官司服大荒素服大司徒荒政蕃樂大司樂大凶弛縣雜記凶年乘駑馬皆憂以天下故也然食雖無樂飲酒蓋有樂矣曲禮曰嵗凶非飲酒不樂金華范氏曰自天子玉藻止食無樂此天子之儀人主天下之元首而頭容必比德於玉豈徒莊其首哉十二天數也旒必象焉變化天道也龍卷象焉尊祖配天以是而祭可以對越上帝來格祖考矣東者日之所出向明而治閏必變而從時皆天道也皮辨以食順以質也餕食之餘自損挹也日少牢崇儉也朔月大牢敬始也朔言聼受命於天也朝言視中以觀天下也五飲水之為上原本而反始也燕居而齊服戒謹恐懼於不覩不聞也言動有書豈曰有所禁止哉表儀天下也幾聲以察治忽聲音與政通唯樂不可以僞為也年不順成遽自貶損憂以天下禹湯之罪己也吁目之於色也耳之於聲也口之於味也四肢之於安佚也誰獨無是心哉况享天下之奉乎先王之視聼言動莫不養之以禮視朝聼朔明目達聰示法於人受命於天飲必上水而淡薄之為貴食必奏樂而非僻無自而入齊服以燕處端冕以事鬼神一衣服飲食動作起居仰不愧天俯不怍人故雍雍在宫肅肅在廟安而行之周旋中禮此聖人之於天道也豈勉强而然耶諸侯𤣥端以祭禆冕以朝皮辨以聼朔於大廟朝服以日視朝於內朝鄭氏曰𤣥端祭先君也端亦當為冕諸侯祭宗廟之服唯魯與天子同裨冕朝天子也公衮侯伯鷩子男毳也皮辨下天子也朝服冠𤣥端素裳也此內朝路寢門外之正朝也天子諸侯皆三朝孔氏曰自此至同庖一節論諸侯自祭宗廟及朝天子自視朝食飲牢饌之禮與天子不同之事鄭知𤣥冕祭先君者與上龍卷以祭其文相類也𤣥端賤於皮辨下文皮辨聼朔於大廟不應𤣥端以祭先君故鄭知端當為冕也按明堂位君卷冕立于阼此謂祭文王周公之廟得用天子之禮祭魯公以下則亦𤣥冕也按覲禮云侯氏裨冕鄭注裨之為言埤也天子六服大裘為上其餘為裨是以總云裨冕聼朔天子用𤣥冕諸侯下天子故用皮辨凡每月以朔告神謂之告朔即論語云告朔之餼羊是也則於時聼治此月朔之事謂之聼朔此玉藻文是也聼朔又謂之視朔文十六年公四不視朔是也告朔又謂之告月文六年閏月不告月是也行此禮天子於明堂諸侯於太祖廟訖然後祭於諸廟謂之朝享司尊彜云朝享是也又謂之朝廟文六年云猶朝于廟是也又謂之朝正襄二十九年釋不朝正于廟是也又謂之月祭祭法云皆月祭之是也鄭知朝服冠𤣥端素裳者按王制周人𤣥衣而養老注云𤣥衣素裳天子之燕服為諸侯朝服彼注云𤣥衣即此𤣥端也若以素為裳則是朝服此朝服素裳皆得謂之𤣥端論語云端章甫是也若上士以𤣥為裳中士以黃為裳下士以雜色為裳天子諸侯以朱為裳雖皆謂之𤣥端不得名為朝服也知內朝路寢門外之正朝者以下文君日出而視之退適路寢故知此路寢門外朝也知天子諸侯皆三朝者大僕掌燕朝之服位注云燕朝朝於路寢之庭是一也司士正朝儀之位注云此王日視朝事於路門外是二也朝士掌外朝之法注云外朝在庫門之外臯門之內是三也諸侯三朝者文王世子云公族朝於內朝路寢朝是一也世子又云其在外朝司士為之與此視朝於內朝皆謂路寢門外每日視朝是二也此但云內朝對中門外朝為內也文王世子云外朝者對路寢庭為外也此據路寢門外而稱內朝明知中門外别更有朝也諸侯三門是中門外大門內又有外朝是三朝也已具文王世子疏長樂劉氏曰天子聼朔於明堂而頒其正朔於天下諸侯受而藏諸其大廟每月之吉則以餼羊告朔祭於大廟因而聼其月朔之政則服皮辨焉延平周氏曰衣以𤣥所以體天道章以黻所以辨善惡加之冕則有俯而接物之象上有以體天道下有以辨善惡而又能俯而接物在天子為可以朝日而在諸侯為可以對先君故天子𤣥端而朝日諸侯𤣥端以祭夫君子慎其獨雖在燕居亦莫不欲體天道辨善惡故天子諸侯皆用𤣥端而居服有六冕止於五故大裘龍衮同冕是大裘龍衮之冕為尊而自降之龍衮而下其冕皆為卑故言裨冕者所以兼鷩冕與毳冕也言朝者所以兼覲遇與宗也凡天子諸侯路門之外與其大廟皆為南門之外而天子聼朔必於路門之外諸侯聼朔必於大廟者正朔自天子出而諸侯則受其天子之所頒者也故天子聼於路門之外所以示其正朔自天子出也蓋路門者天子布政之所諸侯則聼於大廟者神之也朝服皮辨也以其為天子視朝之服故曰朝服周官曰公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男自毳冕而下如侯伯之服是天子視朝服皮辨則諸侯視朝亦皮辨也內朝治朝也諸侯之門雖殺於天子而三朝則同故以路寢之燕朝而對於路門之治朝則治朝為外朝以路門之治朝而對於雉門之外朝則治朝為內朝嚴陵方氏曰𤣥端以祭與天子朝日之義同然諸侯以一𤣥端而祭者降於天子故也朝謂朝天子各以其爵之服天子聼朔於南門示受之於天也諸侯聼朔於大廟示受之於祖也諸侯受朔於天子而己乃云受之於祖者以已得受朔於天子由祖故也𤣥端祭服也皮辨朝服也天子以祭服聼朔者示受之於天故神之也諸侯以朝服聼朔者示受之於祖故明之也內朝亦曰燕朝以其别於外朝故曰內以其别於治朝故曰燕視于內朝者常朝也故以日言之馬氏曰天子冕而祭皮辨而視朝諸侯裨冕而祭亦裨冕以朝大夫祭以朝服士祭以𤣥端祭統曰夫人蠶於北郊以共冕服又曰君純冕立於阼階配夫人而言之則諸侯祭以裨冕可知也謂之裨冕者公之服卑於大裘侯伯而下又卑焉故也鄭氏以玉藻曰諸侯𤣥端以祭裨冕而朝遂易𤣥端為𤣥冕而謂諸侯祭宗廟之服惟魯與天子同然則祭統所謂純冕卷冕者豈皆魯禮乎且周諸侯之衣服禮儀皆以命數為節而諸侯相見亦用朝王之圭藉豈祭不以朝王之裨冕特降之以從𤣥冕乎殆不然矣公西華曰宗廟之事如㑹同端章甫則端𤣥端也章甫殷冠也曰端章甫則以衣名冠殆末世之俗變周之文從殷之質故孔氏冠章甫之冠而公西華亦以端章甫為禮此記者所以有𤣥端以祭之說也或曰諸侯朝祭以裨冕荀卿則曰大夫裨冕以其冕止於大夫故也周禮孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服記曰大夫冕而祭於公山隂陸氏曰𤣥端𤣥端而冕諸侯冕而祭於公𤣥端而冕祭於已據大夫冕而祭於公辨而祭於已然則𤣥端雖冕異於𤣥冕𤣥冕纁裳𤣥端而冕𤣥裳特牲主人冠𤣥端不言𤣥嫌裳或素天子言門諸侯言大廟言內朝斥近不敢以言天子也朝辨色始入君日出而視之退適路寢聼政使人視大夫大夫退然後適小寢釋服鄭氏曰辨色始入羣臣也入入應門也辨猶正也别也小寢燕寢也釋服服𤣥端孔氏曰應門之內則路門之外諸侯中門為應門外又有臯門此經據君釋服故鄭云服𤣥端若卿大夫釋服服深衣也長樂陳氏曰朝辨色始入所以防微日出而視之所以優尊也詩曰夜鄉晨言觀其旗臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也蓋尊者體盤卑者體蹙體蹙者常先體盤者常後故視學衆至然後天子至燕禮設賔筵然後設公席則朝禮臣入然後君視之皆優尊之道也然朝以先為勤以後為逸退以先為逸以後為勤今朝而臣先於君所以明分守退而君後於臣所以防怠荒此所以使人視大夫大夫退然後適小寢釋服也然則公卿諸侯之朝王其有先後乎詩云三事大夫莫肯夙夜邦君諸侯莫肯朝夕夫夙先於朝夜後於夕則公卿朝常先至夕常後退諸侯朝常後至夕常先退禮書嚴陵方氏曰辨色者將旦之時將旦則隂陽於是乎分以辨色而入則以極辨為事故也視大夫退然後敢退示與之均勞逸也詩曰大夫夙退無使君勞是矣慶源輔氏曰言始入不必早言視之不敢緩使人視大夫所以體羣臣也必如是故天下為一家君臣為一人長樂劉氏曰大夫有政不敢自達者必入路寢之朝以請於君也故大夫未退則君不敢適於小寢古之君臣同心同德以憂國事而君不敢恃其尊大以自暇逸三代之臣所以忠厚勤瘁於後世蓋有所自焉山隂陸氏曰釋服蓋服𤣥端若天子退而釋服蓋亦服此及食又服皮辨據又朝服以食又朝服以食特牲三爼祭肺夕深衣祭牢肉朔月少牢五爼四簋子卯稷食菜羮夫人與君同庖鄭氏曰食必復朝服所以敬養身也三爼豕魚臘也祭牢肉異於始殺也天子言日中諸侯言夕天子言餕諸侯言祭牢肉互相挾也五爼加羊與其腸胃也朔月四簋則日食稻粱各二簋而已稷食菜羮忌日貶也夫人與君同庖不特殺也孔氏曰上天子云遂以食者亦退於小寢釋服至食時又朝服互相明也三爼鄭約特牲禮早起初殺之時將食先祭肺以周人重肺至夕將食之時切牢肉為小段而祭之故鄭云異於始殺也以天子言日中諸侯亦當言日中諸侯言夕挾天子日中故云互相挾也五爼鄭約少牢禮但少牢祭神加羊與膚為五此人君所食故無膚有腸胃也詩云每食四簋注云四簋黍稷稻粱是簋盛稻粱也以此推之天子朔月大牢當六簋黍稷稻粱麥苽各一簋若盛舉則八簋故小雅陳饋八簋當加以稻粱也按公食大夫禮簠盛稻粱此用簋者以常食異於禮食若禮食簠簋數更多也稷食以稷穀為飯食飯也以菜為羮紂以甲子死桀以乙卯亡後王以為忌也夫人與君同庖舉諸侯天子可知講義曰朝服以食以見一國之奉亦不可忽也嚴陵方氏曰牛羊豕為大牢羊豕為少牢諸侯朔月少牢以見日所食特牲者或羊或豕而已日食特牲下文言祭牢肉止言牢而不言少則不必具羊豕矣祭肺則明堂位所謂周人祭肺是矣深衣燕居之服由朝至夕則可以燕矣故夕深衣而燕食焉祭牢肉則以夕食非始殺故止於肉而不必肺也周官膳夫王燕食則奉膳贊祭王氏謂燕食有魚鳥之膳非祭朝之餘此言日中與夕則燕食爾而曰祭牢肉者由周以前質略故也朔月少牢固以降天子亦以無故不殺牛故也爼以薦魚肉則天産也故用陽數之竒簋以盛黍稷則地産也故用隂數之偶五爼四簋則以朔月故倍常也君之常膳非不以稷為食特以稻粱為上而稷為之次爾非不以菜為羮特以雞犬為胾而菜為芼爾今乃食止以其次羮止以其芼則以疾日當自貶故也夫人與君同庖與共牢而食同義山隂陸氏曰深衣敘祭牢肉之上則夕亦以此食矣天子言卒食以居諸侯言夕深衣祭牢肉相備也相備而天子言𤣥端亦言之法所謂朝𤣥端夕深衣如此夕燕居之時也雖天子亦深衣易曰君子以嚮晦入燕息若端朝事也長樂陳氏曰深衣以其深而有靜意而夕者離陽之動而復隂之靜故於是時則服以象之也馬氏曰春秋傳曰辰在子卯謂之疾日君徹燕樂學人舍學則飲食之約也宜矣士喪禮朝夕哭不辟子卯又檀弓言子卯不樂皆謂此也君無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖厨凡有血氣之類弗身踐也鄭氏曰故謂祭祀之屬踐當為翦翦猶殺也孔氏曰自此至篇末或論天子或論諸侯或論大夫士所為尊卑之異隨文為義無復總别大略此經謂諸侯也無故不殺羊亦諸侯大夫也天子大夫有故得殺牛鄭注祭祀之屬者若待賔客饗食亦在其中矣弗身翦謂尋常祭祀之事則身自為之故楚語云禘郊之事天子自射其牲又刲羊擊豕是也嚴陵方氏曰君子之於禽獸見其生不忍見其死聞其聲不忍食其肉故逺庖厨凡有血氣之類弗身踐是乃仁術也庖蓋宰殺之所厨蓋烹飪之所山隂陸氏曰踐讀如字血氣之類蓋若螻蟻吾能弗踐而已不能禁人使勿踐也故曰凡有血氣之類弗身踐也若行葦周家忠厚之志豈一日之積哉慶源輔氏曰君可以殺牲矣猶無故而不殺仁之至也逺庖厨不得已也於得已焉雖蚍蜉之微弗身踐也金華應氏曰無故不殺仁也君大夫士必有辨禮也有故而殺禮也逺之而弗身踐仁也君子逺庖厨蓋古有是語孟子亦引之至于八月不雨君不舉年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬鄭氏曰君不舉者為旱變也此謂建子之月不雨盡建未月也春秋之義周之春夏無雨未能成災至其秋秀實之時而無雨則雩雩而得之則書雩喜祀有益也雩而不得則書旱明災成也君衣布以下皆為凶年變也君衣布者謂若衛文公大布之衣大帛之冠是也搢本去珽荼佩士笏是也士以竹為笏飾本以象關梁不租此周禮也殷則關但譏而不征列之言遮列也雖不賦猶為之禁不得非時取也造謂作新也孔氏曰此經論諸侯及大夫遭凶年之禮經直云八月不雨不云初不雨之月鄭必知是子月者以周之嵗首陽氣生養之初又文十年有自正月不雨之文故據而為說衣布者身衣布衣也君遭凶年搢插士笏關謂關門梁謂津梁租謂課稅以其凶年故不課稅山澤但遮列人不得非時而入恐損傷於物不賦斂也土功不興謂人食不得滿二釜之嵗若人食二釜則猶興土功也故均人云豐年旬用三日中年用二日無年用一日廩人云人食四釜上三釜中二釜下是無年猶有一日之役長樂劉氏曰洪範庶徴三代之明訓也五氣雖出於天時克使來備弗失其和乃根乎五事是故三月之內一極備一極無則天下莫足勝其凶咎矣君人者知其由己之致也反躬自訟不御正寢不進常膳食不舉樂春秋所以書正月至于七月不雨或書大旱或書大雩或書又雩皆因其違禮違天之實迹書以見其咎徴也三傳弗達聖人之意乃曰不為災故不書旱豈有不雨者七月而不為災則咎徴明訓適為虛語矣此曰至于八月不雨君不舉者後儒惑於三傳不然則誤且謬矣嚴陵方氏曰禮器曰天時雨澤君子達舋舋焉則不雨而不舉亦宜矣殺牲盛饌曰舉以尊者唯盛饌乃可以舉故也周官均人云凶札則無力政所謂土功不興也無財賦所謂不租不賦也馬氏曰春秋書不雨者七大旱二雩一大雩二十其書不雨至于秋七月者三蓋不雨而為災則書旱不為災則書不雨求而得雨則書雩而此言至于八月不雨者春秋紀實以刺譏而禮明理以示教也蓋天之氣猶人之氣人之血脉長於少充於壯而耗於老則天之雨澤滋於春潦於夏涸於秋理固然也古人所謂辰角見而雨畢天根見而水涸月令亦於八月言水始涸以明水涸由此而始則至于八月不雨者終無雨而萬寶莫期乎成矣此君所以不舉禮曰天地有災則不舉不雨而雖未為災有志乎民而憫之者其可以盛饌自若乎喪服以布士笏以本衣布所以致憂搢本所以自貶不租不賦所以寬民財司關凶札則無關門之征是也土功不興所以寬民力司徒荒政弛役是也關以通陸梁以通川周官司書言賦而終之以凡稅斂掌郊言九稅而餘官言九賦司徒言征而繼之以賦載師言賦而繼之以稅則稅者以地取之也征者以正取之也斂則收而聚之賦則取而布之租則取之不可以悉稅者取之以道征者取之以義斂者取之事賦者取之法租者取之戒其言不同相備故也大夫不得造車而繼之以馬者造車而馬從之也王制關市譏而不征澤梁無禁則非特凶年然也蓋王制所言異代之禮延平周氏曰至于八月者自建寅之月至建酉之月也春秋書不雨至于秋七月者三蓋魯之正朔也故自建子之月至於建午之月不雨者不為災也此言至八月者以正嵗言之也正嵗至于八月則為災矣故君不舉樂至于年不順成則不特不舉而已而又衣布搢本租以禾為主賦以兵為主然斂取而有用之者皆賦也山隂陸氏曰至于八月不雨君不舉天子亦爾而不言不雨如此非所以言天子也不言不雨至于八月望雨之詞也據春秋文公書自正月不雨至于秋八月言搢本而已則用士笏明無象飾金華范氏曰自諸侯𤣥端以祭止不得造車馬此諸侯之儀耳目手足肢節脉理皆有屬而後知心之為尊公卿大夫士庶牧圉各有常分而後知天子之尊天子之冕以大裘諸侯之服曰裨冕天子聼朔南門之外示受之於天也諸侯聼朔於太廟示受祖之得於天子者也天子以祭服聼朔諸侯以朝服聼朔皆有等差矣諸侯知尊天子然後大夫知有諸侯臣辨色而入君日出而視大夫夙退毋使君勞愛君也君視大夫退乃敢釋服體羣臣也天子言日中諸侯言夕天子言餕諸侯言牢肉此禮之常也而皆有區别焉慶源輔氏曰土功謂築城壘浚河隍大夫不造車馬則君不得為宫室可知卜人定龜史定墨君定體鄭氏曰定龜謂靈射之屬所當用者定墨視兆坼也定體視兆所得也周公曰體王其無害孔氏曰此一經論君卜龜所定之異按龜人云天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之鄭云屬言非一也天龜𤣥地龜黃東青西白南赤北黑也龜俯者靈仰者繹前弇果後弇獵左倪靁右倪若定之者定其所當用謂卜祭天用靈祭地用射射則繹也春用果秋用靁之屬史定墨者凡卜必以墨畫龜求其吉兆若卜從墨而兆廣謂之卜從周禮占人注云墨兆廣也但坼是從墨而裂其旁岐細出謂之為舋坼故占人云君占體大夫占色史占墨卜人占坼注云體兆象也色兆氣也墨兆廣也坼兆舋也是大坼稱為兆廣小坼稱為兆舋也君定體者謂五行之兆象既得兆體君定其體之吉凶尊者視大卑者視小也嚴陵方氏曰卜必用龜而龜有名物之異龜定矣必用墨而墨有大小之異墨定矣必有體而體有吉凶之異又不可不定焉若龜人掌六龜之屬所謂定龜也卜師揚火以作龜致其墨所謂定墨也衛風言爾卜爾筮體無咎言所謂定體也然周官言君占體大夫占色史占墨卜人占坼其序與此不同者彼以尊卑之序言此以先後之序言故也新安朱氏曰占龜土兆大橫木兆直或曰火兆直只周禮曰木兆直金兆從右邪上火兆從左邪上或曰木兆從左邪上水兆曲以大小長短明暗為吉凶或占凶事又以短小為吉又有旋者吉大橫吉大橫庚庚庚庚是豹地恁地庚庚然不是金兆也延平周氏曰定墨定其食否若書謂惟洛食是也定體定其象而已周官言占者以神此言定者以人馬氏曰卜人定龜周禮所謂卜師辨龜之上下左右隂陽以授命龜者是也史定墨周禮所謂大史大祭祀與執事卜是也君定體如曰體王其罔害詩曰體無咎言是也凡龜作之而後坼坼而後墨與色可知坼有微明墨有大小色有善否然後君定體斷吉凶則衆占備焉與周禮所謂以輔衆志同意君占體與所謂蔽謀同意何則明謀之於人幽謀之於鬼其義一也金華范氏曰卜史之職至微也而典禮所甚重先王聰明知識非不超乎萬物之表也凡作大事謀及羣臣庶民亦可謂曲盡人謀矣然必建天地隂陽之情立以為易易抱龜南面天子卷冕北面雖有明知之心必進斷其志焉示不敢専以尊天也此篇言天子諸侯敬天尊祖之大節而以龜卜繼之禮意所寓深矣君羔幦虎犆大夫齊車鹿幦豹犆朝車士齊車鹿幦豹犆鄭氏曰幦覆苓也犆讀皆如直道而行之直直謂緣也羔幦虎犆此君齊車之飾臣之朝車與齊車同飾孔氏曰此一節論君及大夫士等齊車朝車所飾之物尊卑不同苓即式也但車式以苓為之有豎者有橫者故考工記注云轛式之犆者衡者也此云幦覆苓詩大雅鞹鞃淺幭毛傳云幭覆式幭即幦也又周禮巾車作􅍜但古字耳三者同也知幦是覆苓者少儀云負良綏申之面拖諸幦是也鄭注臣之朝車與齊車同飾則君之朝車與齊車異飾也案皇氏曰君謂天子諸侯也詩云淺幭以虎皮為幭彼據諸侯與𤣥衮赤舄連文則亦齊車之飾此用羔幦者當是異代禮長樂陳氏曰此言車上之軾而乘者所慿以為敬也軾之制有衡以橫乎上有犆以直乎下幦若席然施諸軾上其禮有等其用有辨則虎以其威猛而有義也羔以其不黨跪乳而有禮也鹿以其善接其類而有仁也豹之於虎其為威小矣齊于朝其為禮異矣故諸侯覲王虎淺幦齊則羔幦虎飾而已士之齊車鹿幦豹飾則朝車之幦與飾不以鹿豹而大夫齊車朝車皆鹿幦豹飾者屈於君故也王於始宅宗之時以守先王之所傳者為貴故􅍜用犬喪則與人辨稍吉則與人接其接之淺矣故􅍜用鹿淺見周禮嚴陵方氏曰言朝車於大夫士之間則知兼大夫言之也承君之下不言朝車則知君之羔幦虎犆以齊而不以朝也宣王賜韓侯鞹鞃淺幭者謂虎皮淺毛亦虎犆矣蓋天子之所賜不必諸侯之以朝故也周官巾車金路封同姓象路封異姓則此所言羔幦虎犆者豈非金路象路乎齊右謂金路為齊車蓋取其有齊莊之心其言掌祭祀㑹同賔客前齊車而祭祀在其中則王固以金路齊也言王如此則同姓從可知言同姓以金路則異姓以象路可知由此推之大夫之車則墨車是也士之車則棧車是也然臣以齊車而朝則敬君如神也馬氏曰周禮以金路祭祀㑹同賔客謂之齊車而其幦無所經見荀子曰絲末彌龍所以養威此天子之幦也然羔幦虎犆殆諸侯之禮與羔之為物羣而不黨德也乳而能跪禮也鹿之為物飲食相呼仁也患難相捍義也虎豹之為物動則有威武也體則有文明也人君以德禮為貴故齊車用羔人臣以仁義為貴故朝車用鹿至於文武者君臣所兼用而大小降殺不同故君則用虎臣則用豹蓋車有式則有幦而式固有衡者有犆者於羔鹿言幦則知虎豹之犆亦幦於虎豹言犆則知羔鹿之幦為衡也然衡必用羔鹿犆必用虎豹者夫德禮仁義者人之所慿而文武者所以立德禮仁義而已齊車如此則心其有茍慮手足其有茍動乎山隂陸氏曰豹犆一也而大夫士異言之則其大小粗縟有不同焉君不言車凡車如之也大夫士言齊車嫌齊而已故車間言朝禮記集說卷七十三
