body:
  text: 禮記集説卷三十三宋衛湜撰命鄉簡不帥教者以告耆老皆朝于庠元日習射上功習鄉上齒大司徒帥國之俊士與執事焉不變命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右如初禮不變移之郊如初禮不變移之遂如初禮不變屏之逺方終身不齒鄭氏曰帥循也不循教謂敖狠不孝弟司徒使鄉簡擇以告者鄉屬司徒耆老皆朝于庠將習禮以化之使之觀焉耆老致仕及鄉中老賢者朝猶會也此庠謂鄉學也鄉謂飲酒也至中年考校而又不變移之左右使轉徙其序覬其見新人有所化也亦復習禮於鄉學使之觀焉郊則鄉界之外也稍出逺之後中年又為之習禮於郊學逺郊之外曰遂遂大夫掌之又中年不變復移之使居遂又為習禮於遂之學不變屏之逺方謂九州之外齒猶録也孔氏曰此論絀惡之事司徒命此鄉學簡擇不帥教者以告司徒乃命鄉內耆老皆聚會於鄉學之庠鄭注耆老謂致仕及鄉中老賢致仕則書傳略説云大夫為父師士為少師是也老賢則年老有德行而不仕者朝有朝王之嫌故鄭云會也耆老既會於鄉學內為此不帥教之人習其射禮中者在上故云上功又於鄉學習鄉飲酒之禮令老者居上故云上齒習射當在州學習鄉當在黨學今並於鄉學者州屬於鄉雖在州序亦得謂之鄉或可鄉居此州更不立州學若州之有事則就鄉學故鄉學得為射也又鄉飲酒解以鄉為黨正飲酒謂之鄉者黨鄉之屬故云鄉也或鄉之所居之黨不别立黨學黨之正齒位就鄉學為之亦謂之飲酒故鄭注庠謂鄉學也習射習鄉欲使不帥教之人觀其上功自勵為功觀其上齒則知尊敬長老大司徒帥領國之英俊之士與在鄉射飲酒執行事焉使俊士與之以為榮惡者慕之而自勵此言國之俊士則非唯鄉內之人也此謂初入學一年之終簡不帥教敖狠之人為之習射習鄉鄭注云中年考校而又不變中猶間也謂間一年而考校之時不變者右鄉者移左左鄉者移右亦復習鄉射之禮故經云如初不變移之郊者謂五年之時更簡不帥教者故注云中年又為之習禮間四年之下一年也此郊謂近郊也以逺郊之內六鄉居之其習禮亦鄉大夫臨之不變移之遂者謂七年之時故注云又中年移之遂間六年之下一年也案司馬法云百里郊二百里野遂人云掌邦之野故知逺郊之外為遂不應鄉大夫臨之故亦遂大夫掌之遂大夫亦帥國之俊選於遂學而行禮又不變屏之逺方者謂九年之時鄭注不云間年者案學記一年至九年知類通逹以九年限極不云間年也九州之外於周則夷鎮蕃也今但居夷狄之內地故下注云不屏於南北為其大逺明鄉人則屏於南北也齒猶録者文王世子云古者謂年齡齒亦齡也以年相次是録其長幼故云猶録也長樂陳氏曰道德一風俗同則鄉之所好者無非善其所惡者無非不善然後可以因其聰明使之簡不帥升秀士也古者凡以敬而見者皆謂之朝則春秋之朝廟祭義之朝牲此朝於庠是也習射上功則示之以行能習鄉上齒則道之以孝悌國之俊士以與執事則激之以賢才俟之如此而猶不變然後右鄉移之左左鄉移之右以愧厲之不變然後移之郊移之遂以至屏之逺方終身不齒先王之於不帥教者至四變然後棄之豈其所得已哉又禮書曰鄉簡不帥教者至於四不變然後屏之小樂正簡國子之不帥教止於二不變則屏之者先王以匹庶之家為易治膏粱之性為難化以其易治故鄉遂之所考常在三年大比之時以其難化故國子之出學常在九年大成之後三年而考故必在於四不變然後屏之九年而簡則雖二不變屏之可也古之學政其輕者有觥撻其重者不過屏斥而已若夫萬民之不服教其附於刑者歸于士延平周氏曰司空所以富之也司徒所以教之也既教矣故命六鄉簡其不帥者以告於上於庠言朝尊道也於廟言朝尊祖也先王無意於成人之惡常慮其欲改之無地故雖鄉有告其不率者必行射飲之禮以為之勸導有不變然後移之左移之右移之郊移之遂真不能變然後屏之逺方待不肖其恕若此又曰夫鄉即郊也而鄉之外即遂也言鄉言遂而間之以郊何也夫在於境上而為鄉遂之郊是以謂之郊也何以言之出車之詩先言于彼牧矣次言于彼郊矣者自其出而言之也尚書先於癸亥之陳言商郊次於甲子之誓言商郊牧野者自其入而言之也此所以知郊在鄉遂之間也嚴陵方氏曰如上所云則教之之道亦已至矣而猶有不帥者焉則不可不聞於上也鄉則六鄉之老也周官言二鄉則公一人者是矣故繼言耆老皆朝于庠庠鄉學也鄉飲酒言拜迎賔於庠門之外是矣然學記又言黨有庠者蓋别而言之雖有黨庠術序之異名自其養人於此言之則皆可謂之庠也士有曰秀士曰選士曰造士曰進士而此則止帥俊士者以升之學曰俊士方其朝于庠故據在學者帥之也此言大司徒則知上所言司徒者兼小司徒也蓋欲俊士執事以激羣衆非大司徒躬率之有所不可故本篇有司空大司空有司馬大司馬有司寇大司寇有樂正大樂正者其義亦若是而已不變者以既别之以行能道之以孝悌激之以賢才而猶不帥教也不變則移其居者亦使變其行也左鄉右鄉特彼此之别而已至移之郊又有內外之别焉遂又有逺近之别焉先王之待人至於此然猶不變則是長惡而不悛知過而不改者於是屏之逺方終身不齒焉所謂逺方則九州之外地之尤逺者又非特若逺之有别於近而已或曰移或曰屏何也移則遷之使知改屏則棄之而不復齒見祭義三命不齒解石林葉氏曰古者輕進人以善重絶人以惡一鄉以為不帥教則無往而不為惡也然而耆老朝于庠習鄉射以教之以欲其改悔以從善猶不知帥而後移之左右移之鄉遂終至於不帥教則屏之逺方所以重絶其為惡也雖然射以觀德不曰德而曰功鄉飲酒以行禮不曰禮而曰齒何也蓋中多者以為勝以勝不勝則是有功者為上飲酒以正齒位長者坐而幼者立以聽役則是有齒者為上上其有功則人知心平體正之為德上其有齒則人知長幼卑尊之為禮此賢者所以勸於為善而不肖懲於為惡命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士鄭氏曰秀士鄉大夫所考有德行道藝者升之司徒移名於司徒也升之學曰俊士謂可使習禮者學大學也不征不給其繇役造成也能習禮則為成士孔氏曰此論崇德之事大司徒之官命鄉大夫論量考校此鄉學之人有孝友多才藝秀異之士升於司徒先名唯在鄉今移名於司徒其身猶在鄉學未即貢舉入官也司徒論選士之秀者而升之學則身升於大學非唯升名而已案內則云二十而冠始學禮此升於大學曰俊士年已二十故鄭注謂可使習禮者又案尚書周傳云王子公卿大夫元士之適子十五入小學二十入大學又書傳略説云餘子十三入小學十八入大學其鄉人當與餘子同故鄭知二十習禮之時在大學也征謂力役謂供學及司徒細碎之繇役選士雖升名司徒猶給鄉之繇役俊士雖身升在學猶給司徒繇役若其學業既成已能習禮皆免其繇役者是為造成之士也長樂陳氏曰夫秀於一鄉謂之秀士中於所選謂之選士其德俊謂之俊士其德成謂之造士進士則以其將進而用之也選士升於司徒而不征於鄉俊士升於學而不征於司徒蓋司徒大軍旅大田役治其衆庶之政令鄉師辨其可任者國中賢者能者皆舍則征於司徒者惟大軍旅大田役而已升於司徒者鄉師之所舍也升於學者又司徒之所舍也周官考校之法書於族師然後校於黨正校於黨正然後考於州長考於州長然後考於鄉大夫鄉大夫與鄉老羣吏獻之於王然後內史詔王以制爵而不言鄉升士於司徒司徒升士於大學蓋司徒言以鄉三物教萬民而賔興之則其教而賔興之以鄉三物而已是大學亦司徒之所教也司徒言以德制爵則民慎德以庸制祿則民興功是爵祿亦司徒之所制也由是觀之鄉升之司徒司徒升之大學蓋亦周制然矣延平周氏曰天之所以為聰明者以民而君之所以為聰明者亦以民故簡不肖者必命於鄉而論其賢者亦命於鄉也秀士者謂其秀出於一鄉者也選士者謂其足以中有司之選者也俊士者謂其有知於聖人也造士者謂其有所作成也鄉論其秀士而升於司徒則不征於鄉而已於司徒則有征也司徒論選士而升於學則雖司徒亦不征也所謂不征者特有激於不肖而已蓋古之有道之士安於義命之理以為有命則雖匹夫召之役亦且往也以為有義則雖天子亦莫得而臣之是征之與否固無加損也哉然毁譽無常而好惡不一者天下之情同也今以簡不肖論賢者皆命之於鄉可乎先王躬正信以倡天下則毁譽當一道德以善風俗則好惡同毁譽當好惡同然後命之於鄉不亦可乎嚴陵方氏曰秀言秀而有所出造言造而有所成選言美而可擇俊言敏而可用升之司徒曰選士以其猶在所擇故也升之學者曰俊士以其皆在所用故也秀而為選士則出於一鄉之士秀而為俊士則出於六鄉之士有選士之造者有俊士之造者選士之造不征於鄉俊士之造不征於司徒此其别也征謂行役以從不征所以優賢李氏曰司徒興能則以三物物者蒸民之所自有者也論而升之則以其秀秀者士之所自存者也選言其選於衆也先王之時養之雖不異而其才有大小故雖文王之時小大皆成才而其詩則始曰翹翹錯薪言刈其楚又曰言刈其蔞蓋大者如薪小者如楚又小者如蔞雖皆可刈而其可選之才莫不有先後故曰選士俊士如楊子言知哲聖人也洪範曰俊民用彰君奭曰明我俊民詩曰蒸我髦士是也民言其在下士言其將以官之也進士言其無斁也德之未成則貴乎有造德之既成則貴乎進而無斁也廬陵胡氏曰升之學為其有德行道藝不但可使學禮而已山隂陸氏曰造士造而成之正在是矣樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉凡入學以齒鄭氏曰樂正樂官之長掌國子之教虞書曰夔命汝典樂教胄子崇髙也髙尚其術以作教也幼者教之於小學長者教之於大學尚書傳曰年十五始入小學十八入大學順此詩書禮樂四術教以成是士故云以造士春夏陽也詩樂者聲聲亦陽也秋冬陰也書禮者事事亦陰也互言之者皆以其術相成也王子王之庶子羣后公及諸侯以至俊選皆以四術成之入學皆以長幼受學不用尊卑也孔氏曰此明習業之事樂正之官當光揚尊崇此四術以為教謂敷暢義理贊明旨趨使學者知之順者依順此古昔先王之道以詩書禮樂教之造成此士術者是道路之名詩書禮樂是先王之道路也春秋教以禮樂則秋教禮春教樂冬夏教以詩書則冬教書夏教詩鄭注詩得為聲者詩是樂章詩之文義以樂聲播之故為聲若以聲對舞則聲為安靜舞為鼓動舞為陽聲為隂故大胥云春釋菜合舞秋頒學合聲是也就舞之中奮動甚者屬陽奮動靜者屬隂故文王世子云春夏學干戈秋冬學羽籥是也書者言事之經禮者行事之法事為安靜故云陰文王世子云秋學禮冬讀書與此同也鄭注互言之者謂不互言當云春夏教樂詩秋冬教禮書則是春夏但教樂詩不教禮書秋冬但教禮書不教樂詩今交互言之言其四術不可暫闕春教樂兼有禮秋教禮兼有樂夏教詩兼有書冬教書兼有詩故云皆以其術相成但遂其隂陽以為偏主耳文王世子云將君我而與我齒讓何也長幼受學雖王大子亦然也長樂陳氏曰詩書禮樂以之為術則謂之四術以之教人則謂之四教崇之則其道尊立之則其教行春教以樂秋教以禮則文王世子春誦秋學禮是也夏教以詩冬教以書則文王世子夏絃冬讀書是也陽動而主聲隂靜而主事春夏陽也詩樂則聲也秋冬陰也書禮則事也一隂一陽之謂道造士之法在順之而已周官大胥春合舞秋合聲與此不同者春貌之時而舞則貌也秋言之時而聲則言也先王於隂陽之理或取以動靜或取以五事各有所當也造士必以樂正者樂之入人也深先王之成人未嘗不終始於此舜命夔典樂教胄子周立大司樂掌成均之法皆此意歟又曰防陽德者必以隂則春教禮夏教書以夫春夏陽而書禮皆隂事也防隂德者必以陽則秋教樂冬教詩以夫秋冬陰而詩樂皆陽事也宗伯曰以天産作隂德以中禮防之以地産作陽德以和樂防之意與此同然春誦於東序主乎詩夏弦於成均主乎樂秋之瞽宗者禮也冬之上庠者書也則鄭氏謂因時順氣於功易成理或然也蓋防之者成人之事順之者小子之事孰謂未升大學則弦誦乎又樂書曰樂工之所取正者小樂正也小樂正之所取正者大樂正也昔舜命夔為樂正則樂正之職二帝之世已然三王特因而循之而已蓋詩者中聲之所止也説志者莫辨焉書者政事之紀也説事者莫辨焉禮之敬文也説體者莫辨焉樂之中和也説樂者莫辨焉崇之為四術使士有所尊立之為四教使士有所從順先王詩書禮樂以造士崇四術以造之也春秋教以禮樂冬夏教以詩書立四教以教之也樂正之職有在於是豈非人君有樂育人材之意而樂正有以輔成之歟周官大司樂掌成均之法以教國子蓋本諸此詩書禮樂謂之四術亦謂之四教猶君臣父子夫婦長幼朋友謂之五典亦謂之五教也然不言易與春秋者為其非造士之具不可驟而語之故也孔子之於易必待五十而後學遊夏之於春秋雖一辭莫贊其意蓋可見矣荀卿欲隆禮樂殺詩書是不知崇四術之意也嚴陵方氏曰詩書禮樂所載者道也體之在己則術於此而已故曰四術用之以化人則效於此而已故曰四教禮者體也故於秋教之蓋秋主揫斂所以成體故也樂者樂也故於春教之蓋春主發散所以為樂故也詩者言也故於夏教之蓋言為事之文夏與物交而成文故也書者事也故於冬教之蓋事為言之實冬與物辨而反實故也則順之之道又有見於此凡言春秋必以春為前者先後之序也然誦亦詩也弦亦樂也而文王世子乃言春誦夏弦何也蓋弦誦者詩樂之用詩樂者弦誦之體方言其體故以樂為先方言其用故以誦為先其實四者以其陽類故教之詔之皆於春夏而已春之教樂未始無詩要之以樂為主耳夏之教詩非無樂也要之以詩為主耳弦之與誦其義亦猶是也故文王世子弦誦則一詔之以大師書禮則或詔之以典書者或詔之以執禮者也於春夏通而教之秋冬别而教之者順陽交陰辨之義故也此則一教之以樂正者以夏殷之制略未若周之制詳故也大子適子也大則以大言之也適子大而庶子小故謂之大子諸侯有君道故謂之后然非一人也故以羣加之天子之子亦謂之大子則以特大於天下之子諸侯之世子亦謂之大子則以特大於一國之子而已名之以大雖同所以名之以大則異也至於卿大夫之與元士則全乎臣矣其子不足以大言之故曰適子而已自王大子以至於國之俊選皆造焉者皆從其詩書禮樂之教故也天子之子則適庶皆與諸侯而下則庶子不與者隆殺之别也選士方升於司徒亦得與在學之教者教無內外之别故也則與帥之而執事以激羣衆之時異矣故彼特曰俊士而已學所以明人倫人倫之大莫先乎孝弟故入學者必以齒曰凡則無貴賤皆以齒矣然以大子而與俊選相為齒所謂行一物而三善皆得是也山隂陸氏曰四術詩書禮樂四教春秋教以禮樂冬夏教以詩書順先王詩書禮樂以造士樂正之事也凡造士興於詩書次之禮次之樂又次之是之謂順莊子曰倒道而言忤道而説者人之所治也安能治人春秋教以禮樂冬夏教以詩書言教不言學非成德也有教而已據凡學世子及學士必時凡學必時矣故曰春秋教以禮樂冬夏教以詩書延平周氏曰四術仁義禮智也四教詩書禮樂也崇四術所以尊德性立四教所以道問學尊德性天也道問學人也天與人先王之教未嘗偏廢也舜命夔典樂而教胄子周立大司樂而掌成均之法此言樂正崇四術立四教者蓋以樂為學教之始終而能入人之深也天子言其適王子言其庶四時之教其大子與俊選者同則道德所一也廬陵胡氏曰鄭蓋以文王世子云春誦夏弦故必謂詩樂屬陽又以文王世子云秋學禮冬讀書故必謂書禮屬隂此説近鑿夫四教不可一日而闕郤縠説禮樂而敦詩書豈分四時孔子言學詩學禮何必夏教詩秋教禮孟子曰誦其詩讀其書何必詩於夏書於冬哉若云秋必禮春必樂則大胥云秋頒樂合聲文王世子云秋冬學羽籥秋亦可教樂矣不必春也若云冬必書夏必詩則文王世子云凡學春官釋奠于其先師鄭云官謂詩書禮樂之官則春亦可教詩書禮矣不必夏秋冬也鄭注云互言之其義未明故詳别其旨講義曰四術四教皆不過詩書禮樂而已以此而為術業故謂之術以此而成教養故謂之教亦異名同實而已金華邵氏曰入學當有漸磨之益而勢之尊隔則難行王大子王子羣后之大子卿大夫元士之適子皆勢之尊者使其以驕貴自恃而居乎貧賤而齒尊者之上則有善何以相勸有過何以相糾惟略勢位而一皆以齒則漸磨之術可施如此而不入於善而不帥教也故於將出學之時簡之至屈萬乘之尊動三公九卿大夫元士之衆甚而天子食不用樂古之人君其不忍輕棄人才如此盱江李氏曰樂正以詩書禮樂造士王大子王子羣后之大子卿大夫元士之適子皆造焉説者必曰為化民也為選賢也而不曰愛諸臣之子保諸臣之家也人不教不善不善則罪罪則災其親墜其祀是身及家以不教壞也故明主推恩羣臣必先教學與其寵於今孰若無辱於後不務教而務官之以市井言未學而仕其幸大矣知者慮之則為禍亦大彼不善之質而假之位鮮不及矣將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉屏之逺方西方曰棘東方曰寄終身不齒鄭氏曰出學謂九年大成學止也所簡者謂王大子王子羣后之大子卿大夫元士之適子大胥小胥皆樂官屬也大樂正告於王王命皆入學亦謂使習禮以化之不變王又親為之臨視重棄賢者子孫也此習禮皆于大學不舉去食樂重棄人也棘當為僰僰之言逼使之逼寄於夷戎不屏於南北為其大逺孔氏曰此論王子等屏退之事案周禮大胥中士四人小胥下士八人皆屬大司樂故注云樂官屬也殷人習禮在於大學即明堂位云瞽宗殷樂文王世子云禮在瞽宗殷之大學也若周則大學曰東膠瞽宗不得為周之大學也故鄭注儀禮鄉射云周立四代之學於國而又以有虞氏之庠為鄉學則周之尋常習禮於殷學之中至九年為王子不變其習禮當於東膠大學然則餘子十八入大學嫡子二十入大學者皆是殷法也若周法立當代大學在公宫左大學即東膠也又立小學於西郊小學即有虞氏之庠其習書於虞氏之學習禮樂於殷之學習舞於夏后氏之學故文王世子云春夏學干戈秋冬學羽籥皆於東序春誦夏弦大師詔之瞽宗又云禮在瞽宗然詩與禮樂雖各在其學習之至二十入大學之時仍於大學之中兼習四術故此注云習禮皆於大學是周之大學亦習禮也禮既在瞽宗又在大學則其餘亦可知也鄭注南北為其大逺者案漢書地理志南北萬三千里東西九千里又帝王世紀南北萬三千三百六十八里東西九千三百二里漢地既然則周亦應爾皆南北長東西短故云大逺也長樂劉氏曰聖人之有天下也以學教為朝廷之大政使大子齒於俊選使樂正磨其性情必順先王詩書禮樂以性其情然後已也不變者九年則雖王子亦屏逺方其公於教化而不私其子則凡在學者孰敢不性其情以蹈於中和之域哉此三代之王所以後世無及也延平周氏曰王命三公至於元士皆入學以勸導誘掖之如是而又不變則親視學而又不變是真不能變者也故屏之棘急也示其雖屏之欲棘於悔過寄者示其雖屏之特寓於此耳屏而必謂之棘與寄者恩也卒不免於不齒者義也長樂陳氏曰周官大胥掌學士之版以待致諸子春入學釋菜合舞秋頒學合聲小胥掌學士之徴令而比之觥其不敬者巡舞列而撻其慢怠者大胥待致以教之小胥觥撻以贊之則簡不帥教者小胥大胥預有力焉樂師掌國學之政以教國子凡樂官掌其政令聽其治訟則簡不帥教者小學正亦預有力焉大司樂掌成均之法以治建國之學政凡王之事皆在所令焉則簡不帥教以告于大樂正者小胥大胥小學正也以之告于王者大樂正也鄉簡不帥教者耆老皆朝于庠大學正告不帥教者王命三公九卿大夫元士皆入學而王又親視學重棄之也重棄之與周官鄉士遂士王命三公會其期同意王三日不舉與文王世子不舉為之變同意棘則欲其悔過之速寄則示其有可復之理可悔而不知悔可復而不能復然後終身不齒矣屏之止於東西而不及南北者南於中國為尤逺北於四方為尤寒自非惡之欲其死則不投之於此詩曰豺虎不食投畀有北則國子之屏宜不至此矣蓋教之仁也簡不帥義也王親視學與三日不舉仁也終身不齒義也先王之於國子仁之而已其處之以義不得已也嚴陵方氏曰視學之禮則文王世子所言者是也不變王三日不舉者以視學之禮化之而又不變則終不變矣故三日不舉將以棄之也舉與食日舉以樂之舉同義將棄之而不舉則自貶損以責其教之不至故也棘寄皆以待貴者之禮有别於賤者故然耳山陰陸氏曰寄言今雖寄後將復焉棘言今雖棘後將宥焉雖曰終身不齒其幸望猶如此聖人之仁也李氏曰王親視學此有以見勞於索之也勞於索之則休於使矣講義曰三日不舉閔其教養之久而猶不變所以深惜其齒於學而無所成也古者大喪則不舉大札則不舉邦有大災則不舉又司寇行戮則君為之不舉王閔士之無成而至於三日不舉樂則所以教養以待天下之士為何如大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之鄭氏曰升諸司馬移名於司馬司馬夏官卿掌邦政者進士可進受爵祿也司馬辨其論官其材觀其所長也定其論各署其所長也官之使之試守也爵之命之也孔氏曰大樂正之官論造士之最秀異者以告於王而升名於司馬論之曰進士此文承王子公卿大夫之子下似專據王子等其實鄉人入學為造士者亦同於此其鄉人不在學者及邦國所貢之士貢於王亦升諸司馬蓋司馬之職以德詔爵以功詔祿即知凡入仕者皆司馬主之下文更不見鄉人及邦國所貢之士故知此中兼之也但鄉人既卑節級升之故為選士俊士至於造士若王子與公卿之子本位既尊不須積漸學業既成即為造士於是大樂正總論此造士以告於王升諸司馬也司馬得此所論之狀乃更論辨之觀其材能髙下知其堪任何官是準擬其官以其材故云官材也司馬辨論之後不堪者屏退論量進士賢者以告於王其告王之時正定其論各署其所長若長於禮者署擬於禮官長於樂者署擬於樂官既論擬定然後試之以所能之官堪任以此官然後爵命之既受爵命使有職位然後與之以祿也長樂陳氏曰周官司徒大軍旅大田役治其徒庶之政令是政事亦在所預非特掌教事而已司馬進賢興功其屬有司士稽士之功德有諸子掌國之教治是教事亦在所預非特掌政事而已蓋古者之設官也職未嘗不分而分職則責專事未嘗不聨而聨事則合職故論材主於鄉及官之則論以司馬然後無幸進教士主於司馬及其發則教以司徒然後無廢事又樂書曰論造士之秀者以告於王而升諸司馬曰進士所以勸之也簡不帥教者以告于王屏之逺方終身不齒所以沮之也王者勸沮天下之術大樂正實預焉其職豈不重哉後世有樂正氏司馬氏豈因其世官名之邪嚴陵方氏曰鄉論秀士而升之司徒司徒論選士而升之學所以屬於大樂正也故大樂正又論造士之秀以告於王而升諸司馬造士之秀則於成材之中又秀出者也升諸司馬則以將使之臨政故𨽻於政官之長也以其成材將使之臨政則可以進於王所故以進士名之司馬辨論官材者將使之臨政則必隨其大小而官之故曰官材定其論則賢否之理各止於一矣前曰造士之秀後曰進士之賢何也秀特有材之稱賢則有德之稱此輕重之别若司徒司馬之類所謂官若公卿大夫所謂爵若或食九人或食八人所謂祿官所以居之爵所以貴之祿所以富之也官非賤者之可居故既官之必爵之爵之矣宜有以養其亷故既爵之必祿之其序如此金華邵氏曰論造士之秀必告於王而始升諸司馬蓋用人之權當歸之君故也延平周氏曰先王之取士其擇之非一人而進之非一日故在位者莫非成德之士廬陵胡氏曰論賢者告於王則不賢者固不告矣後世䇿士於王庭不論人材賢否皆授以官非古論賢之義也定其論謂公論皆定於一無異議物論既定乃試以官古者為官擇人必合公論盱江李氏曰司士掌羣臣之版以德詔爵以功詔祿以能詔事以久奠食德謂賢否凡賢者能者皆先試以事久而有功然後授之以爵得祿食也爵以貴乎人天下之人共貴之祿以富乎人天下之人共富之髙冠大蓋吏民趨走事之恐不及天下共貴之也廪財給榖農桑賦貢奉之而不暇天下共富之也天下共貴之而貴非其人天下共富之而富非其人則君命果義乎衆心果服乎且人各有能有不能孟公綽不可以為滕薛大夫禆諶謀於國則否况其下者乎苟非試其事考其功而遽與之爵祿則曠天官敗公事可勝道哉王制所謂官之者使試守也堯舜豈不聖而試臣以職慎之至也大夫廢其事終身不仕死以士禮葬之鄭氏曰以不任大夫也孔氏曰以經云大夫廢其事故鄭知不堪任大夫也致仕而退死得以大夫禮葬論語注云大夫退死葬以士禮致仕以大夫禮葬是也長樂劉氏曰加祿而升為大夫矣廢其所職之事則黜之終身不復許之仕進死則葬之以士禮必人之竭其忠也嚴陵方氏曰廢其事謂居大夫之位而不能興大夫之事也終身不仕則不特貶之於其始而又貶之於其終也死以士禮葬之則不特貶之於其生而又貶之於其死也夫終身不仕則與民同耳猶以仕禮葬之者以其曽居大夫之位故也然是法也上不及於公卿下不及於士者舉中以該之也延平周氏曰大夫廢其事而終身不仕者義也死以士禮葬之者恩也廬陵胡氏曰案春秋大夫有過被黜則不書卒以其卒時非大夫也匡衡楊僕免為庶人李德裕貶為參軍皆不書薨有發則命大司徒教士以車甲鄭氏曰乘兵車衣甲之儀有發謂有軍師發卒孔氏曰國有軍旅以發士卒是司馬之事王則命大司徒教以乘兵車及衣甲之儀容必司徒者以司徒主衆又主教故與司馬相參也延平周氏曰辨論官材責之司馬教習車甲責之司徒何也先王之用人非有成材不取唯其有成材則責之以事而無不能也又况司馬掌政典則其所辨論官材者豈特文而已司徒掌教典則其所教習者豈特武而已此文武所以混為一途也李氏曰司徒教士則使司馬論其材故出任之為比長鄉大夫伍長軍將其材無不宜司馬治軍則使司徒教其事故入以之為比閭旅黨州鄉伍兩卒旅軍帥其事無不治先王之取人治民未嘗不如此凡執技論力適四方裸股肱決射御凡執技以事上者祝史射御醫卜及百工凡執技以事上者不二事不移官出鄉不與士齒仕於家者出鄉不與士齒鄭氏曰裸股肱謂擐衣出其臂脛使之射御決勝負見勇力也不二事欲專其事亦為不德也不與士齒賤也於其鄉中則齒親親也仕於家亦賤故亦不與士齒孔氏曰執技之事凡有三條上條論課試武藝之事言此既無道藝唯論力以事上故適往四方境界之外則使之擐露臂脛角材力決射御勝負以見武勇中條論執技之人有七祝一史二射三御四醫五卜六百工七射御已言此重云者見其色目也下條論執技之人不得更為一事欲使專一其所有之事非但欲使専事亦為技藝賤薄不是道德之事故不許之橫渠張氏曰裸股肱決射御此執技以有事於外者也若祝史射御醫卜及百工此執技以事君於內者有此二等嚴陵方氏曰莊子曰能有所藝謂之技則凡執技者不足以德論之也特論其力而已適四方謂有故而之外也裸股肱則所以宣手足之力也決射御則決勝負於射御也此其所以為力歟技不止於射御而此止以是為言者以二技尤論其力故也祝若周官大祝之類史若周官大史之類祝史皆事神之官以其作辭以事神故曰祝以其執書以事神故曰史射則周官之五射若白矢參連之類御則周官之五御若鳴和鑾逐禽左之類醫則醫師之類卜則卜師之類百工則土工木工金工石工之類以其類之非一故以百言之以其足以興事故謂之工焉凡此者皆執技之名也不二事則欲其無異習不移官則欲其有常守出鄉不與士齒者以執技之賤不得與執德者序長幼也然必出鄉而後不與之齒者以鄉黨尚齒故也仕於家則僕而已禮運曰與家僕雜居齊齒非禮也長樂陳氏曰有其能者必有其名有其名者必有其分則適四方裸股肱決射御言其能也祝史射御醫卜及百工言其名也出鄉不與士齒言其分也因能以正名正名以明分先王所以處執技者如斯而已蓋士以德技以力德成而上藝成而下先王嚴其分守如此欲人逺耻遷善也然古者教人必以六藝周公以多藝為能孔子不以射御為賤何也古之人志於道據於德依於仁遊於藝可也乃若不知道德與仁唯藝是從此君子所以賤之也文王世子謂之郊人賤之此執技者不與士齒之意也禮運臣與家僕雜居齊齒非禮此仕於家者不與士齒之意也仕於家者非技也於此言之者因其類也於鄉齒之仁也出鄉不齒義也不與鄉齒之非所以相親不出鄉不齒非所以相辨此禮所以不同延平周氏曰先王不責備於人苟有一藝皆得與於有司而食於上然古之學者以禮樂為始終而未嘗不從事於射御雖孔子亦曰吾何執執御乎執射乎此則以射御為執技之賤者蓋古人之志於道據於德依於仁然後遊於藝可也果道不能志之德不能據之於仁又不能依之而止遊於藝者此上之人所以賤之也不二事移官非執技之所能也執技為百工仕於卿大夫為家臣不與士齒所以貴其為士也古之為士其貴於鄉如此此人人所以逺恥而有常心也司寇正刑明辟以聽獄訟必三刺有旨無簡不聽附從輕赦從重鄭氏曰司寇秋官卿掌刑者辟罪也三刺以求民情斷其獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民簡誠也有其意無其誠者不論以為罪附從輕附施刑也求出之使從輕赦從重雖是罪可重猶赦之也孔氏曰自此至異言一節總論司寇聽訟刑罰禁止之事此論司寇正刑明辟之法謂司寇當正定刑書明斷罪法使刑不差二法不傾邪以聽天下獄訟必三刺者言刑法宜謹不可專制必須三刺以求民情鄭引三訊見周禮司刺刺殺也謂欲殺犯罪之人其一問可殺與否於羣臣羣臣謂公卿大夫士其二問可殺與否於羣吏羣吏謂庶人在官者其三問可殺與否於庶人庶人謂萬姓衆來觀者此三刺雖以殺為本其被刑不殺者亦當問之有旨無簡不聽者旨意也求民情既得其所犯之罪雖有旨意無誠實之狀則不聽之不論以為罪也附從輕者刑之時此人所犯之罪在輕重之間可輕可重則當求可輕之刑而附之則罪疑唯輕是也赦從重者所犯之罪本非故為而入重罪故赦之時從重罪之上而赦之其意輕故也尚書眚災肆赦是也長樂陳氏曰訊而謂之刺者訊之然後刺故也春秋殺大夫曰殺於內公子則曰刺蓋衰周之時先王訊之之法特施於公子而已嚴陵方氏曰刑正而不偏則所加者無怨辟明而不隱則所制者無疑辟者法也惟辟能立法故也刑出於法而已此先刑而後辟者以刑得其正然後辟得其明故也刑辟所以待獄訟獄訟皆有言者也故曰聽聽訟而後有獄此先獄而後訟者上下之序也有旨謂其法有意無簡謂其情無實於法雖有意於情即無實若是之人則不聽其訟而施刑焉慮其殺不辜故也簡與書所謂五刑不簡之簡同所以書獄辭而已山陰陸氏曰若令聽訟無簡書可據與無可書之實狀皆不聽也李氏曰必正刑而後可以明辟不正刑而明辟則察辭於差而非從矣書曰惟明克允明者內有以察其真偽之情允者外有以審其輕重之罪審其輕重之罪所以正刑察其真偽之情所以明辟也訟不已則至於獄至獄則訟故曰獄訟延平周氏曰言司徒司馬而後及於司寇其序蓋與周官同然獨以司空先之者蓋司空掌事典而富民者也富民者治之所終始故先之不亦宜乎周官三訊皆訊之以言而謂之刺者蓋訊其罪之當刺與否故得謂之刺也附從輕赦從重先王以君子待天下其為忠厚如此石林葉氏曰司寇所掌者刑禁而以治寇為主刑有典而或失其平則言正罪有辟而或失其情則言明訟不決係於囹圄則為獄以曲直言於公則為訟訊其可殺可刑則為刺一訊羣臣欲其左右可也再訊羣吏欲其大夫可也三訊萬民欲其國人可也書曰兩造具備師聽五辭五辭簡孚正于五刑蓋人誠則其辭簡偽則其辭煩簡而誠則聽之所以嚴其威而不可犯也故亦曰有旨無簡不聽為其偽也至其罪有可疑則附而從輕所以誘其為善情有可恕則赦而從重所以勸其改過而已矣廬陵胡氏曰古者刑辟書於簡所謂簡書是也書於簡則有實迹吕刑云無簡不聽又云五辭簡孚皆實也凡制五刑必即天論郵罰麗於事鄭氏曰制斷也即就也必即天論言與天意合即或為則論或為倫郵過也麗附也過人罰人當各附於其事不可假他以喜怒孔氏曰凡制五刑非言初制五刑制是裁制故鄭云斷也論謂論議言制五刑之時必就上天之意論議輕重天意好生又有時以生有時以殺論議刑時亦當好生使生殺得中論或為倫倫理也謂就天之倫理即是生殺得中之理郵謂斷人罪過罰謂責罰其身皆依附於所犯之事不可離其本事假他别事而為喜怒也長樂陳氏曰刑者天之所以討有罪先王之所制刑嚴天威而已郵吕刑所謂五過也罰呂刑所謂五罰也制五刑而曰郵罰麗於事者先王無意於刑人而刑常貴於從輕故昜噬嗑之用獄以明罰為先禮言制刑以郵罰為主嚴陵方氏曰五刑即墨剕劓宫大辟是也制則制而用之也必即天論則取天理以為之也先王五刑不簡然後正乎五罰五罰不服然後正乎五過則罰輕於刑而過又輕於罰矣此止以郵罰為言者輕且如此其重可知矣其言以郵罰為序者亦先輕以明之也周官所謂桎梏而坐諸嘉石役諸司空此治五過之法也山陰陸氏曰即天因性循理善即人心之謂也若有司論郵罰則當麗於事而已蓋上以道揆制刑下以法守論罪石林葉氏曰五辭簡孚正于五刑其罪也人以為當誅而天亦誅之故刑即天論五刑不簡正于五罰其過也已所自取而人不與焉故罰麗於事廬陵胡氏曰郵尤也成帝紀云上天見異以顯朕郵此言尤人罰人皆當麗著本罪吕刑云惟時苖民匪察于獄之麗講義曰天討有罪五刑五用哉謂五刑五用皆本於天也吕刑曰非爾惟作天牧謂設刑禁之官者非爾也為天牧民而已制刑而必即天論則不可私以輕重就天理以論之則任理而不任情也禮記集説卷三十三
