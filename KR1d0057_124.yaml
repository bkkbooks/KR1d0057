body:
  text: 禮記集說卷一百二十四宋衛湜撰道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隠莫顯乎㣲故君子慎其獨也鄭氏曰道猶道路也出入動作由之離則惡乎從也君子雖視之無形聽之無聲猶戒慎恐懼自修正是其不須臾離道也慎獨者慎其閒居之所為雖於隠㣲若有覘聽之者是為顯見甚於衆人之中為之孔氏曰人雖目不睹之處猶且戒謹況其惡事睹見而肯犯乎雖耳所不聞猶須恐懼況人聞之處恐懼可知也謹其獨者謹其獨居雖居能謹畏守道也河南程氏曰一物不該非中也一事不為非中也一息不存非中也何哉為其偏而已矣故曰道也者不可須臾離也可離非道也修此道者戒慎乎其所不睹恐懼乎其所不聞而已由是而不息焉則上天之載無聲無臭可以馴致也伊川或問游宣徳記先生語云人能戒慎恐懼於不睹不聞之閒則無聲無臭可以馴致此說如何曰馴致漸進也然此亦大綱說固是自小以至大自修身以至於盡性至命然其閒有多少般數其所以致之之道當如何荀子曰始乎為士終乎為聖人今學者須讀書纔讀書便望為聖賢然中閒致之之方更有多少荀子雖能如此說却以禮義為偽性為不善他自性情尚理㑹不得怎生道得聖人大抵以堯所行者欲力行之以多聞多見取之其所學者皆外也先生嘗論克己復禮韓持國曰道上更有甚克莫錯否曰如公此言只是說道也克己復禮乃所以為道也更無别處克己復禮之謂道亦可傷乎公之所謂道也如公之言只是一人自指其前一物曰此道也他本無可克者若知道與己未嘗相離則若不克己復禮何以體道道在己不是與己各為一物可跳身而入者也克己復禮非道而何至如公言克不是道亦是道也實未嘗離得故曰可離非道也理甚分眀又曰道之外無物物之外無道是天地之閒無適而非道也即父子而父子在所親即君臣而君臣在所敬以至為夫婦為長幼為朋友無所為而非道此道所以不可須臾離也然則毁人倫去四大者其分於道也逺矣故君子之於天下也無適也無莫也義之與比若有適有莫則於道為有閒非天地之全也彼釋氏之學於敬以直内則有之矣於義以方外則未之有也故滯固者入於枯槁疏通者歸於肆恣此佛之敎所以為隘也吾道則不然率性而已斯理也聖人於易備之又云佛有一箇覺之理可以敬直内矣然無義以方外其直内者要之其本亦不是又曰人只以耳目所見聞者為顯見所不見聞者為隠㣲然不知理却甚顯也且如若人彈琴見螳蜋捕蟬而聞者以為有殺聲殺在心而人聞其琴而知之豈非顯乎人有不善自謂人不知之然天地之理甚著不可欺也伊川又曰於穆不已天之所以為天也純亦不已文王之所以為文也此天徳也有天徳便可語王道然其要只在慎獨明道又曰要修持他這天理則在徳須有不言而信者這難為形狀養之則須直不愧屋漏與慎獨這是箇持養底氣象也又曰孔子言仁只說出門如見大賔使民如承大祭㸔其氣象便須心廣體胖動容周旋中禮自然唯慎獨便是守之之法又曰洒掃應對便是形而上者理無大小故也故君子只在慎獨明道藍田吕氏曰此章明道之要不可不誠道之在我猶飲食居處之不可去可去皆外物也誠以為己故不欺其心人心至靈一萌于思善與不善莫不知之他人雖明有所不與也故慎其獨者知為己而已又曰道之為言猶道路也凡可行而無不達皆可謂之道也成象之謂乾效法之謂坤天立是理地以效之況於人乎故人效法於天不越順性命之理而已率性之謂道則四端之在我者人倫之在彼者皆吾性命之理受乎天地之中所以立人之道不可須臾離也絶類離倫無意乎君臣父子者過而離乎此者也賊恩害義不知有君臣父子者不及而離乎此者也雖過不及有差而皆不可以行於世故曰可離非道也非道者非天地之中而已非天地之中而自謂有道惑也又曰所謂中者性與天道也謂之有物則不得於言謂之無物則必有事焉不得於言者視之不見聽之不聞無聲形接乎耳目而可以道也必有事焉言者莫見乎隠莫顯乎㣲體物而不可遺者也古之君子立則見其參於前在輿則見其倚於衡是何所見乎洋洋如在上如在其左右是果何物乎學者見乎此則庶乎能擇中庸而執之隠㣲之閒不可求之於耳目不可道之於言語然有所謂昭昭而不可欺感之而能應者正惟虚心以求之則庶乎見之故曰莫見乎隠莫顯乎㣲然所以慎其獨者苟不見乎此則何戒慎恐懼之有哉此誠之不可揜也上蔡謝氏曰敬則外物不能易坐如尸立如齊出門如見大賔使民如承大祭非禮勿言動視聽須是如顔子事斯語坐如尸坐時習立如齊立時習是不可須臾離也建安游氏曰道外無性性外無道曽謂性而不可離乎故惟盡性然後能體道惟至誠然後能盡性苟未至於至誠則常思誠以為入道之階故戒謹其所不睹恐懼乎其所不聞所以謹其獨而思誠也人所不睹可謂隠矣而心獨見之不己見乎人所不聞可謂㣲矣而心獨聞之不亦顯乎知莫見乎隠莫顯乎㣲而不能謹獨是自欺也其離道逺矣延平楊氏曰獨非交物之時有動于中其違未逺也雖非視聽所及而其幾固已瞭然心目之閒矣其為顯見孰加焉雖欲自蔽吾誰欺欺天乎此君子必慎其獨也葢道無隠㣲之閒於獨而不謹是可須臾離也故立則見其參於前在輿則見其倚於衡又曰夫盈天地之閒孰非道乎道而可離則道有在矣譬之四方有定位焉適東則離乎西適南則離乎北斯則可離也若夫無適而非道則烏得而離耶故寒而衣飢而食日出而作晦而息耳目之視聴手足之舉履無非道也此百姓所以日用而不知伊尹耕於有莘之野以樂堯舜之道夫堯舜之道豈有物可玩而樂之乎即耕於有莘之野是已此農夫田父之所日用者而伊尹之樂有在乎是若伊尹所謂知之者也新安朱氏曰此第一章第二節道者日用事物當行之理皆性之徳而具於心無物不有無時不然所以不可須臾離也若其可離則為外物而非道矣是以君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離於須臾之頃也隠暗處也㣲細事也獨者人所不知而已所獨知之地也言幽暗之中細㣲之事跡雖未形而幾則已動人雖不知而已獨知之則是天下之事無有著見明顯而過於此者是以君子既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使其潜滋暗長於隐㣲之中以至離道之逺也或問既曰道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞矣而又曰莫見乎隠莫顯乎㣲故君子慎其獨也何也曰此因論率性之道以明由敎而入者其始當如此葢兩事也其先言道不可離而君子必戒慎恐懼乎其所不睹不聞者所以言道之無所不在無時不然學者當無須臾之不謹而周防之以全其本然之體也又言莫見乎隠莫顯乎㣲而君子必慎其獨者所以言隠㣲之閒人所不見而已獨知之則其事之纎悉無不顯著又有甚於他人之知者學者尤當隨其念之方萌而致察焉以謹其善惡之幾也葢所謂道者率性而已性無不有故道無不在大而父子君臣小而動静食息不假人力之為而莫不各有當然不易之理所謂道也是乃天下人物之所共由充塞天地貫徹古今而取諸至近則常不外乎吾之一心循之則治失之則亂葢無須臾之頃可得而暫離也若其可以暫離而於事無所損益則是人力私知之所為者而非率性之謂矣聖人之所修以為敎者因其不可離者而品節之也君子之所由以為學者因其不可離者而持守之也是以日用之間須臾之頃持守功夫一有不至則所謂不可離者雖未嘗不在我而人欲閒之則亦判然二物而不相管矣是則雖曰有人之形而其違禽獸也何逺哉是以君子戒慎乎其目之所不及見恐懼乎其耳之所不及聞瞭然心目之閒常若見其不可離者而不敢有須臾之閒以流於人欲之私而陷於禽獸之域若書之言防怨而曰不見是圖禮之言事親而曰聴於無聲視於無形葢不待其徴於色發於聲然後有以用其力也夫既已如此矣則又以謂道固無所不在而幽隠之閒乃他人之所不見而已所獨見道固無時不然而細㣲之事乃他人之所不聞而已所獨聞是皆常情所忽以為可以欺天罔人而不必謹者而不知吾心之靈皎如日月既已知之則其毫髪之閒無所潜遁又有甚於他人之知矣又況既有是心藏伏之久則其見於聲音容貌之閒發於行事施為之實必有暴著而不可揜者又不止於念慮之差而已也是以君子既戒懼乎耳目之所不及則此心常眀不為物蔽故於此尤不敢不致其謹焉必使其幾㣲之際無一毫人欲之萌而純乎義禮之發則下學之功盡善全美而無須臾之閒矣二者相須皆反躬為己遏人欲存天理之實事葢體道之功莫有先於此者亦莫有切於此者故子思於此首以為言以見君子之學必由此而入也曰諸家之說皆以戒慎不睹恐懼不聞即為慎獨之意子乃分之以為兩事無乃破碎支離之甚耶曰既言道不可離則是無適而不在矣而又言莫見乎隠莫顯乎㣲則是要切之處尤在於隠㣲也既言戒慎不睹恐懼不聞則是無處而不謹矣又言慎獨則是其所謹者尤在於獨也是固不容於不異矣若其同為一事則其為言又何必若是之重複耶且此書卒章潜雖伏矣不愧屋漏亦兩言之正與此相首尾但諸家皆不之察獨程子嘗有不愧屋漏與慎獨是持養氣象之言其於二者之閒特加與字是固已分為兩事而當時聴者有未察耳曰子又安知不睹不聞之不為獨乎曰其所不睹不聞者已之所不睹不聞也故上言道不可離而下言君子自其平常之處無所不用其戒懼而極言之以至於此也獨者人之所不睹不聞也故上言莫見乎隠莫顕乎㣲而下言君子之所謹者尤在於此幽隠之地也是其語勢自相唱和各有血脈理甚分眀如曰是兩條者皆為慎獨之意則是持守之功無所施於平常之處而専在幽隠之閒也且雖免於破碎之譏而其繁複偏滯而無所當亦甚矣又曰道不可須臾離及莫見乎隠莫顯乎㣲正是說道之本體下面戒慎恐懼必慎其獨方是人下工夫處故皆以故之一字起頭不可衮作一段㸔了又曰必致其知方肯謹獨方能謹獨又曰吕氏舊本所論道不可離者得之但専以過不及為離道則似未盡耳其論天地之中性與天道一節最其用意深處然經文所指不睹不聞隠㣲之閒者乃欲使人戒懼乎此而不使人欲之私得以萌動於其閒耳非欲使人虚空其心反觀於此以求見夫所謂中者而遂執之以為應事之準則也吕氏既失其㫖而所引用不得於言必有事焉參前倚衡之語亦非論孟本文之意至謂隠㣲之間有昭昭而不可欺感之而能應者則固心之謂矣而又曰正惟虚心以求則庶乎見之是又别以一心而求此一心見此一心也豈不誤之甚哉若楊氏無適非道之云則善矣然其言似亦有所未盡葢衣食作息視聽舉履皆物也其所以如此之義理準則乃道也若曰所謂道者不外乎物而人在天地之閒不能違物而獨立是以無適而不有義理之準則不可頃刻去之而不由則是中庸之㫖也若使指物以為道而曰人不能頃刻而離此百姓特日用而不知耳則是不唯昧於形而上下之别而墜於釋氏作用是性之失且使學者誤謂敎無不在雖欲離之而不可得吾既知之則雖猖狂妄行亦無適而不為道則其為害將有不可勝言者不但文義之失而已矣嚴陵方氏曰戒慎乎其所不睹非特人之所不睹也亦已之所不睹焉恐懼乎其所不聞非特人之所不聞也亦已之所不聞焉戒慎未若恐懼之至也不睹未若不聞之㣲也於其㣲而愈至尤見君子之慎獨也獨者不與物羣之時也莆陽林氏曰君子所以戒慎恐懼者豈有他哉謂莫顯見乎隠㣲之際故也鼓鐘于宫聲聞于外雖居無人之境以致其敬也延平周氏曰戒慎者恐懼之理恐懼者戒慎之事隠非見也然見生於隠則君子以為莫見乎隠㣲非顯也然顯生於㣲則君子以為莫顯乎㣲見然後至於顯隠然後至於㣲乃其序也古聖人之化行則賤者猶能慎獨故詩曰肅肅兔置施于中林先王之澤竭雖貴者亦不能之故詩曰相在爾室尚不愧于屋漏廣安游氏曰中之道至精至㣲易失而難守故常有離失之患而離失之患常存乎須臾之際不須臾離則用力至到極乎精㣲而無毫釐之失矣隠也㣲也所不睹也所不聞也皆言心之為物宅乎杳㝠之中而難知此君子所不敢忽獨者此心隠㣲未對物之稱永嘉薛氏曰於所不見不聞之地有毫釐之差則失性命之正失性命之正則去道逺矣隠見㣲顯本一道也未有動乎中而不形於外者戒謹恐懼所以貞夫一也人之於道也造次顛沛而不可違者也無入而不自得觀感之敎也延平黄氏曰道之無不在也雖稊稗瓦甓之閒無不在也道之不可須臾離也雖躇步􅝌蹈之閒不可離也惟其無不在故不可須臾離龍泉葉氏曰按子張問孔子曰立則見其參於前也在輿則見其倚於衡也夫然後行非以為我之所必見則參前倚衡㣲孰甚焉以為人之所不見則不睹不聞著孰甚焉其義互相發明學者若専一致力於此以慎獨為入徳之方則雖未至於道而忠信篤敬所以堅實矣新定顧氏曰道無方體猶太虚然有形之類無不倚太虚而立無不在此道之中曰不可須臾離也非戒人以不可離也明此道充塞無乎不在人不可得而離也如使人可以離則是此道有在有不在非無所謂道矣君子知道之不可以離也故從事於謹獨之學則見夫世人矯飾於聲音笑貌之末而内心之弗善者不之省彼特以為吾心隠㣲爾抑豈知其為至見而至顯者乎天下之理無隠而不見者也無㣲而不顯者也奚以知其然耶詩曰無曰不顯莫予云覯神之格思不可度思則吾有念慮鬼神知之孟子曰聴其言也觀其眸子人焉廋哉則吾有念慮君子知之又曰生於其心害於其政發於其政害於其事則吾有念慮衆人莫不知之矣故念慮誠善可也苟惟不善自作孽不可逭豈不可為戒謹而恐懼哉是以君子存其心養其性畏欲念之内起如畏冦盜之外作也夫是之謂謹獨夫子所謂用力於仁者也臨卬魏氏曰誠能於睹聞之外隠㣲之際己所獨覺而人未及知隨其萌蘗之動以謹乎善利之幾則仰觀俯察前參後倚真有以見夫仁義禮知之則行乎君臣父子長幼朋友之閒皆吾性所本有分所當為而實不容以須臾離也蔡氏曰道也者不可須臾離以下言未發時也戒謹不睹恐懼不聞者所以閑邪而存其誠也莫見乎隠以下言發時也謹獨者所以審其念慮之初發也又曰道者率性之謂學者於道不可頃刻而離若其可離則非率性之道矣故雖不睹不聞至静之頃亦當戒謹恐懼而閑邪存誠也錢塘于氏曰子思發此一章誠之一字固肇於此新定錢氏曰方其不睹也不聞也自以為隠也而不知其莫見於此焉自以為㣲也而不知其莫顯於此焉喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉鄭氏曰致行之至也位正也育生也長也孔氏曰喜怒哀樂縁事而生未發之時澹然虛静心無所慮而當於理故謂之中喜怒哀樂雖復動發皆中節限猶如鹽梅相得性行諧和故謂之和情慾未發是人性之初本故曰大本情慾雖發而能和合道理可通逹流行故曰達道致中和言人若能致極中和使隂陽不錯則天地得其正位生成得理故萬物得其養育濂溪周氏曰性者剛柔善惡中而已剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁柔善為慈為順為㢲惡為懦弱為無斷為邪佞惟中者和也中節也天下之達道也聖人之事也故聖人立敎使人自易其惡自至其中而止矣河南程氏曰吕與叔中者道之所由出此語有病吕曰論其所同不容更有二名别而言之亦不可混為一事如所謂天命之謂性率性之謂道又曰中者天下之大本和者天下之逹道則性與道大本與逹道豈有二事先生曰中即道也若謂道出於中則道在中内别為一物矣所謂論其所同不容更有二名别而言之亦不可混為一事此語固無病若謂性與道大本與逹道可混而為一却未安在天曰命在人曰性循性曰道性也命也道也各有所當大本言其體達道言其用體用自殊安得不為二乎吕曰既云率性之謂道則循性而行莫非道此非性中别有道也中即性也在天為命在人為性由中而出莫非道所以云中者道之所由出先生曰中即性也此語極未安中也者所以狀性之體段也若謂性有體段亦不可姑假此以眀彼又曰不偏之謂中道無不中故以中行道如稱天圓地方遂謂方圓即天地可乎方圓既不可謂之天地則萬物決非方圓之所自出如中既不可謂之性則道何從稱出於中葢中之為義以過不及而立名若只以中為性則中與性不合子居子居和叔之子對以中者性之徳却為近之吕曰不倚之謂中不雜之謂和先生曰不倚之謂中甚善語猶未瑩不雜之謂和未當吕曰喜怒哀樂之未發則赤子之心當其未發此心至虚無所偏倚故謂之中以此心應萬物之變無往而非中矣孟子曰權然後知輕重度然後知長短物皆然心為甚此心度物所以甚於權衡之審者正以至虚無所偏倚故也有一物存乎其閒則輕重長短皆失中矣又安得如權如度乎大人不失其赤子之心乃所謂允執厥中也大臨始者有見於此便指此心名為中故前言中者道之所由出也今細思乃命名未當耳此心之狀可以言中未可便指此心名之曰中先生曰喜怒哀樂未發謂之中赤子之心發而未逺乎中若便謂之中是不識大本也吕曰聖人知周萬物赤子全未有知其心固有不同矣然推孟子所云豈其止取純一無偽可與聖人同乎非謂無毫髪之異也大臨前日所云亦取諸此而已此義大臨昔者既聞先生君子之敎反求諸己若有所自得參之前言往行將無所不合由是而之焉似得其所安以是自信不疑今承敎乃云已失大本茫然不知所向聖人之學以中為大本雖堯舜相授以天下亦云允執其中中者無過不及之謂也何所準則而知過不及乎求之此心而已此心之動出入無時何從而守之乎求之於喜怒哀樂未發之際而已當是時也此心即赤子之心純一無偽即天地之心神明不測即孔子之絶四四者有一物之存乎其閒則不得其中即孟子所謂物皆然心為甚心無偏倚則至明至平其察物甚於權度之審此心所發純是義理與天下之所同然安得不和大臨前日敢指赤子之心為中者其說如此來敎云赤子之心可謂之和不可謂之中大臨思之所謂和者指已發而言之今言赤子之心乃論其未發之際純一無偽無所偏倚可以言中若謂已發恐不可言心先生曰所云非謂無毫髪之異是有異也有異者得為大本乎推此一言餘皆可見吕曰大臨以赤子之心為未發先生以赤子之心為已發所謂大本之實則先生與大臨之言未有異也但解赤子之心一句不同耳大臨初謂赤子之心止取純一無偽與聖人同恐孟子之義亦然更不取折一一較其同異故指以為言固未嘗以已發不同處為大本也先生謂凡言心者皆指已發而言然則未發之前謂之無心可乎竊謂未發之前心體昭昭具在已發乃心之用也先生曰所論意雖已發者為未發反求諸言却是認已發者為說詞之未瑩乃是擇之未精耳凡言心者指已發而言此固未當心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也唯觀其所見何如耳大抵論愈精㣲言愈易差也伊川又曰敬而無失便是喜怒哀樂之未發謂之中也敬不可謂之中但敬而無失即所以中也蘇季明問中之道與喜怒哀樂未發之中同否曰非也喜怒哀樂未發是言在中之義只一箇中字但用不同或曰於喜怒哀樂之前求中可否曰不可既思於喜怒哀樂未發之前求之又却是思也既思即是已發思與喜怒哀樂一般纔發便謂之和不可謂之中也又問吕博士言當求於喜怒哀樂未發之前信斯言也恐無著摸如之何而可也言存養於喜怒哀樂未發之時則可若言求中於喜怒哀樂未發之前則不可又問學者於喜怒哀樂發時故當勉強裁抑於未發之前當如何用功曰於喜怒哀樂未發之前更怎生求但平日涵養便是涵養久則喜怒哀樂發自中節或曰有未發之中有既發之中曰非也既發時便是和矣發而中節故是得中時中之類只是將中和來分說便是和也伊川又問先生說喜怒哀樂未發謂之中是在中之義不識何意曰只喜怒哀樂未發便是中也曰中莫無形體只是箇言道之題目否曰非也中有甚形體曰既謂之中也須有箇形象曰當中之時耳無聞目無見否然見聞之理在始得曰中是有時而中否曰何時而不中以事言之則有時而中以道言之則何時而不中曰故是所謂皆中然而觀於四者未發之時自有一般意象及至接事時又自别何也曰善觀者不如此却於喜怒哀樂已發之際觀之賢且說静時如何曰謂之無物則不可然自有知覺處曰既有知覺却是動也怎生言静人說復其見天地之心皆以為至静能見天地之心非也復之卦下面一畫便是動也安得謂之静自古儒者皆言静見天地之心惟頤言動見天地之心或曰莫是於動上求静否曰固是然最難釋氏多言定一聖人便言止且如物之好須道是好物之惡須道是惡物自好惡關我這裏甚事若說道我只是定便無所為然物之好惡亦自在裡故聖人只言止所謂止如人君止於仁人臣止於敬之類是也易之艮言止之義曰艮其止止其所也言隨其所止而止之人多不能止葢人萬物皆備遇事時各因其心之所重者更互而出纔見得這是重便有這事出若能物各付物便自不出來也或曰先生於喜怒哀樂未發之前下動字下静字曰謂之静則可然静中須有物始得這裡便是難處學者莫若且先理㑹得敬能敬則知此矣或曰敬何以用功曰莫若主一季明曰某嘗患思慮不定或思一事未了他事如麻又生如何曰不可此不誠之本也須是習習能専一時便好不拘思慮與應事皆要求一或曰當静坐時物之過乎前者還見不見曰㸔事如何若是大事如祭祀前旒蔽明黈纊充耳凡物之過者不見不聞也若無事時目湏見耳須聞或曰當敬時雖見聞莫過焉而不留否曰不説道非禮勿視聴言動勿者禁止之辭纔說勿字便不得也或問雜說中以赤子之心為已發是否曰已發而去道未逺也曰大人不失赤子之心如何曰取其純一近道也曰赤子之心與聖人之心如何曰聖人之心如鏡如止水伊川又曰性即理也所謂理性是也天下之理原其所自未有不善喜怒哀樂未發何嘗不善發而中節即無徃而不善發而不中節然後為不善故凡言善惡皆先善而後惡言吉㐫皆先吉而後凶言是非皆先是而後非伊川又曰喜怒哀樂未發謂之中只是言一箇中一作本體既是喜怒哀樂未發那裏有箇甚麽只可謂之中如乾體便徤及分在諸處不可皆名徤然在其中矣天下事事物物皆有中發而皆中節謂之和非是謂之和便不中也言和則中在其中矣中便是含喜怒哀樂在其中矣伊川又曰聖人未嘗無喜也象喜亦喜聖人未嘗無怒也一怒而安天下之民聖人未嘗無哀也哀此惸獨聖人未嘗無懼也臨事而懼聖人未嘗無愛也仁民而愛物聖人未嘗無欲也我欲仁斯仁至矣但其中節則謂之和又曰中者天下之大本天地之間停停當當直上直下之正理出則不是唯敬而無失最盡明道又曰喜怒哀樂未發謂之中中也者言寂然不動者也故曰天下之大本發而皆中節謂之和和也者言感而遂通者也故曰天下之達道伊川又曰致與位字非聖人不能言子思特傳之耳明道又曰聖人脩己以敬以安百姓篤恭而天下平唯上下一於恭敬則天地自位萬物自育氣無不和四靈何有不至此體信達順之道聦明睿知皆由是出以此事天饗帝建安游氏曰極中和之理則天地之覆載四時之化育在我而已故曰天地位焉萬物育焉然則三公所以燮理隂陽者豈有資於外哉亦盡吾喜怒哀樂之性而已延平楊氏曰自天命之謂性至萬物育焉中庸一篇之體要也又曰怒者喜之反哀者樂之反既發則倚於一偏而非中也故未發謂之中中者不偏之謂也由中而出無人欲之私焉發必中節矣一不中節則與物戾非和也故發而皆中節謂之和中也者寂然不動之時也無物不該焉故謂之大本和也者所以感通天地之故故謂之逹道中以形道之體和以顯道之用致中則範圍而不過致和則曲成而不遺故天地位焉萬物育焉又曰喜怒哀樂未發謂之中發而皆中節謂之和學者當於喜怒哀樂未發之際以心驗之則中之義自見執而勿失無人欲之私焉發必中節矣發而中節中固未嘗忘也孔子之慟孟子之喜因其可慟可喜也於孔孟何有哉其慟也其喜也中固自若也鑑之茹物因物而異形而鑑之明未嘗異也莊生所謂出怒不怒則怒出於不怒出為無為則為出於不為亦此意也若聖人而無喜怒哀樂則天下之逹道廢矣一人橫行於天下武王亦不必恥也故於是四者當論其中節不中節不當論其有無也或問正心誠意如何便可以平天下曰後世自是無人正心若正得心其效自然如此此一念之間毫髪有差便是不正要得常正除非聖人始得且如吾輩還敢便道自已心得其正否此須於喜怒哀樂未發之際能體所謂中於喜怒哀樂己發之後能得所謂和致中和則天地可位萬物可育其於平天下何有河東侯氏曰喜怒哀樂之未發謂之中寂然不動也發而皆中節謂之和感而遂通天下之故也中也和也非二也於此四者己發未發之閒爾未發之中非時中之謂乎中一也未發之中時中在其中矣特未發爾伊川先生曰未發之中在中之義是也譬之水也湛然澄寂謂之静果其所行則謂之動靜也動也中和二字譬焉思過半矣然則中謂之大本和謂之達道何也中者理也無物不該焉故曰大本由是而之焉順此理而發君臣父子兄弟夫婦朋友之交達之天下莫不由之以之修身則身修以之齊家則家齊以之治國則國治以之平天下則天下平故曰達道致此者非聖人不能故曰致中和天地位焉萬物育焉河南尹氏曰吕與叔初解出中庸世方大行伊川謂不識大本其說以赤子之心為未發伊川則曰謂之發而未逺則可也且如今之小嬰兒逆情則啼順情則笑怎做得未發也近時人言中便說無一事如土木偶人怎生未發時便無一事得釋氏之說如此伊川只說箇不倚之謂中寛問曰寛輙以二字形容中字曰喜怒哀樂未發之前不為無發而不為有不知如何尹曰甚好只是箇有無字便似釋氏然喜怒哀樂未發只是無所倚便是中發而皆中節謂之和除著箇中字别字形容便有病寛又曰如顔子之不遷怒此是中節亦只是中何故才發便謂之和尹子曰雖顔子之怒亦是倚於怒矣喜怒哀樂亦然故只可謂之和與時紫芝問中與誠只是一理意謂中即是誠誠即是中曰非也誠者盡乎此者也中者形容乎此者也又問曰只於喜怒哀樂之未發謂之中上體究得藍田吕氏曰此章明命中和及言其效情之未發乃其本心原無過與不及所謂物皆然心為甚所取準則以為中者本心而已由是而出無有不合故謂之和非中不立非和不行所出所由未嘗離此大本根也達道衆所出入之道極吾中以盡天地之中極吾和以盡天地之和天地以此立化育亦以此行大本云人莫不知理義當無過不及之謂中未及乎所以中也喜怒哀樂未發之前反求吾心果何為乎易曰寂然不動感而遂通天下之故語曰子絶四毋意毋必毋固毋我孟子曰大人者不失赤子之心此言皆何謂也回也其庶乎屢空唯空然後可以見乎中空非中也必有事焉喜怒哀樂之未發無私意小知撓乎其閒乃所謂空由空然後見乎中實則不見也若子貢聚見聞之多其心已實如貨殖焉所蓄有數所應有期雖曰富有亦有時而窮故億則屢中而未皆中也權然後知輕重度然後知長短物皆然心為甚則心之度物甚於權度之審其應物當無毫髪之差然人應物不中節者常多其故何也由不得中而執之有私意小知撓乎其閒故理義不當或過或不及猶權度之法不精則稱量百物不能無銖兩分寸之差也此所謂性命之理出於天道之自然非人私知所能為也故推而放諸四海而準前聖後聖若合符節故曰喜怒哀樂之未發謂之中昔者堯之授舜曰天之歴數在爾躬允執其中舜亦以命禹曰人心惟危道心惟㣲惟精惟一允執厥中雖聖人以天下授人所命者不越乎此豈非中之難執難見乎豈非道義之所從出乎後世稱善治天下者無出乎堯舜禹豈非執中而用之無所不中節乎無過不及民有不和世有不治者乎聖人之治天下猶不越乎執中則治身之要舎是可乎故茍得中而執之則從欲以治四方風動精義入神利用出入可也故曰中者天下之大本自中而發無不中節莫非順性命之理而已莫非庸言庸行而已人心之所同然人道之所共行不越乎合君臣父子昆弟夫婦朋友之交而已故曰和者天下之達道致中和者至誠盡性之謂故與天地合徳而通乎神明者致中者也察乎人倫明乎庶物體信以達順者致和者也惟至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以賛天地之化育可以與天地參矣人者與天地並立而為三盡人之性則人道立人道立則經綸天下之大經而天尊地卑上下定矣人道不立則經不正經不正則顛倒逆施天地安得而位諸盡物之性則昆蟲草木與吾同生者也不合圍不揜羣至于不麛不卵不殺胎不覆巢此雖賛天地之化育猶政事之所及而至誠上達與天地同流化育萬物者致中和之效也新安朱氏曰此第一章第三節喜怒哀樂情也其未發則性也無所偏倚故謂之中發皆中節情之正也無所乖戾故謂之和大本者天命之性天下之理皆由此出道之體也達道者循性之謂天下古今之所共由道之用也此言性情之徳以明道不可離之意致推而極之也位者安其所也育者遂其生也自戒懼而約之以至於至靜之中無少偏倚而其守不失則極其中而天地位矣自慎獨而精之以至於應物之處無少差繆而無適不然則極其和而萬物育矣葢天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效驗至於如此此學問之極功聖人之能事初非有待於外而修道之敎亦在其中矣是其一體一用雖有動静之殊然必其體立而後用有以行則其實亦非有兩事也故於此合而言之以結上文之意或問此一節何也曰此推本天命之性以明由敎而入者其始之所發端終之所至極皆不外於吾心也葢天命之性萬理具焉喜怒哀樂各有攸當方其未發渾然在中無所偏倚故謂之中及其發而皆得其當無所乖戾故謂之和謂之中者所以狀性之徳道之體也以其天地萬物之理無所不該故曰天下之大本謂之和者所以著情之正道之用也以其古今人物之所共由故曰天下之達道葢天命之性純粹至善而具於人心者其體用之全本皆如此不以聖愚而有加損也然静而不知所以存之則天理昧而大本有所不立矣動而不知所以節之則人欲肆而達道有所不行矣唯君子自其不睹不聞之前而所以戒慎恐懼者愈嚴愈敬以至於無一毫之偏倚而守之常不失焉則為有以致其中而大本之立日以益固矣光於隠㣲幽獨之際而所以謹其善惡之機者愈精愈宻以至於無一毫之差謬而行之每不違焉則為有以致其和而達道之行日以益廣矣致者用力推致而極其至之謂致焉而極其至至於静而無一息之不中則吾心正而天地之心亦正故隂陽動静各止其所而天地於此乎位矣動而無一事之不和則吾氣順而天地之氣亦順故充塞無閒歡欣交通而萬物於此乎育矣此萬化之本原一心之妙用聖神之能事學問之極功固有非始學所當議者然射者之的行者之歸亦學者立志之初所當熟思而審知也故此章雖為一篇開卷之首然子思之言亦必至此而後已焉其指深矣曰然則中和果二物乎曰觀其一體一用之名則安得不二察其一體一用之實則此為彼體彼為此用如耳目之能視聴視聴之由耳目初非有二物也曰天地位萬物育諸家皆以其理言子獨以其事論然則自古衰亂之世所以病乎中和者多矣天地之位萬物之育豈以是而失其常耶曰三辰失行山崩川竭則不必天翻地覆而已為不位矣兵亂凶荒胎殰卵殈則不必人消物盡而已為不育矣凡若此者豈非不中不和之所致而又安可誣哉今以事言者固以為有是理而後有是事彼以理言者亦非以為無是事而徒有是理也但其言之不備有以啓後學之疑不若直以事言而理在其中之為盡耳曰然則當其不位不育之時豈無聖賢生於其世而其所以致夫中和者乃不能有以救其一二何耶曰善惡感通之理以及其力之所至而止耳彼達而在上者既曰有以病之則夫災異之變又豈窮而在下者所能救也哉但能致中和於一身則天下雖亂而吾身之天地萬物不害為安泰其不能者天下雖治而吾身之天地萬物不害為乖錯其閒一家一國莫不皆然此又不可不知耳曰二者之為實事可也而分中和以屬焉將不又為破碎之甚耶曰世固未有能致中而不足於和者亦未有能致和而不本於中者也未有天地己位而萬物不育者亦未有天地不位而萬物自育者也特據其效而推本其所以然則各有所從來而不可紊耳有問若一介之士致中和如何得天地位萬物育先生曰有此理便有此事有此事便有此理且如一日克己如何天下便歸仁為有此理故也又曰程呂問答考之文集則是其書葢不完矣然程子初謂凡言心者皆指己發而言而後書乃自以為未當向非吕氏問之之審而不完之中又失此書則此言之未當學者何自而知之乎以此又知聖賢之言固有發端而未竟者學者尤當虚心悉意以審其歸未可執其一言而遽以為定也其說中字因過不及而立名又似并指時中之中而與在中之義少異葢未發之時在中之義謂之無所偏倚則可謂之無過不及則方此之時未有中節不中節之可言也無過不及之名亦何自而立乎又其下文皆以不偏不倚為言則此語者亦或未得為定論也吕氏又引允執厥中以明未發之㫖則程子之說書也固謂允執厥中所以行之葢其所謂中者乃指時中之中而非未發之中也吕氏又謂求之喜怒哀樂未發之時則程子所以荅蘓季明之問又已有既思即是己發之說矣凡此皆其決不以吕說為然者獨不知其於此何故略無所辨學者亦當詳之未可見其不辨而遽以為是也曰然則程子卒以赤子之心為己發何也曰衆人之心莫不有未發之時亦莫不有己發之時不以老稚賢愚而有别也但孟子所指赤子之心純一無偽者乃因其發而後可見若未發則純一無偽又不足以名之而亦非獨赤子之心為然矣是以程子雖改夫心皆己發之一言而以赤子之心為己發則不可得而改也曰程子明鏡止水之云固以聖人之心為異乎赤子之心矣然則此其為未發者耶曰聖人之心未發則為水鏡之體既發則為水鏡之用亦非獨指未發而言也曰諸説如何曰程子備矣但其答蘓季明之後章記録多失本真荅問不相對值如耳無聞目無見之荅以下文前旒黈纊之説参之其誤必矣盖未發之時但為未有喜怒哀樂之偏耳若其目之有見耳之有聞則當愈益精明而不可亂豈若心不在焉而遂廢耳目之用哉其言静時既有知覺豈可言静而引復以動見天地之心為說亦不可曉葢當至靜之時但有能知覺者而未有所知覺也故以為静中有物則可而便以才思即是己發為比則未可以為坤卦純隂而不為無陽則可而便以復之一陽已動為比則未可也所謂無時不中者所謂善觀者却於己發之際觀之者則語雖要切而其文意亦不能無斷續至於動上求静之云則問者又轉而之他矣其荅動字静字之問荅敬何以用功之問荅思慮不定之問以至若無事時須見須聞之說則皆精當但其曰當祭祀時無所見聞則古之人制祭服而設旒纊雖曰欲其不得廣視雜聴而致其精一然非以是而全蔽其聦明使之一無見聞也若曰屨之有絇以為行戒尊之有禁以為酒戒然初未嘗以是而遂不行不飲也若使當祭之時真為旒纊所塞如聾瞽則是禮容樂節皆不能知亦將何以致其誠意交於鬼神哉程子之言決不如是之過也至其荅過而不留之問則又有若不相值而可疑者大抵此條最多謬誤葢聴他人之問而從旁竊記非惟未了荅者之意而亦未悉問者之情是以致此亂道而誤人耳然而猶幸其閒紕漏顯然尚可尋繹以别其偽獨㣲言之湮沒者不復傳為可惜耳吕氏此章之說尤多可疑如引屢空貨殖及心為甚者其於彼此葢兩失之其曰由空而後見夫中是又前章虚心以求之說也其不陷入於浮屠者幾希矣葢其病根正在欲於未發之前求見夫所謂中者而執之是以屢言之而病愈甚殊不知經文所謂致中和者亦曰當其未發此心至虚如鏡之明如水之止則但當敬以存之而不使其小有偏倚至於事物之來此心發見喜怒哀樂各有攸當則又當敬以察之而不使其小有差忒而己未有如是之說也且曰未發之前則宜其不待著意推求而瞭然心目之閒矣一有求之之心則是便為己發固已不得而見之況欲存而執之則其為偏倚亦甚矣又何中之可得乎且夫未發己發日用之閒固有自然之機不假人力方其未發本自寂然固無所事於執及其當發則又當即事即物隨感而應亦安得塊然不動而執此未發之中耶此為義理之根本於此有差則無所不差矣此吕氏之說所以條理紊亂援引乖剌而不勝其可疑也程子譏之以為不識大本豈不信哉楊氏所謂未發之時以心驗之則中之義自見執而勿失無人欲之私焉則發必中節矣又曰須於未發之際能體所謂中其曰騐之體之執之則亦吕氏之失也其曰其慟其喜中固自若疑與程子所云言和則中在其中者相似然細推之則程子之意止謂喜怒哀樂己發之處見得未發之理發見在此一事一物之中各無偏倚過不及之差乃時中之中而非渾然在中之中也若楊氏之云中固自若而又引莊周出怒不怒之言以明之則是以為聖人方當喜怒哀樂之時其心漠然同於木石而姑外示如此之形凡所云為皆不復出於中心之誠矣大抵楊氏之言多雜於佛老故其失類如此其曰當論其中否不當論其有無則至論也涑水司馬氏曰喜怒哀樂聖人所不免其異於衆人者未嘗須臾離道平居無事則心常存乎中庸及其既發則以中庸裁之喜不失節怒不過分哀不傷生樂不極欲中者君子之所常守也故曰大本和者君子之所常行也故曰達道東萊吕氏曰自其天地之位而以中言之自其萬物之育而以和言之朱氏如此區别固未有害也深觀其所從來則天地之所以位萬物之所以育葢有不可析者子思曰致中和天地位焉萬物育焉龜山曰中故天地位焉和故萬物育焉參觀二者之論則氣象自可見矣臨川王氏曰人之生也皆有喜怒哀樂之事當其未發之時謂之中者性也能發而中喜怒哀樂之節謂之和者情也後世多以為性為善而情為惡夫性情一也性善則情亦善謂情而不善者說之不當而已非情之罪也禮曰人生而静天之性也感物而動性之欲也則是中者性之在我者之謂中和者天下同其所欲之謂和夫所謂大本也者性非一人之謂也自聖人愚夫皆有是性也達道也者亦非止乎一人舉天下皆可以通行致中和天地位焉萬物育焉此論中和之極雖天地之大亦本中和之氣天位於上地位於下陽氣下降隂氣上蒸天地之閒薰然春生夏長而萬物得其生育矣易曰天地交而萬物生其中和之致也延平周氏曰喜怒哀樂之未發正性也故謂之中發而皆中節正情也故謂之和性以情為用和以中為體故以體言之則中為天下之大本以用言之則和為天下之達道中譬則見也和譬則利也七情言其四者言善則兼愛欲言怒則兼惡也長樂陳氏曰喜怒哀樂未發則渾然在中及發則有中節有不中節而惟中節為和和者與理㑹也渾然則中故為大本發與理㑹故為達道天地之所以變化萬物之所以生育皆中和而已故致其中和之極則天地可得而位萬物可得而育也龍泉葉氏曰按書稱人心惟危道心惟㣲惟精惟一允執厥中道之紀統體用卓然百聖所同而此章顯示開明尤為精的葢於未發之際能見其未發則道心可以常存而不㣲於將發之際能使其發而皆中節則人心可以常行而不危不㣲不危則中和之道致於我而天地萬物之理遂於彼矣自舜禹孔顔相授最切其後唯此言能繼之中庸之書過是不外求矣然患學者涵玩未熟提命未審自私其說以近為逺而天下之人不得共由之非其言之過而不知言者之過也此道常在無階級之異無聖狂賢不肖之殊皆具於此章但不加察爾髙要譚氏曰中庸大要指出本心敎人存養而後發之乎外以應事物之變何謂本心求於喜怒哀樂未發之時則可見矣欲見此心當極其精㣲不可少差葢人生而静是之謂性感物而動是之謂情曰未發云者以為静耶却有動意以為動耶却有静意既不可以動静言但以未發二字㣲見性有覺知可以出而應物之意就此便見本心故指名為中將使人精意求索黙而識之也識得此中則性之理道之體昭然具在於是一意涵養須臾弗妄積久純熟胷中便有前定規模出而應物皆有準則裁量斟酌無不中節矣事事中節乃名為和和即中之發也設使中之體不先立則發之於外顛倒繆盭其能和乎故中者君子用力之處和特發用之可見者爾中為體貴乎有立故曰大本和為用見於有行故曰達道極中和之理廣大精㣲靡不該備故天地之所以奠位萬物之所以生育皆不外乎此理也廣安游氏曰中有二義在内之謂中如樂在其中之中在兩者之閒以為中如三以有中五亦有中之中喜怒哀樂之未發為在内之中亦為兩者之中所謂在内之中謂未發而存乎杳冥之内也兩者之中謂其未發而本心純全至正至中無過差不及之患故也人之本心方其至静而不與物交也本與天地相似及其感於物而動而喪其本心則失其中正而過與不及之患生矣惟發而中節即謂之和此言中之動而為和也大本以本心言也達道言其道通達於天下也天地本有定位萬物本有發育所以失其位而不能育者人亂之也故聖人能致中和則天地位萬物育建安真氏曰致中和而天地位萬物育此參天地賛化育之事也可謂難矣然求其所以用功者不過曰敬而已葢不睹不聞之時而戒懼者敬也已所獨知人所未知之時而致謹者亦敬也静時無不敬即所以致中動時無不敬即所以致和為人君者但當恪守一敬静時以此涵養動時以此省察以此存天理以此遏人欲工夫到極處即所謂致中致和自然天地位萬物育如箕子洪範所謂肅乂聖哲謀而雨暘燠寒風應之董仲舒所謂人君正心以正朝廷正百官正萬民則隂陽和風雨時諸福百物莫不畢至皆是此理蔡氏曰喜怒哀樂未發則性也謂之中者以其未發而無所偏倚也發則情也謂之和者以其發而無所乖戾也大本者萬殊一本也達道者萬世常道也致中和天地位萬物育推極中和之妙而言也此聖人之能事問學之極功故子思子合而結之也又曰自天命之謂性至萬物育焉為一篇之體下言徳者主中而為言也言道者主和而為言也言至誠者即致中和之義也新定顧氏曰天地定位于上下萬物並育于兩閒亦惟本於此中達於此和故非此中非此和天地無由而位萬物無由而育奚以知其然耶天地之所自出萬物之所自來惟此中也天地之所以順動萬物之所以化生惟此和也故舎中和則無以為天地無以為萬物矣推中和之極致乃至於此學者可不從事於此乎或曰子思以中庸名篇而此乃推言中和何也曰道無定名言有歸趣故道一也自其寂然未發形而言之謂之中自其悠久不變而言之謂之庸自其順動協應而言之謂之和豈有二道哉禮記集說卷一百二十四
