body:
  text: 禮記集説卷五十三宋衛湜撰五廟之孫祖廟未毁雖為庶人冠取妻必告死必赴練祥則告族之相為也宜弔不弔宜免不免有司罰之至於賵賻承含皆有正焉鄭氏曰死必赴赴告於君也實四廟孫而言五廟者容顯考為始封子也弔謂六世以往免謂五世承讀為贈聲之誤也正正禮也孔氏曰此論族人雖或至賤吉凶必須相告弔賵含贈皆當有正禮庶子掌其正焉經云祖廟未毁謂同高祖若高祖以下惟有四廟今云五廟故云容顯考為始封子也五世祖是始封之君自五世以下其廟不毁故為五廟也鄭註六世以往者從六世以至百世但有弔禮故言以往四世同高祖有緦麻之親五世則親盡但有袒免而已賵賻含襚皆贈喪之物庶子之官治之隨其親疏各有正禮賵車馬賻財帛含珠玉襚衣服緫謂之贈贈送也長樂陳氏曰祖遷於上宗易於下雖不為庶人吉凶不必赴告義也祖廟未毁雖為庶人吉凶必赴告恩也五世而親屬盡故為之免六世而親屬竭故弔之而已宜弔不弔宜免不免有司罰之則緦麻而上宜服不服者可知也實於口者謂之含承於身者謂之承凡玉可以為渠眉疏璧者皆承也嚴陵方氏曰諸侯二昭二穆與太祖之廟而五故云五廟五廟之孫祖廟未毁雖為庶人其親屬未絶不以貴賤之閒而亡吉凶之問也故後以不忘親言之赴亦告也以其事急而疾趨以告故謂之赴則告以必告也以承必告之下故以則言之免已見檀弓免焉解公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人公族無宫刑鄭氏曰甸人掌郊野之官縣縊殺之曰磬不于市朝者隱之也纎讀為殱殱刺也剸割也宫割臏墨劓刖皆以刀鋸刺割人體也告讀為鞠讀書用法曰鞠宫割淫刑孔氏曰自此至親哭之論公之同族有死罪有司行法之事及公為貶降之禮磬盡也令其性命磬盡案魯語云小刑用鑚鑿次刑用刀鋸案墨刑刻其面是用鑚鑿也其宫劓之屬則剸割也讀書讀囚人所犯罪狀用法謂用其法律平斷其罪鞠盡也謂推審其罪狀令盡漢書每云鞠獄是也欲纎刺剸割之時必鞠讀刑法之書於甸人之官也公族雖犯宫刑不得行宫刑但髠去其髮故掌戮云髠者使守積鄭註謂同族不宫者是也長樂陳氏曰公之於族示之以孝弟睦友子愛之道所以教其善示之以廟朝之禮所以教其敬示之以喪服之禮所以教其哀示之以燕食之禮所以教其親示之以宫室之守所以教其忠示之以赴告弔免所以教其義示之已盡而猶犯焉然後隨之以刑可也其死罪則縊之於甸人其刑罪則纎刺剸裁者亦告於甸人不忍與衆棄之也不忍與衆棄之而必於甸人亦以甸人供祭薦之物故也蓋不以親廢法不以私滅公然後宗廟可得而事然則以親而體百姓乃所以事宗廟也雖然不以公盡法故無宫刑不以義掩恩故三宥而又追之至於無及然後素服不舉為之變嚴陵方氏曰磬謂縊殺之縣之如磬磬於甸人則甸師所謂王之同姓有辜則死刑焉是也彼言天子故謂之師此言諸侯故止謂之人而已亦告於甸人謂有司告之使致其刑也公族於五刑之中獨無宫刑下文所謂不翦其類是也山隂陸氏曰甸師與王共宗廟之事者也周官甸師掌帥其屬而耕耨王藉以共齍盛喪事代王受眚烖據此於王可謂親矣甸王所自有也廬陵胡氏曰告如字獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之鄭氏曰成平也讞之言白也辟亦罪也宥寛也欲寛其罪出於刑也又復也對荅也先者君每言宥則荅之以將更寛之至於三罪定不復荅走往刑之為君之恩無己也罪既正不可者公又使人追之曰必赦之重刑殺其類也反命白已刑殺也素服於凶事為吉於吉事為凶非喪服也君雖不服臣卿大夫死則皮弁錫衰以居往弔當事則弁絰於士蓋疑衰同姓則緦麻以弔之今無服者不往弔也倫謂親疏之比也素服亦皮弁矣親哭之者不往弔為位哭之而已君於臣使有司哭之孔氏曰獄成謂獄斷既平定其罪狀也公又使人追之謂追止行刑殺之人曰雖重罪如是必更寛宥赦其刑殺也素服不舉饌食為之變其常禮如其親疏倫輩之喪身不往弔無弔服也乃親哭之異姓之廟鄭註曲禮重素云衣裳皆素此素服亦然也人以凶事用布今乃用素是為吉也吉時皮弁白布深衣素積裳以采為領縁今衣裳皆素為凶也非如五服之限故鄭云非喪服也引君雖不服至弁絰並服問文也案司服云王為三公六卿錫衰為諸侯緦衰為大夫士疑衰是疑衰輕於錫衰諸侯為卿大夫既錫衰士宜卑降故疑衰但士有同姓異姓故以同姓為緦衰異姓為疑衰今此云素服不言素冠故云亦皮弁長樂劉氏曰聖人之於萬物莫不以道化遂其性也成其形也終其命也而况於其有服之親哉然而代天工立人道百王授受者禮樂政刑而已也故悖於中者禮樂之必棄政刑之必加又敢私於其宗族哉不幸而悖於中者出於公族聖人猶有三宥之心而有司之正不可奪也於是素服不舉樂不御正寢不羞常膳哭之如其倫之喪責其化之不迨於宗族也而無服者罪其忝祖而絶之也長樂陳氏曰三宥而又追之與舜欲竊瞽瞍而逃同意素服不舉為之變與屏不帥者三日不舉同意無服與屏不帥者終身不齒同意廬陵胡氏曰有司又曰在辟以示後世臣執法宜堅其君用刑宜寛及三宥不對走出致刑於甸人春秋傳曰臣義而行不待命者此也河南程氏曰如其倫之喪無服明無罪者有服也新安朱氏曰此素服下脱居外不聽樂五字親哭之下亦脱於異姓之廟五字當補之公族朝于内朝内親也雖有貴者以齒明父子也外朝以官體異姓也鄭氏曰内朝謂以宗族事㑹體猶連結也孔氏曰自此至類也覆明在上公族九條之義欲使親在其内故於内朝若族人在外朝則不復計年以官為次蓋外朝主尊别不得以私恩為異是欲與異姓相連結以為體也此覆釋在上三條長樂劉氏曰自此至不翦其類也者皆作記者既載文王周公所行之法於前又以其意解釋厥義於後所以教後世之為國嗣者必聽於庶子之治而服行其政令不敢挾貴而踰於禮不敢恃親而慢於徳則文王之範不獨成於其身而又足以成其子孫於萬世繼繼承承而不泯也山隂陸氏曰據此外朝公族蓋不與故周官内朝王族故士虎士在路門之右大僕大右大僕從者在路門之左外朝左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後嚴陵方氏曰體謂與之為一體也與後言體百姓之體同宗廟之中以爵為位崇徳也宗人授事以官尊賢也登餕受爵以上嗣尊祖之道也鄭氏曰崇高也授事以官官各有能也上嗣祖之正統孔氏曰廟中行禮是先祖尊嚴之所所主在徳故列爵為位是崇有徳也官由賢能而興今欲尊崇此賢故授事以表之也適子先祖之正體故使受爵於尸及升餕尸饌是尊祖之道理也此覆釋上第四條嚴陵方氏曰宗廟之中序爵以辨貴賤爵不踰徳故謂之崇徳序事以辨賢否故宗人授事以官謂之尊賢於上文言獻受爵此止言受爵以上見之也此篇解上文或此略而彼詳或此詳而彼略其義皆倣此喪紀以服之輕重為序不奪人親也公與族燕則以齒而孝弟之道達矣其族食世降一等親親之殺也鄭氏曰紀猶事也與族燕則以齒以至尊不自異於親之列殺差也孔氏曰不計爵之尊卑以服之本輕者為下本重者為上是不奪人本親之恩此覆釋第五條公所以降己尊而與族人燕㑹齒列是欲使民有親屬者不相遺棄孝弟之道通達於下族食每世降一等是親親之殺此覆釋第六條嚴陵方氏曰喪在彼也而我以禮數紀之謂之喪紀奪者對予之名不奪則予之使無失其為親故也君與族燕以齒則不敢以君之位而加於父兄然親親不可以無殺故世降一等焉戰則守於公禰孝愛之深也正室守大廟尊宗室而君臣之道著矣諸父諸兄守貴室子弟守下室而讓道達矣鄭氏曰行主君父之象大廟不敢以庶守居所重也上言父子孫此言兄弟互相備也孔氏曰在軍載主以行使庶子官主守而尊之示不自專此是孝愛之深適子是宗室之正太廟是祖之正使適子守太廟是尊宗廟之室君臣之道著明也貴者守貴賤者守賤賤者讓於貴貴者不相陵犯是讓道達也此覆釋第七條嚴陵方氏曰事生之道不若事死之為至居安之節不若居危之為難故戰守於公禰所以為孝愛之深凡君之宗皆謂之宗室則親親之意也正室又其正者也正室守太廟所以尊宗室而庶子之與異姓莫敢介焉且不疑於無君故曰君臣之道著山隂陸氏曰貴室衛䕶蓋多下室蓋寡故曰諸父諸兄守貴室子弟守下室而讓道達矣鄭氏謂貴者守貴賤者守賤非五廟之孫祖廟未毁雖及庶人冠娶妻必告死必赴不忘親也親未絶而列於庶人賤無能也敬弔臨賻賵睦友之道也古者庶子之官治而邦國有倫邦國有倫而衆鄉方矣鄭氏曰鄉方言知所鄉孔氏曰君不以貴仍統於親故族人有事告赴是不忘親也既與君有親何得為庶人蓋賤其無能也君敬重弔臨賵賻不使闕失者是君親睦和友之道也此合結庶子官之義而先結於此者以邦國之功不宜與罪惡相連也此覆釋第八條嚴陵方氏曰如上所言皆庶子之官所治也庶子之官以治内為事凡治之序自内以及外而已故曰庶子之官治而邦國有倫倫者先後不可亂之謂也周官凡言邦國者諸侯之國也邦國有倫而衆不惑於道之所在故曰衆鄉方言方者道之方也山隂陸氏曰是睦友之道而已非孝弟之道也亦非慈愛之道也叙古之庶子之官在此者不以能正公族為治以能使公族不犯刑為治也公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖逺之也素服居外不聽樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也鄭氏曰犯猶干也術法也翦割截也孔氏曰國立有司以法齊治一切今不可以私親之罪而壞有司之正法雖公族之親猶治之與百姓為一體故曰所以體百姓也異姓刑之於市同姓刑於甸師隱僻之處者不與國人謀慮兄弟也弗弔弗服哭於異姓之廟為其犯罪忝辱先祖故逺之也素服居外以其實是己親私心喪之也所以然者骨肉之親無斷絶之理故也嚴陵方氏曰有司以正行法故無貴賤親疏之間茍以公族之故乃欲奸有司使獲免焉則法失其正矣故曰公族之罪雖親不以犯有司正術也刑於隱則非與衆棄之矣故曰不與國人慮兄弟也公族不止於兄弟特舉中以該上下爾素服居外不聽樂則以哀未忘也逺之者公義也哀未忘則有私愛存焉故曰私喪之也夫有生所以傳類而宫刑則無生之道焉故公族無宫刑盱江李氏曰掌囚王之同族者拲有爵者桎以待弊罪及刑殺告刑於王奉而適朝士加明梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺由此觀之先王之制雖同族雖有爵其犯法當刑與庶民無以異也法者天子所與天下共也如使同族犯之而不刑殺是為君者私其親也有爵者犯之而不刑殺是為臣者私其身也君私其親臣私其身君臣皆自私則五刑之屬三千特為民也賞慶則貴者先得刑罰則賤者獨當上不媿於下下不平於上豈適治之道邪故王者不辨親疏不異貴賤以致於法其所以不肆諸市朝而適甸師氏者為其有恥毋使人之見也天子視學大昕鼔徵所以警衆也衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司卒事反命鄭氏曰早昧爽擊鼔以召衆也警猶起也周禮凡用樂大胥以鼔徵學士興猶舉也秩常也節猶禮也使有司攝其事舉常禮祭先師先聖不親祭之者視學觀禮耳非為彼報也有司告祭畢天子乃入孔氏曰自此至典于學為第四節論天子視學養三老五更并明公侯伯子男反歸養老於國也天子視學謂仲春合舞季春合樂仲秋合聲大昕者大猶初也凡物初為大末為小昕猶明也謂視學之晨徵猶召也初明擊鼔警動衆人令起衆人聞鼔聲而起先至㑹聚之處然後天子始至尊者體盤故也天子既至乃命有司行此釋奠之事有司即詩書禮樂之教官也此謂因大合樂時祭先師先聖也若四時常奠則各於其學之中又不祭先聖也所以視學者觀有司行禮非是為彼學士而報先聖先師也於時天子視學在虞庠中有司告釋奠既畢天子乃從虞庠入反於國明日乃之東序而養老故云始之養也長樂陳氏曰天子視學四養老也簡不帥教也出征受成也以訊馘告也養老必於仲春季春仲秋而簡不帥教出征受成以訊馘告者無常時雖無常時其入學也亦必養老焉文王世子天子將視學以鼔徵衆序立以齒及天子至命有司行事祭先聖先師於西學有司卒事反命乃適東序養老焉此視學之大略也禮書長樂劉氏曰天子之元子諸臣之適子鄉遂之賢能在王之大學修徳習樂學舞其必於仲春合樂舞仲秋合樂聲者教之致其敬蓋有三義焉一為元子將承祖考之祭祀必明於禮樂也二為將傳道於聖師必先竭其恭敬也三為天子視學必釋奠養老學士合舞以成其禮也聖人之政先齊其家既正后妃之徳於内又正元子之徳於外是故天子之大教以視學為先務焉嚴陵方氏曰學記曰未卜禘不視學蓋教養之久然後可以視之故也天子視學必警衆所以奉至尊不可以不各致其敬故也山隂陸氏曰興秩節此為養老視學為之祭節矣其禮有常秩也言先聖在後者容有司卒事自先聖所反命也與天子出征造於禰同義石林葉氏曰天子視學則觀禮樂於其中故典禮則言秩典樂則言節書曰天秩有禮則凡見於度數者皆出乎天也傳曰干戈戚揚樂之末節凡見於舞者皆存乎人也出乎天者而以人庸之存乎人者而曰天有之皆所謂禮樂之大者講義曰學者所以養育人才之地也雖以天子之尊必視學者所以教養人才不可不以身親之也天子而以身親之則勤者知勸怠者知懲業之精麤有所區别此視學之意也始之養也適東序釋奠於先老遂設三老五更羣老之席位焉適饌省醴養老之珍具遂發咏焉退修之以孝養也鄭氏曰又之養老處也凡大合樂必遂養老是以往焉言始始立學也養老東序則是視學於上庠親奠之者己所有事也三老五更各一人皆年老更事致仕者也天子以父兄養之示天下之孝弟也名以三五者取象三辰五星天所因以照明天下者羣老無數其禮亡以鄉飲酒禮言之席位之處則三老如賔五更如介羣老如衆賔必也適饌省醴親視其所有也發咏謂以樂納之退修之謂既迎而入獻之以醴獻畢而樂闋孔氏曰若尋常視學則於東膠中唯行養老之禮若始立學既視學畢適之養老之處東序之中天子親自釋奠於先世之者祀先老畢遂於東序中設三老五更羣老之席位若非始立學則不釋奠於先老也布席既畢天子親適陳饌之處省視醴酒并其珍具出迎三老五更將入門之時遂作樂發其歌咏以樂納之也三老五更即位於西階下天子乃退酌醴獻之以修行孝養之道也案蔡邕以更字為叟叟老稱又以三老為三人五更為五人非鄭義也天子冕而緫干而舞執醬而饋是父兄事之也三辰謂日月星五星謂金木水火土三辰之星則二十八宿及諸星也三老如賔五更如介者案鄉飲酒註敷席賔席牖前南面介席西階上東面是也老更既如賔介故羣老如衆賔以其無文故云必也案鄉飲酒注席衆賔於賔之西南面各特焉是也嚴陵方氏曰上言視學至此言適東序則知所謂學者辟廱也辟廱時王之學也於時王之學祭先師先聖於先王之學釋奠于先老隆殺之别也以其隆故曰視以其殺故曰適適則自此適彼而已設其席位則老者欲安之故也饌者食也醴者酒也適饌省醴蓋互言之皆適其所而省之也珍若八珍之屬凡可以養者莫不具焉故謂之珍具若王制以珍從是矣修之以孝養者謂執醬而饋執爵而酳也長樂陳氏曰古者建國必立三卿鄉飲酒必立三賔而養老必立三老故禮曰三公在朝三老在學三公非一人則三老五更非各一人矣漢志以徳行年高者一人為老次一人為更故永平中拜桓榮為五更建初中拜伏恭為三老而鄭氏以此為三代之制誤矣禮書又樂書曰天子莫重於視學亦莫重於養老故老更者為其血氣既衰而養以佚之仁也飲食之珍具親執而奉之禮也憲行以善吾之行乞言以廣吾之聞智也父事之不疑其所謂父兄事之不疑其所謂兄義也有親者視之而興孝有兄者視之而興悌信也夫一舉養老之事衆皆知其徳之備者以此而已蓋釋奠於先老所以明其不忘本也適饌省醴所以明其不敢慢也樂則清廟象武之頌所以示徳與事也語則父子君臣長幼之道所以辨君與親也然咏歌者樂之聲管者樂之器舞者樂之容養老之樂始而發咏中而管舞卒而樂闋則堂上堂下之樂和樂而不流也其所以命羣后羣吏反養老幼於東序者不過示父子君臣長幼之道合徳音之致始之以養終之以仁而已古之君子必謹其終始如此而衆安得不喻之哉馬氏曰先老者三老五更存於先而可以為法於後而天子所以為師也三老五更者以其深知三徳五事之意也亦不必數之三五也羣老者庶子之老也王制所謂庶老是也貴老為其近於親上貴老而民興孝故天子之於五更則以兄事之至於庶人之老其禮宜殺焉退修之以孝養釋其適饌省醴之意也説者以為既迎而入獻之以醴獻畢而樂闋其説非也蓋設三老五更羣老之席位退而適饌省醴則所謂退修之以孝養廬陵胡氏曰之往也往養老之處始初也鄭謂始立學非遂發咏焉此約大射禮賔入及庭奏肆夏也尊老故用兩君敵禮入門而縣興金華應氏曰東序夏后氏之學名也此所云序則未必自為一學也即學宫之東序焉爾始立學者既釋菜而退儐於東序諸侯學校之東序也天子亦始立學視學興秩節而始適東序天子學校之東序也鄭氏於此二者皆以為自上庠而適東序夫東序在郊而東膠在國若自郊反國則驅馳甚矣以此約度之則東序亦在學中而已樂記祭義皆謂食三老五更於太學則天子之所視者即太學也大學之有東序者蓋地道尊右神祀尚隂故宗廟之位皆以西為上竊意夫西者廟宫之所存所以尊先聖先師也東者黌舎之所寓所以處國子俊造也今學宫亦然故立學釋菜則退儐於此而行一獻之禮視學釋菜則退儐於此而行一獻之儀視學卒事則設位於此而修孝養之禮兩者皆曰退儐曰退修蓋以廟宫為尊故以黌舎為退猶朝廷之進見而曰退也不特此爾春夏干戈秋冬羽籥於此而學焉凡祭與養老乞言之禮亦於此而學焉大司成之論説亦在是蓋東序之所容者廣不必若上庠瞽宗之各異其學也諸侯立學皆退儐於此則知東序不獨魯有之明堂位之言欲明魯禮之盛耳然則天子立四學者何歟曰大學即辟廱也東序亦在其中推本而言之則序之名蓋實因乎夏兼虞商則為三代之學矣又以周言則為四學祭義云食老更於大學即東序之養老也祀先賢於西學即視學釋奠也月令之釋奠不曰先聖而專曰先師者先聖少而先賢多也此月令釋奠專曰先師也東序西學皆在大學而獨以大學為三老五更之地者重其禮也亦恐黌舎廣而廟祀之未必及之東序釋奠先老猶今時祀於學之東偏蓋聖師在西而先老在東也反登歌清廟既歌而語以成之也言父子君臣長幼之道合徳音之致禮之大者也下管象舞大武大合衆以事達有神興有徳也正君臣之位貴賤之等焉而上下之義行矣有司告以樂闋鄭氏曰反謂獻羣老畢皆升就席也反就席乃席工於西階上歌清廟以樂之既歌謂樂正告正歌備也語談説也歌備而旅旅而説父子君臣長幼之道説合樂之所美以成其意鄉射記曰古者于旅也語象周武王伐紂之樂也以筦播其聲又為之舞皆於堂下衆謂所合學士也達有神明天授命周家之有神也興有徳美文王武王有徳師樂為用前歌後舞也上下之義由清廟與武也闋終也告君以歌舞之樂終此所告者謂無筭樂孔氏曰反謂反席三老五更羣老初受獻畢皆立於西階下東面今皆反升就席乃使工登堂上西階北面歌清廟之詩以樂之此約鄉飲酒文知之案鄉飲酒登歌之後乃下管間歌合樂之後樂正告云正歌備後作相為司正賔取觶酬主人主人酬衆賔是歌備而旅酬也旅酬之時則語説鄭註合於樂之所美以成其意者解經合徳音之致樂之所美謂清廟之詩所美文王有君臣父子長幼之徳今於旅之時論説君臣父子之道合㑹清廟所美之事以成就其升歌清廟之意也徳音謂清廟之詩是文王道徳之音致極也下管象舞大武者登歌之後笙入立於堂下管中奏此象武之曲庭中舞此大武之舞大武即象也案詩維清奏象舞是武王作樂稱象也大㑹聚學士以登歌下管之事歌舞其樂以明上天授命周家之有神興起文王武王之有徳使衆前歌後舞也登歌清廟文王詩也君詩在上下管象是武王詩也臣詩在下是正君臣之位貴賤之等以此教上下衆知之是上下之義行於衆庶也養老之末無筭樂之終也有司告王以樂終長樂劉氏曰周之功成於文王致中和配天地莫大於此詩升歌以養老敬而愛之同於祖先也禮之大有過於是乎清廟既終乃歌維清之頌以奏象武又歌武頌以奏大武之舞然後合衆學士以舞六代之樂三老五更羣老因其升歌合舞遂言文王之所以為徳武王之所以為功黄帝堯舜禹湯之所以為道皆正五品於其民以致中和之事莫不由乎修身正家以為教化之本也則大其禮盛其樂以養老者所以達六代之聖王有神靈垂教於萬世興天下之大老致盛徳於一人也豈不足以正君臣之位貴賤之等乎故上下之義行焉長樂陳氏曰歌者樂之聲管者樂之器舞者樂之容登歌清廟所以著其徳下管象所以著其事舞大武所以著其功而又大合學士以預其事則幽足以達有神明足以興有徳也古者兩君相見升歌清廟下管象武以禮樂相示而已以明非有徳與事功者不可以當此然則養老而歌舞是者以其足以當之也樂所以達有神興有徳則老者之道亦足以感神而作人矣言養老而不及幼及命諸侯羣吏則兼幼言之者耆老孤子先王未嘗不兼養然其所重特老者而已又禮書曰明堂位曰以禘禮祀周公於太廟登歌清廟下管象文王世子曰天子養老登歌清廟下管象祭統曰夫大嘗禘升歌清廟下而管象天子之樂也康周公故以賜魯也仲尼燕居曰兩君相見升歌清廟下而管象則天子之祭祀養老饗諸侯諸侯之相見魯之嘗禘皆升歌下管貴人聲也歌清廟示徳也管象示事也徳莫盛於文王之清廟事莫先於文王之象清者徳之潔而非任也象者事之始而未形也維清奏象而言文王之典肈禋季札見舞象而言美哉猶有憾則象為文王之詩明矣鄭氏以為武王詩誤矣又曰養老必歌清廟下管象者以文王善養老故也舞大武者以武王善繼志述事故也嚴陵方氏曰養老之禮無大於此故曰禮之大者也匏竹在下管象以其示事故繼言大合衆以事神之為道疑其難通故以達言之徳之在人則患其不作而已故以興言之書言神人以和則樂之效固有如此者馬氏曰文徳之盛莫盛於文王而登歌清廟者所以發明賔主之徳也象與大武皆武王伐紂之樂也下管象所以咏其聲大武所以動其容而大合衆學士以行管象武舞之事所以達有神興有徳也神者藏於禮樂之中而不可知則管象舞武以達之徳者藏於人情之間而不可見則管象舞武以興之王乃命公侯伯子男及羣吏曰反養老幼于東序終之以仁也鄭氏曰羣吏鄉遂之官王於燕之末而命諸侯時朝㑹在此者各反養老如此禮是終其仁心孝經説所謂諸侯歸各帥於國大夫勤於朝州里􅚮於邑是也孔氏曰諸侯為畿外羣吏謂畿内鄉遂之官王自養老又令諸侯州里而行養老是終其仁心􅚮於邑為希􅚮仰慕行之於邑也山隂陸氏曰稱王王事也是故聖人之記事也慮之以大愛之以敬行之以禮修之以孝養紀之以義終之以仁鄭氏曰慮之以大謂先本於孝弟之道敬謂省其所以養老之具禮謂親迎之如見父兄孝養謂親獻之薦之義謂既歌而語之也仁謂又以命諸侯歸於國復自行之也孔氏曰此申説視學養老之義謂聖人親行養老之禮記序前代之事也慮謀也大謂孝弟也長樂劉氏曰聖王躬行養老之事使天下記之以為教化之本故曰記事故始於天子敬老而終於天下為人子者莫不敬其老則其慮事不亦大乎愛親不亦敬乎嚴陵方氏曰養老之禮所以廣孝也而人之行莫大於孝此慮之以大也設三老五更羣老之席位此愛之以敬也發咏登歌合語下管此行之以禮也適饌省醴珍具此修之以孝養也正君臣之位貴賤之等此紀之以義也命公侯而下各歸而有所養焉此終之以仁也馬氏曰慮者慮於中而行於外書曰弗慮胡獲莫非慮也而慮有大小慮之以大者孝悌仁之本也孝悌所以示其愛愛而弗敬獸畜之也故愛之以敬所以行敬之情而曲致者存乎禮行之不以禮則直情徑行戎狄之道也行之以禮則無所不盡而養之不可以無其具故修之以孝養自慮之以大推而至於修之以孝養則君臣又嫌於不分故紀之以義紀者衆目之緫也紀散則衆亂故以義定上下之分紀之以義所以致其尊而亦不可以不致其親故又終之以仁慮之以大者仁之本終之以仁者仁之成君子始終之所依者仁而已矣山隂陸氏曰此篇皆出聖人所記故纂者其言如此紀之以義君臣之位貴賤之等也蓋方父事三老兄事五更袒而割牲緫干而立雖曰以教諸侯之弟然非所以正君臣之位貴賤之等也是故至是而燕更紀之以義經曰道並行而不相悖此之謂也夫紀之以義矣猶不敢違仁且命之曰反養老於東序纂禮者所以賛明之也揚子曰聖人得書之體若是者近之矣夫禮非聖人制之不能盡非聖人記之不能悉前有聖人作焉後有聖人述焉此道之所以明而不闇發而不鬱也石林葉氏曰先賢有道徳而釋奠以祭之所以致愛於死者也其行可憲其言可飭則設其席位以尊之所以致慤於生者也皆敬之至也此所以愛之以敬也三老則三公致仕者其爵位尊矣故以父事之則不疑於父五更卿大夫致仕者其爵位差矣故以兄事之則不疑於兄此所謂行之以禮也飲以養陽食以養隂饌則食也醴則飲也適饌省體其珍具矣故執醬而饋執爵而酳冕而緫干以樂侑食此所謂修之以孝養也文王功成於清廟而為受命之始則歌於堂上武王功成於大武而為受命之終則舞於堂下此所謂紀之以義也自大昕鼔以警衆而至於舞大武則禮終而樂闋國子俊造得以觀於中侯伯子男得以帥於外而猶以為未喻也故命百官反養老幼於東序此所謂終之以仁也義也孝也禮也敬也皆出於禮樂一視學而盡舉之則所謂慮之大也是故古之人一舉事而衆皆知其徳之備也古之君子舉大事必慎其終始而衆安得不喻焉兊命曰念終始典于學鄭氏曰喻猶曉也兊當為説説命書篇名殷高宗之臣傅説之所作典常也念事之終始常於學學禮義之府孔氏曰此覆説養老而在下衆庶知道徳之備其在學乎謂一舉養老之事以示於下而衆皆知在上之徳備具其備具者即慮之以大而下是也慮之以大是慎其始終之以仁是慎其終養老之事既慎其終始一一露見盡以示衆則衆何得不曉喻焉嚴陵方氏曰徳之備則以能謹其終始故也説命而名曰兊命者猶小雅謂之宵雅歟世子之記曰朝夕至於大寢之門外問於内豎曰今日安否何如内豎曰今日安世子乃有喜色其有不安節則内豎以告世子世子色憂不滿容内豎言復初然後亦復初朝夕之食上世子必在視寒煖之節食下問所膳羞必知所進以命膳宰然後退若内豎言疾則世子親齊𤣥而養膳宰之饌必敬視之疾之藥必親嘗之嘗饌善則世子亦能食嘗饌寡世子亦不能飽以至於復初然後亦復初鄭氏曰朝夕朝朝暮夕也日中又朝文王之為世子非禮之制世子之禮亡言此存其記也色憂憂淺也不及文王行不能正履羞必知所進必知親所食也養疾者齊𤣥𤣥冠𤣥端也親猶自也饌必敬視為疾者之食齊和所欲或異藥必親嘗試毒味也嘗饌善謂多於前不能飽又不及武王一飯再飯復初復常所服也孔氏曰此是第五節以文王為世子是聖人之法不可常行故此記尋常世子之禮内豎既言有疾則世子親自齋戒衣𤣥冠𤣥端而養也𤣥冠𤣥端齋服也故玉藻云𤣥冠丹組纓諸侯之齋冠也𤣥冠綦組纓士之齋冠也𤣥端則緇布衣也謂之端者端正也齋必用𤣥者𤣥隂之色隂氣靜齋亦靜故用𤣥也嚴陵方氏曰文武之所為聖人之行也世子之記則中人之行而已聖人之制行不以己豈一以文武之道責於人哉故録世子之記於篇末從使後人可跂而及也所謂色憂不滿容者蓋見乎色者既作則動乎容者亦隨之矣喜之類為陽憂之類為隂陽饒而隂乏故憂則容不滿也玉藻所謂親癠色容不盛是矣齊𤣥而養謂心致齊而身服𤣥也致齊不齊故也服𤣥則以隂幽思故也然則言不説冠帶而養則齊𤣥可知言一飯再飯則藥必親嘗可知山隂陸氏曰朝夕至於大寢門外不言之愈麤矣内豎曰今日安據今而已乃有喜色薄乎云爾據内豎曰安文王乃喜安通於後乃喜深矣復初變膳言初亦言之法羞必知所進羞始而已文王顧末精矣諾然後退爾亦以此不言醫師之藥而言疾之藥著藥其疾之藥也禮記集説卷五十三
