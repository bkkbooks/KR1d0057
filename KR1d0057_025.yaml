body:
  text: 禮記集説卷二十五宋衛湜撰天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸鄭氏曰視猶比也元善也善士謂命士也孔氏曰案周禮註天子上士三命中士再命下士一命則上中下之士皆稱元士也天子之士所以稱元者異于諸侯之士也周禮公侯伯之士雖一命不得稱元士也長樂陳氏曰書曰列爵惟五分土惟三畿内之臣其列爵與諸侯異其受地與諸侯同故孟子曰天子之卿受地視侯大夫受地視伯元士受地視子男然周禮上公九命侯伯七命子男五命王之三公八命卿六命其大夫四命而士不言命蓋上士三命中士再命下士一命也以八命之公六命之卿其地視九命之公七命之侯以四命之大夫其地視七命之伯以三命之元士其地視五命之子男蓋在内者卑其命而禄必視其外則名有所屈而實有所養在外者崇其命而禄不異乎内則名有所伸而實有所守也載師士田任近郊之地家邑之田任稍地小都之田任縣地大都之田任畺地此所謂視侯伯子男者也士之受田寡矣而近地為可容故任之于近郊公卿大夫之田多矣非逺地不可故任之于縣畺此周采地之别也鄭氏釋大司徒以王制縣内之數為夏之采地周則未聞釋小司徒又曰采地百里之國凡四都五十里之國凡四縣二十五里凡四甸孔穎逹謂家邑采地各二十五里在三百里内小都各受五十里在四百里内大都各受百里在五百里内既曰周之采地未聞又曰采地二十五里之國凡四甸其言不特異于孟子又自戾也又曰此經與孟子異者何也蓋周官有卿而無三孤與上大夫而公則冢宰是公孤上大夫同為六卿故上大夫之為卿則受地不過七十里此王制所謂天子之卿視伯者也孤之為卿則受地有至于百里此孟子所謂天子之卿受地視侯者也孟子又曰大夫受地視伯者言上大夫也蓋孤出封則侯上大夫出封則伯而已附庸雖不能五十里緫大率而言之亦可謂之五十里此所以或言元士視子男或言元士視附庸並禮書延平周氏曰侯伯同七命則無以别其為孤也侯之受地所以與公同百里也夫諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一是侯之封疆不若公之廣而其附庸不若公之多則其食封雖與公同固不嫌有抗于諸公者也此言元士視附庸孟子言元士視子男何也附庸之與子男皆五十里但人之才智不能治其五十里者則不達于天子而附于諸侯曰附庸此所以言元士者或曰視附庸或曰視子男也石林葉氏曰此經與孟子異焉何也蓋古者三公無常職大夫雖有常職而有卿為之者司徒冢宰之屬其職則六卿也入而與王論道為三公出而居六卿則為大夫是公卿大夫事固有相同者也職有相通而其制禄亦不過三等故三公之與六卿其田同視公侯卿之與大夫其田同視伯大夫與元士其田同視子男以及附庸蓋孟子舉卑而見尊故止言卿大夫元士王制定其尊卑之序故雖三公無常職附庸不合于天子亦必詳言之唯其王制之説詳此孟子所以自謂軻也嘗聞其略也山隂陸氏曰此與孟子所言各差一等非不同也孟子言受地爾蓋天子之卿之田視伯即受地視侯他倣此李氏曰卿大夫其受田與諸侯同此為人臣者所以無幸于出封而一心于王室也永嘉徐氏曰先王設官制禄寰外諸侯自公侯至于附庸王朝之臣自三公至于元士受田相視内外齊一所以制天下偏重之患而使逺近若一也夫分田之法所以内必視夫外者蓋先王之制出為列國之君則入為王朝之臣所以一内外也内為三公稱公外而諸侯亦稱公故畢公以父師為保釐東土衛侯以列國入相于周周公居東復相成王山甫徂齊式遄其歸或以三公居外復入為内諸侯所以出入均勞而内外之輕重不分也春秋以來鄭武公入為周司徒鄭莊公為平王卿士而滕侯亦曰我周之卜正蓋畿外諸侯入備王官先王所以一内外此所以内諸侯之禄視外諸侯而為之制也是故三公則受百里之地六卿則受七十里之地二十七大夫則受五十里之地而元士三等亦視附庸而受田夫田者禄之所自出而居官之禄即田也古者内諸侯自公卿大夫皆有采邑之地其田自官給之其耕之者固自有人也大夫之食采地蓋任官之有功者始食之其子孫之繼世者得世其禄不世其官所謂大夫有采以䖏其子孫也其大夫之無功者則無采地亦與士皆食禄于上以圭田為祭祀耳夫自三公至于元士大者受邑小者受田所謂分田制禄可坐而定于此略可攷矣自天子三公之田至天子之元士此畿内諸侯公卿大夫士制禄之法自諸侯之下士至君十卿禄此畿外諸侯以下卿大夫士制禄之法然畿内卿大夫則有采地至諸侯之卿大夫皆量禄分田與之畿内公卿大夫元士皆世禄至諸侯之卿大夫則量禄分田而不世禄矣嚴陵方氏曰元士天子之上士也與元子元侯稱元同義獨天子之上士得稱之者以其才不特能事人又可以長人故也不言中下之士則以視附庸唯上士為得其稱故也然王畿千里公卿而下所食之邑苟一如外諸侯之數則地有所不足經之所言不必一如其數也特視之以為差爾劉氏孟冶曰此言天子畿内之田公卿而下所食之邑禄之多少視外諸侯之數而為之差等耳非直謂視其田數而食其田禄也儻一如外諸侯之制則方千里之畿䖏公侯伯子男之衆則地有所不足矣曰元士者以天子之士異于諸侯之士也制農田百畆百畆之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庻人在官者其禄以是為差也鄭氏曰農夫皆受田于公田肥墽有五等收入不同也庻人在官謂府史之屬官長所除不命于天子國君者分或為糞孔氏曰自此至卿禄一節論制農田有上中下以禄庻人在官及士大夫并卿及君之禄王者制度受農以田案周禮地有九等故司徒上地家七人中地家六人下地家五人註云有夫有婦然後為家自二人至十人為九等一家男女七人以上則授之以上地所養者衆也男女五人以下則授之以下地所養者寡也止以七人六人五人為率者舉中而言也如鄭此言上地家七人者謂中地之上家六人者謂中地之中家五人者謂中地之下以此推之下地之上家四人下地之中家三人下地之下家二人則上地之上家十人上地之中家九人上地之下家八人是有九等此經地惟有五等者大司徒所云農夫授田實有九等此經據準庻人在官之禄最下者猶五人故從上農夫至五人而已司徒上地家七人此云上農夫食九人者謂上中之地亦為上地也其不言上上者欲取九人當下士禄也鄭註庶人在官府史之屬官長所除者案周禮太宰云府六人史十有二人云之屬謂工人賈人及胥徒也官長謂冢宰為天官之長所除者謂所命之官除去其舊名籍周禮註云凡府史以下官長所自辟除以其非丸命之内故知不命于天子國君也長樂陳氏曰班禄之法自上下制禄之法自下上以其自上下故由天子之田而後至于公侯伯子男由公侯伯子男而後至于附庸以其自下上故制農田而後至于庻人在官者由庶人在官者然後至于士大夫君周官上地家七人中地家六人下地家五人則農夫之差三等而已此則五等者先王之于民養之欲其富保之欲其庶故家七人者必授以九人之上地家六人者必授以七人之中地下地則以地稱人而已凡欲下地之民生齒之繁以及中上者而後慊此富而庶之之術也三等之田由士以至于大夫其禄之差不以國之大小由卿至于君其禄之差則以國之大小者君卿之禄厚故豐殺所以不同士大夫之禄薄故無豐殺之别此次國之卿所以三大夫禄君十卿禄小國之卿倍大夫禄君十卿禄而次國小國士大夫之禄則一而已又禮書曰禹貢之田上上以至下下凡九等蒍掩别楚地自土田以至衍沃亦九等而周禮所言上中下地三等而已蓋緫其大致然也鄭氏謂自二人以至于十為九等七六五者為其中如此則是二人三人四人下地之三等也五人六人七人中地之三等也八人九人十人上地之三等也孟子王制舉上中地而不及下周禮舉中地而不及上下然周禮言上地中地下地而孟子王制或言上次下次或言上中下是九等之地在其中矣孰謂各舉其偏哉遂人三等之田萊大司馬三等之軍賦其言上中下地與司徒三等之地同嚴陵方氏曰一夫一婦受田百畆故農田之制以百畆為之率焉雖均受百畆之分然地有肥墝之異計其一歳食人之數或多或寡此農夫所以有上下之别也以食九人者為上食五人者為下則食八人至于食六人者為中農夫可知其詳雖有五等之别其大略不過三等而已府史胥徒之類其田則載師所謂官田是也而又有工有賈有奄有奚位之髙下不可得而詳故禄之多寡不可得而定此言其禄以農為差則多者不得過食九人之禄寡者不得下食五人之禄可知此言百畆之分孟子言百畆之糞者蓋分以均之而存乎法糞以治之而存乎力法出乎上力出乎下其言亦互相備也馬氏曰百畆以周尺言之六尺為步步百為畆一夫一婦受田百畆百畆之糞上地畆一鍾而一鍾者六斛四斗也百畆之田上熟其收則有六百四十斛也故上農夫可以食九人然而田有肥墝則其所出亦有多寡故其次食八人其次食七人其次食六人其次食五人而庻人在官者其禄亦以是為差也庶人在官者非天子諸侯之所食也諸侯之下士視上農夫則以九為節而庶人在官者知其食八人而已夫上地之上可以食十人而下地之下可以食二人而於此則止言食九人而其下止言食五人者禄與周官蓋無以異也周官有不易一易再易之差而上地之上可以食十人上地之中可以食九人上地之下可以食八人中地之上可以食七人中地之中可以食六人中地之下可以食五人推而下之至于下地之下可以食二人然而于上止言上地之中而其下止言中地之下者蓋周官者制農田之法而此則因其制禄而言之也上止言食九人者因其言諸侯之下士所視者言之也下止言食五人者因其庶人在官之禄最下者食五人而言之也李氏曰孟子曰分田制禄可坐而定也又曰無君子莫治野人無野人莫養君子蓋以農夫而制禄則治于人者必思所以養之食于人者必思所以治之且示其不能交相無也庶人之在官者其家亦授之田周官之所謂官田也禄足以代耕而又授之田所以責其亷能亷善也永嘉徐氏曰先王之制禄庻人之在官者皆以口計食其多寡之數則視農夫以為率蓋府史胥徒不命於天子國君官長所自辟除皆出于民者也畨上更休除其課役而執事于官長則皆有田有禄蓋其家所受田即載師之官田庶人在官之田也先王之時庶人在官者授以田禄以養其㢘節而已未嘗使之任也至秦任文法而責吏始有為小吏而入任計功次而進官者矣其小吏之有材略者御史監郡得薦諸朝蕭何嘗不受御史之薦可攷也至漢有百石小吏自計食佐吏而不及嗇夫歳入始不過百石月才十六斛耳較之先王制在官之禄雖厚薄之相去不逺而古之在官者皆民為之服公事之後而復受田為民漢為吏而入仕則不得受田為民矣其奉入不既薄乎蕭望之奉禄不足嘗有憂父母妻子之心況其職近于民侵漁百姓無足怪也自宣帝神爵之詔益勤事小吏百石以下其奉十五而小吏始増禄矣趙廣漢奏長安游徼獄吏其秩百石故吏始有秩而差自重則小吏奉禄誠不可不厚也況漢吏百石者皆人之有才行者始為之而刺史大守得自選擇其賢者自佐吏而下皆得察㢘遷秩大者或至公卿自王尊張敞趙廣漢尹翁歸之徒皆出於郡縣小吏雖其禄奉之不薄而入仕則此塗出其待之固優也其後朱博不喜儒吏而務抑摧折而吏道始衰矣光武初立凡六百石以下皆増于西京舊秩蓋優小吏也卓茂為令自言亭長受米肉餽者置而不問其習見小吏之常態而不之責也新安朱氏曰孟子言耕者之所獲一夫百畆百畆之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其禄以是為差一夫一婦佃田百畆加之以糞糞多而力勤者為上農其所收可供九人其次用力不齊故有此五等庶人在官者其受禄不同亦有此五等也劉氏孟冶曰此授田之法也夫王制言制禄爵之法而及于農田之制者蓋三代衰典籍不存孟子己不能詳班爵禄之制況後世乎明乎授田之法則自諸侯之下士逆而推之以至于大國之卿次國之卿小國之卿皆可推矣謂一家有男女九人授以上田最下一家男女五人授以下田其田有肥墝不同故所養有多寡之異是食九人之下至食五人是有五等之田也今以周官大司徒授田之法攷之田有三等一易者地薄休一歳乃可復種再易者地又薄休二歳乃可種不易者家百畆一易者家二百畆再易者家三百畆是制田止有三等而家皆百畆也小司徒亦言上地家七人中地家六人下地家五人是授田止有三等也而王制有五等之制何也蓋三等之制自三等又别為上中下三等今司徒止舉七人六人五人舉中制而言之也故周禮謂上地家七人中地之上家六人者中地之中家五人者中地之下以此故知此言上農夫者是自上地之中者言之耳不言上地之上者欲取九人當下士禄故止言上地之中而不及上地之上以此知王制因言制禄而及授田之法耳庶人在官謂府史胥徒多者不過得食九人之禄少者不過得食五人之禄以是為差也延平周氏曰此言庻人在官者其禄以是為差孟子言下士與庶人在官者同禄何也宰夫之職府先之史次之胥次之徒又次之蓋為府者則與下士同禄史與胥徒則用此農夫之二等以為之差也延平黄氏曰先王使人不愛其力于事不屈其才于物物至而應事起而辦而人雖敝其力未始有憾焉者作秩以制其常賜之多寡作敘以次其事治之先後而已使人之費有稍有食稍所謂月廩也中庸曰餼廩稱事所以勸百工王制曰庶人在官者其禄以是為差是秩所謂常賜也孟子曰抱關擊柝皆有常賜王制曰九十日有秩酒正之秩酒内則之秩膳是也金華應氏曰上農九人下士視上農夫互相積而倍者之三則為中士為上士為大夫自是積而四之則為卿又自是積而十之則為君皆自農而計之也故莫賤于庻人而在官以農為差莫尊于君而禄亦視其農之所積非特使執役冗賤者不敢遽忘本業而禄秩之厚備物之奉者亦知其根本未有不基于農者也諸侯之下士視上農夫禄足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄次國之卿三大夫禄君十卿禄小國之卿倍大夫禄君十卿禄鄭氏曰此班禄尊卑之差孔氏曰大夫以下位卑禄少故大小國不殊卿與君禄重位尊故禄隨國之大小為節案周禮天子卿大夫士與諸侯之臣執贄同則禄亦同也此自下士至小國之卿倍大夫禄皆據無采地者言之嚴陵方氏曰下言次國小國則上言諸侯者正謂大國可知大國即公侯方百里之國也次國即伯方七十里之國也小國即子男方五十里之國也下士視上農夫蓋得食九人之禄足以代其耕者以一夫所耕之田而禄下士之家其禄未為優厚也僅足以代其耕而已為其從事于公不暇從事于私故也次國之與小國不言大夫士者則禄之多寡同于大國可知由卿而上三等之國所異由大夫而下三等之國所同者蓋卿而上其禄浸厚苟不為之殺則地之所出不足以供大夫而下其禄浸薄苟亦為之殺則臣之所養不能自給此禄之多寡所以或同或異也然孟子所言其序與此不同者彼以貴賤為之序此以衆寡為之序故也馬氏曰説者以為卿大夫士與諸侯之臣執贄同則禄亦同也其説蓋非也上言天子之三公之田視公侯天子之大夫視子男則其田蓋不同而謂禄亦同則非也又言自下士至小國之卿大夫禄據無采地言之則其説又非也蓋王制之言大夫士者因言爵禄之多少而非以有采地無采地言之也所謂君十卿禄者與天子之田方千里者同長樂陳氏曰周官載師有官田則庶人之在官者有田矣春秋傳曰惟卿備百邑國語曰大國之卿一旅之田上大夫一卒之田則諸侯之卿大夫蓋無田者禄出于廪有田者禄出于田下士視上農夫則食九人中士倍下士則食十有八人由是積之上士則食三十六人下大夫則食七十二人三等之國士大夫之禄不以國之大小為差而惟卿君不同者士大夫則分治其職之事則必以禄稱職君卿則兼治一國之事則必以禄視國故也周官子男之卿再命國語曰諸侯有卿伯子男有大夫無卿者以其無天子之命卿也王制亦曰小國之卿皆命于其君李氏曰天子之卿大夫士則以制其田請侯之卿大夫士則以奠其禄制其田所以凶年得以薄征奠其禄則豐年不得以多取之也延平周氏曰言禄秩之多寡制禄之法必本于上農夫者示其禄出于農也禄足以代己之耕而已若已為士則其家復有士田永嘉徐氏曰先王量禄以分田視口以計食其品節差等上焉不至于過制下焉不至于不足諸侯下士享百畆之利苟足以代耕免勞苦而已雖不能有餘而亦不至于不足其餘自卿以下其禄各殺以一則無多邑踰制之失諸侯分田雖多禄入自有定數亦無尾大不掉之患此先王制禄之美意也且先王分土以封諸侯固冝盡得其地以享侯國之富今乃山澤之所有則歸之公閒田之所有則歸之公侯國之禄餘又待用于天子而不敢私諸侯所得自十卿禄之外而無有覬心防閑若過嚴矣然君十卿禄乃君之所自得者爾而侯國之公用則取諸地入以給之其山澤間田雖歸之公上領於王官而實藏富于天下又封建之美意也春秋以來諸侯土地各有財賦皆足以用其民而戰其力其山澤之賦列國亦自擅而有之無復君十卿禄之制而于卿大夫禄地多踰古制一時諸侯皆任己意以行私賞故多强宗大族為國生患晉惠公一入國遽許里克以汾陽之田百萬僖十五年許丕鄭以負蔡之田七十萬此豈常典也哉在齊桓時伯氏亦有駢邑三百在魯成公時施氏之宰有百室之邑其他國可見矣後如鄭賞入陳之功子産以上卿受八邑三十二井為邑井九百畆推而計之視古時卿四大夫之禄之制亦大相遼絶矣宋之盟公與左師邑六十子罕削而授之齊慶父之變公與晏子邑六十晏子辭而復之此惟懼其足以召禍故卻而不受有如先生之制不暇論矣衛免餘言于衛曰惟卿備百邑晉叔向賦秦楚公子之禄皆百人之餼一卒百人其禄足百人此皆徇春秋之亂法非王法也漢諸侯官吏之禄諸侯相秩真二千石傅與中尉秩二千石二千石禄月得二十斛歳凡得一千四百四十石爾又漢天子為置諸侯不得私自加其禄也官吏之禄固有定制乃若諸侯王徹侯得自賦斂則几國之所入悉與之矣非過制乎是時漢之賦入不若吳海陵之倉而梁國之富或多于京師故諸侯易以叛逆其後自武帝殺侯國之勢行酎金之法而諸侯益衰列侯封君税入不給至低首仰給于富商大賈又其甚也諸侯王惟得衣食租税貧至乗牛車此漢中外所以殫㣲而王氏因以奪漢也又曰案君以下所食之禄皆助法之公田藉農夫之力以耕而收其租士之無田與庶人在官者則但受禄于官如田之入而已次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫其有中士下士者數各居其上之三分鄭氏曰此諸侯使卿大夫頫聘並㑹之序也其位爵同小國在下爵異固在上耳其有中士下士者謂其為介若特行而並㑹也居猶當也此據大國而言大國之士為上次國之士為中小國之士為下士之數國皆二十七人各三分之上九中九下九以位相當則次國之上士當大國之中中當其下小國之上士當大國之下凡非命士亦無出㑹之事春秋傳謂士為㣲孔氏曰此一節論諸侯使卿大夫士頫聘班序行列之法鄭註爵同謂同作卿則小國之卿在大國之卿下爵異謂大國是大夫小國是卿則小國之卿位當在大國上大夫之上其有中士下士數各居其上之三分者謂大國之士既在朝㑹若其有中國之士小國之士者其行位之數各居其上國之三分之二謂次國以大國為上而次國上九當大國中九次國中九當大國下九是當其大國之三分之二小國以次國為上小國上九當次國中九小國中九當次國下九是亦居上三分之二也是各居上之三分此文以大國為主以中國小國來當也嚴陵方氏曰三等之國其地與君互降一等故其卿大夫位之所當亦互降一等焉上大夫即卿矣有上中下卿而又有上大夫者蓋下大夫之上者也後言三等之國止曰上士二十七人則知中下之士諸侯之國或有或亡矣故此以其有言之其有者一有一亡之辭也三分者三分而等之也上士二十七人中下之士與之為三分焉則合而為八十一士矣故曰數各居其上之三分猶言各與上為三分也大夫則言其位士止言其數者蓋位以上下言數以多少言三等之國卿大夫之位或上當其中或中當其下位之上中下各隨其命也故以位言之至于士則殷以前皆不命焉故止言其數之多少而已長樂陳氏曰公之孤四命卿三命其大夫再命其士一命諸侯之卿大夫亦如之子男之卿再命其大夫一命其士不命其大國次國卿大夫士之命同矣而其相當之不齊如此者蓋視其國不視其命也卿執羔大夫執雁則所執固殊矣而小國之下卿猶不可以當大國之上大夫者蓋亦視其國不視其所執也上大夫則卿矣有上中下卿而又有上大夫者蓋下大夫之上者也夫卿大夫則賔也賔以位序故以位言之士則介也介則待之以數而已故以數言之其有中士下士數各居其上之三分則中士之禮居上士之三分而已下士之禮居中士之三分而已傳曰名位不同禮亦異數則有位必有數矣而記于卿大夫士别位數而言之者以其所主者殊亦互備也山隂陸氏曰自君十卿禄已上言禄自下當其上大夫已上言位自數各居其上之三分言數後言上士二十七人未有中士下士之數故此言之如此三分讀如去聲謂若上士二十七人則中士下士各八十一人延平周氏曰上士二十七人中士下士各居其上之三分則二百四十三人廬陵胡氏曰次國之上卿至下當其下大夫此臧宣叔之言也見左氏成公三年中士下士謂諸侯國内自有上中下三等之士也士之數國各二十七人三分之上士之數居大半中士下士之數各居上士之三爾先儒謂居上三分之二據經只云居其上之三分並不云三分之二又前云上士倍中士中士倍下士豈亦是大國士為上次國士為中小國士為下鄭誤矣永嘉徐氏曰先王分土惟有三有大國次國小國之異自三卿至于二十七士其在國之禄則倍差之不同其出國之聘則班列之有等先王豈苟為異哉蓋使之安分而無覬覦正名而不至于亂次其辨上下定民志者固如此且王制記次國之上卿當大國之中卿大國之上卿則略而不言春秋時士大夫嘗言之矣以為周制列國之卿當小國之君特是藉口故每以臣而敵君偃然主盟㑹而不辭于是垂隴之盟三國之君在焉而士榖專之新城之盟七國之君在焉而趙盾專之未㡬而樂林之師四國之君帥師以㑹晉大夫而不以為歉也肆然無所忌憚于是數大夫為鞌之戰以敵齊侯衆大夫為溴梁之盟以傲其上皆始事之驗也然後知先王不以明言者正名定分防㣲之意深矣成公之時晉荀庚衛孫良夫來盟是時荀庚位下卿而孫子位上卿臧宣叔舉周制以荅公其言合于周制矣乃曰衛在晉不得為次國衛晉俱侯爵也而以盟主先晉是又以強弱為大小也春秋士大夫雖能言周禮而移于習俗唯知巧利而不能由禮而左氏以為禮過矣晉叔向曰以國不以富如之何其以強弱也斯言得之矣馬氏曰若均大夫也則以國之大小為之序而大國在上也若小國之卿與大國之大夫則以爵之尊卑為之序而小國固在上也由此言之則説者為得之矣長樂劉氏曰春秋隠公元年及宋人盟于宿公羊傳稱孰及之内之㣲者也則中士下士亦有特行出與鄰國盟者不獨為其君之介也劉氏孟冶曰此言諸侯使卿大夫來聘立班行列之法國有三等故尊卑上下之序亦有三等春秋滕薛之争長挾好勝之私以紊先後之次是豈知朝廷之序進退之節哉故王者之制必辨夫大小之序次國之上卿行位止當大國之中中當其下下當其上大夫小國視次國為之差等耳夫王者之制于一聘㑹之間詳為之辨嚴為之禮諸侯之卿大夫視儀聴唱則雖有僭侈之心亦無所施雖有覬覦之心亦無自而發誰謂一聘㑹之禮先王之所敢後哉金華邵氏曰此參三等之國而言其卿大夫士制禄之相當者如此鄭氏見有位當之文遂以此為諸侯使其卿大夫聘㑹之序非也禄以位為差言位之當則足以知其禄之當也其有中士下士者數各居其上之三分蓋古者諸侯雖有上中下士惟上士常置中士下士有時而缺或有之則其制禄之數當居上士三分之一正如孟子所謂上士倍中士中士倍下士也故下文言大國三卿皆命于天子下大夫五人上士二十七人次國三卿二卿命于天子一卿命于其君下大夫五人上士二十七人皆不言中下士以此知有時而缺也凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國鄭氏曰立大國三十十三公也立次國六十十六卿也立小國百二十十二小卿也名山大澤不以封者與民同財不得障管亦賦税之而已此大界方三千里三三而九方千里者九也其一為縣内餘八各立一州此殷制也周公制禮九州大界方七千里七七四十九方千里者四十有九也其一為畿内餘四十八八州各有方千里者六設法一州封地方五百里者不過四謂之大國又封方四百里者不過六又封方三百里者不過十一謂之次國又封方二百里者不過二十五及餘方百里者謂之小國盈上四等之數并四十九一州二百一十國則餘方百里者百六十四也凡䖏地方千里者五方百里者五十九其餘方百里者四十一附庸地也孔氏曰此一節論四海之内九州州别建國多少及附庸閒田之法案爾雅釋地云九夷八狄七戎六蠻謂之四海則此言四海之内謂夷狄之内也州别方千里一州建百里之國三十七十里之國六十五十里之國百有二十鄭云十三公者天子縣内三公之國方百里今畿外大國亦百里是準擬畿内三公之地每十箇國則準一公三十國準于三公也十六卿者亦以畿内六卿之地方七十里今畿外次國亦七十里故準擬六卿六十也通三孤則謂之九卿據有職事者言之為六卿也十二小卿者小卿則天子畿内大夫國方五十里今畿外小國亦五十里是準擬大夫當十于十二小卿也十二小卿上重有十字是一州凡二百一十國其外餘地為附庸閒田也若封人附于大國謂之附庸若未封人謂之閒田每州二百一十國所餘之地則下文云方百里者十方十里者六十是也名山大澤若封諸侯則諸侯為主民不得取其財物故不封諸侯使民共取山虞職云令萬民時斬材有期日是也既不封諸侯其諸侯不得障塞管領禁民取物但隨其所取賦税而已澤虞云使其地之人守其財物以時入于玉府是也知為殷制者以夏時萬國則地餘三千里周又中國方七千里今大界三千非夏非周故知殷制也鄭註云周九州大界方七千里案大行人邦畿方千里其外方五百里謂之侯服甸服男服采服衛服要服服五百里通王畿四面相距為七千里大行人要服以外即云九州之外謂之蕃國是要服以内為中國也云設法一州封地方五百里不過四者謂假設為法非實封也故職方云千里封公以方五百里則四公註云每事言則者設法也每州四公八州則三十二公周之上公則惟把宋耳故知非實封也一州有千里之方六則一箇千里之方為方百里者百一箇五百里之國為方百里者二十五四箇二十五用千里之方一是方五百里者不過四也又封方四百里者不過六者以一箇四百里之國為方百里者一十六六箇一十六為九十六是用百里之方九十六為六箇四百里之國故云方四百里者不過六用千里之方一猶餘百里之方四也又封方三百里者不過十一者以一箇三百里之國為方百里者九十一箇九為九十九是用百里之方九十九故云封方三百里者不過十一用千里之方一猶餘百里之方一又封方二百里者不過二十五者以一箇二百里之國為方百里者四二十五箇二百里國用千里之方一故云封方二百里者不過二十五將此百里小國一百六十四添盈公侯伯子四等之數四十六則為一州二百一十國此為盈上四等之數也四等既有四十六若添滿二百一十必湏百六十四故云方百里者百六十四也云凡䖏地方千里者五方百里者五十九者封公四是用千里之方一封侯六又用千里之方一封伯十一又用千里之方一封子二十五又用千里之方一封男百又用千里之方一是䖏地方千里者五男國更湏六十四則應湏百里之方六十四但千里之方六封侯之外猶餘百里之方四千里之方封伯十一之外猶餘百里之方一是五箇千里之方内緫餘百里之方五得為五箇男國則五箇千里之方外更得五十九箇百里之方是滿六十四也云其餘方百里者四十一附庸地者以百里之方百去其五十九故餘四十一也案鄭註大司徒云侯附庸九同伯附庸七同子附庸五同男附庸三同今一州唯有方百里者四十一得備侯伯子男二百一十國附庸者鄭註司徒云凡諸侯為牧正帥長及有徳者乃有附庸非國國皆有且此云州别二百一十國及侯附庸九同皆設法而言非實事也臨川王氏曰王制千七百國乃周事也若執玉帛者萬國以為禹㑹塗山之時此左氏之妄也禹之㑹塗山東方不過㑹東方諸侯爾豈使四海之内㑹于一山之下哉以禹之時有萬國則不當指塗山而言也書曰萬邦者緫四海之内大略而言也鄭以畿内五百里國為設法而言也為設法言之則萬國又未可以為實數也且九州之地今可以見若皆以為國則山川沮澤不可以居民獨立一君孰為之民乎此蓋去古久逺書籍散亡自孟子時已不得周家班爵禄之詳況于焚詩書之後漢文之世乎長樂劉氏曰鄭氏謂此經為殷制是也謂殷之天下大界方三千里非也謂周公攝政致太平斥大九州大界方七千里是也蓋不知此經州方千里封三等之國二百一十國殷之法耳不必其地止于千里也夏書禹貢曰五百里甸服五百里侯服五百里綏服五百里要服五百里荒服東漸于海西被于流沙朔南暨聲敎訖于四海則夏后氏有天下設五服為方五千里矣是其大界以四海為鄰也殷頌曰古帝命武湯正域彼四方方命厥后奄有九有又曰邦畿千里維民所止肈域彼四海四海來格來格祈祈景員維河殷受命咸宜又曰上帝是祗帝命式于九圍則湯之有天下亦以四海為鄰與夏后氏無以異矣紂之無道也諸侯舍之而去歸于文王天下九州也其弗去紂者三爾周公攝政始作璧羡以起天下之尺度又作土圭以度天下之封疆用二物以見天下封界之實數乃畫五服為九而大啟諸侯五等之封雖然其大界亦不過用四海以為鄰與夫夏殷不别也但殷雖未亡而土田已削者諸侯盡朝于周也故文王之為西伯三分天下有其二矣而此經曰凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸間田者今以法推之二百一十國几三等共為地方百里者八十有九方十里者四十其餘方百里者十方十里者六十以為附庸間田然則千里之内又當三分去一以為名山大澤五溝五涂大川之所占不在此數則知此經乃殷人立九州之大法也不必其地止于是爾鄭氏泥其法以定其封域之大界不已疎乎而況文武之為西伯以事紂也小心翼翼有君民之大徳有事君之小心豈容夷狄侵虐中國以有其民哉故詩稱文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衛中國故歌采薇以遣戍役也出車以勞還率也杕杜以勸歸士也武王嗣之統一海内而周公承之以攝四海百蠻靡不面内而朝于京師此其所以為斥大者歟故増上公之封為方五百里諸侯方四百里伯方三百里子方二百里男方百里而名山大川五溝五涂在其外始見天下廣輪之實數而法在其中矣殷之大界方三千里者九州封國差等之大法也而地之實數不在其中焉然則三代皆以其徳作民父母為天下王莫不以四海為其大界也故此經曰自恒山至于南河千里而近自南河至于江千里而近自江至于衡山千里而遥自東河至于東海千里而遥自東河至于西河千里而近自西河至于流沙千里而遙西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之内㫁長補短方三千里為田八十萬億一萬億畆則四海之内為殷境土與夏周同矣是知此經乃其封國之法也明矣長樂陳氏曰夏之五服甸侯綏要荒而甸即王畿之地也國語曰邦内甸服又曰先王規方千里以為甸服王制曰千里之内曰甸自甸至綏凡三服服五百里面千五百里則為方三千里矣周之六服侯甸男采衛要而侯即王畿外之地也自侯至衛凡五服服五百里則方二千五百里矣方二千五百里與王畿千里則為三千五百里矣王制曰西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之内㫁長補短方三千里而禹貢東漸于海西被于流沙朔南暨聲教訖于四海則為方三千里可知矣書曰弼成五服至于五千蓋兼要荒言之也周公斥大中國不過五百里而已蓋自三千里而開方之三三而九為方千里者九自三千五百里而開方之五五二十五又有方百里者二十五九州之大界不過如此而鄭康成以為周之地方七千里七七四十九為方千里者四十九其一為畿内餘四十八八州州二百一十國餘方百里者四十一附庸地也然則職方氏之法蓋兼附庸言之也豈有百四十六國之外復有方百里者四十一為附庸乎周之設法州建百四十六國而附庸在焉此言二百一十國諸侯之附庸不與非周制也又曰名山大川皆天子使吏治之而入其貢賦九州川浸山藪各有職方不屬諸侯之版春秋諸侯或兼而擅之齊斡山海晉私郇瑕宋有孟豬楚有雲夢皆不入于王官故孔子作春秋虎牢不係鄭沙麓不係晉縁陵不係把楚丘不係衛蓋别天子之守地也夫先王之不朌之也將以弭諸侯之侈心而與民共利也又曰王制言凡四海之内九州八州二百一十國天子之縣内凡九十三國然後緫之以九州千七百七十三國天子之元士諸侯之附庸不與則一代之禮也康成以此八州州二百一十國為殷禮以下文天子之縣内九十三國為夏禮惑矣天子之地或曰甸或曰畿曰圻或曰縣曰寰而後世猶有縣官之稱孰謂畿獨施于殷周而縣獨施于夏乎嚴陵方氏曰名山若魯之泰山晉之梁山之類大澤若豫之孟豬楚之雲夢之類山澤之大者則必有其名焉于山曰名于澤曰大蓋互言之爾名山大澤神物之所藏寳貨之所出非外内諸侯所得專而有之故于外則不以封于内則不以朌焉外則度土而封之使傳嗣也故曰封内則分邑以朌之使食禄而已故曰朌馬氏曰自唐至周雖其治亂之不同而其土地之廣狹㫁長補短其大界皆方三千里而未之或易也三三為九則是為方千里者九也其一為天子之縣内餘八各立一州而州方千里也州建百里之國三十公侯之國也七十里之國六十伯之國也五十里之國百有二十子男之國也百里之國三十為方百里者三十也七十里之國六十為方百里者二十九有竒也五十里之國百有二十為方百里者三十也封百里之國為方百里者三十則其餘方百里者七十封七十里之國為方百里者二十九有竒則猶餘方百里者四十有竒封五十里之國為方百里者三十則猶餘方百里者十有竒合二百一十國而計之則封地八千九百四十里猶餘千六十里者以為附庸閒田名山大澤不以封者其利入于天子而諸侯有所不與焉間田者諸侯之有功則取于閒田以禄之其有削地者則歸之閒田鄭氏以為州方千里州二百一十國謂之殷制則其説非是也又以為周公斥大九州之界七七四十九而方千里者四十有九其一為畿内而餘四十八各立一州州方千里者則其説不經而君子亦勿稽之而已山隂陸氏曰畿内方百里之國三十十三公也七十里之國六十十六卿也五十里之國百有二十倍上六十國也畿内方百里之國九一大國之命也七十里之國二十有一三次國之命也五十里之國六十有三三上二十一國也李氏曰千里則得方百里者百百里則得方十里者百七十里則得方十里者四十九五十里則得方十里者二十五伯之田倍子男公侯之田倍伯天子之田十倍諸侯非如是不足以為維持之固也石林葉氏曰鄭氏以殷之大界方三千里而以開方計之則方千里者九其一為縣内餘八各立一州合内外而緫為千七百七十三國周公復唐虞之地分五服為九其要服之内方七千里意以夏末既衰中國之地為四夷所侵而至周公方能復之今攷于禹貢其所謂五服皆五百里為别則是要服之内通于四面距中國之地乃方三千里逹于荒服止于五干里康成既以殷之大界方三千里矣固合于禹貢中國之地而謂四夷所侵者果何地也周公雖斥大九州之界而地加于禹貢者纔五百里今職方氏分几州之邦國則方千里為王畿而自侯甸男至于采衛皆方五百里是五服之地方二千五百里合王畿而計之則方三千五百里由方三千五百里而分之合四面相距則方七千里迺康成所謂要服之内也蓋禹貢之所謂要荒即周官所謂蠻夷鎮蕃通要荒而合于禹貢中國之地則唐虞夏殷之時中外凡方一萬里通蠻夷鎮蕃而合于周官則周公之時中外凡萬一千里以其一千里之多是以周公斥大封疆纔五百里康成不知異同在此而惟見要服之内方七千里乃牽左氏執玉帛者萬國之説而謂唐虞之時非七千里不能容之且仲虺之誥嘗言表正萬邦纉禹舊服則是湯之時固有萬國者矣所謂大界三千里者何以能容之也然則九州之内千七百七十三國未必殷制而于虞夏周之制果何以合哉蓋所謂萬國者槩其成數未必實有之也湯既能以三千里而建千七百七十三國則唐虞夏周之時中國亦方三千里焉知堯舜不能建也今周官職方氏邦國千里封公則四侯則六伯則七子二十有五男百康成以開方約之為千里者九其一為畿内餘八州各方千里自公之封而下至于諸男添盈四等之數亦為一州二百一十國是周之制一與王制合焉知周公之時九州亦建千七百七十三國也王制所述大率多周制若五等諸侯受田視地與農夫制禄皆合于孟子班爵之序而千七百七十三國緫相屬而言之則疑于周制矣然由康成之説而求之湯以三千里而建國如此周以三千五百里又建國如此是亦未足信也孔子曰多聞闕疑慎言其餘則寡尤既疑而未足信闕而勿質可也新安朱氏曰封國之制漢儒之説只是立下一箇筭法非惟施之當今不可行求之昔時亦有難曉且如九州之地冀州極濶河東河北皆屬焉雍州亦濶陜西五路皆屬焉若青兖徐豫則疆界有不足者矣設如夏時封建之國至商革命之後不成地多者削其國以予少者如此則彼未必服或以生亂又如周王以原田與晉文其民不服至于伐之蓋世守其地不肯遽從他人若封王子弟必湏有空地方可封左氏載齊地蒲姑氏因之而後太公因之若武王不得蒲姑之地太公亦未有頓放䖏永嘉徐氏曰一州百箇方百里是方萬里十萬里地除了封百里之國三十是方三千里為三萬里地剰了方七千里更將方二千九百四十里封七十里之國六十緫前方五千九百四十里剰方四千六十里又封五十里之國百有二十緫前方八千九百四十里是八萬九千四百里剰方一千六十里是餘萬六百里作附庸講義曰王者奄有四海故以四海為界於四海之内别為九州鄭氏謂此為殷制豈非以周大司徒之建國自諸公五百里至諸男百里與此不同故邪然孟子言周室班爵禄亦曰公侯百里伯七十里子男五十里則知周官所載蓋并山川附庸言之耳大抵自禹治水之後别為九州殷因于夏無所變改周分冀為幽并合徐梁為雍青而其實則禹之制也是此經大槩言九州之制非必殷制矣州方千里建二百一十國百里者三十國七十里者六十國五十里者百有二十國鄭氏取其國之數以足其州之封域則宜其不合矣蓋此特言其大要爾建州之法必以千里儉于千里者不可以為州而封疆之廣不止于千里也建國之法州必二百一十國國必三等而其地之或加或削或興或廢或合或分州未必盡有二百一十國非實有是如三等之制也延平周氏曰州二百一十國非實有是國也特計其地之所能容者所謂凡九十三國同意慈湖楊氏曰堯典協和萬邦春秋傳禹㑹塗山執玉帛者萬國此言其大數耳使不滿萬亦可以言萬其不止于萬或倍萬亦可以言萬亦猶言萬物物奚止于萬邪萬民民奚止于萬邪皆舉其大略而言耳先儒顧必欲整整釋其所謂萬數鄭康成謂尚書州十有二師者州立十二人為諸侯師蓋百國一師州十有二師則州千二百國也八州九千六百國餘四百國在畿内則整整恰恰為萬國不多一不少一吁可哂哉公羊説殷三千諸侯周千八百諸侯孝經説亦云周千八百諸侯此或據古志而云漢博士求其説而不獲遂為之説曰四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國八州千六百八十國又天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國合為千七百七十三國以應周千八百諸侯之數武王之興不期而㑹盟津者八百諸侯康成又遂謂三分有二則殷末千二百諸侯牽合可笑之狀若此類奚可殫舉獨不思諸侯之建不知其所自始人羣生于天地之間皆有血氣心知不能以無欲欲則争争則鬬鬬則傷傷則殺其天性之美稍公且正者則足以服其比鄰比鄰歸之凡百取平焉則五有長十有長百有長千有長其徳愈大所服愈廣是故有小國之君又有大國之君其為君為長者地醜徳齊莫能相尚其間有聖人出焉舉天下咸歸服之是為帝為王夫所謂為君為長者皆諸侯也大小之數多少之數豈得而預定既弗克預定矣則又豈能新立法更易之增損之以合王制所言之數邪雖有更世易代武王克商滅國五十爾餘率因其舊則周所封建亦不多矣詎能盡更而易之雖有功徳則加地有罪則削地其有功徳者固不數見有罪者亦不數見姑因其舊乃勢之常而漢儒乃為是等等差差不可小有增損之制其亦不思甚矣禮記集説卷二十五
