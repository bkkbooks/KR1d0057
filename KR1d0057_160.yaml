body:
  text: 禮記集説卷一百六十宋衛湜撰故天子制諸侯比年小聘三年大聘相厲以禮使者聘而誤主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵內不相陵此天子之所以養諸侯兵不用而諸侯自為正之具也鄭氏曰比年小聘所謂嵗相問也三年大聘所謂殷相聘也孔氏曰此經明諸侯相聘問相厲以禮則內崇敬讓外不侵陵是自為正之具也天子立制使諸侯相於比年使大夫小聘三嵗使卿大聘來聘使者行聘之時禮有錯誤則主君不親自饗食所以使賔恥愧自勉勸厲天子制此禮使諸侯相親是存養諸侯無兵革之患國家得正由其外親諸侯也案大行人諸侯之邦交嵗相問也聘禮記云小聘曰問故鄭知小聘是嵗相問也大行人又云殷相聘也殷中也謂三年之時中而無事故稱殷也此經謂諸侯自相聘也而王制云諸侯之於天子比年一小聘三年一大聘與此不同者此經諸侯相聘是周公制禮之正法王制謂文襄之法故不同也藍田吕氏曰王制諸侯之於天子比年一小聘三年一大聘言諸侯之聘於天子也此篇云天子制諸侯比年小聘三年大聘言諸侯交相聘天子制其禮也使者聘而誤主君不親饗食者聘禮所謂大夫來使無罪饗之過則餼之異也上下不交則天下無邦人道所以不能羣也故先王之御諸侯使之相交以修其好必使之相敬以全其交其相交也必求乎疏數之中故比年小聘三年大聘也其相敬也必相厲以禮故使者之誤主君不親饗食以愧厲之然後仁達而禮行外則四鄰相親而不相侵內則君臣有義而不相陵也事豫則立不豫則廢先王之制禮以善養人於無事之際多為升降之文酬酢之節賔主有司有不可勝行之憂先王未之有改者蓋以養其德意使之安於是而不憚也故不安於偷惰而安於行禮不恥於相下而恥於無禮則忿爭之心暴慢之氣無所從而作此天下之亂所以止於未萌也天子以是養諸侯諸侯以是養其士大夫上下交相養此兵所以不用天下所以平也禮之節文之多唯聘射之禮為然節文之多養人之至者也射以選諸侯之貢士以數與於祭數不與於祭而行慶讓則諸侯必自為正於射禮矣聘以勸諸侯之交好使者之誤主君不親饗以愧之使者之愧有國者之愧也則諸侯必自為正於聘禮矣故二禮之義天子養諸侯之意為深故其義皆曰兵不用諸侯自為正之具也長樂陳氏曰使者得禮而榮君之命則有光華失禮而辱君之命則有愧恥故厲其使所以厲其君厲其君則敬讓行而兵不用矣古之人以禮相愧厲而不以怒此所以相成之道也此孔子所以貴使於四方不辱君命也嚴陵方氏曰相厲以禮者天子制諸侯以聘而使之相尊敬則各相勉厲以禮也使者以傳言為事傳言而失豈足以為使乎故主君不親饗食而愧厲之也愧以愧其心厲以厲其行也禮以節為事故相厲以禮則外不相侵禮以敬為心故相厲以禮則內不相陵也不相侵陵則兵不用各欲正己而已又安用戰以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也諸侯相厲以輕財重禮則民作讓矣鄭氏曰圭璋用之還之皆為重禮禮必親之不可以已之有遙復之也財謂璧琮饗幣也受之為輕財者財可遙復重賄反幣是也孔氏曰此一經明既聘還圭璋輕財重禮教民廉讓之意玉以比德故以圭璋而聘賔將歸時致此圭璋付與聘使而還其聘君也凡行聘禮之後饗君用璧饗夫人用琮加於束帛還圭璋之玉是重其禮留其璧琮之財是輕其財重者難以報復故用本物還之輕者易可酬償故更以他物贈之此是輕財重禮之義諸侯相厲以此則上行下效而民皆作其廉讓矣鄭注禮必親之言若親往彼國則可以己國所有執往行禮也既不親往則不以所有寶玉遙復償他國所來圭璋故還之也璧琮是財輕故可遙復之藍田吕氏曰聘禮執行人圭璋以致命天下之寶無尚於玉君子以玉比德焉言重我聘禮如玉之重且以達其君之信也聘君以圭聘夫人以璋半圭曰璋取法於隂陽之義也其圭璋典瑞所謂瑑圭璋璧琮以眺聘者也還圭璋而不還璧琮饗幣者聘以致命饗以致獻重命而輕獻所謂輕財而重禮也嚴陵方氏曰以儀禮考之有聘必有饗聘君則以圭聘夫人則以璋饗君則以璧饗夫人則以琮聘先於饗其禮為尊尊之故圭璋特而達饗因於聘其禮為親親之故璧琮有所加焉圭璋固有繅然特藉玉以為禮而已異乎璧琮之加於束帛以為財也故後言圭璋特達以此廬陵胡氏曰若諸侯朝天子則雖圭璋亦受之而不歸小行人饗天子用圭饗后用璋是也主國待客出入三積餼客於舍五牢之具陳於內米三十車禾三十車芻薪倍禾皆陳於外乘禽日五雙羣介皆有餼牢一食再饗燕與時賜無數所以厚重禮也古之用財者不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則內君臣不相陵而外不相侵故天子制之而諸侯務焉爾鄭氏曰厚重禮厚此聘禮也不能均如此言無則從其實也言盡之於禮欲令富者不得過也孔氏曰此一經明待賔之厚所以尊重聘禮并行禮讓則君臣內外不相侵陵所以諸侯務焉上公之臣出入三積故司儀云遂行如入之積若侯伯以下之臣則不致積故司儀云諸公之臣相為國客則三積注云侯伯之臣不致積也案聘禮致客有饔有餼今直云餼客者略言之於舍謂於賔館五牢之具謂飪一牢在賔館西階也腥二牢在賔館東階也餼二牢在賔館門內之西是皆陳於內也案聘禮米三十車設于門東東陳禾三十車設于門西西陳薪芻倍禾鄭注云薪從米芻從禾乘禽謂乘行羣匹之禽鴈鶩之屬聘卿則每日致五雙也羣介皆有餼牢者鄭注掌客云爵卿也則飱二牢饔餼五牢爵大夫也則飧大牢饔餼三牢爵士也則飧少牢饔餼大牢也一食再饗燕與時賜無數者此謂聘卿也一為之設食再為之設饗其歡燕與當時之賜無常數也古之用財不能均平常厚言厚則從其豐無則從其實古之用財既有隆殺而相聘之事費用如此豐厚者言豐財以行禮盡禮而用財雖有其財唯盡極於禮不可禮外過用其財也若用財能以禮自制不得過則於國內上下和睦君臣不相陵四鄰歸懷外不相侵也故天子制此聘禮諸侯務而行焉藍田吕氏曰上公五積卿下其君二等則三積也三積皆有牢禮米禾芻薪也致積之禮唯諸公之臣有之故聘禮不載也積者致重禮於其出入也饔餼者致重禮於其舍館也乘禽二羞俶獻將其勤也饗食燕盡其歡也皆所謂厚重禮也古者制國用量入以為出至於國新殺禮凶荒殺禮故有祈以幣更賔以特牲者則用財於賔客不皆如此之厚也然禮存其數者將使富而奢汰者不敢過制而儉嗇者不敢不盡也不敢過不敢不盡則盡之於禮此天子所以養諸侯使內外不相侵陵之道也嚴陵方氏曰主國謂主君之國也出入謂從來訖去也積若委積之積羣介皆有餼牢則無飪腥矣以殺於使臣故也燕盛於饗饗盛於食於食則一於饗則再於燕則與時賜無數盡之於禮則人各守其分故內君臣不相陵外不相侵也山隂陸氏曰據周官侯伯七十雙今曰日五雙雖曰諸侯大夫不應如是之懸也蓋日五雙旬而稍所致之禽也據聘禮旬而稍乘禽日如其饔餼之數羣介皆有餼牢一食再饗侯伯再食再饗子男一食一饗則上公之使食視子男饗視侯伯其米二十車禾三十車倣此據侯米三十車禾四十車子男米二十車禾三十車燕與時賜無數聘禮謂之俶獻獻言禮賜言義不言禽羞從時賜也故曰禽羞俶獻石林葉氏曰餼牢天産陽物也故陳於內米禾芻薪地産隂物也故陳於外饗所以訓恭儉也故至于再燕與時賜以示慈惠也故無數聘禮雖具如此而財有所不及則不必備然而苟有其財亦未嘗不盡於禮此先王所以養諸侯而兵不用也聘射之禮至大禮也質明而始行事日幾中而后禮成非強有力者弗能行也故強有力者將以行禮也酒清人渴而不敢飲也肉乾人飢而不敢食也日莫人倦齊莊正齊而不敢解惰以成禮節以正君臣以親父子以和長幼此衆人之所難而君子行之故謂之有行有行之謂有義有義之謂勇敢故所貴於勇敢者貴其能以立義也所貴於立義者貴其有行也所貴於有行者貴其行禮也故所貴於勇敢者貴其敢行禮義也故勇敢強有力者天下無事則用之於禮義天下有事則用之於戰勝用之於戰勝則無敵用之於禮義則順治外無敵內順治此之謂盛德故聖王之貴勇敢強有力如此也勇敢強有力而不用之於禮義戰勝而用之於爭鬭則謂之亂人刑罰行於國所誅者亂人也如此則民順治而國安也孔氏曰前經説聘禮既畢此一節又申明行聘之時禮儀既大日晚始罷故記者引唯勇敢之人能成禮事故於此明之此是聘義兼明射者以強有力之人非但聘而行禮又能射為武事故總明之聘射至大之禮非如冠昏暫時即畢也幾近也日近中而后禮成非強有力弗能行也酒清人渴而不敢飲謂射禮也欲射之時先行燕禮唯以禮獻酬不敢恣意醉飽若行聘禮但酌醴禮賔無酒肴之事故知此唯據射也日莫晚人斯懈倦猶齊莊而自整齊不敢懈怠以成就禮之節制此亦謂射禮故下即云以正君臣以親父子以和長幼也以正君臣謂賔射前行燕禮也以親父子和長幼謂鄉射前行鄉飲酒之禮也以上之事衆人所難君子之人特能行之故謂有行身能有行則事得其宜故云有行之謂有義有義則有果斷故云有義之謂勇取此總覆説聘之與射也勇敢射之所須強有力聘之所須天下無事謂兵革休息故用之於聘射之禮義有事謂軍旅數起故用於戰鬭必得勝也藍田吕氏曰節文之多唯聘射之禮為然故曰至大禮也質明行事至於日幾中而禮成酒清肉乾而不敢飲食非心夷氣平強有力而不憚煩則不能也非齊莊中正知所尊敬而不敢懈則不能也君臣父子長幼之義皆形見于節文之中人之所難我之所安人之所懈我之所敬故能行之者君子也君子之自養也養其強力勇敢之氣一用之於禮義戰勝則德行立矣其養人也養其強力勇敢之氣一用之於禮義戰勝而教化行矣此所以外無敵內順治國之所以安也射禮諸侯之射必先行燕禮卿大夫士之射必先行鄉飲酒之禮其未射也先行獻酬之節極於繁縟故有酒清肉乾而不敢飲食者也若聘禮則受聘受饗請覿然後酌醴禮賔無酒清肉乾之事特以節文之繁與射禮等皆至日幾中而禮成故射禮兼言之也長樂陳氏曰聘之為禮養諸侯而兵不用射之為禮亦養諸侯而兵不用是皆至大之禮非強有力者不能行之齊以言其心莊以言其容正齊以言其儀言養諸侯而兵不用又曰天下有事用之於戰勝何也蓋先王之禮可以常安而不能使安之必常可以杜亂而不能使亂之必杜則禮義在我而兵戰在天在我者不可不修在天者順之而已故用之於兵戰亦至於無敵也嚴陵方氏曰此聘禮兼言射者賔聘亦有射故因而明之且賔有賔之射則聘有聘之射明矣自質明始行事而下以言聘之難行也自酒清人渴而下以言射之難行也酒以久故清肉以久故乾揚子言日昃不食肉射又至於日莫者以先行禮而後射故也一有一亡為有衆人之所難而君子行之故謂之有行義理禮之文也而無文不行故有行之謂有義勇敢言其發於內者強有力言其形於外者兩相交為戰我克彼為勝戰勝則因與彼敵故曰外無敵禮義則本乎我治故曰內順也戰勝合天下之公義故用之於禮義則足以順治爭鬭由一時之私忿故誅之以刑罰而謂之亂也山隂陸氏曰禮成猶言反饋樂成樂於是成焉爾非訖於斯也鄭氏謂禮畢非是齊內也莊外也正內也齊外也有義之謂勇敢孔子曰見義不為無勇也新安朱氏曰案疏云此雖總結聘射然自酒清肉乾日莫成禮父子長幼之語似據射鄉而言恐射鄉之義失次在此或相因而言歟石林葉氏曰古之所謂勇敢而強者勇於義而已唯其勇於義故能行禮能行禮則習其俯仰而行列得正焉習其進退而坐作得齊焉故施之於戰勝則無敵者此也所謂盛德者以其備具而已猶禮器謂大備盛德是也子貢問於孔子曰敢問君子貴玉而賤珉者何也為玉之寡而珉之多與孔子曰非為珉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉溫潤而澤仁也縝密以栗知也廉而不劌義也垂之如隊禮也叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也圭璋特達德也天下莫不貴者道也詩云言念君子溫其如玉故君子貴之也鄭氏曰珉石似玉或作玫也色柔溫潤似仁也縝緻也栗堅貌劌傷也義者不苟傷人也垂之如隊禮也禮尚謙卑也樂作則有聲止則無也越猶揚也詘絶止貌也樂記曰止如稿木瑕玉之病也瑜其中間美者玉之性善惡不相掩似忠也孚讀為浮尹讀如竹箭之筠浮筠謂玉采色也采色旁達不相隱翳似信也虹天氣也精神亦謂精氣也山川地所以通氣也特達謂以朝聘也璧琮則有幣唯有德者無所不逹不有須而成也道者人無不由之言念君子言我也貴玉者以其似君子也孔氏曰以聘用玉因論玉有諸德而結成聘義之篇與疑辭也孔子言貴玉由其德德非以少也玉色溫和而潤澤故似仁玉體密緻而堅剛似知廉稜也玉體雖有廉稜而不傷割於物故似義垂之而下墜似禮以物叩擊其聲清泠發越以長逺其擊之終音聲則詘然而止不如鐘聲擊罷猶有餘音也故似樂玉在山川之中精氣徹見於外與地同也圭璋特得通達不加餘幣同人之有德不假他物而成也天下貴之與道相似故云道也引詩秦風小戎之篇美秦襄公之詩證玉以比德也藍田吕氏曰因聘禮用玉故以子貢問玉一章附於聘義之末君子不貴難得之貨故玉之貴非以寡珉之賤非以多也玉者山川至精之所融結其德之美有似乎君子故君子服之用之所以比德而貴之也珉石之似玉者也似是而非君子賤之如紫之於朱莠之於苗鄉原之於德也玉氣粹精之所發則溫潤而澤如君子之仁溫厚深淳之氣形諸外也玉理密緻而堅實如君子之知密而不疏則中理堅而不解則可久也金之有廉雖利也用之則傷玉之有廉雖不利也用之則不能傷如君子之義其威雖若不可犯卒歸於愛人而已玉之體重垂之則如墜而欲下如君子之好禮以謙恭下人為事故曰禮也凡聲滯濁而韻短者石也清越而韻長者玉也始洪而終殺者金也始終若一者玉也此玉之聲所以與金石異也其終詘然所謂始終若一所謂玉振之也者終條理也樂之始作翕如至于皎如以成歌者止如稿木其合止皆無衰殺之漸則君子於樂其終詘然如玉之聲也玉之瑜者其美也瑕者其病也玉之明洞照乎內外瑜瑕不能相掩如君子之忠無隱情善惡盡露而無所蓋故曰忠也孚尹未詳或曰信發於忠謂之孚也信也尹或訓為誠亦信也玉之明徹藴於內而達於外猶君子之信由中出也先儒以孚為浮以尹為筠如竹箭之筠謂玉采色也其文其音既悉有改義亦無據恐未然也玉之瑩者光氣能達于天所謂氣如白虹也韞諸石中則光輝必見所謂精神見于山川也如君子之達于天則與天同德充實而有光輝則與地同德也玉之為璧琮其用也必有幣以將之玉為圭璋特達而已不用幣也如君子之德無待乎外也莫非物也玉之為物天下貴之莫非道也君子之道天下尊之故曰天下莫不貴者道也長樂陳氏曰古人用玉皆象其美若鎮圭以召諸侯以恤凶荒所以用其仁也齊有食玉所以用其知也牙璋以起軍旅所以用其義也國君相見以瑞相享以璧所以用其禮也樂有鳴球服有佩玉所以用其樂也邦國以玉節所以用其信也琬圭以結好琰圭以除慝所以用其忠也四圭有邸以祀天而蒼璧以禮天此用其能達於天也兩圭有邸以祀地而黃琮以禮地此用其能達於地也圭璋特達此用其能達於德也已饗而還圭璋已朝而班瑞此皆古之為器以用玉之美者也古之言比君子於玉者若比於仁則詩曰言念君子溫其如玉是也又比於知則詩曰追琢其章金玉其相是也有比於樂則孟子曰玉振終始條理是也有比於信則揚子曰如玉如瑩爰變丹青是也有比於忠則傳曰瑾瑜匿瑕國君含垢是也有比於德則詩言如圭如璧是也有比於道則子貢曰有美玉於斯韞櫝而藏諸是也此古人比君子於玉者也又樂書曰義近禮仁近樂仁義人道也禮樂資之以為本禮樂人文也仁義資之以為用垂之如隊禮也以卑為尚故也叩之其聲清越以長其終詘然樂也以反為文故也君子比德於玉而禮樂與焉豈非禮樂皆得謂之有德歟嚴陵方氏曰君子貴玉而賤珉者豈以其多寡而為貴賤哉玉之所以可貴者有德存焉爾故曰夫昔者君子比德於玉焉下文所言皆其德之别也澤則言其潔而明也廉言有分際以自守劌言有刻制而無傷禮以卑為體而以重為德故曰垂之如隊禮也山隂陸氏曰廉而不劌義也若陳仲子廉而劌者也孚尹旁達尹正也孚尹猶言信正言玉堅貞之德外達信也升氣如虹上達隱見無常是之謂天精神見於山川所謂石韞而山輝水為之五色此歟精神妙矣以猶有所麗是故謂之地石林葉氏曰人之大德曰仁故先溫潤而澤有仁未嘗無知故次之以縝密以栗有知矣非義則不足以制事故次之以廉而不劌義所以充實乎內禮所以節文乎外故次之以垂之如隊立於禮必成之以樂故次之以其聲清越以長自仁而至成於樂則修身之至矣可以出而應物故忠者不欺於內外則次之以瑕瑜不相掩也忠以待物而物必信故次之以孚尹旁達也忠信人德而已人德備則與天地參故次之以氣如白虹精神見乎山川也與天地參則歸於德而退藏於道矣故終之以圭璋特達天下莫不貴者也馬氏曰玉之為德散而言之雖有十者之名合而論之皆謂之德君子之所貴者特此德也然詩曰溫其如玉則溫者溫潤之仁而已其能盡玉之德乎蓋溫者德之始言始所以見終也論語言孔子之五德則始以溫夔教胄子以四德亦始於溫而詩亦曰溫溫恭人惟德之基豈非溫者德之始歟觀夫天時以春溫為四時之始皆此意喪服四制第四十九孔氏曰案鄭目録云名曰喪服四制者以其記喪服之制取於仁義禮知也此於别録舊説屬喪服然以上諸篇皆記儀禮當篇之義故每篇言義也此則記者别記喪服之四制非記儀禮喪服之篇故不云喪服之義也長樂陳氏曰冠義修之身者也昏義修之家者也鄉射修之鄉與國者也燕聘四制修之國與天下者也其序如此凡禮之大體體天地法四時則隂陽順人情故謂之禮訾之者是不知禮之所由生也夫禮吉凶異道不得相干取之隂陽也喪有四制變而從宜取之四時也有恩有理有節有權取之人情也恩者仁也理者義也節者禮也權者知也仁義禮知人道具矣鄭氏曰禮之言體也故謂之禮言本有法則而生也口毁曰訾吉禮凶禮異道謂衣服容貌及器物也取之四時謂其數也取之人情謂其制也孔氏曰此篇總論喪之大體有四種之制又明三年喪以下節制之差結成仁義之事天地之間皆禮以體定之四時隂陽人情無物不總也喪有四制變而從宜者言門內主恩若於門外則變而行義尊卑有定禮制有恆以節為限或有事故不能備禮則變而行權是皆從宜取之人情也恩屬於仁理屬於義節屬於禮量事權宜非知不可人道具矣此總結四制之義藍田吕氏曰先王制禮之意象法天地以達天下之情而已書曰天敘有典體也人倫之謂也天秩有禮用也冠昏喪祭射鄉朝聘之類也二者皆本於天此禮之所由生也禮之有吉凶猶天之有隂陽可異而不可相干也禮有恩有理有節有權猶天之有四時可變而不可執一也仁義禮知人道具矣人道具則天道具其實一也嚴陵方氏曰恩則有所愛故曰仁理則有所宜故曰義節則有所制故曰禮權則有所明故曰知此四者人之所由廢一不可也取之者謂取而法之故也其所謂則也順也蓋亦若是而已馬氏曰天地者禮之本也隂陽者禮之端也四時者禮之柄也人情者禮之道也恩理所以厚其死節權所以存其生厚其死者故為父斬衰三年為君亦斬衰三年存其生者故曰毁不滅性不以死傷生也廬陵胡氏曰一體不備不足謂之成人體者何也禮也所謂大體者何也體天地法四時則隂陽順人情禮之大體也非禮之大體不足以為大非聖人不足以知禮之大故曰訾之者是不知禮言隂陽四時人情而不言體天地者天地囊括此三者也言仁義禮知而不及信者仁義禮知非信不立既言人道具則信在其中可知矣其恩厚者其服重故為父斬衰三年以恩制者也門內之治恩掩義門外之治義斷恩資於事父以事君而敬同貴貴尊尊義之大者也故為君亦斬衰三年以義制者也孔氏曰此一節明四制之中恩制并義制也父恩最深故特舉父言之其實門內諸親之服皆恩制也門內之親故得行私恩掩公義若公羊傳云有三年之喪君不呼其門是也門外謂朝廷之間公朝當以公義絶私恩若曾子問父母之喪既卒哭金革之事無辟是也資於事父言操事父之道以事君則敬君與父同也貴貴謂大夫之臣事大夫為君大夫尊貴臣能盡敬故曰貴貴也尊尊謂天子諸侯之臣事天子諸侯為君同為南面臣能極敬故曰尊尊也義斷恩門外如一雖復大夫與王侯有異而其臣敬不殊故並云義之大者也故為君亦斬衰三年同於父也藍田吕氏曰父子之道天之合也其愛不可解於心以恩制者也君臣之道人之合也義則從不義則去此以義制者也情之至者遂之則無窮也情至于無窮則賢者過之不肖者不可繼道所以不行此不可不以節制者也遂其所不得申則無等差施之於所不必用則事無實責之於所不能具則力不給必之於所不能行則人告病此不可不以權制也故恩莫大於父服莫重於斬衰極其恩而制其服也極天下之愛莫愛於父極天下之敬莫敬於君愛敬生乎心與生俱生者故門內以親為重故為父斬衰親親之至也門外以君為重故為君亦斬衰尊尊之至也內外尊親其義一也故以事父之義施之君此君之服以義制者也創巨者其日久痛甚者其愈遲遂其無窮之情則情之過者不至於滅性傷生則不止也情之不及者不知其所勉矣故三日而殯未殯不食既殯食粥納財朝暮皆一溢米三月而葬未葬不沐既葬將虞然後沐浴期而小祥既小祥然後練冠練衣蓋毁不可以久久則滅性以死傷生不得伸其孝矣天性之恩非不重也然先王制禮必立之中制使賢者不敢過不肖者不敢不勉此道之所以行而無弊也恩雖重也嵗月之久則不可不除故喪不過三年苴麻之衰所以為至痛飾也非求乎完且久故服雖敝而不補葬之為言藏也封之所以識也非求乎髙大而終不夷也故墳墓不培哀雖甚也已過則不可不樂故既祥而後樂者皆所以示恩重哀亦不可以無終此所以為之節也魯昭公十九有童心比葬三易衰傳亦記其違禮也孔子既得合葬於防封之崇四尺孔子先反門人後雨甚至曰防墓崩孔子泫然流涕曰吾聞之古不修墓蓋不修墓者先王所以節孝子之心孝子雖所不忍言而不敢過也檀弓曰祥而縞是月禫徙月樂又曰孔子既祥五日彈琴而不成聲十日而成笙歌又曰魯人有朝祥而暮歌者子路笑之子曰由爾責於人終無已夫子路出子曰又多乎哉踰月則善矣孟獻子禫縣而不樂夫子曰獻子加於人一等矣由此觀之既禫徙月然後可樂然孔子亦未以朝祥暮歌為非而既祥五日彈琴乃躬行之何也蓋祥者吉也自練至于祥漸而即吉則古人既祥可樂矣然又至于禫之徙月為樂不忍遽也以孟獻子禫縣而不樂孔子謂加於人一等推之則樂可行於既祥然行於既祥善也既禫猶不樂此加於人一等也記謂孔子既祥五日而彈琴又曰踰月則其善其説皆可疑也此篇乃曰祥之日鼓素琴告民有終其説尤不可取除喪乃可為樂未聞為樂以告喪之終仁人孝子之情疑不出乎此也謂既祥而樂猶可矣祥之日鼓素琴或未然嚴陵方氏曰天生時地生財人其父生則恩之厚者莫如父斬衰服三年則服之重者莫如斬衰服之重輕凡以稱恩之厚薄爵有貴賤而貴莫貴於君位有尊卑而尊莫尊於君故曰貴貴尊尊馬氏曰貴貴者以賤言之尊尊者以卑言之有爵者為貴無爵者為賤尊者爵之上者也卑者爵之下者也士庶人無爵故為賤卿大夫有爵故為貴有爵而為貴則不可以謂之賤也其視於天子諸侯卑而已矣故曰貴貴者大夫之君也尊尊者天子諸侯之君也三日而食三月而沐期而練毁不滅性不以死傷生也喪不過三年苴衰不補墳墓不培祥之日鼓素琴告民有終也以節制者也資於事父以事母而愛同天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也鄭氏曰食食粥也沐謂將虞祭時也補培猶治也鼓素琴始存樂也三年不為樂樂必崩孔氏曰此一節明四制之中節制也士虞記曰沭而不櫛虞後有事得沐浴也故雜記云非虞祔練祥無沐浴苴麻之衰雖破不補一成丘陵之後不培益其土大祥鼓素琴始存省此樂以上事教民哀有終極以禮節為限制此下申明節制欲尊歸於一言持事父之道以事於母恩愛雖同服乃有異以不敢二尊故也藍田吕氏解見前嚴陵方氏曰練謂練帛以為冠毁謂瘠其身毁而過制則傷生矣鼓琴固所以散哀止以素而不加飾以示有漸也凡此皆以禮節之而不使過哀焉事君同事父之敬而愛則異者以其內外之别也事母同事父之愛而敬則異者以其尊親之殊也馬氏曰君者疏也資於事父以事君而尊同故為君斬衰三年以義制者也母者親也資於事父以事母而愛同故父在為母齊衰期以權制者也疏者宜殺而以尊隆之故曰義親者宜隆而以卑殺之故曰權權不可以為正者也賈氏曰子為母屈而期心喪猶三年故父雖為妻期而除三年乃娶者達子心喪之志也儀禮疏河南程氏曰古之父在為母服期今則皆為三年之喪皆為三年之喪則家有二尊矣可無嫌乎處今之宜服齊衰一年外以墨縗終月算可以古之禮全今之制杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也百官備百物具不言而事行者杖而起言而后事行者杖而起身自執事而后行者面垢而已秃者不髽傴者不袒跛者不踊老病不止酒肉凡此八者以權制者也鄭氏曰五日七日授杖謂為君喪也扶而起謂天子諸侯也杖而起謂大夫士也面垢而已謂庶民也髽婦人也男子免而婦人髽髽或為免孔氏曰此一經明四制之中權制也所以先明杖者以下有不應杖而杖又有應杖而不杖皆是權宜故先舉正杖於上杖之所設本為扶病而以爵者有德其恩必深其病必重故杖者為爵者設故云爵也三日五日七日厯敘其爵之人也曰擔主者喪服傳云無爵而杖者何擔主也鄭注云擔假也尊其為主假之以杖輔病者喪服傳云非主而杖謂庶子以下雖非適子皆杖為其輔病故也婦人童子不杖謂未成人之婦人幼少之男子也王侯委任百官不假自言而事得行故許子病深雖有杖不能起須人扶也大夫士既無百官喪服須己言而後行故不許極病所以杖而起庶人無人可使不許病故有杖不用面有塵垢之容而已子於父母貴賤情同而病不得一故為權制髽者婦人之大紒重喪辮麻繞髮秃者無髮故不髽男子秃亦不免也袒者露膊傴者可憎故不露也跛人腳蹇故不跳躍老及病身己羸瘠又使備禮必致滅性故酒肉養之夫喪禮宜備今有此八條不可強逼故聖人權宜制也所謂八者謂應杖不杖不應杖而杖一也扶而起二也杖而起三也面垢四也秃者五也傴者六也跛者七也老病八也庾氏云父存為母一也不數杖與不杖之科藍田吕氏曰先王制禮不遂其所不得申上文父在為母齊衰期是也不施於所不必用婦人童子不杖是也不責其所不能給身自執事面垢而已是也不必其所不能行秃者不髽傴者不袒之類是也四者禮有所不能行故以權制之也所謂凡此八者父在為母齊衰期一也婦人童子不杖二也杖而起三也面垢四也秃者不髽五也傴者不袒六也跛者不踊七也老病不止酒肉八也先儒以為母期為屬前章而加扶而起為一夫不言與扶而起乃喪禮之當然貴者盡之賤者有所不得遂故有杖而起者有面垢者蓋以權制也若扶而起則禮之正非權也父在為母期正以權制而云屬前章非也庾氏之取父存為母為一而不知扶而起非權又不數婦人童子不杖之科亦非也先王制禮其本致一而不可二也婦人已嫁為夫斬為其父齊衰期其致一於夫雖父不得而抗也親莫隆於父母父在為母齊衰期其致一於父雖母不得而抗也故愛有等差仁義所以並行而禮所由立致于一也喪之有杖所以輔病也孝子毁瘠之至非杖不能起後世因之以為節文親喪則親者杖君喪則有爵者杖童子當室則杖皆以其主喪而有杖故曰擔主也喪服傳曰杖者何爵也無爵而杖者何擔主也鄭氏以擔音假曰擔假也尊其為主假之以杖字訓未之見恐止音擔擔負荷也負荷所主之喪故授之以杖也國君之喪三日子夫人杖五日大夫世婦杖大夫之喪既殯主人主婦室老皆杖士之喪三日之朝主人杖婦人皆杖則婦人有杖矣此云婦人不杖者先儒云謂皆以幼不能病故不杖其義然也嚴陵方氏曰伊耆氏言軍旅有爵者杖則不特喪事為然凡以優貴者也三日五日七日則以爵之貴賤而為授之早晚節也凡此皆非禮之經故曰以權制權者反經而合道也始死三日不怠三月不解期悲哀三年憂恩之殺也聖人因殺以制節此喪之所以三年賢者不得過不肖者不得不及此喪之中庸也王者之所常行也書曰髙宗諒暗三年不言善之也王者莫不行此禮何以獨善之也曰髙宗者武丁武丁者殷之賢王也繼世即位而慈良於喪當此之時殷衰而復興禮廢而復起故善之善之故載之書中而髙之故謂之髙宗三年之喪君不言書云髙宗諒暗三年不言此之謂也然而曰言不文者謂臣下也禮斬衰之喪唯而不對齊衰之喪對而不言大功之喪言而不議緦小功之喪議而不及樂鄭氏曰不怠哭不絶聲也不解不解衣而居不倦息也諒古作梁楣謂之梁暗讀如鶉䳺之䳺暗謂廬也廬有梁者所謂柱楣也言不文者謂喪事辨不所當共也孝經説曰言不文者指士民也唯而不對侑者為之應耳言謂先發口也此謂與賔客也孔氏曰此一節覆明前經四制之中節制之事喪三年為限節期之間朝夕恆哭三年憂者不復朝夕哭但憂戚而已恩漸減殺也聖人因孝子情有減殺制為限節此喪之中平常行之節也既虞之後施梁而柱楣故云諒暗之中對而不言對其所問之事不餘言也言而不議但言説他事不與人論議相問答也藍田吕氏曰子之於親天性也不可解於心也執親之喪創巨痛深雖日月之久豈有殺乎此君子所以有終身之憂然喪必有月算服必有變除天地已易四時已變哀之感者亦安能無殺創巨者其日久痛甚者其愈遲此以恩之薄厚而有久近之殺也三日不怠三月不解期悲哀三年憂此以日月之久近而有哀戚之殺也始死哭不絶聲水漿不入口者三日此三日不怠也未葬哭無時居倚廬寢不絶絰帶此三月不解者也既虞卒哭惟朝夕哭此期悲哀者也既練不朝夕哭哭無時謂哀至則哭此三年憂也君子之居喪期合乎中者也有如是之隆殺聖人因隆殺而制其禮所謂品節斯斯之謂禮者也禮者所以教民之中故三年之喪賢者不得過不肖者不敢不勉也三年之喪自天子達於庶人古之道也書獨稱髙宗諒暗三年不言者先王之禮墜王者之貴有不能行之者髙宗以善喪聞而廢禮所由興故善之也慈良於喪善喪之謂也書云髙宗諒暗三年不言此云諒暗暗隂同義信默之謂也鄭氏不見古文尚書其説迂逺殆不可取不言而後事行此人君之喪禮故髙宗三年不言也言而後事行者杖而起故言不文此士大夫之喪禮也所謂斬衰之喪唯而不對齊衰之喪對而不言非人君而亦不言者謂與賔客接也若治喪之事則亦言而後行事也唯而不對相者代之對也對而不言應之而不倡也言而不議者無往反酬問也議而不及樂有往反酬問而不及樂事也此因論三年不言與言不文而及之也故備引五服之喪哀之發於言語之節也山隂陸氏曰孝常行也今載而髙之則以不能喪者多故也老子曰大道廢有仁義六親不和有孝慈中宗中而已髙宗中而髙焉故曰中而髙之故謂之髙宗父母之喪衰冠繩纓菅屨三日而食粥三月而沐期十三月而練冠三年而祥比終兹三節者仁者可以觀其愛焉知者可以觀其理焉強者可以觀其志焉禮以治之義以正之孝子弟弟貞婦皆可得而察焉鄭氏曰仁有恩者也理義也察猶知也孔氏曰此一節更覆結居父母之喪能終此三節可以知其德行三節者初喪至沐一也十三月練二也三年祥三也仁者居喪可以觀其知愛親知者居喪則合道理強者居喪則能守其志節用禮以治喪事用義以正喪禮則是孝子弟弟貞婦也藍田吕氏曰父母之喪其大變有三始死至于三月一也十三月而練二也三年而祥三也莫不執喪也善於此者難莫不善其始也善於終者難故終兹三節以善喪稱者則孝子弟弟貞婦可得而知也惻怛痛疾悲哀志悶非仁者之篤於愛則不能也然哭踊無節喪期無數服不别精粗位不别賔主乃野人夷狄直情徑行者其知不足道也哀之發於容體發於聲音發於言語發於飲食發於居處發於衣服輕重有等變除有等至于襲含斂殯之具賔客弔哭之文無所不中於禮非知者之明於理則不能也然有其文矣實不足以稱之有其始矣力不足以終之其強不足道也喪事不敢不勉此強有志者之所能也故古之善觀人者察其言動之所趨而知其情驗其行事之所久而知其德親喪者人之所自致者也哭死而哀非為生者則其仁可知矣生事之以禮死葬之以禮祭之以禮則其知可知矣先王制禮不敢不及則其強可知矣故君子之觀人常於此而得之禮記集説卷一百六十
