body:
  text: 禮記集説卷五十四宋衛湜撰禮運第九孔氏曰案鄭目録云名曰禮運者以其記五帝三王相變易隂陽旋轉之道此於别録屬通論橫渠張氏曰禮運本是一片假文字混混然一大意須是據大體而觀之乃能見若句句字字細碎求之必不能得嘗觀禮運有時混混然若身在太虛中意思𢎞大然不能得久不惟禮運要作一大意觀之如中庸儒行亦當如是或謂間有害處據大體觀之自是大片假文字以己心難包管盡他意如天降甘露地出醴泉若堯舜之世實求此物則安得也但言其至和可致不必須有此山隂陸氏曰禮運者是禮樂之運非道德之運蓋運祚推移而禮行焉雖聖人不能違也然則大同小康時而已矣長樂陳氏曰形而上者謂之道形而下者謂之器道則運而無所積器則滯而有所拘禮器言禮之器則禮運言禮之道也嚴陵方氏曰行於萬物者道也載道而行者禮也帝王盛時以義起禮驅騁而轉徙未嘗息故其經世之迹不能無異其軌轍焉於是則有大小之別同異之名矣此篇所言乃其義也昔者仲尼與於蠟賔事畢出遊於觀之上喟然而嘆仲尼之嘆蓋嘆魯也言偃在側曰君子何嘆孔子曰大道之行也與三代之英丘未之逮也而有志焉鄭氏曰蠟者索也歲十二月合聚萬物而索饗之亦祭宗廟時孔子仕魯在助祭之中觀闕也孔子見魯君於祭禮有不備於此又覩象魏舊章之處感而嘆之言偃孔子弟子子遊大道謂五帝時也英俊選之尤者逮及也言不及見志謂識古文不言魯事為其太切廣言之孔氏曰此篇凡四假自此至小康為第一明孔子為禮不行而發嘆遂論五帝三王優劣之事鄭引郊特牲十二月蠟據周言之夏則十月殷則十一月謂建亥之月也以萬物功成報之案月令孟冬云大割祠于公社臘先祖五祀故鄭云亦祭宗廟總而言之謂之為蠟若析而言之祭百神曰蠟祭宗廟曰息民故鄭注郊特牲云息民與蠟異此據總而言之故祭宗廟而云與于蠟賔也下云出遊於觀之上故知是祭宗廟也以仲尼與蠟祭故鄭知仕魯也魯臣而稱賔者以祭祀欲以賔客為榮故也爾雅釋宫云觀謂之闕孫炎云宫門雙闕者舊縣法象魏使民觀之處因謂之闕亦名象魏魏巍也其處巍巍髙大也何休注公羊天子兩觀外闕諸侯臺門則諸侯不得有闕魯有闕者魯以天子之禮故得有之也公羊傳云設兩觀乘大路此皆天子之禮是也案定二年雉門災及兩觀魯之宗廟在雉門外左孔子蠟祭事畢出廟門往雉門登遊於觀之上喟是嘆之形貌作記者言其所嘆之由言蓋者謙為疑辭不敢指正於是言偃問嘆何事孔子若指言魯失禮恐其太切故廣言五帝以下之事謂五帝大道之行并與三代英異之主若禹湯文武等雖不及見而有志記之書尚可知也志是記識之名案辨名記云倍人曰茂十人曰選倍選曰俊千人曰英倍英曰賢萬人曰傑倍傑曰聖熊氏曰當門闕處以通行路言雙闕明門之兩旁相對為雙也遊目看於觀之上嚴陵方氏曰助祭者必有飲食以勞之故謂之賔焉文王世子於釋菜言退賔者以此大道之行謂五帝之上也三代之英謂三王之時也以其無名無迹故以道稱之以其代廢代興故以代稱之禮至於三代其文極矣故以英言之言三代之為英以見五代之為質以五帝為大道之行則知三代為大道之隱矣時繫乎聖人之在上者也孔子以窮而在下不得其時故其言如此然時無常也或可待焉故止言未而已蔣氏君實曰禮莫重於祭祭莫重於蠟故記禮之君子首以夫子蠟賔之嘆而發諸禮運之篇考之於經蠟之始末郊特牲論之詳矣夫子又嘗與子貢言蠟則曰百日之蠟一日之澤非賜之所知何哉其可知者蠟之祭也其不可知者古先聖王之遺風餘澤也古者上下之間勢位未隔文法未備而歲時蠟禮之講終以序飲其重農力本存愛示情之意見於祈祝禱禳之間勞來勸相之際仁之至義之盡粵自王政不修而典禮在魯者望魯之意謂其一變而至於道而不可與他國槩言者也今也聖人傷世偽之寖起知古典之無傳而於蠟賔畢事之後出為觀上之遊喟然為之太息記者紀其所嘆在魯不知魯之為蠟其能盡存於古否乎魯之郊禘非禮也其蠟可知矣然則發蠟之旨微矣聖人傷古治之不復因蠟禮而有見不有偃也為之發問則何以窮夫子感嘆之機夫既以帝者之事為大同而指三代為小康矣而均曰未之逮也而有志焉何哉此有以見聖人思欲還上古之風而不可得而猶思其次也故其下歷歷言之篇內同講義曰夫蠟之祭為仁之至義之盡先王報祭之禮為息且有休老勞農之事孔子既與蠟賔而觀之以知當時雖足以得古之禮而未足以得古人為禮之意此大道所以未行也故孔子喟然而嘆魯焉大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所飬男有分女有歸貨惡其棄於地也不必藏於己力惡其不出於身也不必為己是故謀閉而不興盜竊亂賊而不作故外户而不閉是謂大同鄭氏曰公共也禪位授聖不家之睦親也不獨親其親子其子孝慈之道廣也皆有所飬無匱乏也有分分猶職也有歸皆得良奧之家也貨不必藏於己力不必為己謂施無吝心勞事不憚仁厚之教也謀閉不興盜賊不作尚辭讓之故也外户不閉禦風氣而已同猶和也平也孔氏曰此以下説記中之事此先明五帝時也為公謂不私傳子孫即廢朱均而用舜禹是也選賢與能謂不世諸侯黜四凶舉十六相之類是也講談説也修習也世淳無欺説輒有信所習皆親睦也君既無私故人法之不獨親其親子其子天下之老者皆得贍飬終其餘年年齒盛壯者不愛其力重任分輕任并斑白者不提挈是也幼者皆獲飬長以成人無告及有疾者皆獲恤飬男子無才者耕有能者仕各當其職無失分也女謂嫁為歸不失時故有歸也貨謂財貨既天下共之不獨藏府庫但人不收録則物壞世窮無所資用故收而藏之是惡棄地耳非是藏之為己有乏者便與也為事用力不憚劬勞正是惡於相欺惜力不出於身非是欲自營贍故云不必為已謀起於詐今天下一心故圖謀之事閉塞不起興起也有乏輒與盜竊焉施有能必位亂賊何起外户扉從外闔也不閉者不用關閉之也重門擊柝本禦暴客既無盜竊亂賊則户無俟於閉也但為風塵入寢故設扉耳無所捍拒故從外而掩也率土皆然故曰大同橫渠張氏曰大道之行窮乏皆有飬者蓋民足固自如此菽粟如水火民焉有不仁者哉聖人富之固有其術其教之又深順逹大道行也孔子言王者必世而後仁仁即大道之行也以孔子之道行之三十年何患乎不仁也言仁固有淺深三年有成言治一國也及治天下則必世也周公之法不至此但成王不能繼之大道之行由禮義而行者也禮義以為紀行禮義者也紀對綱而細今規規然以禮義治其小禮義而施於小未及其大者也若夫大道之行則禮義沛然大道之行遊心於形迹之外不假規規然禮義為紀以為急夫何為哉恭己正南面而已矣雖則無為亦未嘗忘禮義以為紀蓋不可無也長樂劉氏曰五帝之治世質民純人人內盡其情而情不生外無其己而善益勸故君不自尊而天下共尊之臣不自賢而天下共賢之一德安於上而兆民莫不化之一善出於人而四海莫不師之是以選賢與能講信修睦不必自於朝廷而族黨人人公共推讓不敢以為己私也雖以天下讓於人而人不以為德雖以天下外於子而人不以為疏故不謹於禮而人無作偽以踰於中不由於樂而人無縱精以失其和易稱同人于野亨者言君盡其性於上而民盡其性於下有天火之義焉不曰大道之行乎長樂陳氏曰大道之行為大同大道之隱為小康以道之汚隆升降係乎時之不同而已蓋大道者禮義之本禮義者大道之末任其本則末存乎其間徇其末則本隱而無存此堯舜所以為大同而禹湯文武成王周公所以為小康也莊子述伯成子髙對禹之辭堯治天下不賞而民勸不罰而民畏今子賞而民且不仁德自此衰刑自此立大同小康之辨也夫大道之行天下為公而與人大道既隱天下為家而與子與人與子固出於天聖人所以順天而趨時也然其為公者非不家之以為公者為主為家者非不公之以為家者為主至於不獨親其親不獨子其子貨力不必藏於己非無所别也各親其親各子其子貨力為己非無以待人也亦其所為主者異矣選賢與能講信修睦六君子非不由之禮義以為紀堯舜非不用之特其有所輕重淺深煩簡之不一耳蓋上世之選賢則一於德而已後世之選賢則有及於勇知上世之信則出於精誠之中而後世之信則見於作誓作會之際上世之睦則和光同塵而有餘後世之睦則魚沫詬濡而不足上世則有道德以為綱而不止於禮義之紀後世則禮義以為紀而有失於道德之綱也嚴陵方氏曰選言擇之而進與言待之而舉有諸己之謂信交相親之謂睦信與睦人皆有之然有諸己者患其隱而已故講之使明交相親者患其壞而已故修之使著廢疾瘖聾跛躃之類所謂皆有常餼各以其器食之是也天生其利人乃不取是以人逆天也故貨棄於地為可惡人犯其勞我享其效是因人成事也故力不出於身為可惡取非其有謂之盜伺間而發謂之竊絶理謂之亂毁則謂之賊馬氏曰信者在中之誠講之者使之以信相考也睦者在內之和修之者使之以睦相守也男有分女有歸言使之各得其所也有所厚有所薄有所貪有所吝則機心作於內而盜竊亂賊興於外無所厚無所薄無所貪無所吝則機心盜賊兩皆泯矣如此然後外户可以不閉而天下如是一也山隂陸氏曰言大道之行天下為公而曰選賢與能講信修睦是乃所以異乎黃老之言也且選賢與能講信修睦在六君子之世未嘗廢也而大道之行異乎此者不家之而已難者曰天下為公是天與賢則與賢天下為家是天與子則與子孟子以為其義一也不足為時之厚薄曰自後世觀之類皆與子一有不爾則爭亂隨之是亦天也雖以為時之厚薄可矣而緩詞也即云謀閉不興盜竊亂賊不作外户不閉嫌其言不婉是謂大同此禮之運轉在天者也延平周氏曰以大道既隱為三代則大道之行為堯舜然大道之行以天下為公亦非不以天下為家大道之隱以天下為家亦非不以天下為公故孟子以為其義一也又豈足為時之厚薄哉蓋各親其親不獨親其親各子其子不獨子其子者二帝三王之所同也蔣氏曰大道之行天下為公居上者恬於勢位而不以為樂在下者安於困貧而不以為尤是以德化自行而防範不立情意易通而機巧不生故位以賢能而任非有所私而立之也人以信睦為交非制之使從也推而至於耆老幼壯鰥寡孤獨之人交相飬於天地之間而不見其病男自然而有分女自然而有歸貨惡其棄於地而已力惡其不出於身而已是豈有一毫相攘相軋之習哉凡若此者非聖人用力而致之也故揚而舉之於大同之時惟帝者之事足以當之今大道既隱天下為家各親其親各子其子貨力為己大人世及以為禮城郭溝池以為固禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里以賢勇知以功為己故謀用是作而兵由此起禹湯文武成王周公由此其選也此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁講讓示民有常如有不由此者在藝者去衆以為殃是謂小康鄭氏曰隱猶去也為家謂傳位於子貨力為己俗狹嗇也大人諸侯也亂賊繫多為城郭溝池以服之也謀用是作兵由此起以其違大道敦朴之本也教令之稠其弊則然老子曰法令滋章盜賊多有由用也由此其選能用其禮義以成治也考成也刑猶則也藝藝位也去罪退之也殃猶禍惡也康安也此謂小小安康之世不如大道大同之世也言小安者失禮則賊亂將作矣孔氏曰此眀三代俊英之事孔子生及三代之末故稱今也天下為家禹為其始也君以天位為家故四海各親親而子子藏貨於身出力贍己父子曰世兄弟曰及謂父傳與子無子則兄傳與弟以此為禮也城內城郭外城溝池城之塹為此以自衛固也紀綱紀也五帝以大道為綱三王以禮義為紀君臣父子兄弟夫婦有失並用禮以紀之也君臣義合故曰正父子天然故曰篤篤厚也兄弟同氣故曰睦夫婦異姓故曰和又用禮義設為宫室衣服車旗飲食上下貴賤之制度田種穀稼之所里居宅之地貴賤異品也賢猶崇重也盜賊並作故須勇更相欺妄故須知所以崇重勇知之士立功起事不為他人故姦詐之謀用而戰爭之兵由此而起禹湯等能用此禮義成治其為三王中之英選也此聖賢六人皆謹於禮以行下五事用禮明斷使得其宜用禮以成人之信用禮以明民之罪仁者以禮賞之以為則爭奪者以禮講説之使推讓是示民為常法也為君而不謹於禮以下五事雖在富貴藝位衆人必以為禍惡共以罪黜退之也橫渠張氏曰大道既隱以其不講故民不見也然則大道既隱有劣於大道之行大道之行如堯舜方是也雖三代之英猶有劣者以其未成功也此所以未有不謹於禮惟謹於禮則所以致大道之行各親其親各子其子亦不害於不獨親不獨子止是各親各子者恩差狹至於順達之後則不獨親其親不獨子其子既曰不獨親親子子則固先親其親子其子矣大人世及以為禮由古以來固亦有傳世但道隱之後雖有子如均朱有臣如伊周者亦不能舉行堯舜之事故以世及為定禮城郭溝池為固亦是禮義以為紀之事所以防亂也堯舜在位各歷年七十餘以至於人神和龜龍格是為大治不規規以禮義為紀六君子所以急於禮者欲至乎大同也堯舜之治若此莫不本諸禮義大道既隱由暴君以壞之也然而使堯舜承桀紂之後亦當以禮義為紀六君子居堯舜之時是亦大同之治也以其襲亂急於禮義適得小康耳聖人成性一之以義理禮義為紀固在術內然而六君子未有不謹於禮欲以達其大者也謀用是作而兵由此起大道既隱則人有彼我故謀作亂者兵也止亂者亦兵也謀所以慮亂也既有亂則須兵以制之禹繼堯舜者也恐殆非為大道既隱之時由此其選於三代中是精選者也長樂劉氏曰既隱謂夏商以後有其居處而彼已分矣私其貨力而竊盜起矣戰鬭刑禁由之生焉故有五禮防其偽而教之復於中也有六樂防其情而教之復其和也綱人之倫以五品紀人之性以五常制度不定則僣逼興田里不疆則侵吞起勇智不用則禍亂生謀慮不作則姦詐出小則五刑以扶典制大則九伐以立平康此禹湯文王武王成王周公所以謹於禮較於大道則為小康焉嚴陵方氏曰前言大道之行則知大道隱之為廢此言大道既隱則知大道行之為眀矣前言天下為公則以與賢故也故繼言選賢與能此言天下為家則以與子故也故繼言各親其親各子其子焉大人世以為禮則各子其子故也及以為禮則各親其親故也大人止謂有位者與説大人則藐之之言同道大而有變則為之綱者道也禮義小而有常故以為紀焉道之綱則君臣固有義矣父子固有親矣兄弟固有序矣夫婦固有别矣及以禮義為紀則因其義而正之因其親而篤之因其序而睦之因其别而和之故曰以正君臣以篤父子以睦兄弟以和夫婦以功為己則致力以興事者各自營故也禮義之紀如此所以治人之道悉矣則機心不能無作爭端不能不起故曰謀用是作而兵由此起馬氏曰以大道之行而方之大道之隱固甚於天地之殊也竊嘗言之天下為公天下為家傳於賢傳於子皆天之所與非人力之所能為也五帝三王何與焉不獨親其親不獨子其子則近於墨矣各親其親各子其子則近於楊矣聖人豈楊墨之道乎老有所終至廢疾有所養三王未始不同也以正君臣至以功為己五帝之時莫不行也謀閉而不興盜竊亂賊而不作三王之盛時莫不胥然謀用是作則兵由此起五帝以來亦未始不如此也由是而考之則記者之言妄歟嘗聞之師曰方周之衰文之滅質也久矣天下之人溺於人偽喪其天真孔子傷時之弊故推隆於五帝而以三代為劣過其實以矯之欲使復歸於至德之盛裁歸於文質之中而已故曰先進於禮樂野人也夫孔子非必以先進為可尚以時之弊必過其中以矯之使質過於文然後朴可得而復也故曰如用之則吾從先進大同小康之意槩可見矣山隂陸氏曰以今該古不欲斥前也大人得位者也若五帝時非無父子相繼兄弟相及非無城郭溝池非無禮義特不以為固不以為紀以正君臣以篤父子以睦兄弟正尚義故篤尚恩故睦尚親故以和夫婦者婦雖以從夫為正亦有可否相濟以功為已愈益下矣莊子曰為義偃兵造兵之本也蓋禮義雖可以息兵亦可以起兵以著己之義以考己之信著人之有過若丘也幸茍有過人必知之周公之過不亦宜乎以有禮著焉故也仁以有禮故刑讓以有禮故講若虞芮質厥成是也虞芮講讓而文王之仁刑矣禮示民有常易示人有變廬陵胡氏曰鄭云大人諸侯也案下云禹湯由此則大人謂天子禮以眀義禮以成信禮以眀罪禮以刑仁刑猶型也禮以眀讓禮以體常長樂陳氏曰其言示民有常者常者變之對變者能變則常者能化化者人之道變者天地之道易之坤卦言人之道則曰有常曰化光至於乾卦言天之道則曰無常曰變化帝則盡天道故不言常王則盡人道故止於有常而已延平周氏曰禮義以為紀以下至於賢勇知此謀用不作而兵所以不起者也以為謀用是作兵由此起非也蔣氏曰馴至乎王者之時則不同矣天下為家自夏后氏始禹之為君豈不知堯舜與賢之事為可美哉啓賢而能敬承此不待論而天下之事亦大異矣自禹而往乃家天下蓋聖人以道御時初無容心於其間也名位以安之政教以率之刑法以一之誥誓以申之此豈得已而不已哉利欲動而姦詐起生聚衆而情隙開聖人而不為之盡心焉則蓋有所不滿焉者故自夏后氏之與子而天下之為君臣父子者自此無異説則各親其親各子其子貨力為己王者豈能遽返而還其初乎要亦求勿失其情而已祿爵世及以為大夫之禮城郭溝池以為國家之固禮義以為人道之紀君臣不得不正父子不得不篤兄弟不得不睦夫婦不得不和制度不得不設田里不得不立勇智任之為賢為己舉之為功義必使著信必使考仁必使成遜必使習道不能由則位不能居至是而禮之功用形矣故聖人揭而舉之為小康之時夫禹湯文武成王周公由此其選而謂之小康若是其不足言乎曰小康之名非治説也乃時説也聖人處大同之時故能運無為之化聖人處小康之時要亦無不盡之心夫惟無不盡之心而後能居小康之時成極治之化當大道之隱使大道之行以此言之則知帝王有異時無異道聖人因蠟以思禮其不能無望於魯而有志於帝王之世者如此言偃復問曰如此乎禮之急也孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死是故夫禮必本於天殽於地列於鬼神達於喪祭射御冠昏朝聘故聖人以禮示之故天下國家可得而正也鄭氏曰相視也遄疾也言鼠之有身體如人而無禮者矣人之無禮可憎賤如鼠不如疾死之愈也聖人則天之明因地之利取法度於鬼神以制禮下教令也既又祀之盡其敬也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也民知嚴上則此禮達於下也民知禮則易教孔氏曰此是第二明須禮之意失之者死若桀紂也得之者生若禹湯也引詩鄘風相鼠篇禮從天出故云本於天殽效也又效於地布列於鬼神聖王既法天地鬼神以制禮本以教民故祀天禋地享宗廟祭山川一則報其禮之所來之功二則教民嚴上之義民既知嚴上之義曉達喪禮則知哀篤君親也祭是享祀君親射御是防衛供御尊者冠有著代之義昏有代親之感朝是君之敬上聘是臣之事君人知嚴上則達此八者之禮天下謂天子國謂諸侯家謂卿大夫下既從教故得而正也鄭注則天之眀因地之利昭二十五年左傳文云取法度於鬼神者下文云降于宗廟山川五祀是也云以制禮下教令者謂法天地鬼神以制禮既畢下此禮之教令以教民即下文降命降則下也謂法此等之神以下令教又祀此等之神教民嚴上故鄭云既又祀之盡其敬也宗廟山川五祀據其精魄歸藏不知其所則謂之鬼宗廟能引出仁義山川能引出興作五祀能引出制度又俱能引出福慶謂之神也三者皆為鬼神此又本天殽地之下所以總云列於鬼神也橫渠張氏曰禮必本於天殽於地列於鬼神此屬自然而言也天自然有禮如天尊地卑是也殽於地眀於地也如山川有小大草木有長短皆是天生而見於地也列於鬼神遍於鬼神也如社有土功履之必報稷有養人之功五嶽各為一方之鎮人就而禮之至於羣祀百神莫不有自然之理使之必報之功有小大者天也報且禮之者人也達於喪祭射御冠昏朝聘此則屬人道而言亦莫非天理也又曰禮本於天天無形固有無體之禮禮有形則眀於地眀於地則有山川宗廟五祀百神以至達於喪祭射御冠昏朝聘是見於迹也蓋禮無不在天所自有人以節文之耳本於天殽於地猶是總言之鬼神則布列於地上也然則禮非自人而出至於鳥獸莫不有父子配偶長幼朋友螻蟻之君臣鴻鴈之兄弟但不能推類而有别此亦皆天性也至聖人則能粹美之長樂劉氏曰先王正心誠意動必如禮者欲盛厥德以配天地也不曰承天之道乎禮有定制執民兩端不敢過也不敢不及也不曰治人之情乎人失乎禮則行悖於中刑禍之道也不曰死乎人得其禮則動協於極不曰生乎鼠也無其一體無不死者人也失其一禮而能久生哉故禮也者能使三才安於其位而不失其宜者也故天得其禮則隂陽和地得其禮則剛柔順而無乾亢之患鬼神得其禮則生以時而無咎徴之失至於喪祭射御冠昏朝聘得其禮則君臣父子兄弟夫婦朋友各得其分而不失其常不曰天下國家可得而正乎則人之為道無禮焉性命不可得而正矣若網之有綱萬目待之然後理若木之有規萬器待之然後成惟禮為然長樂陳氏曰言偃聞去衆為殃之説復以禮之急為問孔子謂禮出於天而成體則於天之道為本故以之承天之道出於人而成法則於人之情為本故以治人之情夫出於天而承天出於人而治人則禮不為不重其有不由而失之則不止於去衆為殃而必至於死由而得之則不止於存衆為祥而必至於生也喪祭內也射御外也冠昏內也朝聘外也君子行其在己而不忘其在人者為其在人而不忍其在己者然後為能盡己而盡人此喪祭射御冠昏朝聘先後之意又曰本於天者禮之道殽於地者禮之體列於鬼神者禮之情達於喪祭射御冠昏者禮之度數禮之為道則達而其體則卑其情則幽而其度數則顯聖人以此示人則天下國家可得而正也嚴陵方氏曰上言如有不由此者在勢者去則禮之於人不可緩矣故言偃復問以為如此乎禮之急也禮本乎天之道故先王制禮所以承天之道禮出乎人之情故先王制禮還以治人之情禮於天人之際如此則失之者死得之者生未足怪也然失之者未必死以其有死之道而已得之者未必生以其有生之道而已故引詩胡不遄死之説以眀之也夫茍失於禮雖或幸而生於義可誅則無以異乎死茍得於禮雖或不幸而死其名不忘則無以異乎生此所以有死生之道也人之所欲莫甚於生所惡莫甚於死禮之得失遂有生死之道也此其所以為急歟於天曰本於地曰殽於鬼神曰列皆言禮之所以立也至於禮之所以行則有見於喪祭射御冠昏朝聘焉見於喪祭射御冠昏朝聘則禮達於下矣故以達言之喪則凶禮也祭則吉禮也射御則軍禮也冠昏則嘉禮也朝聘則賓禮也禮雖經而為三百曲而為三千其大體不過是五者而已馬氏曰天降衷於民而先王之為禮所以繼天之衷也故曰以承天之道夫口之於味目之於色耳之於聲鼻之於臭四肢之於安逸人情之所同也人情之所同而縱之則滅天理而窮人欲故先王制為禮以節之也故曰以治人之情胡不遄死者未至乎死而人欲其死也延平周氏曰深於禮者可以言易深於易者可以言禮故言其成象則本於天言其效法則殽於地言其幽則列於鬼神所謂達於喪祭射御冠昏朝聘者乃其度數而已矣山隂陸氏曰鬼神若禋祀實柴槱燎血祭貍沈疈辜礿祠蒸嘗之類亦一隅爾喪祭射御冠昏朝聘此八者自天子下達凡所謂示象數之事也鄭氏曰相鼠之刺不惟深疾之之辭而無禮無儀固有死之道也夫三百之經三千之儀雖若不勝其繁要皆此心之用操而常存者則委蛇曲折不失尺寸一念之差則視而勿見聽而勿聞食而不知其味語默動止皆非故態矣觀於草木則一葉之黃一枝之瘁皆本根之病也觀於天地則一星之殞一泉之決皆元氣之病也聖人為禮以制天下之心威儀之中否以驗其神眀精爽之存亡詎可指登降興俯獻酬裼襲以為末節而不之察乎先王盛時禮教達於天下士無賢不肖皆周旋於禮文之中其節奏度數耳目習焉手足安焉不得而少差也於安且習之中而忽乖其度是必其神明精爽之不在是也三代之衰列國公侯卿大夫猶知奉禮以從事一不中節則有死生禍福之説若越椒之執幣傲叔仲惠伯知其必滅若敖氏之宗郤錡乞師於晉而將事不敬孟獻子知郤氏之必亡若此類者不可勝舉而其應信若龜策蓋先王所以制人心之意猶未泯滅而秉禮君子既能以自檢其身故能以身察乎人也傳穀梁之説者以為左氏失之誣而後世學者不究其本遂以左氏死生禍福之説近於神怪而力排之聖人制禮精微之意微矣惜哉蔣氏曰聖人傷世逺道散發眀禮之為功學者因言深意切申問禮之所以急聖人豈能忘言於此思昔先王之制為禮也非以強世拂情也蓋自有天地萬物而禮與之俱立羣而為之辨也合而為之防也出入飲食而為之會節疏數也施報酬酢而為之等級隆殺也是豈天之所能隨而付諸其人乎蓋必有制而命之者矣故曰承天之道又豈人之所能始而具之於天者乎蓋必有闕而闕之者矣故曰治人之情天道以承而能立人情以治而能定此禮所以不可一日無而得失死生所由分也不然則天人之理窮矣相鼠之刺所關甚大托詩以眀禮豈不信然又曰禮之為説虛為之機而實為之用理為之初而形為之顯自其本於天者而承之彼其理混然未分吾孰得其洪纎小大而為之乎易曰知崇禮卑崇效天卑法地方其為崇有不可得而擬議者聖人本天道之自然即地形而有辨故凡禮之所以為是因人之情順物之稱制為髙下廣狹者皆其所效而立之者也由是而築為宫室設為宗祧郊社以崇報山川以闡幽是列鬼神而禮有所寓矣喪祭有常射御有數冠昏以嚴其序朝聘以謹其儀是達於制作而禮有所行矣此三代聖人所以損益不同而制治之異至衰世之君子則未嘗不以禮之興修廢弛而覘人之理亂安危者有由也金華應氏曰上數語眀禮之功用以眀夫人生死之所由繫下四語總禮之體用以眀天下國家治亂之所由别也大原出乎天故推其所自出而本之效法之謂地故因其成法而效之殽效也列於鬼神者充塞乾坤之間昭布森列而不可紊也達於喪祭至朝聘者人道交際之用周流上下而無不通也法於天地鬼神者理也所以承天之道也達於天下國家者事也所以治人之情也理與事一而二二而一者也示之以禮而人得禮以生則謀之作者弭兵之起者消故天下國家可得而治也不然雖有粟吾得而食諸言偃復問曰夫子之極言禮也可得而聞與孔子曰我欲觀夏道是故之杞而不足徴也吾得夏時焉我欲觀殷道是故之宋而不足徴也吾得坤乾焉坤乾之義夏時之等吾以是觀之鄭氏曰把夏后氏之後也徴成也無賢君不足與成也得夏四時之書其書存者有小正宋殷人之後也得殷隂陽之書其書存者有歸藏吾觀於二書之意孔氏曰自此至禮之大成也為第三眀禮之所起徴者徴驗之義把宋君暗弱不堪足與成禮因往適把宋得殷坤乾之書并夏四時之書觀之知上代以來至於今世時代運轉禮之變通即下禮之初以下是也殷易以坤為首故先坤後乾橫渠張氏曰坤乾之義先曰坤者殷之質以所先見者則先言之坤乾書名也不曰乾坤而曰坤乾者乾則無以見必因坤而著故先曰坤推本而言也猶言形神人必因形乃見神若不因形則神何附著長樂陳氏曰夏時坤乾之書固不可得而見之然沿其名以推其義則夏時者言夏時之所紀而坤乾有交泰之意也夫得其書則繫其所得之先後故先夏時而後坤乾觀其書則考近以及逺故先坤乾而後夏時又曰其言夏時之等則其所得者不止於此其言吾以是觀之則繼之以夫禮之初以下蓋觀是書而知其然嚴陵方氏曰極之為言至也如上所言皆禮之至矣子遊故復問之也坤乾夏時之書所謂雖無老成人尚有典刑是也論語兼言書之文不足徴此特言人之獻不足徴者言其略則文獻皆不足徴言其詳則書之文猶有得焉耳周官大卜掌三易之法一曰連山二曰歸藏三曰周易是連山則首乎艮其卦具內外而一體其位居東北之兩間則向乎人之時焉夏用人正故其書以之孔子以夏時稱之者以帝降而王人時得其正故也歸藏則首乎坤各歸其根密藏其用皆隂之所為則合乎地之時焉殷用地正故其書以之孔子以坤乾稱之者以資生於丑地為主於上故也周易則首乎乾周而復始剛柔相摩皆陽之所為則合乎天之時焉周用天正故其書以之孔子以乾坤序之者以資始於子天為主於上故也然孔子以夏殷之易而觀夏殷之禮者何也蓋易之所見者象禮之所形者器繫辭云以制器者尚其象則觀易固可以知禮矣且乾坤者天地也夏時者四時也天地有上下之位四時有先後之序禮之道如斯而已至周則監於二代修而兼用之故六官則備天地四時之名焉坤乾不謂之書而謂之義夏時不謂之書而謂之等者禮以達義於內辨等於外者也天地之理為妙故以義言內四時之迹為顯故以等言外或言其義或言其等蓋本諸此馬氏曰創於始者必有以繼於終作於先者必有以述於後故孔子欲觀夏殷之道以成一代之禮把者夏之後宋者殷之後謂其世守而知其事之詳且悉也然而把宋皆無賢人載籍俱亡文獻兩泯焉此其不足與成也可知夏時坤乾皆不行於世闕而勿論可也山隂陸氏曰雖曰吾以是觀之蓋亦略矣據論語所言可知講義曰孔子嘗曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也今以為不足證而不言者蓋所語偃者必欲有所稽考而言之故也若夫子之於禮雖百世其可知況於夏殷乎故曰坤乾之義夏時之等吾以是觀之所以語偃者如此也四明沈氏曰義是禮之變處等是禮之常處首坤次乾之書是變也建寅之書是常也聖人加一義字於坤乾加一等字於夏時夏殷之書固是夏殷之禮非聖人孰能觀之哉蔣氏曰禮在聖人言之為無盡禮在學者問之惟恐其不及此言偃所以得聞其槩而猶有以究其極也夫聖人既以把宋為不足證而不能覩夏商之禮矣而猶有得於書者何哉此蓋聖人觀禮之妙旨三代聖人損益不同而制作殊事蓋本自其隂陽之義而發之夏時之書吾不得而見之矣而其存者有小正夏之所建以寅為正則其尚忠尚黑之制皆自此出也坤乾之書吾不得而見之矣而其存者有歸藏商之序易以坤為首則其尚質尚白之制皆自此出也聖人不能考把宋之餘備見夏商之盛制而能因隂陽之書詳識夏商之本旨此聖人之觀禮所以異乎人之觀之也韓宣子適魯見易象與魯春秋以為周禮盡在魯其觀周其亦聖人之觀夏商也夫金華應氏曰觀其義與等者聖人之觀異乎他人之觀也夫上天下澤所以為禮而坤乾之書顧以坤為首者有其義也隂陽循環更相為始而夏時必以寅為首者有其等也玩乾坤之自下而上則知禮之交際者無不通且又有卑法地之意焉玩四時之自始而終則知禮之秩序者不可紊且又有無窮之象焉夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神及其死也升屋而號告曰皋某復然後飯腥而苴孰故天望而地藏也體魄則降知氣在上故死者北首生者南鄉皆從其初鄭氏曰言其物雖質略有齋敬之心則可以薦羞於鬼神鬼神饗德不饗味也中古未有釜甑釋米捭肉加於燒石之上而食之耳今北狄猶然汙尊鑿地為尊也抔飲手掬之也蕢讀為凷聲之誤也凷堛也謂摶土為桴也土鼓築土為鼓也升屋而號招之於天也苴或為俎地藏謂葬北首隂也南鄉陽也皆從其初謂今行之然也孔氏曰此一節論中古祭祀之事及死喪之禮今時所法於前者從此至禮之大成皆二書所見之事禮以飲食為本但中古質略雖有火化以水洮釋黍米捭析豚肉加於燒石之上而孰之播黍以下非但可以事生若如也言如此亦可以致其恭敬於鬼神以鬼神饗德不饗味也伏羲為上古神農為中古五帝為下古若易歷三古則伏羲為上古文武為中古孔子為下古若三王對五帝則五帝亦為上古皋引聲之言某謂死者名令其反復魂魄不復然後浴尸而行人禮於含之時飯用生稻之米故云飯腥用上古未有火化之法也苴孰者欲葬設遣奠包裹孰肉以遣送尸法中古火化之利也天望謂望天招魂地藏謂葬以藏尸所以地藏由體魄則降故也所以天望由知氣在上故也此非是今世始為此事皆取法於上古中古而來故云皆從其初橫渠張氏曰今享土功不知報日食五穀又不報義非所安古之飲食之際其始造飲食如燔黍捭豚汙尊抔飲之人也夫禮之初始諸飲食飲食固不足以為禮然言語有從本説出者則必至微有從末説出者則必自近示人之不得已處其始必甚質而漸至於文如言禮之初始於拜起亦此類也人之始相見則須如此延平周氏曰上古之世未始知有禮而有禮乃所以強世故聖人因其有飲食之大欲而少寓之以節文此天下惟知飲食之充欲而不知漸入於節文之中也所謂飲食者止於燔黍捭豚汙尊抔飲與夫蕢桴土鼓凡此不惟可施於人之所交際而猶若可以致敬於鬼神蓋亦趨時而已矣皋某復皋者始事之辭而有緩意故五門之始謂之皋既復矣然後祭之則飯以腥苴以孰也死者以北首為主入為隂也而又有答陽之意生者以南鄉為主出為陽也而又有答隂之意自蕢桴土鼓而上後世有以備於此者故不從其初自升屋而復而下後世無以過於此者故皆從其初長樂陳氏曰食之禮始於燔黍捭豚飲之禮始於汙尊抔飲蕢桴而土鼓其樂之始歟明堂位曰土鼓蕢桴葦籥伊耆氏之樂也然樂以中聲為本土於位為中央於氣為中氣而籥之為氣又所以通中聲者也伊耆氏之樂始於土鼓中聲作焉中於蕢桴中聲發焉終於葦籥中聲通焉樂之所始本於中聲如此豈不為中和之紀乎周官籥章中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之凡國祈年于田祖吹豳雅擊土鼓以樂田畯國祭蠟則吹豳頌擊土鼓以息老物其意以為王業之起本於豳樂之中本於籥始於土鼓逆暑迎寒祈年祭蠟皆本始民事而息老物故所擊者土鼓所吹所歌者豳詩有報本反始之義焉豈在夫聲音節奏之末節哉此所以猶若可以致其敬於鬼神也樂書又曰體主於骨魄藏於肺知存於心氣寓於體體魄隂也故降之於下知氣陽也故升而在上而體魄不言下者以其體魄有滅而無存知氣感動而常在北為隂幽而物之所終始南為陽明而物之所相見死者所以歸根故必首於隂幽終始之地生者所以藝藝故鄉於陽明相見之方此古者之所作而後世無以加故曰皆從其初又曰臯者求之於隂也詩曰鶴鳴于九臯易曰鶴鳴在隂則臯者隂之體而隂者臯之理五門之外謂之臯門以其近君者為陽逺君者為隂也嚴陵方氏曰觀二書足以知夏殷之禮觀夏殷足以知上古之禮故此言禮之初焉自燔黍而下皆始諸飲食之事也方是時地産之穀不過有黍然未有釜甑也故燔之天産之物不過有豚然未有刀匕也故捭之尊未能鑿木也故汚尊飲未知用爵也故抔飲鬼神之道幽而難格菲薄之禮疑若不及以致其敬也故以猶若言之可疑之辭也復者招魂之名飯必以腥慮致生之不知故也苴必以孰又慮致死之不仁故也後世於喪有奠始於飯腥而已於葬有遣始於苴孰而已體有所附魄有所營皆重濁焉則隂之類也故降而在下知無不周氣無不之皆輕清焉則陽之類也故升而在上郊特牲不言體魄而言形魄不言知氣而言魂氣者亦互相備也死者仆故言首生者興故言鄉凡是禮也後世雖或增其文而不能損禮之實雖或異其迹而不能易禮之意故曰皆從其初山隂陸氏曰蕢桴以蕢盛塊而為桴歟廬陵胡氏曰蕢草也以草為桴鄭以蕢為凷非也若云誤聲不應眀堂位又誤也土鼓廣雅文云築土為鼓蓋築地以當鼓節籥章注以瓦為匡不必築土也汙尊鑿地汙下以盛酒抔若張釋之云一抔土據明堂位云蕢桴土鼓伊耆氏之樂則此皆神農氏伊耆神農皆從其初皆取法於古初蔣氏曰生養之道本於飲食聖人以報本反始之義教天下欲其事死如事生此酌獻饋食之事所以交於鬼神而不以為煩也降及後世人之所以從事乎此者一切以文物為先而不以誠敬為本生或怠於養死或忽於報聖人言禮所以必欲反之於其初上古鼎飪未具而燔捭以為食罍酌未設而汙抔以為飲聲樂未備而蕢土以為歡彼其所交際應酬者簡素質實而巧偽不形則以此而接乎鬼神自其一念之誠而施之有餘也死生異域疑若恩棄義絶而不相求矣乃若升屋之號臯復之告飯腥苴孰以繼其孝養之事天望地藏以發其悽愴之思蓋雖禮教未備而天理之發露於人心者自然如此至於後世棺槨衣衾之備美賵賻贈含之畢陳而一念不居事亦末矣記曰復盡愛之道也有禱祠之心焉若是則形魄歸地知氣歸天死者北首生者南鄉以生求死安得不盡其心而後知求加乎物哉故曰皆從其初昔者先王未有宫室冬則居營窟夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮鄭氏曰寒則纍土暑則聚薪柴居其上未有火化食腥也此皆上古之時也孔氏曰此一節更論上古之事未有宫室則是五帝以前未有火化則惟伏羲以前以中古神農有火故也營窟者地髙則穴於地地下則營纍其土而為窟橧巢者橧聚其薪以為巢雖食鳥獸之肉不能飽者則茹食其毛漢蘇武以雪雜羊毛食之是其類也長樂陳氏曰人之生也雖稟於隂陽而其體則陽屬以其陽屬則必順陽而居之故冬則陽燠於下則順之而居窟夏則陽燠於上則順之而居巢也嚴陵方氏曰孟子所謂下者為巢上者為營窟是矣前既言燔黍矣此乃未有火化者先儒謂加黍於燒石之上非火化故也後聖有作然後修火之利范金合土以為臺榭宫室牖户以炮以燔以亨以炙以為醴酪治其麻絲以為布帛以養生送死以事鬼神上帝皆從其朔鄭氏曰作起也修火之利謂孰冶萬物范金謂鑄作器用合土謂瓦領甓及大甒臺榭器之所藏也炮謂裹燒之也燔謂加於火上烹謂煮於鑊也炙謂貫之火上醴酪謂蒸釀之也酪酢酨朔亦初也亦謂今行之然孔氏曰此一節論中古神農及五帝三王之事世本云燧人出火在伏羲之前但用之簡少至神農更修益使多故云修孰謂烹煮冶謂陶鑄為形范以鑄金器和合其土燒作器物以為臺榭宫室牖户及炮燔醴酪等皆五帝也此皆效法上古以來故云皆從其朔長樂劉氏曰火無形也而潛於木中不可得以知之燧人氏鑽木以出火然後木也火也為民之利矣金得火則鎔又從而范之以為器用則金也始為吾民之利矣土也和之以水鈞之以木化之以火合五材以為器則利於吾民與稼穡均矣五行之利養於民而禮因五物以興焉生則養之死則祭之報本反始之心生而禮由之弗敢忘乎其本初也長樂陳氏曰范金合土固不止於為宫室之具而為宫室則必在於范金合土之後以其斤斧瓦甓之所當先也夫營窟橧巢而易之以宫室飲血茹毛而易之以烹炙衣羽而易之以治麻之布衣皮而易之以治絲之帛此所謂通其變使民不倦者也夫開端之始謂之初繼終而有始謂之朔故天地之始亦可以言初一月之始則特謂之朔是以言禮之初則繼之以皆從其初言後世有作則繼之以皆從其朔也江陵項氏曰前言皆從其初後言皆從其朔注皆以為初蓋初者天地形氣之始也朔者隨時制作之始也如歷家太初及中朔之類詳本章事理可見嚴陵方氏曰上世未有火化非無火之性也特未能修之以利人爾范即荀況所謂刑范之范范金而鑄之合土而陶之而器用出焉則以為臺榭宫室牖户故也臺榭宫室已見月令解醴酪則下文所言者是矣治麻所以為布治絲所以為帛夫為宫室之類然後足以代巢窟為醴酪之類然後足以代血毛為布帛之類然後足以代羽皮是道也不特可以養生於其始又可以送死於其終不特可以養生送死於其明又可以事鬼神上帝於其幽言神則百神上帝則天也山隂陸氏曰此一節言禮雖未之有先王以義起至是而彌文養生送死以事鬼神上帝蓋備矣非人為也故曰皆從其朔闕氏曰皆從其朔者天左旋日月右行周天三百六十五度四分度之一日行遲日行一度一嵗一周天月行疾日行十三度一月一周天防其舒前速後近一逺三則為弦相與為衡分天之中則為望以速及遲光盡體復則為晦至於朔則日月始合璧焉當其晦則盡矣及其朔則受明於日而復生也於北謂之朔方者民窮度食而變於朔也於冬謂之朔易者存察其事而始於朔也禮以時為大則其窮而變變而通後聖有作述而從之豈不謂之朔乎是故結繩之治其敝如晦焉後聖有作易之以書契則從書契者以是為朔也巢穴之居其敝如晦焉後聖有作易之以棟宇則居棟宇者以是為朔也羽毛之衣不可用也故易之以絲麻者得不以是為朔乎飲血茹毛不可用也則從火化者得不以是為朔乎夏尚忠忠之敝故商人救之以質則在商之世所從者以質為朔商尚質質之敝故周人救之以文則在周之世所從者以文為朔而已然則朔者可復晦也晦者亦可復朔也蔣氏曰聖人論禮蓋本於中古之世器用漸設文物漸備幸其有加於前而慮其或窮於後也夫營窟橧巢而必至於臺榭宫室也草實獸肉而必至於烹燔炮炙也飲血茹毛而必至於醴酪以供其味也衣羽服皮而必至於布帛以充其美也亦天下之勢也夫是數者中古聖人實為之中古聖人亦豈能計其事之止於此而已哉器利用便而文日加焉而又為之黼黻文繡之美三牲九鼎之盛堂上堂下之陳自是文日生而無有窮已雖聖人亦末如之何此所以禮至於後世而老氏之徒指為忠信之薄欲與天下相從於淡泊之地也雖然事之已備聖人不能計其後事之未備聖人不能祕其智自范金合土以下皆聖人開物成務以教天下而使之相安相養於利用出入之間者也使稍變其燔黍捭豚以為籩豆簠簋之實汙尊抔飲以為犧象山罍之具蕢桴土鼓以為笙鏞管象椌楬塤箎之聲何病於聖故聖人觀夏商以前為禮之大意知其養生送死事鬼敬神而次第可以章明顯設民猶未厭道猶未瀆也故曰以養生送死以事鬼神上帝皆從其朔朔亦初義過此以往不復言初而禮備矣臨川王氏曰皆從其初皆從其朔或言初或言朔何也初者一始而不可變朔則終而復始故於始諸飲食則言初於後聖有作則言朔蓋先王為後世所因乃其所以為朔也禮記集説卷五十四
