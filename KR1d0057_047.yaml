body:
  text: 禮記集說卷四十七宋衛湜撰曽子問第七孔氏曰案鄭目録云以曽子所問多明於禮故著姓名以顯之曽子孔子弟子曽參此於别録屬喪服曽子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面于西階南大祝裨冕執束帛升自西階盡等不升堂命毋哭祝聲三告曰某之子生敢告升奠幣于殯東兒上哭降衆主人卿大夫士房中皆哭不踊盡一哀反位遂朝奠小宰升舉幣鄭氏曰從攝主北面於西階南變於朝夕哭位也攝主上卿代君聽國政者也裨冕者接神則祭服也諸侯之卿大夫所服裨冕絺冕也𤣥冕也士服爵辨服大祝裨冕則大夫也命毋哭將有事宜清靜祝聲三聲噫歆警神也某夫人之氏也几筵於殯東明繼體也衆主人君之親也房中婦人也反位反朝夕哭位舉幣舉而下埋之階間孔氏曰此一節論君薨而世子生告殯之事公羊云君存稱世子君薨稱子某此既君薨仍稱世子者以其别於庶子又用世子之禮告殯異於春秋之例案喪大記士喪禮朝夕內外哭位皆在東方今乃從攝主北面於西階南故鄭云變於朝夕哭位也必於西階南者以近殯位故也大祝裨冕衣裨衣而冠冕也裨之為言埤也天子六服大裘為上其餘為裨言裨者取其繢繡孤卿則絺冕三命再命卿大夫服𤣥冕經云大祝裨冕則於時卿大夫士等皆衣衰服可知大祝將告神故執束帛執持也束帛十端也以丈八尺為端鬼神之道隂陽不測故用隂陽之數求之一丈象陽八尺法隂十端六𤣥四纁五兩三𤣥二纁纁是地色𤣥是天色告殯若於堂下則太逺堂上則太近殯故升階盡等級古人發聲多云噫凡祭祀神之所饗謂之歆今祝作聲欲令神歆饗故鄭云歆警神也告殯竟執束帛者升堂奠置所執之幣於殯東几筵上畢遂哭哭竟而降階也案喪大記云君將大斂父兄堂下北面父兄即君之親又云外宗房中南面故云房中婦人也案士喪禮每旦於朝夕哭位先哭而後行朝奠朝奠了又哭今因西階前哭畢反哭位即行朝奠故經云遂朝奠也幣是小宰所主周禮小宰職云凡祭祀贊玉幣爵之事喪荒受其含襚幣玉之事下文云斂幣玉藏諸兩階之間案熊氏曰經稱奠幣於殯東則告世子生謂既殯以後若未殯之前則世子生亦不告也殯東几蓋於常几筵之外别特設之天子諸侯在殯宫有几筵為朝夕之奠常在不去大夫士大斂有席虞始有几今以世子繼體之貴故特設几也嚴陵方氏曰君薨凶事也凶事人之所哀世子生吉事也吉事人之所樂君子行禮於此可不慎哉是以裨冕吉服也衰杖則凶服也毋哭吉禮也稽顙則凶禮也於是則或裨冕或衰杖或命毋哭或拜稽顙豈非處之以吉凶之間也山隂陸氏曰君薨子恃以立士大夫也古之人植遺腹朝委裘而天下不亂用此道也事變時移漢始垂簾矣三日衆主人卿大夫士如初位北面大宰大宗大祝皆裨冕少師奉子以衰祝先子從宰宗人從入門哭者止子升自西階殯前北面祝立于殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭祝宰宗人衆主人卿大夫士哭踊三者三降東反位皆袒子踊房中亦踊三者三襲衰杖奠出大宰命祝史以名遍告于五祀山川鄭氏曰三日負子日也如初謂如告生時宰宗人贊君事者子拜稽顙哭奉子者拜哭也踊襲衰杖成子禮也奠出亦謂朝奠因負子名之喪於禮略也孔氏曰此一節論世子生己三日名之以名見於殯之禮三日之朝自衆主人以下悉到西階下列位如初日子生之儀子自為主故不云從攝主案內則云國君世子生告於君三日卜士負之此亦生則告君三日負之子至三月為名始見君今喪禮略於負子之時則見也不用束帛者告生時已用也大宰是教令之官大宗是主宗廟之官初不裨冕今裨冕者以奉子接神故服祭服此大宰大宗大祝亦從子升堂經文不具耳少師主養子之官又奉子故與子皆著衰祝主接神故先進少師奉子次從祝也以其告神同吉祭禮若凶祭則主人前祝在主人後也世子不忍從阼階升故由西階於時大宰大宗及祝亦升不言從者以子為主祝在子之西而北面當殯東南故云殯東南隅祝聲三者亦謂警神也前告主哀甚故盡階此見子須近殯故進立於殯東南隅既警神後祝乃告曰夫人某氏之子某從執事宰宗人等敢見告訖奉子之人拜而稽顙乃哭不踊者未即位故也祝宰宗人在堂上北面衆主人卿大夫士在西階下北面以子稽顙哭故亦哭為踊每踊三度為一節如此者三故云三者三也降東反位者堂上皆降反東在下者皆東反朝夕哭位初堂上堂下之哭非正位故不袒今反哭位故皆袒子至此乃踊房中亦踊明祝宰宗人以下反位亦踊也當踊必袒故鄭注云踊襲衰杖成子禮也既云襲明初時袒也鄭知奠出亦朝奠者以在殯無特告奠之法山隂陸氏曰如初位則北面可知又言北面著子雖幼莫不臣也少師奉子言師著一日不敢無師傅也不言大師奉子以衰嫌䙝曽子問曰如已葬而世子生則如之何孔子曰大宰大宗從大祝而告于禰三月乃名于禰以名遍告及社稷宗廟山川鄭氏曰告於稱告生也喪在殯告五祀山川耳五祀殯宫之五祀山川國鎮之重不可不告故越社稷告之既葬而世子生三月而名葬後三月於禮已祔廟故告可及廟廟與社稷相連不得不告社稷也孔氏曰此一節因前論君未葬而世子生今更問葬後世子生之禮禰父殯宫之主也既葬殯無尸柩唯有主在故告於主漸神事之也同廟主之名故曰禰然直云三人告禰不云攝主者葬時攝主已辨絰葛以交神明葬竟又服受服喪之大事既畢故子生則攝主不服與羣臣列位西階下自依大宰之禮與大宗從大祝裨冕而告殯宫中主也不言裨冕束帛盡階不升及某之子生敢告者從可知也葬後神事之故依常禮三月因見乃名也山隂陸氏曰遍告遍告同盟諸侯知然者以言及社稷宗廟山川知之也上於諸侯非不告也下於諸侯非不告也其主言者同盟諸侯爾孔子曰諸侯適天子必告于祖奠于禰冕而出視朝命祝史告于社稷宗廟山川乃命國家五官而後行道而出告者五日而遍過是非禮也凡告用牲幣反亦如之鄭氏曰祖禰皆奠幣以告之告奠互文也視朝聽國事也諸侯朝天子必裨冕為將廟受也裨冕公衮侯伯鷩子男毳也臨行遍告宗廟孝敬之心也五官五大夫典事者命者敕之以其職道而出者祖道也聘禮曰出祖釋軷祭酒脯也既告不敢久留故五日而遍牲幣當為制幣一丈八尺孔氏曰此一節論諸侯朝覲天子將出之禮不云曽子問直云孔子曰者因上起文也篇內時有如此諸侯視朝當用𤣥冠緇衣素裳今服禆冕者案覲禮侯氏裨冕天子受之於廟今諸侯往朝天子為天子將欲於廟受己之禮故豫敬之以冕服視朝故鄭云為將廟受也上文已告於祖奠於禰下又告於宗廟山川是後再告言遍則五廟皆告也諸侯有三卿五大夫經云五官故知五大夫大夫數多直言五者據典國事者言之不云命卿者或從君出行或在國留守總主羣吏如三公然既命五大夫亦命三公可知經言道而出明諸侯將行祖祭道神而後出行案聘禮注云祖始也行出國門止陳車騎釋酒脯之奠於軷為行始也春秋傳曰軷涉山川軷山行之名道路以險阻為難是以委土為山或伏牲其上使者為軷祭酒脯祈告也禮畢然後乘車轢之而遂行其牲犬羊可也此城外軷祭山川與道路之神其五祀行神則在宫內祭之其名未聞其位在廟門外西方喪禮毁宗躐行是也軷亦有尸故詩生民云取羝以軷注燔烈其肉為尸羞是也告者以五日為限近者就告逺者望告所以爾者先以告廟載遷主若久留不去則非禮按熊氏曰此為諸侯禮不應用牲故鄭此注云牲當為制天子則當用牲故鄭注周禮大祝職引此文云告用牲幣是也長樂陳氏曰後言天子諸侯將出必以幣帛皮圭告於祖禰所告蓋有用牲者矣其言止於幣帛皮圭者以其無遷主而奉此以出也肆師凡師甸用牲於社宗則為位則不用牲者肆師不為位也蓋道或有逺近禮或有輕重故告有特用幣有兼牲幣非一端也大祝大師冝於社造於祖大㑹同造於廟冝於社過大山川用事焉反行釋奠鄭氏引曽子問曰凡告必用牲幣又釋曽子問則改牲幣為制幣是自惑也孔穎達云天子諸侯出入有告有祭故告用制幣卿大夫唯入祭而已故聘禮既使而反祭用牲也然禮凡告朔告至必用牲也孰謂天子諸侯之告不皆用牲邪皇氏熊氏謂天子告用牲諸侯不用牲此尤無據告雖或用牲而其它不用牲者多矣若國大貞則奉玉帛而詔號春秋傳曰凡天災有幣無牲月令仲春之月祀不用犧牲用圭璧更皮幣以至晋侯謀以息民魏絳請祈以幣更齊饑孔子請祈以幣玉凡此視其事與特而已嚴陵方氏曰曲禮曰夫為人子者出必告反必面諸侯之出必告於祖奠於禰反亦如之蓋事死如事生也而又及於社稷山川者推事親之道以事神也然於適天子則其禮詳與諸侯相見則其禮略豈非所見之人有輕重故其禮不能無隆殺歟五官即王制下大夫五人是也五廟即王制二昭二穆與太祖之廟而五是也山隂陸氏曰祖言告禰言奠尊祖而親禰也言命五官其一官蓋從行矣此主二王之後言之春秋傳曰六卿和公室宋也二王之後六官備歟諸侯相見必告于禰朝服而出視朝命祝史告于五廟所過山川亦命國家五官道而出反必親告于祖禰乃命祝史告至于前所告者而后聽朝而入鄭氏曰道近或可以不親告祖故告於禰朝服為事故也山川所不過則不告貶於適天子也反必親告祖禰同出入禮孔氏曰上文諸侯朝天子故著冕服出視朝諸侯相朝降下天子唯著臨朝聽事之服故云朝服為事故也案熊氏曰此朝服謂皮辨服以天子用以視朝故謂之朝服論語云吉月必朝服而朝注云皮辨服是也聘禮諸侯相聘皮辨服明相朝亦皮辨服曽子問曰並有喪如之何何先何後孔子曰葬先輕而後重其奠也先重而後輕禮也自啓及葬不奠行葬不哀次反葬奠而後辭於殯遂修葬事其虞也先重而後輕禮也鄭氏曰並謂父母若親同者同月死自啓及葬不奠務於當葬者不哀次輕於在殯者殯當為賔聲之誤也辭於賔謂告將葬啓期也孔氏曰此一節論並有喪葬之事並謂父母也親同者祖父母及世叔兄弟既父喪在殯先葬母從啓母殯至葬唯設母啓殯之奠朝廟之奠及祖奠遣奠而已不於殯宫為父設奠故云自啓及葬不奠謂不奠父也不奠者不朝夕更改新奠仍有舊奠存也不哀次者次謂大門外之右平生待賔之處柩車出門至次處孝子悲哀柩車暫停今以父喪在殯為重若於此悲哀是輕於在殯者故孝子不得為母伸哀於所次之處出門外遂行而言反葬奠者謂葬母還反於父殯宫而設奠奠父之後孝子告語於賔以明日啓父殯告賔之後遂修營葬父之事案既夕禮主人請啓期告於賔之後即陳喪事故鄭知殯為賔也虞是奠之類故亦先重後輕以禮結之故云禮也虞當異日案皇氏曰葬是奪情故從輕者為首奠是奉飬故令重者居先橫渠張氏曰葬先輕奠先重古者掘壙而葬既並有喪則先葬者必不復土以待後葬者之入相去日近故也葬先輕而後重禮成於重者藍田吕氏曰古之並有喪各行葬虞之禮不相合所以致其哀所謂葬先輕後重直謂自家遣而行之既葬然後再舉後喪耳今必不能然則在量宜處之或以先喪前期而葬亦可行之次序自當尊卑有序世俗之議無義不可取馬氏曰葬者送終之道也人子之心所弗忍也君子於其弗忍也所以先輕而後重奠者求神之道也人子之心所至切也君子於其至切也所以先重而後輕故孝愛之心常在所重唯其不欲遽於送終故既封主人贈祝而先歸唯其欲速於求神故反哭則主人與有司視虞牲孔子曰宗子雖七十無無主婦非宗子雖無主婦可也鄭氏曰族人之婦不可無統孔氏曰此一節論宗子立後之事宗子大宗子也凡人年六十無妻者不復娶以陽道絶故也宗子領宗男於外宗婦領宗女於內昭穆事重不可廢闕故雖年七十猶娶故云無無主婦言必須有也然此謂無子孫及有子而年幼小者若有子孫則傳家事於子孫曲禮七十老而傳是也山隂陸氏曰子曰參也魯為其魯也有至誠焉故孔子有雖不問而告之者矣若此是也河南程氏曰宗子雖七十無無主婦此謂承祭祀也然亦不當道七十只道雖老無無主婦便得嚴陵方氏曰為庶子之宗者謂之宗子為庶婦之主者謂之主婦宗子承家主祭於外而主婦則助之於內者也故宗子雖七十不可以無主婦曽子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰內喪則廢外喪則冠而不醴徹饌而掃即位而哭如冠者未至則廢如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠鄭氏曰冠者謂賔及贊者內喪同門也不醴不醴子也廢吉禮而因喪冠俱成人之服孔氏曰自此至饗冠者論冠子逢喪之事加冠在廟廟則在大門之內吉凶不可同處故內喪則廢外喪謂大門外之喪喪在他處猶可以加冠也但吉時三加之後設醴以禮冠者今既有喪故三加而已不醴之也初欲迎賔未知有喪醴及饌具既已陳設今忽聞喪故徹去醴與饌具又掃除冠之舊位令使清潔乃即位而哭如賔及贊者未至則廢而不冠也未及期日而遭喪言冠日尚逺不可以吉加冠故廢其吉禮因成服而加喪冠也吉冠是吉時成人之服喪冠是喪時成人之服故鄭云俱成人之服嚴陵方氏曰門內之治恩掩義門外之治義斷恩禮所以行義而已故冠禮內喪則廢以其義有所屈故也外喪則冠以其義有所伸故也然而雖冠而不醴以其變常而為之殺也除喪不改冠乎孔子曰天子賜諸侯大夫冕辨服於大廟歸設奠服賜服於斯乎有冠醮無冠醴父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而后饗冠者鄭氏曰酒為醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不為改冠改冠當醴之饗謂禮之也孔氏曰曽子仍疑而發問云此人因喪服而冠徐喪之後不更行吉冠之禮乎孔子引類答曾子謂諸侯幼弱未冠總角從事至當冠之年因朝天子天子賜諸侯大夫或辨或冕之服於天子大廟中榮君之賜歸設奠祭於己宗廟此時身服所賜之服更不改冠也唯行醮以相燕飲不用醴以禮受服者所以然者改冠則當用醴今既受服於天子不可歸更為初冠禮然則因喪而冠除喪不可改冠也酌而無酬酢曰醮醴亦無酬酢醮之所以異於醴者醴則三加之後總一醴之醮則每一加而行一醮凡三醮也案士冠禮適子醴於客位庶子冠於房外遂醮焉醴是古之酒故為重酒是後代之法故為輕也又士冠禮云不醴則醮用酒謂國有舊俗聖人不改者孔子既答其問又以父沒而冠之禮告之曾子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賔賔弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也鄭氏曰奠無尸虞不致爵小祥不旅酬大祥無無算爵彌吉也孝公隱公之祖父孔氏曰此一節論喪祭簡略之事練小祥祭也旅謂旅酬小祥彌吉但致爵於賔而不行旅酬於禮未備故也奠所以無尸者奠是未葬之前形體尚在未忍立尸虞是葬後形體已去鬼神事之故立尸以象神案士虞禮賔三獻尸尸卒爵禮畢無致爵以下之事所謂虞不致爵也案特牲又云尸止爵之後主婦致爵於主人次主人致爵於主婦尸致爵於主人主婦主人酬賔及獻長兄弟衆兄弟內兄弟於房中賔酬長兄弟長兄弟酬衆賔衆賔酬衆兄弟所謂旅酬也小祥不旅酬謂奠酬於主人主人酬於賔賔不舉主人所酬之觶也旅酬之後賔弟子兄弟弟子各酌於其尊舉觶各於其長賔取觶酬兄弟之黨長兄弟取觶酬賔之黨所謂無算爵大祥乃得行旅酬而不得行此無算爵之事以漸備禮故云彌吉嚴陵方氏曰昭公未可為而為之則於禮為不及孝公可以為而不為則於禮為過過猶不及故皆以為非禮也然而不及於禮為近於薄過於禮為近於厚故於昭公則言非禮於孝公則曰亦而已曾子問曰大功之喪可以與於饋奠之事乎孔子曰豈大功耳自斬衰以下皆可禮也曽子曰不以輕服而重相為乎孔子曰非此之謂也天子諸侯之喪斬衰者奠大夫齊衰者奠士則朋友奠不足則取於大功以下者不足則反之曾子問曰小功可以與於祭乎孔子曰何必小功耳自斬衰以下與祭禮也曾子曰不以輕喪而重祭乎孔子曰天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取於兄弟大功以下者鄭氏曰饋奠在殯時也天子諸侯斬衰者奠為君服者皆斬衰也唯主人不奠大夫服斬衰者不奠辟正君也齊衰者其兄弟士服齊衰者不奠辟大夫也言不足者謂殷奠時祭謂虞卒哭時輕喪重祭怪使重者執事也孔氏曰此一節論為死者服還得為死者饋奠之事曽子之意云已有大功喪可與他人饋奠乎孔子不解問㫖謂曾子所問已有大功之喪得為大功者饋奠以否故答云斬衰以下皆可言身有斬衰所為者斬衰身有齊衰所為者齊衰皆可與於饋奠故云禮也孔子據所服者言之曽子又不解謂為他人故更問云若為他人不以輕己喪服而重他人相為饋奠乎孔子乃言據所為服者饋奠非為他人也以下乃論所為饋奠之事大夫之喪子及家臣雖服斬衰不得饋奠辟天子諸侯之正君故鄭知齊衰唯兄弟也殷奠謂月朔之奠有牲牢黍稷用人多盛於常奠執事之人不足則反取前人執事者充之天子斬衰者奠大夫用齊衰士應先取大功以位卑不嫌敵君故遣朋友也案士虞禮祝免藻葛絰帶鄭云治葛以為首絰及帶接神宜變也然則士之屬官為其長弔服加麻矣祝則僚屬也加麻則朋友也鄭知與祭為虞卒哭時非練祥者以士練祥之祭大功之服已除不得云取于兄弟大功以下者其天子諸侯則得兼練祥以其時猶斬衰與祭也嚴陵方氏曰與祭蓋喪祭爾非吉祭也故自斬衰以下皆與以服重者與祭乃所以重其喪也曽子反以為輕喪蓋失之矣曽子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人鄭氏曰問已有喪服可以助所識者祭否孔氏曰此一節論身有喪服不得助他人祭事孔子言身有緦服尚不得自祭宗廟何得助他人祭而熊氏謂身有緦服則不得自為父母虞祔卒哭祭此謂同宫緦士為妾有子及大夫為貴妾是也若大夫士有齊衰大功小功緦麻同宫則亦不祭若異宫則殯後得祭故雜記云父母之喪將祭而昆弟死既殯而祭若同宫則雖臣妾葬而後祭虞祔亦然天子諸侯臣妾死於宫中雖無服亦不得為父母虞祔卒哭祭也天子諸侯適子死斬衰既練乃祭天子諸侯為適孫適婦則既殯乃祭以異宫故也橫渠張氏曰緦不祭禮也所祭於死者無服則祭以其己之私喪也此謂簠簋既陳籩豆既設而有喪也若未陳設亦未必祭也古緦不祭而今在喪不欲廢祭人事之重莫甚於哀死故有喪者之毁如不欲生大功之喪業猶可廢喪不二事如此則祭雖至重亦有所不可行蓋祭而誠至則哀亡矣祭而誠不至不如不祭之為愈後世哀死不如古人之隆故多疑如此嚴陵方氏曰此所謂祭蓋吉祭也故雖緦麻之輕亦不與山隂陸氏曰據上應云相識之喪緦可與於祭乎今云喪服嫌緦已輕有不必問也曽子問曰廢喪服可以與於饋奠之事乎孔子曰說衰與奠非禮也以擯相可也鄭氏曰廢喪服謂新除喪服也孔子曰非禮為執事於人之神忘哀疾也孔氏曰此一節論大祥除服不得即與他人饋奠之事廢猶除也不問可與吉祭而問與饋奠者以己新說喪服吉祭決不可此謂他人在殯饋奠之事是他人之重者己新說衰凶事相因疑得助奠故問之也橫渠張氏曰有喪而祭是不誠也脫衰著吉以臨祭事此心如何嚴陵方氏曰饋奠雖凶事然非己喪也故說衰而與奠為非禮若夫以擯相則非行事之正故於禮或可山隂陸氏曰喪服蓋亦言緦廢猶脫也為饋奠而脫之是之謂廢故下文云曽子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而后嫁之禮也女之父母死壻亦如之鄭氏曰吉日取女之吉日也必使人弔者未成兄弟父喪稱父母喪稱母禮冝各以其敵者也父使人弔之辭云某子聞某之喪某子使某如何不淑母則若云宋蕩伯姬聞姜氏之喪伯姬使某如何不淑凡弔辭一耳父母不在稱伯父世母弔禮不可廢也伯父母又不在則稱叔父母已葬必致命者不敢以纍年之喪使人失嘉㑹之時也使人請請成昏也女免喪壻之父母亦使人請其已葬時亦致命孔氏曰此一節論昏娶遭喪之事禮各冝以敵若彼父死則此當稱父遣使彼母死則此稱母遣使弔也弔辭云某子謂此父姓位某之喪謂彼家死者使某者是使者之名淑善也注引宋蕩伯姬鄭假說為文也男弔女家女弔男家皆云如何不淑是弔辭一也壻已葬哀情稍殺故致命女氏夫婦有兄弟之義壻免喪後則應迎婦必須女之父母請者以壻家前已致命壻既免喪所以須請也女之父母死亦葬後致命男氏許諾而不敢娶女免喪壻父母亦使人請女家不許壻而後别娶禮也陽唱隂和壻之父母使人請昏而女家得有不許者亦以彼初葬訖致命於己故也嚴陵方氏曰夫唱而婦和兄先而弟後則夫婦固有兄弟之義故此言不得嗣為兄弟也詩不云乎宴爾新昏如兄如弟以是而已曾子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反鄭氏曰布深衣縞總婦人治喪未成服之服女在塗父母死則反奔喪服期孔氏曰女在塗聞舅姑喪即改嫁時衣服嫁服者士妻褖衣大夫妻展衣卿妻則鞠衣士昏禮云女次純衣純衣即褖衣也深衣謂衣裳相連前後深邃故曰深衣縞白絹也總束髮也長八寸士喪禮注始死至將斂皆不云縞總文不備也喪服女子子在室為父箭筓髽衰三年父卒為母亦三年今既在塗非復在室故為父母皆期於時女亦改服布深衣縞總反而奔喪嚴陵方氏曰喪者人之所自盡故不可以昏姻之禮廢山隂陸氏曰女改服布深衣言布不言麻深衣之粗者也如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服於外次女入改服於內次然後即位而哭曾子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何反於初鄭氏曰不聞喪即改服者昏禮重於齊衰以下復猶償也過時不祭以重喻輕也反於初謂同牢及饋饗相飲食之道孔氏曰女既未至聞壻家有齊衰大功之喪則廢其昏禮男謂壻也不入大門改其親迎之服服深衣於門外之次女謂婦也入大門改其嫁服亦服深衣於門內之次男女俱改服畢然後就壻家為位而哭曽子不問小功者以小功輕不廢昏禮待昏禮畢乃哭耳故雜記云小功可以冠子取婦上文聞父母喪在塗即改服今入門始改服者案禮運云三年之喪與新有昏者期不使又王制云齊衰大功三月不從政是昏禮重於齊衰以下也此謂在塗聞齊衰大功乃廢昏禮約上冠禮之文若婦已揖讓入門內喪則廢外喪則行昏禮然昏禮重於冠故雜記云大功之末可以冠子小功之末可以娶妻也曽子以初昏遭喪不成禮疑除喪更為昏禮孔子謂祭祀是奉事鬼神昏禮是生人燕飲祭重而昏輕重者過時尚廢輕者不復可知案皇氏曰即位而哭就喪家為位哭也若女家齊衰大功之喪女不反歸其改服即位與男家親同也熊氏曰過時不祭謂四時常祭若喪祭及禘祫祭雖過時猶追而祭之故禘祫志云昭十一年齊歸薨十三年㑹於平丘冬公如晋不得祫至十四年乃追而祫之十五年乃禘也又僖公八年春當禘以正月㑹王人於洮故七月而禘故雜記云三年之喪既顈其練祥皆行是追行前練祥祭也臨川王氏曰正義引期不使三月不從政為據以此論昏􅊚不幸而過時雖齊衰之末以昏􅊚不亦可歟昏禮重於冠大功之末可冠小功之末可娶通典引鄭義云已許嫁使降從大功理或然也孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭於禰成婦之義也鄭氏曰不息燭親骨肉也不舉樂重世變也廟見謂舅姑沒者祭於禰以婦有共養之禮猶舅姑存時盥饋特豚於室孔氏曰不舉樂者思己之娶妻嗣續其親是親之代謝感世之改變也若舅姑存者於當夕同牢之後明日婦執棗栗腵修見於舅姑見訖舅姑醴婦醴婦訖婦以特豚盥饋舅姑盥饋訖舅姑饗婦更無廟見之事若舅姑既沒至三月之後於廟中以禮見於舅姑其祝辭告神稱來婦選擇吉日婦親自執饌以祭於禰廟以成盥饋之義昏禮云婦入三月乃奠菜是也廟見奠菜祭禰同是一事若舅姑偏有沒者厥明婦盥饋於其存者三月廟見於其亡者此盥饋廟見皆謂適婦其庶婦案士昏禮庶婦則使人醮之婦不饋注云使人醮之不饗也不饋者共養統於適也以此言之則庶婦不廟見也昏禮唯云不饋不云不見則庶婦亦以棗栗腵修見舅姑也廟見必待三月一時天氣改變乃可以事神也熊氏云如鄭義則從天子以下至於士皆當夕成昏舅姑沒者三月廟見故成九年季文子如宋致女鄭云致之使孝非是始致於夫婦也又𨼆八年鄭公子忽先配而後祖鄭以祖為祖道之祭應先為祖道然後配合今乃先配合後祖祭如鄭此言皆當夕成昏也若賈服之義大夫以上無問舅姑在否皆三月見祖廟之後乃始成昏故譏公子忽先為配匹乃見祖廟故服䖍注云季文子如宋致女謂成昏是三月始成昏與鄭義異也橫渠張氏曰古者婦三月而後廟見女家馬亦不去必三月而後反此則慎重服事祖考可以事宗廟不可以事宗廟於此時決之女家然後反馬嚴陵方氏曰不息燭則不寢故也不舉樂則不樂故也夜而不寢則相離之時無時而懈日而不樂則嗣親之思無時而散婦人謂嫁曰歸故於廟見稱來婦士昏禮所謂某氏來婦是矣祭於禰以成婦之義言禰則皇姑從可知禮記集說卷四十七
