body:
  text: 禮記集説卷六宋衛湜撰客若降等執食興辭主人興辭於客然後客坐主人延客祭祭食祭所先進殽之序徧祭之三飯主人延客食胾然後辯殽主人未辯客不虛口鄭氏曰辭者辭主人之臨已食若欲食於堂下然延道也祭祭先也君子有事不忘本也客若降等則先祭主人所先進先祭之所後進後祭之如其次也殽徧祭謂胾炙膾也以其本出於牲體也公食大夫禮魚腊湆醬不祭也延客先食胾後食殽殽尊也凡食殽辯於肩食肩則飽客不虛口俟主人也虛口謂酳也客自敵以上其酳不待主人飽主人不先飽也孔氏曰降下等也謂大夫為卿之客其品等卑下也執捉也食飯也興起也客既卑故未食先執飯起以辭謝主人飯為食主故特執之客既興辭故主人亦起辭止之則客從辭而止乃復坐食也延客祭者君子得食則種種出少許置在豆間之地以報先代造食之人敵客則得自祭不須主人之延道也凡祭食之法随主人所設前後次第種種而次祭之序次序也次序徧匝祭之也三飯謂三食也禮食三飧而告飽須勸乃更食三飯竟主人乃道客食胾案公食大夫禮三飯但食醬及他饌而未食胾蓋以胾為加客三飧前未食之然公食禮三飧竟不云延客食胾與此異也食胾竟後乃始辯殽辯匝也主人道客令食至飽故食殽得匝也特牲少牢云初食殽次食脊次食骼後食肩故鄭云辯於肩則飽也虛口謂食竟飲酒蕩口使清潔及安食也用漿曰潄令口以潔清為義用酒曰酳酳訓演言食畢以酒演養其氣客雖食殽已匝不得輒酳蓋主人常讓客不自先飽故客待之也案公食禮雖設酒優賔不得用酳但以漿潄口此是私客故用酒以酳也藍田吕氏曰降等謂大夫於卿士於大夫也但執食興辭而不下堂大夫於君其辭也必下堂君辭而後升公食大夫禮賔左擁簠粱右執湆以降公辭賔坐奠于階西對坐取之升反奠于其所是也君子戒慎乎其所不睹恐懼乎其所不聞所以敬乎神明者未嘗斯須忘也神無方不在則未嘗有所間也故飲食必祭所以祭者莫適祭也祭其神也莫適祭則吾之敬心無時而不存也延客祭者客卑於主人客不敢先必延之而後祭也孔子曰吾食於少施氏而飽吾祭作而辭曰䟽食不足以祭是也主人所先進者則先祭之後進者則後祭之亦所以敬主人也殽謂骨體如特牲少牢尸飯舉幹舉骼舉肩皆振祭是謂徧祭既食胾則徧食之所謂辯殽也徧食如尸嚌之是也先儒以此殽為膾炙膾炙禮謂之庶羞非殽也所謂徧祭者謂徧舉骨體而祭也胾加豆也客既三飯主人延客食加所以盡其勤也主人未辯客不虛口亦謂降等之客必俟主人徧食殽胾乃敢卒食而酳蓋有所待也臨川王氏曰主人延客祭先王制禮無非敎也無終食之間違仁者其祭之謂乎長樂陳氏曰古者於爨則祭先炊於樂則祭樂祖將射則祭侯用火則祭司爟用龜則祭先卜養老則祭先老於馬則祭馬祖馬社於田則祭先嗇司嗇於學則祭先聖先師凡此不忘本也又況飲食之間哉馬氏曰飲食唯魚腊醬湆不祭以其非物之盛則餘殽莫不徧祭也飲禮三爵而退食禮三飯而止者不盡人之歡非專為飲食之義也故三飯主人延客食胾然後辯殽蓋主人之加禮則義不可辭也廬陵胡氏曰祭食祭所先進食飯也黍稷稻粱之屬所先進者則祭之後者不祭若殽之序則徧祭徧皆也公食之禮雖設酒為優賔不得用酳故鄭註彼云但以漿潄口而已則此虛口安知其酳耶愚謂若主人食殽未徧客不虛口耳非酳也王氏曰殽之序徧祭之則自殽之外蓋有不祭者如魚腊醬湆非食之盛可以無祭也此據卑客故一聽命於主人食至則必興辭以祭則不敢先舉以胾則不敢先嘗殽之徧不敢先飽若敵客則不然矣雖然禮無惡乎過厚賔主既設其勢必有所先以敵者而施是禮焉其誰曰不可而況賔主燕食之間恩意相接客之謙惟恐先乎主人而主人之厚於客惟恐有所不足也雍容揖遜愛敬有餘較之公食大夫之禮尊卑不至截然蓋得禮之中者也孰得而少之哉侍食於長者主人親饋則拜而食主人不親饋則不拜而食鄭氏曰勸長者食耳雖賤不得執食興辭拜而已示敬也不拜以其禮於已不隆孔氏曰向是自為客法此明侍從尊長為客禮也饋謂進饌也已雖侍尊長而主人若自親饋與己己則拜謝之而後食也横渠張氏曰從長者而就人食若主人親饋及已則拜而食若不親饋則禮非為我不拜而食不敢當其禮也與雖貳不辭同義藍田吕氏曰凡稱侍者少賤之於長者毋敢視賔客也若執弟子職而侍之侍飲侍食侍坐皆然以賔主之義不全故無執食興辭之節也若長者加禮略申賔主之敬而親饋之則拜之而已若不親饋則主人之敬不足亦不必拜也王氏曰禮於施報之義貴適中而已主人親饋而客不拜以荅之固無是理主人不親饋而客或拜焉是為佞者也是愧主人而使之不自安也既以失己又以失人知禮者為之乎故聖人謹之共食不飽共飯不澤手毋摶飯毋放飯毋流歠毋咤食毋齧骨毋反魚肉毋投與狗骨毋固獲毋揚飯飯黍毋以箸毋嚃羮毋絮羮毋刺齒毋歠醢客絮羮主人辭不能亨客歠醢主人辭以窶濡肉齒決乾肉不齒決無嘬炙鄭氏曰不飽謙也謂共羮飯之大器也不澤手為汗生不絜也澤謂捼莎也禮飯以手澤或為擇放飯謂去手餘飯於器中人所穢也流歠大歠嫌欲疾也咤嫌薄之齧為有聲響不敬反魚肉為己歴口人所穢也投骨為其賤飲食之物固獲為其不廉也欲專之曰固爭取曰獲嚃為不嚼菜絮為詳於味絮猶調也刺為其弄口也口容止歠醢亦嫌詳於味也歠者為其淡故決斷也乾肉堅宜用手嘬炙為其貪食甚也嘬謂一舉盡臠特牲少牢嚌之加于俎孔氏曰非禮食則有同器食法共食宜謙不輒厭飫為飽也與人共飯手宜潔淨不得臨食始捼莎手乃食恐為人所穢也取飯作摶則易得多是欲爭飽非謙也手就器中取飯若黏著手不得拂放本器中當棄於篚無篚棄於㑹㑹謂簋蓋也流歠謂開口大歠汁入口如水流則欲多而速是傷廉也咤謂以舌口中作聲似嫌主人之食齧骨一則有聲二則嫌食無肉三則以齧骨可憎也魚肉與人同器已齧殘不可反還器中少牢禮尸所食之餘肉皆别置於肵俎固獲謂與人共食不可專固獨得及爭取也飯熱當待冷若揚去熱氣則為貪快傷廉飯黍當用匕故少牢廪人溉匕註云匕所以匕黍稷也羮有菜當梜嚼若含而歠吞之是欲速而多又有聲不敬且傷廉也絮謂就食器中調足鹽梅是嫌主人食味惡也口容欲靜止不得刺㺯之為不敬醢肉醬也醬宜鹹客失禮而絮羮則主人謝之云以家不能亨煮故味不調適也窶無禮也客失禮而歠醢則主人亦謝之云作醢淡而無鹽故可歠也兩辭皆優饒於賔也濡濕也軟則可以齒決乾肉腊屬也火灼曰炙炙肉濡若食炙先當以齒嚌而反置俎上不一舉而併食併食之曰嘬横渠張氏曰共飯不澤手必有物以取之不使濡其手共飯雖食共一器必各有器以取之毋固獲謂飲食在俎豆越品爭力取而食之嫌其貪也藍田吕氏曰共食者所食非一品也共飯者止飯而已凡與人共者必先人而後已厚人而薄己則不爭矣共食而求飽非讓道也古之飯者以手與人共飯摩手而有澤人將惡之而難言也食言放羮言流皆貪肆飲食而無容也孟子曰放飯流歠而問無齒決決之失小而流放之過大也毋咤食當食叱咤惡無容也毋投與狗骨惡以人食而食獸也毋固獲惡必得也毋揚飯惡欲速也毋飯黍以箸惡用非所宜也毋刺齒取齒間之餘也毋絮羮絮讀如漂絮之絮玩之而不食必調飪失其節故主人辭不能亨也醢之味厚非可歠而歠之則味薄可知故主人辭以窶廣安游氏曰聖人知夫人之大欲在夫飲食也而致詳於飲食之禮終食之間而人之賢不肖可得而知也貪也犯人之所惡也薄主人之飲食也聲容之不敬也所謂小人之情狀畢見於此矣聖人之敎不待其已麗於大惡而後正之也待其大惡而正之則無及矣故夫起居飲食之間而為之禮焉聖人之用意微矣古之制禮者禮與食相懸而為重輕故曰禮與食孰重孟子曰禮重惟其有禮而食也則有肉乾人饑而不食者矣惟其無禮而食也則有紾兄之臂而奪之食者矣惟其肉乾人饑而不食而後其人可使饑餓而不可使之犯非禮可使蹈患難而不可使之犯非義若此者治與安之所從生也紾兄之臂而奪之食則凡可以得食者無不為而凡可以取利者無不敢也亂與亡之所從出也去亂而即治去亡而即安則夫禮之施於飲食之際者其可後乎馬氏曰君子於觴酒豆肉之間未嘗不致謙而養廉也卒食客自前跪徹飯齊以授相者主人興辭於客然後客坐鄭氏曰謙也自從也齊醬屬也相者主人賛饌者公食大夫禮賔卒食北面取粱與醬以降也興辭不聽親徹孔氏曰卒食食已也食坐南向候客食竟起從坐前北面當已坐而跪自徹已所食飯與齊以授相者飯齊食主故也荅主人初所親饋者也齊醬葅通名耳此是卑者侍食之禮敵者則否藍田吕氏曰主人興辭於客然後客坐此與客降等執食興辭之義同敵者則不親徹也凡此容止之節疑若繁縟而難行然大人成徳動容周旋中禮則於斯也不待學而自中若夫學者將學於禮必先從事於節文之間安於是而不憚煩則其徳為庶幾矣兹禮文之所以不可簡也侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲鄭氏曰降席拜受敬也燕飲之禮鄉尊少者不敢先尊者飲盡爵曰釂燕禮曰公卒爵而後飲也孔氏曰明侍尊長飲酒法也食竟宜飲酒故次之長者賜酒進至侍飲者前則起而拜受於尊所尊所謂陳尊之所貴賤不同諸侯燕禮設尊在東楹之西尊面有鼻鼻向君示君專有此惠也若鄉飲酒及卿大夫燕則設尊陳於房戶之間使賔主得夾尊示不敢專惠也此當是燕禮燕禮無此語文不具耳近尊鄉長者故往於尊所向長者而拜長者辭少者之起故少者復反還其席而飲賜酒也舉猶飲也須俟長者盡爵而後少者乃得飲也然士相見及玉藻皆云卒爵而俟君卒爵然後授虛爵二文皆先君卒爵者謂私燕之禮此據燕飲正禮故不同也臨川王氏曰拜受於尊所此是初進酒時一拜受耳不然則已煩矣藍田吕氏曰侍飲之禮與侍食同因燕閒而飲食非賔主之正禮也古之飲酒貴賤少長無不及也鄉飲酒之禮堂下之賔樂工及笙無不與獻特牲饋食禮賔兄弟弟子公有司私臣無不與獻其獻也皆主人親酌授之此侍飲者亦長者親酌授之所以有拜受于尊所之節也惟燕禮以宰夫為獻主故君不親酌也長者舉未釂少者不敢飲猶燕禮受賜爵者以爵就席坐公卒爵然後飲也然士相見禮及玊藻與燕禮異者恐侍飲於長者偶與燕禮同而與侍飲於君異也嚴陵方氏曰謂之尊所以尊其惠之所自出故也賜爵者必面於尊所所以專惠於己受爵者必拜於尊所所以歸惠於上也王氏曰禮莫嚴於少長之分至於飲酒之際尤人情之所易縱故記禮者必致其委曲焉一飲之頃少之所以事長者如此其至凡所以習人敬順之心於平居無事之時彼其瀆尊犯分之念何自而有哉經曰禮之敎化也微其止邪於未形之謂也長者賜少者賤者不敢辭鄭氏曰不敢亢禮也賤者僮僕之屬孔氏曰此明凡受賜禮也少謂幼穉敵者亢而有辭少者賤者故不敢也藍田吕氏曰辭遜之節行於賔主之際而已體不敵則毋敢視賔客所謂不敢辭者義所可受不敢以辭之也有一辭有再辭有三辭各稱其事也孟子曰尊者賜之曰其所取之者義乎不義乎以是為不恭故弗卻若夫義不當受雖尊者之賜亦辭如子思辭魯繆公之鼎肉孟子辭齊之兼金百鎰是也長樂陳氏曰上之賜也以恩下之受也以義義之所可雖長者之賜不敢辭義之所不可雖君之賜有所不受賜果於君前其有核者懐其核御食於君君賜餘器之溉者不寫其餘皆寫鄭氏曰懐核嫌棄尊者物也木實曰果溉謂陶梓之器不溉謂萑竹之器也寫者傳已器中而食之重汙辱君之器也勸侑曰御孔氏曰君食竟以食殘餘物賜御者器可滌溉不畏汙則不須倒寫如陶是瓦甒之屬梓是杯杅之屬並可滌潔仍於器中食之食訖則滌以還君若其餘不可溉之器如織萑葦織竹為筐筥不可溉滌不倒寫之則浸汙其器是壊尊者物也藍田吕氏曰二者皆廣敬也果核當棄重君賜故懐之而不棄也御食侍食也如内則父没母存冢子御食是也永嘉戴氏曰果核餘物也不敢棄君之餘器用微物也不敢同君之器所以習臣子恭順之心於人情慢易之際也山隂陸氏曰變侍言御御以卑御尊侍侍之而已陳敬仲曰臣卜其晝未卜其夜是御也非侍也廬陵胡氏曰寫謂傾於别器餕餘不祭父不祭子夫不祭妻鄭氏曰食人之餘曰餕餕而不祭唯此類也食尊者之餘則祭盛之孔氏曰祭謂祭先也因前有賜餘故明食人之餘不祭者也凡食人之餘及日晚食朝饌之餘皆云餕凡食餘悉祭惟父得子餘夫得妻餘則不祭言其卑故也非此二條悉祭熊氏曰父得有子餘者謂年老致仕傳家事於子孫子孫有賔客之事故父得餕其餘夫餕其妻餘者謂宗婦與族人婦燕飲有餘夫得食之藍田吕氏曰餕者食餘之名尸謖君與卿四人餕君起大夫六人餕食祭之餘也父母在朝夕常食子婦佐餕食人之餘也皮弁以旦視朝遂以食日中而餕莫食朝之餘也祭食者祭其所未嘗食者以示敬也餕者食之餘祭之則不敬故不祭也雖然所以不祭者唯父之於子夫之於妻而已若尊者則餕餘亦祭也如特牲饋食餕者祭舉祭鉶是也子與妻有餕致於父與夫者蓋祭祀之餘也祭祀有子與妻尸之而已不與者故有餕以致之也齊陳乞曰常之母有魚菽之祭願諸大夫之餕我也此妻之祭而夫食其餕也晉驪姬謂太子申生曰君夢齊姜必速祭之太子祭于曲沃歸胙于公此子之祭而父食其餕也嚴陵方氏曰餕則指其人餘則指其物新安朱氏曰孔子君賜食必正席先嘗之君賜腥必熟而薦之君賜腥則非餕餘矣雖熟之以薦先祖可也賜食則或為餕餘但可正席先嘗而已固是不可薦先祖雖妻子至卑亦不可祭也永嘉戴氏曰夫食必祭示有先也使餕餘而悉祭是以其餘為祭也毋乃不䖍乎父餕子餘夫餕妻餘尊卑之序紊矣意者餕餘不祭與父不祭子夫不祭妻義不相屬乎父不祭子夫不祭妻各使其子主之示有尊也御同於長者雖貳不辭偶坐不辭鄭氏曰御同謂侍食於長者饌宜與之同也貳謂重殽膳也辭之為長者嫌偶坐盛饌不為己孔氏曰御謂侍也侍者雖獲殽膳重而已不須辭其多也所以然者此饌本為長者設耳若辭之則嫌當長者偶嫓也或彼為客設饌而召已往嫓偶於客共食此饌本不為己設故不辭之一云偶二也若惟獨有已主人設饌已當辭謝若與他人俱坐則已不假辭以主人意不必在已也黄氏曰主人有尊客因召已嫓偶雖有盛饌懼妨尊客已不敢辭退待尊者辭之可也故云偶坐不辭若從䟽義之説食人之食而不為己有傷仁義而違禮敎知不為己則寜如避席不食哉餘義藍田吕氏曰御同於長者侍於長者也偶坐者因彼有賔也辭遜行之美者也辭其所當辭然後成其美也如不有其義不當其物則其美者適所以為病歟馬氏曰禮者施報而已主人之禮在我也不辭之非禮也主人之禮不在我也辭之亦非禮也子貢主伯髙之喪孔子語之曰為爾哭也來者拜之知伯髙而來者弗拜也與此同義羮之有菜者用梜其無菜者不用梜鄭氏曰梜猶箸也孔氏曰有菜謂鉶羮無菜謂大羮湆也直歠之而已其有肉調者犬羮兎羮之屬或當用匕也藍田吕氏曰事之細者猶各求其所宜則先王之謹於禮可知矣山隂陸氏曰敎之如此可謂至矣為天子削𤓰者副之巾以絺為國君者華之巾以綌為大夫累之士疐之庶人齕之鄭氏曰副析也既削又四析之乃横斷之而巾覆焉華中裂之不四析也累倮也謂不巾覆也士不中裂横斷去疐而已庶人不横斷孔氏曰絺細葛也華謂半破也爾雅曰𤓰曰華之郭璞云食啖治擇之名也綌麤葛也疐謂脱華處庶人府史之屬此削𤓰等級非謂平常之日當是公庭大㑹之時黄氏曰正義云此削𤓰等級是公庭大㑹之時作䟽之失大矣經云飲食有由則四靈為畜謂天下飲食由從於禮上自天子鼎俎牲牢下及庶人無故不食珍之禮大化既至卵胎可俯而視麟鳳游于郊藪禮化大行天下之人咸恥欺乎闇室者也詎削𤓰之禮而人不從哉藍田吕氏曰削𤓰有等亦以辨上下也自大夫以上皆削故曰為天子為國君為大夫自士以下不削故曰士疐之庶人齕之累之如裸裎之裸也長樂劉氏曰三代之王於府史胥徒女奚莫不用禮以竭其忠孝之誠也如内饔之割烹外饔之刑膴辟雞宛脾熬毋珍捶曲盡精微皆有制度而況𤓰為時新必薦寢廟也大夫以上皆曰為者有司為之也士庶人不曰為者自為之也士庶雖賤居在草野食𤓰之際執刀疐齕而不敢忘於其君而僣其華副之禮忠厚之化可知也嚴陵方氏曰𤓰必用巾者所以奉尊者不敢䙝其物也巾必以絺綌者當暑以涼為貴也李氏曰先王制禮於人情之所欲者養之無不備故翦蟈皆有官於人情之所不能免者治之無不盡故削𤓰猶有制然後使後世無以加也永嘉戴氏曰一𤓰之微横斷中裂何與於尊卑而聖人猶拳拳若此焉天下之事微之不敢忽者所以為大之必謹也削𤓰者其嚴若此由是而推之庶人其有食侯食者乎庶人不敢食侯食臣下其有作福作威而玉食者乎此聖人制禮之微意也父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貎笑不至矧怒不至詈疾止復故鄭氏曰不櫛不翔憂不為容也不惰憂不在私好也不御憂不在樂也不變味變貎憂不在味也不矧不詈憂在心難變也齒本曰矧大笑則見復故自若常也孔氏曰此一節明親疾人子之禮惰者言語戲劇華飾文辭故鄭云不在私好謂華好也猶許食肉但不許多耳少食則味不變多食則口味變也藍田吕氏曰孝子之事親也病則致其憂憂在乎心故言動不得如其故也冠者不櫛不暇禮也志不惰者其回也歟此言言不惰者蓋不在乎此而及於他言之惰也惰懈也懈則忘之矣父母有疾心未嘗忘乎疾故雖言也不在乎他顔子學於仲尼聽其言也唯恐失之亦不在乎他此所以皆言不惰也矧見齒也詈惡聲也笑怒之變至於如此亦忘乎其親者也嚴陵方氏曰言冠者别於童子冠則有時而不櫛可也童子則無冠矣無時而不櫛焉此所以止言冠者不櫛也以憂親之疾而忘其身之飾故也言不惰則以憂勤而不敢惰也琴瑟不御者不以所樂而忘所憂也樂必以琴瑟為言者蓋常御之樂士無故則不去故也御猶御馬之御遲速緩急唯御者之聽焉以其聲有遲速絃有緩急故琴瑟得以謂之御也詩曰琴瑟在御與此同意物有常味也食肉多品則為變味人有常貎也飲酒過量則或至變貎長樂陳氏曰儀禮曰疾者齊養者皆齊則自行不翔以至怒不至詈皆齊之事然此亦中人之制孝子䟽節也文王行不能正履不特不翔而已色憂不特言不惰笑不至矧而已一飯亦一再飯亦再不特食肉飲酒不變味變貎也王氏曰父母有疾而致其憂此子職所當然也聖人猶必為之委曲以制禮者蓋以人情有過有不及焉約之以禮庶乎歸之於中也有憂者側席而坐有喪者專席而坐鄭氏曰側猶特也憂不在接人不布他面席専席降居處也専猶單也孔氏曰憂亦謂親有疾也側猶獨也獨席謂獨坐不舒他面席也明憂不在接人也吉時貴賤有重席之禮若父母始喪寢苫無席卒哭後乃有芐翦不納自齊衰以下始喪而有席並不重降居處也横渠張氏曰有憂者心未安故側席喪已然者坐無容故專席非謂不與賔客接也藍田吕氏曰側席坐不安也專席不與人共坐也有憂者行不能正履則坐不能安席可知矣有喪者致於哀慕心不二事則不與人共處可知矣居倚廬非喪事不言既練居堊室不與人居皆專席之義也先儒以側為特以專為單既無所據而以側為特如禮所謂側降側受之類所訓雖可然與專席無别則不可以特訓側也廬陵胡氏曰側不正也漢王嘉傅喜魏徐奕傳皆云楚有子玉則文公側席而坐專猶特也王氏曰側席與儀禮所謂側殺側受醴之側同專席與郊特牲所謂專席而酢之專同水潦降不獻魚鼈獻鳥者佛其首畜鳥者則勿佛也獻車馬者執䇿綏獻甲者執冑獻杖者執末獻民虜者操右袂獻粟者執右契獻米者操量鼓獻孰食者操醬齊獻田宅者操書致鄭氏曰水潦魚鼈不饒多也佛首為其喙害人也佛戾也蓋為小竹籠以冒之畜養也養則馴凡操執者謂手所舉以告者也設其大者舉其小者便也甲鎧也胄兜鍪也民虜軍所獲也操其右袂制之契券要也右為尊量鼓量器名孔氏曰自此至如使之容一節明獻遺人物及授受之儀天降下水潦魚鼈難得故鄭云不饒多也或云水潦魚鼈常足不饒益其多䇿綏者䇿是馬杖綏是上車之繩車馬不上於堂䇿綏易呈呈之則知有車馬也謂鎧為甲者言如龜鼈之有甲也鎧大兜鍪小小者易舉執以呈之獻杖執末者末謂柱地頭也不淨不可向人故執以自向民虜謂征伐所獲右袂右邊袖也以左手操其右袂用右手以防其異心執操互言耳粟稻粱之屬契謂兩書一札同而别之米六米之等量是知斗斛之數鼓是量器名也隠義云東海樂浪人呼容十二斛者為鼓以量米故云量鼓米可即食為急故獻者執量粟可久儲為緩故獻者執契熟食葱㳿之屬醬齊為食之主執主來則食可知若見芥醬必知獻魚膾之屬也書致謂圖書於板丈尺委曲書之而致之於尊者也以上諸物可動故不云致而田宅著土故板圖書畫以致之故言書又言致也然古者田宅悉為官所賦本不屬民今得此田宅獻者是或有重勲為君王所賜可為己有故得有獻藍田吕氏曰獻遺授受之節文其别有獻有遺有進有效有執有授有問獻車馬獻甲獻粟獻米獻食獻田宅此六者不可手執則執一物以表其獻少儀云車則説綏執以將命甲若無以前之則袒櫜奉胄粟者榖之緫名黍稷稻粱之屬未為米者也古者以契為信居者執左契出者執右契蓋予人粟者執左契以待之左契者無所事以待有所事此老氏所謂聖人執左契是也取人粟者執右契以合之此獻粟者所以執右契以表之也醬齊者主人親設客親徹食之主也熟食之與醬齊各有所宜所謂不得其醬不食杖與民虜二者可執而獻之故不以物表之也杖之末居地有坌汙故自執之且便於受獻者之執也長樂陳氏曰水潦降不獻魚鼈則獻魚鼈必視其時也獻鳥者佛其首養鳥者勿佛則獻鳥必視其性也獻車馬以至於田宅皆有所執則舉其要也廬陵胡氏曰水涸魚鼈易得不必獻舊引春秋水潦方降云雨降非執胄胄在首先之民虜俘獲者馘取左而袂操右各制其强力書亦契券之類然古者田宅官制其籍本不屬民今得獻之者記此禮者或出漢儒山陰陸氏曰佛首以翼佛之若今佛雞鶩矣嚴陵方氏曰杖或以木或以竹有本有末趙簡子賦晉國一鼓鐵釋者謂鈞四謂之石石四謂之鼓理或然也新安朱氏曰右契契是合同底物以右為上將獻於人必執其右自取其左是自收其無用者所以老子云執左契以涖天下李氏曰先王之時所謂獻田宅者豈民將有徙者歟凡遺人弓者張弓尚筋弛弓尚角右手執簫左手承弣尊卑垂帨若主人拜則客還辟辟拜主人自受由客之左接下承弣鄉與客並然後受鄭氏曰弓有往來體皆欲令其下曲隤然順也遺人無時已定體則張之未定體則弛之簫弭頭也謂之簫簫邪也弣把中帨佩巾也磬折則佩垂授受之儀尊卑一若主人拜拜受也辟拜謙不敢當由從也從客之左右客尊之接下接客手下也承弣卻手則簫覆手與鄉與客並謂於堂上則俱南面禮敵者並授孔氏曰此敵體故稱遺也弓之為體以木為身以角為面筋在外面張之時曲來鄉内故遺人則使筋在上弓身曲向其下其弛之時反張向外筋在曲内角在曲外今遺人則角向其上弓形亦曲向下故鄭云皆欲令其下曲隤然順也案槀人云春獻素秋獻成註云矢箙春作秋成矢箙既獻素明知弓亦獻素素形朴也故士喪禮註云形法定為素又弓人云秋合三材冬定體則合三材之時可以獻人故此註云未定體則弛之也簫弓頭頭稍剡差邪似簫故謂為簫又謂為鞘鞘簫言相似執簫謂客覆右手執弓下頭也弣謂弓把也授在地地道貴右主人推客居右客覆右手執弓下頭又卻下左手以承弓把把當中央而髙兩頭頽下以授主人主人在左知是執弓下頭者拄地不淨故自執之以上頭授人示敬也尊卑謂賔主俱是大夫則為尊俱是士則為卑若主人拜受所遺還辟猶逡廵也客謙故逡廵遷延辟主人之拜不荅拜者執弓不得拜也主人既敵故自受之拜客既竟從客左而受之主人既還在客左與客並郤左手接客左手之下而承弣又覆右手捉弓下頭必知客主俱郤左手承弣右手覆簫者蓋主人用右手承弣則是倒執弓也鄉與客並謂前云由左恐人或相對而左右也今明既拜客竟則還前立處與客俱向南而立乃後受弓故鄭云俱南面解鄉與客並也言於堂上則俱面南向明也若不於堂上當随便亦俱向明也藍田吕氏曰凡以物相饋下之於上曰獻上之於下曰賜敵者曰遺遺人弓而不曰獻蓋敵者也張則弓之體來筋外而角内故尚筋弛則弓之體往角外而筋内故尚角或張或弛者弓體定則張之未定則弛之也右手執簫左手承弣者受者便於執也少儀云弓則以左手屈韣執弣授受之儀尊卑皆稍磬折故皆垂帨也由客之左吉事尚右以尊賔也接下承弣敬受之也鄉與客並然後受者敵相遺皆南鄉横渠張氏曰尊卑垂帨至地髙下之節也尊卑者髙下也尊者謂賔主卑者謂賔主之侍者尊者磬折則卑者亦當然新安朱氏曰賔主雖或一尊一卑然皆當磬折垂帨也馬氏曰禮曰主佩垂則臣佩委明尊卑俯仰之異也言尊卑垂帨而無上下之異者蓋賔主授受之禮非臣主之際也佩之有帨者以自清潔也詩曰無感我帨兮戒非禮之汚其清潔也廬陵胡氏曰尊卑垂帨獻受皆敬還辟猶退却也廣安游氏曰凡此皆自處不安而處人以安也大抵古之為禮者有勞焉有辱焉有惡焉有賤焉有不安焉為禮者親其勞而不以勞施於人躬其辱而不以辱及於人受賤受惡而以貴者善者委之於人以不安者自與而以安者與人惟其如此則可事上事長事君親事師友可以羣居可以行世此制禮之意也金華邵氏曰獻車馬獻甲胄獻民虜粟米熟食田宅其事若重於弓矣然數者皆不著其儀獨於一弓之授受必謹焉者蓋古者射以觀徳而弓者觀徳之具也於授受而不謹則異時執弓挾矢支左屈右必有失其儀者此聖人所深慮也禮記集説卷六
