body:
  text: 禮記集說卷一百五十八宋衛湜撰是故古者天子以射選諸侯卿大夫士射者男子之事也因而飾之以禮樂也故事之盡禮樂而可數為以立德行者莫若射故聖王務焉是故古者天子之制諸侯歲獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰射者射為諸侯也是以諸侯君臣盡志於射以習禮樂夫君臣習禮樂而以流亡者未之有也鄭氏曰選士者先考德行乃後決之於射男子生而有射事長學禮樂以飾之歲獻國事之書及計偕物也三歲而貢士舊說云大國三人次國二人小國一人流猶放也書曰流共工于幽州孔氏曰此一節明天子以射禮簡選諸侯以下德行能否又明諸侯君臣盡志於射以習禮樂無流亡之患諸侯繼世而立卿大夫有功乃升非專以射而選但既為諸侯卿大夫更以射辨其才藝髙下非謂直以射選補始用之也男子生有懸弧之義因此射事更飾以禮樂則容體比於禮其節比於樂是也凡事之中能窮盡禮樂而可數為之以興立人之德行者莫如射故聖王務重焉漢時謂郡國送文書之使為計吏其貢獻之物與計吏俱來故謂計偕物也偕俱也中多者得與於祭此謂大射也案書傳云古者諸侯之於天子也三年一貢士一適謂之好德再適謂之賢賢三適謂之有功有功者天子賜以衣服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸候不云益地者文不具耳又曰一不適謂之過注云三年時也再不適謂之敖注云六年時也三不適謂之誣注云九年時也一絀以爵再絀以地三絀而地畢注云凡十五年鄭以此知三歲而貢士也廬陵胡氏曰歲獻獻計偕之物也於是貢士鄭謂歲獻每歲獻也貢士三歲一貢此蓋書傳之說竊案經意止謂歲獻即貢士爾與書傳異也鄭義非藍田吕氏曰古之選士必以射者非專事於射也諸侯歲貢士於天子固以德進言揚選也天子又試于射宫而進退之將以考諸侯所選之中否而從之有賞罰也射者男子之事也男子之事必有志於四方禦侮扞難則其任也故桑弧蓬矢設於始生士不能射則辭以疾蓋不能射則幾於非男子也及其禮射則容體欲比於禮節欲比於樂而中欲多非其志專一則不能也非動容間習則不能也非心夷氣平強有力而不憚煩則不能也由此觀之射雖一藝而可以觀人之德行則先王選士之意微矣學者閒燕肄業樂而不流究節文之義理亟習之而不倦足以正志意和容體以養人於善此先王所以制射禮故曰事之盡禮樂而可數為以立德行者莫若射故聖王務焉也天子試士於射宫以容體比於禮節比於樂而中多者得與於祭反此者不得與於祭蓋禮樂節文之多唯射與祭為然能盡射之節文而不失其敬可以奉祭祀矣能心平體正持弓矢審固而中多則其誠可以事鬼神矣諸侯以貢士之數與於祭不與於祭而有賞罰以行益地削地之法焉則諸侯所以為諸侯亦以射選也故曰射者射為諸侯嚴陵方氏曰天子大射則共虎侯熊侯豹侯虎侯則天子所自射也熊侯則助祭諸侯所射也豹侯則卿大夫士所射也射之中否足以觀人之賢不肖故天子以之選人焉以之選人而天子亦自射者以身率之也或先行燕禮或先行鄉飲酒之禮所謂飾之以禮也或以騶虞為節或以貍首為節所謂飾之以樂也助祭者助天子行禮樂之事也故射中多者然後得與於祭焉其容體比於禮即進退周旋必中禮也其節比於樂即以采蘩為節也比謂與禮樂相比而不失必曰比於禮樂而後曰中多則知不比於禮樂而偶中者亦不可以言中矣故孔子言射不主皮以至投壺則比投不釋者以是而已射者士也貢士者諸侯也或中或否雖在士而有慶有讓則在諸侯焉故曰射者為諸侯也山隂陸氏曰據射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面此大射也故士不與知然者以司裘王大射則共虎侯熊侯豹侯卿大夫則共麋侯知之也亦天子多賢大射擇賔宜不至於士據若賔射則士射犴侯然則此經云天子以射選諸侯卿大夫士奈何曰射固所以選士特大射不為諸侯與士設爾故曰諸侯在廟則皆北面詔相其法又諸侯歲獻貢士天子試之於射宫而中多者得與祭據此大射不為諸侯與士設可知故事之盡禮樂而可數為苟非禮樂未有可以數為者也歲獻貢士猶言獻之歲貢士也獻三年獻比要之類流亡孟子所謂流連之樂荒亡之行是也長樂陳氏曰貢士與射其來尚矣蓋人之賢不肖不能逃於威儀揖讓之間而好惡趨舍常見於行同能偶之際故射於澤宫飾之以禮樂以觀其德比之以偶以觀其類則人材其遺乎又曰儀禮鄉射合樂大射不合樂者鄉射屬民欲以同其意大射擇士與祭欲以嚴其事故也石林葉氏曰貢士而擇之助祭者所以示敬而不敢專爵祿也故詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽言君臣相與盡志於射以習禮樂則安則譽也是以天子制之而諸侯務焉此天子之所以養諸侯而兵不用諸侯自為正之具也鄭氏曰此曽孫之詩諸侯之射節也四正正爵四行也四行者獻賔獻公獻卿獻大夫乃後樂作而射也莫處無安居其官次者也御猶侍也以燕以射先行燕禮乃射也則燕則譽言國安則有名譽譽或為與孔氏曰上經說諸侯君臣之射此明諸侯之射所歌樂章之節者此貍首之詩也但此篇有貍首字故以為目若騶虞詩其字亦在篇內也侯氏謂諸侯也此諸侯出於王是王之曽孫也小大莫處言燕之時大夫君子及衆庶之士小之與大無有處於職司而不來者皆御侍於君之處所也則燕則譽燕安也既君臣歡樂用是燕安有聲譽是諸侯自為修正之具鄭注樂作而射見大射禮若燕射則說屨升堂坐之後乃射故燕禮脫屨升堂獻士畢若射則大射正為司射如鄉射之禮是也藍田吕氏曰國家閒暇諸侯與其卿大夫盡志於射以習禮樂是諸侯以禮樂養其羣臣也諸侯貢士於天子天子試之以射以中選之多寡為諸侯賞罰則諸侯皆勉習禮樂以事天子是天子以禮樂養諸侯也諸侯養其羣臣至於則安則譽則無流亡之禍矣天子養其諸侯至於則安則譽則兵不用矣此所以天子制之而諸侯務焉者也嚴陵方氏曰侯氏即諸侯以旁出於天子故以氏言之若韓奕言侯氏燕胥覲禮言侯氏亦皮辨是矣言曽孫以見世為諸侯其功德非一世之積也天子制射禮於上諸侯務之於下養諸侯者以使之習聽禮樂則所以養之也養之以禮則不爭養之以樂則無怨不爭無怨則兵不用矣諸侯自為正之具者以射求正諸己故也山隂陸氏曰正言曽孫著諸侯如此非一世之習也四正蓋天子諸侯卿大夫士之正據射人王以六耦射三侯五正諸侯以四耦射三侯三正孤卿大夫以三耦射一侯二正士以三耦射犴侯二正孔子射於矍相之圃蓋觀者如堵牆射至於司馬使子路執弓矢出延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半入者半又使公罔之裘序點揚觶而語公罔之裘揚觶而語曰幼壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序點又揚觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋㢙有存者鄭氏曰矍相地名也樹菜蔬曰圃先行鄉飲酒禮將射乃以司正為司馬子路執弓矢出延射則為司射也延進也出進觀者欲射者也賁讀為僨猶覆敗也亡國亡君之國者也與猶竒也後人者一人而已既有為者而往竒之是貪財也子路陳此三者而觀者畏其義則或去也延或為誓公罔之裘之發聲也射畢又使此二人舉觶者古者於旅也語語謂說義理也三十曰壯耆耋皆老也流俗失俗也處猶留也八十九十曰旄百年曰期頤稱猶言也行也者不言有此行不可以在此賔位也序點或為徐點壯或為將旄期或為旄勤今禮揚皆作騰孔氏曰此一節記孔子射於矍相之圃選賢誓衆之禮案儀禮鄉射先行飲酒之禮此矍相之圃謂賔射故鄭注鄉侯二正是用賔射之正也獻賔及介與衆賔之後未旅之前作相為司正至於將射轉司正為司馬立司馬之時孔子使子路為司射之官出門而延進觀者及欲射之人敗軍之將言無勇亡國之大夫言不忠且無知與為人後謂有人無後既立後訖此人復往竒之是其貪財也竒謂配合之外更有竒隻也公罔氏也裘名也序氏也點名也至將旅之時使二人俱舉觶以誓衆而說所誓之事二十曰幼三十曰壯六十曰耆七十曰耋自幼壯以來行孝弟耆耋而愛好於禮身行獨行不從流移之俗修潔其身以俟死問衆人有此諸行則可在賔位也好學不倦好禮不變者此之所誓彌精於前前雖云孝弟好禮未能不倦不變年雖甚老行道不亂亦精於耆耋好禮但此記所陳唯約鄉射禮案鄉射司射比衆耦于堂西此出延者蓋觀者既多庭中不容故出延之入乃比耦也以初觀者在門外未有賔主之禮故誓惡者令不入以鄉飲酒禮差之射禮畢旅酬之時乃使二人舉觶故鄉射禮畢司馬反為司正樂正升堂復位賔取俎西之觶酬主人主人酬大夫自相旅畢君使二人舉觶於賔與大夫則當此公罔之裘序點二人舉觶之節也但衆耦射事既了皆在賔位主人以禮接之不復斥言其惡但簡其善者耳旄期之老不復能射而得在位此老人本觀禮雖不能射與在賔中故知旅酬之時其人猶在也藍田吕氏曰孔子於鄉黨恂恂如也互鄉難與言也猶與其進陽虎勸之仕則諾之以溫良恭儉讓之德行於天下未聞拒人如是之甚也孟子曰仲尼不為已甚者故矍相之事疑不出聖人聖人沒門人弟子欲阿所好而為此說將以推尊聖人而或不知其德雖逆聖人之意或及於是而不知非聖人之所當言如記稱孔子曰我戰則克祭則受福固孔子之事也而謂孔子言之則非也故矍相之事謂聖人有是意則可矣謂聖人使門人言之則非也雖然語亦有理也故不得不解鄉射之禮先行鄉飲酒至於將射以司正為司馬故曰射至於司馬也記云既旅士不入明未旅士猶可入而與射故子路執弓延射有入不入及去者入者之辭也卒射司馬反為司正然後行旅酬卒旅然後使二人舉觶於賔與大夫射事既卒則衆賔皆在賔位故公罔之裘與序點舉觶以衆官皆在賔位故有不在此位及去者處者存者之辭也賔在門外則司馬誓之使惡者不入賔在賔位則二人舉觶而語不復斥惡但使善者處耳賁軍之將亡國之大夫與為人後者皆有負於世非賢能者也舍其親而為人後有所利之而與求焉是為與人為後與人為後者見利而忘親此君子之所不取也幼壯孝弟耆耋好禮不從流俗修身以俟死者德有立矣好學不倦好禮不變旄期稱道不亂者德有成矣蓋士之立於世無惡者寡矣無惡者有之有立者寡矣有立者有之成德者寡矣不在此位也者疑辭也蓋言在此位也衆所㑹聚簡别賢不肖人所難言也故以疑辭示之猶言文不在兹乎蓋言在兹也不曰乎而曰也者蓋深示其不斥言也嚴陵方氏曰如堵牆言其周圍而固密也射至於司馬謂射至於使司正為司馬之時蓋司正則以治禮名之司馬則以治兵名之也燕禮事也射兵事也方燕之時則名之為司正及射之時則名之為司馬亦各從其類也以將射也故執弓矢以延之以將旅也故揚觶而語焉又各以其類也夫賁軍之將不可以言勇亡國之大夫不可以圖存為人後者不可以謀養幼壯孝弟者幼而孝壯而弟也孟子曰孩提之童無不知愛其親及其長也無不知敬其兄此之謂也流俗言不知所從來也修身以俟死則死而後已也學貴乎力故曰不倦禮貴乎常故曰不變道貴有序故曰不亂孔子十有五而志於學者不倦之謂三十而立者不變之謂四十而不惑者不亂之謂好學然後能立於禮立於禮然後能至於道故言之序如此不謂有如此者否則發問之辭也言能如此然後可以在此位也旄與耄同孟子曰反其旄倪㢙與僅同清江劉氏曰先儒謂人有後矣而又往與之者也有後而又往與之是兩後矣安有兩後者且唯人無後故求後未有有後而又求副者此非子路之指蓋與之者干之也求之也庶子奪其宗非干歟嫡子不後族人支子係族人嫡子而後其族非干歟諸父諸兄尊也諸弟倫也義不可為後非干歟禮不後異姓不為子異姓而為人子非干歟庶子而奪其宗則篡其祖也嫡子而後其族則輕其親也諸父諸兄諸弟而後其子兄弟則亂昭穆也異姓而後於人則背其姓也周衰此等蓋多此仲由之所惡也然則異姓何以有為人子者曰世衰禮廢必首於夫婦之間夫死子幼莫安其室於以適人少依其居長從其姓貴利其祿富利其貨而莫之自外此亂之甚者君子不易人之姓人亦不可易姓也馬氏曰觀者如堵牆以言其衆庶也揚觶而語以言其詢衆庶也敗軍之將亡國之大夫不入蓋謀人之兵師敗則死之謀人之邦邑危則亡之二者可以死而不死則非忠捨己之親而與為人之後者則非孝也去與入半以言其圃之外者去與處半以言其圃之內者而㢙者僅也蓋公罔之裘語之以略序點語之以詳略故責之以輕而處者半詳故責之以重而存者少則幼壯孝弟耆耋好禮不從流俗修身以俟死者所謂序賔以不侮也好學不倦好禮不變旄期稱道不亂者所謂序賔以賢也蓋幼壯孝弟言其善始好學不倦言其善終耆耋好禮則未至於道旄期稱道則不止於禮不從流俗者不從於外而已好禮不變則不變於內此其輕重之别也山隂陸氏曰觀者如堵牆為孔子來是以如是之多子夏曰聖人之葬人與為人後者謂不見先於人也孔子曰四十五十而無聞焉斯亦不足畏也已揚觶將以飲不勝者鄉射云不勝者進北面坐取豐上之觶立卒觶是也唯賢者發而不失正鵠故曰不在此位聞公罔之裘之言而去者蓋不能保其必勝者也故曰發而不失正鵠者唯賢者乎若夫不肖之人則彼將安能以中公罔之裘揚觶以待初射之用序點又揚觶蓋以待再射之用鄉射曰設豐實觶如施之此當實序點所揚之觶也夫禮必再射以備幸中故序點所言又進於公罔之裘一等射之為言者繹也或曰舍也繹者各繹己之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射己之鵠故天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中則不得為諸侯鄭氏曰大射將祭擇士之射也以為某鵠者將射還視侯中之時意曰此鵠乃為某鵠吾中之則成人不中之則不成人也得為諸侯謂有慶也不得為諸侯謂有讓也孔氏曰此一經釋射之名及鵠與侯之文凡射者大射則皮侯賔射則正侯燕射則獸侯唯大射有鵠此據大射而知然鵠則上下俱同無復君臣父子之别而言以為父鵠者謂升射之時既身為人父則念之云所射之鵠是為人父之鵠中則任為人父不中則不任為人父故為人之父者以為父鵠為人子及君臣皆放此故鄭注云某之鵠以父子君臣不定一故稱某也各射己之鵠者謂衆射之人雖各射一鵠各射己所主之鵠也天子大射謂之射侯者言天子所射之物謂之射侯言射之中能服諸侯也舉大射言之其實賔射燕射皆謂之射侯也射中則數有慶賜堪得久為諸侯不中則數被責讓不得久為諸侯非為射中封為諸侯不中不得為諸侯也案大射禮云耦升自西階並行東皆當其物北面揖及物揖皆左足履物南面回還視侯之中鄭注還視侯中謂此時也凡天子諸侯卿大夫禮射有三一為大射是將祭擇士之射二為賔射諸侯來朝天子入而與之射或諸侯相朝而與之射也三為燕射謂息燕而與之射其天子諸侯大夫三射皆具而士無大射故司裘職云大射唯明王及諸侯卿大夫不及於士故鄭注云士不大射士無臣祭無所擇是也其賔射燕射士皆有之故射人云士射犴侯二正是士有賔射也又鄉射記云士布侯畫以鹿豕是士有燕射矣其侯天子大射則射皮侯故考工記云張皮侯而棲鵠則春以功又司裘職云王大射則共虎侯熊侯豹侯設其鵠鄭注考工記皮侯謂此侯也畿內諸侯大射則張熊侯豹侯故司裘職云諸侯則共熊侯豹侯設其鵠是也若畿外諸侯大射亦張三侯鄭注云逺尊得伸故亦張三侯一曰大侯鄭注云則天子熊侯謂以熊皮飾之二曰糝侯鄭注云糝雜也豹鵠而麋飾三曰犴侯鄭注云犴胡犬皮飾侯若畿內卿大夫射麋侯故司裘云卿大夫則共麋侯是也其畿外卿大夫射侯無文於諸侯既得三侯其卿大夫蓋降君一等則糝侯犴侯其大射之侯皆有鵠其鵠則三分侯中而居其一故考工記云梓人為侯廣與崇方參分其廣而鵠居一焉凡皮侯者各以其皮飾侯側又方制其皮以為鵠故鄭注司裘云以虎熊豹麋之皮飾其側又制之以為􅀢謂之鵠鵠小鳥而難中故以中之為雋其天子以下賔射則射人云王射三侯五正諸侯射二侯三正卿大夫射一侯二正士射犴侯二正鄭云謂五正三正二正之侯五正者中朱次白次蒼次黃𤣥居外三正損𤣥黃二正畫以朱緑鄭又云二侯者三正二正之侯也一侯者二正而已此皆與賔射於朝之禮也考工記梓人職云張五采之侯則逺國屬凡賔射之侯謂之正鄭注大射云正者正也亦鳥名齊魯之間名題肩為正然則天子賔射用五正三正二正之侯畿內諸侯賔射用三正之侯卿大夫用二正之侯士亦用二正之侯又飾以犴畿外諸侯以下賔射其侯無文約大射諸侯既同天子張三侯則賔射亦同天子用五正三正二正之侯其卿大夫射亦三正二正之侯士射二正之侯也天子以下燕射則尊卑皆用一侯故鄉射記云天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕鄭注云白質赤質皆謂采其地其地不采者白布也熊麋豹鹿豕皆正面畫其頭象於正鵠之處耳君畫一臣畫二陽竒隂耦之數也燕射射熊虎豹不忘上下相犯射麋鹿豕志在君臣相養也梓人云張獸侯則王以息燕謂此也鄉射記不别畿外畿內之異則諸侯以下內外同也此三射之外又有鄉射謂鄉大夫貢賢能之後行鄉射之禮而詢衆庶故鄉大夫職云獻賢能之書于王退而以鄉射之禮五物詢衆庶是也又有州長射于州序之禮並同賔射之法故鄭注云鄉侯二正此外又有主皮之射凡主皮之射有二一是卿大夫從君田獵班餘獲而射書傳云凡祭取餘獲陳於澤然後卿大夫相與射也鄭注鄉射云主皮者無侯張獸皮而射之主於獲也二是庶人亦主皮之射故鄭注周禮云庶人無侯張皮而射之是也又有習武之射故司弓矢弧弓以授射甲革椹質者是也藍田吕氏曰謂之射者有二義曰繹也曰舍也繹者各紬繹己之志如所謂為人父者以為父鵠為人子者以為子鵠是也舍者發也詩云不失其馳舍矢如破蓋言心平體正持弓矢審固則發必中矣謂之鵠者取名於鳱鵠鳱鵠鵲名小鳥而難中參分其侯而鵠居一則鵠者方制之置侯之中以為的者也射之為藝不專心致志則不得也所以父子君臣各以己為之鵠射者各射己之鵠意曰為人父者不中則不得為人父為人子者不中則不得為人子為人君為人臣亦然故雖諸侯之射亦以中則得為諸侯不中則不得為諸侯是以謂之射侯故古之射者志於中也其專如是豈特志於中鵠中侯而已哉中父之鵠則反求所以中為人父之道中子之鵠則反求所以中為人子之道是乃所以充其類繹其志也天子將祭擇所以與祭者故先射於澤後射於射宫所以重黜陟且明天子所以嚴祭祀也以是為諸侯之賞罰所以明政刑且帥諸侯之事天子也嚴陵方氏曰繹若紬繹之繹言其繹於內而明於外舍若趨舍之舍言其舍於此而之於彼詩不云乎舍矢既均又曰舍拔則獲射固有舍意各繹己之志者若為人子為人臣各繹己之志於其鵠也前言內志正外體直而此言心平體正者皆互言之爾鵠一也而有父子君臣之異名何也各隨其所志以為之鵠為人父者所志在於為父故以所射之鵠為父鵠言射中其鵠乃可以為人父故也所謂子也君也臣也亦若是而已夫是之謂各繹己志也射者不特君臣父子而此止以是為言者內則父子外則君臣人之大倫故也夫射者擇士之射也擇士將以助祭禮之大者莫如祭故以大言之自卿大夫而下皆俾之射然止以射侯為言者蓋人臣之貴莫貴於諸侯以見雖至貴者亦由射而得之也自卿大夫而上皆在所擇然止以擇士為言也以士卑而衆尤在所擇故也山隂陸氏曰舍讀如舍矢如破之舍舍無義也故經釋繹而已王文公曰鵠逺舉難中中之則可以告故射侯棲鵠中則告勝焉同是射侯也而謂之射侯主言大射則射侯者射為諸侯正在於此祭侯之禮以酒脯醢其辭曰毋或若女不寧侯不屬於王所故抗而射女是則所謂射侯蓋亦取如此故曰大理物博有是哉新安朱氏曰射中則為諸侯不中則不得為諸侯此等語皆難信書謂庶頑讒說侯以明之然中間若有羿之能又如何以此分别恐大意略以射審定非專以此去取也天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宫射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地進爵絀地是也鄭氏曰澤宫名也士謂諸侯朝者諸臣及所貢士也皆先令習射於澤已乃射於射宫課中否也諸侯有慶者先進爵有讓者先削地孔氏曰前經已言數與於祭而君有慶數不與於祭而君有讓此又重言之者前經明諸侯貢士之制此經論人君將祭擇士也此宫蓋於寬閒之處近水澤而為之非唯祭而擇士餘射亦在其中故書傳論主皮射云嚮之取也於圃中勇力之取也今之取也於澤宫揖讓之取也是主皮之射亦在於澤也選士於澤不射侯也但試武而已故司弓矢云澤共射椹質之弓矢鄭司農引此射義之文以是知於澤中射椹質而已又鄭注司弓矢云樹椹以為射正射甲與椹試弓習武也其主皮之射則張皮亦揖讓也上文有讓削以地有慶益以地此總云進爵絀地故鄭云有慶者先進爵有讓者先絀地進則爵輕於地故先進爵而後益以地也退則地輕於爵故先削地而後絀爵也長樂陳氏曰古之聖人齊明以澡心而致其恭於內盛服以治身而致其恭於外固足以致神明之來格矣然猶以為未足以盡禮也故又俯而取諸人尊有道任有德承之者也舉賢而致之庸之者也聚衆而誓之威之者也承在禮庸在仁威在義仁義禮是吾之於祭也可以無憾矣然用之而不擇與不用同擇之而不以射與不擇同故曰天子將祭必先習射於澤夫非以射之足以盡人之能歟衡心之平然後可以持弓之審繩體之正然後可以持矢之固蓋心不平則弓不審而體不正則矢不固此性命之理寓於冥冥而世人未之或知也先射於澤宫以擇士而習之而射宫則在廟是己能者陟否者黜此祭之所以為有射也嚴陵方氏曰言澤則知其在野言宫則知其在國先習於澤而後射於宫射事有漸故也削地益地謂所貢士之諸侯也所謂慶讓者不特在地亦有在於爵焉故總言進爵絀地也於讓曰絀地知慶之為益地也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也飯食之謂也鄭氏曰男子生則設弧於門左三日負之人為之射乃卜食子也孔氏曰此一經明男子重射之義男子三日射人以桑弧蓬矢者則有為射之志故長大重之桑弧蓬矢取其質也所以用六者射天地四方也禮射唯四矢象禦四方之亂三日射罷而後用穀以食其子也藍田吕氏曰天地之性人為貴也人之類男子為貴也其配則天也陽也乾也可以服人而不可以服於人者也故天地四方之大皆吾之所當有事也不能則幾於非男子也故於其始生所以用桑弧蓬矢六以射天地四方也士無事而食不可也故君子寧功浮於食不使食浮於功有事於天地四方而後敢用穀則功浮於食無愧於食是亦男子之事也故因射義及之嚴陵方氏曰天地四方謂之六合以上與下為合東與西為合南與北為合故也以射六合故以六矢射之射之則以射人代之而已六合男子之所有事也生而必射以示其有事之志射而後食以示其受祿之道用穀謂用穀米食之故曰飯食之謂馬氏曰先其所有事而後敢用穀者論語曰事君敬其事而後其食儒行曰儒有先勞而後祿皆此意也天台陳氏曰案賈誼新書載懸弧之禮東方之弧以梧南方之弧以栁中央之弧以桑西方之弧以棘北方之弧以棗東方射東方南方射南方中央高射西方射西方北方射北方皆三射據此禮則應有五弧矢言射中央而不言天地其㫖粹矣不知作記者何所考騤射者仁之道也射求正諸己己正而后發發而不中則不怨勝己者反求諸己而已矣孔子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子鄭氏曰諸猶於也必也射乎言君子至於射則有爭也下降也飲射爵者亦揖讓而升降勝者袒決遂執張弓不勝者襲說決拾卻左手右加弛弓於其上而升飲君子恥之是以射則爭中孔氏曰此一節明射是仁恩之道唯求諸己故恥其不勝而爭中其爭也君子言君子因射亦有爭也儀禮大射云耦進上射在左並行當階北面揖及階揖升堂揖皆當其物北面揖及物揖射畢北面揖揖如升射是射時升降揖讓經云揖讓而升謂飲射爵時揖讓非射時也鄭注勝者袒決至升飲皆大射文藍田吕氏曰仁者之道不怨天不尤人行有不至反求諸己而已蓋以仁為己任無待於外也射者求中有似於此故曰射者仁之道也射者正己而後發發而不中知反求諸己而不怨勝己者知所以中不中莫不在於己非人之罪也至於愛人不親治人不治禮人不答則反尤諸人蓋不以為己任不知其類者也君子無所不用其學故於射也得反己之道焉爭者爭勝負也君子之於天下也所以與人交際辭讓而已爵位相先患難相死道途不爭險易之利冬夏不爭隂陽之和則無所事於爭矣而獨於射也求中是以勝負爭也然射禮勝飲不勝所以爭中者爭辭乎飲也嚴陵方氏曰爭者德之逆君子無所爭曰無所則與君子無所不用其極之無所同義君子雖無所爭然有所必爭者則有在乎射也揖讓而升堂復下而飲不勝則材養不材之意也材養不材仁之道也君子當仁不讓於此安得而不爭乎王氏謂求勝人而害之者小人之事也求勝人而養之者君子之事也馬氏曰射者仁之義也蓋始於由己而成於反己者射也故愛人不親反其仁然後為仁射而不中反其射然後為射此仁之與射所以同道夫豈有怨乎彼哉然雖不怨於內而不可以不爭於外不怨所以為仁而必爭所以為知也蓋射之爭爭於揖讓升降之閒而非射之爭則爭於財利忽圭之際則其爭也君子君子無所事爭必也射乎以言其爭出於不爭也新安朱氏曰此言君子恭讓不與人爭唯於射而後有爭然其爭也雍容揖讓乃如此則其爭也君子而非若小人之爭矣孔子曰射者何以射何以聽循聲而發發而不失正鵠者其唯賢者乎若夫不肖之人則彼將安能以中詩云發彼有的以祈爾爵祈求也求中以辭爵也酒者所以養老也所以養病也求中以辭爵者辭養也鄭氏曰何以言其難也聲謂樂節也畫布曰正棲皮曰鵠正之言正也鵠之言梏也梏直也言人正直乃能中也發彼有的發猶射也的謂所射之識也言射的必欲中之者以求不飲女爵也辭養讓見養也孔氏曰此一節明射中之難以中為貴何以射者言人之射何以能使射中與樂節相應也何以聽者言何以能聽此樂節使與射中相合也言射中樂節兩相應會作何法以為之至極難矣循聲而發謂射者依循樂聲而發矢不失正鵠言其中也射中與樂節相㑹唯賢者乃能是難也不肖謂小人也若小人何以能中引詩小雅賔之初筵之詩鄭注聲謂樂節騶虞九節之屬畫布曰正則賔射也棲皮曰鵠則大射也所射之識謂記識之處即正鵠之中也藍田吕氏曰君子責己重而責人輕我之不中則反求諸己曰非病也不能也必心平體正持弓矢審固循聲而發發而不失正鵠者唯賢者能之若不肖之人彼將安能以中此責己重也彼之不中則曰非不能也病也老也酒者所以養老與病也揖讓而升以禮相下以飲其不勝者此責人之輕也詩曰發彼有的以祈爾爵求中以辭爵則所以爭者乃所以辭也養則利之也爭辭養乃所以爭辭利也異於衆人之所以勝負爭也故曰其爭也君子射之為藝非專心致志則不得也射以樂為節射者欲其容體比於禮而中多故曰何以射欲其節比於樂循聲而發發而不失正鵠故曰何以聽何以射者體之所動不在乎他也何以聽者耳之所司不在乎他也是謂用志不分不過乎物推是道也將無入而不自得況於射乎居是位也行是事也其心也或之乎彼也或之乎此也一出焉一入焉將無所往而可也故射雖一藝而可以分賢不肖者以此山隂陸氏曰射而不勝為勝者所飲則非爾爵也是彼爵也彼爵所以養老養病之爵與彼康爵異矣詩曰酌彼康爵以奏爾時康爵不病之爵長樂陳氏曰鵠之為物逺矣舉而難中射以及逺中鵠為善故正鵠欲其不失所以為賢也射者何以射為不主皮而射也何以聽為循樂之節而發也郊特牲曰射之以樂也如此而已蓋不主皮而射則其容比於禮循聲而發則其節比於樂禮樂由賢者出故持弓矢審固可以言中若不肖之人事勇力忘禮樂安能中哉故孔子曰射不主皮為力不同科古之道也此先何以射而後何以聽主禮而言也郊特牲先何以聽而後何以射主樂而言也禮記集說卷一百五十八
