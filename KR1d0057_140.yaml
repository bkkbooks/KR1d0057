body:
  text: 禮記集説卷一百四十宋衛湜撰子曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以逺亂也子曰事君三違而不出竟則利祿也人雖曰不要吾弗信也子曰事君慎始而敬終子曰事君可貴可賤可富可貧可生可殺而不可使為亂鄭氏曰亂謂賢否不别三揖而進一辭而退進難者為主人之擇已也退速者為君子之倦也三違違猶去也利祿言為貪祿留也臣以道去君至於三而不遂去是貪祿必以其強與君要也愼始而敬終輕交易絶君子所恥不可使為亂此亂謂違廢事君之禮藍田吕氏曰所謂位有序小德役大德小賢役大賢之謂也所謂亂者則賢不肖倒置之謂也君子之事君要之君信於我而已信我之賢可以為師非學焉而後臣之則不進也信我之賢可以執國政雖待以季孟之間亦不進也此所以進之難也孔子之仕魯燔肉一不至則不稅冕而行靈公問陳則明日遂行此所以退之之易也蓋君子之仕將以道正君而已枉已未有能直人者也人人知自貴於己達色斯舉矣翔而後集之義則賢不肖之分不可亂也相見之禮主人迎賔三揖至於階其退也一辭而出主人拜送賔去不顧蓋相見者見之於主人盡敬之後辭之於主人未懈之先若主人之敬未至而強進主人之意已懈而不辭則賔主人之分亂矣可仕可已可見可辭進退之義一也事君三違而不出竟則利祿也人雖曰不要君吾弗信也古者四十始仕道合則從不合則去蓋以道事其君者道既不合舍而去之君無留行之命禮貌已衰義不可猶居其國苟至三違而不出竟則懷祿要君無所逃罪昔孔子去魯遲遲其行以去父母之國有所不忍而已孟子去齊三宿而後出晝冀王悔而反之以安天下之民而已然卒皆出竟以去君子之義可知矣臧武仲以防求為後於魯要君之心無大於此所以皆得罪於孔子也子曰事君慎始而敬終事君數斯辱矣朋友數斯疏矣故輕交易絶君子恥之若夫以道去其君豈君子之心哉不得已也子曰事君可貴可賤可富可貧可生可殺而不可使為亂貴賤貧富生殺君之所操以御臣之具者也雖有是具以御臣然所以御之者禮也理義人心之所同然天所以命於人君君臣臣父父子子所以保乎天下國家也故臣之事君無所逃乎天地之間東西南北唯命之從及違於理義則臣得以爭於君匹夫不可奪其志故君以我為賢則可處之以富貴以我為不肖則可處之以貧賤以我為無罪則可生以我為有罪則可殺六者莫不唯君所命其不可奪者吾之理義而已孟子曰往役義也往見不義也齊侯田以旌招虞人不至將殺之孔子奚取焉取非其招不往也故凡違乎理義者皆亂也延平周氏曰其進也以禮故難其退也以義故易進也不以禮故易退也不以義故難難進而易退則位之所以有序易進而難退則位之所以亂而無序故君子三揖而進若甚難一辭而退若甚易者蓋逺其亂於賔主之間況君臣之間可不逺其亂也哉進以禮所以愼始退以義所以敬終馬氏曰進人所欲也而難進退人所不欲也而易退蓋其就於利者緩而逺於利者速則其志在於義而不在於利如此則貴賤履位賢不肖襲情故位有序故君子交接之際進必三揖退止一辭皆所以逺亂也君臣以義合而未嘗無相愛之仁以義合至於三諫則去有相愛之仁則雖去而未必出竟君與之環則還與之玦則去若孟子去齊三宿而後出晝是也然此特始去之禮如此至於三違而且不出竟則其志在於利祿以強要於君也在物者有命在己者有義富貴貧賤生殺此物也而不可使為亂則在己在物者有命故可貴可賤可生可殺在己者有義是故不可使為亂也山隂陸氏曰易進而難退則亂之階由此始也嚴陵方氏曰其進不難則茍合以貪其位而位之在吾上者或有所越其退不易則患失以固其位而位之在吾下者或有所妨若是則其位無序矣有序則治無序則亂君子於賔主相見之際揖必至於三而後進辭止於一而遂退則難進之義蓋可見矣況於事君乎推是心則固足以逺亂矣三違而不出竟內實利之而外強違之非要君而何翔而後集所以愼始不為茍去所以敬終石林葉氏曰迎之致敬以有禮則難進禮貌衰則去之故易退進以禮退以義不失其先後故位有序反此則容悅者也以容為悅則必至於亂古人於賔主之間猶患之況君臣之際乎諌君有至於三而去君無至三而不出竟孟子去齊三宿而後出晝者師賔之位也子曰事君軍旅不辟難朝廷不辭賤處其位而不履其事則亂也故君使其臣得志則愼慮而從之否則孰慮而從之終事而退臣之厚也易曰不事王侯髙尚其事鄭氏曰履猶行也君使其臣謂使之聘問師役之屬也愼慮而從之者此已志也欲其必有成也否謂非己志也孰慮而從之又計於己利害也終事而退非己志者事成則去也不事王侯言臣致仕而去不復事君也君猶髙尚其所為之事言尊大其成功也孔氏曰在軍旅之中不辟危亡之難在朝廷之中不辭卑賤之所得志謂君使當己之才也終事謂事畢也既本非己才事竟即辭而退也得志及不得志並從而無違是臣行之篤厚也引易蠱卦上九爻辭以證終事而退臣之厚也藍田吕氏曰此章重述事君可貴可賤可富可貧可生可殺之義蓋事君者不仕則己仕則卑賤有所不辭詩云碩人俁俁公庭萬舞事君者不受命則已受之則患難有所不辭詩曰靡室靡家玁狁之故處其位而不履其事如弓人恥為弓矢人恥為矢名之不可言言之不可行矣其所以事君之義亂於名實者也此篇言亂者有三易進而難退則亂也者亂於賢不肖者也不可使為亂者亂於理義者也處其位而不履其事則亂也者亂於名實者也亂者如絲之不治無緒以正之之謂也孔子曰人而不仁疾之已甚亂也又曰好勇疾貧亂也仁者愛人然而疾不仁者以不仁之賊吾愛也苟能逺之使不能賊吾愛可矣至於疾之已甚則反失吾愛是亂於為仁者也所貴乎勇者見義必為而已不施之於義而施之於疾貧則利欲無厭是亂於勇者也是皆不治而無緒者也君使其臣臣受其命得志者則合所使之臣素志也否者不合其素志也臣受君命雖有所合不敢以得志而自滿故愼慮而從之乃臨事而懼好謀而成者也有所不合又非所宜辭亦不敢怨於不得志而不事事故孰慮而從之要之不辱君命盡其義而無悔而己仕而不事事則不恭不得志而不去則懷懷與不恭皆君子所不由故不得志者雖孰慮以從事卒事則致為臣而去則所以自免而不纍於上故曰臣之厚也蠱之上九之辭曰不事王侯髙尚其事蠱者有事之時自九五而下皆以幹蠱能不能為得失至於上九事之終且無位也有似乎仕焉而已者故曰不事王侯唯不事王侯乃可以髙尚其事不見役於人若委質而仕反欲髙尚其事而不事事則曠官尸利無所逃罪矣故此章取以為證焉山隂陸氏曰不辭賤猶曰不讓勞也此事君者之事也故曰子思臣也微也使子思居衛而為曽子之事是亂也亂亦亂之階終事而退是厚也非正也即正有去而已嚴陵方氏曰愼慮則從其事而無所輕孰慮則從其事而有所習終事而退則不居成功故也馬氏曰貴與生者人所欲也君使其臣於所欲之地則必愼慮以從之賤與死者人所惡也君使其臣於不欲之地亦必孰慮以從之延平周氏曰幽之使我有是者天也明之使我有是者君也茍其使我得志則愼慮而從之者愼慮其所以行道者也茍其使我不得志則亦孰慮而從之者孰慮其所以守道者也功成身退者天之道故曰終事而退臣之厚也石林葉氏曰位軍旅則以勇故不辟難位朝廷則以仁故不辭賤處其位而辟難辭賤則事不治而亂何有於仁勇於事君有得志而與否者命也慮而後從者義也得志而孰慮所以畏命故其寵若驚不得志而孰慮所以謂義故其辱若驚子曰唯天子受命於天士受命於君故君命順則臣有順命君命逆則臣有逆命詩曰鵲之薑薑鶉之賁賁人之無良我以為君鄭氏曰唯當為雖言皆有所受不敢專也臣受順則行順受逆則行逆如其所受於君則為君不易矣薑薑賁賁爭鬭惡貌良善也孔氏曰此明臣事君不敢專輒君之出命不可不愼所引詩鄘風鶉之賁賁刺宣薑之詩橫渠張氏曰命於天者不可不順若國君則不然君能順上則臣亦順上君命逆上則臣亦逆君藍田吕氏曰此章重述事君不可使為亂之義也天道無私莫非理義君所以代天而治者推天之理義以治斯人而已故曰天秩有典天敘有禮天命有德天討有罪莫非天也臣之受命於君者命合乎理義為順天命不合則為逆天命君之命出乎理義則為臣者將不令而從君之命不出於理義則為臣者雖令不從矣此所以有逆命順命之異然後知其不可使為亂也人之無良我以為君此詩刺衛君無德國人恥以為君蓋言君逆天命則臣子亦逆君之命嚴陵方氏曰天子者天之所子故惟天子受命於天士以事人為事故受命於君由士以上皆受命於君此止以士言者蓋降於士則有府史胥徒之屬皆其官長所自辟除其卑不能上達故不得受命於君也然則受命於君者其卑止於士而已清江劉氏曰注者曰唯當作雖非也此言天子之命在天士之命在君非天命不為天子非君命不為士也皆有制之已山隂陸氏曰唯讀如字天子受命於天猶士受命於君所謂士死制是也臣謂大夫以上唯不受命於君故有逆順如此馬氏曰天之命於君者豈諄諄然命之乎使之居天位食天祿治天職牧天民蓋所謂命也故由其道而順天則謂之順命不由其道而逆天則謂之逆命雖然上者下之儀而臣之逆順亦視其君之所為而已石林葉氏曰君與天皆出命者也君之與天命既順則臣之於君命亦順也君之於天命既逆則臣之於君命亦逆也蓋有治君則有賢臣有亂君則有佞臣取人以身之道也唯其逆順者自人為之故言君臣而不言天君莫尊於天子臣莫卑於士故言天子而止士廬陵胡氏曰臣有順命有言遜於汝志也必求諸非道臣有逆命有言逆於汝志也必求諸道先儒謂逆命為行逆非也子曰君子不以辭盡人故天下有道則行有枝葉天下無道則辭有枝葉是故君子於有喪者之側不能賻焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館則不問其所舍故君子之接如水小人之接如醴君子淡以成小人甘以壞小雅曰盜言孔甘亂是用餤鄭氏曰不問其所費以下皆辟有其言而無其實水相得合而已酒醴相得則敗淡無酸酢少味也接或為交盜賊也孔甚也餤進也孔氏曰此明君子之行不可虛用其辭不以辭盡人言不得以言辭之善謂行亦盡善也有道之世則所行美好似樹幹之外更有枝葉無道之世人不誠實但言辭虛美所引詩巧言刺幽王之詩證小人甘以壞橫渠張氏曰有道是有實也有實則行有文章也無實則言有文章也行有文章則莫非實是也言尚浮華則唯虛辭相譽而已無其實也故君子問寒則衣之稱美則爵之今言無有實其求益與夫相親相依之言皆相奉而已故仲尼欲無言直欲務實君子先行其言而後從之至如近世之語功實者猶徒具文而已亦不以實求也有道則行得伸無道則辭得伸辭行天下之辭行也有道無道亦天下之有道無道也辭則伸也以天下無道明無以考其實所以浮辭得伸蓋莫能窮辨之也君子不以辭盡人盡極也取也藍田吕氏曰君子不以辭盡人不敢輕信於人也不以口譽人不以色親人不為口惠所以重信於己也孔子曰今吾於人也聽其言而觀其行又曰君子不以口譽人又曰有言者不必有德皆不以辭盡人之義也枝葉者幹之文也天下有道則人致文於行禮儀三百威儀三千乃行之文也故曰行有枝葉天下無道則人致文於辭詩云巧言如簧顔之厚矣乃辭之文也既曰辭有枝葉則有言而無其實問所費於喪者而不能賻問所欲於病者而不能饋問所舍於客而不能館則其言也不出於誠心君子恥之故與其不能惠而問之不如不問之愈也君子之接人也以信而不以茍説人故如水淡而可久於此三者不能惠則不問此交之所以全而無後怨故曰淡以成小人之接人也苟説而不以信故如醴之甘而不可久於斯三者能問而不能惠取説於頃刻而不顧其後此交之所以難保故曰甘以壞故凡言之甘而不出乎誠心者必將有以盜諸人傳曰幣重而言甘誘我也甘言入則受其盜故言盜言孔甘亂是用餤延平周氏曰孔子曰豫不試故藝而孟子曰我於辭命則不能蓋君子之道重其本而輕其末也辭命者乃道之末也豈道之末而能盡人之賢否哉嚴陵方氏曰天下有道則君子之道發之於行事此行所以有枝葉天下無道則君子之道載之空言此辭所以有枝葉則其所以有言者豈得已哉宜其不以是而盡人也莊子曰君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶蓋成則相親壞則相絶其説正於此合然莊子言交此言接何也交言其情接言其迹馬氏曰天下有道則行有枝葉者有德者必有言也天下無道而辭有枝葉者有言者不必有德也石林葉氏曰宰我子貢善為説辭冉牛閔子顔淵善言德行孔子曰我於辭命則不能也孔子不能辭命則能之者固德行而已唯其能於德行故盡人不以辭君子以道義交故其淡如水小人以勢利交故其甘如醴水淡而散於五味之合則無不調故曰淡以成醴而至於沈湎則敗德故曰甘以壞馬氏曰聖人之教則欲其訥於言而敏於行其觀人則必觀其言而察其行故寧至於行有枝葉而無寧為枝葉之辭寧為君子之淡以成無為小人如醴之甘寧有已怨而毋至於有諾責故言行相副聖人蓋深取之而言浮於行聖人必察其中也講義曰上取人以道德而不以文辭則下進用者道有本根而行有枝葉矣上取人以文辭而不以道德則下之進用者道無本根而辭有枝葉矣譬之草木有本根然後有枝葉為上之道可不謹乎君子之接如水雖無味而可久小人之接如醴雖有味而易變子曰君子不以口譽人則民作忠故君子問人之寒則衣之問人之飢則食之稱人之美則爵之國風曰心之憂矣於我歸説子曰口惠而實不至怨災及其身是故君子與其有諾責也寧有己怨國風曰言笑晏晏信誓旦旦不思其反反是不思亦已焉哉子曰君子不以色親人情疏而貌親在小人穿窬之盜也與子曰情欲信辭欲巧鄭氏曰譽繩也問人之寒以下皆為有言不可以無實於我歸説欲歸其所説忠信之人也口惠而實不至謂善言而無信人所惡也已怨己謂不許也言諾而不與其怨大於不許言笑晏晏至亦已焉哉皆相與為昏禮而不忠也言始合會言笑和説要誓甚信今不思其本思之反覆反覆之不思亦已焉哉無如此人何怨之深也辭欲巧巧謂順而説也孔氏曰繩以量度於物凡口譽於人亦須量之於心故以譽為繩莊十四年左傳蔡侯繩息媯杜注云繩譽也是繩譽通訓引詩曹風蜉蝣刺曹君之詩國將滅亡賢臣心憂我身何所歸舍説舍也此引詩斷章證疾虛言義不與詩相當也諾謂許人物責謂許而不與被責也引詩衛風氓之篇證許而不與被人所怨也不以色親人謂不以虛偽善色詐親於人也情疏貌親外內乖異心不慤實恆畏於人如細人姦盜也言辭欲和順美巧不違於理與巧言令色者異也藍田吕氏曰晉平公之於亥唐入云則入坐云則坐食云則食雖疏食菜羹不敢不飽然終於此而已矣弗與共天位弗與治天職弗與食天祿士之尊賢者也非王公之尊賢也蓋君子力可以周人之窮則不徒問其飢寒而必有以衣食之勢可以進賢則不徒譽而已必有以爵祿之徒問徒譽而無實以繼之則誠心不存己則不誠而責人之誠難矣故曰君子不以口譽人故君子問人之寒則衣之問人之飢則食之稱人之美則爵之國風曰心之憂矣於我歸説此詩刺曹君不修政事好潔其衣服飾其外而無實民將去之求其所當歸者如口譽無實不可使民信也問人之飢寒而不衣食之特問之無誠而已至於口惠而實不至則害信之大者自古皆有死民無信不立危國亡家之本此怨之所以及其身故君子與其有諾責也寧有己怨有求而已之始雖咈人之意而終不害乎信故其怨小諾人而不踐其言雖不咈人意而終害乎信故其責大國風曰言笑晏晏信誓旦旦不思其反反是不思亦已焉哉此詩刺夫婦失道中絶無信婦怨之辭也故取以證之穿窬之盜欺人之不見以為不義而已色親人者巧言令色足恭無誠心以將之情疏貌親主於為利亦欺人不見君子恥之故不為也故曰君子不以色親人情疏而貌親在小人則穿窬之盜也與孔子曰色厲而內荏譬諸小人其猶穿窬之盜也與孟子曰不可以言而言可以言而不言是皆穿窬之類二者亦欺人之不見以為不義故所以為穿窬也禦人國門之外盜也穿窬亦盜也狎大人侮聖人之言小人而無忌憚不義也色厲而內荏以言不言餂人亦不義也盜與不義小大雖殊其為盜與不義則一也此章言其言欲信而已事君接人其義一也又欲言之順而説故曰情欲信辭欲巧以結之孔子曰巧言令色鮮矣仁蓋事於顔色者誠有所不足故鮮矣仁然為辭令亦君子之所務孔子曰不學詩無以言又曰使於四方不能專對雖多亦奚以為非惡言之巧也巧言之害仁者爾嚴陵方氏曰不以口譽人則言之所與必發於心不止於外貌故民化之而作忠若問人之寒則衣之之類皆非口譽之事也口譽者內外之不相應也口惠者始終之不相副也君子之親人也以德故曰不以色親人貌雖親而情實疏則恐人之見其情也又何異穿窬之盜也穿窬者穿垣墉而為之盜也君子情非苟動也將以有所示辭非苟出也將以有所治內有情之信而外有辭之巧又何害其為仁乎此所以先言情欲信而後乃言辭欲巧也馬氏曰君子之譽人不以口而身必致之也不以身致之則是顯譽於人隂棄其身而民亦趨於偽矣君子不以色親人者以其有相愛之情出於中愈色婉容見於外蓋真積於內然後誠動於外故君子不以色親人而慮情之不信也匿怨而友其人者君子所恥也山隂陸氏曰詩言君將無所依唯於我歸處而已是非以口繩君相也於我歸處猶之可也於我歸息甚矣於我歸説則又甚矣在小人則穿窬之盜所謂譬諸小人其猶穿窬之盜也與石林葉氏曰口惠而不以實應則為誣唯君子反此然而稱人之美則爵之此在上者之事也在下而無與共天位治天職則稱人之美因不為誣也色在外君子不以親人親人者情也小人則情疏矣其親人也以貌非特色而已矣此其譬則穿窬之盜也歟譬人之知也君子不以色親人求所以信其情也乃若巧辭則孔子嘗曰鮮矣仁不曰不仁而曰鮮者是君子有時而用之延平周氏曰於內則情欲信於外則辭欲巧者君子之道也苟止於辭欲巧則君子乎講義曰情必欲其信如真喜未笑而和真怒未發而威真悲未泣而哀所謂信也此所以篤實乎其內辭必欲其巧如詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮皆以其背違正理而各得一偏尚得為巧乎譬之大匠必合規矩以為方圓然後得謂之巧也此所謂輝光乎外也金華應氏曰情之所藴必隱惻而盡其情辭之所發必委曲而中其節子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私褻事上帝是故不犯日月不違卜筮卜筮不相襲也大事有時日小事無時日有筮外事用剛日內事用柔日不違龜筮鄭氏曰神明謂羣神也無非卜筮之用言動任卜筮也日月謂冬夏至正月及四時也所不違者日與牲尸也襲因也大事有時日有事於天神有常時常日也有事於小神無常時常日臨有事筮之剛日柔日順隂陽也陽為外隂為內事之外內别乎四郊孔氏曰此至篇末總明卜筮之事鄭注冬夏至正月及四時者冬至謂祭圜丘夏至謂祭方澤正月謂祭感生帝及四時迎氣用四時吉日也知皆卜者案大宰云祀五帝帥執事而卜日鄭注五帝謂四郊及明堂是四郊有卜也大宰又云祀大神祭大示亦如之大神則冬至祭圜丘大示則夏至祭方澤案公羊榖梁傳云卜三正則知天子郊用夏正亦卜之也周禮祭宗廟亦卜日云不違者唯日與牲尸者案僖三十一年左傳云禮不卜常祀而卜其牲日是卜牲日也特牲少牢云大夫士筮尸則天子諸侯有卜尸也卜筮不相襲言大事則卜小事則筮不相因襲此與曲禮文同而注異大事有時日而用卜者示不敢專崔氏曰凡求告之道不過三若一而吉則不更啓若初不吉則二不至於三易曰初筮告再三瀆瀆則不告明初筮者不復至三也若大事卜筮兼用卜筮各一用之乃成為一故尚書云三龜一襲吉則知三龜三筮各一用之乃成為一也故尚書有龜從筮逆龜逆筮從之義皆據一用而言也然一用之時若龜筮卿士庶人之中所逆者少亦得為初吉若所逆者多則為初凶若初吉多則更卜若初凶多則亦卜至三所以爾則以初筮告吉凶皆非吉凶之故是以至三也所言三者皆謂三度用之非一度用三王之龜筮始為三也至中小之祭求吉凶之理亦復如之卜筮各用者不得為襲中事兼卜則謂之相襲故表記云卜筮不相襲然則於事得兼用者以再三為襲不得兼用者則無以為襲故也何氏曰外事以剛日而郊用辛內事以柔日而社用甲有以見郊社至重不可以內外常理拘之宗廟之祭據春秋而言則桓八年以己卯蒸夏五月以丁丑蒸十四年秋八月以乙亥嘗閔二年夏五月以乙酉吉禘於莊公文二年八月以丁卯大事於大廟躋僖公昭十五年二月以癸酉有事於武宫是俱用柔日如繹日明日又祭既正祭用柔自然繹日必剛矣橫渠張氏曰不犯日月謂不使祭日相見犯若一時有兩祭則必相回互使之不相妨藍田吕氏曰此章言事天事君至敬而不敢褻故有卜筮因言卜筮之用禮者敬而已矣明則敬於人禮儀三百威儀三千敬人之事也幽則敬於鬼神內盡志外盡物凡祭祀之禮卜筮之用皆敬鬼神之事也蓋卜用龜筮用策龜則灼之而視其兆策則揲之而視其卦凡求於人情所不能測人力所不能為者是乃所以求之於神明也郊所以祀上帝卜日而用之不敢必其期也卜牲而養之不敢必其物也其敬如是是乃所以不敢以私褻事之也日月者如冬日至圜丘以祀天神夏日至方澤以祀地祇四時迎氣用四丘此皆素有定日不用卜至於它祭祀之當卜日者不可犯此素定之日也它祭祀之卜日既不犯此素定之日然所卜之日既卜之吉則不可違故曰不犯日月不違卜筮違之犯之皆不敬也記曰大饗不問卜此謂日月之素定者如冬夏之日至之類他則皆卜如啓蟄而郊郊用辛之類故大宰祀五帝帥執事而卜日遂戒而不言昊天上帝蓋可知矣既稱上帝於郊又曰唯聖人為能饗帝則祀天亦可稱饗均祀天地也冬至之日至為大故曰大饗饗之之敬因天時隂陽之至而不問卜所敬異於他饗也先儒謂大饗者祀五帝於明堂以月令有季秋大饗之文乃曰莫適卜也以總饗五帝不知主何日而卜之故不卜然不知季秋之饗既有素定之日如冬夏日至又不問卜當以何日為可若以人謀而用之乃以私褻事上帝不敬莫大焉其説固不可行矣卜筮不相襲者此主於祭祀而言有卜則不筮有筮則不卜蓋大事用卜小事用筮而已在他事則卜筮兼用之洪範汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮於心也士也庶民也龜也筮也參其從逆而占之筮人云國之大事先筮而後卜春秋傳僖公二十五年晉卜納襄王得黃帝戰於阪泉之兆又筮之得大有之暌哀九年晉卜伐宋亦卜而後筮則兼用亦明矣大事有時日者時如啓蟄而郊及四時宗廟之祭之類日如郊用辛社用甲之類有是時日以上中下三旬而卜之小事無時日有筮者若非時有所告及祈禱之類皆無定日必筮而用之也外事用剛日內事用柔日不違龜筮鄭氏謂事之內外别乎四郊蓋以郊外事也反用辛社內事也反用甲故謂郊在四郊之內同內事故用柔日之辛四郊之外乃為外事故甲午祠兵吉日庚午既差我馬然考是説社乃內事而反用甲説亦未可行蓋所謂內事外事分别剛柔泛言衆事爾如郊用辛社用甲自别有義難以剛柔取類也又言不違龜筮者前所謂大事小事及後所謂內事外事皆不可違卜筮故重言之嚴陵方氏曰天地之神明者天之神地之明也莊子曰天尊地卑神明之位也然郊特牲言郊明天道社神地道者蓋以天之神故有郊以明之以地之明故有社以神之也且卜筮所以事天地事天地者莫大乎郊社故必以神明為言自八卦畫於伏羲土兆起於顓帝瓦兆起於堯官占見於舜則卜筮之用其來尚矣而此以三代明王為言者蓋五帝以往則質質則於卜筮宜略三王以來則文文則於卜筮宜詳以其詳故無非卜筮之用也於三王言無非卜筮之用則知五帝有非卜筮之用矣私褻事上帝者徇己所欲之謂私交物無節之謂褻卜筮則於神明有所質於時日有所擇上帝天神也不及地示者以天神之尊尤不宜以私褻事之故不犯日月者守日月之常不敢犯而越之也不違卜筮之吉不敢違而戾之也若郊之用辛社之用甲是不犯日月也上辛不吉則卜中辛中辛不吉則卜下辛是不違卜筮也故先言日月而後言卜筮焉大事有時日即郊社之類是矣大事前期而定故其時日有常小事臨機而作故無時日曰有筮則無卜可知小事有筮則大事有卜又可知且大事以時日為先故不言卜小事以時日為後故必言筮意各有主然卜雖主於大事而小事亦有時乎用卜大卜所謂凡小事涖卜是也筮雖主於小事而大事亦有時乎用筮筮人所謂凡大事先筮後卜是也凡特言卜則筮從之可知若所謂卜日卜牲則知其亦筮矣凡特言筮則卜不必從若所謂筮日筮賔則卜不必從矣要之大事以卜為主小事以筮為主爾卜筮不相襲與外事用剛日內事用柔日並見曲禮解馬氏曰傳曰聖人不煩卜筮聖人於事可以默決之於心而不煩於卜筮也然則三代事天地之神明無非卜筮之用者蓋不敢以私褻事上帝也祭義曰雖有明知之心必進斷其志焉示不敢專以尊天也與此同義龜動物也可以知象著植物也可以知數外事陽也而剛亦陽也故用剛日內事隂也而柔亦隂也故用柔日以郊為外事矣而用辛以社為內事矣而用甲説者以天地至尊之祭不可同於外內其説似得之矣山隂陸氏曰據此不犯日月不違卜筮外雖用剛日內雖用柔日猶卜筮也大事有無時日有卜小事有有時日無筮今其言如此蓋言大事薄小事也石林葉氏曰蓍龜者天之神物故事上帝則用卜筮者神之也然而龜為象其應也圓蓍為數其靜也方雖卜且筮亦不可相襲也子曰牲牷禮樂齊盛是以無害乎鬼神無怨乎百姓子曰后稷之祀易富也其辭恭其欲儉其祿及子孫詩曰后稷兆祀庶無罪悔以迄于今鄭氏曰牷猶純也富之言備也以傳世之祿共儉者之祭易備也兆四郊之祭處也迄至也孔氏曰以前明不違卜筮動合神明故此經明后稷祭祀福流後世以證成其義所引詩是大雅生民之篇美成王尊祖配天也藍田吕氏曰古之聖王先成民然後致力於神民和而神降之福泂酌之詩曰泂酌彼行潦挹彼注兹可以饙饎豈弟君子民之父母蓋不得乎民心雖有牲牷禮樂齊盛之備神將不饗矣無害乎鬼神則神饗之矣無怨乎百姓則民歸之矣所以然者本於致敬而已故因卜筮而言后稷竭力於稼穡以其齊盛所以和於民者至則所以事於神者盡矣詩曰恆之秬秠是穫是畝恆之穈芑是任是負以歸肇祀茍有誠信澗溪沼沚之毛潢汙行潦之水可薦於鬼神故后稷之祀竭力以共齊盛無非誠信之謂故易富也富之言備也其祀也永無罪悔而已此所以其辭恭其欲儉也以迄于今至於周推后稷以配天一用后稷之法故曰其祿及子孫嚴陵方氏曰牲牷天産齊盛地産禮者威儀樂者節奏於物則有天産地産於事則有威儀節奏事物雖盡茍或有違於龜筮焉又烏能幽無鬼神之害明無百姓之怨乎故先王之於祭祀不特卜日而又卜尸不特卜尸而又卜牲也違龜筮而百姓怨者書不云乎詢謀僉同鬼神其依則以鬼神依人而行故也鬼神有害則百姓有所怨可知鬼神有禍福故於鬼神曰害百姓有休戚故於百姓曰怨其辭恭則物雖薄而誠足以饗神其欲儉則物雖少而用足以行禮此祀之所以易富也且恭則不侮儉則不奪不侮則無害乎鬼神可知不奪則無怨乎百姓可知若是則幽無鬼責明無人非德之盛也盛德必百世祀故其祿及子孫不亦宜乎外則其辭恭則其心敬可知內則其欲儉則其用節可知矣石林葉氏曰牲牷親卜之禮樂親序之粢盛親供之明薦以德則無害於鬼神故祭則受福無怨乎百姓故得其歡心然先鬼神而後百世者亦以祭祀為主南豐曽氏曰自后稷肇祀以前前後相承兢兢業業惟恐一有罪悔獲戾於天閲數百年而此心不易故曰庶無罪悔以迄于今言周人世世如此也子曰大人之器威敬天子無筮諸侯有守筮天子道以筮諸侯非其國不以筮卜宅寢室天子不卜處太廟鄭氏曰威敬言其用之尊嚴天子無筮謂征伐出師若巡守也天子至尊大事皆用卜春秋傳曰先王卜征五年歲襲其祥守筮守國之筮國有事則用之道以筮者始將出卜之道有小事則用筮諸侯入他國則不筮不敢問吉凶於人之國也諸侯受封於天子因國而國唯宫室欲改易者得卜之耳天子不卜處太廟卜可建國之處吉則宫廟吉可知孔氏曰大人謂天子所主之器當威嚴敬重不可私褻於小事雜用也饗時則用燕則不用也道以筮道謂出行於道路之上也鄭知無筮謂出師巡守者以前云外事用剛日內事用柔日據在國諸事今此云無筮又云道以筮又云諸侯非其國不以筮皆據將欲出行及在道之事下云道以筮則無筮是未在道故知征伐出師若巡守欲發時也天子大事不徒用筮而已兼用卜也故簭人云國之大事先簭而後卜此云無筮無徒筮耳不謂全無筮也橫渠張氏曰諸侯適他國唯卜寢宅而已不卜處大廟舍諸侯祖廟為常故不卜藍田吕氏曰如天子無筮敬則用祭器則龜與祭器皆大人之器大人所主之器當威嚴敬重不可私褻於小事故大事則不筮小事則不卜朝聘之饗昏冠之禮醮皆用祭器燕則不用也天子無筮者天子體尊在國中有事皆卜而不以筮至於巡守征伐在道則以筮蓋以龜當敬而不可褻也故曰天子道以筮諸侯卑於天子在國中居守有事則筮降於天子之用龜也至於出竟則不筮蓋不敢問吉凶於人之國且辟天子也故曰諸侯非其國不以筮小宗伯云凡建國左宗廟右社稷則宗廟有定位雖天子不卜唯宅寢室則卜之蓋寢室為人君之居不可以不敬以求祐於天故必卜嚴陵方氏曰威之則不敢玩敬之則不敢褻若見君之几杖則起遭君之乘車則下是也天子無筮者非無筮也以守大事之卜為稱在小事之筮不足以有為也故諸侯有守筮者非無卜也以不足於大事之卜其所有而守之小事之筮而已為其降於天子故也下云天子道以筮則天子非無筮也明矣又云諸侯作宅寢室則諸侯非無卜也明矣天子道以筮者以其在道遽於事而不暇卜故也卜宅寢室者諸侯受封乎天子唯宫室欲改易者得卜之以其於事為大故也山隂陸氏曰無筮無守筮也不言守者非所以威敬天子諸侯亦不皆守筮有時守焉道以筮者道之以筮所謂先筮而後卜諸侯適人之國雖不用筮其所宅寢室猶卜天子不卜處太廟言若天子適諸侯則舍其寢廟不卜也石林葉氏曰大人以事業言其事則所守者止於恭畏而已天子在道既以筮則在外也不可以無筮諸侯在內以守筮則其於國也亦必用筮至於大廟之位其與社稷為左右皆有常所也故不用卜卜其吉凶可也四明沈氏曰儼然人望而畏之有九鼎大吕之重此大人之器也威武貧賤富貴不懾不屈不淫周公用周奠枕皇皇孔子用魯齊歸侵疆道愈大者其志愈大志愈大者其用愈大管仲之器至於童子羞稱會子羞比江陵項氏曰天子無筮以下語多交互難通當為之解曰諸侯非其國不以筮筮韥不出國是以有守筮天子所在為家雖在道亦以筮故無守筮凡為宫室者寢室宅其中宗廟處左卜室者卜其中而已中定則左右可知故但卜寢室之所宅不卜宗廟之所處雖天子之廟無卜也諸侯以下可知子曰君子敬則用祭器是以不廢日月不違龜筮以敬事其君長是以上不瀆於民下不褻於上鄭氏曰敬則用祭器謂朝聘待賔客崇敬不敢用燕器也上不瀆於民下不褻於上上之於下以直則下應之以正不褻慢也孔氏曰鄭注以朝聘用祭器其實冠昏亦不用燕器也故左傳稱魯襄公冠季武子曰君冠必以祼饗之禮行之是用祭器也橫渠張氏曰以聖人之智非不能為後之器皿須要作籩豆簠簋以祭欲不便於褻用也若褻用則自有燕器唯是大賔客至敬則用祭器藍田吕氏曰君子之事天地鬼神與事其君長其敬一也故敬則用祭器以事鬼神之敬敬之敬之至也敬則用祭器則私褻之用皆以燕器如敦牟巵匜之屬是也不廢日月者事其君長各有日月如歲之有朝覲宗遇一日之有朝夕不敢廢也不違龜筮者欲見其君長及其所貢獻皆卜筮而後進也事天地神明言不犯日月者以有素定之日而犯者他祀之卜日不可犯也此云不廢日月亦有素定之日當行之而不可廢也如此則上之待下下之事上莫非敬也故上不瀆於民下不褻於上也嚴陵方氏曰祭器所以事神燕器所以事人以事神之禮事之則敬可知也不廢日月不違龜筮凡以致敬而已故推此道則臣足以事其君幼足以事其長故曰以敬事其君長上不瀆於民者不為民所瀆也下不褻於上者不為上所褻也延平周氏曰冠昏人道之始君子之所致敬故用祭器禮記集説卷一百四十
