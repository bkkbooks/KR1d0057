body:
  text: 禮記集説卷九十三宋衛湜撰大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之內合敬同愛矣鄭氏曰同和同節言順天地之氣與其數不失謂不失其性祀天祭地謂成物有功報焉明則有禮樂教人者也幽則有鬼神助天地成物者也孔氏曰從此至述作之謂也為樂論第三段自此至名與功偕明禮樂與天地合德明王用之相因不改功名顯著也鄭注氣解同和數解同節天地氣和而生萬物大樂之體順隂陽律呂生飬萬物是天地同和也天地之形有髙下大小之限大禮辨尊卑貴賤與天地相似是與天地同節也和故能生成百物不失其性節故有尊卑上下祀天祭地報生成之功也聖王能使禮樂與天地同和節又於明則尊崇禮樂以教人幽則尊敬鬼神以成物則四海之內合其敬同其愛也長樂劉氏曰律呂和而四時順隂陽和而萬物生是與天地同和也寒暑莭而萬物遂等降莭而兆民安是與天地同莭也和而百物不失其宜莭而三禮必報其本故明則使之敬禮樂以保於五福之休幽則使之敬鬼神以避於六極之咎然則四海之內莫不合其敬以為義同其愛以為仁矣延平黃氏曰大樂致和大禮致中天地之於萬物生之以和成之以莭而先王之大禮大樂贊天地之化育故大樂與之同其和大禮與之同其莭天地生成百物者也故言皆化王者收用百物者也故言不失百物得和而生得莭而成先王以大禮同天地之莭以大樂同天地之和其力則在天地之後故物之成也先王不敢私有其功焉祀天祭地報之而已明則有禮樂幽則有鬼神此禮樂之配鬼神也率神而從天居鬼而從地此禮樂之役鬼神也又曰以樂合天之神動物之産使隂德無淫邪與天地同莭者也以禮合地之化植物之産使陽氣無倦怠與天地同和者也長樂陳氏曰天地之氣春夏與物交而為和秋冬與物辨而為莭和則有聲而大樂出焉莭則有形而大禮出焉是禮樂之本出於天地自然之和節而其用實同之乃若樂者天地之和禮者天地之序則直與之為一非特同之而已易曰乾道變化各正性命保合太和乃利貞和故百物不失之謂也孔子曰非禮無以節祀天地之神節故祀天祭地之謂也均是和也或謂百物不失或謂百物皆化者蓋樂者道天地沖和之和所以合天地之化百物之産者也與天地同和其功淺故止於百物不失為天地之和其功深故至於百物皆化自天地欣合至不殰不殈所謂百物皆化也百物不失特不失其道理而已故詩序曰崇丘廢則萬物失其道理矣大樂必易大禮必簡禮樂之德也大樂與天地同和大禮與天地同節禮樂之功也明則有禮樂幽則有鬼神得非傳所謂動天地感鬼神莫近於禮樂經所謂極乎天蟠乎地通乎鬼神者歟禮樂則合敬同愛於其明鬼神則合敬同愛於其幽明寓愛敬於禮樂幽寓愛敬於鬼神如此則推而放諸四海之內未有不合敬同愛者也然合敬同愛禮樂之情非禮樂之文也合情飾貌禮樂之事非禮樂之道也樂書嚴陵方氏曰與天地同和則其為和也大矣故曰大樂與天地同節則其為節也大矣故曰大禮和者氣之所生故百物不失蓋百物不失本乎氣生之初故也節者形之所成故祀天祭地蓋祀天祭地在乎形成之後故也有氣而後有形故百物不失乃可以祀天祭地而報本反始焉天地所以示教化於明者禮樂也故曰明則有禮樂所以行變化於幽者鬼神也故曰幽則有鬼神鬼神之與禮樂固相為體用矣四海之心莫不有敬也合之者則存乎禮莫不有愛也同之者則存乎樂馬氏曰天地之和此自然之和天地之序此自然之序也至於禮樂則人為之禮樂也人不天不因天不人不成禮樂之道雖出於天地之自然而未嘗不繼之以人故極樂之妙則和與天地同極禮之妙則節與天地同自暴民不作以至天子不怒天地同和之效也自合父子之親至於敬四海之內天地同節之功也天地自然之和故百物化生至人為之樂則聖人有以贊天地之化故百物不失其性而已天髙地下而聖人為禮則祀天於地上之圜丘祭地於澤中之方丘者以其有節也和故百物不失者此言其和之之意也節故祀天祭地者此言其節之之事也明則有禮樂使然之禮樂也幽則有鬼神自然之禮樂也鬼神者往來乎天地之間以和以節而生萬物者聖人則合天地之化輔天地之宜而制禮作樂以示於人禮者别宜居鬼以從地而近於鬼樂者敦和率神以從天而近於神故明則有禮樂幽則有鬼神合敬者禮之事同愛者樂之事禮樂之道得乎此則合敬同愛之見于彼慶源輔氏曰與天地同和則和而不失其節故曰和故百物不失百物不失則其節著矣與天地同節則節而不失其和故曰節故祀天祭地祀天祭地則其和至矣禮樂形而下者鬼神形而上者上下無異形幽明無二理非深於道者不能知也先言明後言幽者主禮樂言之也先王制禮作樂與天地同和節則是理充塞乎天地幽明之間矣故四海之內因禮以合其敬因樂以同其愛河南程氏曰鬼神只是一箇造化天尊地卑乾坤定矣鼓之以雷霆潤之以風雨是也又曰鬼神者造化之妙用禮樂者人心之妙用橫渠張氏曰禮樂鬼神一物得禮樂則得鬼神失禮樂則失鬼神但有幽明之别在明則有禮樂法度在幽則有鬼神天道耳人在隱微有不善其心不安必私禱袐祝於鬼神殊不知明則有禮樂幽則有鬼神理無二也樂仁也禮義也仁則有樂義則有禮山隂陸氏曰易曰精氣為物遊魂為變是故知鬼神之情狀精氣為物禮也逰魂為變樂也故君子不離明而識禮樂亦不即幽而知鬼神周禮義曰大宗伯言祀大神享大鬼祭大示而大宰言祀大神示享先王者大宰非禮官也其佐王祀神示祖考也以道謂之鬼則弗以神事之矣是禮而已非道也然則大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神周官蓋備矣新安朱氏曰明則有禮樂幽則有鬼神蓋禮主減樂主盈鬼神亦只是屈伸之義禮樂鬼神一理又曰在聖人制作處便是禮樂在造化處便是鬼神又曰言人在明處則犯禮樂在幽處則犯鬼神金華應氏曰首言出治道繼言王道備繼言民治行者禮樂周流太和極治之驗也至是則充塞兩間無非禮樂之用刑政亦餘事耳大者贊禮樂之深逺無盡而推其極至之妙也同者言其與天地同運並行不可以差殊先後觀也樂和故泛言百物不失舉物類之至衆見其小大各得也禮嚴故特言祀天祭地舉祭祀之至重見其髙下有等也禮麗於定體收斂而不散鬼之歸也樂遊乎和氣發達而不流神之伸也昭昭之際進退盈縮而經緯不窮者無非禮樂之用冥冥之中屈伸往來而闔闢不已者無非鬼神之用幽明各有管攝其分不同而理則一曰有者顯然見其理之可以相有不可以相無也惟此理磅礴充塞乎天地鬼神之間故極天下之大而愛敬無異心也金華邵氏曰同此一和節也豈特天地同之而已哉得此於明則為禮樂得此於幽則為鬼神天地禮樂鬼神皆一理而已故四海之內感其節則敬心翕然而合感其和則愛心油然而生夫幽與明一致鬼神與禮樂一理樂者致和率神而從天禮者别宜居鬼而從地經言禮樂極乎天蟠乎地通乎鬼神禮樂所以合敬合愛於其明鬼神則合敬合愛於其幽則四海之內未有不合敬同愛者也禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也故事與時並名與功偕鄭氏曰沿猶因述也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也沿或作緣事與時並為事在其時也禮器曰堯授舜舜授禹湯放桀武王伐紂時也名與功偕為名在其功也堯作大章舜作大韶禹作大夏湯作大濩武王作大武各因其得天下之功孔氏曰尊卑有别是殊事俱行於禮是合敬宫商别調是異文無不歡愛是合愛禮樂之狀質文雖異樂情主和禮情主敬致治則同明王所以相因述言前代後代同禮樂之情因時質文或有損益故云相沿也沿謂因而增改也事與時並明禮名與功偕明樂事謂聖人所為之事與所當之時而並行若堯舜揖讓之事與淳和之時而並行湯武干戈之事與澆薄之時而並行也名謂樂名偕俱也言聖人制樂之名與所建之功俱作也大章堯有章明之功大韶舜紹堯之德及禹湯等樂名皆與功俱立也聖王雖同禮樂之情因而修述但時與功不等故禮與樂亦殊長樂陳氏曰禮也者理之不可易者也語其事未嘗不通變以從宜如之何不殊乎樂也者情之不可變者也語其文未嘗不比物以飾節如之何不異乎禮雖殊事而不殊乎合敬禮之本故也樂雖異文而不異於合愛樂之本故也禮雖殊事而有所謂文升降上下周旋裼襲禮之文是也樂雖異文而有所謂事大司樂凡樂事遂以聲展之是也特絶謂之殊不同謂之異禮之事則相絶逺矣故言殊樂之文特不同而已故言異别言之如此合言之一也禮樂殊事而同道異物而合用其情所以同也天官大宰以禮典和邦國諧萬民春官大司樂以六樂和邦國諧萬民則禮以和為用樂以和為體其情同故也明王之於禮樂有改制之名無變情之實禮之損益雖事與時並樂之象成雖名與功偕要其情同明王未嘗不相沿也樂書嚴陵方氏曰吉凶軍賔嘉禮之所以行事也可謂殊矣及其至而不爭則相敬之心莫不合而同宫商角徴羽樂之所以成文也可謂異矣及其至而無怨則相愛之心莫不合而同事與文雖殊而異然愛敬則皆合者以其情同故也情同故明王得以相沿焉後又言不相沿樂者彼言其文此言其情故也述者之謂明故特言明王焉雖相沿之情如此然或不同者以其事與時並名與功偕故也事因時而作時異則事異名以功而顯功異則名異馬氏曰禮樂之情同而明王以相沿則知禮樂之文異而明王不以相沿也蓋當其時而為之以堯舜讓而帝湯武爭而王差其時而為之則子噲讓而絶白公爭而滅古人言禮有曰以時為大有曰變而從時此事之所以並於時也古人言樂有曰樂所以象成此名之所以偕於功也雖然事與功者豈聖人之得已哉蓋時有所不同則所以趨於時者蓋不得不異也山隂陸氏曰然則五帝殊時不相沿樂三王異世不相襲禮蓋言其文而已若乃人心之所同然者猶相沿襲也慶源輔氏曰禮雖殊事然所以合天下之敬樂雖異文然所以同天下之愛由是觀之則禮樂之見於事文者雖或不同而其情則未嘗不一也唯其情之一故明王相沿而為禮樂以順天下之道以合愛敬之心至於事與名則又因時與功之不同而為之又未嘗不與時偕行也功因時而有有堯舜之時則有堯舜之功有湯武之時則有湯武之功有是時則有是事有是功則有是名聖人觀其會通以行典禮固未嘗執一以廢百然亦未嘗徇末以忘本也延平黃氏曰合敬則無離心合愛則無異情事文禮樂之迹也敬愛禮樂之情也先王之制禮樂也立本有情趨時有迹情天也不可戾者也故在所因而曰禮樂之情同明王以相沿迹時也不可同也故在所損益而曰五帝殊時不相沿樂三王異世不相襲禮事者時之應名者功之報趨時斯有事建功斯有名為趨時而後有事故事與時並為立功而後有名故名與功偕延平周氏曰禮樂之器與其文則明王未必相沿而其所以為器與夫所以為文之情則相沿也時異異事故曰事與時並功異異名故曰名與功偕唯其事與時並名與功偕則文質之相救而韶武之作所以不必相沿也金華邵氏曰事謂文質損益之類名謂咸韶濩武之類情同而事與名雖異不害其為同也故鍾鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋俎豆制度文章禮之器也升降上下周還裼襲禮之文也鄭氏曰綴鄼舞者之位也兆其外營域也孔氏曰自此至之謂也申明禮樂之器與文并述作之體綴謂舞者行位相連綴也兆謂位外之營兆也周還謂行禮周曲回旋也裼謂袒上衣而露裼也襲謂掩上衣也禮盛者尚質故襲不盛者尚文故裼長樂陳氏曰先王之為樂也發之聲音則鑄之金而為鍾節之革而為鼓越之竹而為管磨之石而為磬形之動靜則羽籥以舞大夏干戚以舞大武此樂之器也而象實寓焉習其俯仰屈伸行其綴兆要其節奏一舒一疾樂之文也而質實寓焉其為禮也著之齊量則外方以正內圓以應簠之所以為器也內方以守外圓以從簋之所以為器也暉之度數其數以陽竒俎之所以為器也其數以隂偶豆之所以為器也又制度以等異之文章以藻色之禮之器然也而象在其中矣升降上下周旋以合其儀裼襲以美其身禮之文然也而質在其中矣樂書嚴陵方氏曰管在堂下磬在堂上羽籥文舞之所執干戚武舞之所執屈伸言舞者之身容俯仰言舞者之頭容綴兆其位也舒疾其節也簠簋所以盛地産俎豆所以薦天産制度者文章之法文章者制度之飾升降言其行上下言其等周旋言其容裼襲言其服則禮樂之文與器略見於此矣綴則表綴也舞者於此相聯故曰綴兆則兆域以舞者於此可别故曰兆延平周氏曰鍾鼓簠簋之類器也而其所以為器者情也屈伸升降之類文也而其所以為文者情也所謂情者性命之理而已矣知其情則能識其文故能作識其文則未能知其情故能述而已故知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明眀聖者述作之謂也鄭氏曰述謂訓其義也孔氏曰下文云窮本知變樂之情若能窮盡其本識其變通是知樂之情也又云著誠去偽禮之經若能顯著誠信棄去浮偽是知禮之情也既能窮本知變著誠去偽故量事制宜而能作也禮樂之文謂上屈伸俯仰升降上下是也述謂訓説義理既知其文故能訓説禮樂義理不能制作禮樂也長樂劉氏曰知禮之大本者斯能作禮矣知樂之大本者斯能制樂矣周公作六曲作大象大武可謂作而聖矣兼用六代之樂三王四代之法可謂述而明矣長樂陳氏曰禮樂之情寓於象質之微而難知其文顯於器數之粗而易識故知其情者能作之於未有則聖之事非明之所及也識其文者能述之於己然則眀之事而已聖不與焉古之制器者智創之巧述之創業者父作之子述之然則禮樂以聖作以明述亦豈異此孔子述而不作非不足於聖也特不居而已蓋有不知而作者又在所不與焉詩曰不識不知知則知人所為識則識其面目而已是識之外矣知之內矣識之淺矣知之深矣禮樂之情存乎內而深故稱知其文存乎外而淺故稱識樂書嚴陵方氏曰情者文之始也故知其情者能作文者情之末也故識其文者能述上言作述於聖眀之上下言述作於明聖之下何也蓋作述者聖明之用聖明者述作之體用之所起者事也事則有作而後有述故上以作述為之序體之所歸者道也道則由明乃可入聖故下以明聖為之序馬氏曰知禮樂之情者知其情於未作之前識禮樂之文者識其文於己作之後作者所以作其文述者所以述其情知其情於未作之前者因情以作其文識其文於己作之後者因文以述其情因情以作其文者非神足以知來知足以藏往不能與於此故作者之謂聖因文以述其情者非明足以照之亦不能與於此故述者之謂明揚子曰深知乎器械舟車宫室之為則禮由己此因情以作其文也又曰鍾鼓不陳玉帛不分吾無以見聖人此因文以述其情也董氏曰平禍亂一四方立君臣等上下使天地位焉萬物育焉此所謂知禮樂之情而作者也聖人之事也事之難者也因其情備其文詳其制度而正其聲音此所謂識禮樂之文而述者也賢人之事也事之易者也事之難者非甚盛德得其時而起莫之能為也事之易者茍逢其時得其説皆可以為之也延平黃氏曰情可以意會文可以理考無精義不能會其情無明德不能考其文或曰夫子既聖矣述而不作何也曰夫子聖人之在下者也有其德無其位亦何敢作慶源輔氏曰禮樂之情存乎中禮樂之文形乎外即吾之心而能作者聖之事也因外之文而能述者明之事也聖可兼明明不能兼聖聖誠者也明明者也自明而誠則聖矣金華應氏曰創新開始曰作所以察事物之幾微而建立其規模制度襲舊成終曰述所以因前古之遺緒而修明其遺闕也新安王氏曰禮樂之情愛敬是也禮樂之文上所言是也然情文常相依有此情則有此文雖然明聖之名豈易得哉惟盡述作之實始可以居明聖之名故繼之曰明聖者述作之謂樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别樂由天作禮以地制過制則亂過作則暴明於天地然後能興禮樂也鄭氏曰化猶生也别謂形體異也樂由天作禮以地制取法天地也過猶誤也暴失文武之意孔氏曰從此至與民同也為樂論第四段此經申明禮樂從天地而來王者必明於天地然後能興禮樂樂調隂陽是天地之和禮明貴賤是天地之序樂生於陽是法天而作禮生於隂是法地而制聖人識合天地則制作不誤若非聖識則必誤誤制禮則尊卑混亂誤作樂則樂體違暴失文武之意謂文樂武樂雜亂也長樂陳氏曰至隂肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通而成者天地之和也樂實與之俱焉天尊地卑神明位矣以春夏先秋冬後四時序矣天地至神而有尊卑先後者天地之序也禮實與之俱焉是樂者天地之和禮者天地之序和則不乖故百物因形移易而皆化序則不亂故羣物萌區有狀而皆别樂統同也嫌於不異故言百物以辨之禮辨異也嫌於不同故言羣物以統之樂者天地之和禮者天地之序則合異以為同樂由天作禮以地制則散同以為異古者治定制禮功成作樂禮未可制而制之是過制也樂未可作而作之是過作也過制則失序矣離而為慝禮能無亂乎過作則失和矣流而為淫樂能無暴乎明於天地然後能興禮樂明王制作之始也舉禮樂而天地將為昭焉明王制作之效也樂書嚴陵方氏曰和則統同而化故言百物皆化序則辨異而别故言羣物皆别百物皆化然後至於百物不失羣物皆别然後可以祀天祭地羣物亦百物矣舉其數之成則曰百以其類之衆則曰羣於禮言羣以物既别不嫌於數之不辨故也制禮所以致治然過制祗以為亂作樂所以致和然過作祗以為暴明於天地然後能興禮樂制作之過則禮樂之道廢矣故以興言之經有曰樂由陽來禮由隂作有曰樂由中出禮自外作有曰樂由天作禮以地制或言隂陽或言中外或言天地言皆不同何也以道言則曰隂陽以分言則曰中外以形言則曰天地延平周氏曰樂之本出於天地之和及用於天地之間則其和也能致百物之化禮之本出於天地之序及行於天地之間則其序也能致羣物之别樂雖出於天地之和然樂則陽也故其作以天為主禮雖出於天地之序然禮則隂也故其制以地為主過制則非禮非禮則亂過作則非樂非樂則暴天地之所以節與和者以禮樂也禮樂之所以節與和者以天地也是天地則禮樂也禮樂則天地也故曰明於天地然後能興禮樂馬氏曰樂者天地之和此言其自然之和也禮者天地之序此言其自然之序也天髙地下萬物散殊此天地之序隂陽相摩天地相蕩鼓之以雷霆奮之以風雨至於暖之以日月而百化興焉此天地之和也天以和而百物化故樂由天作而聖人作樂以應天地以序而羣物别故禮以地制而聖人制禮以配地明於天地然後能興禮樂者所謂作者之謂聖是也山隂陸氏曰過制則失中故亂過作則失和故暴鄭氏謂暴失文武之意文武若今云文武大矣李氏曰天地奠位故序神明通氣故和和所以為樂序所以為禮故曰樂者天地之和禮者天地之序和故百物自消自息而皆化序故羣物或合或離或贏或縮而皆别和則屬乎陽序則屬乎隂屬乎陽者麗乎天故曰樂由天作也屬乎隂者麗乎地故曰禮以地制也廬陵胡氏曰易於樂取雷出地奮是天地之和於禮取上天下澤是天地之序樂由天作禮以地制所謂制作侔造化樂主陽禮主隂過制則亂過作則暴範圍天地而不過則暴亂不生延平黃氏曰和者天地之情序者天地之理百物言其羣分羣物言其類聚聚而患其亂故皆别則言羣物有生則貴衆多故皆化則言百物又曰先王之制禮樂也發天地之情明天地之理而已過制過作人偽也非真禮樂也故過制則非禮而失之亂過作則非情而失之暴明於天地然後能興禮樂者發其情明其理而已慶源輔氏曰此所謂禮樂非聖人不足以言之天地絪緼萬物化醇樂之理著矣天髙地下萬物散殊禮之理著矣前言自然之禮樂形於天地之間者次言聖人制禮作樂非自為之蓋有自來也前總言天地原其始也後分言天地要其終也禮樂雖出於天地然制作之者人也人則不能無差循乎理則得徇乎私則過得則遂其所欲過則反得其所不欲亂者理之反也暴者和之反也極言之所以戒者嚴矣明於天地聖人之事也非述者之謂明也金華邵氏曰天地禮樂常相資而立天地非禮樂則其功泯禮樂非天地則其用息樂者天地之和天地得樂而後和也禮者天地之序天地得禮而後序也惟其以樂而和故物雖不一而皆化惟其以禮而序故物雖羣居而有别天地可一日而無禮樂乎禮樂雖有功於天地至於制作亦不能舍天地以自用故樂由天作蓋以其和禮以地制蓋以其序有序而過之則亂有和而過之則暴則天地又有功於禮樂矣能明天地之所以為天地則知禮樂之所以為禮樂又豈可一日而無天地乎又曰樂以氣化天則氣之運也禮以形辨地則形之殊也過乎此而作則不和而暴過乎此而制則無序而乖葉氏曰言同和同節必曰大禮大樂而此言禮止曰天地之序言樂止曰天地之和何也蓋所謂大禮大樂者自人而言之也自人而言之能與天地同則曰大若自天地言之有不容以大言之矣故止曰天地之和天地之序論倫無患樂之情也欣喜歡愛樂之官也中正無邪禮之質也莊敬恭順禮之制也鄭氏曰倫猶類也患害也官猶事也質猶本也孔氏曰此以下明禮樂文質不同事為有異樂主和同論説等倫無相毁害是樂之情也八音克諧使物歡欣此樂之事迹也在心則倫類無害故為樂情在貌則欣喜歡愛故為樂事內心中正無有邪僻是禮之本質也外貌莊敬謙恭謹慎是禮之節制也張氏曰既云唯聖人識禮樂之情此以下更説其情狀不同也長樂陳氏曰樂有情有文微情文之顯以之神則非意之所能致言之所能論也闡情文之幽以之明則意之所能致言之所能論也故其文不息其情無患皆得而論焉蓋八音克諧無相奪倫論乎隂陽而無散密之患論乎剛柔而無怒懾之患各安其位而其倫清矣非樂之文也樂之情而已孟子曰欣欣然有喜色傳曰歡然有恩以相愛則欣喜在色而主乎外歡愛在心而主乎內非樂之君也樂之官而已誠非禮不著偽非禮不去誠著則中正偽去則無邪中正無邪則釋回增美質矣豈不為禮之質乎外貌斯須不莊不敬則易慢之心入而臨之以莊則敬矣是外莊則內敬也貌曰恭恭近於禮而禮又極順焉是外恭而內順也禮以地制莊恭乎其外敬順乎其內則因物以裁之而已有不為之制乎樂書馬氏曰樂以和為實而亦所以通倫理也所謂論倫無患者其和足以通倫理而無繆也故為樂之情情猶言實也樂雖以和為實而其和之所見者則在於欣喜歡愛無欣喜歡愛則和之理幾乎隱矣故欣喜歡愛而為樂之官也官猶言樂之職也則是情者官之所始而官者情之所成也著誠去偽者禮之經也中正無邪者誠而已故為禮之質雖以誠為本而誠之所發者則在於莊敬恭順之間蓋無莊敬恭順則禮之誠於是乎滅矣故莊敬恭順而為禮之制也制猶言文也則是質者制之所立而制者質之所行也此與夫義理禮之文忠信禮之本者其意同矣嚴陵方氏曰樂之理本於心而已發而為言故有論由乎天而已出而之人故有倫然理之所一不可二也故無患而樂之所以動乎中者不過是焉故曰樂之情也經曰文足論而不息此樂之論也又曰樂行而倫清此樂之倫也又曰百姓無患此樂之無患也經曰禮以制中此禮之中也又曰禮之正國此禮之正也又曰止邪於未形此禮之無邪也經曰樂飾喜則發而為欣可知曰樂合愛則發而為歡可知曰禮相敬則形而為莊可知曰禮極順則形而為恭可知延平黃氏曰倫者言其理而已矣倫人理也樂之情天德也以天德論人理則無廢天之患矣人之德出而分於三則有中入而止於一則有正中而無邪則能徙於人正而無邪則能侔於天敬順禮之制在心者也莊恭禮之制在體者也欣喜歡愛則設於情恭順莊敬則立於質下文與民同則禮樂之小者也與天地同禮樂之大者也與道同禮樂之妙者也先王之於天地以其妙者官之以其大者相之延平周氏曰論倫而無患者言其和和則樂之情也中正而無邪者言其中中則禮之質也欣喜歡愛者樂之所司故曰樂之官也莊敬恭順者禮之所裁故曰禮之制也慶源輔氏曰有序而後和故論倫無患樂之情也欣喜歡愛樂之官也恭敬者不可不本之以誠實故中正無邪禮之質也莊敬恭順禮之制也金華邵氏曰情實也官職也有此實則有此職質者本也制者文也有此本則有此文論其倫則不相患害如書所謂無相奪倫者故欣喜歡愛而其職形矣中正而不流於邪僻如所謂行修言道者故莊敬恭順而其制立矣知情而能作識文而能述此明聖述作之事也至其施播於金石之間發越乎聲音之表用於宗廟社稷事乎山川鬼神則此情此官此質此制又將與天下公之豈明聖所得而私哉若夫禮樂之施於金石越於聲音用於宗廟社稷事乎山川鬼神則此所與民同也鄭氏曰言情官質制先王所專也孔氏曰施於金石越於聲音明樂也用於宗廟社稷事乎山川鬼神明禮也通而言之則禮樂相將矣此等與民所同有也前經論樂之情等四事先王所獨能專也張氏曰言四者施用祭祀隨世而異則前王所不專故云與民同言隨世也長樂陳氏曰均是樂也施於金石樂之器也越於聲音樂之象也均是禮也用之宗廟社稷內祭之禮也事乎山川鬼神外祭之禮也禮運曰夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致敬於鬼神由是觀之金石聲音雖主乎樂而禮在其中矣周官大司樂分樂而序之凡六樂皆文之以五聲播之以八音此樂施於宗廟社稷山川鬼神者也於器舉金石則絲竹之類舉矣於象舉聲音則歌舞之類舉矣大宗伯之職掌建邦之天神地示人鬼之禮小宗伯掌建國之神位此禮施於宗廟社稷山川鬼神者也凡祭祀以天地宗廟為大日月星辰社稷五祀五嶽為次司中司命風師雨師山川百物為小於大祭祀舉宗廟則天神地示之類舉矣於小祭祀舉山川鬼神則風雨百物之類舉矣凡此無非寓於政治而與民同者也論倫無患至於莊敬恭順者禮樂之本先王之所以與人異及夫施於金石越於聲音用之宗廟社稷事乎山川鬼神者禮樂之用先王之所以與人同不以所異者與人不以所同者處已夫是之謂議道自已置法以民樂書嚴陵方氏曰施以言其施張越以言其發越金石者樂之所以張故言施聲音者樂之所以發故言越樂之所施固或在於匏土革木矣此止以金石為言者以考之尤有聲也宗廟社稷內也故以用言之山川鬼神外也故以事言之宗廟社稷所以依鬼神也雖不言知其為鬼神矣山川則有貨財焉故必言鬼神以别之禮運言山川所以儐鬼神亦以是也金石聲音特樂而已亦統以禮為言者凡行禮然後用樂用樂所以成禮未有用樂而不為行禮者也周官有禮樂亦此之意夫情官質制者禮樂之義也金石聲音者禮樂之數也其數可陳則民之所同其義難知則君之所獨故於金石聲音曰則此所與民同也中庸曰非天子不議禮語曰禮樂自天子出又曰民可使由之不可使知之皆此意也延平黃氏曰禮樂之實生於天下之情性然後聖人為之著於文寓於器孟子曰禮之實節文斯二者樂之實樂斯二者是也仁之實失節則泛失文則固義之實失節則刻失文則介天下之人其泛為墨子其固為子莫其介為仲子其刻為申子禮樂之實熄矣其文與器豈得而議哉先王始以五禮防萬民之偽而教之中故其中也喜怒哀樂之未發無過與不及六樂防萬民之情而教之和故其和也喜而為仁怒而為義哀而不傷樂而不淫皆中其節萬民之偽弗入而廢其天其性中矣禮之實存焉萬民之情弗出而徇於物其禮和矣樂之實存焉然後聖人以文與器兼收其實而已制禮所以致中作樂所以致和中和之氣格於上則天位焉格於下則地位焉行乎其中萬物育焉記曰治定制禮功成作樂能使其情和然後其功成能使其性正然後其治定馬氏曰情官質制四者雖不同而其大概皆不出於一人之身若夫施於金石越於聲音用於宗廟社稷事乎山川鬼神者不獨在於一人之身而與天下共之也慶源輔氏曰先王之制禮作樂也內外相應本末具舉情官質制並行而不相悖然施之金石越之聲音用之於宗廟社稷行之於山川鬼神與斯民共由之然後禮樂之道達而君人之職備矣金華邵氏曰書曰禋于六宗類于上帝則用之宗廟社稷矣望于山川遍于羣神則事乎山川鬼神矣神無方也無乎不在在天所謂天神在鬼所謂鬼神謂之山川鬼神者其山林川谷丘陵能出雲為風雨見怪物者歟情官質制禮樂之本先王所以與人異金石聲音禮樂之用先王所以與人同王者功成作樂治定制禮其功大者其樂備其治辨者其禮具干戚之舞非備樂也孰亨而祀非達禮也鄭氏曰功成治定同時耳功主於王業治主於教民明堂位説周公曰治天下六年朝諸侯於明堂制禮作樂是也辨遍也干戚之舞非備樂者樂以文德為備若咸池者孔子曰韶盡美矣又盡善也武盡美矣未盡善也孰亨而祀非達禮者達具也郊特牲曰郊血大饗腥三獻爓一獻孰至敬不饗味而貴氣臭也孔氏曰從此至禮樂云是樂記第三章名樂禮章也章中明王者為治必制禮作樂故名樂禮章案鄭目録第三是樂施第四是樂言第五是樂禮今以樂禮為第三章記者别起意别之也王者之功因民所樂故功成作樂以應民所樂之心如民樂周王用干戈而業成故周王作干戈之樂禮以體别為義今治人得體故制禮以應之如周王太平乃制禮也樂云作禮云制者作是動用制是裁斷白虎通云樂陽也動作倡始故言作禮隂也繫制於陽故云制也其功大者其樂備其治辨者其禮具言功治有大小故禮樂亦應以廣狹也樂備謂文德備具不備謂干戚之舞禮具則血腥而祭不具謂孰亨而祀言禮樂之體皆以德為備具也周樂干戚之舞非如舜時文德之備樂也後世孰亨牲體而祭祀非如五帝血腥之達禮也長樂陳氏曰功不至於鳬鷖不可以言成治不至於既濟不可以言定王者德位兼隆於天下雖有可以制作之道必適乎可以制作之時故禮雖可以義起必待乎治定樂雖可以理作必待乎功成此周之禮所以備於內外之既治而樂所以聲於無競維烈之後也作樂合乎祖而簫管備舉樂之所以備也蒸畀祖妣以洽百禮禮之所以具也蓋全之之謂備小備之謂具具於備為微備於具為全也然則文武之舞不全非所以為備樂腥孰之薦不兼非所以為具禮周官以六代文武之舞為大合樂禮運以毛血腥熟合亨為禮之大成則備樂具禮於是覩矣變具禮為達禮者禮不具不足為天下之通禮故也古者之舞有以干配戚者朱干玉戚以舞大武是已有以干配戈者春夏學干戈是已有兼而用之者干戈戚揚是已干則朱飾之盾也有扞蔽之材而仁禮之意寓焉戚則玉飾之斧也有剛斷之材而仁義之意寓焉彼其於武舞之器如此豈非有武事必有文備之意歟樂書嚴陵方氏曰樂以象其功禮以飾其治以樂象其功故其功大者其樂備以禮飾其治故其治辨者其禮具馬氏曰禮樂雖相資之物而制作之際則不必同其時蓋功主於王業而王業者起於古而成於今治主於教民而教民者施於今而俟於後功成於今故武王始得天下而作大武所以象其功之成至於周公六年朝諸侯而始制禮也然周公制禮之時又曰作樂者緣其頌聲而廣之耳則周之樂雖莫盛於勺而必以武為主也若禮者則教化已明習俗已成其治未至於定則不可以具也然則功未成而治未定其禮樂將廢耶曰功未成則樂未作而用先王之樂治未定則禮未制而用先王之禮樂之備則不獨於文不獨於武故干戚之舞非備樂也禮之具則不獨於今不獨於古故孰亨而祀非達禮也武王有武功而其樂之名曰武故其武之備遲而又久者此武中而有文也舜有文德而其樂之名曰韶故舞干羽于兩階者此文中而有武也此文武之樂備也延平黃氏曰王者之為天下方其圖功而謀治也則有教化以行禮樂之道及其功成而治定也則有制作以建禮樂之業道也聖人非敢私行之業也先王非敢私為之明人之天而已禮之實節文仁義者也樂之實樂仁義者也節之不泛文之不固樂之不乖二者之實雖人之所固有者彼所以節文而樂之則因教化而後至焉蓋使天下之人耳目之視聽無非禮也手足之舞蹈無非樂也其功已成其治已定先王始有制作以收其成而已樂以象德而功成則德之著也故作樂以揚之禮以節事而治定則事之辨也故制禮以彰之功大者其樂備治辨者其禮具王者之制禮樂其情相沿而有詳略者時而已矣山隂陸氏曰達禮自天子達三獻爓一獻孰是己干戚之舞備樂也而曰非備樂孰亨而祀達禮也而曰非逹禮以著禮樂在彼不在此也雖有干戚之舞而功不備雖孰亨而祀而治不協愧於備樂達禮矣延平周氏曰立於禮故禮制於治定成於樂故樂作於功成舜命九官益而後伯夷而後夔蓋此意也慶源輔氏曰樂固所以象其功然亦所以保其功禮固所以飾其治然亦所以保其治辨固訓遍然有别矣易遍為辨者謂禮故也樂備而後成禮達而後行樂不備則功未大也禮不具則治未辨也變具為達禮之具猶未足言也必以達於上下為至金華邵氏曰此聖人保治之道世儒往往指為飾治之具功之成者易於怠故作樂以樂之如所謂勸之以九歌也治之定者易於縱故制禮以防之如所謂安上治民莫善於禮也然功大而樂不備則必有遺而不舉之處治辨而禮不具則必有縱而不嚴之處此所以必貴乎備且具歟干戚止舞耳文德何與焉故非備樂孰亨止今禮而古禮何與焉故非達禮新安王氏曰治定未至於功成功成不止於治定制禮者立於禮也作樂者成於樂也易以謙制禮繼以作樂之豫舜命夷典禮繼以夔典樂皆此意也然感人莫善於樂治人莫急於禮功未成治未定禮樂將廢禮樂不可斯須去身特一新其制作必待功成治定耳五帝殊時不相沿樂三王異世不相􅊞禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其唯大聖乎鄭氏曰不相沿襲言其有損益也樂人之所好也害在淫誇禮人之所勤也害在倦略敦厚也孔氏曰沿因也五帝三王禮樂之情則同故前文云明王以相沿是也此論禮樂之迹損益有殊隨時而改故不相沿襲也樂好而不止放蕩奢佚物極則反樂去憂來又煩手淫聲慆堙心耳則憂戚生也禮勞而不堪既生懈倦則致粗略偏謂倦略不周備也及夫厚重于樂知止而無至於憂行禮安靜委曲備具不至倦略唯大聖之人能如此也長樂陳氏曰五帝體天道故以帝號而同乎天三王盡人道故以王號而應乎人時則隂陽運量天之所為也世則前後推遷人之所因也五帝傳賢同乎天非不用禮也而莫尚乎樂樂田天作故也三王傳子應乎人非不用樂也而莫尚乎禮禮因人情為之節文故也詳而求之伏羲之扶來神農之下謀黃帝之咸池堯之大章舜之大韶皆以象成惡得而相沿夏禮尚質周尚文殷文質之中皆以從冝惡得而相襲顔淵問為邦孔子告以夏時殷輅周冕之禮有虞氏韶舞之樂語樂於帝語禮於王亦與是相為表裏孔子論五帝謂法始乎伏羲著於神農成於黃帝堯舜蓋嘗詳之於易孔安國以唐虞預五帝則是以少昊顓頊髙辛為之不知奚據樂主乎盈不期極而極焉禮主乎減不期粗而粗焉樂極而不反則冥豫而已能無憂乎禮粗而不進則跛履而已能無偏乎及夫敦樂而不偷則適吾之性何憂之有禮備而不闕則情文俱盡何偏之有樂書嚴陵方氏曰樂以感人為樂樂或至於極則憂之所生禮以強世為難難或至於粗則偏而不起能敦以治之雖樂而不至於極顧豈有憂之患備以用之雖難而不至於粗顧豈有偏之患大饗卒爵而樂闋鄉飲酒樂備而功出所以防其極也書言享多儀經言賔主百拜亦以防其粗也敦樂者言其始禮備者言其成樂著大始故先言敦以見其始禮居成物故後言備以見其成前言相沿述者之事故稱明此言敦備作者之事故稱聖延平周氏曰明王之所以相沿者禮樂之情同也不相沿襲者禮樂之文異也同所以立本異所以趨時唯其異也乃所以為同五帝天道也故繫之以樂三王人道也故屬之以禮樂出於人情之所樂則其敝也過故樂極則憂而以反為文禮出於強世則其敝也不及故禮粗則偏而以進為文敦樂而無憂禮備而不偏則無過不及之敝唯聖人能與於此馬氏曰不相沿樂樂之文也不相襲禮禮之文也至於禮樂之情則百王之所不易也於五帝則言樂於三王則言禮互文以見意也樂患於極故以反為文盈而不能反則放故極則憂禮患於粗故以進為文減而不能進則銷故粗則偏敦樂而無憂者盈而能反也禮備而不偏者減而能進也以大聖而言之則所謂進而反者非出於勉強而皆從容中之也延平黃氏曰干戚之舞飾威而已故非備樂孰亨而祀致味而已故非達禮五帝之天下未傳之子故不言世而言時其時未失德故不言禮而言樂五帝之時其俗未頓革故言其殊而不言異又曰樂極則憂者以物為樂故也禮粗則偏者以度數為貴故也大聖敷樂有仁而其樂未嘗荒故無憂禮備有義而其法足以適用故不偏山隂陸氏曰禮樂不可極又不可粗憂則失其所謂和偏則失其所謂中慶源輔氏曰帝王各隨其治與功而制作之也然其情同其本一故其損益百世可知敦與易敦臨敦艮之敦同臨之上曰敦臨艮之上曰敦艮天下之事唯終守之為難敦云者敦篤以守其終之謂故曰敦艮之吉以厚終也制禮以極其備非聖人其孰能與此金華邵氏曰樂固貴於備然備非極之謂極則窮窮則憂將至矣禮固貴於具然具非粗之謂粗則不密不密則失於一偏矣若夫篤於樂而不至於憂備於禮而不至於偏非天下至聖孰能與此禮記集説卷九十三
