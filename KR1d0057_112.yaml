body:
  text: 禮記集説卷一百十二宋衛湜撰宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神敎之至也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土其氣𤼵揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服鄭氏曰氣謂嘘吸出入者也耳目之聰明為魄合鬼與神而祭之聖人之敎致之也隂讀為依䕃之䕃言人之骨肉䕃於地中為土壤焄謂香臭也蒿為氣烝出貌也蒿或為藨以先言衆生久言百物明其與人同也不如人貴耳明命猶尊名也尊極於鬼神不可復加也黔首謂民也則法也為民作法使民亦事其祖禰鬼神民所畏服孔氏曰自此至先王先公敬之至也一節明宰我問鬼神之事夫子荅以鬼神魂魄祭祀之禮又廣明天子諸侯耕藉及公桑之事氣嘘吸出入無性識也但性識依此氣而住有氣則有識無氣則無識性識則神出入也故人之精靈而謂之神魄體也若無耳目形體不得為聰明人之死其神與形體分散各別聖人以生存之時神形和合今雖身死聚合鬼神似生人而祭之是聖人設敎興致之也物之羣衆而生必皆有死此本說人因及物也鬼歸也歸土之形故謂之鬼骨肉斃于下隂為野土此覆説歸土之義又申明人氣為神人生則形體與氣合而生死則形與氣分其氣之精魂𤼵揚而升於上為神靈光明萬物之氣或香或臭烝而上出其氣蒿然人聞之其情有悽有愴人氣揚於上為昭明百物之精氣為焄蒿悽愴神之著者謂𤼵揚昭明是人神之顯著也因物之精致為之極者言聖人因人與物死之精靈遂制造為尊極之稱尊名人物之精謂之鬼神以為萬民之法則也鬼神本是人與物之魂魄若直名魂魄其名不尊故也黔黒也凡人以黒巾覆頭故謂之黔首史記云秦命民曰黔首漢家僕𨽻謂蒼頭以蒼巾為飾異於民也百衆謂百官衆庶萬民謂天下衆民旣敬之以鬼神故下皆畏敬之也此經鬼神本為人故下文築為宫室設為宗祧其實亦兼山川五祀百物之屬故禮運列於鬼神注云謂祖廟山川五祀之屬樂記幽則有鬼神注云助天地成物者是百物之魂謂之鬼對則精靈為魂形體為魄故昭七年左傳云人生始化曰魄旣生魄陽曰魂是形為魄氣為魂若散而言之魄亦性識識與魄無異故昭二十五年左傳云心之精爽是謂魂魄魂魄去之何以能久又襄二十九年左傳云天奪伯有魄又對而言之則天曰神地曰祇人曰鬼散而言之通曰鬼神横渠張氏曰禮記凡言鬼神者大率以隂陽出入言之鬼神一物也以其歸故謂之鬼歸者自無形中來復歸於無形自有形中來者復歸於有形是歸也魄也者鬼之盛指有形體而言神申也鬼歸也物之所生即是神及其終則歸也又曰精氣為物遊魂為變精氣者自無而有遊魂者自有而無自無而有神之情也自有而無鬼之情也自無而有故顯而為物自有而無故隠而為變顯而為物者神之狀也隠而為變者鬼之狀也大意不越有無而已物變而已物雖是實本自虚來故謂之神變雖是虚本縁實得故謂之鬼此與上所言神無形而有用鬼有形而無用亦相㑹長樂劉氏曰人之生也稟乾元之氣以資性命之始稟坤元之氣以資形質之生性命有識也生則為道德於人死則為昭明於上故曰魂焉形質有精也生則為聰明於體死則為英靈於地故曰魄焉然則魂生於氣氣所以盛其魂者也聖人尊其親之魂乃稱為神焉靈生於魄魄所以函其靈者也聖人尊其親之魄乃稱為鬼焉人之死也魂氣𤼵揚復歸于天形體變化復歸于土不可得以復合為形而親旣亡弗可得以復見也聖人賾知生死之本源究極鬼神之情狀將報本而反始也為之祀饗合鬼與神復為一體恐懼齊戒以事之孚信蠲潔以感之庶其饗之故曰氣者神之盛魄者鬼之盛以言乎感氣於天則神可來報魄於地則鬼可合也是以爇脂及蕭致氣之道也奠鬱及鬯致魄之道也故曰合鬼與神敎之至也由是人人知所以事其祖考必致饗焉孝敬迨於幽隂仁義垂于萬世為敎之大不已至乎故衆物之生也雖氣充乎體而魄形於事必有死焉及夫骨肉入于地中則變化而復歸為土土積其氣能生萬物其英而靈者人得之多焉此聖人所以求其魄於地也若夫其氣則𤼵揚于上為天之昭明結者歸于日星散者凝為虚寂而充盈乎天地之間也其降于地而資始萬物則為焄蒿馨烈純粹英華能悽愴而感動于人者皆是也此其神之著見不可揜者也故因物之精制為尊極之號明以命夫天下謂之為鬼神而使民祭為祖考此所以為黔首萬民之法則也延平周氏曰氣者所以歸于天魄者所以降于地為神者蓋有魄也然魄非神之盛也為鬼者蓋有氣也然氣非鬼之盛也神譬則天道而鬼譬則人道而已合鬼與神敎之至也鬼神之為德能使人齊明盛服而洋洋乎如在其上與其左右則人之所以有愧於屋漏而為之愼獨者也故曰明則有禮樂幽則有鬼神是鬼神之為敎同於禮樂而禮樂之敎有所不至則鬼神又有以助之也精魄為物故骨肉斃于下隂為野土者此百物之精也神魂為變故其氣𤼵揚于上為昭明焄蒿悽愴者此神之著也昭明言其燭於物者焄蒿言其達於上者悽愴言其感於情者言百物之精也神之著也而獨言因物之精制為之極者莫非物也雖神之著亦可謂之物鬼者盡人道者也神者盡天道者也天人之道黔首之則故明命鬼神以為黔首則唯鬼神有以為之則故百衆畏其威萬民服其德言衆者不特民而已言民則無知矣故屬之以服其德嚴陵方氏曰宰我問鬼神之名而不知所謂鬼神者何物故疑而問之神者陽之所為鬼者隂之所為也言氣則知魄之為形言魄則知氣之為魂魄為鬼之盛而魂亦從之者言其有所歸則一也郊特牲言魂氣歸于天形魄歸于地以是而已魂亦神也此止言氣者以氣為魂之本而魂非神之盛故也形亦鬼也此止言魄者以形為魄之本而形非鬼之盛故也以主其盛者故止言氣魄而已有生者必有死故曰衆生必死悽愴言其情以其斃于下故所感者如此以其為野土故於精曰物以其為昭明故於神曰著物之精則麗乎形有形故其數辨而為百神之著則運乎氣故其道運而為一此於精則曰百物於神則不言也且天一生水於人為精地二生火於人為神水先精而後神則以所生之次為序故也或言精神以水火之性言之也或言鬼神以天人之道言之也或言氣魄以隂陽之理言之也言雖不同其義則一制為之極固亦因神之著矣止言因物之精者以悽愴之精感於物故也極之為言至也名曰鬼神則尊敬之至不可以復加是其所以制為之極也且鬼神本無名也其名則人命之爾故曰以為黔首則是乃所以為敎之至也所謂黔首不特兆於周秦素問曰黔首共餘食則黄帝之時固已言矣馬氏曰𤼵言其申揚言其散昭者明之著明者昭之本焄言氣之迎蒿言氣之出昭明焄蒿者狀也悽愴者情也此精氣鞠而為物散而為遊魂之情狀故曰百物之精也神之著也言物而又曰百物者蓋囿於天地之間者未有能逃於天地之數者也山隂陸氏曰魂亦神也氣其盛者也體亦鬼也魄其盛者也氣有升而已魄有降而已唯聖人為能求而合之以敎天下故曰敎之至也衆生必死著非衆生有不死者莊子曰黄帝得之以登雲天焄蒿陽氣也悽愴隂氣也昭明蓋其中正言黔首著先王敎民蓋蚤即老而後敎晚矣亦老宜不待敎而知者也石林葉氏曰易曰精氣為物遊魂為變物者其聚也變者其散也郊特牲謂魂氣歸于天形魄歸于地歸于天者知氣升自上也歸于地者體魄降自下也聚散者天之道故精氣猶謂之物升降者人之道故魂氣亦謂之神蓋魂與氣無不之無不在則為神之盛體與魄有所歸有所化故為鬼之盛鬼神皆潛於幽而祭以合饗之使民敬畏此所以為敎之至也人之死亡其魂魄皆潛於幽而不可見者物之精而已矣故聖人欲嚴其道以明其敎故明以命於鬼神於天曰神於人曰鬼此離而言之也及合而言則凡在幽者皆不害其同名百衆則貴者也故曰畏萬民賤者也故曰服貴賤雖不同皆合黔首也故曰以為黔首則講義曰大凡有生者必有死雖骨肉斃而化於下而其氣則𤼵揚于上其光焰為昭明其氣象為焄蒿或感動人於若有若無之間則又使人悽愴而不能自已是孰為此是聰明性識為百物之精爽而神之不可揜焉者也夫聖人既已尊其親矣而又有所謂為物之精而神之著者如此所以因而制為尊極之稱明命之曰鬼神以敎天下而以為黔首之法則百衆以是而敬畏其祖考萬民以是而服從其敎令則所謂鬼神者豈徒有名而已哉新安朱氏曰昭明焄蒿悽愴此言鬼神之氣所以感觸人者昭明乃光景之屬焄蒿氣之感觸人者悽愴如漢書所謂神君至其風颯然之意鄭氏説云口鼻之嘘吸者為魂耳目之精明者為魄此蓋指血氣之類言之口鼻之嘘吸是以氣言也耳目之精明是以血言也目之精明以血言可也耳之精明何故亦以血言蓋醫家以耳屬腎精血盛則聽聰精血耗則耳聵矣氣為魂血為魄故骨肉歸于地隂為野土若夫魂氣則無不之也易中説遊魂為變却只説一邊精氣為物精氣聚則成物精氣散則氣為魂精為魄魂升為神魄降為鬼易只説那升者如徂落之義則是兼言之又曰子産有言物生始化曰魄旣生魄陽曰魂孔子曰氣也者神之盛也魄也者鬼之盛也鄭氏注曰嘘吸出入者氣也耳目之精明為魄氣則魂之謂也淮南子曰天氣為魂地氣為魄高誘注曰魂人陽神也魄人隂神也此數説者其於魂魄之義詳矣蓋嘗推之物生始化云者謂受形之初精血之聚其間有靈者名之曰魄也旣生魄陽曰魂者旣生此魄便有暖氣其間有神者名之曰魂也二者旣合然後有物易所謂精氣為物是也及其散也則魂遊而為神魄降而為鬼矣説者乃不考此而但據左疏之言其以神靈分隂陽者雖若有理但以嘘吸之動者為魄則失之矣其言附形之靈附氣之神似亦近是但其下文所分又不免於有差其謂魄識少而魂識多亦非也但有運用畜藏之異耳建安真氏曰鬼神之理雖非始學者所易窮然亦須識其名義若以神示鬼三字言之則天之神曰神以其造化神妙莫測也地之神曰示以其山川草木有形可見顯然示人也示古祇字人之神曰鬼謂氣之已屈者也若以鬼神二字言之則神者氣之伸謂𤼵出也鬼者氣之屈謂收回也氣之方伸者屬陽故為神氣之屈者屬隂故為鬼神者伸也鬼者歸也且以人之身論之生則曰人死則曰鬼此死生之大分也然自其生而言之則凡自幼而壯此氣之伸也自壯而老自老而死此又伸而屈也自其死而言之魂遊魄降寂無形兆此氣之屈也及子孫享祀以誠感之則又能來格此又屈而伸也姑舉人鬼一端如此至若造化之鬼神則山澤水火雷風是也日與電皆火也月與雨亦水也此數者合而言之又只是隂陽二氣而已隂陽二氣流行於天地之間萬物賴之以生賴之以成此即所謂鬼神也氣之伸為神如春生夏長是也氣之屈為鬼如秋冬斂藏是也今人只以塑像畵像為鬼神及以幽暗不可見者為鬼神殊不知山峙川流日照雨潤雷動風散乃分明有迹之鬼神日出為神入為鬼雨潤為神止為鬼雷動為神息為鬼風散為神收為鬼伊川曰鬼神者造化之迹又曰鬼神天地之功用張橫渠曰鬼神二氣之良能凡此皆指隂陽而言天地之氣即人身之氣人身之氣即天地之氣又曰精者血之類是滋養一身者故屬隂氣是能知覺運動者故屬陽二者合而為人精即魄也目之所以明耳之所以聰者即精之為也此之謂魄氣充乎體凡人心之能思慮有知識身之能舉動與夫勇决敢為者即氣之所為也此之謂魂人之少壯也血氣強血氣強故魂魄盛此所謂伸及其老也血氣旣耗魂魄亦衰此所謂屈也旣死則魂升于天以從陽魄降于地以從隂所謂各從其類也魂魄合則生離則死故先王制祭享之禮使為人子孫者盡誠致敬以焫蕭之屬求之於陽灌鬯之屬求之於隂求之旣至則魂魄雖離而可以復合故曰合鬼與神敎之至也神指魂而言鬼指魄而言此所謂屈而伸也又曰或問鬼神二氣之良能曰旣有隂陽二氣則自然有往有來有闔有闢有消有息有聚有散蓋其理自然如此故曰良能此乃借孟子良知良能之名以形容二氣孟子本意謂孩提之童莫不知愛親其長莫不知敬兄此本然之性非出人為隂陽二氣屈伸亦是本然之理故借此二字以明之往闔消散屈也來闢息聚伸也慶源輔氏曰神以申為義則氣也者神之盛也鬼以歸為義則魄也者鬼之盛也合而言之則鬼與神一也故聖人合之以制祭祀之禮而事之其為敎也至矣魂生於氣魄生於體氣無不之故曰遊魂體則斃於下而已故曰體魄則降人亦一物也昭明焄蒿悽愴言氣之𤼵揚如此不必分人物言之不言人而言物者言物則所該者博也聖人以是為未足也築為宫室設為宗祧以别親疏達邇敎民反古復始不忘其所由生也衆之服自此故聽且速也鄭氏曰自由也言人由此服於聖人之敎也聽謂順敎令也速疾也孔氏曰此經明聖人為鬼神立宗廟之事聖人以尊名鬼神為未足稱其意故為宫室宗祧以别親疏逺邇敎民反古復始也古謂先祖追而祭之是反古也始謂初始父母始生於己今追祭祀是復始也追逺報祭是不忘其所由生也長樂劉氏曰所以别其親疏者立祖禰之名也所以辨其逺邇者定宗祧之數也敎民尊祖以時祭之故曰反古也敎民親禰以禮敬之故曰復始也不忘其所由生者其謂此乎衆之服行聖人之德敎而祀其先也速於置郵而傳命者各親其親出於天性也嚴陵方氏曰上言明命鬼神則為之名而已然未致其實焉為之略而已然未極其詳焉故聖人以是為未足也築為宫室則致其實矣設為宗祧則極其詳矣言宗以知存祖言祧以知有暱宫室則土木之所成故曰築宗祧則名號之所施故曰設親疏以情言逺邇以時言觀祭法立廟之數則宗祧以別親疏逺邇蓋可見矣古者今之對今生於古始者終之對終生於始是不忘其所由生也聽言其不拒速言敎之所以神也所謂宫室者蓋廟之宫室爾非人之宫室也與宫室旣修之宫室同郊特牲曰作龜于禰宫是廟亦謂之宫也又曰存室神也是廟亦有室矣毘陵慕容氏曰親而邇者為宗疏而逺者為祧此宗祧所以別親疏逺邇也廟有寢祧無寢廟則修除祧則黝堊此宫室所以別親疏逺邇也祧則以敎反本之道也祖則以敎反始之道也禰則以敎不忘其所由生也民德齊厚而不忘其本其服也出其中心之誠非有強之而為也則其從上也捷於令矣其流行也非在於家至户曉也得其心之所本則速於置郵矣慶源輔氏曰此堯舜以下至三代時事也反古復始即上所謂致反始也不忘其所由生即所謂以厚本也先王制禮以敎人疑若強民也反而求之則知無非所以順民爾如制鬼神之祀立宗祧之制是也衆之服自此謂人之服其敎由是故也知其順我而服之宜其聽且速也哉二端旣立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此敎衆反始也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也敎民相愛上下用情禮之至也鄭氏曰二端旣立謂氣也魄也更有尊名云鬼神也二禮謂朝事與薦黍稷也朝事謂薦血腥時也薦黍稷所謂饋食也見及見間皆當為覸字之誤也羶當為馨聲之誤也燔燎馨香覸以蕭光取牲祭脂也光猶氣也有虞氏祭首夏后氏祭心殷祭肝周祭肺覸以俠甒謂雜之兩甒醴酒也相愛用情謂此以人道祭之也報氣以氣報魄以實各首其類孔氏曰此一節論氣魄旣殊明設祭之時二禮亦異旣立謂尊名立也報此氣魄以二種祭禮報氣謂朝踐之節也報魄謂饋孰之節也建設朝事燔燎羶薌見以蕭光此明朝踐報氣之義也朝事謂早朝祭事燔燎謂取膟膋燎於爐炭覸謂雜也燔膟膋兼爇蕭蒿是雜以蕭氣此三者是報氣也此祭氣是古者尚質之義所以敎衆反於初始總包上反古復始也薦黍稷羞肺肝首心見覸以夾甒加以鬱鬯謂饋孰時薦此黍稷進肝與肺及首與心雜以兩甒醴酒加以鬱鬯言更加以鬱鬯然後薦黍稷也饋孰報魄之時始云加鬱鬯者言非但薦孰是報魄祭初所加鬱鬯亦是報魄也以魄在地下鬱鬯灌地雖是祭初亦報魄不當薦孰之時故云加也以報魄也言薦黍以下皆是報祭形魄也此饋孰時皆以飲食徧於燕飲是敎民相愛上以恩賜逮下下愛上恩賜故上下用情至謂至極謂報氣報魄二禮備足是禮之至極也鄭注取牲祭脂者案詩生民云取蕭祭脂是取蕭與祭牲之時雜燒之一祭之中再度焫蕭郊特牲云取膟膋升首報陽也注云膟膋膓間脂也與蕭合燒之是朝踐焫蕭也郊特牲又云旣奠然後焫蕭合羶薌是饋孰焫蕭也云有虞氏祭首至祭肺皆明堂位文云兩甒醴酒者以士喪禮旣夕等皆以甒盛醴故也此用甒蓋是天子追享朝踐用大尊此甒即大尊或云子男之禮禮器云君尊瓦甒謂子男也云報氣以氣執魄以實各首其類者燔燎馨香蕭光之屬是氣也黍稷肺肝之屬是實物也首本也報氣以氣是虚還以馨香虚氣報之報魄以實還以黍稷實物報之各本其事類也長樂陳氏解見郊特牲嚴陵方氏曰二端旣立謂立鬼神之名與宗祧之制也報以二禮謂報氣報魄之禮也建言立其禮設言陳其物羶天産之臭也薌地産之臭也染蕭以膟膋故有羶合蕭以黍稷故有薌燔燎羶薌則蕭與膟膋黍稷并合而見矣故曰見以蕭光凡此皆以臭為主臭為陽故曰以報氣也氣以陽生而有所始故曰敎衆反始也甒蓋瓦器有兩甒故曰俠即司尊彞所謂間祀用兩大尊是矣言瓦甒之大尊則鬱鬯之為虎彞可知不及時祭則舉大以該小爾以諸物見于夾甒之間故曰覸以俠甒又副之以鬱鬯之彞故曰加以鬱鬯加與加籩加豆之加同義宗廟之祭灌而後獻此於鬯言加者以尊尊而彞卑故也凡此皆以味為主而味為隂故曰以報魄也隂聚而有所愛故曰敎民相愛報氣所以求陽乎上是用情於上也報魄所以求隂乎下是用情於下也上下用情則二禮之報無以復加故曰禮之至也於報氣言朝事則知報魄為饋食矣蓋朝事以象朝事其親所進也饋食以象食時所進也於報魄言黍稷之類則報氣有血腥之類可知然瓦甒之所獻鬱鬯之所灌皆非饋食之事此則併言之時雖不同其為報魄則一也上言反始則知下之為成終下言相愛則知上之為致敬凡此皆互言之爾毘陵慕容氏曰前言氣魄為鬼神之盛所謂二端凡天地之間莫不麗乎隂陽究其端不離乎二所謂以隂陽為端也由二類而求之不能外是聖人推本其所自始魂氣之為陽形魄之為隂明命之為鬼神所謂求其端也故曰二端旣立於是禮稱事而立縁情而行本乎二者而為之故曰報以二禮特牲曰祭求諸隂陽之義禮運曰以嘉魂魄是謂合莫蓋燔以求諸陽灌以求諸隂所謂二禮也二者朝事之所行而鄭以薦黍稷為饋食之時失之矣夫求神必於祭之始而祭之始必合鬼神以嘉魂魄所謂其隂達於淵泉是也周人先求諸隂旣灌然後迎牲至饋食而後報魄求諸隂不已後乎況灌用鬱鬯貴氣用肝肺首心與黍稷同為朝事之時所用非必有於薦孰之時也其所謂建設朝事以取膟膋而燔燎焉則膟膋為羶黍稷為薌故謂之羶薌也鄭以羶為馨誤矣覸以蕭光覸以俠甒則求諸隂陽欲其氣之無不達故又雜之以二者焉蕭之氣芳烈而逺聞以魂氣無所不之也兩甒謂用酒醴以報魄取其近人者焉欲其同於生也延平周氏曰魂氣在上體魄則降言報氣則知報魄為體言報魄則知報氣為魂燔燎羶薌雜以蕭光者氣而已故以氣報魂有氣然後有魄故報氣所以敎衆反始也薦粢盛羞牲體雜以俠甒之醴酒而加以鬱鬯者皆有成體故以體報魄有魄則有形有形則情生矣故報魄所以敎民相愛上下用情馬氏曰家語云建設朝事燔燎羶薌所以報氣也薦黍稷修肝肺加以鬱鬯所以報魄也當以家語為正子路問事鬼神子語之以事人問死則語之以知生宰我問鬼神之所謂則告之而終之以反古復始上下用情而已其告之則一也其語不同則以子路勇於所聞而宰我有所畫耳山隂陸氏曰此一節蓋言殷禮殷人尊神先鬼而後禮方言明命鬼神故主殷禮言之殷人先求諸陽故此朝事焫蕭以報氣也饋食灌鬯以報魄也然則殷人祭首無祼事以樂侑獻而已殷人尚聲蓋當此節故曰殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也羞肝肺首心郊特牲言肺在上此言肝在上以方言殷禮故也明堂位曰殷祭肝周祭肺見間蓋謂陳設中間若喪禮所謂見以不見為見也據禮藏器於旁加見又曰甕甒筲行實見間而後折入周人先求諸隂於朝踐祭齊加明水以報隂殷人先求諸陽於饋獻祭酒加鬱鬯以報魄其義一也據此周人有求有報殷人直報而已其報之也亦所以求之也故曰周人先求諸隂殷人先求諸陽凡祭朝踐尊而饋食親尊故曰敎衆反始親故曰敎民相愛講義曰親旣亡矣尚追魂魄而祭之如此則於生存者當如何此禮旣行而民親愛之心油然而生上下之間率用情實而無澆偽之風職此之由也玆非禮之至也乎君子反古復始不忘其所由生也是以致其敬𤼵其情竭力從事以報其親不敢弗盡也鄭氏曰從事謂脩薦可以祭者也孔氏曰此申明反古復始竭力報親之事致其恭敬𤼵其情性竭盡氣力以從其事上報於親不敢不極盡也嚴陵方氏曰敬欲有所至故曰致情欲其無所愛故曰𤼵力之用欲無遺故曰竭事之來欲無拒故曰從致敬𤼵情於内故能竭力從事於外凡此則所以報其親不敢弗盡故也如上所言報氣報魄皆報親之事也盡謂内盡志外盡物也慶源輔氏曰自致其敬以下所謂致反始之道也𤼵其情謂𤼵露其情如所謂用其情也家語夫子之荅止此却繼以前文王之祭至必哀是故昔者天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛於是乎取之敬之至也鄭氏曰藉藉田也先古先祖孔氏曰以君子報親不敢不盡心以事之故古者天子諸侯有藉田以親耕祭祀諸神須醴酪粢盛之屬於是乎藉田而取之敬之至也嚴陵方氏曰藉即藉田也月令所謂躬耕帝藉是矣天子之田方千里故為藉千畝諸侯之田方百里故為藉百畝亦各以其稱而已見王制解耕必服冕則所以敬其事也躬耒則所以躬耕也天地則指天子言之山川社稷先古則兼諸侯言之先古謂若先公及先聖先師之類以後之所事故曰先以今之所承故曰古醴足以為禮酪足以為酸以天子諸侯之尊而躬為之故曰敬之至毘陵慕容氏曰愼終追逺君子之所以致其厚身致其誠信不敢弗盡所以致其厚之道也有天下有一國可以取安佚可以役民力而必躬秉耒者以為祭不自致非所以事神明以此率民而民孝敬矣王畿千里而藉亦千畝封疆百里而為藉亦百畝首服莫尊於冕而冕以躬耕貴而自致莫勤於用力而躬秉耒凡此皆自盡之道也山隂陸氏曰所謂先古豈特先祖而已且先祖不應謂之先古蓋若先嗇先禖炎帝祝融之類長樂陳氏曰天子為藉千畝於南郊正陽之位也冕而朱紘則朱者正陽之色也諸侯為藉百畝於東郊少陽之位也冕而青紘則青者少陽之色也其時則中春春秋傳曰啓蟄而郊郊而後耕是也其日則剛日月令曰乃擇元辰是也其祭則祈社稷于内享先農于外詩曰春藉田而祈社稷國語曰膳夫農正陳藉禮是也其禮則后帥六宫贊事于内司空后稷大師瞽師鬱人犧人膳夫農正司徒大師贊事于外周禮内宰詔后帥六宫之人生穜稑之種獻之于王國語曰大史告稷司空除壇之類是也親載耒耜猶農者之出疆也載必措于保介之御間又明勸農者也反執爵于大寢公卿諸侯大夫皆御命曰勞酒此春耕之終事也若夫夏耨秋穫王又至焉國語所謂耨穫亦於藉是也考之於禮蜡合萬物而索饗之則羣小祀也其禮主先嗇先嗇先農也王以𤣥冕祭之則耕藉之祭先農其服𤣥冕可知也小司徒凡小祭祀奉牛牲羞其肆鄭氏謂小祭祀王𤣥冕所祭者則祭先農用牛牲可知也王之藉掌以甸師而諸侯亦有甸人則諸侯之禮與王略同矣古者天子諸侯必有養獸之官及歳時齊戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮弁素積朔月月半君巡牲所以致力孝之至也鄭氏曰歳時齊戒沐浴而躬朝之謂將祭祀卜牲君朔月月半巡視之君召牛納而視之更本擇牲意孔氏曰此明孝子報親竭力養牲之事歳時謂每歳依時謂朔月月半也躬親也旣卜牲吉在牢養之而身朝之言朝者敬辭也犧純色謂天子牲也牷完色謂諸侯牲犧牷所祭之牲必是養獸之官受擇取之養獸之官周禮牧人也初擇牲時君於牧處命取牛納之於内而視之君皮弁素積朔月月半君巡牲者即前言歳時朝之也巡行也皮弁諸侯視朔之服朔月月半君服此衣而巡牲所以致其力也耕藉云敬之至養牲云孝之至互文也嚴陵方氏曰自養獸之官而下所云即牧人阜蕃其物之時也自君召牛而下所云即充人繋于牢之時也繋于牢則芻之三月而已故朔望巡之阜蕃其物則不止三月也故歳時朝之以其完而無傷故謂之犧以其純而不雜故謂之牷犧言其體也牷言其物也犧牲所以為祭之牲故曰犧牷祭牲也君召牛納而視之所謂展牲是也擇其毛所謂陽祀用騂牲毛之隂祀用黝牲毛之是也卜之吉然後養之所謂帝牛不吉以為稷牛是也未卜止謂之牛旣卜乃謂之牲召之則未卜故曰牛巡之則卜之矣故曰牲未卜謂之牛而上言祭牲者蓋取之將以為祭牲故也齊戒沐浴者臣見君之禮也臣以見君之禮而朝之所以致其敬也皮弁素積者君視朝之服也君以視朝之服而巡之所以極其辨也先王父天母地則以子道自處焉推而及於山川社稷亦由是也故凡所以事鬼神之道皆稱孝焉論語曰菲飲食而致孝乎鬼神歳時者謂比歳比時也皮弁素積見郊特牲解山隂陸氏曰始養言獸召而視之言牛巡言牲亦言之法君齊戒沐浴躬受養獸之官之朝鄭氏謂朝視牲誤矣古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之及大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之歳旣單矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副禕而受之因少牢以禮之古之獻繭者其率用此與及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緑之𤣥黃之以為黼黻文章服旣成君服以祀先王先公敬之至也鄭氏曰大昕季春朔日之朝也諸侯夫人三宫半王后也風戾之者及早涼脆采之風戾之使靈氣燥乃以食蠶蠶性惡濕也歳單謂三月月盡之後也言歳者蠶歳之大功事畢於此也副禕王后之服而云夫人容二王之後歟禮之禮奉繭之世婦也其率用此與問者之辭也三盆手者三淹也凡繅每淹大緫而手振之以出緒也孔氏曰此一節廣明孝子報親養蠶為祭服祀先王先公之事公桑為官家之桑於處而築養蠶之室近川取其浴蠶種便也築宫謂築養蠶之宫牆七尺曰仞牆之七尺又有三尺高一丈也棘牆謂牆上置棘外閉謂扇在户外閉也世婦亦諸侯世婦前雖緫舉天子諸侯此特舉諸侯互言之奉種浴于川言蠶將生而又浴之初於仲春已浴至此更浴之也夫人曰此所以為君服與者所舉奉處重旣擬君之祭服故夫人首著副身著褘衣受此所獻之繭因少牢以禮之接獻繭之世婦也率法也夫人曰獻繭之法自古如此耶重事之義故問之也良日謂吉日冝繅之日明繅更擇日日至而後夫人自繅每淹以手振出其緒故曰三盆手夫人親繅三盆以手振出其緒訖遂布與三宫夫人世婦之吉者旣據諸侯則夫人唯一人而云世婦之吉者雜互天子言之以天子有三夫人就其中取吉者若諸侯唯世婦之吉者蠶繅非一人擇其吉者主領而已前文耕藉男子之事故云以事天地山川社稷兼云先祖養蠶是婦人之事婦人不與外祭故云以事先王先公其實養蠶為衣亦事天地山川社稷長樂陳氏曰天子諸侯之禮文而有辨故耕於南郊東郊王后夫人之禮質而少變故皆蠶於北郊公桑蠶室近川為之以其便於浴蠶也築宫仞有三尺棘牆而外閉之所以謹於蠶者也其始也天子薦鞠衣于先帝以告將蠶内宰詔后帥内外命婦以趨蠶事而后之首飾以編服以鞠衣屨以黄屨車以翟車貝面組緫有握及郊享先蠶然後東郷而躬桑焉躬桑后夫人之事耳天子必薦鞠衣君必皮弁素積卜三宫夫人世婦使入蠶室者内外相成之義也故建國則王立廟后立市祭祀則王祼獻后亞之賔客則王致酒后致飲以至王耕藉后獻種王射牲后舂盛則后夫人之躬桑王與諸侯不可不與之也躬桑不過鞠衣而受繭必以副褘者重繭之成也繅必三盆手者禮成於三也三盆手猶王藉之三推也然後布于三夫人世婦之吉者使繅遂朱緑之𤣥黄之以為祭服猶庶人之終畝也禮書延平周氏曰蠶與繅婦功也以婦功而責於夫人世婦則無不可者而必用卜以擇其夫人世婦之吉者蓋先王以為躬桑所以為祭服而又將以勸於天下則不可不決於神明者也示于君告其功之成也獻繭不於君而於夫人者別内事也夫人受之以副褘所以敬其將為祭服也禮之以少牢所以勞其還也火在木則為朱木勝土則為緑嚴陵方氏曰公桑猶公田也以其別於私故謂之公築宫謂築宫牆也前曰蠶室此曰築宫者蠶居於内故曰室牆圍於外故曰宫也仞者度土高深之所用考工記曰人長八尺登下以為節故八尺為仞也牆高於人長之外又有三尺所以防窺伺也又置棘所以防踰越也閽人自外閉其門以親蠶者皆婦人故也日欲出為昕於時為卯大昕則向辰矣此之所言蓋卯辰之月也故不言日月豳風謂之蠶月者以此言朝則以夙致其敬故也君皮弁素積則與巡牲同蠶雖隂事亦天産也卜其人之吉亦欲其事之吉故也若冠之筮賔已天子六宫而曰三宫據三夫人言之也後言夫人繅三盆手正言諸侯之夫人而已言布于三宫夫人則以見王后之繅亦若是其事互明可知也以至副褘為王后之服止言之於夫人先王乃天子之祀止言之於君者皆此之意蠶于蠶室則躬蠶事於其室也躬蠶事而謂之蠶則躬桑事亦謂之桑而已故下言桑于公桑也奉種浴于川者以流水滌其宿塵欲其出之速故也風戾以食之者以蠶火畜而性惡濕故待風戾而後食之也蓋桑經宿不能無雨露之潤風至則乾矣戾至也自去歳蠶成之後迄今歳蠶成期一歳矣故謂之歳單若孟夏稱麥秋亦此意蠶歳旣單故繼言世婦卒蠶也繭則示于君而獻于夫人者示則告其成而已獻則欲其受之以繅也禮之以少牢則所以勞其還也馬氏曰公羊傳亦曰國非無良農工女也以為人之所盡於祖禰者不若以所自親者也周官内宰職曰中春詔后帥内外命婦始蠶於北郊以為祭服蓋蠶於季春則詔於中春也冝矣王躬耕於南郊后躬蠶於北郊南北隂陽之盛也王將耕則后獻穜稑之種后夫人將蠶則君為之卜夫人世婦之吉者所以交相成也陽始隂者也故君為之卜夫人之吉者隂則佐陽而已故為之獻穜稑之種也朱緑色之雜𤣥黄者色之正黼黻文章者正之間也以為黼黻文章則又加之以繢繡之事至此則祭服成矣故曰服旣成君服以祀先王先公敬之至也山隂陸氏曰棘牆而外閉之著不專為防也故曰外户而不閉禦風氣而已若棘亦以為暖今養華用棘鄭氏謂大昕季春朔日之朝然則餘日為昕朔日然後謂之大昕言大以有小文王世子大昕鼓徴視學蓋亦朔日不然朝愈益早矣前言古者天子諸侯必有養獸之官古者天子諸侯必有公桑蠶室後皆言君而已勞事也言諸侯以著天子亦言之法其言夫人不言后亦以此以二王之後故曰卜三宫之夫人蓋二王後亦得立三夫人特其嫡夫人不得稱后耳春秋書伯姬歸于宋後書衞人齊人晉人來媵豈此所謂三夫人歟公羊傳曰三國來媵非禮也是以諸侯之禮言之誤矣單言始衣單矣月令天子孟夏始絺然後蠶事畢后妃獻繭詩曰八月載績蓋絲事成於衣單麻事成於衣重之時豈直人事哉亦天地自然之理也言世婦卒蠶不言三宫夫人始之者夫人卒之者世婦少牢以禮之言因豈即朔月月半所食少牢禮之歟據此奉繭以示于君而已其獻王在夫人言三盆手而已則三宫夫人蓋亦略矣然則蠶事之正在世婦故曰世婦卒蠶毘陵慕容氏曰夫躬耕親蠶一則以敎民致力於農桑而豐衣食之原一則以為齊盛祭服而盡事神之敬故先王以所事者敎民故民之聽命也速以所率民者奉神故神饗之也易夫民神之主也成民然後可以致力於神民和而神降之福耕以足食蠶以足衣生民之道於是乎在所以成民而致其和莫先於斯二者故齊盛以告冕服以祀而成民之道盡焉故可以陳信於鬼神若夫民則弃本飢寒是憂和氣不應災害日至則是矯舉以祭雖潔齊豐盛致美乎冕服神亦弗饗矣慶源輔氏曰蠶婦事也猶不敢專必待君之卜吉而後親之則他可知矣故曰地道代終而已此所以為君服與其率用此與皆記者述夫人之意而為言也君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而慢易之心入之矣故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而不與爭也望其容貌而衆不生慢易焉故德煇動于内而民莫不承聽理𤼵乎外而衆莫不承順故曰致禮樂之道而天下塞焉舉而錯之無難矣樂也者動於内者也禮也者動於外者也故禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也鄭氏曰斯須猶須㬰也子讀如不子之子諒信也油然物始生好美貌躬身也極和極順極至也理發乎外理謂言行也塞充滿也減猶倦也盈猶溢也樂以統情禮以理行人之情有溢而行有倦倦則進之以能進者為文溢則使反以能反者為文文謂才美報皆當為襃聲之誤也孔氏曰此一節已具於樂記但記者別人故於此又記之其義已具在樂記故於此不繁文也山隂陸氏曰謂之君子曰君子見微者也切觀世之人慢易起於放肆而鄙詐常生於矯激然後知君子之言不誣也若申屠狄輩不知致樂以治心者也若阮籍輩不知致禮以治躬者也不曰塞乎天下而曰天下塞焉小在天下也曽子曰孝有三大孝尊親其次弗辱其下能養孔氏曰自此至可謂孝矣廣明為孝子之事大孝尊親即是下文大孝不匱聖人為天子者也尊親嚴父配天也其次弗辱謂賢人為諸侯及卿大夫士各保社稷宗廟不使傾危以辱親也與下文中孝用勞一也其下能養謂庶人也與下文小孝用勞一也能養謂用天分地以養父母也黄氏曰曽子言孝道三自天子達庶人三者之行咸在其中謂人子能立身行道有大功於國大德及民俾人稱美其先而尊重之為上也生事之以禮死葬之以禮祭之以禮全父母遺體殁身無毁者次之生事父母盡其色養者為下也言尊親為大則弗辱能養兼之矣次言不能尊貴其親而唯弗辱能養為二也其下者謂不能尊親不辱唯能供養是孝之末節矣但論孝行升降輕重不分別名位尊卑石林葉氏曰德為聖人尊為天子宗廟饗之子孫保之此尊親也修身愼行不服闇不登危此弗辱也稱其無而啜菽飲水不為薄此能養也講義曰尊親者非必顯之以名位之崇也使吾身無愧於仁義使吾親亦無愧於仁義則吾親尊矣弗辱者非必置其身於罪惡也雖一訾笑之茍亦為辱矣能養者非以其養口體也必養志焉斯可矣慶源輔氏曰始於能養終於修身達而至於大德必得其位若武王周公之孝始可謂之大矣公明儀問於曽子曰夫子可以為孝乎曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者也安能為孝乎鄭氏曰公明儀曽子弟子孔氏曰先意謂父母將欲發意孝子則預先逆知其意而為之也承志謂父母已有其志已當奉承而行之諭父母於道謂或在父母意先或在父母意後皆曉諭父母歸於正道也延平周氏曰於志言承先意承志諭父母於道則使其身不失天下之顯名而為父母者亦不失天下之顯名若舜之諭父母為不格姦則君子之所謂孝者也嚴陵方氏曰將有所感有逆知之者先意也已有所之而奉行之者承志也有所感則隠而未見故於先言之有所之則見而不隠故於承言之亦各以其類也然徒先意承志而不能諭之於道則是茍順其令而或陷親於不義者蓋有之矣此所以又在乎諭父母於道也夫養將以為孝而所以為孝子不止於養親曽參之事其親養其志而不止於口體固得其所以為孝者矣豈直能養而已哉乃自謂如此者不敢以孝自居故也唯夫不自居其孝兹其所以為孝歟馬氏曰先意所以閑其邪承志所以成其美此所以諭父母於道建安眞氏曰父母之意未形而能逆之於其先父母之志已形而能承之於其後非深於孝愛以父母之心為心者不能諭者開説曉譬之謂為人子者平時能以理開曉其親置之無過之地猶臣之事君格其非心而引之當道也其視有過而後諫者功相百矣故君子猶難之曽子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陣無勇非孝也五者不遂烖及於親敢不敬乎亨孰羶薌嘗而薦之非孝也養也君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也已衆之本敎曰孝其行曰養養可能也敬為難敬可能也安為難安可能也卒為難父母旣没愼行其身不遺父母惡名可謂能終矣仁者仁此者也禮者履此者也義者冝此者也信者信此者也強者強此者也樂自順此生刑自反此作鄭氏曰五者不遂遂猶成也願然然猶而也孔氏曰亨孰羶薌之美先自口嘗而後薦之父母此非孝也唯是供養而已孝子百行皆美一國之人稱揚羨願然曰如此是羨願之云此子父母有幸遇哉而有孝子如此令人羨願如此乃所謂孝也衆之本敎曰孝者言孝為衆行之根本以此根本而敎於下名之曰孝不能備孝之德唯行奉上之禮但謂之養者也父母旣没以下解卒為難之事順從孝道則和樂自至違反孝道則刑戮及身嚴陵方氏曰孝經曰身體髮膚受之父母不敢毁傷孝之始也哀公問曰身者親之枝也敢不敬與正謂是矣身者體之全體者身之別夫一人之身生於父母而別於父母者也故曰身者父母之遺體居處也事君也涖官也朋友也戰陣也皆所以行父母之遺體也茍唯不莊不忠不敬不信無勇則烖及其身烖及其身是及其親也豈孝也哉故每以非孝言之如是則行身之道敢不敬乎先居處而後事君者内外之序也先事君而後涖官者尊卑之序也先涖官而後朋友者公私之序也先朋友而後戰陣者文武之序也亨言天産故其臭為羶孰言地産故其臭為薌嘗㫖否而後薦之是孝之一端而已稱者口稱其所為願者志願其如此然則予之之詞也幸哉有子如此言其有子如此乃父母之幸也孝者盡子道而已人言如此故曰所謂孝也巳已則言其盡於此也敎亦多術矣特為之本者孝也故曰衆之本敎曰孝孝經云夫孝德之本也敎之所由生也正謂是矣論語曰至於犬馬皆能有養不敬何以別乎故曰敬為難楊子曰孝莫大於寜親故曰安為難孝經曰立身行道揚名於後世以顯父母孝之終也故曰卒為難哀公問曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是成其親之名也已故曰父母旣没愼行其身不遺父母惡名可謂能終矣所謂能終者非終父母之身終其身也夫孝旣為德之本故仁非仁於孝不足以為仁之德也禮非履於孝不足以為禮之德也以至義也信也強也亦若是而已哀公問曰不敬其身是傷其親然則居處之莊所以愛其親慮或傷之而已是以仁者仁此而居處所以莊也禮者履此而涖官所以敬也義者冝此而事君所以忠也信者信此而於朋友所以信也強者強此而於戰陣所以勇也五者不遂烖及於親況其身乎且烖者福之對福之所至樂必隨之烖之所至刑必隨之故曰樂自順此生刑自反此作山隂陸氏曰我身非我有其行之者我也曽子所見無非孝故仁者見之謂之仁知者見之謂之知賞罰利害五刑之辟敎之末也若孝者可謂本矣執一術而百善至孝之謂也其行曰養者孝之行自養親始孝經云夫孝始於事親中於事君終於立身延平周氏曰居處莊禮也事君忠涖官敬義也朋友信信也戰陣勇強也凡此五者皆遂則烖不及其身烖不及身則是不及其親蓋吾之身即父母之身也居處莊者愼其獨者也能愼其獨故以之在上則事君忠涖官敬以之在下則友信戰陣者非君子之先務故其序如此能養不如能敬能敬不如能安能安不如能終仁先之禮次之義次之繼元以亨繼亨以利之序也信者成此三者而強者行此三者石林葉氏曰孟子曰不得乎親不可以為人不順乎親不可以為子蓋誠身則能有得乎親是在我者也故為人道唯有義誠身未能順親是非在我者也故為子道唯有命以舜為聖人猶以瞽瞍厎豫為難則國人稱願然曰幸哉有子君子亦不謂性也莊愼忠信災不及其親所謂能敬也不能安之則無以安其親先意承志諭父母於道所謂能安也不能卒之則無以盡大事愼終追逺所謂能卒之也一人之身物所為備其先得者愛親此孝所以為本也故仁以仁之則曰仁此者也禮以體之則曰履此者也義有理則曰冝此者也信不欺則曰信此者也強者不息則曰強此者也五者備矣強而不變已忘其倦則樂矣樂所以順而生者也小人反是則入於刑刑所以反而作也孝經言移風易俗莫善於樂而對於敎民親愛莫善於孝且言五刑之屬三千亦曰罪莫大於不孝皆與此意合也慶源輔氏曰篤於孝者誠而已誠一不至則違乎孝矣非其時也草木不可妄伐當其位也戰陣不可無勇養不足以盡孝孝則該夫養矣成其身所以成其親者也唯誠實於孝進進不已然後知其等級如是之難安與安仁之安同言由孝而行從容中道也如舜之事親可矣至於卒則又誠不息也馬氏曰此立身揚名所以為孝之終而蠱之六五所以言幹父之蠱用譽也雖然名立於後世者亦曰行成於内而已愛親者能養者也敬親者能敬者也生則親安之能安者也死則鬼饗之能卒者也念祖而聿修厥德能終者也愛者有未能敬敬者有未能安安者有未能卒卒者有未能終然愛者孝之本而親安之者孝之至愼修其身孝之終始也孔子語子游以敬語子夏以色難蓋順其色則親安之矣告子游以粗告子夏以精也然則孝止於親安之乎曰舜盡事親之道而瞽瞍厎豫瞽瞍厎豫而天下化庸非此乎蓋以行言之則愛者未必敬而至於能終孝之至也若以道言之則以敬孝易以愛孝難而至於親忘我則孝之至也建安真氏曰身體髮膚受之父母不敢毁傷然忠臣義士奮不顧身視死如歸何也此與其它毁傷不同蓋殺身所以成仁旣成仁則孝在其中矣殺身成仁則形雖虧其理不虧身雖隕其性不失乃所以為孝也故曰戰陣無勇非孝也新安朱氏曰亨孰羶薌亨即亨煮之字俗加火作烹非是建安劉氏曰孝為百行之宗行純則性通行虧則性賊二者常相因焉同本故也孝以敬為本而敬者修性之門也自天子達於庶人孝之事雖不同同本於敬事親而不敬何以為孝乎敬心之發孝於其親矣推於兄弟恭而友者是其應也推於夫婦和而順者是其應也推於親黨朋友㳟而睦同而信者是其應也推於事君治人忠而恕亷而勤者是其應也是數者不一應焉非孝也故孝子之心唯一敬而已敬心旣純大本發露虚明洞達躍如於兢兢肅肅中此所以行成於外性修於内也曽子聞道最為超警死生之際粲然明白蓋由始則因孝心而致敬終則因敬心而成已驗其平日服膺念兹在兹而已啓手足則見於戰戰兢兢之時發善言則見乎容貌辭氣之際皆敬之謂也學者非不知此皆有愧於曽子由行之弗至也恭於昭昭者孝之名也謹於昬昬者孝之實也求其名於匹夫匹婦能焉於其實聖人以為難矣故此經以敬為難敬可能也能安能卒為難蓋斯須之敬人能勉強至於能安能卒非確然自信毅然必為未有能樂其常而至其至也禮記集説卷一百十二
