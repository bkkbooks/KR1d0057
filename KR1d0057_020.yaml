body:
  text: 禮記集說卷二十宋衛湜撰檀弓下第四君之適長殤車三乘公之庶長殤車一乘大夫之適長殤車一乘鄭氏曰皆下成人也自上而下降殺以兩成人遣車五乘長殤三乘下殤一乘尊卑以此差之庶子言公卑逺之孔氏曰此一節論諸侯及卿大夫之子送葬遣車之數君謂五等諸侯也諸侯之適子在長殤而死則遣車三乘遣車之形甚小葬柩朝廟畢將行設遣奠竟取所奠牲體臂臑折之為假用此車載之以遣送死者使人以次舉之如墓置於椁中之四隅雜記云遣車視牢具置于四隅又曰大饗既饗卷三牲之俎歸于賔館父母而賔客之所以為哀也但遣車之數貴賤不同若生有爵命車馬之賜則死有遣車送之諸侯七乘大夫五乘此後有明文鄭注謂降殺宜兩則天子九乘士三乘也今此所明並是殤未成人未有爵命車馬之賜而得遣車者言其父有之得與子也天子九乘若適子成人則應七乘在長殤而死則五乘中殤從上亦五乘下殤三乘也若庶子成人則應五乘長殤中殤三乘下殤一乘也諸侯七乘則適子成人五乘長殤三乘中殤從上下殤則一乘也公亦諸侯也適長殤既三乘庶子成人乃三乘長殤則一乘中殤亦從上若下殤則無也大夫五乘適子成人三乘長殤降兩故一乘中殤從上亦一乘若下殤及庶殤皆無也案下注云人臣賜車馬乃有遣車今大夫適子長殤得有遣車一乘以其身為大夫德位既重雖未三命得有遣車之賜鄭注雜記云則士無遣車禮天子上士三命得有車馬之賜而云士無遣車者謂諸侯之士及天子中士下士也但喪禮質略天子之臣與諸侯之臣命數雖殊喪禮不異故鄭云大夫以上乃有遣車文主天子大夫其實兼諸侯大夫也鄭以士無遣車者文主諸侯之士其實亦兼天子中士下士也鄭注庶子言公卑逺之者蓋君是對臣之名有地大夫以上皆有君號公則五等之上今庶子言公就其尊號是卑逺於庶子也公之喪諸達官之長杖鄭氏曰達官謂君所命雖有官職不逹於君則不服斬孔氏曰此一節論臣為君杖法公者五等諸侯也達官謂國之卿大夫士被君命者也此對不逹者故云長若遭君喪則備服衰杖不云衰從可知也不達於君謂府史之屬但服齊衰三月爾若近臣閽寺之屬雖無爵命但嗣君服斬則亦服斬與此異也故喪服斬衰章云公士大夫之衆臣為其君布帶繩屨傳曰近臣君服斯服矣嚴陵方氏曰受命於君者其名逹於上故謂之逹官若府史而下雖為在官皆其官長所自辟除則不可謂之達矣孟子曰不能五十里不達於天子與此所言達同義夫杖所以輔病恩之深者其病宜重受命於君者其恩為深故公之喪唯達官之長杖山隂陸氏曰此言喪達官之長杖視長子歟達官卿也長蓋太宰言之緩詞言諸亦緩詞著公於達官之長雖杖少遼絶也服問曰公為卿大夫錫衰然則何以杖錫衰而杖恩也若蠟雖葛帶猶杖新安朱氏曰達官謂得自通於君者如內則公卿宰執與六曹之長九寺五監之長外則監司郡守得自通章奏於君者凡此皆杖次則不杖如大常卿杖大常少卿則不杖若大常卿闕則少卿代之杖君於大夫將葬弔於宫及出命引之三步則止如是者三君退朝亦如之哀次亦如之鄭氏曰以義奪孝子也宫殯宫也出謂柩已在路三命引之凡移九步朝喪朝廟也次他日賔客所受大門外舍也孝子至此而哀君或於是弔不必於宫也孔氏曰此一節論君弔臣之禮君於大夫之喪將至葬時必親往弔孝子於殯宫及其柩出殯宫之門孝子號慕攀轅君奪孝子之情命遣引之引者三步則止不忍頓奪孝子之情也君又命引之引者三步又止君又命引之引者又三步而止君又命引之柩車遂行君乃退去君或來弔參差早晚不必皆在殯宫或當朝廟明日當發之時或柩已出大門至平生待賔次舍之處孝子哀泣停柩不行君於是始弔弔畢君命引之使行亦如上來之事五十無車者不越疆而弔人鄭氏曰五十氣力始衰孔氏曰此一節論衰老不許徒行逺弔之事越疆則道路遙逺弔人又悲感哀戚恐增衰惡也嚴陵方氏曰五十始衰而老者不以筋力為禮故無車不越疆弔人也季武子寢疾蟜固不說齊衰而入見曰斯道也將亡矣士唯公門說齊衰武子曰不亦善乎君子表微及其喪也曽㸃倚其門而歌鄭氏曰季武子魯大夫季孫夙也世為上卿強且專政國人事之如君蟜固能守禮不畏之矯失俗也道猶禮也武子無如之何佯若善之表猶明也㸃字晳曽參父倚門而歌明已不與也孔氏曰此一節論季武子強僣蟜固正之事時人畏武子入其門皆說衰蟜固不說齊衰入見且謂之曰著衰入大夫之門其道將亡絶矣將亡者未絶之詞蓋其時嚮餘大夫之門猶有著齊衰者武子既寢疾乃佯言若美之謂失禮顯著凡人皆知今說衰失禮之微唯汝君子之人乃能表明之也曽㸃倚武子之門而歌明已不與武子故無哀戚也凡外貌為陽內心為隂實無內心但有外貌者謂之為陽陽或言佯字相假借鄭知心實不善而佯善之者若實善則尋常不合說衰也入公門說衰謂不杖齊衰若杖齊衰入公門亦不說具曲禮長樂陳氏曰季孫夙之疾蟜固不說齊衰而入見示之以凶而欲其死也季孫夙之死曽㸃倚其門而歌示之以吉而樂其死也子産之未死國人歌曰子産而死誰其嗣之況欲其死乎李廣之死知與不知皆為盡哀況樂其死乎子産李廣之感人猶至於此況不為子産李廣者乎季孫夙則不然疾而不為人所矜愛死而不為人所哀悼其失人心可知矣周官閽人喪服不入宫曲禮席蓋重素苞屨厭冠不入宫門服問亦曰唯公門有說齊衰則非公門不得說齊衰矣蟜固曰斯道也將亡矣武子則曰君子表微蓋道之存則著道之將亡則微於其將亡而能明之故謂之表微季孫之善蟜固豈得已歟大夫弔當事而至則辭焉鄭氏曰辭猶告也擯者以主人有事告也主人無事則為大夫出孔氏曰自此至不受弔一節論弔哭之禮此謂大夫弔士當事主人有大小斂殯之事也出謂出於庭不得出門外以男子之事自堂及門故也若未斂以前唯君命出見士喪禮若正當小斂而大夫來弔則辭之以有事斂畢當踊之時則延之入絶踊而拜之若當斂後踊時來則亦絶踊而拜之故雜記云當袒大夫至雖當踊絶踊而拜之若士來弔雖當斂不告以有事事畢踊後而引士入然後拜之也故雜記云於士既事成踊襲而後拜之是也弔於人是日不樂婦人不越疆而弔人行弔之日不飲酒食肉焉鄭氏曰君子哀樂不同日子於是日哭則不歌婦人不通於外弔日不飲酒食肉以全哀也孔氏曰婦人無外事故不越疆而弔人長樂陳氏曰婦人見兄弟可以及閾而不可以踰閾送迎可以及門而不可以出門弔人可以出門而不可以越疆許穆夫人欲歸唁於衛而不可得則越疆而弔人如之何而可弔於葬者必執引若從柩及壙皆執紼鄭氏曰示助之以力車曰引棺曰紼從柩贏者孔氏曰弔葬本為助執事故必相助引柩車也執引用人貴賤有數若其數足贏餘之人皆散行從柩至壙下棺窆時則不限人數皆悉執紼也東山何氏曰執引天子千人諸侯五百人大夫三百人士五十人也贏數外也嚴陵方氏曰引在前屬之於車以道柩也紼在旁屬之於棺以弼柩也道柩者唯在路用之而已弼柩者至下棺亦用焉故雖不執引而或從柩及壙亦皆執紼也曲禮曰助葬者必執紼蓋謂是矣喪公弔之必有拜者雖朋友州里舍人可也弔曰寡君承事主人曰臨鄭氏曰拜者往謝之也孔氏曰諸侯臣之喪公來親弔或遣人來弔喪家雖無主後必有以次疏親往拜其君以謝恩疏親亦無雖死者朋友及同州同里及喪家典舍之人往拜亦可也若有主後則主人自當親往拜謝是以既夕禮云主人乘惡車鄭注云拜君命也弔曰寡君承事此是君來語擯者使傳辭也弔為助事故雖君尊亦曰承事也曰臨者主人辭謝之語言君屈辱降臨某之喪稱寡君謙也若弔士則直稱君故士喪禮君使某弔如何不淑是也君遇柩於路必使人弔之鄭氏曰君於臣民有父母之恩孔氏曰君於其臣當特弔於家故喪大記於大夫及士皆親弔之又禮譏蕢尚受弔及把梁之妻不受野弔是也其或卑小之臣及庶人之等君不豫知其喪造次遇柩於路必使人弔也廬陵胡氏曰遇柩於路必使人弔之若齊侯哭敝無存之類大夫之喪庶子不受弔鄭氏曰不以賤者為有爵者主孔氏曰不受弔不為主人也適子主喪受弔拜賔若適子或有他故不在則雖庶子不敢受弔明已卑辟適也妻之昆弟為父後者死哭之適室子為主袒免哭踊夫入門右使人立于門外告來者狎則入哭父在哭於妻之室非為父後者哭諸異室鄭氏曰子為主親者主之也狎相習知者父在則不以私喪于尊故哭於妻之室孔氏曰自此至往哭之論哭無服者之事適室正寢也禮女子適人者為昆弟為父後者不降以其正故也故姊妹之夫為之哭於適室之中庭子為主者甥服舅緦故命已子為主受弔拜賔也冠尊不居肉袒上故凡哭哀必踊踊必先袒袒必先免故袒免哭踊也夫入門右者夫謂此子之父即哭妻兄弟者也據妻之為喪故言夫子既為主位東階之下西嚮父入門右近南而北嚮哭也父不為主若又西嚮便似二主入門石北面示辟為主之處據申祥之哭言思婦人倡踊則夫入門右亦哭踊也門內有哭則鄉里聞之必來相弔故使人立於門外告語來弔者述所哭之由明為主在子不關已也若弔者與此亡者曽經相識狎習則當入與共哭若此夫之父在則適室由父故但於妻室之前哭之非為父後哭諸異室者案奔喪禮妻之黨哭諸寢蓋寢是大名雖適室及妻室異室總皆曰寢嚴陵方氏曰哭諸異室者以其别於適也有殯聞逺兄弟之喪哭于側室無側室哭于門內之右同國則往哭之鄭氏曰哭於側室嫌哭殯也哭于門內之石近南者為之變位孔氏曰哭於門內之右謂庶人無側室者故內則云庶人無側室者言近南為之變位以其尋常為主當在阼階東西向今稱門內之右故知近南為之變位也逺兄弟謂異國也若同國則往哭之嚴陵方氏曰哭于側室者欲其逺殯宫也哭于門內之右者不居主位示為之變也同國則往哭之者以其不逺故也子張死曽子有母之喪齊衰而往哭之或曰齊衰不以弔曽子曰我弔也與哉鄭氏曰於朋友哀痛甚而往哭之非若凡弔或人以其無服非之孔氏曰此一節論哭朋友失禮之事曽子於子張無服不應往哭若有服者雖緦亦往也嚴陵方氏曰三年之喪而弔哭不亦虛乎則齊衰而弔固非禮也而曽子言我弔非若凡人之弔可疑故以與哉結之有若之喪悼公弔焉子游擯由左鄭氏曰悼公魯哀公之子擯相侑喪禮者善子游正之孔氏曰此一節論擯相之法在主人曰擯在客曰介大宗伯注云出接賔曰擯入詔禮曰相喪禮廢亡時人以為此儀當如詔辭而由右相少儀曰詔辭自右鄭云為君出命也立者尊右若已傳君之詔辭為尊則宜處右若於喪事則推賔居右而已自居左子游如此是知禮也嚴陵方氏曰吉事尚左凶事尚右子游為擯而由左則尚右故也山隂陸氏曰子游擯由左著雖朋友方伸君臣不得變也據泄桞死其徒由右相齊榖王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服或曰外祖母也故為之服鄭氏曰榖當為告聲之誤也王姬周女齊襄公之夫人春秋周女由魯嫁卒則服之如內女服姊妹是也天子為之無服嫁於王者之後乃服之莊公齊襄公女弟文姜之子當為舅之妻非外祖母也外祖母又小功也孔氏曰此一節論諸侯為王姬著服之事案莊二年齊王姬卒榖梁傳云為之主者卒之案元年秋築王姬之館于外下云王姬歸于齊是由魯嫁也或人解之曰王姬之嫁命魯為主由魯嫁比之魯女故為之服出嫁姊妹之服案喪服大功章君為姑姊妹女子子嫁於國君者著大功之服王姬既比之內女故服大功也鄭注天子無服者以尊卑不敵故也若王者之後天子以賔禮待之則亦大功也石林葉氏曰王姬之服檀弓所不能決審主王姬嫁者當為之服姊妹之服則莊公為之固然何疑于外祖母乎若以為外祖母服則主王姬嫁者自不應有服然而喪服記外祖母服小功非大功則檀弓非特不能正主王姬嫁者之有服亦自不能知外祖母之服小功也嚴陵方氏曰古者天子之女下嫁於諸侯必以諸侯之周姓者為之主以君臣之義不可以昏姻而廢故也此王姬所以得由魯而嫁歟以其嘗為之主故喪則必告告必為之服亦冝矣而或以為外祖母故為之服則非也晉獻公之喪秦穆公使人弔公子重耳且曰寡人聞之亡國恆於斯得國恆於斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圗之以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利而天下其孰能說之孺子其辭焉公子重耳對客曰君惠弔亡臣重耳身喪父死不得與於哭泣之哀以為君憂父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私子顯以致命於穆公穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也鄭氏曰獻公殺其世子申生重耳辟難出奔是時在翟秦穆公使人就弔之於斯謂在喪代之際也喪亦不可久喪謂亡失位孺稚也勸其反國意欲納之舅犯重耳之舅狐偃字子犯仁親親行仁義寶謂善道可守者又因以為利謂欲反國求為後是利父死也說猶解也使者公子縶也顯當作韅孔氏曰此一節論公子重耳不因父喪以取國之事使者弔重耳既畢又致穆公之命以勸重耳故言且曰且者非特弔兼有餘事也得國失國其機恆在喪禍交代之際求之則得不求則失雖儼然端靜在憂戚喪服之中然身喪在外亦不可久得國之時亦不可失欲使重耳圗之舅犯言父死是何等事正是凶禍之時豈得又因以為己利天下聞之其誰解說我以無罪公子重耳出而對客言君惠弔亡臣重耳此一句是叙其弔意既謝其恩又道不可之意言豈復敢於悲哀之外别有他志以辱君之義也穆公意以重耳反國為義也穆公本勸重耳反國重耳若欲為後則當拜謝其恩今不受其勸故不拜穆公以其不拜故云未為後也所以稽顙者自為父喪哀號也凡喪禮先稽顙而後拜乃成今直稽顙而不拜故云不成拜也既聞父死勸其反國哀慟而起若欲攀轅然是其愛父也既起而不私與使者言必無心反國是逺利也鄭注知在翟弔之及使者公子縶並國語文嚴陵方氏曰孟子曰不仁而得國者有之矣不仁而得天下者未之有也夫不仁猶或有得國者而况於仁乎觀重耳拒秦穆公之言則其仁可知矣故終能霸有全晋然重耳之所為特受之於舅犯而已向使自得於天資非由於人授推是以為國則一語一默一動一靜無非仁也又安得孔子有譎而不正之譏哉廬陵胡氏曰儼然猶嶄然仁親以為寶仁愛於親也勸之孝於親父死之謂何又因以為利若爭國是利父喪帷殯非古也自敬姜之哭穆伯始也鄭氏曰穆伯魯大夫季悼子之子公甫靖也敬姜穆伯妻文伯歜之母也禮朝夕哭不帷孔氏曰此一節論哭殯不合帷殯之事孝子思念其親朝夕哭時褰徹其帷今敬姜之哭穆伯以辟嫌之故遂朝夕哭不徹帷故下文云穆伯之喪敬姜晝哭與此同也案春秋文十五年公孫敖之喪聲已不視帷堂而哭公孫敖亦是穆伯然聲已是帷堂非帷殯也聲已哭在堂下怨恨穆伯不欲見其堂故帷堂敬姜哭于堂上逺嫌不欲見夫之殯故帷殯張氏逸曰敬姜早寡晝哭以辟嫌帷殯或亦辟嫌表夫之逺色也喪禮哀戚之至也節哀順變也君子念始之者也鄭氏曰始猶生也念父母生己不欲傷其性孔氏曰自此至孔子善殷一節總論孝子遭喪所為哭踊復魄飯含重主殯葬反哭虞祔等事居父母喪是哀戚之至極也既為至極若無節文恐其傷性故辟踊有節所以裁節其哀也所以節哀者欲順孝子悲哀使之漸變也所以順變者君子思念父母之生己恐其傷性也嚴陵方氏曰始而生之者親也終而成之者子也苟過於哀而不知變則或以死傷生矣故節哀順變者以君子念始之者也李氏曰始者天下始之者親也復盡愛之道也有禱祠之心焉望反諸幽求諸鬼神之道也北面求諸幽之義也鄭氏曰復謂招魂且分禱五祀庶幾其精氣之反也鬼神處幽暗望其從鬼神所來北面鄉其所從來也禮復者升屋北面孔氏曰始死招魂復魄盡此孝子愛親之道也非直招魂又分禱五祀故云有禱祠之心焉嚴陵方氏曰孝子之事親固有愛之道及其死也猶復以冀其復生則愛之道於是為盡故曰盡愛之道也兾其復生故所以有禱祠之禮也特有是心耳故曰有禱祠之心莊子曰鬼神守其幽則幽者鬼神之道也復之時望其魂氣自幽而反故曰望反諸幽南為陽有明之義北為隂有幽之義故曰北面求諸幽也清江劉氏曰復盡愛之道也有禱祠之心焉禱祠猶願幸耳史記曰此禱祠而求也山隂陸氏曰鄭氏謂分禱五祀誤矣分禱五祀是直禱耳拜稽顙哀戚之至隱也稽顙隱之甚也鄭氏曰隱痛也稽顙者觸地無容孔氏曰孝子拜賔之時先稽顙而后拜者哀戚之至痛也就拜與稽顙二事之中稽顙尤為痛之甚也嚴陵方氏曰孝子哀痛之容有若手之辟足之踊口之哭目之泣鼻之洟固非一類特不若稽顙之為甚爾飯用米貝弗忍虛也不以食道用美焉爾鄭氏曰尊之也食道䙝米貝美孔氏曰飯用米貝不忍虛其口也食道謂飲食之道飲食人所造作故為䙝也米貝天性自然為美士喪禮飯用沐米貝水物古以為貨天子飯用黍諸侯以粱大夫以稷士以稻天子之士亦以粱其含案周禮典瑞云大喪共飯玉含玉鄭注王含玉如璧形而小耳是天子用璧又飯玉碎玉以雜米也故云共飯玉雜記云含者執璧將命是諸侯以璧卿大夫無文成十七年公孫嬰齊夢贈瓊瑰注云食珠玉含象則卿大夫用珠也士用貝三嚴陵方氏曰弗忍虛則無致死之不仁不以食道則無致生之不知銘明旌也以死者為不可别已故以其旗識之愛之斯録之矣敬之斯盡其道焉耳重主道也殷主綴重焉周主重徹焉奠以素器以生者有哀素之心也鄭氏曰明旌神明之旌也不可别謂形貌不見也愛之敬之謂重與奠始死未作主以重主其神重既虞而埋之乃後作主春秋傳曰虞主用桑練主用栗綴猶聨也殷人作主而聨其重以縣諸廟去顯考乃埋之周人作主徹重埋之哀素言哀痛無飾也凡物無飾曰素哀則以素敬則以飾禮由人心而已孔氏曰案士喪禮為銘各以其物又司常云大喪共銘旌注云王則大常案司常云王建大常諸侯建旗孤卿建旜大夫士建物則銘旌亦然但以尺寸易之案士喪禮士長二尺大夫五尺諸侯七尺天子九尺孝子思念其親追愛之道故於斯為重以存録其神又設奠盡其孝飬之道鄭以愛之敬之為重與奠然亦得總為明旌之義故鄭於士喪禮為銘之下引此愛敬二事人始死作重猶若木主主者吉祭所以依神在喪重亦所以依神故曰重主道也殷人始殯置重於廟庭作虞主訖則綴重縣於新死者之廟鄭注顯考謂髙祖也死者世世遞遷至為顯考其重常在死者去離顯考乃埋其重及主以既遷無廟也周人作主則埋重鄭注既夕禮埋重於門外道左是也若虞主亦埋於祖廟門外之道左奠謂始死至葬之祭名以其時無尸奠置於地故謂之奠悉用素器所以表主人有哀素之心也鄭注哀則以素謂葬前敬則以飾謂虞後故士虞禮不用素器嚴陵方氏曰凡銘皆所以為名明旌謂之銘故男子書名焉夫愛之則下忍亡故為旌以録死者之名敬之則不敢遺送死之道所以為盡也重設於始死之時主立於既虞之後重非主也有主之道爾殷雖作主矣猶綴重以縣於廟不忍棄之也周既作主矣重遂徹而埋於土不敢瀆之也不忍棄之者所以致其愛而質故殷人行之不敢瀆之者所以致其敬而文故周人行之夫重與主皆所以依神而已或曰重或曰主何也始死而未葬則有柩矣有柩而又設重所以為重也既有廟矣有廟而必立主是為主也馬氏曰主一而已不可二也廟之有主齊桓公之末失也然則所謂重者安所用哉始死之際未有主以神明為不可一日無所依故作重見人子求神之至焉殷綴之於廟必待親盡廟祧而除之蓋有所不忍然不若周主重徹焉作主則埋之神明之依於一不可以有二孔子曰殷已慤吾從周凡此皆慤而不文也奠以素器若士喪禮有素俎士虞禮有素几皆為是也哀素者哀而不文李氏曰葬埋謹葬其形也祭祀謹事其神也銘誄繫世謹傳其名也以傳其名故曰録之事死而至於傳其名故曰盡其道鄭以為重奠則誤矣廬陵胡氏曰不可别溟溟難見唯祭祀之禮主人自盡焉爾豈知神之所饗亦以主人有齊敬之心也孔氏曰既因上文用素以表哀素遂廣論虞祭之後及卒哭練祥之祭故云此等祭祀之禮主人既見親終自盡致孝飬之道豈知神之所享須設此祭所以設之者以主人有齊敬之心也廬陵胡氏曰自盡加飾慈湖楊氏曰此章及下子游曰既葬而食之未見其有享之者嗚呼鬼神之道不如是也孔子曰未能事人焉能事鬼蓋曰知人則知鬼矣形有死生神無死生故孔子之祭如鬼神之實在而羣弟子觀孔子祭時精神以為如在也今子游以為未見其享之是求鬼神之道於形也辟踊哀之至也有算為之節文也袒括髮變也愠哀之變也去飾去美也袒括髮去飾之甚也有所袒有所襲哀之節也鄭氏曰算數也孔氏曰撫心為辟跳躍為踊孝子喪親哀慕志悶男踊女辟是哀痛之至極也若不裁限恐傷其性故辟踊有算為準節準節之數不一每一踊三跳三踊九跳為一節士三踊大夫五諸侯七天子九也袒衣括髮孝子形貌之變也悲哀愠恚孝子哀情之變也去其吉時服飾是去其華美也去飾雖有多塗袒括髮最為甚也有所袒有所襲者表明哀之限節也哀甚則袒哀輕則襲嚴陵方氏曰有算則有節有節則文無節則質故謂之節文袒則去其衣括髮則投其冠衣冠者人之常服而已故曰袒括髮變也發於聲音見於衣服而生於隂者此哀之常也及有感而愠以至於辟踊者陽作之也此其變歟故曰愠哀之變也經曰愠斯戚戚斯歎歎斯辟辟斯踊蓋謂是矣辨絰葛而葬與神交之道也有敬心焉周人辨而葬殷人冔而葬鄭氏曰接神之道不可以純凶天子諸侯變服而葬故冠素辨以葛為環絰既虞卒哭乃服受服也雜記曰凡辨絰其衰侈袂踰時哀衰而敬生敬則服有飾周辨殷冔俱象祭冠而素禮同也孔氏曰居喪著喪冠麻絰身服衰裳是純凶也著素辨又加環絰用葛不以麻故鄭云接神不可純凶也鄭知天子諸侯者以下云有敬心焉日月踰時敬心乃生大夫士三月而葬敬心未生也素辨謂素帛為辨故注周禮司服云辨如爵辨而素不云麻是用素絹也以葛與辨絰連文故云葛環絰然則要帶仍用麻也喪服注天子諸侯既虞大夫士卒哭乃受服蓋大夫以上卒哭與虞其月不同士虞與卒哭同在一月故也引雜記者既服辨絰其衰亦改喪服袂二尺二寸袪尺二寸則葬時更制其衰袂三尺三寸袪尺八寸是改喪服之衰也王制云夏后氏收而祭殷人冔而祭周人辨而祭故鄭知俱象祭冠也士冠禮周辨殷冔夏收嚴陵方氏曰與神交之道則心主乎敬夫厭冠麻絰居喪之禮也至於葬則以辨易冠以葛易麻者示敬故也子游曰飯於牖下小斂於户內大斂於阼殯於客位祖於庭葬於墓所以即逺也比至於葬則即逺之至矣故以神道交之山隂陸氏曰辨絰葛在下則葛帶也絰仍用麻辨絰葛而葬卿大夫以下禮知然者以下周人辨而葬殷人冔而葬知之也喪致哀而已葬則有敬心焉辨而葬冔而葬則其敬心益隆啜主人主婦室老為其病也君命食之也鄭氏曰尊者奪人易也啜啜粥也孔氏曰此論尊者奪孝子情之法主人亡者之子主婦亡者之妻室老家之長相此三人並是大夫之家貴者為其啜粥病困之故君必有命食疏飯也山隂陸氏曰謂親喪三日之後君命以粥啜焉故曰為其病也君命食之也鄭氏謂尊者奪入易此言大夫以上篤於愛鄰里或不能勉據問喪云鄰里為之糜粥以飲食之反哭升堂反諸其所作也主婦入于室反諸其所飬也鄭氏曰堂親所行禮之處室親所饋食之處孔氏曰室謂饋食供飬之處堂者親平生祭祀冠昏在于堂也皆謂在廟也故既夕禮主人反哭入升自西階東面鄭注云反諸其所作也又云主婦入于室注云反諸其所飬也下始云遂適殯宫故知初反哭在廟也嚴陵方氏曰言主婦入室則升堂者主人而已主人升堂主婦入室隂陽之義廬陵胡氏曰所作親動作之處新安朱氏曰須知得此意思則所謂踐其位行其禮等事行之自安方見得繼志述事之事反哭之弔也哀之至也反而亡焉失之矣於是為甚殷既封而弔周反哭而弔孔子曰殷已慤吾從周鄭氏曰於是為甚哀痛甚也封當為窆窆下棺也孔氏曰此言謂在廟也思想其親而不見故悲哀為甚壙者非親存所在之處今弔者於此而來哀情質慤故云慤也嚴陵方氏曰人之始死也則哀其死既葬也則哀其亡其亡則哀為甚矣故反哭之時有弔禮焉問喪曰入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已矣故哭泣辟踊盡哀而止矣大宗伯以喪禮哀死亡蓋死亡之别如此既封而弔者受弔於壙也反哭而弔者受弔于家也夫弔也者所以弔其哀而已喪雖為哀然不若反哭之哀為甚此孔子所以謂殷為己慤周人弔于家示民不階也子曰死民之卒事也吾從周其言蓋本諸此山隂陸氏曰已慤猶言大戚也禮器曰七介以相見也不然則已慤葬於北方北首三代之逹禮也之幽之故也鄭氏曰北方國北也孔氏曰之幽之故上之訓往下之語助言葬于國北及北首者鬼神尚幽暗往詣幽冥故也殯時仍南首者孝子猶若其生不忍以神待之嚴陵方氏曰南方以陽而明北方以隂而幽人之生也則自幽而出乎明故生者南向及其死也則自明而反乎幽故死者北首凡以順隂陽之理而已三代之禮雖有文質之變至于葬之北方北首則通而行之者皆所以順死者之反乎幽故也禮記集說卷二十
