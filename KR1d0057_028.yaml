body:
  text: 禮記集説卷二十八宋衛湜撰爵人於朝與士共之刑人於市與衆棄之是故公家不畜刑人大夫弗養士遇之塗弗與言也屏之四方唯其所之不及以政示弗故生也鄭氏曰必共之者所以審慎之也書曰克明德慎罰屏猶放去也已施刑則放之棄之役賦不與亦不授之以田困乏又無賙餼也虞書曰五流有宅五宅三居是也周則墨者使守門劓者使守關宫者使守內刖者使守囿髠者使守積孔氏曰此一節論爵人及刑人之事謂殷法也周則天子特假祖廟而拜授之故洛誥云蒸祭歲文王騂牛一武王騂牛一時册命周公故特祭文武若諸侯爵人因嘗祭之日故祭統云祭之日一獻君降立于阼階之南南鄉所命北面是也刑人於市謂貴賤皆刑於市周則有爵者刑於甸師氏也與衆棄之故天子諸侯之家不畜大夫不養士逢之於塗不與言放逐棄去不干及以政教之事田里所以安其身賙餼所以養其命皆是為生之具今並不與是不故欲使其生也鄭引虞書證經屏之四方量其罪之輕重合所適之處而居之也引周墨者守門以下明周家畜刑人與夏殷異也延平周氏曰衆不足以知人可以知人者士而已故爵人則與士共之刑人則與衆棄之孟子言國人殺之而不言國人用之以此長樂陳氏曰爵人於朝周官鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府內史二之是也刑人於市周官鄉士遂士所謂肆之三日是也書之洛誥與祭統言爵人於廟不於朝周官王之同族與有爵者刑於甸師氏而不於市者命之於廟未嘗不論於朝親者在所隱不可例之於國人凡此皆周制也嚴陵方氏曰爵所以及有德陽之事也朝在南則陽之所也刑所以加有罪隂之事也市在北則隂之所也朝者士之所立故言與士共之市者衆之所會故言與衆棄之蓋有德者人之所共豫有罪者人之所共棄上言共下言棄互相備也凡此以見人君之所好惡非出於一人之私情爾畜亦養也謂之畜則所養者衆矣於公家言畜於大夫言養大小之别也至於士則又不嫌於不能養特遇之塗弗與之言而已弗故生者使然為故弗故生則不使之生之謂也馬氏曰爵者天之所以命有德刑者天之所以討有罪人心從則天意亦從故聖人之制爵刑不拂百姓以從已之欲而與衆共之也此與孟子所謂國人皆曰賢然後用之國人皆曰可殺然後殺之同意公家勢足以畜之大夫勢足以養之士者其勢不足以畜不足以養故弗與言也夫自棄者先王亦從而棄之故屏之四方示弗戮也自暴者先王亦從而暴之故不及以政示弗生也然則好生者聖人之大德而自暴自棄者不足與有為也不足與有言也李氏曰書曰侯以明之撻以記之書用識哉欲並生哉蓋撻之將以達之使遵於善書之所以戒之使逺於罪故曰欲並生哉至於流則不欲其生矣故曰示不故生也流止於不故生至於放則棄之而不得以生矣石林葉氏曰公家不畜者示不以國藏惡也大夫弗養者示不以家私惡也士遇而弗與之言者示不以身親惡也廬陵胡氏曰必共之者合公議也嶽牧咸薦舜是也必與衆者不私殺人也示弗故先儒云不欲其生也夫舜有五流即此屏之四方也舜亦不欲其生乎如使舜不欲其生意在殺之安得為好生之德哉究經意蓋謂所以困苦之者示若弗故生欲其改過乃若聖人之心則未嘗不欲其生也劉氏孟冶曰君天也君之喜怒賞罰天之雨露雷霆也福善禍淫天之賞罰也舉善去凶人君之賞罰也天豈能日求天下之善惡者罪福之人君亦豈能一一賞罰天下之善惡哉亦取其尤以示於衆而已爵人於朝所以勸君子士之所共樂也刑人於市所以懲小人衆之所共惡也君子聚於朝故爵人於朝衆人會於市故刑人於市以此見人君之喜怒非一人之私焉刑人者人君所以懲惡衆人所棄故公家及大夫士皆逺之惟其所之言流放竄逐任其所往諸侯之於天子也比年一小聘三年一大聘五年一朝鄭氏曰比年每嵗也小聘使大夫大聘使卿朝則君自行然比大聘與朝晉文霸時所制也虞夏之制諸侯嵗朝周之制侯甸男采衛要服六者各以其服數來朝也孔氏曰此一經論諸侯遣卿大夫聘問及自親朝之事案聘禮記曰小聘曰問三介大聘使卿為介有五人其小聘唯三介故鄭知小聘使大夫也案昭三年左傳鄭子大叔曰文襄之霸也其務不煩諸侯令三歲而聘五嵗而朝故鄭云晉文霸時所制也又案尚書五載一巡守鄭注云巡守之年諸侯朝於方嶽之下其間四年諸侯分來朝於京師嵗遍是虞夏嵗朝也其聘問無文可知周禮大行人侯服歲一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見是各以服數來朝也長樂陳氏曰朝覲宗遇會同君之禮也存俯省聘問臣之禮也諸侯之於天子聘所以通好朝所以述職通好不欲疏故比年一小聘述職不欲數故五年一朝其聘於鄰國之禮蓋亦如此故聘亦比年小聘三年大聘周官大行人凡諸侯之邦亦載嵗相問殷相聘是也書與周官先言朝而後言巡守朝於京師者也舜典先言巡守而後言朝朝於方嶽是也此言一朝而繼之以五年一巡守者則朝於京師明矣五年一巡守者虞夏之制則五年一朝為虞夏之制亦明矣又禮書曰輕財重禮交人之道也聽命達言使者之事也三輔人語輕財曰聘則聘之為義可知矣古者比年小聘三年大聘小聘曰問大聘曰殷既嵗聘矣中復盛聘此周禮所以言殷相聘春秋傳所以言殷聘禮也左傳曰先王之制諸侯之喪士弔大夫送葬唯嘉好聘饗三軍之事於是乎使卿則小聘之問雖不饗有獻不及夫人主人不筵几不禮面不升不郊勞其禮如為介三介然則小聘蓋亦卿爾以其與君為禮也鄭氏曰小聘使大夫其説無據聘雖有國者之禮而其下亦有焉故凡聘女曰聘問人曰聘是也春秋書王臣來聘八諸侯之臣來聘二十有五或稱名或稱字或稱弟或稱公子或稱公孫或稱人或不稱氏或不言使其褒貶輕重各稱其事非可以一端求也嚴陵方氏曰朝必以五年為節五為天地相合之數君臣之際有天地之義焉故其朝聘巡守皆取數以五為節焉言諸侯五年一朝而繼言天子五年一巡守與周官先言五服一朝而後言乃時巡同義疏數雖異先後之序一也聘義言天子制諸侯比年小聘三年大聘於天子言一於諸侯則不言者蓋天子則一而已諸侯之衆其相聘不止於一故也巡守四方亦止言一者自天子言之也馬氏曰唐虞之制則五服以一服俟王而以四服遞年而朝書曰五載一巡守而羣后四朝至於周則六服嵗朝各以其服而來書曰六年五服一朝又六年王乃時巡以此推之則五年一朝者疑其殷之制也説者以為晉文公之制蓋非是也王制者記王者之制而以為霸者之制可乎山隂陸氏曰五年一朝謂諸侯既更五年一同至京師所謂大朝會是也書曰六年五服一朝又六年王乃時巡春秋傳曰明王之制使諸侯歲聘以志業間朝以議禮再朝而會以示威再會而盟以顯昭明嵗聘即此所謂小聘間朝即此所謂大聘或言朝或言聘其實一也再朝而會即五年一朝再會而盟即五年一巡守石林葉氏曰康成以大聘與朝晉文霸時所制虞夏之制諸侯嵗朝周之制六服以數來朝今以經傳考之固如其説豈當時記者誤推晉文之制以為諸侯之於天子亦若此與至於五年一巡守而又與周異者以虞氏之世法始成而未備則修五禮而巡守嵗數周之世法已備而趨變既悉則修法則而巡守歲疏此諸侯之朝所以六年為限而王之巡守以十二嵗為期臨川王氏曰孔子謂虞夏嵗朝以尚書考之恐無此禮巡守則朝於方嶽之下此謂五年一朝疑即是方嶽之朝也廬陵胡氏曰堯典五載一巡守羣后四朝鄭云虞夏之制諸侯嵗朝是也然鄭説孝經及熊氏説則皆云諸侯五年一朝天子天子亦五年一巡守今考鄭意蓋謂舜時巡守之年諸侯朝於方嶽之下其間四方諸侯分來朝於京師嵗遍是嵗一朝也鄭説合矣孝經注及熊説非也然鄭謂此大聘朝晉文霸之時所制則非案左氏昭三年鄭子大叔曰文襄之霸令諸侯三嵗而聘五嵗而朝故鄭據以為解不知子大叔之言乃諸侯朝霸主之法非朝天子也況文襄身不肯朝京師豈能令諸侯朝天子乎夫襄王狩於河陽晉文帥諸侯朝於王所而已不朝於周也然鄭注誤矣天子五年一巡守嵗二月東巡守至于岱宗柴而望祀山川覲諸侯問百年者就見之命大師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟命典禮考時月定日同律禮樂制度衣服正之鄭氏曰天子以海內為家時一巡省之五年者虞夏之制也周則十二嵗一巡守岱宗東嶽也柴祭天告至也覲見也就見老人也陳詩謂采其詩而視之市典市者賈謂物貴賤厚薄也質則用物貴淫則侈物貴民之志淫邪則所好者不正同隂律也孔氏曰自此至用特一節論王者巡守四嶽柴望及絀陟之事堯典云五載一巡守正謂虞也若夏與殷依鄭志當六年一巡守也案白虎通云三嵗一閏天道小備五嵗再閏天道大備故五年一巡守以此言之夏殷六嵗者取半一嵗之律吕周十二嵗者象嵗星一周也大行人云十有二嵗王巡守殷國故云周十二年也嵗二月者皆以夏之仲月律厯當其中也二月八月又晝夜分五月十一月隂陽終故取四仲月也岱者言萬物相代於東方宗尊也岱為五嶽之首故為尊也燔柴以祭上天而後望祀山川覲謂見東方諸侯其見之禮案覲禮云諸侯覲於天子為宫方三百步四門壇十有二尋深四尺鄭注云王巡守至於方嶽之下諸侯會之亦為此宫以見之是也到方嶽見諸侯之後問百年者就見之若未至方嶽於道路有百年者則王亦先見之故祭義云天子巡守先見百年者下云八十九十者東行西行者弗敢過道經之則見之則知百年者道雖不經所在就見之也大師是掌樂之官令各陳其國風之詩以觀君政之善惡天保詩云民之質矣日用飲食是其政和若其政惡則十月之交徹我牆屋田卒汙萊是也命典市之官進納物賈之書以觀民之好惡若民志淫邪則愛好邪僻之物是欲知君上善惡也典禮之官於周則大史也考校四時及十二月之大小時有節氣蚤晚月有弦望晦朔考之使各當其節又正定甲乙之日隂管之同陽管之律玉帛之禮鼓鐘之樂及制度衣服各有等差當正之使正堯典云協時月正日同律度量衡文小異而意同也大師云執同律以聽軍聲鄭恐以同為齊同此律故辨之中山成氏曰天下廣大四方隱僻南面之君多行威福恐其不奉天子之制度故有巡守亦憂民之至也長樂陳氏曰巡守之禮凡大山川於其所至則望之故時邁言巡守告祭柴望也於其所過則祀之故殷言巡守而祀四嶽河海也柴望先於覲諸侯尊神也見百年先於陳詩納賈貴老也尊神而後貴老貴老而後觀民事之序也陳詩以觀民風則觀其所習納賈以觀好惡則觀其所趨然民風有厚薄好惡有邪正特言志淫好辟者以所觀者為淫辟故也陳詩納賈所以觀在下者之所尚考時月至於制度衣服所以觀在上者之所行考時月定日所以和天道同律禮樂制度衣服正之所以齊人道也蓋積日以為月積月以為時於月則考之於日則定之是考之於既往定之於將來也言禮樂制度則衣服舉矣又言衣服者蓋民德之不一僭亂之所起常在於衣服之間尤在致詳故也又禮書曰天子四望達於四方魯三望泰山河海而已書曰海岱及淮惟徐州諸侯之望皆其境內之名山大川也望雖以名山大川為主而其實兼上下之神故詩於柴望言懷柔百神及河喬嶽周禮於望皆言祀而不言祭又典瑞四望與山川異玉大司樂四望與山川異樂左氏曰望郊之細也又曰望郊之屬也公羊曰方望之事無所不通則望兼上下之神可知矣望祀或設於郊天之後或設於巡守之方或旅於大故之時則望有常有不常之祀也崔靈恩謂四望之祭嵗各有四不知何據然也望祀其兆四郊其牲各放其方之色其樂姑洗南吕大㲈其玉兩圭有邸其服毳冕其位茆以辨之而植表於其中周禮所謂旁招以茆晉語所謂置茆蕝設表望是也白虎通謂周公祭泰山以召公為尸其言雖無經見要之宗廟之尸用同姓非宗廟之尸用異姓嚴陵方氏曰天子分土建國命諸侯以守之未必人人稱職也故五年一巡而省之巡守者巡所守而已蓋諸侯非徒守天子之土亦所以守天子之法天子巡之將以修其法而已天子之法至周詳矣方虞夏之際其為法尚未能詳故其修之冝數也春自東方而東巡守所以順天時也行必以仲月者以見巡守之禮無適而不用中焉五月八月十有一月巡守其義亦若是而已岱宗者以其易姓則升此而告代故謂之岱以其為五嶽之長而衆山之所宗也故稱宗於東言岱則知南之為衡西之為華北之為恆矣巡守必居方嶽之下者依名山而居使諸侯知所趨故也柴而望祀山川即詩時邁言巡守告祭柴望是也以天之髙故燔柴以上達以山川之逺故望而祀之皆所以告至而已問百年者就見之所以乞老者之言也詩所以言志風所以從上詩言之哀樂足以見民風之厚薄民風之厚薄足以知上政之得失故命大師陳詩焉志淫言所志之淫好辟言所好之辟民之所志所好不必皆淫辟然止以是為言者蓋觀之所以防其淫辟故也賈即價也王者必頒厯以一天下正朔故巡守則考時月焉作厯者不能無贏縮及其久也日不能無差故巡守則必定日焉蓋考之慮其不一定之欲其無差律有隂陽禮有隆殺樂有清濁制有大小度有長短衣服有文質未嘗同也此所謂同欲其同出於天子而已同出於天子則正於一故終言正之同則所以正之故也馬氏曰蓋先王巡守之所至必以其所至而告天也故柴而境內之山川又不可以不祭故望祀柴者言其達之以煙以其高故也望者非即而祭之以其逺故也陳詩以觀民風視其詩則足以知其風之美惡也若觀唐之風則好儉可知矣若觀陳之風則好淫可知矣賈者物之貴賤厚薄之齊也物之貴賤厚薄無常民之所好則物之賤者貴民之所惡則物之貴者賤民之所惡失其實則所志者淫所好者辟由其上之人無其道以禁之也故命市納賈不惟俯有以知民之所好惡而仰有以察諸侯之政也考時月定日者所以示其東作西成之事而恐差其候也雖然厯象日月星辰君職者之事也然而先王巡守必考時月定日者蓋先王嵗先頒朔於諸侯使諸侯受而行之巡守而考定之者又慮其得之不詳而候之差也度量權衡者律之本也而律者蓋度量權衡之所自出也於律則同之欲其有同而無異也禮樂者先王之所以為教而以一民心制度衣服者先王之所以為政而以一民行政教者在上者之所出而諸侯則其法守而已故正之欲其有異而不敢同也山隂陸氏曰東巡守至于岱句宗讀如宗祀文王於明堂之宗異於郊丘尊而祀之之名也故曰於郊也故謂之郊天一而尊故曰宗柴宗在柴上山川則卑而衆也故曰望秩秩在望下書於言宗柴故言望秩於言類言禋故言望而已亦以此延平周氏曰告至然後覲諸侯神人之序也覲諸侯然後就見百年之有道者貴賤之序也就見百年者所以訪時政之得失既訪時政矣然後觀民風故命陳詩既觀民風矣然後觀民情故命市納賈以觀其美惡好非其所好惡非其所惡則志淫好辟可知矣而復言之者示其尤在所致詳也命典禮以考正之者乃其所終始者也定於考為詳正於定為略石林葉氏曰春從東而始至於岱宗柴告於天也望祀於山川告於地也或曰望祀或曰望秩者秩其無文而祀其在祀典者也書曰協時月正日同律度量衡修五禮五玉與此不同何也蓋洪水之流民方出於昏墊而舜之攝政亦以其時為未平也日月有不合則協之有不齊則正之度量權衡有未一則同之禮有未備則修之王制所言治世已平矣故時月無不合慮其不合則考以成之日無不正慮其不正則定以齊之禮樂衣服無不備慮其有變革則同而一之唯其洪水之後而其教詳故言度量衡在其中雖然舜不言衣服而王制特言正之何也蓋衣裳之備自虞氏始流及於三代則其文盛矣其衣裳備矣未見其弊舜亦不可得而正之及其文盛而弊也衣服有二而民德不歸於一此所以特正之也新安朱氏曰五載一巡守此是立法如此若一嵗間行不遍則去一方近處會一方之諸侯如周禮所謂十二嵗巡守殷國殷國即是會一方之諸侯使來朝也又云巡守亦非是舜時創立此制蓋亦循習將來故黃帝紀亦云披山通道未嘗寧居永嘉徐氏曰時巡五載一講其諸有虞之制乎有虞之時一嵗之間周遍四嶽蓋羣后四年一見五年而遍矣故天子一巡其守也夏暑祁寒南巡北守而不厭其勞矣夫豈不能養尊髙拱而坐撫萬方至於終嵗勤動者所以省方觀民忘勢盡下廣民隱之未究也虞氏巡守之禮亦簡易而不煩其考制度有經其行黜陟有方因巡守之嵗同其度量協其時月正其日修其五禮命大史陳詩以觀民風命市納賈以觀民好惡其考制度有經如此削其不敬者黜其不孝者不從其流之畔上者討之有功德於民者從而加地進律其行黜陟有方如此然而一嵗而遍四嶽王通以為兵衛寡而征求少斯言得之矣不然不幾於病民力乎至成周之世六年五服一朝又六年王乃時巡蓋必十二年而一巡守者六年之間六服畢朝之後而後王始時巡一年巡一方也然周時禮制繁重非若有虞之簡易矣文物益備兵衛益多君行師從雖欲盡一嵗而遍之有不可得至其考制度行黜陟亦視虞禮有因革損益矣考之周官行人自一嵗遍存三嵗遍俯至十有一嵗達瑞節同度量成牢禮修法則十有二嵗而後巡守之禮行焉則所以考制度者與虞異矣考之孟子論三王之地闢者則有慶田野之荒蕪則有責一不朝則黜其爵再則削其地三則六師移之則所以行黜陟與虞異矣自武王定殷之後蓋嘗巡守而告祭柴望矣祀四嶽河海矣至成王非無行人撢人之官以巡邦國而周官所載撫萬邦巡侯甸以綏兆民則知聖王勤民切至如此非固曰遊豫而已穆王周行天下轍迹遍於四海而周道衰焉齊景公欲觀轉附朝儛遵海而南放于琅琊以求比至於先王之觀而晏子為言天子適諸侯無非勤民之事豈徒為是逸豫以亂民哉秦皇登之罘上泰山以刻石頌德舟車所至履危殆者數矣漢武三月之間周行萬八千里十三年之中遍於五嶽四瀆其荒唐益甚焉長樂劉氏曰就見百年之老則民不敢慢於其親采察萬民之詩則國不敢瀆於其化觀其百物之價則民不敢淫於所好考其正朔之協則事不敢違於其時同其律度之程則民不敢輕於其信肅其宗廟之祀則下不敢忘於其先謹其禮樂之行則民不敢悖於其中執其制度之常則臣不敢肆於其僭賞其功德之懋則下不敢怠於其修凡是十者邦之大典也先王所以仁民之綱而御諸侯之大柄也既躬迪之以為教化又就考之於四方以行絀陟此成湯所以建中於民而歷年六百也李氏曰陳詩以觀民之志而曰風者蓋政出於法度者日月時嵗之所能齊律度量衡之所能一風出於德性德性有厚薄寬急先王不能一也要之不失法度皆在善矣而其善不同故諸侯之詩無雅而有風詩以觀其志賈以觀其厚有德教則民之志不得以淫故天子有正雅諸侯有正風有善政則民之好惡不得以僻故物之靡者必微害者必亡天子之於諸侯考其政教而已鄭氏曰古者天子巡守遍歷四嶽觀諸侯考禮樂制度正朔之外又就見百年者命陳詩以觀民風命納賈以觀好惡凡物之情偽俗之美惡政之善否民之休戚無不知也天子之尊其勤勞如此後世既不能如古之巡守而以州郡之守鄉邑之長為親民之官漢世猶詔二千石出入阡陌勸農桑致勞來尚有古人之意劉氏孟冶曰古者宣民情以詩自公卿大夫士以至小夫賤𨽻皆得以陳君臣之失故民有怨乎其上敢言矣而不敢怨敢怨而不敢叛何者其中之所以蓄忿含怨於詩皆得以備陳矣命掌詩之官陳詩以觀民風則下之情得以上通而上之有過亦可以自知矣納賈如周官司市之治教政刑量度禁令以商賈阜貨而行市以質劑結信而止訟以泉府同貨而斂賖則知民情之好惡民心之向背繫焉天子觀此二者既有以自省諸己又有以察乎風俗於此則防民之淫禁民之辟皆可以次第舉矣後世禁民以言而民情壅焉而不通虐焉而無告奪民以利而耕者之不得食寒者之不得衣於是蓄忿俟間一旦決裂疾視其上而賊其長吏豈獨其民之罪哉下有言而不得上通上有德意志慮而不能下達良由太師司市之官廢而民風好惡天子不得而知也孟子曰詩亡然後春秋作其亦悼詩亡之不可復見也王者之有天下車同軌書同文行同倫豈使國家異觀逺近異政命典禮考時月正日同律禮樂制度衣服正之者凡欲其有所統一也況夫律厯之贏縮失其序則時月日律之失其度法度之不正則禮樂制度之失其常故堯之命羲和敬授人時以閏月定四時成嵗舜之協時月正日同律度量衡修五禮五玉皆此意也若月令之合諸侯制命百縣為來嵗之受朔日乃飭司服具飭衣裳必循其故皆先聖之不敢忘況當巡守之時其可不揆而正之乎山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討有功德於民者加地進律鄭氏曰舉猶祭也不順者謂若逆昭穆流放也討誅也律法也孔氏曰山川是外神故云不舉不舉不敬也山川在其國竟故削以地宗廟是內神故云不順不順不孝也宗廟可以表明爵等故絀以爵鄭注逆昭穆如魯逆祀躋僖公也釋詁文云法謂法度諸事皆是即大行人上公九命繅藉九寸冕服九章建常九斿之等是也長樂陳氏曰不敬則無禮矣不孝則不仁矣不從與畔則不道矣無禮未至於不仁不孝未至於不道此所以削地而後絀爵絀爵而後流討也削絀流討而繼之以加地進律者退不肖然後可以進賢故也易大有象先遏惡而後揚善詩巧言先如怒而後如祉鄉簡不帥教者然後論秀士樂正告不帥教者然後論造士皆禮意也嚴陵方氏曰不舉其祭祀之禮者為不敬不順其昭穆之序者為不孝削地所以貶其國絀爵所以貶其身孟子言一不朝則貶其爵再不朝則削其地者豈非夏殷之制異乎神祗衆矣止以山川為言者蓋諸侯之所守以山川為大故魯頌言錫之山川經又云諸侯祭名山大川之在其地者皆此意也天曰神地曰祗此以山川為神祗者自其無所屈言之皆可謂之神自其有所别言之皆可謂之祗禮外也故可變樂內也特可易而已此淺深之别從則隨而有所順畔則敵而有所逆言不從則未至於畔也特為不從而已所以為輕重之别也流則放之唯其所之討則以法致其誅焉夫巡守固所以同律禮樂制度衣服正之也則其變禮易樂革制度衣服者必流討其君豈為過哉有功於民則加地有德於民則進律也孟子曰入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地此非加地於有功者乎樂記曰天子之為樂也以賞諸侯之有德者也故其治民勞者其舞行綴逺此則進律於有德者乎馬氏曰加地者益以地也進律者進以爵也夫有德者則進以爵而以律言之何也蓋律之猶言法也益以地進以爵皆以法而進之也若子男以五為節則進之以七侯伯以七為節則進之以九此其所以以律言之也李氏曰周官以八則治都鄙而始言祭祀以馭其神經言五刑之罪而莫大於無親無法次之無上為後此山川神祗有不舉不足以事神者也宗廟有不順無親者也變禮易樂無法者也革制度衣服無上者也其罪自重而至輕削以地未至於絀以爵絀以爵未至於君流君流未至於君討其法自輕而至重何也蓋罪之重者先王治之於其輕則不使至於重罪之輕者先王待之以重則使不敢犯其輕先王之流不從討不服非忿其無法讎其無上也以無法為傷民故不得已而流之以無上為亂民故不得已而討之周官司馬九伐之法則言其詳而其所謂削之者蓋削以地也所謂眚之者蓋絀以爵也杜之者所謂君流也正之者所謂君討也夫不孝不恭不順不服者固不可一日容於盛世而其正之必俟於巡守者蓋見聖人仁於用刑之意故巡守也始於論言語協辭命諭書名聽聲音至於達瑞節同度量成牢禮同數器修法則而後王乃巡守其有犯王命者是亦不可教矣先王之政已亡其餘澤已熄鄭人來歸祊而泰山之祀不舉魯躋僖公而宗廟不順把用夷禮作淫樂而禮樂變易作丘賦聚鷸冠而制度革祭祀不舉而不能削其地宗廟不順而不能絀其爵變禮易樂而不能流革制度而不能討此春秋之所以作也石林葉氏曰王者所述多三代之制以三代方堯舜雖治天下無異道而教亦有不同者矣是以衣服制度上所以造治本也敢以其故而専革之是畔其君畔其君則征伐之有辭矣是故其罪討禮樂自天子出所以飭治具也敢以禮為常而變之以樂為久而易之是不從其君不從其君則無以别於要荒之逺故其罪流至於宗廟之在其國以封爵而得立不能祀則不順乎親也故因其爵而絀之山川之在其地而得為之主不能舉則不恭其祀也故因其地而削之絀也削也皆無功德於民其罪雖不均合而言之皆為黜幽言也及夫有功於民者加地進律則所謂陟明也加地所以為祿而祿則報功進律所以為樂而樂則彰德昔嘗有功而報之以祿矣今以功愈多而增之故曰加地昔嘗有德而賜之律矣今以德愈修而進之故曰進律先王一出省方而風俗厚薄周於人諸侯黜陟詳於上此三代盛時天子視聽不出於旒纊而四海見於一堂之上者得其操術也金華應氏曰王制所記四巡之禮與舜典所載無甚相逺也然帝舜之所行者修五禮輯五瑞復五器上下交際之儀溫溫乎其可挹也王制之所至則以削絀流討之罰警於先以加地進律之賞誘於後賞罰黜陟之政凜乎其甚嚴也夫舜豈全無黜陟哉特其德勝而不深恃夫法焉耳世之淳漓治之繁簡德之盛衰於此可觀矣五月南巡守至于南嶽如東巡守之禮八月西巡守至于西嶽如南巡守之禮十有一月北巡守至于北嶽如西巡守之禮歸假于祖禰用特鄭氏曰假至也特特牛也祖下及禰皆一牛孔氏曰案爾雅釋山云泰山為東嶽郭注云在奉髙縣西北霍山為南嶽郭注云在衡陽湘南縣南郭又云今在廬江潛縣西漢武帝以衡山遼曠因讖緯皆以霍山為南嶽故移其神於此其土人皆呼為南嶽南嶽本自兩山為名非從近也如郭此言則南嶽衡山自有兩名一名衡山一名霍山自漢武帝以來始徙南嶽之神於廬江霍山耳華山為西嶽郭注云在𢎞農華隂縣西南恆山為北嶽郭注云在恆山上曲陽縣西北每五年巡守而歸從始祖下及於禰廟各用一牛故堯典云歸格于藝祖用特祖既用特明知各用特也又洛誥云文王騂牛一武王騂牛一各用一牛也然則唐虞及夏五廟則用五特殷用六周用七也馬氏曰自五月南巡守至於西巡守禮其禮則同而終之以歸格于祖禰用特者蓋言其巡守嵗偏而歸之必告於祖也李氏曰田僕職曰以田以鄙則王之於都鄙未嘗無巡守而止言四嶽之諸侯者蓋先王之於畿內諸侯也有祭祀以馭其神則山川無不舉祭祀無不順有禮俗以馭其民則禮不得變樂不得易制度衣服不得革矣蓋聖人治之略則考之詳治之詳則考之略所以致四海於一堂之上也延平周氏曰歸必告於祖禰者事死如事生也牲特者約於事神則自奉者可知嚴陵方氏曰天子之出必造乎禰及其歸也必假于祖禰出而造之所以象生時之必告也歸而假之所以象生時之必面也特一牛也用特以見約焉先王菲飲食而致孝乎鬼神所不敢約也然其約如此則巡守之不為煩費可知下文言造乎禰而已則不必用特也於用特而及乎祖則造禰之時不嫌於不及祖矣天子將出類乎上帝宜乎社造乎禰諸侯將出宜乎社造乎禰鄭氏曰帝謂五德之帝所祭於南郊者類宜造皆祭名其禮亡孔氏曰此一經論天子巡守之禮將出謂初出時也知此是巡守者以下别云出征也類乎上帝祭告天也鄭注云五德之帝應祭四郊獨云祭於南郊者謂王者將行各祭所出之帝猶周人祭靈威仰於南郊是五帝之一總云五德耳冝乎社者巡行方事誅殺封割應載社主也云冝者令誅罰得宜又社主乎地也造至也謂至父祖之廟也然必歷至七廟知者前歸假既云祖禰明出亦告祖禰也今唯云禰者白虎通云獨見禰何辭從卑不敢留尊者之命至禰不嫌不至祖也小宗伯云凡天地之大災類社稷宗廟是類為祭名爾雅釋天云起大事動大衆必先有事乎社而後出謂之冝是冝為祭名大祝一曰類二曰造是造為祭名也諸侯將出謂朝王及自相朝盟會征伐之事不得告天故從社始亦載社主也造乎禰者亦告祖及載主也案皇氏曰行必有主無則主命載於齊車書云用命賞于祖是也今出辭别先從卑起最後至祖仍取遷主則行也若前至祖後至禰是留尊者之命為不敬也若還則先祖後禰如前所言也橫渠張氏曰類者與旅相似言既祭東方帝則東方山川百神皆從而望祭所謂類者以一類祭也若非時有事於一方則止以其方之百神從祭於一方之上帝故亦言類長樂陳氏曰周官大祝大師則先冝社而後造祖大會同則先造廟而後冝社此先冝社後造禰蓋言軍師之事與然天子諸侯豈特將出而有是哉於其所至未嘗不類帝書曰至于岱宗類于上帝是也於其所有事未嘗不告社禰書曰用命賞于祖不用命戮于社是也帝非不可以言造以類為主社禰非不可以言類以造冝為主又禮書曰書曰類于上帝詩曰是類是禡周禮小宗伯兆五帝於四郊四望四類亦如之凡天地之大災類社稷宗廟則為位肆師類造上帝則為位大祝六祈一曰類二曰造類上帝大會同造于廟詛祝掌類造之祝號禮記曰天子將出類于上帝造于廟則類者類其神而祭之也造者即而祭之也類之所施或於上帝或於日月星辰或於社稷或於宗廟類之所因或以巡守或以大師或以大災造則或於上帝或於祖廟凡此皆有所祈也不若大旅之有所告而已故大祝六祈有類造而無旅焉鄭康成以宗伯之四類為日月星辰蓋以四類在四郊四望之下而知之也爾雅以詩之是類是禡為師祭蓋以大祝大師類上帝而知之也社稷宗廟非大災則無類祭上帝非巡守之所至則無造祭書云至于岱宗柴詩言巡守告祭柴望此蓋造上帝之禮也巡守於其將出則類上帝於其所至則造上帝大師於其將出亦類上帝於其所至特禡於所征之地而已昔武王伐紂既事而退柴于上帝成王營洛位成之後用牲于郊牛二此蓋類禮也何則書於舜之既受命則類乎上帝於湯之既受命則告於上天是既事則必祭祭必以類禮也於舜之既受命言類則湯之既受命而類可知既受命而類則師之既事邑之既成又可知也類造之禮其詳不可得而知要之劣於正祭與旅也觀祀天旅上帝而大宗伯掌之類造上帝小宗伯肆師掌之則禮之隆殺著矣四類日月星辰於四郊則類上帝蓋南郊乎嚴陵方氏曰前言巡守之歸而不言出此言出而不言歸者互相備也冝造則諸侯之所同類上帝則天子之所獨者諸侯以天子為天且以為降殺之别故也經曰天子祭天地諸侯祭社稷其言正與此合馬氏曰類者以其事類告於上帝其禮則略於祭天冝者以事之冝而告於社而其禮則略於祭地山隂陸氏曰類見曰類旅見曰旅類言上帝以為類而後可出冝言社以為冝而後可出李氏曰類其禮有類於正祭也冝其義有稱於事也造造而告之也天神逺人而尊故言禮以致其敬地祇近人而親故言義以致其意於祖禰則以生道事之而已故告以道其事類乎上帝冝乎社造乎禰尊卑之序也泰誓曰受命于文考類于上帝冝乎冢土告之先後之序也延平周氏曰大祝之六祈其一曰類言雖有事而祈亦類於常禮冝者求其無所不冝故孫炎以冝為求見福佑也造亦六祈之數蓋求其有所至也帝者逺人而尊故以禮言之社者近人而卑故以福佑言之禰則親之而已故以所至言之石林葉氏曰天子君也君則天道故類乎上帝諸侯臣也臣則地道故冝乎社其出必告故皆造乎禰其反必面故皆假于禰造者告其行也格者告其至也舜所以攝政此一巡守而告於天皆言類者蓋舜之受禪天命也此巡守而黜陟亦天命也順天命以受禪行天命以黜陟皆以類相求也地理有冝而巡守所出皆理所冝行故於社皆言冝也周官大祝之六祈一曰類二曰造獨不及冝意猶類也書亦曰類乎上帝冝乎冢土則是其祭同於類禮而冝則言其意矣蓋古者君出於外必載遷廟之主與社之主于車有功而賞則告之祖有罪而誅則告之社示不敢専也然則武王先受命於文考而後行類冝之祭王制則先類冝而後造於禰何也以其致親言之則先受命者所以尊祖考以其致尊言之則先類冝而後禰者所以親天地此武王之伐紂所以異乎王制之巡守也雖然祖考為親推其親親之仁而於內則主愛故出而造歸而格在武王之載於書則略天地為尊推其尊尊之義而於外則主恭故出而類冝至於燔柴望祀在王制之言於禮為詳講義曰類謂合於禮而不僭也書曰肆類于上帝詩曰是類是禡然則以類為名者取其合禮也禮記集説卷二十八
