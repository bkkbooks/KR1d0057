body:
  text: 禮記集說卷六十九宋衛湜撰內則第十二孔氏曰案鄭目録云名曰內則以其記男女居室事父母舅姑之法此於别録屬子法以閨門之內軌儀可則故曰內則山隂陸氏曰我有則而彼則之謂之則若王制則有以制之所謂降德于衆兆民以此書曰臯陶邁種德德乃降黎民懷之后王命冢宰降德于衆兆民鄭氏曰后君也德猶教也萬億曰兆天子曰兆民諸侯曰萬民周禮冢宰掌飲食司徒掌十二教今一云冢宰記者據諸侯也諸侯并六卿為三或兼職焉孔氏曰此一經論子事父母由后王之教使之然后謂諸侯王謂天子不先云王者辟天子妃后之嫌故言后王也降下也記者據諸侯為文命冢宰下教令於羣衆兆民諸侯當云萬民而云兆民者雜以天子言之依算法億之數有大小二法小數以十為等十萬為億十億為兆大數以萬為等數萬至萬是萬萬為億又從億而數至萬億曰兆億億曰秭兆在億秭之問是大數之法此篇既有飲食又有教令冢宰司徒兩官當備言之今云冢宰是記者據諸侯并六卿為三司徒或兼冢宰之事鄭意疑而不定故稱或王肅曰后王謂天子也新安朱氏曰注疏言諸侯司徒兼冢宰是也但此上言后王之命則冢宰實天子之冢宰耳蓋周禮大宰掌建邦之六典而二曰教典則教民雖司徒之分職而冢宰無所不統故以其重者言之其在諸侯則亦天子之宰施典於邦國而諸侯承之以教其民自不害於冢宰為司徒之兼官也東萊吕氏曰內則一篇首言后王命冢宰降德于衆兆民蓋三代所以教天下者皆以是自秦漢以來外風俗而論政事不復以人家事為問矣嚴陵方氏曰冢宰居六卿之長而以道佐王者也唯道以道之故德乃得而降焉天子曰兆民非有天下不足以與此馬氏曰內則之為言而其詳不如法古之人有曰典有曰則有曰法有曰式凡此皆謂之法蓋可也而君子有所不謂焉施於邦國謂之典施於都鄙謂之則施於官府謂之法施於財用謂之式治邦國以道而道有常故謂之典治都鄙以事而事有制故謂之則治官府有守而守有政故謂之法治財用以節而節有宜故謂之式然則內則之為則者制於上者也上制其行以為德而其下則之是故后王必降其德而后王使冢宰以降其德者所以為兆民所視效也繼體之君謂之后其曰后王者指其德也子事父母雞初嗚咸盥漱櫛縰笄總拂髦冠緌纓端韠紳搢笏左右佩用左佩紛帨刀礪小觿金燧右佩玦捍管遰大觿木燧逼屨著綦鄭氏曰咸皆也縰韜髮者也總束髮也垂後為飾拂髦振去塵著之髦用髮為之象幼時鬌其制未聞緌纓之飾也端𤣥端士服也庶人深衣紳大帶所以自紳約也搢猶扱也扱笏於紳笏所以記事也左右佩用自佩也必佩者備尊者使令也紛悅拭物之巾也今齊人有言紛者刀礪小刀及礪礱也小觿解小結也觿貌如錐以象骨為之金燧可取火於日捍謂拾也言可以捍絃也管筆彄也遰刀鞞也木燧鑽之也逼行縢綦屨繫也孔氏曰自此以下至不敢私祭以上總論在內法則子事父母婦事舅姑男女出入之禮長幼相事之法此論子事父母之法也盥謂洗手漱謂漱口據年稍長者若孺子則晏起不能雞初鳴也士冠禮云緇纚長六尺鄭云纚一幅長六尺足以韜髮而結之盧云所以裹髻承冠以全幅疊而用之著縰既畢以笄插之此謂安髻之笄以縰韜髮作髻既訖橫施此笄於髻中以固髻非固冠之笄故文在冠上總者裂練繒為之束髮之本垂餘於髻後故以為飾也緌謂結纓頷下以固冠結之餘者散而下垂謂之緌也紳笏之制備於玉藻此經所陳皆依事先後櫛訖加縰縰訖加笄笄訖加總然後加髦著冠冠畢然後服𤣥端著韠又加大帶也拾斂也故鄉射大射將射謂之遂射罷謂之拾拾是收斂之意屨繫謂著屨之時屨上有繫以結於足也案皇氏曰左旁用力不便故佩小物右廂用力為便故佩大物晴則以金燧取火於日隂則以木燧鑽火屨繫謂屨頭施繫以為行戒未知然否或可著屨之時屨上自有繫以結於足長樂劉氏曰櫛理其髮縰以韜之笄貫其紒總以束之拂其髦以加於冠謂子生三月則翦其胎髮為鬌帶之於首男左女右逮其笄冠也則綵斾之加於冠謂之髦者不忘父母生育之恩也父母喪則徹之詩云髧彼兩髦實維我儀是也金燧以鑑容也右佩玦者護巨指以開弦也捍者著左臂以遂矢也長樂陳氏曰帨佩巾也佩巾雖女子之事而男子亦有之礪謂之硎亦謂之礱書曰用汝作礪是也詩曰童子佩觿佩觿成人之服衛惠公服成人之服而有童子之行故詩刺之捍韝臂也以韋為之亦謂之拾亦謂之遂一物而三名先儒謂晴則取火以金燧隂則取火以木燧然金燧以取明火特施於致嚴之時而已則凡取火皆木燧耳孰謂木燧有間於隂晴耶周禮司烜氏夫遂取明火於日鑒取明水於月夫遂即金燧也鑒鏡屬世謂之方諸蓋離者陽中之隂於物為火坎者隂中之陽於物為水以金燧取火則以陽召隂以方諸取水則以隂召陽以陽召隂夫道也故謂之夫夫能遂事故謂之遂夫遂以義言鑒以體言於取火言夫遂於取水言鑒互相備也詩曰赤芾在股邪幅在下左氏曰帶裳幅舄內則逼屨著綦鄭康成謂逼束其脛自足至膝故曰在下蓋以幅帛邪纒於足故謂之邪幅所以自逼束也故謂之逼逼即縢約之也故漢謂之行縢男子事父母有逼詩諸侯朝天子有邪逼則凡行皆有逼特婦人不用故婦事舅姑無逼禮書嚴陵方氏曰雞初鳴咸盥漱者夙興以致其潔也左右皆事也故言用而與德佩異矣德欲純而有常故珩璜琚瑀同其質事則雜而應變故金石竹木異其材左佩皆陽類也環還而玦決皆所以象德乃用之事佩者然反人以環絶人以玦是亦事耳或謂玦即決也以鉤弦而決之且珍飾焉故從玉詩云決拾既佽而決與捍連言之理亦然也管以彄筆遰以鞞刀山隂陸氏曰佩玉德佩也佩用事佩也佩德佩無事佩事佩無德佩詩曰何以舟之維玉及瑶鞞琫容刀容刀隨德佩之飾然則鄭氏謂刀鞞也誤矣詩云童子佩觿又曰童子佩韘觿所以治結韘以所禦亂治結以圓禦亂以方綦所謂絇是也綦綦之也𤣥端黑屨青絇故綦又訓青綦屨𤣥端之屨屨之易得也故亦謂之不借許慎說文所謂一曰不借屨是也鄭氏釋辨師謂璂讀如薄借綦之綦蓋是屨也先儒謂薄借之語未聞疏矣婦事舅姑如事父母雞初鳴咸盥漱櫛縰笄總衣紳左佩紛帨刀礪小觿金燧右佩針管線纊施縏袠大觿木燧襟纓綦屨鄭氏曰笄今簪也衣紳衣而著紳縏小囊也縏袠言施明為針管線纊有之襟猶結也婦人有纓示繫屬也孔氏曰此論女事父母婦事舅姑所服之衣所佩之物皆異於男子婦人之笄異於上男子笄縰故鄭於此注始云笄今簪也與士冠禮爵辨笄皮辨笄同故鄭注冠禮亦云笄今之簪也喪服女子吉笄尺二寸袠刺也以針刺袠而為縏囊故云縏袠餘物皆不言施獨於針管線纊之下而言施縏袠明為四物而施矣鄭注昏禮云婦人十五許嫁笄而禮之因著纓明有繫蓋以五采為之其制未聞下男女未冠笄亦云襟纓者彼未冠笄之纓用之以佩容臭故下注云容臭香物以纓佩之與此婦人既笄之纓别也新安朱氏曰婦人不冠則所謂髻笄即為固髻之用亦名為簪而非如二辨之簪矣山隂陸氏曰白地繡謂之紛若今云閙裝矣紛繡也純畫也鄭氏謂凡畫皆畫雲氣蓋有自來矣周官五色紛純即書所謂𤣥紛純黑地五采繢凡純黼純為上畫純次之紛純又次之其最後繢純繢純一名綴純以此針管管所以管針刀礪礪所以礪刀襟纓以襟結纓綦屨以綦約屨纓或謂之緌亦或謂之帨昏禮母施襟結帨婦人謂嫁曰歸以有繫屬為正且男女未冠笄施襟纓前此矣今又施之母以申戒爾雅曰襟謂之袸以此嚴陵方氏曰針貯以管線貯以纊襟衣小帶也士昏禮所謂母施襟是矣纓非冠纓之纓詩所謂親結其縭是矣纓示有屬縭示有别别於此則屬於彼矣綦屨即著綦於屨與前互文耳長樂陳氏曰男女事父母婦事舅姑皆有纓以佩容臭則與女子許嫁之纓不同鄭氏曰婦人有纓示有繫屬誤矣何則許嫁已纓將嫁無所復施既嫁夫說之矣無所復用則事舅姑之襟纓非許嫁之纓也鄭氏曰許嫁之纓蓋以五采為之然則事父母舅姑之纓亦五采歟禮書以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之進盥少者奉槃長者奉水請沃盥盥卒授巾問所欲而敬進之柔色以溫之饘酏酒醴芼羮菽麥蕡稻黍粱􅐕唯所欲棗栗飴蜜以甘之堇荁枌榆免薧滫瀡以滑之脂膏以膏之父母舅姑必嘗之而后退鄭氏曰適之也怡悅也苛疥也抑按搔摩也先後之隨時便也槃承盥水者巾以涗手溫藉也承尊者必和顔色酏粥也芼菜也蕡熬枲實荁堇類也冬用堇夏用荁榆白曰枌免新生者薧乾也秦人溲曰滫齊人滑曰􅔱必嘗之而后退者敬也孔氏曰此一節論子事父母婦事舅姑至其處所奉持沃盥之儀奉進酒醴膳羞之事藉者所以承藉於物言子事父母當和柔顔色承藉父母若藻藉承玉然故鄭注云溫藉也酏是薄粥饘為厚者故左𫝊注云饘粥也爾雅釋言云饘糊也郭景純謂糜也芼羮案公食大夫禮三牲皆有芼牛藿羊若豕薇也是芼乃為菜用菜雜肉為羮也釋草云蕡枲實也棗栗飴蜜以和甘飲食用堇用荁枌榆及新生乾薧相和滫􅔱之令柔滑案士虞禮記夏用葵冬用荁鄭注荁堇類也乾則滑夏秋用生葵冬春用乾荁與此不同者此經堇荁相對士虞禮葵與荁相對所對不同故注有異孫炎云榆白者名枌案庖人云共鮮薧之物鮮薧相對此經以免對薧薧既是乾故知免為新生也凝者為脂釋者為膏沃之使之香美此等總謂調和飲食也長樂劉氏曰及所下氣怡聲恐驚其寐也問衣燠寒候其冷暖失節也疾痛苛癢省其體氣弗寧也抑謂按摩之搔謂抓撓之皆所以撫恤衰病而一出於敬不敢以為儀也父母出入則或先或後敬扶持之相其所宜以助其力也又從而問其意之所欲食者則敬慎其心以進之和柔其色以溫之芬芳其意以奉之庶其親喜而不之厭也孝子之事親也必養其志常使歡欣樂其子之能養則非如是莫之致矣嚴陵方氏曰所即寢室下氣則不盈怡聲則不厲問衣之燠將徹之使凊也問衣之寒將加之使溫也已發而傷者疾也宜通而塞者痛也體煩而為苛氣虛而生癢疾痛則抑按苛癢則搔爬或先以引之或後以隨之左右扶持之如是而養可謂至矣然苟不以敬何以别於犬馬故每以敬言之奉槃者勞故少者以之奉水者逸故長者以之沃盥以水沃之而盥也子夏問孝孔子對之以色難夫色所以通人己之情也已能柔色斯足以溫親之色矣自菽以下其性其味各不同故唯父母舅姑之所欲順其所欲而進之也於尊者則惟所欲者以血氣既衰養之不可不順也於孺子亦惟所欲者以血氣未充養之亦不可不順也蓋養老慈幼之道不得不然棗栗飴蜜故曰以甘之周官所謂調以甘者此也堇荁枌榆四者常用之物然不常有故有免有薧也數者其性為滑故曰以滑之周官所謂調以滑者此也脂膏以膏之周官所謂膏香膏臊之類者此也父母舅姑必嘗之而后退則以知其得所欲故也所欲者則嘗之也自下氣怡聲而下則所以養志也自饘酏酒醴而下則所以養口體也故先後之序如此東萊吕氏曰柔色以溫之此孝子和柔顔色以溫父母如今人和易顔色以來而我見之則非特彼和而我之容亦覺和氣薰然子以柔色來父母安得不豫男女未冠笄者雞初鳴咸盥漱櫛縰拂髦總角襟纓皆佩容臭昧爽而朝問何食飲矣若已食則退若未食則佐長者視具鄭氏曰總角收髮結之容臭香物也以纓佩之為迫尊者給小使也昧爽而朝後成人也具饌也孔氏曰此一節論未冠笄者事親之禮臭謂芬芳庾氏曰以臭物可以修飾形容故謂之容臭以纓佩之者謂纓上著香物也嚴陵方氏曰男子二十而冠女子十五而笄若未許嫁則二十而笄也總角總兩髦以為角也兩相角故謂之角詩所謂總角丱兮是也後言男角女羈此兼男女而止曰角者舉男以該之也襟與前所謂襟同纓與前所謂纓異此言未笄之女固知非許嫁之纓矣此所謂纓特以之屬物而已臭謂香物若蘭茝之屬不佩用而止佩臭者示未能即事也容謂容受之容言佩間受是臭物也日出而昧爽則未也故謂之昧爽猶𫝊所謂黎明歟具謂膳具幼者於視膳之事未能専之也特可以佐長者而已山隂陸氏曰上拂髦拂髦未冠笄之事不言綦屨童子不屨絇容膏物也臭香物也言皆容上襟纓皆有容臭昧爽而朝如成人也朝辨色始入皆昧爽而朝今言於此蓋未冠笄嫌或不能也新安朱氏曰注言佩容臭為迫尊者蓋為恐身有穢氣觸尊者故佩香物也凡內外雞初鳴咸盥漱衣服斂枕簟灑掃室堂及庭布席各從其事孺子蚤寢晏起唯所欲食無時鄭氏曰斂枕簟者不欲人見己䙝者簟席之親身也孺子小子又後未成人者孔氏曰此一節總論子婦之外卑賤之人爰及僕𨽻之等嚴陵方氏曰斂則收而藏之必斂枕簟則以晝夜異用故也灑掃則用水以斂塵而去之室堂及庭則自內以及外也布席則所以待尊者之行事各從其事若女服事於內男服事於外之類是矣蚤寢則未與乎日入之夕起晏則未與乎昧爽之朝唯所欲食無時則以弱而未勝其制節且養之不可不備也由命士以上父子皆異宫昧爽而朝慈以㫖甘日出而退各從其事日入而夕慈以㫖甘鄭氏曰異宫崇敬也慈愛敬進之日出乃從事食祿不免農也孔氏曰此一節論命士以上事親異於命士以下之禮伊川程氏曰父子異宫為命士以丄愈貴則愈嚴故異宫猶今有逐位非如異居也橫渠張氏曰古者有東宫西宫有南宫北宫異宫而同財此禮亦可行古人慮逺目下雖似相疏其實如此乃能久相親蓋數十百口之家自是飲食衣服難為得一故大庖則同之小庖則異之不為害又異宫乃容子得申其私所以避子之私也子不私其父則不成為子古之人曲盡人情必也同宫有叔父伯父則為子者何以獨厚於其父為父者又烏得而當之長樂劉氏曰命士以上有祿矣故父子皆異宫焉昧爽而朝者以其憂國而不専於養也乃後羣子而朝夫孝愛其親者弗崇虛敬也必有㫖美甘滑之養以申其慈愛之誠焉故曰慈以㫖甘也日出而退各從其事者夙興以事其親辨色以趨於職日入以夕其親遂視晚膳焉不有㫖甘以達其慈則曷異於無祿也嚴陵方氏曰尊卑之際辨則敬同則䙝故父子坐不同席居必異宫所以致其敬也然則貴者其禮宜詳賤者其禮宜略故由命士以上然後父子異宫也周禮典命子男之士不命則士固有不命者矣朝見曰朝夕見曰夕昧爽而朝則晨省之禮也日入而夕則昏定之禮也山隂陸氏曰言慈不言孝養以㫖甘是慈也非孝也故曰有酒食先生饌曽是以為孝乎東萊吕氏曰慈以㫖甘雖有八珍之味嗟來而與則食之何甘疏食菜羮進之以禮顔色和悅則食之者自覺甘美此所謂慈以㫖甘父母舅姑將坐奉席請何鄉將衽長者奉席請何趾少者執牀與坐御者舉几斂席與簟縣衾篋枕斂簟而襡之鄭氏曰將衽謂更臥處襡韜也須臥乃敷之也孔氏曰此一節論父母舅姑將坐將臥奉席之禮及親起斂枕簟等蚤旦親起侍御之人則奉舉其几以進尊者使憑之斂此所卧在下之席與上襯身之簟又縣其所卧之衾以篋貯所卧之枕簟既襯身恐其穢汚故以襡韜藏之席則否長樂劉氏曰此以下至共帥時總論凡事父母舅姑之禮鄉遂五家之長針職其民而教之者此其定範也文王用之以正其民之性命遂有天下以興王業用是道也周官法令之書提其大綱耳經而紀之其在此乎謂侍父母舅姑行遊於所至其將至也則長者奉席而前請欲何鄉也將憩而卧於它所則長者奉席而前請衽欲何趾也不敢斥言其首敬之至也坐卧所以安老而優尊也而席為之主羣子婦不敢専必讓於長者上下之分禮宜然也御者舉几斂席與簟縣衾篋枕斂簟而襡之者謂坐之將起寢之將興也几席之徹衾枕之斂則賤者尸之不必子婦也東萊吕氏曰父母將坐奉席請何鄉坐位自有常處必問鄉者示不敢専之意嚴陵方氏曰衽卧席也别言之則坐者為席卧者為衽合言之則衽亦席山隂陸氏曰少者執牀與坐侍者舉几則父母舅姑興矣子婦斂襡以是為節說文云牀安身之坐者至於恭坐則席縣衾斂衾而縣之篋枕斂枕而篋之父母舅姑之衣衾簟席枕几不𫝊杖屨祗敬之勿敢近敦牟巵匜非餕莫敢用與恆食飲非餕莫之敢飲食鄭氏曰𫝊移也牟讀曰堥巵匜酒漿器敦牟黍稷器餕乃用之恆常也旦夕之常食餕乃食之孔氏曰此一節論父母舅姑所服用之物子婦不得輒用所恆飲食之饌不得輒食衣衾簟席枕几侍御之人停貯常處子婦不得輒𫝊移嚮他處杖屨是尊者服御之重彌須恭敬故云祗敬之勿敢逼近也敦則周禮有玉敦今之杯盂也隱義曰堥土釡也今以木為器象土釡之形巵酒器匜盛水漿之器僖二十三年左𫝊懷嬴奉匜沃盥是也與及也接上敦牟之文非但不敢用及父母常食飲食非因餕時莫敢飲食嚴陵方氏曰敦牟四者固不敢用至於餕之時亦或用焉與讀如預恆食飲謂日常所食飲也非餕莫敢飲食者不敢先尊者擅飲食故也慶源輔氏曰凡此所以養其孝心也孝人心之所固有後世禮教不明日就銷鑠有不自知者矣若夫動容周旋中禮者則又成德者之事也父母在朝夕恆食子婦佐餕既食恆餕父沒母存冢子御食羣子婦佐餕如初㫖甘柔滑孺子餕鄭氏曰子婦佐餕婦皆與夫餕也既食恆餕每食餕而盡之末有原也御食侍食也謂長子侍母食也侍食者不餕其婦猶皆餕也孔氏曰此一節論父母之食子婦餕餘之禮子婦者長子及長子之婦食必須盡以父母食不能盡故子婦佐助餕食之使盡勿使有餘而再設也羣子婦謂冢子之衆弟婦也如初者如上父母在子婦佐餕之禮山隂陸氏曰昧爽而朝問何食飲矣則所謂朝踐蓋在此時然則朝佐餕朝踐之餘也朝踐蚤矣容後或食既食恆餕言父母既食子婦餕之其謂之恆餕則著以其美者孺子餕故也言羣子婦佐餕不言冢婦冢婦不與也蓋舅沒則姑老冢婦代政矣上言子婦此言孺子相備也㫖甘柔滑盛矣慶源輔氏曰食須盡親或餘而子餕之其意逺矣推而至於堂構播穫皆此物也末有原特一事耳父沒母存食則獨矣恐母心之傷也故冢子御食焉御侍也言御至矣羣子婦佐餕如初然後可以至於無窮㫖甘柔滑孺子餕者所以慈幼也養老慈幼於是為至嚴陵方氏曰㫖甘柔滑老幼之所宜食故父母食之孺子餕之在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖遊不敢噦噫嚏咳缺伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔不有敬事不敢袒裼不涉不撅䙝衣衾不見裏父母唾洟不見冠帶垢和灰請漱衣裳垢和灰請浣衣裳綻裂紉針請補綴五日則燂湯請浴三日具沐其間面垢燂潘請靧足垢燂湯請洗少事長賤事貴共帥時鄭氏曰慎齊齊莊也睇傾視也易曰明夷睇于左股襲謂重衣也不有敬事不敢袒禓父黨無容也撅揭衣也䙝衣衾不見裏為其可穢父母唾洟不見輒刷去之也手曰漱足曰浣和漬也綻猶解也潘米瀾也共猶皆也帥循也時是也禮皆如是也孔氏曰此一節論事父母舅姑在尊者之所畏敬之法并論漱浣沐浴并明少事長賤事貴如事父母舅姑不涉不撅者於尊所不因涉水不敢揭衣冠帶既尊故以手漱之用力淺也衣裳卑以足浣之用力深也此據士故冠帶得漱晏子是大夫故譏其浣衣濯冠也曲禮曰不漱裳是裳亦漱此漱浣對文為例耳嚴陵方氏曰唯者下順上之詞應以唯則無諾也周旋者周回而旋轉也揖遊者揖讓而遊息也不為人僞之謂慎不以物二之謂齊胃受疾而為􅎪心受疾而為噫肺受疾而為咳氣行疐而為嚔缺伸見曲禮解跛倚見禮器解唾口津也洟鼻液也􅎪噫嚏咳則聲為不恭缺伸跛倚睇視則貌為不恭唾洟則聲貌俱為不恭矣故每不敢為也寒不敢襲癢不敢搔則不敢適己之便故也且子之於親也衣而寒燠則問之體之苛癢則搔之而於己則寒不敢襲癢不敢搔以至父母之涕唾不見而已則唾洟不敢其所以愛親之心可謂至矣玉藻曰裘之裼也見美也服之襲也充美也充美則敬在內見美則敬在外內心也外事也父子之間敬在心而已故曰不有敬事不敢袒裼經言父黨無容亦以是也非涉水則不敢揭衣惡其䙝也曲禮言暑毋褰裳亦謂是矣䙝衣衾者服而不釋與禮服異為䙝而不敬故謂之䙝不見裏則為其可穢故也父母唾洟不見致其潔也漱若曲禮漱裳之漱浣若禮器浣衣之浣靧面以潘貴其滑也慶源輔氏曰應唯無二志也敬對無隱情也進退敬齊無不敬也非精神篤志何以及此應以唯敏矣對以敬忠矣唯誠故敏故忠至於進退周旋慎齊誠之至也誠身所以悅親而敬親所以敬身也袒裼撅衣恐親之心不安也唯不得已而後為之耳父母唾洟不見人情所不欲見也請浣漱請補綴請則容有不許然必先備灰與針而後請敬之至也簡者為之則必得請而後備矣沐不言請省文也循是而行之固無有不至者矣新安朱氏曰不有敬事不敢袒裼不涉不撅此三句文義一樣古注誤作兩段解言尊長之前有敬事方敢袒裼敬事如習射之類射而袒裼乃為敬若非敬事而以勞倦袒裼則是不敬唯涉水而後撅若不涉而撅則為不敬如云勞毋袒暑毋褰裳若非敬事雖勞亦不敢袒唯涉水乃可褰裳若非涉水雖盛暑亦不敢褰裳也橫渠張氏曰請靧請浴之類雖古人孝謹第恐亦不如是之煩時有請焉耳男不言內女不言外非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而后取之外內不共井不共湢浴不通寢席不通乞假男女不通衣裳內言不出外言不入男子入內不嘯不指夜行以燭無燭則止女子出門必擁蔽其面夜行以燭無燭則止道路男子由右女子由左鄭氏曰男不言內女不言外謂事業之次序祭嚴喪遽授器不嫌也奠停地也湢浴室也嘯讀為叱叱嫌有隱使也擁猶障也男子由右地道尊右也孔氏曰此經論男子女子殊别之宜祭是嚴敬之處喪是促遽之所於此之時不嫌男女有淫邪之意故得相授器也嘯是自嘯叱是叱人經言不嘯與不指連文指既指物明嘯是叱人若其常事以語言處分是顯使人也如有姦私恐人知聞不以言語但諷叱而已是幽隱而使故云叱嫌有隱使也長樂劉氏曰此經皆鄉遂教男女敬别防微之道故男者學業於外志於四方者也不當與知內政復何言哉女者正潔於內志於四德者也不當與知外政亦何言哉言則亂於先王正家之法矣非喪祭之嚴且敬也無急事不相授器焉其相授也女則用篚否則奠之於地外內不共井嫌同汲也不共湢浴嫌相䙝也不通寢席嫌相親也不通乞假嫌往來也不通衣裳惡淆雜也內言不出惡交於外也外言不入惡交於內也禮當入內嘯歌則涉乎邪也指目則涉乎覘也有燭則行夜有不可得而已也無燭則止行則涉於不明也道路之法其右以行男子其左以行女子古之道也文王用是以教其民故桃夭之詩歌其男女以正昏姻以時也漢廣之詩歌其美化行乎江漢之域無思犯禮者也汝墳之詩歌其婦人能勉君子以正也苟非敬則防微之道習以成性風以成俗其能然乎嚴陵方氏曰女受以篚則男所受可知言女受而不及男者受隂事女以受為正故也奠謂定之於地也以於地故坐奠之坐亦跪也與曲禮言坐而遷之同義周官九夫為井則同井而飲此言外內不共井者外雖夫之所同內則婦之所獨故也言外內則男女在其中矣而於衣裳特言男女者以男女之衣裳異制尤所不可通故也內言不出外言不入與曲禮所言同擁蔽其面者惡外有所䙝也慶源輔氏曰內外異事男女異職非祭非喪不相授器者祭嚴則不嫌喪遽有不暇其相授則女授以篚其無篚則坐奠而後取惟當時所授受必如此故於喪祭有不暇也井湢一定故言不共寢席衣衾可移易故言不通外內泛也男女切也無燭則止自防者至矣山隂陸氏曰詩曰遵彼微行雖閭閻婦女尚知屏避如此微行牆下微步之徑也新安朱氏曰有問避嫌是否答曰合避處豈可不避如瓜田不納履李下不整冠豈可不避如男女授受不親君不與同姓同車與異姓同車不同服皆是合避處子婦孝者敬者父母舅姑之命勿逆勿怠若飲食之雖不耆必嘗而待加之衣服雖不欲必服而待加之事人代之己雖弗欲姑與之而姑使之而后復之鄭氏曰勿逆勿怠恐恃其孝敬之愛或時違解也嘗而待待後命而去服而待待後命釋藏也加之事人代之己弗欲謂難其妨己業也姑與之姑使之姑且也逺懟怨於勞事孔氏曰此一節論子婦事父母舅姑受飲食衣服之事子孝於父母婦敬於舅姑或恐倚恃孝敬之心違逆其命意有怠惰其身故戒令勿逆勿怠也尊者以飲食與己已雖不愛必且嘗之待尊者後命令己去之而後去之尊者加己衣服己雖不欲必且服之待後命而藏去之尊者加己以事業事業欲成尊者又使人代己此事既嚮成不欲他人代己而難其妨己之業且與代己者之事而且使代己者為之待代己者休解而後復本事業於己身也嚴陵方氏曰唯孝故能於命勿逆唯敬故能於命勿怠勿逆則以順受之故也勿怠則以勤行之故也若必嘗而待必服而待則順受其命可知若姑與之而姑使之而后復之則勤行其命可知新安朱氏曰勿逆勿怠此謂不可變節以傷尊者平日慈愛之心也東萊吕氏曰既孝敬矣何必戒其逆怠蓋不孝不敬之人固不足責其逆怠惟孝敬之人事親至於與親相忘則慢心易生恐或至於逆怠故在所戒慶源輔氏曰父母舅姑之命或有未便而不能委曲將順之而遽逆之而遂怠焉猶未能盡愛敬之道也必如後所言然後可既加之事又使人代之己雖不欲人代己然不可不順父母之命故姑與之而姑使之而后復之者終以身親之也是之謂勿逆勿怠子婦有勤勞之事雖甚愛之姑縱之而寧數休之子婦未孝未敬勿庸疾怨姑教之若不可教而后怒之不可怒子放婦出而不表禮焉鄭氏曰寧數休之不可愛此而移苦於彼也庸之言用也怒譴責也表猶明也猶為之隱不明其犯禮之過也孔氏曰此論尊者接待卑者之禮子婦有辛苦勤勞之事父母舅姑素雖甚愛此勤勞之子婦且緩縱之寧可數數休息此所愛子婦不可移此勤勞於他不愛之子婦也不可怒謂雖責怒之而不從命者子被放逐婦被出棄猶為之隱也嚴陵方氏曰子婦有勤勞之事甚愛之姑縱之而寧數休之則彼共為子婦之職而吾不可以愛故奪之也子婦未孝未敬勿庸疾怨則為傷恩故也慶源輔氏曰子曰愛之能勿勞乎勤勞之事若遽止之是姑息之愛也子婦未孝未敬勿庸疾怨而康而色皇極之道也載色載笑魯侯之德也是皆有父母之心也子婦放逐不得已也不表禮焉是猶有不忍之心也東萊吕氏曰明言其惡而出之之謂表父母愛子之心舅姑待婦之禮雖彼有過猶欲遮護故放出而不明言其所以過金華應氏曰自子婦孝者敬者而下勉子婦之孝於父母舅姑也自子婦有勤勞之事而下勉父母舅姑之慈於子婦也兩者交盡其道而孝慈之歡交結而不可解矣父母舅姑之命或未盡合乎理惟當順焉而不逆或不克堪其勞惟當勉焉而勿怠味偶不甘而必嘗衣偶不稱而必服徐而待之則親知其果非所安而不可强也加己以事而又代之以人己勿吝而不付亦姑與而姑使之待夫人之果不克勝而後復之亦不敢辭其難也是非故為矯情蓋委曲以行其意雖至親之間亦有不容以直遂者必如是而後無所拂也父母有過下氣怡色柔聲以諌諌若不入起敬起孝說則復諌不說與其得罪於鄉黨州閭寧孰諌父母怒不說而撻之流血不敢疾怨起敬起孝鄭氏曰子事父母有隱無犯起猶更也子從父之令不可謂孝周禮曰二十五家為閭四閭為族五族為黨五黨為州五州為鄉撻擊也孔氏曰此一節論父母有過子諌諍之禮犯顔而諌使父母不說其罪輕畏懼不諌使父母得罪於鄉黨州閭其罪重二者之問寧可孰諌謂純孰殷勤而諌若物之成孰然東萊吕氏曰下氣怡色柔聲此六字非特事父母當然凡處己待人能體此六字則見孔子鄉黨氣象起敬起孝蓋我孝敬之心無間斷隨遏隨起故雖父母不從吾諌至於怒至於撻之流血亦起敬起孝常自若起非起止之起只是遏捺不住嚴陵方氏曰前言怡聲此言怡色前言柔色此言柔聲則聲色皆欲柔而怡也起敬起孝言孝敬之心有加而無己也說則復諌坊記所謂微諌不倦是矣子從親之令不可為孝故寧孰諌孰則不暴孔子所謂事父母幾諌者此也上言鄉黨州閭者與曲禮言稱其孝同意撻之至於流血猶不敢疾怨而况其餘乎自非孝敬之至何以及此故每言起敬起孝焉馬氏曰孟子云親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也荀子曰可以從而不從是不子也未可以從而從是不衷也不子不孝也不衷亦不孝也夫明乎從不從之義而以恭行之然後可以諌明乎怨不怨之理而以愛守之然後可以怨故孔子曰事父母幾諌見志不從又敬不違勞而不怨父母有過下氣怡聲以諌所謂幾諌也諌若不入起敬起孝所謂見志不從又敬不違也不敢疾怨所謂勞而不怨也然則小辨何以怨𫝊云非所怨不怨則怨出於親之也父子天性也而不若栁蜩淵葦之循其自然之理此其所以若窮人之反歸而不知所届也建安真氏曰起者悚然興起之意孰者反復純孰之謂不諌是陷其親於不義得罪於州里等而上之諸侯而不諌則使其親得罪於國人天子而不諌則使其親得罪於天下是以寧孰諌也怒而撻之猶不敢怨况下於此者乎諌不入起敬起孝諌而怒亦起敬起孝敬孝之外豈容有他念哉豈容一息忘哉是說也聖人著之論語矣曰事父母幾諌見志不從又敬不違勞而不怨事親者當合二書而思焉慶源輔氏曰下氣怡色柔聲所以自牧也起敬起孝所以自䇿也自牧則無戾心自䇿則無倦意諌而父母不悅非己之罪也不諌而鄉閭責焉則己之罪也山隂陸氏曰事若小辨雖怨可也父母有婢子若庶子庶孫甚愛之雖父母沒沒身敬之不衰子有二妾父母愛一人焉子愛一人焉由衣服飲食由執事母敢視父母所愛雖父母沒不衰子甚宜其妻父母不說出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰鄭氏曰婢子所通賤人之子由自也宜猶善也孔氏曰此一節論父母有婢子庶子庶孫父母所愛己亦愛之并明己有妻妾彼父母之所愛己亦當愛之由衣服飲食由執事為自己所愛妾衣服飲食及執事也宜其妻者謂與之相善出謂出去案大戴禮婦有七出不順父母去無子去淫去妬去有惡疾去口多言去竊盜去不順父母為逆德也無子為其絶世淫為亂族妬為亂家有惡疾為其不可共粢盛也口多言為其離親竊盜為其反義婦有三不去有所受無所歸不去曽經三年喪不去前貧賤後富貴不去嚴陵方氏曰婢子婢之子也與曲禮自稱曰婢子異矣執事所執之事也事有難易勞逸故也於父母所愛之人猶若是况父母之身乎父母沒猶不衰况父母之存乎桃夭言宜其室家則夫婦之際欲其相宜而已故此言宜與不宜凡以愛憎在父母而未嘗在己故也慶源輔氏曰吾親有存沒吾心無遷改吾之姪視吾之兄弟姪與妻則有間焉故易其辭曰雖父母沒不衰然不以親之存沒二其心則一也山隂陸氏曰言沒身不衰妻也即妾雖父母沒衰可也金華應氏曰婢子賤微而可遺庶孽賤微而可忽然父母有所鍾愛焉非特加愛而又當加敬可也然婢子父母之所使令庶孽父母之所生育是固所當聽命至於妻妾之切近吾身者而亦不敢不聼焉妾雖吾所甚愛不敢與父母所愛者敵妻雖吾所甚宜不敢以父母不悅而留茍父母以為善子之情雖替而夫婦之禮不可不行也夫婢子父母之所使令庶孽父母之所生育是猶易以順聽妻妾吾所親昵亦唯父母是聽知有親而不知有己也父母沒而不衰蓋雖沒而念之愈深則其敬與愛宜其不衰也禮記集說卷六十九
