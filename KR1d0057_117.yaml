body:
  text: 禮記集說卷一百十七宋衛湜撰經解第二十六孔氏曰案鄭目録云名曰解經者以其記六藝政教之得失也此於别録屬通論皇氏曰解者分析之名此篇分析六經體教不同故云經解六經其教雖異總以禮為本故記者録入於禮橫渠張氏曰經解文字明白人易見則喜入然所得少直舉其大端使人推廣則所得多也延平周氏曰此一篇蓋有先後之序夫入國知教而其所以為教者出乎六經六經雖可以為教然茍非其人道不虛行則行之必資乎天子為天子者必有以求於性命之理而防於非僻之情既內有以求於性命之理而外又有以防於非僻之情則能知能仁能信能義有是四者而正國必以禮為主禮既隆矣則天下徙善逺罪而不自知至於徙善逺罪而不自知則非天下之至神其孰能與於此然於其終也必思其始故曰君子慎始差若毫釐繆以千里嚴陵方氏曰經者緯之對經有一定之體故為常緯則錯綜往來故為變聖人之言道之常也諸子百家之言道之變也故聖人之言特謂之經焉孔子曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂鄭氏曰觀其風俗則知其所以教屬猶合也春秋多記諸侯朝聘㑹同有相接之辭罪辨之事失謂不能節其教者也詩敦厚近愚書知逺近誣春秋習戰爭之事近亂孔氏曰經解一篇總是孔子之言人君以六經之道各隨其民教之民從上教各從六經之性觀民風俗則知其教也顔色溫潤情性和柔依違諷諫不指切事情故云溫柔敦厚詩教也書録帝王言誥舉其大綱事非繁密是疏通上知帝皇之世是知逺樂以和通為體無所不用是廣博使人從化是易良也易之於人正則獲吉邪則獲凶不為淫濫是潔靜窮理盡性言入秋毫是精微禮以恭遜節儉齊莊敬謹為本人能恭敬節儉是禮之教也春秋聚合會同之辭是屬辭比次褒貶之事是比事比近也六經之教若不節之則詩主敦厚失在於愚書知久逺失在於誣樂主廣博和易失在於奢易主潔靜嚴正失在於賊害禮主文物恭儉莊敬失在於煩苛春秋習戰爭之事失在於亂此皆謂人君用之教下不能可否相濟節制合宜所以致失也詩為樂章詩樂是一而教别者若以聲音干戚教人是樂教也若以詩辭美刺諷諭以教人是詩教也長樂劉氏曰此經言周衰之時諸侯之國雖不能逮文武之世猶能各通一經以化其民故孔子厯聘之時入其國而其教可知言觀其君之為人也詩有諷有刺不諂不傷是直而能溫柔而能立也有頌有美止乎禮義無過美也無虛頌也是敦厚也推此為政以化其民則不愚愚謂不知其上之美惡而無以美刺之也二帝三王政治始末詔誥精微足以曉諭天下俾知所適則人人反情以復性棄塞以就通是疏通知逺而不誣也先王作樂所以恱民之心使之安行於禮義也故禮行然後樂舉義著然後人安所以風俗移於禮義而不知其所自也其化之廣如天之覆其德之溥如地之載推其所自來莫非出於和易善良之心焉用此化民則樂於行禮豈有奢僣而踰矩者哉夫易極深而研幾盡性以至命其德之潔靜也如空虛之不可汙其化之精微也如隂陽之不可究則民不敢自欺於幽隱矣又可詐妄以自賊哉卑已以尊人恭也厚人而薄已儉也著誠而去僞莊也正心以修身敬也以此教民則莫不自防其僞豈有煩謬之尚哉古者編年之史皆曰春秋仲尼未作已列為經矣春秋之法貴書其實以誅暴亂以此教民則人知執其誠信動遵禮法孰敢紊亂於王綱而悖謬乎五品也凡此六者以言周道雖衰而諸侯之為國猶有如此者亦文武之餘風遺烈也若夫禮樂政刑以範其民於五品而致之中和乃出自天子而行之諸侯四海同風非有國異其教而家殊其俗也文武之道既墜於地諸侯之賢者習乎六經以治其國其不賢者雖知用經而不免其失故其君與民不愚則誣不奢則賊不煩則亂此列國所以君不君臣不臣父不父子不子而春秋作於仲尼也嚴陵方氏曰詩言其志書言其事樂言其情易言其道禮言其體春秋言其法莊子曰詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分其義正與此合六經之教先王之所以載道也其教豈有失哉然或不免於失者由其有淺深之異爾若夫得之深則不至有失矣馬氏曰先王一道德以同天下之俗而國不異教者省方觀民而不易其宜故也是故入其國其教可知也其教可知者知其所以為教之不同也蓋天生蒸民莫不有善性循而達之者教也所以為教者六經而已六經者道德性命之理藏於其中而其體不同辭者事之華事者辭之實故屬辭比事則春秋之體蔽於溫柔敦厚而不知通之以權所以為愚蔽於疏通知逺而不知疑而闕之所以為誣蔽於廣博易良而不知禮以節之所以為奢蔽於潔靜精微而不知有以顯之則失之賊也蔽於恭儉莊敬而不知有以神之則失之煩也蔽於屬辭比事而不知有以謹之階其僣上之患則失之亂也雖然六經之道無所失也而其所以失者由上之教有以失之而已山隂陸氏曰詩性情也故曰溫柔敦厚書政事也故曰疏通知逺以此洗心是謂潔靜春秋夫子之文章也事有不可勝言上下比義從可知而尤已在於此先儒曰春秋無傳而著甚幽而明雖游夏之徒不能措一詞是之謂屬詞比事故曰五石六鷁之詞不設則王道不亢矣詩之事近易之事深故詩之失愚易之失賊不言失之而言之失者六經無失也學者之失而已書之失誣如孟子所謂以至仁伐不仁何其血之流杵也詩敦厚近愚樂廣博近奢禮恭儉近煩春秋撥亂多權宜故其失亂石林葉氏曰教者上所以勉下經者所以助成其教也詩之規刺嘉美要使人歸於善而已仁之事也故其教則溫柔敦厚書之紀述治亂要使人考古驗今而已智之事也故其教則疏通知逺樂能和同天下之際其教也動蕩血脈流通精神故廣博易良易能順性命之理其教也吉凶與民同患而退藏於密故潔靜精微禮節民心其教也使人飾貌以正其行故恭儉莊敬春秋言約而意隱其教也使人美不過實貶不損美故屬辭比事蓋詩書以政教之本而為序樂與易以道德之妙而為序禮與春秋以治人修身之事而為序六者之失蓋不深窮其理故也易曰唯深也故能通天下之志長樂陳氏曰大樂必易廣博易良而不奢深於樂教者也大禮必簡恭儉莊敬而不煩深於禮教者也然奢者樂之失煩者禮之失極其深救其失則禮樂之教常興而不廢然則入其國其教有不知之耶講義曰周衰為諸侯者不能以經術教其國人故人不知經而國之所以不治也入其國其教可知者謂諸侯受命入其國而為君其教人之道不難知也凡為人欲知詩之教則溫柔敦厚是已以詩之作或美或刺其言皆溫潤優柔而不迫而其意畢歸於忠厚故也書之教則疏通知逺是已以書之所載皆古先君臣之事坦然明白可考而知故也樂之教則廣博易良是已以雅頌之聲聽之則志意廣使人易直子諒之心油然而生故也易之教則潔靜精微者是已以易之書使人知吉凶悔吝而置其身於無過之地以造夫窮理盡性之妙故也禮之教恭儉莊敬者是已以禮之所貴不在乎他在乎繁文末節之間而一本於誠故也春秋之教則屬辭比事者是已以春秋所書皆當時事辭之實而是非善惡足以使人知所勸戒故也人不學詩則無所興廢猶面牆然故愚不學書則妄意古人無所稽考故誣不學樂則姦聲亂色慆堙心耳故奢不學易則日用之間動必有吝是自賊矣不學禮則倫理不明事為無序斯煩紊矣至於春秋之不學則又往往陷於惡而不自知烏得而不亂乎使為人而知六經之道不可不學而無是六者之失未有不深於經者矣深於經而不為賢人君子者未之有也為君者誠能以是而教人則國有不足為者矣後世守一郡者尚能以其一二變巴夷而為鄒魯則周之諸侯獨不可以此言施之國乎三綱五常之不舉而亂臣賊子接跡於天下由經術之不講耳失謂不學也金華應氏曰醇厚者未必深察情僞故失之愚通達者未必篤確誠實故失之誣寬博者未必嚴立繩檢故失之奢沈潜思索多自耗蠧且或害道弄筆褒貶易紊是非且或召亂樂正崇四術以訓士則先王之詩書禮樂其設教固已久易雖用於卜筮而精微之理非初學所可語春秋雖本其紀載而策書亦非民庶所得盡窺故易象春秋韓宣子適魯始得見之則諸國之教未必盡備六者蓋自夫子刪定贊繫筆削之餘而後傳習滋廣經術流行夫子既廣其所傳而又慮其所敝故有此言然入其國即知其教非見逺察微者不能也觀其教即防其失非慮逺防微者不能也延平周氏曰詩者人之所以興故先之既興矣則事之所以辨故書次之事既辨矣則和之所以成故樂次之既成矣則極乎天道之髙明故易次之既極矣則必遵乎人道之中庸故禮次之而必終於春秋者以救亂反正為餘事也其為人也溫柔敦厚而不愚則深於詩者也疏通知逺而不誣則深於書者也廣博易良而不奢則深於樂者也潔靜精微而不賊則深於易者也恭儉莊敬而不煩則深於禮者也屬辭比事而不亂則深於春秋者也鄭氏曰言深者既能以教又防其失山隂陸氏曰周官曰教國子以六德知仁聖義中和蓋兼之矣疏通知逺知也溫柔敦厚仁也潔靜精微聖也屬辭比事義也恭儉莊敬中也廣博易良和也天子者與天地參故德配天地兼利萬物與日月並明明照四海而不遺微小其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環佩之聲升車則有鸞和之音居處有禮進退有度百官得其宜萬事得其序詩云淑人君子其儀不忒其儀不忒正是四國此之謂也鄭氏曰道猶言也環佩佩環佩玉也所以為行節也玉藻曰進則揖之退則揚之然後玉鏘鳴也環取其無窮止玉則比德焉孔子佩象環五寸人君之環其制未聞也鸞和皆鈴也所以為車行節也韓詩內傳曰鸞在衡和在軾前升車則馬動馬動則鸞鳴鸞鳴則和應居處朝廷與燕也進退行步與升車也孔氏曰自此至則不成一節盛明天子霸王唯有禮為霸王之器言禮之重也天地生養萬物天子之功與天地相參此鸞和所在謂朝祀所乘之車若田獵之車則鸞在鑣也故詩秦風云輶車鸞鑣箋云置鸞於鑣異於乘車是乘車鸞在衡也經引詩曹風鳲鳩之篇言善人君子用心均平威儀不有差忒故能正此四方之國詩之所云正聖人有禮之謂也長樂陳氏曰與天地參言其體敵也德配天地言其道同也兼利萬物言其化溥也與日月並明明照四海而不遺微小言其政術也又樂書曰天子在朝廷之上由仁聖禮義之序在閨門之內聽雅頌之音行步於堂有環佩之聲升車於道有鸞和之音確乎鄭衛不能入也嚴陵方氏曰鸞和己見玉藻解三而成之謂之參言天子之成位也兩而合之謂之配言天子之合德也配言德而參不言位者曰天子固知其為位矣與天地參故能德配天地兼利萬物日月並明故能明照四海不遺微小利欲有所周故言兼明必有所合故言並微者顯之對小者大之對言其理則曰微言其形則曰小朝廷則向明而治之時也燕處則向晦而息之時也向明之時所以成物故道仁聖禮義之序向晦而息所以成已故聽雅頌之聲如上所云則居處有禮矣進退有度矣百官化之而得其用舍之宜萬事從之而得其先後之序也故又引鳲鳩之詩以證之單出為聲雜比為音或曰聲或曰音互相備也禮所以體上下居處則有上下之位焉故曰禮度所以度長短進退則有長短之象焉故曰度見曲禮解石林葉氏曰兼萬物而同之利萬物而和之所謂致廣大而極髙也四海之內一微塵一毫末皆明照而不遺所謂盡精微而極明也朝廷有所道燕處有所聽則曰居處有禮凡仁聖雅頌皆是也行步有聲升車有音則曰進退有度凡環佩鸞和皆是也尊賢使能俊傑在位故百官得其宜物有本末事有終始知所先後故萬事得其序自天子與天地參而至微小不遺皆聖人與天地為徒也自其在朝廷而至萬事得其序皆聖人與人為徒也馬氏曰朝廷者論道有為之所在故道仁聖禮義之序燕處者燕息無為之所在故聽雅頌之音心中斯須不和不樂則鄙詐之心入之矣故行步有環佩之聲以節之升車有鸞和之音以和之外貌斯須不莊不敬則易慢之心入之矣故居處則有禮進退則有度自與天地參推而詳之至於居處有禮進退有度其所以治己之道盡矣然而君為之則臣行之上好之則下從之是故百官之貴賤各得其宜萬事之先後各得其序傳曰言思可道行思可樂德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之其意同山隂陸氏曰謂之環佩上玉也故以環該之傳曰衛南子佩環璆然引鳲鳩詩言雖有六經之教如上所謂又當有君如此書曰天佑下民作之君作之師講義曰天地有大德以生養萬物天子有大德以兼利萬物則足以配之矣兼利者無所不利也夫心本無量固自有天地之德性本無蔽固自有日月之明然不有以制於外而養其中則邪德以入而私意且萌矣向之本無量者遂有所拘係本無蔽者遂至於昏蒙其能兼利萬物而明照四海乎故自道仁聖禮義以下所以制於外而養其中也人君所用非一人所行非一事然其要不出乎吾之一心中既有所養以之觀人則邪正自判因而任之百官何往而不得其宜以之處事則利害自明舉而措之萬事何往而不得其序然則君養源於上而百官為之任事於下所謂利萬物而照四海者蓋在於此矣發號出令而民說謂之和上下相親謂之仁民不求其所欲而得之謂之信除去天地之害謂之義義與信和與仁霸王之器也有治民之意而無其器則不成鄭氏曰器謂所操以作事者也義信和仁皆存乎禮孔氏曰明君在上民不須營求所欲之物自然得之是在上覆養也尚書傳稱民擊壤而歌鑿井而飲耕田而食帝有何力是不求其所欲也天不言而四時行是信天地之害謂水旱疾疫之屬及天地之內有惡事害人是也欲作事物必先利其器霸王必須義信和仁也嚴陵方氏曰發則能散故於號曰發出則無反故於令曰出信則可必矣故民不求其所欲而得之義則有制矣故除去天地之害夫衣食者民之所欲也先王井其田以使之足食畞其桑以使之足衣衣食雖得其所欲矣豈求而後豫之哉此民不求其所欲而得之也除去天地之害若禦大菑捍大患之類是矣既曰除又曰去者人除之而後其害去也霸王之意主乎治民而已茍非四者以用之於外安能成其意乎夫相濟然後能相愛故先和而後仁可必而後有制故先信而後義左氏以親有禮因重固閒攜二覆昏暴為霸王之器蓋親有禮所以為仁因重固所以為和閒攜二所以為信覆昏暴所以為義名雖不同義則一也夫王之與霸其所以用者則同而所以名者則異何也蓋其心異而已王者之道其心非有求於天下也所以為仁義和信者以為吾所當為而已知為之於此而不求之於彼而彼固已化矣霸者則心未嘗仁也而患天下惡其不仁於是示之以仁其心未嘗義也乃患天下惡其不義於是示之以義至於和信亦若是而已是故霸者之心為利而假王之道以示所欲為及其有為也唯恐民之不見而天下之不聞也故曰其心異也馬氏曰號令之出適當人心而可否有以相濟和之至也親親者仁之始上下相親者仁之終上下之勢尊卑異宜而有以相親者以其上有恩以恤下下有力以衛上歡然有恩以相愛故謂之仁有餘則賂之不足則求之相滋以濕相濡以沫而以為信皆信之末也至於民不求其所欲安其居樂其俗至於老死而不相往來則信之極也不求其所欲而得之者有以興其利也有以興其利而其害不可以不去則又卒之以除去天地之害謂之義孟子曰驅虎豹犀象而逺之而天下大恱周官鳥獸之害人者莫不有職凡以此而已延平周氏曰義與信和與仁得其變者則霸之器也得其正者則王之器也發號出令而民恱則上下相親上下相親則民不求其所欲而得之民不求其所欲而得之則天地之害所以除去山隂陸氏曰上下相親謂之仁而已仁不盡此其餘同義去其所不宜信與其所當得天台陳氏曰按鬻子書曰發號施令為天下福者謂之道上下相親謂之和民不求而得所欲謂之信除去天下之害謂之仁仁與信和與道帝王之器也其四字雖略異同亦不害義但霸王之器作帝王之器㫖意宏矣騤禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可誣以姦詐是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序孔子曰安上治民莫善於禮此之謂也鄭氏曰衡稱也縣謂錘也陳設謂彈畫也誠猶審也或作成隆禮謂盛行禮也方猶道也春秋傳曰教之以義方孔氏曰此一節贊明禮事之重治國之急若稱衡詳審縣錘則輕重必正繩墨審能陳列則曲直必當規所以正圜矩所以正方若詳審置設則方圜必得故皆云不可欺君子能詳審於禮則姦詐自露不可誣罔也敬讓之道也為下文而起從篇首至此皆是孔子之辭記者乃引孔子孝經之辭以結之引春秋傳見左氏隱三年長樂劉氏曰隆禮者尊崇之以為民表也由禮者踐迪之以為民範也方者法也可以法者曰士無以法者曰民則敬與讓者所以使民表而範之之道歟嚴陵方氏曰衡用權以角物而權繫以絲言衡而不言權則以縣見之故也繩之所彈墨之所畫故曰陳姦者不正詐者不誠禮所以止邪去僞故不可誣以姦詐隆言隆之而髙由言由乎其中道無方也體之於禮則為有方此以禮為主故謂之方焉士志於道故於有方曰士民無常心故於無方曰民敬則不慢讓則不爭禮雖經而為三百曲而為三千其道不過如是故曰敬讓之道也宗廟尚嚴故曰敬朝廷尚爵故言貴賤有位室家尚親故言父子親兄弟和鄉里尚齒故言長幼有序奉者奉上之辭入者入內之辭鄉里室家皆人之所居而已故每以處言之安上治民者言上則知有下言民則知有君上下以分言君民以名言也禮所以辨名分而已名分既辨而民不犯君則居上者得以安而不危上不逼下則為民者得以治而不亂故曰安上治民莫善於禮者也馬氏曰衡也繩墨也規矩也所以喻乎禮輕重也曲直也方圜也所以喻人情為國必以禮則民有格心而事無失當猶衡之於輕重繩墨之於曲直規矩之於方圜皆無失其當也大匠生規矩而不能捨規矩以正方圜君子者禮義之所自出而不能捨禮義以正國故君子審禮不可誣以姦詐夫人藏其心不可測度也美惡皆在其心而不見其色欲一而窮之者在乎禮君子審禮則有節於內而觀萬物之變則賢不肖之別其能廋乎哉隆之者在於心由之者在於迹隆者本之也由者用之也山陰陸氏曰衡不言權權義之事也繩墨言陳有卷而藏之故也以君子審禮變欺言誣可欺不可誣也不隆禮言不隆禮不由禮行不由禮朝廷尚爵禮於此位貴賤父子親仁也兄弟和義也鄉里尚齒禮於此序長幼石林葉氏曰繩墨規矩權衡用不以誠則曲直方圜輕重不能無欺姦者詖行詐者巧言雖於禮不可誣而君子用之亦不可不審故其譬則權衡誠縣繩墨誠陳規矩誠設也隆言其推而髙由言其遵而行方言其有所向廬陵胡氏曰權衡輕重之至繩墨曲直之至規矩方圜之至禮為中正之至故曰誠誠猶至也誠則不可欺矣方常也下云有位有序是有常也易恆卦君子立不易方延平周氏曰敬讓之道莫重乎宗廟不能奉宗廟則不能入朝廷不能入朝廷則不能處室家不能處室家則不能處鄉里此其輕重之序也故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也昏姻之禮所以明男女之別也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患鄭氏曰春見曰朝小聘曰問其篇今亡昏姻謂嫁娶也壻曰昏妻曰姻自亦由也孔氏曰此經明禮之所用各有所主又明舊禮不可不用之意自此以下記者廣明安上治民之義非復孔子之言也爾雅釋親云壻之父為姻婦之父為昏據男女父母鄭注據男女之身壻昏時而迎婦則姻而隨之也由從也禮於亂生之處則豫禁之坊謂堤坊止約水從來之處則豫坊障之坊壞則水必來敗於産業也謂舊禮無用而壞去之則必有亂患嚴陵方氏曰君臣之亂生於無義故以朝覲之禮禁之諸侯之亂生於不相尊敬故以聘問之禮禁之臣子之亂生於無恩故以喪祭之禮禁之以至鄉飲酒之施於長幼昏姻之施於男女其義亦若是而已故曰禮禁亂之所由生也夫坊積土而成故以比禮水之為物小有浸潤之行大有淪胥之敗故以比亂揚子曰川有坊見禮教之至非謂是乎周官行人凡諸侯之邦交嵗相問也殷相聘也故聘問之禮所以使諸侯相尊敬三年之喪四時之祭臣子之所以報君父者盡於此故喪祭之禮所以明臣子之恩馬氏曰春曰朝秋曰覲天子與諸侯嫌於無分諸侯朝覲以述職然後君臣之義明大曰聘小曰問諸侯相厲以禮上有以字於下下有以承於上則不相侵陵而相尊敬也臣子之於君親無所不盡其恩尤見於喪祭之禮為其死者人之所惡而為喪禮以終之足以見其不倍逺者人之所略而為祭禮以鬼饗之足以見其不忘故曰所以明臣子之恩也鄉飲所以尚齒故席則有上下豆則有多寡皆所以明長幼之序也昏姻所以重禮故執贄而後見敬慎重正而後相親皆所以明别也石林葉氏曰五者坊民之具雖更百世非為舊也要其文質不同則帝王有不相沿襲者亦以趨時也講義曰自有天地即有此禮君臣父子夫婦長幼皆人日用常行非有新竒特異足以聳動人之耳目則人以為舊而去之者多矣然亂患不生有舊禮而人不以為功去之而亂患生然後知禮之不可去水患不作有舊坊而人不以為功壞之而水為患然後知坊之不可無故曰禮之教化也微延平周氏曰禮可以義起而古之人未嘗無損益至於大倫大要則不可以為無所用而去之也蓋去之則亂患之所由生故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬬之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣鄭氏曰苦謂不至不答之屬孔氏曰此明禮諸事不可廢廢則禍亂興也鄭注不至謂夫親迎而女不至若詩陳風云昏以為期明星煌煌是也不答謂夫不答於婦若弼風日月莊姜傷已不見答於先君是也鄉飲酒禮明上下長幼共相敬讓今若廢而不行則尊卑無序故爭鬬之獄繁多矣喪祭之禮所以敦勗臣子恩情使死者不見背違生者常相存念若廢不行故臣子恩薄而死者見背生者被遺忘如此者多故云衆矣倍畔謂據倍天子也侵陵謂侵陵鄰國此經覆說前經據人倫急切者在前先昏姻次以鄉飲酒乃至於聘覲也合言聘覲者以其君臣位失倍畔侵陵其惡相通嚴陵方氏曰淫則為過辟則不正爭則不止其所鬬則互相攻治夫婦之道苦者言不和也詩谷風刺夫婦失道而曰誰謂荼苦其甘如薺則甘苦固所以言夫婦之道也前則以朝覲聘問為之首而後及於喪祭鄉飲酒昏姻至此一皆反之者以明其禮之廢由失其序故也山隂陸氏曰言明先朝覲使明自上始言廢先昏姻使廢自下始朝覲聘問前離而為二今合而為一者二者相為廢興也延平周氏曰言禮之行而有以明於天下則始乎君臣而及乎在內者言禮之廢而無以明之則始乎夫婦而及乎在外者此行法所以始乎貴者而治天下所以本於家之意也石林葉氏曰朝覲聘問在上者之事而民不與焉故言禁亂則始於朝覲者以安上者為序昏姻雖在上者制之而民得與焉故言廢禮則始於昏姻者以治民者為序蓋天下治而後君臣得以正位其亂也常在於袵席此其所以成終而所以成始也朝覲聘問上下之禮雖不同而尊謹之道一也故言倍畔侵陵而皆曰敗昏姻鄉飲內外之禮雖不同而親睦之道一也故言淫辟爭鬬則曰罪曰獄蓋民違於禮有罪而加以刑有訟而至於獄則可得而治在上者違於禮則有僣逼而已故倍畔忘君者也侵陵圖君者也故禮之教化也微其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也易曰君子慎始差若豪氂繆以千里此之謂也鄭氏曰隆謂尊盛之也始謂其微時也孔氏曰引易繫辭文言事之初始差錯若豪氂之至小後廣大錯繆以致千里之大證禮當防於初也嚴陵方氏曰室家者人之所願也因其所願而為之昏禮則足以别男女飲食者人之所欲也因其所欲而為之鄉禮則足以序長幼以至喪祭聘覲亦若是而已此教化所以為微也以其微故能止邪於未形以其止邪於未形故使人日徙善逺罪而不自知也先王隆之其以是歟石林葉氏曰禮不體則其教化微微者形而未大者也教以使人效之化以使人遷之故徙善而不自知其止邪也於未形未形者有形之兆也止於將兆則人知捨彼以就此故曰逺罪而不自知先王隆禮其效若此山陰陸氏曰所謂刑者侀也其於教化粗矣引易今無之蓋連山歸藏之詞差於近也微繆於逺也大所謂繆以千里其幾蓋如此禮記集說卷一百十七
