body:
  text: 禮記集說禮類三禮記之屬提要臣等謹按禮記集說一百六十卷宋衛湜撰湜字正叔吳郡人其書始作於開禧嘉定間自序言日編月削幾二十餘載而後成寶慶二年官武進令時表上於朝得擢直祕閣後終于朝散大夫直寶謨閣知袁州紹定卒卯趙善湘為鋟板于江東漕院越九年湜復加校訂定為此本自作前序後序又自作跋尾述其始末甚詳蓋首尾閲三十餘載故采托羣言最為賅博去取亦最為精審自鄭注而下所取凡一百四十四家其他書之涉于禮記者所採録不在此數焉今自鄭注孔疏而外原書無一存者朱彛尊經義考採托最為繁富而不知其書與不知其人者凡四十九家皆賴此書以傳亦可云禮家之淵海矣明初定制乃以陳澔注立于學官而湜注在若隱若顯間今聖朝欽定禮記義疏取于湜書者特多豈非是非之公久必論定乎又湜後序有云他人著書惟恐不出于己豫之此編惟恐不出于人後有逹者毋襲此編所己言沒前人之善也其後慈溪黃震讀禮記日抄新安陳櫟禮記集義詳解皆取湜書刪節附以己見黃氏融滙諸家猶出姓名于下方案此見黃氏日鈔陳氏則不復標出案櫟書今不傳此見定字集中櫟所作自序即此一節非惟其書可貴其用心之厚亦非諸家所及矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀禮記集說序人生而莫不有仁義之性存乎其心經禮三百曲禮三千聖人稟諸天地所以合內外之道而節文乎仁義者也自周衰諸侯去籍雖以二代之後而不足徴猶賴夫子之所雅言羣弟子之所記録故尚有存者逮是古挾書之令作而禮再厄又得河間獻王二戴馬鄭相與保殘補壞晉宋隋唐諸儒迭為發揮三禮得不盡亡自正義既出先儒全書泯不復見自列於科目博士諸生亦不過習其句讀以為利祿計至金陵王氏又罷儀禮取士僅存周官戴記之科而士習於禮者滋鮮就戴記而言如檀弓喪禮諸篇既指為凶事罕所記省則其所業僅一二十篇耳茍不得其義則又諉曰此漢儒之說也棄不復講所謂解說之詳僅有方馬陳陸諸家然而述王氏之說者也惟關洛諸大儒上接洙泗之傳乃僅與門人弟子難疑答問而未及著為全書嗚呼學殘文闕無所因襲驅一世而冥行焉豈不重可嘆與平江衛氏世善為禮正叔又自鄭注孔義陸釋以及百家之所嘗講者㑹稡成書凡一百六十卷如范􅑔何晏例各記其姓名以聽覽者之自擇此非特以備禮書之闕也灑掃應對進退恭敬辭遜撙節非由外心以生也非忠信之薄也非人情之僞也凡皆人性之固有天秩之自然而非有一毫勉强增益也學者誠能即是僅存而推尋之內反諸心隨事省察充而至於動容周旋之㑹揖遜征伐之時則是禮也將以宅天衷而奠民極豈形器云乎哉正叔名湜自號櫟齊今為武進令云寶慶元年冬十有一月甲申臨卭魏了翁序禮記集說序禮記四十九篇自二戴分門王鄭異注歷晉迄陳雖南北殊隔家傳師授代不乏人唐正觀中孔頴達等詳定疏義稍異鄭說罔不芟落諸家全書自是不可復見繇正觀至五代踰三百年世儒競攻専門之陋學禮者幾無傳矣本朝列聖相承崇顯經學師友淵源跨越前代故經各有解或自名家或輯衆說逮今日為尤詳禮記並列六籍乃獨闕焉諸儒間嘗講明率散見雜出而又窮性理者略度數推度數者遺性理欲其參考並究秩然成書未之有也豫晚學孤陋濫承緒業首取鄭注孔義翦除蕪蔓採托樞要繼遂博求諸家之說零篇碎簡收拾略遍至若說異而理俱通言詳而意有本抵排孔鄭援據明白則亦併録以俟觀者之折衷其有沿襲陳言牽合字說於義舛駁悉置弗取日編月削幾二十餘載而後成凡一百六十卷名曰禮記集說傳禮業者茍能因衆說之淺深探一經之㫖趣詳而度數精而性理庶幾貫通而盡識之矣或曰是書稡聚諸家之善逾數十萬言毋乃務博而忘約乎豫曰博學之審問之夫子嘗以誨人也博我以文約我以禮顔子親得於師也博學而詳說之將以反說約也孟子之所深造也吾道一以貫之為曽子言之也豫欲無言子貢有未省也陵節而求躐等而議越見聞以談卓約後學大患也矧㑹禮之家名為聚訟儻率意以去取其能息異同之辨絶將來之譏乎近世朱文公著詩傳多刋削前言張宣公謂諸先生之見雖不同然自各有意在學者玩味如何爾蓋盡載程張吕楊之說而諸家有可取者亦兼存之豫之集說竊取斯義是則此書之博也非所以為學者造約之地邪猶愧寡聞訪論未盡然六經之典敷暢發明至是粗備或於聖代闕文小有補云寶慶丙戌七月既望吳郡衛湜正叔叙進禮記集說表臣湜言伏以私庭學禮妄嘗窮汗竹之勞昭代尊經竊欲效野芹之獻輒忘寡陋仰瀆睿聰臣惶懼惶懼頓首頓首惟六籍之指歸賴羣言之訓釋戴記雖云於後出漢儒備述於前聞制度文為炳若具陳道德性命燦然畢載儻非博習疇克兼通然俚箋臆說罕識其全故微辭奧㫖或幾於晦所可知也猶多闕焉臣蚤襲布韋濫承弓冶眷時恭儉莊敬之教頗得父兄師友之傳念藝著名場者僅止決科而業擅専門者又多膠柱乃考同而辨異爰撮要以芟繁孔鄭注疏孰是孰非程張講授或詳或約㑹稡略備編摩罔遺閲二十餘年其書始成凡四十九篇之義皆在可以施於新學庶有補於將來恭惟皇帝陛下天啓皇圖日新聖政謂家欲齊國欲治必謹範防而帝所興王所成不相沿襲若朝覲㑹同之品式與射鄉祀饗之等威方搜舉於縟儀以鋪張於景鑠有元老大臣以贊表章之盛有巨儒碩士以增緝熙之光雖簡斷以篇殘亦海涵而川納兹率録諸家之善庸冒塵乙夜之觀舉而錯之維其時矣名曰集解敢睎先哲之纂修悉上送官願備秩宗之採擇臣所編禮記集說一百六十卷謹繕寫成五十冊隨表上進以聞臣無任瞻天望聖激切屏營之至臣惶懼惶懼頓首頓首謹言統說孔氏曰禮記之作出自孔氏但正禮殘闕無復能明故范武子不識殽蒸趙鞅及魯君謂儀為禮至孔子沒後七十二子之徒共撰所聞以為此記或録舊禮之義或録變禮所由中庸是子思伋所作緇衣公孫尼子所撰鄭康成云月令吕不韋所修盧植云王制漢文時博士所録其餘衆篇皆如此例未能盡知所記之人周禮儀禮亦是禮記之書自漢以後各有傳授鄭君六藝論云案漢書藝文志儒林傳云傳禮者十三家唯髙堂生及五傳弟子戴德戴聖名在也又案儒林傳漢興髙堂生傳禮十七篇而魯徐生善為容孝文時徐生以容為禮官大夫瑕丘蕭奮以禮至淮陽太守孟卿東海人事蕭奮以授戴德戴聖六藝論又云五傳弟子者髙堂生蕭奮孟卿后蒼及戴德戴聖為五此所傳皆儀禮也今禮行於世者二戴之學也又云戴德傳禮八十五篇則大戴禮是也戴聖傳禮四十九篇則此禮記是也儒林傳又云大戴授琅邪徐氏小戴授梁人橋仁及楊榮仁為大鴻臚家世傳業其周官始皇深惡之至孝武帝時始開獻書之路既出於山巖屋壁復入祕府至孝成時劉歆校理祕書始識之知是周公致太平之道永平中杜子春能通其讀鄭衆賈逵往受業焉其後馬融鄭𤣥等各有傳授河南程氏曰禮記雜出於漢儒然其間傳聖門緒餘其格言甚多如樂記學記大學之類無可議者檀弓表記坊記之類亦甚有至理惟知言者擇之如王制禮運禮器其書亦多傳古意若閒居燕居三無五起之說文字可疑又曰禮記除中庸大學唯樂記為最近道學者深思自得之禮記之表記其亦近道矣乎其言正橫渠張氏曰禮記雖雜出於諸儒亦無害義處如中庸大學出於聖門無可疑者又曰禮記大抵出於聖門二三子之傳講解各異故辭命不能無害至如禮文不可不信己之言禮未必勝如諸儒如有前後所出不同且闕之記有疑義亦且闕之就有道而正焉又曰看得儀禮則曉得周禮與禮記又曰某舊多疑儒行今觀之亦多善處書一也已見與不見耳故禮記之有可疑者姑置之永嘉周氏曰禮經三百威儀三千皆出於性非僞貌飾情也天尊地卑禮固立矣類聚羣分禮固行矣人者位乎天地之間立乎萬物之上尊卑分類不設而彰聖人循此制為冠昏喪祭朝聘鄉射之禮以行君臣父子兄弟夫婦朋友之義其形而下者見於飲食器服之用其形而上者極於無聲無臭之微衆人勉之賢人行之聖人由之故所以行其身與其家與其國與其天下者禮治則治禮亂則亂禮存則存禮亡則亡上自古始下逮五季質文不同罔不由是然而世有損益惟周為備夫子嘗曰郁郁乎文哉吾從周逮其弊也忠信之薄而情文之繁林放問禮之本孔子欲從先進蓋所以矯正反弊也然豈禮之過哉為禮者之過也秦氏焚滅典籍三代禮文大壞漢興購書禮記四十九篇雜出諸儒傳記不能悉得聖人之㫖考其文義時有抵牾然而其文繁其義博學者博而約之亦可弗畔蓋其說也粗在應對進退之間而精在道德性命之要始於童幼之習而卒於聖人之歸惟達古道者然後能知其言能知其言然後能得於禮然則禮之所以為禮其則不逺矣延平周氏曰夫禮者性命之成體者也蓋道德仁義同出於性命而所謂禮者又出乎道德仁義而為之節文者也方其出於道德仁義則道德仁義者乃禮之本也故曰仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也方其為之節文則道德仁義反有資於禮也故曰道德仁義非禮不成嗚呼此禮之所以為禮者也若夫吉凶之殊軍賔之别其言不盡於意其意必寓於象故一服飾一器械有以存於度數之間者象也象則文也及推而上之有以見於度數之表者意也意則情也所謂意者歸於性命而已矣書曰天秩有禮自我五禮有庸哉蓋其以欲滅命以人廢天者聖人不為惟其天秩之所有是乃聖人之所庸者也然聖人之所以庸之者豈特使天下後世知有尊卑之分而茍自異於禽獸耶蓋又將為入道之資也聖人既沒禮經之殘闕久矣世之所傳曰周禮曰儀禮曰禮記其間獨周禮為太平之成法儀禮者又次之禮記者雜記先王之法言而尚多漢儒附㑹之疵此學者所宜精擇新安朱氏曰六經之道同歸而禮樂之用為急遭秦滅學禮樂先壞漢晉以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其說熙寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任傳遺本宗末其失已甚而博士諸生又不過誦其虛文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽冥而莫知其源一有大議率用耳學臆斷而已若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其說者而不知其為闕也虙氏曰禮記乃儀禮之傳儀禮有冠禮禮記則有冠義以釋之儀禮有昏禮禮記則有昏義以釋之儀禮有鄉飲酒禮禮記則有鄉飲酒義以釋之儀禮有燕禮禮記則有燕義以釋之儀禮有聘禮禮記則有聘義以釋之其他篇中雖或雜引四代之制而其言多與儀禮相為表裏但周禮儀禮皆周公所作而禮記則漢儒所録雖曰漢儒所録然亦儀禮之流也何以言之周禮雖得之於河間獻王時無有傳之者武帝以為末世瀆亂之書何休以為六國隂謀之書至於漢末乃行於世惟儀禮之書漢初已行故髙堂生傳之蕭奮蕭奮傳之孟卿孟卿傳之后蒼后蒼傳之戴德戴聖二戴因習儀禮而録禮記故知禮記儀禮之流也江陵項氏曰禮記諸篇有相抵牾者蓋諸家之書各記其師說如本朝諸臣之家喪祭之禮各成一書亦不能以相似也世之好禮者總而集之以資考訂可也必欲曲為之說使貫為一家則妄之甚者也今之解禮記者何以異此春秋五傳毛詩四家至今不能一也而況聚訟之書獨奈何欲一之乎所可惜者當時記載之初不題所作之人如春秋傳所載尸子魯子沈子女子之類則善矣今案檀弓之言喪或以為大功或以為齊衰或以為當使之喪或以為不使之喪或以為可反或以為不可反如此之類甚多惟其各載姓名故後人不以為疑而得以置議論取舍於其間未有合為一說而並用之者也自餘諸篇不載姓名則遂以為此皆古之成禮也而一切强解而曲通之如合衆醫之說汗下攻補通為一方而以為此秦越人之意也不已謬乎集說名氏後漢鄭氏𤣥字康成因涿郡盧植事扶風馬融以禮記乃融植所考定遂為之注唐孔氏頴達字仲達先與朱子奢李善信賈公彥柳士宣范義頵張權等取皇甫侃熊安生二家義疏刪定續與前修疏人及周𤣥達趙君贊王士雄等覆更詳審為正義凡七十卷案鄭氏注雖間有拘泥而簡嚴該貫非後學可及孔氏正義以一時崇尚䜟緯多所採録然記載詳實未易輕議嘗讀朱文公中庸章句以戒謹其所不睹恐懼其所不聞與莫見乎隱莫顯乎微為兩事剖析精詣前所未有今觀鄭注已具斯㫖又劉原父七經小傳載檀弓聖人之葬人與人之葬聖人也以與為語助辭世多稱之然正義已有是說姑托此二端言之歷考諸家訓解發明經㫖者固不為少其祖述先儒之意者實多歐陽公曰學者跡前世之所傳而校其得失或有之矣若不見先儒中間之說欲特立一家之學吾未之信可謂至論第自晉宋而下傳禮學者南人有賀循賀瑒庾蔚崔靈恩沈重范宣皇甫侃等北人有徐道明李業興李寶鼎侯聰熊安生等何止十數家正義實據皇甫侃以為本而以熊安生補其所不備後世但知為孔氏之書而已今仍以孔氏冠其首他說有可採而姓氏幸不為孔氏所去者具載於下魏田氏瓊晉淳于氏纂晉賀氏循晉曹氏述初皇甫氏侃崔氏靈恩北齊熊氏安生庾氏蔚唐賈氏公彥同李元植編儀禮疏儀禮自鄭注之後僅有黃慶李孟哲二家疏義公彥等裁定為五十卷唐丘氏光庭兼明書四卷採托經典訓釋之不同復以經典證之唐中山成氏伯璵禮記外傳四卷吳郡張幼倫注凡一百一十條雖舉禮記為目實兼三禮言之唐趙氏匡字伯循唐陸氏元朗字德明經典釋文唐陸氏贄字敬輿山隂陸氏佃字農師解四十卷又新說四卷象山陸氏九淵字子靜晉范氏宣華陽范氏祖禹字淳甫吳郡范氏成大字至能金華范氏鍾字仲和晉劉氏世明長樂劉氏彝字執中七經中義一百七十卷內禮記四十卷清江劉氏敞字原父七經小傳五卷建安劉氏劉氏孟冶元魏王氏肅臨川王氏安石字介甫禮記發明一卷新安王氏解曲禮上下王制月令文王世子禮運禮器郊特牲內則玊藻明堂位大傳中庸大學投壺十五篇王氏昭禹字光逺王氏蘋王氏唐魏氏徴字𤣥成臨卭魏氏了翁字華甫唐張氏守節橫渠張氏載字子厚記說三卷廣漢張氏拭字敬夫范陽張氏九成字子韶吳郡張氏幼倫張氏東山何氏何氏𦙍何氏洵直何氏平叔濓溪周氏敦頤字茂叔延平周氏諝字希聖解王制禮運禮器郊特牲玊藻學記樂記祭法祭義祭統經解哀公問仲尼燕居孔子閒居中庸表記大學共十七篇不見於中興館閣書目永嘉周氏行己字恭叔柯山周氏處約河南程氏皓字伯淳弟頤字正叔沙隨程氏逈建安游氏酢字定夫廣安游氏桂字元發經學十二卷延平楊氏時字中立秦溪楊氏復儀禮經傳通解續祭禮十二卷慈湖楊氏簡字敬仲藍田吕氏大臨字與叔解十卷案中興館閣書目止一卷有表記冠義昏義鄉飲酒義射義燕義聘義喪服四制八篇而已今書坊所刋十卷又有曲禮上下孔子閒居中庸緇衣深衣儒行大學八篇東萊吕氏本中字居仁祖謙字伯恭海陵胡氏瑗字翼之廬陵胡氏銓字邦衡禮記傳十八卷武夷胡氏安國字康侯五峯胡氏宏字仁仲王氏子墨盱江李氏覯字泰伯仁夀李氏道傳四明李氏元白李氏格非字文叔精義十六卷就曲禮檀弓王制喪服小記大傳少儀學記樂記雜記喪大記祭法十一篇中隨所見為之義長樂陳氏祥道字用之講義二十四卷禮書一百五十卷禮例詳解十卷弟暘字晉之樂書二百卷溫陵陳氏知柔字體仁永康陳氏亮字同甫天台陳氏騤字叔進北溪陳氏淳字安卿陳氏石林葉氏夢得字少藴解曲禮檀弓王制文王世子祭義祭統哀公問仲尼燕居孔子閒居坊記表記緇衣儒行大學昏義鄉飲酒義射義燕義聘義十九篇仲子模過庭録時有論說龍泉葉氏適字正則葉氏棣葉氏四明沈氏煥字晦叔沈氏括字存中吳興沈氏清臣字正卿演山黃氏敏求九經餘義延平黃氏裳字冕仲長樂黃氏幹字直卿涑水司馬氏光字君實南豐曽氏鞏字子固河東侯氏仲良字師聖嚴陵方氏慤字性夫解義二十卷馬氏睎孟字彥醇解七十卷方氏馬氏及山隂陸氏三家書坊鋟板傳於世方氏最為詳悉有補初學然雜以字說且多牽合大為一書之纍間有與長樂陳氏講義同者方自序亦謂諸家之說於王氏有合者悉取而用之則其說不皆自己出也馬氏陸氏皆略馬氏大學解又與藍田吕氏同朱文公或問以為吕氏今從之陸氏說多可取間有穿鑿亦字學誤之也上蔡謝氏良佐字顯道河南尹氏焞字彥明新安朱氏熹字元晦中庸大學章句或問之外其他講說散見於語録儀禮經傳解注嵩山眺氏以道字說之兼山郭氏忠孝字立之毗陵慕容氏彥逢字叔遇金華唐氏仲友字與政慶源輔氏廣字漢卿取注疏方氏馬氏陸氏胡氏諸說倣吕氏讀詩記編集間有己說金華應氏鏞字子和纂義二十卷永嘉徐氏自明字誠甫江陵項氏安世字平甫永嘉戴氏溪字少望永嘉薛氏季宣字士隆髙要談氏惟寅宣城奚氏士達霅川倪氏思字正甫建安潘氏植四明袁氏甫字廣微㑹稽髙氏閌子文彪眉山家氏頤臨卬宋氏逺孫四明宣氏繒字子平建安真氏德秀字景元錢塘于氏有成字君錫新定顧氏元常字平甫鄱陽洪氏邁字景盧吳氏華錢塘吳氏知愚字子發晉陵喻氏樗字良能嚴陵喻氏仲可字可中嚴陵錢氏文子新定錢氏時字子是莆陽鄭氏耕老字榖叔鄭氏眉山孫氏佖孫氏景南莆陽林氏光朝字謙之林氏坰金華邵氏淵字萬宗解曲禮王制樂記中庸大學五篇新定邵氏甲字仁仲海陵查氏西蜀董氏晏氏光湛氏循毛氏信卿蔡氏淵蔣氏君實莊氏夏施氏虙氏費氏盧氏譙氏許氏俞氏張氏講義十卷不知作者又有傳録訓解不著姓名闕而存之以上解義唯嚴陵方氏廬陵胡氏始末全備自餘多不過二十篇或三數篇或一二篇或因講說僅十數章其他如語録如文集凡有及於禮經可以開曉後學者裒輯編次粗已詳盡唐杜佑通典論議喪制者亦已編入獨紹興間進士夏休撰破禮記二十卷斷章析句妄加譏詆中庸大學猶且不免其不知量甚矣大抵解經非其他著書比前後諸儒類嘗講究後學偶得昔賢未竟之㫖曽未一二動欲牽强餖飣自為一書以垂世不無差謬蹈襲之患至有立意毁訾如休者亦登載中興館閣書目今不取
