body:
  text: 禮記集說卷一百九宋衛湜撰天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼鄭氏曰建國封諸侯也置都立邑為卿大夫之采地及賜士有功者之地廟之言貌也宗廟者先祖之尊貌也祧之言超也超上去意也封土曰壇除地曰墠書曰三壇同墠王皇皆君也顯明也祖始也名先人以君明始者所以尊本之意也天子遷廟之主以昭穆合藏於二祧之中諸侯無祧藏於祖考之廟中聘禮曰不腆先君之祧是謂始祖廟也享嘗謂四時之祭天子諸侯為壇墠所禱謂後遷在祧者也既事則反其主於祧鬼亦在祧顧逺之於無事祫乃祭之爾春秋文二年秋大事於大廟傳曰毁廟之主陳於大祖未毁廟之主皆升合食於大祖是也魯煬公者伯禽之子也至昭公定公久已為鬼而季氏禱之而立其宫則鬼之主在祧明矣唯天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾其無祖考者庶士以下鬼其考王考官師鬼其皇考大夫適士鬼其顯考而已大夫祖考謂別子也凡鬼者薦而不祭王制曰大夫士有田則祭無田則薦適士上士也官師中士下士庶人府史之屬此適士云顯考無廟非也當為皇考字之誤孔氏曰此一經明天子以下尊卑既異上祭祖廟多少不同之事既王天下分九州之地建立諸侯之國王畿之內及諸侯國中置此公卿之都立大夫士之邑設廟祧壇墠為親疏多少之數則下所云是也王立七廟者親廟四始祖一文武不遷合為七也七廟之外又立壇墠各一近者封土逺親除地示將去然也父廟曰考考成也謂父有成德之美也王考廟者祖廟也王君也祖尊於父故加君名也皇考曾祖也皇大也曾祖轉尊又加大稱顯考高祖也居四廟最上故以高目之祖考廟者始祖也五廟皆月月祭之逺廟謂文武廟也文武廟在應遷之列故云逺廟特為功德而留故謂為祧文武二廟不遷故云有二祧享嘗四時祭祀文武特留故不月祭但四時祭而已去祧為壇謂高祖之父也若是昭行寄藏武王祧若是穆行寄藏文王祧去壇為墠者謂高祖之祖也高祖之父初寄在祧不得於祧中受祭故曰去祧有祈禱則出就壇受祭也高祖之祖往在壇而今不得祭故云去壇有祈禱則就墠受祭壇墠有禱焉祭之者在壇墠者不得享嘗有祈禱乃祭之無祈禱則不得祭也去墠曰鬼者若又有從壇遷來墠者則此前在墠者遷入石函為鬼雖有祈禱亦不得及唯禘祫乃出也諸侯立五廟壇墠與天子同無功德之祖為二祧也月祭三廟顯考祖考止預四時皆降天子也去祖為壇去祖謂去大祖也即高祖之父諸侯無功德二祧若高祖之父亦遷即寄大祖而不得於大祖廟受時祭唯有祈禱則去大祖而往壇受祭也大夫立三廟二壇者異於君故立二壇而不墠也顯考祖考無廟卑也大夫無主故無所寄藏而高大二祖又無廟若有祈禱則為壇祭之墠輕於壇今二壇無墠為重大祖故也去墠為鬼者謂高祖若遷去於壇則為鬼不復得祭但薦之大祖壇而已若大夫有大祖之廟者義具王制疏適士謂天子三等諸侯上士悉二廟一壇也皇考無廟曾祖也既無廟有祈禱則為壇祭之曾祖若遷去於壇則為鬼不復祭也官師謂諸侯中士下士為一官之長一廟為父立之也王考雖無廟在考廟而祭也去王考為鬼謂曾祖則不得祭又無壇有祈禱則薦於廟也庶士府史之屬庶人平民也賤故無廟死則曰鬼亦得薦之於寢王制云庶人祭於寢是也鄭注天子遷廟之主以昭穆合藏於二祧之中者昭之遷主總合藏武王祧中穆之遷主總合藏文王祧中故鄭注周禮守祧先公遷主藏於后稷之廟先王之遷主藏於文武之廟鄭必知然者案文二年八月丁卯大事于大廟公羊傳云大事者何大祫也毁廟之主陳於大祖是毁廟在大廟祫乃陳之故知不窋以下先公遷主藏於后稷廟也文武二廟既不毁則文武以下遷主不可越文武上藏於后稷之廟故知藏於文武廟也此遷主所藏曰祧對例言之若散而通論凡廟曰祧左傳其敢愛豐氏之祧彼祧逺祖廟也君冠必以先君之祧處之服注云曾祖廟曰祧是凡廟曰祧也云享嘗謂四時之祭者秋嘗物之備具故特舉享嘗以明四時之祭云鬼亦在祧祫乃祭之者謂去墠為鬼主亦如壇墠之主藏在祧顧以疏逺唯祫乃祭之引春秋文二年證毁廟之主祫祭乃及也引魯煬公證鬼主恆在也云唯天子諸侯有主禘祫者案王制天子諸侯有禘祫故知有主又云大夫三廟一昭一穆與大祖而三大祖即是大夫之祖考既有祖考明應遷之祖以制幣招其神而藏焉故云亦鬼其百世雖有百世之鬼不得禘祫無主耳大夫若無祖考祗得立曾祖及祖父三廟而已則不得鬼百世也鄭既總舉有祖考之人於前歷說無祖考之人於下庶士及庶人無廟故鬼其祖與父於寢中薦之官師一廟祖禰共之曾祖無廟故鬼其皇考於祖廟而薦之適士立祖禰二廟又立曾祖一壇唯高祖為鬼故云鬼其顯考就曾祖之壇而薦之也云大夫祖考謂別子者以上云大夫有祖考故鄭明之云大夫祖考謂別子也謂於周之世別子為卿大夫後世子孫立其廟不毁謂之祖考雖於周之世非別子為大夫但立父祖及曾祖三廟無祖考廟者則經中三廟是也若夏殷之世雖非別子但始爵者及異姓為卿大夫者其後世子孫皆立之為祖考此義已具王制薦輕於祭鬼疏於廟故知鬼薦而不祭也山隂陸氏曰言天下嘗更衰亂今始有王其建設如此嚴陵方氏曰溥天之下莫非王土所以興事造業必有與之共天位治天職食天祿者故分地建國置都立邑設廟祧壇墠而祭之分地建國置都立邑所以尊賢也設廟祧壇墠而祭之所以親親也然親親不可以無殺故為親疏之數焉尊賢不可以無等故為多少之數焉有昭有穆有祖有考所謂親疏之數也以七以五以三以二所謂多少之數也分地者分天子之地建國者建諸侯之國置都者置公卿之都立邑者立大夫之邑分地建國畿外之臣所以嗣也置都立邑畿內之臣所以祿也王立七廟即王制所謂三昭三穆與大祖之廟而七是也由王考等而上之以至於祖考雖有尊卑逺近之異然皆有父道故通謂之考特異號而已至於父獨親而近故直以考名之王以業言大祖又父之父也故以大言之其生又謂之大父者以此皇者王之所自出曾祖則祖之所自出也故王考之父曰皇考凡物高則顯故高祖曰顯考祖考大祖也以其為宗廟之始故曰祖考二祧蓋顯考之父祖也享嘗者四時之祭享以春言嘗以秋言於春曰享以見秋嘗之為食於秋曰嘗以見春享之為祀言春祠則以見夏之礿言秋嘗又以見冬之蒸周官大宗伯四時之祭通謂之享而此止以春言之者享亦饗也以飲為主而飲以養陽氣春為陽中得享之正故也魯語言嘗禘蒸享釋者謂春祭曰享是矣諸侯立五廟即王制所謂二昭二穆與大祖之廟而五是矣月祭者三廟蓋視天子之親廟也享嘗者二廟蓋視天子之二祧廟也王制亦謂之大祖者以居廟中最為大故也然則大祖果有功德矣亦有不遷之理焉凡此皆以降於天子故也於鬼亦言為者蓋別而言之則有形名之異合而言之制其名是亦為之而已故始於天子終於庶士庶人則言曰以別之其間諸侯大夫適士官師言為以合之也大夫立三廟即王制所謂一昭一穆與大祖之廟而三是矣馬氏曰分地建國置都立邑雖其地之小大不同要之不出於孝饗而已說者以謂七廟之中祧廟二則為文武之廟其說非也逺廟為祧而二祧之廟止於享嘗而已茍文武之廟而祭止享嘗亦非先王所以尊祖宗之意也祧者有去之意說者以謂從兆者則以禮示之而兆者如孟子所謂為之兆而有始之意也親盡而服窮祧所以去之以有可毁之理而毁之不可以無其漸故去祧為壇去壇為墠二祧廟享嘗乃止則有常禮也至於壇墠無禱乃止則無常禮也去墠為鬼則與庶人同凡此者皆先王親親之殺也天子之廟其常數止於七而其功德之大則數有加焉至諸侯止五廟而已雖有功德而數不增雖無功德數不減先王之禮如此也王制所謂大祖則無可毁之理此天子諸侯大夫之廟而曰去祖為壇則祖有可毁之理何也蓋祭法為無功德者言之王制為有功德言之此所以不同橫渠張氏曰夏殷有虞皆祭親廟而止曰考曰王考曰皇考曰顯考天子諸侯同以其欲異數故天子別立二祧祧必以新遷廟為之故曰王者禘其祖之所自出以其祖配之而立四廟也蓋夏殷以前大祖亦以世數而遷復於郊禘及之至周則大祖常存當文武時則以后稷為大祖至後世則以文王為大祖稷則郊祀以配天二祧則武王必居其一若武王是其德可宗者也三昭三穆與大祖之廟而七傳者言此周法蓋於古唯周有大祖天子七廟謂大祖與二祧四親七也此且以周家為然凡廟須推始祖以為大祖又須有一創業之主即所謂祖也又須有一有功業致太平者所謂宗也其下則自高祖至禰為四親廟也祖宗為二祧與始祖三廟永不祧也四親廟親盡則祧則祧常存四親廟也雖然如此若後世之君有中興大勳業者亦當為不祧之主如祖宗也若漢高祖為創業之主文帝為大宗武帝為世宗此二宗者後世祧之猶可若光武復興後世安得不立為宗也又如東漢既滅劉先主復立漢嗣後世安得不以宗事也以此言之則周之文武二祧蓋亦不可為定數又如四親廟自高至禰皆不可不祭若使一世之中各有兄弟數人代立不可以廟數確定卻有所不祭也雖數人止是當得一世故雖親廟亦不害為數十廟也殷而上七廟自祖考而上五并逺廟為祧者二無不遷之大祖廟至周有百世不毁之祖則三昭三穆四為親廟二為文武二世室并始祖而七諸侯無二祧故五大夫無不遷之祖則一昭一穆與祖考而三故以祖考通謂為大祖若祫則請於其君并高祖干祫之干祫者不當祫而特祫之也孔注王制為周制亦粗及之而不詳耳天子諸侯有月祭大夫以下但享嘗大夫祖考無廟疑雖壇祭亦止親盡則下遷若始祖當有廟則當有祭矣大夫二壇有禱乃祭若干祫高祖則於祖考之一壇而已去壇為墠去墠為鬼從廟數以至壇墠皆有等差定數至於鬼只是鬼饗之者又非孝經所謂鬼饗也此言鬼饗既不在廟與墠壇之數則并合上世一齊饗之而已非更有位次分別直共一饗之耳只是懷精神也鬼者只是歸之大虛故共饗之也既曰鬼饗又分別世數位次則後將有至百世之鬼也孝經所謂鬼者只以人死謂之鬼猶周禮言天神地示人鬼是也長樂陳氏曰祭法言天子至士立廟之制多與禮異其言壇墠等威之辨理或有之蓋先王之於祖有仁以盡其愛有義以斷其恩近則月祭逺則享嘗在祧無寢去祧無廟此以義處仁也去祧為壇去壇為墠壇墠之設為其無廟而不忍忘焉此以仁行義也蓋禱祈則出其主於壇墠而祭之既事則復其主於廟而藏之唯禘祫與載之出疆然後在祭告之列其他不預也大夫之無禘祫禮之節然爾鄭氏謂大夫士無木主誤也其言凡鬼薦而不祭賈氏申之謂大夫之鬼薦於大祖壇士之鬼薦之於廟此尤無據父昭子穆而有常數者禮也祖功宗德而無定法者義也故周於三昭三穆之外而有文武之廟魯於二昭二穆之外而有魯公之世室觀春秋傳稱襄王致文武胙於齊侯史記稱顯王致文武胙於秦孝公方是時文武固已逺矣襄王顯王猶且祀之則其廟不毁可知矣家語左傳稱孔子在陳聞魯廟火曰其桓僖乎以為桓僖親盡無大功德而魯不毁故天災之其言雖涉於怪而理或有焉若然則魯公之室在所不毁可知矣王舜中劉歆王肅韓退之之徒皆謂天子祖德宗功之廟不在七世之列特鄭康成以周禮守祧有八人小記王者立四廟則謂周制七廟文武為二祧親廟四而已是不知周公制禮之時文武尚為近廟其所以宗之之禮特起於後代也果所以宗之者在七廟內使繼世祖先間有豐功盛德不下文武復在可宗之列則親廟又益殺乎理必不然祭法曰逺廟為祧則祧者兆也天子以五世六世之祖為祧所謂有二祧是也諸侯以始祖為祧所謂先君之祧是也鄭氏以祧為超去之超誤矣既曰超矣又以文武為不毁之祧何邪明堂位曰魯公之廟文世室武公之廟武世室然武公之於魯徇宣王立庶之非以階魯國攻殺之禍而豐功懿德不著於世自武至閔其廟已在可遷之列矣春秋成公六年二月立武宫昭十五年有事于武宫左氏曰季文子以鞍之戰立武宫公羊曰武宫者何武公也立者不宜立也蓋武宫立於成公之時歷襄及昭積世不毁故記史得以大之欲以比周之文武也又曰月祭者薦新之祭也月令獻羔開冰薦鮪羞含桃與夫嘗麥嘗榖嘗麻嘗魚皆先薦寢廟是也周官𨽻僕掌五寢之掃除糞灑之事所謂五寢者自考廟以至祖考之寢廟也王七廟而其寢乃五者為其二祧將毁先除其寢所以見孝子孝孫之心不欲遽毁故去有漸也薦新止於寢廟則月祭不及二祧而及祖廟亦明矣享嘗者四時之祭周官大宗伯春祠夏礿秋嘗冬蒸及司尊彝所載彝舟尊罍是也有禱焉者求福之祭也周官小宗伯大烖及執事禱祠于上下神祇凡王之㑹同軍旅田役之禱祠肄儀為位凡天地之大烖類社稷宗廟則為位都宗人掌都祭祀之禮家宗人掌家祭祀之禮國有大災故皆令禱祠是也天子巡狩出則造乎禰歸則假于祖天子出征亦造乎禰又受命于祖皆有禱焉者也求福之祭非常祭也亦猶四時之間祀雖毁廟之主皆合食焉則禱之時廟之初毁者亦為壇墠而祭之可知矣小宗伯掌建國之神位右社稷而左宗廟又以辨廟祧之昭穆守祧掌守先王先公之廟祧其廟則有司除之其祧則守祧黝堊之夫左陽也陽主發生而其德則仁位宗廟於左則有生其親之意且有以致其仁故也辨其昭則一祧二廟是之謂三昭辨其穆則一祧二廟是之謂三穆廟則修除以貴其寢之常新祧則黝堊以示其去之有漸則所謂逺廟者非不毁之廟也夫先王之立廟祧稱情而為之耳故其廟之數亦視服之輕重傳曰四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣諸侯之德薄於天子故其立廟至於服窮而止天子之德厚於諸侯故其立廟至於親屬之竭而止王肅謂二祧一為高祖之父則五世矣一為高祖之祖則六世矣誠能明其言之意而不溺於文武之功德則通矣石林葉氏曰周官小宗伯辨廟祧之昭穆聘禮言不腆先君之祧言宗廟者亦或謂之宗祧廟與祧常通稱祧兆也廟親而祧逺則其兆而已而鄭氏以祧為超超上去之意祧非毁之謂若是祧為毁則自大祖而降凡無功德者皆當祧何獨此二廟乎秦溪楊氏曰案祭法與王制不同王制天子七廟三昭三穆與大祖之廟而七祭法則序四親廟二祧大祖以辨昭穆王制諸侯五廟與大祖之廟而五祭法則三親廟月祭高太廟享嘗以見隆殺王制大夫三廟一昭一穆與大祖之廟而三祭法但有三親廟而高太無廟有二壇為請禱之祭而已王制士一廟祭法分適士二廟官師一廟又祭法有考王考皇考顯考祖考之稱王制無之祭法有壇有墠或二壇無墠或一壇無墠王制無之大抵王制略而祭法詳又案三壇同墠之說出於金縢乃因有所禱而為之非宗廟之外預為壇墠以待他日有禱也孝經為之宗廟以鬼享之非去墠為鬼也晉張融謂祭法去祧為壇去壇為墠去墠為鬼皆衰世之法則所言難以盡信王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社鄭氏曰羣衆也大夫以下謂下至庶人也大夫不得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰唯為社事單出里孔氏曰此一經明天子以下立社之義羣姓謂百官以下及兆民大社在庫門內之右故小宗伯云右社稷王社在籍田王所自祭以供粢盛故詩頌云春藉田而祈社稷是也諸侯國社亦在公宫之右侯社在藉田大夫以下為衆特置故曰置社注言百家以上不限多少此大夫所主立社稷則田主是也義已具郊特牲疏橫渠張氏曰大社王為羣姓所立必在國外也民各有社不害為大社王社王自為立社必在城內左漢猶有大社在唐只見一社又曰天子立大社為羣姓必不但為城中之民為天下也諸侯國社則是一國也郊者祀天之位社者祭地之位郊外無天神之祀社外無地祗之祀澤中方丘亦社也故凡言社者即地祗之祭如大社王社又分而言之大社祭天下之地祗王社祭京師之地祗五祀祭宫中之地祗嚴陵方氏曰王曰羣姓諸侯曰百姓者羣則衆矣不止於百姓天子曰兆民諸侯曰萬民以此羣姓之社曰大社則知國社之為小百姓之社曰國社則知大社之為天下矣大夫以下成羣則取數備矣故曰置社王氏釋周官封人云王社國中之土示無豫農事故不置稷則知置稷者唯大社與國社而已馬氏曰社者土神而有生物之功故王諸侯大夫立社皆所以教民美報而有反本復始之意也王謂之王社諸侯有君之道謂之國社謂之侯社至於大夫以下皆北面之臣則謂之置社慶源輔氏曰社后土也自天子至庶人皆得祭之然非尊者立之則亦不可長樂陳氏曰有天下之社有一國之社有衆人之社有一人之社有失國之社大社天下之社也國社一國之社也王社侯社一人之社也喪國之社屋之失國之社也三社之制大社為大此孟子所謂民為貴社稷次之君為輕也喪國之社天子所以為戒則又次於王社矣以言安不可以忘危也書曰夏社禮與春秋曰亳社皆以為戒而已然則諸侯有國社侯社與春秋之亳社亦三社矣天子之社在雉門之右而綿詩曰乃立應門繼之曰乃立冢土冢土社也則諸侯之社亦在門內也天子之牲大牢則諸侯當用少牢若郊特牲曰社事單出里丘乘供粢盛此大夫以下之社也社稷之重於古也如此而孟子曰旱乾水溢則變置社稷夫水旱者天事也人事不勝故天變見於時而社稷土示也豈其罪哉然則謂之變者猶曰以變置諸侯爾廬陵胡氏曰古者祭地於社猶祀天於郊也故泰誓曰郊祀不修而周公祀于新邑亦先用二牛於郊後用大牢於社也記曰天子將出類乎上帝宜乎社又曰郊所以明天道社所以神地道周禮以禋祀祀昊天上帝以血祭祭社稷而別無地示之位四圭有邸舞雲門以祀天神兩圭有邸舞咸池以祀地而別無祭祀社之說則以郊對社可知矣後世既立社又立北郊失之矣秦溪楊氏曰禮經天子諸侯祭社稷祭莫重於天地而社稷其次也胡氏乃合祭地祭社二者而一之何也曰社者五土之神是亦祭地也而有廣狹之不同天子有天下其社曰王社則所祭者天下之地極其地之所至無限界也故以祭社為祭地唯天子可以言之凡胡氏所引皆天子社也但云後世既立社又立北郊失之矣此則未然有正祭有告祭冬至祭天於南郊順陽時因陽位夏至祭地於北郊順隂時因隂位以類求類故求諸天而天神降求諸地而地示出所謂正祭也匠人營國左祖右社以社與祖對尊而親之若因事而告地則祭社亦可矣記曰天子將出類乎上帝宜乎社之類是也說者曰類者依郊祀正禮而為之也宜者有事于社求福祐也此所謂告祭也知祭各有義不可以一說拘則知聖人制禮精微之意矣王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立尸或立竈鄭氏曰此非大神所祈報大事者也小神居人之間司察小過作譴告者爾司命主督察三命中霤主堂室居處門户主出入行主道路行作厲主殺罰竈主飲食之事明堂月令春曰其祀户祭先脾夏曰其祀竈祭先肺中央曰其祀中霤祭先心秋曰其祀門祭先肝冬曰其祀行祭先腎聘禮曰使者出釋幣於行歸釋幣於門士喪禮曰疾病禱於五祀司命與厲其時不著今時民家或春秋祠司命行神山神門户竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山為之謬乎春秋傳曰鬼有所歸乃不為厲孔氏曰此一經明天子以下立七祀五祀之義以其非郊廟社稷大神故鄭云小神以其門户竈等故知居人間以小神所祈故知司察小過作譴責以告之也司命者宫中小神非天之司命故祭於宫中援神契云命有三科有受命以保慶有遭命以謫暴有隨命以督行受命謂年夀也遭命謂行善而遇凶也隨命謂隨其善惡而報之國門者國城門也國行者行神在國門外之西泰厲謂古帝王無後者此鬼無所依歸好為民作禍故祀之也此七祀是為民所立與衆共之其自為立者王自禱祭不知其當同是一神為是別更立祀也諸侯減天子户竈二祀故五祀公厲古諸侯無後者諸侯稱公故其鬼曰公厲諸侯自為立五祀義與天子同大夫減諸侯司命中霤故三祀族厲者古大夫無後者鬼也曰門曰行者其大夫無民國故不言國門國行也然鄭注曲禮大夫五祀為夏殷法注王制大夫五祀是有采地者鄭何以知然曲禮文連於大夫五祀故知非周而王制立七廟故是周禮以彼推此大夫三祀則周諸侯之大夫無地者也鄭引聘禮證大夫有門行引士喪禮證士亦有五祀云司命與厲其時不著者以其餘五祀月令皆著其時此二祀不著時也今時引漢時也漢時民家祠司命行神山神祠此三神門户竈三神在諸神之旁列位而祭之漢時既然周時必應春祠司命秋祠厲司命主長養厲主殺害故也漢時民祭有山而無厲故知山即厲巫祝之人意以厲神是厲山氏之鬼為之於理謬也厲山氏有子曰柱世祀厲山之神何得為厲也引春秋傳昭七年鄭子産辭證厲山氏有子不為厲也長樂陳氏曰五祀見於周禮禮記儀禮雜出於史傳多矣特祭法以司命泰厲為七祀而左傳昭二十五年家語五帝篇則以五祀為重該修熙黎勾龍之官月令以五祀為門行户竈中霤白虎通劉昭范曄高堂隆之徒以五祀為門井户竈中霤鄭氏釋大宗伯之五祀則用左傳家語之說釋小記之五祀則用月令之說釋王制之五祀則用祭法之說而荀卿謂五祀執薦者百人侍西房侍西房則五祀固非四方之五官侍必百人則五祀固非門户之類然則所謂五祀者其名雖同其祭各有所主也七祀之制不見他經鄭氏以七祀為周制五祀為商制然周官雖天子亦止於五祀儀禮雖士亦備五祀則五祀無尊卑隆殺之數矣祭法曰七祀推而下之至於適士二祀庶人一祀非周禮也然禮所言五祀蓋皆門户之類所以祀而報之也中霤祀於中央竈祀於夏井祀於冬户在內而竒陽也故祀於春門在外而耦隂也故祀於秋兩漢魏晉之立五祀井皆與焉特隋唐參用月令祭法之說五祀祭行及李林甫之徒復修月令冬亦祀井而不祀行然則行神亦特軷於始行而已非先王冬日之常祀也考之於禮五祀之牲羊牲小司徒小祭祀共羊牲凡祭五祀於廟有主有尸觀月令臘先祖五祀同時則五祀祭於廟可知也曾子問既殯而祭五祀尸入三飽則五祀有尸可知矣既殯而祭不酳不酢則凡祭五祀固有侑酳與酢矣老婦之祭先儒以為竈配則五祀固有配矣先儒又謂卿以上宗廟有主五祀亦有主矣大夫以下宗廟無主五祀亦如之然大夫之廟未嘗無主五祀有主與否不可考也禮書橫渠張氏曰五祀户竈門行中霤而已一畝之宫五者皆具故曰天子至于士皆立五祀之祭天子之立五祀見於經者不一周禮大宗伯司服小子職曲禮月令曾子問禮運士之立五祀見於士喪禮祭法有七祀五祀三祀二祀一祀之法加以司命及厲而諸侯不祭户竈大夫以下皆不祭中霤殆非推報之義又未嘗參見諸書及廟祧壇墠之法亦與經多不合恐別是一法非世之達禮社稷者土榖之神后土后稷古司土司榖之有功德者故以配之祭社則后土之功可以報矣井不在五祀恐水土之神已屬之社厲無後者也國祭無後者是亦一術也中霤恐是天窗漏明處詩所謂不愧屋漏是也蓋穴居之處亦必有以取明及其宫室當深奧處仍有漏明之所爾雅指屋漏於東北隅不必盡爾禮浴於中霤蓋就其明也然則又不可以中庭謂之中霤五祀曰門曰行以報功而言則門行豈大於井反不祭井嚴陵方氏曰周官以槱燎祀司命者是矣厲即春秋傳所謂鬼有所歸乃不為厲是矣以司人之命祀之求有所延慮其為厲故祀之使有所歸也門行曰國而户竈不言者以其在內故也大夫而下雖門行亦不言者以其所立者皆非為國故也是以亦不別言自為與為國焉諸侯曰公厲以有國言之大夫曰族厲以有家言之司命天神故首言之中霤土神也故次言之門在外也故又次於中霤行在道也故又次於國門厲之施毒不特在道而已故又次於國行户雖在內特用於房户之門而已故又次於泰厲竈則化飲食以養人非人之養也故以是終焉獨族厲先於門行者以厲之為鬼在天道則為卑在人道則為尊有國者有天道有家者有人道故或先或後以尊卑之辨七者之降殺諸侯則下去户竈而立五祀大夫非特下去户竈而已又上去司命中霤而立三祀適士於有家者所尊之族厲又去之而立二祀至於庶士庶人則卑矣故取七祀之最卑者或户或竈而立一祀焉不使庶士祀户庶人祀竈而或立之者以其人與祀皆卑不足以辨其隆殺故也大宗伯言以血祭祭社稷五祀則七祀之說非周制可知曲禮王制止言大夫祭五祀蓋以周制言之上得以兼下而五祀主於家故也馬氏曰聖足以饗帝孝足以饗親至於七祀之微有所不廢者所謂禮猶體之意也命降於五祀謂之制度自上而下降殺以兩故王立七祀則諸侯立五大夫三士庶人一皆以其制度之所自出也命者所以司其生厲者所以司其過以至於出入起居飲食之際莫不有神以司之凡有形有氣者皆不能逃於此此其所以户竈門行之間一皆有以祭之也七祀之祭莫不各以其時各以其儀月令所載是也山隂陸氏曰凡立五祀曰司命曰中霤曰國門曰國行曰公厲以是為正曰户曰竈則天子有加焉爾大夫於諸侯殺其上曰族厲曰門曰行是也士於大夫殺其上曰門曰行是也庶人或立户或立竈取其親者立之而已户所由也竈所養也户近而門逺奧尊而竈卑大夫有家謂之族厲以此謂之置社亦以此又新說曰五祀所以本事也故先王於四時祭焉加司命泰厲為七祀蓋司命者萬物之命繫焉春官司命是也泰厲者萬物之性繫焉春官司中是也萬物受順以生者命也受中以生者性也正則中過則厲故泰厲一名司中司中以正言之也泰厲以反言之也司命泰厲本乎上者也其成象在天故以陽祀祭之自煙始春官所謂以槱燎祠司中司命小宗伯注云兆司中司命於南郊是也户竈門行中霤本乎下者也其成形在地故以隂祀祭之自血始春官所謂以血祭祭五祀是也自司命至竈其序之如此何也蓋中霤處內而其外為門又其外為行以司命總之者司命主生尊大之也户小處也竈卑處也以泰厲總之者泰厲主殺卑小之也諸侯有君道故立五祀而去天子七祀之下者二大夫有臣道故立三祀而去諸侯五祀之上者二士貶於大夫故去其一庶人則民而已不取於士而取於天子一祀者庶人卑無嫌也王為羣姓立七祀所謂祀於廟中是也自為立七祀所謂祭於宫中是也曲禮曰天子祭五祀即春官五祀以司命泰厲天類不與也分禱五祀則大喪之祭於司命泰厲無所禱也禮運月令小子職皆云五祀不及司命泰厲亦以天類異之也此云大夫三祀曲禮王制皆云五祀何也蓋此經言其立曲禮王制言其祭若官師一廟曰考廟此以所立言之也又曰王考無廟而祭之此以所祭言之也若士既夕禮行禱於五祀則言其禱而已禱與祭異祭與立異固不同也慶源輔氏曰王為羣姓立七祀使諸侯至庶人各以差次而祭之自為立七祀則俱祭之諸侯為國立五祀使大夫士庶人各以其次祭之自為立五祀則俱祭之然則諸侯至士庶人雖皆曰立然非自立之也天子立之而後已立之耳前社亦然天子曰泰厲大夫曰族厲異其名者以其無形迹可辨故也司命亦無形迹而不異其名者命則一不容異也金華應氏曰禮大夫祭五祀儀禮士禱五祀此言大夫三祀適士二祀意者立祀則為之位不得盡兼祭禱則為之禮無所不遍王下祭殤五適子適孫適曾孫適𤣥孫適來孫諸侯下祭三大夫下祭二適士及庶人祭子而止鄭氏曰祭適殤者重適也祭適殤於廟之奧謂之隂厭王子公子宗其適殤於其黨之廟大夫以下庶子祭其適殤於宗子之家皆當室之白謂之陽厭凡庶殤不祭孔氏曰此明天子以下祭殤之差鄭注王子謂王之庶子公子謂諸侯庶子不得為先王先公立廟無處可祭適殤故祭於黨之廟謂王子公子但為卿大夫得自立廟與王子公子同者就其廟而祭之適殤其義已具曾子問嚴陵方氏曰𤣥孫之子為來孫必曰來者言其世數雖逺方來而未已也曾𤣥見小記解殤見檀弓解每言適則庶殤在所不祭矣重本故也然以尊而祭卑故曰下祭且在王而下每殺於廟數之二焉曾子問所謂隂厭陽厭者是矣金華應氏曰祭殤之數尊者所及逺卑者所及近澤有厚薄則禮有隆殺也德厚者流光既上及其祖又下及其殤祭及於五所愛者逺也祭止於適所重正統也不混殽也夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣鴻水而殛死禹能修鯀之功黃帝正名百物以明民共財顓頊能修之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之菑此皆有功烈於民者也及夫日月星辰民所瞻仰也山林川谷丘陵民所取材用也非此族也不在祀典鄭氏曰此所謂大神也春秋傳曰封為上公祀為大神厲山氏炎帝也起於厲山或曰有烈山氏棄后稷名也共工氏無録而王謂之霸在太昊炎帝之間著衆謂使民興事知休作之期也賞賞善也謂禪舜封禹稷等也義終謂既禪二十八載乃死也野死謂征有苗死於蒼梧也殛死謂不能成其功也明民謂使之衣服有章也民成謂知五教之禮也冥契六世之孫也其官𤣥冥水官也虐菑謂桀紂也烈業也族猶類也祀典謂祭祀也孔氏曰前經明禘郊祖宗及社稷等所配之人又論天地日月星辰山谷丘陵之等此經總明其功有益於民得在祀典之事法施於民若神農后土帝嚳與堯及黃帝顓頊與契之屬是也以死勤事舜及鯀冥是也以勞定國禹是也禦大菑捍大患湯及文武是也厲山氏案帝王世紀云神農氏起於烈山即炎帝也鄭引烈山氏左傳昭二十九年文農謂厲山氏後世子孫名柱能殖百榖故國語云神農之子名柱作農官因名農是也夏末湯大旱七年變置社稷故廢農祀棄故祀以為稷者謂農及棄皆祀之以配稷之神也共工氏鄭注係漢律歷志文案月令不載共工氏是無録又案昭十七年左傳郯子稱炎帝以火紀共工氏以水紀大皥氏以龍紀從下逆陳是在炎帝之前大昊之後也又以水紀官是無録而王共工後世之子孫為后土之官后君也能治九州五土之神故祀以為配社之神帝嚳能紀星辰時侯以明著使民休作有期不失時節故祀之也堯以天下位授舜封禹稷官得其人是能賞均平也五刑有宅是能刑有法也舜征有苗仍巡守陟方而死是勤衆事而野死鯀塞水無功被堯殛死於羽山治水九載亦有微功故得祀之世本云作城郭是亦有功也鄭答趙商云鯀非殛死放居東裔至死不得反於朝耳禹能修父之功故祀之上古雖有百物未有名黃帝為物作名正名其體明民謂垂衣裳使貴賤分明得其所也共財謂山澤不鄣教民取百物以自贍也契為舜之司徒掌五教湯放桀於南巢去民之菑謂伐紂自厲山氏以下所得祀者皆有功烈於民也及夫日月星辰釋上文泰壇泰折等祀也上有祭地祭天祭四時寒暑水旱此不言者舉日月則天地可知四時寒暑水旱則日月隂陽之氣故舉日月以包之非此族謂非厲山以下及日月丘陵等無益於民者悉不得預於祭祀之典也長樂劉氏曰法施於民則祀之者民賴其法成身者也伏羲氏作八卦而民賴之以知君臣父子兄弟夫婦之義神農氏作耒耜而民賴之以知耕種之益黃帝氏作衣裳而民賴之以知尊卑上下之分堯舜執遜避之義而民賴之以知廉讓崇德之美后稷立耕稼之規而民賴之以知粒食畎畝之法是皆功及萬世而莫敢或違故有天下者祀以為報所以重民之生也以死勤事者忠於國者弗顧其生義於君者弗惜其死祀之則忠義勸於天下矣以勞定國者夙夜勞瘁弼成王業如伊尹之相湯升陑如吕望之鷹揚我武如周公之坐以待旦也能禦大災者如鴻水為烖而后土氏能平五土如懷襄昏墊而夏后氏能滌九源既免民之魚鱉又敷土以播殖也能捍大患者如玁狁猾夏而宣王斥之管蔡亂國而周公征之楊墨亂教而孟子闢之能俾大患弗克興焉黃帝正名百物者謂垂衣裳而定尊卑之法也為舟楫而取諸渙也服牛乘馬而取諸隨也重門擊柝而取諸豫也設杵臼而取諸小過也弦弧矢而取諸暌也作宫室而取諸大壯也易棺椁而取諸大過也立書契而取諸夬也皆其正百物之名以興天下之利而共其財用於無窮者也長樂陳氏曰凡聖賢之有功烈於民者蓋皆應時而造隨所著見而已其內之所存豈止於此哉堯之道至於無能名而其所以見祀者止於賞均刑法以義終舜之道至於無為而其所以見祀者止於勤衆事而野死以此推之則功烈者道德之迹迹者祀典之所可載而其為道非祀典之所可盡也夫法施於民所謂民功曰庸也以死勤事以勞定國所謂事功曰勞也能禦天之大菑捍人之大患所謂治功曰力也嚴陵方氏曰聖王者言其有德又有位也有德而無其位有位而無其德皆不可制祭祀既曰祭又曰祀者蓋祭者祀之事祀者祭之道聖王之制祭祀豈待事其末為哉故下皆言祀而不言祭也粗而不可不陳者法也施則所以陳之也勤故能免乎難定故能止乎一事欲免乎難而已故於事曰勤國欲止乎一而已故於國曰定言以死勤事則不敢偷生以勞定國則不敢自逸菑在天也可禦而已患在人也故可亢焉有一於此則皆在所祀也故每以祀言之聖王之制祭祀凡以有功烈於民而已故以法施於民為首有民必有事故以以死勤事繼之民者國之本也事者國之治也故以以勞定國繼之國有民事為有常菑患為有變故以禦大菑捍大患繼之后土則勾龍也平與地平天成之平同后以言其能繼土事也與后稷謂之后同義星辰之運行固有先後自然之序帝嚳則因其序以著之衆使知之而已賞均刑法者賞不均則止於徼幸刑不法則及於無辜也鯀鄣鴻水所謂鯀則殛死禹乃嗣興是也鄣謂蔽塞之也洪範所謂陻洪水是也殛之者以其九載績用弗成祀之者以其以死勤事黃帝正名百物則不昧於理故曰明民物有其名皆可取而用之故曰共財顓頊能修之則以不廢黃帝之緒故也契為司徒而民成者司徒掌邦教教所以成民之性而已冥即𤣥冥也以其為水官故曰𤣥冥見月令解湯以寬治民即所謂撫民以寬除其邪虐是也文武之所為雖異皆以去民之菑而已以紂之暴非人之所能為也民所取財用者取物之財以為人之用也功烈也瞻仰也財用也皆以民言之者亦以民為國之本故也言日月星辰而不言天言山林川谷丘陵而不言地者以天地之功至大祀典所不得而言故也山隂陸氏曰於此言稷言嚳言堯言鯀言禹言黃帝言顓頊言契言冥言湯言文王言武王以著四代禘郊祖宗非專為私恩也以義終終讀如受終之終言黃帝正名百物務以明民且共財也蓋古人取材於物非特其利其義亦是也湯言除虐武王言去民之菑菑甚於虐也書曰惟受罪浮于桀亦湯以寬治民而除其虐若武王之事乃所謂武者也故湯樂謂之濩而已石林葉氏曰自夏而上蓋世以烈山氏主稷勾龍氏主社而易稷以代烈山氏者自殷以來為之也故祀后稷為稷祀勾龍氏為社至於今守之吾讀禮至此然後知逸書作夏社之意書序云湯勝夏欲遷其社不可作夏社意者湯既黜夏殷人有歸罪於社稷之不能保其國而易之者后稷之功在天下而人所共知故以代柱無嫌而勾龍氏未有昭然如稷可代者則不可以苟易所以遷烈山氏而不遷勾龍氏歟禮記集說卷一百九
