body:
  text: 禮記集説卷二十六宋衛湜撰天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以祿士以為間田鄭氏曰縣內夏時所居州界名也殷曰畿詩殷頌曰邦畿千里周亦曰畿畿內大國九者三公之田三為有致仕者副之為六也其餘三待封王之子弟次國二十一者卿之田六亦為有致仕者副之為十二又三為三孤之田其餘六亦待封王之子弟小國六十三大夫之田二十七亦為有致仕者副之為五十四其餘九亦以待封王之子弟三孤之田不副者以其無職佐公論道耳雖其致仕猶可即而謀焉朌讀為班孔氏曰此經明天子縣內之國數多少及祿士之法周禮職方氏千里曰王畿案殷之與周稱畿唐虞稱服無云縣者今特云縣故鄭以為夏制也案鄭注益稷云禹會諸侯於塗山執玉帛者萬國四百國在畿內今此畿內惟有九十三國者蓋夏代畿內稱縣當夏禹之初有四百國至夏之末土地既減故與禹世不同未知於時縣內國數多少湯承夏後制為九十三國記者言縣明其承夏之餘國數是殷制故與四百國不同也三公在朝既有正田今既致仕不可仍食三公采邑身又見存不可全無其地故公卿大夫皆有正職之田又有致仕副邑也待封王之子弟如禮運云天子有田以處其子孫又周禮有都宗人家宗人祭祀皆致福於王是也但王之子弟有同母異母親疏之異親寵者封之與三公同平常者與六卿同疏逺者與大夫同故有三等之差也案周禮三公雖無正職猶列於官參六卿之事故司徒云鄉老二鄉則公一人三孤則不列於官故云無職但佐公論道在朝在家其事一等雖退致仕猶可就而謀事故無致事之副名山大澤畿外列土諸侯有封建之義故云不以封畿內之臣既不世位有朌賜之義故云不以朌亦為與民共財不障管也民取其財物亦入之玉府周禮山虞澤虞所掌是也其餘以祿士以為間田者謂九十三國之餘則下文云其餘方百里者六十四方十里者九十六是也以九十三國封公卿大夫故此特云以祿士者謂無地之士給之地以當其祿不得為采邑也其實公卿之子父死之後既不世爵得食父祿故下文云大夫不世爵未賜爵視天子之元士以君其國則此祿士包之也其不封公卿大夫及祿士之外並為間田則周禮之公邑也不云附庸者以縣內無附庸也畿外諸侯有大功德始有附庸故間田少畿內每須朌賜故間田多依周禮間田自二百里之外以至五百里其大夫則於二百里為采地卿則於三百里為采地公則於五百里為采地故載師云以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地是也未知殷制如何其周之畿內采邑大小未聞則鄭注小司徒云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸是謂畿內大國百里次國五十里小國二十五里也又注大司徒云畿內之制未聞蓋亦疑而未定耳長樂陳氏曰周官有在鄉之縣有在遂之縣有采邑之縣有間田之縣故王畿謂之縣縣內方百里之國九三公所視公侯之地也七十里之國二十有一卿所視伯之地也五十里之國六十有三大夫所視子男之地也公卿大夫不謂之采邑而謂之國者人臣謹度以事上則全於臣道制節以御下則兼於君道自臣道而言之雖國亦謂之家孟子千乘稱家是也自君道而言之雖邑亦謂之國此采邑稱國是也又禮書曰周禮載師宅田任近郊之地家邑小都大都之田乃在三百里至五百里之地以近而狹者祿致仕之臣逺而廣者祿公卿大夫及子弟則是致仕之臣其祿少公卿大夫及子弟其祿多也鄭氏謂三等采邑皆有致仕之田與公卿大夫子弟地相埒恐先王之法不然馬氏曰詩云邦畿千里惟民所止天子之畿內不千里則不足以待諸侯蓋本大而末小然後可是猶身之運臂臂之使指此強幹弱枝之意也天子之縣內千里而為方百里者百封方百里之國九此公之國也方七十里之國二十有一此卿之國也方五十里之國六十有三此大夫之國也方百里之國九為方百里者九也方七十里之國二十有一為方百里者十有竒也方五十里之國六十有三為方百里者十五有竒也封百里之國為方百里者九則猶餘方百里者九十一也又封方七十里之國為方百里者十有竒則猶餘方百里者八十有竒也又封方五十里之國為方百里者十五有竒則猶餘方百里者六十四有竒也合九十三國而計之則封地方百里者四十五有竒則餘方百里者六十四有竒方十里者九十六有竒則以為祿士間田山隂陸氏曰周官以大都之田任疆地公所受地在焉以小都之田任縣地卿所受地在焉以家邑之田任稍地大夫所受地在焉王制所謂縣內舉中言之也然則以公邑之田任甸地元士於此受地可知凡此其大凡也其地有餘有不足蓋有通法存焉雖卿或在疆地雖大夫或在縣地取足於封而已廬陵胡氏曰案詩玄鳥篇云邦畿千里周官職方云千里曰王畿殷周皆稱畿不言縣故鄭以為夏制案月令云百縣豈亦夏制乎要之畿縣皆通稱王制大概通論三代地制爾先儒乃云夏禹之初有四百國末世地減湯承夏末制為九十三國故與四百國不同此蓋附會鄭説也究經意大約記先代之制不必指言其代也縣內大國九三公之田三餘六以待朌賜三公之有功者亦或待王之别有所封爾次國二十一卿之田六餘十五以待朌賜卿之有功者亦或待王之别有所封爾小國六十三大夫之田二十七餘三十六以待朌賜大夫之有功者亦或待王之别有所封爾故下云名山大澤不以朌則知此九十三國不盡為公卿大夫之田蓋待上别有所朌也鄭乃云為有致仕者副之又其餘以待封王之子弟於經何以見之且公卿大夫在位則有定員若致仕則或多或少豈有定數今云公之致仕者三卿之致仕者六大夫之致仕者二十七限以員數恐非通論今所不取也永嘉徐氏曰天子縣內亦百箇百里是方萬里十萬里地除了封百里之國九是方九百里為九千里地剩了方九千一百里是九萬一千里更將方千二十九里封二十一箇七十里之國總前方千九百二十九里是一萬九千二百九十里剩方八萬七百一十里又將方千五百七十五里封六十三箇五十里之國總前方三千五百有四里是三萬五千四十里剩方六千四百九十六里是餘六萬四千九百六十里作祿士間田又曰古者金玉之所掌皆出於王官而侯國不得擅而有也關譏之所禁皆歸之公上而侯國不得擅而私也是以名山大澤畿外不以封列土之諸侯畿內不以頒祿仕之王臣皆天子使吏治之而納其貢稅故也雖領於王官而富實藏於郡國財雖同於王民而利實歸之公上諸侯自食田稅之外餘不敢過而問焉蓋先王不以封之之意所以抑制其強而防間其侈心也考之周官凡山澤之數司書掌之以計吏治山澤之賦大府掌之以待喪紀九州之川澤山藪職方氏實掌天下之圖而諸侯無所𨽻焉至於伯禽侯于東魯而錫之山川乃天子之加賜是固異恩而非可以例觀也又謂周制山林川澤有虞衡之官為之厲禁若専利於上則無遺利在民矣考之山虞令萬民時斬材有期日則未嘗不與民共之而有司徒禁其不使戕賊而已澤虞則使人守其財物以時入于玉府則實為民守之而王官時以其職入於王而已推本先王領於王臣之意蓋使侯國不得以障管云爾非不與民共財也周德既衰凡王國之所恃者諸侯皆得専利之齊斡山海之藏晏子告齊侯以山澤各有所守不可為也是猶知守王法者至於桃林之塞古函谷也而晉實守之郇瑕之地古解池也而晉實有之凡天子之塞邑皆不領於王官而惟私意是取春秋之作於鄭不係虎牢於衛不係楚丘其類非一蓋所以别異天子之重地而侯國不得擅而兼之也自秦殫天下之財歸之公上凡山澤陂池之賦皆為天子之私藏而漢制屬之少府以供養然初制疏濶山海之在吳者得以鑄錢煮鹽而因以成七國之禍至於武帝之世凡五嶽盡在天子之郡而不𨽻侯國而郡國亦置鹽鐡官以𨽻司徒凡郡有川澤之處皆置吏掌之諸侯惟食租稅而已是雖抑制諸侯之強而先王不盡利以遺民之意蓋蕩然不復存矣嚴陵方氏曰天子之元士視附庸故於外則曰其餘以附庸於內則曰其餘以祿士以為間田者益諸侯以地則取之於此削諸侯以地則歸之於此蓋削不常有也其視封朌之田為間而無事故謂之間田左氏傳所謂宋鄭之間有隙地者是也間田內外之所同也司勳掌六鄉賞地之法鄭氏謂賞地賞田也蓋有賞亦冝有罰則益削之法亦若外諸侯可知畿內之采地亦謂之國者以其廣狹視諸侯而又使家臣以治之是以謂之國也故公卿大夫又謂之內諸侯者以此延平周氏曰封以土言朌以恩言祿士元士之采邑也故繼之以天子之元士不與凡九州千七百七十三國天子之元士諸侯之附庸不與鄭氏曰不與不在數中也春秋傳曰禹會諸侯於塗山執玉帛者萬國言執玉帛則是唯謂中國耳中國而言萬國則是諸侯之地有方百里有方七十里有方五十里者禹承堯舜而然矣要服之內地方七千里乃能容之夏末既衰夷狄內侵諸侯相并土地減國數少殷湯承之更制中國方三千里之界亦分為九州而建此千七百七十三國焉周公復唐虞之舊域分其五服為九其要服之內亦方七千里而因殷諸侯之數廣其土增其爵耳孝經説曰周千八百諸侯布列五千里內此文改周之法關盛衰之中三七之間以為説也孔氏曰此一節總明殷之畿內畿外國數之法前文云凡四海之內明殷之畿外諸侯次經云天子縣內明殷之畿內國數此經總明畿內外也鄭引春秋傳哀七年左傳文知中國執玉帛者覲禮諸侯享王璧以帛是執玉帛也案大行人侯甸男采衛要各以其服貢物下云九州之外謂之蕃國各以貴寶為摯鄭注貴寶若白狼白鹿是夷狄不執玉帛也言萬國有方百里方七十里方五十里者以周之大國方五百里而下則不得有萬國案萬國之數鄭注臯陶謨堯初制五服禹所弼每服五百里故始有百里之封焉猶用要服之內為九州州立十二人為諸侯師蓋百國一師則州十有二師則每州千二百國也八州九千六百國其餘四百國在畿內蓋禹因治水之後德化漸大故中國更廣而有萬國也言要服之內地方七千里者案尚書咎繇謨注禹弼成五服去王城五百里曰甸服其弼當侯服去王城千里其外五百里為侯服當甸服去王城一千五百里其弼當男服去王城二千里又其外五百里為綏服當采服去王城二千五百里其弼當衛服去王城三千里又其外五百里為要服與周要服相當去王城三千五百里四面相距為七千里是九州之內也必知王制之文為殷制者正以百里七十里五十里之國與周不同又千七百七十三國與禹萬國數復異又虞夏及周皆曰牧此經稱伯故知大略皆據殷而言也言周公復唐虞舊域謂治水之後舊域也案周禮職方云方千里曰王畿其外方五百里曰侯服又其外曰甸服又其外曰男服又其外曰采服又其外曰衛服又其外曰蠻服又其外曰夷服又其外曰鎮服又其外曰藩服皆方五百里蠻服則要服是分其五服為九而要服之內方七千里也云周因殷諸侯之數者案洛誥傳云天下諸侯來進受命於周者千七百七十三諸侯與此數同云廣其土者大司徒公五百里侯四百里與此公侯不同也云增其爵者殷爵三等周爵五等引孝經説謂孝經緯文千八百國者舉成數其實亦千七百七十三諸侯也云此文即孝經緯文改周之法謂改周盛時之法盛謂地方七千里衰謂地方三千里故云關盛衰之中三七之間也李氏曰禹自平水土之後天下方五千里自王城之外五百里甸服即所謂邦畿千里也五百里侯服五百里綏服此禹九州之地方三千里也外五百里要服五百里荒服此天下方五千里也故云弼成五服至于五千殷之有天下亦曰纘禹舊服而已及周公斥大九州以夏之要服為蠻服而九州之地始方三千五百里矣而九服之地亦不過於五千里蓋禹貢言其面周官言其方於面為五百里則於方為千里故禹貢所謂五百里甸服者即周千里之王畿也此以九州千七百七十三國未必皆實數也故春秋之世見於經者九十餘國而吳楚與焉疑其無如是之多也此説與前經葉氏互相發明故并録之廬陵胡氏曰此經總明畿內畿外大計地方三千里畿外八州州二百一十國八州千六百八十國并畿內九十三國計千七百七十三國下云方百里者六十四方十里者九十六則天子之元士也下又云其餘方百里者十方十里者六十則諸侯之附庸也不在千七百七十三國之數故云不與鄭謂禹承堯舜有萬國是則然矣謂湯承夏末之後亦分九州建此千七百七十三國似未然也且鄭必以此為殷制然下云天子七廟及雜論虞夏殷周四代之制豈専據殷哉又洛誥傳云天下諸侯來進受命於周退見文武尸者千七百七十三諸侯又孝經説曰周千八百諸侯布列五千里內又異義公羊説殷三千諸侯周千八百諸侯則周制正與此千七百七十三國之數合鄭不據周而據殷何也且孝經緯及異義公羊説固不足盡信今案書武王伐紂三分有二八百諸侯則殷諸侯千二百耳與此國數亦自不合鄭又援孝經緯不經之書以為據今所不取馬氏曰不與者在數之外也凡四海之內九州州二百一十國兼天子之縣內合而計之則千七百七十三國天子之元士諸侯之附庸不與鄭氏以為禹會諸侯於塗山執玉帛者萬國其説非也夫號物之數謂之萬萬盈數也書曰表正萬邦此言殷也詩曰綏萬邦此言周也則是殷周之時皆萬國何獨於夏而已夫自堯舜之後其土地之廣必至於七千里然後能容之而又以謂中國方三千里者為殷之衰時方五千里者為武王滅殷之初其意疑於關盛衰之中而以三七之間為説蓋非是也長樂劉氏曰天下雖廣賢才不多求其六德六行六藝具備而能飭已用中於民固亦難其人矣則千有七百國皆得其賢斯為至治焉是以文武積世纍功建鄉三物以教士民施之於政所以模範其俗也是以立屬連卒州之法互相紀綱上至於天子則分天下以屬二伯者欲一其道德以同天下之風俗蓋千有七百之國未必皆得其人所以然也延平周氏曰於縣內既言五十里之國而反謂元士不與者蓋五十里之國皆斥王子弟而言也天子百里之內以共官千里之內以為御鄭氏曰謂此地之田稅所給也官謂其文書財用也御謂衣食孔氏曰此一節論畿內千里之地田稅所共給之事百里之內謂去王城百里四面相距則五百里千里之內謂四面相距為千里去王城四面五百里二者相互云田稅所給恐是周禮口率出泉然周禮大府九賦之泉則口率出泉各有所用也官是官府所須故為文書財用御是進御所須故為衣食但官是卑褻故用近物御為尊重故用逺物此為殷法也長樂劉氏曰王城之外各以百里是為方百里者四而六鄉六遂在其內矣官謂王國所祿之士大夫也御謂王之卿掌其政教以御天下之諸侯者也言百里之內不取以為己利也専以養鄉遂之民而教以三物拔其賢能以共王官用起政教以倡天下者也千里之內不取以為己利也専以養天下之大賢大能用為王之公卿上大夫以典其六卿之治所以御八州諸侯以為治者也嚴陵方氏曰以百里所出之少資百官之所共疑若不足然卑者所稱不為不足以千里所出之多為一人之御疑若有餘然尊者所稱不為有餘且以其近者與人則欲其易給而無勞以其逺者奉己則欲其難致而有節百里之內非不以為御也要之以共官為主爾千里之內非不以共官也要之以為御為主爾御者以卑御尊之稱尊莫尊於天子也故凡天子所用之物皆謂之御焉亦見曲禮琴瑟不御解馬氏曰官者官爵之所用而其用輕故取百里以近地之所出者給之御者天子之所用而其用重故取千里以逺地之所出者給之百里之內去王城五十里而四面相距則百里也千里之內去王城五百里而四面相距則千里也孔頴逹以為百里去王城百里相距為二百里千里之內去王城五百里相距為千里其説自相戾也山隂陸氏曰官官府所用御御府所用御府天子所御者也百里之內以共官若禹貢百里賦納總千里之內以為御若禹貢四百里粟五百里米孔氏謂所納精者少粗者多石林葉氏曰官者天子宗廟社稷賔客燕享有司所供也御者乘輿服膳匪頒賜豫王所用也君子廉於奉己嚴於事神人故有司所供主在百里之內王所用主在千里之內猶之家造以祭器為先犧賦為次養器為後皆以奉己為非急也長樂陳氏曰周官大府關市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀或以其地之所便或以其地之所宜或以其類之所從然皆未嘗以逺物待乎近以近物待乎逺豈以近者供官逺者為御乎又大宰之制國用必合王府之財為之調度乃可豈官府之所供止於百里膳服之御必千里乎劉氏孟冶曰天子之官有六大五官六府之衆又有府史胥徒之屬百里之內天之所生地之所養不可多得也若不足以供百官之求天子之奉有大府以掌九賦九功之二若頒財以式法授之司會以八法八則均節邦之財用司書以八法八則周知出入百物又有宰夫職內之所稽職嵗職幣之所考若有常限也百里之內何其薄千里之內何其厚邪蓋君尊如天不厚其奉何以見天子之尊臣卑如地不薄其利何以表臣下之卑一尊一卑一厚一薄蓋有不可得而易者矣臨川王氏曰此一説亦不知是何時於他經亦不見其有此恐於事亦難如此蓋當合王府之財而通其調乃可也已千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯鄭氏曰屬連卒州猶聚也伯帥正亦長也凡長皆因賢侯為之殷之州長曰伯虞夏及周皆曰牧老謂上公周禮曰九命作伯春秋傳曰自陜以東周公主之自陜以西召公主之孔氏曰此一節論千里之外設方伯及連帥卒正兼二伯之事屬是繫屬連是連接卒是卒伍州是聚居故鄭總云聚也伯帥正俱是長但異其名既長諸侯非賢不可故因其州內賢侯為之非州外别取州牧也舜典曰覲四嶽羣牧又云咨十有二牧左傳宣三年云夏之方有德也貢金九牧周禮大宰建其牧故鄭云虞夏及周皆曰牧也鄭答張逸云畿內之州不置伯有鄉遂之吏主之伯即牧也故周禮大宰云施典于邦國建其牧立其監是畿外邦國有牧畿內不置故有八伯也注引周禮大宗伯職文春秋傳隱五年公羊傳文臨川王氏曰千里之外設方伯方伯連帥固宜有之五國十國三十國亦宜或然也但州必二百一十國恐不必然也長樂陳氏曰古之官有常名有異名內而為比長閭師族師黨正州長鄉大夫此常名也及任以師田之事則為軍將師帥旅師卒長兩司馬公司馬此異名也外而為公侯伯子男此常名也及寓以連屬之法則為屬長連帥卒正州伯此異名也屬則繫其人連則結其衆以其民之衆足以禦卒然之變故謂之卒以其地之廣有以逹於重川之逺故謂之州屬有長則足以長五國而已未足以率十國之衆故連有帥帥足以率十國而已未足以正三十國之衆故卒有正正足以正三十國而已未足以長二百一十國故州有伯則為人長者才也帥人者智也正人者義也長人者仁也易曰體仁足以長人則外之八伯內之二伯皆以其能體仁故也蓋王者有分土無分民建萬國所以分其土親諸侯所以合其人不分其土則其守不専不合其人則其勢不一王制言凡九州千七百七十三國分其土也繼之以方伯連帥之法合其人也周官大司馬比小事大以和邦國職方氏凡邦國大小相維者此也古者什五之法於州鄉則聯其民於師田則聯其徒於宿衛則聯其官故能以中國為一人而無內患為屬連卒州以聯其國為長帥正伯以聯其人故能以天下為一家而無外虞然不惟其官惟其人則法行而事舉詩曰四國有王郇伯勞之是也非其人則法雖存而事廢詩序曰衛侯不能修方伯連帥之職公羊傳曰下無賢方伯是也方伯連帥之職周道也故書與周禮伯皆稱牧者蓋自內言之則屈於二伯故稱牧周官大宗伯八命作牧曲禮九州之長入天子之國曰牧是也自外言之則伸於諸侯故稱伯王制謂方伯之國是也虞十二州則十二牧夏九牧周九州則九伯而王制言八州八伯則王畿之內不建伯焉鄭氏以為殷制是也然周牧伯之名見於經傳多矣連帥特見於詩序若夫五國之屬於經無聞左傳曰晉侯享公公請屬鄫豈周所謂連屬歟公羊傳曰自陜以東周公主之自陜以西召公主之書曰畢公率東方諸侯入應門右太保率西方諸侯入應門左此所謂九命作伯者也與殷所謂天子之老二人一矣周有九伯則畿內蓋亦設牧而大宰言施典于邦國設其牧者以牧之所設主為邦國故也禮書延平周氏曰方州以地言屬連以人言卒以兵言方伯長於一方者也屬長長其所屬者也連者結其衆帥者率以身其兵足當卒然之變而為其所取正者故曰卒正其地逹乎逺外而為之長者故曰州伯老者有成德而人之所承事者也二伯者有成德而又天子之所承事者也故曰天子之老嚴陵方氏曰方伯即州伯也王畿居中八州居外各設一方伯焉長言其足以長人也所謂比長之長亦若是爾帥言所帥者衆非特長之而已所謂師帥之帥亦若是爾正言正於一而止非特帥之而已所謂黨正之正亦若是爾伯亦長也必謂之伯則以成德稱之以其為一州之長非成德不足以當之故也所謂宗伯之伯亦若是爾夫能長人然後能帥衆能帥衆然後能正於一能正於一然後其德成焉故其序如此正也帥也長也蓋八伯之屬也八伯又二伯之屬也故曰八伯各以其屬屬於天子之老二人然二伯又謂之老者以其居人臣之極位不特貴乎有其德又貴乎有其年故也國有國老鄉有鄉老皆以是而已曲禮言其自稱亦曰天子之老者蓋自稱則其義如彼人稱之則其義如此二伯以八伯為之屬亦止稱伯者猶之天子諸侯通謂之君而天子則又為諸侯之君也亦見曲禮五官之長九州之長解天下九州止於八州有伯者以畿內王所自治故不設伯也管仲又言五侯九伯者以於九州之諸侯為長故曰九耳不必九人亦猶百揆稱百四嶽稱四而已明堂位謂之九采左氏傳謂之九牧皆以是也馬氏曰天子之畿外則有公侯伯子男之異畿內則有公卿大夫之别其內外已備而千里之外則又設方伯屬長連帥卒正州伯至于伯則已極矣而屬於天子之老蓋先王之盛時上下有以相維然後可以至於長久連與屬有相維之意也卒與州有相聚之意也山隂陸氏曰五國以為屬屬以官之六屬制名言大事則從其長小事則専逹也十國以為連連以聯制名言以授邦職以役國事如聯也三十國以為卒卒以卒制名言以比追胥以令貢賦如卒也長之以仁故屬有長帥之以智故連有帥正之以義故卒有正至伯則於一州為長其仁可知也其智與義亦可知也彼正以下吾驅之而已是故或謂之牧若二伯又有大於此者焉能充此任者其殆聖矣乎周公是也召公猶有慙德八州八伯蓋天子之縣內不在此數鄭氏答張逸問云畿內之州不置伯誤矣書曰咨十有二牧然王制九州而八伯者以方稱二十一十國以為州州有伯天子之縣內不可以入此數也天子之縣內凡九十三國廬陵胡氏曰屬聯連比卒伍州聚也據左氏州牧得征五侯九伯則知周制牧下有二伯侯得為之故詩旄丘責衛伯也衛是侯爵而為州伯若伯之賢者亦進為牧故周禮宗伯八命作牧謂侯伯有功德者加命得専征伐為牧也鄭乃云殷之州長曰伯虞夏及周皆曰牧今案書覲四嶽羣牧是虞稱牧也左氏宣三年云夏貢金九牧是夏稱牧也大宰云施典于邦國建其牧是周稱牧也然虞雖稱牧而書傳云唯元祀巡四嶽八伯則亦稱伯周雖稱牧而鄭答張逸云周官畿內之州不置伯牧即伯也則亦稱伯今謂殷獨稱伯虞夏周皆稱牧不稱伯者非也永嘉徐氏曰先王衆建諸侯而設方伯連帥之職或以子男附庸之屬不能専逹於天子故貢賦朝聘之數悉使之聽命於牧伯此特其一節耳夫先王舉天下以封建諸侯而闕然無所紀綱於其間則強弱有以相吞而大小無以相維甚非經久長治之䇿也蓋方伯連帥之設所謂褒表功德關諸盛衰深根固本為不可拔者也其所係亦大矣自黃帝置左右大監監於大國而二伯之職肇端於此堯時羲和掌天地之官三公為之實為二伯羲伯司東凡南方事皆配之和伯司西凡北方事皆配之殷制大而二伯小而八伯繩牽絲聯相維而不亂文王嘗為殷西伯矣至周之盛時天下諸侯無慮千八百國周召為東西伯分陜而主之大公封於齊亦受五侯九伯専征之命書載顧命畢公大保率東西諸侯以入至於蔡仲管叔監牧荆豫荆州牧蔡仲豫州牧管叔君陳畢公迭居東郊則大為二伯小為八伯咸出於天子之命以統天下之諸侯方伯連帥設於下而禮樂征伐出於上此先王封建之大權也宣王中興此制未泯韓侯在韓召虎在淮申伯在荆方叔在齊布在諸侯以統萬國復古之業於是乎在延及平王遂無意於紀綱而王制隳壞牧伯弛職東遷之變唯晉鄭二國是依而方伯連帥未聞有定王者矣向使平王因是二國以振牧伯之任則諸侯尚可為也奈何以文侯之賢而歸之於國以鄭伯之功而乃奪之政則周之事權於是去矣自是轉相吞滅莫能統紀春秋之際可得而考者百有七十餘國而已由是觀之方伯之設所係豈不重歟嘗論春秋之初齊僖衛宣雖太公唐叔之後當時未嘗見其受命而以牧伯之事考之經傳齊僖公自以為東州之小伯齊東州之侯出國語而黎之臣子亦以方伯連帥之職責衛宣公蒲之役二國又自相推許而春秋亦記曰胥命桓三年然則諸侯莫適所主而望大國之安靖周室既不以為意齊侯自見為牧伯之後而取方伯連帥之權而因以為利耳當是時中國蓋多故矣此蓋其始變也未幾齊桓晉文踵其餘迹而牧伯之事始大放肆不出於王命而強大得以専行於弱小矣雖然王使召伯賜齊侯以侯伯之命莊二十七年是猶有待於王之命也晉文致天王於踐土而策命諸侯為侯伯君子以為何異於要而取之也况於二公之身其親所屠滅者甚衆方之古牧伯比小事大之義果何如哉又其甚也郤犫為公族大夫以主東諸侯成十六年將以帥諸侯而使其大夫主之安在其為宗諸侯也至秦人廢侯置守其勢之所激有自來矣漢初相國下諸侯王御史執法下郡守相國主國御史主郡三公分置郡國於時未置刺史也自武帝置十三刺史古牧伯之任也西京之制御史所上案章先下三公參決然後有所黜退此猶有八伯屬於天子之老二人之意中興以來矯枉過直刺史劾奏不關三府直行退免是時朱浮深以為不然夫惟考於先王設方伯之意與夫春秋霸主擅權之故以及於漢人刺史輕重之由可以論世變矣眉山孫氏曰或問周召相成王為左右豈置諸左右以為近輔如阿衡之左右商王傅説之輔相髙宗邪抑為左右丞相之官如秦之斯與去疾漢之勃與平也曰是皆不然王制天子之老二人分天下以為左右曰二伯周召相成王為左右則為二伯者也何以明之樂記説大武之樂象武王之功五成而分周公左召公右是舉其分陜之治也二公當分陜之日實為二伯以相武王及武王崩周公攝政行天子事則七年之中二伯之任宜乎其缺及成王即政周公復辟仍與召公同為二伯是以孔子書之曰相成王為左右蓋周公為東伯而召公為西伯也所以知其然者畢命載畢公代周公為太師為東伯可推以見也成王將崩命召公畢公率諸侯相康王而太保率西方諸侯入應門左畢公率東方諸侯入應門右夫天子南面嚮明而治太保入應門左則在天子之右西方諸侯之伯也畢公入應門右則在天子之左東方諸侯之伯也東西二伯相天子為左右經傳甚明特學者考究未之詳也公羊傳曰天子三公者何天子之相也天子之相則何以三自陜而東周公主之自陜而西召公主之一相處乎內公羊氏此言亦所以論中分天下之二伯也而三代之際固有天子之相而不為三公者焉公羊但見三公之官不必備而中分天下之二伯多有兼三公者故取三公二伯而并言之所謂天子之相則何以三意謂上公雖有三而天子之相則何必以三也特有二伯而已因以周召分陜而實其説夫三公自三公也二伯自二伯也而公羊并之以為一此其説既已不通又謂二伯為相而一相處乎內彼徒見周召分陜之時周公處乎內而召公處乎外所謂召伯之教明於南國是也周召相成王為左右之時召公處乎內而周公處乎外所謂周公初於新邑洛用告商王士是也遂立一定之論而曰一相處乎內殊不知召公畢公為二伯以相康王之時召公為冢宰畢公為司馬曷嘗不並立於王朝乎至康王十有二年命畢公保釐東郊以代君陳於是畢公處乎外而於周公之薨已代為東伯則為二伯亦久矣安可謂二伯止有一相處乎內此豫所以論公羊之説稽考不明不足為信者此也又曰或問舜命九官以伯禹宅百揆伯益作朕虞伯夷典三禮孔安國傅謂禹為崇伯於益不言臣名而於伯夷以為臣名是三者之義果何如邪答曰禹代鯀為崇伯入為司空故曰伯禹蓋以諡配爵追書於虞朝之稱也益者大臨之别名也兼字而稱謂之伯益又謂之伯翳音相近而混亂也若夫伯夷之稱伯則又非爵非字蓋官也案書大傳載堯之事自羲和死後分置八伯而伯夷居第一為陽伯是舜未命官之前伯夷已為八伯之官矣及命官之際四嶽舉伯夷以典禮而帝舜為之不名獨曰咨伯汝作秩宗史述其辭遜亦曰伯拜稽首讓于夔龍與衆臣異皆舉其官也周禮六卿春官謂之宗伯制名之義蓋取諸秩宗與陽伯焉且伯之為義其事有四惟公侯伯子男之伯所不必論而至於東西二伯之伯方伯連帥之伯以諡配字之伯則雖明智之士猶有所誤而况於後生晚學稽考之不詳者邪王制分天下以為左右曰二伯則東西二伯之伯也王制二百一十國以為州州有伯則方伯連帥之伯也臧僖伯臧哀伯士文伯士景伯之類則以諡配字之伯也劉氏孟冶曰古者內外相維大小相屬天下雖逺猶一身焉上有所為如身之使臂臂之使指無有偏而不舉之患者屬長連帥卒正處之有條而不紊也故內之公卿則盡贊襄之力濟濟而相遜外之諸侯則盡藩捍之力皇皇而不怠皆上下相繩之法井井有序如此方伯即州伯也二百一十國以為州州有伯者即千里之方伯是也屬取其有統屬之義連取其相聯比之義卒取其能率衆之義此計八州伯正帥長之數言之屬於天子之老二人即天子五官之長自稱於諸侯曰天子之老是也既取其德又取其年故以老稱之雖然屬長連帥卒正屬之八伯八伯又屬之二伯要之二伯以嵗之成質於天子雖所以總天下之大權亦非二伯所敢専也千里之內曰甸千里之外曰采曰流鄭氏曰甸謂服治田出榖稅曰采九州之內地取其美物以當榖稅也曰流謂九州之外也夷狄流移或貢或不禹貢荒服之外三百里蠻二百里流孔氏曰此一節總論畿內畿外九州治田及采取美物并九州之外或貢或不之事案禹貢五百里曰甸服下又云百里賦納總二百里納銍及秸粟米之等是甸為治田也千里之外謂規方千里之外若於王城五百里之外以殷制言之中國方三千里耳采取美物故言曰采周則王畿之外面别三千里采取美物則大行人六服所貢物是也流謂九州之外殷則面别千五百里之外二千五百里之內謂之流周三千五百里之外五千里之內為流也延平周氏曰千里之內曰甸即五百里甸服也千里言其方五百里言其面於侯服言采則見荒服之有蠻也於荒服言流則見侯服之有諸侯也長樂陳氏曰甸則禹貢所謂甸服也采則禹貢所謂侯服之百里采也流則禹貢所謂荒服之二百里流也甸者王之所自治也采者于此有采地公卿大夫與王子弟所有是也流者流罪人於此也侯服近故舉其內者則凡服之在內者可知荒服逺故舉其外者則凡服之在外者可知周官大司馬千里曰國畿其外方五百里曰侯畿以至甸男采衛蠻夷鎮蕃為九服其大槩或與禹貢同唯蕃畿則在禹貢之外矣尚書之於六服或言侯甸而不及采男衛或言侯甸男衛而不及采與此言甸采流同清江劉氏曰此據綏服居中而言內千里外千里則五服可知采亦當作蔡聲誤也馬氏曰流者言其或貢或不流移之無常也天子治近者詳治逺者略近則長之故服治田以出榖稅取美物以當榖稅皆責其賦之入也逺則柔之故其或貢或不流移之無常而無所責焉然均是畿也而禹貢則有納銍納總粟米之異者亦有逺近之節也均是采也而周官之於貢有祀嬪器幣之異者亦有逺近之差也均是流也而禹貢之荒服則有三百里蠻二百里流之辨者亦有輕重之意也李氏曰采於侯服為尤近流於荒服為極逺九州舉內以見外四海舉外以包內虙氏曰此正夏法也夏之五服而甸服則在王畿之內周之九服而甸服則在王畿之外此言千里之內曰甸千里之外曰流知其非周也然王制言甸采流而不言其餘者亦從間之辭他無義理劉氏孟冶曰規方千里之外謂之甸服去王城面五百里故曰千里之內甸服五百里之外有侯服侯服內之百里謂之采服侯服五百里外有綏服綏服五百里外有要服要服五百里外有荒服荒服之內有流王制自千里之甸直言及於二千里之流蓋言其自近及逺皆天子化域之內無有不被其聲教者爾眉山孫氏曰禹制天下為五服王畿與焉所謂侯綏要荒是也周公分天下為九畿而王畿不與九畿即九服也所謂侯甸男采衛蠻夷鎮蕃是也其夷鎮蕃三服在九州之外世一見各以其所貴寶為摯雖立是法而未嘗責之蓋來不拒去不追者也其蠻服在五服之外亦謂之要服以要束為義即後世之羈縻也禹之五服相距為方五千里周之九服合王畿相距為方萬里是周之地倍於禹豈周公變古之制而務廣地邪非也四海九州山川地里萬古不易特政教所加有逺近而制有不同爾禹在堯時弼成五服其要荒二服亦在九州內而謂之要荒者是其君長未能自同於華夏之國故聖人亦不能以待中國之道待之也自虞夏以至商周天下之俗日趨於文昔之要服荒服既革其蠻夷之習而自同於華夏之風禮樂制度合稟於王朝覲會同不失其節則聖人可不更為之制而進之於冕服采章之列邦國侯衛之間邪曰采服曰衛服義蓋如此其有未忘蠻夷之習者則亦以政教縻之而已此九州之地所以外迫四海之地所以在禹則為要荒二服在周則為采衛蠻三服也泝而上之禹之侯綏二服在周則為侯甸男三服也禹之甸服在周則為王畿也沿而下之周有六服之外又有夷鎮蕃之三服則以武王克商通道於九夷八蠻海外之國皆服王化故也或問曰五服之制凡五百里而為一服禹制與周制同也豫謂禹之侯綏二服在周為侯甸男三服禹之要荒二服在周為采衛蠻三服豈古之地相距千里者在後世而相距千五百里邪何不相侔若是也應之曰里以步計而步有不等也王制云古者以周尺八尺為步今以周尺六尺四寸為步鄭注云案禮周以十寸為尺或言周尺八寸則步更為八八六十四寸以此計之古者百里當今百三十五里以王制及鄭氏之言推之古之地相距千里者在後世當相距千三百五十里然則禹之甸服規方千里者王城在其中是四方各五百里也禹之五百里較周之五百里則羡百七十五里此甸服一方之所羡百七十有五合侯綏二服之所徑千三百有五十是為千五百二十五里是以在周得為侯甸男之三服也又要荒二服之所徑在後世亦為千三百五十里而後世九州之界益廣則所增奚止於百五十里是為千五百里有竒是以在周得為采衛蠻之三服也至於夷鎮蕃之三服在九州之外非禹迹所及無庸論也由是言之禹之五服王畿與焉相距以為五千里而地不加少周之六服合以王畿相距為七千里而地不加多其制雖殊其地實一孰謂周公變古之制而廣周地邪問者又曰夏周之制然矣有殷之時亦有五服之制乎應之曰以傳考之殷亦有五服特以五百里為一服祭公謀父諫穆王之語豈非殷制乎其言曰先王之制邦內甸服邦外侯服侯衛賔服蠻夷要服戎狄荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王所謂甸服侯服因於夏禮也所謂賔服則周五服在其中也所謂要荒以四夷去中國逺近為序也非殷五服謀父何以得是五者之名乎邦內甸服而詩云邦畿千里維民所止荒服者王而詩云自彼氐羌莫敢不來王信矣其為殷制也王制所載曰甸曰采曰流是記殷制而不及五服也武成所稱邦甸侯衛駿奔走亦謂殷畿內諸侯及賔服之君助祭於周也且祭公謀父周公之裔也舉先王之制以諫其君冝若用周禮乃以王畿為甸服何也韋昭曰甸古名世俗所習也故周襄王謂晉文公曰昔我先王之制有天下規方千里以為甸服是也韋氏之説善矣而甸服實始於禹其由禹功萬世永賴故歟商頌曰天命多辟設都于禹之績歲事來辟勿豫禍適是殷人責諸侯朝貢唯以禹績為準周雅曰豐水東注維禹之績四方攸同皇王維辟是周人責四方之會同唯以禹績為先也然則殷五服周六服皆大禹底績之地而弼成五服之功故不可不取法於禹也禮記集説卷二十六
