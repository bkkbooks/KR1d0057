body:
  text: 禮記集說卷一百五宋衛湜撰喪大記第二十二孔氏曰案鄭目録云名曰喪大記者記人君以下始死小斂大斂殯葬之事此於别録屬喪服嚴陵方氏曰孟子曰飬生者不足以當大事唯送死可以當大事周官以喪禮哀死亡則喪無非大事也然禮有小大此篇所記以大者為主故名曰喪大記疾病外內皆掃君大夫徹縣士去琴瑟寢東首於北牖下廢牀徹䙝衣加新衣體一人男女改服屬纊以俟絶氣男子不死於婦人之手婦人不死於男子之手鄭氏曰疾困曰病外內皆掃為賔客將來問病也徹縣去琴瑟聲音動人病者欲靜也凡樂器天子宫縣諸侯軒縣大夫判縣士特縣去琴瑟者不命之士寢東首於北牖下謂君來視之時也病者恆居北牖下或為墉下廢牀廢去也人始生在地去牀庶其生氣反徹褻衣則所加者新朝服矣互言之也加朝服者明其終於正也體一人體手足也四人持之為其不能自屈伸也男女改服為賔客來問病亦朝服也庶人深衣纊今之新綿易動搖置口鼻之上以為候男子不死於婦人之手婦人不死於男子之手君子重終為其相䙝孔氏曰此明君及大夫等疾困去樂之事君謂諸侯此篇所記皆據諸侯以下案論語鄉黨云疾君視之東首加朝服經云東首故鄭知君來視之時東方生長鄉生氣也案既夕禮云飬者皆齊文王世子云世子親齊元而飬至病困改服故檀弓曰親始死羔裘元冠者易之而已易羔裘元冠即朝服也嚴陵方氏曰疾甚至於病檀弓言曽子寢疾病論語言子疾病皆謂是也疾病則賔客見問故伯牛有疾而孔子問之曽子有疾而孟敬子問之皆禮然也曲禮曰大夫無故不徹縣士無故不徹琴瑟疾病則所謂有故也故皆徹而去之北牖與郊特牲言北墉下同義欲君南面而視之故也馬氏曰君子之於其生也欲內外之有别於其死也欲始終之不䙝則男女之分明而夫婦之化興此男子不死於婦人之手婦人不死於男子之手所以必記於禮也昔者曽子寢疾病樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭及其易簀反席未安而沒故論語亦云召門弟子曰啓豫足啓豫手則曽子之死唯弟子與子侍側而已李氏曰東首所以歸魂于陽北牖下所以反魄于隂使之各歸其真宅而已男子不死於婦人之手婦人不死於男子之手以齊終也金華應氏曰掃庭及堂正家之常道今於此又皆掃者肅外內以謹變致潔敬以謹終也樂縣琴瑟自其疾即不作則聲音固已久閟於耳矣撤而去之亦不欲接於目也君夫人卒於路寢大夫世婦卒於適寢內子未命則死於下室遷尸於寢士之妻皆死於寢鄭氏曰死者必皆于正處寢室通耳其尊者所不燕焉君謂之路寢大夫謂之適寢士或謂之適室此變命婦言世婦者明尊卑同也世婦以君下寢之上為適寢內子卿之妻也下室其燕處也孔氏曰此一經明貴賤死寢室同君謂諸侯諸侯三寢一正者曰路寢餘二曰小寢故春秋成公薨於路寢道也僖公薨於小寢譏即安謂就夫人寢也夫人亦有三寢一正二小亦卒正者也適寢猶今聽事處其制異諸侯大夫與妻皆死於適寢大夫妻曰命婦而云世婦世婦是諸侯之次婦諸侯世婦尊與命婦敵故互言見義命婦死於正寢則世婦死女君次寢之上也卿之妻未為夫人所命則死在下室至小斂後遷尸還正寢也士之妻各死正室夫妻皆然故云皆也鄭注寢室通者士喪禮云死于適室此云卒於適寢是寢室通也云尊者所不燕者謂尊嚴之處不就而燕息焉嚴陵方氏曰路寢謂之路猶路車之路以大言之也適寢謂之適猶適子謂之適以正言之也言正則以别他下室及燕處也寢即正寢也士與其妻皆死于寢則以賤而無嫌故也山隂陸氏曰諸侯子曰世子大夫妻曰世婦大夫不世爵祿然克生其子則世矣其妻謂之世婦以此內命婦曰世婦蓋名生於大夫之妻復有林麓則虞人設階無林麓則狄人設階小臣復復者朝服君以卷夫人以屈狄大夫以元赬世婦以袒衣士以爵辨士妻以稅衣皆升自東榮中屋履危北面三號捲衣投于前司服受之降自西北榮其為賔則公館復私館不復其在野則升其乘車之左轂而復鄭氏曰復招魂復魄也階所乘以升屋者虞人主林麓之官也狄人樂吏之賤者階梯也簨虡之類小臣君之近臣也朝服而復所以事君之衣也用朝服而復之者敬也復用死者之祭服以其求於神也君以卷謂上公也夫人以屈狄互言耳上公以衮則夫人用褘衣而侯伯以鷩其夫人用褕狄子男以毳其夫人乃用屈狄矣赬赤也元衣赤裳所謂卿大夫自元冕而下之服也其世婦亦以袒衣榮屋翼升東榮者謂卿大夫士也天子諸侯言東霤危棟上也號若云臯某復也司服以篋待衣於堂前私館卿大夫之家也不於之復為主人之惡孔氏曰自此至復而後行死事明招魂之禮此一經明復時所用之衣及招魂升降之節死者封內若有林麓則虞人設階梯而升屋官職卑小不合有林麓故狄人設階簨虡階梯之類也小臣君之親近冀君魂來依之大夫士以下亦用近臣也君以卷謂上公衮冕而下夫人屈狄謂子男之夫人男子舉上公婦人舉子男之妻男子舉上以見下婦人舉下以見上是互言也大夫招魂用元冕元衣纁裳故云元赬也世婦大夫妻也其上服唯䄠衣言世婦亦見君之世婦服與大夫妻同也士以爵辨士助祭上服也六冕則以衣名冠諸侯爵辨則以冠名衣今言爵辨但用其衣不用其辨也稅衣六衣之下也皆升自東榮者復者升東翼而上也天子諸侯四注為屋東西兩頭為屋簷霤下故言東霤大夫以下南北二注而為直頭頭即屋翼自此升也中屋履危者當屋東西之中履屋上髙危之處而復也北面求隂之義鬼神所嚮也三號者一號於上兾神在天而來一號於下兾神在地而來一號於中兾神在天地之間而來也三招既竟捲斂所復之衣從屋前投于司服之官司服待衣於堂前者前謂陽生之道復是求生也如雜記所言則每衣三號降自西北榮者復者投衣畢而往西北榮而下也初復是求生故自東榮而上求既不得不忍虛從所求不得之道還故就幽隂而下因取西北扉為便也故鄭注士喪禮云降因徹西北扉若云此室凶不可居也嚴陵方氏曰設階必以虞人者以階之材必取諸林麓而虞人則掌林麓之官故也無林麓則無虞人故以樂吏之賤者代之顧命言狄設黼扆綴衣而不必簨簴之類者以此故斂則用大胥衆胥飾則用崇牙璧翣而棺槨之間以容柷為度馬氏曰始死者人以不忍之心而望其重生求生者人以必還之理而欲其不死故謂之復自君至於士自夫人至於士妻各以其祭服之至盛者招之庶乎神之衣是而來也中屋履危則求之上下之間北面三號則求諸幽隂之義及乎不知神之所在而卒不復也然後捲衣投於前而降焉蓋死矣滅矣不可以復生矣則自小斂以至於葬此所謂唯哭先復復而後行死事也然則死者不可以復生萬物自然之理也于死而必為復既死而卒不能復聖人制此豈虛禮歟亦以謂禮義之經非從天降也非從地出也人情而已矣孝子之情茍可以生死而肉骨者無不為己况於萬一有復生之道何憚而不設此禮哉山隂陸氏曰虞人所虞也狄人所樂也喪則憂戚幸其生故使虞人狄人設階周官夏采掌大喪以冕服復于大祖亦是此意大夫變纁言赬則大夫以下纁裳以赬代歟據一命緼紱幽衡再命赤韍幽衡士妻以稅衣亦互言爾元赬冕服也大夫以元赬則世婦用鞠衣士以爵辨則其妻用袒衣即服皮辨其妻乃服稅衣矣君夫人應言東霤今言皆升自東榮主大夫以下天子諸侯為殿屋四注大夫以下雖亦四注其上猶有翼復衣不以衣尸不以斂婦人復不以袡凡復男子稱名婦人稱字唯哭先復復而後行死事鄭氏曰不以衣尸謂不以襲也復者庶其生也若以其衣襲斂是用生施死於義相反士喪禮云以衣衣尸浴而去之袡嫁時上服非事鬼神之衣也婦人稱字不以名行也氣絶則哭哭而復復而不蘇可以為死事孔氏曰絳襈衣下曰袡自殷以上貴賤復同呼名周則天子稱天子諸侯稱某甫且字矣大夫士稱名婦人並稱字氣絶而孝子即哭哭訖乃復故云唯哭先復復而不生故行死事謂正尸於牀及浴襲之屬也長樂陳氏曰不以衣尸不以斂此兩句共一說耳於文為駢然則本但云復衣以衣尸不以斂也以衣尸者即士喪禮以衣衣尸者也不以斂者即士喪禮浴而去之者也嚴陵方氏曰稅與袡皆謂之緣衣或以復或不以復者蓋祭之緣衣則謂之稅嫁之緣衣則謂之袡此其所以異服各以死者之祭服以其求於神故也山隂陸氏曰復世婦以袒衣士妻以稅衣袒衣有袡稅衣亦有袡復升而復袡下垂故不以始卒主人啼兄弟哭婦人哭踊鄭氏曰悲哀有深淺也若嬰兒中路失母能勿啼乎孔氏曰主人孝子男子女子也哀痛嗚咽不能哭故啼也有聲曰哭兄弟情比主人為輕也婦人衆婦也宗婦亦啼婦人雀踊而此云踊者通自上諸條並踊也山隂陸氏曰主人啼而不哭兄弟哭而不踊婦人哭踊殺於上矣蓋踊所以動體安心下氣也既正尸子坐於東方卿大夫父兄子姓立于東方有司庶士哭于堂下北面夫人坐于西方內命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北面鄭氏曰正尸者謂遷尸牖下南首也子姓謂衆子孫也姓之言生也其男子立於主人後女子立於夫人後世婦為內命婦卿大夫之妻為外命婦外宗姑姊妹之女孔氏曰此經明人君初喪子及夫人以下哭位也案既夕禮云設牀笫當牖士喪禮將含商祝入當牖北面故正知正尸牖下南首也子謂世子世子尊故坐于東方士喪禮主人坐於牀東是也卿大夫父兄子姓立于東方以士喪禮言之衆主人在其後又云親者在室謂大功以上當在室內東方但諸侯以上位尊故顧命康王之入翼室恤宅宗不宜與卿大夫父兄子姓俱在室內也卿大夫等或當在戶外之東方遙繼主人之後也有司庶士卑故在堂下北面案士喪禮云小功以下衆兄弟堂下北面此經直云有司庶士在堂下則諸父兄子姓等雖小功以下皆在堂上西面也夫人坐于西方者亦近尸故士喪禮云婦人俠牀東西但士禮略人君當以帷鄣之內命婦則子婦也姑姊妹謂君姑姊妹也子姓君女孫皆立于西方也外命婦外宗疏於內命婦故在戶外婦人無堂下位故皆堂上北面舅之女及從母之女外宗中兼之也山隂陸氏曰卿大夫序於父兄子姓之上國事先君臣也諸侯為卿大夫服而不服父兄子姓以此序內命婦在上豈諸侯為內命婦服視卿大夫服歟金華應氏曰男東女西隂陽之大分也喪遽哀迫人雜事叢先謹男女之辨而各以類從則紛糾雜亂者有倫矣主東賔西內外之大統也男主居東之上而內之家長雖若母亦在西則示一國一家之有主而內外族姓之尊卑咸有所統攝矣大夫之喪主人坐于東方主婦坐于西方其有命夫命婦則坐無則皆立士之喪主人父兄子姓皆坐于東方主婦姑姊妹子姓皆坐于西方凡哭尸于室者主人二手承衾而哭鄭氏曰命夫命婦來哭者同宗父兄子姓姑姊妹子姓也凡此哭者尊者坐卑者立士賤同宗尊卑皆坐承衾哭者哀慕若欲攀援孔氏曰此經明大夫士初有喪哭位之禮大夫之喪哭位之中有命夫命婦雖有卑於死者以其位尊故坐哭若其無命夫命婦雖尊於死者亦皆立哭此是為喪來哭者若有弔者當立哭不得坐也不顯父兄子姓及姑姊妹哭位者約上文君喪及下文士喪略可知也君與大夫位尊故坐者殊其貴賤士既位下故坐者等其尊卑無所異也案皇氏曰尊者坐卑者立謂爵位尊者則坐故上文君喪子及夫人坐大夫之喪主人主婦命夫婦皆坐是也君之喪卿大夫皆立卿大夫之喪非命夫命婦者皆立是也此尊卑非謂對死者為尊卑也成服之後尊於死者則坐卑於死者則立也君之喪未小斂為寄公國賔出大夫之喪未小斂為君命出士之喪於大夫不當斂則出鄭氏曰父母始死悲哀非所尊不出也出者或至庭或至門國賔聘大夫不當斂其來非斂時孔氏曰此一節明君大夫士未小斂之前主人出迎賔之節鄭注或至庭者謂世子迎寄公及國賔下文士出迎大夫是也或至門者謂下文大夫於君命是也以此言之則世子於天子之命士於君命亦皆然也士之喪大夫來弔其主人於大夫來弔不當小斂之時則出迎大夫案檀弓云大夫弔當事而至則辭焉注云辭猶告也擯者以主人有事告也主人無事則為大夫出但云斂不云襲者未襲之前唯為君命出其餘則不出故士喪禮未襲之前君使人弔主人迎于寢門外是也君使退主人哭拜送于外門外於時賔有大夫則拜之非特出迎賔也雜記云士喪當袒大夫至絶踊而拜之亦謂斂後正斂時不出也凡主人之出也徒跣扱衽拊心降自西階君拜寄公國賔于位大夫於君命迎於寢門外使者升堂致命主人拜於下士於大夫親弔則與之哭不逆於門外鄭氏曰拜寄公國賔於位者於庭鄉其位而拜之此時寄公位在門西國賔位在門東皆北面小斂之後寄公東面國賔門西北面士於大夫親弔謂大夫身來弔士也與之哭既拜之即位西階東面哭大夫特來則北面孔氏曰前經明出迎賔逺近此經更辨拜迎委曲之儀降自西階不忍當主位也寄公謂失位之君國賔謂鄰國大夫來聘者鄭知寄公在門西者寄公有賔義也知國賓在門東者或本是吉使行私弔之禮故從主人之位皆北面者凡賔弔北面是其正故檀弓云曽子北面而弔焉尸在堂上故鄉之也寄公小斂後稍依吉禮就賔位東面鄉主人也國賔亦以小斂後漸吉就賔位但爵是卿大夫猶北面也主人鄉其位拜訖即位於西階下東面哭之士之喪大夫親來弔立於西階下東面主人則降自西階下南面拜之拜訖即位西階下與大夫俱哭不迎大夫於門外此謂大夫士俱來若大夫獨來不與士相隨則北面故鄭注大夫特來北面也山隂陸氏曰迎逢也凡言先之也若逆彼來而後往焉大夫於君命言迎士於大夫言逆以此夫人為寄公夫人出命婦為夫人之命出士妻不當斂則為命婦出鄭氏曰出拜之於堂上也此時寄公夫人命婦位在堂上北面小斂之後尸西東面孔氏曰前經明男子迎賔此經明婦人迎賔也出謂出房也婦人不下堂但出房而拜於堂上也婦人尊卑與夫同故所為出者亦同也前文云君之喪外命婦率外宗哭于堂上北面故鄭知此時在堂上北面也小斂之後遷尸于堂故知從婦人之位在尸西東面也小斂主人即位于戶內主婦東面乃斂卒斂主人馮之踊主婦亦如之主人袒說髦括髮以麻婦人髽帶麻于房中鄭氏曰士既殯說髦此云小斂蓋諸侯禮也士之既殯諸侯之小斂於死者俱三日也婦人之髽帶麻於房中則西房也天子諸侯有左右房孔氏曰自此至拾踊一節明人君大夫士等小斂之節及拜迎於賔及奠祭弔者之儀初時尸在牖下主人在尸東今小斂當戶內故主人在戶內稍東西面斂訖主人馮尸而踊主婦馮尸竟亦踊主人袒者嚮小斂不袒今方有事故袒衣也說髦者髦幼時翦髮為之至年長則垂著兩邉明人子事親恆有孺子之義也若父死說左髦母死說右髦二親並死則並說之親沒不髦是也今小斂竟喪事已成故說之也括髮以麻者以用也人君小斂說髦竟而括髮用麻士既小斂亦括髮但未說髦耳婦人髽亦用麻也帶麻麻帶也謂婦人要絰也男子說髦括髮在東房婦人髽帶麻于西房與男子異處鄭注於死者俱三日者謂數往日也藍田吕氏曰婦人不俟男子襲絰亦先帶麻者以其無絞帶布帶且質略少變故因髽而襲絰也長樂黃氏曰小斂所用之日以喪禮義考之但有死三日而斂若併死日而數二日而小斂三日而大斂今言三日而斂則恐指大斂而不及小斂唯白虎通義云天子諸侯三日小斂大夫士二日小斂此乃小斂日數雖引以為在禮有之然無所考又天子諸侯殯葬月日與士不同則斂日亦當不同又曰案士喪禮小斂馮尸主人括髮袒衆主人免于房婦人髽于室又士喪禮曰既馮尸主人絞帶衆主人布帶喪大記曰婦人髽帶麻于房中以此觀之則知小斂馮尸之後括髮免髽之時主人已絞帶衆主人已布帶婦人已帶麻特主人未襲絰爾又曰喪服斬衰章疏云婦人亦有絞帶布帶以備喪禮吕氏云無絞帶布帶當考徹帷男女奉尸夷于堂降拜鄭氏曰夷之言尸也於遷尸主人主婦以下從而奉之孝敬之心也孔氏曰此經明士之喪小斂訖徹帷夷尸之節初死恐人惡之故有帷小斂衣尸畢有飾故除帷也諸侯及大夫賔出乃徹帷見下文夷陳也小斂竟相者舉尸將出戶陳于堂孝子男女親屬扶捧之至堂也降下也適子下堂拜賔也嚴陵方氏曰周官凌人大喪共夷槃氷所以寒其尸使勿傷故曰夷牀曰夷衾皆以是夷堂者夷之為言移也亦以傷為戒故也山隂陸氏曰體魄降矣而謂之夷婉詞也盤曰夷槃牀曰夷牀衾曰夷衾亦以此即若知氣有升無夷也君拜寄公國賔大夫士拜卿大夫於位於士旁三拜夫人亦拜寄公夫人於堂上大夫內子士妻特拜命婦泛拜衆賔於堂上鄭氏曰衆賔謂士妻也尊者皆特拜拜士與其妻皆旅也孔氏曰此經明小斂訖拜賔也君謂嗣君也小斂畢尸出堂嗣君下堂拜寄公國賔並就其位鄉而拜之也大夫士是先君之臣同服斬衰小斂訖出庭列位故嗣君出拜之卿大夫則就其位鄉而拜之士賤不人人拜之每一面三拜士有三等故也旁猶面也夫人拜於堂上婦人無下堂也大夫內子士妻夫人亦拜之卿妻曰內子大夫妻曰命婦不言者見卿妻與命婦同也特拜命婦特猶獨也謂人人拜之尊故也拜內子亦然衆賔士妻賤故泛拜之亦旁三拜也此經唯舉君喪拜賔不云大夫士者文不具也大夫士喪拜賔亦然故士喪禮云主人拜賔大夫特拜士旅之是也案熊氏曰大夫士拜卿大夫者是卿大夫士家自遭喪小斂後拜卿大夫於位士旁三拜大夫內子士妻亦謂大夫士妻家自遭喪小斂後拜命婦及拜士妻之禮大夫士各自遭喪并言之者以其大夫士家喪小斂後拜賔同故也主人即位襲帶絰踊母之喪即位而免乃奠弔者襲裘加武帶絰與主人拾踊鄭氏曰即位阼階之下位也有襲絰乃踊尊卑相變也母之喪即位而免記異者禮斬衰括髮齊衰免以至成服而冠為母重初亦括髮既小斂則免乃奠小斂奠也始死弔者朝服裼裘如吉時小斂則改襲而加武與帶絰矣武吉冠之卷也加武者明不改冠亦不免也檀弓曰主人既小斂子游趨而出襲裘帶絰而入也孔氏曰主人拜賔時袒今拜訖襲衣加要帶首絰於序東復位乃踊也案士喪禮云先踊乃襲絰此先襲絰乃踊士為卑此據諸侯為尊故鄭注云尊卑相變也為父喪拜賔竟而即阼階下位又序東帶絰猶括髮若為母喪至拜賔竟即位時不復括髮以免代之免以襲絰至大斂乃成服所以異於父也拜賔襲絰踊竟後始設小斂之奠弔者襲裘加武者未小斂之前弔者裘上有裼衣上有朝服開朝服露裼衣今小斂之後弔者以上朝服掩襲裘上裼衣也加武者主人既素冠素辨弔者故加素辨於武也帶絰者帶謂要帶絰謂首絰以朋友之恩故加帶絰若無朋友之恩則無帶唯絰而已拾踊拾更也主人先踊婦人踊弔者踊三者三是與主人更踊也鄭注加武明不改冠亦不免也者凶冠則武與冠連不别有武免亦無武今云加武明不改作凶冠亦不作免弔所以有免以四代袒免親及朋友在他邦嫌有免理故云亦不免也引檀弓曰以下證小斂之前裼裘小斂之後襲裘也此皆謂未成服前若成服後成錫衰緦衰等已具上檀弓疏山隂陸氏曰鄭氏謂有襲絰乃踊尊卑相變也然則袒括髮括髮袒亦相變言加武則著不以居冠弔據居冠屬武後絰弔服也君喪虞人出木角狄人出壺雍人出鼎司馬縣之乃官代哭大夫官代哭不縣壺士代哭不以官君堂上二燭下二燭大夫堂上一燭下二燭士堂上一燭下一燭鄭氏曰代更也未殯哭不絶聲為其罷倦既小斂可為漏刻分時而更哭也木給爨竈角以為㪺水斗壺漏水之器也冬漏以火爨鼎沸而後沃之此挈壺氏所掌也屬司馬司馬涖縣其器大夫不縣壺下君也士代哭不以官自以親疏哭也燭所以照饌也滅燎而設燭孔氏曰此一節論君及大夫士小斂後代哭之異虞人主山澤之官故出木與角狄人樂吏主挈壺漏水之器故出壺雍人主亨飪故出鼎冬月水凍則漏遲無凖故取鼎暖水用虞人木爨煮之也司馬夏官卿也其屬有挈壺氏故司馬自臨視縣漏器故挈壺氏云凡喪縣壺以代哭者縣漏分時使均其官屬更次相代而哭也有喪則於中庭終夜設燎至曉滅燎而日光未明故須燭以照祭饌也賔出徹帷哭尸于堂上主人在東方由外來者在西方諸婦南鄉鄭氏曰賔出徹帷君與大夫之禮也士卒斂即徹帷徹或為廢由外來謂奔喪者也無奔喪者婦人由東面孔氏曰此明小斂後尸出在堂時法也鄭注士卒斂即徹帷士喪禮文賔出後乃除帷是人君及大夫禮舒也哭尸於堂主人位在尸東婦人位在尸西如室中若於時有新奔喪從外來者則居尸西方欲異於在家也未小斂而奔者則在東方故奔喪注云其未小斂而至與在家同也諸婦南鄉謂主婦以下在家者婦人位本在西方東鄉今既有外新奔者故移辟之而近北鄉南也婦人迎客送客不下堂下堂不哭男子出寢門見人不哭其無女主則男主拜女賔于寢門內其無男主則女主拜男賔于阼階下子幼則以衰抱之人為之拜為後者不在則有爵者辭無爵者人為之拜在竟內則俟之在竟外則殯葬可也喪有無後無無主鄭氏曰婦人所有事自堂及房男子所有事自堂及門非其事處而哭猶野哭也出門見人謂迎賔也拜者皆拜賔於位也為後者有爵攝主為之辭於賔耳不敢當尊者禮也孔氏曰此一節明小斂之後男主女主迎送弔賔及拜賔之位又廣明喪主不在之義婦人質故送迎敵者不下堂有君犬人弔則主婦下堂至庭稽顙而不哭也男子遭喪敵者來弔不出門若有君命則出門亦不哭也故士喪禮君使人弔徹帷主人迎于寢門外見賔不哭是也其無女主以下明喪無主使人攝者禮也若有主則男主拜男賔女主拜女賔無女主則男主拜女賔于寢門內少逺階下而猶不出門也無男主則使女主拜男賔於阼階下位鄉云女有下堂謂此也子雖幼小則以衰抱之為主而人代之拜賔也為後者不在則有爵者辭者謂主有官爵出行不在而家有喪其攝主無官爵則辭謝於賔云已無爵不敢拜賔也無爵者人為之拜謂不在之主無官爵其攝主之人為主拜賔也若主行近在竟內則俟其還乃殯葬若主在國外不可待則殯又不可待則葬可也喪有無後無無主釋所以使人攝及以衰抱幼之義無主則對賔有闕故四鄰里尹主之無得無主也嚴陵方氏曰有後無後存乎天有主無主存乎人存乎天者不可為也故喪有無後者存乎人者可以為也故無無主也金華應氏曰有爵者來弔則辭謝不敢見重爵命也無爵者則代之拜有爵無爵蓋係於弔者而注以係於為後不在之人雖於理有之而有不通者人之於喪也惟其情之厚者則弔之初不視其爵之有無而為攝主者亦通大夫士而言也大夫或弔於士士或弔於大夫其往來初無常而受弔者不拘為後之貴賤但弔者之至則隨其人而應之有所辭所拜之不同耳且攝主所以領賔而欲弔者之不虛辱耳若如注說則為後不在而必身無爵者於凡有客始一例接之茍有爵則一例辭之是皆無事乎接賔也又何以攝主焉在禮士不主大夫之喪士不攝大夫則有爵者喪必有爵者而後主之矣為主者有爵則受有爵之弔乃為相稱又何辭焉君之喪三日子夫人杖五日既殯授大夫世婦杖子大夫寢門之外杖寢門之內輯之夫人世婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聽卜有事於尸則去杖大夫於君所則輯杖於大夫所則杖鄭氏曰三日者死之後三日也為君杖不同日人君禮大可以見親疏也輯斂也斂者謂舉之不以拄地也夫人世婦次於房中即位堂上堂上近尸殯使人執杖不敢自持也子於國君之命輯杖下成君不敢敵之也卜卜葬卜日也凡喪祭虞而有尸大夫於君所輯杖謂與之俱即寢門外位也獨焉則杖君謂子也於大夫所杖俱為君杖不相下也孔氏曰自此至隱者一節廣明君及大夫士三日後杖之節制案下文大夫之喪既殯主人主婦室老皆杖今杖不同日是人君禮也子杖通女子在室者若嫁為他國夫人則不杖嫁為卿大夫妻同五日杖也喪服四制七日授士杖君之女及內宗外宗嫁為士妻及女御皆七日杖也子大夫子兼適庶及世子寢門殯宫門也子大夫廬在寢門外得持杖拄地行以至寢門殯柩在門內神明所在故入門輯斂之不敢拄地也若庶子至寢門則去杖不得持入此大夫與子同者謂大夫特來不與子相隨也若與子相隨子杖則大夫輯子輯則大夫去杖故下文云大夫於君所輯杖是也夫人世婦在其次則杖者次謂西房居喪之地則得扶杖拄地即位則使人執之以堂上有殯也子有王命去杖者世子尊天子之命對之不敢杖也國君之命輯杖謂鄰國使人來弔世子未敢比成君故斂杖也有事於尸謂虞及卒哭祔祭敬卜及尸故去杖也大夫於君所輯杖者君謂世子經前云子後云君嫌是别人故鄭云君謂子也若大夫與世子俱在門外位大夫則輯杖敬嗣君也大夫與大夫俱在門外是兩大夫相對同為君杖不相降故並得杖拄地也山隂陸氏曰子夫人杖不言授嫌或使之大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖鄭氏曰大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授人杖與使人執之同也孔氏曰此一節明大夫杖節大夫死後三日既殯應杖者悉杖也大夫嗣子而云大夫者兼通子為大夫有父母喪也有君命則去杖對君命亦然也大夫之命謂嗣子對彼大夫之使則斂杖自卑下也兩大夫自相對則不去杖內子卿妻也有夫及長子喪君夫人有命弔已則去杖若有君之世婦命弔內子敬之則使人執杖以自隨卑於夫人故隨而不去也經云大夫之喪不舉命婦而舉內子卿妻者互文也欲見卿喪與大夫同山隂陸氏曰內子為夫人之命去杖輯杖於此取中焉在去杖與杖之間為世婦之命授人杖不言使人執之卑也其稱為亦以此禮記集說卷一百五
