body:
  text: 禮記集說卷一百五十五宗衛湜撰父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執鴈入揖讓升堂再拜奠鴈蓋親受之於父母也降出御婦車而壻授綏御輪三周先俟於門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也鄭氏曰酌而無酬酢曰醮醮之禮如冠醮與其異者於寢耳壻御婦車輪三周御者代之壻自乘其車先道之歸也共牢而食合卺而酳成婦之義孔氏曰此一節明親迎之禮冠禮醮子在廟父以酒醮子而命之親迎男往迎之女則從男而至主人女之父以壻來親迎故筵几于廟以敵禮待之故拜迎于門外主人就東階初入門將曲揖當階北面揖當碑揖至階三讓主人升自阼階揖壻升自西階北面奠鴈再拜於時女房中南面母在房戶外之西南面壻既拜訖旋降出女出房南面立於母左父西面誡之女乃西行母南面誡之是壻親受之於父母也降出御婦車謂壻降西階而出親御婦車壻授綏者婦升車之時而壻授之以綏御婦車之輪三匝然後御者代御之婦至壻之寢門壻揖以婦入則稍西避之共牢而食者在夫之寢壻東面婦西面共一牲牢而同食不異牲合卺而酳酳演也謂食畢飲酒演安其氣卺謂半瓢以一瓢分為兩瓢謂之卺壻之與婦各執一片以酳故云合卺而酳欲使壻親婦婦亦親壻所以體同為一不使尊卑有殊也藍田吕氏曰御婦車授綏御輪三周先俟於門外則所以下之之禮盡矣共牢合卺所以親親之義見矣下之則有敬矣親之則有愛矣愛敬禮之大體而先敬後愛者自異姓而合之所以貴乎别也故曰敬慎重正而後親之禮之大體而所以成男女之别而立夫婦之義嚴陵方氏曰執鴈謂執之以為摯也執之自此而奠之於彼故又言奠鴈焉御車以輪三周為莭止於三則取隂陽竒偶之數成也共牢而食則不異牲也合卺而酳則不異爵也合卺有合體之義共牢有同尊卑之義體合則尊卑同同尊卑則相親而不相離矣新安朱氏曰用鴈亦攝盛之意蓋既許攝盛則雖庶人不得用匹又昏禮摯不用死故不得不越雉而用鴈也錢塘于氏曰上一段發明其所以重故總之曰所以敬謹重正昏禮也此一假發明其所以親故總之曰所以合體同尊卑以親之也推所以而言之則聖人兩致其意于昏禮者始昭然義見矣况夫婦之義本於判合故當始進之初于敬謹重正之中尤致其綢繆委曲之誠父親醮而命迎則降尊以示其恩也壻再拜而奠鴈則屈體以尚其恭也御輪以候則舂容以須之而不敢遽也揖婦以入則卑抑以延之而不敢慢也共牢合卺又欵密浹洽而相與周旋也敬慎重正而后親之禮之大體而所以成男女之别而立夫婦之義也男女有别而后夫婦有義夫婦有義而后父子有親父子有親而后君臣有正故曰昏禮者禮之本也鄭氏曰言子受氣性純則孝孝則忠也孔氏曰昏禮必敬慎重正而後男女相親不然久必離異也所以昏禮為禮本者姻禮得所則受氣純和生子必孝事君必忠孝則父子親忠則朝廷正是昏禮為諸禮之本也藍田吕氏曰人之所以異于禽獸者以有别也如其無别則夫不夫婦不婦矣父子之親從何而正父子不親則君臣之義從何而立三者不正求不為禽獸者未之有也蓋人倫之本始於夫婦終于君臣本正而末不治者亦未之有也故曰昏者禮之本嚴陵方氏曰敬慎重正所以成男女之别于始親之所以立夫婦之義於終故曰敬慎重正而后親之也此句屬上男正位乎外女正位乎內所謂男女之别也夫率人以知婦事人以信所謂夫婦之義也男女固有自然之别矣非禮以成之則或至于虧夫婦固有自然之義矣非禮以立之則或至于壞故曰禮之大體所以成男女之别立夫婦之義也夫婦非無别也其别乃兆於有男女之初男女非無義也其義必明於成夫婦之後故繼言男女有别而後夫婦有義也有夫婦之義於始然後生父子之親於終有父子之親於內然後達君臣之正于外故曰夫婦有義而後父子有親父子有親而後君臣有正也皆由乎男女之别夫婦之義而已男女之所以有别夫婦之所以有義蓋本於昏禮而已故曰昏禮者禮之本也且禮至于父子有親君臣有正則禮之致用然後為備故前言禮之大體馬氏曰男女者夫婦之始夫婦者男女之終始則成男女之别終則必能立夫婦之義也由男女有别以至君臣有正其序如易所謂有男女然後有夫婦有夫婦然後有父子以至于有君臣然後禮義有所錯同石林葉氏曰納采用鴈而擇所昏敬之也問名而卜之吉然後昏謹之也納幣而後成昏禮重之也請期而後交合正之也既至而後同尊卑親之也自納采至於請期未成其為婦也故以成男女之别既受之父母而至於合卺而飲則非特男女之交而已故以立夫婦之義夫婦有義則內足以事親故父子有親則家齊矣推而治國故君臣有正齊家本也治國末也故昏禮所以為禮之至也夫禮始于冠本於昏重於喪祭尊于朝聘和於鄉射此禮之大體也鄭氏曰始猶根也本猶幹也鄉鄉飲酒孔氏曰此經因昏禮為諸禮之本遂廣明禮之始終永嘉周氏曰古之聖人為禮也本夫人道者也故天下之人自生以至于老且死苟一日而不得其道則不可以為也蓋其所以行吾身與夫所以愛其親尊其君和睦其天下者必有所體焉然後為之順理而不亂是故冠昏喪祭朝聘鄉射八者之禮所由作是不可一日而亡也何者今天下之人目視而耳聼手舉而足運與夫生而愛其親長而敬其兄禮固已行矣而或者日用而不知也故聖人本其所自有者因為之節制謂之禮為之冠以重其成人為之昏以謹其繼世為之喪祭以仁鬼神為之朝聘以敬交接為之射鄉以厚廉恥此八者舉而人道備矣雖威儀曲禮之多目蓋不出乎此故曰禮之大體也故人之所以為天下者人道也所以為人道者禮也家也鄉也朝也此三者所謂天下也夫婦也君臣也父子也兄弟朋友之交也此五者所謂人道也舉是五者錯之三者之間苟不以所謂冠昏喪祭朝聘鄉射八者之禮為之節而紛張逆置之則荒淫僻亂奚所不至是以後世小失之則入於夷貉大失之則入於禽獸不知舉是八者以紀綱乎天下而調適乎人民乃日紛更以事末流吁亡益也藍田吕氏曰禮始於冠者童子所以成人也本於昏者有夫婦然後有父子有父子然後有君臣也重于喪祭者人道之所終也尊于朝聘者所以明君臣之義也和於鄉射者所以合人情之歡也八者備然後禮備故曰禮之體也嚴陵方氏曰夫禮經而為三百曲而為三千不特止於如是而已也故以大體言之猶之百骸九竅無非體也而一身乃其大體與馬氏曰冠所以成人故為禮之始昏所以繼後世故為禮之本喪以慎終祭以追逺故曰重朝所以教諸侯之臣聘所以成諸侯之好故曰尊習射尚功習鄉尚齒皆有飲故曰和其大别見于此故曰禮之大體也石林葉氏曰周官以嘉禮親萬民則先昏而後冠此則先冠而後昏何也蓋冠者一身之始昏者萬世之始周官垂於萬世則先昏此言一身則先冠不害其為序也廬陵胡氏曰禮之大體猶木始則萌也本則根也重則幹也尊則髙也和則榮也五者備而大體具夙興婦沭浴以俟見質明贊見婦於舅姑婦執笲棗栗假修以見贊醴婦婦祭脯醢祭醴成婦禮也舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也鄭氏曰成婦禮成其為婦之禮也贊醴婦當作禮聲之誤也以饋明婦順者供飬之禮主於孝順婦降自阼階言既獻之而授之以室事也降者各還其燕寢婦見及饋饗於適寢昏禮不言厥明此言之者容大夫以上禮多或異日孔氏曰此論昏禮明日婦見舅姑舅姑醴婦又舅姑入室婦饋特豚又明日舅姑饗婦之節此即士昏禮故有特豚饋於舅姑若大夫以上非唯特豚而已雖以士為主亦兼明大夫故有厥明舅姑共饗婦若士昏禮則舅姑醴婦訖則饗之不待厥明也婦執笲棗栗假修以見者案士昏禮舅坐於阼階西面姑坐於房外南面婦執笲棗栗進東面拜奠於舅席訖婦又執假修升進北面拜奠於姑席是也贊醴婦婦祭脯醢祭醴者案士昏禮婦席於戶牖間贊者酌醴置於席前北面婦於席西東面拜受贊者西階上北面拜送又拜薦脯醢婦升席左執觶右祭脯醢訖以柶祭醴三是也舅姑入室婦以特豚饋者士昏禮舅姑入于室婦盥饋特豚合升側載無魚臘無稷並南上其他如取女禮鄭注云側載者右胖載之舅爼左胖載之姑俎異尊卑竝南上者舅姑共席于奧其饌各以南為上也舅姑共饗婦者案士昏禮云既言舅姑薦俎醢以鄉飲酒之禮約之席在室外戶之西舅酌酒於阼階獻婦婦西階上拜受即席祭薦祭酒畢于西階上北面卒爵婦酬舅舅于阼階上受酢飲畢乃酬婦先酌自飲畢更酌酒以酬姑姑受爵奠于薦左不舉爵正禮畢也阼階是舅姑所升處今婦由阼階而降是著明代舅姑之事也陸氏曰笲器名以葦若竹為之其形如筥衣之以青繒以盛棗栗假修之屬陸朗藍田吕氏曰婦人從夫與夫同體者也夫之所事婦亦事之所養婦亦養之故婦之於舅姑猶子之于父母也夙興沭浴執笲以見舅姑舅姑醴婦婦祭脯醢祭醴明敬事自此始矣故曰成婦禮也舅姑入於室婦以特豚饋贊成祭卒食一酳徹席婦餕明共養自此始矣故曰明婦順也父老則傳之子姑老則傳之婦故冠禮子始冠著其代父之意焉昏禮婦始見著其代姑之意焉明所以冠所以昏者其責在是也故曰以著代嚴陵方氏曰婦沭浴以俟見所以致敬也贊即相者也棗栗則品之潔者以奠於舅尊之也假修則味之美者以奠於姑親之也贊醴婦謂贊者以醴酌婦而勞之也祭脯醢而不及牲祭醴而不及酒者又以婦禮始成而未備故也下言特豚饋而不及特牲亦此之意厥明明日也夙興婦既饋舅姑矣故厥明舅姑共饗婦焉蓋報施之禮然也一獻與一獻孰之一獻同義奠酬與奠酬而升歌同義馬氏曰沭浴自潔以重禮也質明平明也贊者贊助以行禮也笲者曲禮曰椇榛脯修棗栗婦人之摯也蓋婦人質則用器不過於笲其摯不過棗栗假修而已贊醴婦者舅姑答婦亦必有贊也脯醢者羞也醴者酒也婦受酒與羞必祭者所以重舅之答己也故曰成婦禮也特豚微物而已用之以饋舅姑者在順而不在於物也一獻一酌而已用之以饗婦者在禮而不在酌也奠酬者舅姑與婦相為酬酢也石林葉氏曰冠禮則責其為人父昏禮則責其為人母皆降自阼階以著代也成婦禮明婦順又申之以著代所以重責婦順焉也婦順者順於舅姑和於室人而后當於夫以成絲麻布帛之事以審守委積蓋藏是故婦順備而后內和理內和理而后家可長久也鄭氏曰室人謂女姑女叔諸婦也當猶稱也後言稱夫者不順舅姑不和室人雖有善者猶不為稱夫也順備者行和當事成審也孔氏曰此經總上三事以明聖王之所重也申重也既明婦禮順又重加之以著代之義所以重責其婦之孝順也以審守委積蓋藏者言以此詳審保守家之所有委積掩蓋藏聚之物室人是在室之人非男子也女姑謂壻之姊女叔謂壻之妹諸婦謂娣姒之屬藍田吕氏曰婦禮者所以敬也婦順者所以愛也著代者所以貴也三者皆所以順其舅姑故曰所以重責婦順也詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥孔子曰父母其順矣乎蓋古之大孝養志而已雖有三牲之養而不能和其家人則不足以解憂不足以解憂而為口體之養則其養也微矣婦順舅姑何以異此故和於室人而後當於夫以成絲麻布帛之事以審守委積蓋藏是亦養志者也養志者順莫大焉故內和理而後家可長久也嚴陵方氏曰上下相從謂之順可否相濟謂之和舅姑之禮至隆也故可順而不可逆室人之禮相敵也故雖和而不必同兹其别與絲所以成帛麻所以成布故曰以成絲麻布帛之事委言少而有所委積言多而有所積物之在下者曰蓋物之在內者曰藏以成絲麻布帛之事者婦功之本故也以審守委積蓋藏者坤為吝嗇故也內和而無乖內理而無亂然後家之道如天之長如地之久也聖王重之其以此與馬氏曰責婦順以順舅姑為重順舅姑而不能和於室人則不順乎舅姑矣和於室人而不能當於夫則不和於室人矣當於夫而不能審守委積蓋藏則不當於夫矣數者無不備然後可以盡婦順之道也和於室人如詩所謂宜其家人者是也當於夫者如孟子所謂無違夫子是也以成絲麻布帛可以無寒也以審守委積蓋藏則在中饋可以無饑也不唯可以不饑不寒而大可以供祭祀之羞服矣婦順備而後內和理和則有理理則有義有禮義則家可長久聖王重之者重其有禮義也石林葉氏曰舅姑在所尊也故言順室人在所親也故言和不順於舅姑和於室人則為之夫者其能安之乎是以古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教於宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也鄭氏曰謂與天子諸侯同姓者也嫁女者必就尊者教成之教之者女師也祖廟女所出之祖也公君也宗室宗子之家也婦德貞順也婦言辭令也婦容婉娩也婦功絲麻也祭之祭其所出之祖也魚蘋藻皆水物隂類也魚為爼實蘋藻為羮菜祭無牲牢告事耳非正祭也其齊盛用黍云君使有司告之宗子之家若其祖廟已毁則為壇而告焉孔氏曰此經更申明前經成婦順之事此昏義雖記士昏禮自此以下又廣明天子以下教女及夫婦之義祖廟未毁謂與君為骨肉親廟有四高祖廟未毁除此欲嫁之女教於公宫也祖廟既毁謂與君四從以外同高祖之父以上其廟既遷是祖廟既毁此女則教於大宗子之室三月教之其教已成祭女所出祖廟告以教成也未嫁之前先教四德又祭而告欲使嫁而為婦奉遵此教而成和順也天子當言王宫鄭注知兼天子者公宫謂公之宫若天子公邑官家之宫耳非謂諸侯公宫也云嫁女必就尊者教成之者案內則女子十年不出使姆教成之明已前恆教但嫁前三月特就公宫之教欲尊之也云教之者女師即詩周南言告師氏昏禮注云姆婦人五十無子者也云女所出之祖謂女父與君所分出之祖或與君共高祖而分出天子雖七廟止自高祖以下與諸侯同也云公君也者天子諸侯皆稱君云宗室宗子之家而不云大宗小宗則大宗小宗之家悉得教之與大宗近者於大宗教之與大宗逺者於小宗教之此記謂君之同姓若君之異姓亦有大宗小宗其族人嫁女各於其家也祭其所出之祖者此女出於君之高祖則祭高祖廟出於君之曾祖則祭曾祖以下皆然女親行祭詩云誰其尸之有齊季女是也祭君之廟應用牲牢今爼唯魚也不用正牲則無稻粱既以蘋藻為羮則當有齊盛而士祭特牲黍稷故知此亦用黍也公族教於宗室者使有司告之若卿大夫以下則女主之宗子掌其禮也為壇而告者謂與宗子或同曾祖假令宗子為士只有父祖廟曾祖高祖無廟則為壇於宗子之家而告焉此注或有作墠者誤也蓋祭法適士二廟一壇則曾祖為壇也大夫三廟二壇則高祖及高祖之父為壇唯宗子為中士下士但有一廟無壇則為墠而告之耳橫渠張氏曰古者婦人亦須有教教於公宫宗室是也故知夙興夜寐臨祭祀事賔客承尊長又曰祖廟未毁教於公宫則知諸侯於有服族人亦引而親之如家人焉藍田吕氏曰五廟自高祖而下為未毁宗女同出於高祖則其服緦緦則親也故教於公宫同出於五世以上則無服無服則疏也然猶統於大宗故教於宗室教以婦德婦言婦容婦功婦德正順也詩云林有朴􅈪野有死鹿白茅純束有女如玉婦言辭令也詩云言告師氏言告言歸薄汙我私薄浣我衣婦容婉娩也詩曰被之僮僮夙夜在公被之祁祁薄言還歸婦功絲麻也詩曰是刈是濩為絺為綌服之無斁至乎教成則祭其所出之祖以告之牲用魚芼之以蘋藻女親行之修婦職申婦敬以告事而已故禮不盛也此申言婦順其教有素故曰所以成婦順也嚴陵方氏曰有德矣發之於聲則有言有言矣形之於貌則有容有容矣施之於事則有功故先後之序如此魚之為物柔巽隱伏上下隨陽易言貫魚以宫人寵無不利亦以之比婦人其牲用之固所宜矣前言明婦順繼言責婦順又言婦順備終言成婦順者蓋婦以順為正故反覆言之如此且明而後可責責而後可備備而後可成故言之序如此馬氏曰祖廟未毁者君之四從親也祖廟未毁則教於公宫既毁則教於宗子之室此皆有收族之意也婦人以順為本故先教之以德德本也言文也容者又其文之動也功者又其德之餘事也四者備則祭之以告其成也石林葉氏曰公宫宗室尊者之居也教自尊者出明其有所受也於教成之際則曰成婦順於饋舅姑則曰明婦順者成言其始則於婦順不虧也明言其終則於婦順可見也古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聼天下之內治以明章婦順故天下內和而家理天子立六官三公九卿二十七大夫八十一元士以聼天下之外治以明章天下之男教故外和而國治故曰天子聼男教后聼女順天子理陽道后治隂德天子聼外治后聼內治教順成俗外內和順國家理治此之謂盛德鄭氏曰天子六寢而六宫在後六官在前所以承副施外內之政也三夫人以下百二十人周制也三公以下百二十人似夏時也合而言之取其相應有象天數也內治婦學之法也隂德謂主隂事隂令孔氏曰此一經明天子與后各立其官掌內外之事法隂陽之所為案宫人云掌王之六寢之修注云路寢一小寢五是天子六寢也后六宫在王之六寢後亦大寢一小寢五其九嬪以下亦分居之其三夫人雖不分居六宫亦分主六宫之事或二宫則一人也或如三公分主六卿之類也六卿之官在王六寢之前其三孤亦分主六官之職總謂之九卿故考工記云外有九室九卿朝焉是也周官三百此止百二十人故鄭云似夏時欲其數相當故以夏周相對言之案九嬪職云掌婦學之法故知內治是婦學也案內宰掌王之隂事隂令注云隂事謂羣妃御見之事隂令謂王所求為於北宫也藍田吕氏曰此章因講明士昏禮之義推而上之至於天子后聼天下之外治內治則男女之義盡矣立六官之職公卿大夫元士分治之以佐天子聼天下之外治立六宫之職夫人嬪世婦御妻分治之以佐后聼天下之內治男正位乎外女正位乎內男女正天下之大義也有家者夫聽家之外治婦聽家之內治天子與后有天下者也則不得不聽天下之內外治也外治者明章男教也司徒之所教皆是也內治者明章婦順也婦順之法德言容功皆是也陽道者男所以正其室也隂德者婦人所以宜其家也刑于寡妻至于兄弟則正室之道天子所理也嘒彼小星三五在東肅肅宵征夙夜在公實命不同則宜家之道后所治也鄭氏謂內治之道婦學之法隂德謂主隂事隂令其義然也凡天子所聽皆外治后所聽皆內職至於教順成俗外內和順國家理治必如周南召南盛德之化然後可致也嚴陵方氏曰六官即天地四時之官也亦謂之六卿既曰六官矣而又有三公者王氏謂三公之官率以六卿有道者兼之無其人則不置也昔周公位冡宰而又曰周公為師宰則六官之長也師則三公之長也以是言之則兼之之說明矣由公而下以至於士其數三而倍之止於九九者蓋陽成於三窮於九以其理陽道故其數如此后治隂德其數亦如之者婦人從夫故也先言六宫者欲治其國先齊其家之意也明則使之有辨章則使之有成順為女之正故曰婦順教乃子之道故曰男教於家曰理於國曰治孝經曰居家理故治可移於官與此同意馬氏曰先六宫而後六官內外之序也易曰女正位乎內男正位乎外是也天子聽男教后聽女順尊卑之序也蓋六宫皆統乎天子故也道者德之兼德者道之分故曰天子理陽道后治隂德治者職之總職者治之别故曰天子聽外治后聽內職其政足以理國家其化足以和內外其道足以通隂陽非聖人則不能至也故曰盛德也禮器曰大備盛德也山隂陸氏曰天子后立六宫三夫人九嬪二十七世婦八十一御妻此蓋定額殷周一也若周官世婦女御不言數鄭氏謂君子不苟於色有則充之無則闕貟雖不足其額百有二十猶定然則九卿三三公二十七大夫三九卿八十一元士三二十七大夫後世雖有溢貟其百二十猶信不以溢妨正也不言明章天下之婦順吾知正家而已不曰內和而家理而曰天下內和而家理所為正家而天下定也孟子曰天下之本在國國之本在家石林葉氏曰隂以柔靜為德其譬則地也地有成形故言治隂德治者順其理以行也陽以剛動為體其譬則天也天有成象故言理陽道理則無事乎治也唯其為地道故婦貴乎順順在內也家所以理唯其為天道故男有教教則有所勉在外者也國所以治雖然於家理而後言天下於男教則不及焉何也蓋明婦順者自內始其漸及於天下故天下內和而家理若男事則在外可見者也故章明天下之男教而後曰外和而國治內外和順國家理治則其德崇矣盱江李氏曰堯試舜觀厥刑于二女釐降二女于媯汭嬪于虞以堯之女其淵源非不善尚曰舜能以義理下其心是無聖人為之耦則不克使其行婦道也彼凡人子而不漸以教摩以禮其可乎哉故內宰以隂禮教六宫又以隂禮教九嬪又以婦職之法教九御在王宫者不可不知禮也如使后夫人九嬪世婦女御皆受教皆知禮德皆正言皆順無冶容無廢功無侈服無喪道則閨門之內何有不肅溥天之下何有不化關睢之不淫葛覃之躬儉樛木之無妬螽斯之多子孫卷耳之輔佐求賢兔罝之莫不好德於斯見矣王道安得不成乎又曰此經言三夫人九嬪二十七世婦八十一御妻至于天官序則世婦以下不言數謂君子不苟於色有婦德者充之無則闕世婦女御視大夫士尚唯其人則三夫人九嬪官不必備可知矣曲禮納女於天子曰備百姓言以廣子姓耳深山大澤實生龍蛇母子傳類亦不可忽晉愍懷太子宫中為市使人屠酤手揣斤兩輕重不差蓋其母屠家女也先王之制百二十人猶以無人而闕之至難至慎若此武帝平吳之後掖庭殆將萬人復何義也錢塘于氏曰古之盛時政治之要本乎一原內廷外廷脉絡相貫二南之詩用於鄉人邦國而家人之位正乃可以定天下故求賢審官知臣下之勤勞初何預於后妃而卷耳之詩乃以輔佐君子言之男女以正昏姻以時若無關於后妃而桃夭之詩乃推后妃所致言之當時一人無為以守至正德宇雍睦而福履綏氣象和平而子孫衆職此之由也是則聽天下之內治即所以配天下之外治婦順之明章即所以扶男教之明章故謂之盛德是故男教不修陽事不得適見於天日為之食婦順不修隂事不得適見於天月為之食是故日食則天子素服而修六官之職蕩天下之陽事月食則后素服而修六宫之職蕩天下之隂事故天子之與后猶日之與月隂之與陽相須而后成者也天子修男教父道也后修女順母道也故曰天子之與后猶父之與母也故為天王服斬衰服父之義也為后服資衰服母之義也鄭氏曰適之言責也食者見道有虧傷也蕩蕩滌去穢惡也父母者施教令於婦子者也故其服同資當為齊聲之誤也孔氏曰此以下說男女之教若其不得日月為之適食又明天子與后是人父母之義左傳昭二十一年十二月辛亥朔日有食之庚午之日始有謫謫謂日將食之氣氣見於上所以責人君也藍田吕氏曰男教陽事上應乎日婦順隂事上應乎月有不得則謫見於天為之薄食日食則天子為之變月食則后為之變素服自責各正厥事以答天變眀后與天子日月隂陽相須而后成之義也以人倫推之天子修男教天下之父也后修女順天下之母也其德之盛必能以天下為一家為天下父母然後天下以父服服天子以母服服后也嚴陵方氏曰事失於下而適見於上常適當焉故通用適字食則日月為乖氣所薄若為物所侵食也素服則以喪禮自貶也夫日月者天子與后之象也隂陽者天子與后之道也日與月則晝夜相須而成時者也隂與陽則寒暑相須而成嵗者也天子與后則內外相須而成化者也服天子以父之義服后以母之義者言以其義而服之非服之正故也檀弓謂之方喪者以此馬氏曰天子之與后人之所為也日之與月隂之與陽天之所為也天人之道莫不相須而後成也禮器曰大明生於東月生於西隂陽之分夫婦之位此相須之道也詩曰愷悌君子民之父母使民如父之尊母之親而卒服之以齊斬之服不亦宜乎山隂陸氏曰周官九嬪世婦以屬天官以此資讀如字謂之資衰者資於事父以事母也石林葉氏曰聖人非求知天亦非不求知天日月之食理所常有也故反之隂陽之事者躬自厚之道也天子以男教勉天下之為子者其道猶父也故其卒則天下為之斬衰后以女順化天下之為婦者其道猶母也故其亡則天下為之服齊衰父母為之服者報其恩也王與后為之服者報其義也建安真氏曰家人之卦曰女正位乎內男正位乎外男女正天地之大義也易言其理而禮述其法蓋相表裏云新安朱氏曰按厯法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故日一嵗而一周天月二十九日有竒而一周天又逐及於日而與之㑹一嵗凡十二㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣然王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速高下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子則隂盛陽微當食必食雖曰行有常度而實為非常之變矣禮記集說卷一百五十五
