body:
  text: 禮記集說卷九十七宋衛湜撰是故先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱獨樂其志不厭其道備舉其道不私其欲是故情見而義立樂終而德尊君子以好善小人以聼過故曰生民之道樂為大焉鄭氏曰先鼓將奏樂先擊鼓以警戒衆也三步謂將舞必先三舉足以見其舞之漸也冉始以著往武王除喪至盟津之上紂未可伐還歸二年乃遂伐之武舞再更始以明伐時再往也復亂以飭歸謂鳴鐃而退明以整歸也奮疾謂舞者也極幽謂歌者也孔氏曰此以下引周武王伐紂大武之樂以明上三者之義方謂方將欲舞積漸之意也亂治也復謂舞曲終舞者復其行位而整治也象武王代紂既畢整飭師旅而還歸也拔疾也謂舞者奮迅疾速而不至太疾歌者坐歌不動是極幽靜而聲發起是不隱也世多違背道理武王獨能樂其志意不違厭其仁義之道理謂恆以道自將也既不違厭道理又能偹舉而行之以利天下不私自恣己之情欲也情見謂武王伐紂之情見于樂也義立謂武王伐紂之義興立也觀其樂終則知武王道德尊盛也君子謂在位者小人謂士庶之等君子觀武王之樂德類如此則好行善道小人觀武王之樂音亦聼伏己之愆過也生飬民人之道樂最為大特舉武王之樂者以其利益最深餘樂莫及故也長樂劉氏曰先樂而鼓所以警肅其衆俾正心觀舞以知先王之德也大武之作先進三步以見其慎伐之方也終而又始所以法天之行往無不利也復其位以自治所以警飭其民歸其有極也武王伐紂德有極於幽微而舞亦象之不隱蔽也獨樂其志所以嗣文王而行堯舜之道也天下之民携老挈幼以歸之不厭其道之謂也而皆象之以舞焉偹舉二帝三王之道修而兼用之求以盡斯民之性也不私武王之所欲也長樂陳氏曰凡兵以鼓進以金止大武之樂先鼓以警戒出而治兵也三步以見方武始而北出也再始以著往再成而滅商也復亂以飭歸入而振旅也奮疾而不拔太公之志也極幽而不隱周召之治也獨樂其志不厭其道志以道寧也偹舉其道不私其欲以道制欲也凡此又舞動其容而己乃若詩發乎情則情見而義立者武王仗義以平亂也歌陳乎德則樂終而德尊者武王偃武以修文也義立則天下歸之以為王德尊則天下宗之以為君君子履之莫不惡惡而好善小人視之莫不懋功而聼過移風易俗天下皆寧由此其夲也然則生民之道有不以樂為大乎樂書嚴陵方氏曰鼓陽聲所以作樂凡作樂皆先之以鼓以是故也作之將以用事用事不可以無戒作之乃所以戒之也三者數之成三步乃能見方者警戒之故也方者舞之位舞有四表皆自南北出故言方焉作始之謂始舞始而北出再始則周而復始故也始為往終為復始至於再則往之義著矣治亂之謂亂舞亂皆坐復亂則還而治亂故也往為出復為歸亂至於復則歸之事飭矣故言飭焉樂由陽來陽之氣為舒其德為明故容雖疾而不至於拔者以氣之舒故也義雖幽而不至於隱者以德之明故也拔則其夲去矣隱則其文慝矣不拔以見乎容雖疾而夲常自若也不隱以見乎義雖幽而文又可考也獨樂其志言所樂在志不特在乎聲而已偹舉其道言所舉在道不特在乎器而已有志則足以逹乎道故能不厭其道有道則足以制其欲故能不私其欲志則聖人之所自得故言獨道則天下之所共由故言備在己自得則久而不厭故繼之以不厭其道與人共由則同而無私故繼之以不私其欲情所以夲樂之義故情見而義立樂所以崇君之德故樂終而德尊君子樂而好之則足以成其善小人樂而聼之則足以知其過凡此皆正聲所感故也且君子好其善而積之則足以成名小人聼其過而改之則不至滅身皆生之道也故曰生民之道樂為大焉馬氏曰先鼓以警戒象武王伐紂而誓衆也三步以見方象武王伐紂有漸也再始以著往象武王以紂之不悛而再往也復亂以飭歸象武王既勝而歸也獨樂其志不厭其道備舉其道不私其欲此武王所以能伐商以救民於水火之中也情見而義立象武王伐紂之情見而天下之公義立樂終而德尊言及樂之終而武王之德愈尊武王伐紂所以著其善去其不善故君子因之以勸而好善小人因之以戒而聼過古之言禮者有曰民之所由生禮為大言政者則有曰人道政為大而於此則又曰生民之道樂為大此皆以其所備而言之也獨不及刑蓋刑者先王不得已而用之也廬陵胡氏曰再始謂每曲一終更發始為之凡再更發始也鄭云象十一年觀兵孟津十三年往伐凡再往也案此經泛論樂不指武王至賔牟賈論武之備再成而滅商乃武王再往之事不應前後諄沓也飭歸謂大抵師出當以嚴歸也極幽幽感鬼神也生養也樂助天地之化育是為大慶源輔氏曰自先鼓至飭歸言君子治飭之道不拔不隱則以有夲故也所謂飭者因其夲而文之耳固不可無其夲也奮疾謂發揚蹈厲極幽謂無聲然即其容而情自見也獨樂而下又廣言樂舞之義不厭其道謂於道無厭斁也故能偹舉其道以示人而不私於己舜之情見則韶之義立矣武王之情見則武之義立矣作樂所以崇德故樂終而德尊季札之見舞韶簫所以知舜德之不可加也君子小人有感於樂則心和君子之心和則好善小人之心和則聼過聼過謂知其為過而退聼以改之也黃氏曰樂終而德尊謂象武王應天順人伐紂成功王有天下之尊君子以好善者君子觀武王之樂知武王之德以至仁伐至不仁救天下塗炭競好行仁義之善道也小人聼過者謂小人之心本不好善觀武之樂知天道福善禍淫紂以暴亂而滅咸聼知其過亦革心從善也金華應氏曰先鼓以嚴其警戒者司馬法所謂平旦三通者自三步而積也三步以見其所向之方不待乎六步七步也蓋武王觀政於商諸侯皆欲伐紂而武王以為未可也再整綴兆以為之始明白洞逹以著其往所謂今朕必往是也行列以環繞之以治整亂而飭其歸所謂大告武成也發揚蹈厲之已蚤可謂奮疾矣而不失之暴舒徐和緩之象也遲之遲而又久可謂極幽矣而不失之隱明白洞逹之心也靜而自守則獨樂其志所謂聲淫及商非武王之志動而有為則備舉其道所謂周道四逹禮樂交通也獨樂疑於可厭而不以為厭者有道以為樂偹舉雖曰可樂而不私其樂者無欲以為纍也君子樂得其道今乃好善而進於道小人樂得其欲今乃聼過而抑其欲聼者退聼而自省也樂也者施也禮也者報也樂樂其所自生而禮反其所自始樂章德禮報情反始也鄭氏曰施言樂出不反禮有往來也自由也孔氏曰此明禮樂之别報施不同作樂使衆庶皆聼之無反報之意但有恩施而已曲禮云往而不來非禮也故禮言報也又廣明上意若武王民樂其由武功而生王業即以武名樂以受施處立名也若祭后稷報其王業之由是禮有報也章德報情又覆說報施之意言樂施而不報是章明其德也禮有恩則報以人意言之謂之報情以父祖子孫言之謂之反始其實一也長樂劉氏曰樂象功德以勸於後世故曰施也禮將誠信以反於夲初故曰報也聞樂而自強於善故曰樂其所自生也被禮而必答以敬故曰反其所自始也是以禮樂行而章德報情反始之道逹乎天下長樂陳氏曰樂由陽來天道也禮由隂作地道也天覆萬物施其德以飬之與而不取故曰樂也者施也地載萬物因其材而長之與而取之故曰禮也者報也春夏散天地仁氣而之乎施秋冬斂天地義氣而歸乎報施者天下之至德報者天下之大利仁近於樂而主施義近於禮而主報亦是意也樂樂其所自生所以章德施之道也禮反其所自始所以報情報之道也離而言之則然合而言之一於反始而已禮器主乎禮故先言禮也者反其所自生而以樂樂其所自成繼之樂記主乎樂故先言樂樂其所自生而以禮反其所自始繼之然則禮不言所自成樂不言所自始者蓋天下之理粗而顯者聖人未嘗不欲微之以之神妙而幽者聖人未嘗不欲闡之以之明禮也者微而之神故推而上之有及於所自始樂也者闡而之明故推而下之有至於所自成樂書馬氏曰樂由陽來陽散其文而以生育為功故樂主於施禮由隂作隂斂其質而以反朴為事故禮主於報樂主於施故樂其所自生禮主於報故反其所自始樂其所自生者樂其成於此而生於彼則有施之象焉反其所自始者反其終於此而始於彼則有報之象焉舜主於紹堯而施及於天下故作大韶武王主於武功而施及於天下故作大武此樂其所自生也萬物本乎天故先王以郊明天之道人夲乎祖故王者禘其祖之所自出此反其所自始也樂樂其所自生故章德禮反其所自始故報情章德樂其德之發于外也情之為言實也因其實而報之則有反始之意也魂陽物也報之以燔燎羶薌魄隂物也報之以黍稷心首此報情反始之意也禮言報情反始則知樂章德樂生也蓋文之省新安朱氏曰樂樂其所自生禮反其所自始亦知樂由中出禮自外作樂是和氣由中間直出無所待於外禮却是始初有這意思外面却做一箇節文抵當他却是人做底雖說是人做元不曾杜撰因他本有這意思故下文云樂章德禮報情反始也和順積諸中英華發諸外便是章著其內之德橫渠說樂則得其所樂即是樂也更何所待是樂其所自成說得亦好只是樂其所自成與樂其所自生用字不同耳四明沈氏曰樂能發人之善心禮能還人之善心發之而不還之則亦何所安止哉金華邵氏曰施有出而與之之義報有反而歸之之義樂者順人情而為之者也人有此情聖人則為樂以樂之故曰施惟施故樂其所自生生謂情所生也禮者因人之情而為之莭文人情流而不反聖人則為禮以反之故曰報惟報故反其所自始始謂情所始也樂章德所謂施也如韶以象紹堯武以象武功豈非施乎禮報情反始所謂報也如君臣則反乎君臣之初父子則反乎父子之初豈非報乎禮報情反始不必作兩句則義明矣金華應氏曰樂有發逹動蕩之和宣播而出於外一出而不可反故曰施禮有交際酬答之文反復而還於內故曰報韶濩夏武皆章德而導和祭饗朝聘皆報情而反始所謂大輅者天子之車也龍旗九旒天子之旌也青黑緣者天子之寶龜也從之以牛羊之羣則所以贈諸侯也鄭氏曰贈諸侯謂來朝將去報之以禮孔氏曰此又明禮報之事諸侯守土來朝天子故天子以此等物報之不明樂施者其事易知故略之大輅金輅也據上公及同姓侯伯故下云龍旗九旒亦上公也若異姓則象輅四衛則革輅蕃國則木輅而受於天子總謂之大輅也龍旗九旒據上公言之侯伯則七旒子男則五旒寶龜之中並以青黑為緣天子既與之大輅龍旗及寶龜占兆又從以牛羊非一故稱羣長樂陳氏曰天子之禮在於豐大故其車則大輅天子之德在於變化故其旌則龍旗車旗所以重國體寶龜所以蔽國謀諸侯以重國體蔽國謀為先而以自養為後故從之以牛羊之羣而使之有以自養此其贈諸侯之道也又樂書曰殷尚質其大輅則木輅而已周尚文其大路豈玉路歟周馭玉路者謂之大馭則玉路為大路明矣大輅天子之車所以贈諸侯蓋殷制非周制也春秋傳稱王賜晋文公以大路之服祝鮀言先王分魯衛晋以大路杜氏以為金輅蓋周天子之輅以玉為大諸侯以金為大大夫以革木為大其為大同其所以為大異矣周官司常交龍為旗析羽為旌别之則旌旗異制合之則旗亦可謂之旌爾雅曰屬縿為旒旒亦謂之縿斾以纁則旒蒨矣左傳謂蒨茷是也升龍素則降龍青矣青陽也仁之色也素隂也義之色也商頌曰龍旗十乘則龍旗九旒所以象火火以養信蓋殷天子之旌非周制也周制則巾車王乘玉路建大常十有二旒以祀郊特牲曰旗十有二旒龍章而設日月象天也青入為黑北方之色也而知於是乎藏黑出為青東方之色也而仁於是乎顯青黑緣者天子之寶龜為其能顯仁藏知也以其有安民之德故報以天子之車以其有君民之德故報以天子之旌以其有守國之知故報以天子之龜以其有養民之道故報以牛羊之羣車服以庸其意如此嚴陵方氏曰輅即路也輅有五曰玉曰象曰金曰革曰木然周之所以賜諸侯者雖同姓不過金輅而已玉輅則以祀而不以封焉此言大輅即金輅以其贈諸侯者無大於此也故春秋傳言分魯公以大路大旗分康叔以大路少帛分唐叔以大路密須之鼓以至凡受之於王者亦得謂之大若鄭子僑叔孫穆子皆稱大是也旗以辨為言龍陽德之用也九陽數之極也諸侯體人君之道故飾以陽德之用居人君之位故備以陽數之極以辨為言則無敢僣擬于天子青為少陽之色黑為重隂之色謀之於龜不過欲知隂陽而已然以巾覆之於上又以藻藉之於下特以之為緣何也蓋諸侯非敢專亦循緣於天子而已故必天子之所贈然後敢以為寶也贈諸侯也以龜諸侯饗天子亦以龜者不敢自專其知也贈諸侯以龜者與之共守其寶也故經曰諸侯以龜為寶牛羊者燕饗之所用則用之末也非所先焉故曰從之馬氏曰天子之卜筮用天地四方之龜天龜元地龜黃東龜青南龜赤西龜白北龜黑至於青黑緣之龜者天子之至寶也然則大輅龍旗寶龜皆以贈諸侯何也蓋天子以十二為莭大路繁纓十二就旗十有二旒青黑緣之寶龜長尺二寸公以九為莭侯伯以七為莭子男以五為莭然則大輅與旒青黑之寶龜賜以上公之禮也金華邵氏曰樂為施禮為報諸侯得乘大輅建龍旗用青黑緣龜又從以牛羊之羣若幾於極其所施而無莭矣記者一言以該之曰此所以贈諸侯以見非諸侯之所可用猶王制若有加則賜也之意則禮之為報蓋昭昭矣金華應氏曰以其安民故報以車以其君民故報以旌以守國故報以龜以物民故報以牛羊樂也者情之不可變者也禮也者理之不可易者也樂統同禮辨異禮樂之說管乎人情矣鄭氏曰理猶事也統同同和合也辨異異尊卑也管猶包也孔氏曰自此至天下也名為樂情樂出於心故云情禮在於貌故云理變易换文也樂主相親是統領其同禮殊貴賤是辨别其異樂主和同則逺近皆合禮主恭敬則貴賤有序人情不過於此是包管於人情也橫渠張氏曰禮者理也欲知禮必先學窮理禮所以行其義知理乃能制禮然則禮出於理之後今夫立夲者未能窮則在後者烏能盡禮文殘闕惟是先求禮之意然後可以觀理嚴陵方氏曰樂之所可變者文而已至於情則不可變蓋情主於和而有常故也禮之所可易者制而已至於理則不可易蓋理主於莭而有定故也前言樂者為同禮者為異而此言樂統同禮辨異蓋統同有别於為同辨異有别於為異為則有人為存焉若乾之統天復之辨物曷嘗為之哉是以前則繼之以禮樂之事此則繼之以禮樂之說也說可言而已事則有所為矣管者有所主治相為終始之謂禮樂出乎人而還以治人故其言如此馬氏曰先王之為樂未嘗不順於人情以其情不可變也先王之為禮未嘗不因於人理以其理不可易也樂動於內故以情言禮動於外故以理言樂者和也凡同者則統之禮者莭也凡異者則辨之禮樂於人情無不包也李氏曰樂者為同而其同也因其自同而樂者統之而已禮者為異而其異也因其自異而禮者辨之而已故曰樂統同禮辨異慶源輔氏曰情之極然後形之聲音播之金石而為樂故曰樂也者情之不可變者也尊卑上下之理截然不可亂聖人則因而制為之禮故曰禮也者理之不可易者也樂者天地之和故統同禮者天地之序故辨異禮之說不外乎辨異樂之說不外乎統同金華應氏曰禮樂之說荀子說字作統金華邵氏曰情動於中故形於聲憂者不可以為樂和者不可以為乖豈非情不可變乎上天下澤先王以之制禮尊者不可使卑親者不可使疏豈非理不可易乎惟情不可變故樂之為教能統天下之同而不使之暌蓋天下同此情故也惟理不可易故禮之為教能辨天下之異而不使之無别蓋天下同此理故也有以辨之則同者以異而分有以統之則異者以同而合如此則天下之人情皆管攝乎禮樂之中而無所遺矣窮夲知變樂之情也著誠去僞禮之經也禮樂偩天地之情逹神明之德降興上下之神而凝是精粗之體領父子君臣之莭鄭氏曰偩猶依象也降下也興猶出也凝成也精粗萬物大小也領猶理治也孔氏曰此經廣明禮樂之義樂夲出於人心心哀則哀心樂則樂不可變易是知變也能窮極人心知內外改變樂之情也顯著誠信退去詐僞禮之常也禮出於地尊卑有序是偩依地之情樂出於天逺近和合是偩依天之情禮樂出於人心與神明和㑹故云逹神明之德用之以祭故能降出上下之神謂降上而出下也又能正其萬物大小之形體理治父子君臣之限莭樂使上下相親禮定貴賤長幼是領父子君臣也長樂陳氏曰自哀心感者其聲之變也噍以殺以至樂心喜心怒心敬心凡感於聲之變者皆非性也感於物而後動則情而已此窮人心之本知聲音之變所以為樂之情也易以窮神知化為德之盛則窮夲知變其樂情之至歟誠者性之德僞者性之賊君子於禮有所竭情盡慎致其敬而誠若非著誠歟以五禮防萬民之僞而教之中非去僞歟禮天之經也著誠去僞則全於天真而不汨於人僞其於禮之經也何有書所謂天秩有禮者此也禮釋回增美質領惡而全好與此同意天地先禮樂而形禮樂後天地而作故天地隂陽之情禮樂得以偩而出之也蓋天地之道其明為禮樂其幽為神明其位為上下其物為精粗內之為父子外之為君臣先王原天地之序以制禮道天地之和以作樂偩天地之情於後而使幽者闡逹神明之德於外而使顯者微神之在上而不可知也則降而下之在下而不可知也則興而上之夫然後隂陽交通而物體之精粗有所凝矣父父子子君君臣臣而人倫之大莭有所領矣樂書又曰樂所以偩天之情而逹神之德禮所以偩地之情而逹明之德則神之在上者無不降神之在下者莫不興至於凝是精粗之體則主於樂以其為天地之和而百物皆化也領父子君臣之莭則主於禮以其為天地之序而羣物皆别也馬氏曰窮其在心之夲則不放其良心知其在物之變則不遷於外物不放其良心不遷於外物則樂莫大焉故為樂之情和故百物皆化序故羣物皆别此天地之情也明於天地然後能興禮樂也能興禮樂則其和莭至於與天地同故曰禮樂偩天地之情新安朱氏曰禮之誠便是樂之夲樂之夲便是禮之誠若細分之則樂只是一體周流底物禮則兩箇相對著誠與去僞也禮則相刑相尅以此尅彼樂則相生相長其變無窮樂如晝夜之循環隂陽之闔闢周流貫通而禮則有向背明暗論其夲則皆出於一樂之和便是禮之誠禮之誠便是樂之和只是禮則有誠有僞須以誠尅去僞則誠著所以樂記內外同異只管相對說翻來覆去只是這兩說嚴陵方氏曰偩者言負之而行也茍非其人道不虛行言神則知明之為人言明則知神之為幽禮以莭之使有别樂以和之使無乖此神明之德所以逹也若燔柴于泰壇以祭天瘞埋于泰圻以祭地是禮降興上下之神也六變而天神皆降八變而地示皆出是樂降興上下之神也羣物皆别者禮所以凝精粗之體也百物皆化者樂所以凝精粗之體也承上令下之謂領領君父之莭所以承上也領臣子之莭所以令下也禮運言以正君臣以䔍父子此領其莭有見於禮矣記者言君臣莫不和敬父子莫不和親此領其莭有見於樂矣必曰莭者父子之尊卑君臣之貴賤皆有自然之莭故也內之父子外之君臣皆足以領其莭則人之大倫盡於此矣山隂陸氏曰偩猶所謂背藏也偩天地之情以微顯逹神明之德以闡幽噓則流行吸則凝體精者其氣歟粗者其魄歟子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也其斯之謂歟金華邵氏曰偩載也天地之情隱於造化禮樂則偩之而出神明之德行于幽𡨕禮樂則逹之而顯上下之神寓於兩間禮樂則降興之而使合於此則禮樂之用皆自然而非僞為者故以之凝為精粗之體精者其至理妙用粗者其繁文末莭也方是理散於天地神明與夫上下之間固無所依據及其凝而為體以領父子君臣故大人一舉禮樂則天地之理皆昭著而不可掩蓋析而言之則天地上下之神固有異名合而言之則神明與上下之神其實皆天地之造化耳此所以禮樂一舉而天地自昭也是故大人舉禮樂則天地將為昭焉天地欣合隂陽相得煦嫗覆育萬物然後草木茂區萌逹羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕鬻胎生者不殰而卵生者不殈則樂之道歸焉耳鄭氏曰天地將為之昭焉明也欣讀為熹熹猶蒸也氣曰煦體曰嫗屈生曰區無䚡曰觡昭蘇昭曉也蟄蟲以發出為曉更息曰蘇孕任也鬻生也內敗曰殰殈裂也孔氏曰此一經論大人舉用禮樂則天地協和生養萬物為之昭著之事但天地欣合以下惟論樂不論禮記者主在於樂樂功既爾禮亦同也熹合者熹謂蒸動樂能感動天地之氣使下降上騰也言體謂之天地言氣謂之隂陽天地動作則是隂陽相得也天以氣煦之地以形嫗之是天煦覆而地嫗育也天體無形故氣曰煦地體有形故體曰嫗此對文爾其實地亦氣也草木據其成體故云茂區萌據其新生故云逹區者鈎曲而生出菽豆是也羽翼謂飛鳥之屬皆得奮動角觡謂走獸之屬悉皆生養觡謂角外皮􅉸澤者鹿角之屬是也蟄伏之蟲埋藏其體近於死今得昭蘇似暗而遇曉死而更息也長樂陳氏曰聖人相天地以成能者也故制作禮樂而天地官矣大人配天地以成位者也故舉禮樂而天地將為昭焉天地者萬物之父母也隂陽者萬物之男女也天地欣合而化醇隂陽相得而化生其於煦嫗覆育萬物也何有自物之無情者言之草木則皆茂區萌則上逹自物之有情者言之羽翼奮則飛者舉矣角觡生則走者舉矣蟄蟲昭蘇則鱗介之物遂矣羽者嫗伏毛者孕鬻則羽毛之物蕃矣胎生無內敗之殰卵生無外裂之殈則樂之道歸是矣樂書延平周氏曰所謂大人者豈非識禮樂之文而能述者乎和同天地而無間發育萬物而不遺此樂之道歸焉耳嚴陵方氏曰舉禮樂而錯之則天地節和之道散於萬物而可見故言天地將為昭焉將與將有為之將同有先天而天弗違之意且舉非作也故不謂之聖非述也故不謂之明特舉而錯之散於事業而已故以大人言之天地欣合然後隂陽相得下文所言乃其效也歸言歸功於樂也上兼言舉禮而此止歸功於樂者有地道無成之意馬氏曰禮樂偩天地之情故大人舉禮樂則天地之情可知自天地欣合以至於不殰不殈此皆天地將為昭焉之事也天地欣合隂陽相得煦嫗覆育萬物此言其氣之和也自草木茂以至卵生不殈此言其氣之和而物不失其性也夫天地生物之功至於如此之妙者皆起於樂也故曰樂之道歸焉耳蓋樂所以和人心心和則聲和聲和則天地之和無不應言樂則禮可知矣山隂陸氏曰區讀如字岐别為區莊子曰萬物化作萌區有狀蓋萌一而區二若今茶言一槍二旗是也據此所謂不麛不卵不殺胎不夭夭不覆巢尚聖人之餘事也慶源輔氏曰煦嫗覆育以此四字形容天地相為生物之理區萌當如字陸氏說優已成曰茂已生曰逹飛鳥以羽翼奮為成走獸以角觡生為壯羽翼奮角觡生已生者得遂其成嫗伏孕鬻已遂者得孶胎不殰卵不殈者未生者得生上所言非樂不能使之然故歸之於樂之道焉耳盡辭也金華邵氏曰歸焉者謂此可歸之於樂而不可歸之他也金華應氏曰歸者言樂之用復歸於此也蓋樂者出而不反疑其不能復歸也而至和所感羣物受之復凝結而會聚是樂之歸也又曰王者以其位配乎天地故作禮樂以官天地大人德合天地則舉禮樂以昭天地制作成始也舉者成終也官天地者贊天地而育萬物也昭天地者本人情而承天地也天地先禮樂而形禮樂後天地而作天地隂陽之情禮樂偩之以闡幽也天地之道明為禮樂幽為鬼神位為上下物為精粗內為父子外為君臣先王夲天地之序以制禮夲天地之和以作樂及舉禮樂則天地之情可見矣樂者非謂黃鍾大吕弦歌干揚也樂之末莭也故童者舞之鋪筵席陳尊俎列籩豆以升降為禮者禮之末莭也故有司掌之樂師辨乎聲詩故北面而弦宗祝辨乎宗廟之禮故後尸商祝辨乎喪禮故後主人鄭氏曰禮樂之本由人君也禮夲著誠去僞樂夲窮夲知變辨猶别也正也弦謂鼓琴瑟也後尸居後贊禮儀皆言知本者尊知末者卑孔氏曰自此至下也明禮樂有本本貴末賤君子能辨其本末則可以制於天下揚舉也干揚舉干以舞也黃鍾以下唯是樂器播揚樂聲非樂之本故童者舞之鋪筵席而下所以飾禮是禮之末莭故有司掌之北面鼓弦言其處卑也宗謂宗人祝謂大祝但辨曉宗廟詔相之禮故在尸後商祝謂習商禮而為祝者但辨曉死喪擯相之禮故在主人之後皆知禮之末莭故位處卑賤也長樂陳氏曰陽六為律黃鍾其首也隂六為吕大吕其首也作樂必奏律歌吕則黃鍾大吕合而和聲者也弦之以琴瑟歌之以雅頌堂上之樂也盾謂之干鉞謂之揚武舞執焉堂下之樂也皆樂之末莭而非其夲故童子舞之鋪筵席司几筵之職也陳尊俎司尊彛內外饔之職也列籩豆籩人醢人之職也即是而以升降為禮則禮之末莭而非其夲者也故有司掌之仲尼之告子張不以鋪几筵升降酌獻酬酢為禮而以言而履之為禮不以行綴兆興羽籥作鍾鼓為樂而以行而樂之為樂君子力此二者以南面而立是以天下太平也周官大師掌六律六同以合隂陽之聲而教六詩焉則得乎聲詩之意南面而立者人君也辨乎聲詩之用北面而弦者樂師而已大祝掌六祝之辭以事鬼神示辨六號九祭逆尸相尸禮則辨宗廟之禮後尸而相之者宗祝之職也古者祝習夏禮謂之夏祝習商禮謂之商祝故士喪禮主人入即位商祝襲祭服禒衣次繼之主人襲反位商祝掩瑱設幎目則辨喪禮後主人而相之者商祝之職也樂書嚴陵方氏曰末莭言非禮樂之夲數也孔子曰禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉內則言成童舞象則舞樂固童者之事孔子言籩豆之事則有司存則掌禮固有司之事律言首以該乎末堂上之音言上以該乎下干揚者武舞所執言武以該乎文以至言筵席以見几御言尊俎以見鼎彞言籩豆以見簠簋皆互相明耳樂師即太師也以樂人所師故謂之樂師猶工人所師而謂之工師也聲詩即歌詩也以歌者尚聲故謂之聲詩北面則非尊位弦謂鼓琴瑟堂上之樂樂師雖北面亦在堂上從南北分尊卑也商尚質而喪禮以質為主故使之辨喪禮馬氏曰言童者舞之則知非逹樂之意也言有司掌之則知謹守其掌職而已蓋夲在於上末在於下要在於主詳在於臣之意樂之託於聲音節奏者非樂之妙也故樂師辨乎聲詩則北面而弦禮之托於形名度數者非禮之妙也故宗祝辨宗廟之禮則後尸商祝辨乎喪禮則後主人宗廟之禮主於敬而敬之所主在尸喪之禮主於哀而哀之主在主人商祝則知周兼用二代之禮延平周氏曰有司之所知童子之所能者禮樂之末而聖人之與民同者也如其禮樂之夲則豈非聖人之所獨得而與百王同者乎慶源輔氏曰末對夲之稱夲末一理也在人知之如何耳非舍末之外别有所謂夲也此皆自局於形名度數之間而不能即事以求理即數以求義也是故德成而上藝成而下行成而先事成而後是故先王有上有下有先有後然後可以有制於天下也鄭氏曰德三德也行三行也藝才技也先謂位在上也後謂位在下也尊卑備乃可制作以為治法孔氏曰以道德成就故在上則君上及主人之屬藝術成就故在下如樂師之屬行成則德成矣德在內而行在外也事成則藝成矣在身謂之藝所為謂之事人有多少品類先王因其先後使尊卑得分乃可制禮作樂以班天下長樂陳氏曰禮樂之於天下得之斯為德行之斯為行能之斯為藝執之斯為事德必有行而行不全德者有矣藝必兼事而事不全藝者有矣郊特牲曰禮之所尊尊其義也失其義陳其數祝史之事也知其義而敬守之天子之事也祭統曰禘嘗之義大矣明其義者君也能其事者臣也由是觀之禮樂之本在人君而其末繫於童子有司樂師是德成而上藝成而下也宗廟之敬在尸而致喪之哀在主人祝相尸主以接神特以辨其事而已是行成而先事成而後也先王有制於天下使諸侯朝萬物服體而百官莫敢不承事者豈有他哉不過上先下後不失夲末之施而已樂書延平周氏曰樂師不得弦於南面宗祝不得先尸而商祝不得先主人者以其有藝而非德有事而非行此先王所以詳辨其上下先後蓋將以制於天下也嚴陵方氏曰上下以位言先後以序言德則反本藝則務末故其成也以上下為異位行施於此而後事作於彼故其成也以先後為異序故君子於德必有據焉藝則游之而已於行必有修焉事則節之而已夫上下有位先後有序則足以為法於天下矣蓋制而用之謂之法故也馬氏曰德者行之藴行者德之發事者藝之散藝者事之總德與行賢者之所能而治人者也藝與事賤者之役而治於人者也蓋有見於下而無見於上有見於先而無見於後者皆一曲之士也故先王有上有下有先有後而宗廟之敬主於尸則不廢於宗祝喪之哀主於主人則不廢於商祝而禮樂之本亦不廢於未莭此先王有上有下有先有後也然而至於夲則尤為君子之所務也山隂陸氏曰此外王之事也若所謂內聖孰為上下先後是倫也非制也慶源輔氏曰德成而上非遺其藝也藝成而下則局於藝者爾行成而先非廢其事也事成而後則役於事者爾夲末具舉精粗不廢得道之全體然後可以制作禮樂以示天下禮記集說卷九十七
