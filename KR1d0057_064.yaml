body:
  text: 禮記集說卷六十四宋衛湜撰旅幣無方所以别土地之宜而節逺邇之期也龜為前列先知也以鍾次之以和居參之也虎豹之皮示服猛也束帛加璧往德也鄭氏曰旅衆也邇近也鍾金也獻金為作器鍾其大者以金參居庭實之間示和也孔氏曰此一節明朝聘貨賄庭實之物幣庭實也衆國貢獻幣物非止一方故云無方五方各殊所出有異所以分别土地所生之宜六服有逺近或嬪或貨所貢之屬各有期也龜以下即旅幣無方之事龜是靈知之物陳之最在前陳金則次於龜後不謂之金而謂之鍾者貢金以供王之鑄器器莫大於鍾也金性柔和從時變革厠居龜帛之間故云以和居參之也虎豹是威猛之獸今得其皮來列在庭是表示君臣之德能服四方之威猛者也玉以表德今將玉加於束帛或錦繡黼黻之上是以表往歸於德故也謂主君有德而往歸之長樂劉氏曰六服諸侯更番以四仲月來朝則任土作貢旅衆國之幣隨其國之所有或金或玉或匭或包如禹貢九州之物無定法也而國服逺近不同必使番休六年一遍而每朝王必皆助祭執籩豆駿奔走則不可在禴祠蒸嘗之後也故曰節逺邇之期焉其朝宗覲遇也或受饗於朝或受饗於廟備陳衆國充庭之物則九江納錫大龜者荆州之所貢也以為前列者先其靈知能照國家之災祥也先儒考夏書無以鍾為貢幣者以鍾為金則厥貢惟金三品以其從革可柔可剛有利國之義故謂之和以和居參之者具陳三品銅色雖下而亦居其次者以其和也長樂陳氏曰溥天之下莫非王土率土之濵莫非王臣故衆幣所以無方也土地之宜在物而逺近之期在人周官六服其見有六歲之差其交有六物之異六物之異者所謂别土地之冝六歲之差者所謂節逺近之期也金之為體則實而其為性則順體之實則足以見情而性之順則足以示和示服猛者所以明德威惟畏也往德者所以示德明惟明也禮器言大饗之所貢故言三牲魚臘以至丹漆絲纊竹箭之類而極其多此言常貢之法則陳其大率而已此詳略所以不同也又禮書曰采邑有賦而無貢邦國有貢而無賦周官大宰以九賦斂財賄有家削邦縣邦都之賦以九貢致邦國之用有祀嬪器幣材貨服斿物之貢其制地貢在大司徒其施邦國之貢在大司馬其物則職方氏揚州之金錫荆州之丹青青州蒲魚雍州玉石之類是也其用則大府以家削之賦待匪頒邦縣之賦待幣帛邦都之賦待祭祀邦國之貢待弔用是也然邦國有歲之常貢有因朝而貢歲之常貢則春入貢是也因朝而貢則侯服歲一見其貢祀物之類是也二者之禮雖殊其玉帛庭實之設蓋亦相類考之覲禮侯氏奉玉帛以升庭實旅百先龜次金次丹漆絲纊馬在其南若皮則居馬之位而王特撫玉而已以示致方物者臣之職而不有其物者王之道也禹貢八州有貢惟冀州無貢以畿內王之所專特斂其賦而已非所謂貢也嚴陵方氏曰以衆之所陳故曰旅以意之所將故用幣土地所生之物有冝有否各使貢其所冝之物焉故以别言之地之逺者來之期常疏地之邇者來之期常數故以節言之鍾即金也貢金以共王之作器故以鍾言之曰金則以材言曰鍾則以器言金之為物其情則和鑄之為鍾則止而聚止而聚則和之所居故以和居言之馬氏曰龜也鍾也虎豹之皮也束帛也皆幣也以其為庭實非止於此亦言其略而已旅之言陳也無方者以其土地各有冝不可以不别逺邇各有期不可以不節蓋土地各有冝則所貢不一逺邇各有期則所入有多寡故周官制貢各以其國之所有即所謂别土地之冝也聖人之治天下有武以示威有德以示懷有武以示威故猛者服有德以示懷故人向而往之虎豹者猛物也幣以虎豹之皮者示王者之威足以服猛也璧者玉也君子以玉比德焉加璧於束帛之上者示王有德而為人所歸往也山隂陸氏曰方猶常也旅幣無方即前所謂其餘無常貨後世求於不産責之非時則非所以别土地之冝節逺邇之期此言諸侯大饗故其記如此即言三牲魚臘四海九州之美味也籩豆之薦四時之和氣也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也是王德也以鍾次之言設而已亦貶於玉鄭氏謂金兩義先設後入且言鍾金既器矣和居參之所謂參和為仁也言往德不言尊德亦言之法延平周氏曰旅幣衆幣也若馬之類古人亦謂之幣鍾即金也言金則不必鍾故止於示情言鍾則必用金故又足示和往有將意束帛則將其德之被於人者加璧則將其德之同於天者庭燎之百由齊桓公始也大夫之奏肆夏也由趙文子始也鄭氏曰庭燎之差公蓋五十侯伯子男皆三十百僭天子也肆夏僭諸侯也趙文子晉大夫名武孔氏曰自此至夷王以下總論朝聘失禮之事庭中設火以照燎來朝之臣夜入者因名火為庭燎百者作百炬列於庭也大戴禮云天子百燎齊桓僭用後世襲之是失禮從桓公始也大射禮燕禮諸侯納賔奏肆夏今文子亦奏之故云僭諸侯此謂納賔樂也周禮九夏王夏者天子所用其餘八夏諸侯皆得用之其陔夏卿大夫亦得用之故鄉飲酒客醉而出奏陔夏但非堂上正樂所用也長樂陳氏曰天下有道天子馭諸侯諸侯馭大夫而禮樂有差天下無道諸侯僭天子大夫僭諸侯而禮樂無别周之天子無道故齊桓公僭天子之禮而至於庭燎之百趙文子僭諸侯之樂而至於奏肆夏也蓋齊桓公之僭以强趙文子之僭以奢記者録而罪之以其濫觴於一時而致洋溢乎天下後世也山隂陸氏曰齊桓公賢諸侯也而僭天子如此則餘諸侯可知趙文子賢大夫也而僭諸侯如此則餘大夫可知金華應氏曰禮運自天子祭天地至諸侯非問疾弔喪而入諸臣之家凡八條皆以明諸侯之失禮而大夫之失禮居其三此篇自庭燎之百至為君之答已也凡十餘條皆以明大夫之僭禮而諸侯之僭天子居其三焉世愈降而失愈甚失愈甚而亂愈速事變之推移亦可見矣孔子曰禮樂征伐自諸侯出十世希不失矣信哉雖然抑有由也諸侯之僭起於天子之失禮而已故禮運之嘆首以魯之郊禘非禮為言大夫之僭起於諸侯之失禮而已故此篇之譏自齊桓趙文子始焉夫齊威將仗義以服諸侯也乃自以庭燎之百誇其尊則何以責夫諸侯趙文子輔其君以爵者也而自僭肆夏霸國之禮已失矣則何以責夫大夫朝覲大夫之私覿非禮也大夫執圭而使所以申信也不敢私覿所以致敬也而庭實私覿何為乎諸侯之庭為人臣者無外交不敢二君也鄭氏曰朝覲其君親來其臣不敢私見於主國君也以君命聘則有私見何為乎諸侯之庭非其與君無别也外交謂私覿也孔氏曰此一節論大夫從君朝覲行私覿非禮之事朝覲謂君親往鄰國行朝覲之禮大夫從君而行輒行私覿是非禮也若受命執圭專使鄰國得行私覿故聘禮臣出使有私覿所以申巳之誠信也不敢私覿所以致敬覆明從君而行不私覿所以致敬於己君也周衰有臣從君而行設庭實私覿於主國之庭作記者譏之無外交者解所以不敢私覿之意為人之臣既無外交唯專一事君既從君而行不敢二心於他君所以不行私覿之禮也馬氏曰以周官考之則公執桓圭侯執躬圭伯執信圭子執榖璧男執蒲璧大夫執雁士執雉則大夫無執圭之禮此言執圭者荀子謂聘人以圭記亦曰以圭璋聘重禮也則知此非所執之圭也山隂陸氏曰大夫執圭而使所謂信圭如此信也者信此者也何為乎者痛詞也春秋之義痛之益深其言愈緩孔子謂季氏八佾舞於庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂亦以此八佾舞於庭猶可也以雍徹則甚矣故其先後緩急不同如此長樂陳氏曰易大有九四匪其彭旡咎則為諸侯者其可庭實於諸侯之庭乎庭實於諸侯之庭者諸侯之無王也曲禮言從於先生不越路而與人言又況大夫從其君之朝覲其可以私覿於諸侯之庭乎私覿於諸侯之庭者大夫之無君也檀弓曰大夫束修之問不出竟左傳曰䇿名委贄二乃辟也此所謂人臣無外交而不二君也大夫而饗君非禮也大夫强而君殺之義也由三桓始也天子無客禮莫敢為主焉君適其臣升自阼階不敢有其室也覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下鄭氏曰大夫饗君由强且富也三桓魯桓公之子莊公之弟公子慶父公子牙公子友慶父與牙通於夫人以脅公季友以君命鴆牙後慶父弒二君又死也天子無客禮君適其臣升自阼階不敢有其室明饗君非禮也天子不下堂見諸侯正君臣也夷王周康王之𤣥孫之子也時微弱不敢自尊於諸侯孔氏曰大夫富强專制於君召君而饗之非禮也大夫干國亂紀君能殺之得其義也鄭注三桓以下並公羊文春秋之時則有諸侯饗天子故莊二十一年鄭伯饗王於闕西辟樂備亂世非正法也案覲禮天子負斧依南面侯氏執玉入是不下堂見諸侯也若春朝夏宗則以客禮待諸侯以車出迎故齊僕云各以其等為車送逆之節夷王下堂見諸侯自此以後或有然者故云以下黃氏曰魯自三桓執政日衰一日豈是能殺强臣為得義哉蓋殺者降殺之義也謂大夫無饗君之禮而今可饗君者由三桓始也謂三桓勢强而君政微若降殺故為大夫所饗正文非舉殺臣弒君之事本記大夫饗君失禮之由與齊桓趙文子夷王為亂禮法之始則無殺臣之義也長樂陳氏曰以大夫而饗君猶為非禮又況以諸侯而饗天子乎三代之制刑不上大夫而霸者之法亦曰無專殺大夫則古之所以任大夫未嘗不以賢而其所以待大夫未嘗不以禮其有至於殺者蓋其始也任之不以賢故其終也不可待之以禮耳周衰之際諸侯之殺大夫者不獨始於三桓而必曰三桓始者蓋前乎三桓者為亂而不止於强及三桓之事則强而未至於亂是以齊殺無知衛殺州吁宋殺長萬陳殺二慶是皆以其禍亂一國而不止於强也叔牙之欲立慶父則恃强而已而未至於禍亂一國此記者所以言大夫强而君殺之由三桓始也春夏萬物聚見之時先王為之朝宗之禮而不純以臣待諸侯以其等為車送逆之節所以明其恩也於秋萬物分辨之時為之覲禮而純以臣待諸侯則負依南面而不下堂所以明其義也明其恩則天下知所賢明其義則天下知所尊知所賢則人樂於為德知所尊則人樂於為禮此天子之德所以常感於下而其勢所以常隆於上矣至夷王則不然於其秋覲之時亦與諸侯分庭抗禮而下堂見之是其自卑所以起諸侯之僭自弱所以起諸侯之强以至平王東遷而齊王室於邦君降黍離於國風者非由此哉延平周氏曰齊桓公葵丘之盟嘗謂無專殺大夫而此謂大夫强而君殺之由三桓始則所謂無專殺大夫者非特霸者之法而已然周之諸侯殺大夫者豈獨始於三桓蓋三桓以魯言也夷王下堂而見諸侯周之王業卒至於不可復興其失禮之害也如此山隂陸氏曰三桓蓋公子慶父公子牙公子季友之後子孫執國政者也鄭氏謂季友以君命鴆牙後慶父弒二君又死也案季友鴆牙使若托以疾死然其於慶父緩追逸賊皆親親之道即非以君命殺之又季友不應在三桓之列且古者殺大夫非義也大夫見殺非智也其或有罪則遷就而為之諱所謂簠簋不飾是也後世大夫世執國政君由是弱矣有殺之者更以為義則若三家者有以啓之也經是以云經曰公廟之設於私家非禮也由三桓始也春秋傳曰陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏以己更孟氏知三桓非公子友等亦明矣不信由夷王始則夷王以下莫不然也其所謂始者能為之始而已後有不皆也據孔氏之不喪出母自子思始也邾婁復之以矢蓋自戰於升陘始也魯婦人之髽而弔也自敗於臺駘始也下殤用棺衣棺自史佚始也練冠以喪慈母自魯昭公始也庭燎之百由齊桓公始也大夫之奏肆夏由趙文子始也大夫强而君殺之義也由三桓始也公廟之設於私家非禮也由三桓始也廟有二主自桓公始也𤣥冠紫緌自魯桓公始也朝服之以縞也自季康子始也士之有誄自魯莊公始也夫人之不命於天子自魯昭公始也馬氏曰普天之下莫非王土率土之濵莫非王臣故天子無客禮莫敢為主焉天子燕禮則以膳夫為主諸侯燕禮則以宰夫為主示其君之尊而莫敢與之抗禮也故君適其臣升自主人阼階之位示臣不敢有其室也為人臣者不敢有己而況於有室乎橫渠張氏曰不當下堂而下是天子弱而諸侯强也若負屏而立謂之朝是當行禮於庭中也諸侯之宫縣而祭以白牡擊玉磬朱干設鍚冕而舞大武乘大路諸侯之僭禮也臺門而旅樹反坫繡黼丹朱中衣大夫之僭禮也故天子微諸侯僭大夫强諸侯脅於此相貴以等相覿以貨相賂以利而天下之禮亂矣諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也由三桓始也鄭氏曰宫縣四面縣也干盾也鍚傅其背如龜也武萬舞也白牡大路殷天子禮以上皆天子之禮也旅道也屏謂之樹樹所以蔽行道管氏樹塞門塞猶蔽也禮天子外屏諸侯內屏大夫以簾士以帷反坫反爵之坫也蓋在尊南兩君相見主君既獻於此反爵焉繡黼丹朱以為中衣領緣也繡讀為綃綃繒名也詩云素衣朱綃又云素衣朱襮襮黼領也以上皆諸侯之禮也仲孫叔孫季孫氏皆立桓公廟魯以周公之故立文王廟三家見而僭焉孔氏曰此一節總論諸侯及大夫奢僭强盛之事案小胥天子宫縣諸侯唯合軒縣今乃有宫縣白牡是殷之正色諸侯祭用時王牲今乃用白牡又諸侯擊石磬今擊玉磬又諸侯得舞大武故詩云方將萬舞宣八年萬入去籥是也但不得朱干設鍚冕服而舞今朱干設錫冕而舞大武詩云鏤鍚謂以金飾之則此鍚亦以金飾謂用金琢傅其盾背盾背外髙龜背亦外髙故鄭云如龜蓋漢禮然也又諸侯合乘時王之車今乃乘殷之大路並是諸侯之僭禮也祭統云朱干玉戚冕而舞大武明堂位云魯君孟春乘大路皆天子禮樂特賜周公魯惟文王周公廟得用之用於他廟則為僭若他國諸侯非二王之後祀受命之君而用之皆為僭也臺門者兩邊起土為臺臺上架屋曰臺門樹立也人君當門道立屏蔽內外為敬也明堂位云反坫出尊則坫為尊而設故鄭知反爵之坫也坫以土為之論語云邦君為兩君之好有反坫故鄭知兩君相見也彼注云其獻酬之禮更酌酌畢則各反爵於坫上謂於此坫上而反爵也中衣謂冕又爵辨之中衣以素為之繡黼為領丹朱為緣案注昏禮引詩云素衣朱綃魯詩亦以為綃綃綺屬以魯詩既為綃字又五色備曰繡白與黑曰黼繡黼不得共為一物故以繡為綃也謂於綃上刺黼文也又釋器黼領謂之襮故鄭云襮黼領也案禮公之孤四命則爵辨自祭天子大夫四命亦當爵辨自祭則中衣得用素但不得綃黼為領丹朱為緣耳自臺門以下於時大夫皆有此事故言僭禮也相貴以等謂臣下不畏懼於君而擅相尊貴以等列相覿以貨者大夫私相覿以貨賄不辟君也鄭知魯得立文王廟者案襄十二年吳子夀夢卒臨於周廟禮也注云周廟文王廟也此經云諸侯不敢祖天子而文二年左傳云宋祖帝乙鄭祖厲王大夫不敢祖諸侯而莊二十八年左傳云凡邑有宗廟先君之主曰都彼據有太功德者此據尋常諸侯大夫也長樂陳氏曰宫縣玉磬朱干設鍚冕而舞大武此周天子之禮而周之諸侯僭之也祭以白牡殷天子之禮而殷之諸侯僭之也蓋殷尚白非天子之宗廟不用白牡猶周尚赤非天子之宗廟不用騂剛周公以人臣不可及之功故祭得用天子之騂剛所以優其功然又不可以忘人臣之分故以白牡所以正其分也則祭以白牡為僭者豈非殷之諸侯哉明堂位以大路為殷路指木路而言之樂記曰大路天子之車指金路而言之也殷之木路非天子之祭天則不用周之金路非天子之所賜則不得乘在殷而乘木路在周而乘金路皆謂之乘大路此言殷周諸侯之僭禮也其所謂繡黼丹朱中衣者蓋繡黼中衣之領而丹朱中衣之緣也先儒以繡為綃其說非矣詩曰素衣朱襮又樂書曰周官小胥正樂縣之位王宫縣諸侯軒縣則諸侯宫縣僭天子樂縣也舜之鳴球以象天帝玉磬之音諸侯擊玉磬僭天子樂器也天子朱干玉戚冕而舞大武諸侯亦設鍚而用之僭天子樂舞也祭以白牡僭天子用牲之禮也乘以大路僭天子乘車之禮也蓋天下有道禮樂自天子出諸侯莫得而僭之天下無道禮樂自諸侯出其不僭竊而用之未之有也言諸侯僭禮則樂可知矣朱干用白金以覆其背所謂朱干設鍚是也玉戚用玉以飾其柄楚工尹路謂剝圭以為戚柲是也凡此魯不特用於周公之廟而羣公之廟亦用焉故子家駒譏之不特用於魯之羣廟而諸侯亦用焉故於此譏之循緣積習八佾作於季氏之庭萬舞振於文夫人之側先王之樂自是掃地矣嚴陵方氏曰先儒謂縣若鍾磬之屬縣於簨虡者四面皆縣象宫室之有墻故謂之宫縣諸侯軒縣猶軒車之有蕃去其一面故也白牡殷牲大路殷路也二者先王之禮路也唯天子乃得兼而用之丹朱中衣以丹朱為中衣之飾也正服在外故謂之中衣微故見脅强故敢僭四者之言亦互相明爾相貴以等則爵不足以馭其貴相覿以貨則祿不足以馭其富相賂以利則豫不足以馭其幸大宰八柄詔王馭羣臣以此三者為先三者茍失天下之禮由是亂矣覿言非是則不行貨指物利指事諸侯有國而已故不敢祖天子大夫有家而已故不敢祖諸侯以其不敢祖天子故立始祖而有五廟之制以其不敢祖諸侯故立别子而有五宗之法馬氏曰諸侯之僭由天子之微諸侯之見脅由大夫之强也方周之衰上失道揆下無法守故於此相貴以等相覿以貨相賂以利相貴以等言相尚以勢相覿以貨相賂以利言相尚以利天下以勢利相尚不奪則不能饜其所欲此天下之禮所以亂矣山隂陸氏曰諸侯言僭樂僭祭祀言僭大路大夫言僭禮僭朝會言僭中衣亦言之法言天子微在上言諸侯脅在下君子詞也君子為尊者諱蔽不諱敗諱脅不諱微且言天子在下寧言諸侯在下祖言不敢明非不得也故宋祖帝乙鄭祖厲王天子存二代之後猶尊賢也尊賢不過二代鄭氏曰過之逺難法也二或為三孔氏曰此一節論王者立二王後尊賢之事所以存二代之後者猶尚尊其往昔之賢取其法象但代異時移今古不一所尊之賢不過二代而已若過之逺難為法也案異義公羊說存二王之後所以通夫三統之義左氏說周家封夏殷二王之後以為上公封黃帝堯舜之後謂之三恪鄭云二王之後命使郊天祭其始祖受命之王自行其正朔服色恪者敬也敬其先聖而封其後唐天寶三恪二王後議曰三恪二王之義有三說焉一云二王之前更立三代之後為三恪此據樂記武王克商未及下車封黃帝堯舜之後及下車封夏殷之後通以用六代之樂一云二王之前但存一代通二王為三恪此據左傳但云封胡公以備三恪明王者所敬先王有二更封一代以備三恪存三恪者所敬之道不過於三以通三正一云二王之後為一恪妻之父母為二恪夷狄之君為三恪此據王有不臣者三而言之案梁崔靈恩云三義之說以初為長何者禮記郊特牲云存二王之後尊賢不過二代又云詩二王之後來助祭又春秋公羊說曰存二王之後所以通三正以上皆無謂二王之後為三恪之文若更立一代通備三恪者則非不過二代之意左傳云封胡公以備三恪者謂上同黃帝堯舜下同夏殷為三恪也又案二王三恪經無正文崔靈恩據禮記陳武王之封遂以為通存五代竊恐未安今據二代之後即謂之二王三代之後即謂之三恪且武王所封蓋以堯有則天之大人莫能名黃帝列序星辰正名百物自以功濟萬代師範百王故特封其後偶契二三之數非歷代通法故記云尊賢不過二代示敬必由舊因取通已為三正也其二代之前第三代者雖逺難師法豈得不録其後故亦存之示敬其道而已因謂之三恪故左傳云封胡公以備三恪足知無五代也況歷代至今皆以三代為三恪焉通典嚴陵方氏曰成王之命微子曰惟稽古崇德象賢乃其事也山隂陸氏曰猶之言可以已也雖可以已猶如此厚之至也雖厚又惡大過故曰尊賢不過二代長樂陳氏曰監於二代則存二代之意可見矣眉山孫氏曰立前代之後以統承先王者自古有此法也有虞氏之時棄為髙辛之後故得祭天詩謂后稷肇祀是也丹朱為唐堯後作賔於虞書所謂虞賔在位是也至夏后時則丹朱商均之子孫皆為二王後湯為夏氏立後經傳雖不載然有商之興固當以禹之裔為二王後無疑矣仲虺之誥稱湯之德有曰兹率厥典言其能率循舊典不易故常也豈其於崇德象賢之事獨不稽古乎至周則封微子於宋至封舜後於陳封東樓公於杞亦必因成湯封舜禹之後於陳杞可以推而知也諸侯不臣寓公故古者寓公不繼世鄭氏曰寓寄也寄公之子非賢者世不足尊也寓或為託也孔氏曰此一節論寄公之子為臣之事喪服傳云寄公者何也失地之君也或天子削地或被諸侯所逐皆為失地不臣者不敢以寄公為臣也嚴陵方氏曰失地之君諸侯所以不臣之者以其嘗為南面之君故也然以失地則其賢不足尊也故古者不使之繼世馬氏曰古者寓公非有大功德不同繼世雖然諸侯猶擇其賢者而用之君之南鄉答陽之義也臣之北面答君也大夫之臣不稽首非尊家臣以辟君也鄭氏曰答對也辟君辟國君也孔氏曰此一經論大夫君辟正君之事諸侯則稽首於天子大夫則稽首於諸侯家臣不稽首者非是尊敬此家臣不令稽首以臣於國君已皆稽首今大夫之臣又稽首於大夫之君便是一國兩君故云以辟君也大夫得稽首於諸侯不辟天子者諸侯有大功德出封畿外專有其國故大夫得盡臣禮以事之嚴陵方氏曰南者陽之位北者隂之位君以陽明為德故南鄉而有答陽之義所以向明也臣以隂順為德故北面以答君所以示順也君非臣之所敵故不可言答臣臣者君之所統故不可言答隂於君曰鄉則不斥其體君尊故也周官司士於王曰鄉自公而下皆曰面莊子言堯之為君曰南鄉言舜之為臣曰北面皆此意也然對而言之則如此離而言之君亦可以言面故易言聖人南面而聽天下經言聖人南面而立周官大祝辨九拜而以稽首為先則稽首者首至地而為禮之隆也諸侯之大夫陪臣而已以陪臣之卑而可以當拜禮之隆乎必有君道之尊者乃可以當此坊記大夫不稱君則大夫固無君道矣延平周氏曰天道降於南方故君之南鄉答天也陽即天也馬氏曰君者兼天子諸侯而言之也山隂陸氏曰易曰聖人南面而聽天下鄉明而治蓋取諸離是也大夫有獻弗親君有賜不面拜為君之答已也鄭氏曰不面拜者於外告小臣小臣受以入也小臣掌三公及孤卿之復逆也孔氏曰此一經論君尊大夫之事謂大夫有物獻君使人獻之不親來獻君有物賜大夫大夫不面自來拜案大僕掌諸侯之復逆御僕掌羣吏之逆及庶民之復鄭注云復謂奏事也逆謂受下奏嚴陵方氏曰此謂諸侯大夫諸侯雖有君道然亦天子之臣耳故於大夫有相答之禮焉獻弗親有賜不面拜非敢怠也慮煩君之答已而已親則必面獻亦必拜其言互備也延平周氏曰君有答於大夫尊賢也大夫不親獻不面拜貴貴也馬氏曰非不役志於獻而有慢君之賜也蓋禮無不答而上之不虛取於下也為其君之答已故弗親不面拜禮從其簡而已亦所以尊君也鄉人禓孔子朝服立于阼存室神也鄭氏曰禓强鬼也謂時儺索室驅疫逐强鬼也禓或為獻或為儺朝服立於阼神依人也孔氏曰此一經論孔子存神之事鄉人驅逐强鬼孔子恐廟神有驚恐身著朝服立於廟之阼階存安廟室之神朝服以祭故用祭服以依神也馬氏曰儺者索室以去其不祥其法見周禮方相氏而其事見於月令之季秋孔子聖人德合於神明矣非俟於索室以去其不祥然必從鄉人之儺者不違衆以立異也山隂陸氏曰禓讀如陽禓以達陽制名儺言難隂而已方言存室神也邪言儺非所謂敬石林葉氏曰禓讀如陽儺有二名儺猶禳也以禦隂為義故文從儺禓猶禬也以抗陽為義故文從昜此以存室神也故以禓為名鄭氏以為强鬼之名誤也孔子曰射之以樂也何以聽何以射孔子曰士使之射不能則辭以疾縣弧之義也鄭氏曰何以聽何以射多其射容與樂節相應也男子生而設弧於門左示有射道而未能也女子設帨孔氏曰此一節論祭廟擇士之射何以聽者言何以能聽此樂節使與射容相應何以射者言何以能使射與樂節相應善其兩事相應故鄭注射義云何以言其難也為士之法理合能射不能則乖於為士之義案內則云子生男子設弧於門左所以設弧者示有射道以其未能所以縣之長大不得不能不能則辭以疾言以疾病而不能與初生縣弧相似故云縣弧之義也馬氏曰射者其容體比於禮其節比於樂然後可以言中其容體比於禮非難而其節比於樂為難故天子以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節蓋射必以聲而後發發而不失其節此君子之所難也以其節聽之在耳而得之於心得之於心而應之於手其妙至於如此而非可以言喻故孔子曰射之以樂也何以聽何以射何以聽何以射者其難也山隂陸氏曰此言妙難口傳雖欲問之不知其何以也故曰道無問無問問之是責窮也慈湖楊氏曰人皆曰所以聽者以耳而所謂耳者膚與肉而已膚肉能聽乎孔子於是致其問曰何以聽人皆曰所以射者心與手而所謂心者何狀方其挽弓挾矢而心已注於鵠及其射己心又若入而執之無得視之無見窮之無鄉域卒不知其所孔子於是又致其問曰何以射烏呼至哉射者即聽者聽者即視者視者即思者是數者雜出而並用何本何末何始何終無所不通是之謂大同孔子曰三日齊一日用之猶恐不敬二日伐鼓何居鄭氏曰居讀為姬語之助也何居怪之也伐猶擊也齊者止樂而二日擊鼓則是成一日齊也孔氏曰此一經論祭失禮之事散齊七日致齊三日不樂不弔專其一心用以祭祀猶恐為敬不足於時祭者致齊三日之中而二日伐鼓使祭者情散意逸故譏而問之延平周氏曰君子無故不去樂故致齊之不舉樂者三日然後用之以祭猶恐不敬果於齊之二日伐鼓則何居何居者疑而歎之之辭也山隂陸氏曰此豈魯事歟不目言之諱也嚴陵方氏曰家語云季桓子將祭齊三日而二日鍾鼓之音不絶蓋其事矣孔子曰繹之於庫門內祊之於東方朝市之於西方失之矣鄭氏曰祊之禮冝於廟門外之西室繹又於其堂神位在西也此二者同時而大名曰繹其祭禮簡而事尸禮大朝市冝於市之東偏周禮市有三期大市日側而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主孔氏曰此一經論魯失禮之事繹祭當於廟門外之西堂今乃於庫門內祊當在廟門外西室今乃於廟門外東方朝市謂朝時而市當於東方謂市內近東也今乃於市內西方三事皆違禮故言失之矣釋宫云閍謂之門孫炎云謂廟門外禮器云為祊乎外故鄭知祊在廟門外也西是鬼神之位室又求神之處故鄭知西室也祊是求神之名繹是接尸之稱求神在室接尸在堂故云繹又於其堂也祊是室內求神繹是堂上接尸一時之事故云二者同時也春秋宣八年壬午猶繹釋天云繹又祭詩絲衣云繹賔尸但有繹名而無祊稱是大名曰繹也案儀禮有司徹是上大夫儐尸也但於堂上獻尸獻侑全無室中之事又絲衣云自堂徂基自羊徂牛是祭神也下云兕觥其觩㫖酒思柔是接尸也故知祭神禮簡事尸禮大天子諸侯謂之為繹在祭之明日於廟門外西室及堂而行禮也上大夫曰儐尸與祭同日於廟堂之上而行禮也引周禮皆司市文為主者據其多爾嚴陵方氏曰祭之正日索祭謂之祊祭之明日又祭謂之繹山隂陸氏曰祊在當日繹在明日故曰繹又祭也鄭氏謂二者同時而大名曰繹非是也然則繹在廟門外祊在廟門內而禮器曰為祊乎外者蓋祊雖在內自堂視之亦外也故祊門內也又曰詔祝於室而出於祊儀禮若不賔尸舊說云謂大夫有疾病攝昆弟祭是也鄭氏引曽子問疑之蓋失之矣蓋攝主不厭祭不旅不假不綏祭不配布奠於賔賔奠而不舉自謂庶子攝非概論攝主也延平周氏曰詩之序曰絲衣繹賔尸也詩又曰祝祭于祊蓋廟門外謂之祊而繹者紬繹而求之也繹之於祊一祭也繹言其意祊言其地今若離之為二祭其說非也周官營國之法王立朝於前而其朝有三后立市於後而其市亦有三朝雖有三皆南也市雖有三皆北也則所謂朝市之於西方其說亦非也社祭土而主隂氣也君南鄉於北墉下答隂之義也日用甲用日之始也天子大社必受霜露風雨以達天地之氣也是故喪國之社屋之不受天陽也薄社北牖使隂明也鄭氏曰墻謂之墉北墉社內北墻也國中之神莫貴於社故日用甲也大社王為羣姓所立屋之北牖絶其陽通其隂而已薄社殷之社殷始都薄孔氏曰自此至反始也一節總論社神之義兼明所祭之禮土謂五土山林川澤丘陵墳衍原隰也以時祭之故云社祭土土是隂氣之主故云主隂氣也社既主隂隂冝在北故祭社時以社在南設主壇上北面而君來在北墻下而南嚮祭之是答隂之義也社是國中之貴神甲是旬日之初始故用之也風雨至則萬物生霜露降則萬物成故不為屋以受霜露風雨是天地氣達也達通也喪國社者謂周立殷社以為戒天是生法無生義故屋隔之令不受天之陽也薄社即殷喪國社也既屋之塞其三面唯開北牖示絶陽而通隂隂明則物死也鄭知大社為羣姓所立者祭法文但社稷之義先儒所解不同鄭康成之說以社為五土總神稷為原隰之神勾龍以有平水土之功配社祀之稷有播種之功配稷祀之社即地神稷是社之細别别名曰稷稷乃原隰所生故以稷為原隰之神若賈逵馬融王肅之徒以社祭勾龍稷祭后稷皆人鬼也非地神為鄭學者通之其社稷制度白虎通云天子之社壇方五丈諸侯半之說者又云天子之社封五色土為之若諸侯受封各割其方色土與之則東方青南方赤等是也天子諸侯各有二社祭法王立大社王社諸侯立國社侯社是也又各有勝國之社此云喪國之社是天子有之也春秋亳社災公羊云亡國之社蓋掩之掩其上而柴其下是魯有之也襄三十年左傳鳥鳴於亳社是宋有之也其所置之處小宗伯云右社稷左宗廟鄭云庫門內雉門外之左右為羣姓立社者在庫門內之西自為立者在藉田之中其亡國之社榖梁傳云以為廟屏戒或在廟或在庫門內之東則亳社在東也故左傳云閒於兩社為公室輔魯之外朝在庫門之內東有亳社西有國社朝廷執政之處故云閒於兩社其卿大夫以下社案祭法置社注云大夫不得特立社與民族居百家以上則共立一社今時里社是也如鄭此言則周之法百家以上得立社其秦漢以來雖非大夫民二十五家以上則得立社故云今之里社又鄭志云月令命民社謂秦社也自秦以下民始得立社也其大夫以下所置社皆以土地所宜之木則論語云夏后氏以松殷人以柏周人以栗故大司徒云而樹之田主各以其野之所冝木是也其天子諸侯大夫皆有稷故注司徒田主田神后土田正之所依也田正則稷神也田主尚然故知天子諸侯社皆有稷其亡國之社亦有稷故士師云若祭勝國之社稷則為之尸是有稷也其社之祭一歲有三仲春民命社一也詩云以社以方謂秋祭二也孟冬云大割祠於公社是三也其社主用石故鄭注宗伯云社之主蓋用石案條牒論稷壇在社壇西俱北鄉營並壇共門或曰在社壇北其用玉無文不可强言今禮用兩圭有邸秦溪楊氏曰王鄭之學互有得失若鄭云勾龍有平水土之功配社祀之后稷有播種之功配稷祀之則鄭說為長丘氏曰社者所在土地之名也凡土之所在人皆賴之故祭之也先儒以社祭五土之神若唯祭此五者則都邑之土人不賴之乎周禮地官唯云辨五土之名物不云五土為社蓋社之所祭祭邦國郊原之土神也社既土神不曰祗而曰社者蓋以土地人所踐履而無崇敬之心故合其字從示其音為社皆所以神明之也稷既百榖之神不言榖而云稷者蓋直以榖言之為人所䙝慢諸榖不可遍舉故舉諸榖之長言之長樂陳氏曰社所以祭五土之示稷所以祭五榖之神五榖之神而命之稷以其首種先成而長五榖故也稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利而養人故也王社侯社國中之土示而已無預農事故不置稷大社國社則農之祈報在焉故皆有稷先儒謂王社或建於大社之西或建於藉田然國語云王藉則司空除壇農正陳藉禮而歷代所祭先農而已不聞祭社也故詩曰春藉田而祈社稷非謂社稷建於藉田也其言王社建於大社之西於義或然西漢及魏有官社無官稷晉之時有帝社無帝稷類皆二社一稷議者紛然或欲合二社以為一或欲異二社之所向是雖違經悖禮然亦二社同設於國中未聞藉田有之也蓋王與諸侯之社皆三其二社所以盡祈報之誠其勝國之社所以示鑒戒之理王之大社則土五色而冒以黃夏之時徐州厥貢惟土五色孔安國以社言之是也諸侯之國社則受其方色之土於天子而苴以茅漢之時有受青土赤土蔡雍以茅社言之是也先王之祭社稷春有祈秋有報孟冬大割祠春祈而歌載芟秋報而歌良耜此祭之常者也凡天地大烖之類祭大故天烖之彌祀君行有冝宫成有衈此祭之不常者也祭之常者用甲其他則唯吉而已祭之牲以大牢其遇天烖則用幣而已考之於禮王之祭也南面其服也希冕其牲用黝其祭血祭其樽大罍其樂應鍾其舞帗舞其鼓靈鼓凡皆因其物以致其義非夫深知禮樂之情者孰與此哉先儒有以王社有稷壝原隰為稷神有以勾龍為社而非配社柱為稷而非配稷後世又有以夏禹為社配有以戌亥為社日有以先農為帝社有以大稷為稷社皆臆論也餘見祭法禮書金華唐氏曰先王之祀上下達禮未有如社稷者也耕耨斂藏人力所可勉旱乾水溢則繫於神祗故凡先王神祗之事皆為民祈穀也天尊地親故事之不同噫嘻事之以誠載芟事之以力載芟良耜人事盡矣不敢謂人事之盡而忽於神也故祈焉不敢謂人事之盡而忘於神也故報焉祈非吾過求也振古如兹矣報非止於今也欲其有繼焉所謂以似以續續古之人者涖卜來歲之稼之意也諸侯危社稷而變置者古有之矣旱乾水溢而變置社稷者未聞焉孟子謂民為貴社稷次之故舉是禮以言人君固不可舍己而求之神也雲漢之詩曰祈年孔夙方社不莫又曰自郊徂宫后稷不克宫社宫也意吾常禮之未修則祈社修矣意吾變禮之未舉則郊宫徂矣而終不敢以責神也自反而已自勉而已周之先王其於豐凶之祭所以敬事社稷者蓋如此故社稷國之主也兵農之事繫焉古者兵出於鄉遂丘乘其本在社有社斯有民有民斯有兵乃立冢土戎醜攸行故奉之主車戮則行焉勝則獻焉報本反始焉耳言公社以别私言民社以别官王與諸侯為羣姓立者公也自為立者私也里社民社也百室以上官社也命民社則下通於二十五家之里社大割祠於公社則王之大社而已事地之禮有公而又有私者親地也尊無二上故事天明獨行於天子而無二尊事地察故下達於庶人而且有公私焉尊親之辨如此嚴陵方氏曰社必用日之始何也蓋陽始於甲而物生隂極於辛而物成地雖以隂而成物然始地事者存乎陽故社用甲以原其始焉天雖以陽而生物然終天功者存乎隂故郊用辛以要其終焉夫獨隂不生獨陽不成天地相須之義也故聖人制禮以致其義焉大社即祭法所謂王社也以王社為大則自侯社而下皆為小矣達者上下達之謂也上則達天之氣以濟乎下下則達地之氣以濟乎上故以達言之喪國之社即媒氏所謂勝國之社也勝言我所勝喪言彼之喪其實一也於大社言必受霜露風雨於喪國之社言不受天陽亦互言之爾薄社書並作亳薄與亳同馬氏曰古人之言社必有稷此言社而不言稷者蓋社總祭五土之神而山林川澤丘陵墳衍原隰皆是也稷則止於原隰而已言社可以兼稷也祭法言天子諸侯立社而不言稷亦以此日用甲用日之始則郊用辛用日之成也以乾知大始坤作成物則郊宜用甲社冝用辛天雖主於生物亦有以成之則天之道所以明地雖主於成物亦有以生之則地之道所以神蓋郊所以明天道故用辛社所以神地道故用甲曲禮曰外事用剛日內事用柔日郊者外事也社者內事也而此言郊用辛日之柔社用甲日之剛者說者以為郊社至尊之祭不可同於內外此說得之霜露風雨之氣達則萬物之所以生也故天子大社必受霜露風雨以達天地之氣示其有生物之功也喪國之社屋之使之不受天陽示其生物之功息矣延平周氏曰凡言南鄉皆位於北而南鄉則南鄉皆答陽也此言君南鄉於北墉下蓋位於南而鄉於北墉之下故曰答隂之義也東方陽也甲者陽中之陽也社用甲而不用乙欲其以陽召隂也西方隂也辛者隂中之隂也郊用辛而不用庚欲其以隂召陽也以甲為用日之始則誤矣古之營國之法前朝則立大社後市則立亡國之社欲示其存與亡常相為對以戒於有國者也故前之立大社則上不屋下不棧欲其達天地之氣也後之立亡國之社則屋之所以不受天陽不受天陽者示其天亡之也於北為牖使隂明而不使陽明也所謂喪國之社與薄社者皆亡國之社也喪國以人言薄以地言新安朱氏曰或說稷是丘陵原隰之神或云榖神看來榖神較是社是土神又問社如何有神曰能生物便是神禮記集說卷六十四
