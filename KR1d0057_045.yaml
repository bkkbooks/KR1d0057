body:
  text: 禮記集説卷四十五宋衛湜撰孟冬之月日在尾昏危中旦七星中鄭氏曰孟冬者日月㑹於析木之津而斗建亥之辰也孔氏曰案三統厯十月節日在尾十度昏危十四度中去日八十九度旦翼初度中十月中日在箕七度昏室十度中去日八十六度旦軫五度中元嘉厯十月節日在心二度昏危一度中旦張八度中十月中日在尾十二度昏危十三度中旦翼八度中諸家説見孟春其日壬癸鄭氏曰壬之言任也癸之言揆也日之行東北從黑道閉蔵萬物月為之佐時萬物懐任於下揆然萌芽又因以為日名焉諸家説見孟春其帝顓頊其神𤣥冥鄭氏曰此黒精之君水官之臣自古以來著徳立功者也顓頊髙陽氏也𤣥冥少皡氏之子曰脩曰熙為水官孔氏曰五帝徳云顓頊髙陽氏姬姓也又帝王世紀云生十年而佐少皡十二年而冠二十年而登帝位在位七十八年而崩以水承金也案照二十九年左傳云少皡氏有子曰脩曰熈又云脩及熙為𤣥冥是相代為水官也諸家説見孟春其蟲介鄭氏曰介甲也象物閉藏地中龜鼈之屬諸家説見孟春其音羽鄭氏曰三分商去一以生羽羽數四十八屬水者以為最清物之象也冬氣和則羽聲調樂記曰羽亂則危其財匱孔氏曰商數七十二三分之毎一分有二十四去其二十四餘有四十八故羽數四十八也其數既少故為最清清者最賤物比於人亦為賤故云物之象也詳見孟春律中應鍾鄭氏曰孟冬氣至則應鍾之律應應鍾者姑洗之所生三分去一律長四寸二十七分寸之二十周語曰應鍾均利器用俾應復孔氏曰姑洗之律長七寸九分寸之一三分去一則六寸去二寸有四寸在餘有整一寸九分寸之一更三分一寸為二十七分九分寸之一為三分并二十七分緫為三十分三分去一去其十分餘有二十分在故云應鍾律長四寸二十七分寸之二十也引周語以下者證應鍾之義案春秋説云應其鍾註云應鍾應其種類律歴志應鍾言隂氣應無射該藏萬物而雜陽閡種註云閡藏塞也隂雜陽氣藏塞為萬物作種晋灼曰外閉曰閡以此言之云應其種類正謂應無射也案周語註坤六三用事應當也言隂當代陽用事百物可種藏則均利百工之器俾應復者隂陽用事終而復始也諸家説見孟春其數六鄭氏曰水生數一成數六但言六者亦舉其成數孔氏説見孟春其味鹹其臭朽鄭氏曰水之臭味也凡鹹朽者皆屬焉氣若有若無為朽諸家説見孟春其祀行祭先腎鄭氏曰冬隂盛寒於水祀之於行從辟除之類也祀之先祭腎者隂位在下腎亦在下腎為尊也行在廟門外之西為軷壤厚二寸廣五尺輪四尺祀行之禮北面設主於軷上乃制腎及脾為俎奠於主南又設盛於俎東祭肉腎一脾再其他皆如祀門之禮孔氏曰鄭知行在廟門外之西者約檀弓云毁宗躐行自此以下皆中霤禮文廣五尺輪四尺謂軷壇東西為廣南北為輪常祀行神之壇則然若於國外祖道軷祭其壇随路所嚮而為廣輪尺數同也案鄭註聘禮云禮畢乘車轢而遂行唯車之一輪轢耳所以然者以两輪相去八尺今軷唯廣五尺故知不兩輪俱轢主須南嚮故人北面設之其主則鄭註大馭云蓋以菩芻棘栢為神主也諸家説見孟春水始冰地始凍雉入大水為蜃虹藏不見鄭氏曰皆記時候也大水淮也大蛤曰蜃嚴陵方氏曰冰即水也水以陽釋氷以隂凝故也凍蓋地氣閉而陽不能熈故也孟冬者重隂之始也故言水始冰地始凍焉雉入大水為蜃已見仲春鷹化為鳩解虹藏不見見季春虹始見解馬氏曰雉火屬也蜃水屬也陽不勝隂而并與遷焉故化虹以隂干陽故見至是陽升隂降而弗通故藏天子居𤣥堂左个乘𤣥路駕鐡驪載𤣥旂衣黒衣服𤣥玉食黍與彘其器閎以奄鄭氏曰𤣥堂左个北堂西偏也鐡驪色如鐡黍秀舒散屬火寒時食之亦以安性也彘水畜器閎而奄象物閉藏也孔氏曰春云青旂青衣蒼玉者青深而蒼淺旂與衣雖人功所為不可淺深異色故同用青也夏云赤旂朱衣赤玉者朱深而赤淺旂可用淺衣必用深冬云𤣥旂黒衣𤣥玉者黑深而𤣥淺亦旂用淺色衣用深色玉從自然之色春夏冬同用淺色也諸家説見春春是月也以立冬先立冬三日大史謁之天子曰某日立冬盛徳在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡鄭氏曰迎冬者祭黒帝汁光紀於北郊之兆也死事謂以國事死者若公叔禺人顏涿聚者也孤寡其妻子也有以惠賜之大功加賞孔氏曰亦率羣臣至北郊迎黒帝叶光紀而顓頊𤣥冥配之不言諸侯亦如夏空其文也還還於郊反反於朝也臣有為國事死者北郊還因殺氣之盛而賞其家後也恤謂以財禄供給之公叔禺人死事見左傳哀公十一年顏涿聚死事見哀二十三年及二十七年諸家説見孟春是月也命大史釁龜筴占兆審卦吉凶鄭氏曰筴蓍也占兆龜之繇文也周禮龜人上春釁龜謂建寅之月也秦以其嵗首使大史釁龜筴與周異矣卦吉凶謂易也審省録之而不釁筮短賤於兆也孔氏曰釁謂殺牲以血塗釁其龜及筴與龜之繇文也曲禮曰筴為筮知是蓍也云龜之繇文者上與龜筴不同下與卦吉凶又别故言龜之繇文則占兆之書也周禮大卜云其經皆百有二十其頌皆千有二百是也易是筮卦之書賤於龜之書故龜繇云釁之筮書則省録之而已左傳云筮短龜長杜元凱註云筮以數告故短龜以象示故長是筮短龜長之事也丘氏曰案周禮龜人上春釁龜無釁占兆之文而穎達解月令言兼釁占兆之書非也且兆辭存於竹帛何容以血塗之哉博雅云占瞻也爾雅云占視也則是占之為言繫人不繫兆也正與審字義同以兆卦各有吉凶慮其差謬故因釁龜筴之時占視其兆審省其卦也兆下不言吉凶者以其文繫緫以吉凶結之也穎達既誤解釁兆不釁卦故引左傳證之案僖五年左傳云初晋侯欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長案易之為書河出圖文經三古有天道廣大悉備未有龜卜之書若斯之盛也豈短賤於龜乎立驪姬應筮亦不吉但卜人不善占筮謂之為吉耳亦猶穆姜初往東宫而筮之遇艮之随史曰随其出也姜氏自占之曰不然必死於此不得出矣其後穆姜竟卒於東宫又南蒯将逐季氏筮之遇坤之比曰黄裳元吉以為大吉也子服惠伯曰忠信之事則可不然必敗其後南蒯果不克奔齊此皆卦告之凶而誤占之為吉非短於龜也嚴陵方氏曰龜筴已見曲禮解釁與孟子釁鍾之釁同義物有釁則祅作以血厭其變焉蓋除釁之謂也除釁謂之釁猶治汙謂之汙治亂謂之亂也龜以卜而有兆筴以筮而有卦兆有象故言占卦有數故言審占兆審卦則吉凶可得而知之矣釁之将以占審焉占審必於嵗首者則以知一嵗之吉凶故也大史日官也隂陽之理繫焉以龜筴之事命之亦冝矣山隂陸氏曰言釁龜筴則筴亦釁矣與上春釁龜不同彼釁而藏之此釁而用之占兆審卦吉凶是察者占人所謂以八簭占八頌以八卦占簭之八故以眡吉凶是察阿黨則罪無有掩蔽鄭氏曰阿黨謂治獄吏以私恩曲撓相為也孔氏曰是察者謂當是正審察獄吏阿黨之事則在下犯罪之人獄吏不能掩蔽故云無有掩蔽馬氏曰曲承曰阿私附曰黨掩者自上掩之也蔽者自旁蔽之也夫官府之罪所以罔常獲者阿黨掩蔽之也吾於物辨之時而是察焉則苟罪也孰不發露者乎講義曰夫人之罪戾如原其情實則大可以見或阿其黨與則髙下其手輕重其心而人之情實不可得而見矣能是察阿黨則罪無有掩蔽也是月也天子始裘鄭民曰九月授衣至此可以加裘嚴陵方氏説見孟春天子始絺解馬氏曰隕霜而冬裘具故司裘以仲秋獻良裘以季秋獻功裘而至是天子始服矣山隂陸氏曰蔡邕曰祀天則大裘然則祭地不服大裘明矣故曰掌為大裘以供王祀天之服命有司曰天氣上騰地氣下降天地不通閉塞而成冬鄭氏曰使有司助閉藏之氣門户可閉閉之窻牖可塞塞之孔氏曰從五月地氣上騰至十月地氣六隂俱升天氣六陽並謝天體在上陽歸於虛無故云上騰地氣六隂用事地體在下隂氣下連於地故云下降此以氣應言之若以易爻象言之則七月三陽在上為天氣上騰三隂在下為地氣下降各取其義不相妨也嚴陵方氏曰天氣上騰地氣下降則天地辨而各正其位矣冬曰上天為是故也以各正其位故天地不通閉若門之閉塞若穴之塞以其不通故閉塞也然則時之所以為冬孰為此者亦天地之氣閉塞以成之耳餘見孟春解馬氏曰天地定位而其氣升降於四時交於南而辨於北故夏曰南交冬為上天為是故也往來不窮者道也於是時天氣上騰地氣下降各得其所而不相與故曰天地不通閉塞而成冬夫閉則弗闢塞則不通謂之窮可也然通之理未嘗忘焉故寒暑往來相推而未始有窮也則所謂天地不通者時焉而已命百官謹蓋藏命司徒循行積聚無有不斂坏城郭戒門閭脩鍵閉慎管籥固封疆備邊竟完要塞謹關梁塞徯徑鄭氏曰謹蓋藏謂府庫囷倉有藏物也積聚謂芻禾薪蒸之屬坏益也鍵牡閉牝也管籥搏鍵器也固封疆謂使有司循其溝樹及其衆庶之守法也要塞邉城要害䖏也梁橋横也徯徑禽獸之道也孔氏曰城郭須牢厚故言坏門閭備擬非常故云戒鍵閉或有破壊故云脩管籥不可妄開故云審封疆理當險阻故云固邉竟防盜賊故云備要塞理冝牢固故云完關梁禁禦姦非故云謹徯徑細小狹路故須塞皆隨事戒約故設文不同鄭註鍵牡閉牝者凡鏁器入者謂之牡受者謂之牝若禽獸牝牡然管籥與鍵閉别文則非鍵閉之物故云搏鍵器此物以鐡為之似樂器之管籥搢於鏁内以搏取其鍵也案檀弓註云管鍵也則管鍵一物此為别者管是鍵之伴類仍非鍵也註稱管鍵者以類言之若鄰里然管籥則一物也溝樹謂掘溝塹而種樹木令使衆庶可守之故鄭註云循其溝樹及其衆庶之守法也案何氏曰鍵是門扇之後樹兩木穿上端為孔閉者謂将扄關門以内孔中嚴陵方氏曰蓋言所蓋者在中藏言所藏者在内方閉塞之時則蓋藏之事不可慢也故命百官以謹之循行見仲春解積聚見仲秋解仲秋特命有司趣民多積聚而已至此又循行之無有不斂則欲其無遺利故也城郭見孟秋補城郭解城郭必以土故言坏然前言補此言坏互相備爾門閭見仲冬解門閭之出入不能無不虞故言戒鍵閉皆慮其壞故言脩管則籥之所投以虚而能受故若簫管之管籥則管之所納以合而能通故若塤籥之籥管取其形籥取其義而已然門閭鍵閉之機械皆寓於此尤不可以不謹封疆見孟春皆脩封疆解邉竟見仲秋邉竟不寧解關所以禦外梁所以濟險而戒之又不可以慢故言謹徯徑皆道路之别然非公道而可不通故言塞凡此皆所以奉時之閉塞故也山隂陸氏曰坏城郭而門閭不戒無益也脩鍵閉而管籥不慎無益也固封疆而邉竟不備無益也完要塞謹關梁而徯徑不塞無益也飭䘮紀辨衣裳審棺椁之厚薄塋丘壟之大小髙卑厚薄之度貴賤之等級鄭氏曰此亦閉藏之具順時飭正之也辨衣裳謂襲斂尊卑所用也所用又有多少孔氏曰其衣裳襲斂多少棺槨厚薄具在䘮大記丘壟大小案鄭註冢人云漢律列侯墳髙四尺關内侯以下各有等差又檀弓註云墳髙四尺蓋周之士制外無文嚴陵方氏曰喪在彼而我以禮數紀之謂之䘮紀辨衣裳而下皆其事也衣裳蓋裒衣裒裳之謂衣在上裳在下故言辨衣服有輕重布有精粗不可不辨也棺槨見檀弓解丘以其有郷背壟以其有起伏皆墳墓别名也大小髙卑則冢人所謂以爵等為丘封之度是也然皆以土塋之故言塋厚薄之度言其禮貴賤之等級言其人自廵行積聚而下皆命之司徒者則以寓教於其間故也馬氏曰䘮紀者人之終事也冬者嵗之終時也以嵗之終時而節人之終事不亦冝乎夫䘮者所自盡而君子不以天下儉其親則衣裳棺槨丘壟孰不欲致美以為悦然窮人之欲而莫之節則富者僣於有餘貧者慊於不足而将不安其性命之情故先王視貴賤之等級而制為禮數以紀之使孝子仁人各随其分而不敢踰也然後得盡其心焉山隂陸氏曰是月也天升而上地降而下辨衣裳之時也言在䘮之下著雖死猶謹曽參易簀似之矣是月也命工師效功陳祭器案度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情鄭氏曰霜降而百工休至此物皆成也工師工官之長也效功録見百工所作器物也主於祭器祭器尊也度謂制大小也程謂器所容也淫巧謂奢偽怪好也蕩謂摇動生其奢淫勒刻也刻工姓名於其器以察其信知其不功致也功不當者取材美而器不堅也孔氏曰於是之時冬閉無事命此工官之長效實百工所造之物陳列祭器善惡案此器舊來制度大小及容受程限多小或有也勿得有作過制之巧以摇動在上生奢侈之心必功致為上者言作器不須靡麗華侈必功力宻致為上又毎物之上刻勒所造工匠之名於後以考其誠信與否若其用材精美而器不堅固則功有不當必行其罪罸以窮其詐偽之情百工造作器物則諸器皆營經直主於祭故云祭器尊也嚴陵方氏曰功即工之所成者效與效馬效羊之效同義蓋呈效之也工之所成具乎器故繼言陳祭器焉祭器未成不造燕器故以祭器為主因其陳而案之以度程近取諸身而手有寸長短之數所起也夫是之謂度逺取諸物而禾有黍多少之數所起也夫是之謂程案則據此以驗彼也案以度則制之長短無不中度案以程則功之多少無不中程毋或作為淫巧以蕩上心已見季春解功言致其力致言致其至物刻者物物而刻之也或曰器或曰物者以用言則曰器以體言則曰物亦互相備耳所謂情者非情實之情以其用情而致弊故行罪以窮治之馬氏曰君子不敢以其私䙝同其所尊敬故陳祭器而不及燕器度其器之洪纎曲直者有度㑹其功之久近勤惰者有程古之人雖小物其用功也無所不用其極功致者功之至者也然不可過過則淫巧先王所禁也於季春曰監工日號因其作而戒之也於孟冬又戒焉方是時也工師效功因其成而又以戒之也是月也大飲烝鄭氏曰十月農功畢天子諸侯與其羣臣飲酒於大學以正齒位謂之大飲别之於他其禮亡今天子以燕禮羣國以郷飲酒禮代之烝謂有牲體為爼也黨正職曰國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位亦謂此時也詩云十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥受福無疆是頌大飲之詩孔氏曰烝升也升此牲體於俎之上故云大飲烝此是天子之禮詩豳風躋彼公堂乃諸侯之禮故鄭註天子諸侯與羣臣也傳云公堂學校也黨正以禮屬民飲酒於序故云此飲酒於大學也云正齒位者約黨正文以此是孟冬黨正國索鬼神謂蜡祭也與此同月故鄭下註引黨正文亦謂此時也案國語云王公立飫則有房烝此既大飲饗禮當用房烝半體之俎若黨正飲酒雖饗而用餚烝故宣十六年左傳云王饗有體薦宴有折俎公黨饗卿當宴是也嚴陵方氏説見孟夏飲酎解馬氏曰是月嵗功既登物之可薦者衆君子可以飲酒燕樂矣天子乃祈來年於天宗大割祠於公社及門閭臘先祖五祀勞農以休息之鄭氏曰此周禮所謂蜡祭也天宗謂日月星辰也大割大殺群牲割之也臘謂以田獵所得禽祭也五祀門户中霤竈行也或言祈年或言大割或言臘互文勞農以休息之黨正屬民飲酒正齒位是也孔氏曰割牲以祠公社以上公配祭故云公社非但祭社又祭門閭故云及臘獵也謂獵取禽獸以祭先祖五祀此暫出田獵以取禽非仲冬大閲之獵也五祀據殷禮言之周則七祀此等之祭緫謂之蜡若細别言之天宗公社門閭謂之蜡其祭則皮弁素服葛帯榛杖其臘先祖五祀謂之息民之祭其服則黄衣黄冠也案黨正國索鬼神而祭祀而飲酒於序則飲酒在蜡祭之後此大飲在蜡祭前者若黨正屬民飲酒在蜡之後故下云勞農以休息之鄭註黨正飲酒是也若天子諸侯群臣大飲在蜡祭之前故以大飲叙在祈年之前然鄭大飲之下亦引黨正者證其正齒位同在此月不謂大飲即黨正飲酒也鄭知此周禮所謂蜡者以郊特牲蜡者索也索萬物而饗之案籥章云國祭蜡龡豳頌以息老物蜡而後息老此經亦先祭衆神乃後勞農休息文與籥章相當故知此廣祭衆神為蜡也天宗謂日月星者以蜡祭唯公社不祭地故知祭天宗者不祭天若祭天何須稱宗下季冬云天之神是天之衆神有司中司命不稱宗明稱宗者謂日月星也案異義六宗賈逵等以為天宗三謂日月星地宗三謂㤗山河海鄭𤣥六宗以為星也辰也司中也司命也風師也雨師也今此天宗謂日月星者蓋尚書六宗文承類帝之下凡郊天之時日月從祀故六宗不得復有日月此云天宗與彼别也蔡邕云日為陽宗月為隂宗北辰為星宗也天宗公社門閭先祖五祀等皆祈年大割臘祭之事故云互也蔡邕云夏曰清祀殷曰嘉平周曰蜡秦曰臘案左傳云虞不臘矣是周亦有臘也新安朱氏曰史記云左丘失明厥有國語左傳是姓左人作如秦始有臘而左氏謂虞不臘矣是秦時文字分明嚴陵方氏曰天宗亦天神也隂陽之運必有為之宗者故曰天宗天尊而不親在致義以求之故曰祈公社門閭親而不尊在致味以祭之故曰大割先祖五祀衆而不一在自盡以饗之故曰臘葢臘言以臘得之肉而祭之然古者以月在丑為臘此乃行之建亥之月者異代之制耳祈來年則詩所謂以興嗣嵗也此非嵗終之時而曰祈來年者則以陽生於子得天時之正故謂建子之月為來年也五祀有門而大割詞又及門閭者蓋五祀之門雖大夫士亦得而祭之則知門閭固有大於此者矣夫農於三時之務亦己勞矣至此勞之使休息不亦冝乎易曰勞乎坎蓋謂是矣既曰休又曰息者休大而息小休久而息暫事有大小時有久暫故其言如此合而言之一也山隂陸氏曰禮王所自為立社為公門閭蜡也國中於門野則在閭據索祭祀於祊得禱曰祠言品物雖多猶以為薄或言割或言臘相備也大割割牲臘以田獵所得禽祭不言及五祀五祀卑也天子乃命將帥講武習射御角力鄭氏曰為仲冬將大閲簡習之亦因營室主武士也凡田之禮唯狩最備夏小正十一月王狩孔氏曰春秋説云營室主軍士之糧經言習射御角力是未正用也備擬仲冬敎戰之事所須故鄭言唯狩最備謂狩禮大也故仲冬教大閲禮儀備嚴陵方氏曰武言其道故講之使明射御言其事故習之使熟力則相抵而已故曰角馬氏曰順隂義也方亥之時其為隂也極矣講武以厲其威習射御以考其藝用力以視其才皆隂事也講義曰古者三時務農一時講武孟冬農功之隙乃講肄武事之時也故命將帥講習射御角力亦武勇之事漢有角觝之戲乃角力之技也是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨於下其有若此者行罪無赦鄭氏曰因盛徳在水收其稅嚴陵方氏曰水虞即周之澤虞也猶季春謂山虞為野虞焉漁師即周官之䱷人也以能登漁於水而為衆所師故謂之漁師收水泉池澤之賦必命是二官者則各以其職故也衆言其同庶言其廣兆則言其數天子曰兆民故以是稱之衆庶則不止於民矣仲秋言行罪無疑無疑未至於無赦也失時之罪小故止於無疑取怨之罪大故曰無赦仲冬言罪之不赦其義亦然馬氏曰先王之時川有衡澤有虞皆為之厲禁以平其守而共其奠以時入之頒其餘於萬民則剥下益上者豈其所欲哉故命之曰毋或敢侵削衆庶兆民以為天子取怨於下孟冬行春令則凍閉不密地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削鄭氏曰凍閉不宻地氣上泄寅之氣乘之也民流亡象蟄蟲動也暴風不寒蟄蟲出已之氣乘之也立夏巽用事巽為風雪霜不時申之氣乘之也小兵起土地侵削申隂氣尚微申宿直參伐參伐為兵孔氏曰凍閉不宻地氣上泄地災也民多流亡人災也國多暴風方冬不寒天災也蟄蟲復出地災也雪霜不時天災也小兵時起土地侵削人災也案春秋説云參伐主斬刈示威行伐也嚴陵方氏曰孟春言東風解凍故此行春令則凍閉不宻地氣上泄也然泄與騰異以其不宻故漏泄而己未至於騰也民多流亡則以春主發散故也風固四時之所常有也而暴則陽之所作焉故行夏令則暴風若孟夏行春令則暴風來格者彼以行少陽之令故來格而已此以行盛陽之令故又至於多也以盛陽之所作故方冬不寒也孟冬非隆冬故言方而已夫蟲以隂而蟄者也方冬不寒故蟄蟲復出雪霜不時則寒氣遲故也小兵時起則金氣勝故也土地侵削則揫斂之所致故也仲冬之月日在斗昏東壁中旦軫中鄭氏曰仲冬者日月㑹於星紀而斗建子之辰也孔氏曰案律厯志云仲冬之初日在斗十二度故云日在斗三統厯大雪日在斗十二度昏壁五度中去日八十四度旦角三度中冬至日在牛初度昏奎十度中去日八十二度旦亢七度中元嘉厯大雪日在箕十度昏氐九度中旦軫八度中冬至日在斗十四度昏東壁八度中晝漏四十五刻旦角七度中其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中黄鍾鄭氏曰黄鍾者律之始也九寸仲冬氣至則黄鍾之律應周語曰黄鍾所以宣養六氣九徳孔氏曰律厯志云黄者中之色君之服鍾種也又云黄五色莫盛焉故陽氣始種於泉孶萌萬物為六氣元也周語註云十一月建子陽氣在中六氣隂陽風雨晦明九徳金木水火土榖正徳利用厚生黄鍾象氣伏地物始萌所以徧養六氣九功之徳山隂陸氏曰黄鍾天子之徳也故曰黄鍾所以宣養六氣九徳書曰九徳咸事俊乂在官若林鍾諸侯云爾諸家說見孟春其數六其味鹹其臭朽其祀行祭先腎冰益壯地始坼鶡旦不鳴虎始交鄭氏曰冰益壯以下皆記時候也鶡旦求旦之鳥也交猶合也嚴陵方氏曰前言水始冰至此又言冰益壯前言地始凍至此又言地始坼凍甚而土相坼夜鳴而求旦故謂之鶡旦亦見坊記相彼盍旦解夫夜鳴則隂類也然鳴而求旦則求陽而已故感微陽之生而不鳴則以得所求故也虎隂物而交則亦感陽之生故也山隂陸氏曰猛摯之物至是一交而止夫欲止非摯不能天子居𤣥堂大廟乘𤣥路駕鐡驪載𤣥旂衣黒衣服𤣥玉食黍與彘其器閎以奄鄭氏曰𤣥堂大廟北堂當大室飭死事鄭氏曰飭軍士戰必有死志孔氏曰事異前也因殺氣之盛故飭死事嚴陵方氏曰飭死事必於是月者豈非以教大閱故然乎命有司曰土事毋作愼毋發蓋毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又随以喪命之曰暢月鄭氏曰而猶女也暢猶充也大隂用事尤重閉藏孔氏曰土地之事毋得興作毋得開發掩盖之物則孟冬之謹蓋藏是也此月隂氣凝固陽須閉藏若起土功開蓋物發室屋起大衆開泄陽氣諸蟄則死人必疾疫也故約束有司於此時堅固汝閉塞之事勿令開動若有開動令地氣沮泄謂泄漏地之陽氣則是發徹天地之房房是人次舎之䖏此時天地壅蔽萬物不使宣露與房舎相似也非但蟄死人疾國有大䘮随逐其後命之曰暢月者暢充也言名此月為充實之月當使萬物充實不發動故也皇氏曰䘮謂逃亡人為疾疫皆逃亡也嚴陵方民曰興土功則地氣沮泄此所以戒之春秋傳曰水昏正而栽日至而畢經之所言特以畢於是月而已發蓋則物不得其藏發室屋則人不得其䖏起大衆則衆不得其静凡此皆非農事之所冝故亦戒之所以固而閉也而者汝有司之辭蓋運閉之時以示人者存乎天謹閉之事以奉天者存乎人故以命有司焉閉之事或不固則地氣沮泄是謂發天地之房矣氣之沮而止者反泄而出故謂之沮泄其害及物故諸蟄則死其害及人故民必疾疫死喪随之暢則陽暢之稱陽既生於子至五隂猶執而紐之况在於子而可以暢乎命之曰暢月則以發天地之房故也馬氏曰房也者物之所止而藏者也自内漸外之為沮自下達上之謂泄寒氣方盛而發其所閉則温必乘之故諸蟄則死民必疾疫又随以喪命之曰暢月蓋隂主屈而陽主伸冝屈而伸焉故謂之暢月講義曰如使地氣沮泄是謂發天地之房而諸蟄藏者失性而死民亦必致疾疫又繼之以死喪皆以違時之理而逆物之性故也非所以使盛徳充塞而得所故謂之暢月也禮記集說卷四十五
