body:
  text: 禮記集說卷五十宋衛湜撰文王世子第八孔氏曰案鄭目録云名曰文王世子者以其記文王為世子時之法此於别録屬世子法嚴陵方氏曰王制曰諸侯世子世國大夫不世爵故自諸侯以上之適子然後謂之世子以其得世國故也此篇所言主於世子之事而文王之為世子可為法於後世故冠之於首且以名篇新安王氏曰此篇首言文王為世子之事故以武王成王為世子之事繼之成王幼周公輔導有道故以教世子之法繼之為世子者當貴親當尊老故以待宗族養老之事繼之而終以世子之記則言文王之所以事王季者皆當以為法也文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及莫又至亦如之其有不安節則內豎以告文王文王色憂行不能正履王季復膳然後亦復初食上必在視寒暖之節食下問所膳命膳宰曰末有原應曰諾然後退武王帥而行之不敢有加焉文王有疾武王不說冠帶而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間鄭氏曰三皆曰朝以其禮同內豎小臣之屬掌外內之通命者御如今小史直日者文王乃喜者孝子恆兢兢也又復也莫夕也節謂居處故事履蹈地也復膳飲食安也復初憂解也在察也問所膳問所食者末猶勿也原再也勿有所再進為其失飪臭味惡也退反其寢也帥而行之帥循也庶幾程式之不說冠帶而養言常在側也一飯再飯欲知氣力針藥所勝間猶瘳也孔氏曰此篇凡有五段自此至為世子也為第一節論文王武王為世子之禮及下事上之法子朝父母每日唯二故內則云命士以上昧爽而朝日入而夕朝禮具夕禮簡今三皆曰朝以其禮同也此是聖人之法食上謂獻饌食下謂食畢徹饌而下鄭注間猶瘳也病重之時病恆在身無少間空隙病今既損不恆在身其間有空隙故云間猶瘳也瘳是疾減損也長樂劉氏曰周公作無逸乃曰文王受命惟中身則王季之為西伯也文王五十以前猶為世子故自成童至於知命克盡其性以極事親之道始於為士而終於為聖人皆由孝於其親雖舜有所弗及焉何哉孝於親者篤誠為本則與舜同焉以備物為實則舜有所弗逮也以親悅為致則舜有所弗逮也故曰以王季為父以武王為子無憂者其惟文王乎堯舜三代皆所弗及此史氏所以序其事親始末垂之萬世俾夫為君之子者有所法效則國之豈弟求配於天有根本焉文王之於王季夜不遑寐故其旦旦雞鳴而衣冠已具內豎曰安文王乃喜以其達旦懷憂則其喜形於色也色憂行不能正履心有所懼則色形其憂急侍其親則履不能正文王所行世子事王季之禮武王之為大子也循而行之不敢有加焉蓋聖人之所行莫非盡其性也盡其性以事其親無所入而不為極也前聖後聖雖歷百世其致同焉矧在父子之間又何加焉孟子所謂文王與舜地之相去千有餘里世之前後千有餘歲及其得志行乎中國有若符節之合盡性之事同也文王有疾武王不說冠帶文王減膳武王亦減膳文王加飯武王亦加飯以己程其親之食力也長樂陳氏曰始之以文武之為世子聖人之行也終之以世子之記中人之行也聖人之行朝親至於日三其有不安節則行不能正履以至於一飯亦一飯再飯亦再飯中人之行朝親止於日二其有不安節則止於不滿容於其嘗饌善則能食嘗饌寡則不能飽而已於文王言色憂行不能正履則武王可知於武王言不說冠帶一飯再飯則文王可知末有原則與曽元復進者異矣漢文帝之侍親疾不交目不解衣三年湯藥非所嘗則不進而袁盎以為髙世之行蓋文武以來如漢文者亦鮮儷矣嚴陵方氏曰日出為朝陽之始也日入為莫隂之始也日中為晝隂陽之始也隂陽之氣至於三時不能無變焉而人之氣血與天地隂陽相為流通故人子之事親每於是時必問其安否然內則言子事父母雞初鳴咸盥潄又曰昧爽而朝日入而夕世子之記亦止言朝夕至於大寢門之外而此言雞初鳴而衣服至於寢門外則盥潄之時猶未雞鳴朝之時猶未昧爽矣又有日中之朝此蓋聖人之制故武王帥而行之不敢有加焉內豎即周官掌內外之通令者御則御於君所者也與御妻之御同義節謂起居之節也不安節則以失常而疾生文王乃喜則親喜而己亦喜也文王色憂則親憂而已亦憂也復初則親復常故也夫人之安否尤見於飲食之際故其復常也必以膳為言焉視寒暖之節若食齊視春時飲齊視冬時之類在有察意在之為察猶存之為省也問所膳則欲知親之好羞也膳宰即膳夫也原與原蠶之原同夫文王之事親如此則不可以有加也故武王帥而行之而已不說冠帶而養則以親有疾故不拘常朝之日三也一飯再飯則飢飽常視親而不敢私自適故也莊氏曰中庸謂舜其大孝也與其稱文王則曰無憂者其唯文王乎蓋父子之間舜處其不幸而文王處其幸也以王季為父以武王為子文王何憂焉人見其無憂也而不知文王事親之心日以兢兢與舜之夔夔齊栗曷嘗少異且自莫而旦自旦而日中歷時未久也文王唯恐不知其親之安否其心兢兢然不啻三月三秋如也朝服而三至寢門子之於親猶不敢以自致乃至寢門之外首致問於內侍焉內侍者掌內外之通命立侍而致養者也內侍不止一人故即其當御者而問之內侍以為安文王乃有喜色詳味乃喜之一辭文王愛敬之心可知矣想其盛服假寐於雞鳴之初柔聲下氣於內侍之問延頸聳耳於曰安之對此時此心忡忡然若不能自釋幸其曰安則油然喜欣然慰其喜為如何以今者之喜而知向者之憂也然則文王之憂其親如此而謂之無憂可乎曰文王之於親惟憂其有不安節爾若舜之於親則無時而不憂也載見而夔夔往田而號泣如窮人之無所歸故富有四海貴為天子皆不足以解憂想其心常如文王不能正履時也常如武王不說冠帶而養之時也故觀舜之憂而後可以知文王之無憂觀文王之無憂而後知舜之為大孝雖然舜與文王易地則皆然又曰天下之理惟極其至則不可以復加文王之事親豈一毫之不至哉武王而復求加焉則非可傳也非可繼也故武王之事文王盡循文王之所以事王季者而行之不敢復加焉兹武王所以為達孝者歟又曰人心有所憂慮則衣服飲食不能如常時子之於親日而三朝自三朝之外冠帶有時而說今為親疾跬步不離不敢說冠帶以自適人之飲食或疏或數時其飢飽今以親疾志不在於飲食一飯再飯惟親之視不敢如平時私適其欲此足以見武王事親之疏節然則武王之孝有加於文王歟曰即文王之色憂行不能正履可以想見其不說冠帶而養也即王季復膳然後亦復初可以想見其一飯亦一飯再飯亦再飯也故曰帥而行之不敢有加焉旬有二日記其寢疾之日疾既損則藥餌食飲皆可進故以瘳為減損也山隂陸氏曰衣服不必言者言之示嚴也據使姆衣服而對言在不言察在而察之為在察或使代焉廬陵胡氏曰緯書皆言文王九十六始稱王及崩諡曰文此不經之說蓋記者於後追稱王耳當考講義曰不說冠帶而養以見武王事親之誠其敬之之禮可謂至矣養可能也敬為難敬可能也安為難武王之用心期以安其親之為至也文王謂武王曰女何夢矣武王對曰夢帝與我九齡文王曰女以為何也武王曰西方有九國焉君王其終撫諸文王曰非也古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七乃終武王九十三而終鄭氏曰問何夢間後容卧也帝天也撫猶有也言君王則此受命之後也年天氣也齒人壽之數也九齡九十年之祥也文王以勤憂損壽武王以安樂延年言與爾三者明傳業於女女受而成之君子曰終終其成功孔氏曰文王繼王季為西伯是殷之諸侯不合稱王今武王謂之君王故知受命之後也案書傳云文王受命一年質虞芮之訟二年伐鬼方三年伐密須四年伐犬夷五年伐耆六年伐崇七年而崩書序云殷始咎周鄭注云紂聞文王三伐皆勝始畏惡之囚於羑里三伐謂伐鬼方密須犬夷則被囚在四年末五年初於時未必稱王殷傳云五年之初得散宜生等獻寶而釋文王文王出則克黎六年伐崇則稱王故詩皇矣論伐崇是類是禡行天子禮此云稱王謂受命六年之後也受命謂受赤雀丹書之命武王云西方有九國未賔君王其終撫有之爾雅釋天云年稔也稔孰謂歲穀一孰是年為天氣也大戴禮云男八月生齒八歲而齓齒是人壽之數也又年穀一孰而零落人之年老齒亦零落是年與齒俱有零落之義年壽之數賦命自然不可延之寸隂不可減之晷刻今云與女三者示其傳基業於武王欲使武王承其所傳之業此乃教戒之義廬陵胡氏曰武王意以齡為善故當撫有九國也言君王者鄭云此受命之後非也先儒云紂聞文王三伐皆勝始畏惡之囚於羑里三伐謂自伐鬼方至犬夷則被囚在四年也於時若稱王則反狀暴白紂肯釋其囚邪書傳又云五年伐耆殷傳云五年之初得散宜生獻寶而釋文王先儒因謂是年克黎至六年伐崇則稱王故詩皇矣伐崇類禡行天子禮若然文王與紂為二王矣安得云以服事紂乎且書云文王受命唯中身厥享國五十年是受命以後五十年乃崩今云受命七年而崩已自謬矣又云受命稱王妄可知也然則受命云者止謂諸侯獲天助爾非稱王也詩書云王者皆追稱爾案文王三分有二今云九國未賔足明此稱君王者不足信也人之考折天定其數今曰吾與爾三是不知命非文王之言也文王受命惟中身謂五十也享國五十年則百矣云九十七非也長樂劉氏曰文王受命之後疾病旬有二日而愈故武王呼曰君王也聖人生而知之自誠而明者罔非窮理盡性以至於命焉是以寤寐所萌與天地合與鬼神契則其修短得以自知武王豈不識其為年齡哉不忍形於文王之所止也史氏欲顯文王之前知乃追而記之曰文王九十七乃終武王九十三而終中庸所謂至誠之道可以前知信矣嚴陵方氏曰黃帝有華胥之遊髙宗有傅說之賚文王則見丈人孔子則見周公莊周則化為蝴蝶聲伯則泣為瓊瑰故周官有占六夢吉凶之法夢態羆者知其為男子之祥夢虺蛇者知其為女子之祥衆維魚則知其實為豐年旐維旟則知其室家溱溱或夢為鳥而戾於天或夢為魚而反於淵或夢哭泣旦而田獵蓋天地之㑹隂陽之氣而人之魂交焉固有如此者則武王九齡之夢豈足怪哉然而文王之疾間必知武王有夢者以其愛親之心篤而思念之情深故也壽數在天而文王得以及子孫者聖人先天而天弗違撫者安撫而有之也馬氏曰其夢則一而其所見則異仁者見之謂之仁智者見之謂之智武王之志在於安天下之民文王之志在於安性命之情達死生之分山隂陸氏曰我百爾九十吾與爾三焉此著文王所謂我然天亦然也詩曰文王陟降在帝左右其言動與天合如此而緩辭也乃者難辭也石林葉氏曰人之精神與天地隂陽流通故其夢亦與應焉古者有占夢之官獻吉夢贈惡夢參考日月星辰隂陽天地之變則夫夢者先王所同以為信也文王九十七而終武王九十三而終果以為夢邪是壽命不屬之天而損益者人也由是觀之我百爾九十非夢也其傳之妄歟莊氏曰古之聖人未嘗無夢若黃帝夢遊華胥髙宗夢得傅說夫子夢見周公皆是也武王於親疾未間之前衣不解帶目不交睫安得有夢及夫既間而後寢蘧蘧栩栩與神明交故文王有何夢之問武王有帝與九齡之對然其夢則一其見則殊武王則以享國之數推之文王則以享年之數推之雖我百爾九十卒如文王之言要知文王之言武王之心也蓋心有所思則夜有所夢武王無是心帝豈答以是夢哉方文王寢疾之時武王切切於心思者不過欲其親享國之多與夫享年之永而已今得帝與九齡之夢遂謂終撫九國者豈謂文王他日享國之多可以卜其享年之永也文王則直以年齡為告欲使武王知我之享年如此女之享年又如此天命未艾適有寢疾庸何憂乎蓋文王又因是以釋武王之憂也然則帝與九齡非武王愛親之切不足以召上帝之夢非文王與天為一不足以知上帝之誠不然則降年有永有不永實繫乎天文王安得而私與之亦足以見聖人之心與天相為流通而天命之修短皆有以逆知之不知是何以謂之先天而天弗違何以謂之自作元命又何以見文王陟降在帝左右哉若夫古者謂年齡則九齡乃九年爾文王何取以為九十注家遂謂九齡為九十年之祥已為牽合况文王百年之數又何所取於此哉意者天命之修短文王固已洞然於胸中特假夢以及之初不區區專訊於一夢也學者不可不知眉山孫氏曰案大戴云文王十五而生武王是武王少文王十有四歲也禮記載文王九十七乃終武王九十三而終計文王之崩年武王已八十三矣明年即君位又明年文王服畢觀兵孟津於時年八十有五又二年克殷有天下即王位於時年八十有七明年有疾弗豫周公作書藏於金縢於時年八十有八又五年王崩壽九十有三自克殷之年而至崩年計七年所謂在位也成王幼不能涖阼周公相踐阼而治抗世子法於伯禽欲令成王之知父子君臣長幼之道也成王有過則撻伯禽所以示成王世子之道也文王之為世子也鄭氏曰涖視也不能視阼階行人君之事踐履也周公代成王履阼階攝王位治天下也抗猶舉也謂舉以世子之法使與成王居而學之以成王之過擊伯禽則足以感喻焉文王之為世子題上事也孔氏曰周公舉世子之法於伯禽伯禽行世子之法以示成王欲令成王觀而法之若成王不能法效周公則笞伯禽責其不能以世子之禮教成王所以示成王世子之道也武王成王之為世子皆法文王故以文王為世子結之長樂劉氏曰成王幼不能涖阼諸儒之說互有不同以經無據也鄭康成傳注諸經最稱詳密今載其說云文王崩後始生成王則武王崩時成王十歲矣三年之喪百官總已聽於冢宰則周公也服除將欲涖阼階以行天下之政周公憂其幼弱而未能也猶欲攝之而羣叔流言周公乃以王命東征罪人斯得凡三年而後天作雷風大變以啓悟成王俾延文武之德業乃由金縢迎周公歸以攝天子之政成王年十有正矣凡七年用熙文武基緒制禮作樂化及蠻夷功格天地然後復政於成王其年二十有二周公於是復留於朝北面臣事成王為之弼佑既終以完成王之盛德而史氏又載厥始攝政而成王尚幼稚孺子好惡趨尚弗協於中屢訓弗改而君也不可以加怒於是俾伯禽行世子事父之禮於周公以觀化成王使知子事父臣事君弟事兄之禮焉然則撻伯禽用以為成王之愧恥也此所以用厥子抗其法以模範成王之心俾趨於五品則文王世子之法又傳於成王以及於後昆焉嚴陵方氏曰涖阼臨朝也阼者主人所有事之階故適子冠於阼以著代則繼體之臨朝行事謂之涖阼亦宜矣涖言以位臨之踐言以足履之成王主也故於阼曰涖周公相之而已故於阼曰踐此輕重之别也世子於屬則子也於位則臣也於齒則幼也知為子然後能為父知為臣然後能為君知為幼然後能為長故抗世子法於伯禽欲令成王之知父子君臣長幼之道也然其序則先父子而後君臣者內外之序也先君臣而後長幼者上下之序也於伯禽言法於成王言道者蓋法則下之所守道則上之所揆馬氏曰成王幼不能行人君之事則百官總己以聽冢宰者禮之常也故周公相成王踐阼而治伯禽者周公之子也成王之為世子雖有君之道不能踐阼則猶未離乎世子也故抗世子法於伯禽父子君臣長幼之道得而國治故欲成王知父子君臣長幼之道也許氏曰文王之為世子既以名篇又冠之於首又繫於此章之末蓋世子之法至文王而極盡方其問安侍膳之際必時其起居之適伺其寒暖之節一寢一食無時少懈是誠可為法於後世武王帥而行之不敢有加焉非惟不敢加蓋亦不容有加矣至成王雖以幼沖之資其可不知世子之法乎雖然世子之道於職則子也於位則臣也知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王既尸天子位則無為世子之道然遽為人父為人君為人長而子之所以事其父臣之所以事其君幼之所以事其長之道蓋未之聞也周公以輔相之職處師保之任其可無術以處此乎是以抗世子之法於伯禽使之與成王居以相觀而善至成王有過則撻伯禽以愧之非特此變父吕伋王孫牟之徒皆子弟之賢也故俱得以入衛於王蔡仲蔡叔之子也暨其率德改行則始以為王卿士周公之善成王者可謂至矣周官師氏掌以媺詔王保氏掌諫王惡皆以教國子為職蓋莫嚴於師保莫親於國子嚴則有所憚而親則易以褻使朝夕於王居者皆伯禽若也則王誰與為不善而師保之職亦不勞而自舉矣大臣格君心之非其周公之謂乎凡學世子及學士必時春夏學干戈秋冬學羽籥皆於東序小樂正學干大胥贊之籥師學戈籥師丞贊之胥鼓南春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠鄭氏曰學士謂司徒論俊選所升於學者四時各有所宜干盾也戈句孑㦸也干戈萬舞象武也用春夏動作之時學之羽籥籥舞象文也用秋冬安靜之時學之詩云左手執籥右手秉翟是也小樂正大胥籥師籥師丞皆樂官之屬通職秋冬亦學以羽籥小樂正樂師也周禮樂師掌國學之政教國子小舞大胥掌學士之版以待致諸子春入學舍菜合舞秋頒學合聲籥師掌教國子舞羽吹籥南南夷之樂也胥掌以六樂之㑹正舞位旄人教夷樂則以鼓節之詩云以雅以南以籥不僭是也春誦謂歌樂也夏弦謂以絲播詩陽用事則學之以聲隂用事則學之以事因時順氣於功易成也周立三代之學學書於有虞氏之學典謨之教所興也學舞於夏后氏之學文武中也學禮樂於殷之學功成治定與己同也孔氏曰自此至周公踐阼為第二節論庠序釋奠先聖先師養老東序三王教世子周公踐阼抗世子法於伯禽之事凡學世子學謂教也鄭注俊選即王制云王子卿大夫元士之適子及國之俊選等升於學謂大學也故下云於東序是大學也以時謂四時各有所宜即下春夏干戈春誦夏弦之類是也盾捍也干盾所以捍難考工記戈廣二寸內倍之胡三之援四之以其形句曲有孑刃鄭云若今雞鳴㦸也宣公八年公羊傳萬者何干舞也以其用干故知象武若其大武則以干配戚明堂位朱干玉戚冕而舞大武是也若其小舞則周禮樂師帗舞干舞是也春夏陽氣發動故云動作之時羽翟羽也籥笛也公羊傳曰籥者何籥舞也以其不用兵器故象文也秋冬凝寒漸靜故云安靜引詩執籥秉翟是邶風簡兮之篇此籥師教戈周禮籥師掌教國子舞羽吹籥是籥師既教戈又教籥此小樂正教干周禮樂師教小舞則六舞皆教故鄭知通職至秋冬之時亦教羽籥也此有大樂正小樂正而周禮有大司樂有樂師故知小樂正即樂師諸侯謂之小樂正天子謂之樂師此經雜多有諸侯之禮故謂之大樂正也鄭引周禮樂師證有教舞之事小舞者謂年幼小時教之舞其舞即帗舞羽舞皇舞旄舞干舞人舞也引大胥證有教樂之事大胥春入學釋蘋藻之菜合六舞節奏秋頒布學者才藝和合音聲使應曲折引籥師亦證教樂之事周禮唯有籥師此云籥師丞者或諸侯之禮或異代之法胥謂大胥旄人教國子南夷樂之時大胥擊鼓以節南樂故云胥鼓南引詩以雅以南小雅鼓鍾之詩證此經之南舉南樂則四夷之樂皆教之也鉤命決云東夷之樂曰昧南夷之樂曰南西夷之樂曰朱離北夷之樂曰禁南一名任明堂位云任南蠻之樂是也春夏學干戈秋冬學羽籥皆據年二十升於大學者若其未升大學之時則春誦夏弦在殷之瞽宗也誦歌樂之篇章不以琴瑟也弦謂以琴瑟播詩之音節詩音即樂章也春夏是陽陽主清輕故學聲秋冬屬隂隂主體質故學事周立三代之學謂虞夏殷也其虞之學制在國兼在西郊郊則周之小學也夏殷之學亦在國而鄭注儀禮云周立四代之學於國者合周家為言耳夏后氏之學在上庠即周之大學為夏之制也虞書有典有謨故就其學中而教之即周之小學也夏后氏上受舜禪是文下有湯伐是武以此二者之間故鄭云文武中以兼有文舞武舞故也湯放桀武王伐紂殷周革命事類相似故鄭云功成治定與己同也長樂劉氏曰周官大司樂掌成均之法以治建國之學政而合國之子弟焉以樂德教國子中和祇庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武而舉三者之教各有其時則所習之業與隂陽合德內足以正國子之性情外足以養國子之形氣藝順於天性與時偕行則罔有志於學而弗成就者故春夏學干戈秋冬學羽籥皆於東序學謂教之也周官樂師掌國樂之政掌教國子小舞凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞而內則稱國子生十年出就外傅居宿於外十有三年學樂誦詩舞勺成童舞象勺者周公告成大武之詩然則舞干戈者武舞也其樂以勺為節焉象者武王告成象舞之詩然則舞羽籥者文舞也其樂以象為節焉皆小舞也故成童習之若大司樂所教六舞則大舞用之以薦天地宗廟社稷山川之祭祀者也六代聖王神其德行以成變化以參天地載其地德以感神祗者樂與舞存焉故使國子學之由其舞以志厥功由其聲以想厥德然後中和生於誠明而志氣趨於聖智矣故孝友形於中而舞蹈應於外此三代遜於五品無所入而弗自得者教國子以樂舞行於人倫也東序大學也是以小樂正教干大胥贊之籥師教戈籥師丞贊之各用其職以時舉焉胥鼓南者舞以樂為節者也樂以舞為成者也故奏六代之舞則合六代之樂先王用之致中和位天地澤四海來百蠻焉乃用四夷之樂以彰德化春誦謂教國子以樂語興道諷誦言語者也夏弦謂教國子以六律六同五聲八音以合樂而以弦為首也春者陽氣宣吐以生萬物也故宜誦以宣其中和之聲焉夏者陽氣盛大以壯萬物也故宜弦以極其純粹之致焉皆大師之職以教國子者也長樂陳氏曰周之時干戈羽籥在東序弦誦與禮在瞽宗書在上庠以言學者之事始乎書立乎禮成乎樂而舞又樂之成焉故大司樂言樂德樂語而終於樂舞樂師言樂成告備而終於臯舞孟子言仁義禮樂之實而終於不知手之舞之記言詩言志歌咏聲而終於舞動容此舞之所以為樂之成也由小學之書以進於瞽宗之禮樂由瞽宗之禮樂而成之以東序之舞則周之教法可知又曰學以樂所以和其心誦以聲所以調其氣動之舞所以治其形而詔之書禮所以正其行也又樂書曰干戈羽籥樂之器而樂豈器哉凡學世子及學士必以是者欲其因器以達意故也王制之教造士春秋以禮樂冬夏以詩書文王世子之學世子春夏以干戈秋冬以羽籥者升於學之造士則其才嚮於有成其教之也易故先其難者而以詩書後於禮樂貴驕之世子則其性誘於外物其教之也難故先其易者而以干戈羽籥先於禮樂詩書周官師氏教國子在司徒教民之後記言教國之子弟在鄉遂之後其教之難易蓋可見矣雖然王制主於教造士而王大子王子羣后之大子卿大夫元士之適子亦預焉文王世子主於教世子而國之學士亦及焉特其所主者異教之所施有先後爾書云比爾干稱爾戈干則直兵而其形欲立戈則句兵而其形欲倒皆自衛之兵非伐人之器也古之教舞者朱其干玉其戚則尚道不尚事尚德不尚威是以學干在小樂正而以大胥贊之學戈在籥師而以籥師丞贊之干戈之事寓之於樂如此則武不可黷之意覩矣周官大胥以六樂之㑹正舞位凡祭祀之用樂者以鼓徵學士小胥掌學士之徵令而胥以鼓徴學士而令之者不過六代之樂所謂象簫南籥而已非鄭康成所謂南夷之樂也鞮鞻氏掌四夷之樂旄人教舞夷樂則夷樂固鞮鞻氏所掌旄人所教非大胥小胥之職也上言小樂正學干大胥贊之則所謂胥鼓南之胥豈小胥哉周之化自北而南則象簫所奏亦不是過也樂語有六誦居一焉樂音有八弦居一焉誦則詩頌人聲也弦則琴瑟樂聲也溫柔敦厚詩教也以春誦之春溫故也鼓鼙北方革音而其聲歡主陽生而言也琴瑟南方絲音而其聲哀主隂生而言也夏弦之義有見於此殷人尚聲名學以瞽宗是瞽宗主以樂教衆瞽之所宗也春教以樂語夏教以樂音其義為難知非大師詔之瞽宗孰知其所以然哉周官大司樂死以為樂祖而祭之瞽宗則春誦夏弦大學之教非小學之教也詔樂於瞽宗又言禮在瞽宗者古之教人興於詩者必使之立於禮立於禮者必使之成於樂故周之辟雍亦不過辟之以禮雍之以樂使之樂且有儀而瞽宗雖主以樂教禮在其中矣周官禮樂同掌於春官禮記禮樂同詔之瞽宗其義一也學舞於東序而别之以射學禮樂於瞽宗而詔之以儀君子之深教也此言春誦夏弦秋學禮冬讀書王制言春秋教以禮樂冬夏教以詩書者言書禮則知誦之為詩弦之為樂言弦誦則知禮之為行書之為事也蓋春秋隂陽之中而禮樂皆欲其中故以二中之時教之凡此合而教之也分而教之則誦詩以春弦樂以夏學禮以秋讀書以冬學記曰大學之教也時以此嚴陵方氏曰學與書所謂惟斆學半之斆同斆教也春夏者文之時秋冬者武之時於文之時而忘武則廢功故春夏學干戈之武舞於武之時而忘文則失德故秋冬學羽籥之文舞大樂正即大司樂也月令有樂正又有樂師者彼非周制故耳春官樂師之職則繼之以大胥固知大胥者小樂正之副也教樂至於夷則教樂之道於是乎盡矣誦者人也弦者絲也人之事始於東絲之音屬於南故誦以春而弦以夏禮者體也書者事也體之文成於西事之質辨於北故禮以秋而書以冬此又其别也大師則樂工之所師而為大者也而樂以陽為主故以之詔弦誦焉執禮者詔禮典書者詔書亦各以其類也於禮言學於書言讀者皆學而讀之清江劉氏曰周人立四代之學者此直謂一處並建四學耳周人辟雍則辟雍最居中其北為有虞氏之學其東為夏后氏之學其西為殷人之學當學羽籥干戈者就東序學禮者就瞽宗學書者就虞上庠辟雍唯天子養老及出師成謀與受俘大射等就焉當天子至於辟雍則三學之人環水而觀矣周人又以有虞氏之庠建之於鄉故鄉有庠以夏后氏之序建之於州故州有序以殷人之校建之於黨故黨有校自黨以下皆為小學而非四代之制以教童子而已擇小學之秀者移之校擇校之秀者移之序擇序之秀者移之庠擇庠之秀者移之大學大學在郊以其包四代之制故記禮者或有指虞庠名之或有指東序名之所以紛紛如此之多者所指之體偏也馬氏曰士者德之已成然後入大學而世子者不必其德之成也此貴賤之别也自春夏學干戈以至於胥鼓南皆大學之法也自春誦夏弦以至於禮在瞽宗書在上庠皆小學之法也禮由隂作而秋者萬物之所斂而亦隂也故秋學禮書以道事而冬者萬物之所藏而亦事也故冬讀書說者以謂士之德成則春夏學干戈秋冬學羽籥士之德未成則春誦夏弦秋學禮冬讀書其說蓋非是也春夏學干戈秋冬學羽籥者在於大學也王制曰春秋教以禮樂冬夏教以詩書者亦在大學也故教之以詩書禮樂則未嘗不教之以干戈羽籥也此所以互見之也山隂陸氏曰先王之制舞也文必以羽籥武必以干戚者蓋籥聲也羽容也聲音以記之文物以昭之者文也故於文舞用之干以扞其內戚以誅其外者武也故於武舞用之大舞則干與戚兼陳羽與籥並用簡兮所謂左手執籥右手秉翟明堂位所謂朱干玉戚冕而舞大武是也蓋文不足乎武非所以為文德之盛武不足乎文非所以為武業之大故文雖用羽籥而干在焉武雖用干戚而羽在焉或言朱干玉戚執而舞武樂矣又曰有羽焉左籥右翟執而舞文樂矣又曰有干焉則授舞者其何能執曰是不然也蓋武舞干之上覆以羽文舞羽之下載以干干羽雖異其器則一爾若周官羽舞所以無籥者象文德之小者以為儀而已干舞所以無戚者象武事之小者以為扞而已小曰羽舞而大舞謂之籥小曰干舞而大舞謂之萬鄭𤣥孫育孔穎達等以為萬舞唯干無羽也籥舞唯羽無干也是不知先王之制舞文必有武備武必有文輔之意也此經學於小舞也干舞是矣干戚大舞也萬舞是矣先儒誤謂以干配戚以記考之干戚一舞也故以一官教之下大樂正學舞干戚是也干戈兩舞也故各以其官教之此小樂正學干籥師學戈是也干戚大舞也故先王教之以大樂正干舞小舞也故先王教之以小樂正戈舞則又其小者故先王以籥師教之然所謂戈舞者自為一舞經傳獨無所見何也曰月令云執干戚戈羽而周官有干舞又有兵舞所謂兵舞即戈舞也先儒乃以兵舞合為干舞誤矣蓋司兵云五兵五盾鄭云五盾干櫓之屬而五兵一曰戈兵始於戈故戈舞謂之兵舞此一證也戈兵也干盾也兵有戈盾非兵則戈可以謂之兵舞而兵舞不得謂之干舞此又一證也司兵及司戈盾皆云祭祀授舞者兵司干云祭祀舞者既陳則授舞器先儒以為羽籥之屬司干所授也朱干玉戚之屬司兵所授也若戈則司戈盾授之穎達疏云司干授舞者器授干與羽籥也司戈盾授舞者兵謂戈而已其干則司干授之是也夫司干授干而小樂正教之司戈授戈而籥師教之則干自干舞戈自戈舞可知矣此又一證也周官籥師言舞羽吹籥而未嘗及戈何也曰事固有互發者蓋司干主干而已而所授有兼羽籥則籥師雖主舞羽吹籥不害其兼學戈也教舞容者以文為主故先王以籥名官而戈在焉教舞器者以武為主故先王以干名官而羽在焉此亦制作之方也石林葉氏曰春釋菜合舞故學干戈秋頒學合聲故學羽籥言樂正大胥學干則知必學羽矣言籥師丞學戈則知必學籥矣蓋春夏陽也陽主乎動秋冬隂也隂主乎靜以聲對舞舞為動而聲為靜故春夏學干戈秋冬學羽籥以事對聲聲為動而事為靜故春夏教以詩樂秋冬教以禮書詩樂所以和於道而性命之禮具於其中書禮則止動於經而已矣經能達其所有而不能豫其所無故干戈以動其容羽籥以和其心周旋進退而自得其性命之理此所以散在四時之間以先乎四教者也然則干戈羽籥小學之教所以成始則獨主於樂詩書禮樂大學之教所以成終則備習以經唯其習經也故樂嫌於舞無聲則言弦禮以道行則言學書以道政則言讀弦在東序東膠亦順乎陽也禮在瞽宗書在上庠亦順乎隂也蓋夏后氏養國老於東序而周人養於東膠皆以陽為主虞氏養國老於上庠而殷人養於右學皆以隂為主故周兼四代而其用亦如之其東立序則干戈武舞羽籥文舞所謂大夏大武是也故樂正大胥籥師皆學於夏之學既立夏學於東矣故周之東膠必與之共立而大胥致東夷之樂所謂其德一天下也故弦誦之以大師如其西而立庠則典謨所終止於虞氏所謂外史御史掌三皇五帝之書是也故典書必詔於虞氏之學既立虞學於西矣則殷之瞽宗必與之並立而其功成治定與已為一皆所以順乎天而應乎人也故獨詔之以典禮庠也辟雍也序也瞽宗也皆其學名而所詔不同位所以順地春夏也秋冬也皆其時序而所教不同術所以順天獨於東而不言者以其舉三代則周之制可見也然則王制所謂東膠者非謂辟雍歟詩禮傳記於辟雍嘗言之矣於東膠則未之聞也廬陵胡氏曰學書於虞庠則周之小學也學舞於夏之東序則周之大學也學禮樂於殷之瞽宗則弦誦也先儒云三代皆立大學小學則周别有大學小學矣非虞庠東序也當考天台陳氏曰南亦雅樂名猶九夏樂章名之曰夏南與夏皆屬文明之方先王之樂以中聲為節則溫和而明達故名曰南案家語子路鼓瑟孔子聞之曰先王之制音也流入於南不歸於北夫南者生育之鄉北者殺伐之地故君子之音溫柔居中以養生育之氣憂愁之感不加於心乃所謂治安之風也南之義當在於此詩曰以雅以南南與雅合而言之亦此南可知若如鄭說以南為夷樂安得如詩所謂不僭者哉近世沈括鄭樵說周南召南亦云南是樂名其說頗近禮記集說卷五十
