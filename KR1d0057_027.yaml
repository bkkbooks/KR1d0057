body:
  text: 禮記集説卷二十七宋衛湜撰天子三公九卿二十七大夫八十一元士鄭氏曰此夏制也明堂位曰夏后氏官百舉成數也孔氏曰此一經論夏天子設公卿大夫元士之數王制之文鄭皆以為殷法此獨云夏制者以明堂位殷官二百與此百二十數不相當周官又三百六十長樂陳氏曰太極元氣函三為一始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一凡此天數也故曰天之數始於一終天之數得八十一先王之建官外則三公九卿二十七大夫八十一元士內則三夫人九嬪二十七世婦八十一御妻則天數故也大玄以一玄象一辟三方象三公九州象九卿二十七部象二十七大夫八十一家象八十一元士少則制衆無則制有蓋太玄取諸太極而已故其數如此老子之書終於八十一難經亦止於八十一皆此意與嚴陵方氏曰三公之數則取陽數而成也九卿則倍公而三之也二十七大夫則又倍卿而三之也八十一元士則又倍大夫而三之也天子理陽道於建官之數每準於陽焉后治隂德亦以是為數者特從夫而已夫位尊者其事約而總位卑者其事詳而分故官之法位愈卑而數愈倍焉以周官言之大宰上士八人中士十有六人旅下士三十有二人則中下之士互相倍可知而此不言者以陽數窮於九九故止八十一元士終焉若黃鍾律終於八十一數馬氏曰天子三公九卿二十七大夫八十一元士以成數言之蓋百也此唐虞之制也書曰唐虞稽古建官惟百夏商官倍亦克用又夏殷之官則倍於唐虞之制而鄭氏則以此為夏制其説蓋誤也天子六卿而二卿一公故有三公天子六卿之中又有三孤焉故天子有九卿山隂陸氏曰周官三百六十則夏殷冝二百四十唐虞冝百二十而書曰唐虞建官惟百夏商官倍舉成數也所謂天子建三公九卿二十七大夫八十一元士凡百有二十唐虞三代所不變自餘雖多稱事為之非其正也故經所言其數止此而已延平周氏曰三方三公皆天道者也九州九卿皆地道者也二十七部八十一家之與大夫元士皆人道而已矣廬陵胡氏曰鄭以為夏制以周官三百六十此百二十而明堂位殷官二百故云夏制然以明堂位夏后氏之官百則比此官數為少以書夏商官倍是為二百則比此官數為多是夏之官數與此亦不合鄭何據也且王制鄭皆以為殷此獨云夏首末己自舛戾況又數不合乎可疑也劉氏孟冶曰職之隆者事益簡職之卑者事益衆故三公所以論道經邦佐天子理萬幾調萬化國有大事而有大興作大利害則有卿焉等而下之或典禮樂或任簿書此九卿則三倍於公大夫又三倍於卿元士又三倍於大夫也然與明堂位不同者蓋上古之時事簡則官亦簡後世事日益多官日益衆王制雜舉三代之制亦有不同明堂位特舉成數而言之耳講義曰官之因革不概見於世也孔子聞郯子之言謂天子失官學在四夷猶信孟子答北宫錡之問謂其詳不可得聞諸侯惡其害己皆去其籍然則此經所載及書之周官與明堂位所載建官之數其不同者亦各舉其略不必切切然求合也大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人鄭氏曰命於天子者天子選用之如今詔書除吏是矣小國亦三卿一卿命於天子二卿命於其君此文似誤脫耳或者欲見畿內之國二卿與孔氏曰此一節論夏天子命諸侯之國卿大夫及士之數前云夏官此亦夏禮卿大夫士數五等之國悉同但大國三卿並受命於天子耳夏之大國謂公與侯殷周大國並公也次國者夏則伯殷則侯周則侯伯也小國者殷謂伯夏周同子男也鄭注或者是又為一説謂畿內之國唯置二卿並是其君自命之今記者或欲因子男此又以見畿內之法故捨去子男一卿命於王者而不言也案崔氏曰大國三卿者依周制而言謂立司徒兼冢宰之事立司馬兼宗伯之事立司空兼司冦之事故左傳云季孫為司徒叔孫為司馬孟孫為司空此是三卿也以此推之故知諸侯不立冢宰宗伯司冦之官也三卿命於天子則大夫以下皆其君自命之也三卿則上中下三品而含上下今云下大夫五人者取卿為言耳知大夫有上下者前云次國之下卿當大國之上大夫是也何以五人謂司徒之下置小卿二人一是小宰一是小司徒司空之下亦置二小卿一是小司冦一是小司空是也司馬之下唯置一小卿小司馬也故何休注公羊云古者諸侯有司徒司空上卿各一下卿各二司馬事省上下卿各一又冢宰云施典於邦國設其參傅其伍鄭云參謂卿三人伍謂大夫五人石林葉氏曰説者謂立司徒兼冢宰之事立司馬兼宗伯之事立司空兼司寇之事是謂三卿以理考之諸侯南面之君莫不有天道也嫌於上逼天子則不可以立天官知節則令自己出謹度則禮皆上制故不可以立禮官君有道變法而臣以死守法不可以立刑官雖然富而後教教而後刑先王不易之法也司徒所主者地道既有以教之則禮在其中矣司馬所主者國政既有以正之則刑在其中矣司空所主者國事既有以富之則教在其中矣三卿足以具六官如此而魯作三軍者三卿也季氏三分公室而各有其一叔孫氏臣其子弟孟氏取其半季氏盡征之此三軍所作非歸於公室而歸於陪臣則春秋之所譏也至於小國則所治者寡而其臣屬不備故止立二卿豈有司徒司馬而無司空者與長樂陳氏曰方伯之國必立之三監諸侯之卿必命於天子者以其專征於一方知節於一國不可不防之也周官邦國設其參皆三卿也此小國則二卿蓋非周制與下言小國之卿與下大夫一命周官則小國之卿再命大夫一命皆非周制故也管仲平戎於王王以上卿之禮享之辭曰有天子之二守國髙在受下卿之禮而還則國髙命於天子者也籍談曰鞏伯非命卿也則鞏伯非命於天子者也大國三卿皆命於天子者也次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君以其強弱之勢異故也三等之國卿數不同大夫士之數則同者卿則合治大夫士則分職故卿數與祿以國之大小為差大夫士之數與祿則同焉而已於大夫言下大夫則知卿之為上大夫也於士言上士則知其中下也嚴陵方氏曰受命於天子者為隆受命於其君者為殺此隆殺之别也不言中下之士則以各居其上之三分見之廬陵胡氏曰鄭氏謂此皆夏制今案周禮凡三等國卿大夫士之數悉與此同又春秋周法也魯季孫司徒叔孫司馬孟孫司空三卿也曾子問亦明周法而云國家五官則五大夫又冢宰施典於邦國設其參傅其伍參謂三卿伍謂伍大夫也則此乃周制鄭氏必以為夏官何哉李氏曰周官大宰職施典于邦國設其參傅其伍陳其殷置其輔施則于都鄙立其兩參即三卿也伍大夫也殷上士也輔庶人在官者也兩二卿也司馬職曰凡制軍大國三軍次國二軍小國一軍皆命卿為之則知雖畿外之小國猶一卿命於天子也二卿皆命於其君者畿內之國也蓋六命司官則得以自命卿矣畿外舉大國次國以見小國畿內舉公卿以見大夫理或然也書曰魯人三郊三遂蓋魯大國也故得三軍然則春秋何以書作三軍蓋譏其益一大夫也山隂陸氏曰小國二卿皆命於其君此非脫誤著畿內之國二卿爾上言畿外下言畿內亦互相挾蓋言之法多如此案大國三軍次國二軍小國一軍軍將皆命卿則小國亦三卿一卿命於天子二卿命於其君可知一命不言不過亦言之法延平周氏曰一國之事皆委於諸侯而其卿必命於天子者有微意存焉國有大小而下大夫上士之數皆同何也國雖有大小其六職之屬各有條目而不可闕此大夫與士之數所以同也臯陶謨於有家言三德於有邦言六德於天下言九德是有邦雖殊而用六德之人則一也周官小國之士不命此於小國亦言上士者雖不命而其等亦有三也東萊吕氏曰周家封國八百固是小大相維本末相制有道而王室尊安雖無道亦便未能兼并得其中自有總攝處如上卿命於天子如貢財於天府如此非一故易控制自東遷之後此法漸漸不存矣永嘉徐氏曰先王建萬國親諸侯聖人觀地上有水之象為之非其不得已也中畿千里環列五服選賢建德與之共理其維之有法其御之有道聖人所以與天下為公而非私其力以為己也試觀其內諸侯祿外諸侯嗣內外非有輕重而又更出迭入為之諸侯不得以久其權也列國之卿命於天子王臣布在諸侯之國而諸侯每嵗貢士實在王都諸侯又不得私其人也聖人封建之大權其內外相維可見於此矣且大國三卿命於天子則朝廷所自命者也小國二卿命於其君則君命之者也夫國之大者宜專其命國之小者冝自上出也命其大不命其小聖人控制大邦優假小國之意深矣自周之東上失其柄而權綱不收諸侯擅自廢置無復王制之舊既僭用三卿矣而復制左右以擬三公是實備王官之制也其後齊魯鄭三國皆有三卿考之周禮大國之卿司徒司馬司空是也是雖天子所命之卿而春秋之時諸侯自命不請於王者多也惟魯之單伯鄭之祭仲説者以為命大夫也齊髙國管仲所謂天子之二守國髙在是為天子所命之卿外是私自立者相環也至於晉其僭王制甚矣晉為伯主多置羣官而天子之命卿其名僅存耳卿以軍將為名而三軍之制一軍有二卿其將若佐皆卿也邲之戰實備六卿至於司馬司空反位大夫之列不復卿官矣故魯侯賜服而三帥以三命而司空僅與軍尉侯奄均受一命爾是六卿皆三命也則晉僭王制而廢命卿豈不大可誅乎命卿不出於王而戰國之世周王乃命韓趙魏三卿為諸侯然則非晉之壞王制乃天子自壞之也漢初藩國大者其官制至同漢朝亦甚無别然二千石以上漢自為置而國事皆𨽻於傅相侯王不得私自置也文帝之世賈誼方憂之曰漢之傅相方握其事數年之後各遍置私人誼可謂善識封建者矣當文帝時淮南厲王逐漢所置二千石而請置帝實許之母乃壞其法乎其後七國之叛衡山淮南之亂大抵皆私自置官也自武帝後得仕京師而諸侯自私其人矣大非古昔天子命諸侯貢士之意也唐藩鎮之亂亦以節度留後皆得以辟置如烏重胤之羅致石溫二生董晉之辟韓退之嚴武之辟杜少陵其賢者既歸之而怙強負固者又得以私姦黨而終成藩鎮之亂若唐亦不識內外之勢矣國初收藩鎮之權而置轉運使通判使主諸道錢榖雖所以制其財而實察之也其可謂善審天下之勢矣劉氏孟冶曰孔子曰天下有道禮樂征伐自天子出大國之諸侯其冨貴足以埓天子其制度足以擬天子驕奢易萌僭侈易生儻使權柄一出其手則馴致於陵其上者未必皆諸侯之罪亦上之人無有維持之也故京城不度所以啓叔假之不義下堂而見所以見周室之不競故知田氏六卿不服則齊晉無不亡之理三子不臣則魯無可治之理王者之制於大國則必致其詳於小國則必致其略蓋以此也大國三卿若可命矣而必出於天子小國之卿宜出於天子之命矣而聽於君何者蓋小國之勢其權其力可以潛削而默制之而大國之君則當杜其兆而塞其源也是以五等雖同而大國則一受命於天子也金華邵氏曰大國欲其權不侔上故三卿皆命於天子小國欲其權足以制下故二卿皆命於其君次國則處乎大國小國之間故二卿命於天子一卿命於其君言下大夫而不言上大夫者以上大夫即卿如前所謂諸侯之上大夫卿是也言上士而不及下士者以中下之士有時而闕如前所謂其有中士下士者數各居其上之三分是也天子使其大夫為三監監於方伯之國國三人鄭氏曰使佐方伯領諸侯孔氏曰此一節論天子遣大夫往監方伯之國州别各置三人之事每一州三人三八二十四人案崔氏曰此謂殷之方伯皆有三人以輔之佐其伯謂監所領之諸侯也周則於牧下置二伯亦或因殷使大夫為三監故燕禮云設諸公之坐鄭云公孤也大國孤公一人而云諸公者容牧有三監然則天子於州牧之國别置三大夫以輔之其尊卑之差則下文其祿視諸侯之卿其爵視次國之君其祿視諸侯之卿者謂公之孤也故燕禮謂之諸公與公孤同也尚書使管叔蔡叔霍叔為三監者為武庚也與此别也嚴陵方氏曰方伯專征於一方其權實重焉天子不可不大為之防每國三人故謂之三監必以三人為率者則與三公同義不使卿為之止使大夫為之以見天子之尊雖使其大夫固足制於方伯故也若書所謂三監名義雖同其人則異焉馬氏曰周官曰天子乃施典于邦國而建其牧立其監牧之下又立監所謂三監者是也於方伯之國國三人八州八國總而為二十四人所以佐方伯統領諸侯之治也三監之祿則視諸侯之卿其爵則視次國之君其祿則取之於方伯之地為方伯之佐也山隂陸氏曰武王立武庚於邶以管叔蔡叔監之謂三監所謂監於方伯之國國三人也管蔡二人而已則三監蓋不必備然管叔受鄘蔡叔受衛所謂其祿取之於方伯之地者此之類也周官曰建其牧立其監然則武庚二王後其上公與蓋九命作伯者也知然者以微子之命曰庸建爾于上公尹兹東夏知之也鄭氏謂二王之後不為牧不知何所據而言爾延平周氏曰方伯專征伐者也監以大夫有微意存焉劉氏孟冶曰天子之於大國諸侯何其拳拳不釋焉三卿之命諸侯不得而專皆出於天子矣又使其大夫為三監監其國蓋天下之患當制其始始之不制終將若何故隄防益密法度愈詳不如是則不足分其權也不惟此也諸侯之征伐固所以捍外患而禦外陵必天子賜之弓矢然後敢征諸侯之生殺固所以助天子之賞善罰惡必天子賜之鈇鉞然後敢殺今也諸侯之貴而大夫有以制之有以見天子之重矣金華應氏曰方伯者天子所任以總乎外者也又有監以臨之蓋方伯權重則易專大夫位卑則不敢肆此大小相維內外相統之微意也黃帝設左右太監則總察天下不過二監耳其所謂二監即唐虞四嶽商二伯之任也周太宰之職曰建其牧立其監大概可見者如此而條畫之詳無所考先儒以三公之孤四命者當之要亦一人耳大國三卿而其二命於天子故管仲曰有天子之二守國髙在孤者王朝之所遣二卿則大國之所置而必出於王朝謂之二守亦曰助天子之耳目耳是所以為三人與若管蔡霍為三監雖以監殷意其亦仍舊而置耳武庚既誅殷民又遷則無復可監矣然康叔猶以司寇受封而嗣為是職曰王啓監厥亂為民又曰自古王若兹監其所從來也蓋古而非今矣司寇王朝之臣也而被命以監臨則為諸侯之長故黎侯於衛而責其不能修方伯連率之職是時周衰衛弱黎人猶以是望之則此制長存人自不能舉耳推此則為監者不必專遣大夫諸侯之嘗為王臣者亦可就兼之諸侯為監則他國亦必聽命而方伯連率又不必特置與然則邦國之建牧立監政謂在邦國之中爾天子之縣內諸侯祿也外諸侯嗣也鄭氏曰選賢置之於位其國之祿如諸侯不得位外諸侯有功乃封之使之世也冠禮記曰繼世以立諸侯象賢也孔氏曰此一經論天子縣內食采邑諸侯得祿不得繼世及外諸侯父死嗣位之事畿內公卿大夫之子父死得食父之故國采邑之地不得繼父為公卿大夫故直云祿也有罪乃奪之公羊榖梁説云卿大夫世則權并一姓妨塞賢路經譏尹氏崔氏是也此父死子祿者不在九十三國之數言縣內夏法也殷周亦然畿內諸侯父死視元士若有賢德乃復父位若畿外諸侯父死未賜爵亦視元士除服則襲父位故下文云視天子之元士以君其國畿內不世爵而畿外得世者以畿內諸侯則公卿大夫輔佐於王非賢不可故不世也畿外諸侯嘗有大功報其勞效又在外少事故得世也嚴陵方氏曰內諸侯則公卿大夫士是也外諸侯則公侯伯子男是也夫祿所以養其人嗣所以傳其國內諸侯臣道也止養其人而己外諸侯君道也故傳其國焉經亦曰諸侯世子世國大夫不世爵蓋謂是矣馬氏曰天子之縣內所以待有德也有德者必有以食之而食之則不可以不繼世而必有世祿之法也外諸侯嗣也所以報有功可以繼而有世爵之法也天子縣內植舊德之臣不可繼故尹氏世卿而春秋譏之也外諸侯所以報有功可以繼唯寓公則不繼世然而天子之縣內而謂之諸侯祿者蓋天子三公之田則視公侯卿則視伯大夫則視子男元士則視附庸而有德可以使之出而為諸侯若韓宣子之類是也外諸侯嗣也而有功者可以使之入而為公卿若鄭武公之類是也長樂陳氏曰卿大夫之於采邑猶諸侯之於國故采邑亦可謂之國上言縣內九十三國是也采邑可以謂之國則卿大夫亦可謂諸侯此言縣內諸侯是也禮卿大夫出封加一等諸侯入臣或降一等鄭武公以伯爵入為司徒則是七命而降之以六命也命之升降不同以其勢之屈伸異故也世之祿嗣不同以其功之厚薄異故也蓋外則有功之所封不世嗣不足以崇其德內則佐王而己不世祿不足以稱其功故外者必嗣不絶功臣之世也內則必祿不棄賢者之後也禮曰諸侯有國以處其子孫大夫有采以處其子孫言國則嗣可知言采則祿而已然卿大夫固有常數而采地固有常地使其身死而繼之不絶何采地之可食邪李氏曰古者生財有道用財有禮故仕者世祿而有餘也雖然未嘗不教之使盡其材致其美以見於事業唯其有祿也所以異於棄賢者之類絶功臣之世唯其有放黜也所以異於官人以世者也石林葉氏曰內之公卿大夫其受田視公侯伯子男固亦通稱為諸侯也內以世祿為主而有賢者亦得世爵外以世爵為主而不賢亦止於世祿然則諸侯之子自非大惡猶得襲位而公卿大夫之子必賢而後爵豈輕內而重外乎蓋古者公卿大夫有功德則出封為諸侯是在外之世爵者乃內之世祿世臣也至諸侯有功德亦必入而為公卿是在內之世祿者或在外之世爵諸侯也內外更易而輕重所以均者此先王之仁政也永嘉徐氏曰古者寰內諸侯世其祿而不嗣與寰外諸侯異者何哉先王為官擇人不以私害公功不可忘報故世其祿以報功官不可以非賢故不世其位為官擇人公卿大夫選命賢者為之不以父兄故而私授之也以父兄故而世其官則非公選矣有虞之時賞延於世所以報功至於殛鯀興禹亦不以父之惡而廢其賢唯其功而己矣三代之際皆以世祿夏之縣內諸侯不世爵而外諸侯則世爵內諸侯何以不世非賢不任也外諸侯何以世蓋繼世以象賢傳國以報功也殷人貴富説者謂臣能世祿曰富以見殷之大夫亦世祿也自紂官人以世不問賢否皆嗣其位而不易先王之官始壞矣周之興也文王治岐仕者世祿而詩言凡周之士不顯亦世蓋忠厚之化雖周王皆世祿也裳裳者華之詩作棄賢者之類絶功臣之世而世祿亡矣然周之制畿內之地有功者與之不令世有至於畿外之地則容或世嗣矣溫畿內之邑也成王嘗以封蘇忿生矣襄王又以賜晉文矣晉復以與狐氏陽氏而後及郤氏蓋王官之大邑畿內之采地亦不使無功者得以世守也至於諸侯之大夫其有功者得世其祿官有世官則有世族是也無功則奪之管仲奪伯氏駢邑三百是也若有功則不奪之矣春秋之時卿以世襲不復計功矣然其初猶為近古故無駭與俠皆書其名不書其世以其未賜族也自後官不擇人世執其柄春秋於周書尹氏武氏仍叔之子於魯書季友仲遂蓋譏世卿也卿既世襲權移於下馴至三家專魯六卿分晉則內諸侯不世官之制先王防微杜漸之意深矣漢之封國有山河之誓諸王列侯襲父故爵外諸侯得以嗣守而吏二千石以上視事滿三嵗得任同産子一人為郎然不以德選至哀帝時始除其令亦謂其官以世不以賢而不得私愛害公選也唐大宗嘗欲功臣並世襲刺史使後嗣長為藩翰而長孫無忌固辭而遂止時于志寧亦奏古今異時非久安計馬周論宗室功臣悉藩國世守其政若令有不肖子襲封嗣職正欲絶之則子文之治猶在正欲存之則欒黶之惡己暴蓋時世異變雖外諸侯亦不可使世其官也天寶以後地分於將領而藩鎮得以世襲遂使自辟其人自強其兵唐卒以此召亡太祖皇帝懲五季之變遂與趙普議削藩鎮之權而制其錢榖收其精兵自李彞興馮暉折御卿之外餘皆不使之世襲蓋深識時變者矣劉氏孟冶曰封土有定法故先王嚴內外之辨本強則國安故先王有祿嗣之别畿內而封諸侯以嗣則天子之公卿大夫何以祿養畿外而不封諸侯則藩宣屏翰焉得其人故內之諸侯則惟食采地外之諸侯則得以世其爵也武夷胡氏曰隱公三年書尹氏卒尹氏天子大夫世執朝權為周亂階家父所刺秉國之均不平謂何者是也以氏書者志世卿非禮為後世鑒也或曰世卿非禮裳裳者華何以作乎曰功臣之世世其祿世卿之官嗣其位祿以報功也故其世可延位以尊賢也故其官當擇官不擇人世授之柄黨與既衆威福下移大姦根據而莫除人主孤立而無助國不亡幸爾春秋於周書尹氏武氏仍叔之子於魯書季友仲遂皆志其非禮也方氏曰自畿以內皆天子所有也豈人臣之所專凡內之受國者止於食土之毛而已而不得世有其地自畿之外固諸侯所共也豈天子之所私故凡外之受國者非特食其地之所出而又得以世嗣焉其固先王輕其內而重其外哉以為內之諸侯使之有其地則無以統於一而強天子之勢矣外之諸侯不使之專其國則孰能勤於王而相與以安天下制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命鄭氏曰卷俗讀也其通則曰衮三公八命矣復加一命則服龍衮與王者之後同多於此則賜非命服也虞夏之制天子服有日月星辰周禮曰諸公之服自衮冕而下如王之服孔氏曰此一經論王制三公以下次國小國之君爵命之數制謂王者制度三公八命身著鷩冕若加一命則為上公而著衮冕故云一命卷九命卷龍之外依制不合有其服若有加益者是君之特賜非禮法之常則雜記謂之褒衣也此則禮緯九賜之衣服與宗伯再命受服不同此篇皆王者之制於此特言制者以三公位尊又加一命其事極重故記者特云制也卷字周禮及覲禮皆作衮鄭注虞夏之制天子服有日月星辰者臯陶謨云豫欲觀古人之象日月星辰山龍華蟲作會宗彞藻火粉米黼黻絺繡是也日一月二星辰三山四龍五華蟲六此六者皆畫於衣宗彞七藻八火九粉米十黼十一黻十二此六者皆繡於裳至周則日月星辰畫於旌旗又登龍於山取其神登火於宗彞取其明尊神明也而冕服九章一曰龍二曰山三曰華蟲四曰火五曰宗彞皆畫以為繢六曰藻七曰粉米八曰黼九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩之衣三章裳四章凡七也毳之衣三章裳二章凡五也希之衣一章裳二章凡三也玄者衣無文裳刺黻而已是以謂之玄焉衣法天故章數竒裳法地故章數耦引周禮司服文云王祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則玄冕鄭引此者證三公一命衮也然則此經三公一命卷謂周制也周以前則山在衮上不得云一命衮也長樂陳氏曰星五星也辰十二次也華蟲雉也宗彞虎彞蜼彞也粉粟米米聚米也黼白黑文也黻黑青文也蓋日月星辰在天成象者也山龍華蟲虎蜼藻火粉米黼黻在地成形者也在天成象者道之運乎上在地成形者道之散乎下道固始終於東北故山龍而降始山終黻莫不有序何則山居東北冬春交也龍春也華蟲夏也虎秋也蜼冬也周而復始則藻春也火夏也粉米中央也黼秋冬交也黻冬春交也龍與華蟲陽之陽也故繪而在衣虎與蜼陽之隂也故繡而在裳然則古者合三辰以在服備十二章以則天數故章與四時相順後世判三辰以在旗而服止九章以法陽數故章與四時相變觀周禮稱衮冕禮記稱天子龍衮又曰龍卷以祭上服言龍衮而不言山則升龍於山可知也司服五章之服則毳冕毳毛物毛物虎蜼也五章言毳冕而不言藻則升火於宗彞可知也升春物於冬春交之上升夏物於春之前則章與四時相變可知也禮書嚴陵方氏曰王之三公在朝則八命而服七章之鷩冕及其出封加一等乃賜之以九章之衮冕衮雖三公可服非有加則不賜也凡以有制存焉爾故曰制三公一命卷若有加則賜也詩言衮職有闕維仲山甫補之蓋謂是矣以八命而加一命則九命矣故曰不過九命不過九命則典命所謂以九為節者也不過七命則典命所謂以七為節者也不過五命則典命所謂以五為節者也馬氏曰加之以卷者言人臣之極也賜可以加而命不可以加周官所謂唯賜無常是也然則天子龍衮諸侯黼大夫黻士玄衣纁裳而三公亦得以服衮者蓋其服衮則同而其旒數則異也故三公有降龍而無升龍山隂陸氏曰侯伯七命若加一命則為州牧又加一命是為州伯牧亦伯也皆九州之長知然者以周官乃施典于邦國曰建其牧立其監而王制云天子之大夫為三監監於方伯之國國三人知之也牧八命也九命則謂之伯伯正名其為長蓋上公一命卷者也然入天子之國亦曰牧避二伯也牧八命而冕服七章常七旒猶三公八命服鷩冕卿六命服毳冕牧雖八命即為方伯猶賜秬鬯秬鬯九命之賜也故王季為州伯詩曰瑟彼玉瓉黃流在中傳以謂九命然後錫以圭瓉文侯之命平王錫之秬鬯圭瓉孔安國謂平王命為侯伯李氏曰陽中則動以變故易於震為龍隂極則靜以止故易於艮為山龍取其變也山取其止也臣體常者也三公入於王朝則全於臣故服衮冕八章而其章以山為首詩曰是以有衮衣兮無以我公歸兮是也君制變者也上公出封於外則全於君故服衮冕九章而其章以龍為首周官曰公之服自衮冕而下如王之服是也三公衮以山摯以璧上公衮以龍摯以圭其義一也卷龍衮也以其能見能躍能飛其伸也其屈也皆不可知故曰卷猶雲門謂之大卷也石林葉氏曰莫非制也於衮而特言之者以衣服制之顯者蓋一隂一陽之謂道道之在天者以日月為之運星辰為之紀其施於人則仁而已無為而仁者山也仁而不可知者龍也仁藏於不可知而顯於可知者禮也禮者文而已其文可知者華蟲也凡此皆以象天德也天德者陽也故作繪而在上宗彞者虎雖之彞也何以知其然以禮謂之毳而鄭氏謂之虎蜼鄭氏必有所受之是以知其然也虎者義也蜼者智也蜼能以尾室鼻而禦雨患是能達於體用趨時能變此所以為智也為虎又象之於宗彞者以其奉宗廟為大事也其清足以自潔而可薦者藻也其明足以燭物而可以烹飪者火也米養人者也粉之則其利散而均於養人而已不足以為道必有以裁制之斧者所以為裁斷也施裁斷不可以無辨黼者辨物之謂也其位在東北隂陽於是辨焉凡此所以象人德人德隂也故絺繡而在下五帝之德同乎帝則具乎天德故三辰為上而龍以仁次於山火以明次於藻三王之德應乎人則具乎人德日月星辰既登於旗則冕服不可不法乎天道故龍以變化不可知而登於山火以明而有功則登於宗彞然則舜之冕服盡於十二周之冕服止於九章而此言三公一命卷者其人在內八命而出封加一等則從九章而衮冕也蓋三公近於天子而爵位盛大其德無私其仁足以長人而藏於不可知故衮冕自龍而下九章如王之服卿在內則六命其出為侯伯之君則從七命而鷩冕卿雖爵位次於公而為諸侯伯則其仁亦足以長人以其顯於可知故鷩冕自蜼而下七章如公之服大夫在內則四命其出為子男之君則從五命而毳冕大夫雖帥人以智而進退以義故毳冕自藻火而下五章如侯伯之服凡此諸侯之冕不純乎臣道則以衣之在上者為主若大國之卿三命而已其道苟足以養人則可以輔國故絺冕自粉米以下三章如子男之服小國之卿一命而已其德苟足以辨善惡則無枉己而仕故玄冕自黼而下如卿之服凡此諸臣之冕皆純乎臣道則以裳之在下者為主衣在上所以象乎陽其色用玄玄則赤而兼黑陽以隂雜之也裳在下所以象乎隂其色用纁纁則黃而兼赤隂以陽雜之也玄者北方之屬天道在北則寂然不動而纁者南方之屬地道在南則有為以與萬物相見形而上者寂然不動而出於無為故衣用玄所以尊道形而下者有為與萬物相見而代有終者地道故裳用纁所以下功諸侯有時而在人上則主乎道而體天唯其在內嫌於外逼天子故其命以八以六以四則從隂之數至於在外者有君人之道故其命以九以七以五則從陽之數諸臣無時而不在人下則主乎功而法地唯其法地故在內而言陽數則無嫌於天子在外而言隂數則亦無疑於其君無嫌疑者以其位卑也故下曰大國之卿不過三命下卿再命小國之卿與下大夫一命然周官言公之孤四命其卿三命其大夫再命子男之卿再命其大夫一命與此異同何也蓋古者孤卿大夫雖有常名而其職固有相通者矣以其相通有孤而兼卿大夫為之者周官詳於其職故舉上以及於下王制略其兼官故舉下而見於上猶之孟子之言卿大夫元士受地視公侯伯子男其制為略王制則兼三公附庸而言之其制為詳不害其意同也永嘉徐氏曰古者設官之制其爵以五其命以三自上公九命至於子男五命品級異等而不可亂自上公衮冕侯伯鷩冕至於子男毳冕儀章異數而不可越周官典命掌諸侯之五儀諸臣五等之命司服自公之服至子男之服所衣之服必從其命其命不差則其服不僭先王所以正名分而章服采也故嘗論衣服之制自黃帝堯舜取諸乾坤以為衣裳蓋法天地以制為上下之服非私自創立之也虞夏之制天子祭服自日月以下十有二章蓋會天地萬物於一身以照臨百官文采物色靡一不傋而臯陶謨所載五服五章以命有德謂之天命自天子十二章至卿大夫之三章其别為五如天造地設不可紊也公之衮冕其章數同於王而其旒數則異故上公之衮無升龍而旒則以九固自有等殺也豈曰公之服與王同而得純用之無所等倫於其間哉自成王命魯公世祀周公以天子之禮樂而禘祀用衮冕為魯禮之常成王之賜伯禽之受皆非也東遷之始晉武公之大夫請命於周而無衣之詩作始曰無衣七兮次曰無衣六兮雖晉侯國豈無七章之衣而固不敢上視侯國庶幾於六命之服而列於天子之卿猶愈乎否也其猶知存王制也其後晉文之伯周之䇿命為侯伯而賜之大輅鷩冕之服則是猶出於王命而不輕以禮假人也當魯僖公之時尚存諸侯命有三等之制諸侯薨於朝會加一等死王事加二等於是有以衮斂蓋子男加二等則服上公衮冕之服是出於上之特恩而諸侯不敢私僭也豈非西周之澤未逺而制度猶未泯乎三山林氏曰黃帝始備衣裳之制舜觀古人之象繪日月星辰山龍華蟲於衣繡宗彝藻火粉米黼黻於裳以法乾坤以昭象物所以彰天子之盛德能備十二物也使服其服者當須有是盛德焉繪以三辰所以則天之明尤為君德之光自黃帝以來歷代之制莫不然也周人特備以斿繅之數耳周禮乃無十二章之文司服惟有衮冕至玄冕説者謂周登三辰於旗服惟冕九章嗚呼何説之異也自堯舜至三代文物日以盛名分日以嚴儀章日以著夫子於四代禮樂特曰服周之冕取其文之備尊卑之有辨也何得至周反去三辰之飾蓋不過據左氏三辰旗旗之文左氏謂旗有三辰何嘗謂衣無三辰邪豈有王者象三辰之明厯代皆飾於衣周人特飾於旗有何意乎況又謂上公九章而王服亦九章將何所别周公制禮防亂萬世乃至於無别郊特牲云祭之日王被衮以象天則十二章備鄭氏謂有日月星辰之章此魯禮也夫被衮以象天周制固然也何魯之足云豈有周制以九魯乃加以十二之理乎秦溪楊氏曰詳玩司服經文則知有虞作服十二章周亦十二章昭然甚明公之服自衮冕而下侯伯之服自鷩冕而下鷩冕七章衮冕九章推而上之則天子之服十二章可知享先王則衮冕衮冕者繪衮龍於服而冕也享先公饗射則鷩冕者繪華蟲於服而冕也蓋服有六而冕則一先鄭謂六服周冕是也祀昊天上帝之服備十二章則繪三辰於服而冕可知也今不曰三辰而冕而曰大裘而冕果何與蓋享先王先公之禮備乎文則以衮鷩之文明之祀昊天上帝之服尚乎質則以大裘之質名之與牲用犢席用稿秸器用陶匏之意同所以尊天也祀昊天上帝之服雖不言三辰然服備十二章則三辰不待言而可見矣鄭氏乃謂有虞十二章至周而以日月星辰畫於旌旗冕服惟有九章然公自衮冕而下王又自衮冕而下君臣同冕略無區别必無是理賈公彥云鄭氏九章此無正文鄭並以意解之則疏家已知其非而不信之矣惟其並以意解故後世尊用其説始有悟其上下之無等尊卑之失次者魏明帝以公卿衮衣黼黻之制擬於至尊遂制天子服繡衣公卿服織文矣唐長孫無忌以帝祭日月服元冕旒三章而三公亞獻服衮孤卿服毳鷩貴賤無分而天子遂止於服衮他冕盡廢者矣先王制禮必本於天理人情之公自上古至於周天子仰則天數路十二就常十二斿馬十二間圭尺二寸繅十二就而冕服之章莫不皆然鄭氏謂周以日月星辰畫於旗而冕止九章不知龍登於旗山登於俎黼登於扆九章亦可損乎前乎康成如漢明帝用歐陽説義天子備十二章三公諸侯用山龍九章九卿以下用華蟲七章其説猶用周制也自鄭氏以意解經九章之説於是乎始故行之後世卒有不厭於人心并與古制而去之者可勝嘆哉講義曰周官典命曰王之三公八命其卿六命其大夫四命及其出封皆加一等鄭氏謂大夫為子男卿為侯伯然則三公九命次國七命小國五命可知矣大國之卿不過三命下卿再命小國之卿與下大夫一命鄭氏曰不著次國之卿者以大國之下互明之此卿命則異大夫皆同周禮公侯伯之卿三命其大夫再命子男之卿再命其大夫一命孔氏曰此一節論大國小國卿大夫命數多少不同之事大國之卿不過三命則知次國之卿不過再命大國下卿再命則知次國下卿一命故鄭云互明之大國上卿三命下卿再命次國上卿再命下卿一命小國上下卿並皆一命故云卿命則異大夫則大國次國小國皆同一命以大國下卿再命差之明大夫一命又小國大夫一命則次國亦可知矣是大夫皆同也此夏殷制案周禮公國之孤四命與餘卿不同則知此大國之卿不過三命亦謂孤也大國下卿再命者謂除孤以外之卿就再命之中分為中卿下卿也故前文云次國之上卿位當大國之中是也次國之卿再命亦謂上卿執政者若魯之季孫下卿一命亦分為中下二等故前文云中當其下下當其上大夫是也小國之卿雖同一命亦分為三等故前文云小國之上卿位當大國之下卿中當其上大夫下當其下大夫其大國次國小國大夫雖同一命當皆分為上下二等文已具於上今總云下大夫者對卿言之嚴陵方氏曰大國對下卿言卿指上中可知小國特言卿則兼三等之卿可知言下大夫則不及上中者蓋諸侯無中大夫而卿即上大夫故也前言上中下之所當而與此不同者位雖視其命不能無詳略之異故也典命著諸臣之命又與此不同者此非周制故也故此命不及於士焉蓋爵出於命至周始列士於爵故也夫命者禮儀之等數受制於天子之名也以貴賤有常數厚薄有定分猶天命焉是以謂之命也山隂陸氏曰大國之卿不過三命下卿再命小國之卿與下大夫一命不著次國之卿者以命數與大國同而典命所謂侯伯之卿大夫士亦如之是也然則周官子男之卿再命今此云小國之卿與下大夫一命者蓋言畿內小國之卿如此與上小國二卿皆命於其君同義鄭氏謂或者欲見畿內之國二卿與是也李氏曰周官典命職曰公之孤四命其卿三命其大夫再命其士一命侯伯之卿大夫亦如之子男之卿再命其大夫一命士不命其大國所謂諸侯之國而其小國則所謂庶方小侯之國與講義曰以卿考之大國次國小國之卿皆有上中下三等之别其大夫皆有上下二等之别至於命數之多寡則三命再命一命是也故記者舉其略曰大國之卿不過三命下卿再命小國之卿與下大夫一命由是推之則大國之上卿三命中卿下卿皆再命次國之上卿再命中卿下卿皆一命小國之卿與上國次國小國之大夫皆一命可不言而喻也凡官民材必先論之論辨然後使之任事然後爵之位定然後祿之鄭氏曰論謂考其德行道藝辨謂考問得其定也易曰問以辨之爵謂正其秩次祿與之以常食孔氏曰此一節論擇賢材任以爵祿之事官其人必先論量考問事已分辨得其定實故云辨雖考問知其實未明其幹能故任以事事又幹了然後正其秩次除授位定然後與之以祿嚴陵方氏曰民之有材猶木之材也欲授之以官可不隨其人材而用之乎然一人之知識固不足以盡其大小之論也可不與衆而公言之乎故必先論之後又言論定然後官之任官然後爵之者蓋辨之然後定使之者不必官之任官者不止於任事皆重輕之别也此特言民材而已然則進士之賢者焉其言所以不同馬氏曰凡民之材有大小之不同其德則有知仁聖義中和其行則有孝友睦姻任恤其藝則有禮樂射御書數凡官民材必先論之論之者論其德行道藝之實而視其材之所有也論之已辨然後使之任其事也才足以充公卿之任則使之為公卿才足以充大夫士之任則使之為大夫士故任事然後爵之爵有髙下則祿有厚薄位者視其爵祿之髙下而祿者稱其爵之等差也故曰任事然後爵之位定然後祿之凡此皆所以官民之材也下又曰司馬辨論官材論進士之賢者以告於王而定其論至位定然後祿之亦與此同意也周官曰以德詔爵以能詔事所謂德者即賢之謂以能詔事者乃任事者也蓋司馬辨論官材論國中之士也凡官民材者兼萬民而言之也養國中之士與養萬民之士蓋有以異也論國中之士其法則致詳故考校於中年論萬民之士其法則致略故三年然後論之雖其考校之法有異而其論辨之意則同也長樂陳氏曰先王之官民材論之出於衆使之出於獨任事然後爵之則以爵稱材位定然後祿之則以祿稱爵論使盡其實則在下者無妄進之濫爵祿適其宜則在上者無妄施之失下言論定然後官之任官然後爵之位定然後祿之與此不同者任事然後爵之能者也任官然後爵之賢者也此言官民材下言論進士之賢者則賢能之辨可知石林葉氏曰人之材或成其為賢或成其為能必論其所長而使之論所長而既别矣入而使之長民而民化出而使之治民而民安則可以任事矣既任事而後爵之以公侯伯子男之位大夫士之位位既定而後祿之以百里七十里之田雖然不可不與士共之故孟子曰左右皆曰賢未可也國人皆曰賢然後察之古之君子審克如此而必與士共之者以士上足以兼大夫而下至國人者也延平周氏曰使之故任以事爵之故其位定使之則固有稍食而所謂祿之者言采邑也廬陵胡氏曰論謂物論自古用人必采公論以辨别當否任事然後爵之所謂試可位定謂材稱其位公論翕然定矣然後祿之末世位不定而尸祿者滔滔皆是禮記集説卷二十七
