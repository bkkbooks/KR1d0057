body:
  text: 禮記集說卷十四宋衛湜撰凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福鄭氏曰為其瀆神也廢舉謂若殷廢農祀棄後不可復廢棄祀農也非其所祭而祭謂妄祭神不饗孔氏曰此明祭有常典不可輒擅廢興農即柱也有農功故曰農也棄即后稷也為稷官故曰稷也藍田呂氏曰廢之莫敢舉如已毁之宗廟已變置之社稷不可復祀也舉之莫敢廢如已修之壇墠而輒毁已正之昭穆而輒變也非其所祭而祭之如法不得祭與不當祭而祭之者也魯立武宫立煬宮是舉其廢也躋僖公是廢其舉也魯之郊禘與祀文王祀爰居祭非其所祭也淫過也以過事神神弗享也故無福福者百順之名也長樂陳氏曰祀典之所秩則不可以廢廢之為不仁祀典之所不秩則不可以舉舉之為不智周官大宰祭祀以馭其神大祝禁督逆祀命者禮記山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵夫逆祀命而有所舉則在所禁逆祀命而有所廢則在所督不敬者在所削不孝者在所絀此人臣所以謹常祀而無瀆禮也春秋傳曰不可以間成王周公之命祀蓋以此也然莫敢舉廢者禮之常可以舉廢而舉廢之者禮之變故湯於社則不遷於稷則易農以棄凡以崇功德以歸宿於義而已後世祭祀無常典舉廢無常時故夔子不祀而滅於楚酆舒不祀而滅於晉此冝舉而不舉也秦漢之祀其小有至於陳倉其大有至於五畤此不冝舉而舉也春秋傳曰神不歆非類民不祀非族而祀之則於禮為諂於命為逆於祀為瀆其欲徼福也難矣昔楚昭王不祀河甯武子不祀相皆能變易舊俗以趨於正可謂知此禮矣孔子曰楚昭王知大道不其信乎嚴陵方氏曰可以廢而廢之可以舉而舉之者存乎義因所廢而莫敢舉因所舉而不敢廢者存乎禮蓋禮有經義有權故也孔子曰非其鬼而祭之謟也其淫祀之謂歟在人則為謟於禮則為淫石林葉氏曰有其舉之莫敢廢也有其廢之莫敢舉也鄭註是矣然未盡也先王之制祭祀如柳下惠所言蓋甚嚴矣故禮有祭法有祭義若舉廢皆當於法與義後固不可改使有不當其可姑仍其失而不之正乎棄之與農農之功必有不若棄者則農固不得不廢若柱之為社世未有能過之者則雖欲遷而不可改湯特為之作夏社以曉天下此禮所以言有其舉之有其廢之者謂各有名而非苟作者也不然如魯人之祀爰居躋僖公何以書於春秋使後有作者能以禮正之孔子豈不許乎東萊吕氏曰近來人說淫祀多是說叢祠及載於祀典非正者夫豈止此凡非所祀而祀之如諸侯之祭天季氏旅泰山之類皆淫祀也古人初不以福自嫌自後世有徼福之心者多故看得福為可徼耳天子以犧牛諸侯以肥牛大夫以索牛士以羊豕鄭氏曰犧純毛也肥養於滌也索求得而用之孔氏曰此皆上兼下下不得僭上左傳云聖王致力於神奉牲曰博碩肥腯是天子得以肥也又公羊帝牲必在滌三月稷牛惟具稷牛有災故臨時得别求之是天子諸侯得有索牛也此大夫士謂天子大夫士也若諸侯大夫即用少牢士則用特牲其喪祭大夫亦得用牛士亦用羊豕故雜記云上大夫之虞也少牢卒哭成事祔皆大牢下大夫之虞也犆牲卒哭成事祔皆少牢是也據此諸侯不得用犧牛祭義云天子諸侯有養獸之官犧牲祭牲必於是取者蓋諸侯對卿大夫亦得云犧若對天子則稱肥耳其大夫牲體完全亦有犧牲之稱故上云大夫犧賦為次但不毛色純耳案楚語觀射父云大者牛羊必在滌三月小者犬豕不過十日此大夫索牛士羊豕既不在滌三月當十日以上但不知其日數耳嚴陵方氏曰天子以犧牛則雖肥而或傷亦在所不用矣諸侯但取其肥而已不必犧也大夫但取其具而已又不必肥也至於士雖索牛亦不得用矣唯羊豕可也祭義言天子諸侯必有養獸之官故得有犧肥之牛也牛人凡祭祀共其求牛此經所言特於大夫言索者以無養獸之官必索而後得之故也所謂羊豕者或以羊或以豕也支子不祭祭必告于宗子鄭氏曰不敢自專謂宗子有故支子當攝而祭者也五宗皆然孔氏曰支子庶子也祖禰廟在適子之家而庶子賤不敢輒祭之若濫祭亦是淫祀支子雖不得祭若宗子有疾則庶子代攝可也猶冝告宗子然後祭河南程氏曰古所謂支子不祭者唯使宗子立廟主之而已支子雖不祭至於齊戒致其誠意則與主祭者不異可與則以身執事不可與則以物助但不别立廟為位行事而已後世如欲立宗子當從此義雖不祭情亦可安若不立宗子徒欲廢祭適足長惰慢之志不若使之祭猶愈於己也横渠張氏曰管攝天下人心収宗族厚風俗使人不忘本須是明譜繫世族與立宗子法古人亦鮮有不知來處者宗子法廢後世尚譜牒譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄又曰宗子之法不立則朝廷無世臣且如公卿一日崛起於貧賤之中以至公相宗法不立既死遂族散其家不傳宗法若立則人人各知來處朝廷大有所益或問朝廷何所益曰公卿各保其家忠義豈有不立忠義既立朝廷之本豈有不固今驟得冨貴者止能為三四十年之計造宅一區及其所有既死則衆子分裂未幾蕩盡則家遂不存如此則家且不能保又安能保國家藍田吕氏曰古者有大宗有小宗别子為祖繼别為宗百世不遷者大宗也繼禰繼祖繼曽祖繼髙祖五世則遷者小宗也宗子上繼於祖禰族人兄弟皆宗之其所以主祭祀治宗事如有國有家之重冠笄取妻必告死必赴況於祭乎所宗乎宗子者皆支子也支子不敢祭也如諸侯不敢祖天子大夫不敢祖諸侯尊者之祭非卑者所敢尸也故宗子為士庶子為大夫以上牲祭於宗子之家祝曰孝子某為介子某薦其常事則支子雖貴可以用其禄而不敢專其事也宗子去在他國則支子攝主以祭其禮有殺焉不厭祭不旅不假之類是也其辭曰孝子某使介子某報其常事此所謂必告于宗子言告而後敢行事也又曰宗子既祭其祖禰則支子不得别祭所以嚴宗廟合族屬故曰庶子不祭祖與禰明其宗也若已為宗子而弟有子其子欲祭其父必從祖祔食祭於宗子之家乎將就其宫而祭使其子自主之乎從祖祔食祭於宗子之家止謂殤與無後見曽子問及小記蓋殤與無後必宗子主之則是子有不得事其父矣傳曰子不私其父則不成為子故兄弟生而異宫所以盡人子之私養及其没也反不得主其祭於義可乎蓋異宫者必祭於其宫使其子主祭其祭也必告于宗子而後行不得而專亦所以明其宗也宗子有祭必先與焉卒祭而後祭其父故曰支子不祭祭必告于宗子又曰終事而後敢私祭若非異宫則禮有所不得申禮不得申則雖祔食于祖廟亦可以安所謂不得已焉者也嚴陵方氏曰言支則知宗之為本言宗則知支之為庶支子不祭公祭也祭必告于宗子私祭也謂祭其先也凡此所以明其宗重其本而已凡祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛雞曰翰音犬曰羮獻雉曰䟽趾兔曰明視脯曰尹祭槀魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合粱曰薌萁稷曰明粢稻曰嘉𬞞韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣鄭氏曰號牲物者異於人用也元頭也武迹也腯亦肥也春秋傳作腯腯充貌也翰猶長也羮獻食人之餘也尹正也商猶量也脡直也萁語辭也稻菰𬞞之屬也豐茂也大鹹曰鹺今河東云幣帛也孔氏曰此一節論祭廟牲幣告神之法凡祭謂貴賤悉然牛肥則脚跡痕大豕肥則毛鬛剛大羊肥則毛細而柔弱雞肥則其鳴聲長羮獻者人將所食羮餘以與犬犬食之肥則可獻祭鬼神也雉肥則兩足開張趾相去䟽也兔肥則目開而視明也自牛至兔八物唯牛云一頭豕以下不云數者皆從其所用而言也則並冝云若干也雞雉為膳及腊則不數尹祭者裁截方正而用之一云正謂自作之論語云市脯不食言不正也商祭者祭用乾魚量度燥濕得中而用之槀乾也脡祭者鮮魚煑熟則脡直若餒則敗碎不直也清滌者古祭用水謂之𤣥酒言其甚清皎潔也清酌者酌斟酌也此酒甚清可斟酌也薌合者穀秫者曰黍旣軟而相合氣息又香也薌萁者粱謂白粱黄粱萁語助也明粢者明白也言此祭祀明白稷粟也此等諸號若一祭並有則舉其大者牲牢酒齊而言不應諸事皆道故少牢禮稱敢用柔毛剛鬛嘉薦普淖是也或唯雞犬或唯魚兔及水酒韭鹽之祭則各舉其美號故士虞禮祝辭云尹祭也藍田吕氏曰祭宗廟之禮内則盡志外則盡物所謂盡物者盡其物之至美以薦之然後可以不歉於心鬼神其來享也故祝辭皆舉其美而言於物不敢不盡也禽獸之獻以肥腯為美魚腊鮮槀以得宜為美水與酒以潔清為美黍稷稻粱以馨香明潔為美韭以苗之盛為美鹽以味之厚為美玉以不瑕為美幣以可制為美察豕與羊視其鬛與毛豚或難察其鬛故直謂之肥腯也犬下牲可也以為羮而獻則犬之肥也凡煑肉胔謂之羮特牲禮云羮飪潁考叔食舎肉曰臣有母未當君之羮是也八者皆以肥腯為美也魚腊脯修雖微而必祭庶羞雖美而不祭故脯與槀魚鮮魚三者皆謂之祭舉其盛也脯謂之尹亦謂之修修有所正也醴酒皆有清有糟糟未泲者也既泲為清酒之精者也謂之酌黍稷食之正也稻粟雖美加食而已非其正也書曰黍稷非馨明德惟馨如黍稷之有馨香也黍可以為酒敦之則粘聚而不散可摶而食之故曰薌合既香既合則黍之美者也萁其也有所别也粱之薌與黍同其實與黍異又為加食故曰薌萁粱五榖之長也祭祀之飯謂之粢盛明者精鑿之稱也故曰明粢草去則苖䟽地美則本豐苖䟽則實必美故稻曰嘉䟽本豐則萌必盛故韭曰豐本長樂陳氏曰凡祭宗廟之禮鼎俎籩豆簠簋所薦必美其名者謂聖人襲祖先之遺芳體天地之大德作為政教以和隂陽用正性命萬物各遂其生享其豐厚不敢忘本是以祭祀之禮物美其名以昭盛德雞曰翰音者翰飛也其音飛而逺者雞必大也犬曰羮獻者犬膞則湆膏可以充鉶以為獻也粱曰薌萁者白粱黄粱非獨米之香烈可以充君薦神至於萁梗亦有芳薌也嘉𬞞者畦畛而種待水以生者皆曰𬞞而稻唯其善也量幣者制量幣帛以將其誠不敢過也不敢不及也山隂陸氏曰首孰非元牛曰一元迹孰非武牛曰大武雞鳴皆振羽是之謂翰音詩曰六月莎雞振羽謂之雞以此兔曰明視視月而死者也合言氣粢言實萁言榦𬞞言苖嚴陵方氏曰犬豕水畜也水至隂而柔故其鬛以剛為尚羊火畜也火至陽而剛故其毛以柔為尚鬛亦毛也豚非牲之正以助祭養者也豕言用豚之肥腯則羊亦用羔之肥腯可知經曰羔豚而祭翰則羽之健者也左氏傳曰雄雞自斷其尾憚其為犧則宗廟之用雞必以能鳴之雄者矣江陵項氏曰牛豕豚羊雞雉兔皆以其形聲之美者為號獨犬曰羮獻者其形聲不足言也羮之而獻其味耳薌合以其實之升於量者言薌萁以其稈之登於場者言嘉𬞞以其苖之植於地者言明粢以其飯之盛於器者言然古本無稷曰明粢一句或與黍同號耳顆大者言其實顆細者言其穗各取其盛者言之脯曰尹祭左朐右末横陳之也槀魚曰商祭槀者不盡佳必擇而用之也鮮魚曰脡祭濡魚進尾右鰭左腴陳之也廬陵胡氏曰古者葱韭皆曰本漢使云百本䪥五十本葱量度量天子死曰崩諸侯曰薨大夫曰卒士曰不禄庶人曰死在牀曰尸在棺曰柩鄭氏曰異其死名者為人䙝其無知若猶不同然也自上顛壞曰崩薨顛壞之聲卒終也不禄不終其禄死之言澌也精神澌盡也尸陳也柩之言究也孔氏曰自此至短折不禄一節論死後稱謂尊卑不同之事生時尊卑著見可識死隂為野土嫌若輕䙝故為制尊卑之名明其猶有貴賤之異也崩者譬若天形墜壓四海必覩王者登假率土咸知故曰崩薨者崩之餘聲聲逺劣於形壓諸侯之死知者亦狹也卒畢竟也大夫是有德之位仕能至此亦是畢了平生故曰卒也士禄以代耕而今遂死是不終其禄澌是消盡無餘之目庶人生無令譽死絶餘芳精氣一去身名俱盡故曰死今人猶有呼盡為澌者也人初生在地病困氣未絶之時下置於地冀脫死重生氣絶之後更還牀上既未殯斂陳列在牀故曰尸白虎通云失氣亡神形體獨陳是也三日不生斂之在棺死事究竟於此故曰柩藍田吕氏曰尊卑之死其名不可以無别敬之至也天子居崇髙之位如山如陵故曰崩詩云上冢崒崩卒終也君子曰終者全而歸之之義也大夫君子也故曰卒不禄傷其不幸之辭也至庶人則窮矣不可有異名曰死自諸侯至於士皆其臣民之稱者若諸侯之薨訃於他國則曰寡君不禄自卑之辭也書於他國之史則曰某侯某卒内外異辭也大夫死訃於同國他國之大夫士皆曰不禄訃於其君及他國之君同國之大夫士皆曰死亦尊卑内外異辭也尸者未大斂柩者已大斂之稱也故喪禮未殯奠于尸已殯奠于柩書名亦曰某之柩所以别也長樂劉氏曰如天之崩則萬物失其所覆也薨陷也如地之陷則一國失其所載也卒終也施德立義由此而終也禄所以崇道而育德而身既亡是不禄也死者澌也如冰之消而復為水如雲之盡而復為氣生而復死死而復生無窮已也人則亡矣其為徳猶存也故立等降以稱其靈則事亡猶事存也長樂陳氏曰書於堯舜禹湯曰殂曰落曰死曰没而已至周乃曰崩則崩薨卒之稱周制也大夫謂之卒而春秋外諸侯亦謂之卒者略於外故也士云不禄而禮諸侯薨訃於諸侯亦謂之不禄者嫌於外故也夫有始則有終此性命自然之理也君子曰終與卒同義一草木之槁曰死一禽獸之斃亦曰死小人曰死則與物同類而已廬陵胡氏曰春秋書天子諸侯大夫之死曰崩薨卒舜陟方乃死天子亦曰死羽鳥曰降四足曰漬死寇曰兵鄭氏曰降落也漬謂相瀐汙而死異於人也春秋傳曰大災者何大漬也死寇異於凡人當饗禄其後孔氏曰羽鳥飛翔之物今云降落是死也四足牛馬之屬若一个死則餘者更相染漬而死故曰漬此鳥獸死異名也死寇曰兵謂父祖死君之宼而子孫為名也兵器仗之名言其為器仗之用也故君恒禄恤其子孫春饗孤子是也藍田吕氏曰兵者死於寇難之稱也有兵死而可褒者如童汪踦能執干戈以衛社稷孔子欲勿殤勇於死難者也有兵死而可貶者如冢人凡死於兵者不入兆域戰陣無勇者也祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟鄭氏曰更設稱號尊神異於人也皇君也考成也言其德行之成也妣之言嫓也嫓於考也辟法也妻所取法也孔氏曰王父祖父也王母祖母也藍田吕氏曰宗廟祭祀尊而神之有君道焉故皆曰皇也君亦曰辟則臣之所取法也長樂陳氏曰詩曰皇皇后帝又曰皇王維辟天王祔而臣子加之以帝尊之與天同故也祖父死而子孫加之以皇夫死而妻加之以辟尊之與君同故也周官大祝所謂鬼號此也喪禮未卒哭則以生事之既卒哭則以鬼事之則其稱皇祖考皇祖妣以至曰妣曰嬪皆卒哭之禮也廬陵胡氏曰考成也成為神也生曰父曰母曰妻死曰考曰妣曰嬪壽考曰卒短折曰不禄鄭氏曰嬪婦人有法度者之稱也周禮九嬪掌婦學之法教九御婦德婦言婦容婦功曰卒曰不禄謂有德行任為大夫士而不為者老而死從大夫之稱少而死從士之稱孔氏曰父母妻生時所稱不言祖及夫者以生時無别稱也考妣嬪謂非祭時所稱也前言宗廟之祭加其尊稱故父母並曰皇也此生死異稱出爾雅文通而言之亦通也尚書云大傷厥考心又云聦聽祖考之彞訓詩云曰嬪于京周禮九嬪並非生死異稱矣横渠張氏曰妣者比也所以配先考之徳自非生者之稱故可以無嫌生日自不言妣妻死曰嬪夫死曰辟然於古不見有此稱若考則武王稱文考若嬪者嬪于虞又九嬪是婦人之美稱然此等之稱亦不特施之於祭祀而已長樂陳氏曰易曰有子考无咎書曰嬪于虞詩曰嬪于京則亦生謂之嬪也生曰父曰母曰妻親之也死曰考曰妣曰嬪敬之也生則主親死則主敬生而敬之以考妣嬪之稱亦不害其為親之也藍田吕氏曰壽考曰卒短折曰不禄與大夫曰卒士曰不禄之文異者彼論其爵此論其德也嚴陵方氏曰壽言數之有所延考言德之有所成蚤死謂之短中絶謂之折天子視不上於袷不下於帶國君綏視大夫衡視士視五歩凡視上於面則敖下於帶則憂傾則姦鄭氏曰袷交領也天子至尊臣視之目不過此綏讀為妥妥視謂視上於袷視國君彌髙也衡平也平視謂視面視大夫又彌髙也士視得旁遊目五歩之中也視大夫以上上下遊目不得旁也凡視敖則仰憂則低傾或為側辟頭旁視心不正也孔氏曰此一節論天子以下其臣視君尊卑有異之事袷謂朝祭服之曲領臣視天子過袷則慢供奉至尊須承候顔色又不得下過於帶國君諸侯也臣視君不得平看於面當視面下袷上也若大夫之臣視大夫平看其面也士之屬吏視之亦不得髙面下帶而得旁視左右五歩也凡視過髙則敖定十五年邾子執玉髙其容仰髙仰驕也視過下則似有憂定十五年魯公受玊其容俯卑俯替也傾欹側也若視尊者而欹側旁視流目東西則似有姦惡之意也庾氏曰國君綏視妥頽下之貌前執器以心為平故以下為妥此視以面為平故妥下於面則上於袷也横渠張氏曰視有髙下視髙則氣亢視下則心柔故上於面則敖下於帶則憂傾則姦學者當先去其容氣其為人剛行則終不肯進堂堂乎張也難與並為仁矣目者仁之所示見且心常存焉己之敬傲必見於視所以欲下其視者柔其心也柔其心則聽言敬且信藍田吕氏曰禮之所先貴乎别也不當别而别則文勝質文勝質則史當别而不别則質勝文質勝文則野故尊卑無等親䟽長幼無差視聽言動不中於節雖心在於敬而直情徑行野人戎狄之道君子不為也此視人之法自天子至於士所以異也執器有上衡平衡蓋奉者主於當心故以當心為衡視者主於視面故以視面為衡執器以髙為敬故卑者彌下視以下為敬故尊者彌下義各有所當也士相見禮凡與大人言始視面中視𫀆卒視面無改此衡視也大人即大夫若父則遊目母上於面母下於帶事親主愛察其色不純以敬故異於君也上於面者其氣驕知其不能以下人矣下於帶者其神奪知其憂在乎心矣視流則容側必有不正之心存於胷中矣此君子之所以謹也長樂劉氏曰臣之事君敬盡於心則五事罔有弗正然於視瞻苟無等降在禮為愆矣故視於天子諸侯大夫士各不同焉山隂陸氏曰不敢言視天子恭也上國君上大夫放此綏視以所視綏之逺近為節衡視以所視衡之逺近為節綏視遊目逺於祫矣衡視遊目又逺於綏矣直言士視五歩耳與上相備也然則天子國君大夫遊目亦不過此廬陵胡氏曰或云袷當腋縫或云當臂之處深衣云祫之髙下可以運肘君命大夫與士肄在官言官在府言府在庫言庫在朝言朝鄭氏曰肄習也君有命大夫則與士展習其事謂欲有所發為也官謂版圖文書之處府謂寳藏貨賄之處庫謂車馬兵甲之處朝謂君臣謀政事之處唯君命所在就展習之也孔氏曰自此至以禮一節論臣事君所在皆當謹習其事君命謂君有教命有所營為也言猶議也藍田吕氏曰先時豫慮思不出其位皆所以䖍君命也肄謂討論修飾潤色之也居是位也不敢以侵他事治是事也不敢以有他慮此所以志無所分政無不舉也長樂劉氏曰凡君有命將興作於大事也則大夫與士豫習其所冝以俟㫖任期不辱命也故在官者豫治其官言緝版圖文書以待興作也在府者豫治其府言考寳藏賄貨以待匪頒也在庫者豫治其庫言治車馬兵甲以待徵令也在朝者豫慮於朝言極其謨謀政要也經曰處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則孰慮而從之長樂陳氏曰官者聽治之所在府庫者財器之所藏朝者政事之所出周禮大府泉府玉府之屬皆言府特太府曰萬民之貢以充府庫蓋以藏其文書財物則謂之府以其貯車械則謂之庫故天文東壁為文府西奎為武庫此府與庫之辨也山隂陸氏曰言君使大夫訓習士也故其下文云在官言官在庫言庫即非君命大夫不與士習士亦不得從大夫習焉廬陵胡氏曰春秋傳曰臣以為肄業及之是也君凡命大夫士肄習所行之事各有其處不相凟亂官公家府凡府庫武庫朝朝廷講義曰君逸而臣勞故凡有事君則命之而已大夫與士則講習而為之也朝言不及犬馬輟朝而顧不有異事必有異慮故輟朝而顧君子謂之固在朝言禮問禮對以禮鄭氏曰言犬馬非公議也輟猶止也輟朝而顧心不正志不在君也固謂不達於禮也在朝言禮問禮對以禮謂於朝廷言無所不用禮孔氏曰朝是謀於政教之處不冝私䙝議及犬馬異事非常也臣於朝矜莊儼恪視不流目若忽止朝而回顧此非見異事則心有異慮也若無異事異慮忽止朝而顧君子謂此為固陋不達禮也藍田吕氏曰在朝而言犬馬慢也敬不在君也輟朝而他顧亦敬不在君也有異心存焉非所治者皆異事也非所謀者皆異慮也二者非姦則野也故君子謂之固固野陋也君子不逆人以姦也講義曰朝言不及犬馬之末謂無補於政者若夫修車馬之類則無嫌於朝言也山隂陸氏曰廐焚子退朝曰傷人乎不問馬退朝猶如此孔子在宗廟朝廷便便言唯謹爾是也若前言戲之耳施於朝廷則不可嚴陵方氏曰朝者人臣蚤見君之稱受朝之所必有廷故謂之朝廷所謂在朝則朝廷之朝也所謂輟朝特朝見之朝耳周官朝士禁慢朝錯立族談者朝之儀其言如此庸可以輟而顧乎廬陵胡氏曰不有異事必有異慮若衛太子蒯聵朝夫人太子三顧之類又陳成子驟顧諸朝長樂劉氏曰昔者周公思兼三王以施四事於天下也遂成周禮以輔成王用綏萬方以致刑錯者亦禮而已矣曰樂曰政曰刑焉者所以輔成六典莫非禮以為歸是以周公之治於朝廷者止用六典也故曰在朝所言莫非禮也在朝所問莫非禮也在朝所對亦莫非以禮也四明沈氏曰朝廷之上不言功名之大小則問官爵之崇卑利禄之厚薄此何等風俗哉今公卿大夫在朝之士所言者皆禮問者以是對者亦以是可見禮樂明於上風俗厚矣大饗不問卜不饒冨鄭氏曰祭五帝於明堂莫適卜也冨之言備也備而已勿多於禮也孔氏曰此大饗謂歳功緫卑緫祭五帝配以文武其神非一若一一問卜牲日恐吉凶不同緫一卜而已禮數有常不得豐饒使之過禮若祫之大饗則周禮宗伯享大鬼皆卜不得云不問卜故鄭知祭五帝於明堂與月令季秋大饗帝同也然雩緫祭五帝得毎帝問卜者以雩為百榖祈雨非一帝之功故每帝適卜也藍田吕氏曰大饗冬日至祀天夏日至祭地也因天地隂陽之至日月素定故不問卜至敬不壇埽地而祭牲用犢酌用陶匏席用藁秸視天下之物無以稱其德以少為貴焉故不饒冨記云饗帝于郊又曰聖人為能饗帝則祀天亦可稱饗均祀天地冬夏之日至為大故曰大饗若他饗則問卜如啓蟄而郊郊用辛之類及大宰祀五帝帥執事而卜日是也鄭氏謂大饗者祀五帝於明堂以緫饗五帝不知主何而卜故曰莫適卜也然季秋大饗既無素定之日如冬夏至之比又不問卜必以人謀而用之是以私䙝事上帝不敬莫大焉其説固不可取矣郊血大饗腥或為季秋大饗可也然不可一例求之蓋禮記之文本非一書雜収而得之言各有所當也長樂陳氏曰饗之禮有小大春秋之饗孤諸侯之饗聘卿與大夫之相饗非大饗也郊明堂之饗帝宗廟之饗先王王饗諸侯兩君相見然後謂之大饗先王之於帝也親之與祖考同故均謂之大饗其於賔也敬之與人鬼同故亦謂之饗饗賔之禮所乗則齊車所即則宗廟所用則祭器不蠲則除之凶服則禁之祼以鬱鬯尚以𤣥酒設以庭燎樂則肆夏牲則房烝故大司樂之大饗不入牲其他皆如祭祀春秋傳曰魯有禘樂賔祭用之則饗賔謂之大饗冝矣周官大宰祀五帝祀大神祗享先王皆前期十日而卜日又大宗伯凡祀大神享大鬼祭大祇帥執事而卜日春秋書卜郊卜牛而記曰君召牛納而視之擇其毛而卜之又曰明王祀天地之神明無非卜筮之用則祭祀無不用卜矣然則不問卜者特饗賔之禮也考之大射燕覲之禮前期有戒而已則饗不問卜可知饗禮几設而不倚爵盈而不飲殽乾而不得食凡以訓恭儉而已則不饒冨可知然則饗之為儀其他皆如祭祀之禮而不問卜者如祭祀饗日之事也不問卜前期之事也饗之備物至於昌歇形鹽莫不具焉謂之不饒冨者非不冨也不饒而已嚴陵方氏曰大饗經之所言者凡十有一而其别則有五徧祭五帝一也祫祭先王二也天子饗諸侯三也兩君相見四也凡饗賔客五也若月令季秋言大饗帝禮器郊特牲言大饗腥所謂徧祭五帝之大饗也禮器又言大饗其王事大饗之禮不足以大旅所謂祫祭先王之大饗也郊特牲又言大饗尚腵修所謂天子饗諸侯之大饗也郊特牲又言大饗君三重席而酢仲尼燕居言大饗有四坊記言大饗廢夫人之禮所謂兩君之大饗也雜記言大饗卷三牲之俎所謂凡饗賔客之大饗也此所言大饗不問卜即天子饗諸侯之大饗而已蓋先王之於祭祀無所不用卜在天者則卜日在人者則卜尸在物者則卜牲且謂以人交神幽明異道非致一以通之則或吉或凶無自而知矣若夫以人交人何卜之有天子饗諸侯不問卜則兩君相見之大饗與凡饗賔客之大饗從可知矣山隂陸氏曰問卜謂若嘗之日涖卜來歳之芟社之日涖卜來歳之稼石林葉氏曰季秋大饗於明堂牲也日也莫不卜之特言不問者恐瀆神也凡摯天子鬯諸侯圭卿羔大夫鴈士雉庶人之摯匹童子委摯而退野外軍中無摯以纓拾矢可也婦人之摯椇榛脯修棗栗鄭氏曰摯之言至也天子無客禮以鬯為摯者唯用告神童子委贄而退不與成人為禮也說者以匹為鶩野外軍中非為禮之處用時物相見而已纓馬繁纓婦人無外事見以羞物也椇榛木名椇枳也有實今邳郯之東食之榛實似栗而小孔氏曰鬯者釀黒黍為酒其氣芬芳調暢故因謂為鬯也天子弔臨適諸侯必舎其祖廟以鬯禮於廟神以表天子之至故鄭註鬯人亦然也諸侯謂公侯伯也公侯伯用圭子男則用璧以朝王及相朝聘表於至也不言璧略也羔小羊取其羣而不黨鴈取其候時而行飛有行列雉取其不可誘之以食撓之則死羔鴈生執雉則死持亦表見危致命也士摯冬雉夏腒也野鴨曰鳬家鴨曰鶩鶩不能飛騰如庶人但守耕稼而已童子見先生或尋朋友既未成人不敢與主人相授受拜伉之儀但奠委其摯於地而自退辟之然童子摯悉用束修故論語云自行束修以上謂童子也纓即馬鞅也拾射韝也矢猶箭也在軍在野無物故用此為摯不直云軍中而云野外者若軍在都邑冝依舊禮若非軍中而在野外亦申時物或纓或拾或矢隨所有也舉一隅耳土地無正幣則時物皆可也婦人惟初嫁有摯以見舅姑椇即今之白石李形如珊瑚味甜美脯搏肉無骨而曝之修取肉鍛治而加薑桂乾之如脯所以用此六物者椇訓法也榛訓至也脯始也修治也棗蚤也栗肅也婦人有法始至修身蚤起肅敬也故后夫人以下皆以棗栗為摯取其蚤起戰栗自正也知者案莊二十四年左傳云女摯榛栗棗修以告䖍是榛為䖍義又案昏禮婦見舅以棗栗見姑以腶修其榛椇所用無文藍田吕氏曰古者以禽為摯者執之以見其所尊敬之物也人道之大貴賤長少賢不肖之分不可亂也賤當事貴少當事長不肖當事賢事之必有養摯用禽者所以致其養也故膳夫之職以摯者見受而膳之司士掌擯士者膳其摯也孤執皮帛諸侯執圭璧孤與諸侯臣之貴者摯亦以禽則偪於下矣皮帛可制以為衣裘圭璧則寳貨因以比德焉所以異於諸臣而為之等也天子唯告於鬼神用鬯以為摯詩云秬鬯一卣告于文人是也宗伯以玉作六瑞以等邦國虞書輯五瑞此諸侯之摯獨云用圭者言其略也圭璧既受必反之貴德而賤貨也書云頒瑞于羣后是也宗伯以禽作六摯以等諸臣虞書亦云三帛二生一死贄此孤卿大夫士庶人之摯也羔鴈雉鶩雖皆可膳之物然先王因之以寓其義也羔羊羣而不黨故卿執之委蛇委蛇退食自公羔羊之義也鴈飛翔有列徃來有時故大夫執之陳力就列道合則從不可則去鴈之義也羔鴈以生者卿大夫以道去就不若士死以服事也士執雉者耿介不回以死服事者也長樂陳氏曰禮云無辭不相接也無禮不相見也欲民之無相䙝也又云君子於其所尊不敢質也故貴至於邦君賤至於庶人以至婦人童子相見不依摯不足以為禮贄而不稱德不足以為義此玊帛禽鳥榛栗棗修之用所以不一也儀禮士于士無辭贄有還贄大夫于士無還贄終辭贄君于其臣則受之于外臣則使擯還之大夫于嘗為臣者亦然士贄授受於庭貴者授受於堂大夫士於君壻於舅則奠贄士嘗臣於大夫亦奠贄童子於所奠則委贄此禮之殺也周官膳夫祭祀致福者受而膳之以贄見者亦如之則受之所以納其德也膳之所以用其德也然膳夫之所以膳者特禽鳥而已若玉帛則非膳夫之所受也聘禮賔見主君以圭璋不以贄訝者訝賔亦不以贄及賔即館訝將公命乃見之以其贄賔既將公事復見訝以其贄又曰天子無客禮於天下而有贄禮於鬼神禮記凡摯天子鬯周禮鬯人凡王弔臨共介鬯則天子之鬯以介致之而已天子宗廟之灌以圭瓉廵守之灌以大璋中璋邊璋則贄鬯之器蓋圭璋也天子之贄不特鬯耳其執鎮圭以朝日猶諸侯執圭璧以朝君皆贄瑞也曲禮曰飾羔鴈者以繢士相見禮下大夫相見以鴈飾之以布上大夫相見以羔飾之以布先儒謂飾以繢天子之卿大夫也飾以布諸侯之卿大夫也昔魯侯㑹晉師于瓦范宣子執羔趙簡子中行文子皆執鴈魯於是始尚羔蓋魯禮之失至此乃復正也士相見之禮冬用雉夏用腒雉不飾以布以士卑也不維以索以用死也用死與士死制同意用腒與夏行腒䐹同意周禮庶人執鶩工商執雞禮記言庶人匹鄭氏曰匹當為鶩然鶩之為物有馴擾而無散遷其謂之匹可也士相見禮庶人見於君不為容進退走孟子曰庶人不傳贄為臣則庶人見君無贄矣鶩之為贄特施於下其君者也工商亦然昔闕黨童子將命孔子譏之以欲速成范匄謀晉軍文子責之以何知蓋童子之禮衣不裘屨不絇服不緦聽事不麻立則在北坐則在隅見先生則從之而不並有事走而不趨及冠然後奠贄於君遂以贄見於郷大夫郷先生是未冠不預乎禮也然或賢與多聞不可不進以成人之事故又有童子之贄焉其制與成人同所以優其德其委與成人異所以卑其年周官掌客在野在外殺禮君子之為禮不以在野在軍而或廢亦不以物不足而求備故以纓拾矢各適其冝而已然不若備物之為善故曰以纓拾矢可也昏禮婦見舅姑執笲棗栗蓋棗取其赤心榛栗堅實脯修取其正治士昏禮不言椇榛特牲少牢大夫士之祭亦棗栗而已特籩人有棗栗又有榛實蓋具椇榛棗栗者盛禮也禮書山隂陸氏曰詩曰決拾既佽決以鈎弦拾以遂之石林葉氏曰玉有璧有圭圭則銳而象天用璧則圎而象天體子男亦君人者也有君之體而不足於用故執璧公侯則德位盛大非不足於用也故執圭獨言圭而不及璧者以諸侯不嫌於無體也羔鴈則物而已矣不可以無飾故飾之以繢布布言其道有以被人而繢言居位之有文章也雉則文明之物故無所用飾庶人質野則無所事於文也童子則始學者也束修以見師長委摯而退野外軍中無摯則無所行也纓拾矢而相見不為之簡委之而退辟與成人為禮也不為之簡禮以趨時為大也若夫婦人則其道主於事人其職專於中饋故摯以椇榛脯修棗栗椇榛取其循法度以至於禮也脯修取其治已齊家以治正也棗栗取其夙夜在公而肅謹也講義曰傳曰男摯大者玊帛小者禽鳥以章物也女摯不過榛栗棗修以告䖍也唯以章物故男摯有等差唯以告䖍故婦人之贄則一而已納女於天子曰備百姓於國君曰備酒漿於大夫曰備埽灑鄭氏曰納女致女也女家遣人致之此其辭也姓之言生也天子皇后以下百二十人廣子姓也酒漿埽灑賤婦人之職孔氏曰壻不親迎則女之家三月廟見使人致之言致此女備王之后妃以下生廣子姓故云百姓也致女於諸侯為辭轉卑詩云唯酒食是議是也埽灑不敢同諸侯彌賤也唯及大夫不及士士卑故也藍田吕氏曰納女之辭女氏昏辭也不敢以伉儷自期備妾媵之數而已自卑之義也古者因生以賜姓如姬姜嬴妘姞之類似皆因其母之號以賜之姓亦以子謂之子姓凡賜姓者皆天子之别子其族貴盛堯典所謂平章百姓郊特牲云大廟之命戒百姓是也皆所以廣繼嗣此納女於天子所以謂之備百姓也周官酒人漿人之屬有女酒三十人女漿十有五人吕公納女於髙祖曰臣有息女願為箕帚妾古之遺語也嚴陵方氏曰酒漿者奉祭祀之物不如是不足以配國君故曰備酒漿埽灑者有家之事不如是不足以配大夫故曰備埽灑凡此皆主人之謙辭耳故每言備焉備者所以備其乏也馬氏曰納女者嫁女之家謙辭也備百姓者以嗣續為重備酒漿者以祭祀為重備埽灑者以賔客為重山隂陸氏曰備百姓則百斯男太姒之事也曰備酒漿諸侯冝有禮樂之事焉曰備埽灑下於夫人有事人之道而已若殷其雷能勸其夫以義汝墳能勉其君子以正被文王之化加於人一等矣長樂陳氏曰傳曰凡公女嫁於敵國姊妹則上卿送之公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行於小國則上大夫送之故晉叔向逆女于楚而薳啓疆曰上卿上大夫致之則送女謂之致女也納女而不及士何也儀禮凡女行於大夫以上曰嫁於士曰適人嫁者有家之辭適人則適於人而已此所以略而不言廬陵胡氏曰鄭云壻不親迎則女家遣人致辭故其辭云云竊意不然詩文王親迎春秋不親迎則譏之古未有壻不親迎之禮禮記集説卷十四
