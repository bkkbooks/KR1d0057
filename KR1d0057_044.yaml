body:
  text: 禮記集說卷四十四宋衛湜撰乃命有司申嚴百刑斬殺必當毋或枉橈枉橈不當反受其殃鄭氏曰申重也當謂值其罪孔氏曰枉謂違法曲斷橈謂有理不申應重乃輕應輕更重是其不當也嚴陵方氏曰孟秋既命嚴斷刑矣至此又命之故曰申嚴焉與堯典言申命同義且酉為隂中物既告成先王奉天故其所命止於是月也刑有五而曰百刑者據罪言之也傳曰罪多而刑五非謂是乎必曰百則據成數言之與百禮百事同義斬者則必殺殺者不必斬斬殺必當慮其及於無辜也然刑之所加不止於斬殺所命止及於此者以大辟尤人所重故也枉則在上者不直橈則在下者不申使斬殺不當則以或枉橈故也先王奉天如此而有司或枉橈焉是逆天也逆天則天災適當之也孟子言出乎爾者反乎爾者同義是月也乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗鄭氏曰於鳥獸肥充之時冝省羣牲也宰祝大宰大祀主祭祀之官也養牛羊曰芻犬豕曰豢五者謂所視也所案也所瞻也所察也所量也此皆得其正則上帝饗之上帝饗之而無神不饗也孔氏曰視全具亦宰祝所視也純色曰犧體完曰全食草曰芻食榖曰豢皆案行之也充人云祀五帝繫於牢芻之三月是牛羊曰芻樂記云豢豕為酒槀人云掌豢祭祀之犬是犬豕曰豢瞻亦視也肥充也瘠瘦也物色騂黝之别也周禮陽祀用騂隂祀用黝望祀各以其方之色也已行故事曰比品物相隨曰類五方本異其色是比也大皥配東亦用青是其類也大謂牛羊豕成牲者小謂羔豚之屬長短者謂天地之牛角繭栗宗廟之牛角握之屬也上帝天也嚴陵方氏曰宰以宰牲為事者祝以祝神為事者宰牲將以祝神也故循行犧牲必命是二官焉夫季夏之養犧牲蓋授充人而芻之也至此命宰祝特循行之而己以物至此形成而不變故也犧牲已見仲春解全者純而不雜具者完而無傷若外祭毁事用駹非所謂全也若鼷鼠食郊牛角非所謂具也芻者豢之物豢者芻之事芻豢所以阜蕃其牲春秋傳曰奉牲以告曰博碩肥腯其可以不視乎牧人曰陽祀用騂牲毛之隂祀用黝牲毛之則物色其可以不察而比類之乎物色者毛物之色比類者各比其隂陽之類也山隂陸氏曰五者備當謂所行所案所察所量所視視全具瞻肥瘠必比類猶言皆中度係上事言之蓋於循行犧牲言視全具於案芻豢言瞻肥瘠於察物色言必比類亦各其所也講義曰五者備具而當制度至其祭祀之時加至誠而行之以禮上帝其有不饗者乎天子乃難以達秋氣鄭氏曰此難難陽氣也陽暑至此不衰害亦將及人所以及人者陽氣左行此月宿直昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行於是亦命方相氏帥百𨽻而難之王居明堂禮曰仲秋九門磔攘以發陳氣禦上疾疫孔氏曰天左旋星辰與斗建循天而行此月斗建在酉酉是昴畢本位故鄭云宿直昴畢其昴畢之星於時在寅也明堂禮云發陳氣者秋時涼氣新至發去陽之陳氣也明堂禮磔攘則此亦然文不備耳季冬云大難明九門磔攘稱大則貴賤皆為也季春云國難熊氏云唯天子諸侯有國為難此云天子乃難唯天子得難以其難陽氣陽是君象則諸侯以下不得難陽氣也案隂氣陽氣至大陵俱致積尸疫氣十一月陽氣至於危虛而不難十二月隂氣至於虛危而為難者以十一月陽氣初起未能與隂相競故無疫疾可難六月宿直栁鬼隂氣至微隂始動未能與陽相競故無疾害可難也季冬亦陽初起而為難者以隂氣在虛危又是一嵗之終總除疫氣故為難也其磔攘之牲案小司徒職云小祭祝奉牛牲又牧人云凡毁事用尨可也是則用牛也羊人云凡沈辜侯禳共其牲犬人云凡幾珥沈辜用尨可也雞人云面禳共其雞牲是則用羊用犬用雞也蓋大難用牛其餘雜禳大者用羊用犬小者用雞也以犬嘗麻先薦寢廟鄭氏曰麻始熟也嚴陵方氏曰以犬嘗麻見孟夏以彘嘗麥解先薦寢廟見仲春解是月也可以築城郭建都邑穿竇窖修囷倉鄭氏曰為民將入物當藏也穿竇窖者入地惰曰竇方曰窖王居明堂禮曰仲秋命庶民畢入於室曰時殺將至毋罹其災孔氏曰惰者似方非方似圎非圎也毋罹其災者謂此時民當入室毋在田野罹被其災也此時仲秋耘鋤既了乘時入室以避隂災未盡成熟須出野收斂至十月之後又入室避寒豳詩云入此室處是也嚴陵方氏曰城郭見王制解都邑見祭法解竇窖皆以穴土藏物故曰穿囷倉則榖藏尤不可壞故曰修凡此皆斂藏之事故於建酉闔户之月言之山隂陸氏曰藏而留穴謂之竇竇出於一孔窖盡藏之也乃命有司趣民收斂務畜菜多積聚鄭氏曰始為禦冬之備嚴陵方氏曰趣民則急趣之也孟秋言命百官始收斂以其物初成至此則物既成而收斂不可緩也故趣之焉詩言我有㫖蓄亦以御冬則又不特菜而已乃勸種麥毋或失時其有失時行罪無疑鄭氏曰麥者接絶續乏之榖尤重之孔氏曰前年秋榖至夏絶盡後年秋榖夏時未登是其絶也夏時人民糧食闕短是其乏也麥乃夏時而熟是接其絶續其乏也黍稷百榖不云勸動於麥獨勸之是尤重故也嚴陵方氏曰麥以秋稼至夏乃穡其來久矣以其牟利之遲慮民惰而不種也故特勸之焉其有失時行罪無疑者所以重農時而戒不昏也亦見孟冬行罪無赦解是月也日夜分雷始收聲蟄蟲壞户殺氣浸盛陽氣日衰水始涸鄭氏曰又記時候也雷始收聲在地中動內物也壞益也蟄蟲益户謂稍小之也涸竭也此甫八月中雨氣未止而云水竭非也周語曰辰角見而雨畢天根見而水涸又曰雨畢而除道水涸而成梁辰角見九月本也天根見九月末也王居明堂禮曰季秋除道致梁以利農也孔氏曰雷是陽氣主於動不唯地中潛伏而已至十一月一陽初生震下坤上復卦用事震為動坤為地是動於地下從此月為始故鄭云動內物也戶為穴也蟄蟲以土增益穴之四旁使通明處稍小所以然者隂氣將至時氣尚溫猶須出入故壞之稍小十月寒甚乃閉之也周語注云辰角大辰蒼龍之角角星名見者朝見東方天根亢氐之間寒露雨畢之後五日天根朝見嚴陵方氏曰雷始收聲見仲春雷乃發聲解壞戶者以土益之蓋闔戶之謂也與壞垣牆之壞同義殺氣浸盛者言隂之夷物至此而酷也陽氣日衰者以陽盛於夏故至此而衰也隂主殺陽主生浸言若水之浸日言與日加益也日夜分則同度量平權衡正鈞石角斗甬鄭氏孔氏說見仲春嚴陵方氏曰鈞蓋三十斤之稱與仲春所謂鈞者異矣彼特言輕重之鈞而已彼以用言此以體言故也石蓋四鈞之稱以其尤重而內實故謂之石權衡皆以致平而已故曰平鈞石則歸於正矣故曰正然仲春所言不同者則又各有義焉是月也易關市來啇旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂凡舉大事毋逆大數必順其時慎因其類鄭氏曰易關市謂輕其稅使民利之啇旅賈客也匱亦乏也遂猶成也大事謂興土功合諸侯舉兵衆也季夏禁之孟秋始征伐此月築城郭季秋教田獵是以於中為之戒焉孔氏曰關市之處輕其賦稅不為節礙是易關市也關市既易則啇旅自來啇旅既來則貨賄自入以此便利民人之事四方總來聚集逺鄉於是皆至貨賄既多則庫財不匱上下豐足百事皆成於此興舉其事無逆天之大數必須順其隂陽之時謹慎因其事類不可煩亂妄為嚴陵方氏曰入以為利者商也行而從人者旅也易關市所以來商旅而已來商旅故貨賄可得而納也夫貨賄以時而納之待時而出之更為出納各從其便故曰以便民事四方散而不一故言來集逺鄉邈而在外故言皆至四方來集逺鄉皆至則貢賦之職修矣此財所以不匱也財蓋貨賄之總名匱竭也夫財所以待用用所以作事故繼言上無乏用百事乃遂遂言遂其志之所欲為也大傳曰財用足故百志成正謂是矣聚之至於無窮散之復歸於無物者數也凡物有數者皆出陽而入隂則所謂大數者不過隂陽之出入而已事之作止豈能逃此哉故人君之舉大事不可逆也數之所運而為時時之所從而為類必順其時言順隂陽之時而無違也慎因其類言因隂陽之類而無變也時方來也故欲無違類有守也故欲無變然順之而或苟則失其時故於順曰必因之而或妄則非其類故於因曰慎舉事如此四時之所同然特以當闔户之時尤不冝妄舉故申戒之於此也馬氏曰古者頒貨於受藏之府頒賄於受用之府蓋利之開闔斂散必以節故以時納之然後可以待時頒也城郭宫室百官有司弊帛饔飱於是取具焉故上無乏用百事乃遂凡舉大事無逆大數必順其時慎因其類則凡所以開物成務冒天下之道以成變化者無非數也數運而為時隂陽麗焉貫而為類萬物歸焉舉大事而順其時以行之因其類以守之則所謂毋逆大數也若夫數之所不能載則非事也有道行焉仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起收雷先行草木蚤死鄭氏曰秋雨不降卯之氣乘之也卯宿直房心心為大火草木生榮應陽動也國有恐以火訛相驚也國旱蟲不蟄榖復生午之氣乘之也風災數起子之氣乘之也北風殺物收雷先行先猶蚤也冬主閉藏草木蚤死寒氣盛也孔氏曰秋雨不降天災草木生榮地災國乃有恐人災鄭注卯宿直房心心為大火者謂仲秋應雨之時今行春令位當卯致大火之氣火是積陽故時雨不降也火訛相驚以仲秋致仲春火氣故有火但仲秋為金仲春為木金能尅木又仲秋雨水水又尅火火竟不能為害但以訛僞言語相驚也其國乃旱天災也蟄蟲不藏五榖復生地災也風災數起收雷先行天災也草木蚤死地災也嚴陵方氏曰春雨所以生物秋雨所以成物曰秋雨不降則雨非不降也特所降者非成物之雨爾以其如此故草木生榮而不枯死也國乃有恐則少陽之所動故也其國乃旱則陽亢故也蟄蟲不藏則隂欲執之而有所不勝故也五榖復生則盛陽作之故也風災數起則非以時動故也雷以陽中發聲隂中收聲收雷先行則愆於陽故也雷風不節故草木蚤死季秋之月日在房昏虛中旦栁中鄭氏曰季秋者日月㑹於大火而斗建戍之辰也孔氏曰三統厯九月節日在氐五度昏虛二度中去日九十七度旦張初度中九月中日在房五度昏危三度中去日九十三度旦張十八度中元嘉厯九月節日在亢一度昏牛八度中旦井二十九度中九月中日在氐七度昏女十一度中旦栁十一度中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中無射鄭氏曰無射者夾鍾之所生三分去一律長四寸六千五百六十一分寸之六千五百二十四季秋氣至則無射之律應周語曰無射所以宣布哲人之令德示小民軌儀孔氏曰案夾鍾之律長七寸二千一百八十七分寸之千七十五下生者三分去一今夾鍾七寸取六寸三分去一有四寸在夾鍾以一寸為二千一百八十七分今更三分之則一寸者分為六千五百六十一分夾鍾二千一百八十七分寸之千七十五者又三分之則為三千二百二十五其夾鍾整寸有六千五百六十一又以三千二百二十五益之總為九千七百八十六分三分去一則去三千二百六十二餘有六千五百二十四在故云無射律長四寸六千五百六十一分寸之六千五百二十四周語注云乾上九用事無射陽氣上升隂氣收藏萬物無射者也哲人后稷布其德教示以法儀當及時銍穫而收藏之諸家說見孟春其數九其味辛其臭腥其祀門祭先肝鴻鴈來賔爵入大水為蛤鞠有黃華豺乃祭獸戮禽鄭氏曰來賔言其客止未去也大水海也戮猶殺也皆記時候也孔氏曰國語云雀入於海為蛤故知大水是海也禽獸皆殺之但殺獸而又陳戮禽則殺之而已不以為祭也此亦互文禽獸初得皆殺而祭之後得者殺而不祭也嚴陵方氏曰鴻鴈來賔見孟春鴻鴈來解爵入大水為蛤見仲春鷹化為鳩解桃華於仲春桐華於季春皆不言有獨於鞠言之者以萬物皆華於陽獨鞠華於隂而已故特言有春秋傳曰有者不冝有也桃華之紅桐華之白皆不言其色獨鞠言其色而曰黃者以華於隂中其色正應隂之盛故也豺乃祭獸戮禽者祭獸於天然後戮禽而食也然於祭曰獸於戮曰禽何也蓋豺之於物凡可禽而獲者皆戮之所祭之獸唯可狩而獲者爾以其特大故也亦見孟春獺祭魚解山隂陸氏曰來賔言其寓中國如客也言黃華以黃為美華又訓黃以此玉藻曰大夫𤣥華祭言獸以大者祭也詩曰言私其豵獻豜於公有是哉天子居總章右個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器廉以深鄭氏曰總章右個西堂北偏是月也申嚴號令命百官貴賤無不務內以㑹天地之藏無有宣出鄭氏曰申重也內謂收斂入之也㑹猶聚也孔氏曰於此月之時敕命百官貴之與賤無有一人不務內收斂其物順天地以深閉藏也物皆收斂時又閉藏無得有宣露出散其物以逆時氣嚴陵方氏曰號令見季春監工日號解號令未嘗不嚴特以天地嚴凝之氣盛於西北故奉時氣以申之爾夫藏冬事也內以㑹之則存乎秋不先㑹於秋則冬無所藏也季春言不可以內季秋言無不務內季春言發倉廪季秋言無有宣出皆所以順隂陽之理而已馬氏曰號不一令不再必申嚴焉則天地方肅欲其聽命者悉也山隂陸氏曰言命百官偏命也言百官又言貴賤尤詳言之講義曰順時之令使所務者在內而不在外所以㑹天地之氣而藏之使無宣布而出見也乃命冢宰農事備收舉五榖之要藏帝藉之收於神倉祗敬必飭鄭氏曰備猶盡也舉五榖之要定其租稅之籍也帝藉所耕千畝也藏祭祀之榖為神倉重粢盛之委也祗亦敬也孔氏曰帝藉者供上帝之藉田也藉借也借民力所治之田也祭義云天子為藉千畝以其供神之物故曰神倉於此神倉之中當須敬而復敬必使飭正嚴陵方氏曰仲秋言趣民收斂然猶未備也至此始言備收焉農事備收然後五榖之要可舉也要為多少之總數猶宰夫之治要司曽之月要歟舉之將以制國用故也然豳詩言十月穫稻而此乃言備收者以地氣有早晚故也然此皆命之於冢宰者以國用制於冢宰而甸師之掌耕耨王藉又𨽻於天官故也馬氏曰祗敬必飭則以供粢盛敬神故也敬在內祗則敬之在外見者也言內盡志外盡力也是月也霜始降則百工休鄭氏曰寒而膠漆之作不堅好也嚴陵方氏曰雨露生物霜成物季秋則成物之功極矣百工興事造業以具人器亦有成物之功焉天地既成人功其可以不休乎季春言百工咸理蓋創始之時也孟冬言工師效功蓋成終之時也將效功於孟冬矣休之於季秋不亦冝乎然古者於霜降固有所不休者若弓人冬析幹寒奠體之類是也經之所言亦其大致然爾乃命有司曰寒氣總至民力不堪其皆入室鄭氏曰總猶猥卒也嚴陵方氏曰陽氣散而成暑隂氣聚而成寒總者聚也故曰寒氣總至與仲春所言文雖小異其義一也以寒氣之至則民力或有所不堪勝故命之皆入室以禦之焉詩曰入此室處書言厥民隩謂是矣然寒氣者冬之時入室者冬之事此乃言之於季秋者亦先期而命之爾於夏處臺榭至此言入室亦順隂陽之理也上丁命樂正入學習吹是月也大饗帝嘗犧牲告備於天子鄭氏曰入學習吹為將饗帝也春夏重舞秋冬重吹也言大饗者遍祭五帝也曲禮曰大饗不問卜謂此也嘗者謂嘗羣神也天子親嘗帝使有司祭於羣神禮畢而告備焉孔氏曰習舞吹必用丁者取其丁壯成就之義欲使學者藝業成故也若祭一帝則禮器謂之饗帝今云大饗故知遍祭五帝也此大饗與帝連文故謂祭天禮器大饗其王事與彼下云三牲魚臘九州之美味是四方助祭之物故以大饗為祫也與此不同曲禮大饗不云帝此云帝不云不問卜恐是别事諸儒多以為疑故鄭斷云謂此也鄭必知非祫祭者以周禮祀大神饗大鬼帥執事而卜日若祫祭不得云不問卜也此既五帝皆饗莫適卜可從故知不問卜謂此也此犧牲之文繼饗帝之下知非饗帝之時使有司展視犧牲告其備具而云嘗謂嘗羣神者以四月雩上帝之後云雩祀百辟卿士是雩帝之外别雩群神也以經云告備於天子故鄭知是有司祭於群神也經云饗帝鄭注云天子親嘗者嘗是秋祭之名因經有嘗犧牲之文雖天子亦曰嘗以秋物新成故也嚴陵方氏曰習吹己見孟春習舞解大饗帝己見仲夏大雩帝解嘗者宗廟之秋祭特以秋祭之犧牲告備於天子則以物成可嘗之時尤所重故也嘗如此則大饗從可知矣且仲秋之月視全具矣至此乃告備於天子冝也然周之嘗以仲月而此言之於季月者彼取時之中此取時之盛而已馬氏曰自出乎震以至於說乎兊帝之成萬物之功備矣故以其物饗焉豐年所謂秋報也金華應氏曰春祈榖夏大雩秋大饗皆主於為民故噫嘻之詩以春夏皆為祈榖於上帝而秋大饗與冬圜丘則皆致其報故豐年以為秋冬報也事天莫重於圜丘而此不載焉特云祈來年於天宗而已要之三時未嘗無祭而冬日至之郊尤為報本反始之重禮所謂大報天而主日也大報天則以日為主所謂祈於天宗而日者固天宗之長豈即此乎鄭氏獨以祈榖為天而大雩大饗皆為五帝豈以祭之頻而近於瀆乎昊天曰明及爾出王昊天曰旦及爾游衍程子言人子不可一日不見父母人君不可一時不見天固非慮其頻且瀆也山隂陸氏曰此與孟春命樂正入學習舞相備也相備而習舞言於孟習吹言於季亦言之法然則孟春蓋亦習吹仲秋蓋亦習舞釋菜而經不言上下比義從可知矣大饗帝嘗大飲蒸嘗嘗新榖而已蒸進衆物焉故季秋大饗明嘗嘗新榖亦謂之嘗十月農工畢天子諸侯與其羣臣飲酒於大學進衆物焉亦謂之蒸言犧牲告於天子則鼎俎告潔粢盛告豐之類可知合諸侯制百縣為來嵗受朔日與諸侯所稅於民輕重之法貢職之數以逺近土地所冝為度以給郊廟之事無有所私鄭氏曰秦以建亥之月為嵗首於是嵗終使諸侯及鄉遂之官受此法焉合諸侯制者定其國家宫室車旗衣服禮儀也諸侯言合制百縣言受朔日互文也貢職所入天子凡周之法以正月和之正嵗而縣於象魏孔氏曰秦十月為嵗首此月嵗之終故合此諸侯之法制又命百縣為來嵗受朔日之政令并授諸侯所稅於民輕重之法貢職之數諸侯謂畿外國百縣謂鄉遂鄭注互文者言諸侯亦受朔日百縣亦合制也稅於民者是積貯本國貢職之數者是輸納天子言與者兼事之辭其定稅輕重入貢多少皆以去京逺近之差土地所冝之物為節度無有所私者言既給郊廟重事其百縣等物無得有所偏私不如法制也嚴陵方氏曰合則合而同之制則制而裁之謂合制其事也必合制其事者為待來年受朔日之政令故也周官正月之吉始和布治於邦國都鄙正謂是矣其所異者彼以子月為正爾朔日蓋元日也為來嵗受朔日於此言之者據建亥之正也且合言自內以合外制言自上以制下諸侯有君道則為內外之辨而已故曰合百縣全乎臣乃有上下之别焉故曰致然通而言之其實一也輕重之法則諸侯所取乎下者也貢職之數則諸侯所共乎上者也所貢之物各有職故謂之貢職法所以定數數所以成法上言法下言數互相備也以逺近土地所冝為度者或以逺近所冝之事為度或以土地所冝之物為度也若周官男服貢器物衛服貢財物之類而王氏謂以詳責近以略責逺者蓋逺近所冝也以度所冝而制其法故曰為度焉以給郊廟之事無有所私者言以事神為主非以私之於己也大宰以九貢致邦國之用而一曰祀貢則其所主可知矣百縣見仲夏解馬氏曰陽終於戍嵗功成焉故於厯以自戍至戍為嵗終戍之月而來嵗受朔日終則有始故也山隂陸氏曰百縣內也諸侯外也皆合而制之諸侯言合百縣言制亦言之法金華應氏曰稅取於秋而貢集於春年之上下所以出斂法不於是而亟頒之則諸侯之取於民者無制禮之厚薄以年之上下不於是而早定之則諸侯之貢於上者無準故於季秋頒之而俾入貢於春焉則侯國無苛征王朝無過斂然其稅之有輕重即王制所謂用地小大視年之豐耗也以逺近土地所冝為度與郊特牲之旅幣無方所以節逺邇之期而别土地之冝者其便於民則一而已是月也天子乃教於田獵以習五戎班馬政鄭氏曰教於田獵因田獵之禮教民以戰法也五戎謂五兵弓矢殳矛戈㦸也馬政謂齊其色度其力使同乘也校人職曰凡軍事物馬而頒之孔氏曰於此隂殺之時乃教人以戰法於田獵之事令民習用五種兵器知五戎是五兵者以别云班馬政則五戎非馬也下文云七騶咸駕則知五戎非五戎車也且車不須更習故知五戎謂五兵也案周禮司兵掌五兵鄭注云戈殳㦸酋矛夷矛後鄭又注云步卒之五兵則無夷矛而有弓矢如此則此注據步卒五兵弓矢一也殳長丈二二也矛長二丈三也戈長六尺四寸四也㦸長一丈六寸五也此隨便而言不依周禮長短之次也班馬政者謂班布乘馬之政冷校人職注云物馬齊其力戎事以力為主耳亦須齊色故詩云駟騵彭彭是齊色也長樂陳氏曰周官司兵軍事㑹同建車之五兵則兵有車之五兵有步之五兵然夷矛雖不施於步而弓矢未嘗不設於車故兵車射者人處左御者處中戎右處右則車上固有弓矢矣廬人攻國之兵欲短守國之兵欲長則攻國不以夷矛守國不以殳酋矛也司馬法弓矢圍殳矛守戈㦸助者蓋以殳對矛則殳可以攻矛可以守以弓矢對殳矛則殳矛可以守弓矢可以攻也若夫戈㦸則為之助而已五兵之用長以衛短短以救長則人持其一矣盾則夫人而有之書曰比爾干干欲其比則夫人有之可知也然五兵之所以便於用者戈而已其柲短而易持其胡援廣而易入可以樁可以斬可以擊可以鉤觀富父終甥以戈樁僑如之喉狼曋以戈斬秦囚子南以戈擊子晳長魚矯以戈殺駒伯則戈之於用可知矣禮書嚴陵方氏曰教於田獵繼言以習五戎與車攻言因田獵而選車徒同意上言教下言習者我教之故彼習之也戎器必以五者則以兵法五人為伍故也田獵所以得利軍旅所以效死人之所欲莫甚於利所惡莫甚於死以所惡寓所欲而習焉亦先王之深意也大司馬秋獮教治兵其以是歟馬氏曰仲夏之班馬政則其政以馬為主季秋之班馬政則其政以御為主故命僕及七騶咸駕命僕及七騶咸駕載旌旐授車以級整設於屏外司徒搢撲北面誓之鄭氏曰僕戎僕及御夫也七騶謂趣馬主為諸官駕說者也既駕之又為之載旌旗司馬職曰仲秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟是也級等次也整正列也設陳也屏所田之地門外之蔽司徒搢撲誓衆以軍法也孔氏曰前既班馬政乃命戎僕御夫及七騶等皆以馬駕車又載旌旐既畢授此七戎之車以其尊卑等級正其行列設於軍門屏之外東西廂以為行陳於是司徒在兩行之閒北面誓之也案周禮戎僕掌馭戎車故知僕是戎僕也又周禮馭夫掌馭從車使車注云從車戎路田路之副也使車驅逆之車故知及馭夫也又周禮趣馬職云掌駕說之頒頒謂第次也是貴賤等列故云為諸官駕說也七騶者天子馬有六種種别有騶則六騶也又有總主之人并六騶為七載旌旐者雜舉以言之案周禮司常云日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌及國之大閲贊司馬班旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌此是仲冬大閲所建旌旗各象治民之事空習其事鄭引司馬職此是仲秋治兵實出軍之事也司徒地官掌邦教誓者也故司徒職云施十有二教八曰以誓教恤則民不怠司馬職云遂以搜田有司表貉誓民鄭云有司大司徒也掌大田役治徒庶之政令誓民誓以犯田法之罰也誓曰無干車無自後射案於經注則司徒主誓今田獵出軍亦於所獵之地而搢撲北面誓之也搢插也軍法之誓有異田獵之誓則云無於車如搜田之法也今此大閲之誓以依軍法故司馬仲冬大閲云羣吏聽誓於陳前斬牲以左右徇陳曰不用命者斬之鄭注云凡誓之大略甘誓湯誓之屬是也然鄭注司馬仲冬大閲引此九月春秋之令將為大閲之誓而云作月令者說季秋之政於周為仲冬失之矣而今在此不非之者緣己非於彼不復重言於此也嚴陵方氏曰僕主車騶主馬駕謂以輈駕馬將以有行故也旌旐載之所以為表識也然周官司常贊司馬頒旗物自王建大常而下其數有九此止言二物者舉其略爾與車攻言建旐設旄同意以戎事言之則以革車為正倅車為副以田事言之則以木車為正佐車為副莫不各有等焉故授之以級也整設蓋指車馬之屬也掌次言師田則張幕以有幕次故亦有屏焉整設於屏外則王雖在野亦莫不有內外之辨故也撲謂夏楚也司徒教官而用此者以其方教於田獵故也書言撲作教刑正謂是矣搢謂搢之於帶也設撲而搢之以示有事於教無事於刑也誓則欲其不犯命焉必北面則以田主殺隂事故也馬氏曰為天子御者僕也為諸侯羣臣御者七騶也載旌旐則司馬之九旗以帛為之者始於大常而終於旐以羽為之者始於旞而終於旌故言旌旐則他可知矣授車以級整設於屏外則自上而下以等相及且相係屬焉故謂之級天子乃厲飾執弓挾矢以獵命主祠祭禽於四方鄭氏曰厲飾謂戎服尚威武也命主祠以所獲禽祀四方之神也司馬職曰羅弊致禽以祠主孔氏曰厲飾謂嚴厲武猛容飾戎服者韋辨服也以秋冬之田故韋辨服若春夏則冠辨服故司服云凡甸冠辨服命主祠祭禽謂獵竟也主祠典祭祀者也禽者獸之通名也四方有功於四方之神也四時田獵皆祭宗廟而分時各以為主也春時土方施生獵則祭社為主也夏時隂氣始起象神在內獵則祭宗廟為主也秋時萬物以成獵則以報祭社及四方為主也冬時萬物衆多獵則主用衆物以祭宗廟而亦報於物有功之神於四方也此天子獵既畢因命典祀之官取田獵所獲之禽還祭於郊以報四方之神也冬獵亦何以知然案鄭注秋獮祀方云秋田主祭四方報成萬物又司馬冬狩云致禽饁獸於郊入獻禽以享蒸鄭云冬田物多衆得聚所獲禽因以祭四方神於郊也月令季秋天子既田命主祠祭禽四方是也入又以禽祭宗廟於經注更相引證始可見矣其祭四方用此禽又用别牲故大田云與我犧羊以社以方此四方五行之神也嚴陵方氏曰厲飾厲其容飾也介胄則有不可犯之色故其飾如此厲若子溫而厲之厲則有崖岸之謂也天子厲飾執弓挾矢以獵則躬率之也祭禽則以報成功於百神且示非專為一人之奉也是月也豺猶祭獸戮禽則田獵而祭四方固亦冝矣是月也草木黃落乃伐薪為炭鄭氏曰伐木必因殺氣嚴陵方氏曰黃者土之色百昌皆生於土而反於土以其將反於土故黃黃故落也落則反於土矣草木黃落則以霜降於是月而成物之功終焉故也終則有始故落又訓始伐薪為炭則以禦冬寒故也馬氏曰天始物於𤣥地終功於黃然萬物之化終則有始人徒見其落也不知其為生之始也故落以訓始蟄蟲咸俯在內皆墐其户鄭氏曰墐謂塗閉之辟殺氣孔氏曰俯垂頭也墐塗也前月但藏而壞戶至此月既寒故垂頭嚮下以隨陽氣陽氣稍沈在下也又塗塞其户穴以辟地上隂殺之氣乃趣獄刑母留有罪收祿秩之不當供養之不冝者鄭氏曰殺氣已至有罪者即決也祿秩之不當恩所增加也供養之不冝欲所貪嗜熊蹯之屬非常食天氣殺而萬物咸藏可以去之也孔氏曰春夏陽氣寬施許人主從時雖彼人不應得祿而王恩私子之亦所權許今秋隂氣急斂禁罷必當是春夏所權置者今悉收停之也供養不冝謂非常之膳求不可得者也嚴陵方氏曰趣與趣民收斂之趣同義仲秋命有司申嚴百刑而已至此又趣獄刑毋留有罪焉則以奉天威之方至於是亟決之也祿秩者祿之秩序也收祿秩之不當所以損於養人收供養之不冝所以節於奉己凡以順收斂之道而已且當則無乖而適事冝則無常而隨時養人欲其適事故祿秩言當奉己要在隨時故供養言冝山隂陸氏曰收祿秩之不當供養之不冝刑官之事也罷官之無事去器之無用事官之事也是月也天子乃以犬嘗稻先薦寢廟鄭氏曰稻始熟也嚴陵方氏曰以犬嘗稻見孟夏以彘嘗麥解先薦寢廟見仲春解季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盜賊邉竟不寧土地分裂行春令則暖風來至民氣解惰師興不居鄭氏曰其國大水未之氣乘之也六月宿直東井氣多暑雨國多盜賊邉竟不寧土地分裂丑之氣乘之也極隂為外邉竟之象也大寒之時地隆圻也暖風來至民氣解惰辰之氣乘之也巽為風辰宿直角角主兵不居象風行不休止也孔氏曰其國大水天災冬藏殃敗地災民多鼽嚏人災國多盜賊邉竟不寧人災土地分裂地災也十一月一陽生十二月二陽生陽在內伏於地下四隂在地上故鄭云極隂為外也暖風來至天災民氣解隋師興不居人災也嚴陵方氏曰水潦盛昌在於季夏故行夏令則其國大水大水故冬藏殃敗也金數窮而氣窒則為􅍠氣行逆而發於聲則為嚏皆肺疾也肺屬金而金生水反為水所勝故民受是疾焉取非其有謂之盜毁則謂之賊皆至隂之類也以國多盜賊故邉竟不寧也土地分裂則為嚴凝之氣所坼故也巽為風而春之氣為暖故行春令則暖風來至然孟夏行春令則曰暴風來格者彼以正陽之月暖風不足以言之故也此言至而彼言格者以其暴故與物相抵也氣暖則解緩寒則縮栗以緩風來至故民氣解惰也師興不居則以少陽作之而動故也禮記集說卷四十四
