body:
  text: 禮記集説卷一百五十七宋衛湜撰工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備遂出一人揚觶乃立司正焉知其能和樂而不流也鄭氏曰工謂樂正也樂正既告備而降言遂出者自此至去不復升也流猶失禮也立司正以正禮則禮不失可知一人或為二人孔氏曰此一節論鄉飲酒設樂樂賔罷則以禮正之之事工入升歌三終謂升堂歌鹿鳴四牡皇皇者華每一篇而一終也主人獻之獻工也笙入三終者謂吹笙人入於堂下奏南陔白華華黍每一篇一終也主人獻之謂獻笙人也間歌三終者間代也謂笙歌已竟而堂上與堂下更代而作也堂上人先歌魚麗則堂下笙由庚此為一終堂上歌南有嘉魚則堂下笙崇丘此為二終堂上歌南山有臺則堂下笙由儀此為三終此皆鄉飲酒之文魚麗言太平年豐物多此采其物多酒旨所以優賔南有嘉魚言太平君子有酒樂與賢者共之此采其能以禮下賢者與之燕樂南山有臺言太平之治以賢者為本此采其愛友賢者為邦家之基由庚崇丘由儀今亡其義未聞也合樂三終者謂堂上下歌瑟及笙並作也若工歌關雎則笙吹鵲巢合之若工歌葛覃則笙吹采蘩合之若工歌卷耳則笙吹采蘋合之故鄉飲酒云乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋是也周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采蘩言國君夫人不失職采蘋言卿大夫妻能循法度工告樂備遂出者工謂樂正工先告樂正樂正告賔以樂備而遂下堂言遂出者樂正自此不復升堂也鄉飲酒云工告于樂正樂正告于賔乃降立西階東北面一人揚觶乃立司正焉者一人謂主人之吏也舉觶示將行旅酬也將留賔旅酬恐有懈惰故主人使相禮者一人為司正以監之也長樂陳氏曰工入升歌三終堂上之樂也則笙入三終者堂下之樂也記曰歌者在上匏竹在下貴人聲也此之謂也而歌之者一篇為一終則三終者三篇也鹿鳴燕嘉賔之詩也而歌之所以示事言今之所飲者皆嘉賔也四牡勞使臣之來也而勞之所以示勸言今之來者皆可勸者也及夫賔既至矣而無禮樂以文之則亦不足以示情此皇皇者華之詩所以繼也其詩曰送之以禮樂言逺而有光華者乃其意也此工入之三也南陔相戒以養也而樂歌焉此與夫投壺之歌養者類矣白華孝子之潔白也而樂歌焉此與夫人饗之清廟者類矣而清廟所以示德故曰白華者示德也白華所以示其德則南陔所以示其行及夫外有行而內有德矣不得其時而飲之亦不足以行禮此華黍之所以繼作也其詩曰時和歲豐冝黍冝稷者乃其意也此笙入之三也夫示事也示勸也示情也此主人之所以事人者也示德也示行也示禮也此主人之所以成己者也故主人獻之若夫相代而為間歌相同而為合樂則無所獻矣以其不特於主人故也間代也上下之樂於是乎代作也魚麗作於上以見物多而禮能備禮能備則其道得矣故下有由庚以繼之詩曰由庚萬物得由其道是也南有嘉魚作於上以見至誠而樂相與則其功大矣故下有崇丘以繼之詩曰崇丘萬物得極其高大是也南山有臺作於上以見得賢也自況能立太平之基則天下冝矣故下有由儀以繼之詩曰萬物之生各得其冝是也此間歌之三也二南者王化之本正始之道者也用之鄉人焉使鄉大夫以之教其民用之邦國焉使諸侯以之教其臣又樂書曰工入升歌三終笙入三終皆繼之以主人獻之者以禮節樂於其始也間歌三終合樂三終必繼之以一人揚觶乃立司正焉以禮節樂於其終也鄉飲酒之禮作樂以行禮由禮以節樂則賔主之情斯和樂而不流矣河南程氏曰二南之分以周公主內治故以畿內之詩言文王大姒之化者屬之周南以召公掌諸侯故以畿外之詩言列國諸侯大夫之室家被文王大姒之化而成德者屬之召南此為得之謂之南者言其化自岐雍之間被于江漢之域自北而南也詩曰以雅以南即謂此也嚴陵方氏曰主人獻其所奏樂者即儀禮言卒歌主人獻工是也樂工之賤亦獻之者示上之不虛取於下也歌者在上故曰升匏竹在下故曰入升堂所以示德笙歌所以示事間歌以示相成之義合樂以示相與之情故其别如此雖然均是詩也或歌之或笙之者以其序之先後而為之别也序之先者則歌之於上若鹿鳴四牡皇皇者華則曰升歌三終是矣序之後者則笙之於下若南陔白華華黍則曰笙入三終是矣至歌魚麗則笙由庚之類歌關雎則笙鵲巢之類凡一十二篇亦莫不以序之先後而為之上下焉歌亦笙止謂歌者以笙與歌相間故也合樂兼有笙歌而通謂之樂者以其兩者相合而為樂故也上言主人獻之者獻歌工也下言主人獻之者獻笙工也間歌合樂而不言獻者以皆有笙有歌其所奏之樂即其所獻之工故也夫鹿鳴四牡皇皇者華言君之待臣有以得其歡心若是者德也德成而上故升歌之以示德南陔白華華黍言子之事親又以致其和氣若是者事也事成而下故笙入之以示事間歌之詩六篇若嘉魚之類言賢和於上若崇丘之類言物和於下上下交和則有相成之養故間歌之所以示相成之義也合樂之詩六篇若關雎而下言聖人之化若鵲巢而下言賢人之化聖賢同化則有相與之情故合樂焉所以示相與之情也且鹿鳴嘉魚而下則小雅而已然不及大雅關雎鵲巢而下則風而已然不及頌何也小雅大雅皆言政而大雅之政為大風與頌皆言德而頌之德為盛鄉飲酒之禮止行之於一鄉故止歌風而不歌頌歌小雅而不歌大雅夫樂衆矣止曰笙入何也以鄉飲不若燕禮之大亦猶投壺不若射禮之大故止命弦而已以儀禮考之鄉飲酒亦用瑟而經不言者以笙為主故也工告樂備遂出者則以反為文故也工告樂備遂出則樂豈至於淫乎一人揚觶乃立司正則酒豈至於亂乎清江劉氏曰由庚崇丘由儀此三篇皆笙詩也小序云有其義而亡其辭亡謂本無非亡逸之亡也鄉飲酒鼓瑟而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北面立樂南陔白華華黍燕禮亦鼓瑟歌鹿鳴四牡皇皇者華然後笙入立于縣中奏南陔白華華黍南陔以下今無以考其名篇之義然曰笙曰樂曰奏而不言歌則有聲而無辭明矣下由庚崇丘由儀放此新安朱氏曰今案鹿鳴即謂今日燕飲之事所以導達主人之誠意而美嘉賔之德也四牡言其去家而仕於朝辭親而從王事於此乎始也皇皇者華言其將為君使而賦政於外也樂記曰宵雅肄三官其始也正謂此也蓋此三詩先王所制以為燕飲之樂用之鄉人用之邦國各取其象而歌之也合樂謂歌樂衆聲俱作堂上有歌瑟堂下有笙磬合奏此詩也三終者二南各三終也燕禮記云有房中之樂注云弦歌周南召南之詩而不用鐘磬之節謂之房中者后夫人之所諷誦以事其君子是也亦有用鐘鼓奏之者諸卿大夫燕饗亦得用之故用鐘鼓婦人用之乃不用鐘鼓則謂之房中之樂也后妃夫人同是文王之化召南是文王未受命已前之事諸侯之禮故稱夫人周南是文王受命稱王之後天子之禮故稱后也賔酬主人主人酬介介酬衆賔少長以齒終於沃洗者焉知其能弟長而無遺矣降説屨升坐修爵無數飲酒之節朝不廢朝莫不廢夕賔出主人拜送節文終遂焉知其能安燕而不亂也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也鄭氏曰遺猶脫也忘也朝夕朝莫聽事也不廢之者既朝乃飲先夕則罷其正也終遂猶充備也孔氏曰此明旅酬長幼無被遺棄及飲酒無數猶能節文不至於亂又總結上五種之事旅酬之時賔主人之黨各以少長為齒以次相旅至於職掌罍洗之人以水沃盥洗爵者皆預酬酒之限是弟長無遺也降説屨升坐者此謂無算爵之初以前皆立而行禮至此徹俎之後乃説屨升堂坐也修爵無數謂無算爵也朝後行禮禮畢乃治私家之事是朝不廢朝莫不廢夕此謂鄉飲酒禮若黨正飲酒一國若狂無不醉也賔出拜送言飲畢主人備禮拜而送賔節制文章終竟申遂不有闕少是在燕樂而不至亂也彼國謂天下諸侯也新安朱氏曰弟長而無遺弟悌也敬順之意言能使少者皆承順以事長者而無所遺棄也藍田吕氏曰有貴賤隆殺之義則有别矣有别則有禮也和樂而不流安燕而不亂則有節矣有節義也弟長而無遺則均均則仁矣仁義而且有禮行乎一鄉達乎一國所謂正身安國矣舉斯術也達之天下則天下安矣故由一鄉而知王道之可行於天下此禮是也嚴陵方氏曰降説屨升坐者降階説屨升堂而坐也修爵無數者修舉也修爵無數可謂安燕矣然而朝不廢朝莫不廢夕以至於節文終遂焉所以知其安燕而不亂也五行行之於一身則身正而無邪施之於一國則國安而無危故曰足以正身安國以天下之本在國故曰彼國安而天下安天下安則王道成矣馬氏曰終於沃洗逮賤之謂也少長以齒能弟長也終於沃洗能無遺也降説屨升坐修爵無數冝其醉矣然猶不廢朝夕之聽事賔出主人拜送如拜至禮焉蓋自始以至終皆有節文終遂焉此之謂安燕而不亂也廬陵胡氏曰前言正席次言司正正禮此言正身蓋席正然後禮正禮正然後身正身正則國正國正而天下正矣故繼之以國安而天下安也鄉飲酒之義立賔以象天立主以象地設介僎以象日月立三賔以象三光古之制禮也經之以天地紀之以日月參之以三光政教之本也亨狗於東方祖陽氣之發於東方也洗之在阼其水在洗東祖天地之左海也尊有玄酒教民不忘本也鄭氏曰日出於東僎所在也月生於西介所在也三光三大辰也天之政教出於大辰焉祖猶法也狗所以養賔陽氣主養萬物海水之委也大古無酒用水而已孔氏曰此記者覆説鄉飲酒有所法象之事前文天地共言此則析言之賔者主之所尊敬故以賔象天主供物以養賔故以主象地前經介僎象陰陽據其氣此云日月言其體昭十七年有星孛于大辰公羊曰大辰者何大火也伐為大辰北辰亦為大辰何休云大火與伐天所以示民時早晚天下取以為正故謂之大辰辰時也是天之政教出於大辰亨狗於東方覆説前文羞出自東房也洗之在阼水在洗東覆説洗當東榮也尊有玄酒亦覆上文也藍田吕氏曰此至篇末申言鄉飲酒之禮又有所法象前文有所未盡者皆再明之飲酒之禮莫先於賔主立賔象天立主象地禮之經也其次立介僎以輔之輔之者紀也其次立三賔以陪之陪之者參也政教之立必有經有紀有參然後可行故飲酒之禮必有賔主介僎三賔然後可行故曰政教之本也天地之間海居於東東則左也故洗在阼水在洗東有左海之義長樂陳氏曰禮見於賔主則立賔以象天天尊也而用賔之卑以象之蓋賔者禮所仲故也立主以象地地卑也而用主之尊以象之蓋主者禮所屈故也此賔主之所以象天地也三賔則衆矣何以知之此禮有曰賔主有曰介僎而又有衆賔焉故曰衆賔升受坐祭又曰衆賔自入是以知其然不言衆賔而言三賔何也樂為陽而禮者陰之類也古之言禮者多以陰而鄉飲者禮之盛也進之而有三揖退之而有三辭分之而有三賔所以象國之三卿所謂三者豈非言禮者必以陰而取法於月乎蓋月三日則成魄而未至於三焉者非魄也三月則成時而未至於三焉者非時也故過乎三則已甚不及乎三則為未成此衆賔之所以為三賔而與夫三辭三揖者類與牲用狗者狗之為物有所守而善擇人者也非其人則在所去故古之人於燕饗飲食皆用之嚴陵方氏曰日者陽之精陽生於北而出於東故坐僎於東北以象日月者隂之精隂生於南而成於西故坐介於西南以象月前言隂陽此言日月者隂陽之義配日月其實一也曰日月又曰三光與孔子間居言天地又言三無私同義或言立或言設何也立則本於創始之時設則見於既陳之後因賔而後用介因主而後用僎則是立賔立主於前乃設介僎於後也故於賔主則曰立於介僎則曰設焉三賔即賔也以其有别於衆賔故謂之三賔而亦言立也禮之所制如此故用之於事則足以為政之本體之於道則足以為教之本也凡植物皆地産足以養人之隂凡動物皆天産足以養人之陽天産不特狗也而特亨狗以祖陽氣者蓋陽之辰窮於戌而為陽之至故辰在戌而屬狗則狗者至陽之畜也東方者得陽之中亨至陽之畜於陽中之方又得其宜矣水則盛之於罍者蓋酌之於罍而滌之於洗故其水在洗東洗既在東水又在洗之東者凡以祖天地之左海也左亦東也以方言之則曰東以體言之則曰左馬氏曰上極乎性命之妙下盡乎物理之微然後能制禮也言古之制禮者必古之聖人也經之以天地經大而緯小紀之以日月紀小而綱大經之以天地則知日月為緯紀之以日月則知天地為綱有經有緯有紀有綱天地之道備矣參之以三光參於經紀之間左海者水之無窮言主人之養人無窮已也廬陵胡氏曰天所以示民時早晚時之政教繫焉故日月五星謂之七政周公誥康叔曰有政有事無彜酒又曰其爾典聽朕教夫聖人豈以飲酒為常哉亦有政教存焉故鄉飲必先政教之本賔必南鄉東方者春春之為言蠢也産萬物者聖也南方者夏夏之為言假也養之長之假之仁也西方者秋秋之為言愁也愁之以時察守義者也北方者冬冬之為言中也中者藏也是以天子之立也左聖鄉仁右義偝藏也介必東鄉介賔主也主人必居東方東方者春春之為言蠢也産萬物者也主人者造之産萬物者也月者三日則成魄三月則成時是以禮有三讓建國必立三卿三賔者政教之本禮之大參也鄭氏曰春猶蠢也蠢動生之貌也聖之言生也假大也愁讀為揫揫斂也察猶察察嚴毅之貌也南鄉鄉仁貴長大萬物也察或為殺介必東鄉介賔主也獻酬之禮主人將西賔將南介覸其間也東方者春産萬物者言禮之所共由主人出也禮者隂也大數取象法於月也孔氏曰自此至篇終更總明坐位所在并明三揖三讓每事皆三之義東方産育萬物故為聖也養育萬物長之使大仁恩也中者藏也者北方萬物所歸藏也介賔主也者主人獻賔將西行就賔賔又南行將就主人介在西階之上以介覸隔賔主之間也主人者造之産萬物者也者釋所以主人居東方之意東方産育萬物主人供客所須故主人造為産萬物之象也三日成魄者謂月盡之後三日乃成魄魄謂明生傍有微光也此謂月明盡之後而生魄非必月三日也初以前月大則月二日生魄前月小則三日乃生魄樂既為陽故禮為隂月是隂精故禮之數取法於月也橫渠張氏曰坐有四位者禮不主於賔主欲以尊賢若賔主相對則是禮主於賔主而已故其位賔主不相對坐介僎於其間以見賔賢之義因而説四時之坐皆有義其實欲明其尊賢藍田吕氏曰天子南面而立左則東方東方聖也左之則尊之也鄉則南方南方仁也鄉之則宗之也右則西方西方義也右之則用之也偝則北方北方藏也偝之則違之也天子之立如是而坐賔亦南鄉者尊賔之至也介間也坐賔主之間所以間之也主人居東方者禮之所由出猶東方之産萬物也一生二二生三三生萬物三者物之所由致是故禮有三讓賔有三賔國有三卿上法於月則三日成魄三月成時政教所本禮之所以法也長樂陳氏曰萬物之於春莫不生此春所以為蠢也然則物之生也其來固有自焉易曰帝出乎震則帝者天之神也震者聖神之妙也此産萬物所以為聖也萬物相見於離則物於是乎荗矣假者貸而有益意蓋有所假則必有所益也故生之以為養增之以為長養則盛長則多此夏之時所以為假也萬物之於四時也生於春長於夏衰於秋老於冬而至於秋則慘而不舒者物之情也詩曰秋日萋萋百卉具腓此秋之所以為愁也中在內能隱而不能顯此中之所以為藏也天子之立也將以嚮時而接天下者也而以四時言之以左為仁右為義向左仁背右義非以夫用天之理者足以治人故耶嚴陵方氏曰賔雖坐於西北而其鄉必南言賔必南鄉則主必北鄉可知矣天子者盡人道以成位乎天地之中則其左右鄉偝可不合其德乎春以木德為仁夏以火德為禮秋以金德為義冬以水德為知别五行之德言之則如此若夫合隂陽之道言之則春夏以陽而無非仁秋冬以隂而無非義也秋冬既無非義然不謂冬為義者以陽道常饒隂道常乏故也以其饒至於夏猶為仁以其乏止於秋已為義此言鄉飲酒之坐及於天子之立何哉夫以一鄉之坐足以見天子之立則飲酒之義固非苟然而已則觀於鄉而知王道之易易又有在乎此也前言賔必南鄉以見主之北鄉則此言介必東鄉又以見僎之西鄉矣前言四面之坐其以是歟賔南鄉主北鄉而介東鄉焉則介于賔主之兩間矣故曰介賔主也介之得名又以是歟主人雖坐于東南而北鄉然所居則以東方為正也東方者産萬物之地飲食之養則主人之所造也而有産萬物之象焉此所以必居東方也前言羞出自東方主人共之亦此意然必曰造何也蓋為而就行而至皆曰造膳羞則饔人之所治必為而就也庖厨則君子之所遠必行而至也故飲食必以造言之而居之之所亦謂之造焉膳夫言卒食以樂徹于造是矣王制言大國次國皆三卿故此言建國必立三卿而鄉之三賔則有三卿之象故足以為政教之本禮之大參也馬氏曰春木為仁而夏曰仁何也天地之仁至乎夏而盡矣天地之義至乎冬而極矣故樂記曰春作夏長仁也秋斂冬藏義也長者大之而已秋斂也萬物至秋而斂則其成體可察也義者仁之節秋者春夏之節也故曰守義中者萬物復歸其根也藏者不露其形也以秋為揫斂則知春夏為發散也以冬為中藏則知春夏為外發也大國三卿周官所謂設其參是也山隂陸氏曰春所以産之産之者聖也冬所以復之復之者神也假之者仁也愁之者義也偝藏聖人以此退藏於密是也介必東鄉介賔主也據此坐向東北明矣然則主人面西北賔面東南僎面西南皆可知主人者造之若客受成而已以月三日而成魄是以禮有三讓以三月而成時是以建國必立三卿書曰卿士惟月此之謂也再言三賔者政教之本嫌三賔獨非政教之本也江陵項氏曰此鄉飲酒義也聖管萬善故象春仁濟萬物故象夏義制萬事故象秋中藏萬理故象冬聖以德言未及於用也故左之義以事言天下之大用也故右之鄉仁以應物偝藏以反身也凡道備於身為聖施於物為仁形於事為義存於心為中名雖有四其實一也考其次序固人道之當然推其方位亦天理之自然也介必東鄉介賔主也主人必居東方東方者春春之為言蠢也産萬物者也主人者造之産萬物者也此章當在上文賔必南鄉之下末句當云産萬物者聖也石林葉氏曰道成於三而月也時也天之道也國之卿也鄉之賔也人之道也論鄉飲而至於三賔則政教成而禮行矣所以為本所以謂之禮之參也新安朱氏曰魄者月之有體而無光處也故書言哉生明旁死魄皆謂月二三日月初生時也凡言既生魄即謂月十六日月始闕時也今此篇兩言月三日而成魄則是漢儒專門陋學未嘗讀尚書者之言耳疏知其繆而曲徇之故既有月明盡而生魄之説又言月二日三日而生魄何相戾之甚邪此其大義本不足言而疏於例亦當削去今特著之以明述此義者之繆不足深究云射義第四十六孔氏曰案鄭目録云名曰射義者以其記燕射大射之禮觀德行取于士之義此於别録屬吉事案此篇中有鄉射又云不失正鵠正則賔射然則鄉射賔射俱有之矣今目録唯云燕射大射者但此篇廣説天子諸侯大射燕射之義不專於鄉射故也射之所起起自黃帝故易繫辭黃帝以下九事章云古者弦木為弧剡木為矢弧矢之利以威天下乂虞書云侯以明之則射侯見於堯舜夏殷無文周則具矣藍田吕氏曰射義言射者男子之所有事者也天下無事則用之於禮義故有大射鄉射之禮所以習容習藝觀德而選士天下有事則用之於戰勝故主皮呈力所以禦侮克敵也長樂劉氏曰射之所以為藝而次於禮樂者有足以成人之德行而正其性命也何哉鄉三物之為教也六德出於性弗能盡其性則德有弗備矣六行出於誠弗能存其誠則行有弗篤矣是故君子之學也間其邪所以存誠也存其誠所以盡性也盡其性所以畜德也畜其德所以植行也然則六行之本在德六德之本在性盡性之道在乎誠明存誠之道在乎間邪而播其德行於五品者其惟六藝乎禮樂所以載其德行而致之君親者也射所以觀其德行而兆其用捨者也然而人之稟受或自誠而明或自明而誠誠矣則無不明也明矣則無不誠也然后性可盡矣性盡則六德可畜德畜則六行可植行植則無所入而不自得矧於射乎長樂陳氏曰先王之為射禮何取也蓋不能射則是不能防患不能防患者不能有其身者也不能有其身則是不能入於道者也不能入於道不能制於法者也是故聖人與民同吉凶之患也則驅諸射而射者人之所難也則舉而為之制自天子之尊必有射諸侯以至於為卿大夫士皆行之則天下四方之逺者莫不化詩曰爾之逺矣民胥然矣爾之教矣民胥效矣此禮之言射貴賤上下各有其法與其義而不相廢也禮有大射有賔射有燕射此三者儀禮所謂禮射也蓋天子有郊廟之事而擇士以射之則謂之大射以夫大射者天子之禮也諸侯來朝之時而為射以樂之則謂之賔射以夫賔者諸侯之禮諸侯言賔則天子為主矣至於燕射則卿大夫燕以射之而已雖然大射祭也賔射朝也燕射禮也自類而推之蓋不獨此也以其聘禮而有射禮則謂之聘射所謂聘射之禮至大禮也是已以其飲於鄉而有射禮則謂之鄉射周官鄉射之禮五物詢衆庶是已以其會於州而有射禮則謂之州射州長之職春秋以禮會民而射於州序是已以其習射必有射禮則謂之武射司弓矢所謂王弓弧弓以授射甲革椹質而鄭氏言試弓矢以習武是也以其行軍而有射禮則謂之軍射樂記所謂散軍而郊射左射貍首右射騶虞是也夫此數者皆射也然就其中而考之則軍射者禮之變為不足道矣古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮故燕禮者所以明君臣之義也鄉飲酒之禮者所以明長幼之序也鄭氏曰言别尊卑老稚然後射以觀德行也孔氏曰案儀禮大射在未旅之前所以明君臣之義者謂臣於堂下再拜稽首升成拜君答拜似臣盡竭其力致敬於君君施惠以報之也鄉飲酒以鄉統名則前篇云六十者坐五十者立侍是也藍田吕氏曰諸侯之射必先行燕禮者大射也卿大夫之射必先行鄉飲酒之禮者鄉射也射者男子之事必飾之以禮樂者所以養人之德使之周旋中禮也蓋燕與鄉飲酒皆燕也因燕以娛賔不可以無禮故有大射鄉射之禮禮不可無義故明君臣之義長幼之序焉嚴陵方氏曰必先行禮而後習射者則射非主皮以禮為先爾馬氏曰燕與鄉飲則有恩明君臣與長幼則有義有恩有義然後以射而觀其德行此人所以樂為之也山隂陸氏曰詩序曰鹿鳴廢則和樂缺矣四牡廢則君臣缺矣鹿嗚賔主之道也非君臣之道也故先王於燕禮更以明君臣之義燕義曰君獨升立席上西面特立莫敢適之義也設賔主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賔而以大夫為賔為疑也明嫌之義也石林葉氏曰燕禮以示慈惠上之事也故諸侯之射以示慈惠為主鄉飲以序齒族不必上所惠也故鄉大夫為賔有事則拜而答之所謂明君臣之義也示齒族則不嫌於有别也故長者其豆多少者其豆寡賔介相酬則少長以齒此所謂明長幼之序也故射者進退周還必中禮內志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行矣鄭氏曰內正外直習於禮樂有德行者也正鵠之名出自此也孔氏曰此一經明射者之禮言內志審正則射能中故見其外射則可以觀其內德賔射之的謂之正欲明射者內志須正也大射之質謂之鵠鵠者直也欲使射者外體之直藍田吕氏曰孔子曰射不主皮為力不同科古之道也禮射有主皮之射射不主皮者禮射也所謂大射鄉射是也為力者主皮之射也主皮者主於獲而已尚力而不習禮故為力不同科也禮射必先比耦故一耦皆有上射下射皆執弓而挾矢其進也當階及階當物及物皆揖其退也亦如之其行有左右其升降有先後其射皆拾發其取矢于福也始進揖當福揖取矢揖既搢挾揖退與將進者揖其取矢也有橫弓卻手兼弣順羽拾取之節焉卒射而飲勝者袒決遂執張弓不勝者襲説決拾加弛弓升飲相揖如初則進退周旋必中禮可見矣夫先王制禮豈苟為繁文末節使人難行哉亦曰以善養人而已蓋君子之於天下必無所不中節然後成德必力行而後有功其四肢欲安佚也苟恭敬之心不勝則怠惰傲慢之氣生怠惰傲慢之氣生則動容周旋不能中乎節體雖佚而心亦為之不安於其所不安則手足不知其所措故放辟邪侈踰分犯上將無所不至天下之亂自此始矣聖人憂之故常謹於繁文末節以養人於無所事之時使其習之而不憚煩則不遜之行亦無自而作至于久而安之則非法不行無所往而非義矣君子敬以直內義以方外敬義立而德不孤則不疑其所行矣故發而不中節者常生乎不敬所存乎內者敬則所以形乎外者莊矣內外交修則發乎事者中矣故曰內志正外體直然後持弓矢審固持弓矢審固然後可以言中也射一藝也容比於禮節比於樂發而不失正鵠是必有樂於義理久於恭敬用志不分之心然後可以得之則其所以得之者其德可知矣故曰可以觀德行矣長樂劉氏曰士之為道也德濳於性而行隱於中非如聲色之有形可得而知也而況雜之以情偽乎唯射之中否可以見其心之失得而性之存亡也經曰內志正外體直則持弓矢審固者謂射者必正其志也有幸勝之志則不勝矣有求中之志則不中矣有祈爵之志則失爵矣有憚負之志則必負矣是謂內志不正者也志正而不惑謂之審克正而必中謂之固然則持弓矢審固者誠明純備而六德在我者也揖讓而升當物而射周旋中度者足以知其禮矣騶虞貍首蘋蘩迭奏不失其節者足以知其樂矣正己而后發不中則反求諸身不怨勝己者足以知其仁矣必取其爵而人不以為貪必居其勝而人不以為爭者足以知其義矣性情交勝不欺於人失得由中不罔於外者足以知其信矣中於百步之外志正而不惑者足以知其知矣是故誠明充於內者禮樂中於節審固定於心者正鵠應其手好惡存諸心者莫可得以與於是也所以先聖王用之以擇賢才而觀其德行然後取而用之無不中矣不曰射者可以成人之德行而正其性命乎嚴陵方氏曰進退者升降之節周還者揖讓之容能中禮者以其先行禮故也內志正然後持弓矢審外體直然後持弓矢固唯固也故其力能至唯審也故其巧能中義內也貌外也合內志外體言之故止曰觀德行而已及其合天子諸侯言之故必曰觀盛德焉馬氏曰凡此所謂其容體比於禮也山隂陸氏曰孟子曰動容周旋中禮盛德之至也此其一隅故曰射者所以觀盛德也正直為正內志言正亦言之法若落箭不固也若出垜不審也審在上亦言之法其節天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂會時也采蘋者樂循法也采蘩者樂不失職也是故天子以備官為節諸侯以時會天子為節卿大夫以循法為節士以不失職為節故明乎其節之志以不失其事則功成而德行立德行立則無暴亂之禍矣功成則國安故曰射者所以觀盛德也鄭氏曰騶虞采蘋采蘩今詩篇名貍首逸下云曽孫侯氏是也樂官備者謂騶虞曰一發五豝喻得賢者多也于嗟乎騶虞嘆仁人也樂會時者謂貍首曰小大莫處御于君所樂循法者謂采蘋曰于以采蘋南澗之濵循澗以采蘋喻循法度以成君事也樂不失職者謂采蘩曰被之僮僮夙夜在公孔氏曰此一節明天子以下射禮樂章之異以騶虞為節者歌騶虞之詩以貍首為節者歌貍首之詩也射人云騶虞九節貍首七節采蘋采蘩皆五節鄉射注云五節歌五終四節四拾其一節先以聽也若然則九節者五節先以聽七節者三節先以聽皆以四節應乘矢拾發也其節之志謂天子以備官為志諸侯以時會為志大夫以循法度為志士以不失職為志明其樂節之志故能不失其所為之事也長樂陳氏曰大射奏貍首間若一鄉射奏騶虞間若一王之五節先以聽諸侯三節先以聽尊者先以聽則多卑者先以聽則寡蓋所以優尊者欲其先知之審也然則王射以騶虞大夫士之鄉射亦以騶虞者鄉射之詢衆庶亦欲官備於天子也又樂書曰樂師凡射天子以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節射人以射法治射儀王以三耦射三侯三獲三容樂以騶虞九節諸侯以四耦射二侯二獲二容樂以貍首七節孤卿大夫以三耦射一侯一獲一容樂以采蘋五節士以三耦射犴侯一獲一容樂以采蘩五節自天子達於士名位不同節亦異數蓋所以定志而明分也故明乎其節之志以不失其事則功成而德行立德行立則無暴亂之事而國安矣其有不可以觀盛德乎王道成於騶虞則主奏之可也大夫妻能循法度於采蘋則大夫奏之可也至於采蘩夫人不失職之詩而士奏之可乎曰王制天子元士視附庸之君其用諸侯夫人之詩亦在所可也蓋士則事人爵之尤卑者也卑者不嫌於抗尊故先王制禮多推而進之是以齊冠不嫌於同諸侯齊車不嫌於同大夫況射節乎不言孤則以射人見之矣清江劉氏曰鄭玄以射義所引曽孫侯氏為貍首之詩非也騶虞采蘋采蘩皆在二南則貍首者亦必其儔矣疑原壤所歌貍首之斑然執女手之卷然即是其章首但仲尼刪詩之時樂正已亡此篇而諸侯朝覲之禮久絶惡貍首之害己又皆除其籍故使不在二南也或曰貍首鵲巢也篆文貍似鵲首似巢鵲巢之詩御之將之成之此亦時會之道藍田吕氏曰騶虞樂官備者騶廄官也所以豢餋六畜也虞山澤之官也所以阜繁鳥獸草木者也騶虞之官以生物為之職惟恐庶類之不繁殖王者之政仁及草木皆如騶虞之用心則未有不王者也故曰仁如騶虞則王道成也王政行則騶虞之官修騶虞之官修則庶類繁殖搜田以時矣彼茁者葭則草木遂其生矣一發五豝則鳥獸蕃息矣于嗟乎騶虞者所以歸功乎二官故天子之射以是為節者言天子繼天當推天地好生之德以育萬物此所以樂官備也先儒謂騶虞者義獸白質黑文不食生物其説既無據而又曰樂官備者謂一發五豝喻得賢多亦牽會為之説也貍首樂會時者貍首之詩亡矣記有原壤所歌之辭曰貍首之斑然執女手之卷然及此篇所引詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽疑皆貍首之詩也貍首田之所獲物之至薄者也君子相會不以微薄廢禮猶白茅死麕可以聘如玉之女匏菜兔罝可以為君子之獻也執手者所以道舊結歡也自曽孫侯氏而下言諸侯以燕射會其士大夫物薄誠至君臣相與習禮而結歡奉天子修朝事故諸侯之射以是為節所以樂會時也采蘋樂循法者采蘋之詩言大夫妻能循法度也所以采蘩采藻盛之湘之奠之皆在家所習教成之事也大夫妻已嫁能循在家姆教之法度乃可以承先祖共祭祀矣卿大夫已命能循其未仕所學先王之法非法不言非道不行乃可以與國政矣故卿大夫之射以是為節所以樂循法也采蘩不失職者采蘩之詩言夫人不失職所謂采蘩于澗沼之中用之公侯之事被之僮僮夙夜在公者蓋夫人無外事祭祀乃其職也唯敬以從事是為不失士之事君何以異此敬恭朝夕事事而已然後盡士之職而不愧故士之射以此為節者所以樂不失職也天子之德莫大於好生好生繼天者也諸侯之德莫大於奉朝事奉朝事事君者也卿大夫之事莫大於法先王法先王守道者也士之德莫大於敬事敬事死命者也先王制禮作樂以養人起居動作多為文章以寓於聲色臭味之間無非所以示人者也薰沐漸漬日遷於善而不自知也射之為義容體既比於禮又欲其節比於樂樂不可以無尊卑故天子諸侯卿大夫之詩各異詩不可以無義故各以其所樂告之此所以明乎其節之志以不失其事則功成而德行立無暴亂之禍矣夫使君臣上下皆習是禮聽是詩以進是德成是功則國不安者未之有也故明於禮樂其盛德之事歟故曰射者所以觀盛德也嚴陵方氏曰節者樂歌之節也孔子曰射之以樂也何以聽何以射循聲而發蓋謂是矣王氏謂天子以騶虞為節者樂仁而殺以時諸侯以貍首為節者樂御而射以禮雖然射必以樂為節何也蓋射所以習武雖先王所不敢忘亦所不可黷也習而不已其弊必至於黷焉亦在乎有以節之而已且武者威也先王以之飾怒樂者樂也先王以之飾喜習飾怒之具而以飾喜之具節之則自天子以至於士豈有黷武之弊哉是則先王之微意也騶虞言葭蓬豝豵以見逺人之地虞人之野皆由其道而得其宜焉以二官之至賤至逺且能使鳥獸草木蕃殖而稱其職若是又況其貴且近者乎此所以樂官備也貍首言小大莫處御于君所則諸侯之於天子也春之朝夏之宗秋之覲冬之遇以至比年之小聘三年之大聘豈或違其時者哉此所以樂會時也采蘋者所薦有常物所采有常處所用有常器所奠有常地此所以樂循法也采蘩言奉祭祀則不失職設官分職天子之事也故以備官為節制節謹度諸侯之事也故以時會天子為節服法服道法言卿大夫之事也故以循法為節保祿位守祭祀士之事也故以不失職為節前言官備此言備官前言會時此言時會者蓋能備官故形於樂也能樂官能時會故形於樂也能樂會時焉內能明乎節之志則外不失其節之事矣志明而事不失則功成於國而德行立於身矣德行立則無暴亂之禍矣功既成於國體以之安焉非德之盛者疇克如此馬氏曰騶虞為節以至不失職為節所謂其節比於樂也蓋天子所貴者德教而已官備則德教有以行故以騶虞之九為節以其朝廷既正而官備也諸侯樂其時會之事則功成於一國至於大夫明乎此則功成於其家士明乎此則功成於其身此所以德行立而無暴亂之禍矣然騶虞一國之風而為節於天子采蘩諸侯夫人之詩而為節於士何也孟子曰説詩者不以文害辭不以辭害意則取詩者不以迹害理矣山隂陸氏曰虞人翼五豝以待公之發可謂官備矣吉日曰悉率左右以燕天子貍不疑不睡又有文焉若是者可以會矣原壤歌曰貍首之斑然執女手之卷然亦以此禮記集説卷一百五十七
