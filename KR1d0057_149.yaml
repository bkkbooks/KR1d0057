body:
  text: 禮記集說卷一百四十九宋衞湜撰大學第四十二孔氏曰案鄭目錄云名曰大學者以其記博學可以為政也此於别錄屬通論河南程氏曰大學乃孔子遺書須從此學則不差或問伊川先生曰初學如何曰初學入德之門無如大學者今之學者賴有此篇書存其他莫如論孟藍田吕氏曰大學之書聖人所以教人之大者其序如此蓋古之學者有小學有大學小學之敎藝也行也大學之教道也德也禮樂射御書數藝也孝友睦姻任恤行也自致知至於修身德也所以治天下國家道也古之教者學不躐等必由小學然後進於大學自學者言之不至於大學所止則不進自成德者言之不盡乎小學之事則不成子夏之門人從事乎灑掃應對在聖人亦莫不然恂恂便便曲盡於鄉黨朝廷之間勃如躩如襜如翼如從容乎進退趨揖之際蓋不如是不足謂之成德矣後之學者窮一經至於皓其首演五字至於數萬言沉没乎章句詁訓之間没世窮年學不知所用一身且不能治况及天下國家哉此不及乎大學者也荒唐繆悠出於範圍之中離於倫類之外慢疏親戚上下等差以天地萬物為幻妄視天下國家以為不足治卒歸於無所用而已此過乎大學者也此道之所以不明且不行秦漢之弊政薄俗陋百世而不革楊墨莊老之道肆行於天下而莫知以為非巍冠博帶髙談濶論偃然自以為先生君子誣罔聖人欺惑愚衆皆大學不傳之故也延平楊氏曰大學一篇聖學之門户其取道至徑故二程先生多令初學者讀之蓋大學自正心誠意至齊家治國平天下只一理此中庸所謂合内外之道不合則所守與所行自判而為二矣孔子曰子率以正孰敢不正子思曰君子篤恭而天下平孟子曰其身正而天下歸之皆明此也又曰大學之書其聖學之門乎不由其門而欲望其堂奥非余之所知也涑水司馬氏曰夫離章斷句解疑釋結此學之小者也正心修身齊家治國以至盛德著眀於天下此學之大者也故曰大學新安朱氏曰大學之書古之大學所以教人之法也蓋自天降生民則既莫不與之以仁義禮知之性然其氣質之稟或不能齊是以不能皆有以知其性之所有而全之也一有聦明叡知能盡其性者出于其間則天必命之以為億兆之君師使之治而教之以復其性此伏犧神農黄帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法寖備然後王宫國都以及閭巷莫不有學人生八嵗則自天子以下至於庶人之子弟皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修己治人之道此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術其次第節目之詳又如此而其所以為教則又皆本之人君躬行心得之餘不待求之民生日用彞倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俛焉以盡其力此古昔盛時所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不修教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀内則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而内有以盡其節目之詳者也三千之徒蓋莫不聞其說而曾子之傳獨得其宗於是作為傳義以發其意及孟子没而其傳泯焉則其書雖存而知者鮮矣自是以来俗儒記誦詞章之習其功倍於小學而無用異端虚無寂滅之教其髙過於大學而無實其他權謀術數一切以就功名之說與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間使其君子不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沈痼以及五季之衰而壊亂極矣天運循環無往不復宋德隆盛治教休明於是河南程氏兩夫子出而有以接乎孟氏之傳實始尊信此篇而表章之既又為之次其簡編發其歸趣然後古者大學教人之法聖賢經傳之㫖粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗散失是以忘其固陋采而輯之間亦竊附己意補其闕略以俟後之君子極知僣踰無所逃罪然國家化民成俗之意學者修己治人之方則未必無小補云又曰聖人作大學便要使人皆入於聖賢之域又曰學者須是為己聖人敎人只在大學第一句明明德上象山陸氏曰此言大學指歸欲明明德於天下是入大學標的格物致知是下手處中庸言博學審問慎思明辨是格物之方學說大學之道在明明德在親民在止於至善知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣鄭氏曰止猶自處也得謂得事之宜也孔氏曰章明己之明德親愛於民止於至善之行大學之道在此三事也知止於至善而后心能有定心定無欲故能靜靜故情性安和情性安和故能思慮於事能慮然後於事得宜天下萬物有本有末經營百事有終有始河南程氏曰明德者明此理也又曰親當作新言既自明其德而使人用此道以自新也伊川又曰至善者義理之精微無可得而名姑以至善目之也又曰止於至善反己守約是也又曰止於至善如子止於孝父止於慈之類非謂務觀物理於外泛然如游騎無所歸也又曰明德新民豈分人我此成德者之事也明道又曰知止則自定萬物撓不動非是别將定来助知止也又曰得而後動與慮而後動異得在己如自使手舉物無不從者慮則未在己如手持物知其不利又曰人之學莫大於知本末終始致知在格物則所謂本也始也治天下國家則所謂末也終也治天下國家必本諸身其身不正而能治天下國家者無之伊川藍田吕氏曰大學者大人之學也窮理盡性而已性者合内外之道以天地萬物為一體者也人倫物理皆吾分之所固有居仁由義皆吾事之所必然物雖殊類所以體之則一事雖多變所以用之則一知此然後謂之明明則窮理者也至此然後謂之誠誠則盡性者也在明明德者窮理以自明其明德者也在親民者推吾明德以明民之未明所謂先知覺後知先覺覺後覺者也己則不明而以明民則不知自明其德而不以明民則不仁二者皆非大人之事不可與窮理盡性者也在止於至善者所謂誠也善之至者無以加於此也為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信所止者皆善之至者也所居之位不同則所止之善不一其所以止於至善則一也蓋學至於誠則天之道也非有我之得私也故不勉而中不思而得從容中道雖善不足以明之然天下之善何以加此故所止者止於是而已人之所以不定者以其不知所止而已猶行者之未得舎則不能不求其他故人莫不欲知所止所止未在於至善則終亦莫之定矣夫學至於誠則莫非天道之自然盛行不加窮居不損先聖後聖若合符節可以不勉不思自中於道豈容人之智力措於其間哉知此則其心定矣故曰知止而後有定定則無所事故能靜無所事則莫非吾分之所固有吾事之所必然故能安安則有諸己而不去然後可以用之而謀慮生焉以此謀慮則未有不得者也窮理則本末終始莫不有序昭然成列而不可亂也知天下皆吾體也則不得不以吾身為本以天下為末知盡性者必以明明德於天下為主則不得不以致知為始以明明德於天下為終知此則可以進道故曰近德至此則與道為一夫何逺近之有哉延平楊氏曰大學之道必知其所止知止然後能定不知所止而欲應酬曲當是猶射者未知正鵠之所在而欲取中也又曰古之善學者必先知其所止然後可以漸進若倀倀然莫知所止而欲望聖賢之域多見其難也又曰自致知至於慮而后得進德之序也譬之適四方者未知所出必問道所從出所謂致知也知其所之則知止矣語至則未也知止而至之在學者力行而已非教者所及也新安朱氏曰自此至未之有也為經第一章蓋孔子之言而曾子述之下傳十章則曾子之意而門人記之也舊本頗有錯簡今因程子所定更考經文以為序次大學者大人之學也明明之也明德者人之所得乎天虚明不昧以具衆理而應萬事者也但為氣禀所拘人欲所蔽則有時而昏然其本體之明則有未嘗息者故學者當因其所發而遂明之以復其初也新者革其舊之謂也言既自明其明德又當推以及人使之亦有以去其舊染之汚也止者必至於是而不遷之意至善則事理當然之極也言明明德新民皆當至於至善之地而不遷蓋必其有以盡夫天理之極而無一毫人欲之私也三者大學之綱領也止者所當止之地即至善之所在也知之則志有定向靜謂心不外馳安謂所處而安慮謂思無不審得謂得其所止明德為本新民為末知止為始能得為終本始所先末終所後此結上文兩節之意或問曰然則此篇所謂在明明德在親民在止於至善者亦可得而聞其說之詳乎曰天道流行發育萬物其所以為造化者隂陽五行而已而所謂五行隂陽者又必有是理而後有是氣及其生物則必是氣之聚而有是形故人物之生必得是理然後有以為健順仁義禮知之性必得是氣然後有以為百骸九竅五藏之身周子所謂無極之真二五之精妙合而凝者正謂是也然以理言之萬物一原固無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞者為物是以或貴或賤而不能齊也彼賤而為物者既梏於形氣之偏塞而無以充其本體之全矣唯人之生乃得其氣之正而且通者而其性為最貴故其方寸之間虚靈洞徹萬理咸備蓋其所以異於禽獸者正在於此而其所以可以為堯舜能參天地賛化育者亦不外是焉是則所謂明德者也然其通也或不能無清濁之異其正也或不能無美惡之殊故其所賦之質清者知而濁者愚美者賢而惡者不肖又有不能同者必其上知大賢之資乃能全其本體而無小不明其有不及乎此則所謂明德者已不能無蔽而失其全矣况乎人以氣質有蔽之心接乎事物無窮之變則其耳之欲聲目之欲色口之欲味鼻之欲臭四肢之欲安佚所以害乎其德者又豈可勝言哉二者相因反覆深固是以此德之明日益昏昧而此心之靈其所知者不過情欲利害之私而已是則雖曰有人之形而實何以逺於禽獸雖曰可以為堯舜而參天地然亦不能有以自充矣然其本體之明得之於天蓋有終不可得而昧者是以雖其昏愚之極而介然之頃而吾心一有覺焉則即此空隙之中而其本體已洞然矣是以聖人施教既已養之於小學之中而後開之以大學之道其必先之以格物致知之說者所以使之即其所養之中而因其所發以啟其明之之端也繼之以誠意正心修身之目者則又所以使之因其已明之端反之於身而致其明之之實也夫既有以發其明之之端而又有以致其明之之實則吾之所得於天而未嘗不明者豈不超然無有氣質物欲之累而復全其本體之明哉是則所謂明明德者而非有所作為於性分之外也然其所謂明德者又人人之所同得而非有我之得私也向也俱為物欲之所蔽則其賢愚之分固無以大相逺者今吾既幸有以自明矣則視彼衆人之同得乎此而不能自明者方且甘心迷惑没溺於卑汚苟賤之中而不自知也豈不為之惻然而思有以救之哉故必推吾之所自明者以及之始而齊家中於治國而終及於平天下使彼有是明德而不能自明者亦皆如我之有以自明而去其舊染之汚焉是則所謂親民者而亦非有所付畀増益之也然德之在己而當明與其在民而當新者則又皆非人力之所為而吾之所以明而新之者又非可以私意苟且而為也是其所以得之於天而見於日用之間者固已莫不各有本然一定之則矣以其義理精微之極有不可得而名者故姑以至善目之而傳所謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也衆人之心固莫不有是而或不能知學者雖或知之而亦鮮能必至於是而不去此為大學之教者所以慮其理雖復而有不純欲雖克而有不盡將無以盡夫修己治人之道而必以是為明德新民之標的也欲明德而新民者誠能求必至是而不容其少有過不及之差焉則其所以去人欲而復天理者無毫髮之遺恨矣大抵大學一篇之㫖緫而言之不出乎八事而八事之要緫而言之又不出乎此三者此愚所以斷然以為大學之綱領而無疑也然自孟子没而道學不得其傳世之君子各以其意之所便者為學於是乃有不務明其明德而徒以政教法度為足以新民者又有耽嗜空寂自謂足以明其明德而不屑乎新民者又有略知二者之當務顧乃安於小成狃於近利而不求止於至善之所在者是皆不考乎此篇之過其能成己成物而不繆者鮮矣曰知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得何也曰此推本上文之意言明德新民所以止於至善之由也蓋明德新民固皆欲其止於至善然非先有以知其所當止之地則不能有以得其所當止者而止之如射者固欲其中夫正鵠然不先有以知其所當中之地則不能有以得其所當中者而中之也知止云者物格知至而於天下之事皆有以知其至善之所在是則吾所當止之地也能知所止則方寸之間事事物物皆有定理矣理既有定則無以動其心而能靜矣心既能靜則無所擇於地而能安矣能安則日用之間從容閒暇事至物来有以揆之而能慮矣能慮則隨事觀理極深研幾無不各得其所止之地而止之矣然既真知所止則其必得所止固已不甚相逺其間四節盖亦推言其所以然之故有此四者非如孔子之志學以至從心孟子之善信以至聖神實有等級之相懸為終身經歴之次序也曰物有本末事有終始知所先後則近道矣何也曰此結上文兩節之意也明德親民兩物而内外相對故曰本末知止能得一事而首尾相因故曰終始知先其本而後其末先其始而後其終也則其進為有序而至於道也不逺矣涑水司馬氏曰明明德所以修身也親民所以治天下國家也君子學斯二者必至於盡善然後止不然不足謂之大學也定者能固執於至善也靜者不為紛華盛麗之所移奪也安者恱而時習之也慮者專精致思以求之也得者入於聖人之道也廣漢張氏曰在明明德成己也在親民成物也而成己成物非二致也又曰在止於至善此則合内外之道㑹人物於一己聖學之淵源也所謂至善者其太極之藴歟蓋明德本也新民末也而本末一事也明明德始也止於善終也而終始一道也此聖學也知止是知所謂至善也止於至善是得其所止而天矣龍泉葉氏曰明德者人之本也治己待人遇事接物以至於死生變故之際皆有至明而不可亂者自衆人而視聖賢疑其所獨至者出於尋常知慮之外以為不可及而不知聖賢由乎天人之常理而無所加損焉理無不明而學者必蒙自蒙以發明如雲霧之除膏火之光昏夜之旦日月之出光輝洞達表裏無間此大學之所以為明也利欲蔽之則不明私意亂之則不明可喜者誘之可畏者挫之與之為敵者障之先有所入者執之此其所以不明也明明德者去其所以不明而已在親民者天地雖大萬物雖多其體同也况於人乎無不得乎吾之所同然者然而人之常情私己而異人其外特為同耳而好惡向背交際往来之間蓋有邱山之崇江河之深不啻若胡越之扞拒者況欲其體萬物為一身天地為一性乎夫是以相戕相殺海内横於三綱九疇隳壊亡滅之禍皆起於此故學莫大於新民反而合之黜而驗之推而通之擴而同之人之與我不相近者幾何知此則然親民矣親民則天地萬物之體可見矣然必至其所止而後可以行必知其所止而後可以學詩曰終南何有有紀有堂君子至止黻衣繡裳聖賢所止之地平易正直廣大堅實滿足於其間而無憾所以能終身由之而不息者其地至善而不可易故也過此則蕩不及此則野觀堯舜禹湯文武孔子之所止則可以見至善之所在矣學者最患於私止而意行之故雖有所止而非善也三者皆大學之要道也而以知止為先鳥止於巢獸止於丘魚止於淵物未有無所止者也未有非其所止而可以强止者也行路者必先定其所止所止既定雖百舎重趼而不敢息焉學不先求其所止則終身之所行者為何事日夜之所講明者為何說是故莫先於知止知止而后有定則向之馳騖者息矣向之嗜玩者亡矣向之往来上下欲進而不能欲退而不決今皆隱然得其所定矣定而后能靜則非對動之靜靜而后能安則非求息之安安而后能慮則非役物之慮慮而后能得則非妄意之得夫是以物見其本末事識其終始辨内外之分審先後之序則德可明民可新窮理盡性以至於命而行於萬物之所同然故曰莫先於知止也范陽張氏曰知止而不己則此止變而為定止猶似用力也定則不用力而深於止矣定不己則動静由我而不由人欲莫易乎動莫難乎靜吾欲靜則靜耳何難之有故謂之能靜山隂陸氏曰若後世學者舉皆躐等生未足知而語死人未足知而語鬼神譬如一葉之在江湖也信風漂流莫知所届矣慮而后能得書曰弗慮胡獲此之謂也建安真氏曰明德乃天賦與之德性也本自光明緣人始生之初所禀之氣不同有禀得清明純粹之氣者則為聖為賢有禀得半清半濁之氣者則為中人全禀昏濁之氣者則為愚不肖此所謂氣禀所拘也及生而為人既有知識與外物接則耳欲聲目欲色鼻欲香口欲味私欲一勝則本心為其所乗遂流於不善而所謂明德者亦從而昏矣此所謂物欲所蔽也人能講學窮理則可以復其本然之性故曰明明德也又曰大學之止至善正是孟子美與大之地位久而不息則大而化之至於聖矣蓋功夫到此已是十分更無可用力者但優游涵泳以俟其自化爾故易曰窮神知化德之盛也横渠曰大可能也化不可能也蓋化則不可用力矣又曰知止者謂知為君必止於仁為臣必止於敬為子必止於孝為父必止於慈方知得此理未曾實到其地能得者謂為君己仁為臣己敬為子己孝為父己慈是實到其地矣又曰定靜安三字相類但有淺深學者用工且從定字起如此心摇動不定如何講得學問窮得義理此心既定方可漸到靜與安之地此心未定便要得靜與安無是理也霅川倪氏曰學者之功用不過脩己安人而已明明德所以修己也親民所以安人也兩者皆欲止於至善也惟人萬物之靈具秉彞之性未有不明者至於昏則物欲有以蔽之譬之於鏡聖人之明德鏡之無塵者也然猶曰明明德者鏡無塵矣更加以磨拭則愈明矣親民者伊川讀親作新以下文作新民為證朱氏祖之然先儒皆不敢改蓋於民言親自有義親近也愛也書曰民可近不可下親近之義也孟子曰親親而仁民親愛之義也聖人為民父母視民如子推愛子之心以愛民不止於近之而已中庸曰子庶民此篇引康誥曰如保赤子又曰此之謂民之父母皆親民之義至善者善而又善進進不已至於大善無地可進乃為至善止者至於其極無進地則止矣然學以知為先先知之而後能行先知可止之地則有定向矣有如所立卓爾之有見其所有之實則可以為凖而後吾心定自此以下言能者必加學力而後能之也物之本則自修身以上者也物之末則自修身以下者也事之宜終者則當治之於其終事之宜始者則當行之於其始物之本事之始則所當先物之末事之終則所當後自本及末順而言之也因終原始逆而推之也又曰以首章言之明明德者先也親民者後也自三章言之致知格物者先也治國平天下者後也晉陵喻氏曰止而定定而靜靜而安安而慮慮而得皆自然而然也非一日而止二日而定三日而靜也錢塘吳氏曰明德者得於此心之同然本自昭明所謂昭明有融者也明明德者所謂自昭明德也人之生也均有是德感物而動或為所蔽非有格物之學以致其知則是德無由而明此大學之道所以在明明德也親民者德明而民親也考諸孟子學記其義本明孟子對滕文公曰學則三代共之皆所以明人倫也先言人倫明於上次言小民親於下而後告以周雖舊邦其命維新子力行之亦以新子之國由孟子之言觀之則親與新之意可見矣孟子所謂人倫即下文所謂君仁臣敬子孝父慈交信者是也大學以明明德言孟子以明人倫言至於論民之親初無異辭又何疑焉學記曰化民易俗近者恱服而逺者懐之化民易俗言其新也近者恱服逺者懐之言其親也由學記之言觀之化民易俗豈非孟子所謂新子之國者乎近者恱服逺者懐之豈非孟子所謂小民親於下者乎則知新者親民之效也親者明明德之驗也此大學之道在明明德所以繼以在親民也如愚新定邵氏曰明明德者成己之事也明德之上不假他語徑以明之一字重複言之則知至明之德己所自有君子非能有所増加於此心之外也特明其明而使之勿蔽耳易曰君子以自昭明德是也新民者成物之事也味新之一辭則知導民有方化民以漸民日遷善而不知為之者所以為新民之道也易曰君子以振民育德是也夫始於明明德己而新其民復繼之曰在止於至善何也蓋至善即明德新民極致之地明德而未極於至善則其明為未周新民而未極於至善則其化為尚淺此緫論大學之道在乎明德新民止於至善也繼此即言知止之在所先焉止者何至善是也至善者明德新民所止之地而吾宅心措躬之所也果知乎此則天下之事事物物皆由此出雖變態萬狀不能以惑吾之所見異議紛紜不能以奪吾之所得如此而后有定所見既定則道之本體不外此心心境内融寂然無際如此而后能靜靜則日享恬澹之樂而無外馳之勞夫是以能安安則靈扄湛然常明而無物慾之蔽夫是以能慮慮則事之隱微曲折無不瞭然洞見矣夫是以能得知止者其本也慮而能得者其末也知止者其始也慮而能得者其終也金華邵氏曰安靜慮得皆曰能而定獨曰有者蓋天下事物皆有定理惟無所止則自為遷轉今既知之則能有諸此而不失也若其他能乎彼始能乎此耳物也知也意也心也以至於身與國家天下皆物也曰格曰致曰誠曰正以至於修齊平治皆事也其理雖一貫而本末終始自有次第惟能知本與始在所當先末與終在所當後則由己以成物此道雖未可徑造然亦不逺矣道即大學之道也嚴陵方氏曰物與事一也物固無非事事固無非物曰物則以形言之也形故有本末曰事則以理言之也理故有終始古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平自天子以至於庶人壹是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也孔氏曰此經從盛以本初又從初以至盛上下相結也河南程氏曰致知則有知有知則能擇又曰涵養須用敬進學則在致知伊川又曰知者吾之所固有因物有遷則迷而不知迷而不知則天理滅矣故聖人欲格物以致其知也又曰格至也格物言窮理也但立誠意去格之其遲速却在人明暗也明者格物速暗者格物遲又曰凡一物有一理須是窮至其理窮亦多端或讀書講明道理或論古今人物别其是非或應接事物皆窮理也又問格物者物物而格之乎將格一物而萬理皆知也曰雖顔子亦但聞一知十而已豈敢自謂如此及其達理之後則雖億萬可通矣學者須是徧求若能今日格一物明日又格一物積習既多然後脫然有貫通處伊川又曰物不必事物然後謂之物也自一身之中至萬物之理理會得多相次自然豁然有箇覺處又曰所務於窮理者非謂盡窮了天下萬物之理又非謂窮得一理便到只是要積累多後自然見知又曰格物之理不若察之於身尤切又曰或問格物是外物邪性中物邪曰不拘凡眼前無非物也物物皆有理如火之所以熱水之所以寒至於君臣父子之間皆是理也又曰物理須是要窮若言天地之所以髙深鬼神之所以幽顯若言天只是髙地只是深則是已了復何可窮之有又曰格物窮理非是盡要窮天下之物所謂窮理也但於一事上窮得盡則其他可以類推矣至如言孝須窮所以為孝者如何所謂窮理也如一事上窮不得即且别窮一事或先其易者或先其難者各隨人淺深譬如千蹊萬徑皆可適國但得一道入得斯可矣所以能窮者只為萬理皆是一理至於一事一物雖小皆有是理伊川又曰隨事觀理而天下之理得矣又曰物来則知起物各付物不役其知則意誠不動意誠自定則心正始學之事也明道又曰入道莫如敬未有致知而不在敬者今人立心不定視心如宼賊而不可制非事累心乃心累事當知天下無一物是合少得者不可惡也又曰知至意須誠若知而不誠者皆知未至耳又曰知之既至其意自誠其心自正顔子有不善未嘗不知知之未嘗復行他人復行知之不至也又曰大學論意誠已下皆窮其意而明之獨格物則曰物格而后知至此蓋可以意得而不可以言傳也自格物而充之然後可以至於聖人不知格物而先欲誠意正心修身未有能中於理者也或問進修之術何先曰莫先於正心誠意而誠意在致知致知在格物或問忠信進德之事固可勉疆然致知甚難曰予以誠意可勉疆且恁地說至底湏是知了方行得若不知只是覷却堯學他行事無堯許多聦明叡知怎生得他動容周旋中理有諸中必形諸外德容安可妄學如子所言是篤信固執之非固有之也未致知便欲誠意則是躐等也學者固當勉疆然不致知怎生行得勉疆行者安能持久除非燭理明自然樂循理性本善循理而行是順理事本亦不難但為人不知旋安排著道難也知有多少般數然有深淺向親見一人曾為虎所傷因言及虎色便變旁有數人見他說虎非不知虎之猛可畏然不如他說了有畏懼之色蓋真知虎者也學者深知亦如此且如說膾炙貴公子與野人莫不皆知其美然貴人聞著便有欲嗜之色野人則不然學者須是真知才知得便泰然行將去也某年二十時解釋經義與今無異然思今日覺得意味與少年自别又曰知至則當至之知終則當遂終之須以知為本知之則行之必至無有知之而不能行知而不行是知得淺飢而不食烏喙人不蹈水火只是知人為不善只是不知知至而至之幾之事故常至知終而終之故可與存義知至是致知博學明辨審問慎思皆致知知至之事篤行便是終之如始條理終條理因其始條理故能終條理猶知至即能終之或問今人有志於學然知識蔽固力量不至則如之何先生曰只是不致知若致知則知識自當漸明不曾見一物事終思不到也知識明則力量自進問何以致知曰能明理或多識前言往行識之多則理明然全在强勉伊川濂溪周氏曰治天下有本身之謂也治天下有則家之謂也本必端端本誠心而已矣則必善善則和親而已矣家難而天下易家親而天下疏也家人離必起於婦人故暌次家人以二女同居而其志不同行堯所以釐降二女于媯汭舜可禪乎吾斯試矣是治天下觀於家治家觀於身而已矣身端心誠之謂也誠心復其不善之動而已矣不善之動妄也妄復則无妄矣无妄則誠焉故无妄次復而曰先王以茂對時育萬物深哉横渠張氏曰一國一家一身皆在處其身能處一身則能處一家能處一家則能處一國能處一國則能處天下心為身本家為國本國為天下本心能運身心所不欲身能行乎又曰虚心則能格物格物則能致知其擇善也必盡精微無毫髮之差無似是之疑原始要終知不可易然後為至也又曰致知在格物格去也格去物則心始虚明見物可盡然後極天下之慮而能思善也致知者乃爲學之大本夫學之始亦必先知其一貫之道其造則固有序也格物外物也外其物則心無蔽無蔽則虚靜虚靜故思慮精明而知至也涑水司馬氏曰人之情莫不好善而惡惡慕是而羞非然善且是者蓋寡惡且非者實多何哉皆物誘之也物迫之也桀紂亦知禹湯之為聖也而所為與之反者不能勝其欲心故也盗跖亦知顔閔之為賢也而所為與之反者不能勝其利心故也不軌之民非不知穿窬探囊之可羞也而冒行之驅於饑寒故也失節之臣非不知反君事讎之可愧也而忍處之迫於形禍故也况於學者豈不知仁義廉耻之尚哉斗升之秩錙銖之利誘於前則趨之如流水豈能安展禽之黜樂顔子之貧乎動色之怒毫末之害迫於後則畏之如烈火豈能守伯夷之餓徇比干之死乎如此則何暇仁義之思廉耻之顧哉不惟不思與不顧也抑亦莫之知也譬如逐獸者不見泰山彈雀不覺露之霑衣皆物蔽之也故水誠清矣泥沙汨之則俛而不見其影燭誠明矣舉掌翳之則咫尺不辨人睂目况富貴之汨其志貧賤之翳其心哉惟好學君子為不然己之道誠善也是也雖茹之以藜藿如粱肉臨之以鼎鑊如茵蓆誠惡也非也雖位之以公相如塗泥賂之以萬金如糞壤如此則視天下之事善惡是非如數一二如辨白黒如日之出無所不照如風之入無所不通洞然四達安有不知者哉所以然者物莫之蔽故也於是依仁以為宅遵義以為路誠意以行之正心以處之修身以帥之則天下國家何為而不治哉大學曰致知在格物格猶扞也禦也能扞禦外物然後能知至道矣藍田吕氏曰致知在格物格之為言至也致知窮理也窮理者必窮萬物之理同至於一而已所謂格物也合内外之道則天人物我為一通晝夜之道則生死幽明為一達哀樂好惡之情則人與鳥獸魚鼈為一求屈伸消長之變則天地山川草木人物為一孔子曰吾道一以貫之又曰天下同歸而殊塗一致而百慮又曰天下之動貞夫一者也故知天下通一氣萬物通一理此一也出於天道之自然人謀不與焉故大學之序必先致知致知之本必知萬物同出於一理然後為至一物之不至則不能無疑疑存乎胷中欲至于誠不啻猶天壤之異千萬里之逺欲卒歸于道而無惑難矣知萬物同出於一理知之至也故曰物格而後知至知至則心不惑而得所止心不惑而得所止則意誠矣故曰知止而後意誠意誠則慎獨慎獨則不為異端所移不為異端所移則心正矣故曰意誠而後心正身者視聽言貌之謂也心正而視聽言貌之不正者未之有也所謂心誠求之雖不中不逺矣有是心也則未有不謹於禮故曰心正而後身修自身修而上在己者也自家齊而下在人者也合内外之道則身也家也國也天下也無逺近之間無彼我之異特施之有先後而已意誠身修則德諧頑嚚矣家有不齊者乎老以及老幼以及幼妃以及妃子以及子舉斯而加諸彼國有不治者乎國與天下小大之間爾推是心也無所往而不可此所以天下平也及人之功自天子以至於庶人皆自修身始有諸己而後責諸人無諸己而後非諸人己則不修而責人之修可以力服而不可以心服此末世之所以不能治也於所厚者薄則無所不薄此管仲所以知公子開方奄人豎貂易牙卒不忠於桓公也故本末先後之序天地也父子也君臣也差之毫氂則天地易位違道逆理則必至於大亂故君子不可以不知知此則近道矣此謂知本此謂知之至也上蔡謝氏曰格物窮理也物物皆有理自然之理也窮理則是尋個是處格物必至於知至故必知至然後能意誠窮理之至自然不勉而中不思而得從容中道問理須物物窮否曰理一而已一處通則觸處皆通物雖細者亦有理思其窮理之本歟又曰明道先生敎人先使學者有所知識却從敬入所謂有知識須是窮物理只如黄金天下至寶須先辨認得體性始得不然被人將鍮石来喚作黄金辨認不過便生疑惑纔有疑惑便執不定故經曰物格然後知至知至然後意誠所謂格物窮理須是識得天理始得所謂天理者自然道理無一毫杜撰今人乍見孺子入於井皆有怵惕惻隱之心方乍見時其心怵惕所謂天理也要譽於鄉黨内交於孺子父母兄弟惡其聲而然即人欲耳天理與人欲相對有一分人欲即减却一分天理有一分天理即勝得一分人欲人欲纔肆天理滅矣任私用意杜撰做事所謂人欲肆也延平楊氏曰致知在格物言當極盡物理也理有不盡則天下之物皆足以亂吾之知思於正心誠意逺矣又曰學始於致知終於知止而止焉致知在格物而物固不可勝窮也反身而誠則天下之物在我矣詩曰天生烝民有物有則凡形色之具於吾身無非物也各有則焉目之於色耳之於聲口鼻之於臭味接乎外而不得遁焉者其必有以也知其體物而不可遺則天下之理得矣天下之理得則物與吾一也其有能亂吾之心思而意其有不誠乎由是而通天下之志類萬物之情賛天地之化其則不逺矣則其知可不謂至矣乎知至矣則宜其有止也譬之四方萬里之逺不可禦也苟無止焉則將焉歸乎故見其進未見其止孔子之所惜也又曰夫聖人人倫之至也豈有異於人乎哉堯舜之道曰孝悌不過行止疾徐而已皆人之所日用昧者不知也夏葛而冬裘渴飲而飢食日出而作晦而息無非道者譬之莫不飲食而知味者鮮矣為是道者必先乎明善然後知所以為善也明善在致知致知在格物號物之多至於萬則物蓋有不可勝窮者反身而誠則舉天下之物在我矣又答胡處晦書曰示喻欲持忍字某竊謂學者以致知格物為先知之未至雖欲擇善而固執之未必當於道也人避鼎鑊陷穽者以其知之審故也致身下流天下之惡皆歸焉固無異於鼎鑊陷穽也而士或蹈之而莫之避以其未嘗真知之故也使其真知為不善如蹈鼎鑊陷穽則人孰有為不善者若夫物格而知至則目無全牛遊刄自有餘地矣不待忍而能也忍而不為恐物或誘之有不可忍者更切勉之又曰自修身而至於平天下莫不有道焉而皆以誠意為主苟無誠意雖有其道不能行也故中庸論天下國家有九經而卒曰所以行之者一一者何誠而已蓋天下國家之大未有不誠而能動之也然則非格物致知烏足以知其道哉大學所論誠意正心修身治天下國家之道其源乃在乎格物推之而已若謂誠意便足以平天下則先王之典章文物皆虚器也故明道先生嘗謂有關雎麟趾之意然後可以行周官之法度正謂此耳或問曰正心誠意如何便可以平天下曰後世自是無人正得心正得心其效自是如此心一念之間毫髪有差便是不正要得常正除非聖人始得且如吾輩還便敢道心已得其正否此須於喜怒哀樂未發之際能體所謂中於喜怒哀樂已發之後能得所謂和致中和則天地位萬物育其於平天下也何有因論孟子直以禹稷比方顔子只顔子在陋巷時如禹稷事業便可為之無難若正心誠意不足以平天下則禹稷功業巍巍如此如顔子者如何做得又曰正心到寂然不動處方是極處以此感而遂通天下之故其於平天下也何有武夷胡氏曰格度也猶曰品式也所謂物之則也又曰夫窮理盡性乃聖門事業物物而察知之始也中人所可能者一以貫之知之至也非上知不與焉是故以子貢之明達猶疑於其師以為多學而識之也且置是事而以致知格物為先物物而察則知益明心益廣道可近矣然物物而察者又豈逐物而不知反哉又豈以己與物為二哉察於天行以自强也察於地勢以厚德也察於雲雷以經綸也察於山泉以果行也察於日月通晝夜也察於尺蠖明屈伸也逺察諸物其畧如此察於耳目身舌克私心也察於辭貌顔色尊德性也察於灑掃應對兼本末也察於心性四體養浩然之氣也近察諸身其要如此無所不在者理也無所不有者心也物物致察宛轉歸己則心與理不昧故知循理者士也物物皆備反身而誠則心與理不違故樂循理者君子也天地合德四時合序則心與理為一無事乎循矣故一以貫之聖人也豈易言哉釋氏雖有了心之說然疑有未了者正謂不先窮理反以理為障也故窮大而失其居失其居則旅人也故無地以崇其德儒者則以致知為始以窮理為要知至理得不昧本心如日方中萬象皆見則不疑其所行而内外合也故自修身至於天下國家無所處而不當矣夫適千里者必得路頭而路有險夷通塞故知窮理心如户牖既夷且通息念坐襌心如墻壁既險且塞擇斯二者將孰從乎安國禮記集說卷一百四十九
