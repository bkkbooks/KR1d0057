body:
  text: 禮記集說卷二十四宋衛湜撰王制第五孔氏曰案鄭目録云王制者以其記先王班爵授祿祭祀養老之法度此於别録屬制度王制在秦漢之際知者下文有正聽之鄭云漢有正平承秦所置又有古者以周尺之言則是周亡之後也鄭答臨碩云孟子當赧王之際王制之作復在其後盧氏曰漢文帝令博士諸生作此王制之書石林葉氏曰有土此有民有民此有政孟子曰仁政必自經界始由王者之制祿爵而至千里之內以為御其分田制祿為詳所以正經界也經界正則榖祿平而封地所以為祿也所封有小大而守土之臣必以小大相屬故自千里之外設方伯以至下大夫一命其言建侯設官尤備所以次之封地也建侯設官既授以政而才不可以不辨其任惡不可以不正其刑故自凡官民材以至不及以政皆擇人之法所以次之設官也設官以守乎外天子以專治乎內其勢不相及也外不朝觀於天子則無以述職內不巡守於諸侯則無以見所守故自比年一小聘而至一德以尊于天子皆巡守朝聘之制所以次之擇人也巡守所以考績考績所以黜陟陟明則有賜黜幽則有罰有罰不足懲則加之以兵故自天子賜諸侯樂以至出征執有罪皆黜陟之法所以次之巡守也有罪而致討既加之以兵兵不可無備習兵以田獵則有備矣因田獵而暴天物則無輔相裁成之道故自無事則歲三田以至不夭夭不覆巢皆交物之道所以次之出征也交物之以道而財所以聚人尤不可無節故自冢宰制國用以至天子食日舉以樂皆用財之節所以次之交物也財用足可以興禮而禮之大者莫加于喪祭故自天子七日而殯以至寢不踰廟皆喪祭之禮所以財用足也征稅則取財未及于生財居四民時地利所以生財也故自司空執度度地以至樂事勸功皆生財之道所以次之征稅也冢宰所職者邦治而治所以平邦國司空所職者邦事而事所以富邦國既富矣斯教之故自司徒修六禮以及樂正立四教升諸司馬曰進士皆教之大成所以次之生財也司徒樂正能教以成其材未及辨其材司馬論所長而授之以政材者辨矣然而君子取人不一道或以德或以事或以言故自司馬辨論官材以至出鄉不與士齒皆論辨之道所以次之教也司馬所授者邦政而刑者所以輔政之不及也君子恕己以慎刑則審刑而後用治定而正刑則必誅而無赦故自司寇正刑明辟以至四誅不以聽皆審克必誅之意所以次之政也有刑則有憲禁以示之則正其未然刑以侀之則懲其已然故自圭璧金璋不粥于市以至禁異服識異言皆于未然而止之所以次刑也為治至于政刑而治道已備而事功成矣百官於是歲終以程功緒而考其廢置故自天子受諫百官受質皆在于廢置所以次之刑禁也天子受諫于上則有道揆百官受質于下則有法守而道德一于天下治之所終也然而養耆老以致孝恤孤獨以逮不足則王道之始經界正穀祿平則仁政之始故自休老勞農以至諸侯大夫不世爵其言養老恤孤分田制祿亦所以成始也王制所論其序如此然而九州之地近于誣誕朝聘之言疑于晉文所制又可疵也髙氏文虎曰王制一篇皆先王治天下之規模而本末先後未嘗無定序也夫王者之制莫大于設官分職班爵制祿分地建國以為斯民之極故必使內外相維上下相制井然有不可踰越之法是誠立國之本也故王制以此為首然次之以朝聘又次之以巡守者蓋慮夫天下平治而人情易忽此所以達夫上下之壅蔽者也又次之以田獵又次之以國用者蓋慮夫君心縱逸而暴于苛斂此所以寓夫仁民愛物之意者也因國用言喪祭又申之以君臣上下喪祭之等此皆紀綱制度所在有國者之所慿藉扶持不可不先講明者也夫然後始及養民而有不征不稅等事又及于居民而皆從宜從俗之道斯民由是安居樂業而亷恥禮義之心生故繼之以興學其教之而成材者則用之其不率教者則去之教化既行然其間頑民終不可以德化故次之以刑罰民之所以干冒刑禁其根本乃在于市㕓之間見利而必爭邪侈之盛多先王禁之故次之以市治之大體既舉于是乎一歲之終天子冢宰而下至六官齊戒受諫或受質或從而受質君臣之間參稽互考必欲見其歲成之如何大經大法定矣此所以休老勞農成歲事因繼之以養老恤矜寡孤獨也夫後世之所以多凶年饑歲皆上之人有以奪其田疇故人至于流莩于是定經界之法辨古今之尺使天下之地盡可井庶幾斯民悉歸于安生樂業而人君亦得以分田制祿矣雖然欲使人君盡行古制天下盡從王者之制其本又在于人倫天理之不失此所以終之以六禮七教八政歟嗚呼王制一篇本末先後不差如此嘗讀孟子以為周室班爵祿諸侯惡其害己而皆去其籍以此知天下莫先于此王制所以冠之于首又曰暴君汙吏必慢其經界又知天下莫急于此王制所以奠之于終讀王制者其深考之龍泉葉氏曰王制一篇當時蓋欲施用而博士諸生考論之所成異于各以見聞記録者故比諸篇頗為斟酌亦有次第然孔子時周衰而未亡聖人之力尚能合一以接唐虞夏殷之統故其所述皆三代之舊至孟子時六國並雄則周已亡但未滅耳其所欲行于當世與孔子已稍異不惟孟子雖孔子復出亦不得同矣秦滅漢興酈食其請立六國後而張良以為非及文帝初賈誼所言正朔官名色尚黃數用五而已中年誼已死新垣平得用始有作王制封禪巡守之說夫堯舜三代以禮讓守天下而類禋封禪巡守皆為實治漢以兵取以力守而儒生學士欲以虗文追還帝王之道耶然則治後世之天下而求無失乎古人之意蓋必有說非區區陳迹所能干也孫氏景南曰案前漢郊祀志文帝使博士諸生刺六經中作王制謀議巡守封禪事則知禮記之書雜出于漢儒明矣特其時去古未逺老師宿儒得于載籍之記傳聞之舊網羅三代之令典尚足垂當年而詔後世也若王制之所採自分田之法建國之制設官爵命之數朝聘巡守之禮喪祭之儀征役之限以至冢宰制國用司馬論官材司空度地居民司徒修明禮教司冦正刑明辟與夫海內地域之廣狹內外諸侯之多寡大略盡矣苟以為非古制豈漢儒以意言之歟大抵秦漢以下謀國者類為一切簡便無復古人之意有如統諸侯之權自五國則有屬長十國則有連帥三十國則有卒正二百一十國則有州伯此豈後世維持郡國者所暇及也舉賢之法論于鄉則為秀士論于司徒則為選士升于學則為俊士論于大司樂而後為造士論于司馬而後為進士蓋官之爵之祿之猶有所待則豈後世選用人才所暇及也聽獄一事也史以獄成告于正正聽之而告于司冦司寇又聽之而告于王王命三公參聽之而後以告于王王三宥然後行刑焉何其謹之至也受質一事也司㑹以其成質于天子而冢宰受之以退司徒司馬司空又以質于天子而百官受之以退又何審之詳也非三代之法其孰能與于此然苟以為先秦古書而非漢儒綴輯則其間盡不免有所抵牾也觀其論執役以事上者祝史射御醫卜百工皆不得與士齒周禮以是數者並列于六官之屬其非也古之所謂史者非止星厯而已執簡記載實兼職焉其權猶重于宰相左氏亦言日官居卿非卑職也大史公自嘆文史星厯近于卜祝之間主上以俳優蓄之此漢人失古之意謂不與士齒不可也古者取士莫重于射諸侯貢士天子親試于射宫至于大射賔射燕射自天子諸侯至卿大夫士皆有事焉又安得不與士齒至論古今周尺古之畝非今之畝古之里非今之里則非先秦古書明矣而吾之所以為漢儒恨者博士諸生能考古制而不能說時君以復古之萬一遂使漢家一代制度苟簡闊略後之有志于古者無復可考要必有任其責者矣知古之建國八州至于千八百國何為諸侯王之地連城數十不能稍損其權遂使好亂者相挺而起也知古之朝聘以三年五年為期何為春朝秋請一聽諸侯之便遂使有詐病不朝之國也知古之授田皆以百畝為限何為使富者連阡陌貧者無立錐之地若是其不等也知古之巡守初無封禪之禮何為受獻諛之說立中和之制以啓後世之侈心也知喪制之不可踰何為而以日易月也知祭禮之不可瀆何為祀五帝于雍也知征稅之有限何為算賦獻賦之不一其輸也知用民之有限何為更卒戍卒之不一其役也知辨論官材如此其審何為負俗之纍者猶不擇也知司空居民量地置邑何為徙豪傑于諸陵不恤土狹民多之患也知司寇之正刑審諦輕重何為既除收孥相坐之律而復有三族之夷也知司徒之教如此其詳何為廢先王德教之官而任執法之吏也知司市之禁如此其嚴何為弛商賈之律使得操竒贏以乘上之急也論者皆以為遭秦絶學而古制不可復識究觀諸生之所考亦既詳矣文帝能使人論次其書而不能用與葉公好龍何異吾嘗論漢人不能復古覽王制之書每為之太息也江陵項氏曰王制之言爵祿取于孟子其言巡守取于虞書其言歲三田及大司徒大司馬大司空三官則皆取于公羊氏其言諸侯朝聘之節則取于左氏其餘必皆有所授蓋文帝合漢初今文博士之傳斟酌增損共為一書將以興王制致太平者其說自應與古文諸書不合鄭康成無䇿以通之强為之說曰此殷制也自是凡不可通者皆以此語斷之豈非遁辭也哉永嘉徐氏曰王制一書敘次三王四代之制度蓋聖王所以經綸天下之大經而為萬世法程者也其書推明班爵制祿之法祭祀養老之義其立國之紀綱制度講若畫一而不相踰越三代所以享國長久雖有辟王而維持者不亂蓋得其道矣周衰上無道揆下無法守諸侯壞亂法紀以隳先王之制多矣暴君汙吏慢其經界而井地之制孟子僅聞其略諸侯惡其害己皆去其典籍而班爵祿之制孟子不聞其詳凡先王之舊典禮經蓋僅有存者自秦變井地為阡陌壞封建為郡縣而分田制祿之法一切掃地此漢儒思古而王制所為作也王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等鄭氏曰二五象五行剛柔十日祿所受食爵秩次也上大夫曰卿孔氏曰此一經論為王者之制祿爵公侯卿大夫以下及士之法大都總記三王制度凡王者之制祿爵為重祿者穀也故鄭注司祿云祿之言榖年榖豐乃制祿爵者盡也故白虎通云爵盡也所以盡人才也案下文云位定然後祿之又大司徒云以賢制爵以庸制祿並祿在爵後此祿在爵前者蓋此經下文先云天子之田乃云諸侯之田次云制農田又云下士視上農夫祿又君十卿祿下始云次國上卿當大國中卿是後云爵也其食祿受爵之人有公侯伯子男並南面之君法五行剛日甲丙戊庚壬凡五等其諸侯之下北面之臣有上大夫卿有下大夫有上士有中士有下士法五行柔日乙丁己辛癸凡五等也元命包云公之為言平也公平正直侯者候也候王順逆伯之為言白也明白于德子者奉恩宣德男者任功立業案此五等虞夏及周制殷則三等公侯伯也此公侯伯子男獨以侯稱者舉中而言又爾雅以侯為君故也上大夫卿者下文云下大夫倍上士卿四大夫祿是下大夫之上則有卿故知上大夫即卿也此上大夫卿外惟有下大夫而下文卿外更有上大夫下大夫者謂就下大夫之中更分為上下耳白虎通云卿者嚮也為人所歸嚮也大夫者達人謂扶達于人士者事也長樂劉氏曰王制者言為天下之王作民父母者當立法度節制財用以安天下之民使不陷于凍餒故曰王制也易曰地上有水比先王以建萬國親諸侯言先王有親比萬民之道者必先建萬國親諸侯使之各養其民而教之禮義也是以此經以建侯崇德為首設官分職為次皆所以皇建其有極也公侯伯子男凡五等者所以差其德而尊崇之于萬民之上俾之行道以為其國表則也又設上大夫卿凡五等以佐佑其君之德奉天子之禮用中于其民者也堯舜禹湯文武之有天下也其制祿爵莫不如是故周公思兼三王以施四事為之六典乃曰惟王建國辨方正位體國經野設官分職以為民極自天子至于五等之國莫不執是以為大經然後輔之以禮樂政刑焉不曰崇其德行為表則哉長樂陳氏曰公侯伯子男至中士下士爵也天子之田至君十卿祿祿也爵以貴之非王爵之則無貴祿以富之非王祿之則無富故周官太宰內史司士之於爵祿皆詔王而已此所以言王者之制祿爵也制爵以德制祿以功德有厚薄故爵有崇卑功有多寡故祿有豐殺周官凡言爵祿皆先爵而後祿記亦曰任官然後爵之位定然後祿之此先祿而後爵者蓋田不分不可以制祿祿不制不可以定爵先王量財以制用視祿以制爵然後無有餘不足之患矣然則爵祿者班爵祿之序也祿爵者制爵祿之序也由公至男凡五等皆君也由諸侯之上大夫卿至下士凡五等皆臣也君之德純故公侯伯子男無上中下之辨臣之德不必純故大夫士有上中下之差然皆止五等者五者天地之中數先王制法莫不本之故五典五禮五服五刑皆謂之天則制爵之等亦本其自然而已孟子曰天子一位公一位侯一位伯一位子男同一位凡五等君一位卿一位大夫一位上士一位中士一位下士一位凡六等與此不同者此言制爵之法孟子言班爵之法制之出于天子故不必言天子班之首于天子與君故兼天子與君言之也制爵祿止于諸侯與其臣而不及王朝之臣者蓋制諸侯與其臣之祿則以農田為差制王朝公卿大夫之祿則以諸侯為視制爵之法亦若是而已此所以不言之也有爵者必有祿有祿者不必有爵庶人在官非有爵也而其祿有差則祿之所施非特有爵者而已故于其所制者不先以爵而先以祿也嚴陵方氏曰先爵而後祿者貴賤之序也先祿而後爵者衆寡之序也以貴賤為之序故孟子言班爵祿蓋班其貴賤之分故也以衆寡為之序故王制言制祿爵蓋定其衆寡之數故也此文雖以祿爵為序其事又以爵祿為序者蓋制之之實未始不班故也諸侯以上大夫為卿周官言大宰卿小宰中大夫則卿上大夫也以上大夫為卿非特諸侯為然矣此不言中大夫者諸侯故也天子諸侯之設官必如是者何也蓋先王之意爵欲正其名也故官必特置祿欲省其費也故職或兼掌然治在所合者雖大不必特置若三公九卿之類是矣事在所專者雖小不可兼掌若蟈氏射鳥氏之類是矣豈嘗有拘哉亦惟其稱而已管仲以官事不攝而孔子非之者主掌者言也桓公欲官事無攝而孟子取之者主置者言也卿大夫士有上下之别公侯伯子男則無之者君道尊而臣道卑之辨故也孟子五等以子男合為一此則離為二者蓋彼所言者位之等也此所言者名之等也位雖子男之所同名則子男之所異故也且王制兼三王之所制孟子則指周室而已故其間不能無小異焉延平周氏曰言制祿爵止于諸侯與其臣而不及王朝之臣何也王朝之臣入則為公卿大夫出則為公侯伯子男而其祿又同故言五等之君則兼之矣孟子曰天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等與此五等不同何也諸侯有君道有臣道有君道故與天子同為五等有臣道故與其臣又同為六等子男之祿同五十里故可以言同一位中士之祿倍下士下士之祿與庶人在官者同故不可言同一位此所以有六等也山隂陸氏曰此言諸侯之上大夫卿下大夫則無中大夫可知周官公之卿三命其大夫再命蓋下大夫也然則王制下卿再命不言不過容有過此者矣凡大國之卿則以三命為正小國之卿以再命為正于天子言五等君爵于諸侯言五等臣爵亦言之法周官司服言公之服自衮冕而下如王之服孤之服自希冕而下如子男之服蓋亦如此石林葉氏曰四代之禮預有于其中而特稱王者以王制之也祿以詔功爵以詔德皆王者之事故制其等則自公至于下士爵之名也自天子之田方千里至庶人在官者祿之差也近天子而爵盛大故必以無私為德故稱公逺天子而障扞于外欲其有所屈故稱侯伯侯伯長也言其道足以長人子宗也養也言其道足以養人男任也言其道足以安人五等者臣乎天子也諸侯之有一國亦人君也有君莫不有臣故近諸侯欲其承上羣而不黨而知進退則曰卿上以忠扶君下以智帥人則曰大夫志有所尚仕有所事則曰士王以譬則天也其臣之數則有公侯伯子男有卿大夫士諸侯以譬則地也其臣之數止于卿大夫士而不可以稱公侯伯子男雖附庸不合于天子朝貢不能以自通附于其國亦非所以臣之者以地統于天也地統于天則雖其卿大夫士猶不能純臣于諸侯天則統地故雖諸侯為君亦必純臣于天子永嘉徐氏曰先王視賢以制爵視庸以制祿祿爵二柄聖王所以辨儀等定名分立國維綱與天下共守而不相踰越者也夫自寰外諸侯五等之差而下及于五等諸侯之異皆爵以命有德者也自天子田千里之外而下及于三等侯國之地皆祿以命有功者也祿爵之經制一定使上下有紀內外相維而立國之大意見矣叔季以來王綱不舉而諸侯卿大夫守先王之訓者無幾子産相鄭一知守周班列之爵而晉楚不敢加兵晏子叔向之徒獨不肯輕受祿地以守先王之舊蓋猶為秉周禮者自是之外天子建國而甸侯乃欲建國天子一圻而列國乃至數圻魯三家至三分公室而各有其一諸侯卿大夫迭相越等踰制而爵位亂矣伯氏之微駢邑三百施氏之宰有百室之邑祿地妄以子人而不復古制矣故周室班爵祿之制諸侯知為己不利而皆去其典籍蓋先王班爵授祿之法已亡于孟氏之時矣天子自邦畿千里之外皆分土以為諸侯守而畿外有五等諸侯交錯面內以尊天子蓋自堯協和萬邦之諸侯至舜輯五等諸侯之瑞而班之修五禮五玉而執圭璧者不相亂則是五等之爵自堯舜以來未之有改而謂殷爵為三等非也鄭氏謂公百里侯七十里伯五十里武王爵列以五土分以三蓋襲殷之舊耳至周公從而增損其制上公五百里至男百里蓋指開方言之其實去王制不大相逺矣且王制五等之爵猶天建地設不可亂也及春秋時禮制既亡伯者以意之嚮背為升降諸國以勢之强弱相上下㑹盟征伐又以先後易其序如曹伯把伯也而或居子男之下僖公成公時楚子夷也而或居侯伯之上僖二十一年二十七年諸侯不勝其紊有如魯以周班後鄭而鄭忽敢怒威六年楚以先歃晉而晉不敢辭滕薛爭長則曰我先封蔡衛爭先則曰非尚年也逞其私意而不顧王爵而使大小相維上下相統之意蔑然矣春秋嚴名分之書以見亂之所由也則儀位以為階防微杜漸且記王制之失也秦壞封建為郡縣而五等之爵亡矣至漢剖裂疆土二等之爵同姓則王有功則封侯然後王踰制建城數十倔强而不可制削地之書一下七國合從以逆京師至于漢初封侯之約自景帝以後始不以有功封而壞漢制矣東京爵亦二等皇子封王自郡而國然列侯雖寇鄧元勳不過四縣無功臣葅醢之虞而同姓之王亦未聞有七國之變蓋矯漢之過制而得其道矣又曰諸侯有君道于天子之國則北面于其國則南面蓋禮不純臣而得以自臣妾其境內也列國有三卿五大夫二十七士大國三卿司徒司馬司空是也此固命于王朝而侯國之長官也諸侯自天子命卿之外凡卿大夫各自舉任而皆得專之則是諸侯之臣不皆命于天子而甸外之官吏乃諸侯牧伯之事也其諸侯之臣唯中大夫元士别異于天子周禮天子六官之正皆卿而其二則中大夫小宰中大夫二人公侯伯之士雖一命不得稱元士其餘自上大夫至下士諸侯之臣其名號與天子之臣均爾蓋王朝之臣則畿內之諸侯皆事王者也而得以食畿內之采地諸侯之臣臣事諸侯而食其國之祿王制論五等諸侯所以不言王朝之臣而自官其國之臣也春秋列國官制蓋無復王制之舊宋制官之制置左右二師以擬三公而又有六卿無等甚矣晉三軍之制將佐皆卿至于司馬司空實位大夫之列天子之卿僅存其號爾廢命卿之制而遍置私人先王制度蓋蕩然矣秦之世懲諸侯之世襲而得以私自用其人故收天下之版圗凡四海之內皆制于天子而郡守縣令皆擇于朝廷郡縣之權既輕而不得有所為矣漢興因秦之弊而反之藩國百官制同京師吏四百石得自調除唯丞相命于天子其御史大夫以下皆自置其不得輒置之者傅相中尉侯二千石者耳蓋諸侯官吏上同漢朝徒知所以矯秦之弊而為之而不知其制同京師則過甚矣方其盛也淮南悼惠私自置二千石而漢法不敢加天子之法令且不行于諸侯矣其後景帝懲吳楚之亂抑損其權罷諸侯御史大夫官而改丞相曰相蓋所以别異之而不使與漢朝同制也至其盛也天子自為衡山置吏六百石以上蓋無復四百石得自調除之意而諸侯之權益輕終漢之世猶有所謂州郡佐吏自别駕長史縣令刺史太守得自辟除為少近古若諸侯之官制則終始皆失之矣天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合于天子附於諸侯曰附庸鄭氏曰天子之田象日月之大亦取晷同也此謂縣內以祿公卿大夫元士也公侯以下皆象星辰之大小也不合謂不朝㑹也小城曰附庸附庸者以國事附於大國未能以其名通也此殷所因夏爵三等之制也殷有鬼侯梅伯春秋變周之文從殷之質合伯子男以為一則殷爵三等者公侯伯也異畿內謂之子周武王初定天下更立五等之爵增以子男而猶因殷之地以九州之界尚狹也周公攝政致太平斥大九州之界制禮成武王之意封王者之後為公及有功之諸侯大者地方五百里其次侯四百里其次伯三百里其次子二百里其次男百里所因殷之諸侯亦以功黜陟之其不合者皆益之地為百里焉是以周世有爵尊而國小爵卑而國大者唯天子畿內不增以祿羣臣不主為治民孔氏曰自此至附庸一節論天子畿內之田及畿外五等諸侯及畿內公卿受地多少之法案元命包云日圓望之廣尺以應千里故鄭注云象日月之大鄭注司徒云凡日景于地千里而差一寸是千里同一寸也細而言之就千里之內亦漸漸分數不同此云同一寸者大略言之非但象日月大小又取晷同故注云亦也下云三公之田視公侯天子之卿視伯以下是祿公卿大夫士也下注云待封王之子弟此唯公卿大夫元士者舉正者言之爾又元命包云王者封國上應列宿之位注云若角亢為鄭房心為宋之比又云其餘小國不中星辰者以為附庸是百里七十里五十里象星辰大小也援神契云王者之後稱公大國稱侯皆千乘又象雷震百里其七十里者倍減于百里五十里者倍減于七十里故孝經云德不倍者不異其爵功不倍者不異其土故轉相半以别優劣不合者謂不得與諸侯集合朝㑹天子也庸城也小國之城不能自通以其國事附于大國故曰附庸也鄭注殷所因夏爵三等之制者以夏㑹諸侯于塗山執玉帛者萬國若不百里七十里五十里則不得為萬國也故知夏爵三等鄭不直舉夏時而云殷所因者若指夏時則下當云萬國不得云千七百七十三國故以為殷所因夏爵三等之制注引鬼侯梅伯者證殷有侯有伯二王之後稱公則殷亦有公是三等也注云春秋之時合伯子男以為一者公羊傳桓十一年鄭忽何以名春秋伯子男一也辭無所貶是矣云殷爵三等者公百里侯七十里伯五十里是也畿外既有公侯伯標異畿內特謂之子爵雖為子若作三公則受百里之地若作卿則受七十里若作大夫則受五十里微子箕子皆是畿內采地之爵故云異畿內謂之子也先中國方三千里周公斥大九州之界方七千里諸侯大者地方五百里以下皆大司徒職文云以功黜陟之者謂殷之諸侯大者百里今日有功則升陟或二百里或三百里也若黨紂為惡則皆黜退之不得為諸侯或黜減至七十里五十里或附庸也其不合者皆益之為百里謂不以功過黜陟皆使滿百里也爵尊而國小者若虞虢之君爵公地方百里爵卑而國大者侯四百里伯三百里子男二百里皆大于虞虢也畿內公卿大夫采地不增益者本以祿羣臣不須增益其地以其不主于治民故也長樂陳氏曰先王之法若煩而約若離而合諸侯之國必有附庸可謂煩矣然天子班治于諸侯諸侯班治于附庸則上之所班者不勞此所以為約也附庸不合于天子可謂離矣然附庸通于諸侯諸侯通于天子則下之所通者不壅此所以為合也周官之地至于五等書曰分土惟三左傳云天子之地一圻列國一同皆止于三等者不兼附庸言之也天子諸侯而下不曰地而曰田者蓋政以農為本祿以田為主以其制祿也故雖地謂之田猶之縣內之所封以其有君道故雖邑謂之國也又曰書言舜之受禪曰輯五瑞修五禮復五器言武王之政由舊曰列爵惟五分土惟三則自唐至周五等之爵一也鄭氏釋王制謂殷因夏爵有公侯伯而無子男公羊釋春秋謂春秋變周從殷合伯子男皆稱子豈其然哉夫列爵惟五所以稱其德分土惟三所以等其功德異而功有所同故公侯之地同于百里子男之地同于五十里地同而附庸有所異故諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方百里蓋三等之地正封也五等之附庸廣封也正封則尺地莫非其土一民莫非其臣尊者嫌于盛而無所屈卑者嫌于削而無所立故公之地必下而從侯男之地必上而從子至于廣封則欲上之政令有所統而不煩下之職貢有所附而不費又非諸侯得以擅之也而尊者不嫌于大多卑者不嫌于大寡故公之地必五百里而異于侯男之地止百里而異于子也民功曰庸朝㑹曰合謂之附庸以其有所附然後有功于民也謂之不能五十里不合于天子以其才不足以當五十里則不足以特達于王也古者天子之地象日月諸侯之地象雷震則周官所謂五百里以至百里為兼附庸明矣鄭康成以大司徒之所言者為正封則曰公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同魯於周法不得有附庸故言錫之以附庸二十四此說非也既曰侯附庸九同魯侯爵也不得有附庸何邪詩曰錫之山川土田附庸奄有龜䝉遂荒大東記曰地方七百里此所謂錫之也禮書延平周氏曰政以農為本故王畿以田為主莫非王土而田止于千里者示其與諸侯共財也禮運曰天子有田以處其子孫即此所謂方千里者也公侯百里伯七十里子男五十里言實封之地而不及附庸之國者也馬氏曰普天之下莫非王土而天子則兼有之故天子之田方千里所以祿畿內之臣也千里者以開方之法計之蓋萬里也夫天子之田必以千里者所以示其本大而末細猶身之運臂臂之使指也蓋不千里不足以服天下之諸侯也降于天子則公侯而已故公侯田方百里以開方之法計之蓋千里也不千里則朝聘㑹遇之煩有所不給也至于伯則又有殺焉蓋伯則其國小其爵卑而子男亦如之故伯七十里子男五十里七十里者以開方之法計之七七四十九蓋四百九十里也五十里者以開方之法計之五五二十五蓋二百五十里也石林葉氏曰周官大司徒言諸公之地封疆方五百里下至諸男猶方百里與此制異者鄭氏以為武王初定天下分土惟三至周公斥大九州之界而分土以為五等以其異同考之而斥大封界則有矣謂五等之封實可食之地則非也蓋周官合山林川澤而言之則謂之地王制止于可食之地則謂之田以其地方五百里而去山林川澤取其可食者半則是附庸在其中以其田方百里皆可食之地而山林川澤不在焉則是附庸在其外由此觀之周公斥大九州之界公侯之國蓋有增多附庸而百里七十里五十里之制亦無增損此魯所以有七百里而孟子亦謂周公封于魯地方百里也詩云錫之山川土田附庸附庸舉其虗封言之所謂七百里是也土田舉其實封言之所謂方百里是也然而百里七十里之國其大足以兼附庸五十里之國小不足以兼附庸故司徒之職言諸子之地封疆方二百里其食者四之一是去山林川澤而其一應于實封五十里無附庸可知也雖然諸男之地封疆方百里其食者四之一乃止于二十五里而不應于實封之數何也蓋封疆者有五等而其可食之地實不過三猶之授田其法亦有上中下公侯方百里則賜之上地伯七十里則賜之中地子男五十里則賜之下地上地則山林川澤居其半中地則三之一下地則四之一至于諸男止于二十五里則疑為附庸之國此周司徒所以别于殷以備五等而其實則附庸也然則諸男之地下止于二十五里則為附庸上至于五十里則為諸侯周官離而言之故舉其下王制合而言之故舉其上唯其離也不言諸男為附庸而以其封疆推之其意可見唯其合也不言附庸則疑于諸侯男足于五十里此王制所以再言不能五十里不合于天子曰附庸也廬陵胡氏曰鄭云此殷所因夏爵三等之制也春秋變周之文從殷之質合伯子男以為一則殷爵三等者公侯伯也此說非也春秋公羊傳桓十一年鄭忽何以名春秋伯子男一也何休乃云春秋改周之文從殷之質合伯子男為一故鄭據以為說又元命包云周爵五等法五情春秋三等象三光說者因此以為文家爵五等質家爵三等又禮緯含文嘉亦云殷爵三等夏亦三等是以諸儒多從鄭說皆不經也案春秋尊周何嘗變周亦何嘗合伯子男以為一且如把入春秋書侯莊二十七年黜為伯至僖二十三年貶稱子者以伯子男為一何必書侯書伯書子以貶把公羊妄爾據明堂位云脯鬼侯天問云梅伯受醢箕子徉狂則殷有侯有伯有子也則亦有男可知矣是殷亦備五等也鄭氏乃云微子箕子是畿內采地之爵不得為子男之子則天子三公亦不得稱公侯之公乎推此則鄭云殷爵三等者非也夏有塗山之㑹執玉帛者萬國若只三等諸侯則不得為萬國又孝經夏制也而云公侯伯子男是五等也則鄭云殷所因夏爵三等者又非矣元命包與含文嘉之文妄可知也且如孟子答北宫錡之問周室班爵祿也曰天子一位公一位侯一位伯一位子男同一位凡五等似合于文家爵五等之說然又云君一位卿一位大夫一位上士一位中士一位下士一位則文家又有六等矣又云天子地方千里諸侯百里伯七十里子男五十里則文家又有四等矣又云大國地方百里次國七十里小國五十里又書武成云分土惟三孔氏曰公侯百里伯七十里子男五十里為三品則文家亦有三等而以為周尚質可乎豈變文以從質乎然則殷有三等周亦有三等周有四等五等六等殷亦有四等五等六等矣故自虞氏五瑞五玉以來制為五等夏殷周因之未之有改不可謂虞周有公侯伯子男五等之制殷獨三等也借曰殷改虞夏之制合為三等于書不見也于詩不見也而信禮緯之說可哉臨川王氏曰王制封國三等古者九州之地以及四海之內莫不各有君長苟斥而大之而增百里至五百里則所絀廢削滅非一國也此于人情似不合也或者以商末諸侯各相侵并合為大國至周始裁損就五百里至百里之制則不當云分土惟三也武王分土惟三則至周公又何增國至五百里也且孟子之言何可廢也孟子之言乃與魯人之言不同此時魯已不知其始封之大小又子産一同之言與孟子合則五百里之言亦不足信也凡言王制亦豈皆商制也鄭氏以國之大小故云爾永嘉徐氏曰天子邦畿千里之外肇域四海王畿之內定受田三百萬夫之地畿內諸侯之祿取焉財賦自給不取辦于諸侯蓋不千里無以統一天下而固其國本大末小之勢也諸侯大者百里蓋其納天子之貢賦而又朝聘㑹遇之煩不百里則有所不能給者也齊魯之始封地儉於百里彼非不知闢國以為廣誠不敢縱欲以壞王制也至孟子時諸侯兼國愈廣而受祿逾制齊方百里者十是九于太公所封之地魯方百里者五是四于周公所封之地廢棄王制甚矣是宜諸侯惡其害己而去司祿之職也當春秋之時聖王不作諸侯放恣晉人嘗責鄭人之侵小襄二十五年子産對以今大國之地多數圻是一國方數千里矣晉女叔侯言晉之大蓋八國姬姓皆滅而兼之虞虢焦滑霍楊韓魏至于魯濟西汶陽之田其見侵于鄰國屢矣諸侯并吞國益以大而周王之田日以削小地未能逺過于曹滕而求金求車天子至使其臣下從于列國之魯及其亡也河洛之外合七城而已河南洛陽偃師鞏新城平陽緱氏見通典豈非本小末大外勝其內以至于亡歟至秦削去五等制為郡縣外權既輕而亦隨以亡漢封諸侯列城數十地方千里置吏賦斂任其自為而天子自三河僅十五郡而列侯公主頗邑其中末可謂大本可謂微矣而枚乘論吳之富實過于天子漢并二十四郡十七諸侯錯出貢賦曽不如東山之府水陸轉粟曽不如海陵之倉夫以漢之大而賦入不加諸侯甚非居重馭輕强幹弱枝以身使臂之意也七國之亂吳實首禍漢之君分受其責衆建諸侯之䇿所以痛哭于文帝之世歟又曰附庸壤地褊小迫于大國之間德不足合瑞于天子地不足敵大于諸侯雖有命以自居于其國而其勢亦難以專達于上朝不與㑹不及必待附大國賦而後通焉蓋諸侯有功天子錫之以邦域之內以為社稷之臣八州之中二百一十國之外取諸閒田以祿附庸故諸侯得以兼統之而食其賦然亦得以專臣也周制凡諸侯牧正帥長及有德者乃有附庸非國皆有也侯伯子男之國自附庸九同至于三同其序不可亂矣唯上公無附庸以其位尊而勢極也周公有大勳勞受上公之地為方五百里矣明堂位言封于曲阜者合七百里加之四等之附庸為方百里者二十四蓋異恩也周以伯禽為東藩錫之土田附庸蓋法所不當有錫之而後受也春秋附庸之國獨魯為可考以傳考之凡蔣邢茅胙祭襄十二年六國多居髙平陳郡之間皆國近為宗魯之國則周公之子别封也邾郳須句僖二十二年顓㬰則異姓在魯國之中同附于魯以達于周也則魯之所屬亦廣矣中季以來如二邾者皆有功于王室賜命為列國與盟㑹專征伐而魯地亦己削弱矣方其盛也邾人滅須句僖二十二年魯以附魯之故伐邾而取之君子善其能保小恤寡至其衰也季氏專魯動兵于邦域之中而伐顓㬰社稷之臣失先王以大字小之意矣然而附庸之始封也皆出于天子之命諸侯不得以擅封也至春秋時此制遂泯許叔居許東偏隱十一年則出于鄭伯之命紀季入居于酅則迫于齊侯之命而不請于天子矣又其甚也肆其强暴而私役屬之宋盟齊人請邾宋人請滕襄二十七年利其貢賦以自封殖由是觀之列為十二併為七國非一朝一夕之故其所由來久矣大司徒侯附庸九同伯七同子五同男三同一同百里注云附庸九同者諸侯有功可進為公為四百里之上同得進為五百里也言同者謂積聚衆附庸而滿同也公無附庸魯以周公之故得兼四等加二十四附庸七百里侯九同伯七同子五同男三同共二十四五峯胡氏曰分天下有德有功者以地而不敢以天下自私于是有百里七十里五十里不能五十里邦國之制焉于是有君朝卿大聘大夫小聘王巡守述職之禮樂法度焉于是有千雉百雉三之一五之一九之一之髙城深池焉于是有井邑丘甸縣都之夫數焉于是有十乘百乘千乘萬乘之車數焉于是有伍兩卒旅師軍之制焉于是有鄉大夫司徒樂正取士之法焉邦國之制廢而郡縣之制作世襲之制亡數易之弊生而民無定志矣述職之禮廢上下之情不通其弊有不可勝言者矣城池之制廢而禁禦暴客威服四夷之法亡矣夫家之法廢則民數不可詳矣民數不可詳則乘車不可出而軍師不隱于農矣軍師不隱于農坐食者衆而公私困窮矣又曰制井田所以制侯國也制侯國所以制王畿也王畿安强萬國親附所以保衛中夏禁禦四夷也先王建萬國親諸侯髙城深池遍天下四夷雖虎猛狼貪安得肆其欲而逞其志乎此三王為萬世慮禦四夷之上䇿也王公設險以守其國孔子之所以書于習坎之彖也城郭溝池以為固孔子之所以答言偃之問也自秦以降郡縣天下中原世有戎狄之禍矣新安朱氏曰孟子言天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不達于天子附于諸侯曰附庸此以下班祿之制也不能猶不足也小國之地不足五十里者不能自達于天子因大國以姓名通謂之附庸春秋邾儀父之類是也劉氏孟冶曰君臣有尊卑之分制度有隆殺之殊故孟子亦曰天子之制地方千里公侯皆方百里伯七十里子男五十里然天子之田必曰方千里公侯之田必曰方百里者蓋不千里不足以待諸侯不百里不足以守宗廟之典籍也以此推之則伯子男既殺于公侯故有七十里五十里之制不惟此也王執鎮圭公執元圭侯執信圭伯執躬圭子執榖璧男執蒲璧執玉亦有隆殺也自上而下各有等差之辨也雖然王者之制如此若夫行賞施惠則又莫非天子之命也故自公侯而下有功德于民者加地進律有慶者則益以地有責者則削以地又不可拘于一定之法也孟子所謂入其疆土地荒蕪遺老失賢掊克在位則有讓一不朝則貶其爵再不朝則削其地是也才之小不能治五十里之地故不合朝㑹以國事附于大國以其不通也曰附庸者亦有功于民者謂之庸周禮亦曰民功曰庸故有取于附庸之義李氏曰諸侯之于附庸得以屬之而不得以有之故孔子以顓㬰在邦域之中江陵項氏曰王莽封諸侯置附城則漢人蓋以城解庸也古文庸即墉字後人加土以别之不成國者謂之附城猶今言支郡為屬城也禮記集說卷二十四
