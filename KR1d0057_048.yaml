body:
  text: 禮記集説卷四十八宋衛湜撰曽子問曰女未廟見而死則如之何孔子曰不遷於祖不祔於皇姑壻不杖不菲不次歸葬於女氏之黨示未成婦也鄭氏曰遷朝廟也壻雖不備喪禮猶為服齊衰孔氏曰婦既死於己寢將反葬於女氏之黨故其柩不遷移朝於壻之祖廟祔祭之時不得祔於皇姑廟皇大也君也稱皇者尊之也凡人為妻齊衰杖而菲屨今壻不杖不菲不次菲草屨也不次謂不别處止哀次也唯服齊衰而已女之父母則為之降服大功以其非在家壻已服齊衰期非無主也歸葬女氏以未廟見不得舅姑之命實已成婦示之未成婦禮見其不敢自專也曾子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之鄭氏曰未有期三年之恩也女服斬衰孔氏曰既葬除者壻於女未有期之恩女於壻未有三年之恩以壻服齊衰故知女服斬衰嚴陵方氏曰以其嘗請期故齊衰而弔然未成婦也故既葬而除之曾子問曰喪有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也喪之二孤則昔者衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客入弔康子立於門右北面公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙於位有司弗辯也今之二孤自季康子之過也鄭氏曰曽子問此怪時有之也孔子以尊喻卑偽猶假也舉兵以遷廟主行無則主命為假主非也有司弗辯辯猶正也若康子者君弔其臣之禮也鄰國之君弔君為之主主人拜稽顙非也當哭踊而已靈公先桓子以魯哀公二年夏卒桓子以三年秋卒是出公也孔氏曰此一節是論喪不得有二孤廟不得有二主之事天有二日則草木枯萎土有二王則征伐不息嘗禘之時雖衆神並在猶先尊後卑一一祭之不一時緫祭尊者尚不可二喪與廟卑者不二可知也鄰國之君弔賔主尊卑宜敵故君為主拜賔康子又拜非也當時有司畏康子不敢辯正曽子所問前孤後主今荅前主後孤者謂齊事在前衛事在後也出公來弔非有國大事春秋略而不書嚴陵方氏曰喪有孤則哀之所主廟有主則神之所依喪有二孤則莫適為主廟有二主則莫適為依是豈禮之意哉然後世行之者蓋自桓公始之季康子之過也所謂尊無二上者以其神有尊卑不可同時而並祭故言無二上也山隂陸氏曰是其過爾非故造端也若朝服之以縞不可以言過曾子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虚主虚主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老耼曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟君去其國大宰取羣廟之主以從禮也祫祭於祖則祝迎四廟之主主出廟入廟必蹕老耼云鄭氏曰齊車金路老耼古壽考者之號也與孔子同時天子崩諸侯薨則藏諸主於祖廟象有凶事者聚也卒哭成事先祔之祭名也君去其國以廟主從鬼神依人者也祝迎廟主祝接神者也蹕止行也孔氏曰自此至貴命也一節論師出當取遷廟主及幣帛皮圭以行廟無虚主之事凡祭祀皆乗玉路齊車則降一等乗金路也遷廟主行者謂載新遷廟之主案史記老耼陳國苦縣賴鄉曲仁里人為周柱下史或為守藏史鄭註論語云老耼周之大史未知所出莊子稱孔子與老耼對言是與孔子同時也天子崩國君薨藏羣廟主於祖廟以凶事生人自聚今主亦象生人集聚至卒哭之明日以新死者袝祭於祖故祖主各先反其廟也三年一祫當祫之年則祝迎髙曽祖禰四廟而於大祖廟祭之天子祫祭則迎六廟之主四廟舉諸侯言也主謂木主天子一尺二寸諸侯一尺出廟者謂出己廟而往大祖廟入廟謂從大祖廟而反還入己廟主出入之時必須蹕止行人若主入大祖廟中則不蹕以壓於尊者也若有喪及去國無蹕老耼云結上義也横渠張氏曰古者天子巡守載遷廟主而行必載遷廟主親之主也有廟即當有主嚴陵方氏曰甘誓曰用命賞於祖則以遷廟主行可知矣然必以遷廟之主者以天子之七廟諸侯之五廟無虚主故也廟之有主猶國之有王也天子崩諸侯薨與去其國廟為無主者示神人休戚之同也祫祭亦為無主者以合食而示反本也非是四者廟主其虚乎齊車示有齊敬之心焉曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告於祖禰遂奉以出載于齊車以行每舎奠焉而后就舎反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也鄭氏曰舎奠而後就舎以脯醢禮神乃敢即安也所告而不以出即埋之孔氏曰以幣帛皮圭告於祖禰遂奉以出以象受命故云主命案皇氏曰有遷主者直以幣帛告神不將出行即埋之階間無遷主者加以皮圭告於祖禰遂奉以出熊氏曰每告一廟以一幣玉告畢若將所告逺祖幣玉行者即載之而去若近祖幣玉不以出者即埋之還時以此載行幣玉告於逺祖事畢則埋於逺祖兩階間其近祖以下告祭而已不陳幣玉也子游問曰喪慈母如母禮與孔子曰非禮也古者男子外有傅内有慈母君命所使教子也何服之有昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也鄭氏曰如母謂父卒三年也子游意以為國君亦當然禮所云者乃大夫以下父所使妾養妾子也夫子曰何服之有言國君之妾子於禮不服也大夫士之子為庶母慈己者服小功父卒乃不服有慈母良良善也謂之慈母固為其善昭公年三十乃喪齊歸猶無戚容又安能不忍於慈母此非昭公明矣未知何公也天子練冠以燕居蓋謂庶子王為其母公之言又非也孔氏曰此一節論諸侯之子喪慈母無服之事案喪服傳云慈母如母慈母者何也妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則喪之三年鄭以喪服慈母如母在父卒三年章中故云謂父卒三年也此謂大夫以下天子諸侯則不服庶母子游意以為國君亦然故孔子以國君荅云君命所使敎子則國君之子尚不服庶母國君身不服庶母可知也鄭知大夫士之子為庶母慈己者服小功者案喪服小功章云君子子為庶母慈己者傳云君子子者貴人之子也為庶母何以小功也以慈己加也父没為庶母慈己亦緦鄭云不服者謂不服小功爾若大夫之子庶母不慈己者雖父在亦服緦士之適子無母乃命妾慈己亦為之小功知者以士為庶母緦明士子亦緦以慈己加小功故此連言大夫士也家語云孝公有慈母良鄭不見家語故云未知何公也鄭註練冠謂庶子王為其母者案服問云庶子為後為其母緦春秋有以小君服之者春秋母以子貴若適小君没則得伸若小君猶在則其母壓屈故練冠也大夫士為後著緦服必練冠者以大夫士為母本應三年以為後壓屈故降服緦麻王侯庶子為母本練冠故今應練冠此乃異代之法故經云古者案喪服緦麻章云庶子為後為其母緦則是周法天子諸侯大夫士一也經無明文鄭云蓋疑辭也馬氏曰門内之治恩掩義可也取恩之重者質義之輕者則義可以廢取義之重者質恩之輕者則恩可以忘故門内之治亦有時而正以義蓋一身之事冠為重一家之事喪為重以一身况一家則喪蓋重於冠是以將冠子冠者至未至皆廢所為冠者正當冠之子也非賔賛也以喪而廢冠則是以恩掩義也此之謂恩重魯昭公少喪母有慈母良欲喪之有司以為亂國法故父在則為之服父没則不服是以義掩恩此之謂義重也山隂陸氏曰此一節所記曾子問三十有七子游之問一子夏之問再著才有利鈍問有詳略男子外有傅内有慈母君命所使教子也古者師弟子無服蓋如此練冠喪慈母此固昭公也昭公十九猶有童心則三十喪齊歸雖謂之少蓋可矣如此不愛其母而愛慈母又何足怪也曽子問曰諸侯旅見天子入門不得終禮廢者幾孔子曰四請問之曰大廟火日食后之喪雨霑服失容則廢如諸侯皆在而日食則從天子救日各以其方色與其兵大廟火則從天子救火不以方色與兵曾子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六請問之曰天子崩大廟火日食后夫人之喪雨霑服失容則廢鄭氏曰旅衆也大廟始祖廟宗廟皆然主於始祖耳以方色與兵示奉時事有所討也方色者東方衣青南方衣赤西方衣白北方衣黑兵未聞也夫人君之夫人孔氏曰自此至未殺則廢論行禮有故不得終之事公羊傳云周公稱大廟魯之始祖也明諸國皆然鄭註奉時事解各以其方色有所討解與其兵也諸侯從天子救日為隂侵陽是君弱臣强之象欲助天子討隂也隱義云東方用㦸南矛西弩北楯中央鼔穀梁云天子救日置五麾陳五兵五鼔諸侯置三麾陳三鼔三兵大夫擊門士擊柝言充其陽也春秋傳曰日食天子伐鼔于社責上公也諸侯伐鼔於朝退自責也夏書曰辰不集於房瞽奏鼔嗇夫馳庶人走周禮有救日之弓但不知兵之細别日食象五方色以兵討隂救火無此義故不用也諸侯相見云大廟火謂君之大廟非天子大廟也横渠張氏曰曽子問廢祭者之故非孔子經心烏能歷歷如此舉之如昔嘗所經慮義理輕重蓋須如此嚴陵方氏曰旅見蓋君臣之禮故以事而廢者少相見蓋敵國之禮故以事而廢者多此重輕之别也馬氏曰大廟者神之位也神道有不安人子之道虧矣古者宗廟火三日哭哭以謝其神則諸侯旅見與夫當祭之禮所以廢也於其廢也然後帥諸侯以救火日者陽之位也陽主於明故大明以照四方者君道也其有不明則君徳虧矣古者日有食之則瞽奏鼔嗇夫馳庶人走所以助陽唯其以陽為不充故諸侯之旅見與夫當祭之禮亦可以廢於其廢也然後帥諸侯以救日祭者吉事也朝者盛禮也祭有樂以侑神亦有以樂賔有爵以酳主人亦有以酬賔客其繁也至於十五飯其飲也至於無筭爵故王制曰喪三年不祭蓋為是也天子廢朝蓋亦廢祭矣故大廟火則哭之日食則救之后之喪則服之此可以廢祭矣雨霑服失容可以不旅見而不可以不祭蓋以祭而較之旅見則祭重故旅見可以易日而祭祀則不可以易日矣俎豆既陳賔客既入尸既迎樂己作則雖雨不可廢簠簋既陳鍾鼔既列諸侯相見揖讓而入其雨也可廢矣曽子問曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢曽子問曰當祭而日食大廟火其祭也如之何孔子曰接祭而已矣如牲至未殺則廢鄭氏曰既陳謂夙興陳饌牲器時也天子七祀言五者闗中言之也孔氏曰鄭知既陳謂夙興陳饌牲器時者以下文云當祭而日食則此簠簋既陳不當祭明是祭前也前文云天子崩后之喪與日食大廟火其禮皆同則此簠簋既陳日食大廟火亦同也故下云如牲至未殺則廢是也牲至已殺則接祭其天子崩后之喪牲入雖殺不可行接祭以喪事重故也祭法周天子七祀諸侯五祀大夫三祀取中言之見其祭皆然也嘗禘謂宗廟郊社謂天地則五祀以上之祭皆在其中也接祭者接㨗也㨗速也速而祭之也然案郊特牲云既灌然後迎牲則迎尸於奥在殺牲前凡迎尸之禮其節有二一是祭初迎尸於奥而行灌禮灌畢而後出迎牲於時迎尸於戸外殺牲薦血毛行朝踐之禮設腥爓之俎於尸前是一也然後退而合亨更迎尸入坐於奥行饋熟之禮是二也註云不迎尸者直於堂上行朝踐禮畢則止不更迎尸而入此謂宗廟之祭郊社之祭無文不迎尸亦謂此時也案熊氏曰郊社五祀祭初未迎尸之前已殺牲以其無灌故也故太宰云祀五帝納亨註云納亨謂祭之時又中霤禮皆為俎奠於主乃始迎尸是郊及五祀殺牲在迎尸之前也則此不迎尸亦得為祭初不迎尸也廬陵胡氏曰接祭謂接續行事不徐徐也鄭云接祭不迎尸案郊特牲云既灌然後迎牲則迎尸在未殺牲之前此經已殺牲後乃云不迎尸非也宗廟之祭未有先殺牲後迎尸者若夫中霤禮為俎奠於主乃迎尸蓋五祀之祭非宗廟也天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啓至於反哭五祀之祭不行已葬而祭祝畢獻而已鄭氏曰既葬彌吉祝畢獻而後止郊社亦然唯嘗禘宗廟俟吉也孔氏曰天子諸侯祭禮既亡今儀禮唯有大夫士祭禮案特牲饋食禮祝延尸於奥迎尸而入即延坐三飯告飽祝侑尸尸又飯至於九飯畢若大夫依少牢饋食尸食十一飯而畢鄭註少牢云士九飯大夫十一飯也案此説則諸侯十三飯天子十五飯也又案特牲禮尸九飯畢主人酌酒酳尸尸飲卒爵酢主人主人受酢飲畢酌獻祝祝飲畢主人又酌獻佐食此是士之祭禮也今約此而説天子五祀之祭天子初崩哀慼未遑祭祀雖當五祀祭時不得行然五祀外神不可以己私喪久廢其祭故既殯哀情稍殺而後祭不得純如吉禮須宜降殺故迎尸入奥之後尸三飯告飽則止祝更不勸侑其食使滿常數於時冢宰攝主酌酒酳尸尸受卒爵不酢攝主唯行此而已若葬時從啓殯以後反哭以前哀摧更甚故五祀之祭不行已葬反哭殯宫畢而行其祭但既葬彌吉尸入三飯之後祝乃侑尸尸食十五飯攝主酳尸尸飲卒爵而酢攝主攝主飲畢酌而獻祝祝受飲畢則止以葬後未甚吉唯行此禮無獻佐食以下事也案王制祭天地社稷越紼行事此經云自啓至反哭五祀之祭不行鄭註郊社亦然何得有越紼行事蓋既殯以後未啓以前是無事時得行祭禮故有越紼行事郊社既有常日自啓反哭當辟此郊社之日五祀既畢若與啓反哭日相逢則五祀辟其日也鄭言天地社稷去殯處逺祭時踰越此紼而往赴之五祀去殯處近暫往則還不為越紼也唯嘗禘之禮以祭宗廟俟待於吉故王制云喪三年不祭是也嚴陵方氏曰唯大喪之凶然後可以廢大禮之吉凡祭之禮迎尸之時與未迎尸之時事異而禮不相接以其遇災而行之為遽故言接祭而已不暇迎尸故也曽子問曰諸侯之祭社稷俎豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢自薨此至于殯自啓至於反哭奉帥天子鄭氏曰此祭社稷亦謂夙興陳饌牲器時也帥循也所奉循如天子者謂五祀之祭也社稷亦然孔氏曰案上天子有祭五祀之文今云奉循謂諸侯五祀如天子五祀也諸侯祭社稷其遭喪節制與五祀同故鄭云亦然案天子崩后喪諸侯當奔赴得奉循天子之禮者諸侯或不自親奔而身在國者或唯據君薨及夫人之喪其嗣子所祭得奉循天子也山隂陸氏曰天子言嘗禘郊社五祀諸侯言社稷略諸侯也大夫益略不得名祭曽子問曰大夫之祭鼎俎既陳籩豆既設不得成禮廢者幾孔子曰九請問之曰天子崩后之喪君薨夫人之喪君之大廟火日食三年之喪齊衰大功皆廢外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣士之所以異者緦不祭所祭於死者無服則祭鄭氏曰齊衰異門則祭室中之事謂賔長獻士之所以異者緦不祭則士不得成禮者十一也死者無服謂若舅舅之子從母昆弟孔氏曰此大夫祭謂祭宗廟故下文云所祭於死者無服則是據宗廟也若遭異門齊衰之喪其祭迎尸入室三飯則止祝更不勸侑使至十一主人酌酒酳尸尸不酢主人唯此而已大功服輕祭禮稍備尸三飯祝侑至十一飯而止主人酌酒酳尸尸酢主人主人乃止小功緦麻服轉輕禮轉備尸十一飯訖主人酳尸尸卒爵酢主人主人獻祝及佐食次主婦獻尸尸酢主婦主婦又獻祝及佐食次賔長獻尸若平常之祭尸得賔長獻爵則止不舉待致爵之後尸乃舉爵今既喪殺賔長獻尸尸飲以酢賔賔又獻祝及佐食而祭畢止此時尸祝佐食在室中但主人主婦及賔獻尸及祝佐食等三人畢則止故云室中之事而已若致爵之時皆不在室中其室中者獻尸祝佐食耳故此註云室中之事謂賔長獻是也此小功緦麻兼内外知者以前文云内喪大功以上廢則小功以下不廢也案雜記云臣妾死於宮中三月而後祭之此内喪緦麻不廢祭者謂鼎俎既陳臨祭故不廢也孔子見曽參歴問至大夫故因廣舉士以語之大夫唯至大功為九而士又加緦小功二等合為十一此亦謂祭宗廟鼎俎既陳而值喪也大夫祭值緦小功不辨内外皆不廢祭而禮則小異耳士值緦小功不辨内外一切皆廢祭士輕故為輕親伸情也所祭於死者無服所祭謂士所祭祖禰士於死者雖為緦祖禰於死者無服鼎俎既陳則亦祭也鄭註謂若舅舅之子從母昆弟此皆母親而云無服者祭祀以祖禰為主母親於己服緦於祖禰則無服也嚴陵方氏曰位尊則以事而廢禮者為少位卑則以事而廢禮者為多此重輕之别也山隂陸氏曰大夫言鼎俎籩豆著陳設雖備猶廢士不言小功略士也曾子問曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行君子禮以飾情三年之喪而弔哭不亦虚乎鄭氏曰不羣立不旅行為其苟語忘哀也三年之喪而弔哭為彼哀則不專於親為親哀則是妄弔也孔氏曰此一節論身有重服不得弔人之事君子禮以飾情凡行吉凶之禮必使内外相副用外之物以飾内情故衰以飾在内之情冠冕文采以飾至敬之情麤衰以飾哀痛之情身在重服而弔他人則非飾情所以為虚蓋己有喪弔彼而哭哀彼則忘己本哀是己服為虚也若心存於己哀忘彼而哭彼是於弔為虚也嚴陵方氏曰羣與旅皆衆也傳言獸三為羣禮言五卒為旅則旅衆於羣行者必於道路而道路之人為衆故以旅言之不羣立不旅行則以居喪宜與人辨故也曽子問曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服於身不敢私服又何除焉於是乎有過時而弗除也君之喪服除而后殷祭禮也鄭氏曰孔子以重喻輕私喪家之喪也喪服四制曰門外之治義斷恩君喪服除而后殷祭謂主人也支子則否孔氏曰此一節論臣有君親之喪當隆於君之事身有君服後遭親喪則不敢為親制服也成喪服為重始除服為輕末在親重始之日尚不獲伸况輕末之時而可行乎故云又何除焉殷祭謂小大二祥變除之大祭初為君服不敢為親私除若君服除後乃可為親行二祥祭以伸孝心如今月除君服明月可小祥又明月大祥若未有君服己小祥除君服後但大祥而已禘祫大祭亦謂之殷祭有殷事則之君所鄭以為朔月月半薦新之奠各有所指不嫌殷名同也鄭註主人謂適子仕宦者適子主祭祀故待除君服行二祥祭若支子仕宦雖不得除私服其家適子已行祥祭則無復追祭也嚴陵方氏曰有君之喪而不敢私服則以義斷恩故也曽子問曰父母之喪弗除可乎孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過於制也故君子過時不祭禮也鄭氏曰曽子問父母之喪弗除以其有終身之憂孔子言先王制禮以為民中過其時則不成禮孔氏曰曽子謂適子除君服乃有殷祭庶子除君服無復殷祭則是其為父母服一生不有除脱之事於禮可乎孔子言先王制禮過則不追舉非是不能除改正患過於聖人之禮制也又引君子過時不舉之事假令春夏祭本為感春夏而祭至秋非時故不補前祭若適子仕者除君服猶行殷祭非為感時是孝子存親伸孝心也山隂陸氏曰宰予曰期可已矣性之厚薄不同至如此曽子問曰君薨既殯而臣有父母之喪則如之何孔子曰歸居于家有殷事則之君所朝夕否鄭氏曰居家者因其哀後隆於父母殷事朔月月半薦新之奠也孔氏曰殷大也孔子荅云君殯既訖君所無事父母新喪故歸家治喪若君喪有薦新大事則臣適君所哭君凡常朝夕則不往哭君唯在家為父母治喪若臣有父母喪既殯有君喪則歸君所父母喪有殷事則歸平常朝夕恒在君處曰君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君鄭氏曰言送君則既葬而歸也歸哭者服君服而歸不敢私服也孔氏曰上問既殯今問既啓孔子謂歸哭父母而反往送君葬不待君虞祭歸家治父母喪其君喪祔與卒哭未知臣往君所與否上文云有君喪服於身不敢私服故鄭知不私服也若父母喪既啓而有君喪則往哭君所而反送父母父母葬畢而居君所曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否鄭氏曰其哀雜主於君孔氏曰前問既殯既啓今問未殯孔子荅曰歸殯父母訖反君所以殯君朝夕恒在君所家有殷事則暫歸君未殯則君哀重父母又喪親哀亦重君親哀相雜君尊故主於君尋常恒在君所盧氏曰人君五日而殯故可以歸殯父母而往殯君也若臨君殯則歸哭父母而來殯君殯君訖乃歸殯父母也大夫室老行事士則子孫行事大夫内子有殷事亦之君所朝夕否鄭氏曰大夫士其在君所之時則攝其事内子大夫適妻也謂夫之君既殯而有舅姑之喪者妻為夫之君如婦為舅姑服齊衰孔氏曰大夫士有殷事在君所及朝夕恒在君所之時在家朝夕奠有闕奠不可廢大夫尊故遣室老攝事士卑則子孫攝行此明大夫禮節又明婦人進止謂君既殯而婦有舅姑之喪大夫者卿之緫號内子者卿之適妻前問君薨既殯有父母之喪此明君既殯而婦有舅姑之喪歸居於家君有殷事非但夫往妻亦往君所若尋常朝夕則不往舉此則君既啓及君未殯而有舅姑之喪其禮悉同夫也案僖二十四年左傳云晉趙姬請以叔隗為内子而已下之叔隗為趙衰妻是大夫適妻也若對而言之則卿妻曰内子大夫妻曰命婦若散而言之則大夫是卿緫號其妻亦緫名為内子妻為夫之君服齊衰喪服文也賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄非禮也鄭氏曰誄累也累列生時行迹誄之以作諡諡當由尊者成天子稱天以其無尊焉春秋公羊説以為讀誄制諡於南郊若云受之於天然諸侯禮當言諡於天子天子乃使大史賜之諡孔氏曰此一節論諡由尊者出之事凡諡表其實行若使幼賤者為之則名揚在上之美有乖實事故賤不得累列貴者之行而為諡幼不得累列長者之行而作諡諸侯及大夫上有尊者作諡天子則更無尊者故白虎通云天子崩大臣於南郊稱天以諡之為人臣子莫不欲褒大其君掩惡揚善故至南郊明不得欺天且示若有天命然也平敵相誄亦為不可故諸侯相誄非禮也案襄十三年左傳楚子囊為其王作諡者春秋亂世不能如禮也案大史職云小喪賜諡鄭云小喪卿大夫也卿大夫賜諡明諸侯之喪亦然曽子問曰君出疆以三年之戒以椑從君薨其入如之何孔子曰共殯服則子麻弁絰䟽衰菲杖入自闕升自西階如小斂則子免而從柩入自門升自阼階君大夫士一節也鄭氏曰戒猶備也謂衣衾也親身棺曰椑其餘可死乃具也曽子以其出有喪備疑喪入必異也共殯服謂君已大斂殯服謂布深衣苴絰散帶垂殯時主人所服共之以待其來也其餘殯事亦皆具焉子麻弁絰衰杖者棺柩未安不忍成服於外也麻弁絰者布弁而加環絰也布弁如爵弁而用布杖者為己病也闕謂毁宗也柩毁宗而入升自西階異於生也於此正棺而服殯服既塗而成服殷柩出毁宗周柩入毁宗禮相變也如君己小斂主人布深衣不括髮者行逺不可無飾也入自門升阼階者親未在棺使如生反也孔氏曰此論諸侯在外死以喪歸之事諸侯或出疆朝㑹其出時以三年喪備衣衾之屬并椑棺而從也案喪大記云大棺八寸屬六寸椑四寸天子椑内猶有水兕諸公椑内猶有兕諸侯以椑為親身孔子謂大斂之後主人從柩而歸則其家豫共主人殯時所著服於時主人在路未忍成服則著布弁謂吉布十五升上加環絰也䟽衰是齊衰菲謂藨屨士喪禮服杖同時今服未成而杖故鄭云為己病也柩入宮時毁殯宮門西邊牆其處空闕故謂之闕鄭恐是門闕故云毁宗毁此宗廟之牆從柩而入升自西階如似賔客於此時服殯服菆塗既畢乃成服也檀弓云毁宗躐行是從内而出此謂大斂後如未大斂當小斂以後則子首不著麻弁身不服䟽衰唯首著免身著布深衣而從柩案士喪禮從死至成服主人皆著布深衣又士喪禮小斂主人髺髮今著免故鄭云在外逺行不可無飾也上來從柩之儀非但君死於道路亦然諸侯與大夫士一也熊氏曰王制云絞紟衾冒死而後制此三年之戒謂衣衾之裁若其造作死乃為之山隂陸氏曰服事也言君薨大斂而入則内共殯事矣言殯則斂見言斂則殯不見且言大斂於升自西階不恊子以麻為弁變於弔服蓋弁絰三麻弁絰為重弁皮絰次之爵弁絰又次之入自闕所謂觀闕是也宗廟在庫門外雉門内故君出疆薨入自闕大斂於阼殯於客位故入自闕升自西階禮記集説卷四十八
