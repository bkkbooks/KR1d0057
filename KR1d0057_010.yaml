body:
  text: 禮記集說卷十宋衛湜撰曲禮下第二孔氏曰案鄭目録云義與前篇同簡䇿重多分為上下凡奉者當心提者當帶鄭氏曰髙下之節孔氏曰自此至則襲一節論臣所奉持及俯仰裼襲之節物有冝奉持之者有冝提挈之者各因其冝奉之者必仰手當心以奉之提之者必屈臂當帶而提之帶有二朝服之帶髙於心深衣之帶下於脅此謂深衣之帶蓋古人常著深衣故也藍田吕氏曰奉者承之以兩手也提者挈之以一手也廬陵胡氏曰案玊藻與深衣說則朝服之帶當心上而深衣之帶當脅下凡提挈物者髙下皆以帶為準不必専指深衣之帶馬氏曰容止不有禮則不可觀進退不有禮則不可度古人以一威儀之肅慢為利害之所召一執玉之俯仰為禍福之所係則凡見於奉提操執行立屈伸之末者其可忽哉邾子執玉髙其容仰子貢以為驕執天子之器則上衡君子以為禮者執主器以髙為貴執已器以下為敬故也詩曰奉璋峩峩是奉者必髙故言當心禮曰長者與之提攜是提者必下故言當帶執天子之器則上衡國君則平衡大夫則綏之士則提之鄭氏曰衡謂與心平上衡謂髙於心彌敬也綏讀曰妥妥之謂下於心孔氏曰前明常法此又明臣為君上提奉之禮執持也上猶髙也衡平也人之拱手正當心平天子至尊故臣為擎奉皆髙於心國君降於天子故臣為擎奉與心齊平凡言衡有二處大夫衡視則面為衡此衡謂與心平也大夫又降於諸侯故下於心士卑故提之又在綏之下上云提者當帶嚴陵方氏曰夫器無貴賤因人而為貴賤自天子以至於士貴賤之等各有差等故人愈貴而執器者愈恭焉山隂陸氏曰衡髙七尺七寸中人八尺則所謂平衡與眉齊矣上衡又少髙焉眉一名衡豈為是歟眉為衡則鼻為準頄為顴之類可知上衡若今奉御食器上眉是也廬陵胡氏曰衡權衡也執天子之器冝加敬如衡之昂也上猶髙昂平謂不昂綏安舒貌如所謂綏旌凡執主器執輕如不克執主器操幣圭璧則尚左手行不舉足車輪曵踵立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委鄭氏曰重謹之也主君也克勝也尚左手尊左也車輪謂行不絶也佩倚及垂委是君臣俯仰之節倚謂附於身小俯則垂大俯則委於地孔氏曰此明持奉手足之儀及授受時禮也禮大夫稱主此言主上通天子諸侯下含大夫為君者士則不然尊者之器不論輕重其臣執之唯冝謹重器雖輕小執之恆如重而不勝之容故孔子執圭如不勝而聘禮上介執玉如重是也圭璧瑞玊也尚上也謂執持君器及幣玉則右手在下左手在上左尊也曵拽也踵腳後也執器行時不得舉足但起前拽後使踵如車輪曵地行也立倚也佩謂玉佩也帶佩於兩邊臣則身冝僂折故云磬折也身既僂折則所帶之佩從兩邊出縣垂於前也君若直立而佩倚於身則臣宜曲折故佩垂於前君若重謹折身而佩垂則臣身當彌曲故佩罄委於地馬氏曰玉藻曰足容重手容恭立容德又曰立容辨卑毋讇曲禮曰立如齊則自奉者當心以至尚左手者手容恭也行不舉足車輪曵踵者足容重也磬折垂佩者立容德而辨卑如齊也嚴陵方氏曰少儀言執虛如執盈少者且然而況壯者乎孔子執圭如不勝聖人且然而況常人乎執主器尚左手者左手不如右强尚左手則下右手可知矣尚左手所以為容下右手所以致力而已玉藻曰執龜玊舉前曵踵士相見禮曰執玊者則唯舒武舉前曵踵與此同意藍田吕氏曰尚左手者人手利於用右不利於用左以利用者在下防失墜也不舉足如車輪之曵地則行步之慎也立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委謂君臣授受之節也如前所謂尊卑垂帨也凡授受者尊卑皆磬折故垂佩也然臣當加恭於君故有佩倚佩垂佩委之差也必俟主佩倚然後臣佩委猶授立不跪授坐不立亦各從其所冝也山隂陸氏曰朝則結佩今其言如此則所謂結佩結雙璜而已執玊其有藉者則裼無藉者則襲鄭氏曰藉藻也裼襲文質相變耳有藻為文裼見美亦文無藻為質襲充美亦質圭璋特而襲璧琮加束帛而裼亦是也孔氏曰執玉謂諸侯所執圭璧朝於王及諸侯相朝所用也藉謂藉玉之藻鄭注覲禮云繅所以藉玉以韋衣木廣袤各如其玉之大小天子則以五采畫之諸侯則三采子男二采卿大夫亦二采故典瑞云王五采五就公侯伯三采三就子男二采二就又云瑑圭璋璧琮繅皆二采一就是也既以采色畫韋衣於板上前後垂之又有五采組繩以為繫上𤣥下黃長尺無事則以繫玉有事則垂為飾故聘禮云皆𤣥纁繫長尺絢組是也板之藻藉則常有今言無者據垂之也裼所以異於襲者凡衣近體有袍襗之屬其外有裘夏月則衣葛其上有裼衣裼衣上有襲衣襲衣上有常著之服則皮辨之屬也掩而不開則謂之襲若開此皮辨及中衣左袒出其裼衣謂之裼故鄭注聘禮云裼者左袒也今謂執玉之人朝聘行禮既有藻以承其玉若盡飾見美之時必垂藻於兩端謂之有藉當時所執之人則裼若事質充美之時承玉之藻不使下垂屈而在手謂之無藉當時所執之人則襲案聘禮賔至主人廟門之外賈人東面坐啓櫝取圭垂繅不起而授上介注云賤不裼也以賈賤故不言裼明貴者垂藻當裼也又云上介不襲執圭屈繅授賔注上介不襲者以盛禮不在於己明屈藻合襲也又云賔襲執圭又云公襲受玉於時圭皆屈藻此所謂無藉者襲也聘禮又云賔出公授宰玉裼降立是授玉之後乃裼也又云賔裼奉束帛加璧享是有藉者裼也凡朝聘賔與主君行禮皆屈而襲至于行享之時則皆裼也知者以聘禮行聘則襲受享則裼凡享時其玊皆無藉藻故崔靈恩云初享圭璋特故有藻其餘則束帛加璧既有束帛不須藻也又皇氏曰鄭注圭璋特而襲璧琮加束帛而裼者以經據人之裼襲欲明玉亦有裼襲也上公享王圭以馬享后璋以皮皮馬既不上於堂其上唯特有圭璋圭璋是寶物不可露見必以物覆襲之故云特而襲也侯伯子男享天子璧以帛享后琮以錦既有帛錦承玉上唯用輕細之物蒙覆以裼之故云加束帛而裼也又熊氏曰鄭注上明賔介二人為裼襲圭璋特以下又明賔主各自為裼襲謂朝時用圭璋特賔主俱襲行享時用璧琮加束帛賔主俱裼也藍田吕氏曰聘禮上介不襲執圭屈繅授賔賔襲執圭公襲受圭授宰玉裼降立賔裼奉束帛加璧享當上介授賔固以屈繅矣而云上介不襲及賔以束帛加璧享則無繅藉矣乃云賔裼則以垂藻屈藻為有藉無藉固不可行矣竊意玉雖以藻為藉此云有藉無藉者必以所加為言如束帛之類謂之藉也始致君命圭璋特達是無藉也故賔與公皆襲既享束帛加璧是有藉也故賔裼如此則義理可推長樂劉氏曰此直謂朝聘時耳圭璋璧琮琥璜皆玉也執璧琮琥璜則與帛錦繡黼同升所謂有藉則裼裼者禮差輕尚文也執圭璋則特達所謂無藉則襲襲者禮方敬尚質也裼襲繫於有藉無藉不繫於有繅無繅又繅非藉藉非繅藉者薦也繅者組也禮之質文以圭璋琥璜為輕重而不在一尺之組為屈伸也馬氏曰周官典瑞王執鎮圭繅藉五采五就以朝日公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以宗遇㑹同于王諸侯相見亦如之瑑圭璋璧琮繅皆二采一就以俯聘然則玊之有繅藉所以著其用貞剛之德而藉之以柔順也繅藉有采就所以著其德之有隆殺玉之用雖殊而有藉則一禮言有藉則裼無藉則襲何也玉有以繅為之藉有以帛束為之藉以繅為藉所以飾之束帛為藉所以將之則有藉則裼無藉則襲之說特施於束帛之藉而已考之聘禮方聘之時賔襲執圭公襲受玉其襲而不裼者以未有束帛之藉故也及享之時賔裼奉束帛加璧其裼而不襲者以有束帛之藉故也記曰不文飾也不裼裘之裼也見美也服之襲也充美也禮不盛服不充蓋禮存於內心則以充美為敬禮存於外心則以見美為敬聘禮於其始相見也執圭鞠躬以誠致其禮而已故襲所以稱其內心也及其受享則發氣盈容以文致其物而已故裼所以稱其外心也後世學者以有藉為垂繅無藉為屈繅而其甚又有圭璋特而襲之說然則聘禮賈人取圭垂繅宰執圭屈繅使者受圭垂繅上介執圭屈繅及使者歸使者執圭垂繅上介執璋屈繅凡此謂垂繅屈繅可也謂之有藉無藉非也周官小行人圭以馬璋以皮皮馬雖非上堂之物其為藉也亦束帛之類而已謂圭璋特而襲亦非也聘禮上介執圭不襲則一於裼而已玉藻言執玉龜襲則一於襲而已又何也上介不襲以聘之盛禮不在已故也執玊龜襲以執主器故也聘禮亦曰凡執玊無藉者襲山隂陸氏曰藉若璧藉以帛琮藉以錦云爾非所謂繅藉也聘禮曰所以朝天子圭與繅皆九寸三采六等朱白蒼問諸侯朱緑繅八寸又曰凡執玉無藉者襲聘禮一書也言繅又别言藉則藉與繅異大行人曰公繅藉九寸侯伯繅藉七寸若此者繅也小行人曰璧以帛琮以錦琥以繡璜以黼若此者藉也廬陵胡氏曰鄭氏謂裼襲指執玉之人非也經意蓋謂玊有藻以藉者以袒裼而露見其美無藻以承者則以物覆襲之不暴露也豈謂人自裼襲新安朱氏曰鄭說兩義詞太簡略指不分明疏家所引皇氏熊氏說始以垂屈言之但所云今言無者據垂之也乃與經文及所說上下文皆相反疑其據字之下脫一不字至於圭璋璧琮之義則皇氏為失又所引崔靈恩云璧琮既有束帛則不須藻似亦抵牾疑璧琮雖有藻而屈之當為無藉特以加於束帛故從有藉之例而執之裼耳陸氏但取鄭注後說似亦有理然今未敢斷其是非故悉著其說以俟知者國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾鄭氏曰雖貴於其國家猶有所尊也卿老上卿也世臣父時老臣孔氏曰自此至同名一節總明稱謂之事世婦謂兩媵也次於夫人而貴於諸妾諸侯雖貴猶冝有所敬不得呼卿老世婦之名姪妻之兄女娣妻之妹從妻來為妾也大夫不得呼世臣及貴妾名也家相謂助知家事者長妾妾之有子者士不得呼此二等人名也熊氏云士有一妻二妾言長妾者當謂娣也藍田吕氏曰君之使臣臣之事君尊卑之勢雖殊其所以相敬之道一也故曰君使臣以禮臣事君以忠古者幼名男子冠而字女子笄而字所以别長幼也君之於臣妾雖冠笄亦名惟臣妾之長者不名所以别貴賤也卿老世臣家相皆其貴臣也世婦姪娣長妾皆其貴妾也均臣妾也特異其貴者蓋以禮敬之不敢慢也諸侯之臣上大夫卿下大夫上士中士下士凡五等卿老者即上大夫卿也自天子至於士其臣之貴者皆稱老記曰天子之吏自稱於諸侯曰天子之老列國之大夫使於諸侯自稱曰寡君之老又諸侯使卿弔于他國辭曰一介老某相執綍此天子諸侯之臣稱老者也魯臧氏老將如晉問此大夫之臣稱老者也士昏禮納采主人降授老鴈此士之臣稱老者也孟莊子不改父之臣與父之政則大夫有世臣也謂吾姑者謂之姪姪者妻之昆弟之子也娣其妹也皆大夫之貴妾也馬氏曰卿老世臣家相梱外之貴者也世婦姪娣長妾梱內之貴者也貴臣貴妾死而緦況生而可名之乎書稱成王之於周公曰公明保豫康王之於畢公曰惟公克勤小物言天子同姓謂之伯父叔父異姓謂之伯舅叔舅故平王稱齊桓公以伯舅稱晉文侯以父義和是天子之於臣亦有所不名也廣安游氏曰古之制禮者於君臣之際雖有自然之分而其相與之際皆以禮為節文非若秦漢以下尊君卑臣上下相絶也故古之待諸侯者不専以臣禮也亦有賔禮焉不専以治外之道治也亦以家人之道治焉如此不名卿老世婦世臣姪娣家相長妾則其治外如治內所以為卿老世臣家相之禮猶夫世婦姪娣長妾之禮也後世一以天子之尊巍然於上以臨羣臣名呼而𨽻役之君臣之間邈然相絶蓋其為天下既不以禮而専從事於法矣講義曰禮必有所尊非獨在下者欲尊其上也雖居己之下猶或有尊焉故君於卿老世婦大夫於世臣姪娣士於家相長妾皆不稱其名不以其為臣妾而略之也金華應氏曰所謂故國者非喬木之謂也有世臣之謂也古者立國必有世家大族以培護其本根且有世臣大老以隆固其棟幹人君常寵異而尊禮之所以存忠厚養恭敬也氣脉不墜於先世典刑可厲乎後來國之卿老家之世臣士之家相尊卑不同而輔贊則一敬之而不名所以示夫外之有所統也若夫內助之賢而舊者如世婦姪娣長妾雖其分不敵於女君其貴實隆於諸御敬之而不名所以示夫內之有所統也內外有所敬而不名則受其所敬者莫不竭其忠而盡心覩其可敬者莫不知所畏而稟命然後國政家事有所統一而緩急有所憑藉而倚重矣山隂陸氏曰士昏禮女從者畢袗𤣥鄭氏謂從者姪娣也則士有姪娣明矣君大夫之子不敢自稱曰余小子大夫士之子不敢自稱曰嗣子某不敢與世子同名鄭氏曰君大夫天子大夫有土地者不敢稱曰余小子辟天子之子未除喪之名大夫士之子亦辟其君之子未除喪之名不與世子同名辟僭效也其先之生則亦不改孔氏曰此以下明孝子在喪擯者接對賔客之辭大夫有地者則亦稱曰君天子未除喪自稱曰余小子今大夫有地雖同曰君而其子在喪不敢同天子稱也大夫士之子諸侯之大夫士之子也諸侯在喪稱嗣子某臣之子冝辟之世子謂諸侯之適子也諸侯之臣為其子作名不得與君適子名同同則嫌其名自比擬於君也世子貴不得同又若其子生在其君之世子前己為名而君來同己不須易也故榖梁昭七年傳云何為君臣同名君子不奪人親之所名重其所由來也又雜記云與君之諱同則稱字張氏曰稱嗣子某或殷禮也案春秋君在稱世子君薨稱子無言嗣子某者大夫之子稱未聞臨川王氏曰君大夫之子國君及大夫之子也藍田吕氏曰君大夫之稱未之聞也先儒云天子大夫有土地者其說雖不經見然考之此章立文之意義當然也蓋言君大夫之子不敢自稱曰余小子辟嗣天子之稱也辟嗣天子者必天子之大夫也又言大夫士之子不敢自稱曰嗣子某辟嗣諸侯之稱也辟嗣諸侯者必諸侯之士大夫也謂之君大夫者食采於畿內爵則諸侯位則大夫也謂之君大夫之子者嗣為天子之大夫也大夫士之子者嗣為諸侯之大夫士也記云天子未除喪曰豫小子考之詩書閔豫小子嗣王朝於廟之詩也以豫小子揚文武烈洛誥之文在成王營成周之時也今豫小子祗勤于德周官之文在成王滅淮夷之後也皆非未除喪之稱然此章所云恐非自稱之文當止曰小子可也馬氏曰詩曰嗟豫小子書曰眇眇豫末小子皆天子未除喪之稱也蓋天子域中之大故必謙以小子諸侯有繼世之禮故必命以嗣此在下者所以必辟之也禮諸侯在凶服曰適子孤春秋傳曰在喪公侯曰子儀禮士喪服曰哀子某是國君與士之所自稱者如此而已然則春秋之例踰年稱公何耶蓋以臣民之心不可一日無君故踰年稱公以孝子之心三年不忍當故三年稱子衛宣公未葬而嗣子稱侯非禮也晉有小子侯僭禮也大夫士之子先國君而名同之者猶稱字蓋君雖不奪其名而臣不可不稱字君使士射不能則辭以疾言曰某有負薪之憂鄭氏曰射者所以觀德唯有疾可以辭也使士射謂以備耦也憂或為疾孔氏曰射法每兩人相對以決勝負名之曰耦貴賤必對故卿與卿耦大夫與大夫耦或竒餘不足則使士備耦案大射君與賔耦卿大夫自相耦又有士耦於大夫又司射誓耦卑者與尊者為耦不異侯是言士得備預為耦故此有使士射之禮也某有負薪之憂此稱疾之辭也某士名也負擔也大樵曰薪詩云析薪如之何匪斧不克憂勞也言己擔樵之餘勞不堪射也庶人子負薪今士云者謙辭藍田吕氏曰男子生桑弧蓬矢以射天地四方言射者男子之所有事也不能射則幾於非男子也故不能射者男子恥之士雖不能射可以疾為辭而不可以不能辭也孟仲子曰有采薪之憂不能造朝采薪猶負薪也長樂劉氏曰周之士以鄉三物選未有不間六藝而為士者及其末世禮教衰微而士有不能射者猶未忘乎三物之教故托以負薪之勞焉馬氏曰先王之時司徒以六藝教民州長嵗時㑹射于州序故鄉之所共有射器而鄉大夫之所詢有射禮其於射也有司徒以作其耦有司馬以正其儀有撲以戒其失有算以課其功勝者則先升後降袒決張弓以飲不勝者不勝者後升先降說拾弛弓以飲於勝者而其辱有不肖之稱方是時也其相尚以射如此庸詎有士不能乎所謂不能者非不能也不善於此而已詩曰無射亦保吳郡范氏曰射者男子之事一藝而文武之道備焉其為法也內志欲正外體欲直容止欲比於禮節度欲比於樂有揖遜之儀有反求諸己之道蓋立文之外又足以致心檢形防非僻而蹈中正古人進德修業凡可以自助者皆習焉射蓋其一端也是以人人能之而不能者以為恥君使之射而偶未習焉則不敢以不能對而以疾辭負薪之憂賤人之疾也真不能而不敢以不能對則當時之士皆習於射可知大抵古人進德修業之外又於日用之常有可以間邪而存誠者無所不用其至其可考者佩玊也琴瑟也射也故君子無故玊不去身士無故不徹琴瑟君子無所爭必也射乎不能則辭以疾可謂無所不用其至矣夫假於外物猶若此而況其收視反聽退藏於密以存其心養其性者乎後世乃以弧矢為武夫之事琴瑟為樂工之職若佩玊則僅於祭服不得已而時用之耳成大侍於君子不顧望而對非禮也鄭氏曰禮尚謙也不顧望若子路率爾而對孔氏曰謂多人侍而君子有問若指問一人則一人直對若問多人則侍者當先顧望坐中或有勝己者宜前而已不得率爾先對也藍田吕氏曰不顧望而對則如恐人之先己若有所爭然嚴陵方氏曰顧於後有所省望於前有所瞻必顧望而後對者以示其不敢専也廬陵胡氏曰顧望若漢文問上林尉尉左右視金華應氏曰顧望者從容詳審有察言觀色之意言不輕發必當其可非但謙遜而已君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之鄭氏曰求猶務也不務變其故俗重本也謂去先祖之國居他國者其法謂其先祖之制度孔氏曰自此至之法論臣去本國行禮之事俗者本國禮法所行不務變之從新也祭祀之禮不變即夏立尸殷坐尸周旅酬六尸及先求隂陽犧牲騂黑之屬也居喪之服如殷雖尊貴猶服旁親周以尊降服哭泣之位如殷不重適以班髙處上周世貴正嗣孫居其首皆如其國之故謂故俗也舉此三條餘冠昏之屬從可知謹修其法若夏殷子孫在周則各謹修先世之禮法審慎以行之也熊氏曰王制云修其教不易其俗又左傳定四年封魯因商奄之人封康叔於殷墟啓以商政封唐叔於夏墟啓以夏政皆因其舊俗也蓋人君務在化民因其舊俗往之新國不須改也橫渠張氏曰行禮不求變俗於新國舊俗之法雖未盡善不遽矯變之也蓋懷舊臣之恩義不變父母邦之舊法也藍田吕氏曰孔子去魯曰遲遲吾行也去父母國之道也子路去魯謂顔淵曰何以贈我曰去國則哭于墓而後行古之君子重去父母之國如此則其去也豈得已哉道合則從不可則去君臣之義也故以道去其君者君所以待之者三有禮焉故臣為舊君反服而君未之絶也樂樂其所自生禮不忘其本吾於父母之國夫豈不懷況以道去君君待之有禮則舍故從新仁人君子有所不忍此行禮所以不求變俗也俗者吾父母之國俗也雖去而之他國至於祭祀之禮居喪之服哭泣之位皆如其舊謹修審行而不輕改者不忍忘吾父母之國也馬氏曰從俗禮也變俗亦禮也求變俗非禮也君子之於俗可則從否則變冝從而變則為亂常冝變而從則為泥俗周禮本俗六以安萬民成王封康叔啓以商政封唐叔啓以夏政以其冝從而從之也易在革則去故在鼎則取新五帝不同樂而治三代不同禮而王以其冝變而變之也如此則豈故拂民以求變俗哉凡因彼而已君子之不求變俗多矣特言祭祀居喪哭泣之位者以人情於此尤不忍變故也滕之諸臣曰喪祭從先祖是也李氏曰先王盛時道德一於上而風俗齊於下家無異道人無異德而祭祀居喪哭泣之禮有所不同無害其為同也故修其教不易其俗是以俗安而不偷且周之治於都鄙曰禮俗以馭其民以王畿之禮俗猶不必其同也故土均氏曰禮俗喪紀祭祀皆以其地微惡為輕重之法蓋地之微惡不齊故禮俗之異以其禮俗之異則治之法不得不異也廣安游氏曰舊俗之禮君子不求變之者因其俗之故常而行禮則不煩而易為力古之為法者行乎其簡而不行乎其煩行乎其常而不行乎其變苟變俗而行禮則煩而難行人且不聽祭祀喪服哭泣三者則又加於鬼神鬼神所安而不可輕易者也所謂國之故者言其故之所自來皆有祖述而不苟然也且不變之說有三非鬼神之所安一也煩而難行二也非天子不議禮不制度三也故夫不變其俗以行禮在乎謹修其法而審行之使不失其故耳嚴陵方氏曰治其壞謂之修措諸事謂之行修之有詳略不可不慎也故言謹行之有當否不可不察也故言審廬陵胡氏曰謂去父母之國而居他國者非也此但謂行禮安知去國乎俗謂本國之俗君子居本國不當變易風俗求合於禮而已去國三世爵祿有列於朝出入有詔於國若兄弟宗族猶存則反告於宗後去國三世爵祿無列於朝出入無詔於國唯興之日從新國之法鄭氏曰三世自祖至孫踰久可以忘故俗而猶不變者爵祿有列於朝謂君不絶其祖祀復立其族若臧紇奔邾立臧為矣詔告也謂與卿大夫吉凶往來相赴告也若兄弟宗族猶存謂無列無詔者反告亦謂吉凶也宗後宗子也興謂起為卿大夫從新國之法謂故國與己無恩孔氏曰此以下明在他國而得變俗者去國謂三諫不從及他事被黜兄弟宗族謂本國之親宗後大宗之後也己於本國無列無詔然未仕新國宗族猶存兄弟尚在己有吉凶當反還告宗適不忘本也若本國無列無詔而今始仕新國者所行禮悉改從新也推此而言則故國猶有列詔者雖仕新國猶行故俗若無列無詔而不仕新國者猶不得從新矣臨川王氏曰有列則有詔先王修其教不易其俗故國各有法也藍田吕氏曰以道去君君未之絶雖三世之久爵祿猶有列於朝者謂君為之立後以承先祀而食其田祿出入猶有詔於國者如去魯之齊又之晉復歸於魯君既未絶之則出入他國猶反告於舊君也如是者若其兄弟宗族猶存則必有宗子冠取妻必告死必赴不忘親也如去國三世收其田里掃其宗廟舊君與己出入不相聞也則去吾父母之國其日逺在吾君臣之際其恩絶可以變舊國之俗從新國之法矣然猶俟起為卿大夫然後從新者厚之至也嚴陵方氏曰以傳統而為後故謂之宗後夫於朝猶有列於國猶有詔於家猶有宗與族則彼所以待我者恩好猶未絶也如之何其遽絶之哉則反告之禮固所冝矣至於爵祿無列於朝出入無詔於國則宗族不存亦可知矣如之何其反告之哉馬氏曰人臣有舊君之服不過齊衰三月而已去國三世出入猶詔於國吉凶猶詔於宗後何也舊國者人之所不能忘宗族者人之所不可絶今夫鳥獸之過故鄉猶回翔蹢躅而後去狐之將死猶正丘首而後斃況於人乎故太公封於齊世葬於周君子以為不忘其本則去國三世而恩義不靳理固然也蓋爵祿有列於朝則是不棄其後也出入有詔於國則是不絶其好也如此則吾之所以反告者其可已乎夫爵祿有列於朝則有宗後以合其族爵祿無列於朝則無宗後之法無宗後則不特不反告而已故唯興之日從新國之法蓋方其未仕也雖守舊國之法可也及興而仕人則有所𨽻矣其可復為未仕之所為乎山隂陸氏曰言君子去國三世不失其位至於他邦而爵祿有列於朝出入有詔於國若舊國兄弟宗族猶存則反告於宗後蓋去國三世兄弟宗族容有弗存者矣若去國三世其在新國爵祿無列出入無詔是去國而失其位也舊國無恩可知故唯興之日從新國之法孟子曰有故而去則君使人導之出疆又先之於其所往如是而爵祿無列於新國之朝或寡矣廬陵胡氏曰孔子去宋既久尚冠章甫之冠送葬皆從殷制不從新國之法者與此異也廣安游氏曰古之為天下者以家道為之天子有其宗族以保天下諸侯有其宗族以保其國卿大夫士有宗族以保其家故其禮皆以宗族之存亡為之輕重也若爵祿無列於朝則君無恩於己矣出入無詔於國則宗族無恩於己矣若此者當變猶不遽變也於其興起為卿大夫之日然後從新國之法焉皆所以重其本之道也君子己孤不更名已孤暴貴不為父作諡鄭氏曰不更名亦重本暴貴不為父作諡子事父無貴賤孔氏曰此一節論父沒不可輒改為名諡之事名是父所作父死更作新名似遺棄其父也暴貴謂非一等之位若本為士庶今起為諸侯者也諡者列平生德行而為作美號若父昔賤已今暴貴忽為造諡似鄙薄父賤不冝為貴人父也藍田吕氏曰己孤不更名有所不忍也己孤暴貴不為父作諡有所不敢也不忍愛也不敢敬也愛敬盡於事親而已古者子生三月妻以子見而父名之斯名也父之所命也親存而有所禀命猶可更也己孤更之輕廢父命孝子之所不忍也父為士子為天子諸侯則祭以天子諸侯其尸服以士服是可以已之祿養其親不敢以己之爵加其親也父之爵卑不當諡而已之爵當諡以己當諡而作其父諡是以己爵加其父欲尊其親而反卑之非所以敬親也然則周之追王大王王季何也當周之興王迹基於大王王季文王世世修德至武王而有天下武王周公追述其功義起斯禮非後世追王之比也馬氏曰名雖不可更以字行可也今律有所避忌則行字者聽是也諡雖不可作德盛者可也武王周公追諡大王王季是也居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章居喪不言樂祭祀不言凶公庭不言婦女鄭氏曰為禮各於其時居喪言樂而下謂非其時也孔氏曰此一節明行禮各有時之事居喪居父母之喪也喪禮謂朝夕奠下室朔望奠殯宫及葬等禮也祭禮謂虞卒哭袝小祥大祥之禮也復常謂大祥除服之後也樂章樂書之篇章謂詩也此上三節事須預習故皆許讀之橫渠張氏曰禮在平日豈不常學如祭禮樂章豈必喪終乃學此言者蓋為切於用故至其時又復講求居喪者他書不可觀惟喪祭可讀若觀他書却似都忘藍田吕氏曰學必於其時言必於其所居喪者自大功以上廢業則哀不志於學矣然送死之大事莫詳於喪禮必誠必信勿之有悔則未葬不可不知也事死之經莫詳於祭禮所以追養致孝則既葬不可不知也讀是書也非肄業也當是時不知是事不以禮事其親也喪復常者既禫踰月則即吉也居喪不言樂至此始可以讀樂章也古者吉凶之事不相干也哀樂之情不可以二也二則不誠不足以奉大事故喪凶事也不言樂祭吉事也不言凶如臨喪不笑臨樂不歎之比皆以其非所也肅敬者公庭之事也燕昵者私庭之事也婦人私昵之事不可以言於公庭長樂劉氏曰讀喪禮者重其喪葬不敢自任必求範於先王也讀祭禮者祭有等降不敢以非禮事其先也讀樂章者言祭於先廟未始不用樂而歌其詩不忘其祖先之德也馬氏曰斬衰之喪唯而不對齊衰之喪對而不言大功之喪言而不及議小功之喪議而不及樂夫小功之喪議而不及樂況大於此而可言樂乎古者易服而葬周官蠟氏凡大祭祀禁凶服祭義郊之祭喪者不敢哭以為交於神明者不可以凶也又況祭祀可言凶乎男正位乎外女正位乎內內言不出外言不入凡欲無相瀆而已又況公庭可言婦女乎居喪不言樂後世猶有如衛孫文子者公庭不言婦女後世猶有如陳靈公者此季札泄冶所以譏之長樂陳氏曰非喪而讀喪禮則非人子之情居喪而不讀喪禮不失之過則失之不及未葬而讀祭禮則非孝子之情既葬而不讀祭禮不失之黷則失之怠喪未除而讀樂章則哀不足喪復常而不讀樂章則樂必崩故曰居喪讀喪禮既葬讀祭禮喪復常讀樂章宰豫欲短喪孔子以為不仁閔子騫子夏援琴而哀樂孔子皆以為君子則喪復常讀樂章先王之中制也振書端書於君前有誅倒策側龜於君前有誅鄭氏曰臣不豫事不敬也振去塵也端正也倒顛倒也側反側也皆謂甫省視之孔氏曰此一節明臣當豫事書簿領也不豫拂整龜策君之卜筮所須也不豫周正皆冝誅責也嚴陵方氏曰端謂正其簡書策有本末故曰倒龜有背面故曰側倒策側龜與振書其過非大然皆有誅疑若己甚蓋以羣臣之衆而奉一人之尊不可不謹也抑所以防其漸歟禮記集說卷十
