body:
  text: 禮記集説卷三十二宋衛湜撰古者公田藉而不稅市㕓而不稅關譏而不征林麓川澤以時入而不禁夫圭田無征鄭氏曰藉之言借也借民力治公田美惡取于此不稅民之所自治也孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹則所云古者謂殷時也㕓市物邸舍稅其舍不稅其物譏譏異服識異言征亦稅也周禮國凶札則無門關之征猶譏也麓山足也夫猶治也孟子曰卿以下必有圭田治圭田者不稅所以厚賢也此則周禮之士田以任近郊之地稅什一孔氏曰此一節論古者公田不稅及關市圭田無征之事並非周法故言古者其藉而不稅正謂殷時市㕓而不稅以下或兼虞夏殷言之民田之外别作公田一井之中凡有九夫中央一夫以為公田藉者借八家之力以治此公田美惡取于此不稅民之私田也引孟子者證三代稅法不同也案鄭注匠人云貢者自治其所受田貢其稅穀助者借民之力以治公田又使收斂焉夏則有貢無助殷則有助無貢鄭注匠人又云以載師職及司馬法論之周制畿內用夏之貢法稅夫無公田以詩春秋論語孟子論之周制邦國用殷之助法制公田不稅夫此三代所以别也知古者謂殷時者以春秋宣十五年云榖出不過藉此經亦云藉皆謂借民力也助官治田與殷七十而助相當故謂殷時鄭知周之畿內用夏貢法者案載師云以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地鄭注云㕓里邑里居也㕓民居之區城也宅田致仕之家所受田也士田自卿以下所受圭田也賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也賞田者賞賜之田也公邑謂六遂餘地天子使大夫治之家邑大夫之采地小都卿之采地大都公之采地載師又云園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二又司馬云井十為通通為四馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人計一成百井井有九家百井即九百家而云一成三百家者以此田上中下除宫室塗巷三分之一自餘通率一家受二夫故一成為三百家是一井九家為定無公田也故鄭云以載師職及司馬法論之周制畿內用夏之貢法不稅夫者謂鄉遂及公邑若采地即為井田稅夫與畿外同知畿外用助法者案詩小雅雨我公田遂及我私春秋宣十五年云初稅畝傳云穀出不過藉論語云盍徹乎孟子云方里而井井九百畝其中為公田八家皆私百畝是皆論公田之事故鄭云以詩春秋論語孟子論之周制邦國用殷之助法制公田不稅夫然畿外諸侯雖立公田其實諸侯郊內亦用貢法故孟子云野九夫之田而稅一即九一而助國中什一使自賦故鄭云邦國亦異外內耳但郊內地少郊外地多從多言之故云畿外制公田不稅夫也凡賦法無過什一但周之畿內有參差皆不同而言之市㕓而不稅者㕓謂公家邸舍使商人停物于中直稅其所舍之處價不稅其在市所賣之物市內空地曰㕓城內空地曰肆關譏而不征者關境上門也譏謂呵察公家但呵察非違不稅行人之物此夏殷法周則有關門之征林麓川澤民庶須有采取隨時而入官不限禁之案僖十四年沙麓崩榖梁傳云林屬于山為麓麓山足也鄭注大司徒云竹木曰林注瀆曰川水鍾曰澤比林麓川澤之異也以時入如獺祭魚然後虞人入澤梁是也夫圭田者畿內無公田故有圭田卿大夫士皆以治此圭田公家不稅其物故云無征必云圭者圭潔白也言卿大夫德行潔白乃與之田此殷禮也殷政寬厚重賢人故不稅周則兼通士稅之鄭引周禮士田載師文也長樂陳氏曰公田藉而不稅所以寬農市㕓而不稅所以寬商關譏而不征所以寬旅山澤以時入而不禁所以寬萬民周官載師士田之征十一則夫圭田無征者以治田之夫為言也治田之夫無征與司勳加田無國正諸子司馬弗正同意周官關市之法凡非凶荒皆有征此則市㕓而不稅關譏而不征者商賈惡其盛又惡其衰盛則去本者衆衰則貨不阜通故于其盛則抑之以征于其衰則寬之以無征凡因時以權之而以周官皆言征于掌交則曰九稅蓋征者稅斂之總名也又禮書曰鄭氏以周禮士田為圭田以圭田無征為殷制而注載師士田改士為仕其説無據孟子言九一而助繼之以圭田五十畝餘夫二十五畝者圭田祿外之田也餘夫夫外之田也祿外之田半百畝夫外之田又半之此自百畝而差之然也古者自卿士達于圭田同等欲各致其誠敬而已後世因職分田以貴賤制之非禮意也嚴陵方氏曰公田猶公桑也以有别于私故謂之公市㕓則賦其市地之㕓不稅其交易之貨也關則察其姦偽之情不征其出入之貨譏謂以言微切之經所謂關執禁以譏是也大司徒荒政有云譏亦謂是也林麓川澤之名見篇末解凡此皆百貨之所出也故特禁其非時而入者然文王之治岐也澤梁則無禁者方紂在上害虐蒸民姑以紓一時之急權一時之宜而已夫圭田無征者以其田必使餘夫治之故田謂之夫圭田即孟子所謂卿以下必有圭田是也圭以潔為義所以養其亷潔之行也公亦有田不謂之圭者公不嫌于不亷潔故也曰夫圭田無征則非特圭田之五十畝然也雖餘夫之二十五畝亦然以夫言之又有見乎圭田無征所以優賢能也餘夫之田無征者所以優老弱而已亦與公田藉而不稅同義然周官士田亦有私則知此所言特主卿大夫耳抑又殷周之法異也或曰不征或曰無征何也圭田者則直無征也故言無關雖不征猶有譏焉故言不而已山隂陸氏曰凡有所藉如借可也故藉之言借也孟子曰助者藉也蓋亦以此以助為藉則正在我矣家語曰在貧如客使臣如借是冉有之事也市㕓而不稅雖曰取之猶不取也且謂之稅則以其正不在是也其謂之㕓則亦有義焉爭名者于朝爭利者于市皆可以縛人而利為甚謂之譏言于其微時言也古者林麓川澤以時入而不禁後世為之厲禁然後能如此圭者潔也著卿以下潔白無玷而後可以祭祀石林葉氏曰稅者説取于民征者正取于民合而言之一也對而言之則稅止于布帛粟米而征則兼于力役者矣孟子曰有布縷之征有粟米之征有力役之征公田既借其力而市㕓既征其貨故于粟米則不稅關既譏其異圭田既取其稅故于力役布帛則不征此孟子所謂用其一而緩其二也然周公之時門關猶征而文王則不征者蓋紂方虐民而文王寬以待之則不征所以趨時天下已治而周公制禮以定之則有征所以抑末然則門關有可征之時非所謂無征卿以下有圭田者所以勵其節在于力役布帛也非有可征之時故特曰無征圭田無征則士願立于朝關譏而不征則商願行於路市㕓而不稅則賈願藏于市藉而不稅則農願耕于野新安朱氏曰夏時一夫受田五十畝而每夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田而不復稅其私田周時一夫受田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作收則計畝而分故謂之徹其實皆什一者貢法固以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舍一夫所耕公田實計十畝通私田百畝為十一分而取其一蓋又輕于什一矣竊料商制亦當似此而以十四畝為廬舍一夫實耕公田七畝是亦不過什一也又曰㕓市宅也張子曰或賦其市地之㕓而不征其貨或治之以市官之法而不賦其㕓蓋逐末者多則㕓以抑之少則不必㕓也關謂道路之關市謂都邑之市譏察也征稅也關市之吏察異服異言之人而不征商賈之稅也又曰圭潔也所以奉祭祀也程子曰一夫上父母下妻子以五口八口為率受田百畝如有弟是餘夫也年十六别授田二十五畝俟其壯而有室然後更授百畝之田案此百畝常制之外又有餘夫之田以厚野人也孟子説廬陵胡氏曰周畿內用貢法謂鄉遂及公邑若采地即為井田與畿外同亦助法矣周邦國用助法制公田然畿外邦國雖立公田其實諸侯郊外亦用貢法故孟子云野九夫之田而稅一即九一而助國中什一使自賦也是周畿內畿外通用貢助不皆如鄭説夫發語辭圭潔也言卿大夫德行潔與之田也此不知何代法周則有征清江劉氏曰關譏而不征謂羇旅士民也至於商猶征之馬氏曰古之為關將以禦暴至于周則門關有征所以抑末也延平周氏曰先王欲誘天下之遊手者歸于農故間民之治圭田者則無夫家之征用民之力嵗不過三日田里不粥墓地不請鄭氏曰用民之力謂治宫室城郭道渠田里皆受于公民不得私也粥賣也請求也孔氏曰此一經前明以殷法此則兼通周禮謂使民治城郭道渠年嵗雖豐不得過三日自下皆然案周禮均人云豐年旬用三日中年旬用二日無年旬用一日年嵗不同雖豐不得過三日田地里邑既受之于公民不得粥賣冢墓之地公家所給族葬有常不得輒請求餘處也長樂陳氏曰起一人之徭則百畝不舉起十人之徭則千畝不舉先王知其如此故用民之力歲不過三所以寬之也周官豐年旬用三日中年旬用二日無年旬用一日則歲不過三日云者非周制也田里鄉遂官之所頒不可以粥墓地墓大夫之所掌不可以請田里不粥則生者無相兼并而民無憾于養生墓地不請則死者有所安厝而民無憾于送死用民之力義也不過三日仁也頒之田里墓地仁也禁之以不粥不請義也事在於義則輔之以仁事在於仁則處之以義此所以為良法也嚴陵方氏曰不過三日所以寬其力而民無徭役之苦矣周官豐年旬用三日則經所言蓋雖豐不得過三日之制也田言野外所耕之地里言國中所居之地周官墓大夫掌凡墓地域令國民族葬則固不在所請矣請謂求之也山隂陸氏曰郊特牲曰既蠟而收民息已故既蠟君子不興功據此用民之力唯冬一月而已周官曰凡均力政以嵗上下豐年則公旬用三日中年則公旬用二日無年則公旬用一日據此用民之力唯一旬而已故曰用民之力嵗不過三日石林葉氏曰民各有常業而又役不過三日所以休其力田里不粥所以定其居墓地不請所以寧其親此三代盛時仁行于天下如此司空執度度地居民山川沮澤時四時量地逺近興事任力凡使民任老者之事食壯者之食鄭氏曰司空冬官卿掌邦事者度丈尺也山川沮澤時四時觀寒暖燥濕也沮謂萊沛量地謂制井邑之處興事謂築邑廬宿市也凡使民寬其力饒其食孔氏曰此一節論司空居民并任以事食之事司空執丈尺之度以量度于地居處于民觀山川髙下之宜沮澤浸潤之處又當以時候此四時知其寒暖鄭注寒暖謂四時燥謂山濕謂川與沮澤也草所生為萊水所生為沛鄭言沮謂萊沛有水草之處也量地逺近以制邑井為邑之處謂平原之地沃衍之所堪建邑井左傳所謂井衍沃也小司徒云九夫為井四井為邑若山林藪澤則不堪邑井也興事謂築邑即築城也又築廬宿及市遺人云凡國野之道十里有廬三十里有宿五十里有市是也凡國家為役之法老少功程不同老則功少壯則功多今使民之時雖壯者限以老者之功程故曰任老者之事凡廩餼牲體壯者食多老者食少雖老者給以壯者之料故曰食壯者之食長樂陳氏曰居民山川沮澤所以辨地宜時四時所以候天氣量地逺近興事任力所以均民力書曰司空掌邦土居四民時地利如此而已司空事官也而度地居民者蓋四民各以其職分地而處然後造事則居民者正事之始也夫力出于下食出于上以下益上則不足以上益下則有餘故壯者任以老者之事所以寬其力此所謂事舉其中也老者食以壯者之稍所以豐其食此所謂施從其厚也周官之法上地之入可食九人而其家準以七人與食壯者之食同意家雖七人而以三人為可任與任老者之事同意嚴陵方氏曰山川沮澤之異處則四時所至之氣不能無差故必候天時以察地利焉時則候其時之謂量地逺近將以制邑故也制邑則必興役事興役事則必任民力故繼言興事任力焉山隂陸氏曰居民句斷山川沮澤言治沮澤準以山川之政若田二牧而當一井矣春秋傳曰度山川鳩藪澤量地逺近興事任力若納總納銍納秸服亦是也李氏曰居民山川沮澤時四時量地逺近興事任力則舜所謂釐下土也然使民任老者之事食壯者之食則山澤莫不同也餘見下章廬陵胡氏曰不役老者使民之壯者代任其事功雖代老者之役為輕而給壯者之糧則厚凡居民材必因天地寒暖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜修其教不易其俗齊其政不易其宜鄭氏曰因天地寒暖燥濕者使其材藝堪地氣也異制謂其形象異俗謂其所好惡異齊謂其性情緩急異和謂香臭與鹹苦異制謂作務之用異宜謂旃裘與絺綌教謂禮義政謂刑禁孔氏曰自此至曰譯一節論中國及四夷居處言語衣服飲食不同之事材謂氣性材藝言五方之人其能各殊五者居處各須順其性氣材藝使堪其地氣能寒者使居寒能暑者使居暑也剛柔輕重遲速有六鄭注唯云緩急者剛輕速總是急柔重遲總是緩大總唯二也人性不同亦有柔而速剛而遲者器械異制者謂民之作務所用五方不同故考工記若粵之用鎛胡之用弓車器謂總用之器械謂兵器何休注公羊傳云攻守之器曰械俗謂民之風俗宜謂土地器物所宜言修此禮義教化當隨其風俗齊其政令施為當隨物之所宜也長樂陳氏曰民之材猶木之材也木材之于地有宜有不宜民材之于居有安有不安善植木者順其所宜而不強其所不宜善居民者順其所安而不強其所不安此所以凡居民材必因天之寒暖地之燥濕也剛柔遲速異齊言其才也五味異和言其嗜也器械異制若粵鎛燕函秦盧胡弓車是也衣服異宜若南國之人被髮而裸北國之人冠冕而裳是也人之所欲為俗俗之所安為宜先王觀民設教故修其教不易其俗因而為政故齊其政不易其宜蓋教出于德性故修之政係于法度故齊之修其教齊其政人也不易其俗不易其宜天也嚴陵方氏曰日南多暑日北多寒是天之寒暖不同也若髙平曰陸下濕曰隰是地之燥濕不同也官民材者隨其小大而用之耳居民材者隨其強弱而處之焉谷虛而廣川流而大封域之制不同也民生其間者異俗若生于陵者安于陵長于水者安于水齊讀如五齊之齊以剛柔輕重遲速雖則不齊然各有分焉故謂之齊也剛柔言其材輕重言其質遲速言其性凡此又不特言廣谷大川之間而已若堅土之人剛弱土之人柔以其材之異齊故也丘陵之民專而長墳衍之民晳而瘠以其質之異齊故也大蒙之人信空同之人武以其性之異齊故也東南之方不火食西北之方不粒食則以五味異和故也修其教不易其俗齊其政不易其宜者若封于商墟者則啓以商政疆以周索封于夏墟者則啓以夏政疆以戎索之類是矣因俗然後有宜故于教言俗于政言宜此淺深之别也上兼言異齊異制異和此則止言俗與宜者别而言之雖有三者之異合而言之無非俗與宜故也馬氏曰剛柔輕重遲速異齊此雖出于天抑亦地氣之使然也夫居則有寒暖燥濕之殊俗則有廣谷大川之異材則有剛柔輕重遲速之不一至于口之于甘器之于用體之于安亦不可得而一五味者春宜酸夏宜苦秋宜辛冬宜鹹而調之以滑甘此五味之常也其曰異和者言其變也同器械先王之所務而異物則有所禁其曰異制者因其性有剛柔輕重而制之也同衣服先王之所務而異服則有所禁其曰異宜者因天地有寒暖燥濕而制之也教所以導民俗則因民之所欲也故修其教不易其俗不易其俗者不咈其所欲也政所以正民而宜者事得其義之謂也故齊其政不易其宜夫唯修其教不易其俗故先王有以省方觀民設教夫唯齊其政不易其宜故周官司徒有山林其動物宜毛物其植物宜皂物川澤其動物宜鱗物其植物宜膏物也李氏曰居民材以下此舜之所以别生分類也然修其教不易其俗齊其政不易其宜則逺近未嘗異以其釐下土故曰居民以其别生分類故曰居民材周禮司徒以土宜之法辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以育草木以任土事此其所謂量地逺近興事任力者也又曰以土會之法辨五地之物因此五物者民之常而施十有二教焉此其所謂修其教不易其俗也又曰以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政此所謂齊其政不易其宜也蓋司徒辨其物司空任其事所以交相治也石林葉氏曰寒暖燥濕天地之氣廣谷大川天地之形有氣與形則生有豐瘠長短好惡習尚之異此所以修其教不易其俗也剛柔輕重遲速者民之性食味器械者民之用器用之便于俗亦不必同此所以齊其政不易其宜也所謂教者其屬有七具于天而自然者也父子有親兄弟有愛夫婦有别君臣有義長幼有序朋友有信賔客有禮其教成于人而使然也天雖有自然而成乎人者亦必使然故曰修其教所謂政者其屬有八所用以相養者也衣服有常飲食有節事為有度異别有法度量有權數制有等上所用以防淫者也物之相養雖不可齊淫辟亦不可無禁故曰齊其政凡所以治中國而政教為詳中國戎夷五方之民皆有性也不可推移東方曰夷被髮文身有不火食者矣南方曰蠻雕題交趾有不火食者矣西方曰戎被髮衣皮有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣中國夷蠻戎狄皆有安居和味宜服利用備器五方之民言語不通嗜欲不同達其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯鄭氏曰五方之民性不可推移地氣使之然也雕文謂刻其肌以丹青涅之交趾足相向然浴則同川卧則僢不火食地氣暖不為病也不粒食地氣寒少五榖也中國夷蠻戎狄皆有安居和味宜服利用備器其事雖異各自足也寄象鞮譯皆俗間之名依其事類耳鞮之言知也今冀部有言狄鞮者孔氏曰此以下總論四夷中國之異五方謂中國與四夷也舉戎夷則蠻狄可知文身謂以丹青文飾其身雕題者雕刻也題謂額也謂以丹青雕刻其額非唯雕額亦文身也故仲雍居吳越左傳云斷髮文身漢書地理志云越俗斷髮文身以辟蛟龍之害故刻其肌以丹青涅之東方南方皆近海故俱文身也趾足也言蠻卧時頭向外而足在內而相交故云交趾鄭注浴則同川卧則僢者言首在外而足相向內故典瑞注云僢而同邸不云被髮斷髮故也言有不火食亦有火食者西方無絲麻唯食禽獸故衣皮東方北方多鳥故衣羽正北多羊故衣毛凝寒至盛林木又少故穴居中國四夷雖異各有所安之居所和之味所宜之服所利之用所備之器是其用雖異各自充足也五方之民水土各異故言語不通好惡殊别故嗜欲不同帝王立此傳語之人曉達五方之志通傳五方之欲使相領解寄者傳寄外內言語象者放像外內之言狄鞮知也通傳夷狄之語與中國相知譯者陳也陳説內外之言此通傳四方語官也東方謂之夷者風俗通云東方人好生萬物抵觸地而出夷者抵也其類有九依東夷傳九種一曰玄莬二曰樂浪三曰髙驪四曰滿飾五曰鳬臾六曰索家七曰東屠八曰倭人九曰天鄙南方曰蠻者風俗通云君臣同川而浴極為簡慢蠻者慢也其類有八李巡注爾雅云一曰天竺二曰咳首三曰僬僥四曰跂踵五曰穿胸六曰儋耳七曰狗軹八曰韋脊西方曰戎者風俗通云斬伐殺生不得其中戎者凶也其類有六李巡注爾雅云一曰僥夷二曰戎夷三曰老白四曰耆羌五曰鼻息六曰天剛北方曰狄者風俗通云父子嫂叔同穴無别狄者辟也其行邪辟其類有五李巡注爾雅云一曰月支二曰穢貊三曰胸奴四曰單于五曰白屋長樂陳氏曰先王以治治中國以不治治夷狄故于中國疆以周索則有教以道其志有政以齊其行于夷狄疆以戎索則立之寄象鞮譯而已是雖所治之詳略不同至于順其所安而不強其所不安則一也夷言其易蠻言其慢戎則好兵狄則善守東南之地卑而蛟龍種焉故俗之所尚者文身雕題西北之地髙而鳥獸羣焉故俗之所尚者衣皮羽毛凡此不特其所尚而已亦寒暖之勢異也寄象鞮譯在周官所謂象胥是也達其志通其欲在象胥所謂協其言辭傳之是也寄言其寓于此象言其像于彼鞮言其屨譯言其語凡此皆互見也周韎師旄人鞮鞻氏教四方之樂其名官或以其所服或以其所執或以其所履與此同意爾雅曰太平之人仁丹穴之人智大蒙之人信空同之人武則四方之人未嘗不善而聖人命之以夷蠻戎狄者仁智信武其性也夷蠻戎狄其習也荀卿曰於越夷貊之子生而同聲長而異俗教使然也嚴陵方氏曰推言往來之相推移言彼此之相移以其皆有性故不可推移性即上文云是矣夷以其易而無文蠻以其小而有屬戎以其剛狄以其勇于題曰雕于身曰文互言之耳安居若所居異俗是矣和味若五味異和是矣宜服若衣服異宜是矣備器若器械異制是矣利用言所利之用謂居山不以魚鱉為禮居澤不以鹿豕為禮是矣馬氏曰性受于天則同而中國戎夷有若天地之降者抑亦地氣之使然也東者陽氣之發而南者陽氣之所積蓋陽之氣熱有可不火食者矣西者隂氣之發而北者隂氣之所積蓋隂主乎殺而五榖不生有可不粒食者矣雕題交趾蓋蔽其所習而不以為恥則餘亦若是而已志欲者言語之藴言語者志欲之寓達其志通其欲必在于言語之際故古者有道言語之官謂之寄象鞮譯説者以東南之地近可以致其詳西北之地逺可以致其略此説是也山隂陸氏曰五方之民皆有性也不可推移橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死物固有之人亦宜然寄以黜而寓之為義譯以來而譯之為義象禮也所謂象胥是已狄鞮樂也所謂鞮鞻氏是已李氏曰凡人之魂氣生于天故天得以變其性南方之強寬柔以教北方之強祍金革而不厭是也體魄成于地故地得以化其形山林之民毛而方川澤之民黑而津丘陵之民專而長墳衍之民晳而瘠原隰之民豐肉而痺是也以其性之不同故剛柔輕重遲速異齊五味異和以其形之不同故器械異制衣服異宜以其剛柔輕重遲速異齊五味異和故先王修其教不易其俗以其器械異制衣服異宜故先王齊其政不易其宜蓋聖人之所以同人者在乎類族辨物使下觀而化者在乎省方觀民設教而已天下之法自堯至周而後大備故治夷狄之道略于堯而詳于周堯典宅嵎夷安之以道也舜則非唯安之也必有德以服之故曰蠻夷率服夏則非唯服之也必有教以及之故曰朔南暨聲教殷則非唯及矣必有法以制之故曰莫敢不來享莫敢不來王周則非唯制之也必有政以治之故曰合方氏之職掌通其材利同其數器一其度量除其怨惡同其好善凡居民量地以制邑度地以居民地邑民居必參相得也無曠土無遊民食節事時民咸安其居樂事勸功尊君親上然後興學鄭氏曰興學立小學大學孔氏曰此一節論居民與地相得及食節事時勸功尊君立學之事食得其節事得其時民樂悅事務勉勵立功尊君親上如此然後可得興學民富而可教也長樂劉氏曰公侯等爵邑之大小而畫地以制其封域有地廣而民稀者其土瘠也有地狹而民稠者其土膏也封域雖等而賦入不侔夫井雖均而田萊不一必使萬民安宅而凶旱有以自周諸侯撫封而禮樂有以自備者司空度地必參相得而後能也長樂陳氏曰先王之于民居之然後養之養之然後教之量地制邑以至必參相得者居之也無曠土以至尊君親上者養之也然後興學教之也蓋人之生莫不有親親長長之良心矣養其良心而不陷溺之則由其親親以至于親上由其長長以至于尊君則尊君親上天地之道也然後興學裁成天地之道也嚴陵方氏曰量猶籥合升斗斛五量之所量以量其多少度猶分寸尺丈引五度之所度以度其長短故多少足以知其所容長短足以知其所至故于制邑之地曰量于居民之地曰度然邑制之所容莫非民民居之所至莫非邑則邑亦可言度居亦可言量矣兩之為並三之為參地也民也長短多少不可相失也無曠土則地無遺利無遊民則人無遺力曠言虛而無墾闢之功遊言散而無興作之業也食節則無不足之患事時則無不急之務居民之道亦期其如此而已故效至於民咸安其居也樂事則不至于勞苦勸功則不由于勉強尊君則為臣者有遜志親上則在下者無離心上則不止于君凡在已上者皆是也教不可一日廢必待樂事勸功尊君親上然後興學者則以至此然後教學之道可致其詳故也且禮樂之教豈一日之所可無哉然制作必在于治定功成之後者亦此之意馬氏曰邑所以容民民所以治邑故凡居民量地以制邑蓋邑大而民少則有曠土之患邑小而民多則養有所不足而有遊民之患地邑民居必參相得者欲其無曠土無遊民之患故也李氏曰于制邑必量地之多寡者蓋又將以制其地域也于居民言度其長短者蓋又將以室數制之也不量地以制邑則田或多而民力有不足詩曰無田甫田維莠驕驕言田夫治之不勝而莠生之也不度地以居民則宅或狹而民力為有餘詩云十畝之間兮桑者間間兮行與子還兮言桑者多而民有無桑以采者也故必在乎地邑民居之參相得也地邑民居之參相得則田雖大農有以致其力而多穫詩云倬彼甫田嵗取十千是也桑雖無餘而婦得以治于時詩曰蠶月條桑取彼斧斨以伐逺揚猗彼女桑是也講義曰居民之道要必有法邑有小大多寡之數或方六七十與夫百里之邑當量其小大而制之也地有山林川澤原隰之異或居于山或居于澤或居原隰當量其地之宜而使居之也地邑民居相參而得所然後為相得無曠土者欲盡地利而田野墾闢也無遊民者欲民各安業而無遊惰也食必有節不必珍異事必以時無後時之失如是則民安其居樂其事赴其功仰事俯育養生喪死可以無憾豈不知尊其君親其上哉唯知尊君親上乃能知禮義亷恥在上者可興學校以教之也孟子曰謹庠序之教申之以孝弟之義亦此意黃氏曰民恥于無功之食而俎豆牲牢各知其分殺害有時則食節之義也庶人既知貴農皆趨三時之務則事時之義也上下有節然後謹庠序之教化之以孝弟鄉遂推賢讓齒則太平之道興焉橫渠張氏曰樂事樂稼穡力役之事勸功功利也此以國俗而言果能如是則自事學矣何必云然後興學大抵有民即有學家有庠遂有序豈可無之臨川王氏曰樂事勸功尊君親上然後興學禮乎曰學者先王之所以教有教然後使人能樂事勸功尊君親上教成然後立學似非先王之法也孔子謂富而後教之者民窘于衣食固不可驅而之善也故富之者王道之始雖然所以教者未嘗待民以大富足之後乃始興之也隨其力之厚薄勢之緩急而為之禮皆所以教之也教不可以一日廢則學不可一日亡于天下也司徒修六禮以節民性眀七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡鄭氏曰司徒地官卿掌邦教者逮及也簡差擇也孔氏曰自此至曰進士一節論司徒修禮明教上賢絀惡教學升進之事六禮謂冠一昏二喪三祭四鄉五相見六所稟之性有剛柔輕重遲速恐其失中故以六禮節之七教即父子一兄弟二夫婦三君臣四長幼五朋友六賔客七也德者得也恐人不得其所故以七教興舉其民使之皆得其所也此六禮七教並是殷禮周則五禮十二教也八政一曰飲食二曰衣服三曰事為四曰異别五曰度六曰量七曰數八曰制淫謂過奢侈故以八政禁令之事以防淫過之失貴賤同者故不云民道履蹈而行謂齊一所行之道以同國之風俗敬養耆老所以致敬孝之意哀恤孤獨所以逮及不足謂以恩意逮及之不足則孤獨者也尊上賢人所以崇奬有德簡去不肖所以絀退惡人長樂陳氏曰修六禮明七教齊八政一道德所謂教思無窮也養耆老恤孤獨所謂容保民無疆也有以教之又有以容保之然後上賢以崇德簡不肖以絀惡亦不變而後賞罰可言之意也賢者德之名德者賢之實惡者不肖之實不肖者惡之名名出于行實係于心由其名以察其實由其行以原其心故尚之而後崇簡之而後絀也嚴陵方氏曰禮惡乎壞則六禮其可以不修教惡乎隱則七教其可以不明性非禮以節之則易以流故修六禮以節民性德非教以興之則易以廢故明七教以興民德政以正之其可以差忒乎則八政在乎齊矣道者人所共由德者人所同得其可以二乎則道德在乎一矣齊八政所以使之無過行故曰防淫一道德所以使之無異習故曰同俗養耆老則推愛親之心于是為至恤孤獨則損有餘之心無所不及且六十曰耆七十曰老耆老在所養則耄期固可知矣無父曰孤無子曰獨孤獨在所恤則鰥寡固可知矣賢者難于進故上之不肖者惡其雜故簡之六禮七教八政解見篇末李氏曰善教得民心故教民謂之司徒六禮冠鄉嘉禮也喪凶禮祭吉禮也相見賔禮也周官宗伯掌禮之在上者則有軍禮而冠昏鄉其禮同故五禮此言禮之在民者則冠昏鄉其事異而無軍禮故有六禮七教舜命司徒則曰五品不遜五教在寬穆王命司徒則曰敷五典蓋父子君臣夫婦長幼朋友五者莫不有常故曰五典五者莫不有等故曰五品父子教之有親君臣教之有義夫婦教之有别長幼教之有序朋友教之有信故曰五教分而言之則父子兄弟其道同而兄弟主于親朋友賔客其事同而賔客主于禮故有七教由七教而詳言之則周官司徒所掌十二教是也八政周官司徒辨其貴賤老幼而有飲食之禁令則政之在飲食也以本俗六安萬民而終于同衣服則政之在衣服也頒職事以登萬民曰學藝曰世事則所謂事為也以土宜之法相民宅而知其利害則所謂異别也以度教節則所謂度也以儀辨等則所謂制也節必有量等必有數夫禮始于冠本于昏成于喪祭和于鄉射故六禮以冠昏喪祭鄉相見為序教于內而至于外父子兄弟夫婦教之在內者也君臣長幼朋友賔客教之在外者也故七教以父子兄弟夫婦君臣長幼朋友賔客為序政本于民而制于上飲食衣服事為異别因民而立制者也度量數制自上以節下者也故八政以飲食衣服事為異别度量數制為序禮所以防萬民之偽而教之中故曰節民性教所以告之天人之道故曰興民德政所以正之故曰防淫民之性無非天也故六禮曰修修言有所因也人之德無非自得也故七教曰明明者言有所本也淫者出于民之欲也故八政曰齊齊者有以制其過差也周官宗伯掌禮司馬掌政蓋所謂國禮國政也故司馬之職未嘗有治萬民之政而宗伯之禮不設于象魏也鄉師三嵗察辭大行人六嵗協辭竒邪者有禁造言者有刑所以一道德也五十者養于鄉六十者養于國七十者養于學所以養耆老也鰥寡孤獨者皆有常餼所以恤孤獨也以賢制爵所以尚賢也有不孝不睦不姻之刑以糾不仁有不弟不任不恤之刑以懲不義所以簡不肖也先王修六禮明七教齊八政所以安民也一道德以同俗養耆老以致孝恤孤獨以逮不足所以擾萬民也有賢可以尚則教之成也先王之法至于簡不肖則備矣石林葉氏曰禮者人所體以示于外天所作以具于內故以節民性教者上所以勉于下下所以得于已故以興民德政者率人以身而格其不正故以防淫道出于命德出于性人所備有故以同俗雖然莫非道也而道有邪正莫非德也而德有吉凶一之而後異言者不作異行者不客而風俗同于天下道德一風俗同亦未始不先以政衣服器械不法則奢度量數制不同則偽齊之而後竒器異服者息淫聲邪志者懼而禁令行于天下淫邪止禁令行未始不先以教故仁之於父子義之於君臣禮之於賔主信之於朋友命也有性焉明之而後閨門肅朝廷正鄉黨和庠序勸而後教化被乎天下教化行而民德興亦未始不先之以禮故始于冠而人道立本于昏而人倫正重于喪祭而親親之恩著達于鄉相見而齒位定恩意合此道德之原所自出而本末先後之理也雖然司徒所掌者邦教而宗伯所掌者邦禮此先禮而後教則疑于侵官揚子言道以道之而終至于禮以體之此先禮而後道則疑于無序何也蓋宗伯所掌者禮之文而司徒所掌者禮之本故周官因民之常而施十有二教焉率皆言禮而宗伯所掌者或五或十二皆所以趨時之緩急以為詳略不同也廬陵胡氏曰從司徒修六禮至升諸司馬曰進士皆是司徒教事自命鄉論秀士至下造士皆崇德也自命鄉簡不帥教至終身不齒皆絀惡也禮記集説卷三十二
