body:
  text: 禮記集説卷十九宋衛湜撰縣子曰綌衰繐裳非古也鄭氏曰非時尚輕涼慢禮孔氏曰此一節論縣子非當時人尚輕涼慢禮之事綌葛也繐布疏者時有䘮者不服麤衰但疏葛為衰繐布為裳故云非古古謂周初制禮時也唐陸氏曰綌麤葛布細而疏曰繐嚴陵方氏曰古之五服自斬至緦一以麻而各有升數焉若夫以綌為衰以繐為裳則取其輕涼而已故曰非古也子蒲卒哭者呼滅子臯曰若是野哉哭者改之鄭氏曰滅蓋子蒲名唯復呼名子臯孔子弟子髙柴野哉非之也孔氏曰此一節論哭者呼名非禮之事唯復呼名冀其聞名而反哭則敬鬼神不復呼名此家哭呼名子臯非之乃改也金華應氏曰滅疑非名但以死有滅絶之義呼而哭之杜橋之母之䘮宫中無相以為沽也鄭氏曰沽猶畧也孔氏曰此一節論䘮湏立相導之事禮孝子䘮親悲迷不復自知禮節事儀皆湏人相導而杜橋家母死宫中不立相侍故時人謂其於禮為麤畧夫子曰始死羔裘𤣥冠者易之而已羔裘𤣥冠夫子不以弔鄭氏曰不以吉服弔䘮孔氏曰此一節論始死易服之事蓋飬疾者朝服羔裘𤣥冠即朝服也始死則易去朝服著深衣記時有不易者又有小斂後羔裘弔者記人引鄉黨孔子身行之禮以譏當時多失禮也嚴陵方氏曰吉服可以飬疾而不可以居䘮故始死則易之不特䘮者易之弔者亦所不服也馬氏曰弔者在小斂之前猶當服羔裘𤣥冠以主人未成服弔者麻絰不敢先也故子游裼裘而弔既小斂乃襲裘帶絰而入若夫子之羔裘𤣥冠不以弔者是言小斂之後而已矣子游問䘮具夫子曰稱家之有亡子游曰有亡惡乎齊夫子曰有毋過禮苟亡矣斂首足形還𦵏縣棺而封人豈有非之者哉鄭氏曰惡乎齊問豐省之比也形體也還𦵏還之言便也言己斂即𦵏不待三月縣棺謂不設碑繂不備禮也封當為窆窆下棺也春秋傳作塴人豈有非之言不責於人所不能也孔氏曰此一節論送終所湏當辦具也稱猶隨也亡無也夫子言各隨其家計豐薄有無惡乎猶於何也言於何可齊也夫子曰有毋過禮此答是稱富家也毋猶不也禮有節限設若家富有正禮可依不得過之也苟亡矣以下答貧家也家既無財但使衣衾斂於首足形體不令露見而已斂竟便𦵏但手縣棺而下之同於庶人也臨川王氏曰凢禮言封者復土以閉瘞之名爾何用改為窆乎王制庶人不封不樹易以不封不樹為古則周有封樹之制不必下逮庶人嚴陵方氏曰齊言其多少之齊也馬氏曰孟子曰不得不可以為悦無財不可以為悦古之人所以得用其禮者為其有財故也苟無其財則斂首足形還𦵏雖不足為孝子之悦然以其所以𦵏而𦵏亦豈有非之者哉司士賁告於子游曰請襲於牀子游曰諾縣子聞之曰汰哉叔氏專以禮許人鄭氏曰禮唯始死廢牀失之子游當言禮然言諾非也叔氏子游字孔氏曰此一節論不可以禮許人之事䘮大記始死廢牀至遷尸及襲皆在牀當時失禮襲在於地故司士賁告子游子游知襲在牀不據禮答之專輙許諾如禮出於己故縣子譏之汰自矜大也唐陸氏曰士賁人名長樂陳氏曰君子之於言必則古昔稱先王則古昔所以本其時稱先王所以本其人如此則有所受無所專也司士賁問襲牀之禮而子游諾之以其不知有所受無所專也馬氏曰魂氣歸于天體魄降于地人之所以死也故始死廢牀欲其近於地不復然後襲於牀宋襄公𦵏其夫人醯醢百甕曾子曰既曰明器矣而又實之鄭氏曰言名之為明器而與祭器皆實之是亂鬼器與人器孔氏曰此一節論宋襄公失禮之事案春秋宋襄公卒在僖公二十三年至文公十六年猶有襄夫人在今得云宋襄公𦵏其夫人者蓋襄公初取夫人死在襄公前而其後取夫人死在襄公後爾既曰神明之器則當虚也案既夕禮陳明器後云無祭器鄭云士禮畧大夫以上兼用鬼器與人器人鬼兼用則空鬼而實人士既無人器則亦實明器故既夕禮云罋三醯醢屑又云甒二醴酒也若夏后氏專用明器則分半以實之殷人全用祭器則亦分半以虚之周人兼用則亦實人而空鬼也馬氏曰既夕禮言陳明器亦有黍稷醯醢酒醴以實之宋襄公之𦵏夫人醯醢百甕蓋譏其多於禮可也以為明器而不當實之則非矣由是觀之豈曾子言殷人之禮有祭器而不必實明器歟若曾子見學於聖人者也而猶失其傳如此是故襲裘而弔則不知在小斂之後䘮欲速貧死欲速朽則不知為聖人有為之言弔於負夏主人為之反柩乃以為可小斂之奠在東方反以為西則曾子亦可謂魯矣不然則記者之謬歟孟獻子之䘮司徒旅歸四布夫子曰可也鄭氏曰獻子魯大夫仲孫蔑旅下士也司徒使下士歸四方之賻布時人皆貪夫子善其能亷孔氏曰此一節論因䘮不貪利之事四方賻泉布本助䘮用今既有餘故歸還之司徒家臣司徒也左傳云叔孫氏之司馬鬷戾是家臣亦有司徒司馬也長樂陳氏曰知死者贈知生者賻贈賻之餘君子不可利於己亦不可歸於人利於己則啟天下家䘮之心歸於人則絶天下恤䘮之禮與其利於己寜歸於人與其歸於人寜班諸兄弟之貧者孟獻子之䘮司徒旅歸四布孔子可之以其賢乎利於己者而已不若班諸貧者為盡善也馬氏曰司徒歸四布蓋以為愈夫家於䘮者可也以為善於禮則末矣山隂陸氏曰言可而已則非夫子所善讀賵曾子曰非古也是再告也鄭氏曰袒而讀賵賔致命將行主人史乂讀賵所以存録之曾子言非禮嚴陵方氏曰古者奠之而不讀周則既奠而又讀焉故曾子以為再告也成子髙寝疾慶遺入請曰子之病革矣如至乎大病則如之何子髙曰吾聞之也生有益於人死不害於人吾縱生無益於人吾可以死害於人乎哉我死則擇不食之地而𦵏我焉鄭氏曰成子髙齊大夫國成伯髙父也慶遺入請觀其意也革急也遺慶封之族不食謂不墾耕孔氏曰此一節論臨死不忘儉之事國氏也齊有國子髙嚴陵方氏曰子髙之愛人可知矣觀公叔文子樂瑕丘而欲𦵏則子髙之所得不亦多乎子夏問諸夫子曰居君之母與妻之䘮居䖏言語飲食衎爾鄭氏曰衎爾自得貌為小君惻隠不能至孔氏曰此一節論臣服小君儀容之事居䖏以下是夫子答辭不云子曰者記人畧也嚴陵方氏曰夫䘮之所哀固有或發於居䖏或發於言語或發於飲食者然臣居君之母與妻之䘮居䖏言語飲食衎爾則以君尊之所嚴有所不敢盡其哀故也山隂陸氏曰䘮雖䡖惻隠不至則有之未有居之而樂者也子夏失問夫子是以不答賔客至無所館夫子曰生於我乎館死於我乎殯鄭氏曰仁者不厄人横渠張氏曰於我乎館恨無他舍以館客則於我之館不可謂以無客館而不館舍賔客也於吾家館可也嚴陵方氏曰此言賔客論語言朋友互相備也國子髙曰𦵏也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉鄭氏曰言皆所以為深邃難人發見之也國子髙成子髙也成諡也反壤樹之反覆也怪不如大古也而反封樹之意在於儉非周禮也孔氏曰此一節論重古非今之事子髙之意人死可惡故備以衣衾棺椁欲其深邃不使人知今乃反更封壤為墳而種樹以標之哉言不可也嚴陵方氏曰壤言封土以為墳樹言種木以為表馬氏曰古之人尤畧於死者衣之以薪𦵏諸中野而後世聖人特嚴慎終之禮故瓦棺堲周為不足易之以棺椁棺椁為不足被之以栁翣易之以棺椁者言無使土侵膚被之以栁翣者言無使人惡於死凢此皆藏之弗得見者也周官冢人以爵等為之丘封之度與其樹數故觀其封則知位秩之髙下觀其樹則知命數之多寡所以遺後世子孫之識非以為觀美者也封之崇四尺孔子之所不廢而國子髙非之亦異於禮矣孔子之䘮有自燕來觀者舍於子夏氏子夏曰聖人之𦵏人與人之𦵏聖人也子何觀焉鄭氏曰與及也孔氏曰自此至志乎哉一節論𦵏夫子封墳之法舍住也燕國人來住子夏家也子夏謂燕人云若聖人𦵏人及人𦵏聖人皆用一禮而子逺來何所觀乎王氏肅曰聖人𦵏人與屬上句以言若聖人𦵏人與則人庶有異聞得來觀者若人之𦵏聖人與凢人何異而子何觀之有故下備述夫子所言四封之異以慰燕人逺觀之心使以為法也長樂陳氏曰君子之於䘮禮尤衆人之所欲觀者也故子思之䘮母滕世子之𦵏定公四方猶且觀之況聖人之門人𦵏聖人乎此燕人所以來觀之昔者夫子言之曰吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣從若斧者焉馬鬣封之謂也今一日而三斬板而已封尚行夫子之志乎哉鄭氏曰若堂謂封土為壟也堂形四方而髙坊形旁殺平上而長也覆謂茨瓦也夏屋今之門廡也其形旁廣而卑斧形旁殺刄上而長孔子以為刄上難登狹又易為功故從若斧者焉馬鬣俗間名板蓋廣二尺長六尺斬板謂斷其縮也三㫁上之旁殺蓋髙四尺其廣袤未聞也詩云縮板以載尚庶㡬也孔氏曰此子夏歴述孔子之言封謂墳之也若如也坊堤也堤以坊水上平而兩旁殺其南北長也殷人以來始屋四阿夏家之屋兩下而已故夏屋如漢之門廡斧者子夏恐燕人不識故舉俗稱以語之馬騣鬣之上其肉薄封形似之也子夏既述夫子之語又引今㑹古言今孔子墳正用一日之功儉約如此者是庻㡬慕行於孔子平生所志也三斬板作墳法也築墳之法所安板側於兩邉而用繩約板令直立而後納土於板之中築之令土與板平則斬所約板繩㫁而更置於見築土上又載土其中三遍如此其墳乃成已止也馬氏曰馬鬣封則從於儉而後世可傳矣蓋古之人封之若堂者四方而髙難為功而易為虧故變之為若坊若坊則平上而長比之若堂者則易為功然以其上平猶不免於虧故變之為若覆夏屋若覆夏屋者旁廣而卑則難虧矣然必從若斧者刄向上則功愈易而虧愈難此所貴於儉者也且丘封雖以爵等為度而形稍廣狹平殺如此異者不失髙下之制而已矣長樂陳氏曰孔子以時人之封過泰也故欲從其殺者而已門人以夫子之志於儉也故一日三斬板以行夫子之志而已門人於封則儉於披崇練旐則不儉者儉則行夫子之志不儉則行門人之志行夫子之志所以救時行門人之志所以尊師也婦人不葛帶鄭氏曰婦人質不變重者至期除之卒哭變絰而已孔氏曰此論齊斬婦人帶要絰也𦵏後卒哭變麻易葛婦人重要而質不變所重故不葛帶至期除之卒哭直變絰而已大功以下輕至卒哭並變為葛與男子同絰首絰也婦人輕首重要故也有薦新如朔奠鄭氏曰重新物為之殷奠孔氏曰薦新謂未𦵏中間得新味而薦亡者如朔奠者謂未𦵏前月朔大奠於殯宫大奠則牲饌豐也朔禮視大斂士則特豚三鼎今若有新物及五糓始熟薦於亡者則其禮牲物如朔之奠也大夫以上則朔望大奠士但朔而不望金華應氏曰薦新重時物也薦新於廟死者已逺則感傷或淺薦新於殯其痛尚新則感傷必重朔祭謂之大奠其禮視大斂故薦新亦如之謂男女各即位内外各從事而奠哭之儀如一也是禮之同非其物之同注謂殷奠恐未然蓋經曰如朔奠非為之也既𦵏各以其服除鄭氏曰卒哭當變衰麻者變之或有除者不視主人孔氏曰既𦵏謂三月𦵏竟後至卒哭重親各隨所受而變服若三月之親至三月數滿應除者𦵏竟各自除不待主人卒哭之變也横渠張氏曰今人多歴年所而𦵏者亦當以改𦵏之服除蓋古者未𦵏則主人不除今既除之矣則猶當從改𦵏服禮改𦵏服緦久不𦵏者似難為虞祭以其無几筵也三日而省墓可也池視重霤鄭氏曰栁宫象也以竹為池衣以青布縣銅魚焉今宫中有承霤云以銅為之孔氏曰池者栁車之池也重霤者屋承霤也以木為之承於屋霤入此木中又從木中而霤於地故謂此木為重霤也天子則四注四面皆有重霤諸侯四注而重霤則差降去後餘三大夫唯餘前後二士則唯一在前生時既屋有重霤以行水死時桞車亦象宫室而於車覆鱉甲之下牆帷之上織竹為之形如籠衣以青布以承鱉甲名之為池以象重霤方面之數各視生時重霤君即位而為椑歳壹漆之藏焉鄭氏曰椑謂杝棺親尸者椑堅著之言也天子椑内又有水兕革棺歲一漆之若未成然藏焉者虛之不令也孔氏曰此一節論人君尊即位得為棺之事君諸侯也言諸侯則王可知也椑者漆之堅強甓甓然也人君無論少長體尊備物故即位而造棺但每年一漆示如未成也藏焉者棺中不欲空虚鄭註不令令善也言虚之則不善故藏物於其中一本云虚之不合謂不以蓋合覆其上唐陸氏曰椑櫬尸棺嚴陵方氏曰椑即所謂櫬也君尊雖㐫禮之具亦豫備藏焉則惡人之見也山隂陸氏曰言歳一出而漆之於是又藏焉歳一出而漆之若將有用也示使其君不敢有恃以惰復楔齒綴足飯設飾帷堂並作父兄命赴者鄭氏曰父兄命赴謂大夫以上也士主人親命之孔氏曰此一節論始死之事復招魂也楔柱也招魂後用角柶柱亡人之齒令開使含時不閉也綴足者用燕几綴亡人之足令直使著屨時不辟戾也飯含也設飾謂襲斂遷尸之時又加著新衣也帷堂謂小斂時也作起也自復以下諸事並起也赴亦復後之事死者生時有恩識之人今死則其家宜使人往相赴告也士䘮禮孝子自命赴者山隂陸氏曰復楔齒綴足飯設飾此五事並作於帷堂之時君復於小寝大寝小祖大祖庫門四郊鄭氏曰尊者求之備也亦他日所嘗有事孔氏曰此一節明人君禮備復䖏多也君王侯也前曰廟後曰寝爾雅云室有東西廂曰廟無東西廂而有室曰寝小寝謂髙祖以下寝也王侯同大寝謂天子始祖諸侯大祖之寝也小祖髙祖以下廟也王侯同大祖天子始祖諸侯大祖廟也兩言於廟求神備也周禮夏采以冕服復于大祖廟是也其小廟則祭僕復之其小寝大寝則𨽻僕復之註云小寝髙祖以下廟之寝也始祖曰大寝四郊則夏采復之故云乗車建綏復于四郊此天子之事也諸侯復則小臣嚴陵方氏曰復必於寝廟者以人死必反本故也庫門生時所由出入也四郊以魂氣無不之也門不一止以庫門為言者近廟門故也䘮不剥奠也與祭肉也與鄭氏曰剥猶倮也有牲肉則巾之為其乆設塵埃加也脯醢之奠不巾孔氏曰此一節論祭肉不可露見之事與是語辭謂䘮不倮露奠者為有祭肉也案士䘮禮小斂陳一鼎既斂奠于尸東祝受巾巾之是牲肉則巾之也又云始死脯醢醴酒奠于尸東無巾又殯後朝夕乃奠醴酒脯醢如初設不巾是脯醢醴酒不巾也嚴陵方氏曰剥猶剥廬之剥覆之則隠剥之則露故先儒以為猶倮也䘮不剥奠者為其有祭肉之濡易受塵垢故巾之也廬陵胡氏曰牲肉不巾則塵蠅汙之既殯旬而布材與明器鄭氏曰材椁材也木工冝乾腊且豫成孔氏曰此一節論𦵏禮湏豫備之事既殯旬謂殯後十日也布班也班布告下覓椁材及送𦵏明器之材士䘮禮筮宅吉左還椁獻明器之材于殯門外是也臨川王氏曰布陳也朝奠日出夕奠逮日鄭氏曰隂陽交接庶㡬遇之嚴陵方氏曰逮日者及日也於日未沒之時為及日矣父母之䘮哭無時使必知其反也鄭氏曰謂既練或時為君服金革之事反必有祭孔氏曰禮哭無時有三種一是初䘮未殯之前哭不絶聲二是殯後除朝夕之外廬中思憶則哭三是小祥之後哀至而哭或一日二日而無復朝夕之時也此云哭無時謂小祥之後也何以知然下云使必知其反是其可使之時也使謂君使之也反還也若為使還家當必設祭告親之神令知其反亦出必告反必面之義也禮運云三年之䘮期不使則期外可使也而曾子問云卒哭服金革之事無辟此魯侯有為為之也卒哭而使非正禮也嚴陵方氏曰哭者所以求其反也哭之無時欲使死者心知其反而已練練衣黄裏縓縁葛要絰繩屨無絇角瑱鹿裘衡長袪袪裼之可也鄭氏曰黄之色卑於纁縓纁之類明外除也瑱充耳也吉時以玉人君有瑱衡當為横字之誤也袪謂褎縁袂口也練而為裘又為袪則先時狭短無袪可知裼表裘也有袪而裼之備飾也玉藻曰麛裘青豻褎絞衣以裼之鹿裘亦用絞乎孔氏曰練小祥也小祥而著練冠練中衣故曰練也練衣者練為中衣黄裏者黄為中衣裏也正服不可變中衣非正服但承衰而已故小祥而為之黄袷裏也縓縁者縓為淺絳色也纁是赤色其色華美黄雖是正色質卑於纁爾雅云二染謂之縓三染謂之纁故鄭言纁類也縁謂中衣領及褎縁也裏用黄而領縁用縓者領縁外也明其外除故飾見外也葛要絰者小祥男子去首絰唯餘要葛也繩屨者父母䘮菅屨卒哭受齊衰蒯藨屨至小祥受大功繩麻屨也絇屨頭飾也吉有䘮無角瑱者小祥㣲飾以角為之初䘮無充耳也鹿裘者冬時吉㐫衣裏皆有裘吉時則貴賤有異䘮時則同用大鹿皮為之衡長袪者小祥之前裘狭而短袂又無袪小祥稍飾故更作裘横廣大者也又長之且為袪加此三法也裼謂裘上又加衣也為吉轉文故加裼之可也案如此文明小祥時外有衰衰内有練中衣中衣内有裼衣裼衣内有鹿裘鹿裘内有常著襦衣也藍田吕氏曰斬疏繐大功小功緦錫皆曰衰䘮正服也練麻皆曰衣䘮變服也至親以期㫁加隆而三年故加隆之服者正服當除有所不忍故為之變服以至於再期也首絰除矣七升之冠六升之衰皆易而練矣屨易而繩矣所不變者要絰與杖而已蓋天地已易四時已變衰亦不可無節故從而多變也如宰予齊宣王皆欲短䘮蓋疑於此斬衰之冠鍜而勿灰錫則緦而加灰錫則事布而不事縷服雖䡖而衰在内竊意練衣之升當如功衰加灰事布當如錫有縁與裏當如衣衰則無縁與裏故比功衰則輕功衰卒哭所受比麻衣則重大祥麻衣麻衣吉服也情文之殺義當然也諸侯之䘮慈母公子為其母皆無服使不可純㐫而占筮除䘮不當受弔昔之人皆變用練冠以從事則練冠者非正服明矣唯鄭氏功衰為既練之服功衰自是卒哭所受六升之服正服大功七升則六升成布所可為功不可皆為練服長樂陳氏曰袪裼之可也其裼之也亦裼受服以見鹿裘之美而已鄭氏曰鹿裘之裼亦用絞乎是鄭氏亦自疑而不必其説也練用鹿裘何也禮始䘮則居廬自屏既練則可以接物鹿善接其類者也故裘用焉周禮既練乗藻車鹿淺䄙與此同義鹿裘袪裼之則裼其袪而已非若餘衣之袒也鄭氏曰有袪而裼之備飾也鹿裘亦用絞乎理不然也禮書嚴陵方氏曰鹿裘以白鹿之皮為裘也凢此所以為易除之漸而已馬氏曰哀痛至甚則耳無聞目無見也而哀殺則能有聞矣故又為角瑱以充之廬陵胡氏曰如青豻褎則以蒼黄色為衣以復之使可裼也袒而有衣曰裼裼所以表裘也表而出之詳見玉藻有殯聞逺兄弟之䘮雖緦必往非兄弟雖鄰不往所識其兄弟不同居者皆弔鄭氏曰雖緦必往親骨肉也雖鄰不往疏無親也所識就其家弔之成恩舊也孔氏曰此一節論哭弔之事所識謂非兄弟又非疏外平生知識往來今若身死者兄弟雖不同居亦就往弔之成其死者之恩舊也其死者兄弟不同居尚往弔之則死者子孫就弔可知舉疏以見親也皇氏曰所識其兄弟不同居者皆弔此别更起文不連有殯之事所識者謂識其死者之兄弟皆小功以下之親既識兄弟雖不同居者皆一一就弔之未知然否嚴陵方氏曰緦冣服之輕者服之輕猶必往況其重者乎蓋同姓之恩不得不為之隆故也隣冣居之近者居之近猶不往況其逺者乎蓋異姓之恩不得不為之殺故也然而三年之䘮不弔則雖緦必往者非謂三年之殯者矣大功未𦵏不弔則雖隣不往者止謂大功以上之殯而已天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周鄭氏曰尚深邃也諸公三重諸侯再重大夫一重士不重水兕革棺謂以水牛兕牛之革以為棺被革各厚三寸合六寸也此為一重杝棺所謂椑棺也爾雅曰椵杝也梓棺二謂屬與大棺也周币也凢棺用能溼之物孔氏曰自此至六尺一節論天子以下棺椁厚薄長短之事四重者水牛兕牛皮為一重杝為第二重屬為三重大棺為四重凢五物也上公三重則去水牛餘兕杝屬大棺也侯伯子男再重又去兕餘杝屬大棺大夫一重又去杝餘屬大棺也士不重又去屬唯單用大棺也天子大棺厚八寸屬六寸椑四寸又二皮六寸合二尺四寸也上公去水牛之三寸合二尺一寸諸侯又去兕牛之三寸合一尺八寸列國上卿又除椑之四寸合一尺四寸大夫大棺六寸屬四寸合一尺士則不重但大棺六寸故庻人四寸矣水兕二皮並不能厚三寸故合被之令各厚三寸二皮能溼故冣在裏近尸杝亦能溼故次皮也諸侯無革則杝親尸杝棺之外又有屬棺屬棺之外又有大棺大棺與屬棺並用梓故云梓棺二也四者皆周者謂四重之棺上下四方悉周币也唯椁不周下有茵上有抗席故也山隂陸氏曰此不數椁故曰四重據䘮大記天子柏椁而禮器天子五重八翣水兕革棺蓋曰被之則棺之非在外者也棺束縮二衡三衽每束一柏椁以端長六尺鄭氏曰衡亦當為横衽今小要衽或作漆或作髹以端題湊也其方蓋一尺孔氏曰古棺木無釘故用皮束合之縮二者縮縱也縱束者用二行也衡三者横束者三行也衽每束一者衽小要也其形兩頭廣中央小也既棺不用釘但先鑿棺邉及兩頭合際䖏作坎形則以小要連之令固棺束並相對每束之䖏以一行之衽連之若豎束之䖏則豎著其衽以連棺蓋及底木使與棺頭尾之材相固也柏椁謂椁用柏也天子柏諸侯松大夫柏士雜木也鄭註方相職云天子椁柏黄腸為裏而表以石焉端猶頭也積柏材作椁並葺材頭故云以端天子椁材每叚長六尺而方一尺天子以下庶人以上鄭註䘮大記具之知其方一尺者以庻人四寸之棺五寸之椁椁厚於棺一寸君大棺八寸君謂諸侯則天子之大棺或當九寸其椁厚一尺也如鄭此言椁材並皆從下壘至上始為題湊湊嚮也言木之頭相嚮而作四阿也廬陵胡氏曰以柏木黄心致累於棺外謂之黄腸木頭皆内向故云題湊其方一尺詳見漢書霍光傳及漢儀注天子之哭諸侯也爵弁絰䊷衣或曰使有司哭之為之不以樂食鄭氏曰天子服士之祭服以哭之明為變也天子至尊不見尸柩不弔服麻不加於采此言絰衍字也時人間有弁絰因云之爾周禮王弔諸侯弁絰緦衰使有司哭之非也哀戚之事不可虚不以樂食者蓋謂殯斂之間也孔氏曰此一節論天子哭諸侯之事為之不以樂食此是記者之言非復或人之説也天子食有樂今哭諸侯故食不復奏樂鄭註云殯斂之間以意㫁不用樂之期也嚴陵方氏曰爵弁則其色如爵䊷衣音緇則以其色如之山隂陸氏曰據此爵弁有不䊷衣者玉藻曰君子狐青裘𤣥綃衣以裼之禮記無韋弁周官無爵弁韋弁即爵弁也周官無綦弁尚書無皮弁綦弁即皮弁也綦弁爵弁言色韋弁皮弁言物廬陵胡氏曰諸侯薨在國天子遥哭之不親見尸柩故不服緦衰弔而服士之祭服有司哭之非也惡夫涕之無從況使人乎天子之殯也菆塗龍輴以椁加斧于椁上畢塗屋天子之禮也鄭氏曰菆木以周龍輴加椁而塗之天子殯以輴車畫轅為龍斧謂之黼白黒文也以刺繡於縿幕加椁以覆棺已乃屋其上盡塗之孔氏曰此一節論菆塗為古天子殯法也菆叢也謂用木菆棺而四面塗之故云菆塗龍輴殯時用輴車載柩而畫轅為龍也以椁者題湊菆木象椁之形也斧謂繡覆棺之衣為斧文也先菆四面為椁使上與棺齊而上猶開也以棺衣從椁上入覆於棺故云加斧于椁上也畢盡也斧覆既竟又四注為屋以覆於上而下四面盡塗之廬陵胡氏曰菆塗龍輴以椁畫龍於輴車之轅以殯之又菆聚椁材以周龍輴而塗之先儒云以椁加椁也恐非唯天子之䘮有别姓而哭鄭氏曰使諸侯同姓異姓庻姓相從而為位别於朝覲來時朝覲爵同同位孔氏曰此一節論哭天子之事鄭註周禮云異姓謂王昏姻甥舅庻姓謂與王無親者朝覲爵同同位則不分别同姓異姓然覲禮諸侯受舍於廟同姓西面異姓東面者覲禮先公而後侯先侯而後伯是亦爵同同位但就同姓之中先爵尊爾魯哀公誄孔丘曰天不遺耆老莫相予位焉嗚呼哀㦲尼父鄭氏曰誄其行以為諡也莫無也相佐也言孔子死無佐助我䖏位者尼父因其字以為之諡孔氏曰此一節論哀公誄孔子之事孔子以哀公十六年夏四月己丑卒哀公欲為作諡故先列其生時行狀謂之為誄天不遺耆老以下誄辭也遺置也耆老謂孔子也嗚呼哀㦲傷痛之辭也尼諡也父字也丈夫之美稱也山隂陸氏曰據此左傳所録公誄之曰旻天不弔不憗遺一老俾屏余一人以在位不脩春秋之辭也今記脩之如此國亡大縣邑公卿大夫士皆厭冠哭於太廟三日君不舉或曰君舉而哭於后土鄭氏曰軍敗失地以䘮歸也厭冠今䘮冠其服未聞后土社也孔氏曰此一節論人君為國致憂之事國既失地諸臣皆著䘮冠而哭於君之太廟三日也失地為先祖所哀故在廟臣既於廟三日哭故君亦三日不舉樂也又有或者言亦舉樂而自于社中哭之社主土故也庾氏曰舉者謂舉饌引周禮膳夫王日一舉又王齊日三舉註云殺牲盛饌曰舉金華應氏曰哭於太廟者傷祖宗基業之虧損哭於后土者傷土地封疆之朘削也不舉自貶損也曰君舉者非也廬陵胡氏曰失敗䘮地此末世之事知記禮者乃後代人也孔子惡野哭者鄭氏曰為其變衆周禮銜枚氏掌禁嘂呼歎鳴於國中者行歌哭於國中之道者孔氏曰哭非其地謂之野横渠張氏曰孔子惡野哭者為有服者之䘮不哭諸家而哭於野是惡㓙事也所知自當哭於野又若奔䘮者安得不哭於道嚴陵方氏曰子蒲卒哭者呼滅子髙曰若是野哉孔子之所惡者以其如此故家語之文則連言之孔子嘗言所知吾哭諸野若此所謂野豈其惡之哉廬陵胡氏曰謂哭不以禮為野未仕者不敢稅人如税人則以父兄之命鄭氏曰此不專家財也税謂遺予人孔氏曰此論人子之法如税人謂己仕者也嚴陵方氏曰未仕則無禄故不敢税人其或禮有所不可廢義有所不可免則以父兄之命而已士備入而后朝夕踊鄭氏曰備猶盡也國君之䘮嫌主人哭入則踊孔氏曰此一節論君䘮羣臣朝夕哭踊之事嗣君雖先入即位哭必待諸臣皆入列位畢後乃俱踊也士卑冣後故舉士入為畢也孝子哀深故前入踊必相視以為節故俟齊也祥而縞是月禫徙月樂鄭氏曰徙月樂言禫明月可以用樂孔氏曰祥大祥也縞謂縞冠素紕大祥日著之故小記云除成䘮者其祭也朝服縞冠既禫徙月而樂作禮之正也嚴陵方氏曰祥而縞即玉藻所謂縞冠素紕既祥之冠是也是月禫徙月樂者魯人朝祥而莫歌孔子以為踰月則其善者以此馬氏曰三年之䘮人子之所自盡而猶不可以死傷生故死與其往則設祭以致存親之禮生與其來則除䘮以明順變之道祭禮曰䘮道日損是以既奠則虞成事則袝期而小祥再期而大祥祥則禫言祭有即吉之漸也䘮則䘮冠繩纓練則以葛易麻大祥則素縞以除言䘮有即逺之漸也祭不為除䘮而除䘮者必有祭故凢變除者皆以祭為節大祥之祭可以從吉之時而為人子者不忍一朝之間釋衰絰而被元黄故又有禫以延之雖然祥禫之祭皆重䘮之禮也而先論其月則異焉以情攷之蓋祥禫之制施於三年之䘮則其月同施於期之䘮則其月異於虞禮亦曰二十五月大祥中月而禫言中月者以其在祥月之中此三年之䘮者也雜記曰十一月而練十三月而祥十五月而禫此期之䘮者也康成之説則欲以三年祥禫而視於期為二十七月豈知父在為母亦固有所屈乎為父三年而得致哀戚之情故祥禫同月所以彌其日為母而期則哀戚不得致於三年之中故祥禫異月所以彌其月蓋三年所以為極而致於二十五月者其禮不可過以三年之愛而㫁於期者其情猶可伸夫三年之䘮既以禫在祥月之中而徙月可以作樂故魯人朝祥莫歌而孔子曰踰月則其善也至於孟獻子既禫而不樂則孔子以為加於人一等矣在禫月而樂者聼於人者也在徙月而樂者作於己者也雜記曰親䘮外除故笙歌之樂不作於未禫之前然則孔子既祥五日彈琴而不成聲十日而成笙歌言十日者蓋亦徙月之間也三年之䘮至於徙禫之月而得作樂則䘮道終矣此謂二十五月而禫者也君於士有賜帟鄭氏曰帟幕之小者所以承塵賜之則張於殯上大夫以上幕人職供焉孔氏曰賜恩賜也士唯有君恩賜之乃得有帟也禮記集説卷十九
