body:
  text: 禮記集說卷二十二宋衛湜撰衛獻公出奔反於衛及郊將班邑於從者而后入栁莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也毋乃不可乎弗果班鄭氏曰獻公以魯襄公十四年出奔齊二十六年復歸于衛欲賞從者以懼居者栁莊言從守若一言有私則生怨靮紖也孔氏曰此一節論衛君歸國不合私賞從者之事左傳云獻公反國使人責大叔儀故鄭言懼居者獻公出奔復歸並見左傳長樂陳氏曰椘昭王之賞從亡而及于屠羊說晉文公之賞從亡而辭見守藏者衛獻公之厚從亡而及郊將班邑是皆徇于私而不知公蔽於邇而不知逺也蓋居者守君之社稷行者執君之羈靮其勞逸雖殊而功之所施則一其可厚此而薄彼哉此栁莊所以諫獻公也臧武仲曰衛君之奔有大叔儀以守有母弟鱄以出或撫其內或營其外能無歸乎是內外之功一也嚴陵方氏曰獻公之反國將班邑於從者而後入則是私于從己之昵而忘保國之大矣豈所以合天下之公義哉羈以絡馬靮以控馬以其從君而奔故以執羈靮言之衛有大史曰栁莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫母變也鄭氏曰革急也請於尸急弔賢者也脫祭服以襚臣親賢也所以以此襚之者以其不用襲也凡襚以斂裘縣潘邑名所以厚賢也孔氏曰此一節論君急弔臣之事栁莊寢疾其家以告公報之曰若疾急雖當我祭必須告也其後栁莊果當公祭之時卒而來告公祭事雖了與尸為禮未畢故再拜稽首請于尸也案禮君入廟門全為臣請尸得言寡人者是作記者之言也案士喪禮君使人襚不云祭服襚臣今以祭服襚故鄭云親賢也得以祭服襚者諸侯𤣥冕祭廟大夫自𤣥冕以下以其俱是𤣥冕故得襚也又士喪禮君襚衣不用襲為近尸事䙝大斂得用君襚鄭云凡襚以斂者謂庶襚以小斂君襚以大斂也廬陵胡氏曰春秋書衛遣弒而後入罪其黨寧喜與弒也豈弒逆之人能親賢如此乎必不能也陳乾昔寢疾屬其兄弟而命其子尊己曰如我死則必大為我棺使吾二婢子夾我陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺鄭氏曰婢子妾也尊已不陷父于不義記者善之也孔氏曰此一節論人病時失禮也尊已乾昔子名也兄弟言屬子云命輕重之義也長樂陳氏曰君子將死不忘乎利人小人將死不忘乎利己故成子髙之寢疾則擇不食之地以自葬孟僖子之將死則明仲尼之道以教子曽子之將死則稱君子之道以教人此不忘乎利人者也魏顆之病欲以妾為殉陳乾昔之病欲以婢夾已此不忘乎利己者也乾昔之子終不從其亂命其過秦康公逺矣仲遂卒于垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹鄭氏曰春秋經在宣八年仲遂魯莊公之子東門襄仲先日辛巳有事于大廟而仲遂卒明日而繹非也萬千舞也籥籥舞也傳曰去其有聲者廢其無聲者孔氏曰此一節論卿卒重于繹祭之事去其籥舞以吹籥有聲也廢留萬舞而不去以萬舞無聲也廢置也鄭引宣八年公羊傳文長樂陳氏曰春秋之法當祭而卿卒則祭之日不可以用樂祭之明日不可以繹故叔弓之卒昭公去樂卒事君子以為禮仲遂之卒宣公猶繹而萬入去籥君子以為非禮嚴陵方氏曰正祭之明日又祭謂之繹繹者如繹絲然以其續之而不絶故也祭禮為吉卿卒為凶然正祭不可廢也故卿卒不繹而已猶者可以己之詞廬陵胡氏曰此一節全録春秋知記禮者駁雜季康子之母死公輸若方小斂般請以機封將從之公肩假曰不可夫魯有初公室視豐碑三家視桓楹般爾以人之母嘗巧則豈不得以其母以嘗巧者乎則病者乎噫弗果從鄭氏曰公輸若匠師方小言年尚幼未知禮也斂謂下棺于椁般若之族多技巧者見若掌斂事而年尚幼請代之而欲嘗其技巧也時人服般之巧魯有初初謂故事也豐碑斫大木為之形如石碑于椁前後四角樹之穿中間為鹿廬下棺以繂繞天子六繂四碑前後各重鹿盧也言視豐碑者時公室僭天子也三家時僭諸侯諸侯下天子斫之形如大楹耳四植謂之桓諸侯四繂二碑碑如桓矣大夫二繂二碑士二繂無碑以與已字本同毋無也噫不寤之聲孔氏曰此一節論非禮嘗巧不從之事公輸若之族人公輸般請為轉動機關窆而下棺將從之時有公肩假止而不許曰魯有初始舊禮凡言視者不正相當比擬之辭王制視公侯視伯視子男是也豐大也案禮廟庭有碑故祭義云牲入麗于碑儀禮每云當碑揖今謂用大木為碑穿鑿去碑中之木令使空于此空閒著鹿盧鹿盧兩頭各入碑木繂即紼也以紼之一頭繫棺緘以一頭繞鹿盧既訖而人各背碑負紼末頭聼鼓聲以漸郤行而下之也周禮大喪屬其六引故鄭知天子六繂又喪大記云君四繂二碑故知天子四碑也既云六繂四碑明有一碑兩紼者故知上下重著鹿盧止言前後重鹿盧者以棺之入槨前後用力深也案春秋天子有隧以羡道下棺所以用碑者凡天子之葬掘地以為方壙漢書謂之方中又方中之內先纍槨于其方中南畔為羡道以蜃車載柩至壙說而載以龍輴從羡道而入至方中乃屬紼于棺之緘從上而下棺入于槨之中於此之時用碑繂也三家言視桓楹不云碑知不似碑形故云如大楹耳通而言之亦謂之碑故喪大記云諸侯大夫二碑也案說文桓亭郵表也謂亭郵所立表木即今之橋旁表柱也諸侯二碑兩柱為一碑而施鹿盧故鄭云四植謂之桓古者以已二字本同故得假借而用後世二字之義始異嘗試也言般欲以人母嘗試已巧事誰有強逼于汝而為此乎豈不得休已者哉又語之曰其母以人母嘗試已巧則于汝病者乎言不得嘗巧豈於汝有病公肩假乃更噫而傷嘆於是衆人遂止嚴陵方氏曰斂其尸謂之斂斂其壙亦謂之斂此所言斂即斂其壙而已封其墳謂之封封其坎亦謂之封此所言封即封其坎而已臨川王氏曰言公室視豐碑見下陵上僭成俗人不復以僭為非矣戰于郎公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能為謀也士弗能死也不可我則既言矣與其鄰重汪踦往皆死焉魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎鄭氏曰郎魯近邑哀十一年齊國書帥師伐我是也禺人昭公之子春秋傳曰公叔務人遇見也君子謂卿大夫鄰重汪踦鄰鄰里也重皆當為童童未冠者之稱姓汪名踦鄰或為談春秋傳曰童汪踦魯人見其死君事有士行欲以成人之喪治之言魯人者死君事國為斂葬孔氏曰此一節論童子死難之事魯人公叔禺人逢國人走辟齊師以奔走之罷兩手負杖于頸走入城保以辟齊師困而止息禺人言以徭役使人病困以賦稅責民煩重卿大夫不能為謀士又不能致死是自全其身於理不可既言之矣乃踐其言與鄰之童子汪踦往赴齊師而死依禮童子為殤魯人見其死寇欲勿殤以成人之喪治之意以為疑問於仲尼仲尼言其可也臨川王氏曰以此知先王制禮大為之防而事有常變不可以常禮制之者可變而從冝也小德出入可也長樂陳氏曰遇入保者息則左傳見保者泣是也使之雖病則事充是也任之雖重則政重是也使之病任之重則無以安民君子不能為謀士不能死則無以禦敵無以安民其害小無以禦敵其害大此公叔禺人所以息而言之也君子之於人視其行不視其年年雖壯而無成處之以童可也鄭忽之狡童昭公之童心是也年雖稚而有成處之以成人可也汪踦之勿殤是也子路去魯謂顔淵曰何以贈我曰吾聞之也去國則哭于墓而后行反其國不哭展墓而入謂子路曰何以處我子路曰吾聞之也過墓則式過祀則下鄭氏曰贈送也無君事主于孝哭哀去也展省視之處猶安也居者主於敬孔氏曰此一節論禮敬祀墓之事若有君事去國不得哭墓故上曲禮云君言不宿于家過墓謂他家墳壟祀謂神位有屋樹者居無事主于恭敬故或式或下也嚴陵方氏曰去則哭墓反則展墓所以存乎愛蓋行者之禮也過墓則式過祀則下所以存乎敬蓋居者之禮也行者所適必逺而易有所忘故在存乎愛居者于時為久而易有所怠故在存乎敬此二子之言所以異乎行故曰贈居故曰處凡物展之則可省而視故省謂之展與充人所謂展牲之展同工尹商陽與陳弃疾追吳師及之陳弃疾謂工尹商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉鄭氏曰工尹椘官名弃疾楚公子弃疾也魯昭八年帥師滅陳縣之楚人善之因號焉至十二年楚子狩于州來使蕩侯潘子司馬督囂尹午陵尹喜圍徐以懼吳于時有吳師陳或作陵楚人聲也商陽仁不忍傷人弃疾以王事勸之斃仆也韔韜也掩其目不忍視之也朝燕于寢大夫坐于上士立于下然則商陽與御者皆士也兵車參乘射者在左戈盾在右御在中央孔子曰有禮焉善之也孔氏曰此一節論殺人有禮之事案春秋傳楚皆以尹為官名弃疾椘共王之子後立為平王案昭十三年左傳叔向云弃疾君陳蔡苛慝不作楚人善之因號陳弃疾也家語子手弓而可商陽手弓弃疾曰子射諸是可為句也朝之與燕皆在乎寢若路門外正朝則大夫以下皆立若其燕朝在于路寢則大夫坐于上如孔子攝齊升堂是也升堂則坐矣燕亦在寢故燕禮云燕朝服于寢又燕禮獻卿大夫之後西階上獻士無升堂之文是士立于下也鄭注射者在左戈盾在右御在中央謂兵車參乘之法案宣公十二年左傳楚許伯御樂伯攝叔為右樂伯云左射以菆是射在左攝叔云右入壘折馘是戈盾勇力在右自然御者在中此謂凡戰士也若是元帥則在中央鼓下御者在左戈盾亦在右故成二年鞍之戰卻克為中軍將流血及屨未絶鼓音是將居鼓下也解張御卻克矢貫其肘左輪朱殷是御者在左自然戈盾在右若天子諸侯親將亦居鼓下故戎右云贊王鼓成二年齊侯親鼓之是也若非元帥則皆在左御者在中故成二年韓厥自其車左居中代御而逐齊侯故杜預云兵車自非元帥御者皆在中若非兵車參乘則尊者在左故曲禮乘君之乘車不敢曠左鄭注云君存惡空其位又月令載耒耜于御與車右之間君在左也言殺人之中有禮則韔弓掩目等是也案左傳戎昭果毅獲則殺之商陽行仁而孔子善之者傳之所云謂彼勍敵與我決戰雖及胡耉獲則殺之此謂吳師既走而後逐之故云又及一人則是不逐奔之義故以為有禮臨川王氏曰春秋末世諸侯無義戰士庶人不幸而在軍旅之間聞君命既不可廢為之強戰則又為愈于不仁如商陽者可也是以孔子善之長樂陳氏曰從君之大義而忘己之不忍君子之所不為行已之不忍而廢君之命君子之所不敢楚工尹商陽追吳師而射之每斃一人則掩其目其所不忍仁也不廢君之命義也禮者仁義而已此孔子所以謂之有禮也大夫于朝則坐于燕則與故其責重士于朝則立于燕則不與故其責輕商陽所殺止于三者姑以成禮而已然則朝坐燕與為商陽者如之何曰彼必陳善以閉邪引君以當道有所不戰戰之所以止戰有所不殺殺之所以止殺庸有不義之舉哉商陽以椘為不義而不去何也君子去處有道廢興有命天下皆齊也陳文子去齊孔子不以為仁天下皆魯也栁下惠不去魯孟子不以為非聖然則天下皆椘也商陽不去椘君子豈以為非禮哉嚴陵方氏曰手弓猶公羊傳所謂手劒蓋以手執之當手弓之職則可以為手弓之事故曰子手弓而可廬陵胡氏曰韔弓不欲重傷殺敵為果易之戮也商陽殺敵不果而云朝燕不與又以私怨懟其君安得為有禮蓋春秋無義戰彼善於此而已諸侯伐秦曹桓公卒于㑹諸侯請含使之襲鄭氏曰魯成十三年曹伯廬卒于師廬諡宣言桓聲之誤也請含以朋友有相啖食之道使之襲非也襲賤者之事孔氏曰自此至悔之一節論諸侯失禮之事廬陵胡氏曰曹伯廬卒于師見春秋經此云㑹誤矣襄公朝于荆康王卒荆人曰必請襲魯人曰非禮也荆人强之巫先拂柩荆人悔之鄭氏曰在魯襄公二十八年康王椘子昭也椘言荆者州言之荆請襲欲使襄公衣之荆人欲尊康王故强之巫祝桃茢君臨臣喪之禮孔氏曰荆蓋椘之本號魯莊之世告命皆稱荆至僖元年始稱椘故杜預云荆始改號曰椘長樂陳氏曰荆人以人臣之事待襄公襄公則以人君之事臨荆人豈非自尊而卑人者人必卑之自貴而賤人者人必賤之邪秦王屈趙王以缶而有鼓瑟之辱夫差屈勾踐于㑹稽而有姑蘇之恥亦其類也廬陵胡氏曰春秋只書子此稱王記禮者誤也又曲禮云夷狄雖大曰子此乃稱王首尾矛盾滕成公之喪使子叔敬叔弔進書子服惠伯為介及郊為懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入鄭氏曰成公喪在魯昭三年子叔敬叔魯宣公弟叔肸之曽孫叔弓也進書奉君弔書也惠伯慶父𤣥孫之子名椒介副也郊滕之近郊懿伯惠伯之叔父忌怨也敬叔有怨于懿伯難惠伯也春秋傳曰敬叔不入政君命所為故惠伯强之乃入孔氏曰此一節論不可以私廢公之事子叔叔是其氏云子叔者子是男子通稱故以子冠叔也敬叔殺懿伯被懿伯家所怨恐惠伯殺已故難惠伯不敢入也然同在君朝又奉使滕國相隨在路不相畏難入滕始難者雖有怨讎恆為防備今入滕國是由主人防備不復在已故難之惠伯知其難已遂開釋之今既君命政令奉使滕國不可以叔父私怨遂欲報讎不行公事也案世本敬叔是桓公七世孫惠伯是桓公六世孫則惠伯是敬叔之父六從兄弟故敬叔呼惠伯為叔父呼懿伯為五從祖嚴陵方氏曰昔孔子對子夏問居昆弟之讎則曰銜君命而使雖遇之不鬬夫叔父之親與昆弟等耳惠伯處之以此豈不冝哉哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉曽子曰蕢尚不如把梁之妻之知禮也齊莊公襲莒于奪把梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執君之臣免於罪則有先人之敝廬在君無所辱命鄭氏曰哀公魯君也畫宫畫地為宫象曽子言行弔禮于野非也魯襄二十三年齊侯襲莒春秋傳曰把殖華還載甲夜入且于之隧隧奪聲相近或為兊梁即殖也肆陳尸也大夫以上于朝士以下于市執拘也無所辱命辭不受也春秋傳曰齊侯弔諸其室孔氏曰此一節論蕢尚不如婦人得禮之事周禮鄉士職云協日刑殺肆之三日是陳尸曰肆鄭注謂諸侯大夫士也故襄二十二年楚殺令尹子南尸諸朝大夫既于朝士則于市其天子臣則有爵者皆適甸師氏不在朝故周禮掌囚職云凡有爵者奉而適甸師氏以待刑殺掌戮云有爵者殺之于甸師氏是也天子士宜在朝與諸侯大夫同嚴陵方氏曰與人交于喪尤欲其至故弔又音的而訓至若夫弔人于道路之間者禮苟從簡事苟從便而已豈所以用其至哉蓋非禮之禮君子固不以加于人然亦未嘗受之于人焉此曽子所以言蕢尚不如把梁之妻之知禮也孺子䵍之喪哀公欲設撥問於有若有若曰其可也君之三臣猶設之顔栁曰天子龍輴而椁幬諸侯輴而設幬為榆沈故設撥三臣者廢輴而設撥竊禮之不中者也而君何學焉鄭氏曰䵍魯哀公之少子撥可撥引輴車所謂紼也三臣仲孫叔孫季孫氏猶尚也有若以臣況子也輴殯車也畫轅為龍幬覆也殯以椁覆棺而塗之所謂菆塗龍輴以椁也諸侯輴不畫龍榆沈謂以水澆榆白皮之汁有急以播地于引輴車滑也廢去也紼繫于輴三臣於禮去輴今有紼是用輴僭禮也殯禮大夫菆置西序士掘肂見衽顔栁止其學非禮也孔氏曰此論諫哀公不得學僭禮之事顔栁以有若對非其實恐哀公從之故以正禮而言天子之殯載柩于龍輴纍材作椁而題凑其木幬覆棺上而後塗之輴形庳下不似龍唯轅與龍相類故鄭知畫轅為龍也諸侯以輴載柩不畫為龍亦纍木為槨設木于上以幬之不為題凑直橫木覆之亦泥塗其上為有榆沈故須設撥今三臣者依禮廢輴不合用殯今乃設撥用輴是盜竊于禮不中法式也喪大記大夫二綍二碑是大夫有綍綍即紼又注既夕禮云大夫以上始有四周謂之輴是有輴也此云三臣于禮去輴用輴僭禮不同者此據殯時大記及既夕禮謂朝廟及下棺也大夫以柩朝廟之時用輴紼唯殯時用輁軸不得用輴紼嚴陵方氏曰三臣既知輴之可廢而不知撥之不可設是竊禮之不中者也哀公以少子之喪乃欲學之宜乎顔栁之諫也山隂陸氏曰據此諸侯無槨設幬而已故曰天子之殯菆塗龍輴以槨加斧于槨上畢塗無蓋曰天子之殯龍輴以椁則諸侯無椁可知先儒謂亦纍木為椁特湊非是榆性堅忍所謂不剝不沐十年成轂是也然以性沈難轉亦所載沈也故設撥撥雖不可知然謂之撥則以撥輴可知鄭氏謂撥所謂紼非是案喪大記大夫二綍二碑廢輴用軸而設撥故曰竊禮之不中者也廬陵胡氏曰幬不以椁而覆以他物廢輴欲竊禮設撥則不中禮悼公之母死哀公為之齊衰有若曰為妾齊衰禮與公曰吾得已乎哉魯人以妻我鄭氏曰悼公母哀公之妾妾之貴者為之緦而有若譏而問之哀公言國人皆名之為我妻重服嬖妾文過非也孔氏曰此一節論哀公為妾著服非禮之事天子諸侯絶旁期於妾無服唯大夫貴妾緦以哀公為妾著齊衰服故舉大夫貴妾緦以對之耳哀公文過謂魯人以我無夫人皆以為我妻不得不服也季子臯葬其妻犯人之禾申祥以告曰請庚之子臯曰孟氏不以是罪豫朋友不以是棄豫以吾為邑長於斯也買道而葬後難繼也鄭氏曰季子臯孔子弟子髙柴孟氏之成邑宰或氏季犯躐也申祥子張子庚償也臯恃寵虐民非也孔氏曰此一節論髙柴非禮之事髙柴字子臯論語作子羔古字通用子臯見申祥請償故拒之云孟氏不以是犯禾之事罪責于我以孟氏自為奢暴故也朋友不以是犯禾之事離棄于我以其小失非大故也斯此也以吾為邑長於此成邑乃買道而葬清儉太過後人難繼續也嚴陵方氏曰恃己之貴而虐民之賤非所以為仁殉己之利而忘民之害非所以為恕不仁不恕且長民于邑焉則天下之公法不容而在所罪矣豈必孟氏罪之然後為罪哉天下之公義不與而在所棄矣豈必朋友棄之然後為棄哉子臯昧于此宜慮後之難繼焉所謂順非而澤也孟氏執政者也故以法言罪朋友同等者也故以義言棄仕而未有祿者君有饋焉曰獻使焉曰寡君違而君薨弗為服也鄭氏曰見在臣位與有祿同也君有饋有饋于君也違去也以其恩輕也孔氏曰此一節論臣之仕未得祿者與得祿之臣有同有不同之事也故王制云位定然後祿之臣雖仕未得祿而有物饋君及出使他國所稱則並與得祿者同也違謂三諫不從以禮去者若已有祿雖去仕他國而所仕者敵則猶反服今此未得祿之臣唯在朝時乃服若放出他國而故君薨所仕雖敵亦不反服也臨川王氏曰經言君有饋焉而解之曰有饋于君似非也且臣之饋君謂之獻豈問有祿未有祿乎長樂陳氏曰孟子曰湯之于伊尹學焉而後臣之桓公之于管仲學焉而後臣之方其學焉則賔之而弗臣此所謂仕而未有祿者也賔之而弗臣故有饋焉不曰賜而曰獻其將命之使不曰君而曰寡君若子思之仕魯孟子之仕齊是也違而君薨弗服則在國而君薨為之服矣山隂陸氏曰未純于臣故雖君饋之猶曰獻雖違之他邦弗為君服李氏曰立于其朝矣命之廪人繼粟庖人繼肉而不以官定食此所謂仕而未有祿者也饋焉則不以主君言賔而不臣也賔之故有獻而無賜不臣故有聘而無召蓋不如是不足以有為也故玉府之職曰掌王之獻玉是王有獻賢之禮也書曰師錫帝又曰錫汝保極是下有錫上之辭也以下尊上謂之貴貴自上尊下謂之尊賢貴貴尊賢其義一也康誥亦曰爾事服休服采諸侯之于賢猶不可以不事之況得而臣之乎虞而立尸有几筵卒哭而諱生事畢而鬼事始已既卒哭宰夫執木鐸以命于宫曰舍故而諱新自寢門至于庫門鄭氏曰諱辟其名也生事畢而鬼事始已謂不復饋食于下室而鬼神祭之已辭也舍故謂髙祖之父當遷者也孔氏曰此一節論葬後當以鬼神事之禮未葬猶生事之以脯醢奠于殯宫又于下室設黍稷曰饋下室謂內寢生時飲食有事處也器物几杖如平生故未有尸既葬親形已藏下室遂無事虞用祭禮故立尸以繫孝子之心未葬殯宫雖有脯醢之奠不立几筵大斂之奠但有席而已亦無几也至虞祭更立筵與几相配故士虞禮云祝免澡葛絰帶布席于室中東面右几是也此謂士大夫禮若天子諸侯則葬前有几故周禮司几筵云喪事素几鄭注謂殯奠時也既虞卒哭則生事畢鬼神之事方為始也既執木鐸以命宫中又出宫從寢門至于庫門寢門路門庫門魯之外門也百官及宗廟所在之次咸使知之也魯三門故至庫門耳若天子則至臯門也凡諸侯則臯應路嚴陵方氏曰生事畢而鬼事始已者上言生則知鬼之為死下言鬼則知生之為人也二名不偏諱夫子之母名徴在言在不稱徴言徴不稱在鄭氏曰稱舉也雜記曰妻之諱不舉諸其側孔氏曰此一節論不偏諱之事嚴陵方氏曰夫子曰不在顓臾而在蕭牆之內若此則言在不稱徴也又曰夏禮吾能言之杞不足徴若此則言徴不稱在也軍有憂則素服哭於庫門之外赴車不載櫜韔鄭氏曰憂謂為敵所敗也素服者縞冠也赴謂還告于國以告喪之辭言之也櫜甲衣韔弓衣兵不戢示當報也孔氏曰此一節論軍敗當報之事案左氏傳禍福稱告崩薨稱赴但露其甲弓故曰不戢臨川王氏曰禮者將以恩止爭且務修已而不責人不載櫜韔如鄭義則禮亦悖矣長樂陳氏曰兵法曰若師不勝取過在己即周官大司馬若師不功則厭而奉主車臣之取過在己也禮記素服哭于庫門之外君之取過在己也秦穆公之敗于殽素服郊次向師而哭蓋其遺禮歟車必曰赴車若告喪也赴車不載櫜韔示不忘戰也雖然合義則動非義則止豈若焚舟破釡沈船置膽以干戈相尋而示其必死者乎故梁惠王欲報齊楚孟子教之以省刑罰薄稅斂深耕易耨壯者以暇日修其孝弟忠信然後及于制梃也嚴陵方氏曰戰勝而還謂之凱則其敗謂之憂亦宜矣素服哭于庫門之外則以喪禮處之也必于庫門之外者以近廟門故也蓋師之出也受命于祖及其無功則于祖命不能無辱矣故近廟門則哭之赴車蓋自軍告赴于國之車也凡告喪曰赴車以告喪為名則與素服同義有焚其先人之室則三日哭故曰新宫火亦三日哭鄭氏曰謂火燒其宗廟哭者哀精神之有虧傷火人火也新宫火在魯成三年孔氏曰此一節論哀先人宗廟毁傷之事左傳云人火曰火天火曰災公羊傳曰新宫者何宣公之宫也山隂陸氏曰據此春秋書新宫災諱火耳災非人之所能為也即書火其所以備火之道不盡也李氏曰言新宫不言宣公不忍言也春秋書新宫災謂天火也謂人火則不恭大矣故內火皆書災然實人火之也孔子過泰山側有婦人哭於墓者而哀夫子式而聽之使子貢問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也鄭氏曰夫子怪其哀甚故式而聽之而曰然而猶乃也夫之父曰舅孔氏曰此一節論苛政嚴於猛虎之事一似重有憂者一者決定之辭也嚴陵方氏曰虎之害人也機罟檻穽所能制之政之害人也無可制之械焉虎之害人也深宫固門所能逃之政之害人也無可逃之地焉此泰山婦人所以寧遭虎之纍傷而不忍舍其政之無苛也揚雄之論酷吏曰虎哉虎哉角而翼者也與此同意式而聽之則與式凶服同義魯人有周豐也者哀公執摯請見之而曰不可公曰我其已夫使人問焉曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之何施而得斯於民也對曰墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬殷人作誓而民始畔周人作㑹而民始疑苟無禮義忠信誠慤之心以蒞之雖固結之民其不解乎鄭氏曰摯禽摯也諸侯而用禽摯降尊就卑之義下賢也周豐曰不可辭君以尊見卑也士禮先生異爵者請見之則辭已止也重强變賢也時公與三桓始有惡懼將不安故使人問焉周豐言民見悲哀之處則悲哀見莊敬之處則莊敬非必有使之者墟毁滅無後之地也㑹謂盟也盟誓所以結衆以信其後外恃衆而信不由中則民畔疑之孔子曰其身正不令而行其身不正雖令不從蒞臨也孔氏曰此一節論君之臨臣民當以禮義忠信為本之事哀公言虞夏施何政教而得如此敬信于民豐言民之從君在君身所行不在言也若身之不行言亦無益故殷周作誓作㑹而民始疑畔苟誠也人君之身誠無禮義忠信誠實質慤之心以臨化之雖以言辭誓令堅固結之民其不解散離二乎周豐此言欲哀公身行誠信而已凡舊居皆曰墟故左傳有莘氏之墟有昆吾之墟皆是毁滅無後者案昭三年左傳云有事而㑹不協而盟則盟㑹别也鄭注㑹謂盟者以下云民疑而司盟有云邦國有疑則盟詛之故以㑹為盟也尚書夏啓作甘誓左傳云夏啓有塗山之㑹又禹㑹塗山而此言殷周者據身無誠信徒作盟誓而民始離畔者耳非謂殷周作誓㑹也若啓作甘誓禹㑹塗山皆身有誠信於事善也又穀梁傳云誥誓不及五帝盟詛不及三王者五帝三王身行德義不專用誥誓盟詛故云不及與此不同長樂陳氏曰黃帝之于廣成湯之于伊尹請必下風聘必三幣豈以一辭而止哉此其樂善不倦者也魯哀公之於周豐執摯請見一辭之以不可則止焉使人問之而已其視樂善不倦者則有間矣墟墓之間社稷宗廟之中無情于感民而民哀敬殷人作誓周人作㑹有心于制民而民畔疑也蓋誓生于不信㑹生于不敬不信而誓之使信則民始畔不敬而㑹之使敬則民始疑周豐之言凡欲哀公修敬信以感民而已論語孔子對哀公以孝慈則忠臨之以莊則敬與此同義禹之伐苗有誓塗山有㑹此言作于殷周何也蓋有其事者未必作其法作其法者未必始其事夏之前未嘗無貢至禹則作貢孔子之前未嘗無春秋至孔子則作春秋則作誓作㑹蓋亦作其法而已嚴陵方氏曰夫虞夏之得天下也以禪殷周之得天下也以爭禪則出于自然故信未施而民信之且無異乎墟墓之間民之自哀也敬未施而民敬之且無異乎社稷宗廟之中民之自敬也爭則出乎不得已故誓雖作而反以起民之畔㑹雖作而反以致民之疑而已且畔固甚于疑也畔其言未足為甚疑者衆于是為甚焉禮義忠信誠慤之心則敬之道所自出也固結之則以誓㑹而已苟無是心以蒞之則結之者雖固民亦解而散矣凡物結之則聚解之則散惟其結之而聚故可解之而散若夫有以蒞之則無所結也亦不可解矣清江劉氏曰殷人作誓而民始畔周人作㑹而民始疑誓㑹皆當出于天子耳殷既衰諸侯專誓周既衰諸侯專盟馬氏曰先王之制法事為之制曲為之防有不聽者可以棄矣而猶有誓以致其戒故大司徒之制曰以誓教恤則民不怠其教之如此之詳其治之如此之備有犯命者可以刑矣而猶有盟以聽其政故司盟曰盟萬民犯命詛不信者此有以見先王仁之至也是以殷周之盛時以禮義道民故其民始于無犯非禮而終于無思犯禮誓可以己矣而猶不敢忘以忠信遇民故其民始于不敢欺而終于不忍欺盟可以己矣而猶不敢廢此有以見先王智之盡也方其俗之成如此則盟誓之助于教豈小補哉及其末也無善政以使之逺刑罰而徒作誓故曰民始畔無德教以使之畏鬼神而徒作㑹故曰民始疑蓋誓之以禮義盟之以忠信末也不修其本而一之于末故民其有不解乎本末無不備然後可以為治山隂陸氏曰誓曽前此矣而殷周作意于此故民于是始疑畔延平黃氏曰盟誓果非先王之事乎先王以輔德信者也後世德信廢而盟誓獨行于天下此民所以疑畔廬陵胡氏曰魯之失民久矣政在三家數世矣而哀公方且患之晚矣禮記集說卷二十二
