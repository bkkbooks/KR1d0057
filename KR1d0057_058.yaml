body:
  text: 禮記集説卷五十八宋衛湜撰是故夫禮必本於大一分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命其官於天也鄭氏曰聖人象此下之以為教令官猶法也此聖人所以法於天也孔氏曰此一節論上言禮既藏於郊社天地之中是故制禮必本於天以為教也大一者謂天地未分混沌之元氣也極大曰大未分曰一禮之理既與大一齊故制禮者用之以為教本也元氣既分輕清為天重濁為地制禮者法之以立尊卑之位故曰分而為天地也天地既分天之氣運轉為陽地之氣運轉為隂制禮者貴左以象陽貴右以法隂因陽時而行賞因隂時而行罰故曰轉而為隂陽也陽氣變而為春夏隂氣變而為秋冬制禮者吉禮則有四面之坐凶禮則有恩理節權是法四時也四時變化生成萬物皆是鬼神之功聖人制禮則陳列鬼神之功以為教也其降曰命者言聖人制禮皆仰法大一以下之事而下之以為教命其官於天者結之也横渠張氏曰大虚即禮之大一也大者大之一也極之謂也禮非出於人雖無人禮固自然而有何假於人今天之生萬物其尊卑小大自有禮之象人順之而已此所以為禮或者專以禮出於人而不知禮本天之自然如告子專以義為外而不知所以行義由内也當合内外之道知禮之本於自然人順而行之則是知禮也長樂陳氏曰以形之始而言之謂之大始以數之始而言之謂之大一大一之體分而為天地之氣轉而為隂陽之用變而為四時之序列而為鬼神之情其降之於人曰命凡此皆天造之禮而主之於天故曰其官於天也延平周氏曰老子曰道生一又曰天法道道法自然則一者道之所生而大一者生道者也生道者其自然之謂乎易曰乾知大始葢乾者萬物之所資始而大始者又乾之所資始者也禮之大一其猶易之大始乎然禮必本於大一者大一天地之始凡有數者莫不出於其間故分而為天地之位轉而為隂陽之道變而為四時之代謝列而為鬼神之魂魄其降之於人則曰命也然不能離乎數故不能官天而官於天也嚴陵方氏曰隂極生陽陽極生隂隂陽之運周而復始故曰轉而為隂陽春生夏長秋斂冬藏惟其時也然未始有常故曰變而為四時天地則有上下之位隂陽則有升降之宜四時則有先後之序鬼神則有變化之功聖人體此以命物而在下莫不聽故曰其降曰命亦未甞不本之於自然故曰其官於天不曰本而曰官者以夫禮之命物各有所主故也虙氏曰禮未離乎數故官於天而未能官天也若夫離乎數者道也範圍天地而不過官天而不官於天矣官猶主也若夫聖人以道制禮而極其妙則又可以官故曰禮樂明備天地官矣龍泉葉氏曰古人究極禮之本末貫徹上下而著於功用故大一其本也天地其分也隂陽其轉也四時其變也鬼神其列也命其降也其理微而難見其說大而難該是豈君子之於禮也遂欲舉天地萬物而强納之哉彼葢誠有以見之矣天之所本地之所動事之所列時之所變分藝之所恊如自黍累而至斛斗自毫忽而至尋丈其散者皆可分其總者皆可㑹也天生人之常知有養人而已貨力辭讓飲食冠婚䘮祭射御朝聘此其養之昭然見於日用者也彼亦惡知其汗漫無統而猶以為之品節為之等序以自附於禮雖夷狄不廢焉唯其操縱有所徇子奪有所偏不以情由禮而以禮飭情至於情之所以安與情之所不能禁則決壊而雜施之是以紛然而不合耳聖人知禮之所由本隨而察其轉變分列之際而貫徹於隂陽上下之交得其所以居斯人者而後貨力辭讓飲食冠婚䘮祭射御朝聘品節之序以行乎其間人倫既正人情既順人義既明使人知其所以講信所以修睦而肌膚之㑹筋骸之束不至於渙焉而不相從也則豈不仰無愧俯無怍而怡然有一見天人之通幽顯之辨事理之融内外之合也哉論至於此則三王之極盛不以私智人力而服制天下也明矣後世受禮之地狹用禮之時少任禮教拘以為禮者一事而已大一天地隂陽四時而無非禮也則逺而誕肌膚之㑹筋骸之束而無非禮也則切而煩逺而誕者易離切而煩者難行則其所為舉是禮者不過止於貨力辭讓飲食冠昬䘮祭射御朝聘之間之事而又古今不相㳂奢儉不相均朝廷閭巷不相通駁義異説不勝其多宿儒老師交相非詆而不能一也是其於禮幾何哉故昔之於禮也以厚後之於禮也以薄昔之於禮也合天地鬼神而無間後之於禮也瀆聽首亂而可以盡去之矣嗚呼不見其竇而通之不明其端而舉之唯聖人而後知禮之不可以已乎蔣氏曰自禮必本於大一至其官於天所以言禮之不離乎天自禮必本於天至居人也曰養所以言禮之終歸於人且本於大一者天地未分之先也高卑以分天地立矣二氣轉移隂陽生矣寒暑代謝有四時之變生死徃來有鬼神之形莫非此禮𤼵露於自然聖人本其自然𤼵露者制禮以命天下故曰其降曰命既謂之降曰命矣又終之以其官於天者聖人懼天下言禮者瀆於人而忘於天故爾且謂之必本於天者猶言本於大一也然動而之地則大一判而上下殊矣列而之事見於制度顯設之位變而從時推之於隂陽竒耦之象莫非此禮所以周流而不窮也聖人因而順其分之所宜受量其藝之所能為而使之行是禮故曰恊於分藝必終之以居人曰養者聖人懼天下之言禮者惑於天而不體於人故爾官者有所主宰之義養者得所安全之稱不官於天吾不知自有人物以來所以有是禮者孰維持而主張之不居人而曰養吾不知生民交際之後所以至今上下相乗貴賤相使孰便利之孰順適之然妙於天以為之本體於人以求其用而後此禮在天下行之以飲食冠昬䘮祭射御朝聘而非偽為也易曰形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業方天地未立易有大極渾然而已兩儀既生於是循而至於四象八卦吉凶大業而莫知終窮也然不反諸形而上者之妙則莫原其始不要其舉而措之之餘則莫識其終謂之道者貫天人於一致禮之為禮夫豈外此夫禮必本於天動而之地列而之事變而從時恊於分藝其居人也曰養其行之以貨力辭讓飲食冠昬䘮祭射御朝聘鄭氏曰禮本於大一與天之義後法地後法五祀所以本事也後法四時恊合也言禮合於月之分猶人之才也養當為義下之則為教令居人身為義孝經説曰義由人出貨摯幣庭實也力筋骸强者也不則偃罷孔氏曰此一節論上本説禮從天地四時五行而生而教於人故此以下論人用之以行刑罰冠昬朝聘之等皆得其宜也動而之地祀社是也事即五祀從時即四時以為柄恊於分藝即月以為量養宜也制度諸事居人中身則人得其宜諸禮皆須義行故云其行之也力筋力拜伏也辭讓賔主三辭三讓飲食饗食之屬也冠二十成人而冠昬三十而取射五射御五馭朝五年朝及諸侯自相朝見之禮聘謂比年小聘三年大聘言人有義在身則能行此諸禮也王氏曰下云穫而弗食食而弗肥字宜曰養家語曰其居人曰養江陵項氏曰前言禮必本於大一分而為天地此言禮必本於天動而之地葢氣始於天形生於地天之與地即大一言所分也古之聖人懼人之外天地而求大一也故曰本大一也分之則為天地見一之有兩也又曰本於天動而之地見兩之本一也動以形見言之非圓動方静之動也長樂陳氏曰列而之事者禮之稱變而從時者禮之權凡皆人為之禮而居之於人以養人也延平周氏曰或曰禮必本於大一或曰禮必本於天何也言禮之先乎天地者則曰必本於大一言禮之後乎天地者則曰必本於天本於天者禮之象也動而之地者禮之法也列而之事事同則禮同也變而從時時異則禮異也恊於分者禮之情也恊於藝者禮之文也居人也莫非給人之求而養人之欲故曰養其行之以貨力辭讓飲食冠昬䘮祭射御朝聘者皆其在於度數之間者也雖然禮之所以顯者舎度數何以哉嚴陵方氏曰上言禮本於大一則原禮之初而已此又明禮之用焉上言禮之初故言官於天以見其自然此言禮之用故言居人以見其使然也方其本乎天也則靜而已未始或動一而已未始有列及其降而在地則離靜而向動矣散而在事則出一而成列矣以其有所之故也故於地曰動於事曰列皆以之言之時無常而不可逆也故曰變而從時分有多寡藝有能否各隨力而施之自貨力辭讓而下則言所以存乎人者故曰其居人也曰養其行之以貨力辭讓飲食冠昬喪祭射御朝聘言冠昬喪祭射御朝聘非貨力辭讓飲食有不行也夫欲行禮貨力為先辭讓次之飲食又次之故曰無財不可以為悦非强有力者莫能行也山隂陸氏曰禮論曰禮起於人何也曰人生而有欲欲而不得則不能不爭爭則亂先王患其亂也使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所以起也故禮者養也其降曰命其官於天也言人之生於禮如此其居人也曰養其行之以貨力辭讓飲食冠昬喪祭射御朝聘言人之養於禮如此虙氏曰禮之妙體根於大一未分之前禮之成用起於兩儀既判之後唯其未分而渾淪故曰必本於大一唯其既判而定位故曰必本於天列而之事事詳則禮詳也變而從時時異則禮異也恊於分不强其所無也恊於藝不强其所不能也貧者不以貨財為禮其恊於分乎老者不以筋力為禮其恊於藝乎廬陵胡氏曰列而之事萬物皆以禮行變而從時禮隨時變馬氏曰禮本於大一至其降曰命言禮之所由以起也其官於天也禮必本於天至其行之以貨力辭讓飲食冠昬喪祭射御朝聘禮之所由以成也大一者道之所生也道不可得見而見之於大一大一者不可得見而見之於天地聖人制作逺有以本於天近將以殽於地祭帝於郊所以定天位也祀社於國所以列地利也故曰禮必本於天動而之地然禮必本於天而不及於地者先尊後卑之意也推而詳之則降於祖廟山川皆事也故曰列而之事時者當其所事之謂也葢無一定之理變而通之然後得其中故曰變而從時藝言其才也葢才有長短大小之不同莫不當其分有以恊之一歸於中而已故曰恊於分藝禮必本於天動而之地者聖人作則必以天地為本是也列而之事變而從時恊於分藝者鬼神以為徒四時以為柄日星以為紀月以為量是也至於居人則曰養何也禮者所以養人非以害人者也禮以養人為本故曰養荀子曰恭敬辭讓之所以養安禮義文理之所以養情通此則可以知其所養之之意也葢聖人之道寓於度數之間莫非順性命之理而所以養人也然其行之大者在於貨力辭讓飲食冠昬喪祭射御朝聘而已此亦非禮之盡特言大略而已龍泉葉氏蔣氏説見前故禮義也者人之大端也所以講信脩睦而固人肌膚之㑹筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也故唯聖人為知禮之不可以己也故壊國喪家亡人必先去其禮鄭氏曰竇孔穴也去其禮言愚者之反聖人也孔氏曰此一節論上文説禮為治理之本故又説禮不可去之事左傳云逃出自竇又篳門圭竇是孔穴也孔穴開通人之出入禮義者亦是人之所出入長樂劉氏曰立人之道此其大端也所以講信脩睦而固人肌膚之㑹筋骸之束者常人之情貴則驕富則傲勞則怠安則逸而惰慢淫亂由之生矣故自天子至於大夫士非役於禮則國敗家亡不召而自至也故天之神地之祗人之祖非有至誠不可得而致矣由是而言禮也豈止肌膚之㑹筋骸之束而已哉故曰所以養生送死事鬼神之大端所以達天道順人情之大竇也虙氏曰禮之端始於辭讓而未可謂之大端義之端始於羞惡而未可謂之大端唯合禮義之成體而不倚於一偏然後為人之大端也養生送死事鬼神以禮而正故曰大端達天道順人情以禮而通故曰大竇廬陵胡氏曰孟子言禮之端義之端蓋生乎此肌膚之㑹筋骸之束所以為人之幹云竇者禮義人所由以出入延平周氏曰禮所以節義義所以濟禮二者人倫之大端也所以達天道者禮義人道而已由人道然後達天道也馬氏曰道徳仁義非禮不成又曰義者藝之分則知禮義者為人道之大本夫禮義出於性而曰固肌膚之㑹筋骸之束何也葢有禮則莊敬日强無禮則安肆日偷君子知謹於禮義則手足有所措耳目有所加進退揖讓有所制此所以固人肌膚之㑹筋骸之束也然此特為中材言之若夫聖人動容周旋中禮肌膚不待禮而固筋骸不待禮而束也從心所欲而不踰矩也養生送死事鬼神其道非一而禮義者尤為之大端也養生所以飾驩送死所以飾哀事鬼神所以飾敬此禮義以節文之也禮義出於天先王因之以達天道禮義出於人先王因之以順人情禮義出於天而受中自於人禮義雖出於人而降𠂻自於天達者所以明之也順者所以因之也長樂陳氏曰或曰禮義以為紀或曰禮義以為器或曰禮者人君之大柄或曰禮義者人情之大端何也葢紀以言其所張器以言其所用柄以言其所執端以言其所始其言之不同各有所當也講信脩睦所以誠其心固人肌膚之㑹筋骸之束所以莊其身以至養生送死於其明事鬼神於其幽凡此皆人道而已由其人道所以達於天道故能順人情之所通大竇以言其通也嚴陵方氏曰禮義内可以治心外可以修身故曰所以講信脩睦而固人肌膚之㑹筋骸之束也聖人所以能保其國家與人民知禮之不可以已爾衆人反此而禍患隨至蔣氏曰禮以辨義義以起禮禮之與義其理相因而其用相成所以為萬善有為之要而人道待以有立也自其有諸己而不違者皆謂之信是信也非徒曰言而有信之謂也自其施諸人者皆謂之睦是睦也非徒曰因睦合族之謂也人生乎天地間惰慢邪辟之氣或設於身體此信不講耳故孔子以正顔色為近信乖爭陵犯之風或見於接物此睦不修耳故孔子謂正愛以教民睦然則聖人設禮義以教天下凡以使民踐履浹洽一毫非僻之念非禮之動有所檢束而不敢自肆於平居暇日也不然則觴酒豆肉誰肯受惡衽席之上誰肯在下朝廷之位誰肯受賤凡於交際血氣用事攘臂動色始莫知其所主矣兹所以必俟講信脩睦而固人肌膚之㑹筋骸之束與然聖人為禮非茍然也唯能反其所謂在人者而後還其所謂天者然不本其所謂天者亦不足以反其所謂在人者彼生有養而死有葬物本天而人本祖别鬼神以為位有報與反以為説是人道之大端也天也吾固因之以為常孩提而知愛既長而知敬顙泚於親之不藏父子有𨼆而無證是人情之大竇也天也吾固順之而不拂夫本乎天者以為常則順之則達之關乎人者則講之則修之又從而固之記禮之㫖可謂明甚天下國家興衰治亂豈不自是而可必哉故禮之於人也猶酒之有糵也君子以厚小人以薄鄭氏曰皆得以為美味性善者醇耳孔氏曰此一節論上云禮不可去故明禮之在人有厚薄之事禮不可已故在人譬如釀酒須因麴糵則成君子譬精米嘉器小人譬麤米弊器釀酒共用一麴分半釀精米嘉器則其味醇和半釀麤米弊器則其味醨薄亦如禮一而君子性識純深得禮而彌厚小人智慮淺薄得禮自虚薄也長樂陳氏曰糵之於酒厚則醇薄則醨醇則久醨則壞禮之於人厚則君子薄則小人君子則安小人則危善為酒者戒其為醨而務其為醇善為人者戒其為小人而務其為君子也講義曰禮非有厚薄也人自為厚薄而已故聖王修義之柄禮之序以治人情故人情者聖王之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之鄭氏曰治者去瑕穢養菁華也修禮以耕和其剛柔也陳義以種樹以善道也講學以耨存是去非類也本仁以聚合其所盛也播樂以安感動使之堅固也孔氏曰自此至危也一節因上君子小人厚薄不同故此論聖人修禮義治人情以至大順也柄謂執持而用者土地是農夫之田人情是聖王之田農夫用耒耜耕田和其剛柔聖人以禮耕人情正其上下農夫耕田既畢以美善種子而種之聖人以禮正人情既畢用禮義以教之也農夫種苖勤力耘耨去草養苖則苖善矣聖王以禮教民又須講學以勸課之存是去非則善也農夫苖稼成熟當本此仁愛以聚集所収勿為費㪚聖王勸課行善本此仁恩聚集善道使不廢棄也播布也農夫収穫既畢布其歡樂之心共相飲食以安美之聖王既勸民善又説樂感動使其勤行善道保寧堅固也唐陸氏䞇曰人情者聖王之田言理道所由生也長樂陳氏曰修禮以耕所以開其心陳義以種所以納之正講學以耨所以去其非本仁以聚所以充其徳播樂以安所以成其道也嚴陵方氏曰義者所操有宜而不可失故言柄禮者所行有節而不可亂故言序禮義雖本於人心然有至於無禮無義者心或動而情亂之也故聖王修其柄與其序還以治人之情而已此以義為柄而前經言禮者君之大柄又何也以禮為義之質則義之柄亦禮而已故皆謂之柄然治人之道莫急於禮故謂之柄則義之所同謂之大柄則禮之所獨也人之有情猶地之有田不可不治也治其田者農夫之事也治其情者聖王之事也故曰人情者聖王之田前經言人情以為田正謂是也故詩言無田甫田維莠驕驕齊人以之刺襄公焉禮者事之治猶耕治荒蕪故言修義者事之宜猶種之因地宜故言陳學所以為己猶耨之去苖害故言講仁者愛也仁則聚之猶穫故言仁以聚之樂者樂也樂則安之猶食故言樂以安之禮惡其壊故曰修義欲其明故曰陳學欲其辨故曰講仁以立人道非本不立故曰本樂以和民聲非播不和故曰播廬陵胡氏曰禮為耒耜義為種子學為耘耔仁為倉廪播樂以安之使人樂善不倦延平周氏曰禮然後至於義仁然後至於樂四者以講學為主故其序如此龍泉葉氏曰得禮義之本要而後能通人情能通人情而後能治人情人情可治則其性徳全而道化成以儒者之言義道也嚴於性而略於情請因是論之夫利欲羞惡充滿殽亂而趨向高下萬彚殊錯一人之情一人之變反覆無窮彼葢自有不能知其所從來者人情之共安衆心之同願異國俗殊時世而好惡之情若出於一雖聖人有不能易其所好而進其所不欲者天下之紛紜事機之繁多彼唯朝令夕改皆是情而已矣自堯舜以及文武其治道所以大被於天下者葢其修仁義禮樂之實而播諸事為之間必有中於人情之㑹相與俯仰出入動蕩流通其情之異趨與羣心同向者皆得以旁皇周浹於其中一人之放僻不專行而天下之取舎得公是焉是以不待刑罰禁約而固已自治故論禮者以人情為聖王之田而治是田者有良農之功非如後世之論以情為不美以禮為强制築千丈之防遏奔放之流使其噤黙不得逞而後從我而為禮義也情之所有而禮或未之有則起禮情之所安而義或未之安則辨義然後知舎禮義而用刑罰不如一置刑罰而盡入禮義也故古者仁義禮樂以官治之而人得以自陶於善後世仁義禮樂以師教之而秀民傑士或不能成才豈非古道通其情而合其趨後世弊其情而失其歸古者得禮義之要而人情可知後世守禮義之説而不能通乎蔣氏曰此言禮以治情為主而以治田為喻也方其揭義以示之而謂之柄本禮以明分而謂之序禮義之名立矣然其用之存乎人者必有以也凡人之情應感起物血氣用事葢必有梗吾和平之化者則修禮以治之而謂之耕禮由義起彼其初葢本有淺深厚薄之宜則陳義以治之而謂之種學足以辨其是非而以為耨仁足以滋其盛大而以為聚樂足以樂其成功而以為安夫然後衆善皆㑹於禮而即禮可以善天下之情雖然四端之在我者學與樂不與焉其意以為人之一性萬理㑹融有是二者以辨明之學樂之謂耳然禮在天下未甞不以仁義為主故下文言之金華應氏曰情者心之動也養之不善則荒穢不治而可欲之善塞矣然仁義禮智根於心而善端本無窮也養之有道則勃然而𤼵生矣人情具為善之資猶田有生殖之利人情有可治之地而聖王加順治之功故以百畆之不治為己憂者農夫也以人情之不治為己責者聖王也禮之有序猶耕之有畔義之有節猶種之有列曰修曰陳者書所謂若稽田既勤敷菑惟其陳修是也學探千古羣聖之奥而思索問辨以求其正猶耨之去草而耘治益精也仁總百行萬善之全而滋養培植以豐其成猶穫之揫斂而収取以無遺也樂具五音六律之節而動盪𤼵越以宣其和猶既穫之餘安坐以食而熙熙自如也播者散布𤼵越之謂書播時百穀周官曰播之以八音故禮也者義之實也恊諸義而恊則禮雖先王未之有可以義起也義者藝之分仁之節也恊於藝講於仁得之者强仁者義之本也順之體也得之者尊鄭氏曰恊合也藝猶才也有義則人服之故得之者强有仁則人仰之故得之者尊孔氏曰前既明禮耕義種仁聚此廣明三者相須也禮是實義以修飾為禮之華故曰禮者義之實諸之也起作也禮與義既相恊㑹若應行禮先王未有舊制臨事制宜而行之是以義起作也如將軍文氏之子是也義者藝之分仁之節者明仁須義也義者裁斷合宜也人有才能仁施用義裁斷乃得分節也恊於藝是義能合藝也講於仁講猶明也是義能明於仁也仁者義之本謂仁能與義為本仁者施生故為順之體黄氏曰禮也者義之實也因上文禮耕義種謂禮者為尊卑升降親踈之節義者合宜當理指的之稱名實相應則為正禮倘有禮而不能合宜當理是有名而無實譬諸普侯云魯君自郊勞至贈賄無失為知禮女寛曰區區習儀豈為知禮故君臣父子之道禮之實周旋退讓之節禮之儀下文云恊諸義而恊謂須合義則合禮也又下文云禮雖先王未之有可以義起亦謂有未立之禮則取合宜之義而起作之非為禮修飾之華明矣横渠張氏曰人情所安即禮也故禮所以由義起藝業也謂事業也長樂陳氏曰義以禮為實而禮以義為文合於義則禮斯合矣故曰恊諸義而恊則禮雖先王未之有而後世可以義起也是故廟門非待弔者之所而將軍文子行之於喪畢之時説驂非為賻之宜而孔子行之於出涕之際以至純儉可以從衆則不必麻冕之泥嫂溺可以手援則不必嫌疑之拘唯義所在而已荀子曰禮以順人心為本凡非先王之禮而順人心者皆禮也然則孟子以禮為義之節文而此以禮為義之實何也葢義出而為禮禮行而為義二者未甞不相須顧其所主而迭為文實也論語曰義以為質禮以行之此義之所出而為禮也禮器曰義理禮之文此禮之所行而為義也六藝非義則雜仁非義則蕩處藝以義然後有所别處仁以義然後有所節故曰義者藝之分仁之節也以其為藝之分故能恊於藝以其為仁之節故能講於仁夫事親仁之實從兄義之實仁之於父子義之於君臣有親然後有兄弟有父子然後有君臣此先仁後義之體也仁人之安宅義人之正路由其宅然後至於路此先仁後義之用也故曰仁者義之本温良者仁之本敬慎者仁之地寛裕者仁之作遜接者仁之能故曰順之體也仁必有義義未必有仁仁者天之尊爵故得仁則尊得義則止於强也嚴陵方氏曰禮雖作乎外而義則資之以成體義雖由乎内而禮則用之以制宜唯其資之以成體故此以禮為義之實唯其用之以制宜故禮器以義為禮之文也禮義之相須如此則人之所行果合於義矣在禮豈有悖哉故曰恊諸義而恊則禮可以義起如曲禮曰禮從宜是矣延平周氏曰實有成意蓋草木至於實則成矣義以生禮禮以節義故義為禮之所自生而禮乃為義之所自成也故曰禮也者義之實也義者藝之所以别宜者也故曰藝之分以仁義而對禮則禮為仁義之節以義對仁則義為仁之節故曰仁之節也義與禮恊而禮者六藝之大故曰恊於藝義者入於仁者也入於仁者講之而已故曰講於仁以事而言則仁之於父子義之於君臣有父子然後有君臣以理言之徳而後仁仁而後義有仁則有義故曰仁者義之本未有仁而遺其親犯其上者故曰順之體也仁必有義義不必有仁故得義者强而已而得仁者必至於尊也馬氏曰禮者義之實義者禮之華禮者所以體常義者所以盡變變者禮中之權也常者義中之經也葢禮義一物耳體其常則為禮盡其變則為義故三代之禮一而或素或華者皆所以變而從時也要之不違禮之經義之權而已藝者言乎其材也材出於性非天之降爾殊也成於人則有長短小大之異而義者所以宜之而分之各當其理也四端均出於性有所宜而成之者尤在於義也故曰義者藝之分仁之節也材出於性而義者所以合之而得其宜仁在於内而義者所以講之而見於外外有以講於仁内有以合於藝則義之道得矣義得其道則人望而畏之於得之者强强者有立我之意故曰自勝之謂强山隂陸氏曰藝以有義故有分仁以有義故有節如有義而已矣不恊於藝不講於仁將以為厚也而適得薄焉將以為强也而適得弱焉孔子曰依於仁游於藝蔣氏曰謂禮者義之實矣而又曰義者藝之分仁之節者是禮之資於義者為多也既曰藝之分仁之節矣而又曰義之本順之體者是禮之資於仁者為重也禮出於義則在我者有自然之强禮出於仁則在我者有自然之尊惟强惟尊足以勝私情而還天理昔季氏之臣逮闇而祭雖强力之容皆至倦怠此義之不講之故故聘射之禮强有力者為能行之而以有義謂之勇敢八佾舞於庭三家以雍徹卑得以抗乎尊下得以僭乎上此仁之不講之過故孔子謂人而不仁如禮何孟子亦以仁為天之尊爵而謂人人有貴於己者弗思耳然則是强也用之於順治推而至於戰勝無敵者同此一義也是尊也本之於良貴推而至於人之所貴者同此一仁也要之論天下之理至於義有可强仁有可尊而後聖人所以為禮始有定論矣鄭氏徒知本仁義以論尊强而不知聖人蓋因禮而及仁義吾故於此𤼵之金華應氏曰義者事物之斷制裁節也區别衆理條分縷析而各有攸當得之者强而舉無以勝之故曰天下之制仁者義理之統宗㑹元也包含萬象圓融和㑹而莫窺其際得之者尊而舉無以上之故曰天下之表强則挺然不屈於物之下猶有物我之對人有畏心焉尊則超然於物之上不見物我之間人有敬心焉故治國不以禮猶無耜而耕也為禮不本於義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也安之以樂而不達於順猶食而弗肥也鄭氏曰無耜而耕則無以入也弗種則嘉禾無由生弗耨則苖不殖草不除弗穫則無以知収之豐荒也弗食則不知味之甘苦也弗肥功不見也孔氏曰人君治人情若無禮猶農夫耕而無耜安之以樂而不達於順謂奏樂而不使達至順之理如人食五味而調和温清不順則雖食不肥也前陳聖人禮耕以至安樂今顯前譬其事相似更譬以人身之肥聖人為教反復相明正在此矣嚴陵方氏曰耜者治田之具禮則治國之具故治國不以禮猶無耜而耕耕所以種禾而生之義所以達禮而行之故為禮不本於義猶耕而弗種也達嘉種而除其害者耨之事明大義以勝其非者學之事故為義而不講之以學猶種而弗耨也耨之勤將以有穫學之勤將以有聚仁言聚也穫言獲也故講之以學而不合之以仁猶耨而弗穫也食有所養而享其利焉樂有所樂而安其仁焉故合之以仁而不安之以樂猶穫而弗食也食之養人期於體之肥而已樂之和人期於理之順而已故安之以樂而不達於順猶食而弗肥也然前言陳義而此變言本者凡種皆所以立本故也前言本仁而此變言合者以人本仁也合而言之道也於順又言達者自上趨下無不達故也馬氏曰上言修禮以耕之至於播樂以安之而於此又言安之以樂而不達於順猶食而弗肥者何也蓋仁者順之體也樂者順之成也上言播樂以安之則順在其中矣猶不足以極其順之至又言安之以樂而不達於順猶食而弗肥也廬陵胡氏曰為禮不本於義猶耕而弗種也不種不生學以植善去惡猶耨也仁亦在夫熟之而已猶食而弗肥者五味調和不順雖食不澤延平周氏曰孔子曰成於樂至於樂則成矣豈有不達於順者哉蔣氏曰因聖人治田之説以求聖人治人之序自禮而求義自義而講學自學而本仁自仁而播樂似有次第而本無間斷若有先後而實無彼此極而至於安之以樂則孟子所謂樂則生生則惡可已也安而不達於順食而不至於肥則寧有是理哉噫聖人為禮以教天下經而三百曲而三千事繁而文至縟意詳而用無不周將使天下之飲食者如入太倉陳陳相因隨取輙得又不惟得食而已冠冕佩玉之盛黼黻文繡之美譬之左殽右胾膾炙酒漿又從而侑之使之充足饜飫而後已此所以由古及今使人相安相養於其中而不知若服田足食之喻其亦本於養人之意與葉氏曰聖人以禮善其國亦惟深察乎人情之變明其大本詳其節目盡此心以達之而已蓋人性本善情之既動則善者或流而為惡若其情以養其善亦或防閑其情以制其不善明其大本焉以立其經詳其節目焉以定其歸夫然後人情治人性明而人道立矣故聖人治人情之意則一其次第而施則有五先之禮以定民志次之義以明民善志定善存大本立矣然不立之學無以講切其非而審其是不本之仁無以封殖其善而一其心由是而終之以樂則優游饜飫咏嘆滛泆仁聲四達而大順致矣五者於治國猶農之於田必耕焉種焉耨焉穫焉不可廢一聖人於此循其本考其序必求以身體之其精神不流思慮不越造端不差収功有藝而吾之禮教始沖融周浹動盪流通窮高測深磅礴於幽明上下之間蓋耕之既深而播之嘉種則在田皆良糓禮之既明又本之以義理則在民皆良心日累月積此周家之民皆一於仁而頌聲起矣行葦之詩是也是故其大義明而教化洽也後世之君豈誠治希三代仁義禮樂可以化民徒慕其美名竊其近似者而施之往往内不盡其心而外求多於民民心未孚則盻盻焉疑其難化而戾已天下之民見其條目事為非其心智所習知耳目所習見亦不肯以其疑貳不信之心從其苟簡不明之教夫吾之心猶未能盡孚於民何以使民悉心委聽於其上吾不意後世之君望其民有不如農夫之望其田也農事方始其視有秋之穫亦有茫昧而不可知者然古之良農器必利種必良耕焉必深耨焉必易終嵗勤動不越其思雖未得収刈之利而此心暁然知其勃焉秀芃焉長穰穰焉而盛瞭然目中若可朝種而暮収者其用力逺者収功可必其心思切者期望不差也昔之聖人豈能必其治之達於大順亦豈能必其無一民或戾乎已然其為民誠切其慮民誠深其修禮陳義皆以惻怛忠厚之心𤼵之故上下交孚情意周浹其閭閻𨼆密坦然無疑於廟堂之上知其為慘怛為忠厚莫敢乖離陵冒以逆其指意所歸者此大順所由致也嗚呼耕而種種而耨耨而穫穫而食食而肥其應有期其感有候其端緒皆有由其源委皆可見也修之身推之國違之天下則天下之肥毎病於難致焉人君能以耕為治以身為天下探端知緒自源徂委無一不盡其心則天下之肥昭昭乎可觀矣明近而忽逺切於身謀而踈於為國天下不復見大順之治可勝歎哉金華應氏曰上既合田事始終而正言之以明成效之大全此復分析而反言之以盡其節目之纎悉也治田之始先墾闢其榛蕪治國之始先開𤼵其荒穢無耜而欲耕何以入土無禮而欲治何以入人秉禮以明分猶秉未以施耜禮舉而國正猶耜舉而田治耜可以入土而深耕禮可以入人而深造故君子之秉禮猶農之秉耜而治不以禮耕不以耜則俱無所執也禮之和遜固易入非以義而植其本則何以昭明品節而培擁其至善之本根義之剛勁固可立非以學而精其講則何以辨析是非而鋤翦其餘惡之枝葉義講於學則精矣而弗能貫通調和之以至大之仁則是猶耨之雖勤而無以斂其成學至於仁則熟矣而不能𤼵越動盪之以至和之樂則是猶穫之徒豐而未能享其食也至於樂則安矣而未能𤼵達之於至順之地則是猶食之雖多而弗能肥於體也四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養生送死事鬼神之常也鄭氏曰常謂皆有禮用無匱乏也車或為居孔氏曰此一節明人及國家天下等皆悉肥盛所以養生送死常事鬼神也膚是革外之薄皮革是膚内之厚皮以徳為車謂用孝弟以自載也以樂為御謂用要道以行之順理廣被無所不在一切生死鬼神無不用順為常也黄氏曰以徳為車者謂天子有四海以道徳如車以乗載天下既論車也將由御焉故謂執御者總六轡可左右遲速於長塗觀樂者察四方可移風易俗於政也横渠張氏曰以徳為車以樂為御以樂驅駕行其徳也樂和也臨川王氏曰徳無所不容以樂章之車無所不載以御行之長樂陳氏曰四體以和順而正然後膚革充充而後盈此人之肥也父子以天性而篤兄弟以同氣而睦夫婦以異姓而和此家之肥也天子徳教加於百姓故以徳為可行之車而以樂為行車之御諸侯制節謹度故以禮相守大夫非法不言非道不行故以法相序士則忠順不失故以信相考庶人則謹身而已故以睦相守此天下之肥也凡此是謂大順大順者非特明足以養生送死而幽足以事鬼神也揚子曰成天下之大利致天下之大順利同天之際而無間則大順者和於天同於人者也自非聖人之存神素至其能與此哉又樂書曰徳者性之端樂者徳之華故古之人安徳以樂而聞樂知徳是徳之與樂未甞不相須而成也蓋一器之成而工聚焉者車也䟽數疾徐而有度數存焉者御也天子之於天下所以安而行之者在徳不在車然非車不足以喻徳所以行而樂之者在樂不在御然非御不足以喻樂車者器也御者人也徳者實也樂者文也車非御不運徳非樂不彰以徳為車則無運而非徳也法何與焉以樂為御則無作而非樂也禮何與焉若夫大夫以法相序諸侯以禮相與其去徳不亦逺乎嚴陵方氏曰四體即四肢也正言各適其安佚之正也父子以慈孝而相厚故曰篤兄弟以友恭而相親故曰睦夫婦以剛柔而相濟故曰和若是則家之肥也大臣法則不倍矣卜臣廉則不竊矣大臣非不廉也以所任者大而廉不足以言之耳小臣非不法也以所守者小不足以撓法故也設官以效職分職以守官相序而不亂故曰官職相守君以禮而使臣臣以忠而事君相正而不阿故曰君臣相正若是則一國之肥也物之運載存乎車故以徳為車車之行存乎御故以樂為御蓋樂以徳為體徳以樂為用無體不立無用不行故也自諸侯而下非無徳也然徳以大為貴唯天子之徳刑于四海乃足以為大非無樂也然樂以備為美唯天子之樂兼於四夷乃足以為備此所以特言天子也諸侯以制節為事而制節存乎禮大夫以循道為事而循道存乎法士以事人為事而事人存乎信百姓以相親為事而相親存乎睦禮惡其離也故言相與法惡其亂也故言相序信欲其有成而已故言相考睦欲其不失而已故言相守若是則天下之肥也夫自一人之微達乎天下之大以勢觀之則殊以理推之則一而已故皆可謂之肥焉茍於理有所逆以之肥一人為不足而况於天下之大乎茍於理有所順以之肥天下為有餘而况於一人之微乎故至於天下之肥乃言是謂大順也山隂陸氏曰孟子曰鄉田同井出入相友守望相助疾病相扶持則百姓親睦所謂以睦相守蓋如此士則又進矣以信相考大夫又進矣以法相序所謂法守在是也諸侯又進矣以禮相與天子則至矣故以徳載焉以樂御之所謂道揆在是也養生送死事鬼神之常夫所謂大順如是而已若天降膏露地出醴泉龜龍麟鳯乃其餘事王氏曰車者致逺之物車能致逺而不能以自致必待御者而後致徳者聖人所用以化民也徳能化民而不能以自化必待樂以彰之焉書曰帝徳廣運廣徳之體運徳之用以言其厚載則足以容民畜衆以言其并包則足以庇下承上以徳為車有如此者鞗革沖沖和鸞雝雝進退也履乎䋲墨旋曲也中乎規矩然後取道致逺車行無不至焉樂之於徳固有類此五色成文八風從律回邪曲直各歸其分唱和清濁迭相為經其徳也豈不恢恢乎有餘地哉是故樂仁之實則仁妙天下而和聲無不入樂義之實則義妙天下而和理無不達剛氣不怒則剛徳之運為沉潛柔氣不懾則柔徳之運為高明其𤼵揚也若驟若馳而奮徳之光其節止也不疾不徐而繩徳之厚鼓舞之神不疾而速均調之治無為而成樂行而民鄉方可以觀徳以樂為御不亦宜乎蔣氏曰此章蓋因上文言樂必達於順猶食必至於肥遂言天下國家肥之理也夫古之人具手足備口體安於豢養之為適充足饜飫而不知止則亦為肥之是欲耳今也膚革充盈必在於四體既正之後决非養其小體而失其大體者百畆之田五畆之宅衣帛食肉之有餘養生䘮死之無憾亦可以為家肥矣今也考其篤厚和睦必在於父子兄弟夫婦之間决非求其富足而棄其禮義者大臣以守法為事小臣以謹廉自持官職相序而不相紊君臣相正而不相諛以此為一國之肥寧有竭民力以自私厲民以自養者天子以徳為車示有運也以樂為御示有執也以禮相與謹邦交也以法相序樂不失職也以信相考明其有諸己而不欺之謂也以睦相守則出入相友守望相助也如此而為天下之肥寧有一物不得其所一民不被其澤者乎夫自人而家自家而國自國而天下均一理也理本一致而物有異情故世之所謂肥者在彼而禮之所謂肥者在此故揭而名之曰大順順天理也逆人欲也一事順則萬事聴一事逆則萬境逆反逆歸順智者其有以知之雖然所謂大臣者以道事君者也一國之肥止言大臣法者何哉蓋諸侯有一國者也彼則惟知奉天子之法而已諸侯在於奉天子之法則諸侯之大臣宜守法以事諸侯而已故曰大臣法春秋列國如晉叔向鄭子産齊管夷吾為當國大臣豈復知此故事大積焉而不苑並行而不繆細行而不失深而通茂而有間連而不相及也動而不相害也此順之至也故明於順然後能守危也鄭氏曰言人皆明於禮無有蓄亂滯合者各得其分理順其職也守危能守自危之道也君子居安如危小人居危如安易曰危者安其位横渠張氏曰大積而不苑此又極文也事大積累亦一一處置有條理於小事亦不失長樂劉氏曰大順矣然後溥天之下率土之濵生者不失乎其養也死者不失乎其禮也亡者不失乎其祀也化起乎一家而周徧於四海有條而莫之可紊也不曰大積焉而不苑哉並行而不繆哉細行而不失哉深而通者言其教之洽而至於化也深以盡乎其性通以正乎其情者也茂而有閒者言其徳茂於躬而用之有尊卑之差親疎之閒也連而不相及者人人各盡其性連乎上下各異其儀不相及也動而不相害者作於禮者必歸於義又何相害之有哉此天下大順之至也故明於順然後能守危者以一人而御四海之衆危也以至仁而御羣暴危也以至柔而乗至剛危也然則何以守之曰辨上下定民志然後危可守易曰履虎尾不咥人亨大順之謂也修禮以達天下之義體信以致萬物之順而已矣延平周氏曰事大積焉而不苑者言其可與酬酢也並行而不繆者言其可與祐神也細行而不失者言其幾足以成務也深而通者言其深足以開物也茂而有閒者言其並育而不相害也連而不相及者言其同以迹異以心也動而不相害者言其動以禮止以義也凡此順之至也故明於此然後能守危也長樂陳氏曰大積而不苑以其能變通以盡利也並行而不繆以其殊塗而同歸也茂而有閒以其雜而不越也連而不相及以其安而有序也動而不相害則順以動所以為豫動以順所以為復巽而動所以為益也其始於不苑而終於不相害豈非乗理順道以致之耶故曰順之至也庖丁之解牛依乎天理因其固然以至郤窽之大肯綮之微莫不恢恢游刃而有餘地以其順之而已故能明於此然後可以守危不言守安而言守危者古人凶其吉之意耳焉氏曰並行而不繆使之兩皆當其理也細者人之所忽細行而不失所以盡其精微也山隂陸氏曰凡積善苑並行善繆細行善失深宜不通茂宜無閒連喜相及動喜相害唯順之至然後異此危若崇高是也危莫危於富貴講義曰能明大順之道雖危而能守之勿失况夫安平康㤗之時乎葉氏曰大順本無體上之施焉者中乎義理之㑹下之應焉者安行乎義理之實感而通動而和則夫事之積而不苑並而不繆細而不失深而通茂而有閒連而不相及動而不相害者皆其順之實而治之形也雖然天下而有治之形也聖人於是始有所甚憂何也天下之治固其禮義綱維之也方天下之事紛錯殽亂有一秉禮立行之君立綱陳紀以綜理之向之紛錯殽亂者固駸駸焉日向乎治矣聖人固無所憂乎此也方内大寧民俗阜康和平舒愉上下妥謐天下之情玩其所樂而昧其慮安於其逸而諱其失聖賢於此眇焉遐觀憂危惕慄動色相戒其講禮益詳其用禮益密其守禮益固凛然若有旦夕之憂乗其後者蓋以安有危機治有亂階治亂持危之道亦惟深察乎理而已何則天下之順非無故而順也禮義日明而順以致也天下之危非無自而危也禮義日昬而尋於危也大順之在天下猶元氣之行乎四體沖乎其益固泊乎其易睽有人焉血氣沖融膚革充盈疑可終其身而無虞然嗜欲蠱之外物干之則脉絡隙元氣病向之沖融者日病充盈者日瘠矣是故兢兢於無病之日者善保其元氣者也今日之世天下之情隨上向背亦奚異血氣周流乎四體者然而夫人一舎禮自肆失其所以綱維之具則同者睽附者攜治者亂順者日隙矣三代之末是也有夏之君聲律身度四海大順後嗣逸豫滅徳河濵為敵國矣夏之元氣自是日衰情之安危之可畏也如此然則山渚之居順之勿敝火水金木飲食之必時合男女頒爵位必當年徳用民必順此亦聖人安危之數節目不可以廢蔣氏曰天下皆知順者一世之美聖人以為不過養生送死事鬼神之常事夫治至於大順聖人御世之極功今不過即常事以言順斯道之功用顧若是淺末而易言哉蓋甞泛觀天下之事莫不有積也積而至苑則苑患所從生事莫不有並也並而不能齊則繆所從起莫不由細也細而不能曲折而中理則瑣碎之失所由萌至若逺而不通於情茂盛而無以為别連則有相及之跡動則有相害之形天地萬物亦安能各安其位而不相奪聖人立夫萬物之表制天下事物之宜故常使之相聚而有以相使相生而有以相成相羣而有以相養相雜而有以相别豈容有一事不中節一物不安其分者此大順之功用固當考之於名位器數之間不當求之於幽深高逺之域當驗之於典則綱常之地不當索之於無聲無形之境故曰明於順然後能守危也傳註推聖人之功以為人明於禮無有蓄亂滯合而各得其分順其職言極有理新安王氏曰此極言大順之理萬幾日來庶事總至其大積者然也以順處之各有其序可以無苑結矣威福並用剛柔迭施其並行者然也以順施之各得其宜可以無錯繆矣一嚬笑之微下之休戚繫焉一好惡之微衆之向背繫焉此其細行者然也以順為之可以無過失矣幽逺謂之深其勢則易隔惟順則其情必通衆多謂之茂其勢則易雜惟順則其分有閒連則易以相干惟順則同而異不相及也動則易以相違惟順則異而同不相害也天下之大順至此極矣惟明於順然後上下相得君臣相安可以守危蓋居高則勢易危守危則可安於民上也金華應氏曰能守自危之道也君子居安如危小人居危如安易曰危者安其位者也順之與危相去逺矣而毎對言之蓋屈伸闔闢同一體逆順安危無二機聖賢之所深懼也深明於順則雖當危疑爭亂之中亦可以守之而弗失何者順之則安逆之則危此至理之所在而人情之所同人皆好危而違安彼其危也不過有以逆之而已吾能因其理而順之則危者亦安矣不然則雖順而易危可不慮哉故禮之不同也不豐也不殺也所以持情而合危也故聖王所以順山者不使居川不使渚者居中原而弗敝也用水火金木飲食必時合男女頒爵位必當年徳用民必順故無水旱昆蟲之災民無凶饑妖孽之疾鄭氏曰豐殺謂天子及士名位不同禮亦異數所以拱持其情合安其危小洲曰渚廣平曰原山者利其禽獸渚者利其魚鹽中原利其五榖使各居其所安不易其利勞敝之也民失其業則窮窮斯濫矣用水謂漁人以時漁為梁春獻鼈蜃秋獻龜魚也用火謂司爟四時變國火以救時疾及季春出火季秋納火也用金謂卝人以時取金玉錫石也用木謂山虞仲冬斬陽木仲夏斬隂木飲食謂食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時合男女頒爵位謂媒氏令男三十而娶女二十而嫁司士稽士任進退其爵祿也用民必順謂不奪農時昆蟲之災螟螽之屬也言大順之時隂陽和也孔氏曰自此至順之實也一節説行順以致太平之事既欲其順居山居川居原隨而安之故各保其業恒豐而不敝困也必當年徳者合男女使當其年頒爵位必當其徳横渠張氏曰持情者持其誠也别嫌明微使相接而不疑此合危之道也持扶時引道之意誠實也扶持誠實必在乎禮凡有可疑不安即危也禮能别嫌明微得以不疑就安是合危也相接即合也昆蟲昆明也明生之蟲謂春生冬死之類有害於物者也山隂陸氏曰情易放而難持危易散而難合持之使不流合之使不散若桑中政散民流而不可止失是矣廬陵胡氏曰持情合危持情使正合危使安長樂陳氏曰禮所以持人之情而使之稱合事之危而使之安也聖王知其禮之稱情安危如此故居川原不易其利不變其俗使之各適其適而弗敝焉此因地之利以順之也用水火金木飲食必時此因天之時以順之也合男女頒爵位以至用民不奪其時此因人之理以順之也夫惟因地之利因天之時因人之理而致順如此故國無災民無疾也嚴陵方氏曰禮所以辨異故曰不同惟其不同故見於形名度數之間者宜殺則不可豐宜豐則不可殺惟其稱而已故曰不豐也不殺也故下文廣言順之迹焉居山居川居渚居原茍易其宜則民勞而至於敝矣故順之使弗敝用水火金未飲食必時者各順其時而用之也書謂之五辰者以此若稻人以瀦畜水而待旱以防止水而待潦此用水之時也五行獨不言土則以飲食見之蓋飲食土所生故也用民必順者順其析因夷隩之事而用之也其順如此故其效至於如下文所云而各以其類應水則伏隂所致旱則亢陽所致昆蟲言螽蝗之屬凡此則主天降言之故曰災凶言嵗之多疫饑言食之不足妖生於所反孽生於不正凡此則主人罹言之故曰疾無災無疾則以隂陽之順故也馬氏曰山川之勢異而高下之習不同原渚之勢殊而水陸之居不一聖人則因其所利而利之順其所居而居之有安於此則不强於彼然聖人之順不止於此而已推其詳則凡居民材必因天地寒煖燥濕皆所以順民也年有高下故合男女必當其年徳有厚薄故頒爵位必當其徳因其高下而合之所以順隂陽之理也因其厚薄而頒之所以明貴賤之等也四民之業不同先王則順之而不易四時之物不一先王則順之而不奪故曰用民必順延平周氏曰不同其所當異不豐其所當殺不殺其所當豐所以持情而使之稱合危而使之安順山者不使居川不使渚者居中原各居其安而不易其利也水火金木相勝之序也不言土者蓋土爰稼穡言飲食則必兼之也合男女必當其徳而以年為主頒爵位必當其年而以徳為主用民必順不奪農時也若父子篤兄弟睦言其人也若事大積而不苑言其道也若山者不使居川言其事也有是人有是道而行是事則其效足以致祥故國無水旱昆蟲之災民無凶饑妖孽之疾臨川王氏曰禮運言水火金木飲食必時何以不及土曰書以水火金木土榖為六府禮運飲食則兼土榖而言也蔣氏曰方天下之人羣焉而居名位未定典則未立聖人御世之道未行於其間相軋相勝亦危甚矣至於禮教既施豐殺有節情慾有制事物有適聖人致順之功已運乎其表則舉一世於太和極治之盛使天下為公而不自知也二典之書足以見聖人治順之功明徳睦族授時作事徽典敷教齊政播榖可遽數而枚舉之極而至於蕩蕩巍巍而莫能名則皆自此而端本所謂大順確則於此金華應氏曰用水不止如註所言若藏冰頒冰止水蕩水之屬皆是也女二十而嫁男三十而娶四十曰强而仕五十曰艾服官政必當其年也問名納采度徳定位必當其徳也故天不愛其道地不愛其寳人不愛其情故天降膏露地出醴泉山出器車河出馬圖鳯凰麒麟皆在郊棷龜龍在宫沼其餘鳥獸之卵胎皆可俯而闚也則是無故先王能修禮以達義體信以達順故此順之實也鄭氏曰言嘉瑞出人情至也膏猶甘也器謂銀罋丹甑也馬圖龍馬負圖而出也棷聚草也沼池也則是無故非有他事使之然也實猶誠也盡也孔氏曰此明天地為至順之主下瑞應也四時和甘露降是不愛其道也五榖豐醴泉生器車出是不愛其寳也人皆盡孝弟是不愛其情也禮緯云其政太平山車垂鉤謂不揉治而自圓曲此器車也中候握河紀云堯時受河圖龍銜赤文綠色註云龍而形象馬故云馬圖又伏羲有天下龍馬負圖出於河遂法之畫八卦又握河紀云鳯凰巢阿閣鳥不畏人作巢在下故可俯闚其巢卵也是無他故由先王能修禮達義體信達順故致此也横渠張氏曰能體順故直至於天不愛其道地不愛其寳天地何甞愛當氣和則自致此祥應達義則須在修禮達順則須當體信今雖義有所分别茍不以禮則不能成義心雖欲順茍不自誠實亦不能達順言體者混然為一體之義也嚴陵方氏曰天為神故以道言地為富故以寳言人有欲故以情言不愛言盡其所以而與之也膏露則露之澤其醲如膏醴泉則泉之味其甘如醴郊棷則在郊之棷也宫沼則在宫之沼也鳥獸之卵胎皆可俯而見則以順之所感而無獝狘之患故也莊子言至徳之世鳥鵲之巢可攀援而窺蓋謂是矣修禮於外所以達義於内體信於人所以達順於天山隂陸氏曰天不愛其道以其道與我地不愛其寳以其寳與我人不愛其情以其情與我凡此豈有私於我哉亦以積累之厚如上所云故也夫所謂順在彼不在此然太平無象若祥瑞者吾以是為證而已故曰此順之實也經於終篇言此以言禮義之運雖愧於道及其至也躋世淳樸亦所以反道此經所以異於老莊之言也新安朱氏曰體信是忠達順是恕體信是無一毫之偽達順是𤼵而皆中節無一物不得其所聰明睿知皆由此出是自誠而明意思體信是真實無妄達順是使萬物各得其所又曰信只是實理順只是和氣體信是致中底意思達順是致和底意思延平周氏曰有禮有義而信以成之三者備然後至於順故其序如此葉氏曰夫精祲之交天人感通之際深矣聖人亦濳察其理而不廢其證應韶成鳯儀石擊獸舞和氣致祥乖氣致異其理有昭然不誣者夫天有常道則地有常理人物有常情天地人物異形同體此心所感流通無間一念之差朕兆至微而飛流彗孛草妖木怪之遽見者非異也人拂其常性則天地萬物之理亦為之變動也此念反正則景星反風應不旋踵矣况聖人本仁義禮樂以致大順之治又能體信以達此順則天地定位民物由道宜乎或示其理或效其珍或盡其情彞則常理昭然具見於兩間也後世人君捨人而言天拂經而嗜異不善其政治以和物化反求物祥以為政治之美本末倒置常理舛矣聖人於禮運一書始有感於大道之行而原禮之所由起中言禮之運轉分别以極於損益變革事為之際其極歸於大順而卒章復以體信達順明其致順之由蓋欲知感天地理民物道在此而不在彼也其㫖深矣蔣氏曰順之為道合乎三才之妙而行乎三才之間者也故聖人所以致治者仰則順乎天俯則順乎地中則順乎人而後致順之道備上文自順山者不使居川以致於用民必順是也夫如是則仰觀俯察安坐而無愧操約御詳高拱而仰成豈復有水旱昆蟲凶饑妖孽之事以累吾極治之世哉固宜叶氣横流嘉瑞并應甘露醴泉器車馬圖所由以出也鳯凰龜龍所由以見也天地萬物山川百神所由以各安其位各效其職也則是無故雖然所以至於無故者豈能遽然哉彼其措天下於無事者未有不由有事始也禮運一篇具載始末建名位設制度養生送死各有其常居處運用各適其制因天時順地利合人情聖人所以有事者也及其至也天不愛其道地不愛其寳人不愛其情聖人所以無事者有事為本無事為效然溯流尋源則惟修禮體信者能之天下之禮未有不根於信而能有行也順天之道治人之情有禮則安無禮則危有禮則生無禮則死信其如是而後能致其如是也夷考此篇信之一辭纔一二見終焉則斷為之説曰修禮以達義體信以達順故此順之實也其㫖甚要禮器亦曰茍無忠信之人則禮不虚道吾儒平居暇日當於一身之間體之而後足以見聖人致順之大禮記集説卷五十八
