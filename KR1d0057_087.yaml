body:
  text: 禮記集説卷八十七宋衛湜撰問國君之子長幼長則曰能從社稷之事矣幼則曰能御未能御問大夫之子長幼長則曰能從樂人之事矣幼則曰能正於樂人未能正於樂人問士之子長幼長則曰能耕矣幼則曰能負薪未能負薪鄭氏曰御謂御事正樂政也周禮大司樂以樂德敎國子中和祗庸孝友以樂語敎國子興道諷誦言語以樂舞敎國子舞雲門大卷大咸大韶大夏大濩大武士禄薄子以農事為業孔氏曰此一節明國君及大夫士之子長幼之稱彼人問君之子長幼長則荅云能從君供社稷之事若幼則曰能御御治也謂己能治事若大幼則曰未能治事此事謂尋常細事大夫之子恒習學於樂長則已能習樂故曰能從樂人之事幼則習樂未成但聽政令於樂人故云己能受政令於樂人若大幼則曰未能受政令於樂人鄭引大司樂證卿大夫子習樂之事曲禮問其父身此問其子記人之意異耳嚴陵方氏曰國君以能保社稷為孝國君之子則從社稷之事而已正於樂人謂從其政也長則能其事幼則從其政而已負薪易於耕田故長則曰能耕幼則曰能負薪未能負薪山隂陸氏曰曲禮記天子之大夫士禮少儀所記諸侯之大夫士禮知然者以冒問國君之子長幼知之也少儀視曲禮降一等以此且曰長則曰能從社稷之事矣幼則曰能御未能御其間容衆子若曲禮所言是以一人之身長幼問荅慶源輔氏曰御謂五御孔子曰吾何執執御乎執射乎吾執御矣謙辭也亦天下謂有無生而貴者也敎之樂所以養其德也而曰能從樂人之事者謙辭也敎所以正之也猶言能受敎於樂人未能受敎於樂人也且示不敢忘敎負薪則貶於耕長樂陳氏曰古之學校樂正崇四術立四敎以造士將出學小樂正簡不帥敎者以告於大樂正是樂正之職主於正國子而敎之者也大夫之子國子之次者也故問大夫之子長幼必以樂荅焉内則曰十三舞勺成童舞象二十舞大夏自成童而上皆長自成童而下皆幼曰能正於樂人以其能舞勺故也未能正於樂人未能舞象故也蓋樂者人之所成終始也始乎樂舞命䕫以樂敎胄子是也終於樂孔子曰成於樂是也曲禮言問大夫之子長曰能御矣幼曰未能御也與此異何邪曰禮樂射御書數無非藝也禮然後樂言樂則禮舉矣射然後御言御則射舉矣人之於六藝闕一不可大夫之子既能禮樂射御則書數蓋亦無不能矣其不言者以人生六年固已敎之名數十年固已學書計故也樂書金華應氏曰曲禮之問乃他人之旁自相問故對之者其辭文此則人問其子於父故對之者其辭卑先儒誤以此之問對為人之問對其辭意皆不適其中且人之對父必譽其子父之言子必成以謙此古今之常情天下之達禮也尚何疑焉然曲禮上焉則問天子之年下焉則問庶人之子而此則不及焉者盖彼亦旁問之辭而此則請問其父天子之前固無與之敵而敢問其子者矣庶人卑賤其自相荅問之辭不足紀也此問諸侯之子亦必鄰國之君執玊執龜筴不趨堂上不趨城上不趨武車不式介者不拜鄭氏曰於重器於近尊於迫狹無容也歩張足曰趨兵車不以容禮下人也車中之拜肅拜嚴陵方氏曰武車以言其道戎車以言其事兵車以言其器革車以言其飾餘説並見曲禮解山隂陸氏曰前曰兵車不式兵車革路也此曰武車不式武車木路也慶源輔氏曰趨蓋所以為容也執重器則加謹近尊者則加恭於迫狹及臨危則自斂故皆不趨非此時則行不可無容也婦人吉事雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜鄭氏曰肅拜拜低頭也手拜手至地也婦人以肅拜為正凶事乃手拜耳為尸為祖姑之尸也士虞禮曰男男尸女女尸為喪主不手拜者為夫與長子當稽顙也其餘亦手拜而已雖或為唯或曰喪為主則不手拜肅拜也孔氏曰此一經論婦人拜儀婦人吉禮不手拜但肅拜肅拜如今婦人拜也吉事及君賜悉然手拜則周禮空首鄭註周禮空首拜頭至手此云手至地不同者此手拜之法先以手至地而頭來至手兩註不同其實一也肅拜是婦人之常而昬禮婦拜扱地以其新來為婦盡禮於舅姑故也左傳穆嬴頓首於宣子之門者有求於宣子非禮之正也下云為喪主則不手拜明不為喪主其餘輕喪凶事則手拜也周禮坐尸嫌婦人或異故記者明之尸坐謂虞祭若平常吉祭共以男子一人為尸祭統云設同几是也婦人為尸或荅拜時但肅拜而不手拜也長樂陳氏曰肅拜俯其手而肅之也婦人與介者之拜也手拜者手至地也士昬禮婦拜扱地是也禮書嚴陵方氏曰肅拜者低頭屈膝以致其肅爾莫重於君賜吉事雖有之亦止於肅拜而已為尸亦拜者以婦人容或荅拜故也慶源輔氏曰言雖有君賜肅拜以見肅拜非簡也自是婦人禮當然凶事變常故手拜為尸坐為喪主不手拜則又變於喪葛絰而麻帶鄭氏曰帶所以自結束也婦人質少變於喪之帶有除而無變孔氏曰此謂婦人既虞卒哭其絰以葛易麻故云葛絰婦人尚質所貴在要帶有除無變終始是麻故云麻帶取俎進俎不坐鄭氏曰以其有足亦柄尺之類孔氏曰取俎謂就俎上取肉進俎謂進肉於俎俎既有足立而進取便故不坐管子書弟子職云進柄尺謂爵豆之屬嚴陵方氏曰俎有足而髙進取必立焉故不坐若書册琴瑟則坐而遷之可也山隂陸氏曰弟子職曰柄尺不跪盖籩豆之屬若俎無柄應坐今卒哭取俎進俎猶立執虚如執盈入虚如有人鄭氏曰重愼上蔡謝氏曰或問敬愼同異曰執虚如執盈入虚如有人愼之至也敬則愼在其中矣敬則外物不能易甚物事换得嚴陵方氏曰曲禮曰執輕如不克執虚如執盈之謂也詩曰相在爾室尚不愧于屋漏入虚如有人之謂也執虚猶如執盈況於有物之器而敢忽乎入虚猶如有人況於有人之室而敢怠乎故孔子執圭如不勝出門如見大賔者此也君子推執器之道以任天下之事雖微小在所不可遺也況萬鈞之重者乎推入室之道以遇天下之事雖幽暗在所不可欺也況十目之視者乎北溪陳氏曰此二句體認持敬工夫意象最親切且如人捧至盈之物心不在焉移歩即傾了惟執之拳拳心常在這上看行到何處也不傾倒雖無人境界此心常嚴肅如對大賔然此便是主一無適之意慶源輔氏曰敬愼有常心不以有外者變也凡祭於室中堂上無跣燕則有之鄭氏曰祭不跣者主敬也燕則有跣為歡也天子諸侯祭有坐尸於堂之禮祭所尊在室燕所尊在堂將燕降説屨乃升堂孔氏曰此一經論堂上有跣無跣之事凡祭謂天子至士悉然也跣説屨也下大夫及士隂陽二厭及燕尸皆於室中上大夫隂厭及祭在室若儐尸則於堂正祭饋食卿大夫士並在室中此則貴賤通天子諸侯則有室有堂朝事延尸於户外是坐尸於堂然非禮之盛節初入室灌及饋孰之時事神大禮故鄭註云祭所尊在室祭禮主敬故凡祭在室中者非唯室中不説屨堂上亦不敢説屨燕則有之者謂堂上有跣也燕禮云賔及卿大夫皆説屨升就席註云凡燕坐必説屨屨賤不在堂也初時在堂行禮立而致敬故曰所尊在堂山隂陸氏曰凡脱屨為坐也立飫坐燕故曰燕則有之而禮不脱屨升堂謂之飫跣脫屨也無韈而跣謂之徒跣未嘗不食新鄭氏曰嘗謂薦新物於寢廟孔氏曰人子不忍前食新也嚴陵方氏曰秋祭曰嘗以物新成而可嘗故也未嘗則親未嘗新矣孝子其忍食之乎月令每言先薦寢廟者以此然新物不待秋而有此止以嘗言者以物成於秋故也月令特於孟秋言嘗新者以此左氏言不食新乃謂麥為新麥以夏為秋故也慶源輔氏曰一飲食不敢忘父母未嘗而遽食新焉則是死其親而喪其心矣僕於君子君子升下則授綏始乗則式君子下行然後還立鄭氏曰還車而立以俟其去孔氏曰此一經論僕御之禮必授人綏故君子升及下僕者皆授綏也僕者始乗若子未至御者則式以待君子升也僕人之禮若君子將升則僕先升君子下行則僕後下更還車而立待君子去後乃敢自安或云君車將駕則僕執䇿立於馬前故君子將下車則僕亦下車立於馬前待君子下行乃更還車立以俟君去嚴陵方氏曰曲禮言凡僕人之禮必授人綏式之以致敬也還立猶言復立也山隂陸氏曰言僕自始乗則式至君子下車然後己還立其處正言君子乗者君子之器也即負且乗何足以當之乗貳車則式佐車則否貳車者諸侯七乗上大夫五乗下大夫三乗鄭氏曰貳車佐車皆副車也朝祀之副曰貳戎獵之副曰佐魯莊公九年敗於乾時公喪戎路傳乗而歸七乗五乗三乗此盖殷制也周禮貳車公九乗侯伯七乗子男五乗及卿大夫各如其命之數孔氏曰乗貳車佐車僕乗副車法也朝祀尚敬乗副車者式戎獵尚武乗副車者不式也戎獵自相對則戎車之副曰倅田車之副曰佐故周禮戎僕馭倅車田僕馭佐車嚴陵方氏曰貳車道車之副也如世子之貳其父有故乃攝而代之故謂之貳佐車者田車之副也如衆臣之佐其君以佐為事故謂之佐道車即象路也以朝夕燕出入而謂之燕車王朝夕燕出入無非道路也田車即木路也道車以道之所在故乗其貳則式以為儀田車則事之所在故乗其佐則否路車先王以之祭天玉藻亦言不式者蓋祭天以内心為尊儀有所不足進也山隂陸氏曰周官所謂凡諸侯之卿其禮各下其君二等然則下文大夫三乗子男之卿金華應氏曰案此與周禮未甚差似非異代之制當時記禮者所見多諸侯禮故所言止及於此若上公禮亦自是等而上之耳有貳車者之乗馬服車不齒觀君子之衣服服劒乗馬弗賈鄭氏曰服車所乗車不齒尊有爵者之物廣敬也弗賈平尊者之物非敬也孔氏曰此一節明廣敬之義有貳車則謂下大夫其所乗之馬所服之車不敢齒次論其年歳評其價數高下車有新舊則年數有多少價數有貴賤觀視也不輕平尊者物堪直多少之價嚴陵方氏曰乗馬者所乗之馬也車馬皆服而乗之此亦互言之也道車之副謂之貳大夫乗墨車而已乃有貳車者盖别言之則道車之副謂之貳田車之副謂之佐合而言之凡朝祀之車其副皆謂之貳戎獵之車其副皆謂之佐故檀弓言魯莊公之戰而曰佐車授綏也弗賈者弗計其直之貴賤也上因言貳車故止及車馬而不及衣服下言乗馬則車之弗賈可知其言互備耳大夫以上有貳車然後謂之君子貳車以位言之也君子以德言之也上言貳車則斥大夫以上而已下言君子則凡於有德者皆若是也慶源輔氏曰齒與齒君之路馬之齒同衣服舉其總服劒佩之大者乗馬物之盛者微細之物有不必戒其以乗壺酒束脩一犬賜人若獻人則陳酒執脩以將命亦曰乗壺酒束脩一犬其以鼎肉則執以將命其禽加於一雙則執一雙以將命委其餘鄭氏曰陳重者執輕者便也乗壺四壺也酒謂清也糟也不言陳犬或無脩者牽犬以致命也於卑者曰賜於尊者曰獻鼎肉謂牲體已解可升於鼎也加猶多也孔氏曰自此至辟刃一節廣明以物獻遺人之法四馬曰乗乗酒亦然束脩十脡脯也酒脯及犬皆可為禮陳列也陳列於門外亦曰乗壺酒束脩一犬者謂將命之時辭也雖陳酒犬而單執脯致命其辭亦猶曰有酒脯犬也無脯而有酒肉則亦陳酒而執肉以將命若以禽獸賜人加於一雙謂或十或百雙則唯執一雙將命其餘委陳於門外長樂劉氏曰此已下皆述將命者之禮必有所執以致命所以提其綱領俾知所獻之大數也慶源輔氏曰乗壺酒束脩一犬此例以多物獻人者其以鼎肉此例以一物獻人者不必須有酒也加於一雙此例以一物獻人物多不盡執者犬則執緤守犬田犬則授擯者既受乃問犬名牛則執紖馬則執靮皆右之臣則左之鄭氏曰緤紖靮皆所以繋制之者守犬田犬問名畜養者當呼之名謂若韓盧宋鵲之屬右之者執之冝由便也臣謂囚俘異於衆物孔氏曰緤牽犬繩也犬有三種一曰守犬守禦宅舎二曰田犬田獵所用三曰食犬充君子庖廚庶羞用田犬守犬有名主人擯者既受之乃問犬名食犬無名戰國䇿云韓盧者天下之壯犬也桓譚新論云夫畜生賤也然其尤善者皆見記識故犬道韓盧宋㹱皆右之謂以右手牽之此謂田犬守犬畜養馴善無可防禦若充食之犬則左手牽之右手防禦曲禮云效犬者左牽之是也臣謂征伐所獲民虜或起惡慮左手操其右袂右手當制之曲禮獻民虜者操右袂是也慶元輔氏曰馬亦有名不問之者從犬可知矣犬馬有名則牛亦可知既受乃問則未受不問也君子於人畜必致其辨如此義也車則説綏執以將命甲若有以前之則執以將命無以前之則袒櫜奉胄器則執盖弓則以左手屈韣執拊劒則啓櫝盖襲之加夫襓與劒焉鄭氏曰甲鎧也有以前之謂他摯幣也櫜弢鎧衣也胄兠鍪也袒其衣出兠鍪以致命器則執盖謂有表裏也韣弓衣也櫝謂劒函也襲卻合之夫襓劒衣也加劒於衣上夫或謂煩皆𤼵聲孔氏曰曲禮云獻車馬者執䇿綏故知陳車馬而説綏執以將命獻鎧若復有他物與鎧同獻則陳鎧而執他物輕者以將命也袒開也若唯獻甲無他物則開甲櫜出胄奉之將命曲禮云獻甲者執胄是也器凡器若獻則陳底執盖以將命盖輕便也拊弓把也弓則左手屈弓衣并於把而執之右手執簫以將命曲禮云右手執簫左手承拊是也啓櫝啓開也獻劒則先開函盖劒函之盖也開函而以盖卻合於函下底謂仰盖於函底之下加函底於上重合之故云襲加夫襓與劒焉者又加劒衣函中而以劒置衣上也慶源輔氏曰綏乗車所執也甲若有以前之者此又例有前之者袒櫜則甲可見器則執蓋者蓋輕又在器之上屈韣屈卷之也笏書脩苞苴弓茵席枕几穎杖琴瑟戈有刃者櫝筴籥其執之皆尚左手刀卻刃授穎削授拊凡有刺刃者以授人則辟刃鄭氏曰苞苴謂編束萑葦以裹魚肉也茵著蓐也穎警枕也筴蓍也籥如笛三孔皆十六物也左手執上上陽也右手執下下隂也卻刃授穎削授拊辟用時穎鐶也拊謂把以刺刃授人則辟刃不以正郷人也孔氏曰笏也書也脩脯也苞苴也弓也茵也席也枕也几也穎也杖也琴也瑟也戈有刃者櫝也謂戈之有刃以櫝韜之筴也籥也執此諸物皆左手在上而執之右手在下而承之若授人以刃卻仰其刃授之以刃鐶穎是穎發之義刃之在手禾之秀穗枕之警動皆謂之為穎其事雖異大意同也案既夕禮葦苞長三尺内則云炮取豚編萑以苴之是裹魚及肉亦兼容他物禹貢云厥包橘柚茵謂以物所著之蓐言有著謂之茵故既夕禮云茵著用荼荼謂茅秀用荼以著茵也嚴陵方氏曰卻其刃恐傷人也禾首為穎此言穎亦刀頭耳刀以柄為首也前經所謂澤劒首莊子所謂吹劒首皆柄慶源輔氏曰辟當音避此總辭也上授穎授削皆此意至於無穎與拊則授時辟刃不以嚮人耳方氏謂穎為刀以優刀柄之末或有環削授拊無環者也乗兵車出先刃入後刃軍尚左卒尚右鄭氏曰入後刃不以刃嚮國也軍尚左左陽也陽主生將軍有廟勝之䇿左將軍為上貴不敗績卒尚右右隂也隂主殺卒之行伍以右為上示有死志孔氏曰此一節論兵車出入及將士所處之宜軍將行伍尊尚左方士卒行伍貴尚於右嚴陵方氏曰軍以謀為主而好生故尚左卒以戰為事而敢死故尚右慶源輔氏曰軍衆而卒寡軍尊而卒卑異其所尚所以致别也賔客主恭祭祀主敬喪事主哀㑹同主詡軍旅思險隠情以虞鄭氏曰恭在貌也而敬又在心詡謂敏而有勇若齊國佐也險險阻出竒覆諼之處也𨼆意也思也虞度也當思念己情之所能以度彼之將然否也孔氏曰成二年左傳齊晉戰于鞌齊國佐陳辭以拒晉師是敏而有勇也鄭註覆諼之處者解經中險字險是地形險阻諼詐也地形既險得出竒謀覆詐也𨼆情謂以意思念彼情豫測度前敵知其所欲為事長樂劉氏曰恭敬哀詡同出於一心也而用之以應物各有所冝焉致其誠於應接迎勞曰恭故賔客待之以誠禮焉致其誠於心志言貌曰敬故祭祀待之以饗神焉致其誠於悲傷憂念曰哀故喪事待之以竭忠焉致其誠於煦育生成曰詡故㑹同待之以立極焉詡煦也經云德𤼵揚煦萬物人若法天地作㑹同以建極而生成萬物之德在焉慶源輔氏曰交際以禮相示故以容貌之恭為主祭祀以誠感格故以内心之敬為主内外無二致敬無二理行軍之道以臨事而懼好謀而成為上思險謂臨事而懼慮敗不慮勝也𨼆情以虞謂好謀而成且兵事露則不神也燕侍食於君子則先飯而後己毋放飯毋流歠小飯而亟之數噍毋為口容客自徹辭焉則止鄭氏曰先飯而後己所以勸也亟疾也備噦噎若見問也口容弄口孔氏曰此一節明侍食之法先君子之飯若嘗食然君子食罷而後己若勸食然小飯謂小口而飯備噦噎亟謂疾速而咽備見問也數噍謂數數嚼之無得弄口以為容食訖客欲自徹其俎主人辭其徹俎客則止而不徹客爵居左其飲居右介爵酢爵僎爵皆居右鄭氏曰客爵謂主人所酬賔之爵也以優賔耳賔不舉奠於薦東介爵酢爵僎爵皆飲爵也介賔之輔也酢所以酢主人也古文禮僎作遵遵謂鄉人為卿大夫來觀禮者酢或為作僎或為馴孔氏曰此一節明客爵所在鄉飲酒禮主人酬賔之爵賔受奠觶於薦東是客爵居左也旅酬之時一人舉觶於賔賔奠觶於薦西至旅酬賔取薦西之觶以酬主人是其飲居右也主人獻介介飲獻賔賔酢主人主人飲主人獻僎僎飲是三爵皆飲爵也此三人既不被優故爵並居右案鄉飲酒三爵皆不明奠置之所故記者於此明之羞濡魚者進尾冬右腴夏右鰭祭膴鄭氏曰進尾擗之由後鯁肉易離也乾魚進首擗之由前理易析也冬右腴氣在下腴腹下也夏右鰭氣在上鰭脊也膴大臠謂刳魚腹也膴讀如冔孔氏曰此一節明進魚之禮濡濕也冬時陽氣下在魚腹夏時陽氣上在魚脊凡陽氣所在之處肥美故進魚使嚮右以右手取之便也此謂尋常燕食所進魚禮非祭祀及饗食正禮也祭膴者此處肥美故食魚則刳取以祭先也長樂陳氏曰魚之在俎或縮或横或右首或左首或進首或進尾或進鰭或進腴或右鰭則右首左首者於俎為縮於人為横進首進尾者於俎為横於人為縮公食大夫魚縮俎寢右進鰭士喪卒塗之奠左首進鰭士虞亦進鰭少牢右首進腴蓋鰭者體之所在腴者氣之所聚禮雖貴右人之飲食貴體鬼神之祭貴氣也公食與少牢皆右首而喪禮左首反吉故也少牢進腴公食進鰭而喪奠與虞進鰭未異於生故也儀禮大夫士祭皆薧魚周禮獻人凡祭祀共其魚之鱻薨曲禮曰槀魚曰商祭鮮魚曰脡祭少儀曰羞濡魚者進尾先儒謂天子諸侯之禮備薨濡其説是也魚之為物冬則潛而趨陽乎下故腴美夏則躍而趨陽乎上故鰭美冬右腴夏右鰭此又所尚在時與公食大夫少牢之所進者異矣山隂陸氏曰凡食魚進首唯羞濡魚者進尾嫌軟媚無骨鯁冬右腴夏右鰭冬則在下夏則在上祭膴瓜祭小取上魚祭大取下李氏曰冬右腴夏右鰭者以陽之所在也祭祀之牲則皆薦右以陽之所在也魚隂物也故尚其陽牲陽物也故尚其隂凡齊執之以右居之於左鄭氏曰齊謂食羮醬飲有齊和者也居於左手之上右手執而正之由便也孔氏曰此一經明齊和之冝凡齊者謂以鹽梅齊和之法執此鹽梅以右手居之於左者居處羮食於左手以右手所執鹽梅調和正之於事便也山隂陸氏曰五齊加於明水居之於左祖天地之左海也贊幣自左詔辭自右鄭氏曰自由也謂為君授幣為君出命也立者尊右孔氏曰此一經論贊幣贊辭之異贊助也謂為君授幣之時由君左詔辭謂為君傳辭與人則由君之右嚴陵方氏曰助之以言則曰詔助之以事則曰贊分而言之事亦可謂之詔大宰詔其廢置是也言亦可謂之贊大宰贊王命是也山隂陸氏曰贊幣若聘禮擯者進相幣是詔辭若賔降辭幣公降一等辭是酌尸之僕如君之僕其在車則左執轡右受爵祭左右軌范乃飲鄭氏曰如君之僕當其為尸則尊也周禮大御祭兩軹祭軌乃飲軌與軹於車同謂轊頭也軓與范聲同謂軾前也孔氏曰此一節明為尸之僕祖道祭軷之冝尸之僕為尸御車之僕將欲祭軷酌酒與尸之僕今為軷祭如酌酒與君之僕也其在車謂僕在車中時也僕既主尸車故於車執轡受爵尸位在左僕立在右故左執轡右受爵祭酒也君僕亦然軌謂轂末范謂式前僕既受爵將飲則祭之於車左右軌及前范所以祭者為其神助己不使傾危也祭徧乃自飲此云范周禮大馭云軌兩事是一聲同字異但式前之軓車旁著凡或作範字轂末之軌則車旁著九此經左右軌是也車轍亦謂之軌亦車旁著九嚴陵方氏曰當其為尸則弗臣酌尸之僕如君之僕豈為過哉蓋僕正王服位以詔贊擯相前驅為職祭祀則贊牲事既祭則王使馭酌焉明與之並受福也王乗則有馬以轡為之御王行則有車以軹為之節王馮則有式以軌為之前大馭言及祭酌僕僕左軌轡右祭兩軌乃飲則亦歸賴於神之意其言正與此合然彼作兩軹此作左右軌兩即左右也軹即軌也彼作軌此范荀子曰形范正則範通作范軓亦通作范可知凡車轂末謂之車亦謂之軓此言左右軓即轂末之軌考工記言經涂九軌即車轍之軌轂末謂之軹輢之衡者亦謂之軹大馭言兩軹即轂末之軹也考工記言參分軹圍即輢衡之軹也李氏曰左右兩轂末也軓范轂也左右乃祭於旁軓乃祭於中也祭至此者先王之於物凡有功於己者未嘗不致其誠與敬也凡為祭必受神之福者禮也故僕祭乃飲慶源輔氏曰言酌尸之僕如君之僕尊庸敬也斯須之敬如之而已軓轂末所謂轍也范則軾前老蘓曰輪輻蓋軫皆有職乎車而軾獨若無所為者雖然去軾則吾未見其完車也天下之車莫不由轍而言車之功者轍不與焉雖然車弊馬仆而患亦不及轍此其所以獨祭之歟凡羞有俎者則於俎内祭君子不食圂腴小子走而不趨舉爵則坐祭立飲凡洗必盥牛羊之肺離而不提心凡羞有湇者不以齊為君子擇葱薤則絶其本末羞首者進喙祭耳鄭氏曰於俎内祭者俎於人為横不得祭於間也周禮圂作豢謂犬豕之屬食米穀者也腴有似於人穢小子弟子也卑不得與賔介俱備禮容也凡洗必盥謂先盥乃洗爵先自絜也盥有不洗也牛羊之肺離而不提心者提猶絶也􅩿離之不絶中央少者使易絶以祭耳齊和也絶其本末為有萎乾耳出見也孔氏曰自此至則坐一節廣明祭俎及羞膳之事若羞在豆則祭於豆間若羞在俎則於俎内而祭俎内近人之處俎在人前横設故不得祭於俎外及兩俎間腴豬犬腸也豬犬亦食米穀其腸與人相似故君子辟其腴故鼎闕一也小子但給役使故冝驅走不得趨翔為容趨徐趨也小子若得酒舉爵時則先以坐祭祭竟而立飲之盥盥手也洗爵必先洗手也祭肺之法􅩿離之不絶心心謂肺中央少許耳提猶絶也凡羞有湇湇汁也羞有汁則有鹽梅齊和若食者更調和之則嫌薄主人味故不以齊也葱薤根不浄末萎乾故擇者必絶其二處本根也羞首謂膳羞有牲頭者則進口以嚮尊者尊者若祭先取牲耳祭之也嚴陵方氏曰凡飲食之祭皆於器外唯俎不然以横於前而便於内祭也凡鳥獸之口皆曰喙尊者以酌者之左為上尊尊壺者面其鼻飲酒者禨者醮者有折俎不坐未歩爵不嘗羞鄭氏曰尊者設尊者也酌者鄉尊其左則右尊也鼻在面中言鄉人也折俎尊徹之乃坐也已沐飲曰禨酌始冠曰醮歩行也孔氏曰此一節論設尊及折俎行爵嘗羞之儀人君陳尊在東楹之西於南北列之設尊之人在尊西嚮東以右為上則尊以南為上也酌謂酌酒人也酌人在尊東西面以左為上亦上南也二人俱以南為上故云以酌者之左為上尊也尊與壺悉有面面有鼻鼻冝嚮於尊者故言面其鼻飲酒者則下文禨者醮者是也總以飲酒目之折俎者折骨體於俎也禨醮者若有折俎為尊禨醮小事為卑故不得坐也折俎所以為尊者折俎則殽饌尊故冠禮庶子冠於房户之前而冠者受醮不敢坐及禨者並不敢坐也案鄉飲酒燕禮有折俎者皆不坐獨云禨者醮者不坐者以禨者醮者無酒俎之時則得坐嫌有折俎亦坐故特明之羞殽羞也殽羞本為酒設若爵未行而先嘗羞是貪食矣此謂無筭爵之時羞庶羞行爵之後始嘗之若正羞脯醢折俎未飲酒之前則嘗之故鄉飲酒鄉射燕禮大射獻後乃薦賔皆先祭脯醢嚌肺乃飲卒爵案庾氏曰燕禮司宫尊于東楹之西兩方壺左𤣥酒南上註玉藻云唯君面尊𤣥酒在南順君之面也下云公席阼階上西郷下又云執幂者升自西階立於尊南北面東上案左𤣥酒南上之言是設尊者東郷酌者西鄉設者之右則酌者之左也嚴陵方氏曰設尊者必面其鼻示專恵也玉藻云唯君面尊是也謂之鼻者以當前如人之鼻故也若玉人大璋駔琮皆有鼻亦此意盖聖人之制器近取諸身而尚其象故也以至劒有首壺有頸箕有舌鼎有足量有耳皆以是而已禨見玉藻解醮見郊特牲解俎者折骨於俎也取之則辨貴賤雖王之燕饗亦不過此小子不敢當備禮故不坐也凡燕饗以酒為主以食為配所以未歩爵不嘗羞新安朱氏曰設尊之法鄉飲酒云𤣥酒在西鄉射云在𤣥酒西鄭注云設尊者北面西曰左即此所謂尊者以酌者之左為上尊者盖言設尊之人方其設時即預度酌酒人之左尊而實以𤣥酒也若據燕禮則設尊者西面而左𤣥酒南上公乃即位於阼階上則酌者不得背公自當東面以酌而上尊乃在其右矣故此經所云以為為鄉飲鄉射而言則可以為為燕禮而言則正與之反今鄭注既不分明庾孔又皆引燕禮而反謂酌者西面其辟戾甚矣唯賈氏疏儀禮以為據君面以左為尊者得之牛與羊魚之腥聶而切之為膾麋鹿為菹野豕為軒皆聶而不切麕為辟雞兔為宛脾皆聶而切之切葱若薤實之醯以柔之鄭氏曰此軒辟雞宛脾皆菹類也其作之狀以醯與葷菜淹之殺肉及腥氣也孔氏曰此一節明膾及韲菹麤細之異聶而切之者先䐑為大臠而復細切之為膾也麋鹿為菹己下已於内則具釋之嚴陵方氏曰菹酢菜也醢人所謂菁菹茅菹是矣彼以菜為之此以麋鹿為之者特制造之法如之而已膳夫通謂之醬者以此聶而不切則大聶而切之則小山隂陸氏曰論語曰膾不厭細内則腥言肉而已此言魚内則菹言魚此言麋鹿亦相備也麋無角以有角者名之兔無脾以有脾者名之豕俯而已以能仰者名之其有折俎者取祭反之不坐燔亦如之尸則坐鄭氏曰亦為柄尺之類燔炙也郷射曰賔奠爵於薦西興取肺坐絶祭左手嚌之興加於俎坐帨手是也尸尊也少牢饋食禮曰尸左執爵右兼取肺肝擩于俎鹽振祭嚌之加于菹豆孔氏曰此一節明祭俎之儀折俎折骨於俎俎既有足柄尺之類故立而就俎取所祭肺升席坐祭祭訖反此所祭之物加之於俎皆立而為之故云取祭反之不坐唯祭時坐耳燔謂燔肉雖非折骨其肉在俎其取及祭反時亦不坐故云如之此皆謂賔客若為尸尸尊雖折俎取祭反之皆坐也鄉射禮云興則立也鄭引少牢饋食禮證尸坐之義山隂陸氏曰此一節宜承小子走而不趨舉爵則坐祭立飲脫亂在是凡卑者燕不坐故曰其有折俎者取祭反之不坐據燕有折俎衣服在躬而不知其名為罔鄭氏曰罔猶罔罔無知貌孔氏曰衣服文章所以表人之德亦勸人慕德若著之而不識知其名義者則是罔罔無知之人也横渠張氏曰古之人直以衣服為事禮云衣服在躬不知其名為罔然今之人固能名其衣曰襖曰衫然不知襖之與衫何以得其名如此則亦是未知其名嚴陵方氏曰書云予欲觀古人之象汝明此其大者也山隂陸氏曰衣者對裳之稱服者對御之禮盖在上曰衣在下曰裳在人曰物在物曰御别而言之其義如此合而言之凡所衣者皆曰衣凡所服者皆曰服若所謂䙝衣則不必在上者矣若所謂矢服則不必在人者也有在物者亦可謂之衣若弓衣是也有在上者亦可謂之服若首服是也此言衣服在躬則上至冠冕下及裳履皆得以兼之李氏曰先王之制衣服莫非性命之理故冠圜冠者知天時履方屨者知地形佩玦者事至而能斷先王之製衣服豈徒然乎夫衣服者未嘗去者也身者至近者也以未嘗去之衣服被乎至近之身而有所未知故曰罔罔者神不明也慶源輔氏曰切身者不知猶為罔況在内者乎其未有燭而有後至者則以在者告道瞽亦然凡飲酒為獻主者執燭抱燋客作而辭然後以授人執燭不讓不辭不歌鄭氏曰以在者告為其不見意欲知之也師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯是也凡飲酒主人親執燭敬賔示不倦也言獻主容君使宰夫也未爇曰燋為宵言也不讓不辭不歌以燭繼晝禮殺孔氏曰此一節明有燭無燭之儀為主人法也在者謂己在於坐者也若日已闇而坐中未有燭有人後至則主人以在坐中者而告之云某人在此某人在此道瞽亦如無燭時也獻主主人也凡飲酒主人自獻賔若尊卑不敵則使宰夫為主人以獻賔故云獻主夜闇故執燭燋謂未爇之炬旣欲留客又取未然之炬抱之也作起也客自起辭主人從辭而止乃以燭授執事之人也執燭夜時也禮賔主有讓及更相辭謝又各歌詩相顯德今旣夜莫所以殺此三事山隂陸氏曰其未有燭而有後至者則以在者告道瞽亦然此一節宜承執燭不讓不辭不歌脫亂在是慶源輔氏曰如是而後盡不然則茍矣所貴乎人者如是而已故曰唯君子為能通天下之志以燭繼晝出於主人之意則可故必親為之若使人疑有不得已者不讓不辭不歌禮殺矣禮之殺則亂之所由生此田完之所以不敢也金華應氏曰執燭抱燋賤役也為獻主者以身親之其敬客而自下之者不嫌其為勞也執已然之燭而又抱未爇之燋其愛客而欲留之者尤有加而無己也席之内獻酬交錯或讓或辭或歌皆不容廢惟執燭之人不暇為此洗盥執食飲者勿氣有問焉則辟咡而對鄭氏曰示不敢歆臭也口旁曰咡孔氏曰洗謂與尊長洗足也盥謂與尊長洗手也及執尊者飲食之時尊者有事問己己則辟口而對不使口氣及尊者山隂陸氏曰洗盥所謂凡洗必盥是也洗爵及執食飲茍有氣焉人或穢之氣猶不得其謦欬言語可知循咡循之也辟咡辟之也嚴陵方氏曰勿氣則屏氣也凡以致恭而已辟咡説見曲禮為人祭曰致福為己祭而致膳於君子曰膳祔練曰告凡膳告於君子主人展之以授使者於阼階之南南面再拜稽首送反命主人又再拜稽首其禮大牢則以牛左肩臂臑折九个少牢則以羊左肩七个犆豕則以豕左肩五个鄭氏曰曰致福曰膳曰告此皆致祭祀之餘於若子也攝主言致福申其辭自祭言膳謙也祔練言告不敢以為福膳也主人展之展省具也折斷分之也皆用左者右以祭也羊豕不言臂臑因牛序之可知孔氏曰此一節明致福及膳於君子及所膳牲體之數為人祭謂攝祭而致飲胙於君子其將命之辭謂致彼祭祀之福於君子也若己自祭而致膳於君子則不敢云福而言致膳膳善也致其善味耳若已祔祥而致胙又不敢云福膳但云告言以祭胙告君子使知已祔祥而已故顔回之喪饋孔子祥肉是也凡初遣膳告君子之時主人自省視飲食多少備具於阼階南稽首拜送使者反亦在阼階南南面再拜稽首受命曲禮云使者反必下堂而受命是也其禮以下明所膳禮數若得太牢祭者則用牛膳周人牲體尚右右邊已祭所以獻左也周貴肩故用左肩九个者取肩自上斷折之至蹄為九段以獻之也臂臑謂肩脚也禮得少牢者則膳羊左肩折為七个大牢少牢並用上牲不并備饌故大牢唯牛少牢唯羊也若祭唯特豕亦用豕左肩為五段也嚴陵方氏曰膳夫所謂凡祭祀之致福也受而膳之是矣必謂之福以言祭者獲福致其餘於人而與之同其福也曰致膳者蓋祭祀不祈為已而祭非敢徼福以其味之善乃致之於君子爾於致膳曰君子則致福又可知矣至於練祔特告死者之已祔生者之已練而已故直以告稱之展與展墓之展同主人展之省其善否也其授使者與反命皆再拜稽首則敬之至也止言膳告而不及致福則致福者尤致其敬不嫌其不如是矣臂則脛也臑其節也山隂陸氏曰祔練凶事也難以福言又難以善言旁言之而已故曰告凡告以善干旄是也凡膳告於君子言告則自此以下皆謂祔練故牲皆用左胖慶源輔氏曰君子者有德者之稱誠者物之終始不誠無物以祭之餘獻遺人故加敬也國家靡敝則車不雕幾甲不組縢食器不刻鏤君子不履絲屨馬不常秣鄭氏曰靡敝賦稅亟也雕畫也幾附纒為沂鄂也組縢以組飾之及紟帶也詩云公徒三萬貝胄朱綅亦鎧飾也孔氏曰此一節明國家靡敝減省之禮君造作侈靡賦税煩急則物凋敝或以靡為糜謂財物糜散凋弊車不雕畫漆飾以為沂鄂甲不用組以為飾及紟帶紟帶謂以組連甲及為甲帶鄭以紟帶解經縢字縢約也引詩魯頌閟宫文貝胄謂以貝飾胄朱綅綴之也絲屨謂絇繶純之屬不以絲飾之山隂陸氏曰言國家靡敝則所乗所衛所養所履所御皆貶嚴陵方氏曰幾微也雕刻以微為工組猶纓之用組縢猶籩之有縢皆所以約而緘之因以為車飾食器若木者為刻金者為鏤馬食穀曰秣五事必以車馬為始終者蓋車馬在禮為重故年不順成則大夫不得造車馬禮記集説卷八十七
