body:
  text: 禮記集説卷八十宋衛湜撰山節藻棁復廟重檐刮楹達鄉反坫出尊崇坫康圭䟽屏天子之廟飾也鄭氏曰山節刻欂盧為山也藻棁畫侏儒柱為藻文也復廟重屋也重檐重承壁材也刮刮摩也鄉牖屬謂夾户䆫也每室八䆫為四達反坫反爵之坫也出尊當尊南也唯兩君為好既獻反爵於其上禮君尊于兩楹之間崇髙也康讀為亢龍之亢又為髙坫亢所受圭奠于上焉屏謂之樹今桴思也刻之為雲氣蠱獸如今闕上為之矣孔氏曰此一經論魯大廟之飾鄭註欂盧今之斗栱也侏儒柱梁上短柱也重檐者就外檐下壁復安板檐以辟風雨之灑壁故鄭云重承壁材也刮楹者楹柱也以密石摩柱達鄉者謂牖户通達詩云塞向墐戸故知郷為䆫牖也反坫者兩君相見反爵之坫也築土為之在兩楹間近南人君飲酒既獻反爵於坫上故謂之反坫出尊者尊在兩楹間坫在尊南故云出尊崇坫康圭者亢舉也為高坫受賔之圭舉於其上也䟽屏者䟽刻也屏謂之樹天子外屏人臣至屏俯伏思念其事桴思小樓也城隅闕上皆有之然則屏上亦為屋以覆屏牆故鄭云桴思也此皆天子廟飾反坫亦在廟故合言廟飾也馬氏曰天子之廟飾不止於此此舉其略爾天子用其詳而魯用其略也嚴陵方氏曰刻節為山取其有鎮而已飾棁以藻取其有文而已復廟復猶傳所謂複道之複坫奠圭與爵之器也反坫者爵坫也崇坫者圭坫也凡器仰之為正覆之為反反坫所以覆爵也故爵坫謂之反崇坫所以薦圭也故圭坫謂之崇反坫亦可以崇爵矣獨於圭曰崇者措圭之時無反覆之異故也出尊者爵坫在尊之外也凡物在内為入在外為出故在尊外則曰出康圭者圭以坫而康也凡物措之則康故以措圭曰康圭此皆天子之禮故臧文仲山節藻棁管仲反坫塞門君子以為僭焉長樂陳氏曰廟所以事死復有歸根而靜之義刮其楹則有潔意而潔也者齊戒以事鬼神之義也達其郷則有明意而明者神而明之之意也於屏言䟽䟽者通之也屏所以蔽而通之者以神無方而無乎不在故通之也金華應氏曰復廟重檐深嚴邃宻於内以為神人祭祀居處之所即詩之所謂寢廟奕奕是也前殿曰廟後殿曰寢總而名之則皆曰廟盖内雖宗廟外具朝廷之體故天子受覲於此納聘於此諸侯聽朔於此聘享於此焉楶峙而仰承欲其安靜故刻以山鎮之象而亦有草木蒙茸之狀棁細而俯倨欲其粲爛故繪以藻荇之文而亦有水勢流動之狀非嚴宻靜深則不足以安神靈故復廟以邃其藏而重檐則又以避風雨也非絢麗赫奕則不足以昭物采故刮楹以華其飾而達郷又所以通日月也稠複重固幽而神之也開通洞達顯而明之也山隂陸氏曰天子之桷斵之礱之加密石焉刮楹其一隅也大廟旅楹徘徊皆有柱達鄉若今偷柱使前達也反坫反爵之坫崇坫崇矣康圭使圭安焉出尊使尊見焉尊爵之所從也康讀如字坫崇則嫌或不安故謂之康䟽為䟽於其上慶源輔氏曰反坫出尊言其所在崇坫康圭言其所用互備也鸞車有虞氏之路也鉤車夏后氏之路也大路殷路也乗路周路也鄭氏曰鸞有鸞和也鉤有曲輿者也大路木路也乗路玉路也漢祭天乗殷之輅今謂之桑根車春秋傳曰大路素鸞或為欒也孔氏曰此一經明魯有四代車其制各别路即車也鉤曲也輿則車牀曲輿謂曲前䦨也虞質未有鉤矣案桓二年左氏云大路越席越席是祀天之席則大路亦祭天之車祭天尚質故鄭云素也長樂陳氏曰鸞在衡和在式鸞鳴則和應唱和於自然故虞氏之車以之鉤者曲也致曲以趨時者人之道故禹之車以之大路繁纓一就周官謂之木路木則質而其制略殷之道略於周故車以之乗路繁纓之就十有二周官謂之玉路玉為陽之精而其制文文之盛莫過於周故車以之嚴陵方氏曰鸞車車之有鈴者必曰鸞取其聲之美也若鸞刀謂之鸞亦以是而已鉤車取其形之曲鉤籩謂之鉤亦以是而已車之有鸞自虞氏始也車之有鉤自夏后氏始也以其尚素而於道為大故曰大路若大圭謂之大亦以是而已以其最貴而尊者所乗故曰乗路若乗馬謂之乗亦以是而已周尚文故其路名之以乗而飾以玉然於鸞於鉤曰車於大於乗曰路何也曰車則上下之所通曰路則尊者之所獨以其上下之所通故或以鸞車為遣車焉冢人言鸞車象人是己或以鉤車為兵車焉司馬法言鉤車先正是己以其尊者之所獨故大路乗路殷周乗之以祀而已郊特牲言乗素車貴其質是殷以大路祀明矣巾車言玉路錫樊纓以祀是周以乗路祀明矣夫路以大言之也人君大物者故所居則曰路寢所乗則曰路車也山隂陸氏曰詩曰鸞聲鏘鏘又曰鉤膺鏤錫則車皆有鸞馬皆有鉤鸞車言和鉤車言正大路言道乗路言徳慶源輔氏曰虞夏言車殷周言路各據時代所稱言之意者殷周始稱車為路耳自魯言之故下皆曰路也新安王氏曰路即車也舜時始有鸞和故其路謂之鸞車夏始鉤車大路木路也殷人以此為重故謂之殷路周天子乗玉路封同姓則有金路封異姓則有象路魯之乗路盖金路也玉路非魯所敢僭故郊禮反用殷之大路鄭以乗路為玉路非也有虞氏之旂夏后氏之綏殷之大白周之大赤鄭氏曰四者旌旗之屬也綏當為緌讀如冠蕤之蕤有虞氏當言緌夏后氏當言旂此盖錯誤也緌謂注旄牛尾於杠首所謂大麾書云武王左杖黄鉞右秉白旄以麾周禮王建大旂以賔建大赤以朝建大白以即戎建大麾以田也孔氏曰此一經論魯有四代旌旗有虞氏之緌但注旄竿首未有旒縿夏后氏之旂漸文既注旄竿首又有旒縿大白謂白色旗大赤謂赤色旗大白大赤各隨代之色無所畫也鄭引周禮巾車職文必知綏為大麾者彼大麾上有大白大赤此經夏后氏之綏下有大白大赤故知綏當大麾也金華應氏曰子華子曰舜建大常則車服之等辨於下旂常之數備於上至舜而已詳世本云奚仲為車正建旟旐辨等級則車旗之制至夏而寖詳然舜車惟有鸞和而已夏則鉤之而曲商復反之於質至周飾之以玉而益文矣舜惟建旂常耳至夏則復綏之以羽旄綏者旒之係於繩而華者也商復以素為飾周赫之以大赤而又加明矣長樂陳氏曰旂之制始於舜而已此有虞氏所以謂之旂也至於夏則致飾矣故曰綏白西方之色西主殺而屬乎義十一征而無敵於天下自湯始故殷之旂以之赤南方之色南者離之位文明之象也故周之旂以之嚴陵方氏曰旂飾以龍以象春綏飾以黒以象冬大白以象秋大赤以象夏綏即巾車所謂大麾是矣大麾色黒而質且旂即所謂交龍為旂者是也大白即雜帛之物也大赤即通帛之旜也唯麾不在九旗之數故特以綏名之山隂陸氏曰車旂言四代馬言三代尊言四代其爵其彛其勺言三代簋爼言四代豆言三代祭言四代其旌其酒言三代韍言四代學言四代官言四代重者舉四亦言之法若樂言伊耆氏之土鼓女媧之笙簧與四代之樂矣其鼓其簨虡舉三代可也夏后氏駱馬黒鬛殷人白馬黒首周人黄馬蕃鬛夏后氏牲尚黒殷白牡周騂剛鄭氏曰順正色也白馬黒鬛曰駱殷黒首為純白凶也騂剛赤色孔氏曰此一經明魯有三代之馬及牲色不同夏尚黒故用黒鬛駱白黒相間也殷尚白頭黒而鬛白從所尚也然類三代俱以鬛為所尚也蕃赤也周尚赤用黄近赤也剛壯也騂言剛則白亦剛白言牡黒亦牡也故殷告天云敢用𤣥牡從天色也嚴陵方氏曰馬以毛物為主而鬛又毛之長者故三代之馬皆以鬛言之剛公羊氏作犅盖牛也牡言其質也剛言其性也言二代如此則夏后氏尚黒其亦用牡可知故書言湯用𤣥牡而釋者以為未變夏祀也郊特牲言牲孕弗食祭帝弗用周景王時雄雞自斷其尾憚其犧雞且用牡而况牛乎盖陽貴隂賤不得不然也山隂陸氏曰據此魯雖兼用四代服器等物皆有所殺也駱馬黒鬛即視乗驪白馬黒首即視乗翰黄馬蕃鬛即視乗騵然則駱馬黒鬛夏后氏猶以為黒白馬黒首殷人猶以為白黄馬蕃鬛周人猶以為赤盖君子不以下妨上小妨大如此白牡言牡而已周然後稱剛殷白牡周騂剛不言尚尚不疑也慶源輔氏曰殷周獨於此稱人者以言馬故也周言剛夏殷亦剛也殷言牡則夏亦牡也夏言尚則殷周亦尚也泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也鄭氏曰泰用瓦著著地無足孔氏曰此一經明魯用四代尊或用三代或用四代隨其禮存者而用之耳考工記云有虞氏尚陶故知泰用瓦罍猶雲雷也畫為山雲之形也著無足而底著地故謂為著然殷尊無足則泰罍犧並有足也犧象畫沙羽及象骨飾尊也然殷名著周名犧象而禮器云君西酌犧象亦是周禮也嚴陵方氏曰泰司尊彞謂大古之瓦尊盖彼名其質此名其義故也山罍即山尊也禮器亦謂之罍尊非謂諸臣所酢之罍也以山罍為尊因謂之罍尊亦猶以壺為尊因謂之壺尊也著讀如附著之著下無所承著地而已殷質故其尊從簡如此飾以犧則曰犧尊飾以象則曰象尊無飾為質有飾為文周尚文故其尊有飾如此爵夏后氏以琖殷以斚周以爵鄭氏曰斚畫禾稼也詩曰洗爵奠斚孔氏曰此一經明魯有三代爵並以爵為形故并標名於其上琖以玉飾之殷亦爵形而畫為禾稼斚稼也周爵或以玉為之或飾之以玉長樂陳氏曰考之爾雅鍾之小者謂之棧晉元興中剡縣民井中得鍾長三寸口徑四寸銘曰棧則棧卑而淺矣夏爵命之以琖盖其制若棧然也祭統尸酢夫人執柄夫人受尸執足柄其尾也有足而尾命之以爵盖其制若雀然也琖象棧爵象雀而斚有耳焉則三者之制可知矣明堂位言玉琖周禮言玉爵春秋傳言瓘斚則三者之飾可知矣詩曰洗爵奠斚周禮鬱人大祭祀與量人受舉斚之卒爵而飲之琖斚先王之器也唯魯與二王之後得用焉諸侯用之則僭矣故記曰琖斚及尸君非禮也禮書嚴陵方氏曰斚殷尊名也而爵亦名之者以爵有從尊之義故因以名焉殷質故也若行葦所謂尊斚者爵也司尊彞所謂斚彞者尊也爵則為爵之形以承之周尚文故也夏殷未承以爵而亦通謂之爵者自周始然爾若所謂一升曰爵夏則一升曰琖殷則一升曰斚也不然則由周以前止有爵之名由周以後又有爵之形也山隂陸氏曰琖以齊言斚以鬯言爵以酒言知然者盎齊亦或謂之棧酒鬯尊一名斚彞知之也灌尊夏后氏以雞夷殷以斚周以黄目其勺夏后氏以龍勺殷以䟽勺周以蒲勺鄭氏曰夷讀為彞周禮春祠夏禴祼用雞彞鳥彞秋嘗冬烝祼用斚彞黄彞龍龍頭也䟽通刻其頭蒲合蒲如鳬頭也孔氏曰此一經明魯有三代灌尊及所用之勺彞法也與餘尊為法故稱彛雞彞者或刻木為雞形而畫雞於彞斚畫為禾稼黄目以黄金為目鄭引周禮以下司尊彞之文雞彞盛明水鳥彞盛鬱鬯斚彞黄彞義亦然龍勺勺為龍頭䟽謂刻鏤通刻勺頭蒲謂刻勺為鳬頭其口微開如蒲草本合其末微開也長樂陳氏曰尊之為言尊也彞之為言常也尊用以獻上及於天地彞用以祼施於宗廟而已故尊於祭器獨名尊彞於常器均名彞籍談曰有勲而不廢撫之以彞器臧武仲曰大伐小取其所得以作彞器則彞之為常可知矣尊亦謂之彞彞亦謂之尊故黄目彞也記曰鬱氣之上尊雞斚皆彞也明堂位曰灌尊然彞之為器不特飾以雞鳥黄目虎蜼之象而已凡邦國之約劑書於此司約大約劑書於宗彝是也凡臣之有功銘於此祭統勤大命施於烝彝鼎是也盖臣之有功祭於大烝故勤大命者施於烝彞鼎則三時之彞不預也又曰雞者司晨之始則隂盛而陽微祼所以求諸隂故夏后氏以之若夫司尊彞以春言之者春則所謂時之首焉者也龍勺龍陽中之隂也淵潛而為仁以澤萬物故夏以之殷以䟽者亦前䟽屏之意蒲之為物柔而順有懐柔百神之意禮書嚴陵方氏曰灌尊所以實祼鬯之尊也夷以對險夷者道之常險者道之變故孟子引烝民之詩變彞為夷者以此勺用以酌酒者䟽與䟽布之䟽同而與䟽屏之䟽異盖䟽而通之無他飾焉山隂陸氏曰六彞雞東方也鳥南方也虎西方也蜼北方也黄彞斚彞中央也鄭氏謂斚畫禾稼龍勺為龍頭蒲勺為鳬頭䟽勺為雉頭經曰雉曰䟽趾龍勺以能施為義䟽勺以能不滛為義蒲勺以能不溺為義土鼓蕢桴葦籥伊耆氏之樂也拊搏玉磬揩擊大琴大瑟中琴小瑟四代之樂器也鄭氏曰蕢當為凷籥如笛三孔伊耆氏古天子有天下之號也今有姓伊耆氏者拊搏以葦為之充之以穅形如小鼓揩擊謂柷敔皆所以節樂者也四代虞夏殷周也孔氏曰此一經明魯用古代之樂及四代樂器土鼔謂築土為鼔蕢桴以土塊為桴葦籥謂􅎒葦為籥説者以伊耆氏為神農嚴陵方氏曰古者以土為鼓未有韗革之聲故也蕢桴者以凷為桴未有斲木之利故也葦籥者以葦為籥未有截竹之精故也拊搏揩擊言所以作器也或言其器或言作樂互相備也與益稷言戞擊鳴球搏拊琴瑟以詠同義玉磬琴瑟又皆堂上之樂故特舉其名器言之琴言中而不言小瑟言小而不言中亦互相備也山隂陸氏曰伊耆氏之樂如是而已故曰伊耆氏之樂也據四代之樂器也樂舉逺古器舉近世樂性情也與生俱生者也器形而已據垂之和鍾叔之離磬女媧之笙簧崇鼎貫鼎大璜封父龜天子之器也中琴言琴小瑟言瑟略之也書言戛擊鳴球搏拊琴瑟記言拊搏玉磬揩擊大琴大瑟中琴小瑟者盖搏拊治亂以相是也治亂在下堯舜之事治亂在上殷周之事球璞也磬器也琴瑟器也大小形也堯舜言璞殷周言器堯舜言器殷周言形又書言搏拊言戞擊記言拊搏言揩擊搏取聲深拊取聲淺戞取聲深揩取聲淺亦堯舜殷周之辨也且言玉磬等物總舉四代與他物異則以樂統同禮辨異故也長樂陳氏曰中央為土以土為鼓則中聲具焉以蕢為桴則中聲發焉以葦為籥則中聲通焉籥之為器如笛而三孔通中聲故也古之作樂自伊耆氏始而蜡祭之禮亦始於此故周官有伊耆氏之職而以下士為之則伊耆氏非古有天下者之號也特古之本始禮樂者而已樂記曰金石絲竹樂之器也荀卿曰金石絲竹所以道樂也盖先王本道以制器因器以導樂凡為樂器數度齊量雖本於鍾律要皆文以五聲播以八音然則四代之樂器雖損益不同其能外乎八物哉虞書述舜樂曰戞擊鳴球搏拊琴瑟以詠是樂器成於有虞氏備於三代也琴瑟之器士君子常御焉所以導心者也故用大琴必以大瑟配之用中琴必以小瑟配之然後大者不陵細者不抑聲應相保而為和矣自拊搏至琴瑟皆堂上樂也自土鼓至葦籥皆堂下樂也魯之用樂推而上之極於伊耆氏推而下之及於四代則文質具矣施之周公之廟固足以報功施之魯國亦難乎免於僭矣樂書魯公之廟文世室也武公之廟武世室也鄭氏曰此二廟象周有文王武王之廟也世室者不毁之名也魯公伯禽也武公伯禽之𤣥孫也名敖孔氏曰此一經明魯有二廟不毁象周之文武二祧也魯公伯禽有文徳世世不毁其室故云文世室武公有武徳其廟不毁故云武世室案成六年立武宫公羊左氏並譏之不宜立也又武公之廟立在武公卒後其廟不毁在成公之時此記所云美成王褒崇魯國而已作記之人因成王襃魯遂盛美魯家之事因武公其廟不毁遂連文美之非實辭也慶源輔氏曰由是觀之則成王之所以賜伯禽者未必如是之備如此篇所載亦有魯君因仍而僭用之者矣新安王氏曰此言尤不可信周公為魯太祖而開國實係魯公其廟不毁固有此理然可援文王為比也若夫武公乃伯禽𤣥孫春秋之初毁廟復立季氏為之也且季氏立已毁之廟者有二煬公之廟毁而復立煬公以弟繼兄者也武公之廟毁而復立武公舍長立少者也二者皆季氏有不臣之心春秋書立武宫立煬宫以罪季氏鄭不考其故乃曰世室者不毁之廟夫昭穆遞遷則毁武公之廟禮也世室既逺毁而復立非禮也而比之於武之世室亦甚乖春秋之旨矣米廪有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也鄭氏曰庠序亦學也庠之言詳也於以考禮詳事也魯謂之米廪虞帝上孝今藏粢盛之委焉序次序王事也瞽宗樂師瞽矇之所宗也古者有道徳者使教焉死則以為樂祖於此祭之頖之言班也於以班政教也孔氏曰此一經明魯得立四代之學魯之米廪是有虞氏之庠魯以虞庠為廪以藏粢盛鄭註古者至樂祖大司樂文於此祭之者謂於此瞽宗祭之大司樂云祭於瞽宗是也横渠張氏曰四代學名多不同要之皆是學可解則解之不可解何必强為飬老尊賢之地也瞽宗云善聽教歌於此則瞽盖太師之官也後世樂正雖未必瞽其學則不害亦謂之瞽宗也嚴陵方氏曰米廪者藏飬人之物而庠以善養人期於充實也序也者射也射有偶然而以序進焉必曰序則主以禮教故也瞽宗者瞽人之所宗而樂祖在焉必曰瞽宗則主以樂教故也頖宫者天子曰辟廱諸侯曰頖宫辟言辟以禮廱言廱以樂頖宫雖半辟廱之制亦兼禮樂以敎之故也有虞氏以善飬人而未及乎禮夏后氏及乎禮而未及乎樂殷人及乎樂而禮樂未能兼備兼備之者在乎周而已此周所以為文之盛歟然孟子言殷為序而此以夏為序言周為庠而此以虞為庠者盖以其飬人於此則皆可謂之庠以其習射於此則皆可謂之序其實一也崇鼎貫鼎大璜封父龜天子之器也越棘大弓天子之戎器也鄭氏曰崇貫封父皆國名文王伐崇古者伐國遷其重器以分同姓大璜夏后氏之璜春秋傳曰分魯公以夏后氏之璜越國名也棘㦸也春秋傳曰子都拔棘孔氏曰定四年左傳夏后氏之璜封父之繁弱封父與夏后氏相對故知國名子都拔棘隠十一年左傳文證棘為㦸嚴陵方氏曰凡此即周官天府所藏大寶鎮寳之類是也王氏曰大寶鎮寶皆寶器也非以道勝滛不能伐而俘之非以徳服天下不能受其獻也故為之先者以能得其傳為榮為之後者以能守其傳為善是皆天子之事左氏曰周公相王室以尹天下於周為睦分魯公以大路大旂夏后氏之璜封父之繁弱繁弱則大弓也則魯得有天子之器固明矣凡五兵之用逺則弓矢者射之近則矛者句之句之矣然後殳者擊之㦸者刺之弓為五兵之始㦸為五兵之終此言棘與弓則五兵之用略具故戎器必以是為言焉山隂陸氏曰以周賜我為夸故曰天子之器也其言天子之禮之祭之政之廟飾之戎器以其為夸一也大璜封父龜傳所謂夏后氏之璜封父之繁弱是也盖此龜一繁弱豈以善中名之與大弓武王之弓也周公受賜藏之魯公羊曰璋判白弓繡質龜青純慶源輔氏曰諸侯之國皆有分器不獨魯有之而曰天子之器也夸辭也夏后氏之鼓足殷楹鼓周縣鼓垂之和鍾叔之離磬女媧之笙簧鄭氏曰足謂四足也楹謂之柱貫中上出也縣縣之簨虡也殷頌曰寘我鼗鼓周頌曰應朄縣鼓垂堯之共工也女媧三皇承宓犧者叔未聞也和離謂次序其聲縣也笙簧笙中之簧也孔氏曰鄭引殷頌那之篇證殷楹鼓引周頌有瞽之篇證周縣鼓垂之所作調和之鍾叔之所作編離之磬女媧所作笙中之簧三者先代之樂魯皆有之案舜典垂作共工鄭不見古文故曰堯時帝王世紀云女媧氏風姓承包犧制度始作笙簧鄭註和離謂次序其聲縣聲解和也縣解離也言縣磬之時其聲希䟽相離嚴陵方氏曰楹以貫中縣則在上獨足為在下故特謂之鼓足焉與司服言弁則曰弁服屨人言屨則曰服屨同義郊特牲曰以鍾次之以和居參之也故謂之和鍾樂記曰石聲磬磬以立辨辨者離之音也故謂之離磬山隂陸氏曰不言足鼓而曰鼓足言足固宜在下也和鍾編鍾也離磬特磬也長樂陳氏曰足不若楹之髙楹不若虡之垂亦其後世之加隆耳又樂書曰正北之坎為革則鼓為冬至之音而冒之以啓蟄之日其聲象雷其形象天其於樂象君故鼓柷鼓敔鼓瑟鼓琴鼓鍾鼓簧鼓缶皆謂之鼓以聲非鼓不和故也學記曰鼓無當於五聲五聲弗得不和此其意歟盖鼓制自伊耆氏始夏后氏加四足謂之足鼓商人貫之以柱謂之楹鼓周人縣而擊之謂之縣鼓春秋之時楚伯棼射王鼓跗豈夏后氏遺制歟周官大僕建路鼓大寢之門外儀禮大射建鼓在阼階西南鼓則其所建楹也是楹鼓為一楹而四稜焉貫鼓於其端猶四植之桓圭也莊子曰負建鼓建鼓可負則以楹貫而置可知商頌曰置我鼗鼓是也周官鼓人晉鼓鼓金奏鎛師掌金奏之鼓所謂縣鼓也禮曰縣鼓在西應鼓在東詩曰應朄縣鼓則縣鼓周人新造之器始作而合乎祖者也以應鼓為和終之樂則縣鼓其唱始之樂歟鍾之為樂過則聲滛中則聲和垂之和鍾和聲之鍾非滛聲之鍾也磬之為樂編之則雜離之則特叔之離磬特縣之磬非編縣之磬也和鍾始於垂或謂之鼓延景為之或謂營援為之離磬始於叔或謂古毋句氏為之或謂伶倫為之豈皆有所傳聞然邪古者造笙以匏為母列管匏中施簧管端宫管在中道達隂陽之沖氣象物之植而生故有長短焉太蔟之音也盖其制法鳳凰以象其鳴大者十九簧而以巢名之以其衆管在匏有鳳巢之象也小者十三簧而以和名之以其大者唱則小者和也大射禮三笙一和而成聲是已詩曰吹笙鼔簧則笙簧笙中之簧也笙簧始於女媧氏而世本謂隋為之豈隋因而循之者歟詩曰並坐鼓簧又曰左執簧傳曰鼓振虡之簧則簧又非笙中之簧也簧之為物非特施於笙又施於竽笙簧十三或十九水火合數也竽簧三十六水數也夏后氏之龍簨虡殷之崇牙周之璧翣鄭氏曰簨虡所以懸鍾磬也横曰簨飾之以鱗屬植曰虡飾之以臝屬羽屬簨以大版為之謂之業殷又於龍上刻畫之為重牙以挂縣紘也周又畫繒為翣戴以璧垂五采羽於其下樹於簨之角上飾彌多也周頌曰設業設虡崇牙樹羽孔氏曰此一經明魯有三代樂縣之飾案考工記筍飾以鱗此經并云虡者盖夏時筍虡之上皆飾以鱗至周乃别故云龍簨虡殷則於簨之上刻畫木為崇牙之形以挂鍾磬也詩周頌云設業設虡業虡相對故鄭知業則簨也其實簨上更加大版刻崇牙謂之業故詩大雅云虡業惟樅是也翣扇也言周畫繒為扇戴小璧於扇之上嚴陵方氏曰其崇如牙夏后氏有簨虡而未有崇牙商有崇牙而未有璧翣至周然後三者兼備焉此皆漸致其文也長樂陳氏曰樂出於虚而寓於器本於情而見於文寓於器則器異異虡見於文則文同同筍鍾虡飾以臝屬磬虡飾以羽屬器異異虡故也鍾磬之筍皆飾以鱗屬其文若竹筍然文同同筍故也筍則横之設以崇牙則其形髙以峻虡則植之設以業則其形直以舉是筍之上有崇牙崇牙之上有業業之兩端又有璧翣鄭氏謂戴璧垂羽是也盖筍虡所以縣鍾磬崇牙璧翣所以飾筍虡夏后氏飾以龍而無崇牙殷飾以崇牙而無璧翣至周則極文而三者具矣設業設虡崇牙樹羽是也樂書有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋鄭氏曰皆黍稷器制之異同未聞孔氏曰簋是黍稷之器敦與瑚璉共簠簋連文故鄭云皆黍稷器鄭註周禮舍人云方曰簠圓曰簋此註云未聞者瑚璉之器與簋異同未聞爾鄭註論語云夏曰瑚殷曰璉誤也長樂陳氏曰敦者飬人之厚也璉者飬人而不絶者也瑚以玉為之玉者美而有充實之意飬人以為充實者瑚之用也簋以竹為之竹者和而有節意飬人所以能節者簋之用也食所以飬隂自其數而觀之則以兩以四以六以八豈非隂數而愈備於前歟嚴陵方氏曰兩敦若内則所謂敦周官所謂玉敦是矣四璉六瑚即孔子謂子貢為女器者是矣釋者以為宗廟之器焉八簋即伐木所謂八簋是矣皆黍稷之器也故每用隂數之偶則與籩豆同義曰敦曰璉曰瑚曰簋則所命之名不同也或兩或四或六或八則漸増其數也山隂陸氏曰敦亦簋也盖設以對故謂之敦兩謂之對則四謂之璉可知瑚言盖盖之而不可知也簋言底軌所同也同而後受之字或作匭以此兩敦黍稷四璉黍稷稻粱六瑚黍稷稻粱麥苽苽一名彫胡盖以其器名之八簋黍稷稻粱白黍黄粱稰穛俎有虞氏以梡夏后氏以嶡殷以椇周以房俎夏后氏以楬豆殷玉豆周獻豆鄭氏曰梡斷木為四足而已嶡之言蹷也謂中足為横距之象周禮謂之距椇之言枳椇也謂曲橈之也房謂足下跗也上下兩間有似於堂房魯頌曰籩豆大房楬無異物之飾也獻疏刻之孔氏曰虞氏質未有餘飾故鄭知梡有四足而已蹷謂足横辟不正鄭註嶡之言蹷謂嶡足間有横似有横蹷之象也周則謂此俎之横者為距椇枳之樹其枝多曲橈殷俎似之周爼頭各有兩足足下各别為跗足間横者似堂之壁横下二跗似堂之東西頭各有房但古制難識不可悉知獻音娑娑是希䟽之義故謂䟽刻之嚴陵方氏曰梡者斷木為足無餘飾也茍完而已嶡者於足間加横木焉植為立横為嶡故也椇者既有横木又為曲橈之形則於是為具故也此皆漸致其備也楬豆未有他飾以木為柄若蜡氏之楬而已玉豆則於楬之上又飾之以玉也獻若周官所謂再獻之獻再獻對朝踐言之則朝踐為初獻矣醢人所謂朝踐之豆者初獻也所謂饋食之豆者再獻也此言獻豆則主祭祀之豆耳以祭祀之豆為䟽刻之形則燕享之豆不䟽刻矣司尊彞所謂獻尊義亦類此是皆漸増其飾也山隂陸氏曰椇所謂全烝是也爾雅曰木豆謂之豆竹豆謂之籩瓦豆謂之登豆言首竹言籩縢瓦言足祭統曰夫人薦豆執校執醴授之執鐙鐙固足也長樂陳氏曰殷之横距與夏同而曲其足與三代異周之下跗與三代異而直其足與虞夏同詩言大房傳言房烝此房俎也少牢禮言俎距此横距也其髙下修廣無文舊圖謂髙二尺四寸廣尺四寸不可考莊周曰加肩􅥑於雕俎之上唐禇遂良曰禹雕其俎士喪禮有素俎盖雕俎始於禹而後世用之於吉凶者文質於是異矣殷又曰椇椇之枝屈而不能伸故殷爼其形如椇故名之房者堂之偏者也周俎之足上下兩間其形象之故曰房俎楬豆楬者木之屬也以木為之則無異飾楬以言其制玉以言其飾獻以言其用禮書有虞氏服韍夏后氏山殷火周龍章鄭氏曰韍冕服之韠也舜始作之以尊祭服禹湯至周増以畫文後王彌飾也山取其仁可仰也火取其明也龍取其變化也天子備焉諸侯火而下卿大夫山士韎韋而已韍或作黻孔氏曰此一經論魯有四代韍制虞氏直以韋為韍未有異飾故服韍夏后氏畫之以山殷増以火周人加龍以為文章易困卦九二朱紱方來利用享祀故鄭知紱為祭服案士冠禮士韎韐是士無飾推此即尊者飾多此有四等天子至士亦四等故知卿大夫加山諸侯加火天子加龍嚴陵方氏曰有山有火而又加之以龍則其文成矣於周特言章焉章者文之成也有虞氏祭首夏后氏祭心殷祭肝周祭肺鄭氏曰氣主盛也長樂陳氏曰祭以右手凡祭必於脯醢之豆間特公食大夫有司徹祭於上豆之間以豆數多故也祭之尚肺周禮而已若有虞氏則祭首夏后氏則祭心殷則祭肝以時異則禮異也周之尚肺特宗廟賔客飲食之間而已若五祀則户先脾中霤先心門先肝以事異則禮異也士冠有嚌肺而鄉飲鄉射燕禮之類皆有離肺而無祭肺昏禮有離肺又有祭肺鬼神隂陽之意也特牲饋食先祭肺後祭肝祝亦祭肺後祭肝則祭肺非不祭肝也以肺為主爾由是推之夏殷非不祭肺也以心與肝為主而已禮書嚴陵方氏曰有虞氏祭首尚用氣故也氣雖有隂陽之異要之以陽為主爾首者氣之陽也至於三代則各祭其所勝者焉盖夏尚黒為勝赤故祭心心於色為赤故也殷尚白為勝青故祭肝肝於色為青故也周尚赤為勝白故祭肺肺於色為白故也必各祭其所勝者明非有所勝則不能王天下不能王天下則無以致孝於宗廟矣山隂陸氏曰氏旁出也有虞氏稱氏言堯之旁出堯猶在也夏后氏稱氏言舜之旁出舜猶在也自此以上稱氏以此殷稱人無夏矣周稱人無殷矣此篇言殷周如此夏后氏尚明水殷尚醴周尚酒鄭氏曰此皆其時之用耳言尚非孔氏曰夏后氏尚質故用水殷人稍文故用醴周人轉文故用酒案儀禮設尊尚𤣥酒是周亦尚明水也禮運云澄酒在下則周不尚酒故鄭知經言尚非也嚴陵方氏曰明水者隂鑒取於月得之於天者也醴則漸致其味成之以人者也然猶未厚僅足以為禮而已酒則味成而可薦焉厚之至也有虞氏官五十夏后氏官百殷二百周三百鄭氏曰周之六卿其屬各六十則周三百六十官也此云三百者記時冬官亡矣昏義曰天子立六官三公九卿二十七大夫八十一元士凡百二十盖謂夏時也以夏周推前後之差有虞氏官宜六十夏后氏宜百二十殷宜二百四十不得如此記孔氏曰此經明魯兼有四代之官魯是諸侯案太宰職諸侯唯有三卿五大夫故公羊傳司徒司空之下各有二小卿司馬之下一小卿是三卿五大夫也今魯雖被襃崇何得備四代之官與三百六十職盖成王襃崇於魯使魯雜存四代官職名號非謂魯備其數也記者盛美於魯因舉四代官之本數言之鄭引昏義證夏官百二十夏倍於虞殷倍於夏殷官既多周不可倍之故但加殷百二十嚴陵方氏曰書言唐虞稽古建官惟百夏商官倍而與此不同何也書之所言者據其號記之所言者據其人盖官有差等而分職不可以無辨職有煩簡而用才或得以相兼故官之號常多而官之人常少故曰官不必備惟其人盖謂此也以虞氏之官其實五十則夏殷亦其實數而已夏倍虞之五十而百殷倍夏之百而二百是乃所謂夏商官倍也周三百六十此止言三百亦以其實數而已先儒遂以冬官之亡為言豈其然乎天官言太宰卿小宰中大夫則天子之官得以相兼矣書言周公為師則三公之職也又言周公位冢宰則六卿之職也豈非相兼者乎王氏謂三公之官率以六卿之有道者兼之無其人則不置是矣盖魯用四代之禮樂惟得通用其名不必盡用其數若禘禮有山罍而無大尊夷樂用東南而闕西北皆此意也山隂陸氏曰有虞氏官百而言五十夏后氏官二百而言百以著積隆有漸魯乃今得兼用之非實數也與魯頌同義慶源輔氏曰魯百里之國決不能盡備四代之官此皆夸辭也以此例上所言可知也有虞氏之綏夏后氏之綢練殷之崇牙周之璧翣鄭氏曰綏亦旌旗之緌也夏綢其杠以練為之旒殷又刻繒為崇牙以飾其側亦飾彌多也湯以武受命恒以牙為飾也此旌旗及翣皆喪𦵏之飾周禮大喪葬巾車執盖從車持旌御僕持翣旌從遣車翣夾柩路左右前後天子八翣皆戴璧垂羽諸侯六翣皆戴圭大夫四翣士二翣皆戴緌孔子之喪公西赤為志亦用此焉爾雅説旌旗曰素錦綢杠纁白縿素升龍於縿練旒九孔氏曰此一經明魯有四代喪葬旌旗之飾夏既綢杠以練又以練為旒殷刻繒為崇牙之形以飾旌旗之側前經云簨虡既以崇牙為飾此旌旗又飾以崇牙故鄭云恒也周亦武取天下殷既以崇牙為飾周尚文更取他物飾之不用牙也周以物為翣翣上戴之以璧陳之以鄣柩車前文崇牙璧翣是飾筍虡此與夏后綢練連文故知喪葬之飾鄭引周禮證葬有旌旗及翣之義天子八翣禮器文諸侯六翣以下並喪大記文嚴陵方氏曰崇牙與樂之所設其名雖同其用則異公西赤志孔子之喪曰飾棺牆置翣設披周也設崇殷也綢練設旐夏也正謂是矣長樂陳氏曰喪禮旌旗之飾亦有崇牙棺牆之飾亦有璧翣與筍虡同者為欲使勿之有惡耳凡四代之服器官魯兼用之是故魯王禮也天下傳之久矣君臣未嘗相弑也禮樂刑法政俗未嘗相變也天下以為有道之國是故天下資禮樂焉鄭氏曰王禮天子之禮也傳傳世也資取也此盖盛周公之徳耳春秋時魯三君弑又士之有誄由莊公始婦人髽而弔始於臺駘云君臣未嘗相弑政俗未嘗相變亦近誣矣孔氏曰記者既陳四代服器官於前此結之於後美大魯國據伊耆氏之樂女媧之笙簧非唯四代據其多者言之耳亦有但舉三代者四代服器魯家每物之中得用之不謂事事盡用也作記之時是周末惟魯獨存周禮故以為有道之國左傳襄十年云諸侯宗魯於是觀禮是天下資禮樂也嚴陵方氏曰天下以為有道之國故詩述四篇而作頌語稱一變而至道孔子舍之而何適齊仲孫則言未可以動韓宣子則美其禮呉季札則嘆其樂王氏謂周公有人臣所不能為之功徳而報之以人臣所不得用之禮樂此明堂位之所以作歟然而居人臣之位而用天子之禮樂是法之變而已非法之常也聖人由是即其間必寓之微意雖致其隆亦每存乎殺焉是以雖承周公之祀而受魯侯之爵郊禮旗用日月之章而闕弧韣之旗禘禮灌用特祭之黃彞而闕閒祀之虎蜼獻用常祀之犧象而闕間祀之大尊灌器言圭瓉而不言璋瓉夷樂用昧任而無離禁社言春而不言秋省言秋而不言春於朝天子之年或闕春祭有大廟之制而無明堂以至有庫門而無臯門有雉門而無應門有木鐸而無金鐸廟止曰世室學止曰頖宫此皆隆殺之意也由是觀之聖人之制作也豈徒然哉學者不可以不察金華應氏曰有真賜之以備物而他國不得齒者郊禘之盛禮是也有例頒之常典而他國未必不同者如礿嘗烝社之常祭是也有真畀之以寳玉而視他國為特優者崇貫之鼎夏后氏之璜封父之繁弱是也此其器固逺傳乎古他如伊耆氏之樂女媧之笙簧虞夏周之尊罍則皆用其制度而已如虞夏商周之官則亦汎記其多寡之數而又未必用其制度也山隂陸氏曰以為以為如此而已是故亦緩詞也文雖少襃其詞如是與失之誣者異矣慶源輔氏曰傳謂傳説也盖言久矣天下共傳説魯國之有禮法也云天下以為有道之國君臣未嘗相弑也雖曰隠惡不若不言之愈也石林葉氏曰鄭氏以桓公宣公之事欲附㑹而不可得遂併記婦人髽士有誄之事以言禮之變謂此書為近於誣若然胡為列之記乎禮記雖出漢儒其言未必盡實然桓宣之弑不應滅裂不知至此吾嘗證吕覧以周賜周公得用天子禮樂為在平王之世魯惠公之所請以是質之則明堂位之作宜在桓公之前正當惠𨼆之際魯初得周公之賜故記禮者因緝而載之所以不及弑事其說尤可信不疑也非特此而已且言魯公之廟文世室也武公之廟武世室也若果出於成康及周公之身安得所謂魯公武公之廟乎乃知事有在目前厯千載而弗誤者雖聖人猶然而况其他此不獨可辨明堂位之非誣尤以成吕覽之言而證成康周公之無違禮也禮記集説卷八十
