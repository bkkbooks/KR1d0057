body:
  text: 禮記集說卷一百十九宋衛湜撰仲尼燕居第二十八孔氏曰案鄭目録云名曰仲尼燕居善其不倦燕居言及於禮著其言事可法也退朝而處曰燕居此於别録屬通論長樂陳氏曰燕居言仲尼閒居言孔子蓋自其弟子所稱則曰孔子自其記者所述則曰仲尼燕居之言禮始之以恭勇之中禮以言其處已者也次之以郊社禘嘗之禮以言其事神者也又次之以饋奠射鄉食饗之禮以言其待人者也夫能處己於其內而事神待人於其外則自居處以至於政事凡衆之動咸得其冝矣若夫無禮而反於此則凡衆之動咸失其冝矣言得其冝者所以盡教言失其冝者所以盡戒教戒既備而又語之以禮猶有九焉蓋猶者亦可以己之之辭以子張子貢言游之才語之以賢人之禮則固可以已矣然猶語以聖人之禮者蓋縱言其妙而不絶人之進也凡此皆禮而已未至於樂故言禮而又繼之以樂修身至於樂修身之至也治民至於樂治之至也又言禮之所興廢而終之以辨貴賤長幼逺近內外莫敢相踰所以導中庸而已山隂陸氏曰退朝曰燕退燕曰閒言禮燕居之事也言詩閒居之事也燕居稱仲尼閒居稱孔子以此仲尼燕居子張子貢言游侍縱言至於禮子曰居女三人者吾語女禮使女以禮周流無不遍也鄭氏曰言游言偃子游也縱言泛說事居女三人者三人且坐也凡與尊者言更端則起孔氏曰此一節論問更端三子陪侍夫子欲語以禮之大綱周流謂周旋流轉無不遍於天下也嚴陵方氏曰縱言與縱心之縱同心雖縱而不踰矩言雖縱而至於禮周言其不虧於一方流言其不滯於一曲周流則其用無所不遍馬氏曰燕居者君子所以休息縱言至於禮所以示其血氣不墯而須臾不離於禮之意也君子之所謂禮者非特能其事而已將有以明其義也明其禮之義則橫六合而不逆而設之無不當故曰使女以禮周流無不遍山隂陸氏曰縱口之言言孔子也周流六虛夫其特易而已達於禮者蓋亦如此子貢越席而對曰敢問何如子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁鄭氏曰對應也奪猶亂也巧言足恭之人似慈仁實鮮仁特言仁者感子貢也子貢辨近於給孔氏曰子貢問禮不讓夫子因感諭之言不中禮則於事為失野謂鄙野恭謂便僻足恭給謂捷給逆謂逆亂捷給之人貌為恭敬慈仁奪亂真慈仁也嚴陵方氏曰敬言其心恭言其貌心敬而不中禮則文辭寡故謂之野貌恭而不中禮則文辭多故謂之給勇而不中禮則以力而不以德故謂之逆給則論語所謂口給也辟席而對則與辭讓而對同義越席而對則與率爾而對同義三人侍坐之序子張為首子貢為次言游為末子張未對而子貢對焉此所以為越席也至於子張之問政以其序居首固不為越席矣言游之問禮待子貢退而又進又不為越席矣此所以特言之於子貢慶源輔氏曰越席而對已違於禮矣故以敬恭勇不中禮曉之敬而不中禮不及也恭而不中禮過也勇而不中禮失之逺矣敬恭勇皆德也然不中禮則皆陷於惡則人固不可不以禮周流無不遍也子貢之違禮則給使之也故復以給奪慈仁教之徇外者忘內故曰禦人以口給屢憎於人不知其仁馬氏曰恭而不中禮謂之給蓋能足恭未有不能巧言者也勇而不中禮謂之逆逆者逆於道而不順於倫給奪慈仁言色取仁而行違者也山隂陸氏曰餘未有言也賜也輒當此語是故謂之給講義曰孔子嘗言巧言令色足恭鮮矣仁又以剛毅木訥為近仁信乎給之能奪慈仁也慈仁人性所有是誠實之道也以言之捷給不謹故實則無有是慈仁為給所奪矣子曰師爾過而商也不及子産猶衆人之母也能食之不能教也鄭氏曰過與不及言敏鈍不同俱違禮也衆人之母言子産慈仁多不矜莊又與子張相反子産嘗以其乘車濟冬涉者而輿梁不成是慈仁亦違禮孔氏曰此經因明不中禮之人父義母慈父能教而不能愛母則能愛而不能教鄭注子産約孟子河南程氏曰大抵儒者潜心正道不容有差其始甚微其終則不可救如師也過商也不及於聖人中道師只是過於厚些商只是不及些然而厚則漸至於兼愛不及則便至於為我其過不及同出於儒者其末遂至楊墨至如楊墨亦未至於無父無君孟子推之便至於此蓋其差必至於是也延平周氏曰子張之於中道則過而子夏則不及子産之惠猶衆人之母則亦過也而又不能教則亦不及也方其言子張子夏之不得乎中道則必以子産參之者意乎子産之於中道猶不免有類乎二子則中道之所以為難也然子張既不得乎中道而又當時門人未嘗列之於四科孟子反以謂得聖人之一體何也夫具體而微者若仲弓之差於三子猶以為不足而不得與於其間得聖人之一體者若冉有季路猶以為有餘唯游夏在四科之末始為得之子張者又列之於游夏之後則其為人固不足議也然必以游夏與子張同為止得其一體者何也蓋抑其文學所以進德行而賤其過與不及所以貴中道也然子産之過與不及既類於二子則荀況以謂不如管仲不亦可乎夫子産之不得中道則然而為管仲者其能不失乎中道者哉孔子於子産則曰惠人又曰有君子之道四焉於管仲則曰人也又曰如其仁如其仁是二子皆有取焉然子産為人則不如管仲管仲為己則不如子産嚴陵方氏曰子産惠而不知為政惠而已是能食之也然不知為政是不能教也故曰猶衆人之母石林葉氏曰過與不及皆非中道而孔子不得中道而與之則琴張之狂狷或進之也食而不教亦非善政而孔子不得君子而與之則子産之惠亦可也子貢越席而對曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也子貢退言游進曰敢問禮也者領惡而全好者與子曰然鄭氏曰禮乎禮唯有禮也領猶治也好善也孔氏曰自此至相示而已明夫子為說禮之事凡有三節子游問禮之為體治去惡事而留全善事者與與是語辭然猶如是延平周氏曰惡而不以禮非仁也好而不以禮非仁也唯仁者為能惡而為能好而禮者乃仁人之所以領惡而全好者也馬氏曰中出於人之性而所以節性者在乎禮而已故曰夫禮所以制中惡者人之同惡好者人所同好禮因人之情在好則全之在惡則領之上言商師子産皆領惡之事下言郊社食饗賓客皆全好之事山隂陸氏曰率爾而對勇使之也越席而對知使之也子游見所以語師與賜如上所謂故曰禮也者領惡而全好者與廬陵胡氏曰制猶裁也子曰小子狂簡不知所以裁之領猶理也樂記云禮領父子君臣之節慶源輔氏曰禮所以制中亦所以風子貢之給也子貢所問者用其意夫子所答者據其極子游蓋因夫子之言而有得於禮之用也然則好問者不如默觀者之易發也審矣金華應氏曰領謂總攬收拾之也好惡對立一長一消惡者收斂而無餘則好者渾全而無虧矣夫禮之制中非屑屑然與惡為敵而去之也養其良心啓其善端而不善者自消矣仁者善之道也下言祭祀聘享周旋委曲焉者凡以全此而已然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食饗之禮所以仁賓客也鄭氏曰仁猶存也凡存此者所以全善之道也郊社嘗禘饋奠存死之善者也射鄉食饗存生之善者也郊有后稷社有句龍孔氏曰仁謂仁恩相存念也注稱后稷句龍解經郊社仁鬼神之義鬼神謂人之鬼神饋奠謂人之初死設此饋食之奠射謂鄉射鄉謂鄉飲酒嚴陵方氏曰子游固知領惡全好在乎禮矣然未知所以謂之禮者果安在哉故問鬼為隂神為陽天地主乎隂陽故郊社言仁鬼神自禘而下皆言禮而特於郊社言義者蓋義者禮之所尊故特於郊社言之死喪死言其事喪言其禮也射以賔賢能鄉以序長幼鄉以大言之黨以小言之也食以養隂氣饗以養陽氣賔以君言之客以臣言之也先郊社後嘗禘尊親之序也先嘗禘後饋奠吉凶之序也先饋奠後射鄉重輕之序也先射鄉後食饗衆寡之序也馬氏曰郊社禘嘗饋奠之禮所以全好於其幽者也射鄉食饗之禮所以全好於其明者也仁者有推恩而及之之意郊社外之祭也所以仁鬼神嘗禘內之祭也所以仁昭穆嘗禘可以言鬼神而郊社不可以言昭穆事天地主於敬故於郊社言鬼神事宗廟主於敬故於禘嘗言昭穆饋奠之禮始死者之奠也始死而致祭之則不仁此饋奠所以仁死喪也習射尚功所以使之爭習鄉尚齒所以使之讓有所爭則壯者有以勵有所讓則頒白不負戴而車徒避老者此鄉射之禮所以待鄉黨者盡矣故曰射鄉所以仁鄉黨食以示其愛饗以示其敬食饗所以待賔客者盡矣然禮始於冠本於昏重於喪祭尊於朝聘和於射鄉此不及冠昏者蓋冠昏在我之事在我則不可推恩及之是以不言金華應氏曰仁心發於中而後禮文見於外及禮之舉而是心達焉則幽明之間咸順其序歡欣浹洽皆在吾仁中是仁之周旋暢達也延平周氏曰君子之所以事天地者尊之也以其尊之故主乎義而其所以事宗廟者親之也以其親之故主乎仁焉雖然莫非仁也施之於神則仁於幽施之於人則仁於明山隂陸氏曰夫如是可謂全矣若老莊所謂雖好而不全也蓋自相往來觀之射鄉之禮仁矣自不相謁請觀之食饗之禮仁矣子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門之內有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事間也以之軍旅有禮故武功成也是故宫室得其度量鼎得其象味得其時樂得其節車得其式鬼神得其饗喪紀得其哀辨說得其黨官得其體政事得其施加於身而錯於前凡衆之動得其冝鄭氏曰治國指諸掌言易知也郊社嘗禘尊卑之事有治國之象焉辨別也三族父子孫也凡言得者得法於禮也量豆區斗斛也味酸苦之屬也四時有所多及獻所冝也式謂載也所載有尊卑辨禮之說謂禮樂之官教學者黨類也體尊卑異而合同孔氏曰前經明郊社等禮各有所因故此經廣明郊社嘗禘明而用之則有功又廣明諸禮所用有功諸事各得其所郊社祭天地嘗禘祭宗廟皆是事之難者能明其理則治國甚易了也三族族屬也鄭注昏禮三族謂父昆弟已昆弟子昆弟與此不同者彼謂請期恐有期喪廢昏故不同也宫室得其度謂制度髙下大小得禮之度數量鼎得其象象謂法象言斛斗之量三牲之鼎各得其禮之法象故易繫辭云以制器者尚其象案春秋左氏昭三年𫝊云齊舊四量四升為豆各自其四以登於釡注云四豆為區四區為釡又律厯志云十升為斗十斗為斛味得其時周禮食醫春多酸夏多苦秋多辛冬多鹹又獸人冬獻狼夏獻麋是也樂得其節謂樂曲之節車得其式言所乘之車各得其所載之尊卑鬼神得其饗謂天神人鬼各得其饗食也喪紀謂五服親疏各得其哀情也辨說謂分辨論說詩書禮樂之等各得其黨類不乖事之義理官得其體謂設官分職各得其尊卑之體猶若長官與屬官亦尊卑異而共掌一事政事言布政治事各得所施之處加於身而錯於前凡衆之動得其冝合結用禮之功也錯置也衆謂萬事也以禮加身而錯之於前萬事動用皆得其所冝也橫渠張氏曰知禘嘗之禮郊社之義治國如置諸掌經不正則於此必致疑不知所以為大若虛器然茍能體經自然皆知是實學若觀於鄉必親行之乃知王道之易以為實嚴陵方氏曰郊社嘗禘莫非道也茍明乎道矣則治國之理灼然可見如指諸掌豈為過哉居言其常居處言其暫處田以所取之利言之獵以所獲之物言之室有奧阼席有上下所謂居處有禮也故長幼辨父父子子兄兄弟弟夫夫婦婦所謂閨門有禮也故三族和設官分職列爵分土所謂朝廷有禮也故官爵序春搜夏苗秋獮冬狩所謂田獵有禮也故戎事間進退有度左右有局所謂軍旅有禮也故武功成或曰戎事或曰武功何也以器言則曰戎以道言則曰武器之所用者小而道之所致者大故於事則曰戎於功則曰武戎事間然後武功成固其序也然月令言兵戎不起者對兵言之則為事對武言之亦器而已戎事間於無事之時故於田獵言之武功成於尚功之日故於軍旅言之此小大之别也所謂間者習也所謂三族者以易家人言之故知其為父子兄弟夫婦父子合尊卑而為族兄弟合長幼而為族夫婦合內外而為族合是三者皆有相與禦侮之道故也鄭氏釋經與小宗伯皆以為父子孫釋士昏禮又以為三者之昆弟釋莊子者又以為父母妻子族皆失之矣宫室若魯莊公之丹楹刻桷臧文仲之山節藻梲蓋失其度故也量左為升以象陽之所升右為合以象隂之所合仰者為斛以象顯而有所承覆者為斗以象隱而有所庇外圜其形動以天也外方其行靜以地也鼎口在上以象有所受乎上足在下以象有所立乎下大者為鼐掩者為鼒足竒其數參乎天也耳偶其數兩乎地也易曰以制器者尚其象蓋謂是矣然其器疏以達者所以象春其器高以粗者所以象夏廉以深之象秋閎以奄之象冬器固無適而非象也止以量鼎為言者蓋量為器之大者鼎為器之重者大者重者得其象則小者輕者從可知陽而不散隂而不密剛氣不怒柔氣不懾所謂樂得其節也車得其式者作之乘之皆得其式也有六等之數此作車之得其式也辨五路之用此乘車之得其式也式者用節之謂也鬼神得其饗者若天神皆降地示皆出可得而禮是矣喪紀得其哀者或發於容體或發於聲音或發於言語飲食或發於居處衣服而各得其哀也辨說得其黨若在官言官在府言府在庫言庫在朝言朝之類是矣官得其體者若天官掌邦治地官掌邦教春官掌邦禮夏官掌邦政之類各得其體是矣政事得其施者若施典于邦國施則于都鄙施法于官府之類各有所施是矣自宫室得其度而下皆以本於禮故能各有所得焉加於身則以禮加於身也錯於前則以禮錯於前也無所不用禮故動皆得其冝也所謂凡衆者衆則不一凡則總而一之之詞也馬氏曰郊社所以事天地而義藏於其中嘗禘所以事宗廟而禮陳於其外因義以設禮因禮以考義神而明之存乎人則治國其如示諸掌乎推而通之以至於加於身而錯於前凡衆之動無不得其冝也石林葉氏曰人莫不有所居凡所遇之地與所安之地皆居處也其禮義於閨門故尚齒則言長幼尚親則言三族見於戰伐攻取所謂軍旅也其禮義於田獵故習其坐作進退則言戎事獻俘執馘則曰武功至於朝廷則序爵下賢之地止於官爵序而已矣宫室者居其身也有所居而不可無所養故量鼎與味養其身也有其養不可無所安故樂安其心車安其行也自宫室而車安其行則奉身者已備故幽而事鬼神饗則受福明而治喪紀哀不滅性出而從辨說則不失人以至居官則不失為政之體政事則不失先後之施舉而措之衆動無不當於理亦禮之達者歟長樂陳氏曰禮樂之於天下未嘗不相為終始故禮得樂然後和樂得禮然後節故孔子曰樂也者節也樂得其節則政事得其施樂失其節則政事失其施是聲音之道未嘗不與政通也故審聲以知音審音以知樂審樂以知政舍君子何以哉山隂陸氏曰車得其式若式商容之閭之類辨說得其黨茍非真質雖有妙斫無所施焉官得其體若宰相不親小事之類政事得其施若上先下後之類子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所錯耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其䇿軍旅武功失其制宫室失其度量鼎失其象味失其時樂失其節車失其式鬼神失其饗喪紀失其哀辨說失其黨官失其體政事失其施加於身而錯於前凡衆之動失其冝如此則無以祖洽於衆也鄭氏曰凡言失者無禮故也策謀也祖始也洽合也言失禮無以為衆倡始無以合和衆孔氏曰前經明諸事得禮則有其功此經明諸事失禮則其事有害夫子更自設問云禮者何也即事之治言萬物之治皆由禮瞽謂無目相謂扶相言治國無禮譬猶瞽者無人扶相倀倀乎何所之適以之居處以下皆謂無禮有失翻前經得禮之事別即辨也前云間戎事失其謀則不能間暇也武功前云成由不成故失其制也失施若春行夏令之屬每事如此則為君上失德不可為衆人倡始而使和合者也嚴陵方氏曰即者取之以為己之謂也取是事而治之以是禮故曰即事之治以譬瞽之相幽室之燭焉相者相步也倀倀者無所如之貌也手足在下故以錯言之耳目在上故以加言之進退揖讓不可過故以制言之祖言有所繼洽言有所和經曰禮為可繼也易曰嘉㑹足以合禮山陰陸氏曰耳目無所加不知所以給視聽也祖洽於衆祖謂如祖迎之祖無以祖洽猶言無以合離於衆子曰慎聽之女三人者吾語女禮猶有九焉大饗有四焉茍知此矣雖在畎畝之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而后君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示德也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已鄭氏曰猶有九焉吾所欲語女餘有九也但大饗有四大饗謂饗諸侯來朝者也四者謂金再作升歌清廟下管象也事之謂立置於位也聖人已者是聖人也縣興金作也金再作者獻主君又作也下謂堂下也象武武舞也夏籥文舞也序更也堂下吹管舞文武之樂更起也知仁焉知禮樂所存也采齊雍振羽皆樂章也振羽振鷺及雍金作示情也賔主人各以情相示也金性內明象人情也示德相示以德也清廟頌文王之德示事相示以事也武象武王之大事也孔氏曰前經子游問禮孔子特為說之自此以下孔子總為三人說禮之大意但於禮之內大饗為重故此經特明之言上經所說禮外猶有九事九事之中兩君相見大饗有四四者謂賔初入門而縣興揖讓而升堂主人獻賔賔飲訖而樂闋一也賔酢主人金奏再作主人飲畢而樂闋二也至工入升歌清廟三也歌畢堂下管象武四也誠能知此四事其身雖在畎畝之中衆人奉而事之立置於位戴以為君則是聖人也縣興謂鐘磬興而動作謂金奏作也下管象武之上少升歌清廟一句下文既詳故略之夏籥序興謂初時管中吹象武之曲已後與夏籥文舞次序更遞而興故鄭云舞文武之樂更起也於是陳列薦俎次序禮樂備其百官此重贊揚在上之事君子見上大饗四焉知禮樂所存在也行中規至徹以振羽五事通前四事為九也前四事義廣意深故特明於上五事周旋揖讓其理淺露故別於下行中規謂曲行配前為五還中矩謂方行通前為六和鸞中采齊采齊樂章名謂出門迎賔和鸞之聲中采齊之曲通前為七客出以雍雍詩篇名言客出時歌雍以送之通前為八徹以振羽振羽樂章名言禮畢徹器歌振鷺通前為九無物不在禮言萬事皆在於禮也入門而金作覆上縣興之文主人獻賔而作金是主人示賓以恩情賔酢主人而作金是賔示主人以敬情是示情也升歌清廟亦覆說上文上文不載頌文王之德故云示德也下而管象覆釋前文下管象武也象謂武王伐紂之樂示王業之大事也古之君子相朝㑹不必親自以事相與丁寧而言但以禮樂微相示語依違而已案盧氏曰大饗有九者揖讓入門一也入門縣興二也揖讓升堂三也升堂樂闋四也下管象武五也夏籥序興六也陳其薦俎七也序其禮樂八也備其百官九也王氏曰大饗九者揖讓入門至升堂一也升堂樂闋二也下管象武夏籥序興三也陳其薦俎序其禮樂備其百官四也下五事與鄭同嚴陵方氏曰九禮大饗之所兼有然此止言有四何也蓋四者之禮饗之大者然後有之苟知此矣雖在畎畝之中事之聖人已者蓋知此則知禮樂之情者也知禮樂之情者能作作者之謂聖故雖在畎畝之中人之所事必以聖人事之也兩君相見其禮所以為大者若以饗禮養老之饗與春饗孤子之饗則其禮為小故也亦見大饗不問卜解揖讓而入門者接之以禮也入門而縣興者接之以樂也縣謂軒縣也揖讓而升堂升堂而樂闋者即郊特牲所謂卒爵而樂闋是也蓋升堂所以受爵也卒爵則升堂可知其言亦互相備也象即詩所謂象舞也武即詩所謂大武也並見明堂位解夏即明堂位所謂大夏也以文舞必執羽籥故謂之夏籥此止言籥者主律言之故也後言升歌清廟而此不言者以升堂見之故也此言夏籥序興而後不言者以管象見之故也蓋升堂則升歌可知管象以示事夏籥亦以示事而已且象武者文武之樂夏籥者夏禹之樂先時王之樂而後及於先王之樂則自近以及遠不失其序故特曰序興也俎以薦牲體於上故謂之薦序其禮樂備其百官以見其有加而無已有隆而無殺也如此而後君子知仁者孔子曰人而不仁如禮何人而不仁如樂何非謂是歟行中規者謂趨前而行也還中矩者謂轉後而還也趨前則疾疾或失於不曲故欲中規中規則圜而曲矣轉後則緩緩或失於不直故欲中矩中矩則方而直矣與玉藻言周旋中規折還中矩文雖同而意則異焉且行有動意圜者同故中規還有止意方者止故中矩也和鸞中采齊言聲之所中如此並見玉藻解主人肅客客出以雍則客之出也猶歌以雍焉且見客之能雍非特於來時而已振鷺詩曰在彼無惡在此無斁徹以振羽則於器之徹也猶歌以振羽焉且見主之無斁非特於在此之時而已且雍禘大祖之詩也其用為大故歌之以送客焉振鷺助祭之詩也其用為小故歌之以徹器而已此重輕之别也二詩本以禘大祖與助祭而又用之於此者猶之鹿鳴本以燕羣臣而又用之於鄉飲酒也然論語言以雍徹其用與此不同又何也蓋彼所言者天子饗神之事此所言者諸侯饗賔之事故諸侯所用之大者天子止用之於小焉此所以不同入門而金作示情也與禮器言金次之見情同義升歌清廟下而管象與明堂位所言同義示情者欲賔主以情相接也示德者欲賔主以德相讓也示事者欲賔主以事相成也夫始相見彼此之情慮難以通故金作於入門之時以示之示其情矣又不可不將之以德故升歌清廟以示之示其德矣又不可不輔之以事故下而管象以示之若是則目擊而道存聲不容而默喻矣故曰古之君子不必親相與言也以禮樂相示而已所謂九禮者揖讓而入門入門而縣興一也揖讓而升堂升堂而樂闋二也餘同王肅延平周氏曰揖讓而入門則復揖讓而升堂入門而縣興則升堂而樂闋何也禮本人之所強故以進為文而樂本人之所樂故以反為文也樂既闋矣則堂下奏象與武象與武既奏矣則執夏執籥而舞者皆以序興簡兮之詩先言方將萬舞次言左手執籥右手秉翟其序與此同意如此而后君子知仁者孔子曰人而不仁如禮何人而不仁如樂何孟子曰仁之實事親是也義之實從兄是也禮之實節文斯二者樂之實樂斯二者是禮樂之所以為禮樂者以其仁也今兩君相見以禮樂為主則又將㳂禮樂以知仁也金主義而兩君相見其情亦主乎義故入門而金作示禮也升歌清廟示其德之能秉於天子也故詩謂秉文之德下而管象示其事之可致於禎祥也故詩謂維周之楨古之君子所以不必親相與言而其意自傳者以禮樂相示而已山隂陸氏曰一清廟二象三雍四振羽五肆夏六采齊七武八夏九籥此無肆夏而知其然者以言行中規還中矩而玉藻行以肆夏知之也熊氏云勺籥也則籥蓋舞勺武武也籥文也夏文武之中也大饗有四者一清廟二象三雍四振羽蓋唯魯與二王之後大饗而後有之故其言如此據文王世子天子視學登歌清廟下管象舞大武祭統大嘗禘升歌清廟下管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也然則燕禮升歌鹿鳴避清廟下管新宫避象苟知此矣雖在畎畝之中事之聖人已言聖人逺乎哉在乎鐘鼓管絃動容之間而己入門而縣興升堂而樂闋者春秋傳曰金奏肆夏之三工歌文王之三縣興是也升歌下管當此節今言管不可歌略二雅也據象武頌也以雍以振羽頌也升歌清廟頌也下管象武夏籥序興者言下而象武興夏籥序興知然者以下而管象知之也此兩君相見之樂也據此諸侯蓋下管象舞大武大夏而已燕禮曰下管新宫若舞則勺此大夫下管新宫舞勺而已傳曰萬入去籥若魯用王禮則以朱干玉戚冕而舞大武八佾以舞大夏故曰朱干設錫冕而舞大武諸侯之僭禮也唯天子以六樂六舞大合樂耳客出以雍徹以振羽者客出以雍徹亦或以振羽詩曰振鷺于飛于彼西雍則振羽固振鷺也下而管象示事者象維清之詩也其詩曰維清緝熙文王之典文王聖之清者也清廟神靈在焉維清其緒餘也一則升歌一則下管以此石林葉氏曰古之所謂聖人者非有閒於畎畝之中要其德大而能化則雖在下亦元聖素王之事也金石之為物叩之則應非有隱情也故入門則先鳴鐘磬既升堂聞鐘磬情已見矣故升歌清廟文王之詩始受命者也則在堂上大武武王之樂終受命者也則在堂下武舞而用干戚則武而已不可以無文故夏籥文舞則興於堂序禮備而樂舉矣然後牢牲饔餼以薦諸俎擯介詔相以備百官歡然有恩以相接也故君子知仁焉蓋仁以禮立禮行於燕則既醉以酒既飽以德禮行於饗則酒清而不敢飲肉乾而不敢食醉酒飽德者示慈惠也不敢飲食者訓恭儉也恭儉慈惠皆為之别而百官以備饗禮以終故行則圜而中規方而中矩不失容也升車而出則和鸞中采齊者不失節也既出而歌雍詩以送之者不失儀也已事而後歌振鷺以徹之者言其以禮終也蓋雍禘大祖振鷺二王之後來助祭皆大饗先王之時之詩也以饗先王之詩而歌於饗諸侯之際則其訓恭儉者可知己慈湖楊氏曰孔子曰入門而金作示情也然則懸興而金作鏗然而鳴即吾之情也可以言為也又曰升歌清廟示德也然則人聲由中而發文德由中而暢即吾之德也何以言為也又曰下而管象示事也然則堂下管籥武舞文舞次序而興又即吾之事也何必身親之也渾然天地萬物皆吾之體也純然宫商節奏皆吾之用也薦俎非外百官非彼行非行夫孰知其所以行而自中規還非還夫孰知其所以還而自中矩和鸞車之和鸞也而即吾之中采齊也客出以雍其徹也以振羽莊敬和樂之妙又何其始始終終而不可致詰也畎畝之中無兩君相見之禮也而即兩君相見之禮也無金聲之樂也而即金聲之樂也無管象夏籥也而管象夏籥之音舞未嘗不日奏于前而昧者不見不聞也耒耜之器耕藝之勤良禾之欣榮耘耔之仁兩目散日月之明四體運天地之神步中鸞和之節聲諧韶濩之音此豈說合而强同之哉默而識之當自知自信也長樂陳氏曰晉饗穆叔歌文王之詩穆叔以文王為兩君相見之樂則諸侯相見歌文王而不可清廟也孔子謂諸侯相見歌清廟者蓋二王後諸侯之長禮然也禮書又樂書曰大饗之禮兩國之君相見不必親相與言也以禮樂相示而已揖遜而入門禮也入門而縣興樂也揖遜而升堂禮也升堂而樂闋樂也下管象武夏籥序興樂也陳其薦俎備其百官禮也禮見於揖遜而為仁之容樂見於興闋而為仁之聲大饗所以仁賔客者也接以禮者必樂之以樂樂以樂者必節之以禮苟明乎此而後君子知仁焉至於行中規還中矩則饗禮之末儀也和鸞中采齊客出以雍徹以振羽則饗樂之末節也然則諸侯相見之禮得用王者清廟象武之樂何耶曰諸侯具王者之體而微者也斯須之饗用王事之樂傳曰禮盛可以進取者此也書曰羽畎夏翟詩曰左手執籥右手秉翟周官有羽籥之舞言籥則知夏之為翟矣翟雉五色備為夏言夏籥序興則羽籥之舞以序而興所謂興羽籥是也以夏籥為羽籥之文舞則武為干戚之武舞矣先武舞後文舞者周家以武勝敵以文守成之序也金華應氏曰聖人與學者閒燕之時從容講論俾以禮周流固欲期於有用也顧出處難必於我用世亦誠未易姑處畎畝之中聽其用舍然苟知此禮而從事焉則亦可進於聖人之域矣此篇言仁者凡三語子貢曰給奪慈仁以其辨給而或傷於仁也告言游曰郊社之禮者所以為仁以其習於威儀而未深體夫仁也告子張曰如此而後君子知仁以其堂堂而難與並為仁也各因其病而藥之使於禮而知其仁則其悟入益深而不專以虛文為禮矣子曰禮也者理也樂也者節也君子無理不動無節不作不能詩於禮繆不能樂於禮素薄於德於禮虛鄭氏曰繆誤也素猶質也歌詩所以通禮意也作樂所以同成禮文也崇德所以實禮行也王制曰樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王太子王子羣后之大子卿大夫元士之適子國之俊選皆造焉則古之人皆知諸侯之禮樂孔氏曰以前經大饗有禮樂之事故此申明禮樂之義禮者使萬事合於道理樂者使萬事得其節制詩能通達情意則行禮審正若不能習詩則情意隔絶於禮錯繆樂有音聲綴兆文飾於禮若不能習樂則於禮朴素內心厚於德則外充實若內德淺薄則外禮空虛此經雖禮樂並陳德是百行之本樂是禮中之别故明禮須詩樂及德乃為善也注引王制明上從天子下至俊選皆須禮樂而成證君子無理不動無節不作也以前經是諸侯禮樂之事故鄭注知此是申說前經也長樂陳氏曰禮繁則亂非所以為理也樂勝則流非所以為節也故曰禮也者理也樂也者節也君子循理而動無動而非中也應節而作無節而非和也故曰君子無理不動無節不作一動一作而禮樂存焉豈小人所能與哉蓋詩出於人情禮緣人情而為之節文則興於詩者未有不及於禮故不能詩於禮必失之無序能無繆乎樂不徒作必有禮焉則知樂者未有不幾於禮故不能樂於禮必失之無文能無素乎人而無德焉以為禮則道以德者未有不齊以禮故薄於德於禮必失之無實能無虛乎人之於詩樂有能有不能其於德則足乎已無待於外非有能有不能也特所得有厚薄而已金華應氏曰禮非樂以發越則如采色之素而無飾樂非禮為之質幹則如支體之偏而不全嚴陵方氏曰唯君子能樂循理故無理不動唯君子能不踰節故無節不作理以道言也故曰動節以事言也故曰作馬氏曰詩禮有相通之理不能詩則不知禮之意故於禮繆樂者禮之華禮者樂之實不能樂則不能成禮之文故於禮素樂者得於中所謂文也得於中者薄則其發於外者有時而涸矣故於禮虛山隂陸氏曰詩與禮不同禮嚴而詩寬若禮好色則禁怨瀆則禁詩不禁好色而禁人之淫不禁怨瀆而禁人之亂司馬遷曰國風好色而不淫小雅怨瀆而不亂是也故孟子以詩濟禮而後不繆詩曰逺送于野逺送過禮也而詩不禁方是時苟以為非禮可謂繆矣據禮婦人送逆不出門薄於德於禮虛王文公曰肉以骨為體禮以德為體慶源輔氏曰動則為禮作則為樂禮緣人情故通於詩有其序故成於樂發於心故根於德子曰制度在禮文為在禮行之其在人乎鄭氏曰文為文章所為孔氏曰此經明行禮在人嚴陵方氏曰中庸曰禮儀三百威儀三千待其人然後行其言正與此合馬氏曰制度者文為之體文為者制度之用簠簋俎豆所謂制度也升降上下所謂文為也制度文為皆禮之法也徒法不能自行故行之在人山隂陸氏曰制度在禮凡以為節不豐不殺是也文為在禮凡以為文不華不俚是也易曰神而明之存乎其人長樂陳氏曰樂之於天下稽之度數莫不有制度求之情文莫不有文為制度文為雖同出於樂要其所以制度文為實在禮焉推而行之其不在人乎由是觀之凡禮樂之道未嘗不相為表裏一人而兼禮樂者其古有德之成人歟樂書延平周氏曰文言也為行也慶源輔氏曰行禮雖在人而所謂人者必興於詩成於樂厚於德然後可不然非所謂其人也子貢越席而對曰敢問䕫其窮與子曰古之人與古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫䕫達於樂而不達於禮是以傳於此名也古之人也鄭氏曰䕫其窮與見其不達於禮素與偏俱不備耳孔氏曰前經孔子稱唯人能行禮子貢唯聞䕫善樂不聞䕫達禮故越席而問䕫於禮其亦窮與孔子言今人解樂為全不知禮䕫是古之人與禮非全不知也素謂朴素偏謂不備具皆不得為窮䕫禮樂兼有但特通達於樂不甚通達於禮是以賢名流傳後世若全不解禮何以𫝊於此名更重美䕫云是古之人與今之人别也虞書舜命伯夷典朕三禮伯夷讓䕫是䕫知禮也長樂陳氏曰素與偏者知其數而不知其義之謂也若周之大司徒以鄉三物教萬民而賔興之則其六鄉之民莫非達乎禮樂之義者也而況虞舜之庭而有不達乎其義者哉故曰古之人也言四代之臣無素於偏者適以其官傳名後世而不達乎其職外之所能其可謂之窮乎嚴陵方氏曰有所屈之謂窮無所蔽之謂達前經所謂不能樂於禮素者不達樂也樂記所謂禮粗則偏者不達禮也傳此名者傳樂名也若倉頡之於書后稷之於稼馬氏曰古之人與疑之之辭也古之人也審之之辭也樂以禮為實禮以樂為華素者質而無文之辭也禮者體也一體不備謂之不成人偏者有所未備之辭也傳於此名以言其聞望施於後世也䕫謂之偏可也謂之窮不可也言傳於此名者而卒之以古之人者亦以其世之逺而疑其傳之者妄也山隂陸氏曰古之人不朽者也言䕫特以樂傳爾荀子曰好樂者衆矣而䕫獨傳者一也石林葉氏曰禮以致中樂以致和中則無所偏倚和則不執一也素止於一色故達禮而不達樂則為素偏而不中故達樂而不達禮則為偏舜之命䕫典樂非謂其不達禮命伯夷典禮非謂其不達樂蓋人之於道術各致其一而精者則有矣故舜之命官因其精而任之也謂䕫不達於禮而為窮則伯夷亦不達於樂矣為舜之臣止於九官必皆達於此而窮於彼亦何以勝任乎傳曰知樂則幾於禮禮樂之情其相通如此而謂達於此而窮於彼固非也長樂陳氏曰禮樂之道未嘗不相為表裏一人而兼禮樂者其古有德之成人歟語曰文之以禮樂亦可以為成人矣蓋達於禮不達於樂是直有質而無文以飾之也君子謂之素達於樂不達於禮是失之沈湎而無禮以正之也君子謂之偏䕫雖達於樂而不達於禮非不知制度文為也謂之偏可矣謂之窮可歟觀䕫教胄子以直寬剛簡之德達之以溫柔戒之以無虛無傲則以禮樂教和亦不過如此子貢以為窮惡可哉慶源輔氏曰達如君子上達之達謂窮盡其義而無不至也子張問政子曰師乎前吾語女乎君子明於禮樂舉而錯之而已子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼓然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下太平也諸侯朝萬物服體而百官莫敢不承事矣禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奧阼席則有上下車則有左右行則有隨立則有序古之義也室而無奧阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也昔聖帝明王諸侯辨貴賤長幼逺近男女外內莫敢相踰越皆由此塗出也三子者既得聞此言也於夫子昭然若發矇矣鄭氏曰錯猶施行也言禮樂足以為政也衆之所治衆之所以治也衆之所亂衆之所以亂也目巧謂但用巧目善意作室不由法度猶有奧阼賔主之處也自目巧以下古今常事不可廢改昭然若發矇乃曉禮樂不可廢改之意也孔氏曰力謂勉力萬物服體服謂屈服體謂形體言飛走動植來為瑞應也目巧言但用目準視巧思也古之義也者自古以來禮樂之意也由此塗出者言能使貴賤長幼男女殊别外內莫敢踰越者皆由此禮樂之道而出也爾雅云西南隅謂之奧奧之外有賔位東階謂之阼故鄭云賔主之處嚴陵方氏曰舉錯與樂記所言同義蓋明於禮樂之道然後能舉而錯之於政也夫禮足以正人之身於外樂足以正人之心於內政者正也子張問政孔子以是答之論語曰禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉故此以不必鋪几筵之類然後為禮行綴兆之類然後為樂也言而履之所謂踐言是也行而樂之所謂安行是也力此二者謂力行此禮樂而施於有政也欲施於有政非明於禮樂而又有其位焉固有所不可故曰以南面而立夫是以天下太平也萬物者萬事也服體者各服其體而不相侵也諸侯朝萬物服體百官莫不承事則太平之效也夫禮者衆之紀紀散而衆亂則衆之治亂係乎禮之興廢而已作室者工而工有巧巧之運存乎目故曰目巧之室紂之臣左强誇而目巧者以此隅有奧則尊者所處而別於卑階有阼則主人所歷而别於賔所謂室有奧阼也席或以南方為上或以西方為上所謂席有上下也乘車之法君在左勇士在右所謂車有左右也父之齒隨行五年以長則肩隨之所謂行有隨也天子南鄉而立自公侯而下各有位焉所謂立有序也然則古人之禮至於如是者豈徒從事於文為哉亦各有義存焉爾故曰古之義也踰越皆過也發矇者若目不明為人所發而有所見也石林葉氏曰莫非政也舉禮樂以錯諸彼為政之大者也然事有緩急而所施有先後故門人問政者衆矣皆不及於禮樂答子張以及此豈因其為色莊者乎禮之數可陳也其義則言而履之也樂之文可設也其實則行而樂之也子張能莊而不能同言行未必與禮樂稱也孔子所以及此若夫履其禮而達所履於天下行其樂而達所樂於天下則功成治定之時也故南面立而天下太平萬物之在天下凡具倫理者莫不有禮唯其廢興主乎人則衆所由而治亂也故一室一席一車一行一立而幽明上下皆有所辨況貴賤長幼逺近之序天理所具有哉延平周氏曰易曰上天下澤履君子以辨上下定民志又曰履德之基蓋言禮則以其所履者為主孟子曰樂者樂斯二者樂則惡可已蓋言樂則以其所樂者為主室之奧席之上車之左行之前立之東陽也室有阼席有下車有右行有後立有西隂也隂陽之辨者古之禮也以為義者禮從冝而起於義者也臨卭宋氏曰語曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉與此經相為表裏蓋莫難於言而履之行而樂之謂其取成於我也莫易於鍾鼓玉帛謂其取成於物也取成於物若可觀矣而非以致太平之道必欲致大平非取成於我不能也禮記集說卷一百十九
