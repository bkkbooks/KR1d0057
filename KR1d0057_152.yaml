body:
  text: 禮記集説卷一百五十二宋衛湜撰所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣故諺有之曰人莫知其子之惡莫知其苖之碩此謂身不修不可以齊其家鄭氏曰之適也辟猶喻也言適彼而以心度之曰吾何以親愛此人非以其有德美與吾何以敖惰此人非以其志行薄與反以喻己則身修與否可自知也鮮罕也人莫知其子之惡猶愛而不察碩大也孔氏曰此覆明前經齊家修身之事農家種田常欲其盛苖雖碩大猶嫌其惡若能以己子而方人子以己苖而匹他苖則好惡可知矣橫渠張氏曰學者能自察其不善進莫量焉若有未明則觀於他大學所謂之而辟焉是也見人之善則師之其不善則改而不為乃內外相養之道也藍田吕氏曰所謂親愛德厚者也所謂賤惡德薄者也畏敬賢於己者也哀矜無所知能者也敖惰不率教者也見賢思齊則之其所親愛畏敬而辟焉見不賢而內自省則之其所賤惡哀矜敖惰而辟焉衆人之情察於人而蔽於己如以人之賢不肖反求諸己則已可得而察也好而不知其惡惡而不知其美情亂之也子溺於私愛故不能察其有惡苖求其實利故唯恐其不碩皆非好惡之正也家人之象君子以言有物而行有恆之其所愛敬而修其言行則人亦將愛敬之之其所賤惡而去其不善則人不可得而賤惡之如此則人將矜式之況其家乎故曰其身不修不可以齊其家也山隂陸氏曰不言此謂齊其家在修其身以其所齊漸廣故其詞嚴下云所謂治國必先齊其家亦以此延平周氏曰傳曰能近取辟可謂仁之方也已果能近之其身之所親愛者以譬於人之所親愛近之其身之所賤惡者以譬於人之所賤惡與夫之其所畏敬哀矜敖惰者皆然則其所行者莫非公恕之道故好之者知其有惡之為可惡惡之者知其有美之為可好然好而知其惡惡而知其美者天下常鮮蓋不能參之以彼己而盡其公恕之道而已矣故蔽於愛子之善所以莫知其惡蔽於欲苖之長所以莫知其碩是齊其家者貴乎能參以彼己而蔽乎吾身之愛與惡也石林葉氏曰所藏乎身不恕未有能喻諸人者也故齊家在乎用恕孔子言仁之方則所謂恕也蓋好己之好而不知人之所惡惡己之惡而不知人之所好此其失在於不恕不能近譬者也孟子曰所欲與之聚之所惡勿施爾也好惡同於人則己之所親愛必思以反人之所親愛己之所敖惰必思以反人之所敖惰是之謂恕也雖然子者人所愛蔽於子而不知其惡苖者人所殖蔽於苖而不知其大此天下常多也以其恕已而譬諸人則無蔽雖齊家之道亦若此而已矣廬陵胡氏曰譬猶省察也人適其所親愛所賤惡而省察焉則知親愛者善而賤惡者之不善也適所畏敬所哀矜所敖惰而省察焉則知所畏敬者善而所哀矜敖惰者之不善也見善如不及見不善如探湯而吾身之善不善與他人之善不善昭然可睹矣易曰觀我生觀民也觀民以察己之道此亦觀人以省己也雖然於所親愛畏敬雖好也而不知其惡於所賤惡哀矜敖惰雖惡也而不知其善者情汨之也是以狃於私愛莫知其子之惡莫知其苖之碩也范陽張氏曰修身之道自省而已矣善者吾師也不善者亦吾師也豈非修身之道哉夫人之所親愛者仁人也所賤惡者不仁者也所畏敬者有德者也所哀矜者無辜者也所敖惰者愚不肖者也方其親愛仁者畏敬有德者哀矜無辜者也則反而自省曰吾有仁乎有德乎其所以罹憂患者果無辜乎果有仁矣有德矣無辜矣則吾為人所親愛所畏敬所哀矜無疑也方其賤惡不仁者敖惰愚不肖者則又反而自省曰吾不仁如若人乎愚不肖如若人乎果不仁似之愚不肖似之則吾為人所賤惡所敖惰亦無疑也譬也者省也如此則凡目之所見心之所思若親愛者賤惡者畏敬者哀矜者敖惰者皆足以為吾警戒豈非善不善皆吾師乎是吾日用中凡所好惡皆取之為自省之資念兹在兹釋兹在兹身之不修無是理也夫人之常情明於責人而暗於責己儻吾見善而好之則反而自照曰彼能是吾乃不能焉是吾之惡德也吾當日夜去其惡而從其善此好而知己之惡者也見惡而惡之則又反而自照曰彼為是而我乃不為焉是吾之美德也吾當日夜保守此善而勿失焉此惡而知己之美者也有行此道者天下鮮矣喻好而不知其惡者多此所以好他人之子賢而不自知其子之惡也唯惡而不知其美者多此所以惡他人之苖稿而不自知其苖之碩也明於責人故好他人之子賢惡他人之苖稿暗於責已故私蔽愛之至不知其子之惡貪心乘之至不知其苖之碩如此則豈特一身不自知其善惡一家善惡亦且不知而顛倒失序矣身不修不可以齊其家此理之自然也永嘉薛氏曰有一言而可以終身行之者其恕乎己所不欲勿施於人君子之道無他善推其所為而已譬所親愛譬所畏敬譬所哀矜譬所敖惰取譬反覆視我心之輕重則失其正者見矣好而不知其惡惡而不知其善皆有所偏也心有所偏則吾之是非錯繆失倫輕重無準失其所以成已近而無以齊家猶愛而不知其子貪而不知其苖也無偏無黨王道蕩蕩則會歸有極矣是故修身以正心為本心正而天下平矣新安朱氏曰此傳之八章釋修身齊家辟猶偏也五者在人本有當然之則今接其事而不審其則則蹈於心所向之偏而身不修矣諺俗語也溺愛者不明貪得者無厭是則偏之為害而家之所以不齊也或問辟舊讀為譬而今為僻何也曰舊音舊説以上章例之而不合也以下文逆之而不通也是以間者竊以類例文意求之而得其説如此蓋曰人之於此五者情有所偏則失其好惡之公而身不修故不能齊其家耳然是五者乃身之接物所不能無而亦固有當然之理矣苟於是焉徒與之接而不能隨事省察以審其所當然之理則未有不因其所重而陷於所偏者也故偏於愛則溺焉而不知其惡矣偏於惡則阻焉而不知其善矣是其身之不修而目前之是非黑白且不能辨而況於閨門之內恩常掩義亦何以勝其情愛昵比之私而能有以齊之哉然原其所以不能察夫當然之理則又本於心不正而上章既言之矣龍泉葉氏曰所同所與者必親愛之所異所非者必賤惡之賢能者必敬畏之陷溺者必哀矜之是心之出因物而遷然未嘗反之以自喻也使其能反己以自喻則因人之是非賢否而可以自修其身好惡自公取舍自正又安有専好獨惡而失於偏勝者哉子不知其惡苖不知其碩徇已太重而失其中是故善修身者無他道焉好惡取舍日交於吾前而莫若反之以自喻而已矣此言修身至處其事愈明白可驗只就人情物理見之今所日用常行者便是不必精微妙窮益深測益逺也四明李氏曰大抵事之能纍其心者莫甚於好惡人之欲正於其心者亦莫若公其好惡然古今天下喜者多溢其美怒者多蓋其惡譽人者必過其實毁人者必失其真故見人之有善則親愛之畏敬之本不為失也自因其所親愛所畏敬而過有所好焉則是其所是而非天下之公是矣見人之不善則賤惡之哀矜敖惰之亦本不為失也自因其所賤惡所哀矜所敖惰而過有所惡焉則非其所非而非天下之公非矣是非之在天下初無兩立之理一離於公則必入於僻故大學一書丁寧於好惡者尤詳前論正心既曰心有所好樂則不得其正此論修身復曰好而知其惡惡而知其美及論治國則曰民之所好好之民之所惡惡之又曰惟仁者能好人能惡人而又戒之曰好人之所惡惡人之所好反覆諄諄不一而足學者能平心以察之反己以思之接於耳目者無非進德之基無非內省之要殆見虛明洞逹正平坦夷無有作好無有作惡推此以平天下可也豈特齊家而已哉新定錢氏曰論齊家在修其身却只説身之所以不修處若説身之所以修即是上章正心事矣立辭嚴密極宜細玩且於齊家利害愈更深切上章只説心之所以不正處文意亦如此上章四箇有所字此章六箇辟字其實皆心之病但上四者止是自身裏事此六者却施於人即處家之道也所以不同所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國堯舜帥天下以仁而民從之桀紂率天下以暴而民從之其所令反其所好而民不從是故君子有諸己而後求諸人無諸己而后非諸人所藏乎身不恕而能喻諸人者未之有也故治國在齊其家詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩云宜兄宜弟宜兄宜弟而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而后民法之也此謂治國在齊其家鄭氏曰一家一人謂人君也戾之言利也機發動所由也僨猶覆敗也民從之言民化君行也君若好貨而禁民淫於財利不能止也有於己謂有仁讓也無於己謂無貪戾也孔氏曰此一節覆明前經治國齊家之事成王戒康叔治民如保赤子愛之甚也心誠求之雖不中不逺言愛赤子者內心精誠求赤子之嗜欲雖不能正中其所欲然亦不甚逺治人之道亦當如此未有學養子而后嫁者言母之養子自然而愛中其嗜欲非由學習而能皆其本心如此一言僨事謂人君一言覆敗其事謂惡言也一人能定其國謂善政也古有此言記者引以結上事令謂號令所好者是惡所令者是善則是反其所好雖欲禁人人不從也非諸人非謂非責也所藏乎身不恕言無善行於身欲喻人為善行不可得也引周南桃夭之篇夭夭少壯蓁蓁茂盛喻婦人也之子是子也歸嫁也宜其家人宜其夫家之人也又引小雅蓼蕭之篇言成王有德兄弟相善相宜也引曹風鳲鳩之篇忒差也言威儀不差則可以正四方之國河南程氏曰今夫赤子未能言其志意嗜欲人所未知其毋必不能知之然不至誤認其意者何也誠心愛敬而已若使愛敬其民如其赤子何錯繆之有故心誠求之雖不中不逺矣又曰母之保養赤子始何嘗學當保養時自然中所欲推此心以保民設不中其下之所欲亦不逺矣藍田吕氏曰孟子曰為政不難不得罪於巨室巨室之所慕一國慕之巨室大家也仰而有父母俯而有妻子有兄有弟有臣有妾尊卑疏戚一國之事具矣嚴而不厲寬而有間此家之所以正也大家難齊也不得罪於大家則於治國也何有齊桓公五霸之盛由不能正其家死未及斂而國已亂矣故虞舜之世天下之為父子者定以瞽瞍底豫而已文王之時天下無犯非禮以刑于寡妻而已舉治家之心以加之於國雖有大小之間宜不逺矣故未有學養子而後嫁者也所謂一家一人者皆謂君也君者國之機也君仁莫不仁君義莫不義一正君而國定矣其機如此故國之本在家家之本在身可不慎歟民可使心服而不可使力服可以身帥而不可以令帥堯舜之仁桀紂之暴所以皆從其所好而不從其所令也有諸己而后求諸人無諸己而后非諸人此所以身帥而使人心服者也其道也自一人一家始故所以先之也宜其家人宜兄宜弟其父子兄弟之道不待諄諄教告家至而日見之也至誠足以孚其心儀刑足以親其外國之不治未之有也延平周氏曰一家仁一國興仁一人貪戾一國作亂治亂之機常發於一人而卒至於天下也如此嚴陵方氏曰事君以忠本乎事父之孝事長以順本乎事兄之弟使衆以仁本乎愛子之慈孝經曰君子之事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官正與此合所謂不出家而成教於國也赤子言新生體赤也母之養子以心度心皆其自然不必學也以言慈之所以使衆亦舉斯心加諸彼而已於仁讓皆曰一家於貪戾止曰一人者蓋貪戾之致亂其效尤易見也一言僨事則語所謂一言可以喪邦是也一人定國則詩所謂一國之事繫一人之本是也戾違於道也率者身為之先也有諸己而后求諸人無諸己而后非諸人皆內恕及人之道止言父子兄弟足法者本孝弟言之也石林葉氏曰上有好者下必有甚焉堯舜桀紂之率民者豈諄諄然命之哉以所好示之而已矣有諸己則人易從無諸己而后非諸人則人不怨先閨門則宜其家人次親族則宜其兄弟後國人則民以為法故孟子曰天下之本在國國之本在家家之本在身莆陽林氏曰治天下要領不出閨門衽席之上天下國家皆有父兄子弟唯在我者先正則推此而行亦皆如是文王之治岐也刑于寡妻至于兄弟以御于家邦故三百篇之詩遂以關睢為首非獨文王為然自堯舜禹湯以來皆用此道以治天下故在家莫親於父子兄弟家不正何以教人是以君子不出一家之中推此可以成教於國廬陵胡氏曰家人之彖先內後外以內為本內正而後家可齊也齊有威嚴之義凡物以猛為本者則患在寡恩以愛為本者則患在寡威家人主愛故尚威嚴其彖曰有嚴君焉其爻曰嗃嗃悔厲吉又曰威如終吉如此而後威克厥愛而家可齊矣如保赤子心誠求之謂當以誠存心也故家人又貴乎有孚未有威信不行乎家而國人化之者也養子者推心為之而得赤子之嗜欲蓋赤子之心唯誠而已心誠求之則不失赤子之心矣機謂發於近中於逺君者國之機其善惡亦發於身而加乎民也堯舜躬行仁而比屋可封從其仁也桀紂躬行暴而比屋可誅從其暴也率謂躬行也若己不行仁而禁民為暴是謂所令反所好有諸己已有善也無諸己已無惡也觀人善惡當於其私父子兄弟私也故父子兄弟足法而後民法之也家人初九間有家志未變也凡教在初而法在始家瀆而後嚴之志變而後間之而無及矣故齊家必曰先謂間於未變東萊吕氏曰有善於己然後可以責人之善無惡於己然後可以非人之惡恕謂推已及人也不能推已及人而但欲以言語曉諭人不可得也聞諸先生曰有諸己不必求諸人以求諸人而無諸己則不可也無諸己不必非諸人以非諸人而有諸己則不可也居仁范陽張氏曰事君之忠即在家之孝也事長之順即在家之弟也使衆之仁即在家之慈也豈有二道哉推孝事君推弟事長推慈使衆雖或時有齟齬不合參差不齊然其要處不過如是而已故大學引康誥如保赤子為證涵泳於斯而歌桃夭之詩以證此理又歌蓼蕭之詩以證此理又歌鳲鳩之詩以證此理想見大學之道雍容善端有如此之樂也新安朱氏曰此傳之九章釋齊家治國孝弟慈者家之所以齊者也能修之身以致其教則一家之人皆孝弟慈而國之所以事君事長使衆之道不外是矣引書而釋之以言慈幼之心非由外鑠推以使衆亦猶是耳有善於己然後可以責人之善無惡於己然後可以正人之惡皆推己以及人所謂恕也不如是則所令反其所好而民不從矣喻曉也此三引詩皆以咏嘆上文之事而又結之以治國在齊其家其味深長最宜潛玩或問如保赤子何也曰程子有言赤子未能自言其意而為之母者慈愛之心出於至誠則凡所以求其意者雖或不中而不至於大相逺矣豈待學而後能哉民能自言其意而使之者反不能無失於其心則以本無慈愛之實而於此有不察耳傳之引此蓋以明夫能教其家使無不慈則國人化之亦無不慈者而所以教之之本則在心誠求之一言耳初豈有他道哉曰仁讓言家貪戾言人何也曰善必積而后成惡雖小而可懼古人之深戒也書所謂爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗亦是意爾曰此章本言上行下效有不期然而然者今曰有諸己而后求諸人無諸己而后非諸人則是適修於內而遽欲以求乎外以己之僅免而遂欲責人之必無也曰此為治其國者言之則推吾所有與民共由其條教法令之施賞善罰惡之政固有理所當然而不可已者但以其所令反其所好則民不從故又推本言之而欲其先有以成已非欲矜己之長愧人之短而脅之以必從也故先君子之言曰有諸己不必求諸人以為求諸人而無諸己則不可也無諸己不必非諸人以為非諸人而有諸己則不可也正此意也曰然則未能有善而遂不求人之善未能去惡而遂不非人之惡斯不亦恕而終身可行乎哉曰恕字之指以如心為義蓋曰如治己之心以治人愛己之心以愛人而非苟然姑息之謂也然人之為心必當窮理以正之使其所以治己愛己者皆出於正然後可以即是推之以及於人而恕之為道有可言者故大學之傳最後兩章始及於此則其用力之序亦可見矣至即此章而論之則欲如治己之心以治人者又不過以強於自治為本蓋能強於自治至於有善然後可以求人之善無惡然後可以非人之惡然後推以及人使之亦如我之所以自治而自治焉則表端影正源潔流清而治己治人無不盡其道矣所以終身力此而無不可行之時也今乃不然而直欲以不肖之身為標凖視吾治教之所當及者以姑息待之不相訓誥不相禁戒使天下之人皆如己之不肖而淪胥以陷焉是乃大亂之道豈所謂終身可行之恕哉近世名卿之言有曰人雖至愚責人則明雖有聰明恕己則昏苟能以責人之心責已恕己之心恕人則不患不至於聖賢矣此言近厚世亦多稱之者但恕字之義本以如心而得故可以施之於人而不可施之於己今曰恕己則昏則是己知其如此矣而又曰以恕己之心恕人則未知所謂恕己之心何耶其或未得此心之正則恐其猶未免於昏也若之何其可以推己及人哉藉令其意但欲反此心以施於人其亦只可以言下章愛人之事而於此章治人之意與夫中庸以人治人之説則皆有未合者蓋其為恕雖同而一以及人為主一以自治為主則二者之間毫釐之異正學者所當深察而明辨也至漢光武謂郅惲善恕已量主此又啓為人臣者以賊其君之罪一字之義不明其禍乃至於此可不謹哉曰三詩之序首言家人次言兄弟終言四國亦刑于寡妻至于兄弟以御于家邦之意也曰既結上文而復引詩者三何也曰古人言必引詩蓋取其嗟嘆咏歌優遊厭飫有以感發人之善心非徒取彼之文證此之義而已也夫以此章所論齊家治國之事文具而意足矣復三引詩非能於其所論之外别有所發明也然嘗試讀之則反復吟咏之間意味深長義理通暢使人心融神會有不知手舞而足蹈者是則引詩之助與為多焉蓋不獨此也凡引詩云者皆以是而求之則引者之意可見而詩之為用亦得矣永嘉薛氏曰內外之合所謂恕也已所不欲勿施於人一言而可以終身行之者篤恭而天下平用此道也孔子曰其身正不令而行其身不正雖令不從龍泉葉氏曰君子不出家而成教於國不知足而為屨我知其不為蕢也患不為屨耳豈有為蕢者哉古人有慈孝之實推而行之則事其父者所以為事君事其兄者所以為事長使天下容受羣衆皆由此見之若徒即其名而不盡其實則雖行於一家而格於其人者乃其勢也不自知其不至而托孝慈之空言與徒即其名而望天下之自化二者皆失之矣又曰心誠求之雖不中不逺矣未有學養子而後嫁者也此言至切施於當事者對病之神藥照形之明鏡也自下以首尾次第論如必待齊家治國而後用之則有所繫縳效反不得專矣所謂大學者以其學而大成異於小學處可以修身齊家出可以治國平天下也然其書開截箋解彼此不相顧而貫穿通徹之義終以不明學者又逐逐焉章句分析隨又為説名為習大學而實未離於小學此其可惜也哉江陵項氏曰有諸己而後求諸人無諸己而後非諸人此為治人者言之也左氏傳所謂無瑕者可以戮人也子欲善而民善矣有諸己而後求諸人也苟子之不欲雖賞之不竊無諸己而後非諸人也此所謂治國在齊其家也若謂治己則有諸己而求諸人是以其所能者病人也無諸己而非諸人是以人之所不能者愧人也非制行之法也故嘗謂此章當與表記仁之難成章並觀霅川倪氏曰嫁而有子必知養之之方不待預學而後能此譬養民之道不待臨政而後學也宜兄者兄友其弟宜為人兄而弟亦宜之宜弟者弟敬其兄宜為人弟而兄亦宜之以其兄弟友睦而更相教故能推一國之人為兄弟者皆化之無不相宜者新定錢氏曰君子之德風小人之德草草上之風必偃不幸為人上者為貪刻為暴戾則從風而靡必有甚焉者矣仁讓説一家貪戾却只説一人仁讓之化止於仁讓貪戾之禍遂至作亂可不謹歟可不懼歟所藏乎身不恕而欲以空言呶呶於人不可得矣恕字是一章之綱領已行得人亦行得國亦行得此所以成教所以興所以從若只是自家偏私之説如何能喻新定邵氏曰於文如心為恕己所不欲勿施於人者恕也已所不欲而施於人是謂不如其心非恕也所藏乎身不恕而能喻諸人者未之有也喻猶曉也聞有仁義根心睟面盎背瞻其容貌不言而喻者矣未聞矯飾為欺色取仁而行違者能使夫人心孚而意喻者也所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有潔矩之道也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國鄭氏曰老老長長謂尊老敬長也恤憂也民不倍不相倍棄也潔猶結也挈也矩法也君子有挈法之道謂常執而行之動作不失之倍或作偝矩或作巨潔矩之道善持其所有以恕於人耳治國之要盡於此引詩言治民之道取於己而已巖巖喻師尹之髙嚴也師尹天子之大臣為政者也言民皆視其所行而則之可不慎其德乎邪辟失道則有大刑師衆也克能也峻大也言殷王帝乙以上未失其民之時德亦有能配天者謂天饗其祭祀也及紂為惡而民怨神怒以失天下監視殷時之事天之大命持之誠不易也道猶言也孔氏曰自此至終篇覆明上文平天下在治其國之事蓋治國非一義可了故廣而明之此經申明潔矩之義上有不善之事加己己惡之則不可持此事使己下者為之下不善事己己惡之則不可以此事己之君上也前謂在己之前後謂在己之後左右謂與已平敵或在己右或在己左舉一隅餘可知也引小雅南山有臺美成王之詩言以已化民從民所欲則可為民父母只語辭也上言恕己待民此經言己須戒慎引詩小雅節南山之篇節髙峻貌赫赫顯盛貌具俱也僇謂刑戮若桀紂是也殷之未喪師以下大雅文王之篇儀宜也藍田吕氏曰孟子曰道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平蓋所謂平者合內外通彼我而已天下同歸而殊塗一致而百慮天下雖廣出於一理舉斯心以加諸彼推而放諸四海而準無往而非斯心也猶五寸之矩足以盡天下之方此潔矩之道也上下也左右也前後也彼我之别也通乎彼我交見而無蔽則民也君也將何間哉此所以為民父母而天下瞻仰之矣故所以得國以得衆也所以得衆以有德也范氏曰漢書云度長潔大注曰潔圍束之也莊子潔之百圍亦謂圍而度之也矩所以為方潔矩言度之以求其方也既度其上又度其下既度其下又度其上於前於後於左於右莫不皆然不使少有大小長短之差焉是以物我各適其適無往而不得其方也天下者國之積耳以此推之則自一國以至於萬國一理而已祖禹范陽張氏曰修身齊家治國平天下雖所由不同其理則一而已其一如何審好惡而已矣故修身之法無他省吾所親愛賤惡畏敬哀矜敖惰而已豈非當審吾好惡乎齊家之道無他一家仁一國興仁一人貪戾一國作亂而已豈非當審吾好惡乎治國之道無他民之所好好之民之所惡惡之豈非當審吾好惡乎而平天下之道亦在於好惡之審則老老而民起孝長長而民起弟恤孤而民皆為忠厚之行所惡之審則毋以吾所惡於上者施之於下毋以吾所惡於下者施之於上毋以吾所惡於後者施之於前毋以吾所惡於右者施之於左是則平天下之理果在審好惡而已矣又曰文王之詩言商未失衆時克配上帝至紂失天下其膚敏之士反為周祼將之役天命如此可不以為戒乎且斷之曰得衆則得國失衆則失國何以得衆曰德此君子所以先慎乎德也石林葉氏曰老者近於親故民興於孝長者近於兄故民興於弟恤孤近於子故民不倍以此倡於上潔之道也以此法於下矩之道也上下以位言之也前後以事言之也左右以人言之也位之與事事之與人雖不同而其好惡則一也故好同其所好惡同其所惡而後可以為民父母莆陽林氏曰一人在上使天下人心固結而不可解者必有正道焉蓋四方萬里之逺若非有以固結之則如何長有天下故詩以為民之父母者無他唯與天下同其好惡而已若是好惡與天下不相關此之謂獨夫爾新安朱氏曰自此至篇末傳之十章釋治國平天下皆推廣潔矩之意也老老所謂老吾老也興謂有所感發而興起也孤者幼而無父之稱潔度也矩所以為方也言此三者上行下效捷於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願則上下四旁均齊方正而天下平矣又覆解上文潔矩二字之義如不欲上之無禮於我則必以此度下之心而亦不以此使之不欲下之不忠於我則必以此度上之心而亦不以此事之至於前後左右無不皆然則身之所處上下四旁長短廣狹彼此如一而無不方矣彼同有是心而興起焉者又豈有一夫之不獲哉所操者約而所及者廣此平天下之要道也故章內之意皆自此而推之南山有臺之篇言能潔矩而以民心為己心則是愛民如子而民愛之如父母矣節彼南山節讀為截節然髙大貌師尹周之大師尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能潔矩而好惡徇於一己之偏則身弒國亡為天下之大戮矣引詩文王篇配對也配上帝言其為天下君而對乎上帝也監視也不易言難保也引詩而言此以結上文兩節之意有天下者能存此心而不失則所以潔矩而與民同欲者自不能已矣或問上章論齊家治國之道既以孝弟慈為言矣此論治國平天下之道而復以是為言何也曰三者人道之大端衆心之所同得者也自家以及國自國以及天下雖有大小之殊然其道不過如此而已但前章専以已推而人化為言此章又申言之以見人心之所同而不能己者如此是以君子不唯有以化之而又有以處之也蓋人之所以為心者雖曰未嘗不同然貴賤殊勢賢愚異稟苟非在上之君子真知實蹈有以開之則下之有是心者亦無所感而興起矣雖幸其有以倡焉而興起之矣然上之君子乃不能察彼之心而失其所以處之之道則其所興起者或不得遂而反有不均之歎是以君子於其心之所同而得夫潔矩之道焉所以處此而遂其興起之善端也曰何以言潔之為度也曰此莊子所謂潔之百圍賈子所謂度長潔大者也前此諸儒蓋莫之省強訓以挈殊無意謂而先友太史范公乃獨嘗言此而後其理可得而通蓋潔度也矩所以為方也以己之心度人之心知人之所惡者不異乎己則不敢以己之所惡者施之於人使吾之身一處乎此則上下四方物我之際各得其分不相侵越而就其中較其所占之地則廣狹長短平均如一截然正方無有餘不足之處是則所謂潔矩者也夫為天下國家而所以處心制事者一出於此則天地之間無一物不得其所而凡天下之欲為孝弟不倍者皆得以自盡其心而無不均之歎矣天下其有不平者乎然君子之所以有此亦豈自外至而強為之哉亦曰物格知至故有以通天下之志而知千萬人之心即一人之心意誠心正故有以勝一己之私而能以一人之心為千萬人之心其如此而已矣一有私意存乎其間則一膜之外便為胡越雖欲潔矩亦將有所隔礙而不能通矣若趙由為守則易尉而為尉則陵守王肅方於事上而好人佞已推其所由蓋出於此而充其類則雖桀紂盜跖之所為亦將何所不至哉曰然則潔矩之云是則所謂恕者己乎曰此固前章所謂如愛己之心以愛人者也夫子所謂終身可行程子所謂擴充得去則天地變化草木蕃充拓不去則天地閉而賢人隱皆以其可以推之而無不通爾然必自其正心窮理而推之則吾之愛惡取舍皆得其正而所推以及人者亦無不得其正是以上下四方以矩度之莫不截然各得其分若於理有未明而心有未正則吾之所欲者未必其所當欲吾之所惡者未必其所當惡乃不察此而遽欲以是為施於人之準則則其意雖公而事則私是將見其物我相侵彼此交病即雖庭除之內跬步之間亦且參商矛盾而不可行矣尚何終身之望是以聖賢凡言恕者又必以忠為本而程子亦言如形與影欲去其一而不可得蓋唯忠然後所如之心始得其正是亦此篇先後本末之意也然則君子之學可不謹其序與或曰齊家治國平天下均為治人之事而傳於齊家以審愛惡為言於治國以躬化導為説於平天下則必以潔矩明之豈三者之用各有所施而不可以相通耶曰此亦各隨所重而言之其用益廣而法益詳耳若論其實則齊家者豈無待於躬化導而參彼己治國者亦安可不審愛惡而參彼己况平天下必自齊家治國而來則二者之用固有不得遺者但以其先後廣狹而言則三者之序必如此而不可亂耳曰所謂民之父母者何也曰君子有潔矩之道故能以己之好惡知民之好惡又能以民之好惡為己之好惡也夫好其所好而與之聚之惡其所惡而不以施焉則上之愛下真猶父母之愛其子矣彼民之親其上豈不亦猶子之愛其父母哉曰此所引節南山之詩何也曰言在尊位者人所觀仰不可不謹若人君恣已徇私不與天下同其好惡則為天下僇如桀紂幽厲也曰得衆得國失衆失國何也曰言能潔矩則民父母之而得衆得國矣不能潔矩則為天下僇而失衆失國矣龍泉葉氏曰潔是矩者非難也天下之方至於矩而止天下之圓至於規而止天下之長短至尺度而止天下之曲直至繩墨而止天下之輕重至權量而止是物之在我也潔以示之而何患焉雖然其所以為矩則難矣使其毫釐之不盡斯須之或虧自內至外由本及末而或有不足焉則矩不成則雖欲潔之以示人不可得矣聖賢之學自其內心之發推之於外修身齊家撙節端序各有倫等而不可亂者皆為矩之地也堯舜禹湯文武潔成矩以示天下而天下從之故凡天下之有未安者必求於我而我不以其所未至者病天下也孟子曰舜為法於天下可傳於後世則舜之矩也大矣究極潔矩之道不過於恕而已上下左右前後物未有不具四隅而能獨立者也然而天下之人所藏於身者不恕則見於前者必忘其後得於上者必失於下以其所惡者盡力施之而不知彼之不能受也夫是以患莫大於自利而害常生於有所偏君子盡已而及人因人而通已交取互見仰觀俯察在我欲其無憾在彼欲其無怨知天下之一理彼我之一心則規矩在我而物之方圓者莫能踰權量自我而其自為輕重者無所惑自致知格物以至於平天下其必有出於是道不出於是則意有誠而非其意心有正而非其心施於天下國家者且有不合矣建安真氏曰潔矩潔字本出賈誼過秦論度長潔大度謂以尺量物之長短潔謂以帶量物之小大如今人之圍木也言我有此心人亦有此心在上之君子當以己之心度人之心如以矩而度物也矩製方之器俗謂曲尺是也荀子曰五寸之矩盡天下之方言矩雖止長五寸然天下之為方器者必以此焉則以譬一心雖微而推之以度人之心雖千萬人無不同者我欲孝於親人亦欲孝於親我欲弟於長人亦欲弟於長故為君子者必使人各得以遂其孝弟之心我欲安人亦欲安我欲夀人亦欲夀我欲富人亦欲富故君子者必使人各遂其所欲此皆所謂潔矩也錢塘于氏曰君子以此三者為潔矩之道以明明德於天下者苟不由是三者之善以為矩則民情未易平也平之之道如何使上下前後左右皆不以其所惡自纍則是皆以其所好者相與無一人不孝不弟不慈矣其為矩也莫明焉故曰此之謂潔矩之道蓋言天下無一人不明於矩也易言萬物之潔齊記言主人之潔著此水亦其義也嗚呼天下之所真可好者孰非孝弟慈之三者而其所真可惡者孰非不孝不弟不慈之三者今因民之所好而好之因民之所惡而惡之則上之好惡平上之好惡平則人心平人心平則天下平矣霅川倪氏曰前言潔矩之道謂正已格民後言潔矩之道謂體物正已新定邵氏曰矩所以為方也上下四旁長短廣狹均齊若一而後成方所謂潔矩者猶言斟量忖度舉斯加彼使之均平也所惡於上毋以使下所惡於下毋以事上味斯言也則君使臣以禮臣事君以忠其或上之使我不以禮吾之所惡也則吾之所以使下者烏可不以禮下之事我不以忠吾之所惡也則吾之所以事上者烏可不以忠審度彼我事皆若此則上下各得其所欲矣所惡於前毋以先後所惡於後毋以從前充此類也則户外有二屨言聞則入言不聞則不入者慮其有妨於前也有後入者闔而勿遂慮其有妨於後也審度彼我事皆若此則前後各得其所願矣以至右之所惡者則不以交於左左之所惡者則不以交於右姑即夫並坐不橫肱之義而推之則其理亦可見矣夫上下前後左右皆得其平則截然正方合於矩矣大學於是釋之曰此之謂潔矩之道斯道也豈非平治天下者所當舉而措之乎吾嘗求諸古矣老吾老以及人之老固可以興民心之孝也然考之王制必五十而異粻六十而宿肉七十而二膳以至八十而後常珍九十而後飲食不離寢何其斟酌劑量曾不一槩也不如是則可以暫而不可以久區處未適其平非所謂潔矩之道也長吾長以及人之長固可以興民心之弟也然質之祭義如是而弟逹乎朝廷如是而弟逹乎道路如是而弟逹乎州巷以至放乎獀狩修乎軍旅莫不隆長而尚齒何其流通周溥靡有或遺也不如是則逹於此而不逹於彼區處未適其平非所謂潔矩之道也矜寡孤獨廢疾者皆有所養固可以使民相收相受不相棄倍也然古人抑豈槩而施之不思為可繼之道哉孤獨矜寡四者天民之窮而無告者也皆有常餼以養之矣至於瘖癃跛躃斷者侏儒則百工各隨其器能而食之使廢疾者不患於無所收而百工亦不虛於推所養也古人潔矩之道一至於此則經理區畫曲盡其宜天下其有不得其平者乎禮記集説卷一百五十二
