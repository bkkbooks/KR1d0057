body:
  text: 禮記集說卷八十八宋衛湜撰學記第十八孔氏曰案鄭目録云名曰學記者以其記人學教之義此於別録屬通論發慮憲求善良足以謏聞不足以動衆就賢體逺足以動衆未足以化民君子如欲化民成俗其必由學乎鄭氏曰憲法也言發計慮當擬度於法式也求謂招來也謏之言小也動衆謂師役之事就賢就謂躬下之體猶親也所學者聖人之道在方䇿孔氏曰此一節明雖有餘善欲化民成俗不如學之為重發謂起發慮謂謀慮舉動能擬度於法式故云發慮憲又能招求善良之士以自輔則可以少有聲聞不足以動衆賢謂德行賢良屈下從就之逺謂才藝廣逺心意能親愛之恩被於外故足以動衆也仁義未備未足以化民也君子君謂君於上位子謂子愛下民謂天子諸侯及卿大夫欲教化其民成其美俗非學不可鄭恐所學者唯小小才藝之事故云所學者聖人之道也橫渠張氏曰求善良求為良善之人也就賢體逺就謂躬下之體謂體逺大之事足以動衆若燕昭下士可以有聞于人也未足以化民就賢下士在乎他人而不在乎己未能成德也其必由學乎何謂學成德謂之學學在乎推廣而不可以不思清江劉氏曰發慮憲者言發動知慮能求憲法也動讀如中庸明則動之動言此皆徒善未足以動人也就賢體逺賢謂賢於人之賢逺謂逺於人之逺可以動人矣未能使人化也凡動者言矜式之化者言心服之唯學可以化民成俗謂其所傳者博所教者衆見之者詳也長樂陳氏曰致防患之思為慮則德義之經為憲存其可欲為善充善之至為良友天下之善士就賢者也尚論古之人體逺者也古之論誠者誠則形形則著著則明明則動動則變變則化是動之所發為化化之所始為動詩序言風以動之教以化之楊子言鼓衆動化天下雖皆始終相成要之本於誠一也孟子曰誠而不動者未之有也不誠未有能動者也不誠未有能動則動本於誠可知子思云唯天下至誠為能化則化本於誠可知由是觀之唯誠為能動唯至誠為能化延平周氏曰憲與憲章文武之憲同發已之所慮與己之所憲求人之善與人之良者足以小有聞而不足以動衆蓋善良者未至於賢故止於有聞而已就其賢者而師之體其逺者而行之足以動衆而未足以化民蓋就賢體逺則止於成己而已如欲化民成俗則必由學蓋學者一道德之源道德一然後可以化民成俗馬氏曰慮者求諸已者也憲者法先王者也求善良資於人者也雖然此細行而已中庸言為天下國家之經而以尊賢繼修身之後所謂賢者非特如善良而已動衆政也化民道也學以致其道而以教之則足以化民成俗矣山隂陸氏曰就賢進於求善體逺進於發慮變言未足非不足以化民也新安朱氏曰動衆謂聳動衆聽蓋守常法用中材其效不足以致大譽逺謂疏逺之士下賢親逺足以聳動衆聽使知貴德而尊士然未有開導誘掖之方也故未足以化民唯教學可以化民使成美俗永嘉戴氏曰夫求賢以自輔屈己以下賢人君之治莫先於此而皆不如建學之功何也蓋求賢以自輔足以資人君多聞之益屈己以下賢足以興起天下為善之心然學校不立教養闕然天下之人雖欲為善而無所考德問業其賢者固已用矣而未賢者將孰從而成就之故化民成俗必由學校其所及者廣所傳者逺也大抵天之生賢實難其生賢也所以扶植國家以為民命其既生也又賴上之人教養成就之若舍之不教使之斫喪戕賊則自暴自棄往往而是國家何賴焉此建學之功所以為大也慶源輔氏曰發慮憲謂所發之志慮合乎法式求善良乃是發慮憲之事也動與風以動之之動同小小聲聞不足以動衆也就賢如孟子所謂欲有謀焉則就之也體與中庸體羣臣之體同體逺如武王不忘逺之意古之教者家有孰黨有庠術有序國有學所以體逺也就賢則尊德之誠至體逺則愛民之仁深其仁心仁聞固足以感動天下矣然法度未立政事未舉故未足以化民故曰堯舜之道不以仁政不能平治天下教學政之先務也玉不琢不成器人不學不知道是故古之王者建國君民教學為先兊命曰念終始典于學其此之謂乎鄭氏曰教學謂內則設師保以教使國子學焉外則有大學庠序之官典經也言學之不舍業也兊當為說高宗夢傅說求而得之作說命三篇在尚書今亡孔氏曰此一節論喻學之為美故先立學之事王者建立其國君長其民內設師保外設庠序以教之記者明教學事重不可暫廢故引兊命以證之鄭不見古文尚書故云今亡長樂陳氏曰玉則璞之至美者也人則性之至貴者也器待琢而後成茍不琢焉雖其質至美不成器者有矣道待學而後知茍不學焉雖其性至貴不知道者有矣聘義曰君子比德於玊終之以天下莫不貴者道也經曰大道不器是則以器明道非大道也特就所學者言耳又曰詩云魯侯戾止在泮飲酒順彼長道屈此羣醜由是知魯侯非特在泮教人抑又在泮學而受教焉順彼長道學而受教之謂也豈非念終始典于學之意歟嚴陵方氏曰道則器之所出也器則道之所寓也故以器比道天子則有辟雍諸侯則有頖宫始於學終於教教亦學也山隂陸氏曰以玉取譬玉之質美者也故曰大匠不能斫冰永嘉戴氏曰玉不琢而碔砆琢之則碔砆猶為可用玉蓋不及也大抵資質之美不足恃資質之美而未嘗學問其與資質不美者均爾夫子曰好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂好仁好知好信好直好剛好勇此天下至美之質也愚蔽賊絞狂亂此天下至不美之事也有天下至美之質一不好學陷於天下之至惡況夫資質不美而又不學小而害身大而害人其禍豈不大可畏乎夫人之所以貴於為學者謂其知道也道本在我人唯不學故有所不知則道與人為二物茍不知道則觸事面牆其意皆以善為之而卒陷於不義者多矣況於死生禍福之際乎昔者子游舉夫子之言曰君子學道則愛人小人學道則易使由此語觀之三代之時小人固亦知學矣小人賤隸之詩聖人取焉則小人固知學也蓋自黨庠遂序以達於學民之秀異者固已舉而用之而其下焉者亦知有義理天下安得而不易治蓋三代之學如人堂室然寢於斯食於斯生長於斯未嘗一日不葺後之學校如園圃然有之徒為美觀而已李氏曰建國以教為先君民以學為先故曰建國君民教學為先也詩曰鎬京辟雍自西自東自南自比無思不服言辟雍成而天下服教也訪落成王謀于廟而羣臣進戒曰學有緝熙于光明言學日益緝熙于光明學也慶源輔氏曰由此觀之則古之王者以君子長者待天下而務使天下皆為君子長者之歸至於用刑法以治不軌皆非得已也教學謂在上者教之在下者學之典常也兊命曰此斷章取義雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也是故學然後知不足教然後知困知不足然後能自反也知困然後能自強也故曰教學相長也兊命曰學學半其此之謂乎鄭氏曰㫖美也學則睹己行之所短教則見己道之所未達自反求諸己也自強修業不敢倦也學學半言學人乃益己之學半孔氏曰此一節明教學相益嘉善也至謂至極不足謂己之所短困謂困弊困則甚于不足矣嚴陵方氏曰肴有味唯食之然後可以辨其味道有理唯學之然後可以窮其理然而味有㫖否唯肴之嘉者為㫖理有善惡唯道之至者為善人莫不飲食鮮能知味也此以食喻道者也以道之難明故所況如此若夫造道之全則淡乎其無味又豈肴之可比哉足則厭矣故學以不厭為知困則倦矣故教以不倦為仁知其不足然後能自反以求其足知其困然後能自強以濟其困自反若所謂自反而仁之類自強若所謂自強不息之類教人之功得學之半故引說命之言以證之上學字宜讀曰斆說命亦作斆斆即教也孔子曰起子者商也又曰回也非助我者也於吾言無所不說豈非斆學半之謂乎永嘉戴氏曰天下之事履之而後知故聞見之與身親其知不同如羅列盛饌非不美也人皆見之而食者為知味道在天下非不高且美也人皆仰之而學者為知善中庸曰人莫不飲食也鮮能知味也食者猶未必能知味況未嘗食者乎夫子謂冉有曰力不足者中道而廢今汝畫蓋冉子以畫為不足故夫子責之譬如行百里者至中道而止力不足也畫則未嘗出門安知力之不足也故曰學然後知不足人唯知不足然後能自反若自以為足豈復有反己之功長樂陳氏曰人皆有所不足非學無以知皆有所困非教無以覺是以顔淵學孔子之道然後知其卓然不可及此學而後知不足者也任人問禮食之重而屋廬子至於不能答此教然後知困者也夫彼不足而求於我之教所以長於彼我之知因自強則學者所以長於我故曰教學相長也方其學也未嘗不教及其教也未嘗不學此說命所以言斆學半也橫渠張氏曰困者益之基也學者之病正在不知困爾自以為知而問之不能答用之不能行者多矣東萊吕氏曰人皆病學者自以為是但恐其未嘗學耳使其果用力於學則必將自進之不足而何敢自是哉又曰不能自反自強皆非真知者也若疾痛之在吾身然後為真知蓋未至聖人安能無缺闕須深思缺闕在甚處然後從而進之茍泛然以為我有所未足夫何益哉慶源輔氏曰此因上教者學者而推言之能自反則在己無不足者能自強則亦未有力不足者馬氏曰能自強而興之則進於學矣是以教長學也自反而得之則優於教矣是以學長教也山隂陸氏曰所謂教學教之中有學學之中有教是之謂相長古之教者家有孰黨有庠術有序國有學鄭氏曰術當為遂古者仕焉而已者歸教於閭里朝夕坐於門門側之室謂之孰周禮五百家為黨二千五百家為遂黨屬於鄉遂在逺郊之外孔氏曰自此至之謂乎一節明國家立庠序上下之殊并明入學年歲之差古之教者謂上代也周禮百里之內二十五家為閭同共一巷巷首有門門邊有孰謂民在家之時朝夕出入恆受教於孰白虎通云古之教民百里皆有師里中之老有道德者為里右師次為左師教里中之子弟以道藝孝弟仁義也鄭注仕焉而已者已猶退也謂仕年老而退歸者案書傳說云大夫七十而致仕而退老歸其鄉里大夫為父師士為少師新穀已入餘子皆入學距冬至四十五日始出學上老平明坐於右孰庶老坐於左孰餘子畢出然後皆歸夕亦如之此謂家有孰也庠序皆學名於黨中立學教閭中所升也於遂中立學教黨學所升也案周禮六鄉之內五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉六遂之內五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂今此經六鄉舉黨六遂舉序則餘閭里以上皆有學可知故鄭注云歸教於閭里其比與鄰近止五家而已不必皆有學也又周禮遂人掌野之官百里之外故鄭知遂在逺郊之外也鄭注州長職云序州黨之學則黨學曰序也鄉飲酒云主人迎賔于庠門之外注云庠鄉學也則鄉學曰庠此云黨有庠遂有序者蓋黨為鄉學之庠不別立序凡六鄉之內州學以下皆為庠六遂之內則縣學以下皆為序也或云黨有庠謂夏殷禮非周法義或然也國謂天子所都及諸侯國中也周禮天子立四代學以教世子羣后之子及鄉中俊選所升之士也諸侯但立時王之學故云國有學新安朱氏曰或問古者庶人子弟入學者亦皆有以養之否答曰不然古者教士其比閭之學則鄉老坐于門而察其出入其來學也有時既受學則退而習於其家及其升而上也則亦有時春夏耕耘餘時肄業未聞上之人復有以養之也夫既給之以百畝之地矣又給之以學糧亦安得許多糧給之邪周禮自有士田可考長樂陳氏曰董氏言王者立大學以教於國設庠序以化於邑則家孰黨庠術序所謂鄉學而化於邑也國有學所謂大學而教於國也大司樂掌成均之法以治建國之學政則成均之學豈非國有學之謂歟以義求之孰者孰也言習孰乎灑掃應對進退之事將由末以致本者也庠者養也言養人材而成之非特口體而已序者射也言以射別行能而進非特主皮而已學則本天人之道而覺之非特為利而已又曰家言其孰則凡鄉遂之家皆孰也遂言其序則凡鄉遂之路皆序也學者自比而至於鄉自鄰而至於遂近而出入之所習孰逺而往來之所次序文德之盛無大於此山隂陸氏曰黨有庠則鄙有序遂有序則鄉有庠鄉有庠則州有序州有序則縣有庠六鄉貴庠則以養之為義六遂貴序則以別之為義又新說曰周人設庠序學校具於六鄉六遂之中非謂於一處設一學而已周官州長言射于州序則所謂序者州亦有之而不獨有於遂也黨正言飲酒于序則所謂黨者又有序矣不獨有於庠也王制曰耆老皆朝于庠習射上功習鄉尚齒鄉飲酒曰迎賔于庠門之外則所謂庠者鄉亦有之不獨有於黨也春秋傳曰子産不毁鄉校則鄉又有校矣不獨有乎庠也由是言之則庠序學校之制其於鄉遂蓋各具矣不必於鄉有庠於遂有序也故孟子設為庠序學校以教之而不分所在之地蓋此數學鄉遂中通有也學記曰國有學家有孰黨有庠術有序蓋術之言路也讀如經術之術鄭氏謂術為遂非也蓋記此者言古之教人者以外則國有學以內則家有孰於黨則有庠以待其居者於路則有序以待其行者以明先王之教人其大略如此非以盡天下之學而已也宗鄭氏者遂以為鄉有庠遂有序而已此不該不遍一曲之論也李氏曰古者國有學州有序族黨有庠比閭有孰縣遂同于州鄉鄼鄙同于黨族鄰里同于比閭此經于六遂言序以見鄉之黨于六鄉言黨以見遂之鄙于縣遂之學言遂于族黨之學言黨舉大以兼于小比閭鄰里之學言家舉小以見大此先王之法言所以常約而詳也康成謂六鄉之學皆曰庠六遂之學皆曰序則誤矣永嘉戴氏曰班固云里有序鄉有庠序以明教庠則行禮而視化焉周禮於鄉遂獨不載庠序事止於州長言春秋以禮㑹民而射于州序黨正亦言國索鬼神而祭祀則以禮屬民而飲酒于序說者以為序者州黨之學也禮記曰耆老皆朝于庠說者曰此庠鄉學也既曰黨庠術序又曰里序鄉庠又曰州黨有序雖所載不同要之州鄉里之間通謂之庠序不得謂之學唯天子諸侯得稱學爾孟子曰夏曰校殷曰序周曰庠禮記又有上庠下庠東序西序左學右學東膠虞庠之名四代之學其名又多不同大抵後人多祖述前人之名也延平周氏曰養人之有序故自家至國皆立之學建安真氏曰案古教法其近民者教彌數故二十五家為閭閭有孰民朝夕處焉四閭為族則歲之讀法者十有四法者何大司徒所頒之三物也士生斯時不待舍去桑梓而有學有師敬敏任恤則閭胥書之孝弟睦姻則族師書之其所以教又皆因性誘民而納諸至善之域禮鎔樂冶以成其德達其材古者作人之功蓋如此今之世里於民最近而無學士常輕去土著而事逺游行之修窳無所乎考至其設教則以琢辭鎪句為巧詭聖僻說為能非惟無以淑其人抑且重斫喪之也比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達強立而不反謂之大成夫然後足以化民易俗近者說服而逺者懷之此大學之道也記曰蛾子時術之其此之謂乎鄭氏曰比年入學者每歲來入也中猶間也鄉遂大夫閒歲則考學者之德行道藝周禮三歲大比乃考焉離經斷句絶也辨志謂別其心意所趣鄉也知類知事義之比也強立臨事不惑也不反不違失師道也逺者懷之懷來也安也蛾蚍蜉也蚍蜉之子微蟲爾時術蚍蜉之所為其功乃復成大垤孔氏曰每閒一歲鄉遂大夫考校其藝下一年三年五年七年之類是也入大學者自國家考校之未入大學則鄉遂大夫考校也鄭引周禮大比考校則此中年考校非周禮也學者初入學一年鄉遂大夫於年終考視其業也離經謂離析經理使章句斷絶辨志謂辨其志意趣向習學何經敬業謂藝業長者敬而親之樂羣謂朋友善者願而樂之博習謂廣博學習親師謂親愛其師論學謂學問嚮成論說學之是非取友謂選擇好人取之為友此七年之學其業小故曰小成九年則視其知義理事類通達無疑強立不反則是大學聖賢之道記禮者引舊記之言故云蛾子時術之蛾子小蟲蚍蜉之子時時術學銜土之事而成大垤猶如學者時時學問而成大道長樂陳氏曰比年者必再歲也周官鄉大夫三年大比則考其德行道藝則所謂中年者必三歲也比年一小聘三年一大聘諸侯之於天子也比年入學中年考校學者之於庠序也蓋學者由積而成自小而至大教者因年而視自一而至九皆中年以考校以校三歲之實也離經以審其師授辨志以别其趣嚮敬業而不慢則不知燕辟之為可尚樂羣而不厭則不知燕朋之為可從博習而詳說則理無不窮親師而信道則功無不倍學有先後而知所論友有損益而知所取知類通達有以盡知之所及強立不反有以盡仁之所守由離經辨志至於論學取友則可與適道而未可與立學之小成者也必四進而後視之知類通達強立而不反則可與立矣學之大成者也尚何事於視為哉今夫王道以九變成化簫韶以九變成樂則學以九年大成亦天數之常為學日益之事也知類通達而見善明強立不反而用心剛權利不能傾羣衆不能移天下不能蕩夫然後內能定外能應非夫以善養人而服天下孰能與此今夫蛾有君臣之義言蛾子又有父子之道焉內則父子外則君臣人之大倫也大學之道所以明人倫也故取此以明之僖公作頖宫於魯禮教達而國人從之德義達而淮夷懷之武王立辟雍於鎬京自西自東自南自北無思不服其學雖殊其成功一也化民易俗始也化民成俗終也近者說服逺者懷之教也近者說逺者來政也嚴陵方氏曰人不可一日不學故比年入學又不可比年而視之故中年考校如下所言皆其事也離經考經之文也離其經矣因習之以為業敬業者修其業而不敢慢也志既辨則與之同志者在所樂矣樂羣居而不厭之謂也樂羣則上足以親師而為之法上能親師則下足以取友以為之助故繼之以取友上有師以為之法下有友以為之助則遵道而行半塗而廢者寡矣故繼之以強立而不反焉以能強立故不反也不反則有進而無退矣知類通達則告往知來聞一知十之謂自取友以上固足以為成矣然或立之不強有時而反必待強立而不反然後足以為大成也視與文王世子言視學同意易俗謂易其汚俗也美俗成則汚俗易矣俗既易矣則天下豈有殊俗哉近者既服而逺者懷之固其理也說服者中心說而誠服也術者述其所行之謂也時者猶學者之時習也延平周氏曰觀人之有序故自一年離經辨志而至於九年知類通達強立而不反能離經然後知業之為可敬能敬業然後所習者博習博然後能講學能講學然後知類通達凡此皆視其學問者也內辨其志然後外樂其羣樂羣然後上能親師親師然後下能取友取友然後能強立而不反凡此皆視其德性者也孟子曰以善養人然後能服天下此所以近者說服逺者懷之橫渠張氏曰辨志辨經之志詩之志如何書之志如何敬業樂羣學者必有業尊敬其所業樂羣謂朋友由博習而將以反約事師而至於親敬則學之篤而信其道也論學取友能講論其學而取友必端矣知類通達比物醜類是也九年者止言其大略人性有遲敏氣有昏明豈可齊也強立而不反可與立也教者可以無恨矣化民易俗之道非學則不能至此學之大成蛾子時術之積功也山隂陸氏曰其視親師友如此豈有殺羿之事哉故曰尹公之他端人也其取友必端矣雖然尚非其至也謂之小成而已知類通達強立而不反立所謂知及之仁能守之似之矣蛾讀如字蛾之子蠶蠋爾術蛾之所為乃復成垤可以人而不如乎且蛾俄而生俄而死矣其不茍尚如此此愚公所以屈知叟之笑也新安朱氏曰辨志者自能分别其心所趨向如為善為利為君子為小人也敬業者專心致志以事其業也樂羣者樂於取益以輔其仁也博習者積纍精專次第而遍也親師者道同德合愛敬兼盡也論學者知言而能論學之是非取友者知人而能識人之賢否也知類通達聞一知十能觸類而貫通也強立不反知止有定而物不能移也蓋考校之法逐節之中先觀其學業之淺深徐察其德行之虛實讀者宜深味之乃見進學之驗東萊吕氏曰離經辨志謂浹意義敬業不敢輕易五年方可博習未至此則非聖人之書不敢觀前此非不從師至此方能親師七年見得的當方可議論是非決擇賢否慶源輔氏曰離經謂分章析句未有不得其辭而達其意者也故教學以離經為先羣居所以講習樂羣則知講習之說也親師則能自得師也荀子博習不與師術蓋用於此然而誤矣此之博習謂所習者不一也夫師道不一下至農工皆有師焉況道藝豈一塗而足各因其所習而就師可也豈曰博習然後可以為師邪能自得師然後可以取友未能得師則取友或失之濫論學謂講論所學之道於是則又可以取友也親師易取友難師必道藝顯著故親之為易若友則凡勝我者皆可友也不愼取友則反害其德能親師取友以自輔可謂小成矣然未保其能強立而不反也小成所謂可與適道之時也大成則可與立之時也建國君民以學為先是以君子長者之道待斯民也此所以心說而誠服之歟彼劫於威而強服者則以草芥禽獸視其民其變也可立而待由是言之則民之於學固不可已而教者亦不可以不自反也不勉己而欲勉人難矣哉大學始教皮辨祭菜示敬道也宵雅肆三官其始也入學鼓篋孫其業也夏楚二物收其威也未卜禘不視學游其志也時觀而弗語存其心也幼者聽而弗問學不躐等也此七者教之大倫也記曰凡學官先事士先志其此之謂乎鄭氏曰皮辨天子之朝朝服也祭菜禮先聖先師菜謂芹藻之屬宵雅宵之言小也肄言習也習小雅之三謂鹿鳴四牡皇皇者華也此皆君臣宴樂相勞苦之詩為始學者習之所以勸之以官且取上下相和厚也鼓篋擊鼓警衆乃發篋出所治經業孫猶恭順也夏楚夏槄也楚荆也二者所以撲撻犯禮者收謂收斂整齊之威威儀也禘大祭也天子諸侯既祭乃視學校以游暇學者之志意時觀而弗語使之憤憤悱悱然後啓發也學不躐等學教也教之長稚倫理也自大學始教至此其義七也官居官者也士學士也孔氏曰此一節明天子諸侯教學大理凡有七種大學謂天子諸侯使學者入大學始習先王之道使有司服皮辨祭先聖先師以蘋藻之菜著皮辨祭蔬菜並是質素示學者以謙敬之道矣當祭菜之時使歌小雅習其三篇謂以官勸其始欲使學者得為官與君臣相燕樂各自勸勵也鼓篋謂學士入學之時大胥之官先擊鼓以徴之周禮大胥云用樂者以鼓徴學士學者既至發其筐篋以出其書所以然者欲使學者恭順其所持經業也夏爾雅釋木云槄山檟郭景純云今之山楸學者不勤其業則以笞撻之收斂其威儀也未卜禘不視學者禘在於夏天子諸侯視學考校必在禘祭之後禘必先卜故連言之若不當禘祭之年亦待時祭後乃視學也所以然者欲學者之志優游縱暇不欲急切之也此視學謂考試學者經業或君親往或使有司為之非天子大禮視學也若大禮視學在仲春仲秋及季春故文王世子云凡大合樂必遂養老注云大合樂謂春入學舍菜合舞秋頒學合聲於是時也天子則視學焉月令季春大合樂與此別也此視學既在夏祭之後則天子春秋視學亦應在春秋時祭之後此舉未卜禘不視學則餘可知也時觀而弗語謂教者時時觀之而不告語欲使學者存其心使心憤口悱然後啓之幼者但聽長者解說不得輒問令其謙退不敢踰越等差也此七者是教學大理也又引舊記結上事凡學謂學為官學為士者官則先教以居官之事士則先諭教以學士之志言七事皆以教學居官及學士者橫渠張氏曰皮辨祭菜始入學教以天子視學之禮所以表示學者雖天子尚必敬學欲使之敬業也士即仕也始入學便教以官人之事蓋學也者君國子民之道也鼓篋謂入學先搜索所藏防其挾異端邪說以亂學者也時觀而弗語默觀其人之所為幼者當問長者不可躐等直問其師官先事士先志謂有官者先教之事未官者使正其志為先此據教之大倫而言也官先事官已仕者事謂先其職事士先志觀其志之如何長樂陳氏曰文王世子凡學春官釋奠于先師秋冬亦如之周官大胥掌學士之版春入學舍菜合舞蓋學者之於先聖先師大有釋奠小有釋菜釋奠以飲為主而其禮隆釋菜以食為主而其禮薄故大學始教皮辨祭菜所以示敬而已矣皮辨順物性而制之則文質具焉祭菜芼芹藻而羞之則誠禮著焉古者天子以皮辨視朝而士亦以之為飾則皮辨上下之通服而三王共焉者也始教者服皮辨之服行祭菜之禮菜之為物至薄而誠禮寓焉則以之致祭也其敬非自外至由中出生於心而已豈非內心以示敬道之意歟儀禮鄉飲酒燕禮皆工歌鹿鳴四牡皇皇者華春秋襄四年穆叔如晉亦歌是三篇而已蓋鹿鳴主於和樂四牡主於君臣皇皇者華主於忠信習小雅之三則和樂君臣忠信之道不闕而可以入官從政矣用是以勸始入學之士則所入易以深矣古之教世子必以禮樂則其教學士亦必以禮樂焉故皮辨祭菜而示之使敬教以禮也小雅肆三而誘之使勸教以樂也周官小胥掌學士之徴令而比之撻其怠慢者徴而比之鼓篋孫業之謂也撻其怠慢者夏楚收威之謂也君喪畢之明年然後卜禘未卜禘則不視學不以凶禮干吉禮也卜禘猶卜郊於上中下辛之類也未卜禘猶所謂寡君之未禘祀也卜禘尊祖所以崇本也視學尊師所以勸士也先尊祖後勸士其序然也孔子之於門人退而省其私不憤則不啓不悱則不發不以三隅反則不復時觀弗語以存其心之謂也未能知生者不得聞知死之說未能事人者不得聞事鬼之論聽而弗問學不躐等之謂也先事者非忘志也急先務而已先志者非遺事也特在所後而已故周官考士之法先功緒而德行次之孔子設科之序先德行而政事次之嚴陵方氏曰皮辨無經緯之文織紝之功祭菜無犧牲之味黍稷之實宵雅肄習必至於三欲孰故也習必以雅欲其正也止以小雅欲其有漸也以其始教故曰官其始也官者主治之謂也學以孫志為事故教者必撲之以收其威也禘蓋五年之祭未五年不視學所以優游學者之志故也且中年考校則再考校乃當視學之年五年視學則再視學乃當學者大成之年矣視學見文王世子解以言傳道則學者止得於耳聞以默識道則學者乃得於意㑹時觀而弗語則欲其默識之存其心則得於意㑹矣觀者不可過也不可不及也當其可而已故以時言之游其志所以俟其自成存其心所以使之自得莊子曰美成在久則未卜禘不視學者久之謂也孟子曰思則得之則時觀而弗語者思之謂也夫入道有序進學有時所謂等也居幼而為長者之事則為躐等矣謂之倫先後不可亂者然教亦多術矣豈止如是亦其大略爾夫官所治者事士所尚者志方其學居官則以事為先方其學為士則以志為先故教之大倫為是而已東萊吕氏曰自堯舜三代以來所以教學者切要工夫唯是敬之一事最難識未見師友未經講習先使之皮辨祭菜肅然此心是以敬道示之宵舊說以宵為小大抵經書字不當改古人采詩夜誦正是宵雅肄三之意夜閒從容無事諷誦吟詠善端良心油然而生初入學未知為學之方其心茫然初無所據使夜閒肄習三章之雅非獨舊說所謂鹿鳴四牡皇皇者華也但取雅之三章諷誦吟詠此心遂有所據所謂官其始也初入學凡在學之衆鳴鼓升堂衣冠濟濟肅然在上新入學者要得出示其所業向來驕慢怠忽之意都消了所謂遜其業也未禘先視學遽以萬乘之尊臨之學者安得不迫切所以未卜禘不視學使人從容優豫以養其德既卜禘而視學使之不敢自怠也古者教之善處不在口耳之閒其動容感發之功深矣故時觀而弗語所以存養其心也古人為學盈科而後進幼者踰節而問即是躐等雖曰自求益亦是犯分便與為學相悖七者皆是古者教人大槩後世此理皆亡七端之教所謂講道不過兩事如其他皆是存養工夫古人為學十分之中九分是動容周旋灑掃應對一分在誦說今之學者同在誦說入耳出口了無涵蓄工夫所謂道聽塗說德之棄也永嘉戴氏曰宵雅肄三說者謂始學習此勸之以官則是王者以利祿誘人也語曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為古人之學亦貴於有用爾學者以學詩為先所以興起人心也人而不孫不可以為學入學之初挾其所有以求勝於人則業不進矣故始入學者鼓衆發篋示其所短以求教於人非若後世掩匿所短畏人之議己亦非矜誇所長求人之服己也孫其業者言所業不如人使之知孫也幼者未足以問而驟躐等焉則為不孫弟矣然學者之問亦難泛然而問列事未盡而問有所挾而問非所當問而問皆所不答也七者之教於學者初無論辨誦說之功教以謙敬之道正其威儀之失優游其志慮涵養其心術而習孰其恭順之意而已慶源輔氏曰示敬道也所以使之立為學之誠官其始也所以使之知教者之意學者之誠立教者之意明然後可以教之矣故孫其業而使之有受道之質然又慮其怠也則又收其威而使之有勉強之意有受道之質無怠惰之志則學者可以進道矣然又慮教者之亟而不俟夫學者之自得也故又五年一視學使學者之志優游而無迫急之患時觀而勿語使學者之心常存而有憤悱之誠上無迫切之教下有憤悱之誠則不患乎人之不自得已夫教者固不可亟矣而學者亦不可以有亟心也故又終之以學不躐等焉此其倫序也七者皆所以正士之志士則未為官也志則未見於事也士而正其志則官而能其事矣新安朱氏曰小雅肄三案鄉飲酒及燕禮皆歌此三篇笙入樂南陔白華華黍間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀六笙詩本無詞聲亦不傳觀示也謂示以所學之端緒語告也馬氏曰古之君子其學也為道而已豈為官而學哉然而士之學者未有不志於行道者也楊子曰學之為王者事其已久矣則是官其始者所以為王者事也凡視學必於卜禘者以禘為大祭之禮所以擇士也若夫時觀則不必以禘祭為節矣然或曰視或曰觀者何也視學所以考其成德為行也時觀者觀其存於內者而已成德為行著者也謂之視焉見於著者也有於內𨼆者也謂之觀焉見於𨼆者也古者三年一祫五年一禘蓋常禮比年入學中年考校則其所謂中年者豈皆合於禘祭之歲歟蓋中年而考校者有司而已卜禘而視學者是天子諸侯之事臨卭魏氏曰古者上自朝廷下及四方之賔燕凡以為講道修政之樂歌則小雅之三也鹿鳴以示人善道樂嘉賔之心四牡以勤勞王事養父母之志皇皇者華以布宣主德為使臣之光故大學之教自皮辨祭菜以後即肄此三雅饗燕射鄉自旅酬奠觶以後即升此三歌嗚呼非文武之澤浹於人也深其能和平忠厚使人油油翼翼詠嘆而不能已也如此金華應氏曰禘者春祭之名見於王制郊特牲比年之學則自正歲始和之後即已講祭菜鼓篋之儀而天子諸侯既畢禘事乃始視入學考校蓋從容游泳其志而使之一意於學也必以五年大禘為說則視學希闊而學者之志浸弛而荒矣案月令每歲視學者凡四豈必待五年之久乎且大禘惟魯有之禮記集說卷八十八
