body:
  text: 禮記集說卷四十二宋衛湜撰仲夏之月日在東井昏亢中旦危中鄭氏曰仲夏者日月㑹於鶉首而斗建午之辰也孔氏曰案三統歷五月節日在井十六度昏氐二度中去日一百一十九度旦室三度中五月中日在井三十一度昏房二度中去日一百一十九度旦奎十一度中元嘉歷五月節日在井三度昏角十度中旦危九度中五月中日在井十八度昏氐五度中旦室五度中其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中蕤賔鄭氏曰蕤賔者應鍾之所生三分益一律長六寸八十一分寸之二十六仲夏氣至則蕤賔之律應周語曰蕤賔所以安靜神人獻酬交酢孔氏曰應鍾律長四寸二十七分寸之二十上生蕤賔三分益一取應鍾三寸更益一寸為四寸其二十七分寸之二十各三分之則一寸分為八十一分也二十七分寸之二十則為八十一分寸之六十其整寸一為八十一分又以六十分益之總為一百四十一分更三分益一一分有四十七更以四十七益前一百四十一分總為一百八十八分是為積分之數除之為寸除八十一分則一百六十二分為二寸益前四寸為六寸餘有二十六分不成寸故云蕤賔長六寸八十一分寸之二十六也按何氏𦙍曰周語安靜神人獻酬交酢者乾九四是月陽反於下為復隂生陽中為姤各應其時所以安靜是安靜神人也隂生為主陽謝為賔賔主之象獻酬之禮獻酢又酬之隂陽代謝之義也詳見孟春長樂陳氏曰由殷以前音不過五至武王伐殷嵗在鶉火月在天駟日在析木之津辰在斗柄星辰天黿自鶉及駟七列南北之撥七同於是以聲招之而有七音之律故黃鍾為宫大蔟為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賔為變徴此音所以有七也應鍾隂之終蕤賔隂之始則應鍾變隂而將之陽蕤賔變陽而至於隂此應鍾蕤賔所以為變也其數七其味苦其臭焦其祀竈祭先肺小暑至螳蜋生鵙始鳴反舌無聲鄭氏曰螳蜋螵蛸母也鵙博勞也反舌百舌鳥皆記時候也孔氏曰案釋蟲云不蟷蠰其子蜱蛸孫炎云蟷蠰螳蜋一名不李巡云其子名蜱蛸故云螵蛸母詩七月鳴鵙箋云伯勞鳴將寒之候五月則鳴豳地晚寒鳥物之候從其氣焉反舌鳥春始鳴至五月稍止其聲數轉故名反舌嚴陵方氏曰暑極於季夏則進未極之時尚為小矣故於此言小暑螳蜋鵙皆隂類也故或感微隂而生或感微隂而鳴焉反舌蓋百舌也以能反覆其舌而為百鳥語故謂之反舌然其鳴也感陽中而發故感微隂而無聲焉馬氏曰是月也一隂生而慝作螳蜋生則慝之有見乎形者也鵙始鳴則慝之有聞乎聲者也反舌無聲則以陽敷而作者以隂收而息山隂陸氏曰無聲非不鳴也雖鳴無聲天子居明堂大廟乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗養壯佼鄭氏曰眀堂大廟南堂當太室也養壯佼助長氣也孔氏曰壯謂容體盛大佼謂形容佼好以盛夏長養之時故養壯佼之人助長氣也嚴陵方氏曰萬物生於春而長於夏故於形色如此先王裁成之道亦養之使成而已山隂陸氏曰夏養壯佼冬養耆老可知蓋大化有四春生夏壯佼秋老冬死亡是月也命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鍾磬柷敔鄭氏曰為將大雩帝習樂也修均執調飭者治其器物習其事之言孔氏曰鞀或為鼗周禮注云鼗如鼓而小持其柄搖之旁耳還自擊鞞者周禮雷鼓鼓神祀之屬是也劉熙釋名云鞀導也所以導樂作鞞裨也裨助鼓節鼓廓也張皮以冒之其中空廓琴者釋樂云大琴謂之離廣雅云琴長三尺六寸六分五弦瑟者釋樂云大瑟謂之灑郭景純云瑟長八尺一寸二十七弦管者釋樂云大管謂之簥音驕郭氏云管長尺圍寸併漆之有底鄭注周禮云管如笛而小併兩而吹之簫者釋樂云大簫謂之言郭氏云編二十二管長尺四寸干盾也戚斧也戈鉤子㦸羽鳥羽周禮羽舞皇舞之屬是也竽者鄭注周禮云竽三十六簧笙者鄭注周禮云十三簧釋樂云大笙謂之巢郭氏云篪以竹為之長尺四寸圍三寸一孔上出寸三分名翹橫吹之廣雅云八孔鄭云篪七室簧者竽笙之名也氣鼓之而為聲鍾者釋樂云大鍾謂之鏞磬者釋樂云大磬謂之毊音囂以玉石為之柷者釋樂云所以鼓柷謂之止郭氏曰柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名敔者釋樂云所以鼓敔謂之籈郭氏云敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之修者修理舊物均者均平其聲執者操持營為調者調和音曲飭者整頓器物故鄭云治其器物習其事之言也嚴陵方氏曰修之所以使治飭之所以使正均之所以使平調之所以使和執之所以待用鞀鞞鼓之與鍾磬柷敔其聲質而一故修飭之而已琴瑟管簫竽笙竾簧其聲文而雜則必均調之焉干戚戈羽以無聲持執之待用可也故言之别如此馬氏曰鞀鞞鼓革也兆奏鼓者鞀也應聲者鼙也鍾金也磬石也琴瑟者絲也柷敔木也管簫竽笙竾簧此皆管也聲在中故謂之簧簫植簧於枷竽笙植簧於發干戚戈羽則舞器也命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實鄭氏曰陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟求雨之祭也雩帝謂為壇南郊之旁雩五精之帝配以先帝也自鞀鞞至柷敔皆作曰盛樂凡他雩用歌舞而已百辟卿士古者上公若句龍后稷之類也春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦修雩禮以求雨因著正雩此月失之矣天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩孔氏曰四月純陽用事故制禮此月為雩縱時不旱亦雩將欲雩祭故先命有司祈祀山川百源為將雩之漸重民之義也雩音近吁又女巫職云凡邦之大烖歌哭而請歌哭則吁嗟之類旱又是大烖故須吁嗟求雨以雩是祭天當從陽位五天總祭不可遍在四方故知在南郊也以春夏秋冬共成嵗功不可偏祭一天故雩五精之帝以自外至者無主不正當以人帝配之大皥配靈威仰炎帝配赤熛怒黃帝配含樞紐少皥配白招拒顓頊配汁光紀故云配以先帝也案女巫云旱暵則舞雩是用歌舞正雩則非唯歌舞兼有餘樂也百辟則古之上公國語云鯀為崇伯而祭法有祀之文社稷五祀雖為王朝卿士兼帶上公之官故左氏云封為上公祀為貴神是身為百辟又為卿士案左傳有社稷五官今鄭直云若句龍后稷不云句芒蓐收之等舉有益於民功之顯者言之也雩之與禱所以異者考異郵說云天子禱九州山川諸侯禱封內大夫禱所食邑又僖公三時不雨帥羣臣禱山川以過自讓凡雩必先禱故此經云乃命百縣祈祀山川百源始大雩帝是也禱者不雩僖公二年冬十月及三年春正月夏四月直為禱祭以非雩月故不雩長樂陳氏曰禮有先其大而後其小者亦有先其小而後其大者先其大而後其小者異尊卑也祫而後時祭郊而後三望之類是也先其小而後其大者致敬文也魯人將有事於上帝必先有事於頖宫晉人將有事於河必先有事於惡池是也二者之禮雖殊其所以為尊尊則一而巳月令仲夏為民祈祀山川百源然後大雩帝此致敬文之意也大雩帝然後命百縣雩祀此異尊卑之意也詩稱春夏祈穀於上帝春秋稱龍見而雩則四月也而月令則以仲夏周禮舞師掌教皇舞帥而舞旱暵之事女巫旱暵則舞雩凡邦之大烖歌哭而請舞與歌哭非盛樂也而月令則以盛樂蓋秦制與古異也此龍見而雩者常也周禮言旱暵之事而不言時所以待變也祈穀於上帝大雩也月令言命百縣雩祀百辟卿士小雩也考之春秋之法書大事書大雩者蓋亦言大以見小也嚴陵方氏曰此言大雩帝後又言大饗帝何也蓋雩所以祈也饗所以報也祈必於仲夏者以隂生於午而物成之始也所以祈物之成而已報必於季秋者以陽窮於戌而嵗功之終也所以報嵗之功而已雩不必皆於帝也唯雩於帝然後為大雩饗不必皆於帝也唯饗於帝然後為大饗百縣謂畿內之邑天子之縣方百里以開方之法計之千里之畿適百縣矣王制謂之天子之縣內者以此百辟即諸侯也卿士即六卿也百辟卿士生有益於民者死亦有益於民故命雩祀之以祈穀實也季春之祈實為麥而已至此又祈實則所祈者衆矣故以榖該之天子之雩及於上帝百縣之雩止於百辟卿士此重輕之别也於百辟卿士言祈穀實則雩帝之所祈又可知矣馬氏曰山川百源則氣之鍾也百辟卿士則有功烈於民而在祀典者皆與祭焉則所以為民祈穀實者靡神不臻也山隂陸氏曰雩在四月今在中夏水涸在九月今在仲秋記事之法也舉中則上下見書曰以殷仲春廬陵胡氏曰春秋雩二十一無書四月雩者以其正月此五月非矣農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟鄭氏曰登進也此嘗雛也而云以嘗黍不以牲主穀也必以黍者黍火穀氣之主也含桃櫻桃也孔氏曰黍是火穀於夏時與雛同薦之如鄭此言則黍非新成直取舊黍故下孟秋云農乃登穀注云黍稷於是始熟眀仲夏未熟也案月令諸月無薦果之文此獨羞含桃者以此果先成異於餘物故特記之其實諸果亦時薦嚴陵方氏曰雛蓋雞也以吕氏春秋見之必謂之雛者雞以雛為美故也若羊之類則以大為美爾於配菽之食則又曰雞者日之所食為常時之所嘗為暫固不能無貴賤之别也亦見孟夏以彘嘗麥解含桃朱櫻也以其受含陽之色故以含陽之羞者以美物進之可羞於王公先薦寢廟見仲春解馬氏曰黍火穀也膳食之節或順所養而勿逆焉或制所勝而勿過焉乃所以為利也令民毋艾藍以染毋燒灰毋暴布門閭毋閉關市毋索挺重囚益其食鄭氏曰毋艾藍為傷長氣也此月藍始可别毋燒灰為傷火氣也火之氣於是為盛火之滅者為灰毋暴布不以隂功干太陽之事門閭關市順陽敷縱不難物挺猶寬也孔氏曰種藍初必叢生此月藍既長大始可分移布散故鄭云可别也門謂城門閭謂二十五家為閭關市停物之所商旅或隱藏其物以辟征稅是月從長之時故不搜索其物益其食挺重囚連文謂增益囚之飯食義當然也嚴陵方氏曰藍可以染青仲夏方啓灌之時未宜艾故也燒灰者燒物以為灰也布雖名以陽之道然隂功之所成爾暴謂暴之於日也暴布則以隂功干太陽之事矣挺重囚益其食以暑氣將盛故寬貸之前言出輕繫此言挺重囚何挺亦出也言繫則不必囚言囚則繫可知挺其囚則猶在所繫也故言益其食焉馬氏曰門閭毋閉利宣也關市毋索不恃察以窮民隱也挺重囚益其食不以其罪廢不忍人之政也山隂陸氏曰帛隂也布陽也凍隂也暴陽也凡養陽氣取適於中而已雖不燒灰亦不暴布游牝别羣則縶騰駒班馬政鄭氏曰游牝别羣孕妊之欲止也縶騰駒為其牝氣有餘相蹄齧也馬政謂養馬之政教也廋人職曰掌十有二間之政教以阜馬佚特教駣攻駒此之謂也孔氏曰案校人職云天子十有二間諸侯六間大夫四間每間馬有二百一十六匹嚴陵方氏曰游牝别羣者以隂生故不欲耗陽也則縶騰駒者所以防其相蹄齧也季春游牝於牧至仲夏别其羣季春合纍牛騰馬至仲夏縶騰駒故所宜矣前言馬而此言駒者縶至於駒則馬可知前言牛而此不言犢者以牛性順無事乎縶之故也班馬政者若周官趣馬之簡其節巫馬之治其疾校人之辨其屬廋人之掌其間以至圉師之所教圉人之所養莫不有政焉而故班之也班則制而分之歟且馬火畜也班其政夏固宜矣周官馬職皆列於夏官者亦此之意然於季秋又言之何也蓋夏之政則以養為主秋之政則以御為主養於夏然後成於秋成於秋然後可以御故也山隂陸氏曰游非牝之正言游牝則牡可知則縶騰駒為將乘匹故禁之蓋當是時壯者倦游而少者作矣此自然之理也然則暮年昏宦猶欲與少年競是不知止者也是月也日長至隂陽爭死生分君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事毋刑以定晏隂之所成鄭氏曰爭者陽方盛隂欲起也分猶半也掩猶隱翳也躁猶動也聲謂樂也進猶御見也易及樂春秋說夏至人主與羣臣從八能之士作樂五日今止之非其道也薄滋味毋致和為其氣異此時傷人也節耆欲定心氣微隂扶精不可散也毋刑謂罪罰之事不可以聞晏安也隂稱安孔氏曰此月之時日長之至極大史漏刻夏至晝漏六十五刻夜漏三十五刻是日長至也死生分者隂氣既起故物半生半死感陽氣長者生感隂氣成者死故於夏至日相與分也君子謂人君以下至在位士也齊戒所以敬道萌隂也處猶居也隂既始萌君子居處不顯露又不躁動恐干隂也歌樂華麗之事為助隂靜故止之既止聲色故嬪房不得進御侍夕也亦為微隂始動不可動於隂事也案易緯通卦驗云夏至人主從八能之士或調黃鍾或調六律或調五音或調五聲或調五行或調律歷或調隂陽或調正德所行注謂於人衆之中取其習曉者而使之必知緯文作樂為是者以周禮大司樂冬至祭天圜丘夏至祭地方澤皆作樂不云止樂故知月令非也滋味和調氣味殊異他時可食此時傷人故薄滋味毋致和也從君子齊戒至無刑以上皆是清靜止息之事所以正定身中安隂之所成就嚴陵方氏曰陽生於子而其氣舒故晝刻多日浸長隂生於午而其氣促故晝刻少而日浸短以隂生於午則陽極於此故仲夏言日長至陽生於子則隂極於此故仲冬言日短至所謂冬至夏至者其名蓋出於此然而以刻數之則如是爾以景量之夏至日極北而在東井其景尺有五寸冬至日極南而在牽牛其景丈有三尺以為長短之極則與此異矣蓋刻之長短由日出之早晚景之長短由日行之南北故也隂陽爭者以隂方來而與陽始遇遇故爭也仲冬亦言之者以陽方來而與隂遇故也陽主生隂主死微隂既生則萬物向乎死矣故死生之理於是分也君子以隂陽方爭故宜潔誠居內退聽以待其定也仲冬言此而不言毋躁者以暑為躁寒為靜故於暑之時特戒之也止聲色者欲其視聽之專也毋或進者進即詩所謂進御也方解緩之時慮搖其精故戒之也薄滋味者主物言則曰滋主人言則曰味和謂致五味而和之蓋方齊戒之時苟厚滋味而致和則或昏憒其志意也嗜發乎外欲動乎內皆主於心而已故節嗜欲所以定心氣靜事毋刑者不欲動而有為也刑雖隂之事然用刑則動而有為矣故君燕息安養以定晏隂之所成也陽造始而為早隂代終而為晏故曰晏隂始以生之終以成之故曰成也列子所謂晏隂之間時雖異而義亦同金華應氏曰晏安也安靜之隂也陽生固貴乎安靜而隂德本靜尤不可有所擾也鹿角解蟬始鳴半夏生木堇榮鄭氏曰又記時候也半夏藥草木堇王蒸也孔氏曰釋草云椵木槿櫬木槿亦云王蒸其花朝生暮落嚴陵方氏曰鹿好羣而相比則陽類也故夏至感隂生而角解麋多欲而善迷則隂類也故冬至感陽生而角解此所以不同也蟬始鳴已見倉庚鳴解半夏生者蓋居夏之半而是藥生於是時故因以為名木堇有别於堇草故以木言之以感微隂而榮故其華朝榮暮隕然經或曰秀或曰華或曰生或曰榮何也以别於苖則曰秀以别於實則曰華以别於死則曰生以别於枯則曰榮其言各有所當也是月也毋用火南方可以居髙眀可以逺眺望可以升山陵可以處臺榭鄭氏曰陽氣盛又用火於其方害微隂也髙明謂樓觀闍者謂之臺有木者謂之榭居髙明以下皆順陽在上也孔氏曰臺積土為之所以觀望有大殿無室名曰榭嚴陵方氏曰夏為火旺之時南方火旺之方於旺之時而又用於旺之方則其氣太盛而害微隂之生故戒之居髙眀故可以逺眺望欲逺眺望故或升山陵或處臺榭也山陵則自然髙明之所也臺榭則人為髙明之所也順陽在上故居處如此古者冬則居營窟夏則居橧巢亦以是而已臺榭之髙亦必升也特以不若山陵之尤髙故言處而已髙明言居臺榭言處互言之也仲夏行冬令則雹凍傷穀道路不通暴兵來至行春令則五穀晚熟百螣時起其國乃饑行秋令則草木零落果實早成民殃於疫鄭氏曰陽為雨隂起脅之凝為雹子之氣乘之也盜賊攻劫亦雹之類五穀晚熟生日長卯之氣乘之也螣蝗之屬言百者眀衆類並為害草木零落酉之氣乘之也八月宿直昴畢為天獄主殺果實早成生日短也民疫大陵之氣來為害也孔氏曰暴凍天災暴兵人災也五穀晚熟天災百螣地災國饑人災也草木零落果實早成地災民殃於疫人災也嚴陵方氏曰夏行冬令是以隂包陽也故雹凍傷穀道路不通則冬為閉塞暴兵來至則隂賊之感也春主生夏行春令則生之日長生之日長故熟之時晚螣食苗葉春之氣盛於末故蟲之為害者特及葉而已五穀晚熟而又百螣時起故其國乃饑也草木零落與果實早成皆秋之氣候故也當盛暑之月而感秋氣則相薄而衆成疾季夏之月日在栁昏火中旦奎中鄭氏曰季夏者日月㑹於鶉火而斗建未之辰也孔氏曰案三統歷六月節日在栁九度昏尾七度中去日一百一十九度旦婁八度中六月中日在張三度昏箕三度中去日一百一十七度旦胃十四度中元嘉歷六月節日在井三十二度昏房四度中旦東壁八度中六月中日在栁十二度昏尾八度中旦奎十二度中其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中林鍾鄭氏曰林鍾者黃鍾之所生三分去一律長六寸季夏氣至則林鍾之律應周語曰林鍾和展百物俾莫不任肅純恪孔氏曰案律歷志黃鍾長九寸三分去一下生林鍾故林鍾長六寸鄭引周語證林鍾之義案注云坤初六也林衆鍾聚肅速純大恪敬言時務和審百事無有詭詐使莫不任其職事速其功而大敬其職諸家說見孟春其數七其味苦其臭焦其祀竈祭先肺溫風始至蟋蟀居壁鷹乃學習腐草為螢鄭氏曰溫風始至以下皆記時候也鷹學習謂攫搏也夏小正曰六月鷹始摰螢飛蟲螢火也孔氏曰蟋蟀生於土中季夏羽翼稍成未能逺飛但居在壁至七月則能逺飛在野案爾雅釋蟲云蟋蟀蛬也郭氏曰今促織於時二隂既起鷹感隂氣乃有殺心學習攫搏攫謂以足取物搏謂以翼擊物仲春言鷹化為鳩仲秋鳩化為鷹此云學習者亦自有真鷹可習也腐草得暑濕之氣故為螢不云化者鳩化為鷹鷹還化為鳩故稱化腐草為螢螢不復為腐草故不稱化李巡云螢火夜飛腹下如火光故曰即照嚴陵方氏曰天地溫厚之氣始於東北而盛於東南季夏故溫風始至也然八風之氣坐於八方以應八節經止於孟春言東風季夏言溫風孟秋言涼風仲秋言盲風或言其方或言其氣或言其時而有詳略不同者特記時而已東風即條風也溫風即景風也盲風即閶闔風也然景風至以東風而此於仲夏言溫風始至者陽饒之意也餘見樂記解蟋蟀居壁則羽翼未成羽翼成則在野矣十月又入牀下者以順時而蟄故也鷹乃學習者以隂浸長故鷙鳥學習攫搏也效彼之為之謂學因性所有之謂習腐草為螢見鷹化為鳩解馬氏曰溫風至則天地之仁氣極矣而薰然其和也蟋蟀居壁則隂陽始萬物以出入悉與時化而猶未動乎外也鷹乃學習則陽浸長而始鷙也其學習也亦其性所有也腐草為螢則木氣之餘乘火而化也金華應氏曰物得氣之先殺氣未肅而鷙猛之鳥已習於擊迎殺氣之微也涼氣未至而鳴隂之物已居乎壁迎涼氣之微也天子居眀堂右個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗鄭氏曰眀堂右個南堂西偏也命漁師伐蛟取鼉登龜取黿命澤人納材葦鄭氏曰四者甲類秋乃堅成周禮漁人職云秋獻龜魚龜人職又曰凡取龜用秋時是夏之秋也作月令者以為此秋據周之時也周之八月夏之六月因書於此似誤也蛟言伐者以其有兵衛也龜言登者尊之也鼉黿言取羞物賤也鼉皮又可以冒鼓材葦蒲葦之屬此時柔韌可取作器物也孔氏曰此命漁師及仲夏養壯佼等皆是煩細之事或非止一月所為故不言是月也嚴陵方氏曰四者皆水族也故以之命漁師必於季夏者欲以盛暑之氣燥其皮甲利其耐久故也葦則荻之小者可緯以為薄必擇其材者故以材言之命澤人納之則以生於澤故也馬氏曰周官攻龜用秋時則懼傷其字乳而又待以堅成之時也此用季夏非古也山隂陸氏曰言於此抑殺氣焉君子退隂而進陽鄭氏謂書於此似誤非是周官秋則獻龜魚又曰凡取龜用秋時自其取之之時爾與此不同是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福鄭氏曰四監主山林川澤之官百縣鄉遂之屬地有山林川澤者也秩常也百縣給國養犧牲之芻多少有常民皆當出力艾芻養牲以供祠神靈為民求福也皇天北辰耀魄寶冬至所祭於圜丘也上帝大微五帝孔氏曰案周禮有山虞澤虞林衡川衡之官秩芻出於山林又季冬云收秩薪柴薪柴亦出於山林川澤鄭知百縣非諸侯而云鄉遂之屬者以取芻養牲不可大逺故知是畿內鄉遂仲夏云命百縣雩祀則兼外內諸侯也此云鄉遂不兼公卿大夫之采邑也嚴陵方氏曰四監者天子之縣內監郡之大夫也古者千里百縣縣有四郡郡使大夫監之故謂之四監春秋傳所謂下大夫受郡是也夫神降而為靈謂之神則逺而尊之也謂之靈則近而親之也皇天上帝山川四方外事也故以神言之宗廟社稷內事也故以靈言之馬氏曰四監則郊各以監有受其入也百縣則甸服之內所使納總銍秸服者也既卜而芻焉皆謂之牲將殺而告具焉皆謂之犧令民無不咸出其力則所謂祭祀者非獨恭也謂民力之普存也以供皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福則為民神之主也故帝王先成民而後致力於神豈私福哉凡以為民也是月也命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良母敢詐僞以給郊廟祭祀之服以為旗章以别貴賤等給之度鄭氏曰婦官染人也采五色質正也良善也所用染者當得真采正善也旗章旌旗及章識也孔氏曰案周禮婦官有典婦功典枲染人等此據染采故鄭謂染人也染五色之采白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章然必以舊法故事無得有參差貸變此月暑濕染帛為宜是秦法也周則於夏豫浸治染纁𤣥之色也至秋乃總染五色故染人云夏纁𤣥秋染夏是也上云黼黻文章下云黑黃蒼赤互相備也旌旗則周禮司常九旗是也章識者則周禮事名號故司常云官府象其事州里象其名家象其號鄭注引士喪禮以緇廣三寸長半幅赬末長終幅詩織文鳥章是也嚴陵方氏曰掌染婦功故謂之婦官設色者采藍以為青采沙以為朱故謂之采黼黻見郊特牲解文章見仲秋解有所守謂之法有所因謂之故差則兩相雜之謂貸則兩相代之謂五色獨不及白者蓋染采必以所受者為本不言白從可知矣以給郊廟祭祀之服則致美乎黻冕之意而與夫好潔其衣服者異矣衣服旌旗貴者從隆賤者從殺故言等隆非有餘殺非不足故言給有等有給各隨宜而度之故言度若天子龍衮諸侯黼之類所以别衣服貴賤等給之度也若王建太常諸侯建旗之類所以别旌旗貴賤等給之度也凡此順文眀之時故染文眀之色爾然周官染人春暴練夏纁𤣥秋染夏與此不同蓋意各有所主故也馬氏曰染物為五色者采也上制而用之下守而行之者法也昔以是而為常則其後循焉者故也非其質謂之詐非其良謂之僞山隂陸氏曰此亦周制也婦官謂若九嬪世婦之類蓋方此時繅事既畢於是命之染采祭義曰及良日夫人繅三盆手遂布於三宫夫人世婦之吉者使繅遂朱緑之𤣥之黃之當此節也鄭氏謂染人也非是故舊法也凡質美則無所用僞用僞則質不美矣講義曰質良者皆欲質實而良善則自然無詐僞矣舜欲觀古人之象日月星辰山龍華蟲藻火粉米黼黻絺繡以五采彰施於五色作服汝眀且以委左右股肱之臣眀之而不敢輕易者凡以此也若采之施於色者不以法度而差貸或不質良而僞為則何以事郊廟神祇何以别貴賤等級以為禮服乎是月也樹木方盛乃命虞人入山行木毋有斬伐不可以興土功不可以合諸侯不可以起兵動衆母舉大事以搖養氣毋發令而待以妨神農之事也水潦盛昌神農將持功舉大事則有天殃鄭氏曰母有斬伐為其未堅韌也土將用事氣欲靜故興土功合諸侯起兵動衆皆不可也大事謂興繇役以有為發令而待謂出繇役之令以豫驚民也民驚則心動是害土神之氣土神稱曰神農者以其主於稼穡也水潦盛昌神農將持功者言土以受天雨澤安靜養物為功動之則致害也孝經說曰地順受澤謙虛開張含泉任萌滋物歸中孔氏曰土雖寄王四季但南方火生中央土土生西方金金火之閒位當建未之月故鄭云土將用事氣欲靜也土主稼穡者種曰稼斂曰穡蔡氏曰神農則炎帝非鄭義也六月主未未位東井東井是水故六月而水潦盛昌也地功由天若動地則致干災害故有天殃也嚴陵方氏曰木之生也則樹及其死也則植此言其方盛故曰樹木也方盛於夏則衰於秋矣虞人蓋山虞也行則巡之也斬則絶之也伐則傷之而己毋有斬伐慮傷方盛之氣也興土功合諸侯興兵動衆皆大事也故繼言母舉大事舉大事則人不安且搖養氣矣搖者振而蕩之之謂夫萬物作於春而氣主生長於夏而氣主養故謂之養氣發令而待謂預令之以事而使民有所待也以神農將持功於秋發令而待則妨神農之事也神農者農之神若先嗇之類未主東井為水故季夏有水潦之理焉蓋物生不可加謂之盛陽出而在上謂之昌以物言則曰盛以道言則曰昌夫興農功而用之於眀者人也持農功而主之於幽者神也水潦盛昌則百穀被其澤而向乎成矣故神農將持其功也持有守意唯其成故可守也神農之事如此苟舉大事以妨之則是違神逆天而天之災適當之矣馬氏曰隂陽以氣相蕩搖則其搖之也乃以成之若人之舉事不時以搖隂陽之氣則其搖之也乃以傷之方是時也養氣方盛舉大事以振而蕩之則能無傷乎稼穡之事神農主之彼以公義持嵗功而我以人為之私舉大事焉是違天而召殃也山隂陸氏曰不言山以入山者據澤人納材葦變作言舉言雖舉猶不得也據母作大事以妨農事神農之事與農之事有閒矣神農炎帝也變言神農以農之事為正將持功謂秋成在後是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆鄭氏曰潤溽謂塗濕也剃謂迫也芟草也此謂欲稼萊地先剃其草草乾燒之至此月大雨流水潦畜於其中則草死不復生而地美可稼也剃人掌殺草職曰夏日至而剃之又曰如欲其化也則以水火變之可以糞田疇美土疆者土潤溽膏澤易行也糞美互文耳土疆强㯺之地孔氏曰大雨不云降云時行者降止是下耳欲言其流義故云行行猶通彼也周禮立剃人使除田草五月夏至芟殺暴之至六月合燒之故云燒剃也行水者其時大雨行於所燒田中仍壅遏畜之以漬燒剃故云行水也先芟後燒又畜水浸漬之即草根爛死是利益得殺田中之草也日暴水於爛草田中水熱而沫沸如熱湯漬之鄭引剃人以水火變之者謂火燒水漬變此塉地為肥也糞壅苗之根也榖田曰田麻田曰疇言爛草可以糞田使肥也疆㯺磊塊難耕之地也此月可止水漬之乃壅糞之使田美也嚴陵方氏曰土為火所蒸故潤既潤則水勝火火反辱焉燒剃行水者燒剃其草以行水道剃謂佛翦之也水行於燒剃之餘故其利如以熱湯殺草也糞田疇美土疆者蓋言殺草之利也所謂疇者田以井授各有儔故也疆即草人所謂疆㯺山隂陸氏曰疆謂如强梁之強土疆言土之不可化者糞言能厚其力美言能善其性季夏行春令則穀實鮮落國多風咳民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保鄭氏曰穀實鮮落國多風咳辰之氣乘之也未屬巽辰又在巽位二氣相亂為害民遷徙象風轉移物也丘隰水潦戌之氣乘之也九月宿直奎奎為溝瀆與此月大雨并而髙下皆水也禾稼不熟傷於水也女災含任之類敗也風寒丑之氣乘之也鷹隼蚤鷙得疾厲之氣也四鄙入保象鳥雀之走竄也都邑之城曰保孔氏曰穀實鮮落謂鮮少墮落由風多故也此地災風咳是天災遷徙是人災丘隰水潦及禾稼不熟地災也以其水氣多故也乃多女災人災也亦為水傷含任也丑未屬巽又建丑之月大寒中故行冬令則多風寒此天災也鷹隼蚤鷙季夏地氣殺害之象地災也嚴陵方氏曰鮮落即莊子所謂草木不待黃而落是也丑氣過盛故實有所不勝國多風咳則與孟夏言暴風來格同義以多風故人肺受疾而咳也民乃遷徙者以春主發散故也自下升上曰遷舍此適彼曰徙丘隰水潦以金生水故也曰丘隰以見髙下皆被其害故禾稼不熟也種曰稼斂曰穡以其不熟故止言稼多女災者以純隂之氣過盛而反傷之也因風而後寒故曰風寒且異乎隆冬之時無風而寒矣以當暑而寒故曰不時鷹隼善擊必待秋焉以感疾厲之氣故早鷙於夏也四鄙入保已見孟夏解蓋春夏主出秋冬主入故也山隂陸氏曰國多風咳變民言國國通於上若多疾病多瘧疾多鼽嚏多疥癘於言民為宜禮記集說卷四十二
