body:
  text: 禮記集説卷一百一宋衛湜撰雜記上第二十孔氏曰案鄭目録云名曰雜記者雜記諸侯以下至士之喪事此於别録屬喪服嚴陵方氏曰此篇雖以記喪為主下篇又兼言三患五恥觀蠟取盜之類則其事不一故以雜名篇猶之易有説卦序卦而有雜卦莊子有內篇而有雜篇也諸侯行而死於館則其復如於其國如於道則升其乘車之左轂以其綏復其輤有裧緇布裳帷素錦以為屋而行至於廟門不毁牆遂入適所殯唯輤為説於廟門外鄭氏曰館主國所致舍復招魂復魄也如於其國主國館賔與使有之得升屋招用褒衣也道道上廬宿也升車左轂象升屋東榮綏當為緌緌謂旌旗之旄也去其旒而用之異於生也輤載柩將殯之車飾也輤取名於襯與蒨讀如蒨斾之蒨襯棺也蒨染赤色者也將葬載柩之車飾曰栁裧謂鱉甲邉緣緇布裳帷圍棺者也裳帷用緇則輤用赤矣象宫室屋其中小帳襯覆棺者若未大斂其載尸而歸車飾皆如之廟所殯宫牆裳帷也適所殯謂兩楹之間去輤乃入廟門以其入自有宫室也毁或為徹凡柩自外來者正棺於兩楹之間尸亦侇之於此皆因殯焉異者柩入自闕升自西階尸入自門升自阼階其殯必於兩楹之間者以其死不於室而自外來留之於中不忍逺也孔氏曰自此以下至蒲席以為裳帷總明諸侯及大夫士在路而死招魂復魄并明飾棺貴賤之等此經論諸侯之制五等之侯朝覲天子及自相朝會死於主國有司所授館舍若復魄之禮則與在已本國同如於道自若也道路也若諸侯在道路死升其所乘車左邉轂上而復魄車轅向南左轂左東也不於道路廬宿之舍復者廬宿供待衆殯非死者所専有也以其綏復者若在國中招魂則用其上服今在路死則招用旌旗之綏亦冀魂魄望見識之而還也若王喪於國亦用綏周禮夏采云建綏復如四郊是也其輤有裧輤謂載柩之車四旁有物裧垂象鱉甲邉緣也輤下棺外用緇色之布以為裳帷於此裳帷之中又用素錦以為屋小帳以覆棺設此飾而後行也鄭引將葬車飾曰栁者證此輤非將葬車也至廟門不毁去裳帷遂入殯宫殯焉餘物不説唯輤一物説於殯宫門外輤乃覆棺上象宫室今入之有宫室故去輤鄭云入自有宫室是也柩入自闕至阼階曽子問文山隂陸氏曰綏旐也以其旐復旐北方之物也死無乎不之號而復之則其旗宜以死者所首之方而已廬陵胡氏曰禮言綏凡數處鄭皆讀為緌竊謂王制明堂位夏采所云讀作緌可也此復魄既在車當以執綏之綏杜子春説是鄭意蓋謂夏采建綏以復不知彼王禮也裳用緇則輤與裧皆赤也以玄纁對耳鄭謂輤如綪斾之綪取蒨赤也竊案大夫以白布為輤豈亦因染赤得名乎柩車飾經惟此一文則知未大斂前車飾亦然大夫士死於道則升其乘車之左轂以其綏復如於館死則其復如於家大夫以布為輤而行至於家而説輤載以輲車入自門至於阼階下而説車舉自阼階升適所殯鄭氏曰綏亦緌也大夫復於家以玄冕士以爵升服大夫輤言用布白布不染也言輤者達名也不言裳帷俱用布無所别也至門亦説輤乃入言載以輲車入自門明車不易也輲讀為輇或作摶許氏説文解字曰有輻曰輪無輻曰輇周禮又有蜃車天子以載柩蜃輇聲相近其制同乎輇崇蓋半乘車之輪諸侯言不毁牆大夫士言不易車互相明也不易者不易以輴也廟中有載柩以輴之禮此不易耳孔氏曰此一經明大夫車飾大夫以白布為輤不以蒨草染之初死及至家皆以輲車至家説輤惟輲車在故云載以輲車説車説去其車也舉自阼階下而升適兩楹之間所殯之處此謂尸若柩則升自西階也天子諸侯載柩以蜃車其殯時則易輴矣大夫士在路載以輲車至家説載亦載以輲車故鄭云車不易也凡在路載柩天子以下至士皆用蜃車其制與輲車同車禮遂師共蜃車之役是天子也既夕云遂匠納車於階間注云蜃車是士也此云輲車謂大夫也諸侯不言可知其蜃車之形鄭注既夕禮其車之輿牀如牀中央有轅前後出設輅輿輅輿上有四周下則前後有軸以輇為輪迫地而行其輪卑有似於蜃故鄭云半乘車之輪乘車輪六尺有六寸今云半之得三尺三寸也輲車則不用輻為輪天子諸侯殯皆用之故檀弓云天子菆塗龍輴謂畫輴轅為龍諸侯殯亦用輴車不畫轅為龍也喪大記云君殯用輴注云君諸侯也輴不畫龍大夫殯不用輴故鄭注喪大記大夫之殯廢輴士掘肂見衽是亦廢輴也其朝廟大夫以上皆用輴士朝廟用輂軸故既夕禮云遷於祖用軸鄭注云大夫諸侯以上有四周謂之輴天子畫之以龍是也輴與輂軸所以異者輴有四周輂軸則無故鄭注既夕禮云軸狀如轉轔刻兩頭為軹輂狀如長牀穿桯前後著金而關軸焉是也廬陵胡氏曰綏亦如字大夫無為屋之文則是素錦帳同諸侯矣士輤葦席以為屋蒲席以為裳帷鄭氏曰言以葦席為屋則無素錦為帳孔氏曰此一經明士輤也謂用葦席屈之以為輤棺之屋蒲席以為裳帷圍繞於屋旁也然大夫無以他物為屋之文則是用素錦為帳矣既有素錦帷帳帳外上有布輤旁有布裳帷則士之葦席屋之外旁有蒲席裳帷則屋上當以蒲席為輤覆於上但文不備也嚴陵方氏曰大夫以布為輤則諸侯用帛可知士以葦席為屋則不得用素錦矣蒲席為裳則不得用緇布矣此皆降殺之别也凡訃於其君曰君之臣某死父母妻長子曰君之臣某之某死君訃於他國之君曰寡君不祿敢告於執事夫人曰寡小君不祿大子之喪曰寡君之適子某死鄭氏曰訃或皆作赴赴至也訃於其君謂臣使其子使人至君所告之也君之臣某之某死此臣於其家喪所主者君夫人不稱薨告他國君謙也孔氏曰此一節總明遭喪訃告於君及敵者并訃於鄰國稱謂之差父母妻長子曰君之臣某之某死上某是生者臣名下某是臣之親屬死者君赴於他國稱寡君若云寡德之君曲禮云諸侯曰薨士曰不祿夫人尊與君同今俱不稱薨同士稱者言臣子於君父雖有考終眉夀猶若其短折然故云不祿若君薨而訃者曰卒卒是夀終矣斯無哀惜之心非臣子之辭鄰國來赴書以卒者言無所老幼皆終成人之志所以相尊敬也不敢指斥鄰國君身故云告于執事夫人太子皆當云告于執事不言者略也山隂陸氏曰凡諸侯同盟則訃不同盟蓋不訃也不言死不死其君也不言卒不卒其君也曲禮云夀考曰卒短折曰不祿君雖夀考猶以不祿赴臣子之意也夫人曰寡小君不祿左傳曰君氏卒聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨大夫訃於同國適者曰某不祿訃於士亦曰某不祿赴於他國之君曰君之外臣寡大夫某死訃於適者曰吾子之外私寡大夫某不祿使某實訃於士亦曰吾子之外私寡大夫某不祿使某實鄭氏曰適讀為匹敵之敵謂爵同者也實當為至此讀周秦之人聲之誤也孔氏曰此一經明大夫卒相訃告之禮同國適者謂大夫位相敵者大夫既尊於士士處亦稱不祿稱其者或死者名或死者官號而赴者得稱之訃於他國之君故云外臣自謙退無德故云寡大夫尊敬他君故云某死訃於他國大夫私有恩好故曰外私以赴大夫其辭得申故云某不祿以身赴告故云使某至訃於士與大夫同嚴陵方氏曰士曰不祿此非士亦曰不祿者謙辭也與死者有私恩故曰外私與玉藻言於大夫曰外私名同而實異矣使某實謂以事實來告廬陵胡氏曰春秋傳曰以賜君之外臣首實謂身親告也清江劉氏曰使某實實者以異國傳聞疑言使人實之也士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外私某死訃於士亦曰吾子之外私某死孔氏曰此經論士喪相訃告之稱士賤赴大夫士及他國皆云某死但於他君稱外臣於大夫士言外私耳大夫次於公館以終喪士練而歸士次於公館大夫居廬士居堊室鄭氏曰公館公宫之舍也練而歸之士謂邑宰也練而猶處公館朝廷之士也唯大夫三年無歸大夫居廬士居堊室亦謂未練時也士亦謂邑宰朝廷之士居廬孔氏曰此一節明大夫士遭君喪次舍居處及歸還之節大夫恩深祿重故為君喪居廬終喪乃還家邑宰之士恩輕又為君治邑久不歸即廢職故至小祥反其所治邑朝廷之士雖輕而無邑事故亦留次公館三年也大夫居廬以位尊恩重士居堊室以位卑恩輕鄭知未練時者若練後則大夫居堊室知士居堊室謂邑宰者若非邑宰未練之前當與大夫同居廬然周禮宫正注云親者貴者居廬疏者賤者居堊室引此經文則是大夫以上定居廬士以下定居堊室與此注朝廷之士亦居廬不同者鄭意謂與王親者雖士賤亦居廬則此注是也若與王無親身又是士則居堊室則此經士居堊室是也故宫正之法引士居堊室證賤者居堊室也若與王親雖疏但是貴者亦居廬也案熊氏曰若天子則大夫居廬士居堊室此經是也若諸侯則朝廷大夫士皆居廬宰邑之士居堊室宫正之注是也山隂陸氏曰此言士次於公館則大夫居廬士居堊室即言大夫次於公館以終喪士練而歸大夫居廬士居堊室嫌士練而歸猶居堊室廬非久處者也以言待盡於此金華應氏曰必次於公館即練而歸之士也但大夫以其序皆次且朝夕存焉以待終喪故曽子問曰君未殯則朝夕不歸士則不盡次而又止於練未必朝夕存焉故檀弓曰早備入而朝夕踊經所以既曰練而歸又曰次於公館者正謂其不能盡次故以次為復也鄭氏謂士分兩等而有邑宰朝廷之殊諸侯之士多矣由大國至小國其有中士下士者數各居其上之三分固不止於兩等然而邑散布於四竟之內固有去國尤逺者若邑宰之士盡釋邑寄而館於此豈不皆廢一邑之事乎於經文似不通大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服鄭氏曰大夫雖尊不以其服服父母兄弟嫌若踰之也士謂大夫庶子為士者也已卑又不敢服尊者之服今大夫喪禮逸與士異者未得而備聞也春秋傳曰齊晏桓子卒晏嬰粗衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫此平仲之謙也言已非大夫故為父服士服耳粗衰斬者其縷在齊斬之間謂縷如三升半而三升不緝也斬衰以三升為正微細焉則屬於粗也然則士與大夫為父服異者有粗衰斬枕草矣其為母五升縷而四升為兄弟六升縷而五升乎唯大夫以上乃能備儀盡飾士以下則以臣服君之斬衰為其父以臣從君而服之齊衰為其母與兄弟亦以勉人為髙行也大功以下大夫士同服孔氏曰此一經明大夫士為其父母昆弟之服大夫之父母兄弟或作士或無官今大夫為之若著大夫之服是自尊踰越父母兄弟也鄭知士是大夫庶子者若大夫適子雖未為士猶服大夫之服即下文是也引春秋襄十七年左傳文證大夫與士喪服不同也唯卿為大夫者此晏嬰對家老言若身為卿得著大夫之服若身為大夫唯得服士服此平仲謙退之辭非禮也案喪服初章斬衰次章疏衰疏即粗也粗衰斬者言其布縷在齊斬之間齊斬三升粗衰四升今粗如三升半而計縷唯三升也鄭既約晏嬰之事始明大夫與士不同大夫以上斬衰枕凷士則疏衰枕草也鄭既約士之父服縷細降一等經文有母及兄弟故約母與兄弟之服喪服為母四升此云為母五升縷謂粗細似五升之縷成布四升喪服為兄弟五升此云為兄弟六升縷為粗細如六升之縷成布五升皆謂縷細成布升數少也大夫以上儀服無降殺故鄭云備儀盡飾士以下為父母兄弟降從義服案喪服義服皆降正服一等居喪之禮以服重為伸以服輕為屈今以重服情深使士有抑屈是勉勵士身使為髙行也大夫以下輕服情殺故上下俱伸王氏曰喪禮自天子以下無等故曽子曰哭泣之哀齊衰之情饘粥之食自天子達於庶人且大國之卿與天子上士俱三命故曰一也晉士起大國上卿當天子之士也平仲之言唯卿為大夫謂諸侯之卿當天子之大夫非謙辭也春秋之時尊者尚輕簡喪服禮制遂壞羣卿大夫専政晏子惡之故服粗衰枕草於當時為重孟子云三年之喪齊疏之服飦粥之食自天子達於庶人三代共之又此經云端衰喪車皆無等又家語云孔子曰平仲可謂能逺於害矣不以己之是駮人之非遜辭以避咎也其大夫與士異者大夫以上在喪斂時辨經士冠素委貌石林葉氏曰古者喪服大夫士必有異制禮經皆不載鄭氏引晏平仲居桓子喪其老以為非大夫禮為證父母兄弟之未為大夫者服士服蓋不欲以尊踰之也而桓子亦大夫矣晏氏之老以為非大夫禮則平仲之服士服也故疑其為過也由是言之大夫與士之禮其必以精粗為辨歟當春秋時諸國蓋多行短喪而况其服是以平仲矯之不欲斥人之過所以姑自抑以卿然後為大夫為答家語亦記此事而有曽子問孔子孔子以為逺害孔子蓋與平仲而禮略之也嚴陵方氏曰生者貴而死者賤則其服從死者嫌若臨之故也生者賤而死者貴則其服從生者嫌若僣之故也山隂陸氏曰據此大夫喪服士有不如也既夕禮曰衰三升寢苫枕塊則古者士服斬衰寢苫枕塊大夫粗衰斬寢苫枕草是歟當晏子時士僭大夫大夫以上喪服益輕故嬰粗衰斬枕草反古之道家老視時以為非也間傳曰斬衰三升齊衰四升五升六升齊衰四升蓋士以下則五升大夫六升諸侯天子齊衰之别也若斬衰則兩等喪服所謂衰三升三升有半三升有半大夫以上服斬之衰歟大夫之適子服大夫之服鄭氏曰仕至大夫賢著而德成適子得服其服亦尊其適象賢孔氏曰父官至大夫適子雖未仕得服大夫之服為其能象似父之賢也案皇氏曰大夫適子若為士為其父唯服士服鄭注仕至大夫謂此子若仕官至大夫始得服大夫之服以其賢德著成也大夫之庶子為大夫則為其父母服大夫服其位與未為大夫者齒鄭氏曰雖庶子得服其服尚德也使齒於士不可不宗適孔氏曰大夫庶子仕至大夫由身有德行所以得服大夫之服其行位之處齒列於適子之下年雖長於適子猶在適子之下使適子為主若年少於適子則固在下是宗適也嚴陵方氏曰大夫之適子雖為士服大夫之服而不嫌於重者適故也至於庶子死身為大夫雖服大夫之服其位猶與未為大夫者齒蓋長幼之序不可以貴賤廢故也士之子為大夫則其父母弗能主也使其子主之無子則為之置後鄭氏曰大夫之子得用大夫之禮而士不得也置猶立也孔氏曰士子身為大夫父身是士故不可為大夫喪主使此死者之子為主以其子是大夫適子故得服大夫服為之主前經大夫之適子服大夫服是也若無適子則以庶子當適處若無庶子則以族人之子當適處皆得用大夫禮此所置之後謂暫為喪主假用大夫禮若大宗子則直為立後自然用大夫禮也父是士則不得主大夫喪所以然者父貴可以及子故大夫之子得用大夫之禮子貴不可以及父故其父不得用大夫之禮大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮辨鄭氏曰有司卜人也麻衣白布深衣而著衰焉及布帶緇布冠此服非純吉亦非純凶也皮辨則純吉之尤者也占者尊於有司卜求吉其服彌吉大夫士朔服皮辨孔氏曰宅謂葬地大夫尊故得卜宅并葬日麻衣謂白布深衣吉服十五升之布布衰謂粗衰以三升半布為衰長六寸廣四寸綴於衣前當胸上後又有負版長一尺六寸廣四寸白布深衣是吉衰是凶布帶亦凶緇布冠是吉不蕤亦凶故鄭云非純服也因喪屨因喪之繩屨也緇布冠古法不蕤後代有蕤此以凶事故得云不蕤占者謂卜龜之人皮辨是純吉尤甚者山隂陸氏曰有司羣吏有事者也鄭氏謂有司卜人誤矣據士冠禮有司如主人服即位于西方東靣北上筮與席所卦者具饌於西孰言因喪屨則麻衣布衰布帶緇布冠不蕤非前日之服也凡服皆先服服而後冠聘禮曰遭喪將命于大夫主人長衣練冠以受是也筮先冠後衣自既服之後歟緇布冠不蕤禮也不待言不緌而後著今言不緌以有緌之者也如筮則史練冠長衣以筮占者朝服鄭氏曰筮者筮宅也謂下大夫若士也筮史筮人也長衣深衣之純以素也長衣練冠純凶服也朝服純吉服也大夫士日朝服以朝也孔氏曰士喪禮云筮宅卜日故知此謂筮宅也下云下大夫及士不合用卜故知用筮以筮輕故用純凶服占者用朝服也案士喪禮族長涖卜及宗人吉服鄭注服玄端也彼謂士之卜禮此據筮禮故朝服案士虞禮注云士之屬吏為其長弔服如麻此史練冠長衣者此經文含大夫其臣為大夫以布帶繩屨故史練冠長衣若士之卜史當從弔服不得練冠長衣也山隂陸氏曰長衣蓋練衣也練而為衣長之即吉有漸也知然者以練練衣黃裏縓緣鹿裘衛長袪知之也鄭氏謂長衣深衣之純以素非是大夫之喪既薦馬薦馬者哭踊出乃包奠而讀書鄭氏曰嫌與士異記之也既夕禮曰包牲取下體又曰主人之史請讀賵孔氏曰此明大夫將葬柩朝廟後欲出之時也案士喪禮下篇云薦馬凡有三柩初出至祖廟設奠為遷祖之奠訖乃薦馬一也至日側祖奠又薦馬二也明日將行遣奠時又薦馬三也此薦馬下云包奠而讀書於既夕禮為第三薦馬時薦進也馬是牽車為行之物孝子見進薦馬是行期已至故感之而哭踊焉出乃取遣奠牲下體包裹之以遣送行也苞者象既饗而歸賔俎士則羊豕各三個必取下體者下體能行亦示將行也有遣車者亦先包之書謂凡送亡者賵入椁之物書也讀之者省録之也注引讀賵賵猶送者人名也大夫之喪大宗人相小宗人命龜卜人作龜鄭氏曰卜葬及日也相相主人禮也命龜告以所問事也作龜謂揚火灼之以出兆孔氏曰大夫謂卿也大宗謂大宗伯也小宗謂小宗伯也案皇氏曰大小二宗並是其君之職來為喪事如司徒旅歸四布是也故宗伯肆師云凡卿大夫之喪相其禮金華應氏曰君臣一家也君之喪百官庀其職大夫之喪家臣庀其役其廣狹不同矣君則恤其私而以國有司助之其凡役則司徒供之少儀聽役於司徒是也其贊相則大小二宗與卜人同之宗伯四師相禮是也其大小宗與卜人皆春官而喪事同贊相之蓋君喪之用大宰大宗大祝若曽子問所記是也而亦以贊大夫之喪其待之厚矣夫臣子之喪其力有不能盡具者皆仰之於公又俾有司贊其事所謂體羣臣者此類是也內子以鞠衣褒衣素沙下大夫以禪衣其餘如士鄭氏曰此復所用衣也當在夫人狄稅素沙下爛脫失處在此上耳內子卿之適妻也春秋傳曰晉趙姬請逆叔隗於狄趙衰以為內子而已下之是也下大夫謂下大夫之妻禪周禮作展王后之服六唯上公夫人亦有禕衣侯伯夫人自揄狄而下子男夫人自闕狄而下卿妻自鞠衣而下大夫妻自展衣而下士妻稅衣而已素沙若今紗縠之帛也六服皆袍制不禪以素紗裏之如今袿𫀆􅙦重繒矣褒衣者始為命婦見加賜之衣也其餘如士之妻則亦用稅衣孔氏曰此一經明卿大夫以下之妻所復之衣鞠衣褒衣者始命為內子上所褒賜之衣故曰褒衣即鞠衣也復時亦用此衣亦以素沙為裏鄭引春秋僖二十四年左傳文證卿妻為內子也王后以下之服已具玉藻𫀆制為通衣裳有表有裏似𫀆故云不禪似漢時袿𫀆下之襈以重繒為之也其餘如士謂鞠衣袒衣之外其餘褖衣如士之妻士妻既用褖衣而復則內子下大夫妻等亦用褖衣也復諸侯以褒衣冕服爵辨服鄭氏曰復招魂復魂也冕服者上公五侯伯四子男三褒衣亦始命為諸侯及朝覲加賜之衣也褒猶進也孔氏曰自此至西上總明招魂所用之衣但此經上下顚倒如鄭所次以此經為首次以夫人稅衣揄狄之經然後次內子以鞠衣之經諸侯既用褒衣又以冕服爵辨服而復也冕服者上公自衮冕而下故為五侯伯自鷩冕而下故為四子男自毳冕而下故為三也凡服各依其命數則上公五冕之外更加爵辨服以下皮辨冠辨之等而滿九侯伯冕服之外亦加爵辨以下而滿七子男冕服之外加爵辨皮辨而滿五其褒衣君特所褒賜則冝在命數之外也故王制云三公一命衮若有加則賜是褒衣不入命數也此褒衣或是冕之最上者山隂陸氏曰先儒謂始命為諸侯及朝覲加賜之衣若秦仲受顯服其詩曰黻衣繡裳此其一隅黻衮也然則復諸侯以褒衣公襲褒衣一舉其有者也若以謂諸侯人得而有之非所謂褒夫人稅衣揄狄狄稅素沙鄭氏曰言其招魂用稅衣上至揄狄也狄稅素沙言皆以白紗縠為裏孔氏曰此明婦人復衣婦人衣有六也夫人謂諸侯伯夫人也狄稅言從揄狄以下至於稅衣山隂陸氏曰夫人先稅衣後揄狄即服有漸也據復諸侯以褒衣冕服爵辨服其言狄稅素沙又以别內子焉據內子以鞠衣素沙夫人稅衣不言以不嫌不以復西上鄭氏曰北靣而西上陽長左也復者多少各如其命之數孔氏曰凡招魂皆北靣而招以西頭為上招魂冀生氣之來生氣為陽又北靣言之南方是陽左在西方故鄭言陽長左案士喪禮復者一人諸侯之士一命而用一人明復者各依命數也嚴陵方氏曰復北靣求諸幽故以西為上西北皆隂故也大夫不揄絞屬於池下鄭氏曰謂池飾也揄揄翟也采青黃之間曰絞屬猶繫也人君之栁其池繫絞繒於下而畫翟雉焉名曰振容又有銅魚在其間大夫去振容士去魚此無人君及士亦爛脫孔氏曰此一經明大夫葬時車飾諸侯以上則畫揄翟於絞屬於池下若大夫降下人君不得畫以揄絞屬於池下其池上則畫於揄得有揄絞也故喪大記士亦有揄絞與大夫同但不得屬於池下人君之栁上有池下有振容池與振容之間又有魚故注云在其間詳見喪大記山隂陸氏曰冝承蒲席以為裳帷之下爛脫在是然則大夫士殯與葬儀雖小不同大略一也其異者大夫不揄絞屬於池下大夫附於士士不附於大夫附於大夫之昆弟無昆弟則從其昭穆雖王父母在亦然鄭氏曰附讀皆為祔大夫祔於士不敢以己尊自殊於其祖也士不祔於大夫自卑别於尊者也大夫之昆弟謂為士者也從其昭穆中一以上祖又祖而已祔者祔於先死者孔氏曰自此至祔於公子廣明祔祭之義大夫祔於士謂祖為士孫為大夫若死可以祔祭於祖之為士者士不祔於大夫謂先祖為大夫孫為士不可祔祭於大夫唯得祔於大夫之兄弟為士者無昆弟謂祖無昆弟為士則從其昭穆謂祔於髙祖為士者髙祖為大夫則祔於髙祖昆弟為士者若孫死之後應合祔於王父王父見無可祔亦如是祔於髙祖也鄭恐大夫之昆弟俱作大夫士亦得祔之故云謂為士者中一以上喪服小記文謂自祖以上間一世各當昭穆而祖祔之若不得祔祖則間去曽祖一世祔於髙祖若髙祖無可祔則祔髙祖之祖是祖又祖也金華應氏曰重世裔之本宗故大夫寧自屈而祔於士重朝廷之命爵故士不敢僭而祔於大夫重婚姻之正耦故婦與妾之祔各以其類而無之則寧越次而間升重承家之陽類故男祔則配而女祔則不配婦附於其夫之所附之妃無妃則亦從其昭穆之妃妾附於妾祖姑無妾祖姑則亦從其昭穆之妾鄭氏曰夫所祔之妃於婦則祖姑孔氏曰此經綸婦之所祔義與夫同孫婦祔祖姑無妃謂無祖姑亦間一以上祔於髙祖之妃無則祔於髙祖之祖妃若其祖有昆弟之妃班爵同者亦祔之男子附於王父則配女子附於王母則不配公子附於公子鄭氏曰配謂并祭王母不配則不祭王父也有事於尊者可以及卑有事於卑者不敢援尊配與不配祭饌如一祝辭異不言以某妃配某氏耳女子謂未嫁者也嫁未三月而死猶歸葬於女氏之黨公子附於公子不敢戚君孔氏曰男子祔於王父并祭所配王母在室之女及已嫁未三月而死祔祭於王母則不祭所配之王父案特牲禮云用薦歲事於皇祖某子是不言配少牢禮云以某妃配某氏鄭注云某妻也某氏若言薑氏子氏也此是言配但士用特牲大夫用少牢其餘皆同是祭饌如一特牲雖是常祭容是禫月吉祭故不言配公子之祖為君公子不敢祔於祖之兄弟為公子者故鄭云不敢戚君也君薨大子號稱子待猶君也鄭氏曰謂未踰年也雖稱子與諸侯朝會如君矣春秋魯僖公九年夏葵丘之會宋襄公稱子而與諸侯序待或為侍孔氏曰大子君存稱世子今君既薨故稱子與諸侯並列其待之禮猶如正君引春秋者證未踰年稱子及待猶君之義若踰年則稱君也若杜元凱之意未葬以前雖踰年猶稱子既葬雖未踰年亦稱公具在曲禮疏山隂陸氏曰此言君薨未葬待其子猶君也春秋召陵之會陳子亞衛侯待猶陳侯也若溫之會陳侯既葬陳子序在鄭伯之下莒子之上視君下一等有三年之練冠則以大功之麻易之唯杖屨不易鄭氏曰謂既練而遭大功之喪者也練除首絰要絰葛又不如大功之麻重也言練冠易麻互言之也唯杖屨不易言其餘皆易也屨不易者練與大功俱用繩耳孔氏曰此謂遭三年之喪至練時首絰已除故特云冠若初死者是降服大功則以此大功之麻易三年之練也此特據降服大功其餘七升八升九升之大功則不得易三年之練也大功無杖無可改易斬衰既練要絰與大功初死要絰粗細同斬衰是葛大功是麻故鄭云不如大功之麻重也云練冠易麻互言之者麻謂絰帶大功言絰帶明三年練亦有絰帶三年練云冠明大功亦有冠是大功冠與絰帶易年冠及絰帶故云互言之嚴陵方氏曰三年之喪既練而遭大功之喪則以麻易之者此以義起禮也有父母之喪尚功衰而附兄弟之殤則練冠附於殤稱陽童某甫不名神也鄭氏曰此兄弟之殤謂大功親以下之殤也斬衰齊衰之喪練皆受以大功之衰此謂之功衰以是時而祔大功親以下之殤輕不易服冠而兄為殤謂同年者也兄十九而死已明年因喪而冠陽童謂庶殤也宗子則曰隂童童未成人之稱也某甫且字也尊神不名謂之造字孔氏曰此經明已有父母之喪練後得祔兄弟小功之殤也已有父母喪猶尚身著功衰今兄弟有殤在小功者當須祔祭則不改練時之服身著練冠祔祭於殤也大功正服則變三年之練故鄭知此大功以下之殤言以下兼小功也已是祖之適孫若祔大功兄弟長殤得在祖廟若祔小功兄弟長殤則是祖之兄弟之後所以得祔者已是曾祖之適其小功兄弟同曾祖今小功兄弟當祔於從祖之廟其小功兄弟身及父是庶人不合立祖廟則曾孫適孫為之立壇祔小功兄弟之長殤於從祖立神而祭也當祔祭此殤之時祝辭稱此殤曰陽童又稱某甫所以不呼其名者尊神之也故為之造字稱曰某甫曾子問庶子之殤祭於室白故曰陽童宗子殤死祭於室奧則曰隂童檀弓云五十以伯仲是正字二十之時曰某甫是且字言且為之立字也鄭云冠而兄為殤謂同年者此鄭自難云弟冠而兄得為殤者謂弟與兄同年十九也云兄十九而死已明年因喪而冠者此新死之兄既是小功之服不合變三年之練而得有因喪冠者謂已明年之初用父母喪之練節而加冠以後始祔兄弟也云為之造字者以冠始有字此兄去年已死未得有字祔時為之造字也橫渠張氏曰有父母之喪尚功衰謂未祥猶衣所練之功衰未衣麻衣也藍田吕氏曰上言有三年之練冠則以大功之麻易之唯杖屨不易此謂三年既練遭大功之喪當易練冠練衣而服大功之衰又加首絰以麻易葛帶所不易者杖屨而已然此三年者統言父母君長子及為人後及適孫為祖之類若父母之喪既練而祔兄弟之殤則杖屨與練冠俱不易此一節於三年練冠中特為父母立例蓋大功之衰有重於三年之練冠故所不易者唯有杖屨兄弟之殤雖亦大功然既殤且祔冝輕於父母之練故比之三年所不易者又有練冠也功衰者卒哭所受六升之服也至練則以功衰之布練而為衣故猶曰功衰此不曰練而曰功衰者為下練冠立文也言尚者明受功衰之日已逺故知為練服也若哭兄弟之殤則必易練冠蓋殤之喪雖無卒哭之稅至于祔冝有殺矣凡異居始聞兄弟之喪唯以哭對可也其始麻散帶絰未服麻而奔喪及主人之未成絰也疏者與主人皆成之親者終其麻帶絰之日數鄭氏曰以哭對惻怛之痛不以辭言為禮也散帶垂與居家同也凡喪小斂而麻疏者謂小功以下也親者大功以上也疏者及主人之節則用之其不及亦自用其日數孔氏曰此一節明異居聞兄弟喪哭及奔赴之禮言凡非一之辭異居别所而始聞兄弟之喪不暇問餘事唯哭對使者則於禮可也始麻散帶絰者此謂大功以上兄弟其初聞喪始服麻之時散垂要之帶絰若小功以下服麻則糾垂不散也若聞喪未及服麻而即奔喪道路既近至在主人未成絰時謂未小斂之前也疏者值主人成服之節則與主人成之親者雖值主人成服未即成之必終竟其麻帶絰滿依禮日數而後成服也案士喪禮小斂襲絰于序東是凡士喪小斂而麻也又士喪禮三日絞垂此云始麻散帶絰是與居家同也鄭注其不及亦自用其日數者謂疏者若不及主人之節亦自用其依禮之日數奔喪之後至三日而成服也案奔喪禮聞喪即襲絰絞帶不散彼謂有事未即奔喪故也又奔喪禮至即絞帶不散垂彼謂來遲此即來奔故至猶散麻以見尸柩故也山隂陸氏曰喪服小記所謂有主後者謂異居是也此謂聞同母異父兄弟之喪殺於兄弟惻怛之情輕不必盡哀又不必問故故曰唯以哭對可也主妾之喪則自附至於練祥皆使其子主之其殯祭不于正室君不撫僕妾鄭氏曰祔自為之者以其祭於祖廟不撫僕妾略於賤也孔氏曰妾既卑賤得主之者謂女君死攝女君也祔祭於祖姑尊祖故自祔也妾合祔於妾祖姑無妾祖姑則祔於女君雖攝女君猶下正適故殯之與祭不得在正室妾祖姑無廟於廟中為壇祭之若不攝女君之妾則不得為主則别為壇不在祖廟中而子自主之也嚴陵方氏曰妾之喪祔於妾祖姑之廟故其夫自主而祔之非尊妾也尊祖而已練祥則使其子者略之也殯祭不於正室者所以明嫡也不撫僕妾貴之於賤冝略故也山隂陸氏曰言主妾之喪則自祔則妾之喪其主有不主者矣崔氏謂女君死攝女君也然則練祥使其子主之曰練祥可矣今曰至於練祥則又以著虞卒哭其子主之固也女君死則妾為女君之黨服攝女君則不為先女君之黨服鄭氏曰妾於女君之親若其親然孔氏曰雖是徒從而抑妾故為女君黨服防覬覦也攝女君差尊故不為先女君之黨服嚴陵方氏曰女君死則妾為女君之黨服者親親之仁也攝女君則不為先女君之黨服者尊尊之義也山隂陸氏曰即不言先嫌女君出聞兄弟之喪大功以上見喪者之鄉而哭適兄弟之送葬者弗及遇主人於道則遂之於墓凡主兄弟之喪雖疏亦虞之鄭氏曰見喪者之鄉而哭奔喪節也遂之於墓言骨肉之親不待主人也疏亦虞之以喪事虞祔乃畢孔氏曰此一節明奔兄弟喪之法見喪者之鄉而哭此謂親兄弟同氣及同堂兄弟也奔喪禮云齊衰望鄉而哭大功望門而哭不同者此經謂降服大功者若如此則兄弟之名通經重也適兄弟之送葬者此兄弟通緦小功也適往也謂往送五服之親不及喪柩在家主人葬竟已還送葬之人值於路不得隨孝子歸仍自獨往於墓也兄弟疏者謂小功緦麻彼既無主雖服緦小功之疏亦為之主虞祔之祭案小記云大功者主人之喪有三年者則必為之再祭鄭注云小功緦麻為之練祭可也與此不同者彼承大功有三年者此則緦小功有三年者故至小祥同於三年故主虞祔也今此言疏者亦虞但虞者謂無服者朋友相為亦虞祔也禮記集説卷一百一
