body:
  text: 禮記集説卷一百二十一宋衛湜撰坊記第三十孔氏曰案鄭目録云名曰坊記者以其記六藝之義所以坊人之失者也此於别録屬通論嚴陵方氏曰君子之坊民舍禮何以哉故經解曰禮禁亂之所由生猶坊止水之所自來也當周之衰以舊坊為無所用而壞之者多矣則坊之之道故不可以不記矣龍泉葉氏曰先王所以坊民者大矣夫道散而難名民聚而無所定方當教化未明之初天下之人無有君臣上下尊卑長幼之節聖人制禮以先民立坊以示之凡所以使民安行於坊範之中得以遂其所欲然後飲食男女養生送死之具皆得安其所當然由是言之君子之為禮非以禁其欲而行之乃是為之坊以遂其欲也譬如人之一身自頂至踵皆有以自衛寒則有寒之坊暑則有暑之坊方其見所尊對所敬在外而有其坊方其燕居褻服在內而有其坊若使此身無坊豈能一日安養又即是而推之人之居室將以安其身也上棟下宇垣牆障設無所不至然後可安若其有一隙一穴之不備則一家為之不寧聖人以天下之民病於無坊而不能以自立是以朝廷之上相與為之制作有損有益有紀有序世變相從先後相繼使大坊既立君臣上下尊卑長幼之序秩然而不可亂孰能自越於斯禮之外者當周之衰聖王不作所以坊之之道浸以廢壞始有悖先王之大坊自為之規模者故國異政家殊俗權謀詐偽之俗成攘奪戕殺之禍起凡天下之民出私意任小智紛然出於制度坊間之外孔子之徒號為儒者之學深考古昔見後世風俗之變思先王之大坊以為皆必有深意原其至微至眇制作於百世之前以為百世之後苟廢而不治則大弊極亂將不可救然當世之人自越於法度之中而先王所謂坊者亦蕩然而不復有先王之坊既失自秦以後由漢及唐數百年之間其上之為君者各自制作以為吾之大坊足以安利天下休養生息此其弊雖不至如暴秦之己甚而率皆苟簡無復美意或以智力或以詐謀或以術數或以刑名又復有疏闊朴陋將使姦雄之人見其坊之不足恃始跌蕩於規矩準繩之外而為干君犯上之事豪傑超越之士以為其坊之不足由而率意妄行無復軌轍至於自棄其身於異端邪説者有之矣古之聖賢所用以坊天下其為纎悉不可以一端盡自夫率意自用而出於坊制之外者每每操切以坊天下先王之道常每病於難明學者能由是道而推之嚴於自坊而寬於坊民於天下之事深察曲盡以之處朋友以之處家庭以之處鄉黨以之事君而治天下其間事變之難易人情之逆順要能引天下於法度之中而無失於先王之大端而已讀坊記一篇又知儒者見其本根考其源流其意甚善而其所操猶有未盡後之學者得其所謂本始者究心焉則古人録是篇之意見矣子言之君子之道辟則坊與坊民之所不足者也大為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲鄭氏曰民所不足謂仁義之道也失道則放辟邪侈大為之坊民猶踰之言嚴其禁尚不能止况不禁乎命謂教令孔氏曰此一節發端起首總明所坊之事此篇三十九章唯此一章稱子言之下悉言子云以此章一篇總要故特稱子言之也但此篇所坊體例不一或數經共論一事或一經唯説一事或引詩書結之或不引詩書皆無義例君子坊民之過譬如坊之礙水坊民之所不足釋立坊之義也由民踰德故設禮以坊民德之失制刑以坊民之淫邪設法令以坊民之貪欲橫渠張氏曰君子之道辟則坊與辟讀如譬喻之譬下云禮刑命即君子之道也命以坊欲命謂規矩制度禮以坊德德逸德也長樂劉氏曰君子之道原於心者也心有非辟則害于其道必有禮以正其志然後非辟之心銷而德義之心作矣故曰君子之道辟則坊與與者疑而未定之辭若夫凡民則不知用禮以坊其心是以非辟之意萌於中而害于其道而莫之知也刑於言行悖于禮法觸于刑憲中失於內仁義不足于外矣故曰坊民之所不足者也大為之坊而民猶踰之此言其違悖禮教而觸乎刑者也嚴陵方氏曰君子有禮以坊德有刑以坊淫有命以坊欲其為坊也可謂大矣然或失於德而犯禮或溺於淫而犯刑徇於欲而犯命故曰大為之坊民猶踰之若失於德溺於淫徇於欲者則所謂辟也馬氏曰禮所以制中故禮以坊德刑所以禁過故刑以坊淫命所以知分而安之故命以坊欲禮以坊德所謂戒之用休也刑以坊淫所謂董之用威也命以坊欲則聖人道化之盛也山隂陸氏曰君子之道辟則坊與言君子之道以譬則坊也道民之所不足者也坊民之所不足者言民之所不足者坊也大為之坊民猶踰之是之謂民之所不足命以坊欲孟子所謂有命焉君子不謂性也慶源輔氏曰禮以為坊則德不失故曰大德不踰間人有所畏則不敢縱禮以坊德刑以坊淫略而言之也至於命以坊欲則又入深而言之是三者所謂大為之坊也彼因一事設一禁者豈君子之道哉金華應氏曰天理人欲相為消長欲動情勝人欲熾盛而有餘天理消滅而不足禮坊其所不足制其所有餘性之善為德禮以坊之而養其源性之蕩為淫刑以坊之而遏其流出德則入於淫故出禮則入於刑聖人坊民之具至是盡矣然人之欲無窮非防間所能盡聖人於是有命之説焉命出於天各有分限截然不可踰也天命至嚴人力莫施以是防之則覬覦者塞羡慕者止而欲不得以肆矣詩曰抱衾與裯實命不猶苟不知命有貴賤則賤妾進御求逞其欲何能盡其心乎子云小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡鄭氏曰約猶窮也此節文者謂農有田里之差士有爵命之級也慊恨不滿之貌也慊或為嫌孔氏曰此一節明小人貧富皆失於道故聖人制禮而為之節文也聖人制為富貴貧賤之法不云貧賤略其文也制富者居室丈尺俎豆衣服之事須有法度不至驕也為貧者制農田百畝桑麻自贍比閭相賙不令至於約也貴謂卿士之屬制其祿秩隨功爵而施則貴臣無慊恨君祿爵之薄也益漸也亡無也為亂之道漸無也不云賤者從可知也長樂劉氏曰約謂愧恥乎其不足所以愧恥之極斯為盜矣驕謂踰違於禮法所以踰違之極則為亂矣聖人所以自天子至於子男為之田制而差其禮樂之度數也自卿大夫至於庶民為之祿制而定其食用之等降也上下既分民志一定而僭逼不興於其心故亂益亡者禮之制也嚴陵方氏曰小人無道以安貧故貧斯約無德以守富故富斯驕約則不足有羡彼之志故約斯盜驕則不遜有犯上之心故驕斯亂凡此皆人之情也而禮則因人之情為之節文以為民坊而已下兼言貧而上止言制富貴者禮之所難制尤在於富貴故也言富必繼之以貧言貴不繼之以賤者難制者在所詳易制者在所略故也若家富不過百乘所以制富而不使之驕匹夫受田百畝所以制貧而不使之約伐冰之家不畜牛羊所以制貴而不使之慊若是則各得其制而反相治矣山隂陸氏曰貴不慊於上若上公如王之服是也故亂益亡怨亂每言益亡以亂易而難治怨易而難懷故也石林葉氏曰貴賤尊卑者節也升降上下者文也有節以制其等有文以别其位則富不驕貧不約貴不慊於上雖然禮之所制者亦多術矣富貴獨先焉者以人道之大欲所存而已矣慶源輔氏曰約是氣歉驕是氣盈坊主於禮故此著言之作者之謂聖故制富貴聖人之事也慊謂滿足貴不慊於上如滿而不溢髙而不危之意子云貧而好樂富而好禮衆而以寧者天下其幾矣詩云民之貪亂寧為荼毒故制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有畔者鄭氏曰大族衆家恆多為亂天下其幾矣言如此者寡也寧安也民之貪亂寧為荼毒言民之貪為亂者安其荼毒之行惡之也古者方十里其中六十四井出兵車一乘此兵賦之法也成國之賦千乘雉度名也髙一丈長三丈為雉百雉為長三百丈方五百步子男之城方五百百雉者此謂大都三國之一孔氏曰此一節明上下制度有限坊其奢僭畔逆之事貧而好樂富而好禮家族衆而得寧如此三者天下極少故云寡矣引詩大雅桑柔之篇刺厲王之詩也天下為惡者多故為限節諸侯之國不得過千乘之賦卿大夫都城不得過越百雉卿大夫之富采地不得過越百乘於時卿大夫亦有畔而獨言諸侯者舉其重餘可知也皇氏曰案司馬法云成方十里出革車一乘又云甸方八里出長轂一乘鄭注小司徒云若通溝洫之地則為十里除溝洫之地則為八里故云六十四井出車一乘注云成國之賦千乘者襄十四年左傳成國不過半天子之軍謂滿千乘則為成國是公侯之封也案千乘之賦地方三百一十六里有畸案周禮公五百里侯四百里則是過千乘云不過千乘者其地雖過其兵賦唯千乘故論語注云雖大國之賦亦不是過焉其兵賦之法王畿之內六鄉之法家出一人萬二千五百家為鄉大司馬云五師為軍則萬二千五百人為一軍是一鄉出一軍又云天子六軍是出於六鄉凡軍制大司馬云五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍此師之制也凡出軍之法鄉為正遂為副則遂之出軍與鄉同故鄭注小司徒云鄉之田制與遂同則知遂之軍法與鄉同其公邑出軍亦與鄉同故鄭注匠人云采地制井田異於鄉遂及公邑則知公邑地制與鄉遂同明公邑出軍亦與鄉同其公卿大夫采地既為井田殊於鄉遂則出軍亦異於鄉遂也故鄭注小司徒井十為通士一人徒二人通十為成革車一乘士十人徒二十人十成為終革車十乘士百人徒二百人十終為同革車百乘士千人徒二千人此謂公卿大夫采地出車之制也其王畿之外謂諸侯大國三軍次國二軍小國一軍皆出鄉遂故費誓云三郊三遂是諸侯有遂也其諸侯計地出軍則司馬法云九夫為井四井為邑四邑為丘馬一匹牛三頭四丘為甸出長轂一乘甲士三人步卒七十二人馬四匹牛十二頭故成元年作丘甲杜服俱引此文以釋之此皆謂天子諸侯兵賦也又異義云天子萬乘諸侯千乘大夫百乘此大判言之尊卑相十之義其間委曲鄉遂公邑細别不同也故魯頌云公車千乘謂大總計地出軍也公徒三萬謂鄉遂兵數也是國界計地與鄉遂數不同諸侯成方十里出賦之時雖革車一乘甲士三人步卒七十二人其臨敵對戰之時則同鄉法五人為伍五伍為兩之屬也故左傳云邲之戰楚廣有一卒卒偏之兩又云兩之一卒適吳是臨軍對陳同鄉法也牧誓云武王戎車三百兩孔注云一車步卒七十二人則出軍法也經云千夫長百夫長謂對敵時也據司馬法之文諸侯車甲牛馬皆計地令民自出若鄉遂之衆七十五人則遣出革車一乘甲士三人馬四匹牛十二頭恐非力之所能皆是國家所給故周禮巾車職毁折入齎于職幣又周禮馬質云凡受馬於有司者書其齒毛與其賈馬死則旬之內更又司兵職云及授兵從司馬之法以頒之及其受兵輸亦如之是國家所給也云方五百步者六尺為步五六三十故三百丈為五百步云子男之城方五里者周禮典命云子男五命其國家宫室以五為節國家謂成方也是子男城方五里也云百雉謂大都三國之一者言子男五里積千五百步左傳云大都參分國之一子男大都三分國城而居其一是大都五百步為百雉也經云家富不過百乘者諸侯之卿采地也故左傳云唯卿備百邑地方百里也直云惟卿百邑未知天子諸侯公卿大夫采地大小案鄭注小司徒云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸又云采地食者皆四之一説者據此以為公食百里卿食五十里大夫食二十五里其諸侯之卿大夫傳云卿備百邑論語云百乘之家此據諸侯臣之采地則公之孤侯伯之卿與天子三公同俱方百里公之卿與侯伯之大夫俱方五十里公之大夫與侯伯之下大夫俱方二十五里其子男之地唯方二百里以下其卿之采地不得復方百里案易訟卦注云小國之下大夫采地方一成其定稅三百家唯有此文其子男中都大都無以言之案鄭注論語云伯氏駢邑三百家云齊下大夫之制似公侯伯下大夫唯三百家者但春秋之時齊之強臣尤多故伯氏唯食三百家之邑不與禮同也嚴陵方氏曰制國不過千乘即孔子所謂千乘之國是也千乘之國即百里之國也井田之法方里為井十井為乘百里之國適千乘也都城不過百雉即左氏所謂都城過百雉國之害也都蓋公卿王子弟所食之采地雉則五堵也百雉則其城五百堵矣家富不過百乘即孟子所謂百乘之賦也千乘百乘皆以所出之賦言之也乘以車之多少言雉以城之廣狹言或言其多少或言其廣狹互相備也於國言制於家言富皆謂制其富也亦互相備而已所坊之事不止於民經每以民為言者蓋民以不足於坊之之道故坊之設也以民為主若夫君子能以禮自坊則無俟乎人為之坊矣山隂陸氏曰天下其幾矣言其於治幾矣民之貪亂寧為荼毒如彼今如此其於治可謂幾矣制國不過千乘千乘之國舉成國也子男蓋不與故曰七命賜國千乘之賦地方三百一十六里有畸則自伯以上千乘之國百乘自縣內觀之以七十里之國也地方百里為車百乘則卿所受地蓋有元士之地附焉春秋傳曰唯卿備百邑先儒謂卿備百邑地方百里然則卿之地百里猶諸伯之地三百里也石林葉氏曰貧而無怨難能好樂則處貧之至愚夫愚婦一能勝豫衆而以寧者則處衆之至以樂處貧禮處富則寧衆者固處貴之事也有土地則有兵車乘者車之所以載也故制國則言乘雉之為物守死而不犯分有自衛之道也故都城則言雉諸侯雖其富貴不極而其為國千乘百雉至於大夫則其上亦有君非備貴者也故止言家富而已先王辨貴賤之分而諸侯大夫等差如此者蓋坊民為主其弊也諸侯倍畔以相篡所謂後義而先利不奪不厭者此也子云夫禮者所以章疑别微以為民坊者也故貴賤有等衣服有别朝廷有位則民有所讓子云天無二日土無二王家無二主尊無二上示民有君臣之别也春秋不稱楚越之王喪禮君不稱天大夫不稱君恐民之惑也詩云相彼盍旦尚猶患之子云君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弒其君鄭氏曰朝廷之位謂朝位也楚越之君僭號稱王不稱其喪謂不書葬也春秋傳曰吳楚之君不書葬辟其僭號也臣者天君稱天子為天王稱諸侯不言天公辟王也大夫有臣者稱之曰主不言君辟諸侯也此言皆為使民疑惑不知孰者尊也周禮曰主友之讎視從父昆弟盍旦夜鳴求旦之鳥也求不可得也人猶惡其欲反晝夜而亂晦明况於臣之僭君求不可得之類亂上下惑衆也同姓者謂先王先公子孫有繼及之道者也其非此則無嫌也僕右恆朝服君則各以時事唯在軍同服爾孔氏曰自此至犯君一節明章疑别嫌恐尊卑相僭使人疑惑之事疑謂是非不決禮以章明之微謂幽隱不著禮以分别之楚越書葬則當稱葬某王辟王之名故不書葬盍旦欲反夜而為旦猶臣之奢僭欲反下而為上也此逸詩僕及車右身衣朝服故曲禮云乘路馬必朝服是也其朝服之內則有虎裘狼裘故玉藻云君之右虎裘厥左狼裘是也僖五年左傳云均服振振取虢之旗又公羊成二年鞍之戰逢丑父為齊頃公車右衣服與頃公相似是在軍同服長樂劉氏曰尊卑疑者辨之以親疏親疏疑者辨之以貴賤貴賤疑者辨之以先後先後疑者辨之以德齒此禮之章明乎其疑也嚴陵方氏曰若君在廟門外則疑於君故不迎尸於門外以明其疑兹非禮所以章疑者乎士唯説齊衰於公門以表其微兹非禮所以别微者乎貴賤有上下之等衣服有隆殺之别朝廷有尊卑之位有等有别有位則各安其分而不爭矣故民有所讓日者人君之象在天者既無二日有土者故無二王大而有土者既無二王小而有家者故無二主凡此皆以尊無二上故也故曰示民有君臣之别也盍旦即月令所謂鶡旦盍何不也何不旦是求旦而已故名之以此人患之者以其亂晝夜故也君臣之别晝夜之相也其可亂之乎故引逸詩以况之乘車之法君在左僕在中央勇士在右馬氏曰王祭賔客有旅賁服王之服而趨節服氏服王服以維王大常其在軍陳則射人命有爵者乘王之倅車而皆無與王同車者石林葉氏曰章疑異於決疑疑者似同而異章言顯也決言其成也别微異於明微微者似有而無别言其有辨也明言其既著也以其顯疑故貴賤有等以其辨微故衣服有别貴賤以爵列也爵以詔德觀其貴賤則知德之有厚薄也衣服以功賜也服以顯庸觀其衣服則知其功之有小大也至於朝廷有位則爵命衣服所自居也民之視其位則知其定分而行遜避矣故曰朝廷有位則民有所讓禮之别微則衣服有别至别嫌則親疏異矣故同姓親也不嫌於為同不同車所以逺之異姓疏也雖與同車嫌於為異不同服所以别之故民不嫌也因其爵之貴賤而後推及君臣因其衣服之差而後推及於車其坊民如此同姓猶有弒篡者子云君子辭貴不辭賤辭富不辭貧則亂益亡故君子與其使食浮於人也寧使人浮於食子云觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君詩云民之無良相怨一方受爵不讓至于己斯亡鄭氏曰亂益亡亡無也食謂祿也在上曰浮祿勝己則近貪已勝祿則近亷犯猶僭也齒年也禮六十以上籩豆有加貴秩異者良善也言無善之人善遙相怨貪爵祿好得無讓以至亡已孔氏曰所引詩小雅角弓刺幽王之詩相怨一方共相怨恨各在一方不相往來引之者證上每事須讓也嚴陵方氏曰賤不貪貴貧不慕富則無爭奪之禍矣故亂益亡夫權輿之無餘不害為賢者伐檀之素餐君子所不為故君子與其使食浮於人也寧使人浮於食此以辭富貴之道也浮與行浮於名之浮同禮六十以上籩豆有加故觴酒豆肉以犯齒言之三命不齒席于尊東故衽席之上以犯貴言之族人不得以其戚戚君位故朝廷之位以犯君言之禮以卧者為衽坐者為席合言之一也石林葉氏曰富貴貧賤以道得之皆所不辭君子有時而辭者所以教民順也古者以功詔祿以久奠食蓋食與祿異也食浮於人則為非義故君子寧使人浮於食子云君子貴人而賤己先人而後己則民作讓故稱人之君曰君自稱其君曰寡君鄭氏曰寡君猶言少德之君言之謙嚴陵方氏曰貴人而賤己則不驕先人而後已則不爭故民作讓書曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功楊子曰自後者人先之自下者人髙之皆謂是矣山隂陸氏曰引此者著於君尚如此其他可知也子云利祿先死者而後生者則民不偝先亡者而後存者則民可以託詩云先君之思以畜寡人以此坊民民猶偝死而號無告鄭氏曰言不偷於死亡則於生存信引衛夫人定薑之詩定薑無子立庶子衎是為獻公畜孝也獻公無禮於定薑定薑作詩言獻公當思先君定公以孝於寡人偝死而號無告言死者見偝其家之老弱號呼稱寃無所告無理也孔氏曰此一節明坊人偝死嚮生之事利祿之事假令死之與生並合俱得先與死者而後生者則民皆不偝於死者也亡謂身為國事亡在外先與在外亡者而後於國內存者則民皆仁厚可以大事相付託也所引詩邶風燕燕之篇衛莊薑送歸妾也言歸妾戴媯思念先君莊公以婦道朂勉寡人寡人莊薑自謂此記以朂為畜鄭又以為衛定公夫人定薑之詩與詩注不同者後得毛傳故也凡注與詩不同皆倣此嚴陵方氏曰死謂為國家死其事者亡謂為國家亡而在外者利祿之所施不必及其身也録其人之功以及其親族而已若周官以其財養死政之老與其孤禮言去國三世爵祿有列於朝之類皆是也以死者君之心猶所不忘則民勤於孝思矣故曰民不偝以亡者君之心猶所不絶則民勉於忠義矣故曰民可以託號無告者呼而無所告訴也廬陵胡氏曰不偷於死亡則於生存信此邶風燕燕篇衛莊薑送戴媯令以婦道勉己也寡人莊薑自謂此以朂為畜鄭又以為衛定薑之詩令獻公畜孝寡人鄭之自相抵牾多此類子云有國家者貴人而賤祿則民興讓尚技而賤車則民興藝故君子約言小人先言鄭氏曰言人君貴尚賢者能者而不吝於班祿賜車服則讓道興賢者能者人所服也技猶藝也君子約言小人先言言人尚德不尚言也約與先互言耳君子約則小人多矣小人先則君子後矣易曰君子以多識前言往行以畜其德孔氏曰此一節明尚賢能重言行之事約言為省約小人行在於後必先用其言君子則後言先行其行二者相互也長樂劉氏曰君子所好民所趨也有國有家而尊貴賢人則其民莫敢不礪乎德也輕賤祿利則其民莫敢不忘於亷也德充乎內而廉發乎外則禮讓興焉技巧者偷薄之俗所為人君尚乎技巧之工則舟車之工賤而末藝興焉嚴陵方氏曰貴人而賤祿尚技而賤車皆謂任賢使能錫豫之而無所吝也人謂賢者技謂能者也言祿則爵可知言車則馬可知上之所化如此不徒事乎空言而已必有以踐其言焉故繼之以君子約言小人先言石林葉氏曰君子博學而詳説之將以反説約也小人則務詳於言君子先行其言而後從之也小人務先以言慶源輔氏曰人賢則祿優然國家之所貴者貴其人之賢不貴其祿之優則民興於讓也車雖工之所聚然家國之所貴者貴其技之聚不貴夫車之器則民興於藝也君子約言務實也小人先言尚華也金華應氏曰以德以能而詔爵祿以功以言而庸車服此隆古定制也逮德下衰祿未必及有德車未必及有能或不稼而取禾或車甚澤而人瘁人君必貴其可用之人而不以祿之富者為貴貴其有用之技而不以車之華者為貴則賞必當功而虛言飾貌者無所售矣記者又别君子小人言之蓋君子尚實行而不事虛言小人無誠心而專尚利口此人主所當察也子云上酌民言則下天上施上不酌民言則犯也下不天上施則亂也故君子信讓以涖百姓則民之報禮重詩云先民有言詢于芻蕘鄭氏曰酌猶取也取衆民之言以為政教則得民心得民心則恩澤所加民愛之如天矣言其尊也涖臨也報禮重者猶言能死其難先民謂上古之君也詢謀也芻蕘下民之事也言古之人君將有政教必謀之於庶民乃施之孔氏曰此一節論上取民言則民報禮重之事上不取民言違戾於下則民人怨怒以犯於上也下不天上施言下不仰君如天敬上之恩澤則禍亂之事起也所引詩大雅板之篇刺厲王之詩證上酌民言之事嚴陵方氏曰書曰天聰明自我民聰明天明畏自我民明威天之所為未嘗不以民也夫上酌民言則與天合矣故下豈有不天上施者乎言必曰酌者以言有當否斟酌而後行之也上不酌民言則事或妄行而失其所守故曰則犯也下不天上施則民或肆慢而無以相治故曰亂也君子信讓以涖百姓則上酌民言矣民之報禮重則下天上施矣馬氏曰君子之於庶言同則繹之而已故曰酌猶所謂稽于衆也山隂陸氏曰酌之於民還以治民是之謂天所謂雨蓋如此老子曰代大匠斫希有不傷其手矣是之謂犯夫我無為也順民而已豈有犯哉廬陵胡氏曰民言醫國之藥石也取以為國則合天下之公願民被其澤戴之如天矣是下天上施也慶源輔氏曰上酌民言則上敬其下也下天上施則下尊其上也上下一理而君者民之表也古人為民是畏信則使民之可信讓則制行不以己制民尊君如天盡敬事之誠則報禮可謂重矣然民不能自爾也在上之人有以致之耳禮記集説卷一百二十一
