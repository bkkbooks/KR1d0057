body:
  text: 禮記集説卷七十二宋衛湜撰凢接子擇日冢子則大牢庶人特豚士特豕大夫少牢國君世子大牢其非冢子則皆降一等鄭氏曰凢接子擇日雖三日之内尊卑必皆選其吉焉冡子天子世子也冡大也冢子猶言長子通於下也庶人至國君世子皆謂長子非冢子謂冢子之弟及衆妾之子生也天子諸侯少牢大夫特豕士特豚庶人猶特豚也孔氏曰此一節論國君以下至庶人以上接子牲牢之異并適庶不同下云國君世子大牢故知上冢子謂天子世子也䘮服父為長子是上下通稱長子故鄭云通於下謂通庶人士大夫也士特豚則庶人全應無牲禮窮故與士同用豚也嚴陵方氏曰擇日卜日也卜而擇之故也山隂陸氏曰據上羮食自諸侯以下至於庶人無等應云諸侯世子據上庶人特豚應云國君大牢今曰國君世子大牢為其接以大牢同於王也是以盛言之盡其辭焉耳且言冢子則大牢庶人特豚士特豕大夫少牢國君世子大牢推國君而逺之使不偪上也又以著自庶人積隆至是窮矣盖禮窮則同此皆言之法也慶源輔氏曰父子之氣未甞不相接也生三日而又以禮接之於是為至異為孺子室於宫中擇於諸母與可者必求其寛裕慈恵温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不徃鄭氏曰異為孺子室於宫中者特埽一處以處之諸母衆妾也可者傅御之属也子師敎示以善道者慈母知其嗜欲者保母安其居處者士妻食乳之而已此人君養子之禮也他人無事不徃為兒精氣㣲弱將驚動也孔氏曰此一節謂三日負子之後三月名子之前諸侯養子選擇諸母及養子之法此文雖據諸侯其實亦兼大夫士也但士不具三母耳大夫以上則具三母故䘮服小功章中君子為庶母慈己者鄭註引此三母獨言慈母舉中以見上下是知大夫有三母也為之服小功若諸侯之子三母則不服也此雖在三月之前其實三月之後養子亦當然也長樂劉氏曰寛則容徳固多裕則臨事不撓慈則仁性豐盈恵則恩意浹洽温則言動粹和良則心意純淑恭則容止必莊敬則誠眀弗散具此八善而加之以畏慎將之以寡言婦人之全徳也然後可以為子之師焉若夫愛子以徳時其志意體其寒温察其好惡相其寢興順其長育者慈母之職也保䕶其身衛養其氣時其衣服節其飲食侍其寢寐防其疾苦而専司負之者保母之職也夫世子國之根本生靈休戚之所繋也弗正厥始用基徳善則比於匪人終戕其性矣孔子曰性相近也習相逺也弗淑其習烏能正厥性俾近於聖賢哉先王制禮慎乎㣲也乃及於是知所務矣三代所以世有賢君繼繼承承於萬世作民父母以建皇極者豈無所自哉嚴陵方氏曰諸母與曲禮不潄裳之諸母同擇於諸母將使之為子師也雖非諸母而其徳如下所言可以為人師者亦擇之故曰與可者山隂陸氏曰孺子㓜弱湏人以成之時也於是擇師傅焉書曰孺子其朋其徃正言孺子以此此三母猶三師也言慈母以知師之為嚴言保母以知慈之為傅慶源輔氏曰異為孺子室於宫中則其視者不雜矣又使寡言者傅之則其聽者不雜矣書曰敬敷五敎在寛是敎人者當以寛裕為先也况於保孺子乎慈恵則有以愛其生温良則其氣質之移之也易恭敬則其情性之感之也深有是衆徳而又能慎而寡言焉然後以之為子師慎則其心一而不分寡言則其行敏而不躁師保孺子者尤其冝也慎則言語自寡三月之末擇日翦髪為鬌男角女羈否則男左女右是日也妻以子見於父貴人則為衣服由命士以下皆潄澣男女夙興沐浴衣服具視朔食夫入門升自阼階立于阼西鄉妻抱子出自房當楣立東面鄭氏曰鬌所遺髮也夾囟曰角午達曰羈貴人大夫以上也由自也朔食天子大牢諸侯少牢大夫特豕士特豚也夫入門者入側室之門也大夫以下見子就側室見妾子於内寢避人君也孔氏曰自此至如養禮一節眀三月之末卿大夫以下名子之法又書名藏之州府妻遂適寢夫入與妻饌食之事三月翦髪所留不翦者謂之鬌囟者是首腦之上縫故説文云十其字象小兒腦不合也夾囟兩旁當角之處留髮不翦曰角午達者案儀禮云度尺而午註云一縱一横曰午今女翦髮留其頂上縱横各一相交通逹故云午達不如兩角相對但縱横各一在頂上故曰羈羈者隻也上文云妻將生子居側室則知此夫入門即入側室之門亦南鄉故有阼階西階也但卿大夫之室唯有東房妻抱子出東房當楣東面立與夫相對也人君則見適子於路寢見庶子於側室並見下文然大夫見妾子於内寢諸侯見妾子於側室何以下文適子庶子見於外寢註云此適子謂世子弟也庶子妾子也外寢君燕寢也則是人君見妾子於外寢不在側室也盖人君世子之弟見於外寢也妾子見於側室但庶子撫首咳而名之與世子弟同故連文云見於外寢其實在側室也嚴陵方氏曰角則相對以其耦也羈則相午以其竒也揚雄所謂羈角之哺果而㗖之是矣或男耦而女竒取隂陽之相湏也或男左而女右取隂陽之相類也慶源輔氏曰男女初生羈角左右其辨也如此則知男女之别無非自然之理豈特以末流之害然後制禮以别之邪山隂陸氏曰上言特豚特豕少牢大牢此言具視朔食亦相備也接子進於見子一等則其衣服進可知若國君世子大牢以冕服接之歟姆先相曰母某敢用時日祗見孺子夫對曰欽有帥父執子之右手咳而名之妻對曰記有成遂左還授師子師辯告諸婦諸母名妻遂適寢鄭氏曰某妻姓若言姜氏也祗敬也或作振欽亦敬也帥循也欽有帥言敎之敬使有循也執右手眀將授之事也記有成者記猶識也識夫之言使有成也師子師也後告諸母若名成於尊適寢復夫之燕寢孔氏曰此一節論母以子見父及父名子妻遂適寢之事妻既抱子當楣東面而立傅姆在母之前而相佐其辭孺稚也謂恭敬奉見稚子夫對妻言當敎之令其恭敬使循善道對訖以一手執子右手以一手承子之咳而名之妻對夫云當記識夫言敎之使有成就對訖遂左鄉迴還轉身西南以子授師也諸婦謂同族卑者之妻諸母同族尊者之妻後告諸母欲名成於尊也嚴陵方氏曰夫曰欽有帥者欲其帥敎而不敢怠也妻曰記有成者欲其成身而不敢忘也執其右手則期其力事也左還授師則順其陽道也孩子以咳之則笑故謂之孩咳而名之則若笑而受其名山隂陸氏曰咳而名之待之若有識焉咳始誰之時也夫對曰敬當有以帥之妻對曰記當有以成之帥之者父道也成之者母道也妻言遂適寢妾言遂入御妻言夫入食如養禮妾言禮之如始入室妻之辭莊妾之辭瀆言之法也慶源輔氏曰姆先相曰敢用時日祗見孺子夫婦之禮嚴矣夫對曰欽有帥妻對曰記有成夫婦之義一矣姆先相者妻既抱子當楣東面而立傅姆在母之前而相佐其辭也夫告宰名宰辯告諸男名書曰某年某月某日某生而藏之宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯命藏諸州府夫入食如養禮鄭氏曰宰謂属吏也春秋書桓六年九月丁卯子同生四閭為族族百家也閭胥中士一人五黨為州州二千五百家也州長中大夫一人皆有属吏獻猶言也夫入已見子入室也其與妻食如婦始饋舅姑之禮也孔氏曰此經謂卿大夫以下故以名徧告同宗諸男也若諸侯既絶宗則不告諸男也此舉諸男是卑者卑者尚告則告諸父可知書名而藏之謂以簡䇿書子名而藏之家之書府此據卿大夫以下而引春秋者欲證名子生年月日之事也鄭云四閭為族以下皆周禮地官文閭之属吏則有閭史州之属吏則有州史州伯則州長州府是州長之府藏夫入從側室入正室也案士昬禮婦盥饋舅姑特豚合升側載右胖載之舅俎左胖載之姑俎大夫以上則無文鄭知如婦始饋舅姑者以下文云妾生子及三月之末見子之禮如始入室眀知此如養禮如始入室養舅姑之禮也嚴陵方氏曰名則辯告之以示於衆書則藏之以𫝊於乆則以男子者人之所貴重故也若華封人之祝堯以是而已山隂陸氏曰據此閭有府史州亦有府史而周官不言閭胥州長鄉遂之官也其府史胥徒王以委之然則出使長之其猶出封歟世子生則君沐浴朝服夫人亦如之皆立于阼階西鄉世婦抱子升自西階君名之乃降鄭氏曰子升自西階則人君見世子於路寢也見妾子就側室凢子生皆就側室諸侯夫人朝於君次而禒衣也孔氏曰此一節眀人君見世子及適庶之禮案内司服註云后六服后從王祭先王則服禕衣祭先公則服揄翟祭羣小祀則服闕翟鞠衣黄桑服也展衣以禮見王及賔客禒衣御於王之服諸侯夫人以下所得之服各如王后之服則夫人亦如王后也此既在路寢與君同著朝服則是以禮見君合服展衣註云次而禒衣者此謂見子見子若訖則當進入君寢侍御於君故服進御之服次者首飾次第髪為之則少牢禮髮鬄是也鄭註云古者或剔賤者刑者之髪為之山隂陸氏曰不言三月之末嫌緩不言執其右手咳而名之嫌慢皆非所以言世子故也上下比義使從可知已適子庶子見於外寢撫其首咳而名之禮帥初無辭鄭氏曰適子謂世子弟也庶子妾子也外寢君燕寢也無辭辭者謂欽有帥記有成也孔氏曰此一節眀人君見世子弟及妾子之禮適子謂太子之弟見於外寢庶子則見於側室但撫首咳名無辭之事與世子之弟同故與適子連文同云見於外寢其實庶子見於側室也帥循也初謂前文世子生見於路寢君夫人皆西鄉言見適子庶子威儀依循初世子之法但無勅戒之辭然夫人所生之子容可如世子見禮若妾之見子則不得與夫人同當與卿大夫之妻見適子同但不親抱子耳案前世子生君名之乃降亦無辭也而云適子庶子無辭者以前文卿大夫妻見適子之時既有父執右手咳而名之及戒告之辭故於世子之禮略而不言其實世子亦執右手咳而名之及戒告也故鄭引前文卿大夫見子之辭而言之也嚴陵方氏曰適子庶子止見於外寢則世子見於路寢可知山隂陸氏曰内寢適寢也外寢路寢也據䘮大記君夫人卒於路寢大夫世婦卒於適寢鄭氏謂外寢燕寢也非是凢名子不以日月不以國不以隠疾大夫士之子不敢與世子同名鄭氏曰不以日月不以國終使易諱不以隠疾諱衣中之疾難為醫也不敢與世子同名尊世子也其先世子生亦勿為改孔氏曰此一節論名子之法尊卑上下同有諱避大夫士之名子當辟世子之名案春秋衛襄公名惡其大夫有齊惡齊惡先衛侯生故與衛侯同名故鄭知先生者不改也馬氏曰榖梁𫝊曰衛侯惡又有衛齊惡此何為君臣同名也君子不奪人名不奪人親之所名重其所從來也故大夫士之子不敢與世子同名則君臣不同名矣至於為臣而與君同名則特稱字而已山隂陸氏曰名子不以日月不以國不以隠疾正也其又致曲則不以山川曲禮是也其又加詳焉則不以官不以畜牲不以器幣春秋是也不言日月其辟之如此則不以日月不疑曲禮先不以國以著國君名之如此内則蒙上國君不疑故以叙言之若不以山川而仲尼名丘則凢所謂不以名子者國君之禮也故曰以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山妾將生子及月辰夫使人日一問之子生三月之末潄澣夙齊見於内寢禮之如始入室君已食徹焉使之特餕遂入御鄭氏曰内寢適妻寢也禮謂已見子夫食而使獨餕也如始入室始來嫁時妾餕夫婦之餘亦如之既見子可以御此謂大夫士之妾也凢妾稱夫曰君孔氏曰此一節論大夫妾生子之禮異於適子之法也君謂夫也妾賤故謂夫為君宫室之制前有路寢次有君燕寢次夫人正寢卿大夫以下前有適室次有燕寢次有適妻之寢但夫之燕寢對夫人及適妻之寢及側室為在外故鄭前註云外寢君燕寢也此經稱内寢知是適妻寢也案昬禮夫婦同牢之後媵餕夫餘御餕婦餘彼謂正妻若妾初嫁始來夫婦共食初來之妾特餕其餘今妾已見子夫婦共食令生子之妾特餕其餘亦如始來時也前文大夫妻見子之後遂適夫寢未即進御後云夫入食如養禮乃始進御此文云見子遂入御故鄭知大夫士之妾異正妻也嚴陵方氏曰使之特餕則私之而已以其賤故也山隂陸氏曰此言潄澣夙齊不言沐浴朝服相備也夙齊言昔朝服言今慶源輔氏曰妾生子而禮之如始入室所以使之知大分已定於其初矣特餕所以寵之然其分不可得而易也公庶子生就側室三月之末其母沐浴朝服見於君擯者以其子見君所有賜君名之衆子則使有司名之鄭氏曰擯者傅姆之属也人君尊雖妾不抱子有賜於君有恩恵也有司臣有事者也孔氏曰此一經眀君庶子生及三月見父異於世子之禮前文已云適子庶子見於外寢異於世子今此更重出者以前文庶子與適子連文恐事事皆同適子故以此經特見庶子之法案前註云凢子生皆就側室今特舉庶子則世子可知也生子之妾君所特有恩賜偏所愛幸君則自名其子故曰君名之衆子謂衆妾之子不特寵御則使有司以名其子也其母朝服見於君故擯者抱子嚴陵方氏曰公庶子即前所言見於外寢者是也此申眀言之耳山隂陸氏曰庶子言就側室則世子不就側室可知其母沐浴朝服則君不沐浴朝服可知據世子生則君沐浴朝服夫人亦如之經有世子有適子有庶子有衆子適子世子之母弟也衆子庶子之弟庶人無側室者及月辰夫出居羣室其問之也與子見父之禮無以異也鄭氏曰夫雖辟之至問妻及見子之禮同也庶人或無妾孔氏曰庶人無側室故夫出辟之若有側室則妻在側室夫自居正寢不湏出居羣室也其問之與卿大夫士同也嚴陵方氏曰庶人或無妾故有無側室者羣室則固無定所矣凢此以庶人之賤故其禮略也凢父在孫見於祖祖亦名之禮如子見父無辭鄭氏曰見子於祖家統於尊也父在則無辭有適子者無適孫與見庶子同也父卒而有適孫則有辭與見冢子同父雖卒而庶孫猶無辭也孔氏曰此一節論孫見祖之禮卿大夫以下之事父之於子有𫝊重之事故有告戒之辭今孫見於祖適子既在其孫猶為庶孫且隔於父無所𫝊重故與見庶子同無辭者也若所生適子其父既卒則適孫與冢子相似當有辭若庶孫父雖卒見祖亦無辭也嚴陵方氏曰父在謂祖在也據子之父稱之故曰父爾以祖名之而不以父者家事統於尊故也食子者三年而出見於公宫則劬大夫之子有食母士之妻自養其子鄭氏曰士妻大夫之妾食國君之子三年出歸其家君有以勞賜之劬勞也大夫之子食母選於傅御之中䘮服所謂乳母也士之妻賤不敢使人孔氏曰此一節論國君以下及大夫士適妻養子之人尊卑有别山隂陸氏曰不言寢不言君所嫌䙝也慶源輔氏曰劬母道也勞不足以盡之詩云母氏劬勞由命士以上及大夫之子旬而見冢子未食而見必執其右手適子庶子已食而見必循其首鄭氏曰旬當為均聲之誤也有時適妾同時生子子均而見者以生先後見之既見乃食亦辟人君也冢子未食而見適子與庶子已食而見急正緩庶之義也此謂天子諸侯尊别世子雖同而母禮則異矣孔氏曰此一節論大夫及命士適妻與妾同時生子見之先後差異之别并眀天子諸侯見冢子及適庶緩急之儀旬者均也謂大夫命士適妾生子皆以未食之前均齊見又先生者先見後生者後見雖見有先後同是未食之前故鄭云均而見冢子以下鄭知是天子諸侯者以上文命士以上及大夫之子適庶均見此則有食前食後見之不同又前文云世子生其次適庶見於外寢是國君之禮此經亦云適子庶子故知是天子諸侯也未食謂未與后夫人禮食而先見冢子是急於正也先與后夫人禮食之後然後始見適子庶子是緩於庶也嚴陵方氏曰生子則必有食禮大夫士之子則旬而見天子諸侯之子則有未食已食之别者詳於貴略於賤故也山隂陸氏曰言子既見之後凢旬一見冢子則未食而見適子庶子則食而後見此急正緩庶之義也執而見之者待之若與已等冢子故也其名之也如此新安朱氏曰此説疑鄭失之旬如字謂十日也别記異聞或不待三月也承記大夫禮而又别其冢適庶子之異同冢子之禮仍與前章同唯適子庶子為異耳子能食食教以右手能言男唯女俞男鞶革女鞶絲鄭氏曰俞然也鞶小囊盛帨巾者男用韋女用繒有飾縁之則是鞶裂與詩云垂帶而厲紀子帛名裂繻字雖文異意實同也孔氏曰此一節論男女自㓜少敎之之事男女鞶囊之外更有繒帛之物縁而飾之則是春秋桓二年所稱鞶裂者與案𫝊作鞶厲此註云鞶裂其義同也嚴陵方氏曰教以右手則取其强是男女所同也長樂陳氏曰古者革帶大帶皆謂之鞶内則所謂男鞶革帶也春秋𫝊所謂鞶厲大帶也易言鞶帶揚子言鞶帨許慎服䖍杜預之徒皆以鞶為帶鄭獨以男鞶革為盛帨之囊誤也詩言垂帶而厲毛萇杜預之徒皆以厲為帶之垂者鄭獨以而厲為如裂亦誤六年敎之數與方名七年男女不同席不共食八年出入門户及即席飲食必後長者始敎之讓九年敎之數日十年出就外傅居宿於外學書計衣不帛𥜗袴禮帥初朝夕學㓜儀請肄簡諒鄭氏曰方名東西也不同席其食蚤其别也敎之讓示以㢘耻也數日朔望與六甲也外傅敎學之師也不用帛為𥜗袴為太温傷隂氣也禮帥初遵習先日所為也肄習也諒信也請習簡謂所書篇數也請習信謂應對之言也孔氏曰自此至尚左手論敎男子從㓜及長居官至致事之事禮帥初者帥循也行禮動作皆帥循初日所為學㓜儀者從朝至夕學㓜少奉侍長者之儀請習學篇章簡禮及應對信實言語也嚴陵方氏曰知方非徒知其逺近上下而已又有以知隂陽向背之冝不同席欲其居處之異也不共食欲其嗜欲之分也出入門户則欲其行之讓也即席則欲其坐之讓也飲食則欲其食之讓也經曰父之齒随行兄之齒鴈行則行固欲其讓也又曰祍席之上讓而坐下觴酒豆肉讓而受惡則坐與飲食又欲其讓矣由是推之則無所徃而不讓矣天有十日故九年敎之數日然日有十則先敎於九年數與方皆五則後敎於六年者何也盖日陽也數與方皆隂也有乾知大始坤作成物之意十者天地隂陽生成之理備矣出就外傅曽子問所謂古者男子外有傅是矣書即周官保氏所謂六書是也計即所謂九數是也以數必計其多少故又謂之計焉自學書計而下皆就外傅所學之事也禮帥初謂遵習先日所為而不敢變也慮其妄有所改為故也朝夕學㓜儀者至此乃可以責事長之禮故也若昧爽而朝之類則朝之所當學也若日入而夕之類則夕之所當學也簡䇿也謂古先之事必書於䇿必請而後習之者則以不敢専故也馬氏曰書文字也以竒乗耦剛柔雜比以相成故曰文以其始於一二而生之至無窮故曰字以其可以記事故曰書文言其形字言其法書言其用先王之世書止為六藝之一而以之敎小學者盖書者學之所始敎之於始固其所以成之也山隂陸氏曰十年以後有學無敎據六年敎之數與方名八年始敎之讓九年敎之數日請習簡而易從諒而易知之事横渠張氏曰袴則今之袴也𥜗今之襖子也不以帛則用布也請肄簡諒則童子自請所習於長者也長者所以敎者當以簡諒童子未能致文故姑敎之以簡童子未能擇信故且使之守信慶源輔氏曰方名地事也六年敎數一至十也十年學計百千萬億也計者數之総也居宿於外者居日事也與燕居閒居同𥜗袴下服不用帛然則上衣猶用帛也禮帥初者前已敎之遜讓禮之端也朝夕學㓜儀者則至是不容有暇也有暇則又請習簡諒矣十有三年學樂誦詩舞勺成童舞象學射御二十而冠始學禮可以衣裘帛舞大夏惇行孝弟博學不教内而不出鄭氏曰先學勺後學象文武之次也成童十五以上之稱大夏樂之文武備者也内而不出謂人之謀慮也孔氏曰勺籥也十三之時學此舞籥之文舞象謂武舞也用干戈之小舞以年㓜習文武之小舞也二十成人血氣強盛無慮傷損故可以衣裘帛大夏是禹樂禪代之後在干戈之前文武俱備故二十習之博學不敎謂廣博學問不可為師敎人内而不出者藴蓄其徳在内而不得出言為人謀慮河南程氏曰天下之英才不為少矣特以道學不眀故不得有所成就夫古人之詩如今之歌曲雖閭里童稚皆習聞之而知其說故能興起今雖老師夙儒尚不能曉其義况學者乎是不得興於詩也古人自洒埽應對以至冠昬䘮祭莫不有禮今皆廢壊是以人倫不明治家無法是不得立於禮也古之人聲音所以養其耳采色所以養其目歌詠所以養其性情舞蹈所以養其血脉今皆無之是不得成於樂也是以古之成材也易今之成材也難古人為學也易八嵗入小學十三入大學舞勺舞象有弦歌以養其耳舞干羽以養其氣血其心急則佩韋緩則佩弦出入閭里則視聴遊習與政事之施莫不由此如此則非僻之心無自而入又曰古者家有塾黨有庠遂有序故未甞有不入學者八嵗入小學十五擇其秀者入大學不可敎者歸之於農三老坐於里門出入察其長㓜進退揖讓之序至於閭里鄉黨之間如三百五篇之類人人諷誦要之莫非止於禮義之言十三又使之舞象然則雖未能深知義理興起於詩其心固已善矣後世雖白首未甞知有詩此古今異習也以古所習安得不厚以今所習安得不惡横渠張氏曰古者敎童子先以舞者欲柔其體也心下則氣和氣和則體柔古者敎胄子必以樂欲其體和也敎之舞敎之樂所以欲其和學者志則欲立體則欲和二十博學無方猶知類通達嚴陵方氏曰成童先儒謂十五以上不言十五則以所學之事不止於十五之時故也非有成人之材則不足以習武非有成物之效則不足以立物故武事必於成童敎之且勺雖告武王之樂然以勺其道而道成於文故也象雖奏文王之樂然以象其事而事成於武故也必以告武王之樂為文者以示文之道必有武為之備也必以奏文王之樂為武者以示武之事必以文為之經也勺固成王之樂以告成大武故取義如此冠者成人之服也冠而後備服服備而後可以行禮故始學禮也孔子言立於禮成於樂此則先樂而後禮何也盖孔子所言者禮樂之情也此所學者禮樂之文也自情言之則禮淺而樂深自文言之則禮難而樂易此以學文為主故先其易而後其難者學記曰先其易者後其節目盖謂是矣以其服備故可以衣裘帛舞大夏則備文武故也文王世子敎文武之舞皆於夏學以是且十有三年舞勺則有文而無武成童舞象則有武而無文二十成人然後舞備文武乃其稱矣敎讓於八年學幼儀於十年則孝弟之道固已知之及成人然後篤而行之以期於熟焉孟子言幼學壯行是矣博學不教者盖學所以為己敎所以為人故博學不教内而不出者以其果足以為人故志乎内而無事乎外有所入而無所出也山隂陸氏曰始學禮凢言始自今始爾其餘不言始有前此者矣據八年始敎之讓三十而有室始理男事四十始仕有學無敎聚之而已子弟之道也又新説曰象舞文王之樂也武舞武王之樂也酌舞成王之樂也周之武兆於文王故其樂名之曰象而詩曰肇禋維周之禎是也大於武王故其樂曰大武而詩曰勝殷遏劉耆定爾功是也成於成王故其樂名之曰酌而其序曰言能酌先祖之道以養天下是也天下之理自其成而觀之易知也故十三舞勺自其兆而觀之難知也故十五舞象大夏則舞之文武中者也有干戚有羽籥文武之道備矣故二十而後舞大夏公羊曰朱干玉戚以舞大夏八佾以舞大武記言朱干玉戚以舞大武八佾以舞大夏其言正相反則夏有干戚可互見矣詩言籥舞笙皷又言以籥不僭記言夏籥序興其言正相當則夏有羽籥可知矣慶源輔氏曰十年衣不帛𥜗袴謂𥜗袴不用帛耳博學不敎内而不出獨善而己獨善其身未足以善人也博學無方孫友視志取諸人以為善也取諸人以為善則善足以及人矣三十而有室始理男事博學無方孫友視志四十始仕方物出謀𤼵慮道合則服從不可則去五十命為大夫服官政七十致事凢男拜尚左手鄭氏曰室猶妻也男事受田給政役也方猶常也無方言學無常在志所好也孫順於友視其所志也物猶事也方物言常事也服官政統一官之政也七十致其事於君而告老左手陽也孔氏曰三十丁壯受其田土供給征役始理男事孫友言孫順朋友視其志意所尚四十年壯仕官行其常事無所謙遜出其謀計𤼵其思慮以為國也河南程氏曰古之為士者自十五入學至四十始仕中間自二十五年有事於學又無利可趨則其志可知此所以成徳故古之人必四十乃仕然後志定業成後世立法自童稚即有汲汲利禄之誘何由向善嚴陵方氏曰三十年為一世而男女為室有室所以傳世也傳世則有父母之道理男事者父道也博學無方繼之以孫友視志孔子言學而時習之繼之以有朋自逺方來亦此意也孫有自卑之意書曰惟學遜志然所取之友有賢否則所存之志有逺近故以孫友而視其志也至此必視其志者以當壯而有立之時故也四十則強之時也仕則與物接而有理可言故謀不得不出有患可思故慮不得不𤼵然謀慮豈以偽飾加之乎亦比方事物以應之而已事人之道有合則有否故有從必有去合否在彼也有命存焉從去在我也有義存焉故道合則服從不可則去也服謂服其事從謂從君也拜尚左手尊陽道故也山隂陸氏曰方物出謀則謀不過物方物𤼵慮則慮不過物孟子曰位卑而言髙罪也此士之事也道合則服從不可則去者始仕而謀去就士之事也既仕矣有去就焉大夫之事也孟子曰立乎人之本朝而道不行恥也言服官政則與上所謂服從者異服從服而從之服而從之則有死而已士執雉是也即服官政不得其官則去大夫執鴈是也七十男子止致事女子止嫁嫁女之終也男子如上所謂不愧於陽矣雖尚左可也女子如下所謂不愧於隂矣雖尚右可也新安朱氏曰方物方猶比也慶源輔氏曰子貢謂賜也何敢望回回也聞一以知十賜也聞一以知二可謂能遜友而視志矣又子游曰吾友張也為難能也然而未仁曽子曰堂堂乎張也難與並為仁矣亦然内而不出所以蓄之也孫友視志所以證之也出謀𤼵慮所以行之也不可則去不言不合者合在彼可在我易曰比之自内女子十年不出姆敎婉娩聴從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠鄭氏曰不出恒居内也婉謂言語也娩之言媚也媚謂容貌也紃絛也觀於祭祀以下當及女時而知孔氏曰自此至右手一節論女子自幼及嫁為女事之禮案九嬪註云婦徳貞順婦言辭令婦容婉娩婦功絲枲則婉娩合為婦容鄭以此上下備其四徳以婉為婦言娩為婦容聴從為婦順執麻枲以為婦功組紃皆為絛紝謂繒帛或云組是綬也然則薄濶為組似䋲者為紃下云十有五年而笄此觀於祭祀是未嫁之前觀㸔湏於廟外納此酒漿籩豆菹醢之等置於神坐一納包此六事也嚴陵方氏曰不出謂常居閨閤之内也聴則有所受從則無所違皆女徳也執麻枲則績事也治絲繭則蠶事也織以機紝以箴組綬属凢此皆學女事以共衣服之用也觀於祭祀則欲其習熟是事故也非特觀之而已又且納酒漿籩豆菹醢等物以致其禮相助長者而奠之於神焉詩不云乎于以奠之宗室牖下誰其尸之有齊季女盖助奠之謂也慶源輔氏曰婉有委曲之意娩有遲緩之意聴從所謂以順為正也婦人之容徳莫此為盛也執與孔子執御之執同治有慎意安於執麻枲而慎於治絲繭夫敎也始於徳容中於女工之事終於祭祀之禮婦人之事盡是矣山隂陸氏曰詩曰緑兮絲兮女所治兮所謂治有如此者若麻枲女工之事煩縟者也是故謂之執即言觀祭祀兼納酒漿亦觀也禮相禮相者助奠助長者奠禮相以貌助奠以力新安朱氏曰納謂奉而入之十有五年而笄二十而嫁有故二十三年而嫁聘則為妻奔則為妾凢女拜尚右手鄭氏曰十五而笄謂應年許嫁者女子許嫁笄而字之其未許嫁二十則笄有故謂父母之䘮聘問也妻之言齊也以禮見問則得與夫敵禮妾之言接也聞彼有禮走而徃焉以得接見於君子也右手隂也孔氏曰女拜右手漢時行之也嚴陵方氏曰三五而圓者月也故女子之年至是數而笄笄者婦人首飾盖成人之服也夫男子冠則有成人之禮女子笄則當許嫁之時矣然嫁止於二十娶必止於三十者隂以少為美陽以壯為強故也然經亦舉其大略耳故王氏謂女子非二十而後可嫁以為二十而不嫁則非禮男子三十而娶四十強而仕推此可知聘言由彼而問此奔言自此而趨彼拜尚右手尊隂道也馬氏曰易曰歸妹女之終也未濟男之窮也盖男之窮必至於濟而女之終止於歸而已故内則男子之事必至於官女子之事則止於嫁也江陵項氏曰鄭氏註周禮肅拜云若今婦人撎盖古之拜如今之揖折腰而已介胄之士不拜故以肅為禮以其不可以折腰也然則其儀特歛手向身㣲作曲勢耳鄭氏之所謂撎盖如此此正今時婦人揖禮也據鄭氏説則漢時婦人之拜不過如此或者乃謂自唐武氏始尊婦人不令拜伏則妄誤之甚矣周天元時令婦人拜天臺作男子拜則雖虜俗婦人亦不作男子拜也况古者男子之拜但如今人之揖則婦人之拜安得己如今人之伏此理之必無者也大抵今之男子以古男子之拜為揖故其拜也加之以跪伏為稽顙之容今之婦人亦以古婦人之拜為揖故其拜也加之以拳曲作虚坐之勢視古已加不得為之減矣此經尚右手者特言歛手右向如孔子拱而尚右之尚非若今用手按膝作跪也男之尚左亦然古跪自是一禮與拜與伏不相干禮記集説卷七十二
