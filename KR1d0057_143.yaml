body:
  text: 禮記集說卷一百四十三宋衛湜撰奔喪第三十四孔氏曰案鄭目録云名曰奔喪者以其居他國聞喪奔赴之禮此於别録屬喪服實逸曲禮之正篇也漢書藝文志云漢興得古禮五十七篇其十七篇與今儀禮正同其四十篇藏在祕府謂之逸禮此篇鄭云逸禮者對十七篇為逸禮下文鄭注引逸奔喪禮謂不入於記者又比此奔喪篇為逸二逸不同此篇兼天子諸侯然以士為主故鄭下文注云未成服者素委貌是士之服也嚴陵方氏曰昔曾參不離親一宿顧豈有奔喪之禮然四方男子所有事茍有事於四方安能免離親哉然則奔喪之事不幸而時亦有焉此先王所以作為之禮也奔喪之禮始聞親喪以哭答使者盡哀問故又哭盡哀遂行日行百里不以夜行唯父母之喪見星而行見星而舍若未得行則成服而后行過國至竟哭盡哀而止哭辟市朝望其國竟哭鄭氏曰親父母也以哭答使者驚怛之哀無辭也問故問親喪所由也雖非父母聞喪而哭禮亦然也不以夜行雖有哀戚猶辟害也晝夜之分别於昏明哭則遂行者不為位也言唯著異也侵晨冒昏彌益促也未得行謂以君命有為者也成喪服得行則行過國至竟哭感此念親也辟市朝為驚衆也望其國竟哭斬衰者也自是哭且遂行孔氏曰此篇總明奔五服之喪此一節論始聞奔喪及其國竟奔赴之節奉君命而使使事未了不可以己私喪廢公事故成服以俟君命有人代己則可行也案聘禮云行至他國竟上而誓衆使次介假道是國竟行禮之處去時親在今返親亡故過國至竟哀戚也凡聞父母之喪其哭之不離聞喪之處不得為位即奔之也若有君命未得奔喪者既聞而哭又為位更哭也鄭注斬衰者其實母之齊衰亦然嚴陵方氏曰古者吉行五十里今以凶變之遽故倍之至於家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰于序東絞帶反位拜賔成踊送賔反位有賔後至者則拜之成踊送賔皆如初衆主人兄弟皆出門出門哭止闔門相者告就次於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服拜賔送賔皆如初鄭氏曰括髮袒者去飾也未成服者素委貌深衣已成服者固自喪服降堂東即位已殯者位在下也襲襲服衣也不於又哭乃絰者發喪已踰日節於是可也其未小斂而至與在家同耳不散帶者不見尸柩凡拜賔者就其位既拜反位哭踊次倚廬也又哭至明日朝也三哭又其明日朝也皆升堂括髮袒如始至必又哭三哭者象小斂大斂時也雜記曰士三踊其夕哭從朝夕哭不括髮不袒不踊不以為數三日三哭之明日也既哭成其喪服杖於序東孔氏曰此一節明父母之喪奔至於家哭及袒踊成服之節升自西階者曲禮云為人子者升降不由阼階今父母新死未忍異於生也括髮袒者尋常親始喪則笄纚小斂畢乃括髮今喪已經日故不笄纚也此奔謂主人故親拜賔也鄭注素委貌謂士庶人若大夫已上則素辨小記云逺葬者比反哭者皆冠及郊而后免明知在路皆冠也士喪禮小斂訖降自西階即位故知殯畢位在下又士喪禮既小斂帶絰散麻三日乃絞垂今奔喪初至則絞帶與在家異故云不散麻者不見尸柩也知又哭三哭皆升堂括髮袒者約士喪禮小斂大斂主人皆升堂也嚴陵方氏曰入門左與客入門而左之左同升自西階則未忍踐阼階而為之主故也山陰陸氏曰拜至拜送禮也今送賔不言拜送略之也不言送于門外蓋于門內而已據不得奔喪賔出主人拜送于門外相者告就次次所次之處鄭氏謂倚廬誤矣即倚廬齊衰以下亦曰告就次何也猶括髮猶之言可以已也成踊言於是有數喪大記小斂主人袒說髦括髮以麻奉尸夷于堂主人襲帶絰士喪禮亦云而此篇入門括髮袒降堂襲絰于序東絞帶於又哭括髮袒於三哭猶括髮袒三日成服此奔喪之禮也始至之日既襲絰絞帶可謂成服矣今曰三日成服則以明日括髮袒又明日猶括髮袒雖成服也奔喪者非主人則主人為之拜賔送賔奔喪者自齊衰以下入門左中庭北面哭盡哀免麻于序東即位袒與主人哭成踊於又哭三哭皆免袒有賔則主人拜賔送賔丈夫婦人之待之也皆如朝夕哭位無變也鄭氏曰不升堂哭者非父母之喪統于主人也麻亦絰帶也於此言麻者明所奔喪雖有輕者不至喪所無改服也凡袒者於位襲於序東袒襲不相因位此麻乃袒變於為父母也又哭三哭亦入門左中庭北面如始至時也待奔喪者無變嫌賔客之也於賔客以哀變為敬骨肉哀則自哀矣於此乃言待之明奔喪者至三哭猶不以序入也孔氏曰此一節明奔齊衰以下之喪主人待奔之人但在東階下不升堂故奔喪者在中庭北面繼主人也主人唯饋奠有事之時乃升堂若尋常常在堂下也鄭注於此言麻不至喪所無改服者父母之喪來至喪所乃改服襲絰帶齊衰以下亦至喪所乃免麻而改服今此至家乃稱麻明所奔雖輕喪無道路之上改服著麻也此經先云免麻乃云即位袒與上文父母喪先云括髮袒乃云襲絰異也故鄭云變於父母也禮以變為敬若有客則拜賔成踊敬賔故變也今此奔者是骨肉不須為變平常五屬入哭則與主人為次重者前輕者後今奔喪者急哀但獨入哭不俟主人為次序又哭三哭皆然若婦人奔喪與賔客同故下文婦人奔喪東髽即位與主人拾踊以婦人外成適他族故也然亦異於賔客故雜記云婦人奔喪入自闈門升自阼階若女賔則喪大記云寄公夫人入自大門婦人入闈門者以奔夫屬不得同於女賔也奔母之喪西面哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰于序東拜賔送賔皆如奔父之禮於又哭不括髮鄭氏曰為母於又哭而免輕於父也其他則同孔氏曰此一經論奔母之喪節也此謂適子若庶子則亦主人為之拜賔送賔喪服小記云又哭而免此文又哭不括髮小記據在家小斂後此則從外奔喪至內其理雖同其日則異婦人奔喪升自東階殯東西面坐哭盡哀東髽即位與主人拾踊鄭氏曰婦人謂姑姊妹女子子也東階東面階也婦人入者由闈門東髽髽於東序不髽於房變於在室者也去纚大紒曰髽拾更也主人與之更踊賔客之孔氏曰此婦人奔喪之禮也知入自闈門者雜記篇文闈門謂東邊之門男子之免在東序故知婦人亦髽于東序就掩映之處在堂上也男子則堂下也士喪禮云婦人髽于室殯後室中是神之所處婦人在堂當髽于東房今此奔喪故於東序耳鄭注士喪禮云髽之異於括髮者既去纚而以髮為大紒如今婦人露紒其象也嚴陵方氏曰婦人質弱不勝事故其禮略於男子拾踊與拾投之拾同義山陰陸氏曰不言髽於某所以關貴賤案士喪禮婦人髽于室而喪大記曰婦人髽帶麻于房中鄭氏謂蓋諸侯之禮然則房中蓋東房也于室亦室之東東髽蓋在殯東又少東也與主人拾踊外女子也奔喪者不及殯先之墓北面坐哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髮東即主人位絰絞帶哭成踊拜賔反位成踊相者告事畢遂冠歸入門左北面哭盡哀括髮袒成踊東即位拜賔成踊賔出主人拜送有賔後至者則拜之成踊送賔如初衆主人兄弟皆出門出門哭止相者告就次於又哭括髮成踊於三哭猶括髮成踊三日成服於五哭相者告事畢為母所以異於父者一括髮其餘免以終事他如奔父之禮鄭氏曰主人之待之謂在家者也哭於墓為父母則袒告事畢者於此後無事也又哭三哭不袒者哀戚已久殺之也逸奔喪禮說不及殯日於又哭猶括髮即位不袒告事畢者五哭而不復哭也成服之朝為四哭此謂既期乃後歸至者也其未期猶朝夕哭不止於五哭也一括髮謂歸入門哭時也於此乃言為母異於父者明及殯不及殯其異者同孔氏曰此一節論既葬之後奔父母之喪禮主人即位於墓左謂先在家者非謂適子也此奔喪者是適子故經云拜賔非適子則不拜賔也三日成服謂來奔喪後三日通奔日為四日初至象始死為一哭明日象小斂為二哭又明日象大斂為三哭又明日成服之日為四哭成服明日之朝為五哭皆數朝哭不數夕哭故為五也於五哭後告事畢明是既期已後朔望朝哭而已鄭恐一括髮是墓所故明之云入門入門時也云明及殯不及殯其異者同謂及殯一括髮不及殯亦一括髮是異於父者其事同也嚴陵方氏曰男子於墓左婦人於墓右所以辨陰陽之義入門而哭於母止於一括髮於父則不一焉此隆殺之别也山陰陸氏曰主人之待之也正言主人著衆主人奔喪與丈夫婦人之待之也相備也相備而言主人在前衆主人在後亦言之法鄭氏謂在家者也誤矣拜賔反位拜之不在其位吾方為客重賔也據奔喪反位拜賔成踊告事畢者於此後非無事也之墓之事畢爾衆主人兄弟皆出門據此亦言所當奔者外喪也於五哭相者告事畢者成服前兩日朝莫哭成服之朝又一哭凡五哭奔喪成服奔喪之事畢故曰相者告事畢春秋傳曰歸父使于晉還自晉至柳聞君薨家遣墠帷哭君成踊何休謂臣為君本服斬衰故成踊比二日朝莫哭踊三日朝哭踊莫不復哭踊去事之殺也然則三日成服拜賔送賔皆如初亦事畢也而不言則喪尚新未忍言也齊衰以下不及殯先之墓西面哭盡哀免麻于東方即位與主人哭成踊襲有賔則主人拜賔送賔賔有後至者拜之如初相者告事畢遂冠歸入門左北面哭盡哀免袒成踊東即位拜賔成踊賔出主人拜送於又哭免袒成踊於三哭猶免袒成踊三日成服於五哭相者告事畢鄭氏曰齊衰之墓西面哭不北面者亦統於主人也成踊襲不言袒言襲者容齊衰親者或袒可也為父於又哭括髮而不袒此又哭三哭皆言袒袒衍字也孔氏曰此一節明葬後奔齊衰以下喪禮但齊衰以下有大功小功緦麻日月多少不同若奔在葬後而三月之外大功以上則有免麻東方三日成服若小功緦麻之喪則不得有三日成服小功以下不稅無追服之理若葬後通葬前未滿五月小功則亦三日成服其緦麻之喪止臨喪節而來亦得三日成服也東即位謂奔喪者於東方就哭位拜賔謂主人代之拜賔成踊謂奔喪者於主人拜賔之時而成踊凡言成踊每一節有三踊凡三節九踊乃謂之成也經文直言免麻于東方即位不稱袒而下云成踊襲下既稱襲則有袒理經若言袒恐齊衰以下皆袒故稱襲容有齊衰重為之得襲也嚴陵方氏曰奔父母之喪之墓而哭則北面齊衰以下則西面者蓋北方重陰以示哀之隆西方少陰以示哀之殺山陰陸氏曰齊衰奔喪上言袒不言襲此言襲不言袒相備也相備而先言袒後言襲亦言之法且上言袒先成踊袒在成踊之前此言襲後成踊襲在成誦之後亦言與主人踊逺之也據與主人拾踊且言與主人哭成踊則隨主人踊不拾主人之踊於又哭三哭言袒袒非衍字齊衰猶袒則大喪袒可知為父於又哭括髮不言袒上下比義從可知也亦於齊衰以袒為哀即父雖袒袒不足言聞喪不得奔喪哭盡哀問故又哭盡哀乃為位括髮袒成踊襲絰絞帶即位拜賔反位成踊賔出主人拜送于門外反位若有賔後至者拜之成踊送賔如初於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服於五哭拜賔送賔如初鄭氏曰聞父母喪而不得奔謂以君命有事不然者不得為位位有酇列之處如於家朝夕哭位矣不於又哭乃絰者喪至此踰日節於是可也送賔後不言就次者當從其事不可以喪服廢公職也其在官亦告就次言五哭者以迫公事五日哀殺亦可以止孔氏曰此一節明聞喪不得奔於所聞之處發喪成服之禮乃為位朝夕哭位也於此聞喪之日覆哭踊畢襲所袒之衣著首絰絞帶之垂即東方之位也初聞喪象始死明日又哭象小斂時士喪禮云小斂乃絰云又哭謂當日之中對初聞喪之哭為又哭即加絰帶不於明日又哭者以赴者至踰其日節故也於五哭不云告事畢禮文略也鄭注在官謂官府館舍是賔所專有於其中作廬故禮畢亦告就次也山陰陸氏曰乃為位乃者難辭也著為位於此不得已也若除喪而后歸則之墓哭成踊東括髮袒絰拜賔成踊送賔反位又哭盡哀遂除於家不哭主人之待之也無變於服與之哭不踊自齊衰以下所以異者免麻鄭氏曰東東即主人位如不及殯者也遂除除於墓而歸無變於服自若時服也亦即位于墓左婦人墓右孔氏曰此一節明除服之後奔父母喪節亦謂主人適子初在墓南北面哭成踊乃來就主人之位括髮袒如不及殯之時也主人亦謂在家者著平常吉服服除哀殺故不踊也齊衰以下除服後奔喪唯著免麻哭罷即除嚴陵方氏曰喪者之墓雖哭於家則不哭主人之待之也雖哭於墓而不踊且無變於服時已過禮亦為之殺也山陰陸氏曰上言成踊盡哀而此不言蓋貶之也著雖盡哀無及矣若曽參一夕不離親閔子退而致仕無是也其不言即位亦以此聞喪不得奔喪為位君子猶難之今除喪而后歸何哉東括髮袒猶言東髽省文爾省文略之也遂除於家不哭著於路猶哭也齊衰以下所異者免麻變絰言麻自齊衰以下非其至喪也據免絰于序東凡為位非親喪齊衰以下皆即位哭盡哀而東免絰即位袒成踊襲拜賔反位哭成踊送賔反位相者告就次三日五哭卒主人出送賔衆主人兄弟皆出門哭止相者告事畢成服拜賔若所為位家逺則成服而往鄭氏曰謂無君事又無故可得奔喪而以己私未奔者也唯父母之喪則不為位其哭之不離聞喪之處齊衰以下更為位而哭皆可行乃行三日五哭卒卒猶止也始聞喪訖夕為位乃出就次一哭也與明日又明日之朝夕而五哭不五朝哭而數朝夕備五哭而止亦為急奔喪己私事當畢亦明日乃成服凡云五哭者其後有賔亦與之哭而拜之家逺謂外喪也外喪緩而道逺成服乃行容待齎也孔氏曰此一節明齊衰以下不得往奔則於所聞之處為位及免絰成服之禮前文五哭皆數朝哭此三日為五哭者為欲急奔喪以己之私事須營早了故三日而五哭止也從上以來四處有五哭之文上兩處於五哭之下無拜賔送賔之事下兩處五哭之文雖有拜賔送賔恐與上有異故鄭云後有賔亦與之哭而拜之總結於上也待齎謂賵贈之物山陰陸氏曰三日五哭卒即上所謂五哭言卒喪輕故也大喪不言卒雖云去服之殺蓋亦嫌遽今在事畢之後容成服矣而後賔至亦拜亦送也齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭鄭氏曰奔喪哭親疏逺近之差也孔氏曰此一節明奔喪所至之處哭泣之禮案雜記云大功望鄉而哭此云望門者雜記謂本齊衰者降服大功嚴陵方氏曰以服有重輕之别故哭有逺近之差也言齊衰望鄉而哭則斬衰不待望鄉而哭可知哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所識於野張帷凡為位不奠哭天子九諸侯七卿大夫五士三大夫哭諸侯不敢拜賔諸臣在他國為位而哭不敢拜賔與諸侯為兄弟亦為位而哭凡為位者一袒鄭氏曰因五服聞喪而哭列人恩諸所當哭者也黨謂族類無服者也逸奔喪禮曰哭父族與母黨於廟妻之黨於寢朋友於寢門外一哭而已不踊言一哭而已則不為位矣凡為位不奠以其精神不在乎是也哭天子九至士三此謂臣聞君喪而未奔為位而哭尊卑日數之差也士亦有屬吏賤不得君臣之名也大夫哭諸侯謂哭其舊君不敢拜賔辟為主也諸臣在他國謂大夫士使於列國也與諸侯為兄弟謂族親㛰姻在異國者也凡為位者一袒謂於禮正可為位而哭也始聞喪哭而袒其明日則否父母之喪自若三袒也孔氏曰此一節明無服之親聞喪所哭之處檀弓云師吾哭諸寢與此異矣兄弟朋友與此同檀弓殷禮此周法也此哭父黨於廟檀弓云有殯聞逺兄弟之喪哭於側室若無殯則在寢與此不同者異代禮也與諸侯為兄弟注云族親昏姻者此謂與諸侯異姓之昏姻又在他國不與諸侯為臣身又無服故暫為位而哭若與諸侯同姓五服之內則小記云與諸侯為兄弟者服斬是也橫渠張氏曰為位者哭位也然亦有神位不奠者奠則久奠也在他所則難為久奠喪禮則於殯常奠喪不剝奠為其久設也脯醢之奠則易之又曰為位不奠謂之不祭則不可但恐不如喪奠以新易舊如此久設也嚴陵方氏曰廟者神之所居有尊之道故哭父之黨於廟寢者人之所居有親之道故母妻之黨於寢師以道之尊而有别於父故於廟門外朋友以德之親而有别於母妻故於寢門外所識則非親特與之相識而已故於野以示其逺焉山陰陸氏曰凡喪親始死哭不以數則士明日朝莫哭又明日成服之朝哭所謂三哭者此歟大夫明日又明日朝莫哭又明日朝哭凡五哭諸侯朝莫哭如大夫又三日朝哭凡七哭於是殯天子朝莫哭如諸侯又四日朝哭凡九哭於是殯凡為位者一袒上所謂凡為位即位袒成踊是也所識者弔先哭于家而後之墓皆為之成踊從主人北面而踊鄭氏曰從主人而踊拾踊也北面自外來便也主人墓左西面孔氏曰此一節論哭所識者謂與死者相識今弔其家乃往墓統於主人故也雖相識輕亦為之成踊主人先踊賔從之故云從也山陰陸氏曰為之成踊強也坐主人北面而踊從之而已不拾凡喪父在父為主父沒兄弟同居各主其喪親同長者主之不同親者主之鄭氏曰父為主與賔客為禮宜使尊者也各主其喪各為其妻子之喪為主也祔則宗子主之親同謂父母沒如昆弟之喪宗子主之不同為從父昆弟之喪孔氏曰此一節論同居主喪之事父在父為主言子有妻子喪則其父為主父沒同居各主之當知父在同居則父主之也親同謂同三年期同父母者若同父母喪者則推長子為主若昆弟喪亦推長者為主也親者主之謂親近自主之也聞逺兄弟之喪既除喪而后聞喪免袒成踊拜賔則尚左手鄭氏曰小功緦麻不稅者也雖不服猶免袒尚左手吉拜也孔氏曰此一經論小功以下既除喪之後始聞喪之節小功以下應除之後雖不稅本是五服之親初聞喪亦為之變故免袒成踊也無服而為位者唯嫂叔及婦人降而無服者麻鄭氏曰雖無服猶弔服加麻袒免為位哭也正言嫂叔尊嫂也兄公於弟之妻則不能也婦人降而無服族姑姊妹嫁者也逸奔喪禮曰無服袒免為位者唯嫂與叔凡為其男子服其婦人降而無服者麻孔氏曰此經論哭無服而為位及弔服加麻也哭嫂與叔為位并及族姑妹女子出嫁於人元是緦麻今降而無服亦當為位哭之既無服又云麻故知弔服加麻也麻謂緦之絰也爾雅釋親云婦人謂夫之兄為兄公兄公於弟之妻則不能為位哭之然則弟婦於夫兄亦不能也兄公於弟妻不服者卑逺之也弟妻於兄公不服者尊絶之也鄭注凡為其男子服其婦人降而無服者麻男子謂族伯叔族兄弟之等為其族姑及姊妹既降無服其族姑姊妹為族伯叔兄弟亦無服加麻是男之於女女之於男皆無服而加麻故鄭云然也嚴陵方氏曰檀弓曰嫂叔之無服也蓋推而逺之也姑姊妹之薄也蓋有受我而厚之者也制之以義故無服本之以仁故為位焉山陰陸氏曰言及欲著嫂叔雖無服猶弔服加麻逸奔喪禮曰凡為其男子服其婦人降而無服者麻謂若為其再從兄弟服則其姊妹以出嫁降而無服我猶弔服加麻也凡奔喪有大夫至袒拜之成踊而后襲於士襲而后拜之鄭氏曰主人袒降哭而大夫至因拜之不敢成已禮乃禮尊者或曰大夫後至者拜之為之成踊孔氏曰此經論奔喪大夫士來弔待之節尊大夫故先袒拜成踊而后襲士卑故先襲而后拜謂先成已禮乃拜之也此謂兩士相敵兩大夫相敵亦然問喪第三十五孔氏曰案鄭目録云名曰問喪者以其記善問居喪之禮所由也此於别録屬喪服嚴陵方氏曰曲禮曰鄰有喪舂不相里有殯不巷歌以與之鄰里故亦與之同哀戚也則問喪之禮鄰里其可以廢乎此經云鄰里為之糜粥以飲食之即問之之事也故以是名篇親始死雞斯徒跣扱上衽交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里為之糜粥以飲食之鄭氏曰親父母也雞斯當為笄纚聲之誤也親始死去冠二日乃去笄纚括髮也徒猶空也上衽深衣之裳前五藏者腎在下肝在中肺在上舉三者之焦傷而心脾在其中矣五家為鄰五鄰為里孔氏曰此一節明初死三日以來居喪哭踊悲哀疾痛之意笄謂骨笄纚謂縚髮之繒親始死去冠唯留笄纚士喪禮云小斂括髮是死二日乃去笄纚也徒跣無履而空跣也扱上衽扱深衣前衽於帶以號踊履踐為妨案深衣衽當旁此云妨履踐故注為裳前其實衽象小要屬裳處皆狹旁與在前俱得衽名但扱處當衽也交手謂交手拊心而為哭也傷腎乾肝焦肺舉此三者五臟俱傷可知也不舉火者哀痛之甚情不在食也旁親以下食不可廢故鄰里為糜粥以飲食之糜厚而粥薄薄者以飲之厚者以食之山陰陸氏曰扱上衽則以有辟踊之端焉交手哭捧心而哭發胸擊心在斂之後惻怛痛疾而精先傷魂次之魄又次之故曰傷腎乾肝焦肺傷傷而已乾於是為甚乾猶可也焦又甚矣夫悲哀在中故形變於外也痛疾在心故口不甘味身不安美也三日而斂在牀曰尸在棺曰柩動尸舉柩哭踊無數惻怛之心痛疾之意悲哀志懣氣盛故袒而踊之所以動體安心下氣也婦人不宜袒故發胸擊心爵踊殷殷田田如壞牆然悲哀痛疾之至也故曰辟踊哭泣哀以送之送形而往迎精而反也其往送也望望然汲汲然如有追而弗及也其反哭也皇皇然若有求而弗得也故其往送也如慕其反也如疑求而無所得之也入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已矣故哭泣辟踊盡哀而止矣心悵焉愴焉惚焉愾焉心絶志悲而已矣祭之宗廟以鬼享之徼幸復反也成壙而歸不敢入處室居於倚廬哀親之在外也寢苫枕塊哀親之在土也故哭泣無時服勤三年思慕之心孝子之志也人情之實也鄭氏曰悲哀在中變形於外言人情中外相應也故袒而踊之言聖人制法故使之然也爵踊足不絶地辟拊心也哀以送之謂葬時也迎其精神而反謂反哭及日中而虞也望望瞻望之貌也慕者以其親之在前疑者不知神之來否求而無所得之至盡哀而止矣說反哭之義心悵焉至復反也說虞之義成壙而歸不入處室寢苫枕塊言親在外在土孝子不忍反室自安也服勤謂憂勞孔氏曰爵踊似爵之跳其足不離於地如壞牆言將欲崩倒也汲汲促急之情皇皇意倣徨也人情之實言非詐僞假為之是人情悲慕之實也嚴陵方氏曰爵踊猶莊子所謂爵躍如壞牆然言其不可枝梧形者成之終精者生之始送之而往所以慎終迎之而反則念始之者也哀親之在外故不忍居於內哀親之在土故不忍寢於牀山陰陸氏曰殷殷踊也田田懇惻也形者其精之委脫者也皇皇然無所向也若望望然汲汲然猶有所向特有所不逮爾故曰其往也如慕其反也如疑先儒謂皇皇然者意倣徨也誤矣求而無所得之也入門而弗見也上堂又弗見也入室又弗見也是之謂皇皇然初猶言若有求而弗得今其言如此亦言之序祭之宗廟以鬼饗之徼幸復反所謂生事畢而鬼事始已也居於倚廬寢苫枕塊成壙而歸猶如此於是為至矣哭泣無時若三哭五哭先王為之節爾或問曰死三日而后斂者何也曰孝子親死悲哀志懣故匍匐而哭之若將復生然安可得奪而斂之也故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷決以三日為之禮制也鄭氏曰問者怪其遲也匍匐猶顛蹶或作扶服孔氏曰記者假設問三日而后斂之意三日斂者以士言之則大斂也明大夫以上言之則小斂也嚴陵方氏曰始死而未忍斂之者孝子之心存乎仁也三日而必斂之者聖人之禮制以義也山陰陸氏曰言至情難奪如此雖聖人猶疑焉為之斷決而後能為之或問曰冠者不肉袒何也曰冠至尊也不居肉袒之體也故為之免以代之也然則秃者不免傴者不袒跛者不踊非不悲也身有錮疾不可以備禮也故曰喪禮唯哀為主矣女子哭泣悲哀擊胸傷心男子哭泣悲哀稽顙觸地無容哀之至也鄭氏曰問者怪冠衣之相為也身無飾者不敢冠冠為褻尊服肉袒則著免免狀似冠而廣一寸將踊先袒將袒先免秃者傴者跛者此三疾俱不踊不袒不免顧其所以否者各為一爾擊胸傷心稽顙觸地不踊者若此而可或曰男女哭踊孔氏曰此冠不居肉袒者謂心既悲哀肉袒形褻故不可褻其尊服而冠也若有吉事而內心肅敬則雖袒而著冠也故郊特牲云君袒而割牲是也嚴陵方氏曰露肉體而袒衣故謂之肉袒冠則在首之上服也故以至尊言之免雖在首而非冠焉故以之代冠而已亦見檀弓免焉解秃則頂無飾故不免免則頂露矣傴則形褻矣跛則足不正故不踊踊則足勞矣此皆禮之權也山陰陸氏曰明堂位曰君肉袒迎牲于門今其言如此何也曰凡臣子為尊者使令則袒雖冠不嫌也若喪而袒非為使令也所以動體安心下氣故不敢據此免而袒袒而踊反為文矣蓋先王因其至痛惻怛為之制禮及世衰道微情有不至雖免袒踊務為如禮是禮之情果在此乎在彼乎故曰喪禮唯哀為主矣若莊周謂儒者以詩禮發冢殆不知此之過也或問曰免者以何為也曰不冠者之所服也禮曰童子不緦唯當室緦緦者其免也當室則免而杖矣鄭氏曰問者怪本所為施也不冠者猶未冠也當室謂無父兄而主家者也童子不杖不杖者不免當室則杖而免免冠之細别以次成人也緦者其免言免乃有緦服也孔氏曰不冠謂未冠童子之所服也童子不緦此喪服正經之文言不為族人著緦服也唯當室之童乃為族人著緦服緦者其免也者疊出經文也言童子當室內為父母著免乃有族人緦服言緦服由於著免是所以緦者由有免故也當室則免而杖又明童子得免所由以其孤兒當室則得免而杖為族人得著緦也免是冠之流例嚴陵方氏曰不緦則不杖不杖則不免此童子之正也當室者雖童子亦緦緦則免而杖矣童子以幼故不服族人之緦至當室雖未冠亦責以成人之備禮矣或問曰杖者何也曰竹桐一也故為父苴杖苴杖竹也為母削杖削杖桐也或問曰杖者以何為也曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也則父在不敢杖矣尊者在故也堂上不杖辟尊者之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣鄭氏曰問杖者何怪其義各異也竹桐一也言所以杖者義一也顧所用異爾問杖者以何為怪所為施也以杖扶病言得杖乃能起也父在不杖謂為母喪也尊者在不杖辟尊者之處不杖有事不趨皆為其感動使之憂戚也孔氏曰父是尊極故苴惡之物以為杖自然苴惡之色唯有竹也母屈於父故用削杖雖削情同於父桐是同父之義故不用餘木也或解云竹節在外外陽之象故為父矣桐節在內內陰之類故為母也堂上是父之所在所以為母堂上不敢杖也堂上不為喪趨者示父以閒暇不促遽也嚴陵方氏曰父在謂服母喪之時當父在之處也不杖則不敢以杖病之具感尊者之情故也堂上不趨見曲禮解堂上不趨非止喪禮示遽者特以喪爾夫事莫遽於喪而反以示不遽者以其近尊者之處不欲以喪容感之故特示其閒暇也山陰陸氏曰孝子喪親哭泣無數無時無朝夕也無數無三哭五哭也父在不敢杖尊者在故也顔回曰子在回何敢死近之矣此非故隆父殺母是人情之實禮義之經也野人曰父母何算焉隆母如父是之謂野禮記集說卷一百四十三
