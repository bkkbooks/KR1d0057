body:
  text: 禮記集説卷七十一宋衛湜撰牛夜鳴則庮羊泠毛而毳羶狗赤股而躁臊鳥皫色而沙鳴鬰豕望視而交睫腥馬黒脊而般臂漏雛尾不盈握弗食舒鴈翠鵠鴞胖舒鳬翠雞肝鴈腎鴇奥鹿胃鄭氏曰亦皆為不利人也庮惡臭也春秋𫝊曰一薰一庮泠毛毳毛别聚旃不觧者也赤股股裡無毛也皫色毛變色也沙猶嘶也鬰腐臭也望視逺視也腥當為星聲之誤也星肉中如米者般臂前脛般般然也漏當為螻如螻蛄臭也舒鴈鵝也翠尾肉也鵠鴞胖謂脅側薄肉也舒鳬鶩也鴇奥脾也鵠或為鴇也孔氏曰此一節論腥臊羶臭及諸物不可食者從牛夜鳴至般臂漏皆與周禮内饔職文同牛好夜鳴則其肉庮臭泠謂毛本稀泠毳謂毛頭毳結羊若如此其肉羶氣臊謂臊惡躁謂舉動急躁狗若如此其肉臊惡皫色其色無潤澤沙鳴謂鳴而聲嘶鳥若如此其肉臭腐腥謂肉結如星望視謂豕視望揚交睫謂目睫毛交豕若如此其肉似星也黒謂馬脊黒般謂色斑斑然馬若如此其肉如螻蛄臭也雛謂小鳥尾盈一握然後堪食若其過小未盈握不堪食也自此以下因廣言不堪食之物鵞尾之肉不可食鵠鳥鴞鳥脅側薄肉不可食鶩即是鴨其翠不可食雞肝鴈腎亦不可食鴇奥及鹿胃亦不可食奥謂脾為藏之深奥處凢此皆為不利人也李廵云野曰鴈家曰鵝野曰鳬家曰鶩嚴陵方氏曰夜鳴謂非時而鳴赤股者赤之為色宣布著見股無毛則股著見矣故以赤言之躁則言其性之不靜皫言如麃之美而色白沙鳴鳴之悲凉者土宻而温沙疏而凉故謂之沙豕俯首以食首俯則下視曰望視則首昻矣莊子所謂豚之亢鼻盖此類也睫目毛以長故交黒脊者言衆體皆異而脊獨黒也般猶疾之有瘢在前脛故曰瘢臂握手一握也尾不盈握則形未成矣故弗食言此弗食則下陳者可知爾雅曰舒鴈鵞舒鳬鶩鵝鴈類鶩鳬類以為人所畜不善飛舒而不疾故謂之舒山隂陸氏曰庮臭如朽木也朽薌之反也鳴其聲也躁其性也毳其尾也望視而交睫腥言其精神黒脊而般臂漏言其形色羊泠毛而毳則羶狗赤股而躁則臊鳥皫色而沙鳴則鬰豕望視而交睫則腥馬黒脊而般臂則漏不言則有不皆也且曰則者盡其辭也鬰周官作貍漏周官作螻盖凢物宜露而鬰之則臭宜覆而漏之則臭漏與鬰言所以臭也螻與貍言其臭如之雛小雞也許慎說文云雛鷄子也雞長尾者故不盈握弗食月令以雛甞黍亦雞耳為物不同不可食者非一處也故翠言後胖言左右肝腎奥胃又言其肉王氏昭禹曰天産之物所以資氣體之飬者也所禀之氣一有不和則資其味者疾癘或乘之而至於為害不少矣牛者服重致逺之物勞於晝而息於夜者牛當伏靜之時今而夜鳴則陽内受隂而隂陽不和故其臭庮庮者隂臭之惡也故曰牛夜鳴則庮羊泠毛而毳羶者毛総結謂之泠毛長謂之毳凢毛皆属於肺肺金也羊火畜火勝金今毛反総結而長則火氣弱而金勝火矣其臭雖羶而不可食也疾走而無常謂之躁狗金畜也西方隂止以收而生金金於五臟為肺而主皮毛赤股則金氣衰而皮毛受病矣躁則反於隂止以収而其性受病矣其病如此則臊臊而不可食也鳥皫色而沙鳴鬰盖物埋藏則鬰塞而不通周禮言貍則貍與鬰文異而義同也皫色則其氣鬰而不達於毛羽沙鳴則其氣鬰而不達於聲音其肉氣亦鬰而不可食矣豕水畜也睫火事也火勝水而其病見於目則水火不相逮而隂陽不和此腥之不可食者也馬火畜也黒水色也馬脊黒則以水勝火而在上其文又般旋至於臂則水盛而火氣不足則其臭如螻蛄而不可食每物而辨則膳羞之用無隂陽偏勝之氣而氣體之養頼之而安矣肉腥細者為膾大者為軒或曰麋鹿魚為菹麕為辟鷄野豕為軒兔為宛脾切葱若薤實諸醯以柔之鄭氏曰為膾為軒言大切細切異名也膾者必先軒之所謂聶而切之此軒辟雞宛脾皆菹類也釀菜而柔之以醯殺腥肉及其氣菹軒聶而不切辟鷄宛脾聶而切之軒或為胖宛或作鬰孔氏曰此一節眀齏菹之異用肉不同作記之時無菹軒辟雞宛脾之制舊有此言承而用之故稱或曰凢大切若全物為菹細切者為齏其牲體大者菹之其牲體小者齏之用此麋鹿魚為菹及野豕為軒是菹也麕為辟雞兔為宛脾者是齏也故鄭註醢人云細切為齏全物若䐑為菹少儀曰麋鹿為菹野豕為軒皆䐑而不切麕為辟雞兔為宛脾皆䐑而切之是菹大而齏小也少儀不云魚此云魚記者異聞也此魚與麋鹿相對是魚之大者故以為菹其辟雞宛脾及軒之名其義未聞切葱若薤實諸醯以柔之者此亦少儀文或用葱或用薤故云切葱若薤肉與葱薤置諸醋中故云實諸醯物置醯中悉皆濡孰故云柔之羮食自諸侯以下至於庶人無等大夫無秩膳大夫七十而有閣天子之閣左達五右達五公侯伯於房中五大夫於閣三士於坫一鄭氏曰羮食食之主也庶羞乃異耳秩常也無秩膳謂五十始命未甚老也七十有閣有秩膳也閣以板為之庋食物也達夾室大夫言於閣與天子同處天子二五倍諸侯也五者三牲之肉及魚腊也孔氏曰此一節論天子諸侯及大夫士等尊卑膳食之等差食謂飯也言羮之與飯助以雜物醯醬是食之主故諸侯以下無等差也此謂每日常食若非依常禮食之外或别有牛羊豕之肉随時得為羮也其黍稷稻粱依禮正食之外别有稼穡收穫皆得為飯故云羮食無等案公食大夫禮下大夫十六豆上大夫二十豆又周禮掌客云上公食四十侯伯食三十二子男食二十四鄭註云食謂庶羞美可食者此庶羞乃異也宫室之制中央為正室正室左右為房房外有序序外有夾室天子尊庖厨逺故左夾室五閣右夾室五閣諸侯卑庖厨宜稍近故降於天子唯在一房之中而五閣也大夫既卑無嫌故亦於夾室而閣三也三者豕魚腊也士卑不得作閣但於室中為土坫庋食物也天子腊用六牲今云五閣是不一牲為一閣魚腊是常食之物是故知三牲及魚腊也嚴陵方氏曰食為主羮為配人所日用者也惟稱有無随其所宜不制豐殺而預為之等焉雖然此特自諸侯以下而已若夫四海之奉一人之尊又安得無等乎周官膳夫王日一舉鼎十有二物皆有爼則固有等矣此所以言諸侯以下也前言士不貳羮胾則士羮亦有等矣盖彼主燕食此主常食言之也燕食以禮為主故不可無等常食以養為主故不可不随宜焉大夫無秩膳與酒正秩酒之秩同夾室以自是而達於外故謂之達必於夾室者逺庖厨之義也自諸侯而下則有逺近之殊多少之别者尊者詳卑者略尊者隆卑者殺故也天子諸侯於達房則必有常所大夫無常所士但於坫而已夫坫猶爵坫之坫閣則有門以㡬其出入此又大夫之别山隂陸氏曰一羮一食雖不為等可也夫禮曲而不苛盖如此若前所云者皆燕饗等禮秩膳孟子所謂廪人繼粟庖人繼肉不以君命將之是也若大夫賜則有之不得為常秩膳有閣則臺餽有常庋之以湏此亟問亟餽鼎肉子思之所以不恱也堂上為達公侯伯於房中下天子也左達左夾室前堂右達右夾室前堂大夫言於閣三則蒙上房中可知士言於坫一則凢閣用坫亦可知據唯上大夫有閣而此云士於坫一則士雖有閣不足言也凢養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之凢五十養於鄉六十養於國七十養於學達於諸侯八十拜君命一坐再至瞽亦如之九十者使人受五十異粻六十宿肉七十貳膳八十常珍九十飲食不違寢膳飲從於遊可也六十嵗制七十時制八十月制九十日脩唯絞紟衾冒死而后制五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從七十不俟朝八十月告存九十日有秩五十不從力政六十不與服戎七十不與賔客之事八十齊䘮之事弗及也五十而爵六十不親學七十致政凢自七十以上唯衰麻為䘮凢三王養老皆引年八十者一子不從政九十者其家不從政瞽亦如之几父母在子雖老不坐有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏皇而祭深衣而養老夏后氏収而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老鄭氏曰記王制有此孔氏曰此一節皆王制文記者重録之後人因而不去慎疑不敢刪易也山隂陸氏曰王制主國故先言養國老於上庠後言凢三王養老皆引年八十者一子不從政内則主家故先言三王養老皆引年八十者一子不從政後言養國老於上庠主家以言故無所謂少而無父者謂之孤一節主國以言故無所謂曽子曰孝子之養老也樂其心不違其志一節主家也故言不從政狹主國也故言不從政廣所謂家事有以異於國乎無也故内則終之以凢養老五帝憲三王有乞言五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而后乞言亦微其禮皆有惇史一節所謂國事者有以異於家乎無也故王制終之以父之齒随行兄之齒鴈行朋友不相踰輕任并重任分斑白者不提挈君子耆老不徒行庶人耆老不徒食大夫祭噐不假祭器未成不造燕器一節慶源輔氏曰脩與脩道之謂敎之脩同周人総三代之禮而兼取其善者以制一王養老之禮也曽子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之孝子之身終終身也者非終父母之身終其身也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎鄭氏曰犬馬盡然賤喻貴也孔氏曰此一節因上陳養老之事遂陳孝子事親之禮作記之人既云孝子之身終恐人不觧故觧云非終竟父母之身終其孝子之身也言父母雖没終竟已身而行孝道與親在無異父母所愛敬犬馬之属盡湏愛敬而况於父母所愛敬之人乎長樂劉氏曰仲尼之門以孝聞者曽子而已參之為道也與夫虞舜易地皆然非其行難也人人皆可以行之所以不逮於曽子者曽子常久而不息也孝子之養老者婦之養舅姑孫之養祖父母猶子之養其父母也故皆曰老焉樂其心者謂左右侍養也晨昬定省也出入從遊也起居奉侍也必常賾討其心之所好者何在所惡者何如然後順而篤其所好者而卻其所惡者果非悖於大義則蔑不可從所以安固老者之行以適其氣則心樂矣不違於其志者謂老者平生之志所欲為者以道徳仁義立身揚名取大榮顯於天下者建大令譽於鄉閭者崇大孝弟於宗族者抗大志節於人倫者務既心以篤行之必著成效則弗違其所志矣樂其耳目者謂必正身以範其家力行以化其俗則善言常入於親耳善行常悦於親目至於婢僕犬馬親之所愛者則敬而愛之必使異於其倫矧其親族子孫哉皆所以樂其耳目者也安其寢處者謂堂室庭除必完潔之也簟席氊褥衾枕帳幄必常脩治極其所宜而以時更易所以將其愛敬之心而盡其寜親之志則寢處安矣經云將坐則為長者奉席請席何鄉請祍何趾盡其敬以安之之謂也以其飲食忠養之者謂飲也酒也飯也膳也食也如經所陳則其飲食足以盡其忠敬之誠而老者不失其所養矣凢是五事兼於其身常久而不息曽子由之以終其身者具此五美則可知終其身無愧於天地鬼神矣無愧於天地鬼神則其親有不安之者乎則其子孫有不範之者乎故曽子之孝也天下後世範之者也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎經所謂没身敬之不衰曽子行之己又言之以為敎天下後世老者享其安且樂者莫非曽子之賜也詩云孝子不匱永錫爾類其謂是歟嚴陵方氏曰心存乎無所事之時孝子則樂而不詒其憂志見於有所欲之際孝子則不違以順其命曰養老何也盖老則近於親而已近於親者養之且若是又况於其親不如是不足以為孝子怡聲而問所以樂其耳也柔色以温所以樂其目也定於昬所以安其寢也省於晨所以安其處也以其飲食忠養之者盖養親之道雖非即飲食以能盡亦非舎飲食以能為君子何以處之亦曰忠養之而已夫忠所以不欺其親也養之以物止足以養其口體養之以忠則足以養其志矣昔曽子養曽晳曽元養曽子其有酒肉也未始不同及其問有餘曽子則曰有曽元則曰亡故孟子以曽子為能養志以曽元為養口體者然是禮也豈特終父母之身而行之乎又且終其身而不敢怠焉經不云乎事死如事生又曰生則敬養死則敬享思終身弗辱也是以於其齊也則思其居處思其笑語思其所樂思其所嗜此非樂其心不違其志樂其耳目安其寢處者乎於其終也則朝事之籩豆以象朝事之所進饋食之籩豆以象食時之所進加籩加豆以象饋之有加羞籩羞豆以象食之有羞既致其養又致其盛既致其盛且致其敬又致其難且美者又服其服而自致焉此非以其飲食忠養之乎豈非終孝子之身乎山隂陸氏曰養老如此為其近於親也言忠養之嫌或偽止言其近親者猶如此不言親所愛敬猶如此建安真氏曰孝子愛敬之心無所不至故父母之所愛敬者雖犬馬之賤亦愛敬之况人乎哉姑舉其近者言之若兄若弟吾父母之所愛也吾其可以不之愛乎若薄之是薄吾父母也若親若賢吾父母之所敬也吾其可以不之敬乎若慢之是慢吾父母也推類而長莫不皆然若晉武惑馮紞之讒不思太后之言而疎齊王攸唐髙宗溺武氏之寵不念太宗顧託之命而殺長孫無忌皆禮經之罪人也凢養老五帝憲三王有乞言五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而后乞言亦㣲其禮皆有惇史鄭氏曰憲法也養之為法其徳行有讀為又又從之求善言可施行也㣲其禮者依違言之求而不切也孔氏曰此一節論五帝三王養老之禮五帝養老法其徳行三王其徳漸薄非但法其徳行又從求乞善言五帝憲養氣體而不乞言者覆説上五帝憲之法奉養老人就氣息身體恐其勞動故不乞言也老人有善徳行則記録之使衆人法則為惇厚之史三王既法徳行又從乞言依違求之而不逼切皆者皆三代也長樂劉氏曰先儒以為憲其徳行乃餘義耳若養老之大養則天子用子事父之禮養國老於東膠養庶老於虞庠所以使天下憲法天子敬老之義致孝養於其親也故但盡禮盡敬以憲萬邦而不乞言也又何憲法其徳而已哉嚴陵方氏曰老有考之義考有成之義以其年之髙而徳有成知之深而言有考則帝王之禮或憲或乞不為過矣五帝養氣體而不乞言則乞言之禮至三王之世始有五帝而上則亡焉故特曰有也若執醬而饋執爵而酳或以燕禮或以饗禮或以食禮則所以養其氣也或肆之筵或授之几或杖於家或杖於國或杖於朝則所以養其體也且五帝之憲也而老者未甞無言要之以徳為主耳故曰有善則記之三王乞言而老者未甞無徳要之以言為主耳故曰三王亦憲既養老而後乞言者養之盡然後言可得而乞也亦㣲其禮者㣲則緩而不廹隠而不切之謂盖老者之氣衰矣惟不欲以廹切之禮耗其氣故也且㣲諌不倦事親之禮也君子之於老者未始不以㣲焉以近於親故也皆有惇史者言帝王同有是史以記其善也善善而惡惡記之而無所隠史之體也養老之史記善而不記惡則其心可謂厚矣故以惇名之山隂陸氏曰凢養老一嵗有三周官仲春羅氏獻鳩以養國老一也月令仲秋養衰老授几杖行糜粥飲食二也周官止言國老非遺庶老也以獻鳩非庶老之事也月令止言衰老非遺耆老也以授几杖行糜粥飲食非耆老之事也若夫季春天子視學於是大合樂必遂養老月令云季春大合樂而文王世子曰凢大合樂必遂養老又曰適東序釋奠於先老遂設二老五更羣老之席位焉是也先儒謂春釋菜合舞秋頒學合聲皆養老非是案養老皆釋奠而合舞言舎菜爾且謂秋合聲春合舞非大合樂也言三王養老雖亦憲雖乞言亦㣲其禮然皆有惇史也是皆已廹東萊吕氏曰年之貴乎天下乆矣五帝三王皆尊徳尚齒然五帝三王養老之禮雖同憲與乞言不同盖道有升降風氣有厚薄所以如此五帝憲則是瞻儀容視起居不曽有乞言之禮盖當時風氣未開人情淳厚朝夕與老者親炙其仁義之容道徳之光自得於觀感不言之際三王不及五帝所以有乞言之禮比之觀瞻不言之中氣味稍薄五帝養老盡其誠敬所謂洗爵奠斚從容養其氣體未甞乞言有善記之惇史盖動容起居從容之間偶然𤼵言也記如鄉黨所記可見惇史之意古者之史名各不同載閫内之事謂之女史所載者后妃之徳載朝廷之事謂之國史所載者天下之大綱記老者善言善行而法之謂之惇史惇盖惇厚之謂三王亦憲者於動容之間然既憲又欲請益咨問得老者一言書紳服膺終身佩服雖憲與乞言不同其問長者亦㣲其禮此尊老之至如此不敢急迫湏從容欵曲伺間乘暇開端𤼵問看㣲其禮一句是至誠盡禮在老者左右俟從容間暇略𤼵端問其所乞之言所法之行皆有惇史記之五帝之時何故不乞言當是時學者皆精㣲主一更無一毫外心但至誠専一見老者之言無非從容感𤼵處所以不待乞言此氣味非後世所能及唯顔子孔子曰回也非助我者也於吾言無所不説終日不違如愚少有五帝不乞言之意唯五帝時人人皆然到得孔子出纔說予欲無言子貢便説小子何述焉其風氣稍薄以此知不乞言孔門中顔子一人而已五帝時風俗淳厚其養氣體之時浹洽陶冶之功深非言語訓誥所能及三王雖不及五帝然㣲其禮從容欵曲與後世問荅氣味又不同及忠厚惇篤之風衰前言徃行繼絶學者所以澆薄今之學者當先思五帝三王浹洽陶冶之意又當思㣲其禮從容欵曲不敢廹切之意又當思前言徃行不絶則忠厚淳篤之風不衰唯能如此思雖在千百載之下五帝三王之氣象夫何逺之有淳熬煎醢加于陸稻上沃之以膏曰淳熬淳毋煎醢加于黍食上沃之以膏曰淳毋鄭氏曰淳沃也熬亦煎也沃煎成之以為名毋讀曰模模象也作此象淳熬孔氏曰自此至為酏一節論養老湏飲食如養親之事明八珍之饌并眀羞豆糝􅊡之等淳熬者是八珍内一珍之膳名也淳謂沃之以膏熬則煎醢是也陸稻謂陸地之稻以陸地稻米為飯煎醢使熬加於飯上恐其味薄更沃之以膏使味相湛漬曰淳熬毋是禁辭非膳羞之體故讀為模言法象淳熬而為之但用黍為異耳食飯也謂以黍米為飯也黍無在水之嫌故不言陸山隂陸氏曰淳毋謂之毋禁辭也凢食稷黍為正稻粱為加稻而煎醢加焉沃以膏猶可黍也如此甚矣炮取豚若將刲之刳之實棗於其腹中編萑以苴之塗之以謹塗炮之塗皆乾擘之濯手以摩之去其皽為稻粉糔溲之以為酏以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯毋滅鼎三日三夜毋絶火而后調之以醯醢鄭氏曰炮者以塗燒之為名也將當為䍧䍧牝羊也刲刳博異語也謹當為墐聲之誤也墐塗塗有穰草也皽謂皮内之上魄莫也糔溲亦博異語也糔讀與滫瀡之滫同薌脯謂煮豚若羊於小鼎中使之香美也謂之脯者既去皽則解析其肉使薄如為脯然唯豚全耳豚羊入鼎三日乃内醯醢可食也孔氏曰為炮之法或取豚或取牂刲刳其腹實香棗於腹中萑是亂草也苴裹也編連亂草以裹匝豚牂裹之既畢塗之以謹塗謂穰草相和之塗也用之炮豚湏相黏著以此墐塗而泥塗之擘之者謂擘去乾塗也手既擘泥不淨其肉又熱故濯手摩之去其皽膜也為稻粉糔溲之以為酏者付全豚之外煎之於膏若羊則觧析肉以粥和之滅没也小鼎盛膏煎熬豚牂膏必没此豚牂也鉅鑊湯者謂以大鑊盛湯以小鼎之香脯入於大鑊湯中使鑊中之湯無得没此小鼎若湯没鼎恐湯入鼎中令食壊也毋絶火者欲令用火㣲熱勢不絶也鄭註刲刳博異語者案易云士刲羊又云刳木為舟與糔溲皆意同而語異也山隂陸氏曰炮詩所謂毛炮是也若將刲之將讀如字若將刲之猶如麛執之先儒謂獻麛有成禮如之也為稻粉以下一節釋為稻粉之法𢷬珍取牛羊麋鹿麕之肉必脄每物與牛若一捶反側之去其餌孰出之去其皽柔其肉鄭氏曰脄脊側肉也捶𢷬之也餌筋腱也柔之為汁和也汁和亦醯醢與孔氏曰脊側肉美今𢷬以為珍宜取美處經云去其餌又云去其皽皽為皮莫故餌為筋腱腱即筋之類上炮豚炮牂調以醯醢下漬亦食之以醢若醯故知𢷬珍和亦用醯醢山隂陸氏曰此言𢷬珍則上所謂淳熬等物非珍也周官珍用八物即此牛羊麋鹿麕豕狗狠是歟與牛若一異言牛大牲也牛言布羊以下言施亦以此餌讀如合以為餌煎之之餌言去其餌則當以物為餌孰之可知言孰則捶反側之盖生也漬取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而食之以醢若醯醷鄭氏曰湛亦漬也嚴陵方氏曰漬若濡肉之類醷即前所言飲之醷山隂陸氏曰期朝猶言期年期月期年謂周一年期月謂周一月期朝謂周一朝為熬捶之去其皽編萑布牛肉焉屑桂與薑以灑諸上而鹽之乾而食之施羊亦如之施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之以醢欲乾肉則捶而食之鄭氏曰熬於火上為之也今之火脯似矣欲濡欲乾自由人也醢或為醯此七者周禮八珍其一肝膋是也孔氏曰此論作熬之法於牛有如上所陳若施設於羊亦如牛也食熬之時唯人所欲若得濡肉則以水潤釋而煎之以醢也七謂一淳熬二淳模三四炮取豚若牂五𢷬珍六漬七熬其一肝膋則此糝下肝膋也但記文不依次故於糝下陳之嚴陵方氏曰曲禮言濡肉齒決盖由制造之異故食之不得不異也山隂陸氏曰不與麋鹿麕同曰如之異言羊也糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之鄭氏曰此周禮糝食也孔氏曰周禮醢人云羞豆之實酏食糝食三如一謂取牛羊豕之肉等分如一稻米二肉一者謂二分稻米一分肉也山隂陸氏曰三如一不異言牛同是三牲之一施之也肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼取稻米舉糔溲之小切狼臅膏以與稻米為酏鄭氏曰膋膓間脂舉或為巨狼臅膏臆中膏也以煎稻米此周禮酏食也酏當從餰孔氏曰舉皆也謂炙膋皆燋也酏是粥非是膏煎稻米故改酏從餰也山隂陸氏曰珍用八物其為品六一曰𢷬二曰漬三曰熬四曰糝五曰肝膋六曰酏言為熬在上言為酏在下熬隆於用火言為稻粉在上亦以此周官糝食即此糝酏食即此酏三相參為糝所謂稻米二肉一合以為餌煎之是也兩相差池為酏所謂小切狼臅膏以與稻米為酏是也然則淳熬淳毋所謂糗餌粉餈是歟其謂之淳亦珍也然進於珍矣凢物以淳為珍此篇上言養老繼之以此盖珍宜以養老文王世子曰適饌省醴養老之珍具禮始於謹夫婦為宫室辨外内男子居外女子居内深宫固門閽寺守之男不入女不出鄭氏曰閽掌守中門之禁也寺掌内人之禁令也孔氏曰自此至當夕一節論夫婦男女及内外之别又眀妾與適妻尊卑相降之等長樂劉氏曰凢禮者為人倫而設也人倫之禮始於謹夫婦焉易稱家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣又曰閑有家悔亡象曰閑有家志未變也然則夫婦之禮不謹不敬家道莫可得而正也家人之事不閑以防之於細㣲之初不剛以正之於未然之始則其悔咎不可逭矣故用剛眀閑於細㣲之始豈徒克有厥家而悔又亡焉是禮也禁於將然故曰志未變也此所以必為宫室先辨内外男子居外女子居内各正其徳業也宫不深則内外之聲可通門不固則出入之禁可踰閽寺守之不嫌於處内也故男非其時不入女非其禮不出皆所以為天下之内則也嚴陵方氏曰天下之本在國國之本在家故禮始於謹夫婦易基乾坤詩首闗雎皆始於謹夫婦之意也謹夫婦故為宫室以居之辨外内以防之男子居外女子居内隂陽之分也深宫則外人不得而入固門則強者不得而啓男女不同椸枷不敢縣於夫之楎椸不敢藏於夫之篋笥不敢共湢浴夫不在歛枕篋簟席襡器而藏之少事長賤事貴咸如之夫婦之禮唯及七十同藏無閒鄭氏曰竿謂之椸楎杙也夫不在歛枕篋等藏之不敢䙝也咸皆也夫婦七十同藏無閒衰老無嫌及猶至也孔氏曰爾雅釋宫云在牆者謂之楎郭璞引禮云不敢縣於夫之楎椸直曰楎横曰椸楎椸是同類之物横者曰椸則以竿為之夫婦唯至七十同處居藏無所閒别衰老無嫌疑故也長樂劉氏曰婦正其徳於内則夫之徳正於外從可知也夫婦謹敬則家道由之莫敢不化也故父父子子兄兄弟弟夫夫婦婦者莫非出於謹敬也而况少事乎長賤事乎貴其敢不敬哉夫婦之禮唯七十同藏無閒夫婦雖未七十同藏未有可嫌者聖人制禮以為天下之内則也夫婦必如此者以為男女内外之禮敬則為先焉夫婦身先於上則男女力行於下以無嫌正有嫌也用有情之難行正人情之易制也山隂陸氏曰枕有篋簟席有襡皆器而藏之不言枕言枕篋不言席言簟席襡嫌凟也即父母舅姑不嫌慶源輔氏曰器而藏之謂藏之於器藏之於器則畏凟之甚也少事長賤事貴雖曰皆如之然有異焉記者之辭不謹也案篇首子婦之禮可知故妾雖老年未滿五十必與五日之御將御者齊潄澣慎衣服櫛縱笄総角拂髦衿纓綦屨雖婢妾衣服飲食必後長者妻不在妾御莫敢當夕鄭氏曰五十始衰不能孕也妾閉房不復出御御謂侍夜勸息也五日一御諸侯制也諸侯取九女姪娣兩兩而御則三日也次兩媵則四日也次夫人専夜則五日也天子十五日乃一御將御者其徃如朝也角衍字也拂髦或為繆髦也雖婢妾衣服飲食必後長者人貴賤不可以無禮也妻不在妾御莫敢當夕辟女君之御日也孔氏曰此經據妾言之然則妻雖五十以上猶得與也夫人及二媵各有姪娣凢六人故三日也天子御法案九嬪註云女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日徧妻不在謂卿大夫以下故註云女君大夫一妻二妾則三日御徧士一妻一妾則二日御徧妾常避女君之御日非但不敢當女君之御日縱令自當君之御日猶不敢當夕而徃故詩小星云肅肅宵征夙夜在公註引此云凢妾御於君不當夕是也嚴陵方氏曰將御者必齊潄澣者則所以致潔敬也婢妾衣服飲食必後長者盖不以賤廢尊卑上下之道故也妻不在妾御莫敢當夕者所以避上僭之嫌也山隂陸氏曰鬠用組乃笄又曰鬠笄用桑長四寸角非衍字総角拂髦女未笄之飾今服以御言若未足以當君子也故邦君之妻自稱曰小童莫敢當夕謂莫敢進御鄭氏曰避女君之御日非是詩曰肅肅宵征抱衾與禂實命不猶則凢妾御不當夕其當夕夫人之恵也又曰五日為期六日不詹則男子婦人五日一御亦衛生之經不得如鄭説女御及后十五日而御慶源輔氏曰故妾必與五日之御其心之厚可知己彼有棄舊室戀新婚與華落色衰復相棄背者亦獨何哉老謂色衰也將御者齊潄以至綦屨慎衣服必以禮不敢以靡麗求寵也詳是篇之㫖其徃如朝敬之至也豈有爭妬之心雖婢妾衣服飲食必後長者因上慎衣服遂言雖賤不可以廢禮也妻將生子及月辰居側室夫使人日再問之作而自問之妻不敢見使姆衣服而對至于子生夫復使人日再問之夫齊則不入側室之門子生男子設弧於門左女子設帨於門右三日始負子男射女否鄭氏曰側室謂夫之室次燕寢也作有感動也夫齊則不入側室之門若始時使人問也弧者示有事於武帨者事人之佩巾表男女也始有事也負之謂抱之而使郷前也孔氏曰從此以下終篇末論國君以下至庶人生子之禮及適庶羞别妻妾異等所生男女養教之法此經則眀大夫以下未生子之前夫問之冝及生子設弧矢之法及月辰謂生月之辰初朔之日也正寢之室在前燕寢在後側室夫次燕寢在燕寢之旁故謂之側室妻居側室則妾亦當然故春秋𫝊云趙有側室曰穿是妾之子也生子不於夫正室及妻之燕寢必於側室者以正室燕寢尊故也慶源輔氏曰當産而避燕寢居側室其自歛戢者至矣豈復有驕其夫之意哉夫使人日再問之者愛而不失於狎敬而不失於疏孔氏引春秋𫝊非側室自是妾之常居妻不敢見雖病不敢忘禮使姆衣服而對雖遽不敢失禮夫之於妻其恩至矣至於齊則不以㤙掩義三日負子男射女否敎以行矣敬之至也如是而長男不武女不順可以無憾已山隂陸氏曰言衣服則姆代服其服以對歟設帨知有酒食之事而已嚴陵方氏曰設弧於門左左者天道所尊設帨於門右右者地道所尊必曰設者方男女之生其於弧帨有可用之道而未能有用之實也古之人重男女之生又重男女之别非特見於弧帨而已男則寢於牀之尊女則寢於地之卑其衣之也男以晝服之裳女以夜服之禓其弄之也男以所有事之璋女以所有事之瓦國君世子生告于君接以大牢宰掌具三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方保受乃負之宰醴負子賜之束帛卜士之妻大夫之妾使食子鄭氏曰接讀為捷捷勝也謂食其母使補虚強氣也詩之言承也桑弧蓬矢本太古也天地四方男子所有事也保保母保受乃負之代士也醴當為禮聲之誤也禮以一獻之禮賜之束帛酬之以幣也士妻大夫之妾時自有子使之食子不使君妾適妾有敵義不相䙝以勞辱事也孔氏曰此一經論國君世子生及三日負子及食之法婦人初産必困病虚羸故接以大牢詩者持也以手承下而維持抱負之桑蓬皆質素之物故知本太古也男子上事天下事地旁禦四方之難故云所有事然射禮唯四矢者謂天地非射事所及唯禦四方故止四矢蓬是禦亂之草桑衆木之本也賜之束帛約士昬禮禮賔酬幣之法士負子故還用士禮案王氏曰接以大牢者謂接待夫人以大牢皇氏曰士之妻大夫之妾者随課用一人故桓六年左𫝊云卜士負之士妻食之不云有大夫妾文略也長樂劉氏曰接者繼續之謂也諸侯有國家社稷宗廟人民其𫝊且付事任靡輕夫人始生世子乃有繼續之道故接引其子禆有立志而禮用大牢也母方生子分血𣲖氣未可以興而男子之生必於丈夫之手所以卜求吉士負之以行接子之禮乃俾射人桑弧蓬矢射天地四方者眀其𫝊先王之道承祖父之付必有徳政以達乎天地四方是假桑蓬以申其志焉嚴陵方氏曰接以大牢者以大牢之禮接見其子也掌具則其設禮之具也卜士之眀詩者將使負子下言詩負之是矣必使眀詩者負子則期於能言故也眀詩者謂之詩猶眀易者謂之易祭義言易抱龜南面是矣既得吉卜然後宿齊朝服負之則敬之至也射人則使之代射天地四方也保受乃負之則受其子於士乃負之也盖士之負子特為斯湏之禮而已宰既掌具故以醴禮其負子之士仍賜束帛以酬之也使食之者食則乳之也夫射之為道此男子之所當為者故士使之射不能則辭以疾方子之生則使人代之以射且示其有志然桑非弓幹之上者蓬非矢材之勁者然則桑蓬取其用之義以見雖有其志未備其事而成人有漸也山隂陸氏曰接讀如字書曰接下思恭詩負之猶特牲受嘏詞曰詩懐之也詩曰乃生男子載寢之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王此豈所謂其詩與醴讀如字醴以禮之冠禮曰乃醴賔一獻之禮嬰兒多類乳母則嬰兒以乳轉者有矣又大任之母文王也目不視惡色耳不聽惡聲以為古之胎敎者皆如此則食母豈可以不擇哉慶源輔氏曰大牢牲之大也大宰官之尊也所以重世子也據下凢接子可知士之負子斯湏而已必醴而賜之者所重在子也醴士而不及射人士負我者也射人我所使也固不可同矣諸母則擇之乳母則卜之者豈非情性之𤼵尚猶可見而氣血之相冝有不可知者邪禮記集説卷七十一
