body:
  text: 禮記集説卷一百三十九宋衛湜撰子言之君子之所謂仁者其難乎詩曰凱弟君子民之父母凱以強教之弟以説安之樂而毋荒有禮而親威莊而安孝慈而敬使民有父之尊有母之親如此而後可以為民父母矣非至德其孰能如此乎鄭氏曰有父之尊有母之親謂其尊親已如父母孔氏曰自此至不勝其文更廣明仁道又顯尊親之異並論虞夏商周質文不等引詩大雅泂酌戒成王之詩凱樂也弟易也言有仁行可為民父母也孔子既引詩又釋凱弟之義強教謂使人自強不息弟謂以遜弟化民民皆説豫而安之也樂失於荒禮失於疏明君為樂而毋荒有禮而相親威嚴矜莊而民安孝順慈愛而民敬故使民尊之如父親之如母藍田吕氏曰此章言君子之仁兼乎尊親然後可以為民父母因厯言四代之道詩云凱弟君子民之父母先儒訓凱為樂弟為易此云凱以強教之弟以説安之宜若有異然求他經之言凱者詩有凱風周官司樂王師大獻則令奏凱樂左氏春秋傳言髙陽氏有才子八人謂之八愷參求義訓可以為和樂和樂之中又有強盛之狀凱風南風鼓動長養之風也凱樂戰勝之樂也八愷謂之才子則性和而有才者也皆有盛強之意故愷亦可以訓強矣弟有兄弟之弟有孝悌之弟皆順也順則易有説下之道故訓為悅也強教之者以道驅之如佚道使民雖勞不怨者也説安之者得其心之謂也説以使民民忘其勞説以犯難民忘其死者也樂説安也毋荒則有教矣有禮強教也親則説矣威莊強教也安則説矣孝慈説也敬則有教矣強教則父之尊存焉説安則母之親存焉天下之民莫不尊親此之謂至德可以為民之父母馬氏曰所謂仁者其難乎言仁之難其成也嚴有以致其尊愛有以致其親然後為功之成也詩云凱弟君子民之父母此言仁之成也凱以強教之所以致其尊而率之於外也弟以説安之所以致其親而和之於內也有以致其尊故樂而無荒孝慈而敬有以致其親故有禮而親威莊而安尊有以致其親親有以致其尊其尊可以比於父其親可以比於母故曰使民有父之尊有母之親講義曰君子之所謂仁者非若衆人之所謂仁以姑息為事而同乎流俗蓋君子之仁寬而有制從容以和而不倚於一偏一曲所以為難也教者所以成民性惟凱以強教則民不敢怠於善安者所以得民心唯弟以説安則民自能忘其勞樂而毋荒則和而不流有禮而親則中而不離威莊而濟之以安則無矯飾之為孝慈而濟之以敬則無慢易之心矣凡此皆具凱弟之道既有以為之節而不至於過又有以為之文而不至於不及此君子之所謂仁而為之難也嚴陵方氏曰強者強之使有所至教者教之使有所能説者使其心之無憂安者使其身之無危父之道在乎強教之母之道在乎説安之間居言為民父母必達於禮樂之原亦引此詩以為證石林葉氏曰凱弟者人之術也凱言其樂弟言其順樂以強而教之父道也順以説而安之母道也父道雖以敬為主然樂而無荒則亦有禮而親之也母道雖以愛為主然威莊而安則亦孝慈而敬之也有禮而親故其尊之如父孝慈而敬故其親之猶母敬愛者人道而已矣故始曰仁而終名之曰至德孝經言孝弟而終以至德順民亦此意也山隂陸氏曰威莊難安孝慈易溺今父之親子也親賢而下無能母之親子也賢則親之無能則憐之母親而不尊父尊而不親水之於民也親而不尊火尊而不親土之於民也親而不尊天尊而不親命之於民也親而不尊鬼尊而不親鄭氏曰或見尊或見親以其嚴與恩所尚異也命謂四時政令所以教民勤事也鬼謂四時祭祀所以訓民事君也孔氏曰下謂下賤之父立於義故於子分别母主恩愛而已長樂劉氏曰父之於其子也賢則親之無能則下之母之於其子也賢則親之無能則憐之父母非不愛其子之賢也而不能使之必賢惟聖人皇建其極者為能一天下於中和惟時厥庶民罔敢過於中也罔敢弗及於中也經曰舜執其兩端而用中於民故民視事君有父之尊有母之親如此而後乃可為民父母以言乎父母雖克生其身而罔克成其德也易曰乾道變化各正性命非至仁至德之君其能與於此乎然則父也母也水也火也土也天也命也鬼也皆斯民所賴以生其身者也或尊而不親或親而不尊未有能兼而得之者也兼而得之者以皇極説安其民而為天下王者也中庸曰日月所照霜露所隊凡有血氣者莫不尊親故曰配天者是之謂也藍田吕氏曰尊親之義自父母而推之父與母也水與火也天與地也鬼與人也尊而不親親而不尊當其強教也則不純以恩故賢則親之無能則下之當其説安也則有收而無絶故賢則尊之無能則憐之此父母親尊之異也水者民狎而玩之火者民望而畏之此水火尊親之異也地載我者也然近人人可得而載天者覆我者也然逺人人不可階而升此天地尊親之異也君之命見於事也近人而可行也鬼之道存諸理也逺人而不可形也此人與鬼尊親之異也嚴陵方氏曰親賢而下無能者制以義也賢則親之無能則憐之者存乎仁也母存乎仁故親而不尊父制乎義故尊而不親夫尊親之道雖本於父母然觸類而推之至於天地覆載之間古今往來之理莫不交通乎其中焉故不親者輔之以尊然後和不尊者輔之以親然後中此所以水之與火土之與天命之與鬼常相資而後成夏之命殷之神周之禮常相救而後治也命出而接物故親而不尊鬼歸而反本故尊而不親土即地也不曰地而曰土者以其親故以體言之也馬氏曰父主於敬尊而不親母主於愛親而不尊水懦則狎而玩之故親而不尊火烈則人望而畏之故尊而不親土則近於人而有利可愛故親而不尊天則逺於人而有威可畏故尊而不親命則令人於明而近於人者也故親而不尊鬼則相人於幽而逺於人者也故尊而不親兼尊與親者君也故可以為民父母子曰夏道尊命事鬼敬神而逺之近人而忠焉先祿而後威先賞而後罰親而不尊其民之敝憃而愚喬而野朴而不文殷人尊神率民以事神先鬼而後禮先罰而後賞尊而不親其民之敝蕩而不靜勝而無恥周人尊禮尚施事鬼敬神而逺之近人而忠焉其賞罰用爵列親而不尊其民之敝利而巧文而不慚賊而蔽鄭氏曰夏逺鬼神近人謂外宗廟內朝廷也敝謂政教衰失之時以本不困於刑罰少詐諼也殷人先鬼後禮謂內宗廟外朝廷也禮者君臣朝會凡以摯交接相施豫也以本􅏸於鬼神虛無之事令其心放蕩無所定困於刑罰茍勝免而無恥也周賞罰用爵列以尊卑為差孔氏曰此眀夏殷周尊親之事夏尊命謂尊重四時政教之命使人樂事勸功也夏尚仁恩民承寬裕及其衰末猶有先世遺風憃愚謂情不澆詭喬野質朴不競文華如淳朴時也殷代尚虛無故其敝不安靜鄭注􅏸串也習也周人尚禮往來施惠之事以其尚禮本數交接往來故便利機巧多文辭而無慙愧共相賊害而困蔽以其禮失於煩致然也橫渠張氏曰三代質文相救是有此理夏道菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫教如此是忠也言忠實之敝必野如今草茅之人忠實則至矣然而必野故須濟之以敬敬之敝必矯虔不實至於鬼鬼者矯虔之義於人相接既如是則又必至於尚鬼神故須濟之以文以文則使之每每有此實也如此相救故繼周雖百世可知孔子於三代則固有去取長樂劉氏曰夏殷周之所由興也皆有實德以仁其民民視事君有父之尊有母之親可謂兼而得之者矣及其末世不能無敝者化之之道非有敝也民化其道不持之以禮樂政刑斯其所以敝歟雖然亦因其民之性有中焉者有過不及者為其敝之淺深焉爾仲尼備陳三代始末以示後世俾夫有天下者知所以始而興之者敝而教之者則皇極之道不失其繼焉此仲尼所以一言而仁冒乎萬世者乎藍田吕氏曰夏周尚親而不尊故逺神而近人殷人尚尊而不親故先鬼而後禮凡尊之道鬼也神也威也罰也凡親之道人也命也禮也祿也賞也施也所尊所先者其尚者也所逺所後者其不尚者也夏道尊命先祿先賞近人而忠尚親者也事鬼敬神而逺之後威後罰不尚尊者也殷人尊神率民以事神先鬼先罰尚尊者也後禮後賞不尚親者也周人尊禮尚施賞罰用爵列近人而忠尚親者也事鬼敬神而逺之不尚尊者也夏尚忠忠者奉上故尊命殷尚質質者不欺故尊神周尚文文者多儀故尊禮逺鬼神而近人者謂外宗廟而內朝廷修蒸嘗而略盟詛也先鬼而後禮者謂外朝廷而內宗廟先盟詛而後祭享也賞罰用爵列者如刑不上大夫禮不下庶人賜君子小人不同日命夫命婦不躬坐獄訟之類雖主於文亦人情之近厚者所以親而不尊也先王之政茍無道以救之其末也不能無敝如清之末至於隘和之末至於不恭也忠之政使民近人而已不求其所不能知勸於為善而已不責其所不能為及其末也人不知進於學故守其顓蒙不困於刑罰故不為詐諼其民則憃而愚其風則喬而野其事則朴而不文也喬髙大也如厥木為喬之喬妄自髙大而無文乃憃愚之風也不必音為驕也忠之敝至於愚而野故殷人尊神而救之民知敬於鬼神則莫非誠也誠則質美尊神者使知敬於幽先罰者使知敬於明而已及其末也求神於虛無不可知之域則茫然不知其所安畏威於無所措手足之地則不知禮義之所貴故其民蕩而不靜其俗勝而無恥也質之敝尚鬼而逺人至於勝而無恥故周人尊禮以救之禮人文也人文之著則上下有等親疏有辨及其末也溺於文而不求其實拘於末而不返其本故其事則利而巧近人故茍利尚文故巧文其俗則文而不慙文勝質而不知義也其民則賊而敝不反其本故賊於其末不求其實故敝於虛文也此三代之本末可知矣嚴陵方氏曰禹誓師而使聽則其尊命可知殷紀年而曰祀則其尊神可知周服色皆尚赤則其尊禮可知命與禮皆所以近人率民以事神則非所謂近人矣先祿而後威者祿以養之猶或不善於是威之而使畏也先賞而後罰賞以勸之猶或不從於是罰之而使改也先鬼而後禮者鬼則教之在幽者禮則教之在明者幽以感之於內然後明以示之於外也先罰而後賞者罰以懲惡賞以勸善惡既懲而改然後善者可勸而進也賞以爵列則善者雖可賞而不僣於貴罰以爵列則貴者雖可罰而不同於賤夏殷皆有賞罰獨周用爵列者以其尊禮而尚文故也賞有用祿者而賞不止於祿威有用罰者而威不止於罰然則祿者賞之實賞者祿之名威者罰之體罰者威之用互相備也夫天下之禮始乎有成終乎有敝三代之政各有所尊方其所尊則是各有所成也始既各有所尊而終不免各有所敝矣故皆言民之敝焉然則民之敝也豈民之罪哉政使之然故也豈政之罪哉勢使之然耳故三代相承各有救敝之政焉使之通變而不倦新新而不窮也喬則亢野則簡內唯祿賞之為懷外無威罰之可避故朴而不文溺於鬼神之説故蕩惑而不能自靜以畏於威罰之嚴則僅勝而不知所恥利而巧者利其所得而巧有所求也文而不慙者唯事虛文之飾且無過實之慙也賊而蔽者以賞罰必有爵列故賤者或有賊仁之心貴者或有蔽賢之行雖然近人而忠夏與周之所同也而夏之敝則民喬而野周之敝則文而不慙何哉蓋夏之近人本乎尊命周之近人則本乎尊禮命之所制者簡故近人之敝喬而野禮之所飾者煩故近人之敝文而不慙其原既異其流亦不同馬氏曰夏道尊命至於親而不尊殷人尊神至於尊而不親周人尊禮至於親而不尊何也蓋命者令之於明而近人者也聖人尊之者所以敬授民時示其東作西成南訛朔易之事也神者相之於幽而逺人者也聖人尊之者所以致民報本反始之意也治人莫急於禮而人之所賴以生聖人尊之者所以辨上下定民之志也至於賞罰則賞所以勸有功罰所以懲有罪而賞罰不可以偏尚也古之人道德已明仁義已著然後賞罰可行則賞罰者非致治之先也然而夏道則先賞而後罰殷人則先罰而後賞周人則賞罰用爵列其所尚之不同者非不同也皆所以舉其偏補其敝而已夏承虞之後其世質其民淳故尊命命者近於人則近於人者皆以致其親也故事鬼神而逺之近人而忠焉其祿與威並則先祿而後威賞與罰並則先賞而後罰其後於仁則以所親者為隆故曰親而不尊言其親有甚於尊也殷承夏之後其民野故尊神神者逺於人則凡逺於人者皆有以致其尊也故率民以事神先鬼而後禮所以致其畏於幽也先罰而後賞所以致其畏於明也故尊而不親言其所尊有甚於親也周承殷之後其民鬼故尊禮尚施尊禮所以尚施者樂其發於外也故亦事鬼敬神而逺之近人而忠焉所以致其親也其賞罰用爵列者以尊卑為差也以意推之方其用賞同爵也則以爵之尊者為先方其用罰同爵也則以爵之卑者為先凡此所以優賢講義曰三代得天下以仁則夏殷周之建國其本與仁則無不同三王之道若循環則夏殷周之制治其出於道則無所異道非有異也救世之道不得不然夫子備陳三代始末以示後世俾有天下者知所以始而興之知所以敝而救之皆不外乎仁而已夏后氏承唐虞之道治唐虞之民政教明備風化純龎故尊其命令使知風教所自出為廟饗以事鬼使知世繫所自生為郊社以敬神使知本始所自報又推鬼神而逺之戒慢瀆焉至於治人則引而近之加忠厚焉是以祿在所先威在所後賞在所先罰在所後皆致忠厚之道故民視其上親而不尊及其末流之抗不及乎忠者憃塞而愚冥過乎中者喬亢而鄙野近乎中者質朴而不文殷人繼夏懲其民之敝而救之於是尊天地之神祗而率民敬以事之使知所畏懼而得以警其憃愚朴野矣鬼者神道所為禮者人道所尚先宗廟之饗而後人道之禮則以神道威之先肅其心而後加節文也賞以春夏所以行吾仁刑以以秋冬所以行吾義先秋冬之義而後春夏之仁則是以刑罰威之先齊其心而後加旌勸也故其視上也尊而不親及其末世禮不足以定志其民一意以惑於神故其敝至於放蕩以僥幸而不靜賞不足以勸善其民一意以逃其罰故其敝至於茍勝以求免而無恥此風俗之大敝也周人救殷民之敝故所尊者禮所尚者施尊禮尚施皆人道往來施報之常其於鬼也事之敬之而不敢慢然能推而逺之使兩不相傷焉於人則近而致其忠愛賞罰以用爵列以黜陟為懲勸故其民視其上也親而不尊逮及末世忠不足以崇本厚生而其民至於竒巧而趨利禮不足以歡欣交通而其民至於賊仁而自蒙蔽此周之敝也夫子陳三代盛衰繫道之興喪如此其著後世有為民父母之道者迹其敝而救之不為無所祖述憲章矣廬陵胡氏曰宗廟朝廷無非禮也先儒指禮為朝廷則周人尊禮亦指朝廷乎夏尊命殷尊神周尊禮三王所尊不同者時也非異道也緯説乃云夏立教以忠其失野救野莫若敬殷以敬其失鬼救鬼莫若文周以文其失蕩救蕩莫若忠如循環然周則復始此大謬也案夏周皆近人而忠則顯三代皆尚忠也夏周皆事鬼敬神殷亦立教以敬三代皆尚敬也子曰虞夏之文不勝其質又曰殷周之文至矣三代皆以文也然則雖各有敝而其道未嘗不同也子曰夏道未瀆辭不求備不大望於民民未厭其親殷人未瀆禮而求備於民周人強民未瀆神而賞爵刑罰窮矣鄭氏曰未瀆辭者謂時王不尚辭民不褻為也不求備不大望言其政寬貢稅輕也強民言承殷難變之敝也賞爵刑罰窮矣言其繁文備設孔氏曰上明三代尊親有異此經更明三代治民有異之事瀆謂褻瀆辭謂言辭未厭其親言民無困苦未厭其上下相親之心也周言強民以遭紂衰亂俗頑凶強人以禮義未瀆神謂祭祀有時未褻瀆也夏言未瀆辭則殷瀆辭矣殷言未瀆禮則周瀆禮矣周言未瀆神則周衰瀆神矣藍田吕氏曰夏道尚忠忠者以行而不以言故曰未瀆辭忠之俗衰行雖修猶不足以使人信故殷人始瀆辭矣瀆者如再三告之謂如盤庚三篇是也然殷人尚質雖辭之瀆而尚未以繁縟之文治之故曰未瀆禮質之俗衰辭雖瀆亦未足以取信於民故周人始瀆於禮矣分致其辨文致其詳欲驅而之善而責人也嚴大要教人以敬而已故禮先於祭祀至敬而不祈則強民未瀆神可知矣至周之末則信詛盟事祈禱其瀆神可知矣不求備者不責人之善故政令簡不大望者不竭人之忠故貢賦輕此民所以易從而未厭其親夏道所以未瀆辭者此也責人之信已必從而後已此殷人所以求備於民也周人強民驅之於善從之有爵賞不從有刑罰故爵賞刑罰窮矣嚴陵方氏曰前言殷人尊神矣至此乃言周人未瀆神何也蓋尊與瀆異而瀆神者由瀆禮之所致而已前言尊神而繼之以先鬼後禮則非瀆之所致可知矣此其所以異歟不求備者言其簡易不大望者言其寬恕未厭其親者民親之而不厭也其曰未厭則降此而求備大望於民有厭之者矣馬氏曰夏之時其民淳故君民者以得為在民以失為在己故無所求備不大望於民則民樂推之而不厭故曰未厭其親雖然不求備於民而有求之意不大望於民而有望之意所謂先祿而後威先賞而後罰此有求望之意殷人尊神於禮猶略故未瀆禮而求備於民者蓋有以正於己必有以正於人周人尊禮而禮者先王所以強世故曰周人強民雖尊禮而於事神之禮猶略故未瀆神方周之時比有長閭有胥鄉有大夫其政致詳其法致嚴而善惡無所逃於其間故爵賞刑罰極於此矣山隂陸氏曰夏道未瀆辭自盤庚視胤征可謂瀆矣未厭其親者慈孝未衰也殷人未瀆禮若周官蟈氏之屬可謂瀆矣周人強民未瀆神若春秋會盟可謂瀆矣子曰虞夏之道寡怨於民殷周之道不勝其敝子曰虞夏之質殷周之文至矣虞夏之文不勝其質殷周之質不勝其文鄭氏曰勝猶任也殷周極文民無恥而巧利後世之政難復也至矣言後有王者其作質文不能易之孔氏曰此總明四代質文之異虞夏政寬殷周文煩敝敗也至謂至極也虞夏之時雖有其文但文少而質多故文不勝其質殷周雖有其質亦質少而文多故不勝其文藍田吕氏曰虞夏之道質質者責人也略故寡怨於民殷周之道文文者責人也詳民之不從則窮刑賞以驅之故不勝其敝虞夏質之至者也故文不勝其質殷周文之至者也故質不勝其文至者無以加也後世王者欲尚質者無以加虞夏之質欲尚文者無以加殷周之文也三代所尚非茍為異亦各因時救敝而已繼周者未有以救之楊墨韓莊所以肆行於戰國也嚴陵方氏曰寡怨於民則知殷周之民其怨為多也曰不勝其敝則知虞夏之治僅能勝其敝而已且虞夏不曰無怨止曰寡怨何也蓋民之不能無怨也久矣祁寒暑雨天之所為也猶且怨之至矣者言其文質不可以復加也加乎虞夏之質則為上古之洪荒加乎殷周之文則為後世之虛華此其所以為至歟然虞夏非無文也特其文不勝質耳殷周非無質也特其質不勝文爾殷尚質而此以其文為至者蓋殷之文則存乎時殷之質則存乎人為其時之文故人尚質以救之而已若夫其道則瀆辭是其時之為文也其色則尚白是其人之為質也山隂陸氏曰寡怨於民所謂不求備不大望於民之效也鄭氏政寬貢稅輕也夫所謂不求備不大望豈特政寬貢稅輕而已殷周之道不勝其敝列莊之言蜂起乘此間也子言之曰後世雖有作者虞帝弗可及也已矣君天下生無私死不厚其子子民如父母有憯怛之愛有忠利之教親而尊安而敬威而愛冨而有禮惠而能散其君子尊仁畏義恥費輕實忠而不犯義而順文而靜寬而有辨甫刑曰德威唯畏德明唯明非虞帝其孰能如此乎鄭氏曰死不厚其子言既不傳位又無以豐饒於諸臣也恥費不為辭費出空言也實謂財貨也辨别也猶寬而栗也德所威則人皆畏之言服罪也德所明則人皆尊寵之言得人也孔氏曰此經特明虞帝之美已矣言後世之君雖有作者比之虞帝不可齊及之也生無私言序爵必以德子愛於民如父母愛子也愛民之志悽愴惻怛有忠恕利益之教君子謂虞朝之臣君聖臣賢是由舜而得然也所引甫刑今尚書以明堯德記者引以結舜德也河南裎氏曰或問後世有作者虞舜不可及何也子曰譬之於地肇開而種之其資育於物者如何其茂也久則漸薄矣虞舜當風氣未開之時又其德如此之盛宜乎後世莫能及也又曰如鳯凰來儀百獸率舞之事三代以降無此蓋綏之斯來動之斯和聖人之神化上下與天地同流者也藍田吕氏曰此章言三代之治其久必敝唯虞帝為不可及蓋用於民而主於德爾唯天為大唯堯則之蕩蕩乎民無能名若舜則事堯者也所以治民之道可得而言故後之言治者所以稱舜而不及堯也然則舜之治及堯之治堯不自治而已故曰後世雖有作者虞帝弗可及也已大道之行也天下為公人不獨親其親不獨子其子財不必藏於己力不必為己公之至也故不厚其子而人無間言天下莫能爭俗薄道衰禹湯文武不得盡其願欲此孔子所以深歎以虞帝為不可及者也三代之道或親而不尊或尊而不親不免流於一偏故其終不能無敝若虞帝則子民如父母有母之親故有憯怛之愛有父之尊故有忠利之教所謂憯怛之愛猶慈母之愛非責報於其子也非要譽於他人也發於誠心不知其他而已所謂忠利之教者如飽食暖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫如窮而變變而通作為衣裳舟楫臼杵弧矢宫室棺椁書契所以使天下利用而不倦是皆有教民以義善之誠無所不利之功者也安而敬威而愛愛則能安教則知敬親則愛尊則威也富而有禮者節於物者也惠而能散者周於物者也節於物義也周於物仁也尊而有教義也親而有愛仁也此君子所以尊仁畏義也所謂君子貴者也賢者也有道之世唯賢者得在髙位所謂小德役大德小賢役大賢故謂之君子也富而有禮故恥費恐用之不以道惠而能散故輕實蓋不必藏於己也實之為言財貨之謂也費則費用其財而已愛之至則必忠忠至於犯則不敬敬之至則有義以一義斷或入於不順則不愛敬主於别别則文文煩則不靜愛主於恩恩則寬寬而踰則無辨故忠而不犯義而順文而靜寬而有辨皆尊仁畏義親而尊之之道也行此道而天下敬之則德威也行此道而天下愛之則德明也故尊親之道一主於德並行而不廢則天下莫不尊親矣故甫刑曰德威惟畏德明唯明非虞舜之盛德孰能至於此乎馬氏曰虞帝弗可及言其於時後世繼之者為難能也三代之道或親而不尊或尊而不親未若虞帝親而尊者亦時而已寬裕以有容則善惡無乎不容也而容之中有辨焉故曰寬而有辨延平周氏曰孟子曰天與賢則與賢天與子則與子又曰其子之賢不肖皆天也是舜之所以生無私死不厚其子者順天而已矣自其有憯怛之愛而至於惠而能散者特舜之粗迹耳果舜之極致則惠而能散不足以言自其君子尊仁畏義而至於寬而有辨者特舜之德廣耳果舜之道化則其止於君子者哉嚴陵方氏曰帝則公天下故曰生無私以其傳於賢故曰死不厚其子有憯怛之愛有忠利之教愛之則親教之則尊故曰親而尊親而有所尊故安而敬尊而有所親故威而愛敬故富而有禮愛故惠而能散由是君之化之而尊仁安義以至於寬而有辨也富而有禮則無驕奢之患惠而能散則無偏黨之私仁者天下之表故在所尊義者天下之制故在所畏恥費則奉己有節輕實則與人無吝忠所以抗節常失於犯上義所以立我常失於忤物文則常失於妄動寬則常失於大雜兼父之尊母之親故能並行而無偏敝也非有威明之德其能若是乎故引書之言以證之然自尊仁畏義而下止稱君子則以在位者言之也山隂陸氏曰有憯怛之愛仁也有忠利之教義也其教之也非以罔之將以忠之也非以害之將以利之也親失之不尊安失之不敬威失之不愛故子溫而厲威而不猛恭而安富失之驕惠失之不吝若子産乘輿濟人於溱洧是也恥費則重實忠則犯仁而順質而靜隘而有辨亦常物之大情也凡此一節舜之威德也以書結之以此以威易畏重言舜也金華應氏曰自庇民大德而下凡四章言臣道之難於盡仁惟舜禹文王周公可以為仁之厚而后稷庶幾其近之自豈弟君子而下凡三章言君道之難於盡仁惟虞帝可以為德之至而夏商周亦未免有偏也蓋仁道之大如此君子可以其難而不自勉乎髙山仰止景行行止終其身焉可也子言之事君先資其言拜自獻其身以成其信是故君有責於其臣臣有死於其言故其受祿不誣其受罪益寡子曰事君大言入則望大利小言入則望小利故君子不以小言受大祿不以大言受小祿易曰不家食吉鄭氏曰資謀也獻猶進也言臣事君必先謀定其言乃後親進為君言也死於其言竭力於其所言之事死而不負也於事不信曰誣大言可以立大事也小言可以立小事也入謂君受之利祿賞也大祿小祿言臣受祿各用其德能也易大畜彖曰不家食吉養賢也言君有大畜積不與家食之而已必以祿賢者賢有大小祿有多少孔氏曰自此至辭欲巧廣明君子事君之道及君子之行須內外相副成其信者先謀後見成其言之信實言善乃受祿是受祿不誣罔也小言受大祿則臣濫大言受小祿則君重財而薄德也橫渠張氏曰大言入則望大利利非歸己之利大言入則吾道可大行是大利也小言入則可小利藍田吕氏曰此言事君之道其始見也必知君之所以見任之意如伊尹事湯知湯以伐夏救民為己任此先資於湯之言也曰吾豈若使是君為堯舜之君使是民為堯舜之民思天下之民匹夫匹婦有不被堯舜之澤者若已推而內之溝中此拜自獻其身於湯之事也如傅説之事髙宗髙宗命之曰若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨俾率先王迪我髙后以康兆民又曰罔俾阿衡專美有商此先資於髙宗之言也説復於王曰木從繩則正后從諫則聖后克聖臣不命其承敢不祗若王之休命又拜稽首曰敢對揚天子之休命此拜自獻其身以成其信者所謂策名委質二乃辟也所謂君能制命為義臣能承命為信義無二信信無二命者也君是以責臣之任臣是以死君之命自任以重則受祿不誣有死無二則受罪益寡矣昔晉荀息受責於晉獻公以立奚齊卓子告於獻公曰使死者復生生者無愧及里克殺奚齊卓子荀息死之可謂死於其言矣荀息之事雖於義未之盡然臣之死命必如荀息而後可以言信矣大言入則望大利小言入則望小利大言則所言者大也小言則所言者小也利及天下澤及後世大利也進一介之善治一官之事小利也諌行言聽利斯從之矣先儒謂利祿賞也人臣之事君大言小言各效其忠而已如言之入而遂望其祿賞則懷二心以事上主於為利而已小人之道非所以事君也所謂不以小言受大祿不以大言受小祿此君之所以報臣者非臣之所以望君也受之以義亦稱其大小而已小言而大祿則報踰其分大言而小祿則君不我知亦不可受非其義而已易曰不家食吉此大畜之彖辭也君之所以大畜者將以祿天下之賢賢有小大則祿有多寡一有不稱則好惡之私繫焉人君而存好惡之私則猶家食而已非所以為天下公也故曰不家食吉養賢也延平周氏曰孔子使漆雕開仕曰吾斯之未能信孔子説蓋學之未能自信必未能取信則事君能成其信者未之有也事君者既資其君之言而獻其己之身則君有以責成於下而下有以死於言唯其有以責成於下則下非尸祿者也故曰其受祿不誣唯其有以死於言則下非有罪者也故曰其受罪益寡大利於民則受大祿而不以為有餘小利於民則受小祿而不以為不足嚴陵方氏曰先資其言者先以言為之資也獻其身將以行其言也能行其言故足以成其信拜謂受其命也獻謂效其能也君無為也故有責於臣臣有守也故有死於其言臣能任責則非尸祿者矣故受祿不誣臣能效死則非有罪者矣故受罪益寡人亦或以忠獲罪此所以不言無罪止言益寡而已有言者則必行其事有祿者則必居其利小言而受大祿則所行之事小不足以稱其位之大大言而受小祿則所居之位小不足以行其事之大事不足以稱其位而受祿者是尸利而已非所謂重義也位不足以行其事而受祿者是枉已而已非所謂伸道也長樂劉氏曰資取也謂君先取其言以為可用也然後有仕而臣之之心乃拜而尊之以為君而自獻其身所以致臣節示死於國事故曰以成其信也講義曰舜典於羣后四朝之後則曰敷奏以言益稷於惟帝時舉之後則曰敷納以言言之不可已也如此拜自獻其身以成其信者君先取臣言以為可用然後有臣之之心乃拜而尊之如賢能之書王冉拜受之賢能之書特名籍爾猶且拜之况資其言之善者乎書曰禹拜昌言曰俞孟子曰禹聞善言則拜是矣如是而後使之自進其身以為之臣則其言之信可以成矣然進言非難也能使其言必入而聽焉斯為難矣興利非難也能使其利可望而行焉斯為難矣故君子不以小言受大祿恥其祿浮於言而尸利也不以大言受小祿懼其言浮於祿而屈道也然則近之於身欲其言與祿相稱逺之於民欲其言與利並行事君之道非君子其孰能與於此山隂陸氏曰拜自獻其身以成其信若荀息者似之矣故曰君子不食其言矣雖死人之事不能救其君之死於其受祿則不誣語其無罪則未也大言入則望大利小言入則望小利言各隨其言望利澤以及民不以小言受大祿不以大言受小祿言亦隨其利之及民小大受祿馬氏曰君子進思盡忠而盡忠之言不可以不前定故曰事君先資其言資之猶言謀也能前定其言然後自獻其身進而為君言也臨言而擇未必見信而言之前定則有以成其信少儀所謂量而後入不入而後量也大言入則望其大有利於其國小言入則望其小有利於其國望猶言庶幾也孟子所謂豫日望之之意也金華應氏曰資慿籍也古之君子其經世之學皆豫定於胸中至其事君則前定之規摹先形於言以為藉手而委身以成其信自獻者非屈身以求售也如書之自靖自獻故受命而無所愧也畎畝翻然之數語説命對揚之三篇此伊傅先資之言也威公問答而為書昭王命之而有對此管樂先資之言也言之於先而行之於後無一不酬者後世若登壇東向之答草廬三顧之策亦庶幾焉子曰事君不下達不尚辭非其人弗自小雅曰靖共爾位正直是與神之聽之式穀以女子曰事君逺而諫則讇也近而不諫則尸利也子曰邇臣守和宰正百官大臣慮四方子曰事君欲諫不欲陳詩云心乎愛矣瑕不謂矣中心藏之何日忘之鄭氏曰不下達不以私事自通於君也不尚辭不多出浮華之言也弗自不身與相親靖治也爾汝也式用也榖祿也言敬治女位之職事正直之人乃與為倫友神聽女之所為用祿與女尸利尸謂不知人事無辭讓也邇臣邇近也和謂調和君事者也宰冢宰也冢宰主治百官陳謂言其過於外也瑕之言胡也謂猶告也孔氏曰所引小雅小明刺幽王之詩大夫悔仕亂世戒其未仕者記者斷章取義證明非善人不與之友也逺而諫謂與君疏逺強欲諫爭則是讇佞之人望欲自達祭祀之尸無言辭而受享祭近臣不諫如尸之受利也邇臣謂親近之臣獻可替否毗贊於君以調和其事大臣謂二伯州牧此大臣亦兼冢宰但冢宰居中故言正百官耳所引詩小雅隰桑刺幽王之詩君子在野詩人念之云心乎愛此君子矣瑕逺也謂勤也言君子逺離此不勤乎藏善也言善此君子也此詩本文今記人引瑕不謂矣言何不以事告陳於君也藍田吕氏曰以下達之事事其君則賊其君者也尚辭而實不稱則欺其君者也非其人而自達之枉已以事君者也傳曰君子上達小人下達上達者進乎髙明如伊尹恥其君不及堯舜孟子非堯舜之道不敢陳於王前者也下達者趨乎汚下如孟子言謂吾君不能謂之賊者也又曰逢君之惡其罪大者也自者所由以為主者也觀近臣以其所主觀逺臣以其所為主彼謂孔子主癰疽與侍人瘠環者非其人而自為之也三者皆枉已不正非所謂靖共正直者也人臣敬治其職所與正直則神將福之况於君乎事君逺而諫則讇也近而不諫則尸利也古之天子有爭臣七人諸侯五人是有言責者也有言責者不可不諫不得其言則去無言責者則可以諫可以無諫不得其言不必去矣至於逺臣既無言責又逺於君有官守之責而諫非其責也所謂逺者逺臣也非其職而諫之陵節犯分以求自達故曰讇也所謂近者有言責之臣也有言責而不諫則曠厥官懷祿固寵主於為利故曰尸利也尸主也猶祭祀之尸有所主而無所事書云羲和尸厥官罔聞知其義同此雖然古者史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗商旅議于市百工獻藝皆若逺而諌者蓋上之人所求於下者如此則下可以共職而有言不可謂之讇矣潁封人之諫鄭莊公杜蕢之諫晉平公亦逺而諫者然若二子者君子與之蓋有封人杜蕢之心雖諫而可無封人杜蕢之心則讇也邇臣守和宰正百官大臣慮四方邇臣近臣也如左右常伯常任準人綴衣虎賁之類宰即冢宰大臣六卿也近臣者在君左右不任其政與天子燕遊者也主於朝夕納誨調和君子和而不同若作和羮濟之以鹽梅五味則得其和而可食如以水濟水孰能食之故君所謂可而有否焉君所謂否而有可焉可否相濟則君德和故曰邇臣守和宰之為言殺也因以名言饔官焉饔官主割烹者也既殺而烹之解剝制割皆出其手宰制政事者亦然故主家政者為家宰主國政者為國宰所以宰制百事總正官屬故曰宰正百官六卿分掌國政任天下之事與國同其憂者也巡守朝聘所以交結維持使四方無虞當任其責也莫非臣也莫非事也三者之官其責為重故厯言之事君欲諫不欲陳者書所謂爾有嘉謀嘉猷則入告爾后于內爾乃順之於外曰斯謀斯猷惟我后之德臣之事君所以告其君則有犯而無隱所以告於人則隱惡而揚善宋平公築臺妨於農收子罕諫弗許築者謳之子罕聞之親執朴以行築者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役則其愛君之心可知矣詩云心乎愛矣遐不謂矣中心藏之何日忘之此小雅隰桑詩刺幽王小人在位君子在野思見君子之辭也此則斷章取義以心愛矣為愛君之心有以告之矣愛之之誠藏於心而不忘此所以欲諫而不欲陳也樂毅報燕惠王書曰吾聞之古之君子交絶不出惡聲忠臣去國不潔其名非有是心能之乎馬氏曰事君不下達者不以淺者近者達於君也孟子曰我非堯舜之道不敢陳於王前此不下達之意言之必可行而不以辭為尚故不尚辭所與者不可以非其人正直是與可也故引詩以結之言邇則對逺言大則對小冡宰可以兼邇臣而邇臣蓋不止於冡宰凡謂近於君者皆謂之邇臣也言冡宰則可以兼大臣而大臣亦不止於冡宰凡處於百辟之上者皆謂之大臣也橫渠張氏曰邇臣守和和平其心以備顧對不可徇其喜怒好惡嚴陵方氏曰逺而諫似忠而非忠秪以為讇爾近而不諫似慎而非慎秪以為利爾邇臣過於和則流而為同不及於和則乖而為異守則適中而無過不及之患謂之邇臣則以守和為事謂之宰則以正百官為事謂之大臣則以慮四方為事孟子謂陳善閉邪謂之敬故諫不欲陳陳之則是暴君之過矣然事君有犯無隱則陳之矣蓋諫之不從不得已而後陳焉然則陳者非所欲也故以不欲言之石林葉氏曰逺於君則見之略諫則為佞近於君則見之詳諫則不為素餐素餐則尸利也邇臣則三公四輔也坐而與王論道有所可有所否故守和冡宰天官也羣吏廢置所自出故正百官大臣則牧伯也諸侯蕃衛所自出故慮四方金華應氏曰鹽梅麯糵弼諧於上塤箎金石協恭於下邇臣之和也表端而影正綱正而目舉宰之正也事幾眇綿瞭如在目民瘼幽隱慘如切膚大臣之慮也宰以職言大臣以位言自三公以下皆是不特六卿其序則先君德而後朝廷先朝廷而後天下也禮記集説卷一百三十九
