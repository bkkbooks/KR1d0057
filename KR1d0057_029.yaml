body:
  text: 禮記集説卷二十九宋衛湜撰天子無事與諸侯相見曰朝考禮正刑一德以尊於天子天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯未賜圭瓉則資鬯於天子鄭氏曰事謂征伐柷鼗皆所以節樂將謂執以致命瓉鬯爵也鬯秬酒也得其器乃敢為其事孔氏曰此一節論諸侯朝天子天子賜之事朝謂常朝雖四時而來朝朝是總名也諸侯相與朝王之時考校禮儀正定刑法専一道德以尊崇天子不言樂者禮中兼之凡與人之物置其所與大者於地執其小者以致命於人將行也謂執以行命案漢禮器制度柷狀如漆筒中有椎將作樂先擊之鼗如小鼓長柄旁有耳搖之使自擊柷之節樂節一曲之始其事寬故以將諸侯之命鼗所以節一唱之終其事狹故以將伯子男之命賜弓矢謂八命作牧者宗伯注云謂侯伯有功德者加命得専征伐此謂征伐當州之內若九命為二伯則得専征一方五侯九伯也若七命以下不得弓矢之賜則尚書大傳所謂以兵屬於得専征伐者此弓矢則尚書彤弓一彤矢百盧弓一盧矢百於周禮則唐弓大弓合七而成規者賜鈇鉞則謂上公九命者賜鈇鉞然後得専討晉文侯雖受賜弓矢不受鈇鉞不得専殺故執衛侯歸之於京師賜圭瓉亦謂上公九命者若未賜圭瓉則用璋瓉鬯者釀秬黍為酒和以鬱金之草謂之鬱鬯不以鬱和則直謂之鬯而已臨川王氏曰疏言晉文不受鈇鉞不得専殺然鄰國有此大惡雖不受鈇鉞冝亦得討殺之長樂劉氏曰天子無征伐之事而與諸侯相見曰朝者五載一朝四時更至也因其朝而較其治否故考禮以觀其用中無過不及也正刑以觀其用法有義不義也一德以觀其所執有中不中也三者皆協於中則不失乎為邦之道足以尊天子庇萬民矣於是天子賜之樂所以崇其德也諸侯之樂則將之以柷者軒縣之器備則其作也以柷先之伯子男則將之以鼗者軒縣之器不備則其作也以鼗先之必持所先以致天子之命而衆器從焉古之道也長樂陳氏曰周官凡諸侯之邦交嵗相問也旅相聘也世相朝也若夫天子無事則與之相朝不特以世而已考禮所以杜其僭僻正刑所以防其淫暴一德所以同其趨向如此則禮刑正而無異政之國道德一而無異教之民此尊天子之道也書曰睦乃四鄰以蕃王室此之謂也春秋書滕侯薛侯來朝榖梁曰天子無事與諸侯相朝正也考禮修德所以尊天子也其言蓋本諸此獻車馬者執䇿綏獻甲者執胄皆以其所先者將之也下之獻上如此則上之賜下亦如之書曰下管鼗鼓合止柷敔是下管合樂則擊柷也周禮小師掌教鼗鼓柷敔瞽矇掌播鼗柷敔視瞭掌凡樂事播鼗擊磬是擊柷者必播鼗播鼗者不必擊柷也傳曰能征不義者賜以弓矢能誅有罪者賜以鈇鉞孝道備者賜之以秬鬯賜弓矢然後征賜鈇鉞然後殺則天下無異法賜圭瓉然後為鬯則天下無異禮命之教然後為學則天下無異教山隂陸氏曰相見主言天子見與不見在天子也考禮正刑一德主言諸侯固諸侯之事也石林葉氏曰諸侯四時見於天子其禮雖不同合而言之皆朝也諸侯自相見亦曰朝者猶之公侯伯子男皆謂之君不害其同名也古者四時之朝皆有常期唯王有巡守征伐之事也則有時見殷見之禮非此則遣卿大夫士以聘問於王方其朝覲會同則所謂無事也先王於無事之時猶以為憂禮所以辨上下定民志一失名分則為亂故曰考禮刑所以詰姦慝刑暴亂一過用法則為虐故使之正刑德所以先身而化民不齊則疑衆駭俗故使之一德諸侯朝而三者備莫不知協力以尊天子此先王之所以能守成功也雖然於考禮而不言樂於正刑而不言政於一德而不言道何也蓋樂自上賜政自上出道自上揆非諸侯所得専而禮刑也下所執守德也己所自修於禮能考則樂達而可廣也於刑能正則政成而可報也於德能一則道行而可以同俗也堂上之樂以柷將之故賜諸侯堂下之樂以鼗將之故賜伯子男書曰下管鼗鼓合止柷敔何也蓋戛擊鳴球搏拊琴瑟以詠舜所以治神人作於堂上者也鼗鼓柷敔笙鏞以間所以治鳥獸作於堂下者也堂下之樂為卑以鼗將之未必有柷堂上之樂為尊以柷將之亦必有鼗至於方伯則不特賜樂而已賜弓矢鈇鉞使之得征殺也賜圭瓉使之得為鬯也蓋征者上伐下之辭敵國不相征馬氏曰春朝夏宗秋覲冬遇皆所以為朝也禮與刑天子之所出而諸侯則謹其法而已所謂一德者使之同謀協慮而不敢有二心也凡此皆所以尊於天子征與殺先王所以致天討弓矢鈇鉞皆先王之所以致天討之器諸侯必俟天子之賜然後得以征伐者蓋臣無有作威而所用則唯君之所賜而已以征對殺則殺為重以弓矢對鈇鉞則鈇鉞為重諸侯之出討有罪未賜鈇鉞而有所不敢殺則亦征之而已記曰獻莫重於祼傳曰禘自既灌而往者吾不欲觀之矣則是鬯為禮之至也孔子亦曰鬯者敬之至也以鬯為敬之至則天子未賜圭瓉則諸侯有所不敢也雖然宗廟之禮不可廢未賜圭瓉則資鬯於天子而所用者璋瓉而已延平周氏曰考禮正刑言其在外者一德言其在內者出禮則入刑出刑則入德故其序如此禮非諸侯之所可制者衆矣獨以鬯為言者僭莫僭於祭鬯者九獻之首而芬芳下達於淵泉為諸侯者其道足以首出於一國而其德足以下達然後賜以圭瓉使自為鬯不爾則資鬯於天子示其所以事神明者不足於己而有待於上也嚴陵方氏曰考禮者考天子之禮而行之也正刑者正天子之刑而用之也行天子之禮則禮樂自天子出矣用天子之刑則征伐自天子出矣禮樂征伐皆出自天子則諸侯豈有異心者哉故能一德以尊於天子也夫朝所以明君臣之禮正尊卑之位而已故言朝則以尊天子繼之柷鼗皆所以合樂而為之始也以樂之始者將之則樂之終者從之矣凡欲省而不欲煩故其所將者如此是禮也言侯伯子男而不言公者於侯言諸則公在其中矣弓矢利以用於逺鈇鉞利以用於近征者以行於逺為主故賜弓矢然後得専征殺者以制於近為主故賜鈇鉞然後得専殺鬯即秬鬯也秬黍一稃二米和氣所生以為酒曰鬯以其至和之氣鬯焉故也資言取彼以利此李氏曰先王之制器無非隂陽之理也凡聲陽也隂陽有時而通因用隂以招陽方者陽之象也柷方而二尺四寸以為廣三八之數也尺八寸以為深三六之數也陽成於三而八六少隂老隂之數以陽之成必隂所以合樂也天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫鄭氏曰學所以學士之宫尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊此小學大學殷之制辟明也雍和也所以明和天下頖之言班也所以班政教也孔氏曰此一節論天子命諸侯立學及學名之事此是殷制故鄭氏引書傳明之若周制則司馬法云天子畿內千里百里為郊聘禮注云逺郊上公五十里侯伯三十里子男十里近郊各半之知者以書序君陳分正東郊注云東郊周之近郊蓋五十里今河南洛陽相去則然以天子近郊半逺郊則知諸侯亦然鄭知小學大學殷之制者以下文云殷人養國老於右學養庶老於左學則左學小右學大此經云小學在公宫南之左故知殷制也周則大學在國小學在西郊下文具也釋詁云辟君也君則尊明鄭注云明和天下者謂使天下之人習學於此悉皆明達諧和也頖是分判之意故為班案詩注云築土雍水之外圎如璧注又云頖之言半以南通水北無也二注不同者此注解其義詩注解其形也橫渠張氏曰此小學是教國子胄子之幼小者未能入大學則其學在宫之左右此言大學在郊非天子諸侯所視之大學所視之大學必在國中無有在郊之理此大學即郊學也對小學而言大爾非國子胄子俊造所居但國之設學校必欲均故於四郊為之立學學者之就學無甚逺之差也逺郊近郊必各有學但以井邑多少地里近逺而設必處其均郊學則鄉遂大夫教之國中大學則天子諸侯所自視者也郊學雖非俊造國胄之所居亦有時而往如行禮於其間使不帥教者觀之辟雍周天子之學也頖宫周諸侯之學也辟雍之制必是水中心為辟雍環水之外四面者四學也故言東序西序辟雍最尊處中必禮先聖先師於其間故言臨雍拜老漢禮猶然周以前四學之內無水亦必無辟雍厯代或尚左或尚右置瞽於其間則謂之瞽宗説禮者見頖宫周學也遂以為天子之學此又錯亂也長樂劉氏曰大國三卿次國二卿則其所有之民未始不教之以五品之道故明於五刑以弼五教唐虞尚之矣奚俟於天子之命哉此經謂立小學大學於國以登其鄉之賢能養而成之薦之於王以為士大夫也此所謂天子命之教者乎長樂陳氏曰夫諸侯之學小學在內大學在外故王制言小學在公宫南之左大學在郊以其選士由內以升於外然後達於京故也天子之學小學居外大學居內故文王世子言凡語于郊逺之於成均取爵於上尊以其選士由外以升於內然後達於朝故也明堂位曰米廪有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也頖宫則泮水也其制半於辟雍而水蓋闕於北方也諸侯樂縣闕其南而泮水闕其北者闕南而存北所以便其觀也闕北而存南所以便人之觀也頖宫大學也魯之大學在郊故將有事於上帝則於之先有事焉然則序與瞽宗蓋亦設於頖宫之左右而米廩其公宫南之小學歟餘見後有虞氏養國老於上庠説禮書嚴陵方氏曰命之教然後為學所以一道德也言小學在左則以見大學之在右言大學在郊則以見小學之在國小學所以處學之小者大學所以處學之大者若灑掃應對之類則小學之道也若致知格物之類則大學之道也小學之道方生而進大學之道已成而定方生而進者冝養之於內已成而定者可達之於外故或在國或在郊者以此為制也非特諸侯為然雖天子亦然舉小以見大也必在宫之南者即文明之方故也然以虞殷之制言之則如此或謂諸侯之大學在郊小學在國蓋選士由內以及外理或然也以夏周之制言之則如此謂之大學小學則天子諸侯之所同謂之辟雍頖宫則天子諸侯之所異同焉者道也異焉者制也以義言之辟主法言其立於禮雍主和言其成於樂天子之為學所以教天下者如斯而已諸侯之為學亦莫不以禮樂教之然其為教也視天子為未全故以頖言之曰宫則以有堂室奧阼處學者故也言諸侯之處學者如此則天子可知山隂陸氏曰據此天子大學蓋在郊矣先儒謂周置師保之官居虎門之側則學非一處也以豫考之虎門之側正在王宫南之左其小學與盛德篇曰明堂者所以明諸侯之尊卑也外水曰辟雍然則明堂在國之南大學又在明堂外與靈臺同處蓋相望也尚書大傳曰古之王者必立大學小學公卿大夫元士之適子十有三年始入小學則小學在國中為冝故小學在王宫南之左大學在郊其在東郊西郊又非此學也經曰周人養國老於東膠養庶老於虞庠虞庠在國之西郊案天子養三老五更於大學養國老於東膠養庶老於虞庠合而養之又在東序文王世子曰適東序釋奠於先老遂設三老五更羣老之席位焉是也又新書曰五帝大學謂之成均三王大學謂之辟雍經天子曰辟雍董仲舒曰成均五帝之學是也蓋以天道設教者五帝也故大學曰成均以人道設教者三王也故大學曰辟雍天任道故於學言成人任法故於學言辟天任理故於學言均人任情故於學言雍也然五帝三代又各以所尚為大學之别名虞氏尚孝故云米廩夏后氏尚功故謂之序殷人尚聲故謂之瞽宗至周人則其文備矣故兼四代之學而言之天子謂之辟雍諸侯謂之頖宫不别名者以示與三代共之也故詩曰鎬京辟雍而明堂位曰頖宫周學也天子之大學在國小學在郊故下云周人養國老於東膠養庶老於虞庠虞庠在國之西郊是也諸侯之大學在郊小學在國此經小學在公宫南之左大學在郊是也詩之泮水曰無小無大從公于邁言邁則泮宫在郊明矣天子之大學在國者言流化欲自內出以及於諸侯諸侯之大學在郊者言流化欲自外入以接於天子也此説天子大學與前抵牾與陳氏方氏合臨川王氏曰古之教法德則異之以智仁聖義中和行則同之以孝友睦姻任恤藝則盡之以禮樂射御書數淫言詖行詭怪之術不足以輔世則無所容乎其時而諸侯之所以教一皆聽命於天子天子命之矣然後興學命之厯數所以時其遲速命之權量所以節其豐殺命不在是則上之人不以教而為學者不以道也士之奔走揖遜酬酢笑語升降出入乎此則無非教者髙可以至於命其下亦不失為人用其流及乎既衰矣尚可以鼓舞羣衆俱有以異乎後世之人故當是時婦人之所能言童子之所可知有後世老師宿儒之所惑而不悟者也武夫之所道鄙人之所守有後世豪傑名士之所憚而愧者也堯舜三代從容無為同四海於一堂之上而流風遺俗咏嘆之不息凡以此也又曰天下不可一日無教學不可一日廢於天下王制所謂命之教然後為學者何也曰學固不可一日無於天下然其教不可不資之天子資之天子道德所以一也命之教然後為學禮乎曰立諸侯矣未有不命之教而不得立學也蓋古之立國也必資禮於天子所謂命之教矣天子將出征類乎上帝冝乎社造乎禰禡於所征之地受命於祖受成於學出征執有罪反釋奠于學以訊馘告鄭氏曰禡師祭也為兵禱其禮亦亡受命於祖告祖也受成於學定兵謀也釋菜奠幣禮先師也訊馘所生獲斷耳者詩曰執訊獲醜又曰在頖獻馘馘或為國孔氏曰此一經論天子出征所祭之事釋天云是類是禡師祭也爾雅多為釋詩然類不皆為師祭但以事類告天若以攝位事類告天謂之類以巡守事類告天亦謂之類古尚書説非時祭天謂之類肆師注云為師祭造軍法者禱氣勢之增倍其神蓋蚩尤或曰黃帝也受命於祖謂出時不敢自専有所稟承祖禰皆告以祖為尊故特言祖即前文造乎禰也但前據告行此據以征伐之事故云受命然則受命於祖在造乎禰之前但前文類帝冝社禡於所征之地總説出行之時然後却本初時受命受成之事所以文倒也受成於學謂在學謀論兵事好惡可否其謀成定受此成定之謀於學也出師征伐執此有罪之人還反而歸釋菜奠幣於學以訊馘告先聖先師也訊言也是生而可言問者馘是死而截耳者釋菜奠幣案大胥職云春入學舍菜合舞文王世子云釋菜鄭注云釋菜禮輕也則釋菜唯釋蘋藻而已無牲牢幣帛文王世子又云始立學者既興器用幣注云禮樂之器成則釁之又用幣告先聖先師以器成此則徒用幣而無菜亦無牲牢也文王世子又云凡始立學者必釋奠於先聖先師及行事必以幣是釋奠有牲牢幣帛無用菜之文也熊氏以此為釋菜奠幣者獻俘馘之禮也是牲牢菜幣皆有之注云釋菜解經中釋字奠幣解經中奠字也又禮先師不云祭則似但有菜幣未必有牲牢也於事有疑未知孰是釋奠皆告先聖先師此直云先師文不具耳執訊獲醜小雅出車篇在頖獻馘魯頌泮水篇長樂陳氏曰造乎禰則造於祖可知受命於祖則用命於社可知受成於學則謀始於朝可知類冝造禡先後之次受命受成尊卑之次訊者問以言馘者截其耳釋奠於學而告之者以學者文德之地征者威武之事於其文德之地告以威武之功以明用武以文任威以德而已此僖公所以在頖獻馘而國人頌其允文允武也訊馘之所告非不及廟社以其因言辟雍頖宫之事故特稱告學而已又曰周官言貉詩與禮記爾雅言禡其實一也貉之祭蓋使有司為之而立表於陳前肆師為位甸祝掌祝號既事然後誓衆而師田焉周官所謂表禡誓民是也古者將射則祭侯將卜則祭先卜將用火則祭先爟將用馬則祭馬祖然則將師田而貉祭者不特為禱而已也類冝造解見前嚴陵方氏曰自造乎禰而上則凡出之時所同也故前於天子將出亦以出言之自禡於所征之地而下則惟征之時所獨也故此於天子出征然後言之夫天子出其禮如此則萬乘之尊一人之貴不可輕舉妄動故也禡必於所征之地者以見其臨事而懼也生致之而可以問其罪曰訊死致之而效其左耳曰馘所以告成功也禮先聖先師而以成功告之則以功成乎材而材成乎學故也延平周氏曰受命非不於禰也以稟於尊者為主受成非不於朝也以謀於衆者為主訊馘之所告非不及廟社也以受成者為主馬氏曰既曰造乎禰又曰受命於祖何也蓋天子之出征必先造乎禰而後受命於祖者示其不敢留尊者之命也受成於學者受成謀於學也資之於學然後行則所謀必當所出必有功有功則不可以不報故出征執有罪反釋奠於學此所以報之也山隂陸氏曰於上帝為類則於禰雖直前可也不言祖以此該之有所告而之焉謂之造於其所征罵焉謂之禡罵若武成所謂告于皇天后土所過名山大川曰今殷王受無道暴殄天物害虐蒸民之類臨川王氏曰受命於祖此即載主而受命用命賞于祖是也上已造乎禰疏云即是造禰非也李氏曰師出則受命於祖遂奉命以出曰用命賞于祖是也師還則受成於學詩曰矯矯虎臣在頖獻馘是也雖然先王之所謂成者非特克敵而後謂之成也六月之詩言北伐亦曰既成我服此所謂成者武之成而已訊辭之未從者也蓋小人之智不足以知君子馘斷其耳以其無聞也先王之執有罪以其無聞無知而已天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖無事而不田曰不敬田不以禮曰暴天物鄭氏曰三田者夏不田蓋夏時也周禮春曰搜夏曰苗秋曰獮冬曰狩乾豆謂臘之以為祭祀豆實也庖今之厨也不敬者簡祭祀略賔客孔氏曰自此至覆巢一節論天子以下田獵之事無事謂無征伐出行喪凶之事則一嵗三時田獵獵在田中又為田除害故稱田也夏則生養之時夏禹以仁讓得天下又觸其夏名故夏不田鄭此注取春秋緯運斗樞之文周禮春曰搜以下大司馬職文又鄭釋廢疾云嵗三田謂以下乾豆三事為田也然當以此經注為正豆實非脯而云乾者謂作醢及臡先乾其肉故云乾豆是上殺者也二為賔客中殺者也三充君庖下殺者也案榖梁桓四年范寧云上殺中心死速乾之以為豆實次殺射髀骼死差遲故為賔客下殺中腸汙泡死最遲故充庖厨又車攻毛傳云自左膘而射之達於右腢為上殺射右耳本次之射左髀達於右䯚為下殺是亦有三等之殺先宗廟次賔客尊神敬賔之義田不以禮殺傷過多暴害天所生物以禮田則下文是也長樂陳氏曰搜苗獮狩必法於田故皆謂之田田有三禮故謂之三田則猶祭八神謂之八蠟也田必於無事之時則異夫好田獵畢弋不修民事與喪搜者也乾豆所以祭祀祭祀而後賔客賔客而後充庖此頤卦先所養而後所自養之意也祭祀賔客以上殺次殺充庖以下殺厚所養而薄所自養也周官大宰之九式先祭祀賔客之式而後羞服內饔先祭祀燕飲之割亨而後羞膳籩人醢人先祭祀賔客之薦羞而後內羞鹽人先祭祀賔客之鹽而後王之飴鹽是亦先所養而後自養之意也禹菲飲食而致孝乎鬼神惡衣服而致美乎黻冕是亦厚所養而薄所自養之意也嚴陵方氏曰事謂喪荒之類天子諸侯於無事之嵗然後田則其田也可謂有節矣春搜夏苗秋獮冬狩則田所行之時也乾豆賔客充君之庖則田所為之事也所行之時有四所為之事有三故曰嵗三田也與易言田獲三品同義所謂三田如是而已公羊氏以夏不田誤矣夫乾豆所以奉神賔客所以奉人充庖所以奉己先神而後人先人而後已故其序如此周官祭祀賔客羞服之式其序其義與此合所謂乾豆者何也上言乾則知豆之實為醢下言豆則知乾之用為籩矣周官籩人掌四籩之實醢人掌四豆之實上言籩人以見醢人所掌者為豆下言醢人以見籩人所實者為乾王制言豆而不言籩周官言籩而不言豆亦互相備也且籩之為器編竹為之所冝者乾物故四籩之實皆脯鱐乾䕩之類豆之為器刳木為之所冝者湆物故四豆之實皆菹臡醓醢之類祭祀之物不止於籩豆之實而此止以是為言者蓋田之所共者止於是故也若鼎俎之實則牧人共之而已馬氏曰謂祭無益故無事而不田曰不敬謂暴無傷故田不以禮曰暴天物無事而田非以從獸無厭蓋田者所以供祖廟可田而不田則是謂祭無益也故曰不敬田雖以殺為上而殺之中又有禮焉故曰不以禮雖為之詭遇一朝而獲十君子不取也山隂陸氏曰據此天子諸侯闕一時田春搜則不苗苗則不獮獮則不狩狩則不搜春秋傳曰四時之田用三焉唯其所先得一為乾豆二為賔客三為充君之庖講義曰田不可廢亦不可過唯不可廢故無事則必田無事而不田是不知事神接人之道斯為不敬也唯不可過故其田必以禮田而不以禮是荒於田獵斯為殘暴天所生之物也天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵鄭氏曰合圍掩羣為盡物也綏當為緌緌有虞氏之旌旗也下謂幣之佐車驅逆之車孔氏曰綏是登車之索緌是旌旗名明堂位云有虞氏之旗夏后氏之綏鄭注云有虞氏當言緌是旌旗無旒者周謂之大麾於周則春夏田用緌故鄭答趙商云春夏用大麾秋冬用大常弊謂仆于地也若初殺時則抗之己殺獵止之時則弊之故詩傳云天子發抗大綏諸侯發抗小綏此抗綏以表天子諸侯之獲也大司馬云乃設驅逆之車注云驅驅出禽獸使趨田者也逆逆要不得令走凡四時田獵欲止之時名不同案大司馬春火弊謂春時田獵殺獲禽獸將畢放火焚萊而後止夏車弊注云車弊驅獸之車止也謂獵人殺禽既畢布列車乘總驅禽獸而後止秋羅弊注云秋田主用罔中殺者多也皆殺而罔止冬徒弊注云冬田主用衆物多衆得取是四時不同也大夫殺則止佐車則天子諸侯殺未止佐車也云佐車止則百姓田獵以此推之則天子殺然後諸侯殺諸侯殺然後大夫殺故詩傳云天子發然後諸侯發諸侯發然後大夫士發是也此云佐車止謂冬獵時然則大緌小緌是夏殷之法秋冬皆用緌異於周也案熊氏曰天子四時田獵皆得圍但不合耳若諸侯唯春田不圍夏秋冬皆得圍亦不合耳故曲禮云國君春田不圍澤此諸侯是畿內諸侯為天子大夫者故曲禮云大夫不掩羣嚴陵方氏曰合圍謂合藪澤而圍之也掩羣則掩禽獸之羣而已此大小多少之别也亦見曲禮國君春田不圍澤解天子殺則下大綏大夫殺則止佐車者田車之有綏田者執之以升降也田車之有佐田者用之以驅逆也下綏則示其不復有升降之節也止佐車則示其不復為驅逆之備也既殺而獲禽獸則不復有升降之節與驅逆之備而田之有節固可見矣於大夫言佐車則天子諸侯所下之綏皆正車也以大綏言天子以小綏言諸侯以佐車言大夫又所以為重輕之别與佐車止則百姓田獵者蓋尊卑先後之序也大司馬之車弊亦若是已言百姓而不及士者以士之卑與百姓不必為先後之序故也既曰田又曰獵其實一也馬氏曰自天子不合圍至百姓田獵此田以禮之事也天子勢足以合圍故曰不合圍諸侯勢足以掩羣故曰不掩羣此非特田之以禮又示其有愛物之仁也曲禮曰國君春田不圍澤大夫不掩羣與此不同何也蓋曲禮者周制也其禮則致詳言國君春田不圍澤則知天子得圍澤也言大夫不掩羣則知諸侯得掩羣也殷之制則致寬故曰天子不合圍諸侯不掩羣也山隂陸氏曰此正田獵之時也即春田國君不圍澤大夫不掩羣且天子言合圍不言圍澤大天子也車所乘也貶於下綏鄭氏謂佐車驅逆之車佐車有非驅逆之車故曰掌佐車之政設驅逆之車謂之驅逆驅而逆我然後殺之故曰王用三驅失前禽也廬陵胡氏曰綏登車索也已殺獵止之時不復驅車故下之下謂執綏不抗而弛綏也詩傳云天子發抗大綏諸侯發抗小綏抗謂不下也此云綏故下云止佐車皆一類也鄭云綏作緌有虞氏之旗也案明堂位夏后氏之緌故鄭引之彼論旌旗以綏為緌可也此論獵止弛綏及止佐車皆是車一類不必易為緌也鄭多改經文非也鄭又謂下為弊云弊仆於地也案山虞植虞旗澤虞植虞旌謂田罷致禽於旌旗也植立也田罷當立旗豈有弊仆於地之理又可見綏非緌也先儒云此冬獵之時也則大綏小綏是夏殷之法故秋冬田皆用緌異於周春夏田用緌也且鄭既以緌為有虞氏之旗則夏殷周安得用之今云夏殷秋冬用緌周春夏用緌又明此大綏小綏非緌也獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛不卵不殺胎不夭夭不覆巢鄭氏曰取物必順時侯也梁絶水取魚者罻小網也昆明也明蟲者得陽而生得隂而藏麛卵胎夭未成物重傷之也夭斷殺也少長曰夭覆敗也孔氏曰月令止月獺祭魚孝經緯云獸蟄伏獺祭魚則十月中也是獺一嵗再祭魚此下文鳩化為鷹草木零落文相連接則謂十月時正月雖獺祭魚虞人不得入澤梁也月令九月豺乃祭獸夏小正十月豺祭獸則是九月末十月初也豺祭獸後百姓可以田獵鳩化有漸月令季夏鷹乃學習孟秋鷹乃祭鳥其鳩化為鷹則八月時也以月令二月鷹化為鳩則八月鳩化為鷹也故周禮司裘中秋獻良裘注云中秋鳩化為鷹是也罻捕鳥網也又爾雅云鳥罟謂之羅草木零落謂十月時月令季秋草木黃落則十月時也故毛詩傳云草木不折不操斧斤不入山林此謂官民總取材木若依時取者則山虞云仲冬斬陽木仲夏斬隂木不在零落之時也昆蟲未蟄不以火田謂未十月時也十月則得火田矣故羅氏蠟則作羅𥜗注云今俗放火張羅從十月以後至仲春皆得火田故司馬職云春火弊是也不麛不卵據春時特甚不夭夭等亦然故國語云獸長麛夭鳥翼鷇卵是春尤甚此注云重傷未成物則四時皆然也國語既云獸長麛夭天與麛相連故鄭云少長曰夭長樂劉氏曰天生萬物以時聖人贊之以德地生萬物以氣聖人贊之以禮德正於內則時罔不和禮正於外則氣罔不順和順鍾於萬物則生成不失其冝和順浹於人心則動用不違於法此聖王所以盡人之性於上而盡萬物之性於天下也堯舜禹湯文武之為道莫不以是先焉乃能嗣天以仁而使萬物各正其性命也故取之各有其時則物得以曲遂其生而材無不成矣用之各有其制則民得以禮節其欲而德罔不礪矣延平周氏曰獺祭魚而下主言秋冬不麛不卵而下主言春夏若獺祭魚者莫非感隂氣之肅殺若麛與卵者莫非感陽氣之發生先王輔相天地而育萬物有道也嚴陵方氏曰獺祭魚蓋孟春之月也豺祭獸蓋季秋之月也魚隂物也其性隨陽而上春為陽中魚於是時則易取焉故獺祭魚而入澤梁者因以為取魚之候也獸陽物也其質乘隂而成秋為隂中獸於是時則可取焉故豺祭獸而田獵者因以為取獸之候也虞澤虞也周官有山虞有澤虞月令於季秋之月言草木黃落蟄蟲咸俯則凡此所言皆主季秋可知然考之周官則有不合特殷之制異耳麛卵已見曲禮士不取麛卵解然經言秋冝犢麛又言韭以卵則麛卵非不取也亦禁之使有節而已不覆巢者不特惡傷其孚乳而又惡其盡物之利焉且巢以仰承為順故以不覆言之山隂陸氏曰不直言入澤梁者雖入猶有紀極獺祭魚十月豺祭獸九月鳩化為鷹八月也舉其重者於其舉重淺言殺物君子之詞也退草木在下賤之也其直言入山林亦以此爾雅曰火蟲為狩即此所謂火田然則季春出火為焚也為耕而焚非為獵而焚也即經應焚顧問昆蟲蟄否是之謂不知務麛尚迷卵尚暗先王於物無不致意焉不言孩蟲言昆蟲未蟄不以火田不嫌也不言飛鳥言鳩化為鷹然後設罻羅不嫌也據母覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵言胎在天上言卵在麛下閔胎卵也一則在上一則在下亦互相挾著一視同仁不麛不卵矣又不欲殺胎也雖不殺胎夭夭亦不可雖不夭夭覆巢亦不可長樂陳氏曰昆蟲未蟄不以火田以火伏而後蟄者畢故也然孟春啓蟄而周禮中春之田有火弊者焚圃草以田可也焚山林以田不可也月令仲春禁焚禮也郊特牲季春出火為焚非禮也春秋之時楚子田使齊侯載燧此火田之所用者與禮記集説卷二十九
