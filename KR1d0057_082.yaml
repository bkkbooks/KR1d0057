body:
  text: 禮記集説卷八十二宋衛湜撰庶子不祭殤與無後者殤與無後者從祖祔食鄭氏曰不祭殤者父之庶也不祭無後者祖之庶也此二者當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者唯適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之孔氏曰庶子謂父庶及祖庶也殤者未成人而死者也無後謂成人未昏或已娶無子而死者庶子不得祭父祖此殤與無後者之親共其牲物各從其祖祔食祖廟在宗子之家已不得自祭之也鄭注不祭殤者父之庶者謂己是父之庶子及餘兄弟亦是父之庶子所生之適子為殤而死者不得自祭之以己是父庶不合立父廟故也殤尚不祭成人無後不祭可知云不祭無後者祖之庶者已是祖庶不合立祖廟故兄弟無後者不得祭之己若是曾祖之庶亦不得祭諸父無後者諸父無後當於曽祖之廟而祭此不云曽祖言祖兼之也云無所食之者以庶子不合祭祖無處食之故宗子主其禮也云祖庶之殤則自祭之者已於祖為庶故謂己子為祖庶之殤已是父適得立父廟故自祭子殤在於父廟也為墠祭之者謂宗子是士唯有祖禰二廟無曾祖廟故諸父無後者為墠祭之若宗子為大夫得立曾祖廟則祭於曾祖廟不於墠也橫渠張氏曰無後者必祭借如有伯祖至孫而絶則伯祖不得言無後蓋有子也夫祭者必是正統相承然後祭禮正有所統屬今既宗法不立而無緣得祭祀正故且須參酌古今順人情而為之如士當一廟而設三世則是祖廟而設祖位與曾祖位也有人又有伯祖與伯祖之子者當並為祭伯祖則自當與祖為列從父則自當與父為列茍不如此使死者有知以人情言之必不安使死者無知已妄有去取則已不是不如求中於義理為善然禮於親疏逺近則自有煩簡或月祭之或享嘗乃止故拜朔之禮施於三世伯祖之祭止可施於享嘗平日藏去位板於櫝中至時祭則取而祫之其位則自如尊卑且無逆祀之禮若又設於他所則似不得祫祭皆人情所不安近世亦有祭禮於祖考禮物皆同而於其配皆有降殺凡器皿爼豆筵席純緣之類莫不異也此意亦僅得之其從食者必又有降雖古亦然以明尊卑親疏至如設祔位雖以其班亦當少退其禮物亦須少損其主祭者於祔食者若其尊也則亦有親執其禮必使有司或子弟為之且主祭者不可絶親煩辱必須簡逸庶子不祭殤與無後者注不祭殤者父之庶蓋以殤未足以語世數特以己不祭禰故不祭之不祭無後者祖之庶雖無後以其成人備世數當祔祖以祭之也不祭祖故不得而祭之也祖庶之殤則自祭之言庶孫則得祭其子之殤者以已為其祖矣無所祔之也凡所祭殤者唯適子此據禮天子下祭殤五皆適子適孫之類故知凡殤非適皆不當特祭惟當從祖祔食山陰陸氏曰其謂之庶子凡小宗子皆庶子也知然者以宗子無無後者又得自祭其殤知之也金華應氏曰殤與無後皆庶子之子也殤者幼而未成人無後者長而未有子鄭氏以殤為己之子而繫於父之庶以無後為兄弟而繫於祖之庶蓋以殤惟適可祭今適子之下又有無後者不應更祭故指此為兄弟而言之夫所謂殤與無後包羅其義云爾非謂庶子之子其適與庶皆死也適子或殤而死或無後而死皆從祖而祭於宗子之家謂之祔食特祔焉而又食之非必同祭於祖故曾子問又謂之殤不祔祭若果如此則兄弟之無後者亦不患於無所祔食矣廬陵胡氏曰此與曾子問中義同語異也庶子不祭禰者明其宗也鄭氏曰謂宗子庶子俱為下士得立禰廟也雖庶人亦然孔氏曰禰適故得立禰廟故祭禰禰庶不得立禰廟故不得祭禰明其有所宗既無禰廟故不得祭子殤也前文云不祭祖以有祖廟故注云宗子庶子俱為適士此文云不祭禰惟有禰廟故注云宗子庶子俱為下士若庶子是下士宗子是庶人此下士立廟於宗子之家庶子共其牲物宗子主其禮雖庶人是有祭義若宗子為下士是宗子自祭之庶子不得祭也金華應氏曰前文以長子斬衰之事重故先言不祭祖又言不繼祖禰以明之以統傳於祖而源流逺也幼殤祔食之事輕故專言不祭禰以明之以子出於禰而源流近也注所言適士下士之説雖於禮法曲盡其詳然立言初意恐不在是親親尊尊長長男女之有别人道之大者也鄭氏曰言服之所以隆殺孔氏曰此一經論服隆殺之義親親謂父母也尊尊謂祖及曾祖髙祖也長長謂兄及旁親也舉尊長則卑幼可知男女有别若為父斬為母齊姑姊妹在室期出嫁大功為夫斬為妻期之屬此皆人道最大者也從服者所從亡則已屬從者所從雖沒也服妾從女君而出則不為女君之子服鄭氏曰所從亡則已謂若為君母之父母昆弟從母也所從雖沒也服謂若自為己之母黨也妾為女君之黨服得與女君同而今俱出女君猶為子期妾於義絶無施服孔氏曰此一節論從服之事從服者案服術有六其一是徒從者徒空也於彼非親屬空從此而服彼徒中有四一是妾為女君之黨二是子從母服於母之君母三是妾子為君母之黨四是臣從君而服君之黨就此四徒之中而一徒所從雖亡則猶服如女君雖沒妾猶服女君之黨其餘三徒則所從亡則己謂君母死則妾子不復服君母之黨及母亡則子不復服母之君母又君亡則臣不復服君黨親也其中又有妾攝女君為女君黨各有義故也今云所從亡則己已止也止謂徒從亡則止而不服者鄭注略舉一隅爾屬者骨血連續以為親也亦三一是子從母服母之黨二是妻從夫服夫之黨三是夫從妻服妻之黨此三從雖沒猶從之服其親也鄭注亦舉一隅也妾從而出謂姪娣從女君而入若女君犯七出則姪娣亦從而出也嚴陵方氏曰從服即大傳所謂徒從也屬從即大傳所謂屬從者也然徒從不若屬從之為重也故於徒從則所從亡則已於屬從則所從雖沒而猶服焉妾從女君而出則不為女君之子服者以其義絶故也禮不王不禘鄭氏曰禘謂祭天孔氏曰此論王者郊天之事也王謂天子也禘謂郊天也禮惟天子得郊天此經上下論服制記者亂録不禘之事厠在其間山陰陸氏曰此文宜在王者禘其祖之所自出以其祖配之之上世子不降妻之父母其為妻也與大夫之適子同鄭氏曰世子天子諸侯之適子也不降妻之父母為妻故親之也為妻齊衰不杖者君為之主子不得伸也主言與大夫之適子同據服之成文也孔氏曰世子既不降妻之父母其為妻也亦不降與大夫之適子為妻同也不杖者父為主其子不得伸喪服惟言大夫適子者若舉世子為妻嫌大夫以下有降喪服若舉士子為妻其士既職卑本無降理大夫是尊降之首恐其為適婦而降故特顯之山陰陸氏曰諸侯世子世國故其妻死齊衰不杖不杖不敢病也然則大夫之適子為妻何以不杖仕至大夫賢著而德成以賢望其適也據大夫之適子服大夫之服然則大夫非世爵祿亦非不世爵祿孟子曰如不得已將使卑踰尊疏踰戚矧吾大夫之子能似其先人胡為而不世其所謂春秋譏世卿謂非其似者也金華應氏曰天子諸侯降其妻之父母而世子上不敢擬於尊者儲副韜濳而未有君道也大夫之子為其妻齊衰不杖期而世子下不敢異於卑者家國雖異而敬父則均也故服不降者非厚於外黨也自處於卑而致其謙焉耳服不杖者非薄於伉儷也壓於所尊而避其私焉爾凡以君父在焉而不敢失臣子之禮也父為士子為天子諸侯則祭以天子諸侯其尸服以士服父為天子諸侯子為士祭以士其尸服以士服鄭氏曰祭以天子諸侯養以子道也尸服士服父本無爵子不敢以己爵加之嫌於卑之也祭以士其尸服以士服者謂父以罪誅尸服士服不成為君也天子之子當封為王者後以祀其受命之祖云為士則擇其宗之賢者若微子者不必封其子為王者後及所立為諸侯者祀其先君以禮卒者尸服天子諸侯之服如遂無所封立則尸也祭也皆如士不敢僭用尊者衣服孔氏曰尸服士服謂玄端若君之先祖為士大夫則服助祭之服故曽子問云尸辨冕而出是為君尸有著辨者有著冕者若為先君士尸則著爵辨若為先君大夫尸則著玄冕是也若大夫士之尸則服家祭之服故鄭注士虞記尸服卒者之上服士玄端是也鄭知父以罪誅者以尸服士服故也以其嘗為天子諸侯不可以庶人禮待之士是爵之最卑故服其士服云若微子者不必封其子者案尚書序云成王既黜殷命殺武庚命微子啓代殷後是擇其賢者不立封紂子也嚴陵方氏曰言天子諸侯士之祭其别如此則王制所謂祭從生者也與中庸所言亦同父為士其尸服以士服者則與喪從死者同義金華應氏曰古之為天子者皆積纍世德而致之未有一旦崛起而在尊位也其失天下者必有大惡自絶於天人之心否則未有不賴前哲以免也故德必若舜禹而後能自匹夫驟興於萬乘惡必若桀紂而後忽自萬乘驟降於匹夫若諸侯與士之進退升黜雖或有之而亦已鮮矣自周秦以降而後興替之不常貴賤之殊絶始比比有之此論其所祭所服者固亦當時所絶無而僅有然先王制禮以該括古今之變而方來之人情事物不能違焉所以謂百世以俟聖人而不惑也婦當喪而出則除之為父母喪未練而出則三年既練而出則已未練而反則期既練而反則遂之鄭氏曰當喪當舅姑之喪也出除喪絶族也孔氏曰此一經明婦人遭喪出入之節婦正當舅姑之服被夫遣出恩情既離故出即除服也女出嫁為父母期若婦自有父喪未小祥被夫遣歸值兄弟之小祥則隨兄弟服三年之受既已絶夫族故其情隆於父母也故云則三年若父母喪己小祥而女被遣其服已除今歸雖在三年內則止不更反服以兄弟小祥之後無節變故女遂止也已止也未練而反謂先有父母喪為夫所出今喪猶未小祥而夫命已反則還家小祥而除是依期服也既練而反則遂之者若被遣還家已隨兄弟小祥服三年之受而夫反命之則猶遂三年乃除隨兄弟故也嚴陵方氏曰女出嫁則恩隆於夫家被出則恩復隆於父母得反則恩復隆於夫家既練而反則服不可中道而除故遂其三年凡此所謂以仁起禮也再期之喪三年也期之喪二年也九月七月之喪三時也五月之喪二時也三月之喪一時也故期而祭禮也期而除喪道也祭不為除喪也鄭氏曰三年至一時言喪之節應歲時之氣也期而祭謂練祭也禮正月存親親亡至今而期期則宜祭期天道一變哀惻之情益衰衰則宜除不相為也孔氏曰自此至則已一節總明遭喪時節除降之義期而祭者孝子喪親歲序改易隨時悽感故一期而為練祭是孝子存親之心於禮當然故云禮也期而除喪者親終一期而除説其喪天道當然故云道也祭為存親除喪為天道之變故云祭不為除喪男子除首絰女子除要帶總之練祭祥祭亦名除喪也嚴陵方氏曰期而祭謂練祭也除喪謂男子期則除首絰婦人期則除要帶也禮言緣人情道言因天時故曰期而祭禮也期而除喪道也人情天時各有謂焉故曰祭不為除喪馬氏曰期而祭者謂之禮其除喪也謂之道禮存乎人道存乎天李氏曰有經者禮也莫不由之者道也期而祭以其有經故曰禮期而除喪以其不可過與不及故曰道君子應乎禮出乎道而已三年而后葬者必再祭其祭之間不同時而除喪鄭氏曰再祭練祥也間不同時者當異月也既祔明月練而祭又明月祥而祭必異月者以葬與練祥本異歲冝異時也而除喪已祥則除不禫孔氏曰此謂身有事故不得及時而葬故三年後始葬再祭謂練祥祭也既三年未葬尸柩尚存雖當練祥之月不可除親服故三年葬後必為此練祥不可同一時而祭當前月練後月祥故云不同時於練祥之時而除喪謂練時男子除首絰婦人除要帶祥時除衰杖也鄭注已祥則除不禫者以經直云必再祭故知不禫禫者本為思念情深不忍頓除故有禫也今既三年始葬哀情已極故不禫也嚴陵方氏曰未葬則雖期未可練再期未可祥必待葬畢而為之故曰再祭必有漸焉故不可同時也馬氏曰祭不為除喪而除喪者必因祭焉以祭為吉而除喪者所以從吉也夫練祥之時既已過矣而獨為之再祭以存親之禮不可廢也其祭之間不同時者以其存親之節不可忘也祭不同乎時而除喪者亦不同乎時則除喪必從祭也可知矣大功者主人之喪有三年者必為之再祭朋友虞祔而已鄭氏曰謂死者之從父昆弟來為喪主有三年者謂妻若子幼少大功為之再祭則小功緦麻為之練祭可也孔氏曰此明為人主喪法也大功從父兄弟也主人之喪者謂死者無近親而從父昆弟為之主喪也有三年者謂死者有妻若子妻不可為主而子猶幼小未能為主故大功者主之為之練祥再祭朋友疏於大功但虞祔而已然則大功尚為練祥則虞祔亦為之祭可知親重者為之逺祭親輕者為之近祭故大功為之祥練小功緦麻為之練朋友但為之虞祔也案皇氏曰死者有三年之親大功主者為之練祥若死者但有大功則大功主者至期小功緦麻至祔若又無期則各依服月數而止故雜記云凡主兄弟之喪雖疏亦虞之謂無三年及期者也田氏曰劉德議問朋友虞祔謂主幼而為虞祔也若都無主族神不歆非類當為虞祔否答曰虞安神也祔以死者祔於祖也朋友恩舊歡愛固當安之祔之然後義備但後日不常祭之耳魏田璦見通典金華應氏曰責人必以其所故同姓之所親則要以三年於父遊之所厚則期以三月為義必於其可故變除生者之服飾非親者而不能安祔死者之精神雖疏者可為之然又必有妻子則為之練祥再祭雖不廢而變除之節可略也凡此皆為死者無主後而慮生者不能久其事故以親疏而為之節若盡送往拊孤之義則雖過於厚而無害也夫死生之相收恤人道之當然今其身死而又妻子惸弱適無父母兄弟之至親也則大功當任其責而至於終喪或其適無小功之親也則朋友當任其責而至於逾葬使其不幸而無大功以為之依則小功以下其可以坐視乎又不幸而無朋友以為之助則為鄰者儻與之舊者其可以恝然乎是以體朋友死無所歸於我殯之義則練祥不必大功而親黨皆不可得而辭推行有死人尚或墐之之心則虞練不必朋友而凡相識者皆不得而拒特其情有厚薄則處之各不同自其篤於義者言之則各有加焉無害也凡遇夫人之急難而處事之變者不可以不知士妾有子而為之緦無子則已鄭氏曰士卑妾無男女則不服不别貴賤孔氏曰喪服云大夫為貴妾緦是大夫貴妾無子猶服之也士妾無子則不服不殊别妾之貴賤也生不及祖父母諸父昆弟而父稅喪己則否鄭氏曰謂子生於外者也父以他故居異邦而生己巳不及此親存時歸見之今其死於喪服年月已過乃聞之父為之服己則否者不責非時之恩於人所不能也當其時則服稅讀如無禮則稅之稅稅喪者喪與服不相當之言孔氏曰此一節明稅服之禮父先本國有此祖父以下諸親後或隨宦出遊居於他國更取而生此子此子不與諸親相識故云不及謂不及歸見也若此諸親死道路既逺喪年限己竟而始聞父則稅之謂追服也此子則否然已在他國後生得本國有弟者假令父後又適他國更取所生之子則為己弟故有弟也鄭注當其時則服者以稅是不相當之言若服未除則猶是服內服故知則服謂服其全服也王氏曰已則否謂計己之生不及此親之存則不稅若此親未亡之前而已生則稅之也昆弟謂諸父之昆弟淳于氏曰據降而緦小功者稅之蓋正親而重骨肉也今父在則祖周父亡則三年此非重歟若但以不見則割其至親之本愛而忍惻怛之痛使與諸父母昆弟同制此其可乎尊祖之義於是疏矣又禮為慈母之父母無服亦云恩不能及恩不及者慈母之父母則可也今以他故生不見祖而以為非時之恩意實不厭晉淳于纂見通典嚴陵方氏曰日月已過乃聞喪而服曰稅為君之父母妻長子君已除喪而后聞喪則不稅鄭氏曰臣之恩輕也謂卿大夫出聘問以他故久留孔氏曰自此至臣服已一節明臣為君親稅之與否此經謂臣出聘不在而君諸親喪臣後方聞之若君未除則從為服之若君已除則臣不稅之所以然者恩輕故也降而在緦小功者則稅之鄭氏曰謂正親在齊衰大功者正親緦小功不稅矣曾子問曰小功不稅則是逺兄弟終無服也此句補稅誤在是冝承父稅喪己則否孔氏曰此廣釋檀弓中曽子所説也曾子所云小功不稅是正小功耳若本大功以上降而在緦小功者則為稅之本情重故也山陰陸氏曰嫌小功不稅降服亦是也故出之在此非脫誤也即承父稅喪己則否於義不倫近臣君服斯服矣其餘從而服不從而稅君雖未知喪臣服己鄭氏曰謂君出朝覲不時反而不知喪者近臣閽寺之屬也其餘羣介行人宰史也君雖未知喪臣服己從服者所從雖在外自若服也孔氏曰此經明賤臣從君出朝覲或遇險阻不時反國比反而君諸親喪君自稅之臣之卑近者則從君服之非稅義也其餘為臣之貴者若君親服限未除君既服之則臣下亦從而服之若限已竟而君稅之臣不從君而稅也若君出而國內有親喪君雖未知在國之臣即如尋常先著服凡從服者悉然也虞杖不入於室祔杖不升於堂鄭氏曰哀益衰敬彌多也虞於寢祔於祖廟孔氏曰此論哀殺去杖之節士虞禮云虞於寢檀弓云明日祔於祖嚴陵方氏曰喪禮先虞而後祔虞杖特不入於室而已至於祔杖則雖堂亦不升焉蓋哀雖衰而敬愈不衰也室內而堂外故於室曰入堂髙而升卑故於堂曰升論語於室亦曰入於堂亦曰升者義亦如此為君母後者君母卒則不為君母之黨服鄭氏曰徒從也所從七則已孔氏曰此經論徒從所從亡則己之事為君母後謂無適立庶為後也妾子於君母之黨悉徒從若君母卒則不服君母之黨今既君母沒為後者嫌同於適服君母之黨故特明之絰殺五分而去一杖大如絰鄭氏曰如要絰也孔氏曰此一節論杖大如要絰之義喪服傳云首絰大搹左本在下去五分一以為帶是首尊而要卑卑宜小故五分而去一象服數有五也杖大如絰同在下之物故也賈氏曰首絰大搹搹是扼物之稱據中人一扼而言大者據大拇指與大巨指扼之故言大也山陰陸氏曰齊衰之絰斬衰之帶也大功之絰齊衰之帶也杖大如絰蓋如其絰即如要絰是如帶非如絰也新安朱氏曰首絰大一扼只是拇指與第二指一圍腰絰較小絞帶又小於要絰要絰象大帶兩頭長垂下絞帶象革帶一頭串於中而束之又曰首絰右本在上者齊衰絰之制以麻根處著頭右邉而從額前向左圍向頭後郤就右邉元麻根處相接即以麻尾藏在麻根之下麻根搭在麻尾之上綴殺之有纓者以其加於冠外故須著纓方不脫落也妾為君之長子與女君同鄭氏曰不敢以恩輕輕服君之正統孔氏曰此一經論妾從女君服同女君為長子三年妾亦為女君長子三年故云與女君同也除喪者先重者易服者易輕者鄭氏曰除喪謂練男子除乎首婦人除乎帶易服謂大喪既虞卒哭而遭小喪也其易喪服男子易乎帶婦人易乎首孔氏曰此一節論服之輕重相易及除脫之義男重首絰女重要絰凡所重者有除無變所以卒哭不受以輕服至小祥各除其重也易謂先遭重喪後遭輕喪變先輕者則謂男子要婦人首也謂先遭斬服虞卒哭已變葛絰大小如齊衰之麻若又遭齊衰之喪齊衰要首皆牡麻牡麻則重於葛服冝從重而男不變首女不易要以其所重故也但以麻易男要女首是所輕故也若未虞卒哭則後喪不能變也無事不辟廟門哭皆於其次鄭氏曰廟殯宮鬼神尚幽暗也哭皆於次無時哭也有事則入即位孔氏曰此一經論在殯無事之時辟開也朝夕入即位哭則暫開之無事則不開也次謂倚廬凡葬前晝夜無時之哭則皆於廬次之中有事謂賔來弔若朝夕哭及適子受弔並入門即位而哭復與書銘自天子達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏鄭氏曰此謂殷禮也殷質不重名復則臣得名君周之禮天子崩復曰臯天子復諸侯薨復曰臯某甫復其餘及書銘則同孔氏曰此一經論復與書銘男女名字之别書銘謂書亡人名字於旌旗也天子書銘於太常諸侯以下則各書於旌旗士與天子同也殷質故男子復及銘皆名周尚文臣不名君也婦人復則稱字此云書姓及伯仲是書銘也姓謂如魯姬齊薑伯仲隨其次也此亦殷禮周之文未必有伯仲當云夫人也氏如孟孫三家之屬殷無世繫六世而昏故婦人有不知姓者周則有伯宗掌定世繫百世昏姻不通故必知姓也若妾有不知姓者當稱氏矣鄭注其餘及書銘則同謂周卿大夫以下書銘與殷同也嚴陵方氏曰復謂魂也銘即明旌也伯仲則長幼之第也山陰陸氏曰男子稱名所謂臯某復是也先儒謂周禮天子復曰臯天子復諸侯復曰臯某復此讀復曰天子復矣之誤也復曰天子復矣是告人以天子復非復天子之詞據崩曰天王崩斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同麻葛皆兼服之鄭氏曰斬衰之葛齊衰之麻其絰之大俱七寸五分寸之一帶五寸二十五分寸之十九齊衰之葛大功之麻其絰之大俱五寸二十五分寸之十九帶四寸百二十五分寸之七十六兼服之謂服麻又服葛也男子則絰上服之葛帶下服之麻婦人則絰下服之麻固自帶其故帶也所謂易服易輕者也兼服之文主於男子孔氏曰此一節明前遭重喪後遭輕喪麻葛兼服之義斬衰既虞受服之葛首絰要帶與齊衰初喪麻絰帶同齊衰變服之葛與大功初死之麻同皆兼服之者皆上斬衰齊衰大功麻葛之事也斬衰既虞遭齊衰新喪男子則要服齊衰之麻帶首服斬衰之葛絰婦人則首服齊衰之麻絰要仍服斬衰之麻帶婦人上下皆麻故鄭注云兼服之文主於男子也鄭注絰帶大小者案喪服傳云苴絰大搹去五分一以為帶齊衰之絰斬衰之帶也去五分一以為帶大功之絰齊衰之帶也去五分一以為帶喪服所云謂初喪麻之絰帶也至既虞變葛之時絰帶漸細降初喪一等斬衰葛絰帶與齊衰初喪麻之絰帶同故云絰俱七寸五分寸之一所以然者就苴絰九寸之中五分去一以五分分之去一分故七寸五分寸之一其帶又五分去一又就葛絰七寸五分寸之一中五分去一故帶五寸二十五分寸之十九也此即初死之麻絰帶也齊衰既虞變葛之時又漸細降初喪一等與大功初死麻絰帶同大功首絰與齊衰初死麻帶同俱五寸二十五分寸之十九也其帶五分首絰去一就五寸二十五分寸之十九之中去其一分故餘有四寸百二十五分寸之七十六也凡算之法皆以五乘母乘母既訖納子餘分以為積數然後以寸法除之但其事繁碎故略舉大綱也山陰陸氏曰謂若斬衰卒哭男子變要絰以葛若又遭齊衰之喪則以齊衰之麻易葛帶其首絰猶是斬衰之麻女子更首絰以葛若又遭齊衰之喪則以齊衰之麻易葛絰其要絰猶是斬衰之麻是之謂兼服是何也斬衰之葛與齊衰之麻故也下文放此鄭氏謂服麻又服葛誤矣故曰兼服之服重者則易輕者也報葬者報虞三月而后卒哭鄭氏曰報讀為赴疾之赴謂不及期而葬也既葬即虞虞安神也卒哭之際待哀殺也孔氏曰此一節論不得依常葬之禮赴猶急疾也貧者或因事故死而即葬不待三月葬竟而急設虞安神宜急也卒哭猶待三月者奪於哀痛不忍急也山陰陸氏曰此不及期而葬不及期而葬報而後知之即及期有會而無報葬雖速猶須三月而后卒哭父母之喪偕先葬者不虞祔待後事其葬服斬衰鄭氏曰偕俱也謂同月若同日死也先葬者母也曽子問曰葬先輕而後重又曰反葬奠而後辭於殯遂修葬事其虞也先重而後輕待後事謂如此也其葬服斬衰者喪之隆哀冝從重假令父死在前月而同月葬猶服斬衰不葬不變服也言其葬服斬衰則虞祔各以其服矣及練祥皆然卒事反服重孔氏曰此一節論並遭父母喪虞祔及衣服之制父母雖有同日月死而不得同月葬曽子問先輕後重謂先葬母也葬母竟不即虞祔更修葬父之禮以虞祔稍飾父喪在殯未忍為也後事謂葬父也待葬父竟先虞父乃虞母所謂祭先重而後輕也鄭注父死在前月謂母死前之月但未葬之前皆是前月也雖葬母亦服斬衰葬之以父未葬不得變服也若為母虞祔練祥皆齊衰也卒事之日反服父服故鄭云卒事反服重大夫降其庶子其孫不降其父大夫不主士之喪鄭氏曰大夫為庶子大功祖不厭孫也士之喪雖無主不敢攝大夫以為主孔氏曰此一節論大夫尊降庶子一等兼不為主之事大夫降其庶子故為其庶子不為大夫者服其大功也嫌既降其子亦厭其孫故此明雖降庶子而不厭降其孫庶子之子不降其父猶為三年也士死無主後其親屬有為大夫者尊不得主之嚴陵方氏曰庶子之子不降庶子以尊可以降卑卑不可以降尊也大夫不主士之喪者不以尊攝卑為慈母之父母無服鄭氏曰恩不能及孔氏曰此一節論不為慈母之黨服此即是喪服中慈母父雖命為母子本非骨肉故慈母之子不為慈母之父母有服者恩所不及也夫為人後者其妻為舅姑大功鄭氏曰以不二隆孔氏曰此一節論婦人不二隆之義案賀氏曰此謂子出時已昏故此婦還則本舅姑大功若子出時未昏至所為後家方昏者不服本舅姑以婦本是路人來又恩義不相接猶臣從君而服不從而稅人生不及祖之徒而皆不責非時之恩也熊氏曰夫為本生父母期其妻降一等服大功是從夫而服不論識前舅姑與否假令夫之伯叔在他國而死其婦雖不識豈不從夫服也士祔於大夫則易牲鄭氏曰不敢以卑牲祭尊也大夫少牢孔氏曰謂祖為大夫孫為士孫死祔祖則用大夫牲不敢用士牲祭於尊者之前也下云賤不祔貴而此云士祔大夫者謂無士可祔也猶妾無妾祖姑易牲而祔於女君可也若有士則當祔於士故雜記云不祔於大夫謂先祖兄弟有為士者當祔於士不得祔於大夫也繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居鄭氏曰録恩服深淺也見同財則期同居異財故同居今異居及繼父有子亦為異居則三月未嘗同居則不服孔氏曰此一經解喪服經中繼父同居異居之禮繼父謂母後嫁之夫也若母嫁子不隨則此子與母繼夫固自路人無繼父之名故自無服也今此言謂夫死妻稚子幼無大功之親隨母適後夫後夫亦無大功之親後以其貨財為此子同築宫廟四時使之祭祀同其財計如此則是繼父同居故為服期若異居其禮有三一者昔同今異二者今雖共居其財計各别三者繼父更有子便為異居則服齊衰三月而已今經言有主後為異居謂繼父更有子也舉此一條餘亦可知然既云皆無主後者為異居則此子有子亦為異居也山陰陸氏曰言皆無主後則子亦是也然則繼父同居蓋亦為之娶婦矣娶婦而有子亦異居焉禮記集説卷八十二
