body:
  text: 禮記集說卷四宋衛湜撰幼子常視毋誑童子不衣裘裳立必正方不傾聽鄭氏曰視今之示字小未有所知常示以正物以正教之無誑欺裘太溫消隂氣使不堪苦不衣裘裳便易立必正方不傾聽習其自端正孔氏曰自此至而對一節明父母教子及衣裘裳之法古者觀視於物及以物視人則皆作示傍著見小兒恆習效長者長者不宜示以欺誑故曾子兒啼妻云兒莫啼吾當與汝殺豕兒聞輒止妻後向曽子說之曽子曰勿教兒欺即殺豕食兒是不誑也童子未成人之名也衣猶著也童子體熱不宜著裘又應給役著裳則不便故童子並緇布襦袴也二十則可衣裘裳故內則云二十可以衣裘帛詩云乃生男子載衣之裳是初生暫行此禮爾立必正嚮一方不得傾頭屬聽左右也黃氏曰正義引喻疑未當曽子將死尚懼牀笫之僭敝衣而耕終辭魯邑乃守節知禮之賢人也禮云士無故不殺犬豕豈為示幼子小信而干先王大禮哉必無斯義稱其以他事無誑則可耳龜山楊氏曰人之生也直是以君子無所往而不用其直直則心得其正矣古人於幼子常示無誑所以養其直也李氏曰常視所以養其目毋誑所以養其耳因其固有之善性而正其耳目之官則其為善也孰禦哉河南程氏曰自幼子常視毋誑而下皆是教以聖人言動裘裳成人之服也不衣者不能衣也不帛襦袴不帛則是用布也襦今之襖不衣裘裳則常所衣者襦袴而已東萊吕氏曰孟子少時見東鄰殺猪問母何為母曰將以啖汝母悔其誑也買肉以啖之人多謂孟母能示子以信不知買肉以實其言所以為誑也母當直以前言為誑而語之乃買肉以成其誑本是一誑郤成兩誑大抵所以陷於小人者多因要實前言蓋實前言三字最是入小人之徑路藍田吕氏曰書曰兹乃不義習與性成則不義非性矣然以不義成性則習有以移之故習不可不慎也古之教子者其始生也擇諸母之慈良恭敬慎而寡言者使為子師其次為慈母其次為保母教之之慎如此況可示之誑乎裘裳與冠皆成人之服未成人者服亦有所未備也立必正所向之方或東向西向或南向北向不使之偏有所向也士相見禮云凡燕見於君必辨君之南面若不得正方疑君疑君者謂斜嚮之不正方也不傾聽者頭容直長樂陳氏曰書曰若生子罔不在厥初生幼子常示毋誑之謂也幼而示之以無誑所以正其心成童教之以立必正方掩口而對所以正其容長樂劉氏曰幼子之性純明自天未有外物生其好惡者無所學而不可成也如金之在鎔惟人所範如泥之在鈞惟人所模故視之以誠信則誠信篤於其心矣視之以詐僞則詐僞篤於其志矣模範之初貴得其正則五事之用靡不出於誠而適於道也故曰幼子常視無誑廣安游氏曰古之人比屋可封者謂匹夫匹婦皆有孝弟之行也所謂匹夫匹婦皆有孝弟之行非皆生而知之亦由父兄長者教之使有方也欲其長毋誑欺也則自其幼而常視毋誑矣欲其長而知事長灑掃應對進退之節也則自其幼而使之堪忍勞苦給役便易矣欲其長而視聽之正也則自其幼而教之正方不傾聽矣欲其長而扶持供養也則自其幼而教之提攜奉手之禮矣欲其長而解事向尊者屏氣也則自其幼而教之對長者掩口之禮矣凡此不獨自其幼而教之也父兄長者又以己身而先之焉常示毋誑則先以己之毋誑示之也辟咡詔之則先以已之辟咡教之也古之教人者苟欲教人先正其身至於教子則尤其所當謹者也嚴陵方氏曰忠信者禮之本也將使之學禮可不知其本乎示之以誑欺則所見者常誑欺而已始生而蒙氣猶未達庸可消其隂乎方長而稚人猶未成庸可備其禮乎故不衣裘裳必施於童子焉立必正則立不至於跛矣聽不傾則聽不至於淫矣後又言毋側聽何也凡物側然後傾則側未至於傾矣此教童子故責之略後教成人故責之詳蓋不傾則容或側毋側則不傾可知永嘉戴氏曰常示毋誑所以養其心也不衣裘裳所以養其體也蓋不開其情僞之端以育其正性不傷其隂陽之和以長其夀命此古之成人所以多有德也夫內外交相養也防其外所以養其中也立必正方不傾聽則敬以直內無傾邪之患矣金華邵氏曰孔子曰少成若天性習貫如自然若幼少之時不有以教之一旦欲責其盡善於成人之日不亦難哉是以古人於幼子常視毋誑欲其異時不為欺也不衣裘裳欲其異時知服勞也立必正方則既長當立如齊不傾聽則既長當不聽惡聲矣至於掩口對長者之詔教則異時知敬長而尊上矣幼之所教如此則習與智長化與心成何患其長而不為賢人君子為孝弟忠信長者與之提攜則兩手奉長者之手負劒辟咡詔之則掩口而對鄭氏曰習其扶持尊者提攜謂牽將行負謂置之于背劒謂挾之于旁辟咡詔之謂傾頭與語口旁曰咡掩口而對習其鄉尊者屏氣也孔氏曰非惟教之聽立至於行步亦宜教之奉長者之手為長大當扶持長者故先學之辟傾也不正向之令氣不觸兒亦令見長者所為而復習之也兒在懷中亦稱負謂兒負之故內則云始負子童子雖未能掩口而對長者亦教其為之以為後法黃氏曰上文云長者與之提攜則兩手奉長者之手皆教幼童能行之時非懷抱之幼也且嬰兒可置於脅下如帶劒者豈能教之對長者禮乎其負劒辟咡詔之疑非負挾幼童乃是長者之身或負劒者將詔告幼童不便於屈身俯臨而語之辟咡者偏就近耳而詔之也幼童必掩口而對避其口氣為童子之禮則義或通焉橫渠張氏曰古之小兒便能敬事長者與之提攜則兩手奉長者之手問之掩口而對蓋稍不敬事便不忠信故教小兒且先安詳恭敬藍田吕氏曰長者與之提攜則兩手奉長者之手以長者之意不可以不承也負劒辟咡詔之則掩口而對以氣之逼人人或惡之也古之佩劒者挾之於旁負劒即佩劒也童子之幼者長者或旁挾之如負劒然故謂之負劒也馬氏曰就而攜之則奉其手近而詔之則掩口而對者皆事長之禮也古之成人有德小人有造者豈一朝一夕之習哉蓋自幼稚而已知禮讓矣少而習之壯而行之老而安之古人年彌髙而德彌劭者蓋出於此也廬陵胡氏曰歐陽子阡表云劒汝立於旁管子書弟子職云食已循咡嚴陵方氏曰少儀言有問焉則辟咡而對者彼言幼者對之之時此言長者詔之之時詔對雖不同其所以為辟咡之容則一也唐陸氏曰何云口耳之間曰咡從於先生不越路而與人言遭先生於道趨而進正立拱手先生與之言則對不與之言則趨而退鄭氏曰不越路與人言尊不二也先生老人教學者拱手為有教使趨退為其不欲與己並行孔氏曰自此至唯諾明事師長之禮并自恭謹之法先生師也謂師為先生者言彼先已而生其德多厚也自稱為弟子言己自處如弟子則尊師如父兄也論語云有酒食先生饌則先生之號亦通父兄崔靈恩云凡言先生謂年德俱髙又教道於幼者凡言長者直以年為稱也凡言君子者皆為有德尊之不據年之長幼書傳略說云大夫士七十而致仕大夫為父師士為少師教於州里鄉射注云先生鄉大夫致仕者鄭云老人教學則未必皆致仕者遭逢也趨疾也道路與師長相逢疾趨而進就之不敢斥問先生所為故正立拱手聽先生之教若問已以事則辭遜然後對藍田吕氏曰先生則他人稱之長者則無嫌於自稱樂正子曰先生何為出此言也孟子曰舍館定然後求見長者乎是也弟子之於師聽教聽役而已故正立拱手以待也與之言則對不與之言則趨而退進退應答不敢専也馬氏曰先生者齒長而有德之稱古之冠者見於鄉大夫鄉先生鄉飲酒之禮主人就先生而謀賔尊爵貴德之義也孟子以先生目宋牼而自謂長者蓋長者長於彼而未必有德先生德齒俱髙矣尊者體舒卑者體蹙進退必趨者卑以自處也廬陵胡氏曰不越路而與人言一其敬與之言則對前文云辭遜而對此不者略道路永嘉戴氏曰禮無二敬從先生而越路與人言則敬有所分矣趨進者懼先生之有教令也趨退者不敢與先生並行也道遇長者而引避雖足以致敬而非所以承命也長者不與之言而隨行不置亦非所謂承意也進退之際其難如此可不謹哉從長者而上丘陵則必鄉長者所視登城不指城上不呼鄭氏曰鄉長者所視為逺視不察有所問不指不呼為惑人孔氏曰長者東視則東視長者西視則西視從先生君子亦然永嘉戴氏曰從長者而升髙非以逺覽也所以承教也違長者所視則志在覽物敬長之意失矣況長者欲有所問乎登髙而望逺則衆所駭觀自上而瞷下則人所疑忌居十目所視十手所指之地而指畫疾呼其不驚人而惑衆者幾希此固君子之所戒也論語曰車中不內顧不疾言不親指在車上猶不可而況於登城乎嚴陵方氏曰不指為其惑人之見也不呼為其惑人之聞也言城者士民之所㑹而聞見者衆故也廬陵胡氏曰不指不呼為駭衆將適舍求毋固將上堂聲必揚戶外有二屨言聞則入言不聞則不入將入戶視必下入户奉扃視瞻毋回戶開亦開户闔亦闔有後入者闔而勿遂毋踐屨毋踖席摳衣趨隅必慎唯諾鄭氏曰適舍謂行而就人館固猶常也求主人物不可以舊常或時乏無聲必揚警內也言聞則入視必下不干掩人之私也奉扃敬也户開闔不以後來變先勿遂示不拒人趨隅升席必由下也慎唯諾者不先舉見問乃應孔氏曰自此以下雖從師長兼明為賔客禮也舍主人家也户外二屨謂兩人體敵故鄉飲酒賔主皆降脫屨堂下以體敵故也若尊卑不同則長者一人脫屨户內故少儀云一人而已若內人語聞於户外則非私事外人乃可入也雖聞言而入不得舉目恐睹人私禮有鼎扃所以關鼎今關户之木與關鼎相似亦得稱扃凡常奉扃必兩手向心而奉之視必下而竟不得回轉廣有瞻視若户本開則今入者不須闔若户本闔則今入者不須開後猶有人應入雖已應還闔當作闔勢以待後入不得遂闔以拒後人踐踏也後進者不得踏先入者屨踖猶躐也席既地鋪當有上下將就坐當從下而升以就已位若發初從上為踖席玉藻云升席不由前為躐席自是不由席前升與此别鄉飲酒云賔升席自西方注云升由下也升必中席彼謂近主人為上故以西為下也摳提也衣裳也趨猶向也隅猶角也既不踖席當兩手提裳之前徐徐向席之下角從下而升己位也唯也諾應對也坐定又謹於應對熊氏曰一人之屨在户內其户外有二屨則三人也下文云離坐離立毋往參焉則知户內二人不得參之故知户外二屨當有三人黃氏曰求毋固注義訓固為舊常者義或迂也俾昧者觀之謂不可求舊常而可求新異哉蓋求毋固者謂凡求物於主人毋固毋必隨其有無則厥義似當橫渠張氏曰將適舍求毋固固求休息有似厭怠然藍田吕氏曰事先生長者之禮進退不敢必也將適舍將退也將上堂將進也雖將退也先生長者未之許則退無固也雖將進也揚聲而警之不欲掩人之私也户外有二屨則并户內一屨為三人矣以户內有三人故乃可入猶以言聞不聞為入不入之節若户內有二人則不可入所謂離坐離立毋往參焉者也毋踐屨踖席敬其物所以敬其人也摳衣趨隅必慎唯諾不敢為賔聽役於先生長者唯所以應也諾所以許也永嘉戴氏曰嫌疑者禍之階也故禮者所以别嫌疑而免於人道之患將上堂聲不揚而默上則人得以疑乎我將入户言不聞而遽入則我有以窺乎人此二者禍之階也凡視之道上視者傲將入户視必下者懼其旁觀側睨窺人之私也君子之孝凡足之所履手之所持身之所倚無非敬也入户而扃墜則慢心實為之是亦不敬也入户之禮不惟下視而亦不敢反顧矣户之開闔若非急務君子察於人情如此其周也凡升堂者脫屨於堂下惟祭則否凡入戶者脫屨於户外有尊長在則否就屨取屨納屨遷屨皆有禮法即席之禮由下以序而升賔客之席讀書之席飲食之席徒坐之席亦有禮法不失尺寸過此則為非禮矣嚴陵方氏曰視以下為敬後言凡視上於面則敖豈非以下為敬乎視近而瞻逺視詳而瞻略雖或瞻或視不可回旋惡其掩人之私也毋踐屨所以貴其人毋踖席所以正其位必慎唯諾者唯之聲速而質諾之聲緩而文與己有上下之辨者則應之以唯與己有彼此之辨者則應之以諾雖或唯或諾不同皆欲其無僞而已故易稱君子慎言語然此止謂應者之辭所言者客禮而已吳郡范氏曰將上堂則揚吾謦咳之聲户外有二屨則聲聞於外而後敢入入户則不舉目以逺視拱手當心以向户扃不回環而四顧皆是不欲掩人之私其事雖小最為曲禮之要推而廣之有正心誠意之道焉使心術不正者處之必將濳聲以升堂直前而入户逺瞻四顧為睢盱覘伺之態則其人之薄德可知矣大抵禮以制形為用而以制心為本一念不正發於方寸者甚微而形於舉措者弗可掩流於放僻邪侈而不自知故升堂入户日用之常而君子致嚴如此者以心術之邪正繫焉山隂陸氏曰奉扃謂應小啓之以兩手奉户置扃處也廬陵胡氏曰車上兵闌亦曰扃左氏宣十二年傳曰脫扃摳衣趨隅兩手提揭裳之前向席一隅而升已之位長樂陳氏曰闔之所以敬其主於內勿遂所以敬其人於外敬其主於內禮也敬其人於外義也夫以一闔户之間而禮義猶所不廢況其大者乎新安朱氏曰毋踐屨毋踖席此是衆人共坐一席既云當已位上即須立於席後乃得當已位上蓋以前為上後為下也正與玉藻義同鄉飲乃是特設賔席一人之坐故以西為下西自席下之中升而即席與此異也大夫士出入君門由闑右不踐閾鄭氏曰臣統於君闑門橛閾門限也孔氏曰此一節明大夫士出入君門之法門以向堂為正右在東也主人位在門東客位在門西大夫士是臣皆統於君不敢自由故出入君門恆從闑東踐履也出入不得踐履門限一則自髙二則不淨並為不敬馬氏曰由闑右不敢為賔也不踐閾不敢履髙也孔子之於事君也立不中門行不履閾長樂陳氏曰自外以向內則以入為左右而右常在東自內以向外則以出為左右而右常在西門以向內為常由闑右則由闑東也與客就主人之階同意不踐閾與不蹙路馬同意天子適其臣由阼階大夫士出入君門由闑右蓋天子無適而不為主大夫士無時而不純臣也故賔客公事自闑西私事自闑東蓋公事則以公禮入私事則以臣禮入永嘉戴氏曰君門雖逺有君在焉臣子烏得而不敬出入君門如見其君然鞠躬屏息不敢中立不敢履閾所以習其恭敬卑下之意也推此意也其敢喧譁於殿陛之間乎見君之乘車與君之路馬猶不敢慢也況入君門者乎以此教天下朝廷之儀猶有不肅者況於君門乎雖然此大夫士自事其君之禮也若適他國為聘享之禮則不然少儀曰公事自闑西私事自闑東凡與客入者每門讓於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入主人入門而右客入門而左鄭氏曰每門讓下賔也敵者迎於大門外聘禮曰君迎賔於大門內為席猶敷席雖君亦然固辭又讓先入肅進也進客謂道之右就其右左就其左孔氏曰自此至左足明賔與主人送迎相讓及升堂行步之法言凡者通貴賤也每門者天子五門諸侯三門大夫二門客敵者主人出門外迎客主人遜不先入自謙下敬於賔也此云凡與客入謂燕也故下文云至寢門謂燕在寢也若相朝饗食皆在廟寢門最內門也主人向已應正席今客至內門方請先入敷席者一則自謙示不敢逆設席以招賢二則重慎更宜視之禮有三辭初曰禮辭再曰固辭三曰終辭客已再辭故主人進道客公食大夫禮公揖入賔從是也藍田吕氏曰禮之於賔主無不答也及門而遜入及階而遜登乃主人答客也主遜而客辭也客若降等則就主人之階主人固辭然後客復就西階乃客答主人也客遜而主辭也一入門一登階賔主更為辭遜而不以為煩此禮之所以養人之深也每門遜於客者門不一也有大門有寢門若行禮於廟則有廟門敵者則迎於大門之外士冠士昏聘禮賔射鄉飲皆行於廟主人迎賔于大門外是也敵以下則迎於大門之內聘禮公皮辨迎賔于大門內是也肅客謂俯手以揖之周官大祝九拜所謂肅拜也春秋傳曰敢肅使者是也嚴陵方氏曰寢門在人君則稱路門主人請為席將以行禮也請起事也於主人之將有為則曰請辭止事也於客之不敢當則曰辭永嘉戴氏曰盛哉先王之禮也洋洋乎宰制萬物役使羣動其端則起於辭遜之心而己觀大賔大客之禮周旋揖遜於其間使之起敬起慕何其盛哉送迎之際登降之節一先一後一左一右為主人者極其恭敬不敢慢之心為客者不勝其愧縮不敢當之意交相辭遜退避不皇於此乎可以觀禮矣長樂陳氏曰主人於賔迎之無不拜每門每曲無不揖此言迎而不言拜則拜可知言每門讓而不言每曲揖則揖可知長樂劉氏曰此經以下雖曲碎之儀然皆賔主之所常蹈一失其義於禮則違三代聖賢莫不由是以成其德行也故委曲記之有足以見古昔禮義之行皆以恭敬揖遜謙謹以為本焉子男以上相為賔之禮則如諸公司儀之職皆以車迎車送無主人先入為席之事此諸侯大夫士相為賔之禮也廬陵胡氏曰然後出迎客不敵則不出客固辭不肯先入主人肅客而入成十六年左氏云三肅使者杜云肅手至地主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階鄭氏曰降下也謂大夫於君士於大夫也不敢輒由其階卑統於尊不敢自専就西階復其正孔氏曰降等卑下之客也不敢亢禮故就主人階繼屬於主人鄭注大夫於君謂他國大夫也聘禮公迎賔賔不就主人階公食大夫禮公迎賔賔入門左注云左西方此皆是降等不就主人階者並奉己君之命不可苟下主人故從客禮也嚴陵方氏曰與主共階則以卑從尊而於禮為殺與主異階則以此敵彼而於禮為亢客若降等則為殺矣故就主人之階與大夫士出入君門由闑右同義主人與客讓登主人先登客從之拾級聚足連步以上上於東階則先右足上於西階則先左足鄭氏曰拾當為涉聲之誤也級等也涉等聚足謂前足躡一等後足從之併連步謂足相隨不相過重蹉跌也先右先左近於相鄉敬也孔氏曰客主至其階又各讓不先升也讓必以三三竟而客不從故主人先登亦肅客之義拾級聚足上階法也連步以上者上上堂也在級未在堂後足不相過故云連步涉而升堂故云以上橫渠張氏曰拾級聚足此等事但敬事自至如此非著心安排而到藍田吕氏曰拾更也射者拾發投壺者拾投哭踊者拾踊皆更為之也拾級者左右足更上也上階以相鄉為敬廬陵胡氏曰拾級聚足拾掇也拾物必俯言躡等級必俯視地若拾物然帷薄之外不趨堂上不趨執玉不趨堂上接武堂下布武室中不翔並坐不橫肱授立不跪授坐不立鄭氏曰帷薄之外不見尊者行自由不為容也行而張足曰趨堂上為其迫也堂下則趨執玉不趨志重玊也聘禮曰上介授賔玊於廟門外武迹也迹相接謂每移足半躡之中人之迹尺二寸布武謂每移足各自成迹不相躡室中不翔亦為其迫也行而張拱曰翔橫肱為害旁人不跪不立為煩尊者俯仰受之孔氏曰此一節言趨步授受之儀帷幔也薄簾也疾趨而行敬也貴賤各有臣吏故其敬處亦各有逺近禮天子外屏諸侯內屏卿大夫以簾士以帷外屏門外為之內屏門內為之邦君樹塞門是也今言帷薄謂大夫士也堂上迫狹下階則趨故論語云沒階趨進翼如也執玉須謹不論堂之上下皆不疾趨若張足疾趨則或蹉跌失玉鄭引聘禮證賔有執玊於堂下時也授立不跪者謂尊者立之時卑者以物授尊者不得跪煩尊者俯受若尊者形短雖卑者得跪以授之故少儀云受立授立不坐性之直者則有之矣藍田吕氏曰凡見尊者以疾行為敬然有不必趨者帷薄之外非尊者所見可以紓其敬也有不可趨者堂上地迫不足以容步執玉之重或虞於失墜也長樂陳氏曰文者上之道武者下之道故足在體下曰武綏在冠下亦曰武帷薄之外不趨執玉不趨不敢趨也室中不翔不可翔也或言趨或言武蓋接武者不趨趨者不接武趨者或布武布武者不趨也少儀曰受立授立不坐性之直者有之然則受立授立而坐皆曲道也公食大夫禮贊者坐取黍興以授賔授立不坐也聘禮賈人坐取圭不起而授上介君子不以為非禮者賤不足與為禮也嚴陵方氏曰趨足容也翔手容也堂上不趨未必不翔室中不翔則不趨可知矣授立不跪者為煩尊者之俯也授坐不立者為煩尊者之仰也少儀言受立授立不坐則不特授尊者而然雖受卑者亦然矣永嘉戴氏曰進趨之禮君子所以為容也有徐趨焉有疾趨焉徐趨者大夫繼武士中武疾趨者欲發而手足毋移雖疾徐不同而皆有翼如之勢焉君子之動也有行有趨有走凡君召二節以走一節以趨父母呼走而不趨常事則行為禮則趨其不敢輕也若此帷薄之外不趨尊者不在逞顔色之意也堂上不趨懼其迫隘室中不翔之意也堂下則趨矣執玉不趨懼其或墜執圭鞠躬之意也執龜策則亦不趨玉藻曰執龜玉舉前曵踵蹜蹜如也有接武有繼武有中武有布武繼武者足相及舉後足以繼前足也中武者兩跡之間復容一跡接武者行速布武者行緩堂上不趨故接武而行速堂下必趨故布武而行緩一舉足之遲速君子不敢輕焉信乎禮之嚴也凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自鄉而扱之鄭氏曰加帚於箕得兩手奉箕恭也謂初執而往時也弟子職曰執箕膺擖厥中有帚以袂拘謂掃時也以袂擁帚之前掃而却行之扱讀曰吸謂收糞時也箕去棄物以鄉長者則不恭孔氏曰自此至為上明為尊者掃除布席之儀鄭引弟子職管子之書篇名也袂衣袂也退遷也當掃時郤遷以一手捉帚又舉一手衣袂以拘障於帚前且掃且遷故云拘而退扱斂取也橫渠張氏曰古者止是子弟事父母豈有使人而事者故至於糞除皆有禮使父母得以逺厮僕正由承順長上遂知接物須有文章藍田吕氏曰糞除布席役之至褻者也然古之童子未冠為長者役而其心安焉蓋古教養之道必本諸孝弟入則事親出則事長事親孝也事長弟也孝弟之心雖生於惻隱恭敬之端孝弟之行常在於灑掃應對執事趨走之際蓋人之有血氣者未有安於事人者也今使知長者之可敬甘為僕御之役而不辭是所以存其良心折其傲慢之氣然後可與進於德矣加帚箕上執之以從事也以袂拘而退其塵不及長者雖糞除之際不敢忘敬也以箕自向而扱之扱謂箕扱於糞中以糞也讀如尸扱以柶祭羊鉶之扱謂箕扱於糞如柶扱於鉶也注以扱為吸恐未然嚴陵方氏曰除物之棄謂之糞帚則用之除而致飾者也以箕自向而扱之者蓋非特塵不及長者亦不欲長者見其所棄之物故也永嘉戴氏曰灑掃應對進退小子之事也君子於此觀學焉推此意也其敢自處其逸而遺長者以勞自處其安而置長者於不安之地乎王氏蘋曰學者須是下學而上達灑掃應對即是道德性命之理此章所言糞除之禮試體究此時此心如何其理微矣樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也學者只是說過試以此言踐履之體究之斯知上達之理矣聖人之道無本末無精粗徹上徹下只是一理奉席如橋衡請席何鄉請衽何趾席南鄉北鄉以西方為上東鄉西鄉以南方為上鄭氏曰席橫奉之令左昂右低如有首尾然橋井上㮮槹衡上低昂請席請衽順尊者所安也衽卧席也坐問鄉卧問趾因於隂陽布席無常上謂席端也坐在陽則上左坐在隂則上右孔氏曰所奉席頭如橋之衡衡橫也左尊故昂右卑故垂但席舒則有首尾卷則無首尾此謂卷席奉之之法當隨尊者所欲眠坐也鄉面也趾足也坐為陽面亦陽也卧是隂足亦隂也皆從所安也東西設席南鄉北鄉則以西方為上頭也所以然者凡坐隨於隂陽若坐在陽則貴左坐在隂則貴右南坐是陽其左在西北坐是隂其右亦在西也俱以西方為上若南北設席皆以南方為上者坐在東方西鄉是在陽以南方為上坐若在西方東鄉是在隂亦以南方為上此據平常布席如此若禮席則不然藍田吕氏曰席坐席也布坐席必問何所鄉布卧席必問何所趾唯長者命也南向東向皆坐在隂則上右南向者以西為右東向者以南為右也北向西向皆坐在陽則上左北向者以西為左西向者以南為左也嚴陵胡氏曰此謂卷席奉之如橋橫取中平而兩頭下嚴陵方氏曰南鄉則北坐者也北鄉則南坐者也坐南則西在人之左坐北則西在人之右南陽也而陽上左北隂也而隂上右以左右皆在西也故皆以西方為上東鄉西鄉以南方為上其義亦若是而已金華應氏曰橋橋梁也衡即橫也或曰平也橋橫於水至平也而橋之橫木尤平奉席者正平無欹其狀亦然耳古人用席於地禮畢則斂而收之四方異向蓋其堂室之面勢或不同則隨時設張亦不一所以酌地宜也隂陽殊上蓋其方位之旋轉或不同則隨氣斟酌亦不定所以順天道也順其方之所重為其位之所尊君子之行禮何容心哉天理人事常相因而已矣金華邵氏曰自此至足毋蹶大率有四始奉席次請席三布席四就席奉席則欲順席之理次請席問其欲坐卧之地次布席則平常之席講問之席各有其儀至就席又有就席之儀賔主之間安得不敬乎若非飲食之客則布席席間函丈主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐鄭氏曰非飲食謂講問之客也函猶容也講問宜相對容丈足以指畫也飲食之客布席於牖前丈或為杖雖來講問主人跪正席猶以客禮待之異於弟子撫之者答主人之親正徹去也去重席謙也再辭曰固客踐席乃坐客安主人乃敢安也講問宜坐孔氏曰自此至毋蹶明客主之禮儀布席謂舒之令相對若飲食燕饗則賔位在室外牖前列筵南嚮布席不須相對相對者惟講問之客須講說指畫使相見也文王世子云逺近間三席席之制三尺三寸三分寸之一則三席是一丈故鄭云容丈也主人宜敬故跪而正席撫謂以手按止之不聽主人之正席也主人為客設多重席客謙而自徹禮器云諸侯三重大夫再重又鄉飲酒禮公三重大夫再重是尊者多卑者少也主人固辭者再辭止客之徹也尊卑有數而客必徹之者既來講說本以德義相接不以尊卑為用故雖尊猶自徹也客還履席將坐主人待客坐乃坐也鄭注丈或為杖王肅以為古人講說用杖指畫故或容杖也藍田吕氏曰主人敬客故跪正席客敬主人則徹重席主敬客則客辭客敬主則主辭賔主之禮所以答也一辭而許曰禮辭禮云賔禮辭許是也再辭曰固辭此賔主辭讓之節也長樂陳氏曰公食大夫之禮賔卷加席而公不辭大夫相食之禮賔卷加席而主人辭或辭或否以其敵與不敵故也金華應氏曰席間函丈其地寬則足以揖遜回旋而不至於迫其分嚴則足以致敬盡禮而不至於褻非若飲食之客徒欲便於勸酬以為歡也學校之禮凡侍坐於大司成者逺近間三席故鄭氏以為講問之客要亦泛言賔主相見之儀而講問在其中其下文終之以侍坐於先生之法者蓋古人相見必以講論請問為事不徒為請謁之煩文曲禮詳於教幼者嚴於事長者故獨致其丁寧而詳言之主人不問客不先舉將即席容毋怍兩手摳衣去齊尺衣毋撥足毋蹶鄭氏曰客不先舉者客自外來主人宜問其安否無恙及所為來故怍顔色變也齊謂裳下緝也撥發揚貌蹶行遽貌孔氏曰舉亦問也即就也弟子講問初來就席顔色宜莊不得變動顔色摳提挈也衣謂裳也將就席時以兩手當裳前提挈使起令裳下緝去地一尺恐衣長轉足躡履之橫渠張氏曰怍慚怍也動中禮節即無怍也今前却遲疑不知所措者不知禮者也席以四人為節必是並坐一行也長樂陳氏曰摳衣去齊尺則不如流矣圈豚行不舉足齊如流則不摳衣矣或以摳衣為敬或以如流為敬與無事則裼有事則襲同意藍田吕氏曰怍者愧赧不安之貌愧赧不安失之野也齊深衣齊也深衣下齊如權衡衣毋撥者收斂之不使旁有觸也足無蹶不匆遽使之躓也三者謂行容也摳衣毋撥皆裳而言衣者蓋統而言雖裳亦衣也先生書䇿琴瑟在前坐而遷之戒勿越虛坐盡後食坐盡前坐必安執爾顔長者不及毋儳言正爾容聽必恭毋勦說毋雷同必則古昔稱先王鄭氏曰戒勿越廣敬也在前謂當行之前虛坐盡後謙也食坐盡前為汙席執猶守也儳猶暫也非類雜也聽必恭聽先生之言既說又敬勦猶攬也謂取人之說以為己說雷之發聲物無不同時應者人之言當各由己不當然也孟子曰無是非之心非人也稱先王言有依據孔氏曰自此至不唾明弟子事師子事父之禮䇿篇簡也坐亦跪也坐通名跪跪名不通坐也越踰也弟子將行若遇師諸物或當已前則跪而遷移之戒勿得踰越也凡坐各有法虛空也空謂非飲食坐也盡後不敢近前謙也玉藻云徒坐不盡席尺是也食坐謂飲食坐也古者地鋪席而俎豆皆陳於席前之地若坐近後則濺汙席玉藻云讀書食則齊豆去席尺是也凡坐好自搖動故戒令必安坐執守也久坐好異故戒之長者猶先生互言耳及謂所及之事也長者正論甲事少者不得以乙事暫然雜之聽宜恭敬也語當稱師友而言無得攬人說以為己語則法也言雖不當雷同又不得専輒必法於古昔之正所言之事必稱先王藍田吕氏曰書䇿琴瑟之為物先生之所常御也物猶加敬人可知也虛坐盡前則若飲食然故盡後以示之坐必安執爾顔者侍坐於先生不敢懈也儳言者乘人之所未及而言之也事長者必思所以下之乘其不及而儳言是欲勝故不為也正爾容聽必恭敬長者之教而不敢慢也竊人之財猶謂之盜勦取他人之說以為己有私也不以心之然不然志在隨人而雷同之亦私也上焉者雖善無徴無徴弗信弗信民弗從必則古昔稱先王則求其有徴而使民信也民未信也吾雖自信亦不可行也長樂陳氏曰物固無情於人而人非有心於物其所以有心於物而敬慢愛惡之者凡因其人而已故臣之於君至於路馬則不敢齒路馬之芻則不敢蹙見几杖則起遭乘輿則下子婦之於父母舅姑至於衾簟枕几則不敢傳杖屨則不敢近弟子之於師至於書䇿琴瑟則不敢越皆因其人而敬之故也於物猶然則凡所愛之人可知矣樂書曰道雖不在書䇿而學道者必始於書䇿道雖不在琴瑟而樂道者必始於琴瑟古之所謂先生者非為其長於我也為其聞道先乎吾而已聞道先乎吾吾從而師之不特見其人而尊敬之也雖見其載道之書䇿樂道之琴瑟亦必尊而敬之非敬書䇿琴瑟而已所以敬道也李氏曰子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顔色而言謂之瞽儳說近躁雷同近瞽詩曰古之人無斁書曰昔之人罔聞知皆老人之稱也先王典型之所自立也所見故曰則所聞故曰稱此先王之時所以無淫辭詖行也詩曰雖無老成人尚有典刑古之人固以老成人急於典刑故先曰則古昔金華應氏曰虛坐則書䇿琴瑟設張於前且以待他人之周旋往來故盡後而欲其寬廣焉食坐則俎豆尊爵前列於地且欲便賔主之酬酢授受故盡前而欲其親近焉永嘉戴氏曰門人稱夫子之德曰恭而安今曰坐必安必有用力之辭焉夫子在朝廷在鄉黨鞠躬屏息恂恂而言逞顔色居不容無非自然之德也今曰執爾顔執有特守之義焉此皆初學者所當盡心也廬陵胡氏曰勦猶抄也襄二十五年崔慶之盟杜預云讀書未終晏子抄答易其辭是謂勦說唐德宗謂陸贄雷同道聽加質則窮新安朱氏曰說文云儳互不齊也儳言儳長者之先而言嚴陵方氏曰既曰古又曰昔皆以别於今而言耳言古則不止於昔言昔則未至於古也若所謂太古上古則不止於昔可知若所謂疇昔通昔則未至於古可知别而言之固如此合而言之古亦可謂之昔昔亦可謂之古言必則古昔以見前乎今者皆在所則也既曰古昔又曰先王何也古昔者先王之時先王者古昔之人詩曰自古在昔先民有作其義正與此合馬氏曰則古昔稱先王君子無所接而不然獨施於長者何也蓋長者尤所宜敬也孟子曰我非堯舜之道不敢以陳於王前齊人莫如我敬王蓋則古昔而稱先王所以敬長者也侍坐於先生先生問焉終則對請業則起請益則起父召無諾先生召無諾唯而起鄭氏曰終則對不敢錯亂尊者之言也請業請益則起尊師重道也起若今摳衣前請業謂篇卷益謂受說不了欲師更明說之子路問政請益是也唯諾皆應辭唯恭於諾孔氏曰漢時受學有摳衣前請之法故鄭引證之唯也父與先生呼召稱諾則似寬緩驕慢藍田吕氏曰此章言弟子敬師之道問未終而對不敬其所問也業謂所學於先生者如詩書禮樂之類是也益謂所問未明或欲卒學或欲少進也有所請必起敬業也敬業所以敬師敬師所以敬道也故請業請益皆不可不起也弟子之事師猶子事父父召無諾則先生召亦無諾諾者許而未行也唯而起聞召即往也玉藻云父命呼唯而不諾手執業則投之食在口則吐之廣陵方氏曰有所請必起者所以重道也孔子與曾參言復坐吾語汝則弟子之於先生有所請必起可知矣長樂陳氏曰諾者應之緩唯者應之速以道則唯諾無以殊以禮則緩速有所辨故曰父召無諾先生召無諾唯而起蓋子之於父弟子之於師其畏敬之篤常聽於無聲視於無形於其所未召也常若有所召則於其召也敢諾而不唯乎內則應唯敬對事父之禮也論語曾子曰唯事師之禮也為人臣者君命召在內不俟屨在外不俟車亦唯而起之意也侍坐於所尊敬毋餘席見同等不起燭至起食至起上客起燭不見跋尊客之前不叱狗讓食不唾鄭氏曰毋餘席必盡其所近尊者之端為有後來者見同等不為私敬燭至異晝夜食至為饌變上客起敬尊者跋本也燭盡則去之嫌若燼多有厭倦也主人於尊客之前不敢倦叱狗嫌若風去之唾嫌有穢孔氏曰先生坐一席已坐一席已坐勿得使近尊者之端席有空餘欲得親近備擬先生顧問且擬後人之來闕其在下空處以待之上客謂尊者之上客尊者見之則起侍者宜從之而起食與燭至起則尊者不起跋本謂把處古者未有蠟燭唯呼火炬為燭火炬易盡則藏所然殘本若積聚殘本客見之則知夜深慮主人厭倦有尊客而叱狗則似厭客欲去之也卑客亦當然舉尊為甚藍田吕氏曰所尊敬謂天下達尊有爵有德有齒者也侍坐無餘席欲近尊者以聽教也燭者童子之所執燭盡則更之不以所殘之本以示人使客不敢安也狗於尊客之前不敢叱者嫌于客也二者皆弟子之職故於侍坐者及之讓食之際不敢唾者嫌若訾主人食亦不敬也橫渠張氏曰上客則主必起故坐客皆起非上客則主不起坐者亦不敢修私敬故無二尊也燭至起事之變也始虛坐至設食則起二者皆變於外也下缺伸撰杖屨亦變也故起今有人熟於人事亦能中禮文而誠不足所謂文勝質則史也史者祝史之謂也君子之禮因文以致誠長樂劉氏曰燭至起不敢妨其息也食至起不敢妨其食也上客起不敢専其席也燭不見跋趾也將至跋而退不敢及其更也嚴陵方氏曰侍坐於所尊敬母餘席欲其近而應對之審也尊者之坐宜不得近以欲對之審雖於所尊亦不嫌近乃所以敬也同等不起與己無上下之間故也燭至起以未卜夜故也食至起為盛饌變故也經有曰侍先生侍所尊侍君子侍長者何也曰先生以教稱之也曰所尊以道稱之也曰君子以德稱之也曰長者以年稱之也禮記集說卷四
