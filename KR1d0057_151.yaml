body:
  text: 禮記集説卷一百五十一宋衛湜撰詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僩兮赫兮喧兮有斐君子終不可喧兮如切如磋者道學也如琢如磨者自修也瑟兮僩兮者恂栗也赫兮喧兮者威儀也有斐君子終不可喧兮者道盛德至善民之不能忘也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也鄭氏曰此心廣體胖之詩也澳隈崖也猗猗喻美盛斐有文章貌也喧忘也道猶言也恂字或作峻讀如嚴峻之峻言其容貌嚴栗也民不能忘以其意誠而德著也聖人既有親賢之德其政又有樂利於民君子小人各有以思之孔氏曰瞻彼淇澳菉竹猗猗此詩衛風淇澳之篇美衛武公之德也如骨之切如角之磋如玉之琢如石之磨瑟然顔色矜莊僩然性行寬大赫然顔色盛美喧然威儀宣著恂栗謂顔色莊栗有斐君子者論道武公盛德至善人之愛念不能忘也於戲前王不忘周頌烈文之篇也於戲猶言嗚呼以文王武王意誠於天下故詩人歎美之云此前世之王其德不可忘也藍田吕氏曰切磋者解割之謂也琢磨者修治之謂也有璞玉於此將以為圭則必先解而為圭之質將以為璧則必先解而為璧之質如學者之志欲止於小善則以小善為之質欲止於至善則以至善為之質琢磨者即其質以修治其文小善之質止可以修小善之文至善之質然後可以修至善之文故如圭之質不能琢磨而成璧璧之質不能琢磨而成圭故曰如切如磋道學也如琢如磨自修也恂栗者敬其學也威儀者見之文也斐文之著也學止於至善積而為盛德至於文章著見則入於民心者深矣此誠之不可掩也故民不能忘也誠之至者非特入於民心其所以道民者澤流於後世矣賢其賢親其親君子化其善也樂其樂利其利小人蒙其惠也山隂陸氏曰赫兮喧兮者威儀也者所謂威儀棣棣光美相逮如此經曰乃出揖私朝輝如也登車則有光矣德言盛善言至亦言之法此以沒世不忘也進於武公矣武公老而如此雖死猶如此也石林葉氏曰道學求諸人自修求諸己恂栗者誠於內威儀者文於外求諸人求諸己所以有至善也故曰發慮憲求善良誠於內文於外所以有盛德也故曰動容周旋中禮盛德之至善則民歸之不忘也故曰有斐君子終不可喧兮有盛德至善則民無間於君子小人皆在所不忘也然而君子懷德故賢其所賢者義也親其所親者仁也小人懷惠故樂其所樂者亦義也利其所利者亦仁也廬陵胡氏曰民不忘美衛武之誠沒世不忘美文武之誠夫誠至於民懷不忘其誠至矣莆陽林氏曰此詩序云美武公之德言其表裏相稱也故能先誠其意自然修身可觀菉竹生於水傍自然猗猗而盛斐然如君子氣象蓋由切磋琢磨而成就其材如此終是令人不能忘也下文乃戴記解此詩蓋訓詁之學其來也逺自漢以前有之矣道治也謂學問以治之由學問然後日漸月漬所謂自修也言其學問而治之如切如磋也日漸月漬非一朝一夕之故如琢如磨也後又引於戲前王不忘説不能忘之義謂君子所以不能忘前王者謂其賢者則知其賢其可親者則親之小人所以不能忘前王者謂民之所樂前王亦與之同其樂民之所利前王亦與之同其利君子小人不能一日忘之也新安朱氏曰此與詩云邦畿千里至止於信皆傳之三章釋止於至善淇水名澳隈也切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢錫磨以沙石皆治物使其滑澤也治骨角者既切而復磋之治玉石者既琢而復磨之皆言其治之有緒而益致其精也瑟嚴密之貌僩武毅之貌赫喧宣著盛大之貌喧忘也道言也學謂講習討論之事自修者省察克治之功恂栗戰懼也威可畏也儀可象也引詩而釋之以見能得至善之所由而又以贊其德容之盛也於戲歎辭前王謂文武也君子謂後賢後王小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也此兩節咏嘆淫泆其味深長當孰玩之曰復引淇澳之詩何也曰上言止於至善之理備矣然其所以求之之方與其得之之驗則未之及故又引此詩以發明之也夫如切如磋言其所以講於學者已精而益求其精也如琢如磨言其所以修於身者已密而益求其密也此其所以擇善固執日就月將而得止於至善之由也恂栗者嚴敬之存乎中也威儀者輝光之著乎外也此其所以脺面盎背施於四體而為止於至善之驗也盛德至善民不能忘蓋人心之所同然聖人既先得之而其充盛宣著又如此是以民皆仰之而不能忘也盛德以身之所得而言也至善以理之所極而言也切磋琢磨求其止於是而已矣曰切磋琢磨何以為學問自修之别也曰骨角脈理可尋而切磋之功易所謂始條理之事也玉石渾全堅確而琢磨之功難所謂終條理之事也曰引烈文之詩而言前王之沒世不忘何也曰賢其賢者聞而知之仰其德業之盛也親其親者子孫保之思其覆育之恩也樂其樂者含哺鼓腹而安其樂利其利者耕田鑿井而享其利也此皆先王盛德至善之餘澤故雖沒世而人猶思之愈久而不能忘也龍泉葉氏曰學者以密察之功微細以驗之積漸以充之誠意所貫本末光明其或文或質或淺或深疾徐反復之際式有可觀之義蓋君子察之於內衆人察之於外唯其中無可愧外無可憾所以詩人之形容若此之盛也學者強為善而已非以求之於人也及其為善之至純實著見而不可掩則斯民記之矣建安真氏曰如切如磋道學也主知而言如琢如磨自修也主行而言此言致知力行之功當並進也知到十分精處而行處有一分未密亦未得為至善須是知極其至行亦極其至方謂之至善康誥曰克明德太甲曰顧諟天之明命帝典曰克明峻德皆自明也湯之盤銘曰苟日新日日新又日新康誥曰作新民詩曰周雖舊邦其命維新是故君子無所不用其極鄭氏曰克能也顧念也諟猶正也帝典堯典亦尚書篇名峻大也皆自明明德也盤銘刻戒於盤也極猶盡也孔氏曰周公封康叔作康誥太甲伊尹戒太甲之辭盤銘湯沐浴之盤刻銘為戒必於沐浴之盤者戒之甚也苟日新苟誠也非唯沐浴自新誠使道德日益新也非唯一日之新當使日日益新非唯日日益新又須恆常日新皆是丁寧之辭作新民者周公使康叔作新殷民也周雖舊邦其命維新此大雅文王之篇言周雖舊是諸侯之邦其受天之命謂為天子而更新也河南程氏曰克明峻德顧諟天之明命皆自明也者皆由於明也藍田吕氏曰古者大人之學未嘗不先自明其德然後及於天下故引湯誥太甲堯典之言以明文王湯康皆自明也新之為言革其故也理義者人心之所同然唯大人為先得之德之不明也以民之未知乎此也德之不行也以民之未得乎此也先知覺後知先覺覺後覺則易昏為明易惡為善變化氣質如螟蛉之肖蜾裸是豈不為新乎雖然自明明德者亦日新也合內外之道故自新然後新民也湯之盤銘自新者也康誥文王之詩新民者也君子治己治人其究一也故曰無所不用其極嚴陵方氏曰日新者日新其德也易曰日新之謂盛德苟日新者言日新之有始也日日新者言日新之有繼也又日新者言日新之有加也既有始又有繼又有加則日新其德於是為至極之為言至也所與書言君子所其無逸之所同義蓋有所則有用有用則有極既有所矣其可不用其極乎故其言如此然君子之日新非特在已下以治民上以承天亦莫不然故又引詩書之言以證之則無所不用其極又在乎此山隂陸氏曰諟之在前顧之在後極至也未有不用其極而能新者也石林葉氏曰新之至於又新者德之在己也作新民德之在人也其命新者德之在天也蓋君子之德至於受天之命而後極其明德也廬陵胡氏曰日新自明也新民明民也自明明民物我一致兩造其極是謂無所不用其極極中也民不協於極者由不明也上之人能易昏為明變化氣質使之自新以趨於中道是為用其極也東萊吕氏曰易曰天行健君子以自強不息者新之謂也於穆不已天之所以為天也純亦不已文王之所以為文也其不已者新之謂也新者天之道也日月之運行萬物之發生無窮已也君子無所不用其極者知此道也其自新也以堯舜之道為必可行以堯舜之德為必可至其新民也使是君為堯舜之君使是民為堯舜之民所謂無所不用其極也然非不息不已則不能至此延平周氏曰易曰窮理盡性窮其在己之理然後能窮其在物之理盡其在己之性然後能盡其在物之性未有不自明其在己者而能明其在物者也此君子所以貴乎自明新之無已而至於極則聖人也此君子所以用其極新安朱氏曰太甲殷書顧謂常目在之也天之明命即天之所以與我而我之所以為德者也常目在之則無時不明矣皆自明也結所引書皆言自明已德之意此傳之首章釋明明德也湯之盤銘以下此傳之二章釋新民也銘名其器以自戒之辭也苟誠也湯以人之洗濯其心以去惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汚而自新則當因其已新者而日日新之又日新之不可略有間斷也作新民鼓之舞之之謂作言振起其自新之民也詩曰周雖舊邦其命維新言周國雖舊至文王能新其德以及於民而始受天命也是故君子無所不用其極自新新民皆欲止於至善也曰然則其曰克明德者何也曰此言文王能明其德也蓋人莫不知德之當明而欲明之然氣稟拘之於前物欲蔽之於後是以雖欲明而有不克也文王之心渾然天理亦無待於克之而自明矣然猶云爾者亦見其獨能明之而他人不能又以見夫未能明者之不可不致其克之之功也曰顧諟天之明命何也曰人受天地之中以生故人之明德非他也即天之所以命我而至善之所存也是其全體大用蓋無時而不發見於日用之間人唯不察於此是以汨於人欲而不知所以自明常目在之而真若見其參於前倚於衡也則成性存存而道義出矣曰克明峻德何也曰言堯能明其大德也曰是三者固皆自明之事也然其言之亦有序乎曰康誥通言明德而已太甲則明天之未始不為人而人之未始不為天也帝典則專言成德之事而極其大焉其言之淺深亦略有序矣或問盤之有銘何也曰盤者常用之器銘者自警之辭也古之聖賢兢兢業業固無時而不戒謹恐懼然猶恐其有所怠而忽忘之也是以於其常用之器各因其事而刻銘以致戒焉欲其常接乎目每警乎心而不至於忽忘之也然則沐浴之盤而其所期之辭如此何也曰人之有是德猶其有是身也德之本明猶其身之本潔也德之明而利欲昏之猶身之潔而塵垢汚之也一旦存養省察之功真有以去其前日利欲之昏而日新焉則亦猶其疏瀹澡雪而有以去其前日塵垢之汚也然既新矣而所以新之之功不繼則利欲之交將復有如前日之昏猶既潔矣而所以潔之之功不繼則塵垢之集將復有如前日之汚也故必因其已新而日日新之又日新之使其存養省察之功無少間斷則明德常明而不復利欲之昏亦如人之一日沐浴而日日沐浴又無日而不沐浴使其疏瀹澡雪之功無少間斷則身常潔清而不復為舊染之汚也昔成湯所以反之而至於聖者正唯有得於此故稱其德者有曰不邇聲色不殖貨利又曰以義制事以禮制心有曰從諫弗咈改過不吝又曰與人不求備檢身若不及此皆足以見其日新之實至於所謂聖敬日躋云者則其言愈約而意愈切矣然本其所以得此又其學於伊尹而有發焉故伊尹自謂與湯咸有一德而於復政太甲之初復以終始惟一時乃日新為丁寧之戒蓋於是時太甲方且自怨自艾於桐處仁遷義而歸是亦所謂苟日新者故復推其嘗以告於湯者告之欲其日進乎此無所間斷而有以繼其烈祖之成德也其意亦深切矣其後周之武王受師尚父丹書之戒而謂敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶退而於其几席觴豆刀劔户牖莫不銘焉蓋聞湯之風而興起者今其遺語尚幸頗見於大戴之禮書願治之君志學之士亦不可以莫之考也曰此言新民其引此何也曰此自其本而言之蓋以是為自明之至而新民之端也曰康誥之言作新民何也曰武王之封康叔也以殷之餘民染紂汚俗而失其本心也故作康誥之書而告之以此欲其有以鼓舞而作興之使之振奮踴躍以去其惡而遷於善舍其舊而進乎新也然此豈聲色號令之所及哉亦自新而已矣曰孔氏小序以康誥為成王周公之書而子以武王言之何也曰此五峰胡氏之説也蓋嘗因而考之其曰朕弟寡兄者皆為武王之自言乃得事理之實而其他證亦多小序之言不足深信於此可見然非此書大義所關故不暇於致詳當别為讀書者言之耳曰詩之言周雖舊邦其命惟新何也曰言周之有邦自后稷以來千有餘年至於文王聖德日新而民亦丕變故天命之以有天下是其邦雖舊而命則新也蓋民之視效在君而天之視聼在民君德既新則民德必新民德既新則天命之新亦不旋日矣曰所謂君子無所不用其極者何也曰此結上文詩書之意也蓋盤銘言自新也康誥言新民也文王詩言自新新民之極也故曰君子無所不用其極極即至善之云也用其極者求其止於是而已矣新定邵氏曰以事情揆之日日盥頮人之所同也日日沐浴恐未必然內則篇記人子之事父母亦不過五日則燂湯請浴三日具沐而已斯銘也其殆刻諸盥頮之盤歟長樂陳氏曰賢者以其昭昭使人昭昭然則欲明明德於天下必先自明也新民者必先自新也至於所止不同亦皆至善也永嘉薛氏曰明德峻德也日新德新也龍泉葉氏曰人之於德皆自明也豈有明之者哉火有不息之光泉有不竭之流人之欲自明也窮天下之欲不能蔽其逹而行之也合天下之力不能遏如水火焉益深益熱而不可禦也聖賢親身行之則知自明之為功矣徒口耳記問而己者若之何哉新與明皆學者功用之要也新則明明則新太甲曰終始惟一時乃日新人無日新之效苟惟一善以自恕記其舊而忘其新得於昔而遺於今頺惰委靡日就耗散而其本然者忘矣有新有故者物也物已故而不復新者也此湯之所以銘也國之已故者不復新周故國也而文王能新之此詩之所以頌也一性之誠無故無新持之不倦存之若一人之於身鮮有不以新舊為别者自欺其身者也不二不息有始有卒則日新之功見矣一假説成德就賢之功效一假説明德是自明一假前輩所以移易在前謂是解新民然細看却只是自説日新意思建安真氏曰身之有垢特形骸之礙耳然人猶知沐浴以去之惟恐塵垢存則其體汚穢至於心者神明之府甘心為利欲所溺以昏蔽之甚如積糞壤如聚蟯蛔不肯一用其力以去之是以形體為重以心性為輕也豈不繆哉唐人櫛銘曰人之有髮旦旦思理有身有心胡不如是深得成湯銘盤之意錢塘吳氏曰德既明矣終始惟一時乃日新於是又取詩書言新者明之日新則德益輝光新其在己者也民新則風移俗易新其在人者也命新則祈天有永新其在天者也是故君子無所不用其極極者至也至則止矣故又取詩人所言止者明之止者止於至善而已如愚詩云邦畿千里惟民所止詩云緡蠻黃鳥止於丘隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信孔氏曰誠意在知所止引殷頌玄鳥之篇言殷之邦畿千里惟人所居止引小雅緡蠻之篇言黃鳥止在岑蔚丘隅之處得其所止孔子見其詩而論之云觀於鳥之所止則人亦知其所止也又大雅文王之篇言文王之德緝熙光明又能敬其所止以自居處也河南程氏曰釋氏多言定聖人便言止如物之好須道是好物之惡須道是惡物自好惡關我這裏甚事若説道我只定更無所為然物之好惡亦自在裏故聖人只言止所謂止如人君止於仁如人臣止於敬之類也易曰艮其止止其所也言隨其所止而止之人多不能止蓋人萬物皆備遇事各因其心之所重更互而出才見得這事重便有這事出若能物各付物便自分出又曰人多思慮不能自寧只是做他心主不定要作得心主唯是止於事為人君止於仁為人臣止於敬父子止於孝慈之類如舜之誅四凶已作此惡從而誅之舜初何與焉人不止於事只是攬他事不能使物各付物物各付物則是役物為物所役則是役於物有物必有則須止於事又曰於止知其所止謂當止其所也夫有物必有則父止於慈子止於孝君止於仁臣止於忠萬物庶事莫不各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也唯止之各於其所而已伊川藍田吕氏曰民之所止止於邦畿而已鳥之所止止於丘隅而已是皆知其所止矣人之於學不知所止流遁失守無所適歸終亦必亡而已矣雖黃鳥之不若也故文王之學所以緝熙者在敬其所止而已所謂仁敬孝慈信者乃為人君為人臣為子為父與國人交之至善者也其所居之地不同故所止之善不一其所以為至善則一也所謂止者猶行者之所欲至射者之所欲中雖未至也雖未中也必至必中而後已此之謂知所止石林葉氏曰邦畿千里惟民所止居而止之也緡蠻黃鳥止於丘隅擇而止之也穆穆文王於緝熙敬止安而止之也廬陵胡氏曰止得其所則善君臣父子國人止於仁敬孝慈信是為止其所雖然不明乎善雖欲擇善而止之未必得其所也故先於明明德新安朱氏曰此與前引淇澳詩皆傳之三章釋止於至善邦畿王者之都也止居也言物各有所當止之處也緡蠻黃鳥止於丘隅岑蔚之處子曰以下孔子説詩之辭言人當知所當止之處也穆穆深逺之意於歎美辭緝繼續也熙光明也敬止言其無不敬而安所止也引此而言聖人之止無非至善五者乃其目之大者也學者於此究其精微之藴而又推類以盡其餘則於天下之事皆有以知所止而無疑矣曰引緡蠻之詩而系以孔子之言孔子何以有是言也曰此夫子説詩之辭也蓋曰鳥於其欲止之時猶知其當止之處豈可人為萬物之靈而反不如鳥之能知所止而止之乎其所以發明人當知止之義亦深切矣曰引文王之詩而繼以君臣父子與國人交之所止何也曰此因聖人之止以明至善之所在也蓋天生蒸民有物有則是以萬物庶事莫不各有當止之所但所居之位不同則所止之善不一故為人君則其所當止者在於仁為人臣則其所當止者在於敬為人子則其所當止者在於孝為人父則其所當止者在於慈與國人交則其所當止者在於信是皆天理人倫之極致發於人心之不容己者而文王之所以為法於天下可傳於後世者亦不能加毫末於是焉但衆人類為氣稟物欲之所昏故不能常敬而失其所止唯聖人之心表裏洞然無有一毫之蔽故連續光明自無不敬而所至者莫非至善不待知所止而後得所止也故傳引此詩而歷陳所止之實使天下後世得以取法焉學者於此誠有以見其發於本心之不容己者而緝熙之則其敬止之功是亦文王而已矣詩所謂上天之載無聲無臭儀刑文王萬邦作孚正此意也曰五者之目詞約而義該矣子之説乃復有所謂究其精微之藴而推類以通之者何其言之衍而不切耶曰舉其德之要而總名之則一言足矣論其所以為是一言者則其始終本末豈一言之所能盡哉得其名而不得其所以名則仁或流於姑息敬或墮於阿諛孝或陷父而慈或敗子且其為信亦未必不為尾生白公之為也又況傳之所陳姑以見物各有止之凡例其於大倫之目猶且闕其二焉苟不推類以通之則亦何以盡天下之理永嘉薛氏曰止極也仁之至義之盡也知止而後能定能定則不它矣此謂知本古人之所以大過人者無所不用其極也能知所止無所往而不建其極也黃鳥尚知安身之所人而不求所止可乎龍泉葉氏曰學者之於道非有可止之法其所為力行而不息者將以成就其所止也故君力行以成就其所止之仁臣力行以成就其所止之敬子力行以成就其所止之孝父力行以成就其所止之慈人之行於世也苟知其所止雖行千里之逺而可以無厭其不知也則左足未舉而右足躓矣故動則入陷穽行則入網羅以至於死而不得其止也東萊吕氏曰止則一不止則二人之行也未得其所居則其心茫然不雜則亂也及得其所居則心自定矣此止則一也君子之學擇其所止而已矣居仁建安真氏曰大學之道在止於至善為人君為人臣與國人交各有所當止止云者必至於是而不遷之謂也以君道言之有一毫未至於仁不可以言止知仁之當為或出焉或入焉亦不可以言止何謂仁克己復禮仁之體也愛人利物仁之用也為人君者內必有以去物欲之私使視聽言動無一不合乎禮外必有以廣民物之愛使鰥寡孤獨無一不遂其生此所謂仁也必有是體然後其用行焉故聖人論仁莫先於克己也人君為天下民物之主癢痾疾痛孰非同體故君道必主於仁而為仁必極其至所謂止於至善也自古帝王獨稱堯舜為至仁者以其兼體用之全無纎微之間故也若宋襄以不禽二毛為仁梁惠以移民移粟為仁是特區區之小善耳其可以言至乎其可遽止於是乎以此推之則臣之敬子之孝父之慈與國人交之信皆以極至為當止之地若夫以貌恭為敬以從令為孝以長惡為慈以小諒為信而曰止於是焉則非所敢知也又曰文王於緝熙敬止此敬字舉全體而言無不敬之敬也為人臣止於敬專指敬君而言乃敬中之一事也文王之敬包得仁敬孝慈信新定邵氏曰此章所以釋止於至善之義也至善之道乃夫人安止之地自其大體而言之人之一身其生也生乎此道之中其處也處乎此道之內未有能出於範圍之外者也自其事為而言之視聽言動皆當由禮喜怒哀樂皆當中節亦未嘗無所止也古昔聖賢洞明乎此故其告語所及經指此道為所止之地曰安汝止者安乎此也曰欽厥止者欽乎此也謂之廣居謂之安宅無非推明乎此也自夫人講學不明蔽於物欲始曠其安宅而弗居血氣馳騖殆如寄身於逆旅甚者惰於荆棘投於陷穽溺於深淵而不自知也豈不重可歎哉子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本鄭氏曰情猶實也無實者多虛誕之辭聖人之聽訟與人同耳必使民無實者不敢盡其辭大畏其心志使誠其意不敢訟本謂誠其意也孔氏曰無情者以下記者釋夫子之意也河南程氏曰或問此謂知本止説聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志何也先生曰且舉此一事其它皆要知本聽訟則必使無訟是本也伊川橫渠張氏曰大畏民志大畏服其民志使民誠服猶神武而不殺也威德素著則民自畏服無情者不敢盡其辭則知過必改不可幸免故無訟也此則三不欺聖人皆有之愛則不忍明則不能威則不敢清江劉氏曰聽訟能判曲直豈不為美然而聖人之意以無訟為先者貴息爭於未形也延平周氏曰聖人聽訟與人同使無實之人不得盡其辭則異嚴陵方氏曰子路之折獄不及孔子之無訟召南之聽訟不及周南之無犯此所以為聖賢之辨歟夫訟者以其兩辭之情偽未辨也至若無情之人不得盡其辭豈復有訟乎非夫大畏民志固不能若是易於訟言有孚窒惕蓋謂是矣馬氏曰誠其意則使民心服不可得而欺矣大畏民志者心服之謂也藍田吕氏曰孔子上好信則民莫敢不用情故誠其意則使民服民不得而欺矣大畏民志者心服之謂也中心悅而誠服如七十子之服仲尼雖巧言如簧苟無其實為天下所不容此無情者所以不得盡其辭而可使無訟是謂誠意之效故曰知本新安朱氏曰此傳之四章釋本末猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之辭蓋我之明德既明自然有以畏服民之心志故訟不待聽而自無也觀於此言可以知本末之先後矣曰然則聽訟無訟於明德新民之義何所當也曰聖人德盛仁熟所自明者皆極天下之至善故能大有以畏服其民之心志而使之不敢盡其無實之辭是以雖其聽訟無以異於衆人而自無訟之可聽蓋已德既明而民德自新則得其本之明效也或不能然而欲區區於分爭辨訟之間以求新民之效其亦末矣此傳者釋經之意也新定邵氏曰民生有欲羣居則競民之不能無訟也久矣鼠牙雀角疑似惑人訟之未易聽察也尚矣有能裁決明審使姦猾無所遁情善良得以吐氣是亦足以為政矣然人之情偽無窮己之精力有限與其分拏鬬鬩勞吾之聽決孰若和順雍睦相安於無事是故虞芮質成未足以見文王至其目觀禮遜之俗忸怩而不忍爭然後見文王道化之懿耳夫所謂大畏民志者豈必峻厲威刑使之畏懼而不敢犯哉蓋其羞愧之心潛動於中則稍犯不韙措躬無地中庸所謂不怒而民威於鈇鉞是也昔夫子之仕於魯也將為司寇而沈猶氏之徒已為之息心而改行此其德望素隆大畏民志厥有明驗儻得邦家則綏來動和使民無訟尚奚難哉所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂修身在正其心鄭氏曰懥怒貌也或作懫或作疐孔氏曰此覆説前修身正心之事因忿怒恐懼而違於正心既不在視聽與食不覺知也河南程氏曰或謂有忿懥恐懼好樂憂患心不得其正是無此數者心乃正乎程先生曰非是要無只是不以此動其心學者未到不動處須是執持其志伊川藍田吕氏曰大人者不失其赤子之心赤子之心良心也天之所以降衷民之所以受天地之中也寂然不動虛明純一與天地相似與神明為一傳曰喜怒哀樂之未發謂之中其謂此歟此心自正不待人正而後正而賢者能勿喪不為物欲之所遷動如衡之平不加以物如鑑之明不蔽以垢乃所謂正也唯先立乎大者則小者不能奪如使忿懥恐懼好惡憂患一奪其良心則視聽食息從而失守欲區區修身以正其外難矣石林葉氏曰有忿懥恐懼好樂憂患則心有所係矣故不得其正有係而不得正則其視也必不見聽也必不聞食也必不知其味以心不在焉故也孟子曰存其心養其性所以事天蓋能正心則能存而不失故忿懥恐懼好樂憂患皆無所係此所以養性事天而修身之道也廬陵胡氏曰古之君子無所不用其正坐毋箕坐必正也立毋跛立必正也遊毋倨行必正也視毋淫視必正也聽毋傾聽必正也言不惰言必正也動不遞動必正也至於祭則正已居則正位坐則正席射則正鵠投壺則正爵無所不用其正此無他凡以正其心也心正則先立乎大者而小者不能奪忿懥恐懼好樂憂患皆其小者爾心一為小者所奪則坐立視聽言動飲食顛倒失措而天地四方易位矣故養心不可不正然古之聖人以蒙養正蓋未發之謂蒙謂喜怒哀樂未發時也能於此時養之以正則發而皆中節矣若發而後禁則扞格而難勝故正心必曰先謂正於未發之前永嘉薛氏曰中庸之學以率性為道喜怒哀樂未發謂之中有所忿懥恐懼則非所謂中而本性昏矣心者神明之舍居中虛以治五官者也心為事奪五官皆失其正非所以安神明也一正心而本性正矣范陽張氏曰心之正體無忿懥恐懼好樂憂患也其所以為忿懥恐懼好樂憂患者皆血氣也此所以言身有所忿懥至憂患而不曰心也是心者出乎忿懥恐懼好樂憂患之外者也惟忘忿懥以至憂患則心之本體見矣故正心者視而不見聽而不聞食而不知其味則以心之正體無見無聞無味處是也一流於見聞滋味之間則心之正體偏矣故正其心者消盡血氣忘忿懥以至憂患乃可耳心體既見寂然不動可也感而遂通亦可也此心正者之事正心者豈可遽言此哉學者不可不察東萊吕氏曰四者皆非心之正也然則如之何而謂之心正非知至意誠不足以識之今夫視聽言動求合乎禮以正其心則可謂之正心乎曰此求正其心而非心正也心正者非言語擬議所能形容也故唯知至意誠者能默識之居仁新安朱氏曰此傳之七章釋正心修身自此以下並以舊文為正忿懥怒也湛然虛明隨感而應者心之正也不能操而存之而苟以應物則必反為所動而纍乎其中是以不得其正耳心有不存則無以檢其身矣或問喜怒憂懼人心之所不能無也而曰心一有是則不得其正何哉曰人之一心湛然虛明以為一身之主者固其本體而喜怒憂懼隨感而應者亦其用之所不能己者也人能即其日用之間動靜之際戒慎恐懼有以存之則夫物之未感而其本體寂然不動如鑑之空如衡之平此固心之正及其既感而其為用流行不滯凡其妍媸輕重之變皆因彼之自然而隨以應之則其喜怒憂懼之用雖各不同而吾之本心鑑空衡平之體固自若也亦何害於正哉唯其不知謹戒以操而存之使其未感則昏昧而無所知已感則昏亂而無所主是以四者之應得以動乎其中而不能自定是以當其忿懥則有是忿懥而不能平也當其恐懼則有是恐懼而不能安也以至於好樂憂患莫不皆然則方寸之地日用之間紛紛擾擾而心之體用無不失其正矣心之體用既失其正則其身在此其心在彼泮散支離不能復相管攝其不為仰面貪看鳥回頭錯應人者幾希矣視而不見聽而不聞食而不知其味何足怪哉孟子所謂平旦之氣從其大體意正如此然經復有欲正其心先誠其意者蓋意有未誠則念慮之間無非邪偽固無實可用力之處而不誠無物亦無肻實用其力之人故必意之已誠然後能正其心而不肻不正其心矣大抵意誠以後規模漸濶而功夫愈密由中以及外而功夫亦不難矣又曰大學正心章已説盡了至修身章又從頭説起至齊家治國章又依前説教他節節去照顧又曰正心是就心上説修身是就應事接物上説龍泉葉氏曰忿懥恐懼好樂憂患皆物也非心也是物交於其心不出於此必入於彼物為之制則心之所存者寡矣無私主者心也物物而不物於物者心也舉喜怒哀樂無以見之而非無者心也正心之至至於不以一物纍其心則視而必見聽而必聞食而必知其味推之於身皆一心之用也意言其所發心言其所存建安真氏曰喜怒憂懼乃心之用非惟不能無亦不可無但平居無事之時不要先有此四者在胸中如平居先有四者即是私意人若有些私意塞在胸中便是不得其正須是涵養此心未應物時湛然虛靜如鑒之明如衡之平到得應物之時方不差錯當喜而喜當怒而怒當憂而憂當懼而懼恰好則止更無過當如此方是本心之正又曰文公鑒空衡平之體鑒空衡平之用此二句切須玩味蓋未曽應物之時此心只要清明虛靜不可先有一物如鑒未照物只有一箇空衡未稱物已有一箇平此乃心之本體即喜怒哀樂未曾發動渾然一理不偏不倚故謂之中也此所謂鑒空衡平之體及至事物之來隨感而應因其可喜而喜因其可怒而怒因其當憂而憂因其當懼而懼在我本未嘗先有此心但隨所感而應之耳此即中節而謂之和所謂鑒空衡平之用或問大學不要先有恐懼中庸却要恐懼何也曰聖賢之言有似同而實異也中庸只是事物未形之時常常持敬令心不昏昧而已大學之恐懼却是俗語恐怖之類自與中庸有異四明李氏曰始焉心足以制其身今也身反以戕其心故經不曰心有所忿懥而特曰身有所忿懥挈其身而言之所以明數者之纍乃生於身而非生於心也然身之與心常相關而不相違安有身為物纍而心為我有者乎吾見忿怒之橫生嗜好之紛起而恐懼憂患且交戰於方寸則心之存焉者寡矣故經列四者於前而繼之曰心不在焉元白錢塘吳氏曰忿懥恐懼好樂憂患四者惟忿懥在人不可有易言懲忿書戒忿嫉是矣其餘三者如恐懼修省好賢樂友生於憂患皆學者所不能無今乃與忿懥俱以不得其正言之何歟蓋所以不得其正者以其身有之也身有之者血氣所使也是私欲也故其所忿懥則是好勇鬬狠忿忘其身者也與一怒安其民者異也其所恐懼則是怯懦無勇見義不為者也與恐懼所不睹臨事而懼者異矣其所好樂則是好色好利樂驕樂逸遊者也其與好禮樂善者異矣其所憂患則是憂貧患得失者也其與憂民憂國患不知患不能者異矣此其所以不得其正也乃若喜怒哀樂發而中節何有於我哉而心之正則自若也是知不得其正者以身有之而心不在焉故也故曰心不在焉視而不見聽而不聞食而不知其味如愚新定邵氏曰昔之聖賢固有一怒安民者矣非無忿懥也然當怒而怒所可怒者在物而不在我故怒而不遷所過者化固有恐懼修省者矣非無恐懼也然當懼而懼所可懼者在時而不在我故震雷雖驚不喪匕鬯唯仁者能好人以其無所作好也好樂如是夫奚傷天下憂吾不得不憂在我本無所憂也憂患如是夫奚損此如水中之萬象鑑中之妍媸物至則見物去則寂水之與鑑無所增減亦無所愛憎也未應物之前忿懥恐懼好樂憂患一毫不立固所以為此心之正當接物之時忿懥恐懼好樂憂患隨感而應亦孰非此心之正詩人形容文王宅心之妙必曰無然畔援無然歆羡而孔門髙弟形容夫子心術之精微者亦曰毋意毋必毋固毋我正以方寸之地一毫意念未始或萌如此也則夫忿懥恐懼好樂憂患四者苟有一焉豈不甚為此心之纍哉蓋心者身之主宰而四肢百骸之所由以聽命也心不在焉則目雖視而不見逐鹿者不見泰山是也耳雖聽而不聞端冕而聽古樂則唯恐卧是也口雖食而不知其味中懷憂惕不覺匕筯之失是也夫耳目與口之用若無預於此心而此心一或不在則隨之而俱廢由是而觀欲修其身者烏可不先正其心哉欲正其心者烏可使忿懥恐懼好樂憂患之念為此心之纍哉禮記集説卷一百五十一
