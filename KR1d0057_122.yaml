body:
  text: 禮記集説卷一百二十二宋衛湜撰子云善則稱人過則稱己則民不爭善則稱人過則稱己則怨益亡詩云爾卜爾筮履無咎言子云善則稱人過則稱己則民讓善詩云考卜惟王度是鎬京惟龜正之武王成之子云善則稱君過則稱己則民作忠君陳曰爾有嘉謀嘉猷入告爾君于內女乃順之于外曰此謀此猷惟我君之德於乎是惟良顯哉子云善則稱親過則稱己則民作孝大誓曰豫克紂非豫武惟朕文考無罪紂克豫非朕文考有罪惟豫小子無良鄭氏曰爾卜爾筮爾女也履禮也言女鄉卜筮然後與我為禮則無咎惡之言矣言惡在已彼過淺也度是鎬京度謀也鎬京鎬宫也言武王卜而謀居此鎬邑龜則出吉兆正之武王築成之此臣歸美於君也君陳蓋周公之子伯禽弟也名篇在尚書嘉善也猷道也於乎是惟良顯哉美君之德也大誓尚書篇名也克勝也非豫武非我武功也文考文王也無罪則言有德也無良無功善也武王誓衆以伐紂之辭也孔氏曰此一節論善則稱人過則稱己之事凡三節上論與凡人次論臣於君下論子於親考卜惟王至成之此大雅文王有聲之篇言稽考於龜而卜者惟是武王也歸美他人詩無其證故引此歸美於君以證之書云周公既沒命君陳分正東郊作蔡仲之命皆是父卒命子故疑周公之子於乎是惟良顯哉歎美君德良善顯明也嚴陵方氏曰書曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功善則稱人過則稱己可謂不矜伐矣故民不爭也汝且能無已矣故怨益亡民作忠言作而起之也山隂陸氏曰履無咎言以履易體言雖無咎言要以禮也苟非其禮龜不敢知是惟良顯哉臣良君顯顯在下以良故顯也不言明明自明也據元首明哉股肱良哉石林葉氏曰義之於君臣其應則民作忠忠者義之屬也仁之於父子其應則民作孝孝者仁之本也父子在內故以應則言本君臣在外故以應則言屬慶源輔氏曰善則稱人與人為善之心也過則稱己自任以重之事也聖人不過如是大舜善與人同武王百姓有過在豫一人民不爭始之事也又進則怨益亡又進則民讓善怨益亡則不爭不足言矣民讓善則忘怨不足言矣子云君子弛其親之過而敬其美論語云三年無改於父之道可謂孝矣高宗云三年其惟不言言乃歡子云從命不忿微諫不倦勞而不怨可謂孝矣詩云孝子不匱鄭氏曰弛猶棄忘也孝子不藏識父母之過無改於父之道不以己善駮親之過也髙宗殷王武丁也名篇在尚書三年不言有父小乙喪之時也歡當為歡其既言天下皆歡喜樂其政教也微諫不倦君子於父母尚和順不用諤諤論語曰事父母幾諫見志不從又敬不違內則曰父母有過下氣怡色柔聲以諫諫若不入起敬起孝説則復諫此所謂不倦匱乏也孝子無乏止之時孔氏曰上承善則稱親則民作孝自此至其親廣明為孝之道以坊於民民猶有忘孝之事案其惟不言在尚書説命之篇言乃歡在無逸之篇髙宗非書篇之名鄭不見古尚書有髙宗之訓故也孝子不匱是大雅既醉美成王告太平之詩嚴陵方氏曰子為父隱所謂弛其過也善則稱親所謂敬其美也莊子曰父母於子東西南北惟命之從所謂從命也事父母能竭其力所謂勞也石林葉氏曰親之生也弛其過則幾諫以先志敬其美則順行以承意親之亡也三年無改以終其憂三年不言以思其孝然書言乃雍此言乃歡歡則樂之至也雍則和之至也雖從命而有所謂不從命故曰從義不從命雖微諫而有所謂不微諫故當不義則諍之雖無怨而有所謂可怨故號泣于旻天于父母事親至于可怨則在己者已盡故次之以不匱山隂陸氏曰三年無改可謂弛矣孝子不匱鄭氏謂孝子無乏止之時是亦不匱也然自其大者觀之不匱云者老子所謂既以與人已愈多是也故曰潁考叔可謂純孝矣愛其母施及莊公馬氏曰從命不忿愛也微諫不倦敬也子云睦於父母之黨可謂孝矣故君子因睦以合族詩云此令兄弟綽綽有裕不令兄弟交相為愈子云於父之執可以乘其車不可以衣其衣君子以廣孝也鄭氏曰睦厚也黨謂親也合族謂與族人燕與族人食令善也綽綽寬容貌也交猶更也愈病也父之執與父執志同者也可以乘其車車於身差遠也謂今與己位等孔氏曰言親睦於父母之黨乃得為孝故君子因以親睦之道以會聚宗族為燕食之禮所引詩小雅角弓之篇幽王不親九族父兄刺之也鄭注與己位等者尊卑懸絶不可傳通車服故知位等也嚴陵方氏曰於父母之黨猶且睦之况父母乎故曰可謂孝矣族有逺近有尊卑非交相親不足以有合也衣於身最密前經言君與異姓同車不同服亦以是而已夫孝所以事父也於父之執猶且如此則孝之所及廣矣故曰君子以廣孝也馬氏曰附而相顧者睦也秦康公送晉文公至於渭陽親之至也贈之以車乘惠之至也繼之以瓊瑰玉珮言其愛之無己也此為睦於父母之黨慶源輔氏曰因孝以睦父母之黨因睦以合逺近之族未能孝於其親安能睦其黨乎故曰可謂孝矣綽綽有裕故能合族也交相為愈豈能合族乎山隂陸氏曰宜於妻黨是慈也非孝也拘者以衣不可衣車亦不可乘其肆者又或以為車可乘則衣亦可衣唯君子為能如此故曰君子以廣孝也孟子曰諱名不諱姓石林葉氏曰子之事親其道則主於孝其情則主於敬廣其孝至於父之執不衣其衣嫌於近親也厚其敬至於父之位不同近處嫌於瀆尊也子云小人皆能養其親君子不敬何以辨子云父子不同位以厚敬也書云厥辟不辟忝厥祖鄭氏曰辨别也同位尊卑等為其相褻厥其也辟君也忝辱也為君不君與臣子相褻則辱先祖矣君父之道宜尊嚴孔氏曰引書大甲篇伊尹戒大甲之辭言為人父不自尊嚴而與卑下相瀆亦纍其先祖因君見父也慶源輔氏曰養而不敬有之矣未有敬而不養者也嚴陵方氏曰論語曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎此言父子不同位曲禮言父子不同席席言所坐之席也位言所立之位坐立雖不同其所以辨尊卑之義則一而已子云父母在不稱老言孝不言慈閨門之內戲而不歎君子以此坊民民猶有薄於孝而厚於慈子云長民者朝廷敬老則民作孝子云祭祀之有尸也宗廟之有主也示民有事也修宗廟敬祀事教民追孝也以此坊民民猶忘其親鄭氏曰孝上施言慈則嫌下流也戲謂孺子言笑者也孟子曰舜年五十而不失其孺子之心歎謂有憂戚之聲也長民謂天子諸侯也有事有所事也孔氏曰祭祀有尸宗廟有主下示於民有所尊事也嚴陵方氏曰父母在不稱老與曲禮恆言不稱老同義孝所以愛親慈所以愛子言孝不言慈者慮其厚於子而薄於親故也説樂之者戲也感傷之者歎也閨門之內欲其和而已故戲而不歎敬老謂其敬於親而孝所以事親也故敬老則民作孝尸用於祭祀之時主藏於宗廟之內故於祭祀言有尸宗廟言有主也為尸以象其生為主以偶其存經曰事死如事生事亡如事存此所以言示民有事也追孝與祭統言追養繼孝同義石林葉氏曰稱老則嫌於近死言慈則嫌於望報有歎則嫌於致憂自君子約言至良顯哉皆君臣之事自善則稱親至戲而不歎皆父子之事其終獨言薄於孝而厚於慈者蓋謂事父孝故忠可移於君老近於親者也近者猶敬於上則親者民必知孝於下尸則斯須之謹也故祭祀則言尸主者庸謹也故宗廟則言主此特見於有事而已若夫宗廟久而廢壞則修之祭祀立尸以敬之乃所以教民送終也故曰追孝慶源輔氏曰孝慈一心也然人情多薄於孝而厚於慈者私而已其所以慈者亦必不中節姑息而已閨門和樂之地也而有歎言則其處家者可知矣戲而已婦子嘻嘻則又不可敬老言朝廷行敬老之禮也長樂劉氏曰言孝所以盡子之道也不言慈不敢移愛於其親也河南程氏曰祭非主則無依非尸則無享子云敬則用祭器故君子不以菲廢禮不以美沒禮故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉易曰東鄰殺牛不如西鄰之禴祭實受其福詩云既醉以酒既飽以德以此示民民猶爭利而忘義鄭氏曰祭器籩豆簋鉶之屬也有敬事於賔客則用之謂饗食也盤盂之屬為燕器禮主敬廢滅之是不敬也東鄰謂紂國中也西鄰謂文王國中也此辭在既濟離下坎上離為牛坎為豕西鄰禴祭則用豕與言殺牛而凶不如殺豕受福喻奢而慢不若儉而敬也春秋傳曰黍稷非馨明德惟馨信矣引詩者言君子饗燕非専為酒肴亦以觀威儀講德義也孔氏曰前經坊民以為孝之道此經教民以為敬行義之事菲薄也沒過也君子不以貧窶菲薄廢禮不行不可以財物豐多華美沒過於禮引易既濟九五爻辭鄭注互體為離離為日坎為月日出東方東鄰象也月出西方西鄰象也與此注異易含萬象俱得明義也引詩大雅既醉之篇石林葉氏曰祭器所以事神非同於所安也致敬於賔客則用之亦所以神事之也故大饗諸侯同於禮五帝少之為貴以其內心也故不以菲廢禮多之為貴以其外心也故不以美沒禮唯其不必美也故饋而後食既醉而飽以德唯其不必菲也故殺牛而祭不如夏禴蓋君子無意於菲美者示其逺利有志於飽德者示其思義民之反此乃至於爭利而忘義故不言坊者以其事示之而已矣嚴陵方氏曰苟以菲而過乎儉則禮之文廢而不存苟以美而至於奢則禮之情沒而不見詩曰古之人不以微薄廢禮不以菲廢禮之謂也儀禮曰幣美則沒禮不以美沒禮之謂也祭其食所以敬其主主人親饋則客祭主人不親饋則客不祭蓋報施之禮然也曲禮曰主人親饋則拜而食主人不親饋則不拜而食與此同意君子苟無禮雖美不食者則以在禮而不在物故也故餓者不食嗟來乞人不屑蹴與凡以是而已食者利之所存禮則義之所出故終言以此示民民猶爭利而忘義此篇所記凡十七節言此坊者十六而於此獨曰示民蓋以示民則民有所效以此坊民則民無所踰示之將以坊之也此止言飲食之際未足以盡利義故止言示而已後重言君子不盡利以遺民則利義於是乎盡故繼之曰以此坊民民猶忘義爭利以亡其身然合而言之其實一也慶源輔氏曰以菲廢禮則失於吝以美沒禮則失於驕自處如此則處神可知醉酒而已非君子事也子云七日戒三日齊承一人焉以為尸過之者趨走以教敬也醴酒在室醍酒在堂澄酒在下示民不淫也尸飲三衆賔飲一示民有上下也因其酒肉聚其宗族以教民睦也故堂上觀乎室堂下觀乎上詩云禮儀卒度笑語卒獲鄭氏曰戒謂散齊也承猶事也澄酒清酒也三酒尚質不尚味淫猶貪也上下猶尊卑也主人主婦上賔獻尸乃後主人降洗爵獻賔也因其酒肉聚其宗族言祭有酒食羣昭羣穆皆至而獻酬之咸有薦俎也堂上觀乎室堂下觀乎上謂祭時肅敬之威儀也卒盡也獲得也言在廟中者不失其禮儀皆歡喜得其節也孔氏曰澄酒謂澄齊也以其清於醴齊醍齊故云清酒也以此三齊皆云酒故知澄酒為澄齊也禮運云玄酒在室醴盞在户粢醍在堂澄酒在下彼陳酒事故鄭分釋澄為沈齊酒為三酒以此云示民不淫故知非三酒以三酒味厚美故也禮運云醴盞在戶此云在室不同者在户之內則是在室也但禮運有玄酒在室之文故云醴盞在户爾味薄者在上味厚者在下貴薄賤厚示民不貪淫於味也鄭注主人至獻賔此儀禮特牲文在堂上者觀望在室之人以取法在堂下者觀望堂上之人以為則言上下內外更相效法引詩小雅楚茨之篇言古之祭祀禮儀盡合其法度笑語盡得其節制嚴陵方氏曰七日戒三日齊並見禮器郊特牲曲禮曰為君尸者大夫士見之則下之君知所以為尸者則自下之故云過之者趨走也夫齊戒以承之趨走以避之則敬之至矣故云以教敬也自水言之則淡者為精甘者為粗若郊特牲所云酒醴之美玄酒明水之尚是也自酒言之則濁者為質清者為文若此所謂醴酒在室澄酒在下是也其質在上其文在下則先王之所尚固可知矣示民以此豈有沈湎之禍哉故曰示民不淫也亦見禮運玄酒在室解尸飲三衆賔飲一謂祭祀獻酬之時也尊者飲多而卑者飲少故曰示民有上下也因其酒肉者因祭祀之酒肉也聚其宗族者謂羣昭羣穆咸在也聚其宗族則交相親矣故曰教民睦也山隂陸氏曰澄酒沈齊也沈齊以能沈溺在下且惟澄酒在下也是之謂示民不淫尸飲三衆賔飲一祼獻朝獻饋獻皆如此非特酳尸三獻如此而已蓋祼獻王一祼尸於是酢王后一祼尸於是酢后賔一祼尸於是酢賔周官所謂諸臣之所酢是也酢言諸臣而已則王與后可知他獻倣此然則尸飲一王飲一尸飲二后飲一尸飲三賔飲一此尊卑之序也石林葉氏曰齊濁則隂也酒清則陽也齊者鬼神所饗則醴醍升而在上酒者人所飲則澄酒降而在下禮運言醴盞在户此言在室者蓋室以戶為啓閉言其內則曰室言其外則曰戶尸象神者也賔助祭者也故其飲有上下助祭而羣昭羣穆咸在其賜爵者皆以齒也故以教民睦詔祝升奠皆在室故堂上觀乎室羹定酳尸皆在堂故堂下觀乎上子云賔禮每進以讓喪禮每加以遠浴於中霤飯於牖下小斂於戶內大斂於阼殯於客位祖於庭葬於墓所以示逺也殷人弔於壙周人弔於家示民不偝也子云死民之卒事也吾從周以此坊民諸侯猶有薨而不葬者鄭氏曰每加以逺逺之所以崇敬也阼或為堂吾從周周於送死尤備孔氏曰此一節明送喪漸逺弔哭有節使民不偝之事案鄉飲酒禮主人迎賔至門三辭至階三讓皆主人先入先登是每進以讓也殷人即壙上而弔於送死大簡周人孝子反哭至家乃始弔於送死殷勤是情理備具故云吾從周也嚴陵方氏曰每進以讓每加以逺此所以示逺逺則所以崇敬也自浴於中霤而下皆喪禮示逺之事已見檀弓解弔於壙即檀弓所謂殷既封而弔也弔於家即所謂反哭而弔是也所弔雖異所以不偝死之意則一然而民至於死則其事盡於此矣人之於此其可以不盡乎故子云死民之卒事也吾從周從周者以其弔於家為盡故也檀弓又曰反而亡焉失之矣則弔於家為盡可知石林葉氏曰賔禮所以接人欲其有文則每進以讓喪禮所以送神欲其至敬則每加以逺唯其盡以讓故三辭三讓而至不然則已蹙唯其加以逺故事鬼神而逺之也殷人練而祔之逺也故近而弔於壙周人卒哭而祔之近也故逺而弔於家孟子曰養生不足以當大事周人尚文而送死尤備故孔子從周山隂陸氏曰事合棺而後卒也吾從周者弔於家而後事卒慶源輔氏曰賔自外而入故每進以讓喪自內而出故每加以逺然則喪有賔之道歟所以示逺以葬為卒事也周人弔於家以既葬為卒事也子云升自客階受弔於賔位教民追孝也未沒喪不稱君示民不爭也故魯春秋記晉喪曰殺其君之子奚齊及其君卓以此坊民子猶有弒其父者鄭氏曰升自客階受弔賔位謂反哭時也既葬矣猶不由阼階不忍即父位也未沒喪沒終也春秋傳曰諸侯於其封內三年稱子至其臣子踰年則謂之君矣奚齊與卓子皆獻公之子也獻公卒其年奚齊殺明年而卓子殺矣弒父不子之甚孔氏曰此一節明民追孝於親諸侯未終喪不得稱君示民不爭之事也鄭知反哭時者以承上文薨而不葬也又既夕禮云乃反哭入主人升自西階是也案僖九年秋九月晉侯詭諸卒冬晉里克弒其君之子奚齊十年里克弒其君卓子此卓子踰年弒而經書其君是踰年稱君嚴陵方氏曰父既往而猶未忍升其階而居其位故曰教民追孝也未終喪居君之位而未敢稱君之號則推讓之心固可見矣故曰示民不爭也既曰客階又曰賔位互言之也石林葉氏曰升客階不敢代父也受弔於賔位不敢為主也不敢代父而為主者不忘親也故曰追孝古者君薨百官總己以聽冢宰三年則是君不言而冢宰攝之也以其不言故未終喪止稱曰子子云孝以事君弟以事長示民不二也故君子有君不謀仕唯卜之日稱二君喪父三年喪君三年示民不疑也父母在不敢有其身不敢私其財示民有上下也故天子四海之內無客禮莫敢為主焉故君適其臣升自阼階即位於堂示民不敢有其室也父母在饋獻不及車馬示民不敢專也以此坊民民猶忘其親而二其君鄭氏曰示民不二不自二於尊者也自二謂若鄭叔段者也君子有君謂君之子父在者也不謀仕嫌遲為政也卜之日謂君有故而為之卜也二當為二為卜之時辭得曰君之二某爾示民不疑不疑於君之尊也君無骨肉之親不重其服至尊不明也不敢有其身有猶專也父母在身及財皆當統於父母也不敢有其室臣亦統於君也車馬家物之重者孔氏曰此一節明事君父之道孝以事君弟以事長示民以恭敬之情不敢自副二於其君謂與尊者相敵隱元年左傳鄭莊公弟共叔段二君於兄事也君子謂國君之子君在若謀仕官似欲速為仕也嚴陵方氏曰孝以事君者推事父之道以事君也弟以事長者推事兄之道以事長也若是則臣不敢二於其君幼不敢二於其長矣故曰示民不二也不敢有其身者傳所謂為人子者無以有已是也不敢私其財者經所謂不有私財是也若是則上之勢不分於下故曰示民有上下也自無客禮而下並見郊特牲解曲禮曰為人子者三賜不及車馬君之所賜且不敢受況専之以授人乎故曰示民不敢専也饋即遺也自此遺彼則曰饋自下獻上則曰獻山隂陸氏曰孝以事君所謂事父孝故忠可移於君弟以事長所謂事兄弟故順可移於長示民不二言所以事之之道一孝以事君非以孝事君蓋事君孝之餘事也君子有君不謀仕者如上所謂則君豈容有二哉卜之日卜仕之日也卜仕之日君臣未定故稱二君以卜若云秦可晉可也石林葉氏曰事親孝故忠可移於君事兄弟故順可移於長忠孝弟順其本一也以其本一故有君不謀仕而其喪君亦如父為三年也君則統臣者也故天子無客禮君適於臣則為主父則統子者也故父在子不敢有其身私其財以為饋獻慶源輔氏曰有君則不謀仕無君則三月可弔也示民不二則忠孝無二心示民不疑則君親無異事子不敢有其身臣不敢有其室一心也二其君位不以事親者事其君也子云禮之先幣帛也欲民之先事而後祿也先財而後禮則民利無辭而行情則民爭故君子於有饋者弗能見則不視其饋易曰不耕穫不災畬凶以此坊民民猶貴祿而賤行鄭氏曰禮謂所執之摯以見者也既相見乃奉幣帛以修好也或云禮之先辭而後幣帛也先財而後禮則氏利財幣帛也利猶貪也無辭而行情辭辭讓也情主利欲也於有饋者弗能見則不視其饋饋遺也不能見謂有疾也不視猶不內也不耕穫不災畬凶言必先種之乃得穫若先災乃得畬也安有無事而取利者乎田一嵗曰災二嵗曰畬三嵗曰新田賤行行猶事也言務得其祿不務其事孔氏曰此一節明坊民使輕財重禮貴行賤祿之事先事而後祿先相見是先事後幣是後祿也先用財而後行禮則化之貪於財與人相見無辭讓之禮直行已情則有利欲故民爭也君子於有饋者不能見其所饋之人則不納其所饋之物引易無妄六二爻辭證貪財之事爾雅釋地云田一嵗曰災二嵗曰新田三嵗曰畬鄭云三嵗曰新田誤也嚴陵方氏曰幣者帛之名帛者幣之實禮之先幣帛言物以禮為先也孟子謂恭敬者幣之未將是矣禮者事之象幣帛者祿之象故曰欲民之先事而後祿也先財而後禮則徇利而忘義故曰則民利無辭與表記言無辭不相接之無辭同行情則檀弓言直情而徑行是也無辭則失取與之名行情則失利欲之節是非廉讓之道也故曰則民爭弗能見謂主人有故而弗能見饋者也辭必相見而後伸故弗能見則不視其饋慮其無名故也蓋凡內物者必視其多寡是否而後內之故也貴祿而賤行者不以行事為先也山隂陸氏曰弗能見非特為有疾而已若陽貨歸孔子豚以弗能見者故曰非其義繫馬千駟弗視也夫禮豈可以一端言若孟子由鄒之任見季子由平陸之齊不見儲子是亦饋者也吳氏莘曰禮記泛引諸經字多不合以坊記一篇考之如引易不耕穫不災畬凶今易無妄之二曰不耕穫不災畬則利有攸往不言凶也如引書此謀此猷惟我君之德於乎是惟良顯哉今書君陳曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉不惟字異繁簡亦不同如引詩履無咎言今氓詩以履為體引春秋殺其君之子奚齊及其君卓今春秋僖九年書里克殺其君之子奚齊十年書里克弒其君卓及其大夫荀息本非同時事也然亦有與今經合者如曰東鄰殺牛不如西鄰之禴祭實受其福則與今易合矣如曰豫克紂非豫武等語則與今書合矣如曰此令兄弟綽綽有裕等語則與今詩合矣如曰魯春秋猶言夫人之姓曰吳其死曰孟子卒則與今春秋合矣一篇之中如此他皆類此子云君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬詩云采葑采菲無以下體德音莫違及爾同死以此坊民民猶忘義而爭利以亡其身鄭氏曰不盡利以遺民不與民爭利也遺秉不斂穧言穫者之遺餘捃拾所以為利食時謂食四時之膳力猶務也天子諸侯有秩膳古者殺牲食其肉坐其皮不坐犬羊是無故不殺之葑蔓菁也陳宋之間謂之葑菲葍類也下體謂其根也采葑菲之菜者采其葉而可食無以其根美則并取之苦則棄之并取之是盡利也孔氏曰此一節明貴義輕利以坊民之事言君子不盡竭其利當以餘利遺與民也詩小雅大田刺幽王之詩陳明王之時田稼既多穫刈促遽彼處有遺秉把此處有不斂之穧束與寡婦捃拾以為利證以利遺民也不力珍不用力務求珍羞采葑采菲無以下體此詩邶風谷風之篇婦人怨夫棄己言采葑菲無以下體根莖之惡并棄其葉言取妻無以華落色衰相棄如此則道德之音無相乖違可與汝同至於死也此記者引詩斷章取義凡二意一則據其根善無得并取其根無盡利也一則據其根惡無得并棄其葉不求備也嚴陵方氏曰君子之於利非不取也不盡之而己若九一以治野外什一以治國中周官朝士凡得獲貨賄人民六畜者委之於朝告於士旬而舉之大者公之小者庶民私之澤虞言頒其餘於萬民皆此意自仕則不稼而下亦皆不盡利之事也食四時所有之物不力求難得之品王制曰大夫無故不殺牛羊士無故不殺犬豕有故則祭饗是也祭饗則皮毛並用矣豈可坐之坐之則是無故而殺之也坐若左氏傳所謂食其肉寢其皮是矣不言豕則以有剛鬛不宜坐故也臨川王氏曰於物有所遺則為不盡利於事有所遺則為不盡察貴者之道也石林葉氏曰仕則不稼者不盡利以遺民也食時不力珍者盡仁以愛物也子云夫禮坊民所淫章民之别使民無嫌以為民紀者也故男女無媒不交無幣不相見恐男女之無别也以此坊民民猶有自獻其身詩云伐柯如之何匪斧不克取妻如之何匪媒不得藝麻如之何橫從其畝取妻如之何必告父母鄭氏曰淫猶貪也章明也嫌嫌疑也無媒不交無幣不相見重男女之會所以逺别之於禽獸也有幣者必有媒有媒者不必有幣仲春之月會男女之時不必待幣也自獻其身獻猶進也伐柯伐木以為柯也克能也藝猶樹也橫從橫行治其田也言取妻之法必有媒如伐柯之必須斧也取妻之道必告父母如樹麻當先易治其田孔氏曰自此以下終於篇末總坊男女淫奔之事夫婦重慎之義此一節明男女非媒非幣不相交見也鄭知淫非淫佚而云貪者若是淫佚當云坊民淫不云所淫也使民無嫌以為民紀謂使民無色欲之嫌疑以為民之綱紀也引詩齊風南山之篇刺齊襄公與妹文薑姦淫之事嚴陵方氏曰恐民之或淫故禮坊之使有限恐民之無别故禮章之使自明若是則天下之情無可嫌者足以為之紀矣禮器曰君子之行禮不可不慎也衆之紀也紀散而衆亂非謂是歟媒所以通相交之情幣所以將相見之禮自獻其身則無俟乎媒幣矣慶源輔氏曰淫過也别自然之分也防其淫章其别所以使民無疑也不曰綱而曰紀紀之事衆也交通也子云取妻不取同姓以厚别也故買妾不知其姓則卜之以此坊民魯春秋猶去夫人之姓曰吳其死曰孟子卒鄭氏曰厚猶逺也妾言買者以其賤同之於衆物也士庶之妾恆多凡庸有不知其姓者吳大伯之後魯同姓也昭公取焉去姬曰吳而已至其死亦略云孟子卒不書夫人某氏薨孟子蓋其且字孔氏曰此一節坊民取同姓為妻之事妾不知姓但避其凶害唯卜其姓吉乃取之依春秋例吳女當云夫人姬氏至自吳薨當云夫人姬氏薨以諱取同姓故止云至自吳又曰孟子卒既笄而字當云伯叔季若伯姬季姬今云孟子故鄭知且字也子云禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮鄭氏曰交爵謂相獻酢陽侯繆侯同姓也以貪夫人之色至殺君而立其國未聞大饗饗諸侯來朝者也夫人之禮使人攝孔氏曰此一節坊男女非因祭祀不得相集會也特牲饋食禮云主婦獻尸尸酢主婦是非祭不交爵也陽侯繆侯是兩君之諡未聞何國君大饗之時夫人與君同饗於賔繆侯及夫人共出饗賔陽侯是繆侯同姓之國見繆侯夫人之美乃殺繆侯而取其夫人反篡其國而自立故大饗不使夫人預其禮也以此言之則陽侯以前大饗夫人出饗鄰國之君得有男女交爵也此云非祭不交爵者蓋王饗諸侯及諸侯自相饗同姓則后夫人親獻異姓則使人攝獻故內宰職云凡賔客之祼獻瑶爵皆贊注云謂王同姓及二王之後來朝覲王以鬱鬯禮之后以瑶爵亞獻也自陽侯殺繆侯其後夫人獻遂廢並使人攝也子云寡婦之子不有見焉則弗友也君子以辟逺也故朋友之交主人不在不有大故則不入其門以此坊民民猶以色厚於德鄭氏曰有見謂睹其才藝也同志為友大故喪疾也孔氏曰自此至於族一節更申明男女相逺又坊人同姓淫佚之事山隂陸氏曰厚别仁也避逺義也且言君子君子見微者也慶源輔氏曰既避之又逺之以色大欲當謹坊也色厚於德言好色厚於好德也子云好德如好色諸侯不下漁色故君子逺色以為民紀故男女授受不親御婦人則進左手姑姊妹女子子已嫁而反男子不與同席而坐寡婦不夜哭婦人疾問之不問其疾以此坊民民猶淫佚而亂於族鄭氏曰好德如好色此句似不足論語曰未見好德如好色疾時人厚於色之甚而薄於德也不下漁色不內取於國中也內取國中為下漁色昏禮始納采謂采擇其可者也國君而內取象捕魚然中網取之是無所擇也男女授受不親不以手相與也內則曰非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而後取之御婦人則進左手者御者在右前左手則身微偝之也女子十年不出嫁及成人可以出矣猶不與男女共席而坐逺别也寡婦不夜哭嫌思人道婦人不問其疾嫌媚略之也問增損而已亂族犯非妃匹也孔氏曰諸侯當外取不得下嚮國中取卿大夫士之女若下取國中美色中意皆取之似漁人求魚無所擇也嚴陵方氏曰孟子曰好色人之所欲也故經傳每以是況其所好之篤者祭義曰如見親之所愛如欲色然論語賢賢易色此云好德如好色以言其所好之篤而已婦人疾問其安否不問其疾之所在也凡此皆以逺嫌而已餘並見曲禮解山隂陸氏曰所謂如好好色鄭氏謂此句似不足誤矣論語曰我未見好德如好色者也則古之人好德如好色者蓋有之矣諸侯不下漁色釣於他國可也宋三世內娶春秋譏焉子云昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也以此坊民婦猶有不至者鄭氏曰舅姑妻之父母也妻之父為外舅妻之母為外姑父戒女曰夙夜毋違命毋戒女曰毋違宫事不至不親夫以孝舅姑孔氏曰壻親迎之時見婦之父母婦之父母承奉女子以付授於壻而戒之恐此女子於昏事乖違也中山成氏曰父之姊妹曰姑母之兄弟曰舅此內之正名也名不正則言不順婦人謂夫之父母曰舅姑男子謂妻之父母亦曰舅姑但加外字耳此即假借其名非正也禮避嫌疑故須假借而言之舅姑是父母之倫類其名尊也夫婦齊體也父母互相敬也嚴陵方氏曰昏禮父母戒女毋違命毋違宫事故曰恐事之違也不至謂違婦事而有所不至也禮記集説卷一百二十二
