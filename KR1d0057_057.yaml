body:
  text: 禮記集説卷五十七宋衛湜撰五行之動迭相竭也五行四時十二月還相為本也五聲六律十二管還相為宫也五味六和十二食還相為質也五色六章十二衣還相為質也鄭氏曰竭猶負戴也言五行運轉更相為始也五聲宫商角徴羽也其管陽曰律隂曰吕布十二辰始於黃鍾管長九寸下生者三分去一上生者三分益一終於南吕更相為宫凡六十也五味酸苦辛鹹甘也和之者春多酸夏多苦秋多辛冬多鹹皆有滑甘是謂六和五色六章畫繢事也周禮考工記曰土以黃其象方天時變火以圜山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧也孔氏曰前既論天地故此更論五行之動動謂運轉物之在人上謂之負戴氣之過去在上者其在下者亦負戴也春時木王負戴於水後更相為始負戴前氣也孟春則以建寅之月為諸月之本仲春則以建卯之月為諸月之本是還回迭相為本也六律謂陽律也舉陽律則隂吕從之可知故十二管也鄭注其管陽曰律至三分益一皆律厯志文十二管更相為宫以黃鍾為始當其為宫備有五聲言黃鍾下生林鍾林鍾上生大蔟大蔟下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賔蕤賔上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕此則相生之次也隨其相生之次每辰各自為宫各有五聲十二管相生之次至中吕而匝黃鍾為第一宫下生林鍾為徴上生大蔟為商下生南吕為羽上生姑洗為角林鍾為第二宫上生大蔟為徴下生南吕為商上生姑洗為羽下生應鍾為角大蔟為第三宫下生南吕為徴上生姑洗為商下生應鍾為羽上生蕤賔為角南吕為第四宫上生姑洗為徵下生應鍾為商上生蕤賔為羽上生大吕為角姑洗為第五宫下生應鍾為徴上生蕤賔為商上生大吕為羽下生夷則為角應鍾為第六宫上生蕤賔為徴上生大吕為商下生夷則為羽上生夾鍾為角蕤賔為第七宫上生大吕為徵下生夷則為商上生夾鍾為羽下生無射為角大吕為第八宫下生夷則為徴上生夾鍾為商下生無射為羽上生中吕為角夷則為第九宫上生夾鍾為徴下生無射為商上生中吕為羽上生黃鍾為角夾鍾為第十宫下生無射為徴上生中吕為商上生黃鍾為羽下生林鍾為角無射為第十一宫上生中吕為徴上生黃鍾為商下生林鍾為羽上生大蔟為角中吕為第十二宫上生黃鍾為徴下生林鍾為商上生大蔟為羽下生南吕為角是十二宫各有五聲凡六十聲南吕最處於末故終於南呂是還回迭相為宫也每月之首各以其物為質是十二月之食還相為質也鄭注六和周禮食醫之文也四時四味皆有滑有甘益之為六也五色謂青赤黃白黑據五方也六章者兼天玄也以玄黑為同色則五中通玄繢以對五方則為六色是六章也為十二月之衣則各以色為質故云還相為質也其十二管每月各一故得還相為宫其食與衣唯有四時之異故周禮春多酸月令食麥與羊春衣青是春三月其食與衣皆同也夏秋冬亦然無月别之異此云十二食十二衣者似月各别衣食也熊氏謂異代之法或得每時三月衣食雖同大總言一嵗之中有十二月之異故總云十二也新安朱氏曰案五聲相生至於角位隔八下生當得宫前一位以為變宫五聲之正至此而窮又自變宮隔八上生當得徴前一位以為變徴餘分不可損益而其數又窮故立均之法至於是而終焉孔氏以本文但云五聲十二管故不及二變而止為六十聲增入二變二十四聲合為八十四聲自唐以來法皆如此云長樂劉氏曰冬水盛也而生木春木盛也而生火夏火盛也而生土長夏土盛也而生金秋金盛也而生水五行相生終而又始天地之常理也金克木木克土土克水水克火火克金五行相克以成其性以竭其才故靜則相生天之道也動則相竭地之道也五行四時十二月還相為本者根本也君也言其相生皆以氣之盛者為本雖然盛過於中則隂陽之氣不和是以相克之義生焉然後還相不失其和而日月五星四時五行山川萬物罔不順其序而遂其性也故五聲六律十二管還相為宫此以聲測隂陽之和否也五味六和十二食還相為質此以味調隂陽之逆順也五色六章十二衣還相為質此以服配隂陽之盛衰也長樂陳氏曰五行之動迭相竭者言竭猶所謂休也休則有王故竭則有盈也五行四時言十二月還相為本者一行直於一時之月則四者皆為末也五聲言其氣之所在故言本五味五色言其形之所尚故言質而已又禮書曰先王因天地隂陽之氣而辨十有二辰因十有二辰而生十有二律統之以三故黃鍾統天林鍾統地大蔟統人所以象三才生之以八故黃鍾生林鍾林鍾生大蔟大蔟生南吕之類所以象八風律左旋而生吕則為同位所以象夫婦吕右轉而生律則為異位所以象子母六上所以象天之六氣五下所以象地之五行其長短有度其多寡有數其輕重有權其損益有宜始於黃鍾終於中吕黃鍾大蔟姑洗損陽以生隂林鍾南吕應鍾益隂以生陽蕤賔夷則無射又益陽以生隂大吕夾鍾中吕又損隂以生陽何則黃鍾至大蔟陽之陽也林鍾至應鍾隂之隂也陽之陽隂之隂則陽息隂消之時故陽常下生而有餘隂常上生而不足蕤賔至無射則隂之陽也大吕至仲吕則陽之隂也隂之陽陽之隂則陽消隂息之時故陽常上生而不足隂常下生而有餘然則自子午以左皆上生子午以右皆下生矣鄭康成以黃鍾三律為下生以蕤賔三律為上生其説是也班固則類以律為下生吕為上生誤矣書云聲依永律和聲則律非五聲不能辨聲非十二律不能和五聲非變則不能盡故一律之中莫不具五聲五聲之外有所謂二變黃鍾為宫則林鍾為徴大蔟為商南吕為羽姑洗為角應鍾為變宫蕤賔為變徴林鍾為宫則大蔟為徴南吕為商姑洗為羽應鍾為角蕤賔為變宫黃鍾為變徴以至十律之為宫餘律之為商角徴羽為二變旋之為十二宫析之為八十四聲類皆五位為五音第之至六為變宫又第之至七為變徴及八然後宫復旋矣此六律之大致也京房之徒推而蔓之至於三百六十以直三百六十日不可考也然陽盡變以造始故每律異名隂體常以效法故止於三鍾三吕而已則鍾者物所聚也吕者物所正也夾鍾亦謂之圜鍾函鍾亦謂之林鍾南吕亦謂之南事中吕亦謂之小吕不特此也六律亦謂之六始六吕亦謂之六間亦謂之六同蓋圜鍾以春主規言之也林鍾以夏芘物言之也南事則隂之所成者事而已小吕則隂之所萌者小而已律所以述隂陽也始所以始六隂也吕其體也間其位也同其情也然皆述隂陽而已故皆謂之十二律也又禮書曰大司樂所以序圜鍾為宫黃鍾為角大蔟為徴姑洗為羽此律之相次者也函鍾為宫大蔟為角姑洗為徴南吕為羽此律之相生者也黃鍾為宫大吕為角大蔟為徴應鍾為羽此律之相合者也先儒謂夾鍾生於房心之氣房心天帝之明堂故為天宫林鍾生於未之氣未坤之位故為地宫黃鍾生於虛危之氣虛危為宗廟故為人宫此説是也蓋天帝之明堂東南方也帝與萬物相見於是出焉坤之位西南方也物於是致養焉宗廟北方也物於是藏焉其為三宫宜矣然言天宫不用中吕林鍾南吕無射人宫避林鍾南吕姑洗蕤賔不用者卑之也避之者尊之也以為天宫不用地宫之律人宫避天宫之律然則人宫用黃鍾孰謂避天宫之律耶又樂書曰周官凡樂圜鍾為宫黃鍾為角大蔟為徴姑洗為羽凡樂函鍾為宫大蔟為角姑洗為徴南吕為羽凡樂黃鍾為宫大吕為角大蔟為徴應鍾為羽蓋天五地六天地之中合也故律不過六而聲亦不過五其旋相為宫又不過三以備中聲而已樂以中聲為本而倡和清濁迭相為經故以仲春之管為天宫仲冬之管為人宫中央長夏之管為地宫國語有四宫之説不亦妄乎今夫旋宫之樂十二律以主之五聲以文之故圜鍾為宫而無射為之合黃鍾為角而大吕為之合大蔟為徴而應鍾為之合姑洗為羽而南吕為之合凡此宫之旋而在天者也函鍾為宫大蔟為角姑洗為徴南吕為羽而交相合焉凡此宫之旋而在地者也故其合降而為三黃鍾為宫大吕為角大蔟為徴應鍾為羽而兩兩合焉凡此宫之旋而在人者也故其合又降而為二在易上經言天地之道下經言人道而元亨利貞之德乾别為四坤降為二咸又降為一亦此意也蓋一隂一陽之謂道天法道其數參而竒雖主乎一陽未嘗不以一隂成之故其律先隂而後陽地法天其數兩而偶雖主乎二隂未嘗不以二陽配之故其律或上同於天而以隂先陽或下同於人而以陽先隂人法地則以同而異此其律所以一於陽先乎隂歟大抵旋宫之制與蓍卦六爻之數常相為表裏蓍之數分而為二以象兩儀挂一以象三才揲之以四以象四時歸竒於扐以象閏而六爻之用抑又分隂分陽迭用柔剛則知隂陽之律分而為二亦象兩儀之意也其宫則三亦象三才之意也其聲則四亦象四時之意也餘律歸竒亦象閏之意也分樂之序則奏律歌吕亦分隂分陽之意也三宫之用則三才迭旋亦迭用柔剛之意也十有二律之管禮天神以圜鍾為首禮地示以函鍾為首禮人鬼以黃鍾為首三者旋相為宫而商角徴羽之管亦隨而運焉則尊卑有常而不亂猶十二辰之位取三統三正之義亦不過子丑寅而止耳禮運曰五聲六律十二管旋相為宫如此而已先儒以十有二律均旋為宫又附益之以變宫變徴而為六十律之凖不亦失聖人取中聲寓尊卑之意邪秦溪楊氏曰陳氏禮書所謂天宫取律之相次者圜鍾為宫圜鍾為隂聲之第五隂將極而陽生矣故取黃鍾為角黃鍾陽聲之首也大蔟為徴大蔟陽聲之第二也姑洗為羽姑洗陽聲之第三也此律之相次也地宫取律之相生者函鍾為宫函鍾上生大蔟故大蔟為角大蔟下生南吕南吕上生姑洗故南吕為徴姑洗為羽此律之相生也人宫取律之相合者黃鍾子大吕丑故黃鍾為宫大吕為角子與丑合也大蔟寅應鍾亥故大蔟為徴應鍾為羽寅與亥合也此律之相合也天道有自然之秩序故取律之相次者以為音地道資生而不窮故取律之相生者以為音人道相合而相親故取律之相合者以為義以此觀之則鄭氏謂天宫不用中吕林鍾南吕無射人宫避林鍾南吕姑洗蕤賔其説鑿矣嚴陵方氏曰交相為用故曰迭相竭言相竭如此則相生相克亦若是而已以至所别之聲所食之味所被之色皆出於此故繼言五聲五味五色焉五行播而為四時四時合而為十二月積陽成暑積隂成寒陽生於子隂生於午各以所生之氣為本故曰還相為本五聲比而為六律六律偶而為十二管陽旋而左隂旋而右益隂生律損陽生同各以所生之音為宫故曰還相為宫五味調而為六和衍而為十二食十二食則六穀六牲是也若牛宜稌羊宜黍豕宜粱之類則各以所宜者為質故也十二衣則六冕六服是也若祀昊天上帝服裘冕饗先王服衮冕之類則各以所服者為質故曰還相為質質猶射之有質而以取正為義五味五色各有正也故以質言之莊子曰四者孰知正味又曰四者孰知正色則味色各有正也凡此皆周而復始故以還言之猶於五行之動言迭者主動而言故也馬氏曰四時者五行之運十二月者四時之積故還相為本還相為本者若盛德在木以木為主盛德在金以金為主此所謂相為本也律者所以律宣陽氣也吕者所以吕宣隂氣也十二月之食若春食麥羊則以麥羊為質夏食菽雞則以菽雞為質此所謂相為質也六章者言燦然有文章也故還相為質若春衣青則以青為質夏衣赤則以赤為質也延平周氏曰五行之動迭相竭也者如木竭則火盈火竭則金盈也五行四時十二月還相為本也者如木行為本於春之月則水火土金皆木也五聲六律十二管還相為宫也者十二律各具五聲而還相為宫也五行者四時十二月之所自出五聲者六律十二管之所自出五味之於六和十二食五色之於六章十二衣亦若是而已矣四時者間於十二月者也六律者間於十二管者也六和之於十二食六章之於十二衣亦若是而已矣十二食即周官所謂鼎十有二十二衣即舜之十二章山隂陸氏曰竭盡也水王則金竭木王則水竭王文公曰此立而彼竭也六和五味中六和也六章五色中六章也言五味五色矣又言六和六章蓋文章經緯之體春秋傳曰為六畜五牲三犧以奉五味於六畜中又數五牲五牲中又數三犧蓋亦如此蔣氏曰五行造化之樞要也迭相窮盡變通無極而後三才之道立焉鯀因洪水而汨陳之彛倫攸斁天乃興禹錫以皇極九疇而後得其敘也由今觀洪範之書五行居其首而後五政八事三德庶徴六極之類次第而舉矣是則有五行而後有五聲五味與五色有四時十二月而後有六律十二管六和十二食與六章十二衣天人相因其用無盡方天一生水地六成之是時之為冬者然也而金為之本矣地二生火天七成之是時之為夏者然也而木為之本矣五聲之本生於黃鍾三分去一下生林鍾是律中林鍾之管也而黃鍾為之宫矣林鍾三分益一上生大蔟是律中大蔟之管也而林鍾為之宫矣五味各有所主而調以滑甘因謂六和五色各有所尚而天玄地黃因謂六章質之月令稽之內則訂之考工若是其有成數也而食齊視春時羮齊視夏時略以見飲食還相為質之道居青陽而衣青衣乘朱路而服赤玉亦足以知服色變通之宜蓋物以故而滯禮以運而久造化自然之數麗於竒偶之定形天人不窮之機本於運用之迭出靜不極則動不著損不極則益不生厭故而取新處積而能化古先聖人順隂陽消長之變制衣服居處之意其意蓋若此而已龍泉葉氏説見前故人者天地之心也五行之端也食味别聲被色而生者也鄭氏曰此言兼氣性之效孔氏曰自此至不失一節以上經論人稟天地五行氣性而生此以下論稟氣性之有效驗也人生天地之中動靜應天地天地有人如人有心故云天地之心也端猶首也萬物悉由五行而生而人最得其妙明仁義禮智信為五行之首也五行各有味有聲有色三者最為彰著而人皆稟之以生故為五行之端也言食言别言被隨義而言也此並是五行彰著之事而人氣性有之故鄭注云兼氣性之效也王肅曰人於天地之間如五藏之有心矣人乃有生之最靈其心五藏之最聖也五峯胡氏曰人者天地之精也故行乎其中而莫禦五行萬物之秀氣也故物為之用而莫違江陵項氏曰何謂天地之心曰仁而已矣天地之至仁寓之於人才有人形即有仁心故曰仁者人也又曰仁人心也又曰人者天地之心也復所以能見天地之心者以其有生意也凡果實之心皆名曰人字亦作仁故天地之心亦名曰人人之名蓋出於此長樂陳氏曰物之體常在外而心常在中天地者人之體故人者天地之心也人非五行不因而五行非人不成故人者五行之端始也所食者五味所别者五聲所被者五色此人之所以生也上言聲與色自然之序故先聲而後味味而後色以明有氣而後有形也此言人之所用聲味與色之序故食味而後别聲别聲而後被色以明由內以及外也馬氏曰天髙地下而人位乎兩間以生也故曰人者天地之心萬物散殊而在天地之間莫不鍾五行之氣而人則受其氣之秀者也故曰五行之端五行莫不有其味先王因之以為五味六和十二食所以順其味五行莫不有其聲先王因之以為五聲六律十二管所以順其聲五行莫不有其色先王因之以為五色六章十二衣所以順其色有曰人者天地之德五行之秀氣有曰人者天地之心五行之端何也蓋言天地之德者以其性之所受之中也言天地之心者以其為人所處之中也秀者言其精而不粗端者言其本而非末也長樂劉氏曰五行者天地之子而人為之長故曰端焉口所食者五味也不食則病矣耳所别者五聲也不别則聾矣身所被者五色也不被則禽矣仰此以為生凡人不教所自能也而於聲色衣食有得有失七情生焉聖人防其情之過中而反為身禍也乃作禮法制度其心俾人人用足而不傷乎物之生也事事有則而不汨其性也嚴陵方氏曰天地散而為五行故仁之端則木之性所立也義之端則金之性所立也以至火之於禮水之於知土之於信亦若是而已故曰五行之端也五行滋而為五味人以養其口感而為五聲人以養其耳形而為五色人以養其目然後人得而生焉故曰食味别聲被色而生者也食之於口别之於耳被之於身莫不有所别焉獨於聲言别者則以微妙尤宜致别故也然其序前以聲為首此以味為首蓋探其本則聲為妙要其用則味為急四明沈氏曰易言裁成輔相中庸言知天地之化育贊天地之化育究竟天地是天地大人但可知贊裁成輔相爾俱不若禮運言人者天地之心也耳目視聽若無心何以運用天地若無人如何全得廣大直是倚人為心豈特知贊裁成輔相而止邪蔣氏曰上章既言人者天地之德五行之秀氣至此復言人者天地之心五行之端蓋德言其自得心言其能運氣證其所自稟端究其所從始名雖不同其實一也至於食味别聲被色則人所以為萬物之靈者昭然有可考之實矣且鳥俯而啄仰而四顧味有所不辨也五味六和惟人能辨而食之瓠巴鼓琴流魚出聽物有萬一而然耳聲有所不别也五聲六律惟人能别而聽之生而羽毛以禦寒暑物莫不皆然耳色不能自擇也五色六章惟人能擇而被之蓋囿形而供人者為物任智以役物者為人由是觀之人具耳目備口體視明而聽聰飲食有具而服用有適蓋其得於天者本如是而已情欲一恣性天牿亡或至於養一指而失肩背是自失其所以食味者也好鄭聲而厭雅樂是自失其所以别聲者也忘正色而好姦色是自失其所以被色者也然則食味别聲被色夫人同此生生之具其或流而不知止徇而不知反聖人何以約而歸之於中曰因天理之自然制人情之或過自聖人作則必以天地為本以下無非立治人之要道以制事物之命使天下通性情之正者也龍泉葉氏説見前故聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜鄭氏曰天地以至五行其制作所取象也禮義人情其政治也四靈其徴報也量猶分也鬼神謂山川也山川助地通氣之象也器所以操事田人所捊治也孔氏曰則法也本根本也人既是天地之心故聖人作法必用天地為根本祭帝於郊祭社於國是也端猶首也用隂陽為端首賞以春夏刑以秋冬是也春生夏長秋斂冬藏是法四時為柄也劔戟須柄而用之紀綱紀也日行有次度星有四方列宿分部昏明敬授民時是法日星為綱紀也量猶分限也天之運行每三十日為一月聖人制教隨人之才分是法月為教之限量也山川助地以通氣為地之徒屬聖王象之立羣臣助己以施教為己徒屬也質體也五行循回周而復始聖人為教亦然是法五行為體也執禮義為器用可耕於人情人情得禮義之耕如田得耒耜之耕也四靈以為畜則獲天地應以徴報也四靈並至聖人畜之如人養牛馬為畜也長樂陳氏曰以天地為本至於五行以為質以言其所法者也禮義以為器人情以為田以言其所用者也四靈以為畜以言其所致者也聖人作則必推其所法以適其所用然後有所致矣山隂陸氏曰自月以為量變以在下是月以為量非以月為量也蓋聖人作則能以天地為本以隂陽為端以四時為柄以日星為紀於是月以我而後得為量鬼神以我而後得為徒他倣此嚴陵方氏曰操此而彼為之用者柄也日星繫乎天之大而各有常度焉故以日星為紀大小之所容多少之所概有數而可量者量也月受明於日而朔望盈虧以三五之數可推焉故月以為量聖人作則以天地為之始以人物為之終固其理也其序所以如此廬陵胡氏曰聖人父天母地是本也本猶原也端始也柄所以斟酌言以四時斟酌和氣也紀次序也量限也月滿必虧持滿者取法焉鬼神天帝言與天為徒也質實也五行萬物之所終始也器如農夫治田器也人情有治亂猶田之有荒墾也四靈治則見故可畜亂則隱豈可畜哉金陵應氏曰人之生也儲造化之精而不能自闡於造化鍾禮義之粹而不能自達於禮義備萬物之全而不能自用於萬物聖人作則因其所固有者順導而曲成之其法象則參諸造化堯典所以欽若而歷象授時禹範所以建極而協紀念徴也其政治則取諸禮義商書所以欲其建中而制事制心周官所以教之中和而防情防偽也其效驗則集夫四靈舜樂所以成於鳯儀周南所以終於麟趾也天地以全體言大根大本之先立者也道之大原出乎天也隂陽以氣化言闓端造始之可見者也立天之道曰隂與陽也四時以運化言當權操柄之可握者也大昊執規炎帝執衡之屬是也日星紀運乎周天之度驗其次舍以分時令如綱有紀以分其目一月遍匝乎周天之度視其晦朔以課事功如物有量以揆其平鬼神布列於天地之間造化之用也以之為徒則闔闢變化常與之並行猶曰與之為徒也五行變合於隂陽之內造化之體也以之為質則亭毒胚胎不昧其所主五味五色之所以為質也有其質而無其具則善不能自遂故因其自然固有之禮義以為器而品節防範之道無不周有其器而無其地則功無所可施故因其可與為善之人情以為之田而修治墾除之功無不至四靈蓋物之變化而有神者非罝網之所可循也能盡致而為之畜則德之所感可知矣以天地為本故物可舉也以隂陽為端故情可睹也以四時為柄故事可勸也以日星為紀故事可列也月以為量故功有藝也鬼神以為徒故事有守也五行以為質故事可復也禮義以為器故事行有考也人情以為田故人以為奧也四靈以為畜故飲食有由也鄭氏曰物天地所養生也情以隂陽通也事以四時成也事以日與星為候興作有次第也藝猶才也十二月各有分猶人之才各有所長也藝或為倪山川守職不移故云有守也事下竟復由上始故云可復也考成也器利則事成也奧猶主也田無主則荒由用也四靈與羞物為羣孔氏曰此一節覆明前經諸事若行諸事治理皆應則萬事得成也天地生養萬物今本而為政教故萬物可舉而興也人情與隂陽通今法隂陽為教故人情可見也生長收藏隨四時無失故民不假督勵而事自勸成也日中星鳥敬授民時無失早晚故民事有次第列猶次第也月以為量隨人才而教之則人竭其才之所長故功有藝山川鬼神各有分職不移今引鬼神為徒屬則事無失業故云有守五行相次終而復始凡所營為之事亦終而復始故云可復工欲善其事必先利其器若治國用禮義為器是器之利者故所治之事行必有成也上人是人民下人是聖人田無主則荒廢故用人為主今以人情為田聖人以為田主則人情不荒廢也靈是衆物之長長既至為聖人所畜則其屬並隨其長而至是飲食有用也橫渠張氏曰情可覩也情謂理循是以窮其理鬼神以為徒故事有守也因其自然而任之役鬼神之義順其自然則人鬼協濟人鬼協濟則豈非以為徒歟今山川百物生焉養成其材以時取之得非協歟先天而天弗違五行之氣運而為四時質據也順五行之氣用五行之材莫不以為質也至如東作西成捨五行之序何以行五行相代不窮故事可復也四靈以為畜能擾四靈則鳥獸之類豢養不失其情自天地為本至四靈為畜一理也特細别耳事天治人與夫接物無所不用其極能用其極則其餘不足治矣此數句必出於古語亦非傳者所能道也嚴陵方氏曰以天地為本則萬物皆末焉本既得則末斯從焉故物可舉也舉言持之在我也隂陽者萬物之情以隂陽為端則其情可探而見故情可覩也以四時為柄則人順時之後先因時之動靜不敢辭焉故事可勸也以日星為紀則晝之所參夜之所考各得其序焉故事可列也月以為量則興事造業各有數以致其能焉故功有藝也五行以為質則代廢代興皆周而復始焉故事可復也四靈以為畜則人之日用者皆易致焉故飲食有由也由言人因之致用也馬氏曰法象莫大乎天地故以為本而隂陽日月鬼神皆天地之别也聖人作則莫不取象於此雖然聖人作則仰有法於天俯有察於地而近取於人情者禮義也禮義出於人情先王因之以為治情之具也自天地為本推而至於人情以為田其為法備其為治詳宜有休徴以應之也故終以四靈為畜然四靈以為畜聖人無意於是蓋在已有以立之在物者亦順之而不敢逆也以天地為本而曰物可舉者蓋萬物生於天地之間皆可舉而用之也天地之大端在隂陽而人情之大端亦在於隂陽喜為陽怒為隂以隂陽為端則人之情可覩而見也時者當其可之謂也敬授之而勿失則事有所成故以為柄則事可勸也日星者示其東作西成之候而使民之興作不失其先後之序也故以為紀月者三五而盈闕其盈不至於有餘其闕不至於不足故以為量量者言多寡之均而無過不及之患先王之制禮必協於分藝使賢者不敢過不肖者不敢不及藝者言各當其材也鬼神在於幽其類非一而祖廟山川五祀各有守也先王因以立官設其參傅其伍使之各司其局而不敢失也五行者天地之間往來不窮終而復始故以為質則事可復而不窮也四靈者猶為聖人而見畜則天地之間飛濳陸走之類莫不甚多無非飲食之用也講義曰夫萬物生息於天地之間以天地為本則萬物雖多而無所逃故物可舉也陽推五福以類升隂幽六極以類降故凡為善者陽之類也為惡者隂之類也以隂陽為端則物情大見而可覩也時以作事事以厚生無先時而起無後時而縮故先時者殺無赦不及時者殺無赦以四時為柄而執守之故天下之事可勸而成也山隂陸氏曰隂陽為端若觀其所聚觀其所感觀其所恆而天地萬物之情可見矣是也四時為柄若春誦夏弦春率民耕作秋率民收斂之類日星為紀若日在北陸而藏冰龍見而雩之類月以為量成虧相備故功有藝極也人情得聖人以為田故人以聖人為奧無田則孰為養也無奧則孰與居焉四靈以為畜聖人致治以是為終及其亂也亦以是為終若西狩獲麟則是獸也非畜也且麟信而應禮不妄出者也春秋哀公十四年胡為來哉飲食有由言四靈以為畜故聖人飲食有由也如是而後享天下之大奉無愧矣是之謂有由廬陵胡氏曰功猶藝也藝極也春秋傳貢賦無藝鬼神以為徒鬼神不欺人以為與人謂民奧主也民以為主也左氏昭十三年傳云國有奧主龍泉葉氏曰人性非所治所治者其情也聖人之治以天地隂陽四時五行為之綱目立之至公周盡物則故能深通人情之變平而治之凡人發於好惡利欲之私心激於事勢逆順之偏重者發為邪德隱為詖行皆其情之所宜有也雖其所以治之要不越乎理義而情之委曲聖人不一施焉有當直從者有當曲遂者有當明禁者有當預防者暢其不及裁其過甚扶其緩弱通其壅蔽其治之有時其教之有機膏潤成熟而善道備美俗一是故聖人發正於天理收功於人情如良農之善稼也五穀之報必厚矣聽而弗治長稂莠也治而弗達雜稊稗也不本其情而責其成廢田者也如是則人豈能心服於聖人而恃之以為奧主哉黃氏曰飲食之禮達則天下殺害有時物無暴殄庶人無故不食珍士燕食不兼羮胾上下咸以僭奢為恥是聖王治定無為之徴驗也故四靈以為畜者因飲食有由也天下飲食從禮故四靈為瑞應信及豚魚禮化明備也前儒不認由從於禮之義而解由為用其義失矣何謂四靈麟鳯龜龍謂之四靈故龍以為畜故魚鮪不淰鳯以為畜故鳥不獝麟以為畜故獸不狘龜以為畜故人情不失鄭氏曰淰之言閃也獝狘飛走之貌也失猶去也龜北方之靈信則至矣孔氏曰此一經更解四靈之事謂之靈者以此四者皆有神靈異於他物也淰水中驚走也閃是忽有忽無魚從龍鳥從鳯獸從麟龍鳯麟既來為人之畜則其屬見人自不驚而飛走也龜知人情既來應人知人情善惡故人各守其行其情不失也上三者皆言其長來而族至此應云龜以為畜而甲族馴狎今獨云感信而至者與上三族相互此言感信則上亦感仁義禮而至也案月令冬云其蟲介則龜為水蟲水主信故信則至水為信則土為知然水土二行俱有信知嚴陵方氏曰麟體信厚鳯知治亂龜兆吉凶龍能變化故謂之四靈淰謂水動不淰以見魚之不驚躍也文王有靈德以及鳥獸昆蟲故謂其囿曰靈囿謂其沼曰靈沼至於麀鹿濯濯白鳥翯翯於牣魚躍鼉鼓逢逢豈非能以之為畜故然邪馬氏曰於龜又言人情不失何也蓋龜者能逆知人之情狀而善惡吉凶皆不能逃之也龍泉葉氏曰四靈為畜上世載之詳矣聖人盡人道之正則彼動物之傑不得翻然自遂其雄狡而一將聽命於人於是蟲魚鳥獸無不順若而人之飲食生養亦未有茍為溫飽而不自知其所由來者故夔言鳯凰來儀周公言遺我大寶龜孔子曰鳯鳥不至河不出圖吾已矣夫此言物之聽命於人也後世先王之治不可復見其所以為治之説儒者亦失其傳反以異物之來為善祥嘉瑞之應不度其德之厚薄而取必於異物之有無故怪異日興治象日隱如漢所稱神爵五鳯黃龍其君臣歆豔皆以為天之報貺而已嗟夫是人反聽命於物也長樂陳氏曰魚鱉鳥獸至於不淰不獝不狘者蓋亦不必實然所以誘君人者修德而已矣故先王秉蓍龜列祭祀瘞繒宣祝嘏辭説設制度故國有禮官有御事有職禮有序鄭氏曰皆卜筮所造置也埋牲曰瘞幣帛曰繒宣猶揚也繒或作贈孔氏曰上既言龜知人情故此一節言卜筮所造置之事先王聖人將有大事必秉執蓍龜而問吉凶言蓍者凡卜皆先筮故兼言之陳列祭祀謂郊廟以下皆用卜筮也瘞謂祀地埋牲也祭法云瘞埋於泰折祭地也繒之言贈也謂埋告又贈神也祝嘏有舊辭更宣揚告神也設制度謂造宫室城隍車旗之屬以上諸事既並用卜筮故國家必有其禮國既有禮故百官各御其事官既有御故百事各有職主凡所行禮皆有次序也長樂劉氏曰先王措天下如此而猶不敢以自任也於是有猷有為則秉於蓍龜求其明知於神也列於祭祀歸其功德於祖也瘞繒宣祝達其誠信於幽也嘏辭説者示其神靈之饗也設制度者辨上下定民志也故國無大小皆有禮以稱之故官有所御事有所職禮有所序不相奪倫而五禮之施五品之實遍於斯民一道德以同風俗莫非五常之歸也延平周氏曰蓍者數也數故為筮龜者象也象故為卜以先王之誠心敬德固足以感天下然猶秉於蓍龜列於祭祀蓋以為吾之有為有行莫非稟受於神明而無非事者此國之所以有禮官之所以有御事之所以有職而禮之所以有序者也嚴陵方氏曰秉蓍龜所以決禮之疑列祭祀所以致禮之敬瘞繒所以備禮之物宣祝嘏辭説所以通禮之情設制度所以修禮之文若是則可謂有其禮矣故繼言國有禮也繒帛藏之於幽故言瘞辭説揚之於明故言宣建國必設官設官必治事治事所以行禮故其序如此然上言國有禮則禮之體也下言禮有序則禮之用也山隂陸氏曰幽言瘞繒顯言宣祝嘏辭説不責不備也鄭氏謂埋牲曰瘞幣帛曰繒失之矣故先王患禮之不達於下也故祭帝於郊所以定天位也祀社於國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也故宗祝在廟三公在朝三老在學王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正鄭氏曰患禮不達患下不信也祭帝於郊以下所以達禮於下也教民尊神慎居處也宗宗人也瞽樂人也侑四輔也孔氏曰此一節為上並用卜筮民下猶未見信先王患之故更為下諸事使達下也天子至尊而猶祭於郊以行臣禮而事天是欲使嚴上之禮達於下天髙在上故云定天位也至尊而猶自祭社是欲使報恩之禮達於下也地出財故云列地利也王在宗廟以子禮事尸是欲使仁義之教達於下也王自祭山川是欲使儐敬鬼神之教達於下也王自祭五祀是欲使本事之教達於下也五祀是制度故云本事也此明因事鬼神使禮達於下鄭注教民尊神是也宗祝以下明因委於人使禮達於下也王在宗廟則委於宗祝在朝職事則委任三公在學乞言則受之三老若王弔臨則前委於巫動則左史書之言則右史書之既言前巫故云後史也卜筮主決疑瞽是樂人主和侑是四輔即左輔右弼前疑後丞皆侑勸人君為善典規諌者示不自專故並置左右宗祝以下鄭注慎居處是也既祭祀尊神及委任得人故王中心無為以守至正之道也長樂劉氏曰祭帝於郊也天位由之而定民不敢慢於其上矣祀社於國也生物享其報而民不敢慢於其神矣祖廟有祀也受祖有其德而民不敢慢於其人矣山川有祀也報功有其秩而民不敢僭於其禮矣故宗祝在廟者執祭祀之禮雖鬼神之大不可得以亂之也三公在朝者執上下之禮雖君上之尊不可得以踰之也三老在學者執人倫之禮雖異數之隆不可得以變之也王前巫者辟除其心之疑慮也後史者臨正其行之欹傾也卜筮瞽侑皆在左右者防其言動之有失也夫如是也何為哉欲王之中心無為也無為矣而曰以守至正者何謂也中心不為於意慮則寂然而不動是人之正性也長樂陳氏曰先王以為禮之行常在於人之所畏敬而人之所畏敬者在於天地鬼神故於其所畏敬而寓之以法則此禮所以達上下也夫惟禮之達於上下則君人有以安於上故宗祝在廟足以講禮正法三公在朝足以論道經邦三老在學足以乞言憲行前巫所以却不祥後史所以書言動卜筮在左所以決疑謀瞽師在右所以防非志凡此皆人之侑輔王中心無為以守至正而已矣嚴陵方氏曰禮之始也則自天子出禮之終也則與民由之與民由之然後禮達而分定故先王患禮之不達於下則必有以為之教者然教必以祭祀為主者以神道設之使民知畏敬故也天則逺人而尊故祭帝於郊地則近人而親故祀社於國郊謂郊之南南者陽之盛故曰所以定天位國謂國之右右者隂之盛故曰所以列地利定天位則天下達於尊卑之禮矣列地利則天下達於施報之禮矣且位以祭之所言也利以祭之物言也位欲其一故言定物欲其陳故言列天神曰祀地示曰祭而此於天曰祭者郊所以明天道故也於地曰祀者社所以神地道故也仁以立人道而人本乎祖故曰祖廟所以本仁也如是則天下達於親踈之禮矣我為祭主於內而山川之鬼神在外固有賔道故曰所以儐鬼神也如是則天下達於興作之禮矣五祀出於五行而五行各因時以用事焉故曰所以本事也如是則天下達於制度之禮矣然於帝於社止言祭祀則祖廟而下皆主祭祀可知也廟者神之所存而宗祝所以事神故在廟朝者政之所出而三公所以共政故在朝學者教之所寓而三老所以奉教故在學不祥却於未然故前巫言行紀於己然故後史卜以知象筮以知數瞽以典樂侑謂侑食左右前後皆得其人則王非特外之無為也中心亦至守正夫天下之動正乎一而止茍非以至正為守則天下之動莫之能正雖欲無為也其可得乎以玉藻考之史有左右而此乃言後史者對前巫言之則為後而後自分左右故也以膳夫考之王日一舉以樂侑食則知此言瞽言其人侑言其事爾馬氏曰天位乎上而生時不窮聖人祭天於圜丘所以嚴上也故曰定天位地位乎下而生財不已聖人祭地於方丘所以因下也故曰列地利祖廟逺則殺之所以示其義近則隆之所以示其仁離而言之則有仁義之别合而言之皆所以親親仁也故祖廟所以本仁禮器所謂宗廟之祭仁之至者其意同也山者地之髙川者地之深而皆有興作之功有鬼神以助其幽故所以儐鬼神五祀者中霤户竈門行制度所出亦治天下之事也自郊社推而至於五祀皆所以達於下者也以一人之身不能達於天下必寄於羣材然後能如此以至於無為而治也故繼之以宗祝在廟三公在朝三老在學既曰中心無為又曰以守至正何也蓋人之情安久則逸逸久則亂故中心無為而繼之以守至正然後能守其無為之道也龍泉葉氏曰禮之理顯而事隱禮之理可極而事難名故先王非以禮之不備於其身為憂而以禮之不達於其下為患也夫禮者聖人以為因我之所設而後明耳故天位未嘗不定也必祭帝而後定地利未嘗不列也必祀社而後列廟吾之所為祖而曰此仁之本也山川效地之俯仰而已嚴而奉之以儐於鬼神也居處器服切於人而已本其事之所由起尊而先之曰有神之所為也廟有宗祝朝有三公學有三老巫前史後卜筮瞽侑皆在左右濟濟然秩秩然森然凛然有觀有聽有效有法而王不自見其所為也凡其為此者皆以達夫禮也故百神受職百貨可極孝慈服正法則而禮誠達矣義之修禮之藏其器數名物反復委曲不可窮盡也不然則夫薄禮者之論以為天本髙地本厚日月本明萬物與人未嘗不自然而聖人者烏用是區區其間哉况夫俗靡事弊而極究於敲撲趨走之不給則先王之所以達禮於天下之具是誠有所不能識者矣然則禮之所以本所以分所以轉變者何從知之徇今而忘禮不可也徒誦古之言禮者樂而味之而不考於今之何以合何以不合不可也江陵項氏曰王前巫而後史卜筮瞽侑皆在左右之位聖王豈溺於淫瞽者哉誠見夫顯微之無間天人之合一視聽言動之變即風雨寒燠之源故考驗占察如此其密也詩曰文王陟降在帝左右此之謂也又曰昊天曰明及爾出王昊天曰旦及爾遊衍譏厲王之不能察也延平周氏曰瞽言其人侑言其理先言宗祝立於禮也終言瞽侑成於樂也建安真氏曰古之所以衆建忠賢森列左右者皆以正人君之心也在朝則有三公焉所謂道之教訓傅之德義保其身體者也在學則有三老焉所謂憲德乞言者也巫掌祀以鬼神之事告王史掌書以三皇五帝之事告王掌卜筮者以吉凶諌王瞽矇之叟以歌詩諌王一人之身而左右前後挾而維之以引以翼有孝有德雖欲斯須自放得乎故王中心它無所為惟守至正而已後世人主所親者􅉏御近習所説者淫聲美色狐媚蠱惑者千態萬貌雖欲無邪其可得乎此君德所以不如古也蔣氏曰聖人惟能定天下之禮而後可以辨天下之職天下之職既辨則一己之職亦不勞而自舉此王者所以惓惓於禮以御斯世也蓋禮有大有小則職亦有尊有卑方其祭帝於郊就陽以定天位祀社於國答隂以列地利祖廟崇報反之仁山川儐逺近之職五祀彰不一之事大者不得以兼乎小小者不得以干乎大義有所由生文有所由寓此其禮一定而不易者也夫惟禮之大小一定不易故設官崇卑亦各有攸司而不相亂坐乎朝者議不及乎末尊乎學者職不關乎細宗祝在廟儀文是掌弗及乎大事也巫史前後卜瞽左右彼特以問吉凶職聰察司辭説而弗與乎大本也夫是以上而總化原者有其人至於侍御僕從罔有弗正故一人中心無為於上而治道以立乃若官職廢闕典禮隳壞天下正人直士既不得尊於朝禮於學則下而宗祝工師之徒亦不得盡其才效其藝昔者孔門記晚周之時太師摰適齊以下傷魯之不用人也若是則宗祝安得在廟卜筮瞽侑安得在左右或用人不當其位如衛之賢者仕於伶官無非可以承事王者之人則碩人俁俁公庭萬舞如簡兮之刺則三公安得在朝三老安得在學然則王者欲守至正以御天下必如古聖人之定禮分職而後可以收無為之治功故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉故自郊社祖廟山川五祀義之修而禮之藏也鄭氏曰言信得其禮則神物與人皆應之百神列宿也百貨金玉之屬修猶飾也若其城郭然孔氏曰此一節論上文禮既達於下有功而見徴應百神天之羣神也王者郊天備禮則星辰不忒故云受職祀社盡禮則五穀豐稔金玉露形盡為國家之用故云可極祭廟盡禮而天下皆服行孝慈祭五祀以禮而天下法則各得其正不言山川興作者法則之事包之也祭在上諸神是義之修飾禮之府藏也長樂陳氏曰禮行於郊而百神受職焉者以其大報天而百神莫不與之也禮行於社而百貨可極焉者以其五土之宜百物資之以生也禮行於祖廟而孝慈服焉者以其有祝以告人之孝而有嘏以告神之慈也禮行於五祀而正法則焉者以其有制以正法有度以正則也言郊社祖廟五祀而不及山川者以社言百貨可極則兼之也夫義則有宜禮則有體務其宜以歸其體然後五者之教全矣故曰義之修禮之藏也嚴陵方氏曰受職言各受其職而有守也可極言各盡其利而無遺也正法則者以制度之所在故各得其法則之正也其行於始也祭帝於郊而已故終至於禮行於郊焉其始也祀社於國而已故終至於禮行於社焉固其序也推之於祖廟五祀其義亦若是廬陵胡氏曰百神如詩懷柔百神鄭指星辰太泥四明沈氏曰自郊至五祀皆言禮行正孟子不誠未有能動者也不是説行禮我與神為二不可謂之行無所往而不感通此之謂行聖人之誠足以感神而無間故無往而不得其所欲宓氏曰義者理也禮者文也義者內也禮者外也人之於禮始也見其禮而未知其所以為義謂之禮修而義藏可也故曰義而不自知亦猶假筌以求魚魚得而忘筌因蹄以獲兔兔得而忘蹄故曰義之修而禮之藏也蔣氏曰郊社祖廟山川五祀之義禮運一篇蓋纍纍言之大旨則同至此則曰百神受職曰百貨可極曰孝慈服曰正法則備言聖人為禮之效也謂之義修而禮藏則聖人因義以起禮因禮以辨義禮義之為説實相表裏禮記集説卷五十七
