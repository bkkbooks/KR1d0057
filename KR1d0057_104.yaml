body:
  text: 禮記集說卷一百四宋衛湜撰大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦已雖小功既卒哭可以冠取妻下殤之小功則不可鄭氏曰此皆謂可用吉禮之時父大功卒哭而可以冠子嫁子小功卒哭而可以取婦己大功卒哭而可以冠子小功卒哭而可以取妻必偕祭乃行也下殤小功齊衰之喪除喪而後可為昬禮凡冠者其時當冠則因喪而冠之孔氏曰大功謂己有大功之喪末謂卒哭之後取婦有酒食之會集鄉黨僚友渉近歡樂故大功之末乃可得為也經文大功據己身不云父小功據其父不云身互而相通故鄭註同之謂父及己身俱有大功之末小功之末父是大功之末己亦是大功之末乃得行此冠子嫁子父小功之末己亦小功之末可以嫁取必父子俱然乃得行事故云必偕祭乃行知父子俱大功小功者若姑姊妹出適父子俱為大功從祖兄弟父子俱為小功其服同也若父齊衰子大功則不可若父大功子小功可以冠嫁未可取婦必父子俱小功之末可以取婦若父小功已緦麻灼然合取可知下殤小功謂本齊衰重服降在小功不可冠嫁其餘小功可以冠取若其齊衰長殤中殤降在大功理不可冠嫁矣經云大功小功之末可以吉冠則大功小功之初當冠之時則因喪服而冠之鄭因前經三年之喪可冠於此復明輕喪亦可冠也范氏曰按禮大功之末可以冠子嫁子此於子已為無服也以己尚在大功喪中猶未忍為子娶婦近於歡事也故於冠子嫁子則可娶婦則不可矣已有緦麻之喪於祭亦廢㛰亦不通矣况小功乎又曰五服之制各有月數月數之内自無吉事故曰縗麻非所以接弁冕也春秋左氏傳齊侯使晏子請繼室於晉叔向對曰寡君之願也縗絰之中是以未敢請時晉侯有少姜之喪耳禮貴妾緦而叔向稱在縗絰之中推此而言雖輕喪之麻猶無㛰姻之道也而敦本敬始之義每於㛰冠見之矣雜記曰大功之末可以嫁子小功之末可以娶婦而下章云已雖小功卒哭可冠娶妻也二文誠為相代尋此言為男女失時或繼嗣未立者耳非通例也横渠張氏曰大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以娶婦疑大功之末己下十二字為衍宜直云父大功之末云父大功則是己小功之末也而己之子緦麻之末也故可以冠取也盖冠取者固已無服矣凡卒哭之後皆是末也所以言衍者以上十二字義無所附著己雖小功既卒哭可與冠取妻是已自冠取妻也山隂陸氏曰入小功之末謂小功服之在父行者若從祖父母從姊妹從祖父祖母從祖祖姑是也大功之末在卑行者若孫及從父兄弟從父姊妹兄弟之子婦是也大功之末不言可以取婦不可以取婦也已雖小功既卒哭可以冠取妻言主冠取者雖在可以主之域然其冠取者若有小功未卒哭亦不可凢弁絰其哀侈袂鄭氏曰侈猶大也弁絰服者弔服也其衰錫也緦也疑也袂之小者二尺二寸大者半而益之則侈袂三尺三寸孔氏曰弔服首著弁絰身著錫衰緦衰疑衰此三衰大作其袂若士則其衰不侈也故周禮司服有元端素端註云變素服言素端明異制大夫以上侈之明士不侈故稱端父有服宫中子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側大功將至辟琴瑟小功至不絶樂鄭氏曰宫中子與父同宫者也禮由命士以上父子異宫不與於樂謂出行見之不得觀也將至来也辟琴瑟亦所以助哀孔氏曰父有服在宫中不與於樂謂命士以下與父同宫者若異宫則得與於樂案崔氏曰父有服齊衰以下之服也若重服則期後猶有子姓之冠自不當與於樂長樂黄氏曰註云宫中子與父同宫者禮由命士己上父子異宫正義従而觧云若異宫則得與樂上文言諱雖子之服盡尚従父諱其父之所諱豈命士而上父有喪服者子可與樂哉今詳之父有服宫中者譬諸父方持服在家未出而從吉之時其子或輕而先除或親盡而無服以其父方在喪服哀泣未終不可與於樂也亦如從父諱於先祖之禮也次云母有服妻有服亦謂方在服制之中亦隨其降殺其宫中者謂持服不出之際則其義明焉非謂同宮室居命士而上父有喪服可觀聴音樂者也山隂陸氏曰此一節自士上達父有服有作樂者宫中雖不聞子不敢與也母有服聲聞焉不敢舉樂妻有服於其側不舉爾所謂不與於樂非直不舉也長樂陳氏曰父生我者也尊而不親故父有服宫中子不得與於聞樂况舉樂乎母鞠我者也親而不尊故母有服不得以舉樂雖聲聞焉可也妻齊我者敵體而已故妻有服不舉樂於其側雖不於其側舉之可也是人子有服於母其情殺於父而於妻又殺於母也樂不止於琴瑟而琴瑟特常御者而已曲禮曰君子無故不徹琴瑟大功之親有服其將至則為有故矣雖辟琴瑟可也未至則不必辟琴瑟矣小功之親有服雖不至絶樂其將至又可知矣雖然小功至不絶樂若夫於己有小功之喪議而及樂又禮之所弃也姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之或曰主之而附於夫之黨鄭氏曰此謂姑姊妹無子寡而死也夫黨無兄弟無緦之親也其主喪不使妻之親而使夫之族人婦人外成主必宜得夫之姓類也里尹主之喪無無主也里尹閭胥里宰之屬諸侯弔於異國之臣則其君為主里尹主之亦斯義妻之黨自主之非也夫之黨其祖姑也孔氏曰此一節明姑姊妹在夫家而死無後使外人為主之事或曰主之者或人之說云妻黨主之而祔祭之時夫之黨主之非也案周禮六鄉之内二十五家為里里置一宰下士也諸侯之臣在國而死他國君来弔則君為主死者雖至親不得為主里尹主之亦此義新安朱氏曰古法既廢鄰家里尹决不肯祭他人之親則從宜而祀之别室其亦可也山隂陸氏曰言妻之黨雖親弗主茍夫無族矣雖視朋友至於祔而止可也䘮服小記曰大功者主人之䘮有三年者則必為之再祭朋友虞祔而已麻者不紳執玉不麻麻不加於采鄭氏曰吉凶不相干也麻謂絰也紳大帶也䘮以要絰代大帶也麻不加於采衣采者不麻謂弁絰者必服弔服是也采元纁之衣孔氏曰尋常執玉行禮不得服衰麻聘禮己國君薨至於主國衰而出註云於是可以凶服將事似行聘饗執玉得服衰絰者彼謂受主君小禮得以凶服若行聘饗大事則吉服也弁絰之麻不得加於元衣纁裳之采山隂陸氏曰據此若弁絰雖服皮弁而絰非常服之弁歟弁師王之皮弁服會五采國禁哭則止朝夕之奠即位自因也童子哭不偯不踊不杖不菲不廬鄭氏曰禁哭謂大祭祀時雖不哭猶朝夕奠自因自用故事童子未成人不能備禮也當室則杖孔氏曰即位自因者孝子於殯宫朝夕奠之時即阼階下位自因其故事而設奠也案問䘮云童子當室則免而杖當室謂十五以上若世子生則杖故曽子問云子衰杖成子禮是也案皇氏曰童子當室則備此經中五事問䘮之免而云杖舉重言也山隂陸氏曰國禁哭則止朝夕之奠即位自因也此一節宜承如始即位之禮脫爛在是言若國禁哭則之他室不哭其入奠與即位猶自因也孔子曰伯母叔母䟽衰踊不絶地姑姊妹之大功踊絶於地如知此者由文矣哉由文矣哉鄭氏曰由用也言知此踊絶地不絶地之情者能用禮文哉能用禮文哉羙之也伯母叔母義也姑姊妹骨肉也山隂陸氏曰䟽衰大功文也踊絶不絶情也伯叔母之䘮文至而情不至姑姊妹之䘮文不至而情至知此者則凢於禮知由於内矣故曰如知此者由文矣哉若夫徒文具而無至誠惻怛之實失是矣廬陵胡氏曰踊絶地不絶地義有輕重豈由禮文而已哉泄栁之母死相者由左泄栁死其徒由右相由右相泄栁之徒為之也鄭氏曰亦記失禮所由始也泄栁魯穆公時賢人也相相主人之禮孔氏曰相主人之禮法相也由左孟子云魯穆公時子柳子思為臣子栁即此泄栁也山隂陸氏曰由右相雖非古在可以然之域凡經言自某始記失禮所由始也即言為之君子有取焉據鑿巾以飯公羊賈為之也由右相泄栁之徒為之也七月而禘獻子為之也天子飯九貝諸侯七大夫五士三鄭氏曰此盖夏時禮也周禮天子飯含用玉孔氏曰典瑞云大喪共飯玉含玉禮戴說天子飯以珠含以玉諸侯大夫士飯以珠含以貝皆非周禮並夏殷之法左傳成十七年子叔聲伯夢食瓊瑰哀十一年齊陳子行命其徒具含玉此等皆是大夫而以珠玉為含者以珠玉是所含之物故言之非謂當時實含用珠玉也山隂陸氏曰士喪禮貝三實于笄此士三之證也案珠玉曰含玉貝亦曰含則散言之飯含通也鄭氏謂盖夏時禮周禮天子飯含用玉誤矣典瑞言玉職也貝非所言大戴禮天子飯以珠含以玉諸侯飯以珠大夫士飯以珠含以貝典瑞大䘮共飯玉含玉則珠有以玉為之者矣玉府所謂珠玉是也諸侯言飯不言含則䝉上含以玉可知然則飯以珠不必言矣其言之則以天子珠兼以玉諸侯以珠而已稽命徴曰天子飯以珠含以玉諸侯飯以珠含以璧相備也相備而天子言玉諸侯言璧璧器也廬陵胡氏曰春秋時子叔聲伯陳子行臣飯含僣君疑衰周時禮鄭謂此等夏殷禮無所依據又檀弓飯用米貝鄭不疑於夏殷獨疑此何也士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭士三虞大夫五諸侯七鄭氏曰尊卑恩之差也天子至士葬即反虞孔氏曰大夫以上葬與卒哭異月者以其位尊念親哀情於時長逺士職卑位下禮數未申故葬罷即卒哭檀弓云葬日虞弗忍一日離也不顯尊卑是貴賤同然山隂陸氏曰士踰月而葬容外姻至大夫三月而葬容同位至諸侯五月而葬容同盟至天子七月而葬容同軌至左傳云同軌畢至著同盟以下雖至有不畢也若其卒哭遲速不同則以其徳服䘮有隆殺也諸侯使人弔其次含襚賵臨皆同日而畢事者也其次如此也鄭氏曰言五者相次同時孔氏曰諸侯使人弔隣國先行弔禮宣君命人以飲食為急故含次之食後湏衣故襚次之有衣即湏車馬故賵次之君事既畢則臣行私禮故臨在後事雖多同一日畢也卿大夫疾君問之無算士壹問之君於卿大夫比葬不食肉比卒哭不舉樂為士比殯不舉樂孔氏曰案喪大記君於大夫疾三問之此無算謂有師保恩舊之親或三問謂君自行無算謂遣使也升正柩諸侯執綍五百人四綍皆銜枚司馬執鐸左八人古八人匠人執羽葆御柩大夫之䘮其升正柩也執引者三百人執鐸者左右各四人御柩以茅鄭氏曰升正柩者謂將葬朝于祖正棺於廟也五百人謂一黨之民諸侯之大夫邑有三百户之制綍引同耳廟中曰綍在塗曰引互言之御柩者居前道正之大夫士皆二綍孔氏曰此經明諸侯大夫送葬正柩之禮執鐸之差將葬朝於祖廟柩升廟之西階既夕禮云升自西階正柩於兩楹間是也銜枚止喧囂也司馬夏官主武故執金鐸率衆左右各八人夾柩以號令於衆也匠人工人也以鳥羽注於柄頭如蓋謂之羽葆匠人主宫室故執羽葆居柩前御行於道指揮為進止之節也周禮䘮祝御柩謂王禮也案周禮注六卿主六引六遂主六綍經云執綍應舉六遂而言黨者正取一黨之人數耳邑有三百户之制謂小國中下大夫也其實大國下大夫亦三百戸故論語云奪伯氏駢邑三百註云伯氏齊大夫是齊為大國下大夫亦三百家也嚴陵方氏曰載柩有車車有副焉而載柩者為正大夫殺禮於諸侯故以茅取其色白宜於凶禮且以表哀素之心焉楚軍前茅亦以兵凶器也孔子曰管仲鏤簋而朱紘旅樹而反坫山節而藻梲賢大夫也而難為上也晏平仲祀其先人豚肩不揜豆賢大夫也而難為下也君子上不僣上下不偪下鄭氏曰難為上也言其僣天子諸侯鏤簋刻為蟲獸也冠有笄者為紘紘在纓處兩端上屬下不結旅樹門屏也反坫反爵之坫也山節薄櫨刻之為山梲侏儒柱畫之為藻文難為下言其偪士庶人也豚爼實豆徑尺言并豚兩肩不能覆豆喻小也孔氏曰此一節明奢儉失禮之事祭義云天子冕而朱紘山節而藻梲天子之廟飾論語云邦君樹塞門邦君為兩君之好有反坫此天子諸侯之制而管仲為之當時謂管仲是大夫之賢者尚為此僣上之事是難乎為上者言他人在管仲之上者皆被僣之也旅樹山節已具禮器及特牲䟽依禮豚在於爼以豆形既小尚不揜豆明豚小之甚不謂豚在豆也平仲賢大夫猶尚偪下是在平仲之下者恒被平仲而偪也馬氏曰管仲以其君霸晏子以其君顯相齊之業可謂賢矣然有功而不必有德有才而不必有禮故能九合諸侯而不能治一身能一言省刑而不能善一祭此敬仲君子以為濫平仲君子以為隘也故言其功與才則孔子稱其勲勞而荀子第其優劣言其徳禮則曽西所不為而孟子所不與也以是知非有德不可以知禮非有禮不足以成徳徳禮既偹豈有失哉婦人非三年之䘮不踰封而弔如三年之䘮則君夫人歸夫人其歸也以諸侯之弔禮其待之也若待諸侯然夫人至入自闈門升自側階君在阼其他如奔䘮禮然嫂不撫叔叔不撫嫂鄭氏曰踰封越竟也君夫人歸奔父母䘮也其歸也以諸侯弔禮其待之若待諸侯謂夫人行道車服主國致禮入自闈門升自側階不自同於賔客也宫中之門曰闈門為相通者也側階亦旁階其他謂哭踊髽麻嫂不撫叔叔不撫嫂逺别也孔氏曰此一節明諸侯夫人奔父母喪節如若也若父母三年之䘮則雖君之夫人歸往奔喪也非三年䘮則不歸女子出適為父母期云三年者以本親言也案䘮大記夫人弔於大夫士入自大門升自正階今此不然以女子不同於女賔之䟽也主國之君在阼階待之不降階而迎言其他如奔喪禮嫌夫人位尊與卿大夫妻奔䘮禮異故明之嚴陵方氏曰男不入女不出則婦人其可以踰封乎唯弔三年之䘮然後踰封而弔哀有所重故也檀弓言五十無車者不越疆而弔人者所以優老也此之所言特以防微而已闈門宫中旁出之門也撫謂撫存之也與不通問同義李氏曰榖梁傳曰婦人既嫁不踰竟踰竟非正故曰婦人非三年之䘮不踰封而弔春秋書曰郯伯姬来歸傳曰大歸也大歸而猶曰郯夫人之也故曰若待諸侯然非三年之䘮則雖衛之亡而許穆夫人不得歸唁者大夫守之以義故也君子有三患未之聞患弗得聞也既聞之患弗得學也既學之患弗能行也君子有五恥居其位無其言君子恥之有其言無其行君子恥之既得之而又失之君子恥之地有餘而民不足君子恥之衆寡均而倍焉君子恥之鄭氏曰恥民不足者古者居民量地以制邑度地以居民地邑民居必參相得也衆寡均謂俱有役事人數等也倍焉彼功倍已也孔氏曰此一節明在位君子有三患五恥之事人湏多識若未聞知患不得聞也地邑民居必参相得不能撫飬使民逃散是地有餘而民不足役民衆寡彼己均等他人功績倍多於己由不能勸課督率故君子恥之嚴陵方氏曰弗聞則無由知弗學則無由能弗行則無由至道始於聞而知中於學而能卒於行而至雖然聞之矣而不能學則與無聞同學之矣而不能行則與不學同故君子毎以是為患焉昔舜居深山聞一善言則若决江河沛然莫之能禦此其至也子路有聞未之能行唯恐有聞又其次也若冉求對孔子以非不說子之道力不足也豈知所謂聞而能學乎齊王欲孟子姑舎爾所學而從我豈知所謂學而能行乎君子居其位將以行道道非言無自而行居其位而無其言是備位耳孟子曰立乎人之本朝而道不行恥也其謂是歟言之者衆而行之者寡言之為易而行之為難有其言而無其行是空言耳孔子曰古者言之不出恥躬之不逮也又曰君子恥其言而過其行其謂是歟君子進以禮位固不可以茍得退以義則位又不可以苟失既得之而又失之則非義而退矣孔子曰邦有道貧且賤焉恥也其謂是歟政不足以聚人則民不繁民不繁則有曠土矣故地有餘而民不足曲禮曰地廣大荒而不治此亦士之辱也其謂是歟術不足以使人則事不逮事不逮則有廢功故衆寡均而倍焉孟子曰地醜徳齊莫能相尚其謂是歟所謂衆寡均而倍者彼力均於此而我功少於彼也雖然孔子甞謂鄙夫事君其未得之患不得之既得之患失之此乃言既得之又失之盖鄙夫之心在乎固其位君子之心在乎稱其位勢不足以固其位而失之者鄙夫所患也徳不足以稱其位而失之者君子所恥也此所以為異三患之所言者道故曰患五耻之所言者事故曰恥此所以言三患於前而後言五恥唯其知所患故能終至於無患唯其知所恥故能終至於無恥廬陵胡氏曰楚許伯樂伯攝叔致師能行其所聞而復者能力行也故聞也學也患弗得不患弗能唯行也患弗能也能猶力也衆寡均而倍焉若鄰國之民不加少寡人之民不加多也孔子曰凶年則乗駑馬祀以下牲鄭氏曰自貶損亦取易供也駑馬六種最下者下牲少牢若特豕特豚也孔氏曰此一節明凶荒君自貶損也校人馬有六種種馬戎馬齊馬道馬田馬此五路所乗駑馬負重載逺所乗凶年人君自貶乗駑馬也天子諸侯常祭太牢凶荒則用少牢諸侯之卿大夫常祭用少牢降用特豕士常祭用特豕降用特豚如此之屬皆為下牲嚴陵方氏曰馬不良謂之駑牲非純全謂之下山隂陸氏曰下牲盖猶用其本牲之下者也故祭凶年不儉恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是乎書鄭氏曰時人轉而僣上士之喪禮已廢矣孔子以教孺悲國人乃復書而存之嚴陵方氏曰喪禮將亡聖人不可以不書必待孺悲學之然後孔子書之者以明禮之不廢亦有所因也山隂陸氏曰儀禮士喪是歟子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非爾所知也張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也鄭氏曰蜡也者索也嵗十二月合聚萬物而索饗之祭也國索鬼神而祭祀則黨正以禮屬民而飲酒于序以正齒位於是時民無不醉者如狂矣曰未知其樂怪之也蜡之祭主先嗇大飲烝勞農以休息之言民皆勤稼穡有百日之勞喻久也今一日使之飲酒燕樂是君之恩澤非女所知言其義大也張弛以弓弩喻人也弓弩久張之則絶其力久弛之則失其體孔氏曰此一節明蜡月鄉飲酒之樂蜡謂王者於亥月報萬物休老息農又各燕㑹飲酒於黨學中故子貢往觀之民勤稼穡其實一年而云百日舉其成數以喻久也張謂張弦弛謂落弦張而不弛則絶其弓力喻民久勞不息亦損民力弛而不張則失弓往来之體喻民久休息則志驕逸若調之以道化之以理張弛以時勞逸以意則文武得其中道也藍田吕氏曰蜡索祭也嵗十二月嵗將終矣百物成矣凡物之神苟有功於人無不舉而祭之故司嗇也百種也農也郵表畷也貓也虎也坊也水也謂之八蜡祭之道至于蜡則報之禮備矣故曰仁之至義之盡也自秋成至于十二月有百日在百日中索是鬼神以脩蜡禮故曰百日之蜡至于十二月乃祭祭而遂息田夫故曰一日之澤一方不成則蜡不行於其方謹愛民財而不可費也順成之方蜡祭乃行必使不成之方移民而就粟也嚴陵方氏曰蜡者既勞之而報之也澤者欲息之而加之惠也勞之其来也久故言百日之蜡息之其及也均故言一日之澤方其勞之之初猶弓之張而有為也及其息之之後猶弓之弛而非作也張之以武所以告始弛之以文所以成終百日之蜡始於春一日之澤終於冬亦是意也馬氏曰王者奉天牧民以施政春夏使之耕作秋冬使之收成欲其富也能勿勞乎致其勞也能勿息乎既蜡而收民息已則飲之酒使其相樂是也子貢觀蜡但見其狂是上不知觀天道下不能酌民情故孔子告之以百日之蜡一日之澤而又言張而不弛文武不能弛而不張文武不為盖推蜡之澤以治民推民之意以承天則不為久張以著其仁不為久弛以著其義自非聖人安能明此山隂陸氏曰弛而不張聖人有所不為張而不弛聖人有所不能孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也鄭氏曰記魯失禮所由也孟獻子魯大夫仲孫蔑也魯以周公之故得以正月日至之後郊天亦以始祖后稷配之獻子欲尊其祖以郊天之月對月禘之非也魯之宗廟猶以夏時之孟月爾明堂位曰季夏六月以禘禮祀周公於太廟孔氏曰此一節明魯郊禘之事獻子仲孫蔑諡也正月周正月建子之月也日至冬至日也有事謂南郊祭所出之帝靈威仰也周以十一月為正其月日至若天子則圜丘魯以周公之故得郊天所以於此月郊所出之帝此言是也七月周七月建午之月也日至夏至日也有事謂禘祭於祖廟此言非也魯之祭祀猶用夏法禘於孟月孟月於夏家是四月於周為六月獻子以二至相當以天對祖乖失禮意獻子為之記其失所由也案春秋宣九年獻子始見經案僖八年於時未有獻子而七月禘者鄭云以僖公八年正月公㑹王人于洮六月應禘以在㑹未還故至七月乃禘禮不合譏為致夫人故書之獻子既七月而禘春秋不書於經以示譏者魯時暫行之又此不云自獻子始是不恒行也山隂陸氏曰此言冬日至可以有事於上帝夏日至可以有事於祖七月而禘僖公盖嘗用此秋七月禘於太廟是也夫人之不命於天子自魯昭公始也鄭氏曰亦記魯失禮所由也周之制同姓百世㛰姻不通呉太伯之後魯同姓昭公取於吳謂之吳孟子不告於天子自此後取者遂不告於天子天子亦不命之孔氏曰諸侯夫人亦天子所命或是王后無畿外之事故天子命畿外諸侯夫人此文是也若畿内諸侯及卿大夫之妻則玉藻註云天子諸侯命其臣后夫人亦命其妻是也外宗為君夫人猶内宗也鄭氏曰皆謂嫁於國中者為君服斬夫人齊衰不敢以其親服服至尊也外宗謂姑姊妹之女舅之女從母皆是也内宗五屬之女也其無服而嫁於諸臣者從為夫之君嫁於庶人從為國君孔氏曰君内宗為君悉服斬衰為夫人齊衰則君外宗之女為君及夫人與内宗同故云猶内宗也案禮族人不敢以其戚戚君則異族者亦不可以戚戚君故不以其親服服至尊也鄭知嫁於國中者以經云為君夫人是國人所稱號故也國外當云諸侯古者大夫不外取故君之姑姊妹嫁於國内大夫為妻是其正也舅之女及從母在國中非正也諸侯不内取舅女及從母不得在國中諸侯雖曰外取舅及從母元在他國而舅之女及從母不得来嫁於己國卿大夫為妻以卿大夫不外取也内宗外宗嫁在他國皆為本國諸侯服斬或云在他國則不得也此外宗與䘮服外宗為君别也故鄭註彼云外宗是君之外親之婦此外宗惟據君之宗廐焚孔子拜鄉人為火来者拜之士壹大夫再亦相弔之道也鄭氏曰言拜之者為其来弔已宗伯職曰以弔禮哀禍災孔氏曰廐焚孔子馬廐為火焚孔子拜鄉人来慰問者雖非大禍災亦是相哀弔之道也山隂陸氏曰廐焚雖不問馬然猶為為火来者拜也錄之以著聖人言動之閒無所不為法孔子曰管仲遇盗取二人焉上以為公臣曰其所與遊辟也可人也管仲死桓公使為之服宦於大夫者之為之服也自管仲始也有君命焉爾也鄭氏曰可人也言此人可也但居惡人之中使之犯法宦猶仕也此仕於大夫更升於公與違大夫之諸侯同爾禮不反服孔氏曰此一節明大夫之臣雖仕於公反服大夫之服孔子論說管仲之事管仲於盜中簡取二人薦上以為桓公之臣謂此盗人所與交逰是邪辟之人故為盗其人性行是堪可之人也依禮仕於大夫升為公臣不合為大夫著服管仲死桓公使此二人著服自此升為公臣者皆服官於大夫之服記失禮所由又記桓公不忘賢者之舉也山隂陸氏曰言其所以放辟為盜以其所逰也故君子居必擇鄉逰必就士所以防邪辟而近中正也為其所為主服與違大夫之諸侯不同盖世衰道微君不能教始服其師君不能舉而所為主者有服矣過而舉君之諱則起與君之諱同則稱字鄭氏曰舉猶言也起立者失言而變自新稱字謂諸臣之名也孔氏曰此明辟君之諱過謂過誤也内亂不與焉外患弗辟也鄭氏曰謂卿大夫也同僚將為亂己力不能討不與而已至於鄰國為冦則當死之也春秋魯公子友如陳葬原仲傳曰君子辟内難而不辟外難孔氏曰此經明卿大夫辟内難之事引春秋莊二十七年公羊傳文案彼云大夫不書葬此何以書公子慶父公子牙通乎夫人以脅公季子起而治之則不得與干國政坐而視之則親親故請至于陳葬原仲至荘三十二年季子與國政故逐慶父酖叔牙也此註力不能討亦謂不與國政若與國政力能討而不討則責之宣二年晋史董狐書趙盾以弑君是也嚴陵方氏曰門内之治恩揜義内亂不與者所以重恩也門外之治義斷㤙外患不辟者所以重義也賛大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等鄭氏曰賛大行者書說大行人之禮者名也藻薦玉者也三采六等以朱白蒼畫之再行也子男執璧作此賛者失之矣孔氏曰此明五等諸侯所執圭玉之制周禮有大行人篇掌諸侯五等之禮作記之前有人說書賛明大行人之事記者引之剡殺也圭與璧殺上左右角各寸半也五等諸侯圭璧雖異而俱以玉為之故云玉也藻謂以韋衣板以藉玉者三采朱白蒼也六等六行也謂三色每色為二行是三采六等案聘禮記云朝天子圭與繅皆九寸繅三采六等典瑞云公侯伯皆三采三就謂一采為一就其實采别二就三采則六等也典瑞又云子男皆二采再就二采則四等又云瑑圭璋璧琮繅皆二采一就以頫聘此謂卿大夫二采共一就也天子五采五就則十等也此經則公侯伯子男總云博三寸剡上左右各寸半此謂圭也總包子男失之矣山隂陸氏曰聘禮記曰所以朝天子圭與藻皆九寸問諸侯朱緑藻八寸盖上言所以朝之玉下言以聘他國者也藻八寸則圭亦八寸可知故曰瑑圭璋八寸璧琮八寸以頫聘子男執璧以朝以圭聘頫今此言圭則子男聘頫之玉也鄭氏謂子男執璧作此賛者失之矣誤也正言玉也則所謂博三寸厚半寸剡上左右各寸半主公言之其餘以是為差上公用龍四玉一石雖曰玉可也故曰藻三采六等據子執榖璧男執蒲璧繅皆二采再就長樂陳氏曰玉之藉以繅而繅之長眂玉采以象德之文就以象文之成君子以貞剛之質存乎内而以柔順藉之於外又有文焉然後可以行禮矣玉五采五就色不過五也公侯伯皆三采三就降殺以兩也子男二采而大夫聘玉亦二采者禮窮則同也繅或作藻冕繅織絲為之則圭繅亦然鄭氏與杜預皆謂韋為之亡據也禮書哀公問子羔曰子之食奚當對曰文公之下執事也鄭氏曰問其先人始仕食祿以何君時嚴陵方氏曰文公之下執事也自此而下冝更有辭容簡脫之耳成廟則釁之其禮祝宗人宰夫雍人皆爵弁純衣雍人拭羊宗人祝之宰夫北面于碑東南上雍人舉羊升屋自中中屋南面刲羊血流于前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室有司皆鄉室而立門則有司當門北面既事宗人告事畢乃皆退反命于君曰釁某廟事畢反命于寢君南鄉于門内朝服既反命乃退路寢成則考之而不釁釁屋者交神明之道也凡宗廟之器其名者成則釁之以豭豚鄭氏曰廟新成必釁之尊而神之也宗人先請於君曰請命以釁某廟君諾之乃行宰夫攝主故居上拭静也自由也其衈謂將刲割牲以釁先滅耳旁毛薦之耳聼聲者告神欲其聼之周禮有刉衈有司宰夫祝宗人也告事畢告宰夫也君朝服者不至廟也路寢生人所居不釁者不神之也考之者設盛食以落之爾檀弓曰晋獻文子成室諸大夫發焉是也宗廟名器謂尊彞之屬孔氏曰此一節論釁廟及考路寢之事宗廟初成則殺羊取血以釁之其禮謂釁廟之禮爵弁士服也純衣謂絲衣則元衣纁裳也雍人是厨宰之官拭静其羊於廟門外案大戴禮釁廟篇云成廟則釁以羊君元服立於寢門内南鄉祝宗人宰夫雍人皆元服宗人曰請命以釁某廟君曰諾遂入雍人拭羊乃行入廟門碑南北面雍人舉羊升屋自中中屋南面刲羊血流于前乃降此皆大戴禮文初受命寢門内君與祝宗人宰夫雍人等皆著元服謂朝服緇衣素裳等其祝宗人等入廟之時則爵弁純衣也雍人抗舉其羊由屋東西之中謂兩階之間而升也當屋棟上之中南面刲割其羊使血流于前也門廟門夾室東西廂不用羊各一雞凡三雞故云皆用雞如上用羊升屋割之也未刲羊雞之時先滅耳旁毛以薦神廟則在廟之屋下門與夾室則在門夾室之屋下故云其衈皆於屋下衈訖然後升屋而釁門與夾室亦當門屋下及室上之中釁既畢反報君命於路寢考之謂與賔客燕㑹以酒食澆落之即歡樂之意也器之作名者成則殺豭豚血塗之細者成則不釁鄭註周禮云毛牲曰刉羽牲曰衈此經有羊有雞無刉文總以衈包之周禮對文耳案皇氏曰舉羊謂掛羊於屋自中謂在屋之中中屋謂羊在屋棟之下縣之上下處中長樂陳氏曰釁者塗釁以血交神明之道也廟成則釁室成不釁以室不可以神之也宗廟之器其名者釁非名者不足以神之也然則周官羊人釁共羊牲將以釁廟也雞人釁共雞牲將以釁門及夾室也犬人幾珥用駹禮記言宗廟之器釁之以豭豚則釁牲不特雞羊而已賈公彦曰或羊或犬俱得為釁是也古之用釁者多矣若天府釁寳鎮及寳器小子釁邦器及軍器龜人釁龜圉人釁廐以至社稷五祀與夫師行之主蔵約之户或釁於始成或釁於將用其禮豈一端哉然釁有司行事而君不親犬羊為牲而牛馬不預爵弁而不冕牲駹而不純則釁之為禮也小矣後世有以牛釁鐘而甚者有叩人鼻以衈社此先王之所弃也嚴陵方氏曰考即宣王考室之考且考有燕必用酒者陽之盛也寢者人之所居故以陽之盛者考之釁有祭祭止用血血者隂之至也廟者神之所居故以隂之至者釁之亦各從其類也衈者割其耳而薦其毛也凡器莫不有名先儒言名器謂尊彞之属者以其名之尤著故也若名山謂之名亦以是而已横渠張氏曰釁名器以豭豚而齊宣王釁鐘以牛戰國時無復常制不然又何以欲以羊易之諸侯出夫人夫人比至于其國以夫人之禮行至以夫人入使者將命曰寡君不敏不能從而事社稷宗廟使使臣某敢告於執事主人對曰寡君固前辭不教矣寡君敢不敬湏以俟命有司官陳器皿主人有司亦官受之鄭氏曰行道以夫人之禮者弃妻致命其家乃義絶不用此為始也前辭不教謂納采時此辭賔在門外擯者傳焉賔入致命如初主人卒辭曰敢不聼命器皿其本所賫物也律弃妻畀所齎孔氏曰自此至稱之一節論諸侯出夫人及卿大夫以下出妻之事夫人有罪諸侯出之令歸本國禮尚謙退不能指斥夫人之罪故使者將命云寡君才知不敏不能隨從夫人共事社稷宗廟使使臣某告在下之執事湏待也俟亦待也敬湏待君命也使人得主人荅命使有司之官陳夫人嫁時所賫器皿之屬以還主國主國亦使有司領受之並云官者明付受悉如法也妻出夫使人致之曰某不敏不能從而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬湏以俟命使者退主人拜送之如舅在則稱舅舅没則稱兄無兄則稱夫主人之辭曰某之子不肖如姑姊妹亦皆稱之鄭氏曰肖似也不似言不如人誅猶罰也稱舅稱兄言弃妻者父兄在則稱之命當由尊者出也唯國君不稱兄姑姊妹見弃亦曰某之姑某之姊若妹不肖孔氏曰稱舅謂妻被出夫之父在則稱父名使使来告也稱兄謂夫兄之名不云舅沒則稱母者婦人之名不合外接於人也若有死䘮則稱母弔故曽子問云母䘮稱母夫身無兄則稱夫名使某来告則上文是也夫之父兄遣人致命之辭未聞嚴陵方氏曰夫婦之道合則納之以禮不合則出之以義人倫之際有所不免也故先王亦存其辭焉孔子曰吾食於少施氏而飽少施氏食我以禮吾祭作而辭曰䟽食不足祭也吾飱作而辭曰䟽食也不敢以傷吾子鄭氏曰言貴其以禮待己而為之飽也時人倨慢若季氏則不以禮矣少施氏魯惠公子施父之後孔氏曰此一節明少施氏以禮食孔子吾祭謂孔子祭也作起也飱謂强飯以荅主人之意横渠張氏曰後世不安於禮相見唯務簡便至如賔主相與為禮安然不動復何相勸相敬之意但以酒食相與醉飽而已古人非不知此簡便必自進籩豆几席酌酒而拜所以致其敬也末世雖宗廟之饗父母之飬禮意猶有所闕然所謂如食宜飲如酌孔取但取飲食醉飽而已殊非飬老之意老馬反為駒不顧其後孔子食於少施氏而飽必是少施氏有禮也食於季氏不食肉而飱孔子雖欲行禮施於季氏必是不知故不若辭食而已凡禮必施之知者若為不知禮亦難行嚴陵方氏曰孟子曰呼而與之行道之人不受蹴而與之乞人則不屑也孔子食於少施氏茍非食之以禮又安得為之飽乎觀其賔祭與飱主人皆作而辭則其有禮也可知矣飱者食後而更飱傷謂傷㢘也山隂陸氏曰詩所謂既飽以德者此歟納幣一束束五兩兩五尋婦見舅姑兄弟姑姊妹皆立于堂下西面北上是見己見諸父各就其寢女雖未許嫁年二十而笄禮之婦人執其禮燕則鬈首鄭氏曰納幣謂昬禮納徴也十个為束貴成數兩兩者合其卷是謂五兩八尺曰尋五兩五尋則毎卷二丈也合之則四十尺今謂之匹猶匹偶之云與婦来為供飬也其見主於尊者兄弟以下在位是為己見不復特見也諸父旁尊各就其寢亦為見時不来也女雖未許嫁年二十亦為成人矣禮之酌以成之言婦人執其禮明非許嫁之笄既笄之後去之鬈首猶若女有鬌紒也孔氏曰此一節論昬禮婦見舅姑及女未許嫁加笄分别之事婦来明日而見舅姑之時兄弟姑姊妹皆立于舅姑之堂下東邊西鄉以北為上近堂為尊也婦自南門而入入則從於夫之兄弟姑姊妹前度以因是即為相見不復更别詣其室見之故云是己見也諸父謂夫之伯叔婦於明日各往其寢見之不與舅姑同日也女子十五許嫁而笄則主婦及女賔為笄禮主婦為之著笄女賔以醴禮之若未許嫁至二十而笄則婦人禮之無主婦女賔不備儀也既笄後尋常燕居則去其笄而鬈首謂分髮為鬌紒也既未許嫁猶為少者處之嚴陵方氏曰納幣即昬禮所謂納徵以物言故曰幣以義言故曰徵周官媒氏凡嫁子娶妻入幣純帛無過五兩王氏謂天數五地數五五位相得而各有合五兩則以天地合數為之節正謂是矣韠長三尺下廣二尺上廣一尺㑹去上五寸純以爵韋六寸不至下五寸純以素紃以五采鄭氏曰㑹謂領上縫也領之所用盖與紕同在旁曰紕在下曰純素生帛也紕六寸者中執之表裏各三寸也純紕所不至者五寸與㑹去上同紃施諸縫中若今時絛也孔氏曰韠韍也長三尺與紳齊也下廣上狭象天地數也旁緣謂之紕上縁謂之㑹以其在下總㑹之處故謂之為會謂韠之領縫也此縫去韠上畔廣五寸謂㑹上下廣五寸紕謂㑹縫之下韠以兩邊紕以爵韋闕六寸倒攝之兩廂各三寸也不至下五寸者謂紕韠之兩邊不至韠之下畔闊五寸純以素者謂紕所不至之處横純之以生帛此帛上下亦闊五寸也紃絛也五采之絛施之諸縫之中也㑹之所用無文純紕既用爵韋故鄭知與紕同也純之上畔去韠之下畔五寸㑹之下畔去韠之上畔五寸以其俱五寸故鄭云與㑹去上同也長樂陳氏曰韠長三尺所以象三才頸五寸所以象五行下廣二尺象地也上廣一尺象天也㑹猶書所謂作㑹也紕裨其上與旁也純緣其下也去㑹與純合五寸則其中餘二尺也紕六寸則表裏各三寸然韠自頸肩而下則其身也鄭氏以其身之五寸為領而㑹為領縫是肩在領上矣衣之上韠猶尊上元酒爼上生魚也古者喪服用韠無所經見詩曰庶見素韠是祥祭有韠也禮書禮記集說卷一百四
