body:
  text: 禮記集説卷一百三十一宋衛湜撰凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之齊明盛服非禮不動所以修身也去讒逺色賤貨而貴德所以勸賢也尊其位重其祿同其好惡所以勸親親也官盛任使所以勸大臣也忠信重祿所以勸士也時使薄斂所以勸百姓也日省月試既廩稱事所以勸百工也送往迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也凡為天下國家有九經所以行之者一也鄭氏曰體猶接納也子猶愛也逺人蕃國之諸侯也不惑所謀良也不眩所任明也同其好惡不特有所好惡於同姓雖恩不同義必同也尊重其祿位所以貴之不必授以官守天官不可私也官盛任使大臣皆有屬官所任使不親小事也忠信重祿有忠信者重其祿也時使使之以時日省月試考校其成功也既讀為餼餼廩稍食也稿人職曰乘其事考其弓弩以下上其食一謂當豫也孔氏曰此孔子為哀公説治天下國家有九重及覆説九經功用并行九經之法齊謂整齊明謂嚴明盛服謂正其衣冠尊其位謂授以大位重其祿謂多其祿崇重而已不任以職事好謂慶賞惡謂誅罰同姓有親疏恩親雖不同義必須等故不特有所好惡是勸親親也日省言每日省視百工功程月試每月試其所作之事也既廩稱事功多則廩厚功少則廩薄周禮月終均其稍食是也注引稿人證既廩稱事乘謂計算其所為之事考其弓弩善惡多少以下上其食下謂貶退上謂增益也治亂持危有亂則治討之危弱則扶持之厚往謂諸侯還國王者以其財賄厚重往報之薄來謂諸侯貢獻使輕薄而來如此則諸侯歸服河南程氏曰尊賢也親親也蓋先尊賢然後能親親夫親親固所當先然不先尊賢則不能知親親之道伊川又曰體羣臣者體察也心誠求之則無不察矣忠厚之至也故曰忠信重祿所以勸士言盡其忠信而厚祿食此所以勸士也藍田吕氏曰經者百世所不變也九經之用皆本於德懷無一物不在所撫而刑有不與焉修身九經之本必親師友然後修身之道進故次之以尊賢道之所進莫先於家故次之以親親由親親以及朝廷故敬大臣體羣臣由朝廷以及其國故子庶民來百工由其國以及天下故柔逺人懷諸侯此九經之序視羣臣猶吾四體視庶民猶吾子此視臣視民之别自天子至於庶人一是皆以修身為本我之於道也知崇則無不知知有諸己矣禮卑則無不敬能有諸己矣故貌足畏也色足憚也言足信也顛沛造次一於禮而不違則富貴所不能淫貧賤所不能移威武所不能屈所謂強立而不反者也故曰修身則道立又曰齊明盛服非禮不動所以修身也禮義由賢者出知賢為可尊則學日進而知益明然讒色貨之害皆足以奪夫正唯知之審信之篤迎之致敬以有禮則患賢者不至未之有也故曰尊賢則不惑又曰去讒逺色賤貨而貴德所以勸賢也尊之欲其貴愛之欲其富所好則與同其樂所惡則與同其憂此諸父昆弟所以相勸而親故曰親親則諸父昆弟不怨又曰尊其位重其祿同其好惡所以勸親親也大臣不可不敬是民之表也非其人黜之可也任之則信之信之則敬之故諫行言聽膏澤下於民既任之矣又使小臣間之諫必不行言必不聽而怨乎不以內適足以自眩外不足以圖治矣託之以大任則小事有所不必親必使愼簡乃僚惟所任使則大臣勸於事君矣故曰敬大臣則不眩又曰官盛任使所以勸大臣也君視臣如手足則臣視君如腹心所報可知矣待之以忠信養之以重祿此士所以願立乎其朝矣故曰體羣臣則士之報禮重又曰忠信重祿所以勸士也愛之如子則凡可以安之者無不為也使之所以佚之取之所以治之雖勞而不怨此農所以願耕於其野矣故曰子庶民則百姓勸又曰時使薄斂所以勸百姓也不通功易事以羡補不足則男不得專事於農女不得專事於桑且將為陶冶為梓匠為釜甑以食為宫室以居為耒耜錢鎛以耕耨欲其穀不可勝食材木不可勝用得乎故曰百工之事國家之所不可無也雖曰末技所以佐其本業者得以盡力此財用所以足也所以來之者亦能辨其楉良而制其食則工知勸矣如稿人春獻素秋獻成書其等以饗工乘其事試其弓弩以下上其食而誅賞此所謂日省月試既廩稱事者也然則來百工而不來商賈者蓋百工之所須皆商賈之所致也百工來則商賈自通有不必道也逺人惟可以柔道御之逺者不柔則邇者不可能故聖人貴乎柔逺送往迎來嘉善而矜不能皆以柔逺也柔逺能邇此四方所以歸也繼絶世者無後者為之立後也舉廢國者已滅者復之也治亂者以道正之也持危者以力助之也朝聘以時所以繼好也厚往而薄來燕賜多而納貢薄也凡此皆所以懷諸侯也懷其德則畏其力矣九經雖曰治天下之常道無誠以行之則道為虛矣雖終日從事而功不立也人不信也此不誠所以無物也故曰凡為天下國家有九經所以行之者一也一即誠也建安遊氏曰經者其道有常而不可易其序有條而不可紊取人以身故修身然後知賢之可尊齊明所以一其志盛服所以修其容非禮勿動則內無逸德外無過行內外進矣富貴不能淫貧賤不能移故修身則道立去讒則任之專逺色則好之篤賤貨則義利分故尊賢則不惑尊其位所以貴之重其祿所以富之同其好以致其利同其惡以去其害則禮備而情親諸父兄弟所以望乎我者足矣故親親則不怨又曰不惑在理故於尊賢言之不眩在事故於敬大臣言之又曰人情莫不欲逸也時使之而使有餘力莫不欲富也薄斂之而使有餘財則子庶民之道也故百姓勸日省月試以程其能既廩稱事以償其勞則惰者勉而勤者説矣此來百工之道也故財用足送往迎來以厚其禮嘉善而矜不能以致吾仁待之者甚周責之者甚約此柔逺人之道也故四方歸之繼絶世則賢者之類無不説舉廢國則功臣之後無不勸亂者懼焉危者怙焉其來也節以時其往也遣以禮則懷諸侯之道也夫如是則德之所施者博而威之所制者廣矣故天下畏之經雖有九而所以行之者一誠而已不誠則九經為虛文是無物也延平楊氏曰體羣臣則士之報禮重者君臣一體也君之視臣如手足則臣視君如腹心矣子庶民則百姓勸者赤子之無知雖陷阱在前莫之知辟也使之就利而違害在保者而已其子之也如是百姓寧有不勸乎又曰齊明盛服非禮不動收放心而間之也去讒逺色賤貨者人君信讒邪邇聲色殖貨利則尊德樂義之心不至而賢者不獲自盡矣雖有尊賢之心而賢者不可得而勸也尊其位親之欲其貴也重其祿愛之欲其富也官盛任使不纍以職則以道事其君者得以自盡矣故曰官盛任使所以勸大臣也遇之不以忠信養之不以重祿則士不得志有窶貧之憂尚何勸之有故曰忠信重祿所以勸士也時使之不盡其力薄斂之不傷其財則農者願耕於其野商賈願藏於其市行旅願出於其塗而養生送死無憾矣此所以勸百姓之道也又曰天下國家之大不誠未有能動者也雖法度彰明無誠心以行之皆虛器也又曰自修身推而至於平天下莫不有道焉而皆以誠意為主苟無誠意雖有其道不能行也故中庸論為天下國家有九經而卒曰所以行之者一一者何誠而已蓋天下國家之大未有不誠而能動者然而非格物致知烏足以知其道哉大學所論誠意正心修身治天下國家之道其原乃在乎物格推之而已若謂意誠便足以平天下則先王之典章文物皆虛器也故明道先生嘗謂有關雎麟趾之意然後可以行周官之法度正謂此耳新安朱氏曰此第二十章第三節經常也體謂設以身處其地而察其心也子如父母之愛其子也柔逺人所謂無忘賔旅者也此列九經之目也修身則道立以下言九經之效也道立謂道成於己而可為民表所謂建其有極是也不惑謂不疑於理不眩謂不迷於事敬大臣則信任專而小臣不得以間之故臨事而不眩也來百工則通工易事農末相資故財用足柔逺人則天下之旅皆恱而願出於其塗故四方歸懷諸侯則德之所施者博而威之所制者廣矣故曰天下畏之齊明盛服以下言九經之事也官盛任使謂官屬衆盛足任使令也蓋大臣不當親細事故所以優之者如此忠信重祿謂待之誠而養之厚蓋以身體之而知其所賴乎上者如此也往則為之授節以送之來則豐其委積以迎之朝謂諸侯見於天子聘謂諸侯使大夫來獻王制比年一小聘三年一大聘五年一朝厚往薄來謂燕賜厚而納貢薄一者誠也一有不誠則是九者皆為虛文矣此九經之實也曰九經之説奈何曰不一其內則無以制其外不齊其外則無以養其中靜而不存則無以立其本動而不察則無以勝其私故齊明盛服非禮勿動則內外交養而動靜不違所以為修身之要也信讒邪則任賢不專徇貨色則好賢不篤賈捐之所謂後宫盛色則賢者隱微佞人用事則諍臣杜口蓋持衡之勢此重則彼輕理固然矣故去讒逺色賤貨而一於貴德所以為勸賢之道也親之欲其貴愛之欲其富兄弟昏姻欲其無相逺故尊位重祿同其好惡所以為勸親親之道也大臣不親細事則以道事君者得以自盡故官屬衆盛足任使令所以為勸大臣之道也盡其誠而恤其私則士無仰事俯育之纍而樂趨事功故忠信重祿所以為勸士之道也人情莫不欲逸亦莫不欲富故時使薄斂所以為勸百姓之道也日省月試以程其能既廩稱事以償其勞則不信度作淫巧者無所容惰者勉而能者勸矣為之授節以送其往待以委積以迎其來因能授任以嘉其善不強其所不欲以矜其不能則天下之旅皆説而願出於其塗矣無後者續之已滅者封之治其亂使上下相安持其危使大小相恤朝聘有節而不勞其力貢賜有度而不匱其財則天下諸侯皆竭其忠力以蕃衛王室而無倍畔之心矣凡此九經其事不同然總其實不出乎修身尊賢親親三者而已敬大臣體羣臣則自尊賢之等而推之也子庶民來百工柔逺人懷諸侯則自親親之殺而推之也至於所以尊賢而親親則又豈無所自而推之哉亦曰修身之至然後有以各當其理而無所悖耳曰親親而不言任之以事者何也曰此親親尊賢並行不悖之道也苟以親親之故不問賢否而輕屬任之不幸而或不勝焉治之則傷恩不治則廢法是以富之貴之親之厚之而不曰任之以事是乃所以親愛而保全之也若親而賢則自當置之大臣之位而尊之敬之矣豈但富貴之而已哉觀於管蔡監殷而周公不免於有過及其致辟之後則唯康叔聃季相與夾輔王室而五叔者有土而無官焉則聖人之意亦可見矣曰子謂信任大臣而無以間之故臨事而不眩使大臣而賢也則可其或不幸而有趙髙朱異虞世基李林甫之徒焉則鄒陽所謂偏聽生姦獨任成亂范睢所謂妬賢嫉能御下蔽上以成其私而主不覺悟者亦安得而不慮耶曰不然也彼其所以至此正坐不知九經之義而然耳使其明於此義而能以修身為本則固視明聽聰而不可欺以賢否矣能以尊賢為先則其所置以為大臣者必不雜以如是之人矣不幸而或失之則亦亟求其人以易之而已豈有知其必能為姦以敗國顧猶置之大臣之位使之姑以奉行文書為職業而又恃小臣之察以防之哉夫勞於求賢而逸於得人任則不疑而疑則不任此古之聖君賢相所以誠意交孚兩盡其道而有以共成正大光明之業也如其不然吾恐上之所以猜防畏備者愈密而其為眩愈甚下之所以欺罔蒙蔽者愈巧而其為害愈深不幸而臣之姦遂則其禍固有不可勝言者幸而主之威勝則夫所謂偏聽獨任御上蔽下之姦將不在於大臣而移於左右其為國家之禍尤有不可勝言者矣嗚呼危哉曰子何以言柔逺人之為無忘賔旅也曰以其列於懷諸侯之上也舊説以為蕃國之諸侯則以逺先近而非其序書言柔逺能邇而又言蠻夷率服則所謂柔逺亦不止謂服四夷也况愚所據授節委積者此長遺人懷方氏之官掌之於經有明文耶又曰楊氏之説有虛器之云者二而其指意所出若有不同者焉何也曰固也是其前段主於誠意故以為有法度而無誠意則法度為虛器正言以發之也其後段主於格物故以為若但知誠意而不知天下國家之道則是直以先王之典章文物為虛器而不之講反語以詰之也此其不同審矣但其下文所引明道先生之言則又若主於誠意而與前段相應其於本段上文之意則雖亦可以婉轉而説合之然終不免於迂回而難通也豈記者之誤邪然楊氏他書首尾衡決亦多有類此者殊不可曉也嚴陵方氏曰九經所以為天下國家而已孟子曰天下之本在國國之本在家家之本在身則身者天下國家之本也故以修身為先道無廢立也自體之於身言之修之則立不修則廢而已尊賢則能逺佞人而不為所惑故尊賢則不惑親親以三為五以五為九固不止於諸父昆弟止言諸父昆弟不怨者蓋諸父不怨以其能孝故也昆弟不怨以其能弟故也親親之道孝弟而已謂之賢則宜有大臣之位謂之大臣則宜有賢之德自其修身言之故以德為主而曰賢自其治國言之故以位為主而曰大臣也以德為主故於賢曰尊以位為主故於大臣曰敬言羣臣則上有以别於大臣言士則下有以别於庶民士亦臣也而羣臣不止於士於體言羣臣以見君之於臣無所不體也於報言士以見卑之於尊皆知所報焉為民父母者君也故於庶民曰子百姓舉其政之成庶民言其類之衆百姓貴而少庶民賤而多以庶民之賤猶且子之則百姓之貴可知以百姓之貴猶且知勸則庶民之賤可知百姓庶民亦互言之爾來百工者使無他之之謂來工則居官府者也所以生財者在乎農所以運財者在乎商農非器則財不能以自生商非器則財不能以自運由是言之財所以足於用者莫如器器所以足於用者莫如工故曰來百工則財用足農之器則耒耜之類是也商之器則舟車之類是也逺人各在東西南北之方故以四方言之諸侯則溥天之下所與共守也故以天下言之心不為欲惡所二德不為情偽所蔽此之謂齊明讒足以亂人之聰色足以蔽人之明去讒逺色則所聽者賢言所見者賢行賢所以資祿德所以制爵賤貨則所以養賢之祿厚矣貴德則所以命賢之爵優矣若是則足以尊賢而勸之也去則去之而不留逺則逺之而不近尊之欲其貴故尊其位愛之欲其富故重其祿則親無賤貧者矣與其親之富貴而去其親之貧賤則同其所好惡矣若是則凡所親之親其有不勸者乎凡有治者皆曰官若所謂天官地官是也盛任使則若天地四時之官其屬皆六十是也蓋大臣所以任道而逸小臣所以任事而勞官盛任使則所以代大臣之勞者至矣故足以敬大臣而勸之也忠信重祿則非忠信者其祿輕矣體羣臣之道於是乎在蓋體者待之大小各有體故也時使若嵗不過三日是矣薄斂若法不多乎什一是矣使之時則民力不竭斂之薄則民財不匱愛養之至則父母之於子亦不過若是而已故百姓所以勸百姓勸則庶民無不勸矣日省者視其勤惰以防其冗食月試者考其功治以要其實效視其勤惰宜數而詳考其功治宜疏而簡若季春之月所謂百工咸理監工日號者日省之謂也若孟冬之月所謂物勒工名以考其成者月試之謂也省試盡矣苟無以養之則不可故繼之以既廩稱事既其所廩之食則上之祿不嗇出稱其所作之功則下之力不虛役若是則百工其有不勸財用其有不足者乎送往迎來嘉善而矜不能者於其往不足追也送以出之而已於其來不必拒也迎以入之而已善者不足舉也嘉之而已不能者不足教也恤之而已凡以其俗慢易風化之所難易其地荒辟政令之所難及故也若是則逺人其有不柔四方其有不歸者乎世者人之統緒國者地之封域世以人而絶國以地而廢絶世則繼之使續廢國則舉之使興亂者治之使理危者持之使安或春夏或秋冬所謂朝以時也或比年或三年所謂聘以時也燕與時賜無數所以厚其往已聘而還圭璋所以薄其來厚往則我於彼無虛拘薄來則彼於我無煩費若是則諸侯其有不懷天下其有不畏者乎九經之别如此所以行之一歸乎中而已延平周氏曰先庶民而後百工抑末也言工不言商者為工者尚且來之則其通有無於道路者可知矣逺人先於諸侯者其猶序六月之詩以蓼蕭先於湛露蓋示其柔逺能邇之意羣臣者兼士言之也果上之人有以體察之則其所謂見危授命見得思義者出焉故曰報禮重詩曰四國于蕃四方于宣言四方以對四國則四方為四國之外言天下以對四方則天下為四方之內又曰齊明以致一盛服以盡恭非禮不動以克己所以修身也尊其位所以貴之重其祿所以富之君子之於親也豈特富貴之而已又將端吾之好惡而與之同也日省月試所謂稽其功緒者也既廩稱事所謂均其稍食者也送往迎來禮也嘉善而矜不能仁也先王待中國固異於逺人厚往而薄來所以待中國也送往迎來所以待逺人也繼絶世舉廢國仁也亂者治之危者持之義也朝聘以時厚往而薄來禮也然是數者皆言勸唯修身與柔逺人懷諸侯不言之者蓋修身無意於勸而勸自存故曰大人正己而物正逺人責之略則勸莫得以言諸侯責之詳則勸不足以言行之者一致一也馬氏曰治天下國家之道必有以致其要亦必有以致其詳故修身者所以致其要也而九經者所以致其詳也夫身者政之大本身立則政立故先修身而賢者修身之輔也故繼以尊賢修身則內有所守尊賢則外有所正內外之德成然後可以有為於天下以其為治之序則先親而後疏故言親親而繼之以敬大臣體羣臣自貴及賤故繼之以子庶民來百工自近及逺故繼之以柔逺人懷諸侯此其序也齊明所以內潔盛服所以外莊非禮勿動則所謂心不苟慮必依於道手足不苟慮必依於禮賢者任之能者使之此官盛任使也山隂陸氏曰所以行之者一也一謂誠也在易有之乾是也故曰君子行此四德者故曰乾元亨利貞不眩見道者也非直不惑而已蓋道不可以聲音貌象求焉以目求之則眩矣以耳聽之則眩矣齊明盛服若顔子是己故曰不逺復以修身也外能去讒內能逺色所寶惟賢此賢者所以勸也變云勸者言尊賢而賢不勸非所以尊賢也他言勸皆倣此同其好惡異之私恩也同之公義也既讀如字説文曰小食也送往迎來主道也非君道也嘉善而矜不能母道也非父道也海陵胡氏曰修身則道立以下明九經之效敬大臣則不眩者大臣盡忠竭節以事其上賢不肖乃分辨故上之瞻視無所眩惑體羣臣者君之視臣如手足則臣視君如腹心來百工則財用足者制度修舉器用充給故財用足齊明盛服者既齊潔嚴明以治性於內又盛飾其服以整飭於外去讒逺色者讒人不退則賢人不進色惑人則性昏性昏則善惡不能别賤貨而貴德者國寶於賢不寶於貨重其祿不言與之政者親族之間有賢則任之不賢者但尊其祿位而已同其好惡者富貴人之所共欲也貧賤人之所共惡也官盛任使者大臣之居朝廷總綱領而已繁細皆委之有司然後大臣得安逸而正其綱領忠信重祿者既推忠信以待人又副之以重祿行之者一也至誠也廣安遊氏曰孔子曰老者安之朋友信之少者懷之孔子之學聖人之學而其道則君天下之道也中庸所言親者親之大臣敬之羣臣體之庶民子之百工來之逺人柔之諸侯懷之是孔子三言之推也言天下國家之人親疏逺近賢否大小之不齊無不得其所也古之為天下者內之有家外之有王畿之國又外之有天下親親者家之事也尊賢也敬大臣也體羣臣也子庶民也來百工也則國之事也柔逺人也懷諸侯也自天下而言也聖人之治天下內治其家外治其國又外治其天下而其原本於知所以治人治人之原本於修身經者言所以經紀天下者也又曰三綱五常之道本出於修身修身則道立道立則八者沛然順治矣賢者不尊愚不肖者不卑則賢愚不辨賢愚不辨則民惑而不知卿方矣大臣而不敬亷陛下迫則貴賤大小之分不明貴賤大小之分不明則出政於此人將眩惑而不知所從矣又曰中庸之學本以修身而修身亦列於九經者聖人之身出居明堂以臨天下其動容貌正顔色興居進退之際即是治天下國家第一事齊言其齊一明言其如日月之明盛服言其辨冕端委以臨其下興居之際非禮不動此皆修身之體聖人坐廟堂象貌也體者不可以驟為也中和積於中而誠正之體見於外聖人只消修身到這里才出坐朝廷治象固己見矣自此以下八者皆是政事惟去讒遠色賤貨貴德以勸賢此一事亦是聖人身上事以下七者皆德之發於政者有司之事也尊賢則不惑者書曰任賢勿二尊賢而有二心則人惑矣其惑者何也其意若曰吾君之用是人也用之不力意者蔽於讒邪蔽於色邪蔽於貨邪不知德之為可貴邪不然何用賢之不力也何用賢而以小人參之也君蔽於讒則人相勸於讒矣君蔽於色則人相勸而好色矣君蔽於貨則人相勸而貨殖矣君不以德為貴則人不知德為賢矣如此則人惑而不知鄉方矣晏氏曰箕子陳洪範則有九疇子思作中庸則有九經事雖不同其取於九數則一而已洪範九疇一曰五行者本於天道故曰惟天隂隲下民也中庸九經一曰修身者本於人道故曰凡為天下國家也逺人在外諸侯在內先內後外乃其序爾今則先逺人而後諸侯何哉蓋逺人不柔則四夷交侵而吾征伐四出救患有所不給何暇懷諸侯乎是先柔逺而後懷諸侯者乃急緩之序不得不然爾旅獒言明王慎德四夷咸賔無有逺邇畢獻方物然後昭德之致於異姓之邦分寶玉於伯叔之國皆先柔逺人而後懷諸侯正與此合不然柔逺能邇書何以屢言之也語曰君子不施其親不使大臣怨乎不以此先親親而後敬大臣之序也此與夫骨肉咸怨侮慢自賢者異矣財用者商賈之事也當言來商賈則財用足今乃言來百工何哉蓋備物制器者百工也財用之所由出也故攻玉之工至則寶玉之用足焉攻金之工至則金幣之用足焉耒耜之器成而穀人足於晝蠶桑之器成而絲人足於夜然則百工來矣財用胡為而不足邪溫陵陳氏曰古之為天下者賴諸侯以治之比之建萬國親諸侯是其意也然有畿內之諸侯畿內屬乎天子自畿之外環視天下皆諸侯也故諸侯能懷之則天下畏之舜於類帝之後即行巡狩之禮人以為舜之警動諸侯而不知舜之巡狩所以慰安之也武王時邁之詩亦此意也然必繼絶舉廢者蓋諸侯世有其國而不至於廢絶者也殷能革夏之天下而不能革夏之諸侯周能革殷之天下而不能革殷之諸侯故其廢絶者亦從而繼之舉之涑水司馬氏曰體者元首股肱義猶一體柔逺人者馭以寬仁不強致也敬大臣者苟其人不足任大臣之重則勿置諸其位既置諸位而復疑之舍大臣而與小臣謀則讒慝並興大臣解體矣嘉善謂撫其懷服矜其不能謂不責其驕慢江陵項氏曰道立則為之基址也不惑然後講之明矣不惑者我不惑也不眩者人不眩也齊明盛服內外交修也讒也色也貨也三者害德之具三者不去有德者不可得而貴也聽公伯寮受女樂用田賦則夫子之道廢矣賢也親也大臣也士也民也工也皆言勸者皆同舟共濟之人必有以興起其勸心而後可孝經孝治章言治天下治國治家皆欲得人之歡心即此意晉陵錢氏曰修身尊賢親親一家之經敬大臣體羣臣子庶民一國之經來百工柔逺人懷諸侯天下之經道立謂取人以身不惑謂人知所尚不眩謂人知所同敬百工庶官也謂之工者以其才能足稱其職也書曰允釐百工庶績咸熙來者取諸他國廣求之也財當為材官盛任使所以勸大臣言官之盛又任使之後世乃有尊為三公而不任以事者矜不能不責其來繼其絶舉其廢治其亂持其危皆保全之以時不煩也厚往薄來重恩而輕利也建安真氏曰九經之説朱熹盡之矣或謂大學先言誠意正心而後修身中庸九經之序乃自修身始何邪曰齊明盛服非禮不動此所謂敬也敬則意誠心正在其中矣諸儒以一為誠何也曰天下之理一則純二則雜純則誠雜則妄修身不一善惡雜矣尊賢不一邪正雜矣不二不雜非誠而何故舜曰惟一伊尹曰克一中庸曰行之者一長樂陳氏曰此即文武之政也其要惟一其别有九而其序則堯典所謂欽明文思至於黎民於變時雍夫子所謂修己以敬至於安百姓也永康陳氏曰九經為政以德為本也堯舜至治之所由出也此一定不易之理欲知其要即是以心達心欲知其道只是居敬行簡故九經必自吾身而出修身則道立有本也尊賢則不惑本固也親親則諸父昆弟不怨愛始達也敬大臣則不眩則民具爾瞻也體羣臣則士之報禮重上下交孚也子庶民則百姓勸相勉於善也來百工則財用足經制有餘也柔遠人則四方歸之視猶父母也懷諸侯則天下畏之如臨師保也錢塘于氏曰以尊賢為勸賢親親為勸親親敬大臣為勸大臣體羣臣為勸士來百工為勸百工皆加以勸之一字者豈無意哉古之聖君所以為天下國家用經而不用權用勸而不用懲苟有一毫用懲之意而無貶損謙抑之誠則非所以為經矣勸道既行始可以言尊賢言親親言敬大臣言來百工也如曰柔逺人懷諸侯此亦用勸之意不復贅言也玩經者盍深味之嚴陵喻氏曰吾夫子既列九者之經終之曰凡為天下國家有九經所以行之者一也蓋經雖有九所以行乎九經者未嘗九也亦本乎一心而已自古聖相傳之要曰惟精惟一曰咸有一德曰無二爾心無非存養至一之本也此心惟一則九者各得其序經有九心亦從而九焉則顛倒錯亂而失其所以為常道矣散於九而歸於一其示人君以心法之要豈不深切矣哉嵩山朝氏曰讒色貨能惑我而不惑則尊賢之功也有百官之當任使各盡其材大臣凜然在上天下名實不眩則敬大臣之功也不眩猶不惑也霅川倪氏曰經者常也即所謂庸也大學自誠意正心修身齊家而後治國平天下中庸論九經亦自修身始而曰凡為天下國家有九經以是知中庸大學一理也齊明者齊潔其心則明矣服外飭也修身而曰盛服何哉蓋服其服者必有君子之容未有服黻冕而心不敬者所謂外內交相養也前言修身以道言其修之者必以道未言其所以修也此曰齊明盛服非禮不動言所以修其道者自此而始也金華邵氏曰九經之目其先後固自有序然尊賢先於親親柔逺人先於懷諸侯者蓋禮義由賢者出不知尊賢則不能盡親親之道外寧則無內憂逺人未柔則諸侯不可懷此九經之序也宣城奚氏曰一者何誠而已姑以修身言之齊明盛服儼然而端莊非禮不動肅然而敬畏非誠乎誠於尊賢自然讒色之逺誠於親親自然好惡之同誠於敬大臣自然任使之專誠於體羣臣自然忠信之篤以至來百工而勸百姓柔逺人而懷諸侯一皆以誠行之焉有無實效者哉新定顧氏曰此夫子平日之議論而子思子記録於此為猶治也以一身而膺天下國家之寄為之儀表可不修乎身誠修則人有所觀感有所效法不勞經理而天下自治所謂修其身而天下平者也故曰修身則道立然非尊賢則講明之功開導之力規正之益其將誰賴苟無所賴則將茫然昧所適從故惟尊賢然後不惑古者立三公與之坐而論道此其故也漢儒有言人之情恩深者其養謹愛至者其求詳夫戚而不見殊孰能無怨此常棣角弓之詩所謂也是故親親則諸父昆弟不怨君猶元首也臣猶股肱也分任天下之治者惟大臣可不敬乎敬之則言焉而聽諫焉而行無面從無後言天下事理無所欺隱一舉一措可無所疑故曰敬大臣則不眩眩亦惑也人君之於羣臣勢分稍相逺貴賤稍相絶則其休戚勞逸易於不相知不相知則不相恤此所以貴於體之體云者休戚勞逸視均一體之謂也然則又焉有不盡忠竭節以報其上者乎故曰體羣臣則士之報禮重人君之於庶民勢分相遼逺貴賤相殊絶則其利害得失尤不相知抑不思天生民而立之君使司牧之君其可不視民如子乎人之愛其子者何所不至以愛子之心而愛民民不被其澤者寡矣民被其澤則感發興起亦惟恐其不至耳尊君親上不待論也故曰子庶民則百姓勸人之生也必資財用曰農則所以致地利者也曰工則所以作器用者也曰商則所以通珍異者也是三者財用之所出非人君勸率招徠之則怠惰廢弛財用不足將至於民力困窮而禮義消亡矣此來百工以足財用所以不可已也不言農若商者舉工而言農商不待論也天下之勢有遠近人君之治無彼此治道立矣治功著矣逺人聞風而來固當柔之撫以恩禮之謂柔若是則來者愈衆所謂四方歸之也治道立矣治功著矣不恃其所能致而有輕侮諸侯之心則固當懷之念之不忘之謂懷若是則諸侯協心佐助於我勢莫大焉威莫盛焉天下其有不畏之者乎雖然就九經而論之言之先後誠有大旨然非必曰次第始終斷斷不易使人循序而行之也得其大旨於講明之初而遇事接物兼舉並行各得其當則庶幾無負聖人之訓矣帝舜有庳之封尊其位重其祿之謂也同其好惡均其休戚之謂也遇其所喜則有慶賀遇其所憂則有弔恤之類是也新定錢氏曰上言達德所以行者一而先之曰知天此言九經所以行者一而繼之曰明善明善即知天也所謂一也不知不明安知一之為何物哉凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮鄭氏曰跲躓也疚病也人不能病之孔氏曰此一節明九經之法唯在豫前謀之將欲發言能豫前思定然後出口則言得流行不有躓蹶困乏也欲為事時豫先思定則臨事不困行而豫思定則不病道而豫謀定則道無窮橫渠張氏曰事豫則立必有教以先之盡教之善必精義以研之精義入神然後立斯立動斯和矣又曰博學於文者只要得習坎心亨蓋人經歷險阻艱難然後其心亨通博文者皆是小德應物不學則無由致之故中庸之欲前定將以應物也藍田吕氏曰豫素定也素定者先事而勞事至而佚既佚則且無所事其憂不素定者先事而佚事至而憂而亦無所及於事寇將至則為干櫓水將至則為隄防其為不亡者幸也故素定者事皆有成言有成説事有成業行有成德道有成理用而不括動而有功所謂精義入神以致用則精義者豫之謂也能定然後能應能定者豫之謂也擬之而後言議之而後動擬議以成其變化則擬議者豫之謂也致用也能應也成變化也此所以無跲困疚窮之患也言有成説則使於四方不憂乎不能專對也事有成業則千乘之國攝乎大國之間加之以師旅因之以飢饉不憂乎不能治也行有成德則富貴不憂乎能淫貧賤不憂乎能移威武不憂乎能屈也道有成理則徴諸庶民考諸三王質諸鬼神百世以俟聖人不憂其不合也建安遊氏曰豫者前定之謂也唯至誠為能定唯能定為能應故以言則必行以事則必成以行則無侮以道則無方誠定之效如此故繼九經言之新安朱氏曰此第二十章第四節凡事指達道達德九經之屬豫素定也此承上文言凡事皆欲先立乎誠如下文所推是也所謂前定何也曰先立乎誠也先立乎誠則言有物而不躓矣事有實而不困矣行有常而不疚矣道有本而不窮矣諸説惟遊氏誠定之云得其要張子以精義入神為言是則所謂明善者也涑水司馬氏曰言前定謂擬之而後言也行前定謂行無越思也道前定謂止於至善也海陵胡氏曰所行之事必豫定乃能立若豫思之豫為之豫修之豫防之則事無不立不然則必有廢敗建邦能命龜田能施命作器能銘使能造命升髙能賦師旅能誓山川能説至於喪紀能誄祭祀能語是能豫定則臨事而言無有顛躓困者臨事不通之辭凡事或施之一身或施之一家或施之一國或施之天下皆當豫定則無有不通所行之事如欲事君必豫思其事君之道莫非以忠若事其父必豫思其事父之道莫非以孝至於朋友以信事兄以弟皆當豫思之則心無疚病也道者五常之總名道能前定則施諸一身施諸天下施諸萬世無有窮匱也長樂陳氏曰此繼上而言誠也凡九經必有言有行有事有道而不行之以誠則忽焉忘焉烏能前定而豫不能前定而豫則不誠無物而言行事道皆廢矣跲困疚窮必至之患也然前定而豫豈先時而起哉能定能應亦理之當然爾孟子曰必有事焉而勿正心勿忘施氏曰豫者不為其事而為其所以事不察其然而察其所以然之謂也時過而後為則不足以當務烏能不廢乎事至而後慮則不足以應卒烏能不困乎范陽張氏曰誠者豈一日遽然安坐定氣閉目正容便以為誠哉當平居暇日戒謹恐懼積久以養之可也此所以有豫有前定之説也豫前定以言養之有素也養誠於未有事時所以言事豫則立不豫則廢又言前定則不跲而可行事前定則不困而常通行前定則不疚而常全道前定則不窮而常久此蓋深明豫與前定之不可不留意而欲學者養誠於平居暇日也江陵項氏曰言誠而必曰豫者教人素學之也知之素明行之素熟而後出之則不窮矣自事豫以上言政自事豫以下言學吳興沈氏曰豫者動之微吉之先見者也易坤下震上為豫其象曰雷出地奮豫是元氣有事之初也夫子於六二斷之曰君子見幾而作不俟終日即吾性情有事之始喜怒哀樂未發之際也其幾間不容髮君子於是知其所處則事無有不立矣否則鮮有不敗故曰不豫則廢凡言也事也行也莫不欲豫前定即豫也前定則不跲不困不疚然道之前定將如何邪天命之性至虛極靜其體本無窮也惟其本體無窮故其用亦無窮也故終之曰道前定則不窮然則前定之義果何如也孟子所謂必有事焉而勿正心勿忘勿助長也學者宜思之髙要談氏曰凡事云者總謂吾心之所泛應者也豫即前定也前定謂胸中先有規模也一心至微萬事至衆泛應之際儻規模不先定於胸中幾何不為事之所變亂哉言也事也行也道也四者皆要前定而四者之前定又皆相因以為本故言之前定本乎事之有實無是事則言亦無實矣安得不跲乎事之前定本乎行之有實無是行則事亦無實矣安得不困乎行之前定本乎道之有實無是道則行亦無實矣安得不疚乎此三者皆歸本乎道道者至理之所在也欲是道之前定當於喜怒哀樂未發之時求吾本心求之既得從而誠之使有諸己涵養純熟至於充實則道斯立矣此所謂規模也出而應事動有準則靡不曲當又何窮之有哉不跲則言立不困則事達不疚則行全不窮則道久故道前定則行前定矣行前定則事前定矣事前定則言前定矣四者雖殊而皆相因以為本此皆前輩之所未講使人思而得之也錢塘于氏曰言先於事事舉行隨而道亦存矣此四者之序也嚴陵俞氏曰言之前定非擇言之謂也易其心而後語也故不跲事之前定非逆計之謂也能定而後能應也故不困行之前定非詳慮之謂也安其身而後動何疚之有道之前定非預期之謂也本立而道生何窮之有欲其知一則告之以豫欲其知豫又告之以定聖人教人拳拳之意如此錢塘于氏曰凡言行與事固貴前定而易有太極在天地先道固未嘗不前定也生生之謂易道豈有窮也哉窮則變變則通是道無窮也此乃以道前定則不窮為言何與蓋此所謂道因人而言也楊墨之於仁義惟其不前定故其窮至於無父無君楊墨不足言也伯夷柳下惠其於道也非無定見而定於前者與夫子或異要其終卒至於隘與不恭亦未免於有窮焉不至如楊墨之害道耳孔子曰我則異於是無可無不可此孔子所謂道前定也孟子曰乃所願則學孔子也此孟子之所謂道前定也豫之彖曰豫之時義大矣哉於斯可見矣柯山周氏曰自此以上言用自此以下言體中庸之道言其用見於修身齊家治國平天下語其體則本之於誠中庸所謂明善誠身即大學所謂致知格物正心誠意大學之書由體起用故先言致知格物正心誠意而後及於修身齊家治國平天下中庸之書即用明體故先言修身齊家治國平天下而後本於誠身明善先後雖殊相為表裏所謂一以貫之也將言誠之道必先言所謂豫者蓋非一朝一夕之積如雷在地中為復至四陽大壯然後奮發而出天地之間溫溫乎其和可知是乃所謂豫聖人致中和至於天地位萬物育亦豈一朝一夕之積哉其道蓋前定矣凡事蓋總言之言能前定則不跲事能前定則不困行能前定則不疚況天下國家其道可不前定乎道而不能前定則用之有時而窮矣非所謂豫也故下文在下位不獲乎上民不可得而治反本造約卒歸於誠身明善由明善以誠身由誠身以順親信友由信友以獲乎上素位而行得志澤加於民非豫之至能若是乎不然如溝澮之水乍盈乍涸其廢也可立而待鳥在其為不窮邪孟子之學得於子思故其論誠亦云四明袁氏曰是非不兩立邪正不兩大聽讒者必不聽忠好色者必不好德重利者必不重義故必去讒必逺色必賤貨則純於天理而邪不干正矣凡為天下國家有九經章內禮記集説卷一百三十一
