body:
  text: 禮記集說卷第一百四十五宋衛湜撰三年問第三十八孔氏曰案鄭目録云名曰三年問者善其問以知喪服年月所由此於别録屬喪服嚴陵方氏曰三年之喪百王之所同問喪者以是為首故記喪者以是名篇三年之喪何也曰稱情而立文因以飾羣别親疏貴賤之節而弗可損益也故曰無易之道也創巨者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也斬衰苴杖居倚廬食粥寢苫枕塊所以為至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有己復生有節也哉鄭氏曰稱情而立文稱人之情輕重而制其禮也羣謂親之黨也無易猶不易也復生除喪反生者之事也孔氏曰此一節問喪三年所由解釋所以三年之意此記者假設其問立文謂立禮之節文也飾謂章表也羣謂五服之親因三年之喪差降各表其親黨也親謂大功以上疏謂小功以下貴謂天子諸侯絶期卿大夫降期以下賤謂士庶人服族其節分明不可損益故曰無易之道引舊語成文也創巨者巨大也大則難愈痛甚者喪親傷腎乾肝斬砍之痛既甚故差亦遲立三年之文以表是至痛極者也人子於此二十五月之時悲哀摧痛猶未能盡憂思悲慕猶未能忘而外貌喪服以是斷割若不以是裁斷則送死之情何時得己復吉之禮何有限節嚴陵方氏曰其生也父母有三年之愛於其子及其沒也故子有三年之喪以報之愛所謂情也三年之喪所謂文也故曰稱情而立文禮以情為本而以文為飾故曰因以飾羣羣則莊子所謂人羣是也服君與父皆斬衰三年由父而降則殺焉所以别親疏之節也由君而降亦殺焉所以别貴賤之節也親與貴者不可易而損之疏而賤者不可易而益之故曰弗可損益無易之道也送死者之禮有己復生者之事有節則不以死傷生故也新安朱氏曰有問喪祭之禮至周公然後備夏商而上想甚簡略答曰然親親長長貴貴尊賢夏商而上大槩只是親親長長之意到周又添得許多貴貴底禮數如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟期之喪天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降此皆貴貴之義上世想皆簡略未有許多降殺貴貴底禮數凡此皆天下之大經前世所未備到得周公搜剔出來立為定制更不可易凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人故人於其親也至死不窮鄭氏曰匹偶也言燕雀之恩不如大鳥獸大鳥獸不如人含血氣之類人最有知而恩深也於其五服之親念之至死無止也孔氏曰此經明天地之間血氣之類皆有所知至於鳥獸大小各能思其種類況在於人何有窮已將由夫患邪淫之人與則彼朝死而夕忘之然而從之則是曽鳥獸之不若也夫焉能相與羣居而不亂乎將由夫修飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王焉為之立中制節一使足以成文理則釋之矣鄭氏曰邪淫之人謂惡人薄於恩死則忘之其相與聚處必失禮也遂之謂不時除也立中制節謂服之年月也釋猶除也去也孔氏曰此明君子小人不同先王為之立中人之制節駟謂駟馬隙空隙駟馬駿疾空隙狹小以駿疾而過狹小言急速之甚立中制節立中人之制以為年月限節也三年一閏天道小成子生三年免於父母之懷故服以三年成文章義理則除去其服釋猶除去也橫渠張氏曰三年之喪二十五月而畢此言除之內於二十五月之晦為祥祭又兩月之禫共是二十七月二十七月之晦為禫祭據禮鑽燧改火天道一變期可已矣情不可已於是再期再期又不可已於是加之三月是二十七月也況書有明證春秋書祭祀可以考其得禮不得禮山隂陸氏曰言修飾者猶如此況所謂天資忠孝者歟先王為之立中制節一使足以成文理詩所謂庶見素韠兮聊與子如一兮是矣傳以為三年之喪賢者之所輕不肖者之所勉人道之至文者也情極則文至然則何以至期也曰至親以期斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也鄭氏曰言三年之義如此則何以有降至於期也期者謂為人後者父在為母也至親以期斷言服之正雖至親皆期而除也又問服斷於期之義言法天地變易可以期也孔氏曰上節既稱為父母三年此一節釋為期之義莫不更始言天地之中動植之物無不於前事之終更為今事之始以是象之言以人事法象天地故期年也今檢尋經意父母本意三年何以至期者但問其一期應除之義故答曰至親以期斷是明一期可除之節故禮期而練男子除絰婦人除帶下文云加隆故至三年是經意不據為人後及父在為母期鄭之此釋恐未盡經意然則何以三年也曰加隆焉爾也焉使倍之故再期也由九月以下何也曰焉使弗及也故三年以為隆緦小功以為殺期九月以為閒上取象於天下取法於地中取則於人人之所以羣居和一之理盡矣鄭氏曰法此變易可以期何以乃三年為也言於父母加隆其恩使倍期也焉猶然也焉使弗及言使其恩不若父母也取象於天地謂法其變易自三年以至緦皆歲時之數言既象天地又足以盡人聚居純厚之恩也孔氏曰焉使弗及焉亦然也然使恩隆不及於期也五月不及九月三月不及五月轉相不及也隆謂恩愛隆重殺謂情理殺薄閒是隆殺之間天地之氣三年一閏是三年取象於一閏天地一期物終是一期取象於一周九月象陽數又象三時而物成也五月象五行三月象天地一時而氣變此五服之節皆取法天地也子生三年免於父母之懷故服三年人之一歲情意變改故一期九月五月三月亦逐人情而減殺是取則於人既法天地與人三才並備故能調和羣衆聚居和諧專一義理盡備矣嚴陵方氏曰言服之正雖至親皆以期而除至於倍之而再期者特加隆於父母而已天以有所垂故曰取象經言天垂象是矣地以有所效故曰取法易言效法之謂坤是矣人以有所作故曰取則書言明哲實作則是矣然而喪或以三月或以五月或以九月或以期年或以三年喪凶禮也乃以陽數之竒何哉蓋隂所以致死陽所以致生死而致生之者孝子不忍死其親之意也山隂陸氏曰焉是也知然者以春秋傳曰晉鄭焉依國語作是知之也故三年之喪人道之至文者也夫是之謂至隆是百王之所同古今之所一也未有知其所由來者也孔子曰子生三年然後免於父母之懷夫三年之喪天下之達喪也鄭氏曰言三年之喪喪禮之最盛也不知其所從來喻此三年之喪前世行之久矣達謂自天子至於庶人孔氏曰此一節重明三年之義言於人道之中至極文理之盛人恩之至極隆厚也孔子曰引論語之文案易繫辭云古之葬者厚衣之以薪葬之中野不封不樹喪期無數尚書云百姓如喪考妣三載此云不知所由來者但不知定在何時唐虞以前喪服與吉服同皆以白布為之故郊特牲云齊則緇之若不齊則皆用白布至三代吉凶異也馬氏曰中庸曰三年之喪達乎天子父母之喪無貴賤一也然而世衰道微狃於習俗故雖宰我親受業於孔門猶曰三年不為禮禮必壞三年不為樂樂必崩鑽燧改火期可已矣雖聖人之善誘亦無如之何姑曰於汝安乎汝安則為之蓋人情之大不美也如此亦豈可以强率以從先王之制哉嗚呼常人之所行而宰我乃獨以為異固孔子所不取禮之所載三年問者豈亦當時之人疑此為重歟故曰凡天地之間有血氣之屬大至於鳥獸小至於燕雀莫不知愛其類又況於人乎其曰三年之喪人道之至文百王之所同古今之所一則為此書者亦有為而作也深衣第三十九孔氏曰案鄭目録云名曰深衣者以其記深衣之制也深衣連衣裳而純之以采者素純曰長衣有表則謂之中衣大夫以上祭服之中衣用素詩云素衣朱襮玉藻曰以帛裏布非禮也士祭以朝服中衣以布明矣此於别録屬制度其長衣中衣及深衣其制度同玉藻曰長中繼掩尺若深衣則緣而已故玉藻云朝𤣥端夕深衣庶人吉服亦深衣皆著之在表也其中衣在朝服祭服喪服之下知喪服亦有中衣者檀弓曰練衣黃裏注云練中衣以黃為內是也但喪服中衣不得繼掩尺也故喪服儀云帶緣各視其冠注云緣如深衣之緣是喪服中衣用深衣則深衣緣之以采故下云具父母大父母衣純以繢以青之屬也唯孤子深衣純以素但以緣而已不與長衣同其吉服中衣亦以采緣其諸侯得綃黼為領丹朱為緣郊特牲云綃黼丹朱中衣大夫之僭禮則知大夫士不用綃黼丹朱但用采純而已矣無文以明之其長衣以素緣知者若以采緣則與吉服中衣同故知以素緣也若以布緣則曰麻衣知用布緣者以其稱麻衣故知也其喪服之中衣其純用布視冠布之粗細至葬可以用素緣也綀則用縓也其詩之麻衣則與此别彼謂吉服之衣也所以此稱深衣者以餘服則上衣下裳不相連此深衣衣裳相連被體深邃故謂之深衣藍田呂氏曰此篇純記深衣之制度而已古者衣裳殊制所以别上下也唯深衣之制衣連裳而不殊蓋私燕之服爾如冠之法冠武殊制至於居冠則屬武而不殊皆所以尚簡便也雖曰簡便不可以無法故有五法之象長樂陳氏曰先王嚴分守一道德常見於形名度數之間而分守已嚴道德已一常寓於服飾器械之際蓋衣服者近人而易曉者也故作服而無其法則不足以為法服故深衣或圜或直一以天制或方或曲一以地制而崇之為三才卑之為三極莫不并與其精微之意以示之此深衣之所由作也所謂深衣不特以被體之深邃有以異乎常是故謂之深而自其理而觀之則深之又深極其精焉豈衆人之所能測歟嚴陵方氏曰經曰有虞氏深衣而養老傳曰庶人服短褐深衣則自天子至於庶人皆服之也以其義之深名之馬氏曰詩曰麻衣如雪閒傳曰大祥素練麻衣喪服記曰公子為其母麻衣縓緣而先儒皆以深衣言之蓋諸侯夕深衣則詩所謂麻衣者夕服也公子為其母小功則記所謂麻衣者小功服也小功緣以縓則大祥緣以布則夕服緣以采矣何則孤子以素則凡孤子者緣以布可也蓋深衣之為物可以為文可以為武可以擯相可以治軍旅在虞以為燕服故王制曰有虞氏深衣而養老是也在周以為夕服故玉藻曰朝𤣥端夕深衣是也又以為喪服而庶人以為吉服深衣之用豈施於一哉山隂陸氏曰冠言邃衣言深亦言之法古者深衣蓋有制度以應規矩繩權衡短毋見膚長毋被土續衽鉤邊要縫半下鄭氏曰聖人制事必有法度衣取蔽形毋被土為汙辱也續猶屬也祍在裳旁者也屬連之不殊裳之前後也鉤讀如鳥喙必鉤之鉤要縫半下三分要中減一以益下下宜寬也孔氏曰作記之時深衣無復制度故稱古者規矩繩權衡則制度所應者備在下文深衣之裳十二幅皆寬頭在下狹頭在上皆似小要之衽是前後左右皆有衽也續衽謂所續之衽鉤其旁邊當身之一旁非謂餘衽悉當旁也喪服裳前三幅後四幅各自為之不相連今深衣裳一旁則連之相著一旁則有續衽掩之與相連無異故鄭云屬連之不殊裳前後也深衣之衽已於玉藻釋之要縫謂要中之縫尺寸濶狹半下畔之濶下畔一丈四尺四寸則要縫半之七尺二寸鄭注據裳之一幅凡布廣二尺二寸四寸為縫一尺八寸在三分之一分為六寸減此六寸以益於下是下二幅有二尺四寸上二幅有一尺二寸故云三分要中減一以益下下容舉足而行故宜寬也慈湖楊氏曰短毋見膚長毋被土此言其縱也續祍鉤邊此言其衡也自旁而數之衽居其端也古之衽今之襟亦曰袂也深衣屬裳則當續衣之衽使之長與裳齊也上狹下廣其邊如鈎言其旁曲也於體為宜玉藻曰衽當旁此之謂也衽亦修廣矣矧當衣前故首言之喪服言衰衣裳負適袂袪廣博尺寸靡不備載獨不見所謂襟焉而有衽二尺有五寸是衽即襟也喪服言衣二尺有二寸襟與衣齊而衽二尺有五寸何也衰衣帶下尺則衣之長可知袂幅屬衣之處曰二尺二寸非謂衣之長止於此衣帶下尺并帶博處共長三尺三寸內闕中八寸偏前以安項衽綴於前領平衡之下則衽長二尺五寸正其度也通乎喪服之衽則深衣之衽與衣齊是為襟昭昭矣郭璞注方言亦謂衽為襟鄭康成既誤釋之孔穎達復誤疏之謂深衣十二幅幅即衽也且援魯莊公以衽受齊餽為證而深衣之篇未嘗以幅為衽又與玉藻衽當旁之文不符蓋孔思不及此故不知此下廣之衽正足以受餽不為不寬也古志四夷左衽喪記斂衣左衽咸謂襟也左傳結衽若訟者結此衽也古棺有衽是謂小要以鉤邊如衽也古曰衽席席左斂右斂如衽也詳考衽制無所不通涑水司馬氏曰案漢書江充衣紗縠襌衣曲裾後垂交輸如淳曰交輸割正幅使一頭狹若燕尾垂之兩旁見於後是禮深衣續衽鉤邊賈逵謂之圭蘇林曰交輸如今新婦袍之袿全幅繒角割名曰交輸裁也釋名曰婦人上服曰袿其下垂者上廣下狹如刀圭也然則别有鉤邊不在裳十二幅之數亦斜割使一端濶一端狹以濶者在上狹者在下交映垂之如燕尾有鉤曲裁其旁邊綴於裳之右旁以掩不相連之處嚴陵方氏曰深衣之作其所由來尚矣故以古者冠篇首袂在前以應規夾在中以應矩縫在後以應繩齊在下以應權衡短毋見膚則其形不䙝雖約而不失於儉長毋被土則其物不費雖隆而不過於奢衽襟也與裳相續故謂之續衽裾裳之邊曲以鉤束焉故曰鉤邊玉藻所謂衽當旁是也要縫之博居下齊之半玉藻所謂縫齊倍要是也以縫齊為倍則要縫為半矣此所以互言之藍田呂氏曰所謂毋見膚毋被土鉤邊半下可以運肘反詘之及肘毋厭脅者言深衣長短寬急之制也應十有二月應規應方應直應平者言深衣之法象也可以為文可以為武可以擯相可以治軍旅者言深衣之用也純以繢以青以素言深衣用純之别也毋見膚不欲䙝也毋被土不欲汙也此衣之長短之中也續衽鉤邊此衣之寬急之中也衽者衣裳之旁幅也玉藻所謂衽當旁是也衣之旁幅下殺裳之旁幅上殺上下之衽相續而中曲以是小要取名焉故曰鉤邊山隂陸氏曰此言縫非言圍言要非言幅也謂若深衣入要半寸其縫齊摺一寸是之謂半下鄭氏謂三分減一益下此續縫為圍要為幅之誤也亦於半下之言礙矣且幅縮縫要與齊皆衡縫深衣應規矩繩權衡若象服雖議於規矩準繩權衡之外可也袼之髙下可以運肘袂之長短反詘之及肘帶下毋厭髀上毋厭脅當無骨者鄭氏曰袼衣袂當掖之縫也肘不能不出入袂屬幅於衣詘而至肘當臂中為節臂骨上下各尺二寸則袂肘以前尺二寸肘或為腕帶當骨緩急難為中也孔氏曰袼謂當臂之處袂中髙下宜稍寬大可以運動其肘袂二尺二寸肘尺二寸是容運肘也袂之長短反詘之及肘者袂長二尺二寸并緣寸半為二尺三寸半除去其縫之所殺各一寸餘有二尺一寸半在從肩至手二尺四寸今二尺一寸半之袂得反詘及肘者以袂屬於衣幅廣二尺二寸身脊至肩但尺一寸也從肩覆臂又尺一寸是衣幅之畔覆臂將盡今又屬袂於衣又二尺一寸半故反詘其袂得及於肘也帶若當骨則緩急難中故當無骨之處此深衣帶下於朝祭服之帶也朝祭之帶則近上故玉藻云三分帶下紳居二焉是自帶而下四尺五寸也涑水司馬氏曰案袂即今之所謂袖也鄭云屬幅於衣謂禆於身旁未必皆盡一幅尺二寸也云臂上下各尺二寸者亦據中人為率爾如孔所言拘泥太甚況從肩至袂口二尺二寸半則反詘之過肘矣經以臂之短長布幅濶狹皆無常準故但云屈之及肘謂袖之短長適與手齊則反詘及肩自然及肘矣藍田呂氏曰袼之髙下可以運肘𬒮之長短反詘之及肘比袂之寬急之中也袼當腋之縫也不二尺二寸則不能回肘矣袂屬幅於衣詘而至肘則上下各尺二寸矣帶下毋厭髀上毋厭脅當無骨者此衣帶髙下之中也嚴陵方氏曰袂長短詘之及肘玉藻所謂袪尺二寸是矣袼也袪也袂也皆衣之名也在胳者則謂之袼在胠者則謂之袪在末者則謂之袂帶下毋厭髀上母厭脅若是則正當腹間矣深衣燕服也故欲緩急之適如此馬氏曰服身之章身服之準故視肘以為袂肘尺二寸袂二尺二寸殺袂以為袪袪尺二寸三袪以為要袂尺二寸倍為二尺四寸三之七尺二寸倍要以縫齊丈四尺四寸也制十有二幅以應十有二月袂圜以應規曲夾如矩以應方負繩及踝以應直下齊如權衡以應平鄭氏曰裳六幅幅分之以為上下之殺袂圜應規謂胡下也夾交領也古者方領今小兒衣領繩謂裻與後幅相當之縫也踝跟也下齊齊緝也孔氏曰每幅交解為二是十二幅也鄭以漢時領皆嚮下交垂故云古者方領似今擁咽故云若今小兒衣領方折之也負繩謂衣之背縫及裳之背縫上下相當如繩之直非謂實負繩也涑水司馬氏曰此謂三分其幅狹處占狹處濶處占濶處占二交解斜裁顛倒縫之使狹處皆在上濶處皆在下假使布幅二尺二寸除裁縫外有一尺八寸則狹處六寸闊處一尺二寸是也其人肥大則幅隨而闊瘦細則幅隨而狹要須十二幅下倍於上不必拘以尺寸之數牛領下垂者謂之胡胡下謂從袖口至腋下裁令其勢圜如牛胡也方領如孔所言似三代以前人反如今時服上領衣但方裁之耳案上領衣之制其上須用結紐乃可服不知古人果如此不也鄭注周禮夾狀如著橫銜之繣潔於項顔師古注漢書繣者結礙也潔繞也蓋為結紐而繞項也然則古亦有結紐也繣音獲潔音結漢時小兒衣服既不可見而後漢馬援傳朱勃衣方領能矩步注引前書音義曰頸下施襟領正方學者之服也如此似於頸下别施一襟映所交領使之方正今朝服有方心曲領以白羅為之方二寸許綴於圜領之上以繫於頸後結之或者夾之遺像歟又今小兒疊方幅繫於頸下謂之涎衣亦與鄭說頗相符然事當闕疑未敢決從也後漢儒林傳曰服方領習矩步者委蛇乎其中注方領直領也春秋傳叔向曰衣有襘杜曰襘領㑹也工外反曲禮曰視不上於祫鄭曰夾交領也然則領之交㑹處自方即謂夾疑更無他物今且從之以就簡易故以如此論之案衣之背縫謂之裻裻音督慈湖楊氏曰曲夾如矩以應方夾交領也夫衰衣上古之制也領正方其前平衡故可綴六寸之衰後儒不究古者製衣之始自然之體若是而曰如今中衣邪領之交亦近於方也使古表衣之領邪則六寸之衰於何所綴之也邪綴於前領則非正也古初製衣惟取闕中之方以安項爾簡嘗為方領深衣久則前墜近於今之圓領則後世變而為圓領亦其勢之自然又變而為邪領者其當暑之為歟以是為中衣不敢以為表衣人心之靈不敢尚巧而下朴也深衣惟曰抱方時已圓其所負之方歟中古之制歟抑闕中偏前故為抱方歟後方循頸而勢圓故獨言抱方歟石林葉氏曰謂夾為方領不知何據以吾考之袂圜以應規不云領曲以應矩而云曲夾如矩以應方則夾與領非一物也張華注朱勃事引漢書音義頸下施襟正方儒者之服則領之外蓋别有夾方折之加於領上此正古深衣之制也故云負繩抱方繩謂背縫之直則抱之宜在胸前若為交領則當在背何抱之云乎曲禮視不上於夾鄭氏亦以夾為交領夾當在帶之上所以尊天子若為交領無乃大髙乎尤可見其非也藍田呂氏曰衣袂之制有三有侈者自服而侈之夾至袪而侈之朝服以上是也有端者自夾至袪方正而製之𤣥端素端是也有圜者內殺於夾外殺於袪中則胡下深衣是也欲使行者舉手以為容儀如規之圜也長樂陳氏曰十二月者天數也袂圜以應規而圜者天之體曲夾如矩以應方而方者地之象也負繩及踝以應直下齊如權衡以應平而直與平者人之道何以知其然耶玉藻曰戴冕璪十有二旒則天數也蓋天之大數不過十二故月之至於十二而後成歲功猶之深衣也必十二幅而後可以為衣之良也唯夫衣之數有以合乎天之數此所以為十二月之應也著不息者天也而袂者動而不息也著不動者地也而襟者靜而不動也孟子曰規矩方圓之至也而文中子曰圜者動方者靜其見天地之心乎此其意也至於平則不傾也直則不屈也書曰平康正直論語曰人之生也直此又足以見負繩下齊之義也禮書嚴陵方氏曰袂在前以動而致用故欲圜圜者動故也夾在中以靜而成體故方方者靜故也及踝謂至足之跟也下齊謂在下之緝也山隂陸氏曰日月有常焉應是而已深衣之裳也深衣衣不殊上下裳不殊前後故也知然者以言十有二幅以應十有二月有言負繩及踝以應直知之也故規者行舉手以為容負繩抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安志而平心也鄭氏曰行舉手謂揖讓也引易言深衣之直方應易之文也政或為正心平志安行乃正或低或仰則心有異志者歟孔氏曰所以袂圜中規者欲使行者舉手揖讓以為容儀如規也負繩背之縫也抱方領之方也以直其正解負繩以方其義解抱方記者既明方直之義故引坤卦之六二直方以證之裳下之齊如權之衡低仰平也長樂陳氏曰於規言手則夾為頸下齊為足踝為膝可知也於直方言坤之六二則安志平心者為泰之無平不陂而舉手以為容者亦乃乾之反復其道可知也蓋先王之法類多如此要在考之也然豈特此也義所以行己也政所以正人也行己以義貴於方故於義言方而正人以政則貴於直故於政言直易曰義以方外傳曰枉己者未有能直人者是也若夫志譬則權也心譬則衡也衡之低昻皆權之輕重則心之平傾由志之安危此所謂安其志而平其心焉嚴陵方氏曰規矩者方圜之體方圜者規矩之用自曲夾如矩以應方而下皆上言體下言用唯袂圜以應規則上言用下言體何哉蓋袂之圜也非其體然及舉手以為容則圜爾乃其用然也上言如矩而後言負繩者以衣之先後為之序也下言負繩而後言抱方者以易之直方為之序也且制十有二幅以應十有二月者仰觀於天也直其政方其義者俯察於地也夾之髙下可以運肘者近取諸身也以規矩繩權衡者逺取諸物也若是則制度固已深矣謂之深衣豈為過山隂陸氏曰規乾之事也若所謂動容周旋中禮至矣下以亦善言規據以直其政以安志而平心言以在上負繩內也抱方外也凡向以後為內敬以直內義以方外案邾子執玉髙其容仰魯公執玉卑其容俯君子於此觀禍福則如權衡豈可少哉五法已施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且勿費善衣之次也鄭氏曰五法已施聖人服之言非法不服也完且弗費言可苦衣而易有也深衣者用十五升布煆濯灰治純之以采善衣朝祭之服也自士以上深衣為之次庶人吉服深衣而已孔氏曰以其完牢可苦事衣著以白布為之不須黼黻錦繡是易有也雜記云朝服十五升此深衣與朝服相類故用十五升布鍛濯灰治謂打洗鍛濯用灰治理使和熟也然則喪服麻衣雖似深衣之制不必鍛濯灰治以其雜凶故也案玉藻諸侯夕深衣祭牢肉又大夫士朝𤣥端夕深衣是深衣為朝祭之次服也諸侯之下自深衣以後更無餘服故知是庶人之吉服喪服有衰裳包貴賤上下無差亦明庶人吉服乃深衣也藍田呂氏曰深衣之用上下不嫌同名吉凶不嫌同制男女不嫌同服諸侯朝朝服夕深衣大夫士朝𤣥端夕深衣庶人衣吉服深衣而已此上下之同也有虞氏深衣而養老諸侯大夫夕皆深衣將軍文子除喪而受越人弔練冠深衣親迎女在塗壻之父母死深衣縞總以趨喪此吉凶男女之同也蓋深衣者簡便之服雖不經見推其義類則非朝祭皆可服之故曰可以為文可以為武可以擯相可以治軍旅也長樂陳氏曰文事則有冕辨服武事則有韋辨服而深衣次之先儒以善衣為朝祭之服蓋舉一端明之也然則深衣所以異於餘服者不特衣裳連餘服幅前三後四深衣則十二幅矣餘服之帶三分帶下紳居二焉深衣之帶則當無骨者矣嚴陵方氏曰五法則規矩繩權衡也五法之所取無非至公然必以規矩言無私者以規矩之方圜有天地之象焉其無私為足道故也聖人以德言先王以位言有德足以稱之故服之有位足以作之故貴之端冕則有敬色所以為文介胄則有不可辱之色所以為武然而端冕可以為文而已且不可以為武介胄可以為武而已且不可以為文兼之者唯深衣而已然可以為文非若端冕可以視朝臨祭也特可以贊禮而為擯相而已可以為武非若介胄可以臨難折衝也特可以運籌而治軍旅而已制有五法故曰完其質則布其色則白故弗費吉服以朝祭為上燕衣則居其次故曰善衣之次善衣吉服也馬氏曰五物者以其極至而可以為法於天下也故聖人之作深衣必應規矩繩權衡者以謂被於一身之間而可以為萬事之則故視其服者知其道觀其容者知其德輕重曲直方圜必來取法而不可欺矣此篇之制度所以為詳也制十有二幅以應時袂圓以天夾方繩直以應地應天以合自然應地以明不息應時則設施先後莫不有序及其歸也要在安志平心而已具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂緣純邊廣各寸半鄭氏曰尊者存以多飾為孝繢畫文也三十以下無父稱孤純謂緣之也緣袂謂其口也緣緆也緣邊衣裳之側廣各寸半則表裏共三寸矣唯夾廣二寸陸氏曰大父母祖父母也唐陸朗孔氏曰具父母父母俱在也大父母則亦然也若其不具一存一亡不必純以繢也唯有父母而無祖父母故飾少而純以青若無父母唯祖父母在亦當然也純其袂緣則袂口也非是口外更有緣也緣字讀如緆謂深衣下緣也故既夕禮云明衣縓綼緆鄭注云在幅曰綼在下曰緆藍田呂氏曰為人子者常言不稱老大孝終身慕父母故髧彼兩髦盡孺子之飾以致孺子之慕焉具父母大父母安可不盡孺子之飾故純以繢髧髦之義也大父母不存雖具父母純以青者有所殺也父母存衣冠不純素至於孤子則純素可也三十以下無父可以稱孤故曰幼而無父曰孤若三十以上有為人父之道不言孤也長樂陳氏曰具父母大父母純以繢備五采以為樂也具父母純以青體少陽以致敬也孤子純以素存凶飾以致哀也小功純以縓則大祥緣以布吉時夕服緣以采嚴陵方氏曰繢㑹五采青則飾之殺也與青青子襟同義孤子以素者無事乎飾也袂緣者袂與緣也褎口謂之袂裳下謂之緣衣側謂之邊其純皆寸半三五之數也禮記集說卷一百四十五
