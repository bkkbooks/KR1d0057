body:
  text: 禮記集說卷一百二宋衛湜撰凡喪服未畢有弔者則為位而哭拜踊鄭氏曰客始來主人不可以殺禮待之孔氏曰未畢謂喪服將終猶有餘日未滿有人始來弔當為位哭踊不以殺禮待新弔之賔也言凡者五服悉然大夫之哭大夫弁絰大夫與殯亦弁絰大夫有私喪之葛則於其兄弟之輕喪則弁絰鄭氏曰弁絰者大夫錫衰相弔之服也如爵弁而素加環絰私喪妻子之喪也輕喪緦麻也大夫降焉弔服而徃不以私喪之末臨兄弟孔氏曰謂成服以後大夫徃弔哭大夫則身著錫衰首加弁絰若未成服以前與殯之時身亦弁服而首加弁絰也私喪之葛謂妻子之喪至卒哭以葛代麻之後於此之時遭兄弟之輕喪緦麻大夫降一等雖不服以骨肉之親亦著弔服弁絰而徃不以妻子私喪之末服臨兄弟也若成服後則錫衰未成服之前身著素裳而首服弁絰為長子杖則其子不以杖即位為妻父母在不杖不稽顙母在不稽顙稽顙者其贈也拜鄭氏曰子不以杖即位辟尊者也為妻尊者在不敢盡禮於私喪故不杖不稽顙獨母在於贈拜得稽顙父在贈拜則不得稽顙孔氏曰父為長子杖其子長子之子祖在不厭孫其孫得杖但與祖同處不得以杖即位辟尊者也為妻謂適子為妻父母見存不敢為妻杖又不敢為妻稽顙案喪服云大夫為適婦為喪主父為己婦之主故父在不敢為婦杖父没母在為妻雖得杖而不得稽顙以杖與稽顙連文不杖屬於父在不稽顙文屬母在故云父母在不杖不稽顙不稽顙二義母在不稽顙者謂母在為妻子尋常拜賔之法也稽顙者其贈也拜者但父没母在稍降殺於父有他人以物來贈己其恩既重其謝此贈之人時為拜得稽顙故云其贈也拜嚴陵方氏曰父母在則為妻不杖不稽顙為尊者厭不敢盡禮於私喪也母在父没則為妻亦不稽顙則容杖矣然於拜贈之時亦稽顙焉凡以别於父在之時也山隂陸氏曰適子為妻如此則庶子父雖在以杖即位可也違諸侯之大夫不反服違大夫之諸侯不反服鄭氏曰其君尊卑異也違猶去也去諸侯仕諸侯去大夫仕大夫乃得為舊君服孔氏曰去諸侯謂不使其君及辟仇也之徃也已若本是諸侯臣徃仕大夫此是自尊適卑不可反服於前之尊君也本是大夫臣今仕諸侯此是自卑適尊若猶服卑君則為新君之耻也故亦不反服舊君服齊衰三月清江劉氏曰此言違而仕者則不反服舊君避新君也然則違而未仕者聞舊君之喪則反服爾春秋𫝊所謂未臣焉有伐其國者反死之可矣既臣焉而反死之則不可鄭𤣥云去諸侯仕諸侯去大夫仕大夫乃得為舊君服非也嚴陵方氏曰或違尊而之卑或違卑而之尊皆不敢反服於舊君者以尊卑異體故也喪冠條屬以别吉凶三年之練冠亦條屬右縫小功以下左緦冠繰纓大功以上散帶鄭氏曰别吉凶者吉冠不條屬也條屬者通屈一條繩若布為武垂下為纓屬之冠象大古䘮事略也吉冠則纓武異材焉右縫者右辟而縫之小功以下左辟象吉輕也繰纓繰當為澡麻帶絰之澡聲之誤也為有事其布以為纓孔氏曰此一節眀喪冠輕重之制吉冠則纓與武各别喪冠則纓與武共材條屬者條猶著也謂取一條繩屈之為武垂下為纓以著冠也三年練冠小祥之冠也雖㣲入吉亦猶條屬與凶冠不異吉冠則襵上辟縫嚮左左為陽陽吉也凶冠縫嚮右右為隂隂喪所向也過小祥猶條屬故縫猶嚮右也小功以下輕故縫同吉嚮左也緦衰冠治縷不治布冠又用澡治緦布為纓以輕故也鄭註有事其布以為纓者緦麻既有事其縷就上澡之是又治其布謂縷布俱治也大功以上散帶者小斂之後主人拜賔襲絰於序東小功以下皆絞之大功以上散此帶垂不忍即成之至成服乃絞山隂陸氏曰繰讀如蠶繰之繰繰纓散絲纓也即言絲嫌不散朝服十五升去其半而緦加灰錫也鄭氏曰緦精麤與朝服同去其半則六百縷而疏也又無事其布不灰焉孔氏曰朝服精細全用十五升布為之緦麻於朝服十五升布之内抽出其半以七升半用緦麻服之衰服也鄭註喪服去其半而緦如絲是也取緦以為布又加灰治之則曰錫言錫然滑易也經云去其半而緦始云加灰錫眀此緦衰不加灰不治布故也山隂陸氏曰周書成王㑹墠上天子南面立絻無繁露朝服八十物搢挺唐叔荀叔周公在左太公望在右皆絻亦無繁露朝服七十物搢笏堂下之右唐公虞公南面立焉堂下之左殷公夏公立焉皆南面絻有繁露朝服五十物搢笏八十七十五十物縷也據此升之精粗有不同矣鄭氏謂八十縷為升舉其精者也緦於縷加灰錫於布加灰朝服據布故曰十五升去其半而緦加灰錫也朞悲哀三年憂緦思而已諸侯相禭以後路與冕服先路與襃衣不以襚鄭氏曰不以己之正者施於人以彼不以為正也後路貳車貳車行在後也孔氏曰禭謂以物送死用後路謂上路之後次路也冕服謂上冕之後次冕也先路襃衣是己車服之上不可以施人以彼不以為正服所用也嚴陵方氏曰後路貳車也先路正車也襃衣即前言復諸侯以襃衣是矣山隂陸氏曰大路玉輅也左𫝊僖二十八年王賜晉侯大路之服襄二十九年鄭公孫蠆卒王追賜之大路二十四年賜穆叔大路定四年分魯公以大路大旂分康公以大路少帛分唐叔以大路密湏之皷是也車馬曰賵衣服曰禭禭而以路非正也既夕禮曰賔奉幣由馬西當前路北面致命變言前路著非後路也不曰先路避先路也遣車視牢具疏布輤四面有章置於四隅鄭氏曰言車多少各如所包遣奠牲體之數也遣奠天子大牢包九个諸侯亦大牢包七个大夫亦大牢包五个士少牢包三个大夫以上乃有遣車輤其盖也四面皆有障蔽以隠翳牢肉孔氏曰遣車送葬載牲體之車也牢具遣奠所包牲牢之體貴賤各有數也一个為一具取一車載之故云視牢具諸侯大夫位尊雖無三命則有車馬之賜及天子上士三命皆得有遣車諸侯士以下賤故無遣車也疏布輤者以麤布為上蓋四面有物章之入壙置於槨之四隅賈氏曰士無遣車則所包者不載於車直持之而已山隂陸氏曰疏布輤亦如殯車為輤其異者四面有章置於椁之四隅載粻有子曰非禮也喪奠脯醢而已鄭氏曰粻米糧也言死者不食糧也遣奠本無黍稷孔氏曰遣車載粻有子譏其為失也遣奠之饌無黍稷故不載粻既夕藏筲者謂遣奠之外别有黍稷麥也遣奠用牲體是脯醢之義祭稱孝子孝孫喪稱哀子哀孫鄭氏曰各以其義稱孔氏曰祭吉祭也謂自卒哭以後之祭吉則申孝子之心祝辭云孝也或子或孫随其人喪稱哀子哀孫謂自虞以前凶祭也喪則痛慕未申故稱哀也故士虞禮稱哀子卒哭乃稱孝子嚴陵方氏曰祭所以追飬而盡於一身之終喪所以哭亡而止於三年之孝則為人子孫終身之行也故子孫之於祭必稱孝哀則𤼵於聲音見於衣服盖三年之禮而已故子孫之於喪止稱哀端衰喪車皆無等鄭氏曰喪車惡車也喪者衣衰及所乗之車貴賤同孝子於親一也衣衰言端者𤣥端吉時常服喪之衣衰當如之孔氏曰端正也吉時𤣥端服身與袂同以二尺二寸為正而喪衣亦如之以其綴六寸之衰於心前故曰端衰等等差也喪也衣衰及惡車天子至士制度同無等差之别也案鄭註巾車喪車凡五等木車始遭喪所乗素車卒哭所乗薻車既練所乗駹車大祥所乗漆車禫所乗山隂陸氏曰衰制雖無等其布之精粗則有差也據衰與其不當於物也寜無衰大白冠緇布之冠皆不蕤委武𤣥縞而后蕤鄭氏曰不蕤質無飾也大白冠大古之布冠也春秋𫝊曰衛文公大布之衣大白之冠委武冠卷也秦人曰委齊東曰武𤣥𤣥冠也縞縞冠也孔氏曰大白冠白布冠也緇布冠黒布冠也二冠無飾故皆不蕤此緇布冠謂大夫士之冠其諸侯則玉藻云緇布冠繢緌是也𤣥縞二冠既先有别卷後乃可蕤故云而后蕤也大祥縞冠亦有蕤何以知之前既云練冠亦條属右縫則知縞不條属既别安卷灼然有蕤也鄭引衛文公證大白冠是布也文公以國未道不充其服自貶損也馬氏曰冠以莊其首蕤以致其飾冠而不蕤者始於上古尚質而不文也冠之以蕤者制於後代以文而勝質也文公為狄所滅齊桓公救而封之則以亡國之君為居喪之服故以大白始冠者欲其重始而取上世之冠故以緇布此皆不蕤者也至於𤣥冠或以朱組纓或以丹組纓縞冠則或以𤣥武或以素紕此皆以蕤者也然而大白不蕤矣而郊特牲曰大古冠布齊則緇之其緌也緇布不蕤矣而玉藻曰緇布冠繢緌諸侯之冠也若是則有時而致飾可以蕤乎雜記所言特喪冠爾山隂陸氏曰委委貌也𤣥所謂縞冠𤣥武縞所謂𤣥冠縞武如是而後緌先儒謂𤣥冠委貌也然則縞冠素委貌歟素委貌盖素端之冠大夫冕而祭於公弁而祭於己士弁而祭於公冠而祭於己士弁而親迎然則士弁而祭於己可也鄭氏曰弁爵弁也冠𤣥冠也祭於公助君祭也大夫爵弁而祭於己唯孤爾然則士弁而祭於己縁類欲許之也親迎雖亦己之事攝盛服爾非常也孔氏曰此一節明大夫士公私祭服大夫謂孤也冕絺冕也祭於己自祭廟也助祭為尊故服絺冕自祭為卑故服爵弁士以爵弁為上故用助祭冠𤣥冠為卑自祭不敢同助君之服故用𤣥冠也作記之人雖云士冠而祭於己以己既爵弁親迎親迎輕於祭尚用爵弁則自用爵弁自祭己廟於禮可用也是記者縁事類許之著爵弁也儀禮少牢上大夫自祭用𤣥冠此亦云弁而祭於己與少牢異故鄭註云唯孤爾知非卿者以少牢禮有卿賔尸下大夫不賔尸眀卿亦𤣥冠不爵弁也親迎配偶一時之極故許其攝盛服祭祀湏依班序著弁於理可也崔氏曰孤不悉絺冕若王者之後及魯之孤則助祭用絺若方伯之孤助祭則𤣥冕以其君𤣥冕自祭不踰之也馬氏曰周官司服曰王之吉服祭昊天上帝則服大裘而冕降而至於祭羣小祀則𤣥冕盖祭之大者莫重於昊天而祀之小者莫甚於羣小祀不别以服不降以等則尊卑不眀隆殺不分而禮㡬乎熄矣大夫士則祭之至大者莫重乎助於公祭之有常者莫甚乎祭於己故大夫則冕而祭於公弁而祭於己士弁而祭於公冠而祭於己者亦周官六服同冕之意也盖王則異其服而大夫士則異其冕弁而已周禮又曰卿大夫之服自𤣥冕而下士之服自皮弁而下則大夫以𤣥冕為極而士以爵弁為極也非祭於公安敢用哉雖然士弁而親迎則士弁而祭於己可乎謂昬者己之事祭於家者亦己之事弁可用於昬則亦可用乎祭於己此記禮者之所疑也盖昬禮者合二姓之好為萬世之始以其至大之禮行於一時之間可以攝其盛服而用弁焉士昬禮所謂主人爵弁者也至若祭於己則嵗時所用於家為常茍不與祭於公者有辨安在其為禮哉士可弁而祭於己則大夫亦可冕而祭於己矣雖然士之弁而親迎亦猶記所謂冕而親迎者也故哀公甞疑其為己重而孔子辨之諸侯以祭服而親迎則士以助祭服而親迎義之當然於是乎在茍弁而祭於己則非特嫌其同於公而又著其輕於昬矣故士之弁而祭於公者正也弁而親迎者權也弁而祭於己則不可也山隂陸氏曰此言大夫若冕而祭於公則弁而祭於己士若弁而祭於公則冠而祭於己若下大夫一命弁而祭於公則冠而祭於己可知下士不命冠而祭於公則端而祭於己亦可知少牢朝服而祭下大夫也特牲冠端𤣥而祭下士也王之上士三命服𤣥冕則弁而祭於己矣然則一命大夫不冕雖士三命有服冕者據大夫五士三鄭氏謂大夫爵弁自祭宗廟惟孤爾又謂諸侯自相朝聘皆皮弁服皆非是案典瑞公執桓圭侯執信圭伯執躬圭繅皆三采三就以朝覲宗遇㑹同于王相見亦如之盖諸侯自敵以上相見皆用其至且有宜稱皮弁服不應執圭李氏曰大夫冕而祭於公謂天子之大夫也儀禮曰大夫朝服而祭謂諸侯之大夫也士弁而親迎則弁而祭於己可也詩曰角枕粲兮角枕天子之所服也有昬者枕可以同於王而士之冠可以同於大夫所以重昬也暢􅍫以掬杵以梧枇以桑長三尺或曰五尺畢用桑長三尺刋其柄與末鄭氏曰􅍫杵所以𢷬鬱也掬栢也枇所以載牲體者此謂喪祭也吉祭枇用棘畢所以助主人載者刋猶削也孔氏曰此一節眀吉凶暢及枇畢之義暢猶鬱鬯也掬栢爾雅釋木云梧桐也以栢為􅍫以桐為杵𢷬鬱鬯用栢香桐潔白於神為宜也牲體從鑊以枇升入於鼎從鼎以枇載之於俎知吉祭枇用棘者特牲記枇用棘心是也主人舉肉則用畢助主人舉肉用桑者亦喪祭也吉時亦用棘末頭亦削之枇亦當然長樂陳氏曰匕之别有四有黍稷之匕有牲體之匕有疏匕有喪匕三匕以棘喪匕以桑廪人之所摡黍稷之匕也饔人之所摡牲體之匕也牲體之匕挑匕也其制則黍稷之匕小於挑匕挑匕小於疏匕何則敦之量不過三豆而高不過一尺則黍稷之匕小矣挹之以挑匕然後註於疏匕者三則疏匕大矣畋器曰畢祭器亦曰畢皆象畢星也詩曰兕觥其觩角弓其觩有捄棘匕有捄天畢捄者曲而長也則畢之狀可知矣鄭氏曰異狀如匕喪匕用桑而異亦桑則吉匕用棘而畢亦棘此鄭氏所以言匕畢同材也然桑黄棘赤各致其義舊圖謂匕畢皆漆之誤矣特牲主人及佐食舉牲鼎宗人執畢先入賛者錯俎加匕鄭氏曰主人親主則宗人執畢導之以畢臨載匕備失脱也少牢及虞禮無匕何哉少牢大夫不親舉虞祭主人未執事其説是也禮書率帶諸侯大夫皆五采士二采鄭氏曰此謂襲尸之大帶率繂也繂之不加箴功大夫以上更飾以五采士以朱緑襲事成於帶變之所以異於生孔氏曰小歛大歛衣數既多有絞不可加帶故知此謂尸襲竟而著此帶也率謂為帶也但攝帛邉而熨殺之不加箴功異於生也吉時大帶唯有朱緑𤣥華無五采以五采飾之亦異於生也此士天子之士也諸侯之士則士喪禮用緇帶鄭以襲衣與生同惟帶與生異凡襲事著衣畢加帶乃成故註云成於帶也山隂陸氏曰言大夫以上襲尸其帶皆以五采絲率之即非襲尸無率也據士練帶率下辟醴者稻醴也甕甒筲衡實見間而后折入鄭氏曰此謂葬時藏物也衡當為桁所以庪甕甒之属聲之誤也實見間藏於見外椁内也折承席也孔氏曰此經是送葬所藏之物醴是稻米所為甕者盛醯醢甒者盛醴酒筲者盛黍稷衡者以大木為桁置於地所以庪舉甕甒之属實見間者見謂棺外之飾言實此甕甒筲等於見外椁内二者之間也實物棺内既畢然後以承席加於椁上案既夕禮乃窆藏器於旁加見註云器用器役器也加見者器在見内也又云藏苞筲於旁註云在見外也則見内是用器役器見外是眀器也此是士禮大夫以上則有人器眀器也人器實明器虗案既夕禮註云折猶庪也方鑿連木為之盖如牀而縮者三横者五無簀窆事畢加之壙上以承抗席故謂承席賈氏曰見棺飾也飾則帷荒以帷荒加於柩棺柩不復見唯見此帷荒故名帷荒為見儀禮疏唐陸氏曰見棺衣也山隂陸氏曰以實見間非止此四物以此四物該之衡讀如字其桁之横者也重既虞而埋之鄭氏曰就所倚處埋之孔氏曰案既夕禮初喪朝禰廟重止於門外之西不入謂將嚮祖廟若過之然也眀日自禰廟随至祖廟庭欲眀將出之時重出自道左倚之就所倚之處埋之謂於祖廟門外之東也凡婦人從其夫之爵位鄭氏曰婦人無専制生禮死事以夫為尊卑小歛大歛啓皆辯拜鄭氏曰嫌當事來者終不拜故眀之也此既事皆拜孔氏曰禮凡當大歛小歛及啓攅之時唯有君來則止事而出拜之若他賔客至則不止事事竟乃即堂下之位悉徧拜故云皆辯拜也然若士當事而大夫至則士亦為大夫出雜記云大夫至絶踊而拜之是也金華應氏曰小歛以襲其形大歛以韜於棺啓殯以載其柩皆喪事之變節而切於死者之身也生者之痛莫此為甚賔亦於是拜死者弔生者故主人皆徧拜以謝之而致其哀也朝夕哭不帷無柩者不帷鄭氏曰朝夕哭不帷縁孝子心欲見殯肂也既出則施其㧁鬼神尚幽闇也無柩謂既葬也棺柩已去鬼神在室堂無事焉遂去帷孔氏曰案士喪禮君使人弔徹帷鄭云徹帷㧁之則㧁是褰舉之名初哭則褰舉事畢則施下之葬後神主祔廟還在室在堂無事不用帷也君若載而后弔之則主人東面而拜門右北面而踊出待反而后奠鄭氏曰主人拜踊於賔位不敢迫君也君即位車東出待不必君留也君反之使奠孔氏曰臣喪朝廟柩已下堂載在柩車而君來弔君位於車東故主人在車西東西而拜門謂祖廟門也右西邉也若門外來則右在東此據車門内出故右在西孝子拜君竟從位立近門内西邉北面而哭踊為禮也出待者孝子哭踊畢而先出門待君以君來則拜迎去則拜送今君弔事竟不敢必君乆留故孝子先出待君出也反而后奠者君使人命孝子反還喪所而后設奠告柩知之或謂此在廟載柩車時奠謂反設祖奠也子羔之襲也繭衣裳與稅衣纁袡為一素端一皮弁一爵弁一𤣥冕一曽子曰不襲婦服鄭氏曰繭衣裳者若今大䙱也纊為繭緼為袍表之以稅衣乃為一稱爾稅衣若𤣥端而連衣裳者也大夫而以纁為之縁非也唯婦人纁袡禮以冠名服此襲其服非襲其冠曽子譏襲婦服而已𤣥冕又大夫服未聞子羔曷為襲之𤣥冕或為𤣥冠或為𤣥端唐陸氏曰紳裳下襈也王肅云婦人蔽膝孔氏曰此眀大夫死者襲衣稱數也繭衣裳者纊為繭謂衣裳相連而緜纊著之也稅謂黒衣也亦衣裳連纁絳也袡裳下縁襈也以絳為縁繭衣既褻故用稅衣表之合為一稱故云繭衣裳與税衣纁袡為一也素端以素為衣裳此第二稱也服既不褻並無别衣表之也皮弁第三稱也十五升白布為衣積素為裳也爵弁第四稱𤣥衣纁裳也𤣥冕第五稱大夫之上服也纁袡是婦人之服而子羔襲用之故曽子譏之鄭以經云皮弁爵弁但云冠此襲其服非襲其冠故云禮以冠名服子羔為大夫無文今著𤣥冕故云曷為襲之山隂陸氏曰據此男子裡衣皆連衣裳裘盖亦如之然則婦人連衣裳放男子之内也公襲九稱爵弁三大夫五稱皮弁三則士三稱爵弁一皮弁二與凡襲親身之服不與其餘為序故子羔襲稅衣其素端以下自為序素端亞皮弁皮弁亞爵弁爵弁亞𤣥冕公襲衮衣其𤣥端以下自為序𤣥端亞朝服朝服亞素積素積亞爵弁爵弁亞𤣥冕𤣥冕亞襃衣為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫以下之家也鄭氏曰公所為君所作離宫别館也公七踊大夫五踊婦人居閒士三踊婦人皆居閒鄭氏曰公君也始死及小歛大歛而踊君大夫士一也則皆三踊矣君五日而殯大夫三目而殯士二日而殯士小歛之朝不踊君大夫大歛之朝乃不踊婦人居閒者踊必拾主人踊婦人踊賔乃踊孔氏曰此一經眀諸侯至士初死在室殯踊節及眀貴賤踊數也公諸侯去死日五日而殯則合死日六日也七踊者始死一踊眀日襲之時又一踊襲明日朝又眀日小歛朝一踊為四也其日晚小歛時又一踊是小歛日再踊就於前三日為五也小歛眀日朝又踊為六也至眀日大歛之朝不踊當大歛時乃踊凡七也大夫三日殯合死日為四日始死一眀日襲朝又眀日小歛日再小歛眀日大歛凡五也士二日殯合死日數也始死一小歛朝不踊至小歛時一又眀日大歛一凢三也婦人與丈夫更踊居賔主之中閒也然親始死及動尸舉柩哭踊無數今云七五三者謂為禮有節之踊毎踊輙三者三為九而謂為一也山隂陸氏曰公五日而殯踊七日大夫三日而殯踊五日其始死之日踊既殯之後一日猶踊若士三日而殯踊三日則其既殯之後一日不踊歟三五七然後有閒士三踊婦人居閒言皆三無又閒故也然則婦人居閒若閒七踊其二日甲一踊又二日乙一踊又二日甲乙踊大夫放此嚴陵方氏曰為貴者踊則多為賤者踊則少此重輕之别也公襲卷衣一𤣥端一朝服一素積一纁裳一爵弁二𤣥冕一襃衣一朱緑帶申加大帶於上鄭氏曰朱緑帶者襲衣之帶飾之雜以朱緑異於生也此帶亦以素為之申重也重於革帶也革帶以佩韍必言重加大帶者眀雖有變必佩此二帶也士襲三稱子羔襲五稱今公襲九稱則尊卑襲數不同矣諸侯七稱天子十二稱與孔氏曰此一經眀襲用衣公襲以上服在内公身貴故以上服親身欲尊顯加賜故襃衣最外而細服居中也子羔賤故卑服親身𤣥端者燕居𤣥端朱裳也朝服者緇衣素裳日視朝之服也素積者皮弁視朔之服纁裳者冕服之裳亦可鷩毳任取中閒一服也爵弁二者𤣥衣纁裳此始命之服重本故二通也𤣥冕之下又取一也襃衣最上華君賜也自卷衣至此合爵弁二通合九稱朱緑帶者以素為之飾以朱緑此衣之小帶散在於衣非是緫束其身已用此朱緑小帶結束之重加大帶於革之上象生時大帶也用素為之士則二采大夫諸侯皆五采即前經率帶也申加者謂於革帶之上重加此大帶也天子諸侯襲數無文鄭約之故稱與疑辭也嚴陵方氏曰言公之襲如此自卿大夫而下固有降殺矣山隂陸氏曰子羔言繭衣裳公言朱緑帶申加大帶於上相備也喪大記曰袍必有表不禪衣必有裳謂之一稱纁裳先儒謂冕服之中鷩毳任取中閒一服非是纁裳即冕服不應其序在此盖纁裳亦爵弁也故曰素積一纁裳一素積言皮弁則纁裳言爵弁可知然則公襲爵弁盖三即言爵弁三嫌不侈又公言襃衣而子羔不言著有襃衣則襲無則否且於公言有襃衣亦言之法若子羔甞賜襃衣則其襲應云子羔之襲也繭衣裳與𤣥冕為一素端一皮弁一爵弁一襃衣一知然者以公襲如此知之也小歛環絰公大夫士一也鄭氏曰環絰者一股所謂纏絰也士素委貌大夫以上素爵弁而加此絰焉散帶孔氏曰環者周迴纏繞之名故知是一股纏絰若兩股相交則謂之絞親始死孝子去冠至小歛不可無飾士素委貌大夫以上素弁而貴賤悉得加於環絰故云一也長樂黄氏曰叔孫武叔之母死既小歛舉尸出户袒乃投其冠括髪子游嗤其不知禮疏云括髪在小歛之後奉尸夷于堂之前主人為欲奉尸故袒而括髪在前今武叔奉尸夷堂之後乃投冠括髪失哀節故子游嗤之以此推之則小歛之時士素委貌大夫以上素弁而加環絰可知及至大歛子亦弁絰又曰鄭註環絰之末有散帶二字既馮尸主人絞帶條下孔疏亦云小歛於戸内訖主人袒括髪散帶垂今以記文考之小歛但言婦人帶麻主人絞帶不言主人帶絰至奉尸夷于堂方言帶絰而註説則以小歛之時散帶疏説又以為既小歛之後散帶其説不同皆不足為據也嚴陵方氏曰親始死故未暇辨貴賤之等公視大歛公升商祝鋪席乃歛鄭氏曰喪大記曰大夫之喪將大歛既鋪絞紟衾君至此君升乃鋪席則君至為之改始新之也孔氏曰公君也眀君臨臣喪大歛禮也臣喪大歛君來至之前主人雖已鋪席布絞紟衾聞君至則主人撤去之君來升堂時商祝更鋪席待君至乃歛榮君來為新之也亦示若事由君也商祝主歛事者魯人之贈也三𤣥二纁廣尺長終幅鄭氏曰言失之也士䘮禮下篇曰贈用制幣𤣥纁束帛孔氏曰記魯失也贈謂以物送亡人於椁中魯人雖三𤣥二纁而用廣尺長終幅不復丈八尺則禮失也弔者即位於門西東面其介在其東南北面西上西於門主孤西面相者受命曰孤某使某請事客曰寡君使某如何不淑相者入告出曰孤某湏矣弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之䘮寡君使某如何不淑子拜稽顙弔者降反位鄭氏曰弔者即位于門西立門外不當門也主孤西面立於阼階下也相者受命受主人命以出也不言擯者䘮無接賔也淑善也如何不善言君痛之甚使某弔也稱孤某者其君名君薨稱子某使人知適嗣也湏矣不出迎也子孤子也降反位者出反門外位無出字脱孔氏曰自此以下終於篇末眀諸侯相弔含贈賵之禮此一節眀弔禮門西謂主國大門之西凶事異於吉故介在東南北面西上以使在門西故也相者相主人𫝊命者也鄭註䘮不言擯此對例耳通而言之吉士亦云相司儀云毎門一相大宗伯云朝覲㑹同則為上相凶事亦稱擯故䘮大記云君弔擯者進又士䘮禮擯者出請入告是也孤某湏矣孤謂嗣子也某為嗣子之名異於吉禮不出迎故曰湏矣主人升堂謂從阼階升也子拜稽顙不云孤某而稱子者客既有事於殯故稱子以對擯之辭也以下皆然若對賔之辭則稱孤某嚴陵方氏曰此皆諸侯相弔之禮也淑善也如何不淑言奉君之命弔君之䘮不敢不善其事也湏待也與寡君湏矣同義含者執璧將命曰寡君使某含相者入告出曰孤某湏矣含者入升堂致命子拜稽顙含者坐委于殯東南有葦席既葬蒲席降出反位宰夫朝服即䘮屨升自西階西面坐取璧降自西階以東鄭氏曰含玉為璧制其分寸大小未聞言降出反位則是介也春秋有既𦵏歸含賵禭無譏焉皆受之於殯宫朝服告鄰國之禮也即就也以東藏於内也孔氏曰此一節眀含之所用已具檀弓疏含者坐委所含之璧于殯之東南席上未𦵏之前有葦席承之既𦵏已後則以蒲席承之案左𫝊隠元年天王使宰咺來歸恵公仲子之賵緩也公羊亦云不及事皆譏其緩也鄭云無譏者據榖梁云王使榮叔歸含且賵不言來不周事之用也眀宰咺言來得周事也是既𦵏歸含且賵無譏宰夫朝服即䘮屨者宰謂上卿也言夫衍字朝服者吉服也必用吉服者以鄰國執玉而來執玉不麻故著朝服且不敢純凶待鄰國也以在䘮不可純吉故即䘮屨也此遭䘮已乆故嗣子親受禮宰著朝服若新始遭䘮則主人不親受使大夫受於殯宫此弔者既為上客又賵者是上介則此含者禭者當是副介末介但含襚於死者為切故在先陳之禭者曰寡君使某禭相者入告出曰孤某湏矣襚者執冕服左執領右執要入升堂致命曰寡君使某襚子拜稽顙委衣于殯東禭者降受爵弁服於門内霤將命子拜稽顙如初受皮弁服於中庭自西階受朝服自堂受𤣥端將命子拜稽顙皆如初襚者降出反位宰夫五人舉以東降自西階其舉亦西面鄭氏曰委衣于殯東亦於席上所委璧之北順其上下授禭者以服者賈人也其舉亦西面亦襚者委衣時孔氏曰此一節眀襚禮案上文含者稱執璧下文賵者稱執圭則此禭者當稱執衣不云者文不備也鄭註順其上下謂上者在前下者在後也聘禮有賈人故知授襚者之服是賈人也上云委衣于殯東又云受爵弁受皮弁𤣥端皆曰如初是皆在殯東西面而嚮殯今示舉者亦西面是亦如禭者西面也其服重者使執而入爵弁受於内霤皮弁受於中庭朝服受於西階𤣥端受於堂既受處不同則陳於璧北亦重者在南凡諸侯相襚衣數無文據此其服有五又先路襃衣不以襚以外無文嚴陵方氏曰即前所言諸侯相襚以後路與冕服者盖是禮也山隂陸氏曰所受服轉卑故其所授轉高也爵弁皮弁不言委朝服𤣥端不言委受可言也委不可言也凡端不言服愧於言服據爵弁服纁裳皮弁素積𤣥端𤣥裳爵弁服尊矣受於門内霤皮弁次之受於中庭朝服又次之自西階受朝服𤣥端卑矣自堂上受𤣥端不言受朝服於西階受𤣥端於堂亦以此上介賵執圭將命曰寡君使其賵相者入告反命曰孤某湏矣陳乗黄大路於中庭北輈執圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東鄭氏曰輈轅也自率也下謂馬也馬在路之下覲禮曰路下四亞之客給使者入設乗黄於大路之西客入則致命矣使或為史孔氏曰此一節眀賵禮乗黄謂馬也大路謂車也陳四黄之馬於大路之西于殯宫中庭北輈者大路輈轅北嚮也客使謂使客之從者為客所使故曰客使自下由路西者由左也陳路北轅既竟賵客執圭升堂致命而客之從者牽馬設在車之西大路亦使設之也引覲禮證馬為下也四亞之謂馬四疋亞次路車也賵既夕有奠主於親者故既夕禮兄弟賵奠此諸侯相於既疏故無奠嚴陵方氏曰乗馬曰賵衣衾曰襚具玉曰含錢財曰賻此言賵禮故陳乗黄大路於中庭山隂陸氏曰犬馬不上於堂故執圭將命小行人圭以馬䘮事君言相大夫士言擯亦言之法正言大路舉重以該之盖二王之後歟所謂乗黄亦如此客使牽馬者也自下自路下西之前聘禮所謂牽馬者自前西乃出是也商拜而後稽顙周稽顙而後拜今拜稽顙拜其臣故也即拜其君宜稽顙而後拜稽首首至地而遲也頓首首至地而頓也空首首不至地凡此三拜以兩手承之所謂拜手稽首是也若今吉拜也吉拜拜而後稽顙凶拜稽顙而後拜振動若今叩頭矣春秋𫝊曰再拜稽顙肅拜若今婦人拜是歟春秋𫝊曰敢肅使者嫌於不敬故謂之肅竒拜一拜也孔子拜為火來者士一大夫再士貶於大夫一拜則凡再拜襃矣襃讀如字言坐委於殯東不言圭尊圭也下放此凡將命鄉殯將命子拜稽顙西面而坐委之宰舉璧與圭宰夫舉禭升自西階西面坐取之降自西階賵者出反位于門外鄭氏曰凡者説不見者也鄉殯將命則將命時立於殯之西南宰夫宰之佐也此言宰舉璧與圭則上宰夫朝服衍夫字賵者出乃言反位門外眀禮畢將更有事孔氏曰此一經緫眀從上以來弔含禭及賵文不見者鄉殯謂在殯之西南東北面將命既畢子拜稽顙之後將命者來就殯東西面而坐委之宰舉璧與圭者主人上卿坐舉含者之璧與賵者之圭宰夫舉襚謂宰之属官舉此禭者之衣宰與宰夫欲舉時升自西階不敢當主孤之位來鄉殯東席之東西鄉坐取之降自西階也山隂陸氏曰此弔儀也始云寡君使某弔矣而曰寡君使某含寡君使某禭寡君使某賵又曰寡君有宗廟之事不得承事使一介老某相執紼則弔臨含相賵皆相將贈賻亦應爾而今不録不與録也故曰玩好曰贈貨財曰賻上客臨曰寡君有宗廟之事不得承事使一介老某相執綍相者反命曰孤某湏矣臨者入門右介者皆從之立於其左東上宗人納賔升受命于君降曰孤敢辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賔客敢辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賔客敢固辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命使臣某毋敢視賔客是以敢固辭固辭不獲命敢不敬從客立于門西介立于其左東上孤降自阼階拜之升哭與客拾踊三客出送于門外拜稽顙鄭氏曰上客弔者也臨視也言欲入視䘮所不足而給助之謙也其實為哭耳臨者入門右不自同於賔客賔三辭而稱使臣為㳟也為㳟者將從其命孤降自阼階拜之拜客謝其厚意不迎而送䘮無接賔之禮孔氏曰此一節眀弔含襚賵既畢上客行臨哭之禮使一介老某相執綍者某者上客名也相助也謙言助主人執其𦵏綍其實為哭而來耳一介言唯有一人為介謙辭耳其實介數各下其君二等臨者不敢自同賔故入門右從臣位也宗人納賔升受命于君者主國宗人掌禮欲納此弔賔先受納賔之命於主國嗣君降曰請復位者宗人下阼階請客復門西客位也反命者反此客之辭命於嗣君也曰孤敢固辭者是宗人受嗣君之命以告客前文云孤某此直云孤不云某者客是使臣不復稱名也前四禮客皆在門西此臨在門東者前是奉君命而行此是私禮若聘禮私覿故在門東山隂陸氏曰臨應親至故其詞如此據寡君使某弔使某含使某禭使某賵不云不得承事其遣上客亦以此賵稱上介亞於此歟若陳乗黄大路於中庭盖亦重禮也言執紼容外客臨有葬而至者也含不及歛不及事矣襚不及殯不及事矣賵不及𦵏不及事矣雖然猶愈乎否賔升受命于君變子稱君容外客臨有不及事既葬與踰年而後至也公羊𫝊曰君薨稱子某既葬稱子踰年稱公其曰孤降自阼階則子踰年可知孤不名亦以此曲禮曰居䘮之禮升降不由阼階其國有君䘮不敢受弔鄭氏曰辟其痛傷己之親如君孔氏曰此謂國有君䘮而臣又有親䘮則不敢受他國賔來弔也以義㫁恩哀痛主於君不私於親山隂陸氏曰言諸侯有天子之䘮雖有親䘮不敢受弔諸侯如此則其臣有諸侯之䘮盖亦如此設若衛靈公弔季康子而康子有君之䘮應辭外宗房中南面小臣鋪席商祝鋪絞紟衾士盥于盤北舉遷尸于歛上卒歛宰告子馮之踊夫人東面坐馮之興踊鄭氏曰此䘮大記脫字重著於是孔氏曰大記云夫人東面亦如之此云夫人東面坐馮興踊唯四字别義皆同也嚴陵方氏曰此一節冝承公襲申加大帶於上之下脱亂在是案䘮大記曰夫人東面亦如之此云坐馮之興踊盖非脱字重著士䘮有與天子同者三其終夜燎及乗人専道而行鄭氏曰乗人謂使人執引也専道人辟也孔氏曰柩遷之夜湏光眀故竟夜燎也乗人謂人引車不用馬也既夕禮云属引専道謂䘮在路不辟人也三事為重故與天子同禮記集説卷一百二
