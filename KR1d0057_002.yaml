body:
  text: 禮記集説卷二宋衛湜撰禮不妄説人不辭費禮不踰節不侵侮不好狎鄭氏曰不妄説人為近佞媚也君子説之不以其道則不説也辭費為傷信君子先行其言而後從之好狎為傷敬孔氏曰禮動不虛若説人之德則爵之問人之寒則衣之若無爵無衣則為妄説為人當言行相副有言無行為辭費禮者所以辨尊卑别等級使上不逼下下不僭上故云禮不踰越節度也不侵侮者禮主於敬自卑而尊人故戒之不得侵犯侮慢於人也賢者當狎而敬之若直近而習之不加於敬則是好狎藍田吕氏曰妄説人者説之不以道也辭費者情不直也踰節則長幼貴賤親疏亂矣啓侵之道也好狎則親昵慢易之心生矣啓侮之道也儉者自約而不侵人恭者自下而不侮人故君子之恭儉不侵侮於人人無侵侮之者所謂我不欲人之加諸我豫亦欲無加諸人也三者不除則行不修長樂劉氏曰五常之道同本乎性待禮然後著而不可挾之以七情也挾之以情者則是以禮妄説於人也辭費而輕義也踰節以縱欲也侵侮以慢人也狎玩以喪德也情作於心斯賊其性五常之道由之以亡則禮失其本枝葉曷從而生永嘉周氏曰禮者正而已矣妄説人非正也辭費非正也何也今人之所以妄説人者不有求於人必欲逭己責也人之所以辭費者不有矜己能必欲辭已過也君子無求而安於命不矜而過必改説以其道者正説也辭取其達者正辭也禮者分而已矣居下而犯上則踰上之節不知下之分也居上而逼下則踰下之節不知上之分也侵侮者失人不知人之分也好狎者失己不知己之分也君子明禮而知分故居上不驕為下不亂與人不爭處己必敬其所以作事可法容止可觀而為萬夫之望者也廬陵胡氏曰禮不妄説人惡容説也不辭費禮雖不可輕費妄用亦不可以煩費為辭貴於合禮説文云辭不受也新安朱氏曰禮有常度不為佞媚以求説於人也不辭費辭達則止不貴於多不好狎狎謂親褻毛氏信卿曰禮不能不説人特不妄説耳禮不能無辭但不費辭耳説之以道何惡於説辭達而已何惡於辭石林葉氏曰説人不以其道則其言多而煩也故不妄説人則無辭費處非其分則終必至於凌物也故不踰節則無狎侮於人無狎侮於人故能修身無辭費故能踐言踐言而行之則行可久言可道此禮之本所以立也金華應氏曰不妄説人不辭費所以養其正大簡易之心也不踰節所以致其審謹密察之功也不侵侮不好狎所以持其莊敬純實之誠也馬氏曰辭者達意而己非君子之所尚也費則過辭而傷於信矣禮所以有節者以其不敢過也故喪非不能極隆而終於三年者為其不敢過哀也一獻之禮賔主百拜終日飲酒而不得醉者為其不敢過樂也凡為此者皆所以不踰節金華邵氏曰禮所以防人之情妄以説人則與情俱靡矣禮不可以菲廢有費而辭則以菲廢禮矣東坡曰用器之為便而祭器之為貴褻衣之為便而衮冕之為貴哀欲其速而伸之三年樂欲其不已而不得終日此不妄説人之謂也或貴於多而大或貴於髙而文庭實旅百之儀四海九州之薦此不辭費之謂舊説以為不費於言辭豈經意乎踰節不已則至於僭上逼下侵侮不已則至於紛爭鬬辨好狎不已則至褻瀆慢忽禮皆在所禁焉永嘉戴氏曰孟子曰禮之實節文斯二者禮者節文之謂也故禮亦謂之節猶規矩防間不可越也書曰德盛不狎侮故狎侮人者皆德薄者也數侵侮人而好與人狎不特失人必且失己其為無禮也大矣修身踐言謂之善行行修言道禮之質也鄭氏曰踐履也言履而行之言道言合於道質猶本也禮為之文飾耳孔氏曰凡為禮之法皆以忠信仁義為本禮以為文飾行修者忠信之行修言道者言合於仁義之道則可與禮為本也藍田吕氏曰君子之善行以修身踐言為之本其行禮也以行修言道為之本以是為質則所見於外者皆文也長樂劉氏曰敬用乎五事所以修身也允蹈乎五常所以踐言也是禮有其本可謂善行矣行以此修則言協於道禮之體質於是成矣永嘉周氏曰人不可以不為善也雖小善而必為然後能為大善舜之所以為舜者以其樂取諸人以為善聞一善言見一善行從之莫能禦也然則如之何斯可以為善矣曰修身也踐言也修身者必敬踐言者必忠忠與敬者為善之大端入德之要也故謂之善行行篤敬則行修矣言忠信則言道矣故曰義以為質禮以行之又曰忠信之人可以學禮此行修言道所以為禮之質也苟無其質雖習於曲禮威儀之多君子不謂之知禮金華應氏曰曲禮三千以敬為首然容貌辭氣雖持敬之所先而修身踐言謂之善行尤為禮之所本故自安民而下歷陳夫長敖從欲志滿樂極之戒與夫事賢交衆持已接物之道凡皆所以修身善行而不欲從事於空言焉是所以為禮之質也不反之於質而徒區區於繁文末節之間亦外焉而已嚴陵方氏曰禮之文則見乎事禮之質則存乎人言行存乎人者也故曰禮之質也樂記又以中正無邪為禮之質者蓋惟行修言道乃能中正無邪曲禮言其始樂記言其終所以為質則一也禮聞取於人不聞取人禮聞來學不聞往教鄭氏曰謂君人者取於人謂髙尚其道取人謂制服其身來學不往教尊道藝橫渠張氏曰行修言道則當為人取不務狗物強施以引取乎人故往教妄説皆取人之弊也藍田吕氏曰禮聞取於人不聞取人學者之道也禮聞來學不聞往教教者之道也取猶致也致於人者我為人所致而教之在教者言之則來學者也取人者我致人以教已在教者言之則往教者也猶言勞心者治人乃我治其人勞力者治於人乃我為人所治也師嚴然後道尊道尊然後民知敬學致人以教己非誠有志於學也學而非誠則教亦無益此其所以不可也古者友不可以有挾也況於師乎雖天子不召師況於學者乎永嘉周氏曰君子有財以給天下之求有道以應天下之問其心必欲無一夫之不獲其所而天下之人皆至於道聖人在上則行其道聖人在下則懷其志故堯舜所以猶病於博施濟衆而孔子乃於其老者安之朋友信之少者懷之此豈取人而往教所得周哉蓋取人則失已往教則枉道聖人中道而立使天下之人皆得取於我而來學以求正焉則己立而給不匱道大而應無方然後天下之人皆得與被其澤長樂陳氏曰禮聞取於人不聞取人所以勉其學者禮聞來學不聞往教所以戒其教者馬氏曰夫規矩準繩之所以為平者謂夫物以為揆而不揆乎物也君子正己為法於後世亦猶規矩準繩而已故曰天下有道以道徇身天下無道以身徇道未聞以道徇乎人也取人而不取於人則所謂狗乎人者也孟子曰為其多聞也則天子不召師而況諸侯乎君子所以不往教者非矜奮以自髙也其禮然也廬陵胡氏曰取於人以身下人也舜取於人以為善是也取人謂屈人從已齊王欲見孟子而使之朝是也禮聞來學不聞往教漢孫寶答張忠云君男欲學文而移寶自近禮有來學義無往教道不可詘是也新安朱氏曰此雖兩節其實互明一事也取於人者童蒙求我朋自逺來也取人者好為人師我求童蒙也禮有取於人所以彼有來學無取人所以我無往教也永嘉戴氏曰夫取者非取諸人為善之取蓋可以取可以無取之意也夫物所以將禮因物之不至而失禮者有之故行禮者使人取於我不當使我取於人禮雖自卑而尊人然師嚴然後道尊道尊然後民知敬學故學者當致敬盡禮潔己以求進毋寧教者卑辭悅色俯首以求售其説也禮不聞往教在己者若過髙不聞取人在己者無所利故禮之所以為可貴也王氏子墨曰取於人不聞取人為有餘者言也聞來學不聞往教為不足者言也道者天下之所共而欲為君子者人心所同有餘者教人不足者求教於人此亦理之當然者也有餘者不以與人是以道自私而不與天下同為君子也不足者不肯尊師是自逺於道而不以君子待其身也二者之失宜若不足者之所急而非有餘者之患然使己為君子而使衆人不與焉其用心果安在哉亦有道所不取也道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定鄭氏曰分辨皆别也藍田吕氏曰道德仁義所以成已也教訓正俗所以成人也分爭辨訟所以決疑事也君臣上下父子兄弟所以正大倫也皆有待於禮者也兼天下而體之之謂仁理之所當然之謂義由仁義而之焉之謂道有仁義於己之謂德節文乎仁義之謂禮仁義道德皆其性之所固有本於是而行之雖不中不逺矣然無節無文則過與不及害之以至於道之不明且不行此所以非禮不成也先王制禮教民之中而已教不本於禮則設之不當設之不當則所以教者不備矣教訓正俗其義皆教也立教之謂教訓説理義之謂訓皆所以正風俗之不正故曰非禮不備也理有可否則爭情有曲直則訟惟禮為能決之蓋分爭者合於禮則可不合於禮則不可辨訟者有禮則直無禮則不直故曰非禮不決君臣上下父子兄弟人之大倫由禮而後定也故冠昏喪祭射鄉朝聘所以明者人倫而已故曰非禮不定長樂劉氏曰古者聖王用其中以建天下之中者未始不由於道者也故仁也義也知也信也雖有其理而無定形附於行事而後著者也惟禮也同出於中同根於性而事為之物物為之名有數有度有文有質或吉或凶或軍或賔或嘉咸有等降上下之制以載乎五常之道適於民心致其中和者也然則五常之道同本乎性待禮之行然後四者附之以為著此禮之所以為大而百行資之以成其德焉其能配天地動鬼神厚人倫成教化也不亦宜乎石林葉氏曰道德有禮所以體之仁義有禮所以節之禮自其末推及於其本則始於道德自其顯推至於其幽則終於鬼神四明沈氏曰道德仁義混然無偏倚之謂成楊墨之仁義去道德而言之也老子之道德去仁義而言之也二者皆有弊以執一偏不知禮也道德仁義理一而名二體同而用殊各行於其所當行而不偏於一曲非禮不能也馬氏曰周之盛時民之祭祀喪紀冠昏飲射皆董於鄉閭之史動作起居無一日而不在於禮此教訓正俗所以待禮而備也原父子之親立君臣之義意論輕重之序慎測淺深之量此分爭辨訟所以待禮而決也君臣上下主於義而不可以無分無分則夷而終於亂父子兄弟出於恩而不可以無敬無敬則瀆而至於離此君臣上下父子兄弟所以待禮而定也永嘉戴氏曰學者始乎禮成乎禮何也五常之道惟禮有所據依不假事而見故學者當以執禮為先執禮則存敬存敬則非僻之心不入由是而之焉可與為善矣風俗不易正也將欲教訓而整齊之非刑政所能及也使天下各安其分則風俗正矣備之為言無一不順之謂也伯夷降典折民惟刑典禮者折獄之道也獄之所以不決者由其無以服人心也決爭訟而一於禮則人心服矣其功可至於無訟君臣上下父子兄弟雖有自然之分然輕重厚薄必定於禮此禮之功所以與天地並也王氏子墨曰夫禮者所以節文乎仁義者也仁義之實始於人心惻隱羞惡之間赤子愛親敬兄之際本與生俱生之物率而行之固無非道存而有之固無非德然人之得於天者不能無厚薄昏明之小異苟無禮以節文之則或過或不及將有發而不中節者不足以為仁義道德之至矣故曰道德仁義非禮不成授人以己之所知所能之謂教訓説義理使人之昭明之謂訓君子之教訓凡以正俗也俗之不正自夫民情之無節喜怒哀樂之縱恣視聽言動之無所防制者始惟有禮以節之則邪止於未形而百善自此生百不善自此熄教訓之要具足於禮無有餘事故曰教訓正俗非禮不備凡人意氣相凌而不相下則有爭有訟爭訟者起於人之不能各以禮自持也今欲分其爭辨其訟亦在乎斷之以禮而已禮一明而曲直之情判故曰分爭辨訟非禮不決自天地定位而君臣上下父子兄弟之大倫已存於其間而生民之初巢居穴處未有宫室棟宇之制衣鳥獸之皮未有冠冕服章之文茹毛飲血未有簠簋籩豆之數林然羣居未有拜起坐立之節聖人因其自然之分制為尊卑貴賤長幼之禮寓於宫室衣服飲食拜起坐立之間以正君臣以辨上下以别父子以序兄弟於是人之大倫始昭然明白而不可亂故曰君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊鄭氏曰宦仕也班次也涖臨也莊敬也孔氏曰左傳宣二年趙盾見靈輒餓問之云宦三年矣服虔云宦學也是學職事為官也朝朝廷也次謂司士正朝儀之位次也治軍謂師旅卒伍各正其部分也涖官謂卿大夫士各有職掌行法謂司寇士師明刑法皆用禮威嚴乃行周禮都宗人禱祠鄭注云祠謂報賽又小宗伯注云求福曰禱得求曰祠案熊氏曰宦謂學仕宦之事學謂習學六藝此二者俱是事師非禮不親祭祀者國家常禮牲幣之屬以供給鬼神惟有禮乃能誠敬藍田吕氏曰宦學事師學者之事也班朝治軍涖官行法仕者之事也禱祠祭祀供給鬼神交神明之事也皆有待於禮者也宦家臣也雜記云宦於大夫者之為之服也蓋仕為家臣而未升諸公蓋亦學為仕者也故宦者學為仕之稱也學者學道藝者也二者之學皆有師師弟子之分不正則學之意不誠學之意不誠則師弟子之情不親而教不行故曰非禮不親班朝者正朝位也治軍者齊軍政也涖官行法者臨官府以行法令也三者皆仕者所以治衆也禮明乎尊卑上下之别則分無不守令無不從此所以非禮威嚴不行也禱祠祭祀則郊社宗廟之常祀也內則盡志外則盡物所以供給鬼神鬼神無常享享於克誠禮者敬而已無敬則不誠故曰非禮不誠不莊東萊吕氏曰此通前假只是一禮字孝經只是一孝字凡事皆歸之孝此類須參求其所以然李氏曰於宦學事師也有以治其內故曰非禮不親於班朝治軍涖官行法也有以治其外故曰非禮威嚴不行於禱祠則禮者所以成內而成外也故曰非禮不誠不莊永嘉戴氏曰夫禮主於分分主於嚴疑非所以為親也然粲然有文以相接而情意交通乃其所以為親也狎則不敬不敬則乖戾隨之矣故曰非禮不親夫厲威嚴以服人者在法令法令不從則在刑戮今而曰班朝治軍涖官行法非禮威嚴不行何也夫人之所以畏者非死也惟有以回復其心使人知自畏而已矣上下嚴整肅然皆有敬心故雖董之以文辭而人知懼上下偷惰傲然皆有慢心雖刀鋸鼎鑊人何畏焉漢儀略就禁止喧譁晉軍有禮戰勝可用其粗者猶且若是而況斯民瞻其顔色望其容貌而敢生慢易者乎禱祠祭祀謂行禮之時也供給鬼神謂祭祀之物也是以君子恭敬撙節退讓以明禮鄭氏曰撙猶趨也孔氏曰君子有德有爵者之通稱王肅云君上位子下民何胤云在貌為恭在心為敬節法度也言恆趨於法度應進而遷曰退應受而推曰讓自道德仁義以下皆須禮以成故君子之身行恭敬趨法度及退讓之事以明禮也橫渠張氏曰恭敬撙節退讓以明禮仁之至也愛道之極也藍田吕氏曰禮者敬而已矣君子恭敬所以明禮之實也禮節文乎仁義者也君子撙節所以明禮之文也辭遜之心禮之端也君子退遜所以明禮之用也東萊吕氏曰恭敬撙節退讓以明禮字字親切指示須當留意馬氏曰禮者即事之治也有其事必有其治君子知禮不可一日而廢也故恭敬撙節退讓以明禮之義使天下之人曉然知禮之意循而行之蓋禮之不明道之不行常出於在上者太髙而不中雖善而無徴故東晉之士以為禮不為君子設遂放棄而不用指法度為拘俗之士然則禮何由而明道何由而行哉廬陵胡氏曰鄭氏云撙趨也有自抑之意柳公綽撙節用度禇無量云撙奢靡王氏子墨曰自道德仁義以下皆不可無禮故君子之道明禮為先而禮之大本有三一曰敬一念之頃無不敬也二曰節品節之使之中節也三曰遜自卑而尊人也禮之苟明則內之修身外之治人幽之交神明者無不得其當而天下以治君民以安禮之不明則內之修身外之治人幽之交於神明者無不失其當而天下以亂君臣以危故曰有禮則安無禮則危鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎夫唯禽獸無禮故父子聚麀是故聖人作為禮以教人使人以有禮知自别於禽獸鄭氏曰聚猶共也鹿牝曰麀孔氏曰山海經云猩猩人面豕身能言語爾雅云二足而羽謂之禽四足而毛謂之獸鸚鵡是羽曰禽猩猩四足而毛本獸今云禽獸者凡語有通别别而言之羽則曰禽毛則曰獸通而為説鳥不可曰獸獸亦可曰禽故易曰王用三驅失前禽則驅走者亦曰禽周禮司馬職云大獸公之小禽私之則禽未必皆鳥也又周禮以禽作六摯卿羔大夫鴈白虎通云禽者鳥獸之總名以此諸經證禽名通獸者以小獸可擒故得通名禽也藍田吕氏曰人之血氣嗜欲視聽食息與禽獸異者幾希特禽獸之言與人異耳然猩猩鸚鵡亦或能之是則所以貴於萬物者蓋有理義存焉聖人因理義之同然而制為之禮然後父子有親君臣有義男女有别人道所以立而與天地參也縱欲怠敖滅天理而窮人欲將與馬牛犬彘之無辨是果於自棄而不欲齒於人類者乎長樂陳氏曰禽獸有知而無義有知故能言無義故未嘗有禮人則有知有義有知而無義不亦禽獸之心乎樂記曰作為鞉鼓椌楬則作者為之始為者作之繼也聖人作為禮以教人使之行修言道其大有以同天地之節其極有以合天地之化豈特使自别於禽獸哉然則自别於禽獸者衆人而已於明禮言君子於為禮言聖人與作者之謂聖述者之謂明同意馬氏曰孟子曰人之所以異於禽獸者幾希庶民去之君子存之夫人於禽獸其肖象性識固有間矣而曰幾希者在去存之間爾故曰飽食暖衣逸居而無教則近於禽獸此聖人所以作為禮以教人使知獨貴於萬物而不失其良心也永嘉戴氏曰孟子曰人之所以異於禽獸者幾希幾希之際甚可畏也夫人為物最靈聖人待人至重也而聖賢之論至曰與禽獸奚擇焉甚者至以為禽獸之不如也詩曰相鼠有體人而無禮人而無禮胡不遄死聖賢之論迫矣學者可不知自畏邪民生之初其與禽獸等耳及其自知貴重自别異於禽獸者蓋聖人制禮之功也不然則與庶類同一嗜欲而已同一鬭爭而已夫篤厚以崇禮其功至於參天地育萬物禮之不行其禍乃至於與禽獸並善惡相絶如此學者兢兢自持猶懼不免而況肆然無忌憚乎新安朱氏曰陸農師點聖人作是一句為禮以教人是一句太上貴德其次務施報禮尚往來往而不來非禮也來而不往亦非禮也鄭氏曰太上帝皇之世其民施而不惟報其次三王之世禮始興焉孔氏曰自此至不懾一節明世變道殊所貴有異雖負販者必須有禮皇是三皇帝是五帝不云皇帝者鄭恐是一事不分故升帝於皇上禮運注亦謂大道行為五帝時其時猶淳厚不尚往來之禮所貴者在於有德德主務施但施而不希其反也三王之世施則望報務猶事也以為常事故其禮主尚往來藍田吕氏曰太上者大道之行天下為公之時也其治也文不勝質務存其實直情徑行無所事於禮故禮有不答而人不非也後聖有作通其變使民不倦由是交際之道興焉長樂劉氏曰太上者至極之稱猶言大備全德之人也全德之人自得而已奪之不以為損豫之不以為益愛之不自以為仁利之不自以為義所謂不知有之者也其次奪之知損豫之知益愛之為仁利之為義所謂親之譽之者也故施則必報是以不可無禮也自禮記左氏老子凡所言太上者皆若此繫其人不繫其時馬氏曰禮之設所以緣人情也故曰報者天下之利也又曰禮得其報則樂聖人因人情之所樂制為往來之禮所以使天下之人亹亹而不倦也夫獻而必有酬酬而必有酢此往來之禮見於燕飲也主人出迎則客固辭客就東階則主人固辭此往來之禮見於際接也服之三年者其報必期服之期者報亦如之此往來之禮見於喪紀也其往而不來來而不往則禮失其報而為禮者有時而怠矣王氏子墨曰貴德之世人以德為當然而不知其為德故恩怨之心不生相與羣於天地間者蓋淡如也何其至哉逮夫後世人知為德而出於有心故以施報為美事一往一來禮之所在宜不能忘懷也及其衰則情文之繁而忠信之薄廉於責己而重於責人一拜一言之不酬而怨有不可弭者甚者且施於君臣之際而以國士衆人二其心又甚則父子之間一借耰鋤而慮有德色其不可解於心者且若是況相望於等夷之人乎蓋嘗謂禮之本意使人恩怨之心可銷而太上之風可還也魚以泉涸而相與處於陸相濡以沫相噓以濕曾不若相忘於江湖夫處緩急而知相噓濡亦可謂有情矣然有一不以濕沫相沾丐雖不能言其中獨無憾乎處江湖而相忘處陸則相濡噓夫豈不善要不若江湖之無事故與其有恩怨之心而為世俗之紛紛孰若姑務自盡而求如太上之相忘哉明乎此則知所謂施報者禮也向之所謂貴德者亦禮也尚安有衰世之事山隂陸氏曰施報者往來之情往來者施報之迹方其仁義之施報則存乎情及禮之往來則見乎迹永嘉戴氏曰昔人有厭世多事而為之説曰民至老死不相往來嗟夫使民不相往來相忘於無事豈不大善而人情決無不相往來之理凡人之情近而不相得則凶或害之既悔且吝故逺近相取而悔吝生情偽相感而利害生聖人有憂之以為上古之時其民施而不望報中古之時有施斯有報矣施而不報禍之所由起也於是制禮以文之使民知有往來柔伏天下好爭之心於跪拜俯伏辭遜唯諾之間人不知其為功也聖人制禮之意固為夫多事者設也而曰禮所以為多事是亦不察於制禮之本矣以此坊民猶有一言之不酬一拜之不答而兩國為之暴骨者況絶滅禮樂置天下於無事乎一日無禮天下之事始不勝其繁矣人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而況富貴乎富貴而知好禮則不驕不淫貧賤而知好禮則志不懾鄭氏曰負販者尤輕恌志利宜若無禮然懾猶怯惑孔氏曰貧者好怯惑畏人使心志不遂知禮者則持禮而行之故志不懾怯橫渠張氏曰學禮學者之盡也未有不須禮以成者也學之大於此終身焉雖德性亦待此而長惟禮乃是實事舍此皆悠悠聖庸共由此途成聖人不越乎禮進庸人莫切乎禮是透上透下之事也東萊吕氏曰人有禮則安無禮則危古人見得分明如此藍田吕氏曰人生於天地之間其強足以凌弱其衆足以暴寡然其羣而不亂或守死而不變者畏禮而不敢犯也人君居百姓之上惟所令而莫之違者恃禮以為治也一人有禮衆思敬之有不安乎一人無禮衆思伐之有不危乎此所以繫人之安危而不可不學者富貴者人之所共敬者也貧賤者人之所共慢者也禮者自卑而尊人雖負販之至賤猶不敢慢而必有所尊況人之所共敬者乎古之君子不侮鰥寡不畏強禦苟無禮以節於內則外物之輕重足以移其常心矣故富貴者知其所當敬則不驕不淫貧賤者知其所自敬則志不懾永嘉戴氏曰安危之機生死之本也有禮則安安則生矣無禮則危危不足言也死將至矣聖人制禮之意所以生斯人也一日無禮則民有不得其死者矣禮以卑為主以恭為本有自是之心者不可以語禮有自大之心者不能以行禮故禮者所以柔伏其侈大之意而習為退遜謙下之道故有禮之人其容肅然以正其氣粹然以和望其顔色而知其人之可親也其容狠其氣暴望其顔色而生慢易之心者必其無禮之人也富貴之失禮以驕貧賤之失禮以諂驕者失於亢諂者失於卑其為失禮一也馬氏曰孟子曰城郭不完兵甲不多非國之災田野不闢貨財不聚非國之害上無禮下無學賊民興喪無日矣常人之所先而聖人以為後衆人之所緩而智者以為急蓋知治亂之原而審乎安危之數也孔子曰人之生也直罔之生也幸而免無禮者所謂幸而免也先王之禮如此其急其可以不學乎禮之自卑而尊人者所以息暴亂之禍止邪於未形者也負販者庶人之賤禮之所略者也王道之行猶知有尊尊長長之義況富貴禮之所自出其可以不知禮乎夫富貴之所以驕淫貧賤之所以懾怯者以內無素定之分而與物為輕重也好禮則有得於內而在外者莫能奪矣嚴陵方氏曰易曰知崇禮卑崇效天卑法地而禮以地制故自卑而尊人也負者惟以力為事販者惟以利為事以力為事者猶有所尊而況所當好德者乎以利為事者猶有所尊而況所當貴義者乎富貴之人則所當貴義而好德也富貴則易亢而失於驕淫貧賤則易折而失於志懾富貴而知好禮則不驕不淫者以禮能有所節故也貧賤而知好禮則志不懾者以禮能有所立故也廣安遊氏曰禮有屈有伸不専主於自卑然禮之行所謂謙也讓也恭也和也如此之類皆本於自卑而後能成則夫禮者要本於自卑而為主君子之為善必役於善而後可故恭儉所以求役於仁信讓自卑者所以求役於禮古之君子其志於善剛果自力蓋如此也詩曰湯降不遲聖敬日躋君子為善有降焉有躋焉方其始也自屈降以求役於善及其久也其見益明其道益尊所謂躋也世之小人剛強頑悍不肯自屈於人不肯自役於善終歸於愚人而已鄭説負販者輕恌志利宜若無禮此説非也堯舜三代之世斑白者不負戴於道路則夫負販者亦皆孝弟之人非若後世負販者之鄙暴也所謂負販之人當勞役之際宜若簡於禮而從其所安今也猶必有所尊焉長者先而少者後老者輕而壯者重若此者所謂必有尊也負販於道途猶爾況雍容於廟堂之上而不為禮哉故夫富貴之人則可以行禮之人也富貴之地則可以為禮之地也若樂於傲樂於縱樂於自尊則負販之不若矣王氏子墨曰夫負販者豈素學禮者知有所尊則禮非人性所有而人情之所安者乎在易之大壯曰君子以非禮弗履夫人而有禮其何壯如之故在貧賤則不懾在富貴則不驕不淫而物所不能屈也貧賤富貴本無二事以為貧賤則志必懾以為富貴則必驕必淫是惑於人欲而不知天理之所在故也好禮則在我者皆天理耳又孰為貧賤富貴也哉古之聖賢所以處窮達得喪之際優遊間暇一無足以動其心者蓋由其所好如此故曰人莫不飲食也鮮能知味也世未有知味而不好者人生十年曰幼學二十曰弱冠三十曰壯有室四十曰強而仕五十曰艾服官政六十曰耆指使七十曰老而傳八十九十曰耄七年曰悼悼與耄雖有罪不加刑焉百年曰期頤鄭氏曰名曰幼時始可學也內則曰十年出就外傅居宿於外學書計有室有妻也妻稱室艾老也指使指事使人也六十不與服戎不親學老而傳謂傳家事任子孫是謂宗子之父耄惛忘也春秋傳曰老將知耄及之悼憐愛也愛幼而尊老故不加刑期猶要也頤養也不知衣服食味孝子要盡養道而已孔氏曰自此至以其制為一節明人幼而從學至於成德終始之行皆遵禮制冠禮云棄爾幼志是十九以前為幼二十成人雖加冠體猶未壯故曰弱至二十九通名弱冠三十而立血氣已定故曰壯也妻居室中故呼妻為室不云妻而云室者含妾媵事類為廣白虎通云男三十筋骨堅強任為人父女二十肌膚充盛任為人母合為五十應大衍之數生萬物也三十九以前通曰壯壯久則強故四十曰強強有二義一則四十不惑是智慮強二則氣力強也四十九以前通曰強年至五十血氣已衰髮蒼白色如艾也五十是知天命之年堪為大夫服事也大夫得専事其官政六十至老之境不得執事但指事使人也七十其老已全則傳徙家事付委子孫鄭謂宗子父者以經言傳者上受父祖之事下傳子孫子孫之所傳家事祭事為重若非宗子無由傳之但七十之時祭祀猶親為之其視濯概則子孫若至八十祭亦不為故王制云齊喪之事不及也庶子乃授家事於子非相傳之事故鄭知非庶子也耄者僻謬也人或八十而耄或九十而耄故並言二時也幼未有識慮則可憐愛老已耄則可尊敬雖有罪而同不加其刑辟也周禮司刺有三赦一曰幼弱二曰老耄三曰蠢愚百嵗則人子當用心求親之意而盡養道也河南程氏曰古之生子能食能言而教之大學之法以豫為先人之幼也知思未有所主便當以格言至論日陳於前雖未曉知且當薰聒盈耳充腹久自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長私意偏好生於內衆口辨言鑠於外欲其純完不可得也藍田吕氏曰此章備舉自幼至老每十年一變之節也未十年非不學也能食教以右手能言教以唯俞六年教數與方名七年教之男女之别八年教之長幼之序九年教之數日然未就外傅但因事而教之未足以名之學至十年可以從弟子之職出就外傅乃所謂學也二十始成人則可以勝衣冠故命之以冠既冠始學禮猶以其弱而未可用也故博學不教內而不出三十曰壯血氣定矣故可以有室孟子曰丈夫生而願為之有室女子生而願為之有家故室家者夫婦之稱也其壯雖可以給政役其材猶未足以備任用故博學無方孫友視志而已四十曰強強則材成矣材成者志慮定則謀事審氣力完則任事果始可為士以事人也其謀事審矣故可以出謀發慮其任事果矣故道合則服從不可則退至五十養於其心者已熟閲於義理者已多可謂成德更事之人矣故可以命為大夫也古者四十始命之仕五十始命之服官政仕者為士以事人治官府之小事者也服官政者為大夫以長人與聞邦國之大事者也材可用則使之仕德成則命為大夫非無蚤成夙知之才也蓋養天下之才至於成就而後用則收功博如不待其成而用之所謂賊夫人之子以政學者也害莫大焉六十曰耆耆者稽久之稱詩云耆定爾功又曰上帝耆之稽久則將入於老故六十稱耆筋力既衰不足以任勞事可以使人而不可以使於人也故六十不與服戎不可以從司馬之政也不親學不可以執弟子之職也七十則筋力倦矣聰明衰矣外則致王事於君內則傳家事於子不可與事者也耄者老而知己衰悼者幼而知未及二者雖有罪而情不出於故故不加刑焉百年者飲食居處動作無所不待於養嚴陵方氏曰數起於一止於十天地竒耦之數隂陽生成之理每至於是則必更焉人也者受天地之形孕隂陽之氣者也孰能逃其數而逆其理哉故其生每於十年則必異其名至其時則必異其事也若幼與弱之類則名之異矣若學與冠之類則事之異矣幼者壯之對弱者強之對耆與耄皆老也而止以七十為老蓋耆雖向乎老而未足以老名之也耄則過乎老而老不足以名之矣期頤者蓋人生以百年為期由是而上則過乎人之所期矣由是而下則不及人之所期矣故必百年以期名之人之所期者終於此而已則養生之道可以不盡之乎故為頤之時頤者養也馬氏曰自幼弱壯強至於艾者言血氣智慮之變也自耆老至於耄期者言齒之逾久也自學至於傳者言其事也蓋人血氣智慮率十年而加益血氣智慮既加益矣則所學者宜愈深所任者宜愈大故仲尼十五而志於學以至七十而從心亦十年而進蓋成德之序也詩曰雖無老成人尚有典刑書曰人惟求舊器非求舊惟新古之君子所以求舊臣而貴老成者以其德備而多聞也艾之為物久而後可以療疾五十曰艾者以其舊德可以為大夫服官政而治人也自幼學而至五十道固已具矣加之十年則可以為大臣矣中庸曰官盛任使所以勸大臣周之冢宰卿一人而下中大夫上中下士之屬可謂盛任使矣蓋惟大臣可以指事使人齒至於耆則可以為大臣矣夫勞我以生佚我以老天之道也君子之仕至於七十可以致仕而傳於人矣學至於此其遺言餘行可以為法而傳於後世矣故曰老而傳自耄至於期老之極無預於事矣飲食不離寢膳飲從於遊所以致養也然而三十而有室非必三十而後娶以昏姻之期不可過是過是則為失時四十而仕非必四十而後仕以學而至於四十足以仕矣不足以仕則為不學傳曰貴老為其近於親慈幼為其近於子悼耄之不加刑者此也永嘉戴氏曰聖人制禮以律天下以節人心使人血氣充實志意堅強壯者服其勞老者安其逸未用者無躁進之心當退者無不知足之戒每十年為一節而人心有定嚮矣二十血氣猶未定然趨向善惡判於此矣故責以成人之禮焉三十有室不至於過而失節亦不至於曠而失時此古人所以筋力之盛夀命之長也四十志氣堅定強立不反不奪於利害不怵於禍福可以出仕矣自此以往三十年宣勞於國非若後世強者有時不用少與老者並用至於怠惰廢弛而莫之能振也人至於五十更歷世變諳知人情亦既熟矣艾之為言有老練精緻之意焉若此而服官政則明習故事詳審和緩不至於擾民生事矣年至六十幾於老矣耆之為言有老成可敬之意於斯時也有指畫之勞而無奔走服事之役七十謂之老於此而猶與事接是不知止也然人方其血氣之盛猶有所業也及其既衰則顧戀不忍去雖家事亦然而況於國事乎此聖人所以戒之在得也耄者敬而安之悼者矜而懷之解后有罪非其故也禮經養老之禮鄉飲酒之義至九十而止獨曲禮曰百年曰期頤王制曰問百年者就見之夀至百年此亦絶無而僅有也自養之外無他望焉孟子曰老者衣帛食肉蓋人自五十而下其衣帛食肉者亦罕矣天地之生物也有限少者不奪其養則老者有所養矣三代之老上而天子諸侯養之下而其家能養之孝弟之風安得不行於天下此天下所以易治也廣安遊氏曰先王之時皇極明於上治法立於下當此之時天下之治有定體而血氣之所存有常數假以政事言之仕之事則四十而強者之所能任也大夫之事則五十而艾者之所能任也蓋當時之政有定體故可以凡人血氣之常數而參焉後世皇極不明於上治法不立於下天下之治無定體無定體則無所主治之劇易視其人智力之所及而為之而天下始從事於竒功矣古之人老如吕望然後可以屬之鷹揚之舉少如顔回然後可以屬之四代之禮樂苟人而不能皆吕望顔回也則當為有常之法以待天下可常之人書曰繼自今立政立事其惟克用常人此之謂也夫必壯且強而使之從政而老必使之致事皆所以因乎血氣之常數而為之節也後世治無定體而血氣之常數亦不得循乎其常天下爭為竒功而政益亂人爭為竒才而才益衰此則後世不明乎先王之故而然也後之王者苟能明皇極而立定體因定體而循常數則治道不患乎無序人才不患乎無成雖然去古已逺孰能復其故哉毛氏信卿曰人生一世問其少壯蓋無幾也自事言之則至於指使人矣復何所為乎自道觀之則自始至終未沒之前皆行道之日也豈獨學而仕服官政而已乎孔子曰朝聞道夕死可矣又曰四十五十而無聞斯亦不足畏也已蓋人不可不急於道如此使其知道顔子不為天使不知道彭聃不為夀吾夫子自志學積而至於從心豈以至是而可以已也又豈以其間固自有限節而不可遽也蓋一日生則有一日事道無窮盡而意亦無窮盡不如是不足以為夫子尚安知老之將至也哉故嘗謂蘧伯玉行年六十而六十化此為善學孔子者而所貴乎人生者亦必不苟焉可也不然則曰少壯云者特血氣耳耆艾者特年齡耳玩嵗愒日終與草木俱腐亦奚益哉宜君子之所不論若夫訓詁則有鄭氏之説在李氏曰學者人道之始冠者人道之成有室者人道之備長樂劉氏曰三十曰壯有室者血氣始壯可以有室家也元氣生於子左行三十至己為男右行二十至己為女隂陽之氣交合於此大衍之數是也所以男女合昏焉廬陵胡氏曰北史熊安引古説堯年耆艾仲父年艾皆注云七十曰艾義與此違然魯頌云俾爾耆而艾則耆艾老之通稱長樂陳氏曰六年教之數與方名則非必十年然後學也顔回未四十孔子使之仕則非必四十而後仕也冠禮曰棄爾幼志是幼之稱非特施於十年也舜未百年而稱耄期是期之稱非特施於百年也禮之所言特其大致而已周官司刺赦幼弱赦老耄蓋幼而非弱老而非耄皆所不赦此所以至於悼耄然後不加刑也司厲七十者與未齓者皆不為奴漢律令未及八嵗與八十以上非手殺人他皆不坐與此同意新安朱氏曰期當音居宜反論語期可已矣與期字同周匝之義也期謂百年已周頤謂當養而已期如上句幼弱耄悼等字頤如上句學冠不刑等字又曰陸農師點人生十年曰幼作一句學作一句下倣此亦有理禮記集説卷二
