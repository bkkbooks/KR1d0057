body:
  text: 禮記集説卷四十一宋衛湜撰乃為麥祈實鄭氏曰於含秀求其成也不言所祈承寢廟可知嚴陵方氏曰乃為麥祈實者以孟夏農將登麥故也祈其實則慮稼穡之卒癢故也是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以內鄭氏曰時可宣出不可收斂也句屈生者也芒而直曰萌孔氏曰以物宣散之時當順天散物不可積聚納之在內嚴陵方氏曰由辰而前句者非不出也特出之未為畢爾萌者非不達也特達之未為盡爾至於辰乃言畢出盡達焉有終謂之畢無餘謂之盡春主發散則出而外之時也秋主揫斂則入而內之時也方春宜出之時故言不可以內自布德行惠而下皆其事也天子布德行惠命有司發倉廪賜貧窮振乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者鄭氏曰振猶救也周謂給不足也勉猶勸也聘問也名士不仕者孔氏曰榖藏曰倉米藏曰廪無財曰貧無親曰窮暫無曰乏不續曰絶按皇氏曰長無謂之貧窮暫無謂之乏絶王者勸勉諸侯聘問有名之士謂其德行貞純道術通眀王者不得臣而隱居不在位者也賢者謂名士之次亦隱者也長樂陳氏曰孟春生氣未盛之時也故命相布德施惠而已季春生氣方盛之時也故天子布德行惠焉然孟春兼言和令行慶而此言德惠者詳在於臣要在於主故也嚴陵方氏曰發倉廪所以賜貧窮振乏絶而已乏絶未至於貧窮故於貧窮曰賜之則所以豫之也於乏絶曰振之則貸之而已開府庫所以出幣帛將以聘名士禮賢者故也周天下以言聘名士禮賢者之廣勉諸侯則又欲諸侯之致力焉古者諸侯必嵗貢士於天子以是勉之固所宜矣名士則有實之稱賢則有德之稱聘以問之禮以體之有德不止於有實禮則不止於問此重輕之别也夫春氣之散發極于是月也天子布德行惠至于發倉廪開府庫宜也馬氏曰發倉廪賜貧窮振乏絶則亦春省耕而補不足之意也然方周之時以鄉師賙萬民之艱厄以司門養死政之老孤其天患民病則又以司救施惠之邦之委積遺人掌之野之鋤粟屋粟旅師聚之則所以待貧窮乏絶者當其時矣開府庫出幣帛周天下勉諸侯聘名士禮賢者則所以出滯淹而助陽宣物也然養士以學馭臣以柄者古之道也及夫後世不能一於學然後以私恩聘名士不能用其柄然後以私敬禮賢者是其秦風乎講義曰古者適有賢士則聘之如舜起於畎畝之中傅説舉於版築之間膠鬲舉於魚鹽管夷吾舉於士亦各因其所遇而舉之奚拘於季春是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞鄭氏曰廣平曰原國也邑也平野也溝瀆與道路皆不得不通所以除水潦便民事也古者溝上有路孔氏曰此既為雨決水而云開通道路恐道路非可決之物故鄭云溝上有路言道達溝瀆之時須修溝上道路案周禮遂人職云溝上有畛川上有路此言溝上有路是道路之總名與彼别也嚴陵方氏曰司空掌土之官凡此所命皆土之事故以命焉時雨應時之雨也方春物生需雨澤之時故其雨謂之時雨時雨然或過淫則趨下之水反上騰而為災故命以豫備之術也循行則行之有序也周視則視之無遺也修利則修而利之使無害道達則道而達之使無壅開通則開而通之使無窮皆欲其無有障塞而已障言蔽顯以為隱塞言窒虛而為實凡此皆豫備水災之術也田獵罝罘羅網畢翳餧獸之藥毋出九門鄭氏曰為鳥獸方孚乳傷之逆天時也獸罟曰罝罘鳥罟曰羅網小而柄長謂之畢翳射者所以自隱也凡諸罟及毒藥禁其出九門眀其常有時不得用耳天子九門者路門也應門也雉門也庫門也臯門也城門也近郊門也逺郊門也關門也今月令無罘翳為弋孔氏曰畢所以掩兔以其似天上畢星故謂之畢此等之物四時常有於季春之時不得用耳九門自路門臯門以內皆宫室所在非田獵之處亦禁羅網毒藥者此等門內雖是宫室所在亦有林苑及空間之處得有之矣嚴陵方氏曰慮其傷孚乳之性故田獵之具制之使毋用餧則委之以食而毒焉故以藥言之也山隂陸氏曰王城面各三門南北九經東西九緯若今朱雀門三經經各一門是已考工記曰匠人營國王城九里國中九經九緯毋出九門謂毋出此門也是月也命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑具曲植籧筐后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰鄭氏曰無伐桑柘愛蠶食也野虞謂主田及山林之官鳴鳩飛且翼相擊趨農急也戴勝織紝之鳥是時恆在桑皆蠶將生之候也言降于桑者若時始自天來重之也曲簿也植槌也皆養蠶器也后妃親採桑示帥先天下也東鄉者鄉時氣也是眀其不常留養蠶也留養者所卜夫人與世婦婦謂世婦及諸臣之妻也內宰職曰仲春詔后帥外內命婦始蠶于北郊女外內子女也夏小正曰妾子始蠶執養宫事毋觀去容飾也婦使縫線組紃之事登成也敕往蠶者蠶畢將課功以勸戒之孔氏曰案釋鳥云鶌鳩鶻鵃郭景純云鶌音九物反鵃音嘲鶻鵃似山鵲而小青黑色短尾多聲一名鳴鳩戴勝一名鴟鳩案釋鳥云􅟇鴒戴鵀郭景純云鵀即頭上勝今呼為戴勝曲植籧筐案方言云宋魏陳楚江淮之間謂之曲自關而西謂之簿故云曲簿方言注槌縣蠶簿柱也宋魏陳楚江淮之間謂之植自關而西謂之槌養蠶南北東西無所不在今后惟東面採桑故鄭知不常留養蠶也祭義云卜三宫之夫人世婦之吉是常留養蠶者此經是季春躬桑內宰云仲春者以仲春既帥命婦躬桑浴種至季春又更躬桑浴蠶也外內子女者外子女謂王外姓甥之女內子女謂王之同姓子女則周禮之外宗內宗皆以嫁有爵者是也分繭稱絲是課效其功故云以勸戒之嚴陵方氏曰野虞周官之山虞以主在野之事故曰野謂之虞已見虞人入澤梁解齊戒則所以神明其事矣東鄉則所以迓時氣也以致曲而織故曰曲以取直而立故曰植籧則席之粗者筐則筥之方者凡此皆蠶具省婦使者不煩以他役也凡此欲一意於蠶以勸其事而已蠶事既登者事畢而登比年之數也與曲禮年榖不登之登同義分繭所以使之繅稱絲所以使之織效其功之多少以共郊廟之服無有敢惰敬之至也祭統曰王后蠶於北郊以共純服蓋謂是矣此言共服孟夏言給蓋以后妃之繭絲而為祭服則所以致其恭而已故曰共以貴賤之繭稅而為祭服則可以取足焉故曰給祭服不止於郊廟共給止以郊廟為言者以外祭莫重於郊內祭莫重於廟故也是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良鄭氏曰工師司空之屬官也五庫藏此諸物之舍也量謂物善惡之舊法也幹器之木也凡輮幹有當用脂良善也孔氏曰周禮考工記無工師以司空掌工巧此稱工巧師長故鄭知司空之屬五庫者各以類相從金鐵為一庫皮革筋為一庫角齒為一庫羽箭幹為一庫脂膠丹漆為一庫此等之物善惡先有舊法當審察之故云審五庫之量但器之材朴總謂之幹故鄭云幹器之木周禮弓人凡析幹止謂弓幹與此異也嚴陵方氏曰工師百工之師也與孟子言得大木之工師同義故命之令百工焉五庫之量則百工所治之材也故令之使審焉五庫以五材而得名蓋金鐵之類皆不離於五材故也先儒遂别而為五拘矣不謂之材而謂之量者以其材各有所受故也山隂陸氏曰五庫五兵之庫也此言兵器後言祭器尚禁淫巧如此况用器乎量所容也度其所容為之廬陵胡氏曰脂以柔皮革春秋傳腦所以柔物百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心鄭氏曰咸皆也於百工皆理治其事之時工師則監之日號令之戒之以此二事也悖猶逆也百工作器物各有時逆之則不善時者若弓人春液角夏治筋秋合三材冬定體之屬也淫巧謂偽飾不如法也蕩謂動之使生奢泰也孔氏曰此時天氣和適百工造作器物當因氣序無得悖逆於時使物不牢固又所作器物當依舊常無得有作淫過巧妙以蕩動在上使生奢泰之心也嚴陵方氏曰百工咸理則使之各治其事也監工日號則慮其惰於事也工固有巧也然過乎巧則為淫矣以其淫故足以蕩上心焉此與孟冬皆言毋或作為淫巧以蕩上心者此則因其作而戒之彼則因其成而又戒之講義曰古者工執藝事以諫苟作為淫巧其何以誎於上乎此所以使百工咸理治其事而監工日以號令之也是月之末擇吉日大合樂天子乃帥三公九卿諸侯大夫親往視之鄭氏曰大合樂者所以助陽逹物風化天下也其禮亡今天子以大射郡國以鄉射禮代之嚴陵方氏曰合言備衆樂而合之也天子乃率三公九卿諸侯大夫親往視之則以其大合故也於大合吹而不率之者以不若合樂之備故也於釋菜亦率之者謹其行禮之始故也餘見孟春命樂正入學習舞解馬氏曰凡樂陽聲也春陽中也大合樂必待陽中之末則中聲之所止也蓋中聲以降非和平君子弗聽也山隂陸氏曰季冬所謂大合吹即此所謂大合樂或言吹或言樂相備也單舉則言吹雜舉則言樂吹非無舞也舞非無吹也合舞合吹非無樂也因其所主言之異爾是月也乃合纍牛騰馬遊牝於牧犧牲駒犢舉書其數鄭氏曰纍騰皆乘匹之名是月所合牛馬謂繫在廄者其牝欲遊則就牧之牡而合之以在牧而校數書之眀出時無他故至秋當録內且以知生息之多少也孔氏曰季春陽將盛物皆産乳故合以所纍之牛相騰逐之馬遊此繫牧之牝於牧田之中就牡而合之其在廄牝馬須擬乘用者則不放之既遊牝於牧之後畜皆在野所有犧牲及小馬之駒小牛之犢皆書其見在之數至秋畜産入時知其舊數欠少與否及生息多少嚴陵方氏曰纍牛者纍繫之牛騰馬者騰躍之馬牛善順故以纍言之馬善走故以騰言之合牛馬而遊牝於牧則所以順隂陽之性且欲其孳生之蕃也牧蓋畜養之地然周官牧師之掌牧通淫乃在中春者鄭氏謂秦地寒涼萬物後動理或然也山隂陸氏曰言遊牝則牡雖在牧不得遊也蓋嗜欲不制則雖有龍牡猶將耗矣遊雖牛馬之貞性也即若牡連之以羈馽編之以皂棧亦豈可以少哉命國難九門磔攘以畢春氣鄭氏曰此難難隂氣也隂寒至此不止害將及人所以及人者隂氣右行此月之中日行厯昴昴有大陵積尸之氣氣佚則厲鬼隨而出行命方相氏帥百𨽻索室驅疫以逐之又磔牲以攘於四方之神所以畢止其災也王居眀堂禮曰季春出疫於郊以攘春氣孔氏曰天氣左轉故斗建左行謂之陽氣日月右行比天為隂故曰隂氣右行此月初日在胃月中從胃厯昴元命包云大陵主尸石氏星經大陵主死喪嚴陵方氏曰難所以難隂慝而驅之周官方相氏帥百𨽻而時難以狂夫為之則狂疾以陽有餘唯陽有餘足以勝隂慝故也裂牲謂之磔除禍謂之攘必於九門則欲隂慝之出故也凡此皆慮春氣之不得其終也故曰以畢春氣此之所難則難隂慝之作於春者也仲秋又難則難隂慝之作於秋者也季冬又難則難隂慝之作於冬者也獨夏不難則以陽盛之時隂慝不能作故也春曰以畢春氣者言畢其功於前也故於季月秋於仲月言逹者言逹其道於外也冬曰以送寒氣者以一嵗之往故以送言之亦行之於季月不曰冬氣而曰寒氣者以時言曰冬以氣言曰寒而寒則積隂之所成也一嵗隂慝之盛未有甚於此時者故本其積隂之氣而言之其難特謂之大蓋所難而驅之者邪氣也逹之送之者正氣也曰畢曰逹曰送言雖不同皆不過遂其正氣而已春曰磔攘冬曰旁磔者以大難故旁又磔焉不特九門故也秋雖不言從可知矣春曰命國秋曰天子冬曰命有司又何也蓋天子之難為國而已非自為之也委之有司而已故言之序如此且互相備矣山隂陸氏曰言國則九門不在郊之外眀矣季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沈隂淫雨蚤降兵革並起鄭氏曰寒氣時發草木皆肅丑之氣乘之也肅謂枝葉縮栗大恐謂以水訛相驚疾疫不雨未之氣乘之也六月宿直鬼鬼為天尸時又有暑也山陵不收髙者暵於熱也沈隂淫雨戍之氣乘之也九月多隂淫霖也雨三日以上為霖兵革隂氣盛也孔氏曰寒氣時發天災也草木皆肅地災也國有大恐人災也冬氣來乘水欲來至季春是土土能制水故訛言相驚水竟不至也民多疾疫人災也時雨不降天災也山陵不收地災也沈隂淫雨並天災也兵革人災也嚴陵方氏曰冬之氣為寒故寒氣時發草木皆肅則寒氣之所栗故也國有大恐則寒氣之所制故也亢陽之氣襲於人故民多疾疫陽亢而為旱故時雨不降山陵之物不收特言山陵則以髙者尤易被旱故也天多沈隂則感少隂之氣故也陽為暘隂為雨故淫雨早降兵革並起則金氣動故也山隂陸氏曰春氣尚淺而行冬令為害猶可深則甚矣益深則又甚矣據首種不入麥乃不熟草木皆肅他放此孟夏之月日在畢昏翼中旦婺女中鄭氏曰孟夏者日月會於實沈而斗建己之辰孔氏曰三統厯四月節日在畢十二度昏軫四度中去日一百一十四度旦虛三度中四月中日在井初度昏角六度中去日一百一十七度旦危六度中元嘉厯四月節日在昴十一度昏翼十度中旦女三度中四月中日在畢十五度昏軫十度中旦虛九度中畢者案律厯志立夏日在畢十二度昏翼中者日既在畢十二度畢有十六度而終則中取五度觜二度參九度井三十三度鬼四度栁十五度土星七度張十八度計從畢十二度至翼初總九十三度言昏三月之時昏中之星九十八度四月日漸長校三月三刻則昏中之星去日多校一刻半餘以度言之則校五度則四月昏中之星去日合有一百二度計翼星中之時當在翼十二度也諸家説見孟春其日丙丁鄭氏曰丙之言炳也日之行夏南從赤道長育萬物月為之佐時萬物炳然著見而強大又因以為日名焉易曰齊乎巽相見乎離孔氏曰鄭引易證丙丁是著眀之義諸家説見孟春其帝炎帝其神祝融鄭氏曰此赤精之君火官之臣自古以來著德立功者也炎帝大庭氏也祝融顓頊氏之子曰黎為火官孔氏曰春秋説云炎帝號大庭氏下為地皇作耒耜播百榖曰神農也又案昭二十九年左傳云顓頊氏有子曰黎為祝融杜注云祝融眀貌諸家説見孟春其蟲羽鄭氏曰象物從風鼓葉飛鳥之屬諸家説見孟春其音徴鄭氏曰三分宫去一以生徴徴數五十四屬火者以其微清事之象也夏氣和則徴聲調樂記云徴亂則哀其事勤孔氏曰宫數八十一三分分之各二十七去二十七餘有五十四也數少為清羽數最少為極清徵數次少為微清徴於清濁為第四事於尊卑亦為第四詳見孟春律中中吕鄭氏曰孟夏氣至則中吕之律應中吕者無射之所生三分益一律長六寸萬九千六百八十三分寸之萬二千九百七十四周語曰中吕宣中氣孔氏曰無射之律長四寸六千五百六十一分寸之六千五百二十四三分益一以生中吕於無射四寸之內取三寸益一寸為四寸餘有整寸一又有六千五百六十一分寸之六千五百二十四以六千五百六十一各三分之則一寸分為一萬九千六百八十三分也六千五百二十四分各三分之則為一萬九千五百七十二又整一寸分為一萬九千六百八十二併之總為三萬九千二百五十五也更三分之一分有一萬三千八十五上生者三分益一以一萬三千八十五益上之數總為五萬二千三百四十為積分之數然後除之為寸一寸除一萬九千六百八十三則二寸除二萬九千三百六十六為二寸通前為六寸餘有一萬二千九百七十四不成寸是中吕長六寸萬九千六百八十三分寸之萬二千九百七十四也長樂陳氏説見孟春其數七鄭氏曰火生數二成數七但言七者亦舉其成數孔氏説見孟春其味苦其臭焦鄭氏曰火之臭味也凡苦焦者皆屬焉諸家説見孟春其祀竈祭先肺鄭氏曰夏陽氣盛熱於外祀之於竈從熱類也祀之先祭肺者陽位在上肺亦在上肺為尊也竈在廟門外之東祀竈之禮先席于門之奧東面設主於竈陘乃制肺及心肝為俎奠於主西又設盛於俎南亦祭黍三祭肺心肝各一祭醴三亦既祭徹之更陳鼎俎設饌於筵前迎尸如祀户之禮孔氏曰案少牢及特牲禮皆竈在廟門外之東西面北上鄭注祀竈之禮以下皆逸中霤禮文門之奧謂廟門外西室之奧祀戶在戶內故祭在廟室之奧祀竈在門外故設主在門室之奧竈陘謂竈邊承器之物以土為之制謂截割心肝皆鬲上之物故從肺類俱置俎上奠於主西設盛謂黍稷盛之於簋祭必三者以禮成於三故也上祀戶云祭肉三肺一腎再此云祭肺心肝各一亦為肉祭三也醴實之於尊祭二者始扱一祭又扱再祭筵前謂初設廟室奧之筵前唯特牲少牢鼎當陳於廟門室之前稍東西向執俎者以俎就鼎載肉入設於筵前在菹醢之東其黍稷等設於俎南北唯云祭黍或無稷也此配竈神而祭者是先炊之人禮器云竈者是老婦之祭諸家説見孟春螻蟈鳴蚯蚓出王瓜生苦菜秀鄭氏曰皆記時候也螻蟈蛙也王瓜萆挈也今月令云王萯生夏小正云王萯秀孔氏曰案周禮蟈氏鄭司農注云蟈蝦蟇元謂今御所食蛙也王瓜萆挈者夲草文此物記時先生者在月初後者在月末以次相配餘皆倣此嚴陵方氏曰蚯蚓至隂之物故感正陽之氣而出焉王瓜南方之果也而其色赤苦菜南方之菜也故其味苦一則感火之色而生一則化火之味而秀馬氏曰螻蟈鳴則隂而伏者乘陽而鳴也蚯蚓出則隂而屈者乘陽而伸也王瓜生則陽物之可以勝隂邪者也故其為色赤苦菜秀則火炎上故其為味苦天子居眀堂左個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗鄭氏曰眀堂左個大寢南堂東偏也菽實孚甲堅合屬木雞木畜時熱食之亦以安性也粗猶大也器髙大者象物盛長孔氏曰路與服言朱駵與旗及玉言赤者色淺曰赤色深曰朱路與衣服人功所為染必色深故云朱玉與駵馬自然之性皆不可色深故云赤旌旗雖人功所為染之不須色深故亦云赤鄭注儀禮云朱則四入是朱深於赤也諸家説見孟春是月也以立夏先立夏三日大史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊還反行賞封諸侯慶賜遂行無不欣説鄭氏曰迎夏祭赤帝赤熛怒於南郊之兆也不言帥諸侯而云封諸侯諸侯時或無在京師者空其文也祭統曰古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也今此行賞可也而封諸侯則違於古封諸侯出土地之事於時未可似失之孔氏曰諸侯當迎夏之時或無在京師者故空其諸侯之文諸侯既無而得封者鄭云或無則容有在者故得封也或者諸侯身雖不在遙封之山隂陸氏曰於天子言無不欣悅於相言無有不當亦言之法金華應氏曰案樂記舜作五弦之琴以歌南風夔始制樂以賞諸侯而東郊亦順景風以行賞則疏封於盛夏古之遺禮也蓋封爵以是時而出命而田邑至秋始割耳要之其可以待時而賞特其功之常者其非常者自不容緩司馬法所謂賞不踰時是也乃命樂師習合禮樂鄭氏曰為將飲酎孔氏曰不云是月者承上是月立夏之文自此下至必當其位皆立夏之日處分也山隂陸氏曰不言樂正不嫌也即習樂習舞言樂師嫌樂正不與講義曰習之者欲禮樂之器用為習孰也合之者欲禮樂之器用為諧和也此特禮樂之文而已命大尉贊傑俊遂賢良舉長大行爵出祿必當其位鄭氏曰助長氣也贊猶出也傑俊能者也遂猶進也三王之官有司馬無大尉秦官則有大尉今俗人皆云周公作月令未通於古爵祿必當其位使順之也孔氏曰贊是贊佐之義傑俊或未仕沈滯者故鄭云出賢良或職卑位下故云遂賢良謂有德行傑俊謂多才藝蔡氏辨名記曰十人曰選倍選曰俊萬人曰傑尹文子及毛詩傳皆云萬人為英舉長大者謂用長大之人嚴陵方氏曰大尉即古司馬也司馬政官必命之取人者蓋取人將以為政故也王制言司馬辨論官材與此同意贊之遂之舉之不可以虛拘也則必有爵以馭其貴有祿以馭其富焉故繼之以行爵出祿也爵必當有德之位祿必當有功之位也且天子春始出幣帛以聘名士禮賢者而已至此然後行爵出祿焉固其序也馬氏曰傑者其才特者也俊者敏於德者也佐上利下宜為人臣者賢也苟志於善焉者良也體仁而能元者長也充實而有光輝者大也爵祿者所以詔王馭羣臣者也此曰大尉非古也廬陵胡氏曰習禮樂亦在學仲春習樂命樂正此命樂師輕也遂逹也書顯忠遂良長大謂學長德大者是月也繼長增髙毋有壞墮毋起土功毋發大衆毋伐大樹鄭氏曰繼長增髙謂草木盛蕃廡也毋起土功發大衆為妨農蠶之事毋有壞墮伐大樹皆為逆時氣也孔氏曰王者施化當繼續長養之道謂勸民長養增益髙大之物謂勸其種殖馬氏曰萬物所以長而髙者陽上逹故也長之者天地也所以繼長者人也髙之者天地也所以增髙者人也故曰人終天地之功者此也欲其長則勿壞焉可也欲其髙則勿墮焉可也起土功發大衆伐大樹則所以壞墮之也山隂陸氏曰毋伐大樹雖伐小樹可矣據此賞以春夏刑以秋冬謂其大者也講義曰南方之火盛德在焉土之所恃以生者亦四季最旺之時也起土功則非所以滋土之氣而撫土之辰發大衆則妨農桑之事而違其時伐大木則逆其生理壞其成材故也是月也天子始絺鄭氏曰初服暑服嚴陵方氏曰絺以涼而可以禦暑裘以溫而可以禦寒孟夏者暑之始也故言始絺孟冬者寒之始也故言始裘命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休於都鄭氏曰命野虞重敕之命農勉作急趨於農也縣鄙鄉遂之屬主民者也孔氏曰遂人職云五鄼為鄙五鄙為縣縣二千五百家鄙五百家是遂之屬今鄭云鄉遂之屬經直云遂屬舉遂以包鄉故鄭兼云鄉也嚴陵方氏曰野虞外官也故出行田原司徒內官也故循行縣鄙以在外也故曰出以在內也故曰循而已農亦民也然民不止於農以農營其事之勞也故勞之欲民趨其事之樂也故勸之皆欲無失其事而已都者君子之所居鄙者野人之所居農以力耕而養人則野人之事也禁之使毋休於都則於農不能無所強矣故曰勉作也馬氏曰勸民則勸其為耕事者也命農勉作則勉其無所説於都者也彼欲為而我道之者勸也非其志而我強之者勉也廬陵胡氏曰勞其勞者勸其惰者講義曰因其時事而教敕之以為有秋之望農若失其時而休逸於都市亦何望嵗成之有是月也驅獸毋害五榖毋大田獵鄭氏曰為傷蕃廡之氣也嚴陵方氏曰四時四田夏曰苗以其為苗除害故也故此言驅獸毋害五榖焉既曰驅獸而又曰毋大田獵者以雖可田獵而不可大為之故也若秋獮冬狩則為大矣講義曰猛獸多害五榖故驅逐之使歸山林也禮蠟祭迎虎而祭之為其食田豕而去害稼之獸也古者春搜夏苗秋獮冬狩雖夏之時田狩之事有所不免焉蓋為供乾豆賔客充君庖之用也若大田獵恐傷蕃盛之物故禁止之農乃登麥天子乃以彘嘗麥先薦寢廟鄭氏曰登進也麥之新氣尤盛也以彘食之散其熱也彘水畜嚴陵方氏曰以彘嘗麥者以水勝火也仲夏以雛嘗黍者以木生火也仲秋以犬嘗麻者以金勝木也季秋以犬嘗稻者以金合金也夫勝所以治之生所以養之合所以和之故食齊得其宜焉先薦寢廟見仲春解廬陵胡氏曰麥性藴毒故王制薦麥以魚而此嘗麥以彘宣其毒也嘗穀必薦寢廟一食不敢忘親是月也聚畜百藥靡草死麥秋至斷薄刑決小罪出輕繫鄭氏曰聚畜百藥蕃廡之時毒氣盛也舊説云靡草薺葶藶之屬祭統曰草艾則墨謂立秋後也刑無輕於墨者今以純陽之月斷刑決罪與毋有壞墮自相違似非出輕繫崇寬也孔氏曰以其枝葉靡細故云靡草引祭統以下者證此月不當斷薄刑決小罪嚴陵方氏曰周官醫師掌聚毒藥則孟夏蕃廡之時其可以不聚畜百藥乎然藥之可採者不必皆在孟夏則以蕃廡之時所可採者為多故也凡物感陽而生者則強而立感隂而生者則柔而靡謂之靡草則至隂之所生也故不勝至陽而死凡物生於春長於夏而成於秋而麥獨成於夏故於是月言麥秋至蓋於時為夏於麥為秋故也猶季春之月非嵗單之時也而祭義言嵗既單矣者以贊嵗之大功畢於此故也刑主國言罪主人言薄者對厚之辭小者對大之辭輕者對重之辭方正陽之月於隂事未宜大有所施設故也山隂陸氏曰神農始嘗草木一日遇七十毒得穀以養民得藥以攻疾藥所以毒之故聚畜在孟夏穀所以亭之故收斂在孟秋所謂亭毒亭之以溫涼毒之以寒暑謂之靡草者以其靡故至是而死蔡雍曰百穀各以其初生為春熟為秋薄刑謂若不應五刑其刑薄麗于五罰之類鄭氏引草艾則墨蓋非是然則斷薄刑決小罪出輕繫是亦仁義是乃所以繼長增髙也且言靡草死麥秋至而後言斷薄刑決小罪蓋亦因時順氣廬陵胡氏曰案書眀審用刑無若舜但云毋殺不辜不云刑必秋冬亦不云夏不當刑也有大姦惡於此義在必戮過今日便不可而曰必俟立秋可乎若夫大姦大惡可以議獄緩死則盛夏勿論可也蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服鄭氏曰后妃獻繭者內命婦獻繭於后妃收繭稅者收於外命婦外命婦雖就公桑蠶室而蠶其夫亦當有祭服以助祭收以近郊之稅耳貴賤長幼如一國服同孔氏曰后妃獻繭者謂后妃受內命婦之獻繭知非后妃獻繭於王者祭義曰世婦卒蠶奉繭以示於君遂以獻於夫人是夫人不獻繭也內命婦既已獻繭乃收外命婦之賦稅外命婦雖受公桑蠶室而蠶既是官家之桑繭應全入於已所以有稅者以其夫亦當有祭服官家所給故輸繭稅以供造之但稅寡少載師云近郊十一公桑在國比近郊故知收以近郊之稅也以桑為均者言收稅之時以受桑多少為賦之均齊桑多則賦多桑少則賦少貴謂公卿大夫之妻賤謂士之妻長幼謂婦老幼無問貴賤長幼出之時齊同如一皆十而稅一也鄭注國服同者案泉府云凡賖者以國服為之息國服謂國家貢賦服事在上各有等限謂之國服言貴賤長幼出繭稅俱以十一等限齊同故云國服同其受桑則貴賤異也貴者桑多賤者桑少皆計繭為十一之稅所稅之物以供給天子郊廟之服案皇氏曰外命婦既就公家之桑而養蠶則繭當悉輸於公所以惟皆稅其繭餘得自入者以其夫當有祭服以助王祭故令繭得自入以供造也馬氏曰以桑為均則上之所征者地守也其收有多寡厚薄則人功存焉以桑為均則視其地守而已其為人功之至不至我不為之增損焉則亦勸其勤而督其怠之術也廬陵胡氏曰鄭謂后妃受內命婦獻繭非也據經云后妃獻繭則獻於王矣鄭以祭義云世婦奉繭以示於君遂以獻夫人是夫人不獻故云后亦不獻案天子尊於后妃若諸侯與夫人體敵也不可以為比又祭義云世婦獻繭於君則夫人不可獻也此不云世婦獻繭於天子則后妃自獻無疑也鄭又謂收外命婦繭稅案內宰職后妃帥外內命婦蠶則繭稅亦內外均何必外命婦是月也天子飲酎用禮樂鄭氏曰酎之言醇也謂重釀之酒也春酒至此始成與羣臣以禮樂飲之於朝正尊卑也孟冬云大飲蒸此言用禮樂互其文孔氏曰酎音近稠稠醴厚故為醇也詩豳風云為此春酒至此始成左傳云朝以帥長幼之序若漢嘗酎及春秋見於嘗酎皆謂在廟祭而獻酎與此别也嚴陵方氏曰孟夏之飲酎則以春作之事畢而燕樂以進衆物故也唯其進衆故謂之大飲蒸焉凡燕樂則必用禮樂矣於此特言之者以用之於是為盛故也飲酎如此則飲蒸從可知也馬氏曰鄭人謂晉侯曰見於嘗酎與執燔焉則在廟者也豳詩曰為此春酒以介眉夀躋彼公堂稱彼兕觥則在朝者也漢酎祭獻金宜亦在廟矣此天子飲酎用禮樂宜亦在朝矣廬陵胡氏曰案漢嘗酎及春秋襄二十二年見於嘗酎皆在廟祭而獻酎食貨志云酎飲酒亦於廟然此不云獻酎祭廟而云飲者蓋夏月時祭用酎常禮也祭畢則飲故不云獻孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木蚤枯後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實鄭氏曰苦雨五穀不滋申之氣乘之也苦雨白露之類時物得雨傷四鄙入保金氣為害也鄙界上邑小城曰保草木蚤枯長日促也大水敗城郭亥之氣乘之也蝗蟲暴風寅之氣乘之也必以蝗蟲為災者寅有啓蟄之氣行於初暑則當蟄者大出矣格至也秀草不實氣更生之不得成也孔氏曰苦雨數來天災五穀不滋地災四鄙入保人災也草木蚤枯地災後乃大水敗其城郭天災此二句共為一事蝗蟲為災秀草不實地災暴風來格天災也嚴陵方氏曰隂氣之所召故苦雨數來謂之苦則以極備而為人之所苦故也與詩所謂甘雨異矣夫雨固足以滋五穀然至於苦則適所以傷之故言五穀不滋也四鄙入保者與莊子言小國入保同義鄙則邑之在外者保則城之在內者人自外入內而為害則象秋氣之斂藏故也以至季夏季冬所言其義亦若是而已感肅殺之氣故草木蚤枯大水敗城郭則以冬德之所在故也蝗之為蟲殘物之末不傷其本春則木盛之時也故行春令則蟲之為災者特殘其末而已春於方為東東方生風故暴風來格秀草不實則以盛於末故也禮記集説卷四十一
