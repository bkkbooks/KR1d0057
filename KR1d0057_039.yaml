body:
  text: 禮記集説卷三十九宋衛湜撰是月也以立春先立春三日大史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿諸侯大夫於朝鄭氏曰大史禮官之屬掌正嵗年以序事謁告也迎春祭蒼帝靈威仰於東郊之兆也王居明堂禮曰出十五里迎嵗蓋殷禮也周近郊五十里賞謂有功德者有以顯賜之也朝大寢門外孔氏曰此一節論立春天子迎春氣及行賞之事節氣有早晚立春為正月節有在十二月之時云是月者謂是月之氣不謂是月之日也凡言是月者若事相連接則因前是月不别起文若别事異端則更云是月他皆放此周法四時迎氣皆前期十日而齊散齊七日致齊三日秦法簡省故三日散齊二日致齊一日也天以覆蓋生民為德春則為生天之生育盛德在於木位故云盛德在木也立春立秋帥三公九卿諸侯大夫立夏立冬不云諸侯文不備也案賈馬蔡雍皆以為迎春祭大皥及勾芒鄭獨以為祭蒼帝靈威仰者以禮器云饗帝于郊而風雨節寒暑時大皥是人帝何能使風雨寒暑得時周禮司服王祀昊天上帝服大裘而冕祀五帝亦如之五帝若是人帝何得與天帝同服故以為靈威仰上云盛德在木亦謂靈威仰之盛德也鄭引明堂禮蓋逸禮之篇名證十五里迎春與周不同也鄭注尚書君陳序云天子近郊五十里今河南洛陽相去則然是也云朝大寢門外者大寢則路寢天子有三朝一是燕朝在路寢也二是治朝則此路寢門外應門之內以其賞賜公卿大夫宜在治事之朝故云大寢門外三是外朝在庫門之外臯門之內大詢衆庶聼斷罪人之處也此云賞公卿大夫諸侯孟夏云還反行賞封諸侯慶賜遂行孟秋云賞軍帥武人孟冬賞死事恤孤寡四時所賞不同者庾云順時氣也春陽氣始著仁澤之時故賞朝臣及諸侯至夏陽氣尤盛故慶賜轉廣秋隂氣始凝故賞軍帥及武人至冬隂氣尤盛故賞死事者及其妻子也嚴陵方氏曰四立之日則其氣至矣故天子親帥其臣以迎之於郊焉所以導其氣之至也春主寅卯辰其位居東故迎之於東郊夏主巳午未其位居南故迎之於南郊秋主申酉戌其位居西故迎之於西郊冬主亥子丑其位居北故迎之於北郊五行之氣獨不迎土者以其居中非自外至也唯其自外至故迎之者每於郊焉古者於寒曰迎以客隂故也於暑曰迎以主陽故也此則四時皆謂之迎者蓋别而言之雖有隂陽客主之辨合而言之則氣皆自外至主之在我而已故通謂之迎焉所謂還反何也還言還之自郊反言反之於朝主彼言故曰還主此言故曰反也古者賞以春夏刑以秋冬此則四時皆賞何也蓋春夏非不刑也特順陽義故以賞為主爾秋冬非不賞也特順隂義故以刑為主爾此則喜其氣之至故皆行賞以飾其喜焉馬氏曰隂陽合而為道離而得一焉為德五行播于四時陳于五行而各得道之一者也故謂之德夫更盛更衰物之復也五行四時還相為本而各得以其時王焉王則相我者生生我者廢勝我者囚我所勝者死其盛在我矣故謂之盛德所謂五行之動迭相竭也者立此而竭彼也故於四立之日告盛德所在焉五行之序不同曰水火木金土者天地生五行之序也曰木火土金水者五行相生之序也曰火水金木土五行相尅之序也天地之生五行也以數其相生也以氣其相尅也以形古者以中春逆暑以中秋迎寒逆暑主陽也迎寒客隂也四時之所以變化者隂陽而已寒暑隂陽之盛也方二分之際而逆之迎之則前其氣之未至以待其至也此以四立之日而迎氣於郊非古也先王之時有舍爵䇿勳者夫下車而封先代之後者視人之功而致其賞視人之罪而致其誅夫亦何常期之有山隂陸氏曰木仁德之盛金義德之盛君子體之方其以仁為恩則盛德在木方其以義為理則盛德在金他放此唯春秋言諸侯朝覲之時也曲禮所謂天子當寧而立曰朝當扆而立曰覲如此廬陵胡氏曰案禮器云饗帝于郊而風雨節寒暑時初不指言何帝竊以為蒼帝與大皥皆當祭不必分也鄭取春秋緯固不經而賈馬等亦大泥矣鄭又以此為殷禮然王居明堂禮亦何嘗指以為殷又逸禮亦豈盡足據則此謂之周禮可也命相布德和令行慶施惠下及兆民慶賜遂行毋有不當鄭氏曰相謂三公相王之事也德謂善教也令謂時禁也慶謂休其善也惠謂恤其不足也天子曰兆民遂猶達也言使當得者皆得得者無非其人孔氏曰此一經因上天子迎春及國命三公布教施惠之事公羊傳云三公者何天子之相也自陜而東周公主之自陜而西召公主之一相主乎內是三公相王之事也至六國時一人知事者特謂之相故史稱穰侯范雎蔡澤皆為秦相後又為丞相也商頌云莫遂莫達是遂為達言慶賜通達周遍皆是有功可慶者非其人謂無功無德之徒嚴陵方氏曰德令慶惠出乎君然欲布和行施以下及也則必有以相之者焉故特言命相也德貴乎宣利故曰布令貴乎無乖故曰和慶則必致用故曰行惠則必有與故曰施慶賜者行慶而賜之也慶主禮賜主物前言行慶則禮而已此言慶賜又及於物故也遂行言行之而無壅也毋有不當則又惡夫妄豫以傷費焉此與孟夏皆言慶賜遂行而秋冬則不言者賜以春夏為主故也於春則繼之以毋有不當於夏則繼之以無不欣悅者蓋慶賜所以飾喜必能毋有不當然後人無不欣悅焉亦互相備而已乃命大史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常鄭氏曰典六典法八法也離讀如儷偶之儷宿儷謂其屬馮相氏保章氏掌天文者相與宿偶當審候伺不得過差也經紀謂天文進退度數孔氏曰迎春既還行賞已畢乃命大史之官守其六典奉其八法司主天文及日月星辰之行天則左還一日一度一年三百六十五度四分度之一又至周一度日月五星並逆行各有多少辰有二十八宿亦隨天左行大史令其屬官馮相氏保章氏恆在候處相與止宿配偶共審察伺候不得貸變過差馮相氏則主日月五星年氣節候推步遲疾審知所在之處若今之司厯主其算術也保章氏則守天之文章謂天文違變度數失其常次妖孽所在吉凶所生若今之天文家唯主變異也若應候不候應知不知則是候過差也經紀謂天文進退度數言當推勘考校使得其中應進則言進應退則言退若其推步不明算厯失所遲疾不依其度進退或失其常是失經紀初謂舊來所法常須遵奉以為常行故云以初為常丘氏曰星謂二十八宿也辰謂日月之舍也宿留止離經厯言天子命大史之官厯候日月星辰即留止所經厯為祥為災無令差貸詩云月離于畢俾滂沱矣書云星有好風星有好雨月之從星則以風雨此之謂乎而穎達以宿離為馮相保章同宿配偶是其不顧經文妄為穿鑿嚴陵方氏曰月令天所命也王者則繼天以行其事而已故言乃焉若後言乃擇元日乃修祭典之類周官大史之職掌建邦之六典以迎邦國之治掌八法以迎官府之治即此所謂守典奉法也又言正歲年以序事須之于官府及都鄙即此所謂司天日月星辰之行也在人之六典八法在天之日月星辰莫不存乎書故以是命之於大史焉大而有常者之謂典故曰守詳而有變者之謂法故曰奉日月星辰之行皆麗乎天之大數數之妙理所以成變化而行鬼神非聖人不能與於此也若夫有司之事特司其末而已故以司言之日者循星以進退者也月者應日以死生者也星者日所舍辰者星所次以其得陽之精故謂之星以其所次有時故謂之辰也日月星辰即堯典所言厯象洪範所言五紀是矣宿言宿之於此離言離之於彼日月星辰之行或宿或離有定數焉大史司之不可貸而已貸則司天者之過矣廬陵胡氏曰典法若大宰六典八法宿謂日月星辰所居之次天文志云填星居宿其國福厚又云五星所聚宿其國王是也若司天推步不職至於宿離其次而不能察則罪不原貸書先時者殺山隂陸氏曰宿離不貸蔡雍曰宿者日所在也離月所厯厯非一度處之詞也厯象以初為常而已其測驗與時盈縮有變存焉是月也天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒鄭氏曰謂以上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕上帝太微之帝也元辰蓋郊後亥也耒耜之上曲也保介車右也置耒于車右與御者之間明已勸農非農者也人君之車必使勇士衣甲居右而參乘備非常也保猶衣也介甲也帝藉為天神借民力所治之田也既耕而宴飲以勞羣臣也大寢路寢御侍也孔氏曰此一節論迎春既反春事已起當祈榖親耕燕勞之事鄭引春秋傳見襄七年左傳彼祈農事此即祈榖彼云郊而後耕此祈榖之後即躬耕帝藉是祈榖與郊一也紫微宫為大帝大微為天庭中有五帝座即靈威仰赤熛怒白招拒汁光紀含樞紐祈榖郊天之時各祭所感之帝殷人則祭汁光紀周人則祭靈威仰以其不定故總云大微之帝若迎春之時前帝後王皆祭靈威仰前迎春祭蒼帝是也此郊雖祈榖亦是報天故郊特牲云郊之祭也大執天而主日也甲乙丙丁等謂之日郊之用辛故上云元日子丑寅卯等謂之辰耕用亥日故云元辰隂陽式法正月亥為天倉以其耕事故用天倉也盧植蔡雍並云郊天是陽故用日耕藉是隂故用辰元者善也郊雖用日亦有辰但日為吉主耕之用辰亦有日但辰為主爾天子所乘車上親載耕田之耒耜措置也御者御車之人車右及御人皆主參乘於時天子在左御者在中車右在右言置此耒器于參乘保介及御者之間明王之身但是勸農非實農人故不以耒耜近王也耕藉而曰帝藉者舉尊言之故祭義云為藉千畝以共粢盛又國語宣王不藉千畝虢文公諫曰民之大事在農上帝粢盛於是乎出是藉田共上帝也案國語王耕一坺班三之賈逵注班次也謂公卿大夫也王之下各三其上也王一發公三發卿九發大夫二十七發不云士者士賤不與耕也國語耕後宰夫陳饗膳夫贊王王歆大牢是耕後設饗而此云既耕而燕飲者饗禮在廟燕禮在寢此云執爵于大寢故知燕也國語云饗者蓋用饗之饌具而行燕禮以勞羣臣也案上迎春行賞于路寢門外正朝此耕藉勞羣臣于路寢不同者爵賞公事與衆共之故在正朝燕勞私禮主於歡心故在路寢嚴陵方氏曰元日者善日也與王制習射上功所言同義詩言三之日于耜蓋建寅之月也故於是月始祈穀焉噫嘻言春夏祈穀于上帝正謂是矣必以元日者求其信善之殖以斷凶荒之害而已皆元日也於祈穀曰以於命民社曰擇何也蓋擇日者有司之事以日者天子之事凡日皆擇而後以之然前言以後言擇者以尊卑之序且互相備也故擇元辰之文其下乃言天子親載耒耜則擇日非天子之事明矣日為陽辰為隂祈榖于天所以成物故日用辛耕藉于地所以終功故辰用亥也保介言保民而介其君也方其參君之乘故謂之參保介保介之參乘必有御君之所焉故謂之御間帝藉蓋藉田也以其共上帝之粢盛故曰帝以其借民力而終之故曰藉夫以千畝之藉自天子至於諸侯其耕止於三推五推九推則其借民力而終之可知推者執耒而進之也或以三或以五或以九者以貴賤為勞逸之差等也且耕陽事也故每用數之竒焉此言天子三推而春秋外傳言王耕一發者蓋一發土而三推之其實一也帥之時及於大夫而推之數則不及者以其卑故不必預拘其數也祭統曰天子諸侯非莫耕也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明然則躬耕之意以是而已大寢路寢也以路寢為大則燕寢為小矣夫耕藉而反亦已勞矣故飲之以酒命曰勞酒也御與御食于君之御同義山隂陸氏曰言以以前月所卜之日也御侍也言以耒耜置之于參與保介侍御之間參參乘保介車右也保君而甲者也詩曰嗟嗟臣工又曰嗟嗟保介臣工其臣也保介其僕也黃氏曰夫國之大事在祀與戎故季秋云藏帝藉之收于神倉蓋所以供皇天上帝名山大川四方之神以祠宗廟社稷之靈古者凡祭祀之粢盛自天子達庶人必待親耕之榖宣王不行斯禮虢文公諫蓋宣王承厲王之亂禮法廢壞宣王中興幾失其禮賴虢公諫之而得祭祀之正噫厲王之亂其禮已亡衰周戰爭暴秦焚殄宜乎未究斯禮也春秋書御廩災蓋是魯侯躬耕藉田以供祭祀粢盛之倉也下續書乙亥嘗者謂災雖焚廩不害嘉榖是故秋祭不闕明祭祀之禮唯躬耕之榖以為粢盛不以他榖為祀明矣故榖梁傳曰天子親耕王后親蠶非無良農女工也以為人之所盡事其祖禰不若已自親者也或曰庶人豈拘斯禮禮云不耕者祭無盛不蠶者不帛斯豈非庶人之禮蓋天子百官皆行斯禮以明孝道而懼庶人遊手惰業棄本逐末之教也況古者近郊則五家為比逺郊則五戶為鄰蓋禮法自閭比鄰里之長行之則風行草偃天下雖廣而教一也況周禮載師職云凡一宅不樹藝罰二十五家之里布一田不耕罰三頃之屋粟一民無職罰一夫之稅一家之役嗟乎斯禮苟行則天下之為人子者恥不獲祭其先也天下之為人父者懼不享于祀也咸知農為邦本食乃民天曠土遊民不驅而復上行下效誰曰不從厯代雖亦行之或曰農壇或稱帝社羣儒詳議疑未及此馬氏曰古者將有事于藉田則齊于齊宫事至則祼鬯饗禮而後卒事則饗膳而班嘗之庶人終食此則反執爵于大寢者三公諸侯九卿大夫皆御命曰勞酒則非古也廬陵胡氏曰鄭謂此即郊也案郊特牲云郊之用辛此云元日善日也則不必辛郊特牲又云郊迎長日之至注引易説謂春分日漸長則此未春分也郊特牲又云郊大報天此云上帝不可以包天也易説三王之郊一用夏正孟獻子云啓蟄而郊則此未啓蟄也獻子又云郊祀后稷此不祀后稷而祀帝也足明此但祈榖非郊天大祭故郊則可以兼祈榖春秋傳郊后稷以祈農事是也祈榖不可以兼郊詩云春夏祈榖詩豈謂郊乎參謂參乘者保介車右甲士也御御車者凡三等先儒以保介及御皆謂參乘非也於時天子左御者中保介右參乘前置耒于參保介御之間而不近之者明己意在勸農非若神農氏之道與民並耕者之為也藉之為義應劭則云天子耕藉田千畝為天下先藉者帝王典藉之常韋昭曰藉借也借民力以治之以奉宗廟而勸農鄭氏亦云帝藉為天神借民力所治之田臣瓉云藉蹈藉也本以躬藉為義不得以假借為稱數説不同案躬耕帝王盛典則謂藉為典藉可也藉者耕借也春秋傳云榖出不過藉言借民力所治之田則謂藉為借可也祭義云天子為藉千畝國語宣王不藉千畝漢景詔朕親耕為天下先而此云躬耕帝藉則藉是躬親履踐之義則謂為蹈藉可也推其至當瓉説為優金華應氏曰保介謂神之保右介助乎農事者也尸代神位故楚茨之詩謂尸為神保楚詞謂巫為靈保御者則參陪而立措之于此間依神以求福也親自車上載而措之示將親耕也觀臣工之詩曰嗟嗟保介亦又何求則可見非車右也是月也天氣下降地氣上騰天地和同草木萌動鄭氏曰此陽氣蒸達可耕之候也農書曰土長冒橛陳根可拔耕者急發孔氏曰自此至不惑一節論少陽之月務其始生故既耕之後當勸農事天地之氣即隂陽也一年之中或升或降故聖人作為六爻以象之陽氣之升從十一月為始至四月六陽皆升六隂皆伏五月一隂初升至十月六隂皆升六陽皆伏然則天氣下降地氣上騰五月至十月也地氣下降天氣上騰十一月至四月也今正月言天氣下降地氣上騰者蓋正月三陽生而成乾在坤體之下天居地下故云天氣下降地氣上騰也七月三隂生而成坤在乾體之下上天下地則是地氣在下天氣在上故正月為泰泰通也天地交通七月為否否塞也天地隔塞所以十月云地氣下降天氣上騰者以十月純隂用事六陽退盡似若陽歸於天故也其實十月天氣反歸於地下鄭注陽氣蒸達亦似陽氣上升者蓋陽氣從下而升據乾體言之其實於時陽從地中升也漢書藝文志農書有九家一百一十四篇嚴陵方氏曰天氣下降則天道下濟故也地氣上騰則地道上行故也和言相濟而無乖同言相合而無異唯其在上者下降在下者上騰故天地之氣和同草木所以萌動也莊周曰至隂肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉正謂是矣王命布農事命田舍東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之田事既飭先定準直農乃不惑鄭氏曰田謂田畯主農之官也舍東郊順時氣而居以命其事也封疆田首之分職術周禮作遂夫間有遂遂上有徑遂小溝也步道曰徑今尚書曰分命羲仲宅嵎夷也相視也田事既飭以下説所以命田舍東郊之意也準直謂封疆徑遂也夏小正曰農率均田孔氏曰春氣既和王命羣官分布檢校農事以其耕作嵗時之氣起於東方故令田畯舍國之東郊以命其事其諸侯都邑田畯各舍國邑之東郊也封疆則九夫為井四井為邑各有封境界域部分職掌也術遂聲相近學記術有序義同於此夫間有遂遂上有徑遂人職文也案匠人云廣二尺深二尺遂人云徑容牛馬田畯舍于郊上令農夫皆修理地之封疆審正田之徑路及田之溝洫故云審端徑術也飭正也田事既正又先定準直準謂輕重平均直謂繩墨得中封疆有界限徑遂有闊狹皆先平均正直之農乃不有疑惑故鄭云準直謂封疆徑遂也引夏小正大戴禮篇也農率則田畯均田則審端徑遂也廬陵胡氏曰鄭以田為田畯非也但謂凡趨田者爾嚴陵方氏曰上言可耕之候故此命布農事蓋農事布於春而斂於秋也命田舍東郊所以順時氣而居且帥民以東作故也度土而積之謂之封界畫以守之謂之疆封疆古所有也特以久則不能無壞耳故曰修每嵗孟春必修封疆審端徑術者所以防終嵗交爭之患也人以其高則為之丘平而可陵則為之陵陂而不平者為陂水之使行者為險廣而平者為原下而濕者為隰地有岸谷之變川流之徙非時而修之則不足以盡其利故丘陵阪險原隰不可以不相之也周官司空時地利者如是而已土地所宜者所宜之物也若山林之宜皂川澤之宜槖之類是矣五榖所殖者所殖之土也若黍之利高燥稌之利下濕之類是矣既曰土又曰地者蓋土則地之體地則土之名故周官大司徒言五地而又言十有二土者以此土地之所宜五榖之所殖以民之愚固不必知之也則必有以教道之者焉蓋教之使能其事道之使達其理雖有以教道之然弗躬弗親則民莫之信矣故又言必躬親之田事既飭者言皆力田而各有修治也田事之所以既飭者良由先定準直農乃不惑之所致而已前曰農事而後曰田事又何也蓋農田一也以人言之曰農以地言之曰田人事興於前然後地事成於後故先言布農事後言田事既飭以其序也馬氏曰修封疆審端徑術制其畿疆作其溝封正其道塗均地域也善相丘陵阪險原隰土地所冝五榖所殖則五地之物辨以土會十有二土十有二壤辨以土宜五物九等辨以土均然後稼穡樹藝之所宜畢見於此而始可以任地事也弗躬弗親庶民弗信故使農官蒞而教導焉自我所行之謂躬與彼有事之謂親故曰以教導民必躬親之先王之於民也分地職奠地守使各適其平之謂準各得其正之謂直田事既飾而先定準直與民由之則民志一矣此農之所以不惑也山隂陸氏曰封疆相續人各修之而後備言皆嫌有不皆言審者於此致詳焉言善有不善者矣若度其夕陽豳居允荒此善相者也準直一嵗五榖平準之直收穫在後而先定之著人事苟修天時不能害也是月也命樂正入學習舞鄭氏曰習舞為仲春將釋菜廬陵胡氏曰以春陽動舞動容也鄭謂為仲春將釋菜案文王世子云釋不舞則釋菜不為舞也鄭見下云仲春習舞釋菜又大胥春入學舍菜合舞謂二者是一事不知釋菜習舞不同故月令先習舞大胥先舍菜大戴禮云萬用入學萬謂干舞足明習舞在學何休云湯舞以萬人得天下故干舞稱萬夏小正夏書也樂亦稱萬禹亦以萬人治水也長樂陳氏曰先王之時典樂有常職教學有常時周官大胥以春貌之時合舞以秋言之時合聲文王世子以秋冬學羽籥春夏學干戈其事皆有以循天之理其聲皆有以合人之情而月令季春大合樂孟夏習合禮樂仲夏修樂器蓋秦制也嚴陵方氏曰入學習舞則以將釋菜故也故仲春言上丁命樂正習舞釋菜焉若仲丁之習樂則以季春將大合樂故也孟夏之習合禮樂則以是月將飲酎用禮樂故也仲夏之修鞀鞞鼓之類則以是月將大雩用盛樂故也季秋之習吹則以是月將大饗帝故也季冬之大合吹則以樂其成於終也夫舞與吹皆樂也然舞者樂之容則貌之類也故於春之始言舞蓋木為貌故也吹者樂之聲則言之類也故至秋而後言吹蓋金為聲故也習舞之時非不習吹要之以舞為主爾習吹之時非不習舞要之以吹為主爾於仲丁季春正言樂者則以樂為陽氣於此習合所以道迎陽氣之盛故也正曰樂則於聲容固無所偏主也且孟春之習舞至仲春則可以合矣止亦謂之習者以釋菜之禮為略其舞不足以言合故也上丁則上旬之丁也仲丁則中旬之丁也舞吹與樂皆習之以丁者取其文明之盛也合樂止擇吉日以合樂之大一旬之內非一日可為故也孟春不言日則以方興而習之無時故也季冬不言日則以將罷而合之無時故也孟夏仲夏皆不言日則以文明之盛時無日而非文明故也唯其如是故習合不止於樂而又與禮不止於聲容而又修其器焉凡以順文明之盛而已然而必入學者以學為教人之所故也故於習之時每言焉孟夏習合而不言者以兼於合故也或命之於樂正或命之於樂師者蓋謂之正則於樂之事能正之而已謂之師則於樂之道又為之師焉則重輕之别固可知矣故以其事之重者則命之於樂師以其事之輕者則命之於樂正也至於大合樂則不言者然以大合吹推之則亦命於樂師可知矣馬氏曰徒合舞籥焉者大合舞也備六律六同五聲八音六舞者大合樂也季冬之大合吹命其習於季秋者也季冬之大合樂命其習於仲春者也大胥以春入學合舞秋頒學合聲而此謂之吹者蓋聲藏於器而吹則以氣召聲其實一也乃修祭典命祀山林川澤犧牲毋用牝禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵毋聚大衆毋置城郭掩骼埋胔鄭氏曰修祭典重祭禮歲始省録也毋以牝為傷妊生之類禁止伐木盛德所在也自覆巢至麛卵為傷萌幼之類聚衆置城郭為妨農之始骨枯曰骼肉腐曰胔掩埋為死氣逆生也孔氏曰山林川澤其祀既卑餘月牲皆用牝唯此月不用為傷妊也若天地宗廟大祭雖非正月皆不用牝禁謂禁其欲伐止謂止其已伐者此伐木在山中或在禁障之處十月許人採取正月則禁止之故王制云草木零落然後入山林若國家隨時所須以為材用者雖非冬月亦得取之故山虞有仲冬斬陽木仲夏斬隂木是也毋覆巢至毋卵餘月皆然因初春始生之時故設戒也若夭鳥之巢則覆之見誓蔟氏然此月亦禁之胎謂在腹中未出夭謂生而已出者飛鳥謂初飛之鳥麛卵四時皆禁但於此月尤甚若須薦獻亦得取之故王制云韭以卵庖人秋行犢麛是也蠟氏云掌除胔司農云骨之尚有肉者也及禽獸之骨皆是掩埋互言耳嚴陵方氏曰以祭法考之則祭典古所有也特因歲之更始乃修之而已祀不止於山林川澤然止以是為言者蓋天地宗廟之祭非春亦未嘗用牝故也亦見明堂位周騂剛解上言祭典而下言命祀者亦互相備也禁止伐木禁以法言止以事言也孩蟲言蟲未成如孩者飛鳥則鳥之習飛者毋覆巢殺胎夭麛卵已見王制解凡此所以遂其生育之性也馬氏曰命祀山林川澤百物之所自生也毋聚大衆毋置城郭為其害耕事也掩骼埋胔則推其所愛於其生者以及其死者也山隂陸氏曰命祀山林川澤言命不言命某無所不命也是月也不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀鄭氏曰逆生氣故必天殃兵戎為客不利主人則可故不可從我始變天道謂以隂政犯陽絶地理謂易剛柔之宜亂人紀謂仁之時而舉義事也孔氏曰起兵伐人者謂之客敵來禦捍者謂之主兵戎不合興起之時不可從我而始我謂主人也主人既不先起兵彼來伐我我不得不應天云道地云理人云紀互辭也嚴陵方氏曰稱兵舉兵也兵者人之義事春者天之仁氣苟以人之義事而逆天之仁氣則天災適當之矣兵戎之所以不稱而起之者非不起也特不可以從我始而已老子曰用兵不敢為主而為客蓋不可從我始之謂也故湯之伐桀言造攻自鳴條朕載自亳用兵之義未嘗不然又況方春之始乎既曰兵又曰戎者兵以器言戎以事言道有常也故曰毋變理可通也故曰毋絶紀欲定也故曰毋亂蓋聖人所以交三靈而通之者用是道而已然是道也古今之所同然不必孟春也特以一嵗之首故言之爾馬氏曰一隂一陽道也天以道造始故謂之道萬物得之而居焉者理也理以是作成故謂之理人位天地之間因天道因地理而各立己焉者紀也故謂之紀道可由而不可變理可循而不可絶紀可敘而不可亂廬陵胡氏曰天道若上云司天日月星辰之類地理若上云土地所宜之類人紀若上云布農事之類孟春行夏令則雨水不時草木蚤落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入鄭氐曰行夏令已之氣乘之也四月於消息為乾草木蚤落生日促也國時有恐以火訛相驚行秋令申之氣乘之也七月始殺回風為猋正月宿直尾箕箕好風其氣逆也藜莠蓬蒿並興生氣亂惡物茂也行冬令亥之氣乘之也舊説首種謂稷孔氏曰從上以來論當月施令之事施之順時則氣序調釋施令失所則災害滋興故自此以下論政失致災之事上既云毋變天之道毋絶地之理毋亂人之紀今若施之不失則三才相應以人與天地共相感動故也施令有失三才俱應則此雨水不時天也草木蚤落地也國時有恐人也十二月之內三才俱應者多就三才俱應之中或先言天者或先言民者或先言地者為害重者先言之大略於文可以意得無義例也亦唯有二才應者二才之中或有天有人無地或有地有人無天隨應則書耳行令失之於前氣則應之於後春夏秋施令有失氣應唯在當年冬則應在後年故仲冬行秋令則瓜瓠不成行春令則蝗蟲為敗仲冬非瓜瓠不成之時又非蝗蟲為敗之日是據來年又録記之人序行令之事各次第先後則有夏有秋有冬孟春舉夏為始仲春舉秋為始季春舉冬為始至於夏時之下則有秋有冬次有來年之春孟夏則舉秋為始仲夏則舉冬為始季夏則舉春為始以此推例秋冬亦然不能備説也雨水不時者謂風雨少不得應時以孟春建寅其宿直箕星箕星好風孟春行夏令寅氣不足故風少已來乘之四月純陽用事純陽來乘故雨少注云四月於消息為乾者陽生為息隂死為消十一月至四月為息言萬物得陽氣蕃息五月至十月為消言萬物得隂氣消盡凡孟月失令則三時孟月之氣乘之仲季月失令則仲季月之氣乘之所以然者以同為孟仲季氣情相通如其不和則迭相乘入鄭之所注例亦不同如某之氣乘之或在一句之下或在兩句之下或在三句之下氣當則言無義例也國時有恐者已來乘寅已為火故火來寅為天漢之津火畏水終不來但訛言以火相恐動耳申之氣乘之者七月建申隂氣始殺殺氣乘寅故人多大疫猋風暴雨總至案鄭注洪範中央土氣為風東方木氣為雨箕屬東方木木尅土土為妃尚妃之所好故箕星好風也西方金氣為隂尅東方木木為妃畢屬西方尚妻之所好故好雨也今申氣乘寅兩相衝破申來逆寅寅為風風之被逆故為猋風寅往破申申為雨雨之被逆故為暴雨也案爾雅扶搖謂之猋謂風之回轉也惡物所以害生氣今正氣既亂惡物乘之故藜莠蓬蒿並興也考靈耀云日中星鳥可以種稷則百榖之內稷先種故云首種首即先也蔡雍云首種宿麥也嚴陵方氏曰夫十有二月之令行乎天地之間人君奉之以成位乎其中也苟唯當此一月之節而行彼三時之令則是變天之道絶地之理亂人之紀矣故三者之災以類應焉是何也氣之所召者然爾雨水蓋仲春之節以陽氣早至故不時雨水不時故草木蚤落國時有恐則由盛陽之氣所迫故也凡此皆已之氣乘之山隂陸氏曰草木蚤落以長養之早故雕落之亦早總至同時也並興皆生也藜蓬蒿莠秋草也説者曰此漢儒泥災異之緒言餘論雖行秋令何必爾邪曰天地一人之身是也今小不攝五行相犯而疾病生焉蓋有乘之者矣不入非不熟也熟而不入新安朱氏曰是人行此令則召天之災馬氏曰洪範咎徴曰狂常雨若僣常暘若豫常燠若急常寒若蒙常風若蓋君之五事象天之五行一極無皆凶也狂失之蕩故若常雨僣失之亢故若常暘豫失之緩故若常燠急失之躁故若常寒蒙失之蔽故若常風咎作於上而其驗見於下者如此故云徴焉儒者讀此誤而曰人事失則天必以其類應故指物辨類曰方春而行夏秋冬令則必以此為害三時亦然嗚呼其果可必乎以未可必而必之此人君所以聞而不信也後人藉此而為五行災異之説曰眚祥禍出五事亦欲以警戒人君而卒之不可必也於是人君始怠厭説者之怪迂矣亦何補於警戒之實乎夫洪範以五事為敬用以庶徴為念用則所以警戒之亦至矣蓋所謂君子之言信而有驗者哉禮記集説卷三十九
