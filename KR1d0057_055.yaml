body:
  text: 禮記集說卷五十五宋衛湜撰故𤣥酒在室醴醆在户粢醍在堂澄酒在下陳其犧牲備其鼎俎列其琴瑟管磬鍾鼓脩其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜鄭氏曰此言今禮饌具所因於古及其事義也粢讀為齊聲之誤也周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊字雖異醆與盎澄與沈葢同物也奠之不同處重古略近也祝祝為主人饗神之辭也嘏祝為尸致福於主人之辭也祜福也福之言備也孔氏曰一祭之中凡有兩節上節是薦上古中古下節是薦今世之食此一節緫論今世祭祀饌具因於古昔所供之物并酒所陳之處及獲福之義𤣥酒水也色黒謂之𤣥大古無酒此水當酒所用以今雖有五齊三酒貴重古物故陳設室内而近北也醴謂醴齊醆謂盎齊以其後世所為賤之陳列雖在室内稍南近户也粢醍卑故又南近户而在堂澄謂沈齊酒謂三酒事酒昔酒清酒又卑故在堂下案爾雅粢稷也作酒用黍不用稷故鄭知粢當為齊引周禮五齊酒正文也鄭註云泛者成而滓浮泛然醴猶體也成而汁滓相將盎猶翁也成而翁翁然葱白色醍者成而紅赤沈者成而滓沈酒正醴醍之閒有盎此醴醍之閒有醆又周禮盎齊之下有沈齊此醍齊之下有澄齊故云醆與盎澄與沈同物也陳其犧牲者謂將祭之夕省牲之時及祭日之旦迎牲而入麗於碑案特牲禮陳鼎於門外北面獸在鼎南東首牲在獸西南上北首其天子諸侯夕省牲之時亦陳於廟門外横行西上備其鼎俎者以牲煮於鑊鑊在廟門之外鼎隨鑊設各陳於鑊西取牲體以實其鼎舉鼎而入設於阼階下南北陳之俎設於鼎西以次載於俎也案少牢陳鼎于廟門外東方西面北上又云鼎入陳于東方當序西面北上俎皆設于鼎西是也列其琴瑟者琴瑟在堂而登歌書云搏拊琴瑟以詠是也管磬鍾鼓堂下之樂書云下管鼗鼓笙鏞以間是也其歌鍾歌磬亦在堂下指其精氣謂之上神指其亡親謂之先祖皇氏等云上神天神也祭統曰君在廟門外則疑於君入廟門則全於臣是以正君臣也又云尸南面父北面而事之是以篤父子也又云昭與昭齒穆與穆齒特牲云主人洗爵獻長兄弟衆兄弟是以睦兄弟也又云尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫是以齊上下也禮器云君在阼夫人在房及特牲夫婦交相致爵是夫婦有所也言行上事得所則承受天之祜福也此𤣥酒至合享皆是今世祭祀之禮醴醆犧牲之屬是饌具也𤣥酒醴醆是所因於古也從𤣥酒以下至先祖以上是事也以正君臣至承天之祜是義也故鄭註言今禮饌具所因於古及其事義長樂劉氏曰三酒雖美而𤣥酒為先八音雖縣而人聲為重黼黻雖麗而大裘為尊籩豆雖陳而瓦缶為尚示不忘本也天之正氣四時也地之正氣五行也人之正氣五常也三者形質雖殊本同一氣唯聖人為能用中以合三才之徳是以四時和者天之祜也五行遂者地之祜也五常順者民之祜也非用五禮以事三才則其福順莫得而致矣禮用於上而下民莫不承天之祜其致如此可不務乎長樂陳氏曰道之精常幽𤣥而淡薄道之粗常明著而精美精則常貴而尊粗則常賤而卑先王於名數之閒而未嘗不寓之以道徳之意此𤣥酒所以在室醴醆所以在户粢所以在堂澄所以在下也葢𤣥酒則水也而陳之在室則室者幽之所而且尊也醴醆漸至於致味故用之於朝踐陳之於户則户者幽明之中而尊卑之際也粢醍則醴齊是也用之於饋食而陳之於堂堂者明之所而漸卑也澄酒則清酒是也而用之於尸卒食之三獻故陳之於下下者明之尤著而且卑也昔先王之於鬼神以神道事之則以五齊以人道事之則以三酒犧牲所以致其養琴毖鐘鼓所以致其樂祝嘏所以致其文此固足以降上神與先祖也然上神先祖之降在彼而天祜之承在我在彼者以禮物之所備在我者以禮敎之所成故必正君臣篤父子睦兄弟齊上下以至於夫婦有所也又禮書曰經有言一齊者禮器曰夫人薦盎祭統宗婦執盎從祭義夫人奠盎是也有言二齊者醴齊縮酌盎齊涗酌是也有言三齊者坊記醴酒三齊粢醍在堂澄酒在下是也有言四齊者此經𤣥酒醴醆粢醍澄酒是也有言五齊者酒正五齊實八尊是也天子無一齊諸侯無五齊二齊者天子之時祭一齊者諸侯之時祭宗廟之小祭也自其上而言之又有中焉則記之三齊者宗廟之祫祭也祫祭中祭也自其下而言之又有大焉則記之四齊者宗廟之禘祭也夫禘也祫也四時也人鬼而已自其上而言又有神示焉則周官五齊者天地社稷之事也且天子祭天地而諸侯則社稷而已天子禘其祖之所自出而諸侯則大祖而已天子祫羣廟之主而大夫士及其髙祖則諸侯之祫亦可知也故時祭一齊而祫二齊禘祫三齊社稷四齊是皆可以類而推也又樂書曰先王作樂莫不文之以五聲播之以八音故列琴瑟於南列管於東列磬於西北列鍾於西列鼓於北所以正其位也然琴瑟絲音也與瓦同於尚宫管竹音也與匏同於利制鼓革音也與木同於一聲磬石音也鍾金音也故舉絲以見瓦舉竹以見匏舉革以見木而五聲八音具矣嚴陵方氏曰以室對户室者户之内户者室之外也以堂對下則堂者階之上階者堂之下也禮器曰室事交乎户堂事交乎階又曰未有入室而不由户者坊記曰堂上觀乎室堂下觀乎上則四者之内外上下葢可見矣致其味者於道為逺寡於味者於道為近醴醆雖有味其味寡矣則在户者以由户而内為近故也粢醍其味淺致矣則在堂者以自堂而下為逺故也禮器曰禮之近人情者非其至葢逺人者於道為近也先王所貴者在道而已故言於初朔之後以明後世之禮雖漸致其文亦未嘗不貴其本焉於𤣥於澄皆曰酒者以見始終之所言皆酒而已故坊記則通謂之酒也别而言之則有齊酒之名合而言之齊亦酒而已故周官以掌之於酒正焉犧牲必割而肆之故曰陳鼎有牛羊之異用俎有梡嶡之異名然不一也故曰備琴瑟管磬鍾鼓陳之各有序故曰列以降上神大司樂所謂天神皆降是矣先祖人鬼亦得名曰降者則與詩言三后在天同意延平周氏曰𤣥為道之本而水為齊酒之本故𤣥酒在室貴本也醴醆醴言其齊醆言其器郊特牲曰醆酒涗于清是盎齊亦用餞也齊有五而所陳之處止於三者葢言醴以見盎澄即沈齊也葢沈者在下則澄者在上言澄酒則知清酒在下昔酒在堂事酒在户此言醴醆在户坊記言醴酒在室何也在户非户外也乃在室之户也有齊酒犧牲鍾鼓祝嘏則固足以降上神之與先祖然必待正君臣篤父子睦兄弟齊上下夫婦有所而後可以承天之祜者以備物盡禮為不足以承天而所可承天者先修人事而已矣馬氏曰犧牲者鼎俎之實鼎俎者犧牲之寓犧牲之未殺故言陳鼎俎之未實故言備祭祀之樂其類非一故言列祝者代子之辭以告孝於其父嘏者代父之辭以告慈於其子二者各有其職故言脩自𤣥酒在室推而詳之至於脩其祝嘏所以降上神與其先祖者其禮備矣備禮然後能承祭之本亦敬之本也故十倫之義見於其閒祭祀不祈者言承天之祜也海陵查氏曰陳其犧牲至承天之祜於時未祭也知其必受福爾作其祝號至是謂合莫葢當朝踐之節退而合亨以下葢當饋食之節横渠張氏曰承天之祜順理則是承天祜祜順也山隂陸氏曰此猶未祭也見端而以為承天之祜非早計也䕫曰於予擊石拊石百獸率舞葢似之矣易曰觀盥而不薦有孚顒若當此節故曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利作其祝號𤣥酒以祭薦其血毛腥其俎孰其殽與其越席疏布以冪衣其澣帛醴醆以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫鄭氏曰此謂薦上古中古之食也周禮祝號有六一曰神號二曰鬼號三曰祇號四曰牲號五曰齍號六曰幣號號者所以尊神顯物也腥其俎謂豚解而腥之及血毛皆所以法於大古也孰其殽謂體解而爓之此以下皆所以法於中古也越席翦蒲也冪覆尊也澣帛練染以為祭服嘉樂也莫虚無也孝經說曰上通無莫孔氏曰此一節眀祭祀上節用上古中古之法𤣥酒血毛腥俎是用上古也孰其殽以下用中古也案周禮大祝辨六號註神號若昊天上帝鬼號若皇祖伯某祇號若后土地祇牲號若牛曰一元大武齍號若稷曰眀粢幣號若幣曰量幣神鬼祇是尊神牲齍幣是顯物謂造此美號之辭祝史稱之以告鬼神故云作其祝號也𤣥酒以祭者謂朝踐之時設此𤣥酒於五齊之上以致祭鬼神所以重古其實不用以祭薦其血毛者亦朝踐時延尸在堂祝以血毛告於室也腥其俎者亦謂朝踐時既殺牲以俎盛肉進於尸前也案士喪禮小斂之奠載牲體兩髀兩肩兩胉并脊凡七體也士虞禮主人不視豚解註云豚解解前後脛脊脇而已是豚解七體也案特牲少牢以薦孰為始之時皆體解無豚解以無朝踐薦腥故也其天子諸侯既有朝踐薦腥故知腥其俎為豚解孰其殽為體解而爓之體解則特牲少牢所升於俎以進神者是也案特牲九體肩一臂二臑三肫四胳五正脊六横脊七長脅八短脅九少牢則十一體加以脡脊代脅為十一體也是分豚為體解此孰其殽謂體解訖以湯爓之不全孰次於腥而薦之堂故祭義曰爓祭祭腥而退是也此腥以法上古爓法中古也與其越席䟽布以冪衣其澣帛皆謂祭初之時越席謂蒲席疏布謂麤布若依周禮越席疏布是祭天之物此云君與夫人則宗廟之禮此葢記者雜陳夏殷諸侯之禮故雖宗廟而或用鄭註澣帛練染以為祭服亦異代禮周禮則先染絲乃織成為衣故玉藻云士不衣織醴醆以獻者朝踐之時用醴饋食之時用醆燔炙謂燔肉炙肝案特牲禮主人獻尸賔長以肝從主婦獻尸賔長以燔從則此君薦之用炙夫人薦用燔是也詩楚茨云或燔或炙第一君獻第二夫人獻第三君獻第四夫人獻是君與夫人交錯而獻也設此在上祭禮所以嘉善死者魂魄而神來歆饗是生者合於虚無寂莫也但禮運之作因魯之失禮孔子乃為廣陳天子諸侯之事及五帝三王之道其言雜亂或先或後其文不次舉其大綱不可以一代定其法制不可以一槩正其先後若審此理則無所疑惑嚴陵方氏曰上言脩其祝嘏未見其所以為號故此言作其祝號上言𤣥酒在室醴醆在户未見其所以為用故此言𤣥酒以祭醴醆以獻上言陳其犧牲備其鼎俎故此又言腥其俎孰其殽薦其血毛燔炙焉非特此而已而又廣及於所設之越席所冪之疏布所衣之澣帛焉葢血所以告幽毛所以告全腥其俎則事之以神道孰其殽則事之以人道越席則郊特牲所謂蒲越稾鞂之尚是矣疏布禮器所謂犧尊疏布鼏是矣澣帛則祭統所謂以供純服是矣凡此所言則合古今之異質文之變也君自阼而西酌犧尊夫人自房而東酌罍尊故曰君與夫人交獻魂陽也魄隂也而其祭或以酒之陽或以食之隂或以腥之陽或以孰之隂或以氣之陽或以味之隂且又言與夫人交獻焉則隂陽之義備矣故足以合禮於魂魄馬氏曰腥其俎者言近於古也孰其殽者因之於今也與其越席疏布以冪衣其澣帛言近於古也醴醆以獻薦其燔炙亦因之於古也禮備於古今而又夫婦親之所以致其敬故曰交獻以嘉魂魄夫魄者魂之體魂者魄之用體用合之則生離之則散故合鬼與神以祭於宗廟之中所以嘉魂魄是謂合莫合莫者以鬼神之在幽而合魂魄以祭於虚無之閒而已山隂陸氏曰與其越席疏布以冪以與以别之者以承孰其殽之下文質弗類也衣其澣帛詩曰害澣害否𫝊以謂私服宜澣公服宜否婦人有副翬以接見君子見舅姑其餘則私也然則衣其澣帛葢自褕狄而下且言澣帛則亦以著潔其衣服醴醆以獻當朝踐之節葢君酌醴齊以獻尸夫人酌盎齊以亞獻然則饋食以下用酒可知司尊彛曰鬱齊獻酌當祼獻醴齊縮酌盎齊涗酌當朝踐凡酒脩酌當饋食謂之凡酒則王酌昔酒以獻尸后酌清酒以亞獻禮器曰君親制祭夫人薦盎君親割牲夫人薦酒長樂陳氏曰楚茨先言執爨而繼之以或燔或炙鳬鷖先言爾殽而終之以燔炙芬芬禮運亦先言孰其殽然後繼之以薦其燔炙周禮量人制從獻脯燔之數量特牲主人獻尸賔長以肝從主婦獻尸賔長以燔從是燔以肉炙以肝燔炙在血腥爓孰之後非祭之所先也謂之從獻非獻之正味也故制之不在司士而在量人獻之不在主人而在賔特祭義言建設朝事燔燎羶薌繼之以薦黍稷羞肺肝加以鬱鬯而鄭氏謂朝事君親制祭則親制其肝洗鬱鬯而燔之以詔神於室又出以墮於主前然則主人用肝之禮又與從獻者異矣禮書延平周氏曰𤣥酒以祭醴醆以獻何也𤣥酒陳之而已非獻也君陽也所以嘉魂夫人隂也所以嘉魄合二者以定之故曰合莫莫定也蔣氏曰此章盛言禮之備矣而猶首以𤣥酒血毛之薦此足以見聖人言禮之要旨祝號之名載於周禮葢神祗之位與夫牲幣之陳各有名稱若夫祭祀則有朝踐有饋食至今世猶髣髴而行之未泯也自是謂合莫以上先儒以為朝踐之節自是謂大祥以上先儒指為饋食之節夫朝踐為禮之始饋食為禮之終始貴乎嚴終極其備故血毛俎腥殽孰越席疏布之事猶有貴乎古先也乃曰合莫謂其本是精誠以求神於㝠漠之間也合亨體薦籩豆簠簋鉶羮詞說之詳是後世之所備也乃曰大祥謂其舉是備禮而極其祥善之義也葢聖人制禮豈容一毫之偽方其合莫以求神也物味薄而誠敬在禮文簡而精神通至於成禮而致詳也品物具而神祗樂誠意散而詞說行學者苟能究觀聖人終始考禮之意而得之於想像形容之妙則凡品物之陳節文之變皆有深長之義存乎其間大學曰心誠求之雖不中不逺矣此之謂也以牲牷肥腯祝史矯舉足以要神而致福鳥足言禮之本始哉然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮祝以孝告嘏以慈告是謂大祥此禮之大成也鄭氏曰此謂薦今世之食也體其犬豕牛羊謂分别骨肉之貴賤以為衆俎也祝以孝告嘏以慈告各首其義也祥善也今世之食於人道為善也孔氏曰此論祭饋之節供事鬼神及祭末獻賔并祭竟燕飲饗食賔客兄弟也然後退而合亨者前明薦爓既未孰今至饋食乃退取曏爓肉更合亨之令孰擬更薦尸又尸俎惟載右體其餘不載者及左體等亦於鑊中亨煮之故云合亨亨之既孰乃體别骨之貴賤以為衆俎供尸及待賔客兄弟等知非尸前正俎者以此經所陳多是祭末之事故為祭末饗燕之衆俎也實其簠簋籩豆鉶羮者此舉事尸之時所供設也若籩豆亦兼據賔客及兄弟等祝以孝告嘏以慈告者孝子告神以孝為首神告孝子以慈為首各本祝嘏之義也案少牢祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦嵗事于皇祖伯某以某妃配某氏尚饗是祝以孝告少牢又云主人獻尸祝嘏主人云皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受禄于天宜稼于田眉夀萬年勿替引之是嘏以慈告薦今世之食於人道為善故為大祥長樂陳氏曰夫飲食號復宫室布帛之用具則養生送死之禮成矣三酒犧牲鼓鍾祝嘏之用具則事神之禮成矣正君臣篤父子睦兄弟齊上下則敎人之禮成矣是合三者所以為禮之大成延平周氏曰所羞者以上世之禮物為主而君與夫人交獻以嘉魂魄者合莫而已所羞者以後世之禮物為主而祝以人之孝而告於神嘏以神之慈而告於人是謂大祥祥者言福之兆朕見於此也嘏亦祝也而謂之嘏者以其𫝊尸之言而所告者皆福也奉上世之禮物而罕及於後世者則無文奉後世之禮物而罕及於上世者則無本有本有文此之謂禮之大成也臨川王氏曰禮之大成此亦禮之一節耳孔子曰禮云禮云玉帛云乎哉籩豆玉帛非禮之本雖禮以祭祀為重要其義亦不在乎𤣥酒羮胾之為急而謂之禮之大成也嚴陵方氏曰合亨則合衆物而亨之犬豕牛羊骨有貴賤各異體焉故曰體以稻粱而實簠以黍稷而實簋以水土之品而實籩豆以五味之和而實鉶鼎故曰實祖禰所以望子孫者莫大乎孝故祝以孝告子孫所以賴祖禰者莫過乎慈故嘏以慈告夫禮至於此則始於古而成於今始於質而成於文矣故曰大成也山隂陸氏曰祥吉之先見也君與夫人交獻以嘉魂魄是謂合莫此鬼事也亦哀事也祝以孝告嘏以慈告是謂大祥此人事也亦吉事也孔子曰嗚呼哀哉我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也故天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大假鄭氏曰政亂失禮以為魯尚愈也非禮猶失禮也周公之道衰言魯子孫不能奉行興之也天子之事守言先祖法度子孫所當守也假亦大也不敢改其常古之法度是謂大假也將言今不然孔氏曰自此至篇末是為第四節正明孔子嘆意也嗚呼哀哉是傷嘆之辭言觀周家文武之道以經幽厲之亂傷此禮無可觀瞻舍魯國更何適而觀禮乎故韓宣子適魯云周禮盡在魯矣魯郊禘非是非禮但郊失禮則牛口傷禘失禮則躋僖公子孫不能奉行周公之禮也把郊禹宋郊契葢是夏殷天子之事把宋是其子孫當所保守案祭法夏郊鯀殷郊冥與此異者以鯀冥徳薄故更郊禹契葢時王所命也天子諸侯所祭之時祝以主人之辭而告神神以嘏福而與主人二者皆依舊禮是於禮法大中之大也從此以前皆論法於古道則為善如承天之祜合莫大祥大假皆論其善也所以論其善者將論其惡故也自此以下皆論今時之惡横渠張氏曰魯之郊禘非禮也夫子固已明言之把宋則為其二王之後也魯用天子禮樂必是成王之意不敢臣周公即以二王之後待魯然而非周公之本意也以成王尊徳樂道之心則善矣伯禽不當受故曰魯之郊禘非禮也周公其衰者謂周公必不饗其祀周公用天子禮樂或以為有人臣不可為之功則當用不可用之禮夫有權有位則人臣所遇當如此至用天子之禮樂則非也故魯之郊禘非禮也家臣僣大夫三桓僣魯魯僣天子推其原皆在成王成王賜伯禽天子禮樂自其時已啟下僣上之階矣臨川王氏曰吾舍魯何適矣魯當孔子時屢遭亂與周何異孔子乃問禮於魯則魯未必愈於周也如眀堂皆推魯美皆非其實疑於此皆魯儒之妄也魯一變至於道或者其是乎又曰魯有周公之功而用郊不亦可乎魯之郊也可乎曰有伊尹之心則放其君可也有湯武之仁則絀其君可也有周公之功用郊不亦宜乎嚴陵方氏曰序加幽於厲上者則以幽之為惡大故也周公之澤百世而不斬而以為衰者特其制作𫝊世之迹爾祝則君假之以告神者也嘏則尸假之以告人者也而祝嘏辭說古常有訓不可易焉故曰莫敢易其常古也馬氏曰夫郊者天子外祭之重者也禘者天子内祭之重者也郊禘者天子之禮非諸侯所宜有也成王非所宜錫也成王非所錫而錫之魯君非所受而受之此魯之郊禘所以為非禮故曰周公其衰矣所謂衰者非周公之衰也言後世僣用天子之禮此周公之道所以為衰矣把宋皆天子之事守魯之郊禘非天子之事守故曰非禮有曰夏后氏禘黄帝而郊鯀殷人禘嚳而郊冥而此曰把之郊也禹也宗之郊也契也言之異者何也葢郊鯀與冥者以其始而言之也郊禹與契者以其終而言之也夫湯革夏則命把以郊禹武王勝商則命宋以郊契此禮運之言亦既終而言之也天有覆物之功地有載物之功故天子祭天於地上之圜丘祭地於澤中之方丘諸侯者守天子之土而養一國之民故祭社稷社者土神稷者穀神天子有祭社稷者葢上得以兼下下不得以兼上祝嘏之情非聖人不能知非天子不敢作非聖人不能知則在上者率由舊章而莫敢易非天子不敢作則在下者謹守其法而已山隂陸氏曰嗚呼哀哉非直嘆而已我觀周道幽厲傷之吾舍魯何適矣此孔子所以嘆也把宋既不足徴周又如此而魯亦不能以有為也凡言禘郊禘嘗在上郊郊稷禘禘嚳故也祭法所謂禘郊國語所謂禘郊之牛角繭栗之類是也爾雅曰禘大祭也亦以此今此言郊更在其上則魯郊郊稷禘禘周公而已言周公其衰矣以愛之深故望之至所謂責備賢者葢如此把之郊禹也言以禹故故郊與魯不同宋之郊契也言以契故故郊亦與魯不同所謂常古葢自古以來所不變延平周氏曰周公有人臣所不能為之功故用人臣所不得有之禮此魯所以有郊者也然郊不三卜而魯之卜者有至於四而後免牲猶三望禘者禘其祖之所自出以祖配之而魯之禘有行於莊公之廟者皆非禮也書曰統承先王脩其禮物此把宋所以有郊也然僣莫僣於祭祭莫重於地地莫重於天而把宋之不嫌於僣者是天子之事所當守也天子祭天地諸侯祭社稷此祭祀所以馭其神君有假於祝尸有假於嘏而祝嘏莫敢易其常古之辭說則謂之大假者葢唯大者為可假假與豐亨王假之假同意三山林氏曰春秋郊望之旨三𫝊諸儒之說無得之者無他知求小禮而昧於大禮故也經書郊者九皆為有故而書非因卜不吉而廢郊則因牲死傷而廢郊又有不待卜之吉而特郊雖牛之死傷而必郊者先儒之說不過罪其屢卜與其養牲不謹爾不知聖人書郊乃惡其非禮之大者至屢卜之瀆養牲之慢非春秋所貴也學者欲究聖人之旨先當㫁魯郊之當否未暇及其瑣瑣也夫子傷周之衰禮樂自諸侯出其魯之郊禘則有周公其衰之嘆豈有天子郊天諸侯亦郊天天子望祀山川諸侯亦望天子禘祖之所出諸侯亦禘使諸侯亦可行則聖人不以禮樂自諸侯出為傷自夫子没漢儒不知道者但見春秋書魯祭祀多天子之禮始妄設周賜禮樂之說所以諸儒不以魯郊為非雖周郊以冬至而魯用之於啟蟄天子四望而魯三之名為後時降殺但竊郊望之名已有罪矣譬如商賈冠師儒之冠庶人服卿相之服望其容飾已知其非分越制也予謂春秋所書之旨正以有故而不郊者為幸無故而郊者為大罪也季氏旅於泰山夫子曰曽謂泰山不如林放乎泰山有知必不享季氏之祭矧上帝而可諂乎宜乎至於三卜四卜五卜不從鼷鼠屢食其牛可見天心之不享也魯人曽不知得罪於天雖屢卜不從而猶三望雖牛死而改卜牛甚者至於用郊可知僣擬之心不能自已下破王制上拂天心其罪為大也深味春秋之旨曰猶三望曰乃免牲其深矣乎其㣲矣乎蔣氏曰君臣天下之大分也禮不王不禘故郊禘為王者盛事經典所載𫝊註所釋有曰祭上帝於南郊有曰祭昊天於圜丘有曰祀五方感生帝均為郊禘之事也配天以祖其義甚重魯諸侯國也安得有郊明堂所記以為周公有大勲勞成王賜以重祭說者遂以為據如春秋書郊之類皆以為時與事之失非其僣也夫天子祭天地諸侯祭社稷大者有以兼乎小小者不得以僣乎大亦截乎甚嚴矣魯之用郊春秋固許之乎前輩為之說曰魯不得用天子禮樂是成王過賜而伯禽受之非也夫以伯禽受之為非而成王之時禮典未壊固應有是用之之事乎識者又從而為之說曰賜非成王是周之末王賜之也昔者魯惠公使宰請郊廟之禮於天子天子使史角往止之使成王之世而魯已郊則惠公奚請惠公之請殆由平王以下也是說然矣自今言之聖人觀周道而傷幽厲論郊禘而衰周公則重祭賜魯豈盛時賢君事其出於衰世天子諸侯無疑也故聖人恥魯之事而因及把宋之郊把之郊也存禹後也守之郊也存商後也是宜以禹契而配天周祀后稷魯以周公配天於周公能無愧於后稷太王王季文王乎是周公之所弗居故曰祝嘏莫敢易其常古是謂大假假亦大也祭之始也祝以主人之辭而告神祭之終也嘏以神之辭而致福於主今以諸侯僣天子之祭事不因其常古則孝忠報反之意名稱位號之别將有所紊亂變更而失其宜矣聖人於春秋之郊不予而非魯之僣竊其說甚眀設從𫝊註烏足以發明聖人立言之本旨祝嘏辭說藏於宗祝巫史非禮也是謂幽國醆斚及尸君非禮也是謂僣君冕弁兵革藏於私家非禮也是謂脅君大夫具官祭器不假聲樂皆具非禮也是謂亂國鄭氏曰藏於宗祝巫史言君不知有也幽闇也國闇者君與大夫俱不明也醆斚先王之爵也唯魯與王者之後得用之耳其餘諸侯用時王之器而已僣君謂僣禮之君也冕弁君之尊服兵革君之武衛及軍器脅君謂劫脅之君也臣之奢富擬於國君敗亂之國也孔子謂管仲官事不攝焉得儉孔氏曰祝嘏辭說當依古法今乃棄去不用藏於宗祝巫史之家更易古禮自為辭說非禮也醆是夏爵斚是殷爵冕是衮冕弁是皮弁大夫以下稱家私藏公物見此君恒被臣之劫脅也天子六卿諸侯三卿大夫若有地者置官一人兼攝羣職不得具足其官大夫無地則不得造祭器有地雖造而不得具足並須假借唯公孤以上得備周禮四命受器鄭云此公之孤始得有祭器者也又云王之下大夫亦四命大夫自有判縣之樂不得如三桓舞八佾一曰大夫祭不得用樂故少牢饋食無奏樂之文唯君賜乃有之大夫並為上事與君相敵則非禮也延平周氏曰夏曰醆殷曰斚醆斚非時王之爵而諸侯有用之及尸君者非禮也所謂及尸君者君以獻尸而尸以酢君者也私家卿大夫之家也先王以仁義善天下之俗而兵器常藏於民至於私家藏之則為非禮者豈非以私家之貴且尊為有嫌歟以官事不攝於聲樂皆具為非禮則然矣以祭器不假為非禮則誤矣王制曰大夫祭器不假祭器未成不造燕器果大夫祭器猶且假之則燕器葢未嘗有殆非先王養成徳者之義也長樂劉氏曰周官大祝掌六祝六祈六辭六號九祭九􅉔之辭與法皆繫諸六典之稽而藏於大史屬諸春官上下相維不可少廢也今仲尼之時遭幽厲之君傷春秋之亂祝嘏辭說藏於宗祝巫史之家遂使國之禮典幽暗不眀故曰幽國也天子備六代禮樂其祭於宗廟也獻酢君尸則用醆斚今也諸侯亦用之不曰僣君乎始僣於禮樂終僣其政刑然後簒弑之心生焉故巡守四方必考其禮樂制度防僣亂也嚴陵方氏曰祝以孝告嘏以慈告故有說辭而辭說固有常古焉天下之所共知也若夫藏於宗祝巫史之家則是非孝慈之言且不欲人之知爾豈所以為神明之道哉故曰是謂幽國山隂陸氏曰春秋𫝊曰晉侯以歌鍾二肆賜魏絳於是始有金石之樂禮也杜氏謂大夫有功則賜然則大夫未賜樂假於大夫蔣氏曰禮莫嚴於祭然誠敬不根於内心則交神之道虧用器或忘乎分守則僣上之患起聖人所甚懼也祝嘏辭說此豈交神明之虚語聖人舉孝慈相感之義以發之於禮經而詩有之曰令終有俶公尸嘉告葢致祭受福之義盡之於對越無愧之素而行之於精神必通之時誠非具文也如有出於宗祝巫史襲以藏之而有事之際舉以行焉自謂神明之及交其謂之幽國宜哉至於爵有醆斚夏商所制也禮天子奠斚諸侯奠角郊特牲言舉斚角詔妥尸禮器宗廟之制卑者舉角等級明甚今諸侯之制而醆斚以及尸安得不謂之僣君噫聖人言禮至是則亦甚不得已矣若是則大夫安得不僣諸侯哉繁纓小物君子惜之今也冕弁藏於私家弓矢鈇鉞諸侯猶俟命於天子今也兵革藏於私家六命賜官限制甚嚴而大夫具官不由於所賜四命受器自有彝典而大夫聲樂皆具祭器不假此所以官事不攝反坫為禮八佾舞庭三分公室竊攘僣逼之事莫之禦歟甚而至於君臣同國此聖人所以傷今思古固有望於隆禮之君也金華應氏曰祝嘏辭說藏於公而不藏於私若金縢納於匱中是也周公不欲宣其事而揚己之功故命祝史勿敢言若夫常時祭祀之辭說未嘗不使人知之也故曰宣祝嘏辭說茍欲聴宗祝巫史為之而又俾私其藏不為隨之矯舉則為漢之祕祝矣故仕於公曰臣仕於家曰僕三年之喪與新有昏者期不使以衰裳入朝與家僕雜居齊齒非禮也是謂君與臣同國鄭氏曰臣有喪昏之事而不歸反服其衰裳以入朝或與僕相等輩而處是謂君臣共國無尊卑也有喪昏不歸唯君耳臣有喪昏當致事而歸僕又不可與士齒孔氏曰公是諸侯之號仕於諸侯則稱臣仕於大夫之家則稱僕君有喪昏則恒在於國臣有喪昏則歸家一期之閒不復使役今臣有喪乃不致事著衰裳入君朝是君與臣同國又臣是君之臣僕是臣之僕今卿大夫或與家臣之僕錯雜而居齊齒等輩尊卑無别亦是君臣共國也馬氏曰凡仕於公者皆曰臣非一諸侯之國也凡仕於家者皆曰僕非一大夫之家也說者以謂諸侯之國大夫之家葢非是也三年之喪與新有昏者期不使所以别君臣之禮也以衰裳入朝是君臣無别也與嚴陵方氏曰臣者對君之稱故仕於公曰臣而諸侯稱君者以此僕者對主之稱故仕於家曰僕而大夫稱主者以此然通而言之臣亦可謂之僕若周官所謂戎僕齊僕之類是矣僕亦可謂之臣若左氏所謂皂臣輿臣之類是矣名雖可通而位不可不辨故於家僕雜居齊齒為非禮也曲禮曰苞屨扱袵厭冠不入公門王制曰仕於家者出鄉不與士齒則此所言非禮宜矣齊齒者與之等夷而序齒也横渠張氏曰與家僕雜居齊齒葢謂仕於家者不可與仕於公者齊齒如此則亂矣若季氏之臣陽虎者其於朝廷豈特齊齒而已仍有畏偪之勢延平周氏曰均仕也一為僕則其臣不得與之雜居齊齒先王之正各其詳至於如此新有昏期不使則然也三年之喪止於期不使非也故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度鄭氏曰言今不然春秋昭元年秦伯之弟鍼出奔晉刺其有千乗之國不能容其母弟孔氏曰王制云天子之田方千里其子孫有功徳者封為諸侯無功徳者直食邑於畿内也諸侯子孫封為卿大夫若有功徳者亦有采地故左氏曰官有世功則有官族邑亦如之大夫雖不得割其采地以處子孫然亦以采地之禄養其子孫耳從幽國以下皆論其臣惡今此云是謂制度而論善者此論古之制度如此今日則不然長樂劉氏曰天子諸侯大夫有田以處其子孫者三等封疆大小各從其位不可以増減也是謂制度守其制度則有足以處其子孫矣則其臣僕敢踰厥分以齒其子孫哉長樂陳氏曰制則有所裁度則有所限先王以人之子孫上以承先祖之祀下以綿本支之世莫不思有以處之然其處之則有所裁之制所限之度此固不可無尊卑隆殺之别也天子不曰天下而曰田所以明其止於千里以與天下共之也諸侯不曰田而曰國所以明其専於百里而非與天下共之也大夫食其所有事者故其地命之曰采采者事也凡此言其大法而已若夫諸侯大夫之子其不肖者固不可以世食而大夫之子茍其賢之過人又不止於食舊而已延平周氏曰人莫不有子孫之愛故先王有法以節之也自天子而下雖莫不有以處之而處之者則異矣是以謂之制度大夫則衆矣果子孫皆世有采邑則王畿之内所不能容豈非量功徳之大小而限世數之乆近乎嚴陵方氏曰夫天下之大天子以之處子孫而不以為泰國家之小諸侯大夫以之處子孫而不以為儉豈非以制度之所寓乎於天子言田則知諸侯之國大夫之采亦田而已於諸侯言國則知天子之為天下大夫之為家也蔣氏曰天下為公禄位不私而與賢天下為家始有世及以為禮夫公固賢於家也與賢固大於相及也而事變之推移則定制之攸設聖人所以立與子不易之論以為天下常行之法以鎖天下相攘之心故方千里者天子之田也而為天子子孫之定守方百里或七十里或五十里者諸侯之國也而為諸侯子孫之定守或倍上士或四大夫禄或三大夫禄或二大夫禄者卿大夫之采也而為卿大夫子孫之定守是以封建既行分守一定上下相安僣偪不形謂之制度迨其衰也天子不能有其天下諸侯不能有其國大夫不能有其家朝聘不修而㑹合無度交際不明而出入隳禮金華應氏曰處者位置而區處之各得其宜大者謹其禮而無濫恩小者安其分而無歉志以制度不可踰也制度一定則人欲偏厚其子孫者固無所容其私心而侵剥枝葉兼并同姓者亦不容薄於所厚矣春秋之時請京之不度封沃之盛強皆私暱為患也至晉無畜羣公子秦不能容一弟甚矣新安王氏曰一曰幽國二曰僣君三曰脅君四曰亂國五曰君與臣同國此皆諸侯卿大夫失禮也禮之失起於制度之壊故此眀言先王制度大小有等尊卑有辨天子地方千里有田以處其子孫諸侯不得僣也諸侯地方百里有國以處其子孫卿大夫不得僣也卿大夫各有食邑以處其子孫家臣不得僣也制度一定上下截然安得有前五失諸侯僣差起於天子失禮卿大夫僣差起於諸侯失禮故下文言之故天子適諸侯必舍其祖廟而不以禮籍入是謂天子壊法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔鄭氏曰以禮籍入謂大史典禮執簡記奉諱惡也天子雖尊舍人宗廟猶有敬焉自拱勑也諸侯無故而相之是戲謔也陳靈公與孔寜儀行父數如夏氏以取弑焉孔氏曰陳靈公弑宣十年左𫝊文長樂劉氏曰諸侯敬於天子雖其祖先宗廟亦不敢私有乃以舍至尊上下之分此亦至矣然而天子必以太史所掌之禮籍入處其廟言動之際必據乎禮示不敢慢於所明也茍違於禮無以明人非天子壊法亂紀耶延平周氏曰天子適諸侯必以禮籍舍於祖廟諸侯唯問疾弔喪則入諸臣之家先王制禮之意可謂㣲矣而後世猶不免有株林之誚者非禮之罪也嚴陵方氏曰舍其祖廟者在諸侯則不敢為之主在天子則不忘於所敬故也禮籍若小行人掌邦國賔客之禮籍之類乃法之所以存紀之所以立今也不以入故曰壊法亂紀蔣氏曰天子適諸侯曰巡狩因以考制度於四方諸侯皆得朝於方嶽之下所以巡省風俗而混一軌轍也晉文召天子事已非矣猶作王宫於踐土豈有躬造諸侯之國都舍臣下之祖廟而不由禮籍之所當行者乎故曰是謂天子壊法亂紀諸侯有一國因問疾弔喪入諸臣之家所以憫難恤患見厚下之禮乃若出入無名率意以行此固馳驅而往之事所由萌乎君臣無私交聖人嚴之故曰是謂君臣為謔推原其事是豈一朝一夕之故在易之履所以制禮方其上天下澤邈然其不相接也而上下以辨民志以定聖人觀㑹通以有行使其事必出於名義之所宜有而後交際酬酢之道興焉不然則妄動而兆亂事出於㣲而禍成於著也是故禮者君之大柄也所以别嫌明㣲儐鬼神考制度别仁義所以治政安君也鄭氏曰疾今失禮如此為言禮之大義也柄所操以治事孔氏曰人君治國須禮如巧匠治物執斤斧之柄此以下明用禮為柄之事寡婦不夜哭别嫌也君子表㣲明㣲也接賔以禮曰儐郊天祀地及一切神明是儐鬼神也考成也制度以禮成之也仁義各使中禮有分别也用禮為柄如前諸事故治國得政君獲安存孝經云安上治民莫善於禮長樂劉氏曰天下至衆也非一人之力可得而制焉唯貴賤之禮明於天下然後可以無為於巖廊之上而四海莫敢不為臣妾以尊崇之則禮非大柄能治億兆如此乎尊卑嫌者則以貴賤别之長少嫌者則以親疏别之先後嫌者則以上下别之則人倫之類可齊於五品而嫌疑判矣著誠去偽莫善於禮能正民心於幾㣲之先定民志於意慮之始故上天下澤履君子制禮以象之辨上下定民志也志在於心未形於言動也惟禮為能定之於心不曰明㣲哉儐鬼神者人能用禮以致其誠則天神地祇人鬼可得而饗之以致休祥焉考制度者謂天子謹其職事莫大乎禮故巡守於四方必考其制度恊者存之亂者誅之所以一天下於中和齊四海以禮樂也則仁義之賢由之而可别悖亂之失由之而可除賞善罰惡黜幽陟明之道行焉然則所以治政而安君者不柄以禮其可致哉延平周氏曰儐助之也言禮之精則必至於助鬼神而其粗則考制度别仁義而已所謂别仁義者葢禮所以節文二者故有别意長樂陳氏曰禮之有體可執以治國猶器之有柄可執以治事故曰禮者君之大柄也惟其為大柄則能别嫌於難辨明㣲於未彰幽可以儐鬼神明可以考制度别仁義以至於治政安君也馬氏曰禮者刑政之本也治國不以禮則操特悖謬而失其所要故曰大柄柄言其所執之要也嫌者人之所難别而禮有以别之㣲者人之所難明而禮有以明之鬼神在其幽而人不可測度者也而禮有以使鬼神之格故曰儐以禮賔之也制所以裁度所以節皆禮有以考之仁有殺義有等皆禮有以别之夫觀其禮所以知其政禮之所興則政之所治禮之所變則政之所亂安上治民莫善於禮者所以治政安君也嚴陵方氏曰稽考制度而用其中故曰考節文仁義而致其辨故曰别蔣氏曰禮足以為政而刑則以輔禮敎所不及自昔伯夷降典臯陶作士雖有虞盛時不能主一而廢一後世遂有禮刑表裏之論然自古聖人於斯民出禮入法之際凜乎甚畏之也故於刑政之弛張足以見禮敎之盛衰方其禮盛於天下尊卑有守而大柄不移是以嫌㣲明鬼神序制度設仁義行民有尊君親上之風而無勢力相軋之習經曰禮之敎化也㣲其止邪也於未形是非有以驅之使正也葢其節文顯設之間所以潜銷天下之血氣忿戾而為中正無邪之歸者多矣若是則政安得而不治君安得而不安及夫禮衰而俗敝則肅刑以防姦舉天下不齊之情欲一以納於從善之地彼其有力者攘有智者謀有勇者偪有巧者詐君臣岌岌乎其上鰓鰓然唯恐天下之軋已而亦卒無以制其末矣是之謂無以移其平日之素而一旦以臨之者也故曰是謂疵國聖人議禮自是謂幽國以下詳言後世廢失之序而終之以刑肅俗敝其所以示戒嚴哉故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常而禮無列禮無列則士不事也刑肅而俗敝則民弗歸也是謂疵國鄭氏曰又為言政失君危之禍敗也肅駿也疵病也孔氏曰大臣謂大夫以上倍謂倍君行私小臣士以下竊謂盜竊府庫君位已危大臣又倍小臣盜竊愚君無奈此何惟知暴怒急行刑罰故云刑肅上下乖離故云俗敝敝凋殘也俗敝刑肅法敎無常皆國之病故云疵國黄氏曰君以禮為大柄政不正者失其禮之大柄者也君不執禮故大臣得以肆情踰倍其僣如晉國三軍而又立三行之類是皆倍増其禮而僣其上者也小臣竊者以位卑權下但竊幸僣越者也倍之與竊皆君失政柄上下僣濫既大小競僣則諸侯倍而僣天子大夫倍而僣諸侯貪瀆公行矣但執禮之君則諸侯變禮易樂革衣服制度或討或流無倍竊之失矣長樂陳氏曰政不正則君位危所謂上無道揆也則大臣倍而不法小臣竊而不亷所謂下無法守也上無道揆下無法守則刑肅而不中俗敝而不美法亂而無常禮紊而無别所謂士者亦不事其事也士不事其事則民亦不歸之矣然重言刑肅而俗敝者葢以亂之所致多在刑肅以其刻核太至故也夫治之為道由内以及外故禮出而後有法法出而後有刑及其亂也由外以及内故刑肅而後法無常法無常而後禮無列矣馬氏曰禮者政之本政者禮之用政不正則無以安其上故曰君位危君位危則上下之分失矣上下之分失則大臣倍小臣竊大臣勢足以有為故言倍小臣勢不足以有為故言竊嚴陵方氏曰大臣倍非所謂大臣法也小臣竊非所謂小臣亷也國有常法制民於刑之中而已茍刑肅而至於俗敝則法失其常矣故曰法無常法以禮為體禮以法為用用既無常則體亦無列故言禮無列無列者失其序之謂也是則人不安其職矣故言士不事葢士以事事為正故也刑肅而俗敝民將畏罪而離散矣故言則民弗歸也俗敝民散又何以致國之肥乎故以疵言之山隂陸氏曰大臣倍若三家是也小臣竊若陽虎竊寳玉大弓是也長樂劉氏曰刑加以肅本以削亂也亂不可削而反以殘民焉敎民為亂者無刑而受敎從亂者得罪此俗所以敝而民逃於他邦而弗歸之適足以疵病其國而已矣延平周氏曰政刑與禮三者皆失則豈特疵國而已哉蔣氏說見前故政者君之所以藏身也是故夫政必本於天殽以降命命降于社之謂殽地降于祖廟之謂仁義降於山川之謂興作降於五祀之謂制度此聖人所以藏身之固也鄭氏曰於此又遂為之言政也藏謂輝光於外而形體不見若日月星辰之神降下也殽天之氣以下敎令天有運移之期隂陽之節也降于社謂敎令由社下者也社土地之主也周禮土㑹之法有五地之物生降于祖廟謂敎令由祖下者大𫝊曰自禰率而上至于祖逺者輕仁也自祖率而下至於禰髙者重義也降于山川謂敎令由山川下者也山川有草木禽獸可作器物共國事降于五祀謂敎令由五祀下者五祀有中霤門户竈行之神此始為宫室制度政之行如此何用城郭溝池之為孔氏曰上既言政不正則國亂君危故此一節廣言政之大理本於天地及宗廟山川五祀故君得藏身安固也故者因上起下之辭人君身在於中施政於外但見其政不見其身政之美盛則君身安靜故曰政者所以藏身也是故所施敎令必本於天而來天有運移若星辰圍繞北極氣有隂陽若冬夏之有寒暑人君法效天氣以降下政敎之命效星辰運轉於北極為昏媾姻亞效天之隂陽寒暑為刑獄賞罰案昭二十五年左𫝊云禮者天之經地之義為父子兄弟昏媾姻亞以象天明為温慈惠和以效天之生殖長育為刑罰威獄以類其震曜殺戮皆法天之所為以下敎令也命者政令之命降下于社謂從社而來以降民也社即地也指其神謂之社指其形謂之地法社以下敎令故云殽地周禮大司徒五地則山林川澤丘陵墳衍原隰地有五土生物不同人君法地亦養物不一也上云必本於天此以下變文故直云命降于社之謂殽地也父親仁也祖尊義也鄭引大𫝊證祖禰廟有仁義也言用禰之仁依循而上以至于祖逺者恩愛漸輕是據仁恩也用祖之義率循而下以至于禰髙者尊重是義事也祖廟之中自然有此仁義人君法之施此仁義以敎下民也山川有草木鳥獸可作器物人君法山川以興作其物也初造五祀之人既立中霤門户竈行大小形制各有法度後王取為制度等級也政之行能如此法天隂陽使賞罰得所法地髙下令尊卑有序法祖廟而行仁義法山川五祀而為興作制度則民懐其徳禍害不來何所防禦所以藏其身而堅固也長樂劉氏曰為政之道能正萬物之性命則天下戴君如父母畏君如神明安君如天地不可須㬰離於其政也然後其君得以安逸享其富貴隂陽和天地位萬物育爭鬭息則政之藏身尊嚴若此豈不可尚歟殽效也江陵項氏曰此言政必本於天後言禮必本於天其言政以郊社祖廟山川五祀為殽以降命其言禮義以郊社祖廟山川五祀為其降曰命葢古之言政者必合於禮言禮者必關於政如此後世政在俗吏禮在書生遂不可復合哀哉横渠張氏曰殽以降命命令也如殷人貴命令之令文之類也今之令書古之敎命也馬氏曰殽地而言命降于社則知殽以降命言地命降于社之謂殽地則知殽以降命言天嚴陵方氏曰於祖廟言仁義則知本於天者為隂陽之道降于社者為剛柔之徳也於五祀言制度固知興作之為事功矣道徳仁義興作制度皆政之所存者而聖人特寓之於天地祖廟山川五祀使萬物莫不聴命焉然未嘗有迹也此所以為藏身歟前言君此言聖人何也以位言則曰君以徳言則曰聖人也其序先天而後地者上下之序也次之以祖廟者尊卑之序也又次之以山川者内外之序也又次之以五祀者大小之序也延平周氏曰先王之敎命將欲使天下之人稟受於己則己必先有所稟受而其所禀受必以天地鬼神者以其人莫不有敬畏天地鬼神之心則命之所以行也命之大者則必降于天地祖廟而其小者則必曰降于山川五祀此聖人所以藏身之固新安王氏曰夫身居於位而政施於外天下見其政而不見其身然政正而人無不從政善則君安故政者所以藏身也然為政有道以禮為本立禮有要事神為本為政必本於天者禮行於郊以事上帝此天子所獨而非臣下所可並也自郊祀而下諸侯卿大夫位有尊卑而祀事或可以通行然禮有差等凡為此者先王以正名定分求至於禮行而身安也命者命祀之謂也出命而降于社天子有社諸侯亦可以有社謂之殽地諸侯可以祭社而不可以祭天故也殽者雜而分也天子大社兼土五色使諸侯立社各以其方色之土授之殽地之謂也出命而降于祖廟則天子七諸侯五大夫三尊祖謂之義親禰謂之仁廟有多寡皆可以事其祖禰是以謂之仁義也出命而降於山川山川在四方者天子祭之山川在其境内者諸侯祭之山川所産不一也財用於是乎出器用於是乎備是以謂之興作也出命而降於五祀居則中霤門户食則有竈往來則有行自天子至於卿大夫士均祀之位有尊卑禮有隆殺有一定之法焉是以謂之制度也莫尊於帝惟天子可以郊天此禮不可自上而下也命祀自上而下者一曰社雖諸侯所可祭而不可以同乎天子之大社也二曰祖廟雖諸侯卿大夫士所可通祭而不可同乎天子之七廟也三曰山川雖諸侯所可通祭而不可同乎天子祭四方之山川也四曰五祀此小祀也然後上下通祭而無差等葢有天子之命者可以有事無天子之命者不容僣差使人知天子如上帝之尊諸侯以下社廟百神無不聼命於天子則尊無二上孰敢干之所以見其藏身之固也蔣氏曰古之聖人以眇然之躬而立乎天下之上葢凜凜也彼其處勢位之尊崇能使天下盡聽命而不疑者葢必有以立乎事物之表而制事物之命命之與政同出而異名也自有天地萬物而是理已具於混然之初天髙地下是氣形焉類聚羣分是理形焉故聖人本天理以出政天不言而六子運四時行百物生吾則傚之以降命於天下凡其興建顯設咸有定序使萬物森列各居其位而不相奪者皆非私意為之也是以命降于社謂之殽地殽之為言亦傚法之傚也葢言因地事地敎民美報而地道以顯也降于祖廟之謂仁義葢言反本復始尊祖敬宗而人道以立也降於山川之謂興作葢言備物致用率作興事而職業以起也降於五祀之謂制度葢言門行有守内外有職而宫室以居也自後之為政者觀之彼直以為迂闊汗漫若此殊不知聖人因天理之自然運機緘於不露是數降者之未設也天不尊地不親人無以相養生死之道虧闕而居處之情莫遂吾身寄於民上而莫之安也必於此致意焉而後為藏身之固葢人道立於天下莫先於天地鬼神各安其位莫先於孝慈報反各有其常又莫先於養生居處各有其序孟子曰域民不以封疆之界固國不以山谿之險葢其所以隄防世故維持人心在此而不在彼矣此二帝三王所以為天下開物成務之主布政乎天下身處乎法宫而民莫與為敵者本此道也長樂陳氏曰地道敏樹人道敏政敏樹則地之體有所安敏政則君之身有所藏葢政隆於外而君安於内患害之所不能侵阽危之所不能及此之謂藏身也禮記集說卷五十五
