body:
  text: 禮記集説卷十八宋衛湜撰司寇惠子之喪子遊為之麻衰牡麻絰文子辭曰子辱與彌牟之弟遊又辱為之服敢辭子遊曰禮也文子退反哭子遊趨而就諸臣之位文子又辭曰子辱與彌牟之弟遊又辱為之服又辱臨其喪敢辭子遊曰固以請文子退扶適子南面而立曰子辱與彌牟之弟遊又辱為之服又辱臨其喪虎也敢不復位子遊趨而就客位鄭氏曰惠子衛將軍文子彌牟之弟惠叔蘭也生虎者惠子廢適立庶子遊為之重服以譏之麻衰以吉服之布為衰也文子辭曰辱與弟遊謝其存時也敢辭止之服也文子以子遊習禮見子遊曰禮亦以為當然未覺其所譏子遊趨就臣位深譏之也大夫之家臣位在賔後文子又辭曰辱臨其喪止之在臣位也子遊再不從命文子方覺所譏親扶適子虎而辭敬子遊也南面而立則諸臣位在門內北面明矣子遊趨就客位所譏行也孔氏曰此一節論子遊譏司寇惠子廢適立庶得行之事詩云麻衣如雪又間傳云大祥素縞麻衣皆吉服之布也案弔服錫衰十五升去其半疑衰十四升今子遊麻衰乃吉服十五升輕於弔服而云重服以譏之者據牡麻絰為重也弔服辨絰大如緦之絰一股而環之今乃用牡麻絞絰與齊衰絰同也大夫之賔位在門東近北大夫之家臣位亦在門東而南近門並皆北嚮故鄭注謂在賔後也長樂陳氏曰司寇惠子之喪其廢適也無異公儀仲子之立庶子遊之於司寇惠子相友也無異檀弓之於公儀仲子檀弓之譏仲子服免而已趨而就門右而已子遊之譏惠子服不以免而麻衰牡麻絰趨不就門而就諸臣之位又檀弓之譏則見於言子遊之譏至於無言者蓋檀弓以仲子無賢兄弟非可追而正之故服止於免趨止於景伯而示之以言姑以正法而已子遊以惠子之兄弟有文子者可以追而正之故重為之服卑為之趨示之以無言使之自訟而改焉既而文子果扶適子南面而立豈非事異則禮異哉然子遊之知禮未必不始於檀弓故仲子之事子遊惑而檀弓行之此檀弓所以為賢歟嚴陵方氏曰牡麻即雄麻所謂枲也山隂陸氏曰交遊而以朋友服之故文子辭家語曰喪夫子如喪父而無服弟子皆弔服而加麻弔服錫衰詩曰麻衣如雪説者以為麻衣深衣也深衣朝服十五升布然則所謂麻衰可知也已麻衰以朝服十五升而為之錫衰緦麻抽其半然則錫衰加麻師之服也麻衰加麻朋友之服也將軍文子之喪既除喪而後越人來弔主人深衣練冠待於廟垂涕洟子遊觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中鄭氏曰主人文子之子簡子瑕也深衣練冠凶服變也待于廟受弔不迎賔也中謂中禮之變孔氏曰此一節論居喪得中禮之變越人謂逺國之人深衣是既祥之麻衣即間傳麻衣也但制如深衣緣之以布曰麻衣緣之以素曰長衣緣之以采曰深衣練冠謂未祥之練冠若祥祭則縞冠也此謂由來未弔者若曽來弔祥後為喪事更來主人必服祥日之服以受之故雜記云既祥雖不當縞者必縞然後反服注云謂有以喪事贈賵來者雖不及時猶變服祥祭之服以受之重其禮也其於始弔者則衛將軍文子之子為之蓋始死至練祥來弔是有文之禮祥後來弔是無文之禮言文氏之子庶幾堪行乎無於禮文之禮以其舉動也中當於禮之變節也唐陸氏曰自目曰涕自鼻曰洟長樂陳氏曰喪已除而弔始至非喪非無喪之時也深衣練冠非凶非不凶之服也待于廟非受弔非不受弔之所也文子於其非喪非無喪之時能處之以非喪非無喪之禮故子遊曰其庶幾乎亡於禮者之禮也其動也中中者猶射之有中也中乎有於禮者之禮未足以為善中乎亡於禮者之禮則善矣山隂陸氏曰深衣練冠視長衣練冠稍變幼名冠字五十以伯仲死諡周道也絰也者實也掘中霤而浴毁竈以綴足及葬毁宗躐行出于大門殷道也學者行之鄭氏曰絰所以表哀戚掘中霤毁竈毁宗明不復有事於此周人浴不掘中霤葬不毁宗躐行毁宗毁廟門之西而出行神之位在廟門之外學於孔子行之效殷禮也孔氏曰此一節論殷周禮異之事人始生三月而加名故云幼名年二十有為人父之道同等不可復呼其名故冠而加字年至五十耆艾轉尊又舍其二十之字直以伯仲别之至死而加諡凡此皆周道也士冠禮二十已有伯某甫仲叔季者彼時雖云伯仲皆配某甫而言至五十直呼伯仲爾又殷以上生號仍為死稱更無别諡堯舜禹湯之例是也中霤室中也死而掘室中之地作坎一則言此室於死者無用二則以牀架坎上尸於牀上浴令水入坎中也毁竈綴足者一則示死無復飲食二則恐死人冷強足辟戾不可著屨故用毁竈之甓連綴其足令直可著屨也毁宗毁廟也殷人殯于廟至葬柩出毁廟門西邉牆而出于大門所以然者以行神之位在廟門西邉當所毁宗之外若生時出行則為壇幣告行神告竟車躐行壇上而出使道中安穩今柩行如生時之出故云躐行周人浴不掘中霤浴用水盆沐用瓦盤見喪大記周人綴足用燕几故不毁竈周人殯於正寢至葬而朝廟從正門出故不毁宗賈氏曰殷質二十為字之時兼伯仲叔季呼之周文二十為字之時未呼伯仲至五十乃加而呼之故檀弓云五十以伯仲周道也是呼伯仲之時兼二十為字而言若孔子生于周代從周禮呼尼父至五十去甫以尼配仲而呼之曰仲尼是也若二十以後死雖未滿五十即呼伯仲如慶父乃莊公之弟桓六年莊公生閔二年慶父死時未五十號曰共仲是死時雖未五十得呼仲叔季也儀禮疏新安朱氏曰孔疏與賈疏不同疑孔疏是又曰古者初冠而字便有伯某父仲某父三字了到得五十即稱伯仲除了下面兩字猶今人不敢斥尊者呼為幾丈之類今看儀禮疏中却云既冠之時即是權以此三字加之實未嘗稱也到五十方始稱此三字某初疑其不然却取禮記看見其疏中正如前説蓋當時疏是兩人做孔頴達賈公彥故不相照管語録石林葉氏曰子生三月而父名之非特父名之人亦名之也至冠則成人矣非特人不得名父亦不名焉故加之字而不名所以尊名也五十為大夫則益尊矣有位於朝非特人不字父與君亦不字焉故但曰伯仲而不字所以尊字也禮固自有次第或言士冠禮既冠而字曰伯某甫仲叔季惟其所當則固己稱伯仲何待於五十疑檀弓之誤此不然始冠而字者伯仲皆在上此但以其序次之所以為字者在下某甫也如伯牛仲弓叔肸季友之類是也至于五十為大夫尊其為某甫者則去之故但言伯仲而冠之以氏伯仲皆在下如召伯南仲榮叔南季之類是也檀弓言伯仲者非加之伯仲也去其為某甫者而言伯仲耳孔子諸弟子相字未有以伯仲在下者蓋皆不為大夫也然孔子雖為大司寇而但稱仲尼哀公誄之曰尼父仲山甫尹吉甫皆周之卿士而山甫吉甫猶通稱或者亦以為重歟又曰幼名冠字為衆人言也五十以伯仲為大夫言也又有稱甫與子則不知其何施或者謂爵有尊於大夫者則稱甫如仲山甫尹吉甫之類故孔子卒魯哀公誄不稱仲尼而稱尼父而孟子稱孔子皆謂之仲尼而不曰尼父然既尊字以伯仲矣不應復以字見又有稱家父孔父者則不斥其字矣然冠禮字辭已稱伯某甫叔仲季惟其所當則甫固不以尊見也至於子則孔子諸弟子如子遊子夏之類皆以通稱則不繫其爵意子與甫皆字與伯仲同爵非大夫而有德者則但稱子如孔子孟子之類而爵髙於大夫則但稱父如家父孔父之類故孔子弟子惟曽參有若不兼字但曰曽子有子以孔子死二人皆嘗為師尊之也嚴陵方氏曰絰之所用男子重首婦人重腰皆用其所重非徒為虛名而已故曰絰也者實也古者復穴而居開其上以取明而雨溜焉故後世因以名其室毁竈者取甓以綴於足而欲尸之溫也夫中霤則生時於之以居處浴必掘中霤以示不復居處於此故也竈則生時於之以烹飪綴足必毁竈以示不復烹飪於此故也宗則生時於之以祭享躐行必毁宗以示不復祭享於此故也凡此皆殷所常行殷尚質故禮之所由本周尚文故禮之所由備生以文為尚故名字之制學禮者行乎周道焉死以質為尚故喪葬之制學禮者行乎殷道焉山隂陸氏曰內則曰五十命為大夫服官政五十以伯仲宜為大夫矣故此以大夫之法記之大夫死諡周道也子桞之母死子碩請具子桞曰何以哉子碩曰請粥庶弟之母子桞曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子桞曰不可吾聞之也君子不家於喪請班諸兄弟之貧者鄭氏曰具葬之器用子桞魯叔仲皮之子子碩兄也何以哉言無其財也粥庶弟之母粥謂嫁之妾賤取之曰買子桞不從忠恕也賻布謂古者以錢為泉布所以通布貨財子桞言君子不家于喪惡因死者以為利也班諸貧者以分死者所矜也祿多則與鄰里鄉黨孔氏曰此一節論不粥人之母及因死為利之事古謂錢為泉布者言其流通有如水泉嚴陵方氏曰無財不可以為悅豈宜粥人之母以葬其親乎無田祿者不設祭器豈宜以賻布之餘具之乎此子栁所以不從子碩之請也不家於喪則恥因喪之利而起家故也君子曰謀人之軍師敗則死之謀人之邦邑危則亡之鄭氏曰利己忘衆非忠也言亡之者雖辟賢非義退長樂陳氏曰主危臣辱主辱臣死故謀人之軍師敗則死之社稷存則與存社稷亡則與亡故謀人之邦邑危則亡之思其敗之死則無輕軍師思其危之亡則無輕邦邑先王懼夫為人臣者不知出此故為禮以戒之凡使引慝執咎殫忠致命而已嚴陵方氏曰軍師以勝為功耳然或敗焉則是無決勝之䇿故也為之謀者處其身可以偷生乎邦邑以安為本耳然或危焉則是無計安之術故也為之謀者居其位可以苟存乎軍師既敗則難以復勝故死其身焉邦邑雖危猶可以復安故亡其位而已廬陵胡氏曰敗則死之春秋傳曰側亡君師敢志其死危則亡之微子念殷危亂欲遁亡于荒野公叔文子升於瑕丘蘧伯玉從文子曰樂哉斯丘也死則我欲葬焉蘧伯玉曰吾子樂之則瑗請前鄭氏曰二子衛大夫文子獻公之孫名拔瑗伯玉名刺其欲害人良田也孔氏曰此一節論蘧伯玉仁者刺文子欲害人良田之事嚴陵方氏曰葬之為禮蓋生者之所送終非死者之所豫擇擇之且不可又况徇己之樂而忘人之害乎苟惟樂己害人之事可為則夫人而為之矣此公叔文子樂瑕丘之葬而蘧伯玉有請前之譏也辨人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哭踊有節鄭氏曰孺子泣言聲無節哀則哀矣謂誠哀也難繼謂失禮中孔氏曰此一節論孔子譏辨人哀過之事聖人制禮使後人可傳可繼故制為哭踊之節以中為度爾豈可過甚使後人不可傳繼乎然雜記曽申問于曽子曰哭父母有常聲乎曰中路嬰兒失其母何常聲之有則與此違者曾子所言是始死之時悲哀志悶未可為節此之所言在襲斂之後可以禮制也嚴陵方氏曰傳言由己以傳於後繼言使人有繼於前孟子曰舜為法於天下可傳於後世又曰君子創業垂統為可繼也此傳繼之辨歟夫辨人之喪母泣若孺子雖為盡哀然失哭踊之節而難為繼矣故孔子以是言之也叔孫武叔之母死既小斂舉者出尸出户袒且投其冠括髮子遊曰知禮鄭氏曰武叔公子牙之六世孫名州仇毁孔子者尸出户乃變服失哀節冠素委貌子遊嗤之孔氏曰此一節論武叔失禮之事案士喪禮卒斂徹帷主人馮尸踊無算括髮袒下云士舉男女奉尸侇于堂又喪大記亦云卒小斂主人袒説髦括髮以麻下云奉尸夷于堂是括髮在小斂之後奉尸夷于堂之前主人為欲奉尸故袒而括髮今武叔于奉尸夷于堂之後乃投冠括髮故鄭云失哀節云冠素委貌者案雜記云小斂環絰公大夫士一也注云士素委貌大夫以上素爵辨而加此絰焉子遊習禮見武叔失禮反謂之知禮蓋嗤之也嚴陵方氏曰蓋小斂而後袒括髮則得其序矣出户而後袒括髮則非其所也子遊曰知禮所以甚言其不知禮也扶君卜人師扶右射人師扶左君薨以是舉鄭氏曰扶君謂君疾時也卜當為僕聲之誤也僕人射人皆平生時贊正君服位者薨以是舉不忍變也周禮射人大喪與僕人遷尸孔氏曰此一節論君薨遷尸之人唐陸氏曰師長也謂大僕也或無師字者非也前儒如字卜人及醫師也嚴陵方氏曰扶君舉尸固非二人之所能勝而二官各以下大夫二人為之且有小臣上下之士非一故以師言之廣安遊氏曰傳曰男子不死於婦人之手春秋書人君不薨于路寢則為死不以道故君之疾也以在寢在朝之正服位而從君者扶持之薨則外廷之人共治其喪疾則外廷之人共治其疾所以防微杜漸致謹於疾病之際以正其死道也然此非一日之故蓋古者之制婦官序於內而人君哀樂之事得其節僕人射人舉職於外而人君起居之節得其宜故九嬪世婦之屬掌以時御敘于王所宫中之治總以大宰參以六卿人君出入起居常從事於禮故疾病死喪內之人不得與焉此非承先王積習而當時禮教之隆有不能然者金華應氏曰鄭氏改卜為僕誠有據然王前巫後史而卜筮皆在左右則卜人師扶右乃其切近之職所當然似不必改從母之夫舅之妻二夫人相為服君子未之言也或曰同爨緦鄭氏曰二夫人猶言此二人也時有此二人同居死相為服者甥居外家而非之孔氏曰此一節論失禮之事鄭知甥居外家而非之者以從母及舅皆是外甥稱謂之辭若他人言之應云妻之兄弟婦夫之姊妹夫也或人以為既同爨而食合有緦麻之親橫渠張氏曰從母之夫舅之妻二夫人相為服曰同爨緦上是甥自幼居從母之家或舅之家孤稚恩飬直如父母不可無服所以為此服也非是從母之夫與舅之妻相對如何得此稱既言從母與舅故知是甥為二夫人者為之服也喪事欲其縱縱爾吉事欲其折折爾故喪事雖遽不陵節吉事雖止不怠故騷騷爾則野鼎鼎爾則小人君子蓋猶猶爾鄭氏曰縱讀如總領之總總總趨事貌折折安舒貌詩云好人提提陵躐也止立俟事時也怠惰也騷騷謂大疾鼎鼎謂大舒猶猶疾舒之中孔氏曰此一節論吉凶趨容之事凶事欲疾吉事欲舒故因上生下云喪事雖促遽亦當有常不得陵越喪禮之節吉事雖有止住之時然不當怠惰寬慢故喪事騷騷過為急疾則如田野之人急切無禮吉事鼎鼎不自嚴敬則如小人形體寬慢君子之人於喪事得疾之中於吉事得舒之中蓋行禮之時眀間法則志意猶猶然猶猶曉達之貌山隂陸氏曰縱折二字皆讀如字喪事有縱無折故雖遽不陵節吉事有折無縱故雖止不怠李氏曰喪事欲其縱縱爾故詩曰凡民有喪匍匐救之吉事欲其折折爾故詩曰好人提提匍匐言遽而不陵節提提言止而不怠質勝文故騷騷文勝質故鼎鼎猶猶則質不至於騷騷而文不至於鼎鼎荀子曰猶然而才劇志大廬陵胡氏曰縱縱不修飾貌有遽意提提爾雅詳貌有止意廣安遊氏曰此指君子治心飬氣間於教訓之功也故喪事不至於太亟而陵節吉事不至於太舒而怠惰君子處吉凶之際以失禮為懼故疾徐之節常得其中此其為心也敬為氣也和而又間於教訓故能如此鼎鼎謂其太舒流入於倨慢而無敬畏之心耳喪具君子耻具一日二日而可為也者君子弗為也鄭氏曰喪具棺衣之屬耻具辟不懷也一二日可為謂絞襟衾冒孔氏曰此一節論孝子備喪具之事左傳云卜葬先逺日辟不懷也懷思也謂不思念其親今送死百物未即辦具是辟不思親之事也喪具棺則預造衣亦漸制故王制云六十歲制七十時制八十月制九十日修唯絞襟衾冒死而後制是也喪服兄弟之子猶子也蓋引而進之也嫂叔之無服也蓋推而逺之也姑姊妹之薄也蓋有受我而厚之者也鄭氏曰或引或推重親逺别姑姊妹嫁大功夫為妻期欲其一心於厚之者孔氏曰喪服是儀禮正絰兄弟之子期姑姊妹出適大功皆喪服絰文嫂叔無服喪服傳文己子服期兄弟之子當降服大功今乃服期蓋牽引進之同於己子也昆弟相為服期其妻應降服大功今乃無服是推使疏逺之也姑姊妹未嫁時為之厚出嫁後為之薄者蓋有夫壻受我之厚而重親之也何氏平叔曰男女相為服不有骨肉之親則有尊卑之異也嫂叔親非骨肉不異尊卑恐有混交之失故推使無服也唐魏氏徴曰嫂叔之不服蓋推而逺之也禮繼父同居則為之服未嘗同居則不為服從母之夫舅之妻二人不相為服或曰同爨緦然則繼父之徒並非骨肉服重由乎同爨恩輕在乎異居故知制服雖繼於名亦緣恩之厚薄也或有長年之嫂遇孩童之叔劬勞鞠飬情若所生分飢共寒契濶偕老譬同居之繼父方他人之同爨情義之深淺寧可同日語哉在其生也愛之同於骨肉及其死也則推而逺之求之本源深所未諭若推而逺之是為不可生而共居死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱載籍非一鄭仲虞則其見必冠孔伋則哭之為位此躬踐教義仁深孝友察其所行豈非先覺者歟議請小功五月報制可議見通典河南程氏曰嫂叔古之所以無服者只為無屬其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也今上有父有母下有叔父伯父父之屬也故叔母伯母之服與叔父伯父同兄弟之子子之屬也故兄弟之子之婦服與兄弟之子同若兄弟則己之屬也難以妻道屬其嫂此古者所以無服以義理推不行也今之有服亦是豈有同居之親而無服者食於有喪者之側未嘗飽也鄭氏曰助哀戚也嚴陵方氏曰飢而廢事非禮也飽而忘哀亦非禮也慮其至於廢事故雖喪者之側必食又慮其忘哀故未嘗飽焉是禮也雖聖人之行不過如此而已廣安遊氏曰子食於有喪者之側未嘗飽也蓋能行古禮也孔子所謂異於人者無他古禮有是而夫子能行之耳所謂車中不內顧不疾言不親指子於是日哭則不歌及食於有喪者之側未嘗飽也皆記禮者之常事非聖人創為之也曾子與客立於門側其徒趨而出曽子曰爾將何之曰吾父死將出哭於巷曰反哭於爾次曾子北面而弔焉鄭氏曰徒謂客之旅以為不可發凶於人館故出哭於巷次舍也禮館人使專之若其自有然孔氏曰此一節論館客使如其已有之事禮喪主西面今曾子北面弔者案士喪禮主人西面其賔亦在門東北面此謂同國之賔也今曾子既許其反哭於次舍之處故以同國賔禮北面弔焉孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也是故竹不成用瓦不成味木不成斫琴瑟張而不平竽笙備而不和有鍾磬而無簨虡其曰眀器神明之也鄭氏曰之往也死之生之謂無知與有知也不可為者為猶行也成猶善也竹不可善用謂邉無縢味當作沫沫靧也不平不和謂無宫商之調無簨虡不縣之也橫曰簨直曰虡神明之者言神明死者也神明者非人所知故其器如此孔氏曰此一節論生人於死者不可致死致生之事聖人為教使人子不死於亡者不便謂無知不生於死者不便謂有知故制明器以神明求之器用並不精善也竹不成用謂竹器邉無縢緣也瓦不成味謂瓦器無光澤也木不成斫謂木器不雕飾也琴瑟張絃而不調平竽笙設備而不調和簨虡縣鍾磬格也亦有鍾磬而不用格縣挂之何氏胤曰言往死者處而致此死者如草木無知如此則不仁不可行於世也往死者處而致此死者於全生之物則不知而不可行也舍此二途不仁不知之間聖人之所難言故制明器以神明之廬陵胡氏曰致死之謂死其親若無知者致生之事之如生成猶完備長樂陳氏曰不曰神明之器特曰明器者以神之幽不可不明故也周官凡施於神者皆曰明故水曰明水火曰明火以至明齍明燭明竁者皆神明之也蓋其有竹瓦木之所用琴瑟竽笙鍾磬之所樂者明之也所用非所用所樂非所樂神之也宋襄公葬其夫人醯醢百甕豈知此哉有子問於曾子曰問喪於夫子乎曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曽子曰參也聞諸夫子也有子又曰是非君子之言也曾子曰參也與子遊聞之有子曰然然則夫子有為言之也曾子以斯言告於子遊子遊曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宫敬叔反必載寶而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曾子以子遊之言告於有子有子曰然吾固曰非夫子之言也曾子曰子何以知之有子曰夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也昔者夫子失魯司寇將之荆蓋先之以子夏又申之以冉有以斯知不欲速貧也鄭氏曰有子孔子弟子有若也夫子卒後問此庶有異聞也喪謂仕失位也魯昭公孫于齊曰喪人其何稱有子以貧朽非人所欲故以曾子所答為非君子之言也桓司馬宋向戌之孫名魋靡侈也敬叔魯孟僖子之子仲孫閲蓋嘗失位去魯得反載其寶來朝于君中都魯邑名也孔子嘗為之宰為民作制孔子由中都宰為司空由司空為司寇將之荊將應聘於楚先之以子夏申之以冉有言汲汲於仕得祿也孔氏曰此一節論喪不欲速貧死不欲速朽之事有子唯問喪不問死曾子以喪死俱為惡事貧朽又事類相似故遂言之夫子失魯司寇使子夏冉有先適楚是不欲速貧也案世家魯定公十四年齊人歸女樂孔子去魯適衛從衛之陳又反于衛過曹適宋適鄭適陳又適衛不見用將適趙至河又反于衛復行如陳時哀公三年孔子年六十明年自陳遷于蔡被圍絶糧於是使子貢至楚楚昭王興師迎孔子將封之子西諫而止是歲昭王卒孔子自楚反于衛時年六十三以此言之非謂失司寇之年即之荆有子但謂失司寇之後將往之荆爾崔氏曰孔子世家定公九年孔子年五十由中都宰為司空為司寇定公十年會于夾谷攝行相事此云司寇者案諸侯三卿司徒兼冢宰司馬兼宗伯司空兼司寇三卿之下則五小卿為五大夫故周禮大宰職云諸侯立三卿五大夫也五大夫者司徒之下立二人小宰小司徒司馬之下立一人為小司馬兼宗伯之事司空之下立二人小司寇小司空今夫子為司空乃小司空司寇乃小司寇蓋魯有孟叔季三卿為政又有臧氏為司寇是以知之橫渠張氏曰曽子既言參也與子遊聞之曽子却問於子遊以子遊之言告有子既言參也與子遊聞之則因甚子遊知之曽子却不知當改與子遊聞之作於子遊聞之乃通嚴陵方氏曰肆其侈心而至於傷財曽不若速朽之為愈也肆其利心而至於害義曽不若速貧之為愈也孔子之言特為二子而發耳有子乃能以中都與之荆之事驗之可謂知意者矣先之則所以道之申之則所以重之廣安遊氏曰夫子羣弟子中於孔子之意容有不知者曽子之知孔子不如子遊子路之知孔子不如子貢類而推之則羣弟子容有不知而皆為篤道之君子然則君子果不在於多知也夫子教人蓋有以行與事示之而不諄諄然命之者亦使羣弟子即而觀焉而有所得而所得不專在於言語之間也宰我欲知上世之事而夫子以為躁子路欲知死與鬼神之事而夫子拒之不答故羣弟子之賢者容有所不知而其所以為賢不專在於知也若夫忠信孝弟與夫治心飬氣之大要則羣弟子舉得之特有淺深之異而弒父與君則皆不為此則羣弟子所同也後世揚子雲為之説曰聖人於天下恥一物不知斯言一出而天下之學者務求多知而不明大道之要去聖人益逺矣廬陵胡氏曰按春秋傳定公十二年孔子為司寇至哀公三年在陳十一年在衛是年自衛反魯則失司寇蓋在定公十二年以後但有在陳在衛事迹論語亦即云適衛厄陳蔡皆無之荆事豈禮之妄也或曰哀公六年楚昭失國孔子曰楚昭王知大道矣是時在荆也子適衛冉有僕故此云申之以冉有陳莊子死赴於魯魯人欲勿哭繆公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之今之大夫交政於中國雖欲勿哭焉得而弗哭且臣聞之哭有二道有愛而哭之有畏而哭之公曰然然則如之何而可縣子曰請哭諸異姓之廟於是與哭諸縣氏鄭氏曰君無哭鄰國大夫之禮陳莊子齊大夫陳恆之孫名伯安得哭之以大夫無外交也時君弱臣強政在大夫專盟會以交接不得不哭言哭有二道以權微勸之也哭之異姓明不當哭孔氏曰此一節論哭鄰國臣之法嚴陵方氏曰君弱臣強有至交政於中國者豈特束修之問而已生既畏之而不敢不與之交則死亦畏之而不敢不為之哭矣若魯人之哭陳莊子所謂畏而哭之者也然縣子謂哭諸異姓之廟者以哭其非所當哭之人故哭於非所當哭之廟也異姓之廟必哭諸縣氏以其禮之所由起故耳則與哭伯髙於賜氏同義古之大夫束修之問不出竟郊特牲所謂為人臣者無外交是也所謂束修之問者以一束之修為通問之禮也猶莊子所謂苞苴竿牘歟廣安遊氏曰縣子所言亦禮之變也所謂畏而哭之也春秋之時先王之禮顛倒錯亂甚矣魯悼公之喪孟敬子食食此人臣而禮損於君者也穆公之於莊子此人君而加禮於臣者也雖然是二事者皆其情勢之當然也亦非當時君臣之所強而行也蓋古之行道者先以政正人之情因人之情以制所當行之禮苟為不然政亂而時弊時弊而情佚情佚而禮變矣且禮之未變也其禮亦情勢之所當然禮之既變也亦其情勢之所當然也雖聖人亦無如之何今夫春秋書諸侯會而略其大夫禮之正也至趙盾卻缺士會范鞅之徒列乎會盟侵伐之中而春秋亦列之矣在夷狄曰荆曰於越曰赤狄曰白狄禮之正也而春秋之時先荆而後楚吳楚秦越先無大夫而後有大夫其禮有加於禮之正春秋亦從而加焉諸侯非元侯不得有師禮之正也而春秋之時國無大小其相侵伐皆以師行春秋亦從而稱之此皆時勢之當然聖人變文以從之也然聖人非從之也亦以著天子之失道中國之失政使後人之觀者即是有考焉聖人固將溯其流而復其源後世則循其流而下也馬氏曰孟子曰哭死而哀非為生者也以有畏而哭之能無為乎古之人引君以當道志於仁而已縣子語君非志於仁者也仲憲言於曽子曰夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也曽子曰其不然乎其不然乎夫明器鬼器也祭器人器也夫古之人胡為而死其親乎鄭氏曰仲憲孔子弟子原憲示民無知所謂致死之有知所謂致生之兼用言使民疑於無知與有知曽子連言其不然乎非其説之非也蓋仲憲之言三者皆非此或用鬼器或用人器孔氏曰此一節論不可致意於死人為死為生之事重稱不然蓋深鄙之又自更説其義謂夏以鬼與人異故純用鬼器非為無知也殷言鬼雖與人異亦應恭敬故用祭器貯食送之非為有知也周兼用之非為疑可知古人雖質何容死其親乎古謂夏時也若示無知則是死之義橫渠張氏曰明器而兼用祭器周之末禮也周禮唯言廞嚴陵方氏曰明器祭器三代之所兼用蓋處以死生之間而已豈特周而然哉而原憲必以夏用鬼器殷用人器則是夏有致死之不仁殷有致生之不知矣宜乎曽子不然其説也然曽子之言止及於夏而不及於殷者以死其親尤君子之所不忍故也石梁王氏曰三代送葬之具質文相異故所用不同其意不在於無知有知及示民疑也仲憲之言皆非故曽子非之末獨譏其説夏后明器者蓋舉其失之甚者也李氏曰明有象幽無形以有象之器事無形之鬼故曰明器以其對於祭器故亦曰凶器以人道而事鬼神故曰祭器以其對於凶器故亦曰生器生器則文而不功明器則見而不用有生器具之以適墓象死道也有明器具之而不用明不復用也由死道以思其生由不用以念其死皆所以重孝子之哀也公叔木有同母異父之昆弟死問於子遊子遊曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也鄭氏曰木當為朱春秋作戍衛公叔文子之子定公十四年奔魯子遊曰其大功乎疑所服也親者屬大功是孔氏曰此一節論為同母異父昆弟死者著服得失之事為同母異父昆弟之服喪服無文乎疑辭也同父同母既服期今但同母則宜降一等而服大功也不云自狄儀始者魯人先己行之橫渠張氏曰同母異父之昆弟狄儀服之齊衰是與親兄弟之服同如此則無分别無分别禽獸之道也是知母而不知父或以為大功者亦似太過以小功服之可也問此而答云我未之前聞當古之時又安有此事嚴陵方氏曰禮異父亦謂之繼父繼父同居則服期焉服其父以期則其子相為服以大功乃其稱也而子夏遂以魯人之事告狄儀使之行齊衰不亦甚乎廣安遊氏曰後世所承傳之禮有出於三代之末沿禮之失而為之者不喪出母古禮之正也今之禮家喪服齊衰杖期以為出母服此後世之為也孔氏之先君子喪出母惟孔子行之而非以為法也此所謂非禮之正也同母異父之昆弟子遊為之大功魯人為之齊衰亦非禮之正也昔聖人制禮教以人倫使父子有親男女有别然後一家之尊知統乎父而厭降其母同姓之親厚於異姓父在則為母服齊衰一年出母則不為服此禮之正後世不明乎父母之辨不别乎同姓異姓之親既為出母制為服限則雖異父之子以母之故亦當為之服矣此其失在乎不明一統之尊不别同姓異姓之親而致然也及至後世父在而升其母三年之服而異姓之服若堂舅堂姨之類亦相緣而升矣夫禮者以情義言之情義者要有所限止不可遍給也母統于父則不得不厭降其母厚於同姓則不得不降殺於異姓夫是以父尊而母卑夫尊而婦卑天尊而地卑君尊而臣卑皆順是而為之也今子遊欲以意為之大功此皆承世俗之失而失之之原其來寖逺而不可復後世不由其原考之禮節之失未見其能正也子思之母死於衛栁若謂子思曰子聖人之後也四方於子乎觀禮子蓋慎諸子思曰吾何慎哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也吾何慎哉鄭氏曰子思孔子孫伯魚之子伯魚卒其妻嫁於衛栁若衛人也見子思欲為嫁母服恐失禮戒之嫁母齊衰期有禮無財謂時可行而財不足以備禮有禮有財無時謂財足以備禮而時不得行者子思謂時所止則止時所行則行無所疑也喪之禮如子贈襚之屬不踰主人孔氏曰此一節論為出母之喪行禮之事嫁母之服喪服無文案喪服杖期章云父卒繼母嫁從為之服報則親母可知故鄭約云齊衰期也若嫁母之家主人貧乏已雖有財不得過於主人故鄭謂贈襚不踰主人也譙氏曰父卒母嫁非父所絶適子雖主祭猶宜服期而喪服為出母期嫁母與出母俱是絶族故知與出母同也嚴陵方氏曰無其財則物不足以行禮無其時則勢不可以行禮禮有常時有變財有限三者不備君子所不行也孟子所言不得不可以為悅者時與禮也無財不可以為悅者即此所謂財也馬氏曰子思之於出妻則不使子上致其喪門人問之乃以為道汚則從而汚於嫁母哭之失禮栁若戒之乃以為吾何慎哉蓋子思之賢其文過猶若此也世無聖人而有賢者為聖人之後則禮義所自出故四方所以觀其禮有其禮矣而無其財行之則非義有其財無其時而行之則非命苟知此矣而又能慎之亦不失為君子廬陵胡氏曰古者嫁母齊衰期今律亦然子思習於禮未嘗不慎曰吾何慎哉言其慎久矣廣安遊氏曰為嫁母服此後世之禮非先王之正也子思之意以為雖有齊衰期之禮然財不足以備禮則行之必有所不備弗行者弗能備行也若有其禮有其財可以行矣而非道隆之時亦弗可以備行也以此觀之子思於嫁母之服蓋有行之而不備者矣古之君子嚴於父母男女之别以為禽犢懷母不懷父君子惡之故父在為母期以厭降於父母出嫁而其禮之行有所不備以為母絶於父其尊統於父所以致謹於父之親也若厚於嫁母而於父不親此禽犢之道謹於禮者之所畏也然後世之君子行不如子思道又不如子思未必能親其父而先絶其母此又君子所難言也故曰與其過乎薄寧過乎厚去古既逺行禮者當以是為心縣子瑣曰吾聞之古者不降上下各以其親滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也鄭氏曰古謂殷時也上不降逺下不降卑伯文殷時滕君也爵為伯名文孔氏曰此一節論古者著服上不降逺下不降卑之事瑣縣子名據所聞而言也周禮以貴降賤以適降庶唯不降正耳而殷世以上雖貴不降賤也上下各以其親不降之事也上謂旁親族曽祖從祖及伯叔之班下謂從子從孫之流彼雖賤不以己尊降之猶各隨本屬之親輕重而服之故云上下各以其親滕伯文為孟虎著齊衰之服者孟虎乃滕伯之叔父而滕伯又孟皮之叔父言滕伯上為叔父下為兄弟之子皆著齊衰是上不降逺下不降卑也庾氏曰上下猶尊卑也正尊周禮猶不降則知所明者旁尊也鄭恐尊名亂於正尊故變文言逺也馬氏曰唐虞夏殷之時其禮猶質故天子諸侯以少長相及不降上下至周則文致其詳矣立子以嫡不以長故使嚴於貴貴之際一為之君則諸父昆弟皆不得以其戚戚之若大夫為世父母叔父母昆弟昆弟之子為士者猶降而為大功也而况為天子諸侯之君滕伯文乃二孟之叔父也於其兄弟之子猶且不降則為諸父及昆弟可知矣臨川王氏曰親親之敝君不尊則命不一而爭奪之禍繁矣故繼之以尊尊尊尊周道也親親殷道也新安朱氏曰夏殷而上大槩只是親親長長之意到得周來則又添得許多貴貴底禮數如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟期之喪天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降姊妹嫁諸侯者則亦不絶不降此皆貴貴之義也上世想皆簡略未有許多降殺貴貴砥禮數凡此皆天下之大經前世所未備到得周公搜剔出來立為定制更不可易后木曰喪吾聞諸縣子曰夫喪不可不深長思也買棺外內易我死則亦然鄭氏曰后木魯孝公子惠伯鞏之後此孝子之事非所託孔氏曰此一節論屬子以死事非禮之事孝子居喪必深思長慮買棺之時當令精好斫削內外使之平易后木述縣子之言以語其子此是孝子所為之事非是父母預所屬託譏后木也嚴陵方氏曰子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣此喪所以不可不深長思也買棺外內易亦其一端耳廬陵胡氏曰不可不深長思言喪之難也曾子曰尸未設飾故帷堂小斂而徹帷仲梁子曰夫婦方亂故帷堂小斂而徹帷鄭氏曰斂者動搖尸帷堂為人褻之言方亂非也仲梁子魯人也孔氏曰自此至末失也一節論小斂失禮之事春秋定公五年魯有仲梁懷嚴陵方氏曰人死斯惡之矣以未設飾故帷堂蓋以防人之所惡也小斂則既設飾矣故徹帷焉若是則帷堂之禮為死者爾豈為生者哉而仲梁子以為夫婦方亂故帷堂則失禮之意逺矣廬陵胡氏曰存二説以傳疑小斂之奠子遊曰於東方曾子曰於西方斂斯席矣小斂之奠在西方魯禮之末失也鄭氏曰曾子以俗説非又大斂奠于堂乃有席末失謂末世失禮之為也孔氏曰魯之衰末小斂之奠設于西方又有席曾子見時如此謂將為禮故記者正之云小斂之奠所以在西方是魯人行禮末世失其法也案士喪禮小斂之奠設于尸東大斂之奠設于室乃有席今鄭云堂轉寫誤耳嚴陵方氏曰萬物生於東而死於北小斂之奠于東方則孝子未忍死其親之意也禮記集説卷十八
