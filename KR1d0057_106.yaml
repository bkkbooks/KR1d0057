body:
  text: 禮記集説卷一百六宋衛湜撰士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫鄭氏曰士二日而殯者下大夫也士之禮死與往日生與來日此二日於死者亦得三日也婦人皆杖謂主婦容妾為君女子子在室者孔氏曰此一節明士之杖節二日而殯除死日為二日也三日殯之明日也士之子於君命其妻於夫人之命如大夫禮皆去杖也若士之子於大夫之命其妻於世婦之命如大夫於大夫之禮大夫之命則輯杖世婦之命則授人杖也子皆杖不以即位大夫士哭殯則杖哭柩則輯杖棄杖者斷而棄之於隱者鄭氏曰子謂凡庶子也不以即位與去杖同哭殯謂既塗也哭柩謂啓後也大夫士之子於父父也尊近哭殯可以杖天子諸侯之子於父父也君也尊逺杖不入廟門棄杖於隱者杖是喪至尊為人得而褻之孔氏曰大夫士謂大夫士之適子既攢塗之後於父父也其尊逼近故哭殯可以杖將葬既啓之後對柩為尊則斂去其杖鄭注廟門即殯宫門也大祥斷杖棄於幽隱之處使不穢汙也君設大盤造氷焉大夫設夷盤造冰焉士併瓦盤無冰設牀袒笫有枕含一牀襲一牀遷尸于堂又一牀皆有枕席君大夫士一也鄭氏曰此事皆沐浴之後冝承濡濯棄於坎下札爛脫在此耳造猶內也袒笫袒簀也謂無席如浴時牀也禮自仲春之後尸既襲既小斂先內氷盤中乃設牀於其上不施席而遷尸焉秋涼而止士不用冰以瓦為盤併以盛水耳漢禮大盤廣八尺長丈二深三尺赤中夷盤小焉周禮天子夷盤士喪禮君賜氷亦用夷盤然則其制宜同之孔氏曰此一節明初死沐浴之節造冰者造內其冰於盤中夷盤亦內冰小於大盤置冰於下設牀於上去席袒露笫簀浴時無席為漏水也設冰無席為通寒氣也含襲遷尸此三節各有牀唯含一時暫徹枕使面平故士喪禮云商祝徹枕含竟並有枕含襲及堂皆有席也鄭注既襲謂大夫也既小斂謂士也皆是死之明日若天子諸侯亦三日而設冰也始死遷尸于牀幠用斂衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也鄭氏曰牀謂所設牀笫當牖者也士喪禮曰士死於適室幠用斂衾去死衣病時所加新衣及復衣也去之以俟沐浴孔氏曰此一節反明初死之節下經論死後而沐浴前經論浴後設冰經文顛倒尸初在地兾生氣復既不生故遷於牀近南當牖前所謂正尸也幠覆也斂衾者大斂之衾被也遷尸在牀用斂衾覆之楔齒楔柱也柶以角為之長六寸兩頭曲屈將含恐口閉急故使小臣以柶柱張尸齒令開也尸應著屨恐足辟戾亦使小臣側几於足令几腳南出綴拘尸足兩邊令直不辟戾也既夕禮綴足用燕几挍在南御者坐持是也自始死至此貴賤同管人汲不説繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如他日小臣爪足浴餘水棄于坎其母之喪則內御者抗衾而浴鄭氏曰抗衾者蔽上重形也挋拭也瓜足斷足爪也孔氏曰此一經明浴時也管人主館舍者汲謂汲水瓶索也遽促於事故不説去井索但縈屈執之於手中以水從西階而升盡不上堂用盆盛浴水用枓酌盆水沃尸用盤於牀下盛浴水絺是細葛除垢為易用生時浴衣拭尸肉令燥如他日謂如平生尋常之日也浴竟小臣翦尸足之爪坎者甸人所掘階間取土為竈之坎甸人主郊野之官也內外宜别故母喪用內御舉衾內御婦人也事事如前唯浴用人不同耳嚴陵方氏曰管人主管籥之人也井竈亦其所司故使之汲水焉繘井索也枓以木為之管人汲授御者御者差沐于堂上君沐粱大夫沐稷士沐粱甸人為垼于西牆下陶人出重鬲管人受沐乃煮之甸人取所徹廟之西北厞薪用爨之管人授御者沐乃沐沐用瓦盤挋用巾如他日小臣爪手翦須濡濯棄于坎鄭氏曰差淅也淅飯米取其潘以為沐也浴沃用枓沐於盤中文相變也士喪禮沐稻此云士沐粱蓋天子之士也以差率而上之天子沐黍與孔氏曰此一節明沐也粱稷皆謂用其米取汁而沐也將沐甸人為土垼塹竈於西牆下以煮沐汁陶人作瓦器之官重鬲謂縣重之罌是瓦甁受三升以沐米為粥實於瓶以疏布幂口繫以篾縣之覆以葦席也淅於堂上管人亦升盡等不上堂就御者受淅汁往西牆於垼竈鬲中煮之甸人取復魄人所徹正寢西北厞以然竈煮沐汁爨然也謂正寢為廟神之也舊云抽取屋西北簷或云取屋外當厞隱處薪義亦通也煮汁熟管人取以升階授堂上御者御者乃為尸沐瓦盤貯沐汁用巾拭髮及面士喪禮注云挋晞也清也事事如平生小臣翦手爪治須象平生也濡謂煩撋其髮濯謂不淨之汁所濡濯汁棄於坎中鄭注士喪禮云巾櫛浴衣亦并棄之其坎案既夕禮掘坎南順廣尺輪二尺深三尺南其壤此沐汁棄於坎則浴汁亦然沐與浴俱有枓有盤浴云用枓沐云用盤故鄭云文相變也案公食大夫禮黍稷為正饌稻粱為加是稻粱卑於黍稷黍味美而貴故鄭疑天子用之也君之喪子大夫公子衆士皆三日不食子大夫公子衆士食粥納財朝一溢米莫一溢米食之無算士疏食水飲食之無算夫人世婦諸妻皆疏食水飲食之無算鄭氏曰納財謂食榖也二十兩曰溢於粟米之法一溢為米一升二十四分升之一諸妻御妻也同言無算則是皆一溢米或粥或飯孔氏曰此以下廣明五服之喪自初死至除服君及大夫士食飲之節此經明君喪食之禮財謂穀也謂所食之米也每日納用之米朝唯一溢米莫唯一溢米也作之無時當須豫納故云納財案律厯志二十兩則米二升與此不同古稱有二法説左傳者云百二十斤為石則一斗十二斤為一百九十二兩則一升為十九兩有竒今一兩為二十四銖則二十兩為四百八十銖計十九兩有竒為一升則總有四百六十銖八參以成四百八十銖唯有十九銖二參在是為米一升二十四分升之一此大略而言之也居喪因病不能頓食隨須則食故云無算士賤病輕故疏食疏粗也食飯也粗米為飯亦水為飲夫人世婦諸妻皆婦人質弱恐食粥傷性故言疏食水飲也大夫之喪主人室老子姓皆食粥衆士疏食水飲妻妾疏食水飲士亦如之鄭氏曰室老其貴臣也衆士所謂衆臣士亦如之如其子食粥妻妾疏食水飲孔氏曰此經明大夫禮也子姓謂孫也不云衆子主人中兼之案喪服傳云卿大夫室老士貴臣其餘皆衆臣案檀弓主人主婦啜粥主婦謂女主也既葬主人疏食水飲不食菜果婦人亦如之君大夫士一也練而食菜果祥而食肉鄭氏曰果瓜桃之屬也孔氏曰此一節明既葬至練祥君大夫士之食節既葬哀殺可以疏食不復用一溢米也食粥於盛不盥食於纂者盥食菜以醯醬始食肉者先食乾肉始飲酒者先飲醴酒鄭氏曰盛謂今時杯杅也纂竹筥也啜者不盥手飯者盥纂或作簨孔氏曰此一節明食之雜禮啜粥不用手故不盥以手就纂取飲故盥也練而食菜果者食之時以醯醬也始食肉始飲酒謂祥後也然間傳曰父母之喪大祥有醯醬禫而飲醴酒二文不同蓋記者所聞之異案熊氏曰此據病而不能食者練而食醯醬祥而飲酒也期之喪三不食食疏食水飲不食菜果三月既葬食肉飲酒期終喪不食肉不飲酒父在為母為妻九月之喪食飲猶期之喪也食肉飲酒不與人樂之鄭氏曰食肉飲酒亦謂既葬孔氏曰此一節論期與大功喪食之節期之喪謂大夫士旁期之喪三不食者謂義服其正服則二日不食見間傳猶期之喪謂事同期也五月三月之喪一不食再不食可也比葬食肉飲酒不與人樂之叔母世母故主宗子食肉飲酒不能食粥羮之以菜可也有疾食肉飲酒可也五十不成喪七十唯衰麻在身鄭氏曰叔母以下義服恩輕也故主謂舊君也言故主者關大夫及君也性不能食粥可食飯菜羮有疾食肉飲酒為其氣微也不成喪成猶備也所不能備謂不致毁不散送之屬也七十居處飲食與吉時同孔氏曰此一經明五月三月喪食之節一不食謂緦麻再不食謂小功并言之容殤降之緦麻再不食義服小功一不食故以一不食再不食結之故間傳云小功緦麻再不食殤降者也故主若是諸侯當云舊君主者大夫之稱故知關大夫君也既葬若君食之則食之大夫父之友食之則食之矣不辟粱肉若有酒醴則辭鄭氏曰尊者之前可以食美也變於顔色亦不可孔氏曰此經明已有喪既葬尊者賜食之禮葬後情殺可從尊者奪也君食之謂君食臣也大夫謂大夫食士也父友謂父同志也其人並尊若命之食則可從之食也雖以粱米之飯及肉命食孝子食之若飲酒醴則變見顔色故辭而不飲小斂於戶內大斂於阼君以簟席大夫以蒲席士以葦席鄭氏曰簟細葦席也三者下皆有莞孔氐曰此一節明君大夫士小斂大斂所用之席士卑不嫌故得與君同用簟也案士喪禮記云設牀當牖下莞上簟士喪經云布席户內下莞上簟謂小斂也大斂云布席如初始死至大斂用席皆有莞也大夫辟君上席以蒲若吉禮則蒲在莞下故司几筵繢純加莞席紛純與此異也小斂布絞縮者一橫者三君錦衾大夫縞衾士緇衾皆一衣十有九稱君陳衣于序東大夫士陳衣于房中皆西領北上絞襟不在列鄭氏曰絞既斂所用束堅之者縮從也衣十有九稱法天地之終數也士喪禮小斂陳衣於房中南領西上與大夫異今此同亦蓋天子之士也絞襟不在列以其不成稱不連數也小斂無襟因絞不在列見之也或曰縮者二孔氏曰此以下至絺綌紵不入廣明君大夫士小斂大斂及襚所用之衣并所陳之處經明小斂之衣以布為絞從者一幅豎置於尸下橫者三幅亦在尸下從者在橫者之上每幅之末析為三片以結束為便也君大夫士各用一衾故云皆一舒衾於此絞上君大夫士同用十九稱衣布於衾上然後舉尸於衣上屈衣裹又屈衾裹之然後以絞束之天數終於九地數終於十人既終故云以天地終數斂之也陳衣謂將小斂陳衣也房中者東房大夫士唯有東房也絞襟不在十九稱之列大斂布絞縮者三橫者五布襟二衾君大夫士一也君陳衣于庭百稱北領西上大夫陳衣于序東五十稱西領南上士陳衣于序東三十稱西領南上絞襟如朝服絞一幅為三不辟襟五幅無紞鄭氏曰二衾者或覆之或薦之如朝服者謂布精粗朝服十五升小斂之絞也廣終幅析其末以為堅之強也大斂之絞一幅三析用之以為堅之急也紞以組類為之綴之領側若今被識矣生時襌被有識死者去之異於生也士喪禮大斂亦陳衣於房中南領西上與大夫異今此又同亦蓋天子之士紞或為點孔氏曰此一節明大斂之事布絞縮者三者取布一幅裂作三片直用之兩頭裂中央不通橫者五者又取布二幅分裂作六片用五片橫於縮下布襟者襌被也當在絞上以絞束之二衾者小斂君大夫士各一衾至大斂各加一衾為二衾其衾所用與小斂同但此衾一是始死覆尸者故士喪禮云幠用斂衾注大斂所并用之衾一是大斂時復制士既然明大夫以上亦然君陳衣百稱者衣多故陳在庭為榮案鄭注雜記篇襲禮大夫五諸侯七上公九天子十二稱則此大斂天子當百二十稱上公九十稱侯伯子男七十稱今云君百稱者舉上公全數言之北領謂尸在堂也西上由西階取之便也大夫士小斂衣少統於尸故北上大斂衣多故南上亦取之便也絞之於襟二者布精粗皆如朝服十五升絞以一幅之布分為三假辟擘也小斂絞全幅析裂其末為三大斂之絞既小不復擘裂其末古字假借讀辟為擘也鄭注堅之強堅之急者解小斂絞用布全幅以衣少欲得堅束力強也大斂一幅分為三片凡物細則束縛牢急以衣多故須急也鄭注紞綴之領側若被識者領為被頭側謂被旁識謂記識言綴此組類於領及側如今被之記識也案皇氏曰襟襌被也取置絞束之下擬用以舉尸也孝經云衣食而舉之是也小斂之衣祭服不倒君無襚大夫士畢主人之祭服親戚之衣受之不以即陳小斂君大夫士皆用復衣復衾大斂君大夫士祭服無算君褶衣褶衾大夫士猶小斂也鄭氏曰不倒尊祭服也斂者要方散衣有倒君無禭者不陳不以斂也褶夾也君衣尚多去其著也孔氏曰祭服謂死者所用也小斂十九稱不悉著之但用裏尸要取其方而衣其倒領在足間者唯祭服尊領不倒在足也君無襚者國君陳衣及斂悉用己衣臣有致襚不得陳用也大夫士降於君小斂則先畢盡用己正服乃用賔客襚者也用衣之美者故言祭服若親屬有衣相送受之而不以即陳列也士喪禮鄭注云大功以上有同財之義襚之不將命自即陳於房中小功以下及同姓皆將命祭服無算算數也大斂所有祭服皆用之無限數也大夫士猶小斂則復衣復衾也據主人之衣故用復若襚亦得用夾也故士喪禮云禭以褶是也廬陵胡氏曰謂君不以衣襚大夫士也此謂小斂若大斂則君有襚士喪禮具之袍必有表不襌衣必有裳謂之一稱鄭氏曰袍褻衣必有以表之乃成稱也雜記曰子羔之襲繭衣裳與稅衣纁袡為一是也論語當暑袗絺綌必表而出之亦為其褻也孔氏曰袍有衣以表之不使襌露也引雜記證子羔之襲有袍繭衣上加稅衣為表乃成稱引論語證衣上加表死則冬夏並用袍上並加表案熊氏曰褻衣所用尊卑不同士襲而用褻衣故士喪禮陳襲事爵辨服皮辨服褖衣注云褖所以表袍是襲有袍士喪禮小斂云祭服次散衣次注云褖衣以下袍繭之屬是小斂有袍士喪大斂散衣是亦有袍若大夫襲亦有袍案雜記子羔之襲繭衣裳是也若公則襲及大小斂皆不用褻衣雜記公襲無袍繭是也襲輕尚無大小斂無可知唐陸氏曰衣單復俱曰稱凡陳衣者實之篋取衣者亦以篋升降者自西階凡陳衣不詘非列采不入絺綌紵不入鄭氏曰取猶受也不屈謂舒而不卷也列采謂正服之色也絺綌紵當暑之褻衣也襲尸重形冬夏用袍及斂則用正服孔氏曰列采謂五方正色非列采謂雜色不入陳之也絺是細葛綌是粗葛紵是紵布此褻衣也凡斂者袒遷尸者襲君之喪大胥是斂衆胥佐之大夫之喪大胥侍之衆胥是斂士之喪胥為侍士是斂鄭氏曰袒者於事便也胥樂官也不掌喪事胥當為祝字之誤也侍猶臨也大祝之職大喪贊斂喪祝卿大夫之喪掌斂士喪禮商祝主斂孔氏曰此一節明斂所用之人大小斂事多故袒為便遷尸入棺事少故襲大祝是接神者故君喪使執斂事是猶執也衆祝喪祝也賤故副佐大祝也大夫卑故大祝侍之侍謂臨檢之也君應有侍者不知何人也衆祝即喪祝卑故親執斂也士之喪喪祝臨之士之朋友來助斂也士喪禮士舉遷尸是也商祝祝習商禮者小斂大斂祭服不倒皆左衽結絞不紐鄭氏曰左衽衽向左也反生時也孔氏曰此一節明斂衣之法前也言小斂不倒此又並言者為下諸事出也衽衣襟也生向右左手解抽帶便也死則襟向左示不復解生時帶並為屈紐使易抽解若死則無復解義故絞束畢結之不為紐也斂者既斂必哭士與其執事則斂斂焉則為之一不食凡斂者六人鄭氏曰斂者必使所與執事者不欲妄人褻之執或為􅳪孔氏曰斂者謂大祝衆祝之屬以其與亡者或臣舊或有恩今手為執事專心則增感故斂竟皆哭也士與其執事謂平生曾與亡者共執事今與喪所則助斂若不經共執事則褻惡之不使斂也生經有恩死又為之斂為之廢一食斂兩邊各三人故用六人凡者貴賤同也山隂陸氏曰君子所遇而安則死亦樂矣莊子南面王樂是也故君之喪使大胥是斂衆胥佐之夫愛親豈有窮哉故凡斂孝子非之大胥是焉檀弓曰君於大夫將葬及出命引之言孝子可以義奪也士商祝主斂士是之而已鄭氏謂胥當為祝誤矣君錦冒黼殺綴旁七大夫元冒黼殺綴旁五士緇冒赬殺綴旁三凡冒質長與手齊殺三尺自小斂以往用夷衾夷衾質殺之裁猶冒也鄭氏曰冒者既襲所以韜尸重形也殺冒之下羣韜足上行者也小斂又覆以夷衾裁猶制也字或為材孔氏曰此一經明尊卑冒制冒謂襲後小斂前所用以韜尸也冒有質殺者作兩囊各縫合一頭又縫連一邊餘一邊不縫兩囊皆然也上者曰質下者曰殺君質用錦殺用黼鄭注士喪禮云冒制如直囊其用之先以殺韜足而上後以質韜首而下綴旁七者不縫之邊上下安七帶綴以結之也大夫綴旁五士旁三者尊卑之差也鄭注士喪禮云上元下纁象天地也以此推之士赬殺則君大夫畫殺為斧文也凡冒謂通貴賤也冒之質從頭韜來至下長短與手相齊也殺從足韜上長三尺自小斂以往往猶後也小斂前有冒小斂後衣多故用夷衾覆之夷衾質殺之裁猶冒也者言夷衾所用上齊於手下三尺所用繒色及長短制度如冒之質殺但不復為囊及旁綴也君將大斂子辨絰即位于序端卿大夫即位于堂廉楹西北面東上父兄堂下北面夫人命婦尸西東面外宗房中南面小臣鋪席商祝鋪絞襟衾衣士盥于盤上士舉遷尸于斂上卒斂宰告子馮之踊夫人東面亦如之鄭氏曰子辨絰者未成服辨如爵辨而素大夫之喪子亦辨絰孔氏曰此一經明君大斂時節也成服則著喪冠辨絰是未成服君大夫士皆然此雖謂大斂其小斂亦同也序謂東序端謂序之南頭卿大夫謂羣臣也堂亷謂堂基南畔亷稜之上楹謂南近堂亷者子既在序端故羣臣列於基上東楹之西也父兄諸父諸兄不仕者以其賤故在堂下鄉北以東為上也若士亦在堂下外宗君姑姊妹之女及姨舅之女也輕故在房中而鄉南鋪席謂下莞上簟敷於阼階上供大斂也商祝鋪絞襟衾衣等致于小臣所鋪席上以待尸也士亦喪祝之屬周禮喪祝上士二人中士四人下士八人將舉尸故先盥手于盤上也斂上即斂處宰告者斂畢大宰告孝子也孝子得告馮尸而起踊夫人亦馮尸而踊馮竟乃斂於棺大夫之喪將大斂既鋪絞襟衾衣君至主人迎先入門右巫止于門外君釋菜祝先入升堂君即位于序端卿大夫即位于堂廉楹西北面東上主人房外南面主婦尸西東面遷尸卒斂宰告主人降北面于堂下君撫之主人拜稽顙君降升主人馮之命主婦馮之鄭氏曰先入右者入門而右也巫止者君行必與巫巫主辟凶邪也釋菜禮門神也必禮門神者禮君非問疾弔喪不入諸臣之家也主人房外南面大夫之子尊得升視斂也孔氏曰此一經明大夫大斂節也主人適子也出門迎君望見馬首不哭不拜先還入門右北面以待君至士喪禮注云不哭厭於君不敢伸其私恩也巫止門外者君臨臣喪巫祝桃茢至門恐主人惡之且禮敬主人故不將巫入對尸柩士喪禮云巫止于廟門外祝代之具在檀弓疏巫止而祝代入故先君而入門升自阼階也君隨祝後而升堂即位於東序之端阼階上之東是適子臨斂處也主人房外南面者鄉者在門右君升則主人亦升立君之北東房之外面鄉南俱欲視斂也遷尸者鄉鋪絞襟衾衣而君至今列位畢故舉尸于鋪衣上也主人得告斂畢降西階堂下鄉北立待君者君臣情重方為分異故斂竟君以手撫案尸與之别主人見君撫尸故在堂下拜稽顙以禮君之恩君降者撫尸畢而下堂也升主人者君命升之也主人升自西階由足西面馮尸不當君所君又命主婦馮之士喪禮其子不得升故鄭注大夫之子尊得升視斂也橫渠張氏曰巫祝皆所以接鬼神也巫之接鬼神者不説有鬼神直以至誠感之若有所應感之正則得正感之邪則得邪聖人存之山隂陸氏曰君釋菜者非修潔不入諸臣之家士之喪將大斂君不在其餘禮猶大夫也鄭氏曰其餘謂卿大夫及主婦之位孔氏曰此一節明士斂之節士喪卑無恩君不視斂故云君不在也其餘鋪衣列位男女之儀悉如大夫也鋪絞襟踊鋪衾踊鋪衣踊遷尸踊斂衣踊斂衾踊斂絞襟踊鄭氏曰目孝子踊節孔氏曰此一節明孝子貴賤踊節君撫大夫撫內命婦大夫撫室老撫姪娣君大夫馮父母妻長子不馮庶子士馮父母妻長子庶子庶子有子則父母不馮其尸凡馮尸者父母先妻子後君於臣撫之父母於子執之子於父母馮之婦於舅姑奉之舅姑於婦撫之妻於夫拘之夫於妻於昆弟執之馮尸不當君所凡馮尸興必踊鄭氏曰撫以手案之也內命婦君之世婦馮謂扶持服膺也君於臣撫之至夫與妻於昆弟執之此恩之深淺尊卑之儀也馮之類必當心馮尸不當君所不敢與尊者所馮同處也凡馮尸興必踊悲哀之至馮尸必坐孔氏曰此一節明撫尸及馮尸之節大夫貴故君自撫之大夫以室老為貴臣以姪娣為貴妾死則為之服故並撫之也君大夫自主父母妻長子四人喪故同馮之馮父母撫妻子并云馮通言耳士賤故馮及庶子無子者君大夫庶子雖無子不得馮也凡馮尸者凡主人也父母先妻子後謂尸之父母妻子也君尊於臣但以手撫案尸心身不服膺也父母於子執之當心上衣也子於父母馮之服膺心上也婦於舅姑尊故奉當心上衣也舅姑於婦亦手案尸心與君為臣同也妻於夫拘之微引心上衣輕於馮重於執也夫於妻於昆弟亦執心上衣也不當君所者君已馮心則餘人馮者宜少辟之凡馮尸必哀殞故起必踊泄之馮者為重奉次之拘次之執次之尊者則馮奉卑者則撫執執雖輕於撫而恩深故君於臣撫父母於子執是兼有尊卑深淺也士喪禮君坐撫當心此下云馮尸不當君所明君不撫得當君所也山隂陸氏曰言執若不能拾也婦於舅姑言奉若舅姑在焉婦人從一拘之若猶有所拘焉父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宫之大夫士袒之既葬柱楣塗廬不於顯者君大夫士皆宫之凡非適子者自未葬以於隱者為廬鄭氏曰宫謂圍障之也袒袒也謂不障不於顯者不塗見面於隱者為廬不欲人屬目蓋廬於東南角既葬猶然孔氏曰此以下至兄不次於弟明君大夫士遭喪斬衰齊衰大功等居廬及堊室至祥禫以來降殺之節此經論遭喪居廬之禮廬者中門之外東牆下倚木為廬以草夾障不用泥塗之孝子居於廬中寢卧於苫頭枕於凷若非喪事口不言説君廬外以帷障之如宫牆大夫士其廬袒露不帷障也既葬情殺故柱楣稍舉以納日光又以泥塗辟風寒不塗廬外顯處也大夫士既葬故得宫之凡非適子謂庶子也既非喪主故於東南角隱映處為廬葬竟亦然既葬與人立君言王事不言國事大夫士言公事不言家事鄭氏曰此常禮也孔氏曰此經明居喪常禮未葬不與人並立君諸侯也王天子也既葬可並立則諸侯可言於天子事猶不私言己國事公君也大夫士亦得言君事未可言私事曾子問練不羣立據無事之時此有事須言故與人立也禮記集説卷一百六
