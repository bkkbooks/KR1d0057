body:
  text: 禮記集說卷三十宋衛湜撰冢宰制國用必於嵗之杪五穀皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出祭用數之仂鄭氏曰制國用如今度支經用杪末也小大豐耗謂小國大國豐凶之年各以嵗之收入制其用多少多不過禮少有所殺也通三十年之率當有九年之蓄出謂所當給為祭則算今年一嵗經用之數用其什一孔氏曰自此至以樂一節論冢宰制國用及年之豐耗并喪祭及所蓄積之法用地謂制國之用凡制國用必計地小大又視年之豐耗若地大年豐則制用多地小年耗則制用少先以三十年通融之法留九年蓄外計見在之物以制國用每年所入分為四分一分擬為儲積三分為當年所用二年又留一分三年又留一分是三年總得三分為一年之蓄通三十年之率當有十年之蓄也鄭註出謂給為者給謂給百官賓客及民人也為謂為造國家器物也知祭用今年一嵗經用之數用其什一者以下文云喪用三年之仂此直云數之仂故知是一嵗之仂也又知仂為什一者以仂是分散之名考工記云以其圍之仂捎其藪彼註仂謂三分之一此云什一者以民稅一嵗之十一則國祭所用亦十一也此謂當年經用之内用其什一非是通計擬三年儲積之蓄也故鄭云一嵗經用之數也崔氏曰通三十年當有十年之蓄下云有九年之蓄者三十年之間大略有閏月十二足為一年故唯有九年之蓄也長樂劉氏曰三代以前天下無兵也莫非卒伍其民以為軍師以守邦土是以欲固其國者先保其民什一之法行則其民有以自養也水溢凶旱頻年荐至民闕其食則國有九年之蓄所以保民而固國也用地小大者欲知萬民多寡之實也視年之豐耗者以裁國家費用之宜也通以三十年所入之數則豐耗在其中矣即其通數以為禮制則三十年之内雖有凶荒而國用亦不匱矣又有九年之蓄在外所以防大凶災保育其民者也嚴陵方氏曰周官大宰以九式均節財用則制國用存乎冢宰眀矣制國用制其多少之數也然國之用資於財財之成繫乎嵗嵗之功見乎末故制國用多少之數必於嵗功之杪也以嵗之功見乎末猶木實成乎杪五穀即黍稷菽麥稻也先後固不齊矣故必五穀皆入然後可以制國用也嵗之杪則五穀皆入矣申言之者以見百貨之用制之者以五穀為之主也用地小大視年之豐耗者地小而所出之物多則由乎年之豐地大而所出之物少則由乎年之耗故用地小大以視年之豐耗也必視年之豐耗將以制國用故也耗減也上曰嵗下曰年者嵗之杪主時言之年之豐耗主物言之故也且言嵗則必期焉言年則不必期也亦見曲禮嵗凶年穀不登解以三十年之通制國用者通融三十年之豐耗以為國用多少之制也必以三十年為期者舉一世言之而天時人事大略可知矣上言制國用於嵗之杪此以三十年之通者蓋為比年之常法則以三十年之通權一嵗之宜則於嵗之杪而已量入以為出者量三十年所入之多少為比年國用之節也馬氏曰冢宰者以位言之則處於六卿之上故謂之冢冢者以言其髙之極也以職言之則主天下之事故謂之宰宰者以言其主也蓋嵗之杪者萬物以成方此之時而九賦皆入焉故周官以九式均節財用必在於九賦之後也國之用則在於財而財之所出則在於地地之所生則本於天時地之所出有多寡而天時之所成亦有多寡故曰用地小大視年之豐耗蓋禮之大倫以地廣狹而以為常也禮之厚薄以年之上下而以為變也周官以九式均節財用而喪祭居其二焉故王制止言喪祭者舉其重者而言之也喪則用三年之仂祭則用數之仂何也蓋祭則有常典而喪者出於非常之變也出於非常之變故喪三年則不祭非特哀有所隆而祭有所不暇也抑亦見財費之不可無節國之用非止於喪祭而以喪祭為重山隂陸氏曰詞間容之有不必也冢宰制嵗之用以其餘歸於此謂之仂仂若卦之仂四眀沈氏曰古之理財者論天而不論人圖逺而不圖近今之理財者立為一定之法而不計天時之如何以無常之天時而應有常之供賦民何得不窮哉圖於目前不暇給之計而不計後日水旱之如何以不可測之水旱而處以苟簡倉卒之調度國何得不困哉此冢宰所以待嵗之杪而始制國用而不敢立為一定之法以三十年之通制國用而不敢止為目前之計也講義曰用地小大校之則所入之多寡可見故可以觀年之豐耗也金華邵氏曰先王之制國用不為定法非若後世之拘於繁文守常而不知變者故為法也必於嵗之杪蓋嵗杪則五穀皆入可以視其所入而為所出也又用地小大視年之豐耗以三十年通融之法留九年之蓄然後計見在之數以為用度之法豐不使之有餘耗不使之不足曷嘗有定法哉如此故天不能使之災地不能使之窮而凶荒水旱其民不至於流離飢餓者此也祭用經用之什一者不敢略於神也喪用三年之仂抑亦送死之禮尤所不當略乎喪三年不祭唯祭天地社稷為越紼而行事喪用三年之仂喪祭用不足曰暴有餘曰浩祭豐年不奢凶年不儉國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂鄭氏曰越紼行事不敢以卑廢尊越猶躐也紼輴車索也喪大事故用三嵗之什一暴猶耗也浩猶饒也不奢不儉常用數之仂也菜色食菜之色民無食菜之飢色天子乃日舉以樂侑食孔氏曰私喪者是其卑天地社稷是其尊今雖遭私喪既殯以後若有天地社稷之祭即行之故鄭云不敢以卑廢尊也越是踐躐之義未葬之前屬紼於輴以備火災今既祭天地社稷須越躐此紼而徃祭所故云越紼六宗山川之神則否其宫中五祀在喪内則亦祭之故曽子問曰君薨五祀之祭不行既殯而祭之自啓至於反哭五祀之祭不行既葬而祭之但祭時不須越紼蓋五祀宫中之神喪時朝夕出入所祭不為越紼也杜預註春秋以為既祔以後宗廟得四時常祭三年大禘則同於吉與三年不祭違者禮記後儒所作不與春秋同也物被殘暴則虚耗故鄭云暴猶耗也浩者是多大之義故云猶饒也凶旱謂凶荒遭旱也水溢謂水泛溢若貯積滿九年之後則腐壊當隨時給用也河南程氏曰越紼則是猶在殯宫於時無由可致齋又安能脫喪服衣祭服此皆難行縱天地之祀不可廢則止可使冢宰攝爾昔者當英宗初即位有人以此問正叔正叔謂古人居喪百事皆如禮雖廢祭祀可也今人百事皆如常特於祭祀廢之則不若無廢為愈也子厚正之曰父在子為母喪則不敢見其父不敢以禮見也今天子為父之喪以此見上帝是亦非禮見上帝也故不如無祭橫渠張氏曰唯天地社稷越紼而行事則是未葬未葬則如何祭是時雖欲祭之不可得也若居喪未祭則因禮有緦不祭之文方祭之初雖功緦如何可祭又豈可三年廢祖先之祭久而哀殺可齊則便可祭以人情酌之三年之喪期可祭期之喪既葬可祭緦功之喪踰月可祭當服祭服祭之各以其盛服祭罷反喪服藍田吕氏曰人事之重莫甚於哀死故有喪者之毁如不欲生大功之喪業猶可廢喪不貳事如此則祭雖至重亦有所不可行蓋祭而誠至則忘哀祭而誠不至不如不祭之為愈也後世哀死不如古人之隆故多疑於此新安朱氏曰古人居喪衰麻之衣不釋於身哭泣之聲不絶於口其出入起居言語飲食皆與平日絶異故宗廟之祭雖廢而幽明之閒兩無憾焉今人居喪與古人異卒哭之後遂墨其衰凡出入居處言語飲食與平日之所為皆不廢也而獨廢此一事恐亦有所未安竊謂欲處此義者但當自省所以居喪之禮果能始卒一一合於古禮即廢祭無可疑若他事不免墨衰出入或其他有所未合者尚多即卒哭之前不得已準禮且廢卒哭之後遇四時祭日以衰服特祀於几筵用墨衰常祀於家廟可也但卒哭之期須既葬立主三虞之後卜日而祭以成事方可耳若神柩在而欲以百日為斷墨衰出入則決不可又曰家閒頃年居喪於四時正祭三獻受胙非居喪所可行而俗節則唯普同一獻不讀祝不受胙也其禮甚簡以墨衰行事山隂陸氏曰不祭謂宗廟爾即天地社稷雖未葬猶祭是之謂越紼若五祀蓋亦不廢不足則取之或暴用之不竭浩也國非其國言如此國非人之國矣長樂劉氏曰以三年之仂共於喪祭斯亦足矣踰禮越中殘暴其物俾有不足者故曰暴也儉於禮而不盡其財故曰浩浩謂財有餘而禮不足也嚴陵方氏曰易言大衍之數也揲之以四以象四時歸奇於扐以象閏蓋扐者指閒也揲蓍而四分之竒則歸之於指閒故也此所謂仂亦四分之一爾數之仂則一年所用四分之一也三年之仂則三年所用四分之一也祭之用數而寡故用一年之仂喪之用疏而多故用三年之仂亦各稱其宜而已喪三年不祭則不以吉事干凶禮也唯祭天地社稷則不以所親廢所尊也馬氏曰禮之厚薄與年之上下豐年則用豐年之仂凶年則用凶年之仂豐年而加於仂之外則謂之奢凶年而略於仂之内則謂之儉乃所以與年之上下也預備不虞者古之善政也急者迫而不緩也無九年六年之蓄雖非完國猶足以為國也至於無三年之蓄非其國也蓋國之所以為國者以有民也民之所以為民者以有財也苟無其財則民散而之四方矣故曰無三年之蓄非其國也三年耕必有一年之食推而至於二十七年耕必有九年之食以三十年言之者舉成數也說者以為三十年為一世三年耕必有一年之食至三十年之通此人力也雖有凶旱水溢此天變也人力備則可以應天變蓋王者與民同患故雖有凶旱水溢而民無菜色於下然後天子食日舉羞備禮而以樂侑之也李氏曰魯莊公冬大無麥禾臧孫告糴于齊傳曰古者稅十一豐年補敗不外求而上下皆足也雖累凶年民弗病也一年不艾而百姓飢君子非之明王制民之産業上地食九人而準之以七人故三年耕而有一年之食九年耕而有三年之食夫欲九年之蓄而以三十年之耕常以其有餘計之此補不足之道也子曰如有用我者三年有成又曰如有王者必世而後仁亦謂是與故孟子曰聖人治天下使有菽粟如水火而民焉有不仁者乎先王之治田蕩之以溝均之以遂足以禦凶旱舎之以列寫之以澮足以禦水溢而猶恃九年之蓄者待天災之盡也先王備水旱者具矣而猶有水旱之患蓋天時不可知雖先王之備法有所不免也民有菜色可謂民可以食鮮可以飽之時也詩曰我取其陳食我農人美蓄積之多也延平周氏曰不足言其財急言其民國非其國言其上長樂陳氏曰古者天子大喪大荒大札則不舉天地有烖邦有大故則不舉至於荒政則蕃樂大凶則弛縣然則以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂豈不宜哉蓋天子能承順天地和理神人使無災害變故然後可以饗備味聽備樂故饋食用六榖膳用六牲飲用六淸珍用八物羞百有二十品醬百有二十器齊醢六十物鼎十有二物其舉備味如此侑以備樂可知豈非王者憂以天下樂以天下之意乎膳夫王乃食卒食以樂徹于造大司樂王大食皆令奏鍾鼓夫以天子一飲食之際未嘗不關天下憂樂與夫獨樂而不與民同者豈不有閒歟樂書金華應氏曰此言非謂旱乾水溢亦不廢樂也謂既有三十年通制之規模雖凶災而民不病則常時可以日舉樂耳蓋雖一飯之頃而不忘乎民也若夫偶值凶年則雖有備而亦豈敢用樂乎天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬三年之喪自天子達鄭氏曰尊者舒卑者速春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至三年之喪下通庶人於父母同天子諸侯降期孔氏曰自此至不祭一節明天子以下殯葬日月不同及衣衾牲器之數天子諸侯位既尊重送終禮物其數既多身在於喪許其申遂故日月緩也大夫及士禮數既卑送終之物其數簡少又職唯促遽義許奪情故日月促也必至三日者冀其更生三日不生亦不生矣鄭引春秋傳隱元年左傳文杜預云言同軌以别四夷謂中國諸侯車同軌轍盡皆來至同盟者同在方嶽之盟同位者行役不踰時諸侯以下不言畢至者有來有否不必盡來也左傳云大夫三月士踰月而此總云三月者除死月為三月士三月者數死月為三月正是踰越一月故言踰月耳其殯日之義已具上曲禮疏長樂劉氏曰殯與葬生者送死之事也天子功徳施於四海諸侯功徳洽於一國大夫士恩徳孚於一家庻人恩徳著於其族固有小大之差矣及其終也臣子之心未忍死之猶冀其復生也故其殯者不得已而殯之是以有七日五日之差雖庻人之殯猶俟三日是豈得已哉若夫葬者當其朝嵗諸侯雖在六服罔有弗至或奔喪也或會葬也或㑹於練祥也亦如四時之朝焉其不當朝嵗之諸侯則為位服於其國而遣卿以㑹葬同軌之内畢至者謂此也七月而葬所以極四海之哀誠也諸侯之葬必五月者相為賓也同盟之諸侯也雖非同盟而為其舅甥姑姊妹之邦也大夫士庶人三月而葬其事具其誠盡矣山隂陸氏曰雖同是三日三月大夫數來日士庶人數往日也庶人縣封葬不為雨止不封不樹喪不貳事自天子達於庶人喪從死者祭從生者支子不祭鄭氏曰縣封當為縣窆至卑不得引紼下棺雖雨猶葬以其禮儀少封謂聚土為墳不封不樹卑無飾也周禮曰以爵等為丘封之度與其樹數則士以上乃皆封樹貳之言二也庶人終喪無二事不使從政也喪大記曰大夫士既葬公政入於家既卒哭弁絰帶金革之事無辟也從死者謂衣衾棺椁從生者謂奠祭之牲器孔氏曰鄭知封當為窆者若封是封土無縣繫之理窆謂下棺士雖無碑猶有二繂庶人賤唯縣繩下棺故云縣窆威儀既少日又促遽將葬之時不為雨止公羊說雨不克葬謂天子諸侯也卿大夫臣賤不能以雨止許慎云死葬之以禮以雨而葬是不行禮又釋癈疾云雖庶人葬為雨止此等說則在廟未發之時庶人及卿大夫亦得為雨止若其已發在路及葬則不為雨止其人君在廟及在路及葬皆為雨止不積土為封不標墓以樹卑不須顯異也鄭引周禮是冢人文既云爵等明有爵者乃有丘封周以士為爵也彼註云王公曰丘諸臣曰封又引漢律列侯墳髙四丈關内侯以下至庶人各有差又檀弓云孔子合葬於防崇四尺鄭云葢周之士制其樹數則無文白虎通云天子松諸侯柏大夫栗士槐鄭註貳之言二上貳是副二之貳下二是二三之二喪不貳事謂不為兩事故讀從二三之二也庶人既無爵命三年之内許其終喪除居喪之外不供他事故下云父母之喪三年不從政也盧植解云從生者謂除服之後吉祭之時以子孫官禄祭其父祖故云從生者若喪中之祭虞祔練祥仍從死者之爵故小記云士祔於大夫則易牲又云其妻為大夫而卒而後其夫不為大夫而祔於其妻則不易牲又雜記云上大夫之虞也少牢卒哭成事祔皆大牢下大夫之虞也犆牲卒哭成事祔皆少牢是喪中之祭仍從死者之禮也而鄭云奠祭之牲器云奠則是喪中之祭得從生者之爵與小記雜記違者小記雜記據死者子孫身無官爵生者又無可祭享故喪中之祭皆用死者之禮若其生者有爵則祭從生者之法喪祭尚爾喪後吉祭可知奠謂葬前祭謂葬後包喪終吉祭也鄭必知祭兼喪祭與盧植别者以此云祭從生者喪從死者相對又中庸云父為大夫子為士葬以大夫祭以士又云父為士子為大夫葬以士祭以大夫祭與葬相對皆祭與喪葬連文是一時之事故祭中兼為喪奠也或云在喪中祭尚從死者爵至吉祭乃用生者禄耳鄭云奠者自吉祭之奠耳嚴陵方氏曰封之名雖一然有所謂掩坎之封有所謂積土之封若檀弓言縣棺而封即掩坎之封也若禮器言丘封之大即積土之封也此言不封亦不積土而已山隂陸氏曰案禮衮多借卷字有卷龍飾故也徧多借辨字徧而後能辨故也釋多借舍字窆多借封字釋之則舍窆之則封故也然則凡字雖借葢亦有義焉言達於庶人不言自天子達異於三年之喪也三年之喪不言庶人不嫌長樂陳氏曰縣棺而下之封土而瘞之不為雨止以其有進無退也喪不貳事以其不可奪親也魯葬定公與敬嬴以雨不克葬而春秋譏之則不為雨止者不特庶人而已天子崩王世子聽於冢宰三年則喪不貳事亦不特庶人而已必以庶人為言以其葬具之不備易以雨止食用之不足易以事奪故也祭雖從生者而有所謂從死者故父為士子為天子諸侯而其尸服則以士服支子雖不祭而有所謂祭故宗子為士庶子為大夫則以上牲祭於宗子之家臨川王氏曰喪不貳事當連自天子至於庶人為句三年不從政所謂不貳事使一於喪事也金革無辟上使之非也或權制也孟子前以士後以大夫謂棺椁衣衾之不同與此喪從死者祭從生者似異天子七廟三昭三穆與大祖之廟而七諸侯五廟二昭二穆與大祖之廟而五大夫三廟一昭一穆與大祖之廟而三士一廟庶人祭於寢鄭氏曰此周制七者大祖及文王武王之祧與親廟四大祖后稷也殷則六廟契及湯與二昭二穆夏則五廟無大祖禹與二昭二穆而已諸侯大祖謂始封之君王者之後不為始封之君廟大夫大祖謂别子始爵者大傳曰别子為祖是也雖非别子始爵者亦然士一廟謂諸侯之中士下士名曰官師者上士二廟庶人祭於寢適寢也孔氏曰此一節明天子以下立廟多少不同之事鄭註知七廟唯周者據禮緯稽命徵及鈎命決為說也禮器云周旅酬六尸一人發爵則周七尸七廟明矣諸侯始封之君謂王之子弟封為諸侯為後世之大祖當此君之身不得立出王之廟則全無廟也故諸侯不敢祖天子若有大功徳王特命立之則可若魯有文王之廟鄭祖厲王是也此始封君之子得立一廟六世之孫始五廟備也若異姓始封如大公之屬初封則得立五廟從諸侯禮也鄭註王者之後不為始封之君廟者以其始封之君非有功徳唯因先代之後以封之不得為後世之大祖得立此君所出王者之廟若二王之後郊天之時則得以逺代之祖配天而祭故禮運云把之郊也禹也宋之郊也契也大夫之大祖則諸侯之子始為卿大夫謂之别子者也是嫡夫人之次子或衆妾之子别異於正君繼父言之故云别子鄭引大傳證此大祖是别子也鄭註雖非别子始爵者亦然者此事凡有數條一是别子初雖身為大夫中閒廢退至逺世子孫始得爵命則以為大祖别子不得為大祖也二是别子及子孫不得爵命者後世始得爵命自得為大祖三是全非諸侯子孫異姓為大夫者及他國之臣初來任為大夫者亦得為大祖此三事皆始爵者又鄭荅趙商云王制所論皆殷制故云雖非别子亦得立大祖之廟若其周制别子始爵其後得立别子為大祖若非别子之後雖為大夫但立父祖曽祖三廟而已隨時而遷不得立始爵者為大祖鄭必知周制别子之後得立别子為大祖者以大傳云别子為祖繫之以姓而弗别綴之以食而弗殊故知别子百世不遷為大祖也周既如此明殷不繫姓不綴食大傳又曰其庶姓别於上而戚單於下五世而昏姻可以通明五世之後不復繼於别子但始爵者則得為大祖也此大夫三廟者天子諸侯之大夫皆同知者以此及祭法歴陳天子諸侯即云大夫更不别云諸侯之大夫故知與天子大夫同卿即大夫緫號也案祭法適士二廟今此云士一廟故知是諸侯之中士下士祭法云官師一廟故鄭云名曰官師者鄭既云諸侯之中士下士一廟則天子之中士下士皆二廟也鄭又知諸侯中士下士同一廟者以祭法云適士二廟言適士則不得兼中下也庶人之祭謂薦物以其無廟故唯薦而已薦獻不可褻處故知適寢也河南程氏曰自天子至於庶人五服未嘗有異皆至髙祖服既如是祭祀亦當如是其疏數之節未有可考但其理必如此七廟五廟亦止是祭及髙祖大夫士雖或三廟二廟一廟或祭寢廟雖異亦不害祭及髙祖若止祭禰則猶知祖而不知父禽獸道也尊禰而不及祖非人道也横渠張氏曰七廟之祖聚於大祖者此葢有深意以其當有祧者且祧者當易檐故盡出之因是而祧用意宛轉諸侯則以有國指始封之君為大祖若大夫安得大祖廟數以親數又況祖祭自有宗子此言葢為世禄之家發之也嚴陵方氏曰天子廟七即祭法所言考廟王考皇考顯考祖考廟及二祧是也諸侯五則以無二祧故也大夫三則以顯考祖考又無廟故也士一廟則以王考又無廟故也庶人則祭於寢祭法言庶人無廟正謂此也然祭法又言適士二廟而此不言者主於降殺以兩而略之也天子之廟止於七何也大祖之廟創業之所始萬世所不遷也而昭穆則合而為六者葢四世其服已窮矣然猶緦也五世同姓已殺矣然猶免也至於六世然後親屬絶故止於三昭三穆與大祖之廟而七也馬氏曰自上而下降殺以兩禮也故天子七廟至士三廟合於降殺以兩之意也祖以功建故無可毁之禮而有百世不遷者也昭穆以親崇故有可毁之禮親盡則有祧說者以為周則七廟夏則五廟殷則六廟葢非是也石林葉氏曰天子七廟見於祭法者明甚鄭氏獨以為周制而為夏五廟殷六廟之說全無所據葢三昭三穆與大祖之廟而七此總數也自考差而上之曰考廟曰王考廟曰皇考廟曰顯考廟即髙祖止矣髙祖而上不可考曰祖考廟者大祖廟也故謂之祧稱二祧焉合而言之為七廟分而言之則廟有五而祧有二皆在三昭三穆之數餘見祭法長樂陳氏曰積厚者流澤廣積薄者流澤狹故天子七廟諸侯五廟大夫三廟士一廟廟而祭之仁之至也以七以五以三以一義之盡也舜之時禋於六宗與藝祖而七商書亦曰七世之廟可以觀徳則七廟之制其來尚矣先王之於死者常待之以生由士而上生而異宫死則為之立廟庶人則生非異宫死則祭於寢而已又禮書曰廟所以象生之有朝也寢所以象生之有寢也建之觀門之内不敢逺其親也位之觀門之左不忍死其親也家語曰天子七廟諸侯五廟自虞至周之所不變也是故虞書禋於六宗以見大祖周官守祧八人以兼姜嫄之宫則虞周七廟可知矣伊尹言七世之廟殷禮也禮記荀卿穀梁皆言天子七廟不特周制也則自虞至周七廟又可知矣然存親立廟親親之至恩祖功宗徳尊尊之大義古之人思其人而愛其樹尊其人則敬其位況廟乎法施於民則祀之以勞定國則祀之況祖宗乎於是禮以義起而殷之三宗周之文武漢之孝文孝武唐之神堯文皇其廟皆在三昭三穆之外歴世不毁此所謂不遷之廟非謂祧也鄭康成之徒以喪服小記言王者立四廟則謂周制七廟文武而二祧親廟四而已則文武不遷之廟在七廟内是臆說也孔氏疏諸侯五廟謂若異姓始封如大公之屬得立五廟從諸侯禮然王者始受命所立不過四廟諸侯初封葢亦廟止髙祖而已謂得五廟無是理也又鄭荅趙商謂五廟為殷制故雖非諸侯之别子亦得立大祖之廟周制别子為大祖若非諸侯之後雖為大夫但立父祖曽祖三廟隨時而遷不得立始爵者為大祖也然左氏曰大夫有二宗荀卿曰大夫士有常宗則大夫有百世不遷之大宗有五世則遷之小宗是大祖之廟常不遷也特祭法曰大夫三廟考與王考皇考有廟顯考祖考無廟而鄭氏遂以為周大夫之制誤矣又曰父以明察下故曰昭子以敬事上故曰穆宗廟有迭毁昭穆則一成而不可易春秋傳言大王之昭王季之穆又言文之昭武之穆此世序之昭穆不可易也周官冢人先王之𦵏居中以昭穆為左右此𦵏位之昭穆不可易也儀禮卒哭以其班祔禮記曰祔必以其昭穆此祔位之昭穆不可易也司士凡祭祀賜爵呼昭穆而進之祭綂凡賜爵昭與昭齒穆與穆齒此賜爵之昭穆不可易也大傳曰合族以食序以昭穆此合食之昭穆不可易也生而賜爵合食死而葬祔皆以世序而不可易則廟之昭穆可知矣其制葢祖廟居中而父昭在左子穆在右始死者昭邪則毁昭廟始死者穆邪則毁穆廟昭與昭為列而無嫌乎子加於父穆與穆為列而無嫌乎父屈於子猶之賜爵也子與祖齒而無嫌乎卑者先父與孫齒而無嫌乎尊者後猶之立尸也子無嫌乎南面而坐父無嫌乎北面而事之則昭穆之不互易不足怪也先儒謂周藏先公木主於后稷之廟先王木主穆在文王廟昭在武王廟於理或然山隂陸氏曰三昭三穆與大祖之廟而七其序如此所謂率親等而上之者也即言士二廟亦何嫌於降殺以兩不及也又曰昭穆者父子之號昭以明下為義穆以恭上為義方其為父則稱昭取其昭以眀下也方其為子則稱穆取其穆以恭上也豈可膠哉張璪何洵直謂昭常為昭穆常為穆左者不可遷於右右者不可遷於左既為昭矣又有時而為穆是亂昭穆之名此說非也苟為昭者不復為穆為穆者不復為昭則是昔常事父為之子者今雖有子不得為父苟復為父則以為是亂父子之名可乎又曰大祖之廟百世不遷三昭三穆親盡則迭毁如周以后稷為大祖王季為昭文王為穆武王為昭成王為穆康王為昭昭王為穆此七世也其後穆王入廟王季親盡而遷則文王宜自右而左居昭位武王宜自下而上居穆位成王昭王宜居昭位康王穆王宜居穆位所謂父昭子穆是也說者或以左傳大伯虞仲大王之昭虢仲虢叔王季之穆管蔡郕霍文之昭也邘晉應韓武之穆也又以書稱穆考文王乃謂文王世次居穆武王世次居昭王季親盡而遷則武王入王季之廟為昭文王仍為穆康王入武王之廟為昭成王仍為穆穆王入康王之廟為昭昭王仍為穆即是觀之子復為昭父更為穆尊卑失序亂昭穆非禮意竊以為世次與廟制不同世次無遷法而廟制親盡則移葢周自后稷至文武十有六世此世次也世次無遷法故自不窋為昭鞠陶為穆推遷而下王季當昭次文王當穆次故左傳以世次推之則昭生穆穆生昭而大伯虞仲管蔡郕霍於周為昭虢仲虢叔邘晉應韓於周為穆杜預所謂以世次計故大伯虞仲於周為昭是也王者世次雖歴無窮而廟祀七世禮有迭毁如王季親盡而遷則昭穆移易有如文王今弗與王季對而對武王則父道在文王武王宜居穆廟成王今弗與武王對而對昭王則父道在成王昭王宜居穆廟豈可不即七廟分定昭穆而欲放先儒逺攀世次令文王廟常為穆武王廟常為昭乎葢王者廟事七世以事生之禮事之至其去祧為壇為墠則與事生異矣故國語曰工史書世宗祝書昭穆知廟次昭穆與世次異矣且禮縁人情而作父昭子穆其亦何常之有對父則身為之穆對子則身為之昭故周廟王季一遷則昔之右者今左左者今右矣至於酒誥所謂穆考文王則如詩之昭考烈考云爾或者又以檀弓云明日祔於祖父則孫從王父之位亦卑壓尊何以無嫌竊以為不然葢祔廟與遷廟異故周卒哭而祔練而後遷廟練與卒哭相去甚逺何以證遷廟之法且穆王初祔未練則王季未遷昭穆未動與祖昭穆同班則祔於康王之廟所謂祔於祖父也祔於祖父則非専其廟而襲其處自無壓父之嫌禮曰君子抱孫不抱子以孫與祖昭穆同如王季既遷文王居昭成王昭王次焉武王居穆康王穆王次焉所謂孫與祖昭穆同者也周官小宗伯既掌辨廟祧之昭穆小史又掌奠繫世辨昭穆則明世次先後與廟祧之昭穆異矣至於大祫遷廟之主陳於大祖未遷廟之主皆升合食於大祖則自大祖以來祧主咸在其昭穆即依世次與七廟常祀昭穆不同故小史又曰大祭祀以書叙昭穆之俎簋也說者以為昭常為昭穆常為穆則王季雖遷而廟中常祀尚用不窋以來世次則昭穆一定何必辨而叙之唯其遷易不常故使辨而叙之也説者又謂劉歆曰孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也先儒以為孫從王父之位則是以為孫居王父之處則非矣故記曰殤者從祖祔食葢王父在廟其孫從之非謂入其廟與祖相代者入其廟而襲其處是不然也張純曰父子不並坐而孫從王父此言祖孫可以並今則知與遷法王父去祧孫襲其廟異矣且孫從王父之説本施於祔故禮曰從祖祔食至於迭遷則王父去廟而孫襲王父之廟則祖自於彼孫自於此不得謂之從也說者又謂廟次以子代父古無此理亦已惑矣玉藻曰適子冠於阼以著代也以子代父理固然矣孰曰廟次不得以子代父乎儀禮將旦而祔此祔廟之法也非關遷廟也禮記祔𦵏者不筮宅祔必以其昭穆此祔𦵏之法也非關遷廟也又曰殤者從祖祔食此祔祭之法也非關遷廟也又曰殷朝而殯於祖此殯之法也非關遷廟也然則孫從王父皆以祔祖而言則與遷廟異明矣祭統曰昭穆者所以别父子逺近長幼親疏之序故有事於大廟則昭穆咸在而不失其倫若昭常為昭穆常為穆則子或壓父尊卑失叙豈所謂不失其倫者邪何氏洵直曰案古者宫寢宗廟皆以孫居王父之處而不以子代父自始祖之後父曰昭子曰穆孫為昭曽孫為穆𤣥孫晜孫復為昭來孫仍孫復為穆謂之昭穆通於存亡居昭位者不可遷於穆行居穆行者不可入於昭位本之於經質之於傳騐之以先儒之説根據盤互枝連葉貫論議符合如出一人請得條别而陳之夫禮常以孫從王父何哉以世次言之則昭穆偶爾相值故學者以為祖孫同班又曰於義一體以禮趣求之葢數始於一立於二成於三故道生一一生二二生三而人之族屬至於三則備矣小宗伯掌三族之别以辨親疏鄭氏以三族謂父子孫人屬之正名先王於此别恩義等親疏而服制皆起於是焉喪服小記曰親親以三為五以五為九上殺下殺旁殺而親畢以氏族言之則公孫之子以王父字為氏是以禮有三本而先祖為類之本此孫從王父之義也何謂宫寢宗廟皆以孫居王父之處曰春秋書髙寢路寢小寢何休曰父居髙寢子居路寢孫從王父母疏義謂孫死亦從王父母是殯於其宫之西序矣殷則殯於祖廟之兩楹閒設朝而殯於祖是也及冢人辨其兆域則以昭穆為左右至卒哭明日又各從其昭穆祔於祖父女子則祔皇祖妣婦則祔皇祖姑故曰以其班祔以士大夫為言若祖爵尊則袝於諸祖父為士大夫者若無可以祔或王父母在則越曽祖一世當為壇而祔髙祖若又無可以祔則越髙祖之父一世袝髙祖之祖記所謂亡則中一以上而祔必以其昭穆者也以諸侯五廟為言祔祭既畢則主復於殯宫之寢如既祫主還其廟然也練而后遷廟於是以始祔之孫入王父廟以王父入髙祖廟以髙祖之主藏於大祖廟春秋榖梁傳曰作主壊廟有時日於練焉壊廟壊廟之道易檐可也改塗可也范甯曰親過髙祖則毁其廟將納新神故示有所加孔穎達曰練時壊祖與髙祖之廟改塗易檐示有壊意以其髙祖入於大祖之廟其祖祔入髙祖廟其新神入祖廟是練時遷廟也遷廟以孫代王父取其昭穆相當所以壊祖與髙祖廟而不毁曽祖廟爾前漢劉歆之論最慱而篤曰孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也今之說者曰祔廟與遷廟異是不然也至祥禫既終而合食於祖則室中之位大祖西方東向大祖之子為昭北方南面大祖之孫為穆南方北面差次而東孫與王父並列下達於禰張純曰父子不並坐而孫從王父王肅引賈逵説吉禘於莊公曰遷主遞位孫居王父之處是也雖祭殤與無後亦以孫從王父記曰從祖祔食葢曰自祭於殤在於父廟祭無後兄弟當就祖廟祭無後諸父當於曽祖廟各從其班也祭成人者必有尸尸必以孫孫幼則使人抱之皆衣其祖之遺衣服而坐於祖主之左然於祭者則子行也父北面而事之故曰君子抱孫不抱子子不可以為父尸以其異昭穆而祖孫則同耳祭統曰羣昭羣穆咸在而不失其倫謂同宗人皆來助祭也又曰昭為一穆為一昭與昭齒穆與穆齒賈公彦曰昭穆在助祭之中者皆在東階之前南陳假令父行為昭子行為穆孫行還為昭曽孫行還為穆就昭穆中各以年長者在上幼者居下故云齒也夫古者葬祔以其班祫以其班為尸及賜爵以其班故昭常為昭穆常為穆義據明白有如日星説者謂父昭子穆何常之有對父則身為之穆對子則身為之昭其意以為廟次與世次不同故昭穆遷徙無常位右者可移之左左者可移之右殊不知廟次與世次一也廟次雖遷唯昭穆之班一定不移祖以傳孫孫以傳子縱歴百世其當為昭當為穆者未之有改也如武王之時廟次以文王為穆至㐮王之世凡歴十八君矣猶謂之穆左氏載富辰之語曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也十八國文王之子文王於廟次世次皆當為穆故謂其子云文之昭也康王時廟次以武王為昭至㐮王之世猶謂之昭富辰曰邘晉應韓武之穆也四國武王之子武王於廟次世次皆當為昭則謂其子曰武之穆也至於宫之竒謂大伯虞仲為大王之昭虢仲虢叔為王季之穆與此同意夫文王大王其子對父皆稱昭曰文王之昭大王之昭武王王季其子對父皆稱穆曰武王之穆王季之穆其為子一也對父或稱昭或稱穆知昭穆為定班而廟次世次未始異也書曰七世之廟記曰天子七廟三昭三穆書言世而禮言昭穆則世與昭穆無不同之理説者引魯語曰工史書世宗祝書昭穆知廟次昭穆與世次異臣以為不然工史所書者帝繫世本之屬宗祝所書者几筵表著之位自其譜諜則謂之世據其班秩則謂之昭穆此離而言之者也又楚語曰宗廟之事昭穆之世此合而言之者也既曰昭穆之世則廟次昭穆果與世次不同乎經傳之言既然矣觀先儒之論則韋𤣥成曰父為昭子為穆孫復為昭杜預曰穆生昭昭生穆漢帝詔曰孝宣皇帝為孝昭皇帝後為義一體顔師古曰一體謂俱為昭也禮孫與祖俱為昭鄭氏曰周以文武為二祧藏遷主文為穆祧為昭主武為昭祧為穆主此先儒論昭穆一定不易皆與經合但祭法逺廟為祧而鄭氏以文武為之葢非是也説者曰穆王入廟王季親盡而遷則文王宜自右而左居昭位武王宜自下而上居穆位必如此言則世次廟次常以子代父古無此理又曰王季既遷文王居昭成王昭王次焉武王居穆康王穆王次焉所謂孫與祖昭穆同臣謂此非禮意何者𦵏與祔祫皆以孫從王父其無祖可祔者必中一以上祔於髙祖論其為尸則抱孫不抱子是昭自昭班穆自穆班故曰孫與祖同若謂祖遷於上則孫與𤣥孫皆次之昔以為穆今復為昭昔以為昭今更為穆以𦵏位袝位祫位尸位觀之皆顚倒失序是徒知有昭穆之名不知有昭穆之班何所謂孫與祖同故曰此非禮意竊嘗以為王制天子七廟三昭三穆與大祖之廟而七此據迭毁為言也祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧去祧為壇去壇為墠此據定體為言也迭毁者言乎其動也言乎其動則云三昭三穆而孫代王父之意寓於其中矣定體者言乎其常也言乎其常則云考與王考至於逺廟去壇而墠遷祖遞位之義亦不外是矣祔與遷廟雖非一時然均名昭穆豈有二位祔則孫從王父合食遷則孫常與祖相代者入其廟而襲其處如劉歆王肅之論是也既生居王父之寢没則殯於其宫之西序𦵏與祔祫俱從祖列至其為尸亦襲祖之遺衣服而坐於其主之左助祭賜爵各以昭穆序以受氏命族又以王父之序是無所不用其其班何獨遷廟則以子代父而亂其班乎説者又引適子冠於阼為證葢亦不類記曰適子冠於阼以著代明其代父傳重其堂祖統昭穆相代也又曰禮記天子七廟三昭三穆與大祖之廟而七諸侯二昭二穆與大祖之廟而五大夫一昭一穆與大祖之廟而三謂之祖則一而大以昭穆嫓焉則二而小一而大者無對故其位居中而不以昭穆居之且世世不毁二而小者有對故㫁自始祖之後父曰昭子曰穆至親盡則迭遷后稷為周祖其子不窋曰昭其孫鞠陶曰穆周公為魯祖其子伯禽曰昭其孫考公曰穆萬物本乎天人本乎祖祖者天也昭居左為陽穆居右為隂以三昭三穆言之則一為昭二為穆三為昭四為穆五為昭六為穆一三五者陽竒之數也二四六者隂耦之數也自一世推而至百世皆然昭者有昭班與陽竒同類穆者有穆班與隂耦同類故𦵏與祔祫必以孫從王父葢神得同班同類則為安也昭之王父以昭孫為尸穆之王父以穆孫為尸葢神得同類則憑依之也夫竒耦為定數左右為定位昭穆為定班若曰右者可移之左左者可移之右猶陽竒有時為耦隂耦有時為竒班類顛錯尊卑失序矣周禮冢人掌公墓之地先王之𦵏居中以昭穆為左右是𦵏位有昭穆儀禮曰卒哭明日以其班祔禮記曰祔必以其昭穆亡則中一以上而祔是祔位有昭穆大祫室中大祖東向昭南面穆北面父子不並坐而孫從王父是祫位有昭穆孫為王父尸子不可為父尸是尸位有昭穆天子七廟三昭三穆諸侯五廟二昭二穆大夫三廟一昭一穆是廟位有昭穆𦵏位之昭穆一定不移則祔可知也祔位之昭穆一定不移則祫可知也祫位之昭穆一定不移則尸可知也尸位之昭穆一定不移則廟可知也𦵏位祔位祫位尸位廟位五者均謂之昭穆豈有二義哉在𦵏位為昭則於祔位祫位尸位廟位俱為昭在𦵏位為穆則於祔位祫位尸位廟位俱為穆今之說者曰父昭子穆何常之有對父則為穆對子則為昭故有在廟位為昭而於祔位祫位為穆在廟位為穆而於祔位祫位為昭失禮意矣王季之時以大王為穆至惠王時歴十八君而謂之穆文王之時以王季為昭至惠王時歴十八君而謂之昭宫之竒曰大伯虞仲大王之昭虢仲虢叔王季之穆大伯虞仲者大王之子虢仲虢叔者王季之子大王於廟次世次為穆故謂其子為昭王季於廟次世次為昭故謂其子為穆武王時廟次以文王為穆康王時廟次以武王為昭至㐮王之世亦謂其子曰文王之昭武王之穆周大夫富辰既言之矣曹伯之臣侯獳又曰曹叔振鐸文之昭也先君唐叔武之穆也㐮王距文王之時無慮十有八世景王之子恭王距㐮王又七世而逺魯定公四年衛大夫祝鮀之言猶曰曹文之昭晉武之穆繇此論之昭常為昭穆常為穆雖百世無昜也始祖之位定則昭穆從而正始祖之位不定則昭穆從而不正漢以大上廟主瘞於陵園而悼皇考序於昭穆是髙皇帝以有功加其父史皇孫以旁支干大統有以知漢之昭穆不正也唐以景皇帝為大祖而上有獻懿二祖貞元中用陳京議遷獻懿於别廟而景皇帝正東向之位有以知唐之昭穆不正也漢唐猶然又況晉隋五代之末造乎祖位定而昭穆正者殷周與本朝是也張氏璪曰以周制言之王季為昭文王為穆武王為昭成王為穆則所謂父昭子穆也然則王季親盡其廟既遷武王自右而上從王季之位而不嫌尊於文王何也葢昭穆以定位也武王既為昭矣則其位在左自為尊卑而無與於文王之穆也又四時常祀各於其廟不偶坐而相臨此其所以進居王季之位而不嫌尊於文王也及乎合食於大祖之廟則王季文王更為昭穆而世次雖逺不可謂無尊卑之序矣葢禮有三本而祖者類之本故孫常從祖而不從父所以不從父者不獨嚴重本之義亦嫌於代父也是以武王常從王季而為昭成王常從文王而為穆故廟制世次並行而不相害今若以王季親盡毁廟文王自右而左居昭位武王自下而上居穆位及合饗之祭而文王復為穆武王更為昭則是一身既為昭矣又有時而為穆既為穆矣復有時而為昭不惟亂昭穆之名又考之經傳無所據矣且生而居處没而殯𦵏以至祔祭入廟為尸賜爵皆孫從祖而不從父所以昭穆常用世次奚至於廟次獨不然乎新安朱氏曰昭之為言明也以其南面而向明也其讀為韶先儒以為晉避諱而改之然禮書亦有作佋字者則假借而通用耳或問曰其為向明何也曰此不可以空言曉也今且假設諸侯之廟以明之蓋周禮建國之神位左宗廟則五廟皆當在公宫之東南矣其制則孫毓以為外為都宫大祖在北二昭二穆以次而南是也葢大祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂室寢而墻宇四周焉大祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新主祔於其班之南廟南廟之主遷於北廟北廟親盡則遷其主於大廟之西夾室而謂之祧凡廟主在本廟之室中皆東向及其祫於大廟之室中則惟大祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆葢羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也曰六世之後二世之主既祧則三世為昭而四世為穆五世為昭而六世為穆乎曰不然也昭常為昭穆常為穆禮家之說有明文矣葢二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然而春秋傳以管蔡郕霍為文之昭邘晉應韓為武之穆則雖其既逺而猶不易也豈其交錯彼此若是之紛紛哉曰廟之始立也二世昭而三世穆四世昭而五世穆則固當以左為尊而右為卑矣今乃三世穆而四世昭五世穆而六世昭是則右反為尊而左反為卑也而可乎曰不然也宗廟之制但以左右為昭穆而不以昭穆為尊卑故五廟同為都宫則昭常在左穆常在右而外有以不失其序一世自爲一廟則昭不見穆穆不見昭而内有以各全其尊必大祫而㑹於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易唯四時之祫不陳毁廟之主則髙祖有時而在穆其禮未有考焉意或如此則髙之上無昭而特設位於祖之西禰之下無穆而特設位於曽之東也與曰然則毁廟云者何也曰春秋傳曰壊廟之道易檐可也改塗可也說者以為將納新主示有所加耳非盡撤而悉去之也曰然則天子之廟其制若何曰唐之文祖虞之神宗殷之七世三宗其詳今不可考獨周制猶有可言然而漢儒之記又已有不同矣謂后稷始封文武受命而王故三廟不毁與親廟四而七者諸儒之說也謂三昭三穆與大祖之廟而七文武為宗不在數中者劉歆之說也雖其數之不同然其位置遷次宜亦與諸侯之廟無甚異者但如諸儒之說則武王初有天下之時后稷為大祖而組紺居昭之北廟大王居穆之北廟王季居昭之南廟文王居穆之南廟猶為五廟而已至成王時則組紺祧王季遷而武王祔至康王時則大王祧文王遷而成王祔至昭王時則王季祧武王遷而康王祔自此以上亦皆且為五廟而祧者藏於大祖之廟至穆王時則文王親盡當祧而以有功當宗故别立一廟於西北而謂之文世室於是成王遷昭王祔而為六廟矣至共王時則武王親盡當祧而亦以有功當宗故别立一廟於東北謂之武世室於是康王遷穆王祔而為七廟矣自是以後則穆之祧者藏於文世室昭之祧者藏於武世室而不復藏於大廟矣如劉歆之說則周自武王克殷即増立二廟於二昭二穆之上以祀髙圉亞圉如前遞遷至於懿王而始立文世室於三穆之上至孝王時始立武世室於三昭之上此為少不同耳曰然則諸儒與劉歆之說孰為是曰前代說者多是劉歆愚亦意其或然也然則大夫士之制柰何曰大夫三廟則視諸侯而殺其二然其大祖昭穆之位猶諸侯也適士二廟則視大夫而殺其一官師一廟則視大夫而殺其二然其門堂室寢之備猶大夫也曰廟之為數降殺以兩而其制不降何也曰降也天子之山節藻梲複廟重檐諸侯固有所不得為者矣諸侯之􅉳堊斵礱大夫有不得為者矣大夫之倉楹斵桷士又不得為矣曷為而不降哉獨門堂室寢之合然後可名於宫則其制有不得而殺耳葢由命士以上父子皆異宫生也異宫而死不得異廟則有不得盡其事生事存之心者是以不得而降也曰然則後世公私之廟皆為同堂異室而以西為上者何也曰由漢明帝始也夫漢之為禮略矣然其始也諸帝之廟皆自營之各為一處雖其都宫之制昭穆之位不復如古然猶不失其獨専一廟之尊也至於明帝不知禮義之正而務為抑損之私遺詔藏主於光烈皇后更衣别室而其臣子不敢有加焉魏晉循之遂不能革而先王宗廟之禮始盡廢矣降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備獨天子之尊可以無所不致顧乃梏於漢明非禮之禮而不得以致其備物之孝葢其别為一室則深廣之度或不足以陳鼎俎而其合為一廟則所以尊其大祖者既褻而不嚴所以事其親廟者又厭而不尊是皆無以盡其事生事存之心而當世宗廟之禮亦為虚文矣宗廟之禮既為虚文而事生事存之心有終不能以自己者於是原廟之儀不得不盛然亦至於我朝而後都宫别殿前門後寢始略如古者宗廟之制是其㳂襲之變不唯窮鄉賤士有不得聞而自南渡之後故都淪没權宜草創無復舊章則雖朝廷之上禮官博士老師宿儒亦莫有能知其原者幸而或有一二知經學古之人乃能私議而竊嘆之然於前世則徒知譏孝惠之飾非責叔孫通之舞禮而於孝明之亂命與其臣子之苟從則未有正其罪者於今之世則又徒知論其惑異端徇流俗之為陋而不知本其事生事存之心有不得伸於宗廟者是以不能不自致於此也抑嘗觀於陸佃之議而知神祖之嘗有意於此然而考於史籍則未見其有紀焉若曰未及營表故不得書則後日之秉史筆者即前日承詔討論之臣也所宜深探遺旨特書緫叙以昭示來世而略無一詞以及之豈天未欲使斯人者復見二帝三王制作之盛故尼其事而嗇其傳邪嗚呼惜哉然陸氏所定昭穆之次又與前說不同而張璪之議庻幾近之讀者更詳考之則當知所擇矣或謂大夫不得祭始祖此天子諸侯之禮又云大夫自無大祖荅曰春秋如單氏尹氏王朝之大夫自上世至後世皆不變其初來姓號則必有大祖又如李氏之徒世世不改其號則亦必有大祖或云此春秋時世卿不由天子都没理㑹荅曰非獨春秋時如詩中說南仲大祖大師皇父南仲是文王時人到宣王時為大祖不知古者世禄不世官之說如何又如周公之後伯禽已受封於魯而周家世有周公如春秋云宰周公這般所在自暁未得語録又曰今天下有二件極大厎事其一是天地同祭於南郊其一是大祖不特立廟而與諸祖同一廟自東漢以來如此又曰孫毓云外為都宫大祖在北二昭二穆以次而南出江都集禮向作或問未見此書只以意料乃知學不可不博禮記集説卷三十
