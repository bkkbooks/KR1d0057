body:
  text: 禮記集說卷一百四十二宋衛湜撰子曰大臣不親百姓不寜則忠敬不足而富貴已過也大臣不治而邇臣比矣故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也君毋以小謀大毋以逺言近毋以内圖外則大臣不怨邇臣不疾而逺臣不蔽矣葉公之顧命曰毋以小謀敗大作毋以嬖御人疾莊后母以嬖御士疾莊士大夫卿士鄭氏曰邇近也言近以見逺言大以見小互言之比私相親也民之道言民循從也圖亦謀也言凡謀之當各於其黨於其黨知其過審也邇臣不疾疾猶非也葉公楚縣公葉公子髙也臨死遺書曰顧命小謀小臣之謀也大作大臣之所為也嬖御人愛妾也疾亦非也莊后適夫人齊莊得禮者嬖御士愛臣也莊士亦謂士之齊莊得禮者今為大夫卿士孔氏曰此一節明臣無大小皆須恭敬謹慎人君無以小臣而謀大事也大臣離貳不與上親政教煩苛百姓不寜是臣不忠於君君不敬於臣所以致然由君與臣富貴已過極也大臣不肯為君理治職事由邇臣與上相親比也君無與小臣而謀大臣之事無以逺臣共言近臣之事無以内臣共謀外臣之事所以然者小大之臣意殊逺近之臣不同恐各為朋黨彼此交争轉相陷害故不圖謀若能如此則内外情通小大意合大臣不怨恨於君也近臣不為人所非毁逺臣不被障蔽也藍田吕氏曰此章言大臣不信而小臣之比國之大患也傳曰不使大臣怨乎不以以大臣之任國之休戚繫焉用之斯信之矣不信之斯黜之矣未有居其位而不信之者也大臣不親民疑於所任百姓所以不寜蓋由臣之忠不足於君則君之敬不足於臣徒富貴之而無信任之意猶犬馬畜之而弗敬也事至於此必有邇臣嬖寵奪大臣之柄而不得治其事故曰大臣不治而邇臣比矣表者民所望也道者民所從也大臣尊嚴國之政令存焉民之所望以為表不敬則國命輕矣邇臣寵昵君之好惡繫焉民之所從以為道不慎則風俗壊矣使小臣謀大臣則大臣怨乎不以使逺臣閒近臣則近臣疾其君使内之寵臣圖四方宣力之士則逺臣之賢蔽而不聞三者任君之大害也葉公之顧命曰毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾荘士大夫卿士引此言以證此三事也荘士大夫卿士謂荘士之為大夫卿士者也陸氏曰經曰毋以小謀敗大作毋以嬖人疾莊士蓋務大者不拘於小累謀小者不達於大猷嬖者或行異於莊莊者或性殊於嬖理勢相激宜其不同進善援能諒君子之事遏惡揚善非小人所能君子以愛才為心小人以傷善為利愛而引之則近黨傷而沮之則似公近黨則不辨而遽疑似公則不察而輕信是以大道毎墮於横議良才常困於中傷失士啓讒多由於此唐陸贄長樂陳氏曰大臣者王者股肱心膂之任相與圖維天下而百姓賴之以寜也是大臣者職宜親於王今則不親將誰與治民哉故百姓不寜大臣所以正邇臣者也大臣不治其事而邇臣將以便僻側媚之行比於君矣大臣則道之隆德之峻王所尊而隆之也故言敬中庸言敬大臣則不眩是矣邇臣則居王之左右前後者欲擇正人而已故言謹書言謹簡乃僚是矣敬大臣者為其有司尊之實下之人所視而效也故謂之民之表詩言赫赫師尹民具爾瞻是矣謹邇臣者謂其正朝廷以正萬民而下之人所從而由也故謂之民之道書言侍御僕從罔匪正人以至乎下民祗若萬邦咸休者是矣若大臣則權重也權重常見謀於小臣矣小臣之謀得行則大臣退故大臣怨君毋以小謀大則大臣不怨矣近臣則所親而任親而任則常見言於逺臣矣逺臣之言或聽則近臣踈故邇臣疾君毋以逺言近則邇臣不疾矣外臣則逺於王也逺於王則易為内臣之所圖矣内臣之圖得用則外臣之功業不上達於王故逺臣蔽君毋以内圖外則逺臣不蔽矣謀者名實未審從而謀之圖如圖土地之圖合内外逺近而周圖之小臣之於大臣勢不足以圖之也其所以擠陷之者謀而已若内臣之於外臣則謀非不足用也勢足以圖之而已故於小大言謀内外言圖怨生乎心疾作於外疾不如怨之深也故於大臣言怨邇臣言疾葉公之顧命曰毋以小臣之謀敗大臣之作所謂毋以小謀大也毋以嬖御之人而疾端莊之后毋以嬖御之士而疾端莊之士與夫大夫卿士所謂毋以内圖外也嚴陵方氏曰大臣不親於上故百姓不寜居於下其所由者忠敬不足富貴已過也不親事則事弊而不治大臣不治而邇臣亦相帥而為阿黨之比矣夫大臣者君之所尊故待之不可不敬邇臣者君之所親故擇之不可不慎毋以小謀大則大臣得以盡道而不怨毋以逺言近則邇臣得以盡法而不疾毋以内圖外則逺臣得以盡才而不蔽馬氏曰大者對小之辭而大臣者處於逺邇之間邇者對逺之辭而邇臣者處於小大之閒民之表者以言人之所資以為正也民之道者以言民之所由而有以致其親也大臣不可不敬邇臣不可不慎而御之者不可無其法毋以小謀大以下皆御臣之法也毋以嬖御士疾莊士大夫卿士蓋侫說之言易以聽忠直之言難以入故也石林葉氏曰大臣則牧伯也其與之計議未定亦不可以小謀敗之近臣則四輔三公也其與之論道而有為亦不可以逺言間之外臣則諸侯也其與之同守天下以經理邦國亦不可以内寵圖之蓋任賢不貳則賢者得以盡其效故大臣不敗謀則無怨於心近臣之言無閒則不敢非其上外臣之議得以自通則不蔽於下與智者謀之而不與智者議之是以小謀敗大作也寵嬖妾而疾惡有禮之后是以嬖御之臣疾莊后也眤侫臣而惡用莊謹之卿士是以嬖御士疾莊士大夫卿士也蓋小謀敗大作則不足以尊賢嬖御人疾后則不足以治家嬖御士疾大夫卿士則不足以治國此葉公所遺於後世也山陰陸氏曰此顧命大夫卿士之辭也故其卒篇稱大夫卿士云變夫人言后其流蓋及上也顧命如此忠敎之至也蓋是時徐楚亦僭稱后子曰大臣不親其所賢而信其所賤民是以親失而敎是以煩詩云彼求我則如不我得執我仇仇亦不我力君陳曰未見聖若已弗克見既見聖亦不克由聖鄭氏曰親失失其所當親也敎煩由信賤也賤者無壹德也詩言君始求我如恐不得我既得我持我仇仇然不堅固亦不力用我是不親信我也克能也由用也孔氏曰此節明君不信用人也在上不親任其所賢有德之人而信用其所賤無德者則民效於上失其所當親唯親羣小政敎所以煩亂也所引詩小雅正月刺幽王之篇君陳尚書篇引之者證不親其所賢也藍田吕氏曰王公之用人將與共天位治天職也師其不及而友其所等夷有不如已然後使之故位尊而德優德優而身佚賢者既踈不肖又不足親此所以親失所貴者而疑所賤者又不足任也此敎所以煩蓋知賢而不親知可賤而信之德所以不進治所以不成也孟子曰今之諸侯好臣其所敎而不好臣其所受敎故地醜德齊莫能相尚也詩君陳皆言得賢而不能親之信之也嚴陵方氏曰上失其所親信而民之化之亦然雖敎之亦有所不勝祗所以為煩而已馬氏曰大人者以位言之也夫有天下國家者未嘗不欲親其所賢而賢未必親未嘗不欲踈其所賤而賤未必不信葉公之戒毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士者凡以此也言賢則知賤者為不肖之行也言賤則知賢者有可貴之德也上失其所親則下亦失其親雖區區於敎令之煩民未必從之蓋其令反其所好則民未有從之者也詩云彼求我則如不我得者言始求我之法則如不我得焉其好之心可謂篤疾及其執我仇仇亦不我力旣已得我而反不我用至於君陳所言其理亦猶此也長樂陳氏曰賢所以輔治宜親不宜踈賤所以執役宜逺不宜信大臣不親其所賢而信其所賤則小人獲進矣夫賢者非特上之所親而亦下之所親也大人不親所賢則民將失其所親也故民是以親失敎有常典順之則簡而治拂之則繁而亂用賤者以為敎則逆其常矣故敎是以煩彼求我則如不我得執我仇仇亦不我力者幽王惑於小人其求君子則如恐失之及其得之也則執我仇仇如死偶然且不任其力也豈非不親所賢而信其所賤之意乎君陳亦此意也山陰陸氏曰孟子曰堯舜之知而不徧物急先務也堯舜之仁不徧愛人急親賢也今如此雖欲不煩得乎然則信其所賤務徧知物也此詩蓋以伐柯自喻子曰小人溺於水君子溺於口大人溺於民皆在其所褻也夫水近於人而溺人德易狎而難親也易以溺人口費而煩易出難悔易以溺人夫民閉於人而有鄙心可敬不可慢易以溺人故君子不可以不慎也太甲曰毋越厥命以自覆也若虞機張徃省括于厥度則釋兊命曰惟口起羞惟甲胄起兵惟衣裳在笥惟干戈省厥躬太甲曰天作孽可違也自作孽不可以逭尹吉曰惟尹躬天見于西邑夏自周有終相亦惟終鄭氏曰皆在其所褻也言人不溺於所敬者溺謂覆没不能自理出也水近人故或泳之游之褻慢而無戒心以取溺焉德易狎言人初時學其近者則狎之至於先王大道則遂扞格不入迷惑如溺矣費猶惠也言口多空言煩數也過言一出駟馬不能及不可悔也口舌所覆亦如溺矣民不通於人道而心鄙詐卒難告喻人君敬慎以臨之則可若陵虐而慢之分崩怨叛君無所尊亦如溺矣故君子不可不慎者慎所可褻乃不溺矣越之為言蹷也覆敗也言無自顛蹷女之政敎以自毁敗虞主田獵之地者也機弩牙也度謂所擬射也虞人之射禽弩已張從機閒視括與所射參相得乃後釋弦發矢為政亦當以己心參於羣臣及萬民可乃後施也兊命兊當為說傳說作書以命髙宗亦尚書篇名也羞猶辱也惟口起辱當慎言語也惟甲胄起兵當慎軍旅之事違猶辟也逭逃也尹吉亦尹誥也天當為先忠信為周相助也謂臣也伊尹言見夏之先君臣皆忠信以自終伊尹始仕於夏此時就湯矣夏之邑在亳西孔氏曰此一節戒慎言之事也口費而煩謂口惠不難失在煩數必為物所憾所以有禍也惟衣裳在笥當服以為禮不可妄以與人惟干戈當自省已身不可妄以害人藍田吕氏曰小人謂民也君子謂士大夫也大人謂王公也凡人所以覆没於患禍不能以自出者皆在其易而褻之也水至柔之物民狎而玩之則雖巨川深淵而不戒此取溺之道也徳易狎而難親者謂水之德也先儒乃以是德為人之德謂有德者亦如水然易狎難親豈德之謂邪方論溺水溺口溺民三者之别無庸以有德厠其閒也與人交際不能無言古之君子辭達而已不廢而煩於己則廢於人則煩不能無過過言之甚至於害德喪身以覆邦家易出而不可悔非口之溺人乎民至愚至賤乃知賤者貴者之所易也惟愚也故閉於心而不可以理喻唯賤也故有鄙心多怨而無恥為王公者慢而不敬則輕身輕上無所不至此民之所以溺人也三者之端不可不慎也引太甲言為政者如虞人射禽張機省括奠而後發有是心也安有溺於民之患哉兊命言庶政不可不慎也太甲言禍患之溺莫非自取也尹吉言君以忠信有終皆君所自致也此經引書為證與書文小不同義無所害嚴陵方氏曰小人以分言則在下故以溺於水為戒君子以德言則在身故以溺於口為戒大人以位言則在上故以溺於民為戒言易出而難悔亦猶水之就下莫之能禦也民之為俗可敬不可慢亦猶水之攻堅莫之能先也民可近不可下若水之易以溺人故君子不可以不慎也然兼言大人小人此統言君子者蓋君子則上下之通稱馬氏曰水者小人資之以為利故小人溺於水口者君子資之以為辯故君子溺於口民者大人資之以為治故大人溺於民此皆在其所褻也蓋禍故多藏於隱微而發於人之所忽蔽於所褻而不知加慎以為慮此其所以至於没溺而不知悟也水近於人而溺人所謂水性懦人狎而翫之以至於死焉德易狎而難親此釋水近於人而溺人之意也水之為性則有剛柔之德外陰而能柔故易以狎内陽而能剛故難以親蔽於易狎以為常不知難以親之為慮此小人所以至於溺也費者言其無實煩者言其無節言之非艱故易以出斯言之玷不可磨故難以悔蔽於易出以為常而不知難悔以為慮此君子所以至於溺也民之厚貌深情而機詐之心藏於内故曰閉於人而有鄙心雖然亦在上之人御之而已故可敬不可慢敬者御之之道也書曰予臨兆民若朽索之馭六馬為人上者奈何不敬不能莊以涖之而乃慢易以犯之此大人所以至於溺也終之以書之辭者有以見其戒慎之至也衣服者所以命有德不可以命非其人故惟衣裳在笥笥者言藏之而不輕於與人也干戈所以討有罪不可以伐非其罪故惟干戈省厥躬者言當恕之以已然後可以責諸人也甲冑所以自衛干戈所以敵物天作孽則有可違之理蓋修德則可以消天變禍自已求無所逃於天地之間也山陰陸氏曰閉則不能受人鄙故係吝怨毒難解天作孽可違也不言猶決辭也凡記引經以字易字或增或損不無意也子曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡詩云昔我有先正其言明且清國家以寜都邑以成庶民以生誰能秉國成不自為正卒勞百姓君雅曰夏日暑雨小民惟曰怨資冬祈寒小民亦惟曰怨鄭氏曰先正先君長也誰能秉國成傷今無此人也成邦之八成也誰能秉行之不自以所為者正盡勞來百姓憂念之者與疾時大臣專功爭美雅書作牙假借字也君牙周穆王司徒作尚書篇名也資當為至齊魯之語也祈之言是也齊西偏之語也夏日暑雨小民怨天至冬是寒小民又怨天言民恒多怨為其君難孔氏曰此一節論君民相須養人之道不可不慎也詩人稱昔吾之有先君正長其教令之言分明且清潔國家所以安也都邑所以成也庶人所以生也此逸詩也藍田吕氏曰天生人物流形雖異同一氣耳人者合一氣以為體本無物我之别故孺子將入井人皆有怵惕惻隱之心非自外鑠也天下無一物非我故天下無一物不愛我體或傷心則㦧怛理之自然非人私智所能為也人而不仁非無是心喪是心爾故大人自任以天下之重匹夫匹婦有不被堯舜之澤若已推而納之溝中豈勉強之所能為也為人君止於仁則君人者之於是也舍仁曷以哉心體之說姑以為譬若求之實理則非譬也體完則心說猶有民則有君也體傷則心㦧猶民病則君憂也所以安危存亡者亦然可不慎乎所引詩與節南山之詩有異蓋逸詩也此言君不正百姓所以勞也引君雅言天之寒暑小民且怨況君之政敎乎嚴陵方氏曰民以君為心者言好惡從於君也君以民為體者言休戚同於民也體雖致用於外然由乎心之所使故曰心安之身必安之心雖為主於内然資乎體之所保故曰心以體全亦以體傷前經言上好是物下必有甚者君好之民必欲之之謂也荀子曰君舟也庶民水也水能載舟亦能覆舟君以民存亦以民亡之謂也長樂陳氏曰體從心者也民從君者也故上臨之以莊則下亦舒矣上臨之以肅則下亦敬矣心以體率心不在焉則視而弗見聽而弗聞豈非心好之身必安之之謂乎君所以率民者也君好仁則下莫不仁君好義則下莫不義茍君不為之則民無從焉體衞心者也體全則心與之全體傷則心與之傷故曰心以體全亦以體傷民從君者也民歸之然後可以君天下民去之則亦不能以獨君矣故曰君以民存亦以民亡觀此則治民者可不謹其所以懷來之道乎昔吾有先正則居人上者其言明且清則人可得而法也為人上謂之先正以其正身而後正天下故也唯能正身以率之故國家以寜都邑以成庶民以生幽王不然權移於下故詩人傷之則曰誰能秉國成不能秉國成則政出多門而不自為政矣政多門則多事多事則百姓所以勞此幽王不明所以懷來之道也天之於民厚矣而寒暑之過正雨暘之失中民猶怨咨則為上者可不敬乎馬氏曰民非后罔事故民以君為心后非民罔使故君以民為體心者體之主而體則從心者也故心莊則體舒心肅則容敬心好之身必安之也君者民之心而民則從君者也故君好之民必欲之體雖以心為主而心亦有待乎體故心以體全亦以體傷民雖以君為主而君亦有待於民故君以民存亦以民亡其言明且清者言敎令之善也古之處於人之上者必先正於己然後敎令可以善於天下而其效至於國家以寜都邑以成庶民以生其盛至於如此也及其後世處人上者反此力小而任重知小而謀大不能秉國之成法不知以得為在民失為在己而富國有求於百姓則怨之者多故曰不自為政卒勞百姓此不知以民為體之意也石林葉氏曰天下之勢猶身故以君民喻心體言休戚同也四肢逸則心休百姓逸則君寜未有肢體傷而心猶全者故漢武詔曰君者心也民猶肢體肢體傷則心㦧怛山陰陸氏曰此引節南山之詩也其上句蓋逸詩併引之爾猶下易曰不恒其德或承之羞恒其德貞婦人吉夫子凶併引二爻蓋古人之引經取足於義不問其辭之彼我有如此者子曰下之事上也身不正言不信則義不壹行無類也子曰言有物而行有格也是以生則不可奪志死則不可奪名故君子多聞質而守之多志質而親之精知略而行之君陳曰出入自爾師虞庶言同詩云淑人君子其儀一也鄭氏曰類謂比式物謂事驗也格舊法也質猶少也多志謂博交汎愛人也精知孰慮於衆言自由也師庶皆衆也虞度也言出内政敎當由女衆之所謀度衆言同乃行之政敎當由一也孔氏曰此一節明下之事上當守其一言必須有徵驗行必須有法式言行不妄守死善道名志俱善欲奪不可也質而守之親之略而行之皆謂聞見雖多執守簡要也引君陳成王戒君陳之言引詩曹風鳴鳩之篇言善人君子威儀齊一證為政須齊一也藍田吕氏曰自此以下言下事上之義身正言信所謂欲修其身先正其心欲正其心先誠其意義壹行類所謂同歸而殊塗一致而百慮故孟子曰君子亦仁而已矣何必同言有物行有格此謂法度存焉有物則無失實之信有格則無踰矩之行如是者人歸於一而不可變也生乎由是死乎由是故志也名也不可得而奪也義重於生舍生而取義則不義之名君子所不受也多聞所聞欲博也多志多見而識之者質正也不敢信已質衆人之所同然後用之者也守之者服膺而勿失者也親之者問學不厭者也由多聞多知而得之又當精思以求其至約而行之故曰精知略而行之略約也此皆義壹行類之道也君子之學必致一不致一則二三二三則異端之言交入而無間卒不能以自立也一者何理義而已何由知其理義以吾之所同然合人之所同然而已出入自爾師虞庶言同此言當謀之於衆取其同然也淑人君子其儀一也此言君子之行卒歸於一也長樂陳氏曰下之事上以身為本而信以成之也身正然後無好異之行是以行有類言信然後有不可移之義是以義主於壹身不正則動皆反常矣其形於可見之行者斯無類言不信則德二三矣則見於事君之義斯不一行無類則非所謂行有格也志者言行之所由出名者言行之所自成言有物行有格則志之所守者堅而名之所成者著是以死則不可奪名也君陳曰出入自爾師虞庶言同則繹者成王戒君陳以政之廢興而安危治亂之所係故出入之際當以衆智而虞度之庶言雖同又當繹其是非也言此者所以明行之有格也嚴陵方氏曰身不正故義不壹言不信故行無類不壹謂不能專於其身也無類謂無以副於其言也有物則有其實有格則有所至山陰陸氏曰不壹無以統之無類無應之者格至也非先王之法言無物非先王之德行無至若東晉崇尚𤣥虚學士大夫議論髙於踐履此志之所以喪而名敗也多聞質而守之所謂守之以約是也多志或失之踈故質而親之季文子三思而後行孔子曰再斯可矣所謂略而行之是也君陳曰出入自爾師虞庶言同不言則繹不嫌不繹也據上多聞質而守之多志質而親之精知而行之廬陵胡氏曰言有物猶仁人不過乎物之物格至道也祖己曰惟先格王正厥事志者終身所尚故生不奪志名欲立於後世故死不奪名言名志俱善馬氏曰聞之詳不若志之詳志之猶言紀也聞之志之則言有所擇而言無所妄此言有物也知之則可以行知之己精而又略而行之則行有所擇而行無所妄此行有格也子曰唯君子能好其正小人毒其正故君子之朋友有鄉其惡有方是故邇者不惑而逺者不疑也詩云君子好仇鄭氏曰正當為匹匹謂知識朋友鄉方喻輩類也小人徼利其友無常也邇近也仇匹也孔氏曰此一節明其朋匹之事以下云君子好仇故知正為匹也君子所親朋友及所惡之人皆有輩類故善者與之交不以榮枯為異不善者則憎惡之言有常也好惡有定可望貌而知故近不惑而逺不疑也引周南闗睢之篇詩云窈窕淑女此斷章云以好人為匹也藍田吕氏曰鄉人皆好之未可也鄉人皆惡之未可也不如鄉人之善者好之其不善者惡之蓋善者好之由君子所好者善也不善者惡之由君子所惡者不善也君子之好不可以非其人故曰朋友有鄉所惡不可以及善人故曰其惡有方蓋君子所好者皆正小人所惡亦皆正故曰君子能好其正小人毒其正好惡旣明亦歸於一此逺邇所以不疑惑也詩云君子好仇仇匹也其匹者皆好也先儒以好其正毒其正皆當為匹恐只作正字亦可長樂陳氏曰君子周而不比其取友也必端故言能好其正小人比而不周其交也皆其類而已故毒其正蓋君子小人道相異也故君子好之而小人毒之鄉也方也皆言其所聚善惡各以類而善不同於惡惡不同於善故能成其信是以朋友之邇於我者信我之深而不惑其逺於我者亦信之而不疑矣邇者不惑儒行所謂並立則樂相下不厭也逺者不疑儒行所謂久不相見聞流言不信其行也嚴陵方氏曰君子非特其身正而已於正人又能好而與之小人非特身不正而已於正人又且毒而害之此君子小人好惡之辨也朋友有鄉其惡有方者以言取舍之有常也馬氏曰君子之朋友有鄉所謂直也諒也多聞也其惡有方所謂便辟也善柔也便侫也朋友有鄉君子所以致其好也其惡有方君子所以致其惡也山陰陸氏曰正正已者也讀如字朋友亦是矣邇者不惑而逺者不疑言其好惡有常逺近信之廬陵胡氏曰君子正直是與故好之小人惡直醜正故毒之故曰君子居必擇鄉遊必擇士所以防邪辟而近中正也子曰輕絶貧賤而重絶富貴則好賢不堅而惡惡不著也人雖曰不利吾不信也詩云朋友攸攝攝以威儀鄭氏曰雖曰不利吾不信也言此近徼利也攸所也言朋友以禮儀相攝正不以貧富貴賤之利也孔氏曰此一節明交友之道唯善是仇以威儀相攝佐也以賢而貧賤則輕絶之是好賢不堅惡而富貴則重絶之是惡惡不著也如此者是貪利之人所引詩大雅既醉美文王之篇太平之詩於時朋友羣臣所以禮義相攝佐之時以威儀也言不以富貴貧賤而求利者藍田吕氏曰此章又申言前章好惡不可不明也以為可賢而重絶以為不足賢而輕絶則不當有富貴貧賤之異矣均可絶也富貴未絶貧賤者先絶則惡惡不著均未可絶也貧賤者先絶富貴者未絶則好賢不堅推是心也謂之不利於富貴則不可信也詩云朋友攸攝攝以威儀言朋友以禮義相正豈以貧賤富貴易其心哉長樂陳氏曰貧賤者人之所易絶於其所易絶者而不絶然後為好賢之堅富貴者人之所難絶於其所難絶而絶之然後為惡惡之著也凡以有其實者無不顕后妃恭儉節用服女功而無厭怠故能化天下以婦道所謂有實而顕之意也嚴陵方氏曰可友者以其賢可絶者以其惡然賢者不必富貴惡者不必貧賤苟輕絶貧賤而重絶富貴則勢利之交而已馬氏曰貧賤富貴皆出於天而君子之交蓋不論此賢者宜富貴而富貴者未必賢惡者宜貧賤而貧賤者未必皆惡於貧賤輕有以絶之於富貴重有以絶之則志在於利而不在於道山陰陸氏曰相好仁也相攝義也相好主内君子好仇是也相攝主外攝以威儀是也夫唯相攝主義是故不重絶富貴不輕絶貧賤廬陵胡氏曰富貴不能滛貧賤不能移乃不能輕絶貧賤不重絶富貴子曰私惠不歸德君子不自留焉詩云人之好我示我周行鄭氏曰私惠謂不以公禮相慶賀時以小物相問遺也言其物不可以為德則君子不以身留此人也相惠以褻瀆邪辟之物是為不歸於德行道也言示我以忠信之道孔氏曰此一節明君子唯德是與不自留不用留意於此等之人也所引詩小雅鹿鳴之篇藍田吕氏曰此章言君子所好既不容私亦不欲人之私好於我也私惠於民我不足以歸德知其不足以歸徳君子亦不受也故曰君子不自留焉引詩言受人之好以示我至公而不比故也孔子曰君子周而不比周則徧徧則公比則有所附有所附則私馬氏曰有忠信之德然後將之以惠禮也茍無忠信之德而行之故君子不自留焉子曰茍有車必見其軾茍有衣必見其敝人茍或言之必聞其聲茍或行之必見其成葛覃曰服之無射鄭氏曰言凡人舉事必有後驗也見其軾謂載也敝敗衣也衣或在内新時不見射厭也言采葛為衣服之無厭言不虚也孔氏曰此明人言行必慎其所終也所引詩周南葛覃之篇藍田吕氏曰此章言有是物必有是事有是事乃無是物不可虚也故君子之學自本及末無非其實亦由致一而不二故可久而無窮也登車而有所禮則式式憑式有式則有車無車則何所憑而式之乎衣之久必敝有衣然後可敝無衣則何敝之有言必有聲行必有成亦猶是也蓋誠者物之終始不誠無物服之無射言實有是服乃可久服而無厭也馬氏曰言有實於此有以徵於彼而君子不可以無其實也山陰陸氏曰軾言前敝計後子曰言從而行之則言不可飾也行從而言之則行不可飾也故君子寡言而行以成其信則民不得大其美而小其惡詩云白圭之玷尚可磨也斯言之玷不可為也小雅曰允也君子展也大成君奭曰在昔上帝周田觀文王之德其集大命于厥躬鄭氏曰從猶隨也寡當為顧不得大其美而小其惡謂以行為驗虚言無益於善也玷缺也言圭之缺尚可磨而平之言之缺無如之何允信也展誠也奭召公名尚書篇名古文周田觀文王為割申勸寜王今博士讀為厥亂勸寜王古文似近之割之言蓋也言文王有誠信之德天蓋申勸之集大命於其身謂命之使王天下也孔氏曰此一節明重言行之事言在於先而後隨以行之則言須實行在於前言隨於後則行須實言行皆不可虚飾也君子言行相副則人於美惡大小不得増減皆驗於行也引詩大雅抑之篇刺厲王詩也小雅車攻之篇美宣王之詩也引周公告君奭之辭皆證言當信也藍田吕氏曰此章又申言前義言行皆不可無實也飾言而言者所言非信故不可行飾行而行者所行必偽故不可行莊生之言非不善也卒不可以治天下國家此言之飾也五霸假仁義而行非不美也而後世無傳焉此行之飾也故君子言顧行行顧言而已不可失吾信使民之稱美惡不敢有所大小而失其實也言之不信所謂玷也允也君子展也大成言君子非信則不成也君奭言文王有誠信之德為天所命況於人乎嚴陵方氏曰前經曰可言也不可行君子弗言也可行也不可言君子弗行也亦此之意論語曰古者言之不出恥躬之不逮也蓋寡言以成其信之謂要譽飾非皆言之所為也唯君子寡言以化之故民不得如此馬氏曰不飾者不可以文飾之言從而行之則言不危行行從而言之則行不危言言行之不相違故君子寡言而行以成其信言易以出故寡言行難以成故敏行蓋未之能行唯恐有聞君子寡言而行以成其信則有其實也在上有其實則在下者亦以其實應美者人之所欲美之小則有所不敢大惡者人之所不欲惡之大則有所不敢小此不敢誣其善惡之名也長樂陳氏曰言之多則易失於不信君子尚乎實行故寡言而行則以成其信有實而不誣也實之所在故民不得大其美而小其惡白圭之玷尚可磨而至於斯言之玷則不可磨者所謂不可飾也宣王能内脩政事外攘夷狄允所謂有君子之道展所謂有大成之業夫宣王之能復古者為其有道業之實故也山陰陸氏曰寡謂如字言之必踐之是以寡民雖欲虚美隱惡不得也所謂周田虞芮質厥成是也先儒謂虞芮質厥成諸侯並附以為受命之年故曰其集大命于厥躬然則周田釋書所謂割割棄也以其所爭田為閒田而退是之謂割或作厥亂勸寜王德厥亂虞芮是也且經以結君子寡言而行以成其信於是為至子曰南人有言曰人而無恒不可以為卜筮古之遺言與龜筮猶不能知也而況於人乎詩云我龜既厭不我告猶兊命曰爵無及惡德民立而正事純而祭祀是為不敬事煩則亂事神則難易曰不恒其德或承之羞恒其德偵婦人吉夫子凶鄭氏曰恒常也不可為卜筮言卦兆不能見其情定其吉凶也告猶猶道也言褻而用之龜厭之不告以吉凶之道也惡德無恒之德純猶皆也言君祭祀賜諸臣爵無與惡德之人也民將立以為正言放傚之疾事皆如是而以祭祀是不敬鬼神也惡德之人使事鬼神又難以得福純或為煩羞猶辱也偵問也問正於人為偵婦人從人者也以問正為常德則吉男子當專行幹事而以問正為常德是亦無恒之人也孔氏曰此一節明為人須有恒也南人殷掌卜之官龜筮猶不能得知無恒之人而況於凡人乎引詩小雅小旻之篇刺幽王數誣卜筮引兊命尚書傅說告髙宗之辭言惡德之人主掌祭祀其事則煩事煩則致亂也又引恒卦九三六五爻辭皆證無恒德也藍田吕氏曰德歸於一則有恒二三則無恒人之趨嚮不知其所安雖鬼神龜筮之靈醫工色脈之妙猶不可測況人情之近其可測之乎論語記孔子之言曰人而無恒不可以作巫醫善夫易曰不恒其德或承之羞不占而已矣而此云不可以為卜筮其文少異蓋巫醫卜筮其事類也為作皆謂求而問之也巫之禱卜筮之占皆求諸鬼神鬼神之理至虚而善應齊戒絜誠虚心以求之猶有不應將以二三不定之私意瀆而求之其可得乎醫之治疾必察其好惡原其哀樂喜怒則知疾之所由生茍用心而無恒又安得而求之我龜既厭不我告猶所謂瀆則不告此篇所引說命之文與書殊不同疑此篇誤當以書為正黷于祭祀時謂弗欽禮煩則亂事神則難言煩黷非事神之道也或承之羞言無恒之人動則取羞辱況卜筮乎此篇又引六五爻辭與此篇義不類恐亦衍文鄭氏又解恒其德貞為恒其德偵云問正為偵在婦人為恒德男子亦為無恒義必不然馬氏曰語曰人而無恒不可以為巫醫言巫醫不能治無恒之人記曰人而無恒不可以為卜筮言卜筮不可占無恒之人以龜筮之靈猶不能知則其於人也亦末如之何也己或曰巫醫卜筮職之賤者也職之賤而其德亦不可以無其恒然以文考之則曰龜筮猶不能知也而況於人乎又曰不占而已則知卜筮者不能占無恒之人巫醫者不能治無恒之人而或者之言難於必取兊命曰爵罔及惡德惟其賢以文考之則不合婦人德不可以無恒所謂無攸遂在中饋吉夫子以知率人其德不可以無變所謂婦人之德從一而終夫子制義從婦而凶與此合也山陰陸氏曰民立而正正讀如政民立而正事純即書所謂惟厥攸居政事惟醇而祭祀是為不敬即書所謂黷于祭祀時謂弗欽爵無及惡德民立而正事純所謂善矣然祭祀為不敬則事煩不能不亂事神難矣事煩讀如事神之事雖然恒其德矣不知化而趨變是亦凶而已矣故經合二以為一昧者以今書易疑而難之是按圖以求馬也善相馬者若九方臯可也禮記集說卷一百四十二
