body:
  text: 禮記集説卷一百二十九宋衛湜撰子曰無憂者其唯文王乎以王季為父以武王為子父作之子述之武王纉大王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟饗之子孫保之武王末受命周公成文武之徳追王大王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士𦵏以大夫祭以士父為士子為大夫𦵏以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也鄭氏曰聖人以立法度為大事子能述成之則何憂乎堯舜之父子則有凶頑禹湯之父子則寡令聞父子相成唯有文王也纉繼也緒業也戎兵也衣讀如殷聲之誤也壹戎殷者壹用兵伐殷也末猶老也追王大王王季者以王迹起焉先公組紺以上至后稷也斯禮達於諸侯大夫士庶人者謂𦵏從死者之爵祭用生者之禄言大夫𦵏以大夫士𦵏以士則追王者改𦵏之矣期之喪達於大夫者謂旁親所降在大功者其正統之期天子諸侯猶不降也大夫所降天子諸侯絶之不為服所不臣乃服之也承𦵏祭説期三年之喪者明子事父以孝不用其尊卑變孔氏曰此一節明夫子論文王武王聖徳相承王有天下上能追尊大王王季因明天子以下及士庶人𦵏祭之禮王季能制作禮樂文王奉而行之武王又能述成文王之道故無憂也鄭註組紺大王之父一名諸盩周本紀云亞圉卒子大公叔類立大公卒子古公亶父立又世本云亞圉雲生大公組紺諸盩則叔類組紺諸盩是一人也大王王季身為諸侯𦵏從死者之爵則大王王季祗得為諸侯𦵏禮不得言追王從天子法故鄭知追王之時更改𦵏用天子禮案大傳云武王追王大王亶父王季歴此云周公追王不同者武王既伐紂追王布告天下周公追而改𦵏故不同也父既為大夫祭以士禮貶其先人而云尊之者欲明以己之禄祀其先人也期之喪達乎大夫者欲見大夫之尊猶有期喪謂旁親所降在大功者得為期喪還著大功之服故云達乎大夫若天子諸侯旁期之喪則不為服也三年之喪達乎天子者謂正統在三年之喪父母及適子并妻也達乎天子者謂天子皆服之不云父母而云三年者包適子也天子為后服期以三年包之者以后卒必待三年然後娶所以達子之志故通在三年之中是以昭十五年左傳云穆后崩大子夀卒叔向云王一嵗而有三年之喪二焉是包后為三年也直云達乎天子不云諸侯者諸侯旁親尊同則不降故喪服大功章云諸侯為姑姊妹嫁於國君者是也喪服云始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟但不臣者皆以本服服也案熊氏曰此對天子諸侯故云期之喪達乎大夫其實大夫為大功之喪得降小功小功之喪得降緦麻是大功小功皆達乎大夫也藍田吕氏曰追王之禮古所無有其出於周公乎大王避狄去邠之岐山之下而居從之者如歸市則王業始基之矣王季成大王之業至文王受命作周故武王壹戎衣而有天下纉大王王季文王之緒而已故追王大王王季文王者明王業之所基也武成曰大王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懐其徳惟九年大統未集予小子其承厥志此追王之意歟追王之禮文王之志也武王承之武王之業也周公成之武王末年始受天命於是禮也葢有所未暇此周公所以兼言成文武之徳也推是心也故上祀先公亦以天子之禮而下達乎諸侯大夫及士庶人葢先公祖紺以上追王所不及如達其意於大王王季豈無是意哉故上祀先公以天子之禮所以達追王之意於其上也𦵏從死者祭從生者則自諸侯達乎大夫士庶人亦豈無是意哉故父為大夫子為士葬以大夫祭以士父為士子為大夫𦵏以士祭以大夫𦵏之從死者之爵祭之用生者之禄上下一也所以達追王之意於其下也期之喪達乎大夫者期之喪有二有正統之期為祖父母是也有旁親之期為世父母叔父母衆子昆弟昆弟之子是也正統之期雖天子諸侯莫敢降旁親之期天子諸侯絶服而大夫降所謂尊不同故或絶或降也大夫雖降猶服大功不如天子諸侯之絶服故曰期之喪達乎大夫也如旁親之期亦為大夫則大夫亦不降所謂尊同則服其親之服也諸侯雖絶服旁親尊同亦不降所不臣者猶服之如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟是也三年之喪達乎天子者三年之喪為父為母適孫為祖為長子為妻而已天子達乎庶人一也父在為母及妻雖服期然本為三年之喪但為父為夫而屈者也故與齊衰期之餘喪異者有三服而加杖一也十一月而練十三月而祥十五月而禫二也夫必三年而後娶三也父母之喪則齊䟽之服饘粥之食自天子達於庶人葢子之事親所以自致其誠不可以尊卑變也建安游氏曰武王之事言聖人所優為也故曰壹戎衣而有天下身不失天下之顯名謂之不失則與必得異矣乃如其道則尊為天子富有四海之内宗廟饗之子孫保之與舜未始不同也又曰武王於泰誓三篇稱文王為文考至武成而柴望然後稱文考為文王仍稱其祖為大王王季然則周公追王大王王季者乃文王之徳武王之志也故曰成文武之徳不言文王者武王既追王矣武王既追王而不及大王王季以其末受命而序有未暇也禮記大傳載牧野之奠追王大王亶父王季歴文王昌亦據武成之書以明追王之意出於武王也世之説者因中庸無追王文王之文遂以謂文王自稱王豈未嘗考泰誓武成之書乎君臣之分猶天尊地卑紂未可去而文王稱王是二天子也服事殷之道固如是邪書所謂大統未集者後世以虞芮質厥成為文王受命之始故也當六國時秦固已長雄天下而周之號㣲矣辛垣衍欲帝秦魯仲連以片言折之衍不敢復出口葢名分之嚴如此故以曹操之英雄逡廵於獻帝之末而不得逞彼葢知利害之實也曽謂至徳如文王一言一動順帝之則而反盜虚名而拂天理乎且武王觀政于商而須暇之五年非偽為也使紂一日有悛心則武王當與天下共尊之必無牧野之事然則文王已稱之名將安所歸乎此天下之大戒故不得不辨亦所以正人心也延平楊氏曰武王之武葢聖人之不幸非其欲也然而身不失天下之顯名者以其一怒而安天下之民故也謂之不失與舜之必得異矣故泰誓曰受克予非朕文考有罪惟子小子無良葢聖人雖曰恭行天罰而猶有受克予之言不敢自必也謂之不失不亦冝乎又曰追王大王王季上祀先公以天子之禮以金縢之書考之其禮冝未備也周公居攝七年而後禮樂備故追王大王王季上祀先公以天子之禮則文武所以嚴父尊祖之義於是盡矣此文武之徳葢周公成之也故孝經曰孝莫大於嚴父嚴父莫大於配天則周公其人也斯禮也達乎諸侯大夫及士庶人謂上祀先公以天子之禮也𦵏不從死者是無臣而為有臣也祭不從生者是不以其所以養親者事其親也河東侯氏曰中庸之道參差不同聖人之時中當其可而已文王三分天下有其二以服事殷此文王之中庸也舜以匹夫而有天下此舜之中庸也武王纉大王王季文王之緒壹戎衣而有天下武王之中庸也此謂不失天下之名者非謂武王之有天下不及舜也謂之天下之顯名者謀從衆而合天心也是與舜之有天下不異也故亦曰尊為天子富有四海之内宗廟饗之子孫保之易地皆然故也有一毫不與舜受天下之心同有一人不謳歌獄訟而歸之非中也篡也尚有顯名哉武王末年方受天命而有天下未及有作周公成文武之徳追王先公之禮喪𦵏之制皆古先所未有也此又周公之時中也新安朱氏曰此第十八章自無憂者文王乎至子述之言文王之事書言王季其勤王家葢其所作亦積功累仁之事也自武王纉大王王季文王之緒至子孫保之言武王之事大王王季之父也書云大王肇基王迹詩云至于大王實始剪商戎衣甲胄之屬壹戎衣武成文言一著戎衣以伐紂也自武王末受命至無貴賤一也言周公之事追王葢推文武之意以及乎王迹之所起也上祀先公以天子之禮又推大王王季之意以及於無窮也制為禮法以及天下使𦵏用死者之爵祭用生者之禄喪服自期以下諸侯絶大夫降而父母之喪上下同之推己以及人也又曰游氏引泰誓武成以為文王未嘗稱王之證深有補於名敎然歐陽蘇氏之書亦已有是説涑水司馬氏曰壹戎衣而有天下葢言武王取天下之易耳豈得以孟津還師為嫌改易舊文以衣為殷乎禮大夫士皆三月而𦵏己而其子升為大夫受禄多故祭以大夫豈有因追王而改𦵏乎延平周氏曰文王雖可以無憂而未嘗無憂可以無憂者以其有父之作而有子之述未嘗無憂者以其天人之責在於己故書曰自朝至于日中昃不遑暇食海陵胡氏曰上言舜以匹夫積徳而有天下此言周家累世積徳而有天下以為天子凡父能作之或無子以述成之子能述之或無父以倡始之堯舜之子則朱均舜禹之父則瞽鯀三聖父子之間不令如此唯文王以王季為父以武王為子王季作之文王述成之文王作之武王述成之上有賢父下有聖子夫何憂哉聖人非其道非其義殺一不辜而得天下不為也武王仗大義誅殘賊而有天下身不失天下之顯名而又尊為天子山隂陸氏曰壹戎衣一掛戎衣伐殷也湯十一征自葛始文王專征伐其服戎衣屢矣身不失天下之顯名者嫌於失之是以言之舜言徳為聖人此言名者各以其冝言言之也周之受命本在文王末在武王此經不言追王文王者以上言周公成文武之徳追王之意文王與焉故也大傳則言武王之事而已期之喪達乎大夫則諸侯雖期不服然則天子唯為其親為妻為長子服諸侯仍服天王鄭氏謂旁親所降在大功者其正統之期天子諸侯猶不降大夫所降天子諸侯絶之不為服所不臣乃服之誤矣葢所不臣雖服暫服也變也即封君之孫盡臣諸父昆弟以是為常亦經不言諸侯則諸侯所服不識也父母之喪無貴賤一也據此禮父在為母期天子諸侯亦服然所謂三年之喪達乎天子猶信故經有連而不相及也動而不相害也葢如此若喪服傳云君為姑姊妹女子子嫁於國君者何以大功曰尊同也尊同則服其親服亦是類矣故善説禮者不以變妨常寡妨衆且天子為三公九卿錫衰為諸侯緦衰為大夫士疑衰其所為服亦廣矣其於親親雖不為服可也亦若所謂諸父昆弟者未有無爵者也故秦伯之弟鍼仕諸晉君子以為千乗之國而不能容其母弟謂之出奔兼山郭氏曰有憂莫如舜無憂莫如文王憂勤者文王也無憂者後人之言文王也延平黄氏曰舜言徳為聖人而武王不言者其避文王歟此亦周公思兼三王以施四事不及文王之意然而功之為盛也不足以徳言廣安游氏曰中庸之道常患乎失其傳夫無失其傳之憂其唯文王乎即文王而言之居其前者常患乎無以授之而文王以王季為父則王季授之矣其居後者常患乎無以承之而文王以武王為子則有以承之矣此所謂父作子述也至於此武王用中之效始大見於天下身享其報則其道之相承而格於天心矣以一戎衣而有天下言其得之之易也以臣伐君而不失顯名既有其位又有其禄既有其祖又有其後此所謂報之厚全美而可觀也武王老而受命七十而崩未及追王上祀以天子之禮周公能終其志而成其徳文武之志於是為慊然禮之有是也久矣惟周為能具之葢非周創為之其禮達乎諸侯大夫及士庶人禮例當如是也父大夫也以子之故而士祭焉父士也以子之故而大夫祭焉此言士大夫之子其禮可以及其父則天子諸侯之禮可以及其父猶此意也推而上之則孫之禮亦可以及乎其祖矣故因追王上祀泛論禮例之當然不特此也旁親之喪達乎大夫而不達乎諸侯天子至於父母三年之喪則天子至於庶人莫不皆然以喪言之知子孫之厚於父祖以祭言之亦知子孫之當厚於父祖聖人懼天下之人徒見文武之追王上祀為異禮故舉諸侯大夫士禮例之所常有者而言之又舉三年之喪貴賤之所通行者而告之也晉陵喻氏曰父作之子述之文武之心一也大勲未集其勢然也壹戎衣而有天下亦其勢然也堯舜湯武易地而皆然也然則曰予有慚徳何也聖人之不得已也何為不得已曰天命也其可己乎非湯武天下之禍寜止如夏殷之季而已哉當是時猶有管叔蔡叔霍叔也猶有武庚淮夷也故曰予弗順天厥罪惟均然則湯武之事其心可知矣如此故身不失天下之顯名孔子曰湯武革命順乎天而應乎人孟子曰天吏也學者其可信矣不然安有尊為天子富有四海之内宗廟饗之子孫保之乃與舜同稱哉禮曰後世雖有作者虞帝不可及已言時不同也髙要譚氏曰稱武王則曰末受命末之為言終也言文王之脩徳雖末受命逮武王而終受命也文王所以無憂者以王季為父則不忠不獲盡其孝以武王為子則不忠不能承其孝文王以父作之所以立受命之基武王以子述之所以終受命之報文武受命相為始終故稱武王末受命者所以終文王末受命之事也文王之孝其志在於追王大王王季然而末受命則追王之志有所不得行追王之志雖不得行於文王之時而武王受命則可以成文王追王之志矣故稱武王末受命者又所以見文王追王大王王季之志於此得成其孝也文王作之於前武王述之於後至周公遂推廣文武之徳而成之以追王之孝而見之於天子祭祀之禮又推其類以達乎諸侯大夫士庶人而制為葬祭喪紀之節則文武之孝至周公遂廣及於天下矣錢塘于氏曰詩人謂文王不識不知順帝之則天下豈足以動其心哉夫子論武王尊為天子富有四海之内宗廟饗之子孫保之與舜同至於徳為聖人則不與葢求之文王則天其人武王則人其天矣其曰纉大王王季之緖是述於後者文王未始違乎天故其緒不息而有以得天下不然使武王不循其序文王之志荒矣故大王王季文王皆無取天下之心而自有以得天下之實武王纉大王王季之緖雖有以得天下之實亦未始有取天下之心然則皆天也子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也春秋脩其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也郊社之禮所以祀上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎鄭氏曰脩為埽糞也宗器祭器也裳衣先祖遺衣服設之當以授尸也時食四時祭也序次也爵謂公卿大夫士事謂薦羞也辨賢者以其事别所能也若司徒羞牛宗伯共雞牲矣文王世子曰宗廟之中以爵為位崇徳也宗人授事以官尊賢也旅酬下為上者謂若特牲饋食之禮賔弟子兄弟之子各舉觶於其長也逮賤者宗廟之中以有事為榮也燕謂既祭而燕以髪色為坐祭時尊尊也至燕親親也齒亦年也踐其位踐猶升也先者其先祖也社祭地神不言后土省文也示讀如寘諸河干之寘寘置也物而在掌中易為知力者也序爵辨賢尊尊親親治國之要孔氏曰此論武王周公上成先祖脩其宗廟行郊社之禮所以能治國如置物掌中也善繼志者若文王有志伐紂武王能繼成之尚書武成曰予小子其承厥志是也善述事者言文王有文徳為王基周公制禮以賛述之洛誥云考朕昭子刑乃單文祖徳是也昭與昭齒穆與穆齒是序昭穆也公卿大夫各以其爵位齒列而助祭祀是辨貴賤也旅衆也逮及也祭末飲酒之時使一人舉觶之後至旅酬之時使卑者二人各舉觶於其長者卑下者先飲是下者為上賤者在先是恩意先及於賤者也燕時以毛髪為次序是序年齒也踐其位行其禮者孝子升其先祖之位行祭祀之禮也藍田吕氏曰此章言達孝所以為中庸武王周公所以稱達孝者能成文王事親之孝而已故脩其祖廟陳其宗器設其裳衣薦其時食者善繼文王事親之志也序爵序事旅酬燕毛者善述文王事親之事也踐文王之位行文王之禮奏文王之樂敬文王之所尊愛文王之所親其所以事文王者如生如存如繼志述事上達乎祖此之謂達孝者歟祖廟者先王先公之廟祧也宗器者國之玉鎮大寳器天府所掌者也若有大祭則出而陳之以華國如書所謂赤刀大訓𢎞璧琬琰大玉夷玉天球河圖之類是也裳衣者守祧所掌先王先公之遺衣服祭祀則各以其服授尸是也時食者四時之物如籩豆之薦四時之和氣是也宗廟之禮所以序昭穆别人倫也親親之義也父為昭子為穆父親也親者邇則不可不别也祖為昭孫亦為昭祖為穆孫亦為穆祖尊也尊者逺則不嫌於無别也故孫可以為王父尸子不可以為父尸此昭穆之别於尸者也喪禮卒哭而祔男祔于皇祖考女祔于皇祖妣婦祔于皇祖姑喪服小記士大夫不得祔于諸侯祔于諸祖父之為士大夫者亡則中一以上而祔祔必以其昭穆此昭穆之别於祔者也有事於大廟子姓兄弟亦以昭穆别之羣昭羣穆不失其倫凡賜爵昭與昭齒穆與穆齒此昭穆之别於宗者也序爵者序諸侯諸臣與祭者之貴賤也貴貴之義也詩曰相維辟公天子穆穆此諸侯之助祭者也序事者别賢與能而授之事也尊賢之義也孰可以為宗為詔相孰可以為祝而祝嘏孰可以賛祼獻孰可以執籩豆至于執爵沃盥莫不辨其賢能之大小而序之也旅酬下為上者使賤者亦得申其敬也下下之義也若特牲饋食禮賔弟子兄弟子各舉觶於其長以行旅酬也燕毛者既祭而燕則尚齒也長長之義也毛髪色也以髪色别長少而為之序也祭則貴貴貴貴則尚爵燕則親親親親則尚齒其義一也天下之大經親親長長貴貴尊賢而已人君之至恩下下而已一祭之間大經以正至恩以宣天下之事盡矣郊社之禮所以事上帝宗廟之禮所以祀乎其先事上帝者所以立天下之大本道之所由出也祀乎其先所以正天下之大經仁義之所由始也故壇廟之别牲幣之殊升降祼獻之節爼豆竒耦之數酒醴厚薄之齊燎瘞腥腍小大多寡莫不有義一餕之均則四簋黍見其脩於廟中一朌肉之均則羔豚而祭百官皆足非特是也知鬼神為可敬則鬼神無不在洋洋乎如在其左右雖隠微之間恐懼戒慎而不敢欺則所以養其誠心至矣葢以不如是則不足以立身身且不立烏能治國家哉故曰明乎郊社之禮禘嘗之義治國其如示諸掌乎此之謂也建安游氏曰大孝聖人之絶徳也達孝天下之通道也要其為人倫則一也故繼志述事之末亦曰孝之至也事死如事生以慎終者言之事亡如事存以追逺者言之始死謂之死既𦵏則曰反而亡焉此死亡之辨也唯聖人為能饗帝孝子為能饗親饗帝一徳也饗親一心也要不過乎物而已其於慶賞刑威乎何有故曰明乎郊社之禮禘嘗之義治國其如示諸掌乎成王自謂予冲子夙夜毖祀此迓衡之要道也又曰祭祀之義非精義不足以究其説非體道不足以致其義葢唯聖人為能饗帝為其盡人道而與帝同徳孝子為能饗親為其盡子道而與親同心也仁孝之至通乎神明而神祗祖考安樂之則於郊社之禮禘嘗之義始可以言明矣夫如是則於為天下國家也何有延平楊氏曰武王纉大王王季文王之緒文王追王大王王季上祀先公以天子之禮所以繼其志述其事也夫將祭必思其居處故廟則有司脩除之祧則守祧黝堊之嚴祀事也宗器天府所藏是也若赤刀大訓天球河圖之類歴世寳之以傳後嗣祭則陳之示能守也於顧命陳之示能傳也裳衣守祧所藏是也祭則各以其所服衣授尸所以依神也時食若四之日獻羔祭韭之類以生事之也夫祭有昭穆所以别父子逺近長幼親䟽之序也故有事於大廟則羣昭羣穆咸在而不失其倫焉此宗廟之禮所以序昭穆也尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司此序爵而尊卑有等所以辨貴賤也玉幣交神明也裸鬯求神於幽也故天地不裸則玉幣尊於鬯也故大宰賛之鬯則大宗伯涖之裸將又卑於鬯也故小宰賛之若此類所謂序事也先王量徳授位因能授職此序事所以辨賢也饋食之終酳尸之獻下逮羣有司更為獻酬此旅酬下為上所以逮賤也既祭而以燕毛為序所以序齒也序昭穆親親也序爵貴貴也序事尚徳也旅酬逮賤燕毛序齒尚恩也敬親者不敢慢於人况其所尊乎愛親者不敢惡於人况其所親乎事死如事生若餘閣之奠是也事亡如事存若齊必見其所祭者是也記曰入門弗見也上堂又弗見也入室又弗見也亡矣喪矣葢死而後亡也始死則事之如生既亡則事之如存著存不忘乎心孝之至也夫上祀先公以天子之禮而下達乎庶人推親親之恩至於燕毛序齒仁之至義之盡也武王周公所以為達孝也歟詩云孝子不匱永錫爾類此之謂也又曰推先王報本反始之義與夫觀盥不薦渙萃假有廟之象則聖人所以自盡其心者於是為至非深知鬼神之情狀其孰能知之則於治國乎何有河東侯氏曰所謂達孝者達諸人情達諸天下通萬世而無弊等天地而不窮行夷貊而不窒者也郊社之禮所以祀上帝也祀上帝天子之事也宗廟之禮所以祀乎其先也天子諸侯皆有宗廟謂祀乎其先者各有其先也其與顔子不改其樂之其同天子宗廟天子之先也諸侯宗廟諸侯之先也天子有天子祀先之禮諸侯有諸侯祀先之禮故曰宗廟之禮所以祀乎其先也魯侯也以天子祀先之禮祀其先非禮也瀆也不祀乎其先也孔氏曰禘自既灌而往者吾不欲觀之矣灌之祭禮也自首至尾皆非其祀故也禘其帝之所自出魯周公之封也何帝之所自出哉非其物故也子思於武王末受命章中備言其禮矣又曰武王周公之達孝繼之以踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也豈不曰魯之君臣踐其位者天子穆穆相維辟公行其禮奏其樂者克開厥後耆定爾功乎若猶未也是不敬其所尊不愛其所親以誣偽不誠之道祀其先不孝之至者也故於達孝之後特申言之曰宗廟之禮所以祀乎其先也為魯發之也及其甚也季氏用八佾三家以雍徹矣孔子於衛其所先者必曰正名故君子名之必可言也魯之禮樂可名言乎其曰明乎郊社之禮禘嘗之義治國其如示諸掌乎明乎二字極有功後世所以汨名分亂上下自三代而下隨事維持不能成善治而篡奪相繼者由不明乎禮也子思於中庸引斯禮而發斯義者豈偶然哉所以祀上帝所以祀乎其先所以字與其字更與玩味新安朱氏曰此第十九章達通也承上章而言武王周公之孝乃天下之人通謂之孝猶孟子之言達尊也上章言武王纉大王王季文王之緒以有天下而周公成文武之徳以追崇其先祖此繼志述事之大者也下文又以其所制祭祀之禮通於上下者言之祖廟天子七諸侯五大夫三適士二官師一宗器先世所藏之重器若周之赤刀大訓天球河圖之屬也時食四時之食各有其物如春行羔豚膳膏薌之類是也昭如字解見王制宗廟之次左為昭右為穆而子孫亦以為序有事於大廟則子姓兄弟羣昭羣穆咸在而不失其倫焉爵公侯卿大夫也事宗祝有司之職事也旅衆也酬導飲也使亦得以申其敬也燕毛祭畢而燕則以毛髪之色别長幼為坐次也齒年數也踐猶履也其指先王也所尊所親先王之祖考子孫臣庶也始死謂之死既𦵏則曰反而亡焉皆指先王也此結上文兩節皆繼志述事之意也禘天子宗廟之大祭追祭大祖之所自出於太廟而以太祖配之也嘗秋祭也四時皆祭舉其一耳禮必有義對舉之互文也示與視同視諸掌言易見也此與論語文意大同小異記有詳略耳又曰酬導飲也主人酌以獻賔賔酌主人曰酢主人又自飲而復飲賔曰酬其主人又自飲者是導賔使飲也諺曰主人陪食疑即此意下為上之為音于偽反為上先飲也又曰五峰言無北郊只社便是祭地此却說得好涑水司馬氏曰凡設官分職所以待賢者非以禄不肖也人君擇賢而授之官則宗廟之中執事者皆賢人也鄭氏謂羞牛共雞牲烏足以别所能乎長樂劉氏曰言其孝徳幽則達於鬼神明則達於庶士莫不用夫中庸以濟其美故曰武王周公其達孝矣乎善繼人之志者謂大王王季文王之志在乎率人民於中和也賛天地之化育也而武王周公善行斯道以繼其志而益光大之善述人之事者謂三王之事業存於禮樂政刑也武王善能述而行之於天下也周公善能述而載之於六官也著成萬世帝王之大法使大王王季文王之緒業垂諸方䇿而仁於無彊則聖子神孫所以昭顯乎親者其有大於此乎延平周氏曰孝之為孝一也然於舜則言大於武王周公則言達何也葢徳為聖人之類非通乎天下之所可行者也故曰大武王周公之孝則在乎繼前人之志述前人之事而可以通乎天下者也故曰達雖然特以迹言耳以心言之則易地皆然始於脩其祖廟者葢廟者神之所依苟神之所依者莫之能脩則事神之禮葢闕如也春秋書大室壊者亦此意也然其終止於薦新者葢薦新者時祀之小者也其小者猶能盡禮則若所謂禘祫者又可見矣序昭穆所以别父子也若公卿者爵也若冢宰司徒者官也言序爵則知其所謂序事者官也言序事則知其所謂序爵者位也位者言其所與祭事者言所共祭與祭者未必共祭所謂共祭者若司徒奉牛牲也方其序爵則以辨貴賤為主方其序事則以辨賢為主言貴賤而不言賢否者葢先王之擇其可與祭者皆賢也而所辨者特其事之各有所施耳逮賤者仁也序齒者義也先王之於燕仁義而已矣於天神言郊地祗言社則知言郊者舉其大以兼五帝言社者舉其小以見后土也禘對祫則祫為大於間祀言禘所以知有祫也於時祀言嘗所以知有烝之與祠禴也然必言嘗者舉其始也葢祭之備物始於秋而豐於冬春則少損而夏則愈薄故也禮必有義義必有禮而於郊社言禮以禘嘗言義何也郊社之所以饗帝者義也宗廟之所以饗親者仁也於義而言禮則示其有禮以節義於仁而言義則示其有義以濟仁禮以節義則有權而有經義以濟仁則能仁而能反明其禮與義而治國如指諸掌者郊社禘嘗之説於物則以禮樂為主於己則以齊明盛服為主果於禮樂度數之間而推其性命之理與齊明盛服之際而求其性命之情則其於天下乎何有海陵胡氏曰達明達也人謂其先文王文王之志在於天下生靈故視民如傷保民如赤子惡紂殘暴有志伐之然而志未果而終武王能仗大義誅殘賊救塗炭之苦解倒懸之急以承文王之志豈非善繼志者也文王有文徳創王基周公能輔相成王制禮作樂以述成文王之業豈非善述人之事歟以天子之尊莫之與抗然上知報天之功下知報地之力中知事祖宗之靈至尊尚如此况於卿大夫之卑士庶人之賤固當恭謹而事其上矣在易觀卦曰觀盥而不薦有孚顒若言在上之人於宗廟之終致其孝謹在下之人觀而化之孚信顒然故聖人之制祭祀為敎化之本原其於治國之道如指掌中之物禘夏祭之名嘗秋祭之名嚴陵方氏曰宗廟之禮非特序死者之昭穆亦所以序生者之昭穆焉王制所謂三昭三穆者即死者之昭穆也祭統所謂羣昭羣穆者即生者之昭穆也敬其所尊者尊其祖而敬之也愛其所親者親其禰而愛之也事死如事生者主人道言之也論語所謂祭如在是也事亡如事存者主神道言之也論語所謂祭神如神在是也地雖載萬物而萬物乃本乎天地雖生萬物而萬物乃始乎天夫郊社之祭皆所以報本反始謂之事上帝豈為過哉馬氏曰大則有不可繼之意而達則有可傳之理也以不可繼故曰徳為聖人以其可傳故曰善繼人之志善述人之事志者藴於中而未發事者發於外而已行藴於中而未發則在知其志而弼成之所以為善繼發於外而已行則循而潤色之所以為善述霜露之變殊而君子怵惕悽愴之心生故春秋脩其祖廟將以行禮而達其孝愛之心故陳其宗器設其裳衣薦其時食序貴賤所以貴貴則賤者有所略辨賢所以責其才之所勝能之所任則老者在所簡矣然而祭者敎之本而徳均則政行先王於既祭之末而行燕之禮其旅酬則以下為上欲其恩之有以及於賤者也其燕毛則以齒為先欲其恩之有以及於老者也踐其位行其禮奏其樂此備在外之物也敬其所尊愛其所親至事死如事生事亡如事存此盡其在内之誠也郊社者外祭之重者也禘嘗者内祭之重者也禮者文也義者本也言禮則有義言義則有禮文可陳而本難知非明不足以見之明其義者唯君子而已指者言其體示者言其用兼山郭氏曰武王周公孝之達者故繼志述事得以成其志而盡文王受命之大徳而為有國無窮之休故中庸詳言之也夫事出於誠則義不苟遺故一字不該非誠意之所存也惟誠意之常存故不遺一事不廢一義進退可觀動作可法以之推於天下無不可者如郊社禘嘗之禮是也既序尊卑貴賤以明其分辨賢逮賤序齒以通其情又敬其所尊愛其所親以端其本不崇朝而大義徧舉古之明王為國以禮者葢謂是也廣安游氏曰達孝者猶言孝道至是而達凡先王之志至是而通達也故善繼人之志善述人之事所以為孝也天下之禮不可以一端而盡則夫行之有不得而周浹者矣人而有父子之親也昭穆不可以不辨人而有貴賤之等也爵不可以不序人之賢而有大小之差也事不可以不序人而有父兄之愛也子弟之賤不可以不逮人而有老少之差也毛髪不可以不優是皆人情之所當有而闕一不可者古之行禮未有能周浹而備舉者也欲其道之備舉而禮之周浹此固先王先公之志而武王周公能終成之所以為達也踐其所當踐之位行其所當行之禮奏其所當奏之樂敬其所當敬之尊愛其所當愛之親所以事上帝所以事乎其先聲明文物雍容委曲粲然繁興自四代之樂四代之器四代之衣服車旗宫室之類莫不兼舉並用而用之各有其時行之各當其處故天下之至文未有如周家之全美而中節者孔子曰周監于二代郁郁乎文哉吾從周孔子之取於文者非徒取其文也取其禮也非徒取其禮也取其道之四達而交通也昔者文王望道而未之見文王之所望望此也望而未見則未達也武王周公能繼其志述其事以達文王之道此所謂達孝也此聖人之得志聖人之盛也孔子之欲從周樂其得志而無有所不慊乎其道而已雖然此豈一日之故哉葢自后稷公劉下至大王王季文王周公相承不絶而後得以至於如此故孔子先言其追王上祀之禮次言能推本歸美於其親則為人子孫之志於是為得矣此言宗廟之禮治國之道又以見其為人君上欲行道於天下之志於是為得矣夫武王周公内得志於其家外得志於天下此固孔子之所願望見而不得者故吾從周云者斯以寄其意焉爾施氏曰舜之大孝則充而塞乎天地溥而横乎四海武王周公之達孝則施諸後世而無朝夕推而放諸四海而準何則葢徳諧頑嚚則已所獨也故於舜謂之大孝繼志述事則人所同也故於武王周公謂之達孝非帝王之徳有優劣易地則皆然晏氏曰天下之理有本必有末舉其本而末從之所以然者得其要爾天地者生之本也而以郊社祭之先祖者類之本也而以禘嘗祭之君師者治之本也又能明乎郊社之禮禘嘗之義可謂知所以報本而得其要矣推此以治國者其末爾所以如指示諸掌之易也髙要譚氏曰周公稱達孝可也然而與武王並稱何哉曰周公所以推之天下者即武王之事也武王為其事周公廣其意此所以並稱為達孝也繼文王之志述文王之事者武王之達孝也故能壹戎衣而有天下以終文王之受命繼武王之志述武王之事者周公之達孝也故能制禮以化天下而成文武之徳吳興沈氏曰其妙則藏乎性命之間其微則寓乎器數之内況鬼神之道見於幽明有無之際精粗隱顯兼得之欲知中庸之理觀諸鬼神祭祀之間斯可矣故以武王周公之事明之又曰治道不在多端在夫致敬之間而已郊社之禮所以事上帝也當其執圭幣以事上帝之時其心為何如宗廟之禮所以祀乎其先也當其奠爵􅕌以事祖宗之時其心為如何是心也舉皆天理無一毫人偽介乎其間鬼神之情狀天地萬物之理聚見於此推此心以治天下何所往而不當故曰明乎郊社之禮禘嘗之義治國其如指諸掌乎於郊社言禮禮者所以敬而已於禘嘗言義義者敬之義而已建安真氏曰自無憂者其唯文王乎以下至此章亦猶前章之稱舜也大抵為人君以光祖宗遺後嗣為孝周自大王實始剪商至文王三分天下有其二而武王遂成之躬衣戎服誅獨夫受而有天下此武王之繼志述事也周公追王大王王季祀先公以天子之禮又制禮作樂使世世子孫奉承宗廟之祀事死如生事亡如存此周公之繼志述事也舜之孝如天之不可名故曰大武王周公之孝天下稱之無異辭故曰達後世人主有志於孝治者當合大舜文武周公之事而考之葢大舜以瞽瞍為父處人倫之變者也文王以王季為父處人倫之常者也舜文所遇不同而其心則一使舜遇文王之時必能盡處常之道使文王遇舜之時亦必能盡處變之方所謂易地則皆然也至於繼志述事則當持守而持守固繼述也當變通而變通是亦繼述也錢塘于氏曰夫親親貴貴尊賢下下長長此五者具見於宗廟一祭之間大經以正至恩以宣善繼志述事如此可謂盛矣此皆大王王季文王之所未為武王周公通變而為之不謂之達孝可乎達者不拘故常固有通變之義先儒以前所言達禮通天下可行因謂之達孝殊不思此謂其達者指善繼志善述事而言非可指達禮為達孝也山隂陸氏曰以社之禮為事上帝者葢祀昊天上帝則百神與雖及地祗是乃所以事上帝也晉陵喻氏曰學者或疑武王之事不出於中庸故夫子稱舜稱文王而後繼以武王周公之事而加詳焉其曰達又曰善繼善述又曰孝之至者尚何疑於武王哉新定顧氏曰周自大王肇基王迹王季其勤王家文王克成厥勲考其用心唯欲措斯世於平治而已則論武王周公之繼志述事莫先於卒其伐功也今也語不一及而獨備言祭祀之事何邪王者功成作樂治定制禮祭祀禮樂之至盛者也論武王周公之繼志述事而及於祭祀者言其功成治定制禮作樂之事實也示讀如寘諸河干之寘寘置也物在掌中易為知力者也孟子言武丁朝諸侯有天下猶運之掌上古人譬言事之易大抵以此因論祭祀縱言至於此耳郊祀言禮禘嘗言義互文也新定錢氏曰達孝當就繼志述事上看若以無改父道為孝則武王不宜伐商若以友于兄弟為孝則周公不當誅管蔡未可與權者未足與議也故以達孝稱之是其伐也其誅也乃所以善繼志述事者也禮記集説卷一百二十九
