body:
  text: 禮記集說卷一百宋衛湜撰致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣鄭氏曰躬身也禮自外作故治身鄙詐入之謂利僞生易輕易也孔氏曰前云致樂此云致禮聖王詳審禮意以治躬則莊嚴而恭敬內心莊嚴恭敬則人懼之嚴肅威重也不能致樂治心心中斯須不能調和則不能喜樂而有鄙吝詐僞之心入於內矣不能致禮治躬故輕易怠慢之心從外而入內矣河南程氏曰心中斯須不和不樂而鄙詐之心入矣此與敬以直內同理謂敬為和樂則不可然敬則須和樂正以中心沒事也長樂陳氏曰肅則莊敬重則嚴威是嚴威以莊敬為本莊敬以嚴威為文也禮也者資莊敬以為教待威嚴而後行樂由中出而本乎心則和樂者心之發於天真者也禮自外作而見乎貌則莊敬者貌之形於肅括者也鄙詐之心反乎子諒者也易慢之心反乎莊敬者也言反乎子諒者推而上之以見易直言反乎莊敬者推而下之以見嚴威言之法也樂書山隂陸氏曰是亦威也與天則不言而信神則不怒而威亦異矣夫禮之事如斯而已故致樂以治心終始兩言之也子曰言之重辭之復其中心有善者焉李氏曰不和則鄙不樂則詐不莊則易不敬則慢不和不樂不莊不敬生者生於內者也鄙詐慢易入者入自外者也新安朱氏曰心要平易無艱深險阻所以說不和不樂則鄙詐之心入之矣不莊不敬則慢易之心入之矣入之一字正見得外誘使然非本心實有此惡雖非本有然既為所奪而得以為主於內則非心而何慶源輔氏曰樂以治心禮以治躬而皆終於威者德成而後有威也子曰正其衣冠尊其瞻視儼然人望而畏之成德之事也述樂之功詳述禮之效略者非崇樂而簡禮也以治心治躬之不同耳雖然樂生於禮禮成於樂治心所以成其身治躬所以正其心禮樂之用未嘗不相資也鄙謂粗强而不和鄙而後至於詐易而後至於慢由此觀之則所謂致樂者致其和樂而已致禮者致其莊敬而已和樂者人之本心莊敬者人之正貌鄙詐易慢則感於外而然也故云入自外之內曰入故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢焉故德輝動於內而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而錯之天下無難矣鄭氏曰德輝顔色潤澤也理容貌之進止也孔氏曰此一經言聖人用禮樂以治身內外兼備使德輝動於內而民順於外樂從心起故動於內禮自外生故動於外樂能感人故極益於和禮以檢貌故極益於順內心和而外色順故民望其顔色而不與爭外貌和順故民不生易慢樂以和心故德輝發動於內而民莫不承奉聽從禮以治貌故理發見於外而民莫不承奉敬順聖王若能詳審極致禮樂之道舉而錯置於天下悉皆敬從無復有難為之事也張氏曰動謂觸也用禮樂以感動之樂治心故云動內禮檢跡故云動外延平周氏曰樂動於內所以極和和言其心禮動於外所以極順順言其貌長樂陳氏曰禮樂之於天下辨上下之位則禮交動乎上樂交應乎下相通以致用也定內外之分則樂動於內禮動於外相辨以立體也其為體用雖殊而所以職乎動則一而已記者兩言之為更端異故也曾子言君子動容貌斯逺暴慢矣正顔色斯近信矣誠信達之於顔色恭敬達之於容貌君子內和於心以達誠信則民瞻其顔色而弗與爭焉以內信外也外順於貌以達恭敬則望其容貌而民不生易慢之心焉以外直內也曲禮曰執爾顔正爾容祭義曰有愈色者必有婉容冠義曰禮義之始在於正容體齊顔色是顔色之於容貌為內容貌之於顔色為外故於內和之樂言顔色外順之禮言容貌子張問政孔子對以君子明於禮樂舉而錯之而已然則致禮樂之道舉而錯之天下則安上治民移風易俗猶反掌耳為政豈難哉此孔子將為政於衛所以深悼禮樂之不興也樂雖主和未嘗不順和順積中是也禮雖主順未嘗不和禮之用和為貴是也樂書嚴陵方氏曰樂動於內而彼此之情不乖故其極也和禮動於外而上下之體無逆故其極也順內和則民瞻其顔色而弗與爭也外順則望其容貌而民不生易慢焉顔色則指其面目容貌則兼手足言之瞻近而望逺故也夫瞻其顔色望其容貌已足以使民弗與爭而不生易慢又況於親炙之乎聽亦無非順也以樂有音故特以聽言聽與順皆言下之所以承上者如此錯言錯之於彼以其莫不聽順故曰錯之天下慶源輔氏曰樂作於外而動於內禮根於內而動於外樂動於內故極其和禮動於外故極其順和以心言順以迹言而心迹初非二事也內和則外順矣禮樂果二道哉內和而外順則正其衣冠尊其瞻視儼然人望而畏之矣豈敢有易慢之心哉况於與之爭乎德輝動於內以下此又覆說上意所以內和而外順而民瞻望之至於如此者蓋德輝動於內而民莫不承聽理發諸外而民莫不承順故也德輝謂樂也所謂奮至德之光也德輝動於內則必形於外矣理即禮也理發於外則根於內可知矣舉言舉之自我始也致樂以治心致禮以治躬而已然果能致禮樂之道於己則舉而錯之天下民莫不順從矣又何難之有哉金華邵氏曰禮樂何以能感民如此哉蓋聖人與斯民均備是禮樂於所性之中特聖人先得我心之同然故一舉而錯之天下則此以心感彼以心應宜其易易而無難矣樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也鄭氏曰禮主其減人所倦也樂主其盈人所歡也進謂自勉强也反謂自抑止也文猶美也善也放淫於聲樂不能止也報讀為褒猶進也得謂曉其義知其吉凶之歸其義一謂俱趨立於中不銷不放也孔氏曰此一節論禮樂之體或減或盈其事各異王者當各依其事以和節之禮既減損若不勉强自進則禮道銷衰樂主盈滿若不反自抑損則樂道流放張氏曰威儀繁廣易生厭倦故禮之失在乎損洋洋盈耳不欲休止故樂之失在乎盈失在乎損當自勉强失在於盈當自抑止河南程氏曰禮樂只在進反之間便得性情之正長樂陳氏曰禮未嘗不主減然而饗必至於百拜儀必至於三千則以進為文可知樂未嘗不主盈然而合樂必止三終奏韶必止九成則以反為文可知在風之蟋蟀儉必欲中禮樂必欲無荒在雅之楚茨禮儀欲其既備鐘鼓欲其既戒亦此意銷則鑠於外物不能以自强入於魯人之跛倚者有之放則逐於外物不能以自反入於魏文侯之忘倦者有之樂書嚴陵方氏曰其情減則知退而不知進故宜文之以進其情盈則知出而不知反故宜文之以反報者施之對施為出而出所以退報為入而入所以進進與報其實一也禮為異故有曰進有曰報樂為同故一曰反而已前言禮報情非禮有報之謂乎又言君子反情以和其志非樂有反之謂乎馬氏曰樂動於內故主其盈禮動於外故主其減此言其體也禮減而進以進為文樂盈而反以反為文以至禮之報樂之反此言其用也以體而言之故禮曰減樂曰盈以用而言之故禮曰進樂曰反樂者動於內者也故其體則主於盈蓋樂由中出而為人心之所喜禮動於外故其體則主於減蓋禮自外作而先王有以强世禮主於減故君子勉而作之而以進為文樂王於盈故君子反而抑之而以反為文以進為文然後能全其禮以反為文然後能全其樂七介以相見不然則已慤三辭三讓而至不然則已蹙一獻之禮而賔主百拜酒清人渴而不敢飲肉乾人飢而不敢食日暮人倦齊莊正齊而不敢懈怠以成禮節此皆勉而進之者也進旅退旅所以示其有所和弦匏笙簧會守拊鼓所以示其有所統治亂則以相訊疾則以雅其作之則以柷其止之則以敔此皆反而抑之者也禮減而不進則禮之道幾於息矣故銷樂盈而不及則樂之道至於流矣故放先王知禮樂之偏故禮則有報而樂則有反禮有報者必資於樂也樂有反者必資於禮也故曰禮之用和為貴言禮之用和為貴則樂之用節為善也故禮得其報則樂樂得其反則安禮得其報則禮資於樂資於樂則樂蓋樂者樂也傳曰行而樂之樂也樂得其反則安則樂資於禮資於禮則安故傳曰有禮則安禮之報樂之反雖不同而相資之理一也故曰其義一也李氏曰陽剛以動闢故其道常饒隂柔以靜翕故其道常乏禮隂也常乏故主乎減樂陽也常饒故主乎盈然陽而不隂則無以合其施經而不緯則無以成其誼放隂之陽剛上而文其柔所以為禮之文也陽之隂柔下而文其剛所以為樂之文也故曰禮減而進以進為文樂盈而反以反為文易於復曰反復其道而於姤曰品物咸章蓋上者陽之所也下者隂之所也陽上進而隂下退所以為復禮主於減樂主於盈者復之道也外者陽之所也內者隂之所也陽內入而隂外出故為姤禮以進為文樂以反為文者姤之道也若夫禮減而不進則入至於藏故銷樂盈而不反則出至於蕩故放銷則不能若消之有存而放則不能若息之有止也是以君子之體禮也得其報則樂而不憂其體樂也得其反則安而不虞故孔子之言謙以制禮則繼之以復以自知言作樂崇德則繼之以嚮晦入宴息凡以此也蓋一反一報者亦出於理之自然而道之常也故坎者隂也然而含陽離者陽也然而含隂此信道致詘詘道致信一滿一虛以相為終始相為先後者也故曰樂之反禮之報其義一也新安朱氏曰禮主其減者禮主於撙節退遜檢束然以其難行故須勇猛力進始得故以進為文樂主其盈者樂主於舒暢發越然一向如此必至於流蕩故以反為文禮之進樂之反便得情性之正又曰主減者當進須力行將去主盈者當反須回顧身心慶源輔氏曰禮主其減減所以裁節於外也樂主其盈盈則充盛於內也樂而不盈則無以形於外禮而不減則無以合於內來而不往非禮也往而不來非禮也故曰禮有報往來不已是亦進之意金華邵氏曰禮有以節乎人情故聖人制禮之初則主其減減則便於行樂有以樂乎人情故聖人作樂之初則主其盈盈則滿其欲禮固主於減矣然必增而進之如經禮三百曲禮三千所謂進也故以進者為文樂固主於盈矣然必有以約而反之如清廟之瑟朱弦而疏越一唱而三嘆所謂反也故以反者為文在風之蟋蟀儉必欲其中禮樂必欲其毋荒在雅之楚茨禮儀欲其既備鍾鼓欲其既戒禮有報資於樂樂有反資於禮此禮樂皆得夫樂者樂也人情之所不能免也樂必發於聲音形於動靜人之道也聲音動靜性術之變盡於此矣鄭氏曰免猶自止也人道人之所為也性術言此出於性也盡於此不可過孔氏曰自此至章末總明樂之德也樂之為體是人情之所歡樂所不能自抑退也內心歡樂見於聲音則嗟歎咏歌是也形見於動靜則手舞足蹈是也是人道自然之常術謂道路變謂變動言聲音動靜是性道路之變轉竭盡於此不可過於此度也嚴陵方氏曰聲音生於氣故曰發動靜見於容故曰形發故可聞形故可見慶源輔氏曰人生而靜天之性也感於物而動性之術也咨嗟咏歌手舞足蹈性術之變也過此則淫放故曰盡於此矣故人不耐無樂樂不耐無形形而不為道不耐無亂鄭氏曰形聲音動靜也耐古書能字也後世變之此獨存焉古以能為三台字孔氏曰此明人禀自然之性而有喜樂歡樂既形於聲音動靜而不依道理或歌舞不節俾晝作夜不能無淫亂之事以至亡國喪家也長樂陳氏曰情動於中而形於言人之所以為詩也情樂於內而形於外人之所以為樂也凡此天機之發而不能自已非有以使之然也是人而不耐無樂樂不耐無形形而不為之道達則始乎治常卒乎亂矣樂書嚴陵方氏曰前言樂者人情之所不能免故此復言人不能無樂前言樂必形於動靜故此復言樂不能無形慶源輔氏曰形而不為道則鄭衛之樂是也先王恥其亂故制雅頌之聲以道之使其聲足樂而不流使其文足論而不息使其曲直繁瘠廉肉節奏足以感動人之善心而已矣不使放心邪氣得接焉是先王立樂之方也鄭氏曰流猶淫放文篇辭也息猶銷也曲直歌之曲折也繁瘠廉肉聲之鴻殺也節奏闋作進止所應也方道也孔氏曰此一節論先王恥惡其亂故立正樂以節之也先王制為雅頌之聲作之有節使人愛樂不至流逸放蕩也文謂樂之篇章言樂德深逺論量義理而不可息止也曲謂聲音回曲直謂聲音放直繁謂繁多瘠謂省約廉謂廉稜肉謂肥滿凡聲音之宜或須繁多肉滿謂粗大也或須瘠小廉瘦謂細小也凡樂器大而弦粗者其聲鴻器小而弦細者其聲殺也節奏謂或作或止作則奏之止則節之言聲音之內或曲或直或繁或瘠或廉或肉或節或奏隨分而作以㑹其宜使足以感動人之善心而已既節之以雅頌又調之以律吕貌得其敬心得其和故放心邪氣不得接於情性矣長樂陳氏曰王政廢興在雅不在風盛德形容在頌不在雅制為雅頌之聲以道之則審樂足以知政聞樂足以知德使其聲足樂而不流文足論而不息也聲足樂而不流故安文足論而不息故久中正之雅不過是爾蓋廉直之音作而民肅敬繁簡之音作而民康樂肉好之音作而民慈愛先王制為雅頌以道曲直繁瘠廉肉之聲抑又節奏合而成文其有不足感動人之善心邪上文論六音此及廉直繁簡肉好而不及噍殺粗厲滌濫者不合雅頌之聲故也樂書嚴陵方氏曰先王之恥其亂非茍恥而已必有道以道之制雅之聲道之使正制頌之聲道之使公聲者道之所發文者理之所寓聲足樂者樂其道也文足論者論其理也道所以制欲而有節故雖樂而不至於流理所以明義於無窮故可論而不至於息曲者聲之柔若絲是也直者聲之剛若金是也繁者聲之雜若笙是也瘠者聲之純若磬是也廉者聲之清若羽是也肉者聲之濁若宫是也節者聲之制若徵是也奏者聲之作若合是也絲金者樂之音笙磬者樂之器羽宫者樂之聲節奏者樂之文互舉以相備也樂至於此則其教不廢也故以方言之李氏曰夫無中聲則淫樂不可勝聽矣蓋樂者民之所不能免而無中聲以節文之則民德亂矣故聖人於豫則曰作樂崇德所以養其正而間其邪也故制雅頌之聲以和之使其聲和故足以樂而不流其文明故足以論而不息則確乎鄭衛不能拔也夫道則無方也當其應物則有方矣延平周氏曰無放心則無邪氣有邪氣則有放心慶源輔氏曰先王恥其亂與孟子所謂武王恥之之意同道謂宣道其和樂之意中聲之所止故足樂而不流君子於是語於是道古則文足論也不息謂意味深逺言之不能盡也樂易失之放有放心則邪氣應焉新安王氏曰雅頌中聲也聲足樂文足論和也曲直歌之曲折繁瘠廉肉聲之隆殺節奏或作或止是故樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之內父子兄弟同聽之則莫不和親故樂者審一以定和比物以飾節節奏合以成文所以合和父子君臣附親萬民也是先王立樂之方也鄭氏曰審一審其人聲也比物謂雜金革土匏之屬也以成文五聲八音克諧相應和孔氏曰此一經覆說聖王立樂之事君臣主敬鄉里主順父子主親人聲雖一而所感有喜怒哀樂之殊當須詳審其聲以定調和之曲比八音之物以飾音曲之節或奏作或節止以成其五聲之文合和父子君臣者上文和敬和親是也附親萬民上文和順是也張氏曰正樂流行故隨所在而各盡其善宗廟有君臣所主在和敬鄉里有長幼所主在和順閨門有父子所主在和親前章使親疏貴賤長幼男女之理皆形見於樂是也長樂陳氏曰宗廟主乎敬族長鄉里主乎順閨門主乎親樂之主乎敬者聽之莫不敬主乎順者聽之莫不順主乎親者聽之莫不親猶道之所在仁者見之之謂仁知者見之之謂知又樂書曰樂合生氣之和道五常之行使主敬主親主順之道皆會歸於和父子兄弟和親於閨門樂之化行乎一家也長幼和順於族長鄉里樂之化行乎鄉遂也君臣上下和敬於宗廟樂之化行乎一國與天下也古樂之發修身及家平均天下如此而已五聲所以為一者以宫為之君也十二律所以為一者以黃鍾為之本也故審宫聲則五聲之和定審黃鍾則十二律之和定審一以定和也金石以動之絲竹以行之革木以節之比物以飾節也節以止樂而奏以作之一節一奏合雜以成文采節奏合而成文也指八音而言謂之比音指八音之物而言謂之比物其實一也審一以定和者樂之情比物以飾節者樂之節節奏合而成文者樂之文三者備矣在閨門之內所以合和父子也在宗廟之中所以合和君臣也在族長鄉里之中所以附親萬民也嚴陵方氏曰樂之為樂則一而聽之者各有所主故其感皆不同至於所以為和則一而已故每以和言之君臣言在宗廟而不及朝廷則以君臣主敬而宗廟尤所宜故也且孔子在宗廟朝廷便便言唯謹爾在宗廟朝廷之禮固亦同矣族者親之所聚長者衆之所從鄉里與祭義言一命齒于鄉里同族長則指其人鄉里則指其地也特於族長鄉里言長幼則以鄉黨莫如齒故也老子曰天得一以清地得一以寧則知樂亦得一以和也且樂為天地之和天地之和同出於一氣而已樂之道在乎審其一而後其和可定也樂有自然之節比物則因以為之飾爾合言道和言情離者可使附疏者可使親也慶源輔氏曰前言制雅頌之聲以道其樂意耳此又言先王作樂之法一者萬物之所不能外也在禮則為節在樂則為和故審一以定和此先王制樂之本意也豈徒悅人之耳目哉金華應氏曰一者心也心一而所應者不一精審密察於衆理之中以求其當所謂惟精惟一也守一以凝定其和雜比以顯飾其節及其成文則文可以合和其至親至嚴之大倫附親其至疏至衆之萬民蓋樂發於吾心而感於人心無二理也廬陵胡氏曰樂之為樂則一而感各有不同其和則一而已故每以和言之先王作樂本之情性稽之度數審其用於未發之初純一而不雜故定其情於中節之際和順而不乖近取諸身而審一以定和者樂之情也逺取諸物而比物以飾節者樂之文也情文俱盡而節奏俱合則樂之本末具矣故內則和父子外則和君臣達則和萬民先王立樂之方同此和而已故曰保合太和故聽其雅頌之聲志意得廣焉執其干戚習其俯仰詘伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免也鄭氏曰綴表也所以表行列也詩云荷戈與綴兆域也舞者進退所至也要猶㑹也命教也紀總要之名也孔氏曰此一經論先王制樂得天地之和則感動人心使之和善也雅以施正道頌以贊成功聽之則淫邪不入故志意得廣也干戚是威儀之容俯仰詘伸謂動止以禮故容貌得莊敬也依其綴兆故行列得正隨其節奏故進退得齊樂感天地之氣是天地之教命樂和律吕之聲是中和紀綱總要之所名人感天地而生又感隂陽之氣樂既合天地之命協中和之紀感動於人是人情不能自免也今案詩荷戈與祋與鄭氏不同鄭氏所見齊魯韓詩本不同也張氏曰前云先王制之聲音形於動靜故此證其事雅頌是發於聲音執其干戚是形於動靜長樂陳氏曰季札觀周樂於魯歌大雅曰廣哉熙熙乎歌頌曰至矣哉廣而不宣師乙言樂於賜謂廣大而靜者宜歌大雅寬而靜者宜歌頌是雅為王政之興頌為王功之成其體未嘗不廣也况聽其聲乎蓋內之為志意外之為容貌陳之為行列變之為進退聽雅頌之聲則知反情以和志故志意得廣焉執其干戚習其俯仰詘伸則不至慢易以犯節故容貌得莊焉行其綴兆要其節奏則回邪曲直各歸其分故行列得正焉進退得齊焉然雅頌之聲詩之歌也干戚舞之器也俯仰詘伸舞之容也綴兆舞之位也節奏聲之飾也言雅頌則風舉矣言干戚則羽籥舉矣言俯仰詘伸則疾舒舉矣言綴兆則逺短舉矣言節奏則文采舉矣樂出於虛藏於無天地麗於實形於有實必受命於虛有必受命於無此樂所以能生天地非天地所生也萬物非天地不生天地非樂不生則樂者天地之受命也今夫始天始地者太始也樂有以著之以至六變而天神降八變而地示出自非能命天地而不命於天地孰能與此喜怒哀樂未發而為中者性也天下之大本存焉發皆中節而為和者情也天下之達道存焉先王作樂以情性為綱以中和為紀無中以紀之則蕩而至於過無和以紀之則異而至於乖古之神瞽考中聲而量之以制度所道者中德所咏者中聲使夫聽音不愆以合神人以中紀之也合生氣之和道五常之行使夫陽而不散隂而不密剛氣不怒柔氣不懾以和紀之也然樂之道推而上之以觀其妙斯為天地之命推而下之以觀其徼斯為中和之紀以樂為中和之紀則禮者中之紀而已與易於乾言變化於坤特言化同意樂書嚴陵方氏曰人之志意公正則廣私邪則狹故聽其雅頌之聲志意得廣焉執其干戚習其俯仰詘伸皆所以形於容貌者以其所執所習如彼故容貌所得如此綴兆者舞之營域行者行止有序之謂列者多少有制之謂節奏者樂之終始故要其節奏進退得齊焉進言樂作而進退言樂闋而退言總而㑹之也行列欲止於一故言正進退患其不齊也故言齊天地之命者言道天地之化於萬物使小大長短各有所受之也命既立矣然後得天地之正氣而為中得天地之沖氣而為和中者性也和者情也紀者正物而有常言天下之性情莫不取正於樂以之為常也命也性也情也皆繫於此又豈人情之所能免乎以人情為言者其以動而發於聲尤所不能免故也馬氏曰天地之所以命於人者中和而已傳曰生者天地之委和又曰人受天地之中而生則是樂者以中為體以和為用而中和之要蓋不出於此也延平周氏曰樂能官天地而天地不得之則或幾乎息故曰天地之命又能道中和而中和得之則各有條理故曰中和之紀雖大而命天地小而紀中和而其歸於樂則一而已所謂樂者人情之所不能免也慶源輔氏曰此後世之士為此而必恧焉反以為愧也豈知先王制此所以莊其容貌焉故後人之臨善而不勇者樂之教不行焉故也樂者天地之命非人之所能為也然人情之所不能免也中和於是而總要焉人情之所不能免焉此所以為天地之命也橫渠張氏曰天地之命樂之道也中和之紀樂之制也夫樂者先王之所以飾喜也軍旅鈇鉞者先王之所以飾怒也故先王之喜怒皆得其儕焉喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣鄭氏曰儕猶輩類天子之於天下喜怒節之以禮樂則兆民和從而畏敬之禮樂王者所常興則盛矣孔氏曰此一經覆說樂道之盛樂以飾喜非喜不樂是喜得其儕類鈇鉞飾怒非怒不可橫施鈇鉞是怒得其儕類非善不喜故天下和之非惡不怒故暴亂者畏之上經論樂章末兼云禮者以此一章總兼禮樂故以禮樂結之長樂陳氏曰藝有六樂居一焉禮有五軍居一焉樂由陽來而喜者陽也禮由隂作而怒者隂也以飾喜為樂則飾怒為禮矣以鈇鉞為禮之器則鍾鼓為樂之器矣先王以樂飾喜樂以天下者也故天下安治者莫不和之以為樂焉以禮飾怒憂以天下者也故天下暴亂者莫不畏之以為威焉孟子言今王鼓樂於此百姓聞之舉欣欣然有喜色所謂樂所以飾喜也繼之相告曰吾王庶幾無疾病與所謂喜則天下和之也言王赫斯怒爰整其旅所謂軍旅鈇鉞所以飾怒也繼之一怒而安天下之民所謂怒則暴亂者畏之也先王之於喜怒未嘗容私皆得其儕焉夫豈為道之過哉由是知先王之道禮樂正其盛者也有子謂先王之道以禮之用和為貴則兼樂言之有不為盛者乎喜怒得其儕則喜怒必以其類矣與春秋傳謂喜怒以類同意樂書嚴陵方氏曰在顯之謂飾喜心生於內則隱矣必播於聲音節奏然後顯其所以喜故曰飾喜怒心生於內亦隱矣必用於軍旅鈇鉞然後顯其所以怒故曰飾怒喜合乎樂則非作好也必天下所同喜怒合乎禮則非作惡也必天下所同怒和言天下畏言暴亂者暴亂且畏則天下無所不畏矣此言禮樂則知前所言軍旅鈇鉞者對樂而言禮也五禮特言軍者對喜而言怒故也馬氏曰以樂飾喜而不以為汰者以喜當其類也以軍旅鈇鉞飾怒而不以為暴者以怒當其類也喜而當其類則天下和之怒而當其類則暴亂者畏之先王治天下之道非一端可盡而其大要則在於禮樂故先王之道禮樂可謂盛矣然上言禮樂而此則言樂而繼以軍旅鈇鉞者蓋禮者所以揖讓而軍旅鈇鉞者所以征誅也揖讓征誅皆謂之樂也荀子曰出所以征誅則莫不聽從入所以揖讓則莫不從服揖讓征誅其義一也則揖讓征誅皆謂之樂而禮在其中矣山隂陸氏曰和讀去聲子贛見師乙而問焉曰賜聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉愛者宜歌商溫良而能斷者宜歌齊夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也寬而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛鄭氏曰子贛孔子弟子師樂官也乙名聲歌各有宜氣順性也賤工樂人稱工執猶處也此文換簡失其次寬而靜宜在上愛者宜歌商宜承此下行讀云肆直而慈愛者宜歌商商宋詩也愛或為哀直已而陳德各因其德歌所宜育生也孔氏曰自此至問樂依别録是師乙之章凡聲歌各遂人性所宜子贛令師乙觀己之性宜聽何歌也師乙不敢定其所宜故請誦所聞之詩寬謂德量寬大靜謂安靜柔謂和柔正謂正直頌其成功德澤𢎞厚故性之寬柔靜正者宜歌之廣大而靜謂志意宏大而安靜疏達而信謂疏朗通達而誠信大雅者歌其大正故廣大疏達者宜歌之恭謂以禮自持儉謂以約自處好禮則動不越法小雅者小正也故恭儉而好禮者宜歌之正直而靜退廉約而謙恭故宜歌諸侯之風商者五帝之遺聲五帝道大故肆直慈愛者宜歌之齊三代之遺聲三代干戚所起裁斷是非故溫良能斷者宜歌之歌者當直己身而陳論其德已有此德則宜此歌也歌者運動己德而天地應四時和星辰理萬物育和謂隂陽順理謂不悖逆育謂羣生得所鄭注商宋詩者以下文商人識之齊人識之皆據其代宋是商後故知此商謂宋人所歌之詩也長樂陳氏曰人之生也直而德則直心而行之歌以發德而德則直已而陳之直己則循理而無所詘陳德則因性而無所隱然則歌之所發豈自外至哉人之歌也與隂陽相為流通物象相為感應故聲和則形和形和則氣和氣和則象和象和則物和動已而天地應焉其形和也四時和焉其氣和也星辰理焉其象和也萬物育焉其物和也三才相通而有感有感斯應矣四時變化而不乖不乖斯和矣星辰各有度數而不亂能勿理乎萬物各有成理而自遂能勿育乎中庸曰寬裕溫柔足以有容齊莊中正足以有敬是寬柔者君子之容德靜正者君子之敬德頌者美盛德之形容故寬而靜柔而正者宜歌之雅以政而後成政以德而後善君子之德有小大廣大嫌於離靜以即動疏達嫌於去信以近誣大雅政之大者也故廣大而靜疏達而信者宜歌之恭儉而知好禮則恭而能安不失之太遜儉而能廣不失之太陋小雅政之小者也故恭儉而好禮者宜歌之洪範之論君德以正直為始論王道以正直為終正直則不倚於剛亦不倚於柔一適乎中而已濟之以靜則其正足以有守其直足以有行廉而濟之以謙則廉不失之隘謙不失之輕風出於德性繫一人之本者也故正直而靜廉而謙者宜歌之以書之九德考之寬而靜則寬而栗也柔而正則柔而立也廣大而靜廉而謙則簡而廉也疏達而信則剛而塞也恭儉則願而恭也好禮則亂而敬也正直而靜則直而溫也肆直而慈愛者宜歌商溫良而能斷者宜歌齊說見後樂書嚴陵方氏曰人之德性不同而歌之為體亦不一故德性之小者不足以歌大大者不可以歌小師乙所以誦其所聞而使之自執焉夫寬者容德也柔者順德也容或失之雜故濟之以靜順或失之隨故持之以正此皆德之盛者故宜歌頌廣大者鎮之以靜疏達者守之以信此皆政之大者故宜歌大雅恭則不侮儉則不奪然恭而無禮或失之勞儉不中禮或失之陋勞則過乎禮陋則不及乎禮故必好禮以制中焉此政之小者故宜歌小雅正直而守之以靜廉而有分際者於物或有所絶故守之以謙若是則可以動化一國故宜歌風肆直所以為德慈愛所以為仁溫則將至於懦而無立良則將至於寬而無制故又貴乎能斷斷則在已有立在物有制矣故宜歌齊蓋溫良所以為仁能斷所以為義也歌出於志之所之非可以致曲也亦直已而已曲則隱直則陳故必以陳言之仲尼燕居曰升歌清廟示德也非陳而何夫歌不過發乎聲聲不過發乎氣雖千變萬化無非一氣之所為也故通乎天地者一氣之升降爾行乎四時者一氣之往來爾見乎星辰者一氣之成象爾散乎萬物者一氣之成形爾則歌之動已也以致天地之應四時之和星辰之理萬物之育固其宜也山隂陸氏曰此一節疑以脫亂因失先後之序蓋其文宜曰夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉寬而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊內愛一字衍大雅蓋文王之三小雅蓋鹿鳴之三頌蓋清廟風蓋周南關睢葛覃卷耳召南鵲巢采蘩采蘋故季札觀樂為之歌周南召南曰美哉始基之矣所謂正直而靜廉而謙者宜歌風者為此歟為之歌小雅曰美哉思而不二怨而不言所謂恭儉而好禮者宜歌小雅者為此歟為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎所謂廣大而靜疏達而信者宜歌大雅者為此歟為之歌頌曰至矣哉直而不倨曲而不屈處而不底行而不流所謂寬而靜柔而正者宜歌頌者為此歟金華邵氏曰人之一身凡天地四時星辰萬物之理莫不畢備今也直已而陳德於歌宜其或應或和或理或育有不期然而然者非歌能使之也德寓於歌聞其歌而感之也直已者無所掩覆致直而行之也金華應氏曰師乙賤工而誦其所聞有非後世儒者所及蓋先王之澤未散人多習聞聲樂之理及夫子正樂而感發益深不但學者有所悟解而工師之職亦皆講肄而精通之故師摯之始關雎之亂洋洋乎盈耳而師乙之對聲歌亦可觀也其後樂益僭亂而繚干師摯之徒皆逃而去之入於河海豈偶然哉李氏曰歌者樂語也以樂語為之文者必以樂德為之本中和祗庸孝友所謂樂德也夫不過之謂中不亢之謂和祗者敬之見於體庸者有常而能變孝者仁之本友者義之本也夫寬柔者和德也靜正者中德也寬而靜柔而正中正之至也廣大者未足乎寬疏達者未足乎柔信者未足乎正寬大而靜疏達而信中和之次也恭儉而好禮則祗也正直而靜者中而未足乎和也廉而謙者和而未足乎中也肆直能斷者義也慈愛溫良者仁也肆直而慈愛者本乎義而濟之以仁者也溫良而能斷者本乎仁而濟之以義者也頌者美盛德之形容以其成功告於神明者也故盡中和之德者宜歌之大雅者言天下之事形四方之風之大者故有中和之德者宜歌之小雅言天下之事形四方之風之小者故祗庸者宜歌之風言一國之事繫一人之本者故或有中德而未足乎和或有和德而未足乎中者宜歌之夫人之情其歡欣悲傷嗟怨皆不能隱於樂非直已歟其文止於禮義其言明於法度其理通乎性命非陳德歟夫發於至誠者於詩為近故大足以動有形之天地幽足以感無迹之鬼神商之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而讓臨事而屢斷勇也見利而讓義也有勇有義非歌孰能保此鄭氏曰屢數也數斷事以其肆直也見利而讓以其溫良能斷也斷猶決也保猶安也知也孔氏曰五帝道備三王德盛但遺聲於後代肆直而慈愛溫良而能斷者宜聽其歌聲非謂能行其道德也以其肆直慈愛故臨危疑之事數能斷割是勇也以其溫良能斷故見利不私於己是有義也有勇有義之人非歌聲辨之誰能知哉長樂陳氏曰五帝之聲不得而見所可見於書者不過詩言志歌永言而已商人識之蓋不得其詳所得而歌之者不過五帝之遺聲而已商之聲其體肆而不拘直而不屈其用則恤下以為慈利物以為愛則肆直義也慈愛仁也仁之實盡於事親義之實盡於事兄樂也者節文仁義而已然則歌商之音非肆直而慈愛者豈所宜哉三代得天下以仁未嘗不始於溫良行仁以義未嘗不始於能斷故湯之代虐以寬溫良也布昭聖武能斷也言湯如此則夏周可知故明乎商之音者臨事而屢斷勇以行之故也明乎齊之音者見利而讓義以守之故也勇者正直之德義者剛克之德歌者直已而陳德者也非歌孰能保此勿失乎周人兼用六代之樂而正考甫得商頌於周之太師得非五帝之遺聲乎周之禮樂盡在於魯而魯太師摰適齊得非三代之遺聲乎子贛達於政非不能臨事而屢斷也纍於貨殖未必能見利而遜也然則子贛所宜歌亦可知矣樂書嚴陵方氏曰明者不為物蔽之謂肆直慈愛而不蔽於慈愛是明乎商之音者也故臨事而屢斷以慈愛之蔽在於無斷故也溫良能斷而不蔽於能斷是明乎齊之音者也故見利而讓以能斷之蔽在於無讓故也唯有勇乃能斷事唯有義乃能讓利歌五帝之遺聲則可以保其勇歌三代之遺聲則可以保其義故曰有勇有義非歌孰能保此蓋勇義人之所有非明乎歌之音則不足以保全之故也金華應氏曰奮決明厲者商治之規摹故明乎其音則能有決而不亂舒遲而臯緩者齊俗之氣象故明乎其音則見利而遜延平周氏曰有勇也非歌五帝之遺聲則孰能保之有義也非歌三王之遺聲則孰能保之是人之於歌也非茍從其所宜而已又將有以成就於己也李氏曰歌者非徒直已而陳德也又足以修人之所未足故肆直而慈愛宜歌商而明乎商之音則臨事而屢斷溫良能斷者宜歌齊而明乎齊之音則見利而能遜此古之人所以成於樂也故歌者上如抗下如隊曲如折止如槀木倨中矩句中鉤纍纍乎端如貫珠鄭氏曰言歌聲之著動人心之審如有此事孔氏曰此論感動人心形狀如此諸事歌聲上響感動人意使之如抗舉也音聲下響感動人意如似隊落也音聲回曲感動人心如似方折音聲止靜感動人心如枯槀之木止而不動音聲雅曲感動人心如中於矩音聲大屈曲感動人心如中於鉤音聲之狀纍纍乎感動人心如貫珠言音聲感動令人心想如此嚴陵方氏曰抗言聲之發揚隊言聲之重濁曲言其回轉而齊也止言其闋後而定也倨則不動不動者方之體故中矩言其聲之常如此句則不直不直者曲之體故中鉤言其聲之變如此纍纍乎言其聲相繫屬端如貫珠言其終始兩端相貫而各有成也故歌之為言也長言之也說之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也子貢問樂鄭氏曰長言之引其聲也嗟歎和續之也不知手之舞之足之蹈之歡之至也子貢問樂上下同美之也孔氏曰上論歌之形狀此論歌之終始相生至於舞蹈歌者引液其聲使長也說之故言之此又覆說歌意有可說之事來感已情故言之直言之不足故長言之長言之不足故嗟歎之美而和續之雖復嗟歎情猶未滿故不覺揚手而舞之舉足以蹈之也嚴陵方氏曰此先長言而後嗟歎詩則先嗟歎而後永歌者言先嗟歎則以嗟歎而唱之也後嗟歎則嗟歎而和之也彼以詩為主而詩者樂之始故以唱為序此以樂為主而樂者詩之終故以和為序非其不同意各有所主也終言子貢問樂蓋題上事也與文王世子言周公踐阼同義山隂陸氏曰目下事也宜在子贛見師乙而問焉之上金華邵氏曰歌之為義長其言之謂也方其人有所悅乎中則言之言不足以盡其悅故長言之至於長言不足而聲嗟氣歎嗟歎不足而手舞足蹈樂至於此蓋有非歌之所能盡者故終之曰子貢問樂記者亦不能容言於其間猶曰可問而不可言也夫可問而不可言此豈羽籥干戚鍾鼓管磬之謂乎中庸之終曰上天之載無聲無臭至矣與子貢問樂同意或者以為總結上文問樂之義非也禮記集說卷一百
