body:
  text: 禮記集說卷八十九宋衛湜撰大學之教也時教必有正業退息必有居鄭氏曰有居有常居也孔氏曰自此至之謂乎一節論教學之道必當優柔寬緩不假急速遊息孫順其學乃成也時謂時習之正業謂先王正典非諸子百家也學者退息必有常居之處各與其友間居得相咨決不可雜濫也長樂陳氏曰大學之教也時所以順天道教必有正業退息必有居所以盡人道蓋安弦以夏安詩以冬安禮以秋此所謂時也教人弦詩禮學之正而不以異端此所謂正業也退息必有居教者之事遊焉息焉學者之事山隂陸氏曰正業言時教之所教也若春誦夏弦春秋教以禮樂冬夏教以詩書是也居學言退息之所學也若不學操縵不能安弦不學博依不能安詩是也新安朱氏曰今案上句鄭注孔疏讀時字居字句絶而學字自為一句恐非文意當以也字學字為句絶時教如春夏禮樂秋冬詩書之類居學謂居其所學如易之言居業蓋常習所習如下文操縵博依興藝藏修息遊之類所以學者能安其學而信其道講義曰時教謂時時教之也道欲其熟習故學者貴於時習而教者亦貴於時教正業如揚雄曰君子正而不他正與他之閒不可不謹其所向故教者必以先王之正道退息必有居非謂有所居止而已也必有常居焉所居有常乃教者所以教學者所以學古之人坐則如尸立則如齊几杖有銘盤盂有戒無非學也豈以退息而姑置之哉延平周氏曰退息必有居故身安而心廣學不學操縵不能安弦不學博依不能安詩不學雜服不能安禮不興其藝不能樂學鄭氏曰操縵雜弄也博依廣譬喻也依或為衣雜服冕服皮辨之屬雜或為雅興之言喜也歆也藝謂禮樂射御書數孔氏曰此以下並正業積漸之事學操縵教樂也樂主和故在前弦琴瑟之屬人將學琴瑟若不先學調弦雜弄則手指不便不能安正其弦故先學雜弄然後音曲乃成也學博依教詩法也詩是樂歌故次樂依謂依倚譬喻也雜服自衮而下禮經正體在於服章以表貴賤不明雜服則心不能安善於禮也不興其藝此總結上三事並先從小起義也藝謂操縵博依六藝之等若欲學詩書正典意不歆喜其雜藝則不能耽玩樂於所學之正道也橫渠張氏曰古之教人先使有以樂之者如操縵博依如此則心樂樂則道義生今無此以致樂専義理自得以為樂然學者太苦思不從容第恐進鋭退速苦其難而不知其益莫能安樂也服事也雜服灑掃應對投壺沃盥細碎之事興藝樂學興起也藝禮樂之文如琴瑟笙磬古人皆能之以中制節射御亦合於禮樂之文如不失其馳舍矢如破騶虞和鸞動必相應也書數其用雖小但施於簡策然莫不出于學故人有倦時又用此以遊其志所以使樂學也長樂陳氏曰不學操縵不能安弦以至不學雜服不能安禮學者之於業也不興其藝不能樂學教者之於人也縵之為樂鍾師之所職磬師教而奏之所謂操縵則燕樂而已此固音之所存而易學者也凡物雜為文色雜為采古者冠而後服備未冠則冠衣不純素所服采衣之雜服而已此固禮之所存而易學者也安弦而後安詩樂學誦詩之意也安詩而後安禮興詩立禮之意也䕫教胄子必始於樂孔子語學之序則成於樂內則就外傅必始於書計孔子述志道之序則終於游藝豈非樂與藝固學之終始歟嚴陵方氏曰操之而急縱之而緩者操縵之謂也弦之理亦若是而已依則依物之理以為言焉多識於鳥獸草木之名則博依之謂也詩之理亦若是而已服雖雜而繁亦君子之所不憚焉以服亦無非理也藝雖成而下亦君子之所不廢焉以藝亦無非學也山隂陸氏曰操縵非弦之正事博依非詩之正事依讀如字書曰聲依永新安朱氏曰理㑹得雜服則於禮亦思過半矣且如冕服是天子祭服皮辨是天子朝服諸侯助祭於天子則服冕服自祭於其廟則服𤣥冕大夫助祭于諸侯則服𤣥冕自祭于其廟則服皮辨又如天子常朝則服皮辨朔旦則服𤣥冕諸侯常朝則服𤣥端朔旦則服皮辨大夫私朝亦服𤣥端夕深衣士則𤣥端以祭上士𤣥裳中士黃裳下士雜裳庶人深衣此所謂雜服也慶源輔氏曰博依如陸氏之說學詩然後能多識鳥獸草木之名謂廣譬喻亦非也古人因詩而歌使協聲律而歌有髙下清濁合于宫商則為聲聲協律吕則為律蓋古之學詩者先學歌詩使其歌依於聲律故云博依博謂有其聲者清濁髙下不一也先能歌然後能安之而求其義服事也雜服謂凡禮之事如三千三百之儀是也不學操縵以下皆言藝也藝謂禮樂射御書數上言禮樂矣故下言藝以總射御書數也詩亦樂也故因樂言之不興其藝不能樂學故學者先教以六藝也興如舊音故君子之於學也藏焉修焉息焉遊焉夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也兊命曰敬孫務時敏厥修乃來其此之謂乎鄭氏曰藏謂懷抱之修習也息謂作勞休止之息遊謂閒暇無事之遊敬孫敬道孫業也敏疾也厥其也學者務及時而疾其所修之業乃來孔氏曰故因上起下之辭君子之為學恆使業不雜身若能藏修息遊無時暫替乃能安其所習學業學業既深知由于師故親愛師既能親師故樂重同志之友說信已道一云安學故乃親師樂友後乃信道輔即友也離猶違也心信已道不復虛妄假令違離師友亦強立不反也乃來謂所學得成也橫渠張氏曰藏退也修則思以得之日知其所不知也息休止也遊遊玩也接物倦則存心講習以不忘其故此即溫故而知新也大要未嘗須臾忘也敬孫務時敏孫其志于仁則得仁孫其志于義則得義唯其敏而已長樂陳氏曰君子之於學也將以致道沒身不怠而已故藏焉以藴其所已知月無忘其所能是也修焉以習其所未知日知其所亡是也息焉則所次必於是若倪寬帶經而鋤休息輒誦是也遊焉則所造必於是若孔子出遊於觀之上有志於三代之英是也君子之於學如此故能安其學而親其師樂其友而信其道矣今夫美吾身者學也成吾性者道也模範我者師也切磋我者友也學待師而後正性不安學則疾其師而不親矣道待友而後明情不樂友則疑其道而不信矣安學而親師則外有正以行樂友而信道則中有主以正若然則雖離師輔亦確乎強立而不反也延平周氏曰藏者言其學之既得者也修者言其學之未得者也息對遊則息為暫遊為久言安學而親師則知信道而樂友言樂友而信道則知親師而安學有所藏有所修有所息有所遊則其所入者深故雖離師輔亦不反也輔也者蓋友有佑助之意嚴陵方氏曰藏焉修焉所以存其心息焉遊焉所以遊其志藏則藏於其心修則修於其身務學不求師則道孰為之𫝊獨學而無友則道孰為之輔是故雖安其學必親其師必樂其友既樂其友然後能信其道其始也親師取友以至於此其終也雖離師輔亦若是而已孔子曰以友輔仁廬陵胡氏曰學者君子之所以藏身猶魚之藏於水不可離也修猶竹之修日加益而不知也息謂居之安也遊若遊心於淡之遊永嘉戴氏曰君子為學當以進德修業為本今修居其一而藏遊息居其三豈教人為怠乎蓋古之教者教以心後之教者教以言古之學者養其心後之學者苦其心然則學問之道無他求其放心而已既求之則操之存之養之制之至於宅心正大而後至於從心不踰豈若後世學者博而寡要勞而少功苦其志慮耗其血氣非徒無益而喪失其本心者多矣親師取友此學者急務師友之間固有實不相知而外徇其名者無所得於其師則齟齬而情實踈無所得於其友則疑忌而意不合此非學者之過抑師友亦有過焉蓋涵養之功不加而督迫之意日至漸漬之實不孚而責善之意太甚則彼有不安而已爾有不樂而已爾況望其能進德乎涵養其心術之微使之漸漬習熟安於義理無所矯揉則無有師保自進於善雖他日離羣索居不變其初大抵物之矯揉者力進則返唯自然馴習者久而不變一段與上文意似不合然古人援詩書為證略取其大意而已敬孫則心有所守無欲速之患時敏則進修及時無自怠之失此所以厥修乃來要之藏修遊息四者不同其為修業則一也慶源輔氏曰藏猶詩所云中心藏之修謂以身修之也藏之則不須㬰而忘修之則不頃刻而廢息亦在於斯遊亦在於斯猶言造次必於是顛沛必於是也夫然故能自小成而進於大成安其學而親其師樂其友而信其道小成也雖離師輔而不反大成也樂謂心有所愛羡之意若子貢所謂賜也何敢望回安其學故親其師樂其友故信其道如七十子之服孔子所謂安其學而親其師曽子曰昔者吾友嘗從事於斯矣所謂樂其友而信其道變友言輔欲見不假友之輔助而不反也敬孫務時敏謂時教必有正業退息必有居學以下厥修乃來謂安其學而親其師樂其友而信其道以下金華應氏曰深考自大學之教至此章則自比年入學至九年大成其所學大略可見蓋時教之正業即所習者經也至于親其師樂其友乃所謂樂羣親師也至于知類通達則雖離師輔而強立不反矣今之教者呻其占畢多其訊言及於數進而不顧其安使人不由其誠教人不盡其材其施之也悖其求之也佛夫然故隱其學而疾其師苦其難而不知其益也雖終其業其去之必速教之不刑其此之由乎鄭氏曰呻吟也占視也簡謂之畢訊猶問也言今之師自不曉經之義但吟誦其所視簡之文多其難問也呻或為慕訊或為訾言及于數謂發言出說不首其義動云有所法象而已不顧其安謂務其所誦多不惟其未曉也不由其誠由用也使學者誦之而為之說不用其誠也不盡其材謂師有所隱施之也悖求之也佛謂教者言非則學者失問也隱不稱揚也不知其益若無益然速疾也學不心解則忘之易刑猶成也孔氏曰此一節論教者違法學者所以不成多其訊者不曉義理假作問難詐了多疑也進謂務欲前進誦習使多而不曽反顧其義理之安誠忠誠也使學者誦文而已為之說義心皆不曉是不用己之忠誠也教人不盡其材謂隱惜其所知也教者有上五者之短故施教于人皆違背其理其學者求之則又違戾義意佛戾也師教既悖受者又違故弟子隱其師之學而憎疾其師也師說既不曉了故弟子受之苦其難解不自知其有益也雖得終竟其業其去之必速疾師教弟子不成由此上諸事嚴陵方氏曰以言問之之謂訊道之本寓諸理其末見乎數言及于數非所謂教之大倫矣進而不顧其安非所謂安其學矣使人不由其誠非所謂信其道矣教人不盡其材非所謂強而弗抑矣施之也悖非所謂不陵節矣求之也佛非所謂孫其業矣隱其學而疾其師非所謂師逸而功倍又從而庸之矣隱以言其學之不明也苦其難而不知其益非所謂和易以思矣其去之必速非所謂強立而不反矣新安朱氏曰數謂形名度數言及于數欲以是窮學者之未知非求其本也注疏法象之說恐非若小學之教蓋將使之循習乎灑掃應對之節與今之教言及于數者其意不同隱其學謂以其學為幽隱而難知如曰二三子以我為隱之意延平周氏曰孔子曰求也退故進之由也兼人故退之蓋進之必顧其所安而使之進也使漆雕開仕曰吾斯之未能信孔子說蓋使之必由其誠而不強其中心之所不欲也於門人問仁問孝之類其答皆不同蓋教之必盡其材故所答雖有難易而未嘗不隨其材之大小也後之教人者反此故曰其施之也悖其求之也佛而其教之者卒不見其成故曰隱其學而疾其師苦其難而不知其益雖終其業而去之必速慶源輔氏曰言及于數所謂記問之師也呻其占畢所以形容其貌多其訊謂無統類強聒而泛語之訊猶墓門詩所謂歌以訊之之訊毛氏曰訊告也言及于數則愈下矣此上言在己之失此下言教人之失盈科而後進可也如是然後居之安而資之深若不顧其安否而強揠以進此學者所以隱其學而苦其難也強揠以進是使人不由其誠未及安于此而又進之是教人不盡其材此二句所以終上句之義也材者可為之資施與求皆為師之事施謂施己之教求謂求學者之益隱不安之意柏舟之詩注云隱痛也痛則不安矣安其學故親其師則隱其學而疾其師宜矣所謂雖得之必失之也強聒而教之強揠而進之則有終其業者矣然其忘也可立而待也刑猶儀刑之刑教之不刑猶言教不足為人之儀刑也橫渠張氏曰人未安之又進之未喻之又告之徒使人生此節目不盡其材不顧其安不由其誠皆是施之妄也教人至難必盡人之材乃不誤人觀可及處然後告之聖人之明直若庖丁之解牛皆知其隙刃投餘地無全牛矣故使人必由其誠教人必盡其材人之材足以有為但以其不由于誠則不盡其材若勉率而為之則豈有由其誠者哉大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也鄭氏曰未發情欲未生謂年十五時可謂年二十成人時不陵節謂不教長者才者以小教幼者鈍者以大也施猶教也孫順也相觀而善謂不並問則教者思専也摩相切磋也興起也孔氏曰此一節論教得理則教興也十五以前情欲未發則用意専一學業易入逆防于未發之前故云豫也二十德業已成時可受教故云時也陵猶越也不陵節謂年才所堪不越其節分而教之所謂孫順也善猶解也長樂陳氏曰邪不間則誠有所不存回不釋則美有所不增故禁于未發之謂豫所以救失于未然之前當其可之謂時所以長善于可教之際故當其可以學之之時而達之可以習之之業易所謂進德修業欲及時也因時而不違循理而不逆不責其所不及不強其所不能優而柔之使自求之厭而飫之使自趣之豈不為孫乎與夫驟而語之喧德蕩志者異矣教者不陵節而施則學者見賢思齊見善相示不必親相與言而同歸于善矣豈不為摩乎與夫朋友已譛不胥以榖者異矣以內則推之七年男女不同席不共食十五出就外傅居宿於外禁於未發之意也八年始教之孫以至二十敦行孝弟當其可之意也學樂而後射御射御而後學禮舞勺而後舞象舞象而後舞夏不陵節而施之意也三十博學無方孫友視志相觀而善之意也教之所由興本諸此而已嚴陵方氏曰夫既發而後禁則為無及矣未發而先禁乃為有備幼子常視毋誑亦可謂之豫矣未可以教而教則欲速而不達可以教而不教則雖悔而不可追若十年學書計十三年舞勺成童舞象則可謂之時矣不陵節而施則理順而不悖故謂之孫若孔子言可與共學未可與適道可與立未可與權則可謂之孫矣以此之善而見彼之不善以彼之不善而見此之善所謂相觀也有見于上則知善之可慕有見于下則知不善之可戒荀子所謂見善翛然必以自存見不善愀然必以自省則可謂之摩矣夫既有以防其情又有以成其性既有以因其才又有以輔其仁則教之道盡矣故曰所由興也廬陵胡氏曰易蒙卦初六發蒙則知未發謂童蒙之初也其志不分防之冝早康衡曰謹防其端禁於未然詩𫝊人少而端慤長大無欲十有五而志于學三年通一經三十而五經立此皆學之時不陵節若學詩學禮之次新安朱氏曰禁於未發但謂豫為之防其事不一不必皆謂十五時也當其可謂適當其可告之時亦不必以年為斷相觀而善但謂觀人之能而于己有益如以兩物相摩而各得其助也橫渠張氏曰當其可者乘其閒而施之不待彼有求而後教之又曰不待其問當其可告之機即告之如孟子曰時雨化之如天之雨豈待望而後雨但時可雨即雨馬氏曰自灑掃應對進退而進于成人者各有當也當其可之謂時也鯉趨而過庭子曰學詩乎又曰學禮乎不陵節而施之謂孫也切切偲偲相觀而善之謂摩也山隂陸氏曰鄭氏謂可謂二十成人時夫謂之可豈特年二十而已不陵節若孔子所以教諸弟子未有同者也此之謂孫孫師之事也學友之事也鄭氏謂不並問則教者思専夫所謂相觀豈特不並問而已永嘉戴氏曰夫禁於未發之謂豫當其可之謂時疑若不可須㬰緩也然不陵節而施之謂孫相觀而善之謂摩又何其甚緩也夫君子進德修業欲及時也過時非也不及時亦非也乾于九三論君子進德修業其言曰知至至之可與幾也知終終之可與存義也知所終始則無過不及之患矣大抵學者為學始終節目皆有次第先傳後倦不可誣也若先後倒置本末舛逆學雖勤無益也禁於未發不必謂十五時也物欲未深情僞尚淺則猶可禁也當其可不必謂年二十成人時也適當其機因而導之此之謂可孫之為言有優游巽入之意焉摩之為言有切磋動蕩之意焉人知豫與時之為教而不知孫與摩之為教也益深河南程氏曰朋友講習更莫如相觀而善之工夫為多四明沈氏曰時過然後學則勤苦而難成謂失可教之機也聖人朝夕視學者熟矣投機之㑹藏於未形非聖人誰識之也夫子於子貢曾子不待其問不俟其請而遽提其名語以大道之要蓋夫子默察二子見道之機以語之聖人於門弟子所謂如慈母之哺嬰兒如醫師之候病者無不各中其所欲內外感應之妙油然而自得矣慶源輔氏曰凡事豫則立況教人者乎己犯上矣而使之無為亂也己穴坯矣而使之勿為盜也既爭而教之讓既奢而教之節難矣故先王之教人自能言時男唯女俞之不同至七年時同席共食之不可其道當然不可謂之太早計也自子能食食教以右手至吾道一以貫之皆當其可之謂時顔子曰夫子循循然善誘人子曰賜也可與言詩則其所施不陵節而孫可知矣曽子稱顔子有若無實若虛犯而不校是相觀而善也忠告而善道之又其次也強聒而不已祇取辱焉發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也鄭氏曰扞格不勝謂教不能勝其情欲格讀如凍􅏖之􅏖扞堅不可入之貌時過然後學則思放也雜施不孫則小者不逹大者難識學者所惑也獨學無友則不相觀也燕猶䙝也燕辟䙝師之譬喻廢弛也孔氏曰此一節論學不依理教所由廢發謂情欲既生也扞謂拒扞格謂堅強譬如地凍則堅強難入今人謂地堅為􅏖也學時已過則心情放蕩雖欲追悔精明已散徒勤苦四體也雜施謂教雜亂無次越節則大才輕其小業小才苦其大業並是壞亂之法不可復修治也獨學則學識孤偏鄙陋寡有所聞此四條皆反上教之所興也燕朋謂燕䙝朋友不相尊敬則違逆師之教道燕辟謂義理難曉時須假設譬喻而墮學之徒好䙝慢笑之是廢學之道也此六者是廢學之由嚴陵方氏曰情發後禁則扞格言相抵也相抵則禁之有所不勝矣時過後學則勤苦不倦欲有所成難矣雜施而至于亂壞則術業無由而修矣獨學無友則孤而無與陋而不廣所聞寡矣以燕安為朋而至于逆其師之教以燕安為辟而至于廢其學之道若是則教何自而興乎然教之興止于四廢至于六者以見教之為難所由興者常少所由廢者常多也延平周氏曰燕安則有䙝意人之所以為朋者以其同出于師故尊其朋則為順其師而䙝其朋乃為逆其師也學至于難解然後有用于辟故䙝其辟則為廢其學也橫渠張氏曰學者當先與朋友講習然後問師若但多問未嘗自得學者則惰教者則瀆兩失之矣燕朋不敬其朋友而侮慢之必不能從師之教理之然也燕安也䙝也䙝其友則慢其師蓋有漸也安師之辟喻則不能三隅反何學之有燕辟謂燕安樂人之辟喻不能自得是廢學也人當思而得之山隂陸氏曰燕朋逆其師之意燕辟廢其學之方新安朱氏曰燕朋逆其師大戴保傅篇作左右之習反其師朋此燕朋是私䙝之友所謂損者三友之類注說非也燕辟但謂私䙝之談無益于學而反有所害也永嘉戴氏曰發然後禁非不禁也特禁之不得其要爾時過然後學非不學也特學之不得其道爾雜施而不孫則固嘗施之矣施之不得其統猶不施也獨學則固嘗自學矣而無其友猶不學也燕遊私昵之謂也燕朋謂昵于朋比如孺子其朋之朋燕辟謂昵于敖辟如師也辟之辟昵于朋比則人自為學不顧其師昵于敖辟則自以為是不力于學教之不刑由此之故也夫人之患在好為人師而為師最難其道與天地君父並重烏可以易為之夫子曰溫故而知新可以為師矣人而可以為師則中之所存必有大過人者然而非深識學者之病無以成闔闢造化之功故修己者可以尊道知人者可以明道設教者不可以不兼備也慶源輔氏曰發然後禁唯孔子之聖而後可過而能改非子路之勇則不能舍是則未有不扞格者也禁師之事也學弟子事也互言之爾如孔子之教則無不勝如子路之學則無不成先儒之言曰老而好學尤不易得人固不可不自勉學于孔子者雖鄙如樊遲有子夏以啓發之則不患其陋而未達況其餘者相觀而善切切偲偲則其成德達材可知矣朋友攝以威儀而切偲致意則非燕朋矣善教者罕譬而喻孟子之長于譬喻則非燕辟矣燕朋則志有所溺故逆其師之教燕辟則心有所分故廢其學之業子曰羣居終日言不及義好行小慧難矣哉六者雜舉師資之病以見教之廢非獨一人之罪也講義曰前四者教之所由興在師者三在學者一後六者教之所由廢在師者三在學者三君子既知教之所由興又知教之所由廢然後可以為人師也故君子之教喻也道而弗牽強而弗抑開而弗逹道而弗牽則和強而弗抑則易開而弗逹則思和易以思可謂善喻矣鄭氏曰道示之以道塗也抑猶推也開謂發頭角思而得之則深孔氏曰此一節明君子教人方便善誘之事喻猶曉也君子既識學之廢興故教喻有節道猶示也牽謂牽逼令速曉強謂微勸學者不推抑而教之開謂開發大義不事事使之通曉也人茍不曉而牽逼之彼心必生忿恚今但示正道則彼心和而意悟易謂受者和易則易成也思謂用意思念所得必深師能教弟子如此可謂善教喻矣長樂陳氏曰君子之教人道而使之和則所從者樂強而使之易則所進者鋭開而使之思則所得者深此所以為善喻也延平周氏曰知其學之所興者寡所廢者多則可以為人師矣道而弗牽者私淑艾者也強而弗抑者盡其材者也開而弗達者引而不發者也道而弗牽則和而不暴強而弗抑則易而不艱開而弗達則思而不殆君子之教人常欲其所得勝所聞故曰和易以思可謂善喻矣嚴陵方氏曰教主乎道喻形乎言然道未嘗不資乎言言未嘗不本乎道教無非喻也喻無非教也故下有獨言善喻者或獨言善教者君子之教喻也道之使有所尚而弗牽之使從則人有樂學之心強之使有所勉而弗抑之使退則人無難能之病開之使有所入而弗達之使知則人有自得之益以此三道而喻人故曰可謂善喻矣若孔子循循然善誘人所謂道而弗牽也于互鄉童子與其進不與其退所謂強而弗抑也舉一隅不以三隅反則不復所謂開而弗達也永嘉戴氏曰君子之教而以喻為言何哉喻以義理使之心通意悟默然自喻此教之大功也道而弗牽強而弗抑未嘗示人以其難開而弗達亦未嘗示人以其易不示人以難則教者有善誘之功學者有欲罷不能之意不示人以易則教者寓憤悱之機學者有啓發之功大要和易以思使學者不過用其心亦非泛然無所用其心所謂勿正之功蓋如此慶源輔氏曰知所由興則行之知所由廢則防之然後可以為人師道而弗牽則和強而弗抑則易所謂優而柔之使自求之也先儒謂至道懇切固是誠意若迫切不中理則反為不誠教者豈可不知此理哉開謂開其端緒開其端緒則自不能已于致思故可以至于自得之地於教喻而如此謂之善學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也教也者長善而救其失者也鄭氏曰失于多謂才少者失于寡謂才多者失于易謂好問不識者失于止謂好思不問者救其失者多與易則抑之寡與止則進之孔氏曰此一節明教者識學者之心而救其失也才識淺小而所學貪多則終無成是失于多也才識深大而所學務少徒有器調而終成狹局是失于寡少也至道深逺非凡淺所識人不知思求唯好泛濫外問是失之䡖易此學而不思則罔心未曉知不肯咨問唯但自思終不能達此失于自止是思而不學則殆四失由人心之異故也師既識四心之不同乃能隨其失而救之使學者和易以思是長善使學者無此四失是救失唯善教者能之橫渠張氏曰失之多過也失之寡不及也止有兩端無三也凡學者不是過即是不及無過與不及乃是中矣失則多謂才小者卒然不能㑹歸故失于煩多若子夏是也子夏之學自灑掃應對之末至博學而篤志切問而近思其學最實失于寡者以才多易曉達而不精密若子張窺見夫子近上一節不復勤求力行又問善人之道意謂善人可不學而至孔子告以必踐履善人之事乃能至善人之地曽子亦曰堂堂乎張也難與並為仁矣易者䡖易也與寡相近以為易知更不復研究子路事多近之止畫也苦其難而不進冉求事近之學者之四失為人則失多好髙則失寡不察則失易畏難則失止東萊吕氏曰大抵治學者之病須是先知他病處所謂學者四失隨其氣禀厚薄清濁判斷不出四端或失則多才有餘者或失則寡才不足者或失則易俊快者或失則止鈍滯者大抵四者所為心之莫同也病各自别知其心然後能救其失也要識他病處失在多寡易止辟如醫者用藥知得隂陽虛實方始隨症𥙷㵼針灼若錯施之教者學者皆勞而無功只看孔子教人四者之病隨症用藥曲得其妙且如子路所失者多孔子未嘗不裁減由也兼人故退之知他多病而底救之或失之寡孔門如柴愚參魯雍也仁而不佞就他資質上所失在寡孔子之教就他寡處博之以文約之以禮各到成立或失則易如子貢億則屢中與夫方人之病孔子未嘗不深懲而痛抑之如云夫我則不暇皆使之難不使之易或失則止孔子之門如冉求之自畫孔子未嘗不誘掖而進之小以成小大以成大若不識學者之病倒去他病上加添無緣得成就子路之失多更若進之所謂有餘不敢盡工夫子路何緣得入推此類言之其他無不如此教也者長善而救其失者也為學之道扶持長養人之善端救人之偏失孔子之教皆在一部論語中如君子哉若人尚德哉若人大哉問善哉問之類無非長善如責以朽木不可雕糞土之牆不可杇之類無非救其失長樂陳氏曰失之多者孔子謂之狂失之寡者孔子謂之簡古之教者觀性以知心因心以求失多者約之以禮寡者博之以文易者抑之以自反止者勉之以自強此長善救失之道也且善譬則苗也失譬則莠也欲長善者必救其失欲長苗者必去其莠彼閔其苗之不長而揠之者其智不已疏乎延平周氏曰或失則多者知之所以過或失則寡者愚之所以不及或失則易者賢之所以過或失則止者不肖之所以不及也嚴陵方氏曰失雖見乎外而所存本乎心故知其心于內然後可以救其失于外也人之性莫不有善苟無教以長之則善浸以消人之心不能無失茍無教以救之則失或為害永嘉戴氏曰夫人資禀各有所偏雖伯夷栁下惠不能免也其平日所踐履終身所成就皆於其所偏者重況于學者乎學者四失其意皆自以為善而不知其非失之多者博採以為功失之寡者約取以為精失之易者泛應而不能致思失之止者小成而莫肯前進所貴于學問者謂其能化氣禀之偏學者每患于不自知故有賴于教者之功蓋自知甚難自上知下甚易設教而不知學者之失知其失而不知救學者之過皆非所以為教也慶源輔氏曰必知之言不可不知也不言失之多而言失則多者蓋多寡易止有時為當然若一于此則為失也故云則焉博之失則多陋之失則寡勇之失則易愚之失則止內有所溺然後失形于外不正其心而治其外未之能也失由心生善本性有教人者長其固有之善而己救其失則非知其心有所不能及也山隂陸氏曰長善而救其失將順其善而匡救其失也善歌者使人繼其聲善教者使人繼其志其言也約而達微而臧罕譬而喻可謂繼志矣鄭氏曰善歌善教言為之善者則後人樂倣效也可謂繼志謂師說之明則弟子好述之其言少而解臧善也孔氏曰此一節論教者若善則能使學者繼其志于其師也記者以善歌而比喻之音聲和美感動人心能使聽者繼續其聲善教者必能使後人繼續其志如今傳繼周孔也又釋所以可繼之事善教者出言寡約而理顯易解義理微妙而說之精善其譬罕少而聽者皆曉為教如此則可使後人繼其志也橫渠張氏曰繼其志謂教者使學者繼其志循循然善誘是繼志也善歌者亦使學歌者自繼其聲髙下得相繼使人繼其志繼學之志也使人心不能已善教者也志常繼則罕譬切喻言易入則復而臧長樂陳氏曰聲之不可繼者非善歌志之不可繼者非善教蓋髙明以絶物則不足以為善中庸以導物然後為善也夫詳而不約而後能逹顯而不微而後能臧多譬而不罕然後能喻此理之常也今也約而能達微而能臧罕譬而能喻則是約而人知其要微而人知其妙罕譬而人知其簡可謂繼志矣蓋約與微所以明道罕譬所以明物道至于難明則又明物以顯之此所以為善也又樂書曰善歌者直已而陳德未嘗無可繼之聲善教者易直以開道未嘗無可繼之志其聲為可繼則氣盛而化神其志為可繼則德盛而教尊其故何哉其為言也約而達微而臧罕譬而喻故也嚴陵方氏曰天下之理太髙則與物絶而人莫能繼矣太卑則與物䙝而人不足繼矣惟得中則為可繼焉夫言苟務多則人以為惑而不達矣言茍好大則人以為迂而不臧矣言茍多譬則人以為僻而不喻矣若然則教者雖有其志學者焉能繼之哉山隂陸氏曰歌不貴苟難則易于繼其聲教不貴茍難則易于繼其志若佛老言理則妙矣以為善教則未也故昔賢論此以為無之則昧理有之則害教不可謂微而臧也約而臧微而達則罕譬而喻矣新安朱氏曰繼聲繼志者皆謂微發其端而不究其說使人有所玩索而自得之也約而達微而臧罕譬而喻三者皆不務多言而使人自得之意永嘉戴氏曰善歌藝也猶使人繼其聲善教者不可使人繼其志乎然繼志之學不在言語之閒曰約曰微曰罕譬其為辭甚簡曰逹曰臧曰喻其見理甚明教者之辭簡學者之理明若此可謂能繼志矣東萊吕氏曰約而達教者之言甚約然而本末貫徹未嘗不達微而臧教者之言甚微然而淵深粹美其味無窮罕譬而喻大抵曲為之喻使學者自得于言意之表如此可謂善繼志矣大抵聖賢之教引而不發非是阻抑學者若開户倒囊盡其底藴以告之學者不去思量不去玩味其流弊多是口耳之學惟是引而不發示其端而不盡使人萬繹千思及功深力到義理自渙然冰釋怡然理順學記教人皆是三代教人之法如孔子洙泗之教孟子在戰國風氣既降氣質既薄三代之教已是盡用不得今看論語少者一二語多者不過三四語孟子往往至千百言所謂約而達到孟子已自用不得如豫豈好辨哉豫不得已也而孔子則罕言利與命與仁夫子之言性天道不可得而聞到孟子已自用剖析精微示人如論性直指之謂善如論浩然之氣皆是分明說破所謂微而臧到孟子已自用不得孔子不憤不啓不悱不發所謂譬喻見于論語者少若孟子每事譬喻亦是不得已𫝊注者謂其長于譬喻當時罕譬而喻又用不得然而孟子觀㑹通以行典禮于此自立規模所以為孟子如多寡易止則止是就一人身上看孟子改規模是統天下看慶源輔氏曰若夫子之舉一隅孟子之引而不發所謂善教也不以三隅反躍如也則能繼其志矣約而達微而臧罕譬而喻則人有自得之地矣然則孟子之譬喻非與向時不同也孟子於戰國大道既隱之時與其君臣言論又非其素所講學也故不得不假譬以曉之然孟子固曰豫豈好辨哉豫不得已也可謂繼志矣者省文也蓋言如此則可謂能使人繼志矣李氏曰欲其求而後應故其言常約欲其思而後得故其義常微言之所不能及義之所不能明故達之以譬譬者理之所在也理欲其自窮故罕譬言雖近而指不可不逺故其言約其義微其譬罕指逺故雖約而逹雖微而臧雖罕譬而喻也子曰夫易其稱名也小其取類也大其指逺其辭文其言曲而中其事肆而隱其稱名小取類大則罕譬而喻也其㫖逺其辭文則微而臧也曲而中則約而達延平黃氏曰學之序能辨志然後能遜志能遜志然後能繼志辨志求道之時也遜志從道之時也繼志㑹道之時也志於道則無纍志於仁則無惡禮記集說卷八十九
