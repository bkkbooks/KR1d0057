body:
  text: 禮記集説卷一百二十五宋衛湜撰仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也鄭氏曰庸常也用中為常道也反中庸者所行非中庸然亦自以為中庸也孔氏曰自此至不行矣夫一節子思引仲尼之言廣明中庸之行唐陸氏曰王肅本作小人之反中庸也河南程氏曰君子之於中庸無適而不中則其心與中庸無異體矣小人之於中庸無所忌憚則與戒慎恐懼者異矣是其所以反中庸也伊川又曰小人更有甚中庸脫一反字小人不主於義理則無忌憚無忌憚所以反中庸也伊川又曰且喚做中若以四方之中為中則四邊無中乎若以中外之中為中則外面無中乎如生生之謂易天地設位而易行乎其中豈可只以今之易書為易乎中者且謂之中不可捉一個中來為中明道又曰欲知中庸無如權須是時而為中若以手足胼胝閉户不出二者之間取中便不是中若當手足胼胝則於此為中當閉户不出則於此為中權之為言稱錘之義也伊川蘇季明問君子時中莫是隨時否曰是也中字最難識須是默識心通且試言一廳則中央為中一家則廳中非中而堂為中言一國則堂為中而一國之中為中推此類可見矣且如初寒時則薄裘為中如在盛寒而用初寒之裘則非中也更如三過其門不入在禹稷之世為中若居陋巷則不中矣居陋巷在顔子之時為中若三過其門不入則非中也或曰男女不授受之類皆然曰是也男女不授受中也在喪祭則不如此矣伊川又曰楊子拔一毛不為墨子又摩頂放踵為之此皆是不得中至於子莫執中又欲執此二者之中不知怎生執得識得則事事物物上皆天然有個中在那上不待人安排也安排著則不中矣伊川又曰可以仕則仕可以止則止可以久則久可以速則速此皆時也未嘗不合中故曰君子而時中伊川橫渠張氏曰時中之義甚大須精義入神始得觀其會通行其典禮此方是真義理也行其典禮而不達會通則有非時中者矣君子要多識前言往行以畜其德者以其看前言往行熟則自能見得時中藍田吕氏曰此章言中庸之用時中當其可而已猶冬飲湯夏飲水之謂無忌憚所以無取則也不中不常妄行而已一本云君子蹈乎中庸小人反乎中庸者也君子之中庸也有君子之心又達乎時中小人之中庸也有小人之心反乎中庸無所忌憚而自謂之時中也時中者當其可之謂也時止則止時行則行當其可也可以仕則仕可以止則止可以速則速可以久則久當其可也曽子子思易地則皆然禹稷顔回同道當其可也舜不告而娶周公殺管蔡孔子以微罪行當其可也小人見君子之時中唯變所適而不知當其可而欲肆其姦心濟其私欲或言不必信行不必果則曰唯義所在而已然實未嘗知義之所在有臨喪而歌人或非之則曰是惡知禮意然實未嘗知乎禮意猖狂妄行不謹先王之法以欺惑流俗此小人之亂德先王之所以必誅而不以聽者也又曰執中無權雖君子之所惡茍無忌憚則不若無權之為愈建安遊氏曰道之體無偏而其用則通而不窮無偏中也不窮庸也以性情言之則為中和以德行言之則為中庸其實一也君子者道中庸之實也小人則竊中庸之名而實背之是中庸之賊也故曰反中庸君子之於中庸自幼壯至於老死自朝旦至於暮夜所遇之時所遭之事雖不同其為中一也故謂之時中言行小變而不失其大常也小人之於中庸則居之似忠信行之似亷潔而居之不疑或詭激以盜名進鋭退速此所謂無忌憚而反中庸者也延平楊氏曰事各有中故執中必有權權猶權衡之權所以稱物之重輕而取中也中無常主惟其時焉耳時者當其可之謂也仲尼不為己甚者而孟子曰聖人之時以其仕止久速各當其可也君子之趨變無常蓋用權以取中也小人不知時中之義反常亂德以欺世其為中庸也乃所以為無忌憚也或問有謂中所以立常權所以盡變不知權則不足以應物知權則中有時乎不必用矣是否曰知中則知權不知權則是不知中也曰既謂之中斯有定所必有權焉是中與權固異矣曰猶坐於此室室自有中移而坐於堂則向之所謂中者今不中矣堂固自有中合堂室而觀之蓋又有堂室之中焉若居今之所守向之中是不知權豈非不知中乎如一尺之物約五寸而執之中也一尺而厚薄大小之體殊則所執者長短多寡之中而非厚薄大小之中也欲求厚薄小大之中則釋五寸之約唯輕重之知而其中得矣故權以中行中因權立中庸之書不言權其曰君子而時中蓋所以為權也又曰中者豈執一之謂哉亦貴乎時中也時中者當其可之謂也堯授舜舜授禹受之而不為泰湯放桀武王伐紂取之而不為貪伊尹放大甲君子不以為篡周公誅管蔡天下不以為逆以其事觀之豈不異哉聖人安行而不疑者蓋當其可也後世聖學不明昧執中之權而不通時措之宜故徇名失實流而為子噲之讓白公之爭自取絶滅者有之矣至或臨之以兵而為忠小不忍而為仁皆失是也新安朱氏曰此第三章已下十章皆論中庸以釋首章之義文雖不屬而意實相承也中庸者不偏不倚無過不及而平常之理乃天命所當然精微之極致也唯君子為能體之小人反是王肅本作小人之反中庸也程子亦以為然今從之君子之所以為中庸者以其有君子之德而又能隨時以處中也小人之所以反中庸者以其有小人之心而又無所忌憚也蓋中無定體隨時而在是乃平常之理也君子知其在我故能戒謹不睹恐懼不聞而無時不中小人不知有此則肆欲妄行而無所忌憚矣變和言庸者遊氏曰以性情言之則曰中和以德行言之則曰中庸是也然中庸之中實兼中和之義或問此其稱仲尼孫可以字其祖乎曰古者生無爵死無諡則子孫之於祖考亦名之而已矣周人冠則字而尊其名死則諡而諱其名則固已彌文矣然未嘗諱其字者也故儀禮饋食之祝詞曰適爾皇祖伯某父乃直以字而面命之況孔子爵不應諡而子孫又不得稱其字以别之則將謂之何哉又曰君子所以中庸小人之所以反之者何也曰中庸者無過不及而平常之理蓋天命人心之正也唯君子為能知其在我而戒謹恐懼以無失其當然故能隨時而得中小人則不知有此而無所忌憚故其心每反乎此而不中不常也又曰小人之中庸王肅程子悉加反字蓋疊上文之語然諸説皆謂小人實反中庸而不自知其為非乃敢自以為中庸而居之不疑如漢之胡廣唐之吕溫栁宗元者則其所謂中庸是乃所以為無忌憚也如此則不須增字而理亦通矣曰小人之情狀固有若此者矣但以文勢考之則恐未然蓋論一篇之通體則此章乃引夫子所言之首章且當略舉大端以明别君子小人之趣向未當遽及此意之隱微也若論一章之語脈則上文方言君子中庸而小人反之其下且當平解兩句之義以盡其意不應偏解上句而不解下句又遽别解他説也故疑王肅所傳之本為得其正而未必肅之所增程子從之亦不為無所據而臆決也諸説皆從鄭本雖非本文之意然所以發明小人之情狀則亦曲盡其妙而足以警乎鄉原亂德之姦矣又語録云或謂聖賢亦有不誠處如取瑟而歌出弔東郭之類説誠不如只説中先生曰誠而中君子而時中不誠而中小人之無忌憚海陵胡氏曰君子有一不善慮為名教之罪人小人由其無所畏忌故棄中道而不顧也長樂劉氏曰君子以大中之道為常久所行造次必於是顛沛必於是故曰君子中庸也小人不恥不仁不畏不義言動言反於中庸也君子而時中者謂夙興夜寐之間時省厥中唯恐其為外物之所動而失其正也夫性稟於天而中出乎性其本雖靜非自誠而明者未始不為外物之所動也目司其視耳司其聽聲司其言形司其貌而心也者時省厥中以役五事俾夫聲色之來而不能動吾中則明出乎視而聰出乎聽者非耳目之所能為也心省乎中而已矣俾夫言行之出應乎萬變而不失吾中則從出乎言而恭出乎貌者非聲形之所能為也心省乎中而已矣然則君子所以戒慎乎其所不睹恐懼乎其所不聞者心之所職豈不重乎苟非時刻之間不忘警省則性之存者幾希矣故曰君子而時中也小人之反中庸也小人而無忌憚也者小人目悅乎色而不憚傷其明也耳悅乎聲而不憚傷其聰也貌悅舒惰而不憚傷其恭也言悅順情而不憚傷其從也心悅邪辟而不憚傷其睿也由其一心之無忌憚而陷其身於不義刑禍從而加焉無他也須臾之間言行離乎其性則反於中庸矣又不知以為忌憚時省其失則終於小人而冒於刑禍也廣漢張氏曰中也者天下之大本也須識得此然後時中之義可得而明不然則幾何而不為子莫之執也子莫之意以為楊子不拔一毛為不及而墨子摩頂放踵為過之我但執此二者之中耳殊不知中無乎不在有時三過其門而不入有時居陋巷而不顧此所謂時中也其所以能時而中者奈何以其大本立故也大本立則周旋萬變而中之體不亂故曰時中也惟精惟一允執厥中蓋極精一之妙則是中也湯之執中意亦類此若子莫則於過與不及之間求所謂中者而執之不知既己昧其體矣故曰執中無權權者所以妙夫中也故學者必先求仁知仁則中體可見應事接物得所以權之者矣若夫聖人則無俟於權而無時不中矣延平黃氏曰君子以時中則有時不中矣此其所以為中庸更而不可拘續而不可窮其縱不流其守不固流者執庸而不及中者也固者執中而不及庸者也執庸者害道之常此為庸者之無忌憚也執中者害道之變此為中者之無忌憚也楊墨失中子莫失庸嵩山朝氏曰中之所以為常道也君子而時中則無時而不中也小人而無忌憚須臾變改莫之能中也以是知先儒説用中為常道是也馬氏曰君子者人之成名而中庸者人道之全者也故曰君子中庸小人反人道者也故曰小人反中庸晉陵喻氏曰時中之君子以天下譽之而不喜以天下非之而不怒舉天下無以動其心者毋意毋必毋固毋我言不必信行不必果惟義所在舉天下之事無大小焉無適莫焉無可無不可焉唯時中而已小人唯利之從唯名是徇其於君子之心一切反之聞君子之中庸也乃欲竊取其名居之似忠信行之似廉潔如紫奪朱如鄭亂雅如鄊原之亂德是借以資其無忌憚者爾東萊吕氏曰楊氏為我墨氏兼愛為其賊道也舉一而廢百也夫楊墨之叛道孟子闢之固深切著明卻有子莫一等病難識大抵近者卻是逺近之一字卻是誤子莫處楊氏為我墨氏兼愛各守其偏去中為甚逺然或有一人救之云此非中道未必不回歸於中卻近惟子莫自以為能執是中卻最害道如中庸説君子之中庸君子而時中小人之中庸小人而無忌憚人説小人中庸欠一反字亦不消著反字蓋小人自認無忌憚為中庸如後世莊老之徒亦子莫之學如説不死不生如説義利之間皆是不得時中之義止於兩事中間求其中如何會識得中大抵時中最難識故前輩論有長短之中有輕重之中因舉扇以示人云徒知長短之中而不知輕重之中則如子莫止於兩事求其所謂中不知有非仁而仁非義而義如何不審輕重若使中有定所如仁義禮智信只須按定本去做惟其無定此君子所以欲明善審是時中之義子思發之於中庸如孔子亦未嘗不言如易之消息盈虛春秋之褒貶是非未嘗不是中學者能看得易與春秋自然識得中四明沈氏曰因天下同然之理行於其所當行而不用意此之謂君子中庸小人反中庸反不是倍計較揣度用私意以為之此之謂反中庸之上更著一個字不得若著一個字便是用意君子中庸何其安靜簡明哉吳興沈氏曰自天命之謂性而至於君子謹其獨自喜怒哀樂未發謂之中而至於萬物育焉是皆總中庸之體要而指中庸之功用也體要功用既極兩盡然後中庸之名始立於此中庸之名前人未發之子思不敢以私見立道之名於是援仲尼之説以申之庶幾天下不以我為妄此中庸之標目所由立也中即喜怒哀樂未發者也庸即喜怒哀樂己發而中節者也庸非中之外復有所謂庸也由中而發無一之不中節者也人莫不有喜怒哀樂也惟其發而不中節故不可以為庸使其舉皆中庸也無時而不中兹其所以為庸也然則時也節也庸也是或一道也若夫小人則不然喜怒哀樂隨性而發逐物而動其與中庸實相背馳故曰反中庸反中庸者小人之常也然又樂聞君子時中之説乃同乎流俗合乎汙世時尚縱橫則為蘇秦時尚刑名則為申韓時尚虛無則為黃老竊時中之名而流入於無忌憚此所以謂小人之中庸也髙要談氏曰中之道出而應物見於時措之宜者謂之時中此即和之義也語其稱量事物輕重適當則謂之權皆發而中節焉爾曰時中云者變通無滯泛應曲當之謂也循常而行之固中矣適變而行之亦中也考禮而行之固中矣從俗而行之亦中也師古而行之固中矣度今而行之亦中也天下之事不勝其衆而君子泛應無往非中此君子用權之微意非小人所可得與也小人見君子之時中不執於一往往竊取其説以肆無窮之欲縱橫顛倒無所不為亦曰吾之所為皆時中也然君子小人則有辨矣君子大本先立故見於應物者事事中節小人大本先失其見於行事又安能中節乎此其所以辨也聖人惡其近似故辨之曰君子中庸小人反中庸君子時中小人無忌憚也言君子有體斯有用故為中庸小人體不立而用常差故為反中庸君子發而中節故為時中小人發而不中節但為無忌憚爾可謂灼見小人之情狀矣使君天下者得是説而通之則辨君子小人若辨白黑又何知人之難矣錢塘于氏曰全吾心之中和乃所以為君子之中庸中和二字子思自吾心體之中庸二字乃自吾夫子發之無和不能以為庸其實一理也江陵項氏曰此言君子小人之所由分使修道者知所避就也時中由時敏時習也戒懼謹獨之謂也既君子矣又時中焉此聖所以愈聖無忌憚者戒懼謹獨之反也既小人矣又無忌憚焉此愚所以愈愚使君子而不時中則小人矣使小人而有忌憚則君子矣君子小人之分無它敬與慢之間耳仁夀李氏曰曾子曰堂堂乎張也難與並為仁矣子謂子夏女為君子儒無為小人儒子張子夏亦何至難與為仁而流為小人之歸然師友警教如此其嚴蓋慮其或過或不及而弗蹈乎中庸則駸駸焉行乎小人之塗而不自覺也且此章論中庸始言君子足矣而遽及小人何也孟子曰道二仁與不仁而已矣此為仁反此即為不仁又曰欲知舜與跖之分無他善與利之間而已矣此為善反此即為利故夫子平日每以君子小人對言之而子思子首引此言以示學者之決擇蓋謂欲為君子者當無一念非中庸一或反之則此之一念即為小人之念當無一言非中庸一或反之則此之一言即為小人之言當無一行非中庸一或反之則為小人之行君子小人如隂陽晝夜氷炭黑白之殊而其差特在乎中庸向背之間不偏不倚無過不及之中平常可久之庸一或反之則雖有絶人之才智蓋世之事功被之以小人之名而不得辭甚可懼也君子之中庸也君子而時中之義前輩備言之矣物有萬殊事有萬變所居之位有髙下所遇之時有隆汙或出或處或默或語各惟其時不必同也然有同焉者中也可仕可止可久可速各惟其時不執一也然有一焉者中也皆非過也皆非不及也皆平常可久而非詭異之行也惟其君子之德而又能時以取中斯所以為君子之中庸小人之中庸也脫一反字小人者君子之反也無忌憚者戒謹恐懼之反也君子惟懼乎一出言而異乎中庸小人則肆意巧言而不知畏也君子惟懼乎一舉足而違乎中庸小人則縱欲妄行而不知畏也惟其不知畏故曰與中庸相背而馳使其有所忌憚則不至此矣晉陵錢氏曰仲尼孔子之字也學者尊其師曰子稱仲尼所以别之猶舜典先稱舜後稱帝也霅川倪氏曰小人之中庸無反字正義為小人亦自以為中庸得之矣王肅添反字非也忌者有所疑也憚者有所畏也人惟有所疑忌故不肯為不善有所畏憚故不敢為不善小人託中庸以自便借中庸以文姦曰吾亦中耳我亦庸耳何為不可此之謂無忌憚也無忌憚與戒謹恐懼相反唯其無忌是以不戒謹惟其無憚是以不恐懼何謂無忌憚因孔子聖之時於是借以為説仕於不可仕之時如漢末假儒者之説以仕於莽朝以干利祿如孟子有言不必信行不必果之説於是借以自便如鄉原之言不顧行行不顧言作偽欺世故曰無忌憚建安真氏曰程氏之論時中至矣楊氏因其説而推明亦有補焉易之道以時義為主如乾之六爻當潛而潛中也當潛而見則非中矣當飛而飛中也當飛而潛則非中矣它卦亦然洪範三德當剛而剛中也當剛而柔則非中矣推之事事物物莫不皆然此乃撫世應物之大權然必以致知為本新定顧氏曰夫君子中庸體道者也純乎天理不以人欲參之也小人沒於私欲失其本心倡狂妄行是之謂反中庸然隨時制宜不失乎中而後可以為中庸不然執中無權猶執一也故曰君子之中庸也君子而時中良心善性天之豫我以是則必望我以全乎是今也私欲橫生從耳目之欲是不知有本心也不知有本心是不知有天命也夫以人而不知有天其無忌憚孰甚焉斯其所以敢於反中庸也故曰小人之反中庸也小人而無忌憚也雖然非時中不足以語中庸然非體中庸之至抑不足以語時中故可與立也而後可以語權惟艮之止而後動靜不失其時此君子之事也彼小人之無忌憚也惟其愚也所謂天理習聞其號非有真見所謂惟天聰明所謂惟天明畏所謂福善禍淫彼以為天未必切切然也是以無忌憚而反中庸不知天定斯能勝人人非鬼責人禍天刑每歸於無忌憚反中庸之徒若夫君子在舜則曰兢業在湯則曰危懼在文王則曰敬忌在孔子則曰畏天命在曾子則曰戰戰兢兢夫然故不失中庸卒之自天佑之吉無不利君子小人之所以終其異也如此夫蔡氏曰君子中庸小人反中庸夫子之言也君子而時中小人而無忌憚也子思釋夫子之言也子曰中庸其至矣乎民鮮能久矣鄭氏曰鮮罕也言中庸為道至美顧人罕能久行河南程氏曰中庸天下之至理德合中庸可謂至矣自世教衰民不興於行鮮有中庸之德也一説民鮮能久行其道也藍田吕氏曰人莫不能中庸鮮能久而已久則為賢人不息則為聖人一本云中庸者天下之所共知天下之所共行猶寒而衣飢而食渴而飲不可須臾離也衆人之情厭常而喜新質薄而氣弱雖知不可離而亦不能久也唯君子之學自明而誠明而未至乎誠雖心悅而不去然知不可不思行不可不勉在思勉之分而氣不能無衰志不能無懈故有日月至焉者有三月不違者皆德之不可久者若至乎誠則不思不勉至於常久而不息非聖人其孰能之建安遊氏曰德至於中庸則全之盡之不可以有加矣故曰其至矣乎舜之為大知則用此道而至也顔淵之為賢則擇此道而求其至也若舜之為大孝武王周公之為達孝則由此道而成名也子路問強則將進此道而已哀公問政則將行此道而已自修身以至懷諸侯皆出於此道不其至矣乎然非至誠無息者不足以體此非自強不息者不能以致此故久於其道者鮮矣上蔡謝氏曰中不可過是以謂之至德過可為也中不可為是以民鮮能久矣河東侯氏曰民不能識中故鮮能久若識得中則手動足履無非中者故能久易之恆曰君子立不易方恆久也聖人得中故能常久而不易延平楊氏曰道止於中而己過之則為過未至則為不及故唯中庸為至又曰至所謂極也極猶屋之極所處則至矣下是為不及上焉則為過或者曰髙明所以處己中庸所以處人如此則是聖賢所以自待者常過而以其所賤者事君親也而可乎然則如之何曰髙明即中庸也髙明即中庸之體中庸者髙明之用耳髙明亦猶所謂至也新安朱氏日過則失中不及則未至故唯中庸之德為至然亦人所同得初無難事但世教衰民不興行故鮮能之今已久矣論語無能字或問民鮮能久或以謂民鮮久於中庸之德而以下文不能期月守者證之何如曰不然此章方承上章小人反中庸之意而泛論之未遽及夫不能久也下章自能擇中庸者言之乃可責其不能久耳兩章各自發明一義不當遽以彼而證此也且論語無能字而所謂矣者又已然之辭故程子釋之以為民鮮有此中庸之德則其與不能期月守者不同文義益明白矣曰此書非一時之言也章之先後又安得有次序乎曰言之固無序矣子思取之而著於此則其次第行列決有意謂不應雜置而錯陳之也故凡此書之例皆文斷而意屬讀者先因其文之所斷以求本章之説徐次其意之所屬以考相承之序則有以各盡其一章之意而不失夫全篇之旨然程子亦有久行之説則疑出於門人之所記蓋不能無差繆而自世教衰之一條乃論語解而夫子之手筆也諸家之説固皆不察乎此然吕氏所謂厭常喜新質薄氣弱者則有以切中學者不能固守之病讀者合諸期月之章而自省焉則亦足以有警矣侯氏所謂民不識中故鮮能久若識得中則手動足履皆有自然之中而不可離則庶幾耳臨川王氏曰孔子歎此中庸為德之至而當時之人鮮能久之語亦曰中庸之德至矣乎民鮮久矣蓋孔氏重傷政化已絶天下之人執乎一偏中庸之道所以不能行也吳興沈氏曰世之説者曰過非中也不及亦非中介乎過不及之間者中也豫曰不然過固非中過而得其至焉過亦中也不及固非中不及而得其至焉不及亦中也譬如天壤之間洛為中地自燕而望洛則燕自有中而洛為偏矣自越而望洛則越自有中而洛亦偏矣推而至於天地事物之間莫不有至當之處初無過不及之分也夫是之謂中庸其至矣乎至之為義天理之自然人為之不可加損真理渾然間不容髮者是也非夫固聰明聖知達天德者其孰能知之此民鮮能者亦已久矣卒篇之詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣即是説也四明沈氏曰至非極至之至甚難言也過非至不及亦非至箭鋒相遭於毫芒杪忽之微用意以為之不可無意以為之亦不可百姓日用而不知者安能久此哉晉陵錢氏曰至猶極也民亦人也中庸之德乃理之至極而人鮮能之如此者久矣歎道之廢也詩云周道如砥其直如矢君子所履小人所視眷言顧之澘焉出涕亦此意仁夀李氏曰中庸之為至何也理之極而不可加之謂至譬如立乎天下之中自東而西者至乎此而止自南而北者至乎此而止凡未至乎此與既至乎此而又過焉者皆偏也天之生物固莫不有當然之則非人之私知所能益損乎其間大學言止於至善意亦同此然所謂至者初非窮髙極逺之事不過君之仁臣之敬子之孝父之慈與國人交之信如此之類而已但世教既衰民鮮能之其來已久夫有周之末先王之迹未逺聖人猶有久矣之歎况後聖人又千數百年者乎雖然自物則言之則過與不及皆不可以言至自末世言之則過乎則者少不及乎則者多學者試以事君之敬事父之孝與人交之信反已而自省焉則其至與否可見矣廣安遊氏曰學而至於中庸人以為中和庸常而易能也然非盛德不能至此所謂盛德者如謙也沖也勤也晦也謹也廣也大也博也正也中也察也精也微也如此數字須博學之明辨之審思之力行之些子工夫不到便有差德有盛於此乎新定顧氏曰民之為言指衆人也孟子曰庶民去之君子存之中庸者人心固有之理論天下之理無以尚之故曰其至矣乎天下之人均有是心均有是理厥初渾然與生俱生而何不能久之有惟夫利欲汨之則能暫而不能久耳然人之不能久於中庸天下皆是也不言民不能久而曰民鮮能久此聖人不以薄待人之意詩曰民鮮克舉之語曰蓋有之矣我未之見也皆此意也江陵項氏曰民鮮能久矣言人之不能知不能行也下曰道之不行言非不能行由於不能知也又曰道之不明言非不能知由於不能行也子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也鄭氏曰過與不及使道不行唯禮能為之中孔氏曰道之不行為易故智者過之愚者不及道之不明為難故賢者過之不肖者不及變知為賢變愚為不肖是賢勝於知不肖勝於愚也飲食易也知味難也師曠别薪張華辨鮓符朗食雞知棲半露食鵝知其黑白是謂知味河南程氏曰劉元城問明道行狀云昔之惑人也乘其迷暗今之入人也因其髙明既曰髙明又何惑乎程先生曰今之學釋氏者往往皆髙明之人所謂知者過之也然此非中庸所謂極髙明故知者過之若是聖人之知豈更有過伊川又曰聖人與理為一故無過無不及中而已矣其他皆以心處這過道理故賢者常失之過不肖常失之不及藍田吕氏曰諸子百家異端殊技其設心非不欲義理之當然卒不可以入堯舜之道者所知有過不及之害也疏明曠達以中為不足守出於天地範圍之中淪於虛無寂寞之境窮髙極深要之無所用於世此過之之害也蔽蒙固滯不知所以為中泥於形名度數之末節徇於耳目聞見之所及不能體天地之化達君子之時中此不及之害也二者所知一過一不及天下欲蹈乎中庸而無所歸此道之所以不行也賢者常處其厚不肖者常處其薄曽子執親之喪水漿不入口者七日髙柴泣血三年未嘗見齒雖本於厚而滅性傷生無義以節之也宰豫以三年之喪為己久食稻衣錦而自以為安墨子之治喪也以薄為其道既本於薄及徇生逐末不免於恩以厚之也二者所行一過一不及天下欲擇乎中庸而不得此道之所以不明也知之不中習矣而不察者也行之不中行矣而不著者也是知飲食而不知味者也又曰此章言失中之害必知其所以然然後道行必可常行然後道明知之過無徵而不適用不及則卑陋不足為是取不行之道也行之過不與衆共不及則無以異於衆是不明之因也行之不著習矣不察是亦飲食而不知味者如此而望道之行難矣夫延平楊氏曰極髙明而不知中庸之為至則道不行知者過之也尊德性而已不道問學則道之不明賢者過之也夫道不為堯桀而存亡雖不行不明於天下常自若也人日用而不知耳猶之莫不飲食而鮮知味也又曰若佛氏之寂滅莊生之荒唐絶類離倫不足以經世道之所以不行也此知者過之也若楊氏之為我墨氏之兼愛過乎仁義者也而卒至於塞路道之所以不明也此賢者過之也自知愚賢不肖言之則賢知宜愈矣至其妨於道則過猶不及也又曰聖人人倫之至也豈有異於人乎哉堯舜之道曰孝弟不過行止疾徐之間而已皆人所日用而昧者不知也夏葛而冬裘渴飲而飢食日出而作晦而息無非道者譬之莫不飲食而知味者鮮矣建安遊氏曰知出於知性然後可與有行知者過之非知性也故知之過而行之不至也已則不行其能行於天下乎若鄒衍之談天公孫龍之詭辨是知之過也愚者又不足以與此此道之所以不行也行出於循理然後可與有明賢者過之非循理也故行之過而知之不至也已則不知其能明於天下乎若楊氏為我墨氏兼愛是行之過也不肖者又不足以與此此道之所以不明也道不違物存乎人者日用而不知耳故以飲食况之飲食而知味非自外得也亦反諸身以自得之而已夫行道必自致知始使知道如知味是道其憂不行乎今也鮮能知味此道之所以不行也河東侯氏曰知非仁知之知如白圭治水之知賢非賢哲之賢如博奕猶賢乎已之賢若引佛莊之學為知耶彼內則無父外則無君君臣父子且不能知謂之知可乎若以楊墨為賢彼皆學仁學義而過之者過於仁則為不仁過於義則為不義不及亦如之不仁不義禽獸也謂之賢可乎此皆不可謂之賢知者也子思乃曰過不及云者參差毫髮之間不得中道如師也過由也兼人求也退商也不及如此而已故曰知者賢者過之愚者不肖者不及也是道也若不約之以禮則楊墨佛莊之弊可馴致焉故易曰差之毫釐繆以千里此之謂也孔門之學聖人者唯顔子能知之然以顔淵之學始則鑽仰髙堅之若不可入次則瞻忽前後之若不可及及其進也則曰博我以文約我以禮如可力致者竭其才以求之則又見卓爾獨立從容中道神疲力乏雖欲從之末由也已噫顔淵其真知味者乎不然何歎中道之難也如此後之學者或以穿鑿為知或以謬悠為賢終不可入堯舜之道此道之所以不明不行也故曰人莫不飲食也鮮能知味猶曰人莫不學也鮮能知道云爾若以佛莊之學可亂我道彼之為道絶類離倫章章然與我道為戾不待較而知其為非也稍自愛者不由也惡能亂吾道而不行哉孔子之所謂不明不行云者以其似是而非如世儒之學同是堯舜同非桀紂同尊孔子同稱為儒其説足以惑人而終不可以入道自期於賢知而人亦賢知之語道則與道為二講説則立説支離其入人也因人之髙明使學者醉中生夢中死終不自覺此道之所以不明不行蓋謂此也新安朱氏曰此第四章道者天理之當然中而已矣知愚賢不肖之過不及則生稟之異而失其中也知者知之過既以道為不足行愚者不及知又不知所以行此道之所以常不行也賢者行之過既以道為不足知不肖者不及行又不求所以知此道之所以常不明也人莫不飲食鮮能知味言道不可離人自不察是以有過不及之弊或問此其言道之不行不明何也曰此亦承上章民鮮能久矣之意矣曰知愚之過不及宜若道之所以不明也賢不肖之過不及宜若道之所以不行也今其互言之何也曰測度深微揣摩事變能知君子之所不必知者知者之過乎中也昏昧蹇淺不能知君子之所當知者愚者之不及乎中也知之過者既唯知是務而以道為不足行愚者又不知所以行也此道之所以不行也刻意尚行驚世駭俗能行君子之所不必行者賢者之過乎中也卑汙苟賤不能行君子之所當行者不肖者之不及乎中也賢之過者既唯行是務而以道為不足知不肖者又不求所以知也此道之所以不明也然道之所謂中者是乃天命人心之正當然不易之理固不外乎人生日用之間特行而不著習而不察是以不知其至而失之耳故曰人莫不飲食也鮮能知味也知味之正則必嗜之而不厭矣知道之中則必守之而不失矣臨川王氏曰中庸之道不行不明於世者孔子言我固知其然矣當孔子之時治化已絶處士橫議各信一偏之見是故知賢者止知用心之切求過於道中庸之理所以不明不行夫知者知其行道於世使愚者皆可企及賢者謂不行道於世則當明之於己而使不肖者皆可以法效若舜之知可謂能行也顔回之擇善可謂能明也愚不肖者固可以勉而行中庸之道矣今因其知與賢者求過於道是以望道而不可企及所以聖人於此深責其知與賢者之過而非愚不肖之罪若伯夷栁下惠之徒皆非中道故孟子但言其聖人清和之一節耳人孰不飲食也然鮮能知正味如酸醎辛苦之類皆得其中和可也人莫不欲行道也鮮能知中和之理反棄聖道而務為異行孔子所以歎之也延平周氏曰知愚言其性知則知道者也愚則不知道者也賢不肖言其行賢則行道者也不肖則不能行道者也故於道之不行而言知與愚者以其知之過而不知之不及也於道之不明而言賢與不肖者以其行之過而不行之不及也人非飲食無以生而非道亦無以生然人莫不資於飲食而鮮能知其味猶莫不資於道而鮮能知其趣故易曰百姓日用而不知孟子曰終身由之而不知其道者衆也海陵胡氏曰道之不行以知愚言之道之不明以賢不肖言之者知者有知之謂也賢者道藝德行之總稱行其道凡有知之人皆能之也明其道非大才大德之人則不可也故或言賢或言知者各係其輕重而言也愚與不肖對賢知言之因以别其名肖者似也本有賢人之質但以不能遵履賢人之業故曰不肖以此言之道之不行重於道之不明何哉道之不行尚有能明之者但不能行耳道之不明是世無人能明之則大中之道幾乎絶矣嚴陵方氏曰學記雖有嘉殽弗食不知其旨也雖有至道弗學不知其善也此以味况知道宜矣山隂陸氏曰知愚才也賢不肖行也道之不行以知之不察道之不明以行之不著苟知味矣不應不及亦不應過也延平黃氏曰知者過之故夫婦之愚不可以與知此所謂愚者不及也賢者過之故夫婦之不肖不可以能行此所謂不肖者不及也智者行之然後愚者得以知焉賢者明之然後不肖者得以行焉莆陽林氏曰不必分知愚賢不肖之辨但聖人欲發揮其言而作中庸者只欲辭達故再言之不行不明初無差别范陽張氏曰知味者當優遊涵泳於不睹不聞之時可也永嘉薛氏曰所貴乎知者為其能有擇也所貴乎賢者為其能有見也人之望也所賴以先民也愚者固不及矣知者又過中道道何從而行乎不肖固不及者賢者又過中道道何從而明乎孔子興道不行之歎蓋歎賢而知者過猶不及君子小人之間不能以寸飲食而知其味之正斯無嗜好之僻也毋偏毋頗則近道矣兼山郭氏曰昔舜之命禹曰人心惟危道心惟微惟精惟一允執厥中蓋言天下無二道萬化無二理要之一而已矣自其上者觀之則謂之知自其下者觀之則謂之愚知者過之愚者不及其於失道均矣惟其失道所以不能行道此道所以不行也自其力行者言之謂之賢自其自棄者言之謂之不肖賢者過之不肖者不及其於失道均也惟其失道所以不能明道此道所以不明也二者不知所謂惟精惟一允執厥中者也是猶飲食人之常而不能知天下之正味也易牙之於味得其所同曾晢之於羊棗得其所獨為道者棄其所同徇其所獨此孔子所以歎道之不行也晏氏曰知愚之過不及宜曰道之不明賢不肖之過不及宜曰道之不行今乃反言之者何哉蓋知者専於明道或怠於行道賢者専於行道或忽於明道故爾書曰非知之艱行之惟艱蓋不能知味者以喻不能知道也道既不能知安能行道乎髙要談氏曰知者賢者視愚不肖固為有間然不識大本所在而求之或過則與不及均矣此中庸所以不明不行也飲食者衆知味者鮮道之精微非言語筆墨之所能形容者其猶味歟此則全在精思默識之功不加此功終不能知味也由其知味者鮮故能久者亦鮮霅川倪氏曰子思以過與不及皆非中道是以至於不明不行而貴於修道也知固勝愚賢固勝不肖若以中道論之則皆為未至知味不必如正義所引師曠張華符朗之知味但人於飲食苟知其味之旨自然嗜之猶學者於中庸之道苟能含咀而知其味則理義之悅我心猶芻豢之悅我口自不能已也新定顧氏曰道之不行由知者過而愚者不及此知之不至則不能行也夫知者才識有餘愚者才識不足自其未學而言之知者知其所知而非聖人之所謂知也彼其執荒唐繆悠之説以為信主離世異俗之論以為髙自聖人言之則過乎中庸矣若夫愚者本其資稟之凡陋安於耳目之濡染聞所謂廣大配地髙明配天悠久無疆則驚駭疑沮或且以為不然自聖人言之則不及乎中庸矣夫行本於知者也彼其知之差如此何望其能行乎故曰道之不行也我知之矣知者過之愚者不及也道之不明由賢者過而不肖者不及此行之不至則不能知也夫賢者淳篤不肖者輕浮自其未學而言之由其資稟而推之行事賢者每過於厚不肖者每流於薄皆非中庸也彼既過於厚則其念慮惟知厚之趣耳豈復知中庸彼既流於薄則其念慮惟知薄之趣耳又豈復知有中庸故曰道之不明也我知之矣賢者過之不肖者不及也嗚呼天下之理知則必行行則必知二者常相待也然使學者苟未能知苟未能行而願學焉其當先從事於知乎抑當先從事於行乎今夫水人知其能溺火人知其能焚人之不蹈於水火者則以其知之明耳人之知道而能若此其有不行之者乎孟子曰始條理者知之事也又曰不明乎善不誠其身矣言知之在所先也夫子欲發明是義故曰人莫不飲食也鮮能知味也而繼之曰道其不行矣夫夫人孰不飲食而知味者鮮蓋必若易牙而後名為知味耳人之於德莫難於知觀聖人他日言民可使由之不可使知之又言知德者鮮矣則可以見矣不知乎德則不知善之不可不為不知惡之必不可為况望其惟中庸之行乎雖然行之待於知固也而前復言知待於行何歟蓋知其大體則必惟道之是行而理之閎逺微妙事之纎悉委曲容有未盡知者逮其行之久則所造愈深所見益明此知之所以有待於行也晉陵錢氏曰行當為明明當為行文互差智者賢者對愚不肖言之非大智大賢也或過或不及患在不知猶飲食而不知味不知則不明不明則不行故下云道其不行矣夫蔡氏曰言有達德而不能備者也不行者失於仁不明者失於智飲食鮮能知味者失於勇又曰人之所以不能中庸之道者由其德不備也智者賢者既偏於志仁而愚者不肖者又昧於知仁此所以或過或不及而不行不明也然道之在人如飲食之不可廢苟知其味之正則必嗜之而不厭矣又曰言達德而極乎道者欲知本非用不行不明所以當推之用也言達道而及乎德者欲知用由本可知可行所以當反乎本也象山陸氏曰愚不肖者不及焉則蔽於物欲而失其本心賢者知者過之則蔽於意見而失其本心故易大傳曰仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣徇物欲者既馳而不知止徇意見者又馳而不知止故道在近而求之逺道在易而求之難又曰若愚不肖之不及固未得其正賢者知者過之亦未得其正溺於聲色貨利狃於譎詐姦宄梏於末節細行流於髙論浮説其知愚賢不肖固有間矣若是心之未得其正蔽於其私而使此道為之不明不行則其為病一也周道之衰文貌日勝良心正理日就蕪沒其為吾道􅊣者豈特聲色貨利而已哉楊墨皆當世之英人所稱賢孟子之所排斥拒絶者其為力勞於斥儀衍輩多矣所自許以承三聖者蓋在楊墨而不在衍儀也子曰道其不行矣夫鄭氏曰閔無明君教之新安朱氏曰由不明故不行此第五章承上章而舉其不行之端以起下章之意江陵項氏曰人莫不飲食也鮮能知味也子曰道其不行矣夫此復自知言之人誰不行惟其不知則不能以實行也下引舜之大知猶曰古之人有能知者大舜也又曰人皆曰豫知以下此復自言行之人誰不知惟其不行則不能以真知也下引回之為人猶曰古之人有能之者顔子是也子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎鄭氏曰邇近也兩端過與不及也用其中於民賢與不肖皆能行之也孔氏曰此一經明舜能行中庸之行先察近言而後至於中庸也端謂頭緒執持愚知兩端用其中道於民愚知俱能行之河南程氏曰執猶今之所謂執持使不得行也舜執持過不及使民不得行而用其中使民行之也又問此執與湯執中如何曰執只是一個執舜執兩端是執持而不用湯執中而不失將以用之也若子莫執中卻是子莫見楊墨過不及二者之間執之卻不知有當摩頂放踵利天下時當拔一毛利天下不為時執中而不變通與執一無異橫渠張氏曰今人所以不及古人之因此非難悟設此語者蓋欲學者存意之不忘庶遊心寖熟有一日脫然如大寐之得醒耳舜之心未嘗去道故好察邇言昧者日用不知口誦聖言而不知察况邇言一擇則棄猶草芥之不足珍也試更思此説推舜與昧者之分寐與醒之所以異無忽鄙言之邇也又曰只是要博學學愈博則義愈精微舜好問好察邇言皆所以盡精微也藍田吕氏曰舜之知所以為大者樂取於人以為善而已好問而好察邇言隱惡而揚善皆樂取諸人者也兩端過與不及也執其兩端乃所以用其時中猶持權衡而稱物輕重皆得其平故舜之所以為舜取諸人用諸民皆以能執兩端不失中也一本云好問則無知愚無賢不肖無貴賤無長幼皆在所問好察邇言者流俗之諺野人之語皆在所察廣問合乎衆議者也邇言出於無心者也雖未盡合於理義而理義存焉其惡者隱而不取其善者舉而從之此與人同之道也延平楊氏曰道之不行知者過之也故舜以大知之事明之舜好問而好察邇言取諸人以為善也隱惡而揚善與人為善也取諸人以為善人必以善告之與人為善人必以善歸之皆非小智自私之所能為也執其兩端所以權輕重而取中也由是而用於民雖愚者可及矣此舜之所以為大而道之所以行也建安遊氏曰好問而好察邇言求之近也隱惡而揚善取之易也此好善優於天下而為知大矣立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義夫道一而已其立於天下則有兩端故君子有剛克焉執其義之端也有柔克焉執其仁之端也執其兩端而用之以時中此九德所以有常而三德所以用人也以先覺覺後覺以中養不中此舜之所以為舜也其斯以為舜則絶學無為也河東侯氏曰舜所以為大知者以其好問而好察邇言也好問則不蔽不蔽則明察邇言則不惑不惑則聰既聰且明所以能執過不及之兩端而不由用其中於民也隱惡者隱其過不及也揚善者用其中也舜大聖人也何待問察而後能用中乎如曰舜聖人也猶問察以濟其中小知自私苟賢自任其可不學而自蔽乎唯舜能之故曰大知又曰其斯以為舜乎新安朱氏曰此第六章舜之所以為大知者以其不自用而取諸人也邇言者淺近之言猶必察焉則無遺善可知然於其言之未善者則隱而不宣其善者則播而不匿其廣大光明又如此則人孰不樂告以善哉兩端謂衆論不同之極致蓋凡物皆有兩端如大小厚薄之類於善之中又執其兩端而量度以取中然後用之則其擇之審而行之至矣然非在我之權度精切不差何以與此此知之所以無過不及而道之所以行也或問此其稱舜之大知何也曰此亦承上章之意言如舜之知而不過則道之所以行也蓋不自恃其聰明而樂取諸人者如此則非知者之過矣又能執兩端而用其中則非愚者之不及矣此舜之知所以為大而非他人所可及也兩端之説吕楊為優程子以為執持過不及之兩端使民不得行則恐非文意矣蓋當衆論不同之際未知其孰為過孰為不及而孰為中也蓋必兼總衆説以執其不同之極處而求其義理之至當然後有以知夫無過不及之在此而在所當行若其未然則又安能先識彼兩端者為過不及而不可行哉又語録曰舜本自知又能合天下之知為一人之知而不自用其知此其知之所以愈大若愚者既愚矣又不能求人之知而自任其愚此其所以愈愚又問回擇乎中庸舜分上莫不須擇否曰好問好察執其兩端豈不是擇見諸友好論等級不消得且如説聖人生知安行只是行得覺容易如千里馬也是四腳行駑馬也是四腳行不成説道千里馬腳都不動會到千里即是他行覺快而今且學他如何動腳長樂劉氏曰夫知出乎性凡人之所有而舜則謂之大知者以其非止於生知而又聚天下之知以廣其明採天下之視以增其哲攬天下之聰以滋其謀故曰闢四門明四目達四聰也是能興天下之大利弭天下之大害立天下之大法建天下之大中此其所以為大也嚴陵方氏曰莊子曰不同同之之謂大又曰江河合水而為大舜好問好察邇言則能合衆知而與人同矣此所以為大知也言有逺近近者察之逺者可知矣言有善惡惡者不隱則適足以為言者之愧善者不揚則不足以為言者之勸知之大又見乎此凡物之立必有兩端苟執其一非過也則不及矣唯兩端俱執故不及不敢不勉有餘不敢盡而能用中於民也舜之所以為舜者特此數端而已故曰其斯以為舜乎山隂陸氏曰大孝行也大知知也孟子曰自耕稼陶漁以至為帝無非取諸人者然則惟邇言是聽詩何以刺均邇言也而一以為舜一以為幽王者其在聽察之間歟不言所以非所以為舜也據蓋曰文王之所以為文也海陵胡氏曰舜有大知樂與人同為善故好問於人又好察邇近之言有惡不隱則人懷畏忌之心邇言不來矣有善不舉則人不知勸故惡則隱之善則揚之所以來羣言而通下情也又執過與不及兩端之事用大中之道於民使賢知則俯而就愚不肖則企而及也永嘉薛氏曰所惡於知者為鑿也舜好問而好察邇言蓋未始自用而亦不輕信之也邇言猶察况其逺者乎天下之事未有無二端者好問而察邇言遏惡而揚善此執兩端而用其中之道也欲求中而二端之棄吾見其執一而非中也嵩山朝氏曰舜之所以為舜者中庸也明誠兩盡而道教行也莆陽鄭氏曰自用則小集衆人之知以為知則大問也察也皆集衆知也狂夫之言芻蕘之論皆有至理聖人不以其近而易之善察言者也舜樂取諸人以為善人之善猶己之善故善則必揚之人之惡猶己之惡故惡則必隱之恕心所發有自然也天下事端勢必兩立有輕必有重有剛必有柔有寬必有猛有親必有疏各欲適當偏於此則過偏於彼則不及手持權衡所以酌輕重之中心持萬事猶手持權衡也然則兩端各有中此舜所以執之而用之於民也兼山郭氏曰極目力之所視而為明極耳力之所聽而為聰其為聰明也殆矣故聖人兼天下之聰而為聰用天下之明而為明此大舜所以為大知也好問好察邇言隱惡揚善蓋言取諸人者如是也執其兩端用其中於民蓋言用諸人者如是也好問則不蔽於心好察邇言則不蔽於物隱惡揚善所以與物親而無棄物也執者去之之謂舜所以治人其納民於大中之道莫不皆然廣安遊氏曰學不厭智也好問則所謂學不厭也所以為大知以此邇言左右親近之言也化自上而下自近而逺逺者之化於善近者之教也近者之明於善上之人辨之之詳也當舜之時左右所親近者非禹臯陶之徒則共歡之黨也其君臣吁俞都咈之際相與論道有善焉有惡焉此不可以不辨也舜辨其善者行之而日彰日彰則揚所謂揚善也其不善者屏之屏之而日消日消則隱所謂隱惡也又知所以為過不及之故謹守其中用之於民此所謂致中和之道也髙要談氏曰道之不行患在知者過之使知者皆如舜之用中則無惡於知矣義理之言不必髙逺合於人情而易知切於事宜而易行語無藻飾而意己獨至此舜所以尤好察此也若不加察則往往以為淺近而棄之矣凡為惡己熟善心已絶者此真惡人也是無復一善可録棄之可也誅之可也若為惡未熟善心未絶者非真惡人也猶有一言可稱聖人不忍誅棄隱其惡揚其善也聖人以公恕待天下唯恐人之無善可稱也設有一善可稱雖素常為惡聖人猶為之隱也執其兩端用其中於民何也此舜時中也是天理也如此亦中如彼亦中是謂時中時乎如此時乎如彼是謂兩端執兩端即允執厥中之謂也此執兩端爾謂之允執厥中何也曰兩端用中之凖則也執兩端乃聖人權輕重之微意乃所以用其中於民也執中貴知權執中無權猶執一也中道之不行患在執一而不知變是以執兩端執兩端則變通不窮泛應曲當亦如仲尼之無可無不可也聖人之行事至於無可無不可則中之為用博矣故可以損則損可以益則益而禮得其中矣可以剛則剛可以柔則柔而政得其中矣可以因則因可以革則革而為國之法得其中矣推此類行之將無適而非中中之用豈有既乎永康陳氏曰古之知道之味者無如舜故曰大知大知則非知者過之常俯而合中而後民有所賴如好問好察邇言此取諸人以為善也如隱惡而揚善此與人為善者也如執其兩端用其中於民此善與人同者孟子稱大舜有大蓋得諸此執兩端者執而不用所用者惟中耳民協于中豈無自哉新定顧氏曰或疑舜非生知者歟何其資人如此曰舜誠生知者也何害其為資人知資人之為當務斯其所以為生知也新安錢氏曰好問即所聞者廣幽逺無不上達矣而或邇言之不察則未免浸潤膚受之蔽吳興沈氏曰大舜之為大知非徇己也一本於至而已惟舜得夫至以行之故極天下之大全好問則不徇己也察言則不徇人也隱惡則剛亦不吐柔亦不茹也揚善則人之有善若已有之也凡是二端皆天下所難能也舜以此處已而不敢以此望人故執夫好問察言隱惡揚善之兩端於己而用夫可以問或可以不問可以察或可以不察惡可以隱或不必盡隱善可以揚或不必盡揚就二者之中可以使之常行者用之於民舜之所以為大端有在乎此江陵項氏曰舜之大知非強明自用之知也好問而好察邇言隱惡而揚善其好善如此知不足以言之也執其兩端用其中於民不主一説惟善是從其從善如此行不足以言之也此舜所以為大知仁夀李氏曰中庸達德知為先仁次之勇次之舜好問知也回服膺仁也子路問強勇也上章言知者過之愚者不及故此章首言舜之大知以明其無過不及得知之中也帝舜生知之聖宜必有以知夫人之所不能知者中庸獨以好問言之何哉蓋舜之大聖正以其不自用而取諸人耳夫苟自用則一己之知終有所偏不失之過必失之不及其為知小矣舜則自耕稼陶漁以至為帝無非取諸人者合天下之知以為知非大知而何故此章始終専言好問一事以舜之聖而好問於人固為不可及矣至於邇言則言之淺近人所忽者而舜必察之斯又好問之至焉者也邇言未必盡善也略而不問固不可問而不察又不可必加察焉然後善不善有所分未善者不必顯其失也故隱之善者不可匿而不宣也故揚之夫如是則不善者不吾惑而善者無所棄若是可以已乎未也言之善者不徒揚之而已必執其兩端而見之用焉執持也有人焉將任之未可也必參之衆人之言或曰可任或曰不可任此兩端也持其兩端而度其中則人之可任與否見矣有事焉將行之未可也必參之衆人之言或曰可行或曰不可行此兩端也持其兩端而用其中則事之可行與否見矣故知輕重之兩端則見其輕重之中執長短之兩端則見長短之中執厚薄之兩端則見厚薄之中凡事莫不然兩端具而中道見於是乎舉而用之於民然則舜於人之言既問之又察之又擇其善者而揚之及執其兩端得其中而用之片言之長盡為己有天下之知孰加於此舜之所以聰明睿知者不在乎他在是而已故曰其斯以為舜乎蔡氏曰此主智而言也兩端謂邇言之過與不及者執謂執之使不行執與隱義同用與揚義同隱惡揚善主已為言執兩端用中主邇言為言耳子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也鄭氏曰豫我也言凡人自謂有知人使之入罟不知辟也自謂擇乎中庸而為之亦不能久行言其實愚又無恆孔氏曰此一經明無知之人罟網也擭謂柞㮙也陷阱謂坑也穿地為坎豎鋒刃於中以陷獸也言禽獸被人所驅納於罟擭陷阱之中而不知違辟似無知之人為嗜欲所驅入罪禍之中而不知辟也建安遊氏曰定內外之分辨榮辱之境見善如不及見不善如探湯則君子所謂知也今也乘時射利而甘心於物役以自投於苟賤不亷之地是猶納之罟擭陷阱之中而不知避也此於榮辱之境昧矣其能如探湯乎擇乎中庸則知及之矣而不能以期月守則勢利得以奪之也此於內外之分易矣其能如不及乎若是者彼自謂知而愚孰甚焉故繼舜言之以明其非知也延平楊氏曰用知必至於陷險是自驅而納諸罟擭陷阱之中也射利而甘心於物役以自投於苟賤不廉之地是猶納之罟擭陷阱之中而不知辟也不能以期月守則勢利得以奪之也擇乎中庸而不能期月守非所謂知而不去者則其為知也乃所以為愚者之不及也新安朱氏曰此第七章承上章大知而言又舉不明之端以起下章也擭機檻也罟擭陷阱皆所以掩取禽獸者擇乎中庸辨别衆理以求所謂中庸即上章好問用中之事也期月匝一月也言知禍而不知避以況能擇而不能守皆不得為知也臨川王氏曰孔子歎人既以知稱反不能辟羅網陷阱之患是豈足為知哉君子之知則不然守乎中庸之道能周旋委曲俯順天下之情時剛則剛時柔則柔可行則行可止則止素患難行乎患難素夷狄行乎夷狄故禍不能及也宋桓魋欲害孔子而孔子曰天生德於豫唯有德者能受正命則死生豈患之乎又厄於陳蔡而弦歌不衰此見其窮而不困憂而不畏知禍福之終始而不惑者也蓋能守中庸所以然也長樂劉氏曰擇於中庸以為至德力將行之而弗措也踴躍以為得憤發以自強若將終其身然及夫美色悅於前美音悅於後重利搖其心膴仕奪其志情動於中守失於外諂邪諛佞阿黨狠愎凡可利其身快其欲者無所不至心知中庸之美行反中庸之道莫能期月守其素志也始則擇之謂之不知不可也終莫能守謂之知也可乎夫知也者性之所自有也厚於前而薄於後非性也物至無窮欲侈乎內以蝕其厚則其自有者不得不薄矣馬氏曰所惡於知者為其鑿也舜用中於民而順其性命之理所以為知之大也所貴於知者以其見險能辟見善能守也驅而納諸罟擭陷阱之中者害之所易見中庸者善之所易明害之所易見者而莫之知人於其善之所易明者擇之不能期月守其可謂知乎然而擇乎中庸者擇之在己納諸罟擭陷阱之中者驅之在人其在己者不能擇乎中則有制於彼而為人役也海陵胡氏曰人至於殺身辱親如魚獸然為人驅而納諸罟擭陷阱之中而不知避如此又烏得為知延平黃氏曰莫之知辟者不知罟擭之為害也不能期月者不知中庸之為善也不知其為善則不知其為害故不知辟與不知守者皆非有智者兼山郭氏曰道之不明則天下之人蔽於所利而昧於至理是非汨亂吉凶混殽率趨於危亡之途日以泯泯醉生夢死曽不自悟惡覩孔子之所謂中庸者乎子曰吾見蹈水火而死未見蹈仁而死者此之謂也東萊吕氏曰不能擇乎中庸而守之便是納諸罟擭陷阱之中而莫知辟也蓋不入此必入彼也且如行道若知此是坦塗決然自此行去若稍有坎軻崎嶇處必不肯行况明知罟擭陷阱之害乎所以莫知辟者只是見之未明耳若見之果明不待勸勉而自行坦塗矣聖賢只是從安穩處行而已范陽張氏曰人皆用知於銓品是非而不知用知於戒謹恐懼人皆用知於機巧術數而不知用知於喜怒哀樂未發己發之間惟其不留意於戒謹恐懼故雖驅而納諸罟擭陷阱嗜欲貪鄙之中而不自知惟其不留意於喜怒哀樂未發己發之間故雖中庸之理暫見而不能期月守也此篇直指學者用知處故舉舜顔之事以發明之晏氏曰罟擭陷阱人之所以獲禽獸者也知其設險而莫知辟其異於禽獸者幾希雖知擇中庸而不能守者其見善雖明惜乎用心不剛爾髙要談氏曰夫利欲之害能危人能敗人能滅人雖罟擭陷阱之害何以過此而無知之人貪得競取奔趨而不止此無異於自投罟擭陷阱之中而不知辟也於是人欲日肆天理日消為惡之心愈深而為善之心愈薄往往得一善而忽亡之其能期月守乎是人也雖自言豫知然實非真知也使其果真知也夫豈不知罟擭陷阱之不可入而反趨之又豈不知中庸之不可失而反捨之歟霅川倪氏曰以罟擭陷阱言欲其避害也以擇中庸而守言欲其趨善也是以其兩者而對言之錢塘于氏曰由舜之大知而觀天下之自言知不能資人之善以處已而日墮於不善之域不能推一己之善以與人反喪其所守豈不為中庸之罪人乎蔡氏曰知即智也守即仁也言智結上言仁起下仁夀李氏曰此因上章之大知而言衆人之不知也納諸罟擭陷阱之中而莫之知辟是謂不知擇乎中庸而不能守可謂知乎中庸之擇何也辨析衆理而取其中之謂也聖人雖不可以擇言然如上章所云問之察之隱之揚之執其兩端而取之是亦擇之之事也由學者言則博學之審問之慎思之明辨之皆所以擇乎中庸也雖然中不可不擇又不可不守擇而不守終非己物既能擇之又能守之然後可以言知夫子嘗因仁以言知矣擇不處仁焉得知擇而不處謂之知不可也孟子嘗因仁義以言知矣曰知之實知斯二者弗去是也知而去之謂之知不可也夫子之所謂處孟子之所謂弗去中庸之所謂守其義一也禮記集説卷一百二十五
