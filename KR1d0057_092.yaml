body:
  text: 禮記集說卷九十二宋衛湜撰是故樂之隆非極音也食饗之禮非致味也清廟之瑟朱弦而疏越壹倡而三歎有遺音者矣大饗之禮尚𤣥酒而俎腥魚大羮不和有遺味者矣鄭氏曰隆猶盛也極窮也清廟謂作樂歌清廟也朱弦練朱弦練則聲濁越瑟底孔也畫疏之使聲遲也倡發歌句也三歎三人從歎之耳大饗祫祭先王以腥魚為俎實不臑熟之大羮肉湆不調以鹽菜遺猶餘也孔氏曰樂之隆盛在移風易俗非崇鍾鼔之音食饗之禮謂宗廟祫祭在於孝敬非在致美味清廟之瑟謂歌清廟之詩所彈之瑟也朱弦案虞書傳云古者帝王升歌清廟之樂大琴練弦此云朱弦明練之可知也不練則體勁而聲清練則絲熟而弦濁瑟兩頭有孔疏通之使兩頭孔相連孔小則聲急孔大則聲遲弦聲既濁瑟音又遲是其質素初壹倡之時但有三人贊歎之言歎者少也雖然有遺餘之音以其貴在於徳所以有遺音人念之不忘也此覆上樂之隆非極音也大饗之禮案郊特牲云郊血大饗腥此云腥魚故鄭知大饗為祫祭宗廟也尚𤣥酒在五齊之上腥生也雖有三牲而兼載腥魚謂薦血腥之時至薦熟之時皆烹之而熟魚則始末不烹故云俎腥魚并肉湆皆質素之食而大饗設之雖然有遺餘之味人愛之不忘也此覆上食饗之禮非致味也張氏曰樂之盛本在移風易俗非崇鍾鼓之音禮之盛本在安上治民非崇玉帛至味清廟之瑟言樂盛非用極音大饗即食饗也變食言大崇其名故也不尚重味故食言大也此言禮盛不在至味先王制禮作樂本是教訓曉民平於好惡之理使去惡歸善不為口腹耳目之欲令反歸人之正道也長樂陳氏曰徳為禮樂之本禮樂為徳之文樂之隆在德不在音非極五音之鏗鏘而已大饗之禮在德不在味非致五味之珍美而已清廟之瑟為樂之隆則大饗之禮其禮之隆歟清廟而以朱弦疏越之瑟和之使人知樂意所尚非在乎極音者也且得無遺音乎老子所謂大音希聲此也周官大司樂以肆獻祼享先王以饋食享先王蓋羞其肆而酌獻焉則以祼猶生事之有饗也羞其熟而饋食焉則以食猶生事之有食也饗以陽為主而其祭為禘食以隂為主而其祭為祫由是觀之食饗之禮未嘗不致味謂之非致味者豈大饗之禮而誤為食饗歟曲禮大饗不饒富郊特牲曰郊血大饗腥故大饗之禮尊尚𤣥酒俎尚腥魚豆尚大羮貴飲食之本也聖人為禮貴本始以示之使人知禮意所尚非在乎致味者也且得無遺味乎左傳所謂大羮不致此也樂書清江劉氏曰此皆言貴其本而忘其末也遺者忘也棄也清廟之瑟美其德而忘其音大饗之禮美其敬而忘其味凡樂以音為之節而反忘音焉意不主於音也意不主於音是故朱弦疏越乃可尚也凡食饗以味為之文而反忘味焉意不主於味也意不主於味是故𤣥酒大羮乃可尚也主於音則不能遺音不能遺音則雖煩響淫聲有不足矣主於味則不能遺味不能遺味則雖大牢庻羞有不足矣故孔子曰禮樂云延平黄氏曰極音致味以物為音為味也朱弦之有遺音𤣥酒之有遺味以徳為音為味也先王之制禮樂也以極口腹耳目之欲則雖極音致味不足以厭其志而教民平好惡反人道之正則内足而無待乎外矣故雖朱弦之濁疏越之遲三嘆之希𤣥酒之質俎魚之腥大羮之淡足以勝其欲是以先王之制禮樂也務使人以理而後動以節而後作嚴陵方氏曰以樂之隆非極音則凡音之所極者皆樂之殺耳以饗之大非致味則凡味之所致者皆饗之小耳極音則無遺音致味則無遺味矣仲尼燕居曰升歌清廟示德也升而在上則隆之故也瑟堂上之樂君子之所御此清廟之詩所以必播之於瑟也朱弦疏越皆非極音之義倡必有和歌之常也於此則歎之而不和者以言之不足故也是所以有遺音歟大羮以其不和故足為大也於𤣥酒言尚則知腥魚大羮皆在所尚矣於腥魚言俎則知𤣥酒之在尊大羮之在豆矣於大羮言不和則知𤣥酒之不厚腥魚之不熟矣是互相備也有所遺則為不盡矣極與致一也互言之耳前曰食饗後曰大饗又何也饗雖以食為下亦未嘗無食故以食言之然饗之類不一且嫌其非大也故又以大言之延平周氏曰傳曰有聲者有聲聲者有味者有味味者聲之所聲者聞矣而聲聲者未嘗發味之所味者嘗矣而味味者未嘗呈是故清廟之瑟有遺音者貴其未發之音也所謂未發者無音之音也大饗之禮有遺味者貴其未呈之味也所謂未呈者無味之味也山隂陸氏曰一倡而三歎所謂嗟歎之不足故咏歌之於是為至遺猶忘也言造其極者忘其粗也遺音與味其於禮樂可謂眞得矣新安朱氏曰一倡三歎蓋一人倡而三人和也今解者以為三歎息非也慶源輔氏曰三歎謂聞者歎其有遺音也有遺音言弗盡其音也有遺味言弗盡其味也於此有所遺則於彼有所盡矣金華邵氏曰禮樂皆得而謂之徳者豈自外來哉得之於我而非強探力索始可謂徳耳是以樂之隆雖鍾鼔管磬干戚羽籥莫不具陳而非得乎樂者故非極音食饗之禮雖籩豆簠簋醴薦饔餼莫不畢備而非得乎禮者故非致味至文王清廟之瑟聲濁而遲倡者一而歎者三其音蓋有遺矣而後世必貴焉者以文王之瑟有得於樂故音雖不足而徳則有餘也大饗之禮𤣥酒腥魚大羮其味蓋有遺矣而後世必重焉者以大饗之禮有得於禮故味雖不足而徳則有餘也然則禮樂之理豈假於外亦貴其自得於吾身而已是故先王之制禮樂也非以極口腹耳目之欲也將以敎民平好惡而反人道之正也鄭氏曰敎之使知好惡也孔氏曰𤣥酒腥魚大羮是非極口腹也朱弦疏越是非極耳目也敎民均平好惡好者行之惡者避之反歸人道之正也黄氏曰禮樂之制所以平天下之情欲俾各知其分而不萌好惡之心者也洪範云無有作惡遵王之路無有作好遵王之道皆節其好惡之心為王道者也若禮樂失制則王道不行而好惡無節矣譬諸負者小人之事也乘者君子之器也名器失制則小人者不責己愚但心惡其負而好其乘也是故強脅弱衆暴寡奔競無極為大亂之道也若禮樂明備則君子在位小人自知其愚不求僥倖之乘而甘乎負矣如斯則是好惡有節而反人道之正也長樂陳氏曰作好則失仁作惡則失義故平其好所以反之仁平其惡所以反之義易曰立人之道曰仁與義則反仁與義者反人道之正也周官五禮防民之偽而敎之中六樂防民之情而敎之和所謂防民之情偽者平好惡也敎之中和者反人道之正也樂書嚴陵方氏曰飲食以行禮非極口腹之欲歌舞以作樂非極耳目之欲禮以節之則民之好惡平而無過樂以和之則民之好惡平而無乖好得其平則好也人之所同是惡得其平則惡也人之所同非好惡止於一故能反人道之正焉孔子曰唯仁者能好人能惡人夫仁也者人也合而言之道也能好能惡是為人道之正矣馬氏曰先王之制禮樂也不知者以為極口腹耳目之欲極口腹耳目之欲從其小體而已先王之為禮樂將以教民平好惡平之使中其節也反人道之正則非強其所無也使之復其性之本而已慶源輔氏曰人之好惡本無不正也蔽於私奪於氣則不得其平而失其正矣禮所以防其私樂所以平其氣也金華應氏曰民受天地之中以生喜怒哀樂之未發謂之中何往而非正發而皆中節謂之和何往而非平乖戾而失其平則和徳喪偏倚而失其正則中徳虧平其好惡則得其和反人道之正則得其中平者固所以趨乎和正者固所以趨乎中無黨無偏王道平平無反無側王道正直會其有極歸其有極惟平則正矣正則中矣人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣鄭氏曰性不見物則無欲物至知知至來也知知毎物來則又有知也節法度也知猶欲也誘猶道也引也躬猶已也理猶性也孔氏曰自此至道也論人感物而動物有好惡所感不同若其感惡則天理滅為大亂之道故下文明先王所以制禮樂而齊之也外物旣來每一物來則心知之會意則好愛之不會意則嫌惡之是好惡形也好惡恣己之情是無節於内所欲之事道誘於外外見所欲心則從之是知誘於外也不能自反而禁止則天性滅絶矣河南程氏曰不能反躬天理滅矣天理云者百理俱備元無少欠横渠張氏曰謂天性静則何常静謂之動則何常動天性難專以静言無物非天性靜也感之而動氣之性也何謂氣之性人須氣以生其性即氣之性也感者必待有物則有所感無物則何所起喜怒好惡去取莫非因物而有知知猶言能知能知其知則好惡形焉長樂陳氏曰人生而静書所謂惟民生厚也有不為天之性乎感於物而動書所謂因物而有遷也有不為性之欲乎史遷以性之動為性之順誤矣夫道有君子必有小人性有善必有惡知惻隠之為仁羞惡之為義是非之為知辭讓之為禮此知性之本也知耳之欲聲目之欲色鼻之欲臭口之欲味此知性之欲也知性之本循而充之為君子知性之欲循而充之為小人樂書嚴陵方氏曰性稟扵天静而無欲物自外至而入吾可知之域得所欲則在所好非所欲則在所惡而好惡形焉知知者知其所知也然心知其為好而好之知其為惡而惡之所謂好惡特未定也知誘扵外則逐物逐物則不能反躬沈扵人為而天理滅矣馬氏曰人生而静則無知也物之至然後知之順其心則好逆其心則惡好惡無節扵内則在内之志誘扵在外之物不能反躬以復其性之本而天理扵是滅矣然則所謂知者非眞知也所謂欲者非可欲也所謂動者非動而中節也所知非真知則所欲非可欲也欲非可欲則其動亦不能中其節也延平周氏曰靜則為性性則情之未發者也動則為情情則性之己發者也山隂陸氏曰物至而知所謂知則所謂真者鑿而好惡形矣列子曰無樂無知是真樂真知廬陵胡氏曰欲情也董生曰情者人之欲也禮運云喜怒哀樂愛惡欲謂之七情易取扵艮其背者背則不見可欲也知知所知者多也人病以多知為雜理猶道也鄭謂理情也案易說卦云窮理盡性則理性各别新安朱氏曰人生而靜以上不容說人生而靜以上即是人物未生時人物未生時只可謂之理說性不得此所謂在天曰命也纔說性時便已不是性纔謂之性便是人生以後此理已墮在形氣之中不全是性之本體矣此所謂在人曰性也大抵人有此形氣則是此理始具於形氣之中而謂之性纔說是性便已涉乎有生而兼乎氣質不得為性之本體也然性之本體元未嘗離亦未嘗雜要人就此上靣見得其本體原未嘗離亦未嘗雜耳凡人說性只是說繼之者善也言性不可形容而善言性者不過即其發見之端而言之而性之理固可黙識矣如孟子言性善與四端是也未有形氣渾然天理未有降付故只謂之理已有形氣是理降而在人具於形氣之中方謂之性已渉乎氣矣便不能超然專說得理也程子曰天所賦為命物所受為性又曰在天曰命在人曰性是也又曰人生而靜天之性也感於物而動性之欲也此言性情之妙人之所生而有者也葢人受天命之中以生其未感也純粹至善萬理具焉所謂性也然人有是性則有是形有是形則有是心而不能無感於物感於物而動則性之欲者出焉而善惡於是乎分矣性之欲即所謂情也又曰物至知知然後好惡形焉此指情之動處為言而性在其中也物至而知知之者心之感也好之惡之者情也形焉者其動也所以好惡而有自然之節者性也好惡無節於内知誘於外此言情之所以流而性之所以失也情之好惡本有自然之節唯其不自覺知無所涵養而大本不立是以天則不明於内外物又從而誘之此所以流濫放逸而不自知也茍能於此覺其所以然者而反躬以求之則其流庶乎其可制也不能如是而唯情是徇則人欲熾盛而天理滅息尚何難之有哉此一節明天理人欲之機間不容息處唯其反躬自克念念不忘則天理益明存養自固而外誘不能奪矣延平黄氏曰喜怒哀樂之未發謂之中發而皆中節謂之和靜而中者性之正也動而和者情之正也好惡無節扵内知誘扵外無中為之主故也莊子曰以有涯隨無涯殆己巳而為知者殆而已矣夫用無涯之知應無窮之感生無節之好惡則天理滅矣孟子曰萬物皆備於我矣反身而誠樂莫大焉不能反躬而誘扵外為樂此天理所以滅也廣漢張氏曰感物而動性之欲也言亦性所有也而其要係乎心君宰與不宰耳心宰則情得其正率乎性之常而不可以欲言矣心不宰則情流而陷溺其性專為人欲矣又曰反躬之義深矣好惡無節扵内則知為物誘心不宰而情徇扵物矣故貴扵反躬焉反躬而求之則夫生而靜者卓然而可見而萬理可得而窮矣平日致知力行無非反躬之功也慶源輔氏曰因上禮樂敎民平好惡故此推人好惡所由生反躬謂反之扵心也變性言理善言性也滅謂湮滅之實未嘗忘也金華邵氏曰感物而動性始有欲欲非情欲逸欲之欲性而無欲則槁木死灰耳率性之謂道從何出哉孔子曰我欲仁盃子曰可欲之謂善書曰惟天生民有欲果情欲逸欲之謂乎所謂物者亦豈外物哉感君臣而敬感父子而親之類耳然性非自能有欲也物至於吾前吾之知足以知之故所喜則好所怒則惡其欲遂形欲雖形矣當此之時乃邪正未分之時苟作好惡無節於内而吾之知又為物誘於外則流蕩忘反而天理滅矣天理即人道之正也夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也於是有悖逆詐偽之心有淫泆作亂之事是故強者脅弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤獨不得其所此大亂之道也鄭氏曰窮人欲言無所不為孔氏曰物既衆多感人無有窮己所好所惡無有法節物善則人善物惡則人惡是人化物也人旣化物逐而遷之恣其情欲故滅其天生清靜之性而窮極人所貪嗜之欲也知者欺詐愚人勇者困苦怯者疾病者心所嫌惡不收飬之老幼孤獨無有哀矜者故不得其所也横渠張氏曰窮人欲則心無虚須立天理人心者人欲道心者天理窮人欲則滅天理旣無人欲則天理自明明則可至於精微謂之危則在以禮制心又曰滅天理而窮人欲今當復反歸其天理古之學者便立天理孔孟而後其心不傳如荀楊皆不能知長樂陳氏曰天理滅則人之良心亡矣彼生於其心者安得無悖逆詐偽者乎人欲窮則人之美行喪矣彼發於其事者安得無淫佚作亂之事者乎夫然則弱者無所恃而為強者之所脅寡者無所附而為衆者之所暴愚者無所施而為知者之所詐怯者無所立而為勇者之所苦疾病不養而其政散老幼孤獨不得其所而其民流非大治之道也豈足以同民心哉自好惡無節扵内至滅天理而窮人欲不能平好惡之患也自有悖逆詐偽之心至老幼孤獨不得其所不能反人道之正之患也由是觀之先王之扵禮樂刑政獨可已乎樂書延平周氏曰孟子曰耳目之官不思而蔽扵物物交物則引之而已矣謂其蔽扵物則我亦物也我亦物則以物而交物者也以物而交物則天理所以滅而人欲所以窮也天理滅人欲窮大亂之道也嚴陵方氏曰物之感人自外入而無窮人之好惡由中出而無節則非所謂物物而不物扵物者矣故曰物至而人化物也人為物所化則滅自然之天理窮使然之人欲而不反矣天下之亂莫大扵此故曰大亂之道馬氏曰君子為能役物物至而化者是役扵物者也李氏曰夫役於物則失其精義逐於物則喪其利用而化於物者言其成於漸也孟子曰交於物傳曰習於性成夫人之於物也始於交至於化而終於成夫物有外有内得於内者内物也動於外者外物也能無失其良心則不汨其内物操其常心則不動於外物詩曰天生烝民有物有則所謂内物也書曰惟民生厚因物有遷所謂外物也孟子曰物交物則引之而已言内之物交乎外之物也夫所謂不能反躬者舎其常心也好惡無節於内者失其良心也新安朱氏曰物之感人無窮而人之好惡無節此說得工夫極密兩邊都有些罪過物之誘人固無窮然亦是自家好惡無節所以被物誘去若自有主宰如何被誘去此處極好玩味且是語意渾粹又曰上言情之所以流此以其流之甚而不返者言之也好惡之節天之所以與我也而至於無宰制萬物人之所以為貴也而反化於物焉天理唯恐其存之有未至也而反滅之人欲唯恐其制之不力也而反窮之則人之所以為人者至是盡矣然天理秉彛終非可殄滅者雖化物窮欲至扵此極苟能反躬以求則天理之本然者初未嘗滅也但習染已深難覺而易昧難反而易流非厲知恥之勇而致百倍之功則不足以復其初耳慶源輔氏曰是故君子先立乎其大者則其小者不能奪也天下固未有大扵心者自強者脅弱至孤獨不得其所皆所謂滅天理而窮人欲也反此則天理也故文王發政施仁必先斯四者是故先王之制禮樂人為之節衰麻哭泣所以節喪紀也鍾鼓干戚所以和安樂也昏姻冠笄所以别男女也射鄉食饗所以正交接也鄭氏曰人為之節言為作法度以遏其欲也男二十而冠女許嫁而笄成人之禮也射鄉大射鄉飲酒也孔氏曰人為猶為人也言制禮樂為人作法節也食饗饗食賔客也凡此皆是正交接之節不使相陵越也張氏曰言制禮樂以節於人衰麻以下並是陳禮樂節人之事也長樂陳氏曰居喪以哀為主其發於衣服容體則斬衰三升而其貌若苴至緦麻十五升而去其半容貌可也其發於言語聲音則斬衰唯而不對其哭若往而不反至緦麻議而不及樂所以節喪紀者如此有文事必有武備有武事必有文備故鍾鼓以聲文事干戚以容武事所以和安樂者如此婦曰昬夫曰姻二姓之好自此和室家之道自此正所以别男女之親也男娶以三十則參天之陽數女嫁以二十則兩地之隂數則陽數者必成以隂故始之以二十之冠則隂數者必成以陽故始之以十五之笄所以别男女之成也諸侯之射先行燕禮卿大夫之射先行鄉飲酒禮旌以詔之鼓以節之扑以戒之定其位有物課其功有筭使人存爭心於揖讓之間奮武事於燕樂之際徳行由是可觀齒位由是可正所以正交接於鄉黨也食以養隂而食在所主焉饗以養陽而飲在所主焉故諸侯饗禮七獻食禮七舉而諸伯如之諸子饗禮五獻食禮五舉而諸男如之禮事相於世婦樂事序於樂師所以正交接於賔客也然亂多而刑五治多而禮五故天之所秩不過五禮有庸而已由是觀之節喪紀而使之不過者凶禮也和安樂而使之不乖者吉禮也别男女而使之不雜者嘉禮也正交接而使之不瀆者賔禮也不言軍禮者舉干戚與射以見之樂書嚴陵方氏曰人為之節者因人而制為之莭也因人之有喪紀也故制為衰麻哭泣以莭之因人之有安樂也故制為鍾鼔干戚以和之以至昬姻冠笄之於男女射鄉食饗之於交接亦若是而已且制禮所以為之莭也樂則所以為之和也緫曰為之節者蓋樂雖和而不流是乃為之所以節也以至别男女正交接亦無非節而已喪在彼也而我以禮數紀之故謂之喪紀衰麻有重輕之節焉哭泣有多少之節焉扵樂舉鍾鼓以見管籥扵舞舉干戚以見羽旄安則無危樂則無憂和則可否相濟之謂也和其安則安不至扵怠和其樂則樂不至扵流昏姻所以别男女之名冠笄所以别男女之服延平黄氏曰先王為人化物然後制禮樂人莫不有禮樂之實而無化物者則天下自有禮樂矣先王安用制哉及其化物非特滅天理也偽禮偽樂又從而乗之故先王之制禮樂也原天地之美達萬物之理恩有厚薄禮有隆殺麻所以節其文泣所以節其情新安朱氏曰人為之節言人人皆為之節也金華邵氏曰先王制禮樂以為防閑之具則人道正而天理還制為衰麻哭泣則喪紀不失人道之正制為鍾鼓干戚則安樂不失其正昏姻冠笄則男女之道正射鄉食饗則交接之道正此以上皆明禮樂之意如此禮節民心樂和民聲政以行之刑以防之禮樂刑政四逹而不悖則王道備矣孔氏曰禮有尊卑上下所以裁節民心樂有宫商角徴羽及律呂所以調和民聲政謂禁令用禁令以行禮樂也不行禮樂則以刑罰防止之四事通達流行而不悖逆則王道備具矣長樂陳氏曰帝道成於虞王道備於周周之時禮掌於宗伯樂掌於司樂政掌於司馬刑掌於司冦以謂化民於未偽之前者在禮樂而不在刑政治民於己偽之後者在刑政而不在禮樂四者交達順理而不悖則王道備而無闕矣禮樂譬則陽也刑政譬則隂也隂積於無用之地不時出以佐陽則天道不成刑政委於不急之務不時用以佐禮樂則王道不備然則急刑政緩禮樂其霸道歟禮自外作而節民心以外節内也與書以禮制心同意樂由中出而和民聲以内和外也與書以義制事同意樂書嚴陵方氏曰禮以道其志然後能節民心樂以和其聲然後能和民聲政以一其行然後能行禮樂之道刑以防其姦然後能防禮樂之失四者如是則無所不達無所不達則無所不順無所不順之謂備前言出治道則四者之始也此言王道備則四者之終也既曰道其志又曰節民心蓋禮達而分定禮達則所謂道其志也分定則所謂節民心也馬氏曰禮者齊人之外而亦所以節扵中故禮節民心樂者導民之心而亦所以和扵外故樂和民聲禮樂者為治之本也政以行之恐其有所偏也刑以防之防其不帥扵禮樂也此與上之言雖不同而其實則一也先王為治之大要莫出扵斯四者故禮樂刑政四達而不悖則王道備矣金華邵氏曰用禮樂者先王之本意間有不循吾化而越禮棄樂者則有政焉以使之必行有刑焉以防其或違樂者為同禮者為異同則相親異則相敬樂勝則流禮勝則離合情飾貌者禮樂之事也鄭氏曰同謂協好惡異謂别貴賤流謂合行不敬也離謂析居不和也合情飾貌欲禮樂並行斌斌然也孔氏曰從此以下為樂論此章凡四段自此至民治行矣為第一段論樂與禮同異同謂上下同聽莫不和恱也異謂尊卑各别恭敬不等也無所間别故相親有所殊别故相敬樂勝則流禮勝則離明雖有同異而又有相須也勝猶過也樂過和同而無禮則流慢無復尊卑之敬禮過殊隔而無和樂則親屬離析無復骨肉之愛唯禮樂兼有所以為美合情謂樂也樂和其内是合情也飾貌謂禮也禮以檢跡於外是飾貌也二者無偏是禮樂之事也河南程氏曰禮勝則離故禮之用和為貴先王之道斯為美小大由之樂勝則流故有所不行知和而和不以禮節之亦不可行也長樂劉氏曰樂和上下所以為同禮别尊卑所以為異同則逺邇欣合故相親異則大小適宜故相敬相親而無節則流蕩而忘返相敬而無節則離析而不通是故合和天下之情以為同者樂之事也賁飾萬民之貌以為敬者禮之事也長樂陳氏曰樂主和而為同凡天下所謂同者麗焉禮主别而為異凡天下所謂異者麗焉周官大司徒以樂禮敎和以儀辨等記曰仁近於樂義近於禮敎和則其仁足以相親而不乖辨等則其義足以相敬而不越二者不可偏勝也詩曰好樂無荒戒其流也易曰履和而至戒其離也樂者為同而有異焉故樂雖合愛未嘗不異文禮者為異而有同焉故禮雖殊事未嘗不合敬要之樂同禮異者特其所主爾樂書延平黄氏曰可以相勝者仁義也故厚於仁而薄於義則親而不尊厚於義而薄於仁則尊而不親不可以相勝者禮樂也故曰樂勝則流禮勝則離仁義相勝則相治禮樂相勝則相賊相親以其有情相敬以其有分禮樂之同異正也而使之相勝則非禮樂之正矣故情勝分則流分勝情則離樂於内合情禮於外飾貌内外不相勝而後為禮樂之事禮者理也而行禮者義也樂者情也而稱情者文也下文上下和與夫爵舉賢者所謂仁以愛之也貴賤等與夫惡不肖刑禁暴者所謂義以正之也嚴陵方氏曰同則有情以相親異則有貌以相敬然能同而不能異則樂勝於禮其和至於流矣能異而不能同則禮勝於樂其體至於離矣禮樂不相勝而無流離之患則能事畢矣故曰禮樂之事也馬氏曰同則有恩以相愛故相親異則有文以相接故相敬流者無所止離則失其所附禮樂之道貴其並行而不隆於所獨也新安朱氏曰禮勝則離樂勝則流好就勝字上看只爭這些子禮纔勝些子便是離了樂纔勝些子便是流了知其勝而歸之中即是禮樂之正又曰嚴而泰和而節建安真氏曰禮屬隂凡天地間道理一定而不可易者皆屬隂樂屬陽凡天地間流行轉運者皆屬陽禮樂之不可闕亦如隂陽之不可偏勝一嵗之間寒暑之相易雨露霜雪之相濟方能氣候和平物遂其生陽太勝則亢而為旱隂太勝則溢而為水有隂無陽則物不生有陽無隂則物不成禮勝則太嚴而不通人情故難合樂勝則太和而無所限節而流蕩忘返所以有禮須用有樂有樂須用有禮此禮樂且是就性情上說然精粗本末亦初無二理慶源輔氏曰樂者所以合人之和禮者所以辨人之分和合則相親分辨則相敬有以合其情而無以飾其貌則樂勝而流矣有以飾其貌而無以合其情則禮勝而離矣合情飾貌禮樂之事也二者闕一則不可金華應氏曰同異者禮樂之理親敬者禮樂之效流離者禮樂之偏内合其情而相與交致其親敬外飾其貌而不使偏勝扵流離此禮樂之見扵事為者禮義立則貴賤等矣樂文同則上下和矣好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣鄭氏曰等階級也孔氏曰義宜也禮得其宜則貴賤各有階級文謂聲成文也樂文諧同則上下自和所好得其善所惡得其惡則賢不肖自分别矣用刑罰禁止暴慢用爵賞以舉賢良則政教均平矣用仁以愛民用義以正惡則民治行矣此經凡五事也張氏曰言禮樂刑政旣均又須仁以愛民義以正民如此則民順理正行矣長樂劉氏曰禮之為義立於民心則貴賤雖殊而莫敢以為不等也樂之為文同於天下則尊卑雖異而莫敢以為不和也是以用禮樂以尊崇之者示之以天子之所好也用禮樂以䟽逺之者示之以天子之所惡也好惡著於天下則賢不肖有别而民得逺罪矣故暴於禮樂之俗者必有刑以禁之賢於禮樂之俗者必有爵以旌之仁以愛之謂樂以和其心也義以正之謂禮以方其行也溥天之下莫不如此則民治行矣長樂陳氏曰禮粗而顯而以義微之樂妙而幽而以文闡之故禮非義立則貴賤之位不等樂非文同則上下之情不和天尊地卑而君臣定卑髙已陳而貴賤位禮義立則貴賤等之謂也節奏合而成文父子以之和親君臣以之和敬樂文同則上下和之謂也因禮樂以好惡則好惡著而賢不肖别矣刑以禁暴與衆棄之也爵以舉賢與士共之也因好惡以施刑爵則人人勸賞畏刑而政均矣爵以舉賢仁不可勝用也刑以禁暴義不可勝用也仁以立人而有以愛之義以立我而有以正之則禮樂刑政四達而不悖固足以同民心出治道而民治不行未之有也前言政以一其行刑以防其姦此兼刑以為政何哉曰孔子將為政於衛嘗謂禮樂不興則刑罰不中子張問政於孔子則對之明於禮樂而已是禮樂者政之本刑罰者政之助以刑為政古人有之而非所以先之也樂書延平周氏曰合情者樂之事飾貌者禮之事禮之義既立則貴賤有等樂之文旣同則上下能和有禮有樂所以平好惡故好之著則所好者賢惡之著則所惡者不肖此賢不肖所以别惡之必至於刑故刑以禁不肖好之必至於爵故爵以舉賢有威有福則政之所均自好之至於爵仁以愛之也自惡之至於刑義以正之也如此則民治行矣嚴陵方氏曰貴賤以位言故曰等上下以情言故曰和扵禮言義扵樂言文扵禮言貴賤扵樂言上下互相别也然上言不肖而下言暴者蓋不肖雖為可惡然未至於可刑必至於暴然後有刑以禁之也馬氏曰禮義立則貴賤等公以七為節侯伯以五為節子男以三為節此等之之迹也樂為同故樂文同則上下和君臣上下同聽之莫不和敬此和之之類也扵禮言義扵樂言文言義則有數言文則有情言文而不言情言義而不言數互文以見意也義者禮之本故言立樂者八音克諧故言同好惡當其實則賢不肖有别自貴賤等以至扵政均其為治畧具矣而猶未盡也又有仁以愛之義以正之故民治行矣於王道行則止言禮樂刑政而於民治行則不止於禮樂刑政而又益之以仁義者蓋王道備則為治之畧民治行則為治之詳上言政而又言刑此則兼刑以為政者蓋合而言之則政刑一也分而言之則刑與政異矣山隂陸氏曰所謂導之以禮樂而民和睦示之以好惡而民知禁有以禁之又有以舉之是之謂均所謂民治仁義而已非所與論於仁義之外也李氏曰夫禮之所以為異者以其數也樂之所以為同者以其情也數必存乎義情必見乎文故曰禮義立則貴賊等矣樂文同則上下和矣樂之道為明為出為愛為變為息而屬乎陽禮之道為幽為入為殺為化為消而屬乎隂屬乎陽者於人為好於政為爵於治為仁屬乎隂者於人為惡於政為刑於治為義故曰好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣慶源輔氏曰禮之義立則貴賤有等樂之文同則上下相和同亦和也貴賤有等矣上下相和矣然人之賢不肖終不能無也賢者好之不肖者惡之則賢不肖分别而刑政所由生也刑以禁暴則非作惡也爵以舉賢則非作好也刑賞不以私意而一循公理則其政均平而無偏陂前止言禮樂刑政之用此又言刑政之所由生也禮樂刑政即是仁義之事後又緫言之也如此謂如上所言者也行即達也民治行謂治民之道達於下也金華邵氏曰此又申言相親相敬之事必有仁義刑政以輔之治不偏於一而後可行於天下猶前言禮樂刑政四達則王道行也夫禮者義之實義既立則貴賤有等樂者文以五聲文既同則上下無不和然貴賤不徒等必也明其好惡使賢不肖有别上下不徒和必刑爵以禁暴舉賢而使其政均一旣有仁以致其愛復有義以正其過如此則治達於下無有壅而不行者然禮樂者治之本而刑政所以輔之歟金華應氏曰等所以辨異和所以統同好惡者心之取舎也刑爵者政之勸懲也合和其仁也等辨其義也好賢而爵舉之仁也惡不肖而刑禁之義也言禮樂與政而刑包其中蓋别而言之禮樂亦所以為政也前以刑政輔禮樂而曰王道備言其為治之具也此以仁義别禮樂而曰民治行言其為治之效也樂由中出禮自外作樂由中出故靜禮自外作故文大樂必易大禮必簡鄭氏曰由中出和在心也自外作敬在貌也文猶動也易簡若於清廟大饗然孔氏曰自此至禮行矣為樂論第二段明禮樂自内自外或易或簡天子行之得所則樂達禮行也樂從心起在心故静禮肅人貌貌在外故云動也大樂必易朱弦䟽越是也大禮必簡𤣥酒腥魚是也張氏曰出猶生也為人在中和有未足故生此樂作猶起也為人在外敬有未足故起此禮横渠張氏曰禮自外作故文與孟子義内之說相似蓋孟子方辨道故其言得造深作記者非不知内者據粗淺言之事簡則誠是易從然而後世之禮簡而至於無矣故必崇禮古人於禮亦為常事故其為之也亦易禮樂簡易亦有此理長樂劉氏曰樂由中出則復其自然之性所以靜也禮自外作則除其詐偽之心所以文也大樂必易者以言其與上下同樂也大禮必簡者以言其與貴賤同安也長樂陳氏曰方陽之復也雖動而靜此樂由中出所以為靜也方隂之出也雖靜而動此禮自外作所以為文也易言乾之靜專坤之為文如此而已言靜則知文之為動言文則知靜之為質人之心也静而與物辨則在性而質動而與物雜則在貌而文原樂之始則静而已及要終焉未始不動乎外也要禮之終則文而已及原始焉未始不中正以為質也夫乾天下之至健其徳行常易以知險坤天下之至順其徳行常簡以知阻樂作自乎天其来自乎陽其所以著者在於太始未嘗不與乾同徳焉此大樂所以必易也禮制自乎地其作自乎隂其所以居者在於成物未嘗不與坤同徳焉此大禮所以必簡也大樂之易大禮之簡言必者不易之理也樂書嚴陵方氏曰由中出則天作之也天無聲無臭所以為静自外作則地制之也地有剛有柔所以為文基命宥密為無聲之樂此非其靜歟大禮物博而多之為美此非其文歟延平黄氏曰樂者樂也徳也故由中出而外設者其文也禮者履也行也故自外作而中立者其本也外作於貌故文内出於性故静又曰大樂所樂者性也故易大禮所履者理也故簡簡者禮之至也易者樂之至也易則無險阻故無怨簡則無紛辨故不爭大禮大樂之世所樂者正性所履者眞理則吾復何為哉此所以揖遜而天下治又曰大樂所樂者性也故易大禮所履者理也故簡先王之制禮樂也豈其私意哉禮制其性之中樂制其情之和而已由性之中制禮以致其中由情之和作樂以致其和然後天位乎上以生地位乎下以成而人位乎其中以贊之大樂之易大禮之簡天下之理存乎先王以禮樂合天地之化百物之産則成位乎其中矣延平周氏曰樂由中出文在於外禮自外作本在於中所謂由中出者言其自然也所謂自外作者言其使然也以其自然故靜以其使然故文樂由天作故易此大樂所以有遺音也禮以地制故簡此大禮所以有遺味也慶源輔氏曰樂由中出原其始也禮自外作論其形也原其始則樂本於静論其形則禮必有文静則必形於動文則必有其本自静而為動故易自文而反本故簡講義曰静者謂樂未出之初人心未感物之時寂然而已及其為樂則聲音由静而生耳樂既本静則當求之於靜矣文者謂威儀三千其始安得有此以其形於外故有如此之文禮之本不在文則不當求之於文矣是以大樂必易大禮必簡金華邵氏曰禮樂皆天理也而曰禮自外作何哉使禮果自外作荀卿子所謂偽者矣於禮何取曰樂由中而出於外也禮自外作自外而作夫内也外有所為必出於中而有本中有所藴必作於外而可形學者詳繹出與作之義則思過半矣惟由中而出於外故陽而不散隂而不密剛氣不怒柔氣不懾姦聲亂色不留聦明淫樂慝禮不接心術傲慢邪辟之氣不設於身體耳目鼻口心知百體皆由順正而其用則靜蓋中之静形於外亦靜也惟自外而作夫内則升降上下周旋裼襲隆殺等威經而為三百曲而為三千而其用則文蓋外之文所以作夫中之文也然則禮樂果有内外之辨哉又曰中出而靜外作而文此禮樂之用也必易必簡又推其本而言之大樂者性之和大禮者性之中以一性之和為樂則和之外無他事如清廟之瑟豈不易乎以一性之中為禮則中之外無煩文如大饗之禮豈不簡乎金華應氏曰樂之和藴於心由中出者和氣之鬱積充溢而流動於外也禮之敬動於容自外作者威儀之周旋設飾而矯揉於内也静者言樂止其所雖鏗鏘備舉而中之純一者不可散也文者言禮備其節雖莊敬純實而外之設飾不可略也蓋樂和而易於流故雖動而必主乎静禮嚴而易以倦故雖質而必飾以文四肢百體皆由順正樂之静也禮儀三百威儀三千禮之文也樂出於虚愈出而愈静禮飾其實愈飾則愈文此所以不同易以心言簡以事言心和則易而順事敬則簡而略大猶重也樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也暴民不作諸侯賔服兵革不試五刑不用百姓無患天子不怒如此則樂達矣合父子之親明長幼之序以敬四海之内天子如此則禮行矣鄭氏曰至猶達也行也賔服賔協也試用也孔氏曰樂行於人由於和故無怨禮行於民由於謙故不爭民無怨爭則君上無為但揖讓垂拱而天下自治其功由於禮樂故曰禮樂之謂也暴民凶暴之民不作不動作也天子如此則禮行者言天子若能使海内如此則是禮道興行也樂云達禮云行者互文也長樂陳氏曰樂不至不可以言極和禮不至不可以言極順内極和則不乖於心何怨之有外極順則不逆於行何爭之有樂以治内為同禮以脩外為異同則相親而無怨異則相敬而不爭通而言之禮亦可以無怨樂亦可以不爭故經言樂則曰瞻其顔色而民不與爭禮器言禮則曰内諧而外無怨也周道之衰民之無良相怨一方則樂不至可知受爵不讓至于己斯亡則禮不至可知暴民不作於下諸侯賔服於上大則兵革不試小則五刑不用百姓無患而有所謂和天子不怒而有所謂威如此則樂無不逹矣父子天性也有以合其親長幼天倫也有以明其序敬四海之内則立愛自親始而民睦立敬自長始而民順徳敎加于百姓刑于四海而禮無不行矣樂書嚴陵方氏曰至則無以復加之謂也天下之心無怨爭則天下有所不足治者矣暴民不作則諸侯賔服諸侯賔服則兵革不試五刑不用兵革不試五刑不用然後百姓無患天子不怒故其序如此此皆和之所致故曰如此則樂達矣父子固有親矣禮則合之長幼固有序矣禮則明之父子得其親長幼得其序四海之内豈有相慢易者哉故曰以敬四海之内言四海之内皆相敬此皆莭之所致故曰如此則禮行矣山隂陸氏曰樂至則無怨若神罔時怨神罔時恫是也禮至則不爭若虞芮質厥成文王蹶厥生是也天子不怒當曰天下不怒以天子言禮以天下言樂相備也以敬四海之内所謂予視天下匹夫匹婦能勝予是也廬陵胡氏曰樂至則無怨禮至則不爭此明堯舜之揖讓異乎後世之戰爭禮至樂至謂躬行之至此云樂達禮行謂施乎天下之盛慶源輔氏曰至可以兼達與行達與行不足以盡至之義也唯至故可以達可以行亂世之音怨以怒則樂亦有怨者也然非樂之至滕薛爭長子産爭承則禮亦有爭者也然非禮之至極禮樂之至則堯舜之事是也固不可分别而言之矣故曰其極一也樂達言其終也禮行言其始也樂欲達之扵下故以天下言樂禮欲率之扵上故以天子言禮陸氏之說善矣然亦非相備而已金華應氏曰四海之内一句恐在合字上禮記集說卷九十二
