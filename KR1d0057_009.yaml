body:
  text: 禮記集說卷九宋衛湜撰外事以剛日內事以柔日凡卜筮日旬之外曰逺某日旬之內曰近某日喪事先逺日吉事先近日鄭氏曰順其出外為陽順其居內為隂旬十日也喪事葬與練祥也吉事祭祀冠取之屬也孔氏曰自此至踐之一節明卜筮及用日之法外事郊外之事內事郊內之事十日有五竒五偶甲丙戊庚壬五竒為剛乙丁己辛癸五偶為柔然郊天在國外應用剛日而郊特牲云郊之用辛又社稷是郊內應用柔日而郊特牲云祀社日用甲者郊社尊不敢同外內之義自郊社之外則皆用之祭社用甲而召誥用戊者召誥是告祭非常禮也郊之用辛者惟夏正郊天及雩大享明堂耳若圜丘自用冬至日五時迎氣各用其初朔之日不皆用辛凡先聖王所以立卜筮者所以使民信時日也必用蓍龜者劉向云龜千嵗而靈蓍百年而神以其長久故能辨吉凶也說文云蓍蒿屬生千嵗三百莖洪範五行傳云蓍生百年一本百莖論衡云七十年生一莖神靈故生遲史記曰滿百莖者其下有神龜守之上有雲氣覆之淮南子云卜筮實問於神龜筮能傳神命以告人案易繫辭云定天下之吉凶莫大乎蓍龜據此文蓍龜知靈相似無長短也左傳筮短龜長乃大史史蘇欲止晉獻公娶驪姬託言云耳鄭康成注占人云占人亦占筮言掌占龜者筮短龜長主於長者是鄭亦以龜筮為有長短也凡卜筮者若大事則卜筮並用皆先筮後卜見周禮筮人若次事則唯卜不筮小事則無卜唯筮天子既爾諸侯亦然但春秋亂世皆先卜後筮然尚書先云龜從者以尊卑言之也鄭注周禮云筮凶則止不卜而洪範有筮逆龜從者崔靈恩云凡卜筮天子皆用三若三筮並凶則止鄭云若一吉一凶雖筮逆猶得卜之洪範所云是也大夫士則大事卜小事筮旬之外曰逺某日者案少牢大夫禮今月下旬筮來月上旬是旬之外日也主人告筮者云欲用逺某日此謂大夫禮旬之內曰近某日者案特牲士禮云不諏日注云士賤職䙝時至事暇可以祭則筮其日是士於旬初即筮旬內之日是旬之內日也主人告筮者云用近某日此據大夫士有旬內旬外之日若天子諸侯其有雜祭或用旬內或用旬外其辭皆與此同喪事謂葬與二祥是奪哀之義非孝子所欲但制不獲已故卜先從逺日而起宣八年左傳云卜葬先逺日辟不懷也謂不思親也先逺日謂如今月下旬先卜來月下旬不吉卜中旬不吉卜上旬吉事謂祭祀冠昏之屬故少牢云若不吉則及逺日又筮日如初是先近日也馬氏曰辰以日為母日以甲為子剛柔在日不在辰剛則陽而主外師田外祭之類外事也故用剛日詩吉日戊午春秋壬午大閲甲午治兵是也柔則隂而主內冠昏內祭之類內事也故用柔日儀禮少牢饋食用丁巳春秋己卯蒸乙酉吉禘于莊公丁丑作僖公主丁卯大事于太廟辛巳有事於太廟辛巳立武宫癸酉有事于武宫丁丑夫人姜氏入是也士虞禮始虞用柔日三虞卒哭用剛日何也曰內事外事以事之內外為隂陽者也始虞三虞以事之先後為隂陽者也以事之先後為隂陽則麗乎隂者亦可謂之外事也郊外事也日用辛社內事也日用甲何也皇天后土之於天下其近無內其逺無外故郊雖在外特尊而逺之非外事也社雖在內特親而近之非內事也甲者日之始而主生辛者向中而主成萬物之生本乎社其成功則歸諸天此社所以用辛也吉事人情之所欲故先近者喪事人情之所不忍故先逺者廬陵胡氏曰春秋郊皆用辛故郊特牲云郊用辛又春秋升陘之戰用丁未泓之戰用己巳而武王癸亥陳于商郊則非剛也橫渠張氏曰祭之筮日若再不吉則止諏日而祭更不筮據儀禮唯有筮逺日之文不云三筮筮日之禮只是二筮先筮近日後筮逺日不從則直諏日用下旬逺日蓋二筮足以致聽命鬼神之意而祀則不可廢藍田吕氏曰卜筮者先王所以求之鬼神之道也先儒云天子之用卜筮大事先筮而後卜筮人之說是也次事唯卜不筮表記天子無筮謂征伐出師若巡狩是天子出行皆用卜無筮是也小事無卜唯筮筮人九筮是也其說然矣唯天子無筮指為次事而無所據恐此非周人之禮也凡事有二則疑人謀不能決必求之鬼神此所以問卜筮也然有疑而莫適從者如立君或曰某可立或曰某不可立其位均也其親均也其賢均也戰者或曰可戰或曰不可戰其義均也其利均也如此則一聽於神以定其吉凶也有疑而不敢専者如建都邑地利便矣人居便矣擇而居之可矣如時日者祭必用是時葬必用是月諏而用之可矣然即其中以求之神蓋有所尊也廣安游氏曰外事以剛日內事以柔日此謂順其隂陽也聖人之治天下本之以自然行之以至順如此而已三才之道在天為隂陽在地為剛柔在人為仁義仁者陽與剛之屬也義者隂與柔之屬也古人以是二端盡三才之理然此二者不可以交相雜也柔者從隂剛者從陽外者從剛內者從柔此謂自然而至順者也惟其本之以至順行之以自然則凡所謂道者皆自是而起隂陽剛柔不可以相入猶仁義之不可以相入也當陽而柔當隂而剛當仁而義猶當暑而寒當寒而暑也禮曰天地位萬物育苟隂陽錯置寒暑相失仁義失位雖有天下之聖智亦末如之何矣易曰本乎天者親上本乎地者親下物各從其類也又曰方以類聚物以羣分吉凶生矣聖人之所以治人事者用此道也所以位天地育萬物者用此道也所以見天地萬物之情者用此見之也所以知鬼神之情狀者用此知之也吉事先近日近日不吉而後及逺古之為冠昏者其辭曰以嵗之虞以嵗之不易蓋古人敦睦九族至於昏友皆為之服而其服之之際飲食起居各有變也惟其如此較之後世吉祥無故之日蓋有時而難得也故憂其不易而多虞速欲畢冠昏之事其先近日或亦此意曰為日假爾泰龜有常假爾泰筮有常卜筮不過三卜筮不相襲龜為卜策為筮卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民決嫌疑定猶與也故曰疑而筮之則弗非也日而行事則必踐之鄭氏曰為日假爾命龜筮辭龜筮於吉凶有常大事卜小事筮求吉不過三魯四卜郊春秋譏之襲謂卜不吉則又筮筮不吉則又卜是瀆龜策也晉獻公卜取驪姬不吉公曰筮之是也弗非無非之者日所卜筮之吉日也踐讀曰善孔氏曰卜擇吉日故云為日假因也爾汝也指蓍龜也泰大中之大也欲褒美此龜筮故謂為泰也一卜不吉而凶又卜以至於三三若不吉則止筮亦然也襲因也前卜不吉則止不得因而更筮筮亦然表記亦云卜筮不相襲鄭注云大事則卜小事則筮與此注不同者明襲有二義一則大事小事各有所施不得因龜卜小事因蓍筮大事也二則筮不吉不可復卜卜不吉不可復筮兩注各舉其一也龜為卜策為筮此解卜筮所用也龜處筮後龜覆於筮策為筮者策在龜前為決也謂蓍為策者策以謀策為義言用此物以謀於前事也師說云卜覆也以覆審吉凶筮決也以決定其惑劉氏以為卜赴也赴來者之心筮問也問筮者之事赴問互言之案白虎通稱禮三正記天子龜一尺二寸諸侯一尺大夫八寸士六寸說文云天子蓍長九尺諸侯七尺大夫五尺士三尺龜隂也故其數偶蓍陽也故其數竒卜筮者先聖王所以使民信時日者解所以須卜筮之義也先聖王云者王未必聖古來非一聖不必王孔子是也明造制卜筮必須聖位兼并也時者四時及一日十二時也日者甲乙之屬聖王制此卜筮使民謹擇而信時日與吉凶也法典則也令教訓也猶與者說文云皆獸名猶玃屬與象屬二獸進退多疑人多疑者似之故謂之猶與故曰以下引舊語以結之言卜筮以定是非若有疑而筮之則人無非之也不言卜從可知踐善也言卜得吉而行事必善也崔氏曰不過三者謂不過三用若大事龜筮並用者先用三王筮次用三王龜如是一也三如是乃為三也若初時三筮三龜皆凶則止或逆多從少或從多逆少如此者皆至於三也單卜單筮其法唯一用而已不吉則擇逺日不至於三也藍田吕氏曰命龜者周官大卜主之命筮人君未聞必筮人主之大夫則筮史命之少牢禮是也大夫之於卜三命之涖卜以主人所卜命卜史如士喪禮宗人受卜人龜示髙涖卜受視反之宗人還少退受命命曰哀子某來日卜葬其父某甫考降無有近悔許諾不述命還即席西面坐命龜興授卜人龜蓋士禮略故不述命若大夫則命卜以主人之命命宗人宗人述涖卜之命即席坐又命龜曰假爾泰龜有常是所謂三命之士卜不述命則二命之是也大夫於筮則二命之少牢饋食禮史受命于主人主人曰孝孫某來日丁亥用薦嵗事云云史曰諾西面遂述命曰假爾泰筮有常孝孫某來日丁亥云云是也士筮則一命之特牲禮云宰自主人之左贊命筮者許諾即席坐筮是也言泰龜泰筮尊而大之也有常言吉凶不僣也卜筮不過三者當謂卜筮日與地之類如喪祭舉三旬之日或先逺或先近卜之筮之如建都邑洛誥曰我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食是也如卜筮事則有從有逆不可再三易曰初筮告再三瀆是也卜筮不相襲者凡常事卜不吉則不筮筮不吉則不卜也若大事則先筮而後卜洪範汝則有大疑謀及乃心謀及卿士謀及庶民謀及卜筮故有龜從筮從或龜從筮逆是龜筮並用也晉卜納襄王得黃帝戰于阪泉之兆又筮之則遇大有之睽亦龜筮並用也故知不相襲者非大事也龜為卜策為筮周官龜人掌取龜攻龜入于龜室釁之以待用凡卜龜人奉龜以往大卜蒞卜視髙命龜菙氏以明火爇燋遂吹其焌契以授卜師卜師揚火作龜致其墨以示卜人卜人占之其占視其兆太卜掌三兆之法其經兆之體皆百有二十其頌皆千有二百此龜為卜也策蓍也古者以蓍為筮而揲卦其用四十有九分而為二掛一而揲之以四歸竒於扐是為一變再扐掛又為一變三變成爻以四揲之數七八九六以辨隂陽老少十有八變而成卦凡筮筮人布席左執策右抽上韥兼執之受命于主人主人授之筮人許諾擊筮述命立筮卦者坐卦以木卒筮書卦于木示主人乃退占士所以異者不述命坐筮而已其占視其卦太卜掌三易之法其經卦皆八其别皆六十有四此策為筮也信時日者祭祀喪葬之日既卜筮而用之不敢改也敬鬼神者人謀非不定而猶求於鬼神知有所尊而不敢必也畏法令者人君法令有疑者決之卜筮則人君且不敢専況下民乎嫌疑者物有二而相似也猶與者事有二而不決也如建都邑某地可都某地亦可都此嫌疑也故卜筮以決之如卜戰或曰可戰或曰不可戰此猶與也故卜筮以定之此先聖王所以神道設教也問焉而以言其受命也如響惟精誠可以致之既曰卜筮矣則惟卜筮之為聽不可二也有疑而筮既筮而不信諏日而卜既卜而弗踐是為不誠不誠之人不能得之人況可得之鬼神乎踐踐履而用是日恐不必改為善馬氏曰布席謂之為席擇日謂之為日以其有所為故也大羮謂之泰羮瓦尊謂之泰尊龜謂之泰龜筮謂之泰筮以其有所尊故也目有光而不能明假日月而後明事有吉凶而不能知假蓍龜而後知故曰假爾龜筮事之萬變不同理之是非不一卜筮而體吉則吉體咎則咎故曰有常卜筮吉而不可以襲卜筮不吉而不得以過三詩刺我龜既厭亦以其過三故也大事有時日而用卜小事無時日而用筮天子無筮而以卜為主諸侯有守筮而以筮為主以其不相襲故也山隂陸氏曰為日以人事為之耳且曰假爾則以誠在我故也吉凶亦在我故也龜舊也蓍老也是故謂之泰書曰三龜一習吉又曰卜不習吉據此龜襲龜可也若大事先筮而後卜筮不吉雖卜可也非所謂襲襲謂若卜筮不吉又卜筮之言龜則象見言策則數見日而行事則必踐之踐讀如字言不敢輒廢是日長樂陳氏曰蓍者陽中之隂故植而知數龜者隂中之陽故動而知象陽必成之以隂故龜之長也其數偶隂必成之以陽故蓍之長也其數竒卜筮使人違凶而之吉故曰泰龜泰筮卜筮不吉則不可過三卜筮吉則不可以襲過三則瀆鬼神者也襲則疑鬼神者也瀆則不敬疑則不信故禹欲襲於枚卜而舜所不從魯僖卜郊至於四而孔子所譏也夫物生先象而後數卜筮先筮而後卜則先象而後數者自幽而之乎明先筮而後卜者自明而稽乎幽晉獻公先卜後筮是不知卜筮先後之理也白虎通以大夫而下皆有龜是不知家不寶龜之禮也嚴陵方氏曰龜則卜之體也蓍則筮之用也上言其體下言其用互相備也龜以動為陽蓍以植為隂陽為大故大事用卜隂為小故小事用筮大可以兼小故大事亦用筮小不可以兼大故小事則不及於卜焉金縢言卜三龜洪範言三人占故或以此為三王之龜策然所以為不過三則一也卜筮不過三三卜之矣而又卜之是卜與卜相襲也三筮之矣而又筮之是筮與筮相襲也不相襲者慮其瀆神而已故卜不習吉而書所以明是理也初筮告而易所以取是喻也且大禹謨言龜筮協從洪範言龜筮共違于人周官大事先筮而後卜則卜與筮兩相襲也明矣襲因也與不相襲禮之襲同義先王之時無非卜筮之用上以民為言者與民同其患而已石林葉氏曰不過三則無瀆禮不相襲則無廢事先王是以稽諸天而信時日畏鬼神雖疑而筮之不敢以非考諸人而使民決嫌疑定猶與雖日而行事則必踐其言也廬陵胡氏曰卜筮不過三經意大抵謂卜筮不可瀆如易再三瀆之義王鄭太拘此與表記皆云卜筮不相襲襲有侵奪義若卜不吉而筮吉筮不吉而卜吉則為相奪也故卜不吉則止長樂劉氏曰信時日謂先事而致敬也敬鬼神謂不吉則不敢祭也畏法令謂禮雖失莫敢不行事雖繁莫敢不敬也決嫌疑謂考三才之吉凶以祛其惑也定猶與謂賾五行之逆順以蔽其志也故從於筮者人弗敢非日而行者事罔不踐聖王之作豈徒然哉講義曰是非不明故筮筮而是非明矣由是以行斯無或非之者也此人將有行而卒於不能踐履則疑以敗之耳因日之吉而後行斯所以能踐也蓋信時日敬鬼神畏法令則其弗非可知矣決嫌疑定猶與則其必踐可知矣廣安游氏曰使民信時日敬鬼神畏法令此聖人示人以天顯之道也書曰厥弟弗念天顯傳曰以象天明又曰則天之明又曰神之格思不可度思矧可斁思夫天之髙逺鬼神之難知人以為可得而誣也聖人以為是有明且顯者存焉夫明且顯者人之所畏者也人之所謂有鬼神者有此者也聖人之所法以為政者法此者也故曰為父子兄弟姑姊甥舅昏姻以象天明為君臣上下以則地義為刑罰威獄使民畏忌以類其震耀殺戮為溫慈和惠以效天之生殖長育凡此者皆自有所謂天顯者而後得以有之者也惟其然也所以信時日敬鬼神畏法令者可得而行也苟其不然而强以使之天下其孰能從也苟為不從不信時日不敬鬼神不畏法令則豈復生生不窮至於今哉且三才之道相資而成者也後世以為人者専乎治人而無恤乎鬼神治乎明而無恤乎其幽如柳子厚卜筮不足用盟誓不足信之說皆非也金華邵氏曰卜筮之事忽之者則以為不足信泥之者則以為不可不信記禮者慮夫人泥之也則曰不過三不相襲又慮夫人忽之也則曰信時日敬鬼神畏法令是又戒其忽也然則君子之於卜筮將如之何孔子曰敬鬼神而逺之以其為無則在所當敬以其為有則在所當逺惟處之於若有若無之間君子之於卜筮當如是而已金華唐氏曰易曰天地設位聖人成能人謀鬼謀百姓與能天地大矣有所不能而聖人實成之聖人之聰明固髙於天下而不敢自用其聰明明則有人謀幽則有鬼謀謀無不盡斷而行之則固在聖人故百姓之與能舍聖人亦無所歸也洪範之有稽疑其以此哉夫五事修於己八政施於民五紀協於天皇極建而三德乂人事可謂盡矣理有未易窮變有未易應明而人謀不能無疑將遂行之乎疑謀之成其害實大將遂不行乎勢有不可不行者聖人於此乃始決之於鬼謀人心之與鬼神本無以異知覺有先後則與鬼神合其吉凶者大人而已故人心之不同不若鬼神之德於吉凶為審也鬼神猶不可斁矧可度乎而吾何以通之天地之生神物固將以通神明之德也天生神物聖人則之故探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜而非聖人莫之能用也聖人用蓍龜以為卜筮立之官守為之法數然後吉凶可得而審矣苟不擇其人而建立之則有如曹人之貨晉筮史齊史之阿崔子甚而若漢丘子明者疑可得而稽乎然而象數之變無窮而一智之能有盡聖人之法吾皆不可廢也傳之各有其人則立時人作卜筮可偏乎哉兆有三兆易有三易故卜以三龜而筮以三易則占者固三人矣三龜而習吉如周公之金縢不然而皆不吉其從何疑三者有所未同則從其重可也故曰三人占則從二人之言古之用卜筮有常事焉有非常之事焉祀之牲日昏冠之日賔主之宅死之葬居之鄰家之宰師之御右致師嘗之卜芟獮之卜戒社之卜稼若此之類皆卜筮之常者故龜有八命筮有九筮官司之守在周禮詳矣於左氏備矣其大者君或臨之要皆常事而已稽疑言王者大法豈言其常者哉所謂大疑則周禮之大詢所謂國危國遷立君者是矣王者之於大疑豈遽舍人謀而從鬼謀哉先之乃心次之卿士次之庶民然後及於卜筮禹謨之所謂官占可考矣使立君而皆如禹國遷而皆如作洛行危事而皆如伐商則是之謂大同身其康强子孫其逄吉斷可必矣詢國遷如盤庚之治亳詢國危如周公之東征吾無權哉故五占從其多而以龜筮為主則雖如商周之卿士庶民小有不同終亦可以獲吉而邾文公之遷繹雖不利於君尚不失為知命也然聖人之為卜筮以稽疑也不疑何卜晉立驪姬崔取棠姜雖不卜知其凶矣然卜而皆驗以是知受命如響吉凶與民同患聖人之仁天下至矣卜不可違故違卜不祥卜不可瀆故卜不習吉卜筮不相襲卜不可以非所宜故易不可以占險春秋之際猶可驗也然春秋之際卜筮之法數猶存而稽疑之意乖故違者瀆者卜非所宜者以卜為市假卜為詐者靡不有之洪範之道晦周官之職廢矣然當時賢者尚多祿仕於卜史之中其占驗將若符契自秦滅學而疇人子弟分散三兆之書遂亡周易僅存而術數淺駮後世莫能名古人之法遇艮之八坦然著明而學如杜預尚不能知遂使范寧謂左氏失之誣而柳宗元非國語肆為無忌憚之論夫以卜筮者象其占乃聖人之道而稽疑九疇之一也其庸可廢乎賈氏曰筮法古用木畫地今則用錢以三少為重錢重錢則九也三多為交錢交錢則六也兩多一少為單錢單錢則七也兩少一多為拆錢拆錢則八也連山歸藏周易並用夏殷以不變者為占周易以變者為占亦三人各占一易三占從二三者三吉為大吉一凶為小吉三凶為大凶一吉為小凶儀禮疏君車將駕則僕執䇿立於馬前已駕僕展軨效駕奮衣由右上取二綏跪乘執䇿分轡驅之五步而立君出就車則僕并轡授綏左右攘辟車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必步鄭氏曰奮振去塵也二副也跪乘未敢立敬也驅之五步調試之僕并轡授綏者車上僕所主也左右謂羣臣陪位侍駕者攘却也或者攘古讓字車右勇力之士備制非常者君行則陪乘君式則下步行孔氏曰此以下至卷末總明乘車顧式僕御謹敬之事君車君所乘之車也將駕謂始欲駕行時也僕即御車者古者僕用好人為之故孔子曰吾執御矣又子適衛冉有僕及周禮諸僕皆用大夫士也䇿馬杖也别有人牽馬駕車僕執馬杖監駕立馬前恐馬行也已駕駕竟也展視軨轄頭轊也車行由轄故具視之效白也僕監視駕竟而入白君駕車也由從也僕入白駕竟先出就車於車後自振其衣去塵從右邊升上必從右者君位在左故辟君空位也綏登車索綏有二一是正綏擬君之升一是副綏擬僕右之升故僕振衣畢取副綏而升也跪乘者僕先試車時君未出未敢依常而立故跪乘以為敬轡御馬索也車有一轅而四馬駕之中央兩馬夾轅者名服馬兩邊者名騑馬亦曰驂馬故詩云兩服上驤兩驂鴈行然每一馬有兩轡四馬八轡以驂馬內轡二繫於軾前其驂馬外轡及夾轅兩服馬各二轡分置兩手故詩云六轡在手也今言執䇿分轡謂一手執馬杖以三轡置空手中以三轡置杖手中也分轡竟則試驅行之五步乃立初跪而驅令馬行五步則倚立以待君出蓋跪以見敬而立則調試之也君出就車則僕并六轡及䇿置一手中一手取正綏授君令登車此當右手并轡左手授綏轉身向後引君上也辟逺也君己上車車欲進行故左右侍駕陪位諸臣皆遷郤以辟車使不妨車行也左右已辟故驅車而進則左右從者疾趨從車行也大門君之外門車行至外門君撫僕手撫按止也僕手執轡車行由僕君欲令駐車故抑止僕手也顧回顧也車右勇士之士也車行則有三人君在左僕人中央勇士在右車方驅時勇士亦從趨在後今至大門方出履險阻恐有非常故回顧命車右上車也門閭謂凡所過門閭處溝廣深四尺渠亦溝也步謂下車也此車右勇士之禮若至門閭溝渠則車右必下車所以然者一則君子不誣十室過門閭必式君式則臣當下也二則溝渠是險阻恐有傾覆故勇士亦須下扶持之僕不下者車行由僕僕下則車無御故不下也山隂陸氏曰執䇿僕之事也君按轡而已藍田吕氏曰此章言僕御君車之法也僕御君車其節有五將駕執䇿立於馬前一也已駕展軨效駕二也先上車執䇿分轡驅之五步三也君出就車并轡授綏四也車至大門君撫僕手顧命車右上車五也䇿者所以驅馬僕之所從事也君車將駕僕執䇿立於馬前臨而視之則駕者無敢不謹也轄車之所賴以行也既展軨乃敢白君故曰效駕僕在右君位在左升由右便也門閭溝渠必步防有竊發之變傾覆之虞也橫渠張氏曰展軨謂周視一車百物無廢而軨者轄頭轊也任重之要故為展視之主焉至尊將乘慎重當然僕之禮也嚴陵方氏曰展省也與展墓之展同義效駕若臧倉請曰今乘輿己駕是也綏有正有二正綏即王制所謂大綏少儀所謂良綏是矣二綏即王制所謂小綏少儀所謂散綏是矣車右即周官之司右是矣蓋人之左手足不如右强故車右置勇力之士廬陵胡氏曰軨車欄也欄可倚故楚詞九辨云倚結軨兮長太息又宣帝紀軨獵車注前有曲軨盧氏云軨轄頭轊非車欄也車欄之苓字不作車邊案楚詞云倚軨若非欄何可倚乎推此則轄頭并欄皆曰軨也案春秋傳左并轡則此亦當在於左而右手授綏轉身向後引君登也新安王氏曰車驅而騶至于外門君按僕手暫止其驅命車右登車車右既登則僕之驅車自當如故然過門閭臨溝渠馬必步而不騁騁則行疾步則行緩記曰步路馬必中道左傳言步馬者皆謂馬緩行也門閭必步恐或有衝突也溝渠必步恐或有傾仆也舊說以步為車右下車而行非是凡僕人之禮必授人綏若僕者降等則受不然則否若僕者降等則撫僕之手不然則自下拘之鄭氏曰撫小止之謙也自下拘之由僕手下取之也僕與已同爵則不受孔氏曰凡僕人謂為一切僕非但為君僕時也車上既僕為主故為人僕必授綏與所升之人也降等謂士與大夫大夫與卿御也僕既卑降則主人受取綏不然者謂僕者敵體則主人宜謙不受其綏也又僕者雖卑而受其綏不謙猶當撫止其手若不聽自授然後乃受也不降等者既敵不受而僕者必授則主人當郤手從僕手下自拘取之示不用僕授也長樂陳氏曰說文曰綏車中把也其飾則有采章其等則有貴賤詩曰淑旗綏章此綏之飾也禮君綏曰良綏僕右綏曰二綏散綏此綏之等也君子之登車也受綏其既登也正立執綏及致敬然後撫而式焉正立執綏所以備墜耳昔范鞅逆魏舒請參乘而持帶亦備墜之意也夫禮有六藝御居一焉故司徒以之教萬民保氏以之教國子詩以執轡如組為賢孔子以執御為能而周官大馭戎僕田僕齊僕之官皆大夫上士為之則御非賤者之事故有以同等為之僕者有以降等為之僕者有以弟子為師之僕者有以貴者為賤人之僕者禮曰若僕者降等則受不然則否此同等降等者為之僕也君命召雖賤人大夫士必自御之此貴者為賤人之僕也論語或稱冉有僕或稱樊遲御此弟子為師之僕也禮書客車不入大門婦人不立乘犬馬不上於堂鄭氏曰不入大門謙也婦人不立乘異於男子犬馬非贄幣也孔氏曰公食大夫禮云賔之乘車在大門外西方注云賔車不入門廣敬也與此同婦人質弱不倚乘倚立也男子倚乘而婦人坐乘犬馬者賔主相見用充庭實而已非問聘之贄幣故不上堂贄謂羔雁錦玉之屬乃上堂也藍田吕氏曰客車不入大門敬主人也婦人不立乘從安也犬馬不上於堂賤畜也三者或敬或安或有所賤各從其宜也嚴陵方氏曰大門謂最外之正門坐乘則安婦人所乘謂之安車者以此馬氏曰客車不入大門所以敬主主人出大門迎之所以敬客故覲禮偏駕不入王門公食大夫禮賔之乘車在大門外西方是也鄉飲酒禮主人迎賔于庠門之外則上至於以賔禮見王下至於以客禮見者莫非以大門之外為敬也少儀曰犬則執緤馬則執靮周官小行人合六幣而圭以馬覲禮侯氏奉束帛匹馬卓上九馬隨之侯氏降則以馬授人蓋以犬馬獻人則執緤靮而已以馬合幣則達圭而已奉馬而覲則授人而已皆不上堂之謂也講義曰犬馬雖可獻之於人然與羔雁玊帛之屬異矣故效馬者右牽之效犬者左牽之惟恐其執之不力宜不可使上於堂也故君子式黃髮下卿位入國不馳入里必式鄭氏曰式黃髮敬老也發句言故明此衆篇雜辭也下卿位尊賢也卿位卿之朝位也君出過之而上車入未至而下車入國不馳愛人也馳善躪人也入里必式不誣十室也孔氏曰此以下明雜敬禮也君子謂人君也人初老則髮白太老則髮黃故見而式敬也人君尚爾則大夫士可知卿位路門之內門東北面位也國中人多周官修閭氏禁馳騁於國中二十五家為里里巷首有門入里則必式而禮之嚴陵方氏曰黃髮則老之尤者詩所謂黃髮兒齒是矣黃土色也形生於土而反於土髮而至於黃則形將反本故也藍田吕氏曰車之所過則門外之朝位也卿立於位以俟君君過之則下非卿之虛位也人君而敬臣之虛位為已過矣入國不馳馳則人不得辟也入里必式先人之居在焉也馬氏曰孟子曰養老尊賢易曰養賢以及萬民是能敬老然後能敬賢敬賢然後能敬人民若夫敬鄉黨則其私恩而已此言之序也傳曰丞相進見御座為起乘輿為下此下卿位之意詩曰維桑與梓必恭敬止此入里必式之意也周官修閭氏禁馳騁於國中此入國不馳之意也石慶入里門不下車而其父責之張湛望里門則步君子多之則入里必式者父母國之道也昔禹見耕者則式過十室之邑則下孔子見負版凶服者則式見楚狂接輿則下武王式商容之閭魏文侯式假干木之門然則君子凡在所敬者奚常不式且下哉記之所言特其大率而已李氏曰國君而下卿位不已過乎曰君子所以待天下之賢臣其禮有隆而無殺者篤於至誠而已其樂也始於樂至於衎至於綏之而終於又思可謂隆矣其燕也始於敖至於且湛亦可謂隆矣其篤於至誠如此下其位亦不為過也入國不馳愛也入里必式恭也推愛則仁不可勝用也充恭則禮不可勝用也臨川玉氏曰入國不馳愛敬之道也君命召雖賤人大夫士必自御之鄭氏曰御當為迓君雖使賤人來必自出迎之尊君命也春秋傳曰跛者御跛者眇者御眇者皆迓也孔氏曰鄭引春秋見成二年公羊傳橫渠張氏曰御謂御車也奉君命而召雖所召者賤使者當親御之嚴陵方氏曰自御為之僕也故僕人之禮前經有降等者以此馬氏曰春秋洮之盟尊王人雞澤之盟尊單子平丘召陵之盟尊劉子鄄之盟尊單伯蓋朝服雖敝必加於上辨冕雖舊必加於首王人雖微必先諸侯必先諸侯者所以尊王命也君命召雖賤人大夫士必自御之其意亦若是而已介者不拜為其拜而蓌拜鄭氏曰蓌則失容節蓌猶詐也孔氏曰蓌挫也戎容暨暨著甲而屈拜則挫損其戎威之容也一云蓌詐也言著鎧而拜形儀不足似詐也長樂陳氏曰古者介胄有不可犯之色介者不拜蓋介者所以服人拜者所以服於人服人者無所服於人故不拜焉不拜而周禮謂之肅拜是亦不拜之拜也兵法曰軍容不入國國容不入軍軍容入國則民德廢國容入軍則民德弱兵車不式危事不齒介者不拜不以國入軍也鄢陵之戰郤至不拜楚使崤之役蹇叔之子不拜其父細柳之屯周亞夫不拜其君可謂知此矣禮書新安朱氏曰蓌猶言有所枝柱不利屈伸也祥車曠左乘君之乘車不敢曠左左必式鄭氏曰祥車葬之乘車空神位也乘君之乘車君存惡空其位也孔氏曰此以下又明僕御之禮祥猶吉也吉車謂生時所乘葬時用為魂車鬼神尚吉也車上貴左故僕在右空左以擬神也乘車謂君之次路也王者五路玊象木金革各一路王自乘一所餘四路皆從行臣若乘此車不敢空左戎右職云㑹同充革車注云㑹同王乘金路猶以革路行充之者謂居左也若曠左則似祥車近於凶時左必式者雖處左而不敢自安故恆馮式云乘車則君皆在左若兵戎革路則君在中央御者居左故成二年韓厥代御居中是也藍田吕氏曰王者五路君乘其一餘四輅皆臣下乘之故有乘車也長樂陳氏曰乘車之禮君處左車右處右僕處中故造車者必慎於左考工記所謂終日馳騁左不楗是也器物不敢措之於左月令所謂載耒耜於參保介之御間是也後世魏公子虛左以迎侯生秦皇虛左以迎太后皆古之遺制耳此特乘車為然若兵卑則馭者在左戎右在右將帥居中昔晉伐齊郤克將中軍解張御鄭緩為右郤克傷矢流血及屨鼓音未絶曰余病矣解張曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病夫郤克傷矢而未絶鼓音則將在鼓下矣解張傷手而血殷左輪則御在車左矣然此將帥所乘也若士卒所乘則左人持弓右人持矛中人御故書戒左不攻于左右不攻于右御非馬之正言左右而又言御則御在中可知也左傳稱秦師過周北門左右免胄而下言左右下則御在中不下可知也僖三十三年楚樂伯曰致師者左射以菆是左人執弓也宣十二年欒針為晉侯右曰寡君使針持矛焉成十六年衛太子為簡子右禱曰蒯瞶不敢自佚備持矛焉是右人持矛也哀二年蓋御無定位右有常處故將帥車則御在左士卒車則御居中右人之持矛雖將帥士卒之車不同而所居常在右所職常持矛也凡此皆三人乘車之法也禮書馬氏曰乘君之乘車不敢曠左不敢虛君位也左必式不敢安君位也僕御婦人則進左手後右手御國君則進右手後左手而俯鄭氏曰進左後右逺嫌也進右後左敬也孔氏曰僕在中央婦人在左僕御之時進左手持轡使形微相背若進右手則近相嚮故後右手以逺嫌也御國君則禮以相向為敬故進右手既御不得常式故但俯俯而為敬也國君不乘竒車車上不廣咳不妄指立視五巂式視馬尾顧不過轂國中以䇿彗恤勿驅塵不出軌鄭氏曰國君出入必正竒車獵衣之屬廣咳為若自矜廣猶𢎞也立平視也巂猶規也謂輪轉之度式視馬尾小俯也顧不過轂為掩在後彗竹帚恤勿搔摩也孔氏曰國君不可乘竒邪不正之車隱義云獵車之形今之鉤車是也衣車如鱉而長也漢桓帝之時禁臣下乘之車已髙若在上而聲大咳似自驕矜又驚衆也妄虛也車上無事虛以手指麾四方並為惑衆也車輪一周為一規乘車之輪髙六尺六寸徑一圍三三六十八得一丈八尺又六寸為一尺八寸總一規為一丈九尺八寸五規為九丈九尺六尺為步總為十六步半在車上所視則前十六步半地也知巂為規者聲相近也馬引車其尾近在車欄前故車上馮式下顧時不得逺矚而視馬尾若轉而顧不得過轂過轂則掩後人之私轂車轂也論語云車中不內顧是也入國不馳故不用鞭䇿取竹帚帶葉者為杖形如掃帚故云䇿彗云恤勿者以䇿微近馬體不欲令疾也但僕搔摩之時其形狀恤勿然軌車轍也車行遲故塵埃不起不飛揚出轍外也廬陵胡氏曰自五路之外皆竒異之車如漢宣乘軨獵車也子巂鳥名車上平視不過五巂猶云不過百雉也雉取其飛不過三丈則五巂當亦取其飛之逺近為喻孔氏以巂為規案巂音攜不近規也恐非舊作繠馬氏曰先王之時作竒技竒器以疑衆者有刑作淫巧以蕩上心者有禁車不中度不鬻於市用器不中度不鬻於市則為國君者其可以乘竒車哉蓋造車之法軫方以象地蓋圓以象天輪輻以象日月蓋弓以象星圓者中規方者中矩立者中權衡者中水玉路以象德之美金路以象義之和象輅以象義之辨革路以象義之制木路以象仁之質凡欲人君俯仰而觀之則思合天地之德周旋而視之則思合日月星辰之明出入不踰於規矩權衡言動不離於道德仁義然後竒邪之志不萌於心而中正之行可律於下此所謂器以藏禮禮以出信者也然則非禮之竒車其可乘哉周官道右詔王之車儀則不廣咳口之儀也不妄指手之儀也立視五巂式視馬尾目之儀也顧不過轂首之儀也立欲平故視五巂式欲俯故視馬尾嚴陵方氏曰立視五巂則不至於逾逺式視馬尾則不至於逼下顧不過轂則不至於掩後凡此皆欲容貌適其中而已論語言車中不內顧不疾言不親指不內顧則不特不過轂而已不疾言則不特不廣咳而已不親指則不特不妄指而已言之淺深不同者彼言聖人之儀此言中人之制而已廣安游氏曰古之觀人者於視聽言動之間所謂言與動者視常從焉蓋視者人之精神見於外者也孟子曰觀其眸子人焉廋哉故夫視者可以觀夫人之神志也傳曰視下言徐又曰目動言肆又曰視不登帶如此之類皆以視參其言而觀焉故君子於人之瞻視常為之法此則在車顧視之節也廣咳者矜且泰也妄指者輕且肆也古人於一指顧一瞻視一謦咳之間其人之賢不肖是非禍福皆可得而分蓋古人以禮為常一失其節則為改常則人之禍福宜可得而知也後世之禮不明舉無以為之節舉無以為節者後世之常也有一人焉而失其節亦是行乎其常而非禍福之所及也此古今所以為異新安朱氏曰䇿彗疑謂䇿之彗若今時鞭末韋帶耳國君下齊牛式宗廟大夫士下公門式路馬乘路馬必朝服載鞭䇿不敢授綏左必式步路馬必中道以足蹙路馬芻有誅齒路馬有誅鄭氏曰皆廣敬也路馬君之馬載鞭䇿不敢執也齒數年也誅罰也孔氏曰案齊右職云凡有牲事則前馬注云王見牲則拱而式又引曲禮云國君下宗廟式齊牛鄭注周官與此文異公門君之門也路馬君之馬也敬君故至門下車重君物故式路馬馬比門輕故有下式之異乘路馬謂臣行儀習禮獨行時也路馬君之車馬臣雖得乘之必朝服而自御又不敢杖馬但載杖以行也君在則僕人授綏今習儀者身既居左自馭而乘雖有車右不敢授綏與己也既不曠左故居左但式以為敬步猶行也謂單牽君馬行時必在中道正路為敬也芻食馬草也蹙謂以足蹴踏之及論量君馬嵗數皆為不敬亦被責罰也案熊氏曰下齊牛式宗廟文誤當以周禮齊右注為正宜云下宗廟式齊牛藍田吕氏曰國君下齊牛式宗廟齊牛以卜之牲所用於宗廟見則下之過宗廟之門則式之以牲於神近而門於神逺故敬門殺於牲也路馬非齊牛之比故敬馬殺於門也云國君下宗廟式齊牛以對大夫士下公門式路馬事各有所當步路馬必中道步習也中道君所行也誅責也孔子曰於豫與何誅傳曰反誅屨於徒人費皆責也長樂陳氏曰齊牛之於宗廟其輕重不倫國君於宗廟則式之於齊牛則下之者庸敬在廟斯須之敬在齊牛也嚴陵方氏曰齊牛祭牲也嵗時必齊戒以朝之故謂之齊牛國君下齊牛式宗廟則所以奉神者不敢不敬故也齊牛則奉神物也宗廟則奉神之居也物無常用過之為疏故在車則必下焉居有定所過之為數故在車則式之而已馬氏曰先王於牲視之則召擇之則卜於嵗時則齊戒沐浴以朝之於朔望則皮辨素積以迎之牽則必親殺則必射割則必袒則其見而下之不為過矣乘路馬則載鞭䇿不敢授綏行必中道凡此教其敬君物也以足蹙路馬芻有誅齒路馬有誅凡此戒其慢君物也先王制禮圖難於其易為大於其細凡以止邪於未形而已周官太宰八柄言誅內史八枋言殺此誅所以為殺也宰夫治不以時舉者以告而誅之禁殺戮凡傷人見血而不以告者以告而誅之所以為責也然則蹙芻齒馬之誅蓋亦責之而已少儀曰有二車者之乘馬服車不齒觀君子之衣服服劒乘馬弗賈君子尚然況其君乎山隂陸氏曰下齊牛式路馬式宗廟下公門相備也近則下之逺則式焉相備而言先儒謂宜云下宗廟式齊牛今經齊牛在上知未誤也未有言鞭䇿者此言鞭䇿以乘而習之之故也不敢授綏僕者也左必式乘者也李氏曰國君諸侯也齊右職曰有牲事則前馬蓋王式齊牛則車右前天子撫式諸侯下之歟廬陵胡氏曰熊氏云此文疑誤宜云下宗廟式齊牛非也見齊戒之牲則下過宗廟則式此亦甚明何勞倒文乎清江劉氏曰禁過於微則人樂遷善防患於小則患逺矣齒路馬蹴路馬芻皆有誅是所以逺其防者也路馬者君之路馬也路馬之可敬況其君乎是以國家之敗常必自其小者始焉民無嚴君之心則無為貴禮矣禮記集說卷九
