body:
  text: 禮記集說卷六十宋衛湜撰有以少為貴者天子無介祭天特牲天子適諸侯諸侯膳以犢諸侯相朝灌用鬱鬯無籩豆之薦大夫聘禮以脯醢天子一食諸侯再大夫士三食力無數大路繁纓一就次路繁纓七就圭璋特琥璜爵鬼神之祭單席諸侯視朝大夫特士旅之此以少為貴也鄭氏曰天子無介無客禮也灌獻也一食再食三食謂告飽也食力謂工商農也大路繁纓一就殷祭天之車也周禮王之五路玉路繁纓十有二就金路九就象路七就革路五就木路翦繁鵠纓圭璋特朝聘以為瑞無幣帛也琥璜爵者天子酬諸侯諸侯相酬以此玉將幣也大夫特士旅之謂君揖之孔氏曰此一節明以少為貴亦是稱之義也為賔用介天子以天下為家既不為賔客故無介也其實餘事亦有介副故鬯人共介鬯是天子臨鬼神使介執鬯也祭天特牲者特一也天神尊貴質故祭止一特也諸侯事天子如天子事天故天子巡守過諸侯境諸侯奉膳亦止一牛而已諸侯相朝謂五等諸侯自相朝也天子祭天諸侯膳天子皆無鬱鬯諸侯自相朝朝享禮畢未饗食之前主君酌鬱鬯之酒以獻賔示相接以芬芳之德不在殽味也何以知朝享畢而灌案司儀職云凡諸公相為賔將幣畢云儐亦如之鄭云儐謂以鬱鬯禮賔也上於下曰禮敵者曰儐又引此經謂此朝禮畢儐賔也案大行人云上公三禮再祼而酢則諸侯朝天子天子灌亦用鬱鬯此特云諸侯相朝者據以少為貴諸侯於天子無鬱鬯諸侯相朝則設鬱鬯而無殽也大夫聘禮以脯醢者大夫出使行聘禮畢主國禮之酌以酒而又有脯醢是味稍多也天子一食者食猶飧也尊者以徳為飽不在食味故毎一飧輙告飽待勸之乃更飧諸侯再食而告飽須勸乃又食士告轉疏故少牢特牲皆三飽告飽也食力謂工商農庶人也以其無徳不仕無祿代耕力作以得食故云食力以飽為度不須告勸故飧無數若對文言之則庶人食力故晉語云士食田庶人食力工商食官也大路繁纓一就者殷猶質以木為車乘以祭天謂之大路繁謂馬腹帶也纓鞅也染絲而織之曰罽五色一帀曰就就成也言五色帀則一成車既樸素馬亦少飾止一就也次路殷之第三路也供卑用故就多也然郊特牲云大路一就先路三就次路五就而此云次路七就故鄭註郊特牲以此云七就為誤圭璋特者圭璋玉之貴也特謂不用他物嫓之也諸侯朝王以圭朝后執璋表德特逹不加物也聘禮曰聘君以圭聘夫人以璋是也典瑞云公執桓圭侯執信圭伯執躬圭諸侯以相見及朝天子亦無束帛此鄭註圭璋朝聘以為瑞無幣帛也案聘禮行享之時則璧以帛琮以錦是加束帛又小行人云以玉合六幣圭以馬註云二王之後饗天子璋以皮註云二王之後享后皮馬不上堂唯圭璋特升堂亦是圭璋特義也琥璜爵者是玉劣於圭璋者也天子饗諸侯或諸侯自相饗行禮至酬酒時則有幣將送酬爵又有琥璜之玉將幣故云琥璜爵也琥璜既賤不能特達故附爵乃通也又案聘禮禮賔之幣束帛乘馬又致食以侑幣則諸侯於聘賔唯用束帛乘馬皆不用玉今琥璜送爵故知是天子酬諸侯及諸侯自相酬也鬼神單席神道異人不假多重故單席也諸侯視朝謂日出視諸臣之朝也特猶獨也旅衆也大夫則君人人揖之士則不問多少共一揖之也凡此尊者少而卑者多故曰以少為貴也長樂陳氏曰諸侯膳天子以犢以天子祭天之禮事其天子也諸侯相朝灌用鬱鬯以人敬神之禮敬諸侯也用鬱鬯無籩豆之薦者謂其用鬱鬯之時而無籩豆也君子食徳小人食力食德則謀道故食以薄食力則謀食故食以厚此天子至士所以有一食再食三食之數而食力者則無數也夫不待酬爵而特達於天子者圭璋也必待酬爵而不可以特達者琥璜也圭璋禮東南之玉而主乎陽琥璜禮西北之玉而主乎隂主乎陽則可以特達於天下主乎隂則必附爵而後通故易之陽卦畫奇隂卦畫耦以其陽故可以特而不必有附隂必資於所附而不可以特也聘義曰圭璋特達德也豈非所謂陽德歟周官之法祀先王之席如朝覲饗射之數而天神之祭則稾鞂而已此言鬼神之祭單席者非周制也諸侯視朝大夫特揖士旅之者葢大夫之德尊而士之徳卑德尊者寡故特揖德卑者衆故旅揖而已諸侯之視朝如此至於天子則不然周官之司士云孤卿特揖大夫以其等旅揖士旁三揖又禮書曰禮有以多為貴故特牲士祭尸九飯少牢大夫祭尸十一飯有以少為貴故禮器天子一食諸侯再大夫士三葢一食即一飯也士九飯大夫十一飯則飯以九與十一而又加者也正飯治其隆故貴多加飯嫌於瀆故貴少此飯禮所以不同也嚴陵方氏曰祭天特牲經所謂郊特牲是矣天子適諸侯諸侯膳以犢並見郊特牲解凡此皆貴誠之義也鬱鬯見表記解灌即小宰凡賔客賛祼之祼王氏謂若今禮飯賔客祭酒是也亦見明堂位解夫以位言之則諸侯尊於大夫以禮言之則朝重於聘朝諸侯相朝灌用鬱鬯無籩豆之薦大夫聘禮以脯醢者葢以飲為主不饗味而貴氣臭故也繁纓葢路馬之飾一就言五色一匝葢色至於五然後備故也色謂之就猶樂謂之成歟大路繁纓一就次路繁纓七就者殷尚質故就之少者為大就之多者為次也至於周則以多者為貴焉故玉路則十有再就然郊特牲言大路繁纓一就先路三就次路五就而此則言次路七就何也葢彼所謂五就者指繼先路之次路也此所謂七就者指繼次路而又次者也顧命於革路象路通謂之次路亦若是而已且自上而下降殺以兩由一以至三由三以至五由五以至七固其理也以周路之有五則殷路固不止於三矣兩篇所言亦互相備爾考之於書周所謂大路者非此所謂大路也周以玉路為大此則木路為大爾周所謂先路次路者非此所謂先路次路也周以行之前後為先與次則此以等之上下為先與次爾席所以行禮自天子而降其重數或以五或以三或以再至於禮鬼神則一重而已故曰鬼神之祭單席延平周氏曰饗至於酬爵則禮成矣圭璋春夏迎氣之玉有生物之意琥璜秋冬迎氣之玉有成物之意有生物之意故不待禮成而特達於天子有成物之意故必待禮成然後附爵而通夫天地之大德曰生故聘義曰圭璋特達德也許氏曰禮貴乎多者葢非多則不足為禮之稱也然物欲有盡而人情亡藝使天下而皆饜足其好多之心則雖窮天下之物適以亂天下之禮而已是以聖人之制有推而進焉以不奪其情亦有抑而反焉以深求其本情見而分其本隆而德尊故天子之人委蛇曲折於文為之中而不忘其初登降酬酢於器數之内而不失其義順理其末而亦逆存其始聖人之禮於是乎情文兼該内外合一渾渾乎其明於人心矣是故天子無介祭天用特天子之膳諸侯非不能備多品也而用止一犢諸侯相朝主國非不能備籩豆也而灌止用鬯繁纓美於多就而大路一就也琥璜用於爵幣而圭璋則特也不特禮之多少為然推之於小大髙下文質之間亦莫不然故宫室器皿尊者極其大而宗廟之尊彞爵之貴於散也觶之崇於角也瓦甒之尊於壺缶也無非不廢其大而隆其小也堂筵門臺尊者極其髙而祭天之地不壇也天子之尊而廢禁也又無非樂其髙而不忘其下也龍衮玉藻文采之隆於天子極矣而祭天之用圭不琢羮不和大路質素而越席之用犧尊布鼏而樿杓之貴豈以文采之用而盡廢其質哉多少不同其用而各惟其冝文質不一其施而悉惟其稱或大或小或髙或下狹不可豐廣不可殺情文並施條理不紊而禮之本末始得以並著於天下後世言禮者不知聖人順情中理之實以為是區區者皆所以强世豈知聖人制禮之初未嘗取成於吾心而一惟其理邪山隂陸氏曰灌以為禮而已未有籩豆之薦故周官籩人掌四籩自朝事而下繁纓如字繁纓言其文之繁也巾車曰玉路樊纓十有再就謂之繁纓以此冕之玉一名繁露與此同義士喪禮曰馬纓三就則所謂就者其纓而已鄭氏讀繁如鞶帶之鞶非是圭璋陽玉也德也琥璜隂玉也事也禮諸侯聘天子以圭聘后以璋享天子以璧享后以琮所謂繁四器者唯其所寶以聘可也然則琥璜爵天子與后以此享諸侯與天子酬以琥后酬以璜此其殺也小行人職云琥以繡璜以黼諸侯之好故葢如此又新說曰天地之祭各兩牲有降之者有祀之者燔柴於泰壇瘞埋於泰折實牲體焉所以降之在始祭之時也埽地而祭羞牲體焉所以祀之在正祭之時也故牛人曰凡祭祀共其享牛求牛享牛祀神之牛也求牛降神之牛也降神之牛於天則騂犢於地則黝牲各從其類也祀神之牛於天用蒼於地用黃各象其功也此經特牲葢言享牛而已有以大為貴者宫室之量器皿之度棺椁之厚丘封之大此以大為貴也嚴陵方氏曰周官典命宫室以命數為節自上公至子男或以九或以五各有差此宫室以大為貴也天子之路謂之大路弓謂之大弓斗謂之大斗房謂之大房此器皿以大為貴也尊者之棺至於四重卑者止於一重椁則周於棺此棺椁以大為貴也周官冢人以爵等為丘封之度此丘封以大為貴也量言其所容度言其所至度量宫室器皿皆有之於宫室言量於器皿言度互相備也既曰器又曰皿者若車旗之屬可謂之器而不可謂之皿若籩豆之屬正謂之皿亦可謂之器此大小之辨也既曰丘又曰封者自積土言之則曰丘自度土言之則曰封曰丘則必髙矣曰封則不必髙也故王公曰丘諸臣曰封此亦大小之辨也講義曰喪祭之禮必視其位之尊卑位尊而禮隆此人子之心也宫室謂宗廟也器皿器也棺椁丘封所以送終也且四者必以大為貴葢所以備物而盡禮者如此而後可以為孝也有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門内壺君尊瓦甒此以小為貴也鄭氏曰凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散五獻子男之饗禮也壺大一石瓦甒五斗缶大小未聞也易曰尊酒簋貳用缶孔氏曰案特牲云主人獻尸用角佐食洗散以獻尸是尊者小卑者大案天子諸侯及大夫皆獻尸以爵無賤者獻以散之文禮文散亡略不具也特牲主人獻尸用角者下大夫也尊者舉觶卑者舉角者案特牲少牢禮尸入舉奠觶是尊者舉觶特牲主人受尸酢受角飲者是卑者舉角此是士禮天子諸侯祭禮亡文不具也凡王饗臣及其自相饗行禮獻數各隨其命子男五命故知五獻是子男此以小為貴近者小逺者大缶在門外則大於壺矣案禮圖瓦大受五升則瓦甒與瓦大同凡饗有酒其列尊之法缶盛酒在門外壺在門内君尊謂子男尊也不云内外則陳之於堂人君面尊專惠也小尊近君大尊在門是不重味故以小為貴稱嚴陵方氏曰獻謂獻之於尸也舉謂自舉而飲也貴賤以位言尊卑以體言獻爵者主人獻散者佐食主人之與佐食則有貴賤之别焉故以位言之舉觶者皇尸舉角者主人皇尸之與主人特有尊卑之别爾故以體言之於瓦甒言君尊則知壺缶為飲諸臣之尊於甒言瓦則知壺缶皆瓦矣爾雅言盎謂之缶雖不言其所容以筭法推之掬四謂之豆積之至於缶二謂之鍾則缶葢四石之名也缶之名雖同缶之用不一有用之以盛酒者若坎所謂用缶是也有用之以汲水者若比所謂盈缶是也有用之以節樂者若離所謂鼔缶是也山隂陸氏曰貴者獻以爵賤者獻以散所謂尸飲五君洗玉爵獻卿尸飲九以散爵獻士尊者舉觶卑者舉角者凡妥尸天子舉斚諸侯舉角則卿舉觶大夫舉角歟若特牲饋食酳尸以角旅酬更以觶與此不同者葢卑者以大為貴然則此經所言葢天子諸侯之儀也周官子男饗禮五獻則所謂五獻之尊主饗禮與言子男以見公侯舉祭在前舉饗在後亦言之序燕禮司宫尊于東楹之西兩方壺豈所謂門内壺者邪公尊瓦本在尊南南上豈所謂尊瓦甒者邪士旅食于門而兩圜壺豈所謂門外缶者邪圜壺雖非缶其陳設之序則然有以髙為貴者天子之堂九尺諸侯七尺大夫五尺士三尺天子諸侯臺門此以髙為貴也孔氏曰天子堂九尺此周法也案考工記殷人重屋堂崇三尺鄭差之云夏髙一尺故知此九尺者周法也嚴陵方氏曰陽數窮於九天子則體陽道之極故也故堂階之髙其尺以九為節以至國則九圍城則九雉涂則九軌門則九重堂則九階屋則九筵寢則九室服則九章皆為是也然典命上公亦以九為節者非僭也示與王同德而已自是而下降殺以兩故或以七或以五或以三焉前言家不臺門而有國者得用之矣故天子諸侯臺門凡此皆以髙為貴故也延平周氏曰天子之堂九尺非周制也周之上公以九為節則天子當以十二為節也天子諸侯皆臺門而天子門以五諸侯門以三乃其别也講義曰易曰上棟下宇葢取諸大壯則居室固取乎壯麗又況王者之堂乎故自九尺以至三尺各有等差有以下為貴者至敬不壇埽地而祭天子諸侯之尊廢禁大夫士棜禁此以下為貴也鄭氏曰廢猶去也棜斯禁也謂之棜者無足有似於棜或因名云爾大夫用斯禁士用棜禁禁如今方案隋長局足髙三寸孔氏曰至敬不壇埽地而祭者此謂祭五方之天初則燔柴於泰壇燔柴訖於壇下埽地而設正祭此周法也廢禁者廢去其禁司尊彞鬱鬯之尊用舟以承之其犧象等六尊皆無用舟又燕禮諸侯之法瓦大兩有豐是無禁也棜長四尺廣二尺四寸深五寸無足赤中畫青雲氣菱苕華為飾禁長四尺廣二尺四寸通局足髙三寸漆赤中畫青雲氣菱苕華為飾刻其足為褰帷之形也棜是轝名故既夕禮云設棜于東堂下註云棜今之轝也又註特牲云棜之制如今大木轝矣上有四周下無足今大夫斯禁亦無足似木轝之棜周公制禮或因名此斯禁為棜耳故少牢司宫尊兩甒于房戶之間同棜是周公時已名斯禁為棜也案玉藻云大夫側尊用棜則斯禁也案郷飲酒兩壺斯禁是大夫用斯禁也玉藻云士用禁又士冠禮士昬禮承尊皆用禁是士用禁也鄭註云名之禁者因為酒戒也案郷射是士禮而用斯禁者以禮樂賢從大夫也特牲亦是士禮而云棜禁在東序者鄭註云祭尚厭飫故得與大夫同也長樂陳氏曰周官小宗伯之職言兆五帝四望四類又言兆山川丘陵墳衍而不言兆昊天葢有兆域則有壇無兆域則不壇不壇於外所以示其至敬於内也棜雖差異於禁而郷飲酒禮亦謂之斯禁葢天子諸侯之尊有罍有舟謂雷動以時則有鼓物之利否則有害物之災舟善操之則有載濟之利否則有覆溺之患所以為戒也大夫士之尊命之禁所以禁之也德尊者有戒而無禁德卑者戒而又禁之此天下所以無彞酒之過矣嚴陵方氏曰祭天之禮謂之至敬下言至敬無文是也壇特人為髙非體之自然也故埽除其地以致其潔也郊特牲所謂埽地而祭於其質也是矣禁所以承酒尊且棜也禁也皆所以為酒戒曰棜則欲其不流曰禁則欲其不犯别而言之固如此合而言之棜亦禁也猶之旗常通謂之九旗也且有足者為禁無足者為棜有足則髙無足則下此主以下為貴於大夫用棜至廢禁則又下矣故天子諸侯之尊如此山隂陸氏曰說文云豐豆之豐滿者從手葢手用豆之時也故禮自諸侯以上皆為豐記曰嵗凶年榖不登君膳不祭肺祭事不縣大夫不食粱士飲酒不樂由是觀之雖謂之豐禁在其中矣故豐亦或謂之廢禁是也廢讀如廢敦廢爵之廢無足曰廢廢豐似豆而卑冝非有足者且謂之廢禁固亦以去為義廢敦言喪無所事敦也廢爵言喪無所事爵也廢禁天子諸侯之尊無所事禁也然亦不可不戒所謂戒者皆有舟皆有疆壘是也禮有以文為貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳天子之冕朱綠藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也鄭氏曰此祭冕服朱緑似夏殷禮也周禮天子服采藻孔氏曰人君因天之文章以表於德德多者則其文備故天子龍衮諸侯以下文稍少也然周禮上公亦衮侯伯鷩子男毳孤卿希大夫𤣥士爵弁𤣥衣纁裳今言諸侯黼大夫黻雜明夏殷禮也但夏殷衣有日月星辰山龍今云龍衮者舉多文為首耳日月之文不及龍也朱綠藻十有二旒亦是夏殷也周藻五采也十二謂旒數也諸侯九以下亦夏殷也周家旒數隨命數又士但爵弁無旒也案熊氏曰朱綠以下是夏殷禮其天子龍衮諸侯黼大夫黻等皆周法無嫌諸侯雖九章七章以下其中有黼也孤希冕而下其中有黻特舉黼黻而言耳故詩采菽云𤣥衮及黼是特言黼也詩終南美秦襄公黻衣繡裳是特言黻也長樂陳氏曰此經主以文為貴故於天子不言大裘曰龍衮而已諸侯之服雖曰自衮冕而下然其德則貴乎能斷故言黼抑亦舉其下者而言之卿大夫之服自𤣥冕而下則有章有黻而已故言黻以其德貴乎能辨也諸侯有君道以治邦國以蕃王室其於政治之義必貴乎能斷大夫有臣道道合則從不合則去其於去就之義不可以無辨也士之服止於𤣥衣纁裳則質而已衣正色則天子至於士皆𤣥衣也裳閒色自天子至士皆纁裳也𤣥以象道之在上纁以象事之在下此貴賤之所通也所異者特繡繢之功或多或寡或有或無而已又禮書曰天子之冕朱綠藻十有二旒諸侯九上大夫七下大夫五士三其制與弁師不同異代之禮也葢藻潔而文衆采如之故曰藻水流趨下旒冕之垂者如之故曰旒藻或作繅以絲為之或作璪以玉貫之也繅旒或謂之繁露以其象然也漢制天子繅旒前長後短諸臣繅旒有前無後非古也延平周氏曰虞舜帝也帝則體天者也故日月星辰繢於衣而龍則次於日月星辰周則王也王則法天者也故日月星辰繢於大常而衣止於九章自龍而下至於榖葢是其日月星辰未能體之特觀法之而已其所以能體者變化也故天子九章以龍衮為主者體其能變化也諸侯七章以黼為主者諸侯有君道有臣道則未能變化而所可體者斷而已大夫四章以黻為主者大夫成德之爵道合則仕不合則去故所體者辨也葢東南為黻而東南乃隂陽分辨之地故黻有辨意士一章而以𤣥衣纁裳為主者六入為𤣥三入為纁𤣥則天道在北方之色纁黃朱也黃則地道在西方之色朱則天道在南方之色天道在北方寂然無為藏諸用也藏諸用者自形而上者也天道在西方萬物之所致役天道在南方而與萬物相見者皆顯諸仁也顯諸仁者自形而下者也自形而上者為陽故在上之衣𤣥而作繢繢亦陽事也自形而下者為隂故在下之裳纁而用繡繡亦隂事也自天子至於士其衣裳皆用𤣥纁者以士之賤為無嫌故以𤣥衣纁裳為主也天子之冕朱綠藻十有二旒者弁師謂掌王之五冕皆𤣥冕朱裏延紐五采繅十有二就皆五采玉十有二玉笄朱紘而此言朱綠藻葢冕之有𤣥所以象道之體有朱綠所以象道之用而旒止於十二者則天數也諸侯九者殺天子以兩也上大夫七下大夫五者王朝之臣既出封則逺於王而有所伸故命數用陽而旒之數如命之數公卿大夫未封則以其近於王而有所屈故命數用隂唯士之賤無嫌於抗王故用奇命數用隂而旒數當以八與六而已果上大夫止於七而下大夫止於五乎嚴陵方氏曰凡服其章雖異至於𤣥衣纁裳則通上下如之然此止以言士者士之服無章以𤣥纁為主故也自大夫而上皆冕服也士則皮弁服而已藻必五采特曰朱綠則舉其華者以該之也亦與雜帶君朱緑同義凡此豈非以文為貴乎然自以少為貴而下皆不言禮至此復冠之於首者葢禮以文為主山隂陸氏曰黼黻冕服也𤣥衣纁裳亦冕服也天子舉龍衮其次舉黼又其次舉黻又其次舉𤣥衣纁裳葢言之法以辭而已矣是諸侯無藻火大夫無黼士無黻龍神而不可知天子之德也黼尚威斷諸侯之事黻有可否大夫而後進焉若天子上士服𤣥冕德猶愧於此有以素為貴者至敬無文父黨無容大圭不琢大羮不和大路素而越席犧尊疏布鼏樿杓此以素為貴也鄭氏曰大圭長三尺杼上終葵首琢當為篆字之誤也明堂位曰大路殷路也鼏或作幕樿木白理也孔氏曰至敬謂敬之至極祭天服用大裘是無文也父黨謂父之族黨以質素事之無有折旋揖讓之容也大圭天子朝日月之圭尚質故無琢桓蒲之文鄭註杼上終葵首者杼殺也頭方而殺其上也終葵首椎名也於杼上之頭又為方椎也大羮肉汁也不和無鹽梅也大古初變腥但煮肉而飲其汁未知調和後人祭既重古但盛肉汁謂之大羮大路殷祭天車也越席蒲席也祭天質素故素車蒲席也犧尊者先儒云刻尊為犧牛之形鄭云畫尊作鳯羽婆娑然故謂娑尊也祭天用陶匏葢以瓦為尊畫犧羽於上或可用犧形為尊是夏殷禮也疏布鼏者疏麤也鼏覆也謂郊天時以麤布為巾以覆尊也故幂人云祭祀以疏布巾幂八尊註云以疏布者天地之神尚質也貴素故用白理木為杓而鄭註周禮亦云祭天爵不用玉也長樂陳氏曰至敬無文篤於誠也父黨無容篤於愛也天子大圭則搢之不琢而杼上所以象乎天之藏物而無為也鎭圭則執之故必琢而銳所以象乎天之生物而有為也象其有為以示其仁之顯象其無為以示其用之藏仁之顯則小而用之藏則大故不琢所以為大圭也以不琢而謂之大圭則羮不和謂之大羮路不飾謂之大路以其道之所寓而非功之所致也以蒲為席謂之越席畫牛於尊謂之犧尊牛取其能耕犧言其共祭言犧而不言牛以共祭為主也八尊所以祭天地故尚質六彝所以祭宗廟故尚文則疏布之所鼏唯尊而已嚴陵方氏曰大圭之用即其體而無琢刻之功所以為大若鎭圭之類則小矣大羮之湇遺其味而無調和之齊所以為大若鉶羮之類則小矣大路之制因其質而唯朴素之尚所以為大若金路之類則小矣禮之不同者固多而大槩不過於多少大小髙下素文山隂陸氏曰幂人祭祀以疏布巾幂八尊以畫布巾幂六彝不尊於郊也所謂越席葢亦以此凡木不飾為樿樿櫛樿杓是也葢若龍勺疏勺蒲勺則於杓加飾矣孔子曰禮不可不省也禮不同不豐不殺此之謂也葢言稱也鄭氏曰省察也不同言異也孔氏曰此引孔子語證上諸事也馬氏曰自禮以多為貴而至於禮以素為貴皆禮之寓於形名度數之閒其用不同者有如此也其用雖不同要之歸於稱則一也故豐之而不以為有餘殺之而不以為不足唯其稱而已此為禮不可不察也山隂陸氏曰禮有以多為貴亦或貴少有以大為貴亦或貴小有以髙為貴亦或貴下有以文為貴亦或貴素如此不可不察禮不同不豐不殺此之謂也禮有以多以大以髙以文以少以小以下以素不同然於多於大於髙於文不殺於少於小於下於素不豐取稱而已禮之以多為貴者以其外心者也德𤼵揚詡萬物大理物博如此則得不以多為貴乎故君子樂其𤼵也禮之以少為貴者以其内心者也德産之致也精微觀天下之物無可以稱其德者如此則得不以少為貴乎是故君子愼其獨也鄭氏曰外心用心於外其德在表也詡猶普也徧也𤼵猶見也樂多其外見也内心用心於内其德在内致致密也物無可稱其德者萬物皆天所生孰可奉薦以稱也孔氏曰此一節記者廣明稱禮之事及貴多貴少之意外心謂起自朝廷廣及九州四海王者冝𤼵揚其德普徧萬物既有德𤼵於外豈得不貴多乎君子則天子也樂得其禮𤼵見於外也德天地之德也産生也天地之德生於萬物精微無遺視天下萬物皆天地所生若持彼所生以報於彼無物可稱是其外迹豈得不貴少乎嚴陵方氏曰心一而已以示禮於外故有外心焉以體禮於内故有内心焉用心於外故以多為貴用心於内故以少為貴德之𤼵揚則其和足以詡萬物矣詡言能翕張也德雖不言而翕張萬物如之一翕一張相濟而和則大得其禮而功之所施者博矣以多為貴乃其稱與故君子樂其𤼵也易言天地之大德曰生則天下之物皆德之所生也故曰德産物生之迹雖粗而其道則致精物生之迹雖顯而其道則致微故曰德産之致也精微德之所致如此觀天下之物固無可以稱其德者矣以少為貴乃其稱與故君子慎其獨也延平周氏曰禮之以多為貴者以其外用其心也外用其心者出而應物者也禮之以少為貴者以其内用其心也内用其心者入而藏於密者也道者生乎德者也德者入乎道者也故德生之極則道也道固精而不粗微而不顯舉天下之物孰有稱其德者内心者聖人之所從事故言尊外心者聖人之所不得已故言樂馬氏曰君子之為禮無必於多而有以多為貴者以其心之顯於外也無必於少而有以少為貴者以其心之蘊於内也其曰德𤼵揚以下言聖人之德釋其禮以多為貴之義也其曰德産之致以下言天地之德釋其禮以少為貴之義也聖人之德得之於中而𤼵揚於外足以普被萬物盛德大業至於如此則得不以多為貴乎言貴多則曰大曰髙曰文在其中矣生生之德精微不可名狀凡天下之物皆粗而無足以為對也聖人觀天下之物無可以稱其德特修誠以事之而已則得不以少為貴乎言貴少則曰小曰下曰素在其中矣樂其𤼵樂其德之𤼵於外也慎其獨者身致其誠而已山隂陸氏曰理大則所該之物廣𤼵若法度彰禮樂著君子所樂在焉天地之大德曰生所謂德産如此而極其致非形器所能喻也慎其獨慎所以感之者廬陵胡氏曰外心漢匡衡云廣心浩大詡大也少儀云㑹同主詡在下君子樂君德之𤼵見内心若道心惟微也范陽張氏曰内心則寂然不動之時也喜怒哀樂未𤼵之時也易所謂敬以直内也孟子所謂盡其心知其性也外心則感而遂通之時𤼵而中節之時也易所謂義以方外也孟子所謂存其心養其性也自内心而進於此則為堯舜禹湯文武之功業為父子君臣夫婦長幼朋友之大倫為天地日月之照明兼天人通本末合内外循環往復無有不可譬之於木從元生本從本立根從根立榦從榦𤼵枝從枝復條從條出葉以枝葉觀本元相去逺矣然枝枝葉葉皆元氣也有元氣無枝葉不足以見元氣之功有内心無外心則無以見禮之大用由是推之一葉之黃一枝之瘁皆本根之病也一拜之不酬一言之不中皆内心之不充也古之聖人内之為尊外之為樂少之為貴多之為美是故先王之制禮也不可多也不可寡也唯其稱也孔氏曰此一節覆說制禮唯稱也天不可外報所以内極敬慎而其理為尊外心接物廣大故外極繁富而其事可樂極心於内故外以少為貴極理於表故以外多為美故先王以稱為禮也嚴陵方氏曰内外以心言多少以物言即上文所言者是也外心不止於多則或髙或大或文亦外心耳内心不止於少則或下或小或素亦内心耳稱其内心則以少為貴故不可多稱其外心則以多為美故不可寡此先王制禮之道也馬氏曰心藴於内聖人則以少為貴所以尊其内也心顯於外聖人則以多為貴所以樂其外也天下之物賤在多貴在少故少之為貴少而至於多則莫不充實故以多為美故曰少之為貴多之為美延平黃氏曰天子施禮於諸侯十有二牢以多為貴也諸侯報禮於天子膳以牲犢以少為貴也以多為貴者外心也以少為貴者内心也故曰内之為尊外之為樂少之為貴多之為美諸侯之於天子觀天下之物無可以稱其德者得不以少為貴乎郊特牲曰牲孕弗食祭帝弗用諸侯之膳天子上同乎帝尊貴之也天子之於諸侯為之牢禮之數而諸侯之待王官也令百官皆具樂美之也葢謂待王以多則為褻待百官以少則為簡故曰不可多也不可寡也唯其稱也方氏曰内外之分不可以偏廢而先王因得以制禮者自天地之禮觀之天固尊矣而郊以特牲豈非内之為尊故歟至於社稷之祭而牲以大牢則外心以盡物而已自君臣之禮觀之君固尊矣而膳以牲犢豈非内之為貴故歟至於國君之享則具十二牢則外心以盡物而已以下享上備物不足以稱德而内心以為尊以上享下非物不足以盡誠則外心以為樂是故君子大牢而祭謂之禮匹士大牢而祭謂之攘鄭氏曰君子謂大夫以上孔氏曰此一節說禮既須稱中則得禮僭則盜竊大夫常祭少牢遣奠及卒哭祔用大牢匹士士也士常祭特豚遣奠卒哭祔加一等少牢長樂陳氏曰有君國子民之位而以大牢為祭此禮之所當然而非禮所謂過也以匹夫之賤而亦以大牢為祭此攘竊者之所為而非所謂禮也士固有祭而不止於薦則祭者士之所得為然因其所得為之祭而至於大牢之僭此固非士之所宜以其有所因故言攘而不言盜也嚴陵方氏曰諸侯謂之君大夫謂之子匹士猶匹夫匹婦匹偶也以其有夫婦之偶而已夫祿厚者用禮隆祿薄者用禮殺凡以稱己之有無而後可為故以是言之馬氏曰君子者以位之貴者言之匹士者以位之賤者言之古者天子諸侯卿大夫皆君子也天子諸侯卿大夫位之尊其禮可以致其隆故曰天子以犧牛諸侯以肥牛大夫以索牛此大牢而祭謂之禮也至於匹士大牢而祭故謂之攘攘者非其有而取之也管仲鏤簋朱紘山節藻梲君子以為濫矣鄭氏曰濫亦盜竊鏤簋謂刻而飾之大夫刻為龜耳諸侯飾以象天子飾以玉朱紘天子冕之紘也諸侯青組紘大夫士當緇組紘纁邊栭謂之節梁上楹謂之梲宫室之飾士首本大夫達棱諸侯斵而礱之天子加密石焉無畫山藻之禮也孔氏曰此一節明奢而失禮之事管仲齊大夫也簋黍稷器案少牢敦皆南首鄭註云敦有首者尊者器飾也飾器象龜周之禮飾器各以其類龜有上下甲故鄭知為龜形也燕禮有象觚故知諸侯飾以象也周禮九嬪云賛玉齍玉府云共玉敦故知天子飾以玉也鄭云紘天子冕之紘諸侯青組紘皆祭義文也案士冠禮緇組紘纁邊天子諸侯用純大夫當用雜與士同紘冕之飾用組為之以其組從下屈而上屬之於兩旁垂餘為纓也此鏤簋朱紘是天子飾而管仲僭濫為之山節謂刻柱頭為斗栱形如山也藻梲者謂畫梁上侏儒柱為藻文也鄭引栭與楹此釋宫文引宫室之飾至天子加密石並莊二十四年穀梁傳文彼云大夫斵之士斵本與此異案禮緯云達棱謂斵為四棱以達兩端士斵去木之首本令細與尾頭相應明堂位云山節藻梲天子廟飾此管仲僭為之也嚴陵方氏曰是皆天子之禮管仲以陪臣為之則過於奢矣奢則僭故君子以為濫濫者溢而無所制之謂也雜記所謂難為上者以此晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣鄭氏曰隘猶狹陋也祀不以少牢與無田者同不盈禮也大夫士有田則祭無田則薦澣衣濯冠儉不務新孔氏曰此一節論儉而不中禮非稱之事晏平仲齊大夫名嬰大夫祭用少牢士用特豚而平仲今用豚豚又過小并豚兩肩不揜豆也必言肩者周人貴肩也肩在俎今云豆喻其小假豆言之其實在俎不在豆也嚴陵方氏曰隘者陋而無所容之謂雜記所謂難為下者以此是故君子之行禮也不可不愼也衆之紀也紀散而衆亂孔子曰我戰則克祭則受福葢得其道矣鄭氏曰言二大夫皆非也紀絲縷之數有紀我知禮者也克勝也孔氏曰戰勝祭受福是所為得道不多不少隨而稱當也祗為二大夫之不稱也連言戰者郊特牲二句相連故合引之也橫渠張氏曰孔子謂我戰則克聖人有不戰戰豈容至敗䘐凡興師必各有名師非尊主庇民皆無名也祭必受福福者百順之名孔子所以交神明者必别有道凡祭祀之末告利成利之為言順利通達内盡志外盡物於祭祀之事順利皆達也舊以利為養養乃其閒一事耳孔子曰我戰則克若止謂伏義者為勝則子産叔向輩舉兵亦若有不義者然夫戰當一勝一負豈非然乎聖人之戰無敗若周孔相對則何如唯有不戰知彼知己一有不及則戰矣嚴陵方氏曰紀一定則衆目各有條理故紀散而衆亂此君子之行禮所以不可不愼也祭義曰致物用以立民紀是矣我戰則克祭則受福王氏謂寡可强而使也衆則不可强而使也人可欺而事也神則不可欺而事也順以使衆故戰則克誠以事神故祭則受福能順則得戰之道矣能誠則得祭之道矣夫子之所謹則得其道可知葢疑詞馬氏曰紀者衆目之緫禮者亦百行之緫君子之戰非必於克而克隨之君子之祭非必於受福而福亦隨之葢在己者有以先之也在己有以先之者禮而已矣石林葉氏曰我戰則克祭則受福孔子之可必者多矣何獨舉此二事祭而受福猶可期之神戰而必勝則軍旅之事子固以自信乎此葢郊特牲紀春蒐之禮古者四時之田以習戰因取其獲以共祭祀是以言季春出火簡車賦歷卒伍鹽其禽以觀其不犯命求服其志不貪其得而繼之以是焉則當並云戰每習則可以必其勝祭盡禮則可以必其福以理之當然禮器不原其本而復出之故不盡其義然曰禮衆之紀紀散而衆亂又曰葢得其道矣下即云祭祀不祈及牲薦之事是亦此意禮器郊特牲似出兩人各誦所聞初不相謀也君子曰祭祀不祈不麾蚤不樂葆大不善嘉事牲不及肥大薦不美多品鄭氏曰祈求也詩云自求多福福由己耳祭祀不為求福也麾之言快也祭有時不以先之為快也葆之言襃也葆大謂器幣也嘉事之祭致夫人是也禮冝告見於先祖耳不善之而祭多品禮之義有以小少為貴故不貴肥大孔氏曰此一節論祭祀之事依禮而行不樂華美也凡祭祀本為感踐霜露設祭以存親非為祈福報也周禮設六祈之科非禮之常也蚤謂先時也不以霜露未至而先時蚤設為快也襃崇髙之稱也祭之器幣大小長短自有常冝幣通丈八尺豆盛四升不以貴者貪髙大為之也嘉事冠昬也人年二十成人自冝冠三十嗣世自冝昬若無親者昬三月祭以告廟冠畢埽地而祭禰並是有為而然非謂善之而設祭牲不及肥大者謂郊牛繭栗宗廟角握社稷尺各有所冝不必並及肥大薦不美多品者薦祭品味冝有其定不以多為美故郊特牲而社稷大牢也案桓三年齊侯使仲年來聘致夫人告廟也唐陸氏曰齊人謂快為麾長樂陳氏曰君子之於祭祀也寧神而已故不祈因時而已故不麾蚤必求其稱故不樂器幣之葆大不忍其代親故不善冠昬之嘉事然祭祀有所謂祈牲有所謂肥大周官大祝掌六祈易萃之時用大牲吉嚴陵方氏曰以其言得於當時之君子故稱君子曰與左氏言石碏純臣也所稱同義祭祀不祈無私禱也有所祈凡以為民而已若噫嘻之祈上帝載芟之祈社稷不麾蚤者不先時也周官言前期十日帥執事而卜日遂戒祭義言孝子將祭慮事不可以不豫備非不先時也葢慮事具物不可以不先時及其行事則貴其時而已故經又言祭則觀其敬而時也夫冠昬所以著代其祭也乃不忘本非善之而祭也左氏言奉牲以告曰博碩肥腯曲禮言犧牛肥牛則牲非不肥大也為其禮茍不至徒及肥大則儀不及物故也祭統言茍可薦者莫不咸在郊特牲言不敢用常褻味而貴多品則薦非無多品也為其誠茍不至而美多品則以美没禮故也馬氏曰祭者所以追養繼孝非求福也故不祈者自求多福而已非求於神也風雲霜露之變殊君子履之而悽愴怵惕之心生春禘秋嘗皆因時而追念其親也故曰不麾蚤茍快於蚤非合諸天道也器幣所以將誠茍葆大其器而無其意君子不樂也書曰享多儀儀不及物曰不享惟不役志于享凡民惟曰不享與此同意冠昬之禮必先祭於祖廟者非以嘉事為善也示其有尊祖親禰之意禮有以大為貴而牲不及肥大禮有以多為貴而薦不美多品者脩其在中之誠而已葢君子内則盡志外則盡物在外之物不可得而盡盡其在内之志而已矣山隂陸氏曰祭祀有祈戾焉今曰不祈戾也葆大讀如保大春秋傳所謂保大鳬鷖曰太平之君子能持盈守成則神祗祖考樂之今曰不樂保大戾也雲漢之詩曰祈年孔夙方社不莫今曰不麾蚤戾也禮君與夫人交獻以嘉魂魄今曰不善嘉事戾也禮奉牲以告曰博碩肥腯今曰牲不及肥大戾也及讀如公及戎盟于唐之及春秋傳曰及猶汲汲也禮凡天地之所生莫不咸在今曰薦不美多品戾也其言如此雖戾然於經猶合者則以有貴於此者也故曰我戰則克祭則受福葢得其道矣孔子曰臧文仲安知禮夏父弗綦逆祀而弗止也燔柴於奥夫奥者老婦之祭也盛於盆尊於瓶鄭氏曰文仲魯公子彄之曽孫臧孫辰也莊文之間為大夫於時為賢是以非之不正禮也文二年八月丁夘大事于大廟躋僖公始逆祀是夏父弗綦為宗人之為也奥當為爨字之誤也或作竈禮尸卒食而祭饎爨饔爨也時人以為祭火神乃燔柴老婦先炊者也盆瓶炊器也明此祭先炊非祭火神燔柴似失之孔氏曰閔公僖公俱是莊公之子閔適而少僖庶而大莊公死而立閔為君僖時為臣閔少而死後乃立僖僖死文公立弗綦為宗伯典禮佞文公云吾見新鬼大故鬼小以閔置僖下是臣在君上為逆亂昭穆文仲不能諫止故為不知禮禮祭爨神言其有功於人人得飲食故祭報之弗綦謂是火神燔柴祭之文仲又不能諫止又為不知禮爨者是老婦之祭其祭卑唯盛食於盆盛酒於瓶卑賤若此何得燔柴祭之故鄭註謂奥當為爨也祝融并奥及爨三者不同祝融乃古火官之長五祀之神祀於郊奥者正是竈之神常祀在夏以老婦配之有俎及籩豆設於竈陘又延尸入奥爨者宗廟祭後直祭先炊老婦之神在於爨竈三者所以不同也新安朱氏曰有問竈可祭否荅曰飲食所繫亦可祭又問竈尸荅曰想是以庖人為之嚴陵方氏曰奥者西南隅致養之地故祀竈於奥以竈能化飲食以養人故也配以先炊故謂之老婦之祭猶以后稷配天而謂之郊祀后稷也金華應氏曰奥者西南隅之地而燔柴以焚牲也文仲不知正其順祀之為禮徒以昵於所親之為孝時僖公之死未久既升其祀於上又即其所居之奥而焚牲以為祭夫子謂此特老婦之祭耳葢五祀設主而迎祭於奥皆室人親薦而婦人之老者主其事物則盛於盆酒則尊於瓶是其所以為媚事之能耳而何益於孝乎或曰奥即廟中之奥葢是既逆祀故加此於二廟以為媚也廬陵胡氏曰祭竈先薦於奥有主有尸周時特牲迎尸如宗廟之儀但無燔柴耳鄭以為爨誤矣延平周氏曰先炊之有祭猶牧之有先牧而嗇之有先嗇也禮記集說卷六十
