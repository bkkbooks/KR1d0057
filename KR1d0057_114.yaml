body:
  text: 禮記集說卷一百十四宋衛湜撰祭統第二十五孔氏曰案鄭目録云名曰祭統者以其記祭祀之本也統猶本也此於别録屬祭祀長樂陳氏曰祭之為道廣矣大矣深矣逺矣雖載諸文辭莫可得以極其微隱也故有心有志有齊有敬有誠所以言其內者也有容有儀有法有制有禮所以言其外者也有大小之差有尊卑之用有貴賤之分有親疏之宜有外內之辨有隂陽之殊所以言其等也有報其本有反其始有旌其德有答其功有迎而致之有送而終之有追而存之有招而合之有昧而顯之所以言其義也有尊罍俎豆簠簋籩篚宫廟垣屋之用假外物以致其誠也有牲牢葅醢圭玉幣帛明水𤣥酒鬱鬯燔燎之奠取精潔以復其本也在周之六官各有其屬分職典禮以奉祭祀兼六代之禮樂取三王之沿革以成其能或經或緯不勝其密矣故作祭統總序大綱穿貫百職統成一禮見其始末之謂也故綱舉而萬紀皆張統先而衆目必振此祭統所以始於心怵而終於觀政也嚴陵方氏曰祭法非不及義然以法為主祭義非不及法然以義為主祭統則統而論之無所偏主也山隂陸氏曰禮有五經莫重於祭則祭者其統也名之曰祭統以此凡治人之道莫急於禮禮有五經莫重於祭夫祭者非物自外至者也自中出生於心也心怵而奉之以禮是故唯賢者能盡祭之義鄭氏曰禮有五經謂吉禮凶禮賔禮軍禮嘉禮也莫重於祭謂以吉禮為首也大宗伯職曰以吉禮事邦國之鬼神祗怵感念親之貌也怵或為述孔氏曰此一節眀祭祀於禮中最重唯賢者能盡祭義凡祭為禮之本禮為人之本將眀禮本故先說治人經常也案大宗伯吉禮之别十有二凶禮之别五賔禮之别八軍禮之别五嘉禮之别六五禮之别總三十有六自猶從也言孝子祭親非假他物從外至於身使己為之從孝子身中出生於孝子之心也孝子感時心中怵惕故奉親以祭祀之禮若非賢者不能盡怵惕之義也嚴陵方氏曰六典之有刑非不重也然不若禮之為急五禮之有軍非不急也然不若祭之為重禮有經義有權經言其常權言其變五經者禮之常也可以義起者禮之變心有所怵於內故以禮奉於外而已蓋以其自中出非外至故也奉之以禮者見乎物盡之以義者存乎心狥其物而忘其心者衆人也發於心而形於物者君子也故曰唯賢者能盡祭之義石林葉氏曰禮者道所以成體故於治人為急祭者人所以報本故於禮為重感霜露之降此自外至而生於人心者亦非自外至也有惻隱怵惕之心此自中出而反諸天道者亦未必由中出中出則盡志凡在已者無不盡外至則盡物凡在道者無不順此賢者之祭所以受其福也慶源輔氏曰祭吾之誠敬耳故曰自中出生於心也凡在外之物所以將之而已故曰非物自外至者也心怵而奉之以禮外狥於物而內忘其心者有之矣故曰唯賢者能盡祭之義禮義固由賢者出也故下文言賢者之祭致其誠敬眀薦之而已不求其為者此所謂能盡此祭之義也賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言內盡於己而外順於道也忠臣以事其君孝子以事其親其本一也上則順於鬼神外則順於君長內則以孝於親如此之謂備唯賢者能備能備然後能祭是故賢者之祭也致其誠信與其忠敬奉之以物道之以禮安之以樂參之以時眀薦之而已矣不求其為此孝子之心也祭者所以追養繼孝也孝者畜也順於道不逆於倫是之謂畜鄭氏曰世所謂福者謂受鬼神之祐助也賢者之所謂福者謂受大順之顯名也其本一者言忠孝俱由順出也明薦明猶潔也不求其為為謂福祐為己之報畜謂順於德教孔氏曰此一節明祭祀受福是百順之理世人謂福為夀考吉祥祐助於身若賢者受福身外萬事皆順於道理故云非世所謂福也內盡於己外順於道釋百順之義謂心既內盡外又行善無違於道理也上則順於鬼神又廣大其順也鬼神尊故言上出則事公卿故言外不求其為者言孝子但內盡孝敬以奉祭祀不求其福祥為己之報案少牢嘏辭云皇尸命工祝承致多福無疆於女孝孫使女受祿于天宜稼于田此云不求者謂孝子之心無所求也但神自致福故有受祿于天之言若水旱災荒禱祭百神則有求也故大祝有六祈之義大司徒有荒政索鬼神之禮追養繼孝者養是生時養親孝是生時事親親今既沒設禮祭之追生時之養繼生時之孝畜謂孝子順於德教不逆倫理可以畜養其親故釋孝為畜橫渠張氏曰百順之謂福和樂即是福也大抵無待於外則順自致若必待外以為樂則常是不福君子則常受福者君子盡其力以備祭又其才之能豫故祭之日尤受福也接鬼神之道無他唯和樂即是交接也鬼神之道不違乎己又無物與之交祗自己存此心斯為接矣故當祭貴乎百順貧而直至於無以為禮而不害交鬼神誠意在故也嚴陵方氏曰名生於實者也受百順之名以己有百順之實則神有百順之報可知雖曰非世所謂福是乃世所謂福也孔子言祭則受福以是而己夫有衍而無耗之謂福故曰福者備也然而能順於上下或逆焉則不可謂之備能順於此彼或逆焉亦不可謂之備故曰備者百順之名也無所不順者之謂備必曰百者舉其多且以成數言之猶百福百祿百祥稱百而已臣之盡忠子之盡孝所謂內盡於己也於君則順事君之道於親則順事親之道所謂外順於道也下又兼順鬼神而言之者亦所謂順於道也於鬼神君長言順則知所謂孝於親者亦順也於親言孝則順於鬼神為敬順於君長為忠又可知反覆言之者以見無不順而備故也然祭有十倫而此止以三者為備者以三者為十倫之大故也三者備矣則十倫不期備而備矣致其誠則無僞行致其信則無疑慮致其忠則無欺心致其敬則無怠志四者祭之本所謂物者奉乎此而已所謂禮者道乎此而已所謂樂者安乎此而已所謂時者參乎此而已蓋物以將其意故曰奉禮以行其義故曰道樂以樂其來故曰安時以節其中故曰參雖其如此俱明薦之於其親而已不求其為也眀薦與眀禋眀饗同義不求其為者或為己或為人皆未免乎有所為檀弓曰唯祭祀之禮主人自盡焉耳其言正與此合追養繼孝養為事親之事孝為事親之道追言追其往繼言繼其絶孝子之事其親也上則順於天道下則不逆於人倫是之謂畜孔子曰父子之道天性也則孝之順於天道可知孟子曰內則父子人之大倫也則孝子不逆於人倫可知順則不逆矣不逆未盡乎順與論語於為君言難於為臣言不易同義馬氏曰言福則未及於道言道則福從而備之矣循於道之謂備蓋循於道則無所不備故曰無所不順之謂備山隂陸氏曰莊子曰循於道之謂備其本一也言忠即是孝孝即是忠非兩也言以孝於親者以上順於鬼神外順於君長二事孝於親也變言孝亦以此孝經曰事父孝故忠可移於君事兄弟故順可移於長今其言更如此言出於孝者還以為孝也唯賢者能備春秋責賢者備亦以此能備然後能祭所謂唯賢者能盡祭之義也西鄰禴祭可謂內備隨雖獨豐外備而已若致其誠信以下然後能備故曰奉牲以告曰博碩肥腯奉盛以告曰潔粢豐盛奉酒醴以告曰嘉栗旨酒所謂馨香無讒慝也於是民和而神降之福其謂之眀薦蓋亦如此孝者畜也臣畜君以忠子畜父以孝順於道不逆於倫若舜盡之矣書曰蒸蒸乂不格姦又曰夔夔齊栗瞽亦允若瞽亦允若於是為至夫以下畜上可謂難矣雖舜不能頓至石林葉氏曰聖人具天道則能饗賢者具人道則能祭福者富也有萬不同之謂富故於道無所不順內既孝於親順而受福其在外也必忠於其君順而受位故曰事親孝故忠可移於君其本一也鬼神洋洋如在其上已所畏也君於國長於鄉皆在外已所尊也致其孝於內則上順鬼神外順君長人道皆為備矣故曰賢者能備指其事親而言之則曰孝子指其具人道而言之則曰賢者誠者信之成信者所以有諸己也故奉之以物忠者敬之盡而敬所以直內也故道之以禮樂以迎來則安之以樂合諸天道則參之以時孝子之心所以自盡者如此豈有求而為哉生可得而養死不可得而養則孝幾於絶矣故祭則追養以繼孝養之至則上而天道以順於鬼神下而人倫以不逆於君長亦寧神之大者歟慶源輔氏曰必受其福以理必之也世所謂福則不可必也鄭謂孝子受大順之顯名非是名猶名言之名猶言備者百順之謂而已內盡於己外順於道則仰不愧天俯不愧人內不愧心心安體胖是賢者之所謂福也不言外順於物物有不可順者也能備然後能祭則祭之必受福可知也經之所謂福具於未祭之前世之所謂福應於己祭之後前言心怵而奉之以禮者禮寓於物也此云奉之以物道之以禮者物必將之以禮也不求其如此然後能盡祭之義一有所求義不盡矣奉之以物以物將其誠敬也道之以禮以禮行其誠敬也安之以樂以樂安其誠敬也參之以時以時參其誠敬也奉之以物則不為虗拘行之以禮則輔以威儀安之以樂則不為勉强參之以時則發必中節如此然後能盡其心追如追逺之追繼如繼眀之繼養在事孝在心金華應氏曰古之論福者曰降之百祥曰降爾百福曰受天百福曰百祿是荷皆謂降之於上而畀之於下此所謂福乃不求諸神而求諸己不求諸外而求諸內故其名云備百順者即理之無所不順也蓋惠迪吉從逆凶順則為福逆則為禍皆在我不在彼也誠信忠敬所謂忠信禮之本禮樂時物所謂義理禮之文理則無所不順有致福之道也心則不求其為無幸福之心也所謂祭祀不祈也追養者追其不及之養而繼其未盡之孝也畜固為畜養之義而亦有止而畜聚之意焉是故孝子之事親也有三道焉生則養沒則喪喪畢則祭養則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也鄭氏曰沒終也孔氏曰此一節眀孝子事親有三種之道嚴陵方氏曰以養志為上以養口體為下此養之順也發於聲音而見於衣服此喪之哀也所以交於神眀者祭之敬也所以節其疏數者祭之時也孔子曰養則致其樂喪則致其哀祭則致其嚴又曰春秋祭祀以時思之其言正與此合是三者皆孝子之所常行故曰道行而有可見之迹故曰孝子之行也觀者上下見之之謂觀其順則不順者亦可見矣觀其哀則不哀者亦可見矣以至敬與時皆然也石林葉氏曰養則致其樂而此觀其順者順為樂之形也喪則致其哀而此觀其哀者哀為喪之本也祭則致其嚴而此觀其敬者敬為嚴之體也蓋孝子之行不過此三者而其誠信忠順皆在內者故曰孝子之心也慶源輔氏曰順即前所謂順於道不逆於倫也故曰至於犬馬皆能有養不敬何以别乎數與疏皆非時也既內自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也夫祭也者必夫婦親之所以備外內之官也官備則具備水草之菹陸産之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣凡天之所生地之所長苟可薦者莫不咸在示盡物也外則盡物內則盡志此祭之心也鄭氏曰言玉女者美言之也君子於玉比德焉具備具謂所共衆物也水草之菹芹茒之屬陸産之醢蚔蝝之屬天子之祭八簋昆蟲謂溫生寒死之蟲也內則可食之物有蜩范草木之實菱芡榛栗之屬咸皆也孔氏曰自此至祭之道也一節以上言孝子事親先能自盡又外求伉儷供粢盛之事案醢人加豆之實芹菹朝事之豆茒菹是芹茒也又有昌本深蒲菭筍是水草故鄭云之屬醢人饋食之豆有蜃蚔蝝即蚔之類有兔醢醯醢皆是陸産故云之屬明堂位云周之八簋蜩蟬也范蜂也此昆蟲之屬籩人加籩之實有菱芡饋食之籩有棗栗榛實是草木故云之屬嚴陵方氏曰既內自盡於己也又外求助於人求助之道莫大乎夫婦之際以夫婦而行祭祀之道則足以盡隂陽之義以夫婦而共祭祀之事則足以備外內之官故國君取夫人之辭以事宗廟社稷為言也必曰玉女者言其有貞潔之德也所以事宗廟社稷亦在乎有貞潔之德而已觀卷耳之詩后妃則輔佐君子求賢審官雞鳴之詩則夫人夙夜警戒有相成之道然婦之助夫固不特在乎祭祀之時也此之所言亦以祭祀為本故曰此求助之本也夫婦親之若君制祭夫人薦盎君割牲夫人薦酒卿大夫相君命婦相夫人此外內之官也官所以執事事所以具物故曰官備則具備菹與醢類也故周官屬醢人然以植物為之則曰菹以動物為之則曰醢水草之菹即七菹所謂茒菹芹菹之類陸産之醢即七醢所謂兔醢鴈醢之類然七菹又有葵菹之類不必皆水草七醢又有蟲醢魚醢之類不必皆陸産俎者三牲則八簋者五榖也言八簋則俎為三俎矣言實則菹亦非虗矣俎所薦者天産故其數用三之竒簋所盛者地産故其數用八之耦於昆蟲草木言隂陽之物者蓋昆蟲以隂蟄以陽出草木以隂枯以陽榮故也然草木亦隂物也陸産亦陽物也三牲以陽物也八簋以隂物也正謂昆蟲草木為隂陽之物者以用至於昆蟲之異草木之實而隂陽之物於是為備故也以隂陽之物於是為備故曰凡天之所生地之所長苟可薦者莫不咸在示盡物也徒盡物於外而不能盡志於內亦不足以盡祭之心矣故曰外則盡物內則盡志祭之心也延平周氏曰易曰一隂一陽之謂道故先王以孝子自盡為不足而又有求助之禮也內盡志而外不盡物者所謂西鄰之禴祭實受其福者也外盡物而內不盡志者所謂東鄰殺牛不如西鄰之禴祭者也內則盡志外則盡物其祭之心也故萃之卦曰用大牲吉順天命也馬氏曰必夫婦親之以生事之也詩曰吉蠲為饎是用孝享言其有至誠以將之也又曰苾苾芬芬神嗜飲食言有至誠必假外物以將之也蓋誠不盡不足以享神物不備不足以禮神詩曰濟濟蹌蹌潔爾牛羊言內盡其志外盡其物也石林葉氏曰娶妻非為養而有時乎為養所以外求助也蓋宗廟之祭君牽牲夫人薦盎社稷之祭君耕以供粢盛夫人親蠶以為祭服故曰共事宗廟社稷君治外而卿大夫相之夫人治內而命婦相之所謂備內外之官也動物天産所以作隂德故參之以昆蟲之異則陽之物備植物地産所以作陽德故參之以草木之實則隂之物備由隂陽而推之則凡天地之間可薦者皆其物所以盡也物盡於外而無志以將之君子以為徒物故曰內之為尊外之為樂延平黃氏曰君子之祭不盡志無以致敬不盡物無以致愛致齊於內散齊於外齊之日有所思祭之日有所見此盡志也內心也其備小物也水草之菹陸産之醢在焉其備美物也三牲之俎八簋之實在焉其備陽物也昆蟲之實在焉其備隂物也草木之實在焉此盡物也外心也慶源輔氏曰自盡實難事親若曽子可也心盡而誠行則內外之官不容不備內外之官備則凡祭之事物不容不備小物備矣美物或未備也美物備矣隂陽之物或未備也至於隂陽之物備則至矣盡矣無遺矣又云凡天之所生地之所長苟可薦者莫不咸在蓋其至誠無有窮己之意故云此祭之心也孝子祭親之心何有窮盡但拘於禮束於財不得自盡其心焉耳矣是故天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神眀此祭之道也鄭氏曰純服亦冕服也互言之爾純以見繒色冕以著祭服東郊少陽諸侯象也夫人不蠶於西郊婦人禮少變也齊或作粢孔氏曰此覆結上文必夫婦親之及盡物盡志之事王藉田在逺郊甸師氏掌之內宰云中春詔后帥內外命婦始蠶於北郊注云婦人以純隂為尊故也天子太陽故南也諸侯少陽故東也然藉田並在東南故王言南諸侯言東后太隂故北郊夫人少隂合西郊然亦北者婦人質少變與后同也莫耕莫蠶莫無也言王侯豈貧無榖帛而夫婦自耕蠶乎以其欲致誠信故身自親之鄭氏言純有二義一絲旁才古緇字二絲旁屯是純字但書文相亂緇皆作純鄭注於絲理可知於色不眀者即讀為緇若此純服是也若衣色可見絲文不眀即讀為絲嚴陵方氏曰東南陽地而耕為陽事故於之以耕北者隂地而蠶為隂事故於之以蠶而南又盛陽之地故天子耕於南郊冕用朱紘者亦以此東者少陽之地故諸侯耕於東郊冕用青紘者亦以此此又隆殺之别也夫有天下者四海之內皆臣妾耳有一國者百里之內皆臣妾耳則天子諸侯非莫與之耕王后夫人非莫與之蠶然且親耕親蠶焉則以身致其誠信而已以神眀之所饗者在誠不在物故也所謂神眀則與事天地之神眀所稱同而與交於神眀所稱異若所謂神位神號者神之也若所謂眀齍眀燭者明之也山隂陸氏曰純言服冕言冠天子言所服諸侯言所戴亦言之法鄭氏謂純服亦冕服也互言之爾非是知然者以天子宜主言郊諸侯言廟知之也荀子曰郊之麻絻一也蠶於北郊為宜詩曰南東其畝則耕雖於東郊可也案蠶與馬同氣牛宜南方馬宜北方又蠶惡南風此所以雖夫人猶蠶於北郊歟盧陵胡氏曰非莫耕非莫蠶言非祭不耕蠶也及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也嗜欲無止也及其將齊也防其邪物訖其嗜欲耳不聼樂故記曰齊者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齊也專致其精眀之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精眀之至也然後可以交於神明也鄭氏曰訖猶止也定者定其志意孔氏曰自此至夫婦親之一節眀將祭齊戒之義并眀君與夫人皆致齊㑹於大廟夫婦交親行祭之義及時將祭謂四時應祭之前未旬時也方將接神先宜齊整身心故齊也未齊之時心慮散蕩心所嗜欲有不齊整及其齊也止此不齊之事以致極齊戒之道嚴陵方氏曰夫齊所以致一致一則不齊者齊矣大事即祀事也恭敬則人事也指人言之故曰恭敬耳防以防其外之表也止以止其內之出也物自外入故曰防嗜欲由中故曰止前言止而後言訖者止之而後訖故也後言邪物則前所言物者亦邪物而已齊固不止於耳不聼樂然樂者人之所樂也則所以散其志尤在於樂故也故又引記以為言焉此與學記引蛾子時術之所言同不為物所二故其德精不為物所蔽故其德眀致者致其至而已故先言致其精眀之德而後言精眀之至也精之至矣故於祭之心則為精矣精志眀之至矣故於祭之道則為眀禋眀享焉散齊即祭義所謂散齊於外是也致齊即祭義所謂致齊於內是也此以時之先後為序彼以事之內外為序也解亦見彼以齊於內故又謂之宿以其宿於內也禮器所謂三日宿者以此以齊於外故又謂之戒言戒於外也禮器所謂七日戒者以此若心不茍慮與訖其嗜欲之類則所以齊其內也若手足不茍動與防其邪物之類則所以齊其外也夫散者集之則一歸乎定故散齊七日以定之致其至焉則未始不齊故致齊三日以齊之定言定於外齊言齊其內馬氏曰揚子曰存亡形屬荒絶其唯齊乎蓋齊者致一以格神也夫趨舍汨心則不足以致一故齊不齊以致齊也夫唯精眀之至然後可以交於神眀精者天德之至可以入神樂則志散而誠不存故不聼樂石林葉氏曰聖人以道極其髙眀則無思也無為也道中庸則莫不思也亦莫不為也唯其有思故齊唯其有為故戒然言齊而不及戒者以為出於思故也君子嚴於事鬼神其戒則防邪物以治外其齊則訖嗜欲以治內內外治則耳不聼樂而志不散也志不散則心依於道道無形也手足依於禮禮有體也易言齊戒以神眀其德而此則致精眀之德者以其主祭祀而言則不嫌於不及神也要之精其思而已散言其思之始致言其思之盡而又夫婦親之其敬如此神眀其有不交乎慶源輔氏曰誠信則一一則盡二則不盡矣一而盡洞洞屬屬則敬也敬則與天為一況於鬼神乎有大事故有恭敬恭敬故有齊固有臨大事而恭敬弗至者矣故其言如此變止言訖訖則遂止矣齊固不止於此於此猶不焉他可知也君子亦何時不然必於此言之所以致其慎且為中人以下設依於道志以道寧也依於禮非禮不動也精眀我之神眀也神眀神之精眀也極其致則我與神非二也故曰微之顯誠之不可掩如此夫是故先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於內然後㑹於大廟君純冕立於阼夫人副禕立於東房君執圭瓉祼尸大宗執璋瓉亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之鄭氏曰宫宰守宫官也宿讀為肅齊猶戒也戒輕肅重大廟始祖廟也圭瓉璋瓉祼器也以圭璋為柄酌鬱鬯曰祼大宗亞祼容夫人有故攝焉紖所以牽牲也周禮作絼芻謂藁也殺牲時用薦之周禮封人祭祀飾牲共其水藁涗盎齊也盎齊涗酌也凡尊有眀水因兼云水爾嚌嚌肺祭肺之屬也君以鸞刀割制之天子諸侯之祭禮先有祼尸之事乃後迎牲芻或為䅳孔氏曰外謂君之路寢內謂夫人正寢是致齊並於正寢散齊亦然但此文對㑹於大廟故云然耳祭日君與夫人俱至大廟之中純冕純亦緇也上文已解冕皆上𤣥下纁其服亦然故通云緇冕若非二王後及周公廟則悉用𤣥冕而祭副及禕后之上服魯及二王之後夫人得服之侯伯夫人揄狄子男夫人屈狄並立東房伏俟行事尸既入之後轉就西房故禮器云夫人在房雖不云東西然下文夫人東酌罍尊則知在房謂西房也大宗主宗廟禮者亞祼之禮夫人親為之此云大宗記者廣言容夫人有故故大宗伯代夫人行禮下云夫人薦涗水薦豆顯夫人親行也各有所眀不可一揆君執紖者紖牛鼻繩君自執之入繫於碑卿大夫從驅之及殺與幣告皆從於君士執芻者芻謂藁也以其殺牲用芻藁藉之也宗婦執盎從謂同宗之婦執盎從夫人而來奠盎齊於位夫人乃就盎齊之尊酌此涗齊而薦之鄭注盎齊涗酌周禮司尊彞文彼注云盎齊差清和以清酒泲之謂之涗酌鄭引此解薦涗即盎齊也夫人薦盎不薦眀水今經薦涗之下更言水以盎齊加眀水故記者因盎而連言眀水耳上言夫人副禕則此是上公之祭宜有醴齊盎齊但言盎略耳亦容侯伯子男之祭但有盎齊也君執鸞刀羞嚌嚌肝肺也嚌有二時一是朝踐之時取肝以膋貫之入室燎於爐炭出薦之主前二謂饋孰之時君以鸞刀割制所羞嚌肺橫切之使不絶亦奠於俎上尸並嚌之故云羞嚌一云羞進也謂君用鸞刀制此嚌肉以進之案少牢特牲薦孰之時俎有祭肺及舉肺切之舉肺離而不提心二肺皆嚌之故鄭云嚌肺祭肺之屬也嚴陵方氏曰散齊七日致齊三日則及祭凡十日矣故先期旬有一日宫宰宿夫人而詔之齊也戒其期故曰宿且經宿而後致齊則謂之宿宜矣若世婦言宿戒大司樂言宿縣皆以是耳大宰言前期十日帥執事而卜日遂戒則於是日而遂散齊也聼外治者君也故致齊於外聼內職者夫人也故致齊於內與祭義所謂內外者異矣彼謂一身之內外齊於內外所以辨其位㑹於大廟所以聨其事君純冕立於阼夫人副禕立於東房與眀堂位所言同義於夫人言副禕則君純冕者衮冕也六冕皆麻而曰純者孔子稱麻冕禮也今也純儉吾從衆當孔子時固有純冕矣王氏釋服周之冕為純冕者以此衮冕副禕蓋天子王后之服容記二王之後與魯禮亦極諸侯之盛禮言之爾衛非二王之後而夫人之詩則曰副笄六珈何也周官追師掌首飾有副有編有次副為首飾之上故以之配三狄編為首飾之中故以之配鞠展次為首飾之下故以之配禒衣而已謂之副則夫人之所同謂之禕則天子之所獨猶衮之九章則上公之所同旒之十二則天子之所獨也男服以在上者異所以尊陽道也女服以在上者同所以尊隂道也三狄雖同用副然以配禕衣為正故經未有言副揄屈者止曰副禕而已周官大宗伯凡大祭祀王后不與則攝而薦豆籩徹則大宗固有攝夫人亞祼之禮矣大宗即宗伯也君執紖則親牽之故也宗婦宗子之婦也經有言命婦從夫人而此言宗婦者宗婦亦命婦矣命婦則不必宗婦也其從夫人則命婦之所同至於執盎則宗婦之所獨齊有五而宗婦止執盎者據君牽牲之時也祭義言夫人奠盎正與此合然彼言夫人奠盎此言宗婦執盎者宗婦執之夫人奠之故也薦涗水則郊特牲所謂眀水涗齊貴新是也酌齊則必用涗矣祭義不言者略也嚌者尸所嚌之肺也嚌則嘗之也以尸之所嚌故君執鸞刀而羞之也尸必嚌之君必羞之者以周人所貴故也夫人薦豆則與祭義所言同義以上題言夫祭也者必夫婦親之故此結言此之謂夫婦親之也延平周氏曰祭義散齊於外致齊於內以廟之內外言之也此君致齊於外夫人致齊於內者以宫為內以廟為外蓋夫人雖致齊亦不離於宫也此亦在中饋之意圭者象天用而半圭為璋示其君之於天用則全之而夫人則半之而已金華應氏曰十日十干之一周氣序之小變也齊戒於一旬之內示精神匝乎氣之所周而無變也旬之數十天地二五之合也散齊以七致齊以三皆陽剛而非隂雜也長樂陳氏曰殷人尊神而交神於眀故先樂而求諸陽周人尊禮而辨神於幽故先祼而求諸隂書曰王入大室祼祭統曰君執圭瓉祼尸則尸入大室以圭瓉酌鬱鬯祼之后又以璋瓉酌鬱鬯亞祼其祼尸也如祼賔客則王與后自灌之矣鄭氏釋小宰謂王酌鬱鬯以獻尸尸受祭之啐之奠之然尸神象也神受而自灌非禮意也鄭氏又謂宗廟有祼天地大神至尊不祼考之於禮典瑞祼圭有瓉以肆先王以祼賔客玉人祼圭尺有二寸有瓉以祀廟又鬯人秬鬯之所用則社廟山川四方而已是祼不施於天地也然大宗伯凡祀大神享大鬼祭大宗涖玉鬯表記曰親耕粢盛秬鬯以事上帝蓋祀天有鬯者陳之而已非必祼也行人曰公再祼侯伯子男一祼諸侯有祼而卿無祼則以酒禮之而已祭統所謂獻之屬莫重於祼者此也禮書山隂陸氏曰亞祼非獨容夫人有故攝焉亦容宗伯亞夫人祼蓋二王之後三祼君一夫人一大宗一馬氏曰言士執芻則後於君言宗婦執盎則先於夫人者蓋芻所以用於迎牲之後而執盎必居於薦之前也禮記集說卷一百十四
