body:
  text: 禮記集說卷三十四宋衛湜撰凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序愼測淺深之量以别之悉其聰明致其忠愛以盡之疑獄汜與衆共之衆疑赦之必察小大之比以成之鄭氏曰權平也意思念也淺深謂俱有罪本心有善惡也盡之盡其情也小大猶輕重已行故事曰比孔氏曰原本也凡犯罪之人或子為父隱臣為君諱雖觸刑禁而非其本惡故聽訟者本其宿情立其恩義為平量之恕而免放之盡意思念量罪之輕重次序不有越濫謹慎測度罪人之意善惡淺深之量以分别之使不相亂也聽獄之人又當盡悉己之聰明尋其事之根本致其忠恕仁愛不使嚴酷枉濫以盡犯罪之人情不有抑屈疑獄謂事可疑難斷者也汜廣也已若疑彼罪而不能斷決當與衆庶共論決之若衆人疑惑則當放赦之故書云與其殺不辜寧失不經也比例也言雖疑而赦之不可直爾而放當必察案舊法輕重之例以成於事也長樂陳氏曰輕重言其罪淺深言其情大小言其辟原父子之親則以恩掩義立君臣之義則以義掩恩悉其聰明則得其情致其忠愛則哀矜而勿喜疑獄與衆共之吕刑所謂胥占是也衆疑赦之吕刑所謂刑罰之疑有赦是也嚴陵方氏曰父子之親本乎情故曰原君臣之義錯諸事故曰立親主於愛而已一於愛則刑有所不忍加義主於敬而已一於敬則刑有所不敢及一皆如是豈足以為法之經哉其或於親有所原於義有所立者特從法之權而已故曰以權之也事之輕重各有序也而不可亂焉行其事者其可以無倫乎亦在乎論之而已情之淺深各有量也而不可過焉原其情者其可以無測乎亦在乎測之而已事非有惑無所用論故曰意論以意生乎有惑故也情非用誠不可以測故曰愼測以慎由乎用誠故也若是則輕重淺深各得其辨矣故曰以别之也悉其聰則所聽者無遺矣悉其明則所見者無遺矣致其忠則不欺之至矣致其愛則不忍之至矣若是則有不盡於刑之道乎故曰以盡之也泛與泛愛之泛同可信則斷之以己可疑則資之於衆也衆疑赦之者又不以偏愛而有所釋必察其罪之在大辟則比於大辟以成其獄察其罪之在小辟則比於小辟以成其獄比之為言附也吕刑所謂上下比罪是矣其序則首言權之者以見先王之用刑非以為常也然事情不可以無辨故繼言以别之别之則理無遺矣故繼言以盡之盡之則獄可以決矣故言以成之終焉李氏曰五家為比有罪則竒邪相及而父不慈子不祗兄不友弟不恭則不相及也比必相及所以使之止其惡父子兄弟不相及所以使之全其恩故曰必原父子之親為王之親而有罪則適輕犯王之親有罪則適重凡賢者能者有功者勤者為王之賓者皆有以寬而宥之犯之者反此故曰立君臣之義原在乎情故曰原立在乎義故曰立權者至於平而止之物也吕刑曰兩造具備師聽五辭五辭簡孚正於五刑五刑不簡正于五罰五罰不服正于五過聽以五辭正以五刑刑之正也正以五罰正以五過刑之變也司寇正刑明辟師聽五辭之謂也凡制五刑必即天論正于五刑之謂也郵罰麗於事正于五罰之謂也衆疑赦之正于五過之謂也古之聽獄也察下之妄僞無所逃其罪而罪之所疑猶赦之此亦務省刑之道而有以見先王之仁也石林葉氏曰父為子隱親之也臣為君隱尊之也親之則為仁故原之則以重本尊之則為義故立之則以正名二者於理為可而於罪則不可量輕重而行者乃所以為權也刑所施有輕重輕下服而重上服則其序也罪有淺深深者刑重淺者刑輕則其量也序則有理故意以論之量則有制故慎以測之此四者所施不同要其刑罰明辨而不失此所謂别之也聰明則聽獄訟者也忠愛則斷獄訟者也聰明近智精而思之在己忠愛近人推而及之在人故聰明言悉忠愛言致智則得其情仁則哀矜而勿喜聽斷獄訟至此則待之已盡至於罪有可疑而衆共赦亦必從之猶刑人於市與衆棄之也雖然罪有輕重則事有大小引事類而比附以決之然後成獄辭講義曰父子之親若周官議親之辟是也君臣之義若周官議賢之辟是也金華邵氏曰用刑以平允為主不可偏於一也原父子之親則近於愛故必權之以君臣之義則不溺於愛意論輕重之序則近於私故必謹測淺深之量則不流於私悉其聰明則近於察故必致其忠愛而不陷於察如此而或偏於一未之有也成獄辭史以獄成告於正正聽之正以獄成告於大司寇大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告於王王三又然後制刑鄭氏曰史司寇吏也正於周鄉師之屬今漢有正平丞秦所置周禮鄉師之屬辨其獄訟異其死刑之罪而要之職聽於朝司寇聽之朝王之外朝也左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉大司寇聽之棘木之下即此外朝也獄成告於王王使三公復與司寇及正共平之重刑也周禮王欲免之乃命公㑹其期三又當作三宥宥寬也一宥曰不識再宥曰過失三宥曰遺忘孔氏曰成獄辭者獄吏初責核罪人之辭已成定也吏以成辭告於正正得吏告罪成之辭而又聽察也鄭注云鄉師之屬鄉謂鄉士師謂士師云之屬者謂遂士縣士方士之等非周禮地官之鄉師也漢書百官表廷尉秦官掌刑辟有正左右監宣帝初置左右平鄭見古有正連言平耳王制多是殷法秦則放殷置之也正聽已竟又以獄成之辭告於大司寇大司寇與公卿在朝槐棘之下聽獄訟成以告於王也鄭注辨其獄訟異其死刑之罪而要之職聽於朝是鄉士遂士縣士職文彼注云異謂殊其文書謂殊異其應死刑之罪要之者為其罪法之要辭即是囚之狀辨録為要狀周禮朝士掌外朝之法左嘉石平罷民焉罷民則是犯罪之人鄭注左九棘至三公位焉皆朝士職文故知聽於外朝也棘取赤心而外刺見周禮注王命三公參聽之者王既得司寇之告成辭而刑辟不可謬妄故王又命三公與司寇及正更共參準聽之是三公之外共人相參而聽之也注云周禮欲免之公㑹其期遂士職文三公參聽得其情實以獄成辭以告於王王三又者三三事也王得三公之告則以三事命寬之鄭注云一宥以下周禮司刺文不識者不審也若仇讎當報甲見乙誠以為甲而殺之者過失若舉刃欲斫伐而軼中人者遺忘若間帷簿忘有在焉而以兵矢投射之王恐有此三事致罪故令宥之若不當三事故造罪者然後制刑嚴陵方氏曰成獄辭謂訊獄之辭已成而不可變也則非謂無簡矣故史得以獄成告於正也獄辭始於史者以掌官書故也正之聽也特於獄而已至於大司寇之聽也則又於朝焉聽之於朝而獄之辭又成矣故可以告之於王然而獄正特刑官之屬而已大司寇特刑官之長而已專以一官之聽猶慮不能無私焉故王又命三公參聽之以合乎公議也三公參聽之而獄之辭又成矣於是又告於王若是則以五刑治之固可矣然以三又之法原之或在所赦焉故三又然後制刑也可以制刑矣而又宥之故謂之又也君子之盡心尤見於此長樂陳氏曰正周官鄉士之類是也史鄉士史十有二人之類是也王必三宥然後有司制刑者王以道揆而貴乎寬有司以法守而貴乎嚴寬則天下之所樂嚴則天下之所畏山陰陸氏曰正無常位顧所言何如耳若建其正立其二則正大司徒大司寇是也正掌官法以治要師掌官成以治凡則正大司徒小司徒大司寇小司寇鄉師士師是也此言大司寇又言正則正謂小司寇矣將出學小胥大胥小樂正簡不帥教者以告於大樂正大樂正以告於王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉屏之逺方西方曰棘東方曰寄終身不齒又曰成獄辭史以獄成告於正正聽之正以獄成告於大司寇大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告於王王三又然後制刑是二者上之所敬謹也若司市掌市之治教政刑小刑憲罰中刑狥罰大刑撲罰雖曰未麗於刑亦刑之事也然則大樂正所屏大司寇所刑司市所罰一歲幾何皆君相之所當先知者故王齊戒受諫冡宰齊戒受質不敢以為後故曰天子齊戒受諫司㑹以歲之成質於天子冢宰齊戒受質大樂正大司寇司市三官以其成從質於天子凡作刑罰輕無赦刑者侀也侀者成也一成而不可變故君子盡心焉鄭氏曰法雖輕不赦之為人易犯也變更也孔氏曰此文起例故云凡作刑罰也此非疑獄故雖輕不赦若輕者輒赦則犯者衆也故書云刑故無小刑者侀也此說刑之不可變上刑是刑罰之刑下侀是侀體之侀言刑罰之刑加人侀體又曰侀者成也言侀體之侀是人之成就容貌容貌一成之後若以刀鋸鑿之斷者不可續死者不可生故云不可變故君子盡心以聽刑則上悉其聰明致其忠愛是也延平周氏曰書曰宥過無大刑故無小蓋刑罰者所以防其故者也故雖輕亦在所不赦長樂陳氏曰蓋無赦則民不至於犯罪盡心則吏不至於濫刑有無赦之法以禁於未然之前有盡心之吏以應於己然之後此民所以畏法而親上也馬氏曰刑之所以為刑者猶人之有侀也一辭不具不足以為刑一體不僃不足以為成人故曰刑者侀也侀者成也辭之所成則刑有所加而不可變故曰一成而不可變君子無所不盡其心至於用刑則尤慎焉山陰陸氏曰凡作刑罰輕無赦言如上所謂可謂恕矣即欲作而興之雖輕又不可赦若羣飲汝勿佚盡執拘以歸于周豫其殺是也刑者侀也者刑者人之刑也無趾曰天刑之安可解天之所謂刑異乎人之所謂刑侀者成也者人之刑論成而已一成而不可變故君子盡心焉若三公以獄之成告於王雖王猶不得變桃應問曰舜為天子臯陶為士瞽瞍殺人則如之何孟子曰執之而已矣李氏曰司寇職曰聽萬民之獄訟以情訊之至於旬乃弊之用情訊之所以盡其心及十日斷之以其一成而不可變也故舜獨命士曰欽哉欽哉析言破律亂名改作執左道以亂政殺作淫聲異服竒技竒器以疑衆殺行僞而堅言僞而辨學非而博順非而澤以疑衆殺假於鬼神時日卜筮以疑衆殺此四誅者不以聽鄭氏曰析言破律巧賣法令者也亂名改作謂變易其官與物之名更造法度也左道若巫蠱及俗禁淫聲鄭衛之屬異服若聚鷸冠瓊辨也竒技竒器若公輸般請以機窆行僞至而澤皆謂虛華捷給無誠者也假於鬼神時日卜筮今時持喪葬築蓋嫁取卜數文書使民倍禮違制四誅者不以聽為其為害大而辭不可明孔氏曰左道謂邪道地道尊右右為貴故漢書云右賢左愚右貴左賤故正道為右不正道為左巫蠱若武帝時江充埋桐人於太子宫是也蠱者損壞之名巫行邪術損害人者俗禁若前漢張竦行辟反支後漢郭躬傳有陳伯子者出辟往亡入辟歸忌是也鄭衛多淫風故謂淫聲鄭云之屬者桑間濮上之音亦是也鄭子臧好聚鷸冠見僖二十四年左傳楚子玉為瓊辨玉纓見僖二十八年左傳瓊辨謂馬飾皆異服也公輸般請以機窆者指其人巧謂之竒技指其機窆謂之竒器故竒技竒器總謂般也行此詐僞而守之堅固不肯變改言談僞事辭理明辨不可屈止習學非違之書而又廣博順從非違之事而能光澤文飾鄭注虛華謂習僞習非捷給謂辨博而澤孔子為魯司寇七日而誅少正卯之類是也假於鬼神時日卜筮者妄陳邪術恐懼於人假托吉凶以求財利如今時之人執持此喪葬築蓋嫁取卜數之文書以惑於衆妄陳禍福浪說妖祥築謂垣牆蓋謂舍宇嚴陵方氏曰析言則離於理破律則壞於法亂名則失其實改作則反其常若是者皆執左道以亂政也故殺竒技足以蕩人之心竒器足以喪人之志所學者非則道失其正矣况至於澤而及人乎假於鬼神則以禍福而惑人者也假於時日則以災祥而惑人者也假於卜筮則以吉凶而惑人者也雖不足以亂政亦足以疑衆矣故亦在所殺也左道者以於道逆而不便也國語士蒍曰大子君之二也恭以俟嗣何官之有今君分之土而官之是左之也是則左以言其逆也春秋南遺曰冢卿無齒介卿以葬不亦左乎是則左以言其不便也馬氏曰淫聲所以惑民聽異服所以惑民視竒技竒器所以惑民心僞對誠之辭非對是之辭言行僞而不由於誠學順非而不由於是猶足以惑動人之善心甚者至於堅辨博澤有以惑衆故殺卜筮者先王所以使民信時日畏法令而不以正告則謂之假假於鬼神之幽而信其卜筮之明則有以惑於衆故殺之長樂陳氏曰先王之於民其教之也則鄉師考教察辭稽器展事合方氏同其數器一其度量除其怨惡同其好善訓方氏誦四方之傳道正歲則布而訓四方而觀新物行人屬象胥諭言語協辭命諭書名聽聲音逹瑞節同度量其禁之也大司徒有造言之刑亂民之刑大司樂禁淫聲司稽禁不物者大祝禁逆祀命者然則析言以亂理破律以亂法亂名而失實改作以敗常執左道以畔順以至假於鬼神時日卜筮以亂政疑衆者其在所殺宜矣然析言破律亂名改作執左道者多出於在上者之所為故亂政所謂發於其政害於其事者也淫聲以至時日卜筮多出於在下者之所為故疑衆所謂發於其事害於其政者也亂政者其害大疑衆者其害小此亂政之誅所以先於疑衆也時日卜筮必有禁何也古者天子有守龜諸侯有守筮大夫有所占則請卜於君而已是在下者無卜筮之禮也山陰陸氏曰破律破後王所述改作改先王所作若瞽史諭書名是亦名也李氏曰舜典曰怙終賊刑怙自恃以為姦者也終遂而不反者也賊害人者也三者先王之所刑而刑之莫先於怙此四誅之所以不聽也求之周官析言破律亂名改作執左道以亂政所謂暴力亂政者也作淫聲異服竒技竒器以疑衆所謂矯誣犯禁者也行僞而堅言僞而辨學非而博順非而澤與夫假於鬼神時日卜筮以疑衆所謂作言語而不信者也故禁暴氏曰以告而誅之所以誅其不聽也先王之世道德一而習俗成其行有若是者乎蓋亦僃法所不免也後世道德既微而竒行者於刑無誅義理既晦而異言者於法無禁行僞者其行之有故言僞者其言之成理淫辭不能放詖行不能距此君子所以思反經而已矣石林葉氏曰先王盛時道德一於天下言而有法則可述離析其言則為無法事正其名則事成亂名改作則為敗事執左道而不順於理則為逆凡此非特疑於衆而於國政亦亂之也聲不正則淫服不同則異技也器也不合法度則為竒言行不比先王則為僞學不順其是則為非鬼神時日卜筮不以實告則為假凡此雖非害政而人之視聽不得自信亦疑之也亂政則入造言之刑疑衆則入亂民之刑皆所必誅而無赦故不以聽雖然言行以僞學順而非皆所自為而刑必誅而無赦不已甚乎蓋其行堅也疑於德言辨也疑於道學非也疑於智順非也疑於仁皆足以驚世亂俗此所以楊氏為我墨氏兼愛陳仲子之亷尾生之信君子力排之也延平周氏曰此四誅者不以聽以其非過而其情不待於聽也金華邵氏曰論其罪雖未至於可殺䆒其實則蠱民心甚矣故不聽而殺之聖人防微之意也凡執禁以齊衆不赦過有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市關執禁以譏禁異服識異言鄭氏曰不赦過亦為人將易犯圭璧金璋至戎器皆尊物非民所宜有戎器軍器也粥賣也用器不中度至姦色凡以其不可用也用器弓矢耒耜飲食器也度丈尺也數升縷多少錦文珠玉衣服飲食不粥於市不示民以奢與貪也成猶善也五榖果實未成不利人木伐之非時禽獸魚龞殺之非時皆不中用故皆不粥於市周禮仲冬斬陽木仲夏斬陰木春獻鱉蜃月令季冬始漁關竟上門譏呵察孔氏曰言圭璧金璋及犧牲戎器皆是尊貴所合蓄之物非民所宜有防民之僣僞也軍器防民之賊亂也飲食器者既夕禮敦杅之屬布帛精粗者若朝服之布十五升斬衰三升齊衰四升之類是也廣狹者布廣二尺二寸案鄭注周禮則帛廣二尺四寸若不中度數並不粥於市衣服飲食與珠玉連文據華美者不得粥之若尋常飲食則得粥也但不得羣聚耳故周禮司暴云禁屬游飲食於市是也前言圭璧金璋是貴者之器非民所宜有此錦文珠玉是華麗之物富人合有但不得聚之過多故云不粥於市不示民以奢也飲食不粥者不示民以貪也司關之官執此戒禁之書以譏察出入之人禁身著異服者又識口為異言之人防姦僞察非違長樂劉氏曰此夏殷司市所執之禁令也天下之民以有易無莫不萃於市也司其市者執禁令以通其有無而犯於國之禁令者不得粥於其市則人人篤於信義而詐僞不生矣物物遂其性命而暴夭不作矣禮制由之以立忠愛由之以成故中和可致於市民也嚴陵方氏曰禁之所在不可違也故以執言也周官士師掌國之五禁皆以木鐸狥于朝書而縣于門閭近則狥之使聞逺則縣之使觀在上待之為己盡在下習之為己久如是而猶犯之宜其不赦矣金璋蓋以金飾之璋即考工記所謂大璋中璋黃金勺青金外者是以言圭璧金璋則琥璜之類可知命服謂君所命之服若再命受衣服者是矣命車謂君所命之車若三命受車馬者是矣戎器不粥而兵車之中度則得粥之者以丘乘出車賦而兵車之粥不可禁故也姦色謂若紅紫之類正色謂若𤣥黃之類孔子惡紫之奪朱則姦色固能亂正色以其不正足以生姦也錦文猶月令之言文繡言錦則繡可知言文則章可知珠玉未成器而得粥於市者以用之以為器然後見其為奢也衣服飲食人之所日用者不可不粥此亦禁其侈靡者而已觀周官掌市之治教政刑量度禁令亦不過是也執禁以譏即前關譏而不征禁異服則慮其足以惑衆視識異言則慮其足以惑衆聽特曰識之所以借上之所采而逹之故也識與小子識之之識同馬氏曰致天下之民聚天下之貨以其所有易其所無交易而退者先王日中之市也先王之為政在於明分而貴賤異勢其用不可無差等故圭璧金璋上之所寶也命服命車上之所用也宗廟之器犧牲上之祭祀所用也戎器上之所以禦患也凡此皆上所用非下之所宜有故皆不粥於市先王之為政在於度量而度量不一則先王有所禁故不中度不中數不中量皆不粥於市先王於為政害者使之亡靡者使之微故姦色亂正色錦文珠玉成器衣服飲食皆不粥於市所以去其靡也五穀不時果實未熟木不中伐禽獸魚鱉不中殺皆不粥於市所以去其害也異服之在四誅則不以聽而止於禁之識之何也蓋禁之者守關之事也至於誅則在上者之所為也山隂陸氏曰圭璧金璋言有以下諸物不常有也穀梁曰其不言有不使麟不恆於中國也金在璋上著金亦器若金敦之類兵車不中度不粥於市則兵車中度粥於市也周官質人掌成市之兵器然則戎器不粥於市為有戎器者也非戎器不粥於市衣服飲食不粥於市謂初非粥者也即他飲食不應有禁下言大史大史王左右也逺則舉關近則舉王左右以為其餘莫敢不慎也李氏曰執禁者持成法以有待也持之以法故曰執待其未然故曰禁雖過不赦欲民莫敢不慎也圭璧金璋命服命車宗廟之器犧牲戎器粥於市則慢禮用器不中度布帛精粗不中數幅廣狹不中量姦色粥於市則亂政錦文珠玉成器飲食粥於市則靡俗五穀不時果實未熟木不中伐禽獸魚鱉不中殺而粥於市則傷物周官司市凡僞飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二蓋錦文成器飲食民得以有而不禁圭璧金璋犧牲商得以資賈得以粥而無禁命服命車戎器工得以作而無禁故在民在商在賈在工者皆十二而此言其禁則十有四也盱江李氏曰司市凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微利利於民謂物行沽者使有使阜起其賈以召之也使亡使微抑其賈以却之也侈靡細好使富民好奢微之而已又僞時之禁俱十有二工不得作賈不得粥商不得資民不得畜此經所言亦其類也夫理財之道去僞為先民之詐僞蓋其常心矧兹市井飾行儥慝何所不至哉姦僞惡物而可雜亂欺人以取利則人競趨之矣豈惟愚民見其竒邪使人妨日廢業以作無用之物人廢業則本不厚矣物無用則國不實矣下去本而上失實禍自此始也至於侈靡皆為人費雖不可盡去亦當制節使微少矣孟冬之月令曰毋或作為淫巧以蕩上心必功致為上書曰不貴異物賤用物民乃足正此之謂也石林葉氏曰以令示於衆而使之避者禁也一弛其禁而赦之則犯者必多故不赦過自圭璧金璋至於禽獸魚鱉皆設禁於市者也至於關者人所道以出入而其所禁尤嚴於市故衣服二而民德不歸於一則禁異服議論異而道德不合於一則識異言異服見於用則易知故曰禁異言必辨而後審之故曰識先王一道德以同俗明刑而析言異服者殺所以誅其已然正法而異言異服者譏所以禁其未然凡此皆治民之具諱惡者亦人情所不免故下大史執簡以記其言動奉諱惡以示禁者所以為治天下之終也延平周氏曰先王治市之法如此之致詳蓋所以杜其僣踰欺詐而又以順時令者也關之有征先王之通法孟子謂今之為關將以為暴豈有征即是暴耶蓋言征之有過於先王之法者也吳氏萃曰司市僞飾之禁在民在商在賈在工皆十有二而在民尤先於商賈與工者民不敢用則商賈不敢敗工亦不敢造也王制其禁凡十有四先王之世大率言於市如此此民之所以安分務本而無奢淫姦僞之習也大史典禮執簡記奉諱惡鄭氏曰簡記䇿書也諱先王名惡忌日若子卯孔氏曰此經論大史之官典掌禮事國之得失是其所掌執此簡記䇿書奉進於王以所諱所惡之事奉進也鄭注諱謂先王之名惡謂子卯忌日其實餘諱亦大史奉之故禮運云天子適諸侯必舍其祖廟而不以禮籍入是謂天子壞法亂紀鄭注云以禮籍入謂大史典禮執簡記奉諱惡是亦諱諸侯之祖父也子卯巳具檀弓疏此惡亦兼餘事故誦訓云掌道方慝以詔辟忌鄭注云方慝四方言語所惡是也長樂劉氏曰此夏殷大史之職主典國之禮法凡有大禮大事則執簡記以考正其儀天子行禘祫㑹逺祖於大廟則奉其諱若日月有可惡而齊戒恐懼以俟天譴則奉其惡日於天子所以佐佑一人惕厲修德若天地有大災變三辰失其常度咎徴作於四時札瘥刑於四國皆天子之所惡也周官大史掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治正歲年以叙事于官府頒告朔于邦國而小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱大略皆同也長樂陳氏曰諱則非可言惡則非可為執簡記則王知所從奉諱惡則王知所辟凡此施於喪祭軍賔㑹同之類而已若夫四方之政事與其志則有誦訓傳道及詔辟忌嚴陵方氏曰執簡記即周官大史所謂執書抱法是也奉諱惡小史所謂詔王之忌諱是也此一言之於大史者以小史為大史之佐故得以兼之簡記謂簡冊所記之言也執言執之於此奉言奉之於上凡此特用之於行禮之時耳故以典禮言之山陰陸氏曰此言執簡書王言動善則記之惡雖記之猶諱變善言奉著善臣所奉也書曰監于先王成憲其永無愆惟說式克欽承廬陵胡氏曰諱惡謂人主所諱言而惡聞者賈山云人主惡聞其過是也故下云受諫天子齊戒受諫司㑹以歲之成質於天子冢宰齊戒受質大樂正大司寇市三官以其成從質於天子大司徒大司馬大司空齊戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官齊戒受質然後休老勞農成歲事制國用鄭氏曰歲終羣臣奏歲事諫王當所改為也司㑹冢宰之屬掌計要者成計要也質猶平也平其計要冢宰齊戒受質贊王受之也大樂正於周宗伯之屬市司市也於周司徒之屬從從於司㑹也百官司徒司馬司空三官之屬也百官受質受平報也休老勞農饗養之也成歲事斷計要也孔氏曰此一節論歲終天子受質及百官質於天子休老勞農制國用之事也以其歲終天子舊來所施之事或有不便須有改為百官以此上諌於王天子以其事重故先齊戒而後受於諫也司㑹總主羣官治要故以一歲治要之成質於天子質平也謂奏上文簿聽天子平量之也冢宰二王治事故亦齊戒贊王受羣臣所平之事謂共王論定也大樂正大司寇市三官各以其當司成要隨從司㑹平於天子以周法言之司㑹總主羣官簿書則司徒司馬司空簿書亦司㑹掌之質於天子所以下文司徒司馬司空各質於天子不由司㑹唯大樂正大司寇市三官從司㑹質於天子者司㑹總主治要先質於王若今時先申帳目樂正司寇司市當司事少即徑從司㑹以質於王其司徒司馬司空總主萬民其事既大雖司㑹進其治要仍須各受質屬官親自質於天子百官齊戒受質者以司徒司馬司空質於天子天子平斷畢當須報於下百官齊戒受天子所平之要然後休老勞農即十月蠟祭飲酒勞農也斷定計要一歲事成乃制來歲之國用故云制國用也案周禮注歲計曰㑹月計曰要日計曰成彼對文耳鄭總而言之故云成計要也司徒司馬司空受百官質故云三官之屬若以殷法言之案曲禮云司徒司馬司空司寇司士若以周法言之案夏𫝊司徒司馬司空三官分主九卿則兼羣官焉但大樂正大司寇司市特自質於天子也嚴陵方氏曰齊以齊其內志之動戒以防其外物之侵古之人將有思也將有為也未嘗不齊戒者凡以致其謹而已故君之齊戒所以謹其所受之諫於下也臣之齊戒所以謹其所受之質於上也然而一歲之內所諫所質多矣必於歲之終乃齊戒受之何哉蓋今歲於是乎幾終來歲於是乎更始朔易之事將有所平在始和之政將有所布宣既驗者可因為之監未然者可豫為之防君臣上下其可以不慎乎則齊戒以受之不為過矣成即周官司㑹之職以歲㑹考歲成者是矣謂之成以其計要所成之績故也計要正司㑹之所掌故其質於天子獨先於衆焉冢宰齊戒受質者蓋天子以司㑹之成降於冡宰必降於冢宰者以冢宰為天官之長司㑹則天官之屬故也大樂正大司寇市三官雖非冢宰之屬然以其計要正司馬之所掌故以其成質於天子特從司㑹而已大司徒大司馬大司空齊戒受質者是蓋各以其類受之也大司徒掌邦教敷五典者也而樂正則崇四術立四教焉故樂正之質則司徒受之司馬掌邦政統六師者也而司寇則詰姦慝刑暴亂焉故司寇之質則司馬受之司空掌邦事居四民者也而司市則掌僞飾之禁在民在商在賈在工者各十有二焉故司市之質則司空受之此非各以其類乎百官蓋三官之屬以其職卑而不敢專逹故必質於三官然後其成得逹於天子也獨不及宗伯者以樂正所立之教兼於禮故也故後休老勞農者蓋物作於春長於夏斂於秋藏於冬則一歲之終固可休之時也帝出乎震見乎離說乎兊勞乎坎則一歲之終固可勞之時也老者血氣既衰是為可休之人農之稼穡亦己勤矣是為可勞之人於可休之時而休其可休之人於可勞之時而勞其可勞之人蓋先王所以奉天時而為政者如是而已成歲事則所以計今歲之所入制國用則所以待來歲之所出也前經言量入以為出故成歲事然後可以制國用焉且歲事繫乎天則成其終者存乎人國用出乎下則制其始者本乎上故於歲事曰成國用曰制也長樂陳氏曰本在於上末在於下要在於主詳在於臣故百官積日而治詳天子一日列之而已此司㑹所以質歲之成於天子也周官司㑹以參互考日成以月要考月成以歲㑹考歲成以詔王及冢宰則詔王者質於天子是也詔冢宰者冢宰齊戒受質是也於天子言受諫於冢宰言受質受質則列其已然者受諌則列其已然而修其未然者其受之必至於齊戒無敢慢故也受質然後休老勞農以其萬物歸根之時而老者不可不休百穀既入之後而農者不可不勞休老黨正所謂正齒位籥章所謂息老物是也勞農特牲所謂息田夫月令所謂勞農而休息之是也馬氏曰日窮於次月窮于紀當是之時上之是非不可以不諌故天子則齊戒以受之下之善否亦不可不校故司㑹以歲之成質於天子質者質其是非而聽其誅賞也故天子以司㑹之成降於冢宰冢宰則齊戒受之說者以贊王受之其說蓋非是矣蓋掌一歲之事者冢宰也而司㑹者冢宰之屬周官曰日有成月有要歲有㑹故司㑹以歲之成質於天子天子則降於冢宰故其理也大樂正大司寇市三官統於冢宰而非冢宰之屬以其職無專逹故以其所成從司㑹以質其誅賞焉天子則以大樂正大司寇市三官之成降於三官故大司徒大司馬大司空則齊戒以受之百官者三官之屬而其職亦無專逹故以其成質於三官然後三官以百官之成質於天子則百官齊戒以受之至於百官受質然後休老勞農成歲事制國用考之周官大樂正者宗伯之所屬大司寇者六卿之所屬與此不同者蓋周官之言周之禮也延平周氏曰受諫必齊戒者神明之也司㑹總一歲之文書故質於天子必司㑹先之大樂正人材之所主大司寇民命之所繫司市國貨之所出三者可謂重矣故從之言司徒司馬司空而不及宗伯者禮出於教故也休老勞農者萬物歸根於冬然後復生於春帝勞乎坎然後復出乎震故蠟所以息老物與勞農者庶其有以繼之也成歲事者成終而成始也山陰陸氏曰以諌換質言王於此求諌非直受質而已亦王之隆嫌下或不敢諌六官不言宗伯以大樂正見之也廬陵胡氏曰大樂正等由司㑹以正於王大司徒以下三官不由司㑹者以其總主萬民得自質於王司㑹但進其治要耳先儒云天子平斷畢報於下故百官受天子所質之要非也此謂百官自受在下所質正之要也新安王氏曰冢宰司徒司馬司寇司空五官皆齊戒受質惟宗伯不與蓋典禮有常無可損益故也禮記集說卷三十四
