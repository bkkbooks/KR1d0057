body:
  text: 禮記集説卷三宋衛湜撰大夫七十而致事若不得謝則必賜之几杖行役以婦人適四方乗安車自稱曰老夫於其國則稱名越國而問焉必告之以其制鄭氏曰大夫七十致其所掌之事於君而告老謝猶聽也君必有命勞苦辭謝之其有德尚壯則不聽耳凡杖婦人安車所以養其身體也安車坐乗若今小車也老夫老人稱也春秋傳曰老夫耄矣於其國君雖尊異之自稱猶若臣鄰國來問必問於老者以荅之制法度孔氏曰七十曰老在家則傳家事於子孫在官致所掌職事還君退還田里也致是與人明朝廷有賢代已白虎通云臣年七十懸車致仕懸車示不用也君不使退而自去者尊賢也君若許其罷職必辭謝云在朝日久劬勞歳積是許其致事也今不得聽是其有德尚壯則必賜之几杖若本國巡行役事婦人能養人故許自隨適四方謂逺聘異國古者乗四馬之車立乗此臣既老故乗一馬小車坐乗也然此養老之具在國及出皆得用之言行役婦人四方安車互見也自稱為老夫者明君尊賢之故而老臣猶在其朝也於其國謂自與其君言也越國猶他國也若他國來問己國君之政君雖已達其事猶冝問於老賢則稱國之舊制以對他國之問也熊氏曰既不聽致事則祭義云七十杖於朝是也聽致事則王制云七十杖於國八十杖於朝是也清江劉氏曰古者大夫七十而致事君非使之也臣自行也臣雖行之君曰是猶足以佐國家社稷也留之不可失也於是有几杖安車之賜所以致留之也君雖留之臣曰不可貪人之榮不可慁人之朝不可塞人之路再拜稽首反其室君不強焉義也毋奪其爵毋除其禄毋去其采邑終其身而已矣此古者致事之義也是之謂上下有禮故古者大臣讓小臣廉庶人法百姓不競由此道也是以古之為臣者不四十不禄為不惑也不五十不爵為知命也不七十不致事養衰老也不惑故可與謀大計知命故可以受大寵養衰老故可以全節儉敎百姓矣故古之仕者為道也非為食也為君也非為己也為國也非為家也是以時進則進時止則止進不貪其位止不慕其權也今之人則不然仕非為道而為食也非為君也而為己也非為國也而為家也是以進不知止而困不知恥也藍田吕氏曰致事者致其所為臣之事於其君也有以道去其君而致事者孟子致為臣而歸是也有以喪而致事者如閔子要絰而服事已而曰古之道不即人心退而致仕是也有以老而致事者大夫七十而致事是也致事者退而家居士相見禮所謂宅者在邦則曰市井之臣在野則曰草茅之臣是也君子難進而易退故七十而致事賢君優老而尚賢則有不得謝者矣既不許其去則不責筋力以為禮也賜之几杖則雖在君前亦授之詩云肆筵設席授几有緝御是也雖見君亦杖祭義云七十杖於朝君問則席是也老夫長老者之稱也衛石碏告陳曰老夫耄矣無能為也與他國士大夫言也晉荀罃謂荀􅅯士匄曰牽率老夫以至於此與己國士大夫言也大夫老不得謝與他國士大夫言則稱老夫所以優之也與己國士大夫言則稱名父母之邦不敢以尊老自居也石碏荀罃雖皆列國之大夫未知其老而得謝與否也若皆不得謝者則碏可稱而罃不當稱也玉藻云上大夫曰下臣下大夫自名此對君之稱非此比也詩曰雖無老成人尚有典刑老成人者多識乎國之故事而典刑之所由出也越國而問則舉國之故事以對之所謂謀於黄髪則罔所愆馬氏曰七十而致事順天理也位至大夫君之所賢也天下之達尊三大夫兼而有之者也為君者得不致其愛敬乎於其致事而去必有以勞之於其留而自輔也必有以養之几杖婦人安車者所以養安其氣體不敢勞以事也所以見尚齒貴爵尊德之義不嫌其為倨也故當其為師則弗臣而不嫌其僭君於其冠則見兄拜之而不嫌其不弟蓋義有所伸雖自尊而不為泰也然於其國猶曰自名者所以尊君也夫天子巡守先見百年者九十者天子欲有問焉則就其室古之人咨於元老如此其敬以其賢而多聞也則冝有越國而問之矣必告之以其制者蓋制出於先王而非先王者無法故告之以其制也永嘉戴氏曰據本文此專為在官者言也凡養老仕謂之國老不仕謂之庶老先王時國老之禮尤厚七十致事大夫之常禮也賜之几杖人君之優恩也行役以婦人何也八十非人不煖七十之老而有行役則道途之不易固有以安其身也小車坐而乗之雖行歩稍緩而四體安矣自稱老夫謂適四方言也故下文曰於其國則稱名越國而問謂我問鄰國非鄰國來問也問人於他邦必告之以其制懼使人之不明舊典禮經則國為無人也古之時人君待老者之禮甚厚老人所以自待者亦不輕故人君有所尊敬國人有所矜式四方有所瞻仰天下安得而不治乎廬陵胡氏曰賜几杖如漢元朔中賜淮南王菑川王是也乗安車如漢起魯申公是也安車則駕一馬而坐乗漢制然也然漢時非安車亦有坐乗者萬石君是也檀弓云五十無車者不越疆而弔人上大夫也而同下大夫稱名者臣於君卑稱名無嫌也洛誥周公告成王曰予旦老臣越他國而問故必告之以制度不欺於彼國也古者越國而謀見左氏嚴陵方氏曰几則憑之以安其體杖則持之以助其力也行役外事也而以婦人焉欲其雖在外而猶在内也適四方勞事也而乗安車焉欲其雖服勞而不失其逸也言行役則主在公言之耳言適四方則主在逺言之耳在公猶得以婦人況在私之事乎在逺猶得乗安車況在國之時乎是皆待之以非常之禮故也長樂陳氏曰婦人言行役安車言適四方則行役不以安車適四方不以婦人也横渠張氏曰越國謂朝中有事在朝不能謀則越國而問退居之老臣也非謂越他國而問政決無此理既賴其謀事須盡語以國之事因本末施為始可與之謀也若不知次序則如之何而取謀臨川王氏曰越國而問謂老者自有事越出他國他國問之也謀於長者必操几杖以從之長者問不辭讓而對非禮也鄭氏曰從猶就也長者問當謝不敏若曽子之為孔氏曰此一節明有事取謀議於長者操執持也杖可以䇿身几可以扶已俱是養尊者之物故於謀議之時持就也藍田吕氏曰二者皆敬長之義也坐有几所以憑之也行有杖所以䇿之也皆優老之具也操几杖以從之敬之至也問者皆以不能問能以寡問多則少當問長者也今長者反問之不辭讓而對則敬不足也孔子問曽子曽子曰參不敏何足以知之公西赤曰非曰能之願學焉是皆辭讓之言長樂陳氏曰几杖所以親之辭讓所以尊之不親之不足以盡人之心非善謀於長者也不尊之不足以盡己之敬非善對於長者也辭者無所受於己讓者有所推於人曽子之謝不敏所謂辭也子路之對率爾非所謂讓也東萊吕氏曰古之子弟見長者不敢以賔客之禮見先存其讓弟之心所以操几杖者只是左右扶翼之意長者處未必無几杖所以操而從之者蓋存養其讓弟之心令熟未見長者之問此心已存及其見之則有加無已大凡長者有問須對若率爾而對便非禮與長者語須是虚心而受之若率爾而對自以為能便是實了此心雖有法語之言精微之理亦不能入王氏子墨曰善不可有能不可矜有善矜能之心不可施於常人況長者乎問而不辭遜以對是有善矜能之心已萌於中矣況責以事長之禮乎謀則操几杖以從之問則辭遜而後對要非勉強行於一時者所能彼其存於心者必有素矣凡為人子之禮冬温而夏凊昏定而晨省在醜夷不爭鄭氏曰安定其牀衽省問其安否何如醜衆也夷猶儕也四皓曰陛下之等夷孔氏曰此一節明人子事親奉養之禮又去爭訟冬温夏凊是四時之法昏定晨省一日之法定安也晨旦也應卧當齊整牀衽使親體安定之後退至明旦既隔夜蚤來視親之安否何如先昏後晨兼示經宿之禮熊氏云晨省者案内則云同宫則雞初鳴異宫則昧爽而朝在醜夷不爭者明朋儕禮也醜夷皆等類之名夫貴賤相臨則有畏憚朋儕等輩喜爭勝負亡身及親故冝戒之以不爭藍田吕氏曰温凊定省所以養體也醜夷不爭所以養志也一歳則有冬夏寒暑之適一日則有晨昏興寢之適人子不可不知也内則父母將衽長者奉席請何趾少者執牀與坐昏定之事也子事父母雞鳴適父母之所下氣怡聲問衣燠寒男女未冠笄及命士以上父子異宫則昧爽而朝文王之為世子雞初鳴衣服至於寢門外問安否何如此晨省之事也醜夷同等之稱也事親者居上不驕為下不亂在醜不爭三者不除雖日用三牲之養猶為不孝也孝經引三者此獨云在醜夷不爭者上下驕亂之禍為少而醜夷之爭多也孝子一出言舉足不敢忘父母苟好勇鬭狠以危父母一朝之忿忘其身以及其親則所以養親者果安在哉嚴陵方氏曰冬則温之以禦其寒夏則凊之以辟其暑昏則定之以奠其居晨則省之以問其安也冬温而夏凊者欲親之體常適其和也昏定而晨省者欲親之體常適其利也推和親之心以及乎人則與人不爭隂陽之和矣推利親之心以及乎人則與人不爭險易之利矣此所以終言在醜夷不爭也東萊吕氏曰孝子以親之心為心故以親之體為體冬温夏凊昏定晨省一歳有冬夏寒暑之變一日有昏晨晦明之變此見孝子頃刻不忘親處纔遇變時須加意於其間冬温則當體其温之之理如古人置密室之類是也夏凊則體其凊之之理如古人扇枕之類是也昏時則安其父母晨時則雞鳴而起問其安否在醜夷不爭此又見孝子涵養之熟頃刻不忘大凡人子在父母前固有孝敬之心不在父母前便移易了故起爭心惟養之熟此心常存所以不爭新安朱氏曰温凊定省雖有四時一日之異然一日之間正當隨時安處省察其或温或凊之冝也永嘉戴氏曰為人子者一食不忘親則無一息不在親側可也温凊有時定省有節則制禮然也在醜夷不爭謂處於聚族羣居之中不敢有爭以傷父母之心詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽冝爾室家樂爾妻孥子曰父母其順矣乎妻子好合兄弟和樂父母處於其間怡然而順然則在醜夷而爭者父母之心固有所不樂也夫為人子者三賜不及車馬鄭氏曰三賜三命也凡仕者一命而受爵再命而受衣服三命而受車馬受車馬而身所以尊者備矣卿大夫士之子不受不敢以成尊比踰於父天子諸侯之子不受自卑逺於君孔氏曰自此至孝子之行也為一節明人子謙卑行著於外所敬又廣人子受三命之尊不敢受車馬不云不受而云不及者受是已到之日明人子非唯外迹不受抑亦心所不及於此賜也案鄭氏三命皆約周禮大宗伯之文大宗伯一命受職職則爵也再命受服三命受位鄭言受車馬者三命受位即受車馬以經云車馬故以車馬言之藍田吕氏曰三賜有車馬君之所以寵臣也三賜不及車馬子之所以敬親也受位則有車馬之賜矣受位而不及車馬者位在朝廷而車馬入於私門也坊記云父母存饋獻不及車馬蓋車馬家之重器也親之所無子不敢以受於人親之所有子不敢以予於人辟親而不敢加奉親而不敢專其義一也事宗子者不以富貴入宗子之家雖衆車徒舎於外以寡約入事宗子猶舎衆車徒於外則事親者車馬之盛冝在所不受也黨正以飲酒正齒位一命齒於郷里再命齒於父族三命不齒庶子之正於公族雖有三命不踰父兄其所以敬於族人之長者猶如是況於父母乎能知此則事親之意誠矣廬陵胡氏曰賜與也三賜貨財衣服車馬也鄭謂三賜三命也三命受車馬案大宗伯三命受位不受車馬含文嘉九賜一曰車馬則非三命公羊説九賜之次則四曰車馬亦不在三何由三命受車馬乎又車馬賜由君命君子辭位不辭禄車馬安可辭哉鄭誤矣東萊吕氏曰一命受爵再命受服三命受車馬何故爵與服便受車馬便不受蓋外而為卿大夫内而依然是人子爵雖尊在朝廷之上服雖華在朝祭之時用時却不同惟車馬則偪近父母人子之心所不安也豈可受之雖然大夫不可徒行既不可徒行又不可以私廢公在朝不妨但至閨門不用孝子之心多為外物所移易有為歳月而變者歳月既乆其心亦變有為爵位而變者爵位既得其心亦變如大舜五十而慕此是不為歳月而變者如三賜不及車馬此是不為爵位而變者原是養得熟不為外物移易見他孝石林葉氏曰鄭氏以不及為不受若然居大夫之位而不受車馬則徒行乎若曰不受君賜而己自為之是己為則可君賜之則不可理無是也以吾觀之此蓋謂父之未為大夫者不受車馬則不敢受大夫之位何以知其然黨正飲酒正齒位一命齒於鄉里再命齒於父族此以齒為重也三命不齒此以爵為重也再命齒於父族則父兄在其間矣三命不齒則雖父兄不敢以齒加焉故别位於賔之南鄉黨莫如齒朝廷莫如爵鄉黨父兄不敢以齒加爵則朝廷豈可以爵而踰父兄乎左氏記叔孫婼以再命為卿因季平子伐莒之功例更受三命婼叔孫豹之子時豹已死而季平子其四從兄也尚未三命而婼先之叔仲子欲間三家謂平子曰婼三命踰父兄非禮也平子於是使婼辭位而弗從夫從兄猶以為言則先王之時大夫不可踰其父兄審矣婼之不從豈以平子為其族非其親父兄歟廣安游氏曰大率為人子其事親則當盡禮而其所循行之道如所謂温良恭儉讓所以施於人交於物修之於家行之於外其道皆當如此也曰奢曰驕曰縱曰傲曰狠曰厲此類雖無與於孝然皆足以害孝夫孝者心必謹氣必和言必順貌必恭如此然後足以循行其孝也上文所謂在醜夷不爭及此三賜不及車馬下文所謂見父之執以至居坐行立不敢處中以下皆温良恭儉讓之道也臨川王氏曰三賜不及車馬若以為有辭遜之心而終必受之則雖不為人子不害辭遜若以為人子則辭遜而不敢受則舜亦人子而未嘗辭百官牛羊倉廩之奉也車服爵命所以序功德天下之公義古今之逹禮苟當其功苟稱其德雖人子弟有辭遜之心而終必不敢不受以申其遜弟之志者不以小廉小遜害天下之大公也凡禮有辭遜之文者以難進易退為道也辭遜自是君子之常豈繫為人子哉新安朱氏曰左氏傳魯叔孫豹聘於王王賜之路豹以上卿無路而不敢乗疑此不及車馬亦謂受之而不敢用耳若尊者之賜又爵秩所當得豈容獨辭而不受之邪故州閭郷黨稱其孝也兄弟親戚稱其慈也僚友稱其弟也執友稱其仁也交遊稱其信也鄭氏曰不敢受重賜者心也如此而五者備有焉周禮二十五家為閭四閭為族五族為黨五黨為州五州為郷僚友官同者執友志同者孔氏曰鄭引周禮司徒文乃王城百里逺郊之内又遂人職主六遂在逺郊之外不言遂者舉其近耳親指族内戚言族外慈者篤愛之名兄弟外内通稱弟者事長次第之名交遊汎交也結交遊往本資信合故稱信也藍田吕氏曰五者之稱不同各以其所見言之也州閭郷黨觀其行者也見其所以敬親故稱其孝兄弟親戚責其恩者也順於父母者親親之愛必隆故稱其慈僚友見其有所讓者也有遜弟之心故稱其弟執友者友其德德莫盛於孝孝者仁之本故稱其仁交遊主於信知其誠心於孝也故稱其信嚴陵方氏曰州閭郷黨則同國者也兄弟親戚則同族者也僚友則同事者也執友則同志者也交遊則同門者也言國則兼四者在中矣兼而言之則大故本其孝而統稱之分而言之則小故各以其所望者而稱之爾廬陵胡氏曰一盡子道而五善具矣坊記云父母在言孝不言慈鄭云孝上施慈或嫌下流也此言慈者非自言也東萊吕氏曰大抵稱孝在逺者稱之猶未盡須是自近而見者方始親切州閭鄉黨之人見他孝如此所以稱孝兄弟親戚則尤切近於州閭鄉黨而尤見其愛故稱慈僚友在官是同王事在私則是同舎與之同處見其氣象和順所以稱弟執友是心友同死生共患難者知其孝心之本原所以稱其仁所謂孝弟仁之本是也交遊稱其信此是汎交偶與從事者亦知其信其他可見此一句是做一句看不可得而移易稱者非我求人之稱惟因其所稱以驗我之所為誠則形之謂也新安王氏曰稱孝言能盡事親之道也稱慈言其奉親有深愛也稱弟言其行之恭順也稱仁言其心之愛敬也稱信言其用志篤實也鄭註不敢受重賜者心也而五者備有焉此五者其善多矣反此則其失亦多是以孝子不敢輕受重賜臨川王氏乃曰若謂人子辭讓而不敢受則百官牛羊倉廩之奉舜未嘗辭其說不然禮者聖人之中制天下可以通行堯之待舜與舜所受於堯非可律於天下也見父之執不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也鄭氏曰敬父同志如事父孔氏曰自上詣下曰見自下朝上曰見父之執謂執友與父同志者也或故往見或路中相見也臨川王氏曰心存於父者見父之執猶父也則其進退對問之際安得不如此藍田吕氏曰父之執友其見也進退問荅不敢専焉敬之至也見父之執猶極其敬況於父乎長樂陳氏曰坊記曰睦於父母之黨可謂孝矣又曰於父之執可以乗其車不可以衣其衣廣孝也蓋父之同類謂之父黨父之同志謂之父執見父之黨無容孝也此見父之執廣孝也古者尊尊之禮行故為父黨者安其尊事父黨者盡其卑而民德於是乎厚矣嚴陵方氏曰孔子曰愛親者不敢惡於人敬親者不敢慢於人見父之執於進退之節有所不敢則一舉足不敢忘親可知於對問之節有所不敢則一出言不敢忘親可知孝子之行孰過乎是經有曰父執有曰父黨有曰父齒有曰父讎何也以同志之所守則曰執以同類之所與則曰黨以年之相若則曰齒以怨之所敵則曰讎東萊吕氏曰此一章看孝子愛親之心推原使之廣涵養使之厚若雖知愛親不能推原涵養則在親前雖屏氣下色供洒埽應對勞而不怨離父母一步便驕狠傲戾在親前時不多外面驕狠多則連親前亦愈薄便入陵節犯上所以孝子必於親愛之心推廣之涵養之見父之執與平居交遊者不謂之進不敢進不謂之退不敢退退然躬子弟之職不問不敢對如此則此心廣大大抵天下之事廣便厚且如澗壑之水波濤不多只縁狹狹則力量薄滄海長江之水波浪如山如屋蓋力廣則厚若推得愛親之心廣時則其所以愛親便厚不特如此至於黄髮兒齒亦下氣怡色此心愈廣所謂老吾老以及人之老至犬馬僕妾父母愛之子亦愛之毛氏信卿曰人之為善必自夫不敢始自夫有所敢而後無忌憚無忌憚則無所不至矣不敢則有敬畏之心敬畏之心存則何往而非善文王不敢侮鰥寡髙宗不敢荒寧所以為三代盛王也孔門亦自不敢做去孔子之豈敢顔回子貢之何敢孟之反之非敢皆此心推之也見父之執而進退荅問之間皆有不敢之心非孝子能若是乎經言見父之執必先言為人子之孝如所云三賜不及車馬此言人子之孝也必繼之以見父之執不謂之進不敢進之言為人子者出必告此言人子之孝也必繼之以年長以倍則父事之之言與坊記言君子弛其親之過而敬其美必繼之以於父之執可以乗其車不可以衣其衣之意同蓋不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮則不孝其親而敬其父之執可乎愛親者不敢慢於人敬親者不敢惡於人則孝於其親而不敬父之執可乎故孝於親則必敬父之執敬父之執必本孝於其親此經所以相次言之夫為人子者出必告反必面所遊必有常所習必有業恒言不稱老鄭氏曰告面同耳反言面者從外來冝知親之顔色安否有常有業縁親之意欲知之不稱老廣敬孔氏曰自此至異席為一節明人子事親遊方習業及汎交之禮老是尊稱稱老是己自尊大非孝子卑退之情子若自稱老則感動其親故舜年五十而慕是也藍田吕氏曰出必告反必面受命於親而不敢專也所遊必有常所習必有業體親之愛而不敢貽其憂也恒言不稱老極子之慕而不忍忘也父母在而不敢有其身如之何聞斯行諸出入而無所受命是遺親也親之愛子至矣所遊必欲其安所習必欲其正苟輕身而不自愛則非所以養其志也君子之事親親雖老而不失乎孺子慕者愛親之至也孟子曰五十而慕予於大舜見之矣故髧彼兩髦為孺子之飾親見然後説之苟常言而稱老則忘親而非慕也嚴陵方氏曰出必告者欲親知其所往之方也反必面者欲親知其所至之時也所遊必有常者慮貽親之憂也所習必有業者慮違親之志也孔子曰遊必有方此非遊之有常乎學記曰良冶之子必學為裘良弓之子必學為箕此非習之有業乎永嘉戴氏曰為人親者無一念而忘其子故有倚門倚閭之望為人子者無一念而忘其親故有出告反面之禮生則出告反面没則告行飲至事亡如事存也不敢慢遊以貽親憂不敢廢業以為親辱不敢自老以傷親心此皆人子兢業恐懼之意也王氏子墨曰出告反面遊有常者慮貽親之憂也所習必有業者慮致親之疑也常言不稱老者慮動親之感也人子安親之心亦何所不至哉黄氏曰老之為義若天子養三老致仕之人及耆年有德云國老庶老老為尊稱可矣此蓋言為人子之行夫子曰父母之年不可不知也一則以喜一則以懼言懼者懼父母之年衰暮非久者也既懼其老忍稱之哉此乃敎人子對父母常言則須避諱老字一則傷父母之心一則孝子不忍斥言非謂人子自身稱老也李氏曰父母之年以之喜懼故孝子愛日而不以老自稱也如曰天子之老寡君之老則稱之不稱於常言而已矣年長以倍則父事之十年以長則兄事之五年以長則肩隨之羣居五人則長者必異席鄭氏曰年長以倍謂年二十於四十者人年二十弱冠成人有為人父之端今四十於二十者有子道内則曰年二十惇行孝弟肩隨者與之並行差退席以四人為節因冝有所尊孔氏曰此謂鄉里之中非親非友但年長倍已則以父道事之即父黨隨行也人年三十而娶於後乃有子則三十於六十乃是倍年今鄭言二十於四十者但加冠責以為人父為人子之禮雖未有妻子有為人父之端以二十未合有子有子道也年二十於三十者半倍故兄事之則止差退而鴈行也若二十於二十五者肩隨之則齊於鴈行也羣居謂朋友居處法也古者地敷横席而容四人四人則推長者居席端若有五人㑹應一人别席因推長者異席若賔主禮席皆無同坐故郷飲酒賔介異席又云衆賔之席皆不屬焉郷射衆賔之席繼而西謂相連屬也燕禮及大射公三重大夫再重是皆異席也横渠張氏曰年長以倍則父事之又視其雅素如何若本在兄弟之列則止可兄事之而已藍田吕氏曰貴老為其近於親也敬長為其近於兄也自二十而視四十則與吾父之年相若此所以父事也長吾十年則與吾兄之年相若此所以兄事也長吾五年則與吾年相若此所以肩隨之也皆敬長之道也闕黨童子與先生並行孔子知其欲速成疾行先長者孟子知其為不弟皆不知敬長之義而已嚴陵方氏曰年長以倍則父事之者若經所謂父之齒隨行是也十年以長則兄事之者若經所謂兄之齒鴈行是也五年以長則肩隨之者若經所謂行肩而不併是也馬氏曰徐行後長謂之弟疾行先長謂之不弟堯舜之道孝弟而已矣夫孝弟於步趨疾徐之間而聖人之道乃始於此者蓋逹事長之禮無所往而不為順也推其齒而以父兄事之者謂其愈長而愈加敬也長之五年則肩隨者不敢與先生並行也其出也不敢與之並行則其居也可以同席乎蓋五人之羣當有所長推其長者必異席以敬之古人敬長如此則民之犯上而踰禮者冝鮮矣永嘉戴氏曰年長以倍則父事之十年以長則兄事之五年以長則肩隨之兼愛之弊至於無父彼直以為天下皆吾父也此之謂二本以父事之非直以為父也若保赤子非直以為子也庸敬在兄斯須之敬在鄉人彼固有等差也王氏子墨曰所以尊長者如此以吾有事父從兄之心故也不然則曰楚人之長云耳安能移所以事父兄者待之哉至於肩隨異席非謂年長之差而禮有隆殺也此心則一而已彼有謂由彼長而我長之而以長為外者安知發於吾心者固有所自乎然則禮諸人者如此其於吾父兄又何如也金華應氏曰此言貴老敬長之道凡年長以倍則執父禮以事之不必限以二十也若曰二十惇行孝弟能盡此禮姑自是而始則可耳君子推敬親敬長之心則凡一日之長於我者皆吾所當敬而年有髙下則敬有等差不可毫釐之紊以此反觀於一身之間則幼而名二十冠而字五十以伯仲而常自省焉以此施於九族之内則服有齊斬功緦之異制居有東西南北之異宫食有族食世降之異等而常加謹焉近而推之郷則五十者立侍六十者坐七十者四豆而郷之所敬者各不同逺而推之國則五十杖於家六十杖於鄉七十杖於朝而國之所敬亦不一所以為文理密察也故子夏四海兄弟之説意非不廣而理則未精彼墨氏兼愛不足言矣金華邵氏曰愛親者不敢惡於人敬親者不敢慢於人知愛敬其親而於人加忽焉則愛敬之道虧矣故年倍於我事以父禮長我十年事以兄禮長我五年差肩隨之至於羣居五人則又異長者之席其於人也庸敢慢乎以此事親愛敬之道盡矣廬陵胡氏曰此謂郷里之中父兄之黨也東萊吕氏曰此固止是遜弟之事然學者至於有所得多要流入異端就遜弟中須要理㑹得等差節文故致廣大又須盡精微為人子者居不主奥坐不中席行不中道立不中門食饗不為槩祭祀不為尸鄭氏曰謂與父同宫者也不敢當其尊處室中西南隅謂之奥道有左右中門謂棖闑之中央内則曰由命士以上父子皆異宫槩量也不制待賔客饌具之所有尸者尊者之處為其失子道然則尸卜筮無父者孔氏曰自此至苟笑為一節明孝子居處及行立待賔祭祀敬謹之事不言凡者或異居禮則不然主猶坐也室嚮南户近東南角則西南隅隱奥無事故名為奥常推尊者於閒樂無事之處故尊者居必主奥也人子不冝處之一席四人則席端為上獨坐則席中為尊尊者冝獨不與人共則坐席居中卑者不得居中也男女各路路各有中尊者常正路而行卑者故不得也門中央有闑闑旁有棖棖闑之中尊者所立故人子不當之而立四事皆與父同宫者異宫則不禁有命既尊各有臣僕子孫應敬已故也大夫士或相往來不制設饗食饌具由尊者所裁人子不得輒豫限量多少尸代尊者人子不為也案熊氏曰食饗不為槩為傳家事任子孫若不傳家事則子孫無待賔之事廣安游氏曰正義熊氏說未妥蓋傳家正欲省事方為子孫裁食饗之量是煩尊者也大槩為人子假如士庶人朋友相往來苟欲為之設醴必先白父母乃可而設醴之量又當聴於父母也藍田吕氏曰子之事親非惟親之命弗敢專也居不主奥坐不中席行不中道立不中門不敢專其位也食饗不為槩不敢專其財也祭祀不為尸不敢專其身也東萊吕氏曰古之人子不知他於行處居處立處坐處何故常常檢點得如此好萬一或不檢點必有時主奥中席中道中門原其所以能如此者必自有來處馬氏曰室而無奥阼則亂於堂室也蓋阼在堂奥在室阼者主人之所有事也蓋出則接人以仁則主於東北東北者温厚之氣始乎此也奥者主人之所宴息也入則退安於静故位乎西南西南者地道也尊者之所出入也為人子者其可以當之乎故居則不敢主奥升降則不由阼階不敢貳尊也新安朱氏曰古人室在東南隅門開東北隅為窔西北隅為屋漏西南隅為奥人纔進便先見東北隅却到西北隅然後始到西南隅此是至深密之地金華應氏曰父子異宫因各有西南隅之奥然親在而自主之亦有不安焉者非特以同宫而避之也若同宫則父自主之矣且道路之間豈父之所統哉而行不敢中者蓋無往而不寓其敬親之意也金華邵氏曰事親之道當自卑以尊其親尤當自重以愛其身主奥中席皆尊者所居中道中門皆尊者所由為槩為尸皆尊者之事人子皆不敢當既不嫌於逼其親矣聴於無聲常若親有命視於無形常若親在前又不至於違其親其尊之者為何如不登髙而下皆愛其身也廬陵胡氏曰食饗不為槩此未傳家事者㮚氏槩而不稅横渠張氏曰人子者食饗不為槩凡於父母賔客之奉必極力營辦亦不計家之有無不為槩量為子者不有其身不有私財凡人子為養又須使其不知其勉強勞苦苟使見其為而不易則亦不安矣聴於無聲視於無形不登髙不臨深不苟訾不苟笑鄭氏曰視聴恒若親之將有敎使然登髙臨深苟訾苟笑為近危辱也人之性不欲見毁訾不欲見笑君子樂然後笑孔氏曰無聲無形常於心想似見形聞聲苟且也相毁曰訾不樂而笑為苟笑彼雖有是非而已苟譏毁訾笑之皆非彼所欲必反見毁辱故孝子不為也藍田吕氏曰視聴於無形聲則誠於事親專心致志可知也身也者親之枝也履不安以危之是危親也行不善以辱之是辱親也登髙臨深危道也苟訾近於讒苟笑近於謟是辱道也長樂陳氏曰聴於無聲一傾耳不敢忘父母也視於無形一舉目不敢忘父母也不登髙不臨深一舉足不敢忘父母也不苟訾不苟笑一出言不敢忘父母也孟子曰事孰為大事親為大守孰為大守身為大聴於無聲視於無形則善於事親矣不登髙不臨深不苟訾不苟笑不服闇不登危則善於守身矣嚴陵方氏曰聴於無聲則常若親之有所命也視於無形則常若親之在其前也無聲猶且聴之況於聞親之聲乎則召之無諾從可知矣無形猶且視之況於視親之面乎則顔之無犯從可知矣毁譽者人之公論哀樂者人之常情可毁則訾之可樂則笑焉所不能免也然苟訾則為惡於人矣愛親者其可惡於人乎苟笑則為慢於人矣敬親者其可慢於人乎李氏曰聴至於無聲而不敢忽視至於無形而不敢易與夫縱耳目之欲以危父母則異矣君子之於親何嘗忘一嚬一笑之間哉建安真氏曰聴於無聲視於無形此戒慎乎其所不覩恐懼乎其所不聞之意乎蓋孝子之心惟恐纎芥之差須臾之失故其潛觀黙察至於如此非誠於事親者其能若是乎永嘉戴氏曰此孝子之極至也念念不置與親為一常若親之在吾前而謦欬於其旁也記曰先王之孝也色不忘乎目聲不絶乎耳自其生也聴於無聲視於無形及其没也色不忘乎目聲不絶乎耳念慮之積非一日矣不思愛其身而登髙臨深以毁傷其肢體不自重其身而苟訾苟笑以取侮於人凡此皆所以貽其親之辱也王氏子墨曰夫以訾笑之不苟若非人子所先而必以責之何也孟子曰悦親有道反諸身不誠不悦於親矣一訾笑之不戒則在我之誠安在哉況憂侮之所自來有不止於吾身之累者觀曽子啓手啓足之際則人子之所懼可知矣奈何以父母之遺體行殆孝子不服闇不登危懼辱親也父母存不許友以死不有私財鄭氏曰服事也闇冥也不於闇冥之中從事為卒有非常且嫌失禮也男女夜行以燭死為報仇讎為忘親也藍田吕氏曰服闇者為穿窬之行欺人所不見也登髙者行險以僥倖也孝子之心將為不善思貽父母羞辱必不果服闇登危是忘親也非特忘之不令之名且將加之是辱親也不許友以死者不敢受其託也如朋友死無所歸曰於我殯有父母在則不可許矣先儒謂許報仇雖父母没亦不可也患難相死兄弟之道也詩云鶺鴒在原兄弟急難每有良朋況也永歎又曰兄弟閱于牆外禦其侮每有良朋烝也無戎朋友以道義相成患難之事無相及故曰無戎也戰國游俠以氣相許結私交報仇怨流俗髙之此先王之所必誅君子謂之不義者也廣安游氏曰大抵為人子操心積慮專以親為心登髙臨深以親為心則不登臨也可訾可笑以親為心則不苟訾笑矣有事於危闇以親為心則不服闇登危矣友有仇讎義當為報以親為心則不許友死矣以至行居坐立食饗祭祀臨財之際苟其心及於親焉則皆知以人子之道處之矣人生天地間事親一事最為至要辦此一事然後可以議其他所謂禮之本者由事親而起也能孝則天下之善皆將從此而起曰仁曰孝曰慈曰信曰謙曰良曰恭曰儉曰遜皆由是而備矣曽子曰仁者仁此者也禮者履此者也義者冝此者也信者信此者也樂自順此生刑自反此作曽子所謂此者孝也長樂陳氏曰戒慎乎其所不覩恐懼乎其所不聞不服闇也道而不徑舟而不遊不登危也父母全而生之子全而歸之則不苟訾不苟笑不服闇所以全其行不登髙不臨深不登危所以全其體廬陵胡氏曰不服役於隠闇逺嫌也朋友責善於義有當死者朋友必以責望於己已不當許之不心友之讎永嘉戴氏曰行事不明白而晻昧以招禍者皆所謂服闇也為人子者髮膚以上皆親之體也豈敢許友以死粒粟縷絲以上皆親之物也豈敢私有其財髙者輕死卑者重財皆非純孝之士也為人子者父母存冠衣不純素孤子當室冠衣不純采鄭氏曰素為其有喪象也純縁也玉藻曰縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也孤子謂年未三十者蚤喪親雖除喪不忘哀也三十壯有室有代親之端不為孤也當室適子也深衣曰具父母衣純以青孤子衣純以素孔氏曰此一節明為人子父母存及孤子衣冠純飾不同之事不言凡者若仕者遇凶荒雖親存亦素服冠純謂冠飾也衣純謂深衣領縁也鄭引玉藻者證吉凶有别縞冠者薄絹為之𤣥武者以黒繒為冠卷姓生也孫是子所生故謂孫為子姓父有服未畢子雖已除猶未全吉故吉凶兼服𤣥武是吉縞冠為凶也當祥之日朝服縞冠祥祭之後則縞冠素紕何𦙍云素紕謂縁冠兩邊證素為凶也孤子雖除服猶素然深衣云衣純以素嫡庶皆然今當室謂嫡子似庶子不同者但嫡子内理烝嘗外交宗族代親既備嫌或不同故特明之所以鄭引深衣證凡孤子悉同也崔氏曰不當室則純采藍田吕氏曰人子之服必盡乎孺子之飾者所以恱其親也故髧彼兩髦飾其首也衣純以繢以青飾其身也冠衣純以素孤子之服非所以事親也深衣云孤子衣純以素此云孤子當室冠衣不純采者少而無父者雖人之窮然既除喪矣冠衣猶不改素則無窮也先王制禮行道之人皆不忍也豈可獨遂其無窮之情哉故惟當室者行之非當室者不然也深衣之言略矣馬氏曰孟子曰父母俱存兄弟無故一樂也樂於中者文必稱於外冠衣不純素者所以為文也孤子當室者謂嫡室也冠衣不純采者異於諸子也蓋父之於長子冠於阼以著代也服之三年以稱情也則嫡子之於父其可以不加隆乎禮記集説卷三
