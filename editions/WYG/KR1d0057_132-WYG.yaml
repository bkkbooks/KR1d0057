body:
  text: 禮記集説卷一百三十二宋衛湜撰在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不眀乎善不誠乎身矣鄭氏曰獲得也不獲乎上言臣不得於君則不得居位治民也不明乎善不誠乎身言知善之爲善乃能行誠孔氏曰此明爲臣爲人皆須誠信於身然後可也河南程氏曰止於至善不明乎善此言善者義理之精微無可得名且以至善目之繼之者善此言善却言得輕但謂繼斯道者莫非善也不可謂惡伊川又曰這一箇道理不爲堯存不爲桀亡只是人不道他這裏知此便是明善又曰明善在明守善在誠又曰人患事物繫累思慮蔽錮只是不得其要要在明善明善在乎格物窮理窮至於物理則漸久後天下之物皆能窮只是一理伊川又曰且省外事但明乎善唯進誠道其文章雖不中不逺矣所守不約泛濫無功明道又曰學者必知所以入德不知所以入德未見其能進也故孟子曰不明乎善不誠其身易曰知至至之藍田吕氏曰不得乎親不可以爲人不順乎親不可以爲子則人之所以信於朋友者豈聲音笑貌爲哉内誠盡乎父母内行孚於家人則朋友者不期信而信之矣故曰不順乎親不信乎朋友矣獲乎上者有善而見信有功而見知所施於民者莫非善也不獲乎上者徳進而見忌功髙而見疑身且不保尚何民之可治哉故曰不獲乎上民不可得而治矣建安游氏曰欲誠其意先致其知故不明乎善不誠乎身矣學至於誠身安徃而不致其極哉以内則順乎親以外則信乎友以上則可以得君以下則可以得民此舜之允塞所以五典克從也延平楊氏曰不明乎善雖欲擇之固執之未必當於道也故欲誠乎身必光於明善不誠乎身則身不行道矣身不行道不行於妻子況能順其親乎故順乎親必先於誠身不順乎親則於其所厚者薄也況於朋友乎故欲信乎朋友必先順乎親夫責善朋友之道也不信乎朋友則其善不足稱也已而欲獲乎上不亦難乎不獲乎上則身不能保況欲治其民乎不可得也又曰反身者反求諸身也蓋萬物皆備於我非自外得反諸身而已又曰明善在致知致知在格物號物之多至於萬則物蓋有不可勝窮者反身而誠則舉天下之物在我矣詩曰天生烝民有物有則凡形色具於吾身者無非物也而各有則焉反而求之則天下之理得矣新安朱氏曰此第二十章第五節此又以在下位者推言素定之意反諸身不誠謂反求諸身而所存所發未能眞實而無妄也不明乎善謂未能察於人心天命之本然而眞知至善之所在也夫在下位而不獲乎上則無以安其位而行其志故民不可治然欲獲乎上又不可以諛説取容也其道在信乎友而已蓋不信乎友則志行不孚而名譽不聞故上不見知然欲信乎友又不可以便佞苟合也其道在悦乎親而已蓋不悦乎親則所厚者薄而無所不薄故友不見信然欲順乎親又不可以阿意曲從也其道在誠乎身而已蓋反身不誠則外有事親之理而内無愛敬之實故親不見悅然則欲誠乎身又不可以襲取強爲也其道在明乎善而已蓋不能格物致知以真知至善之所在則好善必不能如好好色惡惡必不能如惡惡臭雖欲勉焉以誠其身而身不可得而誠矣此必然之理也故夫子言此而其下文即以天道人道擇善固執者繼之蓋擇善所以明善固執所以誠身擇之之明則大學所謂物格而知至也執之之固則大學所謂意誠而心正身修也知至則反諸身者將無一毫之不實意誠心正而修身則順親信友獲上治民將無所施而不利而逹道逹徳九經凡事亦一以貫之而無遺矣又曰此章之説雖多然亦無大得失唯楊氏反身之説爲未安耳蓋反身而誠者物格知至而反之於身則所明之善無不實有如前所謂如惡惡臭如好好色而其所行自無内外隱微之殊耳若知有未至則反之而不誠者多矣安得直謂但能反求諸身則不待求之於外而萬物之理皆備於我而無不誠哉況格物之功正在即事即物而各求其理今乃反欲離去事物而專務求之於身尤非大學之本意矣又曰原道中舉大學却不説致知在格物一句蘇子由古史論舉中庸不獲乎上後却不説不明乎善不誠乎身二句這兩箇好做對司馬温公議儀秦處説立天下之正位行天下之大道却不説居天下之廣居看得這様都是箇無頭學問海陵胡氏曰必先得上之信任然後道得以行民得以治朋友信之然後聲譽聞逹可以取信於上朋友未信況可取信於君乎閨門之内其親且未能順朋友肯信之乎順親有道當以至誠自持其身何者凡所爲善則親喜悦所爲不善則親愧辱故不能以至誠自持則不順其親矣事有善惡若誠於惡則失所以誠身之道當眀於善而固執之然後可以誠身矣廣安游氏曰此言爲人輔相佐其君治天下之道也天子之相名爲人臣實行君之事治君之民用君之爵禄以爲賞用君之刀鋸以為罰生殺進退皆得專之此之謂宰相之事不如此不可以為政然必得其君然後可以如此然獲乎上必信乎友舜之道信於四岳而後獲乎堯禹之道信於契臯陶然後獲於舜周公不爲召公所說則周公以爲憂求所以釋召公之意而作君奭召公既説周公獲乎成王矣管仲見信於鮑叔而獲乎威公子産見信於子皮而獲於鄭伯古之人臣莫不如此然不順乎親則不能信乎朋友蓋君子之道自内以及外自近以及逺於其親而不順況能及他人乎孟子論舜專言其得乎親而後可以治天下此章所言全以舜為法故曰不以舜之所以事堯事君不敬其君者也舜爲堯相上獲乎堯下見信乎禹稷契臯陶其道蓋出於此順乎親又必反諸身舜之事親正如此瞽瞍不豫常反求諸己負罪引慝終至於瞽瞍亦允若志諴感神此順乎親必反身以誠而後可也誠身有道必明乎善舜之誠身亦本於此孟子曰舜明於庶物察於人倫記曰舜其大智也歟舜好問而好察邇言此則舜之明善也不眀乎善則下不知人上不知天而不得中庸不得中庸則不能誠身矣東萊吕氏曰此段蓋自末至本居下者固欲有獲於上不知所以獲者自有道擎跽曲拳豈足以獲於上直言正諫豈足以獲於上甚者乃云我能取信自然獲於上不知其平日之心不誠信安能一旦爲誠信須是平日見信然後可故曰不信於友不獲於上矣信於友者又須是能悦親如不能悦親於朋友交際閒雖有誠信而非發之於内常時固可遮藏偶然遇一大君子則不能掩故曰不悦於親不信於友矣悦親有道非三牲五鼎爲足悦親須是承顔順色方爲悦親又須是出於誠誠者乃與生俱生固結而不能自解故曰反身不誠不悦於親矣此章一句𦂳一句漸漸入來蓋明善乃理之極雖堯舜禹湯文武周公孔子所以相繼者亦不過明善於明善之外更無所加損故曰不明乎善不誠乎身矣止是要從近處看今之人其於事親從兄事上交友之際固有時乎中理然有時又差了蓋雖到九分九釐盡有一毫差則併前都差如行九十九里忽差路頭則都不濟事此所以要明善明善要明得盡居仁范陽張氏曰人性皆善特吾學非其道而世無師友以指示之耳使吾知格物致知之學内而一念外而萬事無不窮其原流窮其終始窮之至於極盡之地人欲既盡一旦豁然則惟善昭昭無可疑矣此所謂一日克己天下歸仁焉故誠之爲用無不感動以此事親則吾親感動而無不悦以此交朋友則朋友感動而無不信以此事上則在上感動而無不獲以此治民則天下感動而無不治是故不憂民之不治上之不獲朋友之不信親之不悦獨憂身之不誠善之不明耳使明乎善則吾身吾親吾友吾君吾民之機皆已總攝乎此矣新定顧氏曰所謂善者何如哉孟子曰萬物皆備於我矣又曰仁人之安宅也義人之正路也曰萬物皆備稱其善也曰安宅曰正路喻其善也善之爲言美也窮天地亘萬世所謂事物皆於此乎出譬如枝葉之生於本根是故事物有大小而此善無大小事物有髙下而此善無髙下事物有變遷而此善無變遷事物有彼此而此善無彼此非有氣也而氣皆於此乎出非有形也而形皆於此乎生故有行焉而人莫能禦是謂正路有居焉而人莫能移是謂安宅不疾而速不行而至自得於我無羨於彼是謂萬物皆備事物莫之能及也故謂之善伏羲之爲易堯舜禹之相傳以中箕子之言皇極孔子之言仁惟此善也子思子之爲是書始明之以天命之性中目之以至誠末以為上天之載異時孟子又明之以仁義亦惟此善也能明此善則知身果不可以不誠晉陵喻氏曰夫子之教曰出則事公卿入則事父兄事公卿乃與事父兄等逮徳下衰士或以事公卿爲恥夫子其知之矣故以是垂教焉其事君盡禮人至以爲諂其栖栖於行道人至以為佞後世之君子視孔子不趐千萬也而天下之人莫有疑其謟佞者是其有過於孔子哉蓋其於天下無孔子皇皇之心不以得君行道爲己任無孔子之徳行而不敢自信無孔子之毋我而不能忘其己私故終於囂囂然無翻然而改者也如此則夫謟佞之譏又何疑哉噫無怪乎道之不行而斯民之不受賜也安得以孔子中庸之道告之延平周氏曰信乎朋友是内足以自信而外則足以取信此上之所以獲而民可得而治也故孔子之教止於信而漆雕開之學亦主於信吴興沈氏曰上既言事豫則立至道前定則不窮之義此復申以明善推而至於民可得而治蓋一理也特子思欲理明而事切故諄諄反覆言之能明乎善即所謂豫也性之至善自本自根無昬迷之間人僞一萌則失先見之明而善不復見矣惟於喜怒哀樂未發之時即事而明不為物感則性善明矣明乎至善則一性之間無一毫人偽皆天理之自然以之修身則誠以之事親則順以之交朋友則信以之在下位則必獲乎上以之在上位則必得乎民無所徃而不當矣誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也博學之審問之慎思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之己百之人十能之己千之果能此道矣雖愚必明雖柔必強鄭氏曰言誠者天性也誠之者學而誠之者也因誠身説有大至誠果能此道矣雖愚必明雖柔必強勸人學誠其身也果猶決也孔氏曰此經明至誠之道自博學之以下申明誠之者擇善而固執之事鄭註大至誠則經云誠者天之道聖人是矣有弗學學之弗能弗措也謂身有事不能常學習須勤力學之措置也言學不至於能則不置必待能之乃已也以下諸事皆然濓溪周氏曰誠者聖人之本大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也故曰一隂一陽之謂道繼之者善也成之者性也元亨誠之通利貞誠之復大哉易也性命之源乎又曰聖人誠而已矣誠五常之本百行之源也静無而動有至正而明逹也五常百行非誠非也邪暗塞也故誠則無事矣至易而行難果而確無難焉故曰一日克己復禮天下歸仁焉河南程氏曰無妄之謂誠不欺其次矣一本云李邦直云不欺之謂誠便以不欺爲誠徐仲車云不息之謂誠中庸言至誠無息非以無息解誠也或以問先生先生云云又曰誠者天之道敬者人事之本敬者用也敬則誠眀道又曰主一之謂敬一者之謂誠敬則有意在又曰不勉而中不思而得與勉而中思而得何止有差等耳是相去懸絶不勉而中即常中不思而得即常得所謂從容中道者指他人所見言之若不勉不思者自在道上行又何必言中不中不勉不思亦有大小深淺至於曲藝亦有不勉不思者所謂日月至焉與久而不息者所見規摹雖略相似其意味氣象迥别須心濳黙識玩索久之庶幾自得學者不學聖人則己欲學之須熟玩味聖人之氣象不可只於名上理會如此只是講論文字伊川問致知與力行兼否曰爲常人言纔知得非禮不可為須用勉強至於知穿窬不可為則不待勉強是知亦有淺深也古人言樂循理謂之君子若勉強只是知循理非是樂也纔到樂時便是循理爲樂不循理爲不樂何苦而不循理自不須勉強也若夫聖人不勉而中不思而得此又上一等事伊川又曰知至則當至之知終則當遂終之須以知爲本知之深則行之必至無有知之而不能行只是知得淺饑而不食烏喙人不蹈水火只是知人爲不善只為不知知至而至之知之事故可與幾知終而終之故可與存義知至是致知博學明辨審問慎思四者皆知至之事篤行便是終之如始條理終條理因其能始條理故能終條理猶知至即能終之又曰博學審問慎思明辨篤行五者廢其一非學也又曰思曰睿思慮久後睿自然生若於一事上思未得且别換一事思之不可專守著這一事蓋人之知識於這裏蔽著雖強思亦不通也伊川又曰思曰睿睿作聖致思如掘井初有渾水久後稍引動得清者出來人思慮始皆溷濁久自明快伊川問張旭學草書見擔夫與公主争道及公孫大娘舞劒而後悟筆法是心常思念至此而感發否曰然須是思方有感悟處若不思怎生得如此然可惜張旭留心於書移此心於道何所不至伊川又曰不深思則不能造於道不深思而得者其得易失然而學者有無思無慮而得者何也曰以無思無慮而得者乃所以深思而得之也以無思無慮爲不思而自以為得者未之有也問人有日誦萬言或妙絶技藝此可學否曰不可大凢所受之才雖加勉強止可少進而鈍者不可使利也唯理可進除是積學既久自能變得氣質則愚必眀柔必強横渠張氏曰勉蓋未能安也思蓋未能有也又曰以心求道正猶以己知人終不若彼自知彼爲不思而得也又曰性通極於無氣其一物耳命稟同於性遇乃適然焉人一己百人十己千然有不至猶難語性可以言氣行同報異猶難言命可以言遇又曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉藍田吕氏曰誠者理之實然致一而不易者也天下萬古人心物理皆所同然有一無二雖前聖後聖若合符節是乃所謂誠誠即天道也天道自然無勉無思其中其得自然而已聖人誠一於天天即聖人聖人即天由仁義行何思勉之有故從容中道而不迫誠之者以人求天者也思誠而復之故明有未究於善必擇誠有未至所執必固善不擇道不精執不固德將去學問思辨所以求之也行所以至之也求之至非人一己百人十己千不足以化氣質一本云誠者理之實致一而不可易者也大而天下逺而萬古求之人情參之物理皆所同然有一無二雖前聖後聖若合符節理本如是非人私知之所能爲此之謂誠誠即天道也天道自然何勉何思莫非性命之理而已故誠者天之道性之者也誠之者人之道反之者也聖人之於天道性之者也賢者之於天道反之者也性之者成性與天無閒也天即聖人聖人即天縱心所欲由仁義行也出於自然從容不迫不待乎思勉而後中也反之者求復乎性而未至雖誠而猶雜之僞雖行而未能無息則善不可不思而擇徳不可不勉而執不如是猶不足以至乎誠故學問思辨皆所以求之也行所以至之也君子將以造其約則不可不學學而不能無疑則不可不問未至於精而通之則不可不思欲知是非邪正之别本末先後之序則不可不辨欲至乎道欲成乎德則不可不行學以聚之聚不博則約不可得博學而詳説之將以反説約也爲學之道造約為功約即誠也不能至是則多聞多見徒足以餙口耳而已語誠則未也故曰有弗學學之弗能弗措也學者不欲進則己欲進則不可以有成心有成心則不可與進乎道矣故成心存則自處以不疑成心亡然後知所疑矣小疑必小進大疑必大進蓋疑不安於故而進於新者也顔淵學爲孔子而未得者也故疑之仰之彌髙鑚之彌堅瞻之在前忽焉在後皆疑辭也孟子學為舜而未得也故疑之舜爲法於天下可傳於後世我猶未免為鄉人亦疑辭也所謂疑者患乎未知也如問之審審而知則進孰禦焉故曰有弗問問之弗知弗措也學也問也求之外者也聞也見也得之外者不致吾思以反諸身則學問聞見非吾事也故知所以為性知所以為命反之於我何物也知所以名仁知所以名義反之於我何事也故曰思則得之不思則弗得也慎其所以思必至於得而後己則學問聞見皆非外鑠是乃所謂誠也故曰有弗思思之弗得弗措也理有宜不宜時有可不可道雖美矣膠於理則亂誠雖至矣失其時則乖不可不辨也辨之者不别則不見不講則不眀非精義入神不足以致用故曰有弗辨辨之弗明弗措也四者致知之道而未及乎行也學而行之則由是以至於誠無疑矣知崇者所以致吾知也禮卑者所以篤吾行也學之博者莫若知之之要知之要者不若行之之實也行之之實猶目之視耳之聽不言而喻也如日月之運行不可得而已也篤之猶有勉也篤之至於誠則不勉矣行之弗篤猶未誠也故曰有弗行行之弗篤弗措也人一能之己百之人十能之己千之者君子所貴乎學者為能變化氣質而已徳勝氣質則柔者可進於強愚者可進於明不能勝氣質則雖有志於善而柔不能立愚不能明蓋均善而無惡者性也人所同也昬明強弱之稟不齊者才也人所異也誠之者反其同而變其異也思誠而求復所以反其同也人一己百人十己千所以變其異也孟子曰居移氣養移體況學問之益乎故學至於尚志以天下之士為未足則尚論古之人雖質之柔而不立者寡矣學至於致知格物則天下之理斯得雖質之愚而不明者寡矣夫愚柔之質質之不美者也以不美之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以求變不美之質及不能變則曰天質不美非學所能變是果於自棄其爲不仁之甚矣上蔡謝氏曰誠是實理不是專一尋常人謂至誠止是謂專一實理則如惡惡臭如好好色不是安排來又曰誠是無虧欠忠是實有之理忠近於誠又曰學者且須是窮理物物皆有理窮理則能知天之所為知天之所爲則與天為一與天為一無徃而非理也窮理則是尋箇是處有我不能窮理人誰識真我何者爲我理便是我窮理之至自然不勉而中不思而得從容中道曰理必物物而窮之乎曰必窮其大者理一而已一處理窮觸處者皆通恕其窮理之本歟延平楊氏曰道一也有天人之辨賢聖之别者誠與誠之者異而已其歸無二致也孔子曰上智與下愚不移而此曰雖愚必眀何也曰天地之性一而已為上智為下愚氣稟異也故善反之則天地之性存焉氣質之性君子不謂之性也若夫學之而弗能問之而弗知思之而弗得辨之而弗眀行之而弗篤而遂措焉不知人一能之已百之人十能之己千之則是愚者之不移也尚何眀之有中庸只論誠而論語曽不及一誠何也論語之教人凡言忠信恭敬所以求仁而進德之事莫非誠也論語示人以入之之方中庸言其志也蓋中庸子思傳道之書不正言其志則道不明孔子所罕言孟子常言之亦猶是矣河東侯氏曰誠者天之道生而知之堯舜性之者是也誠之者人之道學而知之湯武反之者是也誠者天之道聖人人倫之至化而無跡從容中道思勉不在言也誠之者擇善而固執之者也愽學審問慎思明辨篤行之擇善者也弗能弗知弗得弗明弗篤弗措而固執之者也所謂勉而中思而得者也人一能之己百之人十能之己千之則又困而學之者也果能此道則愚必明柔必強曲能有誠也堯舜性仁無時而不中不必更言中不中由仁義行者也不待乎思勉也與人一己百人十己千相去甚逺學者若於此有所得則氣味深長不可放過潛心力久玩味絶熟庶可也誠者天之道只於聖人分上言之猶未盡誠之藴必須自得仍於天道人道上分别得從容處方見誠與誠之者不同若只恁地説過亦不濟事新安朱氏曰此第二十章第六節承上文誠身而言誠者真實無妄之謂天理之本然也誠之者未能真實無妄而欲其真實無妄之謂人事之當然也聖人之德渾然天理真實無妄不待思勉而從容中道則亦天之道也未至於聖則不能無人欲之私而其爲德不能皆實故未能不思而得則必擇善然後可以眀善未能不勉而中則必固執然後可以誠身此則所謂人之道也不思而得生知也不勉而中安行也擇善學知以下之事固執利行以下之事也學問思辨所以擇善而爲知學而知也篤行所以固執而爲仁利而行也此誠之之目也有弗學而下言君子之學不爲則己爲則必要其成故常百倍其功此困而知勉而行者也勇之事也眀者擇善之功強者固執之效此言引孔子之言以繼大舜文武周公之緒眀其所傳之一致舉而措之亦猶是耳蓋包費隱兼小大以終十二章之意章内語誠始詳而所謂誠者實此篇之樞紐也又案孔子家語亦載此章而其文尤詳成功一也之下有公曰子之言美矣至矣寡人實固不足以成之也故其下復以子曰起答辭今無此問詞而猶有子曰二字蓋子思刪其繁文以附于篇而所刪有不盡者今當為衍文也博學之以下家語無之意彼有闕文抑此或子思所補或問誠之爲義其詳可得而聞乎曰難言也姑以其名義言之則真實無妄之云也若事理之得此名則亦隨其所指之大小而皆有取乎真實無妄之意耳蓋以自然之理言之則天地之閒唯天理為至實而無妄故天理得誠之名若所謂天之道鬼神之德是也以德言之則有生之類唯聖人之心為至實而無妄故聖人得誠之名若所謂不勉而中不思而得者是也至於隨事而言則一念之實亦誠也一言之實亦誠也一行之實亦誠也是其大小雖有不同然其義之所歸則未始不在於實也曰然則天理聖人之所以若是其實者何也曰一則純二則雜純則誠雜則妄此常物之大情也夫天之所以爲天也沖漠無朕而萬理兼該無所不具然其為體則一而已矣未始有物以雜之也是以無聲無臭無思無為而一元之氣春秋冬夏晝夜昬明百千萬年未嘗有以息之蓋天下之物洪纎巨細飛潛動植亦莫不各得其性命之正以生而未嘗有一毫之差此天理之所以爲實而不妄者也若夫人物之生性命之正固亦莫非天理之實但以氣質之偏口鼻耳目四支之好得以蔽之而私欲生焉是以當其惻隱之發而忮害雜之則所以為仁者有不實矣當其羞惡之發而貪昧雜之則所以爲義者有不實矣此常人之心所以雖欲勉於為善而内外隱顯常不免於二致其甚至於詐偽欺罔而卒墮於小人之歸則以其二者雜之故也唯聖人氣質清純渾然天理初無人欲之私以病之是以仁則表裏皆仁而無一毫之不仁義則表裏皆義而無一毫之不義其為徳也固舉天下之善而無一事之或遺而其為善也又極天下之實而無一毫之不滿此其所以不勉不思從容中道而動容周旋莫不中禮也曰然則常人未免於私欲無以實其德者奈何曰聖人固己言之亦曰擇善而固執之耳夫於天下之事皆有以知其如是為善而不能不為知其如是為惡而不能不去則為善去惡之心固己篤矣於是而又加以固執之功雖其不睹不聞之間亦必戒慎恐懼而不敢懈則凢所謂私欲者出而無所施於外入而無所藏於中自將消磨泯滅不得以為吾之病而吾之德又何患於不實哉是則所謂誠之者也曰然則大學論小人之隂惡陽善而以誠於中者目之何也曰若是者自其天理之大體觀之則其為善也誠虚矣自其人欲之私分觀之則其爲惡也何實如之而安得不謂之誠哉但非天理真實無妄之本然則其誠也適所以虚其本然之善而反為不誠耳又曰諸説周子至矣其上章以天道言其下章以人道言愚於通書之説亦既略言之矣程子無妄之云至矣其他説亦各有所發眀讀者深玩而黙識焉則諸家之是非得失不能出乎此矣曰學問思辨亦有序乎曰學之博然後有以備事物之理故能參伍之以得所疑而有問問之審然後有以盡師友之情故能反復之以發其端而可思思之謹則精而不雜故能有所自得而可以施其辨辨之明則斷而不差故能無所疑惑而可以見於行行之篤則凡所學問思辨而得之者又皆必踐其實而不為空言矣此五者之序也曰吕氏之説之詳不亦善乎曰吕氏之説最為詳實然深考之則亦未免乎有病蓋君子之於天下必欲無一理之不通無一事之不能故不可以不學而其學不可以不博及其積累而貫通焉然後有以深造乎約而一以貫之非其博學之初已有造約之心而姑從事於博以為之地也至於學而不能無疑則不可以不問而其問也或粗略而不審則其疑不能盡決而與不問無以異矣故問之不可以不審或曰成心亡而後可進則是疑之説也非疑而問問而審之説也學也問也得於外者也若專恃此而反之心以驗其實則察之不精信之不篤而守之不固矣故必思索以精之然後心與理熟而彼此為一然使其思也或大多而不專則亦泛濫而無益或大深而不止則又過苦而有傷皆非思之善也故其思也又必貴於能慎非獨為反之於身知其為何事何物而已也其餘則皆得之而所論變化氣質者尤有功也曰何以言誠為此篇之樞紐也曰誠者實而已矣天命云者實理之原也性其在物之實體道其當然之實用而教也者又因其體用之實而品節之也不可離者此理之實也隱之見微之顯實之存亡而不可掩者也戒慎恐懼而慎其獨焉所以實乎此理之實也中和云者所以狀此實理之體用也天地位萬物育則所以極此實理之功效也中庸云者實理之適可而平常者也過與不及不見實理而妄行者也費而隱者言實理之用廣而體微也鳶飛魚躍流動充滿夫豈無實而有是哉不逺人以下至於大舜文武周公之事孔子之言皆實理應用之當然而鬼神之不可掩則又其發見之所以然也聖人於此固以其無一毫之不實而至於如此之盛其示人人也亦欲其必以其實而無一毫之偽也蓋自然而實者天也必期於實者人而天也誠眀以下累章之意皆所以反覆乎此而其所以至於正大經而立大本參天地而賛化育則亦真實無妄之極功也卒章尚絅之云又本其務實之初心而言也内省者慎獨克己之功不愧屋漏者戒慎恐懼而無己可克之事皆所以實乎此之序也時靡有争變也百辟刑之化也無聲無臭又極乎天命之性實理之原而言也蓋此篇大指專以發明實理之本然欲人之實此理而無妄故其言雖多而其樞紐不越乎誠之一言也嗚呼深哉北溪陳氏曰誠於忠信極相近須有分别誠是就自然之理上形容此一字忠信是就人用功夫上説後世説誠都差了伊川方云無妄之謂誠晦翁又謂真實無妄之謂誠尤見分曉今人動以至誠兩字加諸人只成謙恭敬謹之意不知誠者乃真實無妄之謂至誠乃真實極至無一毫不盡惟聖人可以當之如何可容易加諸人又曰天道流行自古及今無一毫之妄暑徃則寒來日徃則月來元亨利貞終始循環萬古常然又如天行一日一夜一週而又過一度與日月五星之運行􅄤度不差至於萬物之生一花一葉文縷相等對自古至今無一毫差錯盡是真實道理此所謂其物不貳則生物不測就人論則實理流行付予於人在吾身日用常常流行發見但人不察耳如孩提之童無不知愛親敬兄無非實理發見良知良能不待安排又如乍見孺子將入井便有怵惕之心至行道乞人饑餓瀕死而蹴爾嗟來之食乃不屑就此皆降衷秉􅂜真實道理自然發見雖極惡之人物欲昏蔽良心之實終不可殄皆天理流行真實處及就人做工夫處論則只是慤實不欺之理全體慤實固誠也一言一行之實亦誠也又曰君子誠之爲貴誠之者人之道此皆就做工夫上論要得真實無妄延平周氏曰不勉而中不思而得從容中道天也而聖人不以天廢人擇善而固執之者人也而賢人必以人助天學而有所未能則問之問而有所未知則思之思而有所未得則辨之既辨矣然後行之蓋求之於人而又求之於己者善學者也愚之對者知而不言知柔之對者剛而不言剛何也蓋言其性則愚不止乎知而必至於明者言其才則柔不止於剛而必爲強者也何以言之莊周嘗謂使知者求之不得然後使明者求之是明對知為重臯陶之九德則強出於剛是剛對強爲次廣安游氏曰春秋以來人各以意之所見爲善自以爲孝而陷於不孝申生是也自以爲忠而陷於不忠荀息是也自以爲仁而陷於不仁宋襄公是也自以爲義而害於人倫於陵仲子是也自以為亷而害於大體楚子發是也若此者各自以其所見爲善孔子憂之作春秋以明至善之歸以爲當世之人其所以陷於不善者其意皆以善爲之而不知其義心非不善擇之不精講之不詳故至於此故曰博學之審問之慎思之明辨之篤行之凡此者皆所以精擇之以求明乎至善也人一己百人十己千皆所以求至乎至善也學之問之辨之行之而弗措凡以善之難眀而易以有毫釐之差也范陽張氏曰欲擇善固執不由學問思辨篤行中求所謂善者未必善而執者非所當執也學必有疑疑則必問問而未喻必思思之至深必辨辨之己徹必行自然之理也怠慢之心常起於無味有志之士常弗措於可措此所以不畏天資之愚而畏怠惰而自絶者也苟加學問昏氣自除愚者明矣懦氣自去柔者強矣愚懦者尚可進道況秀艾之士哉施氏曰自然而然謂之天使然而然謂之人誠者得之於天自然而然者也故言天之道則以天合天而已誠之者成之於人使然而然者也故言人之道則以人相天而已以天合天則無事於有為故不勉而中不思而得動則合道而已此人之所以聖也以人相天則假修為而後至見善不明則不足以擇善用心不剛則不足以固執之者也學以窮其理故欲博思以精其義故欲慎學之博矣而繼之以審問則日造其所無而好其所新矣此則閲理多矣思之慎矣而繼之以明辨則日減其所有而損其所成矣此則見理明矣然後知其所要勤而行之則能有所至故不可以不篤篤者力行而至也江陵項氏曰學所未能問所未知思其所以然辨其所不然行其所當然又曰學之於古問之於今思之欲其契於心辨之欲其合於道行之則爲我有矣又曰學而又問則取於人者詳思而又辨則求於心者精如是而後可以行矣象山陸氏曰欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物自大學言之固先乎講明矣自中庸言之學之弗能問之弗知思之弗得辨之弗明則亦何所行哉未嘗學問思辨而曰吾唯篤行而已是冥行者也自孟子言之則事蓋未有無始而有終者講明之未至而徒恃其能力行是猶射者不習於教法之巧而徒恃其有力謂吾能至於百歩之外而不計其未嘗中也故曰其至爾力也其中非爾力也講明有所未至則雖才質之卓異踐履之純篤如伊尹之任伯夷之清栁下恵之和不思不勉從容而然可以謂之聖矣而顧有所不願學拘儒瞽生又安可以其硜硜之必爲而傲知學之士哉吳興沈氏曰性一也語其無所不在則曰道語其有一而未形則曰中語其真實而明妙則曰誠其歸皆性也中庸之説其始曰性其中曰中及其終也又變其目曰誠命名雖有不同其出於性則一也特有毫釐之辨耳夫誠一也有即事而誠當機而㑹所謂天之道也有因學問而復明人之道也天之道舜之大智是也人之道顔子之拳拳服膺是也子思又以誠之者之事必待乎指入之路學問思辨與行以下是也易曰舉而措之又曰禮義有所措措之為言處其所當安之義也知夫誠之所在則得夫博學審問慎思明辨篤行之力至於有所措則至夫誠矣與從容中道其歸一揆也故人一己百人十己千果能此道蓋必然之理果者決也決然能是道者也宓氏曰人之稟性有利有鈍故其得道有易有難一能之十能之此其性之利者也性之鈍者勿苦其難而自棄也他人一能之己當百以及之他人十能之己當千以及之蓋騏驥一日千里駑馬十駕亦將千里也果能此道矣雖愚必明雖柔必強所謂或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也霅川倪氏曰天性昏愚求變而爲賢明非百倍其功不足以致之然必立志之堅然後可晏氏曰非見善眀者不能擇善非用心剛者不能固執唯賢者然後能此顔淵擇乎中庸得一善則拳拳服膺而弗失之是也博學者學之廣欲其強記審問者問之詳欲其多聞所以外資諸人也慎思者精思其意㫖明辨者辨白其是非所以内資諸己也資諸人者既致其廣大資諸己者又盡其精微然後繼之以篤行之則非茍知之亦允蹈之也易曰學以聚之問以辨之而終於仁以行之楊子曰學以治之思以精之而卒於不倦以終之與此同意蔡氏曰不勉而中不思而得先言仁後言智擇善而固執之先言智後言仁亦可見聖人君子之徳闕而不亂又曰雖愚必眀求智之事也雖柔必強求仁之事也自誠明謂之性自明誠謂之教誠則明矣明則誠矣鄭氏曰自由也由至誠而有明徳是聖人之性者也由明徳而有至誠是賢人學以誠之也有至誠則必有明徳有明徳則必有至誠孔氏曰此一經顯天性至誠或學而能兩者雖異功用則相通河南程氏曰自其外者學之而得於内者謂之眀自其内者得之而兼於外者謂之誠誠與明一也伊川又曰君子之學必先眀諸心知所徃然後力行以求至所謂自明而誠也故學必盡其心盡其心則知其性知其性則反而誠之聖人也伊川又曰孔子之道發而爲行如鄉黨之所載者自誠而明也由鄉黨之所載而學之以至於孔子者自明而誠也及其至焉一也伊川問横渠言由明以至誠由誠以至明此言恐過當曰由明以至誠此句却是由誠以至明則不然誠即眀也横渠張氏曰自誠眀者先盡性以至于窮理也謂先自性理㑹來以至於理自明誠者先窮理以至於盡性也謂先從學問理㑹以推逹於天性也藍田吕氏曰自誠眀性之者也自明誠反之者也性之者自成徳而言聖人之所性也反之者自志學而言聖人之教也一本云謂之性者生之所固有以得之謂之教者由學以復之成德者至於實然不易之地理義皆由此出也天下之理如目睹耳聞不慮而知不言而喻此之謂誠則明志學者致知以窮天下之理則天下之理皆得卒亦至於實然不易之地至簡至易行其所無事此之謂明則誠建安游氏曰自誠明由中出也故可名於性自眀誠自外入也故可名於教誠者因性故無不眀眀者致曲故能有誠學不可以已加之誠意而已其誠不息則雖愚必眀況其本智乎雖柔必強況其本剛乎及其成功一也豈不信哉延平楊氏曰自誠而明天之道也故謂之性自明而誠人之道也故謂之教天人一道而心之所至有差焉其歸則無二致也故曰誠則明矣明則誠矣新安朱氏曰此第二十一章子思承上章夫子天道人道之意而立言也自此以下十二章皆子思之言以反覆推明此章之意程子諸説皆學者所傳録其以内外道行為誠明似不親切唯先明諸心一條以知語明以行語誠爲得其訓乃顔子好學論中語而夫子之手筆也亦可以見彼記録者之不能無失矣張子蓋以性教分爲學之兩塗而不以論聖賢之品第故有由誠至明語程子之辨雖已得之然未究其立言本意之所以失也其曰誠即明也恐亦不能無誤吕氏性教二字得之而於誠字以至簡至易行其所無事為説則似為得其本㫖也且於性教皆以至於實然不易之地為言則至於云者非所以言性之之事而不易云者亦非所以申實然之説也然其過於游楊則逺矣兼山郭氏曰自誠明謂之性由性以誠也自明誠謂之教由教以誠也本乎性故有生知由乎教故非學則不得也率性之謂道自誠而言之也不明乎善不誠乎身自明而言之也明之與誠及其成功一也涑水司馬氏曰率由誠心而智識自明此天授聖人之性也由智識之明求知道者莫若至誠故誠心爲善此賢者修聖人之教也所稟賦於天有殊然苟能盡其誠心則智識無不明矣髙要譚氏曰夫唯已極其至無所用力故六通四闢無所不知故曰自誠明謂之性謂之性云者指性示人使人知所至之處也夫唯未極其至須先用力致知格物始見本性故曰自明誠謂之教謂之教云者用此立教使人知修習之方也自誠而明者性合天道自然開廓明逹如人安居本舍坐觀庶事故曰誠則明矣自明而誠者先明乎善然後反身而誠如人出外復歸先須辨認本舍然後入而居之故曰明則誠矣謂之性者聖人之事謂之教者學以成聖之事唯能自明而誠即能自誠而明矣此相終始之説也新定顧氏曰所謂體乎天理無一毫之偽誠之謂也知乎天理無一毫之蔽明之謂也由誠而明資稟至粹人偽不萌則於天下之事理自無不知此聖人之事出乎天理之本然者也堯舜性之此之謂也由明而誠講學既精灼見此理私欲克除復乎天理之真此賢人之事出乎教習之使然者也湯武反之蓋其人也誠則明矣譬如太虚纎翳不生萬象呈露眀則誠矣晨光既升隂邪屏息大虛湛然蔡氏曰言性教之道雖異而本末一貫也誠明謂無息而仁智自著明誠謂由智仁而造無息下言聖人君子之德者即此義而推衍之也又曰自哀公問政至明則誠矣蓋夫子之言而子思述之上以結修道與教與逹德逹道之事下以起聖人君子天人之道而備論之也禮記集説卷一百三十二
