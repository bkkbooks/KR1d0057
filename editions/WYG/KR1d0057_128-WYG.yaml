body:
  text: 禮記集説卷一百二十八宋衛湜撰君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉在上位不陵下在下位不援上正已而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸子曰射有似乎君子失諸正鵠反求諸其身鄭氏曰援謂牽持之也無怨人無怨之者也易猶平安也俟命聼天任命也險謂傾危之道反求於其身不以怨人畫布曰正棲皮曰鵠孔氏曰素鄉也鄉其所居之位而行其所行之事不願行在位外之事鄉富貴之中行道於富貴謂不驕不淫也鄉貧賤之中行道於貧賤謂不諂不懾也行乎夷狄謂夷狄雖陋亦隨其俗守道不改行乎患難謂臨危不傾守死不變無入而不自得者言君子所入之處皆守善道在上位不陵下此素富貴行富貴也在下位不援上此素貧賤行貧賤也身處貧賤則安之宜令自樂不得援牽富貴者正己而不求於人則無怨此素夷狄行夷狄也若入夷狄當自正己而行不求於彼人則彼人無怨己者上不怨天下不尤人此素患難行患難也尤過責也易平安也言君子以道自處常居平安之中以聼待天命也小人以惡自居常行險難傾危之事以徼求榮逹之道也正謂賔射之侯鵠謂大射之侯横渠張氏曰責己者當知無天下國家皆非之理故學至於不尤人學之至也藍田吕氏曰逹則兼善天下得志則澤加於民素富貴行乎富貴者也不驕不淫不足以道之也窮則獨善其身不得志則修身見於世素貧賤行乎貧賤者也不謟不懾不足以道之也言忠信行篤敬雖蠻貊之邦行矣素夷狄行乎夷狄者也文王内文明而外柔順以蒙大難箕子内難而能正其志素患難行乎患難者也愛人不親反其仁治人不治反其智此在上位所以不陵下也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉此在下位所以不援上也陵下不從則罪其下援上不得則非其上是所謂尤人者也庸徳之行庸言之謹居易者也國有道不變塞焉國無道至死不變心逸日休行其所無事如子從父命無所徃而不受俟命者也若夫行險以徼一旦之幸得之則貪為己力不得則不能反躬是所謂怨天者也故君子正己而不求於人如射而已射之不中由吾巧之不至也故失諸正鵠者未有不反求諸身則徳之不進豈吾憂哉建安游氏曰素其位而行者即其位而道行乎其中若其素然也舜之飯糗茹草若將終身此素貧賤行乎貧賤也及其為天子被袗衣鼓琴若固有之此素富貴行乎富貴也飯糗袗衣其位雖不同而此道之行一也至於夷狄患難亦若此而已道無不行則無入而不自得矣盖道之在天下不以易世而有存亡故無古今則君子之行道不以易地而有加損故無得喪此君子之得於心者然也至於在上位不陵下知富貴之非泰也在下位不援上知貧賤之非約也此唯正己而不求於人者能之故能上不怨天以在我者有義也下不尤人以在物者有命也此君子之見於行者然也盖君子為能循理故居易以俟命居易未必不得也故窮通皆好小人反是故行險以徼幸行險未必常得也故窮通皆醜學者要當篤信而已射有似乎君子者射者發而不中則必反而求其不中之因意者志未正邪體未直邪持弓矢而未審固邪然而不中者寡矣君子之正身亦若此也愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己而已而何怨天尤人之有哉失諸正鵠者行有不得之况也延平楊氏曰君子居其位若固有之無出位之思素其位也萬物皆備於我反身而誠樂莫大焉何願乎外之有故能素其位而行無入而不自得也魯侯之不見孟子也臧倉實尼之而孟子曰予之不遇魯侯天也臧氏之子焉能使予不遇哉盖孟子非有求於魯侯也故其不怨天不尤人如此居易以俟命行其所無事也行險以徼幸不受命者也詭遇而得禽者盖有焉君子不為也射有似乎君子者射以容節比於禮樂為善内志正外體直然後持弓矢審固持弓矢審固然後可以言中射而失正鵠者未能審固也知射者豈他求哉反而求諸身以正吾志而已此君子居易之道也世之行險以徼幸者一有失焉益思所以詭遇也則異於是矣河東侯氏曰富貴貧賤夷狄患難行其素則無事矣易曰素履徃无咎是也又曰總老嘗問一士人曰論語云黙而識之識是識箇甚子思言君子無入不自得得是得箇甚或者無以為對侯子聞之曰是不識吾儒之道猶以吾儒語為釋氏用在吾儒為不成説話既曰黙識與無入不自得更理㑹箇甚識箇甚事是不成説話也今人見筆墨須謂之筆墨見人須謂之人不須問黙而識之是黙識也聖賢於道由是也庸言之信庸行之謹是自得也豈可名其所得所識之事乎新安朱氏曰此第十四章子思之言也凡章首無子曰字者放此素猶見在也言君子但因見在所居之位而為其所當為無慕乎其外之心也素富貴以下言素其位而行也在上位以下言不願乎其外也居易素位而行也俟命不願乎其外也易平地也徼求也幸謂所不當得而得者正鵠皆侯之中射之的也子思引此孔子之言以結上文之意又曰詭遇是做人不當做底行險是做人不敢做底又曰此章文義無可疑者而張子所謂當知無天下國家皆非之理者尤為切至吕氏説雖不免時有小失然其大體則皆平正慤實而有餘味也游氏説亦條暢而存亡得喪窮通好醜之説尤善但楊氏以反身而誠為不願乎外則本章之意初未及此而詭遇得禽亦非行險徼幸之謂也侯氏所辨常總黙識自得之説甚當近世佛者妄以吾言傅著其説而㫖意乖剌如此類者多矣甚可笑也但侯氏所以自為説者卻有未善若曰識者知其理之如此而已得者無所不足於吾心而已則豈不明白真實而足以服其心乎海陵胡氏曰位者所守之分外者分外之事富貴貧賤夷狄患難皆守己分而行不過分也君子向富貴之時則得富貴之中道貧賤之時則得貧賤之中道在夷狄處患難亦然所謂富貴聖人固無心於此假之以行其道耳博施濟衆舉賢援能是富貴之中道也不為苟進不求苟得此貧賤之中道也言忠信行篤敬此行夷狄之中道也患難有二或一身之患難或天下之患難處天下之患難生重於義則捨義而取生義重於生則捨生而取義一身之患難但自守其道不變其志此行患難之道也入猶向也嚴陵方氏曰素與莊子所謂素逝之素同而與經所謂素隐之素異盖因其自然無所與雜之謂也居是位則素是位而行是事所以不願乎其外也富貴貧賤夷狄患難隨所遇而安之此非素其位而行不願乎其外者乎是以朱輪駟馬而舜不以為泰簞食瓢飲而囘不以為憂九夷之居孔子不以為陋三年之征周公不失其聖君子素其位而行盖有見乎此故曰君子無入而不自得焉言入乎富貴則得乎處富貴之道貧賤則得乎處貧賤之道入乎夷狄患難亦若是而已在上位不陵下雖富貴而無驕故也在下位不援上雖貧賤而不謟故也正己而不求於人則無怨論語所謂躬自厚而薄責於人則逺怨矣是也無怨者非特人無怨於己己亦無怨於人也上不怨天以處己有命也下不尤人以處己有義也莫非命也君子道其常小人道其怪道其常故居易以俟之道其怪則行險以徼之幸亦命也君子不謂之命而謂之幸焉故孔子曰罔之生也幸而免兼山郭氏曰素者豫定乎内之謂也豫定乎内視萬變皆吾素有也又焉有陵下援上怨天尤人之累乎天人同功也則同乎天人義命一致也則同乎義命故居易以俟命顧義之所存而君子不獨謂命也小人不知天命而不畏所以行險以徼幸其免也幸而已矣長樂陳氏曰易曰素履之徃獨行願也故素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難皆獨行其願而無待乎外則所徃无咎宜其無入而不自得也夫如是則在上位不驕必不陵下矣在下位不憂必不援上矣此所以正己而不求於人也此所以上不怨天下不尤人也此所以居易以俟命也此所以如射失正鵠反求其身也小人反是是故行險以徼幸嗚呼君子求諸己小人求諸人於此可見矣至於君子之道如行逺自近登髙自卑欲孝父母自妻子始則亦反諸身求諸己耳皆忠恕之所致中庸之所成也四明沈氏曰富貴貧賤夷狄患難不是位正是外也易之正位居體孟子居天下之正位乃位也人處富貴貧賤患難夷狄之變便忘卻正位馳逐於外而不反所謂行乎富貴行乎貧賤行乎夷狄行乎患難此位不變也無入看去何處也不用揀擇不須把捉非孔子不至此境髙要譚氏曰何謂行踐履是也何謂外在天在人者是也所居之處雖險易窮通之不同而身之履踐無造次顛沛之或變此所謂素其位而行無入而不自得也自得云者所樂在内不在於外故也彼在外者一豪已上君子皆以為無預於己而未甞容心於其間或歸之天歸之人皆非我也故得時而在上位君子謂於我無加我何敢驕倨以陵下邪不遇而在下位君子謂於我無損我何所歆羡而援上邪專務正己不求於人不得於天我無怨焉不得於人我無尤焉此所謂不願乎其外居易以俟命也凡此皆君子立命之説顔子之屢空孟子之不動心皆有得於是學者唯知所以立命然後存心養性有用力之地儻不知立命則將心馳於是非利害榮辱禍福之境而忿懥恐懼喜樂憂患日交戰於胷中又何以存其心養其性邪命者貴賤貧富死生夀夭皆禀於天者也一心之中坦然平易凡貴賤貧富死生夀夭之在天者但俟其來而順受之初無豪髪芥蔕於胷次故曰君子居易以俟命范陽張氏曰素猶雅素終始富貴則以忠恕之道行乎富貴堯是也終始貧賤則以忠恕之道行乎貧賤顔子是也素夷狄則以忠恕行乎夷狄箕子是也素患難則以忠恕行乎患難孔子是也富貴貧賤夷狄患難皆天所以命我者吾其如何哉姑聼之而已然我有忠恕之道無入而不自得故盡其在我不責備於人其在上也以忠恕待人故不陵下其在下也以忠恕自處故不援上援者欲己與之齊也反求諸身在我有杪忽之差則在彼有尋丈之失然則失諸正鵠豈正鵠之罪哉永康陳氏曰素其位而行道自行也無所不通之謂行富貴以順來而道常公之貧賤夷狄患難極有窒處而道常通之回旋曲折皆有樂地如水由地中行行因地而見而行非地也居易以俟命信得及也無所逃於天地之間身者天地萬物之凖也為道之基也修其身至於與道為一由是推之無有不準一豪不凖必有一豪不盡處盍亦觀諸射乎吳興沈氏曰位非名位之謂也立太極奠三才列萬物止其所止之謂也孟子曰君子所性雖大行不加焉雖窮居不損焉分定故也中庸所謂素其位而行不願乎其外者此理也惟其性分所止無不具足極天下之富貴貧賤夷狄患難皆不足為吾加損也故以之處富貴則此位行乎富貴處貧賤則此位行乎貧賤處夷狄則此位行乎夷狄處患難則此位行乎患難富貴貧賤夷狄患難雖紛擾於外君子之位於内者常自若也何徃而不自得焉君子之位於内者如是勢之尊卑人自以為上下耳於君子何榮辱焉故居上位則不陵下在下位則不援上亦其理宜然也君子則然小人反是故曰君子居易以俟命小人行險以徼幸東萊吕氏曰居易以俟命如天命之謂性之命非特為貴賤窮通也延平周氏曰射有似乎君子君子不罪其在彼者錢塘于氏曰君子無求中之心謂君子似射則不可新定錢氏曰此章當㸔一行字正是君子無入而不自得處所以不願乎其外者也若但碌碌苟安素分亦何足道直是隨所遇而行焉方是自得晉陵錢氏曰素猶固也安於固然則道無時而不可行所以不願乎其外入者自外之辭安於固然則於其所入猶固然也而道無不行是以自得陵廹脅也援攀引也下不從不廹脅之上不用不攀引之易猶平也正己則居易失己則行險居易則待天命而無所容其心行險則徼幸於得利而喪其本心矣正鵠皆鳥名義取其難中也君子在上位而不得乎下在下位而不得乎上猶射之失正鵠也反而正已猶射之求諸身也此一節謂中庸之道不求諸人林氏曰富貴貧賤夷狄患難所居之位不同而道行其中則一也君子思不出其位安有願乎其外者哉外慕之心一生居富貴而必驕必滛居貧賤而必謟必懾居夷狄而變所守居患難而喪其志皆非素其位而行外慕之心移之也又曰援攀引也在上位而陵下者必驕在下位而援上者必謟驕者失其所以行富貴之道也謟者失其所以行貧賤之道也君子則不然謂居富貴而非泰在下者不可陵也處貧賤而非約在上者不足援也吾惟正己而不求乎人則逺怨矣不怨天不尤人則知命矣苟知正己而不求乎人雖以之行乎夷狄可也苟知不怨天不尤人雖以之行乎患難可也君子之所以能行此者無他居易以俟命也小人所以不能行此者無他行險以徼幸也夫易與險不難知也君子小人所以異其趣者何也盖居易本乎循理行險由乎趨利君子循理小人趨利其所以異也然而居易以俟未必不得雖或不得亦曰有命行險以徼未必可得雖或苟得不過曰幸君子觀此可以審其所擇矣霅川倪氏曰素者其舊所居已然者也入者今方自此而入也假如生於富貴是其素富貴也或貧賤之士逢時而得富貴是其入富貴也下之三者皆然素者以道行之故無所不行入者以道行之故無徃不得自得即孟子所謂自得之則居之安之自得自得其道而有以自樂故無入而不自得也富貴順境也貧賤夷狄患難逆境也順居其一逆居其三以此見人少有不經憂患者君子所以能居易俟命者以其視富貴貧賤夷狄患難為一也小人所以行險徼幸者貪欲之心熾必以人力勝天理也君子素其位而行以為如我已居之位皆可以行道是以不願乎外而他有所求此所以能居易俟命者小人君子之反也此曰君子居易俟命乃曰行法以俟命於易言居静而待也於法言行動而待也法者正理與小人行險相反也俟命者世俗以為俟命之亨通如此則是欲達而惡窮欲富貴而惡貧賤或不如志不免失望君子則逹亦俟命窮亦俟命窮之與逹聴天命之何如爾故曰得之自是不得自是以聼天命射以譬君子處貧賤夷狄患難無所怨尤於居易以俟命之時常反求諸身惟恐有一之未至而益加進修及達則兼善天下矣小人則唯怨天尤人而已蔡氏曰此言正心修身之事素其位而行無入而不自得則心不外馳而正矣不願乎其外正己而不求於人則身安而修矣君子之道譬如行逺必自邇譬如登髙必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑子曰父母其順矣乎鄭氏曰自從也邇近也行之以近者卑者始以漸致之髙逺瑟琴聲相應合翕和也耽亦樂也古者謂子孫曰帑此詩言和室家之道自近者始孔子曰自射有似乎君子至此其順矣乎為一節覆明行道在身之事以射譬之所引詩小雅常棣之篇美文王之詩藍田吕氏曰不得乎親不可以為人不順乎親不可以為子故君子之道莫大乎孝孝之本莫大乎順父母故仁人孝子欲順親必先乎妻子不失其好兄弟不失其和室家宜之妻帑樂之致家道成然後可以養父母之志而無違也行逺登髙者謂孝莫大於順其親者也自邇自卑者謂本乎妻子兄弟者也故身不行道不行於妻子文王刑於寡妻至於兄弟則治家之道必自妻子始建安游氏曰行逺必自邇自家以達國也升髙必自卑由人以之天也妻子好合然後兄弟翕兄弟既翕然後父母順盖刑於寡妻至於兄弟以順於父母則家道正矣於治國也何有家道正則人道立矣於天道也何有知事於邇且卑者則逺且髙者之理得矣延平楊氏曰身不行道不行於妻子故齊家自身始行逺自邇之辟也盖妻子之不好合兄弟之不翕而能順父母者未之有也新安朱氏曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑然後父母其順矣乎則順父母自妻子始登髙自卑之辟也此第十五章辟譬同夫子誦此詩而賛之曰人能和於妻子宜於兄弟如此則父母其安樂之矣子思引詩及此語以明行逺自邇登髙自卑之意或問十五章之説曰章首二句承上章而言道雖無所不在而其進之則有序也其下引詩與夫子之言乃指一事以明之非以二句之義為止於此也詩説唯吕氏為詳實然亦不察此而反以章首二言發明引詩之意則失之矣涑水司馬氏曰行逺必自邇自家以逹國也登髙必自卑由人以之天也延平周氏曰自邇而行逺者自室家而及乎天下者也自卑而登髙者自妻子好合而至乎父母其順者也嚴陵方氏曰君子之道自誠意正心推而廣之以至於平天下自可欲之善積而進之至於聖而不可知之神伊尹曰若升髙必自下若陟遐必自邇又言父母其順矣乎者言父母順則天下無不順也此皆有所自之意也兼山郭氏曰易曰夫乾確然示人易矣夫坤隤然示人簡矣推是而言聖人之道與天下之至理皆易知易從而天下莫能從之者凡以行之不自邇自卑故也惟其自邇自卑所以易知易從而終於必達其成徳也反在於真積力久不息之後所以莫能知莫能從此中庸之難能也孟子曰舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化則化天下者必始於順父母父母之道必始於樂室家同兄弟夫何難哉顧行之不至而已關雎之詩用之鄉人用之邦國亦此之謂也晉陵喻氏曰譬如行逺必自邇譬如登髙必自卑歩歩著實何憂乎邇之不逺卑之不髙哉身既正矣則處夫婦兄弟之間下至妻帑何憂不樂以此奉親父母有不順者乎晏氏曰常棣本燕兄弟之詩乃曰妻子好合者盖人之兄弟少長嬉戱譬如新昏初未嘗不和良由娶婦則外姓入家争長競短為人夫者唯婦言是用則兄弟始不和矣故兄弟之翕者必本於妻子之合焉書云孝乎惟孝友于兄弟故順於父母必本於兄弟之和焉昔舜之孝釐降二女于媯汭觀厥刑于二女有欽哉之語則妻子之合可知矣故雖傲象有言二嫂使治朕棲不以為愠亦誠信而喜之非兄弟之和乎所以父頑母嚚亦能順之而克諧以孝也髙要譚氏曰誠身之學治家治國治天下皆不外是而其用心自家始故曰譬如行逺必自邇譬如升髙必自卑盖切近於身者唯家為然一家之内妻子兄弟最為難處人子所以順其親者在於處妻子兄弟之間得其道也道行乎妻子而妻子睦道行乎兄弟而兄弟和由是而上得父母之悦則修身及家之道得矣推此而施之國施之天下又何足治乎晉陵錢氏曰君子之道始於夫婦至於兄弟則父母無不順亦行逺自邇登髙自卑之意此一節謂中庸之道行於一家蔡氏曰此言齊家之事自身修以後皆理物也齊家乃理物之始故以自邇自卑為言子曰鬼神之為徳其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可揜如此夫鄭氏曰齊明明猶潔也洋洋人想思其傍僾之貌格來也矧況也射厭也思聲之助言神之來形象不可億度而知事之盡敬而已況可厭倦乎㣲之顯誠之不可揜言神無形而著不言而誠孔氏曰此一節明鬼神之道無形而能顯著誠信中庸之道與鬼神之道相似亦從㣲至著不言而自誠也齊明盛服齊戒明潔盛飾衣服以承祭祀也鬼神之情狀人想象之如在人之上如在人之左右所引詩大雅抑之篇言神之來至以其無形不可度知常須恭敬況於祭祀可厭倦乎㣲之顯者鬼神之狀㣲昧不明而精靈與人為吉凶是從㣲之顯也誠之不可揜者鬼神誠信不可掩蔽善者必降以福惡者必降以禍如此夫者此詩人所云何可厭倦此鬼神即易繫辭知鬼神之情狀與天地相似以能生萬物也彼註云木火之神生物金水之鬼終物彼以春夏對秋冬故以春夏生物秋冬終物其實鬼神皆能生物終物也故此云體物而不可遺此雖説隂陽鬼神人之鬼神亦附隂陽之鬼神故此云齊明盛服以承祭祀是兼人之鬼神也河南程氏曰夫天專言之則道也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾伊川又曰鬼神者造化之迹也又曰鬼是徃而不返之義又曰立清虚一大為萬物之原恐未安須兼清濁虚實乃可言神道體物不遺不應有方所明道又曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神故説神如在其上如在其左右包小大事而只曰誠之不可揜如此夫徹上徹下不過如此問世言鬼神之事雖知其無然不能無疑如何可以曉悟其理曰理㑹得精氣為物遊魂為變與原始要終之説便能知也鬼神之道只恁説與賢雖㑹得亦信不過須是自得也横渠張氏曰鬼神者二氣之良能也又曰天道不窮寒暑已衆動不窮屈伸已鬼神之實不越二端而已矣又曰鬼神徃來屈伸之義故天曰神地曰祗人曰鬼神示者鬼之始歸徃者來之終又曰天體物而不遺猶仁體事而無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾游衍無一物之不體也又曰凡可狀皆有也凡有皆象也凡象皆氣也氣之性本虚而神則神與性乃氣所固有此鬼神所以體物而不可遺也藍田吕氏曰此章論誠之本唯誠所以能中庸神以知來知以藏徃徃者屈也來者伸也所屈者不亡所伸者無息雖無形聲可求而物物皆體弗聞弗見可謂㣲矣然體物不遺此之謂顯不亡不息可謂誠矣因感必見此之謂不可揜又曰鬼神者無形故視之不見無聲故聽之不聞然萬物之生莫不有氣氣也者神之盛也莫不有魄魄也者鬼之盛也故人亦鬼神之會爾此體物而不可遺者也鬼神者周流天地之間無所不在雖寂然不動而有感必通通雖無形無聲而有所謂昭昭不可欺者故如在其上如在其左右也弗見弗聞可謂㣲矣然體物而不可遺此之謂顯周流天地之間昭昭而不可欺可謂誠矣然因感而必通此之謂不可揜又曰鬼神者二氣之徃來爾物感雖㣲無不通於二氣故人有是心雖自謂隱㣲心未嘗不動動則固已感於氣矣鬼神安有不見乎其心之動又必見於聲色舉動之間人乗間以知之則感之著者也上蔡謝氏曰動而不已其神乎滯而有迹其鬼乎徃來不息神也摧仆歸根鬼也致生之故其鬼神致死之故其鬼不神何也人以為神則神以為不神則不神矣知死而致生之不智知死而致死之不仁聖人所為聖明之也或問死生之説謝曰人死時氣盡也曰有鬼神否謝曰余當時亦曾問明道先生明道曰待向你道無來你怎信得及待向你道有來你但去尋討看謝曰此便是答底語又曰横渠説得來别這箇便是天地間妙用須是將來做箇題目入思議始得講説不濟事曰沈魂滯魄影響底事如何曰須是自家看得破始得張亢郡君化去嘗來附語亢所知事皆能言之亢一日方與道士圍碁又自外來道士封一把碁子令將去問之張不知數便道不得又如紫姑神不識字底把著冩不得不信底把著冩不得推此可以見矣曰先生祭饗鬼神則甚曰是他意思别三日齋七日戒求諸隂陽四方上下盖是要集自家精神所以格有廟必於萃與渙言之雖然如是以為有亦不可以為無亦不可這裏有妙理於若有若無之間須斷置得去始得曰如此卻是鶻突也謝曰不是鶻突自家要有便有自家要無便無使得鬼神在虚空中辟塞滿觸目皆是為他是天地間妙用祖考精神便是自家精神建安游氏曰道無不在明則為禮樂幽則為鬼神鬼神具道之妙用也其徳顧不盛歟夫欲知鬼神之徳者反求諸其心而已神將來舍則是神之格思也若正心以度之則乖矣所謂不可度思也正己度之猶不可又況得而忘之乎所謂不可射思也不可度故視不見聽不聞不可射故如在其上如在其左右也夫㣲之顯如此以其誠之不可揜也誠則物物皆彰矣故不可揜為之顯者其理也誠之不可揜以其徳言也延平楊氏曰鬼神之徳唯誠而已誠無幽明之間故其不可揜如此夫不誠則無物所謂體物而不可遺者尚何顯之有知此其知鬼神矣又曰鬼神體物而不可遺盖其妙萬物而無不在故也河東侯氏曰鬼神之徳天地乾坤隂陽造化之理而已有是道有是理故視之而弗見聽之而弗聞有是物有是用故體物而不可遺消息盈虚徃來神明皆是理也吉凶悔吝剛柔變化皆是物也妙而無窮㣲而至顯使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思射讀作石字故曰鬼神之為徳其盛矣乎或曰鬼神其誠乎曰只是鬼神非誠也曰非誠則經言誠之不可揜何也曰誠者誠也充塞乎上下無物可間者也以隂陽言之則曰道以乾坤言之則曰易貫通乎上下則曰誠盖天非誠其行也不健地非誠其載也不厚人非誠其形也不踐總攝天地斡旋造化動役鬼神闔闢乾坤萬物由之以生死日月由之而晦明者誠也經不曰鬼神而曰鬼神之為徳其盛矣乎鬼神之徳誠也誠無内外無幽明故可格而不可度射易曰形而上者謂之道形而下者謂之器鬼神亦器也形而下者也學者心得之可也新安朱氏曰此第十六章張子以二氣言則鬼者隂之靈也神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼其實一物而已為徳猶言性情功效鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物之所不能遺也其言體物猶易所謂幹事齊之為言齊也所以齊不齊而致其齊也洋洋流動充滿之意能使人畏敬奉承而發見昭著如此乃其體物而不可遺之驗也孔子曰其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也正謂此爾誠者真實無妄之謂隂陽合散無非實者故其發見之不可揜如此此前三章以其費之小者而言此後三章以其費之大者而言此一章兼費隐包小大而言不見不聞隱也體物如在則亦費矣或問鬼神之説其詳奈何曰鬼神之義孔子所以告宰予者見於祭義之篇其説已詳而正鄭氏釋之亦已明矣其以口鼻之嘘吸者為魂耳目之精明者為魄盖指血氣之類以明之程子張子更以隂陽造化為説則其意又廣而天地萬物之屈伸徃來皆在其中矣盖陽魂為神隂魄為鬼是以其在人也隂陽合則魄凝魂聚而有生隂陽判則魂升為神魄降為鬼易大傳所謂精氣為物遊魂為變故知鬼神之情狀者正以明此而書所謂徂落者亦以其升降為言耳若又以其徃來者言之則來者方伸而為神徃者既屈而為鬼盖二氣之分實一氣之運故陽主伸隂主屈而錯綜以言亦各得其意焉學者熟玩而精察之如謝氏所謂做題目入思議者則庻乎有以識之矣又曰吕氏推本張子之説尤為詳備但改本有所屈者不亡一句乃形潰反原之意張子他書亦有是説而程子數辨其非東見録中所謂不必以既反之氣復為方伸之氣者其類可考也謝氏説則善矣但歸根之云似亦㣲有反原之累耳游楊之説皆有不可曉者唯妙萬物而無不在一語近是而以其他語考之不知其於是理之實果如何也侯氏曰鬼神形而下者非誠也鬼神之徳則誠也案經文本贊鬼神之徳之盛如下文所云而結之曰誠之不可揜如此則是以鬼神之徳所以盛者盖以其誠耳非以誠自為一物而别為鬼神之徳也今侯氏乃析鬼神與其徳為二物而以形而上下言之乍讀如可喜者而細以經文事理求之則失之逺矣程子所謂只好隔壁聽者其謂此類也曰子之以幹事明體物何也天下之物莫非鬼神之所為也故鬼神為物之體而物無不待是而有者然曰為物之體則物先乎氣必曰體物然後見其氣先乎物而言順耳幹猶木之有榦必先有此而後枝葉有所附而生焉貞之幹事亦猶是也長樂劉氏曰鬼神之為徳所以盛者以其主宰於萬化也無形也而形由之以生無氣也而氣由之以兆其體虚空故能役用於萬有其用沖寂故能造化於三才不可得而見也而欽敬畏仰孰敢慢之於無形不可得而聞也而恭肅恐懼孰敢忽之於無聲不可得而名也隨其用而名其功不可得而體也隨其物而體其德是故用其健順者强之曰乾坤用其覆載者強之曰天地用其氣者強之曰隂陽用其道者強之曰仁義用之為熯潤者强之曰水火用之為鼓撓者強之曰雷風用之為養悦者強之曰山澤歸之於主宰者強之曰鬼神然則鬼神無體萬物流行莫非其體也資其物者莫不荷鬼神之功故曰體物而不可遺易曰神也者妙萬物而為言資其功而享其妙又可遺哉故使天下之人齊明盛服以承祭祀不遺其覆載之徳而祀乎天地也不遺其照臨之功而祀乎日月也不遺其仁義之道而祀乎堯舜也不遺其生育之恩而祀乎祖先也不遺其變化之勤而祀乎四時風霆雷雨山川丘陵也故曰洋洋如在其上如在其左右以言乎無所入而不仰乎鬼神之功無所至而不沐乎鬼神之徳也海陵胡氏曰鬼神以形言之則天地以氣言之則隂陽以主宰言之則鬼神鬼神無形故視之弗見無聲故聽之弗聞無體以物為體視其所以生所以成莫非鬼神之功故天下之人不可遺忘以神無形無聲故其來也不可億度人當敬事之不暇況可厭射之乎莆陽林氏曰此一叚自非深於道徳性命之理未易到此盖唯性能知之知之然後能言之明而禮樂幽而鬼神一而已矣以有求之則窈窈冥冥而不見其迹以無求之則又洋洋如在其上如在其左右者也子思作中庸而有及於鬼神之事是其窮理至此有得於此矣人多見子路問鬼神之事則疑之不知當時發此一問亦子路窮髙極逺見到此方有此問孔子答之以未知生未事人則徃徃以為鬼神又道徳之别一事不可學也今人不㑹此意只説能事人便能事鬼失之逺矣殊不知孔子之言謂子路不可躐等須學至此然後可以知此也此乃子路之幼學其後燔臺結纓想子路亦知之矣然則子思之言可謂深於道徳性命之理然後能形容此言也如致中和一事則知天地之位萬物之育孝一事則知其通神明光四海皆學之極到處然後能知而言也范陽張氏曰惟鬼神之徳如此是以發天下之敬髙要譚氏曰誠者實理也貫幽明通晝夜亘古今窮萬世此理常在不亡不息未嘗有纎毫間斷也雖隐於至㣲不可以形聲求然物物皆體隨所遇而著見惟其如是故天下之物莫能擬其形容獨鬼神變化無方可以推見其理之不可揜者此夫子所以稱鬼神之徳為盛也㣲而顯者鬼神之徳如此盖實有是理故也若無是理安得隨感而著見乎誠之為道與鬼神之徳更無異理方其隐於至㣲有如鬼神之不可聞見也此所謂徃者屈也及其著見而不可揜又如鬼神之隨感隨應也此所謂來者伸也聖人知鬼神之情狀不過徃來屈伸之理方其徃而屈也若甚隐㣲及其來而伸也尤為顯見因以見誠之不可揜者其理如此故曰微之顯誠之不可揜如此夫呉興沈氏曰中庸之道顯則有人事幽則有鬼神曰忠恕曰舜之大智曰顔子之擇善曰子路之强曰君子之道四皆人事也至此又指其幽者示之其實皆中庸也嚴陵喻氏曰晦菴曰其言體物猶所謂幹事㫖哉言乎木非榦則不能生築非榦則不能立不曰物之體而曰體物猶不曰事之幹而曰幹事也宣城奚氏曰世之言鬼神者皆失之誕謾荒怪惟聖人之論極乎實理經曰明則有禮樂幽則有鬼神其曰有者實理也知禮樂則知鬼神矣盖盈乎天地之間凡其可名狀者皆有也皆實理也名之曰鬼神雖弗見弗聞本無真體而黙體於物自有不可遺者故在天地則有天地之鬼神在山川則有山川之鬼神在宗廟則有宗廟之鬼神凡報本反始之有乎物者皆鬼神之不可遺者也惟君子知其不可遺故齊明盛服以承祭祀洋洋乎如在其上如在其左右此豈故為是勉强矯飾之態哉亦曰實有是理耳夫以其弗聞弗見而乃使人敬之若是者㣲之顯也人之所以敬鬼神若是者誠之不可揜也此鬼神之徳所以為盛也彼惑於世俗誕謾荒怪之説者至謂真聞真見可驚可愕此豈知鬼神之徳哉錢塘于氏曰此章發鬼神之為徳而著誠之不可揜誠之一字始開於此新定顧氏曰陟降厥士日監在兹非是虚語鬼神充塞天地間司察生人但人不見爾如今人請大仙大仙便降法師行法神將便至何其相去之近也有疑人死後神識散不散者答曰人之智慮淺未到這地如何探先臆度死了神識散不散所可知者明則有禮樂幽則有鬼神此是決定若要盡測鬼神中事如何容你識盡且如禽獸亦有靈性他只知得他類中事如何知得人事曲折人之神識自道中生出來亦有神識復歸道體之理但其間曲折不齊不可盡知或問神識亦有壊時否答曰以理推之鬼神亦有代謝纔著於有便有壊時惟神其神者不壊不滅又曰人纔動念鬼神便知此某所洞見者吾人但當正心誠意戒謹恐懼到得徳重鬼神欽田地也早得何須更説過頭事人之所為善惡報應遲緩者自是天道長逺不如此屑屑定須次序報來或問釋氏輪回之説如何答曰姑存之若果有天堂地獄為善者定不到得墮惡地獄分明或問東萊書説云後人祭山神須泥塑木刻為人形不知峙而為山流而為川飛走而為禽獸靈而為人各自有箇形若謂山神之形如人則人之形亦可為山矣此説有理答曰固是但鬼神之形不必指定形貌而論安知山神必為人形必不為人形所謂游魂為變卻自有變現時不可執定説答問又曰實有之理是謂誠夫惟實有是理則無隐而不章者鄭康成曰可猶所也言不有所遺鬼神無徃不在暗室屋漏可以隔絶人之視聽不可以隔絶神之徃來體物而不可遺之謂也講義蔡氏曰此言感應㣲妙之理君子之道自家齊以前人力可至其國治天下平之事非誠之至與造化同體者不能也君子至此其功用與聖人同矣子思特舉此義以合之故下文即以聖人之事接之也又曰凡物之體無非鬼神體之故曰體物而不可遺此體字虚非若形體之體實盖體其體之謂也又曰誠之不可揜誠字恐是指人之成徳而言也子曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之故大徳必得其位必得其禄必得其名必得其夀故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令徳宜民宜人受禄于天保佑命之自天申之故大徳者必受命鄭氏曰保安也名令聞也材謂其質性也篤厚也言善者天厚其福惡者天厚其毒皆由其本而為之栽猶殖也培益也覆敗也憲憲興盛之貌保亦安也佑助也孔氏曰此一節明中庸之徳故能富有天下受天之命也舜禪與禹何言子孫保之謂子孫承保祭祀周時陳國是舜之後也天之生物隨物質性而厚之善者厚其福舜禹是也惡者厚其毒桀紂是也已徳自能豐殖天則因而培益之無徳自取傾危天則因而覆敗之所引詩大雅嘉樂之篇美成王之詩嘉善也言成王憲憲然有令善之徳宜民謂宜養萬民宜人謂宜官人故天乃保安佑助命為天子又申重福之記者引證大徳必受命之義詩本文憲憲為顯顯河南程氏曰知天命是逹天理也必受命是得其應也命者是天之付與如命令之命天之報應皆如影響得其報者是常理也然而細推之則須有報應但人以淺狹之見求之便為差互天命不可易也然有可易者唯有徳者能之如修養之引年世祚之祈天永命常人之至於聖賢皆此道也伊川横渠張氏曰徳不勝氣性命於氣徳勝其氣性命於徳窮理盡性則性命於天天命天徳氣之不可變者可變者獨死生修天而已故論死生則曰有命以言其氣也語富貴則曰在天以言其理也此大徳所以必受命藍田吕氏曰中庸之行孝弟而已如舜之徳位皆極流澤之逺始可盡孝故禄位名夀之皆得非大徳其孰能致之一本云天命之所屬莫踰於大徳至於禄位名夀之皆極則人事至矣天命申矣行父母之遺體敢不敬乎則敬親之至莫如徳為聖人尊為天子之大也以天下養養之至也則養親之至莫如富有四海之内之盛也積厚者流澤廣積薄者流澤狹則繼親之至莫如宗廟饗之子孫保之久也舜之徳大矣故尊為天子所謂必得其位富有四海之内所謂必得其禄徳為聖人所謂必得其名宗廟饗之子孫保之則福禄之盛享夀考而無疑也所謂必得其夀天之於萬物其所以為吉㐫之報莫非因其所自取也植之固者如雨露之養則其末必盛茂植之不固者震風淩雨則其本先撥至於人事則得道者多助失道者寡助是皆因其材而篤焉栽者培之傾者覆之也古君子既有憲憲之令徳而又有宜民宜人之大功此宜受天禄矣故天保佑之申之以受天命此大徳所以必受命是亦栽者培之之義與又曰命雖不易唯至誠不息亦足以移之此大徳所以必受命君子所以有性焉不謂命也建安游氏曰中庸以人倫為主故以孝徳言之雖外物不可必要不害其有必得之理也延平楊氏曰聖人之徳無加於孝故稱舜之徳以大孝言之夫天之生物必因其材而篤焉此理之固然也然其日夜之所息雨露之所潤與夫人事之盡其力無不齊也而有所不同者地有肥磽也古之聖人之在上豈獨舜而已哉而禄位名夀之必得獨惟舜為然盖舜猶之生得其地也當堯之時上有好賢之誠心下無蔽賢之私黨雖商均之不肖宜若宗廟弗饗子孫不能保也而又有禹以繼其後此禄位名夀所以皆必得也若孔子之厄窮則異於是矣當衰周之時猶之生非其地也雖其雨露之滋而牛羊斧斤相尋於其上則其濯濯然也豈足怪哉然顔蹠之夭夀不齊何也老子曰死而不亡夀也顔雖夭其不亡者猶在也非夫知性知天者其孰能識之河東侯氏曰易曰大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎鬼神之為徳誠而已前曰㣲之顯誠之不可揜而繼之以舜其大孝也與舜匹夫也而有天下尊為天子富有四海之内以天下養宗廟饗之子孫保之孝之大也此所謂必得者先天而天弗違也孔子亦匹夫也亦徳為聖人也而不得者後天而奉天時也必得者理之常也不得者非常也得其常者舜也不得其常者孔子也舜之必得而為舜之事功舜之中庸也孔子不得而為孔子之事業孔子之中庸也與四時合其序與鬼神合其吉凶者也然而天之生物必因其材而篤焉栽者培之傾者覆之如孔子者培之邪覆之邪何其窮也曰培之覆之非謂如孔子者也孔子徳為聖人其名與禄夀孰禦固已培之矣孟子所謂天爵者也何歉於人爵哉詩曰嘉樂君子憲憲令徳宜民宜人受禄于天保佑命之自天申之天非特私於聖人也保佑其命申順其理而已天且弗違是也聖人何與焉舜自匹夫而有天下栽者培之也桀自天子而為匹夫傾者覆之也天非為舜桀而存亡之也理固然也故曰大徳必受命必言其可必也新安朱氏曰此第十七章子孫謂虞思陳胡公之屬舜年百有十嵗材質也氣至而滋息為培氣反而游散則覆假當依此作嘉憲當依詩作顯申重也受命者受天命為天子也此章由庸行之常推之以極其至見道之用廣也而其所以然者則為體㣲矣後二章亦此意又曰程子張子吕氏之説備矣楊氏所辨孔子不受命之意則亦程子所謂非常理者盡之而侯氏所推以為舜得其常而孔子不得其常者尤明白也至於顔蹠夀夭之不齊則亦不得其常而已楊氏乃忘其所以論孔子之意而更援老耼之言以為顔子雖夭而不亡者存則反為衍説而非吾儒之所宜言矣且其所謂不亡者果何物哉若曰天命之性則是古今聖愚公共之物而非顔子所能專若曰氣散而其精神魂魄猶有存者則是物而不化之意猶有滯於冥漠之間尤非所以語顔子也侯氏所謂孔子不得其常者善矣然又以為天於孔子固已培之則不免有自相矛盾處盖徳為聖人者固孔子之所以為栽者也至於禄也位也夀也則天之所當以培乎孔子者而以適丁氣數之衰是以雖欲培之而有所不能及爾是亦所謂不得其常者何暇復為異説以汨之哉延平周氏曰傳曰父子之道天性也舜之大孝言天性也有天性所以致天徳故曰徳為聖人有天徳所以獲天位故曰尊為天子有天位所以享天禄故曰富有四海有天位有天禄則天祚之所以傳故曰宗廟饗之子孫保之海陵胡氏曰子孫保之者武王下車而封舜之後胡公滿于陳是子孫長保其福禄也尊為天子是必得其位也竭天下之産以奉一人是必得其禄也萬世而下言帝王者必稱堯舜是必得其名也舜年三十而登庸在位五十載陟方乃死是必得其夀也宜民者興庠序務農桑使男不釋耒女不廢機薄賦斂節用度若此之類是宜民也宜人者内朝廷外方國自宰輔以至於百執事自方伯連率以至于邑宰里長官皆得其人人皆稱其職若此之類是宜人也嚴陵方氏曰舜不傳于子而傳於賢乃曰子孫保之何哉盖聖人則以天下為一家中國為一人也舜為法於天下可傳於後世乃天下之所饗萬民之所保宗廟饗之子孫保之孰大於是范陽張氏曰天之生萬物初無容心也因其材而成之耳如鸞凰為瑞物自取尊榮鴟鴞為妖祥自取彈射楩楠自取棟梁蒲栁自取煙爨夫亦因其材而成之耳栽者本根深固自取培益傾者本根摇蕩自取顛覆亦豈有心哉是以知大徳者自取名位禄夀而無徳者自取貧賤刑戮也此所以勉天下之為徳者而論者曰孔子大聖人而名位禄不著顔子大賢而夀亦不聞斯言豈欺我哉曰大徳受命天下之正理也至於孔顔非可以為常也江陵項氏曰上四章已極言用力之隐故自此以下三章皆言道之功用以明其費獨以舜武王周公言之者皆處人道之變可以見聖人之功用也舜居側㣲父母欲殺之本無得位得禄得名得夀之理文王事商而武王以兵取之武王與子而周公以臣代之皆處危疑之地而舜卒受命天不能窮也武王卒不失顯名人不能訾也周公闡幽明之情極古今之變為武王立八百年之紀綱制度使在天之靈慰喜而無憾萬世之下祖述而無以踰也此皆功用之至難而極盛者也然而用力之初則甚隐矣故皆以孝言之孝者仁心之所發也天下之實者莫加焉於武王周公之事獨言喪祭亦此意也知至於舜謂之大知行至於舜謂之大孝舜為人道之極萬世仰之不可加也周為王制之備萬世由之不可易也此盖古之盡倫盡制者故舉之以為訓也宜民以在下者言之宜人則尊卑逺近無不􅊶也又舉文王之無憂者明舜與武王周公所居之地皆不若文王之易於以見獨舉舜武王周公之意也建安真氏曰舜以聖人之徳居天子之位其福禄上及於宗廟而下延於子孫此所以為大孝也然舜所知者孝而已若禄位名夀則天實命之非舜有心於得之也孔子以天之眷舜如此因言天之生物必因其材質而加厚焉其本固者雨露得以滋培之其本傾者風霜得以顛覆之其培之也非恩之也其覆之也非害之也咸其自取焉耳又引詩以明之以見大徳者之必受命知舜徳為聖人尊為天子宗廟饗之子孫保之然後為大孝則夏商後王不敬厥徳而至於覆宗絶祀者其為不孝可知晉陵錢氏曰物有栽植者遇雨露則培益有傾欹者遇風雨則覆敗嘉樂今詩作假樂假大也憲憲作顯顯申加美也詩言大樂此君子有顯顯之令徳宜民人而受禄矣又有保佑而命之者誰乎乃自天而加美之也永嘉薛氏曰舜之受命所謂與天地合其徳者原其宗本不過充事親之孝天因材而篤之耳栽培傾覆皆天道之當然者舜何與焉達天之徳而不能得天者未之有也而況于邇者乎四明宣氏曰大孝惟於舜見之書與孟子論舜之孝皆言孝之始中庸論舜之孝則言孝之終盖書與孟子指其事親之實中庸則發明其用功之大又曰夫天人之應至難言也而聖賢常若有可必之論曰積善之家必有餘慶積不善之家必有餘殃今曰大徳而謂之必得其位必得其禄必得其名與夀聖賢何若是為必然之論而亦豈能盡取必於天哉或者以有其不可必也故為之説曰至貴在我所謂必得其位至富在我所謂必得其禄至善在我所謂必得其名生生在我所謂必得其夀則亦以其不可必也故為之自反之説云耳夫所可必者理也所不可必者命也由聲色臭味之欲以至於四肢之安佚孟子皆曰有命焉至於夭夀不貳修身以俟之亦曰所以立命也是知言天下之理者常有必然之論而言天下之命者則不敢有取必之説故進乎徳者聖人之事也名位禄夀者非聖人之所得與也雖然天道之可必亦惟人心之可必也謳歌之所歸從者如歸市非有大徳者不能至是至於期之以萬年頌之以福禄申之以令聞名位禄夀凡有是徳者皆人心之所共祝人心之可必即天理之可必也天人之際又當以是觀之又曰天命之於人猶其於天下之物也均是物也而生之有不同天豈或私於其物哉均是人也而命之有不同天豈或私於其人哉地有肥磽人事有不齊而雨露潤澤之功有得其養有不得其養皆因其材而篤之之謂也惟人亦然名位禄夀因其有是徳而畀之無是徳者不及也假樂之詩以為假樂君子顯顯令徳又有宜民宜人之功則受禄于天保佑命之自天申之夫申之者非有心於命之因以申之而已書曰天其申命用休所謂栽者培之傾者覆之之謂也然則大徳者必受命觀假樂之詩益知取必於天者皆可取必於人者也雖然素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難在我固無入而不自得也奚必區區計福禄於其後而取必於其在彼者哉盖盡其在我者聖人之徳也必其在彼者中庸所以示行險僥倖之戒也蔡氏曰自此至治國其如示諸掌言國治天下平之事舜性之者也故曰大孝大孝者不違乎天武王周公反之者也故曰逹孝逹孝者不違乎人天人之難格人鬼之難享聖人莫不各極其感應之妙子思舉此以明顯而為天下國家者宜無有毫釐之不平且治也故前以鬼神為徳之盛者起義而復以明郊社禘嘗之義者結之也又曰自君子之道費而隐至其如示諸掌乎言達道之事首言夫婦次言君子之道四者達道所事之自也自物格以至天下平者逹道所施之序也聖人之中庸本一貫也由教而言不分内外體用則節目不明故有達徳達道之分學者於此又當有以深察其融㑹貫通之義庻㡬中庸之至可得而能也又曰大孝大徳大道皆以天道而為言達孝達徳達道皆以人道而為言禮記集説卷一百二十八
