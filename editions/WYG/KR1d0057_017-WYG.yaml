body:
  text: 禮記集說卷十七宋衛湜撰伯髙之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯髙鄭氏曰伯髙死時在衛未聞何國人使者謂賻賵者冉子孔子弟子冉有攝猶貸也徒猶空也禮所以副忠信也孔氏曰此一節論禮所以副忠信之事冉子見孔子使人未至貸之以束帛乘馬而行禮非孔子本意也孔子聞之故云異哉空使我不得誠信行禮於伯髙若孔子重遣人更弔即彌為不可也唐陸氏曰四馬曰乘長樂陳氏曰禮以誠為本誠以禮為文無本不立無文不行冉求足於藝而不足於禮足於藝則知文不足於禮則不知本此所以攝束帛乘馬而擅行之也觀其益子華之粟謀顓㬰之伐則其所擅行者豈特此哉是皆不足於禮之過也孔子曰冉求之藝文之以禮樂亦可以為成人矣嚴陵方氏曰將之為言送也夫物所以將誠而已誠苟不至物將安用以冉氏之物而欲將孔子之誠其可得乎此孔子所以言徒使我不誠於伯髙也江陵項氏曰攝代也孔氏之賻賵未至冉有為之代出束帛乘馬也冉子蓋厚於恩而不講於禮者如以其家粟五秉與子華之母亦此意也本其長於治財而又樂施故於師友如此而夫子皆以禮折之以為此亂信而繼富也伯髙死於衛赴於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野於野則已䟽於寢則已重夫由賜也見我吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯髙而來者勿拜也鄭氏曰赴告也凡有舊恩者則使人告之孔子曰吾惡乎哭以其交㑹尚新也哭兄弟父友不同處别親䟽也哭師友所知不同處别輕重也已猶太也哭於子貢寢門之外本於恩也命子貢為主明恩所由也知伯髙者勿拜異於正主孔氏曰此一節論親䟽所哭之處兄弟親父友䟽兄弟是先祖子孫故哭諸廟父之友與父同志故哭諸廟門外師友為重所知為輕所以哭師於寢夫子旣命子貢為主又敎子貢拜與不拜之法若與汝相知之人為爾哭伯髙之故而來弔爾者則爾拜之若與伯髙相知而來者則勿拜也凡喪之正主知生知死來者悉拜今與伯髙相知而來不拜故鄭云異於正主長樂陳氏曰禮生於人情之所安義起於禮之所未有君子制義以稱情隆禮以循義則先王於禮之所未有者皆可適於人情而制之也伯髙之死孔子疑其所哭故謂兄弟者父祖之遺體則哭於廟父之同志則於廟門之外師成我者也故於寢朋友輔我者也故於寢門之外所知知我者也故於野伯髙之於我以情則非所知以分則非師友其見我也由賜而已故哭諸賜氏盖為子貢而來知生者也為伯髙而來知死者也知生者弔而不傷則來者禮也故拜之知死者傷而不弔則來者非禮也故勿拜之哭於賜氏義也敎子貢之拜不拜禮也嚴陵方氏曰凡有赴者必疾趨之告喪不可緩也故亦謂之赴聞訃者必哭然有親䟽輕重之别焉故哭之各有所也伯髙之於孔子非特所知而已故於野則已䟽而太逺又非朋友之分焉故於寢則已重而太隆然由子貢而見孔子故哭諸子貢之家且使之為主焉以明恩之有所由也所謂賜氏蓋言子貢之家也有國則有家有家則有氏猶之孟子言不得已而之景丑氏宿焉馬氏曰寢所以安身而所哭必成已之徳乃可以哭諸寢在寢則私之者也故不敢哭諸廟其死則心喪而已至於所知又非朋友之比志不必同方道不必同術故有相趨者有相揖者有相問者有相見者凡此皆泛愛以交之者也故哭諸野君子行禮其審詳於哭泣之位如此者是其所以表微者歟山隂陸氏曰禮哭師於廟門外而孔子曰師吾哭諸寢至是師少隆矣蓋君不知所以敎而後師之報禮重故子貢請喪夫子若喪父而無服然則心喪三年記孔子以後之禮曾子曰喪有疾食肉飲酒必有草木之滋焉以為薑桂之謂也鄭氏曰草木之滋謂增以香味為其疾不嗜食也薑桂之謂蓋記者正曾子所云草木滋者謂薑桂孔氏曰此一節論居喪有疾得食美味之事嚴陵方氏曰薑者草之滋桂者木之滋酒肉之外又有草木之滋者亦慮其不勝喪而已子夏喪其子而喪其明曾子弔之曰吾聞之也朋友喪明則哭之曾子哭子夏亦哭曰天乎予之無罪也曾子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也而曰女何無罪與子夏投其杖而拜曰吾過矣吾過矣吾離羣而索居亦已久矣鄭氏曰明目精也曾子哭痛之也子夏亦哭曰天乎怨天罰無罪也事夫子於洙泗言其有師也洙泗魯二水名西河龍門至華隂之地也爾罪一言其不稱師罪二言居親喪無異稱罪三言隆於妻子也吾過矣謝之且服罪也羣謂同門朋友也索猶散也孔氏曰此一節論子夏恩隆於子之事曾子為喪明往弔故曾子先哭子夏始哭云疑女於夫子者旣不稱其師自為談說辨慧聦睿絶異於人使西河之民疑女道徳與夫子相似也横渠張氏曰子夏喪明必是親喪之時尚强壯其子之喪氣漸衰故喪明然曾子之責安得辭也疑女於夫子者子夏不推尊夫子使人疑夫子無以異於子夏非如曾子推尊夫子使人知尊聖人也馬氏曰昔孔子固嘗以子夏之才為不及矣然則執親喪而能引之至於禮夫子稱之曾子反責其未有聞者何耶李氏曰子夏得聖人之一體而未得其全故行有不合於聖人之道則人將疑夫子之道於子夏人之疑聖人子夏之過也故曰使西河之民疑女於夫子非謂疑子夏若夫子為子夏之過也廣安游氏曰古之人所以多君子者以敎法之備而内外交修之也其居室則父兄敎之其居學則師敎之而平居則朋友敎之惟其敎之備也故其人寡過而徳易以成曾子之責子夏稱其名女其人若父師焉曾子不以為嫌子夏安受其責蓋曾子正已以律人愛人以徳而不以姑息君子之道固如此也後世處父兄師長之位已不能敎其子弟朋友之間相䛕以色辭相安以姑息非復古人之道矣夫晝居於内問其疾可也夜居於外弔之可也是故君子非有大故不宿於外非致齊也非疾也不晝夜居於内鄭氏曰晝居内似有疾夜居外似有喪大故謂喪憂也内正寢之中孔氏曰此一節論君子居處當合於禮鄭云喪兼云憂者周禮每云國有大故皆據寇戎災禍故云憂也外謂中門外也斬衰及期喪皆中門外為廬是有喪居門外也旣憂禍難夜則在外圖謀亦不暇入内也非致齊非疾謂平常無事之時晝或入内夜或出外唯致齊與疾無問晝夜恒居於内也嚴陵方氏曰晝為陽夜為隂君子順陽而動故晝出而接物於外順隂而靜故夜入而安身於内此禮之常也晝雖居於外然有時而居内者則以齊疾而已蓋齊疾則致愼而於物不敢接故也夜雖居於内然有時而居於外者則以大故而已蓋大故則致憂而身不敢安故也廣安游氏曰古之君子未有不從事乎其常者也車服有常數作止有常度出處有常所苟變乎其常則必有故不然則不安乎流俗而為異者也故古之人見其服飾而長少可知見其歩武而尊卑可知察其人之居處則人之得失可知皆由乎常而觀之也李氏曰春秋傳曰君子朝以聽政晝以訪問夕以修令夜以安身夜宿於外非所以入燕息也晝居於内非所以自强不息也髙子臯之執親之喪也泣血三年未嘗見齒君子以為難鄭氏曰子臯孔子弟子名柴泣血言泣無聲如血出未嘗見齒言笑之㣲君子以為難言人不能然也孔氏曰此一節論髙柴居喪過禮之事凡人涕淚必因悲聲而出若血出則不由聲也今子臯悲無聲其涕亦出如血之出故云泣血也凡大笑則露齒本中笑則露齒微笑則不見齒旣云泣血三年得有微笑者凡人之情有哀有樂發聲始涕出樂至為大笑今髙柴哀至泣血樂至微笑恒能如此餘人不能故為難也嚴陵方氏曰君子於此固不以為是然亦不可以為非特以為難而已經於喪有曰居有曰執有曰為何也蓋以身言之則曰居以禮言之則曰執以事言之則曰為合而言之其實一也衰與其不當物也寧無衰齊衰不以邊坐大功不以服勤鄭氏曰不當物謂精粗廣狹不應法制邊坐服勤謂䙝喪服邊偏倚也孔氏曰此一節論衰裳升數形制必須依禮及著服不得為䙝之事衰不當物此語通於五服衰喪服也當猶應也喪服冝敬坐起必正不可著衰而偏倚也言齊衰則斬衰可知大功雖輕然亦不可著衰服為勤勞之事也言大功則齊衰固不可而小功可也黄氏曰為人服齊衰而心貌無哀戚之實其云寧無衰者謂若人但謹服衰而心貌忻悅者寧如不服喪禮之謂也蓋言物者為哀戚心貌之實也何以驗之左傳載晉平公有卿佐之喪而奏樂飲宴膳夫屠蒯入諫罰其嬖叔曰汝為君目將司明也服以將禮禮以行事事有其物物有其容今君之容非其物也而汝不見是不明也以此驗之物者心貌之實以稱其服若介冑則有不可犯之色之類也蓋哀戚者喪禮之實也齊衰制度者外飾之容也若但有制度法則於身而亡哀戚豈得合禮而為孝哉餘義馬氏曰衰不當物則亂先王之制而後世疑其傳無衰則禮雖不行而其制度定於一猶可以識之故曰衰與其不當物也寧無衰然則子貢欲去告朔之餼羊而孔子愛之豈衰之制不足愛歟蓋亂之則不若無無之則不若存如此而後世不敢廢先王之禮而其所傳者亦可舉也山隂陸氏曰物若周書所謂朝服八十物七十物是已據此布之精粗非獨升數不同縷數亦不同矣尊者物精卑者物粗故曰與其不當物也寧無衰横渠張氏曰齊衰不以邊坐有喪者專席而坐也孔子之衛遇舊館人之喪入而哭之哀出使子貢說驂而賻之子貢曰於門人之喪未有所說驂說驂於舊館無乃已重乎夫子曰予鄉者入而哭之遇於一哀而出涕予惡夫涕之無從也小子行之鄭氏曰舊館人前日君所使舎己也賻助喪用也騑馬曰驂子貢言說驂太重比於門人恩為偏頗也遇見也夫子謂舊館人恩雖輕我入哭見主人為我盡一哀是以厚恩待我我為出涕恩重冝有施惠客行無他物可以易之者使遂以往孔氏曰此一節論孔子欲示人行禮副忠信之事若是舊所經過主人當云遇舊主人之喪今云館人明置館舎於己者說文云驂旁馬也在服馬之旁王度記云天子駕六馬諸侯四大夫三士二古毛詩云天子至大夫皆駕四孔子旣為大夫若依王度記則有一驂馬若依毛詩說則有二驂馬子貢不欲說驂夫子謂旣為出涕豈得虚然汝小子但將驂馬以行之副此涕淚也然顔囘死子哭之慟比出涕為甚矣又舊館之恩不得以比顔囘者但舊館情䟽厚恩待我須有賵賻顏囘則師徒之恩乃是常事顏路無厭更請賣車為椁故夫子抑之横渠張氏曰夫子於舊館人之喪遇主人哀而出涕於司徒敬子之喪主人不哀而哭不盡聲哭死而視生者何也必是於死者情薄於生者情厚故爲生者哭也哭固有勉強者喪事不敢不勉哀甚不賻則幾於吝此夫子稱情之事可以爲後世法嚴陵方氏曰車馬曰賵貨財曰賻此以馬而曰賻者以馬代貨故也孔子在衛有送葬者而夫子觀之曰善哉爲喪乎足以爲法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑子貢曰豈若速反而虞乎子曰小子識之我未之能行也鄭氏曰慕謂小兒隨父母啼呼疑者哀親之在彼如不欲還然速疾也夫子自言未之能行蓋謂哀戚本也祭祀末也孔氏曰此一節論喪禮以哀戚爲本之事父母在前嬰兒在後恐不及之故常啼呼而隨之今親喪在前孝子在後亦恐不及故如嬰兒之慕也凡人意有所疑則傍徨不進今孝子哀親在外不知神之來否故如不欲還然子貢之意葬旣已竟神靈須安豈如速反虞祭安神乎但哀親在彼是痛切之本情反而安神是祭祀之末禮故夫子不許山隂陸氏曰我未之能行也此與女安則爲之略相類而辭意差婉廬陵胡氏曰小子識之我未之能行也善其哀慕虞祭雖遲不害顏淵之喪饋祥肉孔子出受之入彈琴而后食之鄭氏曰饋遺也彈琴以散哀也河南程氏曰受祥肉彈琴殆非聖人舉動使其哀未忘則子於是日哭則不歌不飲酒食肉以全哀況彈琴乎使其哀已忘則何必彈琴嚴陵方氏曰吉之先見謂之祥祥必有祭祭必有肉饋祥肉則所以獻其吉也受之必彈琴則所以散其哀也長樂陳氏曰儀禮曰薦此嘗事又朞而大祥又曰薦此嘗事祥祭而饋則鬼事畢而人事始矣顔淵之喪饋祥肉孔子出受之仁也必彈琴而後食之義也禮之道無他節文仁義而已矣孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左鄭氏曰二三子亦尚右傚孔子也嗜貪也尚左復正也喪尚右右隂也吉尚左左陽也孔氏曰此一節論拱手之禮横渠張氏曰孔子與門人立拱而尚右是义手以右手在上也以其姊之喪必如此者見俄頃不忘也以是知聖人之能敬二三子學之者恐此禮非三代所有直孔子自為之耳如喪出母亦夫子自制山隂陸氏曰言二三子纎悉務學聖人如此蓋有不應學而學之者未有應學而不學者也李氏曰子曰由之瑟奚爲於丘之門門人不敬子路則門人之於道固有未知者也蓋聖人之於人雖未知道而能從所好惡雖陋於禮而能嗜學斯受之而已矣孔子蚤作負手曳杖消摇於門歌曰泰山其頽乎梁木其壞乎哲人其萎乎旣歌而入當户而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也予疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗予予殆將死也蓋寢疾七日而沒鄭氏曰作起也曳杖消搖欲人怪己也泰山衆山所仰梁木衆木所放哲人亦衆人所仰放也以上二句喻之萎病也詩云無木不萎當户而坐急見人也子貢覺孔子歌意殆幾也言賜來何遲蓋坐則望之也又以三王之禮占已夢疇發聲也昔猶前也夢坐兩楹之間而見饋食言奠者以為凶象兩楹之間南面嚮明人君聽治正坐之處孰誰也宗尊也今無明王誰能尊我以為人君乎是我殷家奠殯之象以此自知將死七日而没明聖人知命也孔氏曰此一節論孔子自說死之意狀反手卻後以曳其杖消摇放蕩以自寛縱皆是特異尋常鄭註梁木衆木所放者衆木榱桷之屬依放横梁乃能存立放則依也東階西階平生賔主所行禮之處夏后氏殯於東階則猶在阼以為主也周人殯於西階則猶以為賔客也故皆曰猶禮以為賔主敵者授受於兩楹之間兩楹又是南面聽朝之處夫子夢在兩楹而見饋食知是凶象無有聽朝之事不得云則猶尊之以有賔主二事故云與賔主夾之而已時夫子夢見饋食不夢凶奠也但奠禮既死未葬柩仍在地未立尸主唯奠停飲食故云奠也案莊子聖人無夢莊子意在無為不有思慮聖人雖異人者神明同人者五情五情既同焉得無夢故文王有九齡之夢武王有夢協之言長樂黄氏曰孰能宗予但言無人尊己之道註言尊為人君既失之曳杖消摇鄭註又以為欲人怪己孔疏亦以為寛縱自放皆非所以言聖人曳杖消摇蓋其既病之餘閒適之際德容如是猶所謂逞顔色申申夭夭之類初非寛縱之謂若謂將死而不以禮自持則是不以正而斃非所以示訓也長樂陳氏曰聖人知夫身者天地之委形生者天地之委和性命者天命之委順故視肝膽為楚越以死生為晝夜安其適來之時處其適去之順將迎無所形於外哀樂不能間於内又孰以幻滅為累哉此所以悟於將死之夢至於負手之忘形曳杖之忘物消摇於自得之塲以與天為徒也然安得恝然忘物而吉凶不與之同乎此所以有泰山梁木哲人之嗟以與人為徒也蓋泰山以譬德梁木以譬材若草木而將萎也故曰其萎乎山隂陸氏曰逍遥能消釋摇曳泰山其頽乎天也梁木其壞乎人也或言仰或言放非有優劣也而放之辭親若夢得說吾不復夢見周公非無徴也蓋聖人之夢如此疇昔猶言誰昔也爾雅曰誰昔昔也廬陵胡氏曰黄幾復曰消者如陽動而冰消雖耗也而不竭其本摇者如舟行而水摇雖動也而不傷其内傷時無明王而道不行以死也孰能宗予謂孰能宗師其道鄭云兩楹之間南面人君之位謂誰能尊我以為君乎噫夫子嘗云無臣而為有臣吾誰欺欺天乎又豈肯自謂尊我以為君也鄭非嚴陵方氏曰夏后氏殯於東階之上者示不忍賔之爾故曰則猶在阼也殷人殯於兩楹之間若將賔之矣故曰則與賔主夾之也周人殯於西階之上者則若賔之矣故曰則猶賔之也凡此以其世漸文而殯死之所愈逺而已然孔子夢坐奠於兩楹之間乃知其將死者以殷人則冝享殷禮故也孔子之喪門人疑所服子貢曰昔者夫子之喪顏淵若喪子而無服喪子路亦然請喪夫子若喪父而無服鄭氏曰以無喪師之禮故疑所服喪父而無服謂不為衰也弔服而加麻心喪三年也孔氏曰此一節論弟子為師喪制之禮喪師無服然夫子聖人與凡師不等當特加喪禮故疑所服也案喪服朋友麻知師亦加麻也麻謂絰與帶皆用麻既葬除之嚴陵方氏曰方孔子之生也以子之喪處門人及其没也門人以父之喪處孔子此報施之禮也學記曰師無當於五服五服弗得不親則師之於人豈小補哉故子貢於三年之外又築室於塲獨居三年然後歸以恩尤所重故也噫世衰道微禮教不明乎天下其執親之喪不能三年者蓋有之矣而況於師乎廬陵胡氏曰師友服皆弔服加麻謂服緦之絰帶以麻為之既葬除之孔子之喪公西赤為志焉飾棺牆置翣設披周也設崇殷也綢綀設旐夏也鄭氏曰公西赤孔子弟子字子華志謂章識牆之障柩猶垣牆障家牆柳衣也翣以布衣木如襵與夫子雖殷人兼用三王之禮尊之披柩行夾引棺者崇牙旌旗飾也綢練以練綢旌之杠此旌葬乗車所建也旌之旒緇布廣充幅長尋曰旐爾雅說旌旗曰素錦綢杠孔氏曰此一節論孔子之喪送葬用三王之禮公西赤以飾棺榮夫子故為盛禮備三王之法以章明志識焉於是以素為褚褚外加牆車邊置翣恐柩車傾虧而以繩左右維持之此皆周之法也其送葬乗車所建旌旗刻繒為崇牙之飾此則殷法又韜盛旌旗之竿以素錦於杠首設長尋之旐此則夏禮也既尊崇夫子故兼用三代之飾也鄭註障柩之牆即柳也外旁帷荒中央材木緫而言之皆謂之為柳縫人註云柳聚也諸飾所聚也翣以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫雲氣柄長五尺如扇漢謂扇為襵也知此旌乗車所建者案既夕禮陳車門内右北面乗車載旜道車載朝服槀車載蓑笠故知此旌乗車所建也凡送葬之旌經文不具案既夕士禮有二旌一是銘旌初死書名於上曰某氏某之柩葬則入壙二是乗車之旌則既夕禮乗車載旜亦在柩前至柩入壙乃斂乗車所載之旌載於柩車而還言送形而徃迎精而反也其大夫諸侯則無文其天子亦有銘旌司常云共銘旌又云建廞車之旌廞謂興作之則明器之車也其旌即明器之旌至壙從明器納之壙中又士禮既有乗車載旜則天子亦當有乗車載大常至壙亦載之而歸但禮文不具耳是天子三旌也熊氏曰大夫以上有遣車即有廞旌亦有三旌也長樂陳氏曰顏淵之死門人欲厚葬之孔子以為不可子疾病子路使門人為臣孔子以為欺天門人之葬孔子則飾牆置翣以至周披殷崇夏旐而三代之禮莫不兼用豈孔子之心乎蓋門人以孔子有所不可及之道故報之以人所不可行之禮是雖禮兼於三代蓋亦稱情以為文而已故子貢六年於其墓孟子不以為非門人三代之厚葬君子不以為過嚴陵方氏曰志記也書其禮而記之山隂陸氏曰飾棺勾蓋曰牆置翣設披周也據周人牆置翣後王彌文廬陵胡氏曰鄭云夫子兼用三代之禮非也生不肯為素王門人豈肯用三王之禮哉或云用三代大夫之禮耳喪大記國君纁披六崇牙也殷湯以武興旌旗之旁常刻繒為崇牙子張之喪公明儀為志焉褚幕丹質蟻結于四隅殷士也鄭氏曰志與前同以丹布幕為褚葬覆捾不牆不翣畫褚之四角其文如蟻行往來相交錯蟻蚍蜉也殷之蟻結似今蛇文畫子張學於孔子傚殷禮孔氏曰此一節論孔子弟子送葬車飾學孔子行殷禮之事公明儀子張弟子亦為曽子弟子故祭義公明儀問於曽子褚謂覆棺之物大夫以上其形似幄士則無褚今公明儀尊敬其師故特為褚但似幕形而以丹質之布為之也所以不牆不翣者用殷禮也畫蟻者殷士葬之飾也夫子聖人雖行殷禮弟子尊之故葬兼三代之禮今公明儀雖尊其師祇用殷法不牆不翣特加褚幕而已長樂陳氏曰子張之喪門人公明儀為志不牆不翣畫褚以蟻而葬之以殷士之禮何也殷禮質周禮文質則厚文則薄子張之時既甚文矣故門人從質以救其弊此易小過用過乎儉孔子欲從先進之意也記曰掘中霤而浴毁竈以綴足及葬毁宗躐行殷道也學者行之則喪禮從殷孔門之所尚也公西華之喪孔子則異於此者蓋厚孔子所以尊道儉子張所以趨時山隂陸氏曰據此周之士素錦褚可知後王彌文若以為葦席以為屋而已不應如是之陋也先儒謂以丹質之布為之蓋謂之丹質則畫布以丹質為地李氏曰有君臣上下相生養者蟻也唯其所知所能不大而已矣莊子曰於蟻棄智於羊去意於魚得計言智周萬物而無所逆也退藏於深渺而已君魚躍拂池士則去魚而畫蟻於禇蓋葬者所以幽隂之也畫蟻以去其智魚躍拂池以象其計也子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕干不仕弗與共天下也遇諸市朝不反兵而鬭曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬭曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後鄭氏曰居父母之仇雖除喪居處猶若喪也干盾也弗與共天下不可以並生也不反兵謂雖適市朝不釋兵也昆弟之仇銜君命則不鬭為負而廢君命也不為魁魁猶首也天文北斗魁為首杓為末執兵陪其後為其負當成之孔氏曰此一節論親疏報仇之法不反兵而鬭者身常帶兵雖在市朝不待反還取兵而鬬也然朝在公門之内兵器不入今得持兵者但有公事之處皆謂之朝耳曲禮云兄弟之仇不反兵此父母之仇云不反兵者父母與兄弟之仇皆不反兵也此兄弟之仇據身仕為君命出使而不鬬二文相互乃足從父昆弟既不為報仇魁首若主人能自報之則執兵陪助其後也鄭註云負猶不勝也為其鬬而不勝嚴陵方氏曰寢苫則常以喪禮自處枕干則常以戎事自防不仕則不暇事人而事事也弗與共天下則與不共戴天同義市朝非戰鬬之處遇諸市朝猶不反兵而鬬則無所往而不執兵矣由其恩之至重故報仇之義如此仕弗與共國則雖事人而事事亦恥與之相過也銜君命而使過之不鬭則不敢以私仇妨公事由其恩殺於父母曲禮言交遊之仇而不及從父昆弟此言從父昆弟之仇而不及交遊者蓋交遊之仇猶不同國則從父昆弟可知矣於從父昆弟且不為魁則於交遊不為魁可知其言互相備也餘見曲禮廬陵胡氏曰遇諸市朝不反兵而鬭言常以兵刃向前志在復仇之切孔子之喪二三子皆絰而出羣居則絰出則否鄭氏曰尊師也出謂有所之適然則凡弔服加麻者出則變服羣謂七十二弟子相為朋友服子夏曰吾離羣而索居横渠張氏曰羣居則絰出則否喪常師之禮也絰而出特厚於孔子也山隂陸氏曰二三子蓋謂七十子知師之深者也孔子之徒三千不在七十子之列羣者也其服孔子如此易墓非古也鄭氏曰易謂芟治草木不易者丘陵也孔氏曰此一節論墓内不合芟治之事墓謂冢旁之地不易者使有草木如丘陵然古者殷以前墓而不墳是不易治也子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也鄭氏曰喪主哀祭主敬孔氏曰此一節論喪主哀祭主敬之事喪禮有餘謂明器衣衾之屬多也祭禮有餘謂俎豆牲牢之屬多也曽子弔於負夏主人既祖填池推柩而反之降婦人而后行禮從者曰禮與曽子曰夫祖者且也且胡為其不可以反宿也從者又問諸子游曰禮與子游曰飯於牖下小斂於戶内大斂於阼殯於客位祖於庭葬於墓所以即逺也故喪事有進而無退曽子聞之曰多矣乎予出祖者鄭氏曰負夏衞地祖謂移柩車去載處為行始也填池當為奠徹聲之誤也奠徹謂徹遣奠設祖奠也推柩而反於載處榮曽子弔欲更始也禮既祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之而又降婦人蓋欲矜賔於此婦人皆非也從者怪之曽子曰夫祖者且也且未定之辭此給説也孔氏曰此一節論負夏氏葬禮所失之事案既夕禮啓殯之後柩遷于祖重先奠從柩從升自西階正柩于兩楹間鄭註云是時柩北首設奠于柩西此奠謂啓殯之奠也質明徹去啓奠乃設遷祖之奠于柩西至日側乃郤下柩載于階間乘蜃車載訖降下遷祖之奠設于柩車西乃飾柩設披屬引徹去遷祖之奠遷柩嚮外而為行始謂之祖也婦人降即位于階間乃設祖奠于柩西至厥明徹祖奠又設遣奠于柩車之西然後徹之苞牲取下體以載之遂行此是啓殯之後至柩車出之節也曽子弔於負夏氏正當主人祖祭之明旦既徹祖奠之後設遣奠之時而來弔主人榮曽子之來乃徹去遣奠更設祖奠又推柩少退而返之嚮北案既夕禮既祖而婦人降以既祖柩車南出階間既空故婦人得降立階間今柩車反還階門故婦人辟之升堂至明旦婦人從堂更降而後乃行遣車之禮從曽子者意以為疑故問之曽子既見主人榮己不欲指其錯失為之隱諱云祖是行之始未是實行且去住二者皆得既得住何為不可以反宿明日乃去此不顧理以㨗給說於人也從者又疑遂問子游曽子聞子游之荅是自知己說之非故善服子游多猶勝也言子游所說出祖之事勝於我所說出祖也嚴陵方氏曰飯即含也以用米故謂之飯含亦兼用珠玉而此不言者止據士禮也斂以收斂其尸為義其禮見喪大記以衣衾之數有多少故有大小之名也殯以攅於外祖以祭於行葬以藏於野自飯至葬其所愈逺以義斷恩故有進而無退然負夏之喪既祖而填池矣以曽子之弔遂推柩而反之降婦人而後行禮此從者所以疑其非禮也夫祖固有且意以祭於行始方來有繼故爾而曽子遂以為可以反宿則非也降婦人而後行遣奠之禮固禮之常以其反柩而後降故為非爾自飯於牖下至葬於墓與坊記所言皆同山隂陸氏曰池殯坎也既祖則填之故曰主人既祖填池孔叢子曰埋柩謂之肂肂坎謂之池是也廬陵胡氏曰池以竹為之衣以青布喪行之飾所謂池視重霤是也填謂縣同魚以實之謂將行也鄭改填池為奠徹未詳金華應氏曰柩將出而復反婦人已入而復降從者所以疑也曽子雖給説以釋主人之過從者之心終有未安故又問諸子游聖門之徒氣象忠厚其議人之失婉而不迫但言有進無退而反柩行禮之非自見矣出祖謂主人也予者親之之辭多矣乎者言其委曲之過不欲深指其失也君子行禮惟其稱而已雖不可寡也亦豈可多乎夫子指魯人朝祥暮歌者曰又多乎哉亦未許之也曽子襲裘而弔子游裼裘而弔曽子指子游而示人曰夫夫也為習於禮者如之何其裼裘而弔也主人既小斂袒括髮子游趨而出襲裘帶絰而入曽子曰我過矣我過矣夫夫是也鄭氏曰曽子蓋知臨喪無飾夫夫猶言此丈夫也子游於時名為習禮故曽子疑之子游於主人變乃變曽子遂服是善子㳺言孔氏曰此一節論弔禮得失之事凡弔喪之禮主人未變之前弔者吉服謂羔裘𤣥冠緇衣素裳又袒去上服以露裼衣此裼裘而弔是也主人既變雖著朝服而加武以絰武吉冠卷也不改冠但加絰於武又掩其上服若朋友又加帶則此襲裘帶絰而入是也横渠張氏曰曽子子游同弔異服必是去有先後故不得同議各守所聞而往也子游非之曰知禮以仲尼觀之亦是五十歩笑百歩也子游亦儘有守文處如裼裘而弔必是守文也仲尼則通變不守定曽子襲裘而弔先進於禮樂也此一叚義正可疑曽子子游皆聖門之髙弟其分契與常人殊若使一人失禮必面相告豈有私指示於人而不告之也曽子有子言游輩一時行禮猶有不同蓋時已禮壊樂崩故至後世文獻不足尤難行也嚴陵方氏曰掩而襲衣謂之襲裘露而裼衣謂之裼裘以裘在二衣之内故皆曰裘也夫夫上為助語之詞下為丈夫之夫李氏曰忠告而善道之不亦可乎曰君子之相發豈一端而已子夏既除喪而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉鄭氏曰見謂見於孔子作起也二者雖情異善其俱順禮孔氏曰此一節論子夏子張居喪順禮之事案家語及詩傳皆言子夏喪畢夫子與琴援琴而絃衎衎而樂閔子騫喪畢夫子與琴援琴而絃切切而哀與此不同疑彼為正蓋子夏喪親無異聞子騫至孝孔子善之也嚴陵方氏曰四制曰祥之日鼓素琴示民有終也蓋先王之制禮如此故二子之除喪而見所以孔子各予之琴也山隂陸氏曰師也過商也不及今其除喪如此蓋學之之力也李氏曰此亦有以見師也過商也不及也先王之制禮正之以中而使有餘者不敢盡不及者不敢不勉要之不出於聖人之大閑而已子夏過者也不敢不約之以禮故曰不敢過也子張不及者也不敢不引而至於禮故曰不敢不至焉情之過者俯而就於禮情之不及者勉而至於禮皆不害其為中也由此則子夏過者也子張不及者也而子曰師也過商也不及蓋夫子之言其學道也唯其情之過故於學為不及唯其情之不及故於學為過廬陵胡氏曰孟獻子禫縣而不樂夫子善之又夫子既祥五日彈琴而不成聲則除喪如子夏可也禮記集説卷十七
