body:
  text: 禮記集說卷一百五十四宋衛湜撰冠義第四十三孔氏曰案鄭目録云名曰冠義者以其記冠禮成人之義此於别録屬吉事世本云黄帝造火食旃冕是冕起於黄帝也但黄帝以前則以羽皮為之冠黄帝以後乃用布帛其冠之年即天子諸侯十二故襄九年左傳云國君十五而生子冠而生子禮也又云一星終也十二年嵗星一終又文王十五而生武王尚有兄伯邑考又金縢云王與大夫盡弁時成王十五而已著弁旣己著弁則己冠矣是天子十二而冠與諸侯同又祭法云王下祭殤五若不早冠何因下祭五等之殤大夫冠年雖無文案䘮服大夫為昆弟之長殤大夫旣為昆弟之長殤則不二十始冠也其士則二十而冠曲禮云二十曰弱冠是也藍田呂氏曰冠昏射鄉燕聘天下之達禮也儀禮所載謂之禮者禮之經也禮記所載謂之義者訓其經之義也先王制禮其本出於君臣父子尊卑長幼之閒其詳見於儀章度數周旋曲折之際皆義理之所當然故禮之所尊尊其義也失其義陳其數祝史之事也知其義則雖先王未之有可以義起也不知其義則陷於非禮之禮非義之義大人弗為也凡冠昏射鄉燕聘義皆舉其經之節文以述其制作之意者也冠禮之設所以明長幼之義也古者自二十而冠自十九而下皆為童子凡為童子以事長者為之事也紒而不冠衣而不裳名而不字皆所以别成人敎遜弟也闕黨童子將命孔子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也孟子曰徐行後長者謂之弟疾行先長者謂之不弟夫堯舜之道孝弟而已然弟不弟在於徐行疾行之間皆所以飬童子之道不可不愼也冠禮一廢童子與先生並行恥弟於長者矣葢遜弟之節不謹於童稚之間及其成人則扞格不入此所以人材之難成教之所由廢也長樂陳氏曰二十而冠始學禮蓋男子者陽之類也而二十則為隂之數矣二十而冠者以隂而成乎陽猶之女隂類也而十五則陽之數矣十有五年而笄以陽而成乎隂隂陽之相成性命之相通也山隂陸氏曰二十曰弱冠則二十而冠禮之大節在是也唯天子諸侯十五而冠早成其徳先儒謂晉侯曰國君十五而生子冠而生子禮也君可以冠矣魯襄公是時年十二諸侯十二而冠誤矣葢曰可以冠則非禮之正也金縢王與大夫盡弁成王時年十五則冠在是嵗可知凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而后禮義備以正君臣親父子和長幼君臣正父子親長幼和而后禮義立故冠而后服備服備而后容體正顔色齊辭令順故曰冠者禮之始也鄭氏曰言人為禮以正容體齊顔色順辭令三者為始三始旣備乃可求以三行立猶成也服備而後容體正顔色齊辭令順言服未備者未可求以三始也童子之服采衣紒孔氏曰人之所以得異於禽獸者以其行禮義也藍田吕氏曰知崇禮卑崇效天卑法地故知禮者人之天地也未有天地不具而能有物者也此人之所以為人必在乎禮義也知生乎思思則得之故盡致思之功然後可以達乎高明禮主乎行行則致之故盡躬行之實然後可以極乎密察此禮義之始所以必在乎正容體齊顔色順辭令也容體者動乎四體之容者也顔色者生色見乎面目者也辭令者發乎語言而有章者也三者脩身之要必學而後成必成人而後備童子未成人者也於斯三者不可以不學故古之教子能食敎以右手能言敎唯與俞七年敎之男女不同席不共食八年教之出入門戸即席飲食必後長者十年學幼儀十三學舞射御則飬之有素矣飬之久則安安則成故至於二十則三者備矣然後可以冠而責成人之事矣君子之容舒遲見所尊者齊遫足容重手容恭目容端口容止聲容靜頭容直氣容肅立容徳此容體正歟衰絰則有哀色端冕則有敬色介胄則有不可辱之色根於心而生色睟然見於面此顔色齊歟長者不及無儳言毋勦說毋雷同必則古昔稱先王與君言言使臣與大夫言言事君與老者言言使子弟與幼者言言孝弟于父兄與衆言言忠信慈祥與居官者言言忠信此辭令順歟故唯備此三者然後可以明人倫人倫明然後禮義立而可以為成人成人然後可以有冠有裳而服備故冠禮者所以成人之禮禮之成人而行禮義自此始矣故曰冠者禮之始也嚴陵方氏曰禮猶體也而所以達義故曰凡人之所以為人者禮義也容體欲其可度故曰正顔色欲其可觀故曰齊辭令欲其可從故曰順正容體而至於容體正齊顔色而至於顔色齊順辭令而至於辭令順則禮義不特有始而已且備而無虧矣君臣存乎義故曰正父子存乎恩故曰親長幼存乎情故曰和正君臣而至於君臣正親父子而至於父子親和長幼而至於長幼和則禮義不特能備而已且立而有成矣有始而後能備能備而後能立固其序也夫冠昏所以謹其始於先喪祭所以謹其終於後則冠昏為喪祭之始也而冠又為昏之始故曰冠者禮之始也昏禮又曰禮之本何也葢言始以知其終言本以知其末夫冠對昏而言故可謂之始然以國家之禮謂之本可也故經曰重禮所以為國本昏對冠而言故可謂之本而不可謂之始然而夫婦之義謂之始亦可也故經又曰夫婦之義由此始馬氏曰正容體則斯逺暴慢矣齊顔色則斯近信矣順辭令斯逺鄙悖矣冠而後服備服備以徳成成徳以服彰故服其服者文以君子之容遂以君子之辭實以君子之徳所以稱其服也故曰冠而後服備服備而後容體正顔色齊辭令順山隂陸氏曰人者仁也禮以經之權之以義如斯而已正容體齊顔色順辭令五事一曰貌二曰言是已三始者雖非所以立也然闕一於此不得謂之備柯陵之會厲公視逺歩高晉郤犨見其語迃郤錡見其語犯卻至見其語伐單襄公曰吾見厲公之容而聽三郤之語矣殆必禍者也葢古之人於此以觀禍福如此則容體顔色辭令亦豈可忽哉石林葉氏曰義以為質禮以行之人之道也脩人道者亦必有漸故男子二十而冠冠之始也欲其容體正顔色齊辭令順而已及夫體正而不失足於人色齊而不失色於人辭順而不失口於人則人道備故言禮義備及夫君臣正而朝廷肅父子親而閨門定長幼和而宗族有禮則人道正矣故言禮義立錢塘于氏曰冠義一篇如首曰人之所以為人者在禮義中曰成人之道曰成人與為禮曰以成人見終曰責成人之禮曰責四者之行於人曰孝弟忠順之行立而後可以為人學者能知冠之時欲其成乎人而必責其能成人其望君子以成人自勉者切矣是故古者聖王重冠古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也故冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之成人之道也見於母母拜之見於兄弟兄弟拜之成人而與為禮也𤣥冠𤣥端奠摯於君遂以摯見於鄉大夫鄉先生以成人見也鄭氏曰國本國以禮為本也阼謂主人之北也適子冠於阼若不醴則醮用酒於客位敬而成之也戸西為客位庻子冠於房戸外又因醮焉不代父也冠者初加緇布冠次加皮弁次加爵弁每加益尊所以益成也字所以相尊也鄉先生謂鄉老而致仕者服𤣥冠𤣥端異於朝也孔氏曰阼是主人接賔處今適子冠於阼所以著明代父之義也鄭註阼謂主人之北若不醴則醮用酒庶子冠於戸外又因醮焉皆士冠禮文周禮適子則以醴禮之庶子則以酒醮之其於周時或有舊俗行先代之禮雖適子亦用酒醮則因而行不必改也醮者醮盡之義鄭註士冠禮酌而無酬酢曰醮是也冠於客位尊以成人若賔客待之也加有成也謂益加有成人之事此記是士冠禮故三加若大夫亦同士冠禮云古者五十而後爵何大夫冠禮之有是大夫雖冠用士禮若諸侯則有冠禮故左傳云公冠用祼享之禮行之金石之樂節之其加則四而有𤣥冕故大戴禮公冠四加也諸侯四加則天子亦當五加衮冕也今唐禮母見子但起立不拜案儀禮廟中冠子以酒脯奠廟訖子持所奠酒脯以見於母母拜其酒脯重從尊者處來故拜之非拜子也𤣥冠𤣥端上士則𤣥裳中士則黄裳下士則雜裳以其初成人故著𤣥端異於朝服也若朝服則素裳奠摯奠之於君也以摯謂以雉也士相見禮冬用雉夏用腒鄉大夫在朝之卿大夫山隂陸氏曰言明内聖外王之道而後充此亦所以重冠也藍田吕氏曰國之所以為國人道立也人之所以為人禮義立也冠禮者所以責成人禮義所由始也上帝降􅇆於下民則所以為人天命之神明相之筮日筮賔于廟門之外成人之始質之神而不敢專敬之至也敬至則禮重禮重則人道立此國之所以為國也故曰所以為國本也主人升立于序端西面贊者筵于東序之北西面將冠者即筵而冠則其位與主人同在阼也父老則傳之子姑老則傳之婦所傳皆適也故冠禮子冠於阼昏禮舅姑饗婦卒饗降自西階婦降自阼階所以著其傳付之意也未嘗傳而示之以傳付之意所以使之知繼之之重敬守而不敢墜也卒冠而醴若醮則席於賔位以禮賔之禮禮其子所以為成人敬也始加緇布次加皮弁次加爵弁三加而服彌尊亦所以為成人敬也古者童子雖貴名之而已所以别長幼也至冠卒醴然後賔字之曰伯某甫仲叔季唯其所當為成人之道而敬其名也冠者就筵受觶薦脯醢祭卒奠觶降筵北面取脯降自西階適東壁北面見於母母拜受子拜送母又拜冠者見於兄弟兄弟再拜冠者荅拜故曰見於兄弟兄弟拜之母拜之義古今學者疑焉孔氏疏義曰廟中冠子以酒脯奠廟子持所奠脯以見母母以脯自廟中來故拜之非拜子也此說未然所薦脯醢為醴子設非奠廟也葢古者有庸敬有斯須之敬如為師則不臣王臣雖微在諸侯之上尸在廟門内則全於君皆斯須之敬也與其所庸敬各申其義並行而不相悖也子之於母固所尊也所尊則庸敬矣然婦人之義在家從父已嫁從夫夫死從子母雖尊也卒有從子之道故當其冠也以成人之禮禮之則屈其庸敬以申斯須之敬明從子之義猶未害乎母之尊也庸何疑哉乃易服服𤣥冠𤣥端爵韠奠摯見於君遂以摯見於鄉大夫鄉先生𤣥冠士服也𤣥端異於朝服以始冠而異之也所以見君與鄉大夫鄉先生者始以成人接也且明貴貴長長之義也長樂陳氏曰儀禮曰主人𤣥冠而朝服緇带而素韠立於廟門之東西面以筮日者以日月往來而吉凶無常者也古之人舉大事興大功則必擇之以元辰占之以卜人而况冠禮之大者也𤣥冠以象道之幽朝服皮弁以致其誠之潔緇以黒為主素以白為主黒與白純而不變者也唯夫有道之君子素其誠而不雜其行此所以筮日而日無不吉也筮其賔客儀禮所謂前期三日如求日之儀是也昔之人有吉事則與賢者歡成之有凶事則亦與賢者哀戚之冠禮吉事所以筮賔而歡成之也上而有冠則天道也中而有服則人道也下而有履則地道也故三加而彌尊每加莫不有此三者焉夫始加也其冠則緇布而服則𤣥端爵韠屨則黒而其絇青再加也冠則皮弁而服則素積素韠屨則白而絇緇及其三加則冠非特此而授之以纁裳韎韐也屨則纁而其絇黒其加之有序其序之有章而衆人由之亦足以得性命之文而況夫君子者乎所謂喻其志則有成者凡在是也母所以生我者也兄所以長我者也而見於母母拜之見於兄弟兄弟拜之豈非以見其旣冠而深責之以成人邪此家與之成禮也君者出令以正我者也而不可以不見故𤣥端𤣥冠以奠贄見於君非特家與之成禮也而國又與之成禮也鄉大夫以智帥我者也鄉先生以徳先我者也而不可以不見故遂以贄見於鄉大夫鄉先生者非特國與之成禮而鄉黨鄰里亦與之成禮也故自一家達於一鄉自一鄉達於一國莫不與之成禮故曰將責成人者將責其為人子為人弟為人臣為人少者之禮行焉其是之謂乎蓋冠必用醴若不醴則醮焉以醴者大古之物故其禮簡所以示質酒者後世之味故其禮煩所以示文故適子用醴庶子用醮適婦有醴與饗庶婦使人醮之不饗諸侯大夫受賜服於天子歸設奠服賜服於斯乎有冠醮無冠醴是醮輕於醴也士冠若不醴則醮者則冠適子或醴或醮惟其所用矣嚴陵方氏曰緇布者齊冠也皮弁者朝服也爵弁者祭服也齊所以潔已朝所以接人祭所以交神則彌尊之義又見於此且每一加則一醮加彌尊則醮亦彌尊矣𤣥冠𤣥端者齊服也旣加以緇布冠矣而又服𤣥端者蓋緇布則古之齊冠也𤣥冠則今之齊冠也緇布以旣冠而敝之故奠摯則服𤣥冠焉摯則夏用腒以防腐敗之患故也鄉大夫則鄉之有職事者鄉先生則鄉之有年徳者旣加以皮弁之朝服而奠摯止齊服者取夫潔已以進也童子則委摯而退爾以摯見故曰以成人見也所謂𤣥冠𤣥端者禮運曰天子齊𤣥衣𤣥冠𤣥裳郊特牲曰𤣥冕齊戒司服曰其齊服有𤣥端或曰𤣥冕或曰𤣥冠或曰𤣥衣或曰𤣥端何也蓋有旒則謂之𤣥冕無旒則謂之𤣥冠以其身之所依則謂之𤣥衣以其服有兩端則謂之𤣥端或𤣥衣而加𤣥冕或𤣥衣而加𤣥冠皆謂之𤣥端玉藻曰天子𤣥端而祭則𤣥冕𤣥端者祭服也𤣥冠𤣥端齊服也然而𤣥冕雖以祭亦有用之以齊者郊特牲言𤣥冕齊戒是也𤣥冠雖以齊亦有用之以燕者玉藻言𤣥端而居是也馬氏曰聖言其内王言其外知禮樂之情者能作作者之謂聖故必曰聖雖有其位苟無其徳不敢作禮樂故必曰王冠禮出於聖王而士大夫由之以行也旬之外則筮日前期三日則筮賔筮日必吉者所以期於終身之吉筮賔必賢者所以要其終身之賢故戒賔辭曰願吾子之教之也筮則質之於鬼神者所以敬冠事敬冠事以其君臣父子長幼之道所自出而治之所由興也故曰為國本也初加之辭曰令月吉日始加𤣥服棄爾幼志順爾成徳夀考惟祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑愼爾徳睂壽萬年永受胡福三加曰以嵗之正以月之令咸加爾服兄弟具在以成厥徳黄耉無疆受天之慶棄爾幼志順爾成徳脩其内而已敬爾威儀淑愼爾徳内外脩也以成厥徳徳之成也夀考惟祺未有數也故次之以睂夀萬年睂夀萬年猶有數也故終之以黄耉無疆不唯服之加也而其徳亦有加不唯徳之加也其夀亦有加故曰三加彌尊加有成也郊特牲曰醮於客位加有成也三加彌尊喻其志也志言其始成言其終已冠而字之尊其名也如母與兄弟無荅拜之禮而拜之者與為成人之禮也各執其所當執之摯以見於君鄉大夫猶周之鄉大夫也石林葉氏曰所以為國本者何也蓋冠以成之則責其為子為子將至於為父子則有臣道也父則有君道也為國之本莫大於是字所以表徳故已成人而稱字也母兄弟雖在所親而比於父則有所屈故與其為禮則拜之而不及父則是父不可屈也天道始於北故冠與衣皆用𤣥鄉大夫鄉先生也雖在所尊而比於君則在所後故其奠摯則先於君是不可後也孔子曰入則事父兄出則事公卿於冠可以見之也新安朱氏曰不醴而醮乃當時國俗不同有如此者如魯衛之幕有縿布祔有離合皆周禮自不同未必夏殷法也記註所云若以杞宋二代之後及他逺國未能純用周禮者言之則或可通然亦未有明文可考也成人之者將責成人禮焉也責成人禮焉者將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與故孝弟忠順之行立而后可以為人可以為人而后可以治人也故聖王重禮故曰冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也鄭氏曰責人以大禮者已接之不可以苟嘉事嘉禮也宗伯掌五禮有吉禮有凶禮有賔禮有軍禮有嘉禮而冠屬嘉禮周禮曰以冠昏之禮親成男女孔氏曰先王重冠故行之於廟士行之於禰廟故士冠禮註廟謂禰廟既在禰廟此云尊先祖者尊禰即尊先祖之義且下士祖禰共廟其諸侯則冠於大祖之廟故左傳云先君之祧處之聘禮云不腆先君之祧鄭註以為始祖之廟則天子當冠於始祖廟也藍田吕氏曰所謂成人者非謂四體膚革異於童穉也必知人倫之備焉親親貴貴長長不失其序之謂備此所以為人子為人弟為人臣為人少者之禮行孝弟忠順之行立也有諸己然後可以責諸人故人倫備然後謂之成人成人然後可以治人也古者重事必行之廟中昬禮納采至親迎皆主人筵几於廟聘禮君親拜迎於大門之外而廟受爵有徳祿有功君親策命於廟喪禮旣啟則朝廟皆所以示有所尊而不敢專也冠禮者人道之始所不可後也孝子之事親也有大事以告而後行没則行諸廟猶是義也故大孝終身慕父母者非終父母之身終其身之謂也嚴陵方氏曰能為人子然後可以為人父能為人弟然後可以為人兄能為人臣然後可以為人君能為人少然後可以為人長蓋能為臣子之類止可以為人而已然未足以治人為君父之類則可以治人而不止於為人矣故曰可以為人而後可以治人也長幼以兄弟為主此言弟又言少者前略後詳故也幼言其力少言其齒其實一也周官曰嘉禮此曰嘉事者事言其實禮言其名互相備也君子作事謀始而冠者禮之始故為嘉事之重馬氏曰成人禮者為人子則孝為人弟則弟為人臣則忠為人少則順責之以四者之行此禮之所以重也尊重事者不忘其先也不敢擅重事者事不專於己也不專於己所以自卑不忘其本所以尊先祖也石林葉氏曰為人子孝故事君則忠為人弟弟故事兄則順旣冠而母與兄弟拜之責以孝弟之行也君與鄉大夫鄉先生以成人見之責以忠順之行也忠順之行立則身脩而人道備故可以為人人道備於己則推以治國家故可以治人古之聖帝明王欲責人如此故筮日筮賔以敬之乃所以重責之五禮而嘉處其終嘉禮而冠居其首言冠者禮之始則知其為嘉事之重也葢在冠則謂之禮在禮則謂之事重其事故行之於廟廬陵胡氏曰前責以三行者責成人之漸此責以四行者責成人之備孟子曰不得乎親不可以為人故必四行立而後可以為人也言可以者亦猶所謂事親若曾子者可也蓋臣子之身所能為者皆所當為也故但曰可而已不以曽子之孝為有餘也嘉事謂嘉會足以合禮傳曰嘉事不體何以能久昬義第四十四孔氏曰案鄭目録云名曰昬義者以其記娶妻之義内教之所由成也此於别録屬吉事謂之昬者鄭昬禮目録云娶妻之禮以昬為期必以昬者取其陽往隂來之義日入後二刻半為昬定言之則壻曰昬妻曰姻謂壻以昬時而來妻則因之而去也若壻與妻之屬亦稱昬姻故鄭註昬禮云女氏稱昬壻氏稱姻爾雅壻父為姻婦父為昬又云壻之黨為姻兄弟婦之黨為昬兄弟是也天地初分之後遂皇時則有夫婦故通卦驗云遂皇法北斗七星而立七政則君臣父子夫婦及政等是夫婦始自遂皇也譙周云大昊制嫁娶儷皮為禮是儷皮起於大昊也其媒官具於月令疏五帝以前為昬不限同姓異姓三王以來文家異姓為昬質家同姓為昬其昬之年則大戴禮男三十女二十合為五十應大衍之數自天子達於庻人一也然舜年三十不娶謂之鰥文王十五生武王尚有兄伯邑考則人君昬娶早矣先儒又以男二十而冠女十五而笄自此以後可以嫁娶至男三十女二十是正禮也藍田吕氏曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣故男女夫婦人道之始也可不敬乎序卦曰物不可以苟合故受之以賁蓋天下之情不合則不成其所以合也敬則克終苟則易離必受之以致飾者所以敬而不苟也昬禮者其受賁之義乎必以昬者陽往而隂來陽屈而隂伸男下女之義也吴郡張氏曰昏禮用昏時日往則月來陽往則隂來之義異姓取和而不同以水濟火則不相成男女同則不昌也昬禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昏禮納采問名納吉納徴請期皆主人筵几於廟而拜迎於門外入揖讓而升聼命於廟所以敬愼重正昏禮也鄭氏曰聼命謂主人聽使者所傳壻家之命孔氏曰此一經緫明昬禮之義從始至終也采謂采擇之禮故昬禮下達納采用鴈謂使媒氏下通其言女許之然後納采白虎通云鴈取其隨時南北而不失節又鴈隨陽妻從夫之義問名者問其母所生之姓名故昬禮云為誰氏言女之母何姓也此二禮一使兼行之納吉者謂男家旣卜得吉與女氏也納徴者納聘財也徴成也先納聘財而後昏成春秋則謂之納幣其庻人則緇帛五兩卿大夫則𤣥纁𤣥三纁二加以儷皮諸侯加以大璋天子加以榖圭皆具於周禮經註也請期者謂男家使人請女家以昏時之期請者謙敬之辭示不敢自專也納吉納徴請期每一事則使者一人行唯納徴無鴈以有幣故其餘皆用鴈主人謂女父母行此等禮時女之父母設筵几於禰廟此等皆據士昬禮而知之賈氏曰納幣五兩十端也必言兩者欲得其配合之名十象五行十日相成也問名者問女之姓氏不問三月之名故昬禮問名辭云敢請女為誰氏鄭云誰氏者謙也不必其主人之女是問姓氏也然以姓氏為名者名有二種一者是名字之名三月之名是也一者名號之名故孔安國註尚書以舜為名鄭目録以曾子為姓名亦據子為名皆是名號為名者也儀禮疏新安朱氏曰孔疏問名與儀禮疏義不同未詳孰是藍田吕氏曰合同姓以為宗者兄弟之恩患乎不親也合異姓以為昏者男女之際患乎無别也故娶妻不娶同姓買妾不知其姓則卜之皆所以逺别也君子之祭也旣内自盡又外求助昬禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷出夫人之辭曰某不敏不能從而共粢盛昬禮父醮子而命之曰往迎爾相承我宗事詩有采蘩采蘋皆以承先祖共祭祀為不失職蓋婦人之職莫先於奉祭祀女子未嫁觀於祭祀納酒漿籩豆菹醢禮相助奠其敎有素矣有夫婦然後有父子故天地不合萬物不生大昏萬世之嗣也此昬禮所以不可不敬也故曰將合二姓之好上以事宗廟下以繼後世也昬禮之節納采問名納吉納徴請期親迎其别有六必至于六者敬則不苟别則致詳也納采者昬禮下達男先下女媒妁之言旣達則女先許之矣男不敢必也故納采擇之禮以求之故曰納采其禮用鴈五禮皆用之鴈大夫之摯也士昬而用大夫之摯攝盛也猶乘墨車而迎也其辭曰吾子有恵貺室某也某有先人之禮使某也請納采言有恵貺室則知女氏之前許也旣納采遂問名者不敢必主人之女問名將卜之也故其辭曰某旣受命將加諸卜敢請女為誰氏對曰吾子有命且以備數而擇之某不敢辭則告之矣納吉者旣問名而男氏以吉卜告女氏也其辭曰吾子有貺命某加諸占曰吉使某也敢告納徴者納幣以聘之也古之聘士聘女皆以幣交恭敬不可以虛拘也正潔之女非禮則不行猶正潔之士非其招則不往也故以聘士之禮聘之是以有儷皮束帛以贄見之禮見之是以用鴈敬之如此其至則夫婦之不正未之有也徴成也證也所以成其信而不渝也聘幣皆以束帛故無過五兩諸侯天子至於用玉則又所以重其禮也請期者男氏請昬期於女氏也昬期主於男氏而必請於女氏女氏固辭然後告期者賔主之義不敢先也此五者行乎親迎之前又皆男女受命於廟女氏聽命於廟筵几以敬神拜迎揖讓以敬賔至繁縟也至重愼也皆所以敬而不苟也婦從乎夫女卑於男人之大倫也昬禮下達自納采至於親迎皆男先於女者天地之義存焉天氣降而下地氣應而上則天地交而隂陽和萬物生上以禮求下下以誠應上則上下交君臣和萬化成男女之際非特有所下也别疑逺恥且以成婦之正順以為事宗廟繼後世之重也聘則為妻奔則為妾聘者以禮先之奔則不待禮而行此所以别貴賤也長樂陳氏曰納吉則其禮成矣故納徵納采問名納吉請期以禽贄納徴以圭璋皮幣由徴以前慮其或不受也故皆言納旣納徵則聽命而已故於期言請焉士昬禮旣納采問名然後歸卜於禰旣卜然後納吉而卜常在告廟之日禮記曰卜郊受命於祖廟作龜於禰宫尊祖親考之義也鄭氏謂受命退乃卜卜昬之禮蓋亦如之然則告廟始於納采問名之後矣納采問名一使而二鴈三入廟而再迎之則問名因於納采故其禮略也士昬贄用鴈者攝盛也觀其所乘大夫之墨車所以助祭之爵弁而女必次純衣纁袡腊必用鮮魚必殽全則攝贄而鴈不為過也鄭氏曰用鴈取其順隂陽來往理必不然周禮曰凡嫁子娶妻入幣純帛無過五兩考之於史曰錦繡千純蘇秦傳又曰文繡千純張儀傳則純匹端也周禮所謂純帛乃匹帛也鄭改以為緇誤矣匹帛無過五兩則庶人不必五兩大夫士不得過焉非謂庶人用緇大夫用𤣥纁也先王之制昬禮其用財不過如此則婦人之所飾可知矣以為合二姓之好上以事宗廟下以繼後世而不在財也納采以至納徵主人不辭而請期辭者以期在夫家而不在主人也請期曰吾子有賜命某旣申受命矣惟是三族之不虞使某也請吉日蓋惟父之昆弟已與子之昆弟無死喪之凶然後可以行禮焉又曰異義云戴禮說天子親迎左氏說天子不親迎上卿迎之諸侯亦不親迎使上大夫迎之鄭駮異義云文王娶大姒親迎於渭又孔子荅哀公合二姓之好以繼先聖之後以為天地宗廟社稷之主冕而親迎何謂已重乎此天子諸侯有親迎也然考之於經著之詩刺不親迎而充耳以黄者人君之飾又文王迎於渭韓侯迎於蹶而春秋紀裂繻來逆女公羊曰譏不親迎也公子翬如齊逆女榖梁曰逆女親者也使大夫非正也莊公如齊逆女穀梁曰親迎常事也不志此其志何不正其親迎於齊也凡此皆言諸侯親迎之禮若天子則不然趙氏曰王者之尊海内莫敵故嫁女則使諸侯主之適諸侯諸侯莫敢有其室若屈萬乘之尊而行親迎之禮則何莫敢敵之有乎夫子對哀公曰為天地社稷宗廟之主以魯有郊祀天地之禮故云爾非為天子發也左氏謂諸侯不親迎公羊謂天子亦親迎其說不能全與經合當從趙氏之論為正馬氏曰二姓者姓之所自出者異也繫之以姓而弗别綴之以食而弗殊雖百世而昬姻不通者周道然也所以重其别而必待二姓然後合好也上主於事宗廟下主於繼後世則中宜主於順舅姑和室人而以當於夫也所主者如此則君子可不重歟采者有所采擇君子於事之始未嘗不采擇故此始於納采自納采至請期聽壻家之命必於廟者不敢忘其祖以敬愼重正昬禮也山隂陸氏曰莊公如齊納幣雖重而不正石林葉氏曰賤而至於庻人貴而至於天子雖用幣不同而皆用儷皮者不忘本也禮記集說卷一百五十四
