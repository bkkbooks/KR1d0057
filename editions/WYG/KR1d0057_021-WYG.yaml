body:
  text: 禮記集説卷二十一宋衛湜撰既封主人贈而祝宿虞尸既反哭主人與有司視虞牲有司以几筵舍奠於墓左反日中而虞𦵏日虞弗忍一日離也是日也以虞易奠鄭氏曰贈以幣送死者於壙也有司視虞牲謂日中將虞省其牲也舍奠墓左以父母形體在此禮其神也周禮冢人凢祭墓為尸虞䘮祭也孔氏曰既封謂𦵏已下棺主人以幣贈之時祝先歸宿戒虞尸案既夕禮主人贈用制幣𤣥纁束帛也士虞禮記云男男尸女女尸是虞有尸也舍奠于墓左既窆後之事也有司脩虞之有司也几依神也筵坐神席也席敷陳曰筵舍釋也奠置也墓道向南以東為左孝子先反脩虞故有司以几筵及祭饌置于墓左以禮地神也反謂所使奠墓左有司歸也虞者𦵏日還殯宫安神之祭名鄭註士虞禮云虞安也必用日中者是日時之正也士虞禮云日中而行事註云朝𦵏日中而虞君子舉事必用辰正也再虞三虞皆用質明蓋周人尚赤大事用日出故朝𦵏也嚴陵方氏曰既封而贈則虞祭有期矣故祝先反而宿虞尸焉宿亦戒也以事戒之則曰戒以期戒之則曰宿祭統言宫宰宿夫人與此言宿同義主人不親舍奠而使有司代之者欲速反而脩虞事故也必待有司反而後虞祭者𦵏禮畢然後敢成𦵏反之禮故也弗忍一日離其親故不待明日而後虞也是日也以虞易奠者以虞之禮漸吉故也卒哭曰成事是日也以吉祭易䘮祭明日祔于祖父其變而之吉祭也比至於祔必於是日也接不忍一日末有所歸也殷練而祔周卒哭而祔孔子善殷鄭氏曰既虞之後卒哭而祭其辭蓋曰哀薦成事成祭事也祭以吉為成故云吉祭祔于祖父祭告于其祖之廟也末無也孔子善殷蓋期而神之人情也孔氏曰虞祭之時以其尚㓙祭禮未成今既卒無時之哭唯有朝夕二哭漸就于吉故云成事其虞與卒哭尊卑不同案雜記士三月而𦵏是月而卒哭大夫三月而𦵏五月而卒哭諸侯五月而𦵏七月而卒哭約此天子七月而𦵏九月而卒哭雜記又云諸侯七虞大夫五士三皆用柔日最後一虞用剛日故士虞禮云三虞卒哭他用剛日雜記云諸侯七虞然則天子九虞也士三虞卒哭同在一月假令丁日𦵏𦵏日而虞則己日二虞後虞改用剛則庚日三虞也三虞與卒哭相接則壬日卒哭也士之三虞用四日則大夫五虞當八日諸侯七虞當十二日天子九虞當十六日最後一虞與卒哭例同用剛日大夫以上卒哭去虞校兩月則虞祭既終不得與卒哭相接其虞後卒哭之前剛日雖多不湏設祭以正禮既成故也士虞禮云卒哭之明日祔于祖父此虞卒哭及祔皆據得正禮者耳其變而之吉祭者謂不得正禮變常禮也所以有變者或時有廹促或事有忌諱未及𦵏期死而即𦵏者即䘮服小記所云赴𦵏者赴虞者三月而後卒哭彼據士禮而言速葬速虞之後卒哭之前其日尚賖不可無祭謂之為變也之往也謂既虞往至吉祭也比至于祔必于是日接者謂三虞卒哭之間剛日則連接其祭蓋以孝子不忍親一日無所歸依也此經亦據士若大夫以上赴𦵏赴虞之後為接祭至當𦵏之月終虞之祭日乃止其祝亦稱哀薦成事虞禮他用剛日此經謂之變者虞禮謂之他其義一也鄭註虞禮云他謂不及時而𦵏者嚴陵方氏曰明日祔于祖父者謂祔廟也以後死附先死而神事之故謂之祔或祔于祖或祔于父各從其昭穆也李氏曰以其對奠故曰吉祭以其對未𦵏故曰成事變他祭也以其非正祭故曰變以其非常祭故曰他以生者之情則不忍一日離也竆死者之理則不忍一日末有所歸也夫窮死者之理在乎盡生者之情盡生者之情在乎窮死者之理虞祭所以安神也故以不忍一日離言之接祭所以致情也故以不忍一日末有所歸言之廬陵胡氏曰既夕禮曰卒哭明日以其班祔蓋周禮也祔猶屬也屬昭穆之次河南程氏曰䘮湏三年而祔若卒哭而祔則三年都無事禮卒哭猶存朝夕哭若祭于殯宫則哭于何䖏古者君薨三年䘮畢吉禘然後祔因其祫祧主藏于夾室新主遂自殯宫入于廟國語言日祭月享禮中豈有日祭之禮此正謂在年之中不徹几筵故有日祭朝夕之饋猶定省之禮如其親之存也至于祔祭湏是三年䘮終乃可祔也涑水司馬氏曰案士䘮禮始虞祝詞云適爾皇祖某甫告之以適皇祖所以安之故置祔于卒哭之來日書儀藍田吕氏曰禮之祔祭各以昭穆之班祔于其祖主人未除䘮主未遷于新廟故以其主附藏于祖廟有祭即而祭之既除䘮而後主遷于新廟故謂之祔左氏傳云君薨祔而作主特祀于主烝嘗禘于廟周人未𦵏奠于殯虞則立尸有几筵卒哭而祔祔始作主既祔之祭有練有祥有禫皆特祀其主于祔之廟至除䘮然後主遷新廟以時而烝嘗禘焉不立主者其祔亦然士虞禮及雜記所載祔祭皆是殷人練而祔則未練以前猶祭于寝有未忍遽改之心此孔子所以善殷㑹稽髙氏曰案禮記虞卒哭明日祔于祖父此周制也若殷人則以既練祭之明日祔故孔子曰周已戚吾從殷蓋期而神之人之情也若卒哭而遽祔于廟亦太早矣然唐開元禮則既禫而祔夫孝子哀奉几筵至大祥而既徹之矣豈可復使禫祭乃始祔乎唐禮祥祭與禫祭隔兩月此又失之于緩故今于大祥徹靈座之後則明日祔于廟緣孝子之心不忍一日末有所歸也新安朱氏曰衆言淆亂則折諸聖孔子之言萬世不可易矣尚復何説况期而神之之意揆之人情亦為允惬但其節文次第今不可攷而周禮則有儀禮之書自始死以至祥禫其節文度數詳焉故温公書儀雖記孔子之言而卒從儀禮之制蓋其意謹于闕疑以為既不得其節文之詳則雖孔子之言亦有所不敢從者矣程子之説亦甚善然鄭氏説凡祔已反于寝練而後遷廟左氏春秋傳亦有特祀于主之文則是古人之祔固非遂徹几筵程子于此恐其攷之有所未詳也開元禮之説則髙氏既非之矣然其自説大祥徹靈座之後明日乃祔于廟以為不忍一日末有所歸殊不知既徹之後未祔之前尚有一夕其無所歸也久矣凡此皆有未安恐不若且從儀禮温公之説次序節文亦自確有精意如檀弓諸説可見君臨臣䘮以巫祝桃茢執戈惡之也所以異於生也鄭氏曰桃鬼所惡茢萑苕可掃不祥為有㓙邪之氣也生人則無㓙邪孔氏曰此一節論君臨臣喪之禮君謂天子往臨臣喪則以巫執桃祝執茢又使小臣執戈若往臨生者但有執戈無巫祝桃茢之事故云異于生也案喪大記大夫之喪將大斂君往巫止于門外祝先入又士喪禮大斂而往巫止于廟門外祝代之小臣二人執戈先二人後此皆大斂之時小斂及殯更無文明與大斂同也直言巫止無桃茢之文則去桃茢可知也喪大記雖記諸侯禮明天子亦然此經所云謂天子禮諸侯臨臣之喪則使祝代巫執茢居前下天子也亦謂未襲以前若已襲之後茢亦去之與天子同是天子未襲之前臨臣之喪巫祝桃茢執戈三者並具諸侯臨臣之喪未襲之前巫止祝執茢小臣執戈若既襲之後斂殯以來天子與諸侯同也清江劉氏曰君臨臣喪以桃茢先非禮也周之末造也事之斯為臣焉使之斯為君焉君臣之義非虚加之也寄社稷焉爾寄宗廟焉爾寄人民焉爾夫若是其孰輕故君有慶臣亦有慶君有戚臣亦有戚書曰元首明哉股肱良哉尊卑異而已矣雖于其臣亦然故臣疾君親問之臣死君親哭之所以致忠愛也若生也而用死也而棄生也而厚死也而薄生也而愛死也而惡是教之忘生也是教之背死也禍莫甚于背死而忘生苟為背死而忘生則不足以託六尺之孤寄百里之命施之于人者不變于存亡然後人之視其亡猶存矣則夫桃茢胡為乎諸臣之廟哉或曰于記有之宜若禮然曰否是故亦周末之記也昔者仲尼之畜狗死使子貢埋之曰丘聞之也敝帷不棄為埋馬也敝蓋不棄為埋狗也而丘也貧無蓋也亦予之席焉夫不以賤而棄之為勞也夫不以死欺之為有生也勞雖賤不棄也死雖狗不欺也而况于君臣乎吾故曰君臨臣喪以桃茢先非禮也周之末造也䘮有死之道焉先王之所難言也孔氏曰人之䘮也有死散之道人之所惡故難言也䘮之朝也順死者之孝心也其哀離其室也故至於祖考之廟而后行殷朝而殯於祖周朝而遂𦵏鄭氏曰朝謂遷柩于廟孔氏曰此一節論殷周死者朝廟之事䘮之朝也謂將𦵏以柩朝廟也夫為人子之禮出必告反必面今將𦵏以車載柩而朝于廟是順死者之孝心也又死者神靈悲哀棄離其室故至于祖考之廟辭而後行殷人尚質敬鬼神而逺之死則為神故云朝而殯于祖廟周則尚文親雖亡沒猶若存在不忍便以神事之故殯于路寝及朝廟遂𦵏孔子謂為明器者知䘮道矣備物而不可用也哀哉死者而用生者之器也不殆於用殉乎哉其曰明器神明之也塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉鄭氏曰殺人以衛死者曰殉殆㡬也用其器者漸㡬于用人也明器所以神明死者異于生人也芻靈束茅為人焉謂之靈者神之類俑偶人也有面目機發有似于生人孔子善古而非周孔氏曰此一節記者録孔子善古非殷周之事謂夏為明器知死䘮之道焉以孝子之事親不可闕故備其器物若似生存以鬼神異于人故物不可用孔子既論夏家之是又言殷代之非謂用生者之祭器而供死者近于用生人而殉死人也既言殷代又將言周用偶人非禮故先言塗車芻靈自古帝王制而有之此不可為用故云明器之道也記者録孔子之言又説孔子臧否古今得失故重言孔子前言用殉是已死之人形貌不動與器物相似故言用殉此云用人者謂用生人入壙今俑者形貌發動有類生人故云用人周初即用偶人故冢人職言鸞車象人象人謂以芻為人鄭註引此謂為俑者不仁是象人即俑人也山隂陸氏曰言謂不言曰謂者孔子之義也君子見㣲于此哀之臨川王氏曰用生者之器必非殷盛時之禮或者生者之器非祭器也此言果孔子則周不為俑矣言周作俑亦無據嚴陵方氏曰䘮之為道所以致之于死生之間明器者若前經所謂竹不成用瓦不成味之類是矣孟子引孔子之言曰始作俑者其無後乎其言蓋本于此穆公問於子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸淵母為戎首不亦善乎又何反服之禮之有鄭氏曰為舊君反服謂仕焉而已者穆公魯哀公之曽孫子思言放逐之臣不服舊君為兵主來攻伐曰戎首孔氏曰此一節論不為舊君著服之事案䘮服齊衰三月章為舊君凡三條其一云為舊君及君之母妻傳曰仕焉而已者也註云謂老若有廢疾而致仕者兼服其母妻其二大夫在外其妻及長子為舊國君註云在外待放已去者傳云妻言與民同也長子言未去也此則大夫身不為服唯妻與長子為舊君耳其三為舊君註云大夫待放未去者傳曰大夫去君埽其宗廟言其以道去君而猶未絶也註云以道去君謂三諫不從待放于郊未絶者言爵禄尚有列于朝出入有詔于國若已絶則不服也鄭註此云仕焉而已者止取䘮服第一條為正耳然則去仕他國已絶之後不服舊君而雜記云違諸侯之大夫不反服則違諸侯之諸侯得為舊君服者蓋謂不便其居或辟寇讎不得在國者如孟子對齊宣王為舊君反服正與雜記同也鄭註放逐之臣放則宣元年晉放其大夫胥甲父于衛是也逐者春秋諸侯大夫言出奔是也長樂陳氏曰義起于情之所及而不起于情之所不及禮生于義之所加而不生于義之所不加故因情以為義而義所以行情因義以為禮而禮所以行義人臣之去國有為舊君之服者有不為舊君之服者凡視情與義如何耳古者進人以禮進之以誠之所樂與也退人以禮退之以勢之所不得已也今也引之唯恐其不髙則若加諸膝擠之唯恐其不深則若隊諸淵服與不服所以異也穆公居今之世反古之道而欲責今之臣行古之禮不亦誤乎廬陵胡氏曰楚鄖公辛曰君討臣誰敢讎之則臣無讎君之義服亦可也金華應氏曰案子思對穆公與孟子告齊宣王略相類子思所謂戎首者即孟子所謂視君如寇讎也蓋世衰道㣲君多虐其臣而彼此之情渙散不屬故賢者警其君以上下相為感應之理若所以自䖏與所以教人則必以厚不容如是之薄也悼公之䘮季昭子問於孟敬子曰為君何食敬子曰食粥天下之達禮也吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食鄭氏曰悼公魯哀公之子昭子康子之曽孫名強敬子武伯之子名捷敬子言鄰國皆知吾等不能居公室以臣禮事君也三臣謂仲孫叔孫季孫氏存時不盡忠䘮又不盡禮非也孔子曰䘮事不敢不勉廬陵胡氏曰食食不食粥非也禮小祥則飯素食衛司徒敬子死子夏弔焉主人未小斂絰而往子游弔焉主人既小斂子游出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰鄭氏曰司徒官氏公子許之後皆以朋友之禮往而二人異孔氏曰此一節論朋友相弔必候主人改服乃絰之事知是朋友者凡弔者主人成服則客乃服弔絰今主人始小斂未成服而已便出著絰故知有緦之恩隨主人變如五服親也此與前子游裼裘弔朋友同也前云帶絰故知是朋友此下不云帶者凡單云絰則知有帶也如為師二三子皆絰而出及羣居則絰皆是包帶之文也曽子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乘及墓而反國君七个遣車七乘大夫五个遣車五乘晏子焉知禮曽子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮鄭氏曰禮者敬而已矣有若以其大儉偪下非之及墓而反言其既窆則歸不留賔客有事也人臣賜車馬者乃得有遣車遣車之差大夫五諸侯七則天子九諸侯不以命數䘮數略也个謂所包遣奠牲體之數也雜記曰遣車視牢具曽子言時齊方奢矯之是也孔氏曰此一節論晏子故為非禮以矯齊之事狐裘貴在輕新而晏子一裘三十年其父晏桓子是大夫大夫遣車五乘而晏子止以一乘𦵏其父案既夕禮乃窆主人哭踊襲贈用制幣拜稽顙踊如初卒袒拜賔賔出則拜送藏器與苞筲加抗席抗木實土主人拜鄉人乃反哭今晏子既窆贈幣拜稽顙踊訖則還不復拜賔及送賔之事故鄭云不留賔客有事也此皆是儉失禮有子更舉國君大夫正禮以證之七个五个謂以牲體折為七叚五叚以七乘五乘遣車載之也案士䘮禮無遣車諸侯之士一命而曲禮云三賜不及車馬故諸侯之士無遣車也若諸侯之大夫雖未三命以其位尊得有遣車也又案大行人上公九乘侯伯七乘子男五乘今緫云五乘故鄭云䘮數略也經云及墓而反鄭知既窆則歸者晏子雖為儉約不應柩未入壙則歸故云既窆也長樂陳氏曰恭則不侮敬則不慢不侮也故與人交能盡歡事君能責難不慢也故與人交能竭忠事君能陳善禮之大本不過乎此晏子有之故于交則久而敬于君則致其顯此曽子所以謂之知禮也有若以晏子為不知禮則一狐裘三十年者儉于身而不中禮也遣車一乘及墓而反者儉于親而不中禮也蓋君子起禮以義行義以時時之過則矯之以不及此所謂國奢則示之以儉易小過用過乎儉是也時之不及則救之以中此所謂國儉則示之以禮詩蟋蟀以禮自虞是也然君子用過乎儉小有所過而已晏子之儉非特小有所過曽子以晏子恭敬為知禮則是以晏子之儉為知禮則非禮器以晏子為隘雜記以晏子為偪下則晏子之不知禮也信矣嚴陵方氏曰以齊國之無道而以盈為恥以齊國之奢而欲示之儉則儉于其身庻㡬其可也儉于其親不亦甚乎昔管仲有反坫塞門之僭孔子亦以為不知禮則二子之所為雖不同其為不知禮則一也然以禮與其奢也寜儉言之則晏子之失猶為愈矣石林葉氏曰君子言行應乎時猶權衡之應物也不能應時則言行雖善君子猶以為非齊之奢久矣晏子示以儉其奉己則敝裘而居其祀先則豚肩不揜豆蓋應時也國昭子之母死問於子張曰𦵏及墓男子婦人安位子張曰司徒敬子之䘮夫子相男子西鄉婦人東鄉曰噫毋曰我䘮也斯沾爾專之賔為賔焉主為主焉婦人從男子皆西鄉鄭氏曰國昭子齊大夫夫子孔子也西向東向夾羨道為位也噫不寤之聲毋禁止辭斯盡也沾讀曰覘視也國昭子自謂齊之大家有事人盡視之欲人觀之法其所為也時子張相專猶同也同西向非也孔氏曰此一節論𦵏之在壙男女面位之事噫母者昭子不悟禮意止子張也又自言我居䘮人盡來覘當更為别禮嚴陵方氏曰禮之辨異尤重于男女之際雖䘮紀憂遽之中亦莫不各正其位焉故自始死以至于𦵏男子則西向而位乎東婦人則東向而位乎西凡以辨隂陽之義而已司徒敬子之䘮夫子為相固嘗行之矣而國昭子徒為賔主之辨曽無男女之别則其失禮也不已甚乎穆伯之䘮敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣鄭氏曰䘮夫不夜哭嫌私情勝也孔氏曰自此至矣夫論䘮夫不夜哭并母知子賢愚之事嚴陵方氏曰經曰寡婦不夜哭蓋其逺嫌之道不得不然耳穆伯之于敬姜夫也故居其䘮止于晝哭而不嫌于薄文伯之于敬姜子也故居其䘮晝夜哭而不嫌于厚此孔子所以謂之知禮也文伯之䘮敬姜據其牀而不哭曰昔者吾有斯子也吾以將為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠於禮矣夫鄭氏曰以為賢人蓋見其有才藝也未嘗就公室言未嘗與到公室觀其行也季氏魯之宗卿敬姜有㑹見之禮内人妻妾也孔氏曰曠猶疏薄也言此子平生必疏薄于朋友賔客故未有感戀出涕者上云晝夜哭此不哭者謂暫時也家語云文伯歜卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好内者女死之今吾子早夭吾惡其好内聞也二三婦共祭祀者無加服孔子聞之曰女智莫若公父氏之婦知禮矣嚴陵方氏曰曠與無曠庻官之曠同言虚其道而不行行哭者行哭泣之禮也季康子之母死陳䙝衣敬姜曰婦人不飾不敢見舅姑將有四方之賔來䙝衣何為陳於斯命徹之鄭氏曰䙝衣非上服陳之將以歛也敬姜言四方之賔嚴于舅姑敬姜者康子從祖母有子與子游立見孺子慕者有子謂子游曰予壹不知夫䘮之踊也予欲去之久矣情在於斯其是也夫子游曰禮有㣲情者有以故興物者有直情而徑行者戎狄之道也禮道則不然人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯歎歎斯辟辟斯踊矣品節斯斯之謂禮鄭氏曰䘮之踊猶孺子之號慕也㣲情謂節哭踊也以故興物謂衰絰之制直情徑行謂哭踊無節衣服無制也禮道與戎狄異陶鬱陶也咏謳也猶當為搖聲之誤也搖謂身搖動也秦人猶搖聲相近舞謂手舞之愠猶怒也戚憤恚嘆吟息辟拊心踊躍也舞踊皆有節乃成禮孔氏曰自此至之訾也一節論子游言制禮有節之事有子言我專壹不知夫䘮之踊也欲去此踊節直似孺子慕者足矣言孝子之情于此即是何湏為哭踊之節㣲情者㣲殺也言賢者䘮親必致滅性故制使三日而食哭踊有數以殺其内情使之俯就也以故興物者興起也不肖者無哀情故為衰絰使其覩服思哀起情企及也若直肆已情而徑行之無哭踊節制乃是夷狄之道中國禮道不如是也人喜則斯陶以下極言哀樂之本喜者外竟㑹心之謂斯語助也陶謂鬱陶心初悦而未暢之意也鬱陶之情轉暢則口歌咏之也歌咏不足漸至搖動身體乃至起舞足蹈手揚樂之極也外竟違心之謂愠凡喜怒相對哀樂相生若舞無節形疲厭倦事與心違所以怒生愠怒之生由于舞極故曲禮云樂不可極也此凡有九句首末各四正明哀樂相對中間舞斯愠一句是哀樂相生諸本亦有無此一句者愠斯戚者怒來戚心故憤恚起也憤恚轉深因發吟息嘆息不泄故至撫心撫心不泄乃至跳踊奮擊哀之極也夫喜而不節自陶至舞俄頃而愠生怒而不節從戚至踊踊極則笑故夷狄無禮朝殯夕歌童兒任情倐啼歘笑今若品節此二塗使踊舞有數則能久長故云此之謂禮品階格也節制㫁也廬陵胡氏曰予欲去之久矣情在于斯其是也夫言不可去陶樂猶若所謂君子蓋猶猶之猶鄭讀猶為搖動恐非舞斯愠人鼓舞則氣激怒愠斯戚􅃤矣李氏曰禮者節文之也有節故有㣲情者有文故有興物者直情則無節徑行則無文故曰戎狄之道也唯有節故陶不至于咏咏不至于舞舞不至于愠愠不至于踊此所以㣲情也唯有文故制絞衾設蔞翣以使勿惡脯醢之奠遣而行之𦵏而食之使人弗倍此所以興物也長樂陳氏曰其喜心感者其聲發以散發以散陽也其極必反隂焉其愠心感者其聲粗以厲粗以厲隂也其極必反陽焉蓋喜氣不泄則已泄則口不得不咏愠氣不震則已震則氣不得不嘆咏文事心志猶其優㳺嘆武事心志猶其奮疾夫然則憂患去而樂生矣樂生而舞至于手之舞之則樂極而哀從之矣故舞斯愠愠斯嘆嘆斯戚戚斯辟辟斯踊則不知胷之撫之足之踊之雖正明目而視不可得而見也傾耳而聼不可得而聞也豈非陽極反隂樂極反哀之意邪左傳所謂樂有歌舞哀有哭泣者此歟品于斯哀樂莫不有隆殺節于斯哀樂莫不中節則知禮之為道其去戎狄之道逺矣陶包隂陽之氣憂樂無所泄如之喜斯陶樂之無所泄者也鬱陶乎子心憂之無所泄者也爾雅以鬱陶為喜其有見乎一偏歟傳曰齊楚燕趙之歌異傳而皆樂九夷八蠻之聲異哭而皆哀夫何故哀樂之情同也然而君子不與之者為其不能品節于斯以為禮未免為戎狄之道也樂書清江劉氏曰人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯嘆嘆斯辟辟斯踊案人舞冝樂不宜更愠又不當漸至辟踊此中間有遺文矣蓋本曰人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯蹈矣人悲則斯愠愠憤不足愠斯戚戚斯嘆嘆斯辟辟斯踊矣自喜而下五變而至蹈自悲而下亦五變而至踊所謂孺子慕者也嚴陵方氏曰隂陽之理憂樂之情固常如此則禮雖經而為三百曲而為三千不過品于斯節于斯而已品于斯故所施之上下有常節于斯故所䖏之多少無失故曰品節斯斯之謂禮人死斯惡之矣無能也斯倍之矣是故制絞衾設蔞翣為使人勿惡也始死脯醢之奠將行遣而行之既𦵏而食之未有見其饗之者也自上世以來未之有舍也為使人勿倍也故子之所刺於禮者亦非禮之訾也鄭氏曰無能心謂之無所復能也絞衾尸之飾蔞翣棺之飾周禮蔞作栁將行將𦵏也𦵏有遣奠食反虞之祭也舍猶廢也訾病也孔氏曰上明辟踊之節此明飾䘮及奠祭之事人身既死形體腐敗以其恐惡之故制絞紟衾設蔞翣以飾之欲使人勿惡也以其恐倍之故始死設脯醢之奠以至于𦵏將行又設遣奠而送之既𦵏反哭設虞祭以食之未曽見死者饗食之然自上世以來未有舍此而不為者為使人勿倍其親故也故子之所譏刺于禮有踊節者亦非禮之病害也初有若止譏踊節子游既言生者節哀遂説死者加飾備言禮之節制與夷狄不同也廬陵胡氏曰倍與背同古字多假借嚴陵方氏曰刺若詩之有刺以適當于物故也訾猶疵也而與不苟訾同字者以有疵而可訾故也吳侵陳斬祀殺厲師還出竟陳大宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何大宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王討敝邑之罪又矜而赦之師與有無名乎鄭氏曰吳侵陳以魯哀元年秋祀神位有屋樹者厲疫病也大宰行人官名也夫差吳子光之子盍何不也嘗猶試也夫差脩舊怨庻㡬其師有善名也獲謂繫虜之二毛􅁂髪斑白大宰嚭欲㣲切之故其言似若不審然止言殺厲重人也歸爾子謂所獲臣民吳楚僭號稱王大宰又㣲勸之終其意孔氏曰此一節明征伐不合斬祀殺厲之事左傳初吳子光伐楚召陳懐公懐公不從至夫差克越乃脩先君之怨而侵陳是夫謂大宰嚭言其博聞強識多有所言不斬祀殺厲不獲二毛謂以至勝攻至暴用兵如此若兩軍相敵則不然左傳云雖及胡耉獲則取之是也大宰嚭因吳王欲反地歸子復勸之以終其哀矜之意謂反地歸子其事既善師豈有無善名乎言必有善名也周官有大宰又有大小行人此大宰嚭與吳大宰嚭名號同而人異也穀梁傳云苞人民敺牛馬曰侵斬樹木壊宫室曰伐是侵輕而伐重也鄱陽洪氏曰案嚭乃吳夫差之宰陳遣使者止用行人則儀乃陳臣也記禮者簡䇿差互故更錯其名當云陳行人儀使于師夫差使大宰嚭問之乃善忠宣公作春秋詩引斯事亦嘗辨正云顔丁善居䘮始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既𦵏慨焉如不及其反而息鄭氏曰顔丁魯人從隨也慨憊貌孔氏曰此一節論孝子居䘮哀殺有漸之事嚴陵方氏曰皇皇言心無所依望望言心無所跂此淺深之别也其反而息言𦵏反而亡于是為甚心與形俱息也息與詩言我心則休同義言其極而不可加故也子張問曰書云髙宗三年不言言乃讙有諸仲尼曰胡為其不然也古者天子崩王世子聽於冢宰三年鄭氏曰時人君無行三年之䘮禮者子張問有此與怪之也讙喜悦也言乃喜悦則臣民望其言久冢宰天官卿貳王事者三年之䘮使之聽朝孔氏曰此一節論世子遭䘮冢宰聴政之事無逸作言乃雍嚴陵方氏曰天子之適子曰太子諸侯之適子曰世子得世國故也于天子亦稱世子者則以世天下言之耳故稱王以别之亦猶王制于諸侯亦稱太子必稱羣后以别之也周官天子之禮止曰世子者亦以每繼王后言之故也其實稱太子則以天子為正稱世子則以諸侯為正知悼子卒未𦵏平公飲酒師曠李調侍鼓鍾杜蕢自外來聞鍾聲曰安在曰在寝杜蕢入寝厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開予是以不與爾言爾飲曠何也曰子夘不樂知悼子在堂斯其為子夘也大矣曠也大師也不以詔是以飲之也爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀匕是共又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至于今既畢獻斯揚觶謂之杜舉鄭氏曰悼子晉大夫荀盈魯昭公九年卒平公晉侯彪也飲酒與羣臣燕也侍與君飲也燕禮記曰請旅侍臣鼓鍾樂作也燕禮賔入門奏肆夏既獻而樂闋獻君亦如之曰安在怪之也在寝謂燕于寝杜蕢三酌皆罰紂以甲子死桀以乙夘亡王者謂之疾日不以舉樂為吉事所以自戒懼雜記曰君于卿大夫比𦵏不食肉比卒哭不舉樂是大臣䘮重于疾日大師典奏樂詔告也近臣當規君疾憂為一飲一食言調貪酒食䙝嬖也與知防防禁放溢也平公聞義則服揚觶舉爵于君也禮揚作媵揚舉也媵送也揚近得之毋廢斯爵欲後世以為戒畢獻獻賔與君也此爵遂因杜蕢為名杜蕢或作屠蒯孔氏曰此一節論君有大臣之䘮不得有作樂飲酒之事鼓猶奏也謂燕奏鍾樂此賔初入門奏肆夏也燕禮記云燕朝服于寝故知燕于寝也平公呼蕢而進之曰向者汝酌三酌是汝之心或開發于予予望汝有諫是以不與汝言也尚書云甲子昧爽至于殷郊又史記云兵敗紂自焚死是紂甲子死也左傳昭十八年二月乙夘周毛得殺毛伯過而代之萇𢎞曰毛得必亡是昆吾稔之日也詩云韋顧既伐昆吾夏桀二者同誅昆吾既乙夘亡明桀亦乙夘被放也調是嬖䙝之臣唯欲行燕㑹貪求一飲一食忘君違禮之疾而不諫是以飲之也謂之杜舉表明此爵實杜蕢所舉也案左傳昭公九年文與此小異亦所聞不同或二文互相足也皇氏曰非刀匕是共非不也杜蕢言各憂其事宰夫不以刀匕是共乃又敢與諫争越官侵職是以飲也至于今謂記録之人至于今為記之時長樂陳氏曰先王制為䘮臣之禮于服則衰絰于膳則不舉于樂則弛縣以至與斂往弔莫不盡禮是以栁莊之卒衛獻公不釋祭服而往襚衆仲之卒隠公不與斂仲遂之卒宣公猶繹而萬入君子非之然則悼子之未𦵏平公飲酒至于鼓鍾其可乎此杜蕢所以升酌而譏之也非杜蕢不能改平公之過于羣臣不言之際非平公不能彰杜蕢之善于後世矣蓋杜蕢之所存者忠也所敢為者勇也平公之知悔者智也不掩善者義也皆禮之所與也然平公賢孟子而終于不可見尊亥唐而終不與共治則所謂智而且義者蓋亦勉強之而已左傳謂杜蕢責樂工以不聦責嬖叔以不明責已以不善味其言雖不同其實一也噫三代之季賢者陸沈多矣及不得已然後出而見于世故讓爵見于屠羊非書見于斵輪守官見于虞人商歌見于飯牛則善諫見于宰夫不為過矣李氏曰先王之于事無非教也子夘不樂以桀紂之所以亡子夘不哭以湯武之所以興以為哀樂之戒也公叔文子卒其子戍請諡于君曰日月有時將𦵏矣請所以易其名者君曰昔者衛國凶饑夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聴衛國之政脩其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子鄭氏曰文子衛獻公之孫名拔或作發諡者行之迹有時猶言有數也大夫士三月而𦵏君靈公也衛國有難謂魯昭公二十年盜殺衛侯之兄縶也時齊豹作亂公如死鳥班制謂尊卑之差也後不言貞惠者文足以兼之孔氏曰此一節論請君誄臣之諡法生存之日君呼其名今死將𦵏故請所以誄行為之作諡易代其名者案諡法愛民好與曰惠外内用情曰貞道徳博聞曰文既有道徳則能惠能貞故鄭云文足以兼之嚴陵方氏曰脩其班制以與四鄰交非博聞者不能故曰不亦文乎班制者班言上下之序制言多寡之節脩其班制故可以與四鄰交故衛之社稷得以不辱班制古所有也文子特因其壊而脩之耳廬陵胡氏曰春秋書歸粟譏人臣私惠作福文子不佐其君賑窮而私為粥不可也以死衛君于經傳不見據史鰌勸文子執臣禮則文子嘗不臣矣文子欲𦵏瑕丘恐不能脩班制石駘仲卒無適子有庻子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之䘮而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也鄭氏曰駘仲衛大夫石碏之族六人莫適立故卜為後者沐浴佩玉則兆言齊潔則得吉兆也石祁子心正且知禮孔氏曰此一節論龜兆知賢之事沐浴佩玉則兆其掌卜之人謂之也所以有卜者昭公二十六年左傳云年鈞以徳徳鈞以卜王不立愛公卿無私居親之䘮必衰絰憔悴安有沐浴佩玉者乎言不可長樂陳氏曰五人者有意于得而不兆祁子無意于得而兆故衛人以龜為有知蓋溺于利而忘義蔽于情而忘禮者人謀之所不與而鬼謀之所違篤于義而不謀利專于禮而不徇情者人謀之所與而鬼謀之所從豈非所謂天地自然之道人事必然之理哉嚴陵方氏曰曲禮曰居䘮之禮頭有創則沐身有瘍則浴非有創瘍固不可以沐浴矣玉藻曰凡帶必有佩玉唯䘮否非去䘮固不可以佩玉矣若夫執親之䘮而沐浴佩玉是上忘孝于親下忘禮于身也其可乎唯石祁子不忍為之宜乎龜之獨兆也龜之獨兆于祁子非龜為有知也以人情願其為卿故鬼神依人而行耳所謂兆言得吉兆也若周官大卜之三兆卜師之四兆是矣蓋謂灼師龜罅也然兆亦有凶卜者以求吉為主故經以兆言吉也陳子車死於衛其妻與其家大夫謀以殉𦵏定而后陳子亢至以告曰夫子疾莫養於下請以殉𦵏子亢曰以殉𦵏非禮也雖然則彼疾當養者孰若妻與宰得已則吾欲己不得已則吾欲以二子者之為之也於是弗果用鄭氏曰子車齊大夫子亢子車弟孔子弟子莫養於下謂地下也子亢度諫之不能止以言拒之已猶止也果決也孔氏曰此一節論殉𦵏非禮之事嚴陵方氏曰以生者而從之于死則傷乎不仁于死者而養之以生則傷乎不知非君子之所當為也子亢以義拒之不亦宜乎宰即家大夫也子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂手足形還𦵏而無椁稱其財斯之謂禮鄭氏曰還猶疾也謂不及其日月孔氏曰此一節論孝子事親稱家有無之事啜菽以菽為粥而啜之飲水更無餘物也雖速𦵏無椁材但以衣棺斂其頭首及足形體不露此之謂禮唐陸氏曰菽大豆也王云熬豆而食曰啜菽長樂陳氏曰君子之于親以其所以養則養在志不在體以其所以𦵏則𦵏在誠不在物苟養在體不在志則雖三牲不足以為孝𦵏在物不在誠則雖醯醢百甕不足以為禮若然則富者不足矜貧者不足傷要在自盡而已嚴陵方氏曰子路于生曰養于死曰禮則知所謂禮者䘮𦵏之禮言䘮𦵏則知所謂養者亦無非禮矣語云生事之以禮死𦵏之以禮是矣孔子又變養言孝者主盡其歡言之也盡其歡者存乎情故以孝言稱其財者存乎物故以禮言啜飲止以菽水言之者菽不若稻􅆝之甘水不若酒醴之美則以見盡其歡者在乎養志不在養口體而已禮記集説卷二十一
