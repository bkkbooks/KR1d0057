body:
  text: 禮記集説卷八十五宋衛湜撰其庶姓别於上而戚單於下昏姻可以通乎繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也鄭氏曰𤣥孫之子姓别於高祖五世而無服姓世所由生昏姻可以通乎問之也周之禮所建者長也姓正姓也始祖為正姓高祖為庶姓繫之弗别謂若今宗室屬籍也周禮小史掌定繫世辨昭穆孔氏曰作記之人以殷人五世以後可以通昏故將殷法以問於周云周家五世以後庶姓别異於上與高祖不同各為氏族不共髙祖别自為宗是别於上也戚親也單盡也謂四從兄弟恩親盡於下各自為宗不相尊敬庶衆也髙祖以外人轉廣逺分姓衆多故曰庶姓髙祖以上復為五宗也既姓别親盡昏姻應可以通故問其可通與否記者以周法答之周法雖庶姓别於上而有世繫連繫之以本姓而不分别若姬氏姜氏大宗百世不改也連綴族人以飲食之禮而不殊異雖相去百世昏姻不得通周道如此異於殷也鄭註𤣥孫之子姓别於髙祖者𤣥孫與髙祖服屬仍同其姓與髙祖不異𤣥孫之子則四從兄弟承髙祖父之後至已五世而無服各事小宗因字因官為氏不同髙祖之父是庶姓别於上庶姓氏族之謂也云姓世所由生者五世無服不相稟承各為氏姓也云姓正姓者對氏族為正姓也云始祖為正姓者若炎帝姓姜黄帝姓姬周姓姬本於黄帝齊姓姜本於炎帝宋姓子本於契是也云髙祖為庶姓者若魯之三桓慶父叔牙季友之後及鄭之七穆子游子國之後為游氏國氏之等云若今宗室屬籍者漢同宗有屬籍也長樂陳氏曰恩出於情有時而可絶義出於理無時而可廢故六世而親屬竭者恩之可絶也百世而昏姻不通者義之不可廢也然恩之有絶其來尚矣而義之不廢特始於周故舜娶於堯而君子不以為非禮昭公娶於吳而君子以為不知禮以其時之文質不同故也嚴陵方氏曰姓為正姓氏為庶姓正姓始祖也庶姓髙祖也氏别於上而親盡於下則既五世矣疑若可以通昏姻焉然繋之以本姓而弗别綴之以族食而弗殊在殷而上禮質而親故五世而昏姻可通由周而來則禮文尚嚴雖百世不通曰周道然者言周所行之道如是也周官言定繋世所謂繫之以姓也以飲食之禮親宗族兄弟所謂綴之以食也小記言婦人不知也則書氏則殷無所繋可知堯舜同出於黄帝而堯以二女妻舜則自殷而上通昏姻可知曲禮曰取妻不取同姓則周之不通也明矣東萊吕氏曰禮記庶姓即左𫝊所謂氏族如襄二十五年崔武子欲娶東郭偃之姊偃曰男女辨姓今君出自丁臣出自桓不可蓋崔與東郭皆是氏其姓同出於姜自姜姓中分别出來便有所謂崔氏有所謂東郭氏此便是庶姓别於上也戚單於下蓋親盡也慶源輔氏曰自野者觀之冝若可以通昏姻矣而周道則不然此夫子所以欲從周也必如是而後仁之至義之盡也服術有六一曰親親二曰尊尊三曰名四曰出入五曰長幼六曰從服鄭氏曰術猶道也親親父母為首尊尊君為首名世母叔母之屬也出入女子子嫁者及在室者長幼成人及殤也從服若夫為妻之父母妻為夫之黨服孔氏曰此經明服術之制親親父母為首次以妻子伯叔尊尊君為首次以公卿大夫名者若伯叔母及子婦并弟婦兄嫂之屬出入若女子子在室為入適人為出及出繼為人後者也長謂成人幼謂諸殤從服下有六等鄭略舉夫妻相為而言之馬氏曰術者言其所由服之制有五而術則有六其詳至於如此者所謂䘮多而其服五上附下附是也親親者門内之䘮門内之喪則必以恩掩親而以父母為首故為父母斬衰此親親之重也尊尊者門外之喪門外之喪則以義斷恩而以君與臣為首故為君斬衰此尊尊之重也名者自彼而適我也出入者自我而適彼若姑姊妹之服是也方姑姊妹之未出則其服重其已出則其服輕所謂姑姊妹有受我而厚之者也從服者言其以類相從而非正服也山隂陸氏曰親親下所謂自仁率親是也尊尊下所謂自義率祖是也三曰名所謂名曰輕名曰重是也四曰出入所謂一輕一重是也鄭氏謂用恩則父母重而祖輕用義則祖重而父母輕是之謂出入賈氏曰鄭康成謂親親父母為首尊尊君為首名世母叔母之屬長幼成人及殤其説是也謂出入女子嫁者及在室者以嫁者為出在室者為入然在室者於兄弟有長幼之服於姪姒有尊卑之服入非在室者也周官媒氏判妻入子皆書之喪服出妻之子為母期為人後者為其父母期喪服小記婦當喪而出則除之為父母喪未練而出則三年既練而出則已未練而反則期既練而反則遂之以妾從女君而出則不為女君之子服然則大𫝊所謂出入蓋此類歟從服有六有屬從有徒從有從有服而無服有從無服而有服有從重而輕有從輕而重鄭氏曰屬從子為母之黨徒從臣為君之黨從有服而無服公子為其妻之父母從無服而有服公子之妻為公子之外兄弟從重而輕夫為妻之父母從輕而重公子之妻為其皇姑孔氏曰從服有六者從術之中别有六種屬從者屬謂親屬以其親屬為其支黨鄭註舉一條耳妻從夫夫從妻並是也徒從者徒空也與彼無親空服彼之支黨鄭亦略舉一條妻為夫之君妾為女君之黨庶子為君母之親子為母之君母並是也有從有服而無服以下鄭註所引並見服問篇公子之妻為本生父母期公子為君所厭不得服從妻有服而公子無服是從有服而無服嫂叔無服亦是也公子被君厭為己外親無服而妻猶服之是從無服而有服娣姒亦是也妻自為其父母期為重夫從妻服之三月為輕是從重而輕也舅之子亦是也公子為君所厭自為其母練冠是輕其妻猶為皇姑服期是從輕而重也嚴陵方氏曰以非正由於己特從人而服故謂之從服若母為其黨服則服之正也至於子為母之黨服是從之而已若君為其黨服則服之正也至於臣為君之黨服是從之而已是則屬從與徒從也推此餘可知有所繫而從則曰屬無所繫而從則曰徒屬從由仁而生也徒從以義而起也從有而無從重而輕斷之以義也從無而有從輕而重濟之以仁也先王之於服術仁之至義之盡也故率親則自仁率祖則自義餘亦見服問東萊吕氏曰從輕而重所因者自輕而已從之乃反重也從重而輕妻為重又其父母當重而已反輕從無服而有服所從者自無而已反有從有服而無服所從者自有而已乃無服山隂陸氏曰無屬而從謂之徒從自仁率親等而上之至于祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也鄭氏曰自猶用也率循也用恩則父母重而祖輕用義則祖重而父母輕恩重者為之三年義重者為之齊衰然如是也孔氏曰此一經論祖禰仁義之事仁恩也親謂父母也等差也子孫若用恩愛循親而上至於祖逺者恩漸輕故名曰輕用義循祖順而下之至於禰其義漸輕祖則義重故名曰重義冝也言人情道理冝合如是案喪服條例衰服表恩若髙曽之服本應緦麻小功而進以齊衰踰數等之服豈非為尊重而然至親以期斷而父母加三年寜不為恩深故亦然矣嚴陵方氏曰言率親以知率祖之為尊言率祖以知率親之為禰親親仁也以禰之親故自仁率之尊尊義也以祖之尊故自義率之因親以推祖則以階而升焉故曰等而上之由祖以及禰則即世以降焉故曰順而下之至於祖名曰輕者隆之以仁而親為重故也至於禰名曰重者制之以義而祖或輕故也或輕而斷以義或重而隆以仁而下止言其義然者義之為言宜也宜輕而輕宜重而重是亦義而已馬氏曰以祖對禰則禰為仁以禰對祖則祖為義祖以義為主禰以仁為本故曰自仁率親等而上之以至於祖名曰輕以其義有所殺也自義率祖順而下之以至於禰名曰重以其仁有所隆也唯其仁有所隆義有所殺其理不得不然故曰一輕一重其義然也慶源輔氏曰親親仁也逆而上之則漸輕故至於祖名曰輕尊尊義也順而下之則漸重故至於禰名曰重輕則緦麻三月重則斬衰三年一輕一重其義則然非人之所能為也孔鄭說鑿金華應氏曰自從也仁恩之厚於親者無極以仁率親逆而推於祖乃漸殺以是較之則謂之曰輕義道之施於祖者有節以義率祖順而及於親乃愈隆以是擬之則謂之為重非故欲為是輕重之差乃其理之不容不然耳君有合族之道族人不得以其戚戚君位也鄭氏曰君恩可以下施而族人皆臣也不得以父兄子弟之親自戚於君位謂齒列也所以尊君别嫌也孔氏曰此一經明君絶宗之道合族者言設族食燕飲有合㑹族人之道長樂陳氏曰君之於族人主乎愛而失愛則䟽族人之於君主乎敬而失敬則褻以失其愛則䟽故有合族之道所以明其親親之恩以失其敬則褻故不得以其戚戚君位所以明其尊尊之義不能親睦九族燕樂同姓與夫恃親而不恭者豈知此哉東萊吕氏曰君有合族之道如詩所謂飲食燕樂同姓是也君雖絶宗而恩自不可廢族人不得以其戚戚君位謂族雖有尊卑為臣者雖屬尊不敢與君叙列君至尊也慶源輔氏曰君有合族之道親親仁也族人不得以其戚戚君位尊尊義也上所行者仁下所守者義庶子不祭明其宗也庶子不得為長子三年不繼祖也鄭氏曰明猶尊也一統焉族人上不戚君下又辟宗乃後能相序孔氏曰上經論人君絶宗自此至之義也一節論卿大夫以下繼屬小宗大宗之義案小記云庶子不祭祖下又云不祭禰此直云不祭者小記辨明上士下士此則緫而言之又小記云庶子不為長子斬不繼祖與禰斬則三年與此一也小記文詳此文簡略故直云不繼祖也小記已備釋之長樂陳氏曰庶子之所以不祭不敢瀆其祖於上也所以不得為長子三年不敢重其嗣於下也上不敢瀆其祖下不敢重其嗣皆以己之不繼祖所以明其宗也喪服小記曰庶子不祭禰而亦繼之以明其宗則不祭祖所以明大宗不祭禰所以明小宗此文止言不祭兼大宗小宗而明之也小記又曰庶子不為長子斬者葢亦不繼祖與禰故也葢不繼祖大宗之庶者也不繼禰小宗之庶者也合而言之皆祖也斬言其服三年言其期言斬則知其有三年之期言三年則知其有斬之服葢亦相為表裏而已嚴陵方氏曰適子為宗宗則承家主祭焉庶子非宗也故不得祭以明其主焉小記言不祭祖又言不祭禰者葢言適士官師之辨耳其所以言庶子不祭之義則一而已故於此則統而言之東萊吕氏曰庶子不祭明其宗也如曽子問所謂供其牲物所以辨其大宗故也新安朱氏曰依大𫝊文直謂非大宗則不得祭别子之為祖者非小宗則各不得祭其四小宗所主之祖禰也其小記則云庶子不祭禰明其宗也又云庶子不祭祖明其宗也文意重複似是衍字而鄭氏曲為之說於不祭禰則曰謂宗子庶子俱為下士得立禰廟也雖庶人亦然則其尊宗以為本也於不祭祖則云禰則不祭矣言不祭祖者主謂宗子庶子俱為適士得立祖禰廟者也凡正禮在乎上者謂下正猶為庶也族人上不戚君下又辟宗乃後能相序而䟽亦從之上條云禰適故得立禰廟故祭禰禰庶故不得立禰廟故不得祭禰明其有所宗也下條云庶子適子俱是人子並冝供養而適子烝嘗庶子獨不祭者正是推本崇適明有所宗也又云父庶即不得祭父何暇言祖而言不祭祖故知是宗子庶子俱為適士適子得立二廟自禰及祖是適宗子得立祖廟祭之而己是祖庶雖俱為適士得自立禰廟而不得立祖廟以祭之也正體謂祖之適也下正謂禰之適也雖為禰適而於祖猶為庶故禰適謂之為庶也五宗悉然今姑存之然恐不如大𫝊語雖簡而事反該悉也别子為祖繼别為宗繼禰者為小宗鄭氏曰别子謂公子若始來在此國者後世以為祖也繼别謂别子之世適也族人尊之謂之大宗是宗子也繼禰者父之適也兄弟尊之謂之小宗孔氏曰前既云明其宗故此下廣陳五宗義也别子謂諸侯之庶子也諸侯之適子適孫繼世為君而第二子以下悉不得禰先君故云别子並為其後世之始祖故云為祖也鄭註若始來在此國謂非君之親或是異姓始來亦謂之别子以其别於在本國不來者繼别謂别子之適子世繼别子為大宗也族人與之為絶族者五世外皆為之齊衰三月母妻亦然繼禰謂父之適子上繼於禰諸兄弟宗之謂之小宗以本親之服服之晉賀氏曰庾亮問案禮宗子之服𫝊代不遷所以重其統也是以祖宗之正不易則本支昭穆歴百代而不亂此立宗之大㫖也然則士大夫及諸從事於典禮者服宗之義便應相放矣而禮祖宗之義惟著諸侯别子不列卿大夫之制不審此由諸侯君其族人族人不得宗其君故祖宗之制指為此歟自卿大夫以下與其宗黨無君臣之懸則宗統有常嫡服宗有成例故不得别著其制也將由卿大夫位卑則宗服之制厭宗嫡無不遷服紀上五族故不復别見其義也今既無士大夫依諸侯别子之明文又不見無得立宗之定制而頃者以來諸私服於宗嫡者無服者則制緦有服者無加又不詳此為各以非開國代封之家故避嫌而不敢私重其宗耶將此之由自有所承願告㫖要答曰禮宗子之義所以明本祖之正統紀百代而不紊者也而宗之義委曲著見者多在别子卿大夫之文偏不詳悉服之致疑有如來㫖然舊義雖非别子起於是邦而為大夫者便為大宗其適繼之亦百代不遷禮記王制云大夫之廟一昭一穆與太祖之廟而三鄭君解曰太祖别子始爵者也雖非别子始爵者亦然此其義也此謂起於是國盛徳特興為一宗之始者也如此則百代不遷統族序親及族人服之皆冝始别子之宗者也又宗子之服雖在絶屬皆齊衰三月代衰禮替敦之者少吳中略無此服中土緦而不齊其所由來以政敎凌遲人情漸慢非謂大夫位卑或以非代封為嫌也又曰奉宗加於常禮平居即每事諮告凡告宗之例宗内祭祀嫁女娶妻死亡子生行來改易名字皆告若宗子時祭則宗内男女畢㑹喪故亦如之若宗内吉凶之事宗子亦普率宗黨以赴役之若宗子時祭則告於同宗祭畢合族於宗子之家男子女子以班宗子為男主宗婦為女主故云宗子非七十無無主婦以當合族紏宗故也凡所告子生宗子皆書於宗籍大宗無後則支子以昭穆後之後宗立則宗道存而諸義有主也立主意存而有一人不惇者則㑹宗而議其罰族不可以無統故立宗宗既定則常尊歸之理其親親者也是故義定於本自然不移名存於政而不繼其人宗子之道也故為宗子者雖在凡才猶當佐之佑之奉以為主雖有髙明之屬盛徳之親父兄之尊而不得干其任者所以全正統而一人之情也若姦回淫亂行出軌道有殄宗廢祀之罪者然後告諸宗廟而改立其次亦義之權也通典横渠張氏曰夫所謂宗者以己之旁親兄弟來宗己所以得宗之名是人來宗已非己宗於人也所以繼禰則謂之繼禰之宗繼祖則謂之繼祖之宗曽髙亦然藍田吕氏曰國君之適長為世子繼先君之正統自母弟而下皆不得宗次適為别子别子既不得禰先君則不可宗嗣君又不可無所統屬故為先君一族大宗之祖其生也適庶兄弟皆宗之别子之母弟雖適子與羣公子同不得謂之别子其死也子孫世世繼之為先君一族之大宗凡先君所出之子孫皆宗之雖百世不遷無後則族人以支子繼之此謂别子為祖繼子為宗羣公子雖宗别子而自為五世小宗之祖死則其子其孫為繼禰繼祖之小宗至五世以上則上遷其祖下易其宗無子孫則絶此謂繼禰者為小宗每一君有一大宗世世統其君之子孫故曰宗其繼别子之所自出者百世不遷者也别子所自出謂别子所出之先君如魯季友乃桓公之别子所自出即桓公大宗者乃桓公一族之大宗公子之公為其士大夫之庶者宗其士大夫之適者則别子為先君大宗之祖羣公子皆宗之是謂有大宗而無小宗若君無次適可立為别子止有庶公子數人則不可無宗以統當立庶長一人為小宗使諸弟皆宗之是謂有小宗而無大宗若庶長死國君復追立庶長為别子以為先君一族大宗之祖而以其子繼之此雖不經見然以義求之則一君之大宗不可以絶後也若君之正嫡外止有一公子既不可宗君又無昆弟宗己是謂無宗亦莫之宗然此公子亦為其先君一族大宗之祖没則百世相繼先君之子孫皆宗之如大宗法國君主先君之祀上可及先君之大祖而下為先君子孫之宗故曰尊者尊統上别子為先君百世大宗之祖而不敢禰先君故曰卑者尊統下大宗者所以統先君之子孫非統别子之子孫故曰大宗尊之統也又曰繼别子之所自出宗子議又曰宗子法乆不行今雖士大夫亦無收族之法欲約小宗之法且許士大夫家行之其異宫同財有餘則歸不足則取及昏冠喪祭必告皆今可行仍似古法詳立條制使之遵行以為睦宗之道亦無所害於今法可以漸消析居爭競之醜所補當不細矣雜議又曰古之典禮者皆以宗名之故伯夷作秩宗周官有宗伯下及乎都家皆有宗人宗者廟也禮始於親親之法非廟不統所以别姓收族無一不出於祖廟不主乎祖宗故天子之元子為天子之大宗以繼其太祖而别子為諸侯諸侯不敢祖天子而自為一國之大祖故諸侯之元子亦為諸侯之大宗以繼其太祖而别子為大夫大夫亦不敢祖諸侯而自立家為别子之祖繼别者為宗亦謂之大宗所以别小宗而百世不遷者也小宗有四五世則遷者也故繼髙祖之宗得祀髙祖凡族兄弟皆宗之族兄弟同出於髙祖故髙祖與族兄弟之服皆三月至於繼祖繼曽祖繼禰所祀所宗莫不倣此故其所記者皆謂之宗子以主家政而宗之者皆聽命焉諸侯大夫之大宗乆廢不講唯小宗若可行於今然士大夫廟制世數之等與宗子族食之差其詳可得聞歟至宗必以世適有才不才間有所廢置辨之則宗法壊不辨則家政不行支子不祭必告於宗子古者仕不出鄉則支常得與祭於宗以今之仕者出處之不常將有終身不與者可乎至於尊祖奉宗之心或奪於貴富同財歸資之法或廢於私藏嚴之則賊恩寛之則弛法如庶民之無知雖父兄猶有不聽何有於宗子乎將使家政脩宗法舉嚴祭享謹冠昏貨財不私法度如一其親親之道至於祖遷宗易而後已亦有道乎䇿問長樂陳氏曰人生而莫不有孝弟之心親睦之道先王因其有是道而為之節文故立為五宗以紏序族人而使之親䟽有以相附赴告有以相通然後恩義不失而人倫歸厚此周官所謂宗以族得民也葢諸侯之適子孫則繼世為君而支子之為卿大夫者謂之别子有自他國而來於此者亦謂之别子有起自民庶而致位卿大夫者亦從别子之義此三者各立宗而為大宗所謂繼别者也若魯之仲孫叔孫季孫之類是也其適子弟之長子則謂小宗所謂繼禰者也又禮書曰百夫無長不散則亂一族無宗不離則䟽先王因族以立宗敬宗以尊祖故吉凶有以相及有無得以相通尊卑有分而不亂親䟽有别而不貳貴賤有繫而不間然後一宗如出乎一族一族如出乎一家一家如出乎一人此禮俗所以刑而人倫所以厚也葢公子不禰先君故為别子而繼别者族人宗之為大宗庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而己小宗髙祖之正體其别有四四世則親盡屬絶而不為宗矣然言繼别為宗又言繼别子之所自出者言繼禰為小宗又言宗其繼髙祖者則繼别者别子之子也繼别子之所自出者即别子也繼禰者庶子之子也繼髙祖者五世之孫也繼禰言其始繼髙祖言其終繼别言其宗繼别子之所自出言其祖經言繼别子之所自出而孔頴達言别子之所由出然則别子所由出即國君也其可宗乎榖梁曰燕周之分子也分子即别子也東萊吕氏曰别子為祖如魯桓公生四子莊公既立為君則慶父叔牙季友為别子繼别為宗如公孫敖繼慶父是為大宗繼禰者為小宗如季武子立悼子悼子之兄曰公彌悼子既為大宗則繼公彌者為小宗所以謂之繼禰者葢自繼其父為小宗不繼祖故也嚴陵方氏曰諸侯之適子繼世而為君非别弟之所敢宗諸侯之於庶子不為之服而子亦不敢私相服故君命長弟以統之使夫不敢宗君者有所宗不敢相服者有以相服此宗道所以立也别子為祖者適子既為諸侯則别子乃大夫耳大夫不敢祖諸侯故自别為祖焉别子即庶子也然庶子有二例别而言之妻之子無長幼皆為適子妾之子無長幼皆為庶子合而言之自繼世之子為適子其餘雖妻之子亦庶子而已猶之天子之伯叔兄弟則為同姓昏姻之國則為異姓非昏姻之國則為庶姓合而言之自伯叔兄弟之外昏姻與非昏姻之國皆異姓而已此之所言别子是也以其得繼别子故得成家主祭而為宗禰即别子之庶子也以其非適故不得繼别而為大宗己自立為祖使其子繼之是為小宗也以繼禰者為小宗則繼别者為大宗矣盱江李氏曰大宗者其先祖之負荷族人之紀綱乎有族食族燕之禮所以收族也夫五服者人道之大治也然而盡於髙祖逺者忘之矣旁盡於三從則䟽者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是始祖常祀而同姓常親也始祖常祀非孝乎同姓常親非睦乎有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也尊祖故敬宗敬宗尊祖之義也鄭氏曰遷猶變易也繼别子别子之世適也繼髙祖者亦小宗也先言繼禰者據别子子弟之子也以髙祖與禰皆有繼者則曽祖亦有也則小宗四與大宗凡五孔氏曰此一經覆説大宗小宗之義并明敬宗所以尊祖也百世不遷謂大宗也五世則遷謂小宗也宗其繼别子之所自出者自由也别子或由此君而出或由他國而來適子適孫世世繼别子故鄭註云世適也前文云繼禰者為小宗今此云繼髙祖無小宗之文故鄭註云亦小宗也鄭以經繼髙祖為小宗何以前文云繼禰又釋此意謂前文繼禰者承上繼别為大宗之下則從别子言之别子子者别子之適子弟之子者别子適子之弟所生之子也弟則是禰其長子則是小宗故云繼禰為小宗因别子而言也此經云繼髙祖上文云繼禰唯曽祖及祖無繼文故鄭云曽祖亦有也五宗者一是繼禰與親兄弟為宗二是繼祖與同堂兄弟為宗三是繼曽祖與再從兄弟為宗四是繼髙祖與三從兄弟為宗是小宗四并繼别子之大宗凡五宗也尊祖故敬宗緫結大宗小宗大宗是逺祖之正體小宗是髙祖之正體尊崇其祖故敬宗子所以敬宗子者尊崇先祖之義也新安朱氏曰之所自出四字疑衍註中亦無其文至作䟽時方誤耳横渠張氏曰今無宗之家所祭不能追逺大宗則百世不遷言百世已逺矣小宗大宗人主禮者統宗族之事者宗也故稱宗子國有宗正大抵主族中之禮故以主禮稱宗人唐虞已稱秩宗掌禮秩典秩也宗宗族之禮也藍田吕氏解見前長樂陳氏曰大宗則一故雖至於五世之外猶為之齊衰三月此所謂百世不遷也小宗則有四有繼禰而親兄弟宗之為之服期年有繼祖而同堂宗之為之服九月有繼曽祖而再從宗之為之服五月有繼髙祖而三從宗之為之服三月至於四從親屬盡絶則不為之服此所謂五世則遷者也葢大宗始祖之親始祖之廟以義立而百世不毁小宗髙祖之統髙祖之廟以恩立而五世則遷以其廟有遷不遷之不同故其宗所以易不易之不齊也凡此皆卿大夫之制至於公子則具下文餘見前解嚴陵方氏曰繼别子即别子之子也别子之子出自别子故謂之繼别子之所自出繼别子者既為宗矣而其子又宗之世世不絶故曰百世不遷也至於小宗族人宗之五世則遷遷則變而别為之宗矣夫宗以承祖之家者也尊祖於上故敬宗則尊祖之義在其中矣東萊吕氏曰尊祖故敬宗敬宗尊祖之義也葢諸侯必敬宗子者以宗子是祖之嫡尊所自來故敬嫡也盱江李氏曰吾於五宗見孝弟之至焉髙祖以上逺矣而數十百世尊其正體不忘祖也何孝如之袒免以外疏矣而合之以食序以昭穆厚其同姓何弟如之先王之所以治天下此其本歟周衰法弛斯道以亡廢正適者有之矣幼陵長者有之矣祖以世繼逺則忘之矣族以服治䟽則薄之矣骨肉或如行路尚何有於天下乎有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也鄭氏曰公子有此三事也公子謂先君之子今君昆弟孔氏曰以前經明卿大夫士有大宗有小宗以相繼屬此經明諸侯之子身是公子上不得宗君下未為後世之宗不可無人主領之義君無適昆弟遣庶兄弟一人為宗領公子禮如小宗是有小宗而無大宗也君有適昆弟使之為宗以領公子更不得立庶昆弟為宗是有大宗而無小宗也公子唯一無他公子可為宗是有無宗亦無他公子來宗於己是亦莫之宗也公子是也言此三事他人無唯公子有也河南程氏曰凡言宗者以祭祀為主言人宗於此而祭祀也别子為祖上不敢宗諸侯故不祭下亦無人宗之此無宗亦莫之宗也别子之適子即繼父為大宗此有大宗而無小宗也别子之諸子祭其别子别子雖是祖然是諸子之禰繼禰者為小宗此有小宗而無大宗也有小宗而無大宗此句極難理㑹葢本是大宗之祖别子之諸子禰之却是禰也山隂陸氏曰君有適兄弟使為大宗以統公子是之謂大宗而無小宗鄭氏下文註謂所宗者適則如大宗死為之齊衰九月是也君無適兄弟使庶兄弟一人為小宗而無大宗鄭氏謂無適而立庶則如小宗死為之大功九月是也若公子一而已無公子可宗亦無公子宗之是之謂無宗亦莫之宗鄭氏謂公子唯己而已則無所宗亦莫之宗是也金華應氏曰宗法自一而五自五而衍之以至於無窮而其初𣲖而未長獨立而無副者則惟一而已故或無大宗或無小宗或莫之宗亦此也然此其始出亦或有數𫝊而不増若五世無他枝者焉族之衆寡非人之所能為也天也然宗法則常存而不可廢維持培養而忽焉滋榮長茂則始而寡弱者亦能以蕃衍盛大此所謂緜緜𤓰瓞也先王之世有千百年禮義之家而後世鮮三數𫝊詩書之族可嘆也藍田吕氏説見前公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也鄭氏曰公子不得宗君君命適昆弟為之宗使之宗之是公子之宗道也所宗者適則如大宗死為之齊衰九月其母則小君也為其妻齊衰三月無適而宗庶則如小宗死為之大功九月其母妻無服公子唯己而已則無所宗亦莫之宗也孔氏曰此一經覆説上公子宗道之意公子有宗道言公子有族人來與之為宗為下起文也公子之公者公君也謂公子之君是適兄弟為君者為其士大夫之庶者則君之庶兄弟為士大夫所謂公子者也其士大夫之適者言君為此公子士大夫庶者宗其士大夫適者謂立公子適者士大夫之身與庶公子為宗故云宗其士大夫之適也此適者即君之同母弟適夫人所生之子公子既有大宗小宗故知適者如大宗庶者如小宗大宗之正本是别子之適今公子為大宗謂禮如之非正大宗故鄭註云如也云死為齊衰九月者以君在厭降兄弟降一等故九月以其為大宗故齊衰與君同母故云其母則小君也為其妻衰齊三月者同喪服宗子之妻也既立適為大宗則不復立庶為小宗前經所謂有大宗而無小宗是也云無適宗庶者既無適子可立但立庶子為宗禮如小宗與尋常兄弟相為同君在厭降一等故死為之大功九月母則庶母妻則兄弟之妻故無服也前文所謂有小宗而無大宗者是也公子唯己而已即前經無所宗亦莫之宗鄭註遥釋前耳晉范氏曰禮諸侯於其非正嫡一無所服則羣兄弟亦不敢相服則無相統領無相統領則不可不立宗立宗然後有服耳故云公子有宗道也公子之公公者君也此立宗君命所制嫌自相推故又舉公以明之也為其士大夫之庶宗者此獨説庶宗者嫌上總謂有小宗而無大宗者為混故復指小宗之義則大宗自了然也所以統大夫庶宗者諸侯庶昆弟有為大夫也所以止舉大夫者所宗庶長或可為士嫌大夫位尊不相宗故云為大夫之庶宗以斷疑也通典晉曹氏曰禮諸侯不服庶子先君之所不服子亦不敢私相服也夫兄弟之恩既不可以無報親戚羣居又不可以無主故君必命長弟以為之宗宗立而相服相服之義由於其宗故曰公子有宗道也公子之公為其士大夫之庶宗者公子之公謂君之庶弟受命為宗者也其有功徳王復命為諸侯尊羣庶所不敢宗故此君復命其次庶弟代已為宗主士大夫羣庶之在位者也通嚴陵方氏曰士大夫即公子也以先君之子故曰公子以爵為士大夫故曰士大夫為猶使之也使其庶公子宗其適公子焉即上言有大宗而無小宗是也至於有小宗而無大宗有無宗亦莫之宗皆公子之宗道而此不釋之者舉大以該之也雖然所謂有宗道者非特公子而已有自他國而來於此者亦謂之别子有起自民間而致位士大夫者亦同别子之義經之所言舉一端而已山隂陸氏曰言公子有宗道如上所謂無宗亦莫之宗是無宗道也故公子之公為此公子求其上行先君之昆弟適者使為之宗以統公子此公子之宗道也即土行無適以其先君庶昆弟為小宗以統之東萊吕氏曰假如國君有兄弟四人庶而一嫡嫡者君之同母弟公子既不敢宗君君則命同母弟為之宗使庶兄弟宗焉若皆庶而無適則須令庶長權攝祭事𫝊至子則自宗矣藍田吕氏説見前絶族無移服親者屬也鄭氏曰族昆弟之子不相為服有親者服各以其屬親踈孔氏曰此一節論親盡則無服有親則有服絶族者謂三從兄弟同髙祖者族兄弟緦麻族兄弟之子及四從兄弟為族屬既絶故無移服在旁而及曰移言不延移及之有親者各以屬而為之服故云親者屬也横渠張氏曰君子之澤五世而斬小人之澤五世而斬澤斬於五世則恩可知矣故四從六世為絶族而從旁及之服特親者各以親踈屬之也服不及於六世而昏姻乃百世不通者仁之所施有宗而義之所别不可已也然所謂絶非特此也喪服出妻之子為母期則為外祖父母無服𫝊曰絶族無施服親者屬也謂妻於夫家與族齒其出也與族絶族絶則為外祖父母無服此所謂無施服然夫妻則合有絶族子母至親無絶道故為出母期謂親者屬禮記作移喪服𫝊作施葢古者移施通用嚴陵方氏曰九族之外謂之絶族以其恩至此絶故也有恩則有服以其恩絶故無施服也夫以卑而屬尊以幼而屬長以庶而屬嫡以旁而屬正親親之道如斯而已故曰親者屬也族絶即非其所屬山隂陸氏曰言公子有宗道如上從重而輕是之謂移服東萊吕氏曰絶族無移服謂四從兄弟無服者推也推不去親者屬也如期服親兄弟之屬也大功同堂兄弟之屬也此類皆是自仁率親等而上之至于祖自義率祖順而下之至于禰是故人道親親也鄭氏曰親親言先有恩孔氏曰自此至篇末一節論人道親親從親親以至尊祖敬宗收族宗廟嚴社稷重禮俗成天下樂之而無厭倦自仁至於禰前文已具此重説之者前文論服之輕重此論親親之道嚴陵方氏曰自仁率親等而上之至於祖則始乎親親焉自義率祖順而下之至於禰則終乎親親焉人道終始乎親親也慶源輔氏曰人道不過仁義親親仁也尊祖義也推親親之仁至於尊祖則義也率尊祖之義而至於親親則仁也仁義之極則一故曰人道親親也又云親親故尊祖親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂詩云不顯不承無斁於人斯此之謂也鄭氏曰收族序以昭穆也嚴猶尊也孝經曰孝莫大於嚴父百志人之志意所欲也刑猶成也斁厭也言文王之徳豈不顯乎不承成先人之業乎言其顯且承之人樂之無厭也孔氏曰已上親於親親亦上親於祖以次相親去已髙逺故云尊祖宗是祖之正𦙍故云敬宗族人既敬宗子宗子故收族人故喪服𫝊云大宗收族是也族人散亂骨肉乖離則宗廟祭享不嚴肅也若收之則親族不散昭穆有倫則宗廟之所以尊嚴也宗廟嚴以下始於家邦終於四海並立宗之功也先嚴宗廟而後社稷重百姓百官也百官當職更相匡輔則刑罰得中上無淫刑濫罰則民手足有所措各安其業故財用得足也百姓足君孰與不足天下皆足君及民人百志悉成是謂倉廩實知禮節衣食足知榮辱禮節風俗於是而成所以太平告成功也樂謂不厭也禮俗既成所以民庶樂而不厭也引詩周頌清廟之篇言文王之徳人無厭倦之者斯語辭也今尊祖敬宗人皆願樂亦無厭倦故云此之謂也謂與文王相似矣河南程氏曰收族之義止為相與為服祭祀相及嚴陵方氏曰親其所親則推而上之至於親之所親親之所親則尊矣故曰親親故尊祖有祖而後有宗宗者五宗也有宗而後有族族者九族也宗廟者祖禰之祀也社稷者土榖之神也族屬雖以祖禰而後生然非子孫衆多則無以共承宗廟之祭祀宗廟雖以有土榖而後立然非祖禰積累則無以保守社稷之基業故曰收族故宗廟嚴宗廟嚴故重社稷有社有稷必得人而共守是以重社稷故愛百官族姓也有愛人之心則刑不濫故庶民安其生而樂其業則農者生財於田野商者通財於道路而足以致其用故養生送死無憾而百志成也百志成則禮義於是乎生故禮俗刑禮俗刑矣則爭鬬之患息和平之氣通故曰然後樂王者功成作樂其以是歟樂者樂也不顯不承則親親尊祖之義也無斁於人斯其樂之意也故引詩之言以明之然上言愛百姓非不愛庶民也葢政自貴以及賤耳下言庶民安非百姓不安也葢賤者已安而貴者可知矣臣以安社稷為事上言社稷故繋之以百姓刑不上大夫下言刑罰故繋之以庶民而已山隂陸氏曰孔子所謂名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足反是而已彼輙父子親親之義滅矣雖曰尊祖是卑之也誠若詩所云可謂樂矣樂未有大於此者也彼於論鼔鍾末矣東萊吕氏曰親親故尊祖尊祖故敬宗此一條之綱目人愛其父母則必推其生我父母者祖也又推而上之求其生我祖者則又曽祖也尊其所自來則敬宗儒者之道始於親此非是人安排葢天之生物使之一本天使之也譬如木根枝葉繁盛而所本者只是一根如異端愛無差等只是二本皆是汗漫意思收族如窮困者收而養之不知學者收而敎之宗族既合自然繁盛族大則廟尊如宗族離散無人收􅃹則宗廟安得嚴耶宗廟嚴故重社稷者葢有國家社稷然後能保宗廟安得不重社稷國以民為本無民安得有國乎故重社稷必愛百姓也君誠愛民則謹於刑罰刑罰無不中矣庶民安謂民有定居而上不擾之則可以生殖財用上既愛下下亦愛上此是第一件其次歡欣奉上樂輸其財和氣感召則時和嵗豐萬物盛多財用足故百志成者雖有此志而無財以備禮則志不成財用既足則祭祀合族皆可舉矣所謂萬物盛多能備禮也禮俗不可分為兩事且如後世雖有籩豆簠簋百姓且不得而見安得習以成俗故禮俗不相干葢制而用之謂之禮習而安之謂之俗如春秋祭祀不待上令而自安而行之刑是儀刑之刑須是二者合為一方謂之禮俗若禮自禮俗自俗不可謂之禮俗不顯不承無斁於人斯且如成王能盡得許多事則在文武豈不甚顯在成王豈非是能承此兩句緫結一篇之意前面有許多事到得禮俗成後方有此意思惟王萬年子子孫孫永保民此言無斁於人斯之意徳盛者流逺徳薄者流淺慶源輔氏曰親親故尊祖尊祖故敬宗率仁而義也敬宗故收族率義而仁也新安朱氏曰承尊奉也斯語辭言文王之徳豈不顯乎豈不承乎信乎其無有厭斁於人也新安王氏曰此詩頌文王之徳記此𫝊者即以之明己意耳不顯顯也不承承也親親尊祖敬宗收族而宗廟嚴豈不顯乎推其效至於財用足百志成禮俗刑豈不承乎禮俗刑而民樂豈非人之無斁乎禮記集説卷八十五
