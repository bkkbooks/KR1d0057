body:
  text: 禮記集説卷一百八宋衛湜撰祭法第二十三孔氏曰案鄭目錄云名為祭法者以其紀有虞氏至周天子以下所制祀羣神之數此於别録屬祭祀吳興沈氏曰祭法是燔柴於泰壇祭天也以至終篇即書肆類于上帝禋于六宗望秩于山川徧于羣神之義䟽也上只添禘郊祖廟一叚祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭氏曰禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言爾下有禘郊祖宗孝經曰宗祀文王於明堂以配上帝明堂月令春曰其帝大昊其神句芒夏曰其帝炎帝其神祝融中央曰其帝黄帝其神后土秋曰其帝少昊其神蓐收冬曰其帝顓頊其神𤣥㝠有虞氏以上尚徳禘郊祖宗配用有徳者而已自夏已下稍用其姓代之先後之次有虞氏夏后氏宜郊顓頊殷宜郊契孔氏曰此一經論有虞氏以下四代禘郊宗祖所配之人經傳之文稱禘非一其義各殊論語云禘自既灌及春秋禘于大廟謂宗廟之祭也喪服小記云王者禘其祖之所自出大傳云禮不王不禘謂祭感生帝於南郊也此禘鄭謂祭昊天於圜丘者以文在於郊祭之上郊前之祭唯圜丘爾爾雅釋天云禘大祭比餘處為大祭故總得稱禘也案聖證論以此禘黄帝是宗廟五年祭之名虞氏之祖出自黄帝顓頊是虞帝七世祖以顓頊配黄帝而祭是禘其祖之所自出以其祖配之非鄭義也鄭云祭五帝五神於明堂曰祖宗者以明堂月令五時皆有帝及神又月令季秋大饗帝故知明堂之祭有五人帝及五天帝也孝經云宗祀文王於明堂以配上帝故知於明堂也孝經云宗祀文王此云祖文王宗武王故知祖宗通言也此祖宗祭五帝郊特牲祭一帝而在祖宗上者以其感生之帝特尊之虞氏禘郊祖宗之人皆非虞氏之親是尚徳也夏之郊用鯀是稍用其姓代之但不盡用己姓故云稍也云先後之次虞夏宜郊顓頊殷人宜郊契者今虞先云郊嚳後云祖顓頊夏先云郊鯀後云祖顓頊殷先云郊冥後云祖契是在前者居後在後者居前故云宜也案熊氏曰有虞氏禘黄帝者謂虞氏冬至祭昊天上帝於圜丘大禘之時以黄帝配祭而郊嚳者謂正建寅之月祭感生帝於南郊以嚳配也祖顓頊而宗堯者謂祭五天帝五人帝及五人神於明堂以顓頊及堯配之也祖始也宗尊也其夏后氏以下禘郊祖宗其義亦然但所記之人當代各别虞字文單故以有字配之無義例也后君也殷周稱人以人所歸往故也王氏曰祖宗為祖有功而宗有徳其廟不毁郊與圜丘是一郊即圜丘也天唯一而已安得有六五行分主四時化育萬物其神謂之五帝是五帝之佐也豈得稱天而鄭以五帝為靈威仰之屬非也禮周立后稷廟不立嚳廟是尊嚳不若后稷今乃以嚳配至重之天何輕重顛倒之失所哉郊則圜丘圜丘則郊猶王城與京師異名而同處趙氏曰虞氏禘黄帝盖舜祖顓頊出於黄帝則所謂禘其祖之所自出也郊嚳者帝王郊天當以始祖配天則舜合以顓頊配天也為身繼堯緒不可捨唐之祖故推嚳以配天而舜之世系出自顓頊故以為始祖情禮之至也舜宗堯當禹身亦宗舜凡祖者創業傳世之所出也宗者徳髙而可尊其廟不遷也夏后氏禘黄帝義同舜也郊鯀者禹尊父且以有水土之功故以配天祖顓頊者舜世系亦出於顓頊也宗禹者當禹身亦宗舜子孫乃宗禹也殷祖契出自嚳故禘嚳冥有水功故郊冥以配天湯出契後故祖契宗湯者當湯身未有宗也周禘嚳義與殷同稷有播植之功且為始祖故稷當武王身亦未有宗詳見大傳禮不王不禘下藍田吕氏曰天子宗廟之祭自殷以前常祭有四春礿夏禘秋嘗冬烝是也非常之祭有四禘祫郊宗是也祫對犆之名無别祭因時祭而舉之故有犆礿祫禘祫烝春祭物薄故不祫犆犆祭一廟也春祭物薄不足合食故特祭之祫合也合羣廟之主而祭於祖也禘諦也自義率祖順而祭之至於禰先尊後卑審諦昭穆同時異日各行其祭也常禘則止及大祖時雝禘大祖大禘則及其始祖所自出之帝以其大祖配之如周稷出於嚳嚳即始祖之所自出之帝四代皆然故禘從帝亦本此義始祖稷也大祖文王也二禘之祭皆在下有大禘則無常禘常禘嵗行大禘則五嵗一行傳謂三年一祫五年一禘祫禘者若常禘則合于大祖大禘則合于始祖不失追享之義而合食之郊者推其祖之功徳可以配天者祀天於郊以所配者配之故曰郊宗者以功徳可宗祀帝於明堂則以其宗配之禘郊祖宗雖皆祀其先然必推其先世之有功徳者非此不在祀典故瞽鯀皆有惡徳虞不郊瞽而夏郊鯀鯀有以死勤事之功也至周則以礿為夏祭而立祠以為春祭别出禘為大祭又有肆獻祼饋食之享肆獻祼饗禮也行於禘祭饋食食禮也行於嘗祭郊特牲饗禘有樂而食嘗無樂凡非常之祀用饗禮食禮也皆取於此故周人禘祫間行於四時周官司尊彞云四時之間祀追享朝享追享禘也禘其祖之所出如追享先世之義朝享祫也合食有羣主朝於大祖之義饗食互用於非常非常之祭或饗或食禘郊祖宗廟亦不變然周公推嚴配之禮以事天之禮事其先故以后稷配天而郊之祀不祀天而祀稷以文王配帝而明堂之祀不祀稷而祀文王者周公時宗文王而已及其後世乃祖文而宗武故孝經與祭法異馬氏曰禘者三年一祫五年一禘之禘郊者祭天於圜丘之郊祖者所以祖有功宗者所以宗有徳先王四時之祭則有常禮以常禮為未足以極其追逺之意而又為禘以祭則及其所出之祖先王宗廟之制則有常數以常數為未足盡祭饗之意而又立廟以尊之則及於所祖宗之廟禮不王不禘王者禘其祖之所自出以傳考之虞夏者黄帝之所自出也故虞夏禘黄帝商周者嚳之所自出也故商周禘帝嚳延平周氏曰禘者猶審諦之諦言審諦其祖之所自出而祭於䘮畢之五年也故曰禮不王不禘王者禘其祖之所自出故配之郊者即配天於圜丘而郊言其地也故曰於郊故謂之郊祖者以其功之可祖宗者以其徳之可宗故曰祖有功宗有徳夫舜禹殷周同出於黄帝由黄帝而後顓頊由顓頊而後帝嚳此世本之所可推者也有虞氏夏后氏以其去黄帝之近故禘黄帝而黄帝乃為顓頊之所自出故禘黄帝而以其祖顓頊繼之殷周以其去帝嚳之近故禘嚳而各推其祖以配之有虞氏夏后氏既同一禪讓得天下則有虞氏郊嚳而宗堯夏后氏亦當郊嚳而宗舜今於夏后氏反謂祖顓頊而宗禹何也舜之受禪止於一世故就舜之身言之則不得不郊嚳而宗堯禹之受禪傳於數世故就禹之子言之則不得不郊鯀而宗禹使就舜之子言之則固當郊瞽瞍而宗舜而就禹之身言之則固當郊嚳而宗禹殷周同以兵戈得天下而其所以得天下者皆非一日之積累然有契然後有冥有冥然後有湯殷人既郊冥祖契而宗湯則周人當郊公劉祖稷而宗文王今反謂郊稷祖文王而宗武王何也殷人於湯即有天下周人至文王三分天下有其二而武王繼之然後大統始集果以文王為得天下而宗文王則公劉為郊后稷為祖而武王之祀卒至於遷豈武王以戎衣之艱難而大統始集其祀卒不免於遷則孝子慈孫之心其能安乎且又以公劉而方於武王則公劉為可廢而武王為不可遷此周之所以廢公劉而郊稷祖文王而宗武王也孔子曰郊祀后稷以配天宗祀文王於明堂以配上帝今以周人禘郊祖宗之法推之則有虞氏郊嚳夏后氏郊鯀殷人郊冥皆為配天於圜丘而祖顓頊與契之類疑為配帝於明堂然昊天尊於五帝而后稷先於文王則后稷配天文王配帝可也而顓頊則先於帝嚳與鯀而契又先於冥今帝嚳與冥反配天於圜丘而顓頊與契反配帝於明堂何也記曰禮雖先王未之有而可以義起盖明堂之禮唯見於序周頌者之與孝經是明堂之禮虞舜夏殷之世未之有而唯起於周公則由殷而上所謂祖者固未嘗配祭於帝也又虞夏殷之世其禮猶質而不若周之文故所謂祖者即大祖也而為大祖者其廟不毁於萬世而其祭常行於四時則尊而且親所謂郊者其廟不免於毁而又止配祭於圜丘而已則尊而不親此虞舜夏殷之世所以用其先而尊者為祖後而卑者為郊至周則有祖有宗而後有大祖故后稷為大祖而配天於圜丘文王復為祖而配帝於明堂盖文之極於周也如此嚴陵方氏曰禘於廟中所以示人道之近郊於邑外所以示天道之逺以其示人道故推其祖宗之所自出而情有所不可忘以其示天道故迹其功之所由起而理有所不可廢夫帝公天下者也王家天下者也有虞氏所郊所祖不皆視瞽瞍之親而視堯之親者凡以為公而已夏后氏所郊所祖不皆視舜之親而視禹之親者凡以為家而已殷尚質故先後之序則因於夏而從其略周尚文故先後之序則變於殷而致其詳至於禘之與宗先後之序四代所同者以世之逺莫逺於所禘近莫近於所宗世之逺近不可易故也且虞夏殷之所郊者即周之所祖者是也周之所祖者即虞夏殷之所郊者是也虞夏殷之所郊者固嘗立廟矣及其世數之逺則毁之至於郊之祀則萬世不易也周之所祖者固常配帝矣及其世數之逺則易之至於廟之立則萬世不毁也其名雖異其實亦同而已觀虞之制若又不相似然舜之紹堯猶父子也以是推之則同矣虞夏殷之所郊則以世之近者所宗則以世之逺者而周則反之何也盖虞夏殷所謂祖者廟之太祖也周之所謂祖者文王而已則世之逺近固可推矣周以文武之功起於后稷而又以之為大祖故也周既祖文王也孝經乃言宗祀文王者以周公攝政稱文王故也長樂陳氏曰先王之祭莫大於追逺亦莫大於尊尊追逺則仁故有禘尊尊則義故有郊與祖宗盖先王以謂吾之親出於其祖而吾之祖又出於其所自出之祖故審諦其祖之所自出者而祭於䘮畢之五年然後於吾追逺之心有所能盡此其所以為仁也以吾之所尊者不過於祖考而物之所尊者不過於天故以吾所尊之祖考推而配之於萬物所尊之天然天之精氣則一而吾之祖考不可以同配故或郊之以配於圜丘或祖宗之以配於明堂而後於吾尊尊之心有所能盡此其所以為義也盖黄帝者虞夏之所自出帝嚳者殷周之所自出故虞夏殷周之世所以禘之髙陽於虞夏為有徳契文於殷周為有功湯武於殷周為有徳故夏殷周之世所以祖宗之也虞夏殷周之世以其先而尊者為祖後而卑者為郊周之世則以先而尊者為郊後而卑者為祖何也盖虞夏殷則尚質周則尚文尚質則其所謂祖者即大祖也大祖之廟常存而不毁故處之以義之輕重而不以世之先後此先而尊者所以為祖後而卑者所以為郊也尚文則有大祖而又有祖大祖與祖其廟俱主於不毁故必處之以世之先後而不以義之輕重此先而尊者所以為郊後而卑者所以為祖也然舜授禪於堯禹授禪於舜禹生於鯀湯生於主癸虞則宗堯夏則不宗舜而宗禹夏則郊鯀殷則不郊主癸而郊冥又何也盖舜之有天下止於一身夏之有天下至於數世以是言之則其所宗者不得不及於禹也鯀則以死勤事而猶可推以配天故夏所以郊之主癸則未嘗有功於世而不及於冥此殷所以郊冥而已其所謂祖宗者盖離而貳之則有祖有宗合而一之則皆謂之宗故此以上文王為祖而孝經又以文王為宗也然則孝經以明堂始於周公則虞夏殷之祀祖宗其亦有明堂乎盖明堂之名雖始於周公而虞夏之祀祖宗未必非明堂之類也方陳率是推衍周説然互有𤼵明今併錄之山隂陸氏曰殷人祖契是以郊冥夏后氏祖顓頊是以郊鯀鯀鄣洪水而殛死冥勤其官而水死其功烈皆在可以郊之域然則祖非有功雖有功非其子孫有天下不郊故曰文武之功起於后稷故推以配天焉横渠張氏曰夏郊鯀以其祖也杞之郊禹者必繫時王之命不使郊鯀祀私廟猶可也宋之郊契者契殷之所出故郊之廟祀湯亦可也契亦謂之𤣥王周改夏祭為礿尚云周人禘嚳而郊稷則此禘設於何時盖周以前嵗有五祭四時祭與祫至周則嵗有六祭四時祭與禘祫也周既改夏祭為礿别為禘之禮周以前因時祭遂禘必於大祖之廟至周則既修礿祭於逐廟又致禘祖之祭於大廟然則是禘祖之禮致於時祭而不於祫祭也禘謂之追享祫謂之朝享追享者追逺之義朝享者朝於大祖也於祭法不見祭瞽瞍而祭鯀以此觀之恐天子諸侯祖考為庻人則不立廟鯀則嘗為宗伯矣然貴為天子豈可不祭其父其禮必有但不見其傳清江劉氏曰祖非大祖言後世述之宗非宗祀言後世尊之也知非大祖宗祀也以文王非周大祖武王非周宗祀周人祖后稷周公宗文王也知祖者後世述之宗者後世尊之者以商有祖甲祖乙皆非大祖中宗髙宗皆非宗祀也大抵非天子不禘非天子不郊非天子不建祖宗非有功徳不為祖宗非為祖宗無不毁廟故夏后氏不郊顓頊而郊鯀者鯀無功食於廟則必毁故推以配天而食於郊則世世修之此禹之孝也殷人郊冥者冥諸侯也未受命不可稱祖宗與於祖則必毁故亦推以配天而食於郊則世世修之此湯之孝也因是見廟已毁雖有功不可復立故立武宫春秋刺之郊者祭之至尊者也或配以祖或配以父三代雖不同所以嚴父配天一也然則夏郊以鯀殷郊以冥而禮運云杞禹宋契不同者盖湯放桀封禹後以上公遷鯀而郊禹武王殺紂封湯後以上公遷冥而郊契祭法言其始禮運言其終也江陵項氏曰此盖經生用其師説推次而上以為當然非必有明文可據也禮記文體如此者多如有虞氏官五十夏后氏官百殷二百周三百亦是以數相推後人必欲為之考實難矣案此經作者已於篇末自解其意先序帝嚳堯舜鯀禹之功次序黄帝顓頊契冥湯文武之功以為此皆有功烈於民者也故聖王祀之非此族也不在祀典則此人之師説盖謂郊禘祖宗皆擇有功烈者祀之爾而後之有天下者欲稽此以祀其祖先則固於其説大異矣若之何其可稽乎然即其所解以求之本文獨不見舜之祀則上文所載必有脫誤疑夏后氏當祖舜而宗禹也鄭康成以為虞夏宜郊顓頊殷宜郊契此自康成之説以其世次求之又非祭法本説也秦溪楊氏曰案天子七廟左昭右穆世滿而迭毁惟禘郊祖宗四條乃宗廟之大祭世世不絶不可以宗廟之常禮論也禘者禘其祖之所出而以其祖配之也郊者祀天以祖配食也祖者祖有功宗者宗有徳祖宗之廟世世不毁也禘禮見於大傳小記子夏傳郊禮見於孝經大雅周頌祖有功宗有徳見於王肅賈誼劉歆韋𤣥成盖禘與祖宗三條皆宗廟之祭無與乎祀天惟郊一條為配天之祭經傳昭然不可誣也祭法禘在郊上者謂郊以祖配天禘上及其祖之所自出禘逺而祖近故禘在郊上也鄭氏見禘在郊上便謂禘大於郊遂强分圜丘於郊為二以禘為冬至日祀昊天上帝於圜丘而以嚳配之以郊為祭感生帝於南郊而以稷配之既謂禘郊皆為配天矣遂併以祖宗為祀五帝於明堂而以祖宗配之輕肆臆說附經而行居之不疑王肅諸儒力詆其非不能勝也此無他王肅諸儒之説正矣又以禘為五年殷祭之名其擇猶未精其義猶未彰也唐趙伯循生於二千嵗之後獨得其説於祭法大傳小記子夏傳之中於是禘郊祖宗之義煥然而大明言雖簡約而義已該備故朱子深有取焉嘗以大戴禮帝繫及司馬史記考之乃知趙伯循之言確乎不可易也祭法有虞氏禘黄帝夏后氏亦禘黄帝殷人郊嚳周人郊嚳者黄帝生昌意昌意生帝顓頊顓頊生窮蟬窮蟬至瞽瞍皆㣲為庻人舜嗣帝位以帝顓頊為祖廟黄帝者帝顓頊之所自出也故禘黄帝於帝顓頊之廟而以帝顓頊配之也昌意生帝顓頊帝顓頊生鯀鯀生禹禹者黄帝之𤣥孫而帝顓頊之孫也故夏后氏亦禘黄帝於帝顓頊之廟而以帝顓頊配之也殷祖於契契母曰簡狄有娀氏之女為帝嚳次妃吞𤣥鳥而生契帝嚳暑契之所自出故殷人禘嚳於契之廟而以契配之也周祖於稷稷之母姜嫄為帝嚳元妃姜嫄出郊見巨人跡踐之而生稷帝嚳者稷之所自出故周亦禘嚳於后稷之廟而以稷配之也祭法有虞氏郊嚳夏后氏郊鯀殷人郊冥周人郊稷者黄帝生𤣥嚻𤣥嚻生蟜極蟜極生髙辛是為帝嚳帝嚳生堯帝嚳即堯之父也帝顓頊則舜之祖也有虞氏當以帝顓頊配天為身嗣堯位故推帝嚳以配天而以帝顓頊為祖仁之至義之盡也祭法曰禹能修鯀之功夫鯀治水九載非無功也但以蔽於自用而績用弗成禹能修鯀之功則前日未成之功至是成矣故夏后以鯀配天也冥者契六世孫也冥勤其官而水死祭法推其功烈至與先聖王並稱故殷人以冥配天也禮以祖配天后稷周之太祖克配彼天此則無可疑也有虞氏祖顓頊而宗堯夏后氏祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王者帝顓頊者有虞氏異代之祖以功徳而祖之也有虞氏宗堯亦以功徳而宗之也國語注曰虞以上尚徳是也夏后氏之祖顓頊猶有虞氏也禹啓夏祚既以顓頊為祖故夏后氏祖顓頊而宗禹至其後世子孫乃以禹為受命之祖書曰明明我祖是也湯革夏命為殷之祖然殷之功始於契故殷人祖契而宗湯後世子孫乃以湯為受命之祖詩曰衎我烈祖是也又其後殷有三宗祖甲曰太宗大戊曰中宗武丁曰髙宗亦有徳而可宗周公作無逸舉殷三宗以戒成王然則三宗亦為不毁之廟也武王革殷命為周之祖然武王之功起於后稷故周以后稷為太祖不言周人祖稷者周人郊稷以祖配天則祖稷不言可知矣文王受命作周故以文王為受命之祖所謂文世室是也文王為祖故武王為宗當武王之身亦未有宗後世始立武王之廟為宗所謂武世室是也凡此皆趙伯循已開其端特從而推明之爾抑又聞之禮運記夫子言曰杞之郊也禹也宋之郊也契也是天子之事守也與祭法夏后氏郊鯀殷人郊冥之說不同如何曰夏后氏郊鯀殷人郊冥此夏殷之初禮制然也其後杞宋以先代之後統承先王修其禮物而有所改更者䟽以為時王所命意者杞郊禹宋郊契乃時王即其功之顯著者而命之與國語魯語曰有虞氏禘黄帝而祖顓頊郊堯而宗舜夏后氏禘黄帝而祖顓頊郊鯀而宗禹商人禘嚳而祖契郊冥而宗湯周人禘嚳而郊稷祖文王而宗武王幕能帥顓頊者也有虞氏報焉杼能帥禹者也夏后氏報焉上甲微能帥契者也商人報焉髙圉大王能帥稷者也周人報焉凡禘郊祖宗報此五者國之典祀也愚案祭法歴述七代祀典綱領大而條目詳凡聖帝明王尊天親地敬禮百神尊祖敬宗報功崇徳之大典無不具焉非一時問荅之語也國語記魯大夫臧文仲祀爰居於東門之外而展禽歴叙其事以救正之又稍易祭法本語而更之以纎淺輕弱之詞蹈襲傅㑹既不可信其後也夫子以臧文仲下展禽廢六闗妾織蒲為三不仁以作虚器縱逆祀祀爰居為三不知聖人之言無所苟也國語乃以祀爰居一事為不仁不知不㡬於誣乎祭法首章述禘郊祖宗四條乃祀典之尤大者先言禘郊者禘之所及者逺郊之所配者天其義類相近也後言祖宗者祖有功宗有徳其義類亦相近也國語乃先曰禘祖次之郊次之宗又次之禘祖郊宗義類不倫則其理窒而不通矣祭法禘郊祖宗四條國語又别立報之之文並禘郊祖宗報為五夫禴祠烝嘗為非報本追逺之祭也禘郊祖宗又報本追逺之大者也禘郊祖宗之外茍有功徳之可報者則當如殷之三宗立廟而不毁茍曰報之而不立廟以祭則於報之義何居夏殷周三代皆數百年保天之禄其間令王功徳顯著者多矣曰虞幕曰夏杼曰殷上甲微則未之有聞也髙圉大王則誠賢君也先公如公劉之厚於民事先王如宣王能修文武之功業獨不可報乎其後南北諸儒論逺祖則以郊宗石室為言議禮典則以禘郊祖宗報為據甚矣邪説之惑人而人之易惑也豈不深可歎哉燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢鄭氏曰壇折封土為祭處也壇之言坦也坦明貌也折照晢也必為照明之名尊神也地隂祀用黝牲與天俱用犢連言爾孔氏曰此經論祭感生之帝於南郊神州地祗於北郊也燔柴謂積薪於壇上而取玉及牲置柴上燔之使氣逹於天也案牧人云隂祀用黝牲毛之鄭注云隂祀祭地北郊及社稷也又郊特牲云郊之用犢貴誠也彼文雖主南郊其北郊與天相對故知俱用犢也騂犢之義已具特牲䟽案禮器云至敬不壇此云燔柴於泰壇者謂燔柴在壇設饌在地義亦具禮器及特牲䟽長樂陳氏曰泰壇南郊之壇也以之燔柴泰折北郊之坎也以之瘞埋言壇則知泰折之為坎言折則知泰壇之為圜言泰則大之至也言壇折則人為之也祭祀必於自然之丘所以致敬燔瘞必於人為之壇折所以盡文宗廟之禮瘞埋於兩階之間則壇必設於圜丘之南坎必設於方丘之北矣燔柴以升煙瘞埋以逹氣則燔必於樂六變之前瘞必於樂八變之前矣又曰曽子問曰天子將出必以幣帛皮圭告于祖禰反必告設奠卒歛幣玉藏諸兩階之間君薨而世子生大祝執束帛升奠幣于殯東几上遂朝奠小宰升舉幣則宗廟之瘞在既事之後矣祭天曰燔柴祭地曰瘞埋又周人尚臭而升煙瘞埋乃臭氣也則天地之燔柴在行事之前矣賈公彦謂天神中非直有升煙玉帛牲亦有禮神者也地示中非直有瘞埋牲亦有禮神者也以為燔瘞在作樂降神之後而禮神又燔瘞之後則燔瘞之與禮神固有二玉二帛二牲矣以宗廟之祭考之升首所以報陽則天地燔瘞固用首矣漢用牲首盖禮意也周官羊人凡釁積共其羊牲犬人凡祭祀共犬牲伏瘞亦如之鄭司農曰瘞謂埋祭祭地曰瘞埋則燔瘞用羊犬矣此豈施於天地之後祀與夫次祀小祀者乎周魏之間燔柴皆於祭末郭璞云祭天既祭積柴燒之祭地既祭瘞埋藏之恐先王之時祭祀事畢亦有燔瘞之禮其詳不可考也書金縢稱周公曰爾之許我我其以璧與圭瘞俟爾命則禮神之玉其終固燔瘞矣並禮書嚴陵方氏曰燔柴則升而明瘞埋則藏而幽升而明者天道也藏而幽者地道也壇為髙以見折之為深折為方以見壇之為圜圜而髙者天形也方而深者地形也爾雅曰祭天曰燔柴祭地曰瘞埋是矣燔柴者積薪壇上置牲玉而燔之瘞埋瘞繒埋牲於土也周官言禮天於圜丘禮地於方丘乃與此不同者盖祭泰壇乃用辛之郊爾非圜丘冬至之祭也泰折乃用甲之社爾非方澤夏至之祭也馬氏曰燔柴於泰壇所謂祭天於地上圜丘瘞埋於泰折所謂祭地於澤中方丘謂之圜丘方丘以其出於自然也謂之泰壇泰折以其出於人力也折旋中矩矩方也泰折即所謂方丘言燔柴於泰壇則知瘞埋於泰折者故也山隂陸氏曰此合祭也主天而已故雖瘞埋猶從祭天之牲即祠北郊應用黝犢説者曰天地無合祭之壇則春秋言郊何以有三望中庸言事上帝何以有社案周書郊祀亦及聖帝明王荀子所謂郊者并百王於上天而祭祀之是也盖大報天神人鬼地示皆與故曰禮行於郊而百神受職焉又新説曰用騂犢當連下埋少牢於泰昭讀為一叚盖四時者隂陽之氣升降出入於天地之中故用騂犢埋少牢以祀之少牢言埋則祭之於泰昭之下也騂犢言用則祭之於泰昭之上者鄭解騂犢以屬上句盖祭天用蒼犢祭地用黝牲今用騂犢以天則非蒼以地則非黝非是也或曰祭天於泰壇大司樂又曰祭天於圜丘禮器又曰至敬不壇埽地而祭三說不同何也盖祭天之禮升煙於泰壇奏樂於圜丘所以致天神也天神皆降可得而禮矣然後掃地而祭焉其説固未嘗異也樂者陽也其聲無形故奏於自然之圜丘煙者陽中之陽也其氣有象故燔於使然之泰壇此制作之情也以是知郊丘牲玉雖異不害其為同義也又曰古者郊祀天地蒼璧以禮天黄琮以禮地兩角有邸以祀天四圭有邸以祀地如此而已未嘗有瘞埋之玊也先儒謂祭天曰燔燎祀地曰瘞埋俱有玉以降天神以出地示學之者相襲固久矣夫祭天之常祀嵗有九則燔柴泰壇凡九玉祭之常祀嵗有二則瘞埋於泰折凡兩玉其用於常祀之外者不在焉何古之多玊也盖肆師云大祀用玉帛牲牷雲漢云圭璧既卒皆謂禮神之玉耳此經燔柴瘞埋有帛而無玉明矣盖祭天不燔玊而燔帛祭祀不瘞玉而瘞繒禮運云祭祀瘞繒是也正如諸侯之禮三帛二生一死贄則受之而五玉卒乃復也埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭鄭氏曰昭明也亦謂壇也時四時也亦謂隂陽之神也埋之者隂陽出入於地中也凡此以下皆祭用少牢相近當為禳祈聲之誤也禳猶却也祈求也寒暑不時或禳之或祈之寒於坎暑於壇王宫日壇王君也日稱君宫壇營域也夜明月壇也宗皆當為禜字之誤也幽禜星壇星以昏始見禜之言營也雩禜水旱壇也雩之言吁嗟也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之不時於是乎禜之四方即謂山林川谷丘陵之神也祭山林丘陵於壇川谷於坎每方各為坎為壇怪物雲氣非常見者也有天下謂天子也百者假成數也孔氏曰此一節總明四時以下諸神所祭之處及明天子諸侯不同之禮春夏為陽秋冬為隂若祈隂則埋牲祈陽則不應埋之今總云埋者以隂陽之氣俱出入於地中而生萬物故並埋之用少牢降於天地也自此以下及日月至山林並少牢也先儒並云不薦孰殺牲埋之寒暑之氣應退而不退則禳却之應至而不至則祈求之寒於坎寒隂也暑於壇暑陽也日神尊故其壇曰君宫月明於夜故其壇曰夜明也幽闇也星夜出水旱為人所吁嗟曰幽禜雩禜皆為域而祭之也四坎壇四方各為一坎一壇山林川谷丘陵能出雲為風雨見怪物此四壇坎所祭之神也怪物慶雲之屬風雨雲露並益於人壇以祭山林丘陵坎以祭川谷泉澤也天子祭天地四方言百神舉其全數諸侯不得祭天地若山林川澤在其封内而益民者則得祭之如魯之泰山晉之河楚之江漢是也亡無也封内無此山川則不得祭案周禮大宗伯備列諸祀而不見祭四時寒暑水旱者宗伯所記謂周禮嵗時常祀此經所載謂四時乖序寒暑僭逆水旱失時祈禱之禮然案荘二十五年左傳云凡天災有幣無牲此禱祈得用少牢者彼天災謂日月食示戒懼人君先須修徳不當用牲若水旱厯時禱而不止則當用牲故詩雲漢云靡愛斯牲王肅用家語之文以此四時也寒暑也日也月也星也水旱也為六宗孔注尚書亦同伏生與馬融以天地四時為六宗劉歆孔晁以乾坤六子為六宗賈逵云天宗三日月星也地宗三河海岱也古尚書説天宗日月北辰地宗岱河海也日月為隂陽宗北辰為星宗河為水宗海為澤宗岱為山宗鄭駁之云書云類于上帝禋于六宗望于山川既六宗云禋山川言望則六宗無山川明矣祭義云郊之祭大報天而主日配月則郊天並祭日月可知其餘星也辰也司中也司命也風師也雨伯也此之謂六宗明矣眉山孫氏曰六宗之義前代諸儒異同之論不可勝言皆各言其所見也或以為乾坤六子或以為天宗地宗四方之宗或以為文祖之廟六宗即三昭三穆也或又以為月令孟冬祈于天宗天宗者六宗之神也此說盧植以之注月令摯虞以為宜祀六宗劉邵又云六宗太極沖和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗三人之説雖不盡同皆以六宗謂天宗者諸説之外其最有據而得其正者孔安國之説是也其傳曰所尊祭者其祀有六謂四時也寒暑也日也月也星辰也水旱也可謂善也而司馬彪亦曲説以駁之王肅所解本諸家語與安國同而肅對魏明又以為乾坤六子則自叛其説矣據孔傳唯引祭法殊不知安國所據不獨祭法也謹案孔叢子書載宰我問於孔子曰禋于六宗何謂也孔子曰所宗者六皆潔祭之也埋少牢於泰昭所以祭時也祖迎於坎壇所以祭寒暑也主於郊宫所以祭日也夜明所以祭月也幽禜所以祭星也雩禜所以祭水旱也禋于六宗此之謂也安國之傳端本於此諸儒之説紛紛不已皆不見孔子之言故也横渠張氏曰日月星辰風雨寒暑無特祭皆從祀於郊所謂日於壇月於坎日於東月於西皆不出祀之兆言王宫夜明幽禜之類皆指其祭位爾寒暑無定暑近日壇寒近月坎而已故曰相近於坎壇祭寒暑也謂注相近為禳祈者非大雩龍見而雩當以孟夏為百榖祈甘雨也有水旱則别有雩祭祀五祀百神者以百神之功報天之徳耳故以天事鬼神事之至也理之盡也山隂陸氏曰昭言明也爾雅四氣和謂之玉燭迎寒則與寒相近於坎迎暑則與暑相近於壇相近一作祖迎孔叢子説王畿千里相日一寸故其壇謂之王宫星言幽故月言明嚴陵方氏曰天無二日土無二王則王有日之象而宫乃其居也故祭日之壇曰王宫祭義曰祭日於壇祭月於坎彼以形言此以明言也於日曰王以知日之為宫於月曰宫以知月之為室於月曰夜以知日之為晝於夜曰明以知日之為光亦互相備而已幽言其隐而小揚雄曰視日月而知衆星之蔑故祭星之所謂之幽宗焉雩主祭旱言之兼祭水而主旱言之者雨以時至亦無患也幽雩皆謂之宗宗尊也祭祀無所不用其尊詩曰靡神不宗無所不用其尊之謂也泰壇泰折不謂之宗者天地之大不嫌於不尊也四方者四方萬物之神也方有四而位則有八若乾位西方艮位東北坎位正北震位正東皆陽也坤位西南巽位東南離位正南兊位正西皆隂也故有坎有壇而合以四焉諸侯在其地則祭之亡其地則不祭與王制言諸侯祭名山大川之在其地者同義延平周氏曰月為隂而盛於夜故曰夜明於星謂之幽者以對月而言則月為明而星為幽也水旱必謂之雩者以祭旱為主盖隂中之陽升則為雨故雩祭所以助達隂中之陽者也四坎壇祭四方豈蜡之祭四方百物之神若先嗇之類則祭於壇若水庸之類則祭於坎歟馬氏曰四時有生物之功地主於成物此其所以埋少牢以祭之也禳者所以去其所不欲祈者所以求其所欲以意度之禳在於坎祈在於壇雩者吁嗟以求水旱之辭禜有去之意先王之待水旱人力已至而猶有旱乾水溢則為雩禜以祭之見人力有不勝於天時者也山林川谷丘陵民之所取財用也而又能出雲為風雨而有澤以利於人見怪物而有威以敬於人皆有不可測之神故皆曰神大凡生於天地之間者皆曰命其萬物死皆曰折人死曰鬼此五代之所不變也七代之所更立者禘郊宗祖其餘不變也鄭氏曰折弃敗之言也鬼之言歸也五代謂黄帝堯舜禹湯周之禮樂所存法也七代通數顓頊及嚳也所不變者則數其所法而已變之則通數所不法為記者之微意也少昊氏修黄帝之法後王無所取焉孔氏曰此一節論人死與萬物不同及五代七代變與不變之事總包萬物故曰大凡皆受天之賦命而生故皆曰命萬物無知死皆曰折人為有識故死曰鬼此之名號從黄帝正名百物以來至堯舜禹湯及周所不變更也黄帝以下七代所變易而立者是禘之與郊及宗祖也除此外其餘社稷山川五祀之等不改變也鄭注知七代通數顓頊及嚳者以上云禘郊祖宗有顓頊及嚳又易緯及樂緯有五莖六英是顓頊及嚳之樂故也不變必數所法者以五代以來不變至周亦不變法而象之數所法五代而已前七代變易更立至周亦變易法象故所變者通數顓頊帝嚳所不法象者謂之為七代也長樂劉氏曰易稱乾元資始者萬物資於乾元以為性命之始也又曰坤元資生者萬物資於坤元以為形質之生也是以萬物有不資始于天則無以為命以兆乎其生也故皆曰命焉萬物有命也有性也有形也有氣也及其死則折落顚墜斷而不可續故其死皆曰折焉人也者則與萬物異矣不為情之所遷則其性正矣克盡其性於禮義則其命正矣能正性命則神完矣神完則其存也静與未生同焉其没也神與先不異矣故鬼者歸也歸其根復其元未嘗有夫死折之謂也故其民之死無貴賤也皆曰鬼焉非教化之隆其能鬼之於既哉故曰五代之所變者謂唐虞夏殷周也後世教化不及於五代則有死而與萬物同折者由其變於五代之法乎七代之所更立者禘郊宗祖盖受命而至各有所自不得不變也長樂陳氏曰五代所不變者命與折鬼之名也七代所更立者郊禘祖宗之祭也名生於事之實祭出於人之情黄帝而上事有其實而未必有其名故黄帝正名百物以至堯也舜也夏也殷也周也於其三者之名當同之而不變此所謂五代所不變也伏羲而上有其情而未備其祭故伏羲佃漁以備其祭至於黄帝也神農也堯也舜也夏也殷也周也於其所祭之人有所更立此謂七代更立者也然名則起於黄帝而近祭則起於伏羲而逺者何也盖事之實漸文於後世而人之情固隆於上世此名與祭所以逺近之不同耳嚴陵方氏曰折言其有所毁鬼言其有所歸不變者所命之名也更立者更立所祭之人也名既當於實故無事乎變人既異於世故必更立焉名之不變止自堯而下者盖法成乎堯而已由堯以前其法未成其名容有變也更立不及於黄帝者盖七代同出於黄帝黄帝垂統於上七代更立於下也其餘不變謂天地日月之類前先祖而後宗者逺近之序此先宗而後祖者親䟽之序馬氏曰人與物命於天則同其所以命則異皆曰命者荀子所謂大同名者是也有始必有終有生必有死人物之始命於無而成形於有皆不同也至於死之名不可以不正是以物之死謂之折人之死謂之鬼物死謂之折則生足以自完而已人謂死為歸則知生為行此荀子所謂大别名也夫名者實之賔大初有元無有無名至黄帝正名百物故人物之名分也山隂陸氏曰五代不數堯堯舜一體也故堯典也而謂之虞書禮記集説卷一百八
