body:
  text: 禮記集説卷九十宋衞湜撰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也記曰三王四代惟其師此之謂乎鄭氏曰美惡説之是非也長達官之長弟子學于師學為君也擇師不可不慎師善則善也四代虞夏殷周孔氏曰此一節明為師法君子謂師也敎人至可以為君長之事隨器與之是至學之易隨失而救之是至學之難罕譬而喻言約而達是為美反此則為惡博喻廣曉也知此四事為主觸類長之乃廣有曉解能廣解乃可為人作師為師是學優學優宜仕故能為一官之長治官有功則能為君也師有君徳弟子就師可學為君之徳故宜慎擇其師也三王謂夏殷周四代則加虞雖皆聖人無不擇師為慎故云唯其師引舊記結此擇師之重也横渠張氏曰知學者至于學之難易及知其資質才性之美惡知至學之難易知徳也知其美惡知人也知其人且知徳故能敎人使入徳仲尼所以問同而答異以敎人者必知至學之難易知人之美惡當知誰可先𫝊此誰將後倦此若灑埽應對乃幼而孫弟之事長後敎之人必倦弊唯聖人于大徳有始有卒故事無大小莫不處極今始學之人未必能繼妄以大道敎之是誣也學也者所以學為君也古者雖匹夫若學則必先學正心誠意治國平天下之事此則以道言之也師也者所以學為君也學者斆也所以為敎者莫非王道也王道則非君道而何施于為政其所以輔佐于其君者亦孰非君道長樂陳氏曰學有精麤則其至有難易質有美惡則其喻有淺深知美而喻之則有以長人之善而達才知惡而喻之則有以救人之失而成徳詩曰克明克類克長克君君子知至學之難易以至能博喻所謂克明也能博喻然後能為師所謂克類也能為師然後能為長所謂克長也能為長然後能為君所謂克君也古之為學必自有虞氏始而擇師亦如之是法始乎伏犧成乎堯備于有虞氏而夏殷周特因之而已故先三王而四代次之主三王兼用虞氏故也延平周氏曰知其至學之難易者言其才而知其美惡者言其性知其才知其性然後能不以一類喻之能不以一類喻之然後能為師師者有為長之道長者有為君之道嚴陵方氏曰揚子云學者所以求為君子葢君子者人之成名雖聖人亦不過君子而已必知其事之難易才之美惡然後能博喻于人喻之為義以理喻人而人之所以喻而曉也師之為義以道帥人而人之所以帥而從也且師有道者也長有位者也君有土者也有其道然後可以有其位有其位然後可以有其土君雖有土非有道不足以得之曰師也者所以學為君也學冝讀曰斆斆教也雖尊而為君亦師之所敎焉故擇師不可不慎也三王者禹湯文武也四代者虞夏殷周也指其人則曰王指其世則曰代先言王而後言代者有其人乃有其世故也揚子曰學之為王者事其已久矣堯舜禹湯文武汲汲好學如此誰獨無師乎若舜之于務成昭禹之于西王國湯之于伊尹文王之于臧丈人武王之于太公望則三王四代之師固可見矣李氏曰知至學之難易者循理以造道者也知其美惡者窮理以得道者也故曰然後能博喻能博喻則可以反説約而衆之所依附故曰然後能為長長者有長人之道者也能為長則可以出令正衆故曰然後能為君君者出令以正衆者也故易乾之九二見龍在田君徳也而曰學以聚之問以辯之寛以居之仁以行之寛者居上之道仁者長人之道居上長人之道必自乎學而已慶源輔氏曰人之至于學也順理則易逆理則難習是則美習非則惡知其理之順逆習之是非然後能廣博開喻學者而可以為人師也能為師然後可以為人君則君之為道可知矣彼其以刑法制民而不本之敎化者其君去道逺矣武王曰天佑下民作之君作之師若武王者可謂知君道矣禹湯文武其師善矣若四代之君或善或否皆繫其師之如何此墓門之詩所由作也山隂陸氏曰周官以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民長即此所謂長師即此所謂師牧亦即此所謂君也雍也可使南面葢學之力歟若顔淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞進于是矣彼千乘之國可使治其賦千室之邑百乘之家可使為之宰束帶立于朝可使與賔客言尚未足以語此唯其師言顧其師如何耳新安朱氏曰今詳經文但能為師以敎人則能為君以治人耳擇師不可不慎言能為君者其人難得故不可不擇也永嘉戴氏曰君師長三者雖不同皆以敎化其民然不明乎義理不察乎人心雖欲施實徳于民不可得也是故君子先知其理之難易而又知其人之美惡然後能旁取曲譬以開導人心然後可以為師矣出而長民上而為君復以斯理敎民為善夫豈有二道哉大抵君子為學貴于有用也有民人有社稷則有君國子民之道焉是以仲弓可使南面而子路冉有自謂治國故師也者所以學為君也惡可不謹擇其人哉三王四代皆以擇師為重况其下者乎金華應氏曰洞達人情事理然後可以教人能敎人則亦可以服人而為長能服人則亦可以治人而為君凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣于其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔于天子無北面所以尊師也鄭氏曰嚴尊敬也尸主也為祭主也尊師重道不使處臣位也武王踐阼召師尚父而問焉曰昔黄帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣王齊三日端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言孔氏曰此一節論師徳既善雖天子以下必須尊師此文義在于師并言尸者欲見尊師與尸同也不當其時則臣之案鉤命決云暫所不臣者五謂師也三老也五更也祭尸也大將軍也天子諸侯同之此據尊師與尸相似故特言之詔告也雖天子至尊當告授之時天子不使師北面所以尊師也鄭註武王踐阼以下皆大戴禮武王踐阼篇文有小異存乎意言意恒念之丹書赤雀所銜丹書也濓溪周氏曰師道立則善人多善人多則朝廷正而天下化矣横渠張氏曰王人將王命乃在諸侯之上非尊是人葢尊命也匹夫𫝊道雖矢子無北面亦非尊是人葢尊道也王者事天如事君故為師弗臣不必師傅之官但問所不知皆師之道便不以臣禮處之嚴陵方氏曰嚴即尊也嚴師即雖詔于天子無北面是矣以一人之貴而師匹夫之賤以四海之富而師環堵之貧此嚴師所以為難也嚴師者人嚴之也人嚴其師則師道嚴矣師所以𫝊道故師嚴然後道尊學所以為道故道尊然後民知敬學以神言之故為尸則弗臣以道言之故為師則弗臣此篇有曰大學之道有曰大學之敎有曰大學之法有曰大學之禮何也葢道以言其位敎以言其術法以言其治禮以言其文永嘉戴氏曰此一段為人君尊師言非學者事也以人君而尊師若此學者可知矣大抵古人行禮有敎化存焉嚴師固所以尊道尊道則民知敬學率天下之人而皆知敬學天下豈不大治是故先王養老尊賢之義非特為其人也皆所以令衆庶見也夫君之尊天也而君之于臣有答拜之禮臣之卑地也而臣之于君有無北面之義然則古人于君臣之際亦淵乎其有意矣尊君卑臣其殆始于後世乎上下曠闊而交泰之情䟽堂陛尊嚴而臣鄰之意薄先王之時仕而未有禄者君有饋焉曰獻使焉曰寡君而况于尊師乎慶源輔氏曰凡學之道則非獨君也嚴師為難葢言盡嚴師之道為難耳非心悦誠服致敬盡禮如七十子之于孔子不可也能盡嚴師之道則師始嚴師所以𫝊道師嚴則道自尊道未嘗不尊也因其尊而尊之則繫人之嚴師也師嚴道尊然後斯民皆將興起于學是故古之人君必自其師以致其誠敬也道尊然後民知敬學所以極言之也盱江李氏曰善之本在敎敎之本在師師者所以制民命其可以非其人哉古者家有塾黨有庠術有序國有學為民立師也學校廢師不命于上而學者自擇焉識不至擇不精是能言之類莫不可師也然則父儒而子跖朝華而暮戎何足怪哉善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之鄭氏曰從隨也庸功也孔氏曰自此至之道也一節明善學及善問并善答不善答之事善學謂聰明易入者師體逸豫而已之所解又倍于他人故恒言師特加功于己不善學者己既闇鈍故師體勤苦而功裁半于他人又反怨師獨不盡意于我也延平周氏曰善學者不自以為功不善學者不自以為過嚴陵方氏曰顔淵聞一以知十子貢告往而知来所謂師逸而功倍也顔淵曰夫子奔逸絶塵而回瞠乎若在其後子貢則曰夫子之不可及也猶天之不可階而升所謂又從而庸之也以其有功于我我故庸之有徳于我我故徳之也馬氏曰博學而篤志所謂善學也善學者務其本務本則道立故其為敎也長善而已不必救其失故師逸而功倍廬陵胡氏曰庸謂用師之道見于日用也怨若陳子禽毁仲尼永嘉戴氏曰此一段為學者言也不善敎而非學者則敎者固失矣不善學而咎其師亦非敎者罪也夫子曰予欲無言論語亦曰子所雅言詩書執禮葢聖人欲以無言敎學者不得已形于言亦曰詩書執禮而已師何其逸也七十子之徒中心悦而誠服其有功于學者若此古人樂得天下英才而敎育之為是也莊周之學未必出于子夏李斯之罪豈盡出于荀卿今謂莊周者推原所自歸過子夏罪李斯者以荀卿為誅首然則取友必端為師者其難哉慶源輔氏曰顔子曰夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也己所謂又從而庸之也公孫丑曰道若登天然似不可及也何不使彼為可㡬及而日孳孳也所謂又從而怨之也善問者如攻堅木先其易者後其節目及其久也相説以解不善問者反此善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲不善答問者反此此皆進學之道也鄭氏曰善問謂先易後難以漸入也從容從讀如富父舂戈之舂舂容為重撞擊也始者一聲而已學者既開其端意進而復問乃極説之如撞鐘之成聲矣從或為松孔氏曰問謂論難也攻治也善問者如匠善攻堅木先斫治其易處然後及于節目問者順理答者分明及其經久師徙共相愛説以解義理若不善問之人與能問者意反也善能答問難者如鐘之應撞亦隨彼所問事之大小而答之横渠張氏曰問學亦須𤼵端不𤼵端則無以起論議葢道若大路如不因端則指何者為先須是攻堅而不入有疑而未判者如此𤼵問乃有得也善待問者如撞鐘洪鐘未嘗有聲由叩乃有聲聖人未嘗有知由問而有知答問者必知問之所由故所答從所問言各有所當也大鳴小鳴因所叩也不必數數告語待其来問至當皆實見處故易以喻所謂待其從容然後盡其聲嚴陵方氏曰節則木理之剛者説卦所謂為堅多節是矣目則木理之精者弓人所謂斵目必荼是矣皆其至堅難攻之處也茍先其易攻之處則其難者亦相説以解矣欲其因徼以入乎妙由淺以極其深故也從非牽也容非廹也待其從容然後盡其聲則隨其所感而為之應進之以漸而不以頓故也善問者則足以進己之學善待問者則足以進人之學故曰皆進學之道延平周氏曰善問者知先後之序善待問者小以成小大以成大馬氏曰切問而近思所謂善問也于吾言無所不説所謂相説以解也山隂陸氏曰説息也言師弟子相與委蜕于言意之表從讀如從容之從昔子路初見孔子以為不若已居二年以為與己等居三年然後知不如若此可謂從容矣老子所謂為學日益是歟廬陵胡氏曰鐘隨叩而應能待問者亦隨問而答從容謂再三叩也間𫝊云大功之哭三曲而偯偯聲餘從容也盡其聲謂無𨼆也如以莛撞鐘而應之以大葢不善答問者新安朱氏曰善問者如攻堅木先其易者後其節目非特善問讀書求義理之法皆然置其難處先理㑹其易處易處通則堅節自迎刃而解矣若先其難者則刃頓斧傷而木終不可攻縱使能攻而費工竭力無自然説而解之之效終亦無益于事也相説而解説只當如字而解音解葢義理相説之久其難處自然觸發解散也又曰從容註説非是正謂聲之餘韻從容而將盡者也言必答盡所問之意然後止也永嘉戴氏曰古人論學必繼以問故曰學問中庸曰博學之審問之論語曰博學而篤志切問而近思葢學者以問為功疑思問問思難故問者進徳之階也然非學者善問敎者善答則雖問無益也善問者如攻堅木去其枝葉尋其脉理難易節目皆有次第而不求欲速之功善待問者如撞鐘公而無我虚而善應洪纎髙下隨叩而答從容而後盡其聲如此則進學之道也慶源輔氏曰今之治木者猶然柔者既去然後堅者可脱而解矣故曰相説以解音悦恐非説則以學者言矣以後譬觀之不然撞鐘者以莛撞之則其聲小以楹撞之則其聲大聲之大小雖不同然必待問者之從容然後盡其聲焉若亟撞之則未有能盡其聲者也夫子之答門弟子固未嘗同也然非禮勿視勿聽勿言勿動之言必發于請問其目之後自古皆有死民無信不立之説必待其問于斯二者何先然後語之也問者答者皆得其理然後學者有可進之道也一或不善則失是矣然則學者之無功又非特不善學者之罪也記問之學不足以為人師必也其聽語乎力不能問然後語之語之而不知雖舎之可也鄭氏曰記問謂豫誦雜難雜説至講時為學者論之此或時師不心解或學者所未能問也聽語必待其問乃説之舎之須後孔氏曰此一節論敎者不可為記問之學記問謂逆記他人雜問為人解説無益學者聽語謂聽其問者之語依問為説也受業者才力不能見問待憤悱之間師然後語之語之不能知且舎住待後别更語之也河南程氏曰記問文章不足以為人師以其所學者外也所謂師者何也曰理也義也嚴陵方氏曰記者得諸言而非得諸心問者資諸人而非資諸已是特學者之事若夫敎者則得之于心而寓之于言取之于己而𫝊之于人者也聽語者聽其所問然後語之以言也彼無問則我無言矣易曰匪我求童蒙童蒙求我其聽語之謂乎敎人之道固聽其所問然後語之以言至于力所不能問者敎者將舎之乎亦曰語之而不知然後舎之而已聽所問而語之者敎者之義也力不能問而語之者敎者之仁也山隂陸氏曰聽之而覺語之而知非記問之學也力不能問然後語之非不欲問也力不能問耳子曰吾有知乎哉無知也有鄙夫問于我空空如也我叩其兩端而竭焉李氏曰記問者記而得問之謂也夫人之才性有明暗之殊而其學有淺深之異或學博矣而約有所不能知體矣而用有所不備可告之詳者不待三隅而反可告之畧者不叩其兩端而竭滯學而不知本則語之以貫于心務本而不知學則語之以求于學此所謂聽語也可與言而不與言失人故才有不足而志至焉者斯可告矣故曰力不能問然後語之孔子之于鄙夫近是焉至于才不足而志不至則不可告也故曰語之而不知雖舎之可也孔子之于孺悲近是矣此君子之所謂不屑敎者也力不能問而後語之所以不失人語之而不知則舎之所以不失言也夫君子之敎人或聽之或語之或舎之其欲成之一也永嘉戴氏曰昔人有言經師易得人師難遇若記問之學足以為人師則學者求諸簡編可也何以師為是故闔闢造化之功全在敎語唯諾之間其力能問者因問以致啓發之功其不能問者告語以開其欲問之意力不能問而語語之而彼不知則教者無所施其力矣雖舎之可也舎之以須其後猶為不棄也世人皆知誦説之為學而不知遊息之為學皆知答問之為敎而不知不屑之為敎此敎學之所以難也慶源輔氏曰記問之學如前呻其佔畢多其訊言及于數是也記問之學據己所有者以告人聽語者因人之所疑以啓之孟子所謂知言是矣詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮此非心與道一而尺度權衡之在我者不足以與此也知言則其義精矣彼有質朴而訥于言雖有所欲問而力不能發者必有以知其情不待其問而語之如孔子曰吾道一以貫之是也如此而語之未有不知者也故曽子一唯之外口耳俱䘮若夫雖欲語之而彼無以受之則止而不以告非謂其既語而彼亦不知乃己也舎如字良冶之子必學為裘良弓之子必學為箕始駕馬者反之車在馬前君子察于此三者可以有志于學矣鄭氏曰必學為裘仍見其家錮補穿鑿之器也補器者其金柔乃合有似于為裘必學為箕仍見其家撓角幹也撓角幹者其材宜調調乃三體相勝有似于為楊栁之箕也孔氏曰此一節論學者數見數習其學則善故三譬之良善也冶謂鑄冶也裘謂衣裘也積世善冶之家子弟見其父兄世業鋾鑄金鐡使之柔合以補治破器皆令全好故能學為袍裘補續獸皮片片相合以至完全也為弓之家使角幹撓屈調和成弓故其子弟亦學取栁和軟撓之成箕也始駕馬明新習者也駕馬之法大馬本駕在車前今馬子始學駕車繫隨車後而行故云反之車在馬前所以然者此駒未曽駕車若忽駕之必驚奔今以大馬牽車于前使駒日日見車之行慣習而後駕之則不復驚也學者亦須先敎小事如操縵之屬然後示其業則道易成也上三事皆須積習非一日所成君子察此則可有志于學矣横渠張氏曰良冶之子不見異物而遷裘當為毬沙土之範模長樂陳氏曰裘非一腋之所能成理非一物之所能備故為裘所以譬明理也箕待揉然後成性待脩然後善故為箕所以譬脩性也馬觀于車然後可以駕行識于所往而後能行故駕馬所以譬其善行也葢明理而後能脩性能脩性然後能見于行君子察于此三者可以有志于學矣延平周氏曰為裘則所資者不一所資者不一故象其道問學為箕則所因者自然所因者自然故象其尊徳性車在馬前有觀而化之之意君子察此三者則可以有志于學矣李氏曰合皮以為裘合金以為器其合則同而裘有異于冶析栁以為箕析木以為弓其析則同而弓有異于箕學者自麤而入精故學冶者先為裘學弓者先為箕始駕馬者未嘗馭者也故車在馬前趨有近于馭故始駕馬者先觀趨此為學之次也至于鍾鼎之齊不可以為斤斧大刃之齊不可以為鑒燧以之為器則新而無窮敝而無惡以之為刃則倨而可入勾而可決長外而堅短内而疾以之為鍾則薄厚之所震動清濁之所由出侈弇之所由興皆有説以之為量則可以權可以準可以鬴莫不有法以之為甲則其裏易其朕直櫜之而約舉之而豐衣之而無齘此冶之良也冶至于良則非為裘者之所能知也析幹必倫析角無邪斵目必荼其液厚其節帤方其峻髙其柎長其畏薄其敝其和至于無灂其應至于無己此弓之良也弓至于良則非為箕者之所能至也得之于銜應之于轡得之于轡應之于手得之于手應之于心不以目視不以䇿驅進退履繩尺而周旋中規矩輿輪之外可使無餘轍馬蹄之外可使無餘地此御之良也馭至于良則非趨者之所能任也雖然學冶必始于裘學弓必始于箕學馭必始于趨葢其學有漸次耳故曰君子察于此三者可以有志于學矣永嘉戴氏曰夫子曰性相近也習相逺也夫三子言性止曰性而已獨夫子性習兼言之此其所以善論性也夫人性不甚相逺善惡之分全繫乎習習與性成久而自然人知其為性不知其為習也良冶之子必學為裘良弓之子必學為箕人情皆然也始駕馬者反之車在馬前物理亦然也少而習之長而安焉耳目見聞轉移心志而不自知是故學者貴乎習也觀聽以習其外涵泳以習其内徳之不進未之有也故曰麗澤兌君子以朋友講習為兌此時習之所以説也慶源輔氏曰良冶之子必學為裘良弓之子必學為箕至于馬之子則不能然也雖然茍有以調習之則亦無不能也此見人獸之異君子而能察夫弓冶之賤必學為箕裘之業馬之子異于人矣而有以調習之亦皆安于牽駕之事則可以有志于學矣葢學乃君子當為之事也可以勉之之辭古之學者比物醜類鼓無當于五聲五聲弗得不和水無當于五色五色弗得不章學無當于五官五官弗得不治師無當于五服五服弗得不親鄭氏曰比物醜類以事相況而為之也醜猶比也醜或為計當猶主也五服斬衰至緦麻之親孔氏曰此一節論弟子當親師之事上明學者仍見舊事又須以時事相比方也物事也古之學者以同類之事相比方則事學乃易成既云古學如斯則今學豈不然以下四事皆比物醜類也鼔革也五聲官商角徴羽也言鼓之為聲不宫不商故言無當于五聲而五聲不得鼓則無諧和之節五聲與鼓俱是聲類即是比類也水謂清水也五色青赤黄白黒也章明也清水無色而五色畫繢者不得水則不明五色是其水之出故五色須水亦其類也五官金木水火土之官也學先王之道非主于一官五官不得學則不能治故化民成俗必由學能為師然後能為君長故官是學之類也五服斬衰齊衰大功小功緦麻也師于弟子不當五服之一人若無師敎誨則五服之情不相和親也師情有在三年之義故亦與親為類横渠張氏曰比物醜類須學者至明乃能之五官弗得不治施于天官而天官治施于地官而地官治不主于一官長樂陳氏曰類者物之所同也醜之為言衆也理有所不顯則比物以明之物有所不一則醜類以盡之夫然後因理以明道而善乎學矣夫聲中于宫觸于角驗于徵章于商宇于羽其聲濁者尊其聲清者卑非得鼓為之君而唱節之則五聲雖奏而不和者有矣夫色青于震白于兑赤于離黒于坎黄于坤相有以章相無以晦非得水為之主而潤色之則五色雖施而不章者有矣耳目口鼻形能各有接而不相能者是之謂五官心居中虚以治五官是之謂天君葢五官不思而蔽于物物交物則引之而已善假學以治之使目非是無欲見斯徹而為明矣使耳非是無欲聞斯徹而為聰矣使口非是無欲言斯𨽻乎善矣使心非是無欲慮斯凝于神矣五服也或以恩以義而制或以節以權而制升數有多寡嵗月有久近凡稱情為之隆殺而已非假師以訓迪之則五服之制不明于天下而學士大夫欲短䘮者有之此百姓不親五品不遜所以有待契之敷敎也總而論之鼓非與乎五聲而五聲待之而和水非與乎五色而五色待之而章學非與乎五官而五官待之而治師非與乎五服而五服待之而親是五聲五色五官五服雖不同而同于有之以為利鼔也水也學也師也雖不一而一于無之以為用然則古之學者比物醜類而精微之意有寓于是非夫窮理之至者孰能與此記之論學多譬喻以明之言玉不琢不成器取其有質者言之善問者如攻堅木取其有理者言之嘉餚取其有味者言之鐘鼓取其有聲者言之川與水取其有本者言之官與服取其在身者言之蛾子與馬取其動物言之弓冶與車取其成器言之葢君子知至學之難易而知其美惡然後能博喻能博喻然後能為師永嘉戴氏曰比物醜類本不足以為學然察于萬物而見義理之當然則心通意曉有所信而必為此敎者所以貴于博喻也天下之理固有不相為而實相用者如鼓之于五聲水之于五色是也學何有于五官然視聽言貌思非學則不得其正師何與于五服然五服隆殺非師則恩義不篤學者茍知五聲非得鼔則聲不和五色非得水則色不章將以治五官安得不從事于學將以親五服安得不有賴于師邪嚴陵方氏曰五聲之清濁固所以相和也然非鼓以作之則弗得其和而乖矣五色之淺深固所以成章也然非水以潤之則弗得其章而𨼆矣五官之異用固所以相治也然非學以明之則弗得其治而亂矣五服之異等固所以相親也然非師以敎之則弗得其親而䟽矣以鼓況學以水況師五聲以之況五官五色以之況五服是皆比物醜類之道也金華應氏曰聲以鼓而震色以水而發身以學而治族以師而親皆若緩而甚急若不相關而不可廢也君子曰大徳不官大道不器大信不約大時不齊察于此四者可以有志于本矣三王之祭川也皆先河而後海或源也或委也此之謂務本鄭氏曰不器謂聖人之道不如器施于一物不約謂若胥命于蒲無盟約不齊或時以生或時以死有志于本謂本立而道生以學為本則其徳于民無不化于俗無不成也源泉所來也委流所聚也始于一勺卒成不測孔氏曰此一節論學為衆事之本記者引君子之言也大徳謂聖人之徳官謂分職在位聖人在上垂拱無為不治一官故云大徳不官器各施其用聖人之道𢎞大無所不施故云不器論語云君子不器又云博學而無所成名是也大信謂聖人之信約謂期要也大信不言而信孔子曰予欲無言天何言哉四時行焉是大信也不為細言約誓故云不約也大時謂天時也齊謂一時同也春夏華卉自生薺麥自死秋冬草木自死薺麥自生故云不齊若能察此在上四者之事則人當志學為本也三王祭百川之時皆先祭河後祭海或先祭其源或後祭其委河為海本源為委本總之則皆曰川也源委為河海之外諸大川也或解云源則河也委則海也申明先河而後海義亦通矣先祭本是務重其本本小而後至大是小為大本先學然後至聖是學為聖本也案􅁃氏曰不官為羣官之本不器為羣器之本不約為羣約之本不齊為羣齊之本四者莫不有本人亦以學為本也長樂陳氏曰大徳無事于事故不官大道妙于無體故不器大信無必而唯義所在故不約大時無固而唯變是適故不齊由徳以至道則入神而無為由信以至時則致用而無不為此四者先後之序也不官不器者道徳之本而入于器主于事者皆道徳之末不約不齊者時信之本而言必信行必果者皆時信之末猶之河與源者海與委之本海與委者河與源之末末雖君子之所不忘而本則君子之所志是故末之所不忘則存乎學本之所志則存乎道學則日益道則日損夫推本之事至于此則君子之道成矣嚴陵方氏曰大徳不官不拘于所守也大道不器不拘于所用也大信不約不拘于所期也大時不齊不拘于所遇也徳之大者無入而不自得若孔子可以仕則仕可以止則止是矣道之大者無往而不通若孔子小以成小大以成大是矣信之大者則無可無不可若孔子不言而信是矣時之大者則唯理之適若孔子聖之時是矣唯其不官故無所不官唯其不器故無所不器唯其不約故無所不約唯其不齊故無所不齊此其所以謂之大而為之本河也海也源也委也名雖不同合而言之皆集衆流而已故總以為祭川焉孟子言源泉混混不舎晝夜有本者如是此以祭川況務本固所冝矣山隂陸氏曰大徳大道大信大時凡所道之事也于學之終篇言此者將以道學也老子曰絶學無憂夫守古人之糟粕而不能逺離者猶蟲縷詩書不能自化安能化民不能自成安能成俗有見于學又有見于本可謂君子矣作記者以是終焉以此彼不知因心㑹道而溺于末流之弊者學之失也源所出者河是己委所歸者海是已爾雅曰河出崑崙虚色白所渠并千七百一川色黄百里一小曲千里一曲一直葢君子之于學無以貫之則無源無以聚之則無委無源非也無委亦非也故曰以予為多學而識之者與予一以貫之又曰寡聞無約也寡見無卓也然三王祭川皆先河而後海則先後緩急可知故曰形度數古人有之而非所以先也新安朱氏曰註説非是但言大徳者不但能専一官之事若荀子所謂精于道者兼物物也大信不約謂如天地四時不言而信者也先河後海者以其或是源故先之或是委故後之䟽有二説此説是也慶源輔氏曰學固不可無漸敎固不可無等然亦不可不使之知其本也故舉此四者使之察之而有所志焉可以者勉辭也此與中庸云上天之載無聲無臭同意祭川亦比物之意由是觀之則學者固不可不知所謂本也四明沈氏曰學記之末聖人始以此四者示學者大意欲學者離言語舎形迹而求大本也大則不可以一端名一曲取造形而悟絶物離迹而立于獨矣此正是學者事呉興沈氏曰海者源也河者委也昔有人問何以謂海為源應之曰海者水之所㑹也其河之所流者皆其泉脉也譬之人之一身元氣則其海也其經絡則其河也元氣不充實則經絡不運行矣謂經絡為源則非也謂元氣為委則非也鄭氏謂源者泉所出委者流所聚葢不知吾之説也然則所謂先河而後海者以河之近故先祭之海之逺故後祭之非固後之也亦務其本者當如是也永嘉戴氏曰官如禮樂明備天地官矣之官器如形而下者謂之器之器不約如上古結繩之信大時如堯舜揖遜湯武征伐之時皆深造本源不累形迹君子察此豈得不用志于本源之學自斆學而至于罔覺自文章而至于不可得聞前日所謂善學善問至此皆不足道矣又曰河流入海三王祭川先小後大重本也學記之論由末以造本大學之論自本以徂末其為敎則一也禮記集説卷九十
