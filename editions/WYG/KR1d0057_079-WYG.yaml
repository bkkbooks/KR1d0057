body:
  text: 禮記集說卷七十九宋衛湜撰明堂也者明諸侯之尊卑也鄭氏曰朝於此所以正儀辨等也孔氏曰欲顯明諸侯之尊卑故就尊嚴之處以朝之大司馬職云設儀辨位以等邦國山隂陸氏曰諸侯阼階之東西面北上諸伯西階之西東面北上是之謂明諸侯之尊卑若諸侯北面而見天子曰覲諸公東面諸侯西面曰朝異是矣昔殷紂亂天下脯鬼侯以饗諸侯是以周公相武王以伐紂武王崩成王幼弱周公踐天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服鄭氏曰脯鬼侯謂以人内爲薦羞惡之甚也踐猶履也頒讀爲班度謂丈尺髙卑廣狹也量謂豆區斗斛筐筥所容受也孔氏曰此一節明周公有勲勞之事周本紀鬼侯作九侯家語云武王崩成王年十三鄭康成以爲年十歲周公攝政三年天下太平六年始制作者書傳云周公將制禮作樂優游三年然後營洛邑以期天下之心於是四方民大和㑹周公曰示之以力役且猶至而况導之以禮樂乎其度量六年則頒故鄭註尚書康王之誥云攝政六年頒度量制禮樂成王即位乃始用之也嚴陵方氏曰紂之亂不止於脯鬼侯蓋舉其甚者以明武王之所以伐也詩言維師尚父時維鷹揚涼彼武王肆伐大商則相武王者不止周公經之所言將以明周公之勲勞爾幼言其年之未長弱言其才之未强人生十年曰幼學二十曰弱冠武王卒成王年十三則處於幼弱之間不曰居天子之位而曰踐者與文王世子言踐阼同義所謂鬼侯豈髙宗所伐之鬼方與攝政六年始朝諸侯於明堂者將以七年致政於成王故也必待天下大服然後致政周公之志槩可見矣禮寓於形容制之然後其形成樂寓於聲音作之然後其聲出度量寓於器用頒之然後其用廣器之所宜頒者不止於度量有規矩權衡準繩止一二者為言何也蓋度者分寸丈尺引也以之度長短故謂之五度其形則起於璧羨而禮寓之矣量者龠合升斗斛也以之量多少故謂之五量其聲則中於黄鍾而樂寓之矣先王以為度量不存則禮樂之文熄故作此使天下後世有考然則禮樂者出自度量度量者寓諸禮樂此主乎禮樂故止言度量而已山隂陸氏曰秦誓三篇數紂之惡初曰焚炙忠良刳剔孕婦次曰剥喪元良賊虐諫輔後曰斮朝渉之脛剖賢人之心放黜師保囚奴正士今曰脯鬼侯而已則以明堂朝諸侯故也明堂所含義衆所謂明諸侯之尊卑亦以此孟子言伊尹說湯以伐夏救民故書伊尹主伐事伊尹相湯是也孟子言周公相武王誅紂伐奄故記以周公主伐事周公相武王是也若太公者涼彼武王而已所謂涼於力爲薄成王雖㓜不弱公不復踐天子之位也且成王弱武王託孤在公公於是焉辭攝以爲潔則可也以爲聖人則不足矣六年朝諸侯蓋自成王除喪始至是六年也周官曰六年五服一朝即此朝於明堂蓋城王諒闇百官緫己以聽周公自其常禮及喪畢成王尚幼是以周公權冝踐天子之位制禮作樂作陽也制隂也隂制而陽作之禮樂之事也石林葉氏曰天子三朝外朝以大詢内朝以日視朝燕朝退而聽政諸侯來朝則見於大廟明堂以頒朔而已周公攝政七年成王既冠將復辟而歸以天下知周公攝政之久未知成王之尊於是因六年五服之朝合九夷八蠻六戎五狄之君而並見然猶不敢正大廟之朝是以即明堂而權制其位蓋天子無事四時之朝見於廟歲以一服有事而㑹不廵狩而同則爲宫於郊設方明而祭之蕃服世一見未有與諸侯併朝者也司士所掌朝儀之位與朝士所掌外朝之法皆自有定制明堂位蓋周公之爲故記禮者以爲周公朝諸侯之位其曰負斧扆南鄉而立是雖仍攝政之稱謂公曰天子然負扆而立則成王自不失南面而坐周公但從成王立於其側耳中間言武王崩成王㓜弱周公踐天子之位者亦與成王同坐立於斧扆之間周公曷嘗正天子之位而居之乎禮所記甚明陋儒初不悟雖荀卿猶云周公履天子之籍若固有之以爲以枝代主君臣易位學者由是紛紛至於今有異言何周公之不幸也長樂陳氏曰昔周公作禮樂以爲將大作恐天下莫我知也將小作是爲人子不能揚父之功徳也故優游三年而不能作然後營洛以期天下之心而四方諸侯各率其黨以攻其廷示之力役且猶至此況導之以禮樂乎此六年朝諸侯於明堂所以制禮作樂頒度量於天下也蓋律吕之器寓於隂陽隂陽之數周於十二陽六爲律隂六爲吕其本於黄鍾一也故度起於黃鍾之長其方象矩所以度長短也禮之意寓焉量起於黄鍾之龠其員象規所以量多寡也樂之意寓焉禮雖起於度未有不資於量故荀卿論禮必齊以度量樂雖起於量未有不資於度故樂記論樂必稽之度數王制謂用器兵車不中度布帛廣狹不中量皆禮之所禁典同以十有二律為之度數十有二聲為之齊量皆樂之所本是禮樂道也度量器也周公制禮作樂而頒度量則以道寓器以器明道夫然後天下得以因器㑹道中心說而誠服矣語所謂謹權量四方之政行焉者此也方其始頒也出以内宰掌以司市及其既頒也慮其或不一也以合方氏一之慮其或不同也以行人同之其同民心出治道如此天下惡有不大服者哉然此特禮樂與政而已未及夫刑也禮樂刑政相爲表裏而王道備其極未始不一也故又以服大刑而天下大服終焉樂書新安王氏曰書𫝊稱五年營成周六年制禮作樂七年致政於成王明年王乃即政以周書洛誥等篇考之不合此稱六年朝諸侯於明堂七年致政於成王亦未可盡信洛誥稱在十有二月周公誕保文武受命惟七年則七年致政明矣然七年春召公營洛周公乃命殷民丕作則大誥東征殺武庚命微子於是唐叔得禾王命唐叔歸於周公其事皆在六年至七年春方營洛邑則朝諸侯於明堂決不在六年也講義曰制禮樂以暢中和之化頒度量以一天下之俗七年致政於成王成王以周公爲有勲勞於天下是以封周公於曲阜地方七百里革車千乘命魯公世世祀周公以天子之禮樂鄭氏曰致政以王事歸授之王功曰勲事功曰勞曲阜魯地上公之封地方五百里加魯以四等之附庸方百里者二十四并五五二十五積四十九開方之得七百里革車兵車也兵車千乘成國之賦也詩魯頌曰王謂叔父建爾元子俾侯于魯大啓爾宇爲周室輔乃命魯公俾侯于東錫之山川土田附庸又曰公車千乘朱英緑縢世世祀周公以天子之禮樂同之於周尊之也魯公謂伯禽孔氏曰洛誥云朕復子明辟是以王事歸授之也自此以下皆為周公有勲勞之事故成王特賜魯家用天子之禮兼四代服器案費誓序云魯侯伯禽宅曲阜又臣瓉註漢書云魯城内有曲阜逶迤長八九里魯受上公五百里之封又加四等附庸四等謂侯伯子男也案大司徒註云公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同緫爲二十四同同謂百里也既受五百里之封五五二十五爲二十五同又加二十四同故云積四十九開方計之得七百里案左𫝊云成國不過半天子之軍案論語千乘之賦居地方三百一十六里有畸諸侯之地三百里而下未成國也公則五百里侯四百里計地餘有千乘謂之成國鄭引詩魯頌閟宫文證魯廣開土宇兵車千乘同之於周者謂同此周公於周之天子也知魯公謂伯禽者伯禽歸魯周公不之魯故公羊文十三年傳封魯公以爲周公也周公拜乎前魯公拜乎後曰生以養周公死以爲周公主然則周公之魯乎曰不之魯也曷爲不之魯欲天下之一乎周也長樂劉氏曰周公攝天子之政於外抗世子之法於伯禽習成王以君天下之道於内成王有過則撻伯禽而教法行焉道徳立焉成王由是以大成也生其身者武王也成其徳存其位者周公也蓋二十有二始聽天下之政而周公復歸臣位者禮北面以事成王然未足盡周公之芳烈也攝政七年緝文王之舊政廣敷於四海以盡其性以順天命三才由之各安其位萬彚由之各遂其生然後采唐虞夏殷之善法緝熙有周之猷爲以成一代之典著於六官以遺成王俾踐於躬以爲萬世仁民之矩度措周之徳隆於唐虞距今未有能迨之者文武成康之徳遂配於天地覆載萬物無有窮也者周公之芳烈也故成王以周公有勲勞於天下者以此山隂陸氏曰先儒謂武王十二月崩成王年十歲三年之喪二十五月而畢則成王喪除年十三矣周公於是乃攝政至此七年王二十矣故以王事歸授之王王功曰勲言勲則國功民功從之矣事功曰勞言勞則治功戰功從之矣嚴陵方氏曰七年致政於成王即洛誥言惟周公誕保文武受命惟七年是矣周公之功格于上下宜成王有以報之詩言建爾元子俾侯于魯若是則封周公之子而已然封周公之子以承周公之祀是乃所以封周公歟故經之言如此孟子言齊魯之地方百里蓋伯禽以侯爵受封故也周官大司徒言諸侯之地方四百里其食者參之則其食者百里矣王氏謂并附庸言之則為四方百里孔子以為顓臾昔者先王以為東䝉主且在邦域之中以為東䝉主非魯有其地也且在邦域之中則附庸故也并附庸止於方四百里而此又言方七百里者是亦兼附庸而已以理推之并附庸而方四百里者侯之常封也并附庸而方七百里者非常之封也以諸侯則常封而已詩言錫之山川土田附庸以其出於非常故特曰錫焉詩言俾侯于魯書言魯侯伯禽則魯受侯爵也明矣然魯既受爵而此又或稱魯公者蓋公侯皆有國者之所通以伯子男之稱侯則侯之稱公不為過矣國君之子稱公子亦以是也革車兵車設之以革也千乘謂出千乘之賦也井田之法方里為井十井為乘百里之國適千乘也出車賦以給軍故以革車言之詩又言公車千乘者以輸國言之則曰公車以給軍言之則曰革車其實一也慶源輔氏曰始言周公相武王伐紂未至於天下大服則公之職未終也然則周公之攝也欲終己事而已終己之事所以終文武之事成王以流言之故始蓋有疑於周公矣及其感金縢之事視天變之速然後悔其前日之非既悔而褒崇周公故不能無過當命魯公世世祀周公以天子之禮樂豈以周公常攝天子之位邪非周公之意矣盱江李氏曰或問魯用王禮如何曰成王以周公勲勞命魯世世祀周公以天子之禮樂周公尊矣故稱文王郊后稷皆倣王禮而不備焉周公而上王祀可也魯頌曰皇皇后帝皇祖后稷饗以騂犧是饗是冝降福既多安有非禮而頌之云乎周公而下則僭矣隱五年九月考仲子之宫初獻六羽公問於衆仲始用諸侯禮也新安王氏曰此漢儒夸辭不可信也周禮雖曰諸公之地五百里蓋兼附庸言之然其制實未嘗行故孟子曰周公封於魯太公封於齊為方百里安得有七百里之地而封之天子之畿方千里其地百同魯之地若方七百里凡四十九同蓋半天子之國矣且周公身為三公又為東伯是謂上公周公既没伯禽乃是魯侯列侯之國方七百里非特成王不以封魯伯禽亦不敢受也魯頌所謂公車千乘公徒三萬其辭不無溢美天子地方千里謂之萬乘若魯地方七百里半天子之畿何止有車千乘耶伊川程氏曰成王之賜伯禽之受俱非也以愚觀之成王未必賜伯禽未必受蓋魯人僭用天子禮樂耳是以魯君孟春乗大路載弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也鄭氏曰孟春建子之月魯之始郊日以至大路殷之祭天車也弧旌旗所以張幅也其衣曰韣天子之旌旗畫日月帝謂蒼帝靈威仰也昊天上帝魯不祭孔氏曰下云季夏六月禘禮若是夏之季夏非禘祭之月即是周之季夏明此孟春亦周之孟春又雜記孟獻子曰正月日至以有事於上帝故鄭知建子之月也郊特牲云周之始郊日以至鄭既破周為魯故此云魯郊日以至祭天尚質大路一就知是祭天所用尊敬周公故用先代殷禮牲用殷白牡車乗殷大路也弧以竹為之其形為弓以張縿之幅故考工記弧旌枉矢以象弧也此弓衣謂之為韣周禮日月為常又王建大常此云日月之章與天子同也后稷唯配靈威仰不配昊天上帝故知魯不祭嚴陵方氏曰周制郊以建子之月所以迎其氣之生禘於建巳之月所以順其位之正此魯所以於孟春祀帝於郊季夏禘周公於大廟魯人郊禘不用周之牲路而用商之牲路何也蓋止用時王之禮者諸侯之事通用先王之禮者天子之事經言天子之禮其以是歟故郊特牲言諸侯祭以白牡乗大路而謂之僭也凡旂建於車者皆言載此曰載弧韣旂則以建之於大路故也覲禮言載龍旂弧韣則與此同義十有二旈則天之數也日月之章則天之明也郊所以明天道其謂是歟周官司常日月為常交龍為旂此言日月之章謂之載常可也乃謂之載旂者常謂之旂猶公侯伯子男通謂之諸侯歟且大司馬言王載大常諸侯載旂魯公以諸侯而用天子之禮故雖有日月之章而止謂之旂焉此亦隆殺之微意也山隂陸氏曰孟春不言正月著魯卜郊卜日其從之疾也榖梁曰我十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣人臣用天子之禮樂故其言婉而成章如此據郊特牲戴冕璪十有二旒則天數也旂十有二旒龍章而設日月以象天也慶源輔氏曰變公為君以下所云非公之事也後言君卷冕立于阼亦以此新安王氏曰鄭謂孟春建子之月魯之始郊日以至大路殷祭天車也天子之旌旗畫日月帝蒼帝靈威仰也魯不祭昊天上帝鄭說也周天子有日至之郊以報本有啓蟄之郊以祈榖其祭天車用玉路旗用日月之常魯僭天子禮亦不敢盡同是以有祈榖之郊無日至之郊祈榖於孟春郊而後耕則孟春乃建寅之月非建子也不敢乗天子玉路又不肯乗同姓金路故乗殷之大路常畫日月天子建之旂畫交龍同姓諸侯建之常十有二旒旂則九旒而已今不敢全用天子之旂故於旂上畫日月之章綴以十有二旒此皆用天子禮而不敢盡同也季夏六月以禘禮祀周公於大廟牲用白牡尊用犧象山罍鬱尊用黄目灌用玉瓉大圭薦用玉豆雕篹爵用玉琖仍雕加以璧㪚璧角爼用梡嶡鄭氏曰季夏建巳之月也禘大祭也周公曰大廟魯公曰世室羣公稱宫白牡殷牲也尊酒器也犧尊以沙羽為畫飾象骨飾之鬱鬯之器也黄彛也灌酌鬱尊以獻也瓉形如槃容五升以大圭為柄是謂圭瓉篹􅇼屬也以竹為之彫刻飾其直者也爵君所進於尸也仍因也因爵之形為之飾也加加爵也散角皆以璧飾其口也梡始有四足也嶡為之距孔氏曰自此至下也一節明禘禮祀周公於大廟文物具備之儀牲用牡者尊敬周公不用己代之牲故用殷牲尊用犧象山罍者用天子之尊也犧犧尊也犧讀如沙沙鳯凰也刻畫鳯凰之象於尊其形婆娑然或作獻字齊人之聲誤爾此犧尊周禮春夏之祭朝踐堂上薦血腥時用以盛醴齊君及夫人所酌以獻尸也象象尊也以象骨飾之此象尊周禮春夏之祭堂上薦朝事竟尸入室饋食時用以盛盎齊君及夫人所酌以獻尸也山罍謂夏后氏之尊天子於追饗朝饗之祭再獻所用今襃崇周公禘祭雜用山尊不知何節所用也鬱尊用黄目者鬱謂鬱鬯酒黄目嘗烝所用尊崇周公於夏禘用之灌用玉瓉大圭者灌謂酌鬱鬯獻尸求神也酌之所用玉瓉以玉飾瓉故曰玉瓉薦用玉豆者謂所薦菹醢之屬也以玉飾豆故曰玉豆下云殷玉豆是也雕篹者與豆連文故知􅇼屬形似筥亦薦時所用篹既用竹不可刻飾故知雕鏤其柄鄭註飾其直直謂柄也爵用玉琖仍雕者爵君酌酒獻尸杯也琖夏后氏爵名以玉飾之故曰玉琖加以璧散璧角者加謂尸入室饋食竟夫人酌盎齊亞獻名為再獻又名為加以其非正獻故謂之加于時薦加􅇼豆也此時夫人用璧角内宰所謂瑶爵也瑶是玉名爵是緫號璧是玉之形制角是爵之所受名異而實一也其璧散者是夫人再獻訖諸侯為賔用之以獻尸雖非正爵是夫人加爵之後故此緫稱加先散後角便文也爼用椀嶡者兩代爼也虞爼名椀案禮圖云椀長二尺四寸廣一尺二寸髙一尺諸臣加雲氣天子犧飾之夏爼名嶡嶡亦如椀直有腳曰椀虞氏尚質未有餘飾也加腳中央横木曰嶡夏世漸文故也長樂劉氏曰以禘禮祀周公於大廟者此謂后稷之廟在魯者也魯有閟宫則姜嫄之廟也魯郊於天以后稷配非無廟也周公薨於周而廟祀於魯三年之喪始畢則以天子之禮樂禘祀周公之主於后稷之廟所以審諦其昭穆之序也然後周公之主始安於其廟之祀禘祫由之行焉長樂陳氏曰以天子之禮禘於廟而牲則用白牡者異乎周官牧人所謂陽祀用騂牲書言文王騂牛一者也蓋以周公之勲勞不必有於天下故推而上之以同乎王然無以别之則不足以辨君臣之分詩曰周公皇祖白牡騂剛乃其意也犧者牛也而用事於耕者也象者西方之獸而致用以白者也於尊必以牛重本也必以象誠在内也罍也者貯酒而給於尊也詩曰缾之罄矣維罍之恥則罍之為器大矣謂之罍者有雷之象蓋雷出於時則利於物而反之則為災器之名罍警之而已經曰終日飲酒而不得醉先王所以備禍乃其意也山也者止而安者也而罍以山者所以安於神司尊彛有山尊與此類也玉者陽精之純而通神明者也故於瓉所以用玉圭者銳而有生物之利也故瓉之柄所以用圭豆之飾與瓉同意篹則以竹而無事於雕雕之者以其質而有取乎文也璧者圜而有天體之象散者散而非致飾者也角者剛而能制以為酒戒也玉為陽故君以玉琖獻尸璧之體有降於玉故賔長以之然散於角亦非所以施於尊者禮曰賤者獻以散卑者舉角是也言加則知非正爵嚴陵方氏曰大𫝊曰王者禘其祖之所自出以其祖配之蓋帝嚳者周祖之所自出也故祭法曰周人禘禮而已凡六畜皆謂之牲蓋取夫能生之而後可殺故也所謂黄目即黄􅂜也而又曰鬱尊者以鬱鬯之所實也瓉柄之形必以圭者圭為東方之器東方純陽君道也故用圭至於夫人則用璋而已以其隂雜之故也與聘君以圭聘夫人以璋同意郊特牲曰灌以圭璋用玉氣也名雖不同至於用玊則一而已然此止及璋者蓋舉大足以兼小而婦人之從夫可知矣天子飾豆以玉諸侯以象玉豆則天子之豆也以玉以象則與笏之所用同義且琖則爵而已一升曰爵四升曰角五升曰散唯其所容有加於琖也故又因以為加焉馬氏曰黄目者以黄金為目也郊特牲曰黄目鬱氣之上尊也黄者中也目者氣之清明者也言酌於中而清明於外也玉豆所薦謂菹醢之屬水草之和氣也雕篹所薦謂陸産之物也凡器飾之以玉者皆貴文之意也山隂陸氏曰言禘禮祀周公於大廟則以禘祀公而已非以禘公也用卜而後用之用重此也以二之而已據加以璧散璧角玉琖仍雕言雕則玉不純矣下於周故也灌用圭璋故加用璧郊特牲曰束帛加璧先言璧散蓋禮正獻以小為貴者加獻尚大正獻以大為貴者加獻尚小夏后氏以楬豆殷玉豆周獻豆今曰薦用玉豆外無他豆也有虞氏以梡夏后氏以嶡殷以椇周以房俎今曰梡嶡梡嶡外無他爼也新安王氏曰周官有鬯人鬱人不知鬱謂之秬鬯鬯人供之煮鬱金和鬯酒謂之鬱鬯鬱人掌之天子賜諸侯以圭瓉則諸侯可用鬱鬯宣王嘗以圭瓉秬鬯二卣賜文侯周公在東都曰成王嘗以秬鬯二卣命周公禋於文王武王則秬鬯圭瓉魯公必受此賜無疑案禮秋嘗冬烝灌用黄􅂜黄􅂜即黄目賜諸侯或一卣或二卣不言黄􅂜何也卣乃中尊蓋黄􅂜别名或謂尊有三􅂜爲上卣爲中罍爲下失其義矣凡灌天子諸侯用圭瓉后夫人用璋瓉瓉者其槃圭其柄也故鬱尊有黄目灌有圭瓉雖魯人得用然瓉有大圭未免僭天子之禮升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏昩東夷之樂也任南蠻之樂也納夷蠻之樂於大廟言廣魯於天下也鄭氏曰清廟周頌也象謂周頌武也以管播之朱干赤大盾也戚斧也冕冠名也諸公之服自衮冕而下如王之服也大武周舞也大夏夏舞也周禮韎師掌敎韎樂詩曰以雅以南以籥不僭廣大也孔氏曰升升堂也升樂工於廟堂而歌清廟詩也清廟以文王有清明之徳祭之於廟而作頌也下堂下也管匏竹在堂下故云下管堂下吹管以播象武之詩故云下管象也案詩維清奏象舞襄二十九年見舞象箾南籥知非文王樂必以爲大武武王樂者以經云升歌清廟下管象以父詩在上子詩在下故知爲武王樂也朱干玉戚者赤盾玉飾斧也冕而舞大武者王著衮冕執赤盾玉斧而舞武王伐紂之樂也上云下管象謂吹大武詩此云舞大武謂大武之舞也皮弁三王之服裼見美也大夏夏禹之樂也王又服皮弁裼而舞夏后氏之樂也六冕是周制故用冕而舞周樂皮弁是三王服故用皮弁舞夏樂也周樂是武武質故不裼夏家樂文文故裼也若諸侯之祭各服所祭之冕而舞祭統冕而緫干以樂皇尸是也鄭引周禮韎師以證經之昧樂又引小雅鼔鍾之詩以證南蠻之樂任即南也周公徳廣非唯用四代之樂亦爲蠻夷所歸故賜奏蠻夷之樂於庭也唯言夷蠻則戎狄可知或云正樂既不得六代故蠻夷唯與二方也白虎通云樂元語曰東夷之樂曰朝離萬物微離地而生樂持矛舞助時生也南夷樂曰南南任也任養萬物樂持羽舞助時養也西夷樂曰味味昧也萬物衰老取晦昩之義樂持㦸舞助時殺也北夷樂曰禁言萬物禁藏樂持干舞助時藏也此東曰昧西曰株離與白虎通相反納夷蠻之樂於大廟者言皆於大廟奏之廣魯欲使如天子示於天下也馬氏曰歌者人聲也匏管者竹聲也堂上以人聲歌清廟者所以貴文也堂下以匏竹奏象武者所以賤武也周公之徳妙而不可知所可知者見於文徳武功而已文徳成於制作之間武功存於征伐之際故章其武功則錫之以武樂彰其文徳則錫之以夏樂蓋武之盛莫盛於大武而文之盛莫盛於大夏冕者文服也服冕服而舞大武者以文止武之意也皮弁素積者服之質也舞大夏則服之所以守其文也裼者服之見美也及弁素積掩蔽其文而不顯故裼衣所以顯之也山隂陸氏曰言下而管象則升歌之人下而又管衆也即言下管象嫌歌象同作祭統言而嫌明堂位下管象同作也仲尼燕居言而嫌前下管象同作也然則文王世子何以不嫌逺也舞莫重於武宿夜故冕而襲以舞大武弁而裼以舞大夏内則十三舞勺成童舞象二十舞大夏不言大武大武蓋深矣又在其後又新說曰積與弁文服也皮與素則隂矣故以舞大夏干與戚武器也而朱與玉則陽矣故以舞大武此隂陽相成之義陽以隂成之故裼武也而以舞大夏隂以陽成之故冕文也而以舞大武又曰大饗之禮與宗廟同故亦升歌清廟下管象而舞大武大夏燕居所謂升歌清廟下管象武繼之夏籥序興是也養老之禮則異於大饗故升清廟下管象其舞則大武而已無夏也蓋武降大夏一等文王世子登歌清廟下管象舞大武是也燕禮則有勺而無大武蓋勺降大武一等儀禮所謂升歌鹿鳴下管新宫遂合舞樂合樂則勺是也嚴陵方氏曰武爲征伐之名夏爲文明之地武王以征伐之大功而戡亂於商故其樂謂之大武夏后以文明之大徳而受禪於舜故其樂謂之大夏以武為征伐之名故武王之號因以同其樂以夏為文明之地故夏后之樂因以同其國焉然則大武者武舞也大夏者文舞也干必以朱戚必以玉者文舞也干必以朱戚必以玉者朱為含陽之色玉為陽精之純朱玉徳也以見先王有徳而立武焉弁必以皮積必以素者皮無經緯之文素無繪繡之功皮素質也以見先王不以文而滅質焉於武言干戚以見文之有羽籥於夏言裼則知武之為襲其言亦相備而已然其樂先文王之歌而後武王之武者時之序也其舞先武王之武而後夏后氏之文者事之序也先王之時祭必用夷樂蓋中天下而革立四海之民而役之得其歡心使鼔舞焉以承祭祀君子之所樂也故周官有韎師及旄人鞮鞻氏之職者以此東方曰夷而與蠻戎狄通謂之四夷者猶之公伯子男通謂之諸侯也且四夷之習俗雖各不同至於與夏相反皆易而無文則一而已然而夷樂有東南而無西北者亦隆殺之微也東為四夷之長對蠻之小為大焉周官專以韎師掌之者以此周之化自北而南南於豐鎬為尤逺焉詩言以雅以南經言胥鼔南者以此昔成王欲報周公勲勞故其命以樂也以諸侯為未足又命之用天子之樂以時王為未足又命之用先王之樂以中國為未足又命之用四夷之樂則所用廣矣故曰言廣魯於天下也長樂陳氏曰考之於經舞干羽於兩階則文舞於東階武舞於西階武舞常在先文舞常在後何則書言舞干羽則先干而後羽樂記言及干戚羽旄謂之樂則先干戚而後羽旄郊特牲明堂位祭統皆言朱干玉戚冕而舞大武皮弁素積裼而舞大夏則先大武而後大夏詩簡兮言碩人俁俁公庭萬舞乃言左手執籥右手秉翟則先萬舞而後籥翟漢之樂亦先武徳之舞而後文始之舞唐之樂亦先七徳之舞而後九功之舞然皆先武而後文蓋曰武以威衆而平難文以附衆而守成平難常在於先守成常在於後又曰周之興也功莫大於武功樂莫大於武舞故無大武以祭服之冕舞大夏則朝服之皮弁而已干所以自蔽戚所以待敵朱干白金以飾其背記曰朱干設錫是也玉戚剥玉以飾其柄楚工尹路曰剥圭以爲槭柲是也蓋朱所以象事玉所以象徳武以自蔽者為主而待敵者非徳也故其宣布著見以為事者欲自蔽而已至於持以待敵者温純之徳爾此武舞之道也籥所以為聲翟所以為文聲由陽來故執籥於左文由隂作故秉翟於右此文舞之道也天子之樂如此則魯有之康周公故也世衰禮廢魯不特用於周公之廟而羣廟亦用焉故子家駒譏之不特用於魯之羣廟而諸侯之廟亦用焉故郊特牲譏之以至八佾作於季氏之庭萬舞振於文夫人之側則先王之樂掃地可知矣祭統曰朱干玉戚以舞大武八佾以舞大夏公羊曰朱干玉戚以舞大夏八佾以舞大武蓋公羊所𫝊者誤也然朱干玉戚之舞國君躬與焉祭統曰君執干戚就舞位冕而緫干又曰王者舞先王之樂明有法也舞當代之樂明有制也舞四夷之樂明有懐也蓋四夷之樂東曰韎南曰任西曰侏離北曰禁或以其服色名之或以其聲音名之服色則韎是也聲音則侏離是也其他不可以考鞮鞻氏掌四夷之樂旄人掌敎四夷之樂韎師則掌敎東夷之樂而已然韎師之樂施於祭祀大饗而旄人鞮鞻之樂施於祭祀與燕者蓋東於四夷為長饗於燕為重觀韎師曰師旄人鞮鞻曰人與氏師則序於前而人與氏序於後則夷樂之别可知矣先王之於夷樂雖或用之然夷不可以亂華哇不可以雜雅蓋亦後之而弗先外之而弗内也觀夾谷之㑹侏儒之樂奏於前而孔子譏之東漢元日磾國之樂作於庭而陳禪非之則魯納夷蠻之樂於大廟蓋陳之於門而已唐之時皆奏於四門之外豈古之遺制歟升歌清廟下管象說見文王世子慶源輔氏曰言廣大周公之徳於天下也君卷冕立于阼夫人副禕立于房中君肉袒迎牲于門夫人薦豆籩卿大夫賛君命婦賛夫人各揚其職百官廢職服大刑而天下大服鄭氏曰副首飾也詩云副笄六珈周禮追師掌王后之首服爲副褘王后之上服唯魯及王者之後夫人服之諸侯夫人則自揄翟而下賛佐也命婦於内則世婦也於外則大夫之妻也祭祀世婦以下佐夫人揚舉也大刑重罪也天下大服知周公之徳冝饗此也孔氏曰前經明祀周公所用器物此經明祀周公之時君與夫人卿大夫命婦行禮之儀尸初入之時君待於阼階夫人立於東房中魯之大廟如天子明堂得立房中者房則東南之室也緫稱房爾副是首飾以其覆被頭首鄭引詩鄘風言宣姜首著副珈而又以笄六玉加於副上引周禮追師證副是王后首服案周禮褘衣揄翟闕翟等皆是后之所服褘衣則后服之上者故鄭云褘王后之上服也迎牲于門謂祼鬯之後牲入之時迎於門也夫人薦豆􅇼者謂朝踐及饋孰并酳尸之時也卿大夫助君謂初迎牲幣告及終祭也命婦助夫人謂薦豆籩及祭祀之屬當祭之時令百官各揚舉其職如有廢職不供服之以大刑以此祭周公文物備具禮儀整肅百官供命天下大服明周公之徳冝合如此長樂陳氏曰阼者明陽之地房者幽隂之地君於阼法陽之道夫人於房體隂之道天子六冕有衮冕諸侯出而有君道故其冕亦如之而王后六衣亦有褘衣以從王祭祀諸侯之夫人從夫之爵則禮當服焉鄭氏以爲二王之後誤矣嚴陵方氏曰卷冕即衮冕也三公一命衮若有加則賜而王亦被衮以象天以其九章之盛服之有章者窮於此故也首飾以副為名者首以髪為正飾則副之故也君立阼夫人立房中所以順隂陽之位而已袒則肉體露故曰肉袒然人勞則如是必肉袒迎牲将以親射親割而致其力故也迎牲于門則薦豆籩于室可知牲則於外男子之事故君迎之豆􅇼則膳羞婦人之事故夫人薦焉與五官奉六牲六官奉六齍同義經有言籩豆何也凡籩則豆從之周豆則籩不必從也故禮器言天子諸侯之豆數郷飲酒言五十六十之豆數未有特言籩者若晉侯饗季孫宿有加籩而武子辭則雖或特言籩固亦有豆矣周官籩人掌四籩之實醢人掌四豆之實其序則先籩人而後醢人焉蓋以籩尊而豆卑故也及其並陳則籩居邊而豆居裏然則以尊卑言故曰籩豆以内外言故曰豆籩其實一也君與夫人祭主也心專其事焉卿大夫命婦臣妾也則賛其事而已各揚其職若司徒奉牛司馬奉羊司空奉豕司寇奉犬之類也其職雖揚又不可侵官故言各焉莊子曰庖人雖不治庖尸祝不越樽爼而代之蓋謂是矣廢職則職不揚矣服大刑肆師於祭之日誅其怠慢者是矣山隂陸氏曰君出迎牲卿大夫從矣而後夫人薦豆籩命婦賛夫人男女相辟别嫌也君卷冕立于阼夫人副褘立于房中亦以此命婦賛夫人言賛不言相優魯也據卿大夫相君命婦相夫人慶源輔氏曰周公人臣而用天子禮樂之祭冝人之心有所不服今也執事之臣各舉其職而無怠慢之意至於一有廢職而不舉者則亦自服於大刑至此然後知天下大服而不以周公爲不可用天子禮樂也此皆魯人誇詞是故夏礿秋嘗冬烝春社秋省而遂大蜡天子之祭也鄭氏曰不言春祠魯在東方王東廵守以春或闕之省讀為獮獮秋田名也春田祭社秋田祀祊大蜡嵗十二月索鬼神而祭之孔氏曰此一經明魯得祭之事魯在東方朝常以春當朝之年以朝闕祭廵守在二月不於正月祭者諸侯預前待乎竟故也祭社祀祊大司馬職文祊當為方四方勾芒之屬也長樂陳氏曰夏以飲為主故於祭謂之礿秋以薦新為主故於祭謂之嘗冬則物之衆而可進也故謂之烝春言社則知秋獮者亦祀方也詩曰以社以方是也秋言獮則春社亦蒐也𫝊曰春蒐夏苖秋獮冬狩是也嚴陵方氏曰言夏礿秋嘗冬烝而不及春祠與王制言烝則不礿同義其所異者特彼以礿為春祭爾春祭闕祠而不闕社者祠則君之所獨社則民之所同故也社與省春與秋皆有之其所異者春社以祈為主秋社以報為主春省以耕為主秋省以斂為主爾此於社言春以該秋於省言秋以該春其實一也大蜡必言遂者與大司馬言遂以蒐田之遂同蓋秋省則百物成矣蜡所以報百物於其成而後百物可報故也省非祭名而與祭併言之者以此凡此亦諸侯之所同然特魯行之蓋禮有所隆爾講義曰此不言春祠先儒謂魯在東方王以春東巡狩則魯闕春祭朝常用春當朝之年則亦闕祭非也特經有脫文耳祭不可闕也馬氏曰天子大蜡八凡此者天子之祭也而魯以周公之功故得用之大廟天子明堂庫門天子臯門雉門天子應門振木鐸於朝天子之政也鄭氏曰廟及門如天子之制天子五門臯庫雉應路魯有庫雉路則諸侯三門與臯之言髙也詩云乃立臯門臯門有伉乃立應門應門將將天子將發號令必以木鐸警衆孔氏曰此一經明魯門及廟制周公大廟制似天子明堂魯之庫門制似天子臯門魯之雉門制似天子應門制度髙大如天子不必事事皆同也引大雅文王緜之詩證諸侯有臯門應門也盱江李氏曰鄭以為魯行天子之禮魯之大廟既如明堂則周之大廟亦如明堂矣若周之大廟制如明堂魯之大廟又如明堂則是魯之大廟如周之大廟也何不曰大廟天子大廟而云明堂哉斯蓋魯行天子禮樂饗帝告朔當放於周然以人臣不敢立天子政敎之堂故於周公之廟略擬明堂之制以備其禮非周之宗廟如明堂也山隂陸氏曰此言作大廟以天子明堂之制作庫門以天子臯門之制作雉門以天子應門之制鄭司農云天子五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門庫門中門也周官所謂中門之禁蓋在是矣禮宰夫執木鐸以令于宫自寢門至于庫門以此君復于庫門亦以此莊公之喪既𦵏而絰不入庫門亦以此君有憂則素服哭于庫門之外亦以此然則左宗廟右社稷在庫門之外雉門之内故君出疆薨入自闕孔子與於蜡賔出遊於觀之上此大廟在雉門之内之證也厙門應在内今在外者魯王禮也使雉門之外又有門焉據天子一曰臯門二然後曰雉門長樂陳氏曰臯者始事之辭記曰臯某復周官有臯舞皆始意也五門始於此故曰臯王之庫藏在焉故曰庫有雉之象故曰雉對於路門而為布政敎之所故曰應五門以路為大故曰路此言庫雉而不言路者以路為門之大天子諸侯無嫌於不同故也古人出一號發一令皆聲以警之故振木鐸於朝鐸有以金為之則取乎義而於時為秋秋則其氣肅而以殺爲主故所用多在乎武事周官鼔人以金鐸通鼔司馬振鐸是已有以木為之則取乎仁而於時為春春則其氣温而以生為主故所用多在乎文周官小宰小司徒皆云正嵗率其屬而振之以徇於市而語稱孔子之徳亦曰天將以夫子為木鐸是也此皆天子之政也清江劉氏曰此經有五門之名而無五門之實以詩書禮春秋考之天子有臯應畢無庫雉路諸侯有庫雉路無臯應畢天子三門諸侯三門門同而名不同何以言之詩曰乃立臯門乃立應門書曰二人爵弁執惠立于畢門之内又曰王出在應門之内此皆言天子也畢門或謂之虎門蓋王在國則虎賁氏守王之宫蓋居此門故太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外指虎賁而言故曰虎門又或謂之路門蓋建路鼓於北門之外大僕司之指路鼔而言故曰路門無道庫雉者非天子門故也明堂位所言蓋魯用王禮故門制同王門而名不同也諸侯有路寢路寢之門是謂路門此諸侯三門也春秋曰雉門及兩觀災譏兩觀不譏雉門也無道臯應畢者非諸侯門故也天子三朝諸侯三朝天子外朝在臯門外治朝在應門内内朝在畢門内畢蹕也王出至此則蹕也師氏掌焉應應也王居治朝正天下之政海内莫不敬應也臯告也播告萬民謀大事也此亦春秋大言天子諸侯外朝在庫門之内治朝在雉門之内内朝在路門之内謂之庫雉者諸侯不敢戚天子名門以其所近也庫者府庫所在也雉者治朝所在也雉猶治也路者路寢所在也此亦小言諸侯也其建國之神位左宗廟右社稷皆夾治朝此春秋所云閒于兩社為公室輔者是也嚴陵方氏曰天子五門自内而出一曰路門路大也正寢之門二曰應門應和也路門倡之應門和之三曰雉門觀闕築於此四曰庫門器械藏於此夫觀闕所以垂象爲民極則築之於五門之中亦冝矣器械所以除戎器戒不虞則備之於外門之内亦冝矣五曰臯門臯緩也近則廹逺則緩臯門為五門之逺者故也名以庫門而比天子臯門之制名以雉門而比天子應門之制自外而入則臯門近庫門故庫門比臯門之制自内而出則應門近雉門故雉門比應門之制臯門在外故自外入言之雉門在内故自内出言之且庫雉者天子之所獨臯應諸侯之所同必以天子所獨者為名取其别於諸侯也止於諸侯所同者為制又以降於天子也周官小宰帥治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑以至郷師士師宫正亦莫不用焉此非天子之政乎書曰每歲孟春遒人以木鐸徇于路亦此意也禮記集說卷七十九
