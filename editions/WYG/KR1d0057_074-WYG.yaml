body:
  text: 禮記集説卷七十四宋衛湜撰君子之居恒當戸寢恒東首若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐鄭氏曰當戸鄉明也東首首生氣也衣服冠而坐敬天怒也孔氏曰自此至光矣一節明卿大夫以下所居處及盥浴并將朝君之義嚴陵方氏曰凡戸必面南而啟居恒當戸則向天明故也孔子將病猶當戸而坐君視之猶東首加朝服迅雷風烈必變蓋禮然也山隂陸氏曰言興敬也興非夜之事衣服冠具言之亦敬也亦言之法金華應氏曰陽明温厚之方天地仁氣之所寓故起居興寢必常對之所以順其常風雨雷霆之怒天地怒氣之所形雖中夜幽暗之時必盛服而興所以敬其變若夫天子諸侯飲食起居之節未嘗不順其常而特自貶損於年不順成者亦所以敬其變也日五盥沐稷而靧粱櫛用樿櫛髮晞用象櫛進禨進羞工乃升歌浴用二巾上絺下綌出杅履蒯席連用湯履蒲席衣布晞身乃屨進飲鄭氏曰晞乾也沐靧必進禨作樂盈氣也更言進羞明為羞籩豆之實絺綌刷去垢也杅浴器也蒯席澀便於洗足也連猶釋也進飲亦盈氣也孔氏曰盥洗手也沐沐髮也靧洗面也取稷粱之潘汁洗面沐髮並須滑故也此大夫禮人君沐靧皆粱也樿白理木也櫛梳也沐髮為除垢膩故用白理澀木以為梳沐已燥則髮澀故用象牙滑櫛以通之禨謂酒也少儀注云沐而飲酒曰禨知進羞非庶羞者庶羞為食而設今進酒而設羞故知是羞籩羞豆進羞之後樂工乃升堂以琴瑟而歌以新沐體虚補益氣杅浴之盆也出杅浴竟而出盆也履踐也蒯菲草席澀出杅而脚踐履澀草席上刮去垢也連用湯者釋去足垢而用湯䦨也嚴陵方氏曰樿與禮器樿杓之樿同禨者福之先進禨猶言上夀耳進羞則以庶羞薦之工乃升歌則以樂侑之也上貴而下賤絺精而綌粗上絺下綌則用之各以其稱也杅以木為之蒯茅類蒯澀而蒲軟用湯謂用以洗足浴既用湯又用湯以洗足故曰連連之為言續也進飲而不進羞工亦不升歌殺於沐也君子於一沐浴之間未嘗不以禮而况重於沐浴者乎延平周氏曰鴇羽之詩先言稷後言粱故沐稷而靧粱所以别其賤與貴也既沐而升歌所以作其陽也既浴而進飲所以養其陽也馬氏曰内則子之於親聘禮館人之於賔皆三日具沐五日具浴葢禮以情制徳以禮作君子知彈冠振衣於其外則必浴徳澡心於其内也進禨與羞所以盈其虚進酒所以滌其煩禮以樿笄為惡笄象笄為美笄而沐用樿櫛髮晞用象櫛貴象故也山隂陸氏曰禨讀如越人禨之之禨進禨猶進祝也詩曰如幾如式連行用湯潔身而進者宜如此髮晞自晞也晞身使之晞也慶源輔氏曰用巾以除背垢履蒯席以洗足然則古浴不以人沐浴在身之重事也故著其法如此衣布如今之浴衫古所謂明布也晞身乃屨屨服之末進屨則衣服皆舉矣故進飲焉金華應氏曰日必五盥於其間而沐浴焉則所以滌其垢而致其潔養其和者亦無所不至也沐則先稷而後粱其櫛則先樿而後象浴之巾則下用綌而上用絺其席則先用蒯而後用蒲大抵整治之初則先用其粗者葢垢汙之難去不可不加刮摩滌蕩之力及其整治之後則用其潤養之功将適公所宿齋戒居外寢沐浴史進象笏書思對命既服習容觀玉聲乃出揖私朝煇如也登車則有光矣鄭氏曰書思對命思所思念将以告君者也對所以對君者也命所受君命者也書之於笏為失忘也玉聲玉佩也私朝自大夫家之朝也揖其臣乃行孔氏曰史謂大夫亦有史官也案下大夫不得有象笏或云有地大夫故用象以笏書此思對命三事也既服者著朝服己竟私習儀容又觀容聽己珮鳴使玉聲與行歩相中適也煇光儀也習儀竟行出至己之私朝揖其屬臣煇如也揖竟出登所乗之車有光煇也而往適君朝矣嚴陵方氏曰齋戒故居外寢沐浴以前期為之故曰宿公所葢王朝也侯國乃私朝爾故後言私朝以此凡有朝必有所於公言所於私言朝互相備也且古之人将有所思也必先齋将有所為也必先戒既齋戒故書思對命謂書己之所思於笏以待對君之命也史掌官書以助人為事故史進之習容謂習見天子之容也右徵角左宫羽所謂玉聲也進則揖之退則揚之然後玉鏘鳴所以觀之也觀則示之之謂方其揖私朝則服與玉而已燦然之文尚少也故以煇如言之及其登車乃有車馬旗旌之飾故以光言之馬氏曰孔子之於哀公三日齋而後請伐齊管仲至堂阜鮑叔披而浴之三然後見桓公諸侯之於王畿㤗山具朝宿之邑皆以湯沐名之則人臣見君之禮可見矣葢諸侯朝王之禮也先儒以為大夫見諸侯之禮豈非惑於公所而為之説乎山隂陸氏曰言宿齋戒則戒亦宿也然則将適公所齋戒同日書思對命言書所思對所命適公所若今上殿矣習容觀為有觀之者習玉聲為有聽之者新安朱氏曰笏者忽也所以備忽忘也漢初有秉笏奏事又曰執簿亦笏之類只是為備遺忘故手執眼觀口誦於君前有所指畫不敢用手故以笏指畫今世遂用以為常執之物周禮典瑞王搢大圭執鎮圭大圭不執只是搢於腰間却執鎮圭用藻藉以朝日而今郊廟天子皆執大圭大圭長三尺且重執之甚難古者本非執大圭也天子搢珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也鄭氏曰珽亦笏也珽之言珽然無所屈也或謂之大圭長三尺杼上終葵首謂於杼上又廣其首方如椎頭是謂無所屈後則恒直相玉書曰珽玉六寸明自炤諸侯謂笏為荼荼讀為舒遲之舒舒懦者所畏在前也詘謂圜殺其首不為椎頭諸侯唯天子詘焉大夫奉君命出入者也上有天子下有己君又殺其下而圜孔氏曰此一節論天子以下笏制不同方正於天下示己之端平正直而布於天下也下文云天子以球玉故鄭知此珽亦笏也大圭長三尺杼上終葵首玉人文彼註云或謂之珽引相玉書證珽是玉餘物皆光炤外珽玉光自炤於内内含明也荼前詘謂圜殺其首後直下角正方降讓於天子故前詘也長樂陳氏曰天子之於天下體無所屈故珽必方正諸侯之於天子則謹度以臣之於臣民則制節以君之故荼必前詘後直大夫於其君則為臣於天子則為陪臣故笏必前詘後詘士笏之制無所經見觀其飾之以象疑亦前詘後直歟天子之朝日執鎮圭搢大圭則所執者摰也所搢者笏也諸侯之朝大夫之聘葢亦如此則諸侯執命圭者必搢荼大夫執聘圭者必搢笏及其合瑞而授圭則執其所搢而已此所謂見於天子無說笏天子之笏曰珽諸侯曰荼大夫以下曰笏者尊者文其名卑者命其實故車天子諸侯曰路大夫以下曰車寢天子諸侯曰宫大夫以下曰寢禮書嚴陵方氏曰玉之廷者為珽左傳衮冕黻珽是矣廷故直直故方方故正方正者以其直而無所詘於天下也故天子搢之且其動也直天道也其動也詘地道也天子體天道故無所詘諸侯進則勢詘於天子故前詘退則道伸於國人故後直大夫進則詘於天子退則詘於諸侯故前詘後詘以示其無所不讓也搢謂搢之於紳也典瑞言王搢大圭是矣搢之於紳則服之也服之欲其識而勿忘故也言天子如此則餘可知矣馬氏曰天子朝諸侯葢執冒圭搢珽圭冒圭四寸所以冒四方珽圭六寸所以統六服而珽之體方正則方正者以其有所臨故也相玉書曰珽玉六寸明自炤則執冒而搢珽執鎮圭而搢大圭長短適宜此禮所謂稱也先儒合珽大圭以為一蓋惑於搢大圭搢珽之文而為之説也山隂陸氏曰珽非大圭大圭長三尺此長六寸大圭杼上終葵首讓於天也讓於先王也珽珽而已無所詘焉蓋王執鎮圭搢大圭以祀天以朝日以饗先王執冒搢珽以朝羣臣以見諸侯仁以冒之義以臨之諸侯稱荼猶天子稱珽荼紱也言詘於天子而已大夫無所不讓是以不得謂笏為荼珽義也荼仁也笏禮而已故曰天子御珽諸侯御荼大夫服笏言御則進退遲速有在我者矣大夫以下謂之笏而已今此不言笏言無所不讓笏非所言也前詘躬其上而已前後詘上下躬也鄭氏謂前詘圜殺其首後詘又殺其下而圜誤矣延平周氏曰以其無所屈故曰珽以其為圭玉之大故曰大圭以其記事則無忽故名之曰笏荼即鴟鴞所謂將荼者也蓋荼者茅秀也捋之可以為巢秀者象其有成徳為巢則象其能養物諸侯有成徳而能養物故笏飾以荼笏飾以荼猶玉飾以蒲也天子無為者也以内心為主故珽無飾諸侯有為者也以外心為主故飾以荼大夫則於諸侯為不足故無飾葢天子則以飾之無足以稱大夫則以徳之無足以飾也侍坐則必退席不退則必引而去君之黨登席不由前為躐席徒坐不盡席尺讀書食則齊豆去席尺鄭氏曰引郤也黨鄉之細者退謂旁側也辟君之親黨也登席升必由下也徒坐不盡席几示無所求於前不忘謙也讀書食則齊者讀書聲當聞尊者食為汙席也孔氏曰自此至側尊用禁一節廣論臣侍坐於君之儀并顯君賜食賜酒肉飲之節兼明與凡人飲食之禮侍坐若側旁有别席則退就側席不退謂旁無别席可退或雖有别席君不命之使退則必引而去君之黨黨屬於鄉在鄉之旁今借為喻言臣侍君坐若不退席則引而郤去君之旁側也黨謂君之親黨則君命令與君之親黨同席則卻引而離君之親黨坐君親黨之下也失節而踐為躐席應從下升若由前升是躐席也案鄉飲酒禮賔席于户西以西頭為下主人席于阼階介席于西階皆北頭為下賔升席自西方註云升由下也又鄉飲酒記云主人介凡升席自北方降自南方註云席南上升由下降由上若賔則升降皆由下也徒坐空坐也謂非飲食及講問時也不盡席之前畔有餘一尺讀書食則坐近前與席畔齊豆去席尺者又解席所以近前之意以設豆去席一尺不得不前坐就豆嚴陵方氏曰侍坐則必退席者不敢與尊者並故也雖不退席猶須引身而去君之黨以避之於其黨如此則於君可知矣登席不由前為躐席者席以前為正故登之不由前曲禮言趨隅者以此躐踐也躐者之所逐無所顧而踐焉故謂之躐先儒謂失節而躐為躐者以此夫趨席之隅非不踐也特由前而登乃失節爾故曰為躐席徒坐不盡席尺徒坐即曲禮所謂虚坐是也山隂陸氏曰引而去君之黨言不敢近尊也若讀書而食則齊豆當逺席恐汙妨復讀也金華應氏説見君若賜之爵章若賜之食而君客之則命之祭然後祭先飯辯嘗羞飲而俟若有嘗羞者則俟君之食然後食飯飲而俟鄭氏曰侍食則不祭雖見賔客猶不敢備禮也君將食臣先嘗羞忠孝也俟君食而後食若有嘗羞者膳宰存也飯飲利將食也孔氏曰自此至從者一節論人君賜食之禮祭祭先也禮敵者共食則先祭降等之客則後祭若臣侍君而賜之食則不祭若賜食而君以客禮待之則得祭雖祭又先須君命之祭乃敢祭也先飯飯食也君未食而臣先食徧嘗羞膳示行臣禮為先嘗食之義也嘗羞畢歠飲以俟君飱臣乃敢飱也禮食未飱必先啜飲以利滑喉中不令澀噎也若有嘗羞者此謂臣侍食得賜食而非君所客者也故不得祭亦不得嘗羞則君若使膳宰自嘗羞既不祭不嘗則俟君食後己乃食也飯飲者飲之也雖不嘗羞亦先飲以俟君也嚴陵方氏曰於飯曰先於羞曰嘗互言之耳食必先嘗臣子之職所當然也凡飲必先飯而後食故飲而俟君食而後食也飯飲謂飲飯之湆将食也山隂陸氏曰雖不嘗飯猶飲而俟著非故為味也即漱嫌慢先飯為君嘗食今後飯以有嘗之者矣故曰若有嘗羞者則俟君之食然後食然則侍食雖衆其嘗食常卑者一人先君命之羞羞近者命之品嘗之然後唯所欲凡嘗逺食必順近食君未覆手不敢飱君既食又飯飱飯飱者三飯也君既徹執飯與醤乃出授從者鄭氏曰羞近者辟貪味也順近食者從近始也覆手以循咡已食也飱勸食也君既食又飯飱不敢先君飽也三飯臣勸君食如是可也執飯與醤授從者食於尊者之前當親徹也孔氏曰君命之羞猶是君所不客者也雖君已食已乃後食而猶未敢食羞故又須君命雖得君命猶先食近其前者一種而止若越次前食逺者則為貪好味也品徧也既未敢越次多食故君又命徧嘗而已乃徧嘗之後則隨己所欲不復次第也凡嘗逺食必順近食者客與不客悉皆如此故云凡也意在嘗逺者且從近始也君未覆手不敢飱侍食者悉然也覆手者謂食飽必覆手以循口邊恐有殽粒汙著之也飧謂用飲澆飯於器中也禮食竟更作三飱以勸助令飽實使不虚也君既食又飯飱者君食畢竟而又飱則臣乃敢飱明不先君而飽也三飯謂三度飱也君饌已徹則臣乃自徹已饌以授從者飯醤是食之主故自執之此謂不客者若君與己禮食則但親徹之不敢授己之從者也故公食大夫禮賔北面坐取粱與醤以降西面坐奠于階西註云不以出者非所當得是也若非君臣但降等者則徹以授主人相者故曲禮云客若降等又云徹飯齊以授相者相者謂主人賛饌者若賔主敵則徹於西序端公食大夫禮親徹是也嚴陵方氏曰品嘗與膳夫所謂品嘗食同義命之品嘗之然後唯所欲則不敢有所擇也必順近食與羞近者同義覆手謂釋己梜也方其用己梜而食則致爪掌焉及釋而不用則覆手而已飱夕食也先儒以為勸食者葢朝食為一則夕食為再以勸之使食故因謂之飧也君未覆手不敢飧者待君一食之竟然後敢勸之使再也如是者三故曰飯飧者三飯也語有三飯之樂師非謂是歟山隂陸氏曰飱卒食也一日三食以是為卒一食三飯以是為卒故曰飯飧者三飯也又曰夕食為飧凡侑食不盡食食於人不飽唯水漿不祭若祭為己偞卑鄭氏曰不盡食不飽謙也水漿非盛饌也已猶大也祭之為大有所畏迫臣於君則祭之孔氏曰此一節以上文明侍君之食因明凡人相敵為食之禮凡侑食不盡食者明勸食于尊者之法食於人不飽者通包食於尊者及禮敵之人皆謙退不敢自足也食於禮敵之人所設水漿不以祭先偞厭也若祭水漿為大厭降卑微有所畏迫也公食大夫禮宰夫執觶漿以進賔受坐祭遂飲故知臣於君祭之也嚴陵方氏曰侑食謂勸侑人食也雖勸人食之使足而已不敢自足也食於人不飽與共食不飽同義飲食之有祭非特仁鬼神亦所以重其食水漿祭之則失於自偞卑矣偞卑薄也不祭水漿特於敵者設爾於尊者則又不得不祭焉此於首言凡侑食則不主尊者可知山隂陸氏曰若祭為己偞卑釋唯水漿不祭食於人不飽釋侑食不盡食上言凡有食下言君若賜之爵則水漿不祭葢通上下鄭氏謂臣於君則祭之誤矣若公食大夫宰夫執觶漿以進賔坐祭遂飲漿非此漿也慶源輔氏曰孔子説食於人不飽禮也孔子食於少施氏未嘗不飽飽少施氏之徳也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虚爵君子之飲酒也受一爵而色洒如也二爵而言言斯禮已三爵而油油以退退則坐取屨隱辟而后屨坐左納右坐右納左鄭氏曰洒如肅敬貌洒或為察言言和敬貌斯猶耳也油油説敬貌以退禮飲過三爵則敬殺可以去矣隠辟俛逡廵而退著屨也孔氏曰自此至用禁一節論臣於君前受賜爵之禮在君前先飲者示賤者先即事後授虚爵與相者示不敢先君盡爵此謂朝夕侍君得賜爵者若大禮則君先飲而臣後飲燕禮公卒爵而後飲是也此經云再拜稽首而後受燕禮則先受而後再拜又下云至三爵而退明非大饗之飲若燕禮非唯三爵而已洒如者謂顔色肅敬如似洒然也二爵顔色稍和故言言斯油油者言侍君小燕唯止三爵顔色油油然敬故左氏傳云臣侍君宴過三爵非禮也坐跪也初跪説屨堂下為敬故退而跪取履起而逡廵隠辟而著之納猶著也若坐左膝則著右足之屨坐右膝則著左足之屨案皇氏曰讀言為誾義亦通慶源輔氏曰特言君若賜之爵則非禮食可知越席再拜稽首受者超越過衆席而拜受於尊所也反登席而祭之嚴陵方氏曰色洒如謂色如洒而悦澤也三爵特嘗飲爾若大饗之爵則不止於三退則坐取屨者以進既解屨登席故退則取屨納之也隠則不顯辟則不正隠辟而後屨與就屨跪而屏之於其側同義坐左納右坐右納左凡以順手足之便也馬氏曰考工記一升曰爵三升曰觚自觚至散其量有差而此特言爵者葢爵者觚觶角散之總名故也君之賜爵所以致恩臣之受爵貴於至敬此所以三爵而油油以退也若夫湛露之燕諸侯至於不醉無歸燕禮之燕臣至於無算爵是又禮之大者與此異也士相見禮言君賜之爵退則隠辟而後屨君為之興則曰君無為興而其出至於三辭此不言者記其略也山隂陸氏曰斯禮已句言過此禮或少弛矣故易曰觀盥而不薦詩曰崇墉言言言大也有閑衛而大也孟子曰天油然作雲沛然下雨沛然猶此洒如也今言油油在後言禮雖弛也能自收也金華應氏曰自侍坐退席登席之初以至取屨納屨之後則燕見於君一席之禮始終略具矣葢古之君臣以情相與不若後世堂陛之森嚴也於其間燕命之侍坐從容無事可以用其情矣故其賜食賜爵之禮若今之燕見而留之飲食也燕見侍食則非朝聘宴饗之正疑若不必過於嚴其分矣然亦未嘗忘恭敬之心廉恥之節焉其有不同者食則命之祭然後祭爵則越席而飲者不敢留君惠也飲至於三而亟退者酒易及亂而遂其驩則無已也飯至於三而猶勸者食以養人而相愛之意為無窮也詩曰三爵不識矧敢多又故聘射之禮賔主百拜而酒三行則爵不過三古之定禮也若夫傳有四飯之文禮有勸飧之義其亦不厭於詳矣凡尊必上𤣥酒唯君面尊唯饗野人皆酒大夫側尊用棜士側尊用禁鄭氏曰𤣥酒不忘古也面猶鄉也燕禮曰司宫尊于東楹之西兩方壺左𤣥酒南上公尊瓦大兩有豐在尊南南上饗野人飲賤者不備禮也棜斯禁也無足有似於棜是以言棜孔氏曰人君燕臣子專其恩恵故尊鼻鄉君故鄭引燕臣子之法以解之若兩君相見則尊鼻於兩楹間在賔主之間夾之不得面鄉尊也饗野人謂蜡祭時也野人賤不得本古又無徳故唯酒而無水也側謂旁側在賔主兩楹間旁側夾之又東西横行異於君也若側尊近於君南北列之則燕禮所云是也大夫士側尊鄉飲酒義云尊於房户之間賔主共之也案鄉飲酒禮設兩壺于房户間有斯禁彼是大夫禮此云大夫用棜故知棜是斯禁也案特牲禮註云棜今木輿上有四周下無足今斯禁亦無足故云有似於棜延平周氏曰𤣥酒所以貴其道也面尊所以專其恩也饗野人皆酒者葢野人之所知者恩而已嚴陵方氏曰設𤣥酒之尊必在衆尊之上禮運言𤣥酒在室是矣面尊者尊鼻向君也面尊則不面君面尊者專恵之道也臣側尊者辟君之嫌也臣之側尊用棜禁則君之面尊用罍可知矣馬氏曰周官行人王禮諸侯饗而有祼孤卿無祼則以酒禮之而已觀此則君子之於野人又可知也然禮之不用𤣥酒非特此也士冠禮醴子昏禮醴婦聘禮醴賔皆無𤣥酒禮質故也特牲少牢陽厭酌一尊無𤣥酒禮殺故也昏禮尊于房户之間無𤣥酒外略於内故也士喪既夕士虞皆有酒醴無𤣥酒凶變於吉故也然則𤣥酒雖薄而其禮重醴酒雖厚而其禮輕記所謂近於人情非其至者於此見矣山隂陸氏曰水曰明水故此謂之𤣥酒少牢禮司宫尊兩壺于房户之間甒有𤣥酒則其兩甒各有𤣥酒大夫之禮也士虞禮尊兩甒于廟門外之右少南水尊在酒東則其一甒𤣥酒也尊各有面唯君對之據尊壺者面其鼻不上𤣥酒質朴素足禁即棜也變棜言禁棜之辭仁禁無所不禁賈氏曰無偶曰側置酒曰尊凡禮之通例稱側有二一者無偶特一為側又昏禮云側尊甒醴于房中亦是無𤣥酒曰側儀禮疏始冠緇布冠自諸侯下達冠而敝之可也鄭氏曰緇布冠本太古耳非時王之法服也孔氏曰自此至桓公始也一節廣論上下及吉凶冠之所用唯五十不散送及親没不髦記者雜録厠在其間始冠大夫士皆三加諸侯則四加從諸侯下達於士其初加者是緇布冠不復嘗著冠而敝去之可也餘見郊特牲延平周氏曰用緇布者所以立本也然非以趨時故既冠而即敝之可也𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也鄭氏曰𤣥冠朱組纓緇布冠繢緌皆始冠之冠也𤣥冠委貌也諸侯緇布冠有緌尊者飾也繢或作繪緌或作蕤丹組纓言齊時所服也四命以上齊祭異冠孔氏曰案郊特牲及士冠記皆云其緌也吾未之聞謂大夫士也此云繢緌諸侯之冠故知尊者飾也上云緇布冠自諸侯下達此更云緇布冠繢緌為緌起文也諸侯唯繢緌為異其頍項青組纓等皆與士同言齊者兼祭祀之時其祭則諸侯以𤣥冕也諸侯𤣥冕祭𤣥冠齊孤則爵弁祭亦𤣥冠齊是齊祭異冠也其三命以下大夫則朝服以祭士則𤣥端以祭皆𤣥冠也此云𤣥冠綦組纓士之齊冠是齊祭同冠也長樂陳氏曰考之於禮始冠緇布冠自諸侯下達則諸侯所以異於大夫士者繢緌耳天子始冠不以緇布而以𤣥冠然其子則猶士而已以天下無生而貴也𤣥冠朱組纓則緌可知也緇布冠繢緌則纓可知也朱以著正陽之色繢以備五采之文五采雖美不若正陽之純純其飾所以異也國語委貌有笄士冠禮緇布冠無笄則天子始冠之冠有笄諸侯始冠之冠無笄明矣諸侯與士之齊則同而尊卑之分則異同故皆𤣥冠以一其誠異故組纓殊色以辨其等諸侯丹組纓則陽而已以其純於徳故也士綦組纓則隂陽雜矣以其不純於徳故也綦蒼艾色也詩以綦巾為女巾書與詩以騏弁為士弁禮以綦組為世子之佩綬皆徳未成者之禮也孔子佩象環而綦組綬則其義異此矣天子諸侯大夫齊祭異服特天子𤣥冕以祭羣小祀其冕葢與齊同而其異者𤣥服𤣥端而已士之齊祭一於冠端𤣥其冠葢與朝服之冠同其異者組纓之色而已禮書延平周氏曰六入為𤣥七入為緇𤣥者天道在北方之色緇者純陽之色也朱者含陽之色繢者陽事也以冠為體則組纓與緌皆用也含陽者天子之用而無為者乃其體也純隂者諸侯之體而陽者乃其用也嚴陵方氏曰天子言纓諸侯言緌互相備爾組葢綬屬以其縱横相阻故也然繢不可徒設設之於組又不可則設之於帛可知夫始冠之冠或以𤣥或以緇者反本復古也然𤣥則存乎天之色緇則雜以地之色故以為天子諸侯隆殺之辨齊之冠一以𤣥者以隂幽思也馬氏曰委貌之制不可考觀周禮言冠弁而康成以委貌言之則委貌類弁矣范文子以杖擊其子而折委笄則委貌有笄矣士冠禮緇布有纓無笄而皮爵弁有笄則委貌殊於緇布類於弁可知也周官司服其祭服有𤣥端素端記曰大古冠布齊則緇之又曰齊之𤣥也以幽隂思也又曰齊𤣥而養又曰𤣥冕齊戒鬼神隂陽也荀子曰端衣𤣥裳絻而乗路志不在於食葷葢大古之祭冠以緇周之祭冠以𤣥天子齊則𤣥冕而𤣥端所以絻而乗路者也諸侯而下則𤣥冠𤣥端而已所謂丹綦組纓是也山隂陸氏曰齊冠言諸侯不言天子則齊冠丹組纓亦天子之齊冠以朱組纓冠故以丹組纓齊據士冠禮緇布冠闕項青組纓亦齊冠雖非冠猶如此葢以冠行禮以冠齊以冕行禮以冕齊知然者以冕而親迎衮也而𤣥冕齊戒知之縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也垂緌五寸惰游之士也𤣥冠縞武不齒之服也鄭氏曰縞冠𤣥武謂父有喪服子為之不純吉也武冠卷也古者冠卷殊紕讀如埤益之埤紕縁邊也既祥之冠已祥祭而服之也間傳曰大祥素縞麻衣也惰游罷民也亦縞冠素紕凶服之象也垂長緌明非既祥也不齒之服所放不帥教者孔氏曰姓生也孫是子之所生故云子姓武用𤣥𤣥是吉冠用縞縞是凶吉而雜凶不純吉也卷用𤣥而冠用縞古者冠卷異色也縞冠素紕者謂縁冠兩邊及冠卷之下畔其冠與卷身皆用縞但以素縁耳縞是生絹而近吉當祥祭之時身著朝服首著縞冠以其漸吉故也不言以素為紕故喪服小記云除成䘮者朝服縞冠雜記祥主人之除也於夕為期朝服鄭云祭猶縞冠雜記又云既祥雖不當縞者必縞據此兩經二註皆云祥祭縞冠若既祥之後微申孝子哀情故加以素紕以素重於縞也垂緌五寸祥冠而加垂緌五寸也以文承上故知亦縞冠素紕惰游與下不齒相連故知是周禮坐嘉石之罷民也延平周氏曰冠之有卷猶足之有跡故迹謂之武而卷亦謂之武也冠用縞則凶武用𤣥則吉凶在上吉在下者子姓之冠也冠用縞則有吉之徴縁用布則有凶之道故縞冠素紕既祥則服之垂緌五寸以别之者抑末也𤣥為冠白為武以恥之者有加明刑之意嚴陵方氏曰子姓者子之所生得其正統者也正統為姓旁出為氏謂之子姓特牲饋食禮所謂子姓兄弟是矣為祖之亡也故冠用縞以示凶為父之存也故武用𤣥以示吉且冠在上武在下冠為外武為内為祖而縞尊尊於上也為父而𤣥親親於下也為祖而凶制義於外也為父而吉本仁於内也夫上下尊親之義内外仁義之别人道所以相齒者順此而已茍反而逆之豈所以為人道哉故冠宜縞而反以𤣥武宜𤣥而反以縞是逆之也宜為不齒之服矣既祥之冠不以布而以縞者以吉事之先見也紕不以采而以素者有禫餘哀故也於冠言縞則知素之為布於紕言素則知縞之非采惰游則不服田畝之士事必致勤而惰之書所謂惰農是也業必有常而游焉經所謂游民是也馬氏曰國語言率其子姓及國子姓詩言振振公姓喪大記子姓立于西方玉藻言子姓之冠葢孫之傳姓謂之子姓大祥之祭縞冠朝服而嚮於吉既祥則素縞麻衣而未忘乎哀則祥與既祥之冠同而其服異矣山隂陸氏曰縞冠𤣥武孫為祖既祥之冠縞冠素紕子為父既祥之冠上言子姓下言既祥相備也相備而言縞冠𤣥武在上謂其父親而先祖也子姓適孫也期而小祥孫為祖服除矣而父之服未除不敢純吉以有承重之端焉縞冠素紕練冠言縁祥􅃣言紕紕飾也祥而言飾亦言之法即吉服皆言純惰游言士非罷民著矣亦言士猶以士望之黄氏曰古者士農工商各有衣冠佩服以辨其升降民有不執四人之業者乃縞冠素紕垂緌五寸以標表之則不得與四人之列矣其不帥教者則黝冠縞武以罰之為不齒之人矣居則鄰里閭比督轄之行則闗譏詳察之故民知恥則惰業游手者革心而違教背訓者服義俾天下之人見其衣冠則知其善惡而國無幸民矣斯豈非三代聖王治天下之大法哉周禮大司宼以嘉石平罷民之罪者非此義也斯葢以衣冠之禮化竊幸游手無業之人非疲困之義也長樂陳氏曰蓋士之失位曰喪人其服飾則素衣其相見則弔惰游失業之士也縞冠素紕垂緌五寸宜矣先王之於民縣正趨其稼事而賞罰之載師凡宅不毛者田不耕者無職事者閭師不畜不耕者不樹不􅁞不績者困之以罰阨之以禁亦已至矣又垂緌五寸所以深激而勸之周官司宼以野刑上功紏力士師有野禁漢世有田律然則縞冠素紕垂緌五寸蓋野刑之類也惰游之責輕於不齒縞冠素紕垂緌五寸重於𤣥冠縞武惰游之辱則重而不齒之辱則輕何也蓋惰游者一時之過不齒之辱不特一時而已茍變惰游以趨職事則縞冠垂緌弃之可也若夫𤣥冠縞武或服之終身或服之三年先王豈忍重其辱於悠久哉然則以重馭暫義也以輕馭久仁也義故民畏其威仁故民懐其徳夫如是孰不勵業而遷善乎子姓之縞冠𤣥武則凶其上不齒之𤣥冠縞武則凶其下凶其上以父之有服故也凶其下以下之自貽故也禮書慶源輔氏曰垂緌五寸惰游之象也𤣥冠縞武既非凶服又非吉服故為不齒金華應氏曰垂緌五寸游􅂥而長非法服也特惰游之士耳蓋勤飭者敏於趨事謹於守禮故緌必短惰游者怠於事而侈於飾故特長今之游浪者峩其巾長其帶亦若此耳𤣥冠縞武未見其為辱所謂不齒者其爵髙道尊而不與衆齒亦如謂三命而不齒者歟蓋縞冠𤣥武則卑而有所厭𤣥冠縞武則尊而有所伸居冠屬武自天子下達有事然後緌鄭氏曰居冠燕居冠也著冠於武少威儀有事然後緌燕無事者去飾也孔氏曰屬武於冠冠武相連屬燕居率略少威儀故也又不加緌若非燕居則冠與武别臨著乃合之有儀飾故也長樂陳氏曰古者居冠屬武則非燕居武不屬於冠也喪冠條屬則非有喪者纓武異材也子姓之冠縞冠𤣥武不齒之冠𤣥冠縞武則非子姓與不齒者冠武同色也雜記曰委武𤣥縞而后蕤則武亦謂之委以其若冠之足故曰武以其委於下故曰委蓋古者施冠於首然後加武以約之觀喪大記弔者襲裘加武則武之所設所以約冠也禮書嚴陵方氏曰君子動而有為則詳而文靜而無事則略而質居冠屬武以靜而無事故略而質也有事然後緌者蓋緌所以為冠之飾無事則去飾故也其言與上文互相明爾延平周氏曰居冠屬卷去緌有燕居申申之意若諸侯齊與燕雖皆用𤣥冠然齊冠不屬卷而加緌則齊與燕其服不能無小異也馬氏曰屬武則不緌緌則不屬武宜屬武而緌則張而不弛文武不能也宜緌而屬武則弛而不張文武不為也觀先王之於旗也無事則結有事則斾其於絺綌也居則袗出則表皆動靜文質之意存焉則冠緌不同亦若此也山隂陸氏曰冠武異材冠已則委之所謂委武是也燕居著冠於武安不忘危也平居如此有事而委之斯可矣五十不散送親没不髦大帛不緌𤣥冠紫緌自魯桓公始也鄭氏曰五十送喪不散麻始衰不備禮也不髦去為子之飾大帛謂白布冠帛當為白不緌凶服去飾也𤣥冠紫緌僭宋王者之後服也緌當用繢孔氏曰始死三日之前要絰散垂三日之後乃絞之至葬啟殯已後亦散垂既葬乃絞五十既衰不能備禮故不散垂雜記云大白冠緇布冠皆不緌大白緇布連文故知此謂白布冠左傳云衛文公大帛之冠白繒冠也與此異鄭疑紫緌僭宋者以祭周公用白牡乗大路是魯用殷禮故疑紫緌僭宋後也上文有繢緌故知緌當用繢延平周氏曰五十不散送所以養筋力於始衰之年也親没不髦所以責成人於親没之後也大帛不緌所以異於吉也馬氏曰曲禮曰五十不致毁喪大記曰五十不成喪不致毁情也不成喪禮也子生三月翦髮為髦男角女羈否則男左女右及事父母緫拂髦故詩曰兩髦傳言弁髦大記諸侯小斂脱髦既夕禮士既殯脱髦蓋子之幼也父母翦髮為之鬌及長也因以為飾謂之髦存而不忍弃所以順父母之心長而不忘幼所以示人子之禮及親始死而猶幸其生焉故不脱之三日之後則幸生之心已矣脱之可也蓋親存而髦與恒言不稱老同意親没不髦與衣純不以青同意青赤黄白黒之五色直於甲丙戊庚壬之五方正色也甲己合而為緑丙辛合而為紅乙庚合而為碧丁壬合而為紫戊癸合而為緇間色也先王之於間色貴緇而已以其出而復於道故也至於紅紫碧緑則在所不為而紫尤君子所惡魯桓公以為冠緌豈禮也哉鄭氏以僭宋王之後其説無據不可用也山隂陸氏曰帛讀如字白言色大帛言質故衛文公大布之衣大帛之冠大白疏白也大布疏布也春秋傳曰分康叔以大路少帛少帛旗少大帛者也朝𤣥端夕深衣深衣三袪縫齊倍要衽當旁袂可以囬肘鄭氏曰謂大夫士也三袪者謂要中之數也袪尺二寸圍之為二尺四寸三之七尺二寸也縫紩也紩下齊倍要中齊丈四尺四寸縫或為逢或為豐衽謂裳幅所交裂也凡衽者或殺而下或殺而上是以小要取名焉衽屬衣則垂而放之屬裳則縫之以合前後上下相變也袂可以囬肘二尺二寸之節也孔氏曰自此至弗敢充也一節廣論衣服及裘裼襲之事大夫士早朝在私朝朝服𤣥端夕服深衣在私朝及家也以視私朝故服𤣥端若朝君則朝服也朝服其衣與𤣥端無異但其裳以素爾若大夫莫夕蓋亦朝服其士則用𤣥端其私朝及在家大夫士夕深衣也袪謂袂末言深衣之廣三倍於袂末案深衣云幅十有二以計之幅廣二尺二寸一幅破為二四邊各去一寸餘有一尺八寸每幅交解之濶頭廣尺二寸狹頭廣六寸此寛頭嚮下狹頭嚮上要中十二幅廣各六寸為七尺二寸此為裳之上畔下齊十二幅各廣尺二寸故為一丈四尺四寸此為裳之下畔縫齊倍要者縫下畔之廣倍於要中之廣也衽謂裳之交接之處當身之畔裳幅下廣尺二寸上濶六寸狹頭嚮上交裂一幅而為之鄭註凡衽非一之辭非獨深衣也或殺而下謂喪服之衽廣頭在上狹頭在下或殺而上謂深衣之衽寛頭在下狹頭在上深衣與喪服相對為小要兩旁皆有此衽故以小要取名也衽屬衣謂喪服或朝祭之衽屬裳謂深衣之衽上下相變謂上體是陽陽體舒散故垂而下下體是隂隂主收斂故縫而合之今刪定深衣之上獨得衽名不應假他餘服相對為衽何以知之深衣衣下屬幅而下裳下屬幅而上相對為衽鄭註深衣鉤邊今之曲裾則宜兩邊而有也但此等無文言之且從先儒之義袂上下廣二尺二寸肘長尺二寸故可以面肘也長樂陳氏曰深衣與長中同制異飾連裳方袷直繩旁衽以至裳十二幅要三袪縫齊倍要之類此其所同也深衣之純以采若素長衣之純素而已中衣之飾繡黼丹朱而與長衣又繼揜尺焉蓋以其衣裳邃焉故謂之深衣以其袪褎長焉故謂之長衣以其有表而在中焉故謂之中衣又曰長衣與深衣同以布中衣與長衣同揜袂深衣中衣用於吉凶長衣用於凶而已衽所以揜裳際也深衣連裳故衽屬衣餘衣不連裳故衽屬裳衣裳雖殊垂而放之一也故有事則或扱或執是衽未嘗縫之以合也棺之小要謂之衽以其揜縫若衣衽然非為小要而名之是衣衽皆狹上廣下未嘗有殺上殺下之異也詩言婦人之采芣莒或袺衽或襭衽是婦人之服未嘗無衽也衽之辨有上下其用有左右生者上右記曰親始死扱上衽是也死者與夷狄上左記曰小斂大斂祭服不倒皆左衽語曰被髮左衽是也禮書嚴陵方氏曰朝非𤣥衣也夕非𤣥端也端兼在首故主朝言之衣止在身故主夕言之朝𤣥端則大夫士所獨夕深衣則天子諸侯之所同𤣥端祭服從公亦服之者敬君也夫齊為下體之極下體則地道也隂道也天一而地二陽竒而隂偶倍要則二而偶之故也衽衣襟也山隂陸氏曰𤣥端與緇衣異緇衣不端製鄭氏謂𤣥端即朝服之衣易其裳爾言衣不盡先儒謂要廣七尺二寸齊廣一丈四尺四寸上狹下廣相縣如此非制作之情也縫或為豐為其倍也是故謂之豐若續衽續或為裕要縫半下要或為優其義一也優則不追矣裕愈益寛有餘裕也豐又非裕已也袂可以囬肘而已即裕可以運肘延平周氏曰朝𤣥端所以體道夕深衣所以自潔無私平直者自潔之事也以司服考之卿大夫士之於王朝與其助祭則服𤣥冕皮弁而𤣥端深衣者私家之朝夕也然君之夕深衣而臣之夕亦深衣可乎夫深衣者不特自潔蓋又足以責其成徳而表其有所受也君之與大夫士則莫不欲其有成徳而大夫士亦有家臣納誨則亦欲其有所受此君之與臣所以同用深衣又況臣之於私家其禮有所伸乎天之大數不過十二故為袪止於一尺二寸天位乎上地位乎下人位乎中以人配天地則為三才故中齊必用三袪之數中齊人之象也地配天則為兩儀故下齊倍要者兩中齊之數下齊地之象也衽當旁欲其直也袂可以囬肘欲其文武皆可施也禮記集説卷七十四
