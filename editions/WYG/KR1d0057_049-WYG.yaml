body:
  text: 禮記集説卷四十九宋衛湜撰曽子問曰君之喪既引聞父母之喪如之何孔子曰遂既封而歸不俟子鄭氏曰遂遂送君也封當為窆子嗣君也孔氏曰自此至而往論君葬在路遭父母喪或父母葬聞君喪之事窆下棺也既引是在途故遂送君不待子而先還若葬封墳既畢必在子還之後廬陵胡氏曰封墳即歸不在子還之後鄭意謂子亦當速反而虞不俟封墳故讀封為窆然長子歸虞餘子封墳乃歸也封如字曽子問曰父母之喪既引及塗聞君薨如之何孔子曰遂既封改服而往鄭氏曰封亦當為窆改服括髮徒跣布深衣扱上衽不以私喪包至尊孔氏曰禮親始死笄纚小斂始括髮今臣聞君喪即括髮者尋常是吉忽聞君喪若著笄纚則與吉同以首不可無飾故括髮也雜記云非從柩與反哭無免於恒故知葬時著免也曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事鄭氏曰上牲大夫少牢貴祿重宗也介副也不言庶使若可以祭然孔氏曰此一節論宗子祭用大夫牲之事宗子是士合用特牲今庶子身為大夫若祭祖禰當用少牢之牲就宗子之家而祭用大夫之牲是貴禄也宗廟在宗子之家是重宗也此宗子謂小宗也若大宗子為士得有祖禰二廟也若庶子是宗子親弟則與宗子同祖禰得以上牲於宗子之家而祭祖禰也但庶子為大夫得祭曽祖廟當寄曾祖廟於宗子之家亦得以上牲宗子為祭也若己是宗子從父庶子兄弟父之適子則於家自立禰廟其祖及曽祖亦於宗子之家寄立之亦以上牲宗子為祭若己是宗子從祖庶兄弟父祖之適則立祖禰廟於己家則亦寄立曽祖之廟於宗子之家已亦供上牲宗子為祭此大夫者謂諸侯大夫故少牢下文云宗子有罪居於他國則是據諸侯也宗子祭時祝辭云孝子某謂宗子也介子某謂庶子為大夫者告神止稱宗子其時庶子身在祭位也上云庶子為大夫祝云介子者庶子卑賤之稱介是副貳之義介副則可祭故鄭云使若可以祭然横渠張氏曰宗子為士立二廟支子為大夫當立三廟是曽祖之廟為大夫立不為宗子立矣然不可二宗别統故其廟亦立於宗子之家所謂以上牲祭於宗子之家者也祖考皆然故采蘋之序言大夫妻可以承先祖其詩曰于以奠之宗室牖下宗子為士庶子為大夫以上牲祭於宗子之家非惟為士直為庶人亦然嚴陵方氏曰宗子為之正庶子為助故庶子謂之介子内則謂衆婦為介婦亦此義大夫之牲以少牢為上故曰上牲四時之祭禮之常也故曰常事以其用介子之牲而祭故言為介子某以介子攝為祭主故言使介子某薦言薦之於彼執言執之於此凡祭皆執而薦之此言薦下言執互相備爾若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事鄭氏曰此之謂宗子攝大夫孔氏曰此一節以曽子前問宗子為士庶子為大夫孔子荅畢更為曽子廣陳宗子有罪出居他國庶子在家祭禮喪服小記曰士不攝大夫士攝大夫唯宗子也攝主不配不綏不嘏不舉不旅酬不陽厭見下文攝主不厭祭不旅不假不綏祭不配鄭氏曰皆辟正主厭厭飫神也厭有隂有陽迎尸之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設于西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏主人也不綏祭謂今主人也綏周禮作墮不配者祝辭不言以某妃配某氏孔氏曰此宗子有罪出在他國庶子為攝主不敢備禮案少牢特牲禮祝酌奠于鉶南復以辭饗告神是室奥隂静之處故云隂厭尸謖之後佐食徹尸之薦俎設於西北隅謂戸明白之處故曰陽厭其上大夫當自賔尸故少牢禮無陽厭下大夫不賔尸有陽厭也其天子諸侯明日乃為繹祭亦為陽厭也厭是神之厭飫今攝主謙退不為陽厭似若神未厭飫然也將祭旅酬之時賔奠不舉旅酬是賔主交歡之始今攝主不敢當正主故不旅也古旁之嘏是福慶之辭唯主人受嘏主人欲食之時先減黍稷牢肉而祭之於豆間故曰綏祭尸與主人俱有綏祭凡將受福先為綏祭今辟正主不敢受福故不綏也綏是減毁之名故從周禮墮為正守祧云既祭則藏其隋是也祝辭直言薦歳事於皇祖伯某不云以某妃配某氏某氏者其妃之姓也若云某妃姜氏子氏之類也此經所陳從祭末以次至祭初逆陳之以攝主非正逆陳以見義長樂陳氏曰夫尸所以象神也厭所以飫神也殤之有厭為其無尸故也正祭有厭為其尸不存故也上大夫而上正祭無陽厭不敢遽飫之也攝祭無陽厭不敢飫之也適殤有隂厭則其禮詳庶殤有陽厭則其禮略觀隂厭尊有𤣥酒陽厭納一尊而已隂厭備鼎俎陽厭俎釋三介而已則陽厭之略可知也攝主不假以明福在主人非攝者所可受也隋祭所以祭鬼神之物猶生者之飲食必祭也其物黍稷與肺其樂鍾鼔賛之以祝祭之以佐食藏之以守祧而尸與主人主婦皆有是禮則尸既舉奠而綏祭祭神食也主人受酢而綏祭祭尸食也少牢主婦受祭於佐食而祭之特牲主婦祭以佐食而撫之以士卑而禮簡故也攝子不綏士虞無尸不綏以攝與尸非備文故也周人所祭莫先於肺天子諸侯或隋於堂上或隋於室中固不可考要之皆先祭肺而已山隂陸氏曰案祭之序配然後綏祭假次之旅次之陽厭最其後也今其言如此著尤不得已然後不配假嘏也以假易之著嘏假也此亦奠酬其異者不歸肉據昏禮奠酬歸婦俎於婦氏人布奠於賔賔奠而不舉鄭氏曰布奠謂主人酬賔奠觶於薦北賔奠謂取觶奠於薦南此酬之始也奠之不舉止旅孔氏曰主人酬賔之時賔在西廂東面主人布此奠爵於賔薦之北賔坐取薦北之爵奠於薦南而不舉用以酬兄弟此即不旅酬之事以上文緫云主人祭祀自此下更論賔禮有闕也案特牲禮云賔奠之後主人獻衆兄弟内兄弟訖乃行旅酬故鄭云此酬之始止旅謂止旅酬之事不歸肉其辭于賔曰宗兄宗弟宗子在他國使某辭鄭氏曰肉俎也謂與祭者留之共燕辭猶告也宿賔之辭與宗子為列則曰宗兄若宗弟昭穆異者曰宗子而已其辭若云宗兄某在他國使某執其常事使某告孔氏曰諸助祭賔客各使歸俎歸餽也今攝主不敢饋俎肉於賔也其將祭辭告于賔與常禮亦别其昭穆異者宗子雖祖父及子孫之行但謂之宗子曽子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告於墓而后祭於家宗子死稱名不言孝身没而已子游之徒有庶子祭者以此若義也今之祭者不首其義故誣於祭也鄭氏曰有子孫存不可以乏先祖之祀望墓為壇謂不祭於廟無爵者賤逺辟正主也宗子死言祭於家容無廟也稱名不言孝者孝宗子之稱不敢與之同其辭但言子某薦其常事至子可以稱孝故云身没而已子游之徒用此禮祭也以用也若順也首本也誣猶妄也孔氏曰此一節論庶子代宗子祭之事上問宗子在他國庶子為大夫得攝祭今問庶子無爵者云哉者以無正文疑而量度之辭宗子雖有廟在家庶子無爵不得就宗子之廟而祭唯可望近所祭者之墓而為壇以四時致祭也此宗廟謂有罪者若無罪則以廟從本國不得有廟故喪服小記註云宗子去國乃以廟從謂無罪也此孔子據宗子有爵身在外其廟在家而言今宗子既死庶子無所可辭當云告於墓而后祭於宗子之家今直云祭於家是祭於庶子無爵者之家容宗子之家無爵不立廟或云祭於家是祭於宗子之家容庶子之家無廟也庶子所以無廟者一是庶子無爵不合立廟二是宗子無罪居他國以廟從故也孝子是宗子之稱庶子不得稱唯己身終没而已其子則是庶子適子祭時可以稱孝禮無正文孔子引子游之徒有庶子祭用此禮是順於古義也今庶子祭妄為祭法是誣於祭横渠張氏曰嘉禮不野合野合則稊稗也故生不野合死不墓祭蓋燕享祭祀乃宫室中事後世習俗廢禮有踏青藉草而飲食故墓亦有祭如禮望墓為壇墓人為墓祭之尸是亦有時為之非禮經也後世在上者未能制禮則隨俗未免墓祭嚴陵方氏曰庶殺於適賤殺於貴禮之常也庶子無爵則非適非貴故雖可以祭其禮又為之殺焉曾子問曰祭必有尸乎若厭祭亦可乎孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取於同姓可也祭殤必厭蓋弗成也祭成喪而無尸是殤之也孔子曰有隂厭有陽厭鄭氏曰曽子言尸無益無用為厭時無尸也人以有子孫為成人子不殤父義由此也祭殤必厭厭飫而已不成其為人成喪無尸謂與不成人同也隂厭陽厭言祭殤之禮有於隂厭之者有於陽厭之者孔氏曰此一節論祭有尸有陽厭隂厭之事曾子以祭是祭神神無形象以生人象之無益死者若如厭祭亦可謂祭初尸未入之前祭末尸既起之後並皆無尸直設饌食以厭飫鬼神也孔子謂成人之喪有為人父之道必須有尸以象神之威儀也尸必以孫無則取同姓昭穆孫行適者可也年若幼在殤人道未備故祭殤必厭蓋以不成人不立尸也今祭成人喪但厭飫而已是與殤同也隂厭謂適殤也陽厭謂庶殤也馬氏曰厭不成禮之祭也厭於隂者宗子之殤而無後者厭於陽者凡殤與無後者其異何也宗子尊矣則以特牲即於隂者幽隂之義反諸幽求神之道也凡殤卑矣其祭也則就宗子之家當室之白則所謂堂事略矣宗子非不欲尊之也其所以不得成人者從祖祔祭而已於宗則明親䟽於廟則明尊卑唯其辟所尊故雖宗子不得為成人魯人欲勿殤童汪踦者為其能執干戈以衛社稷然後勿殤也可矣山隂陸氏曰厭猶禮之有飫也灌猶禮之有祼也朝獻猶禮之有饗也饋獻猶禮之有食也燕私猶禮之有燕也自一日而言之朝事象朝時事親所進饋食象食時所進然則饗朝食也燕夕事故詩饗言朝而燕同姓成於夜燕私也飫亦私也其所從異者飫立燕坐飫以顯物燕以合好而已故祭飫私在親燕私在諸父兄弟曽子問曰殤不祔祭何謂隂厭陽厭鄭氏曰祔當為備聲之誤也言殤乃不成人祭之不備禮而云隂厭陽厭乎此失孔子指也祭成人始設奠於奥迎尸之前謂之隂厭尸謖之後改饌於西北隅謂之陽厭殤則不備孔氏曰曽子不解孔子之指謂祭殤簡略一祭之中何備有此兩厭案喪服小記殤與無後者從祖祔食今云不祔與小記文乖故知祔為備也如隂厭尸未入之前陽厭尸起之後見特牲少牢禮文山隂陸氏曰據此成人之祭無隂厭陽厭鄭氏謂迎尸之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設西北隅是陽厭也非是案少牢祝酌奠下云敢用柔毛剛鬛嘉薦普淖用薦歳事于皇祖伯某以某妃配某氏則祝酌奠所以告之耳非隂厭也佐食徹尸薦俎敦設于西北隅凡在南扉用筵納一尊佐食闔牖户降則徹俎敦設于西北隅所以依神周官所謂藏其隋者此歟非陽厭也庶殤從祖祔食乃有隂厭陽厭即特祭不厭祭參是以云殤不祔祭蓋宗子之殤孔子曰宗子為殤而死庶子弗為後也鄭氏曰族人以其倫代之明不序昭穆立之廟其祭之就其祖而已代之者主其禮孔氏曰孔子更為辨云若宗子為殤而死以未成人庶子不得代為之後宗子禮不可闕明族人以其倫代之倫謂輩也謂與宗子昭穆同者則代之凡宗子為殤而死庶子既不得為後不以父服服之詳見鄭註喪服宗子孤為殤下以其倫代之者各以本服服之也云不序昭穆者以宗子殤死無為人父之道故不序昭穆不得與代之者為父也云代之者主其禮者以宗子存時族人凡殤死者宗子主其祭祀今宗子殤死明代為宗子者主其禮也此宗子是大宗族人但是宗子兄弟行無限親疏皆得代之河南程氏曰禮云宗子為殤宗子有君之道豈有殤之禮邪其吉祭特牲祭殤不舉無肵爼無𤣥酒不告利成是謂隂厭鄭氏曰用特牲者尊宗子從成人也凡殤則特豚自卒哭成事之後為吉祭舉肺脊肵俎利成禮之施於尸者隂厭者是宗子而殤祭之於奥之禮小宗為殤其祭禮亦如之孔氏曰士祭成人特牲今亦特牲尊宗子也凡殤降宗子之殤故用特豚耳肵是尸之所食歸餘之俎𤣥酒重古之義祭成人則有之利成謂祭畢告供養之禮成利猶養也不舉肺無肵俎不告利成此三事本主於尸今以無尸故不為𤣥酒本不為尸祭殤略無𤣥酒耳此宗子殤死祭於祖廟之奥隂闇之處是謂隂厭也鄭既云小宗為殤祭禮如大宗者以前經云宗子為殤而死不顯大小故知凡宗子殤祭之禮皆然必知此經指大宗者以何休公羊註云小宗無子則絶大宗無子則不絶重適之本上文庶子不為後謂大宗子在殤而死不得為後若非殤則得為後故知是大宗也凡宗子成人而死則得立子孫為後若立兄弟為後則不可故成十五年公羊傳譏仲嬰齊是公孫歸父之弟當云公孫嬰齊而云仲嬰齊者為歸父之後譏其亂昭穆故云仲是也熊氏曰殤與無後者唯祔與除服二祭則止此言吉祭者唯據祔與除服也山隂陸氏曰此荅曽子殤不祔祭蓋如此故曰其吉祭特牲正言吉祭嫌吉時祭從祖祔食也鄭氏謂自卒哭成事之後為吉祭非是祭殤舉於祭始不舉於祭終不告利成下成人也言不舉不言不舉肺容三代祭殤皆如此夏后氏祭心殷祭肝周祭肺無肵俎敬不足也無𤣥酒禮不備也是謂隂厭言若此殤然後有隂厭陽厭也雖曰從祖祔食其異者不舉無肵俎無𤣥酒不告利成爾然則隂厭猶正祭也陽厭其猶繹歟凡殤與無後者祭於宗子之家當室之白尊于東房是謂陽厭鄭氏曰凡殤謂庶子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此則今死者皆宗子大功之内親共祖禰者言祭於宗子之家者為有異居之道無廟者為墠祭之親者共其牲物宗子皆主其禮當室之白尊於東房異於宗子之為殤當室之白謂西北隅得户明者也明者曰陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦為凡殤過此以往則不祭也祭適者天子下祭五諸侯下祭三大夫下祭二士以下祭子而止孔氏曰凡殤謂非宗子之殤無後謂庶子之身無子孫為後此二者皆宗子大功内親祭於宗子之家祖廟之内不敢在成人之處故於當室之明白顯露之處為之設尊於東房以其明是陽故為陽厭也鄭註庶子之適一句與下文為緫即是昆弟之子從父昆弟是也云或昆弟之子者謂宗子親昆弟所生之子是適其昆弟是庶子昆弟所生者是適故云庶子之適云或從父昆弟者亦謂宗子之從父兄弟宗子之父身是適諸父是庶諸父所生之適子亦是庶子之適云無後者如有昆弟及諸父者如而也而有昆弟謂宗子之親庶兄弟與宗子同祖今既無後祭之當於宗子祖廟及諸父謂宗子諸父身並是庶子與宗子同曽祖祭之當於宗子曾祖之廟凡殤有二一昆弟之子祭之當於宗子父廟二是從父昆弟祭之當於宗子祖廟其無後者亦有二一是昆弟無後祭之當於宗子祖廟二是諸父無後祭之當於宗子曾祖之廟凡殤得祭者以其身是適故也無後者成人無後則祭若在殤而死則不祭以其身是庶故也案小記云庶子不祭殤與無後者殤與無後者從祖祔食註云不祭殤者父之庶不祭無後者祖之庶但此經據死者之身小記註據生者設祭之人義與此不異也云此則今死者皆宗子大功之内親共祖禰者從父凡弟是宗子大功親昆弟諸父是宗子期親諸父及從兄弟共祖者昆弟及昆弟之子共禰者鄭必限以大功内親共祖禰者以上文云吉祭特牲唯據士禮適士二廟有祖有禰下士祖禰共廟故鄭限以祖禰同者唯大功之内親也禮大功以上同居命士以上則父子異宫故云有異居之道士立二廟若祭諸父當於宗子曾祖之廟宗子是士但有二廟無曾祖廟故云無廟者為墠祭之大功雖有同財之義其經營祭祀牲牢之屬親者主為之又牲牢視親者之品命故云親者其其牲物就宗子之家祭其祖禰故云宗子主其禮也上經云宗子為殤而死據宗子身殤不論宗子適子也此明宗子適子父雖是適其子殤死既無别文故云亦為凡殤也唯宗子身殤及宗子昆弟之子及從父昆弟并宗子適子等殤死祭之過此以外皆不祭也云祭適者天子下祭五以下並祭法文詳見祭法註河南程氏曰無服之殤不祭下殤之祭終父母之身中殤之祭終兄弟之身長殤之祭終兄弟之子之身成人而無後者終兄弟之孫之身此皆以義起也嚴陵方氏曰陽尊而隂卑宗子之殤曰隂厭而凡殤曰陽厭者鬼神尚幽闇故也曽子問曰葬引至于堩日有食之則有變乎且不乎孔子曰昔者吾從老耼助葬於巷黨及堩日有食之老耼曰丘止柩就道右止哭以聽變既明反而后行曰禮也反葬而丘問之曰夫柩不可以反者也日有食之不知其己之遲數則豈如行哉老耼曰諸侯朝天子見日而行逮日而舎奠大夫使見日而行逮日而舎夫柩不蚤出不莫宿見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也且君子行禮不以人之親痁患吾聞諸老耼云鄭氏曰堩道也變謂異禮巷黨黨名也就道右者行相左也變日食也反復也已止也數讀為速舎奠每將舎奠行主也不蚤出不莫宿謂侵晨夜近姦㓂也安知其不見星為無日而慝作豫止也痁病也以人之父母行禮而恐懼其有患害不為也孔氏曰此一節論葬在道逢日食之事曾子問葬引至塗值日食則變常禮而停住乎且遂行乎孔子荅以己從老耼助葬遭日食老耼令止柩待日光明反回而後引柩案儀禮云吉事交相左凶事交相右今柩行凶事相左者此據北出停柩在道東北嚮對南嚮行人為交相左也孔子云柩務速葬不可迴反今止柩不行不知日食休己之遲速設若遲晚至夜豈如蚤行至墓赴其吉辰也老耼言今柩見星而行便是輕薄人親與罪人同痁病也病於危也言不可使人之親病於危亡之患也唐陸氏曰老耼即老子也横渠張氏曰豫備深思之道也茍無虞也蓋幸而免也不知道當如是若老子送葬日食而止於堩似過也然蓋有是理嚴陵方氏曰夫柩不蚤出不莫宿者慮暗昧之中而有不測之患故也茍日食而行柩豈異夫蚤出莫宿者乎堩蓋恒行之塗也言恒行之塗防慎如此則非恒之塗可知也馬氏曰老耼以止柩聽變為愈於行也仲尼以為禮何也夫以人之葬中道而日食皆在道也蓋止則安行則危其行也非必犯患也以人之情為疑於疾患也患出於不測則其行不若止也然則其止非必安也就不得已則見星而行豈若止哉此仲尼所以疑於非禮而終亦以為禮也曽子問曰為君使而卒於舎禮曰公館復私館不復凡所使之國有司所授舎則公館己何謂私館不復也孔子曰善乎問之也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也鄭氏曰復始死招魂孔子善其問難明也公館若今縣官舎也公所為君所命使舎己者孔氏曰此一節論人臣死招魂復魄之事私館謂非君命所使私相停舎謂之私館公館謂公家所造之館與公命所使停舎之處君所命停舎之處即是卿大夫之館但有公命故謂之公館嚴陵方氏曰公館之禮宜隆故復私館之禮宜殺故不復也曾子問曰下殤土周葬于園遂與機而往塗邇故也今墓逺則其葬也如之何孔子曰吾聞諸老耼曰昔者史佚有子而死下殤也墓逺召公謂之曰何以不棺斂於宫中史佚曰吾敢乎哉召公言於周公周公曰豈不可史佚行之下殤用棺衣棺自史佚始也鄭氏曰土周堲周也周人以夏后氏之堲周葬下殤於園中以其去成人逺不就墓也機與尸之牀也以繩絙其中央又以繩從兩旁鉤之禮以機舉尸輿之以就園而斂葬焉塗近故耳輿機或為餘機曾子見今人斂下殤於宫中而葬於墓與成人同墓塗乃逺其葬當輿其棺乎載之也問禮之變也史佚成王時賢史也下殤欲葬墓如長殤從成人長殤有送葬車者則棺載之矣史佚賢猶有所不知召公欲斂於宫中如成人史佚畏知禮者召公為史佚問周公周公言是豈於禮不可不許也史佚失指以為許遂用召公之言棺謂斂於棺孔氏曰此一節論葬下殤之事下殤謂八歳至十一也園圃也輿猶抗也機者以木為之狀如牀無脚及輄簀也先用一繩直於中央繫著兩頭之榪又别取一繩繫一邊材横鉤中央直繩報還鉤材往還取匝兩邊悉然而後以尸置於繩上抗舉以往園中臨斂時當堲周之上先縮除直繩則兩邊交鉤之繩悉各離解而尸從機中央落入堲周中故云輿機而往也若成人墓逺則以棺衣棺於宫中案檀弓云夏后氏之堲周葬中殤據士及庶人也若諸侯長中下殤適者有遣車諸侯庶殤亦車一乗皆不用堲周輿機也諸侯庶下殤則輿機其大夫適長殤中殤亦車一乘下殤無車則輿機然則王之適庶長中下殤皆有遣車並不輿機士及庶人適庶皆無遣車則中下殤並皆輿機故熊氏云若無遣車中從下殤其長殤既無遣車年又長大不可與下殤同蓋棺斂於宫中載棺而往之墓從成人也曾子見時世禮變問其葬儀如何孔子舉史佚謂失禮所由之人召公名奭周公云豈者怪拒之辭又云不可是不許之辭云棺衣棺自史佚始明昔非唯於宫中不棺亦不衣也横渠張氏曰墓以栽植草木處謂之園曽子問下殤葬於園相去逺遂輿機而往者以其墓園相去塗邇若墓園相去逺則如之何故孔子引史佚之殤史佚必是墓逺故棺斂而往周公猶曰豈不可豈不可無乃不可也言園者當是墓之園既曰族葬必不别之園藍田吕氏曰園蓋在郭内藝植桑麻蔬果之地周官所謂園㕓二十而一莊子引顏子之言回有郭内之田足以供桑麻此乃園地古者葬殤之禮極略故無棺在園以其地近故輿機而葬及史佚欲葬其殤於墓既逺不可輿機遂用棺衣此禮所由失今日之事若用禮則當如古或勢不能用則非所敢聞以禮許人蓋古人之所戒山隂陸氏曰豈不可言可也下殤雖不棺斂於宫中即塗逺而欲拘墓近之制是膠也故召公權之周公與焉用棺衣棺謂宫中以棺草斂至墓又衣以棺也廬陵胡氏曰言是豈於禮不可蓋恚言也先儒云豈者怪拒之辭恐非曽子問曰卿大夫將為尸於公受宿矣而有齊衰内喪則如之何孔子曰出舎於公館以待事禮也孔子曰尸弁冕而出卿大夫士皆下之尸必式必有前驅鄭氏曰出舎公館吉凶不可同處也為君尸或弁者先祖或有為大夫士也卿大夫士見而下車尸小俛禮之前驅為辟道孔氏曰此一節論卿大夫與君為尸之事受宿謂受宿齋戒也出舎公館待事畢然後歸哭也孔子因廣説事尸之法案士虞禮尸服卒者之上服以君之先祖有為士者當著爵弁以助君祭故子孫祭之尸得服爵弁者若以助君祭服言之大夫著冕註云大夫因士連言耳案儀禮特牲尸服𤣥端少牢又云尸服朝服尸皆服在家自祭之服不服爵弁及冕者大夫士卑屈於人君故尸服父祖自祭之上服人君禮伸故尸服助祭之上服也子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也此之謂乎鄭氏曰初有司與疑有司初使之然致事還其職位於君則卒哭而致事不奪人親不可奪親二者恕也孝也孔氏曰自此至吾弗知也一節論君不奪孝子情之事子夏以人遭父母喪卒哭後國有金革戰伐之事無敢辭辟為是禮當然與為當初時有司强逼遣之與孔子引舊記之文解之君子謂人君也人臣有親喪許其致事是不奪人思親之心以己情恕彼此據君許於下也不可奪親謂臣遭親喪若不致事是自奪思親之心故遭喪須致事是不奪情以從利禄此謂孝也此據孝子之身也言孝子居喪不可以不致事人君不可以不許也皇氏曰夏后氏尚質孝子喪親君事不敢久留故既殯致事還君殷人漸文思親彌深故葬畢始致事還君周人極文悲哀至甚故卒哭而致事知周卒哭致事者以喪之大事有三殯也葬也卒哭也夏既殯殷既葬以此推之故知周卒哭也嚴陵方氏曰致事與大夫七十而致事之致事同義彼以老而不勝事此以喪而不勝事故皆致之於君也凡事皆然又况金革之事而可以無辟乎山隂陸氏曰有司從事於法者也子夏曰金革之事無辟也者非與孔子曰吾聞諸老耼曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也鄭氏曰子夏疑金革無辟之事禮當有然伯禽周公子封於魯有徐戎作難喪卒哭而征之急王事也征之作費誓吾弗知者時多攻取之兵言非禮也孔氏曰孔子前荅周人卒哭而致事則無從金革之理子夏既見周代行金革無辟之事謂其禮當然孔子言伯禽有為為之今以三年喪而從金革蓋直貪利攻取於人言不知是不得此禮也横渠張氏曰據稱所記老耼之説未嘗不謹禮然其書去聖棄知絶滅禮學何也老子為人必是簡易見孔子盛容貌謹舉止故言去子之驕氣恣色及孔子之問禮不得不以禮對金華應氏曰曾子以篤慤醇至之資而為潜心守約之學其於身也反觀内省而益加以傳習講貫之功其於禮也躬行實踐而又不廢乎旁搜博考之力訂之以耳目之所見聞隱之於心思之所防慮深知天下之義理無盡而事物亦日新而無窮有非夫人意料之所可及者其或講明之不素而猝然遇之則其處之未究其精微而應之必無以中其肯綮故歴舉喪祭吉凶雜出不齊之事而問於聖人其變故似異而可駭其節目似同而不必辨其纎悉曲折又似細而不足憂夫子隨事剖析而决其疑遂使千百載之下遇變事而知其權者亦如處約事而不失其經焉此皆其問荅講明之功也其後真積力久夫子語以一貫隨聲響荅略無留難其見益髙矣禮記集説卷四十九
