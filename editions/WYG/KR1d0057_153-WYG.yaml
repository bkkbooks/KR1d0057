body:
  text: 禮記集說卷一百五十三宋衛湜撰是故君子先愼乎德有德此有人有人此有土有土此有財有財此有用德者本也財者末也外本内末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出鄭氏曰用謂國用也施奪施其劫奪之情也悖猶逆也言君有逆命則民有逆辭也上貪於利則下人侵畔老子曰多藏必厚亡孔氏曰此明治國之道在貴德賤財有德之人人所附從有人則境土寛大有土則生殖萬物有財則有以供國用德能致財財由德有故德爲本財爲末外疏也内親也親財䟽德則爭利之人皆施其劫奪之情也涑水司馬氏曰君有德則人歸之人歸之則其土地且奚去我而適他言其要在得人心也延平周氏曰財之與德其猶隂之與陽乎隂能輔陽亦能害陽財本輔德亦能害德德者本也財者末也内本而外末則本重而末輕雖不爭民之施奪而施奪之權自歸於上也外本而内末則本輕而末重雖欲爭民之施奪而施奪之權不免在於民也嚴陵方氏曰外本内末爭民施奪孟子所謂苟爲後義而先利不奪不饜者亦此之意言悖而出亦悖而入者報施之理然也貨悖而入亦悖而出者消長之理然也山隂陸氏曰爭民施奪言爭民之所施亦爭民之所奪是與民爭利者也石林葉氏曰得道則多助故有德此有人得衆則得國故有人此有土非財無以聚人故有土此有財理財不以義則物必屈於欲故有財此有用財也土也人也非德不能有故曰德者本也有德則人歸矣財必生於土故曰財者末也内本而外末則人之所貴者德故天下各懷仁義以事其上雖不爭民之施奪而財自足也外本而内末則人所貴者財故上下交征以利則雖爭民之施奪而財亦不得而足矣蓋財聚而不能散則民離財雖多亦無以守財聚而能散則民附財雖少亦可以生故君人者修德以得人聚財以養人未有用財以道而民不聚亦未有聚財不以道而終能守也猶之言出於身旣悖於道而召禍乎外亦悖而入此必至之理也曾子曰出乎爾反乎爾其此之謂乎藍田吕氏曰知以德爲之本有人有土有財有國非吾患也不知以德爲本而本於財上下交征利不奪不饜矣此所謂外本内末爭民施奪者也天下之事未有不反者也惡言加於人則人亦將加惡言於己以非義之事取其財則必有非義之事費其財蓋不知義爲利者也東萊吕氏曰外本謂以本爲外内末謂以末爲内爭民施奪謂爭奪之民施其劫奪之情也言在上之人外本内末則是使爭鬬之民施其劫奪之情也言之出也不善則人亦以惡言反之悖出而悖入也貨之入也不善則亦必以不善失之悖入而悖出也此以言之出入明貨之出入延平黃氏曰財用自其有德而致之其取也有義非悖而入也其用也有禮非悖而出也范陽張氏曰德者本也財者末也德者義也財者利也以利爲尚則天下相率而爲利故起爭民施奪之心施者無所禁制也且義者何也忠信也德也財者何也利也驕泰也爭奪也好義則得民心好利則失民心失民心則天下社稷宗廟不保矣是以大學之道以義用財而不以財勝義蓋財聚則民散以利爲主則失民心矣財散則民聚以義爲主則得民心矣夫何故言悖而出者必有悖理之言以應之貨悖而入者必有悖理之事以散之故君子生財之道一以儉約爲先也新安朱氏曰先愼乎德承上文不可不愼而言德即所謂明德有人謂得衆有土謂得國有國則不患無財用矣德者本也財者末也本上文而言人君以德爲外以財爲内則是爭鬬其民而施之以劫奪之教也蓋財者人之所同欲不能絜矩而欲專之則民亦起而爭奪矣外本内末故財聚爭民施奪故民散反是則有德而有人矣悖逆也自先愼乎德以下至此又因財貨以明能絜矩與不能者之得失也曰所謂先愼乎德何也曰上言有國者不可不愼此言其所愼而當先者尤在於德也德即所謂明德所以愼之亦曰格物致知誠意正心以修其身而已矣曰此其深言務財用而失民何也曰有德而有人有土則因天分地不患乎無財用矣然不知本末而無絜矩之心則未有不爭鬬其民而施之以劫奪之教者也易大傳曰何以聚人曰財春秋外傳曰王人者將以導利而布之上下者也故財聚於上則民散於下矣財散於下則民歸於上矣言悖而出者亦悖而入貨悖而入者亦悖而出鄭氏以爲君有逆命則民有逆辭上貪於利則下人侵畔得其旨矣龍泉葉氏曰甚矣利之可畏也聚天下不可以無利而利聚則民必攜聖人知其然也散天下之財使之疏通流演而無壅遏偏聚之患若此則民聚矣以民聚爲財之本而以財聚爲民之病故以道權之以法御之天下本無可聚之財也其聚之者非義也悖也言當順以出貨當順以入出入各得其當而天下治小人則不然言以悖出貨以悖入至其報應之來速於影響驗於符節拱手視之而莫能救也霅川倪氏曰人之性善其德本明所以昬之者貪求近利謂道德爲無所利也孰知德之中自有利存乎其間爲人上者有德以拊民人懷而歸之有人以治其田疇扞其外侮以什一之法取於民通三十年之積有九年之蓄則有財矣前之本末以明德修身爲本其餘爲末本末之大者也今論德之與財亦以本末言本末之次者也爭民者爭民之利也上旣與民爭下必效之不奪不饜矣施言用之廣也用爭奪之術廣施之而無限節也新定邵氏曰財聚斂於上則民失所養而離散於下財布散於下則民得所養而聚戴乎上二者正相反也鹿臺鉅橋爲世永鑒然三代而下人主富民之念常輕富國之意常重雖號爲英明刻意爲善而充府庫實倉廩之念終未盡忘其故何也良由大學不講而所以明其明德者未至耳果能先謹乎德使此心天理湛然常明則民吾同胞痾癢疾痛舉切吾身發政施仁唯恐赤子之不得其所而何忍括民財以聚於其上哉康誥曰惟命不于常道善則得之不善則失之矣楚書曰楚國無以爲寶惟善以爲寶舅犯曰亡人無以爲寶仁親以爲寶鄭氏曰于於也天命不于常言不專祐一家也楚書楚昭王時書也言以善人爲寶時謂觀射父昭奚恤也舅犯晉文公之舅狐偃也亡人謂文公也時辟驪姬之讒亡在翟而獻公薨秦穆公使子顯弔因勸之復國舅犯爲之對此辭也仁親猶言親愛仁道也明不因喪規利也孔氏曰書之意言善則得之不善則失之嚴陵方氏曰惟善以爲寶者君也仁親以爲寶者子也君能寶善則足以爲貴於一國子能寶親則足以爲貴於一家雖其大小不同所以爲寶則一而已藍田吕氏曰自此至驕泰以失之冝在平天下在治其國一章後平天下者善與人同故取諸人以爲善利與人同故好貨好色與百姓同之善不與人同則媢疾之心生故無好善之心利不與人同則貪吝之心生故無好義逺利之誠觀康誥之言則知天命無常惟善是與也觀楚書曰咎犯之言則天下之寶惟善爲寶也新安朱氏曰道言也因上文引文王詩之意而申言之其丁寧反覆之意益深切矣楚書楚語言不寶金玉而寶善人也狐偃字子犯亡人文公時爲公子出亡在外也仁愛也事見檀弓此兩節又明不外本而内末之意曰前旣言命之不易矣此又言命之不常何也曰以天命之重而致其丁寧之意亦承上文言之也蓋善則得之者有德而有人之謂也不善則失之者悖入而悖出之謂也然則命之不常惟人之所自爲耳可不謹哉龍泉葉氏曰得失觀其善惡而已矣世固有得天下之大如舜禹而行道之人乞一簞食豆羹之微或不可而輒喪之者焉學者考其得失之際則善惡自我而物莫能違耳目之常者不可恃而一身之德不敢忽蓋晉楚之富未有可以因循而常守者也山高忽摧河深忽竭豈可幾乎楚書曰楚國無以爲寶惟善以爲寶舅犯曰亡人無以爲寶仁親以爲寶楚國雖大亡人雖微然所寶者非外假也亡人以仁親而後反楚國以爲善而永存當重耳逋亡奔困於憂患險阨之餘追念父母之所以遇己者深矣唯其克責咎悔之意足以消怨尤喟歎之心仁親愛篤之誠足以弭䟽薄讒閒之禍則桑落之下固所以爲晉室隆昌之符也四明李氏曰晉楚之爲國特夷狄之雄耳舅犯之爲臣特伯主之佐耳大學參稽格言以垂訓萬世乃於此乎取何歟蓋天下之善無窮君子之取善亦無窮一言當理皆可爲法一言契心皆可服行學者誠能多識前言以蓄其德則片辭隻字莫非實用博學詳說莫非切已苟徒徇口耳之習果何益哉元白金華邵氏曰自古人君急貨財失人心以至於喪天命者必有小人以功利導之故至於此無小人則人君決不自爲聚歛故引楚書及咎犯之言又引秦誓所言尊賢容衆之君子忌刻淺隘之小人而小人必屏之四方不與同處中國蓋導其君以功利至於失人心喪天命皆此等人也秦誓曰若有一个臣斷斷兮無它技其心休休焉其如有容焉人之有技若已有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉惟仁人放流之迸諸四夷不與同中國此謂唯仁人爲能愛人能惡人鄭氏曰秦誓尚書篇名也秦穆公伐鄭爲晉所敗于殽還誓其羣臣而作此篇斷斷誠一之貎也他技異端之技也有技才藝之士也若己有之不啻若自其口出皆樂人有善之甚也美士爲彦黎衆也尚庶幾也媢妬也違猶戾也俾使也拂戾賢人所爲使功不通於君也殆危也彦或作盤放去惡人媢疾之類者獨仁人能之如舜放四罪而天下咸服孔氏曰此明君臣進賢絀惡之事兮是語辭古文尚書兮爲漪休休寛容似有包含也不啻如自其口出謂心愛此彦聖之美多於口說言其愛樂之甚也寔是也美士爲彦爾雅釋訓文唯仁人之君能放流此蔽賢之人使迸逺在四夷也藍田吕氏曰仁者以天下爲度者也天下之所共好者仁也吾所以好仁天下之所同惡者不仁也吾所以惡不仁此所以能愛人能惡人也此所以能舉賢退不肖也此所以能好人之好惡人之惡不拂人之性而逺夫菑害者也山隂陸氏曰唯仁人爲能愛惡仁者必有勇故也亦仁人然後能放流之孔子曰懐惡而討誰不服范陽張氏曰修身齊家治國平天下無非以審好惡爲先大學於平天下旣歌南山有臺之詩以明好惡之審又歌節南山之詩以明好惡之僻且雜引康誥楚書舅犯秦誓之言以明好善惡惡之理且斷之以唯仁人放流害賢之人又言仁者能愛人能惡人予竊怪正心之說貴於無忿懥恐懼好樂憂患而修身齊家治國平天下之說皆在於審好惡何與正心之說相遼邪及讀唯仁人能愛人惡人之說然後知所以無忿懥恐懼好樂憂患者將以求心之本體本體旣見則私欲消融天理炳見好惡皆公天下而非其私矣石林葉氏曰技言其能己有技而人有之不媢疾者克己也彦言其才聖言其德已薄於才德而人有之其心好焉者愛人也能克己以愛人則人樂爲之用故雖有一介之賤斷斷之弱亦可以爲有蓋資諸己不足能資諸人以有爲君子亦與之也忌人之能與不容人之才德則所謂蔽賢匿善也仁人惡之故不與同中國新安朱氏曰聖通明也迸猶逐也言有此媢疾之人妨賢而病國則仁人必深惡而痛絶之以其至公無私故能得好惡之正如此也又曰其引秦誓何也曰言好善之利及其子孫不好善之害流於後世亦由絜矩與否之異也曰媢疾之人誠可惡矣然仁人惡之之深至於如此得無疾之己甚之亂邪曰小人爲惡千條萬端其可惡者不但媢疾一事而已仁人不深惡乎彼而獨深惡乎此者以其有害於善人使民不得被其澤而其流禍之長及於後世而未已也然非殺人于貨之盜則罪不至死故亦放流之而已然又念夫彼此之勢雖殊而苦樂之情則一今此惡人放之不逺則其爲害雖得不施於此而彼所放之地其民復何罪焉故不敢以己之惡施之於人而必逺而置之無人之竟以禦魑魅而後已蓋不唯保安善人使不蒙其害亦所以禁伏凶人使不得稔其惡雖因彼之善惡而有好惡之殊然所以仁之之意亦未嘗不行乎其間也此其爲禦亂之術至矣而何致亂之有曰屏之爲迸何也曰古字之通用也多矣漢石刻辭有引尊五美屏四惡者而以尊爲遵以屏爲迸則其證也曰仁人之能愛人能惡人何也曰仁人者私欲不萌而天下之公在我是以是非不謬而舉措得冝也東萊吕氏曰斷斷專慤而無他技則賊之者寡矣故其心廣大易直休休然其如有容固心之本體也所以迫隘忌克者小知賊之也曰其如有容者莫測其限量而難乎其形容也論君子之樂善終之以不啻如自其口出好之篤也論小人之忌善終之以俾不達惡之遂也小人之於君子不唯疾之惡之違之而已必左右沮遏千慮百圖非使君子不能自達則其心終不厭惡之未遂雖欲自己有所不能思其反則可知君子之於善矣龍泉葉氏曰此固其國家之所寶而一介臣者亦所恃以自寶也夫善不可以有形德不可以有心山嶽之所藏江河之所受誠有長養潤澤之功也天下之人好爲有形之善而各務自爲其始本出於善意而其終遂至於媢疾其禍遂至於喪邦者衆矣仁人其好善也篤則其去惡也果蓋非仁人之至善不足以知不仁之爲害也見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也好人之所惡惡人之所好是謂拂人之性菑必逮夫身是故君子有大道必忠信以得之驕泰以失之鄭氏曰命讀爲慢聲之誤也舉賢而不能使君以先已是輕慢於舉人也拂猶佹也逮及也大道行所由孔氏曰拂謂拂戾善人之性菑必及於身矣大道謂所由行孝弟仁義之大道也河南程氏曰命當作怠字之誤也先猶早也逺謂迸諸四夷之類自古用賢人而不能早退小人而不能逺以陷於禍敗者多矣伊川山隂陸氏曰孟子曰莫非命也命讀如字見賢而不能舉舉而不能先雖過也自天觀之命也見不善而不能退退而不能逺雖命也自人觀之過也舉賢好先退不肖惡近石林葉氏曰在下位而見賢有不能舉舉賢而有不能先猶可歸之命若夫居上位而見不善不能退雖退而不能逺之於己則不可歸之命亦過矣哉一人之情千萬人之情是也好其所惡惡其所好則拂其情矣故曰菑必及其身忠信吉德也驕泰凶德也修其吉以違其凶則君子之道永嘉薛氏曰進賢之法莫崇禮貌去惡之要莫先克己見賢而不能舉舉而不能先吾命之出者未至耳見不善而不能退退而不能逺是誰之過歟惟能公其心者可與論進賢退不肖之實以百姓之心爲心忠信君子所以仁菑必逮夫身者驕泰害之者也得失之要在我而已果能忠信則身修而能公其好惡賢不肖之進退在此而不在彼也新安朱氏曰命鄭氏云當作慢程子云當作怠未詳孰是若此者知所愛惡矣而未能盡愛惡之道蓋君子而未仁者也拂逆也好善而惡惡人之性也至於拂人之性則不仁之甚者也自秦誓至此又皆以申言好惡公私之極以明上文所引南山有臺節南山之意君子以位言之道謂居其位而修己治人之術發已自盡爲忠循物無違謂信驕者矜高泰者侈肆此因上所引文王康誥之意而言章内三言得失而語益加切蓋至此而天理存亡之幾决矣曰命之爲慢與其爲怠也孰得曰於義則皆通矣然無他書而證焉則兩存以俟知者可也曰好善惡惡人之性然也而有拂人之性者何哉曰不仁之人阿黨媢疾陷溺其心是以其所好惡戾於常性如此與民之父母能好惡人者正相反使其能勝私而絜矩則不至於是矣忠信驕泰之所以爲得失者何也曰忠信者盡己之心而不違於物絜矩之本也驕泰則恣己徇私以人從欲不能與人同好惡矣龍泉葉氏曰人之所好惡者天下之心也故其好之也非以爲己利其惡之也非以爲己怨凡以爲人而已君子豈有私意於其間哉夫惟好惡因物而無心曠然率性以合於大道逺禍求福無大於此矣是故君子有大道必忠信以得之驕泰以失之此最緊要是徹頭徹尾事此得失之常理也忠信有必得之理而無求得之心不志於得而不廢其道此所以爲忠信也至於驕泰之失則亡矣非敬無守也非禮無行也平居之用力於忠信者所以求免乎此也金華邵氏曰小人以聚斂失人心蓋本於奢侈無節而用度不足至君子之大道則以忠信得之忠信者誠實不事華靡之意也經曰忠信禮之本苟驕以自矜泰而自侈則失之矣新定邵氏曰前旣言爲人君者當順民之好惡此遂言臣下之好惡不可以不察蓋臣佐君以平治天下者也臣果好善邪必能進賢輔君以仁其民矣臣不好善而反惡人之善邪則必不能進賢以輔君而上下俱受其害矣仁人又當如此明其好惡以爲之用舍也夫善人天地之紀世患無是人耳幸有其人是固君上所賴以賛襄國家所賴以經理生民所賴以撫綏也古之聖王汲汲以求賢爲務古之賢臣汲汲以進賢爲忠凡以此爾否則賢者有致君澤民之藴而抑之使不得伸排之使不得進在賢者一身之榮悴夫何足計而君心無所啓沃國家無所倚賴生民無所庇庥其害可勝言哉不特此爾善人隐伏則憸人競進其好惡任情舉措舛逆後患餘禍且將蔓延而莫知所止又豈但爲一時之害而已哉此不祥之實蔽賢者當之自昔聖賢所以深惡於媢疾之人也若使人主徒知媢疾之可惡而不能斥逺之善亦何由伸唯仁人在上放之流之迸逐於四夷不與同居於中國所謂投諸四裔以禦魑魅是也此非仁人疾惡之已甚媢疾一事妨賢病國爲害最深必如是而後當其罪爾故曰唯仁人爲能愛人能惡人蓋仁人之心純乎天理黜陟刑賞如權衡然或輕或重銖兩不差此其所以爲能愛能惡歟苟爲不然見賢而不能舉舉之而不能先是雖知其人之可愛而不盡夫愛人之道也君子得以尤其慢見不善而不能退退之而不能遠是雖知其人之可惡而不盡夫惡人之道也君子得以咎其過然是二者雖未盡夫愛惡之道而猶未全昧夫愛惡之正也若夫好人之所惡惡人之所好則其拂戾於人之性也甚矣菑害並至必將逮其身如前所謂辟則爲天下僇者其斯之謂歟霅川倪氏曰前言去惡此言舉賢欲去惡必舉賢可也此章本爲去聚斂之臣兼言舉賢者相況取義也言舉賢不能先此其權在他人尚可以命言若見不善不能退退而不能遠此則在我不能無過不可言命也民之所好好之民之所惡惡之人所公惡而上反好之人所公好而上反惡之是拂逆人之性宜災禍之及身矣生財有大道生之者衆食之者寡爲之者疾用之者舒則財恒足矣仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也鄭氏曰財恒足者不務禄不肖而勉民以農也發起也言仁人有財則務於施與以起身成其令名不仁之人有身貪於聚斂以起財務成富未有上好仁而下不好義言君行仁道則其臣必義以義舉事無不成者其爲誠然如已府庫之財爲己有也孔氏曰此經明人君當先行仁義愛省國用以豐足財物生之者衆爲農桑多食之者寡謂減省無用之費爲之者疾謂百姓急營農桑事業用之者舒謂君緩於費用橫渠張氏曰知用財而不知養財天下所以窮知養財而不知用財天下所以不治仁者能散以顯己之仁不仁者能聚以顯己之富仁者無富於己則克儉於骨肉則恩及之利心多而義心少是不仁也藍田吕氏曰國無游民則生之者衆矣朝無幸位則食之者寡矣不違農時則爲之者疾矣量入爲出則用之者舒矣此生財之道也以財發身唯富足然後可以推吾濟人之惠也以身發財則非驕奢無以矜己之富也此仁不仁之分也故唯仁者能與天下同其利上有不私之仁下有樂輸之義心誠樂之如孝子之養父母未有子富而父貧百姓足而君不足者也延平周氏曰有生財者衆然後求其食財者寡有爲財者疾然後求其用財者舒此先王理財之成法也若不求生財爲財之道而徒欲食之寡用之舒者特墨子之私愛者耳以財發身者爲身而不爲財者也以身發財者爲財而不爲身者也上不好仁則下不好義下不好義則其事不能有終其事不能有終雖有府庫而財非其財此鹿臺之財所以不用於商而用於周者也嚴陵方氏曰仁者以財發身不仁者以身發財則身爲財所害利害之際在乎仁不仁之間而已上以仁而接下下以義而事上君臣上下報施之道如此而已然孟子曰君仁莫不仁君義莫不義者蓋孟子言教化之驗此言報施之宜教化之道上下無異報施之道上下不同義所以制事臣所以代終故曰未有好義而其事不終者也好義而賤利則無爭民施奪之患故繼之以未有府庫財非其財者也山隂陸氏曰未有府庫財非其財者也言民之所藏其府庫也荀息曰寶出之内藏藏之外府馬出之内廐繫之外廐石林葉氏曰生之者衆爲之者疾用天時也食之者寡用之者舒節人欲也得其時而不敢縱欲生財之道也爲仁者不富故凡聚財者欲其發身之仁也爲富者不仁故凡發身者欲其聚財之富也上能好仁則下不敢後其君故能義下能好義則可以有爲故終其事上下以仁義相與而事成矣凡府庫所積者無不義之財此德所以爲本財所以爲末也永嘉薛氏曰易稱何以聚人曰財財者國用所出其可緩乎雖然爲國務民之義而已財者利之所在人之所必爭也人必爭而我奪之則利心生而禮義消矣務民之義則天下一家而財不可勝用藏之於下猶在君也以財發身用之者也不知所以用之身爲財之役矣故君子先正其本爲上有節爲下敦本財用之出庸有窮乎是故務民之義在乎修身以仁民民化於仁則愛之如父母畏之如雷霆上下情通財皆可得而用率斯道也其有不終於義者乎一家仁而一國興仁非他道也務民之義不以利爲先爾東萊吕氏曰君子創業垂統爲可繼也若夫成功則天也然則有好義而其事不終者矣而大學以爲未有好義其事不終者何也曰好義則其志伸矣其志伸則其事終矣居仁新安朱氏曰愚案此因有土有財而言以明足國之道在乎務本而節用非必外本内末而後財可聚也自此以至終篇皆一意也發猶起也仁者散財以得民不仁者亡身以殖貨上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也曰上文深陳財用之失民矣此復言生財之道何也曰此所謂有土而有財者也夫洪範八政食貨爲先子貢問政而夫子告之亦以足食爲首蓋生民之道所不可一日無者聖人豈輕之哉特以爲國者以利爲利則必至於剥民自奉而有悖出之禍故深言其害以爲戒耳至於崇本節用有國之常政所以厚下而足民則固未嘗廢也吕氏之說得其旨矣有子曰百姓足君孰與不足孟子曰無政事則財用不足正此意也然孟子所謂政事則所以告齊梁之君使之制民之産者是矣豈若後世厲民自養之云哉曰仁者以財發身不仁者以身發財何也曰仁者不私其有故財散民聚而身尊不仁者唯利是圖故捐身賈禍以崇貨也然亦即貨而以其效言之爾非謂仁者眞有以財發身之意也曰未有府庫財非其財者何也曰上好仁則下好義矣下好義則事有終矣事有終則爲君者安富尊榮而府庫之財可長保矣此以財發身之效也上不好仁則下不好義下不好義則其事不終是將謂天僇之不暇而況府庫之財又豈得爲吾之財乎若商紂自焚而鉅橋鹿臺散德宗出走而瓊林大盈掠皆以身發財之效范陽張氏曰大學平天下之道也其末皆論財利之說何也蓋有德此有人有人此有土有土此有財有財此有用不講所以用財之說非失於侈汰必墮於聚斂故大學細極其理而以謂平天下者更當知所以用財之道也漢武帝罷黜百家表章六經似矣不知用財之道筭及舟車榷及鹽鐵以資淫侈之費唐明皇平定内難委任賢相似矣不知用財之道括田搔擾六使掊克亦以資淫侈之費唐德宗初即位放象貀出宫人似矣不知用財之道大盈瓊林間架除陌之貪其聚斂無所不到是皆不知用財之說至是也故君子生財之道一以儉約爲先儉約者義也生之雖衆食之乃寡非儉乎爲之雖疾用之乃舒舒簡也非約乎儉約爲心則無所往而不足矣蓋仁者以義爲主故財散之於民而其身之義亦因財以發見於天下不仁者以利爲主故財斂之於己而好利之心乃因財以發見於天下君人者將因財以揚己之義德乎抑將因財以揚己之利心乎宜知所自處也上好仁則下好義天下可長保矣豈有不善終之理乎所好者義則人君府庫之財皆什一之法所取於民者耳未嘗有一毫橫斂之物置於其間也是則府庫之財無非其所當有之財也說者謂民府庫之財無非人君之財此豈可以爲訓得不啓後世暴君汙吏貪欲之心借此以爲口實乎故余以爲財非其財者皆所當得之財也何謂不當得之財下文孟獻子之論是矣龍泉葉氏曰一人之所生過於一人之所食先王之法使天下之人皆足以生財則其職分之所當爲者汲汲爲之唯恐不及而不暇於用也夫是以天下無可理之財無可聚之利菽粟如水火而仁義存焉此其所以儉而能勤旣富而教也後世人倫不明始有食而不生用而不爲非特衆寡疾徐之間也然後其上焦然日以生財爲務而以聚斂爲當然蓋舜禹周公之法其謂之難明也久矣未易以一二言也仁者以身發財不仁者以財發身此一道也存乎其人之仁不仁而已鉅橋之粟鹿臺之財前日之所積今日之所散豈有異術哉雖然於陵仲子之操非天下之所能安也舜與跖之分王與霸之異全在義利之間唯其好義也則聚天下之人聚天下之人則致天下之財均其有無約其貧富成順致利以安天下所謂室家之道君臣父子之節養生送死之禮皆由此而成故曰未有好義而其事不終者也天下之事至於終極而不倦本末相應先後相爲其極至於無一夫之不獲者此好義之心所發也若夫利則止於是而已豈復能終其事哉霅川倪氏曰君子有大道可也生財亦曰大道者以見道之無所不通也以生財言之不以利爲利以義爲利是生財之大道也若以利爲利就使有得不過小道耳仁者以財發身蓋博施而名彰也爲仁不富雖不富然足以發其身而爲人所尊敬且得民矣不仁者知有身而不知有仁知有利而不知有義徒欲以身興發其財耳是以爲富者必不仁季氏雖富於周公而反以自損身固不能發好利而多怨多藏必厚亡其於財也亦何發之云錢塘于氏曰大學旣明忠信以爲生財之本又指仁義以立用財之訓仁者以財發身旣天下之財常足於天下而吾身不與焉惟上好乎仁則下歸乎義下歸乎義則終其奉上之事府庫無非義之財也新定邵氏曰生者衆多而食者寡少則必有餘蓄矣爲者敏疾而用者舒緩則必有積儲矣此財所以恒足歟善乎賈生之言曰夫百人作之不能衣一人欲天下亡寒不可得也一人耕之十夫聚而食之欲天下亡飢不可得也此言正與大學相發明發猶起也仁者以愛人利物爲事損上以益下財幾於散矣卒之人懷其惠仰若父母何榮如之是財雖散而身日起也故曰以財發身不仁者以剥民利己爲事苛征而虐取財非不聚也卒之民不堪命疾視若讎禍孰甚焉是財日起而身益危也故曰以身發財嗟夫仁者唯知與民共財而已初無心於藉是以發其身也而愛人者人常愛之乃天下必至之理故惠鮮鰥寡庶民子來未有上好仁以愛其民而下不好義以事其上者也庶民攻之不日成之未有下好義以事其上而所爲之事有不終者也斯民樂事勸功則爭出粟米絲麻作器皿通貨財以事其上又安有府庫財非其財者哉是仁者雖不以財自私而富有四海之内天下之財皆一人之財也彼不仁者之用心何其謬哉方其切切於斂財本以私其身也而卒因是以亡其身則雖有財安得而用之唐太宗語侍臣曰吾聞西域賈胡得美珠剖身以藏之人皆知笑彼之愛珠而不愛其身也帝王徇奢欲以亡國者何以異於彼胡之可笑邪斯言可以暗合以身發財之戒矣孟獻子曰畜馬乗不察於雞豚伐冰之家不畜牛羊百乗之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利爲利以義爲利也鄭氏曰孟獻子魯大夫仲孫蔑也畜馬乗謂以士初試爲大夫也伐冰之家卿大夫以上喪祭用冰百乗之家有采地者也雞豚牛羊民之所畜養以爲財利者也國家利義不利財盜臣損財耳聚斂之臣乃損義論語曰季氏富於周公而求也爲之聚斂非吾徒也小子鳴鼓而攻之可也孔氏曰此一經明治國家不可務積財案書傳士飭車駢馬詩云四牡騑騑大夫以上乃得乗四馬今下云伐冰之家是卿大夫今别云畜馬乗者不察雞豚故知士初試爲大夫也案昭四年左傳云大夫命婦喪浴用冰喪大記云士不用冰故知卿大夫也士若恩賜亦得用之但非其常故士喪賜冰賜夷槃可也百乗之家謂卿也故論語云百乗之家鄭云采地一同之廣輪是也山陰陸氏曰畜馬乗士也言乗不言車士乗棧車車不足言也言察不言畜雖畜之而不察百乗百邑春秋傳曰唯卿備百邑石林葉氏曰勞心者治人治人者食人故以義爲主勞力者治於人治於人者食人故以利爲主百乗之家非備貴者也然其職在於治人故不畜聚斂之臣畜聚斂之臣寧有盜臣蓋盜臣止於竊命而聚斂之臣則以掊克於民而民困雖有粟安得而食諸有國者不以利爲利以義爲利也然則正德利用厚生惟和先王猶用以爲治必曰義者何也蓋以利爲利則民所知者利而已故不奪不饜以義爲利則民知義矣利自存乎其間故三代盛時民以義事上則曰雨我公田遂及我私上以義恤民則曰駿發爾私終三十里上下相待如此豈爭奪而厭者乎藍田吕氏曰雞豚牛羊庶民之所畜也卿士大夫旣食於人又與之爭食則專利矣專利則以利爲利盜者失財於一旦矣聚斂者誅求而無厭此所以寧有盜臣也新安朱氏曰君子寧亡己之財而不忍傷民之力故寧有盜臣而不畜聚斂之臣此謂以下釋獻子之言也曰其引孟獻子之言何也曰雞豚牛羊民之所畜養以爲利者也旣已食君之禄而享民之奉矣則不當復與之爭此公儀子所以㧞園葵去織婦而董子因有與之齒者去其角傅之翼者兩其足之喻皆絜矩之義也聚斂之臣剥民之膏血以奉上而民被其殃盜臣竊君之府庫以自私而禍不及下仁者之心至誠惻怛寧亡己之財而不忍傷民之力所以與其有聚斂之臣寧有盜臣亦絜矩之義也昔孔子以臧文仲之妾織蒲而直斥其不仁以冉求聚斂於季氏而欲鳴鼔以聲其罪以聖人之宏大兼容温良博愛而所以責二子者疾痛深切不少假借如此其意亦可見矣曰國不以利爲利以義爲利何也曰以利爲利則上下交征不奪不厭以義爲利則不遺其親不後其君蓋唯義之安而自無所不到矣程子曰聖人以義爲利義之所安即利之所在正謂此也孟子分别義利拔本塞源之意其傳蓋亦出於此范陽張氏曰士初爲大夫而畜馬乗者不當有雞豚之財卿大夫喪事而得伐冰者則不當有牛羊之財卿大夫有采地而得百乗者則不當有聚斂之財有聚斂之臣以取不當得之財不若有盜臣而耗府庫之資也耗府庫止失財耳民心不動也有不當得之財則失民心矣財安用乎新定邵氏曰孟獻子魯大夫仲孫蔑也在春秋時以賢稱方獻子之未有是言也孰不曰盜臣竊吾之貨賄是不可有也聚斂之臣能爲吾生財是不可無也自獻子之言一出然後知盜臣竊吾之什百是什百而已也竊吾之千萬是千萬而已也若聚斂之臣爲吾罔利以召怨怨積而不可解則其禍有不可勝言者是盜竊之害猶小而聚斂之害甚大也二者俱不可有權輕重而論則與其有聚斂之臣寧有盜臣耳異時尹鐸保障繭絲之論蓋有見於斯也龍泉葉氏曰孟獻子衰世之大夫也未足以知大義之所在焉然其所存則固若此矣天下之惡無過於盜而謂聚斂爲甚者非惡之而然也計其利害之所終然後知其甚於盜也嚴陵方氏曰或不察於雞豚或不畜於牛羊或不畜聚斂之臣皆言受禄於公者不宜爭利於私也長國家而務財用者必自小人矣彼爲善之小人之使爲國家菑害並至雖有善者亦無如之何矣此謂國不以利爲利以義爲利也鄭氏曰務聚財利爲己用者必忘義是小人所爲也彼君也將欲以仁義善其政而使小人治其國家之事患難猥至雖云有善不能救之以其惡之已著也嚴陵方氏曰君子喻於義小人喻於利故務財用者必自小人小人所以得用者君以爲善政也菑害者天菑之人害之也石林葉氏曰聚人者財理財者義務財用求所以聚人也不務財用求所以爲義也小人不知所以聚人而務在於聚財此菑害所以並至也蓋冉求嘗問於孔子曰旣庶矣又何加焉曰富之及爲季氏聚斂則曰鳴鼓而攻之可也夫始告之以富者欲以聚人終責之以聚斂者爲其不義聖人之意蓋可知也新安朱氏曰彼爲善之此句上下疑有闕文誤字自由也言由小人導之也此一節深明以利爲利之害而重言以結之其丁寧反覆之意切矣曰此其言菑害並至無如之何何也曰怨已結於民心則非一朝一夕之可解矣聖賢深探其實而極言之欲人有以審於未然而不爲無及於事之悔也以此爲防人猶有用桑𢎞羊孔僅宇文融楊慎矜陳京裴延齡之徒以敗其國者故陸宣公之言曰民者邦之本財者民之心其心傷則其本傷其本傷則枝榦凋瘁而根本蹷拔矣吕正獻公之言曰小人聚斂以佐人主之欲人主不悟以爲有利於國而不知其終爲害也賞其納忠而不知其大不忠也嘉其任怨而不知其怨歸於上也嗚呼若二公之言則可謂深得此章之指者矣有國家者可不監哉龍泉葉氏曰長國家而務財用此小人之所從入也非其國之好利則小人無自而進小人進則利門啓而百患起善爲國者明善敦化以示好惡使小人無間可入濡沫摩撫左右媚悅隂導利源使天下不知其取之有方其致之有故有以自結於人衆皆悅之而非先王之大道此所謂爲善之小人也天下之人知其攘臂而爲不義也則其君亦何遽用之唯其自名於善而不察也及其爲之上不當於天心下不合於民志其召禍之由陷民而亡其國者是小人之爲也東萊吕氏曰君不鄉道不志於仁而求富之是富桀也故長國家而務財用無與人同利之心是必小人矣人之所非彼之所善故曰今之所謂良臣古之所謂民賊也既曰善矣則唯其言之聽求善人之立而國之無菑害難矣是皆不知以義爲利與人同之而已又曰大學所記自致知格物以至家齊國治而天下平先後本末循循有序學者明乎此而力行之則聖功也而篇末乃反覆教戒爲利之害如此則知爲天下國家而賊夫心術者利爲甚何也以其私己而外人也私己而外人其身且不能保其能體人物與己爲一乎故記者極言之戰國之世聖人之道不行君臣父子之間所以相告語者唯有利害不知禮義當是時傳聖人之學者幾不立矣凡此之論皆以爲迂濶而逺事情賢者畏之故極言之以爲是則大學之終也居仁范陽張氏曰漢武財用桑𢎞羊孔僅咸陽啓之明皇財用宇文融王鉷楊慎矜楊國忠啓之德宗財用盧杞皇甫鎛啓之彼數君者以桑𢎞羊宇文融盧杞等爲善使爲國家然而漢武晚年盜賊四起明皇晚年有禄山之難德宗晚年有奉天之難菑害並起雖平時所謂善者如桑𢎞羊楊國忠盧杞輩亦無如之何然則國當以利爲利乎以義爲利乎藍田吕氏曰君不鄉道不志於仁而求富之是富桀也故長國家而務財用無與人同利之心是必小人者也小人者人之所非彼之所善故曰今之所謂良臣古之所謂民賊也既曰善矣則惟其言之聽持不仁之質以當國用事求善人之立而國之無菑害難矣是皆不知以義爲利與人同之而已建安眞氏曰義者天理之公也利者人欲之私也二者如冰炭之相反然一於義則利自在其中蓋義者宜也利亦宜也苟以義爲心則事無不宜也不惟宜於已亦且宜於人人己兩得其宜何利如之若以徇利爲心則利於己必害於人爭鬬攘奪於是乎興己亦豈能享其利哉又曰大學所謂利專指財利而言伊川先生云利不獨財利之利凡有一毫自便之心即是利此論尤有補於心術之微至南軒先生又謂無爲而爲皆義也有所爲而爲即利也其言愈精且微學者不可不知也然必先以不貪財利爲根脚基址方可說上兩節正如貧而無諂富而無驕方能漸至樂與好禮之地馴序用力自粗至精方可至純乎天理之地四明李氏曰君子喻義小人喻利一義一利截截乎冰炭之異涇渭之别也商湯惟知以義制事而貨利則不殖周武崇信明義而四海則大賚今乃以義爲利則是君子之喻義乃所以爲喻利邪曰是不然大學此語爲後世言之耳蓋自功利之說興聚斂之門起下焉者誇淺陋之規而排迂闊之見上焉者陽諱其名而隂蹈其實故大學君子直指利害之實而立爲以義爲利之論發明古人爲義之餘效而非以推原古人爲義之本心吁古人心事坦然明白惟知有是非不知有利害非曰人徒以利爲利我獨以義爲利揣量輕重巧擇其一假義利之名以濟功利之習也讀大學之書者以意逆志是爲得之元白新定邵氏曰世之人君苟非殘忍甚不仁者初豈有心於掊克其民哉彼小人者志於竊君之寵禄而無以爲進身之謀始唱爲興利之說以動其君之聽曰不如是無以充府庫而致富強也世主誘於其說始信之任之而不可回矣故凡欲藉是以長盛其國家而切切焉以財用爲務者必自小人始也彼爲善之一語殊不可解朱文公云上下疑有闕文誤字是己讀者略其辭而㑹其意可也記大學者若曰世主聽小人之言其心必善之謂真可以長國家也不知使斯人而爲國家乃怨讟之媒禍患之府也及菑害並至雖有善於營救者亦無所措手其將奈之何哉所以甚言夫小人之不可聽人主當速逺之母使他日有噬臍之悔也厥後孟子得之極口爲當時言者有能爲君闢土地充府庫者今之所謂良臣古之所謂民賊正與此章之指相爲發明由是論之爲國者其將以利爲利乎抑以義爲利乎大學於篇終一再言之後之治國平天下者可以觀矣禮記集說卷一百五十三
