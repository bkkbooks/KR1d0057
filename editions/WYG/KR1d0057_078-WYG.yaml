body:
  text: 禮記集說卷七十八宋衛湜撰眀堂位第十四孔氏曰案鄭目録云名曰眀堂位者以其記諸侯朝周公於眀堂之時所陳列之位也在國之陽其制東西九筵南北七筵堂崇一筵五室凢室二筵此於别録属眀堂隂陽案異義今戴禮説盛徳記曰眀堂者自古有之凢九室室四户八牖共三十六户七十二牖以茅盖屋上圓下方所以朝諸侯其外有水名曰辟廱眀堂月令説眀堂髙三丈東西九仞南北七筵上圓下方四堂十二室室四户八牖其宫方三百歩在近郊三十里淳于登説云眀堂在國之陽三里之外七里之内丙巳之地就陽位上圓下方八窓四闥布政之宫故稱眀堂周公祀文王於眀堂以配上帝五精之神大㣲之庭中有五帝坐位周禮孝經説眀堂文王之廟夏后氏曰世室殷人曰重屋周人曰眀堂東西九筵南北七筵堂崇一筵五室凢室二筵盖之以茅周公所以祀文王於此以昭事上帝許君謹案今禮古禮各以義説無眀文以知之鄭駿之云戴禮所云似秦吕不韋作春秋時説非古制也淳于登之言取義於孝經援神契今漢立眀堂於丙巳由此為之如鄭此説則用淳于登之説此别録所云則依考工記之文然先代諸儒説各不同故蔡邕眀堂月令章句云眀堂者天子大廟所以祭祀夏曰世室殷曰重屋周曰眀堂饗功養老敎學選士皆在其中故取正室之貌則曰大廟取其正室則曰大室取其堂則曰眀堂取其四時之學則曰大學取其圎水則曰辟廱名别而實同鄭必以為各異者袁準正論眀堂宗廟大學禮之本物也事義不同各有所為而世之論者合以為一取詩書放逸之文經典相似之語推而致之考之人情失之逺矣宗廟之中幽隠清淨而使衆學處焉饗射其中人鬼凟慢囚俘截耳非其理也茅茨采椽至質之物建日月乗玉路以處其中非其類也夫宗廟鬼神所居祭天而於人鬼之室非其處也王者五門宗廟在一門之内若射在於廟而張三侯又辟廱在内人物衆多殆非宗廟之中所能容也如準之論是鄭不同之意也新安朱氏曰論眀堂之制者非一熹竊意當有九室如井田之制東之中為青陽大廟東之南為青陽右个東之北為青陽左个南之中為眀堂大廟南之東即東之南為眀堂左个南之西即西之南為眀堂右个西之中為総章大廟西之南即南之西為総章左个西之北即北之西為総章右个北之中為𤣥堂大廟北之東即東之北為𤣥堂右个北之西即西之北為𤣥堂左个中央為大廟大室凢四方之大廟異方所其左个右个則青陽之右个乃眀堂之左个眀堂之右个乃総章之左个総章之右个乃𤣥堂之左个𤣥堂之右个乃青陽之左个也但随其時之方位開門耳大廟大室則每季十八日天子居焉古人制事多用井田遺意此恐亦然也又或問郊祀后稷以配天宗祀文王以配上帝帝即是天天即是帝卻分祭何也朱子曰為壇而祭故謂之天祭於屋下而以神祇祭之故謂之帝又曰眀堂恐只是一箇三間九架屋子長樂劉氏曰秦政狠暴既焚先王典籍又坑滅其能𫝊先王典籍之儒是以六官百度蕩然一空眀堂之制後世不可得而詳之矣兩漢以來諸儒各起臆見希合先王之規造制百出罔有定極世主弗得已而擇其順己者從之歴代承平㳂襲紛然極意於制作而未有及眀堂之義者夫失眀堂之義其制雖存猶曰虚器矧其制與義兼亡哉謹案孝經仲尼以教曽子者曰昔者周公宗祀文王於明堂以配上帝是故孝莫大於嚴父嚴父莫大於配天則周公其人也孟子對齊宣王曰眀堂者王者之堂也王欲行王政則勿毁之矣此謂東巡守肆覲東后於泰山之眀堂也然則王天下者必㑹天下之諸侯於眀堂以助天子報祭於上帝因而朝宗覲遇之禮或行於宗廟或㑹於眀堂皆所以分職授政任功考績如周之㑹同焉此眀堂之義也成王即位而十有三焉血氣幼弱未可勞之以天下之政也周公者文王之子武王之弟成王之叔也既具上聖之徳又為上公輔佐文王於岐周夙夜勤勞遂有天下乃代成王攝行天子之政固其家事也是以宗祀文王於眀堂以配上帝因而眀諸侯之尊卑定衆志之貴賤然後分六官之所職於天下授六典之為政於四方任九職之為功於兆民於是考其禮樂政刑之失得而賞罸廢置八柄之法行於諸侯矣此經所載周公朝諸侯於明堂之位其義如是也嚴陵方氏曰孔子言宗祀文王於眀堂則祀事以之眀故也孟子言行王政於眀堂則政事以之眀故也此言朝諸侯於眀堂則朝事以之眀故也謂之眀則一所以謂之眀則有三焉此主朝事之眀故以位言之君臣上下尊卑前後各有所位焉故曰眀堂位也馬氏曰孝經曰郊祀后稷以配天宗祀文王於眀堂以配上帝不曰祀后稷於眀堂以配文王則是郊者指其地而言之眀堂者指其在宗廟言之也先王之祀天神人鬼其酒曰眀水食曰眀粢服曰眀衣皆神之也眀堂之在宗廟亦所以神之也周公朝諸侯而必就眀堂者何也曲禮天子當依而立諸侯北靣而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝朝則位於内朝覲則受贄受享於廟而已今周公朝諸侯於眀堂之位所謂覲禮也成王之覲禮當在后稷之廟故周公於文王之廟以辟成王也然則眀堂者固在廟中而不言朝諸侯於文王之廟何也盖眀諸侯之尊卑則其號不可以言廟欲其辟成王之為天子則不可不於眀堂故也然既曰周公又曰天子則是成王固嘗受覲禮於文王之廟也以其制禮作樂者周公之事而於后稷之廟以朝諸侯則嫌於廢君臣之義故唯在文王之眀堂而成王亦負扆而朝覲也周公之朝諸侯所以眀功成王之受覲所以正名正名者禮也眀功者義也必受以文王廟而武王不預者何也盖孝莫大於嚴父也然方岳之下亦有眀堂者盖先王無行而不奉天之命也夫眀堂者天子朝諸侯班政敎之堂也以其位在國之陽天子居其中行政敎神而眀之故曰眀堂也考之制度則諸家之説皆不同難於考信也凢見於聖人之言者若孝經孟子是也自此之外無足信也而眀堂位亦不言眀堂之制但言周公為眀堂朝諸侯之事爾盖古者天子皆有眀堂而其制則因時改易是以百家之説不同也山隂陸氏曰清廟之詞約周也眀堂之詞侈魯也長樂陳氏曰眀堂之名見於周頌孝經左𫝊孟子荀卿考工記禮記家語其制不見於經特考工記曰夏后氏世室堂脩二七廣四脩一五室三四歩四三尺九階四旁兩夾窓白盛門堂三之二室三之一殷人重屋堂脩七尋堂崇三尺四阿重屋周人眀堂度九尺之筵東西九筵南北七筵堂崇一筵五室凢室二筵此三代眀堂之别也夏世室殷重屋周眀堂則制漸文矣夏度以歩殷度以尋周度以筵則堂漸廣矣夏言堂脩廣而不言崇殷言堂脩而不言廣言四阿而不言室周言堂脩廣崇而不言四阿其言盖皆互備鄭康成曰夏堂崇一尺殷堂廣九尋理或然也月令中央大室東青陽南眀堂西総章北𤣥堂皆分左右个與大廟則五室十二堂矣眀堂位前中階阼階賔階旁四門而南門之外又有應門則南三階東西北各二階而為九階矣盖木室於東北火室於東南金室於西南水室於西北土室於中央其外别之以十二堂通之以九堦環之以四門而南門之外加以應門此眀堂之大略也大戴禮白虎通韓嬰公玉帶淳于登桓譚鄭康威蔡邕之徒其論眀堂多矣特淳于登以為在國之陽三里之外七里之内其説盖有所𫝊然也何則聴朔必於眀堂而玉藻曰聴朔於南門之外則眀堂在國之南可知成王之朝諸侯四夷之君咸列四門之外而朝寢之閒有是制乎則眀堂在國之外可知鄭康成謂眀堂大廟路寢異實同制蔡邕謂眀堂大廟辟廱同實異名豈其然哉諸侯之廟見於公食大夫有東西房東西夾而已天子路寢見於書亦東西房東西夾又東序西序東堂西堂而已則大廟路寢無五室十二堂矣謂之眀堂大廟路寢異實同制非也宗廟居雉門之内而敎學飲射於其中則莫之容處學者於鬼神之宫享天神於人鬼之室則失之凟袁準甞攻之矣則謂之眀堂大廟辟廱同實異名非也彼盖以魯之大廟有天子眀堂之飾晉之眀堂有功臣登饗之事乃有同實異實之論是不知諸侯有大廟無眀堂特魯放其制晉放其名也四時之氣春為青陽夏為朱眀秋為白藏冬為𤣥英則青者春之色春者陽之中故春堂名之縂者物之聚章者文之成故秋堂名之眀者萬物之相見𤣥者萬物之復本故冬夏之堂名之左右之堂曰个以其介於四隅故也中之堂曰大廟以其大饗在焉故也古者鬼神所在皆謂之廟書與士虞以殯宫為廟則大饗在焉謂之大廟可也眀堂之作不始於周公而武王之時有之記曰祀乎眀堂而民知孝是也不特建之於内而外之四岳亦有之孟子之時齊有泰山之眀堂是也禮書盱江李氏曰眀堂者古聖王之大務也所以事上帝嚴先祖班時令合諸侯朝廷之儀莫盛於此然而年世乆逺規模靡見經𫝊所出參差不同羣儒譸張各信其習脩墜補闕何所適從案周禮考工記曰周人眀堂度九尺之筵東西九筵南北七筵堂崇一筵五室凢室二筵大戴禮盛徳記曰眀堂者自古有之凢九室室四户八牖共三十六户七十二牖禮記月令天子正月居青陽左个二月居青陽大廟三月居青陽右个四月居眀堂左个五月居眀堂大廟六月居眀堂右个中央土居大廟大室七月居総章左个八月居総章大廟九月居総章右个十月居𤣥堂左个十一月居𤣥堂大廟十二月居𤣥堂右个此三書者皆聖賢之所作述學者之所𫝊習而一事殊制乖逺如此註釋之家亦各未為精當考工記五室鄭康成觧云木室於東北火室於東南金室於西南水室於西北土室於中央故聶崇義三禮圖其為眀堂接於大室四角以為四室盖用此也且既以五室象五行矣則木火金水之室當在東南西北之正何乃置之四角而云木室兼水火室兼木若必如是則中央之室復何所兼哉此説誠未可用也盛徳記九室蔡伯喈之徒𫝊之接四室之角又為四室聶崇義誤以為秦人眀堂圖者是也案秦實無眀堂後儒見月令吕不韋所作有居眀堂之文疑為秦之眀堂爾然其四室之角復為四室未知何所使用將以象五行饗五帝乎則五室足以備之矣安用其餘將以配十二辰乎則四隅各兩室重在一方之上覈其意義反覆不安此説未可用也月令一大室四廟八左右个凢十三位鄭註青陽左个則曰大寢東南北偏正義以為云東堂者則知聴朔皆在堂不於五角之室中且夫謂之廟與个者當湏各是一位豈同在一堂靡所限隔而可稱為廟與个也盖康成既執眀堂為五室若於此十三位又為限隔則是實數頗多與己意相違故曲飾其辭以為三位同在一堂實不害於五室之文爾此説固不可用也至唐李林甫等註月令但知十三室各在其辰之上而不謀所以建立之處且大堂既居中央若其餘室連大室而為之則四面各可置一室四角闕處又各可置室復不能令各在其辰之上其餘四室更何所安就欲巧而成之愈乖於方位矣或將逺大室而為則未見有眀文言之者此説亦未可用也後魏時有李謐者作眀堂制度論竊所未喻且謂大室四面各為一室則四角闕處各方二筵二筵之地乃為兩便房基址既狹况地形斜角不知何以置之復何以能令各在其辰之上夫分十二辰之位當湏尺歩平均然後能正也豈有四面之室既以二筵為一辰左右之个乃以二筵為兩辰哉舉兹一隅又知其不足取法也愚竊考工記盛徳記月令三家所指制度誠大同但立言質略意義弗顯訓𫝊之士泥文大過因而背馳李謐之志稍欲搴而合之矣奈不得其旨尤而效之臣以為月令之文最為眀著輙亦取以為本而通之周戴夫以白虎通曰眀堂上圓下方八窓四闥上圓法天下方法地八窓象八風四闥法四時九室法九州十二坐法十二月三十六户法三十六雨七十二牖法七十二風斯言合於事理因亦取之詳考工記是言堂基脩廣非謂立室之數東西九筵南北七筵是言堂上非謂室中東西之堂各深四筵半南北之堂各深三筵半五室凢室二筵是言四堂中央有方十筵之地自東至西可營五室自南至北可營五室十筵中央方二筵之地既為大室矣欲連大室南作餘屋則不能令十二位各直其辰當湏於東南西北四面各虚方二筵之地四角闕處又各虚方二筵之地周而通之以為大廟而大室正居中所謂大廟大室者言此大廟之中有大室也大廟之外當子午卯酉四位上各畫方二筵地以與大廟相通所謂青陽眀堂総章𤣥堂等大廟者也當寅申巳亥辰戌丑未八位上各畫方一筵地以為室所謂左个右个者也八个之堂并大室而九所謂九室也室四面各有户户旁夾兩牖所謂三十六户七十二牖也青陽眀堂総章𤣥堂四大廟前面各為一門出於堂上門旁夾兩窓所謂八窓四闥也左右之个其實皆室但以分處左右形如夾房故有个之名也大廟之内以其大室其實祀文王配上帝之位也謂之廟者義當然矣土者分王四時負載萬物於五行最尊故天子當其時居大室用祭天之位以尊嚴之也四仲之月各得一時之中與餘月有異故復於子午卯酉之方取二筵地假大廟之名以聴其朔也若是則三家之指曷有異者但周禮言基而不及室大戴言室而不及廟稽之月令則備矣然非白虎通亦無以知窓闥之制也聶崇義所謂秦人眀堂者其制有十二階似恐古之遺法也當亦取之禮記外𫝊曰眀堂四面各五門今案眀堂位曰九夷之國東門之外八蠻之國南門之外六戎之國西門之外五狄之國北門之外九采之國應門之外時天子負斧依南面而立南門之外者北面東上應門之外者亦北面東上是南門之外有應門也既有應門則不得不有臯庫雉門矣眀堂者四時所居四面如一南面既有五門則餘三面皆有五門矣鄭康成註眀堂位則云正門謂之應門正義曰正門謂之應門者以眀堂更無重門非路門外之應門天子宫内有路寢故應門之内有路門眀堂既無路寢故無路門及以外諸門但有應門爾且既有東南西北門矣而又有應門非重門而何歟觀其本意當謂變南門之文以為應門也又但見王宫有路門其次乃有應門今眀堂無路門之名而但有應門便謂更無重門而南門即是應門矣且路寢之前則名路門其次有應門眀堂非路寢乃變其内門之名為東門西門而次有應門夫復何害於義抑夷蠻戎狄之君既在四門之外而外無重門則是列於郊野道路之間矣豈朝㑹之儀而草草若是乎王宫常所居猶設五門以限中外眀堂者郊天法地尊祖配帝而止以門表之是豈協於事宜也則四面各四門㫁在不疑矣愚又詳鄭康成註考工記夏后氏世室則云世室者宗廟也殷人重屋則云重屋者王宫正堂若大寢也周人眀堂則云眀堂者眀政敎之堂也此三者或舉宗廟或舉正寢或舉眀堂互言之以眀其同制又註玉藻曰天子廟及路寢皆如眀堂制仍與諸儒抗荅多方援引固以為三者同制後學承之莫有非者愚竊謂之不然矣茍路寢有四時之位則天子自可坐而聴朔奚用逺赴眀堂若以尊嚴國正當假祭天之廟以聴之則事畢而還復於路寢居其時之堂何所為也宗廟之祭堂室是一面而足四方之堂未聞所施設也既曰眀堂將以事上帝也宗廟將以尊先祖也而以己之正寢與之同制盖非尊祖事天之意也矧鄭之此說並由胷臆必謂眀堂宗廟路寢同為五室三代皆然但脩廣之度因時而變周監二代其為宗廟則法脩廣於夏其為路寢則取尋尺於殷其為眀堂則自為度筵之制實皆不改於五室焉此説皆非經見安用迂闊而談奚不直謂周家作宗廟則法於夏路寢則法於殷眀堂則自為之各求其制以示於世乎得非康成見世室有五室既以五行推之眀堂之文復有五室求其説而不獲及重屋之下都無室數遂乃巧為之辭以謂其制皆同乎今泛取諸書以定眀堂制度凢以九分當九尺之筵東西之堂共九筵南北之堂共七筵中央之地自東至西凢五室自南至北凢五室二筵則取於周禮考工記也一大室八左右个共九室室有四户八牖共三十六户七十二牖則協於大戴禮盛徳記也九室四廟共十三位則夲禮記月令也四廟之面各為一門門夾兩窓是為八窓四闥則稽於白虎通也十二階則采於聶崇義三禮圖也四面各五門則酌於眀堂位禮記外𫝊也金華唐氏曰眀堂之制雖不詳見經𫝊其制尚略可考諸儒各執所𫝊聚訟而不通起於考工之記經文質略大抵舉隅互見亦考之未精爾本朝李泰伯作眀堂定制圖刪摭諸家異同考工記月令大戴記白虎通之説挍諸鄭康成蔡邕李謐聶崇義為近矣而猶有未盡者亦考經未盡通也謂南北七筵東西九筵各用其半四堂之脩不等一不可也用其半則三筵有半僅三丈一尺而已祭祀之時登歌鐘磬彛尊在堂自簷之内為地三丈一尺何以容之况王者於此聴朔祀帝百官在列四海來祭而以脩三丈一尺之堂臨之不亦陋乎二不可也營造之法脩廣崇高略湏相稱以脩三丈一尺之堂而崇九尺不亦太高乎三不可也王者㑹朝諸侯正在眀堂獨褊其南北此為何意四不可也窓闥設於堂前之楹則諸侯之位當於何所容户牖設於堂之四面二筵之中尚可酌獻跪起乎五不可也九階著於考工必為十二階朝止於應門而必虚設臯庫不亦衍乎六不可也臨諸侯以九尺之堂而室堂無階級之閒是尊己而卑神七不可也考工三代之制雖異其名皆眀堂也其制相沿所異者夏度以歩殷度以尋周度以筵夏殷崇三尺周崇一筵自狹而廣自下而高而已其制度未始改也夏堂脩二七則四面之堂皆脩七歩矣廣四脩一則東西九歩南北七歩矣東西雖九歩其二則四堂之脩均矣五室三四歩四三尺者緫之而面十二歩一室而面十三尺也九階者四堂二而大室一也四旁兩夾忩者八窓而四闥室中之制也白盛白綴牖也白綴則户赤綴矣門堂三之二居四堂三之二也室三之一一門而二室三分之一也夏后氏之制儉矣五室合方四十歩堂脩止七歩可以無重屋也殷人度以尋則皆増四之一故殷謂之重屋者始重屋也堂脩七尋與堂脩二七一也夏舉其二面殷言其一面也堂崇三尺記其沿於夏也唐虞至儉猶土階三尺夏之堂不崇一尺其為康成臆説也眀矣禹卑宫室然復致孝乎鬼神其不能褊眀堂之制决矣殷崇三尺言基也周崇一筵言陛也九尺則四尺有五寸矣周堂之崇其不三倍於殷人眀矣四阿所以為上圓也重屋所以為四阿也周人眀堂之名舊矣舉眀堂以見世室重屋之皆眀堂也度九尺之筵則又増殷人廣脩九之一也東西九筵則廣四脩一也南北七筵即堂脩二七堂崇一筵則再倍於殷矣五室猶夏之五也凢室二筵則四三歩三四尺也緫之而十二筵分之而十有八尺也諸儒不能通而妄分以為宗廟路寢眀堂而紛紛之論出矣堂各居十二辰之位月令眀甚而謂堂亦在兩隅則先儒之失也東西九筵南北七筵舉每堂之脩耳而謂五室十二堂緫在九筵七筵之内則又先儒之失也今據考工為本參以月令白虎通於國之陽畫地四面方二百四十筵於中取方二十四筵以為五每室方三筵虚其十六筵室之兩旁為窓合八窓子午卯酉所虚二筵開四闥緫謂之大廟以中央四隅為五室縱横數之為九室四阿重屋上圓下方崇於堂一筵前為一階以通眀堂大廟室之外東西虚各四筵南北虚各二筵占地脩十筵廣十四筵南北之堂廣十四筵脩七筵崇一筵三在前四在後以設其戸牖上為重屋横六楹以為五閒左右个前直三楹如个字之形每楹間二牖一户大廟敞其前凡一堂為九十八牖東西之堂亦如之四堂八个三十六户七十二牖一户大廟面各二階與大廟合為九階堂之四隅以為四阿堂皆有門居堂三之一門堂各有室居門堂三之一外為應門雉門設兩觀參之考工記大戴記白虎通制度無不合計其室堂門庭之脩廣不儉不侈可以尊用以是天子布政之宫以聴朔視朝而饗帝於上亦庶乎其可也若乃本五室而不合乎月令之堂言九室而有乖乎考工之數折東西南北之筵而褊陋不足以容朝祀之禮宜其分爭而莫之决也眀堂之制定而眀堂之制行故於是合五帝昊天於季秋謂之大饗月朔以牲告其方之帝及其神座於眀堂以頒月令謂之聴朔天子負扆於眀堂自三公九采無不在列謂之朝位大饗在周配以文王我將之詩與樂記孝經之説是矣謂眀堂獨祀五帝而不及昊天不知孝經者也詩言天孝經言上帝則祀昊天眀矣謂五室各設於堂不知昊天上帝者也五帝各居其方則昊天祀於何室昊天祭於大室則五帝配位必非二筵之所兼容况夏室度以歩乎故奠方而五通數而九室有户牖而無三面之壁所以容六帝之座而便於周旋執事祭天特牲而詩曰維羊維牛則配座五人帝有牢禮眀堂之禮文郊丘矣文王配上帝周之子孫未之有改孝經謂之嚴父為周公言之也樂記謂祀乎眀堂而民知孝者為武王言之也若成王以降則亦祖而已徳如文王而可以配上帝文王既配上帝則武王雖無配可也康成謂聴朔配以文武鑿説也其説謂祭法禘郊祖宗皆配天之祭亦攷之未詳爾禘祖宗宗廟之祭郊配天之祭也鄭氏註大𫝊祖之所自出謂祭感生帝不足信也虞夏禘黄帝殷周禘嚳所以為祖之所自出也長𤼵大禘之詩而叙契至於阿衡其為禘昭穆之祭何疑禘不為郊則祖宗不為眀堂審矣况祭法七代之所更立者禘郊祖宗其餘不變也豈有不變宗廟者乎十二月各居其堂聴朔而已常居固在路寢爾堂以居室以祀中央非月朔也於是時告皇帝於大室無可頒之令不居祀神之室眀矣於此告神雖謂之居可也朝諸侯於眀堂之位周公當之位愈近者益尊鄭氏以九采為九牧非也門内六服也門外蠻夷也應門外鎮服也四塞即蕃國告至而已其或來也則位於九采之次决矣或曰古人以眀堂大廟辟廱同制而異名信乎曰是起於大戴記言外水為辟廱又言或以為文王之廟也又言此天子之路寢也蔡邕之徒祖其説皆考之未詳爾路寢之不在郊眀堂之不可為學宫大廟之不可為眀堂之制不待論而眀矣大戴所記雜有三代之禮兩存或者之𫝊則亦未可以决辭觀也古之辟廱居中而四學居其四旁大室上圜則水有辟廱之象五室謂之大室而於是祀文王複廟重簷茅屋示儉則有清廟之制外之四堂與其户牖路門則亦合於路寢常居謂之路寢猶宗廟之謂之大廟四堂及五室皆有大廟之名古人簡質不嫌同辭非謂眀堂即常居之寢大祖之廟也世室重屋眀堂同制異名而鄭氏離之眀堂辟廱清廟制有同者其實異所而蔡邕合之歴代之不為眀堂與其議論之不决盖由此秦溪楊氏曰眀堂者王者之堂也謂王者所居以出敎令之堂也夫王者所居非謂王者之常居也疏家云眀堂在國之南丙巳之地三里之外七里之内此言雖未可以為據然其制必凛然森嚴肅然清淨王者朝諸侯出敎令之時而後居焉而亦可以事天地交神眀於此地而無愧焉周人祀上帝於眀堂而以文王配之者此也説者乃以眀堂為宗廟又為大寢又為大學則不待辨説而知其謬矣惟考工記謂眀堂五室大戴謂眀堂九室二説不同前代欲建眀堂者或云五室或云九室徃徃惑於二説莫知所决而遂止愚謂五室取五方之義也九室則五方之外而必備四閒也九室之制視五室為尤備然王者居眀堂必順月令信如月令之説則為十二室可乎此又不通之論也惟朱子眀堂圖謂青陽之左个乃眀堂之左个東之南即南之東眀堂之右个乃緫章之左个緫章之右个乃𤣥堂之左个北之東即東之北𤣥堂之右个乃青陽之左个北之西即西之北但随其時之方位開門耳大廟大室則每時十八日居焉古人制事多用井田遺意此恐然也朱子所謂眀堂想只是一箇三間九架屋子者指五方四隅凢有九室之大略而言之也然則朱子之説其亦有據乎曰漢承秦後禮經無全書姑以考工記觀之意粗可見考工記曰周人眀堂度九尺之筵東西九筵為八丈一尺言眀堂之廣也南北七筵為六丈三尺言眀堂之脩也五室象五行之方位有五方則有四隅不言可知也夫有五方四隅則一堂之地裂而為九室矣又安得通而為一復有九筵之廣七筵之脩乎盖眀堂云者通眀之堂也所以朝諸侯行王政者在是所以饗上帝配祖考者在是非七筵九筵之脩不能行也五方四隅亦惟辨其方正其位随王者所居之月以詔王居以順月令以奉天道爾亦如所謂随其時之方位開門是也此其大略也又案齊宣王欲毁眀堂孟子曰王欲行王政則勿毁之矣此又王者巡守之地眀堂以朝諸侯行政敎非在國之眀堂也昔者周公朝諸侯于眀堂之位天子負斧依南鄉而立鄭氏曰周公攝王位以眀堂之禮朝諸侯也不於宗廟辟王也天子周公也負之言背也斧依為斧文屏風於户牖之閒周公於前立焉孔氏曰自此至之位也一節眀周公朝諸侯於眀堂之義及諸侯夷狄所立之處案覲禮諸侯受次于廟門外是覲在廟今辟王故在眀堂謂辟成王也釋宫云牖户之間謂之扆在眀堂中央大室户牖間横渠張氏曰眀堂者必是周公攝政不言踐阼故作此眀堂於國南以朝諸侯不然何以周官並不見眀堂唯見之考工記孟子言眀堂必是齊縁周公有眀堂以朝諸侯以天子之禮自處故作此堂於國中非周甞置之於泰山之下案眀堂之制自有十二月之政巡守至此亦暫處耳焉用設是秦有眀堂以其近古得古意猶多户牖之間謂之扆三分其堂東以為户西以為牖則中為墉即扆之所也以是西北為室之深奥郊祀后稷以配天宗祀文王於眀堂以配上帝天謂昊天也上帝五方帝也既言宗祀是亦廟祭然於眀堂恐但周公之義非周禮也亦是周公為成王立法使之至是月居是室頒是政諄諄提耳之義如周公則坐以待旦何待此以施政事當為後君立法後人有言為路寢天子之宫城必有路之象不害於城南設之宗祀文王於眀堂此禮恐只是周公之居攝時所行非周制也至如洛亦止有文武之廟長樂陳氏曰成王宅憂周公位冢宰而百官緫己以聴焉及既成洛邑輔成王以朝諸侯詩序言朝諸侯乃率以祀文王則朝不在廟而在眀堂可知也若曰周公代之而受朝則誤矣且周公之東征也稱王命然後徃其居東也俟王察已然後復則周公事成王如此孰謂敢代之乎代之之説始於荀卿盛於漢儒於是以復子眀辟為還政之事以誕保文武受命惟七年為還政之時是皆不知書者也禮書嚴陵方氏曰下言周公踐天子之位以治天下則負斧依南鄉而立者亦周公矣而曰天子者以朝諸侯之事主於天子非以周公也周公特攝之而已故政言天子斧即黼也其繡用斧故謂之斧依即扆也以人所依故謂之依且黼於五色得白黒焉其位則乾也又以見聖人體乾元於内而萬物由之以資始南於十日得丙丁焉其位則離也又以見聖人用離眀於外而萬物由之以相見也馬氏曰依者狀如屏風畫為斧形故曰斧扆斧者威㫁割之器也天子欲其有獨㫁之眀而申威於天下也南鄉而立南者陽之方萬物長養之所天子長養萬民如之特牲曰天子南鄉荅陽之義周公朝諸侯之時如此新安王氏曰武王末受命克商二年有疾周公告於三王於是有金縢之書武王崩成王幼周公東征後諸侯來朝成王即政於是受朝於眀堂周公相成王朝諸侯禮也謂攝王位非禮也鄭註可削天子成王也斧扆在户牖間其位王南郷古者受朝立而不坐三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上鄭氏曰朝位之上上近主位尊也孔氏曰此以下眀朝位之法周公已居天子之位餘有二公而云三公者舉國本數言之中階者南面三階故稱中侯對伯為尊故在阼階阼階近主位也伯以下皆云國此云位者以三公既云中階之前不云位諸侯在諸國之上特舉位言之眀以下皆朝位也三公則東上侯尊於伯故在東子尊於男亦在東是上近主位尊也長樂陳氏曰周禮治朝之位孤東面卿大夫西面外朝之位左孤卿右公侯伯子男射人孤東面卿大夫西面皆尚右東西面者皆尚北路門之左右者皆尚中而眀堂位諸侯西面諸伯東面則不尚右在門東西者東上則不尚中在西門之外者東面南上則不尚北何也儀禮諸侯覲于天子壇壝宫於國外上介皆奉其君之旂置于宫尚左公侯伯子男皆就其旂而立位皆東上是朝於國外與朝於國内之禮異也眀堂位與壇壝宫相類盖亦國外之禮然也禮書嚴陵方氏曰天子曰鄉諸臣曰面與郊特牲言君南鄉臣北面同義言阼階以知西階之為賔言西階以知阼階之為東公則尤尊故位中階之前以荅王焉以子對男則子尊而男卑故諸子位於門東諸男則位於門西馬氏曰三公尊故其位則立於中階之前三公人臣之尊非位之所能居故不言位諸侯言位則諸伯之下言位可知東方陽也尊者居之西方隂也卑者居之而侯之位立於阼階之東阼階者主人之階也西面北上者取其近天子也伯之國立於西階之西而西階者賔之階也侯尊而伯卑故侯立於東而伯立於西北面西上者亦取其近天子也諸子又卑於伯故位於門東北面東上者其禮與三公同也諸男又次於子故於門西北面東上禮亦與三公同也自此而上中國五等之諸侯朝位在門内山隂陸氏曰三公不言位進於位矣又新説曰孟子言周室之班爵禄也天子一位公一位侯一位伯一位子男同一位凢五等以此經考之盖周公朝諸侯於眀堂而其書謂之眀堂位則其事正言乎其位者也盖天子負斧依南郷而立即孟子所謂天子一位者也三公中階之前北面東上即孟子所謂公一位者也諸侯之位阼階之東西面北上諸伯之位西階之西東面北上即孟子所謂侯一位伯一位者也諸子之國門東北面東上諸男之國門西北面東上即孟子所謂子男同一位者也盖子男之位同在國門而郷又北面東上則其為位不異矣與諸伯等位在三階之前而面各不同則異也九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上孔氏曰案職方云四夷八蠻七閩九貉五戎六狄爾雅釋地云九夷八狄七戎六蠻謂之四海與此不同者爾雅釋地謂殷代此眀堂及職方並謂周禮但戎狄之數五六不同故鄭荅趙商問云職方四夷謂四方夷狄也九貉即九夷在東方八蠻在南方閩其别也戎狄之數或六或五兩文異爾按皇氏曰九夷在東門外之南故北上八蠻在南門外之西故東上六戎左西門外之北故南上五狄在北門外之西故東上下九采在應門外之西也長樂陳氏曰先王之於夷狄後之而弗先賤之而弗貴故疆以戎索和以舌人食之則委之牲體而坐諸外樂則不使亂雅而陳於門則位夷蠻於東南之門外位戎狄於西北之門外冝矣漢蕭望之欲貴單于於諸侯之上賈誼欲髙堂邃宇以懐其腹親酌而手食之以懐其心盖不知此禮書嚴陵方氏曰九夷東夷也故位於東門之外八蠻南夷也故位於南門之外六戎西夷也故位於西門之外五狄北夷也故位於北門之外夫君天道也故尚左臣地道也故尚右若三公之與子男八蠻之與九采皆北面而以東為上九夷西面而以北為上六戎東面而以南為上皆以右為尊故也諸侯西面諸伯東面皆以北為上盖以近君為尊故也至於五狄之國北門之外冝以西為上矣乃以東為上何也盖南面者君之正也北面者臣之正也故五狄之國臣而已然所國之方在北故位於北門之外南面焉南面疑於君矣故於北面者同其上所以别其為臣也馬氏曰名曰夷者言其易而無禮也名曰蠻者言其慢而無禮也戎則言其好用兵狄則言其逺而難化也山隂陸氏曰廟門謂之閍又其外為應門又其外為庫門南門即所謂庫門變言南善言庫門也然則諸子之國門東北面東上諸男之國門西北面東上門廟門也凢立位北面東上南面西上東面西面皆北上其正也今眀堂位六戎東面南上五狄南面東上變於中國從夷狄也然則先王所以待戎狄貶於蠻夷五服有蠻夷無戎狄以此蠻夷取數多戎狄取數少亦以此新安王氏曰此序諸侯之位也然亦有差誤周官侯服外有甸服甸服外有男服其外曰采服又其外曰衛服衛服外乃有蠻服蠻服外乃有夷服夷服外乃有鎮服蕃服周官所謂六年五服一朝盖言侯甸男采衛也作洛之役稱侯甸男邦采衛見於周皆不及蠻夷而采服諸侯與焉今蠻夷戎狄之國在宫門外九采之國反在應門外鄭説曰九采九州之牧正門謂之應門二伯率諸侯而入九牧居外糾察之何所據而為此説也周官職方九服有蠻服夷服而無戎狄之服大行人之職衛服之外有要服而無蠻服鄭曰要服即蠻服要服之外謂之蕃國世一見又曰蕃國夷服鎮服蕃服也今眀堂位蠻夷戎狄並在門外而夷服鎮服蕃服又在蠻夷戎狄之外謂之四塞記之所言己自可疑鄭註其可信乎九采之國應門之外北面東上四塞世告至此周公眀堂之位也鄭氏曰九采九州之牧典貢職者也正門謂之應門二伯帥諸侯而入牧居外而糾察之也四塞謂夷服鎮服蕃服在四方為蔽塞者新君即位則乃朝周禮侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見九州之外謂之畨國世一見此眀堂之位周公權用之朝之禮不於此也孔氏曰九州之牧謂之采者以采取當州美物而貢天子故王制云千里之外曰采註云采取美物以當穀稅采亦是事言各掌當州諸侯之事鄭註牧居外而糾察之是也眀堂更無重門此應門非路門外之應門也爾雅釋宫云正門謂之應門李巡云宫中南郷大門應門也應是當也以當朝正門故謂之應門但天子宫内有路寢故應門之内有路門眀堂既無路寢故無路門及以外諸侯但有應門耳顧命畢公率東方諸侯入應門右召公率西方諸侯入應門左故鄭知二伯帥諸侯而入也伯既領之入應門故牧居應門外糾察諸侯後入不如儀者九州之外夷狄為四方蕃塞每世一來朝告至或新王即位或己君初即位皆來朝也鄭引周禮大行人文證夷狄世一見即世告至也嚴陵方氏曰應門亦南門也不曰南門示其有别於八蠻也四塞言告至而已則不責之以朝貢之禮故也不言其位則亦順其四方而位於四門之外山隂陸氏曰禹貢五百里甸服五百里侯服而周官甸左侯服禹貢侯服百里采二百里男邦而周官男采綏服綏服二百里奮武衛而周官衛在要服要服三百里夷而周官夷在荒服三代相承至周風化所移寖廣故也然則侯先甸服男先采服蠻先夷服與禹貢文不同者言風化所移侯願服甸事男願服采事蠻願服夷事也九采之國所謂要服荒服是歟變言采者亦以夸大周公之徳雖在要荒願供王事也四塞即上九夷八蠻六戎五狄世告至謂随諸侯大朝㑹一見於王朝於門外是也謂之告至以此鄭氏謂新君即位乃朝非是盖新君即位與其新為諸侯自應一至不在大朝㑹之數也周公攝政辟尊己焉故眀諸侯之尊卑盖先王未之有也故曰此周公眀堂之位金華應氏曰朝㑹大禮也眀堂尤大朝㑹也車輅前陳旗物森列金石在虡琛贄充庭繰旒衮舄天臨乎其上簮緌舄履星拱於其下萬官千品孰不在列而乃不言者此方主於朝諸侯外之萬國必至則内之諸臣可知且王宫之顯職皆外服之重臣抑其班序素定而不必特記也三公亦在内之臣而此獨先之者中階而正王面地莫近焉在前而冠班首位莫尊焉非特以其緫領王朝之衆政亦有為二伯而兼統天下之諸侯者矣獨曰三公而不以外職者王朝體統之所繋也諸侯之國凢千七百七十三而環立乎一堂之下肩靡袂属盖不勝其壅矣故自公而下列為四等各以其序近則序立於階逺則序立於門而各分東西焉夷蠻戎狄之君随方環列立於四門之外分列四門則内為五室可以槩想既有南門而又有應門者南門洞啓不止於一而應門則當中而相應爾雅正門謂之應門故當中而北面東上者亦同於中階之三公焉前之三公外之九采内之諸侯外之四夷四面而立雖各異其方隅而環列相嚮無一人不得以對揚涉級而上雖各殊其階戺而趨進序升無一人不與之拱揖周書又有王㑹篇所載稍殊眀堂之朝位詳於諸侯而僅載四夷者聖人每詳内而略外也王㑹篇之朝位詳於四夷而略於諸侯者逺人自面内而嚮化也禮記集説卷七十八
