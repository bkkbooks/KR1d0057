body:
  text: 禮記集説卷七十宋衛湜撰父母雖没將為善思貽父母令名必果將為不善思貽父母羞辱必不果鄭氏曰貽遺也果決也嚴陵方氏曰將者萌其始之謂果者成其終之謂君子之心將有為也不必盡善以能有所思故不善終不成焉小人之心將有為也非盡不善以不能有所思故善終不成焉然則善不善亦在乎思不思果不果之間而已慶源輔氏曰檀弓曰䘮三年以為極亡則弗之忘矣於此可見也曽子曰五者不遂烖及其親敢不敬乎又曰父母既没當謹行其身不遺父母惡名可謂能終矣舅没則姑老冢婦所祭祀賔客每事必請於姑介婦請於冢婦舅姑使冢婦毋怠不友無禮於介婦舅姑若使介婦毋敢敵耦於冢婦不敢並行不敢並命不敢並坐鄭氏曰姑老謂𫝊家事於長婦也必請於姑者婦雖受𫝊猶不敢專行也介婦衆婦也請於冢婦以其代姑之事毋怠者雖有勤勞不敢懈倦也不友無禮於介婦者衆婦無禮冢婦不友之也善兄弟為友娣姒猶兄弟也毋敢敵耦雖有勤勞不敢掉磬也命為使令皆下冢婦也孔氏曰自此至后與之一節論婦事舅姑之禮并明冢婦介婦相與之節又明婦有私親賜之美物當獻於舅姑也若舅姑未没年七十以上𫝊家事於長子其婦亦從夫知家事也若舅没姑未老則其婦不得專知家事故經云姑老不友無禮於介婦者以衆婦無禮故冢婦䟽薄之若冢婦無禮衆婦當友之以適婦尊故也北海人謂相激之事為掉磬介婦不敢與冢婦並有教令之命下冢婦也嚴陵方氏曰婦人以從人為事故冢子之妻謂之冢婦猶之宗子之妻謂之宗婦也舅姑使冢婦毋怠者不以居長而敢自怠也毋敢敵耦於冢婦者兩相亢為敵兩相合為耦言事之勞逸不敢與冢婦均也不敢並行並坐亦毋敢敵耦之事也慶源輔氏曰舅没則姑老不以年計之也有婦則可以𫝊家事矣然至於祭祀賔客禮之大者亦必請命於姑然後從事夫然後婦姑各得其宜介婦不敢敵耦於冢婦必如是而後冢婦之志行而家事宜矣新安朱氏曰不友無禮於介婦此句之義未詳註説恐未然也或疑友當作敢江陵項氏曰不友無禮於介婦當連上下文讀之上文云舅姑使冢婦毋怠不友無禮於介婦言舅姑若任使冢婦冢婦毋得以尊自怠而凌辱衆婦令其代己也不友謂煩虐之無禮謂麾叱之怠也不友也無禮也三者皆當以毋字統之下文云舅姑若使介婦毋敢敵耦於冢婦不敢並行不敢並命不敢並坐亦謂不得恃舅姑之使令而傲冢婦也兩節皆主使令言之凡婦不命適私室不敢退婦將有事大小必請於舅姑子婦無私貨無私畜無私器不敢私假不敢私與婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏以待乏婦若有私親兄弟將與之則必復請其故賜而后與之鄭氏曰婦侍舅姑者也故不命適私室不敢退不敢專行故大小必請於舅姑家事統於尊故無私貨私畜私器私假私與或賜之者謂私親兄弟藏以待乏待舅姑之乏也不得命者不見許也孔氏曰若舅姑不乏私親兄弟既貧將欲以物與之不敢别請其財則必於舅姑處復請其故賜所藏之物舅姑既許然後取而與之嚴陵方氏曰私室即婦室也其視舅姑之室若公所故也舅没冢婦唯祭祀賔客之事則請於姑爾其餘則否也子婦無私貨以至不敢私與以家事統於尊故也􅊉蘭皆香草也而獻諸舅姑者不敢私受人故也請其故賜而後與之者不敢私與人故也慶源輔氏曰姑嚴則婦賢凡此非特舅姑之便其侍乃所以成婦之徳也有事則私事大小也必請於舅姑無所隠也私貨謂不請於舅姑而専有之者喜如新受賜人以予己已得以獻諸舅姑其喜一也始也人賜之今也親賜之又藏以待乏其心終一於舅姑也必請其故賜非誠於無私畜不私與者不能如此也適子庶子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也若非所獻則不敢以入於宗子之門不敢以貴富加於父兄宗族若富則具二牲獻其賢者於宗子夫婦皆齊而宗敬焉終事而后敢私祭鄭氏曰祗敬也宗大宗以寡約入謂入宗子家猶若也非所獻謂非宗子之爵所當服也加猶髙也獻其賢者賢猶善也夫婦皆齊當助祭於宗子之家也私祭祭其祖禰孔氏曰此一節論族人敬事宗子之禮適子謂父及祖之適子是小宗也庶子謂適子之弟宗子謂大宗子宗婦謂大宗子之婦也言小宗子及庶子等敬事大宗子及宗婦也歸謂歸遺也子弟若有功徳被尊上歸遺衣服裘衾車馬則必獻其善者於宗子富則具二牲其善者獻宗子使祭之不善者私用自祭也大宗子將祭之時小宗夫婦皆齊戒以助祭於大宗以加敬焉大宗終竟祭事而后敢私祭祖禰此文雖主事大宗子其大宗之外事小宗子者亦然嚴陵方氏曰大𫝊曰敬宗故収族収族故宗廟嚴則祗事宗子宗婦乃所以嚴宗廟而已雖貴富不敢以貴富入宗子之家雖衆車徒舎於外以寡約入者不敢以支臨宗也加於父兄宗族與獻子加於人一等之加同盖彼賤而我貴彼貧而我富而我以貴富服御入其門則是以貴富而加賤貧也終事而後敢私祭者盖宗之親為正統己之親為旁出也正統之有祭公義也旁出之有祭私恩也終宗子之事而後敢私祭則是不以旁出先正統不以私恩勝公義也山隂陸氏曰子弟猶歸句言適子庶子雖貴富不敢以貴富入宗子之家以寡約入雖子弟猶歸其家也其器衣服裘衾車馬雖無貴富所有然以必獻其上者於宗子慶源輔氏曰不以貴富入宗子家此不專為宗子於父兄宗族皆不可也前言人事而後言鬼事於鬼事而如此然後為至者其所以敬宗子者當如此則宗子之所以自處者當如何横渠張氏曰禮者祭畢然後敢私祭焉謂如父有二子㓜子欲祭父来兄家祭之此是私祭祖有諸孫適長孫已祭諸孫来祭者祭於長孫之家此是公祭祭祖則為公祭對祖而言則祭父為私祭其他推此皆然藍田吕氏曰宗子既祭其祖禰其支子不得别祭所以嚴宗廟合族屬故曰庶子不祭祖與禰明其宗也若已為宗子而弟有子其弟既死其子欲祭其父必從祖祔食祭於宗子之家乎將就其宫而祭使其子自主之乎從祖祔食祭於宗子之家止謂殤與無後盖殤與無後必宗子主之為可若有後者亦使宗子主之則子有不得事其父矣𫝊曰子不私其父則不成為子故兄弟生而異宫所以盡子之私養及其没也反不得主其祭於義可乎盖異宫者必祭於其宫而其子主祭其祭也必告於宗子而後行不得而專亦所以明其宗也宗子有祭必先與焉卒祭而後祭其父故曰支子不祭祭必告於宗子又曰終事而後敢私祭若非異宫則禮有所不得伸則雖祔食於祖廟亦可以安所謂不得已焉者庶子不祭祖明其宗也不祭禰明其宗也長樂陳氏曰荀卿曰大夫士有常宗左𫝊曰大夫有貳宗盖由士以上莫不知尊祖禰知尊祖禰則尊者常宗當其為宗則宗子統族人於外主婦統族婦於内死雖殤也必䘮以成人齒雖七十也主婦不可闕居雖異邦也正祭不可舉妻死雖母在也禫不可屈尊與出嫁者不敢降其服賢者不敢干其任貴者不敢擅其祭衆車徒不敢以入其門凡以尊正統而一人之情也唯其疾與不肖然後易之故史朝言孟縶非人也將不列於宗賀循言姦回淫亂則告廟而立其次凡此特義之權耳非其所得已者也方周之盛時宗族之法行故常棣行葦之美作於上角弓頍弁之刺不聞於下以此治國而國有倫以此繋民而民不散則宗子之於天下豈小補哉及秦用商君之法富民有子則分居貧民有子則出贅由是其流及上雖王公大人亦莫知有敬宗之道浸淫後世襲以為俗而時君所以統馭之者特服紀之律而已間有糾合宗族一再𫝊而不散者則人異之以為義門此名生於不足歟禮書飯黍稷稻粱白黍黄粱稰穛膳膷臐膮醢牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醬魚膾雉兔鶉鷃鄭氏曰飯目諸飯也黍黄黍也孰穫曰稰生穫曰穛膳目諸膳也此上大夫之禮庶羞二十豆以公食大夫禮饌校之則膮牛炙間不得有醢醢衍字又以鷃為鴽孔氏曰自此至薑桂一即總論飯飲膳羞調和之宜又明四時膳食所用并明善惡治擇之等顯貴賤所食之别此飯之所載凡有六種下云白黍則上黍是黄黍也下云黄粱則上粱是白粱也案玉藻諸侯朔食四簋黍稷稻粱天子乃加以麥苽為六膳豆上所盛羮膳謂羮與胾醢之屬案公食大夫禮文二十豆者膷一謂牛臛也臐二謂羊臛也膮三謂豕臛也牛炙四炙牛肉也此四物共為一行最在於北從西為始醢五謂肉醤也牛胾六謂切牛肉醢七牛膾八此四物為第二行陳之從東為始羊炙九羊胾十醢十一豕炙十二此四物為第三行陳之從西為始醢十三豕胾十四芥醬十五魚膾十六此四物為第四行陳之從東為始以上十六豆是下大夫禮也雉十七兔十八鶉十九鷃二十此四物為第五行陳之從西為始此是上大夫所加二十豆李廵云鴽䳺按熊氏曰此經醢文承牛羊之下則是牛肉羊肉之醢以其庶羞故得用三牲為醢若其正羞則不得用三牲故醢人職無三牲之醢也嚴陵方氏曰飯者食之本然制造之齊無他焉及其生孰之而已自黍稷而下皆言其材也牛曰膷薌也土畜也羊曰臐熏也火畜也豕曰膮水畜也皆以其氣臭名之醢胾膾炙並見曲禮解山隂陸氏曰案膳所陳二十豆應公食上大夫之禮則所謂飯亦大夫禮五齊舉一三酒舉二六飯具舉羞籩舉餌羞豆舉酏薦籩舉三薦豆舉四或層出或閒具或上下舉亦或舉中焉盖禮有不可勝言也比物醜類使從可知而已熟穫曰稰若今晚稻生穫曰穛若今早稻早稻食之而已晚稻耐收故説文云稰晚粱也穛早孰榖也飲與酒以養陽氣名之食與飯以養隂氣名之羊變羶言臐豕變腥言膮則以腥羶有不可食故也據羊泠毛而毳羶豕望視而交睫腥云醢目諸醢也内有非醢以醢該之鄭氏謂牛膮牛炙間不得有醢醢衍字疑非衍若脯羮雞羮從麥食不貴非食也牛炙醢醢所以食炙牛胾醢醢所以食胾牛膾不言醢蒙上醢也炙小肉也胾大肉也膾腥肉也羊炙羊胾同醢下於牛也豕炙豕胾中醢變於羊也魚膾上芥醤變於豕也飲重醴稻醴清糟黍醴清糟粱醴清糟或以酏為醴黍酏漿水醷濫酒清白羞糗餌粉酏鄭氏曰飲目諸飲也重陪也糟醇也清泲也致飲有醇者有泲者陪設之也以酏為醴釀粥為醴也黍酏酏粥也漿酢酨也水者清醴也醷梅漿濫以諸和水也以周禮六飲校之則濫涼也紀莒之間名諸為濫酒目諸酒也白事酒昔酒也羞目諸羞也糗擣熬榖也以為粉餌與餈此記似脱周禮羞籩之實糗餌粉餈羞豆之實酏食糁食此酏當為餰以稻米與狼臅膏為餰是也孔氏曰此稻黍粱三醴各有清糟以清糟相配重設故云重醴案周禮漿人共王之六飲有水漿醴涼醫酏不云糟也共夫人致飲于賔客之禮清醴醫酏糟註云三物有清有糟夫人不體王得備之若后之致飲于賔客有糟無清故酒正共后之致飲于賔客之禮醫酏糟註云后致飲無醴醫酏不清者與王同體屈也案漿人六飲有涼今寒粥若糗飯雜水也康成以涼與濫是一物矣則此以諸和水謂以諸雜糗飯之屬和水也諸者衆雜之辭案漿人六飲一曰水則此經水一也二曰漿則此經漿一也三曰醴則此經重醴一也但用清耳四曰涼則此經濫一也五曰醫則此經或以酏為醴一也六曰酏則此經黍酏一也除六飲之外此經别有醷也若鄭司農之意醷與醫為一物即以酏為醴者非康成義也鄭氏知醷為梅漿者見下文云調之以醯醢及若醯醢則醷是醯之類也又云獸用梅故知是梅漿也清白者清謂清酒白謂事酒昔酒二酒俱白故以一白標之配清酒則為三酒此無五齊者五齊是祭祀獻神所飲非人常用故也糗餌粉酏者案周禮註云合蒸曰餌餅之曰餈此二物皆粉稻米黍米為之糗者擣粉熬大豆為餌餈之黏著故以粉糗摶之周禮酏食共糝食文連則酏是糁之般類此内則作糁與餰故云此酏當為餰若其黍酏非膳羞所用且餰雖雜以狼臅膏亦粥之般類也山隂陸氏曰有凊有糟諸侯之禮天子用清大夫以下用糟醴醴酏也可作酒醴酏焉則已矣漿汁滓相漿水而已醷即所謂醫濫即所謂涼涼一名濫濫言功愧於醫其備六飲之數濫矣清清酒若今煮酒白事酒昔酒若今生酒糗餌籩人所謂糗餌粉酏醢人所謂酏食言糗餌則餈可知言粉酏則糁可知四者謂之羞則以甚美故也食蝸醢而苽食雉羮麥食脯羮雞羮折稌犬羮兔羮和糝不蓼濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醤實蓼濡鼈醢醤實蓼腵修蚳醢脯羮兔醢麋膚魚醢魚膾芥醬麋腥醢醤桃諸梅諸卵鹽鄭氏曰食目人君燕食所用也凡羮齊宜五味之和米屑之糁蓼則不矣苽彫胡也稌稻也此脯所謂析乾牛羊肉也凡濡謂烹之以汁和也苦苦荼也以包豚殺其氣卵讀為鯤鯤魚子或作􅫙也腵修捶脯施薑桂也蚳蚍蜉子也自蝸醢而下二十六物似皆人君燕食所食也其饌則亂膚切肉也膚或作胖卵鹽大鹽也孔氏曰此一節總明人君燕食所用以蝸為醢以苽米為飯以雉為羮三者味相宜以麥為飯析脯為羮又以雞為羮此三者亦味相宜細析稻米為飯以犬兔為羮此三者亦味相宜也此等之羮宜以五味調和米屑為糁不須加蓼故云和糁不蓼濡謂烹煮以其汁調和濡豚包苦者謂包裹豚肉以苦菜殺其惡氣濡鷄醢醤者謂加之以醢及醤濡魚卵醤者謂濡烹其魚卵謂魚子以魚子為醬濡鼈醢醤者謂烹其鼈加醢及醤四者皆破開其腹實蓼於其腹中又更縫而合之腵修者謂腵脯也言食腵脯之時以蚳醢配之脯羮兎醢者即上析脯為羮以兎醢配之麋膚魚醢者謂麋肉外膚食之以魚醢配之麋腥醢醤者腥謂生肉食麋生肉之時還以麋醢配之桃諸梅諸卵鹽者言食桃諸梅諸之時以卵鹽和之諸菹也謂桃菹梅菹即今之藏桃藏梅也欲藏之時必先稍乾之故周禮謂之乾䕩案周禮諸侯相食皆鼎簋十有二其正饌與此不同其食臣下則公食大夫禮與此又異故疑是人君燕食也案上陳庶羞依牲大小先後此則不依牲之次第是上下雜亂故鄭註云其饌則亂也按皇氏曰蝸一也苽食二也雉羮三也麥食四也脯羮五也鷄羮六也析稌七也犬羮八也兎羮九也濡豚十也濡鷄十一也濡魚十二也濡鼈十三也自此以上醢與醤皆和調濡漬鷄豚之屬為他物而設之故不數自此以下醢及醤各自為物但相配而食故數之腵修十四也蚳醢十五也脯羮重出兎醢十六也麋膚十七也魚醢十八也魚膾十九也芥醤二十也麋腥二十一也醢二十二也醤二十三也桃諸二十四也梅諸二十五也卵鹽二十六也長樂劉氏曰二十有六物士庶不可得而備之也偶其有者則如此法以制之凡為人子婦者預當知之以敬於祭祀則鬼神享之以奉於燕飲則賔客樂之以饌於尊親則衰病宜之其在教也為婦功焉聖人所以致婦女於孝敬惜衰老於充肥者其道如是也嚴陵方氏曰蝸蝸牛也其殻咼而首有角故也其肉可以為醢故周官鼈人共之以授醢人也苽即周官六榖之苽也脯羮謂乾三牲之肉以為羮也和糁不蓼謂既和之以糝則不加蓼也蓼味辛或用或否則以其性味各有所宜故也濡豚猶曲禮所謂濡肉盖和之以湇者醢醤謂和濡鷄之類以醢醤也卵醤魚子醤也山隂陸氏曰蝸醢醤也食之主無時而不食故曰蝸醢而苽食雉羮麥食脯羮鷄羮折稌犬羮兎羮而屬下之詞即言蝸醢苽食雉羮嫌下折稌麥食不䝉也腵鍜煉之使精修修節之使雅凡食齊視春時羮齊視夏時醤齊視秋時飲齊視冬時凡和春多酸夏多苦秋多辛冬多鹹調以滑甘牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽鄭氏曰飯宜温羮宜熱醤宜凉飲宜寒多酸多苦多辛多鹹多其時味以養氣也牛宜稌以下言其氣味相成孔氏曰依經方云春不食酸夏不食苦秋不食辛冬不食鹹四時各減其時味與鄭註不同者經方所云謂時氣壯者減其時味以殺盛氣此經所云食以養人恐虚羸故多其時味以養氣也此云牛宜稌犬宜粱而上云折稌用犬羮者此據尊者正食上據人君燕食以滋味為美故也長樂劉氏曰飯食欲温故比春時羮汁宜熱故比夏時醤齊欲凉故比秋時飲齊欲冷故比冬時由是以飲食老者則易化而難傷矣春夏秋冬五行之氣也天地之化成品彚聖人順天地而養萬民者也欲其飲食春多酸夏多苦秋多辛冬多鹹所以參配四時長養五臟之氣以助乎五行也調以滑甘者四時仰土以成其能也此經所以養老而補病扶衰故經方之減者以少壯言也牛宜稌牛肉稌飯尤相宜也羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽皆其類也豈獨於味為宜實亦於人有補焉周官食醫掌和王之六食六飲六膳百羞百醤八珍之齊而曰凡㑹膳食之宜以此又曰凡君子之食恒放焉則食飲膳羞醤珍之法備用於王而士庶君子之食庸得以放之此大司徒得以取而施諸教治以成人子養親之全徳也嚴陵方氏曰齊與王制遲速異齊之齊同視與五嶽視三公之視同且氣之温凉寒熱莫不異宜味之酸苦辛鹹莫不異等雖則不齊然因時適宜以辨其等未始不齊也故謂之齊食齊則黍稷稌粱之類是也羮齊則雉兎雞犬之類是也醤齊則醯醢韲菹之類是也飲齊則水漿醴凉之類是也可否相濟謂之和此言五味六和之所和也故以凡和該之酸所以養骨苦所以養氣辛所以養筋鹹所以養脉甘所以養肉肉則肌膚之所包而欲其緩滑所以養竅竅則内外之所適而欲其利盖四時之所同然不可多也不可寡也調之使均而已故調以滑甘而利其竅緩其肉焉牛土畜土埶下故宜稌盖稌利下濕者也羊火畜火炎上故宜黍盖黍利髙燥者也豕能遯遯則疾故宜稷盖稷榖之疾者也犬能守守則强故宜粱盖粱榖之强者也鴈隨陽陽則舒而遲故宜麥盖稷疾而麥遲故也魚本隂隂則柔而弱故宜苽盖粱强而苽弱故也此皆周官㑹膳食之宜也㑹之所以有合故各以物之性相合者為宜焉六牲不及鷄馬見月令解延平黄氏曰飲食所以養人而養之過卒以害人而已是故君子養徳則謹言語養體則節飲食盖五行之用不能相無五行之氣不能無過不及天有四時人有五臟六腑温涼之氣隂陽之中寒熱之氣隂陽之盛萬物得温而生育得暑而長大得涼而収斂得寒而堅實一氣不備則物受其病焉五臟亦然四齊相廢則或養其一臟而遺其四養其一腑而遺其五熱勝而病隂寒勝而病陽夫飲養陽氣則宜以温食養隂氣則宜以寒固其理也彼務愜適苟從其私不知其實害之亦不淺矣春能𤼵散而収不及焉夏能解緩而堅不及焉秋之氣収斂而不及散冬之氣堅栗而不及輭在人内有臟腑外有骨肉筋脉感其時氣無不然者一時之氣有所不及先王則過於一味以救之是故春多酸収𤼵散也夏多苦堅解緩也秋多辛散収斂也冬多鹹輭堅栗也四味一多慮其不通焉滑所以調之慮其不和焉甘所以調之甘在内則養脾在外則養肉盖於食醫則養脾於瘍醫則養肉四行無土不可四味無甘不可此甘之所以調歟竅者氣之所由以通者也竅不利則氣窮焉此滑之所以調歟或言四時之氣各欲其强春欲木強夏欲火強秋欲金強冬欲水強其勢少弱則他氣乗之矣木為火所乗則夏令以行為金所乘則秋令以行為水所乘則冬令以行春之正氣不獲以為生焉五行之病也先王以為五行之於四時如此則萬物之所患五行之於五臟如此則一身之所患然則五臟之於四時可不以時致其強哉是故食醫之和春多酸則助木而強之庖人致其所制者為之使焉故膳膏薌益木之強耳夏多苦所以助火而強之庖人致其所制者為之使焉故膳膏臊益火之強耳秋多辛其膳膏腥冬多鹹其膳膏羶皆然夫運四味之所養分於四臟者脾之為物也載四行之所用均於四時者土之為物也是故脾土屬也甘土味也寓於四味而調之所以養土養脾而後脾能運是四味以行焉然則五味之用不亦大乎四齊所眡不失其時矣四和所多不失其節矣牛羊豕犬鴈魚天産也以為膳者也養人之精稌黍稷粱麥苽地産也以為食者也養人之形精不足於養則氣衰形不足於養則氣殆然則膳食之養不可相廢膳食之宜不可相失食醫則又㑹其所宜致其所養所宜或有失焉則其所養適足以害之矣是故㑹牛以稌㑹羊以黍㑹豕以稷㑹犬以粱㑹鴈以麥㑹魚以苽夫天産陽也有以宜隂地産隂也有以宜陽盖天産足以養精為氣之母地産足以養形為氣之宅凡先王之饋食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醤用百有二十罋養王之欲可謂備矣無禮以節之溺志於嗜慾作隂徳以為隂邪作陽徳以為倦怠以物累其形以形累其心以心累其徳則是天下致養於王者適足以累之王何以治野人邪凡齊所眡凡和所多凡㑹所宜節王之欲可謂備矣是故王心常清不為物所淫王體常寜不為物所傷然後能以義禮養人之欲焉所謂君子者其智足以君國其仁足以子民勞心治人以報野人之所養者也觀王之所養則烏可不為己者以制其欲哉王氏昭禹曰一氣判而為隂陽隂陽運而為四時春陽中而氣温夏陽盛而氣熱秋隂中而氣涼冬隂盛而氣寒則温熱涼寒乃天地所以生成萬物者也順之則人所以安拂之則人所以厲故先王無往而不以四時為本者其知善養之道乎夫以春為陽中而其氣温食地産以養形形以聚氣形温則氣和而疾不作故食以温為齊而眡春時以夏為陽盛而其氣熱羮天産以養精精以集神精熱則神從之而不離故羮以熱為齊而眡夏時以秋為隂中而其氣涼醤之味鹹鹹所以養脉而脉輭則和醤涼則除煩熱而脉得之以輭故醤以涼為齊而眡秋時以冬為隂盛而其氣寒飲所以養陽氣氣之暴在陽濟之以寒則為不暴故飲以寒為齊而眡冬時然則温熱涼寒天之所造以養萬物者也酸苦辛鹹地之所化以養萬物者也人之一身與天地流通其氣味所養安可違天之所造地之所化此温熱寒涼之所御所以必順四時之氣而酸苦辛鹹之所節必順四時之味矣夫春為木陽動以散而生風風生木木之氣散而其味則收故木之味酸以春主𤼵散則宜多酸以收之夏為火南方陽極而生熱熱生火火之氣輭而其味則堅故火之味苦以夏主解緩則宜多苦以堅之秋為金隂止以收而生燥燥生金金之氣収而其味則散故金之味辛以秋主揫斂則宜多辛以收之冬為水北方隂極而生寒寒生水水之氣堅而其味則輭故水之味鹹以冬主堅栗則宜多鹹以輭之酸苦辛鹹其味則因四時以為之節若滑與甘則無所加損焉以其為五味之主而生於土故也滑則所以利之甘則所以緩之唯利故能養竅唯緩故能養氣滑以利之甘以緩之正所以調之也黄帝書曰肺欲收急食酸以收之肝欲散急食辛以散之心欲輭急食鹹以輭之腎欲堅急食苦以堅之脾欲緩急食甘以緩之亦謂是也天産以養形地産以養精皆麗乎五行之氣五行之氣有畏惡相反一有不宜則不惟不足以養形氣而疾病且乘隙而作先王由是觀膳食之宜或以五行相生而為之宜或以五行同氣而為之宜或以五行相尅而為之宜牛土畜也稌金榖也土生金牛宜稌則以土生金而為宜也羊火畜也黍火榖也羊宜黍則以火同氣而為宜也豕水畜也稷土榖也豕宜稷則以土尅水而為宜也犬金畜也粱土榖也犬宜粱則以金生於土而為宜也鴈火禽也麥木榖也鴈宜麥則以火生於木而為宜也魚水物也苽水榖也魚宜苽則以水同氣而為宜也物類至多不可勝言言其所常食則推類而可知矣山隂陸氏曰牛宜稌以食黍非不可也於稌為宜耳他倣此黍以暑而種粱以涼而收稌宜下地故謂之稌周官食用六榖鄭氏謂六榖黍稷稻粱麥苽然則有虞氏之兩敦始有黍稷夏后氏之四璉加以稻粱殷之六瑚黍稷稻粱麥苽周之八簋黍稷稻粱白黍黄粱稰穛也春宜羔豚膳膏薌夏宜腒鱐膳膏臊秋宜犢麛膳膏腥冬宜鮮羽膳膏羶鄭氏曰此八物四時肥美也為其太盛煎以休廢之膏節其氣也牛膏薌犬膏臊鷄膏腥羊膏羶腒乾雉也鱐乾魚也鮮生魚也羽鴈也孔氏曰上文食齊視春時至魚宜苽皆周禮食醫之文記者載之於此論調和食飲之法此春宜羔豚一經又記庖人論四時煎和膳食之宜以王相休廢相參其味乃善春為木王牛中央土畜春東方木木尅土木盛則土休廢用休廢之膏故用牛膏也犬屬西方金夏南方火火尅金火盛則金休廢故用犬膏也鷄屬東方木秋西方金金尅木金盛則木休廢故用鷄膏也羊屬南方火冬水王水尅火水盛則火休廢故用羊膏也周禮庖人文與此同鄭彼註云羔豚物生而肥犢與麛物成而充腒鱐暵熱而乾魚鴈水涸而性定此八物者得四時之氣尤盛為人食之弗勝是以用休廢之脂膏煎和膳之義與此同案洪範五行𫝊云思之不睿則有牛禍牛屬土也言之不從則有犬禍犬屬金也貌之不恭則有鷄禍鷄屬木也視之不明則有羊禍羊屬火也士相見禮云冬執雉夏執腒故鄭知腒為乾雉周禮籩人云膴鮑魚鱐鱐與鮑相對鮑為濕魚故知鱐是乾魚也鱐既為乾魚故鮮為生魚王制云獺祭魚然後虞人入澤梁是冬魚成也羽族既多而冬来可食者唯鴈故知羽為鴈也庖人云春行羔豚行謂行用此註云宜謂氣味相宜其事同也長樂劉氏曰陽氣始長羔豚將欲盛而壮也春宜食之以助新陽膳用牛膏者欲其順而大也夏陽氣盛極宜抑之使内堅而弗散也故食腒鱐膳以犬膏者艮為狗能止邪所以抑其過也秋隂方勝長陽将潛伏其在外者衰宜補益之故牛犢鹿麛補助陽氣者也膳以鷄膏者乾為鷄取其健而有常也冬陽伏藏而隂列於外魚鴈陽物也而善處於隂食之於時宜也膳以羊膏者兑為羊取其内實而外悦且澤也庖人所職應時以順隂陽之宜其膳如此嚴陵方氏曰羔豚羊豚之小者方春品物之小故以小者為宜腒鱐者雉魚之乾者方夏物有餒敗之患故以乾者為宜也秋則物成而可嘗之時故雖犢與麛皆得以嘗之矣冬則物衆而可進之時故雖飛與潛者皆得以進之矣羽鳥也不曰鳥而曰羽者以有别於腒也鮮魚也不曰魚而曰鮮者以有别於鮪也雖然此止足以為時之宜矣茍惟在臟有所不勝食之不足以為善也故又膳之以膏焉膳膏薌者以春木用事之時脾土有所不勝故以牛薌之土氣助養脾也夏火用事之時肺金有所不勝故必以犬臊之金氣助養肺也秋金用事之時肝木有所不勝故必以鷄腥之木氣助養肝也冬水用事之時心火有所不勝故必以羊羶之火氣助養心也薌臊腥羶四者皆言其臭也然五臟獨不養腎何也盖腎所主者水而所克者土腎則五臟之所本而元氣屬焉土則四時之所均而沖氣屬焉所養者既不可偏於一時又不可拘於一物夫月令中央土之祭心而不祭腎者以是而已然月令於冬時祭腎而與三時異此於冬助養心而與三時同又何也盖彼之所祭者主五臟之形而以養其氣此之所勝者主五行之氣而以養其形以五臟為主則一本於腎故與三時異而獨反本以祭焉以五行為主則還相為本故與三時同而均養所不勝而已山隂陸氏曰方春宜養肝今助養脾方夏宜養心今助養肺可謂善矣凡所謂膳如是而後為善膳用六牲牲天産也以作隂徳是之謂善若夏宜腒鱐冬宜鮮羽是宜而已凡所謂宜如是而後為宜周官言行此言宜者為其宜也故行之故曰民之所未安聖人不強行王氏昭禹曰五行之在天下曰運而無所停一往一返迭盛迭衰其時可因而不可違其理可順而不可逆而人者五土之所生五行之所致養口納味養形納氣一味之不調一氣之不順則疾癘得以乘之而至故先王乘時之消息因理之盈虚以節飲食以養性命春行羔豚秋行犢麛所以順隂陽之中氣也夏行腒鱐冬行鮮羽所以順隂陽之正氣也然隂陽之中有餘則愆不足則伏其數有消息而休王隨之其氣有盈虚而盛衰隨之不能順其所宜則失其所養不能察其有餘而助其不足則失其所輔善養者順其時之所宜則其五臟得所養察五行之有餘不足而助其休廢則其五臟得所補故均其宜而使之無過調其適而使之無不及故春則膳膏薌夏則膳膏臊秋則膳膏腥冬則膳膏羶盖取其衰死者之脂膏煎和之以相助也牛脩鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉兎皆有芼爵鷃蜩范芝栭蔆椇棗栗榛柿𤓰桃李梅杏柤棃薑桂鄭氏曰脯皆析乾肉也軒讀為憲憲謂藿葉切也芼謂菜釀也軒或為胖蜩蟬也范蜂也蔆芰也椇枳椇也柤棃之不臧者自牛脩以下三十一物皆人君燕食所加庶羞也周禮天子羞用百有二十品記者不能次録孔氏曰麋鹿田豕麕非但為脯又可腥食腥食之時皆以藿葉起之而不細切故云皆有軒不言牛者牛唯可細切為膾不宜大切為軒雉羮兎羮皆有芼菜以和之芝栭者庾蔚云無華葉而生曰芝栭盧氏曰芝木芝也王肅云無華而實者名栭皆芝屬也則芝栭是一物也牛脩一鹿脯二田豕脯三麋脯四麕脯五麋軒六鹿軒七田豕軒八麕軒九雉芼十兎芼十一爵十二鷃十三蜩十四范十五芝栭十六蓤十七椇十八棗十九栗二十榛二十一柿二十二𤓰二十三桃二十四李二十五梅二十六杏二十七楂二十八棃二十九薑三十桂三十一大夫燕食有膾無脯故知此人君燕食也案周禮籩人醢人正羞唯有棗栗榛桃無以外雜物故知所加庶羞也長樂劉氏曰自牛脩至此凡三十有一物四時之和氣可以脯可以乾可以鹹可以藏以備乎老者之所欲也士庶之力雖不得畢備有則儲之亦子婦所以盡於孝敬也大夫燕食有膾無脯有脯無膾士不貳羮胾庶人耆老不徒食鄭氏曰尊卑差也孔氏曰此一經接上人君燕食因明大夫士庶人燕食不同案鄭志云脯非食殽此燕得食脯者謂食不專用脯以為食殽若有餘饌兼之則得有脯士不貳羮胾者謂士燕食也若朝夕常食則下云羮食自諸侯以下至於庶人無等黄氏曰正道之大致卵胎俯窺四靈為畜者謂九命四民咸無僭禮而周於飲食者也故膾脯是食之珍味而位至大夫燕居常食不得兼之羮胾為食之本也而士之燕居常食亦不得兼之降及庶人唯耆老乃不徒食徒者空也謂七十者無故可食肉矣故云庶人無故不食珍則珍者在庶人為肉也斯禮之行民皆恥僭而不欺闇室矣儻庶人無故禮可食珍則有位者豈稱肉食哉聖人垂教秦漢失之貪僭之途既開仁義之源是壅嚴陵方氏曰燕食謂燕饗之食也然與膳夫所言者異矣彼特謂燕居之食耳膾脯羞也故不得兼之言大夫如此則士可知羮胾者食之配士雖降於大夫然闕一不可特不貳之而已言士如此則大夫貳之可知庶人耆老不徒食見王制解膾春用葱秋用芥豚春用韭秋用蓼脂用葱膏用薤三牲用藙和用醯獸用梅鶉羮鷄羮鴽釀之蓼魴鱮烝雛燒雉薌無蓼鄭氏曰芥芥醬也脂肥凝者釋者曰膏藙煎茱萸也漢律㑹稽獻焉爾雅謂之榝和用醯者畜與家物自相和也獸用梅者亦野物自相和也釀謂切雜之鴽在羮下烝之不羮也燒烟於火中也薌蘇荏之屬也此皆言調和菜釀之所宜也孔氏曰上云魚膾芥醬則謂秋時用芥芥辛於秋宜也鶉羮鷄羮者用鶉用鷄為羮鴽者唯烝煮之而已故文在羮下釀謂切雜和之言鶉羮鷄羮及烝之等三者皆釀之以蓼魴鱮烝者魴鱮二魚皆烝孰之雛燒者雛是鳥之小者火中燒之然後調和雉者文在烝燒之下或燒或烝或可為羮其用無定故直云雉也魴鱮烝及雛燒并雉等三者調和唯以蘇荏之屬無用蓼也長樂劉氏曰藙氣味葉實似茱萸也今閩蜀人尚用以和羮謂為茱萸非也嚴陵方氏曰葱以氣達為怱芥以味辛為介春物方生故宜食性之怱者秋物方成故宜食性之介者故膾用二物以和之韭性温而生能乆蓼性辛而氣能散温而生固春所宜也辛而散固秋所宜也故豚用二物以和之三牲肉體之大者氣之所聚不能無毒故用藙之辛以散其毒焉凡物未始無毒三牲必散之者以肉體特大故也芥蓼之味非不辛然必用藙者能殺蟲故也和用醯謂三牲也荀子曰醯酸而蚋聚書曰若作和羮爾惟鹽梅則醯與梅皆酸也和之以此所以收其味而已然牲用醯獸用梅者亦各以其類而已山隂陸氏曰魴鱮弱魚也烹或易爛烝之可也無蓼與不蓼異不蓼不必用蓼耳無蓼直無蓼也不食雛鼈狼去腸狗去腎狸去正眷兎去凥狐去首豚去腦魚去乙鼈去醜鄭氏曰皆為不利人也雛鼈伏乳者乙者魚體中害人者名也今東海鰫魚有骨名乙在目傍狀如篆乙食之鯁人不可出醜謂鼈竅也孔氏曰自此至攅之一節論治擇肉物惡者及果實之屬嚴陵方氏曰介物之美莫如鼈然未大在所不食其肉為美其竅為醜故下言鼈去醜狼能害人腸則𫝊道其所害之物者故狼去腸鄉飲酒云亨狗于東方以祖陽氣之𤼵則狗固陽畜腎又陽精之舍且惡夫陽之太勝也故狗去腎狸善摶兎善走是其質之輕疾者而脊凥皆非滋美者也故狸去正脊兎去凥狐死正丘首天性然也人殺而取之則殺氣聚乎首故狐去首豚者天一之水畜而腦則天五之土氣存焉既欲以水畜而有所養且不可以所勝者害之故豚去腦爾雅言魚謂之乙而魚之餒必自腸始故魚去乙謂之乙者其形屈如其字之文也山隂陸氏曰雛鼈鼈之雛者夫鼈固美矣然猶如此他物可知狼之腸直狼去腸盖以此狗去腎以其熱與俗云凡腎豕不如羊羊不如狗今狸脊上一道如界兎凥有九孔豕俯聚精在腦豚為肫豚去腦以此今醫方云豕腦食之昬人精神魚去乙魚腸謂之乙魚柔巽隠伏其内又屈甚矣去乙以此亦魚敗自内始肉曰脱之魚曰作之棗曰新之栗曰撰之桃曰膽之柤棃曰攅之鄭氏曰皆治擇之名也皇氏曰脱之者治肉除其筋膜取好處故爾雅云肉去其骨曰脱郭云剥其皮也皇氏又曰作謂動摇也凡取魚摇動之視其鮮餧餒者不食郭氏云今本作斮之註云謂削鱗也棗易有塵埃恒治拭之使新栗蟲好食數數布揀撰省視之桃多毛拭治去毛令色青滑如膽或謂苦如膽者擇去之柤棃恐有蟲故一一櫕看其蟲孔也嚴陵方氏曰爾雅曰瓜曰華之桃曰膽之棗李曰疐之櫨棃曰鑚之與此大同而小異山隂陸氏曰脱其皮為脱作其鱗為作魚柔巽隠伏作之可也擇而撰之為撰儀禮曰棗烝栗擇又曰栗不擇桃曰膽之去其苦者如去膽焉禮記集説卷七十
