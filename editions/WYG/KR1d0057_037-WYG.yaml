body:
  text: 禮記集説卷三十七宋衛湜撰月令第六孔氏曰案鄭目録云名曰月令者以其紀十二月政之所行也本吕氏春秋十二月紀之首章也禮家好事抄合之後人因言周公所作然其官名時事多不合周法此於别録屬明堂隂陽記此卷所出解者不同今且申鄭㫖釋之案吕不韋集諸儒士著為十二月紀合十餘萬言名為吕氏春秋篇首皆有月令與此文同是一證也又周無大尉唯秦官有之而此月令云乃命大尉是官名不合周法二證也又秦以十月建亥為歳首而月令云為來歲授朔日即是九月為歲終十月為授朔此是時不合周法三證也又周有六冕郊天迎氣則用大裘乘玉輅建大常日月之章而月令服飾車旗並依時色此是事不合周法四證也然案秦始皇十二年吕不韋死十六年并天下然後以十月為歲首則不韋焉得以十月為正又云周書先有月令何得云不韋所造又秦并天下立郡何得云諸侯又秦好兵殺害何能布徳施惠春不興兵既如此不同鄭必謂不韋作者以吕氏春秋十二月紀正與此同故也且不韋集諸儒所作為一代大典亦採擇舊章成之但秦自不能行之耳又秦自文公獲黑龍以為水瑞焉知未并天下前不以十月為歲首乎又曰月令者包天地隂陽之事然天地有上下之形隂陽有生成之理日月有運行之度星辰有次舍之常今既釋其文不得不略言其趣凡説天地形狀之殊有六等一曰蓋天文見周髀如蓋在上二曰渾天形如彈丸地在其中天包其外猶如雞卵白之繞黄揚雄桓譚張衡蔡邕陸績王肅鄭𤣥之徒並所依用三曰宣夜舊説云殷代之制其形體事義無所出以言之四曰昕天昕讀曰軒言天北高南下若車之軒是吳時姚信所説五曰穹天云穹隆在上虞氏所説不知其名也六曰安天是晉虞喜所論鄭註考靈曜用渾天法今亦當以渾天為説案鄭註考靈曜云天者純陽清明無形聖人則之制璇璣玉衡以度其象如鄭此言則天是太虚本無形體但指諸星運轉以為天耳但諸星之轉從東而西必三百六十五日四分日之一星復舊處星既左轉日則右行亦三百六十五日四分日之一至舊星之處即以一日之行而為一度計二十八宿一周天凡三百六十五度四分度之一是天一周之數也天如彈丸圍圜三百六十五度四分度之一案考靈曜云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里者是天圜周之里數也以圍三徑一言之則直徑三十五萬七千里此為二十八宿周㢠廻直徑之數也然二十八宿之外上下東西各有萬五千里是為四遊之極謂之四表據四表之内并星宿内總有三十八萬七千里然則天之中央上下正半之處則一十九萬三千五百里地在其中是地去天之數也鄭註考靈曜云地蓋厚三萬里春分之時地正當中自此地漸漸而下至夏至地下遊萬五千里地之上畔與天中平夏至之後地漸漸向上至秋分地正當天之中央自此地漸漸而上至冬至上遊萬五千里地之下畔與天中平冬至後地漸漸而下此是地之升降於三萬里之中但渾天之體雖繞於地地則中央正平天則北高南下北極高於地三十六度南極下於地三十六度然則北極之下三十六度常見不没南極之上三十六度常没不見南極去北極一百二十一度餘若逐曲計之則一百八十一度餘若以南北中半言之謂之赤道去南極九十一度餘去北極亦九十一度餘此春秋分之日道也赤道之北二十四度為夏至之日道去北極六十七度赤道之南二十四度為冬至之日道去南極亦六十七度地有升降星辰有四遊又鄭註考靈曜云天旁行四表之中冬南夏北春西秋東皆薄四表而止地亦升降於天之中冬至而下夏至而上二至上下蓋極地厚也地與星辰俱有四遊升降四遊者自立春地與星辰西遊春分西遊之極地雖西極升降正中從此漸漸而東至春末復正自立夏之後北遊夏至北遊之極地則升降極下至夏季復正立秋之後東遊秋分東遊之極地則升降正中至秋季復正立冬之後南遊冬至南遊之極地則升降極上冬季復正此是地及星辰四遊之義也星辰亦隨地升降故鄭註考靈曜云夏日道上與四表平下去東井十二度為三萬里則是夏至之日上極萬五千里星辰下極萬五千里故夏至之日下至東井三萬里也日有九道故考靈曜云萬世不失九道謀鄭註引河圖帝覽嬉云黄道一青道二出黄道東赤道二出黄道南白道二出黄道西黒道二出黄道北日春東從靑道夏南從赤道秋西從白道冬北從黒道立春星辰西遊日則東遊春分星辰西遊之極日東遊之極日與星辰相去三萬里夏則星辰北遊日則南遊夏至星辰北遊之極日南遊之極日與星辰相去三萬里以此推之秋冬放此可知計夏至之日日在井星正當嵩高之上以其南遊之極故在嵩高之南萬五千里所以夏至有尺五寸之景也於時日又上極星辰下極故日下去東井三萬里也然鄭註四遊之極元出周髀之文但日與星辰四遊相反春分日在婁則婁星極西日體在婁星之東去婁三萬里以度言之十二度也則日没之時去昏中之星近校十度旦時日極於東去旦中之星逺校十度若秋分日在角則角星極東日體在角星之西去角三萬里則日没之時去昏中之星逺校十度旦時日極於西去旦中之星近校十度此皆與厯乖違於數不合鄭無指解其事有疑但禮是鄭學故具言之耳賢者裁焉但二十八宿案漢書律厯志云冬至之時日在牽牛初度春分之時日在婁四度夏至之時日在東井三十一度秋分之時日在角十度若日在東井則極長八尺之表尺五寸之景若春分在婁秋分在角晝夜等八尺之表七尺五寸之景冬至日在斗則晝極短八尺之表一丈三尺之景一丈三尺之中去其一尺五寸則餘有一丈一尺五寸之景是冬夏往來之景也凡於地千里而差一寸則夏至去冬至體漸南漸下相去一十萬五千里又考靈曜云正月假上八萬里假下一十萬四千里所以有假上假下者鄭註考靈曜之意以天去地十五萬三千五百里正月雨水之時日在上假於天八萬里下至地一十一萬三千五百里夏至之時日上極與天表平也後日漸向下故鄭註考靈曜云夏至日與表平冬至之時日下至於地八萬里上至於天十一萬三千五百里也委曲俱見考靈曜註凡二十八宿及諸星皆循天左行一日一夜一周天一周天之外更行一度計一年三百六十五周天四分度之一日月五星則右行日一日一度月一日一十三度十九分度之七此相通之數也今厯家之説則月一日至於四日行最疾日行十四度餘自五日至八日行次疾日行十三度餘自九日至十九日行則遲日行十二度餘自二十日至二十三日又小疾日行十三度餘自二十四日至於晦行又最疾日行一十四度餘此是月行之大率也二十七日月行一周天至二十九日强半月及於日與日相㑹乃為一月故考靈曜云九百四十分為一日二十九日與四百九十九分為月是一月二十九日之外至第三十日分至四百九十九分月及於日計九百四十分則四百七十為半今四百九十九分是過半二十九分也但月是隂精日為陽精故周髀云日猶火月猶水火則外光水則含景故月光生於日所照魄生於日所蔽當日則光盈就日則明盡京房云月與星辰隂者也有形無光日照之乃有光先師以為日似彈丸月似鏡體或以為月亦似彈丸日照處則明不照處則闇案律厯志云二十八宿之度角一十二度亢九氐十五房五心五尾十八箕十一東方七十五度斗二十六牛八女十二虚十危十七營室十六壁九北方九十八度奎十六婁十二胃十四昴十一畢十六觜二參九西方八十度井三十三鬼四栁十五星七張十八翼十八軫十七南方一百一十二度丑為星紀初斗十二度終於婺女七度子為𤣥枵初婺女八度終於危十五度亥為娵訾初危十六度終於奎四度戍為降婁初奎五度終於胃六度酉為大梁初胃七度終於畢十一度申為實沈初畢十二度終於井十五度未為鶉首初井十六度終於栁八度午為鶉火初栁九度終於張十七度已為鶉尾初張十八度終於軫十一度辰為夀星初軫十二度終於氐四度卯為大火初氐五度終於尾九度寅為析木初尾十度終於斗十一度五星者東方歳星南方熒惑西方太白北方辰星中央鎮星其行之遲速俱在律厯志不須煩説是以天高地下日盈月闕觜星度少井斗度多日月右行星辰左轉四遊升降之差二儀運動之法非由人事所作皆是造化自然遂以人事為義或據理是寔或搆虚不經既無正文可憑今皆略而不録横渠張氏曰月令大率秦法也然採三代之文而為之不無古意其衣服器皿官名皆秦禮也月令言迎氣既迎氣則就祭其五帝名號既不取則五帝者何也五行之帝也五行不相離而分之者何也其運行之氣則均同而不相離也其周匝所至則於時亦有偏主者今於春温和萬物叢生是木之徳也夏則炎熱是火之徳也秋則淸肅是金之徳也冬則嚴凝是水之徳也有此體象月令儘有美意未易可破栁子厚論亦未安若春行賞秋行刑止舉大綱如此如云湯執中文王視民如傷武王不泄邇不忘逺不可謂聖人各止有一事可稱也姑據一處言之耳又如冬日飲湯夏日飲水豈必曰冬日不得飲水夏日不得飲湯也又曰禮運言聲色味不及臭臭之用非所急也故月令五臭不為世用長樂陳氏曰天人之道雖殊而象類之理則一聖人將有為也將有行也仰觀日月星辰霜露之變俯察蟲魚草木鳥獸之化不先時而起不後時而縮以之授民事而無不順以之因物性而無不適此堯典若昊天以授民事周官正歲年以序事之意馬氏曰厯象日月星辰以授人時自堯以來未之有改也舜齊七政周用五紀其究一也蓋日月星辰之往來不窮或離或合或贏或縮進退相代始終相循者天以是命萬物而人奉之以為今者亦因是也方周之時以馮相氏㑹天位保章氏辨地域又以太史正歳年而須官府都鄙以序事頒邦國以告朔其為象法則使萬民觀之於正月之吉又使官帥其屬而觀之於正歲且法則使徇焉而夏之政典先時與不及時者其罪至於殺蓋欲百官萬民謹其令而順承之也月令之為書亦祖先王之餘而後儒傅㑹增益以成之者也高氏曰月令一書先儒嘗詳論其所作之原矣漢馬融賈逵晉孔晁皆以為作於周公鄭康成高誘唐孔頴達乃謂秦時吕不韋所作其説所以異同者蓋以月令有命相及太尉奄尹大酋之文其官名皆與周異故疑為秦時書或謂吕不韋時始皇未帝也未帝則仍用周正而月令所稱必曰天子又紀以夏正則又疑非吕氏書或謂始皇既為天子秦人取不韋十二紀増加為之殊不知始皇併天下既罷侯置守建三十六郡以十月朔為正吏民為黔首矣而月令所載封諸侯命四監季冬共飭國典孟春慶及兆民則皆非秦制又疑非始皇為帝時書或又謂既非周公時書又非吕不韋書又非始皇為帝時書乃漢淮南王安與諸儒取吕氏十二紀附益為時則訓而禮家復有所増加焉故月令雜用虞夏商周秦漢之制耳凡為此數説者要之皆非深知月令者也蓋月令一書所以著入六經而垂訓萬世者自有深㫖何以言之人君出而臨涖天下位曰天位民曰天民舉措云為要當體天象順天時一毫不可以私意自為今考之此書毎月之首必定夫日星之運行昏旦之次舍者蓋將考中星以正王者之位也毎時之易必著夫用意之柔剛帝神之異號所以顯造化而定其主宰之權也音律成數所以循天地之自然臭味祭祀所以辨人事之有序以至鳥獸昆蟲草木盛衰之不同皆所以定十二月之氣候使天下皆知四時之有常運也於是人君居處之室必因時而分其位乗車駕馬必因時而正其色以及衣服之微食器之末無一非順天之所在此固人君循守所當先也迎氣於東南西北之郊毎孟不敢不謹盛徳在木火金水之運太史不敢不告司天日月星辰之行以初為常則見之歲首論時令以待來歲之宜則見之歲終此又人君一歲之間不敢或後也若乃春作夏長秋斂冬藏何者非順時之治左聖鄉仁右義背藏何者非順時之法以至上而朝廷百官下而農工商賈大而禮樂兵刑微而法令品式悉皆順天時而定人事此固月令一篇之大義而月令所以著入六經者其深㫖猶未聞也嘗讀洪範之書而後得其説蓋月令一篇大體與洪範相通為一特先儒未之講明爾何則洪範之論初一曰五行即月令金木水火土之運見於毎事有所屬者也次三曰農用八政即月令之勸課農桑聚蓄財貨祭祀神祇安養民居習合禮樂逐捕姦慝敬禮賔客簡練師徒之意也次四曰協用五紀即月令歳月日星辰厯數之事也次六曰乂用三徳即月令布行徳惠不可稱兵戮有罪嚴斷刑等以順天時者也次七曰明用稽疑即月令命太史釁龜筮占兆審卦吉凶是也次八曰念用庶徴即月令之氣運行不忒風雨寒燠各以時若草木昆蟲各以時遂凡此皆以休徴也毎月之終其言時令或至錯行而有焱風暴雨寒熱不節大旱凶荒之類凡此皆咎徴也次九曰嚮用五福即月令養衰老禮賢者行爵出禄必推所尊禮者也至於威用六極即時令失宜民多疾疫遷徙流亡之類是也雖然月令與洪範固相與為一體矣然洪範所以能使五行八政五紀三徳以及稽疑庶徴五福六極之咸得其宜者以其有敬用五事建用皇極以為之本原也而月令何所取焉嗚呼月令之本原學者殆未之考耳大抵一隂生於午一陽生於子當此之時正隂陽爭死生分之際也故人君合於二至之時盡齊戒之誠躬掩身之徳止聲色薄滋味節嗜慾定心氣百官静事毋以瀆人主之聽以定晏隂之所成以待隂陽之所定蓋古人養氣必於子午二時而推廣之故於子午二月人君苟能涵養此心一毫無累則視聽言貌思之閒有肅乂哲謀聖之徳然後可以作民父母為天下主建皇極以無私執大中於天下而所謂五皇極者即月令毎月之發政施令毋有不當毋有枉撓毋有差貸毋有阿黨舉歸於大公至正者皆是也如是則寒暑不差疾病不作雖昆蟲草木尚得遂其生宜乎斯民悉歸於仁夀而備用五福又安有凶短夭折之所謂六極者若夫中央土止有帝神之號音律氣數之所屬臭味祭祀之所寓與夫天子居處衣服車馬飲食之所取耳至於土徳之運則分旺四季者是也非禮所謂播五行於四時者歟然則合而論之則謂之洪範散而舉之則謂之月令故月令所以著入六經垂訓萬世者其在兹乎孟春之月日在營室昏參中旦尾中鄭氏曰孟長也日月之行一歲十二㑹聖王因其㑹而分之以為大數焉觀斗所建命其四時此云孟春者日月會於娵訾而斗建寅之辰也凡記昬明中星者為人君南面而聽天下視時候以授民事孔氏曰此言孟春者夏正建寅之月也吕不韋在秦世秦以十月為歲首不用秦正而用夏時者以夏數得天正故也周禮雖以建子為正其祭祀田獵亦用夏正也鄭註日月之行一歲十二㑹者日行遲一月行二十九度半餘月行疾一月行天一匝三百六十五度四分度之一過匝更行二十九度半餘逐及於日而與日會所會之處謂之辰鄭註周禮大師職云十一月辰在星紀十二月辰在𤣥枵正月辰在娵訾二月辰在降婁三月辰在大梁四月辰在實沈五月辰在鶉首六月辰在鶉火七月辰在鶉尾八月辰在夀星九月辰在大火十月辰在析木是一歲有十二㑹也聖王因其日月自然之㑹而分為十二分以為大略之數焉所以為大略之數者以二十九日過半月及於日月不可分兩月各有二十九日又兩月各有彊半之日合兩半而成一日是一月有三十日一月二十九日一大一小之外仍有餘分一年十二月六大六小總有三百五十四日是歲十二㑹之實數也仍少十一日四分日之一未得周天聖王總以三百六十五日四分日之一為十二會之大數一會即一辰也是一辰有三十度十二辰總有三百六十度餘有五度四分度之一度别為九十六分總五度有四百八十分又四分度之一為二十四分并之為五百四分十二辰分之各得四十二分則是毎辰有三十度九十六分度之四十二計之日月實行一會唯二十九分過半若通均一歲會數則毎會有三十度九十六分度之四十二是以分之為大數也營室號娵訾娵訾是亥次之號立春之時日在危十六度月半雨水之時日在營室十四度但星次西流日行東轉東西相逆若月初之時日在星分之初月半之時則日在星分之半月終之時在星分之末凡十二月日之所在或舉月初或舉月末皆據大略不細與厯數齊同其昏明中星亦皆如此案三統厯立春日在危十六度正月中日在室十四度元嘉厯立春日在危三度正月中日在室一度昏參中案三統厯立春昬畢十度中去日八十九度正月中昬井二度中去日九十三度元嘉厯立春昏昴九度中月半昏觜觹一度中皆不昏參中計正月昬參中依三統厯在立春之後六日參星初度昏得中也蓋月令昏明中星在一月之内有中者皆得載之但二十八宿其星體有廣狹相去逺近或月節月中之日昬明之時前星已過於午後星未至正南又星有明暗見有早晚明者則昏早見而旦晚沒暗者則昏晚見而旦早沒所以昬明之星不可正依厯法但舉大略耳餘月昏明從此可知鄭註觀斗所建謂北斗循天而轉行建一月一辰辰三十度九十六分度之四十二正月建寅二月建卯三月建辰四月建巳五月建午六月建未七月建申八月建酉九月建戌十月建亥十一月建子十二月建丑也其十二辰之名義見律厯志鄭謂記昬明中星為人君視時候授民事者案書緯考靈曜云主春者鳥星昬中可以種稷主夏者心星昬中可以種黍主秋者虚星昬中可以種麥主冬者昴星昬中則入山可以斬伐具器械王者南面而坐視四星之中而知民之緩急則不賦力役故敬授民時也長樂陳氏曰陽生於子故日之行也自北而西厯南而東冬至在牽牛春分在婁夏至在東井秋分在角月令正月在營室二月在奎三月在胃四月在畢五月在東井六月在柳七月在翼八月在角九月在房十月在尾十一月在斗十二月在婺女則婁井角以三仲月中言之也斗以仲冬月本言之也其餘或舉月本或舉月末不必皆月中也日遡於天故星春則見南夏則見東秋則見北冬則見西仲春日中星鳥則昬之時井鬼在午栁星張在巳軫翼在辰仲夏日永星火則角亢在午氐房心在巳尾箕在辰仲秋宵中星虚則奎婁在午胃昴畢在巳觜參在辰仲冬日短星昴則斗牛在午女虚危在已室壁在辰月令正月昬參中旦尾中二月昬弧中旦建星中三月昬星中旦牛中四月昬翼中旦女中五月昬亢中旦危中六月昬火中旦奎中七月昬建星中旦畢中八月昬牛中旦觜中九月昬虚中旦栁中十月昬危中旦七星中十一月昬壁中旦軫中十二月昬婁中旦氐中蓋書之所言皆昬星也火房心也書於仲夏舉房心而月令舉亢書於仲秋舉虚而月令舉牛書於仲冬舉昴而月令舉壁則書之中星常在後而月令中星常在前蓋月令舉月本書舉月中也月令於四月五月十二月昬旦舉節氣之星於八月昬旦舉中氣之星於十月昬舉節氣之星於正月六月十月旦舉節氣之星於正月八月九月昬舉中氣之星於三月七月旦舉中氣之星或舉朔氣或舉中氣猶書於七星或舉其名或舉其次皆互見也然則聖人南面視四星之中者豈徒然哉凡以授民時秩民事而已不特如孔氏所引書緯之言如龍見而雩火流而授衣天根見而成梁水昬正而栽日至而畢凡所以奉天順人莫不視乎此也禮書嚴陵方氏曰日在營室者日月會於營室之辰也會在營室以知月之建寅會在於胃以知月之建卯故日月所會謂之辰者以此毎一歲而十二會焉日與月會而此獨稱日者蓋陽以成歲為事而隂特從之故以日為主與書言出日納日而不及月同意二十八宿分布於四方晝夜運而歲一周焉季冬之月言星囘於天是也故毎月之内或見乎昬而中者或見乎旦而中者昏參中旦尾中則知月之建寅也推此則餘月亦可知也中謂中於南方也先昏而後旦者順隂陽之義也書於春言星鳥夏言星火秋言星虚冬言星昴乃與此不同何也蓋書言分至之所中者此言昬旦之所中者彼以時為主此以月為主故詳略不同然其見於南方則一也自角至箕則東方之七星也其形象龍故謂之蒼龍角者有左右二星居蒼龍之首以象兩角故謂之龍角亢喉也以總攝奏事聽訟有出納之象故也氐邸也人所托宿焉以為王者之後宫也房為東方之中星於時為闢戸之卯故謂之房心火星也心藏屬火故季夏亦止謂之火尾後宫之場箕有簸揚之形自井至軫則南方之七星也其形象鳥故謂之朱鳥井主水衡又其星有八若八家焉鬼為積尸主死喪又謂之輿鬼栁主草木草木不止於栁以其性柔得木之正故以名之星以其數有七故謂之七星二十八星皆星也謂南方之中星為星者以星為陽之精南方之中得陽之正故也亦猶十二辰皆辰也正謂卯巳之間為辰者以進則有亢唯辰為時故也張主施張翼為羽翼主逺客軫主任載自奎至參則西方之七星也其形象虎故謂之白虎奎主溝瀆汚穢可達而潔於此婁為聚衆胃為五榖之府猶人六府之胃昴為西方之中星而月乘焉畢主弋獵其形又象掩兎之畢觜主收斂參以三相參又主殺伐故亦謂之參伐自斗至畢則北方之七星也其形像龜虵故謂之𤣥武斗有挹注之形牛主犧牲又謂之牽牛女主嫁娶故謂之女又謂之婺女虚主邑居故謂之虚危為蓋屋其形高而危室為營宫室者之候故謂之營室壁主圖書之府不及東方之箕西方之昴南方之鬼與張者以既非日之所在又非昬旦之所中故也弧與建星非二十八宿之數而仲春昬旦舉之者由弧近井建近斗井有三十三度斗有二十六度其度最寛難以明其星之中故也至於孟秋昬舉建星者亦以是耳考之厯法其閒固不能無差經之所言亦要其大略姑以記時而已弧有張弧之形建有建旗之義故其名如此其日甲乙鄭氏曰乙之言軋也日之行春東從青道發生萬物月為之佐時萬物皆解孚甲自抽軋而出因以為日名焉乙不為月名者君統臣功也孔氏曰鄭註日之行春東從青道者以星辰之次謂之黃道春時星辰西遊黃道近西黄道之東謂之靑道日體不移依舊而行當靑道之上故云東從靑道云月為之佐者以日月皆經天而行月亦從靑道隂佐於陽也知月亦從青道者以緯云月行九道九道者並與日同靑道二黄道東赤道二黄道南白道二黄道西黑道二黄道北并黄道而為九道也日能生養萬物萬物皆抽軋而生故以甲乙為日功之名甲是孚甲乙軋也見律厯志月既佐日同有甲乙之功猶君統臣之功也長樂陳氏曰日以辰為子辰以日為母母為幹子為支幹為陽支為隂陽故二五而為十隂故二六而為十二雖陽也有隂存焉雖隂也有陽存焉故甲乙同於為木為仁而甲之數九乙之數八丙丁同於為火為禮而丙之數七丁之數六戊己同於為土為信而戊之數五巳之數九庚辛同於為金為義而庚之數八辛之數七壬癸同於為水為智而壬之數六癸之數五甲己之位不同而數同以甲之陽勝己之隂而已為之配故也丙辛之位不同而數同以丙之陽勝辛之隂而辛為之配故也由此推之凡十日之隂陽剛柔皆可知矣故以之施於一日則為暮夜旦晝之期以之施於一歳則為春夏秋冬之候其相生也以相繼其相勝也以相治此十日所以各有所直也古之人事在仁義則以甲庚斷之若易稱先甲後甲先庚後庚是也日在甲庚則以其物象之若春秋傳稱神降則以物亨之其至之日亦其物之類是也月令之紀時必先言其日凡欲奉時而興作者有所象之而已然月令言日而不言辰者以辰統於日故也馬氏曰甲丙戊庚壬陽也乙丁己辛癸隂也蓋一隂一陽毎相為用者也十日分麗於五行用事者王故甲乙用事於春為木王也丙丁用事於夏為火王也戊己用事於中央為土王也庚辛用事於秋為金王也壬癸用事於冬為水王也此王則彼竭矣故曰五行之動迭相竭也其帝大皥其神句芒鄭氏曰此蒼精之君木官之臣自古以來著徳立功者也大皥宓戱氏句芒少皥氏之子曰重為木官孔氏曰自孟春之月訖其日甲乙明於天道其事略竟從此以下至鴻鴈來明聖人奉天時及萬物節候也故蔡邕云法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月故先建春以奉天奉天然後立帝立帝然後言佐言佐然後列昆蟲之别物有形可見然後聲音可聞故陳音有音然後淸濁可聽故言鍾律音聲可以章故陳酸羶之屬羣品以著五行為用於人然後宗而祀之故陳五祀此以上皆聖人記事之次也東風以下者效初氣之序也二者既立然後人君承天時行庶政故言帝者居處之宜衣服之制布政之節焉大皡即伏羲氏是自古以來木徳之君案異義古尚書説元氣廣大謂之皡天伏犧徳能同天故稱皥以東方生養元氣盛大故謂之大皡西方收斂元氣小故謂之少皥伏字當山下著必是古之伏字徳能執伏犧牲謂之伏犧也律厯志云大皡作罔罟以田漁取犧牲故天下號曰庖犧氏帝王世紀云風姓也有聖徳為百王先帝出於震未有所因故位在東主春象日之明是以稱大皡句芒謂自古以來立功之臣共祀以為神是句芒者主木之官木初生之時句屈而有芒角故云句芒案昭二十九年左傳蔡墨云少皡氏有四叔曰重曰該曰脩曰熙重為句芒該為蓐收脩及熙為𤣥𡨕顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土是重為句芒然案楚語云重為南正司天犂為火正司地所以不同者蓋重為木正兼為南正司天犂為火正兼為北正司地故韋昭註云火當為北是也言大皡句芒者以此二人生時木王主春立徳立功及其死後春祀之時則祀之也句芒言其神則大皡亦神也大皡言帝則句芒當為臣也大皡在前句芒在後相去縣逺非是一時大皡木王句芒有生木之功故取以相配也石林葉氏曰左氏記蔡墨之言謂以人司其官死而遂祀之以為神者也五行本天地之氣無形可求其神必依人而行上古不可得而知矣自少皡以下各以其子為之則世或擇其能者相代如夏以柱為稷周以棄為稷是也後世五行之官不復脩為后土祭於社而句芒立春出土則祀之祝融蓐收無常祀也長樂陳氏曰古者祭祀必有配故社配以句龍稷配以棄四時迎氣於郊不可以無配也故迎青帝則配以大皥迎赤帝則配以炎帝配以大皥則從以句芒配以炎帝則從以祝融以至中央秋冬之禮類皆如此蓋五帝以徳五神以功徳則究其所乗之勢而本之也功則推其所職之事而歸之也馬氏曰大皥以木徳王而句芒者木正重也故祀以主春炎帝以火徳王而祝融者火正犂也故祀以主夏黄帝以土徳王而后土者土正句龍也故祀以主中央少皡以金徳王而蓐收者金正該也故祀以主秋高陽以水徳王而𤣥㝠者水正熙也故祀以主冬蓋天地以五行成萬物必有以尸之則生而有功德於民者沒而祀之以主時事不亦宜乎其蟲鱗鄭氏曰象物孚甲將解鱗龍虵之屬嚴陵方氏曰春則鱗蟲屬焉鱗蟲蓋龍虵之類以其體柔故也夏則羽蟲屬焉羽蟲蓋鳯凰之類以其色文故也秋則毛蟲屬焉毛蟲蓋虎狼之類以其力强故也冬則介蟲屬焉介蟲蓋龜鼈之類以其性辨故也中央倮蟲屬焉倮蟲蓋鼃螾之類以其質順故也馬氏曰萬物資氣以生形故因其時而以類屬焉蒼龍木屬也其類為鱗故春則其蟲鱗朱鳥火屬也其類為羽故夏則其蟲羽人土屬也其類為倮故中央則其蟲倮白虎金屬也其類為毛故秋則其蟲毛𤣥武水屬也其類為介故冬則其蟲介書稱鳥獸孶尾希革毛毨氄毛者言四時之化也此稱其蟲鱗羽倮毛介者言五行之屬也其音角鄭氏曰謂樂器之聲也三分羽益一以生角角數六十四屬木者以其清濁中民象也春氣和則角聲調樂記曰角亂則憂其民怨凡聲尊卑取象五行數多者濁數少者淸大不過宫細不過羽孔氏曰其春時之音為當於角取象木之聲鄭恐是他物之聲故云樂器也不云其聲角而云其音者單出曰聲雜比曰音音則樂曲也以春時調和樂以角為主故云其音角註云三分羽益一以生角角數六十四者以天地人謂之三才又陽數極於九故律厯志云五聲之本生於黄鍾律之九寸為宫於管則九寸於弦則九九八十一絲也律厯志又云或損或益以定宫商角徴羽宫三分去一下生徵徴數五十四徵三分益一上生商商數七十二商三分去一下生羽羽數四十八羽三分益一上生角角數六十四是其損益相生之數也律厯志云商之為言章也物成熟可章度也角觸也觸地而出戴芒角也宫中也居中央暢四方倡始施生為四聲綱也徴祉也物盛大而蕃祉也羽聚也聚藏宇覆之也云屬木者以其清濁中民象也木之聲淸於土金之聲濁於水火之聲今角聲亦淸於宫商濁於徴羽故角聲屬木所以淸濁中凡數多者濁數少者淸今宫數八十一商數七十二徴數五十四羽數四十八角數六十四少於宫商多於徴羽故云淸濁中既尊者為濁卑者為淸民則卑於君臣尊於事物亦是尊卑之中故云民之象也案樂記及律厯志云宫為君商為臣角為民徴為事羽為物羽屬北方其數少所以黄鍾在子其數多者冬時凝寒之氣在於地上水又淸輕羽既禀其寒氣又象水聲故其數少冬至陽氣伏於地下温積土中黄鍾含藏陽氣又象土聲故其數多各自為義不相湏也云凡聲尊卑取象五行者宫主土土聲濁其數多故主君商主金金聲稍重其數稍多故為臣角主木木聲淸濁中其數多少中故為民徴主火火聲稍輕其數稍少故為事事謂人之所營事務也羽主水水聲極輕其數最少故為物也物謂人之所用財物指其所營謂之事論其所用之體謂之物人是萬物之靈事物是人營作故卑於人也大不過宫細不過羽出國語禮記集説卷三十七
