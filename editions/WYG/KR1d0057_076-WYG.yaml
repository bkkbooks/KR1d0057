body:
  text: 禮記集說卷七十六宋衛湜撰韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸鄭氏曰頸五寸亦謂廣也頸中央肩兩角皆上接革帶以繫之肩與革帶廣同凡佩繋於革帶孔氏曰其上下及肩與革帶俱二寸韠繋於革帶鄭恐繋於大帶故云凡佩繋於革帶以大帶用紐約其物細小不堪縣韠佩故也嚴陵方氏曰下廣二尺以象地上廣一尺以象天長三尺以象三才其頸五寸以象五行肩革帶博二寸以象隂陽故其制如此頸中央也以上下皆大而中特小如人之頸故也肩兩角也以在兩旁如人之肩故也以繋於革故並言革帶之博焉山隂陸氏曰肩齊也韠自有帶其繋處與革帶齊後博二寸容革帶博亦如之大夫大帶四寸雜帶君朱緑大夫𤣥華士緇辟二寸再繚四寸凡帶有率無箴功鄭氏曰雜猶飾也即上之裨也君裨帶上以朱下以綠終之大夫裨垂外以𤣥内以華華黄色也士裨垂之下外内皆以緇是謂緇帶大夫以上以素皆廣四寸士以練廣二寸再繚之凡帶有司之帶也亦繂之如士帶矣無箴功則不裨之士雖繂帶裨亦用箴功凡帶不裨下士也此又亂脫在是冝承紳韠結三齊孔氏曰君謂天子諸侯飾帶外邊上畔以朱朱是正色故在上也下畔以綠緑是間色故在下也鄭註外以𤣥内以華近人為内逺人為外𤣥是天色故在外以華對𤣥故以為黄也黄是地色故在内也士既練帶而士冠禮謂之緇帶據韠色言之故謂之緇帶以韠之外内皆用緇也餘說見前經而素帶終辟下延平周氏曰於士帶言三尺則士而上皆三尺也於大夫言四寸則大夫而上皆四寸也士雖二寸冄繚之亦四寸也大以形言雜以色言凡帶即所謂有司二尺有五寸者率者欲其自直而已有率則有箴功而言無箴功者指其無所裨而言之山隂陸氏曰天子雜帶蓋亦朱綠而不言則用全天子之事雜非所言也以君見之而已雜帶猶言雜佩雜裳冠禮云𤣥裳黄裳雜裳是也雜裳先儒謂前𤣥後黄素帶即大帶也言素以於雜帶為素言大以於雜帶為大然則素帶冕服之帶雜帶爵弁皮弁𤣥端之帶知然者以爵弁服緇帶皮弁服緇帶𤣥端緇帶知之也綠木之間華土之間先儒謂五間綠紅碧紫騮黄蓋所謂騮黄驊騮也據此大帶四寸雜帶二寸冄繚四寸雜帶之二當大帶之一也士緇句辟二寸句一命緼韍幽衡冄命赤韍幽衡三命赤韍葱衡天子素帶朱裏終辟鄭氏曰此𤣥冕爵弁服之韠尊祭服異其名耳韍之言亦蔽也緼赤黄之間色所謂韎也衡佩玉之衡也幽讀為黝黒謂之黝靑謂之葱周禮公侯伯之卿三命其大夫冄命其士一命子男之卿冄命其大夫一命其士不命孔氏曰鄭以上經是𤣥端服之韠知此韠異於上也此據有孤之國以卿大夫雖三命冄命皆著𤣥冕若無孤之國則三命冄命之卿大夫皆絺冕不得唯𤣥冕也爵弁則士所服他服稱韠祭服稱韍是異其名也案易困卦九二朱紱方來利用享祀是祭祀稱韍也韍韠皆言為蔽取蔽障之義也案毛詩傳天子純朱諸侯黄朱黄朱色淺則亦名赤韍也大夫赤韍色又淺耳有虞氏之前直用皮為之後王漸加飾焉明堂位云有虞氏服韍夏后氏山殷火周龍章是也此一命謂公侯伯之士士冠禮爵弁韎韐此緼韍則當彼韎韐故云所謂韎也毛詩云韎韐茅蒐染齊人謂茅蒐為韎韐聲也茅蒐則蒨草以蒨染之其色淺赤則緼為赤黄之間色若子男大夫俱名緼韍不得為韎韐也以其非士故耳周禮牧人云隂杞用黝牲又孫炎註爾雅云黝靑黒葱則青之異色三命則公之卿𤣥冕侯伯之卿絺冕皆赤韍葱衡長樂陳氏曰此一命於公侯則為士而子男則大夫也冄命於侯伯則為大夫而子男則為卿者也三命則侯伯之卿是己典命所載可考己見鄭註蓋赤黄間而為緼則其色雜矣雜則賤故於士言之赤則其色純矣純則貴故於卿大夫言之以其如畢羅之可蔽則為韠以其文飾之與裳辨則謂之韍可以為祭服亦可以為朝服鄭氏謂尊祭服異其名則以韍為祭韠為朝誤矣又曰韍不獨祭服也服其命服朱芾斯皇見於方叔赤芾朱舄又歌於會東都之諸侯禮曰君朱大夫素士爵韋又曰赤黻幽衡赤黻葱衡若朝服也然主人𤣥端素韠于廟門之内以筮日則見於士冠禮之初而緇衣則爵韠皮弁則素韠又序於士冠禮三加之際則韠不得為朝服也嚴陵方氏曰韍即韠矣以前言天子諸侯與在朝之臣而此止言諸侯之臣故變言之爾緼赤黄之色也土出於火土出則火藏矣故其色謂之緼緼者藏也衡佩上瑀也以言其寓之以為覆則謂之瑀以言其横之以為平則謂之衡一命其韍用緼以見雖有所緼未足以𤼵見而著明也冄命三命爵位漸隆足以𤼵見而著明矣故其韍用赤焉山隂陸氏曰韎日在昩谷緼日在暘谷之色赤則既進矣故韎韐昩也進而為緼緼進而為赤赤進而為朱詩曰朱芾斯皇有瑲葱衡則三命赤芾蓋朝會之服士一命皮弁素韠三命為爵弁韎韐若加一命是為三命服𤣥冕矣𤣥冕以上服韍所謂一命緼韍幽衡是也又加一命則服赤芾幽衡又加一命則服赤韍葱衡是為五命先儒謂三命以上皆服葱衡此讀三命赤韍葱衡之誤詩曰有瑲葱珩蒼靑之𤼵也葱靑之達也辟讀如字既夕禮曰有前後裳不辟辟辟之而已若積無數延平周氏曰君朱大夫素士爵韋者言天子諸侯與其在朝之臣也一命緼韍幽衡而下言諸侯之臣也冄命者在大國則大夫而已故衡與一命者同所以示其畢也在小國則卿也故韍與三命同色所以示其尊也王后褘衣夫人揄狄鄭氏曰褘讀如翬揄讀如摇翬摇皆翟雉名也刻繒而畫之著於衣以為飾因以為名也後世作字異耳夫人三夫人亦侯伯之夫人也王者之後夫人亦褘衣孔氏曰自此至男子一節論王后以下命婦之服惟有三寸長齊于帶一經厠在其間褘衣六服之最尊也狄讀如翟鄭註内司服引爾雅釋鳥伊雒而南素質五色皆備成章曰翬江淮而南靑質五色皆備成章曰摇鄭又云王后之服刻繒為之形而采畫之綴於衣以為文章褘衣畫翬者揄翟畫摇者闕翟刻而不畫從王祭先王則服褘衣祭先公則服揄翟祭羣小祀則服闕翟鞠衣黄桑服也色如鞠塵服之以告桑展衣以禮見王及賔客褖衣御于王之服闕翟赤摇翟青褘衣𤣥鞠衣黄展衣白褖衣黑其六服皆以素紗為裏鄭註以經王后夫人其文相次故以夫人為三夫人但三夫人與三公同對王為屈三公執璧與子男同則三夫人亦當與子男夫人同故鄭註司服疑而不定云三夫人其闕狄以下乎為兩解之也王者之後自行正朔與天子同故祭其先王亦褘衣也若祭先公則降焉魯祭文王周公其夫人亦褘衣故明堂位云夫人副褘立于房中是也長樂陳氏曰九者陽之窮故王之吉服九六者隂之終故后之吉服六王之服九而祭服六后之服六而祭服三以婦人不預天地山川社稷之祭故也王之服衣裳之色異后之服連衣裳而其色同以婦人之德本末純一故也王之服襌而無裏后之服裏而不襌以陽成於竒隂成於耦故也素質義也靑質仁也五色皆備成章禮也有仁義以為質有禮以為文后之德如此而已然地道尚義故褘衣為上揄狄次之言褘衣則知揄之為翟闕翟周禮謂之闕禮記謂之屈則其制屈於揄褘而已三翟蓋皆畫之於衣如王冕服鄭賈之徒謂褖衣黑而象水水生於金故展衣白金生於土故鞠衣黄土生於火故闕狄赤火生於木故揄狄青五色之上則𤣥而已故褘衣𤣥祭先王服褘衣祭先公服揄狄祭羣小祀服闕狄蠶則服鞠衣以禮見王及賔客服展衣燕居及御于王則服褖衣崔靈恩謂王后三翟數皆十二王者之後諸侯夫人三公而下夫人雉數如命數於理或然詩曰其之翟也而繼之以胡然而天胡然而帝則德當神明可知矣曰其之展也而繼之以展如之人邦之媛也則行配君子可知矣然謂二翟刻繒畫之綴於衣闕翟刻之而不畫其說無據夫黄者隂之盛色蠶而服之以其帥外内命婦而蠶使天下之嬪婦取中焉后事之盛也白者隂之純色見王及賔客服之以其見王及賔客無事乎飾一於誠焉后禮之懿也黑者隂之正色纁者隂之上達褖則循褖之也燕居及御于王服之以其體貴至正以上達為循褖而已后行之盛也玉藻所謂夫人揄翟君命屈狄再命鞠衣士褖衣者周官内司服辨外内命婦之服鞠衣展衣縁衣鄭氏以為内命婦之服鞠衣九嬪也展衣世婦也縁衣女御也外命婦者其夫孤也則鞠衣卿大夫也則展衣士也則縁衣三夫人及公之妻其闕狄以下乎侯伯之夫人揄狄子男之夫人亦闕狄唯二王後褘衣然記言士褖衣則明婦命眡夫也言君命則明再命一命非女君也蓋子男之夫人闕狄侯伯之夫人揄狄公之夫人褘衣公之夫人褘衣記稱夫人副褘是也再命鞠衣則上至於四命可知也鄭氏謂侯伯之夫人揄狄子男之夫人屈狄孤鞠衣卿大夫展衣士褖衣而改褘為鞠其說是也謂三夫人及公之妻闕狄誤矣王制言三公一命衮則三公在朝鷩冕其妻揄狄可知也玉藻言夫人揄狄則三夫人揄狄可知也公之夫人褘衣而明堂位言魯夫人副褘者魯侯得用衮冕則夫人副褘可知也少牢大夫之妻衣侈袂則其上至后夫人之袂皆侈特士妻褖衣之袂不侈禮書嚴陵方氏曰言褘衣則以知揄之為衣言揄狄則以知褘為之狄自鞠衣而下不言狄則以不畫狄故也褘衣畫狄而不言則以尊而無嫌故也六服之制上得以兼下下不得而僭上焉后之褘衣猶王之大裘乃至尊之所獨也故曰王后褘衣揄狄則諸侯公夫人之所同猶上公與王同服衮冕也故曰夫人揄狄言諸侯夫人服此則自侯伯而下服屈狄可知屈狄亦三夫人與三公之夫人所服三夫人君之内命婦也三公之夫人君之外命婦也故曰君命屈狄然降於諸公之夫人一等者猶三公在朝則服鷩冕也屈狄為君之命婦則鞠衣而下皆臣之命婦服而已若子男之卿再命其婦則從夫人之爵故曰冄命鞠衣其大夫一命故曰一命展衣其士不命故曰褖衣而已臣之命婦不比於子男而是為言者舉卑以見尊也經之所言皆以互相明爾王后必以狄為尚何也蓋狄之為性則交有時别有倫守死而不犯分焉婦人之德所宜以至后之五路皆重翟者其義亦若是而已内之二十七世婦以應外之二十七大夫言世婦如此則大夫而下其妻可知延平周氏曰翬翟皆雉也蓋以其飛有時别有倫與夫文明可以為飾夫人兼王與大國也揄狄為大國則屈狄者小國而已褘衣之色𤣥北方之色也揄狄之色青東方之色也北方隂隂主静東方陽陽主動婦道以静為貴故王后褘衣夫人揄狄屈狄之色赤南方之色也以其刻而不畫則於文為闕於禮為屈故小國之夫人服之冄命褘衣先儒以為鞠衣是矣蓋鞠衣服之以桑故其色黄象桑之始生示其及時事也此冄命者所以服之内司服辨外内命婦之服自鞠衣始蓋自冄命已下言之也襢衣命以實所以象婦德褖衣命以緣象其婦道而已婦道隂也故其色黒山隂陸氏曰褘衣當衮冕揄狄當鷩冕闕狄當毳冕鞠衣當希冕襢衣當𤣥冕爵弁褖衣當皮弁宵衣當朝服𤣥端知然者以主人爵弁纁裳女次純衣纁衻大夫以𤣥赬世婦以襢衣從者畢𤣥端姆纚笄宵衣在其右諸侯以朝服視朝於内朝夫人纚笄而朝則有君臣之嚴知之也男子褖衣白婦褖衣亦白褖衣白襢衣赤鞠衣黄揄狄靑褘衣𤣥闕狄視揄狄少闕而已則亦靑可知𤣥北方也靑次之赤次之白又次之鞠衣以黄在中三寸長齊于帶紳長制士三尺有司二尺有五寸子游曰參分帶下紳居一焉紳韠結三齊鄭氏曰三寸謂約帶紐組之廣也長齊于帶與紳齊也紳帶之垂者也言其屈而重也論語曰子張書諸紳有司府史之屬也三分帶下而三尺則帶髙於中也結約餘也此又亂脱在是冝承約用組結或為衿孔氏曰鄭註言其屈而重者解垂帶名紳之意申重也餘見前延平周氏曰大帶之下四尺五寸故參分帶下紳居二焉則紳有三尺韠與結亦三尺也故紳韠結三齊韠蔽之也蓋君子之道長於檢束於内而不知蔽護於外者不足以接人長於蔽護於外而不知檢束於内者不足以成已此紳韠結所以三齊者也君命屈狄冄命褘衣一命襢衣士褖衣鄭氏曰君女君也屈周禮作闕謂刻繒為翟不畫也此子男之夫人及其卿夫人士之妻命服也褘當為鞠字之誤也禮天子諸侯命其臣后夫人亦命其妻以衣服所謂夫尊於朝妻榮於室也子男之卿冄命而妻鞠衣則鞠衣襢衣褖衣者諸侯之臣皆分為三等其妻以次受此服也公之臣孤為上卿大夫次之士次之侯伯子男之臣卿為上大夫次之士次之褖或作税孔氏曰女君謂后也以禮君命其夫后命其婦則子男之妻不得受天子之命受后之命故云君命屈狄也直刻雉形闕其采畫故云闕狄也褘衣是王后之服故鄭知當為鞠謂子男卿妻服鞠衣也襢展也子男大夫一命其妻服展衣子男之士不命其妻服褖衣也典命云子男之卿冄命其大夫一命其士不命此云冄命褘衣一命襢衣士褖衣又承闕狄下正與子男同故知據子男夫人及卿大夫士之妻也長樂陳氏延平周氏說見前山隂陸氏曰屈狄其夫五命之服也蒙上又兩加命是為九命所謂冄命褘衣者此歟不言五命屈狄而言君命著君命以竒自五而加焉一加為七命又一加為九命矣士一命其妻褖衣若加一命是為大夫則其妻服襢衣所謂一命襢衣者此歟據侯伯之卿三命其大夫冄命其士一命不言士褖衣一命襢衣而言一命襢衣士褖衣使士在下也金華范氏曰自王至士其配各有服其服各有等王之服衣裳之色異后之服連衣裳而其色同以婦德本末之純一也王后而下服分六等各視其夫爵以位為之隆殺也世婦而上各分六等由君而命以德為之隆殺也唯世婦命於奠繭昭婦功也其他皆從男子昭婦順也六宫之内后親蠶世婦以下皆分繭稱絲效功以共冕服百官之衆夫尊於朝婦榮於室位髙而後身顯無敢覬覦一衣服之間區别如此安有不稱其服者乎如此然後家齊而國治唯世婦命於奠繭其他則皆從男子鄭氏曰奠猶獻也凡世婦以下蠶事畢獻繭乃命之以其服天子之后夫人九嬪及諸侯之夫人夫在其位則妻得服其服矣自君命屈狄至此亦亂脫在是冝承夫人揄狄孔氏曰世婦謂天子二十七世婦以下也獻繭謂世婦及命婦入助蠶畢獻繭也凡獻物必先奠於地故云奠凡夫尊於朝妻貴於室皆得各服其命服今唯世婦及卿大夫之妻並卑雖已被命猶不得即服命服必又須經入助蠶蠶畢獻繭繭多功大更須君親命之著服乃得服爾故云命於奠繭鄭註云已下則女御亦然其他謂后夫人九嬪及五等諸侯之妻也其夫得命則其妻得著命服不須奠繭之命故云皆從男子延平周氏曰二十七世婦即外之二十七大夫也世婦以下必待奠繭然後命之則大夫以下其妻亦若是矣必命於奠繭其意以為有功於祭服然後可以受此命也山隂陸氏曰凡奠繭獻而後奠正言奠繭著命世婦在既奠之後其他皆從男子以無奠繭之事也亦著世婦以功受服不專為夫凡侍於君紳垂足如履齊頥霤垂拱視下而聽上視帶以及袷聽鄉任左鄭氏曰紳垂則磬折也齊裳下緝也袷交領也孔氏曰自此至不俟車一節論人臣侍君及被君召之儀凡者臣無貴賤皆然紳大帶也身直則帶倚磬折則帶垂身折則裳前下緝委地故行則足恒如踐履裳下也霤屋簷身俯故頭臨前垂頥如屋霤垂拱者拱㳫手也身俯則冝手㳫而下垂也視下者視髙則傲故下矚也聽上謂聽尊者語冝諦聽故仰頭而面鄉上以聽之也視帶以及袷者視尊者之處也視君之法下不過帶髙不過袷故曲禮云凡視上於面則傲下於帶則憂是也聽上及聽鄉任左皆備君教使也侍君之時君坐故侍者在右是以聽鄉皆以左為任謂以左耳近君也嚴陵方氏曰頥霤則首俯而頥傾如簷霤也身屈故手垂髙目下耳以尊臨卑之道視下聽上以卑事尊之道慶源輔氏曰垂而拱則不盡垂也山隂陸氏曰鄉目所向右耳目不如左明亦左無為之地凡君召以三節二節以走一節以趨在官不俟屨在外不俟車鄭氏曰節所以明信輔君命也使使召臣急則持二緩則持一周禮曰鎮圭以徴守其餘未聞也今漢使者擁節不俟趨君命也必有執隨授之者官謂朝廷治事處孔氏曰節以玉為之君使使召臣有二節時有一節時故合云三節急則二節臣故走也緩則一節臣故趨也在外謂其室及官府也在官近不須車故言屨在外逺故云車周禮典瑞徴召守國諸侯以鎮圭召之漢時使人持節召臣案庾氏曰召以節者謂急則以二節緩則以一節急緩不出於三耳不謂節盡於三也嚴陵方氏曰孟子言旌以招大夫旂以招士皮冠以招虞人皆召以節之義也凡趨疾於行走又疾於趨趨則自束攝散亂焉走則趨前之速矣言官以知外之為私言外以知官之為内孔子之不俟駕皆為是也孟子聞王命而遂不果何哉孔子臣道孟子師道也且為師矣雖天子不召師而況諸侯乎山隂陸氏曰節有疏數一節而二則數矣故君召二節以走一節以趨慶源輔氏曰先云二節以走趨君命主疾金華應氏曰器以藏禮禮以出信也故進人以環聘賢以幣招大夫以旌皆以出信也節之以一以二以意而示緩急亦若此歟制命為義承命為信也故在廟則駿奔見君則趨進没階翼如皆以承命也召而或走或趨亦隨事而為緩急歟自公召之顛倒裳衣何暇於俟屨君命召不俟駕行矣何暇於俟車蓋古者官府皆近列於朝廷之側所謂在官猶在公也席地而坐登席則解屨慮其汙也造次聞召未容遽納故或不容於俟屨及退食於家出行於外則徒馭皆散倉卒未易遽集故或不容於俟車然亦豈終於跣足而徒歩哉倉卒承命而屨與車隨之而後耳金華范氏曰自凡侍於君止聽鄉任左侍君之儀凡君召止不俟車被召之儀立凡以言例所謂凡無貴賤皆然事有常儀冝有常心矣禮達分定所以一人心定衆志而緩急疾徐如手足之應腹心又見分嚴而情通也士於大夫不敢拜迎而拜送士於尊者先拜進面荅之拜則走鄭氏曰不敢拜迎禮不敵始來拜則士辟也士徃見卿大夫卿大夫出迎荅拜亦辟也孔氏曰此一節明士於尊者之法大夫詣士禮既不敵故士不敢迎而先拜大夫雖拜士則辟之也而拜送者案儀禮但是主人送賔皆冄拜賔不荅拜鄭註云禮有終故也士於尊者謂士徃詣卿大夫即先於門外拜之拜竟乃進面親相見也若大夫出迎而荅拜則士走辟之慶源輔氏曰拜迎則勞尊者之荅己拜迭則盡己之敬嚴陵方氏曰尊者則不必大夫凡在己上者皆是也先拜進面者先拜於門然後進相見也士於君所言大夫没矣則稱諡若字名士與大夫言名士字大夫鄭氏曰君所大夫存亦名孔氏曰此一節論士於君及大夫之所言羣臣之法君前臣名若大夫生則士呼其名大夫已沒而士於君前言則稱諡無諡則稱字士賤雖已死猶呼其名若士與大夫言及他大夫士則士呼名大夫呼字若大夫士卒則字士諡大夫嚴陵方氏曰没死也以生若浮則死為没矣山隂陸氏曰春秋書孔父夷伯此没矣則稱字之證也金華應氏曰隠其名而舉其諡與字非獨自謹分守存謙退亦所以體君上尊賢貴貴隠卒崇終之心也於大夫所有公諱無私諱凡祭不諱廟中不諱教學臨文不諱鄭氏曰公諱若言語所辟先君之名也凡祭祭羣神不諱謂祝嘏之辭中有先君之名者廟中上不諱下教學臨文不諱為惑未知者孔氏曰此論諱與不諱之法士及大夫言但諱君家不自私諱父母敬大夫故不重敬也祭社稷山川百神祝嘏辭中有先君之名不諱之廟中有事於祖則不諱父有事於父則諱祖教學謂師長也若諱則疑誤後生臨文謂簡牒及讀法律之事諱則失於事正嚴陵方氏曰此一節與曲禮所言文雖小異而義則一也彼言君所此止言大夫者舉卑以見尊也此言教學彼則不言者以詩書見之也凡祭則廟中在其間矣而重言之者廟中上不諱下與凡祭異故重言之曲禮不言凡祭者舉親以見䟽也金華范氏曰自士於大夫止臨文不諱論士大夫交際與名諱之法先之以事君之禮繼之以卿大夫士交際之禮蓋次第等級士知有大夫大夫知有君其義然也貴貴尊賢之義並行不悖於其下然後同心恊志一德以尊於天子制禮之意深矣不特其生為然也周人以諱事神名終將諱之然君所無私諱廟中不諱而義達於上下貫於幽明矣教學臨文豈可以一日之避就而失萬世之經哉古之君子必佩玉右徴角左宮羽趨以采齊行以肆夏周還中規折還中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也鄭氏曰玉比德焉君子士已上也徴角在右事也民也可以勞宮羽在左君也物也宜逸此謂玉聲所中也門外謂之趨齊當為楚薺之薺采齊路門外之樂節也肆夏登堂之樂節周還反行也冝圜折還曲行也冝方揖之謂小俛見於前也揚之謂小仰見於後也鏘聲貌鸞在衡和在軾自由也孔氏曰自此至綦組綬一節廣明佩玉之事案詩秦風云言念君子温其如玉聘儀云温潤而澤仁也至孚尹旁達信也是玉以比德下文天子佩白玉下至士是君子含士以上也所佩之玉中徴角宫羽之聲案樂記角為民徴為事右是動作之方而佩徴角事則須作而成民則供上役使故可勞而在右又樂記宮為君羽為物左是無事之方君宜静而無為物冝積聚故在於左所以逸也路寢門外至應門謂之趨於此趨時歌采齊為節路寢門内至堂謂之行於行之時則歌肆夏之樂爾雅釋宫云室中謂之時堂上謂之行堂下謂之歩門外謂之趨中庭謂之走大路謂之奔此對文爾總而言之門内謂之行門外謂之趨鄭註反行謂倒行反而行假令從北嚮南或從南嚮北曲行謂屈曲而行假令從北嚮南行曲折而東嚮西嚮也揖俯也若行前進則身恒小俯俛也揚仰也郤退遷行則身㣲仰也進俯則佩嚮前垂而見之退仰則佩嚮後垂而見之然後佩離身而直行摇動佩自擊所以玉聲得鏘鏘而鳴也君子恒聞鸞和佩玉之正聲是以非類邪僻之心無由入於身也此謂平常所乗之車若田獵之車則鸞在馬鑣故注秦詩云置鸞於鑣異於乘車長樂陳氏曰古之君子必佩玉其制上有折衡下有䨇璜中有琚瑀下有衝牙貫之以組綬納之以蠙珠而其色有白蒼赤之辨其聲有角徴宮羽之應其象有仁智禮樂忠信道德之備或結或垂所以著屈伸之理或設或否所以適文質之儀此所以純固之德不内遷非僻之心無自入也蓋衡以平其心璜以中其徳琚欲其有所安牙欲其有所制右徴角所以象事與民左宮羽所以象君與物趨以采齊行以肆夏所以比於樂周還中規折還中矩所以比於禮進則揖之於前退則揚之於後則佩之為物奚適而非道邪蓋民為貴君為輕事為先物為後能治民然後能安君能應事然後能生物此所以事與民在所右而物與君在所左也又曰書傳曰天子左五鍾右五鍾出撞黄鍾右五鍾皆應然後大師奏登車告出也入撞蕤賔左五鍾皆應然後少師奏登堂就席告入也周禮樂師行以肆夏趨以采齊自其出言之也則黄鍾之鍾所以奏肆夏也禮記趨以采齊行以肆夏自其入言之也則蕤賔之鍾所以奏采齊也出撞陽鍾而隂鍾應之則動而節之以止也入撞隂鍾而陽鍾應之則止而濟之以動也動而節之以止則無過舉止而濟之以動則無廢功肆夏非特施於王行也享牧伯亦用焉春秋傳稱三夏天子所以享元侯是也非特享牧伯也而送助祭者亦用焉禮記稱大饗其王事與其出也肆夏送之是也諸侯之禮有肆夏無王夏大夫之禮有陔夏無肆夏故燕禮奏肆夏則諸侯有肆夏無王夏可知郷飲酒奏陔夏以送賔而禮譏大夫之奏肆夏自趙文子始則大夫有陔夏無肆夏可知夫王食則以樂侑之言則以樂歌之行則有肆夏采齊以節之登車則有鸞和以和之然則王之所以言語飲食行趨登車之際無非樂音樂以樂之禮以節之則純和之志不内散而非僻之心無自入焉所謂禮樂不可斯須去身者此也並禮書嚴陵方氏曰古之君子以見佩之所設其所由來尚矣佩上有一瑀下有二璜瑀竒天道也璜耦地道也上有三珩中有一琚瑀又謂之衡衡之以為平也珩又謂之衡衡行也人行亦行耳則佩之設也豈茍然徴角為陽宮羽為隂陽主動隂主静右佩隂也而聲中徴角之動左佩陽也而聲中宮羽之静蓋佩所以為行止之節時止則止時行則行此設佩之意也知行而不知止則動或生悔知止而不知行則静或失時以處静必知動故右之聲而中徴角之陽以即動必知静故左之聲而中宮羽之隂焉先右而後左者禮以右為尊故也至於言結佩設佩則先左而後右者德尊而事卑故也此所以為德佩事佩之辨而五聲之中獨無商者則與周官言宮之樂無商義同葢佩之象德也而基德者必以温樂之享神也而懐神者必以柔商於四時為秋秋之氣肅非所以為温故也於五行為金金之性剛非所以為柔故也孔子不云乎君子之音温柔居中以養生育之氣蓋謂是矣唯射樂則偃旌以商者以習武故尚義也齊周官作薺當以周官為正采齊蓋逸詩肆夏即九夏之一也周還則其歩緩而曲曲則圜前故中規折還則其歩疾而直直則方後故中矩中規仁也中矩義也君子雖行歩而不忘仁義焉玉鏘然而鳴則右中徴角左中宮羽在車則聞鸞和之聲行則鳴佩玉經解所謂行歩則有環佩之聲升車則有鸞和之音者是矣夫環佩以玉為之則陽精之所生鸞和以金為之則隂精之所成陽主仁隂主義環佩入而在内之節也鸞和出而在外之節也君子存心以仁為本故行則鳴玉佩制事以義為先故在車則聞鸞和之聲焉有仁義則所習者是所從者正是以非辟之心無自入也曰鸞以和之為和曰和以見鸞之為唱鸞以體言也和以用言也以鸞和之聲美故因取象焉延平周氏曰五音惟宮徴有變變者臨人之道常者事人之道故右則徴在上而左則宮在上也不用商何也所謂右徴角者非不具五聲也特以角徴為均所謂左宮羽者亦非不具五聲也特以宮羽為均蓋樂之有均猶人之有主商臣也其可以為主乎爾雅曰堂上謂之行堂下謂之趨樂師曰行以肆夏趨以采薺車亦如之是行之與車出之與入於堂上則皆以采薺為節在門外則皆以肆夏為節還有止意言周還以對於折還則周還為行折還為止於進言揖則知退為讓於退言揚則知進為仰在軾曰和在鑣曰鸞蓋和者象其皇之和鸞者象其鸞之鳴故韓詩内傳曰馬動則鸞鳴鸞鳴則和應新安朱氏曰周旋中規折旋中矩周旋是直去郤囬其囬轉處欲其圜如規也折旋是直去了復横去如曲尺相似其横轉處欲其方如矩也建安真氏曰古之君子於所以飬其心者無不至也佩玉中宮徴之音歩趨有詩樂之節行必中規矩在車則聞鸞和進退俯仰之間出入動静之際莫不節之以禮和之以樂故於是時防邪僻而導中正其為功也易近世一切無之而所以熒惑斲喪者則不可勝數故於是時防邪僻而導中正其為力也難夫唯知其難而益勉持敬之功庻乎非僻無自而入矣君在不佩玉左結佩右設佩居則設佩朝則結佩齊則綪結佩而爵韠鄭氏曰出所處而君在焉則去徳佩而設事佩辟徳而示即事也結其左者若於事有未能也結者結其綬不使鳴也此謂世子也居則設佩謂所處而君不在焉朝於君則結佩亦結左也齊則綪結佩綪屈也結又屈之思神靈不在事也爵韠者齊服𤣥端孔氏曰世子出所處而與君同在一處則不敢佩玉玉以表德去之示已無德也下云朝則結佩謂朝時明此君在非朝處也知謂世子者以臣之對君則恒佩玉故下云君子無故玉不去身前文云然後玉鏘鳴也是臣之去朝君備儀盡飾當佩玉今云君在不佩玉故知非臣下云世子佩瑜玉是以知世子也左結佩者謂結玉佩不使鳴非為全去也右設佩者謂設事佩木燧大觿之屬也居則設佩朝則結佩亦皆謂世子齊則綪結佩則謂凡應佩玉之人非唯世子也綪結佩謂結其綬而又屈上之也而爵韠者謂士𤣥端齊故爵韋為韠也案熊氏曰爵韠謂諸侯以下皆以𤣥端齊而以爵韋為韠同士禮以其齊故不用朱韠素韠也長樂陳氏曰古者有德佩有事佩德佩則左右皆玉事佩則左紛帨右玦捍之類左佩皆有五右佩皆六以左陽而竒右隂而耦故也左佩者小右佩者大以左手足不如右強故也先設事佩次加德佩以事成而下德成而上故也詩言佩觿佩韘乃言容兮遂兮是先設事佩後設徳佩也此經鄭氏以為世子之禮是也臣於君所佩必垂委而朝必鳴玉是與世子之禮異也考之内則男女未冠笄衿纓佩容臭而已則佩者成人之服也衛詩以惠公驕而無禮故譏以童子佩觿童子佩韘以言無成人之德而服成人之服也子衿詩曰青青子佩蓋亦指成人者言之齊所以致精明之德佩既結矣又從而屈之不以徴角宮羽之聲散其志也況敢聽樂乎儀禮之陳服器有順有䋫順則直䋫則屈故士喪禮陳襲事于房中西領南上不綪陳衣于房南領西上綪士虞禮曰器西南上綪既夕禮乃奠豆南上綪俎二南上不綪鄭氏曰綪讀為䋫屈也禮書嚴陵方氏曰自君在不佩玉至朝則結佩先儒謂世子是矣蓋人臣之於君所未始不佩玉故也言君在不佩玉而又言左結佩右設佩則知前所結所設者非德佩也事佩而已示其可以即事而未足乎德也居則設佩者此則言德佩也居謂燕居朝謂朝于公朝之時居則設以示德音孔昭雖燕而有所不忘朝則結以貊其德音自謙而有所未𤼵也既曰君在不佩玉又曰朝則結佩者所謂朝則在朝之時所謂在則退朝之所也退朝之所在父子之道也在朝之時則君臣之義也子有代父之嫌而臣無代君之禮故退朝不佩玉者子避嫌於父也在朝必佩玉者臣盡禮於君也蓋其意各有所主而已朝雖佩玉然猶結之則又有别於羣臣焉齊則綪結佩而爵韠凡致齊者皆如是所以謂之𤣥也當是時君不得以朱大夫不得以素佩之聲則静而不譁服之色則幽而不著凡以隂幽思而已馬氏曰古之君子必佩玉左徴角右宮羽者君佩也君在不佩玉左結佩右設佩者臣佩也君佩尊是故左右皆以玉臣佩卑是故左以德右以事慶源輔氏曰左結佩不敢比德也右設佩不敢忘事也居恐其略故言設佩朝戒其敖故言結佩無非教也金華應氏曰佩玉自天子至士所同而禮有所敬則屈而不伸故君在則不佩玉所謂不佩非盡去之特結其左耳蓋左為尊而主必在左故侍於君則聽郷任左是以設之而不結也蓋人臣將朝習容觀玉聲則佩未嘗不設乎身及其見君起敬則微結束而收斂之不若齊之纒綿固結也先儒疑臣之朝君未嘗去佩遂以此為世子之事然尋上下文意皆無世子之文又左右之所結所設則以為德佩事佩居朝之所設所結則專以為德佩亦不相貫通矣君在若郷黨所謂君在踧踖如也居則設佩者姑以平居對朝而言之平居非必燕居之時也語曰去喪無所不佩蓋德佩事佩皆欲其備也詩所謂雜佩以贈之是也然凡帶必有佩玉是事佩可略而德佩不可去也凡帶必有佩玉唯喪否佩玉有衝牙君子無故玉不去身君子於玉比德焉鄭氏曰凡謂天子以至士喪主於哀故去飾衝牙居中央以前後觸也故謂喪與災眚孔氏曰凡佩玉必上繫於衝下垂二道穿以蠙珠下端前後以縣於璜中央下端縣以衝牙動則衝牙前後觸璜而為聲所觸之玉其形似牙故曰衝牙嚴陵方氏曰帶以約身玉以比德約身必以德故帶必有佩玉唯喪則否以自貶故也下言無故玉不去身以此佩玉有衝牙者以徃來乎兩璜之間相衝焉故謂之衝牙牙言其體也衝言其用也且佩之設有珩璜焉有琚瑀焉而此止言有衝牙者吉凶悔吝皆生乎動動則不能無害且牙居兩璜之間動則相觸於璜固不能無傷焉夫佩所以節行也故其名如此而經所以止言是歟亦見明堂位崇牙觧無故玉不去身已見曲禮解繼言君子於玉比德者以見身不可離於德也山隂陸氏曰凡帶必有佩玉據此佩有不設無不佩也佩玉有衝牙著玉非觸不鳴君子比德於是為至故曰感而後應迫而後動不得已而後鳴聘義玉在下以德比玉此先以玉比德以德比玉尊矣以玉比德隨其玉而比之慶源輔氏曰帶必有佩言飾之不可已也據此則不佩非去之也結之耳有衝牙然後有聲佩所以設聲也玉不去身必有以也故又言其所以曰君子於玉比德焉如是則不去身也冝矣天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬孔子佩象環五寸而綦組綬鄭氏曰玉有山𤣥水蒼者視其文色所似也綬者所以貫佩玉相承受者也純當為緇古文緇字或作絲旁才綦文雜色緼赤黄孔子佩象環謙不比德亦不事也象有文理者也環取可循而無窮孔氏曰玉色似山之𤣥而雜有文似水之蒼而雜有文故鄭云文色所似但尊者玉色純公侯以下玉色漸雜世子及士唯論玉質不明玉色則玉色不定也瑜是玉之美者故世子佩之承上天子諸侯則世子天子諸侯之子也然諸侯世子雖佩瑜玉亦應降殺天子世子也瓀玫石次玉者賤故士佩之顧命綦弁註云綦青黒色鄭風縞衣綦巾註云綦蒼艾色故鄭知綦為雜色也象環五寸法五行也長樂陳氏曰玉之貴者莫如白賤者莫如瓀玟山𤣥以象君德之静水蒼以象臣職之動山𤣥水蒼其文也瑜與瓀其質也世子佩瑜則士佩瓀矣士佩瓀則世子而上佩堅矣瓀或作礝以其多石故也玟或作珉以其賤故也組綬之佩謂之綬以其貫玉相承受也其飾天子𤣥諸侯朱大夫純世子綦士緼𤣥者道也朱者事也蒼白者德之雜赤黄者事之雜純則素而已此天子至士佩綬之辨也禮書嚴陵方氏曰組與前所謂纓之組同組以言其質𤣥以言其色綬以言其用也下皆放此緼與緼韍之緼同君以無為而體道道則純故色以純者君也臣以有為而用事事則雜故色以雜者臣也諸侯雖有君道以對天子則為臣故綬雖以朱之純而山𤣥則雜之矣世子亦有君道以有父在則為臣故玉雖以瑜之純而綬以綦則雜之矣是皆不純乎君道故也若天子玉純以白異乎公侯雜之以山𤣥也綬純以𤣥異乎世子雜之以綦也此非隆殺之辨歟孔子有自然之文故佩象其文應變而無窮故以環能參天兩地故五寸有素王之德而居人臣之位故綬以綦與世子同所謂以義起禮也山隂陸氏曰山水斲飾也山仁也水智也為人君止於仁智也者以智帥人者也瑜有美而無瑕世子之法周公所以敎成王求為是故也士佩瓀玟玟質不美故也彼所謂碔砆猶愧於此純讀如字緼讀如字純組綬以絲為之緼組綬以纊為之言純組綬則朱組綬亦純也言朱組綬則純組綬亦朱也綦組綬緼組綬放此知然者以毛詩傳曰士佩瓀玟而青組綬知之也環佩上玉也亦或以玦環理也玦事也莊子曰緩佩玦者事至而斷綬衿也佩衿謂之綬漢制縌綬之間得施玉環鐍蓋有所本之也綦組綬此士服歟卒言孔子如此以遣前佩有在此不在彼也莊子曰君子有其道者未必為其服也魯國儒者一人而已此孔子也寸用五五數之變不可勝窮也故曰五寸之矩盡天下之方慈湖楊氏曰至矣哉象環之無聲乎佩無聲之象環後學莫之曉也嗚呼至矣舉天下之所共視而莫之見也舉天下之所共聽而莫之聞也金華范氏曰自古之君子必佩玉止綦組綬佩玉之節君子比德於玉言古見其所自來非一日先聖王所以成德􅃀乎其不可拔也人之常情警省於内者或肆於外矯揉於外者或踰於内今行鳴佩玉其在内如此車聞鸞和其在外如此蓋禮樂未嘗斯湏去身也此一段論佩玉忽參以在車一語有㫖哉蓋比德工夫與成德節奏表裏純固内外洞徹冝非辟之心無自而入也不然針芒冩氣隙豈在大毫釐不謹斯須間斷得以汨其聦明亂其純一殆恐竢間而入者日引月長不勝其可慮矣此非有法家拂士之啓告也其容體比於禮其節比於樂乃爾古之君子動容周旋不勉而中豈自外來邪德佩之結不敢與君比德也齊之結也不敢散其純一之志精明之德也況敢聽樂乎古之君子必佩玉何也為其於玉比德也有天子之禮有世子之禮有公侯大夫士之禮非可以㮣言也君子無故玉不去身而君在不佩玉者不敢以德自居也不敢示德亦德之至也齊之結喪之去以故而不佩也去喪無所不佩德不可須㬰離也德有不同用亦隨異此公侯至士所以有别也此篇以玉藻名藻之玉在冕頭之容也佩之玉在帶身之容也無徃而非比德也言古明先王之制禮言必見百王之不可違也童子之節也緇布衣錦縁錦紳并紐錦束髪皆朱錦也鄭氏曰童子未冠之稱也冠禮曰將冠者采衣紒也孔氏曰自此至而入一節論童子之儀唯有肆束及帶一經爛脱厠在其間童子之節謂童稚之子未成人之禮節也用緇布為衣尚質故也用錦為緇布衣之縁又紳帶及約帶之紐皆用錦并以錦為緫而束髮其錦皆用朱色之錦童子尚華示將成人有文德一文一質之義也長樂陳氏曰童子之帶非必全錦也錦紳而已錦紳非以其有備成之文也親在致飾而已嚴陵方氏曰始生而蒙故布以緇含德未𤼵故錦以朱禮記集説卷七十六
