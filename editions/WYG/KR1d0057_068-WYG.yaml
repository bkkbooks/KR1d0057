body:
  text: 禮記集説卷六十八宋衛湜撰周人尚臭灌用鬯臭鬱今鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌鄭氏曰灌謂以圭瓚酌鬯始獻神也已乃迎牲於庭殺之天子諸侯之禮也既奠謂薦孰時也特牲饋食所云祝酌奠於鉶南是也蕭薌蒿也染以脂合黍稷燒之詩云取蕭祭脂羶當為馨聲之誤也奠或為薦孔氏曰周禮變於殷故先求隂尚臭也臭為鬯氣未殺牲先酌鬯酒灌地以求神是尚臭也鬱鬱金草也鬯謂鬯酒煑鬱金草和之其氣芬芳調鬯也又以擣鬱汁和合鬯酒使香氣滋甚故云鬱合鬯也鄭註鬱人云鬱金香草宜以和鬯用鬱鬯灌地是用臭氣求隂達於淵泉也以圭璋為瓚之柄瓚所以㪺鬯也玉氣潔潤灌用玉瓚亦求神之宜也玉氣亦是尚臭也周言用玉則殷不用圭瓚既灌然後迎牲者先求神後迎牲也灌是先致氣於隂故云致隂氣也蕭合黍稷周人後求陽也取蕭草及牲脂膋合黍稷燒之此謂饋食時以臭氣求陽達於牆屋也故既奠然後焫蕭合羶薌者明上焫蕭之時節也既奠謂堂上事尸竟延尸户内更從孰始也於薦熟時祝先酌酒奠於鉶羮之南訖尸未入於是又取香蒿染以腸間脂合黍稷燒之於宫中此又求陽之義也馨香謂黍稷也長樂陳氏曰鬱合鬯臭隂達於淵泉以形魄歸於地而求諸隂也蕭合黍稷臭陽達於牆屋以魂氣歸於天而求諸陽也祭祀君與夫人所以自盡者也故君灌以圭夫人灌以璋君迎牲夫人奠盎記言灌以圭璋用玉氣也既灌然後迎牲既奠然後焫蕭是迎牲奠盎皆在既灌之後而焫蕭又在既奠之後則灌求神之始也而焫蕭次之迎牲奠盎事神之始也而獻薦次之求諸隂而事之猶以為未又求諸陽而致曲焉則神其不格乎設燔燎羶薌見以蕭光則羶膟膋之氣也薌黍稷之氣也蕭合膟膋黍稷而燔燎之在朝事之節而朝事之初有迎牲奠盎之禮則祭義郊特牲之文雖殊其事一也盖迎牲而刲之則血毛告於室以示其幽全膟膋焫於堂以達其臭氣而羮定之所詔又在其後不然不足謂之尚臭也鄭康成以祭義所言為朝事之焫蕭以郊特牲所言為饋食之焫蕭禮書嚴陵方氏曰鬱鬯二者皆味也則其為臭隂而已故能達於淵泉淵泉以言其幽也灌以圭璋謂君灌以圭瓉后灌以璋瓉也見明堂位解玉之為氣如白虹則潔之至也能交三靈而通之亦以其氣之潔而已故祭祀每用焉迎牲之禮固已重矣而在既灌之後則以致氣為先故也蕭黍稷三者皆氣也則其為臭陽而已故能達於牆屋以言其顯羶者天産之臭染蕭以膟膋故言羶合蕭以黍稷故言薌馬氏曰殷人既尚聲周人從而文之故尚臭臭氣也而氣有隂陽之别周人尚臭灌用鬯臭所以致隂氣也灌者禮之始而敬之至者也𫝊曰禘自既灌而往者吾不欲觀之矣又易曰觀盥而不薦推此足以知周尚臭之意也鬯者以秬黍合鬱草而為之既成然後和之以鬱金之汁蓋人之死也形魄歸於地非求諸隂不足以格其神也故臭隂達於淵泉先求諸隂也灌以圭璋用玉氣此舉其尚臭之意也既灌然後出迎牲致隂氣此舉其尚臭之時也迎牲在於祭之始而旣灌之後然後出迎牲而殺之是所以尚臭也臭隂達於淵泉以下之深者言之也臭陽達於牆屋以宗廟之所有言之也蓋魂魄具然後為人周人既以求諸隂又以求諸陽言之則知有虞氏之用氣非不用味也殷人先求諸陽非不求諸隂也謂之尚氣謂之尚聲謂之尚臭皆以始言之而其意各有主也延平周氏曰於鬱合鬯言臭隂於蕭合黍稷言臭陽何也灌雖隂中之陽而氣則下達故謂之隂煙雖陽中之隂而氣則上達故謂之陽山隂陸氏曰鬱隂也鬯陽也蕭隂也黍稷陽也玉隂中之陽欲致隂氣非此不能出脂陽中之隂欲致陽氣非此不能降淵泉虗而難窮墻屋實而難徹凡祭慎諸此魂氣歸于天形魄歸于地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂鄭氏曰此其所以先後異也嚴陵方氏曰祭所以求諸隂陽者一隂一陽皆自然之理非人為之偽也故曰凡祭慎諸此魂者氣所主故曰魂氣魄者營於形故曰形魄主者在内故言氣於魂之下營者在外故言形於魄之上人之生也受氣於天及其死也魂氣復歸於天成形於地及其死也形魄復歸於地以其歸於地也故不可不求諸隂以其歸於天也故不可不求諸陽然則聖人之為此也豈徒陳其數而已哉亦有以知其義爾故曰求諸隂陽之義也先求諸陽則尚聲故也先求諸隂則尚臭故也五聲五臭各有隂陽然聲以氣動而生故凡聲皆陽也臭以氣留而生故凡臭皆隂也以殷為求陽周為求隂則知有虞氏之尚氣亦求諸隂陽之間而已夫一祭之内氣也聲也臭也三者未嘗不兼用焉經之所言特以所尚者爾詔祝於室坐尸於堂用牲於庭升首於室直祭祝于主索祭祝于祊不知神之所在於彼乎於此乎或諸逺人乎祭于祊尚曰求諸逺者與鄭氏曰詔祝坐尸謂朝事時也朝事延尸于户西南面布主席東面取牲膟膋燎于爐炭洗肝于鬱鬯而燔之入以詔神於室又出以墮于主主人親制其肝所謂制祭也時尸薦以􅇼豆至薦孰乃更延主于室之奥尸來升席自北方坐於主北焉用牲於庭謂殺之時升首於室謂制祭之後升牲首於北墉下尊首尚氣也直祭祀于主謂薦孰時也如特牲少牢饋食之為也直正也祭以孰為正則血腥之屬盡敬心耳索求神也廟門曰祊謂之祊者以於繹祭名也於彼於此言室與堂與尚庶幾也孔氏曰下云用牲於庭升首於室故知詔祝於室當殺牲之初朝事之時也詔告也祝呪也天子諸侯朝事之時坐尸於堂户西南面坐主在西方東面尸主之前則薦用􅇼豆也祝乃取牲膟膋燎於爐炭入告神於室又出墮祭於主前謂分減肝膋以祭主前當此時王乃親洗肝於鬱鬯而燔之以制於主前制割也謂割其肝而不相離今云詔祝於室是燎於爐炭入告於室也坐尸於堂者既灌之後尸出堂坐户西而南面也上云詔祝於室次云用牲升首下云索祭以文次之故知直祭祝於主當薦孰之節薦孰正祭之時祝官以祝辭告於主若儀禮少牢敢用柔毛剛鬛用薦歳事于皇祖伯某是也索祭祝於祊者廣博求神非但在廟又為求祭於祊也祊有二種一是正祭之時既設祭於廟又求神於廟門内詩楚茨云祝祭于祊註云門内平生待賔客之處與祭同日二是明日繹祭之時設饌於廟門外西室亦謂之祊即上文云祊之于東方是也今此索祭是正祭日之祊禮器云為祊乎外以其稱外故註云明日繹祭此經不云外又下云肵之為言敬也相饗之也嘏大也毛血告幽全之物皆據正祭之日明此祊亦正祭日也不知神之所在於彼乎於此乎此解正祭在廟之時或設饌在室或設饌在堂不知神所在之處為於彼室乎為於此堂乎故兩處設饌也或諸逺人乎此解索祭為祊之時其神靈或逺離於人不在廟乎祭於祊者庶幾求於逺者與言於逺處求神也鄭註云至薦孰乃更延主於室之臭者約少牢特牲饋食在奥室也云尸來升席自北方坐於主北焉者以在奥東面以南為尊主尊故居南主既居南故尸來升席自北方也尸主各席故朝事延尸於戸外尸南面主席於東面是也鄭此註雖參禮記及少牢特牲而言之亦約漢時祭宗廟之禮故其事委曲也云謂之祊以於繹祭名也者以祊是廟門明日繹祭稱祊雖今日之正祭假以明日繹祭祊名同稱之曰祊也嚴陵方氏曰詔祝於室即血毛詔於室坐尸於堂即羮定詔於堂用牲於庭即納牲詔於庭納之將以用焉故言用升首於室即升首報陽若羊人祭祀割牲登其首直祭祝于主凡室事是也索祭祝于祊凡門事是也索即求之不曰求而曰索者以神之散無不之也彼此之間不過近人而已又疑神之逺人然不可舍是以他求也以祊在廟前之旁猶為逺而已故復祭于祊而繼之以尚曰求諸逺者與夫廟門之旁豈實為逺人乎故以尚言之馬氏曰自詔祝於室至於索祭祝于祊其言未必皆有序而詔祝於室者求之於内之深者也索祭祝于祊者求之於外之逺者也求之深求之逺蓋不知神之所在而求於此則疑於彼求於近則疑於逺而庶幾神之饗也鄭氏釋直祭祝于主謂薦孰之時謂之正祭而血腥之屬所以盡敬心蓋非是也釋索祭祝于祊以正祭日言之抑又非是也山隂陸氏曰詔祝於室坐尸於堂謂制祭時當朝踐之節鄭氏謂詔祝於室朝事延尸於户西南面布主席東面取牲膟膋燎於爐炭洗肝於鬱鬯而燔之入以詔神於室又出以墮於主主人親制其肝所謂制祭也此殷禮也鄭氏以言周禮誤矣蓋殷人制肝周人制肺殷人先求諸陽周人先求諸隂先求諸陽故朝踐時取牲膟膋燎於爐炭洗肝於鬱鬯而燔之若周人制肺雖在此時其取膟膋燎於爐炭自當饋食之節詔祝於室詔使入以詔神方是時灌事畢而朝事始矣是以詔祝坐尸當此節盖神格而後可以詔祝主設而後可以坐尸用牲於庭升首於室謂割牲時當饋食之節羊人所謂割牲登其首是也直祭祝于主謂尸未入祝而已是之謂直祭若少牢祝酌奠遂命佐食啟㑹主人西面祝祝曰孝孫某敢用柔毛剛鬛用薦歳事于皇祖伯某尚饗當此節索祭祝于祊謂尸已出祝於祊而已是之謂索祭若有司徹尸出于廟門卒暮有司徹饋饌于室中西北隅如饋之設當此節焫蕭求諸陽灌鬯求諸隂奏樂求諸天地之間以為未也故詔祝於室坐尸於堂詔祝於室求諸内也坐尸於堂求諸外也猶以為未也故用牲於庭升首於室用牲於庭求諸下也升首於室求諸上也又以為未也故直祭祝于主索祭祝于祊直祭祝于主求諸近也索祭祝于祊求諸逺也求求之而已若索索也藍田吕氏曰不知神之所徃故尚氣尚聲尚臭以求諸天地隂陽之間不知神之所在故於庭於室於堂於祊以求之不知神之所依故有主有几有尸有幣以主之不知神之所饗故肆爓腥孰三牲魚腊水草備物以祀之矣延平周氏曰所謂孝子求神非一處也祊之為言倞也肵之為言敬也富也者福也首也者直也相饗之也嘏長也大也尸陳也鄭氏曰倞猶索也倞或為諒肵者為尸有肵俎此訓也福者人君嘏辭有富此訓之也或曰福也者備也直者訓所以升首祭也直或為犆相謂詔侑也詔侑尸者欲使饗此饌也特牲饋食禮主人拜妥尸尸答拜執奠祝饗主人受祭福曰嘏長也大也此訓也尸或詁為主此尸神象當從主訓之言陳非也孔氏曰此皆訓祭祀所為之事案特牲少牢設饌後尸祭饌訖祝取牢心舌載于肵俎設于饌北尸毎食牲體反置于肵俎是主人敬尸之俎也又少牢云皇尸命工祝承致多福無疆于女孝孫使女受禄于天宜稼于田眉夀萬年勿替引之此是大夫嘏辭人君則福慶之辭更多故詩楚茨云永錫爾極時萬時億卜爾百福如幾如式是也首也者直也直正也言首為一醴之正鄭引特牲證饗尸時節尸答拜訖執此鉶南之奠祝設辭以饗之欲尸饗此奠尸遂祭與啐之是相饗之也尸嘏主人欲使長久廣大也此經尸為陳諸本尸為主尸是神象當從主嚴陵方氏曰索祭祝于祊於正祭之後而又索焉非强有力者不能如此故曰祊之為言倞也倞強也首謂升首也首犆而直支偶而曲故曰首也者直也以其直故得特達以升於室焉相謂相尸也坐則有妥食則有侑入或逆之升或延之凡為此者豈茍然哉亦心郷之而欲神饗之而已故曰相饗之也福而有嘏之義中庸言大徳之得禄夀以得其夀故長以得其禄故大故曰嘏長也大也且夀禄為五福之先故必以長大言之天保曰降爾遐福此福所謂長也楚茨曰以介景福此福所謂大也尸神象也神隱而尸陳故曰尸陳也山隂陸氏曰祊之為言倞也以為不知神之所在故又求之如此肵之為言敬以祈為在是焉敬也故曰祭如在富也者福也左傳所謂奉牲以告曰博碩肥腯奉盛以告曰潔粢豐盛奉酒醴以告曰嘉栗㫖酒是也首也者升首於室是也升首而已則以直故也亦如是而後可以直祭上思利民忠也祝史正辭信也是之謂直若民餒而君逞欲祝史矯舉以祭是有見於富無見於直故曰君雖獨豐其何福之有相饗之者相主婦也經曰既内自盡又外求助昬禮是也又曰鄉之然後能饗焉盖祀主人所自致也他人所事祭而已若饗非夫婦有不能饗亦其親或不饗也無期長也無彊大也不言言是詁也非言也爾雅曰嘏大也尸陳也在釋詁以此尸陳也故尸神象而已嘏長也大也故祝將命而已尸陳也者神無象也以尸陳之而已若神主則主之大也經言祊之為言倞也肵之為言敬也此言也富也者福也首也者直也此訓也相饗之也嘏長也大也尸陳也此詁也毛血告幽全之物也告幽全之物者貴純之道也血祭盛氣也祭肺肝心貴氣主也鄭氏曰幽謂血也純謂中外皆善氣主氣之所舍也周祭肺殷祭肝夏祭心孔氏曰毛血謂祝初薦毛血於室時也血是告幽之物毛是告全之物告幽者言牲體肉裏美善告全者牲體外色完具所以備此告幽全之物者貴其牲之純善之道也血祭是堂上制祭後又薦血腥時也肺肝心三者並為氣之宅故祭時先用之是貴氣之主也血是氣之所舍故云盛氣三者非即氣故云氣之主也嚴陵方氏曰信南山言以啓其毛取其血膋盖謂是矣幽所以告其内之純全所以告其外之純祭祀之道以純為貴觀射父曰毛以示物血以告殺又曰祝於一純二精是矣經血腥爓祭用氣也然腥爓之氣不若血之幽氣聚於幽而散於明聚則盛矣故曰血祭盛氣也夫鬼神無形也有氣而已則交之者可不盛其氣哉五行之氣在天則為五星在地則為五材在人則為五臟之氣各有所主而牲亦象之肺則金氣之所主也肝心木火氣之所主也經獨言三者則以三代之所用者言之故也延平周氏曰肺者氣之主肝者筋之主心者血之主而皆以為貴氣之主何也臟有五而位三肺心位乎上肝腎位乎下位乎上陽也位乎下隂也肝者位乎下之上而為隂中之陽陽者氣之主隂者體之主故肺肝心皆氣主也而三代祭先所用不同何也周以火徳王天下而肺臟屬金故祭先肺示火之能勝於金也殷以金徳而肝臟屬木夏以水徳而心臟屬火是三代祭先皆用五行相勝之法以順天地牲命之理也然五行相勝之法蓋起於隂陽之學果聖人制禮之意亦有取邪嘗考之於書在洪範則水先之火次之木次之金次之土又次之者生之序也在大禹謨則水先之火次之金次之木次之土又次之者乃相勝之序也推此而言雖聖人蓋有取也山隂陸氏曰告幽全之物非志也是物也凡物内幽則血善外全則毛美幽非止血也全非止毛也以毛血告之而已幽言内全言外告全物以毛告幽物以血以毛血該之凡如此意純之道也不言祭血以血名祭以血祭乃所以盛氣也血隂也氣陽也善攝生者血欲少氣欲多故下祭肺肝心則血祭有虞氏之事也有虞氏祭首亦以此夏后氏尚黑水氣之主也殷人尚白金氣之主也周人尚赤火氣之主也肺受制於火周人以火徳王而祭肺焉祭其臣於我者也祭其臣於我乃所以貴我也他放此長樂劉氏曰凡牲之博碩肥腯由血氣之盛也氣行而血從之所以盛也氣不可得而薦薦血所以盛大其氣焉故心也肝也肺也雖皆隂藏而氣以之為主故先祭之氣亦從其所主而可羞矣祭黍稷加肺祭齊加明水報隂也取膟膋燔燎升首報陽也鄭氏曰祭黍稷加肺謂綏祭也明水司烜所取於月之水也齊五齊也五齊加明水則三酒加𤣥酒也膟膋腸間脂也與蕭合燒之亦有黍稷也孔氏曰尸既坐綏祭之時祭黍稷加之以肺兼肺而祭故云加肺也正祭之時陳列五齊之尊上又加明水之尊故云祭齊加明水也肺是五藏在内水屬北方皆隂類又親形魄歸地是隂以隂物祭之故云報隂也朝踐時祝取膟膋燎於爐炭入以告神於室出以綏於主前又升首於室至薦孰時祝更取膟膋及蕭與黍稷合燒之是臭陽達於牆屋也膟膋黍稷並是陽氣之物首人是牲體亦是陽魂氣在天為陽以陽物祭之故云報陽也嚴陵方氏曰黍稷地産皆隂類也燔燎之火則司烜氏所取於日者也首者陽之體升者陽之事皆陽類也凡此皆取而祭之也上言祭下言取互相備爾詩言取蕭祭脂同義前曰求此曰報何也求主乎人之情報主乎物之理山隂陸氏曰祭黍稷加肺少牢所謂上佐食取黍稷下佐食取肺尸受同祭于豆是也祭齊加明水即此所謂明水涗齊貴新也鄭氏謂五齊加明水三酒加𤣥酒則讀加為尚之誤也經曰酒醴之美𤣥酒明水之尚報隂當朝踐之節報陽當饋食之節報隂用明水則報陽用明火可知肺内而在上首外而在上明水涗齊貴新也凡涗新之也其謂之明水也由主人之絜著此水也鄭氏曰涗猶清也五齊濁泲之使清謂之涗齊及取明水皆貴新也周禮㡛氏以涗水漚絲涗齊或為汎齊新之者敬也著猶成也言主人齊絜此水乃成可得也孔氏曰設明水及涗齊貴新絜之義所以涗此齊者以敬於鬼神故新潔之也嚴陵方氏曰明水涗齊即上所言祭齊加明水是矣涗則和之也以齊之濁故加水之清焉濁則故清則新故曰貴新也非特此而已若醆酒涗于清汁獻涗于醆酒之類亦皆貴其新焉故曰凡涗新之也明水謂之明固以取之於月又由主人之潔誠著見於此水蓋汙則暗潔則明也延平周氏曰周官司尊􅃔之職謂鬱齊獻酌醴齊縮酌及盎齊涗酌以五齊清濁次之則泛齊醴齊同用縮酌而緹齊沈齊與盎齊同用涗酌此言明水涗齊蓋自盎而下三齊也涗者以水而和之觧之也和觧之則新矣貴新故不嫌於味之薄也山隂陸氏曰齊盎齊也盎齊涗酌凡涗新之也蟬捨卑穢趨髙謂之蛻蓋亦如此夫祭祀所為貴者何耶亦曰貴純貴新而已内外如一純也始終如一新也由主人之潔著此水言茍主人不蠲雖取日月之氣不得為明故曰是誠在我者也君再拜稽首肉􅃝親割敬之至也敬之至也服也拜服也稽首服之甚也肉袒服之盡也鄭氏曰割解牲體孔氏曰再拜稽首肉袒是㳟敬之至極恭敬之至極乃是服順於親也嚴陵方氏曰􅃝則肉露故謂之肉􅃝所以致親割之勞割謂割牲以人君之尊而服勞如此所以為敬之至服屈服於神故曰敬之至也服也詩言勿翦勿拜而以拜為屈故曰拜服也拜下兩手而已稽首則首至地焉故曰稽首服之甚也首雖至地又未若肉袒之勞焉故曰肉袒服之盡也延平周氏曰以天子不可屈之勢而為之稽首肉􅃝則天下莫不知有尊而亦莫不知有親也蓋先王設敎之意常寓於甚微之間山隂陸氏曰凡祭稽首不必肉袒肉袒不必稽首兼之者此歟蓋朝踐以前以素為貴父子之事多饋食以後以文為貴君臣之事多服臣之事也非子之事也祭稱孝孫孝子以其義稱也稱曽孫某謂國家也祭祀之相主人自致其敬盡其嘉而無與讓也鄭氏曰孝孫孝子謂事祖禰曽孫某謂諸侯事五廟也於曽祖以上稱曽孫而已相謂詔侑尸也嘉善也孔氏曰義宜也事祖禰宜孝是以義而稱孝子國謂諸侯家謂卿大夫既有國家之尊不但祭祖禰而已更祭曽祖以上惟稱曽孫言已是曽重之孫也案熊氏曰祭稱孝孫對祖為言稱孝子對禰為言經既稱國家則兼諸侯及大夫鄭註直言諸侯而不及大夫者畧也庾氏曰賔主之禮相告以揖讓之節祭祀之禮則是主人自致其敬盡其善故詔侑尸者不告尸以讓是其無所與讓也嚴陵方氏曰稱孝孫孝子者以示子孫得四海之歡心也稱曽孫某者以示國家非一世之積累也人之行莫大於孝自稱以此則疑於自矜祭而稱之且無所嫌者則有義存焉耳故曰以其義稱也稱曽孫以示國家非一世之積故曰謂國家也某則名之也於曽孫曰某則孝孫孝子從可知矣然其序先孫而後子者對祖禰稱之故也山隂陸氏曰案少牢饋食曰孝孫某則祭稱孝子孝孫名今畧之某之名外也外事稱曽孫某故曰謂國家也據告于皇天后土所過名山大川曰惟有道曽孫周王𤼵相主婦也故曰盡其嘉而無與讓也是之謂夫婦親之讓賔客之事也嘉夫婦之事也腥肆爓腍祭豈知神之所饗也主人自盡其敬而已矣鄭氏曰治肉曰肆腍孰也爓或為䐲孔氏曰肆剔也言祭或進腥體或薦觧剔或進湯沈或薦煑孰四種之薦豈知神適所饗即正是主人自盡敬心求祭之心不一耳嚴陵方氏曰凡牲解而生之之謂腥體而陳之之謂肆爚而未腍之謂爓孰而為殽之謂腍孰謂之腍若禾之稔故也由主人内盡其敬外盡其物也舉斚角詔妥尸古者尸無事則立有事而后坐也尸神象也祝將命也鄭氏曰妥安坐也尸始入舉奠斚若奠角将祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也天子奠斚諸侯奠角古謂夏時也孔氏曰斚角爵名也饋食薦孰之時尸未入祝先奠爵于鉶南尸入即席而舉之如特牲禮隂厭後尸入舉奠焉也詔告也尸始即席舉奠斚角之時未敢自安祝當告主人拜尸使尸安坐是詔妥尸也古夏時也夏立尸唯有飲食之時乃坐若無事則􅀝立由世質故耳尸是神象故無事則立有事而後坐也祝以𫝊達主人及神之辭命嚴陵方氏曰斚先王之爵也天子用焉角時王之爵也諸侯用焉周官鬱人之大祭祀與量人受斚之卒爵而飲之蓋言是矣詔妥尸即士虞禮所謂主人及祝拜妥尸尸拜遂坐是矣蓋尸於主人則子行也以卑臨尊嫌或不安焉為是詔之也詩言以妥以侑是矣必於時乃詔之者以尸始入舉奠故也尸於無事之時則子行而已子行為卑故立至於有事之時則神象也神象為尊故坐有事謂若舉斚角之類也禮器言夏立尸而卒祭是矣至周文備豈復然哉故曰七日戒三日齊承一人焉以為尸過之者趨走其敬如是固不以子行無事則立也見乃謂之象神𨼆而尸陳以其陳者見於隱者故曰尸神象也將命於祭祀之間以交神人者祝也將命於燕饗之間以交賔主者介也此主祭祀言之故曰祝將命也禮運曰祝以孝告嘏以慈告兹非將命乎山隂陸氏曰鄭氏謂天子舉斚諸侯舉角凡祭祀灌獻用斚齊用醆酒用爵知然者以春秋𫝊瓘斚玉瓉盎齊一名醆酒知之也斚以灌也灌非以飲也以厯而已所謂爵人受斚歴而皆飲之以此然則舉斚角詔妥尸當灌獻之節妥尸蓋在初入即席之時冝在祼前先儒謂在饋食時此讀儀禮之誤也蓋少牢特牲無朝踐饋獻故妥尸在酳尸前若祭自祼始尸即席久矣不應至饋食始詔安坐也尸是象而已其所謂神在彼不在此也祝将命也其所以命之主人也縮酌用茅明酌也醆酒涗于清汁獻涗于醆酒猶明清與醆酒于舊澤之酒也鄭氏曰縮酌用茅謂泲醴齊以明酌也周禮曰醴齊縮酌五齊醴尤濁和之以明酌泲之以茅縮去滓也春秋𫝊曰爾貢包茅不入無以縮酒明酌者事酒之上也名曰明者事酒今之醳酒皆新成也酌猶斟也酒已泲則斟之以實尊􅂜昬禮曰酌𤣥酒三注于尊凡行酒亦為酌也醆酒涗于清謂泲醆酒以清酒也醆酒盎齊盎齊差清和之以清酒泲之而已泲盎齊必和以清酒者皆久味相得汁獻涗于醆酒者泲秬鬯以醆酒也獻讀當為莎秬鬯者中有煑鬱和以盎齊摩莎泲之出其香汁因謂之汁莎不以三酒泲秬鬯者秬鬯尊也猶若也澤讀為醳舊醳之酒謂昔酒也泲醴齊以明酌泲醆酒以清酒泲汁獻以醆酒天子諸侯之禮也天子諸侯禮廢時人或聞此而不審知云若今明酌清酒與醆酒以舊醳之酒泲之矣就其所知以曉之也泲清酒以舊醳之酒者為其厚味腊毒也孔氏曰此記人緫釋周禮司尊􅂜泲二齊及鬱鬯之事縮泲也酌是斟酌謂醴齊既濁泲而後可斟酌故云縮酌也欲泲醴齊時先用明酌和此醒齊然後用茅泲之周禮三酒一曰事酒二曰昔酒三曰清酒三酒之中事酒尤濁五齊之内醴齊尤濁醆酒清於醴齊清酒又清於事酒故鄭知以事酒泲醴齊明謂清明故知事酒之上清明者也事酒謂為事而新作者醳是和醳醖釀之名即今卒造之酒故鄭云皆新成也引春秋𫝊者僖四年左𫝊文醆酒涗于清者涗泲也泲謂泲漉也盎齊差清先和以清酒而後泲之不用茅也周禮云盎齊涗酌又醴齊後有盎齊禮運醴後有醆故鄭知醆謂盎齊盎齊既清作之必久清酒又冬釀接夏而成故鄭云久味相得也此記不言五齊獨舉醴盎二齊者以司尊􅂜説時祭二齊三酒與鬱故此記者釋之獻謂摩莎既以事酒泲醳齊清酒泲盎齊則泲秬鬯應亦用三酒令乃用盎齊者秬鬯尊故用五齊泲之五齊卑故用三酒泲之事相宜也古禮廢亡恐人不知泲醴齊以明酌泲醆酒以清酒泲汁莎以醆酒之意故記者云泲醴齊之等猶若今時明清醆酒泲於舊醳之酒也就今日所知以曉古者難知之事明謂明酌清謂清酒醆酒謂盎齊舊醳謂昔酒作記之時以昔酒和此明酌清酒等三者而泲之也舊醳之酒作雖久成比清酒為薄故用泲此清酒清酒冬釀夏成其味厚也國語曰厚味實腊毒長樂陳氏曰茅之為物柔順潔白可以施於禮者也故古者藉祭縮酒之類皆用焉禹貢荆州包匭菁茅甸師祭祀供蕭茅鄉師大祭祀共茅蒩司巫祭祀共蒩館則茅有貢於方國者有共於甸師者甸師之茅有入之鄉師有入之司巫則鄉師之所共者大祭祀也司巫之所共者凡祭祀也孔子曰茍錯諸地而可矣藉之用茅何咎之有則茅不特藉祭而已士虞禮苴刌茅長五寸束之實于篚饌于西坫上祝升取苴降洗之升入設于几東席上東縮佐食取黍稷祭于苴三取膚祭祭如初此特藉祭者也司尊􅂜醴齊縮酌記曰縮酌用茅明酌也縮然後酌則其縮不必束而立之祭前鄭大夫甸師註謂束而立之祭前沃酒其上酒滲而下若神飲鄭康成士虞禮註謂將納户以事其親為神起於其位故設苴以定之其說皆不可攷男巫望祀望衍旁招以茅國語置茅蕝設表望公羊曰鄭伯左執茅旌何休謂斷之曰藉不斷曰旌宗廟之中以迎道神指䕶祭者然則茅之所用豈一端哉故可以幂鼎可以御柩雜記或菹以為豆實或包以通好問或索綯以備民用此茅所以可重也士虞有苴特牲少牢吉祭無苴而司巫祭祀共菹館則凡王祭祀有苴矣賈公彦謂天子諸侯尊者禮備於理或然禮書嚴陵方氏曰周官司尊􅂜鬱齊獻酌醴齊縮酌盎齊涗酌王氏謂酌以茅縮而後酌也涗酌以酒涗而後酌也鬱齊不縮也獻之而已故曰涗酌此言縮酌用茅即醴齊縮酌是也縮謂泲去滓也與盈縮之縮同字者有所取則盈有所去則縮故也酌謂酌取酒以獻也必用茅者以茅之為物潔白順直祭祀之徳欲如此故也縮之清而明故曰明酌尊也周禮曰盎齊此曰醆酒何也盎以所造之器言醆以所酌之器言汁獻涗于醆酒即鬱齊獻酌是也以煑鬱金汁和之故曰汁以獻之而不縮故曰獻汁言其物也獻言其事鬱齊用灌亦曰獻者以居九獻之首故通謂之獻祭統曰獻之屬莫重於灌醴齊必縮之者以其尤濁故必縮去其滓也醆酒不若醴齊之濁故以清酒涗之而已汁獻尤不若醴齊之濁故以醆酒涚之而已涗之亦明矣然不若縮之為尤明故於用茅言明酌也前言凡涗新之豈非以明故新與然齊酒不止於此三者以裸事用鬱齊朝事用醴齊饋食用盎齊尊彛之所實宗廟之所用常杞不過於此故經指是言之此皆古禮後世以舊醳之酒涗清酒醆酒而明之其制雖異其理則同故曰猶明清與醆酒於舊醳之酒也雖然此以舊酒涗之則失先王貴新之意矣取其明之之意可矣延平周氏曰周官酒正之職辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊司尊􅂜之職謂鬱齊獻酌醴齊縮酌盎齊涗酌蓋醴齊與泛齊則為濁故為縮酌即此所謂縮酌用茅者也謂之明酌者凡物之濁則昬清則明醴齊以其濁故縮之縮之則差清差清則明是以謂之明酌也盎齊而下至涗齊則為少清而無待於縮以茅惟涗之而已故為涗酌即此所謂醆酒涗于清者也清乃三酒之一也然所謂鬱齊獻酌何也鬱齊之味尤為薄而尤非人之所可飲但著之而已故為獻酌即此所謂汁獻涗于醆酒者也而必涗于醆酒者蓋汁獻之味薄於醆酒故以醆酒涗之其猶醆酒之味薄於清酒而以清酒涗之也然言明水涗齊則盎齊而下涗用明水而從其味之薄此言醆酒涗于清則盎齊而下必從其味之厚者何也用明水所以反本反本所以致神道而用清酒所以趨時趨時所以致人道也山隂陸氏曰縮酌醴齊也以茅縮之而後酌茅明也故謂之明酌醆酒盎齊也以挹之在醆故謂之醆酒以涗之在盎故謂之盎齊知然者以宗婦執盎從夫人薦涗水知之也且方涗之以水是齊而已凡盎言齊以此及涗于清然後謂之醆酒汁獻鬯齊也謂之汁汁隂陽之和也月令曰天時雨汁祭有祈焉有報焉有由辟焉鄭氏曰祈猶求也謂祈福祥求永貞也報謂若穫禾報社由用也辟讀為弭謂弭災兵逺罪疾也孔氏曰有報焉者謂獲福而報之嚴陵方氏曰欲彼之有予也故有祈以求之若噫嘻祈穀于上帝載芟之祈社稷之類是也因彼之有施也故有報以反之若豐年之秋冬報良耜之秋報社稷是也慮彼之有來也故有辟以去之若月令之磔攘開冰而用桃弧棘矢以辟去不祥之類是也於辟又言由者以非祭之常禮或有所以而用之故也然禮器言祭祀不祈者彼之所言蓋為己耳此之所言主為民也山隂陸氏曰有祭而由之有祭而辟之由若祭門之類辟若祭厲之類延平周氏曰祈也報也人情之所不能免者聖人有以節文之也齊之𤣥也以隂幽思也故君子三日齊必見其所祭者鄭氏曰齊三日思其居處思其笑語思其志意思其所樂則見之也孔氏曰解齊服所以用𤣥衣𤣥冠義也𤣥隂色鬼神尚幽隂故齊者𤣥服以表心思幽隂之理所祭者謂親也嚴陵方氏曰凡物之理隂則静陽則動幽則深淺則明天機之動不足以守静天機之淺不足以極深而哀樂欲惡貳其心矣豈所以致其思哉故必貴乎以隂幽也君子之服象其徳齊之服其色若是豈不宜哉故君子三日齊必見其所祭者以其静而深故也為神而齊必見其所祭之神為鬼而齊必見其所祭之鬼山隂陸氏曰凡祭大事以𤣥冕小事以𤣥端鄭氏謂以裘冕祭者以衮冕齊以衮冕祭者以鷩冕齊非是此篇始言貴誠之意故以齊終也故曰誠者物之終始不誠無物延平周氏曰𤣥者天道在北方之色而隂雜之也天道在北方則寂然不動寂然不動則無思也然亦不能無思故齊之服𤣥衣𤣥冕從其以隂幽而思也禮記集說卷六十八
