body:
  text: 禮記集説卷一百二十七宋衛湜撰君子之道費而隠夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉詩云鳶飛戾天魚躍于淵言其上下察也君子之道造端乎夫婦及其至也察乎天地鄭氏曰與讀如賛者皆與之與憾恨也天地至大無不覆載人尚有所恨況於聖人能盡備之乎語猶説也所説大事謂先王之道所説小事謂若愚不肖夫婦之知行也察猶著也言聖人之徳至于天則鳶飛戾天至于地則魚躍于淵是其著明於天地也孔氏曰賛者皆與冠禮文天地如冬寒夏暑人猶有怨莫能載者天下之人無能勝載之者莫能破者言似秋毫不可分破也聖人之徳上至於天則鳶飛戾天是翺翔得所下至於地則魚躍于淵是游泳得所言聖人之徳上下明察此大雅旱麓美文王之詩今文鳶飛喻惡人逺去魚躍喻善人得所此引斷章與詩義殊君子行道初始造立端緒起於匹夫匹婦所知所行及其至極之時明察於上下天地也河南程氏曰費日用處伊川問聖人亦何有不能不知也曰天下之理聖人豈有不盡者盖於事有所不徧知不徧能也至纎悉委曲處如農圃百工之事孔子亦豈能知哉伊川又曰鳶飛魚躍言其上下察也此一叚子思喫𦂳為人處與必有事焉而勿正之意同活潑潑地㑹得時活潑潑地㑹不得只是弄精神又曰鳶飛戾天向上更有天在魚躍于淵向下更有地在明道横渠張氏曰君子之道費而隱費日用隠不知也匹夫匹婦可以與知與行是人所常用故曰費及其至也雖聖人有所不知不能是隠也聖人若夷惠之徒亦未知君子之道若知君子之道亦不入於偏又曰君子之道達諸天故聖人有所不能夫婦之知淆諸物故聖人有所不與又曰戾天則極髙躍淵則極深君子之道天地不能覆載又曰此言物各得其所上者安於上下者安於下是上下察盡也藍田吕氏曰此已上論中此已下論庸此章言常道之終始費用之廣也隱㣲密也費則常道隠則至道唯能進常道乃所以為至道天地之大亦有所不能故人猶有憾況聖人乎天地之大猶有憾語大者也有憾於天地則大於天地矣此所以天下莫能載愚不肖之夫婦所常行語小者也愚不肖所常行雖聖人亦有不可廢此所謂天下莫能破上至乎天地所不能下至於愚不肖之所能則至道備矣自夫婦之能至察乎天地則常道盡矣一本云庸者常道也費用也隐不用也用者顯著而易知不用者㣲密而難知易知者易能難知者難能盖易知易能者常道也難知難能者至道也音者瞽矇之所及知味者饔人之所及知及其至也雖聖人之知而知音知味不如師曠易牙之精故堯舜之知不徧愛物孔子自謂不如老農老圃此聖人亦有所不知者也見孺子將入井人皆有怵惕惻隠之心呼蹴而與之行道之人皆所不屑及其至也充不忍人之心充無受爾汝之實則愽施濟衆堯舜其猶病諸君子之道四孔子自謂未能此聖人亦有所不能者也聖人亦有所不知語小者也知音知味為農為圃雖小道也専心致意亦能貫乎至理造於精㣲周天下之用而不可闕此天下所莫能破也聖人亦有所不能語大者也天地之大人猶有所憾則道固大於天地矣聖人盡道財成輔相以賛天地之化育合乎天地人而無間此天下所莫能載也鳶飛於上魚躍於下上下察之至者也愚不肖之夫婦可以與知可以能行則常道盡矣此所以謂造端乎夫婦者也孝弟之至通乎神明光乎四海無所不通則至道成矣此所謂及其至也察乎天地者也上蔡謝氏曰鳶飛戾天魚躍于淵非是極其上下而言盖真箇見得如此此正是子思喫𦂳道與人處若從此解悟便可入堯舜氣象又曰鳶飛戾天魚躍于淵無些私意上下察以明道體無所不在非指鳶魚而言也若指鳶魚言則上靣更有天下面更有地在知勿忘勿助長則知此知此則知夫子與㸃之意又曰詩云鳶飛戾天魚躍于淵猶韓愈所謂魚川泳而烏雲飛上下自然各得其所也詩人之意言如此氣象周王作人似之子思之意言上下察也猶孟子所謂必有事焉而勿正察見天理不用私意也故結上文云君子語大天下莫能載語小天下莫能破今人學詩章句横在肚裏怎生得脱洒去建安游氏曰道之用贍足萬物而萬物莫不資焉故言費其本則視之不見聼之不聞故曰隠猶言肆而隠也唯費也則良知良能所自出故夫婦之愚不肖可以與知而能行焉唯隠也則非有思者所可知非有為者所可能故聖人有所不知不能焉盖聖人者徳之盛而業之大者也過此以往則神矣無方也不可知無體也不可能此七聖皆迷之地也天地之大人猶有所憾者則祁寒暑雨之失中故也君子之道無往而非中也其大無外而中無不周故天下莫能載其小無閒而中無不足故天下莫能破上極于天下蟠於淵中無不在也故上下察是道也以為髙逺邪則造端乎夫婦以為卑近邪則察乎天地孝經曰事父孝故事天明事母孝故事地察盖事父母之心雖夫婦之愚不肖亦與有焉及其至也天地明察神明彰矣則雖聖人之徳又何以加此此中庸所以為至也延平楊氏曰道者人之所日用也故費雖曰日用而至賾存焉故隠盖自可欲之善至充實輝光之大致知力行之積也大而化之至於不可知之神則非知力所及也徳盛仁熟而自至焉耳故及其至也聖人有所不知不能焉又曰祁寒暑雨之變其機自爾雖天地之大不能易其節也大道之不可能也如是而人雖有憾焉道固自若也故下文申言之又曰大而無外天下其孰能載之小而無倫天下其孰能破之道至乎是則天地之大萬物之多皆其分内耳故曰鳶飛戾天魚躍于淵言其上下察也鳶飛魚躍非夫體物而不遺者其孰能察之雖然其端豈逺乎哉始於夫婦之愚不肖與知能行者而已故又曰君子之道造端乎夫婦及其至也察乎天地河東侯氏曰前章言唯聖者能之子思恐學者以謂中者之道極乎髙深不可及而止也故又曰君子之道費而隠皆日用之事雖夫婦之愚不肖亦能知之亦能行之及其至則雖聖人亦有所不知不能焉謂其不能者非聖人不能於此力有所不逮也如孔子問禮於老􅆅訪官名於郯子謂異世之禮制官名之因革所尚不同不可强知故也又如聖而不可知之神大徳祿位名夀舜之必得而孔子不得又如博施濟衆修己以安百姓欲盡聖人溥博無窮之心極天之所覆極地之所載無不被其澤者雖堯舜之仁亦在所病也又如民可使由之不可使知之日用之費民固由之矣其道中庸則安能人人知之雖使堯舜之為君周孔之為臣所過者化所存者神立之斯立道之斯行綏之斯來動之斯和其化者不越所過者爾又安能使窮荒極逺未綏未動未過者皆化哉此亦聖人之所不能也新安朱氏曰此第十二章子思之言盖以申明首章道不可離之意也其下八章雜引孔子之言以明之費用之廣也隠體之㣲也君子之道近自夫婦居室之間逺而至於聖人天地之所不能盡其大無外其小無内可謂費矣然其理之所以然則隠而莫之見也盖可知可能者道中之一事及其至而聖人不知不能則舉全體而言聖人固有所不能盡也人所憾於天地如覆載生成之偏及寒暑災祥之不得其正者鳶鴟類戾至也察著也子思引此詩以明化育流行上下昭著莫非此理之用所謂費也然其所以然者則非見聞所及所謂隠也又曰道之用廣而其體則㣲密而不可見所謂費而隠也即其近而言之男女居室人道之常雖愚不肖亦能知而行之極其逺而言之則天下之大事物之多聖人亦容有不盡知盡能者也然非獨聖人有所不知不能也天能生覆而不能形載地能形載而不能生覆至於氣物流行則隂陽寒暑吉凶災祥不能盡得其正者尤多此所以雖以天地之大而人猶有憾也夫自夫婦之愚不肖所能知行至於聖人天地之所不能盡道盖無所不在也故君子之語道也其大至於天地聖人所不能盡而道無不包則天下莫能載矣其小至於夫婦之愚不肖所能知能行而道無不體則天下莫能破矣道之在天下其用之廣如此可謂費矣而其所用之體則不離乎此而有非視聼之所及者此所以謂費而隠也子思之言至此極矣然猶以為不足以盡其意也故又引詩以明之曰鳶飛戾天魚躍于淵所以言道之體用上下昭著而無所不在也造端乎夫婦極其近小而言也察乎天地極其逺大而言也盖夫婦之際隠㣲之間尤見道之不可離處知其造端乎此則其所以戒慎恐懼之實無不至矣易首乾坤而重咸恒詩首闗雎而戒淫佚書記釐降禮謹大昬皆此意也又曰諸説如程子至矣張子以聖人為夷恵之徒既已失之又曰達諸天淆諸物聖人所不知所不與則又析其所不知不為而兩之皆不可曉也已曰諸家以夫婦之能知能行者為道之費聖人之所不知不能而天地有憾者為道之隠其於文義恊矣若從程子之説則使章内専言費而不及隠恐其有未安也曰謂不知不能為隠似矣若天地有憾鳶飛魚躍察乎天地而欲亦謂之隠則恐未然且隠之為言正以其非言語指陳之可及耳故獨舉費而常黙具乎其中若於費外别有隱而可言則已不得為隠矣程子之云又何疑邪曰然則程子所謂鳶飛魚躍子思喫𦂳為人處與必有事焉而勿正心之意同活潑潑地者何也曰道之流行發見於天地之間無所不在在上則鳶之飛而戾于天者此也在下則魚之躍而出乎淵者此也其在人則日用之間人倫之際夫婦之所知所能而聖人之所不知不能者亦此也此其流行發見於上下之間者可謂著矣子思於此指而言之唯欲學者於此黙而識之則為有以洞見道體之妙而無疑而程子以為子思喫𦂳為人處者正以示人之意為莫切於此也其曰與必有事焉而勿正心之意同活潑潑地則又以明道之體用流行發見充塞天地亘古及今雖未嘗有一毫之空闕一息之間斷然其在人而見諸日用之間者則初不外乎此心故必此心之存而後有以自覺也必有事焉而勿正心活潑潑地亦曰此心之存而全體呈露妙用顯行無所滯礙云爾非必仰而視乎鳶之飛俯而觀乎魚之躍然後可以得之也抑孟子此言固為精密然但為學者集義養氣而發耳至於程子借以為言則又以發明學者洞見道體之妙非但如孟子之意而已也盖此一言雖若二事然其實則必有事焉半詞之閒已盡其意善用力者苟能於此超然黙㑹則道體之妙已躍如矣何待下句而後足於言邪聖賢特恐學者用力之過而反為所累故更以下句解之欲其雖有所自而不為所累耳非謂必有事焉之外又當别説此念以為正心之防也又曰吕氏分此已上論中以下論庸又謂費則常道隠則至道恐皆未安謝氏既曰非是極其上下而言矣又曰非指鳶魚而言盖曰子思之引此詩佑借二物以明道體無所不在之實非以是為窮其上下之極而形其無所不包之量也又非以故二物專為形其無所不在之體而欲學之者必觀乎此也此其發明程子之意盖有非一時同門之士所得聞者而又别以夫子與㸃之意明之則其為説益以精矣但所謂察見天理者恐非本文之訓而於程子之意亦未免小失之耳游氏之説其不可曉者尤多如以良知良能之所自出為道之費則良知良能者不得為道而在道之外矣又以不可知不可能者為道之隠則所謂道者乃無用之長物而人亦無所頼於道矣所引天地明察似於彼此文義兩皆失之至於所謂七聖皆迷之地則莊生邪遁荒唐之語尤非所以論中庸也楊氏以大而化之非知力所及為聖人不知不能以祁寒暑雨雖天地不能易其節為道之不可能而人所以有憾於天地則於文義既有所不通而又曰人雖有憾而道固自若則其失愈逺矣其曰非體物而不遺者其孰能察之其用體字察字又皆非經文之正意也大抵此章若從諸家以聖人所不知不能為隠則其為説之弊必至於此而後己嘗試循其説而體騐之若有以使人神識飛揚眩瞀迷惑而無所底止子思之意其不出此也必矣唯侯氏不知不能之説最為明白但所引聖而不可知者孟子本謂人所不能測耳非此文之意也其他又有大不可曉者亦不足深論也又語錄曰子思言鳶飛魚躍與孟子言勿忘勿助長此兩處語意各自别後人因程子此兩處皆是喫𦂳為人處只管去求他同處遂至牽合永嘉周氏曰嗚呼中庸之難能也而亦不可以苟為也或者曰道易知也吾殫聰明以審之道不過乎仁義禮樂而已曰仁義禮樂是道之用非吾所謂道也或者曰道易行也吾盡心力而為之道不過乎君臣父子夫婦兄弟朋友之交而已曰君臣父子夫婦兄弟朋友之交是道之所寓非吾所謂道也吾之所謂道者體之一心無不足施之天下為有餘沛然行乎仁義禮樂之塗君臣父子夫婦兄弟朋友之閒而不亂然而吾不自知焉非特不自知焉則亦無所知焉故子思之論至所言君子之道費而隠則曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉愚讀中庸至此卷伏而思之盖始而疑中而知終而覺然後知子思果知道也果不吾欺也其至也果不可以知也豈不謂大而能化與道一體而不吾知也世之論者或以謂道之至聖人實有所不知君子則曰百工之事各有其至而聖人盖有所不知者是皆過不及之論也夫道之至雖聖人有所不得知是果不可以知也道而不可以知然則人安取夫道哉是以道為虚名不可為之事而自棄者之論若子思論中發其大義至於語聖人又止區區論其百工之事抑何淺期子思哉是又不及之論也中庸之書語道之要學者宜以志慮考之不疑於其間不察其奥而唯迹之窮猥與塵編斷簡俱腐至於老死而不能一言悲哉嚴陵方氏曰知之者存乎知故於夫婦曰愚行之者存乎才故於夫婦曰不肖以道則雖小猶為有餘以形則雖大猶為不足有餘則無不慊不足則有所憾所謂天地者亦以形言之而已故曰天地之大也人猶有所憾素問曰天不足西北地不滿東南此天地之形有所不足也書曰夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨此人猶有所憾也惟君子為能出乎形而入乎道又何憾之有凡有量者皆可載凡有質者皆可破君子之道顯諸仁則充實光輝至大不可圉豈復有量哉此語大所以天下莫能載也藏諸用則㣲妙無迹至精無形豈復有質哉此語小所以天下莫能破也然道之為物方其小也未嘗不大方其大也未嘗離小君子體之衆人觀之乃强為事名爾故每以語稱之山隂陸氏曰夫道不言而足故凡有言皆費也雖費君子有不得已也費故可以與知焉隠故雖聖人有所不知聖人無所不覺有所不知鳶飛戾天有見於上魚躍于淵有見於下温陵陳氏曰此一章最切吾體中庸之道只在日用之間而不可他求雖在日用之間而有至㣲至妙之理焉及其至也一語指道之極處言也極處即中也在書為皇極在禮為中庸若過與不及便非中矣今俗學以聖人有所不知有所不能驅駕太髙謂人皆不可企及遂分聖賢為等級初不知聖人豈有絶人為道之路至者無欠無餘也聖人盖知之以不知能之以不能也學者功用在於察之一字孟軻云習矣而不察習堯舜文王之道苟不致察則為楊為墨矣盖有似是而非如章子之孝仲子之廉尾生之信固當致察察之者視之詳也舜能致其察故能執其中顔子能致其察至於問仁則有請事斯語而曽子尤致其察者故能三省其身子張亦能致其察故有書紳之語鳶魚之飛躍聖人何以見之上下致其察故也吾之道亦猶鳶魚之飛躍皆在目前初不離性分之内由是心以推之則鳶飛魚躍之理可以至乎道亦在乎察之而已莆陽鄭氏曰無一事一物而遺乎此理者豈不費乎舉天下行之而鮮有知其道豈不隠乎唯費而隠乃為君子之道若乃棄人倫幻形色空談廢事而卒無歸隠則隠矣而非費也道與事離而為二則偏矣豈所謂中庸之學天地之大人猶憾焉者以祁寒暑雨之偏也至君子之道無所往而不適中如日月之明容光必照豈有大小之間大莫能載者言生天生地此道也道又大於天地所以大莫能載小莫能破者至纎至悉亦此道也愚夫愚婦之所能雖聖人亦不外是所以莫能破此理所該安有限量飛潛所至無不徧滿故曰上下察君子之道其上達乃至於此及其用也不出乎人倫世故故曰造端乎夫婦莆陽林氏曰聖人豈直不知不能哉知到不知處能到不能處此聖人所以為聖人也六合之外聖人存而不論是不知也寂然不動感而遂通天下之故此不能也若夫胷中更有知有能則其知道淺矣故聖人以不知不能為到處兼山郭氏曰道者無不在也夫婦之能知能行亦道也聖人之不能知不能行亦道也然則聖人何為而不知乎今夫積土成山積水成淵自其積之始雖愚夫愚婦之所能為及其至也草木禽獸蛟龍魚鼈之所生烝而為雲氣降而為雨露其神化妙用變通百出雖聖人亦所不能知理亦然也長樂陳氏曰中庸猶五穀愈食愈有味若其他雖珍異一食而喜再食而厭惟五榖日日食之雖没齒無厭也君子之道其所謂費者其日食之謂乎所謂隠者其没齒無厭之謂乎江陵項氏曰費猶博也隠猶約也道雖甚博為之甚約此章先言道之費自夫婦之愚至人猶有所憾言道之所該形氣不足以盡之故聖人之聖有不能兼於愚夫愚婦之事天地之大有不能免於小人之憾皆形氣之限也故君子語道之大處則麗於形氣者雖毫末猶為大也鳶飛戾天魚躍于淵言其上下察也凡形氣之所至無非道者君子之道造端乎夫婦及其至也察乎天地此言君子之道非言君子也近起於愚夫愚婦逺極於天地之間道無不該夫婦天地以喻大小之極非論其精粗淺深此章專言其費下章始言其隱范陽張氏曰君子之道即中庸也中庸不離喜怒哀樂已發未發之間此日用所不免豈非費乎費當為費用之費雖夫婦之愚不肖豈有無喜怒哀樂者此所謂可以與知可以能行者然由戒謹不睹恐懼不聞以養喜怒哀樂使為中為和以位天地育萬物雖聖人猶皇皇汲汲自謂有所不知有所不能焉豈非隱乎盖自以為知自以為能則止矣止非中庸也唯若有所不知有所不能則戒謹恐懼其敢一日而已乎此理㣲矣力行者能識之又曰天地雖大不免有日月薄蝕彗孛飛流山川震動草木倒植寒暑失中雨暘差序水旱相繼札瘥流行此人所以不免有憾然則財成其道輔相其宜彌綸範圍真有待於中庸耳又曰君子之道所以大莫能載小莫能破以其戒謹不睹恐懼不聞察於㣲茫之功也戒謹恐懼則於未形之先未萌之始已致其察察之之至至於鳶飛魚躍而察乃在焉居人倫之先者夫婦是也欲識不睹不聞之實當於夫婦而察之夫婦之道正則天地之道皆正矣察之何如非心一形邪意一作無不見其所自起知其所由來戒謹恐懼而不敢肆焉察之既熟豈待夫婦間凡象生於見形起於㣲上際下蟠察無不在所以如鳶之飛於天如魚之躍于淵察乃随飛躍而見焉而況日月星辰之運動山川草木之流峙乎大含元氣而天下莫能載小入無間而天下莫能破察之之功如此君子於謹獨之學其可忽邪四明沈氏曰人猶有所憾憾只是有不足天地之意人憾天地之大固知有大於天地者然人能憾天地之大以為小者亦非常人必其見卓然出於天地範圍之外者然後能憾之也天地之大猶有憾聖人不知不能上天之載無聲無臭此君子語道之大處造端乎夫婦與知與能徳輶如毛此語道之小處六合雖大未離其内一天之下何能容之所以莫能載也秋毫雖小待之成體百姓日用何能間之所以莫能破也髙要譚氏曰夫天地猶有憾聖人猶有所不能此則語之大也語之大則髙深而難窮故曰天下莫能載道造端乎夫婦而愚與不肖皆可與知此則語之小也語之小則切當而可騐故曰天下莫能破夫推道之始終自夫婦之㣲而極於天地之大學者當於此取則以極其性分之所至可也若更欲窮髙極深則蕩然無下工用力處故夫子復引詩以譬之曰鳶飛戾天魚躍于淵言其上下察也察字猶要玩繹夫天之髙不可得而窮鳶飛所戾之處則人之所見極矣地之深不可得而測魚躍而出之處則人之所見極矣聖人示人以中庸常行之道極其所至以此為準天地之間有鳶之飛有魚之躍自得其得自樂其樂各極性分所至有不能自已者人能黙識此理便可涵泳一己之性優游愉怡其樂無窮孟子所謂樂則生生則烏可已烏可已則不知手之舞之足之蹈之也盖學道者貴乎識此道生動之意若不識此道生動之意則鬰結滯礙其居也如被桎梏其行也如觸牆壁烏能乆而不已乎學者欲見飛躍端的要當以自已胷次與天地相準涵養此心一息不忘乆乆便自見矣永康陳氏曰惟費故隠橫渠曰聚則明散則隠道以知為始以不知為至詩曰不識不知順帝之則道以能行為始以不能為至易曰不疾而速不行而至天地之大也猶有所憾易曰天地設位聖人成能語大道之全體語小道之致用鳶飛戾天魚躍于淵鼓萬物而無乎不在者天理也故君子無所不至其察乎夫婦可以與知可以能行之地也天地有所不知有所不能之地也造端於可以與知可以能行之地此精義入神利用安身之事也致察於有所不知有所不能之地此過此以往窮神知化之事也要之可以與知便是有所不知之端可以能行便是有所不能之端君子之學動有依據不如異端之修然直指泛然無著也嚴陵喻氏曰天地之大也人猶有所憾天地氣形也此道非氣形所能囿天地在此道中特物之最巨者耳故有憾於天地者以其雖大而實囿於氣形非若此道之無方無體非氣形之所能囿也非氣形之所能囿非天下之至大者與無氣形之可見非天下之至小者與語大而至於此非推而廣之也其大無外孰能載之語小而至於此非斂而藏之也其小無内孰能破之宣城奚氏曰天下事可以加思者皆可知也可以致力者皆可能也至理所在無言可傳無象可則明目而視不可得而見傾耳而聼不可得而聞是豈可以加思致力也哉不可加思則無所容吾知也不可致力則無所容吾能也易曰過此以往未之或知經曰中庸不可能凡可知可能者理之粗者也吾夫子性天道之不可聞一貫之理非由學識知與能何庸施焉如回之卓爾參之一唯㸃之詠歸自有不容言之妙誠非可以區區之精神强揉而力取也蔡氏曰此總言達道也男女居室人倫之始故首以夫婦言之與知者智之端能行者仁之端及其至者勇之義道非徳不凝故以智仁勇起之聖人不知不能盖道徳之至四時自行百物自生矣鳶飛戾天魚躍于淵言道之流行上下昭著無物不在即下之所謂體物不遺者同時同義但一主乎體一主乎用耳又曰費而隱猶柔而立也三字只是形容一道字自夫婦之愚不肖與知與能至聖人有所不知不能皆隠而隠也又曰人莫不有是性故雖夫婦之愚不肖可以與知能行及其至也則盡性至命矣至命故雖聖人有所不知不能又曰及其至也即所謂形著動變之積而至於至誠之化也又曰聖人有所不能不知即生物不測之義易曰過此以往未之或知正與此義同又曰語大天下莫能載者言道之費也語小天下莫能破者言道之隠也盖將自其費者而言之則其用廣天下莫有能具載之者自其隠者而言之則其體㣲天下莫能破之者所以賛其費隠之盛也又曰鳶飛戾天魚躍于淵賛上文及其至也之妙道體流行上下昭著莫知所以然而然至此亦豈聖人所知所能哉晉陵錢氏曰此一節謂中庸之道自察而入君子之道不能語人亦在夫人察之而已夫婦可以與知能行此君子之入道所謂造端也察乎天地則天地之間無非此道非聖人所能知能行也故求中庸在乎知求知之在乎察大學曰致知在格物格物亦察也東萊吕氏曰天下莫能載者方是大天下莫能破者方是小嵩山晁氏曰語夫天下莫能事之大則其大者誠也語夫天下莫能分之小則其小者誠也盖雖大而中也其小亦中也人誰有憾於予哉新定顧氏曰道之本體莫測其始莫窮其終天地不得不施生日月不得不代明萬物不得不消息聖人知其出於此道爾安能知此道之所以然邪故曰聖人亦有所不知焉今夫天下之生乆矣一治一亂聖人汲汲皇皇立經陳紀垂世立教凡以求天下之長治而無亂也然而卒不能也堯湯有水旱之災則其不能得之天者如此夫子有陳蔡之厄則其不能得之人者如此説者因是歸之於數夫數出於道者也聖人容有不能轉移者故曰聖人亦有所不能新定錢氏曰舉天下之有形者無不載矣所以莫能載者何物舉天下之有形者皆可破矣所以莫能破者何物於鳶之飛魚之躍而有㑹焉則其説昭昭矣故曰上下察察處呈露焉可誣也子曰道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止忠恕違道不逺施諸己而不願亦勿施於人君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾鄭氏曰則法也言持柯伐木將以為柯近以柯為尺寸之法也人有過君子以人道治之其人改則止赦之不責以人所不能也違猶去也聖人而曰我未能一焉明人當勉之無己庸猶常也徳常行也言常謹也慥慥乎篤實言行相應之貌孔氏曰自此至徼幸一節明中庸之道去人不逺但行於己則能及物所引詩豳風伐柯之篇柯斧柄也周禮云柯長三尺愽三寸柯柄長短其法不逺人猶以為逺明為道不可以逺也所求乎子以下四者言欲求之於他人必先行之於己欲求乎子以孝道事己湏以孝道事父母夫子聖人猶曰我未能凡人當勉之無已又譬如己為諸侯欲求於人以忠事己己當先忠於天子欲求朋友以恩恵施己則己當先施恩惠也河南程氏曰執柯伐柯其則不逺人猶以為逺君子之道本諸身發諸心豈逺乎哉伊川又曰以己及物仁也推己及物恕也違道不逺是也忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不逺異者動以天爾明道又曰忠恕兩字要除一箇除不得明道又曰盡己之謂忠推己之謂恕忠體也恕用也又曰書己為忠如心為恕或問恕字學者可用功否曰恕字甚大然恕不可獨用湏得忠以為體不忠何以能恕看忠恕兩字自見相為用處伊川又曰忠恕所以公平造徳則自忠恕其致則公平伊川又曰事上之道莫若忠待下之道莫若恕伊川又曰人謂盡己之謂忠盡物之謂恕盡己之謂忠固是盡物之謂恕則未盡推己之謂恕盡物之謂信伊川又曰有餘便是過慥慥篤實貌橫渠張氏曰所求乎君子之道四是實未能道何嘗有盡聖人人也人則有限是誠不能盡道也聖人之心則直欲盡道事則安能得盡如博施濟衆堯舜實病諸堯舜之心其施直欲至於無窮方為博施然安得若是修己以安百姓是亦堯舜實病之欲得人人如此然安得人人如此又曰虚者仁之原忠恕者與仁俱生禮義者仁之用又曰以責人之心責己則盡道所謂君子之道四丘未能一焉者也以愛己之心愛人則盡仁所謂施諸己而不願亦勿施於人者也以衆人望人則易從所謂以人治人改而止者也此君子所以責己責人愛人之三術也藍田吕氏曰此章言治己治人之常道也茍非其人道不虚行人能𢎞道非道𢎞人故道雖本於天行之者在人而已妙道精義常存乎君臣父子夫婦朋友之間不離乎交際酬酢應對之末皆人心之所同然未有不出於天者也若絶乎人倫外乎世務窮其所不可知議其所不可及則有天人之分内外之别非所謂大而無外一以貫之安在其為道也與柯斧之柄也而求柯於木其尺度之則固不逺矣然柯猶在外睨而視之始得其則若夫治己治人之道於己取之不必睨視之勞而自得於此矣故聖人推是心也其治衆人也以衆人之道而已以衆人之所及知責其所知以衆人之所能行責其所行改而後止不厚望也其愛人也以忠恕而已忠者誠有是心而不自欺恕者推待己之心以及人者也忠恕不可謂之道而道非忠恕不行此所以言違道不逺孔子謂吾道一以貫之者也其治己也以求乎人者及於吾身事父事君事兄先施之朋友皆衆人之所能盡人倫之至通乎神明光于四海有性焉君子不謂之命則雖聖人亦自謂未能此舜所以盡事親之道必至瞽瞍底豫者也故君子責己責人愛人有三術焉以責人之心責己則盡道所謂君子之道四丘未能一焉者也以愛己之心愛人則盡仁所謂施諸己而不願亦勿施於人者也以衆人望人則易從所謂以人治人改而止者也庸者常道也事父孝事君忠事兄弟交朋友信庸徳也必行而已有問有答有唱有和不越乎此者庸言也無易而已不足而不勉則徳有止而不進有餘而盡之則道難繼而不行無是行也不敢茍言以自欺故言顧行有是言也不敢不行而自棄故行顧言言行相顧知造乎誠實以自信此君子所以慥慥造乎誠實之謂也上蔡謝氏曰問忠恕曰猶形影也無忠做恕不出來己所不欲勿施於人施諸己而不願亦勿施諸人説得自分明恕如心而已恕天道也伯醇曰天地變化草木蕃是天地之恕天地閉賢人隠是天地之不恕朱震問天地何故亦有不恕曰天因人者也若不因人何故人能與天地為一故有意必固我則與天地不相似建安游氏曰仁人心也道自道也則是道不離自心而已夫何逺之有人之為道而不本於心則違道也逺矣故終不可以入道為道而不本於心則執柯伐柯之譬也故曰其則不逺此盡己之忠也然道非彼也心非此也以心望道猶為兩物也故睨而視之猶以為逺由此觀之道固不可以頓進也修身猶然而況於治人乎故君子不以道責人而以人治人取其改而止此盡物之恕也使其盡道以望人則改而不止則是中也棄不中非中庸之道也夫道一以貫之無物我之間也既曰忠恕則已違道矣然忠以盡己則將以至忘己也恕以盡物則將以至忘物也則善為道者莫近焉故雖違而不逺矣施諸己而不願亦勿施於人則以忠恕之方而參彼己之道也參彼己者亦將致一而後已也丘未能一者夫子之得邦家也則人倫正而五品遜矣何未能之有唯夫子之道不行於天下則有求於世人而未得者矣其曰丘未能一者自任以天下之重而責己之周也孟子謂舜為法於天下而我猶未免為鄉人亦是意也所謂出則事公卿入則事父兄何有於我者以在己者言之非有所求於他人者也庸徳之行是行以徳成而徳之外無餘行庸言之謹是言以行出而行之外無餘言有所不足不敢不勉將以踐言也則其行顧言矣有餘不敢盡恥躬之不逮也則其言顧行矣言行相顧則於心無餒故曰胡不慥慥爾慥慥心之實也延平楊氏曰仁者人也合而言之道也道豈嘗離人哉人而為道與道二矣道之所以逺也執柯以伐柯與柯二矣為道之譬也睨而視之猶以為逺為道而逺人之譬也執柯以伐柯其取譬可謂近矣睨而視之猶且以為逺況不能以近取譬乎則其違道可知矣故君子以人治人改而止以人治人仁之也伊尹以斯道覺斯民是也改而止不為己甚也盖道一而己仁是也視天下無一物之非仁則道其在是矣然其道終不可為乎曰自道言之則執柯伐柯猶以為逺也自求仁言之則唯忠恕莫近焉故又言之以示進為之方庶乎學者可與入徳矣君子之道四丘未能一者聖人豈有異於人乎哉人倫之至而已孔子於君臣父子兄弟朋友之間皆曰未能者不敢居其至也君子之學常若不及猶恐失之自謂能焉其失逺矣子夏既除䘮與之琴使之絃侃侃而樂作而曰先王制禮不敢不及也閔子既除䘮與之琴使之絃切切而悲作而曰先王制禮不敢過也夫哀未忘而斷之以禮有餘不敢盡也哀己忘而引之以及禮不足不敢不勉也此庸徳之行庸言之謹也有所不足必跂而及之有餘不敢盡所以趨中也可言不可行君子不言也故言顧行可行不可言君子不行也故行顧言言顧行行顧言内外進矣故曰胡不慥慥爾慥之言造也又曰孟子言舜之怨慕非深知舜之心不能及此據舜惟患不順於父母所謂其盡孝也凱風之詩曰母氏聖善我無令人孝子之事親如此此孔子所以取之也孔子曰君子之道四丘未能一焉若乃自以為能則失之矣河東侯氏曰前章言道之大也不可載小也不可破子思又恐學者窮髙極逺游心天地之外以求所謂道者則其於中庸也逺矣故曰道不逺人人之為道而逺人為道如世儒言顔子樂道同故曰不可以為道為字不可重看若父子之仁君臣之義道也是豈逺哉即父子而父子之道明即君臣而君臣之義立此人之道也孟子曰民之秉彞故好是懿徳是也故引詩執柯伐柯其則不逺以明之又曰執柯以伐柯睨而視之猶以為逺謂柯之則不在他柯而柯自有天然之則故曰睨而視之猶以為逺也謂其猶二也譬如君子之道本諸身發諸心不在於他率性修道而已其加諸庻民亦若是故曰君子以人治人改而止忠恕違道不逺施諸己而不願亦勿施於人噫施諸己而不願然後勿施於人故己違道矣然而謂之不逺者以其善推其所為而已雖然如是君子一視而同仁吾道一以貫之曽子謂夫子之道忠恕而已矣孔子亦曰老者安之朋友信之少者懐之惡在其為施諸己而不願而勿施於人也忠恕一也性分不同夫子聖人也故不待推顔子子思孟子子貢之忠恕其知之所及仁之所守勇之所行皆至於斯故或曰無施勞或曰施諸己而不願亦勿施於人或曰老吾老以及人之老㓜吾㓜以及人之㓜或曰吾不欲人之加諸我也吾亦欲無加諸人此安仁行仁求仁之序也又曰此章道不逺人以人治人改而止忠恕違道不逺施諸己而不願亦勿施於人子思恐學者低看却理故舉父子君臣兄弟朋友之常雖聖人有所未能以明之父子之仁天性也君臣則義也兄弟亦仁也朋友亦義也孔子自謂皆未能何也只謂恕己以及人則聖人將使天下皆無父子無君臣乎盖以責人之心責己則盡道也夫聖孔子不居此四者聖人言未能亦不得已也孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也仁之於父子也義之之於君臣也禮之於賓主也知之於賢者也聖人之於天道也命也有性焉君子不謂命也孔子聖人也聖人人倫之至豈有不能哉云未能者非不能也有命焉有性焉不得不可以為悦者也事君而盡臣道焉不得乎君猶以為未盡也事親而盡子道焉不得乎親猶以為未盡也事兄弟朋友亦然若己盡其道而不得焉自曰能之非也舜之於堯堯之於舜君臣之道盡也過此焉謂之盡者吾未見其可也以孔子之聖猶曰未能者此也然而不敢厚誣天下而曰終不能者猶幸其一二焉故皆曰未能亦聖人之時中也雖然命也者性存焉故又繼之以庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言慥慥而誠實至於中則不敢不勉也孟子曰欲為君盡君道欲為臣盡臣道二者皆法堯舜而已今人有君親而不盡其心以事焉曰聖人猶未能盡而曰恕己以及人皆非也是禍天下君臣父子也又曰曽子説出忠恕二字子思所以只發明恕字者何故曰無恕不見得忠無忠做恕不出來誠有是心之謂忠見於功用之謂恕曰明道言忠恕二字要除一箇除不得正謂此與曰然新安朱氏曰此第十三章睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别故伐者視之猶以為逺也若以人治人則所以為人之道各在當人之身初無彼此之别故君子之治人也即以其人之道還治其人之身其人能改即止不治盖責之以其所能知能行非欲其逺人以為道也張子所謂以衆人望人則易從是也盡己之心為忠推己及人為恕違道不逺言自此至彼相去不逺非背而去之之謂也道即其不逺人者是也施諸己而不願亦勿施於人忠恕之事也以己之心度人之心未嘗不同則道之不逺於人者可見故己之所不欲則勿以施之於人亦不逺人以為道之事張子所謂以愛己之心愛人則盡仁是也子臣弟友四字絶句求猶責也道不逺人凡己之所以責人者皆道之所當然也故反之以自責而自修焉庸平常也行者踐其實謹者擇其可徳不足而勉則行益力言有餘而訒則謹益至謹之至則言顧行矣行之力則行顧言矣慥慥篤實貎言君子之言行如此豈不慥慥乎賛美之也凡此皆不逺人以為道之事張子所謂以責人之心責己則盡道是也道不逺人者夫婦所能丘未能一者聖人所不能皆費也而其所以然者則至隠存焉下章放此或問子以為以人治人謂以彼人之道還治彼人善矣又謂責其所能知能行而引張子之説以實之則無乃流於姑息之論而所謂人之道者不得為道之全也邪曰上章固言之矣夫婦之所能知能行者道也聖人之所不知不能而天地猶有憾者亦道也然自人而言則夫婦之所能知能行者人之所切於身而不可湏臾離者也至於天地聖人所不能及則其求之當有漸次而或非日用之所急矣然則責人而先其切於身之不可離者後其有漸而不急者是乃行逺自邇升髙自卑之序使其由是而不已焉則人道之全亦將可以馴致今必以是姑息而遽欲盡道以責於人吾見其失先後之序違緩急之宜人之受責者將至於有所不堪而道之無窮則終非一人一日之所能盡也是亦兩失之而已焉爾曰子臣弟友絶句何也曰夫子之意盖曰我之所責乎子之事己者如此而反求乎己之所以事父則未能如此也所責乎臣之事君者如此而反求乎己之所以事君則未能如此也所責乎弟之事兄者如此而反求乎己之所以事兄則未能如此也所責乎朋友之施己者如此而反求乎己之所以先施於彼者則未能如此也於是以其所以責彼者自責於庸言庸行之間盖不待求之於他而吾之所以自修之則具於此矣今或不得其讀而以父君兄友之四字為絶句則於文意有所不通而其義亦何所當哉又曰諸家說論語者多引此章以明一以貫之之義說此章者又引論語以釋違道不逺之意一矛一盾終不相謀而牽合不置學者盖深病之及深考乎程子之言有所謂動以天者然後知二者之為忠恕其迹雖同而所以為忠恕者其心實異非其知徳之深知言之至其孰能判然如此而無疑哉然盡己推己乃忠恕之所以名而正為此章違道不逺之事若動以天而一以貫之則不待盡己而至誠者自無息不待推己而萬物各得其所矣曽子之言盖指其不可名之妙而借其可名之粗以明之學者黙識於言意之表則亦足以互相發明而不害其為同也餘說雖多大槩放此推此意以觀之則其為得失自可見矣違道不逺如齊師違榖七里之違非背而去之之謂諸說於此多所未合則不察文義而强為之說之過也夫齊師違榖七里而榖人不知則非昔已至榖而今始去之也盖曰自此而去以至於榖纔七里耳孟子所云夜氣不足以存則其違禽獸不逺矣非謂昔本禽獸而今始違之也亦曰自此而去以入於禽獸不逺耳盖所謂道者當然之理而已根於人心而見諸行事不待勉而能也然唯盡己之心而推以及人可以得其當然之實而勉無不當不然則求之愈逺而愈不近矣此所以自是忠恕而往以至於道獨為不逺其曰違者非背而去之之謂也程子又謂事上之道莫若忠待下之道莫若恕此則不可曉者若姑以所重言之則似亦不為無理若究其極則忠之與恕初不相離程子所謂要除一箇除不得而謝氏以為猶形影者意可見矣今析為二事而兩用之則是果有無恕之忠無忠之恕而所以事上接下者皆出於强為而不由乎中矣豈忠恕之謂哉是於程子他說殊不相似意其記錄之或誤不然則一時有為言之而非正為忠恕發也張子二說皆深得之但虚者仁之原忠恕與仁俱生之語若未瑩耳吕氏改本大畧不盡經意舊本乃推張子之言而詳實有味但柯猶在外以下為未盡善若易之曰所謂則者猶在所執之柯而不在所伐之柯故執柯者必有睨視之勞而猶以為逺也若夫以人治人則異於是盖衆人之道止在衆人之身若以其所及知者責其知以其所能行者責其行人改即止不厚望焉則不必睨視之勞而所以治之之則不逺於彼而得之矣忠者誠有是心而不自欺也恕者推待己之心以及人也推其誠心以及於人則其所以愛人之道不逺於我而得之矣至於事父事君事兄交友皆以所求乎人者責乎己之所未能則其所以治己之道亦不逺於心而得之矣夫四者固皆衆人之所能而聖人乃自謂未能者亦曰未能如其所以責人者耳此見聖人之心純亦不已而道之體用其大天下莫能載其小天下莫能破舜之所以盡事親之道必至乎瞽叟底豫者盖為此也如此然後屬乎庸者常道之云則庶乎其無病矣且其曰有餘而盡之則道難繼而不行又不若游氏所引恥躬不逮為得其大意也謝氏侯氏所論論語之忠恕獨得程子之意但程子所謂天地之不恕亦曰天地之化生生不窮特以氣機闔闢有通有塞故當其通也天地變化草木蕃則有似於恕當其塞也天地閉而賢人隱則有似於不恕耳其曰不恕非若人之閉於私欲而實有忮害之心也謝氏推明其說乃謂天地之有不恕乃因人而然則其說有未究者盖若以為人不致中則天地有時而不位人不致和則萬物有時而不育是謂天地之氣因人之不恕而有似於不恕則可若曰天地因人之不恕而實有不恕之心則是彼為人者既以忮心失恕而自絶於天矣為天地者反傚其所為以自己其於穆之命也豈不誤㦲游氏之說其病尤多至謂道無物我之間而忠恕將以至於忘己忘物則為己違道而猶未逺也是則老莊之遺意而逺人甚矣豈中庸之道哉楊氏又謂以人為道則於道二而逺於道故戒人不可以為道如執柯以伐柯則於柯二故睨而視之則其違經背理又有甚焉使經而曰人而違道則逺人故君子不可以為道則其說信矣今經文如此而其說乃如彼既於文義有所不通而推其意又將使道為無用之物人無入道之門而聖人之教人以為道者反為誤人而有害於道是安有此理哉既又曰自道言之則不可為自求人言之則忠恕者莫近焉則己自知其有所不通而復為是說以救之然終亦矛盾而無所合是皆流於異端之說不但毫釐之差而已也侯氏固多䟽闊其引顔子樂道之說愚於論語已辨之矣至於四者未能之說獨以為若止謂恕己以及人則是聖人將使天下皆無父子君臣矣此則諸家皆所不及盖近世果有不得其讀而輙為之說曰此君子以一己之難克而知天下皆可恕之人也嗚呼此非所謂將使天下皆無父子君臣者乎侯氏之言於是乎騐矣又語錄曰人之為道而逺人如為仁由己之為不可以為道如克己復禮為仁之為北溪陳氏曰伊川謂盡己之謂忠推己之謂恕忠就心說是己之心無不真實者恕就待人接物處說只是推己心之真實者以及人物而已推己心以及人要如己心之所欲便是恕夫子謂己所不欲勿施於人只是就一邉論實不止是勿施己所不欲者凡己之所欲湏要施於人方可如己欲孝人亦欲孝己欲弟人亦欲弟必推己之所欲孝欲弟者以及人使人亦得以遂其欲孝欲弟之心上蔡謂忠恕猶形影說得好大槩忠恕只是一物存諸己者既忠則發於外便是恕應事接物處不恕則在我必不十分真實故發出忠底心便是恕底事做成恕底事便是忠底心無忠而恕便流為姑息非所謂由中及物中庸說忠恕違道不逺正謂學者之忠恕曽子說夫子之道忠恕乃是說聖人聖人忠恕是天道學者忠恕是人道又曰范忠宣公謂以責人之心責己則是以恕己之心恕人一句不是據此說只似箇饒人意思似今人說且恕不恕之意如此則己有過且自恕己人有過又并恕人相率為不肖之歸豈古人推己恕之義乎涑水司馬氏曰伐柯猶湏睨而視之至於求道只在己心長樂劉氏曰故人能盡其性者可使治人則人人各改其過不及者而止乎中道此之謂以人治人改而止也君臣父子兄弟朋友夫婦五者君子所以位乎其道也仲尼自誠而明學而不厭身為萬世之法行為五常之師無所施而不得其至使之事君萬世不能過其忠也使之事父萬世不能過其孝也使之事兄萬世不能過其弟也使之處朋友無所不務於先施也不幸生而無父不得盡乎其為子之誠也不幸仕而無君不得盡乎其為臣之忠也不幸長而無兄不得盡乎其為弟之順也不幸貧而無財不得盡乎其朋友之先施也故曰君子之道四而丘未能一焉所以自傷以為歉也嵩山晁氏曰忠恕之為中也均率是性而為道莫之或逺也逺於人則可湏臾離也以其不逺人而忠恕之名立也為人父而忠恕則己與一家去道不逺也為人君而忠恕則己與天下國家去道不逺也忠恕以人治人猶己肫肫其中也海陵胡氏曰此言忠恕之道不逺於人情内盡其心謂之忠如己之心謂之恕人能推己之欲以及人之欲推己之惡以及人之惡己愛其親必思人亦愛其親己愛其子必思人亦愛其子至於好安佚惡危殆趨歡樂惡死亡是人情不相逺也故忠恕之為道不逺於人情逺人者謂己欲之不顧人之不欲也己惡之不顧人之不惡也是非忠恕故云不可以為道引豳詩以證不逺人之義執其柯以伐柯其法則不過於手目之間耳固不逺也伐柯之時猶湏邪視顧其長短恐有所差若比之於忠恕則伐柯猶以為逺何者忠恕積於心發於外所為必中不勞思慮自然合於人情是則執柯伐柯尚勞顧視猶以為逺者言忠恕近人情之甚也忠恕違道不逺者此復言忠恕之美也道者五常之總名違去也去道不逺者夫忠恕以博愛言之仁也以合宜言之義也以退讓言之禮也以察於物情言之知也以不欺於物言之信也故曰違道不逺君子之道已下又說忠恕之難夫為人父者莫不責其子以孝推其責子之心以事其父不可勝孝也為人君者莫不責其臣以忠推其責臣之心以事其君不可勝忠也為人兄者莫不責其弟以弟推其責弟之心以事其兄不可勝弟也己之於朋友莫不責人以先施推其責友之心以處於己不可勝義也其道至廣其行至難聖人猶言未能他人則湏當勉之不已也兼山郭氏曰道不逺人則人於道舉相似也本之一身而準移之於人而準放之天下而準推之古今而準君子盡己之心而盡人物之心則無事矣此執柯伐柯猶以為逺也改而止者乃所以用夫忠恕也盖言用忠恕而行其違道也不逺聞之先生曰盡己者忠也乾道變化各正性命恕也推是而言不過乎體用而已矣施諸己而不願亦勿施於人君子之道四丘未能一焉皆恕也以此而盡行庸徳之行也以此而盡言庸言之謹也以此而知不足不敢不勉以此而知有餘不敢盡終於言行不違而造於誠實而後己又曰以人治人小人不知出此則以禽獸異類治之故暴虐糜爛無所不至范陽張氏曰先察知一己之難克然後察見天下皆為可恕之人不敢妄責備焉皆曰求者所以致察也夫自以為能則止矣故終身不能自以為未能則皇皇汲汲其敢已邪羑里操曰臣罪當誅兮天王聖明此臣以事君而未能之意舜祗見瞽瞍負罪引慝此子以事父未能之意四明沈氏曰君子以人治人兩人字皆是已天下萬物之理皆己所自有不必求諸他人之為道而逺人便不是以人治人中庸本無止法其曰改而止未改自不可止已改自不容不止是無止也纔說出忠恕字便已是違道了但去本未甚逺耳莆陽林氏曰道體渾全初未嘗破散求於為道則道始破散不全夫求道之初聖人衆人何嘗有異唯為道則非聖人矣且如顔子是甚等氣質及其為道則仰彌髙鑚彌堅瞻之在前忽焉在後不知顔子所謂堅髙前後者是何物也是顔子又不免為道之累子思此語非為學道者而言為體道見道者而言也髙要譚氏曰所謂道即性之理也凡受命於天而為人者均有是理人之為道一句當精意玩繹有人方有道茍無人焉道安在哉故孟子亦曰仁者人也合而言之道也道與人本不相離既名為道而與人相逺是不可以為道也道之在人其近有甚於伐柯即人可以得道初不假於睨視而外求也唯夫道常不逺於人是以君子之治人亦未嘗求其道不過以人之道治人使改而復為人則止更不外為治之之術也以人治人改而止君子忠恕之道其在斯乎忠者盡己恕者盡物與中庸之道無異致也中庸之道合内外彼己而為一故以忠恕求中庸極為切近昔曽子指忠恕便為夫子之道而子思却因忠恕以見道之不逺何也曽子所指誠者之事也天之道也子思所記誠之者之事也人之道也夫子嘗曰有一言而可以終身行之者其恕乎己所不欲勿施於人此正合子思所記之說乃學者以人求天之事也孟子從而為之説曰萬物皆備於我矣反身而誠樂莫大焉强恕而行求仁莫近焉此亦言誠之者之事以人求天者也以人求天行之不已其至則與天道為一學者欲求至於聖人當自體忠行恕而積之可也何謂體忠行恕下言君子之道四丘未能一焉即夫子開示體忠行恕之㣲㫖也父子君臣兄弟朋友之常道雖甚易知甚易行及其至也聖人亦有所不能知亦有所不能行夫子若曰吾於此道自謂能盡之則天下之人皆知其易而不知其難且將言不顧行行不顧言自以為有餘而不勉其所不足不務力行而唯以虚言相尚固有所行未極其至而所言先過其實者矣故夫子以身示之曰此四者雖常道若其至處則吾皆未能也此示學者體忠行恕之㫖也故繼言吾於常徳則行之而不敢已吾於常言則謹之而不妄出又言自知有所不足則勉强而力行自知行有餘力則嘗抑之而不敢盡出又言言必顧行行常恐不及於言行必顧言言常恐有過於行味此數字則知丘未能一之㫖固有在矣曰丘未能一云者所以示學者内不敢自欺外薄責於人此乃體忠行恕之㣲㫖也末云君子胡不慥慥爾盖夫子開誘後學皆欲務實不浮於言務於實者盡己之未至即所謂忠也不浮於言者不夸人以難能即所謂恕也呉興沈氏曰道不外乎性則人之於道未嘗湏臾相離又何假於作為邪苟有意於為道則道逺於人矣道逺於人則不足以為道何者以道不可為也故夫子舉伐柯之詩以證之君子將以覺天下之未悟亦曰以人治人而已仁義禮知之心道之所自存人皆有之孟子所謂仁者人也合而言之道也人皆有是理特未之覺耳君子以是理而治人俾改其所止向也為人臣而不知所謂忠今也改而為忠苟反於忠則自然止於忠矣向也為人子而不知所謂孝今也改而為孝苟反於孝則自然止於孝矣至於為君為父與國人交莫不皆改止於仁止於慈止於信若然者非君子外夫人以治人也特因其有是道俾變易其偽而反還其真自然得所止而不復有所遷徙也君子之道四丘未能一夫子所謂未能非未能也惟其於是四者深體而力行之故有未能之嘆也晉陵錢氏曰此一節謂中庸之道取則於己道人道也人道自人為之為道而逺人則非道矣伐木為柯者必以柯其法則惟取於柯可謂不逺視之猶以為逺以所執所伐二物故也人之修身則是以人而治人初非二物權衡尺度本之吾心即其不如吾心者改之足矣何必他求江陵項氏曰道不逺人人之為道而逺人不可以為道此言人之修道其實甚約執柯伐柯至改而止謂修道者以人之道治人之形使改其不合乎人者而合乎人則止矣豈有費哉忠恕違道不逺至君子之道四此以人治人之目也我所施於人者我願之乎否也以我所願治我所施則不敢以施於人矣我所求於人者我能之乎否也以我所求治我所未能則必求有以能於我矣庸徳之行庸言之謹此求於我之事也有所不足不敢不勉己之行必顧己言不敢以不及也有餘不敢盡己之言必顧己之行不敢以過也言顧行行顧言君子胡不慥慥爾申言之欲其加厚於此也上文四求猶以人與己相顧至此直以己之言行自相顧也人已相顧恕也已自相顧忠也慥慥忠之至也觀此章則所知所行皆近在吾身而道固未嘗費也建安真氏曰忠者盡己之心也恕者推己之心以及人也忠盡乎内者也恕形於外者也己之心既無一毫之不盡則形之於外亦無一毫之不當有忠而後有恕忠者形也恕者影也在聖人則曰誠在學者則曰忠誠是自然而然忠則須用着力在聖人則不必言恕在學者則當恕盖聖人不待乎推學者先盡己而後能及人故有待乎推也然學者若能於忠恕二字着力於盡己盡人之間無不極其至久之亦可以到至誠地位又曰恕者恕之謂非寛厚之謂也如我能為善亦欲他人如我之善我無惡亦欲他人如我之無惡我欲立亦欲人之立我欲達亦欲人之達大槩是視人如己推己及物之謂霅川倪氏曰篇名中庸論中之理詳矣而論庸則庸徳庸言盖庸徳而能行庸言而能謹所謂庸者不過如是而已能合於中則能庸矣言顧行行顧言不曰視而曰顧者視正視也顧反顧也正視其前而無失未為盡也必反視其後而無失乃為盡也李氏曰父子君臣兄弟朋友四者人倫之所當然固皆衆人之所能而聖人乃曰丘未能一焉亦曰吾反求諸己者未能如其所以責人者耳四眀宣氏曰道之在人人皆可能及其至也雖聖人猶以為難君子之道四人倫之大者莫過如此孔子以恕求諸人不敢以其難者責諸人以忠責乎己不敢以其易者信乎己故所求乎子以事父在我不敢自信其能也且子之事父使若愚夫愚婦皆知有尊孰不可以為孝況於聖人何不能之有惟夫人情之變無窮而居其間者有出於意料之所不及故雖聖人不敢自信以為能推是而論則舜之所以處父子伊尹周公之所以處君臣舜周公之所以處兄弟自後世觀之曰父子曰君臣曰兄弟固以為聖人可以無愧自聖人觀之終不敢自信以為能至若朋友先施之缺聖賢所講猶曰不可竭人之忠而曽子子夏相與切責之深降此未必能受然則處朋友之間又敢自必其能邪凡人處己待人每以為吾無慊然者其終必至於歸過於人而後己是非紛爭彼此各立相刃相靡綱常或紊皆聖道不明之故然則忠恕一貫之學其可忽諸林氏曰此章聖人示人以切近誠實之學欲使學者反身而求故於言行之間必致其審庸者常也人情於常者易忽而聖人尤所加意也庸徳必行庸言必謹豈以常而忽之哉新定顧氏曰道不逺人所謂君子之道本於人心夫何逺人之有人之為道而逺人不可以為道人之行事崖異竒詭外乎人心之正理非百世之可通行者也申生之於孝陳仲子之於廉道其所道非吾所謂道也道之本體寂然不動君子之見於行事則有忠恕忠恕所以行道去道不逺也發於本心之謂忠推己之心之謂恕於文中心為忠如心為恕詳味中心如心之義而忠恕之説可眀觀此一章忠恕違道不逺一語其綱領也上文数句大抵言忠之事下文數句大抵言恕之事今人於恕之一辭但知其為寛之義爾古人於恕之一辭盖備如心之義焉謂恕但為寛邪則吾之所欲寛者己也而因以寛於人彼此相與於寛天下蕩然無事縱馳之失毋乃自是而生與徳業毋乃自是而廢與且夫子異日嘗曰無服之䘮内恕孔悲又豈寛之義邪孟子曰强恕而行求仁莫近焉仁者必有勇有殺身以成仁謂恕但為寛而乃近於仁則仁之為道無乃己淺邪夫子以恕告子貢而曰己所不欲勿施於人舉一隅之言爾學者不以三隅反宜其失於淺也盖人之情切責之意每施於人而不喜施於己寛假之意每施於己而不常施於人聖人不然以其施於人者而施於己以其施於己者而施於人是為如心是夫子之所謂恕錢塘吳氏曰道不逺人道在邇也人之所以與道逺者為之者逺之也墨氏兼愛是為仁也卒至於無父楊氏為我是為義也卒至於無君故人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺仁義一也由仁義行與行仁義者不同氣一也集義所生與義襲而取之者不同伐柯一也則由中出與睨而視之者不同君子以人治人忠也不以人治人而治之以己非忠也改而止恕也改而責人無己非恕也故繼之曰忠恕違道不逺如愚四明袁氏曰以人治人者人昧於為人而以教人道故曰治不曰我治人而曰以人治人我亦人耳人道不離吾身亦不離各人之身吾有此則人亦有此則以則取則天則自然非彼柯假此柯之比也人有過焉能改則止若責人已甚違天則矣故曰忠恕違道不逺忠恕二字見得以人治人最明何則中心為忠如心為恕試以心體之人以不願施於我必非吾之所願人我一也而我乃以不願施諸人豈中心如心之謂乎中心如心者以人治人而已禮記集說卷一百二十七
