body:
  text: 禮記集說卷十二宋衛湜撰天子有后有夫人有世婦有嬪有妻有妾鄭氏曰妻八十一御妻周禮謂之女御以其御序於王之燕寢妾賤者孔氏曰自此至曰享緫論立男官女官之事天子立官先從后妃始以為治之法刑于寡妻始于家邦終于四海故刪詩以后妃為首后後也言其後於天子亦以廣後𦙍也夫扶也言扶持於王也婦服也言其進以服事君子也以其猶貴故加以世言之亦廣世𦙍也嬪婦人之美稱可賔敬也妻之言齊也進御於王之時暫有齊同之義鄭註内則言齊者彼是判合齊體也妾之言接也以得接見於君子也周禮則嬪在世婦上又無妾之文今此所陳與周禮雜而不次者或記者雜夏殷而言之鄭註御序於王之燕寢者案周禮王有六寢一是正寢餘五寢在後東西南北中央各一順四時居之六月居中央通名燕寢后妃以下次序而上御王於五寢之中也餘見周禮九嬪註藍田吕氏曰后以配天子夫人視三公其名與諸侯之妃同世婦視大夫其名與大夫妻同九嬪於昏義視九卿位在世婦上此在世婦下者異代之制也妻即昏義所謂御妻視元士名與士之妻同妾則昏義所無蓋其賤者以視庶人嚴陵方氏曰后以承繼為義以其聽内治有君道故也馬氏曰昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治此曰天子有后有夫人有世婦有嬪有妻有妾蓋昏義言後宫之治故兼天子后言之而備六宫之數而妾不預焉曲禮言後宫之位故止言天子而備六宫之名則雖后之尊亦曰有后而妾之賤亦預焉廬陵胡氏曰隋唐以後皇后而下有貴妃淑妃徳妃賢妃則夫人也昭儀昭容昭媛修儀修容修媛充儀充容充媛則九嬪也媫妤美人才人各九合二十七是代世婦寳林御女采女各二十七是代御妻六尚分典乗輿服御則妾也大抵踵周官之制天子建天官先六大曰大宰大宗大史大祝大士大卜典司六典天子之五官曰司徒司馬司空司士司宼典司五衆天子之六府曰司土司木司水司草司器司貨典司六職天子之六工曰土工金工石工木工獸工草工典制六材五官致貢曰享鄭氏曰典法也此蓋殷時制也周則大宰為天官大宗曰宗伯宗伯為春官大史以下屬焉大士以神仕者衆謂羣臣也五官於周則司士屬司馬大宰司徒宗伯司馬司寇司空為六官六府主藏六物之稅者周則皆屬司徒六工於周皆屬司空土工陶旊也金工築冶鳬㮚段桃也石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也唯草工職亡蓋謂作萑葦之器也貢功也享獻也致其歳終之功於王謂之獻也周禮大宰歳終則令百官府各正其治受其㑹聽其致事而詔王廢置孔氏曰殷家六卿大宰司徒司馬司空司士司寇是也大宰一卿以象天時司徒以下五卿法於地事但大宰既尊故先列之并顯大宰之下所𨽻屬之官大宰既法於天故同受大名云六大也上典是守典之典下典是典法之典立此六官以守主六事之法又置五官以象地之五行不云建從天官也又天官尊陽故一卿以攝衆地官卑隂故五卿俱陳也不云地者與前互也天尊故没其數地卑故明言其五典司五衆者言用此五官使守其所掌之羣衆也然此五官亦各有所領羣衆如大宰領大宗以下也而不條出其人者略也天言六典地言五衆者互言也殷既法天地立官又為萬物立府司土於周為土均主均平地稅之政令司木於周為山虞虞度也主量度山之大小所生之物司水於周為川衡衡平也掌廵行川澤平其禁令司草於周為稻人掌稼種下地及除草萊司器於周為角人掌以時徴齒角於山澤之農供為器用司貨於周為卝人掌金玉錫石之地為之守禁以時取之以共器物金玉曰貨故稱貨人立此六官使各主其所掌職也既有六府之物冝立六工以作為器物工能也言能作器物者也考工記陶人為甗旊人為簋即土工也築氏掌為削削謂書刀冶謂煎金石冶氏掌戈㦸故因呼煎金為冶鳬氏世能為鍾以供樂器㮚氏世能為量器謂豆區鬴鍾之屬段氏主作錢鎛田器桃氏為刄刀劒之屬此即金工也玉人作圭璧磬人作磬玉及磬出於石此即石工也輪謂車輪輿謂車牀車難不能一人獨成各有所善故輪輿不同弓能作弓者廬能作戈㦸柲者匠能作宫室之屬者車謂能作大車及羊車梓謂杯勺笱虡之屬此七物並用木皆木工也函謂能作甲鎧鮑謂能治皮作甲韗謂考工記韗人為臯陶鼓謂能以皮冐鼓者韋熟皮為衣及韎韐者裘謂帶毛狐裘之屬者考工記韋裘二職存此物並用獸皮即獸工也草工謂以萑葦作盛食之器及葦席之屬也立此六工使典制六府之財物也五官致貢謂上天子五官司徒以下故下云五官之長曰伯大宰緫攝羣職緫受五官之貢故不入其數藍田吕氏曰殷人尊神率民以事神先鬼而後禮大宗以下皆事鬼神奉天時之官故緫謂之天官太宰者佐王代天工以治者也大宗掌事鬼神者也大史掌正歳年及頒朔則奉天時者也大祝所以接神者也士者即周司巫巫所以降神者也大卜主問龜所以求神者也六者皆天事也人事也人事可變天事不可變者也周官司士則夏官之屬此别出司士為一官者司士掌羣臣之版及卿大夫士庶子之數則所統有衆與司馬司徒司空司寇略等矣所以並立為五官也司徒之衆則六鄉六遂是也司馬之衆六軍是也司空之衆百工是也司寇之衆士師司𨽻之屬是也故曰典司五衆六府者主藏之官斂藏六者之入以待國用者也農以耕事貢九榖則司土受之山虞以山事貢木材則司木受之澤虞以澤事貢水物則司水受之圃以樹事貢薪芻䟽材則司草受之工以飭材事貢器物則司器受之商以市事貢貨賄則司貨受之周官司土則廪人倉人之職司木則山虞林衡之職司水則澤虞川衡之職司草則委人之職司器司貨則玉府内府之職所入者乃農圃虞衡工商之民所貢故曰典司六職六工者飭材為器以待國用者也草工以萑葦莞蒲菅蒯之類為器用者六工所治之材各有不同故曰典制六材歳終則司徒以下五官各致其功以獻於王故謂之享王得以行其誅賞大宰不貢者周官大宰詔王廢置則殷制亦然也長樂劉氏曰此殷之官制也雖與周官不同然自唐虞以來建官之義莫不稽古而法天地四時以分其職雖則名稱有所變更而法象未始有異是故羲氏和氏天地之官也四岳四時之官也夏因有虞之制甘誓曰大戰于甘乃召六卿是也殷之大宰大宗司徒司馬司空司寇乃周之六官也而記者參以其屬義雖大小不貫而天地四時以成變化之職理自有倫矣而䟽謂立六大以法天之六氣置五官以法地之五行者非也隂陽之本一氣也判而為陽所以作天為隂所以作地二氣互有升降乗其分至以為四時四時以言其氣也五行以言其形也六典者象乾所以始萬物之法也故天官掌之五衆者象坤所以成萬物之法也故地官掌之而承之以六府六工則變化養吾民者莫不備矣書不云乎德惟善政政在養民水火金木土榖惟修正德利用厚生惟和九功惟敘九敘惟歌夏承虞官所致如此舎天地四時其能爾乎山隂陸氏曰司徒敎官也司馬政官也故五官一曰司徒次二曰司馬有敎有政而後事可立故次司空事立矣則以禮文之可也故次司士禮之所去刑之所取也故次司宼以司士代宗伯者以司士所掌與禮相通也六典書也五衆則其人焉五衆謂若大司徒大司馬典司小司徒小司馬之類不言大宰大宰典司六卿五衆有位者六職則其職而已考工記曰凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二土工蓋摶埴之工金工蓋攻金之工石工蓋刮摩之工木工蓋攻木之工獸工蓋攻皮之工草工蓋設色之工若以藍為青以䓞為紫以蒨為紅以菉為黄之類是也或曰草讀如字今俗作皂非正也殷人尚質故設色之工謂之草工石林葉氏曰自夫人以下至草工其分列之先後與名號之異同亂於周官之序冝康成以為殷禮也葢治天下必自内始夫人嬪妾莫不有所司而不言司者以其主於内而已内治則家道正可以推而及國大宰王者所頼以治國也故建官特先之其屬則大宗大史大祝大士大卜皆有書故言六典六典所以奉天道也天道主之以天官而地道不可以無職故次之以司徒司徒所奉者地道所掌者邦敎也有敎不可以無政故次之以司馬司馬所掌者邦政有政不可以無事故次之以司空有政事則財用足人輕於從善而恥於犯法也故次之以司士正羣臣之版以詔爵禄終之以司寇詰邦國之禁以刑暴亂五官各率其屬而治故言五衆所以奉地道也天官先大宰以奉天道地官先司徒以奉地道人君於是可以輔相裁成之時也然而萬物生於天長於地人所頼以相養不可不急於先務故六府典司六職六工典制六材亦先王之智急於成物以養天下也是以土也木也水也草也器也貨也聚之於人則曰六府分之於所治則曰六職金也土也石也木也獸也草也造之於人則曰六工見之於用則曰六材府以聚其物而後命官以分治故後言六職材必待人而有成非人則不能成其材故先言六工治天下至於萬物各得其成材此先王所以裁成天地之道輔相天地之冝以左右民而治也雖然功罪不進於上則下之情不通黜陟不行於下則上之權不立故五官各致其貢以通於王六職所分者内事則獻事六大所職者邦治則攷治五官所職者衆則獻功六府所職者物則獻業王於是攷其貢而加之黜陟此所以道揆於上法守於下為治之所以成終成始也故曰五官致貢曰享貢言其造於下而有所進享言其通於上而有所舎也廣安游氏曰古之治紀於逺後世之治紀於近紀於逺者其事本於天紀於近者純乎人事而以法天參焉堯典之書首以命羲和為事舜典之書首以齊七政為事洪範之書以五行為首凡此皆紀於逺而本於天者也及其弊也神人雜亂而詭怪妖異之患興乃命重黎絶地天通罔有降格則堯時已然矣後世寖失其故則為治者皆紀於近純乎人事不復知天矣董仲舒對䇿専談天人猶此意也然得於漢儒災異之説失之詭僻不經君子無取焉由於不知上世之故是以若此紛紛也今此建天官先六大與堯命羲和舜齊七政洪範首五行之意無異也吳氏華曰以郯子所言官名攷之其言少昊氏之官名則曰祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五官之名實與曲禮鄭註周制同長樂陳氏曰大宰理天道者也大宗大史大士大卜大祝知天道者也司徒司馬司空司士司寇理人道者也司土司木司水司草司器司貨職地物者也土工金工石工木工獸工草工飭地財者也以六大為天官則五官人官也以六大為先則天官不特六者而已昔少昊天官也五鳩人官也五雉九扈地官也以物致獻曰貢以儀飾貢曰享禹貢貢金玉蠙珠之類是也貢言其物洛誥享多儀儀不及物曰不享是享言其儀王制公侯伯子男凡五等卿大夫上士中士下士凡五等曲禮以夫人至於妾亦五等自六大以至六工亦五等此皆謂之五官也然五官致貢與五官之長所謂五官者則諸侯而已蓋以其有所候則曰侯以其有所主則曰官以物供上曰貢以儀致貢曰享禹於九州之物言貢是貢言其物也洛誥享多儀儀不及物曰不享是享言其儀也攷之周禮凡官府所供謂之獻邦國所供謂之貢則致貢曰享為諸侯之事明矣王氏曰宰者治之密也以治事神之事宗者理之㑹也以治事神之禮史尚其文也以治事神之辭祝將其命也以致事神之言士察也以察祲祥之變卜占也以觀龜筴之告此事鬼神之官故曰六大祀國之大事故也司徒以治萬民司馬以掌邦政司空以掌邦事司士以掌邦刑司寇以除盜賊此治萬民之官也故曰五官官者有所主也司土至司貨主地事之官也故曰六府府者物之所聚也土工至草工治其物而已故曰六工此商制也周則以為天無所不統猶治之於國故掌治曰天官地能作成萬物之材猶敎之於人故掌敎曰地官春則四時之氣為和而萬物得之以交際猶禮之通神人和上下故掌禮曰春官夏則使萬物莫不正猶政之於天下故掌政曰夏官秋則隂用事猶肅殺成萬物故掌刑曰秋官冬則萬物之所成終而成始猶事之終則有始故掌事曰冬官商尚質故正其名周尚文故象其意先王建官以代天工也其因其革亦以天而已五官之長曰伯是職方其擯於天子也曰天子之吏天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君鄭氏曰五官之長謂為三公者周禮九命作伯職主也二伯分主東西者春秋傳曰自陜以東周公主之自陜以西召公主之一相處乎内是或為氏曰天子之吏擯者辭也春秋傳曰王命委之三吏謂三公也孔氏曰自此至曰孤緫論二伯及州牧諸侯稱謂畿外之大莫大於二伯故此先言之五官即司徒以下五官也云長者三公無職故不在五官之中即三命加一命出為分陜二伯者也伯長也言此二伯為内外官之長是職方者言二伯於是職主當方之事也擯謂天子接賓之人若擯者傳辭於天子則稱此二伯為天子之吏亦當言名記者略之擯呼在朝三公為天子之吏然玉藻伯曰天子之力臣者謂介傳命稱天子力臣擯者受辭傳於天子則曰天子之吏鄭引春秋三吏證呼三公並為吏之意也若三公與王同姓者王呼為伯父伯者長大之名父乃同姓重親之稱也伯舅異族重親之名也異族無父稱故呼為伯舅案晉文公為二伯左傳僖二十八年王曰叔父不稱伯者以州牧之禮命之也昭九年云伯父惠公又云我在伯父猶衣服之有冠冕以晉為州牧又為二伯也周公分陜為二伯詩稱王曰叔父者成王以本親命之也晉文侯仇為伯而尚書云父義和不云伯者親親之也二伯若與九州及四夷之諸侯言則自謂天子之老係於天子威逺國也外者其私土采地之外也而猶在王畿之内如周公食邑於周嚮國外之人其自稱曰公也其國采地内也與采地内臣民言則自稱曰君既主分陜又在王朝嫌不正為采地君故明之也藍田吕氏曰唐虞建府内百揆四岳外有州牧侯伯蓋治天下有二道緫治於内者有百官府分治於外者有諸侯故聽百官府之治者謂之百揆考諸侯之治者謂之四岳四岳雖主治諸侯而亦處於内天子廵守諸侯各朝於方岳大明黜陟非廵守之歳則四岳考事而已王制所謂八州八伯即唐虞之州牧也雖周亦謂之牧大宰所謂建其牧周官所謂六卿分職以倡九牧是也八伯各以其屬屬於天子之老二人分天下以為左右謂之二伯二伯即唐虞之四岳也王制者雜夏殷周之禮故與唐虞及周小異也此云五官之長曰伯是職方者乃殷人之制即四岳二伯之任也周以三公為二伯公羊傳曰自陜以東周公主之自陜以西召公主之一相處乎内樂記云五成而分周公左召公右此所謂五官之長亦三公也五官即六卿也周官立三公三孤于六卿之上即五官之長也伯仲叔季伯為之長則凡稱伯者皆長也二伯者天下諸侯之長也職方者如周公左召公右各主治其方也九州之長即八伯兼王畿而言故謂之九也玉藻云伯自稱曰力臣蓋自卑之稱也擯者傳命曰天子之吏吏治事之稱各有所當也父者同姓之尊稱故父之昆弟皆謂之父舅者異姓之尊稱故母之昆弟與男子謂妻之父女子謂夫之父皆謂之舅天子謂二伯之同姓者為伯父異姓者為伯舅天子之三公自稱於諸侯曰天子之老諸侯之卿自稱於異邦曰寡君之老大夫士家臣之貴者亦曰老老亦長也嚴陵方氏曰五官之長曰伯者即王制言三公分天下以為左右曰二伯是矣蓋其爵則公其號則伯故也是職方者以其分職於左右而主四方之諸侯故也然與周官所謂職方氏者名義雖同而大小異焉擯則於賓執事之人也以二伯之尊於天子有賓道故傳辭於天子而其人謂之擯也天子有同姓有異姓有庶姓同姓則伯叔之國是也異姓則昏姻之國是也庶姓則既非伯叔之國又非昏姻之國矣謂之異以於同姓為别故也謂之庶以於同姓為衆故也司儀曰土揖庶姓時揖異姓天揖同姓此其辨天子之老者老為年長之稱言雖為五官之長非以其德也特以其年而已故謙辭如此長樂劉氏曰昔三代聖人行己之法必稽於古首出庶物而不敢自尊也德配二儀而不敢自大也莫尊乎父而謂同姓三公為伯父莫親乎母而謂異姓三公為伯舅非徒自示寡昧卑己以尊賢也蓋以億兆之命舒慘繫於一人政教之源治亂根於一德非屈己以下賢崇道以率衆未易化也是以於九州之伯同姓者謂之叔父異姓者謂之叔舅焉長樂陳氏曰公加命為伯伯之為任上則與王同體無為而論道下則與王異用有為而分職故在鄉則分鄉在天下則分方其分鄉也周禮所謂二鄉公一人是也其分方也禮記所謂二伯分天下為左右是也蓋二伯之於天下無所不緫故無事而無非事無職而無非職此所以坐論作行皆所豫也古者之維邦國也不特二伯而已其下又有牧伯焉成王謂太公曰五侯九伯汝實征之詩曰邭伯勞之詩序曰衛侯不能修方伯連帥之職則周之牧亦謂之伯矣蓋長人謂之伯養人謂之牧則伯以其體仁而言也牧以其施仁而言也先王所以維邦國者無他本之仁而已矣廣安游氏曰此以下具言諸侯牧伯以及於夷狄之長庶方小侯之名稱古者封建有官有職有同姓異姓之親曰牧曰伯官也曰公曰子爵也曰伯父伯舅叔父叔舅親也天子之三公及二王之後稱公餘則以國大小列為侯伯子男在四夷有子男而無侯伯此其為爵之法九州各建其牧九牧之職各治其州之諸侯二伯之職分治九州之牧書曰以倡九牧是也九州之牧各擇其賢侯為之而二伯則三公為之此其分職之法也方三代封建之始也其所封也非王之父兄子弟則其昏姻也非昏姻則謂之庶姓庶者卑之也其言庶方小侯猶言庶姓也國大而爵尊則以伯稱之而為二伯者必國大而爵尊者也國差小而爵差卑則以侯稱之而為九州之牧者必國差小而爵差卑者也國大而爵尊於外曰公公固其本爵也國差小而爵差卑於外曰侯侯固本爵也因其國與爵與為伯叔之稱所以皆稱父者假以成王言之當時諸侯所謂文之昭也則其諸父也齊王舅也於周世為昏姻稱父云者皆本其始封而言稱舅云者本其昏姻而言此其親親之等也古者君臣之際有親親之道焉有賓主之道焉有君臣之道焉三者並行所謂至文也後世君臣之際尊卑相臨親親之道䘮而君臣之恩乖賓主之道䘮而君臣之禮廢恩禮交亡所恃者薄而専從事於法矣山隂陸氏曰老以德齒自稱吏猶言力臣也牧亦應如此而於此見之崇方伯也九州之長入天子之國曰牧天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君鄭氏曰每一州之中天子選諸侯之賢者以為之牧也周禮曰乃施典於邦國而建其牧尊於大國之君而謂之叔父辟二伯也亦以此為尊禮或損之而益謂此類也二王之後不為牧孔氏曰殷曰伯周曰牧此云牧據周禮也天子於每州之中選取賢侯一人加一命使主一州為牧若入天子之國則自稱曰牧牧養也言其養一州之人周禮八命作牧是也伯不言入天子之國者伯不出故不言入耳此不云擯於天子者記者略之也牧劣於二伯故天子謂之叔叔小也若呼為伯則亂於分陜若猶呼本稱則不見其異故呼為叔亦異常也外謂其所封外九州内也自稱曰侯侯是本爵不云自稱承前可知若與國内臣民言猶自稱為君也藍田吕氏曰牧者九州諸侯之長也各有所封之國所謂其國者所封之國也於外者非所封之國而在其州之内也曰公曰侯者以爵稱臣民之辭也曰君者以事稱父與舅以姓同異而别也伯與叔以位尊卑而别也必謂之父與舅尊之親之之辭也覲禮曰同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓則曰叔舅則天子所以待天下諸侯大國之禮視三公小邦之禮視九牧也石林葉氏曰伯則其道足以長人雖五官莫尊於大宰而亦無以先之故内不以稱者以其長人之道足也牧則其道足以制人而已雖為長於九州而入天子之國則止稱牧者以其長人之道未足也惟其未足故擯於天子自稱於諸侯則無異辭惟其足也故擯則屈而言吏言天子之所使也自稱則伸而曰老言天子之所親也至於在外曰侯在國皆曰君者以其受爵雖異而南面以臨臣民者非異也嚴陵方氏曰五官之長與九州之長皆長也五官之長則曰伯九州之長則曰牧者長五官者統謂之長也長九州者各為之長而已此大小之别歟五官之長曰伯則天下之通稱也九州之長曰牧則獨施於天子之國而已施之天下則與諸侯同其稱可知五官之長自稱於諸侯則曰天子之老而九州之長不言自稱者亦與諸侯同其稱可知入天子之國曰牧亦擯者之辭矣而不曰擯者於天子有賓道唯伯之尊足以當之故也其在東夷北狄西戎南蠻雖大曰子於内自稱曰不榖於外自稱曰王老鄭氏曰謂九州之外長也天子亦選其諸侯之賢者以為之子子猶牧也入天子之國曰子天子亦謂之子雖有侯伯之地本爵亦無過子是以同名曰子不榖與民言之謙稱榖善也稱王老威逺國也外亦其戎狄之中孔氏曰此不知幾國立一人卑不得名為牧又不得謂為父舅其本爵不過子男若本爵是男亦謂為子舉其髙者言之也或有多功益土雖加侯伯之地而爵不得進終守子男以卑逺故也藍田吕氏曰九州之外即四夷也選諸侯而統之如九牧之比謂之子所以别於中國也不榖猶言不肖也不稱寡人辟中國諸侯也於外者非其國而在所統四夷之中自稱曰王老猶言天子之老也嫌其逺於王化故以王明之猶言四夷來王荒服者王也嚴陵方氏曰其在夷狄戎蠻以其在九州之外既卑且逺不得與中國同其名位故雖疆域之大爵不過子也則與曰伯曰牧者異矣九州之内爵號既尊又難為二而詳九州之外爵號既卑又合為一而略蓋華夏蠻夷之辨也稱王老則與五官之長稱天子之老同義長樂陳氏曰五大不在邊五細不在庭故先王之於中國則疆以周索尊其官師以強其榦於夷狄則疆以戎索卑其官師以弱其枝此所以治六卿以天子六卿治九州以諸侯九牧九州之外疆域雖大爵不過子也大者不過曰小侯入天子國止曰某人者又所以略之也子若春秋書楚子吳子邾子把子是也某人若春秋書邾人葛人來朝是也把邾之類非夷也以其用夷禮猶且大者稱子小者稱人則先王之所以卑夷狄可知也伯稱天子之老夷狄之長稱王老者先王德以柔中國威以制夷狄則稱天子老者以柔御之也稱王老者以大臨之也老子曰王侯自謂孤寡不榖蓋孤甚於寡寡甚於不榖夷狄之大者稱不榖小者稱孤乃其稱也玉藻諸侯於敵以下曰寡人臧文仲曰列國有凶稱孤禮也故春秋之時宋公以大水曰孤實不敬鄭伯以楚兵之加曰孤不天是諸侯之稱寡人者禮之常也稱孤則特變而已若夫小國之君與夷狄之小侯則以稱孤為常故玉藻言小國之君曰孤長樂劉氏曰九州之外四夷之君其國雖大天子必選其賢者命之為子春秋所書楚子吳子皆天子命之為蠻夷衆國之牧伯者乃得自稱曰子也故其於封竟之内自稱不榖於外鄰國自稱王老榮於中國之命以鎮乎四夷也石林葉氏曰四海之外先王所主者略故曰外薄四海咸建五長使之自長其類而已夷蠻戎狄能自養其類則皆通曰子子言其道足以養人此呉楚雖大亦稱子也至其朝則在九門之外故不言入天子之國於内曰不榖示不足以養人也其反而歸國出於四夷之外則曰王老示有所歸徃而親也内稱不榖屈四夷之德於中國外稱王老大中國之德於四夷也山隂陸氏曰公羊傳曰名不若字字不若子不言入天子之國亦卑逺之庶方小侯入天子之國曰某人於外曰子自稱曰孤鄭氏曰謂戎狄子男君也男者於外亦曰子舉尊言之孔氏曰庶衆也小侯四夷之君非為牧者也以其賤故曰衆方也若入王國自稱曰某人若牟人介人也六服之内但舉伯之與牧不顯其餘諸侯九州之外既舉大國之子又舉其餘小國者以六服諸侯下文别更具顯故於此略之外曰子者此君在其本國外四夷之中自稱依其本爵或子或男今言子是舉其尊稱若男亦稱子也若自與臣民言則曰孤孤者特立無德能也嚴陵方氏曰庶方小侯亦九州之外也以其非長故曰庶方以其非大故曰小雖大不過子而小乃謂之侯者蓋五等之爵通謂之諸侯入天子之國則曰某人則不以其爵稱且賤而略之也於外曰子則稱之以爵矣以入内則屈出外則伸故也小侯亦有男特舉子以槩之耳於外曰子而不言自稱則人稱之故也自稱曰孤而不曰内外則通内外可知石林葉氏曰庶方小侯乃所謂附庸之君也其地處乎中國而其朝異乎四夷故得入天子之國以其道止足以自為故曰某人能自為矣亦可推而養人故於外亦得稱子不足以養民則民將去而無輔矣故自稱曰孤孤則甚於不榖也先王正名號如此而後世稱謂猶失其真又況謙德以自遜也長樂陳氏説見前藍田吕氏曰自稱曰孤又下於王老也春秋楚子稱不榖從其稱也齊桓公對楚屈完稱不榖以自卑之辭荅楚也魯弔宋災宋閔公稱孤傳云列國有凶稱孤禮也亦自貶之稱也金華邵氏曰五官致貢曰享以下至此皆因其人而定其所稱之名蓋名正則言順言順則事成聖人所以汲汲於此者非較輕重於一言一字之間也天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝鄭氏曰諸侯春見曰朝受摰於朝受享於廟生氣文也秋見曰覲一受之於廟殺氣質也朝者位於内朝而序進覲者位於廟門外而序入王南面立於依宁而受焉夏宗依春冬遇依秋春秋時齊侯唁魯昭公以遇禮相見取易略也覲禮今存朝宗遇禮今亡孔氏曰此一節論諸侯四時朝覲宗遇之法依狀如屛風以絳為質髙八尺東西當戶牖之間繡為斧文也亦曰斧依故覲禮云天子設斧依于戶牖之間鄭註如今綈素屏風有繡斧文所以示威也爾雅云戶牖之間謂之依天子設依於廟堂戶牖之間見諸侯則依而立負之而南面以對諸侯也其禮諸侯來朝至於近郊王使大行人皮弁用璧以迎勞之諸侯亦皮弁從使者以入天子賜舎諸侯受舎聽天子之命其朝日未出之前諸侯上介受舎于廟門外同姓西面北上異姓東面北上至朝日質明諸侯裨冕先釋幣於其齊車之行主天子衮冕在廟當依前南面而立不迎賓諸侯自廟門外位天子使上擯進諸侯諸侯入廟門右坐奠圭玉而再拜所以奠圭玉者卑見於尊奠贄不授也擯者命升西階親授諸侯於是坐取圭玉升堂王受玉是當依而立之時也王既受玉諸侯降階並北面再拜稽首擯者延之使升成拜是北面曰覲所以同北面者覲遇秋冬隂殺之時其氣質斂故并於一處受之不布散也當宁而立此為春夏受朝時也宁者爾雅云門屏之間謂之宁郭註云人君視朝所宁立處李廵云正門内兩塾間曰宁謂天子受朝於路門外之朝於門外而宁立以待諸侯之至故云當宁而立也然路門外有屏者即樹塞門是也爾雅云正門謂之應門屏謂之樹李廵云垣當門自蔽名曰樹郭云小墻當門中今案李郭二註以推驗禮文諸侯内屏在路門之内而近應門矣王既立宁諸侯次第而進諸公在西諸侯在東而朝王此是春朝之禮陽生之時其氣文舒而布散故分於兩處受也地道尊右故諸公在西也鄭謂朝者位於内朝而序進者此内朝即路門外朝也對臯門内三槐九􅁄之外朝故稱内也若對路寢又為外故文王世子云朝于外朝則以官是也諸侯入廟門更服朝服執贄入應門而行禮故王當宁以待諸侯次第而進故曰序進覲位于廟門外而序入者其宿受位次在廟門外至上擯進之乃於位次第而入故云序入也當依當宁王皆南面夏宗依春冬遇依秋者隂陽同各相依也鄭註周官宗伯云朝猶朝也欲其來之蚤宗尊也欲其尊王覲之言勤也欲其勤王之事遇猶偶也欲其若不期而俱至通而言之悉曰朝從初受名藍田吕氏曰自此至曰盟言朝覲㑹同聘問盟誓之所以名也古者謂相見曰朝相問曰聘臣見於君子見於親賤見於貴皆謂之朝以朝暮别之則朝見曰朝暮見曰夕以春秋别之則春見曰朝秋見曰覲然考之舜典二月東廵守肆覲東后則春亦曰覲蓋朝覲互名至周始以春秋别之又有夏宗冬遇以備四時之朝又曰春朝以圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮則四者非獨時異事亦異矣此章天子之立有當依當宁之别其朝位有諸侯北面及諸公東面諸侯西面之别則朝覲之禮非獨事異儀亦異矣長樂陳氏曰依即扆也宁即著也周禮司几筵凡大朝覲王位設黼依依前南郷覲禮天子衮冕負斧依明堂位天子負斧依南郷而立則天子於朝覲未嘗有當宁之禮司士正朝儀之位王南郷三公北面孤東面卿大夫西面朝士掌建邦外朝之法左九􅁄孤卿大夫位焉右九􅁄公侯伯子男位焉面三槐三公位焉明堂位三公北面諸侯西面諸伯東面諸子東北面諸男西北面特射人掌羣臣見王之位諸侯北面焉則諸侯之於朝覲未嘗有北面之禮記之所言非周制也古者冠禮冠于廟聘禮享于廟禘而發爵服嘗而出田邑發秋政出而治兵入而䇿勲莫不一於廟凡以尊重事不敢輕之已矣豈獨覲禮然哉又曰古者門皆有屏天子設之於外諸侯設之於内禮䑓門而旅樹旅道也當道而設屏此外門之屏也治朝在路門之外天子當宁而立宁在門屏之間此路門之屏也國語曰呉王背手而立夫人向屏此寢門内之屏也魯廟䟽屏天子之廟飾此廟門之屏也月令天子田獵整設于屏外此田防之屏也䟽屏䟽通之也禮書嚴陵方氏曰以其一於北面故通謂之諸侯以其分於東西故有公侯之異稱也東面則位於右西面則位於左虙氏曰禮之所言蓋夏殷之制也然夏殷之制覲禮必當依而立者秋主揫斂故入而當依春主發散故出而當宁順天氣也諸公東面諸侯西面者諸公位尊故立於西以賔禮待之也諸侯位卑故立於東臣統於君也凡此皆在治朝之儀而已鄭康成以謂朝者位於内朝而序進覲者位於廟門外而序入且言朝則受贄於朝受享於廟覲則一受之於廟此乃泥於覲禮之文事畢又肉袒於廟門之東故強立此說夫以記禮所言皆非周制而強以儀禮釋之不亦膠乎廣安游氏曰夫禮不可一端盡也不有君臣相臨之禮則無以見大君之尊不有賔主相與之禮則無以見同姓異姓親親之恩夫諸侯之中有伯父焉有叔父焉有伯舅焉有叔舅焉有兄弟焉有昏姻焉三王家天下所恃以為天下者不獨恃其利勢也天子以親親之恩而臨諸侯諸侯亦以親親之恩而報天子上下相睦同奬一姓所以數百年長久安寧而無患由此之故且尊卑之分不統於一聖人固以為不可天子之尊諸侯之卑其自然之分固也然諸父兄弟舅甥昏姻相去之逺而乆不相見於其來朝忘親親之恩専以分臨之聖人之心無乃有所不安於此此親親之恩賔主之禮所以行於春朝而異於覲禮之受於廟而臣皆北面也此三代之至文聖人待諸侯之禮備矣江陵項氏曰朝以行禮覲以獻功行禮則異等威辨儀物盛朝㑹之禮以示衆庶故君於外而立臣分班而見也獻功則南面而聽治北面而致之故受之於内而一其向也朝者正禮之名覲主於見而已或以明堂位天子當依而諸侯分班遂疑曲禮為夏殷之制此漢儒遯辭也明堂位之辭不可盡信但亦當存之以備參考耳諸侯未及期相見曰遇相見於郤地曰㑹諸侯使大夫問於諸侯曰聘約信曰誓涖牲曰盟鄭氏曰及至也郤閒也涖臨也坎用牲臨而讀其盟書聘禮今存遇㑹誓盟禮亡誓之辭尚書見有六篇孔氏曰若未至前所期之日及非所期之地而忽相見則並用遇禮相接故曰遇以遇禮簡易也㑹謂及期之禮卻閒也既及期又至所期之地則其禮閒暇也遣大夫徃相存問則曰聘聘問也約信者以其不能自和好故用言辭共相約束以為信知此則用誓涖牲者盟所用也涖臨也盟者殺牲㰱血誓於神也若約束而臨牲則用盟禮皆諸侯事也盟之為法先鑿地為方坎殺牲於坎上割牲左耳盛以珠槃又取血盛以玉敦用血為盟書成乃㰱血讀書知坎血加書者見僖二十五年左傳又襄二十六年㰱用牲加書是也知用耳者戎右云賛牛耳馘用左耳故知用左也知珠槃玉敦者戎右以玉敦辟盟又玉府共珠槃玉敦是也知口㰱血者襄九年左傳云新與楚盟口血未乾是也盟牲所用據韓詩云天子諸侯以牛豕大夫以犬庶人以雞又毛詩說君以豕臣以犬民以雞又左傳鄭伯使卒出豭行出犬雞以詛射潁考叔者又云衛伯姬盟孔悝以豭而戎右云賛牛耳又左傳云諸侯盟誰執牛耳然則人君盟當以牛也藍田吕氏曰㑹遇聘問誓盟皆諸侯之禮也古者諸侯無事則相朝不相朝則相㑹不相㑹則聘有大事則天子方伯誓之皆所以講信修睦以交四鄰者也盟詛之事其起於衰世乎先王之治諸侯命方伯連帥以統制之同志協慮以勤王事有不帥者則奉王命以討之雖有盟詛且將安用及王政不行大不字小小不事大天下解弛不相維持伯者於是假仁義之事帥諸侯以事天子約不深則情不齊於是盟詛焉政雖不自天子出猶有至公同好之情故葵丘之盟足以合天下諸侯猶無異心五伯既衰則結私黨執私仇心不同而要之於神雖盟不信此大亂之道也周官雖有司盟之官疑非治世之事也諸侯惡其害己而去其籍非特去也附益者有焉此詩所以非屢盟春秋之書盟所以多譏也時有緩遽則儀有詳略故㑹禮詳而遇禮略也問有大小則文有隆殺故諸侯使大夫問於諸侯曰聘小聘曰問也誓有輕重則約有淺深故誓約之淺盟約之深也期而相見曰㑹日有期地有所也卻地者竟上之地也其時緩則禮冝詳也不期而相見曰遇如邂逅適相遇然日無期地無所其時遽則禮冝略也公羊傳齊景公之唁魯昭公以人為菑以幦為席以鞍為几以遇禮相見遇禮非皆然也其略有如此者乆無事曰聘聘大禮也小聘曰問禮有殺也約信曰誓古者舉大事以齊衆皆有誓舜征有苖禹誓于師啓伐有扈以誓于師湯誓泰誓費誓秦誓皆有書周官則祭祀師役莫不誓也長樂陳氏曰盟㑹或衆遇不必衆春秋公及宋公遇于清宋公衛侯遇于垂是遇不該於衆也周禮有盟邦國有盟萬民春秋有諸侯㑹有大夫㑹有兵車㑹是盟㑹有大小而該於衆也先王之時結民以忠信誠慤之心維邦國以比小事大之禮然而㑹遇盟誓之禮未嘗弛於天下將使夫人明則知好惡幽則知信畏然後天下為一家而無異俗中國為一人而無殊心則㑹遇盟誓之輔於敎也豈不懿哉若夫㑹而民畔誓而民疑則非㑹誓之過也作㑹誓之罪也今夫聦明出於性好惡出於心作聦明亂舊章則好惡不足以遵王之道路又況作誓㑹者哉荀卿不知乎此以為誥誓不及五帝盟詛不及三王誤矣又曰周禮有盟有詛則盟詛固有大小矣玉府若合諸侯則共珠槃玉敦戎右以玉敦辟盟賛牛耳桃茢封人凡賔客軍旅大盟飾牛牲其未殺也飾以文繡其殺也寘之於坎加書其上槃以盛耳敦以盛血尸之者執耳大者先㰱小者亞之有玉帛以禮明神有桃茢以袚不祥既盟則以盟書登於天府大史内史司㑹及六官皆受其貳而蔵之然則司盟共祈酒脯則既殺以盟於前又用酒脯以祈於後也王廵守之盟其神主日諸侯之盟其神主山川王官之伯㑹諸侯其神主月周禮左傳天子諸侯之盟皆執牛耳而衛太子蒯瞶與伯姬輿豭以盟蓋下人君之禮也然盟詛皆坎牲加書以告明神其異者盟有執耳㰱血既盟有祈而詛無是也春秋之盟有適一時之急而不用牲者若孟任割臂以盟莊公華元登楚子反之牀子反懼而與之盟此皆假行其禮而不用牲也春秋之盟或尋或同或乞或要或逃或渝或盟君以大夫或辱人以城下日以長亂莫之或熄皆先王之罪人也禮書嚴陵方氏曰遇者見而非約故未及期相見曰遇而與周官冬見之遇異矣㑹者衆之所聚故相見於卻地曰㑹而與周官時見之㑹異矣聘言有所與故使大夫問曰聘而與王制比年之聘異矣蓋冬見之遇時見之㑹比年之聘諸侯之所以事天子也未及期之遇與卻地之㑹使大夫之聘諸侯之所以交鄰國也此其所以為異廣安游氏曰古者諸侯朝聘㑹盟之禮不可以闕一也傳曰歳聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不明不明棄共百事不終所由傾覆也蓋朝聘㑹盟所以經其事序其經共其序明其共者也故歳聘以志業聘禮苟廢是謂有事而無業事則不經閒朝以講禮朝禮苟廢是謂有業而無禮經則不序再朝而㑹以示威㑹禮苟廢是謂有禮而無威序則不共再㑹而盟以顯昭明盟禮苟廢是謂有威而不昭明共則不明不明則棄其共不共則棄其序不序則棄其經不經則棄其事所以百事不終所由傾覆者為此言朝聘㑹盟之不可闕一也三代之時天子之臨諸侯有朝焉有㑹焉有聘焉朝者諸侯朝於天子也聘者諸侯使大夫聘於天子也㑹者天子㑹諸侯於所期之地有盟焉有誓焉此天子諸侯朝聘㑹盟之禮也此經則諸侯朝㑹誓盟之法也此經於天子言朝覲而不言聘㑹誓盟於諸侯言聘㑹誓盟而不言朝互相備也諸侯之事天子以尊卑言之其禮主於朝有時不朝則有聘諸侯之相與以其等言之其禮主於聘以聘為未足則有朝此經以禮之所主言也先王盛時朝聘㑹盟之禮上不絶於天子之所下不絶於諸侯之國小大相維逺近相師考禮正刑一德以尊於天子此所以長乆安寧而無後患也榖梁謂誥誓不及五帝盟詛不及三王其實三王有盟矣惟其當時太平上下和睦諸侯軌道故盟府之禮虚而不用兵車之㑹禮有之也然不以兵車齊桓有焉盟府之書禮有之也然盟詛之所不及則三王有焉榖梁所謂盟詛不及三王而此經有盟者其說蓋如此也相見於卻地謂㑹於閒卻之地不以病夫主國之人也齊桓公之伐楚也師出於陳鄭之間其人以為甚病假如晉楚㑹諸侯于宋于虢以義推之則虢宋兩國受其供億之病故㑹於卻地為此也禮記集説卷十二
