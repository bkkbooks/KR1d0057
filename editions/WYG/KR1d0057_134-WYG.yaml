body:
  text: 禮記集説卷一百三十四宋衛湜撰故至誠無息不息則久久則徴徴則悠逺悠逺則博厚愽厚則高眀博厚所以載物也高明所以覆物也悠久所以成物也博厚配地高明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡也其為物不貳則其生物不測天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉詩曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之徳之純蓋曰文王之所以為文也純亦不已鄭氏曰徴猶效驗也此言至誠之道著於四方其髙厚日以廣大也徴或為徹可一言而盡要在至誠也為物不貳言至誠無貳乃能生萬物也昭昭猶耿耿小明也天之髙明本生昭昭地之博厚本由撮土山之廣大本起卷石水之不測本從一勺皆合少成多積小至大為至誠者亦如此乎振猶收也卷猶區也引詩者言天所以為天文王所以為文皆由行之無已為之不止如天地山川之云也孔氏曰前欲明積漸先悠久後能博厚髙明下言既能博厚髙明又須行之長久謂至誠之徳也天之與地清濁二氣所分非是以小至大今以天地體大假言由小而來以譬至誠非實論也所引詩者周頌維天之命文也蓋曰以下是孔子之言河南程氏曰維天之命於穆不已此是理自相續不已非是人為之如使可為雖有萬般安排也須有息時只為無為故不息中庸言不見而章不動而變無為而成天地之道可一言而盡也伊川問義還因事而見否曰非也性中自有或曰無狀可見曰説有便是見但人自不見昭昭在天地之中也且如性何須待有物方指為性性自在也賢所言見者事頤所言見者理如曰不見而章是也伊川又曰子在川上曰逝者如斯夫不舎晝夜自漢以來儒者皆不識此義聖人之心純亦不已純亦不已是乃天徳也有天徳便可語王道其要只在慎獨眀道又曰天命不已文王純於天道亦不已純則無二無雜不已則無閒斷先後又曰詩曰上天之載無聲無臭儀刑文王萬邦作孚上天又無聲臭之可聞只看文王便萬邦取信也又曰維天之命於穆不已蓋曰天之所以為天也文王之徳之純盖曰文王之所以為文也然則文王之徳直是似天昊天曰明及爾出王昊天曰旦及爾游衍只為常是這箇道理此箇亦須待他心熟便自然別藍田吕氏曰實理不貳則其體無雜其體不雜則其行無閒故至誠無息非使之也機自動耳乃乾坤之所以闔闢萬物之所以生育亘萬古無窮者也如使之則非實非實則有時而息矣久者日新無敝之謂也徴驗也悠逺長也天地運行而不息故四時變化而無敝日月相從而不已故晦朔生明而無敝此之謂不息則久四時變化而無敝故有生生之驗晦朔生明而無敝故有照臨之驗此之謂久則徴生生也照臨也茍日新而有徴則可以繼繼其長至於無窮矣此之謂徴則悠逺悠逺無窮者其積必多博者能積衆狹厚者能積衆薄此之謂悠逺則博厚有如是廣博則其勢不得不髙有如是深厚則其精不得不明此之謂博厚則髙明博厚則無物不能任也髙明則無物不能冐也悠久則無時不能養也所謂配地配天無疆者以形而上者難明故以形而下者明之也配之為義非比類之謂也天道至著常以示人故萬象紛錯終古不變蓋已成而明者也故曰不見而章一闔一闢天機自然無作無息以生萬變蓋神而化之者也故曰不動而變至誠不息日新無窮萬物之成積日之養而已蓋為物不貳者也故曰無為而成所以載物覆物成物者其能也所以章所以變所以成者其功也能非力之所任功非用而後有其勢自然不得不爾是皆至誠不貳而已此天地之道所以一言而盡也天地所以生物不測者至誠不貳者也天地所以成者積之無疆者也如使天地為物而貳則其行有息其積有限昭昭撮土之微將下同乎衆物又焉有載物覆物成物之功哉雖天之大昭昭之多而已雖地之廣撮土之多而已山之一卷水之一勺亦猶是矣其所以髙明博厚神明不測者積之之多而已今夫人之有良心也莫非受天地之中是為可欲之善不充之則不能與天地相似而至乎大大而不化則不能不勉不思與天地合徳而至於聖然所以至於聖者充其良心徳性純熟而後爾也故曰過此以徃未之或知也窮神知化徳之盛也如指人之良心而責之與天地合徳猶指撮土而求其載華嶽振河海之力指一勺而求其生蛟龍殖貨財之功是亦不思之甚也天之所以為天不已其命而已聖人之所以為聖不已其徳而已其為天人徳命則異其所以不已則一故聖人之道可以配天者如此而已建安游氏曰至誠無息天行徤也若文王之徳之純是也未能無息無不息者君子之自強也若顔子三月不違仁是也不息則可久非日月至焉者也故曰不息則久久則根於心而施於四體四體不言而喻故曰久則徴不息而有徴則其行將與天同運其立將與地同處故曰徴則悠逺夫如是則下與地同徳上與天同道矣故悠久則博厚博厚則髙明博厚如地故能任天下之重是所以載物髙明如天故能冐天下之道是所以覆物博厚而不久則載物之徳墮矣髙明而不久則覆物之道闕矣是則悠久者天地所以成終成始也故所以成物誠至於此則非人為所能及也天徳而已矣故未施敬於民而民敬之是不待見而章也未施信於民而民信之是不待動而變也夫何為哉恭己正南靣而已矣是無為而成也由此觀之天覆地載而聖人所以成天地之功者至誠而已故曰天地之道可以一言而盡也其為物不貳則其生物不測者此又申言天地之道可盡於一言也其為物不貳天地之徳一也一則不已故覆載萬物雕刻衆形而莫知其端也故曰生物不測聖人所以參天地而應無方亦若此而已博厚也髙明也悠久也此不貳之實也至於昭昭之無窮則日月星辰繫焉撮土之廣厚則載華嶽而不重振河海而不洩此生物不測之驗也非特天地為然如山之廣大則寳藏興焉況載華嶽者乎水之不測則貨財殖焉况振河海者乎載物者猶然况覆物者乎故天地之所以為天地文王之所以為文王皆原於不已純者不已之謂也然則一言而盡豈不信乎延平楊氏曰誠自成非有假於物也而其動以天故無息無息者誠之體也不息所以體誠也日月之運行寒暑之往來無終窮也非久乎四時行焉百物生焉非徴乎徴則悠逺言其久而不禦也故下云悠久無疆不言悠逺者蓋推本之也逺而不禦則其極也博博而無不容故其積也厚厚故髙髙則物莫能蔽也故明自不息積而至於博厚髙明則覆載成物之能事備矣其用則不可得而見也故以配天地無疆言之所以著明之也然天地之道聖人之徳其為覆載成物之功則無二致焉故又曰天地之道可一言而盡也所謂一言者誠而已互相明也精一而不貳故能生物不測不誠則無物矣天之無窮昭昭之積也地之廣厚撮土之積也山之廣大卷石之積也水之不測一勺之積也天地之道博也厚也髙也明也悠也久也而誠一言足以盡之不息之積也若夫擇善而不能固執之若存若亡而欲與天地合徳其可乎故又繼之天之所以為天文王之所以為文皆原於不已所以徴前説也河東侯氏曰自鬼神之為徳至時措之宜皆誠也至誠之道也以體言之則一也以用言之則合萬殊其事若不同者各有妙用存焉至於言誠則曰無息而已乾之象曰天行徤君子以自強不息不息乾之剛徤也惟其不息故能時乗六龍以御天御天當天運也故能久久則四時行焉故徴徴則百物生焉徴信也驗也既徴則博厚髙明悠久可馴致也博厚所以載物坤之徳也髙明所以覆物乾之道也悠久所以成物乾坤之功也悠久與悠逺不同悠久是二事博厚所以配地髙明所以配天悠久所以無疆也配合也與孟子配義與道之配同天地隂陽二物也運動天地使之成物而不息者誠也故曰至誠無息如此者不見而章不動而變無為而成天地之道所以一言而盡者誠也為物不貳無為而成不貳專也一也貳則非誠也誠本不可以有無言云無息與不息同也不息則或息矣至誠則未嘗息亦未嘗不息惟其至誠也然後有不息以下六字不誠安能不息哉無息非為誠言為息字設而所以形容誠也明道先生曰亦無始亦無終亦無因甚有亦無因甚無亦無有處有亦無無處無此言極有理如此則可以言誠矣又曰天地之道博厚髙明悠久者誠而已天之昭昭誠而不息則覆物無窮地之撮土誠而不息則載物廣厚山之卷石誠而不息則興物廣大水之一勺誠而不息則生物不測詩曰維天之命於穆不已天命之不已誠也文王之誠純亦不已也純則無二無雜故亦無不已不已則無閒斷先後此文王之天德也故曰天之所以為天也於乎不顯文王之徳之純純亦不已新安朱氏曰此第二十六章言天道也至誠無息者既無虚假自無閒斷久常於中也徴驗於外也悠逺博厚髙明此皆以其驗於外者言之鄭氏所謂至誠之徳著於四方者是也存諸中者既久則驗於外者益悠逺而無窮矣悠逺故其積也廣博而深厚博厚故其發也髙大而光明悠久即悠逺兼内外而言之也本以悠逺致髙厚而髙厚又悠久也此言聖人與天地同用配地配天言聖人與天地同體見猶示也不見而章以配地而言也不動而變以配天而言也無為而成以無疆而言也天地之道可一言而盡不過曰誠而已不貳所以誠也誠故不息而生物之多有莫知其所以然者此以下復以天地明至誠無息之功用也博也厚也髙也明也悠也久也言天地之道誠一不貳故能各極其盛而有下文生物之功天之昭昭此指其一處而言之及其無窮也猶十二章及其至也之意蓋舉全體而言之振收也卷區也此四條皆以發明由其不貳不息以致盛大而能生物之意然天地山川實非由積累而後大讀者不以辭害意可也於乎不顯於歎辭穆深逺也不顯猶言豈不顯也純純一不雜也引此以明至誠無息之意此章諸家之説最為繁雜如游楊無息不息之辨恐未然若如其言則不息則久以下至何地位然後為無息耶游氏又以得一形容不貳之意亦假借之類也字雖密而意則䟽矣吕氏所謂不已其命不已其徳意雖無爽而語亦有病蓋天道聖人之所以不息皆實理之自然雖欲已之而不可得今曰不已其命不已其徳則是有意於不已而非所以明聖人天道之自然矣又以積天之昭昭以至於無窮譬夫人之充其良心以至於與天地合徳意則甚善而此章所謂至誠無息以至於博厚髙明乃聖人久於其道而天下化成之事其所積而成者乃其氣象功效之謂若鄭氏所謂至誠之徳著於四方者是己非謂在己之德亦待積而後成也故章末引文王之詩以證之夫豈積累漸次之謂哉若如吕氏之説則是因無息然後至於誠由不已然後純於天道也失其㫖矣楊氏動以天故無息之語甚善其曰天地之道聖人之徳無二致焉故方論聖人之事而又曰天地之道可一言而盡盖未覺其語之更端耳至謂天之所以為天文王之所以為文皆原於不已則亦猶吕氏之失也大抵聖賢之言内外精粗各有攸當而無非極致近世諸儒乃或不察乎此而於其外者皆欲引而納之於内於其麤者皆欲推而致之於精若致曲之明動變化此章之愽厚髙明蓋不勝其繁碎穿鑿而於其本指失之愈逺學者不可不察也髙厚人之形體悠久人之元氣本以悠久致髙厚而髙厚又悠久也又曰天斯昭昭是指其一處而言及其無窮是舉全體而言嵩山晁氏曰誠明之極配天地而一之也誠斯一也一斯誠也此蓋當云徴則博厚博厚則髙明髙明則悠逺考下文而不誣也夫言天地之體則髙明博厚而足矣人之體乎天地之髙明博厚則必待悠久以為之中也蓋非悠久之中則其髙明將墮博厚將蹶也博厚髙明譬諸形體也悠久譬諸精神也曾子曰君子尊其所聞則髙明矣行其所知則廣大矣髙明廣大不在於他在加之意而已矣曾子所謂至者子思所謂悠久是也曰悠逺曰悠久其實同也夫不見不動無為者中也既章既變既成則亦中也此不貳之道也説之莆陽林氏曰物者事物之物今人做一件事徹頭徹尾若不是誠如何恁地做得此君子所以有貴於誠也如易所謂貞固足以幹事同意凡物之章著必顯見而後章今則不見而章物之變化必動而後變今則不動而變物之成遂必為而後成今則不為而成故天地之道可一言而盡者惟實理而已天地之為物也正體不變純一而不雜也太極既判以來至於今日正體未嘗變故四時行焉百物生焉生生不窮之實理何嘗有閒斷耶易曰乾元亨利貞坤元亨利牝馬之貞是天地之貞體不變也貞體不變即所謂至誠無息也此其所以不貳也萬象森羅皆從一中出若得這一字則天清地寧以至聖人之道可黙識而心通矣其生物不測如楊子所謂天俄而可度則其覆物也淺矣地俄而可測則其載物也淺矣惟其不可測度此所以博厚髙明悠久也山水謂可積而成天地何假於積哉盖易謂太極生兩儀兩儀生四象四象生八卦自有太極便有兩儀四象八卦不是有兩儀方有四象四象方有八卦今繫易如此云云者蓋欲發揮古語使其辭暢故也故理義無害今欲説下文聖人非由一朝一夕之積故以天地山水為言是發揮古説者也文王之徳之純至純亦不已云者以言聖人非由一朝一夕之積其所由來者久矣故亦無窮已也涑水司馬氏曰一言而盡即為物不貳也於穴隙之閒窺天不過昭昭之多以手撮地不過撮土之多初陟山足不過卷石之多觀水之原不過一勺之多及窮其髙厚究其幽逺然後知其逺大也猶聖賢盡誠於小善日新不已乃至於聖德也海陵胡氏曰誠故無休息無休息故能久於其道能久於其道則其德著驗則可以施於久逺能施久逺則德業深固而博厚既博厚則功髙明以博厚言之則配地以髙明言之則配天以悠久言之則可以傳之無窮施之罔極聖人能如此心不欲功之顯而自然章著身無所動作而民自然從上無所營為而治道自成皆至誠而然也物謂誠也天地以至誠純一不貳之徳乃能生育萬物不可測量舉目而視天目之所見不過昭昭之多甚小也及究其無窮日月之所繫著萬物之所覆燾臨照無有遺者誠故也舉足而履地足之所著不過一撮土之多及究其廣大承載華嶽而不重振起河海而不洩萬物皆承載而無窮者誠故也於歎嗟之辭髙要譚氏曰人所以與天地並者至誠而已實理在我已極其至則日用之閒動静語黙此理常行乎其閒無有閒斷是之謂至誠無息言誠之至者自然無息也人欲求誠之至當自不息始既不息矣是以能久而不窮既能久矣是以有徴而可驗所謂有徴而可驗者如盡己之性盡人之性盡物之性等事皆輝光發見煥然而不可揜也既有徴矣悠逺愽厚髙明有不期然而然者夫何故以其愈至而愈不息故愈博愈厚愈髙愈明愈悠愈久而莫知其所終窮也博厚髙明者人道成就之全體故能覆載萬物而配乎天地悠久者人道無窮之妙用故能曲成萬物而進乎無疆蓋人道至於髙明博厚固無可與倫比者矣而不息之機猶亹亹不已如是又何加焉悠久之中自然顯出至神有不可測度者故不見而章不動而變無為而成皆至神所為不可測度之事也自不息積而至此方見至誠無息之與天地並也人之所以克配天地者一本於誠之不息天地之所以髙明博厚悠久者亦不出於此道而已故天地之道可以一言盡者其唯不貳乎不貳云者純始純一無有間斷之謂也唯其如是所以日進而不已昭昭一撮一卷一勺之多始雖甚微久久遂有覆載髙深之體無足疑者如是而愈不已則神化不測之妙皆由此出也故能覆能載則天地之體大能悠能久則天地之用神人之道至於博厚配地髙明配天是其體之全也此乃大人之事若夫悠久無疆則其用進乎妙矣此乃聖神之事天地與人之道皆自至誠不息中得之無異理也故天之所以為天者以其命之不已如使其或己則所以覆物者有時而窮矣文王之所以為文者以其純一不已如使其或己則所以配天者亦有時而窮矣吴興沈氏曰無息者至誠之本體不息者至誠之妙用不息則有常而不已故不息則久能久則立見參於前在輿則倚於衡故久則徴有徴則彌满六合著見四極故徴則悠逺悠逺則積而在下者愽厚也形而在上者髙明也就天地閒所髙厚者配之則誠之博厚足以配地誠之髙明足以配天天地猶有形也無疆則超天地之外無有畔岸惟悠久配之悠久蓋誠之本體也至此則復吾自然之誠寂然不動感而遂通天下之故則不見而章不動而變無為而成蓋必然之理天地雖大不外乎此前既歴言誠之妙用未見夫誠者果何物也又指誠之真體以示人如曰誠之所以能覆物載物變化不窮者以其為物不貳而己天下之理惟不與物耦者然後能生生化化古人謂之凝獨者此也誠之為物精純虚一無作無息無始無終所謂不貳也惟其如是故生己生人生天生地始而終終而始運轉周流無有窮已夫是之謂生物不測也前既言博厚髙明悠久可以配天地至此又申言誠之所以為博厚髙明悠久者自不息之積天地之所以博厚髙明悠久者亦不息之積故詳言天地閒不息之積以證吾至誠之亦如是也天以不息故其無窮也繫日星覆萬物地以不息故其廣厚也載華嶽振河海載萬物山自卷石不息故其廣大則生草木居禽獸興寳藏水自一勺不息故其不測也生魚龍殖貨財凡若是者皆積小至髙積微至明著不已之效也天地山川之積如此而聖人之不已如是也故援詩以證不已即不息也不息即誠也新定顧氏曰此章子思子之於道極其稱贊之辭也夫有是理謂之至誠則至誠云者子思子所以名此道也由是曰無息曰久曰徴曰悠逺曰博厚曰髙明皆稱贊之辭也夫不息則久久則徴徴則悠逺悠逺則博厚博厚則髙明非謂其有次序必若彼而後能若此也蓋謂之不息則固久矣久則固徴矣徴則固悠逺悠逺則固博厚博厚則固髙明要之同為贊至誠之辭立文造辭不得不然而豈有次序者哉請嘗試論之至誠之道無聲無臭無方無體不可得而見也即其發形者而觀之天地之覆載日月之運行四時之推移萬物之化生機緘之運無須臾停則不息可見亘千古而無終窮則久可見此道顯然有心知者皆可識也則所謂徴也極宇内而無不在非有此疆爾界之限即所謂悠逺也俯而察之其下非有所窮極則所謂博厚者也仰而觀之其上亦非有所窮極則所謂髙明者也既曰博厚矣則萬物實此道之所載也故曰博厚所以載物也既曰髙明矣則萬物實此道之所覆也故曰髙明所以覆物也夫物之成也非必寸地尺天之所能成亦有待於悠逺而後能成非必一時一日之所能成亦有待於久而後能成故曰悠久所以成物也博厚配地云者人知地之為博厚而豈知此道之為博厚也哉故子思言此道之博厚與地相配髙眀配天云者人知天之為髙明而豈知此道之為髙明也哉故子思言此道之髙明與天相配配地配天云者猶大傳所謂與天地準也要之地之博厚天之髙明猶未足以喻此道之博厚髙明也言其悠久而曰無疆則其無封域無終窮者抑可知矣如此者不見而章不動而變無為而成蓋道者自然之理非有意於章而不能以不章非有意於變而不能以不變非有意於成而自爾成顯然昭著者章也循環代謝者變也有功可指者成也是則章也變也成也皆此道之妙用自然而然豈若人之求見動有為而致之者哉新定錢氏曰人見其章也而實不見也人見其變態萬狀也而實不動也人見其無所不成也而實未嘗有所為也舜受堯禪庶務衆職從頭整頓若不勝其繁矣而曰無為禹乘四載八年於外三過其門而不入若不勝其多事矣而曰行其所無事文王受命伐犬戎伐密須敗耆國伐邗伐崇而又作邑遷都若不勝其擾擾矣而曰不識不知嗚呼此豈囿形泥象者所可知哉江陵項氏曰此章言性者之道德無窮下章言教者之事業無窮久以時言悠逺以地言博厚以業言髙明以徳言歴時之久及物之逺故其業愈廣而德愈崇業廣德崇則愈能悠久始於悠久終於悠久此所謂至誠無息也無息者理也不息者人也無疆者如天地之無盡處無已時也又曰不貳者博厚髙明悠久也不測者不見而章不動而變無為而成也又曰章者始著於外變者漸入於人成則治道成矣永康陳氏曰至誠無息運動不能自已也其為物不貳則生物不測一故生生則烏可己昭昭無非天撮土無非地卷石無非山一勺無非水一曲無非誠不能積之均棄物也孟子曰日月有明容光必照焉此至誠所以無息子思發明詩人之意謂純亦不已以明文王即天天與文王只是至誠不已便是無息延平周氏曰言天地而復言山與水者天地之所結者莫大乎山而所融者莫大乎水故復言之以喻其悠久之道也山非無貨財以興寳藏為主水非無寳藏以殖貨財為主錢塘于氏曰四條皆以今夫言之蓋指今人見天地山川其所多者若甚微而不知其實甚大於此以表天地之道誠為博厚髙明悠久不可以其所見者之多而謂其止於此而已也天斯昭昭小明也若曰見其小明者微也其大者不止是他皆類此晉陵錢氏曰載物以天下為己任也覆物善惡無不容也成物久於其道而天下化之也悠久則配天之無疆其為物不貳謂誠生物不測謂博厚髙明悠久此一節謂誠本成己乃所以成物昭昭之多户牖閒所見也六十四黍為圭四圭為撮撮以指撮取也華中華嶽四嶽也謂中華之地四嶽之山也振猶撼也雖振撼之水亦不洩卷猶塊也謂塊石卷攣然也寳藏玉石之類勺飲器以挹取也黿如鼈而大鼉如魚而有四足蛟如龍而無角此一節以天地山川喻人之一言一行皆誠也所謂至誠惟在不已臨川王氏曰於乎不顯文王之徳之純傳註以為文王之德非不顯也此固不然此言文王之徳純粹不露人不可得而見如詩之遵養時晦易之内文明而外柔順孟子曰文王視民如傷望道而未之見此皆言文王之守其德而不顯也此其所以為文王也純亦不已者所以通上句言文王之所以為文王以其守之以至誠純而不窮已亦如天之髙明不已也蓋周家惟文王受命作周積徳無窮故詩曰周家世世修徳莫若文王又曰不識不知順帝之則又曰陟降庭止在帝左右凡詩之美文王皆美其至誠不已也建安真氏曰純亦不己純是至誠無一毫人偽之雜也惟其純誠無雜自然能不已如天之春而夏夏而秋秋而冬晝而夜夜而晝循環運轉一息不停以其誠也聖人之自壯而老自始而終無一息之懈亦以其誠也既誠自然能不已嚴陵喻氏曰曰昭昭曰撮土曰卷石曰一勺指一端之小者以為言也曰無窮曰廣厚曰廣大曰不測舉全體之大者以為言也始言其小而終極其大姑以明其由不貳以致不測之㫖非真謂天地山川必由積累而後盛大也讀者毋以辭害意大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千待其人而後行故曰茍不至德至道不凝焉故君子尊徳性而道問學致廣大而盡精微極髙明而道中庸温故而知新敦厚以崇禮是故居上不驕為下不倍國有道其言足以興國無道其黙足以容詩曰既明且哲以保其身其此之謂與鄭氏曰育生也峻髙大也凝猶成也德性謂性至誠者道猶由也問學學誠者也廣大猶博厚也温讀如燖温之温謂故學之熟矣後時習之謂之温其言足以興謂興起在位也保安也孔氏曰自大哉至不凝焉明聖人之道髙大茍非至德其道不成洋洋謂道徳充滿之貌優優充裕之貌周禮有三百六十四官言三百舉成數耳儀禮雖十七篇其中事有三千尊德性至崇禮明賢人學而至誠也左傳哀公十二年子貢曰盟可尋也亦可寒也註云尋温也又有司徹云乃燅尸俎是燖為温也居上不驕而下明賢人學至誠之道中庸之行若國有道則竭盡知謀其言足以興成其國若國無道則韜光潛黙足以自容其身免於禍害所引詩大雅烝民之篇河南程氏曰自大哉聖人之道至至道不凝焉皆是一貫又曰中庸言禮儀三百威儀三千方是説優優大哉又却非如異教之説須得如枯木死灰以為得也又曰德性者言性之可貴與言性善其實一也又曰須是合内外之道一天人齊上下下學而上達極髙明而道中庸又曰極髙明而道中庸非二事中庸天理也天理固髙明不極乎髙明不足以道中庸中庸乃髙明之極也又曰理則極髙明行之只是中庸也横渠張氏曰天體物而不遺猶人體事而無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾游衍無一物之不體也又曰不尊德性則問學從而不道不致廣大則精微無所立其誠不極髙明則擇乎中庸失時措之宜矣又曰尊德性而道問學致廣大而盡精微極髙明而道中庸皆逐句為一義上言重下語輕尊德性猶據於德德性須尊之道行也問問得者學行得者猶學問也尊徳性須是將前言徃行所聞所知以參驗恐行有錯致廣大須盡精微不得鹵莽極髙明須道中庸之道又曰今且只將尊德性而道問學為心日自求於問學有所背否於徳性有所懈否此義亦是博文約禮下學上達以此警䇿一年安得不長每日須求多少為益知所亡改得多少不善此徳性上之益讀書求義理編書須理㑹有所歸著勿徒冩過又多識前言徃行此問學上益也勿使有俄頃閒度似此三年庶幾有進又曰致廣大極髙明此則儘逺大所處則直是精約又曰温故而知新多識前言徃行以蓄德繹舊業而知新益思昔未至而今至之縁舊所見聞而察來皆其義也藍田吕氏曰禮儀威儀道也所以行之者徳也小徳可以任小道至徳可以守至道故道不虚行必待人而後行故必有人而行然後可名之道也又曰道之在我者徳性而已不先貴乎此則所謂問學者不免乎口耳為人之事矣道之全體者廣大而已不先充乎此則所謂精微者或偏或隘矣道之上達者髙明而已不先止乎此則所謂中庸者同汙合俗矣温故知新將以進吾知也敦厚崇禮將以實吾行也知崇禮卑至於成性則道義皆從此出矣居上而驕知上而不知下者也為下而倍知下而不知上者也國有道不知言之足興知藏而不知行者也國無道不知黙之足容知行而不知藏者也是皆一偏之行不蹈乎時中惟明哲之人知上知下知行知藏此所以卒保其身者也建安游氏曰發育萬物峻極于天至道之功也禮儀三百威儀三千至道之具也洋洋乎言上際乎天下蟠於地也優優大哉言動容周旋中禮也夫以三百三千之多儀非天下至誠孰能從容而盡中哉故曰待其人而後行蓋盛徳之至者人也故曰茍不至德至道不凝焉至徳非他至誠而已矣又曰懲忿窒慾閑邪存誠此尊徳性也非學以聚之問以辨之則擇善不明矣故繼之以道問學尊德性而道問學然後能致廣大尊其所聞行其所知充其德性之體使無不該徧如卷石之山積之至於廣大如一勺之水積之至於不測此致廣大也非盡精微則無以極深而研幾也故繼之以盡精微致廣大而盡精微然後能極髙明始也未離乎方今則無方矣始也未離乎體今則無體矣離形去知廓然大通此極髙明也非道中庸則無踐履可據之地不幾於蕩而無執乎故繼之以道中庸髙明者中庸之妙理而中庸者髙明之實徳也其實非兩體也尊其德性而道問學人徳也致廣大而盡精微地徳也極髙明而道中庸天徳也自人之天則上達矣而下學者不可以已也故温故而知新所以博學而詳説之也敦厚以崇禮所以守約而處中也約之之道舎禮何以哉以此居上則舜之袗衣鼓琴若固有之故不驕以此為下則孔子之乗田委吏各任其職而已故不倍或出或處或黙或語時措之之宜也豈干時犯分以蹈大禍哉延平楊氏曰道之峻極于天道之至也無禮以範圍之則蕩然無止而天地之化或過矣禮儀三百威儀三千所以體道而範圍之也故曰茍不至德至道不凝焉所謂至德者禮其是乎夫禮天所秩也後世或以為忠信之薄或以為偽皆不知天者也故曰待其人而後行蓋道非禮不止禮非道不行二者常相資也茍非其人而梏於儀章器數之末則愚不肖之不及也尚何至道之凝哉又曰尊德性而後能致廣大致廣大而後能極髙明道問學而後能盡精微盡精微而後能擇中庸則固為入徳之序也又曰國無道可以卷而懐之然後其黙足以容此明哲保身之道非遵養之有素其何能爾不然雖欲卷而懐之其可得乎又曰道止於中而已矣出乎中則過未至則不及故惟中為至夫中也者道之至微故中又謂之極屋極亦謂之極蓋中而髙故也極髙明而不道中庸則賢知之過也道中庸而不極乎髙明則愚不肖之不及也世儒以髙明中庸析為二致非知中庸也以謂聖人以髙明處己中庸待人則聖人處己常過之待人常不及道終不明不行與不肖者無以異矣新安朱氏曰此第二十七章言人道也大哉聖人之道包下文兩節而言洋洋乎發育萬物峻極于天此言道之極於至大而無外也優優充足有餘之意禮儀經禮也威儀曲禮也此言道之入於至小而無閒也待其人而後行總結上兩節至德謂其人至道指上兩節而言也凝聚也成也尊者恭敬奉持之意徳性者吾所受於天之正理敦加厚也尊德性所以存心而極乎道體之大也道問學所以致知而盡乎道體之細也二者修徳凝道之大端也不以一毫私意自蔽不以一毫私欲自累涵泳乎其所已知敦篤乎其所已能此皆存心之屬也析理則不使有毫釐之差處事則不使有過不及之繆理義則日知其所未知節文則日謹其所未謹此皆致知之屬也蓋非存心無以致知而存心者又不可以不致知故此五句大小相資首尾相應聖賢所示入徳之方莫詳於此學者宜盡心焉自尊徳性至敦厚皆是德性上工夫自道問學至崇禮皆是問學上工夫德性曰尊者把做一件物事崇尚他問學曰道者只是行將去諸説程張備矣張子所論逐句為義一條甚為切於文義故吕氏因之然須更以游楊二説足之則其義始備爾游氏分別至道至徳為得之惟優優大哉之説為未善而以無方無體離形去知為極髙明之意又以人德地德天德為德性廣大髙明之分則其失髙逺矣楊氏之説亦不可曉蓋道者自然之路德者人之所得故禮者道體之節文必其人之有徳然後乃能行之也今乃以禮為德而欲以凝夫道則甚誤矣而又曰道非禮則蕩而無止禮非道則梏於儀章器數之末而有所不行則是所謂道者乃為虚無恍惚元無準則之物所謂德者又不足以凝道而反有所待於道也其諸老氏之言乎誤益甚矣温故知新敦厚崇禮諸説但以二句相對明其不可偏廢大意固然然細分之則温故然後有以知新而温故又不可不知新敦厚然後有以崇禮而敦厚又不可不崇禮此則諸説之所遺也大抵此五句承章首道體大小而言故一句之内皆具大小二意如德性也廣大也髙明也故也厚也道之大也問學也精微也中庸也新也禮也道之小也遵之道之致之盡之極之道之温之知之敦之崇之所以修是德而凝是道也以其於道之大小無所不體故居上居下在治在亂無所不宜此又一章之通㫖也涑水司馬氏曰君子雖貴尚徳性然必由學乃成聖賢徳至廣大猶不敢忽細事智極髙明不為己甚必爲其中庸力學不倦至誠積德而折衷於禮海陵胡氏曰禮儀禮之大經威儀曲禮也委曲繁細之威儀至徳者至誠之徳也德性善性也道由也崇尚也為下不倍者不巧言令色倍叛於聖道也有道之世其言足以興起國家無道之世知幾識微全身逺害也嵩山晁氏曰明道先生謂此一以貫之也思尊德性而必道問學問學斯徳性也思致廣大而必盡精微精微斯廣大也思極髙明而必道中庸中庸斯髙明也思温故而必知新知新斯温故也思敦厚而必崇禮崇禮斯敦厚也徳性猶悠久也廣大猶博厚也故二程先生及横渠先生説皆同近世瞽學謂既極髙明而反道中庸本乎中庸也分而為二事莫知誠之一致也延平周氏曰至德中庸之人德至道髙明之天道由天而為人者必歸乎中庸由人而入天者必始乎中庸故曰苟不至德至道不凝焉尊徳性然後致廣大道問學然後盡精微致廣大然後極髙盡精微然後極明髙明既極矣而天下為難繼故俯而道乎中庸温故者月無忘其所能也知新者日知其所亡也温故而知新者學也敦厚者言其美質也崇禮者言其文也敦厚而崇禮者禮也方其為髙明之天道則學與禮乃為其成終者也方其為中庸之人道則學與禮乃為其成始者也故其序如此能髙明能中庸則其於進退也知有義而於廢興也知有命惟其知有義知有命則進而居上不驕窮而為下不倍國之有道則知故其言足以興國之無道則愚故其黙足以容新定顧氏曰有道而言君子所易無道而黙君子所難故又舉詩之言明哲保身以申其㫖夫以黙容身疑於偷生然愛其死以有待養其身以有為是明哲者之事也晏氏曰洋洋乎大者聖人之道優優其大者天下之禮非有洋洋乎大之道者不能行優優其大之禮故曰待其人而後行謂禮待聖人而後行爾髙要譚氏曰聖人之道洋洋乎發育萬物峻極于天可謂至矣而禮儀三百威儀三千未嘗少廢也禮儀三百無大不該威儀三千無細不盡皆聖人踐履實處非聖人純一不已則未免有所遺故必待其人然後行者指言惟聖人乃能行之不已也行之不已三百三千無不該盡是謂至徳故孟子曰動容周旋中禮者盛徳之至也惟至徳乃能成其道茍不至徳則𤼵育峻極之道安能堅凝乎大哉聖人之道也其踐履實處只在禮儀三百威儀三千之閒此文王所以陟降在帝左右者也自尊徳性以後皆連續用功終之以崇禮則禮者終身之所踐履也動容周旋皆中於禮乃為盛徳之至而禮儀三百威儀三千無不該盡此則純亦不已之事也君子既進乎徳盛之至則凡所踐履動與理俱出處語黙無不適宜故以此處上則合乎天道之下濟故不驕以此處下則合乎地道之上承故不倍以此處有道之時則明乎陽長隂消之義故其進也言足以興以此處無道之世則察乎陽消隂長之幾故其退也黙足以容一身之閒而天地隂陽之理舉無違者以其本之先立故也詩所謂明哲保身豈非以本既先立而後能保其身耶錢塘于氏曰前論聖人之道必歸於禮次論君子求聖人之道亦必歸於禮君子尊德性有若茫昧者矣未始無道問學之實致廣大有若浩渺者矣未始無盡精微之要極髙明有若超出於無外者矣未始無道中庸之常以尊徳性致廣大極髙明是上達者之事也君子猶且道問學盡精微道中庸盡心於下學之事猶未已也温故而知新其心愈小不自以為窮神知化敦厚以崇禮其道愈降不自以為超出無形以君子之求道一本於其實而不為嶄絶崖異者如此學者其可不三復斯章有以見中庸之道誠非異端之所可共論也此章前後相為表裏宜反覆玩味之東萊吕氏曰大哉聖人之道洋洋乎發育萬物峻極于天而繼之以禮儀三百威儀三千聖人之道正是如此若無理以行之便是釋氏永康陳氏曰待其人者欲其實得之也苟非實徳何以為徳之至凝與我為一也又曰興如綏之斯來動之斯和容如磨而不磷涅而不緇晉陵喻氏曰極髙明而復道中庸異乎賢者之過乎髙而知者之過乎明者矣温故者念終始典於學也知新者厥徳修㒺覺而日日新者也言足以興君子之美也黙足以容君子之難也然有國有天下者其可使人黙而容哉此治亂之分也莆田鄭氏曰性具天徳本與天地參惟人不學則自卑自小戕賊梏亡鮮有盡其性者使之以徳性為尊則學問不敢有廢唯知學問則廣大精微髙明中庸知新崇禮可以馴致也廣大無外性天等無外人蔽於小己之私則廣大者狹矣使力學以徹之則吾心與天地同其大道心唯微不探不得其賾竭知燭以照之則可以極深而研幾窮神而知化矣知髙明之中本有中庸人情事物本有程度尊卑大小本有品節離人而談天離中庸而談髙明老釋之説也慕髙明而亡凖的趣虚無而背繩墨喜希竒而廢日用流寂滅而事怪誕是故知者過於用知而愚者慣隨流俗中庸之徳所以鮮能也通古今一理本無新亦無故在人以日聞者為新有新則有故矣習故常之道而我有所見知新者也聖人制禮使人道不偷豈至薄者所能為故曰敦厚以崇禮禮所以裁天下萬物之中而古今通用即中庸也學至廣大精微而終不離於中庸者合内外貫精粗而不偏者也此所以為孔顔之學晉陵錢氏曰反復言道之大也聖人古聖人也洋洋如水洋洋顯而可見也發育萬物髙極于天言天地之閒無非此道優優然饒裕亦大矣哉在國曰禮儀亦曰經禮上所行也在人曰威儀亦曰曲禮下所習也左氏春秋曰有威而可畏謂之威有儀而可象謂之儀三百言其多也三千言尤多也道雖大散於禮非人不行故言道者必曰聖人之道君子之道故曰舉古語也凝猶聚也周禮云至徳以為道本道問學道中庸猶行也由也温習也習古者不知變敦厚者多任情故貴於知新而崇禮足以興興人之國也足以容自容其身若箕子為之奴以保其身不輕於死也此一節謂君子以身任道宣城奚氏曰聖人之道至於洋洋乎發育萬物峻極于天可謂大矣然此猶是形而上者未易以言語求也若乃形而下者如禮儀之三百威儀之三千則亦未易行也故必待其人而後行孟子曰動容周旋中禮盛徳之至能行是禮則至德在我而至道可凝矣何者本末一理也體用一源也洒埽應對即精義妙道之所寓形而下者即形而上者存焉徳之未至而曰有得於道吾恐其無實也故君子之於道尊徳性而道問學致廣大而盡精微極髙明而道中庸温故而知新可謂博約兩全知行互進超然有日新之功矣而猶且敦厚以崇禮蓋不如是則無以凝至道也夫德性固不可以不尊也非道問學則徳性何由而明致廣大極髙明所以尊徳性也於廣大之中而盡精微於髙明之中而道中庸則問學之功也以吾平日之所問學踐履者反覆紬繹之而又知所未知焉則温故而知新矣君子之心猶慮夫睨髙而遺下忽小以遺大也既崇禮而且加之以篤厚焉於以見古人務學之實如此欲觀吾夫子者觀諸鄉黨一書則其敦厚崇禮之氣象可以見其為學矣彼以禮為聖人之為忠信之薄者烏足以語此霅州倪氏曰前章言自小而大自微而著此則既極其至又加以學大而不遺其細也著而反求其微學無止法也温故知新者博之以文也敦厚崇禮者約之以禮也禮記集説卷一百三十四
