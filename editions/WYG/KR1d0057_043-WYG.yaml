body:
  text: 禮記集説巻四十三宋衛湜撰中央土其日戊巳鄭氏曰火休而盛徳在土也戊之言茂己之言起也日之行四時之閒從黄道月為之佐至此萬物皆枝葉茂盛其含秀者抑屈而起故因以為日名焉孔氏曰夫四時五行同是天地所生而四時是氣五行是物氣是輕虚所以麗天物體窒礙所以屬地四時係天年有三百六十日則春夏秋冬各分居九十日五行分配四時布於三百六十日間以木配春以火配夏以金配秋以水配冬以土則每時輒寄王十八日也雖每分寄而位本未冝䖏於季夏之末金火之間故在此陳之也雖䖏於夏末而實為四行之主不可沒其生用之功故因以為日名也鄭註日之行四時之間從黄道月為之佐者案考靈耀春則星辰西遊謂星辰在黄道之西遊也日依常行在黄道之東至季春之月星辰入黄道復其正處日依黄道而行是春夏之閒日從黄道夏則星辰北遊謂星辰在黄道之北遊也日依常行在黄道之南至季夏星辰入黄道復正位日依常行黄道是夏秋之閒日從黄道也秋則星辰東遊謂星辰在黃道東遊目依常行在黄道之西至季秋星辰入黄道還復正位日依黄道而行是秋冬之間日從黄道也冬則星辰南遊謂星辰在黄道南遊日依常行在黄道之北至季冬星辰入黄道還正位日依常行黄道是冬春之閒日從黄道也鄭註洪範云四時之閒合於黄道月之行道與日同故云月為之佐也嚴陵方氏曰土每時各寄王十八日故九十日之閒戊巳之日各有九也以木生火火生土土生金金生水水土之位與其序適居中央矣若周人兆黄帝於南郊迎土氣於季夏亦以是爾歴於立秋以前言土王用事即其事也中央見王制解横渠張氏曰中央土寄王之説於理未安五行之氣分主四時土固多於四者然其運行之氣則均同諸儒見木金水火分主四時獨不見土之所主是以有寄王之説然中央土在季夏之末者以易言之八卦之位坤在西南致養之地當離兊之閒離兊則金火也是以在季夏之末其帝黄帝其神后土鄭氏曰此黄精之君土官之神自古以來著徳立功者也黄帝軒轅氏也后土亦顓頊氏之子曰犂兼為土官孔氏曰案昭二十九年左傳云顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土后土為土官知此經后土非句龍而為犂者以句龍初為后土後轉為社后土官闕犂則兼之故鄭註大宗伯云犂食於火土以宗伯别云社稷又云五祀句龍為社神則不得又為五祀故云犂兼也丘氏曰五行獨土神稱后者后君也位居中統領四行故稱君也案左傳云句龍為后土后土為社則是句龍一人而配兩祭非謂轉為社神也月令土既是五行之神以句龍配之正與左轉文合康成失之於前穎達徇之於後皆非也然楚語曰顓頊命南正重司天火正犂司地犂既司地何不可配土盖犂之司地兼其職爾非有功於土也若犂可配土則重亦可配天乎且犂為火正而康成猶用兼之配土豈句龍土官乃不可以配土乎依左氏句龍配於兩祭不亦冝乎其蟲倮鄭氏曰象物露見不隠蔵虎豹之屬恒淺毛孔氏曰大載禮云鱗蟲三百六十龍為之長羽蟲三百六十鳯為之長毛蟲三百六十麟為之長介蟲三百六十龜為之長倮蟲三百六十聖人為之長象物露見不隱藏者以仲夏云可以居髙明可以䖏臺榭至六月土王之時物轉壯大露見不隠蔵也云虎豹之屬恒淺毛者鄭皆據四時之物與鱗羽毛介相似者言之不取五靈之長故中央不言人西云狐貉之屬東方兼言虵北方兼言鼈是不取五靈也其音宫鄭氏曰聲始於宫宫數八十一屬土者以其最濁君之象也季夏之氣和則宫聲調樂記曰宫亂則荒其君驕孔氏曰案律歴志五聲始於宫陽數極於九九九相乘故數八十一以五聲中最尊故云以其最濁君之象也新安王氏曰宫土也故位居中央為音之主鄭云聲始為宫其數八十一屬土以最濁君之象也季夏氣應則宫聲調然予於此有疑焉夫言其音宫之數誠調樂器之聲也然先儒謂黄鍾之律九寸為宫其管九寸於絃則九九八十一三分去一下生徴之數五十四徴三分益一上生啇之數七十有二商三分去一下生羽之數四十有八羽三分益一上生角之數六十有四數多者濁數少者淸角數少於宫啇多於徴羽其聲在清濁之中故其象為民如其說則最濁者為宫最清者為羽是一律止有一聲然十二律皆為五聲故周禮大司樂圜鍾為宫則黄鍾為角大蔟為徴姑洗為羽函鍾為宫則大蔟為角姑洗為徴南吕為羽大師掌六律六同皆文以五聲則上下損益之說以分五聲似非古人律和聲之本意凡聲大不過宫細不過羽非止一律以定一聲管仲云古之神瞽審於聲者以牛鳴窖中為宫雞登木上為角羊離羣而為商負塗之豕駭而為羽馬鳴於野而為徴此非可以律求也先有其聲然後以律調之使聲之大小有節律和聲之義也故舜命夔曰歌永言聲依永律和聲然後八音克諧則樂以人聲為主歌人聲也歌則有抑揚髙下而五聲依之五聲有洪纎清濁不可無節故可以六律六吕和之以是播於樂器是為匏土革木金石絲竹器之有音不過五聲其聲皆合於律今先論律而後及於聲是豈古人制作之序哉此予所以不能無疑律中黄鍾之宫鄭氏曰黄鍾之宫最長也十二律轉相生五聲具終於六十焉季夏之氣至則黄鍾之宫應禮運曰五聲六律十二管還相為宫孔氏曰鄭不云黄鍾律最長而云黄鍾之宫最長者唯黄鍾宫聲於諸宫最長也黄鍾之調均則黄鍾為宫黄鍾生林鍾為徴林鍾生大蔟為啇大蔟生南吕為羽南吕生姑洗為角此是黄鍾一調之五聲凡十二律律各有五聲則緫有六十聲故云終於六十聲至禮運更具詳之黄鍾候氣之管本位在子此是黄鍾宫聲與中央土聲相應但土無候氣之法取黄鍾宫聲以應土耳非候氣也故賀瑒云黃鍾是十一月管何縁復應此月正以土義居中故虚設律於其月實不用候氣也四時之律皆取氣應而土王之律獨取聲應者一者欲與四行為互二者為無别候土氣之管故也土無候氣之管者以寄王四季之末故從四時之管而不别候也長樂陳氏曰黄鍾之宫為諸宫之長故中央之律應之且五音數多者濁數少者清而五音之數莫多於宫宫數生於黄鍾黄鍾之數八十一而宫之數亦八十一焉故黃鍾之宫其聲甚濁季夏土王其聲最重應此黃鍾之宫也嚴陵方氏曰十二律各有五聲凡六十律以宫為本以角為末起於黃鍾而終於中吕起於黃鍾之宫而終於南吕之角故十二律之外又有黃鍾之宫焉夫宫固土之本音也然必中於黄鍾者以為建子之律故也蓋子者陽之所生土者物之所成生以成為終成以生為始由其終始之相須故其所中如此且以名取義黃言隂之美則土之色也鍾言氣之聚則土之事也而中央之所中又冝矣然律有正中者有旁中者正中則中其管旁中則中其聲若仲冬之所中則黃鍾之管也若中央之所中則黃鍾之聲而已故特言宫焉廬陵胡氏曰土之聲氣與黃鍾之宫聲合爾聲合則氣合可知孔氏云土寄王四季無候氣之管者非也管即律也若無管何云律中其數五鄭氏曰土生數五成數十但言五者土以生為本嚴陵方氏曰四時皆指其成數獨中央指其生數者蓋五行皆所以生成萬物正以生物為事者土也則不嫌於不能成矣故特以生數言之吴氏萃曰中央土以生數言亦猶河圖之數有五而無十取五為中也其味甘其臭香鄭氏曰土之臭味也凡甘香者皆屬之山隂陸氏曰香牛膏也於春言所生於秋言所尅於中央言其正亦言之法且木在上燎之則焦在下浸之則朽於夏言焦春在前故也於冬言朽春在後故也其祀中霤祭先心鄭氏曰中霤猶中室也土主中央而神在室古者複穴是以名室為霤祀之先祭心者五藏之次心次肺至此心為尊也祀中霤之禮設主於牖下乃制心及肺肝為俎其祭肉心肺肝各一他皆如祀戸之禮孔氏曰古者窟居隨地而造若平地則不鑿但累土為之謂之為複言於地上重複為之也若髙地則鑿為坎謂之為穴其形皆如陶竈故詩云陶復陶穴是也復穴皆開其上取明故雨霤之鄭註猶中室者復世開牖象中霤之取明則其地不當棟而在室之中央因名室為中霤也喪禮云浴於中霤飯於牖下明中霤不關牖下也土五行之主故其神在室之中央是中霤所祭則土神也故杜註春秋云在家則祀中霤在野則為社又郊特牲云家主中霤而國主社社神亦中霤神也開牖象霤故設主於廟室牖下五祀皆先席於室之奥此不言者前祀戸註已備言也此别設主當廟室牖内之下而北嚮也天子居大廟大室乘大路駕黃駵載黃旂衣黃衣服黃玉食稷與牛其器圜以閎鄭氏曰大廟大室中央室也大路殷路也車如殷路之制而飾之以黃稷五榖之長牛土畜也器圜者象土周布於四時閎讀如紘紘謂中寛象土含物孔氏曰案考工記云周人明堂東西九筵南北七筵凡室二筵則五室並皆二筵無大小也今中央室稱大室者以中央是土室土為五行之主尊之故稱大以夏之世室則四旁之室皆南北三歩東西三歩三尺中央土室南北四歩東西四歩四尺則周之明堂亦應土室在中央大於四角之室也但文不具耳鄭知大路殷路者明堂位文也四時用鸞路此用大路者以土五行之主故取尊大之名乘殷之大路又尚質之義春有青蒼兩色夏有朱赤二色此及秋唯有黄白不更加他色者以黃白更無餘色相渉故不言之牛土畜者易乾為馬坤為牛又五行傳云思之不睿則有牛禍是牛屬土也方則有所不足圜則無所不覆此器圜所以象土周布也祭義云天子冕而朱紘紘謂組上屬於冕屈從頤下度而還上屬於冕以中央寛緩象土之含物也孟秋之月日在翼昏建星中旦畢中鄭氏曰孟秋者日月㑹於鶉尾而斗建申之辰也孔氏曰案三統歴七月節日在張十八度昬斗四度中去日一百一十四度旦畢八度中七月中日在翼十五度昬斗十六度中去日一百一十一度旦井初度中元嘉歴七月節日在張五度昬箕二度中旦胃二度中七月中日在翼十度昬斗三度中旦昴七度中諸家說見孟春其日庚辛鄭氏曰庚之言更也辛之言新也日之行秋西從白道成熟萬物月為之佐萬物皆肅然改更秀實新成又因以為日名焉諸家説見孟春其帝少皡其神蓐收鄭氏曰此白精之君金官之臣自古以來著徳立功者也少皡金天氏蓐收少皡氏之子曰該為金官孔氏曰左傳昭元年云昔金天氏有裔子曰昧為𤣥㝠師生允格臺駘稱金天氏與少皡金位相當故少皡則金天氏也又帝王世紀少皡帝號金天氏又左傳昭二十九年蔡墨云少皡氏之子曰該為蓐收是為金神佐少皡於秋蓐收者言秋時萬物摧蓐而收斂諸家説見孟春其蟲毛鄭氏曰象物應涼氣而備寒狐貉之屬生旃毛也諸家說見孟春其音啇鄭氏曰三分徴益一以生啇商數七十二屬金者以其濁次宫臣之象也秋氣和則啇聲調樂記曰啇亂則陂其官壞孔氏曰案律歴志云徴數五十四三分之則一分有十八今於徴數五十四上更加十八是啇數七十二也凡五聲濁者尊清者卑啇聲之濁次於宫宫既為君啇則為臣也詳見孟春律中夷則鄭氏曰孟秋氣至則夷則之律應夷則者大吕之所生也三分去一律長五寸七百二十九分寸之四百五十一周語曰夷則所以詠歌九則平民無貳孔氏曰大吕長八寸二百四十三分寸之一百四三分去一下生夷則故夷則律長五寸七百二十九分寸之四百五十一也六寸去二寸餘有四寸在又大吕一寸為二百四十三分今每寸更三分之則一寸為七百二十九分兩箇整寸緫有一千四百五十八分其大吕二百四十三分寸之一百四每又三分之此一百四為三百一十二分益前一千四百五十八則緫為一千七百七十分下生三分去一分作三分則每一分得五百九十去其一分五百九十餘有一千一百八十在是其積分以七百二十九分為一寸益前四寸為五寸餘有四百五十一分在故云夷則律長五寸七百二十九分寸之四百五十一也案周語註云乾九五用事夷平則法也言法度平故可詠歌九功之法平民使不貸也長安陳氏説見孟春其數九鄭氏曰金生數四成數九但言九者亦舉其成數孔氏説見孟春其味辛其臭腥鄭氏曰金之臭味也凡辛腥者皆屬焉諸家説見孟春其祀門祭先肝鄭氏曰秋隂氣出祀之於門外隂也祀之先祭肝者秋為隂中於藏值肝肝為尊也祀門之禮北面設主於門左樞乃制肝及肺心為俎奠於主南又設盛於俎東其他皆如祭竈之禮孔氏曰隂氣始於五月終於十月其七月八月為隂之中故云秋為隂中陽氣始於十一月終於四月正月二月為陽中故正月云春為陽中然隂中之時兼有陽陽中之時兼有隂亦是隂陽之中五藏肺最在前心次之肝次之脾次之腎為後肝在心肺之下脾腎之上故云秋為隂中於藏值肝然脾在肺心肝之下腎之上則是上有肺心肝下唯有腎不當其中而云春為陽中於藏值脾者但五行相次水則次木故春繼於冬腎後則次脾其火後則次土土後乃次金故秋不得繼夏由隔於土由此脾不得繼肺隔於心也為此肝之上有肺有心脾之下唯有腎俱得為藏之中也鄭註制肺及設盛皆約中霤禮文其他如祭竈禮謂祭心肺肝各一及祭體三并設席於奥迎尸之屬也諸家説見孟春涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮鄭氏曰皆記時候也寒蟬寒蜩謂蜺也鷹祭鳥者將食之示有先也既祭之後不必盡食若人君行刑戮之而已孔氏云案釋蟲云蜺寒蜩郭景純云寒螿也似蟬而小青赤鷹欲食鳥先殺鳥而不食似人之祭食祀先神故鄭云示有先也鷹祭鳥之後不必盡食猶若人君行刑但戮之而已以人君行戮明鷹之殺言鷹於此時始行戮鳥之事嚴陵方氏曰涼未至於寒也特為寒之微而已故於秋言涼風至亦見季夏温風始至解春露則生秋露則殺以其殺故言白蓋白為金之正故也曰降則與祭義所言同義亦見始雨水解寒蟬鳴見倉庚鳴解鷹乃祭鳥見獺祭魚解用始行戮則所謂鷹隼擊也戮蓋殺之也馬氏曰涼風至則天地之仁氣散矣白露降則隂乘陽而其候交矣寒蟬鳴則物之生於暑者其聲變矣鷹乃祭鳥用始行戮則時主殺而物之司殺者應是而動也於是乎可以設罻羅矣鷹至不仁也猶祭然後食而况於人乎山隂陸氏曰西風謂之涼風猶東風謂之温風温涼言其氣今豺祭獸獺祭魚鷹祭鳥皆不食既祭雖食不盡戮而後食之天子居總章左个乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器亷以深鄭氏曰總章左个大寢西堂南偏戎路兵車也制如周革路而飾之以白白馬黒鬛曰駱麻實有文理屬金大金畜也器亷以深象金傷害物入藏諸家説見孟春是月也以立秋先立秋三日大史謁之天子曰某日立秋盛徳在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝鄭氏曰謁告也迎秋者祭白帝白招拒於西郊之兆也軍帥諸將也武人謂環人之屬有勇力者諸家説見孟春天子乃命將帥選士厲兵簡練桀俊専任有功以征不義詰誅暴慢以明好惡順彼逺方鄭氏曰征之言正也伐也詰謂問其罪窮治之也順猶服也嚴陵方氏曰才足以將物而勝之謂之將知足以帥人而先之謂之帥士言其人兵言其器選士則人無不能於事厲兵則器無不利於用桀俊見孟夏賛傑俊解簡之則無所不擇練之則無所不熟既選厲簡練之矣苟非已試之效則勝負猶未可知故所任必在乎有功之人也任有功矣苟置疑貳於其間則知者必不盡其謀能者必不竭其力故任之又欲其專也凡此皆欲以征不義而已無以覆下之謂暴不能敬上之謂慢詰以問其罪誅以戮其人所詰誅者暴慢則好惡公而明矣故曰以明好惡好惡得其明則合天下之所願而無逆矣故曰順彼逺方必曰逺方者柔逺能邇之意既曰征不義又曰詰誅暴慢者蓋以征不義則言其道詰誅暴慢則言其事講義曰此皆叔世徇時令不免於拘而有所不通也方孟秋之月隂氣滋長天地之氣始肅之時也乃命將帥選壯勇之士厲兵戎之具簡練桀俊可以為將校者有征伐之功可以專任者於是以征不義詰誅暴慢以明好惡順彼逺方使之循服固其冝也若夫桀俊之士有功之人簡練之素専任之久則可以責其用命暴慢之徒逺方之不率者如非其時以干天誅寧俟孟秋之時可乎如周宣王之北伐乃在於六月而大雅之作不刺其用兵之非時而乃美其禦侮之有道為此詩者其知道乎是月也命有司脩法制繕囹圄具桎梏禁止姦慎罪邪務摶執命理瞻傷察創視折審斷決獄訟必端平戮有罪嚴斷刑天地始肅不可以贏鄭氏曰順秋氣政尚嚴也理治獄官也有虞氏曰士夏曰大理周曰大司冦創之淺者曰傷端猶正也肅嚴急之言也贏猶解也嚴陵方氏曰脩則治其壊繕則善其事具則完其器法制古所有也故曰脩囹圄禁人之地於此有事焉故曰繕桎梏禁人之器也故曰具姦存乎心故止之邪見乎行故罪之摶所以戮之執所以拘之於仲春則省囹圄去桎梏於孟秋則繕囹圄具桎梏蓋先王奉時之道固可見矣獄官欲得其曲直之理故謂之理又謂之士則欲致其察故也前言命有司後言命理者以脩法制非理之所專故也先王之用刑也既務摶執矣又命瞻傷察創視折焉則其用心之仁可知矣端言無偏頗之異平言無輕重之差審斷決故獄訟必端平也有罪然後戮則不及於無辜斷刑以嚴則莫敢輕犯上既言愼罪邪此又言戮有罪上既言審斷決此又言嚴斷刑者蓋反覆言之所以明慎之至而已秋者隂之始冬者隂之終故於孟秋言天地始肅陽道常饒饒則有餘而贏隂道常乏乏則不足而縮孰為此者天地也而君人實輔相焉故曰天地始肅不可以贏馬氏曰先王之為法制也豈他求哉凡以因物而已因物之則裁成之者制也制而用之者法也繕囹圄至務摶執則義之事也然於其姦也止之使弗為於罪邪也戒慎之勿失則有仁心存焉命理瞻傷察創視折則於金用事之時物有受其戕者可無省乎刑官而謂之理則欲致其順也或謂之士則欲致其察順以理言察以事言其歸一也山隂陸氏曰蔡邕曰皮曰傷肉曰創骨曰折骨肉皆絶也斷傷瞻之而已創然後察也折視之而已斷然後審也且其瞻視察審如此非直以傷創折斷深淺大小正其罪之輕重亦所以療之也其療之也而愈則其罪又有末減者矣變司寇言理亦以此言必取必於理也前所言刑而已此又以其情取必焉是月也農乃登榖天子嘗新先薦寢廟鄭氏曰黍稷之屬於是始熟孔氏曰案仲秋云以犬嘗麻今不云牲者記文略也嚴陵方氏曰榖謂稷也以稷熟於此故農乃登焉然孟夏之麥仲夏之黍仲秋之麻季秋之稻皆榖也此以榖言稷者以其為五榖之長故也若稼穡之官謂之后稷土稷之神謂之社稷者以是而已命百官始收斂完隄坊謹壅塞以備水潦脩宫室坏牆垣補城郭鄭氏曰順秋氣收斂物也八月宿直畢畢好雨完隄坊謹壅塞以備八月也脩宫室坏牆垣補城郭象秋收斂物當藏也嚴陵方氏曰陽為出故春主發散隂為入故秋主收斂天之所以示人者則有收斂之道人之所以奉天者則有收斂之事隄防見季春脩利隄防解聚土而壅之之謂壅升土而壅之之謂塞隄防大故欲完而全壅塞小故欲謹而慎凡此所以備水潦而已宫室見曲禮解廬陵胡氏曰春秋城築皆取定星中為候此非土工之時坏土塊也蟄蟲坏戸亦謂以土増益其穴講義曰秋之時水潦將降故冝全隄坊使不衝突也謹壅塞使不决溢以為害也金華應氏曰夏氣舒發則脩利隄防無有壅塞秋氣收斂則全隄坊謹壅塞水在天地閒最為流通不可壅之物而其盛衰消長亦因乎時夏潦不可隄也故脩利而無壅秋潦則可隄矣必壅塞之惟謹雖一通一障不同而其為民禦患則一而已是月也毋以封諸侯立大官毋以割地行大使出大幣鄭氏曰古者於嘗出田邑此其月也而禁封諸侯割地失其義孔氏曰鄭唯云不封諸侯及割地失其義則毋立大官毋行大使母出大幣為得禮以其收斂之月故也嚴陵方氏曰割地即射義所謂益以地是也使者使於四方故言行幣以藏於府庫為入反賜予人故言出凡此皆非收斂之事故言母以止之其曰大官大使大幣則小者容或可矣山隂陸氏曰言以著封割雖封割可也特毋以是月務封諸侯割地鄭氏謂古者於嘗出田邑此其月也而禁封諸侯割地失其義誤矣孟秋行冬令則隂氣大勝介蟲敗榖戎兵乃來行春令則其國乃旱陽氣復還五榖無實行夏令則國多火災寒熱不節民多瘧疾鄭氏曰隂氣大勝亥之氣乘之也介蟲敗榖介甲也甲蟲屬冬敗榖者稻蟹之屬戎兵乃來營室之氣為害也十月宿直營室主武士其國乃旱寅之氣乘之也雲雨以風除也陽氣復還五榖無實能生而不能成也國多火災已之氣乘之也瘧疾寒熱所為也孔氏曰隂氣大勝天災介蟲敗榖地災戎兵乃來人災也越語云今吴稲蟹無遺種註稻蟹蟹食稻也其國乃旱陽氣復還天災也五榖無實地災也國多火災寒熱不節天災也民乃瘧疾人災也嚴陵方氏曰方一隂之時而行重隂之令故隂氣太勝戎兵乃來亦以隂太勝而主殺故也凡以亥之氣乘之也陽亢而隂莫能干為旱方隂中之時而行陽中之令則陽亢矣故旱也自夏徂秋則陽往而隂來以其旱故陽氣復還也萬物敷華於陽而成實於隂以陽氣復還故五榖無實火王於南方故行夏令則國多火災火之氣為熱水之氣為寒而此并寒熱不節者蓋熱極生寒隂陽之理然也民多瘧疾則以感寒熱之氣而被虐故也延平黄氏曰癘疾之作或感四時之邪氣或自養之失素問曰夏傷暑其病在秋為痎瘧秋傷濕其病在冬為咳𠻳此自養之失行夏令民多瘧疾此感四時之邪氣先王之於時氣不能使之無邪而有以裁成之不能使萬民無癘疾而有以養之疾痬之醫所以養萬民之疾為之禮義之政所以裁成其時氣而又為之膳膏齊和使嘗放焉所以維持其五藏六腑仁民之政也仲秋之月日在角昏牽牛中旦觜觽中鄭氏曰仲秋者日月㑹於夀星而斗建酉之辰也孔氏曰三統歴八月節日在軫十二度昬斗二十六度中去日一百六度旦井二度中八月中日在角十度昬女三度中去日一百六度旦井二十一度中案元嘉歴八月節日在翼十七度昬斗十四度中旦畢十六度中八月中日在軫十五度昬斗二十四度中旦井九度中其日庚辛其帝少皥其神蓐收其蟲毛其音啇律中南吕鄭氏曰南吕者大蔟之所生三分去一律長五寸三分寸之一仲秋氣至則南吕之律應周語曰南吕者賛陽秀物孔氏曰大蔟長八寸三分去一下生南吕三寸去一寸六寸去二寸得四寸又有整二寸在分一寸作三分二寸為六分更三分去一餘有四分在以三分為一寸益前四寸為五寸仍有一分在故云南吕律長五寸三分寸之一也諸家説見孟春其數九其味辛其臭腥其祀門祭先肝盲風至鴻鴈來𤣥鳥歸羣鳥養羞鄭氏曰皆記時候也盲風疾風也𤣥鳥燕也歸謂去蟄也凡鳥随隂陽者不以中國為居羞謂所食也夏小正曰八月丹鳥羞白鳥説曰丹鳥丹良也白鳥閩蚋也其謂之鳥者重其養者也有翼為鳥養也者不盡食也二者文異羣鳥丹良未聞孰是孔氏曰秦人謂疾風為盲風𤣥鳥至不為仲春之候由别與郊禖為候故也鄭註凡鳥随隂陽者鴻鴈之屬也季秋云鴻鴈來賔言來賔是不以中國為居皇氏即兼云𤣥鳥以其稱歸故也他物之蟄近在本䖏今𤣥鳥之蟄不逺在四夷必於幽僻之䖏非中國所常見故云不以中國為居也案大戴禮八月丹鳥羞白鳥今鄭云九月所見本異也丹鳥以白鳥為珍羞故云丹鳥羞白鳥鄭註説曰至不盡食皆小正文丹良是蟲乃謂之鳥是重其所養之物不盡食之雖蟲而謂鳥也但未知丹良竟是何物經云羣鳥養羞夏小正云丹鳥羞白鳥故云二者文異也嚴陵方氏曰盲者閉暗之稱當建酉闔戸之月故其風謂之盲風又謂之閶闔以此𤣥鳥歸者至以陽中故歸以隂中也羞謂所美之食養之所以備冬藏也山隂陸氏曰鴻鴈何不謂之南郷非其居也羣鳥丹鳥也養羞養白鳥焉凡欲羞之必先養之養在八月羞在九月養之仁也羞之義也江陵項氏曰羣鳥至秋與百榖俱成人始取之以為養羞如雉鷃鶉鳩鴈鶩今人皆至秋食之周禮司裘仲秋行羽物以賜羣臣此於古有證矣或疑此皆天候不言人事則孟秋農乃登榖亦以人事為一候也鷹祭鳥於孟秋之第四候則人羞之於仲秋之第三候不亦可乎天子居緫章大廟乘戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深鄭氏曰緫章大廟西堂當大室也是月也養衰老授几杖行糜粥飲食鄭氏曰助老氣也行猶賜也横渠張氏曰老人氣衰津液自少不能乾食故糜粥為養老之具又養老之禮有祝鯁祝噎正冝用如此嚴陵方氏曰几杖見曲禮解糜粥足以養老而助其氣授則特授之而已行則徧行之也凡杖之禮為重非庻人之老可預故惟於糜粥言行焉几杖以養其體糜粥以養其氣郊特牲曰飲養陽氣也食養隂氣也春饗孤子秋食耆老其義一也故此於秋言之然養陽非無食也特以飲為主爾養隂非無飲也特以食為主爾故此兼言飲焉馬氏曰養衰老授几杖行糜粥飲食則順隂氣也盛已而衰壯已而老杖以致其息也乃命司服具飭衣裳文繡有恒制有小大度有長短衣服有量必循其故冠帯有常鄭氏曰命司服具飭衣裳謂祭服也文謂畫也祭服之制畫衣而繡裳衣服謂朝燕及他服凡此為寒益至也詩云七月流火九月授衣於是作之可也冠帯因制衣服而作之也孔氏曰具備也飭正也衣服小大長短及制度采色皆有度量必因循故法不得更改鄭註他服謂戰伐田獵等之服也嚴陵方氏曰青赤為文赤白為章言文則章可知作繪於衣刺繡於裳言繡則繪可知衣裳之制大至於衮冕之九章小至於𤣥冕之一章所謂制有小大也衣在上而長裳在下而短所謂度有長短也衣服有量者言所受各有量也變裳曰服又以見乎必服其事焉冠帯有常者欲其無所變也正言冠帯則以男子重首婦人重要故也言上下之異用則曰衣裳言大小之異事則曰衣服言男女之異尚則曰冠帯反覆言之者以僭亂之原常生於此故也都人士之刺其為是歟馬氏曰冠帯有常則無苟變於昔也所以示民不貳也先王所以壹民徳有在於衣服之閒故其命司服者如此廬陵胡氏曰鄭以具飭衣裳文繡有常為祭服者以禹致美黻冕也以衣服有量為朝燕服者以禹惡衣服也然虞書言繪衣繡裳則不必祭服亦文繡也又易云堯舜垂衣裳而天下治則燕朝亦云衣裳矣講義曰楊子曰大寒而後索衣裘不亦晚乎至於季秋風已戒寒隕霜至而冬裘冝備故於仲秋命有司具飭衣裳也禮記集説巻四十三
