body:
  text: 禮記集説卷十六宋衛湜撰魯人有朝祥而莫歌者子路笑之夫子曰由爾責於人終無已夫三年之喪亦已久矣夫子路出夫子曰又多乎哉踰月則其善也鄭氏曰子路笑其為樂速夫子謂時如此人行三年喪者希抑子路以善彼又復也孔氏曰此一節論大祥除衰杖之日不得即歌之事祥謂二十五月大祥歌哭不同日故仲由笑之夫子言汝罪於人終無休已之時夫是語助也三年之喪計其日月亦已久矣人皆廢此獨能行何須笑之時孔子抑子路善彼人恐學者致惑待子路出後更以正禮言之魯人可歌之時節豈有多經日月哉但踰後月即善案喪服四制祥之日鼓素琴不譏彈琴而譏歌者琴以手笙歌以氣手在外而逺氣在内而近也嚴陵方氏曰喪期而小祥又期而大祥喪以祥為吉之先見大祥冝吉而謂之祥則以有禫故也觀此則祥雖非凶亦未可以為吉矣朝祥而莫歌豈不為太速者乎子路之笑魯人固亦冝矣孔子乃以為責人終無已者以其兼人故退之也長樂陳氏曰喪凶禮也祭吉禮也畢凶禮之喪猶為吉祭之禫未全乎吉也吉事兆見於此矣得不謂之祥乎祥歌同日失之太速子路笑之失之太嚴此孔子所以恕魯人而抑子路之責人無己也記曰祥之日鼓素琴不為非而歌則為未善者琴自外作歌由中出故也山隂陸氏曰言朝祥去踰月日時不多也横渠張氏曰又多乎哉所去無幾言不多也踰月則盡善也魯莊公及宋人戰于乗丘縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自此始也鄭氏曰縣卜皆氏也右謂車右勇力者為之馬驚奔失列佐車授綏乗公戎車之貳曰佐末之猶微哉公言卜國無勇也縣賁父言公他日戰其御馬未嘗驚奔二人遂赴敵而死圉人掌養馬者白肉股裏肉也公言流矢中馬非御與右之罪遂誄其赴敵之功以為諡士有誄自此始記禮失所由來也周雖以士為爵猶無諡也殷大夫以上為爵孔氏曰此一節論魯莊公與士為諡失禮之事乗丘魯地也莊公十年夏六月敗宋師於乗丘周禮戎僕掌倅車之政道僕掌貳車之政田僕掌佐車之政則戎車之貳曰倅此云佐者周禮相對為文有異散言則同稱佐車也知二人俱死者以卜國被責縣賁父自稱無勇既序兩人於上即明俱死也左傳云牛有牧馬有圉是圉人掌馬也股裏白故謂之白肉非謂肉色白也鄭知周以士爵者案掌客云凡介行人宰史皆有飱饔餼以其爵等為之牢禮凡介行人皆士也而云爵等是士有爵也故鄭註大行人云命者五公侯伯子男爵者四孤卿大夫士鄭知猶無諡者以此言誄自此始故也知殷大夫以上為爵者案士冠禮古者生無爵死無諡冠是周禮而云古者故知是殷又記於士冠之下故知大夫以上為爵也長樂陳氏曰春秋無義戰則莊公乗丘之戰非義也流矢中馬而敗績非御與佐之罪而罪之非智也以成德之誄而加之未成德之士使與士喪同非禮也非義與智則貽害於一時非禮則亂法於萬世貽害於一時其罪小亂法於萬世其罪大記者即其罪大者記之故曰士之有誄自此始也然則馬驚在御不在右莊公末卜而不末縣記稱縣死而不言卜死何邪莊公之末卜責其輕者以見其重者也記稱縣死即其責之所不及者以見其責之所及者也春秋書云敗宋師于乗丘則敗在宋人不在莊公於記則敗在莊公不在宋人者蓋乗丘之事莊公敗於二人未死之前宋人敗於二人既死之後春秋書其戰之罪故詳其終記人記其誄之罪故述其始而已馬氏曰古者士則生無爵至周衰以士為五等之爵而其死則無諡蓋忠信以事其上者可以爵為士然非大夫則無成德之行未可以誄為諡誄者言諡之文諡者定善惡之名魯莊公之誄縣賁父自知違先王之制猶不敢諡其意如廢輴設撥竊禮之不中者也然則烏知其不為諡曰莊公之誄其流至於哀公之世誄孔子曰天不遺耆老莫相予位焉嗚呼哀哉尼父者非善惡之名亦字之以著其美而已然記者又曰死而諡今也者是又末世相傳之失也廬陵胡氏曰佐車授綏授公綏復來春秋經魯莊十年書公敗宋師于乗丘非自敗也此云敗績記禮者妄當以經為正東萊吕氏曰釋文作馬驚敗而無績字案乗丘之戰魯勝也無敗績之事但當時止是馬驚敗耳初不預軍之勝負也曽子寢疾病樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與子春曰止曽子聞之瞿然曰呼曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而没鄭氏曰病謂疾困也子春曽參弟子元申曽參之子隅坐不與成人並也華畫也簀謂牀笫也說者以睆為刮節目字或為刮子春曰止以病困不可動呼虚憊之聲未之能易已病故也革急也變動也幸覬也不如彼謂童子也以德謂成己之德以姑息言苟容取安也斃仆也舉扶而易之言病雖困猶勤於禮孔氏曰此一節論曽子臨死守禮不變之事華而睆者凡畫五色必有光華爾雅釋器簀謂之笫睆謂刮削木之節目使其睆睆然好也詩傳云睍睆好貌鄭云睆字或為刮者謂一本睆字作刮字也吾何求哉曽子謂吾今更何求焉唯求正道易換其簀而即仆焉斯此也已猶了也此則正一世事了不陷於惡故君子慎終如始也河南程氏曰人苟有朝聞道夕死可矣之志則不肯一日安於所不安也何止一日須㬰不能如曽子易簀須要如此乃安人不能若此者只為不見實理實理者實見得是實見得非凡實理得之於心自别若耳聞口道者心實不見若見得必不肯安於此横渠張氏曰簀必簟席之類以其可易華而睆必陳之在上顯露也長樂陳氏曰傳曰曽子仕於莒得粟三秉方是之時曽子重其禄而輕其身親没之後齊迎以相楚迎以令尹晉迎以上卿方是之時曽子重其身而輕其禄夫重三秉之粟輕令尹卿相之禄則是未嘗為大夫矣未嘗為大夫而死於大夫之簀宜曽子之所不為童子以其非禮而發問焉事師以義故也曽元知其非禮而不忍易之事父以恩故也是雖恩義之所施有所不同要之小恩不如大義之愈也孟子曰曽子可謂養志者也曽元可謂養口體者也不易簀其養體之事歟曽子之死其言正顏色動容貌出辭氣而其行至於易簀子路之死不忘結纓成子髙之死不忘擇葬是皆全一世之德正一世之事而天下後世之言君子者必稽之矣彼秦穆之死其亂命及於三良魏武子之死其亂命欲及於其妾魯僖薨於小寢文公薨於臺下其視君子之所處不亦逺乎山隂陸氏曰言細不言小者與小人微異其所見不巨耳王文公曰姑息者且止之詞蓋未有不壞於且止者也聖人以義制禮其詳見於牀笫之閒君子以仁行禮其勤見於垂死之際廬陵胡氏曰吾何求哉吾得正而斃焉斯已矣朝聞道夕死可矣士不聞道竊知其無以死也得正而斃雖死無餘事矣故曰斯己矣廣安游氏曰曽子之於始終雖一簀之不正不以疾亟而不易此聖門學道治心養氣之功也以其治心養氣之功既至則臨死生之際而不亂自孔孟而下此學之失而近之者釋氏有焉故自唐以來聰明睿知之士無有不溺於學佛者蓋上失其道皇極不建儒者專以誦讀言語為事至於治心養性之學茫然而不得其原其勢出於不得已君子苟欲正之必先立皇極之道則道出於上人知向方矣苟為不然徒罪天下之溺於佛則是坐視斯人失其性而死耳龍泉葉氏曰曽子之學堅定明篤雖神已離形而不變異死生若一致然且改過甚勇以正為終是後學鑒照準程處也始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然鄭氏曰皆憂悼在心之貌也求猶索物孔氏曰記人因前有死事遂廣說孝子容節也事盡理屈為窮言親始死孝子匍匐而哭之心形充屈如急行道極無所復去也既殯心形稍緩矣瞿瞿眼目速瞻之貌如有所失而求覔之不得也既葬又漸緩矣皇皇猶栖栖也葬後親歸草土孝子心形栖栖皇皇無所依託如望彼人來而人不至也練則轉緩也至小祥但歎慨日月若馳之速也至大祥而寥廓情意不樂而已嚴陵方氏曰下篇述顏丁之居喪則言皇皇於始死言慨焉於既葬問喪則言皇皇於反哭所言不同者蓋君子有終身之喪思親之心豈有隆殺哉先王制禮略為之節而已故其所言不必同馬氏曰親始死惻怛痛疾傷腎焦肺而其志懣氣盛袒踊無數故曰充充如有窮在牀為尸在棺為柩而人子之心猶望其反及既殯也尸柩不可見魂氣不可復而欲冀其聲容之髣髴又不可得則忽焉失之矣故曰瞿瞿如有求而弗得殯則在宫葬則在野宫則猶近而雖不可復生然且有所據依求索之及葬於野則逺矣而魂氣無所依焉入門弗見也上堂弗見也入室又弗見也不可復見也已矣於是為甚有虞以迎之祔以安之然猶不知鬼神之格歟故曰皇皇如有望而弗至邾婁復之以矢蓋自戰於升陘始也魯婦人之髽而弔也自敗於臺鮐始也鄭氏曰戰於升陘魯僖二十二年秋也時師雖勝死傷亦甚無衣可以招魂也敗於臺鮐魯襄四年秋也臺當為壺字之誤也春秋傳作狐鮐時家家有喪髽而相弔去纚而紒曰髽禮婦人弔服大夫之妻錫衰士之妻則疑衰與皆吉笄無首素緫孔氏曰此一節論二國失禮之事左傳云我師敗績故知邾勝必用矢者時邾人志在勝敵矢是心之所好故用所好招魂冀其復反也案士冠禮纚廣終幅長六尺所以韜髮今以凶事故去之但露紒而已喪服傳云大夫弔於命婦錫衰命婦弔於大夫亦錫衰是大夫之妻弔服錫衰也士妻弔服無文故鄭云疑衰與周禮司服有錫衰緦衰疑衰喪服註云士之弔服疑衰則知士妻亦疑衰也吉笄無首素緫大戴禮文嚴陵方氏曰矢所以施於射非所以施於復復則各以其衣而已髽所以施於喪非所以施於弔弔則各以其衰而已升陘之野戰已無衣可用故復之以矢然邾婁因之而弗改則非矣臺鮐之敗以家各有喪故髽而弔然魯婦人因之而弗改則非矣廣安游氏曰先王之世雖用兵臨軍之際未有不用禮者也且禮者行乎其所可行者也孔子曰殺人之中又有禮焉此古道也惟其以禮相與則兩軍交戰殺人要有所止未有若後世極兵力所至至於僵尸百萬流血千里而後已者也故古者雖身膏草野之人與夫死者之家所謂喪弔之禮猶得行乎其閒升陘以前未嘗無戰死者得復以衣而不復以矢臺鮐以前未嘗無戰死而相弔者得弔以衰而不以髽則是殺人之甚必自升陘臺鮐二者始自是而遂以為常則再失之矣嗚呼自先王之禮廢而兵禍之烈至於六國秦漢之際殺人至以數十萬計天下塗炭肝腦塗地失禮之禍至於如此是誠可歎也大率先王之世治出於一而禮樂達乎天下凡所謂禮者行之廟堂至乎州巷達乎蒐狩用乎軍旅造次顛沛無非禮者生乎由是死乎由是上下小大相與習乎此而安乎此於兩軍之戰而殺有所止禮使然也後世不然其從容無事之時固已廢禮任其智力及夫軍旅死生之際苟可以自利而害人者豈復恤哉故古人殺有所止與後世異蓋禮之存亡故也於復以矢弔以髽則知兵禍之甚烈記禮者記其失禮之甚也南宫縚之妻之姑之喪夫子誨之髽曰爾毋從從爾爾毋扈扈爾蓋榛以為笄長尺而緫八寸鄭氏曰南宫縚孟僖子之子南宫閱也字子容其妻孔子兄女誨敎爾女也從從謂大髙扈扈謂大廣爾語助緫束髮垂為飾齊衰之緫八寸孔氏曰此一節論婦人為舅姑服髽與笄緫之法妻之姑謂夫之母也以是夫子兄之女故夫子誨之作髽法期之髽稍輕自有常法毋得髙廣如斬衰之髽也既敎以作髽又敎以笄緫之法其笄用木無定故敎以用榛木為笄其長一尺而束髮垂餘之緫垂八寸案喪服吉笄長一尺二寸齊衰之笄長一尺降吉笄二寸也但惡笄或用櫛或用榛故夫子稱蓋以疑之喪服傳云緫長六寸謂斬衰也故此齊衰長八寸以二寸為差也嚴陵方氏曰緫則束髮之布也孟獻子􅎭縣而不樂比御而不入夫子曰獻子加於人一等矣鄭氏曰孟獻子魯大夫仲孫蔑可以御婦人矣尚不復寢加踰也孔氏曰此一節論獻子除喪作樂得禮之冝也依禮􅎭祭暫縣省樂而不作至二十八月乃始作樂又依禮􅎭後吉祭乃始復寢當時人􅎭祭之後則恒作樂未至吉祭而復寢今孟獻子既禫暫縣省樂而不作比可以御婦人而不入寢雖於禮是常而特異餘人故夫子善之云獻子加於人一等不謂加於禮一等也長樂陳氏曰蓋三年之喪則久矣故祥月而􅎭者以義㫁恩也期之喪則近矣故閒月而􅎭者以恩伸義也記曰􅎭而内無哭者樂作矣又曰􅎭而從御吉祭而復寢由此觀之孟獻子􅎭縣而不樂比御而不入則過乎此矣故孔子稱之今夫先王制禮以中為界子夏子張授琴於除喪之際孔子皆以為君子伯魚子路過哀於母姊之喪孔子皆非之然則孟獻子過於禮孔子反稱之者非以為得禮也特稱其加諸人一等而已樂書山隂陸氏曰孟獻子過而有子不及其為失一也唯夫子為能適中焉鄭氏謂琴以手笙歌以氣固自有次第也李氏曰設而不樂比御而不入加於人者也絲屨組纓不及於人者也同於人可也加於人則非中道矣及人可也不及人非禮矣孔子篤於仁克之以禮五日彈琴而不成聲仁也十日而成笙歌禮也有過不及然後知其中故言孟獻子有若而言孔子於其中孔子既祥五日彈琴而不成聲十日而成笙歌鄭氏曰不成聲哀未忘也十日則踰月且異旬也五日彈琴十日笙歌除由外也琴以手笙歌以氣孔氏曰此一節論孔子除喪作樂之限祥是凶事用逺日故十日得踰月若其卜逺不吉則用近日雖祥後十日亦不成笙歌以其未踰月也長樂陳氏曰祥之日可以鼓素琴君子所以與人同五日彈琴而不成聲君子所以與人異彈之者禮之所不可廢也不成聲者仁之所不忍也嚴陵方氏曰祥之日鼓素琴故孔子五日而彈琴徙月樂故孔子十日而笙歌有子蓋既祥而絲屨組纓鄭氏曰譏其早也禮既祥白屨無絇縞冠素紕有子孔子弟子有若孔子曰此一節明除喪失禮之事既祥素紕當用素為纓未用組今用素組為纓乃􅎭後之服故譏之案士冠禮冬皮屨夏用葛無云絲屨者此絲屨以絲為飾絇繶純之屬鄭註屨人曰絇屨頭飾也嚴陵方氏曰以絲為屨之絇以組為冠之纓則服之吉者也而有子服之於既祥固失之於早矣然則既祥之屨如之何亦曰徹絇而已既祥之纓如之何亦曰用素而已有子為孔門髙弟而失禮若是疑或不然抑記者或得於傳聞故曰蓋焉死而不弔者三畏厭溺鄭氏曰畏謂人或時以非罪攻己不能有以說之死之者厭謂行止危險之下溺謂不乗橋船不弔以其輕身忘孝也孔氏曰此一節論非禮横死不合弔哭之事王氏曰孔子畏匡德能自全也設使聖人卒罹不幸何得不痛悼而罪之乎非徒賢者設有罪愚人亦不得不哀傷之也王肅聖證論見通典横渠張氏曰知死而不知生傷而不弔畏厭溺可傷尤甚也故特致哀死者不弔生者以異之且如何不淑之詞無所施焉畏畏懼而死者也三者皆不得其死故君子傷之之甚但知憫死者而已哀有餘而不暇於文也長樂陳氏曰傷主於死者弔主於生者傷則傷其所終弔則弔其所失苟死者不足謂之終則生者不足謂之失此所以不足弔也蓋怖畏而死則非勇厭溺而死則非智是以戰死而葬者不以翣失伍而死者不入兆域凡此非勇者也垂堂之坐巖牆之立動而徴病行而招死凡此非智者也君子之所不弔者不特此而已宗魯賊於孟縶及其死也琴張不敢弔季子專政於魯及其死也曽晳倚門而歌君子之行無他要在生不為人之所不敬死不為人之所不弔而已嚴陵方氏曰戰陣無勇非孝也其有畏而死者乎君子不立巖牆之下其有厭而死者乎孝子舟而不游其有溺而死者乎三者之死皆非正命也廬陵胡氏曰畏謂畏避不能死難而終不免於死者廣安游氏曰古之君子欲正人之過失不專恃乎刑罰而已使生者有所愧死者有所憾皆所以誅罰之也生有所愧若異其衣冠坐諸嘉石著之丹書此類是也死有所憾若桐棺三寸不入兆域死而不弔倚門而歌此類是也蓋禮樂行於天下使人有所勸勉愧恥而不麗於過惡此其為道尊而不迫亦後世所不能及也慈湖楊氏曰畏死於兵厭死於巖牆溺死於水非不弔也不忍為弔辭不忍言之也使孔子果死於匡則不可弔乎屈原之死亦不可弔乎而先儒有謂直賤之而不弔此乃固陋執言失意人心之所不安也子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之鄭氏曰行道猶行仁義庾氏曰子路縁姊妹無主後猶可得反服推己寡兄弟亦有申其本服之理故於降制已逺而猶不除非在室之姊妹欲申服過期也蓋子路已事仲尼始服姊喪明姊已出嫁非在室也廣安游氏曰伯魚母死期而猶哭孔子曰嘻其甚也與此同意天下之禮苟循乎情之所及而為之則將不知其所止夫人有賢者有不肖者賢者過之不肖者不及也苟循其過而為之禮則子路伯魚不知其所終約其不及而為之禮則原壤宰予不可以為訓故禮者通乎賢不肖而為之不可以過不可以不及也嚴陵方氏曰行道之人與孟子呼爾而與之行道之人弗受同義先王制禮於可除而必除之行道之人於可除而弗忍焉必除之者公義也弗忍焉者私情也呉氏莘曰聖人以中道抑人之情非惡其過厚懼其不可繼而已廬陵胡氏曰行道謂道路之人大公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也鄭氏曰齊大公受封留為大師死葬於周子孫生焉不忍離也五世之後乃葬於齊齊曰營丘君子言其反葬似禮樂之義正丘首正首丘也仁恩也孔氏曰此一節論忠臣不欲離王室之事大公死反葬於鎬京陪文武之墓其子孫比及五世雖死於齊以大公在周故皆自齊反歸周而葬之先王之制禮樂若舜能紹堯即名大韶禹治水廣大中國則名大夏王業由質而興則禮尚質由文而興則禮尚文禮之與樂皆是重本反葬於周亦是重本之意君子既引禮樂又引古人遺言謂丘是狐窟穴根本之處雖狼狽而死意猶嚮此丘是有仁心也長樂陳氏曰禮樂同出於人心而仁者人也亦出於人心而已故人而不仁如禮何人而不仁如樂何則禮樂之道不過彰德報情而反始也太公封於營丘比及五世皆反葬於周夫豈偽為之哉行吾仁以全禮樂之道而已狐死猶正丘首況仁人孝子乎嚴陵方氏曰周官冢人掌公墓之地先王之葬居中諸侯左右各以其族故太公雖封於營丘而五世之子孫皆得反葬於周以從其祖焉若是則不背其所生之本而得禮樂之道矣雖然豈特人有是心哉而物亦有是性焉既言禮樂而又言仁者禮樂以仁為本故也廬陵胡氏曰禮樂皆以報本為重舜琴思父母之長養是樂其所自生烝畀祖妣以洽百禮不忘本也伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之鄭氏曰伯魚孔子子也名鯉猶尚也嘻悲恨之聲孔氏曰此一節論過哀之事伯魚母出父在為出母亦應十三月祥十五月禫期而猶哭則祥後禫前祥外無哭伯魚在外哭故夫子怪其甚也或曰為出母無禫期後全不合哭横渠張氏曰為母期而猶哭孔子怪鯉何也禮期至練必别有服服練則不哭時伯魚不除且哭故夫子怪之伯魚既聞之遂除其服而不哭也舜葬於蒼梧之野蓋三妃未之從也季武子曰周公蓋祔鄭氏曰舜征有苖而死因留葬焉書說舜陟方乃死蒼梧於周南越之地今為郡古者不合葬帝嚳立四妃象后妃四星其一明者為正妃餘三小者為次妃帝堯因焉至舜不告而取不立正妃但三妃而已謂之三夫人離騷所歌湘夫人舜妃也夏后氏増以三三而九合十二人春秋説云天子取十二即夏制也以虞夏及周制差之則殷人又増以三九二十七合三十九人周人上法帝嚳立正妃又三二十七為八十一人以増之合百二十一人其位后也夫人也嬪也世婦也女御也五者相參以定尊卑祔謂合葬合葬自周公以來孔氏曰此一節論古者不合葬之事淮南子云舜征三苖而遂死蒼梧從猶就也三妃不就蒼梧與舜合葬也云蓋者傳聞如此未之審悉祔葬言將後喪合前喪也廬陵胡氏曰書云舜陟方乃死帝王之没皆曰陟陟昇也謂昇天也案地之勢東南下如謂舜南巡而死冝言下方不得言陟方也以此謂舜葬蒼梧皆不可信考經傳舜但二妃蓋堯二女也事見於書甚明孟子亦云二女果秦博士對始皇帝云湘君者堯二女舜妃也劉向鄭氏亦以湘君為二妃而離騷九歌有湘君湘夫人王逸解云湘君水神湘夫人二妃也山海經洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小君謂其夫人因以二女為天帝之女韓子曰璞與逸俱失也夫娥皇為舜正妃女英自冝降曰夫人也故九歌辭謂娥皇為君謂女英為帝子各以其盛者推言之則知舜無三妃也明矣況后妃四星其一明者正妃餘三小者次妃帝嚳象之立四妃堯因而不改則古亦無三妃之禮鄭氏乃謂舜不告而娶不立正妃但三妃而已若然曷不見於書傳鄭解湘君又何不云三妃而云二妃耶曽子之喪浴於爨室鄭氏曰見曽元之辭易簀矯之以謙儉也禮死浴於適室孔氏曰此一節論曽子故為非禮以正其子也案上反席未安而没焉得有浴爨室遺語然反席之前足可有言記文不備耳曽子達禮之人應浴正寢今乃浴於爨室明知意有所為故鄭云矯之也士喪禮死于適室下云甸人掘坎于階間為垼于西牆下新盆槃瓶造于西階下乃浴於適室也臨川王氏曰此自元申失禮於記曽子無遺言鄭何以知其矯之以謙儉也大功廢業或曰大功誦可也鄭氏曰誦許其口習也孔氏曰此一節論遭喪廢業之事業謂所學習業學業則身有外營思慮他事恐其忘哀故廢業也誦則在身所為其事稍靜不慮忘哀故許其口習言或曰者以其事疑然亦恐有或人之言也横渠張氏曰大功廢業謂廢所治業也讀喪禮讀祭禮祭禮喪禮雖是讀書然且用之即是實事也大功喪禮簡故廢其業而已業所誦書也如連山歸藏周易詩書皆古之所業也長樂陳氏曰業者弦歌羽籥之事誦者詩書禮樂之文大功廢業而誦可則大功而上不特廢業而誦亦不可大功而下不特誦可而業亦不廢也康誥於父子則不戒之以弗念天顯於弟則戒之以其天性之厚者無事於戒天性之將薄者不可以不戒也禮不曰衰期廢業而曰大功廢業其意如此而已新安朱氏曰居喪初無不得讀書之文古人居喪不受業者業謂簨虡上一片板不受業謂不敢作樂耳古人禮樂不離身唯居喪然後廢樂故曰喪復常讀樂章周禮有司業者謂司樂也廣安游氏曰古謂習樂者為業春秋時魯宴寗武子賦湛露及彤弓寗武子曰臣以為肄業及之晉屠蒯曰辰在子卯君徹宴樂學人舎業皆以歌詩言之也古者國子教以歌舞歌者雅頌之詩是也舞者因歌而舞之也唯其以歌舞雅頌為學少而習業於此故謂之業舎業者舎歌舞之業以為哀也或曰徒可口誦其詩而已子張病召申祥而語之曰君子曰終小人曰死吾今日其庶幾乎鄭氏曰申祥子張子欲使執喪成己志也死之言澌也事卒為終消盡為澌太史公傳曰子張姓顓孫今曰申祥周秦之聲二者相近未聞孰是孔氏曰此一節論子張將終戒朂其子之事庶幸也幾冀也言吾平生以善自修今日將死其幸冀為君子乎汝但執喪禮以助我志則功名得存但身終而已長樂黄氏曰君子小人曰終曰死之别蓋言人生斯世當盡人道君子之人人道既盡則其死也為能終其事故以終稱之若小人則無可盡之道只是形氣消盡故稱之曰死終以道言死以形言子張言庶幾者蓋以生平持身唯恐有不盡之道今至將没幸其得以盡道而終故以為言亦猶曽子知免之意觀其將死喜幸之言足以見其平生恐懼之意正學者所當用力也今註家以為欲使執喪成己志䟽家又以為但身終功名尚存幾本訓近又訓為冀皆不可曉學術不明其弊至此不可不辨長樂陳氏曰君子盡人之道而異乎物故曰終小人非盡人道則物而已故曰死曲禮於大夫曰卒於士曰不禄於庶人曰死與此同意子張之病自以庶幾於君子之終而不為小人之死者蓋使申祥觀其行以自勵而已孰謂欲使執喪成己志哉書於舜言死春秋於無道之大夫皆曰卒者蓋以君子對小人則小人為死通而言之雖君子謂之死可也馬氏曰君子曰終言以德業也小人曰死蓋形斃而化則無所傳矣子張病召申祥語以此者欲其修身謹行以顯揚於己也廬陵胡氏曰終謂以禮終始廣安游氏曰古之學者貴乎行已而無愧怍其死也貴乎得其正得其正謂死於牖下且不死於婦人之手也觀人之法不觀於無事之時而觀於患難之際不信其平居之時而信其將死之日苟行已無愧怍將死而得其正是得其死者也苟得其死在君子為得其終在小人為得其死雖有君子小人之辨然皆學者之道也庶幾者謂庶幾乎學者之道也觀成王之顧命則知成王所以學於周公之道觀曽子子張之言則知曽子子張所以學於孔子之道曽子曰始死之奠其餘閣也與孔氏曰此一節論初死奠之所用閣架橙之屬人老及病飲食不離寢恐忽須無常故並將近置室裏閣上也始死未容改異故以閣上所餘脯醢以為奠也嚴陵方氏曰閣與大夫七十而有閣同以閣食物人之始死以禮則未暇從其新以情則未忍易其舊故其奠也止以閣之餘物山隂陸氏曰閣其餘者幸其更生若有待焉爾如先儒說以其閣之餘奠不唯於文不安亦大夫七十而後有閣則大夫死有無閣者矣曽子曰小功不為位也者是委巷之禮也子思之哭嫂也為位婦人倡踊申祥之哭言思也亦然鄭氏曰委巷猶街里委曲所為譏之也為位以親疏敘列哭也稱子思為位善之也禮嫂叔無服娣姒婦小功倡先也言思子游之子申祥妻之昆弟亦無服過此以往獨哭不為位孔氏曰此一節論無服為位哭之禮曽子以為哭小功之喪當為位時有不為位者曽子非之以為委巷之禮既言其失乃引得禮之人以證之子思孔子之孫其哭嫂為親疏之位於時子思婦與子思之嫂為娣姒有小功之服故子思之婦先踊子思乃隨之而哭鄭註喪服小功章云娣姒婦者兄弟之妻相名也長婦謂穉婦為娣婦娣婦謂長婦為姒婦謂據婦年之長幼不據夫年之大小左傳曰聲伯之母不聘穆姜曰吾不以妾為姒穆姜魯宣公之夫人聲伯之母乃宣公弟叔􅆄妻是弟妻為姒也又子容之母走謁諸姑曰長叔姒生男子容之母伯華之妻也長叔姒是伯華之弟叔􅆄之妻是亦謂弟妻為姒皆不繫夫年之長幼也非直子思如此其申祥哭妻之兄弟言思亦然横渠張氏曰小功情疏疏則容為位而後哭情重者始聞喪而哭不暇為位哀甚也嚴陵方氏曰位者哭泣之位也親有逺近服有輕重不可以無辨故哭泣之際各為之位焉迨乎周室之衰典籍多失而一時之禮或起於委巷則有小功不為位者此曽子所以譏之委巷猶言委曲之巷也子思之哭嫂也為位以言無服之喪猶且為位則知小功不為位尤為非矣馬氏曰無服而為位者唯嫂叔蓋無服者所以逺男女近似之嫌而為位者所以篤兄弟内喪之親子思之哭嫂也為位婦人倡踊以婦人相為娣姒之義而不敢以己之無服先之也至於申祥之哭言思亦如子思者蓋非禮矣嫂為内喪故可以正哭位婦人有相為娣姒之道故可以倡踊妻之兄弟外喪也而既無服則不可為哭位之主矣記曰妻之昆弟為父後者死哭之適室子為主袒免哭踊夫入門右由是言之則哭妻之昆弟以子為主異於叔嫂之喪也以子為主則婦人不當倡踊矣山隂陸氏曰婦人倡之而後踊逺嫌也古者冠縮縫今也衡縫故喪冠之反吉非古也鄭氏曰縮從也衡讀為横孔氏曰此一節記者解時人之惑也古者謂殷以上殷上質吉凶冠直縫辟積襵少故前後直縫之今周也周世文冠多辟積不復一一直縫但多作襵而并横縫之周之吉冠如此而喪冠猶疏辟而直縫是喪冠與吉冠相反故云喪冠之反吉也時人謂古制如此故釋之云非古也正是周世如此耳黄氏曰斯蓋作記之人指亂世之禮不本周公之制周公之制乃損益斟酌古之禮也謂古之喪冠直縫吉冠横縫為周公之古禮而衰世喪冠亦皆横縫而失禮無别故歎之曰喪冠之反吉非古是後之喪冠反同吉冠為非古正文患喪冠無别註義患喪冠與吉冠異製誤辨其㫖餘義横渠張氏曰吉冠之制豎搭過布布幅以二尺二寸為率則前後共有四尺四寸首圍所占之外餘廣尚多而為縫以文多故為吉凶冠則横繞布直縫無文至後世不然故曰喪冠之反吉非古也長樂陳氏曰一幅之材順經為辟積則少而質順緯為辟積則多而文順經為縮縫順緯為衡縫古者吉凶之冠皆縮縫今吉冠横縫而喪冠縮縫是喪冠與吉反矣故記者譏之右為隂左為陽凶隂事也大功已上右辟而縫之所以明凶也吉陽禮也小功已下左辟而縫之所以趨吉也禮書曽子謂子思曰伋吾執親之喪也水漿不入於口者七日子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之喪也水漿不入於口者三日杖而后能起鄭氏曰曽子言已執喪以疾時人之不然子思以曽子為難繼故以禮抑之長樂陳氏曰道之不行也知者過之愚者不及也道之不明也賢者過之不肖者不及也君子知夫知之過至於道之不行賢之過至於道之不明故於其可行而不可言則不言可言而不可行則不行庸豈以己之所能者病人以人之所不能者媿人耶先王制為喪親之禮其服衰止於三年其哭泣止於三月其水漿不入於口止於三日蓋三日可以怠而食三月可以解而沐三年可以祥而除使過之者俯而就之不至焉者跂而及之也若夫以親之恩為罔極吾之情為無窮徇其無窮之情而不節之以禮則在己者不可傳在人者不可繼是戕賊天下之人而禍於孝也此曽子所以不為子思取也樂正子春之母死五日而不食既而悔之況七日乎廬陵胡氏曰謂曽子過禮故舉禮之中曽子曰小功不稅則是逺兄弟終無服也而可乎鄭氏曰據禮而言也日月已過乃聞喪而服曰稅大功以上然小功輕不服逺兄弟謂相離逺者聞之恒晚孔氏曰此一節論曽子怪於禮小功不著稅服之事曽子謂小功不追服則逺處兄弟聞喪常晚終無服而可乎言其不可也曽子仁厚禮雖如此猶以為薄故怪之此據正服小功也故喪服小記云降而在緦小功者則稅之鄭康成義若限内聞喪則追全服清江劉氏曰韓子嘗弔於人見其貌蹙其意哀而其服吉者問之曰何也曰小功不稅也是以韓子疑之而作小功不稅之書夫為服者至親之恩以期斷其殺至於大功兄弟之恩以小功止其殺至於緦外親之服以緦窮其殺至於袒免聖人之制禮豈苟言情哉亦著其文而已矣大功稅小功不稅其文至於是也兄弟之服不過小功外親之服不過緦其情至於是也因其情而為之文親疎之殺見矣故禮大功以上不謂之兄弟兄弟有加而大功無加無加者親親也有加者報之也親親者稅不親親者不稅是亦其情也且禮專為情乎抑文乎如專為情也則至親不可以期斷小功不可以不稅如為文也則至親之期斷小功之不稅一也夫曽子韓子隆於情而不及文失禮之指而疑其說雖然韓子疑之是也彼人之為非也何以言之耶小功雖不稅亦不吉服而已矣記曰聞逺兄弟之喪既除喪而後聞之則袒免哭之成踊夫若是奚其吉哉故曰彼人之為非也韓子疑之是也小功不稅禮也然則袒免成踊則已矣乎猶有加焉曰我未之聞也雖然降而無服者麻不稅是亦降而無服已哀之以其麻哭之以其情逾月然後已其亦愈乎吉也馬氏曰曽子於喪有過乎哀是以疑於此然小功之服雖不必稅而稅之者蓋亦禮之所不禁也昔齊王子請欲為其母之喪孟子曰雖加一日愈於己推此則不稅而欲稅之者固可矣石林葉氏曰鄭氏謂大功以上則追服小功則不追服此所謂以義斷恩者而曽子以終無服疑焉古者三年之喪不弔大功未葬不弔而有殯聞逺兄弟之喪雖緦必往謂弔也緦服之至輕者也然苟可及弔猶服之輕者必往則不及弔而稅豈先王之得已哉殯當謂大功以下所識雖兄弟之不同居者皆弔非兄弟雖鄰不往則固無嫌薄於逺兄弟是以斷而不疑曽子蓋察於恩不察於義信乎禮之難知也其每事必請於夫子有以也廬陵胡氏曰小功之服最多親則叔父之下殤與適孫之下殤與兄弟下殤尊則外祖父母常服則從祖父母其不可不服明矣韓愈之意似不可不追服案喪服小記云降而在緦小功者則稅之其餘則否是據禮正服小功不稅也稅者謂日月已過始聞訃而服者大功以上如此小功否也鄭義限内聞喪則追全服王肅義限内聞喪但服殘日若限滿即止王義非也然鄭亦不言限外聞喪則如何是鄭亦不追服矣竊欲追服以附韓說廣安游氏曰古者卿士大夫同國而仕庶人同鄉而耕無相離之逺者其間相離之逺者為卿士大夫而出使為庶人而為啇其所適亦不逺非若後世出使及為啇者逺至於萬里之外小功容有不稅之理春秋時諸侯聘㑹不以其方非復先王之制而啇旅務致逺物非若古者自鄭而賈於周自楚而賈於鄭之近於是兄弟始有相去之久日月已過而後聞其喪者矣曽子見世變不同欲損益古禮以適當世之變然後世所不能行也禮記集説卷十六
