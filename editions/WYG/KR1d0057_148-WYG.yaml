body:
  text: 禮記集説卷一百四十八宋衛湜撰儒有一畝之宫環堵之室篳門圭窬蓬户甕牖易衣而出并日而食上荅之不敢以疑上不荅不敢以謟其仕有如此者鄭氏曰言貧窮屈道仕為小官也宫謂牆垣也環堵面一堵也五版為堵五堵為雉篳門荆竹織門也圭窬門旁窬也穿牆為之如圭矣并日而食二日用一日食也上荅之謂君應用其言孔氏曰此明儒者仕宦能自執其操也徑一歩長百歩為畝若折而方之則東西南北各十歩為宅也牆方六丈故云一畝之宫環謂周迴也東西南北唯一堵鄭註五版為堵定十二年公羊傳文證堵之大小髙一丈長三丈為雉篳門柴門蓬户謂編蓬為户又以蓬塞門謂之蓬户甕牖牖窓圓如甕口又云以敗甕口為牖易衣謂更相衣合家共一衣出則更著之也君應荅而用其言己則竭力不敢猜疑有言而君不用則靜黙不敢謟媚求進藍田吕氏曰儒者之仕將以事道也然有時乎為貧食其力以求免死而已辭尊居卑辭富居貧抱關擊柝乗田委吏無所徃而不可也故為貧者非事道事道者不為貧二者不可亂也一畝之宫環堵之室篳門圭窬蓬戸甕牖居之陋者也易衣而出并日而食養之至不足者也儒者所守之篤窮至於是而不悔也上之禮荅不荅繋乎知不知雖窮如是上苟知之則必以是道自期不疑乎上之未信也為其多聞歟則天子不召師為其賢歟未聞見賢而召之也尊其所聞行其所知不疑乎上之未信而有所屈盖事道不為貧也上苟不知則我知以力事人求其食以免死者也不輕進以求合也君不知而自獻其身君不問而自告其謀枉尋直尺強聒而不舎人謂之不謟不信也盖為貧者非事道也二者儒者仕之大分不可亂也江陵項氏曰一畝之宫環堵之室檀弓曰壊其室洿其宫而瀦焉詳其辭意則宫以地基言之室以屋廬言之也嚴陵方氏曰一畝之宫折方之則其宫四面各十歩而已五版為堵環堵之室周旋之則其室四面各五版而已上荅之不敢以疑者以其自信之篤也上不荅不敢以謟者以其懐忠之深也山隂陸氏曰上荅之不敢以疑不敢以疑求試也上不荅不敢以謟不敢以謟求合也金華應氏曰上荅之不敢以簡傲自取疏疑上不荅不敢為佞媚以自求謟合所謂疑者若踰垣閉門之類是也劇秦美新可謂謟矣儒有今人與居古人與稽今世行之後世以為楷適弗逢世上弗援下弗推讒謟之民有比黨而危之者身可危也而志不可奪也雖危起居竟信其志猶將不忘百姓之病也其憂思有如此者鄭氏曰稽猶合也古人與合則不合於今人也援猶引也取也推猶進也舉也危欲毁害之也起居猶舉事動作信讀如屈伸之伸假借字也猶圖也信或為身孔氏曰此眀儒者雖身不居眀代猶能憂思愛及於人之事也楷法式也雖危起居雖比黨之民共危之而行事舉動能終伸己之志謀不變易也藍田吕氏曰儒者之自信有義理存焉人有知不知吾所恃者尚論古之人而有合也時有遇不遇吾所守者不䘮乎本心也志有行不行吾所存者不敢忘天下也三者義理之所在故儒者信之至於窮不悔逹不變自信之篤者也今人與居古人與稽今世行之後世以為楷尚友於古人求為法於後世知之事也適弗逢世上弗援下弗推讒謟之民有比黨而危之者身可危也而志不可奪也義之事也雖危起居竟信其志猶將不忘百姓之病仁之事也故儒者自信之篤凢以有憂天下之心主於仁義而已故曰其憂思有如此者嚴陵方氏曰與今人並行於世與古人稽合於道也今世行之後世以為楷者中庸所謂行而世為天下法是也援言其有所引推言其有所進援則自上而引下推則自下而進上私相與而為比暗相結而為黨雖危起居以其身可危也竟信其志以其志不可奪信謂自信也猶將不忘百姓之病者孟子所謂禹思天下有溺者猶己溺之稷思天下有饑者猶己饑之也石林葉氏曰友一鄉之善士以至一國友一國之善士以至天下則所謂今人與居也誦其詩讀其書不知其人可乎又論其世則所謂古人與稽也適弗逢世而援推者天也讒謟之民比黨而危之者人也起居雖危而竟信其志天與人莫之奪也廬陵胡氏曰稽猶考也古人與稽考古道也適之也適弗逢世所之與世左也猶若也若將不忘百姓之病言其志若此也晏氏曰所可危者吾之起居之迹耳曽不知吾之志則確乎不拔奚可移之哉雖然危我者非良民也讒謟之民爾安可以讒謟之民而忘其良民哉是必終信其志不可忘百姓之病故曰其憂思有如此者儒有博學而不窮篤行而不倦幽居而不滛上通而不困禮之以和為貴忠信之美優㳺之法慕賢而容衆毁方而瓦合其寛裕有如此者鄭氏曰不窮不止也幽居謂獨處時也上通謂仕道達於君也既仕則不困於道徳則不足也美忠信法和柔毁方而瓦合去已之大圭角下與衆人小合也必瓦合者亦君子為道不逺人孔氏曰滛謂傾邪也人有忠信則已美之人和柔則已法之見賢思齊是慕賢汎愛一切是容衆方謂物之方正有圭角鋒鋩也毁已之圭角與瓦礫而相合謂屈己同凢藍田吕氏曰儒者自信之篤所謂知止而後有定也定而後能靜靜而後能安學至於安則其生不可已故博學而不窮其徳可乆故篤行而不倦窮不失義故幽居不滛達不動心故上通而不困用至於熟則從容而有餘力行至於和則與物同而不流故忠信之美優㳺之法慕賢而容衆毁方而瓦合皆至於安然後沛然而寛裕也忠信之美以忠信為美者也優㳺之法以優㳺之事為己法也毁方瓦合以與物同也陶者之為瓦必圓而割分之故分之則瓦合之則圓而不失其瓦之質謂之瓦合義取諸此嚴陵方氏曰㓜而學之壯而欲行之故愽學而不窮然後篤行而不倦不滛言節有守而不至於過不困言才有餘而不至於乏語曰禮之用和為貴盖禮之體則貴節禮之用則貴和無體不立無用不行不言體之節止言用之和者主寛裕言之故也充實之謂美言有忠信以充實乎其内故曰美制而用之謂之法言能優㳺以制用乎其外故曰法毁方則不與物忤瓦合則不與物乖山隂陸氏曰學博矣非寛裕不能不窮行篤矣非寛裕不能不倦幽居而不滛所謂不慙於影是也上通而不困序卦曰升而不已必困禮之失煩唯寛裕故能和毁方而瓦合者行不見於崖異心無愧於俯仰石林葉氏曰愽學有以貫之故不窮篤行有以至之故不倦幽居而能樂天故不淫上通而能知命故不困忠信之美充實於内優㳺之法遜接於外充實於内故尊賢而慕之優㳺於外故愛衆而容之慕賢則能毁方而為圓也容衆則能瓦合而為同也自愽學不窮以至上通不困皆所以為寛寛言其畜徳也自禮之以和為貴以至毁方而瓦合皆所以為裕裕言其容徳也横渠張氏曰毁圭璧之圭角以與瓦礫合也廬陵胡氏曰方猶方命虐民之方孔氏曰毁己之方正非也方正何可毁也瓦合陳湯云烏孫瓦合是也孔云瓦器破而相合亦非晏氏曰毁方則用圓以周旋猶珠之走盤也瓦合則委曲以相就猶瓦之覆屋也自非寛而不猛裕而有容何以致此儒有内稱不辟親外舉不辟怨程功積事推賢而進達之不望其報君得其志苟利國家不求富貴其舉賢援能有如此者鄭氏曰君得其志者君所欲為賢臣成之孔氏曰稱舉也不辟親若祁奚舉子不辟怨若祁奚舉讎儒者欲舉人必程效其功積累其事知其賢乃推而進達之不求望其報也輔助其君使君得其志意所欲此推賢達士惟苟在利益國家不自求富貴也藍田吕氏曰儒者之志以天下為度者也寛裕之至既足以有容則物我之間無所别也天下有事而不治天下有賢而未達吾任其責矣故知其賢也猶有親怨之辟謂之公而實私也過計於一己之私不同乎天下之公也傳稱祁奚稱其讎不為謟立其子不為比忘乎親讎者也公叔文子之臣大夫僎與文子同升諸公忘其君臣者也趙文子所舉於晉國筦庫之士七十有餘家忘乎貴賤者也管仲遇盗取二人焉上以為公臣曰其所與㳺辟也可人也忘乎其素者也能忘乎是而唯天下國家之利然後舉賢援能盡其公矣夫望報於人求富貴於己小人之道也又何足道哉嚴陵方氏曰不以一身之小嫌妨天下之貞才故雖親也亦在所稱不以一心之私忿害天下之公義故雖怨也亦在所舉程功者程其功之優劣苟利國家不求富貴者以利國家為心而不徼舉賢之賞也儒有聞善以相告也見善以相示也爵位相先也患難相死也乆相待也逺相致也其任舉有如此者鄭氏曰相先猶相讓也乆相待謂其友乆在下位不升已則待之乃進也逺相致者謂已得眀君而仕友在小國不得志則相致逺也孔氏曰此眀儒者任舉同類前經謂疏逺者此經謂親近者逺相致逺相招致也藍田吕氏曰舉賢援能儒者所以待天下之士也任舉者儒者所以待其朋友而已待天下之士推賢而後舉樂與同天下之治者也朋友則非特是也必同其好惡故聞善以相告見善以相示必同其憂樂故爵位相先患難相死彼雖居下不待之同升則不升彼雖疏逺不致之同進則不進此任舉朋友加重於天下之士者義有厚薄故也嚴陵方氏曰聞善者聞善言也見善者見善行也所受之命謂之爵所居之官謂之位任舉謂相任以事相舉以職上言彼賢而我舉之彼能而我援之此則更相任舉而已此其所以異馬氏曰乆相待也雖乆而不忘逺相致也雖逺而不遺孔子以乆要不忘平生之言亦可以為成人矣乆相待之謂也儒有澡身而浴徳陳言而伏靜而正之上弗知也麤而翹之又不急為也不臨深而為髙不加少而為多世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者鄭氏曰麤猶疏也㣲也觀色縁事而㣲翹發其意使知之不臨深而為高臨衆不以己位尊自振貴也不加少而為多謀事不以己小勝自矜大也世治不輕不以賢者並衆不自重愛也世亂不沮不以道衰廢壊己志也孔氏曰此眀儒者殊異於人特立獨行之事澡身謂澡潔其身不染濁也沐浴於徳以徳自清也世治雖羣賢並處常自重愛世亂亦不沮己之志位雖同而行不善則不與親合彼雖與己疏異所為則不非毁之身所特立獨有此行故云特立獨行也藍田吕氏曰唯大人為能格君心之非然在己者未正未有能直人者也故澡身浴徳者所以正己也陳言而伏者入告嘉謀嘉猷於内爾乃順之於外也書曰嘉言罔攸伏伏者閉而不出之謂也靜而正之者將順其美正救其惡常在於未形也故曰上弗知也麤而翹之者其事君也以其事之麤者㣲發其端而為之兆兆足以行則進而無己不足以行則去之孔子所以未甞終於三年淹故曰又不急為也所以事其君者先其未發而止其為惡先為之兆以甞其為善此衆人所未識也所以治其己者有若無實若虚不自髙且自多此衆人所不能也所以行於世者無治亂之異所以接於人者無同異之間一於義理而已此衆人所不為也盖特立獨行所以異於衆人者如此嚴陵方氏曰澡浴皆所以致其潔而已有徳者必有言故繼之以陳言而伏也伏謂伏聴君命之用否也靜而正之者隠進之也麤而翹之者明告之也世治而徳常見重故曰不輕世亂而志常自若故曰不沮與其所可與不必同乎已也非其所可非不必異乎已也盖同乎己者不必善異乎己者不必惡同而與之則讒謟面諛之人至矣異而非之則直諒多聞之友去矣是又見其行之不與物羣也故兼以獨行言之山隂陸氏曰陳言而伏者雖㣲有所陳當伏其㫖靜而正之上弗知者孟子三見齊宣王不言事曰我先攻其邪心也麤而翹之者諌有精有麤婉而㣲激之謂精麤而翹發之為麤孟子曰是不可磯也盖㣲切以激之謂之磯也又不可急為也夫如是豈可以遽㢤不以彼深故自上臨之以自為髙不以彼少故自下加之以自為多石林葉氏曰澡身浴徳不自汙也陳言而伏不顯諌也靜而正之上弗知者諌不顯而君未悟也麤而翹之又不急為者諌已顯而事不迫也雖能其事不臨深而為髙惡自髙也雖有其功不加少而為多惡自大也世治而士貴矣其行不輕世亂而士賤矣其志不沮同於己者或郷原也公而弗與異於己者或行怪也惡而弗非儒之特立獨行盖如此也晏氏曰澡身者潔其身而不汙於世俗爾若莊子曰澡雪而精神是已浴徳者清其徳而不汨於嗜慾爾若莊子曰疏瀹而心是已陳言而伏者其言雖顯而其身則隠矣所謂伏其身而不見也世治則人皆務進而求利吾則未甞妄動故曰不輕世亂則人皆自屈以辟害吾則未甞變節故曰不沮儒行一篇兩言自立者其立不困於人也一言特立者其立能出乎衆也又言特立獨行者其立既能出乎衆而所行又不同乎流俗也馬氏曰立見於有守行見於有為特猶獨也自立與特立固異矣自立者以對人言之也特立者以對衆言之也金華應氏曰世治不輕進若伯夷不仕於武王亂不退沮若孔子歴聘諸國舉世所是而不輕狥舉世所非而不輕棄非但處而特立於一身亦出而獨行於一世儒有上不臣天子下不仕諸侯慎靜而尚寛強毅以與人博學以知服近文章砥厲㢘隅雖分國如錙銖不臣不仕其規為有如此者鄭氏曰強毅以與人不苟屈以順之也君分國以禄之視之輕如錙銖八兩曰錙孔氏曰此明儒者志操規為之事不臣天子伯夷叔齊是也不事諸侯長沮桀溺是也知服謂知服畏先代賢人言不以己之博學淩跨前賢也習近文章以自磨厲使成已亷隅也不與人為臣不求仕宦但自䂓度所為之事藍田吕氏曰不臣者不傳質為臣也不事者無常職以食於上者也在國曰市井之臣在野曰草莽之臣皆謂庶人庶人雖有臣之名而不執臣之事非䇿名委質者也故君有饋焉曰寡君則君猶賔之也為庶人者不傳質為臣則不見盖可役於君而不可見也此不臣之義也抱關擊柝皆有常職以食於上事事者也立乎人之本朝而恥道不行事道者也事道者道不行則不仕事事者不為貧則不仕不仕者亦庶人也君之於氓也固周之周之則受賜之則不受此不受之義也不臣不仕皆事道者也慎靜而尚寛則有度也強毅以與人則有守也博學以知則有本也服近文章則有文也砥厲廉隅則有節也兼是五者則所以事道者無慊也非其義也非其道也禄之以天下弗顧也故雖分國而受之視之如錙銖之輕其規摹之大所為之不亂皆所以事道也嚴陵方氏曰謂之臣則事之可知謂之事則不必臣焉此重輕之别莊子言天子不得臣諸侯不得友盖此意夫道合則從不合則去故雖天子有所不臣諸侯有所不事也進退之節如此然進非汲汲退非悻悻故繼之以慎靜而寛也強所以自勝毅所以致果皆立己之道也立己而已或至於絶物故繼之以與人則於物無絶矣學雖貴乎博苟不知服而行之則亦讀聖而庸行矣故博學又貴乎知服徳性内也君子之所尊文章外也亦近之而已廉猶陛之廉隅猶城之隅皆有分際則以况君子之不苟合也砥以平之厲以利之則修治之謂也不失所為而有常規故曰其規為有如此者馬氏曰服與中庸所謂得一善則拳拳服膺之意同學之期行之也知服則知行也青與赤為文白與赤為章文章猶美徳見於外也近文章則不至於鄙野矣山隂陸氏曰慎靜徃徃失之狹吝強毅失之拒人博學以知句㫁博而不能眀了者多矣刻意尚行離世異俗髙論怨誹為亢而已矣此不知服近文章之過也就藪澤處閒曠釣漁閒處無為而已矣此不知砥厲廉隅之過也晏氏曰上不臣天子下不事諸侯者易所謂不事王侯髙尚其事也慎靜而寛者以仁而盡性強毅以與人者以義而制事博學以知服者以知而窮理近文章者外有備成之文砥厲亷隅者内有修潔之行此所以雖分國如錙銖不肯委質而為臣詘道而入仕矣質為本文為末君子務本不務末故於文章則近之而已不敢以文勝質也砥厲者以石治金之事也於亷隅而言砥厲者欲磨礱而成君子之器爾建安真氏曰文章二字非止於言語詞章而已聖人盛徳藴於中而光輝發於外如威儀之中度語言之當理皆文也堯之文思舜之文明孔子稱堯曰煥乎其有文章子貢曰夫子之文章皆此之謂也至於二字之義則五色錯而成文黒白合而成章文者燦然有文之謂章者蔚然有章之謂章猶條也六經論語之言文章皆取其自然形見者後世始以筆墨著述為文與聖賢之所謂文者異矣五峯胡氏曰君子畏天命順天時故行驚衆駭俗之事而常中小人不知天命以利而動肆情妄作故行驚衆駭俗之事必其無忌憚而然也金華應氏曰案十六條中曰自立曰特立獨行曰剛毅此數條居其半大扺皆以難進易退為高而不慮其過於強矯也盖儒者之立身以氣節為主氣節不立而學問雖富亦不足觀也儒有合志同方營道同術並立則樂相下不厭乆不相見聞流言不信其行本方立義同而進不同而退其交友有如此者孔氏曰方法也經營道藝同齊於術同術則同方也但合志同方據所懐志意營道同術據所習道藝並立謂同仕朋友乆不相見聞流謗之言欲譖毁之己則不信也其行所本必方正所立必存義朋友所為與己同則進而從之不與己同則退而避之以上十五儒所陳之事亦有前後乖異者盖儒包百行事非一揆量事制冝随機而發雖或不同無所怪也藍田吕氏曰所以任舉其交友者則好惡憂樂與之同也然盡交友之分則理義必與之同君子之道或出或處或黙或語二人同心其利㫁金同心之言其臭如蘭凡所謂同者理也義也出於人心之所同然賢者能存而勿喪之故不患乎不同也合志同方則志同好矣營道同術則學同道矣並立則樂相下不厭好同則同體矣乆不相見聞流言不信學同則信其行矣其行本方立者立行本其志之所同方也行同則學同矣義同而進不同而退同斯義以進退也進退同則同好矣交友之分至於無一不同者學一於理而不惑也嚴陵方氏曰並立則樂以其無忌心相下不厭以其有孫志乆不相見聞流言不信以其乆要不忘而相信之篤本方者以方為本也道同則進而與之交不同則退而與之辨夫道不同不相為謀而况交友乎子貢問友子曰忠告而善道之不可則止毋自辱焉以是而已馬氏曰方者道之所也志在於道唯合志故同方術者所資以適道唯營道故同術營道方將入於道故以術言之也山隂陸氏曰同方言同所向同術言同所由易曰方其義也盖義未有不因方而立者晏氏曰合志同方言趨嚮者同也營道同術言修為者同也方言趨嚮之地術言修為之業語曰士志於道是志必在於道也道不外於志也故始焉合志而趨向者不殊則終焉營道而修為者一致矣有朋自逺方來不亦樂乎故並立則樂以能問於不能昔者吾友甞從事於斯矣故相下不厭流言止於知者如曰曽叄殺人若顔回者豈信之哉故曰聞流言不信機在内故欲其圓而能應行在外故欲其方而有守執規司春者主乎仁執矩司秋者主乎義故曰其行本方立義易曰義以方外是也相視而笑莫逆於心然後足以為友故義同而進不同而退也同方同術者講習之友並立相下者相成之友不信流言義同而進者同徳之友故曰其交友有如此者温良者仁之本也敬慎者仁之地也寛裕者仁之作也孫接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒者兼此而有之猶且不敢言仁也其尊讓有如此者鄭氏曰此兼上十有五儒盖聖人之儒行也孔子嫌若斥已假仁而為説仁聖之次也孔氏曰温良之性是仁之本地所以居止萬物仁者動作必寛裕遜接謂遜以接物禮節是外貌言談是文章歌樂是其和悦分散蓄積而振貧窮是仁之恩施也藍田吕氏曰仁者體天下之公加之以中心惻怛之意儒者之學學此而已爾孔子曰何事於仁必也聖乎堯舜其猶病諸又曰若聖與仁則吾豈敢故君子之學非仁無為欲稱其仁雖聖人有所不敢則為之難可知矣質之温良者可與為仁故曰仁之本行之敬慎者可與行仁故曰仁之地其規摹寛裕則稱仁之動作其與人遜接則習仁之能事威儀中節敬於仁者也故為仁之貌出言有章仁之見於外者也故為仁之文詠歌之不足不知手之舞之足之蹈之則安於仁而至於和者也貨不為己則利與人同與人為善則善與人同凡以分散與物共而不私則仁術之施不吝也八者儒必兼而有之然後可以盡儒行之實猶且不敢言仁則聖人之志存焉有聖人之志存則可與入聖人之域矣長樂陳氏曰周公掌禮樂以春官禮樂資仁以立也大饗之禮備具禮樂繼之君子知仁焉禮樂待仁以行也孔子曰人而不仁如禮何人而不仁如樂何是仁為禮樂之本禮樂為仁之文也有禮斯有節有歌有樂樂記曰合情飾貌者禮樂之事也禮節所以飾貌故為仁之貌歌樂所以合情故為仁之和貌外也禮自外作故也和内也樂由中出故也語曰文之以禮樂亦可以為成人矣儒行之論儒者十五而以仁與禮樂終焉則成人之道盡於此矣孔子未甞與門人以仁與禮樂所與特顔子一人而已然則顔子之去聖人其出入亦不逺矣合之則禮樂皆本於仁離之則仁近於樂義近於禮孔子以孝悌為仁之本孟子以事親為仁之實從兄為義之實其致一也樂書嚴陵方氏曰温良則得於中故以為本敬慎則發於外故以為地寛則不迫裕則有餘夫仁無本不立故首以仁之本有本然後可以有行故繼以仁之地有行則有所事故繼以仁之作仁之作則見其所能故繼之以仁之能有所能則形之於外故繼之以仁之貌形於貌則必有所飾故繼之以仁之文有其文則無乖於物故繼之以仁之和有所和則其餘足以利物故繼之以仁之施山隂陸氏曰不求近功可謂寛裕矣若太王王季作周功在數世之後兼謂兼上十五儒易曰謙尊而光讓未有不尊者也亦尊而後讓可言也儒有不隕穫於貧賤不充詘於富貴不慁君王不累長上不閔有司故曰儒今衆人之命儒也妄常以儒相詬病孔子至舎哀公館之聞此言也言加信行加義終没吾世不敢以儒為戲鄭氏曰隕穫困迫失志之貌充詘歡喜失節之貌慁猶辱也累猶係也閔病也言不為天子諸侯卿大夫羣吏所困迫而違道孔子自謂也妄之言無也言今世名儒無有常人遭人名為儒而以儒靳故相戲此哀公輕儒之所由也詬病猶恥辱也儒行之作盖孔子自衛初反魯時也孔子歸至其舎哀公就而以禮館之孔氏曰命名也言今世衆人名之為儒者無有常人但遭人則謂之儒耳命之謂儒是相恥辱時世如此故哀公輕儒也杜預左傳注戲而相靳曰愧言加信行加義是記者之説終没吾世不敢以儒為戲是哀公之言記者述而録之藍田吕氏曰此篇緫言儒行其别十有五自淺而至深而卒歸於仁以至於聖人不敢居仁之志幾於盡矣猶繼之以不隕穫於貧賤不充詘於富貴不慁君王不累長上不閔有司者盖衆人之命儒也妄常以儒相詬病所以待儒之意常輕以利心量君子見其居富貴而有為則謂滛於富貴不知逹則兼善天下見其居貧賤而有守則謂移於貧賤不知窮則獨善其身也見其危行言遜則謂屈於威武不知身可殺而志不可奪也盖儒者之行出於徳性之所安無是衆物之可累也有是之累則隕穫充詘不能免謂之有徳可乎此卒章所以申言之也孔子謂子夏曰女為君子儒無為小人儒則儒之不同乆矣衆人之命儒見小人之儒也若君子之儒則衆人所不識也小人之儒也為人君子之儒也為己小人之儒也以文君子之儒也以實以文對實以為人對為己則小人觀美而近名君子闇然而難知且將以逺大為迂濶以髙眀為無實以逺勢利為詐以守禮義為簡指白為墨誣善為惡此所以以儒相詬病也如識乎君子之儒者且將矜式之不暇又何敢戲乎嚴陵方氏曰無儒者之行而為儒者之服無儒者之實而盗儒者之名故曰今衆人之命儒也妄以其妄故常為人相詬以言相病以行也言加信則不以儒相詬矣行加義則不以儒相病矣終猶没也以時言則曰終以事言則曰没晏氏曰隕如籜之隕而飄零穫如禾之穫而枯槁不隕穫於貧賤是貧賤不能移也充則以滿而必溢詘則以髙而必危不充詘於富貴是富貴不能淫也事父孝故忠可移於君所以不慁君王事兄弟故順可移於長所以不累長上居家理故治可移於官所以不閔有司不慁君王者不為汙吏以取辱於君王也不累長上者不為過行以連及於長上也不閔有司者不被眀刑以見憐於有司也衆人之命儒也妄為其非真儒也故或慢罵而相恥或深疾而相病矣楊子謂或問魯用儒而削何也曰魯不用真儒也山隂陸氏曰隕不穫也充不詘也言雖不隕於貧賤亦不穫於貧賤雖不充於富貴亦不詘於富貴儒者之行始於自立故初一曰自立五事所以修身也而修身自貌始故次二曰容貌曽子曰動容貌斯逺暴慢矣然亦不可不備豫故三曰備豫近人矣又惡其無特操故繼之以特立特立則剛毅剛毅則自立故繼之以剛毅自立前言於道能自立此言於事能自立如是而仕可也故繼之以仕仕則不能無憂思故繼之以憂思憂思或失之過故繼之以寛裕夫欲寛裕豈可以無助為之也故繼之以舉賢援能舉賢援能不能任之猶不舉不援也故繼之以任舉於任舉則疑若有待也故繼之以特立獨行如是雖不仕吾弗愧也故繼之以規為凢此雖在我亦交友之力也故繼之以其交友有如此者儒行至於此備盡矣守之以讓而已故繼之以尊讓禮記集説卷一百四十八
