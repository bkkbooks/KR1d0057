body:
  text: 禮記集說卷六十二宋衛湜撰禮也者反其所自生樂也者樂其所自成是故先王之制禮也以節事修樂以道志故觀其禮樂而治亂可知也蘧伯玉曰君子之人達故觀其器而知其工之巧觀其發而知其人之知故曰君子慎其所以與人者鄭氏曰自由也制禮者本己所由得民心也樂其所自成者緣民所樂於己之功也舜之民樂其紹堯而作大韶湯武之民樂其濩伐而作濩武制禮以節事動反本也修樂以道志勸之善也蘧伯玉衛大夫也名瑗君子之人達者觀其禮樂則知治亂也君子慎所以與人將以是觀也孔氏曰前經明禮樂相交此經更論先王制禮樂以節事道志化民治下也禮樂俱是象其王業所由但禮據王業之初故云所自生樂據王業之末故云所自成先王以禮為反本故用禮以節萬事樂以成王業故修樂以道己志若能以禮節事以樂道志則國治不爾則國亂故治亂可知也觀其器之善惡而知工匠巧拙觀其人之發動所為而知其人之有知禮樂猶是也禮正而樂和則知其國治禮慢而樂淫則知其國亂也禮樂者與人相接之具君子治國謹慎其所以與人相接者將以是觀也橫渠張氏曰禮反其所自生樂樂其所自成禮别異不忘本而後能推本為之節文樂統同樂吾分而已禮天生自有分别人須推原其自然故言反其所自生樂則得其所樂即是樂也更何所待是樂其所自成虙氏曰此言禮也者反其所自生樂也者樂其所自成樂記言樂樂其所自生禮反其所自始二者言禮雖不同而皆以報本於古言樂雖不同而皆以象成於今不以今而忘古此禮之所以制不以古而廢今此樂之所以作明乎報本象成之意通乎古今之義言雖不同無害其為同也何則天下之理有始而後有生乾之萬物資始坤之萬物資生是也有生而後有成春生秋成是也即生與成而論之則生者為古成者為今此禮器所以言禮也者反其所自生樂也者樂其所自成也即生與始而論之則生者為今而始者為古此樂記所以言樂樂其所自生禮反其所自始也且以禮之所始者言之醴酒生於𤣥酒則𤣥酒者醴酒之始也故𤣥酒之尚焉鉶羮生於大羮則大羮者鉶羮之始也故大羮之貴焉所設必以稿鞂者以莞簟之所生故推其始而報之也所幂必以疏布者以文繡之所生故推其始而報之也所謂言禮不同而皆以報本於古者此也以樂之所成所生者言之作樂崇德是德者樂之所自生也功成作樂是功者樂之所自成也黃帝有潤澤之仁故作咸池以象之舜有繼紹之義故作大韶以象之是咸池大韶之樂非黃帝虞舜則無由以生無由以成也湯護民於塗炭故其樂曰濩武王繼伐於一怒故其樂曰武是濩武之樂非湯武則無由以生無由以成也所謂言樂不同而皆以象成於今者此也雖然禮器以禮為主故先禮而後樂樂記以樂為主故先樂而後禮此立言之法若夫檀弓所謂樂樂其所自生禮不忘其本必以本為言者蓋檀弓所言以太公封於營丘比及五世皆反葬於周則有不忘祖之義萬物本乎天人本乎祖此所以謂之本歟禮自外作故先王制之以節事樂由中出故先王修之以道志其節事也若官爵得其序政事得其施加於身而錯於事凡衆之動得其宜是已其道志也若韶以繼為志夏以大為志發揚蹈厲太公之志武亂皆坐周召之治是也馬氏曰禮所以報本故反其所自生樂所以彰德故樂其所自成記曰樂樂其所自生而禮反其所自始别而言之則禮者反其所自生樂者樂其所自成合而言之樂亦反其所自生也禮所以約人之外故以節事事者自外作者也樂所以和人之內故以道志志者由中存者也禮雖約人之外未嘗不在內記曰禮節民心樂雖和人之內未嘗不在外記曰樂和民聲别而言之則禮在於外而樂在於內合而言之則禮樂之情同也觀其禮樂之得則知其治觀其禮樂之失則知其亂所謂治者非必已治也所謂亂者非必已亂也達其得失之機則治亂之將形皆得以知之矣自非智足以及則不能達故蘧伯玊曰君子之人達均是器也而器有巧拙均是發也而發有智愚君子之達其明足以照之則器之巧拙發之智愚皆不能逃於視聽之內蓋達之者觀微以知著察往以知來也長樂陳氏曰禮自外作先王以之節事以治外樂由中出先王以之道志以治內反是未有不兆亂者矣是禮樂者治亂之聲形治亂者禮樂之影響也然則觀其禮樂未有不知治亂者樂書延平周氏曰禮之所自生樂之所自成者仁義而已故禮之節文斯二者即反其所自生者也樂之樂斯二者即樂其所自成者也先王制禮以節事無非事則治不然則亂修樂以道志有非志則亂不然則治是以觀禮樂而知治亂也君子之人達言上達也上者則無不知唯其無不知是以其粗則能觀其器而知工之巧其精則能觀人之所發而知其智與人則亦觀其所發者所與非其人則知其為不智此所以慎之也嚴陵方氏曰治定制禮故於禮曰制功成作樂故於樂曰修然禮亦可以言修王制所謂修六禮是也樂亦可以言制所謂䕫始制樂是也别而言之則如此耳治亂生於志而發於事禮者事之所寓也樂者志之所寓也故觀其禮樂而治亂可知孟子曰見其禮而知其政聞其樂而知其德正謂是矣君子之人達言達於道也以道觀物故知其工之巧以道觀人故知其人之智言巧則拙可知言知則愚可知蓋工有巧拙則見於器者有利病人有知愚則見於發者有當否故也凡為彼所觀者以吾有與也故君子慎其所以與人者而况於禮樂之所示乎所謂與人猶言接人也或發於言或發於行皆所以與人者故易曰言行者君子之樞機樞機之發榮辱之主也可不慎與正謂是矣廬陵胡氏曰子大叔曰禮者民之所以生故觀其禮樂而治亂可知如叔向知王室亂季札觀樂之類山隂陸氏曰觀舜樂而堯之治可知觀周樂而殷之亂可知大廟之內敬矣君親牽牲大夫贊幣而從君親制祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位蓋道求而未之得也設祭於堂為祊乎外故曰於彼乎於此乎鄭氏曰納牲於庭當用幣告神而殺牲故君牽牲大夫以幣從也親制祭謂朝事進血膋時所制者制肝洗於鬱鬯以祭於室及主也親割牲謂進牲孰體時勿勿猶勉勉也肉謂之羮道猶言也設祭之饌於堂人君禮然為祊乎外明日之繹祭也謂之祊者於廟門之旁因名焉其祭之禮既設祭於室而事尸於堂孝子求神非一處也周禮曰夏后氏世室門堂三之二室三之一詩頌絲衣曰自堂徂基孔氏曰此一節論侯伯子男祭宗廟之事舉大祫之祭故云大廟祼鬯既訖君出廟迎牲牽牲而納於庭大夫則贊佐執幣而從君君乃用幣告神而殺牲也殺牲已畢進血腥之時君斷制牲肝洗於鬱鬯入以祭神於室於此之時夫人薦盎齊以獻之侯伯子男朝踐君不獻故夫人薦盎鄭知親制祭是朝事進血膋時者案郊特牲云取膟膋燔燎升首報陽也又祭義取膟膋之後又爓祭祭腥則膟膋所用在腥爓之前故知血膋是朝事時也君親割牲謂薦孰時君親割牲體於時君亦不獻故夫人薦酒卿大夫從君謂制祭割牲之時也命婦從夫人謂薦盎酒之時也洞洞質慤之貌屬屬專一之貌言洞洞然其為恭敬屬屬然專一盡其忠誠中心勉勉乎欲望神之歆饗也納牲詔於庭者詔告也謂牲入在庭以幣告神血毛詔於室者謂殺牲取血及毛入以告神於室羮定詔於堂者羮肉湇也定孰肉也謂煮肉既孰將迎尸主入室乃先以俎盛之告神於堂是薦孰未食之前也道言也所以三詔不同位者蓋求而未得故於三處告之也設祭謂薦腥爓之時設此所薦饌在於堂特牲少牢設饌在奧今在堂故鄭知人君禮也為祊謂明日繹祭在廟門外之西也不知此神於彼堂乎於此祊乎不知神之所在也古語有此記者引以結之鄭引夏后氏世室證廟門之旁有室有堂也又引詩絲衣之篇證繹祭在堂事尸也嚴陵方氏曰君子固無所不用其敬然於太廟之事必夫婦親之而且求之非一方祭之非一日則其敬也尤見於此故曰大廟之內敬矣下文所言皆其事也言制祭亦割之矣以方殺而多少未定故曰制及既孰而多少已定故曰割也祭言其用也牲言其體也或言其用或言其體互相備也夫人薦酒者謂凡酒也牲雖以天産為陽然對酒言之則養人之隂而已君親割牲以養其隂夫人薦酒以養其陽亦隂陽相濟之義也薦盎其義亦若是而已且制祭薦盎朝事之時也割牲薦酒饋食之時也朝事以神事之故制祭以腥而薦以齊蓋腥與齊神道故也饋食以人事之故割牲以孰而薦以酒蓋孰與酒人道故也然君以盎齊饋食而夫人用之於朝踐君以酒獻尸而夫人用之於饋食者蓋殺禮於君故也牲自外至而納之故納牲詔於庭以庭在室之外故也血毛告幽全之物故詔於室以室比庭為幽故也羮定則事以人道神明之也故詔於堂以堂比室為明故也三詔求之固有可得之理而曰求而未之得特疑其如此而已故以蓋言之道猶言也與孟子所謂道性善之道同義設祭于堂言正祭之時也為祊乎外言索祭之時也言堂以見外之為門言外以見堂之為內祭言其事也祊言其所也謂之祊者祝祭求神以此為所在之方故也且神無方也祊特人為之爾故言為祭必有所陳焉故言設孝子不知神之所在或於彼或於此而祭之非一日求之非一處故曰於彼乎於此乎延平周氏曰先王制禮莫詳於别嫌果祭祀賔客之事而君與夫人共行事於羣執事者之中可乎周官之法后不與事則宗伯攝行蓋先王制禮欲全隂陽相成之義則言王必及后言君必及夫人又欲其逺嫌則有攝行之法故此篇所謂君在阼夫人在房君親制祭夫人薦盎之類豈非攝行者乎馬氏曰祭必夫婦親之所以備內外之官也官備則具備是故君親牽牲推而下之至於夫人薦酒皆夫婦身親涖之致其誠信之謂盡盡之謂敬故曰大廟之內敬矣納牲詔於庭君親牽牲大夫贊幣而從之時也血毛詔於室君親制祭夫人薦盎之時也羮定詔於堂君親割牲夫人薦酒之時也設祭于堂祭於廟之內也為祊乎外祭於廟之外也祭於內則疑於外祭於外則疑於內故曰於彼乎於此乎山隂陸氏曰此執幣也而言贊幣則著執幣君事也今以牽牲大夫代焉爾洞洞乎其敬之無蔽也屬屬乎其忠之無間也羮定羮和而後定一獻質三獻文五獻察七獻神鄭氏曰一獻祭羣小祀也三獻祭社稷五祀也五獻祭四望山川也察明也七獻祭先公也孔氏曰羣小祀最卑其禮質略社稷五祀稍尊比羣小祀禮儀為文飾四望山川其神既尊神靈明察先公之廟禮又轉尊神靈尊重也案周禮司服職𤣥冕一章祭羣小祀希冕三章祭社稷五祀毳冕五章祀四望山川鷩冕七章享先公故鄭知獻數亦然也案此社稷三獻卑於四望山川而大宗伯職云以血祭祭社稷五嶽又大司樂祭社稷奏大蔟祀四望奏姑洗又禮緯云社稷牛角握五嶽四瀆角尺以此言之則社稷尊於四望山川而獻與衣服卑者蓋獻與衣服從神之尊卑其餘處尊者以其有功與地同類故進之在上也長樂陳氏曰周禮大祀次祀小祀見於肆師大祭中祭小祭見於酒正則大宗伯所辨天地五帝先王之類大祀也社稷五祀五嶽之類中祀也四方百物之類小祀也大祀獻多小祀獻寡則社稷所獻冝加於山川也先王祭服各有象數則希冕三章以祭社稷者非卑之於山川也以社稷之所主止於利人故服粉米以稱之則獻數不繫於服章矣且賔客之禮士一獻卿大夫三獻子男五獻侯伯七獻上公九獻而王饗諸侯自子男五獻以至諸侯長十有再獻皆服鷩冕七章而已孰謂獻數必繫於服章哉鄭氏以三獻為祭社稷五祀五獻為祭四望山川誤矣羣小祀則四方百物之類也其牲色尨其牲體疈辜其祼器用散其舞兵舞帗舞或不興舞山川四望則其兆位各因其郊與其方其牲各因其方之色祼則用蜃玊則兩圭有邸與璋邸射舞則兵舞與羽舞奏姑洗歌南吕舞大㲈奏蕤賔歌函鍾舞大夏社稷則其牲黝其祭血祼以大罍鼓以靈鼓舞以帗舞奏大蔟歌應鍾舞咸池其禮樂辨異如此則獻數不同宜矣蓋禮略故質禮加故文察則其事地也察矣神則其事祖也神矣一獻孰則於人情為近故曰質三獻爓則於人情漸遠故曰文三獻爓則五獻其血乎禮所謂血祭社稷是也禮書嚴陵方氏曰傳曰名位不同禮亦異數禮有隆殺故數有多寡此祭祀之獻所以有一三五七之異也周官司服自一章之𤣥冕至七章之鷩冕服之章數隆殺如是則酒之獻數宜亦如之故先儒用是以相配焉夫羣小祀之禮則簡矣故言質社稷五祀則其禮差詳故言文四望山川地道也故言察先公人道而已故神之惡其褻故也山隂陸氏曰一獻三獻質文而已五獻察矣七獻神矣易曰神而明之存乎其人闕氏曰一獻之禮以祀四方百物之神服𤣥冕之一章其微有貓虎之類其事有水庸之卑功為微矣非可致其文也使之必報而已其禮不亦質乎三獻之禮以祭五祀社稷之神服希冕之三章牲以血祭其事有門行之出入中霤之居處户之啓闔竈之烹飪功為多矣非可以致其簡其禮詳於一獻矣不亦文乎五獻以祀四望山川服用毳冕牲用貍沈其功則能出雲雨其祥則能出器車興寶藏其禮審於三獻矣得非致其察乎七獻所以享先公也服用鷩冕尊有五齊其造為之艱難積纍之勤苦則事之如生敬之如存如在其上如在其左右其禮勤於五獻矣得非致其神乎又曰天地有自然之數以行鬼神聖人有不易之理以均度數故幽明雖易致而分不異於等差人鬼雖殊塗而禮不殊於厚薄蓋名者數之所生既有其名矣且得無數乎義者禮之所起既有其數矣且得無義乎大饗其王事與三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也其出也肆夏而送之蓋重禮也鄭氏曰大饗謂盛其饌與貢祫祭先王也內金內之庭實先設之金從革性和荆揚二州貢金三品是也束帛加璧貢享所執致命者君子於玊比德焉龜知事情者陳於庭在前荆州納錫大龜是也金照物故云見情金有兩義先入後設也丹漆絲纊竹箭萬民皆有此物荆州貢丹兖州貢漆絲豫州貢纊揚州貢篠簜其餘謂九州之外夷服鎮服蕃服之國周禮九州之外謂之蕃國世一見各以其所貴寶為摯周穆王征犬戎得白狼白鹿近之其出也謂諸侯之賔禮畢而出作樂以節之肆夏當為陔夏孔氏曰此一節明天子大饗之事諸侯各貢其方物奉助祭之禮饗謂饗祭先王饗中之大謂祫也諸侯祫祭不可致九州物唯王者乃然故云其王事與三牲魚臘是諸侯所貢故云九州之美味籩豆之薦亦諸侯所貢實於籩豆是四時和氣所生也諸侯內金以為庭實示其柔和金能從革鄭注金三品禹貢文束帛加璧謂朝而行享之時以束帛加璧於上以君子之德與玉相似尊之也鄭知行享之時所執覲禮文也龜為前列者布庭實之時以龜有靈知在衆物之前而為列先其有知也金次之者陳列此金次在龜後以金能照物露見其情先云內金示和是先入陳在龜後是後設故鄭云兩義也龜金之後布陳丹之與漆也絲也纊也竹也箭也與天下衆人共有此財故諸侯來朝而貢之陳列在下以上所陳謂九州之內諸侯其於外國無常貢之貨各以其所貴寶為摰則招致逺物也案周語穆王征犬戎得四白狼四白鹿非因貢而來故鄭云近之也知肆夏為陔夏者以大司樂大饗諸侯則諸侯出入奏肆夏此經是助祭後無算爵禮畢客醉而出以貴重於禮猶奏陔夏而戒之故燕禮大射賔出奏陔夏明不失禮也延平周氏曰備四海九州之美味者示其得四海九州之歡心也薦四時之和氣者示其能贊於天地也唯其明有以得人心而幽有以贊天地然後為可以事神內金以下言諸侯饗王之禮也金之性則從革從革則和也而為器則鍾磬鍾磬則亦能和也故內之所以示其和璧玊象夫德而加之於束帛之上者尊其德也龜能知來物而列之於前者先其知也金次於龜者所以見其情之和也丹漆絲纊之類莫非王土之所産而諸侯反用之以饗王者示其與衆共財也國即蕃國也先王不貴夷狄之致貢唯與其摰見而已故周官謂九州之外謂之蕃國世一見各以其貴寶為摰則此所謂致逺物者蓋非貢也亦其所摰而已矣諸侯之饗王以財而王之送諸侯以樂非為財也蓋重其禮也長樂陳氏曰此經曰大饗其王事與大傳曰禮不王不禘則大饗者宗廟之大禘也鄭氏以為祫祭誤矣四海九州之美味則薦之以天産四時之和氣則躋之以人器然道不足以贊天地之化則不足以致四時之和心不足以得萬國之歡心則不足以來九州之美味美味人助之也和氣天助之也是乃所謂王事也故其祭也有助則其禮也有朝其禮也有朝則其贄也有饗金者地四之所生於西者也體雖堅而性則柔柔故火之所能克用雖利而色則白白故采之所能受能受易親也能克易從也易親易從者和之道此內金所以示和也帛隂物也君子所以示財璧陽物也君子所以比德蓋無以示財則恭敬而無實無以比德則幣勝而無禮孟子曰恭敬而無實君子不可以虛拘此帛之所以示也聘禮曰貨多則傷德幣多則沒禮此德之所以比也定天下之吉凶成天下之亹亹莫大乎蓍龜此龜為前列而已其先知者也與王前巫後史其意同玉者陽之精金者隂之精陽多剛而所主者在體隂多柔而所主者在性故柔而能順溫而能和者金也此金次之所以見情也與入門而金作其意同先知所以知人也見情所以自知也知人不失人自知不失己下事上之道其義如此然或言尊德或言往德蓋尊之所以上之也以德為上則物不足言故此經束帛加璧所以在庭實之先往之所以歸之也歸德則非物不足以見其實故特牲束帛加璧在庭實之後也賔入奏納夏賔出奏肆夏自外入而納而納者物有所受者也自內出而肆而肆者情有所放者也方其始也以入為主故納夏言其有所受此鍾師掌九夏而鄭氏以為四方賔來則奏納夏是已方其終也以出為主故肆夏言其有所放此禮器言大饗而繼之以其出也肆夏送之以重禮是也又樂書曰孝莫大於寧親寧親莫大於寧神寧神莫大於得四表之歡心故孔子曰明王之以孝治天下也不敢遺小國之臣而況公侯伯子男乎故得萬國之歡心以事其先王此大饗先王所以為王事與明王行大饗之禮四海諸侯各以其職來祭其祭而入也各貢國之所有以修職其畢而出也王奏肆夏之樂而送之國語曰金奏肆夏天子所以享元侯也大饗之禮天子所以享元侯之樂送所以來祭之諸侯非重禮而何今夫歌皇華以送之天子所以待使臣也歌采薇以送之天子所以待帥臣也奏肆夏以送之天子所以待諸侯也於大饗言肆夏以送之則有送而無迎臣之而弗賔故也於饗燕言賔入門而奏肆夏則有迎而無送賔之而弗臣故也若夫兩君相見之禮入門而縣興客出以雍而肆夏不與此諸侯之樂所以不敢抗天子歟晉侯之享穆叔春秋罪之趙文子奏之於家禮經非之為僭天子故也嚴陵方氏曰司服以九章之衮冕享先王則大饗為九獻矣九獻之事獨王得備故曰大饗其王事與三牲牛羊豕也魚臘薧魚也必以為臘則以生者不可致逺故也籩豆之薦則水土之品是也三牲魚臘天産也天産所以作隂德故以味為主而曰四海九州之美味蓋味為隂故也籩豆之薦地産也地産所以作陽德故以氣為主而曰四時之和氣蓋氣為陽故也且味非美則不足以養人氣非和則不足以養生故於味曰美於氣曰和也金之為性有從有革相濟而為五行故曰內金示諸侯之和又以見情焉於此曰尊德於郊特牲曰往德何哉蓋自其所陳之次言之則謂之尊自其所共之方言之則謂之往夫德之可尊也彼將自卑而尊我我足以來彼也彼將有往而歸德亦互相備也非特如是而已尊則主敬往則主愛此以祭而饗祭者神之道故主敬言之彼從朝而饗朝者人之道故主愛言之亦各有其類龜北方之蟲北方主知灼之以卜可知來物而列之於前者先其知也其餘九州之外蕃國無常貨責之不備而且各以其國之所有則示能致逺物而已蓋得萬國之歡心以事其先王故其言如此馬氏曰大饗者饗中之最大者也所謂大饗三年一祫合羣廟之主而合食於太祖之廟乃其禮也幣珍則傷禮財侈則傷德束帛財也璧玉也君子以玉比德以束帛於下而加璧玉於其上所以輕財而重德也金能鑑物之妍醜故有見之意君子之於祭祀慎終如始祭之畢則飲酒無算又慮其禮之無節故奏肆夏以節之使之安宴而不亂蓋重禮也重禮者重其大饗之禮也廬陵胡氏曰內納也金能柔能剛故和左氏云庭實旅百奉之以玉帛大司樂諸侯出入奏肆夏又襄四年叔孫豹云肆夏之三天子享元侯則肆夏亦可新安王氏曰諸侯為賔禮畢而出作樂以節之蓋以下之事上其致貢有物所以將事上之誠待之終之以樂言始終不可失節鄭謂肆夏當作陔夏案大司樂王出入奏王夏尸出入奏肆夏而大饗諸侯則諸侯出入奏肆夏考其意饗則賔出奏肆夏重賔也燕則有無算爵恐其醉而失禮故奏陔夏戒之也然則助祭之後出廟門疑奏肆夏不奏陔夏禮謂助祭之後無算爵禮畢客醉而出宜奏陔夏故燕禮大射賔出皆奏陔夏明不失禮其說不然饗於廟燕於寢故曰饗以訓恭儉其禮意主於嚴燕以示慈惠其禮意主於歡為有無算爵故也廟中之饗必不至醉饗於廟燕不於廟安得奏陔夏以警其失禮乎山隂陸氏曰宗廟九獻之禮以祼為始祭之日王服兖冕而入奏以王夏立於阼后副禕而入奏以齊夏立於房尸服衮冕而入奏以肆夏席於室於是臨祭王與后其獻各一王以圭瓉酌鬱齊以祼尸后以璋瓉酌鬱齊以亞祼是之謂祼既祼獻矣王即以肝洗於鬱齊王燔之制祭於主前諸侯曰制祭天子曰宰祭量人凡宰祭是也於此之時尸既即席矣祝乃詔之使安坐王與后其獻亦各一王以玉角酌𤣥酒以獻尸后以玉斚酌清酒以亞獻是之謂從獻郊特牲曰舉斚角詔妥尸當此節也何以知其然禮運曰𤣥酒以祭薦其血毛詩曰祭以清酒從以騂牡以啓其毛取其血膋𤣥酒以祭在於薦血毛之後祭以清酒在取血膋之上則知從獻在朝事之前祼事之後也祭之末有加獻祭之始有從獻不聫九獻之數先王之制祭祀於始有從獻於末有加獻示祭事始終有降而無殺也此時制祭君未迎牲禮器先言君親牽牲然後君親制祭者謂諸侯爾蓋天子宗廟之祭與天地同皆有兩牲有享牛有求牛求牛殺於未祼之始洛誥王賔殺禋咸格王入大室祼是也享牛迎於既祼之終特牲既祼然後迎牲是也諸侯之宗廟其祭貶於天子有享牛無求牛故制祭在迎牲之後割牲之前事不得不爾理不得不然矣從獻之後王乃袒而迎牲卿大夫贊幣而從后於是時薦六尊六彞之器以奠焉某彞當某所某尊當某處各置於常次禮云君親牽牲夫人薦盎又曰及迎牲君執紖卿大夫序從士執芻宗婦執盎蓋夫人薦涗水是也王己迎牲后己奠器然後取蕭祭脂以合羶香奏樂以合聲舞此降神之序也禮云既奠然後焫蕭是也薦者升之也奠者置之也升之於下奠之於上事相用故祭統言薦禮器言奠其實一也鬱合鬯臭隂逹於淵泉蕭合黍稷臭陽逹於牆屋奏樂求諸隂陽之間所謂聲音之號詔告於天地之間則人鬼可得而禮矣朝踐之事於是行焉延尸於户西延主於户右尸南向主東向王乃殺牲啓其血毛祝出受之而以血告幽以毛告全皆於室更取膟膋燎於爐炭之上見以蕭光升首焉以報陽又羞肺肝首心祭黍稷加肺祭齊加明水雜以瓦甒加以鬱尊以報隂有虞氏尚首夏后氏尚心殷人尚肝周人尚肺今羞肺肝首心則周人朝事之羞備四代之尚也於祭黍稷又特以所尚加焉故郊特牲曰祭黍稷加肺祭齊加明水報隂也取膟膋燔燎升首報陽也祭義曰建設朝事燔燎羶薌見以蕭光以報氣也薦黍稷羞肺肝首心見閒以俠甒加以鬱鬯以報魄也祭義之報氣即特牲所謂報陽祭義之報魄即特牲所謂報隂祼獻之時有所謂求朝獻之時有所謂報固其理也當是時王與后其獻又各一王以玉爵酌盎齊以獻尸后薦籩人之八籩曰麷蕡之類醢人之八豆曰韭菹之類以奠焉禮云君執鸞刀修嚌夫人薦豆又曰君獻尸夫人薦豆是也后於是以瑶爵酌盎齊以亞獻是謂朝獻蓋王親迎牲則后薦尊彞王親羞嚌則后奠豆籩夫婦相成固有次第哉祼獻王酌以圭瓉后酌以璋瓉從獻王酌以玉斚后酌以玉角朝獻王酌以玊爵后酌以瑶爵尊卑之異也朝獻既畢於是行饋食之事當事者設饌於堂乃退而合亨尸適於小幄王適於小次以待焉堂上之饌又備矣王出小次復位乃更延主於室之奧祝出迎尸尸來升席自北方坐於主北蓋宗廟之祭有二節朝事與祭之始為一節饋食與祭之終為一節其中閒不以相續者所以容王與尸少息也唯有故則接祭見曽子問鄭注君親制祭謂朝事時君親割牲謂饋食時此一誤也割牲與制祭同一節皆朝獻之時爾羊人祭祀割牲登其首是也頴達乃謂薦盎薦酒不得同時不知薦盎是從獻薦酒是正獻正與從兩獻不害為同時鄭又以祭義燔燎羶薌至報氣也為朝事時以薦黍稷羞肺肝首心至加以鬱鬯以報魄也為饋食時亦誤也蓋報魄即與報氣同一節皆朝事之時也於此時王以玉爵酌盎齊以獻尸后又薦以籩人之八籩曰栗脯之類醢人之八豆曰葵菹之類自祼至此五獻矣尸飲於五獻則王於是時可以獻卿矣祭統尸飲五君洗玉爵以獻卿是也鄭謂尸飲五為酳尸五獻非也凡祭祀自血腥始曰朝踐自孰食始曰饋食朝獻祼獻尸皆不飲祭之啐之奠之以示敬而已非以食也至饋食則食道也然後尸飲特牲曰直祭祝於主鄭謂薦孰食祭以孰為正血腥之屬盡敬心耳則所謂尸飲五者飲於五獻之時而已非其飲之以五也於是后以瑶爵酌盎齊以亞獻是為六獻饋食禮畢酳尸之禮於是行焉王以玉爵酌凡酒以獻尸內宗代后薦籩人之加籩醢人之加豆是為七獻王可以獻大夫矣祭統尸飲七君以瑶爵獻大夫是也后於是時又以瑶爵酌凡酒以亞獻是為八獻王酳尸尸酢王后酳尸尸酢后酳尸禮畢諸侯與執事者又共一獻於尸而薦籩人之羞籩醢人之羞豆以備卒食之三獻合王后之八獻是為九獻備卒食之三食而尸爵止欲神惠之均於在室也凡九獻之內謂之正其次主人獻賔又其次主人獻長兄弟如賔儀獻衆兄弟如衆賔儀獻兄弟如衆兄弟之儀又其次長兄弟洗觚為加爵又其次衆賔長洗觚為加爵三加而尸爵止欲神惠之均於在庭也九獻之外謂之加明堂位曰加以璧散璧角是也蓋卒食之後其豆謂之加豆以其加於卒食之後也卒獻之後其爵謂之加爵以其加於卒獻之後也凡獻尸唯祼無樂朝踐而下皆有焉唯祼無籩豆之修從獻而下皆有焉先儒以周官朝事之籩豆當朝獻之節饋食籩豆當饋獻之節又以加籩加豆當酳尸之節獨無所謂從獻加獻與諸臣之所酢三獻之籩豆蓋誤矣蓋籩人所謂羞籩醢人所謂羞豆此薦於王與后酳尸之末諸臣所酢也又籩人共薦羞之籩實醢人共薦羞之豆實蓋薦籩薦豆者從獻之籩豆羞籩羞豆者加獻之籩豆也於此時遂行旅酬無算之爵而繼之以餕祭於是終焉故祭統曰餕者祭之末凡有九獻之禮王鄭之徒言禮以來多所未嘗知也此記九獻次苐頗為詳盡於諸篇所載祭祀僼節多所考證今録於大饗一章之次祀帝於郊敬之至也宗廟之祭仁之至也喪禮忠之至也備服器仁之至也賔客之用幣義之至也故君子欲觀仁義之道禮其本也鄭氏曰敬之至言就而祭之不敢致也仁之至仁恩也父子主恩也喪禮謂泣踊袒襲服器謂小斂大斂之衣服葬之明器用幣謂來賻賵欲觀仁義之道禮其本者言禮有節於內可以觀也孔氏曰此一節總明祭祀死喪賔客之等天尊彌逺祭之極盡於敬故云敬之至宗廟主親祭之必極盡於仁愛故云仁之至君子欲觀其人行仁義之道必須用禮為其本若行合於禮則有仁義也不言忠敬者舉仁義則忠敬可知也嚴陵方氏曰逺人而尊者主乎敬近人而親者主乎愛故於郊之逺而祀帝所以為敬焉於廟之近而祭親所以為仁焉君子無所不用其敬然祭莫重於天故為敬之至無所不用其仁然孝莫大於寧神故為仁之至仲尼燕居曰郊社所以仁鬼神則郊無非仁也要之以敬為主爾經曰大廟之內敬矣則廟無非敬也要之以仁為主爾長樂劉氏曰親戚既亡哀慟出於天性有致毁而滅身者有忘哀而遺禮者聖人防其過與不及哀痛至極則貴賤皆同服用衣衾則尊卑異數所以盡其力竭其誠不曰忠之至乎君子欲觀仁義於聖人也由禮以為本則仁之至義之盡可得而見矣馬氏曰喪主乎哀而人之所不道也人死斯惡之矣無能斯倍之矣故先王為之禮使民不惡不倍而盡心於死者三日而斂凡附於身者必誠必信三月而葬凡附於棺者必誠必信故曰忠之至也死而致死之不仁也備服器而致生之故為仁之至然之死而致生之不知也蓋君子備服器雖備之而不用也是故竹不成用瓦不成味木不成斫琴瑟張而不平竽笙備而不和有鍾磬而無簨虡皆備之而不用亦無害其為知也賔客之交必以幣表記所謂無辭不相接無禮不相見皆禮之所宜也故為義之至禮蓋生於仁義中庸曰仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也是禮生於仁義而曰欲觀仁義之道禮其本何也蓋因其禮行之際仁義存其中也宗廟之祭禮也仁在其中賔客之用幣亦禮也義在其中延平周氏曰喪禮欲其不欺於己故曰忠之至服器之死而致生故曰仁之至賔客用幣以將意故曰義之至禮雖出於仁義而仁義之成體乃在於禮故曰欲觀仁義之道禮其本也廬陵胡氏曰喪禮哀慕由衷賔客相弔恤義也有禮必有仁義人而不仁如禮何君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之為貴也鄭氏曰道猶由也從也孔氏曰前言觀仁義之道禮為其本此經明學禮之人須有忠信甘受和白受采者舉此二物喻忠信之人可以學禮甘為衆味之本不偏主一味故得受五味之和白是五色之本不偏主一色故得受五色之采以其質素故能包受衆味及衆采也言人若心致忠誠言又信實則可以學禮茍猶誠也其人即忠信之人也嚴陵方氏曰夫薄於德者於禮虛非忠信之德以實之則禮之道亦無由而行矣易不云乎茍非其人道不虛行中庸亦曰禮儀三百威儀三千待其人而後行故此經言得其人之為貴也馬氏曰甘者味之美質也白者色之美質也忠信者人之美質也然後可以文之也故甘則受和白則受采忠信之人可以學禮和所以文其味采所以文其色禮所以文其忠信質不能立於內則文不可行於外故曰忠信禮之本義理禮之文無本不立無文不行茍無忠信之人則禮不虛道道之為言行也延平周氏曰甘在內故喻忠之不欺於己白在外故喻信之不疑於人和則不乖所以喻禮之本采則有文所以喻禮之末山隂陸氏曰甘受和以中故也白受采以素故也孔子曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝毋輕議禮鄭氏曰誦詩三百喻習多言而不學禮也大旅祭五帝也饗帝祭天毋輕議禮謂若誦詩者不可以強言禮孔氏曰此一節明禮之為貴貴於衆事也一獻祭羣小祀不學禮則不能行大饗謂祫祭宗廟其禮又繁大旅是總祭五帝天人道隔其禮轉難大旅又不如郊為祭天之備典瑞云四圭有邸以祀天旅上帝是祀天重於旅帝又郊特牲云郊之祭大報天而主日是郊為祭夫之重講義曰既知禮為仁義之本又知忠信學禮之說庶幾得乎禮之實有人於此誦詩雖多可與言禮矣而於一獻之禮往往莫之能行者禮不在乎言辭之間故也延平周氏曰興於詩立於禮今誦詩不知要則是未能興於詩未能興於詩則固未能立於禮故誦詩三百不足以一獻禮略者猶且有所不足則其禮之愈詳者愈有所不足矣嚴陵方氏曰不學詩無以言誦詩雖多能言之而已未必能行禮則貴乎能行也故誦詩三百不足以一獻大饗者祭先王之九獻也以㑹而旅焉故謂之旅饗帝謂昊天上帝也夫禮有大小故行之有難易此愈大者所以愈難焉行其事者其難如此則言其義者可不重乎經曰禮之所尊尊其義也故曰毋輕議禮山隂陸氏曰誦詩三百不足以一獻言若此雖多無益也一獻之禮不足以大饗言若此又以少為慊也言禮進於詩矣故曰興於詩立於禮大饗之禮不足以大旅不言具矣容或不具大旅具矣不足以饗帝不言之禮進於禮矣旅猶燕之有旅饗猶饗之有饗毋輕議禮言禮至於此不可以輕議也長樂陳氏曰旅非常祭國有大故然後旅其羣神而祭之則荆岐既旅蔡䝉旅平九山刋旅者以水災耳推此則凡所遭大故皆凶災之類也考之於禮天子所次之位則張氊案設皇邸所奠之圭則四圭有邸所用之版則金版至於司尊彞之存奠彞笙師之陳樂器視瞭之廞樂器皆如大喪之禮言奠則非純乎祭也言存則非即徹之也陳樂而不縣廞樂而不鼓則旅非以其凶災邪周官或言大旅或言旅蓋故有大小而禮亦隨異也然大旅之禮不若祀天之為至也故記曰大旅具矣不足以饗帝若夫旅四望山川則所次不以氊案皇邸所用不以金版而所奠之圭則兩圭有邸而已先儒以旅之廞樂器為明器以皇邸為後版恐不然也其言旅上帝於圜丘其義或然禮書子路為季氏宰季氏祭逮暗而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎鄭氏曰宰治邑吏也季氏祭謂舊時也倦怠以其久也偏任為跛倚物為倚室事祭時堂事儐尸也孔氏曰前經既明禮之為重故記者引子路能行禮之事逮及也言季氏祭於宗廟及至日暗而行祭禮祭祀未終日已昏沒故云日不足繼日明以燭也其後别日而祭子路與在行禮之中正祭之時事尸在室外人將饌至户內人於户受饌設於尸前相交承接在於户也正祭後儐尸之時事尸於堂堂下之人送饌至階堂上之人於階受取是交乎階也質正也晏晚也正明始行事朝正嚮晚禮畢而退言敬而能速也子路好勇時人多不尚其所為故孔子明之誰謂由也而不知禮言其知禮也禮從宜寧略而敬不可煩而怠也橫渠張氏曰室事交乎户堂事交乎階亦通逹連續之義也朝者食前謂之朝晏朝者於朝為晚也嚴陵方氏曰士君子之行禮固不欲速又惡乎久而怠焉久而怠寧若速而敬爾蓋禮以敬為主故也季氏之於祭徒欲其久而不能敬又豈知禮之意哉昔周人祭日以朝及暗季氏之於魯其亦習周之文而不知其意者歟及子路行之乃能速而敬焉雖不必合於先王之文然亦可謂知禮之意且能救一時之弊矣此孔子所以善之也強力即聘義所謂強有力是也肅則不怠敬則不慢強力通乎外故以容言之肅敬存乎中故以心言之跛倚蓋倦怠之所致也室事謂有事乎室若血毛詔於室之類堂事謂有事乎堂若羮定詔於堂之類執事者內外異位乃以內而交乎外上下異等乃以上而交乎下則尤易為力矣宜乎質明而始行事晏朝而退也山隂陸氏曰子路有為為之也即無為是圗速者也禮記集說卷六十二
