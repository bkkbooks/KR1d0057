body:
  text: 禮記集說卷三十六宋衛湜撰少而無父者謂之孤老而無子者謂之獨老而無妻者謂之矜老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼鄭氏曰餼廪也孔氏曰此一節論矜恤鰥寡孤獨之事案孝經云男子六十無妻曰鰥婦人五十無夫曰寡舜年三十而尚書謂之鰥者以其父頑母嚚無為娶之端故雖三十而亦稱鰥詩云何草不𤣥何人不矜據久役在外嫁娶失時亦謂之為矜矜與鰥同其男子無妻亦謂之寡左傳云崔杼生成及彊而寡案劉熙釋名云無妻曰鰥愁悒不能寐目恆鰥鰥然其字從魚魚目恆不閉無夫曰寡寡倮也倮然單獨也無父曰孤孤顧也顧望無所瞻見也無子曰獨獨鹿也鹿鹿無所依也中山成氏曰無妻曰鰥無夫曰寡無子曰獨無父曰孤此通言耳四十無妻不為鰥三十無夫不為寡有室無父不為孤壯而無子不為獨聖人深意先王制禮憂民之極則以老少年齒為限也黃氏曰斯蓋叙帝王仁政均田勸農禮樂既興民心不貪而趨業矣孟子所謂菽粟如水火國儲民食咸畜十年則是國家以振窮民為必行之政矣况閭比有序則五黨為州使之相賙而四窮之民處其鄉里州長自率二千五百家而賙救之則所謂無告者皆獲其養也嚴陵方氏曰若此之人雖欲有所赴訴而求通莫之得矣故曰天民之窮而無告者也文王發政施仁必先斯四者其以是歟皆有常餼固所宜矣延平周氏曰孟子以鰥寡孤獨為序者輕重之序也此以孤獨矜寡為序禮運以矜寡孤獨為序何也豈非所養之常餼多寡有二等故此先言孤獨以重者先之也禮運先言矜寡以輕者先之也就二等之中則矜於寡為重獨於孤為輕蓋孟子言幼而無父則孤為重作記者言少而無父則孤為輕山隂陸氏曰為其無告也故書以無告為言所謂天之窮民於天為窮於人宜達瘖聾跛躃斷者侏儒百工各以其器食之鄭氏曰斷謂支節絶也侏儒短人也器能也孔氏曰此一節論矜恤疾民之事瘖謂口不能言聾謂耳不能聞聲跛躃謂足不能行斷者謂支節解絶侏儒謂容貌短小百工謂有雜技藝此等既非老無告不可特與常餼然既有疾病又不可不養故各以器能供官役使以廪餼食之案晉語文公問八疾胥臣對曰戚施權鎛注云使擊鍾籧篨䝉璆注云璆是玉磬使擊之侏儒扶廬注去扶持也廬㦸柄也矇瞍循聲注云歌詠琴瑟聾瞶司火注云使主然火其童昏嚚瘖僬僥官師所不材宜於裔土是各以器食之外傳不云跛躃此不云籧篨戚施說文不具外傳瘖與僬僥置於裔土此瘖與侏儒以器食之者今古法異也嚴陵方氏曰百工則凡執一藝者是也先王之時瘖者以之實土聾者以之司火刖者以之守囿刖則跛躃斷者之類也侏儒以之扶廬以至陶者之治埴匠者之治木冶氏之攻金玉人之切玉所謂各以其器食之也荀子曰五疾上收而養之材而事之蓋謂是矣先王之政必如是何也所以使在下者無廢才而人人各得其養在上者無虛用而事事各極其精而已是能也而曰器者以隨其大小長短而用之故謂之器耳孔子所謂使人也器之是矣道路男子由右婦人由左車從中央鄭氏曰道有三塗逺别也長樂陳氏曰男女嫌於無别故男右女左車患於阽危故從中央孔子為中都宰其民至於男女别塗蓋以此也設弧帨男左門女右門拜男尚左女尚右鬌亦男左女右祭則君在阼夫人在房此隂陽之理也道路則男右女左者地道尊右故也詩葛屨曰宛然左辟嚴陵方氏曰道路所以通四方四方者男子所有事也女子則深宫固門而已右有力而左無為故其所由如此道路見月令季春解既曰中又曰央何也蓋央以適當言之耳或上或下或左或右皆非適當焉唯中乃可以言央也延平周氏曰男女尊卑之莭雖在道路亦不廢也父之齒隨行兄之齒鴈行朋友不相踰輕任并重任分斑白者不提挈君子耆老不徒行庶人耆老不徒食鄭氏曰廣敬也謂於塗中輕任并重任分皆謂以與少者雜色曰斑徒猶空也孔氏曰父齒老也任謂有擔負者俱應擔負老少並輕則併與少者擔之也老少並重不可併與少者一人則分為輕重重則與少者輕則與老者長樂劉氏曰帝王之為治也不出人倫天下之人入於五品爾故其天下外薄四海行路之民皆服教化父之齒隨行父子之教著於道路矣兄之齒鴈行兄弟之教著於道路矣朋友不相踰禮義之教著於道路矣輕任并重任分任恤之行著於道路矣斑白不提挈孝友之行著於道路矣故君子耆老不徒行庶人耆老不徒食君子小人之為子弟者莫不知尊德而養老也長樂陳氏曰先王之時孝弟發於朝廷行乎道路疾行先長則以不弟名之其孰一舉足而敢忘禮哉文王之化至於行者讓路蓋本諸此君子耆老不徒行故五十無車不越疆而弔人庶人耆老不徒食故七十可以食肉不徒行者必不徒食不徒食者不必不徒行嚴陵方氏曰父之齒謂與父為長幼之齒者兄之齒謂與兄為長幼之齒者隨行則從其後也鴈行則差其次也朋友不相踰謂各以其齒而為先後之序也輕任并重任分二者皆以優老者而已然孟子言斑白不負戴者蓋負以背而戴以頂提挈則一以手而已其言亦互相備內則曰士不二羮胾蓋君子未嘗徒食故也前言斑白者不提挈蓋庶人未嘗不徒行故也大夫謂之君子則以位稱之也士謂之君子則以德稱之也此以君子對庶人而言則主於士也眀矣山隂陸氏曰父之齒年長以倍是也兄之齒十年以長是也所謂五年以長則肩隨之視此焉無車而行為徒行無肉而食為徒食大夫祭器不假祭器未成不造燕器鄭氏曰造為也皇氏曰此謂有地大夫故祭器不假若無地大夫則當假之故禮運云大夫祭器不假聲樂皆具非禮也謂無地大夫也正義長樂陳氏曰無田祿者不設祭器故禮運以祭器不假為非禮有田祿者必具祭器故王制以祭器不假為禮也君子之行禮也無事則先諸神有患則先諸已無事則先諸神故田則先乾豆營宫室則先宗廟造器則先祭器有患則先諸己故凶年君膳不祭肺馬不食榖馳道不除祭事不縣延平周氏曰庶人共祭器而至於大夫則不假者以其家邑足以具之也祭器未成不造燕器者先神而後人也嚴陵方氏曰祭器不假言當自具也不造燕器與養器為後同義以食言則曰養以居言則曰燕其實一也方一里者為田九百畝方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝方千里者為方百里者百為田九萬億畝鄭氏曰一里方三百步億今十萬萬億今萬萬也孔氏曰此一節論開方之法總計天子畿外內諸侯之地大小方一里為田九百畝案論語注云步百為畝是長一百步闊一步畝百為夫是一頃也長闊一百步夫三為屋是三頃也闊二百步長一百步屋三為井是九百畝也長闊一里鄭注億今十萬者方十里為田九萬畝方百里者為方十里者百一箇十里之方既為田九萬畝則十箇十里之方為田九十萬畝一百箇十里之方為田九百萬畝今云九十億畝是一億有十萬十億有一百萬九十億為九百萬畝故云億今十萬尹文子云百姓千品萬官億醜皆以數相十此謂小億也此鄭氏所用毛詩傳云數萬至萬曰億是大億非鄭義也更計千里之方為方百里者百一箇百里之方既為九十億畝則十箇百里之方為九百億畝百箇百里之方為九千億畝今乃云九萬億畝與數不同者若以億言之當云九千億畝若以萬言之當云九萬萬畝但書經戰國及秦之世經籍錯亂此經上下或億或萬字相交涉遂誤為萬億鄭因此錯本但云萬億即今之萬萬按皇氏曰億數不定或以十萬為億或以萬萬為億或以一萬為億此云萬億者祗是萬萬也六國時或將萬為億故云萬億嚴陵方氏曰古者步百為畝畝三為里以開方之法推之則一里方三百步為田適九百畝也孟子曰方里而井井九百畝其言正謂是也積而推之至於為田九萬億畝其理亦若是而已延平周氏曰方里為井故為田九百畝井十為成故為田九萬畝成十為通故為田九十億畝十通則百億井矣故為田九萬億畝李氏曰愚考之自此後漢儒注王制之文也盧植以王制為漢文帝博士所撰蓋疑是歟此即注天子之田千里之文也億千萬也自恆山至於南河千里而近自南河至於江千里而近自江至於衡山千里而遙自東河至於東海千里而遙自東河至於西河千里而近自西河至於流沙千里而遙西不盡流沙南不盡衡山東不盡東海北不盡恆山凡四海之內斷長補短方三千里為田八十萬億一萬億畝鄭氏曰恆山至南河冀州域南河至江豫州域江至衡山荆州域東河至東海徐州域東河至西河亦冀州域西河至流沙雍州域方三千里為田八十萬億一萬億畝九州之大計也孔氏曰此一節論四海之內地逺近里數也為田八十萬億一萬億畝者以一州方千里九州方三千里三三如九為方千里者有九一箇千里有九萬億畝九箇千里九九八十一故有八十一萬億畝但記文詳具於八十整數之下云萬億是八十箇萬億又云一萬億言是詳也以前文誤為萬億此則因前文之誤更以萬億言之皇氏曰千里而近者謂以千里言之其地稍近言不滿千里也千里而遙者謂以千里言之其地稍逺言不啻千里也長樂陳氏曰不足乎千里謂之千里而近過乎千里謂之千里而遙至則非盡其地故西不盡流沙南不盡衡山東不盡東海北不盡恆山禹貢東漸于海西被于流沙朔南暨聲教訖于四海王制南不盡衡山北不盡恆山者王制言其地之所訖禹貢言聲教之所訖故也嚴陵方氏曰經上重有萬億二字蓋衍文耳李氏曰此經乃注九州千七百國之文也金華應氏曰海環宇宙之大此所謂至於海獨言東者東海在中國封疆之內而西南北則流夷徼之外疆理有所不及也南獨以江與衡山為限蓋百越猶未盡開也惟河獨舉東西南北者河流縈帶而周繞雖流沙分際亦與河接也自秦而上西北袤而東南蹙自秦而下東南展而西北縮古今之疆理天地之大運中國夷狄之消長大略可見當先王盛時東西南北各有不盡之地蓋聽四夷居之不勞中國以事外也若禹貢之東漸西被而朔南咸暨特其聲教所及非必貢賦之所限也故外薄四海弼成五服至於五千里者此區域之大數而疆理之略者也四海之內斷長補短方五千里者此民田之大數而疆理之詳者也觀於曰內曰外二字而治之詳略可知矣方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝鄭氏曰以一大國為率其餘所以授民也山足曰麓嚴陵方氏曰髙而藏曰山大而平曰陵木所積曰林林所附曰麓川澤見名山大川解溝瀆見月令季春解城郭見禮運解宫室見曲禮宫室解夫方百里者百故為田九十億畝三而分之則各三十億畝去其一分以容宫室塗巷之類則餘六十億畝為可耕之田矣四海之內不必皆如此特其大略然也古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分鄭氏曰周尺之數未詳聞也案禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畝當今百五十六畝二十五步古者百里當今百二十五里孔氏曰古者八寸為尺今以周尺八尺為步則一步有六尺四寸今以周尺六尺四寸為步則一步有五十二寸是今步比古步每步剩出一十二寸以此計之則古者百畝當今東田百五十二畝七十一步有餘與此百四十六畝三十步不相應也又今步每步剩古步十二寸以此計之則古之百里當今百二十三里一百一十五步二十寸與此經百二十一里六十步四尺二寸二分又不相應故鄭云六國時多變亂法度經文錯亂不可用也鄭注周猶以十寸為尺案玉人職云鎮圭尺有二寸又云桓圭九寸是周猶以十寸為尺也今經云以周尺六尺四寸為步乃是六十四寸則謂周八寸為尺也故云蓋六國時多變亂法度或言周尺八寸也鄭即以古周尺十寸為尺八尺為步則步八十寸鄭又以今周尺八寸為尺八尺為步則今步皆少於古步一十六寸也是今步别剩十六寸云以此計之者謂以古步又以今周尺八寸八尺為步外剩十六寸而計之則古之四步剩出今之一步古之四十步為今之五十步古之八十步為今之一百步計古之一畝之田長百步得為今田一百二十五步是今田每一畝之上剩出二十五步則方百畝之田從北嚮南每畝剩二十五步總為二千五百步從東嚮西每畝二十五步亦總為二千五百步相併為五千步是總為五十畝又西南一角南北長二十五步應南畔所剩之度東西亦長二十五步應西畔所剩之度計方二十五步開方乘之總積得六百二十五步六百步則為六畝餘有二十五步故云古者百畝當今百五十六畝二十五步也又古四步剩今一步則古者四里剩今一里為五里則古者四十里剩今十里為五十里則古者八十里剩今二十里總為百里是古者八十里為今百里今之百里之外猶有古之二十里四里剩一里其古二十里為今之二十五里故去古者百里當今百二十五里長樂陳氏曰投壺記曰籌室中五扶堂上七扶公羊傳曰膚寸而合鄭氏曰鋪四指曰扶一指按寸何休曰側手為膚按指為寸扶即膚耳然則寸尺之度取諸身也漢律厯志曰一黍之廣為分十分為寸十寸為尺然則寸尺之廣又取諸物也先王制法近取諸身逺取諸物足以考信而無疑焉然後尺寸之度起矣則指尺之與黍尺一也黍有巨細故尺有長短先儒以黍之巨者積而為寸則與膚指不合於是有指黍二尺之辨謂圭璧之屬用指尺冠冕尊彝之屬用黍尺豈其然乎周禮典瑞璧羡以起度考工記璧羡度尺好三寸以為度璧徑九寸羡而長之從十寸廣八寸同謂之度尺則周之法十寸八寸皆為尺也考工記於案言十有二寸於鎮圭言尺有二寸此十寸尺之證也說文曰咫八寸周尺也王制曰周尺八尺為步今以周六尺四寸為步六尺四寸乃八尺耳此八寸尺之證也隋書所載厯代之尺至有一十五種蓋古尺既廢後世長短異同之論遂不一也禮書嚴陵方氏曰考工記曰人長八尺登下以為節則一止一止之所至宜亦如之故古者以八尺為步後世以六尺四寸為步者以八八六十四言之則是古尺當今適八十爾司馬法以六尺為步者即六尺四寸之率也案禮圖有黍尺有指尺蓋纍一黍為一分按一指為一寸黍尺則其長百黍指尺則其長十指矣然而地有肥瘠人有長短則黍之與指安能無差此古今之尺所以異歟所謂東田則詩所謂南東其畝是也言南則以廬在其北而鄉南言東則以廬在其西而鄉東畝有南東而詩又言南畝者人以鄉南為正故也此止謂之東田者耕事始於東方故也延平周氏曰舜以五嵗同度量而周亦十有一嵗同度量此步尺所以一而得其正也後世之尺或以黍或以忽或以指然地之生黍有小大蠶之吐絲有巨細人之手有長短而上之人又失其同度量之法此步尺所以異同也李氏曰古者以周尺八尺為步今以周尺六尺四寸為步者則校八尺為差短也案史記秦始以六尺為步此言古者即秦也又案晉張華所撰律管即京房漢尺謂漢張蒼之尺也以阮咸所得周玉尺校華之管為長則漢尺校周尺為短是以知漢儒注王制之文也此注制農田百畝文方千里者為方百里者百封方百里者三十國其餘方百里者七十又封方七十里者六十為方百里者二十九方十里者四十其餘方百里者四十方十里者六十又封方五十里者百二十為方百里者三十其餘方百里者十方十里者六十名山大澤不以封其餘以為附庸閒田諸侯之有功者取於閒田以祿之其有削地者歸之閒田孔氏曰此一經論畿外九州建國之法九州州别方千里凡千里之方以開方計之為方百里者凡有一百故云為方百里者百封方百里者三十國者前文云立大國三十故此云封方百里者三十國謂公也以百中去三十故其餘方百里者有七十又封方七十里者六十為方百里者二十九方十里者四十謂侯國也凡百里之方開方計之為十里之方百其七十里之國一用十里之方四十九七十里之國二則用十里之方九十八則一箇百里為七十里之國二剩十里之方二然則二十箇七十里之國用百里之方十剩十里之方二十七十里之國六十用百里之方三十剩十里之方六十今就百里之方三十里之中抽去十里之方六十是用百里之方二十九方十里者四十故其餘方百里者四十方十里者六十又封方五十里者百二十者上云小國百二十謂伯國也凡百里之方一封五十里之國四則十箇百里之方封五十里之國四十今小國百二十故用百里之方三十則其餘方百里者十方十里者六十以為附庸閒田嚴陵方氏曰諸侯之有功者取於閒田以祿之即巡守之禮言有功德於民者加地是也其有削地者歸之閒田即巡守之禮言不敬者君削以地是也李氏曰此乃注名山大澤附庸閒田之文也永嘉徐氏曰開方通算畿內外萬里展計十萬里之法方千里者為方百里者百乃萬里之地封方百里者三十國乃三千里其餘方百里者七十乃七千里共通計萬里之地乃公侯之國又封方七十里之國六十乃伯之國通計三分中除一分只得二千九百四十里總前三十箇百里共五千九百四十里為方百里者二十九者此指實數算之計二千九百里方十里者四十者此就十分中止算其一但得四十里總前二十九箇方百里之國却湊得前段二千九百四十里其餘方百里者四十此指實數言之計四千里方十里者六十此就十分中止算其一但得六十里通餘方數共四千六十里統前方百里及七十里之數五千九百四十里却好共成萬里方五十里之國一百二十者此子男之國就十分中止算其半得三千里方百里者三十此申言上二句實數計三千里其餘方百里者十此指實數算之得一千里方十里者六十此就十分中止算其一正得六十里通五十里之國至此四節亦共得四千六十里統前共算亦是成萬里之成數開方共十萬里之地此論九州州二百一十國之數延平周氏曰所謂封方百里者三十國之類非實有此國也特計其地之廣狹所能容者也周官職方謂凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則十一伯方二百里則二十五子方百里則百男以周知天下蓋以一千里度之則天下可以周知其法與此同名山大澤不以封亦非不以封也故詩曰泰山巖巖魯邦所瞻又曰奄有龜蒙遂荒大東是泰山之與龜䝉雖不悉是魯國實封之地然亦在其所封域之內也附庸所以畜小國閒田所以待有功之諸侯周官之法若縣師所謂野者皆閒田也天子之縣內方千里者為方百里者百封方百里者九其餘方百里者九十一又封方七十里者二十一為方百里者十方十里者二十九其餘方百里者八十方十里者七十一又封方五十里者六十三為方百里者十五方十里者七十五其餘方百里者六十四方十里者九十六孔氏曰天子縣內地方千里為方百里者百既用九箇擬封百里之國故其餘方百里者九十一也又封方七十里者二十一者凡百里之方十為七十里之國二十剩十里之方二十今以十里之方二十又更取其外十里之方二十九添前二十為四十九為七十里之國一是次國二十一也總用百里之方十十里之方二十九是其餘方百里者八十方十里者七十一也又封方五十里者六十三者謂小國也凡百里之方一為五十里之國四則百里之方十為五十里之國四十又百里之方五為五十里之國二十總為五十里之國六十更有五十里之國三凡一箇五十里之國用十里之方二十五則三箇五十里國總用十里之方七十五是用地方百里者一十五方十里者七十五是其餘方百里者六十四方十里者九十六然畿外千里封國之外所餘地少其畿內千里所餘地多者以畿外之土本擬封建諸侯故國數多餘地少畿內本供天子又有郊關鄉遂準擬公卿王子弟采邑故建國數少餘地多延平周氏曰此亦非實有此國也特計其地之廣狹所能容者也嚴陵方氏曰凡此皆論畿內建國之法也已解前篇首不言名山大澤與祿士閒田則以前見之李氏曰此乃注天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡七十三國之文也永嘉徐氏曰方千里者為方百里者百乃萬里之地封方百里者九乃公之國計九百里其餘方百里者九十一此指實數算之計九千一百里通前共萬里之地又封方七十里者二十一此指卿之國三分中止算二分合得一千二十九里通前百里者九計一千九百二十九里為方百里者十此指實數言之計一千里方十里者二十九此指實數言之計八千里其餘方百里者八十此十分中算其一計二十九里此申言前之餘數亦是一千二十九里方十里者七十一此就十分中止算其一計七十一里通前封方百里及七十里統計萬里之地又封方五十里者六十三此大夫之國就十分中止算其半合得千五百七十五里通前共計三千五百單四里為方百里者十五此指實數言之計一千五百里方十里者七十五此指十分中算其一計七十五里此乃申言前千五百七十五里其餘方百里者六十四此指實數言之計六千四百里方十里者九十六此就十分中止算其一計九千六里統計百里七十里之國共成萬里之數開方則成十萬之地此指天子之縣內方千里諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人次國之卿食二百一十六人君食二千一百六十人小國之卿食百四十四人君食千四百四十人次國之卿命於其君者如小國之卿孔氏曰自此至爵祿一節論士大夫及諸侯等食祿之數兼眀臣之世與不世之事前已有諸侯之下士以上及大夫卿君故此依前而釋也諸侯之士既眀則天子之士同之可知故此文發畿外之卿也前云諸侯下士視上農夫故有九人也前云上士倍中士故三十六也前云下大夫倍上士則食七十二人前云卿四大夫祿則二百八十八人君食二千八百八十人者謂大國之君前云君十卿祿故二千八百八十人也次國謂夏伯殷侯周則侯伯國也此大夫以下亦如大國大夫而卿唯得三大夫祿耳故特言卿也君食二千一百六十人者君亦十卿祿也小國謂夏周子男殷之伯國也大夫以下亦如大國大夫而卿則二大夫祿耳君食千四百四十人者君亦十卿祿也大國三卿皆命於天子則其祿各食二百八十八人若次國三卿二卿命於天子祿各食二百一十六人而一卿命於其君為賤則祿不可等命天子者故視小國卿小國卿食一百四十四人也其若子男一卿命於天子二卿命於其君則祿猶如此其命天子卿無以異也其國小故不復差降也或云視大夫也其天子之士卿大夫無文宜準大國之卿大夫士也嚴陵方氏曰凡此皆言制祿多寡之法篇首所言中士倍下士至於君十卿祿者是也此特重釋之耳李氏曰此乃注諸侯之下士視上農夫君十卿祿之文也金華應氏曰由下士以至於君其祿愈厚則其所食愈衆豈非以人徒服役漸增而漸廣歟然由卿以下皆服役乎君者也則既各給之田以為祿矣君祿之所入豈盡以食二千八百八十人哉以二千八百八十人之食而養一國之君所養極其厚則所食兼於衆也然必析其數以見其所食之多亦欲居人上者知吾之所奉合衆力而共為之則必思其有以稱此且不至壅利以自私而必推己以養人故君所食之人十倍於卿而由士至卿所食者次第加衆皆欲其無獨富之心而助君以養民也天子之大夫為三監監於諸侯之國者其祿視諸侯之卿其爵視次國之君其祿取之於方伯之地方伯為朝天子皆有湯沐之邑於天子之縣內視元士鄭氏曰湯沐之邑給齊戒自潔清之用浴用湯沐用潘孔氏曰案前文云不能五十里曰附庸又云天子元士視附庸以湯沐之邑視元士亦五十里以下左氏說諸侯有功德於王室京師有朝宿之邑泰山有湯沐之邑魯周公之後鄭宣王母弟此皆有湯沐邑其餘則否長樂陳氏曰湯沐則朝宿之邑也不曰朝宿而曰湯沐者齊戒以見君故也方伯之於天子猶天子之於神天子巡守有湯沐之邑於泰山之下則方伯為朝有湯沐之邑於天子之縣內宜矣禮書曰湯沐之邑於縣內視元士則凡非方伯其邑不得視元士也不然諸侯湯沐之邑多矣盡王畿其足以容之乎許田魯侯湯沐之邑也祊鄭伯從祭泰山湯沐之邑也邑非諸侯之所得專魯鄭專而易之此春秋所以譏也昔祝鮀盛稱魯衛晉國之封而衛有湯沐之邑則湯沐之邑豈諸侯之所均也漢諸侯皆有邸於京師武帝令諸侯各治邸泰山下蓋先王之遺制也先王之時湯沐邑皆有所賦漢初民無蓋藏髙祖於是省禁輕租自天子以至封君湯沐邑皆各為私奉養不領於天子之經費嚴陵方氏曰三監即篇首所言監於方伯之國國三人是也彼言監於方伯之國此言監於諸侯之國者蓋方伯長於諸侯三監監方伯方伯所以監諸侯而已其實一也以其監方伯故其祿取之於方伯之地焉其祿視諸侯之卿者以大夫之位所養不必太厚故也其爵視次國之君者以三監之職其權不可不重故也湯沐之邑者以其邑之所出而共湯沐之資也春秋傳曰天子之郊諸侯皆有朝宿之邑焉蓋謂是矣然此止言方伯者豈非以視元士之邑者獨方伯乎延平周氏曰侯分以州州統以牧牧統以伯又監以大夫此上下足以相制而莫敢為亂又況有仁義而為之維持者哉所謂祿取於方伯之地者豈非取方伯附庸之地乎李氏曰此乃注三監之文也方伯為朝止元士注天子之縣內其餘以祿士以為閒田之文也新安王氏曰昔者管叔蔡叔霍叔皆為三監於殷成王既殺武庚以其地付康叔兼治之謂之孟侯則為諸侯之長成王使之劼其民且曰矧惟若疇圻父薄違農父若保宏父定辟圻父司馬農父司徒宏父司空此天子使三卿監其國故以為康叔之疇然則祿視諸侯之卿爵視次國之君亦可見矣既監其國當食祿於其地無由復受爵於王朝也諸侯世子世國大夫不世爵使以德爵以功未賜爵視天子之元士以君其國諸侯之大夫不世爵祿鄭氏曰世子世國象賢也大夫謂縣內及列國諸侯為天子大夫者不世爵而世祿辟賢也以君其國列國及縣內之國也孔氏曰鄭知大夫不世爵是天子大夫者以下云諸侯之大夫故知此是天子大夫也知是縣內及列國諸侯入為天子大夫者案禮運云天子有田以處其子孫則周召畢原之等是縣內諸侯也詩衛武公入相於周又尚書顧命齊侯為虎賁衛侯為司寇是列國諸侯也並入為天子大夫案司裘諸侯則共熊侯豹侯是畿內亦曰諸侯此不云諸侯而云大夫者辟上諸侯世子之文故云大夫然畿內諸侯有為三公則周召是也列國諸侯入為六卿則鄭武公是也今總云為天子大夫者若言公卿大夫於文為煩故總言大夫以包之詩云三事大夫謂三公也春秋諸侯殺大夫謂卿也是大夫為總號未賜爵謂列國諸侯及縣內諸侯其身既死其子未得爵賜其衣服禮制視天子元士各君其本國鄭必知兼畿外列國者以詩小雅韎韐有奭謂諸侯世子未遇錫命服士服而來此云視天子之元士以君其國故知兼列國也其畿內諸侯有大功德元子出封畿外則王命次子守其采邑若其賢才則世為公卿則春秋周公召伯之屬是也諸侯降於天子故大夫不世爵祿若有大功德亦得世之故隱八年官有世功則有官族邑亦如之是據諸侯卿大夫也河南程氏曰古者使以德爵以功世祿而不官故賢才衆而庶績成及周之衰公卿大夫皆世官政由是敗矣長樂陳氏曰諸侯世子世國即外諸侯嗣是也大夫不世爵即內諸侯祿是也內諸侯不止於大夫此止言大夫以卿兼公而上大夫為卿故也周官大司徒以賢制爵以庸制祿司士以德詔爵以功詔祿此則使以德爵以功者别而言之爵主德祿主功合而言之必使以試其德及有功而後爵之也嚴陵方氏曰未賜爵視天子之元士以君其國者謂世子世國之初也視謂禮儀之數視之也且諸侯之適子未誓則以皮帛繼子男則未賜爵視天子之元士者以元士視附庸而繼子男故也諸侯之大夫不世爵祿則以其德又有降於天子之大夫故也禮運曰大夫有采以處其子孫則天子之大夫世祿也眀矣延平周氏曰天子之大夫世祿不世爵故其子之未賜爵者則其禮視元士而其祿即大夫也李氏曰諸侯世子世國此注外諸侯世子之文也大夫不世爵止世祿此注內諸侯之文也新安王氏曰繼世而為諸侯象賢也諸侯入於天子之國則為卿其次為大夫成王末年芮伯為司徒衛侯為司寇是以諸侯為天子之卿也齊侯吕伋為虎賁是以諸侯為大夫也在其國為世子則可以世國入為大夫則不可以世爵蓋以德而使之待其功而爵之非子孫所得繼也又曰未賜爵此乃外之列國非畿內有采地之公卿也君薨世子嗣位以君其國除服來朝以士服見於天子天子命之則授以冕服於是以諸侯而臨臣民或未朝天子亦遣使以冕服就賜之苟無君命而為諸侯春秋於桓公所以嵗不書王也六禮冠昏喪祭鄉相見七教父子兄弟夫婦君臣長幼朋友賔客八政飲食衣服事為異别度量數制鄭氏曰鄉鄉飲酒鄉射也八政飲食為上衣服次之事為謂百工技藝也異别五方用器不同也度丈尺也量斗斛也數百十也制布帛幅廣狹也長樂陳氏曰禮待教然後行教待政然後立六禮不及朝聘軍旅而不備乎宗伯之五禮八政不及貨祀之類而異乎洪範之八政者宗伯之五禮洪範之八政人君之所揆於上也王制之六禮八政司徒之所教於下也嚴陵方氏曰冠者禮之始昏者禮之本故六禮以是為先然冠陽禮也昏隂禮也故以冠昏為之序喪禮主於內祭禮逹於外先喪而後祭者因自內以及外也冠昏而下有國者之所同也而鄉飲酒特施於一鄉儀禮相見特主於士而已故又言之於末焉夫冠昏嘉禮也喪凶禮也祭吉禮也鄉相見賔禮也不及軍禮者六禮司徒修之以節民性而有發司徒教士以車甲則軍禮固在其中矣政在養民故以飲食為首飲養陽而食養隂故先飲而後食有飲食以養之必有衣服以成之故繼之以衣服焉有所服必有所事故繼之以事有所事必有所異故繼之以異别焉有異别矣則必有度以度其所至量以量其所容有度量矣則必有數以計其多少有制以定其等差故繼之以數制焉李氏曰此注司徒修六禮眀七教齊八政之文也江陵項氏曰飲食衣服度量數制六者易眀獨事為異别注不能通事為者冡宰之九職司徒之十二事考工之六職皆司徒所頒以任民者也異别者司徒五地之常職方九土之宜王制中國四夷之俗皆司空所辨以居民者也禮記集說卷三十六
