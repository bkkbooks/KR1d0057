body:
  text: 禮記集說卷一百三十六宋衛湜撰唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天苟不固聰明聖知達天德者其孰能知之鄭氏曰安有所倚言無所偏倚也肫肫讀如誨爾忳忳之忳忳忳懇誠貌也非逹天德者其孰能知之言唯聖人乃能知聖人也河南程氏曰肫肫其仁蓋言厚也藍田吕氏曰唯天下至聖一章論天德唯聖人可以配之唯天下至誠一章論道唯聖人為能知之大經天理也所謂庸也大本天心也所謂中也育天用也謂化也反而求之理之所固有而不可易者是為庸親親長長貴貴尊賢是已謂其所固有之義廣充於天下則經綸至矣理之所自出而不可易者是為中赤子之心是已尊其所自出而不喪則其立至矣理之所不得已者是為化氣機開闔是已窮理盡性同其所不得已之機則知之至矣知者與聞一以知十窮神知化樂天知命之知同所謂與天地參者也至誠而至乎此則天道備矣天德全矣夫天之所以無不覆者不越不倚於物而已有倚於物則其覆物也有數矣由不倚然後渾然至於純全故曰肫肫其仁肫肫純全之義也至於純全則深幽而難測故曰淵淵其淵純全而深幽其體大矣不至于天則不已故曰浩浩其天浩浩如江海之浸上下與天地同流者非至誠而達天德孰能知之又曰君子反經而已矣經正則庶民興所謂經者百世不易之常道大經者親親長長貴貴尊賢而已正經之道必如舜盡事親之道而瞽瞍底豫然後親親之經正必如王者父事三老兄事五更然後長長之經正必如國君臣諸父兄弟大夫降其兄弟之服然後貴貴之經正必如堯饗舜迭為賔主湯於伊尹學焉而後臣之然後尊賢之經正建安游氏曰自唯天下至聖以下聰明睿知聖德也寬裕溫柔仁德也發強剛毅義德也齊莊中正禮德也文理密察知德也溥博者其大無方淵泉者其深不測或容以為仁或執以為義或敬以為禮或别以為知唯其時而已此所謂時出之也夫然則外有以正天下之觀內有以通天下之志是以見而民敬言而民信行而民說自西自東自南自北莫不心說而誠服此至聖之德也天下之大經五品之民彛也凡為天下之常道皆可名為經而民彛為大經經綸者因性循理而治之無汨其序之謂也立天下之大本者建中于民也淵淵其淵非特如淵而已浩浩其天非特如天而已此至誠之道也德者其用也有目者所共見有心者所共知凡有血氣者莫不尊親道者其本也非道同志一莫窺其奧故曰茍不固聰明聖知達天德者其孰能知之蓋至誠之道非至聖不能知至聖之德非至誠不能為故其言之序相因如此延平楊氏曰大經天理也惇典敷教所以經綸之也大本中也建其有極所以立之也化育和也窮神而後知之也三者皆天也故唯天下之至誠能之非私知所能與也故曰夫焉有所倚有倚則人欲之私而已非誠也肫肫純全也淵淵靜深也浩浩廣大也惟肫肫故能合天下之公惟淵淵故能通天下之志惟浩浩故能與天地同流其淵非特如淵而已其天非特如天而已此道之至也非夫達天德者其孰能知之上言至聖此言至誠何也以人言之則與天地相似而已故如天如淵以至聖言之誠者天之道誠即天也故其天其淵以至誠言之此其異也河東侯氏曰天下之至誠為能經綸天下之大經立天下之大本經常也可久而不亂可久而能通非誠以經綸之不可也經如經緯之經綸如絲綸之綸易曰彌綸天下之道是也大本中也物物皆有中天下之大本言中之大而盡天下之中者也立非建立之立如天地設位易立乎其中與立不易方之立同立天下之大本則又見誠之大也知天地之化育知與乾知大始之知同天地之化育天地為之爾知其化育者誠也天下之大經庸之大者也誠則經綸之天下之大本中之大者也誠則立乎其中天地之化育天地之極功也誠則知其事故曰夫焉有所倚肫肫其仁淵淵其淵浩浩其天焉有所倚中也肫肫其仁仁也淵淵其淵無窮也浩浩其天廣大也如是之誠若不固聰明聖知達天德之人孰能知之知之言能盡其理也由是觀之中庸之道至於誠斯至矣大矣無以加矣中庸言誠處不一或因鬼神或因政事或自修身以言之或自內及外以言之或言天地之道或言人之道或自誠而明或自明而誠或言禎祥或言妖孽或曰自誠或曰自道或曰誠已或曰誠物或曰不二或曰不已或曰如神或曰無息雖然不同皆合內外之道也然而理不可低看如微之顯誠之不可掩主鬼神而言之也鬼神造化之跡也造化之顯微可窮而不可詰如四時之代謝萬物之死生皆其跡也易曰原始要終又曰精氣為物遊魂為變是故知鬼神之情狀是也如政也者蒲盧也體誠而為政者也不誠未有能化者也為政之誠修身為本修身之本自明善始故曰不明乎善不誠其身矣誠者天之道誠之者人之道自誠而明生知者也天之為天亦曰誠而已故曰天之道自明而誠反之者也人之為人修道而已故曰人之道誠則明矣明則誠矣誠固明矣明而未至誠非明也盡其性則盡人之性至於贊天地之化育與天地參者言人能體夫誠而至於天德則與天地參贊猶非天地也德與天地並故也致曲亦能有誠習而至於誠化不知為而為之矣禎祥妖孽應各不同易曰積善之家必有餘慶積不善之家必有餘殃至誠一道流通上下與物無閒故必先知之又曰至誠如神非得已也天地至誠故能成功聖人至誠故能踐形成功踐形自成也自道也自誠自道成已成物非二也一也此皆體夫誠者也不息不二不已言其誠之専也此誠之功用也若止言誠則無息而已無息非言誠也形容誠之體假情性耳故又曰經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天如斯而已學者至此全無著力處非自得之不能知也此言形而上者也新安朱氏曰此第三十二章承上章而言大德之敦化亦天道也經綸皆治絲之事經者理其緒而分之綸者比其類而合之也經常也大經者五品之人倫大本者所性之全體也唯聖人之德極誠無妄故於人倫各盡其當然之實而皆可以為天下後世法所謂經綸之也其於所性之全體無一毫人欲之僞以雜之而天下之道千變萬化皆由此出所謂立之也其於天地之化育則亦其極誠無妄者有默契焉非但聞見之知而已此皆至誠無妄自然之功用夫豈有所倚著於物而後能哉肫肫懇至貌以經綸而言也淵淵靜深貌以立本而言也浩浩廣大貌以知化而言也其淵其天則非特如之而已固猶實也前章言至聖之德此章言至誠之道然至誠之道非至聖不能知至聖之德非至誠不能為則亦非二物矣此篇言聖人天道之極致至此而無以加矣或問至聖至誠之說曰楊氏以聰明睿知為君德者得之而未盡其寬裕以下則失之蓋聰明睿知者生知安行而首出庶物之姿也容執敬别則仁義禮知之事也經綸以下諸家之說亦或得其文義但不知經綸之為致和立本之為致中知化之為窮理以至於命且上於至誠者無所繫下於焉有所倚者無所屬則為不得其綱領耳遊氏以上章為言至聖之德下章為言至誠之道者得之其說自德者其用以下皆善又曰堂堂然流出來焉有所倚涑水司馬氏曰此以後復論孔子有至誠之德人莫能知亦莫能掩經猶綱也删詩書定禮樂作春秋贊易道是能經綸天下之大綱立天下之大本知天地之化育也馬氏曰大本者性之始所謂中德也大經者性之成所謂庸德也唯至誠無息則於大本有以立之於大經則有以經綸之極中庸之效有以知天地之化育然後能贊之也夫焉有所倚者言其不蔽於一曲也肫肫其仁盡人道也淵淵其淵盡地道也浩浩其天盡天道也山隂陸氏曰知天地之化育贊外也知內也上言唯天下至誠為能盡其性言所以成內此言唯天下至誠為能經綸天下之大經立天下之大本言所以成外成內而致外之人也成外而致內之天也然則浩浩其天豈直參之而已長樂陳氏曰經常也大經大常所謂庸也大本所謂中也天地化育所謂和也方言至誠先庸後中和蓋惟至誠為能體常能體常則中立而和達也夫是三者皆誠以為之而不倚乎一偏則無所不備也故肫肫然其仁之純全也淵淵然其淵之幽深也浩浩然其天之廣大也而三才之道非果聰明聖知逹天德者其孰能知此於至聖言如天如淵於至誠言其天其淵如則有二其則一而已莆陽鄭氏曰心無偏倚名曰中此性之中也發而中節名曰和此事之中也凡事失中未有不乖者唯中則和心有偏倚則先有主矣豈能虛應不虛應則不中節何故水隨器而有形心隨事而有中有主則必固矣豈能隨事而得中哉中和雖異名寂感雖殊勢其為中則一也是道也乃感應之根故曰大本乃萬事之常故曰大經唯聖人則能經綸以建是中天貴中氣人貴中德五行以土為主五聲以宫為君五味以甘為和九疇以皇極為宗天下萬物以中為歸㑹此千萬世所常行者故曰大經反此則為偏頗怪僻之行晏氏曰天下大經者理之常天下大本者性之中天地化育者命之正能窮理則能經綸天下之大經能盡性則能立天下之大本能至於命則能知天地之化育唯天下至誠則能窮理盡性而至於命其於三者之道全之盡之矣又豈倚於一偏乎故曰夫焉有所倚肫肫者純之至復性之初純而不雜故曰肫肫其仁淵淵者深之至左右逢原若泉始逹故曰淵淵其淵浩浩者大之至浩然之氣塞乎天地故曰浩浩其天前言贊天地之化育此言知天地之化育蓋贊者輔相以道知者默契於心唯心為能㑹道既能知之必能贊之相為表裡而已前言溥博如天淵泉如淵今言淵淵其淵浩浩其天蓋如天如淵者與易言與天地相似同意其天其淵者與易言與天地準同意髙要談氏曰所謂天下至誠者積夫形著明動變化之效而極乎博厚髙明悠久之道者也是以能經綸天下之大經其倫則三綱其用則九法天下萬世之所行此所謂大經也經綸猶條理大經以為民紀使有條而不紊也是以能立天下之大本至中而不倚至正而不偏天下萬理之所自出此所謂大本也立者建極之謂建立大本以為民極使不至於墮廢也是以能知天地之化育四時所以運行萬物所以化生天地功用者有不能自已此所謂化育也知者明其所以然也明化育之所以然蓋裁成輔相之道得參乎其閒故也此三者皆聖人所以立人之道而成位乎天地之閒者其在我則廣大而無私其於物則曲成而不遺尚安有所偏倚哉夫唯無所偏倚則仁之體於是乎可見故曰肫肫其仁肫肫者純全敦厚之稱也仁體最難形容止言其大則不見其本心之微止言其微則不見其全體之大故孟子嘗解之曰仁者人也此以肫肫言仁蓋明其有純全敦厚之體而本心之微全體之大皆可具見孟子之言蓋本於此也聖人所以與天地並者仁也仁之體既肫肫然純全而敦厚則夫所謂淵淵浩浩如者皆仁之蓄養成就至於如此也仁之所蓄者極深故曰淵淵其淵言不可測也仁之所養者極大故曰浩浩其天言不可度也淵淵浩浩形容之意亦止是耳而其不可測不可度之處亦終不得而言也夫所謂淵淵浩浩者大而化之之事進乎不可知之神者也唯聖人躬行允蹈親入其閫域然後能知其所至茍不實聰明聖知而達於天德者則於淵淵浩浩之事未免乎揣度也安能深知其所以然哉永康陳氏曰子思論夫子至聖之用運而無私要必有藏乎其中者故又言天下之至誠而論其實然不易之理天下之大經自有常序便是經綸天下大經各正其序則大本渾然藏乎其中便是立大本渾然藏乎其中則化育分明在我便是知大經自正化育自行大本運動闔闢渾然而不與之俱往故曰夫焉有所倚肫肫淵淵浩浩不已之實也其仁其淵其天從而名之也肫肫厚也而有純一之意淵淵深也而有清明之意浩浩廣大也而有運用不已之意此天德也非固其聰明聖知安得到此地位聰明聖知如上所謂也固退藏於密也惟其運用不已故密不用則昭然矣達如中心達於面目之達達乎此則知乎此矣莆陽林氏曰夫焉有所倚者言聖人之道中立而無所偏倚如所謂中天下而立定四海之民居天下之廣居立天下之正位行天下之大道是也肫肫者渾厚無閒斷之貌仁即是生生不窮之意堯舜極到處只是一箇仁字盡得如天如淵猶未足發揮聖人尚有比擬於其閒其淵其天直是得聖人極到處茍不斷然是聰明聖知達天德者孰能知至誠之說也晉陵錢氏曰唯天下至誠為能有德至於聖唯誠為能大經若九經大本若修身以道也又知天地之化育自吾身為之此君子之誠所為異於人唯其所存者大不倚一偏耳是謂至誠為能即之則忳忳焉其仁測之則淵淵然其淵窮之則浩浩然其天固猶自然也達猶至也唯聖人與天同德乃能知之非常情所識也自聖而歸之誠自誠而歸之天德此一節謂夫子之聖同於天德金華邵氏曰天下至聖其極至於配天若夫天下至誠又不止是天下之大經待之而經綸則顯攝運用之也天下之大本待之而立大本人之性也立則不使之失其固有也天地之化育待之而知化育造化萬物者也知則明其消息之理也肫肫其仁淵淵其淵浩浩其天兼三者而備之則所以經綸所以立所以知皆其運量間爾其者指誠而言仁與天淵皆其所自有之物非如天如淵比也君子欲知此理惟固聰明聖知而德與天為一者能之固如易成性存存之義新定邵氏曰上章言天下至聖此章言天下至誠明至誠所以為至聖也誠者天之道謂之至誠則純乎天理無纎毫人為之僞者也故天下之大經唯至誠為能經綸之天下之大本唯至誠為能立之天地之化育唯至誠為能知之何謂經綸天下之大經疆理天下綱紀四方使尊卑小大各循其分內外逺近咸得其宜所謂立綱陳紀為萬世法程是也何謂立天下之大本開明天理扶植民彛使人知有禮則生無信不立于以正萬化之原建無窮之基所謂立我蒸民莫匪爾極是也何謂知天地之化育仰觀俯察而幽明之故可通原始反終而死生之說可明凡大道化生之機元氣發育之妙無不洞見於方寸所謂通乎晝夜之道而知是也言大經大本而遂及於天地之化育明此道與天地貫通無閒經綸大經植立大本非知化育者不能茍化育之妙未能深知則其所經綸其所植立欲無遺憾不可得也觀隆古帝王功用宏博與天地參後世雖號為賢君設施淺陋終不足以望古則唯天下至誠然後能之信不誣矣夫至誠之用其大如此嘗試論是誠之本體夫豈有所倚著然後能爾哉思而得者倚於思也至誠則不思而自得行而至者倚於行也至誠則不行而自至渾然寂然感而遂通驗之觳觫過堂下之時察之匍匐將入井之際一念惻然天機呈露唯見肫肫其仁耳肫肫懇至之貌也視之弗見聼之弗聞莫測其際莫究其極唯見淵淵其淵耳淵淵靜深之貌也洞乎其虛曠乎其達其大無倫其廣無外唯見浩浩其天耳浩浩廣大之貌也向言溥博如天淵泉如淵如之一字猶待比擬今言淵淵其淵浩浩其天則至誠之道即天即淵一體無二是誠也非謏聞寡見所能知抑非徇口耳憑臆度所能知必也聰明聖知達天德之祕乃能灼知其所以然耳故曰茍不固聰明聖知達天德者其孰能知之固猶實也天德即至誠也天地之化育即天德之所為也上文兼言天地又並言天淵此獨言天德舉其大者言之也能達天德則能知至誠矣能知至誠則能知天地之化育矣能知天地之化育則能經綸天下之大經立天下之大本矣詩曰衣錦尚絅惡其文之著也故君子之道暗然而日章小人之道的然而日亡君子之道淡而不厭簡而文溫而理知逺之近知風之自知微之顯可與入德矣詩云潛雖伏矣亦孔之昭故君子內省不疚無惡於志君子之所不可及者其唯人之所不見乎詩云相在爾室尚不愧于屋漏故君子不動而敬不言而信詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞詩曰不顯惟德百辟其刑之是故君子篤恭而天下平詩云豫懷明德不大聲以色子曰聲色之於以化民末也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣鄭氏曰禪為絅錦衣之美而君子以絅表之為其文章露見似小人也淡其味似薄也簡而文溫而理猶簡而辨直而溫也知風之自自謂所從來也三知者皆知其睹末察本探端知緒也入德入聖人之德亦孔之昭孔甚也昭明也省不疚疚病也君子自省身無愆病雖不遇世亦無損於已志也相在爾室尚不愧于屋漏相視也室西北隅謂之屋漏視女在室獨居者猶不愧於屋漏屋漏非有人也况有人乎奏假無言時靡有爭假大也此頌也言奏大樂於宗廟之中人皆肅敬金聲玉色無有言者以時大平合和無所爭也不顯惟德百辟其刑之不顯言顯也辟君也言不顯乎文王之德諸侯盡法之豫懷明德不大聲以色豫我也懷歸也言我歸其明德者以其不大聲為嚴厲之色以威我也輶輕也倫猶比也言毛雖輕尚有所比孔氏曰衣錦尚絅衛風碩人之篇言莊姜初嫁在塗衣著錦衣為其文之大著尚以禪縠為衣以覆錦衣也案詩本文衣錦褧衣此斷截詩文也潛雖伏矣亦孔之昭詩小雅正月刺幽王之詩喻賢人君子身雖隱而其德昭著相在爾室尚不愧于屋漏此大雅抑篇刺厲王之詩詩人意稱王朝小人不敬鬼神視女在廟室尚不愧於屋漏之神奏假無言時靡有爭商頌烈祖美成湯之詩本文云奏假無言無有喧譁之言也豫懷明德不大聲以色大雅皇矣美文王之詩德輶如毛大雅蒸民美宣王之詩言用德化民舉行甚易其輕如毛也上天之載無聲無臭大雅文王之詩載生也言天之生物寂然無象而物自生也河南程氏曰學始於不欺暗室又曰不愧屋漏便是箇持養氣象伊川又曰不愧屋漏則心安而體舒又曰所謂敬者主一之謂敬所謂一者無適之謂一且欲涵泳主一之義一則無二三矣言敬無如易敬以直內義以方外須是直內乃是主一之義至于不敢欺不敢慢尚不愧于屋漏皆是敬之事也伊川又曰聖人修已以敬以安百姓篤恭而天下平唯上下一於恭敬則天地自位萬物自育氣無不和四靈何有不至此體信達順之道聰明睿知皆由是出以此事天饗帝又曰一道本也知不二本便是篤恭而天下平之道明道又曰君子之遇事無巨細一於敬而已簡細故以自崇非敬也飾私知以為竒非敬也要之無敢慢而已語曰居處恭執事敬雖之夷狄不可棄也然則執事敬者固為仁之端也推是心而成之則篤恭而天下平矣伊川又曰毛猶有倫入毫釐絲忽終不盡明道又曰聖人之言依本分至大至妙事語之若彝常此所以味長釋氏之說見得些便驚天動地言語走作却是味短只為乍見如中庸言道只消道無聲無臭四字總括了多少釋氏言非黃非白非鹹非苦多少言語伊川又曰中庸之說其本至於無聲無臭其用至於禮儀三百威儀三千自禮儀三百威儀三千復歸於無聲無臭此言聖人心要處與佛家之言相反儘教說無形迹無色其實不過無聲無臭必竟有甚見處大抵語論間不難見如人論金曰黃色此人必是不識金若是識金者更不言設或言時别自有道理張子厚嘗謂佛如乍富貧子橫渠論此一事甚當伊川橫渠張氏曰暗然修於隱也的然著於外也藍田吕氏曰自此至篇終言得成反本自內省至於不動而敬不言而信自不動不言至於不大聲以色自不大聲色至於無聲無臭聲臭微矣有物而不可見猶曰無之則成一於天可知暗然而日章中有本也的然而日亡暴於外而無實以繼之也故君子貴乎反本君子之道深厚悠逺而有本故淡而不厭簡而文溫而理本我心之所固有也習矣而不察日用而不知非失之也不自知其在我爾故君子之學將以求其本心之微非聲色臭味之得比不可得而致力焉唯循本以趨之是乃入德之要推末流之大小則至於本原之淺深其知逺之近歟以見聞之廣動作之利推所從來莫非心之所出其知風之自歟心之精微至隱至妙無聲無臭然其理明達暴著若懸日月其知微之顯歟凡德之本不越是矣知此則入德其幾矣一本云自此至篇終凡七引詩皆言德成反本以盡中庸之道所謂固聰明聖知達天德者必由是入也推衣錦尚絅之心則所以為己者遁世不見知而不悔矣暗然日章為己而中有本者也的然日亡為人而無實以繼之者也故君子之道深厚悠逺而有本所以淡而不厭簡而文溫而理此入德之漸也君子之學視所至而得其所起循其末而見其所本即其著而明其至微故知逺之近知風之自知微之顯此入德之門也舜為法於天下我未免為鄉人欲求為舜則不越孝弟而已又求其所以行之則徐行後長者固足謂之弟矣其知逺之近歟墨子兼愛楊子為我其始未有害也其風之末則至於無君無父而近於禽獸伯夷之不屑就以為清柳下惠之不屑去以為和其風之末不免乎隘與不恭君子不由則其端不可不慎也故曰差之毫釐繆以千里其知風之自歟鬼神之為德視之不見聽之不聞然有所謂莫見乎隱莫顯乎微洋洋如在其上如在其左右者其知微之顯歟三者皆出乎心術而已本心我之所固有者也小人習矣而不察日用而不知其在我者爾君子之學求其本心者也本心之微非聲色臭味之比不可得而致力焉唯循本以趨之是乃入德之要也推潛雖伏矣亦孔之昭之說蓋所以養其衣錦尚絅之意而已衣錦尚絅為已者也為已者吾心誠然乎此而已豈繫人之見與不見乎唯內省不疚無惡於吾志斯可矣相在爾室不愧于屋漏者非特無惡於吾志又將達乎神明而無慊者也達乎神明而無慊則其德有孚矣此所以不動而民敬不言而民信也奏假無言時靡有爭者則德之有孚非特使民敬信於我而我之德可使民勸而民威蓋德之孚者養人於義理之中知善為可慕而遷之知不善為可恥而逺之豈待賞之怒之而後然哉不顯惟德百辟其刑之者蓋要其所以不動而敬不言而信不賞而勸不怒而威豈有他哉在德而已君子之善與人同合內外之道則為德非特成已將以成物故君子言貨色之欲親長之私必達於天下而後己豈非篤恭而天下平者哉豫懷明德不大聲以色者又明德之化民不在乎聲音笑貌之間莫非至誠孚達而已德輶如毛者言人之所以不為德者以德為重而難舉也如童而知愛其親長而知敬其兄此不肖之夫婦之所能行其輕而易舉也如此而已何憚不為哉雖然謂之德者猶誠之者也未至乎誠也若至乎誠則與天為一所謂德者乃理之所必然如春生夏長日往月來之比無意無我非勉非思渾然不可得而名者也聲臭之於形微矣有物而不可見猶曰無之則上天之事可知矣中庸之書其始也言天命之謂性其卒也言上天之載無聲無臭至矣蓋言此道出於天不及於天則為未至如乾之德曰大哉坤之德曰至哉至者至乾之大而後已也其篇之中言君子動而世為天下道行而世為天下法言而世為天下則及言天下至聖則曰見而民莫不敬言而民莫不信行而民莫不說及其終則曰君子不動而敬不言而信又曰不賞而民勸不怒而民威於鈇鉞動也言也行也世以為法則猶在法度之間也莫不敬莫不信莫不說則忘乎法度而猶有言動之迹存焉至乎不動而敬不言而信不賞而勸不怒而威則德孚於人而忘乎言動矣然猶有德之聲色存焉至于不大聲色然後可以入乎無聲無臭而誠一於天此中庸之終也建安遊氏曰自此以下皆言中庸之道以至誠為至也君子用心於內故暗然而日章作德而休也小人用心於外故的然而日亡作僞而拙也無藏於中無交於物泊然純素獨與神明居此淡也然因性而已故不厭不失足於人不失色於人不失口於人此簡也然循理而已故文其心順其氣平其容婉其色愈薰然慈仁此溫也然行而宜之故理淡而不厭天德也簡而文地德也溫而理人德也若是為成德若知逺之近知風之自知微之顯者入德之途也欲治其國先齊其家知逺之近也人人親其親長其長而天下平可不謂近矣乎欲齊其家先修其身知風之自也易於家人曰風自火出君子以言有物而行有恆可不謂所自乎欲修其身先正其心知微之顯也夫道視之不見聽之不聞而常不離心術日用之間可不謂顯矣乎知所以入德則成德其庶幾乎正心之道誠意而已故繼言君子內省不疚無惡於志君子所不可及者其唯人所不見乎言慎獨不息則久久則天故君子不動而敬不言而信天則神故君子不賞而民勸不怒而民威於鈇鉞言不怒之威嚴於鈇鉞也德至於神則甚顯而明親譽息矣故君子篤恭而天下平夫何為哉恭己正南靣而已豈徒見於聲音顔色之間哉蓋明德化民之本也聲音顔色之於化民末也故君子務本而已所謂德者非甚髙而難知也甚逺而難至也舉之則是故曰德輶如毛既已有所舉矣則必思而得勉而中是人道而有對也故曰毛猶有倫若夫誠之至則無思無為從容中道是天道也故曰上天之載無聲無臭至矣無聲無臭離人而立於獨矣是天命之性也故曰中庸於是終焉延平楊氏曰君子之道充諸內而巳故暗然而日章小人騖於外不孚其實故的然而日亡此衣錦所以尚絅而惡其文之著也淡疑於可厭簡疑於不文溫疑於不理淡簡溫所謂暗然也淡而不厭簡而文溫而理則暗然而章矣此充養尚絅之至也知逺之近天下本諸身也知風之自由必擇中也知微之顯必慎其獨也世之流風皆有所自清之隘和之不恭知其自此則君子不由也夫如是乃可與入德矣詩云潛雖伏矣亦孔之昭則微而顯可知矣夫道不可須臾離也惟慎獨為能終之故曰君子所不可及者其唯人所不見乎詩云相在爾室尚不愧于屋漏蓋言慎獨也動而天下道之言而天下則之形於言動而天下從之也大而化之則言動不形而人敬信望之恍惚前後雖欲從之末由也已而其卒也至於不賞而民勸不怒而民威於鈇鉞篤恭而天下平國非政刑所及也記曰天則不言而信神則不怒而威合乎神天亦唯誠而已君子之慎其獨不欺於屋漏則其誠至矣誠於此動於彼蓋天之道也是豈聲音笑貌之所能為哉所懷者明德而已德者得於心之所同然者也雖夫婦之愚與有焉其輶如毛舉之易勝也而人莫能舉之者無誠心而已德輶如毛未至於無偏猶有德也有而不化非其至也故上天之載無聲無臭然後為至自天命之謂性至萬物育焉中庸一篇之體要也大經庸也大本中也天地之化育和也三者皆天也豈人之私知所能與哉經綸天下之大經立天下之大本知天地之化育循而達之於天下修道之教也夫道不可須臾離也以其無適而非道也故於不聞不睹必恐懼戒慎焉所以慎其獨也相在爾室尚不愧于屋漏其充此之謂乎夫如是誠之至也故合乎神天而卒曰上天之載無聲無臭至矣蓋道本乎天而其卒也反乎天兹其所以為至也又曰孟子言大人正已而物正荆公却云正已而不期於正物則無義正已而必期於正物則無命若如所論孟子自當言正已以正物不應言正已而物正矣物正物自正也大人只知正己而已若物之正何可必乎唯能正已物自然正此乃篤恭而天下平之意荆公之學本不知此河東侯氏曰古之學者為己率吾性以達天理自可欲之善至於不可知之神非由外鑠我也如身日長而不自覺焉原泉混混不舍晝夜有本者如是也故暗然而日章小人之學為人蹇淺虛浮色取仁而行違居之不疑如火銷膏而不自知焉如七八之間雨集溝澮皆盈其涸也可立而待故的然而日亡衣錦尚絅絅衣之表也必表而出之是也衣錦而尚絅所以惡其文之著也文非本故也君子之道也淡而不厭淡無味可悅其理易直故不厭簡非繁華質而有理故曰文溫非險詖之邪純而和粹故曰理知逺之近知本諸身也知風之自知過不及也知微之顯知修省也如此則入德之自也內不足者急於人知沛然有餘厥聞四馳舜自側微而登庸潛雖伏矣亦孔之昭也亦微之顯誠之不可掩之道也內省不疚不欺天也行有不慊於心則餒惡於志也君子之所不可及者其唯人之所不見乎人之所不見者屋漏也君子仰不愧於天俯不怍於人不愧屋漏也不愧屋漏與慎獨不同慎獨學者之事不愧屋漏近於誠而未至也不動而敬不言而信則誠矣詩曰奏假無言時靡有爭君子不賞而民勸不怒而民威於鈇鉞正已而物正成已所以成物也詩曰不顯惟德百辟其刑之是故君子篤恭而天下平夫何為哉恭已正南靣而已矣詩云豫懷明德不大聲以色子曰聲色之於以化民末也王者之民皥皥如也惡知乎所謂聲色者然哉故詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣輶至輕也毛至微也猶有輕重毛髮之倫可擬可象者存焉是猶化民而不大聲色者也若夫上天之載則無聲無臭莫可得而擬議非無物也所謂焉有所倚肫肫其仁淵淵其淵浩浩其天大而不可載小而不可破無物不該焉故也中庸之書自天命之謂性至孰能知之其理無精粗之殊天命之謂性率性之謂道修道之謂教言其始也本也至於茍不固聰眀聖知達天德者孰能知之言其成也終也所謂物之終始也天之道人之事合內外之道故時措之宜也君子之能事畢矣古所傳者中庸之書終也自衣錦尚絅無聲無臭至矣子思再叙入德成德之序也自率性之謂道修道之謂教有諸已而後方能入德充實輝光而後至於不可知之神神則誠而無肫肫淵淵浩浩其仁其淵其天也故曰無聲無臭至矣無聲也無臭也猶無方也無體也云爾子思之書中庸也始於寂然不動中則感而遂通天下之故及其至也退藏於密以神明其德復於天命反其本而已其意義無窮非玩味力索莫能得之知之者其唯文王乎不識不知順帝之則如斯而已知之者其唯文王乎新安朱氏曰此第三十三章前章言聖人之德極其盛矣此復自下學立心之始言之而下文又推之以至其極也詩國風衛碩人鄭之丰皆作衣錦褧衣褧絅同禪衣也尚加也古之學者為己故其立心如此尚絅故暗然衣錦故有日章之實淡簡溫絅之襲於外也不厭而文且理焉錦之美在中也小人反是則暴於外而無實以繼之是以的然而日亡也逺之近見於彼者由於此也風之自著乎外者本乎內也微之顯有諸內者形諸外也有為己之心而又知此三者則知所謹而可入德矣故下文引詩潛雖伏矣亦孔之昭言慎獨之事承上文莫見乎隱莫顯乎微也無惡於志猶言無愧於心此君子慎獨之事也引詩相在爾室尚不愧於屋漏承上文又言君子之戒慎恐懼無時不然不待言動而後敬信則其為己之功益加密矣故下文引奏假無言時靡有爭并言其效奏進也承上文而遂及其效言進而感格於神明之際極其誠敬無有言說而人自化之也威畏也鈇莝斫刀也鉞斧也不顯惟德不顯說見二十六章此借引以為幽深𤣥逺之意承上文言天子有不顯之德而諸侯法之則其德愈深而效愈逺矣篤厚也篤恭言不顯其敬也篤恭而天下平乃聖人至德淵微自然之應中庸之極功也引詩豫懷明德不大聲以色以明上文所謂不顯之德者正以其不大聲與色也又引孔子之言以為聲色乃化民之末務今但言不大之而已則猶有聲色者存是未足以形容不顯之妙不若蒸民之詩所言德輶如毛則庶乎可以形容矣而又自以為謂之毛則猶有可比者是亦未盡其妙不若文王之詩所言上天之載無聲無臭然後乃為不顯之至耳蓋聲臭有氣無形在物最為微妙而猶曰無之故唯此可以形容不顯篤恭之妙非此德之外又别有是三等然後為至也子思因前章極致之言反求其本復自下學為己慎獨之事推而言之以馴致乎篤恭而天下平之盛又贊其妙至於無聲無臭而後已焉蓋舉一篇之要而約言之其反復丁寧示人之意至深切矣學者其可不盡心乎或問卒章之說曰承上三章既言聖人之德而極其盛矣子思懼夫學者求之於髙逺𤣥妙之域輕自大而反失之也故反於其至近者而言之以示入德之方欲學者先知用心於內不求人知然後可以慎獨誠身而馴致乎其極也君子篤恭而天下平而其所以平無聲臭之可尋此至誠盛德自然之效而中庸之極功也故以是而終篇焉蓋以一篇而論之則天命之性率性之道修道之教與夫天地之所以位萬物之所以育者於此可見其實德以此章論之則所謂淡而不厭簡而文溫而理知逺之近知風之自知微之顯者於此可見其成功皆非空言也然其所以入乎此者則無他焉亦曰反身以慎獨而已矣故首章已發其意此章又申明而極言之其旨深哉其曰不顯亦充尚絅之心以至其極耳與詩之訓義不同蓋亦假借而言若大學敬止之例又曰諸說程子至矣吕氏既失其章㫖又不得其綱領條貫而於文義尢多未當如此章承上文聖誠之極致而反之以本乎下學之初心遂推言之以至其極而後已也而以為皆言德成反本之事則既失其章㫖矣此章凡八引詩自衣錦尚絅以至不顯惟德凡五條始學成德疏密淺深之序也自不大聲以色以至無聲無臭凡三條皆所以贊夫不顯之德也今以不顯惟德通前三義而并言之又以後三條者亦通為進德工夫淺深次第則又失其條理矣至以知風之自為知見聞動作皆由心出以知微之顯為知心之精微明達暴著以不動而敬不言而信為人敬信之以貨色親長達諸天下為篤恭而天下平以德為誠之之事而猶有聲色至於無聲無臭然後誠一於天則又文義之未當者然也然近世說者乃有深取乎其知風之自之說而以為非大程夫子不能言者蓋習於佛氏作用是性之談而不察乎了翁序文之誤耳學之不講其陋至此亦可憐也遊氏所謂無藏於中無交於物泊然純素獨與神明居所謂離人而立於獨者皆非儒者之言不失足於人不失色於人不失口於人則又審於接物之事而非簡之謂也其論三知未免牽合之病其論德輶如毛以下則其失與吕氏同楊氏知風之自與吕氏舊本之說略同而取證又皆大逺要當參取吕氏改本去其所謂見聞者而益以言語之得失動作之是非皆知其有所從來而不可不謹則庶乎其可耳以德輶如毛為有德而未化則又吕遊之失也侯氏說多疏闊唯以此章為再叙入德成德之序者獨為得之也又曰知風之自凡事自有箇來處所以與微之顯厮對著兼山郭氏曰大凡欲人之敬敬先於動可也欲人之信信先於言可也不如是雖家至户曉訓告命令靡所不至民不違而去之者鮮矣是謂不顯惟德百辟其刑之者也君子敬以直內義以方外人知之亦為之人不知亦為之天之大反之於一心萬物之衆反之於一身既而無我也無物也意必固我一物不存焉故能篤恭而天下平也君子篤恭而天下平是以聲色之為末也孔子曰天何言哉四時行焉百物生焉此之謂也且天之生物未嘗與物私而風雨之所膏寒暑之所成日月之所照霜露之所化未嘗一物遺者何哉以其大且一也反求其大廓然無外物與無極宜若不與物交而造化之功品物咸遂若有期㑹相應亘古今而不窮然後可知上天之載與夫中庸之所以為中庸也江陵項氏曰此一章自其用功於隱至發見於費者而總言之其末復歸於隱正與本篇自天命之謂性至茍不固聰明聖知達天德者其孰能知之相對蓋以一章具一篇之義也又曰淡而不厭無味而味自長也簡而文無文而文自著也溫而理不肅而成不嚴而治也又曰知逺之近言乎天下之本也知風之自言動之機也知微之顯言潛雖伏矣之事也即以上四章之意反覆言之耳髙要談氏曰中庸之書始以慎獨終以慎獨始以慎獨者欲立其本以應事於外終以慎獨者極其大歸而合理於天則淵淵浩浩之體可以心識不可以說盡也夫文者美在外也惡文之著惡其飾外而忘本失實也君子之道暗然而日章務本務實故美在其中而暢於四肢也小人之道的然而日亡無實無本故外雖飾僞而良心內喪也君子所尚皆本也故淡而不厭則真實而可久也簡而文則存諸中者有要而發於外者自然成理也溫而理則和順積中而施為皆當也此其所以暗然自晦而愈不可掩也小人反是此其所以的然自表而愈無所據也復本之要在乎知逺之近知風之自知微之顯所謂逺者萬理之散在天下是也所謂近者本心之在我是也知天下萬理皆總㑹乎吾之本心此即知逺之近也所謂風者施化於外是也所謂自者本心所在是也知施化之用皆本心之所出即知風之自也所謂微者本心所存人不得見唯我自知是也所謂顯者幾微發露無隱不見人皆知之是也知內之所存終必發露不可得而掩此即知微之顯也知此三者之理然後能見本心故處而於德之奧有所從入故曰可與入德矣三知者復本之要也唯君子知此三者之理所以嘗用力於人所不見之處故知隱伏之孔昭夫然後能內省不疚無惡於志在人所不見之處尤切兢也知屋漏之不可有愧夫然後能篤誠於言動未發之前而使人敬信於言動未形之始也知至靜無言可使不爭夫然後能淵默存誠無物無我使善者見之樂不善者見之愧而不必賞之勸刑之威也知不顯之為德百辟自然儀刑夫然後能篤恭於內對越在天純一不雜使天下化之皆知反身自求各止其分而無不平也凡是數者皆由三知以入德者也於是又推其精微至於不大聲色知聲色之為末則知本心所存之微雖聲色之不大未足為喻也於是又益推其精微至於德之易舉其輕如毛如毛雖細微尚有倫理之可見則知本心之所存微而又微雖毛之細亦未足以為喻也於是又從而更推精微之極至於無聲無臭蓋無聲可聞無臭可知天之事也本心所存其微至此則與天為一不可以有加矣三衢周氏曰自此以下凡八引詩或疑其無序不知所以證修身齊家治國平天下與夫誠者誠之者其說甚明第學者未深考爾茍明其序則一篇之意燦然矣衣錦尚絅潛雖伏矣亦孔之昭此修身之證也君子之學為己不患人之不已知故衣錦尚絅惡其文之昭著然誠之所發終不可掩所以暗然而日章小人之學為人掩其不善而著其善惟恐人之不知故心勞日拙人之視已如見其肺肝所以的然而日亡淡而不厭簡而文溫而理此暗然日章之道其德參乎天地者也雖淡而不厭以言其易而可親雖簡而有文以言其居之以敬雖溫而能理以言其中和之德足以立天地育萬物是三者若逺而近若風有自若微而顯知其逺者必自邇斯能極於博厚知家人之象風自火出斯能極於明誠知莫顯乎微之不可掩斯能極於高明夫是之謂可與入德必言知者其要在於致知知而不至者有矣未有不知而能至者潛雖伏矣亦孔之昭此自近自內自微之諭也故君子內省不疚無惡於志志者心之所之也志無所惡則內省吾心無所慊愧矣此君子謹獨之學用力於人所不見之地非人所能及也故曰君子之所不可及者其唯人之所不見乎相在爾室尚不愧于屋漏此齊家之證也屋漏者室之西北隅既祭猶敬心無愧於幽明則暗室無所欺矣故其處家也言必有物行必有恆不動而人莫不敬不言而人莫不信其誠之至乎奏假無言時靡有爭治國之道莫大乎賞罰固足以示勸懲矣至於不賞而民勸不怒而民威於鈇鉞如在宗廟之中自生肅敬之心此誠之所格非賞罰之所及也不顯惟德百辟其刑之此平天下之證也平天下者豈以力服人哉不顯惟德百辟自然儀刑如七十子之服孔子也不顯者暗然日章之道其舜之恭已無為文王之不識不知者乎是故篤恭而天下平豫懷明德不大聲以色此特言誠也誠之為德以已昭昭使人昭昭豈可以聲音笑貌為哉德輶如毛仲山甫舉之固為明哲君子然猶有倫之可見未足以為至此證誠之也惟天運於上於穆不已無聲臭可聽聞如文王之純亦不已然後為至此證誠者也嚴陵方氏曰君子仰不愧於天俯不怍於人故內省察而不疚焉以其不疚故無惡於志言心之所之未始有惡也為善於顯明之中者易為善於幽隱之中者難故君子之所不可及者其唯人之所不見乎經曰戒慎其所不睹與此同意動而敬言而信賞而勸怒而威末矣唯不動而敬不言而信不賞而勸不怒而威然後為至怒必以鈇鉞為言者先王之所以飾怒是也篤恭謂篤厚於恭也不大聲以色言化民以德也無聲無臭言化民以道也聲之化民則聞而化色之化民則見而化聲色非不可以化民也特非化民之本爾長樂陳氏曰上言至誠如是其至簡復何言哉世之人所以每每不誠者非不知中庸之本乎誠也亦非不知誠之可以有為也苐從事於外也速而致力於內也寡故誠不至而德不誠中庸之書終言成效亦足矣而此所以言恐人之不知所以為誠也故據詩委曲以諭之然自衣錦尚絅至終篇大抵不過欲人致力於內而不必從事於外也惟惡其文之著故曰暗然而日章與的然日亡異矣淡而不至乎厭簡而能文溫而能理及夫三知入德雖伏而昭內省不疚屋漏不愧皆欲致力於內而已夫不必動而敬不必言而信不必賞而勸不必怒而威豈必從事於外哉篤恭而天下自平耳嗚呼聲色不可以化民而從事於外者果何為哉德輶如毛固美矣而毛猶有倫不若無聲無臭之為至也然則為中庸者致力於內而已山隂陸氏曰簡疑於不文溫疑於不理簡而文溫而理至矣知逺之近所謂千里之行始於足下知風之自所謂關睢后妃之德也風之始也知微之顯所謂莫顯乎微是也圖難於其易為大於其細知所謂逺者在此戒慎乎其所不睹恐懼乎其所不聞知所謂顯者在此正身以正朝廷正朝廷以正百官正百官以正萬民知所謂風之自者在此夫如是可與入德矣故君子內省不疚無惡於志言雖心之所之不萌惡也與形而後絶之異矣范陽張氏曰子思中庸大抵以戒慎不睹恐懼不聞為入德之階故言之重辭之復何止三致意乎縱橫反覆無非此理而已既言暗然日章之理矣言內省不疚之理矣今又言君子所不可及者其唯人之所不見乎故舉詩不愧屋漏以證之又曰或見而敬或不見而章或言而民莫不信或言而世為天下則或不言而信或動而世為天下道或不動而變或行而世為天下法或行而民莫不說或無為而成或不賞而勸或不怒而威卷舒闔闢縱橫上下無不可者則以微之顯誠之不可掩也如此不大聲以色者是其意専於德而不俟形於動言賞罰聲色之間而天下自化也孰為德乎即戒慎恐懼不睹不聞是也養之既久功深力到舉意即成未萌即應所以不動不言不賞不怒而敬且信勸且威也其效如此天下必以為難到也聖人乃曰德輶如毛其意謂誰不能舉之乎其要止在戒慎恐懼此亦人之所易為也毛猶有倫是德猶有形象也自德而上即喜怒哀樂未發以前也此豈有形象哉此天命之性也學不到此奚足為中庸莆陽鄭氏曰夫行逺者必自邇察乎天地其造端必出於夫婦行乎天下其所推不出於閨門本立而後道生若舍近而務逺則無本矣故曰知逺之近天下風俗皆有所自黃老之說自於竇太后曹相國方士神仙自於秦皇漢武清談自於王何浮屠自於漢明帝楚王英邪說一勝千載頽風孟子距楊墨韓退之斥佛老恐其為千載風俗害也故曰知風之自人皆知微之微不知微之顯夫所謂微之顯何也日用之道也道雖精微而百姓之所日用夫子曰誰能出不由户何莫由斯道也易曰百姓日用而不知孟子曰行焉不知習焉不察君子下學上達不敢忽其日用顯顯者故曰知微之顯海陵顧氏曰君子內省不疚無惡於志者君子內自省察無所疚病又無過惡於其志是蓋能知顯微本者也相在爾室者視爾室中助祭之人皆怠慢無肅敬之心尚不愧於屋漏之神聲色之於以化民末也者聲色之事以德校之乃化民之末也化民當以德為本毛尚有倫以其有形體德固無形而易舉也上天以生成為事無聞其聲音無知其氣臭窈然無象天下之物自然生成涑水司馬氏曰茍內省不疚雖謗議沸騰刑禍交至亦非其所惡也莆陽林氏曰奏假無言時靡有爭奏大樂而無喧譁之聲者是寫出太平氣象正屬四方無侮無拂之時是時也天下不賞而民勸不罰而民畏也此唯堯舜成康可以當此不顯言其甚顯也人君有甚顯之德則左右公卿之人皆儀刑之君子篤恭而天下平蓋自我一人正心誠意則左右近習可化則朝廷之上可化則都鄙之間可化豈不謂之篤恭而天下平乎晉陵錢氏曰此七節言君子之德不著於外極於天下之無聲臭故子貢曰夫子之言性與天道不可得而聞也的然顯然也溫而理溫猶和也理猶治也逺之近風之自自外而知之微之顯自內而知之無惡於志志猶記也雖有人志之君子所不惡言屋漏則通於天所當愧也不大聲以色言大舜文王之明德所以廣大其聲譽者不以顔色故夫子云聲與色皆末也晏氏曰淡者所以合乎天不厭者所以通乎人淡而不厭則天人兼備矣簡者居其實而略文者托其華而詳簡而文則華實相副矣溫者以仁存心理者以義制事溫而理則仁義並行矣盡此三道者全德之人也入德蓋由君子之道而入聖人之德也自敬者不敢慢於人故雖不動而人皆敬之况於有動乎自信者不敢詐於人故雖不言而人皆信之况於有言乎上文言內省不疚而繼之以此蓋欲其以自敬自信為克爾說者謂篤恭者厚於恭而無所薄之謂也此說非矣是不知經者之談表記不云乎君子篤以不掩恭以逺耻則篤也恭也分而為二矣蓋篤以篤實在內言其德也恭以恭遜在外言其行也有覺德行四國順之此天下所以平歟建安真氏曰引詩潛雖伏矣亦孔之昭明雖潛深隱伏之地而其昭著章灼有不可掩者故君子內省而不疚無愧於心苟人心至靈毫髮之微少有自欺必有不能慊於中者此所謂疚也此所謂惡也惟夫處幽如顯視獨如衆反之於己無所疚惡也此君子之所以大過人而人之所不能及也又謂於處室之時當無愧於屋漏故君子靜而常敬默而常信不待動作語言而後見也存養之功至此非盛德其孰能之乎蔡氏曰衣錦尚絅至可與入德矣言戒謹恐懼之事潛雖伏矣至人之所不見乎言謹獨之事相在爾室至不言而信言家齊之事奏假無言至威於鈇鉞言國治之事不顯惟德至天下平言天下平之事故於家則不言民於國則稱民至篤恭而天下平則直言天下矣豫懷明德至無聲無臭至矣言君子道德精至人道之極致也知逺之近知風之自外必由乎內也知微之顯內必著乎外也言能知夫內外輕重之至則可許以入德之事矣錢塘于氏曰入德之門知逺之近必由此以之彼知風之自必由內以達外知微之顯必知天下之顯本乎微能知近而知自則是知微也近而逺自而風則是微之顯也故知微之顯一句異於逺之近風之自也知微之顯非慎獨之學不能造也延平周氏曰以聲色而方於德則德為本以德而方於道則道為妙蓋毛譬則德也上天譬則道也毛雖微然未免乎有體有體故有倫唯上天之造始則不唯無體而又且無聲無臭也新定邵氏曰君子之道謙冲務實不求人之我知也而芬芳外達人自知之故在已雖暗然自晦而其道日彰而不可掩小人之道誇詡衒耀唯恐人之不我知也而行潦無本涸可立待故在已雖的然自彰而其道日亡而不可久孟子聲聞過情一章即所以推明此意正月之詩所云潛雖伏矣亦孔之昭此即淵魚喻謂魚潛于淵冝若人所不見矣而終不免於網罟之患則以其實有此魚終不能逃人之知也君子而審乎此則反觀內省實無一毫之疚病可也一毫隱於方寸人之視之如見其肺肝亦猶此魚雖伏而甚昭也豈不凛乎可懼哉君子德化所感不賞而民自勸於為善不怒而民自威於鈇鉞蓋人心均有此天理宗廟之中未施敬而民敬墟墓之間未施哀而民哀何待賞而後勸乎訟而有愧者望賢者室廬而遽返身為不義者不畏其罪而畏賢者之知何待怒而後威乎夫其隨觸而感與夫鄉閭所敬者其所興起其所愧惕猶且若此而况君國子民者躬率表倡於其上則其感化之效又當若何耶載字訓詁不同文王詩云上天之載無聲無臭說詩者曰載事也釋中庸者音栽謂天之造生萬物也以愚觀之俱所未安載猶地載神氣之載言上天所載之道無聲無臭也禮記集說卷一百三十六
