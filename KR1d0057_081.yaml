body:
  text: 禮記集說卷八十一宋衛湜撰喪服小記第十五孔氏曰案鄭目録云喪服小記者以其記喪服之小義也此於别録屬喪服嚴陵方氏曰哀之本在心及發於聲音而見於衣服者乃其末耳此篇則以服為主故以服為言且謂之小記至於大記則所主不特在服故不曰服而謂之大記斬衰括髮以麻為母括髮以麻免而以布齊衰惡笄以終喪鄭氏曰母服輕至免可以布代麻也為母又哭而免笄所以卷髮帶所以持身也婦人質於喪所以自卷持者有除無變孔氏曰自此至則髽一節論斬衰之喪男女括髮免髽之異斬衰者主人為父之服也括髮者為父未成服之前所服也禮親始死子布深衣去冠而有笄縰徒跣扱上衽至將小斂去笄縰著素冠視斂斂訖投冠而括髮括髮者以麻自項以前交於額上卻繞紒如著幓頭焉為母初喪至小斂後括髮與父禮同故亦云括髮以麻也免而以布者此謂為母與父異者也亦自小斂後而括髮士喪禮云卒小斂主人髺髮袒是也至尸出堂子拜賔時猶與為父不異至拜賔後子往即堂下之位士喪禮所云男女奉尸侇於堂訖主人降自西階東即位主人拜賔即位踊襲絰於序東復位此時則異也鄭注又哭是此時也若為父此時猶括髮而踊襲絰帶以至大斂而成服若母喪於此時則不復括髮乃著布免踊而襲絰帶以至成服故云免而以布也惡笄榛木為笄也婦人質於其自卷持者有除無變故要絰及笄不須更易至服竟一除故云以終喪案崔氏曰凡親始死將三年者皆去冠笄纚如故十五升白布深衣扱上祍徒跣交手而哭婦人則去纚衣與男子同不徒跣不衽扱著白布深衣其齊衰以下男子著素冠齊衰以下婦人骨笄而纚皆吉屨無絇其服皆白布深衣至死之明日士則死日襲明日小斂若大夫死之明日襲而括髮大夫與士括髮於死者俱二日始死以後小斂之前大夫與士皆加素冠於笄纚之上始死哀甚未暇分别尊卑故大夫與士其冠皆同也至小斂投冠括髮之後大夫加素辨士加素委貌皆加環絰凡括髮之後至大斂成服以來括髮不改但士之既殯諸侯小斂於死者皆三日說髦同也其齊衰以下男子於主人括髮之時則著免其婦人將斬衰者於男子括髮之時則以麻為髽其齊衰者於男子免時婦人則以布為髽下男子免而婦人髽是也其大功以下無髽也其服斂畢至成服以來白布深衣不改士死後二日襲帶絰其大夫以上成服與士不同其襲帶絰之屬或與士同或與士異無文以言之其斬衰男子括髮齊衰男子免皆謂喪之大事斂殯之時若其不當斂殯則大夫以上加素辨士加素冠皆於括髮之上天子七日成服諸侯五日成服大夫士三日成服其葬之時大夫及士男子散帶婦人髽與未成服時同其服則如喪服若天子諸侯則首服素辨以葛為環絰大夫則素辨加環絰士則素委貌加環絰鄭謂接神不可以純凶是也至既虞卒哭之時乃服變服首絰要帶男子皆以葛易之齊斬之婦人則易首絰不易要帶大功小功婦人則易要帶為葛雖受變麻為葛卒哭時亦未說麻至祔乃說麻服葛其斬衰至十三月練而除首絰練冠素纓中衣黃履縓為領袖緣布帶繩履無絇若母三年者小祥亦然斬衰二十五月大祥朝服縞冠既祥乃服十五升布深衣領緣皆以布縞冠素紕二十七月乃禫服𤣥冠衣黃裳而祭祭畢服朝服以黑經白緯為冠所謂纎冠而練纓吉屨踰月服吉父沒為母與父同父在為母十一月而練十三月而大祥十五月而禫其服變除與父沒為母同其不杖齊衰及大功以下服畢皆初服朝服素冠踰月服吉也藍田吕氏曰免以布為卷幘以約四垂短髮而露其髻於冠禮謂之闕項冠者必先著此闕項而後加冠故古者有罪免冠而闕項存因謂之免音免以其與冕辨之冕其音相亂故改音問長樂黃氏曰括髮免髽乃小斂至大斂未成服之制又有變禮括髮免髽者奔喪是也有啓殯見棺柩變同小斂之時者既夕禮丈夫髽散帶垂是也大要不出此三節而免之用為尤廣蓋喪禮未成服以前莫重於袒括髮檀弓曰袒括髮去飾之甚也括髮以麻免以布又曰免不冠者之所服則免之禮稍殺於袒括髮也是故小斂為父括髮而至於成服為母則即位之後不括髮而為免小斂有括髮有免及啓殯則雖斬衰亦免而無括髮以至卒哭不唯此也自斬至緦皆有免五世無服者亦袒免童子當室免朋友在他邦亦袒免君弔雖不當免時必免是免之用為尤廣也嚴陵方氏曰衰凶服名也其制當心曰衰當背曰負左右曰辟其别如此而通謂之衰者以哀雖見於衣服其本在心故也山隂陸氏曰士喪禮主人髺髮袒衆主人免於房婦人髽於室則袒括髮一人而已諸子皆免新安朱氏曰括髮是束髮為髻鄭氏儀禮注及疏以男子括髮與免及婦人髽皆云如著幓頭然所謂幓頭即如今之掠頭編子自項而前交於額上郤繞髻也男子冠而婦人笄男子免而婦人髽其義為男子則免為婦人則髽鄭氏曰别男子也孔氏曰此明男子婦人冠笄髽免相對之節但吉時男子首有吉冠則女首有吉笄若親始死男去冠女則去笄若成服為父男則六升布為冠女則箭篠為笄為母男則七升布為冠女則榛木為笄是男子冠而婦人笄若遭齊衰之喪首飾亦别當襲斂之節男子著免婦人著髽故云男子免而婦人髽免者鄭注士喪禮云以布廣一寸自項中而前交於額上卻繞紒也如著幓頭幓髽有二種一是斬衰麻髻二是齊衰布髻皆名露紒必知然者以喪服女子子在室為父箭笄髽衰是斬衰之髽用麻鄭注以為露紒明齊衰髽用布亦謂之露紒髽也喪服往往寄異以明義或疑免髽亦有㫖故解之以其義言於男子則免婦人則髽男去冠猶婦人去笄無服别義故云其義也長樂黃氏曰襄公四年臧紇救鄫侵邾敗於狐駘國人逆喪者皆髽魯於是乎始髽注髽麻髮合結也遭喪者多故不能備凶服髽而已疏曰髽之形制禮無明文先世儒者各以意說鄭衆以為枲麻與髮相半結之馬融以為屈布為之髙四寸著於顙上鄭𤣥以為去纚而紒案檀弓記稱南宫縚之妻孔子之兄女也縚母喪孔子誨之髽曰爾毋從從爾爾毋扈扈爾鄭𤣥云從從謂大髙扈扈謂大廣若布髙四寸則有定制何當慮其從從扈扈而誨之哉如鄭𤣥云云纚而空露其紒則髮上本無服矣喪服女子在室為父髽衰三年空露紒髮安得與衰共文而謂之髽衰也魯人逆喪皆髽豈直露紒迎喪哉凶服以麻表髽字從髟是髮之服也杜以鄭衆為長故用其說言麻髮合結亦當麻髮半也於時魯師大敗遭喪者多婦人迎子迎夫不能備其凶服唯髽而已同路迎喪以髽相弔傳言魯於是始髽者自此以後遂以髽為弔服雖有吉者亦髽以弔人檀弓曰魯婦人之髽而弔也自敗於臺鮐始也鄭𤣥云時家家有喪髽而相弔知於是始髽者始用髽相弔也嚴陵方氏曰男子所以冒首者謂之冠婦人所以貫髮者謂之笄此特言其吉而已及凶而變焉男子則去冠而免婦人則去笄而髽也故曰男子免而婦人髽蓋有冠則首服去冠則免故去冠以麻繞之謂之免有笄則髮立去笄則髽故去笄以麻繞之謂之髽若夫男子成服則亦有冠焉所謂厭冠是也婦人成服則亦有笄焉所謂惡笄是也然則喪之或免或髽者豈有他哉特以辨男女之義而已山隂陸氏曰婦人笄猶男子之冠故司馬子期曰吾有妾而願欲笄之可乎喪服傳曰女子子適人者謂其父母婦為舅姑惡笄有首以髽卒哭子折笄首以笄布總蓋曰以笄則其主在笄以髽則雖有笄焉非笄之正苴杖竹也削杖桐也孔氏曰此一經解喪服苴杖削杖也苴者黯也至痛內結必形色外章心如斬斫故貌必蒼苴所以衰裳絰杖俱備苴色也必用竹者以其體圎性貞履四時不改明子為父有終身之痛故斷而用之無所厭殺也削者殺也必用桐者明外雖被削而心本同也且桐隨時凋落此謂母喪示外被削殺服從時除終身之心與父同也賈氏曰父者子之天竹圎亦象天竹內外有節象子為父亦有外內之痛此為父所以杖竹桐外無節經時而變象家無二尊屈於父削之使方者取母象於地此為母所以杖桐也杖所以扶病病從心起故杖之髙下以心為斷儀禮疏祖父卒而后為祖母後者三年鄭氏曰祖父在則其服如父在為母也孔氏曰此一經論適孫承重之服祖父卒者謂適孫無父而為祖後祖父已卒今又遭祖母喪故云為祖母後也如父卒為母三年若祖父卒時父在己雖為祖期今父沒祖母亡時已亦為祖母三年也嚴陵方氏曰言祖父卒而為祖母如是則祖母卒而為祖父亦若是為父母長子稽顙大夫弔之雖緦必稽顙婦人為夫與長子稽顙其餘則否鄭氏曰父母長子稽顙喪尊長及正體不敢不盡禮也雖緦必稽顙尊大夫不敢以輕待之也其餘則否謂婦人恩殺於父母孔氏曰此一節論喪合稽顙之事重服先稽顙而後拜父母長子並重其餘期以下先拜後稽顙也此謂平等來弔若大夫弔士雖是緦麻之親亦必先稽顙而後拜也婦人為夫與長子亦先稽顙而後拜其餘否者謂父母也以受重他族其恩減殺於父母長樂陳氏曰稽顙猶首也禮非至尊不稽首則喪非至重不稽顙矣然有非至重而稽顙者非以其至親則以弔者之尊也故為妻稽顙以至親也大夫弔之雖緦必稽顙以弔者之尊也婦人移天於夫而傳重於長子故雖父母不稽顙所稽顙者夫與長子而已以所受於此者重則所報於彼者殺也男主必使同姓婦主必使異姓鄭氏曰謂為無主後者為主也異姓同宗之婦也婦人外成孔氏曰婦人外成適於他族不得自與己同宗為主此云異姓者與夫家為異姓同庾氏曰喪有男主以接男賔女主以接女賔若父母之喪則適子為男主適婦為女主今或無適子適婦遣他人攝主若攝男主必使喪家同姓之男婦主必使喪家異姓之女為父後者為出母無服鄭氏曰不敢以己私廢父所傳重之祭祀孔氏曰此一經論適子承重不得為出母著服之事出母謂母犯七出為父所遣母子至親義不可絶父若猶在子皆為出母期若父沒後適子係嗣蒸嘗不敢以私親廢先祖之祀故不復為出母服嚴陵方氏曰為出母無服者隆於公義而殺於私恩也親親以三為五以五為九上殺下殺旁殺而親卑矣鄭氏曰已上親父下親子三也以父親祖以子親孫五也以祖親髙祖以孫親𤣥孫九也殺謂親益疏者服之則輕孔氏曰此一經廣明五服之輕重隨人之親疏著服之節親親以三者上父下子并已為三也為五者嚮者三加祖及孫故謂五也以五為九者已上祖下孫則是五也又以曾祖故親髙祖曾孫故親𤣥孫上加曾髙二祖下加曾𤣥兩孫以四籠五故為九也上殺者據己上服父祖而減殺故服父三年服祖減殺至期以次減之應曾祖大功髙祖小功而俱齊衰三月者但父祖於己是同體之親故依次減殺曾髙其恩已疏故一等從齊衰三月也所以喪服注云重其衰麻尊尊也減其日月恩殺也不可以大功小功旁親之服加至尊故皆服齊衰也下殺者謂下於子孫而減殺子服父三年父亦宜報而父子首足不無等衰故父服子期也若正適傳重便得遂情故喪服云不敢降是也父服子期孫卑理不得祖報故為九月若傳重者亦服期也為孫既大功則𤣥孫宜五月但曾孫服曾祖止三月故曾祖報亦一時也曾祖是正尊自加齊衰服曾孫卑故正服緦麻曾孫既緦麻三月𤣥孫理不容異故服同三月旁殺者世叔之屬是也父是至尊故以三年若據祖期斷則世叔宜九月而世叔是父一體故加至期也從世叔既疏加所不及據期而殺是以五月族世叔又疏一等故宜緦麻此外無服也此是發父而旁漸至輕也又祖是父一體故加至期而祖之兄弟非己一體故加亦不及據於期之繼殺便止五月族祖又疏一等故宜緦麻此外無服是發祖而旁漸殺也又曾祖據期本應五月曾祖之兄弟謂族曾祖既疏一等故宜三月也自此以外及髙祖之兄弟悉無服矣又至親期斷兄弟至親一體相為而期同堂兄弟疏於一等故九月從祖兄弟又疏一等故小功族之昆弟又殺一等故宜三月此外無服是發兄弟而旁殺也又父為子期兄弟之子但宜九月而今亦期者父與子本應報以三年特為首足故降至期兄弟之子為世叔本應九月言世叔與尊者一體而加至期世叔旁尊不得自比彼父祖之重無義相降故報兄弟子期且已與兄弟一體兄弟之子不宜隔異與己子等所以至期故檀弓云兄弟之子猶子引而進之是也又同堂兄弟之子服從伯叔無加則從伯叔亦正報五月也族兄弟之子又疏故宜緦耳此發子而旁殺也又孫服祖期祖尊故為孫大功兄弟之孫服從祖五月故從祖報之小功也同堂兄弟之孫既疏為之緦麻其外無服矣曾祖為曾孫三月為兄弟曾孫以無尊降之故亦為三月始自父母終於族人故云親畢矣且五屬之親若同父則期同祖則大功同曾祖則小功同髙祖則緦麻髙祖外無服亦是畢也嚴陵方氏曰親親之道成於三窮於九夫道生一一生二二生三三生萬物萬物有生則有成矣人道上由父生下以生子身居其中然後人道成焉此謂成於三變而為九是所謂九族而人道盡於此矣此之謂窮於九曰上殺者逺近之殺也曰下殺者尊卑之殺也曰旁殺者親疏之殺也逺近之殺者近者隆而逺者殺故也尊卑之殺者尊者隆而卑者殺故也所謂親疏者亦若是而已不曰隆而曰殺者親愈上則愈殺於逺親愈下則愈殺於卑故也所謂旁殺者亦若是而已三殺既畢則九族之外也絶族無移服故曰而親畢矣曾者增之也髙者積而上之謂也𤣥者久而小之謂也馬氏曰親親以三為五以五為九而不言七者以其上而曾髙者皆為逺祖也下而曾𤣥者皆為逺孫也凡喪服之道以近為親是故上殺者有緦麻而無功衰以其相逺也旁殺之親有大功有小功者以其相近也近者至於親親而不尊逺者至於尊尊而不親唯其親而不尊故九月五月之喪功衰而已唯其尊而不親故雖齊衰之喪亦有三月者也李氏曰周官小宗伯曰掌三族之别以辨親疏書曰九族既睦辨因其近故止於三睦舉其逺故至於九蓋六世則親族竭矣自己而上殺至於髙祖則五世自己而下殺至於𤣥孫則五世自己而旁殺至於三從兄弟則五世故曰上殺下殺旁殺而親畢矣夫服者所以序其親者也禮有經而等義有推而進權有重而輕輕而重孫為祖齊衰而祖為之緦麻兄弟之子為世叔期從兄弟之子為從世叔小功五月而從世叔亦為之五月族兄弟為族世叔緦三月而族世叔亦為之緦兄弟之孫為從祖五月而從祖亦為之小功從兄弟之孫為曾祖之兄弟三月而曾祖兄弟亦為之緦兄弟則期從兄弟則大功從祖兄弟則相為緦此經而等也子為父三年而父為之期孫為祖期而祖為之大功曾孫𤣥孫為曾祖髙祖齊衰三月而曾祖髙祖亦為之緦此順而殺也為孫期則為兄弟之子當大功而亦期此推而進也有傳重者則父為祖三年祖為孫期此輕而重也為祖期為曾祖當大功而乃為之五月此重而輕也長樂陳氏曰書與詩序皆言九族特周禮小宗伯儀禮士昏禮記仲尼燕居特言三族者三族父子孫也九族髙祖至𤣥孫也三族舉其本九族極其末舉三族則九族見矣白虎通夏侯歐陽何琦如淳之徒以父族四母族三妻族二為九族其說蓋以詩之葛藟刺平王不親九族而言謂他人父謂他人母頍辨刺幽王不親九族而言豈伊異人兄弟甥舅角弓亦刺不親九族而言兄弟㛰姻無胥逺矣則所謂九族者非特內宗而已是惡知詩人之所主者因內宗而發哉彼謂父族四者父之姓為一族父女昆弟適人者子為二族己女昆弟適人者子為三族己女適人者子為四族母族三者母之父母為一族母之昆弟為二族母之女昆弟為三族妻族二者妻之父為一族妻之母為二族然於母之母則合而為一族妻之父母則離而為二可乎爾雅於內宗皆曰族於母妻曰黨而已又禮小功之末可以嫁娶妻之黨固無妨於嫁娶昏禮不容慮其不虞也然則九族之說當從孔安國鄭康成為正此經則九族殺之差也禮書山隂陸氏曰族之以喪紀論者孔氏云上至髙祖下及𤣥孫為九族此斥同姓而兼死言之也族之以親屬論者歐陽氏云父族四母族三妻族二為九族此斥生而兼異姓言之也以此經考之則孔氏之言為是以詩頍辨角弓考之則九族異姓在焉於歐陽氏之言為當也夫以喪紀言服者推而上之極於髙祖引而下之極於𤣥孫者何也蓋曾祖之上其祖謂之髙祖尊者以親屬髙逺也曾孫之下其孫謂之𤣥言卑者於親屬微昧也故喪紀於是盡焉以親屬言放者母族三有母之母姓父族四無父之母姓者蓋屈於父之姓故也此父在為母期之意也然則母之姓於母之父姓何以無屈曰理有等恩有殺於同姓之族嚴於異姓之族略仁義之道也母族三有母之女昆弟適人者而妻族二無妻之昆弟適人者何也蓋女子謂姊妹之夫為私以其非正親故也妻之姊妹於己則非正親其不在族中也宜矣王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之鄭氏曰禘大祭也始祖感天神靈而生祭天則以祖配之自外至者無主不止而立四廟者髙祖以下與始祖而五也世子有廢疾不可立而庶子立其祭天立廟亦如世子之立也春秋時衛侯元有兄縶孔氏曰此一節論王者庶子之郊天立廟與適子同之義禘謂夏正郊天自從也王者禘祭其先祖所從出之天若周之先祖出自靈威仰以祖配者以其先祖配祭所出之天也既有配天始祖之廟更立髙祖以下四廟與始祖而五也天位尊重庶子為王郊天祀五廟事事如適子嫌其不得故特明之鄭注自外至者無主不止公羊宣三年傳文外至者天神也主者人祖也引衛侯元有兄縶證世子廢疾不可立也長樂陳氏曰韋𤣥成曰王者禘其祖所自出以其祖配之而立四廟言始受命而王祭天以其祖配不為立廟親盡也然則𤣥成以禘為祭天固不足信以立四廟為始受命而王者於理或然蓋始受命而王者不必備事七世故立四廟止於髙祖而已其上親盡不祭可也庶子王亦如之者禮為人後者為父母期公子為後為其母於祭於孫否蓋為人後者雖受重於所後而不廢父母期公子為後雖受重於君母而不廢其母祭則庶子為王雖有正統之七廟其可輒廢祖考之祭乎於是自立四廟以視始受命而王者所以著其不忘本也昔漢宣帝以從孫繼昭帝患昭穆之體一也於是立悼皇考廟以當一代之穆而王舜中劉歆以為孝宣以兄孫繼統為孝昭後考廟固不當立纍世奉之是兩統二父也然宣帝以悼皇考當一代之穆固不合禮若特立廟乃庶子王之所當立者謂不當立誤矣嚴陵方氏曰王立七廟三昭三穆與大祖之廟而七此言王者止曰立四廟者據月祭之親廟言之也蓋逺廟為祧有二祧享嘗乃止既言禘其祖之所自出以其祖配之則祭及其二祧可知矣此所以不言之也山隂陸氏曰此言王者後世嘗更衰亂統序既絶其子孫有特起者若漢光武復有天下既復七廟則其曾祖禰當别立廟祀之故曰庶子王亦如之也若孝文繼孝惠雖非適子其承祭祀不言可知今經言此者正為庶子不祭庶子王然後祭耳廬陵胡氏曰鄭謂世子有廢疾而庶子立如昭七年左氏云孟縶之類案經傳庶子王多矣豈世子盡有疾清江劉氏曰庶子王亦如之注云庶子祭天立廟非也此一句當承後文慈母與妾母不世祭也之下脫誤在前耳又曰而立四廟云天子立四廟亦非也此一句上有脫簡耳文當曰諸侯及其大祖而立四廟别子為祖繼别為宗繼禰者為小宗有五世而遷之宗其繼髙祖者也鄭氏曰别子者諸侯之庶子别為後世為始祖也謂之别子者公子不得禰先君繼别者别子之世長子為其族人為宗所謂百世不遷之宗也繼禰者别子庶子之長子為其昆弟為宗也謂之小宗者以其將遷也五世而遷即小宗也小宗有四或繼髙祖或繼曾祖或繼禰皆至五世則遷孔氏曰自此至宗也一節並論尊祖敬宗之義諸侯適子之弟别於正適不得禰先君故稱别子其子孫為卿大夫立此别子為始祖故云别子為祖别子之世世長子恆繼别子與族人為百世不遷之大宗故云繼别為宗也禰謂别子之庶子所生長子繼此庶子與兄弟為小宗比大宗為小故云小宗也五世者為上從髙祖下至𤣥孫之子比𤣥孫之子則合遷徙不得與族人為宗故云有五世則遷之宗此五世則遷實是繼髙祖者之子記文略爾若繼髙祖之身未滿五世猶為服也鄭注小宗有四以别子之後族人衆多或繼髙祖與三從兄弟為宗或繼曾祖與再從兄弟為宗或繼祖與同堂兄弟為宗或繼禰與親兄弟為宗一身凡事四宗事親兄弟之適是繼禰小宗也事同堂兄弟之適是繼祖小宗也事再從兄弟之適是繼曾祖小宗也事三從兄弟之適是繼髙祖小宗也兼大宗為五繼髙祖者至子五世不復與四從兄弟為宗故云皆至五世則遷各隨近相宗然則小宗所繼非一獨云繼禰為小宗者雖四初皆繼禰為始據初為元故特云繼禰也橫渠張氏曰宗子繼别為宗言别則非一也如别子五人五人各為大宗所謂兄弟宗之者謂别子之子繼禰者之兄弟宗其小宗子也山隂陸氏曰有五世而遷之宗據宗其繼髙祖者五世則遷者也其繼髙祖者𤣥孫也宗其繼髙祖者𤣥孫之子也先儒謂記文略此讀五世而遷之宗之誤也即云五世而遷之宗猶云五世則遷之宗是故祖遷於上宗易於下尊祖故敬宗所以尊祖禰也鄭氏曰宗者祖禰之正體孔氏曰四世之時尚事髙祖至五世之時謂髙祖之父不為加服是祖遷於上四世之時仍宗三從族人至五世不復宗四從族人各自隨近為宗是易於下宗是先祖正體所以尊祖故敬宗敬宗所以尊祖禰也嚴陵方氏曰先儒疏祖遷於上宗易於下特五世則遷之小宗爾若夫百世不遷之大宗則祖未嘗遷而宗未嘗易焉於祖曰遷於宗曰易者遷有升之之意故於在上者言之易有去之之意故於在下者言之庶子不祭祖者明其宗也庶子不為長子斬不繼祖與禰故也鄭氏曰庶子不祭祖者明其尊宗以為本也禰則不祭矣言不祭祖者主謂宗子庶子俱為適士得立祖禰廟者也凡正體在乎上者謂下正猶為庶也不為長子斬尊先祖之正體不二其統也言不繼祖禰則長子不必五世孔氏曰庶適俱是人子並宜供養而適子蒸嘗庶子獨不祭者正是推本崇適明有所宗故云明其宗也此言庶子則是父庶父庶即不得祭父何假言祖故鄭云禰則不祭也然而不祭祖者謂適士得立二廟自禰及祖宗子得立祖廟祭之祖庶雖俱為適士得立禰廟不得立祖廟祭之也鄭注正體謂祖之適也下正謂禰之適也雖正為禰適而於祖猶為庶故禰適謂之為庶也五宗悉然不為長子斬亦尊宗之義喪服為長子斬此明父是庶子故不得為長子斬互相明也然父適二世承重則得為長子三年故鄭注云不必五世也禮有適子者無適孫雖是祖正若父猶在則已未成適則不得重長必是父沒後者故云為父後者然後為長子三年也然己身雖是祖庶而是父適則應立廟立廟則已長子傳重當祭而不為斬者以是祖庶厭降故不敢服斬且死者其父見在父自供祭然禮為後者有四條皆不為斬有體而不正庶子為後是也有正而不體適孫為後是也有傳重而非正體庶孫為後是也有正體而不傳重適子有廢疾不立是也四者皆期悉不得斬也惟正體又傳重者乃極服耳賈氏曰適親所生皆名適子第一子死則取適妻所生第二子者立之亦名長子若言適子惟據第一者若云長子通立適以長故也儀禮疏橫渠張氏曰此以服言不以祭言故又發此條嚴陵方氏曰適士二廟則有祖廟矣官師一廟則有禰廟而已此言庶子不祭祖者言適士家也下言庶子不祭禰者言官師之家也夫立宗所以重本適子本也庶子支也其不祭也雖祖之不同至於明其宗之義則一而已其曰不祭祖則禰容祭之矣山隂陸氏曰庶子不祭祖此謂庶子為士無祖廟者不敢祭祖祭於宗子之家明其尊宗以為本也庶子不為長子斬此關上下言之亦言之法不繼祖關上庶子不祭祖者也不繼禰關下庶子不祭禰者也禮記集說卷八十一
