body:
  text: 禮記集説卷一百二十六宋衛湜撰子曰回之爲人也擇乎中庸得一善則拳拳服膺而弗失之矣鄭氏曰拳拳奉持之貌孔氏曰此一節明顔回能行中庸膺謂胷膺言奉持善道弗敢棄失河南程氏曰顔子擇中庸得一善則拳拳中庸如何擇如博學之又審問之又謹思之又明辨之所以能擇中庸也雖然學問思辨亦何所據乃識中庸此則存乎致知致知者此則在學者自加功也大凡於道擇之則在乎知守之則在乎仁斷之則在乎勇人之於道則患在不能守不能擇不能斷伊川問顔子如何學孔子到此深䆳曰顔子所以大過人者只是得一善則拳拳服膺與能屢空耳横渠張氏曰知德以大中爲極可謂知至矣擇中庸而固執之乃至之之漸也唯學然後能勉能勉然後日進無疆而不息可期矣又曰君子莊敬日强始則須拳拳服膺出於强勉至於中禮却從容如此方是爲己之學又曰顔氏求龍德正中而未見其止故擇乎中庸得善則拳拳服膺歎夫子之忽焉前後是也藍田吕氏曰自人皆曰予知以下中庸之可守人莫不知之鮮能蹈之惡在其爲知也歟唯顔子之擇中庸而能守之此所以爲顔子也衆人之不能期月守聞見之知非心知也顔子服膺而弗失心知而已此所以與衆人異一本云擇乎中庸可守而不能久知及而仁不能守之者也知及之仁不能守之自謂之知安在其爲知也歟雖得之必失之故君子之學自明而誠明則能擇誠則能守能擇知也能守仁也如顔子者可謂能擇而能守也高明不可窮博厚不可極則中道不可識故仰之彌高鑚之彌堅瞻之在前忽焉在後察其志也非見聖人之卓不足謂之中隨其所至盡其所得據而守之則拳拳服膺而不敢失勉而進之則既竭吾才而不敢緩此所以恍惚前後而不可爲象求見聖人之止欲罷而不能也一宫之中則庭爲之中矣指宫而求之一國則宫或非其中指國而求之九州則國或非其中故極其大則中可求止其中則大可有此顔子之志乎建安㳺氏曰道之不行知者過之如舜之知則道之所以行也道之不明賢者過之如回之賢則道之所以明也又曰擇乎中庸見善明也得一善則服膺不失用心剛也延平楊氏曰道之不明賢者之過也故又以回之事明之夫得一善拳拳服膺而弗失此賢者所以不過也回之言曰舜何人也予何人也有爲者亦若是用此道也故繼舜言之河東侯氏曰知者如舜之大知顔子之服膺可以謂之知矣故又以顔子明之人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也予知云者自知之知也人皆曰予知擇乎中庸而不能期月守也亦自知之知皆非大知也知者致知則可以擇中庸矣舜之大知則不待擇也顔子則進於此者矣故曰擇然而中庸豈可擇也擇則二矣此云擇者如博學之審問之明辨之勉而中思而得者也故曰擇乎中庸顔子之學造聖人之中若有未至焉者故得一善則拳拳服膺而勿失之勿失則能久中矣嗚呼學者精㣲非顔子孰知之豈待期月而守哉新安朱氏曰此第八章服猶著也奉持而著之心胷之間言能守也顔子蓋真知之故能擇能守如此此行之所以無過不及而道之所以明也或問此其稱回之賢何也曰承上章不能期月守者而言如回之賢而不過則道之所以明也蓋能擇乎中庸則無賢者之過矣服膺弗失則非不肖者之不及矣然則兹賢也乃所以爲知也歟又曰程子所引屢空張子所引未見其止皆非論語之本意唯吕氏之論顔子有曰隨其所至盡其所得據而守之則拳拳服膺而不敢失勉而進之則既竭吾才而不敢緩此所以恍惚前後而不可爲象求見聖人之止欲罷而不能也此數言者乃爲親切確實而以見其深淺縝密之意學者所宜諷誦而服行也但求見聖人之止一句文亦未安耳臨川王氏曰易曰有不善未嘗不知知之未嘗復行在易言顔子之去惡在中庸言顔子之就善也延平周氏曰舜之所以爲舜者以其好問而好察邇言顔回之所以爲顔回者以其得一善則拳拳服膺而弗失之也然用之於民則必言舜而擇乎中庸則必言顔回者蓋聖人逹而用之者莫如舜賢人窮而擇之者莫如顔回於賢人則言中言庸於聖人則止言中者聖人則能變矣而庸不足以言嚴陵方氏曰聖人之中庸無適而非中庸也又何擇之有擇乎中庸則賢人之事爾故以之言顔回焉山隂陸氏曰舜言知回言仁其曰回之爲人也以此拳言握持之固膺言服念在前是其所以弗失也新定顧氏曰中庸即善也善即中庸也舎中庸無以爲善海陵胡氏曰一善小善也得一小善拳拳然奉持於胷膺之閒弗失之言能躬行之也江陵項氏曰回之爲人也擇乎中庸得一善知之明也拳拳服膺而弗失之行之篤也呉興沈氏曰由乎中庸者聖人也擇乎中庸者賢人也叛乎中庸者衆人也舜由乎中庸者也天下其可皆責其如舜哉得如賢人者斯可矣故復以顔子之事明之夫喜怒哀樂欲發之際麗於善惡是非邪正之境閒不容髪差之毫釐繆以千里其可不知所擇乎擇之爲義非區區揀擇之謂也以吾天知之見照夫善惡是非之機苟得夫中節之善則謹守而不失其於中庸也庻幾焉然猶未善也至於忘夫善而舜之用中則爲至矣子思子欲發中庸之精粹於羣聖賢事爲之際必首證以知之事蓋聖道之妙無不自知入也旣明舜之知如此又辨人之知如彼復以顔子之事勉天下之人可謂善明中庸者霅川倪氏曰前舉舜取逹而在上之聖人此舉顔子取窮而在下之賢人以爲則法也顔子賢而在下率性而行雖不能行其道於當時而可以爲萬世學者之準的是亦修道之敎也永康陳氏曰如回擇乎中庸能體認之也體認得分明則得其固有之善如失其故物而得之敬而守之如恐不及肯失之乎兹回始可謂知子曰天下國家可均也爵禄可辭也白刃可蹈也中庸不可能也鄭氏曰言中庸爲之難孔氏曰此節言中庸之難天下謂天子國謂諸侯家謂卿大夫河南程氏曰克己最難故曰中庸不可能也明道藍田吕氏曰此章言中庸之難也均之爲言平治也周官冡宰均邦國平治之謂也平治乎天下國家知者之所能也讓千乘之國辭萬鍾之禄㢘者之所能也犯難致命死而無悔勇者之所能也三者世之所難也然有志者率皆能之中庸者世之所謂易也然非聖人其孰能之唯其以爲易故以爲不足學而不察以爲不足行而不守此道之所以不行也建安㳺氏曰天下國家之富可均以與人爲惠者能之爵禄之貴可辭爲㢘者能之白刃可蹈爲勇者能之然而中庸不可能者誠心不加而無擇善固執之實也延平楊氏曰有能斯有爲之者其違道遠矣循天下固然之理行其所無事而已夫何能之有新安朱氏曰此第九章亦承上章以起下章均平治也三者亦知仁勇之事天下之至難也然皆倚於一偏故資之近而力能勉者皆足以能之至於中庸雖若易能然非義精仁熟而無一毫人欲之私者不能及也三者難而易中庸易而難此民之所以鮮能也問中庸如何是不可能曰急些子便是過慢些子便是不及又曰或問中庸不可能何也曰此以三者之難明中庸之尤難也盖三者之事亦知仁勇之屬而人之所難然皆取必於行而無擇於義且或出於氣質之偏事勢之迫未必從容而中節也若曰中庸則雖無難知難行之事然天理渾然無過不及苟一毫之私意有所未盡則雖欲擇而守之而擬議之閒忽已堕於過與不及之偏而不自知矣此其所以雖若甚易而實不可能也故程子以克己最難言之其㫖深矣㳺氏以舜爲絶學無爲而楊氏亦謂有能斯有爲之者其違道遠矣循天下固然之理而行其所無事焉夫何能之有則皆老佛之緒餘而楊氏下章所論不知不能爲道遠人之意亦非儒者之言也二公學於程氏之門號稱髙弟而其言乃如此殊不可曉也已長樂劉氏曰三者雖難然皆一事之仁一時之義見幾而作頃刻可成非如中庸之爲道也自始及終從微至著造次必於是顛沛必於是戒慎乎其所不睹恐懼乎其所不聞言其常久則没身而後己是常久之道才明知術忠臣義士有所不能也故才如管仲可以均天下國家矣未必有中庸之徳也廉如仲子可以辭爵禄矣未必有中庸之徳也勇如子路可以蹈白刃矣未必有中庸之徳也則常久之道在乎其心之不忘在乎其守之弗失在乎其自强之不息然後庻乎其可能也海陵胡氏曰天子十倍於諸侯諸侯十倍於卿大夫是不可均也若以大中之道較之尚可均也中庸則不可能君子須得位然後可以行道是爵禄不可辭然而尚可辭中庸則不可辭白刃自非死君親之難則不可蹈然而尚可蹈也中庸則不可蹈中庸乃常行之道孔子言其難如此蓋設敎以勉人也延平黄氏曰均天下國家能義而已辭爵禄能㢘而已蹈白刃能勇而已不可均而均之則傷義不可辭而辭之則傷㢘不可蹈而蹈之則傷勇在乎天下國家也可均在乎中庸也不可均而弗均之斯能義矣在乎爵禄也可辭在乎中庸也不可辭而弗辭之斯能㢘矣在乎白刃也可蹈在乎中庸也不可蹈而弗蹈之斯能勇矣馬氏曰天下國家者人之所擅而均之者難唯知者能之爵禄者人之所欲而辭之者難唯㢘者能之白刃者人之所懼而蹈之者難唯勇者能之至於中庸其道易行而不可能也故曰中庸其至矣乎民鮮能久矣天下國家人之所難均而知者能均之然知者傷乎鑿蓋知其可均而不知其有不可均之理爵禄人之所難辭而㢘者能之然㢘者有以傷乎介知其可辭而不知其有不必辭之理白刃人之所難蹈者而勇者能之然而勇者有以傷乎暴知其可蹈而不知其有不必蹈之理凡此皆非中庸之道也故曰中庸不可能也永嘉薛氏曰天下之事可以强爲者是皆可能者也中庸天道也不可以能之也能之非道也執中而無方者也故曰神而明之存乎其人長樂陳氏曰天下國家可均此知者能之第恐作聰明而非中庸耳爵禄可辭此㢘者能之第恐務沽激而非中庸耳白刃可蹈此勇者能之第恐輕死生而非中庸耳荀子曰君子行不貴苟難説不責苟察名不責苟傳惟其當之爲貴當者中庸之謂也中庸非難能但不可苟以是三者爲之耳髙要譚氏曰凡最高難行之事皆可以能爲之惟中庸天理不可以能爲之也天下國家之大非尋常貲産之比疑不可均以與人然而巢由之徒視天下若将浼已燕子噲舉國以授子之殊無難色則是天下國家雖大在髙者處之均以與人可也爵之貴禄之富天下之人所同欲疑不可强爲辭辟也然慕爲夷齊之潔者雖賦邑萬鍾繫馬千駟亦不之顧則是爵禄雖榮在㢘者處之辭而不受可也白刃凶器天下之人所同畏疑不可冐死而蹈之然賁育專諸北宫黝之倫雖千萬衆在前猶不少懾是白刃雖凶在勇者處之以身蹈之可也蹈白刃不畏百千人中無一焉辭爵禄不受千萬人中無一焉均天下國家以與人雖數千年中亦無一焉此皆所謂超世絶倫之行非常人之所易能也而聖人皆以此爲可能至於中庸之道雖愚者可以與知不肖者可以與行而聖人乃曰不可能何也曰聖人於此示人以天理所在非謂中庸之道難知而難行也能之一字最爲學者大害蓋人之於中庸纔有能之之心則其所爲所行皆近乎好名皆出乎有意皆入乎妄作爲善之功狹矣其能常久不息乎故高者於天下國家能之則可均矣㢘者之於爵禄能之則可辭也勇者之於白刃能之則可蹈也凡超世絶倫之行能之則皆可爲也雖然能則能矣此豈常人之道哉今日行之後日不可復繼矣惟中庸每事皆任天理故不以能爲之心爲之天理所在即吾所行也天理所不在即吾所不行也事事循理而吾無所用其能焉夫然後可以乆於其道而萬善所歸皆萃於我聖人之示人其㫖深矣此能字與民鮮能久矣丘未能一焉意義不同夫言非一端而已各有所當也永康陳氏曰均天下國家之富以與人辭爵禄而不受蹈白刃而不顧揆之人情至難也適當其前有志類可爲之中庸乃日用不易之理至簡至易體而得之如反掌耳彼猶可爲而此不可能可謂捨近而慕遠矣不爲疑辭直曰不可能者甚之也與民可使由之不可使知之同意説者謂舉此三者以見中庸難能非也彼其奮然於是三者必其心有所不欲有所不爲逹其所不欲於其所可欲逹其所不爲於其所可爲則其至中庸也孰禦此聖人變動人心之術肯以日用之理爲難而絶之乎四明沈氏曰均天下國家辭爵禄蹈白刃中庸之門無是法也理有可則有不可若爲名義所激血氣所扶直意而行率情而爲更不顧天理如何則知其可而不知有不可惟一槩之以天理審度其可不可而行之則雖行天下難能不可繼之事無非君子之時中晉陵錢氏曰均猶平也均平天下國家才者能之辭爵禄㢘者能之蹈白刃勇者能之欲其合於中庸非才者㢘者勇者所可能也江陵項氏曰生知者爲上力行者次之勉强者又次之此知仁勇三德也上兩章已言知行此章自勉强言之強於外者易强於内者難勉强於知亦足以有知勉强於行亦足以有行下引子路問强猶曰古之人有能知者子路是也舜不可得如顔子足矣顔子不易如子路足矣宣城奚氏曰事有可强而能者有不可强而能者可以强而能則人皆能之不可强而能非功深力到者不能也天下國家可均也公者能之爵禄可辭也㢘者能之白刃可蹈也勇者能之至於中庸則非可以擬議料想模倣附㑹也必也博學審問謹思明辨而加之以力行庻乎其能之矣其曰不可能者非終不可能也使其果不可能則舜與顔子何以獨得之學者宜優㳺日求饜飫自得毋以不可能而自沮也毋以不可能而過用其心也霅川倪氏曰天下國家大小有差固不可均就能均之非中庸也爵禄富貴義所當得則不可辭就能辭之非中庸也白刃在前不可輕冐而蹈踐就能蹈之非中庸也是三者雖能爲人所不能爲皆失之過以中庸之道言之不可謂此爲能也蔡氏曰均國家者智也辭爵禄者仁也蹈白刃者勇也言智仁結上言勇起下新定顧氏曰此設爲之辭以明中庸之爲難事耳聳天下之聽示此道之重也中庸人心固有之理曷爲而難能若是蓋私欲一毫之萌則非能中庸者也而私欲未易息絶也且以七十子之善學僅曰日月至焉而已矣踰日踰月則未免私欲一念之萌挺然傑出者惟顔子而曰三月不違仁三月之久亦未免私欲一念之萌至於生而知之安而行之有若孔子猶曰我學不厭又曰吾嘗終日不食終夜不寝以思無益不如學也文王則曰亹亹至於不顯亦若有所臨無射亦若有所保舜則曰業業而無怠無荒伯益且勤於致戒聖人之用其力若此凡皆以中庸之難能也子路問强子曰南方之强與北方之强與抑而强與寛柔以教不報無道南方之强也君子居之衽金革死而不厭北方之强也而强者居之故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯鄭氏曰强勇者所好也言三者所以爲强者異也抑而强與抑辭也而之言女也謂中國也南方以舒緩爲强不報無道謂犯而不校也北方以剛猛爲强衽猶席也流猶移也塞猶實也國有道不變以趨時國無道不變以辟禍有道無道一也矯强貌孔氏曰此一節子路見孔子美顔回能擇中庸故問如己之强亦兼有中庸否南方謂荆揚之南其地多陽陽氣舒散人情寛緩和柔和柔爲君子之道故云君子居之北方沙漠之地其地多隂隂氣堅急故人性剛猛恒好鬭爭故以甲鎧爲席寝宿於中至死不厭非君子所處而强梁者居之惟云南北不云東西者南北互舉與東西俗同也矯者壮大之形故鄭云强貌也塞者守直不變德行充實也河南程氏曰南方人柔弱所謂强是義理之强故君子居之北方强悍所謂强者是血氣之强故小人居之凡人血氣須要以義理勝之伊川藍田吕氏曰此章言强之中也南方之强不及乎强者也北方之强過乎强者也而强者汝之所當强者也南方中國北方狄也以北對南故中國所以言南方也南方雖不及强然犯而不校未害爲君子北方則過於强尚力用强故止爲强者而已未及君子之中也得君子之中乃汝之所當强也柔而立寛而栗故能和而不流剛而寡欲故能中立而不倚富貴不能淫故國有道不變塞焉貧賤不能移威武不能屈故國無道至死不變是皆以己之强力矯其偏以就中者也夫矯之爲言猶揉木也木之性能曲能直将使成材而爲器故曲者直者皆在所矯故皆曰强哉矯不羞汙君不辭小官與鄉人處由由然不忍去雖袒裼裸裎於我側爾焉能浼我哉其和而不流者與非其君不事非其民不使與夫獨立不懼遯世無悶者其中立而不倚者歟塞未逹也君子逹不離道故當天下有道其身必逹不變未逹之所守所謂不變塞焉者也建安㳺氏曰中庸之道造次顛沛之不可違惟自强不息者爲能守之故以子路問强次顔淵所謂强者非取其勝物也自勝而已故以南方之强爲君子强也者道之所以成終始也故自和而不流至於至死不變皆曰强哉矯蓋其爲中雖不同而其貴不已一也延平楊氏曰天地之仁氣盛於東南義氣盛於西北故南北方之强氣俗如此寛柔以教不報無道以自勝爲强也故君子居之衽金革死而不厭以勝物爲强也子路之强若是故曰而强者居之而汝也與暴虎憑河死而無悔同意夫君子以自勝爲强故自和而不流至於至死不變皆曰强哉矯所以自勝其私以趨中也矯與矯枉之矯同亦因之以進子路也公孫衍張儀一怒而諸侯懼安居而天下息可謂强矣而孟子曰妾婦之道也至於富貴不能淫貧賤不能移威武不能屈然後謂之大丈夫君子之强至於至死不變然後爲至河東侯氏曰前言中庸不可能也恐學者中道而廢故引子路問强以勉之明君子自强不息雖愚必明雖柔必强豈不可能哉强有二説强悍勇敢與勝己之私皆謂之强故曰南方之强與北方之强與寛柔以教不報無道南方之强也克己復禮有若無實若虚犯而不校顔子之强似之故曰君子居之衽金革死而不厭北方之强也尚勇兼人行行如也子路之强似之故曰而强者居之君子以自勝爲强故曰强哉矯矯如矯木之矯矯曲以從直也君子之矯矯過與不及從乎中而已故國有道則所守不變所行不塞國無道則至死不變焉大壯之象曰君子以非禮勿履豈非强哉矯乎學者若知自强之道何中庸之不可能哉新安朱氏曰此第十章子路好勇故問强寛柔以教謂含容巽順以誨人之不及也不報無道謂横逆之來直受之而不報也南方風氣柔弱故以含忍之力勝人爲强君子之道也金戈兵之屬革甲胄之屬北方風氣剛勁故以果敢之力勝人爲强强者之事也矯强貌詩曰矯矯虎臣是也倚偏著也塞未逹也國有道不變未逹之所守國無道不變平生之所守也此則所謂中庸之不可能者非有以自勝其人欲之私不能擇而守也君子之强孰大於是四者夫子以是告子路者所以抑其血氣之剛而進之以德義之勇也又曰或問此其記子路之問强何也曰亦承上章之意以明擇中庸而守之非强不能而所謂强者又非世俗之所謂强也蓋强者力有以勝人之名也凡人和而無節則必至於流中立而無依則必至於倚國有道而富貴或不能不改其平素國無道而貧賤或不能久處乎窮約非持守之力有以勝人者其孰能及之故此四者汝子路之所當强也南方之强不及强者也北方之强過乎强者也四者之强强之中也子路好勇故聖人之言所以長其善而救其失者類如此曰和與物同故疑於流而以不流爲强中立本無所依又何疑於倚而以不倚爲强哉曰中立固無所依也然凡物之情唯强者爲能無所依而强立弱而無所依則其不傾側而偃仆者幾希矣此中立之所以疑於必倚而不倚之所以爲强也又曰諸説大意則皆得之惟以矯爲矯揉之矯以南方之强爲矯哉之强與顔子之强以抑而强者爲子路之强與北方之强者爲未然爾又語録曰和而不流下惠是中立而不倚夷齊是文王善養老他便盍歸乎來及至武王伐紂他又自不從而去强哉矯賛歎之辭涑水司馬氏曰南方之强不及强者也北方之强過强者也而强者汝之所當强者也南方中國北方狄也以北對南故中國所以言南也矯者矯其偏以就中也矯之爲言猶揉木也塞未逹也君子當天下有道其身必逹不變乎未逹之所守故曰不變塞也臨川王氏曰强哉矯者言此强可以矯北方之過矯枉而歸諸道者也國有道者泰通之時君子出而行道不可變而爲蔽塞焉此其强可以矯素隱行怪之枉也語曰邦有道貧且賤焉恥也國無道上下不交之時也當守道於己至死而不變其節孔子蓋惡當時之人爲中庸道不用於世遂半塗而廢故曰至死不變此其强可以矯半塗之枉下文蓋傷之也嵩山晁氏曰强疑其非中也蓋惟中庸能强也强也者誠也曽子論孝曰仁者仁此者也義者冝此者也强者强此者也强既有南方之異則責子路之所安以勉乎中也夫所謂君子者既和既中而誠明之守安於治亂之世勤而勉之也國有道君子或易仕而改其度不變塞焉强也嚴陵方氏曰子路能勇而不能怯近於北方之强故孔子因其問而言之於北方之下亦退之之意也抑者逆料之詞與孟子言抑王同義陽爲德隂爲力南方之强以德而已北方之强以力而已居猶居仁之居居其道不必居其地也强於德固君子之所居要之中庸之道亦未免有弊何則德之所尚者柔力之所尚者剛柔則失之懦剛則失之暴故君子必矯其弊以一歸乎中庸之道焉矯高而使下矯枉而使直也夫和故無剛之失不流故無柔之失故曰君子和而不流强哉矯中立則處乎剛柔之閒不倚則不偏於柔不偏於剛故曰中立而不倚强哉矯强於矯弊則中庸之道充塞乎中故國有道雖富且貴而富貴不能淫是道也國無道雖貧且賤而貧賤不能移是道也至死言終身由之也上言塞下言死互相備爾延平周氏曰孟子曰可以死可以無死死傷勇所謂衽金革死而不厭者知其可以死而不知其可以無死者也和而不流依於仁也中立而不倚據於德也國有道不變塞焉國無道雖死不變志於道也山隂陸氏曰和而不流栁下惠是與中立不倚伯夷是與國有道不變塞焉國無道至死不變伊尹是與三聖人者皆有矯焉故曰强哉矯若孔子集大成者也無矯也無弊也廣安㳺氏曰彊者强力也猶言堅强而不可變也喜怒哀樂者氣也治氣者心也治心者强也孟子之不動心本之以勇孔子論治心以爲中庸持之以强孟子之説蓋出於此前所言南北方之强君子有取於南而不取於北後所言和而不流中立而不倚以下主中國之强而言中國之性中和而厚重君子因其性以導之夫氣偏則不中氣偏則不和氣偏則傾傾則易動今中國之人其禀氣不偏不偏則中不偏則和不偏則厚重聖人因其中而道之以中庸之中使其中立而不倚因其和而道之以中和之和使之和而不流因其厚重而道之以守道不變之厚重所謂不變塞也塞猶實也詩曰秉心塞淵言其秉心深實也秉心實則心有所主矣夫以中國之强不剛不柔中和厚重而道之以君子之道於是乎不逐物而流不依物而倚不爲險易而變至中至正至精至純所守如此所立如此此其爲强所以爲壮大也易爲剛徤中正純粹其意同此范陽張氏曰南方北方與夫子路之强皆血氣也非中庸也然衽金革死而不厭謂之血氣之强可也寛柔以教不報無道君子居之是亦足矣乃謂血氣之强何哉蓋强當從戒謹不睹恐懼不聞中來則此强爲中庸之强若乃山川風氣使之如此而中無所得豈非血氣乎子路天資好勇其鼓琴流入北鄙其言志則曰軍旅此北方之强故曰而强者居之然則何以爲中庸之强曰和而不流此喜怒哀樂之中節也故其强矯然不撓中立不倚此喜怒哀樂未發時也故其强亦矯然不撓故其見用於有道之世不變於厄塞之節無道之世脅之以死亦不變其節其强皆矯然不撓夫不變者不流不倚之發也矯之爲言剛毅之貌非矯揉之矯也子路聞之得不悼其平時之無益而潛養之不可已乎延平黄氏曰南方陽明而主生有君子之道焉生則子民之仁明則君國之智北方隂險而主殺有强者之道焉君子之强而不强不足以名之者以其能强能弱也寛柔以教所謂能弱不報無道所謂能强衽金革死而不厭所謂能强而不能弱能强則不流能弱則不倚又曰富貴不能淫故國有道不變塞焉貧賤不能移威武不能屈故國無道至死不變永康陳氏曰子路問强夫子開端以啓發因强以明理所以變動子路之强也南方之强孟施舎以之北方之强北宫黝以之要之皆守氣也君子之强即曽子之大勇孟子浩然之氣此守約之理强哉矯有卓立氣象孟子所謂至大至剛蓋有見於此莆陽林氏曰孔門學問皆各從長技以入聖人之道如曽子之問孝子㳺之問禮顔子之問仁終身所問不過以其所長者此子路所以有問强之説也晏氏曰仲尼答子路以北方之强乃曰而强者居之則謂子路能勇而不能怯安於北方之强所以救其失也哀十五年蒯聵之難子路結纓而死則死而不厭驗矣國有道矣衆人皆逐於浮華君子矯之則篤於充實故曰不變塞焉國無道矣衆人皆有始而無終君子矯之則終始一節故曰至死不變焉此皆君子矯世以中庸之道非南北之强所能與也江陵項氏曰君子居之猶曰此君子之徒也而强者居之而汝也猶曰此汝之徒也同則流和則不流矣偏則倚中則不倚矣猶有不流不倚云者爲勉强者言之也斯二者言道之中也和者無過不及之中中立者不偏之中欲其强於知之也不流不倚盡矣猶有二不變云者亦爲勉强者言之也斯二者言道之庸也死生通塞變之大者能不爲死生通塞之所變則可謂庸矣欲其强於行之也舜聖人也故言其與人者顔子學者也故言其守身者子路困而學者也故言其矯揉氣質者孟子人告以有過章其次序亦如此晉陵錢氏曰南北之方土風不同其不知中庸則一然君子處南方之强而世之號爲强者乃處北方之强則所貴於强不在剛猛矯猶抑也哉疑辭也强哉矯猶言强其矯也君子於中庸知而行之非矯抑而然也塞實也國有道不變其實以趨時國無道不變其實以辟害此中庸之强非矯抑所能霅川倪氏曰衽者衣衿也金者鐵也革者皮也聨鐵而爲鎧甲被之於身如衣衿然故曰衽也南方之强言其稟於風土者然也子路恃血氣爲强耳非南方北方之强故孔子勸之抑也子路好勇是過强者不能以抑爲强故孔子曰暴虎憑河死而無悔者吾不與也所以抑之也其後死於衞國之難反爲傷勇非中庸也蔡氏曰此主勇而爲言也君子和而不流依乎庸也中立而不倚依乎中也君子依乎中庸不以得志不得志而或變變則失其所依而息矣仁壽李氏曰凡人和而不節或至於同流而合汙惟强者爲能和而不狥乎物中者本無所倚或至於力弱而易撓惟强者爲能獨立而不懼國有道而富貴或不能不改其平日之素惟强者不變於此身之通塞國無道而貧賤或不能久安乎義命之常惟强者終身不見是而無悶此非有𢎞毅之力堅決之見篤信天理盡克己私豈能守是四者而勿失然則所謂中庸之不可能者此也子曰素隱行怪後世有述焉吾弗爲之矣君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遯世不見知而不悔唯聖者能之鄭氏曰素讀如傃鄉也言方鄉辟害隱身而行詭譎以作後世之名身雖遯世而名欲彰也弗爲之矣恥之也廢猶罷止也弗能已矣汲汲行道不爲時人之隱行孔氏曰自此至察乎天地一節論夫子雖隱遯之世亦行中庸又明中庸之道起於匹夫匹婦終則徧於天地素隱行怪後世有述焉謂身雖隱遯而名欲彰也河南程氏曰素隱行怪是過者也半塗而廢是不及也不見知而不悔是中者也藍田吕氏曰此章論行之所以求乎中也素隱行怪未當行而行之行之過者也半塗而廢當行而不行行之不及者也素讀如傃郷之傃猶傃其位之素也君子之學方郷乎隱則隱而未見行而未成潛龍所以勿用也然其志嘐嘐然曰古之人古之人夷考其行而不掩則怪者也君子之學方遵道而行不勉則不中不思則不得進德修業所以欲及時也然莫之禦而不爲力非不足而畫焉則自已者也怪者君子之所不爲也己者君子之所不能也不爲其所太過不已其所不及此所以依乎中庸自信而不悔也依與違對者也依於仁則不違於仁依乎中庸則不可須臾離也聖人擇天下之善知天下之本不出乎中庸反之於心而悦行之於己而安考之於理而不謬合之先王而不違措之天下國家而可行則将自信而不疑獨立而不懼舉世非之而不悔非知道之至烏能及是哉建安㳺氏曰吾弗爲之處其實而遺其名也吾弗能己樂其内而忘其外也其用心若此則可以入中庸之道矣故繼言君子依乎中庸依之爲言無時而違也非至誠無息者不足以與此若三月不違仁未免於有所守也遯世不見知而不悔者疑慮不萌於心確乎其不可㧞也非離人而立於獨者不足以與此若不遠復者未免於有念也故曰惟聖者能之延平楊氏曰不以成德爲行而以詭異矜世則其流風足以敗常亂俗矣後世雖有述焉君子不爲也以道爲高疑若登天然則半塗而廢者蓋有之見其若大路然則行之者必至矣尚誰已之此顔淵之所以欲罷不能也依者對違之名依乎中庸則無違矣蓋不待擇而從容自中也君子之道造端乎夫婦豈有異於人哉循天下同然之理而已非小智自私者之所能知也知之其天乎人雖不知何悔之有非夫確乎其不可㧞者其孰能之新安朱氏曰案漢書素當作索此第十一章素隱行怪言深求隱辟之理而過爲詭異之行也然以其足以欺世而盗名故後世或有稱述之者此知之過而不擇乎善行之過而不用其中不當强而强者也聖人豈爲之哉遵道而行則能擇乎善矣半塗而廢則力之不足也此其知雖足以及之而行有不逮當强而不强者也已止也聖人於此非勉焉而不敢廢蓋至誠無息自有所不能止也不爲素隱行怪則依乎中庸而已不能半塗而廢是以遯世不見知而不悔也此中庸之成德知之盡仁之至不頼勇而裕如者正吾夫子之事而猶不自居也故曰惟聖者能之而已子思所引夫子之言以明首章之義者止此蓋此篇大㫖以知仁勇三逹德爲入道之門故於篇首即以大舜顔淵子路之事明之舜知也顔淵仁也子路勇也三者廢其一則無以造道而成德矣餘見第二十章或曰吕氏從鄭註以素爲傃固有未安惟其舊説有謂無德而隱爲素隱者於義略通又以遯世不見之語反之似亦有據但素字之義與後章素其位之素不應頓異則有若有可疑者獨漢書藝文志劉歆論神僊家流引此而以素爲索顔氏又釋之以爲求索隱暗之事則二字之義既明而與下文行怪二字語勢亦相類其説近是蓋當時所傳本猶未誤至鄭氏時乃失之耳㳺氏所謂離人而立於獨與夫未免有念云皆非儒者之語也涑水司馬氏曰素隱行怪謂處心發論務趣幽隱使人難知力行譎怪使人難及皆非中庸中庸貴於能久故孔子弗爲臨川王氏曰申屠負石赴河仲子辟兄離母是行怪也君子必遵中庸之道行之悠久不爲變易苟半途而廢非君子所爲也昔子貢謂孔子之道至大天下莫能容而請少貶焉公孫丑謂孟子宜若登天然使人不能幾及此二子者不知孔孟遵中庸之道而行之故反欲貶之也樊遲請學稼此蓋廢聖人之道欲學野夫之事故夫子鄙之長樂劉氏曰富貴貧賤天之命也非力之可求行道君子居夫貧賤而有悔則爲凡人矣居夫貧賤而無悔則爲聖人矣是悔也者凡聖人之閒也行道君子臨小利害一暫進退而弗利厥躬弗快已欲則悔心勃然而生焉不知夫中庸之道從之而失也不知聖人之德從之而遠也可謂知之乎然而仲尼之意不在乎是也樂之於悔參與商也内盡其性寂然無爲應乎萬變莫不適於其宜而未始有微動焉是與天地相似是與鬼神相通又何進退隱顯足以動其心故性得於内而樂不可勝其榮也情失於外而悔不可勝其辱也非仲尼之心乎兼山郭氏曰素以隱爲事而行怪焉過也半塗而廢卒自畫焉不及也海陵胡氏曰隱者非謂山林常住巢棲谷處之謂也韜藏其知不見於外之謂隱故論語稱寗武子之知邦無道則愚此所謂愚者韜光晦智若愚人然如此者非愚也蓋隱也凡人見有人才能在己下而爵禄居己上則必有怨心見有人才知在己下而名譽在己上則必有怨心此中知所不能免也故不見知而不悔者惟聖人能然易稱遯世無悶不見是而無悶故知惟聖人能之此既陳隱之道又恐人之輕於隱故再言君子隱遯之道延平周氏曰無功而禄謂之素飡則無德而隱謂之素隱修身以俟命謂之行法則不修身以逆命謂之行怪山隂陸氏曰此龍德也故惟聖者能之莆陽林氏曰隱者本非美事素隱者徒然隱也如長沮桀溺荷蓧丈人晨門之徒徃而不反故孔子以隱字目之以謂欲潔其身而亂大倫夫人之生便有五典之分若退居巖穴之下是無上下之分如此等人在國爲叛臣在家爲逆子伯夷叔齊或以爲隱者非隱者也夫子當時亦稱道之夫天生一人便要辦天下之事自上古以來作舟車為宫室闢田疇便有紀綱法度無非天工人其代之豈可徒隱行怪者爲怪異之行使後世之人學之廣安㳺氏曰學中庸者其病有二一則急於人知一則困而易悔惟君子能依乎中庸遯世不見知而不悔此非聖者不能也怪則詭譎詭譎則易以動人耳目藉此爲名使後世稱述學者之失多在於此若半塗而廢則用力已多而有困悔之心孔子曰力不足者中道而廢今女畫畫者止也止言不進也失於力之不足則又賢乎止而不進也孔子言彼則中道而止吾則弗能已也呉興沈氏曰先儒類以君子遵道而行之文屬半塗而廢君子依乎中庸之文屬遯世不見恐非通論嘗因文㑹理蓋夫子因言弗爲行怪釣名之事故以君子遵道而行斷之因言弗爲半塗而廢之事故以君子依乎中庸斷之是二者皆君子之事也至於時止則止時行則行動靜不失其時則聖人之事也故以惟聖者能之斷之則文順理明范陽張氏曰素隱行怪謂終身行乎隱晦而行怪以釣名永康陳氏曰君子於日用閒體認得實然不易之理如飲食之知味敬以守之異行必弗爲半塗必弗止依乎中庸與之俱也遯世不見知而不悔與之安也至乎此則聖人其曰惟聖者能之非絶人也直以爲聖人成能在日用間耳晏氏曰無德而素隱譎詭而行怪有聞其風而悦之者是之謂後世有述焉若人者常失之太過君子有所弗爲者欲其俯而就也遵道而行雖有好善之心半塗而廢俄有自怠之失若人者常失之不及君子弗能自已者欲其跂而及也既俯而就又跂而及所以能依乎中庸矣蓋有過行而遯世雖見知於世亦不能無悔惟依乎中庸而遯世者雖不見知於世亦無吝焉非聖人不能及此新安顧氏曰素空也聖人以仁天下爲心者也閔民物之不得其所未始一日而忘斯世方天之未欲平治天下也遯世無悶全其身所以全其道也彼其不離乎羣日用常行周旋於人倫之中雖曰不見知而不悔然而事久論定潛雖伏矣亦孔之昭其在人君易於知之亦易於求之道不難於行也天下庻其治乎彼偏曲之士遯跡山林去人也遠爲一身計則得矣如民物之不得其所何民物不得其所天下泯泯棼棼深山茂林亦何自而獲安晉陵錢氏曰自天下國家可均至此謂中庸之道在知而能行素猶固也固隱不仕又行奇怪之行人樂稱之故有述於後世吾弗爲之能知也半塗欲廢而不肯已能行也遯猶避也惟弗爲故依乎中庸惟弗已故雖避世人不見知而不悔然謂聖者能之蓋夫子之謙江陵項氏曰素隱行怪徒行而實未嘗知也半塗而廢徒知之而終不能行也君子依乎中庸則非徒行也遯世不見知而不悔則非徒知也故曰惟聖者能之上章既分知仁勇之三等此章復極言知行之難欲人盡其心也然又恐人謂其難故下章以所知所行之近反復言之霅川倪氏曰素者平素也言以隱居爲常而不知通變者也不知通變未害也而又行怪以求名則偽也後言素貧賤行乎貧賤以中庸之道行之故可也此乃素隱行怪怪則非中怪則非庸正背馳矣依與倚不同依者從也倚者偏也中立則可偏倚則不可注謂素爲傃是改經文以從其説朱氏援漢史爲證謂素爲索雖有所據亦不免改經文且探賾索隱易以爲聖人之學豈行怪者可言索隱乎蔡氏曰此再辨知仁勇而總結之索隱之知非君子之知行怪之行非君子之仁半塗而廢非君子之勇君子之知仁勇則依乎中庸遯世不見知而不悔者是也君子至此則其德與聖人同矣故以惟聖者結之林氏曰觀夫子以隱居放言爲我則異於是則知我弗爲之説觀夫子以今女畫責冉求則知我弗能已之説此章講明中庸之㫖首舉二者以開其端而後終之以聖人之能事蓋中者無過不及之名庸者常行之道素隱行怪過而反庸者也豈得爲庸半塗而廢安於不及者也豈足爲中是必依乎中庸則無過而反常之事是必遯世不見知而不悔則無安於不及之憂是理也非從容中道純亦不已孰能與此故曰惟聖者能之禮記集説卷一百二十六
