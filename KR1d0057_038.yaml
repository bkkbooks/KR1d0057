body:
  text: 禮記集説卷三十八宋衛湜撰律中大蔟鄭氏曰律候氣之管以銅為之中猶應也孟春氣至則大蔟之律應應謂吹灰也大蔟者林鍾之所生三分益一律長八寸凡律空圍九分周語曰大蔟所以金奏賛陽出滯孔氏曰上從其日甲乙下終其祀戸皆緫主三月一時之事此律中大蔟唯主正月之氣宜與東風解凍相連必在於此者角是春時之音律審正月之氣音由氣成以其音氣相須故律角同處言正月之時候氣飛灰應於大蔟其六律六吕皆是候氣管名陽管為律律法也言陽氣與隂氣為法隂管為吕吕助也言助陽宣氣又隂律稱同言與陽同也緫而言之隂陽皆稱律故十二月皆云律中也正月之時律之候氣應於太蔟之管又計大蔟管數倍而更半鑄之為鍾名曰大蔟之鍾是大蔟之鍾元生於大蔟之律律在於前鍾生於後故律厯志云黄帝使伶倫氏自大夏之西崑崙之隂取竹之嶰谷斷兩節間而吹之以為黄鍾之宫制十二筩以聼鳯凰之鳴雄鳴為六律雌鳴為六吕是律生在前蔡氏以為太蔟鍾名先有其鍾後有其律言律中此大蔟之鍾其義非也案司農註周禮云陽律以竹為管隂律以銅為管鄭康成則以皆用銅為管知者案律厯志量者龠合升斗斛本起黄鍾之龠而五量加之其法皆用銅聲中黄鍾以此準之故鄭知用銅也鄭註云應謂吹灰者蔡邕云以法為室三重戸閉塗釁必周密布緹縵室中以木為案毎律各一案内庳外高從其方位加律其上以葭灰實其端其月氣至則灰飛而管通如蔡所云則是為十二月律布室内十二辰若其月氣至則其辰之管灰飛而管空也然則十二律各當其辰邪埋地下入地處庳出地處高故云内庳外高黄鍾之管埋於子位上頭嚮南以外諸管推之可悉知又律云以河内葭莩為灰冝陽金門山竹為管熊氏曰案吹灰者謂作十二律管於室中四時位上埋之取蘆莩燒之作灰而實之律管中以羅縠覆之氣至則吹灰動縠矣小動為氣和大動為君弱臣强専政之應不動縠為君嚴猛之應也其十二律則有上生下生同位異位長短分寸之别故鄭註周禮大師職云其相生則以隂陽六體為之黄鍾初九也下生林鍾之初六林鍾又上生大蔟之九二大蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賔之九四蕤賔又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六同位者象夫妻異位者象子母所謂律取妻而吕生子也黄鍾長九寸其實一龠下生者三分去一上生者三分益一五下六上乃一終矣大吕長八寸二百四十三分寸之一百四大蔟長八寸夾鍾長七寸二千一百八十七分寸之千七十五姑洗長七寸九分寸之一中吕長六寸萬九千六百八十三分寸之萬二千九百七十四蕤賔長六寸八十一分寸之二十六林鍾長六寸夷則長五寸七百二十九分寸之四百五十一南吕長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十是也同位象夫妻者則黄鍾之初九下生林鍾之初六同是初位故為夫妻又是律娶妻也異位為子母者謂林鍾上生太蔟林鍾是初位大蔟是二位故云異位為子母又是吕生子也云五下者謂林鍾夷則南吕無射應鍾皆被子午已東之管三分減一而下生之六上者謂大吕大蔟夾鍾姑洗中吕蕤賔皆被子午已西之管三分益一而上生之子午皆屬上生應云七上而云六上者以黄鍾為諸律之首物莫之先似若無所稟生故不數黄鍾也其實十二律終於中吕還反歸黄鍾生於中吕三分益一大略得應黄鍾九寸之數也律厯志云黄鍾為天統林鍾為地統大蔟為人統故數整餘律則各有分數云凡律空圍九分者以黄鍾為諸律之首諸律雖長短有差其圍皆以九分為限孟康云林鍾長六寸圍六分則圍之大小逐管長短然則分寸之數不可定也引周語者景王欲鑄無射伶州鳩對以此辭案彼註云大蔟正聲商故為金奏所以助陽出滯物也其六律六吕取義見律厯志長樂陳氏曰律起於黄鍾終於中吕其長短有度其多寡有數其輕重有權而萬法之原畢㑹於是幽有以辨天地四時之理深有以通神祗祖考之情施之於教治足以齊風俗而立民信用之於戰伐足以審勝負而詔吉凶則律之為用豈不大哉夫黄鍾者建子之律也黄之為色則隂之盛鍾之為器則隂之聚隂盛而極則陽生之矣隂盛而止則陽散之矣由隂終於亥而陽乃始於子也故曰黄鍾大蔟者建寅之律也入乎坎者必出乎震否乎否者必泰乎泰寅之氣方接乎震泰而泰出滯焉故曰大蔟姑洗者建辰之律也物至辰則潔齊其潔齊也非實體也且然而已故謂之姑洗蕤賔者建午之律也陽至午則向衰也草木蕤矣隂用事而陽為賔焉故謂之蕤賔夷則者建申之律也人至申而夷物至申而有成則故謂之夷則無射者建戌之律也隂至戌而盛陽至戌而不厭故謂之無射此陽之律也陽道體變以始物故毎律異名隂道體常以效法故止於三鍾三吕而已大吕者建丑之律也是為隂律之始則隂之所以配陽而行者於是為大故曰大吕夾鍾者建卯之律也陽生於子終於午則卯為陽之中矣以其位於中而止焉故曰夾鍾中吕者建已之律也四時之序猶伯仲焉春為伯夏為仲方是時夏之氣始行焉故曰中吕林鍾者建未之律也萬物之繁茂止於此矣故曰林鍾南吕者建酉之律也酉正西也氣至南而化行於西而成西所以成南而行爾故曰南吕應鍾者建亥之律也始事者陽效法者隂陽始而唱之隂成而應之隂陽之道如是而止矣故曰應鍾周官大師掌六律六同以合隂陽之聲陽聲始之以黄鍾則順而序之以生之序進之也隂聲始之以大吕則逆而序之以成之序退之也夾鍾亦謂之圜鍾者以春主規言之也林鍾亦謂之函鍾者以坤含洪言之也中吕亦謂之小吕者對大吕為小故也南吕亦謂之南事者以成南為事故也别而言之則律言其用吕言其體故陽六為律隂六為吕合而言之皆所以述氣而已故通謂之十二律焉傳曰聲生於日律生於辰聲非十二律不能發律非五聲不能節五聲非變則不能盡故一律之中莫不具五聲五聲之中有所謂二變大司樂所序以圜鍾為宫黄鍾為角大蔟為徴姑洗為羽此律之相次者也函鍾為宫大蔟為角姑洗為徴南吕為羽此律之相生者也黄鍾為宫大吕為角大蔟為徴應鍾為羽此律之相合者也凡此合樂以祭天地人之神而已若非分樂則大司樂所謂奏黄鍾歌大吕以祀天神奏大蔟歌應鍾以祭地祗奏姑洗歌南吕以祀四望奏蕤賔歌函鍾以祭山川奏夷則歌小吕以享先妣奏無射歌夾鍾以祭先祖凡以其上者祭尊以其下者祭卑故也新安王氏曰蔡云上古聖人本隂陽則風聲審清濁而不可以文載口傳於是鑄金作鍾以正十二月之聲然後效升降之氣而鍾不可獨用乃截竹為管謂之律律者聲清濁之率法聲之清濁以率之短長為制正月之律清濁與大蔟鍾聲相應故曰律中大蔟言律出於鍾也置之深室以葭莩灰實其端月氣生則灰飛而管通古之明鍾律者以耳齊其聲後人不能則假數以為度度數正則音亦正鍾以斤兩尺寸中所容升斗之數以為法律亦以分寸大小為法故曰黄鍾之管長九寸孔徑三分圍九分餘皆稍短此所以文載口傳不如耳之明也如蔡說則鑄金為鍾名曰大蔟十二月皆有鍾先鑄鍾然後截竹為管名之曰律律之聲其清濁與鍾相應故曰律中大蔟鍾以為樂欲其聲之和管兼以候氣占其氣之和聲氣之和亦相合也自不韋有十二律上下相生之説而劉歆始言其詳班固作漢制鄭𤣥釋二禮韋昭注周語皆言律名大蔟不復以為鍾與蔡説異後世祖歆説無有言蔡説者然蔡説有理故詳著之也其數八鄭氏曰數者五行佐天地生物成物之次也易曰天一地二天三地四天五地六天七地八天九地十而五行自水始火次之木次之金次之土為後木生數三成數八但言八者舉其成數孔氏曰五行謂金木水火土案白虎通云行者言欲為天行氣也又云水訓準是平均法則之稱也言水在黄泉養物平均有準則也木觸也陽氣動躍觸地而出也火之為言化也陽氣用事萬物變化也金訓禁也言秋時萬物隂氣所禁止也土訓吐也言土居中總吐萬物也生物者謂木火七八之數也成物者謂金水九六之數也則春夏生物也秋冬成物也鄭引易上繋文也天陽地隂陽數竒隂數耦陽所以竒者陽為氣氣則渾沌為一無分别之象又為日日體常明無虧盈之異故其數奇其隂數所以耦者隂為形形則有彼此之殊又為月月則有晦朔之别故其數耦也案律厯志云天數二十五所以二十五者天一天三天五天七天九總為二十五律厯志又云地數三十所以三十者地二地四地六地八地十故三十也以天地之數相合則易之大衍之數五十五也云五行自水始火次之木次之金次之土為後者案尚書洪範云一曰水二曰火三曰木四曰金五曰土故其次如是也所以一曰水者乾貞於十一月子十一月一陽生故水數一也又天地之内水體最㣲故水為始也二曰火者坤貞於六月未六月兩隂生隂不敢當午火比於水嚴厲著見故次火也三曰木者正月三陽生是建寅之月故三曰木木比火象有體質故次木也四曰金者八月四隂生是建酉之月故四曰金金比木其體堅剛故次金也五曰土者三月五陽生三月建辰之月辰為土是四季之首土王四季故五曰土載四行又廣大故次土也水所以在北方者從盛隂之氣所以潤下者下從隂也火所以在南方者從盛陽之氣炎上者從陽也木所以在東方者東是半隂半陽曲直以隂陽俱有體質尚柔故可曲可直也金所以在西方者西方亦半隂半陽但物既成就體性堅剛雖可改革猶須火柔之土所以在中者以其包載四行含養萬物為萬物之主稼穡者所以養萬物也云木生數三成數八者鄭註易繫辭云天一生水於北地二生火於南天三生木於東地四生金於西天五生土於中陽無耦隂無配未得相成地六成水於北與天一并天七成火於南與地二并地八成木於東與天三并天九成金於西與地四并地十成土於中與天五并也大衍之數五十有五五行各氣并氣并而減五唯有五十以五十之數不可以為七八九六卜筮之占以用之故更減其一故四十有九也是鄭註之意水數一成數六火數二成數七木數三成數八金數四成數九土數五成數十故此云木生數三成數八云舉其成數者金木水火以成數為功也皇氏曰金木水火得土而成以水數一得土數五故六也火數二得土數五為成數七木數三得土數五為成數八又金數四得土數五為成數九此先儒之義其味酸其臭羶鄭氏曰木之味臭凡酸羶者皆屬焉孔氏曰通於鼻者謂之臭在口者謂之味臭則氣也所以木味酸者尚書孔傳云木實之性然則木實酸凡草木所生其氣羶也夏味苦臭焦者焦之氣味火燒物焦焦則味苦也中央味甘臭香者甘味生於百榖味甘則氣香也秋味辛臭腥者金之氣味言金臭之氣則腥在口則辛也冬味鹹臭朽者水鹵所生故味鹹又水受惡穢故有朽腐之氣並孔傳嚴陵方氏曰凡味皆隂也羶陽臭也春陽中故其臭羶腥隂臭也秋為隂中故其臭腥馬氏曰味生於形臭生於氣故形成而後有味氣化而後有臭春以陽中生木木之成形而曲直曲直作酸故其味酸物以木化則其氣為羶故其臭羶秋以隂中生金金之成形而從革從革作辛故其味辛物以金化則其氣為腥故其臭腥夏以陽極生火火之成形而炎上炎上作苦故其味苦物以火化則其氣為焦故其臭焦冬以隂極生水水之成形而潤下潤下作鹹故其味鹹物以水化則其氣為朽故其臭朽中央以隂陽之中氣生土土之成形而可以稼穯稼穡作甘故其味甘物以土化則其氣為香故其臭香土主四時而分王焉故五味也而皆以甘為主五臭也而皆以香為主則中氣之為用如此而已其祀户祭先脾鄭氏曰春陽氣出祀之於戸内陽也祀之先祭脾者春為陽中於藏直脾脾為尊凡祭五祀於廟用特牲有主有尸皆先設席於奥祀戸之禮南面設主於户内之西乃制脾及腎為俎奠於主北又設盛於俎西祭黍稷祭肉祭醴皆三祭肉脾一腎再既祭徹之更陳鼎俎設饌於筵前迎尸略如祭宗廟之儀孔氏曰戸在内從外向内戸又在内故云内陽也戸是人之出入戸則有神故祭法註七祀云小神居人間司察小過作譴告者故鄭云祀之於戸内陽也又秋其祀門註云秋隂氣出祀之於門者門在外從内向外門又在外故云外隂也則門神隂氣之神是隂陽别氣在門戸者與人作神也祭戸之時脾腎俱有但先用脾以祭耳所以春位當脾者牲立南首肺最在前而當夏腎最在後而當冬從冬稍前而當春從腎稍前而當脾故春位當脾從肺稍却而當心故中央主心從心稍却而當肝故秋位主肝此等直據牲之五藏而當春夏秋冬之位耳若其五行所生主五藏則不然矣許慎古尚書説脾木也肺火也心土也肝金也腎水也與月令四時之祭同鄭駁之云今醫病之法以肝為木心為火脾為土肺為金腎為水則有瘳若反其術不死為劇鄭註祭五祀於廟以下皆中霤禮文云祭五祀於廟者中霤在於廟室之中先設席於廟堂之奥若祀竈祀門祀行皆在廟門外先設席於廟門之奥雖廟室廟門有别總而言之皆謂之廟此殷禮也周則七祀加司命與厲也祀則總在宫内故宫正註云祭社稷七祀於宫中此特牲謂特牛故小司徒云小祭祀奉牛牲註云小祭祀王𤣥冕所祭若諸侯或亦當然其大夫所祭或特羊也鄭云有主有尸謂天子諸侯若卿大夫廟無主則五祀無主也祀之禮先設席於奥乃更設席於廟戸西夾北向置主位設主之人南面設主於戸西位上使主北面設主之後割制脾之與腎為俎奠於主前稍東設黍稷之簋在主前稍西鄭註盛謂黍稷也當時惟始設主未有迎尸則是祝官祭簋中黍稷祭俎中脾腎之肉祭薦之醴皆三度祭之其祭肉三者脾尊故一祭腎卑故再祭既祭黍稷祭肉醴之後徹去俎之與盛更陳列鼎俎設其饌食於初設奥之筵前其時主已移於筵上主人出戸迎尸尸入即筵而坐但宗廟之祭尸入之後始祭籩豆及黍稷醴其祭戸之時已於西祭黍祭肉祭醴今迎尸而入則應坐而饌食不更祭黍稷祭肉祭醴故云略如祭宗廟之儀祭戸所以先設席於奥乃設饌筵迎尸皆在奥者就尊之處也中間設主祭黍祭肉戸西者就戸處也其餘五祀所祭設主皆就其處也長樂陳氏曰門戸人之所資以出入者也中霤人之所資以居者也竈井人之所資以養者也先王之於五者不特報其所資而已以為事於是乎本制度於是乎興起居周旋於其間者莫不有所法語黙行為於其閒者莫不知所懼則五者之祀於人豈苟然哉中霤土之所用事也故祀於中央竈火之所用事也故祀之於夏井水之所用事也故祀之於冬戸祀於春以物象之生於陽而由中出故也門祀於秋以物象之成於隂而自外入故也先王之禮因天祀天因地祭地為髙必因丘陵為下必因川澤則戸竈中霤必因之以祀於内門井必因之以祀於外明矣周官以司命從天神而祀之以槱燎以五祀從地祇而祭之以血祭則司命非門竈之列矣然則五祀之禮其略盖類於饗廟神之則有尸尊之則有配有侑有醮有獻有酢詳見祭法七祀解嚴陵方氏曰戸奇而在内陽自内出之象也春生為陽出之時故其祀戸門耦而在外隂自外入之象也秋收為隂入之時故其祀門竈者物之所以化而夏之時則陽已極而隂於是化也故其祀竈行者人之所以往而冬之時則陽來復而隂於是往也故其祀行揚雄太𤣥淮南鴻烈皆以為夏火徳而祀竈冬水徳而祀井理或然也中霤盖中室也見檀弓掘中霤而浴解以居中而奠四隅故中央則其祀中霤五祀皆有功於人者也故立祀以報之而報之之時又各從其類焉於戸曰祀於脾曰祭何也盖戸者所祀之神脾者所祭之物脾土藏也五祀之祭必有牲焉特各以其藏為之先爾故每以先言之馬氏曰春祀戸秋祀門夏祀竈冬祀行中央祀中霤五祀無事而嵗祀之者以是為期若有故而祀焉則亦何嘗期之有木在臓為肝在志為怒故怒傷肝火在臓為心在志為喜故喜傷心土在臓為脾在志為思故思傷脾金在臓為肺在志為憂故憂傷肺水在臓為腎在志為恐故恐傷腎皆甚則自傷也木尅土故怒勝思金尅木故憂勝怒火尅金故喜勝憂土尅水故思勝恐此皆五行自然之理也五行勝者王則所遇勝者死先王各於其時養其所遇勝者也故春祭先脾為其木勝而養土也夏祭先肺為其火勝而養金也秋祭先肝為其金勝而養木也凡五行動而與物交則彼勝矣而此養焉至其静而辨於物於道為復於時為藏各反其本矣冬祭先腎為是故也土於氣為中也而主五行心於形為中也而主五官中央之祭先心為是故也山隂陸氏曰五祀戸之與門類也而木所以為戸金所以為門何也盖以五行之數言之木竒金耦也以五行之性言之木敷金斂也竒為戸耦為門戸主出門主入而内出者自戸始外入者自門始此木所以不得為門金所以不得為户也祭中霤設主於牖下者居處之明處也祭行設主於軷上者行之發處也祭竈設主於竈陘者飲食之受處也祭戸設主於戸内之西者開之止處也祭門設主於門左樞者閉之動處也古周禮說云犂為祝融祀以為竈馬融王肅宗之以為戸竈中霤門行之祭以句芒五官等配焉此言是也盖左氏云木正曰句芒火正曰祝融金正曰蓐收水正曰𤣥㝠土正曰后土生為上公死為貴神謂之五祀此古人之所未言而於事案之則然也又五天者五行之大神在天者也故先王於四時祭焉而以大皥五人帝配之五人帝天道也五祀者五行之小神在地者也故先王於四時祭焉而以句芒等五人官配之五人官地徳也此古人之所未言而於理考之則然也或曰句龍后土祀以為社矣更於中霤祭之何也曰古者句龍於國則配社於家則配中霤不以相廢猶后稷於郊則配天於社則配稷也或曰鄭氏謂竈祀於竈陘祝融者火官之長祭於竈陘一何陋也曰此又不然矣凡祭五祀於廟設主各以其所此降神之始也祭肉祭醴祭黍稷等物而已五官實不在焉既降矣自外入者中無主則不至故又設席各於其室之奥設饌然後迎尸則於是時始以祝融等配之鄭云設主於竈陘既祭徹之更陳鼎俎設饌於筵前迎尸略如祭宗廟之儀是也由是觀之竈陘戸内門左牖下軷上五處自設五祀之主祭以降神五官實未祭於陋何有也東風解凍蟄蟲始振魚上氷獺祭魚鴻鴈來鄭氏曰皆記時候也振動也夏小正正月啓蟄魚陟負冰漢始亦以驚蟄為正月中此時魚肥羙獺將食之先以祭也鴈自南方來將北反其居今月令鴻皆為候孔氏曰此記正月之時候也其二至二分之月則再記之者以二至是隂陽之始終二分是隂陽之交㑹節之大者故再記之季春亦記者蠶將生記其蠶候也凡記時候先言者則氣候在前後言者則氣候在後鄭引夏小正大戴禮篇名也蟄蟲得陽氣初始震動至二月乃大驚而出此對二月故云始振魚當盛寒之時伏於水下逐其温暖及正月陽氣既上故魚遊水上而近於冰也魚陟負冰者陟升也魚從水下升於冰上而負冰也漢時以驚蟄為正月中雨水為二月節漢末以雨水為正月中驚蟄為二月節是劉歆作三統厯時改之也案三統厯正月節立春雨水中二月節驚蟄春分中三月節榖雨清明中四月節立夏小滿中五月節芒種夏至中六月節小暑大暑中七月節立秋處暑中八月節白露秋分中九月節寒露霜降中十月節立冬小雪中十一月節大雪冬至中十二月節小寒大寒中案通卦驗及今厯唯以清明為三月節榖雨為三月中餘皆同謂之雨水者言雪散而為雨水也驚蟄者言蟄蟲驚而走出榖雨者言雨以生百榖清明言物生清浄明潔小滿言物長於此小得盈滿芒種者言有芒之榖可稼種小暑大暑則就極熱之中分為大小月初為小月半為大處暑言暑將退伏而潜處白露者言隂氣漸重露濃色白寒露者露氣寒將欲凝結小雪大雪小寒大寒猶小暑大暑也凡二十四氣氣有十五日有餘毎氣中半分之為四十八氣氣有七日半有餘故鄭註周禮云有四十八箭是一氣易一箭也凡二十四氣每三分之為七十二氣氣閒五日有餘故一年有七十二候也故通卦驗冬至前五日商賈不行兵甲伏匿是以五日為一候也又云立春雨水降條風至雉雊雞乳冰觧條風即東風也冰觧即解凍也但節氣早或月初即雨水也雉雊雞乳於月令却在季冬或節氣晚亦得退在正月也季冬雁北鄉據其從南始北正月來至中國故此云鴻雁來云今月令吕氏春秋是也入禮記為古不入禮記為今長樂陳氏曰劉歆三統厯二十四氣有與月令不同者盖月令或原其始或要其終其實記時而已非必如厯之詳也考諸傳記五日為候三候為氣六氣為四時四時為歳歳之氣二十有四而候七十有二然則一月之内六候二氣朔氣常在前中氣常在後朔氣在晦則後月閏中氣在朔則前月閏朔氣有入前月而中氣常在是月中數周則為歳朔數周則為年則年不必具四時而歳必具十二月也二十四氣播於十二月之中一氣十有五度則二十四氣三百六十度其餘五度四分度之一度分為三十二則五度為百六十四分度之一又為八分總百六十八分布於二十四氣之中而氣得七分中朔大小不齊則氣有十六日者有十五日七分者是以三十三月已後中氣有晦不置閏則中氣入後月矣嚴陵方氏曰夫凍結於重隂堅栗之時東風盖發散之氣也東風既觧凍則物之藏於密者咸起而振潜於深者咸躍而上矣故繼之以蟄蟲始振魚上冰也馬氏曰厯有數璣衡有象所以正時也月之氣二十有四歳之候七十有二所以記時物也先王因其時物以授民時此民之聼所以不惑而易知也天子居青陽左个乗鸞路駕倉龍載青旂衣青衣服倉玉食麥與羊其器疏以達鄭氏曰皆所以順時氣也青陽左个大寢東堂北偏鸞路有虞氏之車有鸞和之節而飾之以青取其名耳春言鸞冬夏言色互文馬八尺以上為龍几所服玉謂冠飾及所佩者之衡璜也麥實有孚甲屬木羊火畜也時尚寒食之以安性也器疏者刻鏤之象物當貫土而出也凡此車馬衣服皆所取於殷時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時為異又玉藻曰天子龍衮以祭𤣥端而朝日皮弁以日視朝與此皆殊孔氏曰此已前明天時氣候早晚此明天子毎時居處及所乗車馬所建旌旂所服衣玉所食牲榖及器用之屬龍與玉言倉者蒼亦青也逺望則蒼旂與衣云青者欲見人功所為故以近色言之色則順時食與器則順氣也青陽左个是明堂北偏而鄭註云大寝者欲明明堂與大廟大寢制同故兼明於明堂聼朔竟次還大廟次還大寢也然鄭云東堂則知聼朔皆堂不於五角之室中也鸞路因其有鸞故不言青春言鸞則夏秋冬並鸞也夏云朱冬云𤣥則春青秋白可知云馬八尺以上為龍出廋人職文云所服玉謂冠飾及所佩者之衡璜者冠飾即冕之旒及笄也衡璜即是所佩玉之名也案韓詩外傳云佩玉上有葱衡下有雙璜牙蠙珠以納其閒則古之佩玉上以葱為衡横置於上以貫珠之䋲三條懸於衡上垂之而下以雙衡懸於兩畔䋲之下端又以牙懸於中䋲下端使前後觸璜以為聲衡之下璜之上皆貫蠙珠故云納其閒謂納於衡璜之閒也麥實有孚甲屬木黍秀舒散屬火麻實有文理屬金菽實孚甲堅合屬水稷五榖之長屬土是五榖所配之方也云羊火畜者案尚書五行傳貌之不恭則有雞禍言之不從則有犬禍視之不明則有羊禍聼之不聰則有豕禍思之不睿則有牛禍皇之不極則有馬禍是雞為木畜羊為火畜牛為土畜犬為金畜豕為水畜春時尚寒故食火畜以助之夏食菽與雞者以氣猶熱水能尅火木能抑土故食北方之榖與東方之牲以減其熱氣亦以安性也秋氣既涼又將向寒不有其害故食當方之榖牲也冬氣極寒故食火榖以減寒寒勝於熱故食當方之牲云器疏者刻鏤之象物當貫土而出者刻鏤為文使文理麤䟽直而通達也虞夏之制有日月星辰十二章之服周之制朝則皮弁服祀則六冕服戎則韋弁服田獵冠弁服又周禮朝乘象路祀乗玉路戎乘革路獵乘木路是車服各以其事不以四時為異今此上與虞夏有異下與周禮不同故鄭云取殷時也殷乗木路此乘鸞路故鄭云而有變焉殷而乘虞路也嚴陵方氏曰青陽者少陽之稱也春為少陽故所居之堂名之然其堂也中有大廟左右个處其兩傍故孟月居左季月居右仲月居中各從其類焉謂之大廟則以其大饗於此故也謂之左个則以介於左故也謂之右个則以介於右故也推此則秋與冬夏亦若是而已總章者隂成之稱也赤白為章者文之成秋成之時其章總矣故所居之堂其名以此明者南之方𤣥者北之色夏為明堂則知冬之為幽冬為𤣥堂則知夏之為朱或言方或言色互相備也故夏則居眀堂冬則居𤣥堂焉至若大廟為左右个之中大室又為大廟之中故中央土居之古者非特明堂中有大廟也而大廟亦謂之明堂焉左氏傳所謂不登於明堂是也以其或饗神於此故謂之廟以其或聼政於此故謂之堂廟堂之名皆得以通稱之故天子則聼朔於眀堂諸侯則聼朔於大廟而魯之大廟則比天子明堂之制焉个即左氏傳所謂置饋於个是也釋者謂東西廂鸞路則有聲矣聲者陽也春為陽之純故乗鸞路戎路則有兵矣兵者隂也秋為隂之純故乗戎路夏為朱明故乗朱路謂飾之以朱也冬為𤣥㝠故乗𤣥路謂飾之以𤣥也中央土則居中以為大者也故乗大路必於青曰龍者以少陽之時龍方用事故也四時所建其色有五通謂之五旂者人君以是率衆皆有辨故也君子於玉比徳非徒為飾而已故特言服焉春從木色而有青有蒼冬從水色而有黒有𤣥夏從火色而有朱有赤者盖蒼與𤣥天之色也青與黒人之色也夏從火色而有朱有赤其一流焉則為赤其一藏焉則為朱故也以其色之不一故衣服所用則互相足焉至於西方則純以白中央則純以黄者以其無餘色故也四時所食不同唯其時物而已春木王之時而食麥與羊是時之所生也以麥火榖而羊火畜故也夏火王之時而食雞者是物之所生也以雞木畜故也秋金王之時而食麻冬水王之時而食黍是時之所勝以麻木榖而黍火榖故也夏食菽者是物之所勝以菽水榖故也中央土則食稷與牛秋食犬冬食彘是時物之類以稷土榖牛土畜犬金畜彘水畜故也夫以所生者所以相繼以所勝者所以相治以其類者所以相合故能使四時之氣不戾五藏之疾不生焉雞司晨而有東方之仁故為木畜羊跪乳而有南方之禮故為火畜犬守禦而有西方之義故為金畜豕發隠而有北方之智故為水畜牛致順於牽傍以示信故為土畜馬服節於馳騁以合禮故亦為火畜小宗伯毛六牲使五官共奉之者以此膳夫固言凡王之饋膳用六牲然馬非至尊之所宜食則冝以魚牲代之故大司馬饗食羞牲魚􅘋人以魚共膳羞食醫會膳食之冝言魚冝苽而不及馬以此至尊不食而又以備六牲者以或用以祭故也校人大喪飾遣車之馬及葬埋之凡將有事于四海山川則飾黄駒是矣用之以沈貍則固非食之矣然内饔辨腥臊羶香之不可食者則曰馬黒脊而般臂螻則非若是者容或食之特至尊不食之耳食醫又言鴈冝麥不及雞内饔又言鳥皫色而沙鳴貍者盖鴈亦雞類言鳥固可以兼二物則至尊之膳亦不常用雞矣故雞人雖用雞牲而不正言膳羞腥膏止以為秋膳而掌畜則共膳獻之鳥王氏謂燕食有魚鳥之膳盖言是矣若夫六榖之所配則取其色而已菽具五色止以為水榖者以黒菽特大故也春主發散故其器疏以逹盖疏則散達則發故也夏主長大故其器高以粗盖高則長粗則大故也秋主刻制故其器廉以深盖廉則制深則刻故也冬主受藏故其器閎以奄盖閎則受奄則藏故也中央土其器圜以閎者圜若物由是以周旋閎若物由是以出入萬物周旋於土者也故中央之器所象如此江陵項氏曰黍稷雖同類然稷冝在山黍冝澤傍之高地其受氣固不同也稷専受土氣故中央之月食稷與牛皆土類也黍兼受水氣故冬之三月食黍與彘皆水類也麥自苗至實皆在春時故春三月食麥與羊菽自種至實皆在夏時故夏三月食菽與雞孟秋嘗稷仲秋嘗麻季秋嘗稻獨食犬與麻者秋三月百榖皆成獨取其中氣者食之也獨春羊夏雞與周禮春官奉雞夏官奉羊相反者彼取官事之冝此以氣類分也案易巽為雞離為雉則雞主夏氣為冝大壮二月卦夬三月卦皆取羊為象意者羊本春類而成於兌耶當考馬氏曰明堂王者之堂也王者向明而治故周人謂其堂曰明堂而此曰春居青陽夏居明堂秋居總章冬居𤣥堂又列為大廟左右个以配十有二月為大室以配中央則非古也古者天子之車以玉路祀以金路賔以象路朝以革路即戎以木路田而此曰春乗鸞路夏乘朱路中央乘大路秋乘戎路冬乗𤣥路則非古也古者天子之馬六種凡有十二閑曰種曰戎曰齊曰道曰田曰駑朝祭毛之軍旅物之而此曰春駕倉龍夏駕赤駵中央駕黄駵秋駕白駱冬駕鐵驪則非古也古者天子之旂大常象天大旂象春大赤象夏大白象秋大麾象冬以五路序而載焉其道車則載旞其斿車則載旌而此曰春載青旂夏載赤旂中央載黄旂秋載白旂冬載𤣥旂則非古也古者天子之服祀昊天五帝以大裘享先王以衮享先公饗射以鷩祀四望山川以毳祭社稷五祀以希祭羣小祀以𤣥六服異章而𤣥衣纁裳也而此曰春衣青夏衣赤中央衣黄秋衣白冬衣黒則非古也古者天子之玉搢則大圭執則鎮圭佩之衡璜琚瑀皆白玉也冕斿弁之􅋒皆五色也而此曰春服倉玉夏服赤玉中央服黄玉秋服白玉冬服𤣥玉則非古也古者天子之膳春以牛膏養脾夏以犬膏養肺秋以雞膏養肝冬以羊膏養心而膳食牛冝稌羊冝黍豕冝稷犬冝梁而此曰春食麥與羊夏食菽與雞中央食稷與牛秋食麻與犬冬食黍與彘則非古也古者天子之器方圜多少髙下廣深皆有度數而義存乎其間以義制器則既有多矣何可易哉而此曰春疏以達夏髙以粗中央圜以閎秋亷以深冬閎以奄則非古也古者周人以玉作六器禮天地四方而牲幣各放其色豈後儒因是以曼衍而為此説乎或者吕不韋將以是始作秦制而不克用乎意先王所以順四時而奉天者盖有道矣豈敝敝焉於車旂器服之閒為哉廬陵胡氏曰車馬衣服鄭謂皆取於殷時非周制也案殷乘木路此鸞路則明堂位云有虞氏之車也則車非殷矣檀弓殷人乗翰白馬也無言殷蒼龍者則馬非殷矣以周言之詩有鸞聲噦噦則周有鸞車也廋人云馬八尺以上曰龍則周馬曰龍也推此則鄭説非矣服玉謂冕旒及笄并佩玉也器䟽若筐筥篚籩之屬象氣發散禮記集説卷三十八
