body:
  text: 禮記集說卷六十七宋衛湜撰鼎俎竒而籩豆偶隂陽之義也黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌於中而清明於外也鄭氏曰牲陽也庶物隂也黃目黃彛也周所造於諸侯為上也孔氏曰案宗伯云以天産作隂德注云天産者動物謂六牲之屬動物故為陽也庶物雖出於牲體雜以植物相和非復牲之全體故為隂也黃彝以黃金鏤其外以為目因取名也貯鬱鬯酒故云鬱氣也祭祀時列之最在諸尊之上故云上也黃是中方色目是氣之清明者也酒在尊中而可斟酌示人君慮於祭事必斟酌盡於中也目在尊外而有清明示人君行祭必外盡清明潔淨也案明堂位云周以黃目是周所造也天子則黃彝之上有雞彝鳥彝備前代之器諸侯但有黃彝故云於諸侯為上也長樂陳氏曰先王制器或逺取諸物或近取諸身其取之也有義其用之也以類雞鳥虎蜼之彝取諸物也斚耳黃目取諸身也嚴陵方氏曰以金目為飾故謂之黃目以實鬱鬯而貴臭故曰鬱氣之上尊而謂之尊者以居其所而贊者從者有尊之義故也司尊彝掌六尊六彝之位而黃彝處其四此乃言上尊者以尊時之所上而已目之精水也其光火也以水為體故其氣清以火為用故其氣明玉藻言視容清明是已是以詩云瑟彼玉瓚黃流在中鬱在中而以瓚酌之蓋酌於中也直達於外焉蓋清明於外也夫孝子將祭虛中以治之此非酌於中之義乎至於不御內不聽樂不飲酒不茹葷此非清明於外之義乎延平周氏曰司尊彝之職秋嘗冬蒸祼用斚彝黃彝黃彝即黃目鬱氣之上尊也蓋萬物之於冬則反於土而復於本反於土則終矣故飾用黃此坤所以至於上六始曰天𤣥而地黃復於本則可以自見故飾用目此復所以小而辨於物然周禮謂之彛此謂之尊何也蓋以彝對尊則彝為常尊為變以尊對彝則尊為尊彝為卑及離而言之則尊與彝一也山隂陸氏曰黃目龜目也氣之清明者也於斚彝為上據此司尊彝尊先大彝先小祭天掃地而祭焉於其質而已矣醯醢之美而煎鹽之尚貴天産也割刀之用而鸞刀之貴貴其義也聲和而后斷也孔氏曰此所論亦尚質反貴天産及聲和之義餘物皆人功和合為之鹽則天産自然故云貴天産也煎者煎此自然之鹽鍊治之也設之於醯醢之上故云尚割刀之用必用鸞刀貴其聲和之義取其鸞鈴之聲宫商調和而後斷割其肉也嚴陵方氏曰鹽非煎以鍊治之則不成故謂之煎鹽天官鹽人之所掌祭祀共其苦鹽散鹽然醯人醢人所共未嘗不以祭祀為主則醯醢之美祭祀非不用也特非其所尚爾夫刀能制斷莫非義也獨鸞貴其義者貴其義之和而已長樂陳氏曰何休曰鸞刀宗廟割切之刀環有和鈴有鸞考之詩禮曰和鸞雍雍曰登車聞和鸞之聲有鸞必有和鸞在前和在後詩有言鸞鑣有言八鸞則和可知有言和鈴則鸞可知然則何休言鸞刀之制蓋有所授耳夫和非斷則牽斷非和則劌故天以秋肅物而和之以兌聖人以義制物而和之以仁鸞刀以和濟割亦此意也易曰利物足以和義禮書冠義始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也鄭氏曰始冠三加先加緇布冠也大古無飾非時人緌也雜記曰大白緇布之冠不緌大白即大古白布冠今喪冠也齊則緇之者鬼神尚幽暗也唐虞以上曰大古冠而敝之此重古而冠之耳三代改制齊冠不復用以白布冠質以為喪冠孔氏曰自此至治天下也一節總明尊卑加冠因明官爵及禮義之意此總論初冠之義以儀禮有士冠禮此說其義故云冠義下篇有燕義昏義與此同大古之時其冠唯用白布常所冠也若其齊戒則染之為緇今始冠重古故先冠之也古禮布冠不合有緌而後世加緌故記者云其緌也引孔子之言謂未聞緇布冠有緌之事冠而敝之者言緇布冠初加暫用冠之罷冠則敝棄之可也以其古之齊冠後世不復用也下云三王共皮辨素積故鄭注云唐虞以上曰大古與易之大古别也案皇氏曰鄭云雜記緇布冠無緌而玉藻云緇布冠繢緌者此經所論謂大夫士故緇布冠無緌諸侯則位尊盡飾故有緌也延平周氏曰齊則緇之以幽思也末世緇布冠加之以緌孔子以為吾未之聞然非天子不議禮雖孔子亦不得不從當世之所尚則冠之加緌雖非禮但冠而棄之可也故曰冠而敝之可也蓋敝有棄意嚴陵方氏曰緇布之冠大古尚質而未聞有緌末世寖文乃加緌爾玉藻言緇布冠繢緌者兼末世言之也孔子未嘗聞其緌者指盛世言之也馬氏曰冠者禮之始而嘉事之重者也其數見於士冠禮於此則言其義也故曰冠義緌者冠之飾山隂陸氏曰據此有兩冠義冠禮亦取此篇然則後所謂冠義又其後人拾其餘也適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也鄭氏曰阼者東序少此近主位也每加而有成人之道成人則益尊醮於客位尊之也三加者始加緇布冠次皮辨次爵辨冠益尊則志益大也冠而字之者重以未成人之時呼之孔氏曰案士冠禮冠者在主人之少北是近主位也其庶子則冠於房户外南面客位謂户牖之間南面此謂適子若夏殷醮用酒每一加則一醮於客位周則用醴三加畢乃一醮於客位其庶子則皆醮於房户外也三加者曉喻冠者之志意令益大也初加緇布冠欲其尚質重古次加皮辨欲其行三王之德後加爵辨欲其行敬事神明是志益大案冠禮既冠見母畢立於西階東南面賔東面字之曰伯某甫是冠而字之也難未成人之時呼其名故以字代之鄭注重難也嚴陵方氏曰冠者成人之服阼者主人之階成人則將代父而為之主故冠於阼以著代著則所以明之也醮則以酒澤之也每一加則一醮蓋酒所以饗賔客之物故醮於客位冠於阼則是以主道期之也醮於客位則是以賔禮崇之也以其有成人之道故以是禮加之故曰加有成也然緇布之粗不若皮辨之精皮辨之質不若爵辨之文故曰三加彌尊服彌尊則志宜彌大故曰喻其志也以冠禮考之非特冠彌尊而衣也屨也亦彌尊非特衣屨彌尊至於祝辭醮辭亦然所以喻其志則一而已延平周氏曰皮辨天子視朝之皮辨也爵辨天子戎事之韋辨也皮辨之色白白則喻其自潔而有所受韋辨之色赤赤則天道下降於南方之色而喻其將出而與物酬酢也以視朝之服而對於戎事之服戎事為大故曰三加彌尊喻其志也然士之冠而用天子之辨服可乎夫冠昏人道之大先王欲重其禮雖士之賤亦不嫌與天子同服故始冠而用爵辨其猶始昏而用角枕歟詩曰角枕粲兮蓋言新昏者也而周官玉府於王之喪則共角枕此所以知先王欲重其禮故雖士之微亦不嫌與天子同服也山隂陸氏曰此記適子有故而醮若無故有冠醴無冠醮士冠禮是也醴禮簡醮禮繁醮用酒醴用醴醴在房內醮在房外醴脯醢而已醮有折俎新安朱氏曰此本無適子字加有成也在彌尊字下冠而下有己字敬其名作成人之道蓋傳誦之訛也委貌周道也章甫殷道也母追夏后氏之道也周辨殷冔夏收三王共皮辨素積鄭氏曰委貌章甫母追常所服以行道之冠也或謂委貌為𤣥冠也周辨殷冔夏收齊所服而祭也三王共皮辨素積不易於先代孔氏曰三代常服之冠俱用緇布而其形自殊周為委貌之形殷則為章甫之形夏則為母追之形委安也言所以安正容貌章明也殷質言所以表明丈夫母發聲追猶堆也夏后氏質以其形名之鄭注行道謂養老燕飲燕居之服若視朝行道則皮辨也此云委貌儀禮記稱𤣥冠故鄭云委貌或為𤣥冠也鄭注冠禮記云辨名出於槃槃大也言所以自光大冔名出於憮幠覆也言所以自覆飾也收言所以收斂髮也其制之異亦未聞皮辨素積以其質素故三王同服無所改易嚴陵方氏曰委貌章甫母追即初加之緇布冠是矣辨冔收即三加之爵辨是矣皮辨素積即再加之皮辨是矣周尚文故曰委貌周道也皮辨則以白鹿皮為之素積則以素為裳言裳則衣可知裳必疉幅故謂之積揚雄所謂襞幅為裳是矣服其服將以行是道故每以道言之延平周氏曰委貌章甫冔收命以意母追與辨命以形三代不同者所以趣時也皮辨素積三代共之者立本也蓋反辨素積上古之服馬氏曰始加三加皆不同而再加之冠則三王共之者其義各有所主也若其制則未之聞闕之可也無大夫冠禮而有其昏禮古者五十而后爵何大夫冠禮之有諸侯之有冠禮夏之末造也鄭氏曰言年五十乃爵為大夫也其有昏禮或改取也夏初以上諸侯雖有幼而即位者猶以士禮冠之亦五十乃爵命也至衰末未成人者多見篡弒乃更即位則爵命之以正君臣而有諸侯之冠禮孔氏曰二十而冠五十而爵為大夫故無大夫冠禮然四十强而仕亦應無士冠禮而云有者立禮悉用士為正所以五等並依士禮冠子也若試為大夫者亦用士禮故鄭注冠禮記云周之禮年未五十而有賢才者試以大夫之事猶服士服行士禮也三十而昏五十乃為大夫亦應無大夫昏禮而云有者是改取也諸侯之有冠禮夏之末造者言夏初以前諸侯未有冠禮與士冠同夏末以來諸侯有冠禮與士禮異故大戴禮有公冠篇加𤣥冕為四加也此經直明諸侯不云天子又下云天子之元子猶與士同則天子與士異也然則天子冠禮其來已久但無文以言之玉藻云𤣥冠朱組纓天子之冠也鄭注云始冠之冠是天子别有冠禮賈氏曰案喪服大夫為兄弟之長殤降服小功鄭云謂為士若不仕者明其或亦為大夫則不為殤而降也蓋小記云丈夫冠而不為殤此兄殤者既有德行年未二十而得為大夫則是大夫亦不以二十而始冠也儀禮疏新安朱氏曰引喪服之文見大夫而有兄殤又其兄若為大夫則不降服則知其身與兄皆未二十矣是不必五十乃為大夫也蓋其得為大夫之時已治成人之事或已因喪而冠如家語所說人君之例故不待二十而冠也賈意當是如此然則亦為繼世為大大夫者言耳非謂以賢才而選者也石林葉氏曰自此至德之殺也見於儀禮士冠禮之末其文前後相錯自鄭氏以來不能了故學者至今惑之此専為士冠禮言也諸侯天子無焉所以儀禮擊於本篇之末天下無生而貴者謂天子之元子與大夫之子也後世有未冠而為大夫者故言以官爵人德之殺也諸侯天子君薨雖未冠必即位則生而貴矣不可與士比故言繼世以立諸侯象賢也舉諸侯則天子可知一加而冠緇布再加而冠皮辨三加而冠爵辨士服也然後謂之士此天子元子與大夫之子所同者也男子二十而冠大夫五十而後爵蓋未有大夫而始冠者此大夫所以無冠禮也諸侯天子既冠而即位固已同於士禮矣未冠而即位則既為諸侯天子何緇布皮辨爵辨之云則冠禮無復施安得復有公侯之冠禮此所以為夏之末造也鄭氏謂諸侯雖父死年未及五十亦服士服行士禮五十乃命古禮雖不可盡見然天子諸侯固未嘗以年斷審如其說不幸有未冠而立立未及五十而死則終身不得為諸侯天子乎此理之必不然者也嚴陵方氏曰古者諸侯無冠禮蓋天子之元子猶士也况諸侯乎皆用士冠禮而已父在則為士父歿則代為君以彼年未冠而父歿者不可以居諸侯之位而用士禮故至夏末有諸侯冠禮然則諸侯之有冠禮為未冠而父沒者造之也延平周氏曰冠不再昏不一故大夫無冠禮而有昏禮天子之元子其禮猶止於士而已何諸侯冠禮之有特夏之末造也然自夏以降不特諸侯有冠禮而已蓋天子之元子諸侯之世子皆用士之冠禮果元子世子之年未及冠而天子崩諸侯薨則元子世子亦有君道而復用士禮可乎故玉藻云𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也蓋言此也天子之元子士也天下無生而貴者也繼世以立諸侯象賢也以官爵人德之殺也鄭氏曰儲君副主猶云士也明人有賢行著德乃得貴也繼世以立諸侯象賢者子孫常能法其先父德行也以官爵人德之殺言德益厚爵益尊也孔氏曰繼世以立諸侯此釋夏末以來有諸侯冠禮之意以官爵人德之殺也明所以無大夫冠義也言官爵之授隨德隆殺也大夫以上雖以德授爵猶無冠禮士又德薄而無爵也講義曰謂天下無生而貴者欲其修德以繼統之意也嚴陵方氏曰嗣諸侯者有冠禮嗣大夫則無之者蓋諸侯繼世以立大夫以官爵之而不繼世故也諸侯必繼世以立所以象賢大夫不繼世為其德之殺也延平周氏曰繼世以立諸侯象其祖考之賢也官有尊卑德有大小故以官爵人則德之殺也新安朱氏曰自繼世以立諸侯至死無諡此蓋老子不尚賢貴因任之意言上古之時民各推其賢者奉以為君沒則復奉其子以繼之其後遂以為諸侯然其子之立也但象似其賢而已非故擇賢而立之也至於中古乃在上者擇人任官而為之爵等此則德之等殺不及上古之時矣乃至於周而有諡法則生而有爵者死又加諡此則又其殺也上古人自立君故生無爵中古未有諡法故雖有爵而無諡又以申言古今之變也新安王氏曰天子之元子士也此文繫冠禮下夫天子元子冠同於士其餘與士不同雖君儲副有君父在上故冠用士禮所謂無生而貴者也象法象也父祖之賢子孫能法象之故使之雖未冠南面君國是以諸侯别有冠禮也爵言命為大夫也視諸侯德有殺故冠惟士禮與諸侯不同此言大夫所以無冠禮也死而諡今也古者生無爵死無諡鄭氏曰古謂殷以前也大夫以上乃謂之爵死有諡也周制爵及命士雖及之猶不諡耳今記時死則諡之非禮也孔氏曰此一經明士禮此是士冠禮記之文以士為主古謂殷以前士生時爵不及死不制諡山隂陸氏曰古謂周時生無爵蒙上文以官爵人則大夫以上乃謂之爵今記時死則諡之案檀弓士之有誄自魯莊公始也則作此記者魯莊之後人歟延平周氏曰諡者行之迹故古者生而有爵則死乃請諡於天子而天子命之諡後世但死則皆有諡蓋未嘗請諡於天子特其自諡耳故曰死而諡今也新安朱氏說見前禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而敬守之天子之所以治天下也鄭氏曰禮所以尊尊其有義也政之要盡於禮之義此知其義所以治天下也孔氏曰此經因上論冠義下論昏義故因上起下於中說重禮之義不解禮之義理是失其義唯知布列籩豆是陳其數其事輕故云祝史之事籩豆事物之數淺易可布陳禮之義理深逺難知聖人能知其義理而恭敬守之所以治天下也橫渠張氏曰今人之祭但致其事生之禮陳其數而已其於接鬼神之道則未也祭祀之禮所總者博其理甚深今人所知者其數猶不足又安能達聖人致祭之義嚴陵方氏曰經曰鼎俎竒而籩豆偶隂陽之義也所謂竒偶者其數也隂陽者其義也能守其義然後有以制禮能陳其數止可與行禮故祭統曰明其義者君也能其事者臣也數在外故可陳義在內故難知然知之矣而或不能守守之矣而或不能敬則亦未免失其義焉又何以治天下哉中庸曰明乎郊社之禮禘嘗之義治國其如示諸掌乎正謂是矣延平周氏曰禮之所以為禮者禮之義也而其禮之為禮者禮之數也禮之所尊尊其義而非尊其數而已也為祝史者特知其數耳其數則禮之文而已故可知其義則莫非性命之理故難知果知其義則聖矣天子所以治天下也馬氏曰有數有義然後足以為禮數者義之寓義者數之意而其重猶在於意也先王為禮未嘗不寓之以微妙之意知其義則舉而錯之天下無難矣山隂陸氏曰孔子所謂知其說者之於天下也其如示諸斯乎延平黃氏曰失其義陳其數祝史之事也後世之言禮者猶陳其數焉新安朱氏曰此蓋秦火之前典籍具備之時之語固為至論然非得其數則其義亦不可得而知矣况今亡逸之餘數之存者不能什一則尤不可以為祝史之事而忽之也天地合而后萬物興焉夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆告之以直信信事人也信婦德也一與之齊終身不改故夫死不嫁鄭氏曰天地合而后萬物興焉目禮之義也取於異姓謂同姓則多相褻也誠信也腆猶善也直猶正也直信二者所以教婦也事人事猶立也齊謂共牢而食同尊卑也齊或為醮孔氏曰自此至人之序也論聖人重昏禮之事天氣下降地氣上騰天地合配則萬物生焉若夫婦合配則子𦙍生焉此與下昏禮為目取異姓者所以依附相疏逺之道厚重分别之義也幣帛必須誠信使可裁制勿令虛濫賔之𫝊辭無自謙退云幣不善不詐飾也昏禮記云辭無不腆皮帛必可制鄭注云賔不稱幣不善是也所以幣必信辭必直欲告戒婦人以正直誠信也信事人者婦人立身之道非信不立信婦德者貞信是婦人之德橫渠張氏曰以義禮言則婦死不當再娶夫死不當再嫁當其初娶時便期以終身豈復有再嫁之事禽獸猶有不再匹者男子正為無嗣承祭祀之重猶可再娶雖再娶尚謂之繼室婦人則雖至窮餓而死不可也介甫直謂婦人得再嫁豈有是理今於祭祀凡再娶者其配並列於人情未安古者人君自元妃而下姪娣媵御不復再娶元妃死則繼室攝內事自卿大夫以下有冉娶之文亦必大不得已蓋其始昏固未嘗有約至於再也不奈何為承家為祭祀之義大故再娶也生而再娶於情固未安葬而同坎則䙝尤甚滋不可也祔葬祔祭極至理而論之止當祔一夫婦之道是夫止合一娶婦止合一嫁今婦人夫死而不可再嫁如天地之大義然則夫豈得而再娶特以重者計之養親承家祭祀繼續不可廢也故有再娶之理然其葬其祔雖為同穴同筵几譬之人情一室之中豈容二妻故以義斷之唯祔以首娶繼室别在一所乃安又非如姪娣彼自是妾與適葬者異竁而殊封是衛人之祔也離之必也一穴而異坎為安石林葉氏曰宗子雖七十無無主婦非宗子雖無主婦可也此非特贊祭祀凡大宗之統其親者亦不可無也然則婦人得再嫁乎據此理則婦未有二夫者也然喪服父卒繼母嫁從為之服報𫝊曰何以期貴終也則繼母有再嫁之道矣然必有故焉周官媒氏仲春之月令㑹男女無故不用令者罰之繼言司男女之無夫家者鄭氏謂故如鰥寡者衛世子共伯蚤死其妻姜氏父母欲奪而嫁之共姜守義誓而弗許作柏舟詩以自見孔子取焉則不再嫁者婦人之義也有不得已而不得不嫁者君子亦通之也嚴陵方氏曰天地合萬物興昏禮之合二姓蓋本於此有夫婦然後有父子父子所以𫝊世故曰昏禮萬世之始必娶異姓所以附逺不取同姓所以厚别且於逺不附則人情無以通於别不厚則人道無以辨昏姻者所以通人情而辨人道而已幣所以將昏姻之意辭所以通昏姻之情幣必誠者無飾其意以僞也辭無不腆者無致其情以曲也辭無致其曲則告之以直故也幣無飾以僞則告之以信故也故繼言告之以直信以事人者必以信而婦人以事人為事故信為婦德也上兼言直而下不言直者蓋信而無僞則直在其中矣不改謂不改而他適也以其不可改故雖夫死不嫁延平周氏曰昏之以禮而告之以信信則無可變之道故夫死不嫁然有不能以自存者夫死而嫁可也此共姜之父母欲奪而嫁詩人有柏舟之興蓋柏雖可以為舟特非舟之所宜共姜雖可以嫁特非共姜之所冝以共姜有可以自存之道也馬氏曰易曰天地絪緼萬物化醇男女構精萬物化生與此同意幣者所以將其昏姻之意辭者所以道其昏姻之情幣以將意則不可以不誠辭以道情則不可以不腆腆之言厚也君子無所不用其誠與厚至於昏禮則尢甚焉故曰幣必誠辭無不腆婦人事人者也事人必以信故體信以為德然後可以事人也詩曰懿厥哲婦為梟為鴟婦有長舌維厲之階言無信也一與之齊則榮辱貧賤休戚惟所遇而不擇焉故終身不改山隂陸氏曰此一節至昏禮不賀亦昏義也而言昏禮男子制義禮婦人之事也據冠義始冠緇布之冠也士冠禮記冠義昏禮記昏義以此不腆辭也凡謙詞稱不腆今辭不云不腆告之以直信也據聘禮主人曰不腆句先君之祧既拚以俟矣春秋𫝊曰不腆句敝器不足辭也又曰不腆句先君之敝器使下臣致諸執事以為瑞節告之以直信者直告之以信而已故曰信事人也信婦德也昏禮父命之曰戒之敬之夙夜無違命母曰勉之敬之夙夜無違宫事所謂告之以直信也若信而有從違則有義存焉非直信而已然非婦事易曰婦人貞吉從一而終也夫子制義從婦凶也男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也鄭氏曰先謂倡道也馬氏曰男子親迎而男先於女者剛先於柔之意也豈獨昏姻之際如此至於天地君臣其義一也天則造始而地則代終君主乎倡而臣主乎和山隂陸氏曰陽唱而隂不和男行而女不隨是矣執摯以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道也鄭氏曰摯所奠鴈言不敢相褻也人倫有别則氣性醇禽獸言聚麀之亂類也孔氏曰章明也壻親迎入門而先奠鴈然後與婦相見是先行敬以明夫婦禮有分别不妄交親嚴陵方氏曰壻先奠鴈乃與婦相見所以敬章其有别之道章則所以明之表記曰無辭不相接也無禮不相見也欲民之母相䙝也正謂是矣男女有别則夫婦之道成夫婦之道成然後可以𫝊世故有父子之親焉上言父子親則知下言義生者謂君臣也君臣之義上下之分而已故義生然後禮作禮作則上不逼下下不僭上故萬物安也其序與繫辭所言合凡此所言不過有别有義而已人之所以異於禽獸者其以是歟禽獸有牝牡之合而無內外之别有生育之愛而無上下之義故曰無别無義禽獸之道也馬氏曰摰者交接之際所以致敬人之私䙝莫甚於袵席之上男女之際不可不正故執摰相見所以敬章别也父子相親出於天性自然而曰男女有别然後父子親何也蓋男女無别於內則夫婦之道喪而淫辟之罪多雖父子之親亦不可得而親之也男女有别然後父子有相親之恩父子有相親之恩則必有相親之義故義生焉非特父子之親如此推而至於朋友兄弟君臣上下之際皆有義則燦然有文以相接故曰義生然後禮作禮作而貴賤有等上下有分此萬物所以安也自父子相親推而至於萬物安皆起於男女有别則袵席之上不可以不戒也哀公問政孔子曰夫婦别父子親君臣嚴三者正則庶物從之矣與此同意延平周氏曰始於男女有别而終至乎萬物安者非禮之妙孰能與此山隂陸氏曰章讀如章物之章春秋𫝊曰男摰大者玉帛小者禽鳥以章物也壻親御授綏親之也親之也者親之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始也婦人從人者也幼從父兄嫁從夫夫死從子夫也者夫也夫也者以知帥人者也鄭氏曰親之也者親之也言己親之所以使之親己先王若太王文王出乎大門而先者車居前也從謂順其教令夫之言丈夫也夫或為傅孔氏曰案昏禮婦降自西階壻親御婦車授綏是壻親御授綏也壻御婦車授綏欲親愛於婦令婦之親已也嚴陵方氏曰親御授綏固所以親之然必親迎親御亦所以敬之也敬所以為義親所以為仁先王之所以得天下者仁義而已馬氏曰婦人女子近之則不遜故不可以不敬之逺之則怨故不可以不親之敬之者禮也親之者仁也愛與敬先王之所以御婦之道也二女嬪于虞文王刑于寡妻至于兄弟以御于家邦此先王所以得天下也夫主於義故有所帥無所從婦主於聽故有所從無所帥夫婦之道其大概不出於此故出乎大門而先男帥女女從男夫婦之端基之於此也婦者恆其德者也有三從之義無一違之禮故幼從父兄嫁從夫夫死從子夫者制義者也制人而不制於人故曰知帥人者也知帥人則非所謂不恆其德而從婦凶也延平周氏曰夫者以知帥人者也而夫夫亦謂之夫者大夫以知帥人之大者也然夫人亦謂之夫何也夫人謂之夫猶后妃謂之后蓋后乃命其夫人以下者而夫人乃帥其九嬪以下者山隂陸氏曰壻親迎親御授綏咸卦是也出乎大門而先男帥女女從男恆卦是也講義曰夫敬而親之先王雖得天下之道不外乎是蓋齊家治國平天下實出乎一道詩大序所謂正始之道王化之基是矣盱江李氏曰婦人從人者也從之斯尊之矣卑其夫未有能從夫也夫弱於外婦强於內下上其心而莫之制何所弗及哉舉天下而漸其風亂矣王化之存者幾何是故婦人於天家不可不使之盡禮也𤣥冕齊戒鬼神隂陽也將以為社稷主為先祖後而可以不致敬乎共牢而食同尊卑也故婦人無爵從夫之爵坐以夫之齒鄭氏曰𤣥冕祭服也隂陽謂夫婦也爵謂夫命為大夫則妻為命婦孔氏曰廣陳敬事也𤣥冕助祭服五冕色俱𤣥故總稱𤣥冕用助祭之服齊戒自整敕而親迎是敬此夫婦之道如事鬼神故云鬼神隂陽也妻為內主故有國者是為社稷內主也嚴陵方氏曰以交鬼神之道而施諸隂陽之配固所以致敬也社稷主者夫為主於外婦為主於內故也此則主有土者言之先祖後者有夫有婦然後可以𫝊世而後其先也此則通天下言之牢謂牲牢也先王以牢禮為之等尊卑異焉而夫婦之禮則共牢而食者示同尊卑夫尊則婦亦尊夫卑則婦亦卑故曰同尊卑尊卑同故爵齒亦從夫而已以爵齒各有尊卑故也玉藻曰君命屈狄再命禕衣一命䄠衣士褖衣是從夫之爵也大𫝊曰其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也是從夫之齒也延平周氏曰𤣥冕事鬼神之服也齊戒將以事鬼神者故昏禮而用𤣥冕齊戒者所以鬼神其隂陽之配也婦人無爵而周官內宗則內女之有爵者外宗則外女之有爵者何也內女之夫即王子弟而外女之夫即公卿大夫則其所謂有爵亦從夫之爵也馬氏曰𤣥冕齊戒祭之重者也以祭之所重而用於昏姻之際則明其重也哀公曰冕而親迎不已重乎是也山隂陸氏曰鬼神隂陽神明之也神明之也者不可同於所安䙝之甚也器用陶匏尚禮然也三王作牢用陶匏厥明婦盥饋舅姑卒食婦餕餘私之也舅姑降自西階婦降自阼階授之室也鄭氏曰陶匏大古之禮器也大古無共牢之禮三王之世作之而用大古之器重夫婦之始也私之猶言恩也授之室明當為家事之主也孔氏曰共牢之時俎以外其器但用陶匏陶是無飾之物匏非人功所為乃貴尚古禮之自然也厥其也厥明謂共牢之明日也明日婦乃盥饋特豚舅姑食竟以餘食賜婦食餘曰餕此示舅姑相恩私之義案昏禮既昏之後夙興贊見婦于舅姑婦執笲棗栗奠于舅席又執腵修奠于姑席贊者醴婦婦受醴畢舅姑共席于奧婦盥饋特豚卒食一酳婦即席餕姑之餘卒食姑酳之此士禮也降自阼階授之室者謂適婦也婦餕餘禮畢舅姑從賔階而下婦從主階而降是示授室與婦之義也延平周氏曰陶匏祭天地之器而用於昏者尚禮之至也凡為人子者居不處奧行不中道立不中門者以其有父在也至於冠禮則冠於阼階而昏禮又婦降自阼階何也先王欲隆冠昏之禮而不嫌於無父是以有斯須之敬也嚴陵方氏曰盥謂盥手所以致其潔饋謂特豚所以致其養以舅姑之尊而降自賔階以婦之卑而降自主人之階者示授之室而為之主男以女為室故以室主之山隂陸氏曰器用陶匏禮之近人情者非其至者也三王作牢用陶匏言三代所不變也冠禮著代而已此授之室昏禮不用樂幽隂之義也樂陽氣也昏禮不賀人之序也鄭氏曰幽深也欲使婦深思其義不以陽散之也序猶代也孔氏曰不用樂者使其婦深思隂靜之義以修婦道陽是動散用樂則令婦人志意動散也河南程氏曰昏禮不用樂幽隂之義此說非是昏禮豈是幽隂但古人重此大禮嚴肅其事不用樂也昏禮不賀人之序也此則得之嚴陵方氏曰昏姻之禮在子則有代父之序在婦則有代姑之序所以不賀則一也孔子曰取婦之家三日不舉樂思嗣親也彼言思嗣親此言幽隂之義者蓋有所思者固欲其幽隂也經云齊之𤣥也以隂幽思也是矣然曲禮言賀取妻賀其有客而已故其辭曰聞子有客使某羞延平周氏曰冠必至於昏昏必至於代父者人之序也以其序將至於代父則哀之可也故不賀馬氏曰三十而娶人之次序所當然也故不賀山隂陸氏曰昏禮不用樂幽隂之義所謂晦時以此昏禮不賀人之序也昏禮執雁豈亦以此歟長樂陳氏曰樂由陽來而聲為陽氣禮由隂作而昏為隂義故周官大司徒以隂禮教親則民不怨然則昏之為禮其隂禮歟古之制禮者不以吉禮干凶禮不以陽事干隂事則昏禮不用樂幽隂之義也昔裴嘉有昏㑹酒中而樂作薛方士非之可謂知其義矣樂書有虞氏之祭也尚用氣血腥爓祭用氣也殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也鄭氏曰尚用氣尚謂先薦之爓或為䐲滌蕩猶搖動也孔氏曰自此至篇末總論祭祀之事尚謂貴尚鄭注云先薦者對合亨饋孰為先也血謂祭初以血詔神於室腥謂朝踐薦腥肉於堂爓謂沈肉於湯次腥亦薦於堂祭義云爓祭祭腥而退是也今於堂以血腥爓三者而祭並未孰是用氣也帝王革異殷不尚氣而尚聲謂先奏樂也不言夏或從虞也臭味未成謂未殺牲也殷尚聲故未殺牲先搖動樂聲以求神也闋止也奏樂三遍止乃迎牲入殺鬼神在天地之間故用樂之音聲號呼告於天地之間庶神明聞之是求陽之義也嚴陵方氏曰血腥爓三者皆氣而已未嘗致味故曰祭用氣也然爓之氣不若腥之全腥之氣不若血之幽故其序如此殷人尚聲者以其自樂始故也臭未成以其未用鬯故也味未成以其未用牲故也樂之有聲蓋出於虛滌蕩之則存乎其人而已樂三闋者以陽成於三故也三闋則樂成矣然後出迎牲所以為尚聲歟聲者樂之象音者聲之文聲音之號雖以求陽為先然詔告於天地之間則凡在隂陽之間者無不求也馬氏曰有虞氏之意以為鬼神之所享在於敬而不在於味敬之所至則味有所遺故祭以血腥為始記曰血祭盛氣也又曰郊血大饗腥三獻爓一獻孰皆不敢用褻味而貴氣也有虞氏之祭尚氣殷人從而文之故尚聲樂由陽來則凡聲皆陽也蓋人之死也魂氣歸於天非求諸陽不足以報其魂也殷人尚聲所以迎其魂之來也臭味未成滌蕩其聲樂三闋然後出迎牲此舉其尚聲之時也聲音之號所以詔告於天地之間此舉其尚聲之意也鬼神處於天地之間而不可度聲音之號所以詔告之而已延平周氏曰有虞氏尚氣殷人尚聲周人尚臭者皆以宗廟之祭言之也至於天地之祭則天以升煙為主地以薦血為主者百王之所不易也所謂尚氣者凡血告於室腥爓薦於堂有虞氏則血與腥爓皆以為祭是故為尚氣也所謂尚聲者先作樂以求諸陽然後迎牲所謂尚臭者先灌以求諸隂然後迎牲然則有虞氏之尚氣者亦求諸隂陽之間而已矣山隂陸氏曰有虞氏尚氣殷人尚聲周人尚臭後王彌文氣目事也聲耳事也是鼻事也味口事也血幽而未明腥明而未著爓溫而未孰有虞氏尚氣未有臭味殷人尚聲有臭味而未成滌其聲使清蕩其聲使濁長樂陳氏曰凡聲陽也商人之祭先求諸陽而已商頌那祀成湯也樂之所依者磬聲其名樂以瞽宗則主以樂教瞽之所宗皆尚聲之意也蓋日三成朏月三成時歲三成閏然則樂不三闋何以成樂哉今夫禮減而進以進為文樂盈而反以反為文滌蕩其聲則盈矣必繼以三闋者以反為文也樂三闋則減矣然後出迎牲者以進為文也然明則有禮樂幽則有鬼神鬼者歸也歸之以從地神者申也申之以從天詔告鬼神於天地之間捨聲音之號何以哉又曰那詩庸鼓有斁萬舞有奕曰庸鼓鐘鼓之大者也萬舞舞之大者也商之作樂在湯則奏鼓簡簡大矣而未備在湯孫則嘒嘒管聲備其細以成大此經言尚聲豈不以樂之大然邪並樂書金華應氏曰祭祀之禮帝王所同而必别言之者隨其所尚各有所先也戛擊鳴球祖考來格虞非不尚樂也而商樂視舜則愈備猗那之詩可考也厥作祼將常服黼冔商非不尚祼也而周祼視商則愈重旱麓受祖之詩可見矣虞氏近古祭未窮味猶有茹毛飲血之意也殷愈尊鬼嚴於求神樂闋至三而後迎牲滌蕩者澡除洗雪於塵埃之境播散發越於虛無之中使無一毫之隔礙也聲音之號者以聲音而號召之若以言語而詔告之天地之間虛曠洞達無不響答周樂九變兼用六代視商愈備而納牲必俟灌鬯之後故曰獻莫重於祼聲莫重於升歌舞莫重於武宿夜是祼尤在於瞽歌舞武之先也禮記集說卷六十七
