body:
  text: 禮記集説卷八十三宋衛湜撰哭朋友者於門外之右南面鄭氏曰變於有親者也門外寢門外孔氏曰此一經論哭朋友之處右西邊也南面嚮南為主以對荅弔客檀弓云朋友吾哭諸寢門之外祔葬者不筮宅士大夫不得祔於諸侯祔於諸祖父之為士大夫者其妻祔於諸祖姑妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆諸侯不得祔於天子天子諸侯大夫可以祔於士鄭氏曰宅葬地祔葬不筮前人葬既筮之也士大夫謂公子公孫為士大夫者不得祔於諸侯卑别也既卒哭各就其先君為祖者兄弟之廟而祔之中猶閒也孔氏曰此一節論貴賤祔祭之義此謂祔祭也禮孫死祔祖今祖為諸侯孫為士大夫而死則不得祔祖謂祖貴宜自卑逺也諸祖祖之兄弟也既不祔祖當祔祖之兄弟為大夫士者夫既不得祔祖妻亦不得祔於祖姑而可祔於諸祖姑也諸祖姑是夫之諸祖父兄弟為士大夫者之妻也若祖無兄弟亦祔䟽族不為諸侯者然上云士易牲祔於大夫而大夫不得易牲祔於諸侯者諸侯之貴絶宗故大夫士不得輕親也妾死亦祔夫祖之妾亡無也夫祖無妾則又間曽祖而祔髙祖之妾也祔必昭穆同曽祖非夫同列故祔髙祖也妾無廟為壇祔之耳諸侯不袝於天子亦謂祔祭卑孫不可祔於尊祖也天子諸侯大夫可以祔於士者祖賤孫貴祔之不嫌也若不祔之則是自尊卑於祖也嚴陵方氏曰祔葬與祔廟皆謂之祔者以後死祔前而神事之則一故也凡祔以廟為正葬則如之而已故言祔廟則不言廟言祔葬則必言葬者以葬非正故特明言以别之也馬氏曰士之於大夫皆人臣也位皆人臣則雖有貴賤而其𫝑亦有可幾之道是故進而祔之可也天子諸侯則君矣尊無上貴無倫而其𫝑不可幾也進而祔之則君臣亂矣茍無所祔則祔於諸侯祖父之為士大夫者而不敢祔於諸侯所以明君臣之義也為母之君母母卒則不服鄭氏曰母之君母外祖適母徒從也所從亡則已孔氏曰此一節論不責恩所不及之事母之君母母之適母也此親於子為輕故徒從也己母若在母為之服已則服之己母若亡則已不服母之君母矣宗子母在為妻􅎭鄭氏曰宗子之妻尊也孔氏曰此一節論宗子妻尊得為妻伸􅎭之事宗子為百世不遷之宗也賀氏曰父在適子為妻不杖不杖則不􅎭若父沒母存則為妻得杖又得􅎭凡適子皆然嫌畏宗子尊厭其妻故特云宗子母在為妻􅎭宗子尚然則其餘適子母在為妻􅎭可知横渠張氏曰喪之有􅎭何也所以致厚也三年之喪其􅎭者所以欲占及三年也齊衰之喪􅎭者所以欲占及二年也宗子母在為妻􅎭則庶子母在不為妻􅎭以其不承重不敢致厚於妻子也庶子在父之宫則為其母不􅎭以厭降也宗子而為其妻禫以承其重所以敬宗也自命士以上父子皆異宫適士其庶子異宫皆為母􅎭矣為慈母後者為庶母可也為祖庶母可也鄭氏曰謂父命之為子母者也父之妾無子者亦可命已庶子為後孔氏曰此一節論為庶母後之事喪服有慈母如母傳曰妾之無子者妾子之無母者父命為子母而子服此慈母三年此即為慈母後之義也記者見喪服有此例故觸類言之謂妾經有子而子已死者餘他妾多子則父命他妾之子為無子之妾立後與為慈母後同也故云為庶母後可也又觸類言之謂祖庶母乃己父之妾亦經有子子死故已命己之妾子與父妾為後故呼己父之妾為祖庶母亦服之三年如己母必知妾經有子者若無子則不得立後故也山隂陸氏曰為庶母為祖庶母為讀去聲言為後慈母者為庶母服為祖庶母服可也喪服傳云士為庶母緦大夫以上為庶母無服其後慈母者為之服歟為父母妻長子禫鄭氏曰目所為􅎭者也孔氏曰此一經鄭云目所為􅎭者此一人而已然慈母亦宜􅎭也而下有庶子在父之室為其母不􅎭則在父室為慈母亦不􅎭也故不言之妻為夫亦􅎭但記文不具慈母與妾母不世祭也鄭氏曰以其非正春秋傳曰於子祭於孫止孔氏曰此一經論禮有不合世祭之事祭慈母即所謂承庶母祖庶母後者也妾母謂庶子自為其母也既非其正故唯子祭之而孫則否鄭引春秋傳見穀梁隠五年明不得世祭也金華應氏曰慈母一時之恩易世可以無祭若妾母為所生則子孫皆其所自出而不世祭之可乎以上文為庶母為祖庶母之後觀之或者妾母若此之類然此更當隨宜精審未易以一概言也丈夫冠而不為殤婦人笄而不為殤為殤後者以其服服之鄭氏曰冠笄言成人也婦人許嫁而笄未許嫁與丈夫同也言為殤後者據承之也殤無為人父之道以本親之服服之孔氏曰此一經論宗子殤死族人不得以父道為後之事為殤後者謂大宗子在殤中而死族人為後大宗而不得後此殤者為子也以其父無殤義故也既不後殤而宗不可絶今來為後殤者之人不以殤者之為父而依兄弟之服服此殤也既不與殤為子則不應云為後今言為後故鄭謂據己承其處為言也云以本親之服服者當在未後之前不復追服不責人以非時之恩故推此時本親兄弟亡在未後之前者亦宜終其本服之日月唯為後及所後如有母亡而猶在三年之内則宜接其餘服不可以吉居凶若出三年則不追服矣山隂陸氏曰不言男子女子言丈夫婦人則以冠宜有丈夫之道笄宜有婦徳故也自童汪踦觀之冠而無丈夫之道笄而無婦人之徳雖以為殤可也久而不葬者唯主喪者不除其餘以麻終月數者除喪則已鄭氏曰其餘謂旁親也以麻終月數不𦵏者喪不變也孔氏曰此一節論久而不葬不變服之事久而不葬謂有事礙則三年服皆不得祥除今云惟主喪者廣説子為父妻為夫臣為君孫為祖得為喪主悉不除也其餘謂朞以下至緦也主人既未𦵏諸親不得變葛仍猶服麻各自服限竟而除不待主人葬除也然此皆藏之雖緦亦藏至葬則反服其服是也案盧氏曰其下子孫皆不除也以主喪為正爾餘親者以麻冬終其月數除矣庾氏曰案服問曰君所主夫人妻大子適婦此以尊主卑無縁以卑之未葬而使尊者長服衰絰也是知主喪不除惟於承重之身孫為祖子為父臣為君妻為夫此之不除也劉氏曰注謂旁親不指言衆子當除也父謂衆子為庶子庶子不謂父為庶父也父得卑其庶子而降之庶子不得降其父也然子之於親體同服等非旁親之謂也喪服大功章女子之嫁者降伯叔父母及昆姊妹注謂此旁親而經無降父之文明衆子及女雖不承適猶非旁親也然則未葬而除自謂旁親得以麻終者耳晉劉世明見通典山隂陸氏曰言以麻終月數則朞不在此列據為兄弟既除喪已及其葬也反服其服兄弟朞也反服其服邪非不除亦非除喪則已除喪則已於葬不反服也箭笄終喪三年鄭氏曰亦於喪所以自卷持者有除無變孔氏曰此一經論婦人以箭笄終喪之事前云惡笄終喪女子為母也此云箭笄女在室為父也嚴陵方氏曰在室者服父以箭笄則出嫁者服篠笄矣篠正作篠前言惡笄以為母言之故知其為榛爾然以封玉之美言之則箭篠通謂之惡亦可也服母則一以榛服父則有箭篠之辨者盖父懐敬而不可無節母懐愛而不可不同故也杖有竹有桐亦以是而已山隂陸氏曰箭笄重矣據齊衰惡笄以終喪箭笄猶苴杖惡笄猶削杖齊衰三月與大功同者繩屨鄭氏曰雖尊卑異於恩有可同也孔氏曰此一經論尊卑屨同之事大功以上同名重服與齊衰三月可同繩屨謂以麻繩為屨齊衰為尊大功為卑三月為恩輕九月恩稍重所以衰服殊而為恩情處為淺深所以同其屨也練筮日筮尸視濯皆要絰杖繩屨有司告具而後去杖筮日筮尸有司告事畢而后杖拜送賔大祥吉服而筮尸鄭氏曰臨事去杖敬也濯謂溉祭器也凡變除者必服其吉服以即祭事不以凶臨吉也間傳曰大祥素縞麻衣孔氏曰此一經論練祥筮日筮尸視濯之時所著衣服也練為小祥也筮日謂筮小祥之日筮尸亦筮小祥之尸視濯謂視洗濯小祥之祭器喪至小祥男子除首絰唯有要絰病尚深故猶有杖屨是末服變為繩麻將欲小祥豫著小祥之服臨此筮日筮尸視濯三事此三事悉是為祭祭欲吉故豫服也不言衰與冠者亦同小祥矣有司謂執事者曏者變服猶杖今有司既告三事辦具將欲臨事故孝子去杖敬生故也有司告事畢而后杖拜送賔者筮日與尸二事皆有賔來曏當臨事時去杖今筮占事畢則孝子更執杖以送賔視濯輕而無賔故不言也吉服朝服也大祥之日縞冠朝服亦豫服以臨筮尸不言日及濯從小祥可知大祥則去絰杖屨故不云杖絰屨鄭引間傳者以大祥之後著素縞麻衣此云吉服則非祥後之服是朝服也故引以證之新安朱氏曰古者喪服始死至終喪漸漸變去不似今人服滿頓除便衣華采庶子在父之室則為其母不􅎭庶子不以杖即位父不主庶子之喪則孫以杖即位可也父在庶子為妻以杖即位可也鄭氏曰庶子為母不􅎭妾子父在厭也不以杖即位下適子也位朝夕哭位也孫以杖即位祖不厭孫孫得伸也父在庶子為妻以杖即位舅不主妾之喪子得伸也孔氏曰此一節論庶子父在應杖及不應杖之節庶子在父之室為其母不􅎭謂不命之士父子同宫者也若異宫則􅎭之庶子不以杖即位謂適庶俱有父母之喪也適子得執杖進阼階哭位庶子至中門外而去之下適子也父不主庶子喪則孫以杖即位者父主適子喪有杖適子子以祖為其父主故辟尊不敢俱以杖即位今此父不主庶子喪故庶子子則得杖即位祖雖尊貴不厭孫也父在庶子為妻以杖即位者舅主適婦則適子不得杖舅不主庶婦故庶子得為妻以杖即位也父主妻喪故主適婦所以適子不杖父既不主妾喪故不主庶婦所以庶子得杖若妻次子既非正嗣故亦同妾子之限也山隂陸氏曰􅎭服之細也雖奪之可在父之室謂未娶者也即已娶雖同宫猶禫庶子無厭有降若父為長子杖其子不以杖即位是厭也非降也父雖不主庶子之喪孫猶不以杖即位作此記者見適孫有厭今祖不與因欲縁情許之故曰可也下父在庶子為妻亦蒙上蓋父不主庶子之喪則雖父在庶子為妻以杖即位可也其曰可也則不以杖即位亦可諸侯弔於異國之臣則其君為主諸侯弔必皮弁錫衰所弔雖已葬主人必免主人未喪服則君亦不錫衰鄭氏曰君為之主弔臣恩為己也子不敢當主中庭北面哭不拜必免者尊人君為之變也未喪服未成服也既殯成服孔氏曰此一節明諸侯弔喪衣服之節君無弔他臣之禮若來在此國遇主國之臣喪為彼君而弔故主君代其臣之子為主弔必皮弁錫衰者有二種一謂此弔異國臣若自弔己臣則素弁環絰錫衰也一云此亦為自弔己臣而未當事則皮弁錫衰至當事乃弁絰耳檀弓已論主人必免者諸侯來弔主人必為之重禮凡五服大功以上為重重服自始死至葬為免卒哭後乃不復免也小功以下為輕輕服自始死至殯為免殯後不復免至葬啓殯後而免以至卒哭如始死今若人君來弔雖非服免時必為免以尊人君故也此經必免謂大功以上故下親者皆免鄭註云大功以上也案士喪禮君弔主人中庭拜稽顙成踊彼為主人為主故中庭拜今鄰國君弔君為之主拜賔則主人不拜曽子問稱季桓子之喪衛君來弔魯君為主季康子拜而稽顙故譏其喪有二主嚴陵方氏曰諸侯弔異國之臣則其君為主者賔主欲其位相敵故也周官司服眡朝則皮弁服凡喪王為三公六卿錫衰弔以皮弁則取其素而已以錫衰則王服三公六卿之服而弔異國之臣亦唯其稱也錫盖麻之滑易者山隂陸氏曰據此凡諸侯弔皆皮弁錫衰言必者著諸侯弔無内外皆當如此然則天子弔服與諸侯異歟天子重絰諸侯重衰天子弔服皮弁加環絰諸侯弔服皮弁錫衰司服職曰凡甸冠弁服凡凶事服弁服凡弔事弁絰服蒙上皮弁則皆皮弁素積冠弁言冠不言服服弁言服不言冠相備也相備而言冠在上言服在下亦言之法然則凡弔主人服而後弔弔而後為之服若王弔三公六卿主人成服王皮弁服加環絰以弔及其為之服也皮弁緦衰以居出亦如之當事則弁絰養有疾者不喪服遂以主其喪非養者入主人之喪則不易己之喪服養尊者必易服養卑者否鄭氏曰不喪服求生主吉惡其凶也遂以主其喪謂養者有親也死則當為之主其為主之服如素無喪服入主人之喪入猶來也謂飬者無親於死者不得為主其有親來為主者素有喪服而來為主與素無服者異素無服素有服為今死者當服則皆三日成也養尊者謂父兄卑謂子弟之屬孔氏曰此一節論自有喪服親族有疾患者養之法已先有喪服養此親屬有疾者則不著喪服疾者既死無主後此養者為之主養時既去其服今疾者身死已為之主還與素無服同也非養者謂死者之親屬當死者病時不得來為養而死時來為主雖有前喪之服今來為主不易己之喪服所以然者已既前不養不經變服故今為死者不易己之喪服鄭註與素無服者異者謂若來為喪主者身本吉無喪服既來為主則為此死者服始死之服若本喪服今來為喪主仍以先喪之服主之故云異也云皆三日成者謂己身若本有服及本無服與死者有親則皆至三日成服皆為死者服其服也若本有服重而新死者輕則為一成服而反前服也若新死重則仍服死者之新服也身本吉而來為主則計今親而依限服之也養尊者必易服養卑者否此廣結前文養有疾者不喪服之文前不分明尊卑故此明之妾無妾祖姑者易牲而祔於女君可也鄭氏曰女君適祖姑也易牲而祔則凡妾下女君一等孔氏曰此一節明祔祭之法妾當祔於妾祖姑若無妾祖姑當祔於髙祖姑故前文云亡則中一以上今又無髙祖妾祖姑則當易妾之牲用女君之牲祔於女君可也下一等者若女君少牢妾則特豚可也嚴陵方氏曰女君適祖姑也妾祔之嫌於隆故易牲而祭以示其殺焉婦之喪虞卒哭其夫若子主之祔則舅主之士不攝大夫士攝大夫唯宗子主人未除喪有兄弟自他國至則主人不免而為主鄭氏曰婦謂凡適婦庶婦也虞卒哭祭婦非舅事也祔於祖廟尊者宜主焉士之喪雖無主不敢攝大夫以為主宗子尊可以攝之不免而為主親質不崇敬也孔氏曰此一節論喪祭為主之事虞與卒哭在寢故其夫或子則得主之祔是祔於祖廟其事既重故舅主之婦之所祔者則舅之母也士喪無主不敢使大夫兼攝為主士卑故也宗子為士而無主後可使大夫攝主之也主人未除喪者謂在國主人之喪服未除有兄弟自他國至謂五屬之親從逺歸奔者也免必有時若葬後唯君來弔雖非時亦免崇敬欲新其事故也若兄弟非時而奔則主人不須免也山隂陸氏曰若應大夫喪雖無大夫士不得攝陳器之道多陳之而省納之可也省陳之而盡納之可也鄭氏曰多陳之謂賔客之就器也以多為榮省陳之謂主人之明器也以節為禮孔氏曰此一節論以明器送葬之事鄭註就器者既夕禮註云就猶善也以其可用也贈無常惟玩好所有總而言之亦曰明器故宰夫云凡弔與其幣器註云器所致明器也多陳列之以為榮省少納之有常數故也若主人所作明器依禮有限故省陳之而盡納於壙檀弓云竹不成用瓦不成沬之屬是也嚴陵方氏曰就器亦明器也以賔客就喪家陳之因謂之就器既夕禮曰若就器則坐奠於陳山隂陸氏曰陳器之道如其陳之數而納之正也即雖多陳之少納之省陳之盡納之禮亦不禁是謂之可奔兄弟之喪先之墓而後之家為位而哭所知之喪則哭於宫而后之墓鄭氏曰兄弟先之墓骨肉之親不由主人也宫故殯宫也孔氏曰此一節論奔兄弟之喪兄弟之喪骨肉自然相親不由主人故先往之墓若所知由主人乃致哀戚故先哭於宫也父不為衆子次於外鄭氏曰於庶子略自若居寢孔氏曰衆子庶子次謂中門外次也父不為庶子處門外為次長子則次於外為喪次也與諸侯為兄弟者服斬鄭氏曰謂卿大夫以下也與尊者為親不敢以輕服服之言諸侯者明雖在異國猶來為三年也孔氏曰鄭恐彼此俱諸侯為之服斬故註云謂卿大夫以下若俱為諸侯則各依本服經不云與君為兄弟而言與諸侯為兄弟故知容在異國也然既在異國得為舊君服斬者以曽在本國作卿大夫今來他國未仕故得服斬也熊氏曰諸侯死凡與諸侯有五屬之親者皆服斬以諸侯體尊不可以本親輕服服之也嚴陵方氏曰兄弟朞喪爾而與之服斬衰者以其為君而有父道故也山隂陸氏曰禮臣為君斬衰雖兄弟不得以其屬通如是而後君臣之分嚴故朞之喪達乎大夫喪服傳曰始封之君不臣諸父昆弟此與諸侯為兄弟者也雖如此猶服斬所臣兄弟可知兄弟如此諸父可知下殤小功帶澡麻不絶本詘而反以報之鄭氏曰報猶合也下殤小功本齊衰之親其絰帶澡率治麻為之帶不絶其本屈而上至要中合而糾之明親重也凡殤散帶垂孔氏曰謂本朞親在下殤降在小功者服澡麻為絰帶而斷麻根本示輕故也今若下殤在小功者則但首絰無根而要帶猶有根示其重故也故謂帶澡麻不絶本謂不斷本也凡殤不糾要垂皆散其帶而此下殤則屈所散麻上至於要故云屈而反也屈向上然後中分麻為兩股合而糾之以垂向下故云報也鄭註澡率治麻謂戛率其麻使潔白也凡殤謂成人大功以下之殤其殤既輕唯散麻帶垂而下不屈而上紏之異於下殤小功故也嚴陵方氏曰凡殤之帶則散而垂今則不絶其本根而為之亦既粗矣又詘而反以報之不使之垂者明其親本重而與凡殤異也山隂陸氏曰以本齊衰之親降在小功故視大功以報之婦祔於祖姑祖姑有三人則祔於親者其妻為大夫而卒而後其夫不為大夫而祔於其妻則不易牲妻卒而后夫為大夫而祔於其妻則以大夫牲鄭氏曰祖姑三人謂舅之母死而又有繼母二人也親者謂舅所生不易牲以士牲也此謂始來仕無廟者無廟者不祔宗子去國乃以廟從孔氏曰此一節明婦人祔祭之事婦祔祖姑則祔於舅之所生者也其妻為大夫而卒者謂夫為大夫時而妻死者也而後其夫不為大夫者謂妻死後夫或黜退不復為大夫而死也夫既不為大夫死若祔祭此妻但依夫今所得用之牲不得易用昔大夫時牲也妻死後夫乃得為大夫今既祔祭其妻則用大夫牲妻從夫之禮故也死當祔於祖今夫死祔於其妻故鄭知是無廟者宗子以廟從則祔於祖矣横渠張氏曰祔𦵏祔祭極至理而論只合祔一人夫婦之道當其初昬未嘗約再配是夫只合一娶婦只合一嫁今婦人夫死而不可再嫁如天地之大義夫豈得而再娶然以重者計之養親承家祭祀繼續不可無也故有再娶之理然其葬其祔雖為同穴同筵几然譬之人情一室中豈容二妻以義斷之須祔以首娶繼室别為一所可也新安朱氏曰程氏祭儀謂凡配止用正妻一人或奉祀之人是再娶所生即以所生配謂凡配止用正妻一人是也若再娶者無子或祔祭别位亦可也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配祭可乎程先生此説恐誤唐㑹要中有論凡是適母無先後皆當並祔合祭與古者諸侯之禮不同又曰夫婦之義如乾大坤至自有差等故方其生存夫得有妻有妾而妾之所天不容有二況於死而配祔又非生存之比横渠之説似亦推之有太過也只合從唐人所議為允況又有前妻無子後妻有子之礙其𫝑將有所杌􅑾而不安者唯葬則今人夫婦未必皆合葬繼室别營兆域宜亦可矣長樂黄氏曰案喪服小記云婦祔於祖姑祖姑有三人則祔於親者祖姑有三人皆得祔於廟則其中必有再娶者則再娶之妻自可祔廟程子張子特考之不詳耳朱先生所辨正合禮經也嚴陵方氏曰婦人以從人為事故貴賤從夫而不在己也山隂陸氏曰夫為大夫而曰其妻為大夫婦人從夫之爵故也祔於其妻即是祔於其祖盖妻未有不祔於祖姑者也鄭氏謂此為始來仕無廟者誤矣金華應氏曰經據妻之生死同夫榮辱而立文注以祔於其妻則為始仕而未有廟亦未必然且以妻言之正使新徙他國而為大夫亦必有廟既不立祖廟豈敢為妻立廟乎為父後者為出母無服無服也者喪者不祭故也鄭氏曰適子正體於上當祭祀也金華應氏曰祭吉禮也喪凶事也凶服不可以行吉禮子無絶母之理而為父後則有祭祀之責以宗廟為重故寧奪母慈而不敢廢祖父之祀然出婦既得罪於宗廟則其為服亦無望於前夫之家其有故而它適者必有受我而為之服矣婦人不為主而杖者姑在為夫杖母為長子削杖女子子在室為父母其主喪者不杖則子一人杖鄭氏曰姑在為夫杖姑不厭婦也母為長子削杖嫌服男子當杖竹也母為長子服不可以重於子為己也女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁及二十而笄笄為成人正杖也孔氏曰此一節論婦人應杖之節姑在為夫杖鄭義唯謂出嫁婦人若成人婦人在家為父母雖不為主亦杖若在夫家唯為主乃杖故為夫與長子雖不為主亦杖若餘非為主則不為杖但夫是移天之重婦雖不為主而杖而云姑在者舅主適婦喪則厭適子使不杖今有姑主子喪恐姑為主則亦厭婦故明之也案喪服杖云婦人何以不杖示不能病也鄭謂為童子婦人不能為父母杖也今由主喪者不杖則此童女一人杖若主喪者杖則此童女不杖童女未嫁而鄭稱婦人者以其有適人之端也嚴陵方氏曰削杖桐也杖桐非所以服男子然母為長子則杖之者以其所以服我者而報之也山隂陸氏曰婦人不杖為主而杖猶童子當室杖也今雖不為主為夫杖為長子杖異於童子亦其情至且能病也曲禮曰士曰婦人雖曰婦人為夫為長子杖在可以勉之域也若庶人非男子盖不杖矣雖男子後世猶有以杖闗轂而踝輪者則先王不責婦人可知也緦小功虞卒哭則免既𦵏而不報虞則雖主人皆冠及虞則皆免為兄弟既除喪己及其葬也反服其服報虞卒哭則免如不報虞則除之逺葬者比反哭者皆冠及郊而后免反哭鄭氏曰緦小功虞卒哭棺柩已藏嫌恩輕可以不免也言則免者則既殯先啟之間雖有事不免不報虞謂有故不得疾虞雖主人皆冠不可久無飾也皆免自主人至緦麻也為兄弟不報虞則除之謂小功以下也逺葬墓在四郊之外孔氏曰自此至皆免一節論著免之節緦小功之喪棺柩在時則當著免今至虞卒哭之時棺柩雖藏已久鄭注既殯先啓之間雖有事不免者明未虞之前則不免也虞前有葬葬是喪之大事棺柩既啓著免可知嫌虞與卒哭棺柩既掩不復著免故特明之也葬在逺處郊野之外不可無飾故葬訖欲反哭之時皆著冠至郊而後去冠著免反哭於廟山隂陸氏曰既葬而不報虞則雖主人皆冠此言過期而葬也盖亦報𦵏知然者以亦報虞知之也盖禮如期而葬如期則虞故曰葬日虞弗忍一日離也不及時而葬渴葬也過時而葬慢葬也故禮使後其虞以責子道先王之所以必其時也㑹葬著葬已而去即欲㑹虞報而後知之言雖主人皆冠嫌不冠也及虞則皆免據此報葬虞自有日但禮文殘闕其逺近之期不得而知也報虞卒哭則免據此報虞則赴卒哭即不報虞雖卒哭不赴也此言逺𦵏者視從𦵏反哭者皆冠既及郊而後免反哭反哭逺葬者也君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免鄭氏曰不散麻者自若絞垂為人君變貶於大斂之前既啓之後也親者大功以上也異國之君免或為弔孔氏曰凡大斂之前著免大功以上散麻大斂以後著冠不散麻糾其垂也至將葬啓殯之後已葬之前亦免大功以上亦散麻若君弔雖不當免時必為之著免不散麻帶貶於大斂之前及既啓之後也若他國君來與己國君同主人為之著免大功以上親者皆從主人之免敬異國君也己君來弔親者亦免可知除殤之喪者其祭也必𤣥除成喪者其祭也朝服縞冠鄭氏曰殤無變文不縟𤣥冠𤣥端黄裳而祭不朝服未純吉也於成人為釋􅎭之服成喪成人之喪也縞冠未純吉祭服也既祥祭乃素縞麻衣孔氏曰此一節明除殤及成人之喪除殤之喪謂除長殤中殤下殤之喪其除喪祭服必𤣥冠𤣥端黄裳異於成人也鄭註無變無虞卒哭及練之變服也成人喪服初除著朝服􅎭祭始從𤣥端今除殤之喪即􅎭服是文不縟也大夫朝服而祭朝服者𤣥冠緇衣素裳是純吉之祭服也今除成喪用縞冠是未純吉山隂陸氏曰言心𤣥則裳亦𤣥可知鄭氏謂𤣥端黄裳盖非是據齊之以𤣥也以隂幽思也齊𤣥而養奔父之喪括髪於堂上袒降踊襲絰於東方奔母之喪不括髪袒於堂上降踊襲免於東方絰即位成踊出門哭止三日而五哭三袒鄭氏曰凡奔喪謂道逺已殯乃來也為母不括髪以至成服一而已貶於父也即位以下於父母同也三日五哭者始至訖夕反位哭乃出就次一哭也與明日又明日之朝夕而五哭三袒者始至袒與明日又明日之朝而三也孔氏曰此一節論奔喪之法括髮於堂上殯宫堂上也不笄纚者奔喪異於初死也袒謂堂上去衣降堂阼階東而踊為踊故袒既畢襲謂揜所袒之衣帶絰於東序東奔母之喪初時括髪至又哭以後至成服不括髪袒於堂上降踊與父同父則括髮而加絰母則不括髪而加免此是異於父也著免加絰已後即位於阼階之東而更踊故云成踊其即位成踊父母同於此之時賔來弔者則拜之奔喪禮所謂反位拜賔成踊是也出殯宫之門就於廬故哭者止初死在家之時哭踊無節今聞喪已久奔喪禮殺故三日五哭異於家也此謂已殯而來若未殯而來與在家同不得減殺也山隂陸氏曰上言絰於東方免於東方絰首絰也今此言絰為要絰爾適婦不為舅後者則姑為之小功鄭氏曰謂夫有廢疾他故若死而無子不受重者小功庶婦之服也凡父母於子舅姑於婦將不傳重於適及將所傳重者非適服之皆如衆子庶婦也孔氏曰適子之婦不為舅後者則姑之服庶婦小功而已適婦宜大功庶婦故小功也鄭云將不傳重於適者如廢疾他故死而無子之屬是也云及將所傳重非適者為無適子以庶子傳重及養他子為後者也山隂陸氏曰著為舅後者姑為之大功非情有厚薄以傳重也禮記集説卷八十三
