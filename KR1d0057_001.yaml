body:
  text: 禮記集說卷一宋衛湜撰曲禮上第一唐陸氏曰本或作曲禮上者後人加也檀弓雜記放此藍田吕氏曰曲禮禮之細也禮云經禮三百曲禮三千其致一也中庸云禮儀三百威儀三千待其人而後行然則曲禮者威儀之謂皆禮之細也布帛之有經一成而不可變者也故經禮象之經禮三百蓋若祭祀朝聘燕饗冠昏鄉射喪紀之禮其節文之不可變者有三百也布帛之有緯其文曲折有變而不可常者也故曲禮象之曲禮三千蓋大小尊卑親疏長幼並行兼舉屈伸損益之不可常者有三千也今之所傳儀禮者經禮也其篇末稱記者記禮之變節則曲禮也漢興髙堂生傳禮十七篇今儀禮是也戴聖傳禮四十九篇今禮記是也禮記所載皆孔子門人所傳授之書雜收於遺編斷簡者皆經禮之變節也特以此篇名曲禮者蓋他篇稍各以類相從此篇雜記諸禮曲折之文者也石林葉氏曰經禮三百曲禮三千經禮一而曲禮十經禮其常猶言制之凡也曲禮其變猶言文之目也故言禮儀三百威儀三千先王之時皆有書與法藏於有司官掌之士習之有司守之謂之執禮周官大史掌邦之六典禮居一焉其曰大祭祀與羣執事讀禮書而協事祭之日執書以次位常大㑹同朝覲以書協禮事將幣之曰執書以詔王小史大祭祀讀禮法或讀之以喻衆或執之以行事至周衰而二者皆亡惟孔子獨能知之故亦謂之執禮今禮記首載曲禮此非其書與法之正漢儒雜記其所聞而纂之爾故言曲禮曰以表之如毋放飯毋流啜孟子亦云則孟子猶及見其略歟所謂經禮者無復聞矣新安朱氏曰禮器作經禮曲禮而中庸以經禮為禮儀鄭𤣥等皆曰經禮即周禮三百六十官曲禮即今儀禮冠昏吉凶其中書儀三千以其有委曲威儀故有二名獨臣瓉曰周禮三百特官名耳經禮為冠昏吉凶蓋以儀禮為經禮也而近世括蒼葉夢得曰經禮制之凡也曲禮文之目也先王之世二者蓋皆有書藏於有司祭祀朝覲㑹同則大史執之以涖事小史讀之以喻衆而卿大夫授之以教萬民保氏掌之以教國子者亦此書也愚意禮篇三名禮器為勝諸儒之說瓉葉為長蓋周禮乃制治立法設官分職之書於天下事無不該攝禮典固在其中而非專為禮設也其中或以一官兼掌衆禮或以數官通行一事亦難計其官數以充禮篇之數至於儀禮則其冠昏喪祭燕射朝聘自為經禮大目亦不容專以曲禮名之也但曲禮之篇未見於今何書為近而三百三千之數又將何以充邪又嘗考之經禮固今之儀禮其存者十七篇而其逸見於他書者猶有投壺奔喪遷廟釁廟中霤等篇其不可考者又有古經增多三十九篇而明堂隂陽王史氏記數十篇及河問獻王所輯禮樂古事多至五百餘篇儻或猶有逸在其間者大率且以春官所領五禮之目約之則其初固當有三百餘篇亡疑矣所謂曲禮則皆禮之微文小節如今曲禮少儀內則玊藻弟子職篇所記事親事長起居飲食容貌辭氣之法制器備物宗廟宫室衣冠車旗之等凡所以行乎經禮之中者其篇之全數雖不可知然條而析之亦應不下三千有餘矣若或者專以經禮為常禮曲禮為變禮則如冠禮之不醴而醮用酒殺牲而有折俎若孤子冠母不在之類皆禮之變而未嘗不在經禮篇中坐如尸立如齊毋放飯毋流啜之類雖在曲禮之中而不得謂之變禮其說誤也東萊吕氏曰曲禮少儀皆是遜志道理步趨進退左右周旋若件件要理㑹必有不到處如學者常存此心則自然不違乎禮心有時而不存則禮有時而或失內有毫釐之礙則外有毫釐之差如天之於百物根莖枝葉花實條幹豈一一生之哉氣到則百物自生若一枝一葉之病則是氣不到處也所謂徐行後長灑掃應對皆是遜志氣象馬氏曰直則簡曲則詳直有所礙則曲以通之簡有所略則詳以足之先王制禮小大曲直如棟梁榱桷相成而不可以相無也其威儀法度纎悉完具視之若甚繁及考其義而要其歸則知其支離之所以為簡易也故曰先王之制禮也必有主也故可述而多學也後世之不知禮者以為繁禮飾貌無所用之者是未嘗推明先王之禮意耳山隂陸氏曰小禮之不謹大禮之所自亡也龍泉葉氏曰曲禮中三百餘條人情物理的然不違餘篇如此要切言語可併集為篇使初學者由之而入豈惟初入固當終身守而不畔蓋一言行則有一事之益如鑑覩像不得相離也曲禮曰毋不敬儼若思安定辭安民哉鄭氏曰禮主敬儼矜莊貌人之坐思貌必儼然安定辭審言語也此三句可以安民孔氏曰此明人君立治之本曲禮曰者案下文安民哉是為君上所行故記人引儀禮正經毋不敬以下三句而為實驗也若如也思計慮也夫人計慮狀必端慤矜莊之貌如人之思也唐陸氏曰毋字從女內有一畫有禁止意古人云毋猶今人言莫也廬陵胡氏曰上三句聖賢皆當如此乃可安民不必人君也人君尤當謹爾河南程氏曰毋不敬儼若思安定辭安民哉君德也君德即天德也明道伊川曰主一之謂敬無適之謂一但整齊嚴肅則心自一一則自無非辟之干矣建安真氏曰曲禮一篇為禮記之首而毋不敬一言為曲禮之首蓋敬者禮之綱領也曰毋不敬者謂身心內外不可使有一毫之不敬也其容貌必端嚴而若思其言辭必安定而不遽以此臨民民有不安者乎此章凡四言而修身治國之道略備其必聖賢之遺言歟又曰伊川云主一之謂敬主者念念守此而不離之意也及其涵養既熟此心湛然自然無二不雜則不待主而自一矣不待主而自一即所謂誠也敬是人事之本學者用功之要誠則達乎天道矣此誠敬之分也伊川又曰無適之謂一適往也主於此事則不移於他事是之謂無適也又曰所謂主一者靜時要一動時亦要一平居暇日未有作為此心亦要主於一此是靜時敬應事接物有所作為此心亦要主於一此是動時敬靜時能敬則無思慮紛紜之患動時能敬則無舉措煩擾之患如此則本心常存而不失為學之要莫先於此又曰敬一也而貫於動靜故有思不思之異焉七情未發天理渾然此心之存惟有持養當是時也無所事乎思情之既發淑慝以分幾微不察毫末千里當是時也始不容不思矣無思所以立本有思所以致用動靜相須其功一也然聖賢所以敬尤在於靜深居燕處怠肆易萌操存之功莫此為要曰毋不敬者兼動靜而言也曰儼若思則專以靜言矣方靜之時何思何慮而曰若思何也猶鏡之明雖未照物能照之理無時不存心之虛靈洞達內外思慮未作其理具全正襟肅容儼焉弗動而神明昭徹若有思然以身體之意象自見䝉莊則曰形可使如槁木心可使如死灰異端誤人每每如此使心而無用則參贊化育貫通神明何所本之彌綸萬化利澤千祀何所發之故曰寂然不動感而遂通天下之故論至聖人然後無弊動靜循理無往非敬則其有思者寂之感無思者感之寂涵養功深久將自熟北溪陳氏曰敬者一心之主宰萬事之根本人心不可測出入無時莫知其鄉惟敬便不散又曰此心存則萬理便森然於中古人謂敬德之聚正如此又曰誠與敬不相關恭與敬却相關恭就貌上說敬就心上說恭主容敬主事又曰堯之欽明舜之溫恭湯聖敬日躋文王緝熙敬止工夫都如此橫渠張氏曰事主於敬則無過舉也動容貌正顔色出辭氣則民可望而知也學者必自此推類新安朱氏曰毋不敬是統言主宰處儼若思敬者之貌也安定辭敬者之言也安民哉敬者之效也若只以事無過舉可以安民為說則氣象淺迫無含蓄也石林葉氏曰禮主於敬敬者所以直內也內既直則儼若思者德威也安定辭者德言也德威惟畏德言惟信非安民哉藍田吕氏曰自天子至於庶人一是以修身為本欲修其身先正其心者敬之謂也修身者正言貌以禮者也故毋不敬者正其心也儼若思者正其貌也安定辭者正其言也三者正矣則無所往而非正此修己以安百姓也故天下至大取之修身而無不足故曰安民哉此禮之本故於記之首章言之永嘉周氏曰毋不敬所以戒夫人之不可以不敬也蓋敬者君子修身之道也所以間邪而存誠者也敬斯定定斯正正者德之基也慢斯怠怠斯邪邪者德之賊也古之人相在爾室不愧屋漏出門如見大賔使民如承大祭何所不用其敬哉儼若思者非思也凡思者其心必有所止心有所止者其耳目視聽必有所忘蓋其心定者其容寂此儼然所以若思而非思也古之人知止而慮善恭默以思道此有思者也南郭子綦之隱几顔淵之坐忘此無思者也無思者天也有思者自人而之天也古之為道者如此安定辭者易所謂易其心而後語也蓋一辭之不中皆心之過孟子所以謂不得於言勿求於心不可而頤之養正君子所以慎言語也此三者禮之大節君子學道之要也自天子達於庶人自修身至於為天下莫不一於是故敬則無敢慢無敢慢則民莫不愛矣儼則人望而畏之人望而畏之則民莫不敬矣安定辭則其言善其言善則民莫不應矣匹夫而有此必有安民之術天子而有此必有安民之事故曰安民哉馬氏曰夫敬者出於心而無事於外也在於我者出入顯晦之無常待乎物者貴賤賢否之不一至於敬而不慢則無處而不然也語曰君子無衆寡無小大無敢慢夫小與寡者人之所易者也而君子不敢慢者以其在己者主敬而已思者神之所運而心之所潛也邪正賢愚之行積於所思而發於外者也儼若矜莊於外也儼然而莊則心之所思者靜而正矣此君子之所以發而無不中也安定則有主於中奠而後發吳興沈氏曰毋不敬儼若思安定辭安民哉此聖人之言也自此而下雖至繁至悉然法度森密毫髮不可犯所以為曲禮永嘉戴氏曰學以禮為先禮以敬為本然而持敬為難故去其不敬者乃所以為敬也寡欲則心可養間邪則誠自存毋之為言禁止之辭也聖人於忿言懲於欲言室於己言克於心言制於意必固我言毋皆用力之辭也儼若思者非真思也有所思則坐馳矣安定辭者非無辭也定其辭而後發也凡此皆主敬之功也儼若思則動容貌而民莫不服安定辭則出辭氣而民莫不信所謂篤恭而天下平也其於安民也何有夫子曰修己以敬又曰修己以安人修己以安百姓其本則一而已眉山家氏曰儼若思乃毋不敬之象毋不敬乃儼若思之實敖不可長欲不可從志不可滿樂不可極鄭氏曰四者慢遊之道桀紂所以自禍孔氏曰此亦據人君恭謹節儉之事敖者矜慢在心之名長者行敖著迹之稱矜已慢物中人不免若有心而無迹則於物無傷若迹著而行用則侵虐為甚傾國亡家必由乎此故戒不可長心所貪愛為欲飲食男女是也人皆有欲但不得縱在心未見為志但不得自滿六韜云器滿則傾志滿則覆樂者人情所不能已當自抑止不可極為樂記云樂盈而反以反為文廬陵胡氏曰四者聖賢所同戒鄭意專指人君非也從如字春秋傳云魯君世從其失長久也盧植馬融王肅並同藍田吕氏曰敖者人之所自恃也長之則慢物一命而吕旅再命而車上舞三命而名諸父長傲者也欲者人之所不能無也從之則喪已而滅天理好惡無節於內從欲者也志者務存於逺大故不可滿也齊桓公葵丘之㑹振而矜之叛者九國其滿可知矣致樂以治心則君子未嘗不欲樂也亦使樂而不流感動人之善心而已姦聲以濫溺而不止此極樂者也四者皆人情之所不免過則害也永嘉周氏曰君子所以知天者知其性也所以事天者事其心也性之不明心之不存則在我者與天不相似故有長傲以悖天德從欲以喪天性所見者小則其志易滿天道虧矣所慕者外則其樂易極天理滅矣此其喪精失靈皆可哀之民也凡人之所以有傲者何也以其有我而已彼我既分勝心生焉强此而劣彼此所謂傲也傲且不足以輕彼適所以害我是心也且不可有況可長乎彼有傲睨乎萬物之上者是非世俗之鄙心也凡人之所以有欲者何也以其有物而已物我既交愛心生焉忘己而狥物此所謂欲也且不足以益我適所以喪我是心也且不可有況可從乎彼有從心所欲不踰矩者是非世俗之鄙心也凡人之志所以有滿者所志者利也其心在利者利得其志必滿志滿者必驕由志道者觀之不亦隘乎凡人之樂所以有極者所樂者僞也故所樂在物物得其樂必極樂極者必淫由樂道者觀之不亦鄙乎馬氏曰敖不可長者欲消而絶之也欲不可縱者欲克而止之也志不可滿者欲損而抑之也樂不可極者欲約而歸於禮也有周公之才之美使驕且吝其餘不足觀則驕敖之喪德也甚矣此所以不可長也孟子曰其為人也多欲雖有存焉者寡矣蓋欲者出於人為遂之而不克以義則無所不至矣此所以不可從也夫聰明聖知守之以愚功被天下守之以謙有髙世之行過人之功而侈然有自大之心則失其所以為善此所以不可滿也樂者人情之所不能免也蕩而無節則悖天理而窮人欲矣聖人知其不可絶也故立中禮以防之蓋酒者所以合歡必使之賔主百拜而不敢醉樂者所以導和必使之正以雅止其漸至於不可遏反觀吾心四者何有當知是心不可萌矣使徒遏其末流則隨止隨起終亦必甚而已矣費氏曰此四戒者皆所以持其敬也傲長則忽易而無所畏欲從則流蕩而不知反志滿則驕惰而不加修樂極則荒惑而無所覺有一於斯敬不存矣此君子所以亟言其不可也金華應氏曰君子之學莫纍乎有已尤莫纍乎有物凡纍乎物皆私乎己者也矜己凌物為傲而其病根則生乎志滿志大則常虛而能容物志小則易滿而能拒物彼傲者自以己大而物小孰知乃所以為己之小哉逐物快已曰欲而其條暢則發於樂極夫樂節而止則轉物而不流蕩而極則狥物而忘反彼縱者自以物常順乎已而無逆孰知乃非所以為己之適哉四者蠧心之蟊賊溺身之鴆毒學者所宜深戒毛氏信卿曰人皆曰禮所以强人吾獨謂禮所以適人蓋聖人不能使人之忘情而能使人之節情不能絶人之情而能制人之情傲不能盡無也不長之足矣欲不能盡無也不從之足矣蓋强人以其所難則人有所不堪且將蕩然無所限隔反自肆而莫之止故不若即其情而為之制使行焉而自著居焉而自安則物或牽而心不應身或作而心不隨尚何傲欲之有又曰禮者何天理是也非禮者何人欲是也心無一物是謂天理心有一物是謂人欲然天理人欲相為消長有一分之人欲即滅一分之天理存一分之天理即勝一分之人欲聖人所以為聖人以其得天理而忘人欲衆人所以為衆人以其滅天理而窮人欲學者將欲反其天理果何所事哉塵去而鑑明礦盡而金見人欲去而天理全矣故聖人之教不急於反天理而先於節人欲也傲也欲也皆人欲也不為血氣所使自然明於親賢公於好惡天理豈不自此得乎茍得茍免皆人欲也不為人欲所使則心肅而體莊貌誠而意敬天理豈不自此復乎記者先之以四不可與夫六毋皆戒人之節人欲也繼之以敬愛賢者以至於坐如尸立如齊皆誘夫人之反天理也學者茍欲至乎天理當自節人欲始賢者狎而敬之畏而愛之愛而知其惡憎而知其善積而能散安安而能遷鄭氏曰狎習也近也謂附而近之習其所行也心服曰畏凡與人交不可以己心之愛憎誣人之善惡積謂己有蓄積見貧窮者則當能散以賙救之若宋樂氏安安謂己今安此之安圖後有害則當能遷晉舅犯與姜氏醉重耳而行近之孔氏曰自此至勿有一節總明愛敬安危忠信之事賢是有德之稱朋類附近習其德藝易相䙝慢戒令相敬賢者人心服畏不可疏之鄭引宋樂氏見左傳襄二十九年引舅犯見左傳僖二十三年藍田吕氏曰君子之於賢者狎之非徒愛也以其道可尊故敬之畏之非徒敬也以其德可慕故愛之狎而敬之交可久也畏而愛之情可親也君子之於衆人則有私愛也不敢蔽其惡有私惡也不敢掩其善臧伯曰孟孫之惡我藥石也季孫之愛我疾疢也美疢不如惡石此知其善惡者也積者不能散懷於聚也安安者不能遷懷於居也貨惡其棄於地不必藏於己也孟子曰王如好貨與百姓同之此能散者也士而懷居不足以為士矣孔子去齊接淅而行去魯曰遲遲吾行也當可去也雖父母之國去之況於他乎此能遷者也嚴陵方氏曰狎有近習意狎以迹而敬以心畏其威而愛其德非特言人之於賢當如是也又以見賢於人者能使人如是焉愛憎私情也善惡公義也情之所愛不必皆善故必知其為惡情之所憎不必皆惡故必知其為善山隂陸氏曰狎而敬之則尊畏而愛之則親馬氏曰狎則生侮必將之以敬畏則不親必輔之以愛四者並行則待賢之義具矣夫天下之是非善惡所以不明者蔽於人之憎愛不能狥理以察物也故曰公生明偏生暗好惡正則天下之是非瞭然而不惑矣積而能散者以財發身也安安而能遷者義之與比也永嘉周氏曰天下之人莫不善也賢者先得乎其善者也故其溫良可親也其威嚴可畏也親之而不知敬則其流必易畏之而不知愛則其漸必疏狎而敬之而不失其尊畏而愛之而不失其親君子之親賢有如此者天下之蔽莫大乎私天下之明莫大乎公君子之於人也無私好無私惡惟能公於好惡故能不以一己之愛憎而易天下之善惡君子之至公有如此者凡人之所以厚積者必以為己私分也惟公者能以天下為度則不纍乎物在人者猶在己也奚積而不能散乎凡人之所以居安者必以為我所安也惟公者能以天下為宅則不纍其居在彼者猶在此也奚安而不能遷乎惟其能散也故散而不失其所積惟其能遷也故遷而不失其所安君子之無纍有如此者東萊吕氏曰狎而敬之畏而愛之須將狎與敬作一字看畏與愛作一字看方見得親近賢者氣象愛而知其惡憎而知其善此天理人欲之所以分也大凡人胸中著一件所愛所憎非特不見其惡不見其善凡其所見却被人欲障礙並不見了君子純乎天理故是是非非兩不相奪李氏曰君子之親賢也狎以致其愛而以禮存心其尊賢也畏以致其敬而以仁存心無作好則知其惡無作惡則知其善是以能好人能惡人也聖人順性命之理則安其所安而不安其所不安故所安者有不必遷也易曰介于石子曰知幾其神乎小人暗於善惡之積則安其所不安而不安其所安故於所不安有不知遷也易曰困于石子曰非所困而困焉名必辱夫石物之安者也惟聖人則能介於所安而至於吉小人則困於所安而至於凶安之則同而安之者則異也故察其所安則君子小人見矣新安朱氏曰人之常情與人親狎則敬弛有所畏敬則愛衰惟賢者乃能狎而敬之是以雖褻而不慢畏而愛之是以貌恭而情親也己之愛憎或出私心而人之善惡自有公論唯賢者存心中正乃能不以此而廢彼也六句文意大同皆蒙賢者二字為文言皆衆人所不能唯賢者乃能之耳舊注非是王氏曰人之學莫急於與賢人處然親之而不敬則其漸必易畏之而不愛則其漸必疏易之疏之在賢者本無恤也而我何所得哉若是者其於賢者本無所見也人以為賢吾從而賢之耳使有所見則必知所以可尊所以可親者矣從夫子者至於久而不去何也彼於聖人有所見也故曰子溫而厲威而不猛然則欲與賢者遊要必有所見廬陵胡氏曰魏徴云憎者惟見其惡愛者止知其善愛憎之間所宜詳謹春秋傳好不廢過惡不去善長樂劉氏曰積而能散者積其學而能散之於政上也積其財而能散之於民次也積而不能散下矣安安而能遷者國雖安必防其危而遷其德善以除其危不可以安其安而弗遷也湯之盤銘曰茍日新日日新又日新能遷之謂也毛氏說見前臨財毋茍得臨難毋茍免狠毋求勝分毋求多疑事毋質直而勿有鄭氏曰毋茍得為傷廉也毋茍免為傷義也狠䦧也謂爭訟也毋求勝毋求多為傷平也質成也彼己俱疑而己成言之終不然則傷知直正也己若不疑則當稱師友而正之謙也孔氏曰臨財茍得入已則傷廉隅難謂有寇讎謀害君父為人臣子當致身授命以救之狠謂小小䦧狠當引過歸己不可求勝所分之物人皆貪欲望多入已故戒求多人多專固未知而為己知故彼己俱疑勿得成言之也勿有勿謂己有此義也藍田吕氏曰趨利避害人之情也雖君子亦然特主於義而不茍也義可得則受義不可得則不受則得不得有義矣義可免則免義不可免則不免則免不免有義矣君子所趨惟義而已何利害之擇哉狠者與人爭者也君子無所爭犯而不校而已故不求勝也分者與人共者也如勞逸憂樂方與人共而獨求多焉是自私也道途不爭險易之利冬夏不爭隂陽之和故不求多也多聞闕疑孔子之所許也疑而質之自欺也信以傳信疑以傳疑則寡尤矣可疑而不疑則道不信可直而不直則道不見我且直之又曰豫豈好辨哉豫不得已也然則直者直吾道而已吾何與乎故終日與人辨而不自有也理義者人心之所同然君子之於天下唯義理所在而已永嘉周氏曰纍於物者則臨財必求茍得纍於身者則臨難必求茍免惟君子忘物所以立我故不纍於物忘我所以立道故不纍於身內外無纍故可以得而得無心於得非所謂茍得也可以免而免無心於免非所謂茍免也君子之所以自立有如此者今天下之所以好勝者為其不能忘我也天下之所以多得者為其不能遺物也茍能忘我而常處其弱則人之狠者不求勝而天下莫能勝矣茍能遺物而常處其不足則人之分者不求多而天下莫能損矣茍持是於天下雖之蠻貊而必行入麋鹿而不亂君子之所以與人有如此者君子之知衆人之所以疑也衆人之曲君子之所以直也然而君子有同天下之志而無善一己之心故致其大知以釋其疑使天下之疑者不疑質其所疑則天下疑矣推其大直以直其未直使天下之不直者直有其直則天下不直矣故不質其疑所以欲天下之皆致其知也不有其直所以欲天下之皆得其直也君子之善世有如此者凡此數者君子之所當務而衆人之所深戒也馬氏曰曽子避越寇而子思獨不去衛以義所不得免也孟子受宋薛之贐而却齊之餽兼金義所不宜得也狠毋求勝君子所以懲忿也分毋求多君子所以安命也蓋剛而不輔以道則至於鬬而危其身矣此狠之所以不可求勝也自天子以達於公侯以至於士上下有職而尊卑有制不能安其所受而以辭卑疾貧為志則至於犯分而戕義矣於行有疑以之行己則不智在理有疑以之授人則不忠此所以無敢質也王制曰司㑹以嵗之成質於天子周禮曰聽賣儥以質劑蓋質者有決而正之之意也孟子曰言語必信非以正行也然則君子之所以直已而無枉者豈自以為善而矜於世哉循理而適然耳書曰有其善喪厥善此所以直而不敢有也山隂陸氏曰毋禁辭勿戒辭李氏曰君子見得思義見危授命故臨財而不訾臨難而不避君子不以為苟難然可以取可以無取取傷廉可以與可以無與與傷惠可以死可以無死死傷勇故廉者重取勇者重死而君子不以為苟易無難也無易也不苟而已矣故冉子為子華請粟為不可則原憲之辭粟君子亦未嘗可也以曽子寇至而去為是則子思之不去君子亦未嘗以為非是也表記曰義者天下之制也不忮故毋求勝不求故毋求多不忮近仁不求近義王氏子墨曰君子財有所當得難有所可免得其所當得天下不以為貪免其所可免天下不以為怯至於非所當得君子泊然無欲心非所可免君子毅然無難色蓋惟義所在故其處利害若此若懷苟得苟免之心則將何所不至曰苟云者在乎若可得可免之間自衆人觀之亦不為無辭也然君子所為豈直為有議己者慮哉君子所以過人者以其容物也樂天也待小人以君子何所不容彼狠也而求勝之則隘矣得喪窮達之來我何往而不樂忘其分而過望之則戚矣是二者其患生於有我有我故與物為敵必至於好勝有我則不知天必至於不安分質實也學以疑故進事以疑故立蓋疑則問問則明疑則思思則得故君子以亡所疑為能而以有所疑為幸也事疑矣而自以為實其能無咎乎直者順理之謂也世本無直名有不直而後直名立事上無隱忠與人無隱情理當然耳我何有哉不幸正直之士天下不多有有一人焉則相與咨嗟嘆息以為難事而斯人亦且有自得之色以為能人所不能為固己淺矣而又坐悻悻以速禍者遂以直道為不可行噫此豈直之罪哉罪在於有之耳使天下皆知為理之當然而我無與焉尚復有不直者邪後世至有為人臣者置君於惡而已安受其名獨何心哉永嘉戴氏曰積而能散臨財毋苟得分無求多皆為財利言也此人所甚病者故三言之天下之患莫大於苟可為而止故苟者自恕之辭也毋苟免則於死生之際嚴矣夫人心不可有所求也有所求則經營必得而後止毋求勝求多則血氣有時而定矣此皆私欲之難制者學者能其所當能毋為其所不為則幾於禮矣費氏曰欲冨不欲貧欲得不欲喪人之常情也臨財不嫌於得雖君子無異於衆人然苟得財者無所不為而不思義之可不可則君子不為也好生惡死好安惡危人之常情也臨難冀其或免雖君子無異於衆人然苟可免難者無所不為而不顧義之可不可則君子不為也若曰吾於財必不欲得於難必不欲免則是矯情行怪非中道也故毋苟得毋苟免中之見於臨利害者然也爭而必求已勝分而必求已多是徒知有已而不知有人皆偏也故毋求勝毋求多中之見於處物我者然也事可疑而未決必持一說證而成之不已偏乎三代直道而行不直則道不見君子固無惡乎直然昭昭然自表其直振而矜之以為我所獨有而他人所無是亦私而已矣是亦偏而已矣有其善喪厥善此言善之不可有也不直固不可直而有之又不可故疑事毋質直而勿有此君子制行之適中者也廬陵胡氏曰狠毋求勝懲忿也分毋求多平施也疑事毋質質正也事有可疑勿以臆決正之所謂闕疑直而勿有不以己直彰彼曲新安朱氏曰疑事毋質直而勿有兩句連說為是疑事毋質即少儀所謂毋身質言語是也直而勿有謂陳我所見聽彼決擇不可據而有之專事彊辨不能如此則是以身質言語矣毛氏說見前敖不可長章若夫坐如尸立如齊禮從宜使從俗鄭氏曰言若欲為丈夫也春秋傳曰是謂我非夫如尸視貌正如齊磬且聽也齊謂祭祀時禮從宜事不可常也晉士丐帥師侵齊聞齊侯卒乃還春秋善之使從俗謂牲幣之屬當從俗所出亦不可常也禮器曰天不生地不養君子不以為禮孔氏曰尸居神位坐必矜莊言人雖不為尸當如尸之坐立之時雖不齊亦當如祭前之齊必須磬折屈身士虞禮云無尸者主人哭出復位祝闔牖户如食間是主人有聽法故鄭云磬且聽禮從宜謂梱外之事將軍裁之知可而進知難而退鄭引士丐見公羊襄十九年使謂臣為君出聘之法朝聘皆有皮馬龜金竹箭璧帛之等有則致之土俗若無不可境外求物清江劉氏曰若夫坐如尸立如齊弗信不言言必齊色此成人之善者也未得為人子之道也此曽子之文記禮者取之非誤留若夫二字則全脫弗信以下一簡河南程氏曰坐如尸立如齊大要養其志也豈徒欲養氣乎哉藍田吕氏曰禮者敬而已矣敬者禮之常也禮時為大時者禮之變也坐如尸立如齊盡其敬也禮從宜使從俗適其時也體常盡變則禮達之天下周還而無窮也若夫者發語之端蓋舉禮之大㫖而言之也莊氏云尸居而龍見居即坐也推是意也則坐容莊可知矣齊者專致其精明之德必見其所祭者則立容端可知矣禮有不可行者必變而從宜如老者不以筋力為禮貧者不以貨財為禮之類使於他邦必從其俗故有入境而問禁入國而問俗之禮永嘉周氏曰君子之所以必莊必敬者非以飾外貌所以養其中也蓋其心肅者其貌必莊其意誠者其體必敬必莊必敬然後可以為尸故君子之坐如之必莊必敬然後可以為齊故君子之立如之當是時也其心寂然而無一物有孚顒若而無他慮是心也聖人之心也顔子三月不違仁不違此心也其餘日月至焉至此心也聖人從心所欲不踰矩不踰此心也聖人常顔子久其餘暫百姓日用而不知也古之人何獨坐立然後如此無須㬰之離終食之違造次必於是顛沛必於是此學者入德之要不可以不思也永嘉戴氏曰此論起居動作之禮也古之君子其律己甚嚴而酬酢萬物不為崖異怪僻之行故麻冕純儉夫子從衆魯人獵較夫子亦獵較彼之君子或異乎是視聽言動不為非禮而好為是異世驚俗之舉取惡於人甚以納侮是亦不明夫禮之故也儒行曰君子之學也博其服也鄉雖聖人亦不敢為異以駭俗也夫人心所甚嚴者莫嚴於祭祀如尸如齊其嚴甚矣宜者義也禮與義俱禮不合宜是為非禮之禮俗非流俗之謂風俗各有所尚故曰入國而問俗苟非俗之所安君子不以為禮王氏曰君子之所以然者凡以養其中也君子之學要在於存養耳非特坐立之際為然若几杖之銘盤盂之戒出門如賔在輿有見無所不用其敬譬猶髙其閈閎厚其垣墉則處乎室中者固泰然自若也而昧者不知啓户以延盜乃始操戈以逐之禦其東而攻其西也復至惴惴然視外物如寇讎而以心纍之何其惑也安得如顔子者從事於視聽言動之際以傳聖學於千載之後乎又曰言禮者多失於拘攣故人病其難行正如法家守紙上語不求人情所在則動輒有礙而法始弊矣夫禮者天下萬世所通行非止為一槩設也使知時中之義務當其可而已則委巷之人皆可以為禮故曰禮從宜禮不從宜夏裘而冬葛也使不從俗山魚鱉而澤鹿豕也而可乎長樂陳氏曰記曰禮可以義起從宜之謂也又曰入國而問俗從俗之謂也孔子曰誦詩三百不足以一獻毋輕議禮又曰誦詩三百使於四方不能專對雖多亦奚以為夫以誦詩之多不足以議禮與為使則禮之與使其可不知變哉廬陵胡氏曰禮從宜從時之宜使從俗役使人必從俗所便舊讀為色吏反恐非新安朱氏曰宜謂事之所宜若男女授受不親為禮而祭與喪則相授器之類俗謂彼國之俗若魏李彪以吉服弔齊齊裴昭明以凶服弔魏蓋得此義夫禮者所以定親疏決嫌疑别同異明是非也孔氏曰自此至往教一節總明人之所行皆當由禮故以禮為目定親疏者五服之內大功已上服粗者為親小功已下服精者為疏故周禮小史掌定繫世辨昭穆也決嫌疑者若妾為女君期女君為妾若服報之則太重降之則有舅姑為婦之嫌故全不服是決嫌也孔子之喪門人疑所服子貢引夫子喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服是決疑也别同異者本同今異姑姊妹是也本異今同世母叔母及子婦是也明是非者得禮為是失禮為非若主人未小斂子游裼裘而弔得禮是也曽子襲裘而弔失禮非也但嫌疑同異是非之屬在禮甚衆各舉一事為證藍田吕氏曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶於地為祖父母齊衰期為曽祖父母齊衰三月此所以定親疏也嫂叔不通問嫂叔無服君沐粱大夫沐稷士沐粱燕不以公卿為賔以大夫為賔此所以決嫌疑也己之子與兄弟之子異矣引而進之同服齊衰期天子至於庶人其貴賤異矣而父母之喪齊疏之服饘粥之食無貴賤一也大夫為世父母叔父母衆子昆弟昆弟之子降服大功尊同則不降此所以别同異也禮之所尊尊其義也其文是也其義非也君子不行也其義是也其文非也君子行也故麻冕禮也今也純儉吾從衆男女不授受禮也嫂溺則援之以手此所以明是非也馬氏曰喪期有逺近之殺宗廟有遷毁之制恩之隆者服之三年而不以為厚族之逺者殺於袒免而不以為薄所以因人情而定親疏也宗廟之儀迎牲而不迎尸燕飲之禮宰夫為獻主而以大夫為賔所以斷君臣之疑男女非有行媒不相知名非受幣不交不親所以别男女之嫌凡為此者所以決嫌疑也夫同異是非之所以不明者以無主於內也故曰規矩誠設不可欺以方圓繩墨誠陳不可欺以曲直又曰欲察物而不由禮弗之得矣有禮則有主於內同異是非之際判然可辨矣故曰無節於內者觀物弗之察矣石林葉氏曰親疏位也嫌疑情也故言定言決同異事也故言别是非理也故言明禮至於明則禮之達也永嘉戴氏曰夫禮者定天下之邪正凡天下之事其疑似而難明參差而不齊可否而莫之定者皆取證於禮非但為制禮言也其定於禮何也定於理而已矣王氏子墨曰天下之事使其自有定分即禮矣又奚取必於禮惟其在疑似之間人所易惑而不能處者於是一舉而斷之以禮而後天下定何也禮無心而人有情也方圓曲直固不假規矩繩墨者然毫釐之差非質之規矩繩墨則容有可欺者矣夫子作春秋褒貶之際斷然不易蓋作春秋者夫子也所以為褒貶者非夫子也禮也後世之褒貶乃以意為之宜其紛紛無定論費氏曰樂統同禮辨異故禮主乎辨所以辨天下之理使之各得其當也夫物理各有攸當物理之自然也聖人制禮亦因其自然而辨之使不亂耳人不能無親疏理之自然也聖人制禮以定之而人處親疏之間無不得其當如五服之制有精粗重輕之類是也事不能無嫌疑理之自然也聖人制禮以決之而人處嫌疑之際無不得其當如男女不親授受嫂叔不通問之類是也同異有自然之理聖人制禮以别之而同異判然得其當如車服器用之有等殺鼎俎籩豆之有竒耦之類是也是非有自然之理聖人制禮以明之而是非昭然得其當如麻冕禮也今也純儉吾從衆之類是也夫親疏嫌疑同異是非非聖人之所為也特因其理之所在而定之決之别之明之而已爾故曰禮者理也長樂陳氏曰易曰隂疑於陽又曰為其嫌於無陽燕義曰不以公卿為賔為疑也明嫌之義也蓋兩物相似為疑以此兼彼為嫌禮記集說卷一
