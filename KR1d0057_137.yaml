body:
  text: 禮記集說卷一百三十七宋衛湜撰表記第三十三孔氏曰案鄭目録云名曰表記者以其記君子之德見於儀表也此於别録屬通論藍田吕氏曰禮記名篇亦多取篇中字為目如檀弓玉藻緇衣之類此篇論仁為多而篇中有云仁者天下之表恐取此義以名篇嚴陵方氏曰表者裏之外也故凡欲自明於外而期物之取正者皆謂之表經言表微傳言表道皆以是而已孔子體道而不行乎世然無以自明而莫之取正焉於是立言以表之則門弟子不可以不記也故名其篇曰表記子言之歸乎君子隱而顯不矜而莊不厲而威不言而信鄭氏曰此孔子行應聘諸侯莫能用己心厭倦之辭也厲謂嚴顔色孔氏曰於時孔子身在他國不被任用故稱歸乎皇氏曰此篇稱子言之凡八皆是發端起義事之頭首記者詳之故稱子言之若於子言之下更廣開其事或曲說其理則直稱子曰藍田吕氏曰自此至瀆則不告一章大指言敬而已歸乎者孔子厯聘諸侯諸侯莫能用知道之不行將歸老於魯之言如在陳則曰歸與歸與者也隱而顯者潛雖伏矣亦孔之昭者也不矜而莊者子懷明德不大聲以色者也不厲而威者德威惟畏者也不言而信者四時行焉百物生焉者也聖人之於天下豈恝然無心哉博施濟衆雖堯舜不能無病況孔子不得其時者乎故其始也曰如有用我者吾其為東周乎又曰天下有道丘不與易也及其終也知天意所在而廢興有命乃曰鳳鳥不至河不出圖吾已矣夫又曰甚矣吾衰也久矣吾不復夢見周公然後浩然有歸志矣蓋聖人之德要其歸也天而已矣默而成之不言而信存乎德行不識不知尚何矜厲之有哉故曰天何言哉又曰天則不言而信神則不怒而威其是之謂乎馬氏曰隱者其迹顯者其名其迹隱於幽其名聞於人以其德藴於中輝光發於外夫唯德藴於中而輝光發於外故不矜而莊不厲而威不言而信矜所以自飾而欲人之敬厲所以自嚴而欲人之畏言所以自宣而欲人之信故不矜而莊不厲而威不言而信則至德默喻於心也不矜不厲不言所謂隱也莊威信所謂顯也延平周氏曰君子隱而顯隱則神也顯則明也既隱而顯則復推其始之所以隱而顯者在乎不矜而自莊不厲而自威不言而自信易曰神而明之存乎其人默而成之不言而信存乎德行者蓋既神而明則復推其始之所以神而明者在乎默而成之而不言而信與此同意延平黃氏曰不矜而莊人之道也不言而信天之道也不厲而威神之道也講義曰孔子厯聘天下而無一用故至是而有歸乎之歎孰知夫不用之用其為用尤大也身不容於一時而道可傳於萬世賞罰之柄不及一施設而春秋之筆削凜凜乎為千載之懲勸是所謂隱也而有至顯者存所謂不矜不厲也而有莊且威者寓不言也而有所謂莫不信者在夫子至是而歸於魯雖不用無憾矣子曰君子不失足於人不失色於人不失口於人是故君子貌足畏也色足憚也言足信也甫刑云敬忌而罔有擇言在躬鄭氏曰失謂失其容止之節也玉藻曰足容重色容莊口容止甫刑尚書篇名忌之言戒也言己外敬而心戒慎則無有可擇之言加於身也孔氏曰此一經廣明君子之德甫刑吕刑也今尚書躬作身字藍田吕氏曰修身之要有三貌也色也言也曽子告孟敬子君子所貴乎道者三動容貌出辭氣正顔色而已冠義曰禮義之始在於正容體齊顔色順辭令若巧言令色足恭則反是者也所謂足者舉動是也舉動即貌也主於足故言足也色者顔色見於面目者也口者言辭是也修此三者敬而已矣不敬則失之故貌敬則足畏也色敬則足憚也言敬則足信也長樂陳氏曰孔子先言其所難勉者所以盡道又繼之以其所易為者所以盡教則必矜而莊故不失足於人而貌足畏必厲而威故不失色於人而色足憚必言而信故不失口於人而言足信凡此所以盡教而已嚴陵方氏曰三者得失皆由於動夫靜所以處已動所以接人故每以不失於人為言焉此止引擇言以證之者以駟不及舌人之失尤在於言故也清江劉氏曰足者足恭也色者令色也口巧言也此仲尼所與左丘明同其恥之三事也故下自解之曰君子貌足畏也色足憚也言足信也信則不巧矣憚則不令矣畏則不足矣注乃云足容色容口容非也馬氏曰見其有所可行而不慮其所可止則失足於人見其所可喜而不慮其所可怒則失色於人也見其所可語而不慮其所可默則失口於人也行止視所可不失足於人喜怒視所可不失色於人語默視所可不失口於人蓋進以禮退以義此不失足於人也端冕則有敬色衰絰則有哀色甲胄則有不可辱之色此不失色於人也知者不失人亦不失言此不失口於人也不矜而莊不言而信不厲而威此言其大也貌足畏也色足憚也言足信也此言其應物也與夫中庸所謂言而世為天下則行而世為天下法又曰不動而敬不言而信不怒而民威於鈇鉞其意同也此三者雖不同而其要在乎敬慎而已子曰裼襲之不相因也欲民之毋相瀆也子曰祭極敬不繼之以樂朝極辨不繼之以倦鄭氏曰不相因者以其或以裼為敬或以襲為敬禮盛者以襲為敬執玉龜之屬是也禮不盛者以裼為敬受饗是也極猶盡也辨分别政事也孔氏曰以前經云貌足畏色足憚故此經云毋相瀆又明行敬不可樂倦也行禮之時禮不盛則露見裼衣禮盛則重襲上服是行禮初盛則襲衣禮不盛則裼衣是裼襲不相因也所以然者欲使人民無相䙝瀆使禮相變革也案聘禮賔初行聘時則襲故聘禮云賔襲執圭是也至聘訖受饗之時賓裼奉束帛加璧行饗聘為禮盛故襲饗為禮不盛故裼聘時有玉故云執玉也玉藻曰執玉龜襲故云之屬也案行饗執璧亦是玉於時裼衣者比聘時執玉為輕故也又賔介自相授玉之時介禮輕裼而執圭以授賔賔禮重則襲而後受圭是賔與介亦裼襲不相因故聘禮云上介不襲執圭屈繅授賔賔襲執圭是也藍田吕氏曰禮者節文而已節文不明慢瀆所由生也衣裘之閒以襲裼為之節文故凡服裘者必有衣以裼之裘䙝服也不可以敬事故有衣以覆之也不袒則謂之襲襲充美也袒謂之裼裼見美也謂裘之文飾也不文飾也不裼故犬羊之裘不襲也不相因者或以裼為敬或以襲為敬也禮盛者不文則以襲為敬如大裘不裼及尸襲聘禮賔襲執圭弔則襲是也禮不盛者尚文故以裼為敬如君在則裼無事則裼受饗之時賔裼奉束帛加璧是也極敬者誠意至也極辨者節文明也祭者竭吾誠意以求乎神猶恐未盡也故齊三日必見其所祭者立而詘進而愈退立如受命已徹而退敬齊之色不絶於面如是則然後可以饗親茍至於樂則敬弛弛則忘之矣朝廷之禮所以别嫌明微正名分以尊君者也故有外朝內朝之政左右九棘面三槐左嘉石右肺石以别公卿大夫諸侯及羣士羣吏之位以致民而詢焉及辨貴賤之等叙羣吏之治其儀也有不厯位而相言也不踰階而相揖也如此然後君臣之分明邦國之政行茍至於倦則入於茍簡入於茍簡而欲求治者未之有也嚴陵方氏曰古者長民衣服不二故其效至於民德歸一則裼襲不相因欲民之毋相瀆固其理也裼襲見曲禮及玉藻解山陰陸氏曰一襲一裼非相因也若聘禮賔襲執玉至受饗賔裼奉束帛加璧是也相因謂若裼襲矣又裼襲也是之謂瀆朝可以辨君臣之義盡矣覲是也故曰覲之言勤也所謂不繼以倦石林葉氏曰禮有以裼為貴者文也文在外以顯諸仁禮有以襲為貴者質也質在內以藏諸用文質所事各因其事民所以不相瀆也禮之體無不敬而極者在祭故樂以迎來哀以送往非繼以樂也禮之用無不辨而極者在朝故日中而退非繼以倦也臨川王氏曰表記曰祭極敬不繼之以樂祭義曰祭之日樂與哀半何以不同曰不繼以樂者樂之在身哀與樂半者樂之在親也金華應氏曰極者竭盡而無餘之辭繼者前竭而後承之謂蓋報本始通肹蠁莫重乎祭一毫不敬則曠而不接矣其可以樂而散其志乎正名分出政令者莫嚴於朝一事不辨則紊而不治矣其可以倦而懈於事乎不繼之者竭力以畢事而不敢以此終也講義曰謂之極敬則敬之所施特盡於此而始終當一於敬毋或繼之以樂樂則志於忘敬而非敬之極故也謂之極辨則辨之所施特盡於此而始終當一於辨毋或繼之以倦倦則志於忘辨而非辨之極故也子曰君子慎以辟禍篤以不掩恭以逺恥子曰君子莊敬日强安肆日偷君子不以一日使其躬儳焉如不終日子曰齊戒以事鬼神擇日月以見君恐民之不敬也子曰狎侮死焉而不畏也鄭氏曰篤厚也掩猶困迫也肆猶放恣也偷茍且也儳焉可輕賤之貌也如不終日言人而無禮死無時擇日月以見君謂臣在邑竟者狎侮死焉而不畏􅏸於無敬心也孔氏曰君子篤厚行於善道不使掩逼而被困迫也莊敬日强又廣明恭敬之事言恆能莊敬故德業日强安樂放恣則其情性日為茍且也君子常行善道不以一日之間使其身儳焉可輕賤如小人不能終竟一日也言不得長久也朝廷之臣每日朝君何得云擇日月故鄭知在邑竟或擇日出使在外或食邑别都見君須擇日月也既明君子恆行恭敬又明小人唯好狎侮言小人遞相輕狎侮慢相侵雖有死焉禍害而不知畏懼也橫渠張氏曰篤謂篤實篤實則自有光輝如何可掩與誠之不可掩其義同莊敬之事日欲勉强為之安肆奉養之事日欲偷且偷言不以為急也君子莊敬日强始則須拳拳服膺出於牽强至於中禮却從容如此方是為己之學德信則不怒而威狎侮雖死而不畏藍田吕氏曰慎篤恭三者皆行之敬也慎其行則寡過況於禍乎暴虎馮河死而無悔者不信而取禍者也篤其行則誠著何事於掩乎閒居為不善無所不至及見君子則掩其不善而著其善不篤而好掩者也恭其行則人敬則何事於恥乎侮人者人亦侮之不恭而近恥者也莊敬者人所難持非勉强日進則身不能以自立安肆人所易縱唯茍且日忘則欲不能以自制蓋莊敬主於禮安肆主於欲偷之為言茍且也如衛公子荆善居室始有曰苟合矣少有曰茍完矣富有曰茍美矣此之謂安肆日偷或以謂莊敬則日能自强安肆則日入偷惰然非君子之事義不可行由是二者故德義可尊進退可度不至於陵節犯分如不能容其身也儳讀如毋儳言之儳陵節犯分之謂也七日戒三日齊竭誠盡慎以事鬼神民猶以不見不聞為可欺也事君盡禮擇日月以見君民猶有不敬其上者故君子之使民敬必先斯二者人之所以狎侮者以其不足畏也至於死猶不知者有所恃而無所忌猶狎於水而溺於水也狃於不足畏卒至於可畏可不慎乎馬氏曰禍者起於微而生於人之所自忽故君子慎以避之篤者居其厚不居其薄處其實不處其華則輝光發於外而人之不能掩也恭則不侮不侮於人則人不侮於己故恭以逺恥莊敬所以自强而有進德之漸故莊敬日强强則有自立之意安肆所以自弃而有敗度之漸故安肆日偷夫唯莊敬日强安肆日偷故君子不以一日使其躬儳焉如不終日事鬼神擇日月見君齊戒互文以見之也石林葉氏曰慎以避禍者仁也篤而不掩者信也恭以逺恥者禮也事鬼神則致敬於幽者也故主言齊戒見君則致敬於明者也故主言日月嚴陵方氏曰莊敬日强者進於勤也安肆日偷者薄於怠也儳有競疾意君子之身常優游而不迫寬裕而有餘雖一日之間亦未嘗使其躬儳焉如不終日也而況終身者乎如不終日以其競疾而無樂於生之意故不終日也玉藻言將適公所宿齊戒則見君者非不齊戒周官言祭祀前期十日帥執事而十日遂戒則事鬼神者非不擇日月而此以鬼神言齊戒於君言日月者蓋齊戒在人日月在天神道至幽故主言在人者以明之君道至明故主言在天者以神之亦各有所當也且神道至幽人之於神不可瀆也必有事焉然後齊戒故鬼神必言事而不可以言見君道至明臣之於君無適而非事也必欲見之乃擇日月故君止言見而不必言事雖然在朝之臣則皆見君矣而此乃言擇者先儒謂在邑竟是也書曰德盛不狎侮蓋德盛者有道之士也唯有道之士乃能尊主故狎侮之人雖死不畏也延平周氏曰莊敬日强可以言君子安肆日偷亦言君子者謂雖為君子果莊敬則日入於强或安肆則日入於偷廬陸胡氏曰儳焉云者輕賤貌要之皆謂非禮也如不終日謂君子常惕言恐失禮不能終一日行之也狎侮人則民不敬雖懼之以死不畏則受死有甚於死矣講義曰放辟邪侈無不為己者必陷於死凡以其不知所謂慎蓋禍福無門惟人所召無不自己求之者君子所以辟禍不出於慎以戒懼而已行矣而不著焉習矣而不察焉終身由之而不知其道者衆也凡以其不知所謂篤蓋誠則形形則著著則明君子所以不掩不出於篤以力行而已言輕則招憂行輕則招辜貌輕則招辱凡以其不知所謂恭蓋動容貌則斯逺暴慢正顔色斯近信出辭氣斯逺鄙倍君子所以逺恥不出於恭以不侮而已禮義者所以固人肌膚之會筋骸之束也由禮義而自强者其色則莊而無怠惰之容其心則敬而無怠惰之思由是而充之其志日强而足以有思其力日强而足以有為以之終身蔑有不濟者故曰莊敬日强舍禮義而自弃者恬於燕適而不知安者之敗名樂於放縱而不知肆者之敗禮於道則茍且日偷而不進於事則茍且日偷而不治以之終身蔑有濟者故曰安肆日偷是以昔之言所貴於勇敢者貴其能行禮義也金華應氏曰君子經德不回非以正行則其戒謹篤恭皆非有為而為之也豈區區於避禍患防掩恥乎記禮之言亦以曉人知避困辱之道耳收斂則精神內固操存則血氣不浮故曰進於强宴安則物欲肆行縱肆則膚體懈弛故曰趨於偷儳者參錯不齊之貌心無所檢束而分離散亂遂至儳焉錯出外既散亂而不整內亦拘迫故如不終日也君子主一以直內而斯須無不莊不敬之態則心廣體胖泰然自適何至於如不終日乎子曰無辭不相接也無禮不相見也欲民之毋相褻也易曰初筮告再三瀆瀆則不告鄭氏曰辭所以通情也禮謂贄也春秋傳曰古者諸侯有朝聘之事號辭必稱先君以相接也瀆之言䙝也孔氏曰前明小人狎侮至於死亡此明君子無相䙝瀆言朝聘㑹聚必有言辭以通情意贄幣之禮以示己情引易蒙卦辭證無相䙝瀆之義藍田吕氏曰辭者相接之言如公與客宴曰寡人有不腆之酒以請吾子之與寡人須臾焉使某也以請之類是也禮者相見之摯如羔鴈雉鶩之類也必以辭必以禮者交際不可苟也茍則䙝䙝則不敬此交所以易疏也筮之道貴於初筮而不敢再三至敬而不䙝者也鬼神且將告之況於人乎賔主慎於交際不敢茍且亦敬人之道也事君數斯辱矣朋友數斯疏矣此之謂乎嚴陵方氏曰無辭不相接欲其有相接之名也無禮不相見欲其有相見之文也有名以正之有文以章之則豈有相䙝者乎禮重於辭而見親於接瀆有汚意䙝有近意則䙝不若瀆之為甚也子言之仁者天下之表也義者天下之制也報者天下之利也子曰以德報德則民有所勸以怨報怨則民有所懲詩曰無言不讎無德不報太甲曰民非后無能胥以寧后非民無以辟四方子曰以德報怨則寬身之仁也以怨報德則刑戮之民也鄭氏曰報謂禮也禮尚往來懲謂創艾讎猶答也太甲湯孫也書以名篇胥相也寬身之仁亦當言民孔氏曰自此至無失一節總明仁義之事仁是行之盛極故為天下之儀表義宜也制謂裁斷謂裁斷於事也引詩大雅抑之篇證相報之義引太甲以證君臣上下各以其事相報也藍田吕氏曰此一章泛論仁義仁義者人性之所固有賢不肖之所同也然私欲勝之能勿喪者寡矣故聖人之教立仁以表之使天下知所向而於行得所勉立義以制之使天下知所取而於事得所處報者德怨往來人情所不能無使之交際且有勸懲則利用出入民咸用之矣故曰仁者天下之表義者天下之制報者天下之利天下有道所謂德怨之報者皆出天下之公而已有德於民者民欲報之以官有功於民者民欲報之以賞因民所欲官之賞之所謂以德報德知所勸矣傷人者民欲報之以刑賊人者民欲報之以殺因民所欲刑之殺之所謂以怨報怨民知所懲矣若夫民之私德豈無相報哉唯不可使懷私恩者廢公議復私讎者亂國法而已詩曰無言不讎無德不報則言與德無有不報也太甲曰民非后無能胥以寧后非民無以辟四方則上與下亦有相報也以德報怨雖過乎寬而夲於厚未害其為仁也以怨報德則反易天常天下之亂民法所當誅者也君子欲蹈乎中庸則莫如孔子所謂以直報怨以德報德也以直報怨視如國人而已彼賢當進吾不敢以怨而蔽之彼罪當刑吾不敢避怨而宥之懷怨而重之是亦愛而知其惡憎而知其善之義嚴陵方氏曰仁足以長人故曰天下之表義足以方外故曰天下之制表猶君子表微之表制猶聖人制行之制仁義之表制而繼之以報之利則報者禮也曲禮曰太上貴德其次務施報又曰禮尚往來則報之為禮固明不曰禮而曰報者以禮不止於報故也以德報怨則忘人之怨忘人之怨雖不足以有懲而衆將德之而有裕矣故曰寬身之仁也以怨報德則忘人之德忘人之德既不足以有所勸而衆且怨之而不容矣故曰刑戮之民也馬氏曰仁為天下之表而不傷乎愛者有義以裁之也義為天下之制而不傷乎制者有仁以為本也言仁義而繼之以報者天下之利何也蓋仁者義之本義者仁之節而禮者節於仁義也凡此者皆相因之理也以德報怨以怨報德此皆釋報者天下之利之意所謂報者非必報之以善隨其善惡之所在而有以報之也德有得於己則必報之以德然後民知有所勸怨有得於己而必報之以怨然後民知有所懲蓋言有得失則必讎德有凶吉則必報民非后無能胥以寧視民有德於后而必報之后非民無以辟四方則是后有德於民而必報之此上下之報也君之於民時使薄斂此上有以報於下民之於君也出死斷忘而不偷此下有以報於上也以德報德禮也以德報怨非禮也雖其非禮而能以寬自居故謂之寬身之仁也寬裕者仁之作而非仁之盡也山陰陸氏曰孟子曰道二仁與不仁而已其所謂義者制此者也故曰義者天下之制也所謂禮者於此有往來焉故曰報者天下之利也仁亦多術也以德報怨是為寬身之仁而已故或問以德報怨何如孔子曰何以報德以直報怨以德報德延平黃氏曰以德報德者仁也則民有所勸故為天下之表以怨報怨者義也則民有所懲故為天下之制有所勸則民知德而不陷乎惡有所懲則民知法而不陷乎罪故為天下之利夫以仁義表制天下其利如此而況下化而為仁義哉其利不可勝用也主義而言則利在其中焉主利而言非特其利不可必得也義已喪矣義喪而得利則有能奪之者何足計哉橫渠張氏曰報者天下之利率德而致善有勸不善有沮天下之利也黃氏曰此言以德報怨謂小人有小怨微隙當以理恕唯父母兄弟交親之怨不報則虧孝義之行焉儻小怨微隙君子不以德消而一一讎報往來不息必深結仇讎豈非傷教害義哉君子情以恕人慎以避禍小怨微隙以德消之亦寬身之仁道者也子曰無欲而好仁者無畏而惡不仁者天下一人而已矣是故君子議道自己而置法以民子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者强仁鄭氏曰一人而已喻少也仁有三謂安仁利仁强仁也利仁强仁功雖與安仁者同本情則異功者人所貪也過者人所辟也在過之中非其本情者或有悔者焉孔氏曰凡人好仁皆有所欲今無所欲而好仁凡人惡不仁皆有所畏今無所畏而惡不仁如此者少也君子議道先自己而始己所能行乃施於人故云置法以民與仁同功言三者之功俱是博愛各有一種未可知也過謂利之與害遭遇利害之事其行仁之情則可知矣橫渠張氏曰無欲好仁無畏惡不仁天下一人而已唯責己一身為當然耳一人而已責己也仁難成故置法以防民非而不責人以道耳藍田吕氏曰無欲而好仁無畏而惡不仁所謂性之者也安仁者也天下一人而已夫子自道也與下所謂中心安仁者天下一人而已其義同也則非聖人不足以性仁苟志於仁矣無惡也則衆人皆可以為仁以聖人之所性而議道則道無不盡以衆人之可為而制法則法無不行雖然法非貶乎道者也君臣父子倫類形名之閒性命之理具焉雖有未能上達猶庶幾乎弗畔此衆人之所能及也仁者安仁無欲而好仁無畏而惡不仁者也知者利仁有欲而好仁者也畏罪者强仁有畏而惡不仁者也三者之功歸於仁而其情則異此堯舜性之湯武身之五霸假之所以異也功者人所貪也假之者有之故齊桓公九合諸侯一匡天下湯武之舉不過乎是而其情則不同故其仁未可知也過者人所避也有不幸而致焉故周公使管叔監殷管叔以殷畔過於愛兄而已孔子對陳司敗問昭公知禮過於諱君而已皆出乎情而無僞故其仁可知延平周氏曰無欲而好仁者仁之至也無畏而惡不仁者義之至也無欲而能好無畏而能惡者天下一人而已矣以其無欲而能好無畏而能惡者天下常寡故君子議道則以己而置法則必以人蓋無欲而好仁無畏而惡不仁者己之所能以己之所能而議道則可以合道有欲而好仁有畏而惡不仁者民之所能以民之所能而置法則法之所以易行者也嚴陵方氏曰所好生於無欲所惡生於無畏非中心安仁者則不能也故曰天下一人而已以安仁之難且寡若是固不可以是而責人矣故君子則議道自己而置法以民也道妙而難知故以己所能而議之法粗而易曉故以民之情而置焉論語所謂躬自厚而薄責於人者其謂是也自者自此而之乎彼之詞以者以彼而用於此之詞與仁同功其仁未可知者以其三者之情雖異及其成功則一而未知其孰為仁者之功也與人同過然後其仁可知者論語曰人之過也各於其黨觀過斯知仁矣正謂是也仁者之為仁猶之生於陵者安於陵而已故曰安仁知者之為仁知仁之為己利則為之知不仁之為己害則不為也故曰利仁畏罪者之為仁畏不仁之詒罪則戒而惡之欲仁之為功則强而好之故曰强仁虙氏曰多欲而好仁則仁特所好之一物耳其他所好未必仁也如是者必其他所欲不勝於其好仁之多而後能為君子則其於所好之類能無慎擇而為之齊量乎無畏而惡不仁亦若是也如是而於其好惡之間常兢兢然唯恐彼重於此而不足勝於彼也是賢人之事也若夫無欲而好仁則所好無非仁自仁之外别無他好是雖聲色列其左貨財列其右而吾無好也所好者仁而已無畏而惡不仁則所惡無非不仁自不仁之外吾無他惡是雖白刃在前鼎鑊在後吾無惡也所惡者不仁而已如是則縱心於好惡之間非聖人孰能之是道也聖人議之可也以是而强之民則驚且惑矣故置法以民馬氏曰道者法之原法者道之流唯其所成之功則一故與仁同功其仁未可知也至於與仁同過然後其仁可知也蓋過者人所避唯仁者受之而不辭至於利仁强仁者不能無悔也故同過然後知仁山陰陸氏曰置法以民謂之置意在弗用若所謂安仁乃所謂仁也故曰仁者安仁即利仁强仁雖與仁同功情有不同也與仁同功易與仁同過難與仁同功雖僞未辨若周公孔子之過可謂仁矣仁者右也道者左也仁者人也道者義也厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親道有至義有考至道以王義道以霸考道以為無失鄭氏曰右也左也言相須而成也仁多則人親之義多則人尊之道有至下脫一有字有至謂兼仁義者有義則無仁矣有考考成也能取仁義之一成之以不失於人非性也孔氏曰人右手用之便左稍劣也有至謂兼行仁義行之至極也考道謂或取仁或取義之一事勉力成之義道以霸若齊桓晉文無失言不違於理也河南程氏曰亨仲問仁右也道左也仁者人也道者義也如何曰本不可如此分别然亦有些子意思又問莫有輕重否曰却是有陰陽也此却是儒者說話如輕解只是弄文墨之士為之橫渠張氏曰仁通極其性故能致養而靜以安義致行其知故能盡文而動以變又曰義仁之動也流於義者於仁或傷仁體之常也過於仁者於義或害又曰義道以霸此語得義甚淺如以仁愛便謂之仁以不為不是便謂之義所涉皆淺也仁道有本近譬之於身推以及人乃其方也必欲博施濟衆廣之天下施之無窮必有聖人之才能𢎞其道考求過失以免罪戾者畏罪之仁也故曰考道以為無失薄仁厚義薄義厚仁非論仁義之至語其偏者虞夏之道仁義不偏故親而尊長樂劉氏曰右上則左下右尊則左卑其位雖殊其用未始不相須以成其德也道者禮義知信之總名也五常之道皆出於生民之性然而必先乎仁以為行己之本然後道從而成之故曰仁者右也道者左也左右相成則有本有用矣是立人之德仁以為先立道之方義以為主故曰仁者人也道者義也江陵項氏曰仁者右也道者左也仁者人也道者義也此亦難通當以下兩句為解仁即人身也道即義理也人身能行仁義故為右右用力也義理不能自行待其人而後行故為左左不用力也藍田吕氏曰右者人所有事左者居於不用之地而助右之所不及也仁者人之體也將有為也將有行也非仁不可也故曰仁者右也又曰仁者人也道者天之理也仁至於不可行不可不節則理有所不得己以助人之所不及者義也故曰道者左也又曰道者義也仁莫隆於父子父子之道親親也義莫重於君臣君臣之道尊尊也厚於此則薄於彼厚於彼則薄於此唯知其所以為左右則尊尊親親並行而不相悖無厚薄之間矣道有至義有考先儒云當言道有至有義有考脫一有字其義為然至道者至於道之極不可以有加也所謂所過者化所存者神上下與天地同流者也故曰至道以王義道者揆道而裁之者也所謂制節謹度是可以有國而長諸侯者也故曰義道以霸考道者必稽古昔稱先王所謂非法不言非道不行雖未達道不能以義起亦庶幾乎不失道矣石林葉氏曰仁者右也道者左也仁者人也道者義也此孟子所謂仁者人也合而言之道者也道與仁蓋相須而成猶之左右也人之四體左手足不如右强道者其全常處於無所用之地故言左仁者資於道以為用者也常為道之役故言右仁反於道則為一道顯於仁則為二故自仁言之盡人道者莫如仁此之謂仁者人也以仁為人則道者離乎人而藏乎天謂之天可也古之言道必兼義易曰和順於道德而理於義又曰成性存存道義之門蓋道不可獨見道之所見必有義焉故曰道者義也仁言人則道為天可知道為義則仁為道可知二者蓋相備譬之曰顯諸仁藏諸用者聖人立言之法大抵類此又曰道以仁為用故言右仁以道為體故言左足乎仁則人道備故言人人而有義則人道立故言義左右者離而言之也仁義者合而言之也仁義一本而有厚薄者時與事異也以事親從兄而言仁義之實則尊親之義者蓋亦有焉仁為人道之至故三代得天下以仁則所謂至道以王義者制事而有宜五霸假仁而近義則所謂義道以霸仁義不足於己而能考合於道而行之則亦無失於己蓋王霸之道有以得民而無失者得己而已馬氏曰仁者人之所親而右者便於用亦人之所親道者人之所尊而左者不便於用亦人之所尊仁者人之安宅義者人之正路夫唯仁為右而右者人之所親故厚於仁而薄於義親而不尊義為左而左者人之所尊故厚於義而薄於仁尊而不親各以其所隆者而言之耳道有至有義有考此言道之目也至道以王義道以霸此言道之效也考道非體道者也唯稽考而已矣故考道止於無失先至而後我先義而後考此優劣之序嚴陵方氏曰仁有所愛義有所制厚於此者必薄於彼君子之於仁義亦兩全之而已何厚薄之有道合則渾離則散方其渾也則實三以為一及其散也則裂一以為三唯其裂一以為三故有至義考之别焉言至以知義之為次言義以知仁之為至臨川王氏曰可以相勝者仁義也故厚於仁而薄於義則親而不尊厚於義而薄於仁則尊而不親不可以相勝者禮樂也故曰樂勝則流禮勝則離仁義相勝則相治禮樂相勝則相賊山陰陸氏曰人之所以成位乎其中者仁也厚於仁者薄於義厚於義者薄於仁君子取適其中而止道無失有至不至義不能無失於是有考焉至道以王義道以霸者齊一變至於魯魯一變至於道近之矣若桓文之霸不能無失以不知考道之過講義曰厚於仁者薄於義非以仁故滅義也方其事當以恩為主則敬有時而不得與之並施特仁有餘而義不足耳是以及其至也親之而已尊不與焉厚於義者薄於仁非以義故滅仁也方其事當以敬為主則恩有時而不得與之偕行特義有餘而仁不足耳是以及其至也尊之而已親不與焉二者非固為不同也仁義備具㑹逢其適如何而已考之於仁而仁有不合若不重傷禽二毛之類非先王所謂仁也考之於義而義有不通若淫刑以逞惟戮是聞之類非先王所謂義也則所謂考道者考諸三王而不繆若是上不足以王下不足以霸以保其國不失為幸建安真氏曰道者五常百行之總名而義者當然之正理也人之求道何所自入惟於理之當然者由之而無所悖焉則道在是矣道以體言義以用言用無不盡則體在其中非二致也金華應氏曰至道即仁也至道渾而無迹故得其渾全精粹以為王義道嚴而有方故得其裁割斷制以為霸盡稽考之道而事不輕舉焉亦可以無失矣廬陵胡氏曰至謂由仁義行臻其極也有義謂仁不足也有考謂雜仁義之名成之也仁義歸往曰王故至道以王湯武是也不粹而駮曰霸故義道以霸五霸是也雜王霸道成名以不失天下故考道無失漢文景唐太宗是也子言之仁有數義有長短小大中心憯怛愛人之仁也率法而强之資仁者也詩云豐水有芑武王豈不仕詒厥孫謀以燕翼子武王蒸哉數世之仁也國風曰我今不閲皇恤我後終身之仁也鄭氏曰資取也數與長短小大互言之耳性仁義者其數長大取仁義者其數短小芑枸檵也仕之言事也詒遺也燕安也蒸君也言武王豈不念天下之事如豐水之有芑矣乃遺其後世之子孫以善謀以安翼其子也君哉武王美之也閲猶容也皇暇也恤憂也言我今尚恐不能自容何暇憂我之後人乎孔氏曰自此至不稱其服更廣明仁義之道中心憯怛天性自仁者也率法而强之取仁而行者也引大雅文王有聲美武王之詩以證性仁者其數長武王行仁遺及子孫故曰數世之仁芑即今枸芑也又引邶國風谷風之篇證取仁而行唯在一身何暇憂及後世是終身之仁也藍田吕氏曰此章言仁之難成唯君子勉之有道則不難成仁有數者仁為器重為道逺隨其所舉之多寡所至之逺近皆可以謂之仁故管仲之功微子之去箕子之囚比干之死皆得仁之名語仁之盡則堯舜其猶病諸此仁所以取數之多也中心憯怛仁發於性者也率法而强之外鑠於仁者也發於性者誠心感動無待於外鑠也外鑠者循仁之迹而勉焉者也以其誠心愛人故曰愛人之仁以其有取於外故曰資仁此所發淺深之數也數世之仁終身之仁此所施逺近之數也故曰仁有數義有短長小大者義無定體唯其所宜而已宜長則長宜短則短宜大則大宜小則小如孔子可以仕則仕可以止則止可以久則久可以速則速禮有以髙為貴者有以下為貴者有以大為貴者有以小為貴者之類是也故曰義有長短小大此章論仁而及義者蓋仁之數是亦義也嚴陵方氏曰仁者人也凡為人者莫非以仁故其取數常多義者宜也長短小大物各有宜以義度之則無不可者矣故其言如此中心憯怛仁之根於內者也率法言循法循法而不違仁焉仁之資於外者也根於內則始於外人而未至於愛物資於外則止於强仁而未至於利仁此其數見於內外者也馬氏曰數世之仁此數之多也終身之仁此數之寡也義者依於仁而為之節仁之數多者則其節長仁之數寡者則其節短是以下言仁而不言義則義在其中矣中心憯怛此愛之由中出也愛由中出則推其所愛以及仁故曰愛人之仁也言愛人則愛己者可知也率其在外之法而勉强以為之非中心之所欲而愛自外入也愛自外入則資以成己也且自愛猶不足愛人足乎哉豐水有芑出於自然武王所以有事天下亦出於自然蓋由仁義行而非行仁義也故詒厥孫謀以燕翼子此與中心憯怛愛人之意同我躬不閲遑恤我後此與率法而强之資仁之義同山陰陸氏曰言仁有數以著義有度言義有長短小大以著仁有多寡逺近若愛人之仁終身之仁數世之仁是之謂數至誠則僭怛出於自然與率法而强之者異矣武王豈不仕言武王豈非仕哉然則詒厥孫謀以燕翼子其仕也異乎人之仕也我躬不閲遑恤我後非不欲念後也不得已也以今易躬言不念後據今而已即後有閲復將念之為其念之也故言之故曰終身之仁也如以辭而己是忍也孟子曰說詩者不以文害辭不以辭害志金華應氏曰豐水之芑喻人才之富也武王豈不欲亟用之乎其栽培涵養而不盡用者乃貽孫謀以燕其翼致之子耳石林葉氏曰仁大者不可以盡名則言有數義出於仁者也故言長短小大長短言其裁制也小大言其區别也憯怛以愛人則自然者也率法以資仁則使然者也四明沈氏曰親親而仁民仁民而愛物此仁有數也仁所以能有等級者為義有長短大小也墨氏知仁而不知義故兼愛無等禮器曰義者藝之分仁之節也不可分仁義說禮記集說卷一百三十七
