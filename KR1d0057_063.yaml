body:
  text: 禮記集説卷六十三宋衛湜撰郊特牲第十一孔氏曰案鄭目録云名曰郊特牲者以其記郊天用騂犢之義此於别録屬祭祀嚴陵方氏曰禮莫重於祭祭莫重於郊而郊以養牲為重故此篇言禮以郊特牲為首因名其篇焉郊特牲而社稷大牢天子適諸侯諸侯膳用犢諸侯適天子天子賜之禮大牢貴誠之義也故天子牲孕弗食也祭帝弗用也鄭氏曰犢者誠慤未有牝牡之情是以小為貴也孕任子也易曰婦孕不育孔氏曰自此至降尊以就卑文承禮器之下覆説以少為貴之事郊謂於南郊祭感生之帝但天神至尊無物可稱故用特牲郊與配坐皆特牲故鄭下注云養牲必養二又召誥云用牲於郊牛二是也社五土總神稷是原隰之神功及於人人賴其功故以大牢報祭其牲則黝色也天子巡守至諸侯之國諸侯致膳於天子則用犢諸侯朝天子天子賜之禮則用大牢郊之特牲亦犢也經言社稷大牢以明郊用特牲言諸侯大牢以明天子用犢顯其貴誠之義也此以郊祭名篇案鄭氏謂天有六天丘郊各異指其清虛之體則一論其五時生育之功則有五以五配一故為六天據其在上之體謂之天因其生育之功謂之帝賈逵馬融王肅等以五帝非天其義非也鄭以郊丘為二者案大宗伯云蒼璧禮天典瑞又云四圭有邸以祀天是玉不同宗伯又云牲幣各放其器之色則牲用蒼也祭法又云用騂犢是牲不同也又大司樂云凡樂圜鍾為宫至姑洗為羽冬日至於地上之圜丘奏之上文云乃奏黃鍾歌大吕舞雲門以祀天神是樂不同也故鄭以為蒼璧蒼犢圜鍾為祭圜丘所用以四圭有邸騂犢及奏黃鍾為祭五帝及郊天所用圜丘比郊則圜丘為大若以郊對五時之迎氣則郊為大凡祭天其服皆大裘周禮司服文其尸服亦大裘故節服氏云裘冕送逆尸是也其樂除圜丘所用圜鍾為宫之外皆奏黃鍾歌大吕大司樂云以祀天神鄭注天神謂五帝及日月星辰是也王者又各以夏正月祀其所受命之帝於南郊其玉圜丘用蒼璧夏正郊天用四圭有邸其五時迎氣東青圭南赤璋西白琥北玄璜中央亦用黃琮或用赤璋其牲幣各放其玉之色天色雖玄逺望則蒼故用蒼犢也其祭天之器則用陶匏陶瓦器以薦菹醢之屬其祭天之處冬至則祭於圜丘圜丘所在雖無正文應從陽位當在國南五時迎氣則在四郊其圜丘之祭初先燔柴及牲玉於丘訖次乃掃丘下而設正祭若夏正及五郊初則燔柴及牲玉於壇故祭法云燔柴於泰壇祭天也次則於壇下掃地而設正祭故禮器云至敬不壇掃地而祭是也其所配之人虞夏殷周用人各異文具祭法周人則以嚳配之祭法禘嚳是也其感生之帝則以后稷配之五時迎氣及雩祭則以五方人帝配之九月大饗五帝則以五人帝及文武配之以文王配五天帝則謂之祖以武王配五人神則謂之宗祖宗通言故祭法云祖文王是稱祖孝經云宗祀文王是稱宗文王既爾則武王亦有祖宗之號也其社稷與神州樂用大蔟與應鍾故大司樂云乃奏大蔟歌應鍾以祭地祇其玉神州則用兩圭有邸其社稷玉當與神州同其服社稷則絺冕案皇氏曰天有六天歲有八祭冬至圜丘一也夏正郊天二也五時迎氣五也通前為七也九月大饗八也雩與郊禖為祈祭不入數其圜丘之祭祭日之旦王立丘之東南西嚮燔柴及牲玉於丘上升壇以降其神次又奏圜鍾之樂六變以降其神天皇為尊故有再降之禮次則掃地而設正祭置蒼璧於神坐以禮之其在先燔者亦蒼璧也次則薦血腥祭天無裸故鄭注小宰云唯人道宗廟有裸天地大神至尊不祼莫稱焉然則祭天唯七獻也故鄭注周禮云大事於太廟備五齊三酒則圜丘之祭與宗廟祫同朝踐王酌泛齊以獻是一獻也后無祭天之事大宗伯次酌醴齊以獻是為二獻也王進爵之時皆奏樂但不皆六變次薦孰王酌盎齊以獻是為三獻也宗伯次酌醍齊以獻是為四獻也次尸食之訖王酌朝踐之泛齊是為五獻也又次宗伯酌饋食之醍齊以獻是為六獻也次諸臣為賔長酌泛齊以獻是為七獻也以外皆加爵非正獻之數其尸酢王以清酒酢宗伯以昔酒酢諸臣以事酒其祭感生之帝則當與宗廟禘祭同其五時迎氣與宗廟時祭同也長樂劉氏曰鄭氏之説引小宗伯兆五帝於四郊又引司服王祀昊天上帝則大裘而冕祀五帝亦如之是皆正經也而謂天為有六則誤矣天地之道隂陽二氣而已冬至而陽長則隂消於上而入於地中夏至而隂長則陽消於上而入於地中方其消長則二氣上下交合有敘而四時由之生焉故萬物資始於乾元者陽在地中也萬物資生以坤元者陽在地上也是以春生夏長秋實冬藏品彚於斯各正性命聖人受命於天資於萬物以養兆民不敢忘乎其所自也遂即圜丘以祀昊天上帝者報本也兆於四郊以祀五帝者迎時氣也報本所以神天之道必有宰而御之者故曰昊天上帝迎氣所以神天之時以其應候晷刻差故曰五方帝六者無形也而萬物賴其生成之功無位也而聖人代其柄任之命雖欲神而報之莫知其神之所在也故望其昊昊然則圜丘報本之義生焉望其五方之色則兆於四郊之禮作焉亦猶宗廟一祖也而六饗行焉故天雖曰神地雖曰祇亦強名而神之者也何以知其然哉謹案大司樂之職云乃分樂而序之以祭以享以祀乃奏黃鍾歌大吕舞雲門以祀天神若夫地示則與四望也山川也各異其樂天神至尊一樂而已明其神之不二也又大裘而冕圜丘五兆不異此服示其同也聖人之意其在兹乎山隂陸氏曰郊丘異祭六天之論起於鄭氏郊丘同祭一天之論起於王氏是其説不一久矣故豫合而以理折焉蓋先王之制也天固有六而祭實無異此不易之理也大宗伯之職曰以禋祀祀昊天上帝司寇之職曰禋祀五帝則戒之日涖誓百官司服曰王祀昊天上帝則服大裘而冕祀五帝亦如之典瑞曰四圭有邸以旅祀上帝其祀同曰配天其祭同曰禋祀其服同用大裘其玉同用四圭有邸是則六天之證也然自其體而言之則曰天自其德而言之則曰帝其實一也故古者天與五帝通謂之天通謂之帝又通謂之上帝易曰雷出地奮豫殷薦之上帝以配祖考則是六天同謂之上帝明矣周禮曰以冬日至致天神又曰凡樂圜鍾為宫黃鍾為角冬日至於地上之圜丘奏之郊特牲曰郊之祭也迎長日之至也又曰周之始郊日以至則是同祭之證也特以其所在言之則謂之郊以其所祭言之則謂之丘其實一也或曰古之人謂圜丘之祭玉用蒼璧牲用蒼犢樂用圜鍾而南郊之祭其玉四圭有邸其牲騂犢其樂黃鍾同祭信矣然牲玉各殊所用之樂亦各不同何也聖人之制祭有降神之牲又有祀神之牲有禮神之王又有祀神之玉有降神之樂又有祀神之樂夫豈一端而已亦各有所當也書曰植璧秉圭植璧者置之所以禮神也秉圭者執之所以祀神也黃鍾祀神之樂也故曰乃奏黃鍾以祀天神圜鍾降神之樂也故曰凡樂圜鍾為宫冬日至於圜丘奏之天神皆降又曰蒼璧禮天則蒼璧者禮天之玉也四圭有邸以祀天則四圭有邸者祀天之玉也郊特牲曰牲用騂尚赤也用犢貴誠也牲用蒼犢所以祀神牛人所謂祭祀共其享牛是矣蓋祀神之牛謂之享牛也牲用騂犢所以降神牛人所謂祭祀共求牛是矣蓋降神之牛謂之求牛也牲王雖異所用之樂雖各不同不害其為同祭也餘見祭法燔柴於泰壇解又曰據此牲孕弗食也祭帝弗用也祭天容或之少用牝犢也蓋今用犢甚少尚患難得其殺時不令母見始能割愛不爾不復食草鳴喚至死乃已傳所謂猶懷老牛舐犢之愛豈虛言哉經曰天地之牛角繭栗今云牲孕弗用則天地之牛不能用牡亦不皆繭栗其所謂繭栗與牡正也公羊傳曰魯祭周公何以為牲周公用白牡魯公用騂剛羣公不毛羣公不毛雖曰少貶亦用其騂有不能給由是觀之雖周宗廟亦有通法存焉蓋聖人有以見天下之動而觀其會通以行其典禮宜如此金華唐氏曰先王祀天之禮見於經傳甚明而諸儒異説矛盾制始不明唯參考而公取之則坦然可舉大抵常禮嵗九郊雩明堂圜丘兆帝於四郊也變禮有旅有類造有禱祠有柴望有告有用牲稽經可歷考也夏正之月祈榖於上帝詩之噫嘻郊特牲之迎長日春秋書郊左傳啓蟄而郊是也夏祈榖於上帝詩之噫嘻月令大雩帝春秋書大雩左傳龍見而雩是也季秋大饗上帝五帝於明堂詩之我將月令大饗帝孝經宗祀文王於明堂是也冬至日祀天於圜丘詩昊天有成命大司樂於地上之圜丘奏之冬至之日登觀臺以書雲物禮器用吉土以饗帝於郊是也兆五帝於四郊則小宗伯所掌月令迎氣是也此則歲凡九祭皆祀天神鄭氏之説是矣然五帝於昊天同稱帝不與昊天同稱天六天之説出於讖緯不攻自破矣王肅謂祭天歲二冬至祭天春祈農事而已迎氣明堂皆祭人帝若此則噫嘻祈榖我將天右孝經配上帝周禮禋祀五帝皆非祭天可也肅之為説又不通矣參而取之一天六帝歲有九祭常禮之不可易者也若其變禮則大故有旅大宗伯國有大故則旅上帝禮器大旅具矣是也師役有類造肆師類造為位泰誓類於上帝是也旅陳類聚則合上帝而一祭焉者也大災有禱祠肆師禱祠於上下神祗雲漢上帝不臨春秋大雩書旱之類是也巡狩有柴望舜典至于岱宗柴詩時邁禮器升中於郊特牲適四方先柴是也至於軍有四類伐有告革命有柴作邑有用牲亦是天子變禮也就陽故於國南郊因天故於圜丘至敬故掃地燔柴故於泰壇此冬祀祈榖之所同也蒼璧牲幣放其色樂以圜鍾為宫所以禮之也四圭有邸牲用騂樂奏黃鍾所以祀之也大圭素車大裘陶匏稿秸蒲越犧尊疏布冪觶杓大羮用犢重誠質也鎮圭五路大常璪十有二旒被衮畫布冪彞或明天道又以致其文焉夫事天之禮豈一而足哉先儒以圜丘蒼璧為冬祀南郊四圭為春郊大裘無旒乘素車被衮為魯禮祭天無祼不用彝皆考之未詳者也禮神之牲幣玊則燔之祀神之牲玉則薦之降之而後禮禮之而後祀南言其方圜言其形大裘而冕則被衮矣素車王路乘之各有時亦兼文質而已秬鬯以事上帝大旅陳奠彝則雖無祼酒設彞故酒正言五齊三酒以實八尊而冪人疏畫亦通祭祀言之為可考矣大旅張氊案設皇邸祀五帝則張大次小次設重帟重案昊天上帝亦張設之為可知矣大報天而主日故典瑞言搢大圭執鎮玉以朝日掌次言朝日祀五帝則行於郊祀可知非實柴圭璧之祀矣祀五帝沃尸盥則郊祀有尸矣然裘冕二人執戈送逆尸則尸乃配侑之尸歟魯之所用郊雩也其見於經傳則詳矣郊用夏正魯於四月失禮也雩用龍見月令於仲春秦書乎明堂兼饗五人帝侑以五官主於宗祀故於室堂而禮文於郊祀詩有牛羊似與用犢不合蓋配侑之大牢歟帝牛必在滌三月稷牛唯具則帝之牲與配牲容有不同矣郊配以稷明堂祀文王考之詩孝經明矣鄭以禘郊祖宗皆為配天以禘其祖之所自出與后稷所配皆為感生帝於經未有考也曰昊天上帝曰五帝則吾嘗聞之學者當信經讖緯不足惑也禮天地兆五帝器宜有七而六者兆於四郊則從四方之色而已古祭天之祀一歲凡九又有變禮非王者所盡行則有攝位之禮矣禮莫重於祀祀莫重於天故卜日誓戒具修皆致其嚴大饗不問卜者不遍問五帝云爾大宰言祀五帝前期十日師執事而卜日非不卜也常祀多分有時乎合大饗是也變禮多合有時乎分巡守柴望是也常禮則備變禮則略故曰大旅具矣不足以饗帝類造禱祠柴告則又略於旅矣有故則旅則存奠彞廞樂器豈非以其凶災邪類或用於禪或用於師柴或用於狩或用於軍其禮一也旅掌於大宗伯類造掌於小宗伯則其隆殺可知告與用牲則又其略矣雩有二龍見常也旱暵變也其禱一也魯之郊禘非禮也則大雩豈為得禮乎自郊徂宫則雩其旱禱之先歟作樂於豫亨於鼎立廟於渙均是事天而所因之時異也唯聖人為能饗帝仁人之事天如事親然則茍盡其事天饗帝之道則禮雖先王未之有可以義起也長樂陳氏曰大禮必簡則小禮必繁簡則內心而貴誠繁則外心而貴味此所以郊特牲而社稷大牢諸侯膳天子用犢而天子禮諸侯以大牢也蓋南郊所以祀天神北郊所以祭地祗其謂之郊則同而其所以用特牲亦同故周頌曰郊祀天地是天地之祀皆謂之郊也書曰用牲於郊牛二是天地之牲皆用特也又禮書曰五帝與昊天同稱帝不與昊天同稱天猶諸侯與天子同稱君不與天子同稱王周官祀五帝之禮有與天同以極其隆有與天異以致其辨故皆禋祀皆服大裘此其所同也祀帝於圜丘兆五帝於四郊此其所異也鄭氏之徒謂四圭之玉黃鍾大吕之樂夏正以祀感生帝於南郊蒼璧之玉六變之樂冬日至禮天皇大帝在北極者於圜丘天皇大帝耀魄寶也五帝大微之帝也分郊與丘以異其祀别四帝與感生帝以異其禮王肅嘗攻之矣然肅合郊丘而一之則是以五帝為人帝則非有天地則有五方有五方則有五帝月令五人帝伏羲神農黃帝少昊顓頊而已果以是為五帝則前此其無司四時者乎嚴陵方氏曰於郊故謂之郊言郊以知社稷之在國言社稷以知郊之為天地於牲言特以見大牢之非一於牢曰大以見特牲之用犢也特則牢所畜之物牢則牲所畜之地互相備也郊言特牲膳言用犢亦互相備也天子有天地之德故諸侯以事天地者事天子諸侯有社稷之功故天子以禮社稷者禮諸侯亦唯其稱而已郊用特牲而召誥言牛二者兼稷牛言之爾經言帝牛不吉以為稷牛蓋謂是矣禮器言天子祭天特牲王制言天子社稷皆大牢掌客言王巡守殷國則國君膳以牲犢王合諸侯而饗禮則具十有二牢其言正與此合凡此則尊者常小而少卑者常大而多故曰貴誠之義蓋誠在內而不在外故也天子牲孕弗食則諸侯容或食之言祭帝弗用則社稷容或用焉延平周氏曰言郊則天神與地祗也詩序曰昊天有成命郊祀天地也書曰用牲於郊牛二蓋一則用於南郊以祀天神一則用於北郊以祭地祗是天神地祗皆用特牲然則五帝與昊天同用特牲可乎五帝與昊天同用大裘而冕則同用特牲不亦可乎郊特牲以犢而社稷大牢不以犢諸侯膳天子以特牲而天子禮諸侯以大牢者但以貴誠為主蓋諸侯以事天者而事天子則足以崇其道天子以禮社稷者而禮諸侯則足以責其功也夫誠者純一而未散者也牲孕則散矣故天子弗食而祭帝弗用也馬氏曰郊者所以事昊天上帝社稷者所以祀土榖之神天子之德比於天諸侯之德比於社稷故天子適諸侯諸侯膳用犢諸侯適天子天子賜之禮大牢凡天下之物皆天之所生無物以稱其德故郊則以特天下之物皆天子之所有亦無物以稱其德故諸侯則膳之以犢社稷者土榖之神而諸侯為君守者也社稷以大牢則諸侯亦賜之大牢大路繁纓一就先路三就次路五就郊血大饗腥三獻爓一獻孰至敬不饗味而貴氣臭也諸侯為賔灌用鬱鬯灌用臭也大饗尚腵修而已矣鄭氏曰此因上説以少為貴者禮器言次路七就與此乖字之誤也血腥爓祭用氣也大饗饗諸侯亦不饗味也孔氏曰殷三路猶質對次路故稱先路每加以兩故次路五就禮器非加兩之差故鄭知為誤也餘見禮器郊血以下因貴少更説不貴味也所進血腥亦如禮器説至敬不饗味而貴氣臭此解郊血義血氣也夫孰食有味人道卑近事天冝極敬故用血也用血是貴氣而不貴味故云貴氣臭也宗廟敬降於天故用腥腥稍近味社又降於宗廟故用爓爓又稍近味諸侯為賔灌用鬱鬯者灌猶獻也謂諸侯來朝在廟中行三享竟然後天子以鬱鬯酒灌之也故大行人云上公王禮再祼而酢侯伯王禮一祼而酢諸子諸男王禮一祼不酢鄭注云王禮王以鬱鬯禮賔是也鬱鬯是臭故云灌用臭也此亦明貴氣之禮大饗尚腵修者謂諸侯行朝饗及灌以後而天子饗燕食之也上公則三饗三食三燕侯伯則再饗再食再燕子男則一饗一食一燕其行饗之時雖設大牢之饌於時先薦腵修於筵前然後始設餘饌故云尚腵修而已此亦明不饗味之義也長樂陳氏曰禮器與郊特牲言大路繁纓一就則同其言次路繁纓五就七就則不同者先王之路降殺以兩反此而加多焉蓋亦以兩而已大路一就先路三就則次路有五就七就者矣書言次路以兼革木二路則殷之次路五就七就庸豈一車邪鄭氏以禮器七就為誤是過論禮書又曰禮以全於天者為尤厚近於天者為差厚以近於人者為差薄全於人者為尤薄血者全於天者也腥者近於天者也爓者近於人者也孰者全於人者也郊與大饗常重於三獻之禮豈非至敬不饗味而貴氣臭哉鬱鬯陽物也腵修隂物也用隂物所以神之尚陽物所以明之而其所以不饗味一也夫大饗於神則王之事而大饗於賔則諸侯之事於神與賔皆謂之大饗者蓋謂之大所以極其禮謂之饗所以向之又曰明堂之禮事神也宗廟之禮明鬼也鬼神變化非饗不足以通之諸侯之朝為之飲以醉其德設之食以重其禮亦謂之饗何邪蓋饗於隂則幽明通而凡所謂饗神與鬼者皆所以通幽明者也饗於陽則上下通而凡所謂饗於人者皆所以通上下者也蓋明不通則幽不格上不通則下不懷此諸臣所以有饗合上帝五帝而饗謂之大合祖所自出而饗謂之大則凡稱饗帝饗先王者皆小也合諸侯而饗謂之大則凡稱饗耆老孤子者皆小也嚴陵方氏曰一獻孰則饗味矣味非不敬也特不若血腥爓之至爾經曰血腥爓祭用氣也以臭生於氣故此曰氣臭腵言捶肉如腵修則以薑桂修之諸侯為賔即大饗之時天子饗諸侯於廟中然非君三重席之饗也鬱鬯可以養陽腵修可以養隂養陽不以酒醴養隂不以犧牲則以所饗在臭而不在味故也山隂陸氏曰郊血言祭大饗腥言饗大饗饗諸侯也據此篇凡言大饗皆饗諸侯郊血有腥貴血大饗腥有爓貴腥三獻爓有孰貴爓一獻有孰而已故曰至敬不饗味而貴氣臭也荀子曰大饗尚玄尊俎生魚先大羮貴食飲之本也大饗諸侯如此用祭禮也灌用鬱鬯亦祭禮也周官所謂禮再祼而酢當此節用大饗尚腵修當饗禮九獻之節案諸侯初相見以鬯即大夫來聘禮之用醴聘禮曰賔祭脯醢以柶祭醴三庭實設是也醴已而出若諸侯出則奏肆夏以送之自不應用陔夏也其奏陔夏在其後饗之之日饗已而燕猶祭已而燕當是時雖奏陔夏可也故曰賔醉而出則奏陔夏且大饗尚腵修言而已則大饗所尚在此其餘尚尚其泛也蓋祭有等級郊用陶匏性也大饗尚腵修修為之事三獻爓一獻孰道學而已故曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝大饗君三重席而酢焉三獻之介君專席而酢焉此降尊以就卑也鄭氏曰言諸侯相饗獻酢禮敵也三獻卿大夫來聘主君饗燕之以介為賔賔為苟敬則徹重席而受酢也專猶單也孔氏曰此一節論尊卑之席此大饗謂諸侯相朝主君饗賔賔主俱是諸侯皆設三重之席而受酢焉三重席是諸侯禮而又稱君故知諸侯相饗下云降尊就卑之義是尊卑不敵故鄭云獻酢禮敵也三獻之介謂諸侯遣卿來聘卿禮三獻其副既是大夫與卿為介謂之三獻之介此介是大夫大夫席雖再重今為介降一席祗合專席主君若受此介之酢爵雖應合三重之席必徹去重席單席而受降諸侯之尊以就介之卑故也五等諸侯有九獻七獻五獻故五等諸侯之卿皆三獻也大夫卿之總號賔為茍敬燕禮記文長樂陳氏曰周官天子之席不過三重諸侯之席止於二重則國君之席三重者是殷之制也蓋夏殷之文雖不及於周之盛而禮之數有多於周之制則周於夏殷之席蓋益其文而損其數耳嚴陵方氏曰禮器言諸侯之席三重兩君相見則其體相敵故其席如其數而不必增損焉至於他國之卿來聘而大夫為之介焉位雖臣也命則君也名雖介也禮則客也其文雖殊其義則相敵故主君之受酢也降重席之尊而不與之異就專席之卑而必與之同也饗禘有樂而食嘗無樂隂陽之義也凡飲養陽氣也凡食養隂氣也故春禘而秋嘗春饗孤子秋食耆老其義一也而食嘗無樂飲養陽氣也故有樂食養隂氣也故無聲凡聲陽也鄭氏曰其義一也言義同而或用樂或不用樂也此禘當為禴字之誤也王制曰春禴夏禘孔氏曰此一節論饗禘食嘗有樂無樂之異饗謂春饗孤子禘謂春祭宗廟以其在陽時故有樂食謂秋食耆老嘗謂秋祭宗廟以其在隂時故無樂無樂為隂有樂為陽此隂陽之義也凡飲養陽氣食養隂氣者此覆釋上文饗有樂而食無樂之義以飲是清虛養陽氣故有樂食是體質養隂氣故無樂饗禘在春為陽食嘗在秋為隂禘之與嘗同是追慕饗之與食同是賞功其事無殊故云一也而食嘗無樂重結之也不言饗禘略可知也飲養陽氣食養隂氣覆釋上文也陽時為饗則有樂故知凡聲皆陽也依禮三代無春禘之文周則春曰祠王制夏殷之禮云春曰禴今云春曰禘故知禘當為禴此經所論謂夏殷禮也舉春見夏舉秋見冬若周則四時祭皆有樂故祭統云內祭則大嘗禘升歌清廟下管象是秋嘗有樂也案王制夏后氏養老以饗禮則夏家養老用春時有樂無秋食之禮殷人養老以食禮而秋時不作樂無春饗之禮周人修而兼用之則周人養老春夏用饗禮秋冬用食禮四時皆用樂故文王世子云凡大合樂必遂養老注云春合舞秋合聲下云養老之禮遂發咏焉登歌清廟是秋時養老亦用樂也橫渠張氏曰禘於夏周為春夏嘗於夏周為秋冬作記者交舉以二氣對互而言爾長樂劉氏曰春夏陽氣發育萬物於地上故有樂秋冬陽氣潛藏於地下故無樂順隂陽之義也陽主乎氣隂主乎形立天之道曰隂與陽在人為氣故飲以養之聲所以逹氣者也立地之道曰柔與剛在人為形故食以養之靜所以安形者也長樂陳氏曰饗禘以飲為主飲以天産而養陽氣故有樂食嘗以食為主食以地産而養隂氣故無樂蓋饗禘以春食嘗以秋春為陽秋為隂陽則來而主長隂則往而主成故禘之有樂所以迎來嘗之無樂所以送往春饗孤子以助其長秋食耆老以順其成凡皆順隂陽而已此與祭義言春禘秋嘗同而王制祭統則言夏禘秋嘗蓋夏殷之禮不同也又禮書曰冕而總干施於食禮而記稱食嘗無樂者考之於詩商頌言顧豫蒸嘗而有鞉鼓淵淵嘒嘒管聲小雅言以往蒸嘗而有鍾鼓既戒鼓鍾送尸則嘗有樂矣樂師饗食諸侯序其事令奏鍾鼓鍾師凡饗食奏燕樂籥師賔客饗食鼓羽籥之舞則食有樂矣其曰食嘗無樂非殷周之制也又曰先王老吾老以及人之老所以教天下之孝幼吾幼以及人之幼所以教天下之慈又況出身勠力而死於王事者在上有父祖在下有子孫棄而不養不足以報勞養不以禮不足以示勸故春饗孤子所以象陽之生秋食耆老所以象隂之成而外饔酒正遺人司門稿人皆共其職事焉然財必出於遺人司門者用以利犯禁之財養以義死政之老與其孤則趨利者知所愧而徇義者知所勉矣冡人之職凡死於兵者不入兆域鄭氏謂戰敗無勇投諸塋外以罰之罰其身而養其父祖子孫者不罰不足以示義不養不足以盡仁也然春饗孤子秋未嘗不食而以饗為主秋食耆老春未嘗不饗而以食為主周禮言饗耆老孤子則饗與食固兼用也耆老養於學孤子亦養於學文王世子反養老幼於東序謂各反其國養老幼如東序之禮也又樂書曰先王之交鬼神也非祭則祀其接賔客也非饗則食祭之以其物有養而親之之意所以致愛也祀之以其道有止而寧之之意所以致敬也饗以飲為主有饗之之意亦所以致敬也食以食為主有養之之意亦所以致愛也燕之為禮雖與祭祀饗食不同要之亦不過致愛敬而已故文王鹿鳴之燕羣臣既飲食之又實幣帛以將其意是致愛也待之以嘉賔之禮是致敬也然則祭祀饗食如之何不奏燕樂乎此言食嘗無樂非周制也又曰礿禘皆陽義也莫盛於禘嘗蒸皆隂義也莫盛於嘗春陽中也秋隂中也凡聲陽也凡味隂也故禘以饗先王饗以待孤子皆用樂焉所以象雷之發聲於春也嘗以饗先王食以待耆老皆不用樂焉所以象雷之收聲於秋也月令於仲春雷乃發聲言習樂於仲秋雷乃收聲而不及樂豈亦饗禘有樂而食嘗無樂之意嚴陵方氏曰重言而食嘗無樂五字蓋衍文延平周氏曰隂有體而無聲陽有聲而無體饗與禴以陽為主飲陽也樂亦陽也故饗禴有樂食與嘗以食為主食隂也故食嘗無樂飲以天産為主所以養陽食以地産為主所以養隂春為陽中而用禴秋為隂中而用嘗春饗孤子以助陽秋食耆老以助隂其義一也雖然考於商頌周官則食嘗未有不用樂者豈非夏之制歟馬氏曰君子事死如事生事亡如事存春禘所以達其怵惕之心秋嘗所以達其悽愴之心故春饗生者之陽氣而禘死者之陽氣則有樂有樂者所以順陽氣之出也秋食生者之隂氣而嘗死者之隂氣則無樂無樂者所以順隂氣之入也故春禘而秋嘗春饗孤子秋食耆老其義一也陳氏曰陽作而有聲隂成而有味饗禘有樂用其聲也食嘗無樂用其味也禮之所用惟其物冝而有隂陽之義存焉饗禘以飲為主食嘗以食為主飲養陽氣為養精也食養隂氣為養形也養精者動之以聲此饗禘所以有樂養形者實之以味此食嘗所以無樂凡作而有聲無非出於陽也故曰凡聲陽也山隂陸氏曰饗禘有樂而食嘗無樂此周禮也殷人尚聲雖食嘗猶有樂祭統曰大嘗禘升歌清廟下而管象魯殷禮也公食大夫無樂食禮也然則少牢饋食特牲饋食主嘗言之歟秋食耆老月令所謂仲秋養老是也雖然春饗孤子耆老亦饗焉秋食耆老孤子亦食焉知然者周官酒正凡饗耆老孤子皆共其酒又文王世子有司告以樂闋王乃命公侯伯子男及羣吏反養老幼於東序知之也此一節言若繁復所謂其中必有美焉者也彼見形而不及理往往不察故君子記之如此使讀者盡心焉鼎俎竒而籩豆偶隂陽之義也籩豆之實水土之品也不敢用褻味而貴多品所以交於旦明之義也鄭氏曰水土之品言非人常所食旦當為神篆字之誤也孔氏曰此一節論鼎俎籩豆所法隂陽之事鼎俎以盛牲體牲體動物屬陽故其數竒籩豆兼有植物植物屬隂故其數偶籩豆所充實之物皆是水土所生品類非人所常食神道與人異故不敢用人之食味神以多大為功故貴多品案聘禮牛一羊二豕三魚四臘五腸胃六膚七鮮魚八鮮臘九是鼎九其數竒也又有陪鼎膷一也臐二也膮三也亦其數竒也正鼎九鼎别一俎俎亦九也又少牢陳五鼎羊一豕二膚三魚四臘五其腸胃從羊五鼎五俎又特牲三鼎牲鼎一魚鼎二臘鼎三亦有三俎是鼎俎竒也案掌客云上公豆四十侯伯三十二子男二十四又禮器云天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六案禮籩與豆同是籩豆偶也鄉飲酒義豆數是年齒相次非正豆也長樂陳氏曰鼎俎之實以天産為主而天産陽屬故其數竒籩豆之實以地産為主而地産隂屬故其數偶不敢用褻味所以盡志貴多品所以盡物盡志所以交於神盡物所以交於明先儒以旦為神其説是也嚴陵方氏曰籩之實若菱芡之類豆之實若芹蒲之類所謂水之品也籩之實若棗栗之類豆之實若菁韭之類所謂土之品也水土之品非人常所食故曰不敢用褻味或水或土所取不一故曰貴多品山隂陸氏曰俎載而生之鼎烹而孰之籩豆受成而已旦明蓋指祼獻之時至朝而踐則象朝時事親所進也於是始有籩豆之薦雖有籩豆然不敢用褻味而貴多品是乃所以交於旦明之義也灌用鬱鬯祼用臭也至敬不饗味而貴氣臭也交於神明之義言以人事交於神明如此也交於旦明之義言以朝事交於旦明如此也灌用鬱鬯無籩豆之薦以言交於旦明之義故曰籩豆之實而已又曰不敢用褻味而已以言交於神明之義故曰籩豆之薦又曰不敢用常褻味也案籩人掌四籩之實自朝事而下則祼無籩豆之薦非特諸侯相朝雖祭亦爾也賔入大門而奏肆夏示易以敬也卒爵而樂闋孔子屢歎之奠酬而工升歌發德也歌者在上匏竹在下貴人聲也樂由陽來者也禮由隂作者也隂陽和而萬物得鄭氏曰賔朝聘者易和説也屢歎美此禮也發德者以詩之義發明賔主之德匏笙也得得其所也孔氏曰此一節論朝聘之賔及己之臣子有王事勞者設燕饗之禮奏樂之節饗禮既亡今約大射及燕禮解之案大射禮主人納賔賔是己之臣子又無王事之勞故賔入不奏肆夏賔入及庭公升即席乃奏肆夏是也燕禮記云若以樂納賔則賔及庭奏肆夏鄭注云卿大夫有王事之勞則奏此樂此云賔入大門謂朝聘既畢受燕饗之時燕則大門是寢門也饗則大門是廟門也樂主和易今奏此肆夏之樂者示主人和易嚴敬於賔也又案大射禮賔及庭奏肆夏乃升主人獻賔賔受爵啐酒拜告旨而樂闋賔飲卒爵酢主人主人受酢畢主人獻公乃奏肆夏公飲卒爵而樂闋燕禮記云賔拜酒主人答拜而樂闋公拜受爵而奏肆夏公卒爵而樂闋是卒爵而樂闋也此卒爵謂兼賔及主君也依大射禮主人受酢不作樂若其饗時主君親獻賔賔親酢主君賔主俱作樂也孔子見禮入門而縣興卒爵而樂闋屢數也數數歎美此禮善其和易恭敬之義也奠酬而工升歌者案大射禮獻卿之後大夫媵觶於公所謂酬也公奠置此酬而未舉於時工升歌也或可饗時主君親酬賔賔初奠酬薦東於時即工升歌也大射與燕禮異燕禮歌鹿鳴合鄉樂凡合樂降於升歌一等王饗燕元臣升歌三夏三夏即頌合樂降一等即合大雅也元侯自相饗亦歌頌合大雅故仲尼燕居兩君相見歌清廟是也侯伯子男相見既歌文王合鹿鳴也準約元侯則天子饗燕侯伯子男亦歌文王合鹿鳴也諸侯燕臣子歌鹿鳴合鄉樂燕禮是也其天子燕在朝臣子鄭詩譜云歌鹿鳴合鄉樂是也升歌合樂所以異者案鄉飲酒及燕禮工升自西階歌鹿鳴四牡皇皇者華歌訖笙入立於堂下奏南陔白華華黍奏訖乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間歌訖乃合鄉樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋間者謂堂上堂下一歌一吹更遞而作合者上下之樂並作此其所以異也歌者在上匏竹在下解所以不升笙之義也歌是人聲可貴故升之在堂上匏竹可賤故在堂下然瑟亦升堂者瑟工隨歌工故也因賔主禮樂之事遂説禮樂之義陽天也天以氣化故作樂象之樂以氣為化是樂由陽來者也氣化謂五聲八音隂地也地以形生故制禮象之禮以形為教是禮由隂作者也形教謂尊卑大小拜伏之事也和猶合也得謂各得其所也若禮樂由於天地天地與之和合則萬物得其所也長樂劉氏曰入門而縣興乃奏肆夏之樂所以示天子同樂易之德降接於羣臣以將其敬也然則為賔者乃其臣也當其禮樂之優隆冝何心以報上哉故天保之詩者下報上也此文王所以致多士而作周也卒爵而樂闋孔子屢歎之者謂君能降禮下交於臣以竭其歡心臣能盡忠以答於上以成其亨泰位天地育萬物由其禮樂行而隂陽順也此孔子所以屢歎之者周衰不及其盛也長樂陳氏曰入門而奏肆夏示易以敬者所謂示情者也奠酬而工升歌發德者所謂示德者也匏竹在下者所謂示事者也古之君子不能親相與言以禮樂相示而已此夫子所以屢歎之也然孔子之屢歎固不止於卒爵樂闋而已言卒爵樂闋而繼之以孔子屢歎者舉中以明上下也然哀公問言入門而金作則不止於肆夏言升歌則止於清廟言下管則主於象此言入門而奏則止於肆夏言升歌則不止於清廟言匏竹則不止於象何也蓋哀公所言者大饗之禮此則兼燕禮而言之是以詳略不同也又樂書曰古者燕饗之賔情意未通歡好未接不必親相與言以禮相示而已故賔而饗之所以為禮奏樂而樂之所以為樂賔始入門則奏肆夏以示易敬之意既卒爵則奠酬升歌以發賔主之德卒爵則以進為文而禮意有所不傳樂闋則以反為文而樂意有所不喻是相與之誠言嘗不足於意而意嘗有餘於言故言之發有不足以盡意其聲至於嗟氣至於嘆者豈言之不足故嗟嘆之謂歟孔子於饗賔之際卒爵而樂闋其嘆至於屢者蓋異乎觀止之歎豈一唱三歎之謂乎樂由天作其來自乎陽禮以地制其作自乎隂隂陽不和萬物不得禮樂不交賔主不歡是燕饗朝聘之設在禮樂不在隂陽然非隂陽吾無以見禮樂矣在賔主不在萬物然非萬物吾無以見賔主矣傳曰禮樂法而不説其法也可視而見可聞而知其不説也有天下至賾存焉非得意忘象烏足議此又曰禮樂之始自隂陽出及其至也行乎隂陽隂陽者萬物之所聽而弗違者也故隂陽和而萬物得周官以禮樂天地之化百物之産蓋本於此嚴陵方氏曰此言諸侯為賔之禮也故曰賔入大門奏肆夏則所以迎賔而納之且能易則賔主之情不離能敬則賔主之情不流不流不離禮樂之道也夫禮減而進以進為文樂盈而反以反為文爵始卒而樂遂闋則能以反為文矣此先王之微意也故孔子屢歎之且樂所以發明賔主之德也卒爵則酬酢之禮畢而賔主之德已明矣樂之闋也不亦宜乎闋終也孔子於與蠟之事畢而歎者歎其禮之亡也於卒爵而樂闋亦嘆者歎其樂之深也於禮之亡則傷之而歎也於樂之深則美之而歎也主酌賔曰獻賔答主曰酢主復答賔曰酬奠酬謂奠置酬爵之時也夫禮成於三奠酬則禮成而賔主之得可知也故樂工升歌以發之蓋雖有其德非發之於聲音則無自而明故也升歌即仲尼燕居所謂升歌清廟示德是矣或言發或言示互相備也歌者在上故經每謂之升歌匏竹在下故經每謂之下管匏即竽笙之類竹即箎笛之類以舜典考之堂上有琴瑟堂下有柷敔要之在上者以歌為主在下者以匏竹為主樂由陽來禮由隂作獨隂不生獨陽不成生成相濟其氣乃和和則萬物不失其性矣馬氏曰易者和説之也和恱以敬則和而不流舉爵而樂興卒爵而樂闋示其樂而無荒也和而不流樂而無荒其禮樂如此則孔子及此未嘗不深嘉而屢歎之也歌者聲之發於口匏竹者聲之寓於器寓於器者其聲粗發於口者其聲精故歌者在上貴人聲也記曰聲莫重者所以貴人聲也樂由天作則樂者陽也故樂由陽來禮以地制則禮者隂也故禮由隂作天地合而萬物生隂陽和而萬物得古之人言禮樂未嘗徇於一偏之説也山隂陸氏曰饗始於入門而奏肆夏終於卒爵而樂闋其所以饗在此孔子所以屢歎也詩曰一朝饗之饗言朝則食象食時所進燕夕時也敬莫隆於朝至夕或怠矣故先王制禮饗以訓共儉燕以示慈惠兵法曰朝氣鋭晝氣墮暮氣歸豈特兵也哉凡樂三闋入門而縣興升堂而樂闋一也賔飲畢樂闋二也主人受酢飲畢樂闋三也奠酬而工升歌發德也所謂德發揚詡萬物者此歟故孔子屢歎在彼不在此故曰德産之致也精微升歌蓋清廟之詩萬物得言得由其道得其極髙大各得其冝是也間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀蓋以此講義曰樂所以道天下之和有得乎氣之溫厚故曰由陽而來禮所以明天下之分有得乎氣之嚴凝故曰由隂而作延平周氏曰禮樂之始雖由於隂陽及其妙也則能統隂陽育萬物故曰隂陽和而萬物得周官曰禮樂合天地之化百物之産其此之謂乎禮記集説卷六十三
