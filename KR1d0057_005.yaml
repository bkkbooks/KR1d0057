body:
  text: 禮記集説卷五宋衛湜撰侍坐於君子君子欠伸撰杖屨視日蚤莫侍坐者請出矣侍坐於君子君子問更端則起而對侍坐於君子若有告者曰少間願有復也則左右屏而待鄭氏曰撰猶持也欠伸撰杖屨君子有倦意也起對謂離席而對敬異事也君子必令復坐復白也言欲須少空閒有所白也屏猶退也隠也孔氏曰自此至褰裳明卑者事君子之禮志疲則欠體疲則伸君子執杖在坐脱屨在側倦則自撰持之或瞻視其庭影皆是尊者欲起之漸故得請出禮卑者賤者請進不請退退由尊者故也更端别事也廬陵胡氏曰撰猶數也如撰徳自撰之類皆謂數視也升堂則杖屨在側若欲起則撰數其在亡藍田吕氏曰賢者謂之君子不肖者謂之小人天下之達稱也古之貴者皆賢賤者皆不肖故貴者亦稱君子賤者亦稱小人後世貴者未必賢而猶稱君子者蓋曰居是位者不可以非君子之行也如論語君子之徳風小人之徳草君子學道則愛人小人學道則易使孟子云無君子莫治野人無野人莫養君子此皆以貴賤稱之也此篇多稱先生稱長者稱君子蓋天下有達尊三先生兼徳齒而言也長者止謂有齒者君子止謂有爵者也君子示以倦則請出不敢勤君子也君子問更端則起而對因事有所變而起其敬也人俟間而有復則屏而待不敢干其私也間謂間隙也俟事之有間隙而言之聘禮賔曰俟間亦此意也舊音曰閒間則閒矣然不若間之為勝嚴陵方氏曰間即無事之時也與孟子言連得間矣之間同義復者報於上之謂與周官言諸侯之復同義少間願有復則機事之欲密者也故左右屏而待焉屏者退而自隠之謂既屏而又待者且防君子之有所召故也永嘉戴氏曰夫禮少事長求進不求退故必長者有欲退之意而後少者敢求退焉大抵少者不當順適己意而要以求長者之便安也故少者雖勞不憚而長者不可使少勞也少者雖久立無害而長者亦不可使久坐也毋側聽毋噭應毋淫視毋怠荒遊毋倨立毋破坐毋箕寢毋伏斂髮毋髢冠毋免勞毋袒暑毋褰裳鄭氏曰側聽耳屬於垣嫌探人之私也噭號呼之聲也淫視睇眄也怠荒放散身體也破偏任也伏覆也髢髲也毋垂餘如髲也免去也褰袪也孔氏曰此以下亦侍君子之法側聽謂壁聽旁人私言也噭謂聲髙急應荅冝徐徐而和也淫謂流移也目當直瞻視不得斜眄怠荒謂放縱不自拘斂跛謂挈舉一足一足蹋地立冝如齊箕謂舒展兩足狀如箕舌寢卧也卧當或側或仰而不可覆也古人重髮以纚韜之不使垂也冠常著在首不可脫袒露也雖有疲勞之事不得袒露身體雖炎熱不得褰袪取涼然上諸事條目誡侍者左右屏隠之人也既屏隱好生上事或私覘清閒或隔尊自恣故冝兼誡亦可通誡為人之法也藍田吕氏曰侍於君子視聽言動無所不在於敬頭容欲直故毋側聽聲容欲静故毋噭應目容欲端故毋淫視氣容欲肅故毋怠荒足容欲重故遊毋倨立如齊故毋跛坐如尸故毋箕正其衣冠故斂髮毋髢冠毋免勞毋袒暑毋褰裳嚴陵方氏曰毋側聽見前解不傾聽下冠固有時而可免若居喪之類則冠可免矣勞固有時乎可袒若割牲之類則勞可袒矣廣安游氏曰大率人之所患在乎徇其意之所安而不由於正人之所安其病有五曰傾邪曰放縱曰惰偷曰倨慢曰輕易此五者人之常患也曰側聽曰淫視此傾邪者也曰怠荒曰立而跛曰冠而免曰勞而袒曰暑而褰裳此惰偷者也曰噭應曰斂髮而髢此輕易者也曰游而倨曰坐而箕曰寢而伏此放縱倨傲者也此五者禮之所禁也君子持身未論其他獨於視聽游行坐立卧起衣冠之際而自克焉斯過半矣世之妄者其言則曰君子學以致其道吾惟道之知其他皆末節也不知此乃古先聖人之所甚急視聽游行坐立卧起衣冠之際有不防焉而五者之病乗之則有羣居而袒衣者矣有為下而傲其上者矣有習行如此因以成性而不屈折以趨於善道者矣有敢為異衆而寖以為亂者矣有以是區區之間相責望而成爭鬭之禍者矣故夫禮者内以正人之心而外以正其遊行視聽坐立卧起衣冠之際此所以止邪於未形而求以弭亂之道也永嘉戴氏曰甚矣人情之不美也安於四肢之怠惰不樂於衣冠之拘束起居坐立惟其便安而已矣然而人之常情終日袒裼箕踞而肢體頽惰若不勝其勞終日衣冠佩玉其始雖勞而終也身體安舒夫然後知禮者筋骸之束所以安乎人情而便乎其身也惰其四肢則怠荒矣逸遊宴樂則倨矣立不正方則跛矣原壤夷俟聖人罪之而況於箕乎夫子寢猶不尸而況於伏乎斂髮毋髢冠毋免則囚首被髪者無有也勞毋袒暑毋褰裳則袒裼裸裎者無有也以此敎天下其有傲慢放逸之禍乎嗟乎不觀鄉黨之躬行無以知曲禮之非虚言不觀西晉之致亂無以知先王之禮有益於人國也長樂陳氏曰立毋跛而魯之有司跛倚者禮之所棄坐毋箕而原壤夷俟孔子之所非古之養老則袒而割牲祭祀則袒而迎牲喪禮以袒踊為孝喪服以袒免為制士虞則鉤袒取黍稷大射則袒決遂執弓然則袒豈先王之所不為以為無故而袒則非禮也蓋先王以人不知服飾之為禮也為之冠以旌其首為之屨以重其足為之衣以充其身束則有帶佩則有玊深衣毋見膚絺綌必有表凡惡其無文而已山隂陸氏曰遊毋倨雖遊且如此其他可知也廬陵胡氏曰毋淫視視流坐毋箕尉佗箕踞而坐馬氏曰此言燕遊之際猶不忘敬也侍坐於長者屨不上於堂解屨不敢當階就屨跪而舉之屏於側鄉長者而屨跪而遷屨俯而納屨鄭氏曰屨賤空則不陳於尊者之側不敢當階為妨後升者就屨謂獨退也就猶著也屏亦不當階鄉長者而屨謂長者送之也不得屏遷之而已俯俛也納内也遷或為還孔氏曰此一節明解屨著屨之法長者在堂而侍者屨賤故脱於階下若長者在室則侍者得著屨上堂不得入室户外有二屨是也解脫也内則云屨著綦鄭云綦屨繫解屨是解繫也屨既不上於堂故解之於階下若侍者獨暫退則先往階側跪舉取之屏退也退不當階也若少者退為長者所送則階側取屨稍移之面向長者而著之遷徙也就階側跪取稍移近前俯身内足著之不跪者若跪則足向後不便故俯也雖不並跪亦坐左納右坐右納左耳新安朱氏曰註云長者送之恐非是但謂雖降階出户猶向長者不敢背耳長樂陳氏曰禮凡祭於室中堂上無跣燕則有之故特牲少牢饋食自主人以至凡執事之人自迎尸以至祭末旅酬無筭爵與夫尸謖餕食之節皆不脫屨而尸坐亦不脫屨以其侍神不敢燕惰也若夫登坐於燕飲侍坐於長者無不脫屨以其盡歡致親不敢不跣也故在堂則屨不上於堂在室則屨不入户排闔脫屨於户内者一人而已有尊長在則否然則君屨不下於堂不出於室矣解屨必屏於側取屨必隱辟納屨必鄉長者遷之必跪納之必俯脫之必主人先左賔先右納之必坐左納右坐右納左則屨之脫納皆有儀矣屨之為物有以不脫為敬有以脫為敬鄉飲鄉射禮未畢不脫屨祭祀尸未謖不脫屨此以不脫為敬也及升堂燕私則脫焉此以脫為敬也昔禇師聲子韈而登席其君㦸手而怒之此知脫屨而不知跣也後世人臣脫屨然後登堂此知致敬而不知非坐不脫屨也禮書藍田吕氏曰屨云解者屨有繫也士禮夏葛屨冬白屨組綦繫於踵言有繫也就屨既退復著屨也廬陵胡氏曰解屨不敢當階側就階邊自卑巽意俯而納屨俯首向長者而納足於屨嚴陵方氏曰出而就屨屏於側則不特不當階而已若長者送出則跪而遷屨不特屏之於側而已納之時又俯焉離坐離立毋往參焉離立者不出中間鄭氏曰為干人私也離兩也孔氏曰自此至弗與為友為一節明不干人私并逺嫌之法若見彼或二人併坐或併立恐密有所論已不得輒往參預二人併立當已行路則避之不得輒當其中間出也嚴陵方氏曰兩相麗之謂離三相成之謂參彼坐立者兩人而我一人往焉則成為三矣男女不雜坐不同椸枷不同巾櫛不親授嫂叔不通問諸母不漱裳外言不入於梱内言不出於梱女子許嫁纓非有大故不入其門姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食鄭氏曰皆為重别防淫亂不雜坐謂男子在堂女子在房也椸可以枷衣者通問謂相稱謝也諸母庶母也漱澣也庶母賤可使漱衣不可使漱裳裳賤尊之者亦所以逺别外言内言男女之職也不出入者不以相問也梱門限也女子許嫁繫纓有從人之端也大故宫中有災變若疾病乃後入也女子有宫者亦謂由命士以上也春秋傳曰羣公子之舍則己卑矣女子十年而不出嫁及成人可以出矣猶不與男子共席而坐亦逺别也孔氏曰自此至弗與為友緫明逺嫌之法不親授者男女有物不親相授也諸母謂父之諸妾有子者外言内言謂男職在官政女職在織絍各有限域不得濫預女子婦人通稱也婦人質弱不能自固必有繫屬故恒繫纓纓有二時一是少時常佩香纓内則云男女未冠笄紟纓是也二是許嫁時繫纓昏禮主人入親說婦纓鄭註婦人十五許嫁笄而禮之因著纓是也蓋以五采為之其制未聞又内則曰婦事舅姑紟纓以此而言故知有二纓也大故謂喪病之屬也女子已許嫁則有宫門列為成人唯有喪病等乃可入其門女子子者謂已嫁女子男子則單稱子女子則重言子者鄭註喪服云是别於男子故云女子子女雖已嫁及成人猶冝别席鄭引公羊傳見莊元年證女子有别宫也熊氏云鄭謂男子在堂女子在房若大宗收族宗子燕食族人於堂宗子之婦燕食族婦於房也兄弟弗與同席同器未嫁亦然藍田吕氏曰人之所以異於禽獸者以有别也有别者先於男女天地之義人倫之始内則曰禮始於謹夫婦為宫室辨内外男子居外婦人居内深宫固門閽寺守之男不入女不出所以别於居處者至矣非祭非喪不相授器其相受則女受以篚其無篚則皆坐奠之而後取之不雜坐不通乞假内言不出外言不入所以别於往來者至矣道路男子由右婦人由左女子出門必擁蔽其面夜行以燭無燭則止御婦人則進左手所以别於出入者至矣外内不共井不共湢浴不通寢席不通衣裳不同椸枷不同巾櫛不敢縣於夫之楎椸不敢藏於夫之篋笥所以别於服御器用者至矣姑姊妹女子子天屬也許嫁則非有大故不入其門已嫁而反則不與同席而坐同器而食嫂與諸母同宫之親也嫂叔則不通問諸母則不漱裳妻之母婚姻之近屬也壻見主婦闔扉立于其内壻立于門外東面主婦一拜壻荅再拜主婦又拜壻出所以别於宗族婚姻者至矣男女非有行媒不相知名非受幣不交不親必日月以告君齊戒以告鬼神為酒食以召鄉黨僚友取妻不取同姓買妾不知其姓則卜之寡婦之子非有見焉則弗與為友所以厚别於交際者至矣男女不雜坐經雖無文然喪祭之禮男女之位異矣男子在堂則女子在房男子在堂下則女子在堂上男子在東方則女子在西方坐亦當然長樂劉氏曰家人内政不嚴以防之於細微之初不剛以正之於未然之始則其悔咎不可逭矣易曰閑有家志未變也男女之志既為情邪之所變閑禁雖嚴求其無咎而咎可無哉故夫婦未七十雖同藏未有可嫌也聖人制禮必爾者以無嫌正有嫌也用有情之難正無情之易也而況於男女未有室家者哉女子許嫁纓所以繫屬其心以著誠於夫氏起其孝義也既許嫁則有姆敎之處於閫内之别室男子非有疾憂之故不入其門也嚴陵方氏曰嫂叔不通問若問安問疾之類蓋生不相通問死不相為服皆所以推而逺之而已坊記言婦人疾問之不問其疾則男女非不通問也特不施於嫂叔姑姊妹女子子之名蓋據制禮於家者稱之耳非據循禮於家者稱之也謂之姑非為姪行稱之亦為姑之兄弟言之而已若姪行則卑而無嫌矣謂之女子子非為父行稱之亦為女子子兄弟言之而已若父行則尊而無嫌矣故下文止言兄弟者為是故也若是則第曰姊妹足矣而又言姑與女子子何哉蓋姑則尊行也女子子則卑行也姊妹則同行也制禮者以為出嫁而反者其類雖多要為之不過是三等而已故必舉是以為言焉永嘉戴氏曰嫂叔不通問比於不授受則尤嚴矣死喪之威嫂叔不相為服如路人然曽同室之不如其推而逺之若此其嚴哉男不言内女不言外禮也外言入梱則謀及婦人死之招也内言出梱則婦言是用亂之階也長樂陳氏曰禮始於謹夫婦為宫室辨内外故七年男女不同席不共食則長可知矣道路男子由左婦人由右則閨門可知矣然同藏唯七十可也親授唯喪祭可也通問唯援溺可也男正位乎外女正位乎内此内外之辨也然内言不出而有所謂出外言不入而有所謂入周官内小臣達王后之好事于四方則内言出於梱矣内宰以隂禮敎六宫則外言入於梱矣蓋先王制禮為嫌疑無别而已嫌疑有以别雖内言之出外言之入可也廬陵胡氏曰繫纓有固束之義此及喪服皆云女子子重云子者衍文也鄭云重言子者别於男子也只云女子已别於男子矣安用更言子乎父子不同席男女非有行媒不相知名非受幣不交不親故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也取妻不取同姓故買妾不知其姓則卜之寡婦之子非有見焉弗與為友鄭氏曰父子不同席異尊卑也男女有媒往來傳昏姻之言乃相知姓名有禮乃相纒固故必受幣周禮凡取判妻入子者媒氏書之以告君謂日月以告君也昏禮凡受女之禮皆於廟為神席以告鬼神謂齊戒以告鬼神也為酒食㑹賔客厚重慎也不取同姓為其近禽獸也妾賤或時非媵取之於賤者世無本繫故卜之寡婦之子弗友辟嫌也有見謂有竒才卓然衆人所知孔氏曰昏有六禮二曰問名乃相知名也幣謂聘之𤣥纁束帛也先須禮幣然後可交親婦來則書取婦之年月日時以告國君齊戒謂嫁女之家受六禮並在廟布席告先祖也明女是先祖之遺體不可專輒許人而取婦之家父命子親迎並自齊潔但在已寢不在廟也夫家若無父母則三月廟見亦是告鬼神鄭謂妾賤或非媵者諸侯取一國之女則二國同姓以姪娣媵媵送也妾送嫡行則明知姓氏大夫士取亦各有妾媵或時非此媵類取於賤者不知何姓之後但卜得吉者取之寡婦無夫若其子凡庸與其來往則於寡婦有嫌也藍田吕氏曰父子不同席者此承上文姑姊妹女子子已嫁而言也父子之間雖男子猶不同席況女子子已嫁而反者乎故因而言之馬氏曰坐則異席居不同宫者著父子之位也禮者以為民坊也非行媒不相知名所以逺嫌也非受幣不交不親所以致敬也逺嫌致敬則安有桑中之奔溱洧之亂乎明而尊者莫如君書日月以詔之幽而嚴者莫如鬼神致齊戒以告之近而親者莫如鄉黨僚友為飲食以命之所以備禮而厚其别也金華邵氏曰上言兄弟不同席而坐所以逺嫌此言父子不同席所以嚴分言雖同而意則異也夫婦之合在謹其始始之不謹則其合易離有行媒而後知名受幣而後交親庶乎行之以禮矣然必日月告君以示不失時齊戒告鬼神以示不敢專召鄉黨僚友以示同其慶如是而後男女之别厚取妻不取同姓買妾必卜其姓又所以重宗也人之同姓其始皆一宗耳其後譜系𣲖别支族分散遂以為非親苟自其宗而推之安知其不與吾為姊妹也與吾為姪娣也豈不害敎乎嚴陵方氏曰内言不出而女正位乎内外言不入而男正位乎外一家之内禮且然也則一家之外男女之名豈得相知乎先王於是立媒氏焉以其通内外故謂之行媒行者往來有所通之謂也非是而相知名則為褻矣非受幣不交不親者周官凡嫁子取妻入幣純帛無過五兩於外則以之行禮於内則以之將意行禮於外所以交之也將意於内所以親之也鄉黨在私而同國者也僚友在公而同官者也為酒食以召之且以見婚姻之道合乎公私之議也昭公之取於吳是失取妻之禮矣晉侯之有四姬是失買妾之禮矣陳司敗鄭子産所以譏之也廣安游氏曰古之人君其道至簡而要故夫百執事之事小事則從其長而諸侯之士有不命於大君者則是天下之事人君固有不與知者也今也一國之中匹夫匹婦嫁娶之事必以告君者此古人之所致謹而其義有異於後世者也關雎之化后妃之本人君之所當謹固也若夫召南之詩專言男女之事行露之詩則言男女之貞潔野有死麕之詩則言强暴者不得為非而其所以為極治者專在於男女之不相侵犯讀詩至此然後知三代盛時所以化天下者不惟道化之力亦其法制之委曲詳備有以至此也古之人君其事若至微而君必與知之者不一也生齒之數君與知之獄訟之數君與知之窮民之訴君與知之鰥寡孤獨之養君與知之小民竒衺君與知之國子之率教不率教君與知之若此之類止於匹夫匹婦之事而君必與知之者皆所當致謹焉而嫁取之事亦其一也古之事有決之人而不得者決之於鬼神古人尊敬鬼神而信卜筮後之人矯誣鬼神而卜筮不可信卜筮之不可信起於人之矯誣又起於不信者之要盟傳曰明神不蠲要盟背之可也古未有誣神而背盟者也背盟之説蓋起於此買妾不可以取同姓惟卜之吉則取之此人事所不能決而決之於鬼神也且古人之事決之於鬼神而與後世異焉者亦不一也周禮司盟之書有獄訟者則使之盟詛古之所以求民情者至悉也然有所不能盡則不求之於聦明智術之中而屬之於鬼神蓋有如此者也司盟之傳曰使人盟詛者所以省獄訟也古之決於鬼神者所以存天下畏忌之心而又有省獄訟之利焉買妾而卜亦其類也永嘉戴氏曰春秋傳以為昏禮有四曰納采問名納徴請期禮記昏義又有納吉一禮在問名後蓋男女未相知名因媒者納采而後問名既問名而後女始受幣故曰納徴既納徴而後請期而後親迎共牢合卺始親之也禮以納幣迎女為重故得書於春秋非有媒妁之言幣帛之交則終身以為妾不特此也上以告之人君幽以告諸鬼神明以質諸鄉黨親戚上下幽明咸與聞之焉可誣也禮莫重於有别無别則禽獸是也知之者衆則其别厚矣不觀周召之詩無以知周之所以治不觀氓與桑中之詩無以知衛之所以亂故昏姻者治亂之本也可不謹哉可不畏哉長樂劉氏曰夏商以前容取同姓周公佐武王得天下取神農黄帝堯舜禹湯之子孫列土封之以為公侯而使姬姓子孫與之為昏姻欲先代聖王子孫共饗天下之禄也乃立不取同姓之禮焉寡婦之子非有竒才卓行見於鄉里則不與之為友非徒辟嫌亦以勵孤子之徳慧術智禮豈徒然哉長樂陳氏曰姓非天子不可以賜而氏非諸侯不可以命姓所以繫百世之正統氏所以别子孫之旁出族則氏之所聚而已然氏亦可以謂之姓故大傳言繫之以姓又言庶姓别於上則氏與姓一也氏又可以為之族故羽父為無駭請族隠公命以為展氏則氏族一也蓋别姓則為氏即氏則有族族無不同氏氏有不同族故八元八愷出於髙辛氏而謂之十六族是氏有不同族也商氏條氏徐氏之類謂之六族陶氏施氏之類謂之七族宋之華氏謂之戴族向氏謂之桓族是族無不同氏也古者或氏於國則齊魯秦吳氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三烏五鹿氏於事則巫乙匠陶而受姓命氏粲然衆矣秦興滅學失周官小史之職於是繫世昭穆失其本宗及漢司馬遷約世本脩史記因周譜明世家乃知姓氏之所由出至晉賈弼有姓氏簿狀賈希鏡有姓氏要狀唐李守素有肉譜栁冲有姓系録而路敬韋述之徒傳述不一推叙昭穆使不相亂昏姻得之而有别親疏得之而有屬則姓氏之學其可忽哉國語曰敎之世為之昭明徳而廢幽昏則姓氏又可以示天下後世之勸戒也禮書虙氏曰古者男女多不辨姓蓋古者有姓有氏有族以大槩而言魯姬姓也桓公之族為仲孫氏叔孫氏季孫氏仲孫之族為孟氏南宫氏子服氏叔孫之族為叔仲氏季孫之族為公父氏公儀氏公鉏氏宋子姓也戴公之族為華氏樂氏皇氏莊公之族為司城氏桓公之族為魚氏蕩氏向氏鱗氏蓋自五宗之法行惟長子嫡孫族世世不遷若支子庶孫繼髙祖之旁統者五世無服不相稟承各為族氏故五世之後氏别於下則姓紊於上昏姻之交或知有氏而不知有姓矣是以商無譜系六世而昏姻遂通昔司馬遷作史記以唐堯虞舜皆黄帝子孫説者尚譏史遷之謬以為堯妻舜二女是以姑配姪自今觀之豈足為史遷之謬蓋自商以前禮制質譜系不明至於周人然後奠繫世辨昭穆故曰繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也是故禮記之言不可據今時而論也雖然今之秦梁徐葛江黄同出於嬴姓今之莒郯蘇顧董温同出於己姓若是之類不可槩舉故隋王通作中説以為任薛王劉崔盧之昏非古也蓋亦氏變為姓故耳但其源流已逺不可改正學者不可以不知也江陵項氏曰古者姓與氏為二後世姓與氏為一姓者諸眷之所同氏者一房之所獨姓以别同異氏以定親疏皆不可無也如媯姓之生衆矣凡居媯汭者不知其㡬族皆同姓也而於諸媯之中有有虞氏焉則舜之家所獨稱也故書載堯之嫁女曰釐降二女于媯汭嬪于虞言媯以著姓明自祁適媯所以正昏姻之禮也言虞以别氏明所歸之族所以詳室家之辨也古人於此謹矣後世直以氏為姓一家百族同用一氏親疏逺近更無分别則與古之用姓異矣故史臣書之皆曰姓某氏見姓之與氏自是為一不可復知也昔者聖人之立姓専以為昏姻之辨字皆從女惟女子稱姓以别之是則有姓之初便有昏姻不通之法大傳謂至周始繫之以姓而百世不通非也姓氏之法起於黄帝故凡天下之姓皆自以黄帝為祖也其實人之有姓自黄帝始耳至漢此法猶有存者夏侯嬰為滕令子孫遂為滕氏又有與孫公主為昏者遂為孫氏田千秋好乗小車子孫遂為車氏史記諸臣傳稱滕公萬石君太倉公魏其武安皆不著姓此即古人以官為氏之意蓋用此以自别於同姓之諸侯然自是遂忘其本姓則史職不脩之過也古者太史氏掌奠繫世辨昭穆凡立氏者必告于太史氏春秋之末智果别族於太史為輔氏此其驗也後世史職既廢宗法又亡而欲田里之氓自記其世繫難矣此其故皆起於封建世禄井田之法壊諸侯卿大夫之後降為甿𨽻士庶人之族散而之四方故宗法不可得而立史職不可得而紀以至於大廢而盡亡矣賀取妻者曰某子使某聞子有客使某羞鄭氏曰賀謂不在賔客之中使人往者羞進也言進於客古者謂候為進其禮蓋壺酒束脩若犬也不斥主人昏禮不賀孔氏曰謂親朋友有昏已有事礙不得自往而遣人往也昏禮有嗣代之序故不賀此云賀者聞彼昏而送筐篚將表厚意身實不在為賀故其辭不稱賀曰某子使某者此使者辭也某子賀者名使某使自稱名也言彼使我來也聞子呼取妻者為子也不賀故云聞子有客也使某羞者某是使者名也使某將此酒食與子進賔客也藍田吕氏曰郊特牲云昏禮不賀人之序也賀者以物遺人而有所慶也昏禮嘉禮也然著代以為先祖後人子之所不得已故不用樂即不賀也雖曰不賀然為酒食以召鄉黨僚友則問遺不可廢也故其辭曰聞子有客使某羞舍曰昏禮而謂之有客則所以羞者佐其共具之費以待鄉黨僚友而已非賀也世之不知禮者以其所以問遺者猶以慶賀名之君子雖不曰賀而問遺猶行故作記者因俗之名稱賀也長樂陳氏曰賀之者賀其有客也非賀昏也使人羞之而已非親往也廬陵胡氏曰羞進也謂進物於取妻者春秋傳可羞於王公是也鄭謂進於客誤矣貧者不以貨財為禮老者不以筋力為禮鄭氏曰禮許儉不非無也年五十始杖八十拜君命一坐再至藍田吕氏曰君子之於禮不責人之所不能備貧者不以貨財為禮是也不責人之所不能行老者不以筋力為禮是也禮者敬而已矣心苟在敬財力之不足非禮之訾也潢汙行潦可薦於鬼神瓠葉兎首不以微薄廢禮此不以貨財者也五十杖於家至一坐再至此不以筋力者也又有法之所不得為者有疾而不能行者臨難而不得已者土地之所不有者君子亦不責也王子為其母請數月之喪雖加一日愈於己也季子儲子皆以幣交他日孟子見季子而不見儲子以季子不得之鄒儲子得之平陸故也如季子王子者法之所不得為者也喪禮秃者不免傴者不袒破者不踊此有疾而不能行者也男女不授受嫂溺則援之以手君子正其衣冠同室有鬭則被髮纓冠而救之此臨難而不得已也居山者不以魚鼈為禮居川者不以鹿豕為禮此土地之所不有也凡此皆禮之變也行禮而知變所謂非禮之禮也長樂陳氏曰禮非貨財不足以為文非筋力不足以為儀貧者不足於貨財老者不足於筋力於其不足而責之以為禮則不恕矣古者凶荒則殺禮況貧者乎聘射之禮非强有力者不能行況老者乎名子者不以國不以日月不以隠疾不以山川鄭氏曰此在常語之中為後難諱也春秋傳曰名終將諱之隠疾衣中之疾也謂若黒臀黒肱矣疾在外者雖不得言猶可指擿此則無時可辟孔氏曰此一節明與子造名字之法不以國者不以本國為名他國即得為名衛侯晉晉侯周是也不以日月者不以甲乙丙丁為名殷家以為名者殷質不諱故也然案春秋傳魯僖公名申蔡莊公名甲午者周末亂世不能如禮或以為不以日月二字為名也不以隠疾者謂不以體上幽隠之處疾病為名春秋晉成公名黒臀又有楚公子黒肱邾黒肱是矣桓六年九月丁卯子同生公問名於申繻申繻對曰名有五有信有義有象有假有類以名生為信杜註云若唐叔虞魯公子友以徳命為義若文王名昌武王名發以類命為象若仲尼首象尼丘取於物為假若伯魚生人饋魚因名鯉取於父為類若魯莊公與桓公同日生名曰同也案傳文云不以官不以畜牲不以器幣此記文略耳傳云以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山杜註云司徒改為中軍司空改為司城魯獻公名具武公名敖案國語范獻子聘魯問具敖之山魯人以鄉名對獻子云何不云具敖乎魯人對曰先君獻武之所諱也此皆不能如禮者也藍田吕氏曰古者生子三月妻以子見而父名之名者識之以是物苟别而已殷人以前質不諱名至周人以諱事神名終將諱之故名子者必有所辟以其終將諱也國若晉宋之屬天子之所封也日月若甲子之屬天下之達稱也隠疾者人之所難言也山川者國之望也名之必可言也所難言者不可傳於人故不以隠疾也名之必將諱之諱之必將改之改天子之所封則不敬上故不以國改天下之達稱則不同乎俗故不以日月改國之望則不敬鬼神故不以山川春秋之時名字之禮廢犯此四禁而莫之恤也長樂陳氏曰名子之禮世子適子則名之於君庶子衆子則名之於有司大夫士庶之子皆名之於父其名之之禮雖殊而名之之戒則一古人之於命物也猶曰名之必可言況名子乎二名猶不可以偏諱況大物乎魏王昶之名子也皆以𤣥黙沖虛為稱欲使顧名思義而已李氏曰魯申繻言不以國不以日月不以山川不以隠疾不以器幣不以官不以牲蓋諸侯有百官有祭祀有器幣有牲庶人名之則可也王氏子墨曰名子父之責也命之名所以示之敎也以國非所以敎謙也以日月非所以敎敬也以隠疾非所以敎之進乎徳也以山川非所以敎之求諸已也命名而必示之敎申繻所謂以徳命為義者也雖古人之名其子或有所因不盡若是而曲禮之意蓋主乎以徳命也又況以諱事神周道也名終而將諱之得不擇夫可諱者以名之乎子生三月而父名之既有以敎其終身而又慮其子若孫之難避也不亦太蚤計乎非蚤計也君子之所以示其子孫無非為久逺之慮也於名而慮其逺如是則將無所不慮乎逺也以為鬼神而諱之多且百年少亦數十載之後矣而其諱之難易基於一日命名之初是以君子之於子孫無非於其始而謹之也於名而謹其始如是則將無所不謹其始也是曲禮之意男女異長男子二十冠而字父前子名君前臣名女子許嫁笄而字鄭氏曰男女各自為伯季也冠是成人矣敬其名父前君前對至尊無大小皆相名女子以許嫁為成人孔氏曰此一節明男女冠笄名字之法案冠禮加字之時伯某甫仲叔季唯其所當又檀弓云幼名冠字五十以伯仲知女子亦自為叔季者春秋隠公二年伯姬歸于紀七年叔姬歸于紀是也成十六年鄢陵之戰公陷于淖欒書欲載晉侯鍼曰書退鍼是書之子對晉侯而稱書是於君前臣名其父也賈氏曰名是受於父母為質字者受於賔為文故君父之前稱名至於他人稱字是敬其名也儀禮疏長樂陳氏曰家無二長故父前無伯仲之稱國無二上故君前無爵位之稱記曰士於君所言大夫没矣則稱諡若字則大夫於大夫没矣而名之可知也士於没者稱諡若字則於生者名之又可知也大夫没矣為可諱而大夫猶名之大夫於士為尊矣而士於生者猶名之則君前無適而不名也王氏子墨曰長者伯仲叔季之序也男子伯仲叔季之序達於四方女子之長少則不出閨闥而已其各為長宜也冠成人之服也自成童至於成人矣其可不敬其名乎於是從而字之亦冝也夫成人則人以字稱我矣則人之名非我所當名也又況有長幼之序貴賤之别其可名之哉而有時乎名之者君父之前尊有所伸則私有所屈也一家之尊無以加於父也父之前無長幼皆名之不敢致私敬於其長也天下之尊無以加於君也君之前無貴賤皆名之不敢致私敬於其所貴也女子之笄猶男子之冠閨門之内亦當敬其名不言許嫁之年不可以預定也聖人之制禮未嘗不謹其微也男女之别居有堂室之分衣有椸枷之異所以為内外之辨亦至矣而必異其長以明其無所不當别異也聖人之慮蓋微也冠禮醮而三加猶懼其幼志之未棄名字之間若未容遽示以所敬也而必敬其名者以為少長之禮於是乎分也字之以别少長聖人之慮蓋微也晨昏之禮行於家朝覲之禮行於國登降拜俯趨進應對之節截乎其嚴矣父子家庭之間君臣燕閒之際或不名其兄弟同列之名若未害也而聖人之意以為君父之前而不名其兄弟同列則於臣子之敬有所未足也聖人之慮蓋微也男女雖異而伯仲之序可以同者必吾同氣之兄弟也以吾同氣之兄弟而猶不與之同其長則男女之别可不致其嚴哉冠而見字所以責成人之禮備也夫人且將敬我矣我可不思所以自敬乎可不懼不足以得人之敬乎侍父侍君語之及乎他人者猶必謹而名之而畏乎語之誤也則兢兢慄慄之念豈容不加乎起敬起孝之誠豈容不至乎然則聖人之謹其微所以愛天下後世者深矣藍田吕氏曰事父者家無二尊雖母不敢以抗之故無長幼皆名不敢致私敬於其長也事君者國無二尊雖父不敢以抗之故無貴賤尊卑皆名不敢致私敬於其所尊貴也嚴陵方氏曰字縁名生固以敬其名經言廟中不諱與父前子名同意又言君所無私諱與君前臣名同意廬陵胡氏曰父前子名君前臣名宣十五年申犀謂楚王曰母畏知死而不敢廢王命襄二十一年欒盈謂王行人曰陪臣書皆名其父於君前也於他國君前亦然成三年荀罃謂楚王曰以賜君之外臣首馬氏曰女子許嫁則十五而笄未嫁則二十而笄笄而字之猶男子之冠也凡進食之禮左殽右胾食居人之左羮居人之右膾炙處外醯醬處内葱㳿處末酒漿處右以脯脩置者左朐右末鄭氏曰左右皆便食也殽骨體也胾切肉也食飯屬也居人左右以其近也外内殽胾之外内也近醯醬者食之主㳿烝葱也處醯醬之左言末者殊加也殽在俎胾與膾炙葱㳿皆在豆酒漿處羮之右此言若酒若漿耳兩有之則左酒右漿此大夫士與賔客燕食之禮其禮食則冝放公食大夫禮云左胊右末亦便食也屈中曰胊孔氏曰自此至齕之雜明飲食之法今自此至虚口明卿大夫士與客燕食之禮熟肉帶骨而臠曰殽純肉切之曰胾骨是陽故在左肉是隂故在右飯燥為陽故居左羮濕是陰故居右此饌之設羮食最近人羮食之外乃有殽胾故此膾炙醯醬知在殽胾之外内也醯字徐作醢則醢之與醬兩物各别依昏禮及公食大夫禮醬在右醢在左醯醬處内亦當醬在右醯在左案公食大夫禮宰夫自東房授醯醬公設之鄭註云以醯和醬又周禮醯人共齊菹醯物則醯醬共為一物也今此經文若作醯字則是一物醢之與醯其義皆通未知孰是但鄭註葱㳿云處醯醬之左則醯醬一物為勝地道尊右葱㳿既處末則末在左上文繼醯醬之下故知在醯醬之左儀禮正饌唯有菹醢無葱㳿故鄭知葱㳿為殊加也鄭知殽在俎者春秋宣十六年王享士㑹殽烝下云宴有折俎又昏禮及特牲少牢皆骨體在俎是殽在俎又公食大夫禮庶羞十六豆有牛胾羊胾牛炙羊炙芥醬魚膾故知胾膾炙皆在豆葱㳿亦菹類故知在豆也卑客則或酒或漿若尊客則有酒有漿案公食大夫禮云設酒于豆東是酒在左也又云賔三飯設漿飲于稻西所謂左酒右漿也以脯脩置者設食竟所須也脯訓始始作即成也脩亦脯也脩訓治治之乃成鄭註腊人云薄析曰脯捶而施薑桂曰腵脩今明置設脯脩與客之法故云以脯脩置左朐以中屈處置左也右末以末邊際置右也右手取末祭擘食之便脯脩則處酒左藍田吕氏曰據此章所陳饌與辭遜之節雖與公食大夫禮少有不同其大略無甚異恐此即大夫士與賔客禮食之節也公食大夫禮三牲之俎在左庶羞之豆在右俎實皆殽殽骨體也羞豆有胾胾切肉也此則左殽右胾矣公食大夫禮庶羞之豆有膾有炙設于稻南簋西則處外矣公設醯醬于席前則處内矣此其所同也公食大夫禮設黍稷六簋于俎西設鉶四于豆西俎豆南則鉶簋同列矣簋實食也鉶實羮也無左右之别也公食大夫禮飲酒實于觶設于豆東漿飲設于稻西稻東則左稻西則右是左酒右漿不俱在右又無葱㳿脯脩之品此其所異也鄉飲酒之禮以飲為主故先酌酒以行獻酢食禮以食為主故卒食設酒以酳之不獻也左右内外之設皆便乎食因以寓隂陽之義也左氏傳粢食不鑿玊藻云稷食菜羮皆飯也醯醬食之主也公食大夫禮賔將食宰夫自東房授醯醬公設之卒食賔取粱與醬興以降貴食之主也膾炙庶羞也庶羞非正食加饌而已為主者在内加者在外此所以分内外也葱㳿亦加品與膾炙同物故處末末與外皆陽也酒漿與羮同物故處右右隂也若兩有酒漿則左酒右漿酒陽漿隂也脯脩皆有朐嚴陵方氏曰食以六穀為主穀地産也所以作陽徳故居左羮以六牲為主牲天産也所以作隂徳故居右馬氏曰晏子曰先王之濟五味以平其心然則君子之於飲食豈徒充口腹之欲哉醯醬葱㳿之類所以和五味之不及養氣而平心也孔子不撤薑食不得其醬不食亦是意也禮記集説卷五
