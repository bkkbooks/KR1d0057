body:
  text: 禮記集說卷一百三十五宋衛湜撰子曰愚而好自用賤而好自專生乎今之世反古之道如此者烖及其身者也非天子不議禮不制度不考文今天下車同軌書同文行同倫雖有其位茍無其德不敢作禮樂焉雖有其德茍無其位亦不敢作禮樂焉子曰吾說夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周鄭氏曰禮謂人所服行也度國家宫室及車輿文書名也此天下所共行天子乃能一之也今天下孔子謂其時雖有其位以下言作禮樂者必聖人在天子之位也不足徴徴猶明也吾能說夏禮顧杞之君不足與明之也吾從周行今之道孔氏曰自愚而好自用至禮樂焉以上論聖人學誠或語或默以保其身孔子因自明以此之故不敢專制禮樂也車同軌覆上不制度書同文覆上不考文自吾說夏禮以下為上文言身無其位不敢制作二代之禮夏殷不足可從所以獨從周禮之意藍田吕氏曰無德為愚無位為賤有位無德而作禮樂所謂愚而好自用有德無位而作禮樂所謂賤而好自專生周之世而從夏殷之禮所謂居今之世反古之道三者有一焉取烖之道也故王天下有三重焉議禮所以制行故行必同倫制度所以為法故車必同軌考文所以合俗故書必同文唯王天下者行之諸侯有所不與也故國無異政家不殊俗蓋有以一之也如此則寡過矣延平楊氏曰愚無德也而好自用賤無位也而好自專居今之世無德無位而反古以有為皆取烖之道明哲不為也故繼之曰非天子不議禮不制度不考文蓋禮樂制度考文必自天子出所以定民志一天下之習也變禮易樂則有殊焉況敢妄作乎有其位則可以作矣然不知禮樂之情則雖作而不足為法於天下矣故有其位無其德亦不敢作也況無其位乎建安游氏曰愚而好自用非其言足以興也賤而好自專非其默足以容也雖有其位茍無其德不敢作禮樂焉以有義也何自用之有雖有其德茍無其位不敢作禮樂焉以有命也何自專之有生乎今之世則無得位之理乃欲復古之道是干義是犯分也故烖及其身義理所以正天下之行制度所以定天下之器考文所以一天下之道今天下車同軌則度無所事制矣書同文則文無所事考矣行同倫則禮無所事議矣況其位非天子乎孔子於衛先正名於魯先簿正祭器使孔子而得志於天下則其制作必有先後緩急之序矣河東侯氏曰吾學夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周明三代之禮皆可沿革也宋杞不足徴吾言則不言周禮今用之則吾從周此孔子之時中也顔淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞此沿革之大㫖也通天下等百世不弊之法也使孔子而有位焉其獨守周之文而不損益乎新安朱氏曰此第二十八章承上章為下不倍而言亦人道也反復也孔子之言子思引之非天子不議禮以下子思之言禮親疏貴賤相接之體也度品制也軌轍迹之度倫次序之體三者皆同言天下一統也末又引孔子之言杞夏之後徴證也宋殷之後三代之禮孔子皆嘗學之而能言其意但夏禮既不可考證殷禮雖存又非當世之法唯周禮乃時王之制今日所用孔子既不得位則從周而已或問子思之時周室衰微禮樂失官制度不行於天下久矣其曰同軌同文何邪曰當是之時周室雖衰而人猶以為天下之共主諸侯雖有不臣之心然方彼此爭雄不能相上下及六國之未亡猶未能更姓改物而定天下於一者也則周之文軌孰得而變之哉曰周之車軌書文何以能若是其必同也曰古之有天下者必改正朔易服色殊徽號以新天下之耳目一其心志若三代之異尚其見於書傳者詳矣軌者車之轍迹也周人尚輿而制作之法領於冬官其輿之廣六尺六寸故其轍迹之在地者相距之間廣狹如一無有逺邇莫不齊同凡為車者必合乎此然後可以行乎方內而無不通不合乎此則不惟有司得以討之而其行於道路自將偏倚杌􅑾而跬步不前亦不待禁而自不為矣古語所謂閉門造車出門合轍蓋言其法之同而春秋傳所謂同軌畢至者則以言其四海之內政令所及者無不來也文者書之點畫形象也周禮司徒教民道藝而書居其一又有外史掌書名於四方而大行人之法則又每九嵗而一喻焉其制度之詳如此是以雖其末流海內分裂而猶得不變也必至秦滅六國而其號令法制有以同於天下然後車以六尺為度書以小篆𨽻書為法而周制始改爾孰謂子思之時而遽然哉涑水司馬氏曰愚而好自用謂無德而作禮樂者也賤而好自專謂無位而作禮樂者也此無德無位之人生今之世強欲反古之道必不為今人所容故烖必及其身文謂聲名文物軌謂轍間之廣文六書之體倫善惡之理徴謂求訪引證殷人差近宋人宋人雖不足徴而散落差少故曰有宋存焉周禮今所用其文最備故吾從周海陵胡氏曰禮樂自天子出非天子不可議禮度法度也律度量衡之事皆是非天子不可制之文者文教之令考成也文教非天子不可成延平周氏曰愚言其性賤言其分上以道揆故議禮以順其時制度以齊其政考文以一其道若修五禮同律度量衡論書名者是也下以法守故於禮也執之而已於度也謹之而已於文也守之而已此先王之盛時所以同四海於一堂之上者也春秋之衰世上無道揆下無法守而猶有車同軌書同文行同倫者蓋其理出於性命而本在於人心者雖虐政不能泯又況先王之遺風流澤猶或有未息者哉位非天子則禮樂非所主德非聖人則禮樂非所知唯其位為天子德為聖人者然後可以作禮樂也傳曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也此反謂吾學殷禮有宋存焉何也夫以公而責之詳則二國皆不足徴以恕而責之略則彼善於此者有之春秋之法書宋公而未嘗書杞公者亦以此歟傳曰如用之則吾從先進而此反謂吾學周禮今用之吾從周何也蓋從野人所以矯弊而用周禮所以尚文唯其能矯弊而又能尚文此聖人所以不為一曲之論也兼山郭氏曰時為大順次之自孔子述而不作信而好古此聖人在下不當時命者舉皆然也是以君子行禮不求變俗祭祀之禮居喪之服皆如其國之故謹修其法而審行之上則有時王之制下則有國之成俗故也周公聖人之在上故禮樂無所讓孔子聖人之在下故時命有所不得為況愚而自用賤而自專生今之世反古之道者乎孔子作春秋必書王正月意者天下無王則禮樂制度綱紀文章或幾乎息矣王正月無非從周之義也范陽張氏曰茍無其位禮未當道度未合法文未從宜非吾之職也吾其如之何哉夫子雖灼見當行夏之時乘商之輅服周之冕樂則韶舞然不在相位不得相周天子以制作徒有其德而已豈敢自用自專亂天子之法以取烖禍乎莆陽林氏曰文籍典議朝廷之所以紀綱天下非天子則不得考文雖然窮而在下者固當著述傳之來世考文亦何害何必須天子方考文乎蓋考文最是天子一件事仲尼嘗曰知我者春秋罪我者春秋又曰其文則史其義則丘竊取之以仲尼之修春秋但因魯史也述而不作未嘗考文以此愈知非天子不得考文也長樂陳氏曰天子之於天下以道揆者也故禮必議之而後行度必制之而後頒文必考之而後達夫然後朝信道而無異禮工信度而無異度史信書而無異文此天下所以如出乎一家中國所以如出乎一人也今天下車同軌工非不信度也書同文史非不信書也行同倫朝非不信道也然而禮樂不達乎天下者德位不並無以知禮樂之情故也晉陵錢氏曰杞夏後也宋殷後也杞微故不足徴宋在春秋時猶為大國故欲求徴而已乃知其不足徴耳今用之謂周禮今方施用不得不從也案論語云夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也又禮運篇云我欲觀夏道是故之杞而不足徴也吾得夏時焉我欲觀殷道是故之宋而不足徴也吾得坤乾焉三者不同當是先後言之蓋夫子欲兼三代酌文質之中而不能自專故曰吾從周蔡氏曰夏禮殷禮當孔子時所謂雖善無徴者也長樂劉氏曰今天下車同軌者古者天子公侯伯子男士庶人宗廟宫室車旗冠冕衣裳器用城邑井賦自貴逮賤皆有等降居其位守其制不敢踰也上而陵下謂之逼下而陵上謂之僭故制度行而天下莫敢縱其情則五材之用足於天下矣今孔子之時天下之車乃器物之顯而用乎外者也貴賤同其軌法無等降焉則僭逼公行而制度之道亂矣書同文者古者禮樂征伐自天子出而號令臣民俾遵乎大中無敢過與不及也是以君出號令以首政教而公侯伯子男奉而行之所以承流宣化齊天下之不齊一天下之不一故典謨誥誓之文非貴為天子不可得以專之也今孔子之時夷狄稱王子男稱公天子醜於諸侯典謨誓誥之文得以行於小國故曰書同文也行同倫者古者天子祭天地七廟公侯祭境內山川五廟則其下者遞以等降莫不隨其位以行其禮也是君臣父子兄弟夫婦朋友之交性與道雖同禮與位必異則其行也不可得以貴賤同倫矣今季氏陪臣也而旅於泰山三家卿廟也而以雍徹臣道失其位而中失其措人亂其倫可知也孔子傷其時之如是又歎時之天子雖有其位而無其德不可以作禮樂焉已雖有其德而見棄於時又無其位不可以作禮樂焉天時自然德位相背非聖人無意於生靈也既不得救於其時乃將從周之禮述而明之於後世以俟聖王而興之也新安顧氏曰此章言君子之行有攸當也夫德有大小位有尊卑以大德而履尊位宰制自我裁成自我則曰禮樂曰法度曰文章經綸圖回與時變通可也德之與位一有闕焉而有意於斯非妄則僭矣故謂之愚則無德者也謂之賤則無位者也若是而曰自用自專以今之人變古之道則烖且必及其身矣何則有位無德輕於改作天下之心將有所不厭人心一搖危亡且至非烖及其身者乎有德無位敢於改作在上者之所不平刑戮將至非烖及其身者乎是以聖人謂夫禮節之可損可益固所當議也法度之或得或失固所當制也文章之有是有非固所當考也然是三者皆天子之任也今之天下周之天下也四海一統則車同軌矣詩書之訓家傳人誦則書同文矣文武之道未墜於地則行同倫矣此文武周公之所建置者也使上之人而能持循也則治平自可致使下之人而能持循也則德行自可成何必他求哉聖人之作春秋也期望時王惟曰守文王之法度語門弟子一則曰吾從周二則曰吾從周謂夫君子之行所宜爾也雖然有位而無德當盡夫己之所為有德而無位當聽夫天之所為蓋己之所為者性也天之所為者命也性之盡則居位而改作若帝王禮樂不相㳂襲而不為妄命之聽則若大舜有天子之薦周公相成王之治有所改作而不為僭斯又夫子言外之意玉天下有三重焉其寡過矣乎上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從故君子之道本諸身徴諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑質諸鬼神而無疑知天也百世以俟聖人而不惑知人也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也鄭氏曰三重三王之禮上謂君也君雖善善無明徴則其善不信也下謂臣也臣雖善善而不尊君則其善亦不信也知天知人謂知其道也鬼神從天地者也易曰故知鬼神之情狀與天地相似聖人則之百世同道射厭也永長也孔氏曰君子行道必須本於身達諸天地質諸鬼神使為天下後世法孔子微自明己之意也案檀弓曰今丘也殷人也兩楹奠殯哭師之處皆法於殷今云從周者言周禮法最備魯與諸侯皆用之孔子身之所行雜用殷禮也三重謂夏殷周三王之禮其事尊重若能行之寡少於過也君子之道本諸身謂行道先從身起徴諸庶民者徴驗也謂立身行善使有徴驗於庶民也建諸天地建達也不悖謂與天地合所引詩周頌振鷺之篇言微子之德在彼宋國民無惡之在此來朝人無厭倦故庶幾夙夜以長永終竟美譽君子之德亦如此故引以結之河南程氏曰三重即三王之禮三王雖隨時損益各立一箇大本無過不及此與春秋正相合伊川又曰三重言三王所重之事上焉者三王以上三皇已逺之事故無證下焉者非三王之道如諸侯伯者之事故民不尊伊川又曰理則天下只是一箇理故推至四海而準須是質諸天地考諸三王不易之理故敬則只是敬此者也仁是仁此者也信是信此者也藍田吕氏曰徴謂驗於民尊謂稽於古上焉者謂上達之事如性命道德之本不驗之於民之行事則徒言而近於荒唐下焉者謂下達之事如形名度數之末隨時變易無所稽考則臆見而出於穿鑿二者皆無以取信於民是以民無所適從故君子之道必無所不合而後己有所不合僞也非誠也故於身於民於古於天地於鬼神於後無所不合是所謂誠也非僞也物我古今天人之所同然者也如是則其動也行也言也不為天下之法則者未之有也此天下所以有望不厭而蚤有譽於天下者也三重說見前章建安游氏曰夏禮杞不足徴殷禮有宋存焉周禮今用之蓋去當世滋逺則文獻益不足徴也況三代而上乎故王天下有三重而已三重者三代之禮也禮者王天下之道莫重焉故聖王重之上焉者五帝之禮其事不可考而無以示民下焉者五霸之功其道不足稱而無以動民是以聖人稽古之禮不過三王而師古之道上及五帝若通其變使民不倦神而化之使民宜之雖百世聖人不能易也如其損益之禮止言夏殷周而已然五帝之道至堯舜而明三千之禮至文王而備此經所以言仲尼祖述堯舜憲章文武也全體不偏之謂中利用不窮之謂庸此三極之道萬世不可易之理也以此修身則有本以此施之庶人則有徴三王者推此道以盡制也天地者體此道以成物也故考諸三王而不繆建諸天地而不悖鬼神者主此道以應物也聖人者守此道以盡倫也故質諸鬼神而無疑百世以俟聖人而不惑由明則為天地由幽則為鬼神故建諸天地而不悖則質諸鬼神而無疑矣由前則為三王由後則為百世之聖故考諸三王而不繆則百世以俟聖人而不惑矣三王以業言也故稱不繆天地以性言也故稱不疑聖人以德言也故稱不惑鬼神與天地同德故質之不疑為知天聖人與人為徒故俟之不惑為知人天人之道至矣則動而為道行而為法言而為則不獨可以行於一方固可以善天下不獨可以行於一時固可以傳後世逺者慕之近者懷之盛德之實著矣令聞安所逃哉河東侯氏曰王天下有三重焉言三王之法各有可重者如子丑寅之更建忠質文之迭尚損益而得中所以寡過也過此則上焉者三代而上逺而難考故雖善無徴無徴則不信不信民所以弗從也下焉者三代而下雜霸茍且之政不根乎道故雖善不尊不尊則不信不信民所以弗從也君子之道可行於天下者不過近取諸身而已故子思又以切近之道明之如仁之於父子義之於君臣口之於味目之於色耳之於聲鼻之於臭皆吾生之固有性之自然推吾之固有性之自然驗諸庶民亦與吾之心同然又考諸三王以參之考諸三王而不繆則中庸之道至矣又建諸天地以自試焉建諸天地而不悖則與鬼神合其吉凶矣又何疑焉質諸鬼神而無疑知天也天之心即吾之心也百世以俟聖人而不惑知人也前聖人之道後聖人之道是也天也人也無他理也是理也惟聖人能盡之故動而世為天下道行而世為天下法言而世為天下則道也法也則也非吾一己之私天下之道天下之行天下之言吾由之而不悖爾所以逺之則有望近之則不厭詩曰在彼無惡在此無射庶幾夙夜以永終譽庶幾夙夜無終食之間違仁君子終日乾乾也新安朱氏曰此第二十九章承上章居上不驕而言亦人道也上焉者謂時王以前如夏殷之禮雖善而皆不可考下焉者謂聖人在下如孔子雖善於禮而不在尊位也故君子之道以下指王天下者而言其道即議禮制度考文之事也本諸身有其德也徴諸庶民驗其所信從也建立也立於此而參於彼也天地者道也鬼神者造化之迹也百世以俟聖人而不惑所謂聖人復起不易吾言者也知天知人知其理也動兼言行而言道兼法則而言所謂未有不如此者指本諸身以下六事而言三重諸說不同雖程子亦因鄭注然於文義皆不通唯吕氏一說為得之耳至於上下焉者則吕氏亦失之惜乎其不因上句以推之而為是矛盾也曰然則上焉者以時言下焉者以位言宜不得為一說且又安知下焉者之不為霸者事邪曰以王天下者而言則位不可以復上矣以霸者之事而言則其善又不足稱也亦何疑哉曰此章文義多近似而若可以相易者其有辨乎曰有三王以迹言者也故曰不謬言與其己行者無所差也天地以道言者也故曰不悖言與其自然者無所拂也鬼神無形而難知故曰無疑謂幽有以驗乎明也後聖至逺而難料故曰不惑謂逺有以驗乎近也動舉一身兼行與言而言之也道者人所共由兼法與則而言之也法謂法度人之所當守也則謂準則人之所取正也逺者說其德之廣被故企而慕之近者習其行之有常故久而安之也涑水司馬氏曰三王之禮王天下者所宜重也上於三王者謂髙論之士稱引太古以欺惑愚人然無驗於今故民莫肯信而從也下於三王者謂卑論之士趨時徇俗苟求近功然不為人所尊尚故民亦莫肯信而從也惟中庸之道內本於身而可行外施於民而有驗前考於三王不差毫釐後質於來聖若合符契大則能配天地之髙厚幽則能合鬼神之吉凶知天者窮性命之精微知人者盡仁義之極致如此故天下法而效之慕而愛之生榮死哀令聞長世也海陵胡氏曰上焉者天子居天下之上諸侯居一國之上卿大夫居一邑之上下焉者諸侯卿大夫居天子之下考稽也知天者天地鬼神之道不過生成以聖人之德質之而無疑是知天之道也知人者君子之道百世相俟而不惑是知人也永嘉薛氏曰三重三節也上焉不可使知之者也下焉日用而不知者也故君子用其中必本於修身本諸身徴諸庶民匹夫匹婦皆可與知之上無太髙下無太瀆百姓心悅誠服知所徴信則敬而從之所以適道也天地鬼神先聖後聖其道一而已矣莫不以人為本知天知人不過內外之合而己民有所徴而能信無思不服不可得而逺近吾修道之教也見譽有由矣外是而求譽非永終譽者也臨川王氏曰傳注之學多謂三重接上下之意此甚不然蓋言王天下之事者有三最重有此三者則可以寡過矣何為三重下文徴信民從是矣上焉者居富貴之地雖有善當必有徴驗於民無徴驗不足為信矣既已不信則天下之民安能服從哉國不從矣三重者言有徴而可信可信而民從是也下焉者居貧賤之位者也既居貧賤雖有善亦當不失其自重之道可也尊者如上文尊德性尊其性之所自得而重其所為也雖有善不自致其尊且重則不信於外不信則民弗從矣居上而必欲有徴者乃是達則兼善天下也居下而必欲尊者乃是窮則獨善其身也嵩山朝氏曰孔子思教之行也或說或學或不足徴或有存或用之逺近之勢然也中也天下萬變有是三重而寡過為要也寡過則中也唯中則有徴而且尊也上焉者過之也蕩而無徴下焉者不及也屑而不尊雖善而民不信從之也延平周氏曰人不能無過王天下之所以寡過者以其有三重焉所為三重者有善於己而後有以徴於人有以徴於人而後人信之此上焉者雖逺於民而民必從之也有善於己而後有以尊於人有以尊於人而後人信之此下焉者雖近於民而民必從之也然必於上焉者言徴而於下焉者言尊何也蓋上焉者入而為天道則患乎迂濶而無徴下焉者出而為守道則患乎䙝近而不尊則不足以言故稱法法不足以言故稱道所謂動者非言非行而有以見於吾身者皆動也法詳而則略必於行為詳而於言為略者君子欲訥於言而敏於行也唯其世為道而世為法則故逺於己者有望而近於己者不厭夫然後有天下之譽然為君子者果有志於天下之譽邪蓋無名者聖人所以入而處己者也名譽以崇之者聖人所以出而待人者也莆陽林氏曰君子之道須從身上做去便有本領如行逺必自邇登髙必自卑此一箇道理在吾身間最是好如何知得當處但驗諸庶民可知驗諸庶民見天下熙熙皥皥如在春風醇酎之中道德一風俗同人情皆無有差繆建諸天地而不悖謂建立乎天地之中而此理不悖逆也質諸鬼神而無疑者蓋幽明無殊塗明而為人幽而為鬼神明則有禮樂幽則有鬼神幽明之故死生之說其實一理今以此道質之天神地示人鬼而無可疑者則其當時可知百世俟聖人而不惑謂千百世而下雖有聖人復起必從吾言矣兼山郭氏曰上章審禮之時此章言稽古之治所謂三重者言三王之至重也蓋時更三代政歷三王有以見王道之大備也然而不能無過與不及之差則在所損益者也孔子酌三王之道明三王之制觀其告顔子亦曰夏之時殷之輅周之冕蓋可見矣上焉者出於三代之前故逺而無徴下焉者出於三代之後故近而不尊必也本諸身徴諸庶民考三王建天地質鬼神百世以俟聖人舍此道何以哉髙要談氏曰化民之道則當本之於身彼上焉者專言道德雖善矣然微妙而無徴下焉者專言刑政雖善矣然卑陋而不尊是二者皆不足以示信於民而民弗從焉唯君子之道一本於身蓋身者實理之所在而仁義禮知所從出也求之在我既有可言之實驗之於民則亦天下之所同然自堯舜三代以來未有舍是而能化天下者故考諸三王為不繆也是道之大可與天地並立故建諸天地為不悖也是道出於天命之性其理為不欺故質諸鬼神為無疑也是道前聖之所共傳後聖之所當用以人治人古今一理故百世以俟聖人而不惑也晏氏曰觀太史公之論夏之政尚忠忠之敝小人以野則不能無過矣故殷人承之以敬敬之敝小人以鬼則不能無過矣故周人承之以文文之敝小人以僿則不能無過矣又當救之以忠是三重之道皆不免有過唯寡而已上焉者過乎忠質文者鴻荒之世聖人惡之故雖善無徴有所不可從矣下焉者不及乎忠質文者也所謂同乎流俗合乎汙世故雖善不尊有所不足從矣然則可從者其三重乎君子之道不特信於既往亦信於將來以知人之所為無以異乎已也不特信於在明亦信於在幽以知天之所為無以異乎人也蓋知己則知人知人則知天此所以先言本諸身也廣安游氏曰古之聖賢以有名譽為貴名譽以蚤為貴名譽蚤則人信之也蚤人信之也蚤則其化民成俗也易為力矣大道之行天下為公而毁譽信如舜之側微年方三十耕於歷山漁於雷澤陶於河濵而人之從之也如歸市此所謂蚤有名譽於天下者也及至後世人之如舜者亦未易得也故名譽難致而有名譽者或失之不公而毁之繫於人者始輕矣孔子曰君子疾沒世而名不稱孟子曰令聞廣譽施於身以此觀之古之聖賢亦以名譽為貴晉陵錢氏曰重猶難也於三者重難之不敢輕也上焉者三王之前也如夫子所聞雖有善政而制度不存無以為徴下焉者三王之後也如春秋所褒雖有善事而令聞不彰非人所尊二者民不信從故必中考之三王此謂聖人之在上者可以有為矣猶審於古不敢輕用君子之道本諸身徴諸民然後考諸三王建諸天地則於三王亦不敢輕知天知天理之同知人知人心之同有望人嚮之不厭人愛之不如此而蚤有譽則一時之名不足以傳萬世君子不為也此一節謂君子之道不敢自用而監於先王故能傳之後世蔡氏曰三重謂有德有位與徴諸庶民三者上焉者有其位而無其德不能證諸庶民也下焉者有其德而無其位不得證諸庶民也蓋有位有德又能證諸庶民三者皆備然後可以王天下而寡過故曰三重君子之道本諸身徴諸庶民則有備乎三重者矣故可以考三王而不繆以至百世以俟聖人而不惑金華邵氏曰鬼神至幽也何所質而無疑百世聖人未來也何所以而不惑蓋鬼神之理即天之理吾能知天則知無疑於鬼神百世聖人即人之理知人則知不惑於聖人此又一貫之妙也新定顧氏曰此章言君子之道必出於中庸不容過亦不容不及也以王天下者言之其所歸重必在三王於兹取法心無他適藉曰有過亦云寡矣何則三王之道本於中庸惟三王之為重宜其過之寡也否則上焉者賢知之過於中庸者也考其所行未必無善惟其可行於一身不可行於天下則是無證驗於衆人無證驗於衆人人所不信其誰從之下焉者愚不肖之不及於中庸者也考其所行亦未必無善惟其可行於一身不可行於天下則是不見尊於衆人人所不信又誰從之是以君子監觀乎此惟道中庸本之於身證之於庶民察諸三王而無差謬立諸天地而無悖逆正諸鬼神而無所疑百世以待聖人而無所惑中庸一理貫通無間己之與人天地之與鬼神前聖之與後聖斷斷乎必出諸此不容有所增也亦不容有所損也夫是之謂中庸子思子深欲發明此理一定天人攸同重言質諸鬼神而無疑由於知天百世以俟聖人而不惑由於知人蓋君子聰明睿知知天知人夫然故惟中庸之為依夫惟其依乎中庸也故以鬼神處乎幽隱宜有間於顯明者也而曽無疑二百世聖人處乎未來宜有間於今日者也而曽無惑亂則以中庸之理貫通焉而已矣自君子之中庸也是以其動不期於為天下道也而不能不為之道其行不期於為天下法也而不能不為之法其言不期於為天下則也而不能不為之則逺之有望近之不厭皆不期而自致有如詩人之言彼無惡此無射庶幾夙夜以永終譽良以是爾子思推言君子未有不如此而蚤有譽於天下詩人之言永終譽要之於後之無窮也子思子言如此而蚤有譽反之於其初之有自也晉陵喻氏曰必以蚤有譽為言者蓋所以激勸學者不爾則忘毁譽亦非中道也猶言富與貴是人之所欲也此聖人制行不以己也仲尼祖述堯舜憲章文武上律天時下襲水土辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也鄭氏曰律述也幬亦覆也孔氏曰此一節子思申明夫子之德與天地相似祖始也憲法也章明也襲因也河南程氏曰孔子既知宋桓魋不能害己又卻微服過宋舜既見象之將殺己而又象憂則憂象喜則喜國祚長短自有命數人君何用汲汲求治禹稷救飢溺者過門不入非不知饑溺而死者自有命又卻救之如此其急數者之事何故如此須思量到道並行而不相悖處可也伊川又曰小德川流大德敦化只是言君子川流是日用處大德是存主處如俗言敦本之意伊川又曰大德敦化於化育處敦本也小德川流日用處也此言仲尼與天地合德伊川橫渠張氏曰接物皆是小德統㑹處便是大德更須大體上求尋也又曰大德敦化仁知合一厚且化也小德川流淵泉時出之也大德不踰間小德出入可也藍田吕氏曰此言仲尼辟夫天地之大也其博厚足以任天下其髙明足以冒天下其化循環而無窮達消息之理也其用照鑒而不己達晝夜之道也尊賢容衆嘉善而矜不能並育而不相害之理也貴貴尊賢賞功罰罪各當其理並行不相悖之義也禮儀三百威儀三千此小德之所以川流洋洋乎發育萬物峻極於天此大德所以敦化也一本云祖述者推本其意憲章者循守其法川流者如百川派别敦化者如天地一氣又曰五行之氣紛錯於太虛之中並行而不相悖也然一物之感無不具有五行之氣特多寡不常爾一人之身亦無不具有五行之德故百理差殊亦並行而不相悖建安游氏曰中庸之道至仲尼而集大成故此書之末以仲尼明之道著於堯舜故祖述焉法詳於文武故憲章焉體元而亨利物而貞一喜一怒通於四時夫是之謂律天時修其教不易其俗齊其政不易其宜使四方之民各安其常各成其性夫是之謂襲水土上律天時則天道之至教修下襲水土則地理之異宜全矣故博厚配地無不持載髙明配天無不覆幬變通如四時之錯行照臨如日月之代明小以成小大以成大動者植者皆裕如也是謂並育而不相害或進或止或久或速無可無不可是謂並行而不悖動以利物者知也故曰小德川流靜以裕物者仁也故曰大德敦化言川流則知敦化者仁之體言敦化則知川流者知之用河東侯氏曰自吾說夏禮杞不足徴至此皆言仲尼之事仲尼不有天下修此道以傳天下後世能永終譽者也故繼之曰仲尼祖述堯舜堯舜之道天理中庸也道不為堯桀存亡非出於堯舜者也堯舜能由之爾仲尼亦由此道順此理無加損焉故曰祖述堯舜祖猶因也述猶仍也因仍其道而不作也述與述而不作之述同憲章文武堯舜垂衣裳而天下治法度猶未大備也故曰祖述文武之道堯舜之道也法度章禮樂備有儀可象有物可則故曰憲章上律天時則天明也下襲水土因地利也無不持載無不覆幬其廣大也如四時之錯行其變通也如日月之代明其不息也萬物並育而不相害道並行而不相悖從容中道也顔子見其所立卓爾雖欲從之末由也已是也小德川流其日用處禮儀三百威儀三千是也大德敦化其存主處洋洋乎發育萬物峻極於天是也此孔子之所以為大也子曰下學而上達知我者其天乎孔子之學自率性之謂道至天地之所以為大也馴而致之耳聖人雖生而知之然好古敏以求之之心未嘗無也其間參差不齊小大抑揚或進或退或久或速事雖不同其於時中則無異也猶乾之諸爻或潛或見或躍或飛反復進退皆期於道則一也易曰其唯聖人乎知進退存亡而不失其正者其唯聖人乎者孔子也辟如天地之無不持載無不覆幬萬物所以並育而不相害也辟如四時之錯行如日月之代明道所以並行而不相悖也天地之所以大仲尼之德也傳曰唯天為大唯堯則之仲尼則之也延平楊氏曰堯舜道之大成也文武蓋聞而知之者故於堯舜則祖述之以其道之所從出也其文至周而大備故於文武則憲章之憲法也章章之也用之吾從周是也上律天時則天明也下襲水土因地利也故能與天地之大相似也自萬物並育至大德敦化則與天地一矣故不曰仲尼之大而曰天地之所以為大蓋聖人與天地一體也論聖人以明天地之道言天地以見聖人之德無二致也新安朱氏曰此第三十章言天道也祖述者逺宗其道憲章者近守其法律天時者法其自然之運襲水土者因其一定之理皆兼內外該本末而言也如天地如四時如日月言聖人之德錯猶迭也悖猶背也天覆地載萬物並育於其間而不相害四時日月錯行代明而不相悖所以不害不悖者小德之川流所以並育並行者大德之敦化小德者全體之分大德者萬殊之本川流者如川之流脈絡分明而往不息也敦化者敦厚其化根本盛大而出無窮也此言天地之道以見上文取辟之意也或問小德大德之說曰以天地言之則髙下散殊者小德之川流於穆不己者大德之敦化以聖人言之則物各付物者小德之川流純亦不己者大德之敦化以此推之可見諸說之得失矣曰子所謂兼內外該本末而言者何也曰是不可以一事言也姑以夫子已行之迹言之則由其書之有行夏時贊周易也由其行之有不時不食也迅雷風烈必變也以至於仕止久速之皆當其可也而其所以律天時之意可見矣由其書之有序禹貢述職方也由其行之有居魯而逢掖也居宋而章甫也以至於用舍行藏之所遇而安也而其襲水土之意可見矣若因是以推之則古先聖王之所以迎日推策頒朔授民而其大至於禪授放伐各以其時者皆律天時之事也其所以體國經野方設居方而其廣至於昆蟲草木各遂其性者皆襲水土之事也使夫子而得邦家也則亦何歉於是哉涑水司馬氏曰祖猶宗也本也水土者地也小德川流者言其順序易行晝夜不息也大德敦化者言不肅而成不言而喻也永嘉薛氏曰天地之大誠而不己者也仲尼逺繼前聖合德二儀博厚髙明體物無迹大小咸德體合萬殊小者如水之流通異行而俱入於海大者如物之自化不可見而未始踰間天德之至所以為夫子哉兼山郭氏曰祖其道而述之憲其道而章之天地之所以為大者以其無不覆也無不載也四時之錯行日月之代明萬物並育而不相害道並行而不相悖也孔子之所以為大者以其如天地四時日月之運小德川流大德之敦化也小德川流言其用之沛然莫禦也大德敦化言其體之寂然不動也非德之大小顧其為體用者如此是以異夫大德不踰間小德出入者也廣安游氏曰凡後世之法度禮樂皆由堯舜而來而其為法章明於後世則莫盛於文武之時所以於堯舜言祖述於文武言憲章也考之於春秋以堯舜之道撥大亂反之正此其祖述憲章者也春秋具四時及災異之事此其上律天時者也春秋記諸夏之事山川之異此其下襲水土者也非特春秋然也見其禮而知其政聞其樂而知其德無不然也持載覆幬言其道所包之廣大也錯行代明以至川流敦化言其道之通變而泛應曲當也延平周氏曰帝道成於堯舜王道備於文武帝道辟則神也故孔子祖述之而已王道辟則明也故孔子憲章之也律天時所以興天下之大順因水土所以致天下之大利有大順則天人所以和有大利則天人所以同和同天人之際而無間者孔子也唯其與天人無間故言其廣大則如天地之無不持載無不覆幬言其變通則如四時之錯行言其能微能顯則如日月之代明天地之育其物則與之並育而不相害天地之行其道則與之並行而不相悖小德則出入可也故川流所謂川流者合所謂敦化萬殊而歸乎一也大德則不踰間故敦化者如行葦之詩是也所謂化者如汝墳之詩是也至乎並育而不相害並行而不相悖則極矣而又能有小德川流有小德則已矣而又能有大德敦化蓋能崇能卑能粗能精者乃其聖也然終必曰天地之所以為大者言天地之為大則天地也天地之所以為大則孔子也此孔子所以為成能者嵩山朝氏曰仲尼之所以為仲尼者中庸也誠明兩盡而道教行也觀天地於仲尼則足矣莆陽林氏曰自鴻荒茫昧之時道即在人日用飲食之間無人摘出道之大原堯舜始發之仲尼祖述之者述其道統所自出也憲章文武者謂夫子去文武之世為甚近文武之道夫子躬行憲法之於身昭昭然常章著也律天時謂隨時出處可以速則速可以久則久可以仕則仕非律天時安能如此襲水土謂五方之俗皆能諳識當時之齊之楚之宋之衛非襲水土何以如此如四時之錯行者夫子之時也如焚石爍金之時一隂之所生固隂沍寒之時一陽之所生隂中生陽陽中生隂此之謂錯行也如日月之代明者夫子之道如日往則月來寒往則暑來此之謂代明也馬氏曰祖述堯舜憲章文武體人道也上律天時體天道也下襲水土體地道也人道成於堯舜備於文武故於堯舜則祖述之於文武則亦憲章之蓋堯舜帝道之盛者也文武王道之備者也天之變通在於時故於時則上律之地之發育在於水土故於水土則下襲之律言其所法也襲言其因之也天地人之道備於我故辟如天地無不持載無不覆幬言其體也如四時之錯行如日月之代明言其用也天地之育萬物孔子與之並育而不相害天地之行道孔子與之並行而不相悖此孔子之道其妙至於神而不可測泯然與天地為一體矣小德出而成物則如川之流大德體而成已其妙至於敦化莆陽鄭氏曰萬物散殊於天地之間而一理行乎其中如雨露之施而山川草木隨其霑足如春風之蕩而根芽小大遂其生成聖人之道泛應曲當隨事而宜隨用而周亦猶是也豈有並育而相害並行而相悖邪若夫此通而彼礙則相害相悖矣中庸之道豈如是哉一氣分而萬殊乾坤散而六十四卦德豈有小大以分而萬也則曰小德以總而一也則曰大德坎一水也而百川異流道一本也而萬用隨適聖人敦化之道知其一而天下之事畢矣臨川王氏曰中庸論道欲合天人一精粗使學者知精之由於粗天之始於人則用力而不為誕矣故由夫婦之與知而極之於聖人之所不知致曲之誠而極之於聖人之能化故以仲尼之事實之亦以其始之稽前聖法天地而後至於與天地相似由與天地相似而化遂至於與天地為一嘗觀孔子之道至於從心之妙而本之於十五之志學性與天道之不可聞而本之於日用之文章子思言道則極於變化之誠而其本自致曲之誠孟子言道則由仁之於父子而至於聖人之於天道由可欲之善而至於不可知之神君子之教人將使人之皆可為也必使之由易以至難而皆有用力之地故起於夫婦之有餘而推之於聖人所不及舉天下之至易而通之於至難使天下之至難者與其至易者無異也長樂陳氏曰道原出於堯舜祖述者以為宗主也禮法備乎文武憲章者以為準度也變通莫大乎四時律之者法之也生養莫大乎水土襲之者充之也故如天地之覆載即前所謂博厚配地髙明配天如四時之錯行如日月之代明即前所謂悠久無疆物並育道並行川流敦化即前所謂不見而章不動而變無為而成此天地所以為大即前所謂為物不二則其生物不測而仲尼得之不曰仲尼而曰天地者仲尼其天地歟霅川倪氏曰祖始也述者述而不作之述於堯舜曰祖述者書之斷自唐虞是也憲法也章文章也周監於二代郁郁乎文哉吾從周是也上律天時律法也作春秋而先春後秋是也襲水土襲因也重也述職方以除九邱是也持載如坤之厚德載物也覆物如天之遍覆無所不及也季札美舜如天之無不覆如地之無不載是夫子之德與舜同矣易曰與四時合其序合其體也此曰錯行合其用也易曰與日月合其明合其體也此曰代明合其用也范陽張氏曰不曰夫子而曰此天地所以為大意謂夫子沒矣不可得而見也觀諸天地其亦庶幾乎晉陵錢氏曰律襲言與天地無所違異幬冒也地有方使物不流能載使物不陷故謂之持載天覆物之上冒其四表故謂之覆幬四時錯行言其道時中日月代眀言其德日新並育不相害物以異而和並行不相悖道以異而通小德德之用也如川之流其行不窮大德德之體也敦厚而化人莫能測德至此則與天地同其大矣江陵項氏曰此以下凡三章引夫子之道德以明性者之事堯舜以道言文武以事言天時水土亦然覆載言其大德錯行代明言其小德錢唐于氏曰始也以天地辟夫子終也以夫子為天地蓋以迹而論當取天地以為喻以道而論夫子即天地矣非復於夫子之外别有所謂天地也嚴陵喻氏曰夫子之時去堯舜雖逺而其道常存故從而祖述祖也述也皆本之之謂也去文武為近而其典具在故得以憲章憲也章也皆法之之謂也新定錢氏曰祖述堯舜道統傳也憲章文武治具備也上律天時健也下襲水土順也自其日用言之則如百川之分流自其大原言之則如造化之醇厚新定顧氏曰此道何所不育萬物雖多並得以遂其生何相害之有此道何往不行雖事物之紛錯各行於所不得不行何相悖之有德之小者運動不息如川之流德之大者厚重不移物自爾化非天地之大何以能兼有萬象如此此雖一章始之以祖述憲章上律下襲之辭則猶若有意於取法繼之以辟如之辭則猶指其為相似終之以此天地之所以為大則夫子之大即天地之大考乎其辭有始終淺深之異非夫子之德然也子思子之於學者有誘進之意初示之淺而後告之深也唯天下至聖為能聰明睿知足以有臨也寬裕溫柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不說是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天孔氏曰發強剛毅足以有執發起也執猶斷也言發起志意堅強剛毅足以斷決事物也溥謂無不周遍博謂所及廣逺淵泉如淵言潤澤深厚如川流也河南程氏曰溥博淵泉而時出之須是先有溥博淵泉方始能時出自無溥博淵泉豈能以時出之藍田吕氏曰此章言聖人成德之用其效如此聰明睿知足以有臨者天之髙明也寬裕溫柔足以有容者地之博厚也發強剛毅齊莊中正者乾坤之健順也文理密察者天地之經緯也聖人成德固萬物皆備應於物而無窮矣然其所以為聖則停蓄充盛與天地同流而無間者也至大如天至深如淵時而出之如四時之運用萬物之生育所見於外人莫不敬信而說服至於血氣之類莫不尊親非有天德孰能配之延平楊氏曰書曰惟天生聰明時乂易曰知臨大君之宜吉則聰明睿知人君之德也故足以有臨寬裕溫柔人之質也故足以有容發強剛毅以致果故有執齊莊中正以直內故有敬文理密察理於義也故有别臨而不容不足以得衆容而無執不足以有制執而不敬或失於自私敬而無别或無以方外非成德也德成矣故溥博淵泉而時出之溥博如天則其大無外淵泉如淵則其流不窮淵泉言有本也而時出之則其流不息矣故民莫不敬信而說服凡有血氣之類莫不尊親則與天同德矣故曰配天新安朱氏曰此第三十一章承上章而言小德之川流亦天道也聰明睿知生知之質臨謂居上而臨下也其下四者乃仁義禮知之德文文章也理條理也密詳細也察明辨也溥博周遍而廣濶也淵泉靜深而有本也出發見也言五者之德充積於中而以時發見於外也如天如淵民莫不敬信莫不說言其充積極其盛而發見當其可也舟車所至以下蓋極言之配天言其德之所及廣大如天也又曰文理密察文是文章如物之文縷理是條理每事詳審密察故曰足以有别臨川王氏曰聰明者先聰明於己而後聰明於天下睿則書之思曰睿知則易之知周萬物有聰明而無睿知以行則不可書曰無作聰明亂舊章獨任聰明則亂舊章矣故全此四者然後可以有臨於天下也寬則寬大裕則有餘溫則溫良柔則書之柔而立是也易曰容保民無疆是有此四者然後可以有容於天下也發者遇事而發其端緒強者若上文強哉矯之強有執非子莫之謂若擇善而固執之之謂也中者處中道正者守之以正守正而不處中道則不可處中道而不守正亦不可二者必在相須足以有敬於天下常人論敬不過指敬鬼神敬祭祀而言未嘗有言敬天下之民此言聖人亦不敢輕天下之民也能敬於民民亦敬於上文理者人倫之理密謹嚴也察眀察也雖有文理不加密察則制度文法必有亂於天下既以謹嚴明察則足以有别於天下則天下之人亦自知有别矣溥博者廣大也淵泉者深浚也上能有此五者之德而又上下能察乎天地然須時而出之若上文君子時中又曰時措之宜是也茍時可以溫柔而反用剛毅則不可時可以剛毅而反用溫柔則亦不可此言中庸之道所貴者應時而已涑水司馬氏曰此泛言聖人之德文理密察足以有别謂聖人制禮曲為之制事為之防可以别嫌明微也溥博淵泉謂其心時出之謂其言行范陽張氏曰溥博淵泉無非誠之運用於其中也時乎溥博則涵容而不露時乎淵泉則應接而無窮故其見也民敬言也民信行也民說為聲名也中國蠻貊所至所覆所載所照所隊凡有血氣無不尊親是與天地並立於兩間而造化天下矣故曰配天配非比也並也夫敬信民說以至尊親皆誠之為用理當如此使一有不敬不信不說不尊不親是必吾誠有不至也蓋在我有絲毫之差則在誠有尋丈之失此君子所以慎其獨海陵胡氏曰兼聽之謂聰善視之謂明智慮深逺之謂睿有知之謂智寬裕則不暴溫柔則不猛故可涵容天下之人發謂奮發強能任事剛則不撓毅則果敢故能臨事固執而不回齊潔也莊端莊也中正則不諂足以保其敬之道文理者言動之間有文理如枝葉葩華是其文經理條貫是其理密而不泄察而能辨君子身既文理然後從己之身觀人之身密察而不泄其機故足以有别於天下溥言溥遍博言廣博時出之者以時發見出其政教號令溥博如天髙之不可窮淵泉如淵深之不可測發見於政教民皆敬之言而民皆信之行而民皆說之是以聲名洋溢莫不尊而親之永嘉薛氏曰帝德廣運乃聖乃神乃武乃文所見不同一終廣運之德爾成配天之德則其處身接物皆順而不妄動而愈出惟有本者能之爾天地之大何所不容何所不逮苟能此道則有不言之信無為之教聲容言動其有不格者乎此為天道之當然所謂無思不服者也此言也可以見天地可以貫金石有血氣者而能外於是乎兼山郭氏曰此章言聖人之道可以配天聖者極至之謂聖人究極乎中庸其成德之大有所謂聰明睿知足以有臨以至於文理密察足以有别也如天之神化妙用日月星辰風雨霜露之變水火土石邱陵川澤草木昆蟲之化其用之自一其應之不窮如是也夫惟如是故能溥博淵泉而時出之也溥博近中時出近庸故能使民敬信說服凡有血氣者莫不尊親得其尊親所以配天也莆陽林氏曰天下之大四海之逺聖人渺然之身託於士民之上若非聰眀睿知則何以臨人非寬裕溫柔則何以容人發奮也強無作也剛特操也毅果敢決斷也執有執著也齊一其志也莊儼然人望而畏之也中立而不倚也正則無邪也四者所以敬其身也文理密察精密審察也此所以别君子小人使賢不肖不至於混淆也溥博淵泉而時出之此一句見子思形容聖人極到處昧者以為聖人徒然有許多聰明睿知足以有臨至文理密察足以有别而不知聖人胸中停蓄淵深渾厚有本者如是自然發得許多等事出來子思可謂善形容聖人者也髙要談氏曰夫所謂天下至聖者其蓄養成就極大而不可度極深而不可測極大則溥博是也謂其不可度故以如天言之極深則淵泉是也謂其不可測故以如淵言之如天如淵形容之意止矣其不可度不可測之處終不可得而言其可得而言者特時出之用耳所謂聰明睿知足以有臨寬裕溫柔足以有容發強剛毅足以有執齊莊中正足以有敬文理密察足以有别者皆時出之用也蓋其盛德充實輝光發越乎外見於應事而不可掩有此五者可得而言至其溥博之大淵泉之深不可以常知測度唯有如天如淵可以形容之耳唯其德之至盛如此故一行之見民莫不敬一言之出民莫不信血氣之屬莫不尊親則不特民而已禽獸蟲魚皆知所依歸矣語盛德至此非天固莫能盡其形容故止言配天不及其他至矣哉非吾夫子為天下之至聖其孰能與此江陵項氏曰臨者知及之也容者執者仁能守之也敬者莊以涖之也别動之以禮也皆自隱而費也故自天而淵自淵而見又曰明足以照矣恐其不能容量足以容矣恐其不能執強足以執矣恐其誠意之不孚誠足以感人者恐其不周於事物之變又曰聰明言其表睿知言其裏齊莊言其表中正言其裏寬裕言其容物溫柔言其氣味亦是表裏發強剛毅文理密察皆然又曰此章言至聖言其德之著見於外者其費如此下章至誠言其德之根本於內者其隱如此東萊吕氏曰文理密察初非為祕密之密觀察之察也謂如易傳中以形體謂之天以主宰謂之帝以功用謂之鬼以妙用謂之神以性情謂之乾等語銖分粒剖各有攸當而未嘗有割裂阢隉之病析理精微如此乃可謂之文理密察耳錢塘于氏曰夫天下至聖必能具聰明睿知之德可以臨天下故凡寬裕溫柔發強剛毅齊莊中正文理密察有容有執有敬有别悉本於聰明睿知以發之未有昏暗愚昧而有此四者未有聰明睿知而不全此四者新定錢氏曰此足以形容集大成之妙矣溥博如天大無不包也淵泉如淵澄然不動也喜怒哀樂未發之先安有許多名號溥博而已淵泉而已及其時出之則曰有臨曰有容曰有執曰有敬曰有别互見迭出變化無方參錯縱橫自然中節非是聰明睿知而下五者臨時逐項安排出來也人皆有是心心皆具是理惟至於聖方盡此妙所謂配天於是乎在非待到莫不尊親處方謂之配天也下面是其效自如此新定邵氏曰聖人者道之極也唯天下至聖則中庸之道融㑹於心而衆美萬善迭形於外故言其聰明睿知則洞然無蔽足以有臨焉言其寬裕溫柔則恢乎不迫足以有容焉言其發強剛毅則卓乎不撓足以有執焉其齊莊中正也肅然穆然而足以有敬其文理密察也燦然秩然而足以有别舉天下之盛德無踰此數者聖人悉兼而有之是非聖人容心於為此復用力於為彼也道體渾融全體具在隨感而應衆善自形故自其全體言之則溥博也淵泉也何善不該何美不具自其形見者言之當其有臨則為聰明睿知當其有容則為寬裕溫柔以至發強剛毅也齊莊中正也文理密察也皆時出之也上章所言辟如四時之錯行如日月之代明正謂此也夫惟聖人之德其大無外而溥博如天其深莫測而淵泉如淵故時而出之備道全美見而民莫不敬言而民莫不信行而民莫不說者此心同此理同故也人心感孚如此則聲名聞望自邇及逺始也洋洋乎中國久也施及於蠻貊又其久也盡舟車所至之境極人力所通之處窮天覆之所及罄地載之所容凡日月照臨之下霜露飄隊之所血氣心知之屬莫不尊之如神明親之如父母謂之配天不亦宜乎聖人非蘄乎聲名之顯赫也明效大驗自若是其不可掩也上章云此天地之所以為大此章止云配天舉其最大者言之也禮記集說卷一百三十五
