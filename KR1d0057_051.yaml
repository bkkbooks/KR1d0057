body:
  text: 禮記集説卷五十一宋衛湜撰凡祭與養老乞言合語之禮皆小樂正詔之於東序鄭氏曰學以三者之威儀也養老乞言養老人之賢者因從乞善言可行者也合語謂鄉射鄉飲酒大射燕射之屬也鄉射記曰古者於旅也語孔氏曰自此至論説在東序論教世子及學士祭與養老乞言合語之威儀及義理兼明所教之官所教之處又明司成之官考課才藝之深淺也此一凡包三事也三事皆有威儀故小樂正詔告世子及學士於東序此經先言祭與養老乞言别云合語則合語非祭與養老也故鄭知是鄉射鄉飲酒及大射燕射之等指儀禮成文而言之以此等至旅酬之時皆合語也其實祭末及養老亦皆合語也故詩楚茨論祭祀之事云笑語卒獲箋云古者於旅也語是祭有合語也養老既乞言自然合語引鄉射證旅酬之時得言説先王之法言合語者謂合㑹義理而語説也長樂劉氏曰祭謂祀天神祭地祗饗宗廟之禮凡九獻自始及終其儀百出禮意深逺非學弗通而臣子之義致敬以事其君者也茍不素習祭儀預講厥義則與祭執事違誤必多非以致敬也養老者有國之大教也王者必齋戒盡敬致養乎三老五更所以教天下之為人子者孝於其父為人弟者敬於其兄也既教世子以養老之道俾知所以憲也而後教之以乞言之義謂虚己以納其言也不能憲又不能納民不效之矣合語者謂鄉飲酒也鄉射也大射也燕射也祭饗也燕賔也凡是數禮下自鄉黨上至朝廷莫不行之者有貴賤之禮所以明君臣之道也有尊卑之禮所以明父子之道也有長幼之禮所以明兄弟之道也有隂陽之禮所以明夫婦之道也有賔主之禮所以明朋友之道也唯是五者謂之人倫聖人用之以齊一天下致之中和而正是性命所以育萬物賛天地永國命於無疆者莫不以人倫為本焉故終日行禮酒盈人渴而不敢飲殽乾人饑而不敢食者以其有合語之禮在其後焉人倫之道因此禮而旣明乃於旅酬之時歡樂之情通而語言之義合焉此君臣所以和同而誠意所以浹洽也夫是三者為君之大禮有國之大榦故立四代之學以明乎舜也禹也湯也文王也所以配天之徳使世子學士入其學盡禮致敬悚惕以慕其人然後因其心以教之祭祀之儀也養老乞言之禮也合諸人倫之義也所謂反諸其身求所以為舜禹湯文之道者焉馬氏曰古者旅酬之際必合之以語而道其禮樂之意以示其和樂而不流安燕而不亂也嚴陵方氏曰於東序則以先老之所在而教有所本故也後言儐於東序又言適東序與此同意長樂陳氏曰周官大司樂教國子始之以樂徳中之以樂語卒之以樂舞故凡祭與養老之禮乞言語説古之樂語也學舞干戚古之樂舞也蓋徳為樂之實樂為徳之華則樂語徳言也樂舞徳容也凡祭與養老乞言合語之禮其命之在大樂正而小樂正特以儀詔之東序而已斆舞授數不與焉大樂正學舞干戚語説命乞言以數授之而已論其道而説之不與焉此論説在東序所以責之大司成也經曰天子視學適東序釋奠於先老遂設三老五更羣老之席位焉適饌省體養老之珍具遂發咏焉反登歌清廟既歌而語以成之也言父子君臣長幼之道合徳音之致禮之大者也下管象舞大武大合衆以事由是觀之凡祭豈釋奠之禮歟凡養老豈老更羣老歟合語之禮豈徳音之致歟學舞干戚豈舞大武之舞歟言舞則歌可知矣王制曰夏后氏養國老於東序養庶老於西序然此下管象舞大武周樂而已以東序言之豈周人兼用之耶樂書大樂正學舞干戚語説命乞言皆大樂正授數鄭氏曰學以三者之義也戚斧也語説合語之説也數篇數孔氏曰前小樂正既教以三者之威儀今大樂正又教以三者之義理學舞干戚則前經祭祀也祭祀則舞干戚不言祭祀者容祭祀之外餘干戚皆教之語説謂前經合語之説前經云祭故養老乞言與祭相連序在合語之上此不言祭故略其養老在語説之下干戚語説乞言三者皆大樂正之官授世子及學士等篇章之數為之講説使知義理也小樂正教威儀云詔之東序大樂正授數亦在東序也嚴陵方氏曰小樂正學止於干大樂正則兼於戚者分職於小合於大也言干戚而不及羽籥者學武以見文也前言干戈此言干戚相備也石林葉氏曰三者小樂正詔其威儀而至於度數則大樂正授干戚之數則有俯仰授合語之數則有進退授乞言之數則有升降其於東序者數之始也山隂陸氏曰乞言云命者乞言王事也説猶言也直言曰言荅述曰語説若後世問難乞言亦授數者以少為節爾大司成論説在東序鄭氏曰論説課其義之深淺才能優劣此云樂正司業父師司成即大司成司徒之屬師氏也師氏掌以媺詔王教國子以三徳三行及國中失之事也孔氏曰小樂正既詔以三者威儀大樂正又教以三者義理於是大司成之官論量課説此世子學士等義理之淺深才能之優劣於東序之中鄭引師氏以媺詔王以下皆師氏職文中謂中禮失謂失禮長樂劉氏曰大司樂之職曰乃分樂而序之以祭以享以祀故雲門以祀天咸池以祭地大㲈以祭四望大夏以祭山川大濩以享先妣大武以享先祖此授數於國子者乎習其舞知其用則必通其義焉故大司成論説在東序俾國子通六舞之義也反諸其身求為舜禹湯后稷大王者其義之謂乎故師氏教國子三徳一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長國子所以立身之道出於司成是以尊之所以學事其父也貴之所以學事其君也故師嚴然後道尊道尊然後世子孝友忠順油然生於其躬焉長樂陳氏説見前馬氏曰小樂正詔之以三者之儀大樂正授之以三者之數義則深而難知故司成教之於其後數與儀則淺而易見故小樂正大樂正教之於其先蓋學者由淺而至於深也山隂陸氏曰論説即上所謂語説凡語於郊亦是也然東序稱論説於郊稱語亦為郊人宜有未喻者非郊獨語而已説若後世講説語若後世問荅其異於後世者特有時焉一發其端爾大樂正授數亦以此蓋君子之深造於道者欲其自得之若專論説則此口耳之學也説有知焉纔足以知道之筌蹄而已新安王氏曰下文所謂樂正司業即此大樂正授數是也所謂父師司成乃下文所謂太傅在前少傅在後入則有保出則有師以成世子之徳者也而鄭氏以為司徒之屬師氏誤矣大司成即大司樂也不謂之大司樂而謂之大司成者以世子及國子之徳業大司樂教之使成也其所論説者即舞干戚語説乞言之數為講論而詳説之也上所謂干戈羽籥之舞弦誦之歌書禮之文無一不盡而非教者為之論説則習其事不明其義誦讀其言不明其指歸與不學無異大司成所以在東序為之論説也凡侍坐於大司成者逺近間三席可以問終則負牆列事未盡不問鄭氏曰間猶容也容三席則得指畫相分别也席之制廣三尺三寸三分則是所謂函丈也負牆卻就後席相辟也列事未盡不問錯尊者之語不敬也孔氏曰此論國子侍坐於大司成之儀問終則起卻就後席負牆而坐辟後來問者問事之時若尊者序列其事未終盡則不可錯亂尊者之語輙有咨問石林葉氏曰師氏掌教國子以三徳三行論説東序有論説則有問故間三席嚴陵方氏曰可以問者以其聲足以相聞又不至於大逼也曲禮曰先生問焉終則對亦此之意山隂陸氏曰負牆致竦敬也據子夏蹙然而起負牆而立傳曰一命而傴再命而僂三命循牆而走蓋古之人有所受皆如此凡學春官釋奠於其先師秋冬亦如之鄭氏曰官謂禮樂詩書之官周禮曰凡有道者有徳者使教焉死則以為樂祖祭於瞽宗此謂先師之類若漢禮有高堂生樂有制氏詩有毛公書有伏生億可以為之也不言夏夏從春可知釋奠者設薦饌酌奠而已無迎尸以下之事孔氏曰此論四時在學釋奠之事凡學謂禮樂詩書之學教書之官春時於虞庠釋奠先代明書之師教禮之官秋時於瞽宗釋奠先代明禮之師鄭註官謂禮樂詩書之官即所教之官也若春誦夏弦則大師釋奠也教干戈則小樂正樂師等釋奠也教禮者則執禮之官釋奠也引周禮大司樂文以證樂之先師也後世釋奠祭之然則禮及詩書之官有道有徳亦使教焉死則以為書禮之祖後世亦各祭於其學也故云此之謂先師之類以大司樂掌樂故特云樂祖鄭舉漢髙堂生以下為先師疑而不定故發聲為億不及易與春秋者以此經唯有詩書禮樂也釋奠直奠置於物無食飲酬酢之事主於行禮非報功也賈氏曰奠之為言停停饌具而已儀禮疏長樂陳氏曰奠者陳而奠之也古者釋奠或施於山川或施於廟社或施於學周官大祝大㑹同造於廟宜於社過大山川則用事焉反則舎奠甸祝舎奠於祖廟禰亦如之此施於山川廟社者也大司樂凡有道者有徳者使教焉死則以為樂祖祭於瞽宗此經及下始立學者必釋奠於先聖先師及行事必以幣凡釋奠者必有合也適東序釋奠於先老王制出征執有罪反釋奠於學以訊馘告此施於學者也山川廟社之祭不止於釋奠學之祭釋奠而已禮書臨卭魏氏曰記曰凡學春官釋奠於其先師釋者曰若禮有髙堂生樂有制氏詩有毛公書有伏生又曰凡釋奠者必有合也釋者曰若周有周公魯有孔子各自奠之不合也至如祀先賢於西學祭樂祖於瞽宗傳者亦謂各於所習之學祭先師夫周公孔子非周魯之所得而專也而經各立師則周典安有是哉古者民以君為師仁鄙壽天君實司之而臣則輔相人君以師保萬民者也自孔子以前曰聖曰賢有道有徳則未有不生都顯位没祭大烝者此非諸生所得祠也自君師之職不修學校廢井牧壞民散而無所繫於是始有師弟子羣居以相講授者所謂各祭其先師疑秦漢以來始有之而詩書禮樂各立師不能以相通則秦漢以前為士者斷不若是之隘也此亦可見世變日降君師之職下移而先王之道分裂矣然而春秋戰國之亂猶有聖賢為之師秦漢以來猶有專門為之師故所在郡國尚存先師之號奠祠於學故記人識於禮而傳者又即其所聞見以明之也嚴陵方氏曰釋奠止言三時而不及夏者弦誦一師夏則因春故也新安王氏曰先師蓋有所指習樂有樂之先師習禮有禮之先師讀書有書之先師鄭云禮有髙堂生樂有制氏詩有毛公書有伏生此皆漢人引以為比則可古所謂先師其人不可知矣凡始立學者必釋奠於先聖先師及行事必以幣凡釋奠者必有合也有國故則否鄭氏曰謂天子命之教始立學官者也先聖若周公孔子合謂國無先聖先師則所釋奠者當與鄰國合也有國故若唐虞有夔龍伯夷周有周公魯有孔子則各自奠之不合也孔氏曰此明諸侯之國天子命之使立學者必釋奠於先聖先師及用幣以行禮諸侯始立學釋奠先聖先師則天子亦然天子四時釋奠先師不及先聖則諸侯亦然立學重故及先聖常奠輕唯祭先師始立學用幣則四時常奠不用幣也但天子立虞夏殷周四代之學若諸侯止立時王一代之學有大學小學耳周公孔子皆為先聖近周公處祭周公近孔子處祭孔子云合者非謂就他國而祭之謂彼此二國共祭此先聖先師耳若魯有孔子顔囘餘國祭之不必於魯若己國有先聖先師是國故有此人也則不須與鄰國合當各自祭新安王氏曰鄭云先聖若周公孔子然周之學制備於周公而孔子生於春秋之末先王立學未必以周孔為先聖云無先聖先師則釋奠當與鄰國合然唐虞非諸侯之國周公未没孔子未生學校之祭必有先聖鄭以此為例則可以此為先王之禮則非也長樂劉氏曰周有天下立四代之學虞庠則以舜為先聖夏學則以禹為先聖殷學則以湯為先聖東膠則以文王為先聖各取當時左右四聖成其徳業者為之先師以配饗焉此天子立學之法也欲使國之胄子學士及其學則景仰先聖先師之道以為模範焉是以四時釋奠率國子舞而奠幣所以致誠而效法之也長樂陳氏曰四時釋奠止於先師始立學釋奠則及於先聖者徳之小者親而不尊故其祭數徳之大者尊而不親故其祭疏宗廟天地之祭其疏數不同如此意也釋奠必以幣所以禮神必合樂所以樂神國有故則否與曲禮歳凶祭事不縣同意然釋奠及於先聖然後以幣則釋奠於其先師非必以幣也凡大合樂必遂養老則釋奠之有合非大合也又禮書曰學之釋奠則有常時者有非時者春官釋奠於先聖先師秋冬亦如之此常時之釋奠也凡始立學天子視學出征執有罪反以訊馘告必釋奠焉此非時之釋奠也釋奠之禮有牲幣有合樂有獻酬大祝造於廟宜於社過大山川則用事焉反則釋奠此告祭也曾子問曰凡告必用牲幣此始立學釋奠行事必以幣此釋奠有牲幣之證也釋奠者必有合此釋奠有合樂之證也聘禮觴酒陳席於阼薦脯醢三獻一人舉爵獻從者行酬乃出此釋奠有獻酬之證也然山川廟社之釋奠皆有牲幣學之釋奠非始立學則不必有幣也學之釋奠有合樂則山川廟社不必有合也聘賔釋奠有三獻則天子諸侯之於山川廟社不止三獻也然鄭氏以王制之釋奠為釋菜奠幣以文王世子之釋奠者必有合為與鄰國合孔穎達以學記之釋菜為釋奠其説誤也又樂書曰必有合者合舞與聲而已有國故則否與大司樂國有大故去樂弛縣曲禮凶年祭事不縣同意釋奠於先聖先師所以教敬也必遂養老所以教孝也一釋奠合樂而孝敬之教行焉如此則禮樂豈不為天下之大教歟凡釋奠必有合者主行禮以合樂也凡大合樂必遂養老者主合樂以行禮也嚴陵方氏曰師不必聖聖則師可知必始立學然後及於先聖者重其始故也釋奠之有合非大合也大合樂謂天子視學之時也故言必遂養老後言遂設三老五更羣老之席位者以此講義曰釋奠於先師示有所尊也示有所尊則人知信其道而敬其業矣幣者儀物也所以將敬誠者也無儀物何以示敬誠之道焉孟子曰恭敬者幣之未將者也謂雖有恭敬而非幣帛以將之不可也如詩鹿鳴燕羣臣嘉賔又實幣帛筐篚以將其厚意則凡接人交神之禮雖有幽明之異其於將誠之意則一而已故行事必以幣也馬氏曰必以幣者有以加其禮也清江劉氏曰合謂合樂也春釋菜合舞秋頒學合聲釋奠則并合之以侑神也有國故者謂凶札師旅也唯是不合新安朱氏曰以下文考之有合當為合樂從陳説國故當為喪紀凶札之類廬陵胡氏曰先儒以國故為是國故有此人遂謂此始立學者據諸侯也然經意大槩總論天子諸侯不必分也但天子立虞夏殷周四代之學諸侯止立時王一代之學有大學小學爾凡大合樂必遂養老鄭氏曰大合樂謂春入學舎菜合舞秋頒學合聲是時天子則視學焉遂養老謂用其明日也鄉飲酒鄉射之禮明日乃息司正徴惟所欲以告於先生君子可也是養老之象類孔氏曰周禮大胥春合舞秋合聲雖無天子視學之文而月令季春大合樂天子親往則是春合舞秋合聲之時天子亦親視學也先生謂致仕者君子謂鄉中有徳行者此皆老人也故云養老之象類長樂陳氏曰後言天子視學遂適東序養老則視學養老皆同日也鄭氏謂用其明日亦誤矣禮書石林葉氏曰天子一入學而所教者三釋奠以教其重道也合樂以教其崇徳也養老以教其致孝也三代盛時貴游子弟皆能秉禮出封於外足以禦亂食采於内足以助治此道素行也凡語于郊者必取賢斂才焉或以徳進或以事舉或以言揚曲藝皆誓之以待又語三而一有焉乃進其等以其序謂之郊人逺之於成均以及取爵於上尊也鄭氏曰語謂論説於郊學大樂正論造士之秀者升諸司馬曰進士謂此徳進事舉言揚也曲藝謂小技能也誓謹也皆使謹習其事又語為後復論説也三説之中有一善則取之以有曲藝不必盡善進等謂進於衆學者又以其藝為次序逺之者不曰俊選曰郊人賤技藝俟事官之闕者以代之董仲舒曰五帝名大學曰成均則虞庠近是也天子飲酒於虞庠則郊人亦得酌於上尊以相旅孔氏曰此以下明官爵於學士已成者郊西郊也周以虞庠為小學在西郊今天子親視學於西郊考課論說其學者才能以西方成就之地故也或徧在四郊取其賢者斂其才能者以爵之人能不同各隨才用徳謂有道徳者進之宜先事次徳者謂解世事或吏治之屬亦舉用之言又次事能言語應對堪為使命則揚之揚亦舉也曲藝謂小小技術若醫卜之屬學士中雖無前三事而有曲藝欲授試考課皆且卻之令謹習以待後復論説若春待秋時也若三事有一善乃進於衆雖得進於衆而不得與之為一猶使與其輩中自為髙下次序待職闕當擬補之若國子學士未官之前俱為俊選小才藝能未官之前不得同為俊選名曰郊人言猶在郊學也成均則虞庠也以無正文故鄭云近是上尊堂上之酒尊凡飲酒之禮尊者酌堂上之尊卑者酌堂下之尊故特牲禮主人獻賔及獻衆賔長兄弟次賔次兄弟皆酌堂下之尊以相旅其郊人雖賤天子於成均飲酒恩澤及此郊人亦得取爵於堂上之尊以相旅所以榮之長樂劉氏曰語謂萃集學士定其優劣辨論人才於西郊之虞庠以示懲勸也司徒之學養造士及國子所謂成均者在國中則周之大學也大司樂論其造士之秀者以告於王而升諸司馬曰進士進士處於西郊虞庠王制曰司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後禄之則凡語於郊者萃集告於王而定其論之謂也其造士雖由鄉三物以選而升於司徒司馬則諸侯之進士國之胄子羣居於王之大學又須羣居大學出乎其類拔乎其萃或以徳異而進或以事立而舉或以言協而揚曲小技藝非先王之徳業者皆誓戒之不可學也夫造士進士與世子齒者以學先王之道也故流於曲藝者戒之以完其德焉王制曰凡執技以事其上者祝史射御醫卜及百工不貳事不移官出鄉不與士齒則可以齒於世子哉以待又語三而一有焉乃進其等以其序者謂進士之未入官者俾在學以俟又語或徳或事或言出倫拔萃三而一有焉罔不進用也故其進等以其序謂國子與鄉士所用之序不同也謂之郊人逺之於成均處於郊學者皆大成之人故謂之郊人而逺之於成均者成均造士之所處徳業秀茂者乃升於司馬逺其居優其禮使造士跂而慕之焉以及取爵於上尊者言所待又語之郊人以及官有其闕則取而爵之於上所以尊其道也長樂陳氏曰小學在國大學在郊不語於國而語於郊語其成材者而已或以徳或以言所以取賢也或以事或以曲藝所以斂才也取賢則出以長而使之服休斂才則入以治而使之服采然賢者常少而才者常多故於賢言取於才言斂也又曰或以徳進則不必事也或以事舉則不必言也語曰徳行言語政事徳進所謂徳行也事舉所謂政事也言揚所謂言語也聖人不求全不責備意與此同然卿大夫所取如彼其詳而郊之所取如此其略蓋貴者容以恕賤者必以詳也曲藝皆誓者法也三而有一乃進恩也謂之郊人法也於成均以取爵亦恩也恩與法並行而不偏所以取之雖略無害於賢而用之也嚴陵方氏曰必取賢斂才於郊學如此則國學可知矣夫自外入内謂之進自下升上謂之舉自隱之顯謂之揚徳成而上事成而下故先徳而後事事者言之實言者事之文故先事而後言藝謂之曲則以在道之一曲故也自此語以至於三其中有一善可取也乃辨其上下之等循其先後之序而進之也謂之郊人以其非有長民之美猶近乎鄙故也藝成而下非君上之所宜近故曰逺之也周官所謂興賢以六徳為主爾六藝不與焉則曲藝之於道固有所及也故養之於成均以及之且成均之名學也成其虧均其過與不及為義養六藝如此宜矣成均蓋五帝之學名周曰辟廱而此又曰成均者以其行成均之法於此故亦得謂之成均也馬氏曰大學亦在東郊取賢斂才蓋視其賢之小大才之長短也徳與事事與言賢才之别也有徳者必有事與言而有言與事者不必有徳也或以徳進或以事舉或以言揚有以見其立賢無方也曲藝皆有以誓之則又有以見其待人之恕也山隂陸氏曰誓司徒搢扑北面誓之之誓謂之曲藝在物一曲大學五帝謂之成均三王為辟廱蓋人均有是性也吾成之而已此五帝之事也若禮以辟之樂以廱之則致詳焉尊以酌者之左為上所謂取爵於上尊者此歟曲藝雖賤其貴者均也故亦酌上尊焉凡學用禮未有於成均者今於成均以此石林葉氏曰六鄉有庠六遂有序郊則在鄉遂之間也自鄉而進者移於此則漸逺國中之教而有所改自遂而升者由於此則未見國中之教而有所慕是故取賢而以徳進言揚斂才而以事舉藝誓命合而旅語以先王之道則鄉遂之士有所勸也言徳者寡則為取賢事藝者多則為斂才而藝者又君子之餘事也或薄於徳或失於言或謬於事雖並誓之必待又語於斯三者茍得一焉乃進以其等而謂之郊人者所以明貴賤之義也蓋徳成而上藝成而下者等也言成而先事成而後者序也既合曲藝而教於成均天子飲饗以行禮亦得取爵於上尊也明上之取人不以一道盡也始立學者既興器用幣然後釋菜不舞不授器乃退儐於東序一獻無介語可也教世子鄭氏曰興當為釁字之誤也禮樂之器成則釁之用幣告先聖先師以器成又釋菜告先聖先師以器成將用也釋菜禮輕釋奠則舞舞則授器司馬之屬司兵司戈司盾祭祀授舞者兵也言乃退者謂得立三代之學者釋菜於虞庠則儐賔於東序魯之學有米廩東序瞽宗也教世子亦題上事孔氏曰此明禮樂之器初成用幣告先聖先師又釋菜告器成將用及退儐之事始立學者亦謂天子命諸侯始立學也案雜記宗廟之器其名者成則釁之以豭豚前用幣告其器成後釋菜告其將用也案四時釋奠不及先聖知此用幣釋菜及先聖者以上文始立學釋奠先聖先師此亦始立學及器成重於四時常奠也釋菜雖作樂不為舞故不授舞者所執干戈之器大胥云春舎菜合舞彼謂欲合舞先釋菜非釋菜之時則合舞也釋菜虞庠而退乃儐禮其賔於東序其禮既殺唯行一獻無介無語如此於禮可也諸侯唯立時王之學云東序謂諸侯有功徳若魯得立三代學也從上凡學世子至此皆教世子之法其間雖有王子公卿大夫元士之子及國之俊選及釋奠養老之事然以世子為主故云教世子以總之熊氏曰用幣則無菜用菜則無幣月令釋菜不及先聖者以其四時入學釋菜故不及先聖也王制釋奠於學註以為釋菜奠幣知非釋奠者彼是告祭之禮初天子出師受成於學告之無牲明反告亦無牲也故謂釋奠時亦不及先聖也凡釋奠有六始立學釋奠一也四時釋奠有四通前五也王制師還釋奠於學六也釋菜有三春入學釋菜合舞一也此釁器釋菜二也學記皮弁祭菜三也秋頒學合聲無釋菜之文則不釋菜也釋幣唯一也即此釁器用幣是山隂陸氏曰始立學必制器言興非因舊之辭釋菜釋菜而已釋奠則有牲焉亦或用幣用幣則有加也經曰凡始立學者必釋奠於先聖先師及行事必以幣者所以釋始立學釋奠兼有幣也肆師次祀用牲幣小祀用牲鄭氏謂釋奠者設薦饌酌奠而已無迎尸以下事儐於東序據此諸侯亦有東序蓋在頖宫長樂陳氏曰凡家造祭器為先養器為後國亦如之諸侯之國命之教而始立學者亦必以祭器為先則興器者造祭器之謂也授數則天子八佾諸侯六佾之類也授器則文以羽籥武以干戚之類也數則可陳義為難知因可用之器得難求之義則禮豈淺識之士所能豫哉樂書又禮書曰釋菜之禮猶摯也婦見舅姑其摯也棗栗腵脩若没而廟見則釋菜弟子見師其摯也束脩若禮於先師則釋菜合舞而文王世子釋菜不舞不授器者以釋奠既舞故也士喪禮君視斂釋菜入門喪大記大夫士既殯而君往焉釋菜於門内占夢季冬乃舎萌於四方舎萌釋菜也則釋菜之禮豈特弟子之見先師婦之廟見而已哉昏禮婦奠菜菜盛以笲笲飾以緇被纁裏加之於橋橋設於門外婦盥執笲以入坐奠於東几上然則弟子之見先師其儀蓋此類歟鄭氏謂昏禮奠菜蓋用堇荁入學釋菜蘋藻之屬始立學釋菜芹藻之屬蓋以泮宫有芹藻子事父母有堇荁故有是説菜之為摯則菜而已采蘋教成之祭毛氏謂牲用魚芼之用蘋藻則詩所謂湘之者芼之也與釋菜異矣又曰舞者所樂之極而樂之盛者也以其為樂之極故樂成而後詔舞以其為樂之盛故小祭祀不與焉舞師凡小祭祀不興舞此既釁器用幣然後釋菜不舞嚴陵方氏曰有言釋奠有言釋菜何也釋謂釋其所執之物而祭之也故其字或作舎奠言物就可薦矣升而奠之菜則特用菜而已其輕重詳略固可知矣亦見月令仲春命樂正習舞釋菜解儐謂事畢而以賓禮接賔一獻則無酬酢之煩無介則無傳命之助無語則無合語之禮凡此又以始立學而事未暇備故也然非以之為常特可一時而已廬陵胡氏曰儐禮其賔於東序唯一獻無介但語可也新安朱氏曰語即前經合語之等言可也明釋菜時未可語禮尚嚴也凡三王教世子必以禮樂樂所以修内也禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而温文鄭氏曰中心中也懌説懌孔氏曰此至周公踐阼一節論三王教世子禮樂及立師傅教以道徳既成則教尊官正國治之事及覆説周公教成王為世子及在學行一物有三善之事樂從内而生以和諧性情禮以恭敬正其容體樂雖由中從中而見外禮雖由外從外而入中交間錯雜於性情之中宜發形見於身外内外有樂心悦貌和故其成也懌外内有禮貌恭心敬温潤文章故云恭敬而温文長溪劉氏曰虞夏殷周之王天下教其世子皆有成法未始不以禮樂為本也何哉禮能閑邪以存其誠則中可必求樂能反情以復其性則和可必致故虞書帝曰夔命汝典樂教胄子直而温寛而栗剛而無虐簡而無傲則樂以修内者其來尚矣周公采三王所行世子之教以成文王積累之慶甄冶乎其子孫於萬世也乃設師氏之官掌教國子以三徳三行保氏之官掌養國子以道而教之六藝大司樂之職以樂徳教國子中和祗庸孝友是以徳成於中而禮修於外也是以徳行根於心而音容中乎節也懌恭敬而温文之謂也長樂陳氏曰樂雖修内未嘗不發形於外禮雖修外未嘗不交錯於中易曰䝉雜而著交錯於中所以為雜發形於外所以為著教世子以禮樂至於雜而著則其徳成矣故樂之成也心術形而悦懌禮之成也恭敬而温文三王之於世子必始終於此而已不易之道也樂書嚴陵方氏曰凡學之道立於禮成於樂樂由中出故以之修内禮自外作故以之修外然禮樂蓋人之所固有也先王之教人豈能責之以其所無哉亦因其所有修之俾勿壞而已兩相合謂之交兩相雜謂之錯温則不暴文則不野懌言樂之成如此恭敬而温文言禮之成如此馬氏曰禮樂者所以治其内外之道也治内莫如樂治外莫如禮故樂所以修内禮所以修外而教之所始也此禮樂之分也禮樂之交錯於中而發形於外則禮不止於修外樂不止於修内而教之成也此禮樂之合也是故其成也懌恭敬而温文其成也懌有以見其内和也恭敬而温文有以見其外和也温者以言其有容也文者以言其有别也講義曰禮樂之教成則交錯於中而發形於外禮則動容而皆中樂則手舞足蹈而不自知蓋其自得之者如此建安真氏曰三王之教世子必以禮樂者禮所以起人之敬心敬心生則慢心窒矣樂所以感人之和心和心生則戾心消矣其薰陶徳性變化氣質莫妙於此者然樂雖修内由内以達外禮雖修外由外以入中二者醺醲涵暢相與無間故其成也但見其悦懌而已恭敬温文而已恭者敬之發於外者也敬者恭之主於中者也此皆教以禮樂之功也禮記集説卷五十一
