body:
  text: 禮記集說卷一百二十三宋衛湜撰中庸第三十一中庸一篇㑹稽石氏集解自濂溪先生而下凡十家朱文公嘗為之序已而自著章句以十家之說刪成輯略别著或問以開曉後學今每章首録鄭注孔疏次載輯略即繼以朱氏然十家之說凡輯略所不敢取者朱氏或問閒疏其失僅指摘三數言後學或未深解今以石氏本增入庶幾覽者可以參繹其㫖意其有續得諸說則附於朱氏之後孔氏曰案鄭目録云中庸者以其記中和之為用也庸用也孔子之孫子思伋作之河南程氏曰中之理至矣獨隂不生獨陽不生偏則為禽獸為異類中則為人中則不偏常則不易惟中不足以盡之故曰中庸明道又曰天地之化雖廓然無窮然而隂陽之度日月寒暑晝夜之變莫不有常此道之所以為中庸伊川又曰中者只是不偏偏則不是中庸只是常猶言中者是大中也庸者是定理也定理者天下不易之理也是經也孟子只言反經中在其間伊川又曰中庸之言放之則彌滿六合卷之則退藏於密明道又曰中庸始言一理中散為萬事末復合為一理明道又曰中庸之書是孔門傳授成於子思傳於孟子其書雖是雜記更不分精粗一衮說了今人語道多說髙便遺却卑說本便遺却末伊川又曰中庸一卷書自至理便推之於事如國家有九經及歷代聖人之跡莫非實學也如登九層之臺自下而上為是又曰中庸之書決是傳聖人之學不雜子思恐傳授漸失故著此一卷書又曰中庸是孔門傳授心法藍田吕氏曰中庸之書聖門學者盡心以知性躬行以盡性始卒不越乎此書孔子傳之曽子曽子傳之子思子思述所授之言以著于篇故此書之論皆聖人之緒言入德之大要也又曰聖人之德中庸而已中則過與不及皆非道庸則父子兄弟夫婦君臣朋友之常道欲造次顛沛久而不違於仁豈尚一節一行之詭激者哉又曰中庸之書學者所以進德之要本末具備矣既以淺陋之學為諸君道之抑又有所以告諸君者孔子曰古之學者為己今之學者為人為己者心存乎德行而無意乎功名為人者心存乎功名而未及乎德行若後世學者有未及乎為人而濟其私欲者今學聖人之道而先以私欲害之則語之而不入導之而不行教之者亦何望哉聖人立教以示後世未嘗使學者如是也朝廷建學設科以取天下之士亦未嘗使學者如是也學者亦何必捨此而趨彼哉聖人之學不使人過不使人不及立喜怒哀樂未發之中以為之本使學者擇善而固執之其學固有序矣學者蓋亦用心於此乎用心於此則義理必明德行必修師友必稱州里必舉仰企於上古可以不負聖人之傳俯逹於當今可以不負朝廷之教養世之有道君子樂得而親之王公大人樂聞而取之與夫自輕其身涉獵無本徼幸一旦之利者果何如哉諸君有意乎于今日所講有望焉無意乎則不肖今日自為譊譊無益不幾乎侮聖言乎諸君其亦念之哉延平楊氏曰中庸為書微極乎性命之際幽盡乎鬼神之情廣大精微罔不畢舉而獨以中庸名書何也豫聞之師曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理推是言也則其所以書者義可知也世之學者知不足以及此而妄意聖人之微言故物我異觀天人殊歸而髙明中庸之學始兩致矣謂髙明者所以處已而通乎天中庸者所以應物而同乎人則聖人之處已者常過乎中而與夫不及者無以異也為是說者又烏足與議聖學哉新安朱氏曰中庸何為而作也子思子憂道學之失其傳而作也蓋自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶幾也蓋嘗論之心之虛靈知覺一而已矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或微妙而難見耳蓋人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安微者著而動靜云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆於此而接夫道統之傳若吾夫子則雖不得其位而所以繼往聖開來學其功反若有賢於堯舜者然當是時見而知之者唯顔氏曽氏之傳得其宗及曽氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其說之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異如合符節歷選前聖之書所以提挈綱維開示藴奧未有若是其明且盡者也又曰中者不偏不倚無過不及之名庸平常也或問中庸二字孰重先生曰有中而後有庸或問名篇之義程子専以不偏為言呂氏専以無過不及為說二者固不同矣子乃合而言之何也曰中一名而有二義程子固言之矣今以其說推之不偏不倚云者程子所謂在中之義未發之前無所偏倚之名也無過不及者程子所謂中之道也見諸行事各得其中之名也蓋不偏不倚猶立而不近四旁心之體地之中也無過不及猶行而不先不後理之當事之中也故於未發之大本則取不偏不倚之名於己發而時中則取無過不及之義語固各有當也然方其未發雖未有無過不及之可名而所以為無過不及之本體實在於是及其發而得中也雖其所主不能不偏於一事然其所以無過不及者是乃無偏倚者之所為而於一事之中亦未嘗有所偏倚也故程子又曰言和則中在其中言中則含喜怒哀樂在其中而呂氏亦云當其未發此心至虛無所偏倚故謂之中以此心而應萬事之變無往而非中矣是則二義雖殊而實相為體用此愚於名篇之義所以不得取此而遺彼也曰庸字之義程子以不易言之而子以為平常何也曰唯其平常故可常而不可易若驚世駭俗之事則可暫而不得為常矣二說雖殊其致一也但謂之不易則必至於久而後見不若謂之平常則直驗於今之無所詭異而其常久而不可易者可兼舉也况中庸之云上與髙明為對而下與無忌憚者相反其曰庸言之信庸行之謹又以見夫雖細微而必信謹則其名篇之義以不可易而為言者又孰若平常之為切乎曰然則所為平常將不為淺近茍且之云乎曰不然也所謂平常亦曰事理之當然而無所詭異云爾是固非有甚髙難行之事而亦豈同流合汙之謂哉既曰當然則自君臣父子日用之常推而至於堯舜之禪授湯武之放伐其變無窮亦無適而非平常矣又曰中庸一書本只是隨時之中其所以有隨時之中者是緣有那未發之中在又曰為人之說程氏以為欲見知於人者是也呂氏以志於功名言之而謂今之學者未及乎此則是以為人為及物之事而涉獵徼幸以求濟其私者又下此一等也殊不知夫子所謂人者正指此下等人也若曰未能成已而遽欲成物此特可坐以不能知所先後之罪原其設心猶愛而公視彼欲求人知以濟一己之私而後學者不可同日語矣至其所謂立喜怒哀樂未發之中以為之本使學者擇善而固執之者亦曰欲使學者務先存養以為窮理之地耳而語之未瑩乃似聖人强立此中以為大本使人以是為準而取中焉則中者豈聖人之所强立而未發之際亦豈容學者有所取則於其間哉但其全章大㫖則有以切中今時學者之病覽者誠能三復而致思焉亦可以感悟而興起矣霅川倪氏曰堯咨舜曰允執其中舜授禹曰允執厥中仲虺謂湯建中于民孟子曰湯執中文王演易以二五為中武王訪箕子箕子陳洪範以皇極為中周禮以五禮坊民僞而教之中而未有言庸者孔子始以中對庸言之其在易之文言曰龍德而正中者也繼之曰庸言之信庸行之謹然猶分言之也至論語始曰中庸之為德其至矣乎民鮮能久矣於是中之與庸始合為一子思之名中庸蓋本諸孔子也新定顧氏曰理有自然之則非過非不及聖人所以名之曰中理無所變更歷萬世如一日聖人所以名之曰庸易言太極書言皇極中之謂也易言正者事之幹又言常久而不已庸之謂也中也庸也聖人所以名此理之本體也中庸一書始之以此道之本體中之以此道之運行末復歸之此道之本體所謂無先後無彼此一以貫之天命之謂性率性之謂道修道之謂教鄭氏曰天命謂天所命生人者也是謂性命率循也循性行之是謂道修治也治而廣之人倣效之是曰教孔氏曰自此至育焉一節明中庸之德必修道而行河南程氏曰言天之自然者謂之天道言天之付與萬物者謂之天命明道又曰民受天命之中以生天命之謂性也人之生也直意亦如此若以生為生養之生却是修道之謂教也至下文始自云能者養之以福不能者敗以取禍則乃是教也明道又曰孟子曰仁者人也合而言之道也中庸所謂率性之謂道是也又曰生之謂性性即氣氣即性生之謂也人生氣禀理有善惡然不是性中原有此兩物相對而生也有自幼而善有自幼而惡是氣禀有然也善固性也然惡亦不可不謂之性也蓋生之謂性人生而靜以上不容說才說性時便已不是性也凡人說性只是說繼之者善也孟子言人性善是也夫所謂繼之者善也者猶水流而就下也皆水也有流而至海終無所汙此何煩人力之為也有流而未逺固已漸濁有出而甚逺方有所濁有濁之多者有濁之少者清濁雖不同然不可以濁者不為水也如此則人不可以不加澄治之功故用力敏勇則疾清用力緩怠則遲清及其清也則却只是元初水也亦不是將清來換却濁亦不是取出濁來置在一隅也水之清則性善之謂也故不是善與惡在性中為兩物相對各自出來此理天命也順而循之則道也循此而修之各得其分則教也自天命以至於教我無加損焉此舜有天下而不與焉者也又曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教孟子於其中又發揮出浩然之氣可謂盡矣故說神如在其上如在其左右合小大事而只曰誠之不可掩如此夫徹上徹下不過如此形而上為道形而下為器須著如此說器亦道道亦器但得道在不繫今與後已與人先生常語韓持國曰如說妄說幻為不好底性則請别尋一箇好底性來換了此不好底性蓋道即性也若道外尋性性外尋道便不是聖賢論天德蓋謂自家元是天然完全自足之物若無所汙壞即當直而行之若小有汙壞即敬以治之使復如舊者蓋為自家本質元是完足之物若合修治而修治之是義也若不消修治而不修治亦是義也故常簡易明白而易行禪學者總是强生事至如山河大地之說是他山河大地又干你何事至如孔子道如日星之明猶患門人未能盡曉故曰豫欲無言如顔子則便默識其他未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉可謂明白矣若能於此言上看得破便信是㑹禪也非是未尋得蓋實是無去處說此理本無二致也明道又曰生之謂性與天命之謂性同乎性字不可一槩論生之論性止訓所禀受也天命之謂性此言性之理也今人言性柔緩性剛急皆生來如此訓所禀受也若性之理則無不善曰天者自然之理也伊川又曰告子云生之謂性凡天地所生之物須是謂之性皆謂之性則可於中却須分别牛之性馬之性是他便只是一般如釋氏說蠢動含靈皆有佛性如此則不可天命之謂性率性之謂道者天降是於下萬物流形各正性命者是所謂性也循其性而不失是所謂道也此亦通人物而言循性者馬則為馬之性又不做牛底性牛則為牛之性又不為馬底性此所謂率性也人在天地之間與萬物同流天幾時分别出是人是物修道之謂教此則専在人事以失其本性故修而求復之則入於學若元不失則何修之有成性存存道義之門亦是萬物各有成性存存亦是生生不已之意天只是以生為道又曰率性之謂道率循也若言道不消先立下名義則茫茫地何處下手何處著心伊川又曰人須是自為善又不可都不管他蓋有教焉修道之謂教豈可不修橫渠張氏曰由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名藍田呂氏曰此章先明性道教之所以名性與天道一也天道降而在人故謂之性性者生生之所固有也循是而言之莫非道也道之在人有時與位之不同必欲為法於後世不可不修一本云天命之謂性即所謂中修道之謂教即所謂庸中者道之所自出庸者由道而後立蓋中者天道也天德也降而在人人禀而受之是之謂性書曰惟皇上帝降衷于下民傳曰民受天地之中以生此人性所以必善故曰天命之謂性性與天道本無有異但人雖受天地之中以生而梏於蕞然之形體常有私意小知撓乎其間故與天地不相似所發遂至於出入不齊而不中節如使所得於天者不喪則何患不中節乎故良心所發莫非道也在我者惻隱羞惡辭讓是非皆道也在彼者君臣父子夫婦昆弟朋友之交亦道也在物之分則有彼我之殊在性之分則合乎內外一體而已是皆人心所同然乃吾性之所固有隨喜怒哀樂之所發則愛必有等差敬必有節文所感重者其應也亦重所感輕者其應也亦輕自斬至緦喪服異等而九族之情無所憾自王公至皂𨽻儀章異制而上下之分莫敢爭非出於性之所有安能致是乎故曰率性之謂道循性而行無物撓之雖無不中節然人禀於天者不能無厚薄昏明則應於物者亦不能無小過小不及故喜斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯歎歎斯辟辟斯踊矣品節斯斯之謂禮閔子除喪而見孔子豫之琴而彈之切切而哀曰先王制禮不敢過也子夏除喪而見孔子豫之琴而彈之侃侃而樂曰先王制禮不敢不及也故心誠求之雖不中不逺矣然將逹之天下傳之後世慮其所終稽其所敝則其小過小不及者不可以不修此先王所以制禮故曰修道之謂教建安游氏曰惟皇上帝降衷于下民則天命也若遁天倍情則非性矣天之所以命萬物者道也而性者具道以生也因其性之固然而無容私焉則道在我矣此率性之謂道也若出於人為則非道矣夫道不可擅而有也固將與天下共之故修禮以示之中修樂以導之和此修道之謂教也或蔽於天或蔽於人為我至於無君兼愛至於無父則非教矣知天命之謂性則孟子性善之說可見矣或曰性惡或曰善惡混或曰有三品皆非知天命者也延平楊氏曰天命之謂性人欲非性也率性之謂道離性非道也性天命也命天理也道則性命之理而已孟子道性善蓋原於此謂性有不善者誣天也性無不善則不可加損也無俟乎修焉率之而已楊雄謂學以修性非知性也故孔子曰盡性子思曰率性曰尊德性孟子曰知性養性未嘗言修也然則道其可修乎曰道者百姓日用而不知也先王為防範使過不及者取中焉所以教也謂之修者蓋亦品節之而已又曰性命道三者一體而異名初無二致也故在天曰命在人曰性率性而行曰道特所從言之異耳又曰人性上不可添一物堯舜所以為萬世法只是率性而已所謂率性循天理是也外邉用計用數假饒立得功業只是人欲之私與聖賢作用天地懸隔又曰荆公云天使我有是之謂命命之在我之謂性是未知性命之理其曰使我正所謂使然也使然可以為命乎以命在我為性則命自一物若中庸言天命之謂性性即天命也又豈二物哉如云在天為命在人為性此語似無病然亦不須如此說性命初無二理第所由之者異耳率性之謂道如易所謂聖人之作易將以順性命之理是也又曰韓子曰仁與義為定名道與德為虛位其意蓋曰由仁義而之焉斯謂之道充仁義而足乎已斯謂之德則所謂道德云者仁義而已矣故以仁義為定名道德為虛位中庸曰天命之謂性率性之謂道仁義性所有也則捨仁義而言道者固非也道固有仁義而仁義不足以盡道則以道德為虛位者亦非也新安朱子曰自此至萬物育焉是第一章子思述所傳之意以立言首明道之本原出於天而不可易其實體偹於己而不可離次言存養省察之要終言聖神功化之極蓋欲學者於此反求諸身而自得之以去夫外誘之私而充其本然之善楊氏所謂一篇之體要是也其下十章蓋子思引夫子之言以終此章之義命猶令也性即理也天以隂陽五行化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之德所謂性也道猶路也人物各循其性之自然則其日用事物之間莫不各有當行之路是則所謂道也修品節之也性道雖同而氣禀或異故不能無過不及之差聖人因人物之所當行者而品節之以為法於天下則謂之教若禮樂刑政之屬是也蓋人之所以為人道之所以為道聖人之所以為教原其所自無一不本於天而備於我學者知之則其於學知所用力而自不能已矣故子思於此首發明之讀者所宜深體而默識也或問天命之謂性率性之謂道修道之謂教何也曰此先明性道教之所以名以見其本皆出於天而實不外於我也天命之謂性言天所以命乎人者是則人之所以為性也蓋天之所以賦與萬物而不能自已者命也吾之得乎是命以生而莫非全體者性也故以命言之則曰元亨利貞而四時五行庶類萬化莫不由是而出以性言之則曰仁義禮知而四端五典萬物萬事之理無不統於其間蓋在天在人雖有性命之分而其理則未嘗不一在人在物雖有氣禀之異而其理則未嘗不同此吾之性所以純粹至善而非若荀楊韓子之所云也率性之謂道言循其所得乎天以生者則事事物物莫不自然各有當行之路是則所謂道也蓋天命之性仁義禮知而已循其仁之性則自父子之親以至於仁民愛物皆道也循其義之性則自君臣之分以至於敬長尊賢皆道也循其禮之性則恭敬辭讓之節文皆道也循其知之性則是非邪正之分别亦道也蓋所謂性者無一理之不具故所謂道者不待外求而無所不備所謂性者無一物之不得故所謂道者不假人為而無所不周雖鳥獸草木之生僅得形氣之偏而不能有以通貫乎全體然其知覺運動榮瘁開落亦皆循其性而各有自然之理焉至於虎狼之父子螻蟻之君臣豺獺之報本睢鳩之有别則其形氣之所偏又反有以存其義理之所得尤可以見天命之本然初無間隔而所謂道者亦未嘗不在是也是豈有待於人為而亦豈人之所得為哉修道之謂教言聖人因是道而品節之以立法垂訓於天下是則所謂教也蓋天命之性率性之道皆理之自然而人物之所同得者也人雖得其形氣之正然其清濁厚薄之禀亦有不得不異者是以賢智者或失之過愚不肖者或不能及而得於此者亦或不能無失於彼是以私意人欲或生其間而於所謂性者不免有所昏蔽錯雜而無以全其所受之正性有不全則於所謂道者固以有所乖戾舛逆而無以適乎所行之宜唯聖人之心清明純粹天理渾然無所虧闕故能因其道之所在而為之品節防範立法以教於天下使夫過不及者有以取中焉蓋有以辨其親疏之殺而使之各盡其情則仁之為教立矣有以别其貴賤之等而使之各盡其分則義之為教行矣為之制度文為使之有以守而不失則禮之為教得矣為之開導禁止使之有以别而不差則知之為教明矣夫如是是以人無知愚事無大小皆得有所持循據守以去其人欲之私而復乎天理之正推而至於天下之物則以順其所欲違其所惡因其材質之宜以致其用制其取用之節以遂其生皆有政事之施焉此則聖人所以財成天地之道以致其彌縫輔贊之功然亦未始外乎人之所受乎天者而强為之也子思以是三言著於篇首雖曰姑以釋夫三者之名義學者能因其所指而反身以驗之則其所知豈獨名義之間而已哉蓋有得乎天命之說則知天之所以與我者無一理之不備而釋氏所謂空者非性矣有以得乎率性之說則知我之所得乎天者無一物之不該而老氏所謂無者非道矣有以得乎修道之說則知聖人之所以教我者莫非因其所固有而去其所本無背其所至難而從其所甚易而凡世儒之訓詁詞章管商之權謀功利佛老之清淨寂滅與夫百家衆技之支離偏曲皆非所以為教矣由是以往因其所固有之不可昧者而益致其學問思辨之功因其所甚易之不能已者而益致其持守推行之力則夫天命之性率性之道豈不昭然日用之間而修道之教又將由我而後立矣又曰程子之論率性正就私意人欲未萌之處指其自然發見各有條理者而言以見道之所以得名非指修為而言也呂氏良心之發以下至安能至是一節亦甚精密但謂人雖受天地之中以生而梏於形體又為私意小知所撓故與天地不相似而發不中節必有以不失其所受乎天者然後為道則所謂道者又在修為之後而反由教以得之非復子思程子所指人欲未萌自然發見之意矣游氏所謂無容私焉則道在我楊氏所謂率之而已者似亦皆有呂氏之病也至於修道則程子養之以福修而求復之云却似未合子思本文之意獨其一條所謂循此修之各得其分而引舜事以通結之者為得其㫖故其門人亦多祖之但所引舜事或非論語本文之意耳呂氏所謂先王制禮達之天下傳之後世者得之但其本說率性之道處已失其㫖而於此又推本之以為率性而行雖已中節而所禀不能無過不及若能心誠求之自然不中不逺但欲達之天下傳之後世所以又當修道而立教焉則為大繁復而失本文之意耳改本又以時位不同為言似亦不親切也又曰楊氏所論王氏之失如何曰王氏之言固為多病然此所云天使我有是者猶曰上帝降衷云爾豈真以為有或使之者哉其曰在天為命在人為性則程子亦云而楊氏又自言之蓋無悖於理者今乃指為王氏之失不唯似同浴而譏裸裎亦近於意有不平而反為至公之纍矣且以率性之道為順性命之理文意亦不相似若游氏以遁天倍情為非性則又不若楊氏人欲非性之云也北溪陳氏曰命猶令也天不言如何命只是大化流行氣到便生物似分付命令一般又曰命有二義有以理言有以氣言其實理不外乎氣蓋二氣流行萬古生生不息必有主宰之者理是也理在其中為之樞紐故大化流行生生未嘗止息所謂以理言者非有離乎氣只是就氣上指出不離乎氣而為言耳如天命之謂性五十知天命窮理盡性至於命此皆指理而言天命即天道流行賦豫於物者就元亨利貞之理而言則謂之天命如就氣說亦有兩等一等說貧富貴賤夀夭禍福如所謂死生有命與莫非命也之命此乃就受氣短長厚薄不齊上論是命分之命又一等如孟子所謂仁之於父子義之於君臣命也之命是又就禀氣清濁不齊上論是說人之智愚賢否又曰性即理也不謂之理謂之性蓋理是凡言天地間人物公共之理性是在我之性性字從生從心是人生具是理於心方名曰性其大目只是仁義禮智得天命之元在我為仁得天命之亨在我為禮得天命之利在我為義得天命之貞在我為智仁義禮智之實理便是信如四行無土便都無所該載又曰性命本非二物在天謂之命在人謂之性程子曰天所付為命人所受為性然不分看則不分明不合看則支離了須渾然一理中看得有界分不相亂所以謂之命謂之性者何故大扺性即是理然人之生不成空有是理須有形骸方載得此理其實理不外乎氣得天地之氣成此形得天地之理成此性所以橫渠曰天地之塞吾其體天地之帥吾其性就孟子浩然之氣塞乎天地一句掇塞字來說氣就孟子志氣之帥掇帥字來說理人與物同得天地之氣以生人得五行之秀正而通所以仁義禮智粹然獨與物異物得氣之偏為形骸所拘所以其理閉塞不通又曰天命人以是理人所受以為性皆本善而無惡孟子道性善就大本上說得極親切只是不曽發出氣禀一假所以啓後世紛紛之論人有萬殊不齊只緣氣禀不同此氣只是隂陽五行之氣如陽性剛隂性柔火性燥水性潤金性寒木性溫土性厚重七者夾雜人隨所值便有參差不齊然氣運往來自有真元之㑹如厯法算到本數湊合所謂日月如合璧五星如連珠時相似聖人便是禀得貞元之㑹然天地間參差不齊之時多貞元㑹合之時少如一嵗間極寒極暑隂晦之時多不寒不暑光風霽月之時極少難得恰好時節人生多值此不齊之氣值陽氣多者剛烈值隂氣多者懦弱值陽氣之惡者燥暴忿戾值隂氣之惡者狡譎姦險有人性圓一撥便轉有性愚拗一句善言說不入與禽獸無異却是氣禀如此陽氣中有善惡隂氣中亦有善惡如通書所謂剛善剛惡柔善柔惡不是隂陽氣本惡只是分合轉移齊不齊中自然成粹駮善惡耳因氣有粹駮便有賢愚然氣雖不齊大本則一雖下愚亦可變而為善只為工夫最難非百倍其功者不能子思言人一己百人十己千雖愚必明雖柔必强正為此自孟子不說到氣禀所以荀子以性為惡楊子言善惡混韓文公三品皆只說得氣東坡蘇氏又謂性未有善惡五峰胡氏又謂性無善惡皆是含糊捉摸不曽說得端的直至二程得濓溪太極圖開端於本性之外發出氣禀一假方見得善惡所由來故其言曰論性不論氣不備論氣不論性不明二之則不是此說不可改易又曰氣質之性是以氣禀言之天地之性是以大本言之其實天地之性亦不離氣質之中只是就氣中分别出天地之性不與相離為言耳此意學者又當知之又曰道猶路也人所通行方謂之路一人獨行不得謂之路道之大綱只是日用間人倫事物所當行之理衆所共由方謂之道又曰老氏以無為宗佛氏以空為宗以未有天地之先為吾真體以天地萬物為幻視人事為粗迹盡欲屏除一歸真空乃為得道不知道只是人事之理耳形而上者謂之道形而下者謂之器自形而上者言之其隱然不可見者謂之道自形而下者言之其顯然可見者謂之器其實道不離乎器道只是器之理人事有形狀處此之謂器人事中之理便是道如君臣有義義即是道君臣是器父子有親親即是道父子是器非於君臣父子之外别有所謂義與親又曰易說一隂一陽之謂道隂陽氣也形而下者也道理也即隂陽之理形而上者也此孔子就造化根源上論如志於道可與適道道在爾之類又是就人事上論聖賢與人說道多就人事上說惟此句乃贊易時說來歷根源涑水司馬氏曰性者物之所禀於天以生者也命者令也天不言而無私豈有命令付與於人哉正以隂陽相推八卦相蕩五行周流四時運行消息錯綜變化無窮庶物禀之以生各正性命其品萬殊人為萬物之靈得五行之秀氣故皆有仁義禮智信與身俱生木為仁金為義火為禮水為智土為信五常之本既禀之於天則不得不謂之天命也水火金木非土無依仁義禮智非信無成孟子言四端茍無誠信則非仁義禮智矣夫人禀五行而生無問賢愚其五常之性必具顧其少多厚薄則不同矣或相倍蓰或相什百或厚於此而薄於彼或厚於彼而薄於此多且厚者為聖賢少且薄者為庸愚故曰天命之謂性臨川王氏曰人受天而生使我有是之謂命命之在我之謂性不唯人之受而有是也至草木禽獸昆蟲魚鱉之類亦禀天而有性也然性果何物也曰善而已矣性雖均善而不能自明欲明其性則在人率循而已率其性不失則五常之道自明然人患不能修其五常之道以充其性能充性而修之則必以古聖賢之教為法而自養其心不先修道則不可以知命易曰窮理盡性以至於命易何以不先言命而此何以首之蓋天生而有是性命不修其道亦不能明其性命也是中庸與易之說合此皆因中人之性言也故曰自誠明謂之性自明誠謂之教夫教者在中人修之則謂之教至於聖人則豈俟乎修而至也若顔回者是亦中人之性也唯能修之不已故庶幾於聖人也廣漢張氏曰天命之謂性此言性之統體也率性之謂道此言萬化之流行也修道之謂教此言人所以致存察之功而有諸己者也一人之性天地之性也而人自拘於氣禀之小耳茍能致存察之功則天性可得而全而萬化可備於己也然而非先識夫天性之大則無以見萬化之流行而工夫在我者亦無所施矣海陵胡氏曰性之善非獨聖賢有之也天下至愚之人皆有之然愚者不知善性之在己也不能循而行之在上者當修治充廣無常之道使下之民覩而效之故謂之教老吾老以及人老幼吾幼以及人幼此教民以仁也制為廬井使出入相友守望相助疾病相扶持此教民以義也郊社宗廟致敬鬼神此教民以智也設為冠昏喪祭鄉飲酒之儀此教民以禮也發號施令信賞必罰不欺於民此教民以信也廣安游氏曰性以天命言之言其本於自然與生俱生者也率者循也修者有所不至而修之也率性之謂道此亦自誠而明者言也自誠而明則其性自正特率循之而已若自明而誠則誠有所未至未能率其性則必修有所未至而後可子思之意使上者循其性而無失下者資於教以修之天下之人不過此兩等而已晉陵喻氏曰人之生天之命也有命則有性性出於天則天下之性一也人受天地之中以生其誰無性能率其性則道在是矣士君子修其道使天下遵其教循理而動不失所以得於天者則中庸之德行矣夫子未嘗言性子貢曰夫子之言性與天道不可得而聞蓋性與天道本乎自然天地之內何者非天天之所生何者非性苟不悖焉則與天為一性斯存也吾欲言之天何言哉動靜語默何者非道識子貢之不可得而聞而後識所謂天識所謂命識所謂性識所謂率識所謂修識所謂道且識所謂教也中庸之篇無非教也孟子曰性善非孟子自言也古聖人之言也古之言性者有曰惟民生厚因物有遷厚即善也遷即習也有曰人生而靜天之性也感物而動性之欲也靜者善也感者習也生之謂性生非善而何惟人萬物之靈靈非善而何萬物化醇醇非善而何惟皇上帝降衷于下民若有恆性衷者善也恆非善而何天生蒸民有物有則民之秉彝好是懿德物則者善也秉彝好德非善而何馬氏曰性在於我而令之者在天故天命之謂性道出於天而成之者在人故率性之謂道教在於彼而主之者在此故修道之謂教自天命之謂性至率性之謂道則天人之理備矣自率性之謂道至修道之謂教則物我之治具矣有以得於天而不遺於人有以治於我而不遺於物此其道所以具天地之純古今之大體也山隂陸氏曰王文公云天使我有是之謂命命之在我之謂性道法自然道有率而無修修教之事也佛氏言理性是亦性也老氏言道德是亦道也然不可以入仲尼之域者以知率之而不知修之之道也故曰佛老之道無之則昧理有之則害教然則所謂修者何也曰仁以人之義以宜之禮以節之信以成之有所不足不敢不勉有餘不敢盡也延平周氏曰莫非命也凡天之與我而同然無間者皆命也莫非性也凡命之在我而各有儀則者皆性也率其性則性之全性之全故為道道則天也有人焉修其道則道之散道之散故為教教則人也有天焉吳興沈氏曰性不可言也大包天地圓徹太虛雖皇天上帝亦與之同然於無何有之初豈復有使然者哉今曰天命之謂性非天諄諄然命之也孟子曰莫之為而為者天也莫之致而致者命也凡言莫之為莫之致者皆非人力所可能也是天命之說也惟易嘗言之窮理盡性以至於命理窮矣性盡矣然後至於命則命為天理之自然也果矣率非循也率然而動者無非真也性本無事茍率爾而有動則為道也仁義禮智雖具於性非事夫仁義禮智者也乍見孺子入井而惻然之心生是率性而為仁之道也簞食豆羮呼爾而弗受是率性而為義之道也引而伸之禮智皆然易曰寂然不動感而遂通天下之故此率性為道之說也性非可修則道不可修也修之云者非有所增損也品節文飾之耳向也仁義禮智之動於性則為道今也仁行於父子義行於君臣禮行於賔主智行於賢者而父子君臣賔主賢者之教著矣自性而道自道而教中庸盡具於此嘗謂天命之謂性此中庸之體也修道之謂教言中庸之用也率性之謂道兼體用而言之也造道者欲知中庸之樞㑹即兹三者而見矣晉陵錢氏曰性道教三者一篇之大㫖命猶畀付也天所畀付非人所能人所能者率性修道也性無不善循而行之是之謂道道有品節修而全之是之謂教自道不可離而下所以詳言率性之謂道自哀公問政而下所以詳言修道之謂教自仲尼祖述而下所以詳言天命之謂性臨邛魏氏曰成湯告民於亳曰民有恆性周武誓衆于盟津曰人為物靈凡皆立國之初是為羣言之首蓋大本要道無以先此大易聖人所以開物濟民者也首於乾坤發明性善之義曰大哉乾元萬物資始曰至哉坤元萬物資生凡各正性命于天地間者未有不資於元元則萬善之長四德之宗也猶慮人之弗察也於繫辭申之曰一隂一陽之謂道繼之者善也成之者性也猶曰是理也行乎氣之先而人得之以為性云爾曰成性存存道義之門則又示人以知禮成性道義皆由此出也而終之曰聖人之作易也將以順性命之理是則易之為書其大本要道顧有先於此者乎故子思於中庸撮其要而言之若曰天所以命于人則謂之性率乎性而行之則謂之道即是道而品節之以示訓則謂之教嗚呼聖賢之心後先一揆故中庸之首則易與誥誓之首也蔡氏曰言性道教之所以明也性者天理之混然道者循性之自然教者聖人因其自然而品節之使學者有所持循也新定顧氏曰以中庸名書而發端之詞若此明中庸即天命之性率性之道修道之教也此性本體清明廣大所謂太極者也良知良能具焉萬善出焉曰中曰庸聖人所以明此性之德爾人之生也均禀此性以形體言之天亦由此理而生由此理而運行今而曰天命之謂性不以形體論而以義理言之也自然之理謂之天天之有命理之所不容違者也人性本於自然不得不然故曰天命之謂性人僞不萌順理而動聖人之能事畢矣故曰率性之謂道由是而有所述作以綱理世變以啓迪人心故曰修道之謂教四明袁氏曰堯舜禹相授受曰中中者何非動靜而動靜函非剛柔而剛柔具又曰庸常也常中也上天下地萬象昭布往古來今萬變參錯所謂中者只如此而已又曰太極未分包括隂陽分隂分陽太極在中一而萬萬而一故是書之作或獨言中或獨言庸或並言中庸獨言中而庸未嘗不在也獨言庸而中未嘗不在也並言中庸而無所不在也又曰率循也循性而行即中庸之道也人皆有此性則皆有此道道不在性之外也父子君臣夫婦長幼朋友五典皆道也而即仁義禮智信五常之性也此性此道不慮而知不學而能在我率而行之耳有所矯拂則不可以言率性委諸自然則亦不可以言率性不起穿鑿之意見不生支離之言論必有事焉而行所無事是之謂率性禮記集說卷一百二十三
