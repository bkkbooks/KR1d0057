body:
  text: 禮記集説卷一百四十七宋衞湜撰儒行第四十一孔氏曰案鄭目録云名曰儒行者以其記有道德者所行也此於别録屬通論藍田呂氏曰儒行者魯哀公問孔子儒服孔子不對因問儒行而孔子厯言之今考其書言儒者之行誠有是事也謂孔子言之則可疑也儒者之行一出於義理皆吾性分之所當為非以自多求勝於天下也此篇之説有矜大勝人之氣少雍容深厚之風似與不知者力爭於一旦竊意末世儒者將以自尊其教有道者不為也雖然其言儒者之行不合於義理者殊寡學者果踐其言亦不愧於為儒矣此先儒所以存於篇今日講解所以不敢廢也魯哀公問於孔子曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服鄭氏曰哀公館孔子見其服與士大夫異又與庶人不同疑為儒服而問之也逢猶大也大掖之衣大袂禪衣也此君子有道藝者所衣也孔子生魯長而之宋而冠焉宋其祖所出也衣少所居之服冠長所居之冠是之謂鄉言不知儒服非哀公志不在於儒乃今問其服庶人襌衣袂二尺二寸袪尺二寸孔氏曰夫子自衞反魯哀公館於孔子問以儒行記者録之以為儒行之篇孔子説儒凡十七條十五條皆明賢人之儒其第十六條則明聖人之儒其十七條則夫子自謂也今此一節明哀公疑孔子之服為儒服遂問儒行為孔子命席方説儒行之事也臣朝於君應著朝服而著常服者孔子自衞新還哀公館之非是常朝故衣冠異也掖謂肘腋禮大夫以上其服侈袂鄭注司服云侈之者半而益一袂三尺三寸袪尺八寸朝祭之服必表裏不襌也孔子若依尋常侈袂之服則哀公無由怪之以其大袂襌衣異於士大夫常服故問之夫子著襌衣與庶人同其袂大與庶人異故謂衣為逢掖是大袂深衣也藍田吕氏曰古者衣服之制自天子至於庶人皆有差等未聞儒者之有異服也末世上下僭亂至於無别儒者獨守法度有異於衆此衆所以謂之儒服哀公所以發問也逢掖魯衣也章甫宋冠也少居魯則衣魯之衣長居宋則冠宋之冠因其俗而已非苟異於人也故曰其服也鄉嚴陵方氏曰逢掖之衣王肅以為深衣是矣章甫之冠郊特牲所謂殷􅒐是矣掖當臂之下其制特大則可以運肘故燕居之所服莊子曰宋人資章甫而適越則是宋之所冠也明矣公西赤掌孔子之喪用章甫之冠則孔子之冠衣固如是已君子之學也博者無狹其所居也其服也鄉者不忘其所本也山隂陸氏曰學不游不博博則其服宜鄉示不忘本也丘儒服猶問舜冠不對也石林葉氏曰博學所以立本服從鄉所以趨時哀公所問者儒服而已故孔子答以不知也晏氏曰逢掖章甫是乃儒服而曰不知儒服者唯恥服其服而無其行爾故必以其學也博先之蓋能博學則有其德又將以成德為行然後可稱其服也哀公曰敢問儒行孔子對曰遽數之不能終其物悉數之乃留更僕未可終也鄭氏曰遽猶卒也物猶事也僕太僕也君燕朝則正位掌擯相更之者為乆將倦使之相代孔氏曰孔子答言儒行深逺非可造次若急説則不能盡事若委細悉説之則乃太久僕侍疲倦宜更代之未可終也者若不代僕則未可盡也晏氏曰物者事物之物也周禮以鄉三物教萬民以五物詢衆庶文王世子曰行一物而三善皆得皆若是而已蓋儒者之行非一事之可盡故也哀公命席孔子侍曰儒有席上之珍以待聘夙夜强學以待問懷忠信以待舉力行以待取其自立有如此者鄭氏曰為孔子布席於堂與之坐也君適其臣升自阼階所在如主席上之珍席猶鋪陳也鋪陳往古堯舜之善道以待見問也大問曰聘舉見舉用也取進取位也孔氏曰此經明孔子侍坐於哀公説儒行修己立身之事珍謂美善之道如此者言如此在上諸事也藍田吕氏曰使是君為堯舜之君使是民為堯舜之民儒者之志也儒者之學未嘗不欲用於天下也故古之君子三月無君則弔及其進也不由其道不仕也非其招不往也盖知所謂自治然後可以治人知所以自貴然後貴於物也故君子之用於天下有待而不與求焉其學也足以為天下用非志於用而後學焉此韞匵藏玉所以待賈而沽之者也席上之珍自貴而待賈者也儒者講學於閒燕從容乎席上而知所以自貴以待天下之用也强學以待問懷忠信以待舉力行以待取皆我自立而有待義猶是也德之可貴者人必禮之學之博者人必問之忠信可任者人必舉之力行可使者人必取之此四者之别山隂陸氏曰席上之珍若伊尹樂堯舜之道於畎畝之中是也廬陵胡氏曰席猶卷懷邦無道則可卷而懷之鄭謂席鋪陳盧云席坐席恐非嚴陵方氏曰命席則與之坐也侍側坐對之也席所以藉物曲禮所謂執玉有藉是也席以藉之則所藉之物居上故謂之席上所以防外物之或䙝尊之至也强學所以為己待問所以為人能為己然後能為人故强學乃能待問也忠信非由外鑠也故言懷力行者强勉之謂忠信力行在我之事舉取在彼之事也盡其在我之事然後足以致其在彼之事故懷忠信以待舉力行以待取也儒者立身之本非有資於人焉故曰其自立有如此者晏氏曰以禮嚴分則君坐而臣立以道忘分則坐而論道謂之三公魯哀公方與孔子論儒者之行是坐而論道者也故命席而孔子侍坐焉得非哀公樂道而忘人之勢乎君子比德於玉故稱珍焉方其藏器於身則玉韞於匵中及其待時而動則珍陳於席上故曰席上之珍以待聘日出而作夙在日出之前於此而學是先衆人而有作也日入而息夜在日入之後於此而學是後衆人而未息也非自强之學而何席上之珍則其德可貴夙夜强學則其道可尊二者有師道焉故曰待聘待問懷忠信則其言有物力行則其行有常二者有臣道焉故云待舉待取先聘問而後舉取則學焉而後臣之者也君子雖有為師為臣之道而未嘗屈道以伸身必待彼之聘問舉取然後徐起而應之故曰其自立有如此者儒有衣冠中動作慎其大讓如慢小讓如偽大則如威小則如愧其難進而易退也粥粥若無能也其容貌有如此者鄭氏曰中中閒謂不嚴厲也如慢如偽言之不愊怛也如威如愧如有所畏也孔氏曰儒者所服衣冠在常人中不自異也人以大物與己己讓此大物辭貌寛緩如傲慢然讓小物如似詐偽亦謂寛緩不急切言儒不以利動也如威如愧皆謂重慎自貶損粥粥是柔弱顓愚之貌鄭注愊怛急切之意横渠張氏曰人心中雖廣大然言貌欲處之約言貌不約則便陷於妄若言有條理則猶是狂若無條理則妄而已矣天下之人不陷於此者鮮但有淺深多少之異爾故莫如謹禮衣冠中讀為丁仲反謂衣冠中於禮也其大讓如慢事固有大讓小讓如讓國讓位是謂大讓也大讓則誠然而後讓若不有之故似慢也直是不受如湯之讓天下豈為飾而已誠心而讓其貌若不受也若夫飲食辭辟之間是小讓也小讓實如偽為之以為儀爾未必實讓藍田吕氏曰儒者未嘗無意乎天下之用然非其義也禄之以天下弗顧也辭其大者若自尊以驕人然非自尊也尊道也辭其小者若矯飾而不出於情然非矯飾也欲由禮也由尊道而不屈於世若有所威由禮而不犯非禮若有所愧此儒者所以貴於天下也衣冠中所謂其服也鄉得其中制不異於衆不流於俗而已動作慎則非禮勿履而已故曰難進而易退也粥粥若無能也其容貌有如此者非容貌之可貴也德可貴而已翔而後集非義則不就此所以難進色斯舉矣禮貌未衰言弗行也則去之所以易退難進易退此所以德可尊也嚴陵方氏曰衣冠中者中於禮也其容貌之大也則有所不可犯故如威及其小也則有所不敢為故如愧三揖而後進故曰難進一辭而遂退故曰易退山隂陸氏曰大則小則猶言大讓小讓讀如敬慎威儀維民之則之則晏氏曰衣冠中者中於禮非先王之法服而不敢服故也與子臧聚鷸冠者異矣動作慎者慎於事非先王之德行不敢行故也與莫敖舉趾髙者異矣大讓者禄之以天下弗顧繫馬千駟弗視故如慢如威小讓者觴酒豆肉讓而受惡袵席之上讓而就賤故如偽如愧難進者進以禮也禮主於敬故三揖而進不亦難乎伊尹之三聘是已易退者退於義也義主於斷故一辭而退不亦易乎仲尼之不脱冕是已是皆動容周旋而可見者故曰其容貌有如此者儒有居處齊難其坐起㳟敬言必先信行必中正道塗不爭險易之利冬夏不爭隂陽之和愛其死以有待也養其身以有為也其備豫有如此者鄭氏曰齊難齊莊可畏難也行不爭道止不選處所以遠鬭訟孔氏曰塗路也君子行道路不與人爭平易之地而避險阻以利己冬溫夏涼是隂陽之和處此世人所競唯儒者讓而不爭也横渠張氏曰居處齊難齊者齊莊難者㳟慎也其難其慎必先信思可信則言是先信也行必中正乃可行諸後是皆備豫之道也山隂陸氏曰難猶戒也洗心曰齊防患曰難藍田吕氏曰事豫則立不豫則廢儒者之學皆豫也擬之而後言議之而後動擬議以成其變化故學有豫則義精義精則用不匱唯其始也不敬則道不立不立則道不充仲弓問仁子曰出門如見大賔使民如承大祭己所不欲勿施於人如見大賔如承大祭敬也己所不欲勿施於人恕也居處齊難坐起㳟敬言必先信行必中正所謂如見大賔如承大祭者也道塗不爭險易之利冬夏不爭隂陽之和所謂己所不欲勿施於人者也唯敬與恕則忿懲慾窒身立德充可以當天下之變而不避任天下之重而不辭備豫之至有如此者也嚴陵方氏曰或居或處不失乎齊難或坐或起不失乎㳟敬愛其死非貪生也將以有待於時而已養其身非苟安也將以有為於世而已且居處齊難則人斯齊難之矣坐起㳟敬則人斯㳟敬之矣言先信則人斯取信矣行中正則人斯取正矣以至不爭其利故人資其利不爭其和故人飲其和愛其死故足以有待養其身故足以有為若是則非有待物之備先物之豫固不足以致此晏氏曰居處齊難者端莊而不改易坐起㳟敬者謹飭而不敢慢言必先信者無妄言行必中正者無詖行道塗不爭險易之利者不以地利便己而移害於人冬夏不爭隂陽之和者不以天道適己而移乖於人愛其死者非樂夀而哀夭也盖將以俟天之時故曰有待養其身者非豐己而忘物也盖將以行己之道故曰有為講義曰道路之閒必欲捨險而趨乎易人之常情也於此而不爭險易之利冬而欲溫夏而欲凉亦人之情也於此而不爭隂陽之和者推利害之心與人同之而已有待有為蓋將有立於天下也上焉如㣲子去紂而存殷祀箕子為奴而後為武王陳洪範下焉者若管仲不死子糾之難而霸齊也儒有不寳金玉而忠信以為寳不祈土地立義以為土地不祈多積多文以為富難得而易禄也易禄而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後禄不亦易禄乎其近人有如此者鄭氏曰祈求也立義以為土地以義自居也難畜難以非義久留也勞猶事也積或為貨孔氏曰此明儒者懷忠信與義之事儒懷忠信而與人交不貪金玉而與人競人則親而近之積積聚財物也非道之世則不仕是難得也先事後食是易禄也無義則去是難畜也其親近於人如此濓溪周氏曰君子以道充為貴身安為富故常泰無不足而銖視軒冕塵視金玉其重無加焉爾藍田吕氏曰儒者之於天下所以自為者主於德而已所以應世者主於義而已趙孟之所貴趙孟能賤之貴之在人者也若夫貴之在己人不得而賤之食前方丈侍妾數百人堂髙數仞榱題數尺我得志弗為也以人之貴為貴者也若夫我之所可貴人不得而奪之此金玉土地多積不如信義多文之貴也主於德在我者也在我者不敢不盡在人者不敢必也志非不欲行也時止則止時行則行不可必其見也道非不欲合也非其義也一介不以取諸人不可必其合也難得難畜主於義而所以自貴也雖曰自貴時而行義而合勞而食未始逺於人而自異也嚴陵方氏曰孟子以忠信為天爵以義為正路以令聞廣譽施諸身不願人之文繡非謂是乎貨財以多積為富金玉以難得為寳故於忠信言寳於多文言富易禄者易為禄也先勞而後禄則易為禄矣畜為畜而制之也夫衆人之近人也或以金玉或以土地或以多積或見之不以時或合之不以義而儒者之近人則有異焉石林葉氏曰寳珠玉者殃必及其身忠信者吉德也故以為寳土地所生以利義則勝利者也故以為土地多積必厚亡而詩書禮樂之文則畜其德者故以為富廬陵胡氏曰立義以為土地非義不處也故君子里仁而處義晏氏曰小人懷璧不可以越鄉而言忠信者可行蠻貊故不寳金玉而忠信以為寳非其義也禄之天下弗顧而義人之正路故不祈土地而立義以為土地經天緯地曰文故多文以為富事君者量而後入故非時不見而難得不可則止故非義不合而難畜不以小言受大禄故先勞而後禄易曰何以聚人曰財夫金玉土地多積與夫禄利皆財也衆人之近人以此而已儒者之近人則異於是仲尼以忠信為教而義之與比百官之富翔而後集色斯舉矣皆此之意儒有委之以貨財淹之以樂好見利不虧其義劫之以衆沮之以兵見死不更其守鷙蟲攫搏不程勇者引重鼎不程其力往者不悔來者不豫過言不再流言不極不斷其威不習其謀其特立有如此者鄭氏曰淹謂浸漬之劫劫脅也沮謂恐怖之也鷙蟲猛鳥猛獸也字從鳥鷙省聲也程猶量也重鼎大鼎也搏猛引重不量勇力堪之與否當之則往也雖有負者後不悔也其所未見亦不豫備行自若也不再猶不更也不極不問所從出也不斷其威常可畏也不習其謀口及則言不豫其説而順也斷或為繼孔氏曰此明儒者之行挺特而立有異於衆之事儒者委之以貸財淹漬之以樂好執持操行不虧損己之義苟且而受也攫搏引鼎喻儒者見艱難之事遇則行之不豫度量也蟲是鳥獸通名獸摯從執下著手鳥鷙從執下著鳥今一鷙包兩義以獸鷙從鳥故鄭云省也以脚取之謂之攫以翼擊之謂之搏藍田吕氏曰儒者之行既得其所以自貴然强立而不反者不可以不誠至於己誠則所以自貴者猶可保而往也見利不虧其義見死不更其守所謂富貴不能淫貧賤不能移威武不能屈此大人所以立於世也鷙蟲攫搏不程其勇者自反而縮千萬人吾往矣其勇也非慮勝而後動者也引重鼎不程其力者仁之為器重舉者莫能勝也其自任也不知其力之不足者也往者不悔幾於所過者化來者不豫幾於所存者神也過言不再知之未嘗復行也流言不極不倡游言也不斷其威將至於儼然可畏也不習其謀將至於不思而得也此成德君子之事也二者皆特立大過人者也嚴陵方氏曰貨財也樂好也皆人之所利者見利而狥利則虧其義矣故見利不虧其義者是不狥利也衆言人之多兵言器之利見死而懼則更其守矣故見死而不更其守者是不懼死也雖然前言愛其死以有待此言見死不更其守何哉孟子不云乎可以死可以無死死傷勇見死不更其守者以其可以死也召忽是矣愛其死以有待者以其可以無死也管仲是矣不程勇以况儒者勇足以犯難而無所顧也不程其力以况儒者材足以任事而有所勝也往者不悔非有所吝而不改也為其動足以當理而未嘗悔來者不豫非有所忽而不防也為其機足以應變而不必豫爾過言不免乎出一之為甚矧可貳乎流言不免乎聞必止之以知詎可窮乎威無所屈人不能斷而絶之謀有所定已不必習而成之凡此非特然而立乎山隂陸氏曰即程勇者而當之是怯也威不斷而立謀不習而成黄氏曰儒者咸有智勇不程勇及不程力者謂非當危難之際則不程量顯見己之勇力蓋君子以仁義聞則可以勇力聞則恥也不程量者謂不比小人無德可稱唯較量力勇以夸矜於人其臨事則反無謀也故云仁者必有勇以其臨難不苟見危致命好謀知幾則臨事之功必克全而無失矣乃儒者勇力之道也往來兩義謂儒者消長否泰之時也謂時往者雖屯否亦不為悔吝時來者雖通泰亦不為逸豫唯守道從義不以窮達移其操横渠張氏曰鷙蟲攫搏不程勇者引重鼎不程其力與勉焉日有孶孶不知年數之不及斃而後已同義於向道亦然當事亦然如子路者亦無愧於此矣過言不再不貳過也流言不極極者不更深思極慮也不斷其威讀為剛斷之斷不習其謀斷與習皆臨事斷習也不斷不習言威常著謀常足不臨時旋安排也此所謂能特立者也非有立焉能如此廬陵胡氏曰鷙蟲攫搏雖猛引重鼎雖有力然不敢與儒者較量勇力堪之與否當之則往此乃暴虎之為非儒者也不斷其威加威必審不輒斷也不習其謀好謀而成不臨事乃習也習猶試也晏氏曰鷙蟲而能攫搏之人皆以為勇吾則不程計其勇為其暴虎者尚勇而不尚義也重鼎而能引之人皆以為有力吾則不程計其力為其杠鼎者尚力而不尚德也先儒以謂儒者若遇鷙猛之蟲不程量堪當而即攫搏之若重鼎則不豫前商量己力堪引而見即引之信如是則一勇之夫豈儒者之事哉不斷其威則權足以制物不習其謀則知足以決事儒有可親而不可劫也可近而不可迫也可殺而不可辱也其居處不淫其飲食不溽其過失可㣲辨而不可靣數也其剛毅有如此者鄭氏曰淫謂傾邪也恣滋味為溽溽之言欲也孔氏曰儒性剛儉飲食常質不溽不濃厚也藍田吕氏曰儒者之立立於義理而已剛毅而不可奪以義理存焉以義交者雖疏逺必親非義加之雖强禦不畏故有可親可近可殺之理而不可劫迫辱也淫侈溢也溽濃厚也侈其居處厚其飲食欲勝之也欲勝則義不得立不淫不辱所以立義也其過失可㣲辨而不可靣數也此一句疑尚氣好勝之言於義理有所未合也所貴於儒者以見義必為聞過而改者也何謂可㣲辨而不可靣數待人可矣自待則不可也子路聞過則喜孔子幸人之知過成湯改過不吝推是心也苟有過失雖怨罵且將受之况靣數乎嚴陵方氏曰德雖可親而不可劫之以力迹雖可近而不可迫之以勢身雖可殺而不可辱之以威不以四肢之安而過其行不以口腹之養而汙其身㣲辨者諷諭之也靣數者指斥之也凡此皆所體者剛所用者毅然也然居處不淫飲食不溽而以為剛毅何也蓋淫於居處溽於飲食皆人之慾也孔子曰棖也慾焉得剛非謂是乎馬氏曰可親以情而不可劫以力可近以義而不可迫以勢可殺其身而不可辱其志可殺以有命也不可辱以有義也山隂陸氏曰不淫不奢淫也不溽不卑溽也晏氏曰可親者為其有仁非暴厲無親也而仁者必有勇故不可劫可近者為其有禮非近之不遜也而秉禮者未可動故不可迫可殺者為其有義雖殺之而不怨也而羞惡者義之端故不可辱儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所其自立有如此者鄭氏曰甲鎧胄兜鍪也干櫓小盾大盾也孔氏曰甲胄干櫓所以禦其患難儒者以忠信禮義亦禦其患難謂有忠信禮義則人不敢侵侮也戴仁而行仁之盛抱義而處義不離身雖有暴政不更改其志操逈然自成立也與前自立文同其意異彼謂强學力行而自修立此謂獨懷仁義忠信也藍田呂氏曰儒者剛毅而不可奪則所得於天者可得而保者也仁義忠信有禮皆天之所授也忠信則不欺不欺者人亦莫之欺也有禮者敬人敬人者人亦莫之侮也忠信禮義所以禦人之欺侮猶甲胄干櫓可以捍患也行則尊仁居則守義所以自信者篤雖暴政加之有所不變也自立之至者也首章言自立論其所學所行足以待天下之用而不窮此章言自立論其所信所守足以更天下之變而不易二者皆自立也有本末先後之差焉山隂陸氏曰忠信以為甲胄所謂忠信為周是也馬氏曰自忠信以為甲胄至雖有暴政不更其所皆言君子之所守故曰其自立有如此者待聘至待取亦言自立何也所待者在人所以待者在己故言自立而此防身逺害之道亦自立也石林葉氏曰甲胄者自防之器忠有諸中信有諸己亦以自防也干櫓敵人之器禮以區别義以裁制亦所以敵人也仁為天下之表故戴而行義為天下之制故抱而處暴政者時也不更其所守者己也己之自立者乃所以應時故其言異於前之自立也廬陵胡氏曰前言忠信以為寳立義以為土地言平居時此言忠信以為甲冑禮義以為干櫓言行乎患難時表記云仁之為道逺行者莫能至故仁在於力行立義以為土地故義在於自處所猶守也書曰君子所其無逸春秋傳曰以成吾所前言自立與此言自立本皆忠信民無信不立晏氏曰甲胄者被之於身冠之於首乃設蔽以自營也君子之處己如之干櫓者可以扞物可以先衆乃持以待敵也君子之應物如之仁主於有愛常患乎暱而不尊戴仁者所以尊之義主於有斷常患乎嚴而不親抱義者所以親之嚴陵方氏曰仁善為元元者首也故於仁曰戴義善為臧臧者藏也故於義曰抱有立則有所故曰雖有暴政不更其所金華應氏曰被服禮義操執忠信所以自守而禦外侮而又負戴仁義言儒者一身之中無非義理也捍禦於外者愈固而居處於内者愈安雖有暴政不能加之故亦不為之遷易其所而它之也禮記集説卷一百四十七
