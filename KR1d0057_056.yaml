body:
  text: 禮記集說卷五十六宋衛湜撰故聖人參於天地並於鬼神以治政也處其所存禮之序也玩其所樂民之治也故天生時而地生財人其父生而師教之四者君以正用之故君者立於無過之地也鄭氏曰並并也謂比方之也存察也治所以樂其事居也君順時以養財尊師以教民而以治政則無過差矣易曰何以守位曰仁何以聚人曰財孔氏曰此一節結上文參於天地者政是聖人藏身之固所以參擬於天地則法於天地是也比方於鬼神則比方祖廟山川五祀而為事也此皆所以修治政教也天有運移寒暑地有五土生殖廟有祖禰仁義皆是人所觀察言聖王能處其人所觀察之事以為政則禮得次序也興作器物宫室制度皆是人之所樂聖人能愛玩民之所樂以教民則民所治理各樂其事業居處也人君順天時以養財尊師傅以教民因自然之性其功易成故得立於無過之地也長樂陳氏曰夫知天地鬼神之禀則有所存明天地鬼神之用則有所樂處其所存乃禮之先後之序玩其所樂此民之所以治也易曰所居而安者易之序也所樂而玩者爻之辭也是易以所處者為體所玩者為用耳嚴陵方氏曰天地祖廟山川五祀皆禮之妙理所存者聖人則因其所存者而處之以定體且不遺其先後焉故曰處其所存禮之序也道徳仁義興作制度皆民之良心所樂者惟聖人則因其所樂而玩之且不紊其條理故曰玩其所樂民之治也時以氣運故天生時財以形成故地生財父以傳類故人其父生師以傳道故師教之為之君者位天地之中居父師之上夫何為哉以正用之而已馬氏曰處其所存以其在上者言之也玩其所樂以其在下者言之也蓋在上者識其禮之所起故處其所存得其處存之要則禮之序在其中矣在下者知禮之所行故玩其所樂得其玩樂之道則民之治在其中矣變通莫大於四時而有天以生之聚人莫若財而有地以生之后非民無以辟四方而有父以生之人非教則無以别於禽獸而有師以教之四者皆出於自然而無俟於君可也而曰正用之何也蓋天雖生於時而茂對育物者非君不能育也地雖生乎財而理財正辭者非君明其義則不能理也人生雖自乎父而非君則罔克胥匡以生教雖自乎師而非君則不能安其教正用之者順其自然之理而不敢逆然後立於無過之地也夫有天以生時有地以生財有父以生之有師以教之則富庶教之具備可以參天地之化育而成位乎其中矣山隂陸氏曰聖人以禮之序處其所存以民之治玩其所樂以正用之猶所謂王中心無為也以守至正延平周氏曰處其天地鬼神之所存者禮之序也玩其天地鬼神之所樂者民之治也生時雖天也而有非天者也生財雖地也而有非地者也揚子曰天地之得斯民也斯民之得一人也一人之得心也果上之人不能誠心以及民由民以及天地則時有所乖而財有所傷也民雖父生然觀於時方天下之喪亂則雖君子不能恤其後及天下之和平則婦人亦莫不樂有子也教之雖師也然大宰八統之教皆行於上而御於下也是以知天雖生時地雖生財人雖父生而師教然皆有待於君君或不以正而用之則不得為無過故曰以正用故君人者立於無過之地也講義曰聖人中天下而立定四海之民其為政也非作聰明矜智慮私好惡也凡以明參於天地之理幽並於鬼神之故以治政也所謂政者正己以正人者也處其所存如君臣父子尊卑貴賤凡處其所必加察焉則不紊亂而得其所矣所以為禮之序也易曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯又曰天尊地卑乾坤定矣卑髙以陳貴賤位矣凡此者皆處其所存之謂要在察之各得其所此乃禮之序焉夫人之生好安而惡危好逸而惡勞好善而惡惡好吉而惡凶此人情之大可見者所樂在此而已君人者玩人之所樂而樂之所以為民之治也如所玩習者非其所樂民得而治之乎故曰玩其所樂民之治也四明沈氏曰參天地並鬼神此心何所用其機巧處其所存玩其所樂斯民何所事其機變非盛徳至治之世不能也士農工商各安其業君臣父子各適其宜而無有覬覦爭奪之風此之謂處其所存耕田鑿井日用飲食而無有嘆息愁苦之聲此之謂玩其所樂非聖人參天地之自然並鬼神之自然民亦安能無所不用其自然乎人君以有心擾天下天下必以多事累聖人行其所無事而我無與焉此之謂正用蔣氏曰聖人道同乎天地故其身能與天地而為三知通乎鬼神故其身足與鬼神而並立夫旣與天地而為三矣又與鬼神而並立矣則其闡知來藏往之機興神物前民用者如之何而不極其至哉所謂處其所存者自其降命以出政推而至於事事物物莫不各當其所處莫非存其所當存也義以制君臣而君臣之道存矣恩以處父子而父子之道存矣是之謂禮之序所謂玩其所樂者自夫政布而民從推而至於使斯民相安而不自知者莫非樂其所可樂也宗廟有常事而民樂於報本矣山川有常職而民樂於興事矣是之謂民之治夫上文固言政之出於天也今也指禮之序言民之治始言政而終言禮者何哉禮者政之所自出也政者禮之所以行也政天也禮亦天也存者存其天也樂者亦樂其天也易曰先天而天弗違後天而奉天時天且弗違而况於人乎此之謂也吾於此知古者君臣上下相安於其天又曰人主之職業自有天地人物而理已與之俱矣曰裁成其道曰輔相其宜曰左右其民非有俟乎深求力索以有為於天下也是故謂之無為謂之民無能名又謂之無有作好蓋其因自然之理立自然之政凡以天地人物不能自全者皆於我乎賴而吾固順而成之天有時也則必因時以興事地有財也則必因財以致用人本乎父生則為之正性命之原成於師訓而為之敷典常之道此堯舜三代之君體道御時據三才之位同此一心以為維持主張者也命羲和欽厯象平水土令貢賦徽五典修人紀冠昏夫婦庠序學校之設靡有不備是豈有求加於天地人物之所不容有者以强天下哉必如是而後為以正用之古治既衰君人者反是不思於是率情以生事狥意以起功自其役民非時取財無藝恣苛刻而失愛䘏逞暴殄而隳徳化舉天地人物之所具存者非徒無益而又害之如之何而能立於無過之地也噫出私意者過之所由生因正理者治之所由立後之儒者而為之說曰因者君之綱彼固有得於聖賢之遺論也夫故君者所明也非明人者也君者所養也非養人者也君者所事也非事人者也故君明人則有過養人則不足事人則失位故百姓則君以自治也養君以自安也事君以自顯也故禮達而分定故人皆愛其死而患其生鄭氏曰明猶尊也則君當為明君人之道身治居安名顯則不茍生也不義而死舎義而生是不愛死患生也孔氏曰此一節論政之大體皆下之事上非上之事下上下分定人皆以死事上也君者所明謂在下百姓尊奉君使之光顯非明人謂非是遣君尊明在下之人以下並同此義以所明與所養所事文同相類故鄭以明為尊也以下之事上於禮當然人皆知之是禮之曉達也尊者居上卑者處下是分定也愛謂貪愛患謂恥患人皆知禮上下分定君有危難人皆貪愛以義而死競欲致死救之恥患其不義而生也黄氏曰夫君所自明者禮也君四海有天下所明四海之禮君一國明天子所出一國之禮禮者何蓋分土列爵九命四民國家宫室車旗衣服禮儀尊卑升降之定節斯乃天子所明之禮也非明人者若禮樂征伐不自天子出也下文又以禮達分定成之故知君明者禮也君者所養也者謂君之所贍乃畿内千里及諸侯貢賦為君所養也非養於人若周末失政而天子私求故譏曰天子不求私財諸侯不貢車服之謂也君所事唯天地宗廟嶽瀆非事於人謂四海一人之尊也君明人謂禮樂自諸侯出則有過患矣養人謂君失政而私求財則不足矣事於人謂失事天地宗廟而欲下事於人則失位者也下文百姓則君以自治謂百官四民則禮以自治也註文誤認其理故以則字為明字以應上文也養君以自安是天下貢賦王廷不敢失職求自安也事君以自顯謂天下皆願事君為榮顯也横渠張氏曰禮達而分定故人皆愛其死而患其生蓋以上下之分皆定各得其道故樂其生而愛其死其生也榮其死也哀是也樂其生即愛其死惡不義故患其生正為禮達分定故以不義而得生為患無求生以害仁也如堯舜之世在上者覆露含育如此則其茍生也是足患於其時為不善不知何所容其身致民若是治道可愛長樂陳氏曰君之徳人所明辨而觀法之而非明人者也君之尊人所出財以養之而非養人者也君之貴人所出力以事之而非事人者也然而有所謂明在於稽衆有所謂養在於養賢有所謂事在於得師惟其要之以上下尊卑之分則明之所以為有過養之所以為不足事之所以為失位也至於百姓則君以自治而善有以遷養君以自安而分有以處事君以自顯而忠有以盡如是則禮達於上下之間而分定於尊卑之際故人於其義之可死則不茍避於其不義之生則不茍存此所謂修禮以達義而不愛其情也嚴陵方氏曰君人在上則人當拭目以觀化故君者人所明非明人者也人當樂業以殖財故君者人所養非養人者也人當竭力以効功故君者人所事非事人者也夫上之所為下之所取正也故君明人則為過以天下而贍一人則有餘以一人而贍天下則不足故君養人則為不足上者宜無為而逸下者宜有為而勞故君事人則失位禮達而分定則人莫不知分焉與其犯分而生不若安分而死爾故人皆愛其死而患其生也夫人之所愛莫如生所惡莫如死而其言乃如此者則孟子所謂所欲有甚於生所惡有甚於死是也廬陵胡氏曰明猶視也言下之所察視達猶行也禮行分定人皆見危致命愛死節而恥偷生山隂陸氏曰指人之失謂之明人故曰君明人則有過夫覆人辠而治之者尚大宰之事也君可以明人乎故黈纊塞聰前旒蔽明蔣氏曰上章論君人之道至此别君臣之體夫勞心者治人勞力者治於人治於人者食人治人者食於人孟軻以為天下之通義也久矣民治立則君道顯人君不可與民爭能以處也是足以見所明非明人之理身愈逸而責愈重人君不可與民並耕而食也是足以見所養非養人之說民甚卑而君甚尊人君不可與民無分以居也是足以見所事非事人之義天下之𫝑固莫患乎上下無以相别而分守無以相安也古之聖人常使其心無負於天下而不容使其身一日不足以自異於天下在易卑髙以陳而貴賤以位故曰有君臣然後有上下有上下然後禮義有所錯蓋禮義之錯生於君臣上下之有辨也然使在我不盡其所以無負於天下之實固不足以居自異天下之名不有以立其自異於天下之𫝑則亦不足以行其無負天下之心此固明人則有過養人則不足事人則失位聖賢惓惓焉而為之戒辭也若夫主𫝑一定而君徳旣孚天下之民方且遵名守教相從於畏愛則象之中甘心於服役事養之際求其為自安自適之不暇安有欺背僭陵之事哉故曰禮達而分定則人皆愛其死而患其生好生惡死人心之所同然聖人有禮以率天下能使所欲有甚於生所惡有甚於死則其功用固不容以小言也新安朱氏曰禮逹而分定達謂達於下故用人之知去其詐用人之勇去其怒用人之仁去其貪故國有患君死社稷謂之義大夫死宗廟謂之變鄭氏曰用知者之謀勇者之斷仁者之施足以成治矣詐者害民信怒者害民命貪者害民財三者亂之原變當為辯聲之誤辯猶正也君守社稷臣衛君宗廟者患謂見圍入孔氏曰上旣禮達分定患其不義而生因上生下故云故也此論去不義之事知謂謀計曉達詐者不敢為之故云去其詐勇謂果敢決斷能除凶暴怒者不敢為之故云去其怒仁者好施不茍求財貪者見之心慚止息故云去其貪然據鄭註意則云選用人知者勇者仁者退去其奸詐者忿怒者貪財者先師旣為前解故備載之案孝經云守其宗廟謂大夫家之宗廟此則為君之宗廟横渠張氏曰用人者言在上也去其私者人於禮達分定不敢存其私意也人不愛其情是也仁知勇之士皆盡誠於上而不過其分用知而知者去其詐用勇而勇者去其怒用仁而仁者去其貪怒如子胥卻克以公戰報私怒也貪如田氏好施以掠美於己也馬氏曰知者不惑而用人之知則可以去其詐勇者不懼而用人之勇則可以去其怒仁者無欲而用人之仁則可以去其貪去其詐去其怒去其貪非有意於去也而用人之知用人之勇用人之仁則詐怒貪之三者自然而去也與夫舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣之類是也山隂陸氏曰若荆軻聶政侯嬴田光之徒雖知愛死患生然死非禮義則以無聖人在上去其詐去其怒去其貪故也新安朱氏曰人之性易得偏人既仁如何貪蓋仁善底人便有好便宜底意思今之廉介便多是那剛硬底人江陵項氏曰此經曰用人之仁去其貪表記曰儉近仁貪儉之與仁宜不相似古人以同類處之者則以其皆出於愛也愛則儉儉則貪矣項羽涕泣分飲食亦仁人一節也至戰勝而不與人功得地而不與人利則儉與貪見也儉者約於己故猶為近仁貪則加於人故不可不去孟子曰儉者不奪人奪人烏得為儉則當時之君固有儉而貪者矣魏人儉嗇褊急而有伐檀碩䑕之刺亦此類歟長樂陳氏曰用人之知去其詐則人尚真而不偽用人之勇去其怒則人循禮而不亂用人之仁去其貪則人樂施而不奪諸侯死社稷天子之社稷也大夫死宗廟己之宗廟也死乎天子之社稷則義而正死乎己之宗廟則非義而變然則大夫之義而正者如之何亦曰死衆而已矣延平周氏曰知者多詐而詐者不必知有知者則詐足以别故用人之知則足以去其詐勇者多怒而怒者不必勇有勇者則怒足以别故用人之勇則足以去其怒仁者樂於予貪者樂於取有仁者則貪足以别故用人之仁則足以去其貪孔子言道之序則仁先之知次之勇又次之言為道則知先之仁次之勇又次之今以勇間於知與仁者蓋知仁以勇為主故間之猶三徳以敏為主故亦間之也嚴陵方氏曰詐者巧言似知而非知怒者敢為似勇而非勇貪者多愛似仁而非仁則人君所去其可以不察此哉諸侯為守土之臣故死於社稷則為義義之為言宜也大夫有可去之道故死於宗廟則為變變之為言權也君去其國止之曰奈何去社稷則以義望之也大夫曰奈何去宗廟則以變責之也蔣氏曰君子道者三知仁勇是也然世之人或狃於性質之所趨而不知反於義理之所制則其善端之所形見未有不為終身之累者也此章言用人之道而繼之於禮達分定之後其說蓋有所主夫知固可尚也而不能行其所無事則將變詐以壞禮聖人本禮以用知則止邪於未形而詐去矣勇固可尚也而不能以禮為主則將肆怒以為亂聖人本禮以用勇則動容貌逺暴慢而怒去矣至於仁之為道尤宜致辨於設心之初中庸曰力行近乎仁表記曰知者利仁蓋仁主於有已自其盡已而至於盡物者仁之推也語曰己欲立而立人已欲達而達人貪心一形則博施濟衆之事誰其廣之聖人本禮以用仁而曰去其貪者無他蓋將使人老老以及人之老幼幼以及人之幼辨親親之殺明尊賢之等仁有所廣而道有所推也龜山論舜跖利善之分其義近之蓋利己者狹推己者大所謂貪者蓋亦不必貨財是殖然後為貪也又曰禮之功用其大矣哉知本之以去詐勇本之以去怒仁本之以去貪若是則君臣上下之間祖廟宗祧之事惟理是循惟當是貴可生而生宜死而死豈有紊其所處而失其所守者哉故曰君死社稷謂之義大夫死宗廟謂之變故聖人耐以天下為一家以中國為一人者非意之也必知其情辟於其義明於其利達於其患然後能為之鄭氏曰耐古能字傳書世異古字時有存者意心所思慮也辟開也孔氏曰此亦因上生下樂記云人不耐無樂是古字時有存者孔子說聖人非是以意測度謀慮而已知民之七情開闢其義以教之顯明利事以安之曉達其禍患而防䕶之然後能使天下和合為一家中國為一人皆感義懷徳而歸之也情義利患則下文所言是也長樂陳氏曰風俗同故天下為一家心徳同故中國為一人其能至於如此者非吾之意有以結之必先知乎其情而致之辟於其義而教之明於其利而興之達於其患而去之馬氏曰言天下則兼於四海也言中國則異乎夷狄也蓋聖人治近者詳治逺者略以中國比天下則天下為逺而中國為近以一人比一家則一人為寡一家為衆略於逺而能使之如一家者言其俗不殊而若父子之親上下有以相使也詳於近而能使之如一人者言其道之同而若手足之用左右有以相衛也凡此者非用知之鑿而以私情巧結之也皆順其性命之理而明利達患而已矣然則天下風俗之宜異中國貴賤之𫝑殊而能使天下如一家中國如一人何也蓋風俗雖異而其趨向則一也貴賤雖殊而趨於善則同也凡此自非順性命之理而明利達患者不能為也延平周氏曰天下非一家而能以為一家中國非一人而能以為一人者非特在吾身者有以結之必先知人情而無喜其所怒無欲其所惡然後開於人義使之知父子君臣之倫明於人利使之講信修睦達於人患使之無爭奪以相賊如此則天下所以為一家中國所以為一人也建安潘氏曰天下一家中國一人聖時之盛也論者毎以車書混同無異區為天下一家億兆欣戴無異俗為中國一人是知聖治之成效而不見聖人之能事也聖人非有他術特洞照本原知天下同歸而殊塗一致而百慮夫塗殊於所由不殊於所歸同歸則宗一室吾見天下本一家也慮百於所思不百於無思無思則均一體吾見中國本一人也衆人狥私而自蔽見有用則彼已不通不見不用而會歸則一每每自狥則雖父子猶有為豺狼兄弟猶有為參商况他舎外人乎聖人深探本源灼見要歸故均以一體待之休戚一焉是謂踐形由是樂民之樂而民亦樂其樂憂民之憂而民亦憂其憂不以一己外天下而以一體視天下此天下所以一家中國所以一人也蔣氏曰自古安危理亂之機非有深逺而難見者蓋天下大本在於人情離合而衆寡逺近不與焉方有道之世上下相親小大相安六合同風九州共貫迨其衰也貴賤相逼强弱相乘則不免人自為政家自為俗無它情之所合則措天下之異而歸於同情之所離則天下之勢不可得而强一矣今夫天下一家中國一人此豈億度料想姑為是言哉古之聖人總攝人心維持世故所以起天下聯絡親比之義而革其乖戾違背之習者蓋亦灼見是理而為之紂有臣億萬惟億萬心武王有臣三千惟一心商之天下則周之天下也其民則亦周之民也紂惟不知天下之情是以狎侮五常作威殺戮屏棄典刑囚奴正士至於失天下之義背利縱患而人心離也武王惟知天下之情是以重民五教篤信明義崇徳報功天下之大義開闢充塞興利銷患而人心一也噫人情之係於天下如此哉漢之興也以其知秦民之情唐之興也以其知隋民之情漢唐而下中智之主開國成務裂天下之大𫝑就一時之小康區宇不一軌轍有間蓋未識古聖人所以為天下之大意也何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患故聖人之所以治人七情修十義講信修睦尚辭讓去爭奪舎禮何以治之鄭氏曰舎禮何以治之惟禮可耳孔氏曰自此至何以哉覆釋上經情義利患必須禮以治之又眀人之欲惡在心難知舎禮無由可化昭二十五年左傳云人有六情喜怒哀樂好惡此云欲則彼云樂此云愛則彼云好也六情之外增一懼為七人義從親者為始以漸至䟽故長幼在後君臣處末臨川王氏曰喜怒哀懼愛惡欲此之謂七情中庸止言喜怒哀樂喜樂一也何以所言不同曰皆情也喜可以兼愛欲怒可以兼惡懼中庸言中和則兼性言之故止言喜怒哀樂此言七情之實故詳言之長樂陳氏曰喜愛欲者陽之情怒哀懼惡者隂之情凡此皆出於天然故言弗學而能也父慈子孝兄良弟弟夫義婦聽者閨門之義長惠幼順者鄉黨之義君仁臣忠者朝廷之義凡此皆出於人為信則無所欺罔睦則有所顧省此皆足以和義故謂之人利爭而後奪奪而後相殺此皆足以召禍故謂之人患也山隂陸氏曰兄良能克家者也即言友友施於弟而已蔣氏曰人之生也七情之真具於賦形之初聖人整世故而立人極大要在於不奪其天而已然義利之辨不明向背之情遂異此聖賢所深憂也夫子對兵食之問孟子陳利國之說源委可觀取舎明甚彼固知人生而靜天之性也感物而動情遂形焉方其動與義俱天理日見聚廬相依報施相使上下翕然識居處之道而歸於性命之常至於狥利而行人欲日長貪嗜無厭淫湎無恥上下紛然失交際之道吞齧搏噬之患所由作也由是言之生天地之間者皆人耳耳目之於聲色口鼻之於臭味肢體之於安佚隨所感動而有喜怒愛惡是不可得而冺遏者也故歸之弗學而能而謂之人情父子兄弟之聚夫婦男女之合君臣上下之交報施酬酢各有攸當人道所不得而踰越者也故謂之人義此義既形此情遂定於是講信修睦而人利興此義不立此情日亂於是爭奪相殺而人患起然人豈本有是患哉情我所固有也義我所固有也惟其本義以制情是以因義以成利惟其舎義而言利是以因利而生患君子論人道之大掲此情此義於利害間區别而備言之復䆒制情立義興利去患之說欲納天下於相安相養之域則自禮之外無餘說也飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舎禮何以哉鄭氏曰言人情之難知明禮之重孔氏曰端謂頭緒言人深心厚貌内外乖違包藏欲惡之心不可測知故外邊不見其色人君欲專一窮盡人美惡之情若舎去其禮更將何事以知之禮之所以知人心者有事於心貌見於外若七情美善十義流行則舉動無不合禮若七情違辟十義虧損則動作皆失其法故云舎禮何以哉馬氏曰莫非欲也而飲食男女欲之甚也故曰大欲莫非惡也而死亡貧苦惡之甚也故曰大惡喜怒哀懼愛惡欲皆所謂情而情之所本尤在於欲惡故曰心之大端也夫心隱於内而不可見色形於外而可以察蓋心者色之藴由色以觀之則心可以測度也孟子曰仁義禮智根於心其生色也睟然見於面盎於背雖作於其心而不見於其色則人之深情厚貌有時而不知也故色厲而内荏色取仁而行違者有之矣然則色固不可以得心乎詩云他人有心子忖度之人之可以忖度者以其有道也所謂道者禮而已惟其有禮以節之則美惡不能藏於心也故曰欲一以窮之舎禮何以哉嚴陵方氏曰欲惡心之大端雖各有端以藏其心不可測度也欲其所可欲惡其所可惡則為美非所欲而欲非所惡而惡則為惡然皆由心生者一也故曰皆在其心心無形無形則無色故曰不見其色上文言不可測度以不見其色故也禮器曰欲察物而不由禮弗之得矣正謂是也延平周氏曰大欲大惡藏於心而不可測者也果欲其可欲惡其可惡則為美欲非其可欲惡非其可惡則為惡又皆在其心而不見其色有欲一以窮之者禮而已蓋先王制禮其大倫大要莫非㳂人心以為之方茍非以禮則心焉廋哉長樂劉氏曰禮出於人之情以情度情則情無不顯此所謂有節於内而觀無不察矣孟子知齊王之大欲而齊王以為夫子言之於我心有戚戚焉者以此山隂陸氏曰欲一以窮之舎禮何以哉言揆之以禮無所不察長樂陳氏曰凡民耳目接於外物則七情生焉聖人不能使之無情也用禮以治其情使之接物雖動其情外有禮制則莫敢踰之也内明性理則莫敢悖之也故情雖内萌而外中禮節考其迹也與中無異是故出其心而為禮節者謂之中考其迹而中禮節者謂之和然則治天下者舎禮何以哉蔣氏曰人各有心自夫命於天而謂之性感於物而謂之情制於理而謂之義因其所適而後利害之名立原其治人之要必先有以正欲惡之大端粤自文籍既生典謨訓誥之作所以講切是理者首見於舜禹相傳之際方其天君湛然外物未接道心惟微未易驟形也有如欲惡相長事物益至人心惟危豈易禦哉惟其精一執中之功致力於此心危微之際能固其所以為道心者則此心始合而不離矣禮記論心何以異此飲食男女誰獨無之死亡貧苦誰願為之藏其心於不可測度之際宜甚危矣吾將即心以求真因色以知變運是禮於可觀可覩之際騐其功於内外不分之初飲食我所欲也觴酒豆肉遜而受惡男女我所欲也無媒不交無幣不見死亡貧苦我所惡也而國君死社稷大夫死宗廟君子仕而不稼田而不漁食時不力珍凡以使其内之所存不為外之所奪一𨼆顯而見定形也故曰欲一以窮之舎禮何以哉䆒觀聖人以禮治情之意然後知舜禹精一執中之論至於伯夷降典而後治心之要孚於天下此上下之所當講明者也故人者其天地之徳隂陽之交鬼神之會五行之秀氣也孔氏曰此以下言人感天地鬼神而生聖王還因天地鬼神作其法則以化人所以人情萬物可知也天以覆為徳地以載為徳人感而生是天地之徳也獨陽不生獨隂不成二氣相交乃生故云隂陽之交也鬼謂形體神謂精靈祭義云氣也者神之盛也魄也者鬼之盛也氣與魄相會然後物生故云鬼神之會秀謂秀異言人感五行秀異之氣故有仁義禮智信横渠張氏曰天地之徳謂人之徳性也所造深則所見厚又如天地之性人為貴亦是徳也禀五行之氣以生最靈於萬物是其秀也神之言申也鬼之言歸也凡生即申也要終即歸也神之盛極於氣故曰氣也者神之盛也鬼之盛極於魄故曰魄也者鬼之盛也一體兼此終始此鬼神之㑹也隂陽之交鬼神之會五行之氣物生皆然而人為備焉長樂劉氏曰徳言其性謂元亨利貞也交言其混謂純粹不雜也㑹言其要謂聰明正直也秀言其粹謂傑特品彚也天地之氣隂陽也隂陽消長迭相出入而成四時四時終始更相變化而成五行五行者四時之氣凝結而成也大之為山嶽河海小之為動植羽毛其於人也内之為五臟外之為五事性之為五常類之為五品其作於教化也則與天地合其徳與隂陽合其序與鬼神合其吉凶能使五行不失其性然非七情之所能致也不曰中和之至徳哉禮之為用其如是夫馬氏曰鬼者魄也神者魂也魂魄合然後謂之人故曰鬼神之㑹也凡盈天地之間者莫不禀五常之氣也人之所以異於物以其得氣之秀而㝡靈者也然則記者之言及此何也蓋將以明其制作之本也故聖人作則必以天地為本而人者天地之徳也必以隂陽為端而人者隂陽之交也必以鬼神為徒而人者鬼神之㑹也必以五行為質而人者五行之秀氣也凡此者亦所以明其制作之本意也山隂陸氏曰言人之備道全美如此奈何舎禮而欲備天地之徳稱神明之容哉四明沈氏曰人者其天地之徳言人與天地無間易說與天地合其徳又說與天地相似中庸說博厚髙明配天地又說溥博淵泉如天地人與天地猶為二物不若此言人者天地之徳更不須合配如相似也北溪陳氏曰人者隂陽之交鬼神之㑹說得亦親切此真聖賢之遺言非漢儒所能道也蓋人受隂陽二氣而生此身莫非隂陽如氣陽血隂脉陽體隂頭陽足隂上體為陽下體為隂至於口之語黙目之寤寐鼻息之呼吸皆有隂陽分屬不特人如此凡萬物皆然中庸所謂體物而不遺者言隂陽二氣為物之體而無不在耳天地間無一物不是隂陽則無一物不具鬼神又曰鬼神只是隂陽二氣之屈伸往來自二氣言之神是陽之靈鬼是隂之靈靈云者只是自然屈伸往來恁地活耳自一氣言之則氣之方伸而來者屬陽為神氣之已屈而往者屬隂為鬼其實二氣亦只是一氣耳又曰大概隂陽二氣會在吾身之中為鬼神以寤寐言則寤屬陽寐屬隂以語黙言則語屬陽黙屬隂及動靜進退行止皆有隂陽凡屬陽者皆為魂為神凡屬隂者皆為魄為鬼王氏曰聖人欲使天下知其生之所宜尊故必曉以生之所從受人之有是生也蓋有重之於其初而非茍然而得之者也天下之人惟不能明其所從受徒以其身為茍然而得之而自棄之心生自棄之心生而吾之所宜尊者始舉而褻之矣聖人憂焉故告之以其端而動其自尊之心曰人之所以為人者蓋天地隂陽鬼神五行交相參而與我以是生也則人之為人不既尊矣乎其生也有其形則必求其形之所自生其賦形也有其質則必求其質之所自得何謂形之所自生天以覆物為徳地以載物為徳人生於覆載中則其形之所自生固天地之大徳也獨隂不生獨陽不成人因其交㑹而生始具則其形所自生者固隂陽之交也氣者神之盛魄者鬼之盛氣與魄聚則生散則死人因其㑹聚而生始全則其形所自生者固鬼神之㑹也何謂質之所自得夫天地隂陽鬼神既成之以其形矣而形之生也又有所謂質與之俱生焉五行之氣散布以命萬物而所謂氣之秀者人獨得之以為其性之質則其質之所自得者固五行之秀氣也夫既有是形則可以共立斯世矣旣有是質則天下衆善無不具矣人知衆善無不具所以自待者不敢輕自期者不敢卑廣而充之自可欲之善至於充實之美大而化之之聖不可知之神則吾之一身固自有聖神之地天下之人何為而不知生之所宜尊即人之不敢慢天地隂陽而褻鬼神五行此天下所共知也然則移其不敢慢且褻者於吾身雖至於聖賢可也學者可不謹諸蔣氏曰人與天地並立而為三所賦者不薄所用者甚大也世之人梏於形體是以囿於範圍之内而不立於萬物之表且天地本與吾同徳也物有萬殊理本一致此一既生天得之以清地得之以寧人得之以靈其所以靈者非謂清且寧者其可乎是為天地之徳隂陽與吾同體也雖兩立用不獨行有男女然後有夫婦受形既若此矣而况喜怒其舒慘也出入其消長也主一廢一不可也是為隂陽之交鬼神與吾同類也氣盛而神魄盛而鬼人之氣魄合而不離而後靈於萬物是為鬼神之㑹物有常性形於五行人有常性形於五事蓋其事生而不窮者鍾於人之靈而後視聽言貌思可以作肅作乂作哲作謀而至於作聖也安得不謂之五行秀氣哉人之為人若是之不茍然也况觀兩間榛榛狉狉役於一而不知其二局於近而莫通其逺者物而已矣均是人而狹用之不能充其所賦而大其所用至於物之與儔是可悲也故天秉陽垂日星地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕鄭氏曰秉猶持也竅孔也地持隂氣出内於山川以舒五行於四時此氣和乃后月生而上配日一盈一闕屈伸之義也必三五者播五行於四時也一曰水二曰火三曰木四曰金五曰土合為十五之成數也孔氏曰自此至質也一節以上經言人禀天地隂陽鬼神五行而生此又述明天地之徳及五行之氣也以隂陽鬼神是天地中物故不重陳也天秉持陽氣垂懸日星以施生照臨於下地秉持隂氣為孔於山川以出納其氣氣有隂陽皆出於地地體是隂故總謂之隂也凡月體之生禀於日光若氣不和日月行度差錯失於次序則月生不依其時若五行氣和則月依其時而生是以三五十五日而得盈滿又三五十五日而虧闕也月有虧盈故備言之天則直言垂日星而已鄭註一盈一闕屈伸之義者盈謂其伸闕謂其屈也長樂劉氏曰天也者陽氣之所積故曰秉陽焉地也者隂氣之所積故曰秉隂焉隂氣合陽於天上則為日星是以其光下垂焉陽氣合隂於地下則為山川是以其竅上通焉山川者五行之本也故天之氣出入於地中則升為四時地之氣凝結於天上則降為五行合於四時和平協順而後月生焉月雖隂氣所結不得天陽無以成其明也日雖陽氣所結不得地隂無以成其耀也故陽中有隂則陽功成而能久其照隂中有陽則隂徳盛而能常其明萬物各正其性命以保形質之始終者未始不由隂陽之交混也日行遲君之道也月行疾臣之道也君逸臣勞天地自然之理也月之盈十有五日復在地下而上在天上故闕而不見也月之闕十有五日而與日相望於旦故盈焉然則月之所以能明而盈盛者假日之光也去日有逺近是以盈縮弦望隨之長樂陳氏曰天以清秉陽在天者成象則日星是也地以濁秉隂在地者成形則山川是也天地旣位於上下則播五行於其中故天一生水而播於冬天三生木而播於春地二生火而播於夏地四生金而播於秋天五生土而播於四時之間自天一至於天五則為十五之數十五之數成其所播者既和然後月生而如其數蓋三五者數之所變故數之至於三五則為五行生數之極而月所以盈又積之至於三五則為五行成數之極而月所以闕也然而隂陽之義配日月此特言月而不言日何也蓋月有盈闕之常而又多薄蝕之變得其常則四時和及其變則四時乖故觀月之生而已矣嚴陵方氏曰隂陽合而為道道則天地共由之而已隂陽離而為徳徳則天地各有所秉焉幽顯者天地之道上下者天地之位天地既位於上下則五行播於其中播者分布之稱也自天一至於天五竒偶合而成十五則可否相濟而和矣乖則塞而生暗和則通而生明故月如其數而生焉自生而進進極而盈為望既望而虧虧極而闕為晦朔後則明生而魄死望後則明死而魄生以麗於數故也是以三五而盈三五而闕言月而不言日者蓋月受日而明遡日而行言月如此則日之長短出没其能逃是數哉馬氏曰星麗乎天亦陽之屬也故言天秉陽而繼之以垂日星垂日星者所以昭其日星之明也山川麗乎地亦隂之屬故言地秉隂而繼之以竅於山川竅於山川者所以通山澤之氣也天之所以命萬物而往來不窮於其間者五行也五行之動必有所終故曰迭相竭迭者終而有始之意也山隂陸氏曰垂陽也竅隂也播隂陽也老子曰道生一一生二二生三三隂陽沖氣也五行是矣三然後有中五然後有中和中之所生也和而後月生也是以三五而盈三五而闕此言隂陽中而為五行五行播而為四時四時和而十有二月生焉月以盈闕為節故皆以三五龍泉葉氏曰天陽也天必能秉陽而後日星垂於下以效其經緯地隂也地必能秉隂而後山川竅於上以效其流止天地隂陽交為貫通而播五行之氣運於四時五行不忒四時不差而後月能望日晝夜相代以成嵗功生死不愆而盈闕不紊其勤勞至矣天地之道至誠而不息五行之氣至和而不乖此王則彼衰彼息則此生迭相為竭而未嘗竭也五行嵗月始此終彼相為本末不可窮盡此天地所以久存而不廢也其在人也發於聲音則律吕之變不可窮發於飲食則滋味之變不可窮發於衣服則色章之變不可窮凡天地五行隂陽運動之勤勞皆發於萬物而資於人以與之並為長久也天地之情性非人則不能體而參之天地之功用非人則不能察而法之天地之所以不息者由人道而後見之此人所以為天地之心五行之端食味别聲被色以生養於覆載之内而獨有厚於萬物焉蓋研括天地隂陽五行之運動而聚見於人則人之為可貴也大矣及其累於形偏於氣專已而忘物卑志而尊欲故雖為天地之心而其心非天地也雖為五行之端而其端非五行也雖食味别聲被色而味聲色之所自出者不知也冥然於日用飲食之間并吞之念形夸奪之事起其所以感傷天地陵犯隂陽毁敗五行者人固為之而萬物不與也是必有先知先覺者焉察其本原要其性命而流通焉故舉物睹情藝事勸功端本於天地隂陽紀法於日月星辰淪幽出明歴粗入微一皆順其常理非出私智任私意而自為也皇極則建常性則若設官則有治焉立師則有教焉此人之所以能不失其貴而卒於參天地以立天地萬物卒賴於人以長且久也雖然昔之言治者兢兢於天道業業於人事謹小而畏獨未嘗敢極其論也故以人情合人理則詩是也以人事永天命則書是也著天地隂陽五行之失常以考人理之否當而聳懼之以善惡則春秋是也惟易則深逺矣然而吉凶禍福必騐之以事觀爻賾象而人身之變動舉積此焉未有擅天地隂陽五行之理於一身以為貴範天地隂陽五行之理於天下以出治其意若此之大其用若此之妙其論若此之盡者也豈堯舜周孔固有遺言而後之得之者遂從而推廣極論之歟雖然使人能知其所以自貴而通於天地隂陽五行之故則去其滯吝消其鄙詐而無一舉動之非禮也使人君能知人之所以貴而還以天地隂陽五行之所賴者治之教之則必懲勸不以賞罰制馭不以權勢本仁立義而無一政事之非禮也則庶幾可也蔣氏曰上章論人而繼及於天地隂陽日月星辰象數之間何哉三才之道固未有不麗於隂陽之二氣者而其一抑一揚蓋本天地之正理少失其制則患生焉在易乾坤之卦四徳具於乾也而坤則利牝馬之負首庶物者乾也而坤則承天而時行以成徳為行者乾也而坤則取乎無成而有終獨以歸坤也上六爻又發龍戰於野之義為其嫌於無陽也然則地道也妻道也臣道也而可與陽亢位乎故秉陽者天也日星之象自然而昭垂秉隂者地也月之象則有待而後生使山川不為之通氣五行不為之播時則隂不和於陽而失其所以質之者矣月何自而能生故在天成象而日星以陽言月從隂類為之月者疾行乎周天之度而受明於日也三五而盈三五而闕蓋有分量而弗敢成也然則陽有專制之功隂必資陽之用先儒發之其義明甚王氏曰和而後月生也政和則人和人和則氣和氣和則充乎天地之間而與之俱和矣夫是以禍患不作和氣流通宻移於造化之妙則月之所以由和而生也且天一生水播和氣而為冬則月㑹日於析木星紀元枵之次地二生火播和氣而為夏則月會日於實沈鶉首鶉火之次天三生木播之於春二氣致和月之㑹日又見於娵訾降婁大梁之辰矣地四生金播之於秋二氣致和月之㑹日又見於鶉尾夀星大火之辰矣乃若中央之土播於四時分旺四季四序協紀五行不相陵而和又可見矣若然則載魄於東晦朔弦望無毫釐之差絲忽之謬者實由聖人調胸中之誠應乎天地則所以播於五行者已極其和而五行所以播於四時者又極其和此其效所以致然也易曰天地以順動則日月不過而四時不忒者蓋謂是歟江陵項氏曰案下文五行四時以配五聲六律五色六章五味六和則所謂播五行於四時而月生者正謂布五干於六支為三十日而晦朔以周也故曰是以三五而盈三五而闕明言五六三十無可疑矣五陽干加六陽支為三十日五隂干加六隂支亦為三十日隂陽各當三十故不言十與十二但言五六凡五聲六律五色六章五味六和皆然干言五行者甲乙屬木丙丁屬火戊己屬土庚辛屬金壬癸屬水也支言四時者寅卯辰屬春巳午未屬夏申酉戌屬秋亥子丑屬冬下文曰五行之動迭相竭也注曰竭謂相負戴正謂干支相加也又曰五行四時十二月還相為本也正謂十干周旋於十二支以成六十日也禮記集說卷五十六
