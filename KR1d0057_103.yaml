body:
  text: 禮記集説卷一百三宋衛湜撰雜記下第二十一嚴陵方氏曰此篇固以所記不一為雜然有生必有死人道之正也死於外則變矣有樂必有憂人情之常也重有憂則變矣變則不一而雜謂之雜者又在乎此故上篇諸侯行而死於館為首自未没父䘮而母死分為下篇之首有父之䘮如未没䘮而母死其除父之䘮也服其除服卒事反䘮服鄭氏曰没猶竟也除服謂祥祭之服也卒事既祭反䘮服服後死者之服孔氏曰自此至父也眀前後兩服之中有變除䘮之節此經眀先有父䘮而後遭母死為父變除之節未没䘮者為父䘮小祥後大祥前未竟之時于時又遭母䘮母既𦵏後值父應大祥除服以行祥事故云服其除服卒事謂父祥竟更還服母服也若母未葬而值父二祥則不得服其祥服二祥之祭為吉未葬為凶故未忍凶時行吉禮横渠張氏曰如有服則服其服雖緦小功之服亦服新而脱舊以徃時暫故也反則如常嚴陵方氏曰除服謂祥祭之服服其除服而後反䘮服以示於前䘮有終也雖諸父昆弟之䘮如當父母之䘮其除諸父昆弟之䘮也皆服其除䘮之服卒事反䘮服鄭氏曰雖有親之大䘮猶為輕服者除骨肉之恩也唯君之䘮不除私服言當者期大功之䘮或終始皆在三年之中小功緦麻則不除殤長中乃除孔氏曰此經明諸父兄弟之䘮當父母服内變除之莭父母服内其諸親除䘮亦為服除服除竟反先服此亦謂重䘮葬後之時也曽子問曰大夫士有私䘮可以除之矣而有君服焉其除之也如之何孔子曰有君䘮服於身不服私服又何除焉是有君服不得除己私服其私謂父母已下及諸父昆弟皆不得除也服問云緦之麻不變小功之葛小功之麻不變大功之葛據此言之是尋常小功緦麻不得易大功以上之服故知有大功以上之服不得為小功緦麻除服也又服問云殤長中變三年之葛既變三年之葛眀在大功服中為殤長中著服而又為之除也如三年之䘮則既顈其練祥皆行鄭氏曰言今之䘮既服顈乃為前三年者變除而練祥祭也此主謂先有父母之服今又䘮長子者其先有長子之服今又䘮父母其禮亦然然則言未没䘮者已練祥矣顈草名無葛之鄉去麻則用顈孔氏曰此眀前後䘮既受葛之後得為前䘮練祥既顈者謂後䘮既虞卒哭合變麻為葛無葛之鄉則用顈也後䘮既顈之後其前䘮湏練祭皆舉行之此經云既顈不云未没䘮則知既顈與未没䘮者别也既顈是既虞受服之時故鄭知未没䘮是既練之後也庾氏曰鄭註先有長子之服今又䘮父母當云又喪母不得并稱父依禮父在子為長子三年也後䘮既顈前䘮練祥皆行若後䘮既殯得為前䘮虞祔山隂陸氏曰凡䘮服皆麻練而葛盖禫而後顈顈吉服也知然者以被顈黼衣錦尚絅知之也三年重服故雖當既顈其練祥猶行鄭氏謂未没䘮者已練祥矣鄉當父母之䘮未練祥也然則既顈在禫之後眀矣王父死未練祥而孫又死猶是附於王父也鄭氏曰未練祥嫌未祫祭序於昭穆耳王父既祔則孫可祔焉猶當為由由用也附皆當作祔孔氏曰禮孫死祔祖今此眀若祖䘮雖未二祥而孫死則孫亦得用是祔禮祔於祖也案文二年榖梁𫝊云作主壊廟有時日於練焉壊廟壊廟之道易檐可也改塗可也註云親過髙祖則毁其廟以次而遷以此言之則練時壊祖與高祖之廟改塗易檐示有壊意其以先祖入於太祖之廟其祖𫝊入高祖廟其新死者入祖廟是練時遷廟也入三年䘮畢祫於太祖廟是祥後祫也故註云未練祥嫌未祫祭序於昭穆耳兼言祥者恐未祫故也但祖祔祭之後即得祔新死之孫然王父雖祔未練無廟孫得祔於祖其孫就王父所祔祖廟之中而祔祭王父焉嚴陵方氏曰王父雖未練祥而孫得祔者以昭穆同故也山隂陸氏曰猶之言嫌不祔也未練祥嫌未卒哭據周卒哭而祔嫌未卒哭曰未練足矣今曰未祥則亦嫌未祥可以祔也春秋𫝊曰夏五月乙酉吉禘于莊公其言吉何未可以吉也其言于莊公何未可以稱宫廟也有殯聞外䘮哭之他室入奠卒奠出改服即位如始即位之禮鄭氏曰哭之他室眀所哭者異也哭之為位入奠謂朝入奠於其殯既乃更即位就他室如始哭時此謂後曰之哭也孔氏曰有殯謂父母䘮未葬柩在殯宫者也外䘮謂兄弟䘮在逺者也他室别室也若聞外䘮哭於殯宫則嫌是哭殯於别室眀所哭者為新喪也眀日之朝著重䘮之服入奠殯宫及下室卒奠而出改已重䘮服著新死未成服之服即他室之位如昨日聞䘮即位時也大夫士將與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸其他如奔䘮之禮如未視濯則使人告告者反而後哭如諸父昆弟姑姊妹之䘮則既宿則與祭卒事出公門釋服而後歸其他如奔䘮之禮如同宫則次于異宫鄭氏曰猶亦當為由次於異宫不可以吉與凶同處也使者反而後哭不敢専已於君命也宿則與祭出門乃觧祭服皆為差緩也孔氏曰此一節眀大夫士與祭於公而有私䘮之禮猶是與祭者既與祭於公祭日前既視濯之後而遭父母䘮則猶是吉禮而與於祭也其時止次異宫不可以吉與凶同處也未視濯前遭父母之䘮則使人告君必待告君者反而後哭父母也既宿謂祭前三日將致齊之時既受宿戒雖有期䘮則與公家之祭若諸父昆弟姑姊妹等同宫而死則既宿之後出次異宫廬陵胡氏曰猶是言自若也山隂陸氏曰禮大夫死雖當祭猶告春秋𫝊曰大夫國體也古之人重死君命無所不通鄭氏謂宿則與祭出門乃觧祭服皆為差緩也然則歸而後哭亦以此曽子問曰卿大夫將為尸於公受宿矣而有齊衰内䘮則如之何孔子曰出舎乎公宫以待事禮也鄭氏曰尸重受宿則不得哭内䘮同宫也孔氏曰案上文不為尸之時未視濯之前受宿之後父母䘮使人告告者反而後哭今此齊衰内䘮亦謂諸父昆弟姑姊妹也但尸尊故出舎公之宫館以待君之祭事不在己之異宫耳孔子曰尸弁冕而出卿大夫士皆下之尸必式必有前驅鄭氏曰冕兼言弁者君之尸或服士大夫之服也臣見尸而下車敬也尸式以禮嚴陵方氏曰此一節已見曽子問觧父母之䘮將祭而昆弟死既殯而祭如同宫則雖臣妾葬而后祭祭主人之升降散等執事者亦散等雖虞附亦然鄭氏曰將祭謂練祥也言若同宫則是昆弟異宫也古者昆弟異居同財有東宫有西宫有南宫有北宫有父母之䘮當在殯宫而在異宫者疾病或歸者主人適子散等栗階為新䘮略威儀孔氏曰將祭謂將大小祥祭而有兄弟死則殯後乃祭兄弟輕故殯後便可行吉事此謂異宫者耳若同宫雖臣妾之輕卑死猶待葬後乃行父母祭也䘮服𫝊曰有死於宫中則為之三月不舉祭祥祭已渉於吉尸柩至凶故不可以相干虞祔則得為之若䘮柩即去者則亦祭不待三月也吉祭則渉級聚足䘮祭則栗階此二祥祭冝渉級為有兄弟䘮少威儀故散等也散栗也等階也助執祭者亦栗階舉主人至昆弟虞祔而行父母二祥祭執事者亦栗階栗階謂升一等而後升不連歩也故燕禮記云栗階不過二等註云其始升猶聚足連歩越二等左右足各一𤼵而升堂清江劉氏曰按䘮不冝有異居然則昆當作兄兄弟或不同居矣䘮服曰小功以下為兄弟山隂陸氏曰散等謂不拾級聚足鄭氏謂散等栗階誤矣栗階躐等有栗之道故曰栗階自諸侯逹諸士小祥之祭主人之酢也嚌之衆賔兄弟則皆啐之大祥主人啐之衆賔兄弟皆飲之可也鄭氏曰嚌啐皆嘗也嚌至齒啐入口孔氏曰此經眀䘮祭飲酒之儀正祭之後主人獻賔長賔長酢主人主人受賔長酢則嚌之衆賔及兄弟祭末受獻之時啐之衆賔兄弟皆飲之知此酢非受尸酢者士虞禮主人主婦獻尸受酢之時皆卒爵虞比小祥為重尚卒爵今惟嚌之故知受賔酢也神恵重故在䘮受尸酢亦卒爵賔禮輕故賔酢但嚌之知䘮祭有受賔酢者鄭註曽子問云虞不致爵小祥不旅酬大祥無無筭爵故知小祥之祭旅酬前皆為之嚴陵方氏曰盖飲酒之禮以少為敬啐為少於飲嚌為少於啐下言衆賔則知主人之酢為受長賔矣於長賔嚌之則於衆賔啐之於長賔啐之則於衆賔嚌之此重輕之别也而大祥又殺於小祥者以哀少忘而敬少略故也山隂陸氏曰自諸侯逹諸士盖蒙上言練祥虞祔之祭升降皆散等升降如此則小祥之酢嚌之啐之大祥啐之飲之皆逹亦可知凡侍祭䘮者告賔祭薦而不食鄭氏曰薦脯醢也吉祭告賔祭薦賔既祭而食之䘮祭賔不食孔氏曰侍謂相於䘮祭禮者䘮禮不主飲食故相者告賔但祭其薦不食之也此謂練祥祭虞祔不獻賔也嚴陵方氏曰祭之而不食者哀而不忍故也子貢問䘮子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服請問兄弟之䘮子曰兄弟之䘮則存乎書䇿矣君子不奪人之䘮亦不可奪䘮也鄭氏曰問䘮問居父母之䘮也䘮尚哀言敬為上者疾時尚不能敬也容威儀也孝經曰容止可觀兄弟之䘮存乎書䇿言疏者如禮行之未有加也齊斬之䘮哀容之體經不能載矣不奪人之䘮重䘮禮也不可奪䘮不可以輕之於己也孔氏曰此一節眀居父母兄弟䘮禮不奪人之䘮者謂不奪他人居䘮之禮謂他人居䘮任其行禮不可抑奪亦不可奪䘮謂己之居䘮當湏依禮不可自奪其䘮使不如法不奪人䘮恕也不奪己䘮孝也齊斬之䘮謂父母也父母至親哀容體狀經不能載顔色稱其情當湏毁瘠容稱其服當湏憔悴也横渠張氏曰持䘮敬則必哀哀則必瘠恣適非所以居䘮稍不敬則哀忘之矣或謂三年致哀於君子所飬得無損乎是君子之所飬也居䘮以敬為上敬則一於禮也嚴陵方氏曰敬足以盡禮故為上哀足以盡情故次之瘠足以盡容故為下顔色在乎面目而面目者情之所見也故顔色稱其情戚容兼乎四體者服之所被也故戚容稱其服顔色稱其情者以外稱内也戚容稱其服者以本稱末也情有悲哀隆殺之别服有齊斬重輕之殊外不稱内之隆殺則為偽矣本不稱末之輕重則為野矣奪䘮見曽子問觧山隂陸氏曰凡居親之䘮哀瘠常浮於敬故哭泣之哀顔色之戚有圖不能畫書不能載者矣故孔子言之如此兄弟之䘮存乎書䇿若親之䘮求情於言意之表可也孔子曰少連大連善居䘮三日不怠三月不觧期悲哀三年憂東夷之子也鄭氏曰言其生於夷狄而知禮也怠惰也觧倦也孔氏曰此眀居䘮得禮之事三日不怠謂親之初䘮三日内水漿不入口之属三月不觧者未𦵏前朝夕奠及哀至則哭之属期悲哀謂練以來常悲哀朝夕哭之属三年憂者以服未除憔悴憂戚馬氏曰聖人之作春秋於中國則尊之於蠻夷則擯之者以眀中國者禮義之所在而蠻夷者不可以禮義責也然而少連大連之善居䘮三日不怠三月不觧期悲哀三年憂則雖孔子之高弟曽閔之至孝亦不過如是此孔子稱之曰東夷之子也盖非特美其能行是禮又美其能變是俗也雖然孟子之言舜生於諸馮遷於負夏卒於鳴條東夷之人也文王生於岐周卒於畢郢西夷之人也彼舜文王為東西夷之人則二連以東夷之子而合於禮豈足怪哉論語謂柳下恵少連降志辱身矣言中倫行中慮少連之行可與下恵為徒則豈特如孟獻子之流加於人一等而已哉三年之䘮言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門疏衰皆居堊室不廬廬嚴者也鄭氏曰言言己事也為人説為語在堊室之中以時事見乎母乃入門則居廬時不入門也廬哀敬之處非有其實則不居孔氏曰大夫士言而後事行故得言己事不得為人語説也對而不問謂有問者得對而不得自問於人此謂與有服之親若與賔客疏逺者言則閒𫝊云斬衰唯而不對齊衰對而不言是也䘮大記云練居堊室不與人居居即坐也嚴陵方氏曰言略而語詳對應而問倡言而不語對而不問以居憂有所不暇故也廬堊室之中不與人坐示憂之所獨也在堊室非時見乎母不入門則在廬之中非時亦有所不見矣閒𫝊曰齊衰之䘮居堊室齊衰即此所謂疏衰以廬為嚴故父母之䘮乃居之所謂嚴者以居䘮之重人不可犯也妻視叔父母姑姊妹視兄弟長中下殤視成人鄭氏曰視猶比也所比者哀容居處也孔氏曰此一經眀服雖有異其哀戚輕重各視所正之親妻居廬而杖抑之視叔父母姑姊妹出適服輕進之視兄弟長中下殤服輕上從本親視其成人也嚴陵方氏曰此言輕重雖稍異而哀戚略同也親䘮外除兄弟之䘮内除鄭氏曰親䘮日月已竟而哀未忘兄弟之䘮日月未竟而哀已殺孔氏曰親䘮謂父母之䘮外謂服也兄弟謂期服及小功緦也内心也長樂黄氏曰註說内除謂日月未竟而哀已殺若日月未竟而哀先殺則是不能終其䘮也内除外除皆言日月已竟服重者則外雖除而内未除服輕者則不唯外除而内亦除也註說失之視君之母與妻比之兄弟𤼵諸顔色者亦不飲食也鄭氏曰言小君輕服亦内除也𤼵於顔色謂醲美酒食使之醉飽孔氏曰視比也謂比視君之母與君之妻輕重之冝比於己之兄弟若酒食不𤼵見於顔色者則得飲食之嚴陵方氏曰服君之母妻比己之兄弟則服君之服比己之親可知此亦所以眀外除内除之異也𤼵諸顔色若酒醴之類免䘮之外行於道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異於人也如此而后可以服三年之䘮其餘則直道而行之是也鄭氏曰惻隠之心能如是則其餘齊衰以下直道而行盡自得也似謂容貌似其父母也名與親同孔氏曰異於人謂殊異於無䘮之人餘行皆應如此以弔死問疾哀痛之處身又除䘮戚容應甚故舉弔死問疾言也其餘謂期親以下父在為母雖期年亦從上三年之内也山隂陸氏曰餘則直道而行之言所謂百行推此而直前則是矣故曰執一術而百善至者孝之謂也廬陵胡氏曰路隋父死母告以貌類父終身不引鏡近於目瞿劉温叟父名岳終身不聼絲竹近於心瞿弔問哀痛之處戚容應甚祥主人之除也於嵗為期朝服祥因其故服鄭氏曰為期為祭期也至眀日而祥祭亦朝服始即吉正祭服也䘮服小記曰除成䘮者其祭也朝服縞冠是也祭猶縞冠未純吉也既祭乃服大祥素縞麻衣釋禫之禮云𤣥衣黄裳則是禫祭𤣥冠矣黄裳者未大吉也既祭乃服禫服朝服綅冠踰月吉祭乃𤣥冠朝服既祭𤣥端而居復平常也孔氏曰祥謂祥祭主人除服之節於祥祭前夕預告眀日祥祭之期此時主人著朝服謂緇衣素裳其冠則縞冠也眀旦祥之時主人因著其前夕故朝服也於練祭不著祭服於此祥時正著祭服故註云正祭服純吉朝服𤣥冠今縞冠故曰未純吉祥祭雖吉哀情未忘加著縞冠素紕麻衣鄭引閒𫝊大祥素縞麻衣是也禫禮𤣥衣黄裳𤣥冠大吉當𤣥衣素裳今用黄裳故云未大吉也禫祭後著朝服綅冠踰月吉祭乃𤣥冠朝服則天子諸侯以下各依本官吉祭之服也從祥至吉服有六祥祭朝服縞冠一也祥吉素縞麻衣二也禫祭𤣥冠黄裳三也禫訖朝服綅冠四也踰月吉祭𤣥冠朝服五也既祭𤣥端而居六也山隂陸氏曰嫌於夕為期甞朝服矣詰朝不復反䘮服故云爾然則祥之日猶服練服及祭易之所謂除成䘮者其祭也朝服縞冠是也祭已又易之所謂大祥素縞麻衣是也子游曰既祥雖不當縞者必縞然後反服鄭氏曰謂有以䘮事贈賵來者雖不及時猶變服服祥祭之服以受之重其禮也其於此時始弔者則衞將軍文子之為之是矣反服反素縞麻也孔氏曰既祥謂大祥後有人以䘮事來弔者既晚不正當祥祭縞冠之時主人必湏反著此祥服縞冠受來弔者之禮然後反服大祥素縞麻衣之服山隂陸氏曰此言親䘮雖既祥猶有他䘮未除今以祥故無所不用縞縞既祥之服也然後反服然後反他䘮之服當袒大夫至雖當踊絶踊而拜之反改成踊乃襲於士既事成踊襲而后拜之不改成踊鄭氏曰尊大夫來至則拜之不待事已也更成踊者新其事也於士士至也事謂大小歛之屬孔氏曰此一節眀士有䘮大夫及士來弔之禮案檀弓云大夫弔當事而至則辭焉謂大小歛時主人不出故辭大夫也此是歛已竟當其袒踊故絶踊而拜之也反改成踊反還也改更也拜大夫竟反還先位更為踊而始成踊也乃襲謂更成踊訖乃襲初袒之衣也既事既猶畢也當主人有大小歛諸事而士來弔則主人畢事竟而成踊不即出拜也士言既事則大夫亦然大夫言絶踊則士固不絶踊也成踊畢而襲襲畢乃拜之不更為成踊山隂陸氏曰已甞袒矣大夫至而襲故今改襲而袒於士襲而後拜之故不復改袒然則又成踊何也盖居䘮凡賔客弔客去而歸必踊上大夫之虞也少牢卒哭成事附皆大牢下大夫之虞也犆牲卒哭成事附皆少牢鄭氏曰卒哭成事附言皆則卒哭成事附與虞異矣下大夫虞以犆牲與士虞禮同與孔氏曰上大夫平常吉祭用少牢虞依常禮也卒哭謂之成事成吉事也附附廟也二祭皆大並加一等用大牢也下大夫吉祭用少牢虞祭降一等用特牲卒哭附依常吉祭禮也鄭以士虞禮云三虞卒哭他用剛日先儒以此三虞卒哭同是一事鄭因此經虞與卒哭其牢既别眀卒哭與虞不同也嚴陵方氏曰犆即特也與特牲三爼之特同而與郊特牲之特異盖位有上下故禮有隆殺也山隂陸氏曰禮士虞用特豕今下大夫之虞亦云特牲則容父為士子為下大夫其祭如此於上大夫言父為大夫於下大夫言父為士相備也祝稱卜𦵏虞子孫曰哀夫曰乃兄弟曰某卜葬其兄弟曰伯子某鄭氏曰祝稱卜葬虞者卜葬卜虞祝稱主人之辭也孫謂為祖後者稱曰哀孫某卜葬其祖某甫夫曰乃某卜葬其妻某氏兄弟相為卜稱名而已孔氏曰謂卜葬擇日而卜人祝龜所稱主人之辭也虞用葬日故并言葬虞子卜葬父則稱哀子某卜葬其父某甫乃者言之助也妻卑故假助句以眀夫之尊也弟為兄則祝辭云某卜葬兄伯子某兄為弟則云某卜葬其弟某兄弟稱名則子孫與夫皆稱名也古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而後杖也鄭氏曰記庶人失禮所由始也叔孫武叔魯大夫叔孫州仇也輪人作車輪之官孔氏曰關穿也輠迴也作輪之人以扶病之杖關穿車轂中而迴轉其輪於是有爵而後杖以其爵位既尊其杖不鄙䙝而許用也鑿巾以飯公羊賈為之也鄭氏曰記士失禮所由始也士親飯必𤼵其巾大夫以上賔為飯焉則有鑿巾孔氏曰飯含也大夫以上貴故使賔為其親含恐尸為賔所憎穢故設巾覆尸面而當口鑿穿之令含得入口也士賤不得使賔子自含其親但露面而含耳鑿巾則是自憎穢其親故為失禮也山隂陸氏曰禮因時損益故有先王未之有可以義起者若有爵而後杖鑿巾以飯是也禮士含巾不鑿至公羊賈始鑿之以含君子有取焉冒者何也所以揜形也自襲以至小歛不設冒則形是以襲而后設冒也鄭氏曰言設冒者為其形人將惡之也襲而設冒言后衍字耳孔氏曰此經記者自問答設冒之事未襲之前始死事湏沐浴自既襲以後以至小歛之前雖已著衣若不設冒則尸象形見為人所惡也襲則設冒至小歛之前則以衣覆於冒上山隂陸氏曰記冒如此亦以著鑿巾為善后非衍字言孝子如此設冒不得已也或問於曽子曰夫既遣而包其餘猶既食而裹其餘與君子既食則裹其餘乎曽子曰吾子不見大饗乎夫人饗既饗卷三牲之俎歸於賔館父母而賔客之所以為哀也子不見大饗乎鄭氏曰言遣既奠而又包之是與食於人已而裹其餘將去何異與君子寜為是乎言傷㢘也既饗歸賔俎所以厚之言父母家之主今賔客之是孝子哀親之去也孔氏曰此一節眀或人問曽子遣奠之事大饗賔客既畢主人歛三牲俎上之肉歸於賔館己家父母今日既去遂同賔客之疏是孝子所以悲哀也重結前文以語或人非為人䘮問與賜與鄭氏曰此上滅脱未聞其首云何是言非為人䘮而問之與人䘮而賜之與問遺也乆無事曰問孔氏曰此語接上之辭故鄭云滅脱與語助也豈非為人有䘮而問遺之與人之有䘮而賜與之與平敵則問卑下則賜山隂陸氏曰冝承既卒哭遺人可也之下脱爛在是著非為人䘮從父昆弟以下雖卒哭猶無所問遺金華應氏曰非為䘮而問也又非為䘮加賜也乃為己之親耳三年之䘮以其䘮拜非三年之䘮以吉拜三年之䘮如或遺之酒肉則受之必三辭主人衰絰而受之如君命則不敢辭受而薦之䘮者不遺人人遺之雖酒肉受也從父昆弟以下既卒哭遺人可也鄭氏曰稽顙而後拜曰䘮拜拜而後稽顙曰吉拜謂受問受賜者也受酒肉必衰絰正服眀不茍於滋味也受而薦之於廟貴君之禮䘮者不遺人言齊斬之䘮重志不在施恵於人孔氏曰此一經論身有䘮拜謝之禮以其䘮拜謂父母長子也其實杖期以上皆為䘮拜非三年之䘮以吉拜者謂不杖期以下此義已具檀弓䟽三年之䘮受酒肉雖受之猶不得食也尊者食之乃得食肉猶不得飲酒故䘮大記云既𦵏若君食之則食之大夫父之友食之則食之矣不辟粱肉若有酒醴則辭是也嚴陵方氏曰䘮拜吉拜皆為拜辭與問也心有所樂然後以物遺人䘮以哀為主故不遺人人遺之雖酒肉受之者卻之為不㳟故也山隂陸氏曰所謂吾從其至者也然則稽顙而後拜盖三年之䘮拜也故曰以其䘮拜縣子曰三年之䘮如斬期之䘮如剡期之䘮十一月而練十三月而祥十五月而禫三年之䘮雖功衰不弔自諸侯逹諸士如有服而將徃哭之則服其服而徃練則弔鄭氏曰如斬如剡言痛之惻怛有淺深也期之䘮至而禫當在練則弔上為父在為母也功衰既練之服也諸侯服新死者之服而徃哭謂所不臣也練則弔謂父在為母功衰可以弔人者以父在故輕於出也然則凡齊衰十一月皆可以出矣孔氏曰自此至盈坎眀弔䘮之節三年之䘮小祥後衰與大功同故曰功衰衰雖外輕而痛猶内重故不得弔人也自諸侯逹諸士謂貴賤同也功衰雖不弔人如有服謂自有五服之親䘮則徃哭之將徃哭則不著己功衰而依彼親之節以服之申於骨肉之親故也然諸侯絶期不應有諸親始死服今云服而徃當是敵體及所不臣者謂始封君不臣諸父昆弟也大祥始除衰杖而練得弔人者以父在而得出則其餘䘮雖無父亦得出也母既可矣諸父灼然故鄭云皆可以出山隂陸氏曰所謂功衰猶言功裘㣲加人功雖服功衰不弔則以創鉅痛深故也既葬大功弔哭而退不聴事焉期之䘮未葬弔於鄉人哭而退不聴事焉功衰弔待事不執事小功緦執事不與於禮鄭氏曰聴猶待也事謂襲歛執綍之属期之䘮謂為姑姊妹無主殯不在己族者不與於禮謂饋奠也孔氏曰身有大功之䘮既葬徃弔他䘮弔哭既畢則退不待主人襲歛之事期䘮練弔亦然期之䘮謂姑姊妹無主為之服期未至於葬徃弔鄉人之䘮亦䘮畢則退不待襲歛也此姑姊妹期䘮既葬受以大功衰謂之功衰此後若弔於鄉人其情稍輕於未𦵏得待襲歛但不親自執事經直云期䘮鄭知姑姊妹無主者以前云大功既葬始得弔人此經期䘮未葬己得弔人眀知此期服輕是姑姊妹在他族成婦日乆殯在夫族者也執事擯相也緦小功服輕故未葬便可弔人亦為彼擯相但不得助彼饋奠耳曽子問云説衰與奠非禮也以擯相可也是擯相輕而饋奠重也藍田吕氏曰功衰事下脱一不字此謂卒哭之受服相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞附而退鄭氏曰此弔者恩薄厚去遲速之節也相趨謂相聞姓名來㑹䘮事也相揖甞㑹於他相問甞相恵遺也相見甞執摯相見也附皆當為祔孔氏曰相趨本不相識情既輕故柩出廟之宫門而退相揖恩㣲深故待柩出至大門外哀次而退相問恩轉深故窆竟而退相見恩轉厚故葬竟孝子反哭至家而退朋友疇昔情重故至主人虞祔乃退然與死者相識亦當有弔禮知生者弔知死者傷今註云弔則知是弔生人也弔非從主人也四十者執綍鄉人五十者從反哭四十者待盈坎鄭氏曰言弔者必助主人之事從猶随也成人二十以上至四十丁壯時非鄉人則長少皆反優逺也坎或為壙孔氏曰此論助葬及執事反哭之節弔䘮者本是來助事非為空随從主人而已既助主人故使年二十以上至四十強壯者皆執紼鄉人同鄉之人也五十始衰故待主人窆竟反哭從孝子反也四十強壯不得即反故待土滿坎而反若非鄉人則無問長少皆從主人歸優饒逺者䘮食雖惡必充饑饑而廢事非禮也飽而忘哀亦非禮也視不眀聴不聰行不正不知哀君子病之故有疾飲酒食肉五十不致毁六十不毁七十飲酒食肉皆為疑死有服人召之食不徃大功以下既葬適人人食之其黨也食之非其黨弗食也功衰食菜果飲水漿無鹽酪不能食食鹽酪可也孔子曰身有瘍則浴首有創則沐病則飲酒食肉毁瘠為病君子弗為也毁而死君子謂之無子鄭氏曰君子病之病憂也疑死疑猶恐也既葬適人人食之徃而見食則可食也為食而徃則不可黨猶親也非親而食則是食於人無數也功衰齊斬之末也酪酢酨毁而死是不重親也嚴陵方氏曰禮所以制中饑而忘廢事飽而忘哀皆非中道故皆以為非禮然送死所以當大事也其黨則食之非其黨則弗食所以為之節食菜果飲水漿皆聖人之中制故天下無難能之病焉藍田吕氏曰功衰亦卒哭之受服閒𫝊父母之䘮既虞卒哭疏食水飲不食菜果與此文正合疏食水飲其飲不加鹽酪故曰飲水漿無鹽酪也不能食食鹽酪可也者喪大記不能食粥羮之以菜可也盖人有所不能亦不可勉也山隂陸氏曰鄭氏謂功衰齊斬之末末者齊衰既葬斬衰既練之後非從柩與反哭無免於堩鄭氏曰言䘮服出入非此二事皆冠也免所以代冠人於道路不可以無飾堩道路孔氏曰從柩為孝子送葬從柩去時反哭謂孝子葬竟還時道路不可無飾得免而行非此二條不得免於道路也若葬逺反哭在路則著冠至郊反著免故小記云逺葬者比反哭皆冠及郊而后免是也凡䘮小功以上非虞附練祥無沐浴鄭氏曰言不有飾事則不沐浴孔氏曰自小功以上恩重哀深自冝去飾沐浴是自飾非此數條祭事則不自飾也言小功以上則至斬同練祥不主大功小功也若三年之䘮則士虞禮云沐浴不􅌨鄭註云期以下􅌨可也又士虞禮云眀日以其班附沐浴􅌨註云彌自飾大夫以上亦然嚴陵方氏曰有祭則不可以不齊戒齊戒則不可以不沐浴疏衰之䘮既葬人請見之則見不請見人小功請見人可也大功不以執摯唯父母之䘮不辟涕泣而見人鄭氏曰言重䘮不行求見人耳人來求見己亦可以見之矣不辟涕泣言至哀無飾也孔氏曰此眀在䘮與人相見之義小功輕可請見於人大功不可也文承疏衰既葬之下則小功亦謂既葬也凡言見人謂與人尋常相見不論執贄之事也嚴陵方氏曰人請見之則見不請見人者以人請見在彼請見人在此故也亦與對而不問同義執摯則請見人之禮也三年之䘮祥而從政期之䘮卒哭而從政九月之䘮既葬而從政小功緦之䘮既殯而從政鄭氏曰以王制言之此謂庶人也從政從為政者敎令謂給繇役孔氏曰王制云父母之䘮三年不從政齊衰大功三月不從政與此不同者此庶人依士禮卒哭與既葬同三月故王制省文緫云三月也若大夫士三年之䘮期不從政是正禮也卒哭金革之事無辟是權禮也曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有鄭氏曰嬰猶鷖彌也言其若小兒亡母啼號安得常聲乎所謂哭不偯廬陵胡氏曰孔子不取弁人孺子泣而此取嬰兒哭者此泛問哭時故舉重始死時也彼在襲歛當哭踊有節故異卒哭而諱王父母兄弟世父叔父姑姊妹子與父同諱母之諱宫中諱妻之諱不舉諸其側與從祖昆弟同名則諱鄭氏曰自卒哭鬼神事之尊而諱其名王父母以下之親諱是謂士也父為其親諱則子不敢不從諱天子諸侯諱羣祖母之所為其親諱子孫於宫中不言妻之所為其親諱夫於其側亦不言也孝子聞名心瞿凡不言人諱者亦為其相感動也子與父同諱則子可盡曽祖之親也從祖昆弟在其中於父輕不為諱與母妻之親同名重則諱之孔氏曰此一節論親戚死亡諱辟名之事卒哭前猶以生禮事之卒哭後去生漸逺故諱其名王父母謂父之王父母於己為曽祖父母正服小功不合諱以父為之諱子亦同父諱之兄弟謂父之兄弟於己為伯叔正服期父亦為之期是子與父同有諱也世父叔父是父之世父叔父於己是從祖正服小功姑謂父之姑於己為從祖姑在家正服小功出嫁緦麻二者皆不合諱以父為之諱故已從父而諱也姊妹謂父姊妹於己為姑在家正服期出嫁大功九月是己與父同為之諱此等是子與父同諱也鄭註子不敢不從諱據王父母世父叔父及姑已不合諱者言之父之兄弟及姊妹已為合諱不假從父而諱也鄭註是謂士也士謂父身以父身是士故諱王父若是庶人子不逮事父母則不諱王父母也天子七廟諸侯五廟故知諱羣祖妻之所為其親諱但不得在側言之於宫中逺處得言之母與妻二者之諱與己從祖昆弟同名則為之諱不但宫中旁側其在餘處皆諱之也鄭註子與父同諱則子可盡曽祖之親者父為王父諱於子則為曽祖父之伯叔及姑則是子曽祖之親故云子可盡曽祖之親也從祖昆弟共同曽祖之親故註云在其中從祖昆弟於父言之是父之同堂兄弟子也父服小功不為之諱已又不得從父而諱若母妻諱與從祖昆弟名相重累則諱之故註云於父輕不為之諱與母妻之親同名重則諱之鄭註為從祖昆弟諱而生文也以䘮冠者雖三年之䘮可也既葬於次入哭踊三者三乃出鄭氏曰言雖者眀齊衰以下皆可以䘮冠也始遭䘮以其冠月則䘮服因冠矣非其冠月待變除卒哭而冠次廬也雖或為唯孔氏曰自此以下眀遭䘮冠取之節將冠值䘮當成服時因䘮服加冠非但輕服得冠雖有三年重䘮亦可因䘮服而冠故云可也冠於次謂加冠於廬次之中若齊衰以下加冠於次舎之處冠後入於䘮所哭而跳踊每哭一節三踊如此者三凡九踊乃出就次所曽子問云將冠子未及期日有齊衰大功小功之䘮則因䘮服而冠言未及期日知冠月則可冠也次廬也據重服而言廬陵胡氏曰夏小正冠用二月若正月遭䘮則二月不得因䘮而冠必待冠除受服之節禮記集説卷一百三
