body:
  text: 禮記集説卷六十六宋衛湜撰帝牛不吉以為稷牛帝牛必在滌三月稷牛唯具所以别事天神與人鬼也鄭氏曰帝牛不吉以為稷牛養牲必養二也滌牢中所搜除處也唯具遭時又選可用也孔氏曰郊天既以后稷為配故養牲養二以擬祭也若帝牛不吉或死傷則用稷牛為帝牛其祭稷之牛臨時别取用之為猶用也既又覆説帝牛既尊必須在滌三月今帝牛不吉故取稷牛亦已在滌三月其祀稷之牛臨時别取故云稷牛唯具天神既尊故須在滌人鬼稍卑唯具而已是分别天神與人鬼不同也鄭注搜除謂搜掃清除周禮養馬謂之廋人遭時謂帝牲遭災之時既用稷牲其祀稷牲臨時選其可者凡帝牲稷牲初時皆卜取其牲繫于牢芻之三月若臨時有故乃變之也長樂劉氏曰帝牛不吉以為稷牛在滌三月然後卜也稷所以配天也故其牲唯具以帝為尊焉萬物本乎天人本乎祖此思文之詩所以頌稷而配天也嚴陵方氏曰謂之滌則以精潔為義唯具則取足而已不必三月之滌也充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月享先王亦如之則人鬼之牲亦芻之三月矣此止曰唯具者蓋芻之三月以祀天神為稱人鬼則如之而已故有時而唯具亦可也帝為天神稷為人鬼山隂陸氏曰言養牲必養二卜以為帝牛不吉則以為稷牛此亦所以别事天神與人鬼也據稷牛不卜公羊傳曰養牲養二卜帝牲不吉則拔稷牛而卜之何休謂二卜語在下此讀養牲養二之誤也主郊以牲目社以獸且言在滌致敬也郊致敬社致養亦言之法據唯為社田國人畢作延平周氏曰王自立社曰王社則祭社而不祭稷故周官封人謂掌設王之社壝者是也王為羣姓立社曰大社則祭社而祭稷故此言帝牛不吉以為稷牛者是也凡言社未必言稷言稷莫不兼社而有言社言稷何也言社以土為主言稷以榖為主萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也鄭氏曰言俱本可以配孔氏曰此一經論祖配天之義人本於祖物本於天以配本故也大報本反始者釋所以郊祭天之義天為物本祖為王本祭天以祖配之所以報謝其本反始者反其初始謝其恩謂之報歸其初謂之反橫渠張氏曰祭先之道其不可得而推者則無可奈何其可知者無逺近多少當盡祭之祖豈可不報蓋根本所繫雖逺烏得無報郊祀后稷以配天周止知后稷是己之始祖己上不可知天則是萬物之祖故祭天則以始祖配之雖庶人必祭及髙祖比之天子諸侯止有疏數耳如祭法廟數有不及祖者是不祭祖也以理論之人無貴賤上下皆須祭及髙祖以有服故也如五世祖若在死則豈可不為服乎禮雖無此服當以義起昨朝廷太宗袒免親祖免親止於卑小施於尊者豈可言袒免藍田吕氏曰祀天禮之至敬者也物無以稱其德故禮簡誠至則事天之禮盛矣然人道有所未盡故從其祖配之所謂配者當於祀天禮成之後迎祖尸而已以人鬼之禮祭之必配祭者所以盡人道之至愛凡言配天及郊祀之有尸者義當如此詳見前章橫渠先生説嚴陵方氏曰萬物皆天之所生而人則祖之所生如是則祖與天合矣故推祖以配天故曰此所以配上帝人物所本如此安可不知報本而反始哉故言郊之祭大報本反始也山隂陸氏曰家主中霤國主社示本也此諸侯大夫之事萬物本乎天人本乎祖此所以配上帝也此天子之事喪服傳曰都邑之士則知尊禰矣學士大夫則知尊祖矣諸侯及太祖天子及其始祖之所自出禰本也祖亦本也太祖亦本也其始祖之所自出亦本也郊之祭不言所以尚非所以也據社所以報本反始也延平周氏曰孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝是祖之所配於圜丘者昊天而考之所配於明堂者上帝此言萬物本乎天人本乎祖而反言配上帝何也天言其體帝言其用故對而言則天與帝異離而言則帝即天也天即帝也易之象曰先王以作樂崇德殷薦之上帝以配祖考其言上帝與此同意天子大蠟八伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之也鄭氏曰所祭有八神伊耆氏古天子號也索謂求索也歲十二月周之正朔謂建亥之月也饗者祭其神也萬物有功加於民者神使之也祭之以報焉造者配之也孔氏曰此一節論蠟祭之事八蠟先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八所祭之神合聚萬物而索饗之但以此八神為主大者是天子之蠟對諸侯為大天子既有八神則諸侯之蠟未必八也謂若先嗇古之天子諸侯未必得祭也周禮大司樂六變而致象物及天神鄭云象謂日月此不數者先嗇司嗇並是人神有益於人水庸之屬有益稼穡故祭之天神象物去人縣逺雖祭不為八神之數明堂云土鼓葦籥伊耆氏之樂禮運云夫禮之初始諸飲食蕢桴土鼓俱稱土鼓則伊耆氏神農也以其初為田事故為蠟祭下云主先嗇則豈神農自祭其身乎蓋神農伊耆一代之總號其子孫為天子者始為蠟祭也鄭注造者謂造此蠟祭配此八神而祭橫渠張氏曰八蠟以記四方八者先嗇一也是始治稼穡者據易則是神農也司嗇是修此職者二也農三也郵表畷四也貓虎五也坊六也水庸七也百種八也百種百榖之種也祭之以民食之重亦報其嗇所成舊説以昆蟲為八蟲是為害者不當祭百種或致此百種而祭之或只祭稷而已長樂陳氏曰蠟之為祭所以報本反始息老送終也其服王玄冕而有司皮辨素服葛帶榛杖其牲體疈辜其樂六樂而奏六變吹豳頌擊土鼓舞兵舞帗舞其所致者川澤山林以至土示天神莫不與焉則合聚萬物而饗之者非特八神也而所重者八以其尤有功於田故也其神之尊者非特先嗇也而所主者先嗇以其始有事於田故也古者蠟則飲于學黨正屬民飲酒于序是也既蠟則臘先祖五祀於廟仲尼與於蠟賔事畢出遊於觀之上是也然則臘亦謂之蠟矣先儒以郊特牲言皮辨素服而祭又言黃衣黃冠而祭則二祭之服不同月令言祈來年于天宗割祠于公社又言臘先祖五祀則祈臘之名不同於是謂皮辨素服而祭與祈來年于天宗蠟也黃衣黃冠而祭與臘先祖五祀臘也蠟以息老物臘以息民息民固在蠟後矣此記所以言既蠟而休民息己也周蠟於十有二月秦臘於孟冬皆建亥之月也晉侯以十二月滅虢遂襲虞宫之竒曰虞不臘矣則臘在蠟月可知矣古者臘有常月而無常日祖在始行而無常時由漢以來溺於五行之説以王曰祖以衰曰臘其失先王之禮逺矣先儒謂蠟六奏樂而禮畢東方之祭則用太蔟姑洗南方蕤賔西方夷則無射北方則黃鍾為均於禮或然又曰伊耆氏掌共王之杖咸以老者待杖然後安猶老物待蠟然後息也伊耆氏已有功於耆老者矣故後世以其官為姓周又以其姓名官先儒謂其始制鼓籥又始為蠟於是以為古王者之號然古之制法者𨽻首造厯大橈作甲子倉頡造書之類豈皆古王者哉果伊耆氏實古王者之號周人固應尊異而神之不宜列於銜枚氏壺涿氏而以下士之官名之也嚴陵方氏曰合而言之則曰大蠟分而言之則曰八蠟曰大蠟八者則知自八者之外皆其小也八蠟先嗇也司嗇也農也郵表畷也貓也虎也坊也水庸也周官有伊耆氏以共杖咸蓋杖所以扶老豈非以伊耆氏始為蠟以息老物故共杖咸者以是名官乎此所以言伊耆氏始為蠟也昔之所用者物之形今之所索者物之靈故索而乃可饗焉黨正所謂國索鬼神而祭祀是矣凡物之種種固已離矣十二月物之合聚之時也先王因其合而合之因其聚而聚之以索饗不亦冝乎馬氏曰建亥之月五榖已入萬物所以成者神有以相功於其幽民有以致力於其明神有功以相其幽則報之民有力以致其明則勞之所謂百日之蠟一日之澤是也山隂陸氏曰大蠟八先嗇一司嗇二祭百種以報嗇三饗農及郵表畷四禽獸五迎貓六迎虎七祭坊與水庸八老物以佚死物以息蠟之祭也周官伊耆氏掌共杖咸取其老物以佚蠟氏掌除胔取其死物以息先儒謂伊耆氏神農氏也通其變使民不倦神而化之使民冝之是之謂神農有以勞之必有以佚之有以作之必有以息之是之謂伊耆蠟讀如乍一有一亡為乍物之死生少老一有一亡何有窮矣是之謂蠟延平周氏曰歲十二月即夏之十二月乃建丑之月也蓋建丑之月謂之蠟始可為息民之祭果周之十二月則豈得謂息民之祭乎蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也古之君子使之必報之迎貓為其食田鼠也迎虎為其食田豕也迎而祭之也祭坊與水庸事也鄭氏曰先嗇若神農者司嗇后稷是也嗇所樹藝之功使盡饗之故云祭百種以報嗇農田畯也郵表畷謂田畯所以督約百姓於井間之處也詩云為下國畷郵禽獸服不氏所教擾猛獸也迎而祭之迎其神也水庸溝也孔氏曰以先嗇為主司嗇從祭種曰稼斂曰嗇云嗇者取其成功收斂受嗇而祭也祭百種以報嗇為下起文百種則農及郵表畷禽獸等所以祭之者報其助嗇之功使盡饗焉田畯有功於民郵若郵亭屋宇處所表田畔畷者謂井畔相連畷於此田畔相連畷之所造此郵舍田畯處焉禽獸即下文貓虎之屬言禽獸則助田除害者皆悉包之特云貓虎舉其除害甚者不忘恩而報之是仁有功必報之是義也蠟祭仁義之至盡也坊者所以蓄水亦以障水水庸者所以受水亦以泄水祭此坊與水庸之神鄭所引詩者齊魯韓詩也恐迎貓虎之身故注云迎其神嚴陵方氏曰上言祭下言饗互相備也百種百榖之種也百種乃嗇之所成故祭百種以報嗇也農則致所掌以養人而不失其時者也郵則田官於此有所識畷則田官於此有所聯皆督約農事之處也故三者合為八蠟之一焉鼠之與豕皆足以為田之害而貓與虎能食而除之迎其神而祭之則所以報之也於貓虎如此則六者可知矣馬氏曰先嗇者其智足以創物立於其先司嗇者因其成法而謹司其職而已故祭則以先嗇為主而以司嗇配之山隂陸氏曰先嗇田祖也司嗇田畯也若稷自於秋報之然則饗農饗農而已周官籥章凡國祈年于田祖吹豳雅擊土鼓以樂田畯祭百種祭百榖之種以報嗇也農其分也郵其過者也雖勿索可也禽獸為其害我也故除之矣雖亦勿索可也今皆索而饗之是所謂仁之至義之盡矣表表而祭之若祭表貉是也畷畷而祭之若畛於鬼神是也據此表畷禽獸接祭而已矣先儒謂接祭無迎尸之事祭坊與水庸事也何以不言及水坊外也庸讀如民功曰庸之庸祭坊謂以坊禦水祭水謂以水禦旱為其用之也故祭之故曰庸事也雖仁非仁之至雖義非義之盡延平周氏曰索饗及於禽獸可謂仁之至義之盡也盡於義然後至於仁故於仁言至義言盡君子之於物莫不各因其才而使之雖使之甚勞亦必有以為之報此使人之術與忠厚之道常見於祭祀之間也坊與水庸以其有事於我故祭之講義曰曰至曰盡不以鄙賤而忽焉之意也曰土反其宅水歸其壑昆蟲毋作草木歸其澤皮辨素服而祭素服以送終也葛帶榛杖喪殺也蠟之祭仁之至義之盡也黃衣黃冠而祭息田夫也野夫黃冠黃冠草服也鄭氏曰土反其宅至歸其澤蠟祝辭也若辭同則祭同處可知矣壑猶坑也昆蟲暑生寒死螟螽之屬為害者也送終喪殺所謂老物也素服衣裳皆素黃衣黃冠而祭謂既蠟臘先祖五祀也於是勞農以休息之論語云黃衣狐裘黃冠草服言祭以息民服衆其時物之色季秋而草木黃落孔氏曰土即坊也及歸也宅安也土歸其宅則不崩水即水庸水歸其壑謂不泛溢昆蟲毋作謂不為災草苔稗木榛梗之屬當各歸生藪澤之中不得生於良田害嘉榖也陳辭有水土昆蟲草木者以其無知故特有辭也先嗇之屬有知故不假辭草木有辭則當有神八蠟不數之者以草木遍地皆是不如坊與水庸之屬各指一物也案周禮籥章云國蠟祭則吹豳頌息老物以物老故素服物老將終故葛帶榛杖素服謂白素衣積素裳經不云皮辨者從上省文也素服送終是仁恩葛帶榛杖示隂氣斷割故云仁之至義之盡也田夫則野夫也野夫著黃冠是季秋之後草色之服故息田夫而服之也長樂陳氏曰皮辨素服而祭者蠟祭四方百物也黃衣黃冠而祭者臘先祖五祀也蠟以息老物故服送終之服而以皮辨素服葛帶榛杖臘以息民故服田夫之服而以黃衣黃冠然周禮司服王祭羣小祀則玄冕鄭氏曰羣小祀林澤墳衍四方百物之屬也大宗伯以疈辜祭四方百物鄭氏曰四方百物磔禳及蠟祭也王於蠟服玄冕而有素服與黃冠者蓋執事者之服歟禮書嚴陵方氏曰水土昆蟲草木此皆因其合聚之時而合聚以饗之故祝者之辭言其時事如此皮辨則其色白素服則衣裳皆素素者送終之服而蠟亦送終之事故云以送終也别言之則服止言衣裳合言之則辨亦服爾故下止言素服也帶不以麻而以葛杖不以竹而以榛若喪也而實非喪故曰喪殺也既非喪必欲若喪者以其有送終之義故也前言皮辨素服後言黃衣黃冠而祭説者謂皮辨素服為主祭者之服黃衣黃冠為助祭者之服是矣其言野夫黃冠則為助祭者之服可知且皮辨素服則以送終為義黃衣黃冠則以息田夫為義送終者祭之道也田夫者祭之事也夫黃者土之色百昌生於土而作終亦反於土而息冬則反於土之時也服以是色亦宜矣土爰稼嗇者田夫之事取土之義以息田夫又宜矣以土之義如此故凡野夫皆黃冠焉野夫即田夫也言其所事曰田夫言其所居曰野夫草服謂草野之服故下言草笠以為野也上兼言黃衣而下止言黃冠則以草服該之故也然籥章曰息老物此曰息田夫者蓋作之於始息之於終雖人之情亦是道也道終則有始今歲之息乃所以兆來歲之作息猶氣之息也往來未嘗息乃所以為息也延平周氏曰大蠟祝辭雖紀歲終之事蓋亦有順天時息老物之意也馬氏曰蠟者於歲之終報其成功又以祈來年之始故祝之辭如此草木者荑稗之屬王皮辨素服而祭所以送萬物之終也萬物之肅殺而王葛帶榛杖者以喪禮處之也蓋萬物生有以養人而終不可不報亦示其不忘本也故曰仁之至義之盡山隂陸氏曰據此皮辨以祭而已所謂素服蓋去繡黼丹朱中衣不殺而死所謂終也故素服以送之葛帶於理見割榛杖於理見至為其殺之也故喪之老子曰戰勝則以喪禮處之葛帶變麻榛杖變桐蠟之祭也其以祭服祭之可也今其衣服如此是亦仁之至義之盡也黃衣黃冠天謂之玄玄冠象焉朝服也地謂之黃黃冠象焉野服也經云野夫黃冠野夫務知地事而已黃冠草服也言草以非齊服玄冠齊服也齊朝廷之事也草野田之事也草艮也齊巽也草昧也齊明也大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國天子樹瓜華不斂藏之種也鄭氏曰諸侯於蠟使使者戴草笠貢鳥獸也詩云彼都人士臺笠緇撮又曰其餉伊黍其笠伊糾皆言野人之服也詔客告者詔使者使歸以此告其君所以戒之華果蓏也又詔以天子樹瓜蓏而已戒諸侯以蓄藏藴財利也孔氏曰因上蠟祭廣釋歲終蠟時之事周禮羅氏掌羅鳥鳥蠟則作羅襦謂細密之羅周禮不云掌獸此云獸者以其受貢獸故也四方諸侯有貢獻鳥獸於王者皆入屬大羅氏也使者著草笠而至王庭草笠是野人之服今歲終功成是由野人而得故重其事而尊其服詔亦告也客謂貢鳥獸使者羅氏先受貢畢使者臨去羅氏又以鹿與女致與使者宣天子之詔令使者反國以告戒其君故云詔客告也好田好女者亡其國此宣詔所告之言也言鹿是田獵所得之物女是亡國之女非每國輒與女鹿羅氏以鹿與女示使者爾瓜今之瓜言天子唯樹瓜與果蓏供一時之食不是收斂久藏之種與民爭利令使者歸告其君也注引小雅都人士周頌良耜二詩證笠是野人之服長樂劉氏曰四方諸侯當仲冬而遇於天子者必助其祭祀也故其為蠟而獵莫不從焉貢其禽於天子則大羅氏受之獻禽者諸侯之卿大夫也草笠而至尊野服者以明諸侯及其臣皆野服馳騁從禽以助王也其為忠義亦可尊矣即之以為禮焉既受草笠之獻則致鹿與女於庭而詔獻禽之客俾還告於其君以申天子之戒勸也曰好遊田以肆其禽荒者好女色以肆其情欲者亡國之道天子之所不赦也華果蓏也瓜及果蓏時鮮之物不可以自逺而致之也不可以收斂而藏之也天子乃樹植之所以貴時新供寢廟非貪財利而種之也亦戒諸侯毋廣樹植務收斂以奪其民之利亦潔矩示民之道也嚴陵方氏曰致鹿非實致鹿也特致所以獲鹿之物爾致女非實致女也特致所以飾女之物爾所謂作羅襦者以此好田好女者亡其國其戒之之辭也致鹿則所以戒好田致女則所以戒好女五子述大禹之戒曰內作色荒外作禽荒有一于此未或不亡則好田好女者固足以亡其國而可為戒也羅氏之戒好田則是矣而又戒好女者以其皆隂事故也周官甸師共野果蓏先儒謂果桃李之屬蓏瓜瓞之屬蓋果即華之成實蓏即瓜之總名彼言果蓏此言瓜華互相備也斂秋事藏冬事瓜華之種類特可以供斯須之求非足以待久長之用而天子樹之以示不與民爭利焉此戒諸侯之辭也馬氏曰好田好女不斂藏之種者戒其貪也其意以為民有終歲之勞而有一日之佚而為之上者豈可以好樂無厭而淫德不倦乎其意以為民有終歲之勤而有一日之積而為之上者豈可以好貨無厭而貪利無已乎山隂陸氏曰以天子掌鳥獸之官是以稱大天子無事與諸侯相見曰朝考禮正刑一德以尊於天子今曰草笠而至尊野服者則以無君子莫治野人無野人莫養君子故也然諸侯來曰朝使其臣來貢然後曰至尊野服也則野服雖尊非服之正羅氏致鹿與女周官所謂蠟則作羅襦是也瓜即華也以告諸侯故謂之華曲禮削瓜為國君華之甸師共野果蓏之薦天子所樹者也為大夫裸之故瓜亦或謂之裸凡此皆善墮爛不可藏也故曰不斂藏之種爾雅云果裸之實栝婁栝婁善藏言實則與華異然則瓜言華亦或以此蓋瓜果裸之華者延平周氏曰周官羅氏謂蠟則作羅襦蓋羅則鹿之所以獲者而襦則女之所衣者也故致之以戒於諸侯然戒之必至於歲終者戒於終所以圖其始也瓜華者不斂藏之種也樹其不斂藏之種者所以戒聚斂也八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息己故既蠟君子不興功鄭氏曰四方方有祭也其方榖不熟則不通於蠟使民謹於用財也移之言羡也詩頌豐年曰為酒為醴蒸畀祖妣以洽百禮此其羡之與收謂收斂積聚也息民與蠟異則黃衣黃冠而祭為臘必矣孔氏曰此論天子蠟祭四方不同豐荒有異兼記臘祭宗廟息民之事四方之內年榖不得和順成熟則當方八蠟之神不得與諸方通祭所以然者欲使不熟之方萬民謹慎財物也有順成之方其蠟之八神乃與諸方通祭以蠟祭豐饒皆醉飽酒食使民歆羡也前文云黃衣黃冠而祭不云臘之與蠟似為一此文云既蠟而收民息己先蠟後息民是息民為臘與蠟異也前黃衣黃冠在蠟祭下故鄭知是臘也不興功謂不興農功若土功則左傳云龍見而畢務戒事也火見而致用水昏正而栽日至而畢土功建亥之月起日至而畢也皇氏曰此一節據諸侯之國而為蠟祭以記其功當國不成則不為蠟成則為蠟長樂劉氏曰九州之諸侯保育其民者也各視其年之豐凶則蠟之祭有行與不行焉所以謹民財不以祭祀傷其衣食也易之損曰曷之用二簋可用享言凶年而約其禮也順謂五氣時若成謂九榖皆登順成之方其蠟乃通者以答百神所以致豐穰之勞也以移民也者民底厥勤以至京坻之積必因祭報以燕勞之所以勸而移之也易其不勤以為勤移其心也易其不足以就有餘移其身也大司徒之職曰大荒大札則令邦國移民通財舍禁弛力薄征緩刑然則蠟之通不通皆聽命於司徒矣蠟禮既畢然後息民之祭行焉然則黨正國索鬼神而祭祀者蠟也非其所職焉其所職者於蠟之後以禮屬其黨之民飲酒于序以正齒位而謂之息民者息其田野之勞而入於邑居以習禮義故正其齒位以為庠序之先焉嚴陵方氏曰記四方者記四方之豐凶也年不順成八蠟不通此以蠟而記其凶也順成之方其蠟乃通此以蠟而記其豐也蠟乃合聚之祭故因其合聚而收之也物既收則民亦息民息則一歲之事已矣故曰民息已前言息田夫此言民息互相備也功者民力之所致民息己故既蠟君子不興功且蠟本以息農夫則此所言功止謂農功爾若夫宫功則執於建亥之月土功則畢於建子之月武功則纘於建丑之月而既蠟君子未始不興功焉馬氏曰四方年不順成八蠟不通所謂黜之也順成之方其蠟乃通所謂陟之也周禮黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位及其酒無算則皆若狂矣子貢觀於蠟謂一國之人皆若狂賜未知其樂則狂者乃美之之意也延平周氏曰蠟之所以不通者謹民財也謹猶言節也蠟之所以通者斂民之所有餘而共其祭也既蠟則歲終矣萬物皆收成而百工皆告休故曰既蠟而收民息己山隂陸氏曰言記以不忘四方百物之功司勳曰凡有功者銘書於王之大常祭於大蒸以謹民財以移民也禮以謹之樂以移之既蠟而收民息己春播種之民作秋收斂之民息沙隨程氏曰聖人治神人之道以為茍曠其職如神者亦不敢不致罰也然則四方年不順成之所八蠟不通者亦變置社稷之意非區區為民財不足而謹之也唐禮蠟祭年不順成則絀其方守之神也此古禮之存者猶可考也南豐曽氏曰博士和峴言蠟始伊耆而三代有嘉平清祀蠟祭之名蠟臘之利名也漢乘火德以戌日為臘臘接也言新故相接故田獵取禽以報百神享宗廟旁及五祀以致孝盡虔魏晉同之唐以土王貞觀之際尚用前寅蠟百神卯日祭社辰日臘宗廟至開元始定禮制三祭皆於臘辰以應土德議者是之宋興推應火行以戌日為臘而獨以前七日辛卯蠟不應於禮請如開元事蠟百神祀社稷享宗廟同用戌臘如禮便制曰可鞏本朝政要䇿恆豆之菹水草之和氣也其醢陸産之物也加豆陸産也其醢水物也籩豆之薦水土之品也不敢用常褻味而貴多品所以交於神明之義也非食味之道也鄭氏曰此謂諸侯也天子朝事之豆有昌本麋臡茆菹麏臡饋食之豆有葵菹螺醢豚拍魚醢其餘則有雜錯云也非食味之道言禮以異為敬孔氏曰自此至后斷也一節總明祭祀籩豆酒醴莞簟尊彞醯醢鸞刀所用之冝恆豆謂朝事及饋食恆常所薦之豆所盛之菹是水草和美之氣若昌本茆菹是也其所盛之醢陸地所産之物也加豆謂祭末酳尸之後其菹陸地産生之物而為之若葵菹豚拍之屬是也加豆所盛之醢用水中之物若螺醢魚醢是也鄭知此謂諸侯以其與周禮天子豆物不同也天子朝事之豆有昌本麋臡茆菹麏臡與此經同其菁菹鹿臡菁菹非水物與此經異也天子饋食之豆有葵菹螺醢豚拍魚醢與諸侯加豆不同其天子加豆有芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢芹菹與深蒲及箈菹等非陸産也鹿與醓醢非水物也與此經異也鄭總云其餘則有雜錯是天子與諸侯異也其籩豆所薦之物或水或土所生品類也前唯言豆此連言籩者籩是配豆之物所盛亦有水土所生也所薦之物不敢用常褻美味貴其多有品類言物多而味不美也所以交接神明之義取恭敬質素非如人事飲食美味之道也橫渠張氏曰古亦有燕器祭必為籩豆簠簋者非聖人不能為也蓋欲異其器而不通褻用又欲其器之盛物之豐且令人持之專敬嚴陵方氏曰恆豆謂所常進之豆加謂於所常進而有加者以恆而對加則加為暫以加而對恆則恆為朝事饋食矣菹醃菜也醢肉醬也上言恆豆之菹則知加豆之陸産亦菹也上言陸産之物則知下言水物即水産也上言水草之和氣則知下之所言皆和氣也常所食者皆褻而不敬故謂之常褻謂交於神明者在誠而不在味故曰非食味之道也義言其所冝道言其所由篇首言籩豆之實此言薦者實言實之於中薦言薦之於上延平周氏曰朝事與饋食之豆非無陸産之物也以水草之和氣者為主加豆非無水草之和氣也以陸産者為主山隂陸氏曰恆豆舉茆菹麏臡故曰恆豆之菹水草之和氣也其醢陸産之物也加豆舉筍菹魚醢故曰加豆陸産也其醢水物也先王之薦可食也而不可耆也卷冕路車可陳也而不可好也武壯而不可樂也宗廟之威而不可安也宗廟之器可用也而不可便其利也所以交於神明者不可以同於所安樂之義也鄭氏曰武萬舞也孔氏曰此總明祭祀之物不可同於尋常安樂之義也祭祀薦羞質而無味不可歆嗜衮冕路車尊嚴不可尋常乘服以為榮好也武是萬舞大武以示壯勇之容不可常娛樂也宗廟尊嚴肅敬不可寢處其中以自安宗廟之器共事神明不可因便以為私利嚴陵方氏曰水土之屬謂若籩豆之實水土之品可食之以為禮而不可供嗜欲之求卷冕龍衮也路車即大路也可陳之以為儀而不可資玩好之用武舞執干戚以為勇壯之容而非所以樂其情焉宗廟奉鬼神以示威靈之居而非所以安其身焉祭器不若燕器之利而便於用安樂者謂所安而樂之也若可耆可好之類是矣此言先王之薦可食而不可耆則知後之所言玄酒明水與夫太羮皆不可耆言路車可陳而不可好則知素車之乘亦不可好也言宗廟之器可用而不可便其利則知疏布冪與夫蒲越稿鞂皆不可便其利也前總其略後别其詳山隂陸氏曰宗廟之威亦釋大武若言宗廟之威不應衍而字酒醴之美玄酒明水之尚貴五味之本也黼黻文繡之美疏布之尚反女功之始也莞簟之安而蒲越稿鞂之尚明之也大羮不和貴其質也大圭不琢美其質也丹漆雕幾之美素車之乘尊其朴也貴其質而已矣所以交於神明者不可同於所安褻之甚也如是而后宜鄭氏曰尚質貴本其至如是乃得交於神明之宜也明水司烜以隂鑑所取於月之水也蒲越稿鞂藉神席也明之者神明之也琢當為篆字之誤也幾謂漆飾沂鄂也孔氏曰此明祭祀所用之物尚質貴本玄酒謂水也陳列酒尊之時明水在五齊之上玄酒在三酒之上尊尚其古故設尊在前冪人云疏布冪八尊禮器云犧尊疏布冪是疏布之尚也凡常所居下莞上簟祭天則蒲越稿鞂之尚是神明矣雕謂刻鏤言尋常車以丹漆雕飾之為沂鄂而祭天以素車之乘者尊其朴素貴其質而已矣此一句包上酒醴以下諸事言祭祀之時不重華飾惟貴質素而已以其交接神明不可同於尋常身所安褻之甚也尚質尚儉如是而後得交神明之義橫渠張氏曰明水飲之祖毛血食之祖所以反始也長樂陳氏曰禮之初有明水而已明水而後有玄酒玄酒而後有五齊五齊而後有三酒至於三酒則事神與人者備矣又有六飲所以純乎人而致養焉明水者隂鑑以取於月之水也玄酒者黑黍和于水之酒也考之此經則酒與醴固不同而玄酒明水亦異也合之以為一則非矣金華唐氏曰周禮有明水而無玄酒則明水即玄酒也司烜氏掌以夫燧取明火於日以鑒取明水於月以共祭之明齍明燭共明水大司寇奉其明水火皆言明水而不言玄酒則明水玄酒之非二物可知也郊特牲言酒醴之美玄酒明水之尚非以玄酒明水為二物也加於齊則謂之明水加於酒則謂之玄酒且玉藻曰凡尊必尚玄酒而不曰尚明水玄酒則明水之與玄酒決非二物嚴陵方氏曰夫味以淡為本感於鹹作於酸化於苦窮於甘變於辛玄酒明水則淡而無味故曰貴五味之本也黼作斧形其色則白與黑黻則兩已相弗其色則黑與青青與赤謂之文赤與白謂之章以天地之文作於東南成於西南故也繢則五采之所會繡則五采之所刺言文則章可知言繡則繢可知是皆色之美者也布之精者升多而密粗者升少而疏女功之作始於粗久而後至於精故揚雄曰霧縠之組麗女功之蠧矣以疏布之尚故曰反女功之始也明之也者謂其潔著之也若玄酒明水之類莫非明之也於蒲越稿鞂言之者以其無餘義故也味之貴者莫如淡大羮則以淡為質而已物之美者莫如玉大圭則以玉為質而已素車之乘即前所謂乘素車是也尊無非貴也朴無非質也故下總而言之則曰貴其質而已矣前曰不可同於所安樂之義此曰不可同於所安褻之甚樂猶有義焉褻則甚矣山隂陸氏曰貴其質也言貴不言美大羮玄酒可以言貴不可以言美尊其朴也變美言尊朴之名尊老子曰朴雖小天下不敢臣不言以直不可也據不可以同於所安樂之義也延平周氏曰安褻之甚不止於安樂之義故於先王之薦之類則言安樂之義於酒醴之美則言安褻之甚大圭不琢固已美矣故大羮則言貴其質大圭則言美其質質未至於朴故於素車則特言朴禮記集説卷六十六
