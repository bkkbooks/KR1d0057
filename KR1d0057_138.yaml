body:
  text: 禮記集説卷一百三十八宋衛湜撰子曰仁之為器重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎是故君子以義度人則難為人以人望人則能者可知己矣子曰中心安仁者天下一人而已矣大雅曰德輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之鄭氏曰取數多者言計天下之道仁居其多以義度人言以先王成法擬度人則難中也當以時人相比方耳輶輕也鮮罕也儀匹也圖謀也愛猶惜也言德之輕如毛耳人皆以為重罕能舉行之者作此詩者周宣王之大臣也言我之匹謀之仲山甫則能舉行之美之也惜乎時人無能助之者言賢者少孔氏曰引詩大雅蒸民之篇此詩美宣王之大臣仲山甫以明行仁者少也橫渠張氏曰仁道至不可盡但取分數多者為仁如九德德多者益賢又曰中心安仁者天下一人而已蓋責己一身當然爾藍田吕氏曰舉莫能勝行莫能致勉之者之為難也以義度人者盡義以度人者也以人望人者舉今之人相望也盡義以求人非聖人不足以當之故難為人舉今之人相望則大賢愈於小賢小賢愈於不賢故賢者可知己矣此亦以數而言仁也君子之自待必全盡而後已中心安仁者天下一人而已聖人之任也雖未至焉不敢不勉不以世莫之助而不為故曰惟仲山甫舉之又曰有己則喪其為仁矣天下非吾體忘已則反得吾仁天下為一人故克己復禮昔之所喪今復得之非天下歸仁者歟安仁者以天下為一人而已嚴陵方氏曰器若器用之器道若道路之道勝言勝其任致言致其至舉若手舉行若足行論語曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎其言正與此合儒行言溫良之本敬慎之地寬裕之作孫接之能禮節之節言談之文歌樂之和分散之施其用雖不同至於本乎仁則一也孟子言天子之保四海諸侯之保社稷大夫之保宗廟士庶人之保四體其位雖不同至於本乎仁亦一也孔子言郊社之於鬼神嘗禘之於昭穆饋奠之於死喪射鄉之於鄉黨食饗之於賔客其禮雖不同至於本乎仁亦一也茲非取數之多乎以其數之多此勉於仁者所以為難也上言以義則知下言以人者仁也下言以人則知上言以義者己也以己所能而度人則天下無全人故曰則難為人以仁之術而望人則不求備於人故曰則賢者可知所謂賢者賢於人也與某賢於某猶賢乎己之賢同則彼善於此而已若夫以義度人彼雖有善於此固不足以知之矣此言以人望人中庸言以人治人何也治人者存乎政望人者存乎心言雖不同所以為仁之術則一而已中心安仁即仁者安仁也與前所言義同馬氏曰子曰我欲仁斯仁至矣又曰有能一日用其力於仁矣乎我未見力不足者而云舉者莫能勝行者莫能致何也此言有抑揚之理也蓋仁之道自其本而言之仁在我也在我者易以勉自其仁之成名而言之唯中心安仁者能之則是勉於仁者蓋亦難矣石林葉氏曰修身以仁為守其譬則器也用為己任則器重行己以仁為達其譬則道也死而後已則其道逺雖重而莫能勝也亦曰德輶如毛鮮克舉之雖逺而莫能致也亦曰為仁由己而由人乎哉蓋人盡仁道則取數常多也勉於仁者為難亦非難也君子以其難故不以義度人以其不難故以人望人義則能斷斷以義則責人也詳人則中人而已矣以中人待天下則責人也略唯其詳略不同故賢者可知延平周氏曰己以義而度人則雖曰公也然天下之人才常患乎不足故曰難為人以中人而望人則雖曰恕也然天下之人有善有否者亦無以逃於我故曰賢者可知己矣中心安仁者由仁而行非行仁者也此天下所以一人而止四明沈氏曰聖人恐天下以仁為有限量故使之雖沒身不可已器雖重未有不可舉道雖逺未有不可致言重不言重多少言逺不言逺多少此正聖人不欲以仁之定體示人欲使人孜孜不已也若説仁之定體在是雖重雖逺未有不可舉而行者才到彼則執仁在是更不進步矣仁以為己任不亦重乎死而後已不亦逺乎此曽子之見爾故説仁有限量己字任字可見聖人見仁所以異於曽子金華應氏曰前言仁之重且逺而不可以全責故以人望人隨其力量所至又恐人自恕望望然以仁為不可企及故又總敘而勸勉之安仁者雖獨立無儔然德本甚輕人自鮮舉幸有能舉者當衆圖而共助仰髙勤行終其身而後已是其望於人者無已不容有自恕之心也山陰陸氏曰以義度人若春秋是已齊桓晉文皆罪人也以諸侯望之可謂賢矣故曰春秋無義戰彼善於此則有之新安朱氏曰儀度也言我於是而謀度其人舉之者惟仲山甫而已小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孳孳斃而后己子曰仁之難成久矣人人失其所好故仁者之過易辭也鄭氏曰仰髙勤行者仁之次也景明也有明行者謂古賢聖也中道而廢廢喻力極罷頓不能復行則止也俯焉勤勞之貌斃仆也易辭辭猶解説也仁者恭儉雖有過不為甚矣唯聖人無過孔氏曰引小雅車牽刺幽王之詩言修德如髙山則人瞻仰之有景明之行則人仰行之證古昔賢聖能行仁道後世瞻仰慕行是好愛仁德如此之甚也好仁之甚鄉仁道而行力罷極而始休廢於中道忘己身之衰老不覺知年數之不足猶行仁不止俯俯焉勤勞每日孳孳唯力之斃仆而後已也仁之難成久矣言仁道難成非始今日其來久矣人人謂天下衆人由仁道不成無所依恃氏人由此不得其志意之所好若仁道成人皆得所願也仁者有過易可以言辭解説以仁是善行也橫渠張氏曰不知年數之不足是夭壽不二也仁則不極其欲故為者難成仁所以難成止是恐各害其嗜好故惡聞義理如管仲之於齊桓公可謂不失其所好矣其終也幾不得保其首領又曰人人失其所好蓋人人有利欲之心與學正相背馳故學者莫善乎寡欲子曰棖也欲焉得剛藍田吕氏曰不以髙矣美矣為不可跂及而不勉故曰髙山仰止景行行止此所以不知年數之不足俯焉日孳孳斃而後已鄉道而行中道而廢謂力不足者非不為也力極罷頓不能復行則止也此皆自待全盡之謂也君子之待人以人望人而已心誠鄉仁人莫不取之又為之勸勉愧恥鑠之於外以移之此仁之所以不難成也仁者之心公衆人之心私公則所好者兼容博愛私則所好者克伐怨欲此人人失其所好者也心誠鄉仁雖有過差其情則善不待辭而辨矣故曰仁者之過易辭新安朱氏曰景行大道也行如字嚴陵方氏曰王氏謂髙山出雲雨故澤加於民民賴而仰之景行當於道故德加於民效而行之詩人思髙山之可仰景行之可行非好仁者疇或能之忘身之老者即所謂不知老之將至是也斃而後已者即所謂死而後已是也自人言之則好莫如仁人能好仁則得其所好矣以其反此而失其所好此仁所以難成歟苟仁矣雖有過易辭也況無過乎以仁者之過過於厚故也若周公使管叔監殷孔子謂哀公知禮非無過也然周公之過過於愛親孔子之過過於愛君為君親而有過此其所為易辭歟延平周氏曰仁人之所好常過乎忠厚而不仁者之所好常過乎刻薄故仁之所以難成也以天下皆失其所好也唯仁者之所好獨過乎忠厚故其過為易辭也馬氏曰山之髙不可不仰行之景不可不行小人之過也必文又從而為之辭唯仁者之過未嘗辭而云易之辭者蓋言其理也山陰陸氏曰若今汝畫是畫非廢也人人失其所好言人所好不在仁也仁之所以難成也廬陵胡氏曰以仁為難成而好之不篤故曰失其所好謂失其本心也仁人之過易辭者辭猶違也謂有不善則知避之臨卭魏氏曰是章自仁有數而下以文王有聲之亂為數世之仁以谷風之三為終身之仁於大雅取德輶如毛之詩於小雅取髙山仰止之詩而繼之以子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也嗚呼古之為詩者大抵若此春秋卿大夫之所賦答洙泗諸弟子之所講問子思孟軻之所諷道豈必盡同而亦未嘗相戾也二五之運窮古今越宇宙如一日雖千載殊時五方異感而其本則一故惟理明義精則聲入而心通氣感而機悟所謂興觀羣怨隨遇有發豈必言自己出自齊魯韓毛之説行而後之經生學士有耳目肺腸不能以自用棄其德性之知以奔走於故訓之末師傳未泯則猶有同異相較逮三家不傳而毛鄭孤立則耳目肺腸又一惟鄭之聽矣髙山仰止景行行止言既知髙之可仰又必行以至之騑騑雍雍蓋有見賢思齊不肯自己之意故太史公引此詩亦曰雖不能至然心鄉往之然則夫子至漢儒皆同此義也必惟毛鄭之聽以為疾褒姒而思賢女雖亦可通抑不亦甚固矣乎子曰恭近禮儉近仁信近情敬讓以行此雖有過其不甚矣夫恭寡過情可信儉易容也以此失之者不亦鮮乎詩云溫溫恭人惟德之基鄭氏曰不亦鮮乎言罕以此失之孔氏曰禮主於敬故恭近禮儉不費用無害於物故近仁言語信實故近情儉易容者儉則寡求故易容也所引詩大雅抑之篇結上文恭近禮也藍田吕氏曰恭儉信未足以為仁而仁者之資也恭則不侮得禮之意近乎禮矣儉則不奪得仁之意近乎仁矣言語必信存心正行近乎情矣三者之行不私於己又以敬讓行之鄉乎仁矣雖有過差其情則善故不甚矣蓋不侮人則人亦不侮其過寡矣近乎情則不志於欺斯可信矣不奪仁則知足斯易容矣如是而失之者鮮矣可與進於德矣故曰溫溫恭人惟德之基雖未成德斯德之基矣馬氏曰恭則不侮人不侮人者禮也而未盡禮之道故恭近禮儉則不奪人不奪人者仁也而未盡仁之道故儉近仁信則不欺於物不欺於物者情也而未盡情之道故近情情猶言實也中以恭儉信為守而行之以敬讓故此雖有過其不甚矣恭而不與物競故寡過物之所以不可信以其虛也有其實則可信儉則寡於欲而易以處故易容延平周氏曰情實也恭先之儉次之而信終之者恭儉待信而後成也以情間於恭儉者恭儉以信為主山陰陸氏曰恭不近禮則足儉不近仁則鄙信不近情則偽情可信若柯之盟伐原徙木之信豈可信也哉以此失之如此猶不能無失也講義曰夫不侮人以為恭不奪人以為儉不欺人以為信皆行之美者也然猶不自以為美而敬以行之不敢怠惰遜以行之不敢陵暴宜其可立於無過之地矣然有時而未免於過者或過於恭而有巽在牀下之譏或過於儉而有儉不中禮之制或過於信而無信近於義之美雖曰有過必不為己甚者其視夫驕矜奢侈言詐之徒則有間矣考之於易曰行過乎恭用過乎儉所以著於小過議獄緩死所以著於中孚説者以為信發於中雖過可亮者歟嚴陵方氏曰夫得則為當失則為過過之不甚由其失之鮮而已故始言過而終又言失焉子曰仁之難成久矣唯君子能之是故君子不以其所能者病人不以人之所不能者愧人是故聖人之制行也不制以己使民有所勸勉愧恥以行其言禮以節之信以結之容貌以文之衣服以移之朋友以極之欲民之有一也小雅曰不愧于人不畏于天鄭氏曰惟君子能之言能成人道者少也病人愧人謂罪咎之聖人之制行以中人為制則賢者勸勉不及者愧恥其言乃行也移猶廣大也極致也一謂專心於善不愧於人不畏於天言人有所行當慙怖於天人也孔氏曰君子不以己之所能使他人必能若他人不能則為困病若人力所不能必欲使之能行人不能則以為愧恥故不以人所不能困人亦仁者之行也朋友以極之謂相勉勵以極致於道也自禮以節之以下所以欲民之專心一意於善道也引小雅何人斯蘇公刺暴公之詩藍田吕氏曰人失其所好此人所以難成君子責人以恕而成人有道則仁不難成矣故曰唯君子能之君子固賢於衆人矣君子之所能衆人必有不能者矣使衆人效己之所能則病矣使衆人自彰其不能則愧矣故聖人制行以立教必與天下共之以天下之所能行者為之法所以為達道也曽子執親之喪水漿不入口者七日此曽子之所能也水漿不入口者三日此衆人之所能也故喪以三日為節則不取乎七日此所謂不制以己也唯不制乎已故民知跂乎此而有所勸勉知不及乎此而有所愧恥則於此人也知所尚矣非特此也凡可以外鑠者無不用也制禮以節其行而使之齊立信以結其志而使之固其容貌必稱其志其衣服必稱其容衣服如是之備則容貌必移而稱其衣容貌如是之文中心必有其實朋友者切磋相成至於極而後已則一道德以同俗矣蓋修其外則知愧于人修其內則知畏于天故曰不愧于人不畏于天嚴陵方氏曰上言不以人之所不能者愧人此又曰使民有所愧恥以行其言蓋人之所不能者非中道故也文之則以飾其質移之則以改其容極之則以致於道馬氏曰仁所以難成者以人人失其所好唯君子先得我心之所同而不失其所好君子獨得我心之所同則至於難繼故君子己雖能不以己之能者病人人雖不能不以人之所不能者愧人故制行不以己民之賢者有所勸勉不肖者有所愧恥以行其言言從而行之此行不違言之意也自禮以節之至欲民之有一者此言聖人制行不以己之法也夫不足則儉有餘則侈人之常情也故有禮以節之僨驕而不可繫者其唯人心乎故有由中之信以結之此所以正於內又不可不文於外故容貌以文之衣服以移之然外不可以不資之以友故朋友以極之自天子以至於庶人未有不須友而成也聖人之教人俯仰之間無所愧怍故引詩之辭以況之詩之意非如此蓋説詩者不以辭害意山陰陸氏曰病人不能愧人能之人則能之而己不能雖愧於人可也勸勉愧恥以行其言者孔子曰古者言之不出恥躬之不逮也衣服以移之者孔子曰衰麻苴杖者志不存乎樂非耳弗聞服使然也黼黻衮冕者容不褻慢非性矜莊服使然也是之謂移若夫極之之道則是在朋友故曰責善朋友之道也道而弗牽開而弗逹師之事也石林葉氏曰君子不以所能病於人不以所不能愧人要之成人道而已故易知周乎萬物而道濟乎天下知周乎萬物者極髙明也道濟乎天下者道中庸也極髙明則己之所能人有所不能道中庸則能者知所勸勉不能者知所愧恥此人道所以成也然非禮則中庸無以立非信則言有時而窮故禮以節之信以結之然後人知恥有其德而無其辭恥有其辭而無其德正德以禮而人無怪行矣修辭以信而人無異言矣然而容貌不飾則行或至於怪衣服不禁則言或至於異故容貌以文之衣服以移之而後人恥有其容而無其辭恥有其服而無其容此民所以不二其行而道德所以一也人未有不須友以成故以處其終禮者君子小人所共由故以處其始子思言中庸而繼之以崇禮周官本俗安萬民而繼之以聨朋友亦此意也延平周氏曰君子不以一己之所能而使天下之人以其難及為病亦不以衆人之所不能而使天下之人以其難及為愧是以立乎中道而使能者皆得以從之禮以節之所以一其情信以結之所以一其心容貌以文之所以一其體衣服以移之所以一其俗朋友以極之所以一其道橫渠張氏曰制行以己非所以同乎仁講義曰惻隱之心人皆有之然而仁之難成久矣者何也知者過之愚者不及而仁之道所以不行賢者過之不肖者不及而仁之道所以不明如是則仁之難成非但今也唯君子能之者蓋一出於中而已一出於中則己能者不責人以其所難而使之病人所不能者不強人以其所短而使之愧此君子之中庸推而上之聖人應世立教何以異此是以其制行也必以中道與衆共由使人有所勸勉則欲罷不能者有矣有所愧恥則恥不若人者有矣書曰不協于極不罹于咎皇則受之所以時人斯其惟皇之極也先王盛時人心既定而谷風俗薄之變不作則所以一民者蓋著矣後世用民不一鳲鳩所以刺時民德歸一都人士所以思古金華應氏曰仁道深逺無窮而人之氣稟薄弱有限苦其難而茫無所尚則懈矣是五者輔導而夾持之則趨嚮歸一而善心純固縱其有所懈怠自無愧畏而欲為惡獨不愧于人而畏于天乎言天人之理昭布森列甚可愧而畏也是故君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之德是故君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其德恥有其德而無其行是故君子衰絰則有哀色端冕則有敬色甲胄則有不可辱之色詩云惟鵜在梁不濡其翼彼記之子不稱其服鄭氏曰遂其辭遂猶成也無其行謂不行其德鵜鵜胡汚澤也汚澤善居泥水中在魚梁以不濡汚其翼為才如君子以稱服為德孔氏曰實猶充也所引詩曹風候人刺曹共公也言君子內外皆須相稱彼記記語辭也藍田吕氏曰此皆修其外以移其內率法而強之者也及其成也知畏於天則與中心憯怛者一也鵜胡善居汚澤之中捕魚以為食者也不濡其翼則不得食梁者魚梁也人之所以捕魚者也鵜之求食不之澤而之梁無濡翼之勞坐得其食如人之無德無功而受顯服者也故服之不稱其德異乎鵜者未之有也延平周氏曰服其服而能文以君子之容者然後可以服先王之法服有其容而又文以君子之辭者然後可以守先王之法言遂其辭而能實以君子之德者然後可以行先王之德行衰絰有哀色端冕有敬色甲胄有不可辱之色君子不失色於人如此嚴陵方氏曰無其容則不足以稱其服無其辭則不足以道其容無其德則不足以副其辭無其行則不足以成其德此四者皆君子之所恥也易曰君子以成德為行日可見之行也則德成乎行可知衰者齊衰斬衰絰者首絰腰絰是皆喪服也端者玄端之類冕者衮冕之類皆祭服也甲以被體胄以加首皆兵服也馬氏曰上言衣服以移之故君子服其服則文以君子之容蓋人之所以為人在於正容體齊顔色順辭令服備然後可以責此故君子服其服則文以君子之容有其容則文以君子之辭蓋有德者必有言有言者未必有其德故遂其辭又實以君子之德詩曰抑抑威儀惟德之隅傳曰德行忠信裏也威儀文辭表也君子之於表裏唯其稱而已矣石林葉氏曰君子之於喪無不哀非特衰絰而後有哀色於事無不敬非特端冕而後有敬色於身未嘗可辱非特甲胄而後有不可辱之色其所以制為之服者道中庸也故自服其服而下皆稱君子然則禮以節之信以結之容貌以文之皆中庸之事而衣服乃為之始終何也蓋道德之所以一者未嘗不在於衣服王制禁異服周官同衣服皆在於此故以成始亦以成終也子言之君子之所謂義者貴賤皆有事於天下天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子鄭氏曰言無事而居位食祿是不義而富且貴孔氏曰自此至便人一節明天子以下各有其事又明舜禹文王周公之德皆能上事天帝下庇四方天子事上帝諸侯事天子是貴賤皆有事於天下案小宰注云天地大神至尊不祼此祭上帝有秬鬯者凡鬯有二若和之以鬱謂之鬱鬯鬱人所掌是也祭宗廟則用以灌也若不和鬱謂之秬鬯鬯人所掌是也謂五齊之酒以秬黍為之以芬芳調暢故言秬鬯得以事上帝金華應氏曰義者截然正方而無偏私唯知賤之事貴而不知貴之率賤豈所謂潔矩之道乎故天子竭力致敬以尊乎上帝則諸侯亦服勤以輔事乎天子長樂劉氏曰下之事上賤之事貴當有實行乃稱其宜故曰君子之所謂義者貴賤皆有事於天下謂有實功實德以極天下之宜以盡生民之性乃謂之義非徒然也馬氏曰君子之所謂義者事之制而制之得其宜之謂也有宜於貴必有宜於賤故古之人所惡於上無以使下所惡於下無以事上凡以此也天子使諸侯勤以輔上在我必先自盡然後可以責此故天子親耕粢盛秬鬯以事上帝夫以天子之尊非不足於耕也蓋身致其誠信而示其嚴上之禮也故諸侯以輔事天子亦有嚴上之禮也延平周氏曰禮有經則貴賤莫得同義有權則時或同之此天子所以有親耕也以天子而親耕則天下之民莫不樂於耕而不自知也及用其親耕之粢盛秬鬯以事於上帝則天下之諸侯莫不輔事於上而不自知也講義曰以義制事楊子曰事得其宜之謂義凡言義者未有不見之於事凡言事者未有不歸之於義是以貴賤皆有事於天下乃君子之所謂義也以君臣之義言之天子親耕藉田為粢盛以充簠簋為秬鬯以實尊彞周禮言凡祀大神則大宗伯奉王齍涖玉鬯則天子之事上帝固有粢盛秬鬯矣天子之所以自致者如此為諸侯者所以竭勤勞駿奔走患則扞之愾則敵之朝夕圖事宗以陳謨覲以比功遇以協慮制度衣服不敢不正山川神祇不敢不舉宗廟不敢不順禮樂不敢不從其摯有等其貢有常此諸侯勤以輔事天子之實也然則天子所以事上帝即諸侯所以事天子其義一也嚴陵方氏曰司尊彞言大旅存之而已則不祼可知若王制詩書所言秬鬯則亦鬱鬯而已蓋鬱亦以秬為本每言圭瓉以此山陰陸氏曰天地大神不祼此言秬鬯者是陳之而已蓋禮之敬文也其他祭祀蓋亦如此藍田吕氏曰自此至自謂便人一章言君子之義以仁禮事上以仁禮使下事上者不可以不事事使下者不可以不自治故貴賤皆有事於天下親耕粢盛秬鬯以事上帝雖天子必有事焉況於諸侯乎所謂義者不可以不事事故也名之浮於行則失實失實者身且不信何以使民故先王制行以諡死尊死者之名而易之雖身兼數善猶取一善而名之如文王非無武武王非無文止取其一以為諡唯恐名浮於行以欺於民此使下不可以不自治者也仁者忘己以與天下共者也其事上也雖有庇民之大德不敢有君民之心故不自尚其事不自尊其身小心而畏義求以事君而已此忘己而事上者也其使下也雖有庇民之大德亦不敢以君道自有故不自大其事不自尚其功以求下賢而已此忘己而使下者也有大德者易於忘己而使下難於忘己而事上非舜禹文王周公不足以當之故曰仁之厚也役用也恭者不侮儉者不奪忘己而與天下共者也推是心也求以用仁其近之矣信者不欺讓者不爭篤實而卑遜非先王之德行而不行也推是心也求以用禮其無過矣君子之事上也以仁與禮其使下也亦以仁與禮而已不自尚其事不自尊其身儉於位而寡於欲者儉也有信存焉讓於賢卑已而尊人小心而畏義求以事君者讓也有恭存焉故以仁禮事其上者主於儉與讓而信恭存焉不自大其事不自尚其功以求處情者信也有儉存焉過行弗率以求處厚彰人之善而美人之功以求下賢者恭也有讓存焉故以仁禮使其下者主於信與恭而儉讓存焉故恭儉以求役人信讓以求役禮交相為用而不可亂也以此事上受天之命矣以此使下民之攸歸矣天命難諶者也得不得猶不敢知而聽之又不敢以事而易其志則又仁之厚矣民情易見者也民所以敬尊於我有可致之道故也此使下之報所以異於事上之報天人之勢不同也以仁禮事上莫如舜禹文王周公以仁禮使下莫如后稷舜之事堯禹之事舜皆將以天下而授之而舜慎徽五典納于百揆賔于四門納于大麓禹思日孜孜啓􅈱􅈱豫弗子惟荒度土功皆虔修臣職不敢懈也文王三分天下有其二猶服事殷周公攝政七年而復子明辟四聖人者皆有君民之大德有事君之小心得乎仁禮之至者也小心柔道也以柔道事上鮮不獲福猶葛藟之施於條枚以柔而附上上無有不受也后稷之教民稼穡無此疆爾界天下之利萬世之功也其為烈也非一手一足之所能及也然猶不自以為功自謂便習是事之人而已利及天下後世仁也唯欲行之浮於名禮也與夫有君民之大德有事君之小心者易地皆然此使下得乎仁禮之至者也子曰下之事上也雖有庇民之大德不敢有君民之心仁之厚也是故君子恭儉以求役仁信讓以求役禮不自尚其事不自尊其身儉於位而寡於欲讓於賢卑已而尊人小心而畏義求以事君得之自是不得自是以聽天命詩曰莫莫葛藟施于條枚豈弟君子求福不回其舜禹文王周公之謂與有君民之大德有事君之小心詩云惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國鄭氏曰庇覆也無君民之心是思不出其位役之言為也求以事君者欲成其忠臣之名也得之自是不得自是言不易道徼祿利也豈樂也弟易也言樂易之君子其求福修德以俟之不為回邪之行以要之如葛藟之延蔓於條枚是其性也昭明也上帝天也聿述也懷至也言述行上帝之德以至於多福也方四方也受四方之國謂王天下孔氏曰君子既有庇民之大德不敢有君民之心是其心仁厚故恭敬節儉以求為仁信實退讓以求為禮不問利祿得之與失恆行其是不茍易其道也莫莫葛藟此大雅旱麓美文王之詩舜禹文王周公有君民之大德有事君之小心常能畏懼是不回也又引大雅大明美文王周公之詩證上求福不回也馬氏曰此經言下事上之義雖有庇民之大德以其有君人之道不敢有君民之心以其處事人之任而其理固當如此自非仁厚不足以及此自君子恭儉以求役仁至求以事君此命之在我也命之在我故君子求之至於不獲乎上命之在外者也命之在外故君子聽之而已得之亦由道不得亦由道故曰以聽天命講義曰聖人之應世有能為天下之德而無欲為天下之心有能為天下之德此其在人者不敢不勉無欲為天下之心此其在天者不敢不聽德有以庇民則愛人而思以被其澤兼愛之道也心不敢以君民則愛己而思以全其身自愛之道也非仁之厚者其孰能與於此恭則不侮仁於愛身儉則不奪仁於愛物二者之於仁有其質矣乃可以求從事於仁故曰以求役仁信則不疑於禮可以學讓則不爭於禮為之端二者之於禮有其質矣乃可以求從事於禮故曰以求役禮延平周氏曰恭儉者依於仁者也信讓者履於禮者也方其以恭儉而依於仁則未能役仁乃求役於仁者也方其以信讓而履於禮則未能役禮乃求役於禮者也然求之有道得之有命而君子果以求之為可必耶君子之於外物也未嘗以其有命而廢吾之所謂道者也君子之於君也以不求求之故不自尚其事不自尊其身之類但行之於己施之於人則雖曰不求於事君而乃所以求事君者也故曰得之自是不得自是以聽天命嚴陵方氏曰仁不止於恭儉恭儉可以為仁之用而已禮不止於信讓信讓可以為禮之用而已故每以役言之也求役者求為仁禮之義也事雖可尚但為人所尚而已未嘗自尚之也身雖可尊但為人所尊而已未嘗自尊之也儉於位則非貪夫位也寡於欲則非慕夫祿也讓於賢則非爭其名也卑己故能尊人小心故能畏義君子之能此者豈他求哉求以事君而己以是事君而得君者義也以是事君而不得君者則有命存焉古之人有行之者舜禹文王周公而已蓋舜之事堯禹之事舜文王之事紂周公之事成王有君民之大德又有事君之小心故也前曰庇民者止足以覆物君民者又足以命物若舜禹之受禪文王之受命周公之攝政皆君民之事也雖然豈嘗有是心哉山陰陸氏曰役講如行役之役儉於位而寡於欲羔羊所謂在位皆節儉正直者也孔子曰管氏有三歸官事不攝焉得儉失是矣石林葉氏曰仁過乎恭用過乎儉非以求仁求所以役仁者也故不自尚其事儉於事而寡於欲皆役仁之事也信為之本讓為之末不足以盡禮求所以役禮者也故不自尊其身讓於賢卑己以尊人皆役禮之事也仁以自愛禮以自敬而事君有義而已矣故小心而畏義求以事君所以知人得之不得自是以聽天命所以知天古之聖人未有不由此而得譽於天下而獨言舜禹文王周公者蓋為臣有事君之小心而天子又薦之於天唯舜禹為有命為臣而有君民之大德天子不薦之於天唯文王周公為有義豈弟君子民之父母求福不回義也厥德不回以受方國命也若湯武則反其常分亦義之變所以不及言也藍田吕氏曰説見前子曰先王諡以尊名節以一惠恥名之浮於行也是故君子不自大其事不自尚其功以求處情過行弗率以求處厚彰人之善而美人之功以求下賢是故君子雖自卑而民敬尊之鄭氏曰諡者行之迹也名者謂聲譽也言先王論行以為諡以尊名者使聲譽可得而尊信也一讀為一惠猶善也言聲譽雖有衆多者節以其行一大善者為諡耳在上曰浮君子勤行成功聲譽踰行是所恥也率循也過行不復循行猶不二過也自卑而民敬尊之言謙者所以成行立德也孔氏曰此又廣明君子名行相副卑己尊人之義諡謂諡號列生時之行迹作諡以尊敬生前之聲名傳於後世也大謂誇大既不欲行過於名故不自誇大其所為之事不自加尚其所為之功名所以求處情實不欲虛為矯飾也橫渠張氏曰節以一惠惠字必是古德字嚴陵方氏曰生則有名死則有諡有諡則諱其名矣故曰諡以尊名檀弓言公叔文子之子請諡而曰請所以易其名者蓋謂是矣諡以誄行而為之然行不一也諡有所不勝言特以所隆者之一端而為之節爾故曰節以一惠若文王之為文武王之為武此皆一惠之道也行雖多而節之以惠則民不浮於行矣孟子曰聲聞過情君子恥之自大自尚者近於偽故不自大其事不自尚其功以求處情人之過也多過於薄又況過而不改者乎故過行弗率以求處厚蔽人之善害人之功是妬賢而已故彰人之善美人之功以求下賢凡此皆自卑之道也揚子曰自下者人髙之易曰卑而不可踰故曰君子雖自卑而民敬尊之山陰陸氏曰有惠而無節以一之則臣得以惠其上子得以惠其親孟子曰名之曰幽厲雖孝子慈孫百世不能改也如貞惠文子諡至於三亦非所謂節以一惠者也故後不言貞惠者文足以兼之石林葉氏曰諡者行之迹迹其行以分善惡則小大曲直無不盡故曰諡以尊名節以一惠蓋上之惠賜既已均一而節則善惡可以諡見名亦不浮於行者也君子臨事而懼則無自大成功不居則無自尚所以篤其情而已矣故曰以求處情用過乎儉喪過乎哀非以率人亦躬自厚而已矣故曰以求處厚善在內則彰之功在外則美之以卑己尊人而已矣故曰求以下賢馬氏曰自大其事適所以小也自尚其功適所以卑也處情者居其實而不居其華也此皆求以處情而已藍田吕氏説見前子曰后稷天下之為烈也豈一手一足哉唯欲行之浮於名也故自謂便人鄭氏曰烈業也言后稷造稼穡天下世以為業豈一手一足喻用之者多無數也自謂便人言其謙也辟仁聖之名云自便習於此事之人耳孔氏曰以上言君子恥名浮於行故此明后稷以證之自謂便於稼穡之人欲實行過於虛名也藍田吕氏説見前馬氏曰名浮於行君子所恥此皆求以處情而已講義曰黎民阻飢后稷播時百榖見於舜典蒸民乃粒萬邦作乂見於益稷稷降播種農殖嘉榖見於吕刑風化之所由王業之艱難見於七月荏菽斾斾禾役穟穟見於生民立我蒸民莫匪爾極見於思文則后稷教民稼穡有充滿四海之德使天下不復有告飢之患則其為功所謂天下之烈也禮記集説卷一百三十八
