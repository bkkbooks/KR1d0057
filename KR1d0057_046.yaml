body:
  text: 禮記集說卷四十六宋衛湜撰是月也命奄尹申宫令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習毋有不禁鄭氏曰奄尹主領奄豎之官也於周則為內宰掌治王之內政宫令譏出入及開閉之屬重閉外內閉也省婦事所以靜隂類也淫謂女功奢僞貴戚謂姑姊妹之屬近習天子所親幸者孔氏曰尹正也申重也申重其政令常察門閭之事謹慎房室之處其門閭房室皆有外內門户必重疊閉之此月隂氣既靜故減省婦人之事順隂類也務在質素毋得過為淫巧嚴陵方氏曰周官酒人漿人之類皆有奄鄭氏謂精氣閉藏者是也奄尹則衆奄之正也宫中之令國有常典以閉藏之月故申之於門閭曰審於房室曰謹互言之爾必重閉則所以審而謹之也重閉猶易所謂重門之重省與季春省婦使之省異彼所謂省減省之也此所謂省察之而已蓋婦以化治絲枲為事巧過則淫淫則僞飾生焉故命禁之也雖有貴戚近習毋有不禁則疏賤者從可知矣近習謂天子親昵習熟之人凡此皆宫中之令也馬氏曰貴戚易奢近習易驕欲法之行自貴近始故雖有貴戚近習毋有不禁山隂陸氏曰奄精氣閉藏言於此為冝乃命大酋秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸鄭氏曰酒孰曰酋大酋者酒官之長也於周則為酒人秫稻必齊謂孰成也湛漬也熾炊也火齊腥孰之調也物猶事也差貸謂失誤有善有惡也古者穫稻而漬米麴至春而為酒詩云十月穫稻為此春酒以介眉夀孔氏曰周禮酒正引此大酋為酒正此曰酒人者以酒正掌酒之政令及酒出入之事不親監作此大酋監作故為酒人以酒人監作酒故也是月始為春酒先須治擇秫稻使齊得成熟故云必齊又須以時料理麴糱故云必時其炊漬米麴之時必須清潔所用水泉必須香美所盛陶器必須良善其炊米和酒之時所用火齊又須生熟得中六物者秫稻一麴糱二湛熾三水泉四陶器五火齊六也用此六事作酒大酋監督之無使有參差貸變使酒誤其善惡也此十月穫稻於此月漬米麴至春而為酒者謂春成也非春始釀嚴陵方氏曰多少不可過故曰必齊然作酒之材不止於此舉二種以該之爾水泉必香則醖釀無穢汚之臭陶器必良則盛貯無罅漏之弊火齊必得則蒸煮無生熟之失六物闕一不得故曰兼用周官酒正以式法授酒材不過如是而已大酋監之毋有差貸則以有法式故也夫酒所以養陽也作之於陽生之月蓋亦冝矣馬氏曰六物欲其材之美時之適工之善也天子命有司祈祀四海大川名源淵澤井泉鄭氏曰順其德盛之時祭之也嚴陵方氏曰大川名源與王制言名山大澤同義凡此皆水神也馬氏曰盛德在水故應是而祈焉以為民致福也講義曰四海者衆水之所聚大川名源者若江淮河濟之類是也江之源出於岷山河之源出於崑崙淮之源自桐柏濟之源自沇水故謂之名源也淵澤者水之所鍾而息者也井泉者汲取之無窮者也仲冬之月水歸於澤而復其本源矣故命有司祈祀之金華應氏曰夏祈山川百源火勝水弱遵其流委而廣其潤澤也冬祀四海山川淵澤井泉盛德在水鍾其淵源厚其渟蓄也三王之祭川皆先河而後海以海為委而河為源也水重冬祀亦豈非源乎是月也農有不收藏積聚者馬牛畜獸有放佚者取之不詰鄭氏曰此收斂尤急之時人有取者不罪所以警懼其主也王居明堂禮曰孟冬之月命農畢積聚繫收牛馬嚴陵方氏曰孟冬既命百官謹蓋藏又命司徒循行積聚矣至於是月農猶有不收藏積聚馬牛畜獸猶有放佚者則是惰逰之民而不聽令者也人或取其物而上不為之詰焉亦冝矣山隂陸氏曰異言牛馬貴於畜獸言馬在上亦以此故國君下齊牛式路馬山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦鄭氏曰務收斂野物也大澤曰藪草木之實為蔬食孔氏曰鄭注周禮云水鍾曰澤水希曰藪今言大澤曰藪者以有水處謂之澤旁無水處謂之藪爾雅云𬞞不熟為饉𬞞謂菜𬞞以其粗疏經言𬞞食故謂草木實也山林𬞞食榛栗之屬藪澤𬞞食菱芡之屬嚴陵方氏曰𬞞亦菜也於農隙之時而能取野物以資人用固冝教道之而無遏其所欲也不能如上所為而乃侵彼之分以廣此奪人所有以豫己則是彊暴之徒爾罪之不赦豈為過哉是月也日短至隂陽爭諸生蕩君子齊戒處必掩身身欲寧去聲色禁耆欲安形性事欲靜以待隂陽之所定鄭氏曰爭者隂方盛陽欲起也蕩謂物動萌芽也寧安也聲謂樂也易及樂春秋說云冬至人主與羣臣從八能之士作樂五日此言去聲色又相違嚴陵方氏曰日短至隂陽爭己見仲夏日長至解諸生諸言不一也諸生則萬物之生氣也方冬之時盛德在水而是月建子以陽作之萬物之生氣欲發焉故謂之蕩掩蔽其身以處於內則以齊戒故也身欲寧者所以掩身欲其寧故也去聲色則不特止而已禁耆欲則不特節而己見君子之齊戒則加而無己也外則養其形而無勞內則養其性而無悖欲安形性故事欲靜也凡此以微陽方生隂未退聽隂陽爭而未定故君子齊戒以待之與仲夏所言互相備也馬氏曰隂陽爭則陽伏而隂尚自若也故爭凡物之有所爭者外未定故也方二分之月春為陽日中秋為隂宵中既有分矣故於仲春仲秋日夜分至於二至之月則夏為正陽而隂始間之冬為正隂而陽始間之方盛者方衰方微者方長有爭之道焉於冬至曰諸生蕩言陽之來足以勝隂於夏至曰死生分言隂之來不過與陽為敵而已山隂陸氏曰上云隂陽爭死生分此言隂陽爭諸生蕩相備也相備而言死生分於夏言諸生蕩於冬亦言之法毋躁禁詞也於隂言如此亦言之法冬言以待夏言以定待始事也定終事也新安王氏曰十一月一陽來復復反也隂方極盛陽欲反為隂拒之是以有爭爭者言其將復也復卦上坤下震五隂在外一陽在內在內者為主在外者從而順之定而無爭言其已復也君子知隂陽爭則草木之歸根者昆蟲之蟄藏者且將搖蕩蓋枯者欲萌蟄者欲出不可無以養其微陽况於身心豈得不靜以處之齊戒以靜其心掩藏以靜其身外去聲色內去耆欲以安形性則身靜心亦靜矣貴靜者隂陽方爭當靜以待其爭之定定則陽反而隂順靜在一己可以養其身心逹之天下以遂萬物之情不韋雖非賢者此說不可廢也藝始生荔挺出蚯蚓結麈角解水泉動鄭氏曰又記時候也藝香草也荔挺馬䪥也水泉動潤上行孔氏曰結猶屈也蚯蚓在穴屈首下嚮陽氣動則宛而上首故結而屈也麋為隂獸情淫而遊澤冬至解角從隂退之象鹿為陽獸情淫而遊山夏至角解從陽退之象說者多家皆無明據故略論焉若節氣早則麋角十一月解故夏小正云十二月麋角隕墜是也若節氣晚則十二月麋角解故小正云十二月隕麋角按熊氏曰藝荔挺俱香草故應陽氣而出也鹿是山獸故夏至得隂氣而解角麋是澤獸故冬至得陽氣而解角嚴陵方氏曰藝香草也以水泉動而生則水屬也荔挺出皇氏亦以為香草荔言氣之和協挺言氣之直達凡物之氣感隂者腥感陽者香陽方長矣故藝始生荔挺出蚯蚓結者以感正陽之氣而後出故微陽雖生而猶結焉結言形之未解也麋角解見仲夏是月也隂極於此而終故前言冰益壯陽生於此而始故言水泉動壯其形然動其氣然也山隂陸氏曰麋隂獸也角始生向後護耳補筋與骨應陽而墮日短至則伐木取竹箭鄭氏曰此其堅成之極時嚴陵方氏曰萬物之材隂盛則堅陽盛則柔隂盛極於此故伐取之木大竹小故云伐木取竹箭馬氏曰萬物之材敷榮則柔收斂則堅於是時可以代木取竹箭是月也可以罷官之無事去器之無用者鄭氏曰謂先時權所建作者也天地閉藏而萬物休可以去之嚴陵方氏曰設官之實所以待事也無事之官特曠官爾制器之實所以待用也無用之器特虛器爾夫陽為實隂為虛是月隂消而陽長故於其虛者罷而去之所以應天地之實也塗闕廷門閭築囹圄此以助天地之閉藏也鄭氏曰順時氣也嚴陵方氏曰闕者人所由以出入廷者人所處以聽事塗謂塗之以土也築則不止於繕矣與築城郭之築同義故孟秋止言繕囹圄而已仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘鄭氏曰國旱午之氣乘之也氛霧霜露之氣散相亂也雷發聲震氣動也午屬震天時雨汁瓜瓠不成酉之氣乘之也酉宿值昴畢畢好雨雨汁者水雪雜下也子宿值虛危虛危內有瓜瓠兵亦金之氣也蝗蟲為敗當蟄者出卯之氣乘之也水泉咸竭大火為旱也疥癘之病孚甲之象也孔氏曰其國乃旱氛霧冥冥雷乃發聲皆天災也天時雨汁天災也瓜瓠不成地災也國有大兵人災也案天文志瓜瓠四星在危東蝗蟲為敗水泉咸竭地災也民多疥癘人災也嚴陵方氏曰氛霧皆旱氣所使雷乃發聲盛陽薄之故也以雪雜水如物之有汁故謂之兩汁以行秋令嚴凝之氣未固故也瓜瓠不成則以柔脆為金氣所傷故也國有大兵則與小兵時起同義然氣有淺深故於孟冬言小仲冬言大焉蝗蟲為敗與孟夏言蝗蟲為災同義災者祥之對而以氣之兆言之敗者成之對而以事之迹言之夏為陽故言其氣冬為隂故言其事亦各以其類也水泉咸竭則以感發散之氣故也疥癘則虛陽作之故也季冬之月日在婺女昏婁中旦氐中鄭氏曰季冬者日月㑹於𤣥枵而斗建丑之辰也孔氏曰案律厯志季冬初日在婺女八度三統厯小寒日在婺女八度昏婁十一度中去日八十四度旦氐十二度中大寒日在危初度昏昴二度中去日八十度旦心五度中元嘉歷日在牛三度昏奎十五度中晝漏四十五刻六分旦亢九度中大寒日在女十度昏胃四度中晝漏四十六刻七分旦氐十三度中其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中大吕鄭氏曰大吕者蕤賔之所生也三分益一律長八寸二百四十三分寸之百四季冬氣至則大吕之律應周語曰大吕助陽宣物孔氏曰蕤賔長六寸八十一分寸之二十六上生大吕三分益一三寸益一寸六寸益二寸故為八寸其八十一分寸之二十六各三分之則為七十八分三分益一更益一箇二十六則為一百四故云律長八寸二百四十三分寸之一百四也諸家說見孟春其數六其味鹹其臭朽其祀行祭先腎鴈北鄉鵲始巢雉雊雞乳鄭氏曰鴈北鄉以下皆記時候也雊雉鳴也詩云雉之朝雊尚求其䧳孔氏曰鴈北鄉此據早者若晚者易說云二月驚蟄候鴈北鄉鵲始巢此據晚者若早者詩緯推度災云復之日鵲始巢雉雊雞乳易通卦驗在立春節立春或在此月也嚴陵方氏曰鴈北鄉已見孟春鴻鴈來解黑白錯者鵲也然巢知避嵗所在於是來嵗之氣兆矣故始巢雉雊已見倉庚鳴解乳則孚乳之謂也馬氏曰鴈北鄉則順陽而復也雉火畜也感於陽而後有聲雞木畜也麗於陽而後有形山隂陸氏曰夏小正曰鄉者何也鄉其居也天子居𤣥堂右個乘𤣥路駕鐡驪載𤣥旗衣黑衣服𤣥玉食黍與彘其器閎以奄鄭氏曰𤣥堂右個北堂東偏命有司大難旁磔出土牛以送寒氣鄭氏曰此難難隂氣也難隂始於此者隂氣右行此月之中日歷虛危虛危有墳墓四司之氣為厲鬼將隨強隂出害人也旁磔於四方之門磔攘也出猶作也作土牛者丑為牛牛可牽止也送猶畢也孔氏曰言大者以季春唯國家之難仲秋唯天子之難此則下及庶人故云大難旁磔者旁謂四方之門皆披磔其牲以禳除隂氣出土牛者此時強隂既盛年嵗已終隂若不去凶邪恐來嵗為人害其時月建丑又土能克水持水之隂氣故特作土牛以畢送寒氣也鄭注此月之中謂此月之內也石氏星經云司命二星在虛北司祿二星在司命北司危二星在司祿北司中二星在司危北史遷云四司鬼官之長又云墳四星在危東南是危虛有墳墓四司之氣也此時寒實未畢而注云畢者意欲其畢爾馬氏曰時難皆以難隂慝而除之也於季春之畢春氣仲秋之達秋氣則曰難而已至季冬之送寒氣則稱大難者隂慝之盛未有甚於此時故也以大難故旁磔旁磔則所磔非一方不特九門而已嚴陵方氏曰難已見仲春解牛土畜也又以土為之則以方水用事之極欲勝水者必以土故出是以送寒氣也迎為入送為出送寒氣故以出言山隂陸氏曰言旁磔則於九門可知土所以勝水牛所以勝豕其謂之大難言有司嫌小也長樂陳氏曰土勝水牛善耕勝水故可以勝寒氣善耕故可以示農耕之早晚月令季冬之月大難旁磔然後出土牛則出土牛驅除之終事也既乃告民出五種命農計耦耕事則出土牛又農耕之始事也後世土牛之法以嵗之幹色為首甲至癸為十幹甲乙木其色青丙丁火其色赤戊巳土其色黃庚辛金其色白壬癸水其色黑支色為身子至亥為十二支寅卯木其色青己午火其色赤申酉金其色白亥子水其色黑辰戍丑未土其色黃納音色為腹若甲子乙丑金其色白丙寅丁卯火其色赤他皆倣此以立春日幹色為角耳尾支色為脛納音色為蹄設令甲子嵗甲為幹其色青則青為牛首子為支其色黑則黑為身納音金其色白則白為腹又若丙寅日立春丙為幹其色赤則赤為角耳尾寅為支其色青則青為脛納音火其色赤則赤為蹄其說蓋有所傳然也丘氏曰案開元禮土牛各隨其方則是王城四門各出土牛悉用五行之色天下州縣即如分土之義分土者天子大社之壇用五色之土封東西南北四方之諸侯各以其方之色割壇四方之土以白茅包而賜之令至其國先立社壇土牛之色亦冝效此所以示農耕之早晚者以立春為候也立春在十二月望即策牛人近前示其農早也立春在十二月晦及正月朔即策牛人當中示其農事也立春正月望即策牛人近後示其農晚也季冬之月二陽已動土脉已興故用土作牛以彰農事今立春方出農已自知何用策牛之人在前在後也此自漢朝之後積習為常漢書立春之日京都百官青衣立青幡施土耕牛人於門外令地主率官吏打之皆失示農之意也征鳥厲疾鄭氏曰殺氣當極也征鳥題肩也齊人謂之擊征或名曰鷹仲春化為鳩孔氏曰亦命有司辭也案釋鳥云鷹鶆鳩樊光云鶆鳩鷞鳩月令云鷹化為鳩郭景純云鶆當為鷞此征鳥即鷞鳩也鷹隼之屬厲嚴猛疾捷速也時殺氣盛極故鷹隼之屬取鳥捷疾嚴猛也山隂陸氏曰為其將復為鳩也於是厲疾蓋物不極不反列子曰目將眇者先睹秋毫乃畢山川之祀及帝之大臣天之神祇鄭氏曰四時之功成於冬孟月祭其宗至此可以祭其佐也帝之大臣句芒之屬天之神祇司中司命風師雨師孔氏曰案孟冬祈來年於天宗謂蠟祭蠟祭百神皆祭則嶽瀆山川亦祭也不言者文不具爾至此又更祭山川山川少於嶽瀆是孟月祭其宗此月祭其佐也五帝為宗大臣句芒等為佐天神人鬼山川皆有宗有佐也嚴陵方氏曰終功之時故遍報之自孟冬祈來年於天宗故至是及帝之大臣天之神祗地祭始於公社故至是及於山川以一嵗之祀事畢於此故言乃畢也然天曰神地曰祗而此言天之神祗者所謂祗蓋同出而有别之稱若日月之類雖同出於天而有别焉故亦可謂之祗是月也命漁師始漁天子親往乃嘗魚先薦寢廟鄭氏曰天子必親往視漁明漁非常事重之也此時漁潔美孔氏曰仲秋犬嘗麻季秋犬嘗稻皆不云天子親往蓋四時薦新是常事魚非常祭之物故云重之也馬氏曰此潛之詩所謂季冬薦魚也漁者牲類也宗廟之祭牲用親獵則漁必親往不亦冝乎金華應氏曰嘗者試而驗之也將薦於所尊故不敢輕也藥必先嘗膳必品嘗此致敬於君與親也大饗帝則嘗犧牲薦寢廟則嘗魚此致敬於天與親也然非必食而嘗之特展視而告全具耳秋祭曰嘗亦謂物已備成嘗而後祭以見其孝也冰方盛水澤腹堅命取冰鄭氏曰腹厚也此月日在北陸冰堅厚之時也北陸謂虛也孔氏曰於時極寒冰實至盛而云方盛者月半以前也月半後大寒乃盛此月日在𤣥枵之次其星當女虛危也陸道也言女虛危是北方七宿之道云北陸虛者舉中央星以言之嚴陵方氏曰冰方盛則以重隂之氣極於此故也盛極而衰東風將解凍故於此言方盛焉冰以陽熙而柔以隂凝而堅曰腹堅則其堅達於內矣非特形於水面而已然前言水泉此言水澤者泉乃水之原澤乃水之潤命取冰則七月所謂二之日鑿冰沖沖是也夫萬物負隂而抱陽沖氣以為和隂盛閉塞而陽無所泄則氣戾不和為愆陽為伏隂然則鑿冰非特為備暑亦以達陽氣也冰以入令告民出五種命農計耦耕事修耒耜具田器鄭氏曰冰既入而令田官告民出五種明大寒氣過農事將起也耜者耒之金也廣五寸田器鎡䥓之屬孔氏曰耒者以木為之長六尺六寸底長尺有一寸中央直者三尺有三寸句者二尺有二寸底謂耒下嚮前曲接耜者耜以金鐵為之故云耜者耒之金鎡今之鋤類孟子云雖有鎡基云之屬者以田器非一也新安顧氏曰古未用牛耕易只言服牛乘馬引重致逺如論語長沮桀溺耦而耕詩十千維耦月令季冬命農計耦耕事皆是人耦而耕最可考者古人於蠟祭迎貓迎虎凡有功於田者無不報祭獨不及牛可見古未知以牛耕自漢以來方有賣劒買犢之說答問嚴陵方氏曰冰之八也為隂事之終種之出也為陽事之始以冰入之期而告民出五種終則有始也耦耕二人相耦而耕也語言長沮桀溺耦而耕是矣蓋先王所以聫屬其民使之出入相友守望相助故鄉則有比遂則有鄰軍則有伍學則有朋耕之有耦亦以是而己曰修曰具互相備也命樂師大合吹而罷鄭氏曰嵗將終與族人大飲作樂於大寢以綴恩也言罷者此用禮樂於族人最盛後年若時乃復然也凡用樂必有禮用禮則有不用樂者王居明堂禮季冬命國為酒以合三族君子說小人樂孔氏曰大寢路寢也與宗人圖事之處既飲族人故鄭知於大寢也後年季冬乃復如此作樂以一年頓停故云罷也大合吹必當有禮與族人燕飲今唯云命樂師作樂故云用樂必有禮而食嘗無樂故云禮有不用樂也三族父子及身小記云親親以三為五以五為九是也馬氏曰匏竹利制隂物也故自季秋而習吹至季冬而大合吹於是罷焉則陽事始故也山隂陸氏曰於此言罷著季春大合樂未罷也新安王氏曰聲陽也夫子贊易曰雷出地奮豫先王以作樂崇德陽動有聲在天為雷在人為樂今冬且盡春將至古厯以驚蟄為正月節謂雷將動故於是月送隂迎陽土牛以送隂大合吹以迎陽不用他樂何也吹者人氣故用以迎陽氣大合吹即罷可以知其無燕矣乃命四監收秩薪柴以共郊廟及百祀之薪燎鄭氏曰四監主山林川澤之官也大者可析謂之薪小者合束謂之柴薪施炊爨柴以給燎春秋傳曰其父析薪孔氏曰以薪柴出於山林川澤故四監為山林川澤之官也鄭引春秋傳見昭七年左傳證薪是粗大可析之物也嚴陵方氏曰秩薪柴則與秩芻同義於嵗終命收之所以備來嵗之用而已馬氏曰收秩薪柴則藏事至是為悉矣講義曰周官有燔柴槱燎之祭於是命四監收以秩次敘之以共柴為郊廟及百祀之薪燎也是月也日窮於次月窮於紀星回於天數將幾終鄭氏曰言日月星辰運行於此月皆周匝於故處也次舍也紀㑹也孔氏曰去年季冬日次於𤣥枵從此每月移次他辰至此月窮盡還次𤣥枵故云日窮於次去年季冬月與日相㑹於𤣥枵自此月與日相㑹於他辰至此窮盡還復㑹於𤣥枵故云月窮於紀二十八宿隨天而行每日雖周天一匝早晚不同至此月復於故處與去年季冬早晚相似故云星回於天幾近也以去年季冬去今年季冬三百五十四日未滿三百六十五日未得正終唯近於終故云數將幾終嚴陵方氏曰陽大而為之主故以次言隂小而有所系故以紀言日往則月來月往則日來日月相推往來不窮謂之通可也此乃曰窮者蓋以人言之日有時而窮於次月有時而窮於紀以天言之其窮也祗所以為通歟山隂陸氏曰厯以紀之紀厯也窮於次言象窮於紀言厯變窮言回回無窮也其言天亦以此易曰終則有始天行也日一日一周天月一月一周天星一嵗一周天數將幾終數無正終其謂之終蓋幾而已嵗且更始專而農民毋有所使鄭氏曰而猶女也言專一女農民之心令之豫有志於耕稼之事不可徭役徭役之則志散失業也孔氏曰此修月令之人為國家戒令之法言此月既終嵗且更始在上者當專一女農之事無得興起造作有所使役也此是制禮者總為約戒之辭凡月令之內不云乃命某官之屬者皆是禮家總禁也嚴陵方氏曰夫嵗者數之所積而成也數之終乃所以為嵗之始嵗之始乃所以為數之終於數言終於嵗言始亦互相備爾專而農民毋有所使則以嵗且更始欲一意於耕故也四民各有業而農居其一故謂之農民山隂陸氏曰終言幾無終之辭也始言且無始之辭也天子乃與公卿大夫共飭國典論時令以待來嵗之冝鄭氏曰飭國典者和六典之法也周禮以正月為之建寅而縣之今用此月則所因於夏殷也孔氏曰調和飭正之六典則治典教典禮典政典刑典事典也案大宰職云正月之吉始和布治小宰云正嵗而觀治象之法今不用周法故知因於夏殷以王者損益不出三代故也嚴陵方氏曰事有在今嵗為冝來嵗則否者國之有典時之有令安可不飭而論之乎蓋物有常冝冝在隨時而己然非一人之私所能為也故以共言之馬氏曰此所謂平在朔易也先王之時嵗終令百官府各正其治受其㑹聽其致事於是飭國典之未冝者改之以經邦治論時令之未協者正之以受民事至正月之吉始和然後布焉則所謂待來嵗之冝也乃命大史次諸侯之列賦之犧牲以共皇天上帝社稷之饗鄭氏曰此所與諸侯共者也列國有大小賦之犧牲大者出多小者出少饗獻也孔氏曰列次也來嵗祭祀所須犧牲出諸侯之國國有大小故命大史書列之以共賦也諸侯同王南面專王之土故命之出牲以與王共事天地也漫言諸侯則異姓同姓俱然皇天天皇大帝也上帝靈威仰五帝也社稷王之社稷也諸侯自有社稷而始封亦割王社土與之故賦牲共王社稷也出牲以共獻於上帝諸神也乃命同姓之邦共寢廟之芻豢鄭氏曰此所以與同姓共也芻豢猶犧牲孔氏曰皇天社稷與天下共之故通賦天下國家寢廟先王與同姓國共之故别又命同姓國共之也言芻乃是牛羊而又云豢則犬豕也天地不用犬豕社稷大牢有豕而不用犬故沒其芻豢而徒云天地犧牲宗廟備六牲故云芻豢山隂陸氏曰此大宰賦之可知而言大史與宰相備也於大祭舉輕於小祀舉重如是而後可知命宰歷卿大夫至於庶民土田之數而賦犧牲以共山林名川之祀鄭氏曰此所與卿大夫庶民共者也歷猶次也卿大夫采地亦有大小其非采地以其邑之民多少賦之孔氏曰宰小宰也卿大夫謂畿內有采地者庶民受田準田多少之數賦之犧牲以共山林名川之祀不云士者上舉卿大夫下舉庶民則士在其中省文耳卿大夫無采地則出其邑之賦稅庶人無邑則出其賦稅以與邑宰邑宰以共上山隂陸氏曰歷而數之小宰之事也凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀鄭氏曰民非神之福不生雖有其邦國采地此賦要由民出孔氏曰以經云天下九州之民不云諸侯卿大夫獨云民故鄭注言此賦要由民出也嚴陵方氏曰自乃命大史而下止言次諸侯之列則知同姓之列亦次之下言同姓之邦則知諸侯為異姓之邦也以神道言則曰犧牲以人道言則曰芻豢皇天上帝社稷神道也故以犧牲言之寢廟則人道而己故以芻豢言之山林名川之祀亦曰犧牲者則以其迹為逺而賦至於庶民者亦為逺故也以賦至於庶民故以歷言之歷則非一矣或曰饗或曰祀或曰芻豢何也蓋饗者祭之義祀者祭之道芻豢祭之物非備物不足以致義非致義不足以合道亦互相備而已大史以建六典為事宰以共力為事諸侯之賦命之大史卿大夫之賦命之宰此重輕之别也講義曰古者聖王先成民而後致力於神唯成於民者至矣然後民皆致力於神矣故奉盛以告曰謂其三時不害而民和年豐也奉酒醴以告曰謂明德以薦其馨香也奉牲以告曰謂牲牷肥腯而民不疾瘯瘰也凡皆先成民如此故民無不致力於神唯能成於民則凡普天之下食土之毛者無不咸獻其力以共其祀者也書曰類於上帝禋於六宗望於山川遍於羣神類上帝則皇天上帝之祀也禋六宗則祖宗之祀也望山川則山林名川之祀也其序固可知矣季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降冰凍消釋鄭氏曰白露蚤降介蟲為妖戍之氣乘之也九月初尚有白露月中乃為霜丑為鱉蟹四鄙入保畏兵辟寒象也胎夭多傷辰之氣乘之也夭少長也此月物甫萌牙季春乃句者畢出萌者盡達多傷者生氣蚤至不充其性也國多固疾生不充性有久疾也命之曰逆衆害莫大於此水潦敗國時雪不降冰凍消釋未之氣乘之也季夏大雨時行孔氏曰白露蚤降天災介蟲為妖地災四鄙入保人災案隂陽式法丑魚鱉蟹季冬建丑而行秋令丑氣失故介蟲為妖胎夭多傷國多固疾命之曰逆皆人災也三月之氣在十二月內至故胎萌而暴長出既性不得充滿所以多傷胎夭既傷國多固疾故名此曰特逆之事謂惡之甚也命猶名也水潦敗國時雪不降天災也冰凍消釋地災也嚴陵方氏曰冬之序為後於秋而言蚤者以建亥為正言之則冬為先故也介蟲之性辨於物以斂藏之氣不厚故反為妖也四鄙入保蓋畏兵之象以秋為金故也亦見孟夏解疾謂之固則其疾久而不瘥故也夫冬者嵗之終春者嵗之始嵗終而行嵗始之令故命之曰逆水潦盛昌蓋夏之時然也故行夏令則水潦敗國冬者雪之時故謂之時雪時雪不降冰凍消釋則盛陽爍之故也山隂陸氏曰國多固疾季冬有閉固而己今行春令故其敝如此命之曰逆所謂逆莫甚於此新定顧氏曰月令當取其體天行事之大意先王亦有至日閉關之事謂如一嵗之內因天時提撕事務一巡又且過得幾時到那時節又整頓一巡如春行慶賞刑以秋冬此是因天時整頓大綱若他時有緊切合即施行者亦豈一一待那時方行如夫子遇迅雷風烈必變若栁子厚論之又須說平時何嘗不敬豈待迅雷風烈方敬也月令之說但是順天加重其事非是尋常俱不理會其言行春令則應若此行夏令則應若彼誠有拘處子厚之辨又失之太放答問禮記集說卷四十六
