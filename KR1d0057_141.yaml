body:
  text: 禮記集説卷一百四十一宋衛湜撰緇衣第三十三孔氏曰案鄭目録云名曰緇衣者善其好賢者厚也緇衣鄭詩也此於别録屬通論陸氏曰劉瓛云公孫尼子所作藍田吕氏曰此篇大㫖言為上者言行好惡所以為民之所則傚不可不慎也篇中有好賢如緇衣之言故以是名篇長樂陳氏曰緇衣朝服也衛武公父子並為周司徒國人宜之故為之製緇衣焉其詩之辭每章而每加者以明善善而無己也人君好善如是則人將輕千里而來矣是則緇衣之善豈特當時以為宜而天下後世亦宜然也故記者取詩以名篇新安朱氏曰緇衣兼惡惡獨以緇衣名篇者以見聖人有心於勸善無心於懲惡也嚴陵方氏曰此篇凡二十四節大抵多明人之好惡人之所宜好者莫如賢所宜惡者莫如惡緇衣好賢之詩也經正引此故以名篇子言之曰為上易事也為下易知也則刑不煩矣鄭氏曰言君不苛虐臣無姦心則刑可以措孔氏曰此篇凡二十四章唯此云子言之餘皆云子曰篇首宜異也君上以正理御物則臣事之易臣下無姦詐則君知其情易也此篇題緇衣而入文如此者欲見君明臣賢乃可服緇衣也藍田吕氏曰孔子曰上好信則民莫敢不用情為上易事者以好信故也為下易知者以莫敢不用情故也上不務信以機心待民則民亦以機心報上上下之交機心相勝姦生詐起法令不得不多不正其本而齊其末則犯者莫之勝禁欲刑之不煩不可得矣長樂陳氏曰為人君止於仁故易事為人臣止於忠故易知上以仁待下下以忠事上則刑不煩者固其宜也茍為上者不以仁恕下依勢作威而下有難事之勞為下者不以忠衛上匿情詐行而上有難知之病此刑所以日滋也長樂劉氏曰上難事則下難知上易事則下易知好惡悖於正喜怒失其常於是有匿其誠信以為容悦者屈其忠直以為阿諛者包其禍心以為詐偽者茍可以罔上而免其咎罰者奚所弗至哉為下如是可謂難知也石林葉氏曰君以恕使人而易事臣以忠事君而易知則刑之所施者簡故不煩廬陵胡氏曰上難事則必淫刑以逞下難知則懐姦罔上之獄煩矣子曰好賢如緇衣惡惡如巷伯則爵不瀆而民作愿刑不試而民咸服大雅曰儀刑文王萬國作孚鄭氏曰緇衣巷伯皆詩篇名也緇衣首章曰緇衣之宜兮敝予又改為兮適子之館兮還予授子之粲兮是其好賢欲其貴之甚也巷伯六章曰取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊此其惡惡欲其死亡之甚也爵不瀆者不輕爵人也試用也咸皆也刑法也孚信也儀法文王之徳而行之則天下無不為信者也文王為政克明徳愼罰孔氏曰此一節明好賢惡惡賞罰得中則為民所信緇衣詩鄭風美桓公武公詩巷伯刺幽王之詩瀆濫也愿慤也末所引詩大雅文王之篇諌成王之詩藍田吕氏曰子曰示之以好惡而民知禁上之所以示下下之所以從上唯好惡而已雖有好善之迹而無誠好之心則雖賞不勸雖有惡惡之迹而無誠惡之心則雖刑不懼蓋誠心不至則好惡不明好惡不明則民莫知其所從違如此而欲人心之孚天下嚮風難矣緇衣美鄭武公之詩也父子並為周司徒善於其職國人宜之緇衣者武公所為周家卿士之服也武公之為卿士國人宜之其愛之之深欲武公長為卿士雖衣見其敝我將改為館之食之唯恐其去好賢之至者也巷伯寺人傷於讒之詩惡惡之至者也好賢必如緇衣之篤則人知上之人誠好賢矣不必爵命之數勸而民必起愿心以敬上矣故曰爵不瀆而民作愿惡惡必如巷伯之深則人知上之人誠惡惡矣不必刑罰之施而民畏服矣故曰刑不試而民咸服大雅曰儀刑文王萬國作孚蓋文王之徳好惡得其正而一出乎誠心故為天下之所儀刑徳之所以孚於下也嚴陵方氏曰若卷阿之求賢則好賢非不誠矣巧言之傷讒則惡惡非不至矣此止言緇衣之好賢特諸侯爾以諸侯好賢若是之誠況於王天下乎巷伯之惡惡特寺人爾以寺人之小臣惡惡若是之至況於卿大夫乎此所以特引二詩而明之也觀緇衣之詩始言敝予又改為中言又改作卒言又改造蓋其好賢之禮有隆而無殺也兹非好賢之誠乎巷伯之詩先之以投畀豺虎繼之以有北終之以有昊蓋其惡惡之心有加而無己也兹非惡惡之至乎好賢必人人而爵之則爵有所不勝勸惡惡必人人而刑之則刑有所不勝威唯如緇衣之好賢爵雖不瀆而足以使之作愿如巷伯之惡惡刑雖不試而足以使之咸服不瀆者未至於不試也蓋爵所以勸特在乎無所瀆而已刑所以畏必期乎無所用焉作愿則其愿由好賢之所興咸服則其服由惡惡之所感作猶詩作人之作咸猶易咸亨之咸馬氏曰爵所以致好而使民遷善之具刑所以致惡而使民逺罪之具好賢之至則致好之具亡而民自遷於善矣惡惡之至則致惡之具亡而民自逺於罪矣石林葉氏曰緇衣好賢之至也好之至則民自勸而爵不瀆巷伯惡惡之至也惡之至則民自懲而刑不試然孔子嘗曰舉直錯諸枉則民服此言作愿者蓋季康子所問者民服而已此别而言之作愿者言其勸之於内也廬陵胡氏曰人莫不有好惡也而好惡得其正者寡矣緇衣好得其正巷伯惡得其正故舉大雅儀刑文王為言文王好仁而仁興克明徳慎罰其好惡之正如此子曰夫民教之以徳齊之以禮則民有格心教之以政齊之以刑則民有遯心故君民者子以愛之則民親之信以結之則民不倍恭以涖之則民有孫心甫刑曰苗民匪用命制以刑惟作五虐之刑曰法是以民有惡徳而遂絶其世也鄭氏曰格來也遯逃也涖臨也孫順也甫刑尚書篇名匪非也命謂政令也髙辛氏之末諸侯有三苗者作亂其治民不用政令專制御以嚴刑乃作五虐蚩尤之刑以是為法於是民皆為惡起倍畔也三苗由此見滅無後世由不任徳孔氏曰此一節明教民以徳不以刑也論語云有恥且格甫刑即吕刑也春秋有吕國而無甫侯吕即甫也藍田吕氏曰徳以道其心使知有理義存焉禮以正其外使知有所尊敬而已知有理義知所尊敬則知所以為善為不善然後其心知止於是而不欲畔而之他也不善之名雖愚不肖者恥之如使民心知所以為善不善則畔而之他者衆人之所恥衆人之所恥雖愚不肖者亦將不欲為矣此孔子所謂有恥且格格者正也政者所以禁民為非刑者所以懲民之為非禁也者非能使之知不善而不為亦強制之而已懲也者非能使之知恥使之知畏而已故民非心悦而誠服欲逃其上而不可得此所以有遯心孔子所謂免而無恥者也徳禮所以正其本本立則末不足治政刑所以齊其末茍無其本則法不足以勝姦我待之以愛則彼必親我待之以信則彼必不倍我待之以恭則彼必能遜此人情之常然況君民之間乎故子愛恭信亦以徳示之而已恭以涖之亦以禮先之而已甫刑曰苗民匪用命制以刑惟作五虐之刑曰法蓋髙辛氏之末諸侯之國有三苗者民不用上之命君無徳以教之惟制以刑作五虐之刑謂殺戮及劓刵椓黥也民愈為惡徳不可止遂至於絶其世書所謂民興胥漸泯泯棼棼罔中于信以覆詛盟又曰皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下是也馬氏曰徳者所以養人於中而在外有不正則又以禮齊之此順其性命之理而善養人也故民有格心政者所以率人於外而内有不從則又以刑齊之此逆其性命之理而以力服人也故民有遯心先王之為治亦未嘗廢其刑政者蓋有徳禮以為本而以刑政為之助故子以愛之則民親之言愛之如子則民親之如父母矣信以結之則民不倍恭以涖之則民有遜心者與夫上好信則民用情上好禮則民易使同意也石林葉氏曰徳禮者化民之本也使其自服故有格心格言其至也刑政者治民之末也強其必從故有遯心遯言其藏也心藏於内而外服之迫之以刑政之嚴而已仁以愛之信以結之所謂教之以徳也恭以涖之所謂齊之以禮也徳不止於一故有仁有信禮則恭而已矣嚴陵方氏曰子以愛之性也信以結之情也恭以涖之行也金華應氏曰書云苗民弗用靈靈善法也今引弗用命命當作靈子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不愼也是民之表也子曰禹立三年百姓以仁遂焉豈必盡仁詩云赫赫師尹民具爾瞻甫刑曰一人有慶兆民賴之大雅曰成王之孚下土之式鄭氏曰不從其令言民化行不拘於言甚者甚於君也民之從君如景逐表遂猶達也言百姓傚禹為仁非本性能仁也孚信也式法也皆言化君也孔氏曰此一節中明上文君為民表不可不愼上有其善則下賴之百姓以仁遂言仁道達於内外禹之百姓豈必本性盡有仁道由禹之所化也引小雅節南山之詩以證民之法則于上引甫刑以證上有善行賴及於下引大雅下武之詩證君有善與下為法式也藍田吕氏曰國之風俗一出於上之好惡好惡之發其端甚微其風之行或至於不可止其俗之成或至於不可敗此不可不愼也季康子患盜孔子曰茍子之不欲雖賞之不竊蓋上之所好利必從之上所不好害必隨之盜雖小人未有舍其所利而趨其所害故上有好貨之君則下必有盜賄貨之民其勢然也君者民之表也文武興則民好善幽厲興則民好暴非他唯上所好而已故禹立三年百姓以仁遂焉非百姓之盡仁以禹好仁故民從而仁爾赫赫師尹民具爾瞻者言民無恒心瞻視上之所為以為之法而已一人有慶兆民賴之者上好善則民皆蒙賴其善也成王之孚下土之式成就王道所以信於天下則天下莫敢不信以為法也三者引取詩書之言皆以證上之人所好下視之以為法不可不愼也嚴陵方氏曰論語曰其身正不令而行其身不正雖令不從此從其所行之謂也孟子曰上有好者下必有甚焉上好是物下必有甚焉之謂也禹欲百姓之仁而已及百姓之興仁亦遂上之所欲而已故以遂言之也焉氏曰令者令之於民行者行之於己其所行者若此其所令者如彼民不從其若彼之令而從若此之行則是上之好惡下之所取以為正而不可以不愼也故曰是民之表令民而使作愿則民未必作愿令民而使之服則民未必咸服唯好賢如緇衣則爵不瀆而民作愿惡惡如巷伯則刑不試而民咸服所謂從其所行而不從其所令也石林葉氏曰王者必世而後仁為繼亂言之也禹立三年百姓以仁遂焉為繼治言之也繼治而化之者易非必盡仁則亦鮮而已民具爾瞻言其位也兆民賴之言其徳也下土之式言其化也居其位而有其徳則民之化之孰有不遂於仁乎長樂陳氏曰言之化人也淺故不從其所令行之感人也深故從其所行故好惡出於正則彼皆從而正好惡出於非則彼皆從而非猶表端而影端表枉而影枉也故謂民之表又曰禹菲飲食而致孝乎鬼神惡衣服而致美乎黻冕所以仁鬼神卑宫室而盡力乎溝洫所以仁天下故其立也止於三年之一變百姓皆以仁遂焉然豈必盡仁道哉特效上為仁而已子曰上好仁則下之為仁爭先人故長民者章志貞教尊仁以子愛百姓民致行已以説其上矣詩云有梏徳行四國順之鄭氏曰章明也貞正也民致行己者民之行皆盡已心梏大也直也孔氏曰此一節贊結上經在上行仁之事上好仁則下皆為仁爭欲先他人為君者當章明已志為貞正之教尊敬仁道以子愛百姓則民致盡行仁之意以説樂其上矣所引詩大雅抑刺厲王之詩證上有其徳下所從也藍田吕氏曰仁者之於天下無一物非吾體則無一物忘吾愛故好仁者子愛百姓不足道也茍有是心則㦧怛之愛結於民心如草上之風必偃其從之也輕矣所謂為仁爭先人者得其良心之所同然靡然嚮風日用而不知者爾章志者明吾好惡以示之貞教者立不可易之道以教之所示所教者尊仁而已好仁惡不仁吾所以示之也明人倫於上教之使順不使之不順此吾所以教之也所謂民致行己以悦其上如子從父母之命盡心力以奉之不忍違也詩云有梏徳行四國順之梏字如桎梏其音為覺詩大雅之文則正為覺蓋假借之文也覺明也明吾徳以示之教之此四國所以順也覺之為義有所悟之謂如先覺後覺悟則明矣故可訓為明先儒訓大也直也未詳其義長樂陳氏曰惻隱之心人皆有之上誠好仁以表之矣則下之人各勉其性之所有而爭先人以為仁謂之爭先人者以言其敏於為仁故也長民者在我之志章而不匿在人之教貞而不囘章志貞教而所主在於尊仁以子愛百姓民懐其仁故近者謳歌而樂逺者竭蹶而趨其致行己之志以説其上者宜矣覺出於性而非偽故覺為直有覺徳行而四國順之則民致行己以説上之意也謂之好仁又謂之尊仁者好出於中心尊則因仁之尊爵而尊之上好仁則下之為仁爭先人言下效上以其仁也尊仁以子愛百姓民致行己以説其上言下歸上以其仁也馬氏曰爭先人而謂之仁者蓋當仁不讓於師也嚴陵方氏曰章志貞教尊人以子愛百姓兹非上好仁乎民致行己以説其上者兹非下之為仁爭先人乎梏當作覺子曰王言如絲其出如綸王言如綸其出如綍故大人不倡游言可言也不可行君子弗言也可行也不可言君子弗行也則民言不危行而行不危言矣詩云淑愼爾止不諐于儀鄭氏曰綸今有秩嗇夫所佩也綍引棺索也游猶浮也不可用之言也危髙也言不髙於行行不髙於言言行相應也淑善也諐過也言善愼女之容止不可過於禮之威儀也孔氏曰此一節明王者出言下所傚之其事漸大不可不愼意與前經同也綸麤於絲綍麤於綸鄉置有秩鄉小置嗇夫有秩嗇夫職同但隨鄉大小故名異耳所佩則同張華云綸如宛轉繩尊大之人不可倡道此浮游虚漫之言恐人依象之藍田吕氏曰君子名之必可言也言之必可行也君子於其言無所茍而已矣況於天子者乎生於心則形於言形於言則發於政所出之言仁矣則發為仁政也天下被其澤矣所出之言暴矣則發為暴政也天下受其弊矣所謂如絲如綸如綍言其端甚微其末甚大也綸綬也大於絲矣綍大索也大於綸矣大人者王公之謂也游言者無根不定之言也易繫辭曰誣善之人其辭游誣罔善人舉非其實所以無根不定也為人上者倡之以誠慤篤實之言天下猶有姦欺以罔上者茍以無根不實之言倡之則天下蕩然虚浮之風作矣可不愼乎可言而不可行過言也可行而不可言過行也過言者窮髙極深絶類離倫自以為髙明博大然人倫不察庶物不明要之卒不可行於世無用之空言而已此君子所以弗言也過行者可行之一時不可以有繼可行之於己不可達之於天下如曽子執親之喪水漿不入口七日墨子生不欲死不哭要之不可言之以為法於後世獨行之髙行而已此君子所以弗行也如此則言行不越乎中民將效之言不敢髙於行言之必可行也行不敢髙於言必為可繼之道也詩云淑愼爾止不諐于儀為人上者當善愼其容止不過於先王曲禮之儀引以證言行之不可過也長樂陳氏曰物之在天下始於微而必大者皆然惟絲有衣被人之功而王之言足以衣被萬物而經綸天下之道在是焉故以絲言之游則無所歸也與易所謂誣善之人其辭游同言欲當實而已況大人而可以倡游言乎或言王或言大人皆以業言之也可言而不可行非所謂顧行之言也無稽之言而已故君子弗言可行而不可言非所謂顧言之行也茍難之行而已故君子弗行君子之言行適於中民皆效之故言當於行而無過髙之言是以言不危行行當於言而無過髙之行是以行不危言凡物非中而過髙則危故危之為義如此淑謹爾止不諐于儀善謹爾之容止而不過於儀則性行之意也嚴陵方氏曰王以位言大人以道言其出如綸則有位者之事故曰王不倡游言非有道者則不能也故曰大人下又言君子弗言弗行者以見在上在下皆當如此也君子則兼上下言之可言不可行即游言也可行不可言者亦過行也馬氏曰夫可言不可行君子不言也則民言顧行而言不危行矣可行不可言君子弗行也則民行顧言而行不危言矣子曰君子道人以言而禁人以行故言必慮其所終而行必稽其所敝則民謹於言而愼於行詩云愼爾出話敬爾威儀大雅曰穆穆文王於緝熙敬止鄭氏曰禁猶謹也稽猶考也議也話善言也緝熙皆明也孔氏曰此一節亦贊明前經言行之事所引詩大雅抑之篇刺厲王也言謹愼爾之所出善言以為政教恭敬爾之威儀此引證言慮其所終也又引大雅文王之篇言穆穆然美者乃是文王於謂嗚呼言徳嗚呼光明乎又敬其容止此引證在上當敬其言行也横渠張氏曰君子於民導使為徳而禁其為非不大望於愚者之道與禮謂道民以言禁民以行斯之謂爾藍田吕氏曰非理則不言所以導民使之循理也非法則不行所以禁民使之行法也孟子曰人之易其言也無責爾矣如必責其言之所終則安敢易乎故進取於善者考其行而不掩猶不免於狂況不在於善者乎故曰言必慮其所終墨氏兼愛楊氏為我原其設心之初以為道在乎是天下之善無以易此豈欲為無父無君之行哉然卒至於無父無君者積靡其敝不至於是則不止也伯夷之清栁下惠之和皆合於聖人其風之末猶為隘與不恭則立心之端差之毫釐繆以千里可不愼哉故曰行必稽其所敝言必慮終行必稽敝上之人所以導民禁民者也謹於言而愼於行民之所以從上者也詩云愼爾出話敬爾威儀言上之言行不可不愼也大雅曰穆穆文王於緝熙敬止言文王之盛徳亦不越敬其容止而已矣長樂陳氏曰言以明理所以通彼此之情而達之也故道人以言行出於正而率以正則彼莫敢為非也故禁人以行孔子於空空之鄙夫則叩兩端而竭焉所謂道人以言也為魯司㓂而公謹氏出其妻愼潰氏踰竟而徙所謂禁人以行也君子道人以言故言必慮其所終禁人以行故行必稽其所敝言矢於口易為口禍故欲慮慮者防患之思也行本於人為而有美有惡故欲稽稽者疑而考之也言以應物終而始始而終故言慮其所終行涉於迹乆必稽其所敝民是以知言之為可謹而不敢縱行之為可謹而不敢忽也詩曰謹爾出話慮其所終之意也穆穆敬也美也天子之容也緝而熙之使乆續而廣之使逺則文王以徳為行故也嚴陵方氏曰書曰王言惟作命不言臣下罔攸稟令道人以言之謂也孝經曰示之好惡而民知禁禁人以行之謂也馬氏曰民之愚君子則以言道之使之知所向民之肆君子則以行禁之使之知所止道人以言故言必慮其所終禁人以行故行必稽其所敝蓋因其發言之始而慮其所終當其制行之新而必考其所敝言由中出故言慮行自外作故言稽石林葉氏曰言以開示天下故道人行以率勵天下故禁人可行於己不可達於人則有窮故慮其所終則民亦謹於言可行於今不可傳於後則有偏故稽其所敝則民亦愼於行建安眞氏曰道人以言者謂以言辭命令開導而誘掖之也然言可以導人之善而不能禁人之不善禁人之不善其必以行乎蓋天下之理有諸己而後可以非諸人已無不善之行雖不禁人人自從之已有不善之行雖欲禁人人必違之故空言不可以禁人惟實行乃足以禁人也夫言出於口至易也然不慮其所終則一言之過貽患將不勝救行出於身亦至易也然不稽其所敝則一行之差流禍或至於無窮不善者固不足言善矣而慮之不深稽之不逺未有不反而為不善者也老莊非善言乎其終為浮虚之害夷惠非善行乎其弊有隘不恭之失況尊居人上言行所關安危自出故必謹之審之而不敢苟則民亦從其化而不苟於言行矣子曰長民者衣服不貳從容有常以齊其民則民徳壹詩云彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望鄭氏曰貳不壹也章文章也忠信為周孔氏曰從容有常謂舉動有常度壹謂齊一不參差引詩小雅都人士刺幽王之詩君臣衣服無常詩人引彼明王之時都邑之人有士行者服此狐裘黄黄然行歸忠信萬民所以瞻望以法則之藍田吕氏曰此章明言長民者言容止民所觀望則而象之惟其不貳有常則民心不疑而徳歸於一矣周人衣服無常此都人士之詩所以刺也嚴陵方氏曰君子服其服則文以君子之容故其效至於民徳歸一也馬氏曰長民者言處於人之上也處人之上不唯其行不可以無常而其形於衣服容貌之際亦不可以無常然後民望其容貌而其徳歸於一彼都人士狐裘黄黄服其服也其容不改文以君子之容也出言有章遂以君子之辭也行歸于周萬民所望實以君子之徳也長樂陳氏曰民徳之不純常生於竒衺而竒衺之作常兆於衣服之不一長民所以率民而先之也衣服不貳從容有常以齊其民徳由之而一也都人古之長民者也士則長民所齊而成之者也狐裘燕居之服也狐之為物利以止不利於有為狐裘用之以燕居黄黄言其色也燕居之服猶且致一如此則其出而齊民可知矣此民徳歸一獨在於此子曰為上可望而知也為下可述而志也則君不疑於其臣而臣不惑於其君矣尹吉曰惟尹躬及湯咸有壹徳詩云淑人君子其儀不忒鄭氏曰志猶知也吉當為告古文誥字之誤也咸皆也君臣皆有一徳不貳則無疑惑也孔氏曰可望而知謂貌不藏情望見其貌則知其情可述而志謂臣下率誠奉上其行可述叙而知伊尹告太甲故稱尹告咸有一徳篇是也引以證君臣不相疑惑曹風鳲鳩刺曹君之詩言善人君子其儀不有差忒引以證一徳之義藍田吕氏曰可望而知可述而志皆謂徳歸於一而無二三也所謂一者理義而已人心之所同然者也為君則仁為臣則忠為子則孝為父則慈與人交則信乃所謂一是故君臣之所為雖不同同歸於是理故可望而知可述而志可望而知者不言而喻也可述而志者可稱述而志之於書也若上有深阻難測之意則雖言而未喻下有隱匿不忠之情則雖言不可信況於志乎此君臣上下所以交相疑惑欲同心於為治難矣尹吉曰惟尹躬及湯咸有一徳言君臣之徳皆一也其儀不忒亦言歸於無差忒也長樂陳氏曰上以情待下故為上可望而知下以情事上故為下可述而志謂之望而知者望其趨舍而足以知其情也謂之述而志者述其功業而足以志其情也為上可望而知則君之於臣無可疑之行故君不見疑於其臣為下可述而志則臣之於君無可惑之事故臣不見惑於其君鄭氏以吉為告蓋伊尹告湯之辭以為伊尹之與湯皆有一徳而無異情君臣有一徳此君所以不疑於其臣而臣不惑於其君也淑人君子其儀不忒則亦一徳之意也馬氏曰為上可望而知者蓋上以誠而接下為下可述而志者蓋下以誠而事上上以使下下以事上皆以誠則君臣之間有同而無異故君不疑於其臣臣不惑於其君而其徳一也山隂陸氏曰可望而知言表裏如一可述而志言先後如一子曰有國家者章善􅓠惡以示民厚則民情不貳詩云靖共爾位好是正直子曰上人疑則百姓惑下難知則君長勞故君民者章好以示民俗愼惡以御民之淫則民不惑矣臣儀行不重辭不援其所不及不煩其所不知則君不勞矣詩云上帝板板下民卒􅓠小雅曰匪其止共惟王之卭鄭氏曰章明也􅓠病也難知有姦心也淫貪侈也孝經曰示之以好惡而民知禁儀當為義言臣義事則行也重猶尚也援猶引也引君所不及謂必使其君如堯舜煩所不知謂必使其知慮如聖人也上帝喻君也板板辟也卒盡也􅓠病也此君使民惑之詩匪非也卭勞也言臣不止於恭敬其職唯使王之勞此臣使君勞之詩也孔氏曰此明君臣各以情相示則各得其所有善以賞章明之有惡以刑􅓠病之引詩小雅小明刺幽王之詩證民情不貳為正直之行君上多疑貳則百姓疑惑下懐欺詐則在上治之勞苦也不重辭不尚虚辭也臣下不援引其君行所不能及之事不煩亂君所不知之事則君不勞苦上帝板板大雅刺厲王之詩匪其止共小雅巧言刺幽王之詩也藍田吕氏曰合於理則為善不合於理則為惡明之斯好之矣􅓠之斯惡之矣善居其厚惡居其薄此所以示民厚也好善惡惡則民一歸於理義此民情所以不貳也靖共爾位好是正直此言居位者惟正直是好則所好出於理義民徳所以壹也此篇之首曰為上易事也為下易知也則刑不煩矣又曰為上可望而知也為下可述而志也此文云上人疑則百姓惑下難知則君長勞反覆言此者蓋君臣上下之際茍非同心同徳一歸於理義則上下暌乖欲政行而事治未之有也故極言上之好惡言行所以示其下者一徳而已章好者明吾所好唯禮義而已非他好也愼惡者愼吾所惡唯非理非義而已非他惡也所好未必理義則君好可疑欲以化民成俗難矣所惡未必非理非義則君惡可疑欲民之不淫難矣使民惑上之好惡而莫知所從非所以示民也臣之事上非禮不行故曰儀行所行一出於禮義非有隱匿詐偽之情故曰不重辭不重辭者理直而不必多言以自解之也以君之力所不能及而援其君則君難從以君之智所不能知而煩其君則君難聽徒為難從難聽勞其君而無益非所以事君也上帝板板下民卒􅓠板板反也上帝以況王者也王者反覆二三其徳則民莫知所從而病矣此證上人疑則百姓惑也匪其止共惟王之卭卭病也為臣者事君不止於恭敬而援其所不及使君病其不能煩其所不知使君病其不知此證下難知則君長勞也長樂陳氏曰惟民生厚則性之本未常不善也因物有遷而習於惡則惡者其偽也有國者知民性之有善而移於所習然後為惡故為善則章之使民知善之可為為惡則􅓠之使民知惡之可避以示民有生厚之善則民致一於善而歸厚矣是以民情不貳靖共爾位好是正直則章善之謂也疑則不明矣上之人明道以示民然後民知所視效今則疑而不明民何所視效乎此百姓以之惑難知則隱矣下之人竭情事上而無隱然後君逸於聽察今則隱而難知君安能逸於聽察乎此君所以勞也嚴陵方氏曰章善而著之惡者恥其不若則惡者病矣夫不待刑罰而能使惡者知恥則為上者之用心厚矣則民其有攜貳之情乎示民不以信則為上之人可疑百姓其有不惑乎事君不以忠則為下之人難知君長其有不勞乎章其所好之善故足以示民而成俗愼其所惡之惡故足以御民而不淫若是則上無可疑而民不惑矣臣有可儀之行而所重者不在乎辭君之所及者道而所不及者事故於所不及者則不援之使及君之所知者本而所不知者末於所不知者則不煩之使知若是則下無難知君不勞矣馬氏曰好是正直者章善之謂也君徳之不一故曰上人疑上人疑則非所謂可望而知也故百姓惑臣徳之不一故曰下難知下難知則非所謂可述而志也故君長勞主道利宣不利周利明不利幽故君民者章好以示民俗使天下之人曉然知吾之所好在善而遷善以成俗愼惡以禦民之淫使天下之人曉然知吾之所惡在惡而淫僻之行有所不敢為故民不惑矣臣儀行言當其義而行不重辭者不以浮華之辭為尚蓋君子先行其言而後從之也石林葉氏曰善者蔽惡者進則民疑故有國以示民厚者異於此上以誠示人則百姓雖賤可以無惑下以姦罔上則君長雖尊亦必至於勞示之以好惡而使知禁則民無惑矣以行為法而不重辭則君不勞矣廬陵胡氏曰上懐疑則民惑於好惡下不易知則君勞於聽察故君當明好惡以示民臣不可強君以所難知難行之事鄭謂不援所不及不必使其君所行如堯舜也孟子曰我非堯舜之道不敢以陳於王前又曰人皆可以為堯舜謂堯舜為不可及不可也謂不必使其君如堯舜亦不可也鄭氏誤矣黄氏曰臣儀行不重辭君上能章好愼惡則臣下儀象其上崇貴徳行而不重辭華也不援其所不及者謂賢者在位皆守亷讓不貪禄競位無躁求之義也不煩其所不知者謂各司其職而思不出其位之義也臣下如此則君上不勞而治矣山隂陸氏曰行不重辭禮辭而已禮辭臣之儀也即應固辭固辭然後為義子曰政之不行也教之不成也爵禄不足勸也刑罰不足恥也故上不可以䙝刑而輕爵康誥曰敬明乃罰甫刑曰播刑之不迪鄭氏曰言政教所以明賞罰康康叔也作誥康誥甫刑皆尚書篇名也播猶施也不衍字迪道也言施刑之道孔氏曰此一篇明愼賞罰之事賞罰不中則勸懲失所君上不可輕䙝之周公作誥告康叔云女所施刑罰必敬而明之甫刑穆王戒羣臣言所為監者皆是伯夷布刑之道引之者證重刑之義案皇氏曰言在上政令所以不行教化所以不成者秪由君上爵禄加於小人不足勸人為善刑罰加於無罪之人不足恥其為惡賞罰失所故政不行教不成也藍田吕氏曰爵禄不足勸善刑罰不足恥小人此之謂䙝刑輕爵失君人之道矣上言好惡此言爵禄刑罰蓋好惡本諸心爵禄刑罰施於政心術不正則政刑從之不可不愼也敬明乃罰播刑之不迪言用罰不可不敬施刑不可不循其道也馬氏曰政教者爵禄刑罰之本爵禄刑罰者政教之一端政已行教已成則期命辨説之已乆天下曉然知善惡之所在故加之爵禄曉然知善之可勉加之刑罰曉然知惡之可恥世衰道微政教不立雖加以爵賞而不足勸加以刑罰而不足恥蓋不知善惡之所在故也當此之時為上者不可以䙝刑而輕爵當以政教先之也敬明乃罰言先敬明其徳而後乃罰之賞罰者古人有之而非所以先之也古人有之故三代之賞罰未嘗廢非所以先之故九變而後賞罰可言長樂陳氏曰政之不行教之不成則上失其本而區區於爵禄刑罰之末則人將有不從者矣故雖爵禄之榮人情所甚欲也且不足以勸其為善刑罰之威人情所甚惡也且不足以恥其為惡爵禄不足勸則輕爵以予人猶無益也故上不可以輕爵刑罰不足恥則䙝刑以加物猶不足禁也故上不可以䙝刑敬明乃罰者敬以致其謹明以致其察則不可䙝刑之意也播刑之不迪書以為播刑之迪迪之為言道也先王之於人道之而弗率然後加刑焉是則用刑也者必不在於政之行教之成也政不行教不成而䙝刑則所謂播刑之不迪石林葉氏曰政以養民者也教以率民者也養之備教之詳然後爵禄以勸善刑罰以懲惡則民孰不勸且恥乎不先於教民勸且恥則刑之用也䙝爵之用也輕禮記集説卷一百四十一
