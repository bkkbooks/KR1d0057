body:
  text: 禮記集說卷十五宋衛湜撰檀弓上第三孔氏曰姓檀名弓今山陽有檀氏以其善於禮故著姓名以顯之此於别録屬通論此檀弓在六國之時知者此篇載仲梁子是六國時人故也公儀仲子之喪檀弓免焉仲子舍其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子於門右曰仲子舍其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫鄭氏曰公儀魯之同姓周禮適子死立適孫為後仲子所立非也禮朋友皆在他邦乃袒免檀弓故為非禮以非仲子也居讀為姬姓之姬齊魯之間語助也前猶故也檀弓去賔位就主人兄弟之賢者而問之子服伯子蓋魯大夫仲孫蔑之𤣥孫子服景伯也伯子為親者隱耳文王立武王權也微子適子死立其弟衍殷禮也孔子曰立孫據周禮孔氏曰此一節論仲子廢適立庶為檀弓所譏之事仲子喪亡檀弓與之為友非處他邦為之著免故為重服譏其失禮也所以譏者仲子適子死舍適孫而立庶子故也何居猶言是何道理乎前聞言我未聞古昔有此事也既言之後乃從賔位趨而就子服伯子於門右案賔位之法隨主人而變小斂之前主人未忍在主位有事在西階下賔亦弔於西階故士喪禮君使人襚主人拜送拜賔即位西階下東面鄭云未忍即主人位是也小斂之後尸出堂廉然後有飾主人位在阼階下西面賔於東階下弔也故士喪禮小斂訖男女奉尸侇于堂主人降自西階即位踊襲絰于序東是也檀弓之來當在小斂前蓋以仲子初喪即正適庶之位也初於西階行譏弔而主人未覺後乃趨向門右問於伯子舍適孫立庶子是何禮也伯子乃為隱諱言仲子雖生周世猶上行古之道也言亦者餘人有行古之道仲子亦如餘人也唐陸氏曰免以布廣一寸從項中而前交於額上又卻向後繞於髻長樂陳氏曰木之正出為本旁出為枝子之正出為嫡旁出為庶故伐枝不足以傷木伐其本則木斃矣廢庶不足以傷宗廢其嫡則宗絶矣本固而枝必茂嫡立而庶必寧此天地自然之禮也先王知其然於是貴嫡而賤庶使名分正而不亂爭奪息而不作故子生則冢子接以大牢庶子少牢冢子未食而見庶子已食而見冠則嫡子於阼階庶子於房外死嫡子斬庶子期其禮之重輕隆殺如此豈有他哉以其傳重與不傳重故也禮曰庶子不祭祖明其宗也又曰庶子不祭禰明其宗也史曰父不祭於支庶之宅君不祭於臣僕之家此嫡庶之分不可不辨也昔公儀仲子舍孫立子而檀弓弔以免司寇惠子舍嫡立庶而子游弔以麻衰皆重其服以譏之欲其辨嫡庶之分而已春秋之時宋宣公舍子與夷立弟穆公穆公又舍子馮立與夷而與夷卒於見殺莒紀公黜太子僕愛季他而卒於召禍晉獻公殺世子申生立奚齊而卒以亂晉齊靈公廢太子光立公子牙而卒以亂齊蓋嫡一而已立之足以尊正統而一人之情庶則衆矣立之則亂正統而啓覬覦之心宋莒齊晉之君不察乎此每每趨禍良可悼也禮書嚴陵方氏曰免之為服特施於五世之親耳而朋友死於他邦者亦服之仲子之於檀弓既非五世之親而其喪又非死於他邦者檀弓為之免焉蓋非所服而服之也服非所服之服所以譏立非所立之意耳馬氏曰古者朋友之喪若兄弟而無服其弔哭則麻絰可也蓋死喪之威致哀戚者唯兄弟而已若朋友皆在他邦而無宗族兄弟乃得施親親之恩相為袒免檀弓之免子游之麻絰非皆在他邦者也而其服有過焉以為仲子之舍孫惠子之立庶而父兄不能正是猶無親也檀弓子游雖有朋友之道欲正而不可得故重為之服所以視其親言唯親則有可正之恩就臣之位所以視其臣言唯臣則有可正之義山隂陸氏曰古之人諫救人失其婉有如此者矧在言語之際乎故子貢曰夫子不為也以問伯夷叔齊而知之此其所以在言語之科歟居讀如字亦語辭也詩曰日居月諸伯子之言非隱也是其心所謂然也廬陵胡氏曰武王之立以功非當立也事親有隱而無犯左右就養無方服勤至死致喪三年事君有犯而無隱左右就養有方服勤至死方喪三年事師無犯無隱左右就養無方服勤至死心喪三年鄭氏曰隱謂不稱揚其過失無犯謂不犯顏而諫論語曰事父母幾諫左右謂扶持之方猶常也子則然無常人勤勞辱之事致謂戚容稱其服此以恩為制也有犯無隱謂既諫人有問其國政者可以語其得失若齊晏子為晉叔向言之就養有方不可侵官也方喪資於事父此以義為制也心喪戚容如父而無服此以恩義之閒為制也孔氏曰此一節論事親及君師之法臣子著服之義凡言左右據僕從之臣立有左右此左右言扶持之謂但是子或左或右奉持之不常遣一人在左一人在右故鄭云無常人也服勤謂服持勤苦勞辱之事致之言至也謂哀情至極而居喪禮也方喪謂比方父喪也事師無犯是同親之恩無隱是同君之義長樂陳氏曰於親則致喪以其恩厚而服重也於君則方喪以其資於事父以事君而敬同也於師則心喪以其如喪父而無服也先王制禮稱事以為情稱情以為文子生三年而後免於父母之懷故喪必三年而後可以為之報然則君者所以覆我師者所以成我是亦恩與親等矣其可以不三年乎蓋親之所以育我仁也必報之以仁自有隱至於致喪皆所謂仁也君之所以覆我義也必報之以義自有犯至於方喪皆所謂義也師之所以成我同乎仁而不全乎仁同乎義而不全乎義故無犯與親同無隱則與親異無隱與君同無犯則與君異喪三年則與君親同無服則與君親異師之有喪不始於古蓋先王之變禮歟古者立學校以教民一道德以同俗方是時也教出於君恩歸於上夫又孰為喪師之禮哉季世而下家則有學人則有師此喪師之禮所以起也嚴陵方氏曰就養者就而養之且不離也服勤者服其勤勞而不釋也於養言左右則養無所不至矣於勤言至死則勤無時或已矣致喪者言盡其所至也孔子曰子生三年然後免於父母之懷三年天下之通喪以為報之不如是不足以盡其所至焉非親也孰為之生非君也孰為之治非師也孰為之教君親之與師亦相須而後成吾之身者也所命之名雖異所致之功則同吾之所以報之者冝如何哉亦惟其稱而已故其喪之也或以致或以方或以心雖各不同至於所以盡三年之隆則一也欒共子曰民生於三事之如一蓋謂是矣其序先親而後君者內外之分也先君而後師者貴賤之等也馬氏曰孝子之事親以恩為主父母有過不忍使之得鄉黨州閭之罪故有隱所以為仁人臣事君則不然上無所阿下無所比君有失道蓋如日月之食焉人皆見之則公卿大夫同心協議救其惡可也故不必有隱所以為義然由怨懟以訕上者仁人不為此孔子去魯欲以微罪行者亦依於仁而已矣唯諫爭則君臣之間許有犯焉而不必有隱蓋沈濳剛克髙明柔克而欲使守忠勵節之人得以直其道而已父子之道以犯而離則不可去以犯而夷則不可死故怡聲下氣以幾諫至於不義則子爭於父猶臣爭於君也而豈無犯乎故有隱無犯者事親之仁及其變也以義終之則不能無犯有犯無隱者事君之義及其變也以仁終之則不能無隱若夫師者所受教而非教之者也故無犯則不全君臣之義親其賢愛其道有故而合非天性者也故無隱則不全父子之仁惟其三者不同道是故有事服勤雖皆至死然其致喪之禮顏色稱情戚容稱服者父母而已而君之喪則資於父以制之者也其敬同其愛則異故衰麻飲食方於父而其哀不及焉致喪則盡其情方喪則備其禮古之人服父母之喪自上世以來未有改三年者蓋其情不可變也至於為君之喪以義之故後世之為君服以日易月以月易年而遂除之者止言其服不責以情則其禮亦可從時王之制也若夫為師則心喪而已雖有哀戚之情而不為齊斬之服何者學校有師皆出於先王命教之所使而學之者亦無常師教出於上則不可歸德於師師無常則不能皆為三年之喪然則孔子之喪門人若喪父而無服者蓋上世以來未嘗有也則亦以心致其哀而已矣山隂陸氏曰隱謂恐傷親意情有不盡所謂幾諫是也雖號泣而隨之蓋亦如此左右就養其親豈特扶持之而已事君有犯而無隱君臣尚義雖盡情以諫可也若以謂無隱得稱揚其過失豈事君之道哉豈事師之道哉蓋臣子揚美隱惡君親一例也故或問昭公知禮乎孔子曰知禮事師無犯無隱蓋言雖盡情猶微而婉子路曰有是哉子之迂也此季路之事耳廬陵胡氏曰方猶所也不擇地而安之致喪三年致謂哀到無隱謂匿情就養有方有常職臨川王氏曰君之喪重於師者既教之又養之也橫渠張氏曰有犯無隱勿欺也而犯之寧犯則可不可欺也古不制師服師服無定體也見彼之善而已效之亦師也故有得其一言一義而如朋友者有親炙如兄弟者有成就己身而恩如天地父母者此豈可一概服之故聖人不制其服心喪之可也孔子死門人一時心喪又豈可責其一槩以傳道久近而各盡其哀之隆殺如子貢獨居三年而後歸也如言二三子皆絰而出羣居則絰也或曰弔服加麻亦是服也却不得謂無服也河南程氏曰師不立服不可立也當以情之厚薄事之大小處之如顏閔於孔子雖斬衰三年可也其成己之功與君父並其次各有淺深稱其情而已下至曲藝莫不有師豈可一槩制服季武子成寢杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以來未之有改也吾許其大而不許其細何居命之哭鄭氏曰武子魯公子季友之曽孫季孫夙自見夷人冢墓以為宅欲文過記此者善其不奪人之恩孔氏曰此一節明不奪人之恩兼論夷人冢墓為寢欲文過之事武子自云合葬之禮非古昔之法從周公以來始有合葬至今未改我成寢之時謂此冢墓不須合葬故平之以為寢是文飾其過也先儒皆以杜氏喪從外來就武子之寢合葬與孔子合葬於防同又案晏子春秋景公成路寢之臺逢於阿盆成適後喪並得附葬景公寢中與此同也聽之葬是許其大哭是細也橫渠張氏曰季武子成寢杜氏之葬在西階之下此必是殯故取其柩以歸合葬也自伯禽至於武子多厯年豈容城中有墓嚴陵方氏曰周官墓大夫之職凡爭墓地者聽其獄訟當是時豈有夷人之墓以成寢者哉而季子乃有是事者由周官之法壞故也馬氏曰聖人盡人道以送死者故夫婦合葬所以從生者之志詩曰榖則異室死則同穴蓋其生則雖有禮以限內外之别而其死未嘗不同所歸是故葬則同穴附則同壙祭則同几體魄既降魂氣在上而先王設為喪祭之禮必有以聚其散附其離而同之者所以合鬼神而立至教也山隂陸氏曰請遷於外而合葬之先儒謂杜氏之喪從外來就武子之寢合葬不近人情廬陵胡氏曰鄭云記此者善其不奪人之恩非也譏其夷人之墓顧為是瑣瑣耳子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汙則從而汙伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也鄭氏曰子上孔子曽孫子思伋之子名白其母出禮為出母期父卒為父後者不服耳汙猶殺也有隆有殺進退如禮自子思始記禮所由廢非之也孔氏曰此一節論子上不喪出母之事出妻之子為父後則與尊者為一體不敢服其私親子思既在則子上當為出母有服故門人疑而問之云子之先君子謂孔子也今子喪出母乎子思曰然伯魚之母被出死期而猶哭是喪出母也道猶禮也子思言吾先君子無所失道道有可隆則從而隆謂父在為出母冝加隆厚為之著服道汙者汙猶殺也若禮可殺則從而殺謂父卒子為父後禮當減殺不為著服也子思自以才能淺薄不及聖祖故云伋則安能橫渠張氏曰孔子之母雖不正然非遭出當其死也安得不以母服服之當時正是死不在孔氏之家遂疑以為出子思於此又難以劇論故但言先君子無所失道謂無不中禮也此語最好子思不使白也喪出母必是子思止有一子故不使喪出母適長則不為出母服也言不喪出母自子思始非謂孔氏世世有出母特於子思見此事耳道隆則從而隆道汙則從而汙亦就其出母以定汙隆聖人則處情子思則守禮出妻不當使子喪之禮也子於母則不可忘若父不使之喪子固不可違父當默持心喪亦禮也若父使之喪而喪之亦禮也子思以為我不至於聖人不敢不循理而孔子使喪出母乃聖人處權子思自以為不敢處權唯循理而已不敢學孔子也故曰先君子無所失道道隆則從而隆道汙則從而汙孔子所為皆義也但子思未識聖人之意所以不敢學也道即義也隆髙也汙下也義髙則禮亦髙義下則禮亦下長樂陳氏曰夫之於妻有出之之禮子之於母無絶之之道故不為父也妻不可謂之不為子也母以其不可謂之不為子也母故死而必喪以其不為父也妻故止於期年而已喪之者恩也期年者義也義資恩以為用恩資義以為斷此喪出母之禮也儀禮曰出妻之子為母期故伯魚之母死期而猶哭孔子以之為甚是哭於期年之內則可哭於期年之外則甚也子上之母死而不喪子思謂先君子之無失道者以情徇道而未嘗以道徇情也道隆則從而隆故喪出母道汙則從而汙故止於期年而已若伋則以道㣘情而不能以情徇道故為伋也妻是為白也母不為伋也妻是不為白也母嗚呼君子之於禮不知而不行者其過小知而不行者其過大子思知而不行而以不能自詘此所以不為君子取也嚴陵方氏曰父在而服出母期此從道之隆也父沒而為後則不為之服此從道之汙也君子之於禮過者俯而就之不至者跂而及之而已子思乃有安能之語豈為知禮之道哉馬氏曰夫婦以義合亦可以義離子母之恩無絶也雖子之於出母猶必喪之而父亦不得禁焉蓋夫婦失義不可以奪子母之恩也子思之不使白也喪出母則既薄矣又從而為之辭其可乎石林葉氏曰汙隆猶言升降道可以恩而上之者謂之隆故父在無嫌則與之俱隆而服期道可以義而殺之者謂之汙故父沒而為人後不可以有二本則與之俱汙而不為服此人之所可勉也而子思自以為不能而使白絶其母故記不喪出母自子思始異父禮亦謂之繼父繼父同居則服期不同居則不服自其母推之也此亦服者其隆而不服者其汙也異父既服期則其昆弟死視異父以為差而服大功子游之言是矣而子夏不及知乃自以未之前聞而從魯人齊衰以答狄儀之問所以記今之齊衰狄儀之問也出母之無服非所汙而汙異父昆弟之齊衰非所隆而隆君子是以謹之近世士大夫多疑於出母與異父之喪服不服率自其意而莫能一殆未嘗學禮之過歟孔子曰拜而后稽顙頽乎其順也稽顙而后拜頎乎其至也三年之喪吾從其至者鄭氏曰頽順也先拜賔順於事也此殷之喪拜頎至也先觸地無容哀之至此周之喪拜重者尚哀戚自期如殷可孔氏曰此一節論殷周喪拜之異拜者主人孝子拜賔也稽顙者觸地無容也拜是為賔稽顙為已前賔後已頽然而順序也頎惻隱之至也鄭知殷周喪拜之異者以孔子所論每以二代相對皆先殷而後周也長樂陳氏曰拜而後稽顙頽乎其順也以其先致敬故也稽顙而後拜頎乎其至也以其先致哀故也孔子之時禮廢滋久矣天下不知先稽顙之為重而或以輕為重是猶不知拜下之為禮拜上之為泰而或以泰為禮故孔子救拜之弊則曰吾從其至救泰之弊則曰吾從下凡欲禮之明於天下而已禮書馬氏曰記曰三年之喪喪拜非三年之喪以吉拜當周之衰蓋人不知喪拜之儀故孔子遂及之言雖拜起之末猶欲不失其序非知制作之情者孰能盡於此此動容周旋中禮所謂盛德之至也鄭氏以此為殷周拜而於經無所見豈其然乎孔子既得合葬於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺孔子先反門人後雨甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三孔子泫然流涕曰吾聞之古不修墓鄭氏曰言既得者少孤不知其墓也古謂殷時墓謂兆域今之封塋也土之髙者曰墳東西南北言居無常處聚土曰封封之周禮也周禮曰以爵等為丘封之度崇髙也髙四尺蓋周之士制孔子先反修虞事也門人後待封也門人言所以遲者修之而來孔子不應以其非禮也門人以孔子不聞三言之修猶治也孔氏曰此一節論古者不修墓之事天子之墓一丈諸侯八尺其次降差以兩孔子自謂東西南北不恆在鄉若久乃還歸不知葬之處所故不可不作封墳記識其處父叔梁紇雖為大夫周禮公侯伯之大夫再命與天子中士同鄭注士制謂天子之士也泫然流涕自傷修墓違古致令今崩重修也庾氏曰防守其墓備擬其崩馬氏曰周官冢人以爵等為丘封之度而不必於命數則封之崇四尺者庸知非大夫之制歟橫渠張氏曰防墓崩門人後至孔子是時十七歲安得已有門人或是時聖人固有門人矣廬陵胡氏曰作墓時當為堅久之計不可令崩壞而加治廣安游氏曰古者墓而不墳坎其中而踐其左古人達於死生之變非若後世滯於形魄故曰葬者藏也為使人弗見而已苟為弗見則去之矣中古之世如此及夫後世不明死生之故而滯於體魄送死墳墓之事始加詳矣其加詳有二焉厚葬一也墓祭二也古人以為死者魂氣歸於天形魄歸於地於人之始死而為之重既葬而為之主召致其魂氣而祭之於體魄則無所事焉故既葬則去之為此也及夫後世始封為墳夫既已為之墳則孝子仁人之見之固亦有所不忍此雖後世之異於古亦人情所不能已也孔子之葬其親自以為不常居鄉恐去而還不知葬所因而識之以此觀之孔子之志本以封之為當然也及夫既葬還修虞祭門人之從孔子者以其墓崩修之而後至孔子有所動心乎此孔子不應門人三言之孔子泫然出涕以為古不修治其墓焉既葬則去去則不復修蓋孔子欲盡從今世之禮則非達者之心欲盡從古之道而不修則去其心亦有所不安於此故泫然流涕而言之延陵季子之葬其子孔子以為知禮此則古者聖達之本懷然世變之異而人心不同則雖君子之心有不安於此故難言之耳古之聖人通乎晝夜之道而知死生之說鬼神之故非若後世之不學者暗然而不知也宋人始厚葬其君君子非之漢明帝始墓祭其親蔡雍與之夫厚葬無益於死有害於人冝為君子之所非若夫蔡雍之見則亦為其心有所不忍雖君子有所不能已此則孔子封墓崇四尺而又言古不修墓泫然流涕之意後之學者可以考焉廣漢張氏曰墓祭非古也體魄則降知氣在上故立之主以祀以致其精神之極而謹藏其體魄以竭其深長之思然考之周禮冢人之官凡祭於墓為尸是則成周之時固亦有祭於墓者雖非制禮之本經而出於人情之所不忍其於義理不至於甚害則先王亦從而許之孔子哭子路於中庭有人弔者而夫子拜之既哭進使者而問故使者曰醢之矣遂命覆醢鄭氏曰寢中庭也與哭師同親之也拜弔者為之主也使者自衛來赴者故謂死之意狀時衛世子蒯聵篡輒而立子路死之醢之者示欲啖食以怖衆覆棄之不忍食孔氏曰此一節論師資之恩下文云師吾哭諸寢今哭於中庭故鄭云與哭師同子路結纓而死見哀公十五年左傳臨川王氏曰孔子乃哭子路與師同或者哭弟子之禮當如師猶服之有報乎長樂陳氏曰顏淵之死正命也子路之死非正命也孔子哭顏淵哭其正命之短哭子路哭其非正命之終蓋顏淵全於人而未全於聖子路全於義而未全於人全於人而未全於聖則其死者天也全於義而未全於人則其死者人也孔子哭之則同其所以哭之則異蓋死者非難處死者難死有甚於生君子死而不生生有甚於死君子生而不死可死而死君子輕之如鴻毛可生而死君子重之如泰山雖然可以死可以無死死之雖傷勇而不失其為義不死雖傷怯而亦可以為仁是以召忽於子糾則死之管仲則不死孔子不非召忽而多管仲者以召忽不失為義而管仲可以為仁也子路於衛君之事可謂不失為義而已孔子哭於中庭視之猶子也有人弔焉而夫子拜之自視猶父也遂命覆醢者非特不忍食之又不忍見之也山隂陸氏曰哭以師友之間進之也廣安游氏曰衛世子蒯聵得罪於父靈公出奔靈公死無所立立蒯聵子輒是為出公出公既立蒯聵欲歸迫孔悝強盟之劫以登臺而出公出奔子路聞變而死之孔子於蒯聵之書嘗曰世子某言其不當廢而廢也於出公書輒者言其不當立而立也於伯夷叔齊之事言求仁而得仁又何怨亦所以惡輒也雖然出公雖大惡而子路學於孔子之門有古義焉子路之失失於執古義而不知變也子路委贄於出公而死之此得君臣之義耳然知君臣而不知父子以亂大倫仲尼之徒不至是也琴張聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉夫宗魯死於宗孟與子路死於出公一也宗魯死孔子以為不足弔子路死孔子哭之如此其哀其去就之分可知也孔子之與伯夷叔齊為出公言也哭子路之死為子路言也若此者君子可以見矣曽子曰朋友之墓有宿草而不哭焉鄭氏曰宿草謂陳根也為師心喪三年於朋友期可也孔氏曰曽子孔子弟子姓曽名參字子輿魯人也嚴陵方氏曰師猶父朋友相視猶兄弟既以喪父之義處喪師則以喪兄弟之義處喪朋友不亦可乎墓有宿草則期年矣是以兄弟之義喪之也然必以墓草為節者蓋生物既變而慕心可已故也子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣喪三年以為極亡則弗之忘矣故君子有終身之憂而無一朝之患故忌日不樂鄭氏曰言三日三月欲其盡心修備之附於身謂衣衾附於棺謂明器之屬終身之憂謂念其親無一朝之患謂毁不滅性也忌日謂死日不用舉吉事孔氏曰此一節論喪之初死及葬送終之具須盡孝子之情及思念父母不忘之事也三日殯三月葬據大夫士禮也棺中物少三日可辦棺外物多三月可就悉用誠信各令合禮不使少有非法後追悔咎焉耳矣者助句之辭親喪以經三年以為極亡可以棄忘而孝子有終身之痛曽不暫忘於心也雖終身念親而不得有一朝滅性之患故唯忌日不為樂事恐其常毁也唐陸氏曰王以極字絶句亡作忘向下讀馬氏曰君子之事親無所不用誠信而至於明器則備物而不可用者亦可以為誠信乎蓋之死而致死之不仁而不可為也之死而致生之不知而不可為也明器之用仁知之道誠信之至者也知此則可以無悔也金華應氏曰附於棺者若卜其宅兆丘封壤樹之事不獨明器之屬也嚴陵方氏曰經曰緦小功以為殺期九月以為間三年以為隆故三年之喪所以為喪之極也亡則弗之忘矣者死者之形雖亡而生者之心未嘗忘之也忌日不樂蓋終身之憂有見於此長樂陳氏曰君子之於親有終制之喪有終身之喪終制之喪三年是也終身之喪忌日是也文王之於親忌日必哀而不樂豈非能全終身之憂乎有終身之憂仁也無一朝之患義也山隂陸氏曰言喪三年以為中爾若其亡則未之或忘廬陵胡氏曰終身之憂永慕也內則云終身也者非終父母之身終其身也忌日不樂有戚容忌舉吉事孔子少孤不知其墓殯於五父之衢人之見之者皆以為葬也其慎也蓋殯也問於郰曼父之母然後得合葬於防鄭氏曰孔子之父郰叔梁紇與顏氏之女徵在野合而生孔子徵在恥焉不告慎當為引禮家讀然聲之誤也孔氏曰此一節論孔子訪父墓之事孔子既少失父其母不告父墓之處今母既死欲將合葬不知父墓所在意欲問人故殯母於五父之衢欲使他人怪而問已因得詢知父墓所在外人見柩行於路皆以為葬但葬引柩之時飾棺以柳翣其殯引之禮飾棺以輤夫子飾其所引之棺以輤故知非葬蓋殯也殯不應在外故稱蓋為不定之辭於時郰曼父之母素與孔子母相善見孔子殯母於外怪問孔子孔子因而問之始知父墓所在而後得以父母尸柩合葬於防鄭注野合謂不備於禮也如論語所謂野人及野哉由也但徴在恥其與夫不備禮為妻故不告也家語云叔梁紇年餘七十無妻顏父有三女顏父謂其三女曰鄒大夫身長七尺武力絶倫年餘七十誰能與之為妻二女莫對徴在進曰從父所制將何問焉父曰即爾能矣遂以妻之而生孔子三歲而叔梁紇卒橫渠張氏曰孔子殯母於五父之衢以在衢故其殯周密有如葬然故人之見之者皆以為葬也其實是殯之周慎故曰其慎也蓋殯也其慎也屬下讀之則意明據舊說孔子喪母時十七歲十七歲何故不知墓或是孔子養於母家母不告之也家語是其家所傳難於直說據傳記直謂野合謂不備禮也合葬附葬也叔梁紇自有正妻亦不可知也嚴陵方氏曰左氏傳所謂詛諸五父之衢是矣衢則四達之道也馬氏曰叔梁紇宋人而喪葬之制蓋從於古墓而不墳此孔子少孤所以不知墓也山隂陸氏曰慎讀如字慎誠也蓋曰其誠也蓋殯也詩曰豫慎無辜廬陵胡氏曰問於郰曼父之母然後得合葬於防曼父之母與徴在鄰蓋在五父衢也此一經疑在孔子既得合葬於防之前鄰有喪舂不相里有殯不巷歌喪冠不緌鄭氏曰相謂以音聲相勸不相不歌皆所以助哀也不緌去飾廬陵胡氏曰趙良謂商君曰五羖大夫死舂者不相古謳謡之名多曰相詳見曲禮舂不相解緌冠纓所謂蟬有緌有虞氏瓦棺夏后氏堲周殷人棺椁周人牆置翣周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤鄭氏曰有虞氏上陶始不用薪也火熟曰堲燒土冶以周於棺也或謂之土周由是也殷人上梓椁大也以木為之言椁大於棺也牆柳衣也凡此言後王之制文周人葬長殤以下不同略未成人也孔氏曰此一節論棺椁所起及用棺椁之差易繫辭古之葬者厚衣之以薪有虞氏始不用也堲周謂堲土為陶冶之形大小得容棺也殷人上梓考工記文鄭引之以證椁也案喪大記注云在旁曰帷在上曰荒帷荒所以衣柳則以帷荒之內木材為柳其實帷荒及木材等總名曰柳故縫人云衣翣柳之材注云柳之言聚諸飾之所聚是帷荒總稱柳也有虞氏唯有瓦棺夏后氏瓦棺之外加堲周殷則易以棺椁周人又於椁旁置柳置翣扇凡此是後王之制漸加文也白虎通云夏以揖遜為君故稱后殷周行仁義人所歸往故稱人馬氏曰有虞氏瓦棺而至夏后氏乃以堲周周之有棺之象商人以瓦棺堲周皆陶冶之器而陶冶出於土及其久也必復於土不能無使土親膚遂以木易之木足以勝土而仁人孝子之所以深慮長思者未有易此聖人之法相待而後備故周人則緣商人之棺椁飾之以牆置翣棺椁以比化牆置翣以為觀美皆所以盡孝子之心無使惡於死而已當周衰禮義散亡而人不知棺椁之度故中都四寸之棺五寸之椁而後以為出夫子之制孟子敦匠而充虞以為美不知自周公以來蓋已有禮也惟其葬殤有異於成人之禮故瓦棺堲周與夫棺椁皆以少長制之而不為貴賤之等何者天下無生而貴雖君卿大夫之子猶士也尚何有貴賤之别乎長則其形強少則其形弱形強則其化難形弱則其化易古之人葬殤其棺椁必視長少者蓋以此而已唐陸氏曰十六至十九為長殤十二至十五為中殤八歲至十一為下殤七歲已下為無服之殤生未三月不為殤嚴陵方氏曰椁之於棺如城之有郭也牆以帷柩而周圍如牆翣以飾柩而翼蔽如羽蓋世愈久而禮愈備故也長殤而下死者愈少則禮愈殺也夏后氏尚黑大事斂用昏戎事乘驪牲用𤣥殷人尚白大事斂用日中戎事乘翰牲用白周人尚赤大事斂用日出戎事乘騵牲用騂鄭氏曰夏以建寅之月為正物生色黑大事謂喪事昏時亦黑戎兵也馬黑色曰驪爾雅曰騋牝驪牡𤣥牲用𤣥黑類也殷以建丑之月為正物芽色白日中時亦白翰白色馬也易曰白馬翰如周以建子之月為正物萌色赤日出時亦赤騵駵馬白腹騂赤類孔氏曰此一節論三代正朔所尚色不同夏尚黑殷尚白周尚赤此之謂三統故書傳略說云天有三統物有三變故正色有三又春秋緯元命包云夏以十三月為正以寅為朔殷以十二月為正以雞鳴為朔周以十一月為正以夜半為朔三正記云子月為正以陽始生物得陽氣稍變動故為天統丑月物在地中含養萌芽故為地統寅月物出於地當須人功故為人統統者本也謂天地人之本也然王者必以此三月為正者以其此月物之始生王者繼天理物含養微細又取其歲初為正朔之始天地人所繼不同故正朔不相襲也萌是芽之細故鄭注建子曰萌建丑曰芽臨川王氏曰此似見詩有駟騵彭彭遂有乘騵乘翰之别馬以共戎事若皆以一物則可以給戎者鮮矣或者止以此物供貴者則理有可通也長樂陳氏曰民受天地之中以生其性命之所受與天為一則其好惡取舍不與天違聖人因民以觀天因天以立事故於民心之所安者因之而不強去民心之所厭者革之而不強行此三代所以改正朔也蓋正者政之所繫朔者月之所始夏正以建寅殷正以建丑周正以建子以天言之則陽生於子而萬物資始建子之月為得正以地言之則陽含於丑而萬物資生建丑之月為得正以人言之則陽出於寅而人順以動建寅之月為得正三代之正朔雖不同至於頒政令授民事莫不以夏正為正故周官凡觀象讀法均食施事皆繫之正歲詩七月流火九月授衣四月維夏六月徂暑禮稱季夏六月祀周公凡此皆夏正也孔子於春秋用時王之正其論為邦則曰行夏之時者夏之時據人之所見而人之所見者質也孔子乘殷之木輅服周之純冕皆以其質而已此所以救文弊也春秋書大事於太廟傳曰國之大事在祀與戎祭義曰夏后氏祭其暗殷人祭其陽周人祭日以朝及暗是以子路之與祭質明而始行事晏朝而退孔子以為知禮則大事用日出者祭以朝之質明也祭以朝之質明斂亦如之故曰大事斂用日出嚴陵方氏曰滕文公之居喪也曰恐其不能盡於大事則喪為大事可知春秋傳曰國之大事在祀與戎則戎事之為大事可知喪事凶禮也戎事軍禮也祀事吉禮也五禮不及於賔嘉者以非大事故也金華應氏曰夏后治水而水德王故其色尚黑殷人征伐而以金德王故其色尚白周木德也而色尚赤亦豈非取木之所生而用火之色乎穆公之母卒使人問於曽子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達布幕衛也縿幕魯也鄭氏曰穆公魯哀公之曽孫問居喪之禮曽子曽參之子名申幕所以覆棺上縿縑也縿讀如綃衛諸侯禮魯天子禮兩言之者僭已久也幕或為幦孔氏曰此一節論尊卑之喪有同異之事有聲曰哭無聲曰泣齊是為母斬是為父厚曰饘希曰粥父母之喪哭泣以下自天子至庶人如一故曰自天子逹也覆殯椁之幕周公一人得用天子禮後代僭用之故曽申舉衛與魯俱是諸侯後代不冝異謂魯之諸公不冝與衛異也馬氏曰人未有自致者也必也親喪乎三年之喪則至矣故其哀發於聲音則為哭泣發於衣服則為齊斬發於飲食則為饘粥哭泣之哀齊斬之情饘粥之食乃其所以自致者由庶人逹於天子無所加損焉則哀素之極喪禮之至者也至於幕帟之飾末而已矣而得以隆殺焉此魯衛所以有縿布之辨也鄭氏以縿幕為魯僭天子之禮亦安知非其得用而曽子言之李氏曰先王之制小斂殯葬所以為死者之禮故自天子至於庶人有等哭泣齊斬饘粥所以盡生者之情故天子逹於庶人一也由前所以立禮由後所以立仁齊斬所以稱情而為之也故曰齊斬之情盱江李氏曰夫布幕諸侯禮也縿幕天子禮也疾魯之僭故舉諸侯以示之焉杞宋者各自為一王之後且其祖天子禮樂異於周行之可也周尚在而魯倣之則僭矣孔子曰唯名與器不可以假人嚴陵方氏曰衛所存者殷禮故用布幕之質魯所存者周禮故用縿幕之文山隂陸氏曰縿讀如字以縿記帛蓋衛幕用布魯用帛爾雅纁帛縿曽子言此著魯異於諸侯者若此類耳其情自天子逹廣安游氏曰父母之喪貴賤不殊此所以自天子逹也若幕則天子以綃諸侯以布穆公苟欲行禮所謂貴賤一者固當一也所謂天子諸侯異者固當異也此二者喪禮盡矣且禮文之制曽申獨舉幕而不舉其他則其他推是而可知晉文公請隧於王隧天子葬禮文公於葬獨請隧則其他亦從是而可知也天下之禮以類而為之者也苟於其類而或開之則其他皆將以類而失之此襄王所以不許文公也是故以隧而葬則葬禮視隧而相從者皆可知也以幕而殯則殯禮視幕而相從者皆可知也此曽申所以獨舉其一以見其餘也晉獻公將殺其世子申生公子重耳謂之曰子蓋言子之志於公乎世子曰不可君安驪姬是我傷公之心也曰然則蓋行乎世子曰不可君謂我欲弒君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生有罪不念伯氏之言也以至于死申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏苟出而圖吾君申生受賜而死再拜稽首乃卒是以為共世子也鄭氏曰獻公信驪姬之譖重耳欲使世子言見譖之意蓋皆當為盍盍何不也志意也世子謂言其意則驪姬必誅重耳曰盍行乎行猶去也世子謂天下豈有無父之國言人有父則皆惡欲弒父者使人辭於狐突辭猶告也前此獻公使申生伐東山皋落氏狐突謂申生欲使之行今言不念伯氏之言謝之也伯氏狐突别氏子少謂驪姬之子奚齊圖猶謀也不出謂狐突自皋落氏反後懼而稱疾焉賜猶惠也既告狐突乃雉經申生言行如此可以為恭於孝則未之有重耳申生異母弟後立為文公驪姬獻公伐驪戎所獲女也申生之母蚤卒驪姬嬖焉狐突申生之傅舅犯之父也孔氏曰此一節論獻公殺申生之事案僖四年左傳云姬謂太子曰君夢齊姜必速祭之太子歸胙於公公田姬置諸宫六日毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子是驪姬譖申生之事也左傳又云或謂太子曰子辭君必辨焉杜預注以六日之狀自理謂毒酒經宿輒敗若申生初置毒何以經六日其酒尚好明臨至加藥焉此重耳欲使言見譖之意也左傳又云太子曰君非驪姬居不安食不飽君老矣吾又不樂謂我若自理驪姬必誅姬死之後君無復歡樂此云是我傷公之心是也雉牛鼻繩也申生以牛繩自縊死或謂雉性耿介被人所獲必自屈折其頭而死漢書載趙人貫髙自絶亢而死申生當亦然也孝子不陷親於不義申生但能恭順於父事而已諡法曰敬順事上曰恭長樂陳氏曰君子之於親有言以明已有諫以明事諫則以幾為順以孰為敬幾而不入則至於孰孰而不入則至於號號而將至於見殺則亦有義以逃之是雖於親有所不從而於義無所不順於親或不我愛而於鄉閭無所得罪此古之所謂孝子也彼不善事親者以小愛賊恩姑息賊德於己可以言而不言於事可以諫而不諫依違隱忍惟意是從以至隕身於其親之命而陷親於不義之名是將以安親而反危之將以悅親而反辱之此君子之所不取也晉獻公將殺其世子申生申生於親可言而不言而且懼傷公之心於義可逃而不逃而且謂天下豈有無父之國以至忘其躬之不閲而且恤國家之多難不顧死生之大節而且謹再拜之末儀是恭而已非孝也春秋書晉侯殺其世子申生蓋書晉侯以明晉侯之無道書申生以明申生之罪也雖然春秋之時臣弒其君子弒其父如衛輒拒父而爭國楚商臣弒君而篡位則申生之行蓋可哀而恕之也孔子曰苟志於仁無惡也故禮不以申生為不孝而以之為恭猶詩不以伋壽為不孝而以之為不瑕也然以春秋禮義之法繩之則申生不足以為孝矣馬氏曰昔幽王惑於褒姒而逐太子冝臼奔于申太子之傅作小辨以刺之然君子不責冝臼以出奔之罪而謂小辨有孝子之道申生之事蓋與冝臼無以異也而申生失之特不知止於先王之禮義而已若衛宣公之二子爭相為死雖有殺身以成仁之志而其死之亦非義也然國人以其相為於禍難之中亦自作詩以思之而申生愛君父恤國難猶有善於彼雖非孝也而謂之恭則冝矣廬陵胡氏曰案春秋自閔二年至僖二十三年狐突事晉未嘗去此云不出記禮者誤禮記集說卷十五
