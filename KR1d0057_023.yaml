body:
  text: 禮記集説卷二十三宋衛湜撰喪不慮居毁不危身喪不慮居為無廟也毁不危身為無後也鄭氏曰慮居謂賣舍宅以奉喪危身謂憔悴將滅性嚴陵方氏曰君子將營宫室宗廟為先居室為後故曰喪不慮居為無廟也毁而死君子謂之無子故曰毁不危身為無後也延陵季子適齊於其反也其長子死葬於嬴博之間孔子曰延陵季子吳之習於禮者也往而觀其葬焉其坎深不至於泉其斂以時服既葬而封廣輪掩坎其髙可隱也既封左袒右還其封且號者三曰骨肉歸復于土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之於禮也其合矣乎鄭氏曰季子名札魯昭二十七年吳公子札聘于上國是也季子讓國居延陵因號焉嬴博齊地今泰山縣是也孔子往弔之坎不至泉以生恕死也斂以行時之服不改制節也輪從也隱據也封可手據謂髙四尺所亦節也右還還圍也號哭且言也命猶性也行去也孔氏曰此一節論仲尼言季子葬子得禮之事延陵一名延州來故左傳云延州來季子以生時不欲近泉故死亦不至于泉以生時之意以恕于死者斂服不更制造是其節也人長八尺低而據之半為四尺所所是不定之辭封墳已竟季子乃左袒其衣案鄭注覲禮云凡以禮事者左袒若請罪待刑則右袒喪亦是禮事但喪禮直云袒不云左右今季子長子之喪而左袒者達死生之命以自寬慰也左袒訖乃右而圍繞其封繞墳三匝號哭且言曰骨肉歸復于土乃自然之性人之骨肉乃食土物而生今還入土故云歸復若魂氣則無不之適不可更反再言之者愍傷離訣之意臨川王氏曰先王之制為長子三年服之如此其重則其哀戚不可不稱是也三號而遂行哀不足矣孔子曰喪事不敢不勉又曰喪不若禮不足而哀有餘也謂其葬于禮為合爾稱其合于禮所以譏其哀不足也哀不足則不可謂仁矣延陵之言蓋老莊之徒也或曰而遂行者君命不可緩也君命亦不可若此其急也不若此其急則命廢乎不廢則少遼緩之何為而不可得也嚴陵方氏曰坎深不至于泉則不至于太深斂以時服則不至于太厚廣輪掩坎則不至于太大其髙可隱則不至于太髙左為陽故袒之以變吉右為隂故還焉以示凶骨肉為隂則降而聚故言歸復于土魂氣為陽則升而散故言無不之夫骨肉之歸復于土魂氣之無不之是人情之所哀者然季子號之止于三則臨喪之哀為不足矣孔子始言其習終言其合者習存乎學合存乎行始聞其學禮而已故曰習終見其能行禮焉故曰合也邾婁考公之喪徐君使容居來弔含曰寡君使容居坐含進侯玉其使容居以含有司曰諸侯之來辱敝邑者易則易于則于易于雜者未之有也容居對曰容居聞之事君不敢忘其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢忘其祖鄭氏曰考公隱公益之曽孫考或為定容居欲親含非也含不使賤者君行則親含大夫歸含耳言侯玉者時徐僭稱王自比天子使大夫敵諸侯有司拒之易謂臣禮于謂君禮雜者容居以臣欲行君禮也駒王徐先君僭號容居其子孫也濟渡也西討渡河廣大其國魯魯鈍也言魯鈍者自明不妄孔氏曰此一節論徐國僭禮之事容居致其君命云寡君使容居親坐行含進侯玉于邾君此是使致詞也其使容居以含者此是記人録語云其使容居奉玉以行含禮鄭知君行則親含者上云曹桓公卒于會諸侯請含是也大夫歸含者雜記云諸侯之喪君使人弔含贈襚是也凡行含禮未斂之前以玉實口士則主人親含大夫以上則使人含若既斂已後至殯葬其有含者親自致璧于柩及殯上者謂之親含若但致命以璧授主人主人受之謂之不親含徐自比于天子以邾君為己之諸侯言進侯氏以玉故云進侯玉邾之有司乃拒之易謂簡易為臣禮于謂廣大為君禮容居聞舊日之言臣之事君奉命出使不敢忘其君之言子孫事祖亦不敢違我從先君駒王以來于諸侯無不稱王我若是曉利之人或妄稱先祖之善自言魯鈍朴實不解虗詐唯知不敢忘其祖也廬陵胡氏曰易猶治也如禾易長畝之易于舒大之義于者于于然而來之于漢史云單于大貌容居聞義不能徙子思之母死於衛赴於子思子思哭於廟門人至曰庶氏之母死何為哭於孔氏之廟乎子思曰吾過矣吾過矣遂哭於他室鄭氏曰子思之母嫁母也姓庶氏門人弟子也嫁母與廟絶族臨川王氏曰似嫁庶氏而鄭云母姓氏非也嚴陵方氏曰他室異室也以有别于正故謂之他以義起之而已天子崩三日祝先服五日官長服七日國中男女服三月天下服虞人致百祀之木可以為棺椁者斬之不至者廢其祀刎其人鄭氏曰祝佐含斂先病故先服官長大夫士也國中男女庶人也天下服諸侯之大夫也虞人掌山澤之官百祀畿內百縣之祀也為棺椁作棺椁也斬伐也孔氏曰此一節論天子崩尊卑服杖及葬備棺椁之事祝謂大祝商祝也服服杖也祝先服故先杖子亦三日而杖大夫士服在祝後故五日亦服杖也庶人謂畿內民及庶人在官者服謂齊衰三月必待七日者殯後嗣王成服故民得成服也諸侯之大夫為王繐衰既葬而除之也近者不待三月今據逺者為言耳然四條皆云服何以知其或杖或衰案喪大記云君之喪三日太子夫人杖五日既殯授大夫世婦杖喪服四制三日授子杖五日授大夫杖則知三日五日是服杖明矣其七日及三月者唯服而已無杖百祀者王畿內諸臣采地之祀也既殯旬而布材故虞人斬百祀之木可以為周棺之椁者送之也賀氏曰必取祀木者君者德著幽顯若存則人神均其慶沒則靈祇等其哀傷也嚴陵方氏曰喪人之冠帶衣裳杖屨通謂之服此所謂服特指杖爾夫杖所以扶病也祝先服者力勞而先病故也言祝先服則子可知矣官長以對祝言之則力有勞逸以對子言之則恩有重輕故五日而後服杖也七日國中男女服三月天下服言各服其所服之服非謂杖矣蓋不特以恩有重輕故服有先後亦以地有逺近而聞訃有早晚故也刎亦剄也自吻下刑之故也山隂陸氏曰言致百年之祀之木齊大飢黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫唯不食嗟來之食以至於斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食鄭氏曰蒙袂不欲見人也輯斂也斂屨力憊不能屨也貿貿目不明之貌嗟來食雖閔而呼之非敬辭從猶就也微猶無也無與止其狂狷之辭孔氏曰此一節論餓者狂狷之事餓者聞黔敖嗟已無敬己之心於是發怒揚舉其目而視之曰豫唯不食嗟來無禮之食以至于此困病曽子言初時無禮之嗟也可怒之而去其終有禮之謝也可返回而食微與言無得如此黃氏曰曽子之言乃舉世千萬人所同之心也餓夫之操豈在于斯乎蓋以衰亂之世君昏政暴災沴薦至而賢者不樂其生于世也故詩云知我如此不如無生此之謂也苟從曽子之言謝而復食能幾何哉豈若不屈其操不受其辱身雖一死而義存千古乎不然作記之人從何而載之孟子從何而舉之使千載而下施小惠者不敢矜傲竊幸苟生之人脅肩諂笑之輩聞其志則心寒股栗知所愧恥豈不盛哉故孟子曰萬鍾之祿妻妾之奉宫室之美反不顧禮義而居之誠可哀矣悲夫作記之人若去曽子之評引孟子為證則餓夫之志獲伸于名教之中久矣餘義嚴陵方氏曰飢則主歲言之也餓則主人言之也以交易為利者謂之貿貿貿然來若有所利而交故也廬陵胡氏曰輯斂也若輯杖然微與小之今之君子之急於祿食也嗟而不去不謝而食者多矣視餓者有愧也邾婁定公之時有弒其父者有司以告公瞿然失席曰是寡人之罪也曰寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在宫者殺無赦殺其人壞其室汙其宫而豬焉蓋君踰月而后舉爵鄭氏曰定公貜且也魯文十四年即位民之無禮不教之罪故曰寡人之罪也弒君弒父其罪無赦諸臣子孫皆得殺之壞其室汙其宫明其大逆不欲人復處之豬都也南方謂都為豬踰月舉爵自貶損也孔氏曰此一節論誅弒父之事鄭注諸臣解在官者子孫解在宫者臣之弒君凡在官之人無問貴賤皆得殺此弒君之人子之弒父凡在宫者無問尊卑皆得殺此弒父之人此在宫字諸本或為在官汙其宫謂掘汙其宫使水之積聚焉故云豬都也山隂陸氏曰凡在官者殺無赦謂弒君者同一官府亦坐焉爾弒父放此鄭氏謂弒父者凡在宫子孫皆得殺之是父子兄弟相殺終無己時也廬陵胡氏曰春秋弒逆多矣唯邾無弒逆之事故邾定公以為非常而驚也春秋書蔡人殺陳他明弒逆之賊人皆得討豬猶瀦言汙其宫而瀦水也鄭云豬都也恐非晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱鄭氏曰文子趙武也作室成晉君獻之謂賀也諸大夫亦發禮以往輪囷言髙大奐言衆多歌于斯哭于斯聚國族于斯言祭祀死喪燕會于此足矣欲防其後復為此張老心譏其奢也全要領者免于刑誅也晉卿大夫之墓地在九原京蓋字之誤當為原善頌謂張老之言善禱謂文子之言禱求也孔氏曰此一節論文子成室相頌禱之事張老心譏文子宫室飾麗故佯而美之奐謂其室煥爛衆多煥文章貌歌謂祭祀奏樂哭謂居喪哭泣聚國族謂燕聚國賔及會宗族也終始永足切勿復更造作文子覺譏故稱名述張老語言若得保此宅以歌哭終于餘年不被罪討是完全要領夀終而卒以從先大夫葬于九原也稽首謝過受諫也北面在堂禮也故鄉飲酒賔主皆北面領頸也古者罪重要斬罪輕頸刑先大夫謂文子父祖以其世為大夫故稱父祖為先大夫也案墓大夫云令國民族葬注云族葬各從其親是卿大夫墓地同在一處耳爾雅云絶髙為京廣平為原京非葬處原是墳墓之所嚴陵方氏曰發謂以禮落成之也若楚子成章華之臺願與諸侯落之是矣蓋發與落皆有始意九京即九原也指其冢之髙則曰京指其地之廣則曰原廬陵胡氏曰謂晉君賀其成室恐非也恐趙武諡獻文爾當考仲尼之畜狗死使子貢埋之曰吾聞之也敝帷不棄為埋馬也敝蓋不棄為埋狗也丘也貧無蓋於其封也亦豫之席毋使其首陷焉路馬死埋之以帷鄭氏曰畜狗馴守封當為窆陷謂沒于土路馬君所乘者其他狗馬不能以帷蓋嚴陵方氏曰家語言仲尼將行雨而無蓋則貧而無蓋可知陷謂沒於土也衆體皆不欲沒于土特以首為言者以衆體之所貴尤不欲沒于土故也路馬死埋之以帷故魯昭公乘馬塹而死乃以帷裹之石林葉氏曰帷蓋之近于身以為障蔽者也犬馬之畜于家以為代禦者也障蔽者敝所不敢棄而代禦者死用以埋之所謂仁之至義之盡也季孫之母死哀公弔焉曽子與子貢弔焉閽人為君在弗內也曽子與子貢入於其廄而修容焉子貢先入閽人曰鄉者已告矣曽子後入閽人辟之涉內霤卿大夫皆辟位公降一等而揖之君子言之曰盡飾之道斯其行者逺矣鄭氏曰閽人守門者修容更莊飾也子貢先入閽人既不敢止以言下之故曰鄉者以告矣閽人見兩賢相隨彌益恭故辟之也公降等揖禮之也孔氏曰此一節論君子加服人乃敬之事二子初時不具衣服則閽人拒之二子退而修容閽人雖愚猶知敬畏二子涉至內霤卿大夫皆逡巡辟位公于堂上降階一等揖而禮之君子遂美之云凡人盡其容飾行之可長逺矣案喪大記君臨大夫之喪君即位于序端卿大夫即位于堂亷楹西北面東上所謂辟位者蓋少西逡巡而東面不當北面之位也然君在大夫得私為二子辟位者或是公始入升堂之後卿大夫猶在庭中北面辟位者謂辟中庭之位少近東耳長樂陳氏曰德者容之實容者德之華非實無以重其內非華無以莊其外故君子正其衣冠尊其瞻視儼然人望而畏之此容之不可不修也曽子子貢弔于季孫氏當其容之未修也閽人拒之而不內及其既修也閽人敬而辟之涉于內霤卿大夫皆辟位公降一等而揖之夫以閽人之愚卿大夫之貴哀公之尊而容之所施猶足以動之況其不愚不貴不尊者乎陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也孔子聞之曰善哉覘國乎詩云凡民有喪扶服救之雖微晉而已天下其孰能當之鄭氏曰陽門宋國門名介夫甲衛士宋以武公諱司空為司城子罕戴公子樂甫術之後樂喜也覘窺視也孔子善覘國者之知微救猶助也微猶非也孔氏曰此一節論善覘國之事介夫匹庶之賤人子罕是國之卿相以貴哭賤感動民心皆喜悅若有人伐民必致死故曰殆不可伐殆近也為疑辭引詩斷章出邶谷風之篇言雖非晉之強天下更有強於晉者誰能當之而已是助句語也長樂陳氏曰吳起吮一人之疽而鄰敵莫抗假熲裹一人之瘡而西羌頓平然則司城子罕哭一介夫而民説其可伺隙抵巇而伐之哉覘者所以知微也兵法曰用間有五是謂神紀又曰知彼知己百戰不殆古人之于兵未嘗不用間其知微如晉之覘者蓋亦鮮矣孔子所以善之也所謂雖微晉而已天下其孰能當之仁不可為衆故也昔仲尼在衛趙鞅折謀干木處魏秦人罷兵謝安在晉王猛知其不可伐季梁在隨椘子之兵不敢加則子罕在宋而天下不能當者信矣石林葉氏曰介夫至賤子罕一哭之哀而晉國覘之不敢伐聖如孔子以為天下莫能當之故曰治國不敢侮鰥寡而況於士民乎山隂陸氏曰匍匐手行也魯莊公之喪既葬而絰不入庫門士大夫既卒哭麻不入鄭氏曰時子般弒慶父作亂閔公不敢居喪葬己吉服而反正君臣欲以防遏之微弱之至也閔公既吉服不與虞卒哭羣臣畢虞卒哭亦除喪也麻猶絰也孔氏曰此一節論禮變所由也莊公閔公父也莊公薨太子般即位慶父賊子般于黨氏閔公年八歲絰葛絰也諸侯辨絰葛而葬魯之庫門周之臯門也魯有三門庫雉路庫門最在外以從外來故至庫門去絰絰既不入衰亦不入可知也閔公既葬須即位正君臣故既葬而除羣臣須行虞卒哭之祭故卒哭乃除之上是君身絰用葛士大夫是臣絰用麻也不入者亦謂不入庫門也嚴陵方氏曰君以葬為節臣以卒哭為節者君先除而後臣敢除故也然此皆不能三年則失禮之甚矣廬陵胡氏曰既葬而絰不入庫門經意譏魯君忘哀之速爾故春秋閔二年書吉禘亦譏吉之早也孔子之故人曰原壤其母死夫子助之沐椁原壤登木曰久矣豫之不託於音也歌曰貍首之斑然執女手之卷然夫子為弗聞也者而過之從者曰子未可以已乎夫子曰丘聞之親者毋失其為親也故者毋失其為故也鄭氏曰沐治也木椁材也託寄也謂叩木以作音斑然卷然説人辭也為弗聞也而過之佯不知也已猶止也孔氏曰此一節論孔子無大故不遺故舊之事原壤謂吾遭母喪以來日月久矣不得託寄此木以為音聲于是叩木作音口為歌言椁材文采似貍之首夫子手執斤斧如女手卷然柔弱以此歡悅仲尼然在喪而歌非禮之甚從者見其無禮止夫子不須為治椁夫子謂朋友無大故不相遺棄丘聞之與我骨肉親者雖有非禮無失其為親之道尚得與之和睦故舊者雖有非禮無失其為故之道尚得往來何以絶之長樂陳氏曰原壤夷俟孔子叩其脛而責之其母死而託于音孔子為弗聞而過之何也夷俟非禮也託于音非孝也非禮為可責而非孝非不可責以其方從事于沐椁不以小事妨大也周官八統一曰親親二曰敬故詩序曰親親以睦故舊不遺論語曰故舊不遺則民不偷此所謂無失其為親故也孔子之于原壤無失其為故而已無失其為親者因其類而言之也春秋之法責賢者備于其非賢則略之而已其恕原壤之託音者略之也嚴陵方氏曰原壤非親而兼言毋失其為親者因輕以明重也沐椁所以修潔之也貍首之斑然言木之美女手之卷然言功之巧山隂陸氏曰此其貍首之詩歟其所謂大小莫處御于君所其詩中間之詞歟執女手之卷然蓋上之所以接下御于君所蓋下之所以事上石林葉氏曰孔子責原壤重于夷俟而略于喪歌者夷俟禮之踞也人道不可以不責是以雖痛絶之不為過親喪而歌豈止違禮而已哉孔子聞而不問見不可以教問之則人道絶矣故過之若不聞者乃所以全故舊之恩此夫子之道忠恕者也方周之末世有妻死鼓盆而歌自以為達如莊周者友死臨尸而歌自以為禮如子皮琴張者蓋將以矯世未必出其誠心然不可施之于孔子之門此夫子所以有時而抑揚歟李氏曰子曰泛愛衆而親仁又曰在親賢仁者賢者固君子之所宜親也故曰親者毋失其為親不賢不仁者不可親者而有故則無失其為故而已故曰故者毋失其為故毋失其為故所以厚俗也趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并植於晉國不沒其身其知不足稱也其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉鄭氏曰叔譽叔向也晉羊舌大夫之孫名肸作起也陽處父襄公之太傅剛而專已為狐射姑所殺是知不足稱也并猶專也沒終也植或為特舅犯久與文公辟難至將反國無安君之心及河授璧詐請亡要君以利是仁不足稱也武子士會也食邑于隨范字季晉人謂文子知人蓋見其所善于前則知其來所舉也中身也鄉射記曰弓二寸以為侯中退柔和貌退或為妥呐呐舒小貌管庫之士府史以下官長所置也舉之于君以為大夫士也管鍵也庫物所藏生不交利廉也死不屬其子潔也孔氏曰此一節論趙文子知人之事羊舌是邑名文子謂先世大夫死者甚衆假令生而可作起吾于衆大夫誰可以與歸也鄭注謂并猶專者謂并他事以為己有是專權之事狐射姑殺陽處父具文六年此不能以理終沒其身是無知也舅犯事具僖二十四年文子遂稱隨武子之德言凡人利君者多性行偏特不顧其身謀身者多遺棄故舊武子德行𢎞廣內外周備故襄二十七年左傳云夫子之家事治言于晉國無隱情則利君也家事治則不忘其身也然文七年士會與先蔑俱迎公子雍在秦三年不見先蔑及還亦不見是遺其友而云不遺者懼其同罪禍及于已故不見之也文子退然柔和似不勝衣言形貌卑退也其發言舒小呐呐如不出諸口謂言語卑下也生存之日不與利交涉臨死時亦不屬其子于君及朝廷也七十有餘家鄭知為大夫士者家是大夫士之總號案月令注鍵謂鎖之入內者俗謂鎖須管謂夾取鍵今謂之鑰匙則管鍵為别物而鄭云管鍵者對則細别散則大同也長樂陳氏曰君子之尚友以一鄉為未足則友於一國以一國為未足則友之天下以天下為未足則尚論古之人此文子叔譽所以論死者之可作也叔譽以陽處父與舅犯為可與歸文子則謂處父不足于智舅犯不足于仁不若隨武子之愈蓋太剛則易屈太直則易折植者剛直而自立者也處父并為之其智不足稱矣懷利者有已懷仁者有君舅犯見利而不顧君其仁不足稱矣隨武子則利其君仁也不忘其身與謀其身智也不遺其友義也二子于仁智為不足武子于仁智義則兼而有之其身退然如不勝衣而其所為足以勝大事其言呐呐如不出諸其口而其所舉足以盡衆賢蓋管庫之士賤而難知七十有餘家衆而難辨文子之所舉雖賤不遺雖衆不繆豈非長于知人哉然則文子成室不免張老之所戒樂奏肆夏自文子始其奢僭如此而謂生不交利何也蓋奢僭在已交利在人嚴陵方氏曰并則不知有與以分人植則不知致曲以盡物以致不終其身故曰其智不足稱也見利則唯知愛利不顧其君則不知愛君故曰其仁不足稱也武子既有利君之仁又有不忘其身之智且異于處父之智不足稱矣既有謀身之智又有不遺友之仁且異于舅犯之仁不足稱矣是固文子所宜欲與歸也退言其弱也進為強退為弱如不勝衣則其弱可知矣管庫之士蓋守藏之吏也李氏曰文子之所慕止于隨會故所舉于晉國止于管庫之士而謂之知人者止于晉人而已矣叔仲皮學子栁叔仲皮死其妻魯人也衣衰而繆絰叔仲衍以告請繐衰而環絰曰昔者吾喪姑姊妹亦如斯末吾禁也退使其妻繐衰而環絰鄭氏曰叔仲皮魯叔孫氏之族學教也子栁仲皮之子也衣衰而繆絰衣當為齊壞字也繆讀為木樛垂之樛士妻為舅姑之服也言其妻雖魯鈍其於禮勝學叔仲衍蓋皮之弟告子栁言此非也衍既不知禮之本子栁亦以為然而請于衍使其妻為舅服繐衰而環絰繐衰小功之縷而四升半之衰環絰弔服之絰時婦人好輕細而多服此者衍答子栁言姑姊妹在室齊衰與婦為舅姑同末無也言無禁我欲其言行也婦以諸侯之大夫為天子之衰弔服之絰服其舅非也孔氏曰此一節論子栁失禮之事叔仲氏也皮是名叔仲皮教訓其子子栁受父教而不知禮叔仲皮死子栁之妻雖魯鈍猶知為舅姑身著齊衰首服繆絰繆謂兩股相交也五服之絰皆然唯弔服環絰不繆耳衍子栁之叔見當時婦人好尚輕細告子栁汝妻何以著非禮之服子栁亦以妻非禮遂請于衍欲令其妻身著繐衰首服環絰衍答子栁云吾喪姑姊妹亦如斯斯此也謂如此繐衰環絰無人于吾而相禁者子栁得衍言乃退使其妻著繐衰而環絰子栁不肯粥庶弟之母非是下愚而不知其非禮明當時皆著輕細故也嚴陵方氏曰子栁雖受教于其父曽不若愚婦人之所為也成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰鄭氏曰范蜂也蟬蜩也緌謂蜩喙長在腹下孔氏曰此一節論成人無禮之事成孟氏所食采地即前犯禾之邑也此邑中民有兄死而弟不為兄制服者聞子臯至孝來為成宰恐其罪已乃制衰服故成人譏之蠶則績絲作繭蟹背殼似匡蜂頭上有物似冠蟬喙似冠之緌以是合譬也蠶則須匡以貯繭而今無匡匡自著蟹則非為蠶設蜂冠無緌而蟬口有緌緌自著蟬非為蜂設譬如成人兄死初不作衰後畏子臯方為制服服是子臯為之非為兄施亦如蟹匡蟬緌各不關于蠶蜂也長樂陳氏曰事非出于自然而出于使然者君子不以為善以其徒有其事而非其情徒有其名而非其實也子臯之衰不為成人之兄則衰在子臯而不在成人豈非徒有其事而非其情徒有其名而非其實歟匡辟則服之在下者也緌辟則服之在上者也金華應氏曰聞伯夷之風者頑夫亷聞栁下惠之風者薄夫敦聞子臯之風者悍夫悌故兄之死有昔不為衰者而今為之衰也一邑之宰如此有國有天下者所任皆得其人冝何如哉是以仲尼相而無飲羊縱妻之民楊綰相而有減騶省樂之效風化之機繫于人焉耳蠶績范冠之謠雖以戲夫民之為服者未必出于誠心實以喜子臯之孝行足以感不友不悌之俗故周公之告康叔不以弟之大不克恭者為怒而以克敬典者為急分正東郊之責亦以孝友之君陳以感悟之其機固不在多也樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾惡乎用吾情鄭氏曰子春曽子弟子勉強過禮惡乎猶于何也孔氏曰此一節論孝子遭喪哀過之事禮不食三日子春悔不以實情勉強至五日言自吾母死而不得吾之實情而矯詐勉強為之更于何處用吾之實情乎黃氏曰樂正子當時之賢者也師必在慕其德行而師之者也禮制雖云三日而曽子喪親不食七日故子春心慕師道執親之喪五日而後食既而告人曰吾悔之自是吾母之喪不能及于七日是不盡得吾哀痛之情以報其罔極之恩更于何處盡用吾哀痛之情乎乃悔不及七日之謂也子春之旨其在于斯記者載之以旌孝行餘義嚴陵方氏曰觀子春下堂傷足數月不出而以虧父母之體為憂則其存心蓋可見矣山隂陸氏曰曽子水漿不入口者七日而不以為悔非勉強故也歲旱穆公召縣子而問然曰天久不雨吾欲暴尪而奚若曰天則不雨而暴人之疾子虐毋乃不可與然則吾欲暴巫而奚若曰天則不雨而望之愚婦人于以求之毋乃已疏乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎鄭氏曰然之言焉也凡穆或作繆尪者面鄉天覬天哀而雨之奚若何如也錮疾人之所哀暴之是虐也巫主接神亦覬天哀而雨之已疏猶甚疏也春秋傳説巫曰在女曰巫在男曰覡周禮女巫旱暵則舞雩徙市者庶人之喪禮今徙市是憂戚于旱若喪孔氏曰此一節論旱變之事鄭引春秋傳見椘語觀射父對昭王絶地天通之問云民之精爽不攜二者明神降之在男曰覡在女曰巫此經云愚婦人據末世之巫也天子諸侯之喪庶人憂戚無復求覓財利要有急須之物不得不求故于邑里之內而為巷市今徙市若居天子諸侯之喪也山隂陸氏曰問然問其所以然長樂陳氏曰先王之于旱也內則責諸己外則求諸神責諸己則有成湯之事宣王之行求諸神則巫以女巫舞以皇舞祭以雩禮以牲璧責諸己者本也求諸神則以為文而已穆公不能責諸己又不知求諸神而欲暴尪與巫豈不惑哉市隂也雨隂中之陽也徙市所以助發隂中之陽與周官皇舞女巫同意廬陵胡氏曰春秋僖二十一年夏大旱公欲焚巫尪臧文仲曰巫尪何為天欲殺之則如勿生若能為旱焚之滋甚杜氏云尪瘠病之人面上向俗云天哀其病恐雨入其鼻故旱不經之説今所不取孔子曰衛人之祔也離之魯人之祔也合之善夫鄭氏曰祔謂合葬也離之有以間其椁中善夫善魯人也祔葬當合孔氏曰此一節論魯衛得失魯衛兄弟應同周法故並云也離之謂一物隔二棺之間于椁中也所以然者明合葬猶生時男女須隔居處也魯人則合並兩棺置椁中言異生不須復隔詩云榖則異室死則同穴故善魯之祔也長樂陳氏曰衛之俗有存于殷魯之俗一之于周殷之所尚者尊尊故凡昭穆之祔于廟者離之而不親周之所尚者親親故凡昭穆之祔于廟者合之而不尊離之則義合之則仁孔子皆善之禮記集説卷二十三
