body:
  text: 禮記集說卷一百三十三宋衛湜撰唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣鄭氏曰贊助也育生也孔氏曰此明天性至誠聖人之道也河南程氏曰盡己為忠盡物為信極言之則盡己者盡已之性也盡物者盡物之性也信者無僞而已於天性有所損益則為僞矣易無妄曰天下雷行物與無妄動以天理故也又曰贊天地之化育自人而言之從盡其性至盡物之性然後可以贊天地之化育可以與天地參矣言人盡性所造如是若只是至誠更不須論所謂人者天地之心及天聰眀自我民聰明止謂只是一理而天人所為各自有分又曰至誠可以贊化育者可以回造化明道又曰至誠可以贊天地之化育則可以與天地參贊者參贊之義先天而天弗違後天而奉天時之謂也非謂贊助只有一箇誠何助之有明道又曰心具天德心有不盡處便是天德處未能盡何緣知性知天盡己心則盡人盡物與天地參贊化育贊則直養之而已又曰凡言充塞云者却似箇有規摹底體靣將這氣育實之然此只是指而示之近耳氣則只是氣更說甚充塞如化育則只是化育更說甚贊贊與充塞又早却是别一件事也伊川橫渠張氏曰二程解窮理盡性以至於命只窮理便是至於命亦是失於大快此義儘有次序須是窮理便能盡得己之性即盡得己之性則推類又盡人之性既盡得人之性須是并萬物之性一齊盡得如此然後至於天道也其閒煞有事豈有當下理㑹了學者須是窮理為先如此則方有學今言知命與至於命儘有近逺豈可以知便謂之至也又曰性者萬物之一源非有我之得私也唯大人為能盡其道是故立必俱立知必周知愛必兼愛成不獨成彼自蔽塞而不知順吾理者則亦末如之何矣又曰大其心則能體天下之物物有未體則心為有外世人之心止於見聞之狹聖人之盡性不以見聞梏其心其視天下無一物非我孟子謂盡心則知性知天以此天大無外故有外之心不足以合天心又曰幽贊天地之道非聖人而能哉詩人謂后稷之穡有相之道贊化育之一端與藍田吕氏曰至於實理之極則吾生之所固有者不越乎是吾生所有既一於理則理之所有皆吾性也人受天地之中其生也具有天地之德柔強昏眀之質雖異其心之所然者皆同特蔽有淺深故别而為昏明稟有多寡故分而為強柔至於理之所同然雖聖愚有所不異盡己之性則天下之性皆然故能盡人之性蔽有淺深故為昏眀蔽有開塞故為人物稟有多寡故為強柔稟有偏正故為人物故物之性與人異者幾希唯塞而不開故知不若人之明偏而不正故才不若人之美然人有近物之性者物有近人之性者亦係乎此於人之性開塞偏正無所不盡則物之性未有不能盡也人也物也莫不盡其性則天地之化幾矣故行其所無事順以養之而已是所謂贊天地之化育者也如堯命羲和欽若昊天至于民之析因夷隩鳥獸之孶尾希革毛毨氄毛無不與知則所贊可知矣天地之化育猶有所不及必人贊之而後備則天地非人不立故人與天地並立為三才此之謂與天地參建安游氏曰萬物皆備於我反身而誠樂莫太焉故唯天下至誠為能盡其性千萬人之性一已之性是也故能盡其性則能盡人之性萬物之性一人之性是也故能盡人之性則能盡物之性同焉皆得者各安其常則盡人之性也羣然皆生者各得其理則盡物之性也至於盡物之性則和氣充塞故可以贊天地之化育夫如是則天覆地載教化各任其職而成位乎其中矣延平楊氏曰性者萬物之一原也非夫體天德者其孰能盡之能盡其性則人物之性斯盡矣言有漸次也贊化育參天地皆其分內耳又曰孟子曰萬物皆備於我反身而誠樂莫大焉知萬物皆備於我則數雖多反而求之於吾身可也故曰盡己之性則能盡人之性盡人之性則能盡物之性以己與人物性無二故也河東侯氏曰或問天下將亂何故賢者便生得不豐厚曰氣之所鍾便如此曰有變化之道乎曰在君相幹施之力爾若舉賢任能使政事治而百姓和則天地之氣和而復淳厚此天下所以有資於聖賢有賴於君相也子思曰贊天地之化育正謂是耳若曰治亂自有數而任之則何賴於聖賢哉子思所以言贊化育也書亦曰祈天永命如此而已新安朱氏曰此第二十二章言天道也天下至誠謂聖人之德之實天下莫能加也盡其性者德無不實故無人欲之私而天命之在我者察之由之巨細精粗無毫髮之不盡也人物之性亦我之性但以所賦形氣不同而有異耳能盡之者謂知之無不眀而處之無不當也贊猶助也與天地參謂與天地並立為三也此自誠而眀者之事也或問至誠盡性諸說如何曰程子以盡己之忠盡物之信為盡其性蓋因其事而極言之非正解此文之意今不得而録也其論贊天地之化育而曰不可以贊助言論窮理盡性以至於命而曰只窮理便是至於命則亦若有可疑者蓋嘗竊論之天下之理未嘗不一而語其分則未嘗不殊此自然之勢也蓋人生天地之間稟天地之氣其體即天地之體其心即天地之心以理而言是豈有二物哉故凡天下之事雖若人之所為而其所以為之者莫非天地之所為也又況聖人純於義理而無人欲之私則其所以代天而理物者乃以天地之心而贊天地之化尤不見其有彼此之間也若以其分言之則天之所為固非人之所及而人之所為又有天地之所不及者其事固不同也但分殊之狀人莫不知而理一之致多或未察故程子之言發明理一之意多而及於分殊者少蓋抑揚之勢不得不然然亦不無小失其平矣唯其所謂止是一理而天人所為各自有分乃為全備而不偏而讀者亦莫之省也至於窮理至命盡人盡物之說則程張之論雖有不同然亦以此而推之則其說初亦未嘗甚異也蓋以理言之則精粗本末初無二致固不容有漸次當如程子之論若以其事而言則其親疏近逺深淺先後又不容於無别當如張子之言也吕游楊說皆善而吕尤確實揚氏萬物皆備云者又前章格物誠身之意然於此論之則反求於身又有所不足言也胥失之矣涑水司馬氏曰人皆有仁義禮智之性惟聖人能以至誠充之如能盡其性然後修其道以教人使人人皆盡仁義禮智之性如此則其道光被四表格于上下隂陽和風雨時鳥獸蕃滋草木暢茂取之有時用之有節萬物莫不遂其性豈非可以贊天地之化育而功德參於天地哉易曰后以裁成天地之道輔相天地之宜以左右民此之謂也嵩山朝氏曰人物之性與天地之化育皆吾性之誠也天地之性不可見而見之於化育也然此非次第而言之也猶曰能盡其性則能盡人之性則能盡物之性則能贊天地之化育而與天地參也其所言之若彼者何也以其理相因非心知其意者莫之能喻也物性之粗非後於人之性而得之者也廣安游氏曰盡猶極也言極乎其性之理而得其性之正也盡者生於有者也孟子曰有諸己之謂信下文又云不誠無物夫無得於中未有自信者也夫是物也惟其有之故信其物之有是不誠不信則無是物也惟至誠能有其信故能盡其性耳目鼻口與物相汨則不知夫性之所在不知夫性之所在何所盡之哉惟天下至誠為能以仁智勇治其心心治而喜怒哀樂得其正而性之全體可得而盡矣盡性之理而得其正聖人能事畢矣非特己也惟人亦然非特人也惟物亦然非特物也天地亦然己也人也物也天地也其性之理則一而已長樂陳氏曰天下一性耳能盡己性則必能盡人之性而物之性亦可自此推之故能盡人之性亦能盡物之理但所以盡者有次第也不先盡己之性於人物何有哉天地之化育不過及夫人物而已能贊天地之化育自然與天地參也晏氏曰所謂盡性者充足其四端之善彌滿於一性之中而無餘藴也非天下至誠不能臻此海陵胡氏曰性者五常之性聖人得天之全性衆人則稟賦有厚薄聖人盡己之性以觀人之性然後施五常之教以教人使仁者盡其所以為仁義者盡其所以為義至於禮智信皆然則天下之人莫不盡其性物萬物也萬物之性雖異於人然生育之道愛子之心至深至切與人不殊故聖人將盡物之性設為制度定為禁令不使失其生育如獺祭魚然後漁人入澤梁豺祭獸然後田獵交於萬物有道故物無不盡其性物既盡性則可以贊助天地化育之功天地以化育為功聖人以生成為德可以輔相天地之宜贊助天地之化育其功與天地參美矣髙要談氏曰何謂至誠極實理之至云爾實在我已極其至即能盡一己之性矣一性之初聖人衆人所得均也然衆人後知後覺必待先知先覺者為之開明然後能復其初聖人既盡在我之性此所以能盡人之性也一人之身物理皆備聖人既能盡人之性則推以及物故能使草木昆蟲皆遂其生鳥獸魚鱉罔不咸若此所以能盡物之性也詩云立我蒸民莫匪爾極此盡人之性也詩云王在靈囿麀鹿攸伏王在靈沼於牣魚躍此盡物之性也人者天地所生物亦天地所生天地生之聖人成之天地化育之道待聖人而後備此則贊之義也人之為號本與天地並稱唯其在己者有所未盡不能推之於人物無補造化故於天地不相似聖人盡己之性而進乎贊化育之功則是上下與天地同流此則參之義也或曰聖人在下道不得行盡己固可亦安能盡人盡物贊化育與天地參乎曰聖人有德有位其道行乎天下聖人有德無位其道明乎天下功用皆同無二事也新定錢氏曰洞徹底藴略無纎毫缺闕非謂有加於其所固有也譬之日月而或蝕焉有一分之未復即有一分之未盡復之如故全體全明所謂能盡如斯而已賢者覺其本性雖已明徹然未到知天命未到從心所欲不踰矩之地猶是未可謂之能盡也必聖人而後可也霅川倪氏曰或曰人之性一故盡己之性則能盡人之性若萬物之性與人不同而曰能盡人之性則能盡物之性何也曰物之性固不與人之性同然其好生惡死一也是以聖人生之不傷使之各遂其性故可以贊天地化育也此曰盡性孟子乃曰盡其心者知其性何也孟子推原子思之義又本之於心也然盡心而合於天理去其私心則可以盡性矣其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化鄭氏曰其次謂自明誠者也致至也曲猶小小之事也形謂人見其功也著形之大者也明著之顯者也動動人心也變改惡為善也變之久則化而性善也孔氏曰此一經明賢人習學而致至誠河南程氏曰其次致曲者學而後知之也而其成也與生而知之者不異焉故君子莫大於學莫害於畫莫病於自足莫罪於自棄學而不止此湯武所以聖也伊川又曰致曲者就其曲而致之也伊川又曰人自孩提聖人之質已完只先於偏勝處發或仁或義或孝或弟去氣偏處發是致曲去性上修便是直養然同歸于誠又曰自明而誠雖多由致曲然亦自有大體中便誠者雖亦是自明而誠謂之致曲則不可明道又曰曲偏曲之謂非大道也就一事中用志不分亦能有誠如養由基射之類是也誠則形誠後便有物如參前倚衡如有所立卓爾是也形則著又著見也著則明是有光輝之時也明則動誠能動人也君子所過者化豈非動乎或曰變如物方變而未化化則更無舊跡自然之謂也莊子言變大於化非也伊川橫渠張氏曰致曲不二則德有定體體象誠定則文節著見一曲致文則餘善兼照明能兼照則必將徙義誠能徙義則德自通變能通其變則圎神無滯藍田吕氏曰至誠者與天地參則無間矣致曲者人之稟受存焉未能與天地相似者也人具有天地之德自當致乎中和然稟受之殊雖聖賢不能免乎偏曲清者偏於清和者偏於和皆以所偏為之道不自知其偏如致力於所偏用心不二亦能即所偏而成德故致力於所偏則致曲者也用心不二則曲能有誠者也能即所偏而成德如伯夷致清為聖人之清栁下惠致和為聖人之和此誠則形者也德有定體則遂其所就文節著明故曰形則著一曲之德致文成章則無以加矣無以加則必能知類通達餘善兼照曲之果為曲也故曰著則明幾者動之微也知至而不能至之則不可與幾矣故知至則舍其曲而趨其至未有不動而徙義者也故曰明則動君子豹變其文蔚也大人虎變其文炳也有心乎動動而不息雖文有小大之差然未有不變者也故曰動則變變者復之初復於故則一於理圓神無滯不知其所以然與至誠者同之故曰變則化惟天下至誠為能化又曰變者如病始愈以愈為樂如迷始悟以悟為得及其久則愈者安然無憂不知所以為樂悟者沛然自如不知所以為得故能純一不雜混混一體無形色可求無物我可對然後可以謂之化建安游氏曰誠者不思不勉直心而徑行也其次則臨言而必思不敢縱言也臨行而必擇不敢徑行也故曰致曲曲折而反諸心也擬議之間鄙詐不萌而忠信立矣故曲能有誠有諸中必形諸外故誠則形形於身必著於物故形則著誠至於著則內外洞徹清明在躬故著則明明則有以動衆故明則動動則有以易俗故動則變變則革汙以為清革暴以為良然猶有迹也化則其迹泯矣日用飲食而已至於化則神之所為也非天下之至誠孰能與於此延平楊氏曰能盡其性者誠也其次致曲者誠之也學問思辨而篤行之致曲也用志不分故能有誠誠於中形於外參前倚衡不可掩也故形形則有物故著著則輝光發於外故明明則誠矣未有誠而不動動而不變也鳴鶴在隂其子和之非動乎曲能有誠誠在一曲也明則誠矣無物不誠也至於化則非學問思辨篤行之所及也故唯天下至誠為能化新安朱氏曰此第二十三章言人道也其次通大賢以下凡誠有未至者而言也致推致也曲一偏也形者積中而發外著則又加顯矣明則又有光輝發越之盛也動者誠能動物變者物從而變化則有不知其所以然者蓋人之性無不同而氣則有異故唯聖人能舉其性之全體而盡之其次則必自其善端發見之偏而悉推致之以各造其極也曲無不致則德無不實而形著動變之功自不能已積而至於能化則其至誠之妙亦不異於聖人矣或問致曲之說曰人性雖同而氣稟或異自其性而言之則人自孩提聖人之質悉已完具以其氣言之則唯聖人為能舉其全體而無所不盡上章所言至誠盡性是也若其次則善端所發隨其所稟之厚薄或仁或義或孝或弟而不能同矣自非各因其發見之偏一一推之以至乎其極使其薄者厚而異者同則不能有以貫通乎全體而復其初即此章所謂致曲而孟子所以擴充其四端者是也程子之言大意如此但其所論不詳且以由基之射為說故有疑於專務推致其氣質之所偏厚而無隨事用力悉有衆善之意又以形為參前倚衡所立卓爾之意則亦若以為已之所自見而無與於人也豈其記者之略而失之與至於明動變化之說則亦無以易矣若張子之說以明為兼照動為徙義變為通變化為無滯則皆以其進乎內者言之失其指矣蓋進德之序由中逹外乃理之自然如上章之說亦自已而人自人而物各有次序不應專於內而遺其外也且夫進乎內之節目亦安得如是之繁促哉游氏說亦得之但說致曲二字不同非本意耳楊氏既以輝光發外為明矣而又引明則誠矣則似以明為通明之明既以鶴鳴子和為動矣而又曰化非學問篤行所及則似以化為大而化之之化此其上下之意不相承續且於明動之間本文之外別生無物不誠一節以就至誠動物之意尤不可曉今故不能盡録然亦不可不辨也新定顧氏曰上章言自誠而明之事此章言自明而誠之事也自明而誠學者之事也較之自誠而明則抑其次矣曲之為言與直對立至誠之道自性而推之則為直致自學而反之則為致曲易曰反復其道子曰克己復禮為仁孟子曰湯武反之也皆致曲之謂也曲能有誠即前章所謂及其知之一也及其成功一也唯天下至誠為能化推言化之本於至誠也上章發端言唯天下至誠為能盡其性推其極至於與天地參此章發端言其次致曲曲能有誠推其極至於變則化子思子懼人以此二章所言為有優劣也欲示人以其所同則斷之曰唯天下至誠為能化夫前後二章發明功用若有不同而唯天下至誠一辭則無不同夫苟均之曰唯天下至誠也則其功用又安可以二觀哉兼山郭氏曰致曲者曲盡之也曲能有誠由力使之然也至於誠則形以至變則化馴致其道而終於誠則無異也虙氏曰自內以達外者誠之所以成已由淺以至深者誠之所以成物蓋君子之道出乎身者固有其序入於人者亦有其漸也誠則形形則著著則明所謂自內以逹外也明則動動則變變則化所謂由淺以至深也君子之誠存於心者至矣及其發於外也有不可掩焉形則形於身著則著於行明則明於天下睟然見於靣盎於背施於四體所謂形也愛敬之道著而為仁義中和之德著而為禮樂所謂著也非特人知之鬼神其知之矣非特鬼神知之天其知之矣所謂明也君子之誠已如此庸非自內以逹外乎唯其誠之已至於明則所積者厚矣及其推之以成物始則有以感動乎衆心中則有以變易其舊習終則有以化成其德性如風之震蕩鼓舞所謂動也如春之枯榮甲拆所謂變也如夏之長養成遂所謂化也君子之成物如此庸非由淺以至深乎文王若日月之照臨光于四方顯于西土所謂誠則形形則著著則明此可見矣由德廣所及以至於道化之行由無犯非禮以至於猶惡無禮故序詩章亦言風以動之教以化之所謂明則動動則變變則化此可見矣然文王生知之聖人也自誠者也此之所言致曲之賢人也思誠者也由賢以至於聖自人而入於天蓋亦同歸一揆而已矣故中庸言此必終之曰唯天下至誠為能化蓋以曲能有誠者可與天下至誠者為一體也溫陵陳氏曰或以曲為小善己非矣又以為偏曲之曲道何嘗有偏偏則非道矣曲如揚雄所謂途雖曲而通諸夏川雖曲而通諸海入道之門户固應曲致也如孔門或以愚或以勇或以魯或以逹而入道所謂委蛇致曲而入乎道也致如學以致其道之致小德川流亦是致曲之意髙要談氏曰致曲之為言致其委曲以求本性之實理非直造徑達之謂也既非生而知之直造徑達容有所未能當隨才識髙下專心致志委曲以求之求得本性因而誠之使有諸己則亦與從初自誠者無以異矣故曰曲能有誠能化云者言至誠之妙用所過者化也語至誠極於能化則知其所謂存者有不測之神矣贊化育與天地參皆不外是此所謂及其成功一也孟子言可欲之謂善有諸己之謂信即此曲能有誠之說也充實之謂美充實而有光輝之謂大即此誠則形形則著著則明之說也大而化之之謂聖聖而不可知之之謂神即此明則動動則變變則化之說也永康陳氏曰一室皆暗必有容明之所從其容明之處而闢之此致曲之法也嚴陵喻氏曰至誠之理自所性而達乎外者直也由學問以復乎內者曲也建安真氏曰前章贊化育參天地乃至誠之極功而其本則盡己之性而已此聖人所以可學而至也其次致曲即學之事曲猶曲禮之曲蓋聖人生知安行不待致曲自能盡性自大賢以下則必於纎微委曲而用其功即前博學審問慎思明辨篤行之意顔子之四勿曾子之三省皆致曲之事也晉陵錢氏曰曲謂行事之委曲若曲禮之類致力於曲亦能有誠誠則形謂有諸內必形於外也形則著人得而見之也著則明其德昭明人不能掩也明則動人為不善者不能自安也動則變人從之也變則化化民成俗不知其所以然也至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神鄭氏曰可以前知者言天不欺至誠者也前亦先也四體謂龜之四足春占後左夏占前左秋占前右冬占後右孔氏曰此言身有至誠可以豫知前事禎祥吉之萌兆本有今異曰禎國本有雀今赤雀來是也本無今有曰祥國本無鳯今有鳯來是也言國家之將興必嘉善慶祥妖孽謂凶惡之萌兆妖傷也傷甚曰孽左傳云地反物為妖說文云衣服歌謠草木之怪為妖禽獸蟲蝗之怪為孽見乎蓍龜卦兆動於龜之四體也善謂祥不善謂禍至誠之道豫知前事如神之微妙故云至誠如神河南程氏曰人固可以前知然其理須是用則知不用則不知知不如不知之愈蓋用便近二所以釋子謂又不是野狐精也又曰蜀山人不起念十年便能前知藍田吕氏曰誠一於理無所閒雜則天地人物古今後世融徹洞逹一體而已興亡之兆猶心之有思慮如有萌焉無不前知蓋有方所則有彼此先後之別既無方所彼則我也先即後也未嘗分別隔礙自然達乎神明非特前知而已一本云至誠與天地同德與天地同德則其氣化運行與天地同流矣興亡之兆禍福之來感於吾心動於吾氣如有萌焉無不前知況乎誠心之至求乎蓍龜而蓍龜告察乎四體而四體應所謂莫見乎隱莫顯乎微者也此至誠所以達神明而無間故曰至誠如神動乎四體如傳所謂威儀之則以定命者也建安游氏曰至誠之道精一無間心合於氣氣合於神無聲無臭而天地之間物莫得以遁其情矣不既神矣乎此非人所能測也至於前知之實則近考諸身逺驗諸物大有以知國家之興亡小有以知一身之禍福此人之所同見也故至誠如神如神云者因人所言見之也延平楊氏曰誠即神也上下與天地同流則兆乎天地之間者庸有不知乎以上言見乎蓍龜動乎四體則善不善己形焉故曰如神而已又曰君子一於誠而已唯至誠為可以前知故不逆詐不億不信而常先覺也抑亦以是為賢乎若夫不逆不億而卒為小人所欺焉斯亦不足觀也已河東侯氏曰至誠之道學者須是心明意得然後可以知之如國家將興必有禎祥國家將亡必有妖孽可以理得不可以跡考可以默識不可以言窮今夫四時之代謝日月之晦明鬼神之吉凶皆至神之道也知其所以然則國家之興亡其禎祥其妖孽焕然知之矣一人之心天地之心一人之為天地之為一物之理天地之理一身之氣天地之氣喜怒哀樂少動於中則達乎面目見乎四體況天地之廣大國家之盛衰其有不見乎故問之蓍龜而蓍龜動以應候乎四體而四體動以知禍福善惡各以物至如髙宗之夢文王之卜神降於虢星入於秦皆其物也故曰至誠如神神即誠也不可以行至疾速言之河南尹氏曰嵩前有董五經隱者也伊川聞其名謂其亦窮經之士董平曰未嘗出庵伊川至其舍語甚欵亦無大過人者但久不與物接心靜自明也尹子問於伊川伊川曰靜則自明也祁寬問於尹子曰豈非中庸所謂至誠之道可以前知乎尹子曰也不必如此說只是久靜自明也新安朱氏曰此第二十四章言天道也禎祥者福之兆妖孽者禍之萌蓍所以筮龜所以卜四體謂動作威儀之間如執玉髙卑其容俯仰之類凡此皆理之先見者也然唯誠之至極而無一毫私僞留於心目之間者乃能有以察其幾焉神謂鬼神問至誠之道可以前知先生曰無私僞則常虛明或問至誠如神之說曰吕氏蓋得之矣其論動乎四體為威儀之則者尤為確實游氏心合於氣氣合於神之云非儒者之言也且心無形而氣有物若之何而反以是為妙哉程子用便近二之論蓋因異教之說如蜀山人董五經之徒亦有能前知者故就之而論其優劣非以其不用而不知者為真可貴而賢於至誠之前知也至誠前知乃因其事理朕兆之已形而得之如所謂不逆詐不億不信而常先覺者非有術數推驗之煩意想測度之私也亦何害其為一哉延平周氏曰禎祥者將興之兆朕也妖孽者將亡之兆朕也見乎蓍龜驗之物也動乎四體驗之已也禍之將至福已伏之而其所以召福之善必先知之福之將至禍亦倚之而其所以召禍之不善必先知之故言禍則先於福而言不善則次於善也海陵胡氏曰此一節言至誠前知之事由身有至誠而其性明性既明則可以豫知前事雖未萌未兆可以逆知國家將興將亡之理若進賢退不肖其政教皆仁義雖未大興至誠之人必知其將興也又天必有禎祥之應若小人在位賢人在野政教廢弛綱紀紊亂雖未絶滅至誠之人必知其將亡也又天必有妖孽之應此皆至誠前知默契天意者也蓍龜先知之物聖人有先知之見如蓍龜之靈也人有四體四體之動必先知之聖人於禎祥之兆亦先知之神者隂陽不測之謂也江陵項氏曰此一章言性者處處明白與天無間天之道也下章誠者自誠也而下言教者處處篤實與人無間人之道也施氏曰一身之所有至理具焉一心之所存神明舍焉反身而誠則清明在躬猶日中天地容光必照矣故不待興亡之已至而知之於禎祥妖孽之始不待乎禍福之已形而知之於善不善之初非前知者其能是乎易曰知幾其神乎莆陽林氏曰人之精神當闃寂無人之所景物幽閒之處內外豁然是得其本性少頃思慮一起便坐不得故曰人生而靜天之性也今人終日於膠膠擾擾之地得少頃閒靜便覺快樂是其本性然也況終身受用於誠者乎且居乎環堵之室更歷嵗月之久户外之屨皆能逆知其為某事以其心靜故也以此觀之周公仲尼雖無天子之位然逆定之數可以前知故曰至誠之道可以前知禎祥如火流為烏鳯鳴朝陽之類妖孽如三川之震夷羊在牧之類故可以前知也如堯有九年之水湯有七年之旱此皆逆定之數為堯湯者能為之先具爾烏能使之必無也見乎蓍龜謂人有吉凶禍福之事盡見於蓍龜四體者謂吉凶禍福盡見於人之俯仰屈伸之際長樂陳氏曰清明在躬志氣如神嗜欲將至有開必先天降時雨山川出雲至誠之道也髙宗恭默思道夢帝賚豫良弼果得傅說宣王有撥亂之志側身修行上天祐之為生賢佐果得申甫此其明驗歟范陽張氏曰福將至則善念見禍將至則欲念形既先知則以誠造化轉移變易使禍為福妖孽為禎祥將亡反為將興蓋無難事也故曰至誠如神兼山郭氏曰自君子觀之謂之知幾自衆人言之謂之前知易曰知幾其神乎髙要談氏曰至誠之道可以前知自不學者言之事似渺茫近乎怪誕而不可信自篤學者言之事皆性中所有才能存養不失其全便能至此無足疑也夫何故識得性與心之體即灼然見此事皆存養所致也性之在人非槁木死灰兀然寂然不生不出而已其中虛眀自然透徹物有動乎其外而吾必覺知於其內凡天下事物有形有聲有臭有味有名有數與吾耳目口鼻手足相接者莫不皆先覺知不特如此天地之間薄海內外凡實有是事實有是物雖吾耳目口鼻手足之所未嘗及者一有感乎其中亦莫不皆有覺知此乃一性之靈可以應無方之變者蓋天機將動之時也夫是謂之心識得此理當其本心覺知之時專精致一固守勿失使此一性之靈常存不散性本虛靜虛極則通靜極則明正如持鑑當中一影一像靡不畢見天下禍福善惡之事既實有而不虛端兆才萌無有不知者矣故曰至誠如神胡不觀諸易乎寂然不動感而遂通天下之故寂然不動者存養之力也感而遂通者前知之驗也此章重處全在至誠而前知之說特以明其效驗非如俗學專尚神怪而不知理之所在也柯山周氏曰禎祥非必甘露醴泉如思皇多士生此王國維嶽降神生甫及申則周室將興可知矣妖孽非必石言神降如婦有長舌維厲之階人之云亡邦國殄瘁則周室將亡可知矣況假之於蓍龜動之於四體禍福將至有顯然之理乎晉陵錢氏曰禎祥若麟鳯嘉禾之類妖孽若雉雊桑榖共生之類蓍龜卜也四體以身喻國家之四方也閒居曰四方有敗必先知之福將至以善而知其福禍將至以不善而知其禍蓋幽明一理人欲蔽之至誠則無不知矣蔡氏曰此主誠者之用為言至誠前知是言聖人既盡人物之性則知之無一而不明處之無一而不當不疾而速不行而至如造化之神也廣漢張氏曰此謂神指造化之迹者故曰如謂至誠則感應不窮也若如所謂所存者神則誠即神矣新定顧氏曰至誠之道極天下之清明清明天德也惟秉天德故能知天數故曰至誠之道可以前知至誠如神鬼神之靈於事先知固也而至誠者實似之誠者自成也而道自道也誠者物之終始不誠無物是故君子誠之為貴誠者非自誠己而已也所以成物也成己仁也成物知也性之德也合外內之道也故時措之宜也鄭氏曰物萬物也亦事也以至誠成己則仁道立以至誠成物則知彌博此五性之所以為德也外內所須而合也外內猶上下時措言得其時而用也孔氏曰人有至誠則能與萬物為終始若無至誠則不能成其物誠者非但自成己身又能成就外物若能成就己身則仁道與立若能成就外物則知力廣逺合外內之道者無問內外皆須至誠時措之宜措猶用也得其時而用無往不宜也河南程氏曰誠者自成如至誠事親則成人子至誠事君則成人臣不誠無物誠者物之終始猶俗語徹頭徹尾不誠更有甚物也伊川又曰聖人言忠信者多矣人道只在忠信不誠則無物且出入無時莫知其鄉者人心也若無忠信豈復有物乎明道又曰只著一箇私意便是餒便是闕了他浩然之氣處誠者物之終始不誠無物這裏闕了他則便這裏沒這物又曰學者不可以不誠不誠無以為善不誠無以為君子修學不以誠則學雜為事不以誠則事敗自謀不以誠則是欺其心而自棄其志與人不以誠則是喪其德而增人之怨今小道異端亦必誠而後得而況欲為君子者乎故曰學者不可以不誠雖然誠者在知道本而誠之耳又曰成己須是仁推成己之道成物便是知又曰古之學者為己其終至於成物今之學者為物其終至於喪已伊川又曰性之德者言性之所有如卦之德乃卦之韞也眀道又曰須是合內外之道一天人齊上下下學而上達極髙明而道中庸問觀物察己還因見物反求諸身否曰不必如此說物我一理才明彼即曉此合內外之道也語其大至天地之髙厚語其小至一物之所以然學者皆當理㑹伊川又曰時措之宜言隨時之義若溥博淵泉而時出之伊川藍田吕氏曰誠不為己則誠為外物道不自道則其道虛行既曰成矣苟不自成就如何致力既曰道矣非己所自行誰與行乎實有是理乃有是物有所從來有以致之物之始也有所從亡有以喪之物之終也皆無是理雖有物象接於耳目耳目猶不可信謂之非物可也天大無外造化發育皆在其間自無內外人有是形而為形所汩故有內外生焉惟生內外之別故與天地不相似若性命之德自合乎內外故具仁與智無己無物誠一以貫之合天德而施化育故能時措之宜也一本云理義者人心之所同然者也吾信乎此則吾德實矣故曰誠者自成也吾用於此則吾道行矣故曰道自道也夫誠者實而已矣實有是理故實有是物實有是物故實有是用實有是理故實有是心實有是心故實有是事是皆原始要終而言也箕不可以簸揚則箕非箕矣斗不可以挹酒漿則斗非斗矣種禾於此則禾之實可收也種麥於此則麥之實可收也如未嘗種而望其收雖荑稗且不可得況禾麥乎所謂誠者物之終始不誠無物也故君子必明乎善知至則意誠矣既有惻怛之誠意乃能竭不倦之強力竭不倦之強力然後有可見之成功苟不如是雖博聞多見舉歸於虛而已是誠之所以為貴也誠雖自成也道雖自道也非有我之得私也與天下同之而已故思成己必思所以成物所謂仁知之具也性之所固有合內外而無間者也夫天大無外造化發育皆在其間自無內外之別人有是形而為形所梏故有內外生焉內外一生則物自物己自已與天地不相似矣反乎性之德則安有物我之異內外之別哉故具仁與知無己無物誠一以貫之合天德而施化育故能時措之宜也又曰子貢曰學不厭知也教不倦仁也學不厭所以成己此則成己為仁教不倦所以成物此則成物為知何也夫盡性之德合內外之道以成己則仁之體也推是以成物則知之事也自成德而言也學不厭所以致吾知教不倦所以廣吾愛自入德而言也此子思子貢之言所以異也上蔡謝氏曰或問言有物而行有常如何是有物曰妄則無物是不誠也不誠無物誠者物之終始終始者有常之謂也物只是箇實存誠則有物問敬是存誠之道否曰須是體便見得建安游氏曰誠者非有成之者自成而已其為道非有道之者自道而已自成自道猶言自本自根也以性言之為誠以理言之為道其實一也延平楊氏曰誠自成道自道無所待而然也其為物終始天行也誠則形形故有物不誠而著乎僞則有作輟故息息則無物矣猶四時之運已則成物之功廢焉尚何終始之有故以習則不察以行則不著以進德則不可久以修業則不可大故君子唯誠之為貴萬物一體也成己所以成物也成己仁也合天下之公言之也成物知也即成己之道而行其所無事也知仁具性之德也有成己之仁故能合內外之道有成物之知故知時措之宜也又曰大學自正心誠意至治國家天下只一理此中庸所謂合內外之道也若內外之道不合則所守與所行自判而為二矣孔子曰子帥以正孰敢不正子思曰君子篤恭而天下平孟子曰其身正而天下歸之皆明此也又曰知合乎內外之道則禹稷顔回之所同可見蓋自誠意正心推之至於可以平天下此內外之道所以合也故觀其意誠心正則知天下由是而平觀天下平則知非意誠心正不能也兹乃禹稷顔回之所以同也又曰精義入神乃所以致用利用安身乃所以崇德此合內外之道也河東侯氏曰上言誠者自成道自道子思恐學者以內外為二事知體而不知用故又曰誠者非自成己而已也所以成物也猶言能盡其性則能盡人之性能盡人之性則能盡物之性者也豈有能成己而不能成物者不能成物則非能成己者也人物雖殊理則一也故曰成己仁也成物知也新安朱氏曰此第二十五章言人道也言誠者物之所以自成而道者人之所當自行也誠以心言本也道以理言用也天下之物皆實理之所為故必得是理然後有是物所得之理既盡則是物亦盡而無有矣故人之心一有不實則雖有所為亦如無有此誠之所以為物之終始而不誠之所以無物也下文所謂自成者蓋如此故君子貴之誠雖所以成已然在我者無僞則自然及物矣內外雖殊然皆性之德而唯誠者能之所以見於行事者以時措之而各得其宜也然必先成己乃能成物此道之所以必自道也自成自道如程子說乃與下文相應游揚皆以無待而然論之其說雖髙然於此為無所當且又老莊之遺意也誠者物之終始不誠無物之義亦唯程子之言為至當然其言大略故讀者或不能曉請得而推言之蓋誠之為言實而已矣然此篇之言有以理之實而言者如曰誠不可掩之類是也有以心之實而言者如曰反諸身不誠之類是也讀者各隨其文意之所指而尋之則其義各得矣所謂誠者物之終始不誠無物者以理言之則天地之理至實而無一息之妄故自古至今無一物之不實而一物之中自始至終皆實理之所為也以心言之則聖人之心亦至實而無一息之妄故從生至死無一事之不實而一事之中自始至終皆實心之所為也此所謂誠者物之終始者然也苟未至於聖人而其本心之實者猶未免於間斷則自其實有是心之初以至未有閒斷之前所為無不實者及其閒斷則自其閒斷之後以至未相接續之前凡所云為皆無實之可言雖有其事亦無以異於無有矣如曰三月不違則三月之間所為皆實而三月之後未免於無實蓋不違之終始即其事之終始也日月至焉則至此之時所為皆實而去此之後未免於無實蓋至焉之終始即其物之終始也是則所謂不誠無物者然也以是言之則在天者本無不實之理故凡物之生於理者必有是理方有是物未有無其理而徒有不實之物者也在人者或有不實之心故凡物之出於心者必有是心之實乃有是物之實未有無其心之實而能有其物之實者也程子所謂徹頭徹尾者蓋如此其餘諸說大抵皆知誠之在天為實理而不知其在人為實心是以為說太髙而往往至於交互差錯以失經文之本意正猶知愛之不足以盡仁而凡言仁者遂至於無字之可訓其亦誤矣吕氏所論子貢子思所言之異亦善而猶有未盡者蓋子貢之言主於知子思之言主於行故各就其所重而有賓主之分亦不但為成德入德之殊而已也楊氏說物之終始直以天行二字為解蓋本於易終則有始天行也之說假借依託無所發明楊氏之言蓋多此類最說經之大病也又謂誠則形而有物不誠則輟而無物亦未安誠之有物蓋不待形而有不誠之無物亦不待其輟而後無也其曰由四時之運已則成物之功廢蓋亦輟而後無之意而又直以天無不實之理喻夫人有不實之心其取譬也亦不親切矣彼四時之運夫豈有時而已者哉海陵胡氏曰學其所未能行其所未至思其所未得是所以自成於己也修其道以自引導其自小賢至於大賢自大賢至於聖人是自道達其身也合內外之道者外則成於物內則成於己皆本至誠相合而行嵩山朝氏曰誠與道一體而二名也其所以率性則一也皆無待於外者也涑水司馬氏曰凡物自始至終誠實有之乃能為物若其不誠則皆無之譬如鳥獸草木之類若刻畫而成或夢中暫睹豈其物邪況於仁義禮智但以聲音笑貌為之豈得為仁義禮智哉內則盡己之性外則化成天下皆㑹於仁義禮智信故曰合內外之道馬氏曰夫成己者自愛之至所以為仁也成物者知周乎萬物所以為知也仁與知同出於德性而有得於己故曰性之德也仁由於內以成己知由於外以成物合而言之所以為內外之道也然措之必宜其時也蓋當其成己則不可以不知其成物之時當其成物則不可以不知其成己之時措之宜也吳興沈氏曰誠與道同出而異名也誠者非有所假而成也自然而誠者也道非有所假而道也自然而道者也性之為誠道天理之自然也容有一毫加損於其間哉雖曰有所成有所道皆不知所以然而然者也誠者性也性之為體舉天地人物所從始所從終也仰觀於天則日月星辰風雲雷電雨露霜雪亦物也俯察於地山川河海草木丘陵亦物也逺取諸物則鳥獸魚鱉跂行喙息亦物也近取諸身則鼻目口耳百體四肢亦物也在人倫則君臣父子兄弟夫婦朋友亦物也在人理則仁義禮智信亦物也是數者皆出入消長於一性之中不曰物之終始可乎此誠之為體如是惟見性者能知之然誠之為體固不在人加損也而人不可以不有誠焉人而不誠則何天地人物之有乎盡性而至於盡天地之性者誠也致曲而至於形著明動變化者誠之者也故君子誠之為貴唯君子之誠而天地人物從而有立則誠之為道豈特自成己而已抑所以成物也成己謂之仁成物謂之智指仁智之定體也誠者性也仁知德也故曰性之德也語其在己則謂之內語其在物則謂之外揆之以誠則已與人物天地皆一體也無彼己之閒也是合外內之道也誠至於合內外則已與人物天地之理皆曲成而不遺隨所措而無不宜矣范陽張氏曰有始無終有終無始皆非誠也成己即是成物以已與物同一源也使止知成己而不成物楊朱之為我也止知成物不知成己墨翟之兼愛也自人而觀之己者內也物者外也自誠而觀之己與物一體而已合外內而無所擇者此誠也晉陵喻氏曰君子之於誠自成而已其於道自道而已非由外鑠我也我固有之也生乎由是死乎由是蓋終始不渝然後可以言誠不誠則無物何以使人觀而化與夫動天地感鬼神哉是故君子誠之為貴也君子豈自成己而已哉使天下之民匹夫匹婦莫不被其澤百穀草木莫不蕃廡鳥獸魚鱉無不咸若則君子之志也人皆以成物為仁君子則曰成己者仁也成物者知也使吾之誠未至則未能正心而修身其何以成哉必意誠而後心正心正而後身修身修而後家齊家齊而後國治國治而後天下平此成物之知舜所以為大知也與當是時視人如我視我如人天地即我我即天地所謂合內外之道也故時措之宜也聖人之能事畢矣臨川王氏曰以實於己者言之則為誠以誠而行之則曰道其實一理也是理也本與生俱生非由外鑠使人能反身而誠則是誠也豈非自成也人能率此以行之則是道也豈非自道乎使自外而為之則非誠道矣髙要談氏曰誠自成也道自道也蓋明為己之學也天命之性已所固有誠者實此者也實有諸己故曰自成道者行此者也力行由己故曰自道自云者言非他求皆自已分內事也誠與道皆已所固有非由外求故言其自成則命之曰誠言其自道則命之曰道要皆自已性命之理無二致也凡天下之物誠之則有不誠則無故物之終始全繫於誠也物之始謂物之所起處也物之終謂物之極盡處也指誠為物之所由起與物之所由盡則是誠則有物不誠則無物也蓋實有是理方有是物不誠則無是理故無是物也凡可名言者皆物也只如天命之性雖已所固有儻不能反身而誠實有諸己則固有之性亦墮於虛無中矣所謂不誠無物者如此故君子誠之為貴言貴乎實有諸己也一人之身萬物皆備反身而誠既足以成已推此施之亦足以成物成己者其體全故謂之仁成物者其用周故謂之知蓋非仁則無以盡體諸己非知則不能推用於物故也仁知具足體用兼備此誠所以為性之德合內外之道也性之德言實理之可據者也成己成物即此德也合內外之道言實理之兼體用也具仁與知即此道也其為德為道也如是故舉措唯時咸適其宜也夫誠之體為仁誠之用為智誠之實理可據曰德誠之實理可知曰道凡欲識仁知道德之所以名觀此即見之矣夫天理一也仁者體此知者知此禮者履此義者宜此信者有此故仁知道德與時措之宜皆以誠為本亦猶孟子言仁義禮知之端而不及信明人之有是四端無不以信為本也此章雖不言義與禮如所謂時措之宜則義與禮在其中矣即此論之則堯舜之孝弟夫子之忠恕子思之言中庸孟子之言仁義皆一出於誠而已所謂一以貫之其在是歟延平周氏曰必於性言德於外內言道者蓋性在我也故以其自得而謂之德內可以言道而外不可以言德故以其可由而謂之道仁不止於成已而以成己為主故孔子之教不倦亦謂之仁知不止於成物而以成物為主故孔子之學而不厭亦謂之知霅川倪氏曰萬物皆備於我矣反身而誠樂莫大焉不誠無物者豈有此樂哉蔡氏曰此主誠之者之用為言誠者是言天之道誠之為貴是言人之道又曰誠者生知安行成固自然成道亦自然道乃天道生物不測之機也故曰物之終始不誠則不能有物是故君子誠之為貴苟能致曲盡誠之之道則其誠也非特成己所以成物也學而至此則物我一源仁智兩盡性德合乎外內而時措皆宜於誠者天道之誠無閒矣新定錢氏曰孟子云哭死而哀非為生者也誠者已分當然之事豈為人而誠哉有一毫為人之心即非誠矣故誠乃自成而其道乃自道也非有假於外也我固有之也新定顧氏曰誠之於物猶水之於波濤也水本質也波濤由水而生者也誠本質也物由成而出者也波濤由水而生及波濤之泯則歸於水物由誠而出及物之終則歸於誠此物之所以始於誠而終於誠也故曰誠者物之終始以物之由誠而出也非誠其何以有物故曰不誠無物其曰成己仁也體是道於已謂之仁成物知也知物之當成謂之知要之成己成物皆此誠之運用流行仁知特強名爾其實則性之德也合內外之道也外成物也內成己也分而言之則曰成己仁也成物知也總而言之則曰性之德也合內外之道也合者兼總之意夫莫切於己賴誠而成仁之名由是得焉莫衆於物賴誠而成知之名由是得焉一性之德於是乎在內外之道於是乎合則誠也者夫豈可以斯須廢是以宜於時措時措云者無時而不用之也故時措之絶句宜也又自是一句有問物始生於誠終復歸於誠如此則人死後歸于大通不復為鬼答曰不然鬼神亦物也凡麗於隂陽者皆物事亦物也物之始生不應一頓便突出來其化生之序氣感成象體具成形凡幾節奏死後不應便滅亦有幾許變化但未知為鬼神後其存滅又如何耳此却智慮所不能及人之所知固有限耳禮記集說卷一百三十三
