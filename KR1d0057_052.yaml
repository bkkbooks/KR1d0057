body:
  text: 禮記集說卷五十二宋衛湜撰立大傅少傅以養之欲其知父子君臣之道也大傅審父子君臣之道以示之少傅奉世子以觀大傅之德行而審喻之大傅在前少傅在後入則有保出則有師是以教喻而德成也鄭氏曰養猶教也言養者積浸成長之大傅示之謂為之行其禮少傅審喻之為說其義在前在後謂其在學時出入謂燕居出入時教喻德成以有四人維持之也孔氏曰外有傅相內有師保是以世子於師教曉喻其德業成就嚴陵方氏曰禮樂者教之之道也有教之之道茍非教之之人則道不虛行故立大傅少傅以養之養之將以成其才故也內則父子外則君臣人之大倫也教養之道欲其知此而已保則親也故入則有保師則正也故出則有師然分而言之固如此合而言之則左右前後出入起居師也傅也保也未嘗不在焉馬氏曰莫非道也而父子君臣者道之要也廬陵胡氏曰養長養也猶易蒙以養正石林葉氏曰家則父子國則君臣世子所學治國齊家以及平天下然其道不可不先有所養大傅少傅養世子之官也大傅在前審其道以示之使視而見也少傅在後奉世子以觀之使觀而化也長樂陳氏曰師則帥以善而使之知保則保其善而使之勿失傅則輔其善而使之成大傅在前少傅在後則師保在左右矣入則有保出則有師則大傅少傅出入皆預矣出入前後莫非正人則目不閲淫色耳不聞優笑居不近庸邪玩不備珍異而所見者正事所聞者正言所行者正道此所以教喻而德成山隂陸氏曰示示之以象喻喻之以言保者母道也師者父道也保保其身體傅傅之德義師道之教訓建安真氏曰前言禮樂者教世子之具此言師傅者教世子之人故立大傅少𫝊以養之養者從容啓迪以養其本然之善使之自然開悟也然其道無他不過君臣父子之大倫而已大傅以審示言謂修於身以示之也少傅以審喻言謂開說其義以曉之也大傅少傅所以教者雖同然大傅以身教少傅以言教二者蓋互相發也以一世子之身而大傅在前少傅在後入有保出有師四人者扶持而左右之教安得不達德安得不成哉師也者教之以事而喻諸德者也保也者慎其身以輔翼之而歸諸道者也記曰虞夏商周有師保有疑丞設四輔及三公不必備唯其人語使能也鄭氏曰慎其身者謹安護之記所云謂天子也取以成說語言也得能則用之無則已不必備其官也小人處其位不如且闕孔氏曰記者更明師保之德師教世子以所行之事使世子曉喻於德義保則護慎世子之身輔相翼助使世子歸於道諸於也記曰者是古有此記至唯其人皆古記之語語使能一句是作記者解之也案尚書大傳古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其祿視次國之君古記乃天子之事作記者取以成世子之記耳長樂劉氏曰師教之敬其五事俾德有地以生焉保護之正其百行俾道有方以達焉記曰者古之三王既稽乎古以成世子之教又從而記之以遺後人修是經者引以為證也長樂陳氏曰師教之以事而喻諸德師氏教國子以三德三行是也保慎其身以輔翼之而歸諸道保氏養國子以六藝六儀是也虞夏殷周之有師保所謂設三公也有疑丞所謂設四輔也師保謂之三公充其數則有傅疑丞謂之四輔充其數則有輔弼夫能有聖人之能有賢者之能有能者之能也所謂使能者兼聖賢而言之也舜教胄子以夔周教國子以司樂則教之以樂而已記言教之以禮樂者樂非禮不節禮非樂不和教之以樂則禮存乎其中矣馬氏曰教之以事而喻諸德者由淺而至深也保者所以護之故慎其身以輔翼之而歸諸道也道也者言其所由也山隂陸氏曰師教之以事而喻諸德保護其身以輔之歸諸道如此何事而非德孰身而無道記曰有師保有疑丞而已言不具也官不必備此官率六卿有道者兼之書曰召公為保周公為師相成王為左右左右蓋輔弼之任也三公言及者尤難其人也虞夏殷周有師保有疑丞疑擬其前丞承其後比我而相之謂之輔拂我而相之謂之弼以擬吾前故有問無以對責之疑以承吾後故可志而不志責之丞以比我嫌於不能正故可正而不正責之輔以拂我嫌於不能揚故可揚而不揚責之弼建安真氏曰師也者教世子以事而喻諸德謂教之以事親之事則知孝之德教之以事長之事則知弟之德天下無事外之德也保則安護世子之身輔之翼之使歸諸道耳目口體不以欲而動即所謂道天下無身外之道也古者所謂師保其職蓋如此君子曰德德成而教尊教尊而官正官正而國治君之謂也山隂陸氏曰君子成德之名嚴陵方氏曰言君子有君國子民之德也蓋教世子必使為君子故以是言之德成而教尊者為其能重道故也教尊而官正官正而國治學至於此然後能為君故曰君之謂也馬氏曰官正以言其近國治以言其逺董仲舒曰正心以正朝廷正朝廷以正百官正百官以正萬民萬民正則逺近內外莫不一於正與此同意也夫德之所以成者衆矣而獨言君者蓋有德而無位則教未必尊官未必正國未必治也有君德而又有君位然後可以及此也長樂劉氏曰君子曰德者四輔三公之任所以弼成天子從容中道其德任於師傅矣故德成者其教尊教尊者其官正官正者其國治君之謂也言四輔三公之官各正厥職則國罔不治而君道成焉故三代之君以國治為德之成則師傅之官正而教尊焉仲尼曰昔者周公攝政踐阼而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之况于其身以善其君乎周公優為之鄭氏曰聞之者聞之於古也于讀為迂迂猶廣也大也孔氏曰仲尼聞古之言為人臣者殺身猶尚為之況周公乃廣大其身古人益君則身處危亡周公益君則身居尊顯古人益君則勤苦周公益君則逸樂是於身有優饒於德又廣大也廬陵胡氏曰漢書胸奴傳云于者廣大之貌黃氏曰蓋迂者迂回委曲之義也優者優勝之義也謂周公迂回委曲設教如成王有過撻伯禽之類皆委曲其身以正其君為聖人優勝之道也故能成其大功其先引殺身益君者教後世弼輔王室者如周公盡心以成其太平之功仁聖之德皆可則效為人臣者殺身益君猶可豈不可繼立周公之道哉則立教勸善之㫖正在於斯矣長樂陳氏曰迂身非直躬者也殺身非迂身者也迂身以善其君者易殺身以有益於君者難為人臣者於其難者猶且為之況其易者乎此周公所以優為之也蓋周公以臣而攝君之政成王以君而學世子之事此所為迂也然不爾不足令成王知君臣長幼之義先儒嘗謂周公之道曲而當者此也於周公言踐阼於成王言蒞阼踐以位言蒞以政言嚴陵方氏曰于者曲也與于則于同解己見彼周公居人臣之位而攝天子之政抗世子法於伯禽以善成王皆所以致曲也優言為之有餘而不迫也馬氏曰為人臣者無以有己殺身以成其仁者有矣故殺其身有益於君則為之然而殺身而益其君則非君子之所欲也若夫有以益於君又有以存其身則君子之所欲也周公所以優為之建安真氏曰周公抗世子法於伯禽者蓋成王雖幼已為君矣不可以教世子者教之惟以教世子者教伯禽使成王覩之是乃所以善成王也傳言成王有過則撻伯禽成王不可撻也撻伯禽則成王知警矣是故知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王幼不能涖阼以為世子則無為也是故抗世子法於伯禽使之與成王居欲令成王之知父子君臣長幼之義也鄭氏曰以為世子若為世子時也伯禽與成王居亦學此禮於成王側孔氏曰成王既幼未能涖阼為人君應須教以世子之法然後能為人君成王既無父今若以成王為世子時則無為世子之處故抗世子法於伯禽使伯禽與成王居令成王學之知父子君臣之義也鄭注若為世子時以實則不為世子也嚴陵方氏曰盡人之道無他在乎參彼己之情而已然則居君父之位操使令之權其可以不知臣子事人之道哉既居天子矣又不可以世子之法加之故抗世子法於伯禽使之與成王居欲其相觀而善故也此文繼言長幼而上則不言者以事人使人兼之故也馬氏曰登高必自下陟遐必自邇君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎也鄭氏曰處君父之位覽海內之士而近不能教其子則其餘不足觀矣石林葉氏曰父子主恩君臣主義於為子而教則易以恩廢於為臣而教則易以義奪此世子所以養之道教之德使自得於己而不以義傷恩也講義曰夫教養世子而不能使之知父子君臣之道非唯不能以善世子亦非所以兼濟天下之道也何者兼濟天下之道始於父子君臣之義也能善養世子者使知是道然後可以兼天下而有之矣故曰養世子不可不慎也得其教養世子之術則與夫兼天下而有之者兩得之矣不得夫教養世子之術則與夫兼天下而有之者兩失之矣此所以不可不慎也易曰慎斯術以往其無所失矣亦是意也行一物而三善皆得者唯世子而已其齒於學之謂也故世子齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也周公踐阼鄭氏曰學之為父子君臣長幼學教也司主也一一人也元大也良善也貞正也孔氏曰物猶事也一事謂與國人齒讓三善謂衆知父子知君臣知長幼也世子唯在學時與國人齒若朝㑹飲食則各以位之尊卑諸子職云辨其等正其位是也國人謂不知禮者疑而發問也有父在則禮然者是知禮之人答之也父在則常須謙退不敢居人之前故云父在則禮當如此父子天性自然故云道君臣以義合故云義長幼有等級上下故云節不言兄在則禮然而云長長者以世子無兄故也國人聞世子居臣子之禮於是各知尊其君父故世子所以父在為子禮君在為臣禮也斯語辭也謂之臣者世子於君雖曰君臣異於義合也樂正主太子詩書之業父師成就其德行一人謂世子一人有大善則萬國以正也從上三王教世子至此皆周公踐阼之事長樂劉氏曰物謂德行與鄉三物同義長樂陳氏曰齒於學世子所難也以所難之事而世子行之非德性之自然何以至此故曰行一物物者性也行一物由中出也三善皆得者自外入者也經曰雖天子必有尊也以天子尚有所尊而況於民乎故知為父子則孝知為君臣則忠知為長幼則順孝弟忠順立而國治矣嚴陵方氏曰齒讓者序齒而相讓也父在斯為子君在斯謂之臣或言為或言謂之者唯其以天合故直言為唯其以人合故止言謂之也內則父子外則君臣長幼則內外之所兼有也內外治則國其有不治者乎書言父師少師則此言父師蓋大師也以其尊故以父稱之山隂陸氏曰衆著於君臣之義辭間容與緩辭也父子在我長幼在我而君在彼其言也亦以此父在斯為子君在斯謂之臣變為稱謂者言忠孝一致也為子孝臣斯忠矣故曰事父孝故忠可移於君學之為父子學之為君臣學之為長幼於此有學焉蓋樂正司成之事周公踐阼亦目下事不言而治至是天下定矣不嫌不治亦治在成王者也此篇始曰周公相踐阼而治次曰周公攝政踐阼而治卒曰周公踐阼則周公踐位久天下愈益不疑馬氏曰凡入學以齒父在則居子之節知所以親親也君在則居臣之節知所以尊君也其父子君臣長幼足法而後民法之也故曰父子君臣長幼之道得而國治也新安朱氏曰語曰此書太甲篇文有本作人正謂天子而元良初不謂太子也古人引經多如此今但隨文觀之可也石林葉氏曰一人元良萬國以貞蓋乾始於元而終於貞世子有君道也體元之善則仁以長人立事之幹則貞以及萬國庶子之正於公族者教之以孝弟睦友子愛明父子之義長幼之序鄭氏曰正者政也庶子司馬之屬掌國子之倅為政於公族者孔氏曰自此至不翦其類為第三節明庶子正理族人燕飲及刑罰殊於異姓之義今案在下皆君之所為非庶子所正故知庶子唯主其政令而已故讀為政周禮諸子下大夫二人屬司馬諸侯謂之庶子職掌與諸子同鄭注諸子云國子是公卿大夫士之副二也言副二於父也長樂劉氏曰正政也諸侯立官掌其宗族之政治則曰庶子天子立官掌其宗族之政治則曰諸子周禮未成之前尚仍文王舊法故此經曰庶子之正於公族正者所以正人之性俾安於中則情僞雖生不敢越於理義然後君仁臣忠父慈子孝兄友弟恭夫正婦順朋友信義五品不違於中而人倫之道明乎宗族矣聖人將化天下也齊其國也正其宗族以為之本將正其宗族也正身以為之本必擇賢才盛德之士以掌其政令則庶子之官非其人不可得以正其宗族矣是以庶子之政必以六德六行為本長樂陳氏曰言教世子而繼之以庶子正公族行法自貴者始故也教之事乎上則以孝弟教之交乎旁則以睦友教之恤乎下則以子愛山隂陸氏曰周官所謂諸子即此庶子燕禮曰古者周天子之官有庶子官職諸侯卿大夫士之庶子之倅先儒謂庶子諸侯之官誤矣廬陵胡氏曰正謂公族之所取正建安真氏曰周公之所以教者不過為人子為人臣與事人之道而已能此三者則他可類推矣古者天子公侯卿大夫士之子皆入於學而世子與之齒遜焉夫天子之世子將為君者也而乃於公侯卿大夫士之子以齒為後先何哉君在故也父在故也長長故也身為世子而以尊君親親敬長之道為天下倡人其有不翕然視效者哉秦漢以來禮樂既廢而又無師保之教齒胄之禮世子生而狃於貴驕之習此篇雖存無復有考之者矣此治之所以不古若歟其朝於公內朝則東面北上臣有貴者以齒其在外朝則以官司士為之鄭氏曰內朝路寢庭外朝路寢門之外庭司士亦司馬之屬也掌羣臣之班正朝儀之位也孔氏曰此公族之等若朝於公之內朝則西方東面北上皆同姓之臣不得踰越父兄皆以昭穆長幼為齒謂父兄雖賤而在上子弟雖貴而處下若公族朝於外朝與異姓同處其位次則以官之上下不以齒也案周禮司士掌路寢門外之朝此外朝司士為之則知內朝是路寢庭朝也又司士掌正朝儀之位王族故士虎士在路門之右南面大僕從者在路門之左南面是在路門外也故知此外朝路寢門外之朝也此對路寢庭朝為外朝若對庫門外朝朝士所掌三槐九棘之朝則此路門外朝亦為內朝也故玉藻云朝於內朝朝辨色始入君日出而視之退適路寢是也其朝位天子之朝三公北面東上孤東面北上卿大夫西面北上其士門西東面北上若諸侯之朝案大射卿西面北上大夫北面東上士門西東面北上與天子不同長樂陳氏曰周官太僕掌燕朝之服位宰夫掌治朝之法司士掌朝儀之位朝士掌外朝之法文王世子公族朝於內朝庶子掌之其在外朝司士掌之玉藻朝服以日視朝於內朝退適路寢聽政然則文王世子與玉藻所謂朝者諸侯之朝也蓋天子庫門之外外朝也朝士掌之路門之外治朝也宰夫司士掌之路寢燕朝也太僕掌之諸侯亦有路寢有外朝則文王世子所謂內朝者玉藻所謂路寢也玉藻所謂內朝者文王世子所謂外朝也玉藻於路寢之外言內朝則又有外朝明矣諸侯內朝司士掌之其官與天子同燕朝庶子掌之其官與天子異魯語曰天子及諸侯合民事於外朝合神事於內朝自卿以下合官職於外朝合家事於內朝然則卿大夫亦二朝也王燕朝之位雖太僕掌之然其位之所辨不可以考文王世子曰公族朝於內朝東面北上臣有貴者以齒則王之燕朝宜亦然也禮書嚴陵方氏曰北上則所尊在內也臣有貴者以齒則賤者可知矣自三公而下皆在所司而以士名官者司至於士則朝之所司者悉矣且古之名官多以小該大故守廟祧而名之曰守祧典律同而名之曰典同也馬氏曰內朝以齒則公族有所伸外朝以官則公族有所屈有所伸有所屈皆先王治宗族之道其在宗廟之中則如外朝之位宗人授事以爵以官其登餕獻受爵則以上嗣鄭氏曰宗人掌禮及宗廟也以爵貴賤異位也以官官各有所掌也若司徒奉牛司馬奉羊司空奉豕上嗣君之適長子以特牲饋食禮言之受爵謂上嗣舉奠也獻謂舉奠洗爵酌入也餕謂宗人遣舉奠盥祝命之餕也大夫之嗣無此禮辟君也孔氏曰若公族在宗廟之中則其立位如外朝之位宗人授百官之事隨爵之尊卑貴者在前賤者在後又以官之職掌各共其事案周禮司徒奉牛牲司馬奉羊牲其司空奉豕無文案周禮雞人屬宗伯羊人屬司馬犬人屬司冦又案五行傳牛屬土雞屬木羊屬火犬屬金豕屬水司空冬官位屬水故鄭知司空奉豕據諸侯三卿言之故不云雞犬及馬也其登餕獻受爵不用衆官唯用上嗣案特牲禮尸食之後主人主婦賔長等獻尸三獻禮畢主人獻賔及獻衆賔畢主人酬賔賔奠不舉主人獻長兄弟及獻衆兄弟內兄弟等訖長兄弟洗觚酌尸為加爵衆賔長又加爵畢嗣子乃舉奠奠者初尸未入之前祝酌奠於鉶南尸入祭奠不飲至此乃嗣子舉之必嗣子舉奠者鄭注云將傳重纍之者又云大夫之嗣子不舉奠奠者唯天子諸侯及士之子禮耳特牲又云嗣舉奠盥入北面再拜稽首尸執奠嗣子進受復位再拜稽首尸答拜嗣子卒觶拜尸尸答拜則此經所謂受爵也又云嗣舉奠洗酌入尸拜受嗣子答拜則此經所謂獻也又云無算爵之後禮畢尸謖而出宗人遣嗣子及長兄弟相對而餕所謂餕也以特牲言之則先受爵而後獻獻而後餕今此經先云餕者以餕為重舉重者從後以嚮先逆言之也登謂登堂無事之時嗣子在堂下餕時登堂獻時亦登堂受爵之時亦登堂此一登之文包此三事也餕時雖有長兄弟以上嗣為主長樂劉氏曰宗人者諸侯掌禮之官也天子則曰大宗伯長樂陳氏曰外朝主敬宗廟之中亦主敬故在宗廟之中則如外朝之位孔子在宗廟朝廷便便言唯謹爾是宗廟朝廷之儀一也特牲之禮受爵而後獻獻而後餕此餕而後獻獻而後受爵者特牲言行禮之序此言其尊祖而已故有所先後嚴陵方氏曰凡有族則有祀祀則有宗宗人蓋典祀者也虞曰秩宗殷曰太宗周曰宗伯其義一也然屬於禮者皆宗之所典其名止以祀為義者五禮以祀為先故也山隂陸氏曰內朝親親外朝貴貴在宗廟之中則二者並隆宗人授事以爵以官貴貴也其登餕獻受爵則以上嗣親親也以官若君執圭瓉祼尸大宗執璋瓉亞獻之類以爵若迎牲君執引卿大夫從士執芻之類也獻受爵謂上嗣嘗受爵於尸矣已而復酌獻尸也據特牲嗣舉奠盥入尸執奠進受復位舉奠洗酌入尸拜受庶子治之雖有三命不踰父兄鄭氏曰治之治公族之禮也唯於內朝則然其餘㑹聚之事則與庶姓同一命齒於鄉里再命齒於父族三命不齒不齒者特為位不在父兄行列中孔氏曰庶子治之為治此公族朝於內朝之時也既不計官之大小故雖有三命之貴而列位不得踰越在無爵父兄之上其餘非內朝則並計官也此句應承臣有貴者以齒之下當是簡札遺脫耳其外朝既曰司士為之則內朝自然庶子治之也鄭引一命再命三命皆黨正文一命尚卑若與鄉里長宿燕食則猶計年也再命漸尊不復與鄉里計年唯官高在上但父族為重猶與之計年為列三命大貴則不復與父族計年唯官高在上别席獨坐在賔之東也嚴陵方氏曰前言司士為之此言庶子治之者治上道也為下道也山隂陸氏曰司士為之庶子治之者為之以禮治之以義也蓋司士為之以禮恩也故庶子治之以義雖有三命不踰父兄據此進齒一等方其以爵以官嫌齒太陵故也先王所以均節仁義使恩協禮稱世無得議焉凡以此其公大事則以其喪服之精粗為序雖於公族之喪亦如之以次主人鄭氏曰大事謂死喪也其為君雖皆斬衰序之必以本親也主人主喪者次主人者主人恆在上主人雖有父兄猶不得下齒孔氏曰此謂君喪而庶子官掌之事也案喪服臣為君雖皆斬衰其庶子列次之時則以其本服之精粗為序衰粗者在前衰精者在後精粗謂衰服縷布精粗也非但公喪如此雖於公族之內有死喪之事相為亦如之為死者服粗者居前服精者居後雖有庶長父兄尊於主人仍次於主人之下使主人在上居喪主也嚴陵方氏曰送死足以當大事故謂之大事服輕則於喪者為疏服重則於喪者為親以精粗為序也若公與族燕則異姓為賔膳宰為主人公與父兄齒族食世降一等鄭氏曰異姓為賔為同宗無相賔客之道膳宰為主人君尊不獻酒也與父兄齒親親也族食世降一等親者稠疏者希孔氏曰此明公與族人燕食之禮庶子掌之也燕飲必立賔以行禮異姓為賔必對主人君尊不宜敵賔故使供膳之宰以為主人使得抗禮酬酢也公既不為主族人又不為賔故列位在父兄之坐上與族人相齒見親親也族食謂與族人燕食也族人既有親疏燕食亦隨世降殺假令本是齊衰一年四㑹食若大功則一年三㑹食小功則一年二㑹食緦麻則一年一㑹食是世降一等也若與異姓燕飲則燕禮云宰夫為獻主嚴陵方氏曰凡燕之禮必立賔以備酬酢之儀若鄉飲酒言立賔以象天是也然主人者尊賔既謂之賔則尊之而已非親之也親莫親於同姓則君於同姓固無賔之之禮也故燕族之賔不以同姓而以異姓為之也膳宰解見篇首主人即周官所謂獻主也謂之燕則君於羣臣亦有賔主之道焉故不可以無獻主雖然君臣之義又不可以燕廢也故使膳宰為主人而已蓋燕飲以食飲養賔而膳宰以食飲養君之官也使所以養君者養賔焉則君子之厚意也公與父兄齒則以門內之治而長幼之節不可廢故也山隂陸氏曰世降一等謂若於君在祖行即就父行父行就兄弟行兄弟行就子行蓋燕以示慈惠饗以示恭儉食在二者之間長樂陳氏曰先王之與同姓有時燕焉有因祭而燕焉國語曰時燕不淫此時燕也詩曰諸宰君婦廢徹不遲諸父兄弟備言燕私坊記曰因其酒肉聚其宗族以教民睦此因祭而燕也其禮之詳雖不可考要之服皮辨服即於路寢宰夫為主異姓為賔主與族人燕於堂后帥內宗之屬燕於房其物肴蒸所以合食也其食世降一等所以辨親疏也昭穆以序之所以明世次也夜飲以成之所以别異姓也若夫几席之位升降之儀脫屨而坐立監相禮羞庶羞以盡愛爵樂無算以盡歡其大率蓋與諸侯燕禮不異諸侯燕族人與父兄齒雖王之尊蓋亦不以至尊廢至親也特牲饋食禮祝告利成徹庶羞設於西序下鄭氏引書傳曰宗室有事族人皆侍終日大宗已侍於賓奠然後燕私燕私者何也已而與族人飲也此徹庶羞置西序下者為將以燕飲與然則自尸祝至於兄弟之庶羞宗子以與族人燕飲於堂內賓宗婦之庶羞主婦以燕飲於房由是觀之燕族之禮不特天子諸侯而已禮書其在軍則守於公禰公若有出疆之政庶子以公族之無事者守於公宫正室守大廟諸父守貴宫貴室諸子諸孫守下宫下室鄭氏曰在軍謂從軍者公禰行主也行以遷主言禰在外親也出疆謂朝覲㑹同也正室適子也太廟太祖之廟守貴宫貴室謂守路寢下宫親廟也下室燕寢也或言宫或言廟通異語孔氏曰此明庶子從行在軍及公行庶子留守之事公禰謂遷主載在齊車隨公行者庶子官既從在軍故守於公齊車之行主也遷主而呼為禰者既在國外故依親親之辭若出疆庶子不從公行則亦掌留守之事云庶子以公族之無事者守於公宫者與下文為總正室守太廟以下則各言其别無事謂不從行及無職事者正室謂公卿大夫之適子也貴宫貴室總據路寢指其院宇謂之宫指其所居之處謂之室上言大廟故知此下宫是高祖以下親廟上云貴室是路寢故知此下室是燕寢諸父諸子諸孫未審為是君之諸父及諸子孫之行為當是見任卿大夫之諸父子孫也然鄭解正室適子云卿大夫適子則諸父子孫亦謂卿大夫之諸父子孫也不云兄弟者諸兄從諸父諸弟從諸子也長樂陳氏曰古之教國子者以什五之法寓於道藝之間以羡卒之法行於游倅之列及其有事則用之故在軍則守公禰在國則守公宫繫於庶子則守公禰者公命之也周官小宗伯曰正室謂之門子則正室適子也戰則守公禰此以死守公禰者也故謂之孝愛之深正室守太廟此以承重者守所重也故謂之尊宗室而君臣之道著諸兄諸父守貴室子弟守下室此尊不逼下下不陵上者也故謂之讓道達先王之於國子教之未嘗不用用之未嘗不教此所以無不成之材也嚴陵方氏曰古者軍行必載遷主解見曽子問守公禰必以其族而異姓不得與焉則不以疏間親故也族之無事謂無吉凶之事者正室守太廟則以將為祭主故也以其當室故謂之正室以其當門故小宗伯謂之門子其實一也貴宫貴室謂昭廟也下宫下室謂穆廟也父為昭故諸父諸兄守昭廟子為穆故諸子諸孫守穆廟既言宫又言室者以理推之則伯父守貴宫叔父守貴室諸子守下宫諸孫守下室可知孫非穆行而守下室者以其卑而已其曰諸則所守者非一人矣山隂陸氏曰太廟若周公之廟貴宫貴室若魯公之廟下宫下室若羣公之廟喪大記曰內子未命則死於下室趙世家曰昔者下宫之難此卿大夫下宫下室也廬陵胡氏曰以上言公宫則知上宫下宫皆人所居之宫也上言大廟則知貴室下室皆親廟而高祖以下也文十有三年大室屋壞室謂廟也禮記集說卷五十二
