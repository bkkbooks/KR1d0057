body:
  text: 禮記集説卷八十六宋衛湜撰少儀第十七孔氏曰案鄭目録云少儀者以其記相見及薦羞之小威儀少猶小也此於别録屬制度嚴陵方氏曰篇中所言不特主於少者然壯者之儀亦在乎少時所習而已山隂陸氏曰內則曰十年學幼儀則此篇其類也范陽張氏曰先儒訓少為小其意以為所記者小節耳聖人之道本無大小以此為小孰能為大少有副意如大師之有少師則少者所以副其大是儀者所以副其禮也有大無小何以見其用伊川先生曰灑掃應對即形而上者之事豈不信哉聞始見君子者辭曰某固願聞名於將命者不得階主敵者曰某固願見鄭氏曰君子卿大夫若有異德者固如故也將猶奉也即君子之門而云願以名聞於奉命者謙逺之也重則云固奉命傳辭出入階上進者言賔之辭不得指斥主人敵當也願見願見於將命者謙也孔氏曰此一經論見君子之法但此一篇雜明細小威儀不復局以科假記者謙退不敢自専制其儀而傳聞舊説故曰聞也辭客之辭也某客名也再辭曰固聞名謂名得通達也將命謂傳辭出入通主客之言語也客實願見君子而云願聞名於傳命者不敢必斥見君子但願將命者聞之而已不云初辭而云固者欲明主人不即見己己乃再辭也若初辭則不云固惟云某願聞於將命者耳階進也人升階必上進主謂主人也客冝卑退不得進斥主人也敵者不謙故云願見亦應云願見於將命者因上已有故此略之固義亦同上長樂劉氏曰古者朋友往來賔主相覿同用一禮於是傳命共為一辭若士相見載於儀禮用以一天下之禮俗也此少儀所以載於經乎曰聞者謂三代先王既行其辭於舊俗間或衰墜而知禮者未盡殞滅故曰聞焉願聞名於將命者謂至於門外擯者請事答以辭不得階主述其崇德之意不敢由階升堂直見主人之謂也金華應氏曰古禮廢壞辭命不審擯詔不嚴交際之義能盡其敬者固鮮然分勢之隆崇者又未免亢焉而不接人臣之見天子昧死而後言頓首而後請其辭曰陛下下僚之見上官庭趨而後進升階而屢降其辭曰閣下亦幾於阻絶而不通矣夫將命者人也人則有可通之情陛階門閣地也地則無自通之路噫安得以少儀之辭而語之哉嚴陵方氏曰聞言所記之事非由於己見乃聞之於人爾君子者有位有德者之通稱也辭則表記所謂無辭不相見是矣將命者蓋將奉主人之命而傳道之者也亦擯詔之類歟論語言將命者出户是矣願見君子而曰願聞名於將命者以其尊而不可以遽見故先欲聞其名以其不可指斥而與之亢禮故止言將命者而已不得階主蓋言不可指斥主人升進而與之階也與之相敵故不必先聞其名直曰願見而已此隆殺之辨也山隂陸氏曰主主尊者階階敵者不得階主亦詞也若曰固願見不得階主而前爾新安邵氏曰諸家解釋不得階主未甚分曉以愚觀之階猶階梯之階主猶觀近臣以其所為主之主求見君子者辭曰某固願聞名於將命者恐不得將命者導達為之階主爾夷之因徐辟而求見孟子正此意罕見曰聞名亟見曰朝夕瞽曰聞名鄭氏曰罕希也希相見雖於敵者猶為尊主之辭如於君子也亟數也於君子則曰某願朝夕聞名於將命者於敵者則曰某願朝夕見於將命者瞽無目也以無目辭不稱見孔氏曰前二條明始相見此經明已相見而疏者尊者敵者皆云願聞名於將命者然敵者始來曰願見重來而數翻曰聞名者亦奬之使不疏也或云始來禮隆故尊卑宜異重來禮殺故宜同也亟見謂數相見者瞽者其來不問見貴賤則並通云願聞於將命者嚴陵方氏曰罕見以其相見之希疑其情之不通雖於敵者亦曰聞名而已適有喪者曰比童子曰聽事適公卿之喪則曰聽役於司徒鄭氏曰適之也曰某願比於將命者比猶比方俱給事童子未成人不敢當相見之禮曰某願聽事於將命者聽役者喪憂戚無賔主之禮皆為執事來也孔氏曰前明吉禮相見此以下明凶事相見也往敵者喪家喪不主相見凡往者皆是助事故云比謂比方其年力以給喪事也若五十從反哭四十待盈坎皆是比方其事童子往適他喪不得與成人為比但來聽主人以事見使也若適公卿貴者之喪聽主人之見役輕重唯命不敢辭也云於司徒者國有大喪謂公卿之喪則司徒率其屬掌之故司徒職云大喪帥六卿之衆庶屬其六引而治其政令鄭云衆庶所致役也又檀弓云孟獻子之喪司徒旅歸四布是也嚴陵方氏曰比猶比之匪人之比言願比於將命者以俱給事也君將適他臣如致金玉貨貝於君則曰致馬資於有司敵者曰贈從者鄭氏曰適他行朝會也資猶用也贈送也孔氏曰此經論臣致物於君及敵者之辭前明吉凶相見之禮此以下明吉凶送遺之禮此明送吉也君若朝會出往他國而臣奉財物以充路費金玉貨貝略舉其梗槩耳君尊偹物不有乏少故不言獻恐君行有車馬路中或須資給故云此物以充馬資有司主典君物者也敵者當言贈於左右從行者嚴陵方氏曰尊者之行必有馬故於君則曰致馬資於有司資謂秣之資蓋所以惡其瀆也玉藻曰凡於尊者有獻而弗敢以聞蓋謂是矣自大夫以上然後不徒行故於敵者曰贈從者而已臣致襚於君則曰致廢衣於賈人敵者曰襚親者兄弟不以襚進鄭氏曰言廢衣不必其以斂也賈人知物善惡也周禮玉府掌凡王之獻金玉兵器文織良貨賄之物受而藏之有賈八人不以襚進不執將命也以即陳而已孔氏曰此明送凶襚者以衣送死人之稱禮以衣送敵者死曰襚襚者遂彼生時之意也若臣以衣送君死不得曰襚但云致廢衣言不敢必充君斂但充廢致不用之列也賈人者識物價貴賤主君衣物者也不敢云與君故云賈人也然喪大記云君無襚注云無襚者不陳不以斂鄭注周禮云物謂文織畫繡之物送敵者無謙故云襚也親者相襚但直將進即陳之不須執以將命若非親則擯者傳辭將進以為禮節進謂執之將命也案士喪禮大功以上同財之親襚不將命即陳於房中小功以下及同姓等皆將命臣為君喪納貨貝於君則曰納甸於有司鄭氏曰甸謂田野之物孔氏曰此言臣為君喪進物之辭納為獻也納入也甸田也言此物是田野所出合獻入於君有司也必云田所出者臣受君地明地物本由君出也衣是送君故與賈人貨貝但供喪用故付有司賵馬入廟門賻馬與其幣大白兵車不入廟門鄭氏曰賵馬入廟門以其主於死者賻馬以下不入廟門以其主於生人也兵車革路也雖為死者來陳之於外戰伐田獵之服非盛者周禮革路建大白以即戎孔氏曰此一節論賵賻之異以馬送死曰賵賵副亡者之意既送亡者遂入廟門以馬助生人營喪曰賻馬幣謂以財貨賻助主人喪用並助主人之物故不將入廟大白兵車革路之旗並為送喪之從車本是田戰之具故不入廟門然所以得有大白兵車來助主人者此謂諸侯有喪鄰國之君以此賻之或家國自有也案庾氏曰禮既祖訖而後賵馬入設於廟庭而入門者欲以供駕魂車也故鄭云主於死者賻者既致命坐委之擯者舉之主人無親受也鄭氏曰喪者非尸柩之事不親也舉之舉以東孔氏曰此一節明賻者授物及主人受之之禮坐猶跪也謂賻者既致命跪而委物於地主人擯者舉而取之吉時若人饋物主人自拜受之有喪主於哀戚不得拜受使擯者受舉之而已鄭知舉以東者雜記云含者入升堂致命坐委於殯東南宰夫坐取璧降自西階以東後襚者賻者並然若賻生人則致命擯者不告殯不升堂然車馬不舉以東謂幣之屬也受立授立不坐性之直者則有之矣鄭氏曰不坐由便也有之有跪者也謂受授於尊者而尊者短則跪不敢以長臨之孔氏曰此一節明相授受之禮坐亦跪也凡尊卑相授乃以跪為禮受立謂尊者立以物與卑者卑者受此尊者之物授立謂尊者立己以物授尊者之立此二事皆不坐以尊者立故也若坐則尊者屈身故也性謂天性若尊者天性直自如此短小尊者雖立若授受尊者之物則有坐而授受嚴陵方氏曰曲禮所謂授立不跪授坐不立是也此兼言受而不及坐彼兼言坐而不及立亦互相明也不坐謂不跪也與曲禮坐而遷之同而與授坐不立之坐異凡此所以周旋於禮以致其曲而已或直情者則雖授受於立固有或坐者矣山隂陸氏曰言人之性有不能委曲如禮者雖坐君子不責也據此禮雖致曲不責人盡能曲禮所言雖若己煩君子不以為苛者有恕存焉耳然則聖人禁其大者故曰直情而徑行者戎狄之道也禮道則不然新安朱氏曰案此句文義皆未通恐是記失禮耳性之直猶所謂直情而徑行者歟慶源輔氏曰性之直者徇禮而不度宜跪固禮也始入而辭曰辭矣即席曰可矣排闔説屨於户內者一人而已矣有尊長在則否鄭氏曰可猶止也謂擯者為賔主之節説屨於户內者一人雖衆敵猶有所尊也在在內也尊長在則後來之衆皆説屨户外孔氏曰此一節明賔主之入擯者告之辭讓之節及説屨之儀始入門主人辭謝於賔擯者告主人曰辭謝賔矣謂辭讓賔令賔先入至階之時擯者亦應告主人曰辭讓賔先登矣此不言者始入之文包入門登階也至賔主升堂各就席而立擯者恐賔主辭讓即席故告之曰可矣言止不須辭也賔主席衆入户內雖尊卑相敵猶推一人為尊闔謂門扉排推門扉説屨户內者止尊者一人而已先有尊長在堂或室衆人後入不得説屨户內也山隂陸氏曰始入而辭曰辭矣即席曰可矣冝承道瞽亦然脫亂在此慶源輔氏曰物畜然後有禮故衆心有所尊也若説屨於尊長前非禮問品味曰子亟食於某乎問道藝曰子習於某乎子善於某乎不疑在躬鄭氏曰不斥人謙也道三德三行也藝六藝也躬身也不服行所不知使身疑也孔氏曰此一經明賔主相問飲食及道藝之事品味殽饌也亟數也若欲問彼人已嘗食某殽饌與否者則不可斥問嘗食否但當問其數食某食乎如言彼已嘗經數食也問道藝則曰子習於某道乎子善於某藝乎道難故稱習藝易故稱善疑而稱乎謙退之辭鄭注不斥人此之兼賔主也師氏教國子三德三行一曰至德二曰敏德三曰孝德一曰孝行二曰友行三曰順行保氏教六藝禮樂射御書數賔主相問以道藝則亦當習學明了不得使疑事在其躬也嚴陵方氏曰人之情品味有偏嗜道藝有異尚問品味不可斥之以好惡而昭其癖故曰子亟食於某乎問道藝不可斥之以能否而暴其短故曰子習於某乎子善於某乎信然後不疑有諸己之謂信則疑固不可以在躬矣慶源輔氏曰凡問當有疑辭不可必其然也舉此二事以例其餘品味曰亟食者數食則其所嗜也清明在躬宜也有疑而不求師親友以決之使之在身而不去是自棄也講義曰君子處富貴之中而人不疑其貪者視之如無也見富貴財利則有欲之之色安能使人不疑其貪乎在吾身有可疑者莫甚於此故此先言不疑在躬而下繼以民械重器大家三者金華應氏曰案在躬之疑若衣服而不知其名亦其一也不度民械不願於大家不訾重器鄭氏曰械兵器也不計度民家之器物使己亦有大謂富之廣也訾思也重猶寶也孔氏曰此一節因明賔主之禮客至主人之家不度民械使己亦有也大家謂富貴廣大之家謂卿大夫之家士往見彼富大不可願斆之非分而願必有亂心也客不思玩主人珍物重器若思玩之則憎疾己貧賤生淫亂濫惡也嚴陵方氏曰民備械以待敵茍度其利否則是與之為敵矣大家謂貴臣之家梓材所謂達大家者是也以賤而願貴則僣亂之原不可遏洪範五福不言貴者以此重器謂若九鼎之屬訾與國語訾相之訾同慶源輔氏曰械猶機械不逆詐之意民有械而度億詐也眩小慧而入大惑知者不為也居室以茍完為善用器以粗給為足新安朱氏曰訾猶計度也下無訾金玉成器字義同此國語云訾相其質漢書云為無訾者又云不訾之身皆此義此言不訾重器者謂不欲量物之貴賤亦避不審也汜掃曰掃掃席前曰拚拚席不以鬣執箕膺擖鄭氏曰鬛謂帚也帚恆掃地不潔清也持箕將去糞者以舌自鄉孔氏曰此一經明主人為賔灑掃之事汜廣也大賔來外內俱掃謂之掃小賔來則止掃席前名曰拚也拚是除穢掃是滌蕩若拚席上不得用掃地帚也膺人之胸前擖箕之舌也持箕舌自嚮胸前不得嚮尊者不二問問卜筮曰義與志與義則可問志則否鄭氏曰不二問謂當正己之心以問吉凶於蓍龜義與志與大卜問來卜筮者也義正事也志私意也孔氏曰此一節明問卜筮之法當正己心志若二心不正則卜筮妄告若卜筮者是公義則可為卜筮若所問是私意則不為之卜筮長樂劉氏曰凡問卜筮之道先正其心決定所事之去就則從此而違彼無疑二之心矣然後問於筮考諸卜吾所就而從者吉乎凶乎是之謂不二問也則擇義以為主而不敢徇其志也書曰官占惟先蔽志昆命於元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉言以義蔽志為先人謀次之鬼謀又次之然後龜筮協從也習吉之卜徇其志者也大卜之所弗筮焉慶源輔氏曰問卜當誠一惟誠然後此問彼應志不必義也必義而後可卜而不可行險以僥幸矣左傳昭十二年南蒯將叛筮而遇坤之比季昭惠伯曰即欲有事如何惠伯曰忠信之事則可不然則否又曰易不可以占險尊長於己踰等不敢問其年燕見不將命遇於道見則面不請所之喪俟事不犆弔侍坐弗使不執琴瑟不畫地手無容不翣也寢則坐而將命鄭氏曰踰等父兄黨也問年則己恭孫之心不全燕見謂自不用賔主之正來則若子弟然也遇於道可以隱則隱不敢煩動也不請所之恐尊長所之或卑褻喪不犆弔亦不敢故煩動也事朝夕哭時侍坐弗使不執琴瑟至不翣皆端慤所以為敬尊長或使彈琴瑟則為之可命有所傳辭也坐者不敢臨之孔氏曰此一節論卑幼奉侍於尊長諸雜儀卑幼私燕而見不使擯者將傳其命無賔主之禮若於道路遇逢尊者尊者見己則面見不見則隱雖面見而不得問何往也弔於尊者當俟朝夕哭時不非時而獨弔侍坐於尊者若不使己不知琴瑟而鼓之不敢無故畫地不弄手翣扇也雖熱不敢搖扇皆以為敬也寢卧也坐跪也若尊者眠卧而侍者傳辭當跪前立則臨尊者也嚴陵方氏曰琴瑟固常御之樂然非尊長使之執則不敢執深衣言舉手以為容玉藻言手容恭則手未始無容也言雖或無容當暑亦不可持翣山隂陸氏曰侍坐應使故以不使為弗若曽點鼓瑟希不必使也然則弗使不執琴瑟亦禮為之大坊而已有不皆也慶源輔氏曰既已非我屬行雖幼稚亦當尊敬之矣問年則已恭孫之心不全遇於道可隱而不隱則敖己見而不面則忽尊者於卑者則可問所之琴瑟自養之具雖無故不去而侍於尊長不使亦不執古者席地而坐故云畫地則不容侍射則約矢侍投則擁矢勝則洗而以請客亦如之不角不擢馬鄭氏曰約矢不敢與之拾取也擁矢不敢釋於地也投投壺也投壺坐勝則洗爵請行觴不敢直飲之客亦如之謂客射若投壺不勝主人亦洗而請之角謂觥罰爵也於尊者與客如獻酬之爵擢去也謂徹也已徹馬嫌勝故専之孔氏曰矢箭也凡射必計耦先設楅在中庭楅者兩頭為龍頭中央共一身而倚箭於楅身上上耦前取一次下耦又進取一如是更進各得四箭而升堂插三隻於要而手執一隻若卑者侍射則不敢更拾進取但一時并取四矢故云約矢投壺禮亦賔主各四矢矢謂投壺箭也若柘若棘為之從委於身前坐一一取之若卑者侍投則不敢釋置於地手并抱投之也擁抱也若敵射及投壺竟司射命酌而勝者當應曰諾勝者弟子酌酒南面以置豐上不勝者下堂揖讓升堂北面就豐上取爵將飲之而跪曰賜灌灌猶飲也勝者立於不勝者東亦北面跪而曰敬養若卑者得勝則不敢直酌當洗爵而請行觴然後乃行也客若不勝則主人亦洗以請所以優賔也行罰用角爵詩云酌彼兕觥是也飲尊者及客則不敢用觥投壺立算為馬馬有威武射者所尚也凡投壺每一勝輒立一馬至三馬而成勝但頻勝三馬難得若一朋得二馬一朋得二馬於是二馬之朋徹取一馬者足以為三馬以成勝也今若卑者朋雖得二亦不敢徹尊者馬足成已勝也山隂陸氏曰約矢言約長者之矢意若欲中擁矢言擁長者之矢意若欲入如是而勝非求勝也客雖勝亦洗而以請後言不角不擢馬使不蒙如也不角示無所爭也不擢馬者雖以彼馬從我馬不擢我馬在上示無所矜也新安朱氏曰此皆是卑者與尊者為耦而及投壺若己勝而司射命酌則不敢使他弟子酌酒以罰尊者必自洗爵而請行觴若耦勝則亦不敢煩他弟子酌而飲已必自洗爵而請自飲也注疏説恐非是執君之乘車則坐僕者右帶劒負良綏申之面拖諸幦以散綏升執轡然後步鄭氏曰執執轡謂守之也君不在車坐示不行也面前也幦覆苓也良綏君綏也負之由左肩上入右腋下申之於前覆苓上也步行也孔氏曰此一節明為君僕御之法凡御則立今守空車則坐右帶劒帶之於要右邉也此謂初御法僕即御者也帶劒之法在左以右手抽之便也今御者在中君在左若左帶劒則妨於君故右帶也良善也君由後升僕者在車背君面嚮前取君綏由左腋下加左肩上繞背入右腋下申綏之末於面前拖諸幦者拖猶擲也亦引也綏申於面前而擲末於車前幦上亦云引之置車幦上也苓車前欄也亦名為式故詩傳云幭覆式與此同以散綏升者謂初升時也散綏副綏也僕登車既不得執君綏故執副綏而升也既升車執䇿分轡而後行車行車五步而立待君君出上則授良綏而升君也新安朱氏曰以言以散綏升則是此時僕方在車下帶劒負綏而擲綏末於幦上君固未就車也及僕以散綏升之後君方出而就車此疏乃言君由後升僕者在車背君取綏而拖諸幦誤矣又疑綏制當是以索為環兩頭相屬故負之者得以如環處自左腋下過前後各上至背則合而出於右腋之中以申於前而自車下擲於幦上君升則還身向後復以覆幦如環處授君使君得以兩手執之而升也案此與曲禮君車將駕以下皆非専為君御者之事蓋劒妨左人自當右帶綏欲授人自當負之以升又當升時無人授己故但取散綏以升乃僕之通法注疏皆誤請見不請退朝廷曰退燕遊曰歸師役曰罷鄭氏曰不請退去止不敢自由也朝廷曰退近君為進燕遊曰歸禮褻主於家也罷之言罷勞也春秋傳曰師還曰疲孔氏曰此一節明卑者見尊及朝廷歸退之辭卑者於尊所有請見之理去必由於尊者朝還則稱曰退論語子退朝冉有退朝若在燕及遊還稱曰歸燕遊禮褻主於歸家也師役之中欲還則曰罷勞長樂陳氏曰請見於君子有慕德之志而請退焉則幾於簡賢矣朝廷曰退者寵榮之地人所競進君子之道雖行而猶請退也燕遊之事人所樂為而忘本者衆故曰歸者不忘反其本也師旅之意事干于國不敢言歸動衆之為懼也曰已疲勞不勝其役可也山隂陸氏曰言退不必請也即請嫌欲主人留己朝廷之上宜退而已燕遊曰歸言當返也詩曰不醉無歸雖君子之厚意猶不敢忘此詩役曰罷未有不罷者也雖曰如虎如貔然猶如此新安朱氏曰按易曰或鼓或罷與史記將軍罷休就舍之罷亦同注引春秋傳疏以為用何休注傳無此文也侍坐於君子君子欠伸運笏澤劒首還屨問日之蚤莫雖請退可也鄭氏曰此皆解倦之狀伸頻伸也運澤謂玩弄也金器弄之易以汗澤孔氏曰此明侍坐法也志倦則欠體疲則伸運動也謂君子搖動於笏澤謂光澤玩弄劒首則生光澤還轉也尊者説屨於户內是屨恆在側故得自還轉之也及尊者忽問日之早晚雖假令也前言侍者不得請退今若見君子有欠伸以下諸事皆是坐久體倦欲起卧息或侍者此時假令請退也山隂陸氏曰氣不足則欠力不足則伸運笏澤劒首示無所事也慶源輔氏曰運笏示欲搢而起還屨示欲著而起澤劒首則意不在己也事君者量而后入不入而后量凡乞假於人為人從事者亦然然故上無怨而下逺罪也鄭氏曰量量其事意合成否孔氏曰此一節明臣事君之法臣之事君欲請為其事必先商量事意堪合以否然後入而請之不先入請然後始商量成否乞假於人謂就人乞貸假借為人從事謂求請事人亦須先商量事意成否故云亦然然故上無怨然猶如此也事君若能如此則下不忤上故上無怨上不責下故下逺罪長樂劉氏曰事君所以行其道非茍祿也己才雖可任當量其君之德與己協否協然後入其朝則道斯可行而君臣合德矣故入而后量其君之不已協也進退皆難怫之則害身從之則失手君子不為也孔子不假蓋於子夏量其心意之不樂非重蓋而輕其師也然則君子之於人也保其仁義終而始之不以外物失其往來之義矧於其所從事者乎故上無怨而逺於罪無所入而不自得之謂也嚴陵方氏曰彼有量而我量之之謂量量有大小受不可過也人亦如之量大者乃能受大言量小者止能受小言而已入謂進言也表記曰事君者大言入則望大利小言入則望小利則進言謂之入也明矣事君量而後入者量其大小可否而後入其言也茍入而後量則無及矣凡乞假於人為人從事言亦必量其可否而後入其言也馬氏曰事君者三揖而進其進之難非茍謙也懼其義未合也一辭而退其退之易非茍廉也恐其過已形也此量而後入不入而後量者蓋諫期於必行言期於必聽無讒諂以為間無沽訐以取禍則臣之將入豈可不量哉古人能盡臣道量而後入者莫如伊周不入而後量者莫如孔孟伊尹處莘將使君為堯舜之君民為堯舜之民必量成湯可以為此又必待成湯三往聘也然後入為阿衡之任周公居東逺則四國流言近則主不知必量成王將出迎也又必待成王是以有衮衣而歸也然後入處上公之職量而後入者也孔子在魯欲以季孟之間待之孔子之行蓋知魯終不我用也孟子在齊欲以萬鍾之祿授之孟子之不受蓋知齊終不我用也不入而後量者也慶源輔氏曰入謂進入也方氏謂進言曰入可也然入不止於進言進而委質進而任事皆入也若乞假於人則主於言矣為人從事豈曰言乎孔子之未嘗有所終三年淹孟子之久留於齊蓋皆量其君也上無怨謂下無怨上之心也不量而入上不我用則怨心生矣君子成己所以成物故其效如此不窺密不旁狎不道舊故不戲色鄭氏曰不窺密嫌伺人之私也密隱曲處不旁狎妄相服習終或爭訟不道舊故言知識之過失損友也孔子曰故舊不遺則民不偷孔氏曰此一節明在僚類當自矜持之事人當正視不得窺覘隱密之處旁猶妄也妄與人狎習或致忿爭因狎而致訟也不戲色言人當尊其瞻視褻慢則失敬也山隂陸氏曰不旁狎雖在側不狎也不道舊故不道人之舊故即故舊應言故舊不戲色色容莊新安朱氏曰旁泛及也泛與人狎習不恭敬也不道舊故舊事既非今日所急且或揚人宿過以取憎惡如陳勝賔客言勝故情為勝所殺之類也戲色謂嘻笑侮慢之容講義曰不窺密者慎獨也不旁狎者誠己也不道舊故全交也不戲色正容貌也四者皆學也慶源輔氏曰密謂人之所隱人且密之己可窺乎不旁狎近猶不可狎況逺乎為人臣下者有諫而無訕有亡而無疾頌而無讇諫而無驕怠則張而相之廢則掃而更之謂之社稷之役鄭氏曰亡去也疾惡也頌謂將順其美也驕謂言行謀從恃知而慢也怠惰也相助也廢政教壞亂無可因也役為也孔氏曰此明臣事君之道君若有惡臣當諫之訕謂道説君之過惡及謗毁也論語云惡居下流而訕上者三諫不從乃出境而去不得強留而憎惡君也頌美盛德之形容讇謂以惡為美橫求見容君政怠惰臣當為張起而助成之君政廢壞無可復張助者則當掃蕩而更立新政也鄭注為謂助為也社稷之臣謂為助社稷之臣也嚴陵方氏曰君有過焉諫之使正可也訕之則不恭矣諫之不從而去焉可也疾之則大傷矣頌而無讇則所頌為公諫而無驕則所諫為正事弛而不力為怠故張而相之事弊而無用為廢故掃而更之臣之事君如此則君豈有失德國豈有廢事哉夫然後休功足以固王業而人人各安其居和氣足以召豐年而人人各得所養謂之社稷之役其以是歟必曰役者以其有勞於社稷故也山隂陸氏曰諫不得已也而有驕志則幸君之失有社稷臣者以安社稷為恱者也謂之役以此即進於此君之德政廢怠吾知有去而已羔裘之詩是也慶源輔氏曰以下美上易失於讇以是諫非易失於驕志怠則張而助之事廢則掃而改之謂之社稷之役者凡所以竭誠效力如此者為社稷而已毋拔來毋報往毋瀆神毋循枉毋測未至士依於德遊於藝工依於法遊於説毋訾衣服成器毋身質言語鄭氏曰報讀為赴疾之赴拔赴皆疾也人來往所之當有宿漸不可卒也瀆謂數而不敬毋循枉謂前日之不正不可復遵行以自伸也毋測未至測意度也德三德也一曰至德二曰敏德三曰孝德藝六藝也一曰五禮二曰六樂三曰五射四曰五御五曰六書六曰九數工依於法謂規矩尺寸之數也遊於説謂鴻殺之義所宜也考工記曰薄厚之所震動清濁之所由出侈弇之所由興有説説或為申毋訾衣服成器訾思也成猶善也思此則疾貧也毋身質言語質成也聞疑則傳疑若成之或有所誤孔氏曰此一節廣明為人之法神明正直敬而逺之不可瀆慢循猶追述也枉邪曲也未至之事聖人難之凡人固不可預欲測量之也士謂進士有德行者當依附於三德敖遊於六藝鄭注三德周禮師氏職文六藝保氏職文説論説規矩法式之辭工當依附於規矩尺寸之法式遊息於規矩法式之文書鄭引考工記文證説是説法度之意彼説鑄鐘或薄或厚聲之震動其聲清濁由薄厚而出新安朱氏曰拔來報往拔是急走倒從這邊來赴是又急再還倒向那邊去來往只是向背之意此二句文𫝑猶云其就義若熱則其去義若渴言人見有箇好事火急歡喜去做這樣人不耐久少間心懶意闌則速去之矣所謂其進鋭者其退速也講義曰毋拔來者事來則應毋報往者事往則已未來則拔而致之既往則追而報之此世所謂生事也嚴陵方氏曰君子之應物也來則迎之未嘗拔之使至往則將之未嘗報之不已神人異道不可雜擾故曰毋瀆神孔子所以敬而逺之也枉而復循之則非所以改過故曰毋循枉左氏所謂尤而效之罪又甚也未至之事不可測故毋測未至孔子所以不逆詐不億不信也依則無日不然遊則有時而己德本也故言依藝末也故言遊依於法者常法也所謂説則有變通存焉若規矩準繩所謂法也故依之而不可違若器或利於古而害於今則有説故遊之而不泥昔子貢觀於魯廟北蓋皆斷以問孔子孔子答之以官致良工之匠尚有説也所謂説者如此衣服所以致飾成器所以致用茍區區言之則奢侈之心生矣山隂陸氏曰毋拔之使來毋報之使往毋瀆神禮也毋循枉義也毋測未至知也盧陵胡氏曰拔猶拒也報猶追也測未至測謂不窮理而幸中如子貢毋身質言語身己也有疑當就有道而正毋斷以己意慶源輔氏曰拔來則亟報往則滯毋測未至者雖億則屢中然君子不貴也依於德遊於藝學道之方也依於法遊於説學技之道也士所據者德藝則遊之而已工所據者法説則遊之而已遊謂遊習於其間然亦莫非誠也衣以覆體為足器以給用為良馬氏曰語曰百工居肆以成其事君子學以致其道又曰工欲善其事必先利其器蓋士之於道猶工之於事也古之處士於學校處工於官府朝夕從事不見異物而遷焉知工之所以為器之術則知士之所以致道之方德出於性在內之良知也藝成於才在外之小技也法者規矩準繩之成算也説者功藝巧拙之異宜也所以在德則可以就道藝則遊之而已藝去道逺而亦可以助道所以在法則可制器説則遊之而已説去器逺而亦可以成器長樂劉氏曰有言遜于汝志必求諸非道有言逆於汝心必求諸道以悅己而賞以拔其來則陷於非道為怫己而罰以報其往則失於有道勤祭祀而違于中則瀆慢於神祗作好惡以循于枉則戕賊於政教恃聰明測事之未至則事泊其情人君謹此五者所以御天下之道也是以王心無為以守至正篤恭而天下平焉依於德者凡求仕進者則以忠信為本也而司徒之三物須臾離之則失其依焉遊於藝謂六藝以馳騁其心焉工依於法者冬官司空掌天下之制度工作器用茍不依之則無所受而刑之所禁也故工不信度政之弊可知矣遊於説者謂論説聖人制器尚象之義注引考工記者制度之説毋訾衣服成器者訾謂慕望之也君子進德修業欲及時也位至而後衣服備祿至而後器用周未至而言之非道也言語之美穆穆皇皇朝廷之美濟濟翔翔祭祀之美齊齊皇皇車馬之美匪匪翼翼鸞和之美肅肅雍雍鄭氏曰匪讀如四牡騑騑齊齊皇皇讀如歸往之往美皆當為儀字之誤也周禮教國子六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容孔氏曰此一節明諸事之宜與賔客言語形狀穆穆皇皇然曲禮天子穆穆諸侯皇皇行容也皆美大之狀在朝威儀則濟濟翔翔然謂厚重寬恕之貌孝子祭祀威儀嚴正心有所繼屬故齊齊皇皇匪匪翼翼者皆是車馬之形狀故詩小雅云四牡騑騑下又云四牡翼翼皆是馬之行容鸞和聲之形狀肅肅雍雍肅肅是敬貌雍雍是和貌引周禮保氏六儀容即儀也故知美皆當為儀長樂劉氏曰言語之美顧於行則穆穆可觀協于極則皇皇可大朝廷之美萃其賢濟濟可尊迪于禮則翔翔可度祭祀之美致其嚴則齊齊罔差崇其德則煌煌可敬車馬之美毛齊牡則騑騑孔阜僕御間則翼翼敬飭鸞和之美步趨應節則肅肅有嚴宫商成文則雍雍協律五音之為美皆出於中和之心非止於儀容而已也嚴陵方氏曰穆穆者敬以和皇皇者正而美濟濟者出入之齊翔翔者翕張之美齊齊言致齊而能定皇皇言有求而不得匪匪言行而有文翼翼言載而有輔肅肅言唱者之整雍雍言應者之和山隂陸氏曰天子穆穆諸侯皇皇行容也今曰言語之美言行相顧也朝廷之美不言蹌蹌蹌蹌士也齊齊如見所祭者皇皇如有望而弗至也匪匪猶騑騑也騑騑翼翼之反肅肅雍雍爾雅所謂肅雍聲也廬陵胡氏曰鄭讀匪匪為騑騑以詩有四牡騑騑四牡翼翼之文今從之餘並如字不勞改讀慶源輔氏曰美如字自通不假易禮記集説卷八十六
