body:
  text: 禮記集説卷七十七宋衛湜撰肆束及帶勤者有事則收之走則擁之鄭氏曰肆讀為肄肄餘也餘束約紐之餘組也勤謂執勞辱之事此亦亂脱在是宜承無箴功孔氏曰約束帶之餘組及帶之垂者若身充勤勞之事則斂持在手身須趨走則擁抱之於懐也長樂陳氏曰肆伸之也束組紐也伸束及帶所以為容有事則收之走則擁之所以便事山隂陸氏曰此宜在此非脱亂也肆讀如字言以朱錦束髮肆之使至帶其有事則收之走則擁之如帶童子不裘不帛不屨絇無緦服聼事不麻無事則立主人之北南面見先生從人而入鄭氏曰皆為幼小不備禮也雖不服緦猶免深衣無麻往給事也裘帛温傷壯氣也絇屨頭飾也孔氏曰童子唯當室與族人為禮有恩相接之義故遂服本服之緦爾不當室則情不能至緦故不服也雖不緦猶著免深衣無絰以往給事緦喪使役也不當室鄭註猶免者謂未成服而來也問喪云不當室不免者謂成服之後也主人喪主也此童子來聽使若有事則使之若無事時在旁謂在主人之北南面而立先生師也童子不能獨為禮若往見師則隨成人而入也長樂陳氏曰不裘為其消隂氣也無緦服聽事不麻絰未責之以盡恩也夫童者未有知未有與也先王制禮常寛之而不嚴略之而不詳故名而不字紒而不冠見先生則從人而入遭先生於道則拱手而立摯則委而不授坐則隅而不正喪則不哀不踊不杖不菲不廬豈特無緦服聽事不麻而已哉凡皆以為不可以預成人之禮也彼闕黨之童見譏於論語仍叔之子取譏於春秋蓋不知此禮書嚴陵方氏曰不裘即不衣裘裳是也不帛即不帛襦袴是也不屨絇未拘之以行戒也不服麻則以幼未能勝絰故也山隂陸氏曰屨之重在絇即言不絇屨則屨重矣亦著絇雖重不以責童子也童子於有喪者之家當事則不麻為其幼也故謂之聽事而已少儀曰童子曰聽事講義曰從人而入不敢獨勞長者與為禮也金華范氏曰自童子之節也止從人而入童子之節先王制禮以其幼也望之略待之寛未以成人責之也然為童子之自處者極其卑下以未可與己成人之禮也辭孫禮之端少成習慣無幼而不孫弟之悔矣易之蒙以養正三王之早教諭大學不能為下何以事上皆此意也侍食於先生異爵者後祭先飯客祭主人辭曰不足祭也客飧主人辭以疏主人自置其醤則客自徹之一室之人非賔客一人徹壹食之人一人徹凡燕食婦人不徹鄭氏曰後祭先飯謙也客祭盛主人之饌也客飧者美主人之食也疏之言麤也客自徹敬主人也徹奠于序端一室之人非賔客同事合居者也賔客則各徹其饌壹食之人壹猶聚也為赴事聚食也婦人不徹質不備禮孔氏曰此一節論侍食及徹饌之節侍食於先生及異爵者此謂凡成人禮異爵謂尊於己者饌不為己故後祭先飯示為尊者嘗食也客盛主人之饌具故祭之主人致辭云不足祭謂疏食不足備禮也客飧者若食竟作三飯飧也主人見客飧而致辭云麤食傷客不足致飽若欲使更食然也主人敬客自置其醤則客宜報敬故自徹之曲禮主人親饋是也同事而合居一室既無的賔主故必少者一人徹饌壹食謂赴事壹聚共食則亦不人人徹亦推一人徹也嚴陵方氏曰先生則生在己先謂尊者也異爵則爵與己異謂貴者也婦人弱不勝事故不徹山隂陸氏曰異爵若尊者舉觶卑者舉角之類即應舉角後人而祭先人而飯先飯為人嘗食卑者之事一食若今言同盤矣一一而已壹合而為一也金華應氏曰絮羮而辭歠醢而辭則客詳於食察於味而主人謝其自致之不腆也祭而辭飧而辭則客重其食㫖其味而主人謝其相與之過腆也少施氏之待孔子嘗用其禮矣夫君子之為禮非無左右給使之可役而賔主必以身為禮者貴其誠而不敢趨其便且安也慶源輔氏曰徹亦徹醤也曲禮卒食客自前跪徹飯齊以受相者鄭云齊醤屬也公食大夫禮賔卒食北面取果與醤以降然則主人不自置醤則客猶徹飯歟又此篇前云君既徹執飯與醤乃出授相者壹食之人一人徹不以無賔主而廢禮也婦人不徹婦人故難盡責以男子之禮且不憂其弱而不徹也食棗桃李弗致于核𤓰祭上環食中棄所操凡食果實者後君子火孰者先君子有慶非君賜不賀有憂者勤者有事則收之走則擁之鄭氏曰弗致于核恭也上環頭忖也果實隂陽所成非人事故後君子火孰備火齊不得故先君子非君賜不賀者唯君賜為榮也有憂者此下絶亡非其句勤者有事則收之走則擁之此補脱重孔氏曰此一節明食果實及非君賜不賀之事弗致于核謂懐核不置於地也食𤓰亦祭先也環者横斷形如環也斷則有上下環也上環是疐閒下環是脱華處祭時取上環祭之而食中操謂手所持者棄之不食後君子不得先嘗也火孰和調是人之所為故先於君子而嘗之有慶謂或宗族親戚燕飲聚㑹雖吉不相賀唯受君賜為榮故相拜賀嚴陵方氏曰弗致于核曲禮所謂賜果於君前其有核者懐其核是也有核者不止於棗桃李亦舉所常食者以該之爾𤓰中虚而外實横斷之則若環然故以環言之上環以祭中以食言上中則知所操者下也曲禮言削𤓰於士曰疐之即棄所操也則此言主於士而已自然之味以先食為新故後君子而餕焉使然之味以後食為慎故先君子而嘗焉周官膳夫品嘗食王乃食而不及果實者亦此之意山隂陸氏曰弗致于核弗致餘於核即懐其核應曰弗致其核有慶非君賜不賀言有憂者有慶唯君賜然後賀勤者有事則收之走則擁之宜承無箴功鄭氏謂此補脱重誤矣新安朱氏曰註云頭付謂疐頭所切一環也以其所生之本味最甘美又先斷而不汙故以為祭中者中環也亦甘且潔故以奉尊者所操下環為手所持處以其味薄而不潔故棄之而不食也孔子食於季氏不辭不食肉而飱鄭氏曰以其待己及饌非禮也孔氏曰凡客將食興辭而孔子不辭者必是季氏進食不合禮也凡禮食先食胾次食殽乃至肩至肩則飽乃飧孔子不食肉仍為飱者是季氏饌失禮故也慶源輔氏曰此所謂不屑教誨是亦教誨之也金華應氏曰聖人處亂世交際之閒極其謹密然觀待陽貨之禮婉而深待季氏之禮直而簡意者季氏猶可以微意警而陽貨不可與語歟抑其時或有不同者蓋陽貨時己為大夫孔子僅為士其食於季氏或者攝可冦之後孔子時蓋年髙矣金華范氏曰自侍食於先生止不食肉而飱食之節絮羮而辭歠醢而辭客詳於食察於味故主人謝其自致之不腆也祭而辭飱而辭客重其食㫖其味故主人謝其相與之過腆也少施之待孔子嘗用其禮矣俎豆庶羞非不備禮也而置與徹惟以醤貴食味之主也故獻肉食者操醤齊左右給使非無以供役也而賔主必自置與徹蓋取親於其身之為敬且重也尊者逸卑者勞少長有禮矣男子徹婦人不徹男女有别矣一食之閒曲致其盡如此古人非為飲食也為行禮也賜果懐核敬君也𤓰祭上環敬先也薦新與火孰異尊賢也與先薦寢廟之意同一果之微皆有法安敢肆情於禮節之外乎君賜車馬乗以拜賜衣服服以拜賜君未有命弗敢即乗服也君賜稽首據掌致諸地酒肉之賜弗再拜凡賜君子與小人不同日鄭氏曰乗服以拜敬君恵也賜君未有命謂卿大夫受賜於天子者歸必致於其君君有命乃服之也據掌以左手覆按右手也致諸地致首於地酒肉之賜弗再拜輕也受重賜者拜受又拜於其室君子小人不同日慎於尊卑也孔氏曰此一節論受君賜之法凡受君賜賜至則拜至明日更乗服所賜往至君所又拜重君恩也稽首者頭至地據掌致諸地據按也謂頭及手俱至地左手按於右手之上至地也酒肉但初賜至時則拜明日不重往拜也嚴陵方氏曰車馬即日拜其賜於家明日乗之以拜於朝是之謂再拜衣服亦若是而已稽首據掌皆致諸地恭之至也王者之賜與於其賢足以爵則賜之爵以馭其賢庸足以禄則賜之禄以馭其庸至於其賢不足爵其庸不足禄而恩私施焉則與之以馭其幸而已謂之君子則於賢庸為有餘故在君子則賜之小人則於賢庸為不足故與之而已此君子小人賜與之别也曲禮言賜人者不曰來取與人者不問其所欲則賜與固不得不異又有名位不同禮亦異數則其賜與固可同日哉山隂陸氏曰拜賜句君賜若車馬乗以拜賜若衣服服以拜賜君未有命弗敢即乗服謂非經賜雖有車馬衣服不敢輙乗服也若後世三品雖應服紫五品應服緋必君賜而後服延平周氏曰賜君子以徳與小人以力賜與均之者恩也不同日者義也慶源輔氏曰乗服以拜賜所以榮君之賜也然君雖賜之而未有命使之乗服則亦不敢即乗服也意者古之人君賜臣下以車馬亦必就命其乗服之歟以稽首據掌致諸地推之今之拜慢矣拜以左手覆按右手為敬今之拜手敬矣酒肉之賜弗再拜孔子往陽貨之門為其來賜而已不在也下文云敵者不在拜於其室君子小人賜予之猶不同日況其他乎馬氏曰衣服之賜庸賜也是故乗服而再拜酒肉之賜斯須之賜也是故有拜而不再長樂陳氏曰事不同不可同日語人不同不可同日賜故詩勞還率則歌出車勞還役則歌枤杜凡以明貴賤辨等列也昔虢公晉侯之朝於周也同賜以五㲄之玉君子猶以位之不同為譏秦后子楚子干之寓晉也同食以百人之餼君子猶以富之不同為譏鄭忽猶以周班為怒韓信猶以噲等為恥又況君子之與小人乎茍同日而賜之是冠履碈玉混淆之也金華應氏曰凡君之賜物有命矣而曰君未有命者蓋車馬衣服皆視爵命以為賜臣聞君命則必謙遜而致辭詩所謂受爵不讓至于己斯亡者正以受而不辭也辭焉而又再命之然後乗服以拜況車馬重賜為人子者三賜不及焉則其必辭以待命可知也先儒求之而不得其説遂以為天子所賜非得國君之命則不敢乗服然其文意皆不協也凡獻於君大夫使宰士親皆再拜稽首送之膳於君有葷桃茢於大夫去茢於士去葷皆造於膳宰大夫不親拜為君之答已也鄭氏曰再拜稽首送之敬也膳美食也葷桃茢辟凶邪也大夫用葷桃士桃而已葷薑及辛菜也茢菼帚也造於膳宰既致命而授之葷或作焄大夫不親拜不敢變動至尊孔氏曰此一節論臣獻君之物及致膳於尊者之義凡獻謂大夫士有食獻君法大夫尊恐君拜已之獻故不自往而使已膳宰往獻士賤不嫌君拜故身自親送皆再拜稽首者大夫雖使人初於家亦自拜送而宰將命及士自送至君門付小臣之時宰及士皆再拜而送之也天子諸侯之臣獻孰食於君恐邪氣干犯故用辟凶邪之物覆之大夫之臣以食獻大夫則除茢士之臣吏以食獻士又去葷桃桃枝也皆皆於君大夫士也造至也膳宰主飲食官也獻孰食者操醤齊以致命致命竟而以所獻之食悉付主人之食官也大夫自厭則屈君答已故不親也長樂陳氏曰膳於君大夫士者致福之膳也非致福之膳則無事於桃茢鄭氏以膳為凡美食誤禮書嚴陵方氏曰此所謂再拜則與酒食之賜弗再拜異矣此謂以一拜為不足又申之以重拜爾桃以其性葷以其氣茢以其形形不如氣氣不如性故貴賤多少之數去其一者去茢去其二者又去葷唯桃為不可去無貴賤一也皆造於膳宰者則以不敢專達必待主膳之人達之也金華應氏曰子視膳於親臣致膳於君其敬養之誠一也致膳者非一端祭祀歸胙則其致膳之大者也鬼神所饗隂幽之氣慮或襲之葷可調和而味酷然而足以逼物桃南方陽明之木可以除北方幽暗之祟蓋致膳者臣子之愛心也熏袚不祥者敬心也慶源輔氏曰孔子問人於他邦猶再拜而送之況於君乎物所以將意不誠無物也大夫拜賜而退士待諾而退又拜弗答拜大夫親賜士士拜受又拜於其室衣服弗服以拜敵者不在拜於其室鄭氏曰士拜受又就拜於其家是所謂再拜也弗服以拜異於君恵拜於其室謂來賜時不見也見則不復往孔氏曰自此至父拜之一節明尊卑受賜拜謝之禮大夫拜賜而退者大夫往拜至於門外告君之小臣小臣受其辭入白於君小臣入則大夫乃拜之拜竟即退不待報恐君召進答己也士待諾而退者君不拜士士故於外拜拜竟又待小臣傳君之報諾出以退又拜者小臣傳君諾出又拜君之諾報也弗答者君不答士拜也大夫親賜士士初亦拜受又往彼家拜此非酒肉賜故再拜也君賜服服以拜大夫輕故不服其所賜而往拜之也敵者相獻既已拜受則不復往彼家拜也若獻時主人不在留物置家主人還必往彼家拜謝其室獻者之家也若朋友則論語云朋友之饋非祭肉雖車馬不拜嚴陵方氏曰又拜弗答拜言亟拜如此而君弗答焉士卑故也大夫親賜士士拜受則知非親賜者容或不然矣言衣服而不及車馬以大夫方受車馬於君不宜以之賜人也敵者不在拜於其室則在容或不然矣此所以異於士之與大夫也敵者亦不必朋友也馬氏曰又拜於其室者拜親賜而已凡於尊者有獻而弗敢以聞士於大夫不承賀下大夫於上大夫承賀親在行禮於人稱父人或賜之則稱父拜之鄭氏曰有獻而弗敢以聞謂獻辭也少儀曰君將適他臣若致金玉貨貝於君則曰致馬資於有司是其類也承受也士有慶事不聽大夫親來賀己不敢變動尊也稱父事統於尊孔氏曰凡謂賤者也謂臣有獻於君士有獻於大夫其辭不敢云獻聞於尊者但當云致馬資於有司及贈從者之屬也不承賀不受賀也下大夫於上大夫尊卑相近故受也嚴陵方氏曰承賀者有慶事而受人之賀也為人子者一出言不敢忘父母一舉足不敢忘父母故行禮於人稱父焉則不敢私交故也人或賜之稱父拜之則不敢私受故也慶源輔氏曰有獻致其誠也弗聞恐其瀆也不承賀者在彼者可賀而在此者不敢受賀也金華范氏曰自君賜車馬止稱父拜之賜予獻酬之節君制命者也臣承命者也致賜君子小人異其日承命受賜車服酒肉異其拜先王之制禮也節矣禮不盛服不充故大裘不裼乗路車不式鄭氏曰禮盛者服充大事不崇曲敬大裘路車謂祭天也周禮王祀昊天上帝則服大裘而冕乗玉輅或曰乗兵車不式孔氏曰此一節明禮盛者不崇小敬充猶襲也服襲是充美於内唯盛禮乃然聘及執玉龜皆襲為盛禮故也故郊禮服大裘則無别衣裼之是禮盛服充不見姜也路車謂玉輅郊天車過門閭不式亦禮盛不為曲敬也嚴陵方氏曰經言裘之裼也見美也服之襲也充美也孔子曰禮未盛則不充其服焉盖謂是矣且執玉有藉者裼無藉者襲圭璋則無藉以之聘璧琮則有藉以之享聘禮在先享禮在後因聘而後有享故也則聘禮固盛矣延平周氏曰以文為敬則不敢充其美以質為敬則不敢見其姜大裘不裼以質為敬也乗路車不式所敬不貳也馬氏曰衣服者所以飾身也禮盛者則其飾不足以言之故充其服充其服者内心也以徳將者也故曰大裘不裼乗路車不式然則致其飾者非禮之盛者也禮不足然後致其飾山隂陸氏曰大裘不裼則襲可知金華范氏曰至敬無文大禮必簡固也不曰充盛而曰不盛不充此意在言外當反而求之故孔子曰禮未盛則不充其服焉父命呼唯而不諾手執業則投之食在口則吐之走而不趨親老出不易方復不過時鄭氏曰易方謂其不信己所處也復反也不易方不過時不可以憂父母也孔氏曰自此至焉爾一節明子事親之禮父命呼父召子也命謂遣人呼非謂自喚亦云為父命所呼也應之以唯而不稱諾唯恭於諾也急趨父命故投業吐食也趨疾趨也但急走往而不暇疾趨也方常也若啟往甲則不得往乙若覔不見則老人易憂愁也復還也假旦啟云日中還不得過中嚴陵方氏曰唯而不諾即曲禮所謂父召無諾也既曰命又曰呼者命之以事而呼之使來也唯諾皆應也而唯之應速於諾走趨皆歩也而走之歩速於趨國莫尊於君家莫尊於父故君之召也在官不俟屨在外不俟車父之呼也手執業則投之食在口則吐之然主於國故言在官在外焉主於家故止手執業食在口而已其言亦互相備也出不易方有定所也復不過時無愆期也凡此所以慮貽親之憂疑而已然而孝子之事親豈必老而後如是邪蓋以親老者尤不可不知此故也慶源輔氏曰唯喏相去幾何而禮之辨如此能於此而察之則其義精矣走趨亦然山隂陸氏曰或言親或言父敬言之則稱父愛言之則稱親親癠色容不盛此孝子之疏節也父没而不能讀父之書手澤存焉爾母没而杯圈不能飲焉口澤之氣存焉爾鄭氏曰疏節言非至孝也癠病也王季有疾文王色憂行不能正履是也圈屈木所為巵匜之屬見親之器物哀惻不忍用也孔氏曰親病孝子當憂愁危懼行不能正履今唯色容不充盛而已此乃孝子疏簡之節言孝心不篤也手澤謂父平生所持手之潤澤在焉口澤謂母平生口飲潤澤之氣在焉不能謂不能忍為此事也嚴陵方氏曰孝子之事親也養則致其樂病則致其憂故親癠色容不盛人之氣體和則齊不和則反之以害於齊故謂之癠文王世子所謂色憂不滿容是也然而事親又有要道存焉此疏節也書謂書册也君子所執以誦習故於父言之杯圈飲食器也婦人唯酒食是議故於母言之杯作桮手澤汗之所漬也口澤津之所漬也口有氣焉故又以氣言之凡以人既亡而澤猶存焉故有所不忍也山隂陸氏曰稱癠與瘥異矣調夑雖至猶病公羊曰樂正子春之視疾也復加一飯則脱然愈復損一飯則脱然愈若唯而不諾出不易方亦疏節也慶源輔氏曰於其疏者苟不及焉則其餘不足觀矣親亡而澤猶存唯篤於孝者覺之上為疏節而此為至性也講義曰以為孝子之疏節者蓋孝子之事親必有篤於此者彼其未病之前既病之後亦何所不用其至哉金華范氏曰自父命呼止口澤之氣存焉爾事親愛敬之情孝子之事親也聽於無聲視於無形況父之所命呼乎父母在不逺游游必有方一舉足不敢忘況敢易方過時以累慈懐之惓惓乎此生而盡其情也朝夕視膳問安非禮文而已及其疾病色憂不滿容中心達於面目不自知也此病而致其憂也然皆疏節爾致愛則存致慤則著思其居處思其所嗜覩物動心有不忍焉此終身不能忘没而致其思也古之知禮者莫不然君入門介拂闑大夫中棖與闑之間士介拂棖賔入不中門不履閾公事自闑西私事自闑東鄭氏曰君入門謂兩君相見也棖門楔也君入必中門上介夾闑大夫介士介雁行於後示不相㳂也君若迎聘客擯者亦然不中門不履閾辟尊者所從也閾門限此謂聘客也公事聘享私事覿面也孔氏曰此一節明兩君朝聘卿大夫入門之儀入門謂入大門介謂上介稍近君故拂闑大夫之介微逺於闑故當棖與闑之間士介卑去闑逺故拂棖闑謂門之中央所豎短木也棖謂門之兩旁長木所謂門楔也介者副也此明朝又明聘賔入者謂聘賔也不中門謂不當闑西棖闑之中央不履閾謂足不履踐門限之上也聘享是奉君命而行故謂之公事自闑西用賔禮也私覿私面非行君命故謂之私事自闑東者從臣禮示将為主君之臣也嚴陵方氏曰礙於門之中者闑也拂謂衣拂之也介拂闑則近中故也士介拂棖則近旁故也於下言士介則上言介為君介中言大夫亦其介而已蓋門以中為貴故下言賔入不中門焉中門則嫌於自尊履閾則嫌於自髙論語言立不中門行不履閾正謂此蓋以臣為賔故不得不然耳公事謂聘享也入門左而自闑西則以就西階故也入門右而自闑東則以就東階故也公事為國而與主君敵故自西焉私事為己則從主君而已故自東焉與曲禮客若降等則就主人之階同義曲禮又言大夫入君門由闑右則一自東而已與此異者彼言為臣此言為賔故也亦見彼解延平周氏曰君入門言朝也賔入不中門言聘也中門棖闑之中不中門有所辟也闑西之中則君所由闑西之東則臣由之可也故公事自闑西敬之也私事自闑東親之也山隂陸氏曰大夫不言介言大夫而已相備也大夫入門中棖與闑之間則君入門拂闑士拂棖可知君介士介如此則大夫之介亦可知公事義揜恩故自闑西私事恩揜義故自闑東新安朱氏曰案此云門只有一闑賈氏儀禮疏猶云門有二闑故中門之處及君與賔介行之次第皆有不同未知孰是當更考之金華范氏曰此賔主介相之節君入而有大夫士介之别賔入而有公事私事之别拂闑拂棖闑東闑西不言而意已喻何為屑屑於此蓋禮禁亂之所由生恐聘覲之禮廢君臣之位失諸侯之行惡而倍畔侵陵之患起是以先王謹之君與尸行接武大夫繼武士中武徐趨皆用是疾趨則欲發而手足毋移圈豚行不舉足齊如流席上亦然端行頤霤如矢弁行剡剡起屨執龜玉舉前曵踵蹜踊如也鄭氏曰接武尊者尚徐蹈半迹繼武迹相及也中武迹閒容迹也徐趨謂君大夫士之徐行皆如與尸行之節也疾趨謂直行也疏數自若發謂起屨也移之言靡迆也毋移欲其直且正欲或為數圈轉也豚之言若有所循不舉足曳踵則衣之齊如水之流矣孔子執圭則然此徐趨也席上亦然尊處亦尚徐也端行端直也頤或為䨨此疾趨也執龜玉舉前曵踵著徐趨之事孔氏曰此一節明行歩疾徐之儀貴賤與尸行歩廣狹不同君天子諸侯也武迹也二足相躡每蹈於半未得各自成迹故云接武尊者舒遲故君及尸歩遲狹大夫漸卑故與尸行歩稍廣速也士卑故與尸行歩極廣每徙足閒容一足地乃躡之也徐趨遲行也疾趨則欲發者發起也欲屨頭恒起無復繼接之異其迹或疏或數自若貴賤同然也屨恒欲起手足猶宜直正不得邪低靡迤摇動故云手足毋移也圈豚行者釋上徐趨之形也豚循也轉足循地而行不舉足謂足不離地齊裳下緝也足既不舉身又俯折則裳下委地曳足如水流狀也在席上未坐其行亦如是圈豚行齊如流也端行頤霤一經覆上疾趨之節端行謂直身而行行既疾身乃小折而頭直俯臨前頤如屋霤之垂也矢箭也身趨前進不邪如箭也弁急也剡剡身起貌也急行欲速而身屨恒起也踵謂足後跟也執龜玉徐趨之時初舉足前後曵足跟行不離地蹜蹜言舉足狹數蹜蹜如也嚴陵方氏曰凡行歩廣則疾而勞狹則緩而逸尊者逸而卑者勞故君至於士尸行之節其别如此起屨雖疾手足之容亦不可妄有所改移也圈豚行不舉足者謂回旋而行也羔性聚豚性散豚雖性散圈之則聚而回旋於中矣故取況如此席雖以坐其行而就坐之時亦以是為節焉剡剡則如火之趨上固異乎流之趨下矣舉前曵踵與曲禮言行不舉足車輸曵踵同義蹜蹜有難進之意論語所謂足蹜蹜如有循是也山隂陸氏曰所謂布武在繼武中武之間徐趨皆用是言雖君大夫徐趨亦中武也疾趨則欲發而手足毋移圈句圈讀如杯圈之圈言雖舉趾稍髙尚循徐趨圈域之内豚俯其首豚行蓋言冕行知然者以端行弁行知之也端行謂服𤣥端而行弁行謂服爵弁皮弁而行前言執玉龜襲今此上龜執玉而慎非其至也慶源輔氏曰必言與尸行者著行之徐非止逸也敬而已矣愈尊愈敬趨謂行有所向也疾趨趨雖疾而布武未改也故曰足毋移併言手者亦不改其拱也故曰張拱而趨至於走則手不能拱而歩濶逺矣行不舉足足既舉則衣無撥矣故其裳下緝如水之自動焉席上亦然曲禮將即席衣毋撥足毋蹶是也剡剡鋭利也屨頭發起之貌舉前曵踵若所謂不舉足則前亦不舉矣蹜蹜如也則有緩而已金華范氏曰此與尸行歩疾徐之節堯舜之道孝悌而已亦在徐行疾行之間兹歩武之廣狹趨履之遲速先王制禮必在所謹豈可以細故視之蓋自是充之孝悌發乎朝廷放乎道路所繫豈不重歟凡行容惕惕廟中齊齊朝廷濟濟翔翔鄭氏曰惕惕直疾貌凡行謂道路也齊齊恭慤貌濟濟翔翔莊敬貌孔氏曰此一節明道路廟中朝廷行歩之法道路雖速疾不忘於直廟中對神不敢舒散齊齊自收持嚴正之貌濟濟有威儀矜莊也翔翔行而張拱慶源輔氏曰凶悔吝生於動故凡有所行其容惕惕易曰夕惕若厲无咎廟中心一於敬則歩自齊矣濟濟翔翔行容之盛也在朝廷則宜盛故也山隂陸氏曰濟濟相讓色斯舉矣翔而後集如是而後為朝廷君子之容舒遲見所尊者齊遫足容重手容恭目容端口容止聲容靜頭容直氣容肅立容徳色容莊坐如尸燕居告温温鄭氏曰齊遫謙慤貌也遫猶蹙蹙也足容重舉欲遲也手容恭髙且正也目容端不睇視也口容止不妄動也聲容靜不噦欬也頭容直不傾顧也氣容肅似不息也立容徳如有予也色容莊勃如戰色坐如尸尸居神位敬慎也告謂教使也詩云温温恭人孔氏曰此一節明君子動止之儀手足口目之節舒遲閑雅也雖尋常舒遲若見所尊之人則齊遫齊謂齊齊遫謂蹙蹙言自斂持迫促不敢自寛奢也徳得也立則磬折如人授物與己巳受得之形也色欲常矜莊勃如戰色不乍變動燕居謂私燕所居色尚和善教人使人之時唯須温温不欲嚴慄皇氏曰齊謂裳下緝遫謂蹙斂君子見所尊之人自俯下身裳下蹙斂也賀氏曰徳有所施與之名也立時身形小俯嚮前如授物與人時故註云如有予也嚴陵方氏曰禮器曰七介以相見不然則己慤三辭三讓而至不然則己蹙蓋舒遲之謂也且舒遲則所以脩容也若夫父黨無容則無事舒遲矣故曰見所尊者齊遫齊則不舒遫則不遲目容端則無淫視口容止則無儳言矣聲容則不欲其譁周官置銜枚者以此頭容直恐其顛故也周禮制側弁者以此告温温則所謂載色載笑匪怒伊教是也孔子在宗廟朝廷便便言唯謹爾則燕居之告温温亦各有所施而已語不云乎子之燕居申申如也夭夭如也正謂是也慶源輔氏曰舒遲徳性自然也齊遫則又警而變於此可以體心口容止當言即言不作囁嚅之態頭容直一身之元不容有所偏也立容徳常若有所不足者無徳則傲矣莊有不動之意謂不輕喜易愠心不失其正則容貌自得其宜然又不可不學故詳言之山隂陸氏曰口容止足容重則言行可知也後言燕居則以上非燕處之容也論語曰居不容黄氏曰立容徳者徳謂安於仁義得於禮法之謂也君子立時之容其志常抱仁義合禮儀造次不離則容貌自安於仁義禮法之徳小人俾端立正貌則宜有慙怍傾欹而不安矣故徳者安於仁義禮法之容非受授之義明矣金華應氏曰立容徳蓋中立不倚儼然有徳之氣象也凡祭容貌顔色如見所祭者鄭氏曰如覩其人在此孔氏曰此一節明祭之時凡祭謂諸祭也容貌恭敬顔色温和如似見所祭之人謂祭如在也嚴陵方氏曰孝子之祭也退而立如將受命蓋容貌如見所祭者也已徹而退敬齊之色不絶於面蓋顔色如見所祭者也慶源輔氏曰容貌顔色不可以偽為也喪容纍纍色容顛顛視容瞿瞿梅梅言容繭繭鄭氏曰纍纍羸憊貌顛顛憂思貌瞿瞿梅梅不審貌繭繭聲氣微也孔氏曰此一節論居喪容貌言語瞻視之儀喪容瘦瘠纍纍然顔色憂思顛顛然不舒暢也瞿瞿驚遽貌梅梅謂微昩也繭繭猶緜緜聲氣微細也講義曰喪容纍纍總言之也色視及言悉言之也顛顛憂思之貌也梅梅於義無取意當為晦亦以哀故視不明也嚴陵方氏曰纍如纍紲之纍言憂心有所拘繫家語言喪家之狗亦曰纍然者以此色容顛顛言其色之顛毁而不能立也問喪所謂如壊墻然者以此言容繭繭者謂憂營於内而言不能繹也慶源輔氏曰纍纍欲落之意憂悴而不能自營也顛顛如字纍纍顛顛皆隕落崩壊之貌繭繭鬱結而未有緒也山隂陸氏曰顛顛摧殞貌梅梅悲酸貌繭繭未有緒之貌張則瞿瞿收則梅梅經曰見似目瞿戎容暨暨言容詻詻色容厲肅視容清明立容辨卑毋讇頭頸必中山立時行盛氣顛實揚休玉色鄭氏曰暨暨果毅貌詻詻教令嚴也厲肅儀形貌清明察於事也立容辨卑辨讀為貶自貶卑謂磬折也讇為傾身以自下也頭頸必中頭容直山立不摇動也時行時而後行也詩云威儀孔時顛實揚休顛讀為闐揚讀為陽盛身中之氣使之闐滿其息若陽氣之休物玉色色不變也孔氏曰此一節明戎容之體色容厲肅厲嚴也肅威也視容清明瞻視之容須清察明審也立容謂軍中立之形容當貶損卑退磬折恭敬不得驕敖忽略士卒又當有威可畏無得過為讇曲以屈下於人也山立者立則嶷如山之固樂記云總干而山立不動摇也顛塞也休養也軍士宜怒其氣塞滿身中如盛陽之氣生養萬物也玉色謂不變動常使如玉講義曰戎容暨暨總言之也言容而下悉言之也嚴陵方氏曰暨暨以陽暨隂非欲之也不得已爾視容清明者目以下為體其視正則其容清以大為用其視正則其容明郊特牲言目者氣之清明蓋以是矣且水所舍而為精火所藏而為神則用戎之道亦在乎精神之運而已頭頸必中者中立而不倚也故山立以言其重如山而不可移山立則守之事也時行則攻之事也既曰立容又曰山立既曰色容又曰玉色者蓋山立玉色則言其形狀之如山玉焉又非止於容而已山隂陸氏曰詻詻各言其意勝敗繫之非雷同之時也厲肅所謂介胄則有不可犯之色視容清明臨危事其容如此神閒而意定也盛氣顛實戰勇氣也振振闐闐可謂實矣揚休對揚王休是也玉色時靡有爭是也自盛氣至是皆言戎事之成慶源輔氏曰心無所隕穫則視自清明故曰存乎人者莫良乎眸子辨絶句卑固未可知讇則氣索矣山立重也時行敏也兵法曰來如處女敵人開戸去如脱兔敵不及拒顛實則無事餒也詩言太公曰時維鷹揚涼彼武王肆伐大商所謂揚休也黄氏曰立容辨卑毋讇本三字為句上云辨謂所立之容明辨尊卑左右之分下云必毋讇既上云立容辨别合禮是無僭上之義也又慮其卑退失分則近乎諂媚故云卑毋讇謂卑不至讇也此一節上有立容辨下有山立上云立容辨為受命之時之禮也下云山立執干戈列行陣之時之禮也觀上文云戎容暨暨言容詻詻色容厲肅皆嚴毅威猛之容則被甲兵之際無磬折之容明矣四明沈氏曰容貌皆由於心若執心不定容貌何能爾邪處干戈戰爭之中如此可見神閒意定泰山覆於前而不變麋鹿興於左而不瞬非氣雄心壯不能也金華范氏曰自凡行容惕惕止揚休玉色視聽言動之容曰足矣而曰行與言曰目矣而曰視與色曰口矣而曰言與聲舒遲雝雝也齊遫肅肅也夫敬以和君子之容歟子温而厲恭而安人見其温良恭遜觀鄉黨所記燕居所教槩可識矣手足頭目坐立聲色容體如此而燕居告温温豈勉强然哉亦肅雝之驗也如臨喪有哀色甲胄有不可辱之色無物不在禮矣曾子所貴乎道者三由此得之不然喪紀失其哀戎事失其制凡衆之動失其宜耳目無所加手足無所措矣禮之於人如是夫喪紀戎事易變動失其節故以二端發之凡自稱天子曰予一人伯曰天子之力臣諸侯之於天子曰某土之守臣其其在邊邑曰某屏之臣某其於敵以下曰寡人小國之君曰孤擯者亦曰孤鄭氏曰予一人謙自别於人而已伯上公九命分陜者邊邑謂九州之外大國之君自稱曰寡人擯者曰寡君孔氏曰自此之為賔也一節明天子以下至士自稱及擯者傳辭之法案曲禮曰余一人予余不同者鄭註云古今字爾其義同也此云自稱曲禮註云擯者辭則天子與臣下言及遣擯者接諸侯皆稱予一人言我於天下之内但秪是一人而已若臣下稱一人則謂率土之内唯有此一人尊之也伯曰天子之力臣曲禮云天子之吏不同者此謂身自稱於諸侯言已是天子運力之臣曲禮謂二伯擯於天子以此不同也諸侯身對天子自稱曰某土之守臣某若諸侯上介致辭於天子之擯者亦當然也其天子之擯告天子則曰臣某侯某故曲禮云諸侯之於天子曰臣某侯某鄭註嗇夫承命告天子辭也其在九州之外邊鄙之邑自稱於天子曰某屏之臣某若使上介告天子之擯亦當然其天子之擯告天子則曰臣某子某某男某曲禮云其在東夷北狄西戎南蠻雖大曰子註云入天子之國曰子男者亦曰男是也諸侯於敵以下自稱曰寡人言以下通及民也曲禮云其與民言自稱曰寡人是也小國謂夷狄子男之君自稱及介傳命云某土之孤某故云小國之君曰孤擯者告天子亦應云某孤某其在國自稱亦曰孤故曲禮云庶方小侯於外曰子自稱曰孤是也山隂陸氏曰予一人求助之辭伯言力而已亦謙也孔子曰驥不稱其力也不言之於天子著其於敵以下自稱如此據諸侯之於天子曰某土之守臣某且言天子言伯以臨下之詞稱之亦言之法諸侯言之於天子則非見也若後世上表歟據諸侯見天子曰臣某侯某且曰某土之守臣某則在國可知其在邊邑自兹以往非王土且非守也為屏而已故曰某屏之臣某其於敵以下同姓異姓小邦諸侯自稱如此知然者以天子同姓異姓大國自稱於諸侯曰天子之老知之也然則小國之君即前所謂庶邦小侯是也慶源輔氏曰稱予一人雖曰謙然以予一人而臨天下則其職重矣伯謙於力臣則所當勉者在徳矣諸侯曰某土之守臣言王土也已為王守之而已且知其職矣故曰廵守者廵所守也某屏之臣言所以屏衛中國也寡人則謙而已矣小國爵卑故擯告於天子無異辭嚴陵方氏曰力臣言雖為人臣之長非有論道之才徒有治功之多而已某土之守臣某者言雖有君人之號不足以致人也可以守土而已於後言小國則前所言皆大國也擯者亦曰孤者謂為擯於外而執事者亦以是稱之也擯者稱小國如此則大國稱寡君可知金華應氏曰上公九命作伯蓋天子之股肱而宣力四方者也自謂力臣亦不敢以徳自居而以力自竭也上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫世子自名擯者曰寡君之適鄭氏曰擯者之辭主謂見於他國君下大夫自名於他國君曰外臣某孔氏曰此明上下大夫世子在己國及出使往他國稱謂之異上大夫卿也自於己君之前稱曰下臣若出使他國在於賔館主國致禮上大夫設擯禮待之此擯者稱大夫為寡君之老雖以擯為文其實謂介接主君之辭亦當然擯介通也下大夫對己君稱名而已不敢稱下臣卑逺於卿也出使設擯者以待主國此擯者稱下大夫云寡大夫不敢稱寡君之老世子對己國之君稱名擯者曰寡君之適謂對他國之辭也嚴陵方氏曰上大夫居上位而不敢以上自居故曰下臣而已世子亦公子爾以為適而傳世故曰世子而擯者亦曰寡君之適慶源輔氏曰上大夫既曰下臣矣下大夫非名則無稱矣公子曰臣孽士曰傳遽之臣於大夫曰外私大夫私事使私人擯則稱名鄭氏曰孽當為枿傳遽以車馬給使者也士臣於大夫者曰私人私事使謂以君命私行非聘也若魯成公時晉侯使韓穿來言汶陽之田歸之于齊之類孔氏曰枿是樹生之餘故盤庚云若顛木之有由蘖謂對己君也若對他國當云外臣士位卑給車馬役使故稱傳遽亦謂對己君也大夫家臣稱私此士既不與大夫為臣故對大夫稱曰外私下文云大夫使私人擯故知大夫之臣曰私人私人擯則稱名者謂以己之屬臣為擯相雖是上大夫及下大夫擯者則皆稱名蓋以非公事正聘故降而稱名也清江劉氏曰鄭云若晉侯使韓穿來言汶陽之田歸之于齊之類非也此乃謂若趙襄子使楚隆弔呉夫差之類爾凡大夫聘而傳命則當稱寡君士於私臣擯於君命不得言主故名之也楚隆之詞曰寡君之老無䘏使陪臣隆敢展謝之此則名者也嚴陵方氏曰世子為適則知公子為庶庶子孽也適子本也故公子曰臣孽謂之孽者以其自本旁出若木之有蘖故也周官行夫掌傳遞之小事謂傳遞遽令也以其急而不遑故以遽言之士以事人為事故自言服傳遽之賤役也且行夫以下士為之則士以是自稱又宜矣於大夫曰外私者士有仕於朝者有仕於家者朝為公而家為私仕於家則稱私人下言私事使私人擯是也仕於朝則稱外私以其外於私而從公故也公子與士皆不言擯則以卑而略之也慶源輔氏曰公子自稱曰臣孽常使其自别於適焉是乃所以愛之也故曰君子愛人以徳行夫以下士為之所掌者傳遽之事則傳遽之事士職之最卑且勞者以此自稱則其餘者固不敢辭難矣大夫得以臣士而此士非大夫之臣故曰外私公士擯則曰寡大夫寡君之老大夫有所往必與公士為賔也鄭氏曰謂聘也大聘使上大夫小聘使下大夫公士為賔謂作介也往之也孔氏曰此明大夫以國之公事出聘及私問也正聘之時則用公家之士為擯不用私人稱下大夫曰寡大夫上大夫曰寡君之老往謂之適也大夫正聘者有所往適之時必與公士為賔賔介也言使公士作介也山隂陸氏曰公士擯嫌上擯者曰寡君之老擯者曰寡大夫或斥大夫私行大夫有所往必與公士為賔所以著私事使或非禮也慶源輔氏曰寡大夫官也寡君之老君之所尊也私事使固不可稱矣金華范氏曰自凡自稱止士為賔也名稱之節孔子為政必先正名蓋以禮莫大於分分莫大於名也有自稱之辭有稱人之辭有擯贊之辭若孤寡不榖純乎謙也稱人與擯贊雖謙而有體如寡君之老之適曰寡謙也曰老曰適未嘗不明徳與序矣有對尊者之辭有對敵者之辭有對卑者之辭對尊者極其謙如某守臣屏臣曰孽曰傳遽是也對敵之辭謙不失己有於外之辭有於其國之辭稱謂各有深意此制名之不茍者也禮記集説卷七十七
