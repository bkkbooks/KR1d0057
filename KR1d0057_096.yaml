body:
  text: 禮記集說卷九十六宋衛湜撰是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本廣則容姦狹則思欲感條暢之氣而滅平和之德是以君子賤之也鄭氏曰廣謂聲緩狹謂聲急感動也動人條暢之善氣使失其所孔氏曰朋淫於家是慢易以犯禮節淫酗肆虐是流湎以忘根本廣謂節奏疏緩多有姦淫之聲狹謂音促則感人思其情欲條逺也暢舒也賤謂棄而不用也長樂陳氏曰禮慝不足以善物樂淫不足以化俗故其聲哀矣外貌為之不莊其聲樂矣中心為之不安或慢易以簡節反以犯其節或流湎以逐末反以忘其本廣則嘽緩而容姦以亂正狹則急數而思欲以害道如此則感動條暢之順氣而殄滅和平之至德其何以動四氣之和奮至德之光乎是以君子賤之也蓋同異相濟為和髙下一致為平詩曰神之聽之終和且平易曰聖人感人心而天下和平樂書嚴陵方氏曰此廣言淫樂之事關睢之樂非不哀也然所以哀者窈窕之難求是乃所以為莊非不樂也然所以樂者淑女之為配是乃所以為安今哀而不莊故慢易以犯節樂而不安故流湎以忘本慢則無所敬易則無所戒故犯節流則不知止湎則有所溺故忘本廣固足以有容所容者姦聲感人則逆氣應之矣狹固足以有思所思者樂得其欲則以欲忘道矣平則條而有理和則暢而能通山隂陸氏曰廣失之無法狹失之不通感動之微也詩云無感我帨兮或言感或言滅相備也凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也鄭氏曰成象者謂人樂習焉孔氏曰自此至贈諸侯也為樂象之科從此至行其義眀樂有姦聲正聲以類相感君子當去淫聲用正聲也逆氣謂回逆之氣即姦邪之氣姦聲感動於人而逆氣來應二者相合而成象淫樂遂興紂作靡靡之樂是也正聲感動於人而順氣來應二者相合而成象則和樂興若周室太平頌聲作也聲感人是倡也氣應之是和也善倡則善和惡倡則惡和是倡和有應也回謂乖違邪謂邪僻言乖違邪僻曲之與直各歸其善惡之分限言善歸善分惡歸惡分也既善惡各歸其分是萬物之情理各以類自相感動也長樂陳氏曰聲樂之象也其發而感人不能無姦正氣體之充也其出而應聲不能無逆順蓋樂者天地之和正聲之所止也而姦聲則乖此人者天地之委和順氣之所鍾也而逆氣則反此然氣合於無象見於有相感而文生文之所生則象之所見也象之所見則樂之所形也逆氣成象而淫樂興則新樂之發非治世之音也順氣成象而和樂興則古樂之發非亂世之音也夫命有正有不正性有善有不善道有君子有小人德有凶有吉然則聲有姦正氣有順逆樂有淫和不亦感應自然之符耶聲之邪正既異其所倡則氣之逆順亦異其所和可謂倡和有應矣逆氣而淫樂興順氣而和樂興可謂回邪曲直各歸其分矣凡此非特人為然萬物亦莫不各以氣類相感動也古之人當春而叩商弦以召南吕凉風忽至草木成實及秋而叩角弦以激夾鍾溫風徐回草木發榮當夏而叩羽弦以召黃鍾雪霜交下川池暴沍及冬而叩徴弦以激蕤賔陽光熾烈堅冰立散終嵗命宫而總四弦則景風翔慶雲浮甘露降醴泉湧以至瓠巴鼓瑟而鳥舞魚躍師曠奏角而雲行雨施鄒衍吹律而寒谷黍滋豈非萬物之理各以類相動也樂書嚴陵方氏曰聲之感人自外而入氣之應聲由中而出氣之作也不可得而見及其成也乃形見於樂而已然由其所感者異故其所應者異所應者異故所興者亦異此君子慎其所以感之者夫聲無非樂也樂亦無非聲也然單出為聲比音而樂之然後為樂言聲感於上而樂興於下又以見上有好者下必甚焉言回則知其有莊言邪則知其有正又或曲或直焉此言其聲之别如此夫順氣則成順象逆氣則成逆象此以類相動也以類相動其理然也故曰萬物之理各以其類相動也闕氏曰周禮大司樂凡建國禁其淫聲過聲凶聲慢聲昔顔淵問為邦孔子對云樂則韶舞放鄭聲之淫者蓋樂聲有四慢則不肅不若凶之不善凶則不善不若過之不中過則不中不若淫之不正為邦以禮樂為急樂以放鄭聲為先故建國所禁之聲其序如此此言淫樂和樂淫樂則多哇之鄭也和樂則中正之雅也先王建國不先禁淫樂測鄭聲得以亂雅矣古之人將欲揚善必先遏惡將欲存誠必先間邪意亦類此然禮樂之道同歸故曲禮論安民以無不敬為先周官論建國之樂以禁四聲為先馬氏曰象者見乃謂之象也然聲亦可謂之象故曰聲者樂之象倡和有應故回邪曲直各歸其分而萬物之理皆以類相動也慶源輔氏曰由是觀之先王之樂固非一日之積也而樂之和與淫亦豈一人之所能為哉自聲之感氣氣之成象然後樂興焉先王因其自然之象而寫之於八音固不能有所加損於其間也至紂為靡靡之樂亦其逆氣自然之象耳唐太宗時張文收請改正樂帝不許曰朕聞人和則樂和隋末喪亂雖改音律而樂不和若百姓安樂金石自諧矣其說未盡善然得其大義矣倡和有應回邪曲直各歸其分即上所言是也至萬物又言其不特在樂而已泛推物理亦莫不然也是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目鼻口心知百體皆由順正以行其義鄭氏曰反猶本也術猶道也孔氏曰反去淫溺之情理以調和其善志比擬善類以成己身之美行不留聰眀不留停於耳目也不接心術謂心不存念也設謂設施由從也張氏曰君子人君也民下所習既從於君故君宜本情不使流宕以自安和其志萬物之理以類相動故君子比於正類以成其行也諸行率由順正以行其德美化其天下也長樂陳氏曰天下之情以正聲感之則和以姦聲感之則蕩天下之行以非類成之則惡以正類成之則善能反情以和其志則好濫之音莫能淫燕女之音莫能溺其心一於和而已能比類以成其行則以道制欲而不以欲忘道其迹一於善而已行歸於善則德全矣姦聲可以為淫樂而淫樂不止於姦聲亂色可以為慝禮而慝禮不止於亂色姦聲亂色其入人也淺不能纍吾聰眀於其外淫樂慝禮其入人也深不能蔽吾心術於其內夫然則惰慢邪辟之氣不設於身體百體所由無逆而非順無邪而非正以行吾義而已樂書嚴陵方氏曰情者性之欲反情所以復其性類者善惡之分比類所以别其等反情於內故足以和其志比類於外故足以成其行鄭衛則為姦聲紅紫則為亂色聰眀外也故於聲色言之心術內也故於禮樂言之留則來而止之接則與之交焉此又內外深淺之别也以慝禮不接心術故惰慢不設於身體以淫樂不接心術故邪辟不設於身體蓋心術之動則氣有所襲故也義者宜也由乎順正則所行無不宜矣山隂陸氏曰反情以和其志情所謂可有否焉是之謂反情以和其志故曰若琴瑟之専一誰能聽之比類以成其行若德不足以比太王則雖效死勿去可也若紀侯大去其國是不知比類以成其行之過也義義也順正命也孟子曰莫非命也順受其正又曰耳之於聲也鼻之於臭也目之於色也四肢之於安佚也性也有命焉君子不謂性也李氏曰反情以和其志以內修內者也比類以成其行以外治外者也姦聲亂色不留聰明淫樂慝禮不接心術以外治內也惰慢邪辟之氣不設身體以內治外也夫如是則耳之綦聲目之綦色鼻之綦臭心知百體之綦佚莫不順而無逆正而無邪矣故曰耳目鼻口皆由順正建安真氏曰君子之所以自飬者無他內外交致其功而已故曰姦聲亂色不留聰明者所以飬其外也淫樂慝禮不接心術者所以養其內也外無聲色之誘則內亦正矣內無淫慝之惑則外亦正矣惰慢之氣自內出者也邪辟之氣自外入者也二者不得設於身體如是則外而耳目鼻口四肢百體內而心知皆由順正以行其義自養之功畢矣顔子四勿之功可以庶幾也慶源輔氏曰反其情之所自發也人情亦無不善及其流則有惡者矣故反情之所自發以和其志情出於性志存於心類肖也伊川解詩克明克類曰非徒能眀又能類今能知之而不克踐之者眀及之而行弗克類也此義亦然君子以成德為行言比類其德以成其行也不留不接不設制於外所以養於內也內得其養則發於外者無不中節矣故五官百體皆由順正以行其義順則不逆正則不邪所由者順正而所行者又不失其宜也凡此者皆所以自養之道已得其養則樂之本立矣故下言作樂以奮發其德不曰耳目而曰聰眀聰眀耳目之德也耳不可使之不聞目不可使之不見但不留於聰明可也然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理鄭氏曰奮猶動也動至德之光謂降天神出地祗假祖考著猶成也孔氏曰前經眀君子去姦聲行正聲自此至皆寧眀正聲之道論大樂之德可以移風易俗安天下也此謂動發心志以聲音文飾聲音以琴瑟振動形體以干戚裝飾樂具以羽旄隨從諸樂以簫管用以奮動天地至極之德光眀謂神明來降也感動四時使氣序和平故能著萬物之理謂風雨順寒暑時鬼神降其福萬物得其所也馬氏曰反情以和其志者和於內也比類以成其行者善其外也姦聲亂色不留聰明此言耳目之無所蔽也淫樂慝禮不接心術此言心之官無不善也其詳至於使耳目鼻口心知百體皆由順正以行其義則樂之實備然後發以聲音而至於著萬物之理樂出於心而後形於聲音故發以聲音發聲音而後舞動其容故動以干戚獨聲不足以為樂故發以聲音文以琴瑟干戚非備樂也故動以干戚而又飾以羽旄在已則奮至德之光在天則動四氣之和在地則著萬物之理蓋樂有本有末故其所至者如此長樂陳氏曰發以聲音而為德音之音文以琴瑟而為德音之器動以干戚而為武德之容飾以羽旄而為文德之容從以簫管而為備成之樂則性術之變盡矣此詩所以有簫管備舉之說歟以書推之戛擊鳴球搏拊琴瑟以詠為堂上之樂下管鼗鼓至簫韶九成為堂下之樂則發以聲音文以琴瑟堂上之樂也動以干戚飾以羽旄從以簫管堂下之樂也德自此顯足以奮至德之光氣自此調足以動四氣之和夫然則可以贊化育而與天地參矣萬物之理何微而不著乎樂書嚴陵方氏曰如上所言然後可以作樂故此極言作樂之事聲音者心所生故言發琴瑟者樂之器故言文干戚所以為武故言動羽旄所以為文故言飾簫管作於堂下故言從至德者天地隂陽之德也至隂之德肅肅出於天至陽之德赫赫發乎地上下各有所至故曰至德夫相合以為光相濟以為和以義固相合矣田樂之德輝有以奮之故其光不滅四時先後以相濟由樂之德音有以動之故其和不乖慶源輔氏曰有諸內必形諸外故發之以聲音者則聲之成文者也寫之琴瑟則其文益顯矣詠歌不足則至於手舞足蹈故動以干戚飾以羽旄動謂發揚蹈厲發揚蹈厲則有干戚之舞然又不可無飾故飾以羽旄樂既形於音容又從之以堂下之樂上舉琴瑟下舉管籥則其餘者可知矣奮至德之光明猶大章章之也之類奮與豫卦雷出地奮同故彼亦言作樂崇德也動四氣之和謂感召四時之和氣著萬物之理即所謂使親疏貴賤長幼男女之理皆形見於樂也故曰樂通倫理者也山隂陸氏曰奮猶發也至德之光以樂而奮四氣之和以樂而動萬物之理以樂而著若大章所以發堯德之光大韶所以發舜德之光金華應氏曰在已則奮至德之光在天則動四氣之和在地則著萬物之理是故清明象天廣大象地終始象四時周還象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生唱和清濁迭相為經鄭氏曰清眀謂人聲也廣大謂鐘鼓也周還謂舞者五色五行也八風從律應節至也百度百刻也言日月晝夜不失正也清謂蕤賔至應鍾濁謂黃鍾至中吕孔氏曰人之歌曲清潔顯明以象天鐘鼓鏗鏘寬廣壯大以象地終於羽始於宫象四時變化終而復始也舞者周匝回還象風雨之回復五行之色謂五行之聲宫商角徴羽相應成文如青黃相雜故曰五色也八風八方之風律謂十二月之律樂音象八風樂得其度故八風十二月律應八節而至不為姦慝也八風者白虎通云距冬至四十五日條風至次眀庶風次清明風次景風次凉風次閶闔風次不周風次廣莫風皆閒四十五日而至八節立春春分立夏夏至立秋秋分立冬冬至百度謂晝夜百刻度數有常也小大相成謂十二月律互為宫羽而相成也終始相生謂五行宫商迭相用為終始倡和清濁謂十二月律先發聲為倡後應聲為和律長者濁短者清迭相為經謂十二月之律還相為宫是樂之常也長樂劉氏曰清明象天言合樂之聲清亮而髙逺也廣大象地言宫縣之位廣大而含容也小大不類而義實相成也終始不斷而理實相生也是以倡和清濁迭相經紀以成天地之化長樂陳氏曰天職氣覆而清明地職形載而廣大運行天地之閒一變一通而終則有始者其四時乎一散一潤而周則復還者其風雨乎樂之道本末具舉情文兼盡其聲清而不可溷明而不可掩者以象天也非特人聲而已其體廣而不可極大而不可圍者以象地也非特鐘鼓而已六舞終於大武始於雲門八音終於革木始於金石六律終於無射始於黃鍾六同終於夾鍾始於大吕皆象四時也非特宫羽而已五聲六律十二管還相為宫舞動其容以要鐘鼓俯㑹之節千變萬化唯意所適皆象風雨也非特舞之一端而已五聲之節奏合為文采莫不雜比成文而不亂則宫為君足以御臣商為臣足以治民角為民足以興事徴為事足以成物羽為物足以致用夫然則各得其所不相陵犯而無惉懘之音矣不言五聲而言五色者為聲成文而言也八風象八卦也其所以擬而逐之者八音所以節而行之者八佾之舞而已蓋主朔易者坎也故其音革其風廣莫為果蓏者艮也故其音匏其風融震為竹故其音竹其風眀庶巽為木故其音木其風清明兊為金故其音金其風閶闔乾為玉故其音石其風不周瓦土器也故坤音瓦而風凉蠶火精也故離音絲而風景是正北之風從黃鍾之律而黃鍾冬至之氣也東北之風從大吕太蔟之律而大吕太蔟大寒啓蟄之氣也正東之風從夾鍾之律而夾鍾春分之氣也東南之風從姑洗仲吕之律而姑洗仲吕榖雨小滿之氣也正南之風從蕤賔之律而蕤賔夏至之氣也西南之風從林鍾夷則之律而林鍾夷則大暑處暑之氣也正西之風從南吕之律而南吕秋分之氣也西北之風從無射應鍾之律而無射應鍾霜降小雪之氣也八方之風周於十二律如此則順氣應之而和樂興而正聲格矣尚何姦聲之有大司樂以六律六同五聲八音六舞大合樂凡六樂皆文之以五聲播之以八音大師掌六律六同以合隂陽之聲皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹以是求之五色成文而不亂文之以五聲之和也八風從律而不姦播之以八音之諧也百度得數而有常節之以十二律之度也吳季札觀樂於魯而曰五聲和八風平節有度守有序盛德之所同也五色成文而不亂五聲和之謂也八風從律而不姦八風平之謂也百度得數而有常節有度守有序之謂也五聲在天為五星在地為五行在人為五常以五聲可益而為七音然則五星之於天五行之於地五常之於人亦可得而益之乎十有二律以應十有二月之氣以十二律可益而為六十律六十律可益而為三百六十律然則十二月之於一嵗亦可得而益之乎劉焯以京房為妄田琦以何妥為當可謂知禮矣先王因天地隂陽之氣辨十有二辰即十有二辰生十有二律其長短有度其多寡有數而天下之度數出焉要之皆黃鍾以本之也百度得數而有常豈不原於十二律邪說者以百刻為百度何其誤也聲音律吕發越於樂縣之間其體有小大不相廢而相成其用有終始不相戾而相生一唱一和一清一濁迭相為經而其常未始有窮也蓋音莫不有適太清則志危太濁則志下皆非所謂適也一清一濁迭相為經要合清濁之中而已安往而不適哉百度得數而有常有常之常也倡和清濁迭相為經無常之常也有常以為體無常以為用非知真常者孰能究此鄭氏謂蕤賔至應鍾為清黃鍾至中吕為濁豈迭相為經之意邪樂書嚴陵方氏曰清眀者樂之聲故象天廣大者樂之體故象地終始者樂之序故象四時周旋者樂之節故象風雨合之以柷樂之始也止之以敔樂之終也既備乃奏樂之周也以反為文樂之還也五色即五行也五行則言其道五色則言其質非有其質則文無所附方言其成文故以其質言之五行播於四時故天地之文作於春夏而成於秋冬相生所以相成相尅所以相治故曰成文而不亂律十有二宫以應嵗十有二月合而為四時四時分而為八節八節行之以八風故八風在天則應乎八節在地則位於八方在易則畫於八卦在樂則播於八音其所以從律則一也律述氣者也風則天地之氣也風從律之所述則應期而不姦矣百度者晝夜之刻數也陽長則隂消則晝得數為多夜得數為少隂長則陽消則晝得數為少夜得數為多得數多者其晷長得數少者其晷短長短者度之所起也故謂之度隂陽一消一長晝夜一短一長雖小變而不失其大常故曰得數而有常小者隂也大者陽也成雖隂之事然非陽以生之則隂無自而成故曰相成終者隂也始者陽也生雖陽之事然非隂以成之則陽亦無自而生故曰相生倡者為先和者為後清者為升濁者為降倡和者隂陽之氣先後之序也清濁者隂陽之氣升降之體也方其倡之得位則倡者為經和者為緯矣及和之得位亦若是也清之得位則清者為經濁者為緯矣及濁之得位亦若是也雖然此特其大槩耳至於播之於樂則五音六律其聲亦莫不有倡有和有清有濁焉迭相為經亦若是而已馬氏曰清明象天象天之德也廣大象地象地之體也終始象四時之所行也周還象風雨之回合也聲成文謂之音五色成文而不亂者聲之和也八風從律而不姦者律之和也君子之於樂也小大精粗皆有數故天之中數五而因之以為五聲地之中數六而因之以為六律至於樂之始則柷柷之數其方二尺四寸此三八之數也其深一尺八寸此二九之數也九勝八陽勝隂也此樂之所以作也至於樂之終則有敔而敔之數其鉏鋙二十七此三九之數也其長尺此十之數也十勝九隂勝陽也此樂之所以止也凡此皆百度得數有常而不變也言百者亦舉其成數爾小大相成此釋其清眀象天廣大象地也終始相生此釋其終始象四時周還象風雨也倡和清濁迭相為經此釋其五色成文而不亂八風從律而不姦也山隂陸氏曰其清明象天其廣大象地蓋有不可以意言傳者鄭氏釋之如此是徒見形表而已而遺其精神也周還象風雨樂出於虛而復於虛也若春行秋令猋風暴雨總至則五色不成文八風不循律矣百度得數而有常者若度長短者不失毫釐量多少者不失圭撮權輕重者不失黍絫是也闕氏曰周乎天地之間者五行也播五行於四時者十二律也自春徂夏陽以動土為功樂則始作翕如非象春夏之始乎自秋徂冬隂以作成為事樂則繹如以成非象秋冬之終乎非特此也變化齊一不主故常以象四時之變通行流散徙不主常聲以象四時之周流樂之迭相為經四時之迭起是也樂之還相為宫四時之無窮是也以至分律而序之終於無射始於黃鍾分同而序之終於夾鍾始於大吕分舞而序之終於大武始於雲門又曰其絲多者其聲濁其絲少者其聲清故宫以八十一而最濁羽以四十八而最清此五聲之清濁也其管長者其聲濁其管短者其聲清故自黃鍾至中吕為濁從蕤賔至應鍾為清此十二律之清濁也廬陵胡氏曰如詩歌清廟維清言樂與德皆清明也如詩奏文武樂與德皆廣大也金華應氏曰自反情和志以下即樂以養其內而謹其所感於外也自發以聲音以下備樂以形於外而發其所養於內也清明者天之氣樂之皎如者象之廣大者地之體樂之翕如者象之終始周還者四時風雨之變樂之純如繹如者象之合之則象兩儀分之則象四時增以中央土則為五行分以四隅則為八方五聲配乎五行之色故各成文而不亂八音配乎八卦之風故各從律而不姦自是衍之而至於百則百度各得其數猶八卦至於六十四而其變無窮也大而日月星辰之度小而百工器物之度各有數焉不止晝夜之百刻也曰不亂不姦以至有常言其常而不紊也曰相成相生以至迭相為經言其變而不窮也順其常則能極其變矣慶源輔氏曰上既言樂作矣故此言樂之理樂之清明則象天樂之廣大則象地此可以默識而不可以言傳始終終始則象四時周還回復則象風雨風雨之生物不一而止故樂之周旋回復似之不曰始終而曰終始以見相生無窮也此其所以象四時色疑聲字文誤也五聲成文而不亂言在樂者也八風從律而不姦言在天地者也百度得數而有常言在人者也終又雜舉在樂者言之度量衡皆生於黃鍾之宫故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧鄭氏曰言樂用則正人理和隂陽也倫謂人道也孔氏曰樂行而倫類清美矣人聽之則耳目聰明血氣和平變移敝惡之風改革昏亂之俗而天下皆安矣張氏曰正樂既行故人倫之道清不視聽姦亂故視聽聰明口鼻心知百體皆由順正故血氣和平風移俗革移是移徙之名易是改易之稱文王之國自有文王之風桀紂之邦亦有桀紂之風桀紂之後文王之風被於紂民易前之惡俗從今之善俗上行謂之風下習謂之俗長樂劉氏曰樂之道行而人倫清矣非禮勿聽則耳聰非禮勿視則目明非禮勿言則氣平非禮勿動則體暢移風易俗而天下皆寧嚴陵方氏曰樂行言樂化之行也倫清言人倫之清也蓋樂行則天下和而不乖人倫不為淫風所動汙俗所染故清下文所言皆其事也耳聰則是非可以審目明則真僞不能蔽血和則憂樂無所乖氣平則喜怒不妄作自一人之身逹之天下國家則倫清之至也馬氏曰倫者理也言親疏貴賤長幼男女之理皆形見於樂故樂行而倫清言其莫不和親莫不和順莫不和敬也耳目聰明言不為外物所誘也血氣和平言不為外物所觸也移風易俗天下皆寧此樂之效也長樂陳氏曰不雜則清莫動則平樂行而倫清則八音克諧無相奪倫確乎鄭衛之音莫能入而雜之也以之行乎一身耳目聰明於其外血氣和平於其內則中國雖大若出乎一人矣以之行乎天下移風易俗於其始天下皆寧於其終則天下雖廣若出乎一家矣國語曰樂必聽和而視正聽和則聰視正則明其耳目聰明之謂乎𫝊曰樂者所以動蕩血脉流通精神而和正其心其血氣和平之謂乎昔王豹處淇而河西善謳綿駒處髙唐而齊右善歌夫以一匹夫之歌且能感人深如此又况人君擅天下利勢而以先王之樂感人未有不移風易俗者矣太伯之於吳率以仁義化以道德而風俗移易舉欣欣然遷善逺罪而不自知一國尚爾况天下乎楚越以好勇之風成輕死之俗而有蹈水赴火之歌鄭衛以好淫之風成輕蕩之俗而有桑閒濮上之曲姦聲尚爾况和樂乎孔子曰移風易俗莫善於樂信矣荀卿言樂行而志清自人言之也此言樂行而倫清自樂言之也樂書慶源輔氏曰上既極言樂之理故此下言樂之功效以結之倫理也清明也倫清言人之倫理清明而無曖昧紛亂之患自一人之身言之則耳目聰明血氣和平自天下之大言之則移風易俗天下皆寧樂之功效至此極矣故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂鄭氏曰道謂仁義欲謂淫邪也孔氏曰前經言正樂感人此經明君子小人各有所樂故因上起下之辭所以名樂者是人之所歡樂也君子所樂在於道得其道則歡樂也小人所樂在於欲得其欲則歡樂也若君子在上以道制欲則意得歡樂而不有昏亂若小人在上以欲忘道則志慮迷惑而不得歡樂張氏曰引舊語樂名廣證前事因其人所樂而名為樂人心不同故所樂有異而名通故皆名樂君子在上小人在下君子樂用仁義以制小人之欲則天下安樂不敢為亂小人在上君子在下則小人肆縱其欲忘於正道天下從化皆為亂惑不能安樂河南程氏曰人雖不能無欲然當有以制之無以制之而惟欲從之則人道廢而入於禽獸矣馬氏曰君子小人為樂則同所以為樂則異君子者從其大體者也故樂得其道小人者從其小體者也故樂得其欲道者出於天下之公欲者出於一人之私君子以心導耳故以道制欲樂而不亂小人以耳導心故以欲忘道惑而不樂長樂劉氏曰樂者樂其禮之盛行也不曰樂得其道乎小人由之以享五福不曰樂得其欲乎嚴陵方氏曰君子能知樂之情故由情足以得其道小人徒見樂之文徇文止能得其欲道與欲所得皆樂也然道有義故足以制欲欲既制則其樂不流而治生欲無窮故至於忘道道既忘則其惑不解而憂生延平黃氏曰樂由中出不可以僞為樂得其道而正樂興焉樂之由中出者也樂得其欲而淫樂興焉樂之由僞作者也均是樂也而樂有內外在外之樂無常其欲無已無常之樂不赴無已之欲則憂至焉物纍其心又慮其樂之去則惑而已矣慶源輔氏曰此又總言樂之義而君子小人所樂不同以見上所言者君子之樂也樂得其道則和平恬愈此樂之真也樂得其欲則沈湎淫佚此樂之流也樂本於道則欲不行故和平恬愈而不亂樂本於欲則不復有道故至於耽惑而已豈真可樂哉廬陵胡氏曰以道制欲易所謂窒欲以欲忘道曲禮所謂從欲是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣鄭氏曰方猶道也孔氏曰前經明君子小人所樂不同自此至為僞明君子敦行善樂也反己多欲之情以諧和德義之志寬廣樂之義理以成就政教之事正樂興行民皆嚮仁義之道人君如此可以觀其德行矣長樂陳氏曰反情以和其志則是志以道寧而其仁足以成己廣樂以成其教則是以樂教和而其智足以成物樂教行於上而民鄉方於下則上所廣之教無非德教下所鄉之方莫不背僞而趨德豈不可以觀之哉樂書延平黃氏曰反情以和其志則以道制己之欲廣樂以成其教則以道制人之欲嚴陵方氏曰君子所以反其情和其志豈他術哉亦以樂而己且情出乎性性則得之天者志生乎心心則存乎人者反其在天者然後可以和其在人者前則繼之以比類以成其行者學之事此則繼之以廣樂以成其教者教之事馬氏曰反其一己之私情而和其在內之志則足以成己而未見其足以成物故廣樂以成其教所以和人心而有以成物也則樂行而民嚮方矣其效至於民嚮方君子之德斯可見矣山隂陸氏曰反去淫溺之情而調和其志比擬善類以成己之行不接心術心不存念也反情於內則不以欲忘道故足以和其志比類於外則必資人成己故足以成其行慶源輔氏曰反情以和其志養其在內之樂也廣樂以成其教推夫在外之樂也自內而逹諸外則樂行矣樂行而民知嚮方則君子之德著矣德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌詠其聲也舞動其容也三者本於心然後樂氣從之鄭氏曰三者本志也聲也客也言無此本於內則不能為樂也孔氏曰德在於內樂所以發揚其德故樂為德之光華也非器無以成樂故金石絲竹為樂之器也詩謂言辭說其志歌謂音曲以歌詠其言辭之聲哀樂在內必形於外故以舞振動其容樂之體有此三者詩序云詩者志之所之是詩言志也言之不足故嗟嘆之嗟嘆之不足則歌詠之是歌詠其聲也手之舞之足之蹈之是舞動其容也容從聲生聲從志起志從心發三者相因原本於心先心而後志先志而後聲先聲而後舞聲須合於宫商舞須應於節奏乃成於樂故曰樂氣從之張氏曰樂氣詩歌舞也君子先有三德為本於心後乃詩歌舞可觀故曰然後樂氣從之長樂陳氏曰先王作樂以崇德奏之於詩為德言詠之於歌為德音形之於舞為德容故堯之大章舜之大韶禹之大夏湯之大濩豈皆足以既德之實邪不過形容其英華而已樂出於虛寓於實寓於實則八音麗於器故凡物之盈於天地之間若堅若脆若徑若韌若實若虛若沈若浮皆得效其響焉記論八音多矣舉其始言之不過曰施之金石要其終言之不過曰匏竹在下兼始中終言之則曰金石絲竹樂之器也在心為志發言為詩詩也者言之合於法度而志至焉者也喜則詠歌歌也者志之所形也樂則舞蹈舞也者蹈厲有節而容成焉者也蓋詩為樂之章必待歌之抗墜端折然後其聲足以合奏歌為樂之音必待舞之周旋詘信然後其容足以中節古之教六詩者以六德為之本以六律為之音以六德為本故自樂器推而上之及於德者性之端樂者德之華也以六律為音故自樂器推而下之及於歌詠其聲舞動其容也由是觀之聖人非惡歌也惡其酣爾非惡舞也惡其屢爾故酣歌常舞商書警之屢舞躚躚周詩刺之三者皆本於心心合於氣故本於心而樂氣從之樂書嚴陵方氏曰五常性之所有也非德無以得五音德所寓也非樂無以發發而為華然後散而為器然器不止於金石絲竹特舉此以該之有言有咏有動皆氣之所使也所以使氣者心而已故曰本於心然後樂氣從之憂氣亦本於心然樂以樂為主故特言樂氣而已馬氏曰德者出於天命之性而非人之力也故曰性之端慶源輔氏曰端猶孟子所謂四端也華即下文所謂英華也德出於性故德者性之端也樂以章德故樂者德之華也金石絲竹又樂之形而下者也此總言樂之始終又言樂之本於心詩言心之志歌詠心之聲舞動心之容與詩大序所言同意樂之氣謂和氣也樂由陽來豈無氣乎是故情深而文明氣盛而化神和順積中而英華發外唯樂不可以為僞孔氏曰情深謂思慮深逺文明謂情由言顯志意蘊積在中故氣盛內志既盛則外感動於物故變化神通也氣盛謂手舞足蹈是也化神謂動天地感鬼神也和順積於心中言辭聲音發見是英華發外也此據正樂若善事積於中則善聲見於外惡事積於中則惡聲見於外若心惡而望聲之善不可得也故云唯樂不可以為僞僞謂虛僞長樂陳氏曰情形於言而為詩則情深而文明者詩之不可以為僞也嗟嘆不足而為歌則氣盛而化神者歌之不可以為僞也內樂而外應之為舞則和順積中英華發外者舞之不可以為僞也三者一本於誠心而已誠則眀眀則能變誠則形形則神神則能化變化代興之謂天德蓋文者理之所謂而情出焉者也形者神之所舍而化出焉者也情顯於文故情不深則文不眀氣合於神故氣不盛則化不神情深而文眀是以誠心闡幽也氣盛而化神是以誠心微顯也然舞之和順積中英華發外而天道兼焉豈非誠心積而為變化之天德歟嚴陵方氏曰樂有情則有文有氣則有化其情深然後其文眀其氣盛然後其化神蓋中外之理然也情深氣盛則樂之和順積於中文明化神則樂之英華發於外所積者和順則知所發者無乖無逆所發者英華則知所積者有本有根矣是皆有諸中然後形諸外故言不可以為僞也慶源輔氏曰情深故文明氣盛故化神文明謂親疏貴賤長幼男女之理皆形見於樂有是心則有是聲有是聲則有是樂紂作靡靡之樂彼豈不知為鄙邪故曰唯樂不可以為僞武之未盡善亦以是故也樂者心之動也聲者樂之象也文采節奏聲之飾也君子動其本樂其象然後治其飾鄭氏曰文采樂之威儀也孔氏曰前經論志聲容三者自此至始也廣明舞之義理與聲音相應之事心動而有聲聲成而為樂是樂由心動而成也樂本無體由聲而見是聲為樂之形象聲無曲折則大質素故以文采節奏而飾之動其本則心之動也樂其象則亦樂之象也治其飾則亦聲之飾也以此三者結上三事長樂陳氏曰心靜於自然而樂動於使然故曰心之動樂之本則隱而其聲則見故曰樂之象聲之單出則質必待文采節奏為之飾也又樂書曰容從聲生聲從志起志從心發是知詩與歌舞合而為樂皆本於心焉故曰樂者心之動也人心之動物使之然感於物而動故形於聲形於聲則聲寓於器而非器猶為之象而已故曰聲者樂之象也青與赤謂之文五色備謂之采則文於采為略采於文為備止樂謂之節作樂謂之奏則奏於樂為始節於樂為終要皆非聲之質也聲之飾而已故曰文采節奏聲之飾也君子致樂以治心則易直子諒之心油然生矣動其本之謂也施於金石越於聲音樂其象之謂也省其文采廣其節奏治其飾之謂也廬陵胡氏曰前論舞於聲心相應故此又言樂之心見於舞慶源輔氏曰此足以見樂之不可為僞也見乃謂之象有是聲則樂之象見矣樂有是象故因以文采節奏飾之而為樂動其本猶言情動於中而形於外也禮記集說卷九十六
