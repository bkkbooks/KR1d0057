body:
  text: 禮記集說卷九十一宋衛湜撰樂記第十九孔氏曰案鄭目録云名曰樂記者以其記樂之義此於别録屬樂記蓋十一篇合為一篇有樂本有樂論有樂施有樂言有樂禮有樂情有樂化有樂象有賔牟賈有師乙有魏文侯今雖合此略有分焉藝文志云黃帝以下至三代各有當代之樂名周衰禮壞其樂尤微以音律為節又為鄭衛所亂故無遺法矣漢興制氏以雅樂聲律世為樂官頗能記其鏗鏘鼓舞而已不能言其義理武帝時河間獻王好博古與諸生共采周官及諸子云樂事者以作樂記其內史丞王度傳之以授常山王禹成帝時為謁者數言其義獻二十四卷樂記劉向校書得樂記二十三篇與禹不同今樂記斷取十一篇餘有十二篇其名猶在曰奏樂曰樂器曰樂作曰意始曰樂穆曰說律曰季札曰樂道曰樂義曰昭本曰昭頌曰竇公是也案別録禮記四十九篇樂記第十九則樂記十一篇入禮記在劉向前矣至向作别録時更載所入樂記十一篇與餘十二篇總為二十三篇也凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂鄭氏曰宫商角徴羽雜比曰音單出曰聲形猶見也樂之器彈其宫則衆宫應然不足樂是以變之使雜也易曰同聲相應同氣相求春秋傳曰若以水濟水誰能食之若琴瑟之專一誰能聽之方猶文章也干盾也戚斧也武舞所執也羽翟羽也旄旄牛尾也文舞所執周禮舞師樂師掌教舞有兵舞有干舞有羽舞有旄舞詩曰左手執籥右手秉翟孔氏曰自此至王道備矣一節論樂本音之所以起於人心者由人心動則音起人心所以動者外物使之然也人心既感外物而動口以宣心形見於聲心若感死喪之物則形見於悲戚之聲心若感於福慶則形見於歡樂之聲既有哀樂之聲自然一高一下或清或濁相應不同故云生變變謂不恆一聲變動清濁也聲既變轉和合次序成就文章謂之音也音則今之歌曲也以樂器次比音之歌曲播之并及干戚羽旄鼓而舞之乃謂之樂也鄭注宫商角徴羽雜比曰音單出曰聲者極濁為宫極清為羽五聲以清濁相次五聲清濁相雜和比謂之音單有一聲無餘聲相雜曰聲然則初發於口單者謂之聲衆聲和合成章謂之音金石干戚羽旄謂之樂則聲為初音為中樂為末也噍舉音者舉中見上下矣引易文言證同聲相應之義引春秋昭二十年左傳文證同聲不得為樂也云方猶文章者凡畫青黃相雜分布得成文章言音清濁上下分布次序得成音曲似之也案樂師有帗舞有羽舞有皇舞有旄舞有干舞有人舞無兵舞鄭彼注干舞者兵舞但經云干戚用戚則是大武大武兵舞故注引樂師益以兵舞解經之干戚也引詩邶風者證羽舞是翟舞也張氏曰夫樂之起其事有二一是人心感樂樂聲從心而生一是樂感人心心隨樂聲而變也物有外境外有善惡來觸於心則應觸而動故云物使之然比音言五音雖雜猶未足為樂後須次比器之音及文武所執之物共相諧㑹乃是由音得名為樂武隂文陽故所執有輕重之異唐張守節篇內同延平周氏曰音之所以起者以心心之所以動者以物無心則無物長樂陳氏曰禮自外作而文樂由中出而靜虛一而靜者其人心乎此凡音之起所以由人心生也人心離靜而動豈自爾哉有物引之而已今夫由心以感物其能不形於聲乎形於聲故有鼓宫宫動鼓角角應而以同相應也彈羽而角應彈宫而徴應而以異相應也以同相應則一倡一和而未始不有常以異相應則流行散徙不主故常而生變矣然心動而生聲聲動而生音語樂則未也比音而樂之動以干戚之武舞飾以羽旄之文舞然後本末具而樂成焉是豈不謂發於聲音形於動靜有以盡性術之變與由是觀之樂者心之動也聲者樂之象也文采節奏聲之飾也羽籥干戚樂之器也君子動其本樂其象然後治其飾舉其器則凡音之起由人心生者其本也形於聲而生變者其象也變成方者其飾也比音而樂之及干戚羽旄者其器也四者備矣樂之所由成也周官大司樂以五聲考八音以八音節六舞而大合樂焉是樂至舞然後大成也言變成方謂之音又言聲成文謂之音何也曰倡和有應回邪曲直各歸其分聲之所以成方也比物以飾節節奏合以成文聲之所以成文也變成方將以成樂音之始也聲成文必寓於政音之終也又曰文者音之雜方者音之節音之雜者音之始音之節者音之成故情動於中而形於聲則成文聲相應而生變然後成方此始與成之辨也樂書嚴陵方氏曰音雖聞於外其原生於人心而已揚子所謂言心聲是矣音之所由生者陽作之也故以起言之音雖一也起於心者則不一故以凡言之人心之靜性自然也及其動也物使然耳莊子所謂有物揉之而出是矣為物所使而動則心與物感故也故曰感於物而動心靜則藏於默心動則發於言故形於聲藏於隱而作於顯者聲也故以形言之有聲矣或唱或和則相應無常也宫變生徴徴變生商商變生羽羽變生角上下相通而成方則雜比之矣故謂之音音既雜比則節奏而可聽人斯樂之不知手舞足蹈也故曰比音而樂之及干戚羽旄謂之樂樂者樂也以人樂之故謂之樂先干戚而後羽旄者舞之序也與書言乃武乃文明堂位先言舞大武而後言舞大夏者亦此之意此變成方則言歌之音後聲成文則言詩之音延平黃氏曰樂之實本於性根於心故凡音之起由人心生非作於外物也外物為之感發而已人之心其猶柷與有物觸其中則鳴非柷求鳴於物也聲者心以應物者也單出曰聲雜比曰音單出未之變也五聲相應而變生焉聲成文謂之音此言聲有所變變成方謂之音此言變有所歸惟其有所歸在故其始作翕如也縱之純如也皎如也繹如也以成無方則不可比矣裳馬氏曰樂者人情之所不能免也心動於中然後發於口而形於聲故凡同聲者皆相應也變而使之雜則清濁相錯高下相足而成其文故曰變成方謂之音東西曰經南北曰緯有經有緯文之象也比音而樂之聲也干戚羽旄容也有聲有容樂之所以成也山隂陸氏曰音八音也雖有金石絲竹而無舞焉不得謂之樂故舞師凡小祭祀則不興舞慶源輔氏曰樂非外事也我固有之故首篇數言音之起於人心以曉人聲相應則自然高下之不同故云生變聖人因其變而品節之以五音使高下清濁雜然而可聽故云變成方謂之音樂始於聲成於舞故於首發之廬陵胡氏曰聲感物而生者也變何自而生哉聲之感者主於一而聲之應者從以五則清濁之不齊高下之不類變由是而生矣宫之應者徴也而不止於徴商之應者羽也而不止於羽宫倡而徴商角羽迭應以變商倡而羽角宫徴迭應以變以其應之隨聲者推之則其變有不勝窮者矣此聲相應故生變也羽角及商之聲則變而為金石為革木宫及徴之聲則變而為絲竹為匏土自其方之不同則回旋以相參合其方之所向則曲折以相和聲不因乎應則不能以自變變不成乎方則不足以為音樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔六者非性也感於物而后動是故先王慎所以感之者鄭氏曰言人聲在所見非有常也噍踧也嘽寬綽貌發猶揚也粗粗也孔氏曰此經覆眀上文感物而動之意結樂聲生起所由也合音乃成樂是樂由比音而生本猶初也物外境也樂初所起在於人心之感外境也心既由於外境而變故有下六事之不同若外境痛苦則其心哀哀感在心故其聲踧急而速殺也若外境所善心必歡樂歡樂在心故其聲必隨而寬緩也若外境㑹心心必喜恱喜恱在心故其聲必隨而發揚放散但樂是長久之歡喜是一時之恱左傳云喜生於好是喜與樂別也若忽遇惡事而心恚怒恚怒在心則其聲粗以猛厲也若外境見所尊心中嚴敬嚴敬在心則其聲正直而有廉隅直謂不邪廉廉隅也若愛情在心則聲和柔和調也柔軟也人生而靜無此六事六事之生由應感外物而動也所以知非性者今設取一人觸此六事必隨觸而動故知非本性也案庾氏曰隨其所感而應之是知非性也此聲皆據人心感於物而後為聲故鄭注云人聲在所見也張氏曰六事隨見而動非關本性聖人在上制正禮以防之故先王慎所以感之者也橫渠張氏曰古樂不可見蓋為後人求之太深始以古樂為不可知但以虞書言詩言志歌永言聲依永律和聲求而得之樂之意盡於是詩止言志歌但永其言而已永轉其聲令人可聽耳今學者亦以轉聲不變字為善歌既長言之要入於律則知音者察之知此聲入得何律錯綜以成文矣古樂所以養人德性中和之氣也後之樂反以求哀為工故晉平公曰音無哀於此乎哀則止感人不善之心歌也者不可以太高亦不可以太下太高則入於噍殺太下則入於嘽緩其聲之上下有此聲則有此心窮本知變樂之情也所求乎知變樂之道盡於此樂所以養人中和之性以其無嘽緩噍殺之聲太噍殺則聽之使人悲哀太嘽緩則聽之使人怠惰惟雅樂則聲音中正故可以養人和平此鄭衛之聲古人所以切禁蓋移人者莫甚焉苟未成性皆能移之不然夫子何以之戒顔回也鄭衛之聲使人忘倦樂聽魏文侯當時賢君也尚曰聽古樂則欲卧聽鄭衛之聲則忘倦蓋鄭衛之音悲哀則令人意思留連光景其音正與心合故樂聽也靡靡者亦類此聲故古人以御瞽幾聲之上下使之不至於噍殺不至於嘽緩惟是中正既作此聲又語之以義不聞其音即聞其意未嘗須臾不在理義此所以雅樂之能養仁義今日意思正惟日日講及義理則心乃常存也其始則心要合音終久復要音養人心也大槩外物未必能動人動人惟聲為切長樂陳氏曰樂出於虛必託乎音然後發音生於心必感乎物然後動蓋人心其靜乎萬物無足以撓之而性情之所自生者也攝動以靜則喜怒哀樂未發而為中則性也君子不謂之情離靜以動則喜怒哀樂中節而為和則情也君子不謂之性其故何哉人函天地隂陽五行之氣有哀樂喜怒敬愛之心然心以情變聲以心變其哀心感者未始不戚戚故其聲噍以殺其樂心感者未始不蕩蕩故其聲嘽以緩其喜心感者多毗於陽故其聲發以散其怒心感者多毗於隂故其聲粗以厲敬心感者內直而外方故聲必直以廉愛心感者內諧而外順故聲必和以柔則志微噍殺之音作而民思憂哀心所感然也嘽諧易簡之音作而民康樂樂心所感然也流散滌濫之音作而民淫亂喜心所感然也粗厲猛起之音作而民剛毅怒心所感然也廉直莊誠之音作而民肅敬敬心所感然也寬裕順和之音作而民慈愛愛心所感然也凡此六者非性之正也感於物而後動則其情而己乃若其情則能慎其所以感之窮人心之本知六者之變使姦聲不留聰眀淫樂不接心術合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾各安其位而不相奪則正人足以副其誠邪人足以防其失而治道舉矣若不知慎所以感之則彼必有悖逆詐僞之心淫泆作亂之事以强脅弱以衆暴寡以知詐愚以勇苦怯窮人欲滅天理者矣其欲君子以好善小人以聽過移風易俗天下皆寧不尤難哉樂書嚴陵方氏曰凡人之情得所欲則樂喪所欲則哀順其心則喜逆其心則怒於所畏則敬於所恱則愛此六者之别也噍則竭而無澤殺則减而不隆蓋心喪其所欲故形於聲者如此嘽則闡而無餘緩則紆而不迫蓋心得其所欲故形於聲者如此發則生而不窮散則施而無積蓋順其心故形於聲者如此粗則疏而不精厲則危而不安蓋逆其心故形於聲者如此直則無委曲廉則有分際蓋心有所畏故形於聲者如此和則不乖柔則致順蓋心有所恱故形於聲者如此靜者天之性動者人之情無所感則靜有所感則動六者感於物而後動故曰非性也延平黃氏曰樂生於夷曠故其聲嘽以緩喜生於愜適故其聲發以散哀則抑故噍以殺怒則揚故粗以厲敬則義心感也故其聲直以廉愛則仁心感也故其聲和以柔六者之感情動於中而形於聲者也性所有也然而非性言性則靜矣無六者之動言性則合矣無六者之别物能動人之情先王能制天下之物故物之所以感人者先王能為之謹焉聲之所出則有樂以和之志之所適則有禮以道之其得喪同則有政以一之其姦害同則有刑以防之禮樂以治其內刑政以治其外其名有四其所以同民心而出治道其實一也山隂陸氏曰其所以感民者苟為不慎雖有韶濩使夔為之不能諧也慶源輔氏曰噍殺急促而微細急促故微細也外境可哀故心之哀應之是我心本無哀也因彼之哀而哀之耳故曰哀心感下凖此人心憂愁則揫斂喜樂則舒散然喜是樂之初樂是喜之終始則發散終則舒緩自然之勢也厲謂慎厲廉近乎方故曰敬義體用也愛心如母之於子是也先王知此則知樂之本矣慎謂一嚬一笑不敢妄形一話一言不敢妄發延平周氏曰哀樂喜怒敬愛皆天性也感而形於聲亦天性然也以是六者謂非性誤矣金華應氏曰靜者天之性具於喜怒哀樂未發之初動者人之情形於喜怒哀樂既發之後故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也所以同民心而出治道也鄭氏曰極至也同民心而出治道此其所謂至也孔氏曰既六事隨見而動非關其本性故先代聖人在上制正禮正樂以防之不欲以外境惡事感之也禮樂刑政是防慎所感之具政法律也正禮教道其志正樂諧和其聲法律齊一其行刑辟防其凶姦用其四事齊之使同其一致人心所觸六事不同聖人用四者制之使俱得其所也案賀氏曰雖有禮樂刑政之殊及其撿情歸正至理一也長樂陳氏曰聖人之於易制禮於謙作樂於豫眀政於賁致刑於豐則禮樂者政刑之本政刑者禮樂之輔古之人所以同民心出治道使天下如一家中國如一人者不過舉而錯之而已夫姦聲感人而淫樂興焉正聲感人而和樂興焉先王必慎所以感之故禮自外作而道志於內樂由中出而和聲於外政以一不齊之行刑以防不軌之姦慎所以感之之術也其極則一於同民心使之無悖逆詐僞之心一於出治道使之無淫泆作亂之事慎所以感之之效也此因人心之感物而動故先王慎所以感之而以禮樂刑政出治道下文因人之好惡無節故先王以人為之節而以禮樂刑政備治道蓋相為終始故也樂書嚴陵方氏曰心有所之則不能無壅故於志言道情有所發則不能無乖故於聲言和成德者欲確乎不可拔故於行言一在外者宜正其所自故於姦言防離言之則先政而後刑先後之序也合言之則先刑而後政終始之序也民心由四者而同治道由四者而出馬氏曰道有達而治之之意也蓋禮所以節於內有以節於內則在下者無覬覦之心矣易所謂辨上下定民志者是也樂所以和其心能和其心然後能和其聲不言和其心者聲和則心和可知矣蓋有禮以道其志則必有樂以和其聲此內外之辨也政者所以約之於外而行亦自外作故政以一其行有禮以道其志有樂以和其聲有政以一其行而竒邪不能無也故又為刑以防其姦蓋刑者所以待其有不帥也故禮樂刑政其體雖不同而其極則一也所謂其極一者皆所以同民心而出治道也言治道因之以出山隂陸氏曰風出於德性雅出於政事故魏褊曹奢其風雖不同而雅則常一也春秋傳曰人心之不同如其面焉禮樂刑政所以同之此四者蓋出於民而還以治民廬陵胡氏曰極中也禮樂刑政合乎民心是謂中慶源輔氏曰制於外所以順行於內養其心所以和易其聲禮樂交相養也政者正也一於正而已不正則有刑以俟之民心本同隨所感而異而禮樂刑政所以反其同也為治之道無越於此旴江李氏曰趙簡子問子太叔揖讓周旋之禮焉對曰是儀也非禮也夫禮天之經也地之義也民之行也天地之經而民實則之是故為九歌八風七音六律以奉五聲為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮以是言之樂刑政非禮者乎金華邵氏曰此又言聖人養其樂之本如此夫音由心生心由物動苟不謹其所感使放辟邪侈日作於外非心妄念日動於中則發之音聲其將若何故感者在心感之者在物先王所以謹其感之者豈有他道哉制禮以道其志而使不放作樂以和其聲而使不乖政以一其行而不使之雜刑以防其姦而不使之犯禮樂刑政其用雖異然䆒其終窮則未始異也志者心之所之聲者心之所發行者心之形也姦者心之賊也四者既謹則民心同入於善而治道由是而出故曰所以同民心而出治道養其本者如是則心之發於聲有不得其所者哉延平黃氏說見前凡音者生人心者也情動於中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣鄭氏曰言八音和否隨政也玉藻曰御瞽幾聲之上下孔氏曰上文云音從人心生乃成為樂此一節眀君上之樂隨人情而動也人君政教善惡感動於心故形於聲上文感於物而動故形於聲是也聲成文謂之音則上文變成方謂之音是也聲之清濁雜比成文乃謂之音此云音不云樂者樂以音為本變動由於音又下文言治世之音亂世之音故不云樂也治平之世其樂音安靜而歡樂由君政和美而人心安樂故也亂世樂音怨恨而恚怒由君政乖辟而人心怨怒故也亡國謂將欲滅亡之國樂音悲哀而愁思由其人困苦哀思故也治世亂世云世亡國不云世者以國將亡無復繼世也治世亂世云政亡國不云政者言國將滅無復有政也張氏曰人心即君上心也樂音善惡由君上心之所好故云生於人心者也情君之情也中猶心也心既感物而動故形見於聲也政和則聲音安樂政乖則聲音怨怒是聲音之道與政通矣黃氏曰正義解云清濁雜比為成文今詳之非其義也斯蓋言情動於中而形於聲聲單出未能成文成文則聲成章句之辭理義明白可以為樂文理也謂之音者取章成章句成句五聲可比八音和諧為樂之本者也故聲成文者言合理也以其頌美刺淫章句合理為成文矣儻但取清濁雜比則常言俗語鳥獸之聲咸有清濁雜比豈可謂之成文者哉濂溪周氏曰樂者本乎政者也政善民安則天下之心和故聖人作樂以宣暢其和心達於天地天地之氣感而大和焉天地和則萬物順故神祗格鳥獸馴長樂陳氏曰心以感物而動為情情以因動而形為聲聲者情之所自發而音者又雜比而成者也治世以道勝欲其音安以樂雅頌之音也政其有不和乎亂世以欲勝道其音怨以怒鄭衛之音也政其有不乖乎亡國之音則桑間濮上非特哀以思而已其民亦已困矣由是觀之世異異音音異異政夫豈聲音自與政通耶蓋其道本於心與情然也書曰八音在治忽國語曰政象樂亦斯意與自繼代以論世未嘗無治亂自封域以論國未嘗無興亡治亂言世不言國則國以世舉亡國不言世則國亡而世從之矣治亂言政不言民亡國言民不言政亦可類推也言樂者音之所由生繼之以六者之聲言宫商角徴羽繼之以五者之音何也曰聲以單出為名音以雜比為辨論音之散而單出雖音也亦可謂之聲論聲之合而雜比雖聲也亦可謂之音此言情動於中又言形於聲詩序言情動於中而形於言又言情發於中而形於聲者動者喜怒哀樂之未發者也發者發而中節動不足以言之動發於中而形於言與聲詩之所以寓於音也動於中而形於聲樂之所以通於政也詩序兼始終言之樂記特原其始而已故其辨如此樂書延平黃氏曰怒有以責之也至亡國也不足以責之思其治者而已下泉之詩是也怨有以親之也至亡國也不足以親之哀其亡者而已黍離之詩是也政有得失則於物有善惡物有善惡則於情有喜怒情有喜怒則於聲有美刺故曰聲音之道與政通矣嚴陵方氏曰安以樂者安其居樂其業也怨以怒者其心怨其氣怒也哀以思者哀於今思於古也人安而樂由世之治世治由政之和和者相順而理之謂人怨而怒者由世之亂世亂由政之乖乖者相悖而逆之謂人哀而思者由國之亡國亡由民之困困者不能自立之謂且政和則其音安樂政乖則其音怨怒此聲音之道所以與政通也馬氏曰上言變成方謂之音而此言聲成文謂之音其實一也哀者哀其將亡而思者思其已存之際慶源輔氏曰安謂不知其所以然樂則歡虞不足以盡之矣怨怒猶有所屬哀思則倀倀然矣人樂則思慮省哀則思慮多通上下只一理山隂陸氏曰讀鳬鷖既醉之詩則安以樂可知讀君子偕老之詩則怨以怒可知讀黍離揚之水諸詩則哀以思可知審樂知政蓋知本之論與宫為君商為臣角為民徴為事羽為物五者不亂則無怗懘之音矣宫亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣鄭氏曰五者君臣民事物也凡聲濁者尊清者卑怗懘敝敗不和貌五者其道亂則其音應而亂荒猶散也陂傾也孔氏曰此一節論五聲之殊所主不一得則樂聲和調失則國將滅亡鄭注月令云宫屬土土居中央總四方君之象也又音以絲多聲重者為尊宫絃最大用八十一絲故為君也商屬金七十二絲次宫如臣次君之貴重也角屬木以其清濁中民之象也宫濁而羽清角六十四絲聲居宫羽之中半清半濁故云清濁中民比君臣為劣比事物為優故云角清濁中民之象也徴屬火用五十四絲聲清故為事羽屬水用四十八絲最處末所以羽為物也五者各得其所用不相壞亂則五音之響無敝敗矣宫音亂則其聲放散由其君驕溢故也商音亂則其聲欹邪不正由其臣不治於官官壞故也角音亂則其聲憂愁由政虐民怨故也徴音亂則其聲哀苦由徭役不休民事勤勞故也羽音亂則其聲傾危由君賦重民貧乏故也迭互也陵越也五聲不和則君臣上下互相陵越所以為慢也滅絶也無日言旦夕可俟無復一日也崔氏曰五音之次以宫最濁自宫以下則稍清矣君臣民事物亦有尊卑故以次配之商是金金以决斷猶臣事君亦以義斷為賢也角屬春春時物生衆皆有區别象萬民衆多而有區别也徴屬夏夏時生長萬物皆成形體事亦有體故以徴配事也羽屬冬冬物聚則成財用冬則物皆藏聚與財相類也宫聲所以散者由君驕也君驕則萬物荒散也商聲所以傾邪者由臣官壞也官壞則物傾邪也角聲所以亂者由民不安業有憂愁之心也民無自怨君上失政故下民生怨也徴所以亂者由民勤於事悲哀之所生也危者聲不安也羽聲所以不安者由君亂於上物散於下故知財乏不能得安故有匱乏也偏據一亂未足以滅亡五者皆亂故滅亡無日矣延平周氏曰還相為宫而不相亂則其音和相陵謂聲不依永也君臣民事物其道亂則其音應長樂陳氏曰先王作樂以聲配日以律配辰原樂聲之始五聲未始不先律要樂器之成十二律未始不先聲書曰詩言志歌永言聲依永律和聲原樂聲之始也周官大師掌六律六同以合隂陽之聲皆文之以宫商角徴羽之聲樂器之成也古者考律均聲必先立黃鍾以本之黃鍾之管九寸觸類而長之數多者上生而有餘數少者下生而不足一損一益皆不出三才之數而已故參分益一上生之數也參分損一下生之數也今夫樂始於聲聲始於宫宫聲最大而中固足以綱四聲覆四方君之象也參分宫數損一而下生徴徴聲微清而生變事之象也參分徴數益一而上生商商聲則濁而下次於宫臣之象也參分商數損一而下生羽羽聲最清而足以致飾物之象也參分羽數益一而上生角角聲一清一濁其究善觸而已宫徴商羽角上下相生之次也宫商角徴羽君臣民事物之次也傳曰宫者音之主蓋商非宫則失其所守不足以為臣角非宫則失其所治不足以為民徴非宫則失其所為不足以為事羽非宫則失其所生不足以為物五行主土五事主思亦猶是也宫商角徴羽五聲之名也君臣民事物五聲之實也實治則聲從而治實亂則聲從而亂傳曰聞宫音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徴音使人樂善而好施聞羽音使人整齊而好禮宫亂而君驕失溫舒廣大之意也商亂而官壞失方正好義之意也角亂而民怨失惻隱愛人之意也徴亂而事勤失好施而為之之意也羽亂而財匱失好禮而節之之意也樂書嚴陵方氏曰王氏謂宫為君者周覆而以宅人者也商為臣者臣為商度者也角為民者民可制也不知所以制之則善觸人者也徴為事者事於微則有徴也羽為物者物則有實用亦可以為飾故也怗如沾懘如滯由是而成除故也滅亡無日滅則人滅之也亡則自亡而已山隂陸氏曰荒其君驕之兆也陂其官壞之證也怨是以憂勤是以哀危兆於匱亦危所以匱也凡樂唯宫為大故宫亂則荒若商亂角亂則壞則憂而已延平黃氏曰其君不驕則其宫不亂其宫不亂則其音不荒其財不匱則其羽不亂其羽不亂則其音不危故曰五者不亂則無怗懘之音矣慶源輔氏曰大而不治曰荒荒不治也陂不正也變臣言官者主有職者言之也率土之濵莫非王臣憂與哀噍殺之意也危則欲絶矣嵇康之制慢商者其是之謂乎商慢則臣陵乎君矣講義曰人君知音之理實與政通則不敢驕傲怠忽而臣民事物之理亦從而得矣蓋治生於敬而失於慢方慢之初疑若未至於亂亡及其漸也則已不可收拾古之人君所以務敬不使慢心得生焉以此也記言迭相陵謂之慢其有旨哉鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也鄭氏曰比猶同也濮水之上地有桑間者亡國之音於此之水出也昔殷紂使師延作靡靡之樂已而自沈於濮水後師㳙過焉夜聞而寫之為晉平公鼓之是之謂也桑間在濮陽南誣罔也孔氏曰此經論亂世滅亡之樂鄭國之音好濫淫志衛國之音促速煩志並亂世之音也雖亂而未滅亡故云比於慢同前之慢也鄭注昔殷紂以下皆史記樂書之文君政荒散民自流亡誣罔於上行其私意違背公道不可禁止也橫渠張氏曰鄭衛之音人聞之須起留連光景之意又生怠惰之意從而致驕淫之生雖珍玩竒貨其始感人也亦不如是之切從而生無限嗜好故孔子必曰放之是亦聖人經歷過但聖人不為物所移耳苟未成性則有時能為所移蓋鄭衛之地濵大河沙地土壤不厚其間人自然氣輕浮其地氣薄不費耕耨物亦能生故其人偷脫怠惰弛慢頽靡其人情既如此則其聲音所感亦同故聞其樂亦使人如此又其地平下其間人自然意氣柔弱怠惰其土足以生古所謂息土之民不才者此也長樂陳氏曰鄭音好濫淫志衛音趨數煩志內足以發疾外足以傷人亂世之音也雖未全如亡國之慢亦比近於慢而已其政散而無紀其民流而不反樂書山隂陸氏曰桑間即詩桑中是也其序曰政散民流而不可止今曰誣上行私而不可止其濮上之音與論語曰大師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入於河播鼗武入於漢少師陽擊磬襄入於海此言有守者不至於是矣慶源輔氏曰五音應五事陵慢則滅亡無日矣故鄭衛之音幾於慢而未至於慢也夫至於形於聲音者如此則反之豈易事哉亦終必亡而已矣故曰政散民流誣上行私而不可止政散民流亂國之事也疑當在亂國之音下國亡矣何有政散民流誣上行私之足言哉吕氏詩記辨之詳矣政散民流而不可止序詩者引是以為說豈亦誤與延平黃氏曰誣上則天下之誠心喪行私則天下之和心喪此亡國之音所以作也凡音者生於人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂鄭氏曰倫猶類也理分也禽獸知此為聲耳不知其宫商之變也八音並作克諧曰樂孔氏曰自此至正也明音樂之異音易識而樂難知知樂則近於禮又眀禮樂隆極之㫖先王以禮樂教人之意音從聲生聲從心起故云生於人心者也此音為樂有金石絲竹干戚羽旄樂得則隂陽和失則羣物亂是樂能通倫理也隂陽萬物各有倫類分理者也衆庶知歌曲之音而不知樂之大體唯君子能知極樂之理橫渠張氏曰樂通倫理者合八音行八風如此得其和也不通倫理安能如此樂欲通天下之和必先盡萬物之理須是無不和故通倫類也論倫無患樂之情與萬類皆無患方是樂之情和八音行八風猶是其間事之小者自天地鬼神萬物之類無不盡其理所以作之而神人和鳥獸感通倫類是也延平周氏曰大而天地細而秋毫莫不有倫理也唯樂為能宣之樂者豈特聲音而已故禽獸知聲而不知音則異於衆庶衆庶知音而不知樂則異於君子雖然君子之知樂亦未嘗不始於聲音長樂陳氏曰樂為音之藴音為樂之發故樂足以該音而音不足以盡樂音雖生於人心未始不通於倫理八音克諧無相奪倫是也樂雖通倫理未始不生於人心樂者心之動是也蓋倫則天人之道存而有先後理則三才之義貫而有度數故行而倫清以為樂論倫無患以為情近而親踈貴賤之理形逺而天地萬物之理著然則樂通倫理雖不離先後度數之間蓋將載道而與之俱往來而不窮矣彼禽獸知聲而不知音衆庶知音而不知樂豈足與語此心感於內情形於外而單出者樂之聲也曲折成方交錯成文而雜比者樂之音也大司樂曰凡樂皆文之以五聲播之以八音傳曰五聲和八音諧而樂成則樂者比五聲八音而成之者也君子仁足以盡性術知足以通倫理其於知樂也何有樂書延平黃氏曰倫理之於人同有於性同生於心然而無樂為之和同則至於乖絶無樂為之感通則至於湮塞君臣上下聽之莫不和恭父子兄弟聽之莫不和親則不至乎乖絶聽鐘聲則思武臣聽鼓鼙之聲則思將帥之臣則不至乎湮塞禽獸有聞而無知有情而無文故不知音衆庶有知而無德有文而無實故不知樂嚴陵方氏曰倫言人倫理言物理若君臣上下同聽之則莫不和敬長幼同聽之則莫不和順父子兄弟同聽之則莫不和親所謂通人倫也若草木茂區萌達羽翼奮角觡生所謂通物理也君子則通於道者也故唯君子為能知樂焉若瓠巴鼓瑟游魚出聽伯牙鼓琴六馬仰秣此禽獸之知音者也魏文侯好鄭衛之音齊宣王好世俗之樂此衆庶之知音者也若孔子在齊之所聞季札聘魯之所觀此君子之知樂者也清江劉氏曰所謂君子知樂者知其通倫理也知其扶性飾情而反之正也知其創業象功移風易俗也慶源輔氏曰樂者通倫理者也蓋有序而後和和則其序不紊矣君子通倫理故能知樂子語魯大師樂曰樂其可知也始作至繹如也以成君子盡人道者也衆庶則有所虧矣孟子曰人之所以異於禽獸者幾希庶民去之君子存之金華邵氏曰倫倫類也理條理也曰心曰聲曰音曰樂名雖不同倫理未嘗不相通為一故心與聲通聲與音通音與樂通極其終則樂又未嘗不與理通禽獸知單出之聲而不知成文之音衆庶知成文之音而不知比音之樂此皆不通倫理者也唯君子通倫理故能知樂新安王氏曰領父子君臣之節形貴賤長幼之理樂之通倫也動四氣之和著萬物之理樂之通理也樂不通倫其能使祖考來格虞賔在位乎樂不通理其能使百獸率舞鳯凰來儀乎是故審聲以知音審音以知樂審樂以知政而治道備矣是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣禮樂皆得謂之有德德者得也鄭氏曰知樂則幾於禮者幾近也聽樂而知政之得失則能正君臣民事物之禮也孔氏曰音由聲生樂由音生政由樂生政善樂和音聲皆善治道備矣黃氏曰書云詩言志歌永言聲依永律和聲八音克諧無相奪倫以此辨之樂之作非徒然而起咸取國風雅頌四詩為本先有歌詩後乃從而為樂故古之審樂辨於詩者多矣若全舍詩言而辨五聲八音者當春秋二百四十二年唯聞師曠吹律云南風不競知楚師無功及伶州鳩辨鐘聲之摦理猶未當蓋辨音聲之能者唯知其吉凶之徴兆也若政之善惡不辨詩言而唯在聲音則夫子云師摯之始關雎之亂洋洋乎盈耳哉及自衛反魯然後樂正雅頌各得其所當此之時魯政日衰而惡聲不見於雅頌之樂哉以此詳之辨於聲則微而辨於詩者多矣蓋魯國樂師方失雅頌至夫子歸而正之俾聲依其永律和其聲則雅頌之樂復正矣儻聲音之㫖不係於詩則奏鄭衛之樂而歌關雎之詩為亡國之音哉奏周南之樂而歌桑中之什為治世之音哉非通論也言五聲應君臣民事物者乃御瞽察聲之上下得失之徴應耳觀注文正義之㫖言樂不本四詩誠為未當故云知音不知樂者衆庶是也唯君子為能知樂是故審樂而知政也詳其義如今之琴也小人聞之但知琴之音而不辨其辭㫖唯君子能知其音而辨其詩可知政也眀矣長樂陳氏曰聲樂之象音樂之輿故審聲之清濁則知音之髙下審音之高下則知樂之和否審樂之和否則知政之得失而治道備矣大司樂以五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以說遠人以作動物則五聲所以成八音審聲以知音也八音所以節舞而合樂審音以知樂也幽足以致鬼神示眀足以和邦國內足以諧萬民外足以安賔客逺足以說逺人微足以作動物是則審樂以知政而治道備豈外是與凡物皆動而有聲聲變而成音知音必自聲始知樂必自音始禮主節樂主和和勝則流有以節之則不至慢易以犯節流湎以忘本其於禮也亦何嘗逺之有且幾者近而不逺之辭知樂之情則樂常幾於禮而未嘗逺禮自迹求之聖人作為鞉鼓椌楬塤篪以道德音之音然後鐘磬竽瑟以和之旄狄以舞之執其干戚習其俯仰詘伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉施之祭祀所以獻酬交酢也施之饗燕所以官序貴賤得其宜也施之鄉射所以示後世有尊卑長幼之序也然則樂之所和禮之所節未始不行於其間曷嘗不幾於禮與揚子曰人而無禮焉以為德易曰先王以作樂崇德則禮為德之容樂為德之華所謂德者禮樂皆得於身而已樂書嚴陵方氏曰聲雜而為音故審聲以知音音比而為樂故審音以知樂聲音之道與政通故審樂以知政此皆由粗以致精故每言審焉審聲以知音故不知聲者不可與言音審音以知樂故不知音者不可與言樂夫以天地之形言之則樂隆於禮以隂陽之理言之則禮深於樂所謂知音者知其禮而已故言知樂則幾於禮也何以言之樂由陽來而陽為春夏之作長作長所以動而即事禮由隂作而隂為秋冬之斂藏斂藏所以靜而入道故也王氏謂見形則知剛强之勝柔弱識理則悟柔弱之勝剛强是矣雖然獨陽不生獨隂不生非春夏之作長亦無以致秋冬之斂藏苟不知樂亦何以幾於禮乎馬氏曰唯君子為能知樂故由聲以至於知音由音以至於知樂由樂以至於知政而為治之道無以易此矣禮樂有相通之理禮者中也樂者和也中以和為用和以中為體故知樂則可以幾於禮幾者近而未至之辭夔之達於樂而未達於禮所謂幾於禮者也至於禮樂皆得則不特幾於禮而已凡禮樂之情文皆有以得之得者對失之辭禮樂之道非淺聞單見之所能知故知之者寡而不知者衆知之者寡而不知者衆則是天下皆失而我獨得之故曰德者得也延平黃氏曰聲變而為音故審聲以知音音比而為樂故審音以知樂政者樂之安樂怨怒中淫恭慢之所自作故審樂以知政樂與禮同出乎仁義之實禮之實節文仁義之成樂則樂其成而已然而樂之和已有節文在其中焉子曰禮者理也樂者節也以其樂為主不得謂之禮耳故曰知樂則幾於禮心徹而為智智徹而為德偏得樂則和而有所流偏得禮則中而有所倚非所謂有德山隂陸氏曰得其一而己德不足言也既得之又失之不得為德也李氏曰樂由陽來禮自隂作故禮樂者猶東西之相反而不可以相無也是以方其以禮為體也必以樂為文方其以樂為體也必以禮為用故子曰不能樂於禮素言禮必以樂為文也周官曰以樂禮教和言樂必以禮為質也故逹於禮而不逹於樂則素逹於樂而不逹於禮則偏矣夫唯知禮故幾於樂知樂故幾於禮此自樂言之故曰知樂則幾於禮矣慶源輔氏曰審聲以知音審音以知樂順而下之自源以尋流也審樂以知政逆而上之自末以反本也審始形之聲以知他日之樂審已成之樂以知前日之政如表裏形影之不誣也則治道悉矣樂通倫理故知樂則幾於禮禮者理也然知之而已故曰幾焉子曰興於詩立於禮成於樂孟子曰禮之實節文斯二者是也樂之實樂斯二者樂則生矣生則烏可已也故禮樂不備不可謂之成人金華邵氏曰惟君子知樂故審噍殺之聲則知其為志微噍殺之音審嘽緩之聲則知其為寬諧慢易繁文簡節之音如此之類所謂審聲以知音也審寬裕肉好順成和動之音則知和樂興焉審流辟邪散狄成滌蕩之音則知淫樂興焉若此之類所謂審音以知樂也審樂之和則知其政之和審樂之乖則知其政之乖若此之類所謂審樂以知政也吾能自知音以至於知政倫理貫通則於為治音樂不敢缺一苟一有缺則聲與音音與樂必形見於此矣故不知聲不可與言音不知音不可與言樂苟能知樂則於禮為幾蓋禮者理也樂通倫理故於禮為幾論至於此則禮樂豈二理哉禮記集說卷九十一
