body:
  text: 禮記集説卷一百二十宋衛湜撰孔子間居第二十九孔氏曰案鄭目録云名曰孔子間居者善其無倦而不衰猶使一弟子侍為之説詩著其氏言可法也退燕避人曰間居此於别録屬通論長樂陳氏曰間居言詩則先之以為民父母而繼之以三王之德為民則在於致五至而行三無三王之德則在於奉三無私而先令聞蓋有為民父母之道而後可以行三王之德洪範曰天子作民父母以為天下王故其序如此孔子間居子夏侍子夏曰敢問詩云凱弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達於禮樂之原以致五至而行三無以橫於天下四方有敗必先知之此之謂民之父母矣鄭氏曰凱弟樂易也原猶本也橫充也敗謂禍災也孔氏曰此篇子夏之問大略有二從此至施于孫子問民之父母之事自三王之德以下問德何以參於天地以終篇末此詩大雅泂酌之篇謂成王行樂易之德為民之父母也五至三無通幽達微觀微知著豫見禍害使民免罹故為民之父母然四方有福亦先知之此主為民除害故舉敗言之藍田吕氏曰禮樂之原在於一心致五至行三無以橫於天下乃一心之用也人心其神矣乎四方有敗必先知之所以為神也君子之樂而易者蓋以此也是故能為民父母也嚴陵方氏曰禮有節父道也樂能同母道也五至由粗以入精故曰致三無自內以達外故曰行橫于天下者以是道廣被于天下也四方有敗必先知之言其道又足以幾於神也敗者成之對不言成而止言敗者蓋君子思患而豫防之則敗尤在乎先知之故也長樂陳氏曰凱者喜也樂之所由生也弟者順也禮之所由生也君子之於禮樂豈他求哉不過舉斯心措諸彼而已然則不達禮樂之原惡足為民父母乎蓋凱弟出於君子之德性而禮樂皆得所以謂之有德矣然達於禮而不達於樂君子謂之素達於樂而不達於禮君子謂之偏為其不達於禮樂之原故也苟達禮樂之原則致五至行三無以橫於天下自無不可矣又曰五至者君子之德三無者君子之道五至言至則知三無之為大三無言無則知五至之為有五至以有而入於無故繼之以不可得而見不可得而聞三無以無而入於有故終之以施及四海施于孫子蓋其往反未嘗暫止於隱顯之間是以哀樂必相生則至於不可見聞由不可見聞至於充塞天地之大由天地之大則又至於三無此為民父母不可以不知也馬氏曰凱以強教之則尊弟以説安之則親尊則與父同敬親則與母同愛達乎禮樂之原者蓋非特形名度數之粗而中與和是也中和之道體之足以定用之足以應致之以致已而所以治己者盡矣行之以治人而所以治人者盡矣積而上之至於先見之明先知之神皆中和之所致也致五至而行三無以橫於天下所以養其善也四方有敗必先知之所以去其不善也養其善去其不善則為民父母之道石林葉氏曰凱則強教而使民尊之父道也故必達乎禮弟則説安以使民親之母道也故必達乎樂孝經言教民親愛莫善於孝而對移風易俗莫善於樂教民禮順莫善於弟而對安上治民莫善於禮亦此意也廣安遊氏曰致者致之使來行者行之使達清明在躬志氣如神則四方有敗必先知之蓋為民父母必知所以庇民有敗而知之則知所以備之先事備敗使害不及民所以庇民也庇民則可為民父母矣君子治心於杳冥之際而達之以及於天下則與天下為慶善吉祥之福使斯民富壽康寧然則居乎斯民之上非樂易之君子孰為之父母哉慶源輔氏曰人而不仁如禮何人而不仁如樂何仁者禮樂之本原也此非至仁而以天地萬物為一體者不能唯仁故可以作民父母慈湖楊氏曰禮樂之原即五至五至即三無三無即五起五起即能先知四方之敗者道不可言孔子欲無言不得已而有言曰原足矣何必言五至五至多矣又何必言三無子夏沉溺於文藝之淵藪斷非一語所能曉敷而明之曲而暢之庶幾或觸其機也又曰孔子曰吾有知乎哉無知也文王不識不知順帝之則子貢以為多學而識之聖人以為非孔子又曰天下何思何慮學者苟有意焉夫子必曰毋有必焉必曰毋有固焉必曰毋有我焉必曰毋微有意度如雲氣之蔽太虛矣四方有敗安能知之知四方之敗者必其不識不知者也孔子曰不逆詐不億不信而亦自先覺何也意慮不作而本清本明之性自無所不照故也此非口舌所能道也此非思為所能到也金華應氏曰凱弟樂易藹然有禮樂之象而粹然有父母之心也必達於禮樂之原而後能充禮樂之用橫者充塞而橫流也父母之心惻怛懇至而赤子疴癢疾痛無纎髮不切於肌膚四方萬里微有禍敗必先知之蓋愛其民者切慮其事者周故不善之幾微萌芽者稍觸於吾身則吾不覺知焉如此而後無愧於父母之名矣子夏曰民之父母既得而聞之矣敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至鄭氏曰凡言至者至於民也志謂恩意也言君恩意至於民則其詩亦至也詩謂好惡之情也自此以下皆謂民之父母者善推其所有以與民共之云耳不能聞目不能見行之在心也塞滿也孔氏曰此經子夏問五至孔子答以五至之理此五者君民同有感之在心外無形聲故目不得見耳不得聞藍田吕氏曰達於禮樂之原以致五至而行三無則此兩者皆出於禮樂故五至有曰詩之所至禮亦至焉禮之所至樂亦至焉三無有曰無聲之樂無體之禮也志者心之所之也心不之道將何之矣詩以道志者也故曰志之所至詩亦至焉興於詩則必至於禮故曰詩之所至禮亦至焉立於禮則必成於樂故曰禮之所至樂亦至焉樂者樂也樂極則悲來故曰樂之所至哀亦至焉哀樂相生者也始乎志猶十嵗曰幼學也終乎哀猶百年曰期頤也此五者視之不見聽之不聞而其志氣塞乎天地可謂至矣非達於禮樂者不足以及此也聽欲傾耳視欲正目明字衍也長樂劉氏曰天子居上而志在富壽其民也皇作其極而民享五福則志至矣又何加焉民樂其富壽也則舞蹈形頌聲作故曰詩亦至焉詩至矣又何加焉富矣庶矣不教則亂是故倫其人以五品而序之以貴賤親疏尊卑長幼男女之别朋友之義四術之法行焉則禮至矣又何加焉曰五品克遜四術己明俗正風純王道極矣無樂以將之則不可以常久也於是辨五聲調六律陳八音興六樂而國風雅頌歌之鄉人焉歌之學校焉歌之朝廷焉歌之宗廟焉聞之者以感以化而久於其中矣又何加焉曰樂極則哀生生窮則死至古今之常道也故為之喪禮於上而民知所以仁於死喪也是以親親而仁民仁民而恤物物冒其恤則哀至矣聖人無為於上也而五者興於其民莫不至乎其極也為民父母者必基本於是焉橫渠張氏曰志至詩至有象必可名有名斯有體故禮亦至焉嚴陵方氏曰志之所之發乎聲詩者聲也故曰志之所至詩亦至焉詩之所言合乎法禮者法也故曰詩之所至禮亦至焉禮之所用貴乎和樂者和也故曰禮之所至樂亦至焉樂之所極存乎憂哀者憂也故曰樂之所至哀亦至焉然隂陽之理相為倚伏周而復始哀既生於樂矣則樂亦生於哀故終之以哀樂相生也五至若是則夷而無象視之不可見希而無聲聽之不可聞也目當前故曰正耳在傍故曰傾希夷如此則志氣塞乎天地豈為過哉蓋志者心所之氣者體之充塞乎天地則以言其彌滿而無間也志之塞乎天地由其持之以正而已氣之塞乎天地由其養之以直而已孟子曰持其志無暴其氣又曰以直養而無害則塞乎天地之間亦謂是矣長樂陳氏曰致五至而至於志氣塞乎天地不亦大乎行三無而至於施及四海施于孫子不亦逺乎子夏可與言詩至於門人事灑掃應對進退之末是雖達詩人之意未達於禮樂之原也故孔子因其所問而告之以致五至行三無反覆以詩明之蓋所以長其喜救其失也然言五至禮必先樂言三無樂必先禮何也曰五至為粗矣致之必自此以至妙故先乎禮三無為妙矣行之必自此以之粗故先乎樂又曰樂者樂也樂則為陽哀則為隂樂極則至於哀哀極則至於樂哀樂者人之所不能免猶之隂陽者天道所不能無也夫惟明於哀樂相生之不窮則哀復於無哀而樂復於無樂矣孟子言寒乎天地者專乎氣此言塞乎天地則兼於志何也蓋志之為物常先於氣而為氣之帥氣之為物常後於志而為志之用孟子言持其志無暴其氣又曰直養而無害則氣之所以塞乎天地者豈非志乎廣安遊氏曰志也詩也禮也樂也哀也相因而生相尋而至者也詩猶情也情動於中而為喜怒哀樂詩者喜怒哀樂之動而成章者也故志之所至詩亦至焉情動於中而禮隨至以為節故禮亦至焉節之以禮而誠心樂之然後可以持久而不厭故樂亦至焉樂猶自樂也哀猶慈哀也自樂於己而後慈哀恤物之心君子之所病也故哀亦至焉言在已有以自樂而於天下有所不忘也易曰知至至之可與幾也君子之於道於其所當至者隨而至焉當其所感而其所當應者隨之而至此聖功也志至而詩不至則情有所感而喜怒哀樂失其和也詩至而禮不至則為情所勝而無節矣禮至而樂不至則久而厭矣樂至而哀不至則不仁矣故此五者必有以致之而後可也是功也治心於屋漏之際致謹於杳冥之中雖明目傾耳不可得而見聞也馬氏曰五至者治己之事也治己莫如志故以志為先在心為志發言為詩故志之所至詩亦至焉興於詩則可與言言而履之禮也故禮亦至焉立於禮則可以行行而樂之樂也故樂亦至焉治己至於樂則治之至也治己之至則人所憂不可不憂故樂之所至哀亦至焉哀者有出而與民同患之意也哀樂相生自然之勢也哀樂相生妙道也妙之道則以聲色求之其意愈逺矣志氣充於中則其精神與天地往來而俯仰之間無所愧怍故曰志氣塞乎天地此之謂五至山隂陸氏曰興於詩立於禮成於樂漸次之序若此五至言頓至也一事妙五事俱妙慶源輔氏曰詩之所言止乎禮義故曰詩之所至禮亦至焉言之不足則繼之以咏歌舞蹈故曰禮之所至樂亦至焉樂極則哀喜必有怒故曰樂之所至哀亦至焉自心之所發而至於哀樂相生其理雖洋洋然如在其上如在其左右然非耳目可得而見聞也雖非耳目可得而見聞而志氣則充塞乎天地此又指其體而言之也慈湖楊氏曰何謂至人皆有心心即志志即至無所復至倐然而思思無所起思而又思思無所止人自以為止所止者何所厥思亦何物執之而無得視之而無睹由志而為詩詩亦然也蓋發於禮儀禮亦然也於是乎樂生不知手之舞足之蹈則樂亦然也人情豈能終月樂終年樂亦有哀焉有所惻焉則哀有所傷焉則哀或哀焉或樂焉哀樂相生其變萬狀於戲至哉孔子曰此雖使正明目而視之不可得而見也傾耳而聽之不可得而聞也哀雖至於哭顔淵慟矣而不自知樂雖至於孟子喜而不寐亦不可見不可聞也哀樂必有物非不可見也哭笑必有聲非不可聞也而聖人斷然曰不可見不可聞衆人之哀樂皆不可見不可聞也而衆人自以為可見可聞也哀與樂名也聞與見亦名也惑其名者失其實也志即詩詩即禮禮即樂樂即哀志氣即天地謂之充塞非過論也謂天地合德可也謂範圍天地可也其曰充塞乃因人心狹固井蛙不可以驟語海姑為是言也詩與禮與樂類也忽繼之以哀何也深明夫一體無二縱而言之錯而論之無不可者又曰孔子曰樂之所至哀亦至焉未有相生之言也而亦曰至者何耶至即不可見不可聞彼惟不知可見即不可見可聞即不可聞故棄粗而求精棄一而求二金華應氏曰五至三無其目雖多不出禮樂二者而已其曰哀者蓋禮樂之充積而樂易不忍之心惻然自生而五至所謂志與詩者特其感發之始而可以遡禮樂之原耳其機交相貫通而觸之則應謂之至者蓋周流乎精神之運者也其本極為深潛而索之無有謂之無者蓋超乎形迹之表者也子夏曰五至既得而聞之矣敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰三無既得略而聞之矣敢問何詩近之孔子曰夙夜其命宥密無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匍匐救之無服之喪也鄭氏曰子夏於意未察求其類於詩詩長人情也詩讀其為基基謀也密靜也言君夙夜謀為政教以安民則民樂之此非有鍾鼓之聲也逮逮安和之貌也言君之威儀安和逮逮然則民效之此非有升降揖讓之禮也救之賙恤之言君於民有喪有以賙恤之則民效之此非有衰絰之服孔氏曰此一節子夏問三無夫子答以三無子夏更問何詩近之夫子答以所近之詩以開子夏之意此三者皆謂行之在心外無形狀故稱無也夙夜其命宥密此周頌昊天有成命之篇夙早也夜暮也基始也命信也宥寬也言文武早暮始信順天命行寬𢎞仁靜之化今此以基為謀謂早夜謀為政教於國民得寬和寧靜故喜樂之威儀逮逮此邶風柏舟刺衛莊公之詩言仁人不遇其威儀安和不可選數凡民有喪此詩弼風谷風之篇婦人怨夫棄薄之辭言凡人之家有喪此記謂人君橫渠張氏曰禮非止著見於外亦有無體之禮蓋禮之原在心藍田吕氏曰先儒謂此三者皆行之在心外無形狀故稱無也蓋樂必有聲其無聲者非樂之器乃樂之道也禮必有體其無體者非禮之文乃禮之本也喪必有服其無服者非喪之事乃喪之理也則此三者行之在心外無形狀可知也無聲之樂和之至者也無體之禮敬之至者也無服之喪哀之至者也子夏雖聞此言而未深通以詩人之道長於人情故問何詩近之蓋欲通其倫類也夙夜基命宥密命者君之所出以施于臣民也基者謀始也宥者廣容也密者精察也文武之王基命宥密夙夜不息樂之者也此近於無聲之樂也威儀逮逮不可選也逮本作棣言其威儀富而間習如棣之華萼光輝相逮不可選擇皆盡善也此於五禮初無定體是謂無體之禮也凡民有喪匍匐救之其於喪者初無正服是之謂無服之喪也長樂陳氏曰夫有聲之樂有體之禮有服之喪文也無聲之樂無體之禮無服之喪情也有其文未必盡其情有其情無所事乎文此三無之所以為天下貴也蓋宥則寬而不迫密則靜而不發寬而不迫則無憂靜而不發則常樂此其所以為無聲之樂也威儀之可畏可象則不離於有體至於逮逮而不可選則歸於無體此其所以為無體之禮也凡民於己則無服匍匐救之則為喪此其所以為無服之喪也嚴陵方氏曰宥則寬以致和密則深而能靜威則有威可畏儀則有儀可象夫寬以致和所以為樂也然深而能靜則為無聲焉威儀逮逮所以為禮也然不可選則為無體焉匍匐救之所以為喪也然凡民而已則為無服焉夫三無之道豈止是哉詩之所言亦近之而已且聲固足以為樂矣然所以為樂者不在乎聲體固足以為禮矣然所以為禮者不在乎體服固足以為喪矣然所以為喪者不在乎服此三無所以為道之貴也莊子曰鐘鼓之音羽旄之容樂之末也禮法度數形名此詳治之末也哭泣衰絰隆殺之服哀之末也古之人未嘗不以無為本以有為末焉以威儀無可擇故曰不可選也馬氏曰三無者所以治人無聲之樂和也無體之禮中也無服之喪哀也夙夜基命宥密則和之至也而未始有聲威則可畏儀則可象威儀發於己乃其德之隅也以威儀之多所以為無體之禮也凡禮之所謂體者亦見於形名度數之間而已匍匐救之者哀之至也而未嘗有服故謂之無服之喪也山隂陸氏曰孔子言無異乎老子所謂無也故曰無聲之樂無體之禮無服之喪此之謂三無於此言略而聞之蓋商未喻也是以問其象類於詩至意難喻言有不能盡則所謂夙夜基命宥密無聲之樂也引之以况至意而己非以喻無聲之樂盡於此也無體之禮無服之喪倣此變基言其基之矣故能其之也紂曰我生不有命在天異是矣以逮易棣者棣逮也廣安遊氏曰文王夙夜基周家之命於寬廣靜密之地此陟降在帝左右與天為徒之時也與天為徒天下之樂孰大於此非無聲之樂耶禮不在升降揖讓之間而在和而不可選擇之際非無體之禮耶凡民有喪匍匐救之言其慈哀以仁存心也仁存於心之精微之地非無服之喪耶慶源輔氏曰古人所引詩各以其意之所取而言之蓋不必同也讀者各隨其事以觀之而不以辭害意焉則得之夙夜其命宥密則無時而不和威儀逮逮不可選則無動而不節凡民有喪匍匐救之則哀不必見於服也慈湖楊氏曰樂未嘗無聲必曰無聲非無聲也即聲也禮未嘗無體必曰無體非無體也即體也喪未嘗無服必曰無服非無服也即服也唯人徒執其聲故曰無聲徒執其體故曰無體徒執其服故曰無服無聲天下之至實也而徇名與聲者惑之聖人曰無聲所以破學者牢不可破之定見也非以無聲為定論也又慮學者無從而求之使窮其本始得其始則得其終矣曰基命所以原始也無聲之樂日聞四方果日聞四方矣無聲即聲無體即體無服即服無本末無精粗威儀實無體其曰不可選也是誠不可選也凡民有喪匍匐救之是固無服之喪也即齊斬功緦之道也於父斬衰於母齊衰兄弟期降而功緦哀誠有等差皆一心為之也即匍匐救喪之心以喪其親則為齊斬為劈踊為毁瘠一也非人之所為也天也天即人人即天地即日月即四時即鬼神即禮樂之原原無所本亦無所末本末之名因人心而生本末之實不可以人心而異子夏曰言則大矣美矣盛矣言盡於此而已乎孔子曰何為其然也君子之服之也猶有五起焉子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪內恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志既從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純德孔明無聲之樂氣志既起無體之禮施及四海無服之喪施于孫子鄭氏曰言盡於此乎意以為説未盡也服猶習也君子習讀此詩起此之義其説有五也不違者民不違君之氣志也孔甚也施易也從順也畜孝也使萬邦之民競為孝也就成也將大也使民之效禮日有所成至月則大矣起猶行也孔氏曰此一節子夏既聞三無意以説義未盡孔子更為説三無猶有五種起發之事何為其然然猶如是言何為如是盡也言其義猶未盡此以下五節從輕以漸至於重初言不違民但不違君之氣志而已二云氣志既得者言君之氣志得於下三云既從民所從也四云日聞四方及於逺也五云既起是興起也是從微至著初時威儀遲遲但舒遲而已二則翼翼而恭敬三則上下和同無不從也四則日就月將漸興進也五則施及四海所及逺也初則內恕孔悲謂親族之內悲哀其處近也二則施及四國所被逺三則以畜萬邦皆為孝也四則純德孔明益甚也五則施于孫子垂後世也藍田吕氏曰子曰起豫者商也始可與言詩已矣謂能起其意也君子服習近於三無之詩能起其意者猶有五焉則所言固未盡也無聲之樂在於氣志無體之禮在於威儀氣志與物不違則固樂矣於理既得則尤樂矣於道既合則愈樂矣然則雖曰無聲日聞四方矣是故天下樂之氣志既起也威儀和而緩則無急迫之態矣敬而肅則無怠慢之容矣上下同和則無乖異之變矣然則雖曰無體而小者日就大者月將矣是故一人行之施及四海也若夫無服之喪本由內恕孔悲則視人之喪猶己之喪也既推是心施及四國必由是道以畜萬邦厥今純德孔明其後施于孫子此仁之至也氣之既充威儀既備而篤於仁然後三無五起之義可得而盡矣嚴陵方氏曰大言光輝于外美言充實于內盛言無以有加盡言無有餘藴起言有加而無已無聲之樂始以氣志不違者言內無所戾也故繼之以氣志既得得之於身則人從之故繼之氣志既從人從之則聲聞於外故繼以日聞四方日聞不已則方興而未艾故繼以氣志既起無體之禮始以威儀遲遲者言緩而不迫也緩或失之怠故繼之威儀翼翼威儀得中則無乖離之心故繼以上下和同人無乖離則久而愈大故繼以日就月將久而愈大則不特施于近又可以及逺故終以施及四海無服之喪始之以內恕孔悲言以其仁存心也仁者愛人故繼之以施及四國以仁及人則所養者衆故繼之以畜萬邦所養者衆則其德發揚於外故繼之以純德孔明德既發揚于外則澤足以被後世矣故終之以施于孫子馬氏曰氣志不違志與氣交養於中而無所逆不違未至於既得得者得中也既得未至於既從從者橫心之所念而無所拂也由不違至於既從則實成於己未見其名聞於人故繼之以日聞四方四方者有所聞而已未見其有所行故卒之以氣志既起樂其有以發於外也無體之禮威儀遲遲言其舒而可愛也威儀翼翼言其敬也上下和同則愛與敬兩得之無服之喪始於內恕孔悲所謂視民如傷也內恕孔悲則哀在於心而未形於外故繼之以施及四國繼之以畜萬邦由內恕孔悲至於以畜萬邦則其德明於天下故繼之以純德孔明至於純德孔明德及於當世而己未見其澤流於後世也故卒之以施于孫子凡此皆先後淺深之序也樂由中出故無聲之樂以志氣為先禮自外作故無體之禮以威儀為先哀則生於心也故無服之喪以內恕為先山隂陸氏曰猶有五起孔子之言所以進商也董仲舒曰勉強行道則德日起而大有功不違非所謂德既得在我而已既從有在彼者也日聞四方又非特既從而已氣志既起至矣詩曰如日之升如月之恆不騫不崩此之謂也內恕孔悲主近以言施及四國四國逺矣以畜萬邦萬邦又逺矣純德孔明逺而不純純而無以垂後尚非其至也能莊而不能同能同而不能和非成德也日就月將言雖如上所謂猶不己也施及四海至矣是之謂五起他倣此無聲之樂無體之禮無服之喪無所不在故氣志既得亦是氣志既從亦是威儀遲遲亦是威儀翼翼亦是內恕孔悲亦是純德孔明亦是故曰道烏乎在曰無所不在石林葉氏曰樂以志為體以氣為用志與氣不相違然後得於心則氣志從矣氣從志則有主於內日聞四方則有動於外動於外則人之志氣起此所以為樂之終禮之緩則遲遲速則翼翼緩速既得其節則上下和而無間無間則日就月將而不已則施及四海矣所以為禮之終也喪以仁為主內恕孔悲則仁愛具於中仁及則其德明而可施於無窮故施于孫子所以為喪之終也延平周氏曰無聲之中獨有樂焉至樂也無體之中獨有敬焉至敬也無喪之中獨有哀焉至哀也至樂不離乎氣志而氣志既起者至樂之終也至敬不離乎威儀而施及四海者至敬之終也至哀不離乎內恕而施于孫子者至哀之終也慶源輔氏曰子夏因詩以識其意故贊其言之盛大如此雖然義理無窮不敢以為盡也故為疑端以發夫子之言然則商可與言詩蓋不特見於禮後之問前所云是其大槩耳咏歌其詩可以識其體矣然服而行之則其次第興起又有五焉此所言是也氣志不違則持其志無暴其氣矣氣志既得則志帥氣而氣充乎體矣氣志既從則養而無害日聞四方則塞乎天地之間矣氣志既起則配義與道無是餒也合乎沖漠之氣象矣厯是五起則知夙夜其命宥密之詩真足以為無聲之樂矣威儀遲遲則間習而不迫也威儀翼翼則敏給而不惰也上下和同則效乃見於外日就月將則理益進於中施及四海則四達而不悖矣厯是五起則知威儀棣棣不可選也之詩真足以為無體之禮矣內恕孔悲則惻隱之生於心也施及四國則仁心之達於外也以畜萬邦則達於外者益廣而有以成物矣純德孔明則存于內者益大而充實光輝矣施于孫子則純亦不已萬古一息而不可以限量言矣厯是五起則知凡民有喪匍匐救之之詩真足以為無服之喪矣慈湖楊氏曰子夏聞三無之論曰言則大矣美矣盛矣言盡於此而已乎是子夏未領吾聖人之旨也聖人之旨非美盛所可得而言也亦非言所可得而盡也故孔子又啓之曰君子之服之也又有五起焉服而念之暢而明之五起非有五者之不同也縱而言之錯而論之無不可者無聲之樂氣志不違氣志即樂匪異匪違無體之禮威儀遲遲威儀遲遲不可度思無服之喪內恕孔悲其恕其悲孰得而知無聲之樂氣志既得得匪有得亦匪無得無體之禮威儀翼翼威儀翼翼順帝之則無服之喪施及四國三者一旨三者一德無聲之樂氣志既從何異何同昭明渾融無體之禮上下和同此敬此恭何所不通無服之喪以畜萬邦有安無危有福無殃無聲之樂日聞四方人皆聞之而曰不知無體之禮日就月將不勉不強從容有常無服之喪純德孔明皓皓精白禮樂同情無聲之樂氣志既起斯起即止變化不已無體之禮施及四海此道大通無逺弗屆無服之喪施于孫子禮亦如此樂亦如此三王之德如此天地之德日月之明如此子夏曰三王之德參於天地敢問何如斯可謂參於天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私其在詩曰帝命不違至于湯齊湯降不遲聖敬日齊昭假遲遲上帝是祇帝命式于九圍是湯之德也鄭氏曰三王謂禹湯文王也參天地者其德與天地為三也勞勞來也帝天帝也詩讀湯齊為湯躋躋升也降下也齊莊也昭明也假至也祇敬也式用也九圍九州之界也此詩云殷之先君其為政不違天之命至於湯升為君又下天之政教甚疾其聖敬日莊嚴其明道至於民遲遲然安和天是用敬之命之用事于九州謂使王也是湯之德者是湯奉天無私之德也孔氏曰自此至大王之德一節子夏問三王之德參天地夫子答以三無私之事并明湯及文武三代大王之德詩商頌長發之篇美成湯之辭詩之本注言天帝命此殷家世世行之不違至於成湯乃與天心齊湯降下賢士能速疾不遲昭假假暇也湯以昭明寬暇天下之士心遲遲然舒緩天於是敬愛之命之用事於九州為天子也此記注意與詩注稍殊藍田吕氏曰德可為民父母固已至矣又進而大之則參於天地其道若在無私而已矣天無私覆地無私載日月無私照奉斯三者以勞天下則是其德與天地參矣是故王道莫大於無私也先儒讀至于湯齊為躋詩本如字又讀聖敬日齊為齊詩本作躋當以本文為正帝之命殷不相違戾以至于湯而皆齊一湯之屈己下士敏疾不遲故其聖敬日以升進然其昭顯假至于天未嘗汲汲然凡以致天命而已是故天命用事于九圍也湯之德如此所以能參於天地也嚴陵方氏曰彼兩而我三之之謂參天立乎上地立乎下人則立乎中所謂參天地者如斯而已曰三王之德又以見非其德則不足以有所立也且立德以居體固已能參之矣至於興事以致用又有在乎奉之焉天地者隂陽之體日月者隂陽之用方其參之以居體則止以天地為言及其奉之以致用故兼之以日月也其曰以勞天下則其為致用可知矣子路問政子曰先之勞之又曰愛之能勿勞乎皆勞天下之謂也且以力營事曰勞勞天下所以營事而造業也曰勞天下則與在宥天下者固有間矣夫天之運轉地之生育日月之升降變化不停可謂勞矣為天下者得不奉此三者以勞之乎雖然勞之而已苟有私焉人得無怨乎故其所奉者主於無私也天之髙也凡在下者無不覆故曰無私覆地之厚也凡在上者無不載故曰無私載日月之明也凡容光者無不照故曰無私照詩之所言是湯奉天無私之德也而不及地與日月者舉大以該之也言湯而不及禹與文武者舉中以該之也石林葉氏曰所謂參者即易之所謂合也德合於天地則其明必合於日月故曰奉三無私以勞天下帝命不違先天者也至于湯齊後天者也湯降不遲下人者也聖敬日躋人尊之也惟其下人而人尊之故昭假遲遲惟其先天而不違也故上帝是祇則命式之以九圍亦順乎人也馬氏曰聖人無私故能成其私慶源輔氏曰勤勞於天下無私之大者也禹之治水湯武之征伐又勤勞之大者也無私之理一而已而見於致用者不同廣言之者欲體之者之易也止於三者以是三者顯而易知也詩之言湯其義廣也今取以證奉三無私以勞天下如此然後可謂不以文害辭不以辭害意下所引詩皆同山隂陸氏曰帝命不違至于湯齊正湯之詩也故曰是湯之德也嵩髙惟嶽峻極于天非文武之詩也故曰此文武之德也弛其文德洽此四國非太王之詩也然太王於此猶有未優故曰太王之德也三代之德倣此蓋言三代則非禹湯文武金華應氏曰商詩言先世積德之盛帝命相應而不違至于湯而氣數適與之齊故湯生於此時而不遲也降猶自天而降也湯雖應運不遲而惟急於日新之德其昭著感假遲遲不迫惟帝是敬故帝命之以為法於天下也是其奉天而無私心也天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也鄭氏曰言天之施化收殺地之載生萬物此非有所私也無非教者皆人君所當奉行以為政教孔氏曰此經論天地無私聖人則之以為教風霆霆雷也地以神氣風雷之等流布其形衆物感此神氣風霆露見而生神氣風霆天地共有但氣從地出又風著於土雷出於地故偏繫於地春秋冬夏是天之神氣也橫渠張氏曰窮理乃所以為學也舉一物皆有所從來無非自大原中出常存諸心與已一本故可以盡性命之理孔子謂天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也夫天地變化昭昭示人於覆載之間人莫不見之然未有能窮其理安於不知冥冥以死謂之教者使之感發開悟人也但其理儘有易學雖不可卒然亟盡姑熟玩衆理驗之以聞見會歸既久一日沛然左右逢原必心得而後已故窮神知化為德之盛天道至教凡見於造化者皆糟粳然無非教者藍田吕氏曰此衍神氣風霆四字蓋天有四時運行於上地載神氣動作於下春夏秋冬風雨霜露所以釋天有四時也風霆流形庶物露生所以釋地載神氣也衍此四字可知也春秋執生殺之機冬夏極隂陽之用風雨霜露施于庶物者皆可取法無非教也風之動蕩霆之震耀流形于下化育庶物使皆呈露發生者亦可取法無非教也然風霆猶風雨皆神氣也降於天載於地以成化育者也獨於地言之則以流形而可見也慈湖楊氏曰天有四時春秋冬夏風雨霜露寂然渾然其教我也昭然自地而上莫非神氣神氣之可指者如風霆風霆作而芽甲形庶物露生寂然渾然其教我也昭然其在我也為百骸九竅為視聽言動為氣志嗜欲寂然渾然又何其清明又何其如神也即人即神姑曰如神何以驗其神宣王未出而臨涖天下也而嶽先降神生甫及申何為其神至於此道通為一其心甚神子思曰大哉聖人之道洋洋乎發育萬物萬物聖人實發育之也天者宣王之髙明地者宣王之博厚山川宣王之流峙雲雷風雨宣王之震動散潤嵩嶽宣王之嵩嶽申甫宣王之申甫在古不為先在今不為後渾然寂然昭然不澄治而常清不思慮而常明嚴陵方氏曰天以氣運乎上故其教以四時為主地以形成乎下故其教以庶物為主言天之四時則其序先於風雨霜露者四時以風雨霜露為之用故也言地之庶物則其序後於神氣風霆者庶物以神氣風霆為之體故也且四時之在天一往一來莫不有先後之序盈虛之數庶物之在地一動一植莫不有小大之别多少之分則聖人之設教豈能舍是哉故曰無非教也神氣者天氣也及其下降而得地載之故曰地載神氣神氣散而為風薄而為霆故曰神氣風霆風霆流行而成形故曰風霆流形形成而後物生可見故曰庶物露生夫風之行也植物之甲者莫不拆霆之震也動物之蟄者莫不蘇則庶物露生於此可見矣若雨露莫不物資以生然止以風霆言之者以風霆無方而莫測尤為氣之神故也易曰鼓之舞之以盡神楊子曰鼓舞萬物其雷風乎蓋以是也馬氏曰天主於施而春秋冬夏風雨霜露所以施也地主於生而神氣風霆風霆流形庶物露生所以生也所以為教在其中慶源輔氏曰天地之間物各有理人能體之皆有得於己是又不特奉三無私而已凡四時六子昆蟲草木無非教也又反而求之於一身清明在躬氣志如神嗜欲將至有開必先則是理固存於我矣蓋有不必求之於外者天降時雨山川出雲此又明是理所在天地人物無異致也故引嵩髙之詩以證之十亂之生豈非天地之所以賚文武者乎故曰周有大賚善人是富金華應氏曰是篇論禮樂之原至深至逺而實以志氣為之主始言塞乎天地末言志氣如神則充養之妙而無間也孟子所謂以直養而無害則塞乎天地之間者也其中論五起而反覆以志氣為言蓋持養用功者不一而足也孟子所謂持其志無暴其氣者也夫子發其端而未究孟子闡其祕而無餘其原流深哉清明在躬氣志如神耆欲將至有開必先天降時雨山川出雲其在詩曰嵩髙惟嶽峻極于天惟嶽降神生甫及申惟申及甫惟周之翰四國于蕃四方于宣此文武之德也鄭氏曰清明在躬氣志如神謂聖人也嗜欲將至謂其王天下之期將至也神有以開之必先為之生賢知之輔佐若天將降時雨山川為之先出雲矣峻髙大也翰幹也言周道將興五嶽為之生賢輔佐仲山甫及申伯為周之幹臣天下之蕃衛宣德于四方以成其王功此文武之德也是文王武王奉無私之德此宣王詩也文武之時其德如此而詩無以言之取類以明之孔氏曰此一節明周文武之德言清靜顯著之德在身氣志變化妙如神也詩大雅嵩髙之篇嵩然而髙惟是五嶽其形峻至於天降此神靈和氣而生甫侯及申伯也文武所得賢臣唯為四方蕃屏及四方宣揚威德不私為己是奉天無私之德也案詩甫侯謂吕侯也穆王時訓夏贖刑與申伯俱出伯夷之後掌嶽祀有功故嶽神輔助宣王為生申甫又詩蒸民稱仲山甫之賢與嵩髙生甫及申全别蓋此鄭注在前故以甫為仲山甫在後箋詩始得毛傳知甫侯申伯同出伯夷故與禮别也橫渠張氏曰清明在躬氣志如神此言聖人也耆欲猶言祥福也雨之將作山川須出雲蓋一氣耳藍田吕氏曰清而明者天之德也以天德在躬故氣志如神孟子曰中天下而立定四海之民君子樂之所謂耆欲將至則有開於興王必先以生賢有開於興王譬猶天降時雨也必先以生賢譬猶山川出雲也嵩髙者生賢之詩也宣王中興之王也申甫間生之賢也故能為周翰以蕃于四國宣于四方也文武之德如此無詩以言之故取類以明義也嚴陵方氏曰有清德在躬不為物所撓則其氣如神矣有明德在躬不為物所蔽則其志如神矣耆言外之所耆欲言內之所欲謂所願之事也將至謂有所由來之漸也其來也必有以開其端而為之兆焉故曰有開必先馬氏曰清明在躬氣志如神則其養於中者妙矣養於中者妙必有徵於外故耆欲將至有開必先天降時雨山川出雲所以徵於外也此宣王之詩而言文武之德者蓋説詩者不以文害辭不以辭害意以意逆志是為得之石林葉氏曰清明在躬則志所向氣所適其驗於外者如神也以其如神故耆欲將至有開必先中庸曰見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神誠之至則亦虛一而靜耆欲將至而先動乎四體者人也雨降而先出乎雲者天也國家將興而五嶽必生輔助者天人之相應也然以申甫為文武之德則先王慶澤之深後世子孫其逢吉歟眉山蘇氏曰天德清明而記曰清明在躬則知吾之所存亦天德也可不知自重哉新安朱氏曰耆欲將至有開必先家語作有物將至其兆必先此語却是切疑有物訛為耆欲其兆訛為有開新定邵氏曰嗜欲二字古人以明可願之事不特孔子間居言之也祭統載衛孔悝鼎銘亦曰乃考文叔興舊耆欲延平周氏曰申甫之所以生者以宣王也而必曰文武之德者蓋宣王之所以中興者以文武也廣安遊氏曰聖人能致五至而行三無志正而氣從其身湛然清明故志氣如神與天地相似心之嗜欲將至於己則己必先知之若有開之者為之先也如天降時雨山川先為之出雲也記曰至誠之道可以前知又曰至誠如神與此同意且天地隂陽剛柔之氣其行於天地之間皆其所當然者何從而至哉蓋其理生於至無而達於萬有起於杳冥而著於昭昭聖人之道能用力於杳冥之中故其所成就與天地相似至如此也天人之道不相合則其事若不相及聖人與天地相似則與天為謀所謂甫侯申伯周之賢佐實猶嶽之降神而生此言其與天通此雖宣王之詩然申甫皆四嶽之後受封於文武之時世有賢材以佐周故當宣王之時甫申皆為周之翰孔子推本其所自蓋由文武積德感召而然也臨卬魏氏曰孔子間居之篇不知孰為之而其言天地之神為風雨霜露為風霆流形凡示人於覆載間者無非至教此義之至精者也繼之曰清明在躬氣志如神又舉詩以明之曰維嶽降神生甫及申終之曰此文武之德也蓋自天地山川之神氣鍾而為人是心清明與宇宙之流行發見者實同一原又推本而求之有如甫申之生乃由十世而上文武二王積德所感嗚呼人之此心與天地山川相為流通固也而人物之生又係乎時數清明之感山川英靈之會祖宗德澤之積是豈數數然哉真有以關盛衰之運當消長之數矣三代之王也必先其令聞詩云明明天子令聞不已三代之德也弛其文德協此四國大王之德也子夏蹶然而起負牆而立曰弟子敢不承乎鄭氏曰令善也言以名德善聞天乃命之王也不已不倦止也弛施也協和也大王文王之祖周道將興始有令聞敢不承乎承奉承不失隊也起負牆者所問竟辟後來者孔氏曰所以王天下者必父祖未王之前先有令聞也以其無私故令聞不已詩並大雅江漢之篇美宣王此記之意明明天子謂三代之王也詩本文弛作矢矢陳也言宣王陳其文德和協四方之國此謂大王施其文德和此四方之國居豳辟狄徙岐山之陽而王業起也藍田吕氏曰奉三無私以勞天下而得賢佐則必有令聞矣先以令聞慰服人心然後可以興王業故三代之王必皆先之也江漢之詩曰明明天子令聞不已矢其文德洽此四國以矢為弛以洽為協聲之轉也此亦宣王之詩而謂明明天子令聞不已為三代之德矢其文德洽此四國為大王之德皆取類言之也此篇始論為民父母之道終論參於天地之德致五至行三無者為民父母之道也奉三無私以勞天下者參於天地之德也然王者必得賢佐有令聞然後可以施為故以嵩髙江漢之詩申言之也嚴陵方氏曰必先其令聞由其有令德故曰三代之德也馬氏曰聲聞過情君子恥之而三代之王必先其令聞者令聞之實有以先之而已此周詩而言三代之德以其先於令聞之意則同也言三代之德而又繼之以大王者蓋周之興本由大王詩曰居岐之陽實始翦商是也大王未始翦商而云爾者詩人推本而言之山隂陸氏曰且嵩髙江漢宣王之詩也今更以為文武大王之德何也其揆一故無二也亦宣王不能如是不足以使周道粲然復興廣安遊氏曰修之於杳冥之中若寂然而無聲及其發達而播聞則令聞不已此言其修之於至隱而發之於至顯三代聖人皆有此學皆有此德故曰三代之德也施其文德協此四國亦宣王之詩而孔子本之太王蓋文德由大王而來也詩書所謂文人皆言周之先祖也所謂文子文孫皆言其子孫也矢其文德言發之於外而粲然可觀也慈湖楊氏曰子夏記先聖之言曰三代之王也必先其令聞先聖殆曰三代之王必令聞先著而後四方歸之于以明盛德之驗非以令聞為先務也先其字豈子夏記録之差耶明明天子令聞不已不已之聞非雨盈溝澮涸可立待之譽是為實德之譽禮記集説卷一百二十
