body:
  text: 禮記集説卷五十九宋衛湜撰禮器第十孔氏曰鄭目録云名為禮器者以其記禮使人成器之義也此於别録屬制度橫渠張氏曰禮運云者語其達也禮器云者語其成也達與成體與用之道也合體與用大人之事備矣又曰禮器不泥於小者則無非禮之禮非義之義蓋大者器則出入小者莫非時中也子夏謂大徳不踰閑小徳出入可也斯之謂爾又曰禮器則大矣修性而非小成也歟運則化矣逹順而樂亦至焉爾嚴陵方氏曰形而上者謂之道形而下者謂之器道運而無名器運而有迹則禮運言道之運禮器言器之用而已道散而為器故繼禮運而後有禮器焉然禮運非不及器以道為主爾禮器非不及道以器為主爾故記者各以所主名篇禮器是故大備大備盛徳也禮釋回増美質措則正施則行其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉故君子有禮則外諧而内無怨故物無不懷仁鬼神饗徳鄭氏曰禮器言使人成器如耒耜之為用也人情以為田修禮以耕之是也大備自耕至於食之而肥釋猶去也回邪辟也質猶性也措置也箭篠也端本也竹箭松柏四物於天地最得氣之本或柔刃於外或和澤於内用此不變傷也人之得禮亦猶然也外諧内無怨人協服也懷歸也孔氏曰此一節論禮能使人成器則於外物無不備置禮在身則身正以禮施事則事行竹大竹也筠是竹外青皮人之徳備由於有禮如竹箭四時葱翠由外有筠也人經夷險不變其徳由禮使然如松柏陵寒鬰茂由内心貞和也二者竹松也註云四者析别言之貫經也外諧内無怨者言君子内外俱美外柔刃如筠故於外與人諧和内和澤如松心故於内無怨外内協服物無不悉歸於仁鬼神聦明正直依人而行物既懷仁故神亦饗徳也橫渠張氏曰禮器言禮大體完備若成器然措則正者言不動思慮放下無事時亦不失於正施則行是利用也必大備乃利用禮器者亦是成章也不成章則有窒礙不達處禮未器則亦有不達處釋回増美質此閑邪而存其誠也措則正則是増美質也施則行則是釋回也竹箭有筠松柏有心舉内外也表裏要禮二者居天下之大端内外可以言端也無本不立無文不行外諧而内無怨大備則外諧不愧則内無怨以禮成徳故曰盛徳措則正謂未行者皆正施之則行此語能推之則大徳敦化小徳川流所過者化所存者神博學於文約之以禮所居而安旁行而不流皆是義也嚴陵方氏曰凡有形名分守者皆禮之器薄於徳於禮虛非徳之盛且不足以制大備之禮故曰大備盛徳也人稟五行之秀氣則其質未始不美也然或不美者蔽於回邪以損之爾故釋回然後可以増美質也然禮之於人豈能予之以其所無哉亦因其所有以増之爾故於美質言増焉貫者貫四時之變如一也此所以與衆草木異也竹箭松柏柯非不改也所謂不改者不能改其性之剛爾葉非不易也所謂不易者不能易其色之茂爾長樂陳氏曰禮之文散於形名度數之間而其情莫非性命道徳之理故器之圜者所以象天器之方者所以象地至於髙下曲直洪纎多寡之變蓋皆如此而已此其所以為大備而大備盛徳也又曰徳性不尊不足以道問學邪不閑不足以存其誠禮之釋回所以尊徳性而閑邪也増美質所以道問學而存誠也司徒以五禮防民之偽而後教之中與此同意夫回旣釋矣美質既増矣故所措則正所施則行蓋以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序凡此所謂措則正也言忠信行篤敬雖蠻貊之邦行矣而况州里乎凡此所謂施則行也恭以應外故如竹箭之有筠敬以直内故如松柏之有心竹箭松柏之有筠有心故貫四時而不改柯易葉君子以其有恭有敬故厯夷險而不改其節荀子曰嵗不寒無以知松柏事不難無以見君子此之謂也外諧則不失人内無怨則不失己物之所附者愛鬼神之所好者直此於物所以言懐仁而鬼神所以言饗徳物懐之於明然後鬼神饗之於幽故書言民罔常懷懷于有仁鬼神無常享享于克誠與此同意馬氏曰先王以人情為田以禮義為器禮所以治人器所以治田故言器以人情為田始於修禮以耕之陳義以種之以至播樂而逹於順則無所不備也故曰大備備者順也無所不順者之謂備故曰大備盛徳也回者偽之自外入者也美質者誠之由中出者也禮所以去偽故在回則釋之禮所以著誠故在質則増之以措則正致之以治己者也以施則行施之以治人者也竹箭之有筠言其和澤於外也松柏之有心言其堅實於内也故為天下之大端而禮者亦人道之大端也堅實於内者猶言實以君子之徳也和澤於外者猶言文以君子之容也禮所以理萬物故物無不懷仁所以順鬼神故鬼神饗徳延平周氏曰禮有情有文有器而於禮之器則情與文已自具矣蓋其為器而不過度數之間者文也其所以為器而莫非性命之理者情也先王有仁義為禮之實而又有禮之器是故大備大備盛徳也君子有禮則其接人也外諧而其處己也内無怨外諧即所謂和而不流内無怨即所謂正己而不求於人此所謂在明者懷仁而在幽者饗徳山隂陸氏曰禮釋回者子游曰禮也者領惡而全好者與青出於藍而青於藍冰水為之而寒於水是之謂増如竹箭之有筠如松柏之有心養其内不養其外非禮也養其外不養其内亦非禮也虙氏曰禮自外作而還以制乎外故外諧禮本人心而還以節乎内故内無怨外諧所以接乎人若所謂其成也懌恭敬而温文是已内無怨所以處乎己若所謂仰不愧於天俯不怍於人是己言外諧則知所謂内和言内無怨則知所謂外無爭故言内和而外順則民瞻其顔色而弗與爭也講義曰禮本於大一因禮以成其器者為禮之器所以為大備者謂動容周旋中禮非盛徳者不能為也故曰禮器是故大備大備盛徳也夫竹與箭之有筠如詩所謂菉竹青青松與柏之有心如語所謂松柏之後彫者竹箭有筠而不變松柏有心而堅剛皆其本有所受而然也人之得禮則無徃而不得其冝如竹箭松柏通貫四時而不改柯葉非若草木之形榮於春夏而悴於秋冬也龍泉葉氏曰故莫重於禮者謂其達於器而已矣議道失先後之倫不知夫禮者固無以達於器也故或離禮於器而獨立或合禮於器而大備自周衰而其倫始然夫上廟朝而下閭井尊君父而卑臣僕其間局於器數之差切於人生之用至多而不可算矣是雖道徳仁義信知有不能逹也惟禮能達之故天下之治散於衆器而器之緫要聚見於禮昔之聖人所以操為多寡而人莫敢測制為豐殺而人莫敢校者以其禮之存也人之所以覩其物而能名之由其塗而能安之徒以重車旗器服采章之異嫌疑近似有若毫釐之微而能出死力以奉之者亦以其禮之存也禮畢達於器而人皆入於禮此堯舜三代之所以行實治施實徳民實可以化俗實可以成而號為極盛太平者也聖王不作諸侯放恣衆器渙然失本統矣孔氏深考其故悲其將遂至於淪陷溺没而不可救止也故凡當世之記於遺老執於掌故藏於有司逸而在於夷狄者拳拳焉無不講求而辯正之質其遺制追其舊法然後信周公之典文武成康之道彬彬如也蓋於是時師心而遺物學焉而不盡者固已有離禮於器而可以獨立於世矣及見夫子以眇然之士而其身之所履心之所通議論之所及乃如親在文武周公制作之時登下揖讓之容哀樂之次器物之委曲品節等差無所不當而其徒又頗相與推明究悉其説於是論者又以為當合禮於器而後大備大備而後爲盛徳蓋其意曰器之離不如其合云爾凡今記禮之所傳是也是非器無以安人非禮無以逹器非聖人無以明禮不若是則無以爲堯舜三代之治豈論其合不合哉又曰私欲頗僻𤼵於流佚不制之情其與是物相合則綢繆轇轕自爲城府各成穴根險奥透遺而不可尋詰此所謂回也其於道也人之所含容則或覆藏而矯肆義之所裁正則或摧折而傾敗智之所照燭則或逆見而陵鬭信之所因成則或終遂而不化禮則不然髙與之爲尊下與之爲卑宗廟與之爲嚴燕私與之爲和與之周旋而同其作止神舒也有挽而卷縮之脱易也有強而藩飾之使之隂自消弭而後止如冰之於水春風之被物所謂釋回也如其本愿慤也本好直也本安雅而不陋也本莊敬而不傲也則是禮之所加猶玉之山龍其文猶素之藻繢其章也豈不煥乎其愈明哉所謂増美質也有器於此左傾而右側髙軒而下輊車不輗舟不楫户不樞矢不機弛然而莫之用也人之於事物有甚焉所以措則正施則行者斯禮也歟夫竹箭之有筠也松柏之有心也與生並生者也若夫禮之於人也可學而至也可勉而校也其所以能聨比衆器貫穿萬物而不亂倫失紀者非固若竹箭松柏之本有而自成而待乎人之爲也外諧内無怨物懷仁鬼神饗徳在學者不息之功爾新安王氏曰運則變而無定體器則定而無常形故二篇相連禮之用猶器也器不備則於用有缺禮不備猶器有缺也故以大備為貴無所不備則謂之盛徳誠以回邪之去美質之益可以正心可以養性置之於身則無有不正用之於事則無不可行盛徳無加於此故取喻於竹箭有筠則外潤松柏有心則中剛二者在萬物中謂之大端端本也物各有本不若竹箭松柏可經厯寒暑柯葉不彫故以爲大端以比才質之美君子有禮故外與物和諧内不藏怨恨美質増益矣推而行之明無人非幽無鬼責終身無患與松柏竹箭不改柯葉者何異焉闕氏曰制器以藏禮因以明徳合而該之以形名度數使人由之而知舉而措之於藻色文物使人習矣而察外足以見其徳之𤼵揚内足以見其徳之淵懿諸侯黼大夫黻而天子則服龍衮諸侯以象大夫以魚湏而天子則搢球玉尊則或用棜或用禁而不敢面冠則或以綦或以丹而不敢朱一獻之爵以至五獻三尺之堂以至九尺鼎俎而有隂陽簠簋而具天地尊罍不設則天道聖徳不明乎廟堂之上俎豆不陳則主仁賔義不見乎鄉飲之際其一器之用無非法象之所示其法象之所示無非至神之所爲先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行鄭氏曰言必外内具也孔氏曰自此至節矣一節論因上禮使人外内諧和遂云禮湏信義忠者内盡於心也信者外不欺於物也内盡於心故與物無怨外不欺物故與物相諧也禮雖用忠信爲本而又湏義理爲文飾得理合宜是其文也無忠信則禮不立行禮若不合宜得理則禮不行也黃氏曰禮者本爲忠信必取其義理分别故言文者辨别之文也若黒白之閒色俾尊卑升降親䟽去就各辨别於義理則為禮之文也豈為文飾之禮哉横渠張氏曰禮之文逐一各各有意思是所謂義理也學者惟務著心於立本處無本不立無文不行本則與天地同道仁則自生義義之體即是禮故有文是則一本也禮器從無文不行以下其極文也至纎至悉禮運大抵説大德敦化形器外之事禮器大抵説小德川流之事極其詳察長樂陳氏曰存於中者之謂忠見於言者之謂信有忠有信則内有主而能正故曰禮之本處之有經之謂理施之有權之謂義有義有理則外有主而能行故曰禮之文下曰甘受和白受采忠信之人可以學禮此忠信所以為禮之本也孔子去麻冕以従衆則適於義従拜下以違衆則歸於理此義理所以為禮之文也講義曰所謂禮之本者其質也非無文也形見於外者即其文而已矣所謂禮之文者其末也非無本也因其成實者即其本而已矣故先王之立禮也舎是二者亦無以爲禮焉無本不立無文不行不有其本則禮者僞而已矣所謂節文仁義者安在也不有其文則禮者質而已矣所謂恭敬交際者安在也嚴陵方氏曰禮運言禮雖先王未之有可以義起燕居言禮也者理也君子無理不動豈非義理之爲文歟孟子言理義人心之所同然而已此以爲禮之文者彼主於體此主於用故也俞氏曰禮之情文固有内外之辨然必内外合一而後行於其間昔者夫子言之曰禮也者理也反之於心而知其實有是理則謂之忠信形之文爲而悠然當於事物之情則謂之義理捐義理則忠信不能以獨立無忠信則義理不能以自形故忠信者禮之實而義理者忠信之流行𤼵見於外者也吾觀先王之禮本末宏闊制度詳密初非舎人心所有而外爲此以强天下也其辨而爲尊卑上下之等夷其達而爲喪祭射御冠昬朝聘之分藝其周流四出而爲制度文章貨力事爲之纎悉其劑量増損制度可否皆其取裁吾心而揆夫義理所安者行一禮焉隠諸吾心而非其素有質諸義理有不合焉則亦以何爲禮哉或者見禮於内指吾忠信之所存可以獨立隆精義而忘致用伏文貌而尚忠質謂直情徑行抑以致吾心而已施之朝廷無以飾其和敬行之閨門無以飾其和親達之族長鄉里無以飾其和順枝葉剥落根本疲瘁流弊之激亦終於槌提絶滅而已或者知禮之不可廢而又徇外遺内溺意於文爲之末心不能以御形情亦無以稱其貌雖其端冕弁委鳴於曵紱而精神流越邈然與在外者不相應容貌誠藩飾也文理誠隆盛也其中誠何如哉嗚呼前巫後史左賛右詔是亦可以爲禮矣王必中心無爲以守正是故禮之所恃以爲存也祝史之於禮習矣而失其義陳其數主張綱維之道不在是焉故祝史者禮之所存而非禮之所由立也欲立先王之禮惟合内外一體用本之忠信而後達之於義理庶幾其不廢於天下後世也禮也者合於天時設於地財順於鬼神合於人心理萬物者也是故天時有生也地理有宜也人官有能也物曲有利也故天不生地不養君子不以爲禮鬼神弗饗也居山以魚鼈爲禮居澤以鹿豕爲禮君子謂之不知禮鄭氏曰天不生謂非其時物也地不養謂非此地所生也不順其鄉之所有謂之不知禮也孔氏曰此廣説義理爲文之事君子行禮必仰合天時俯㑹地理中趣人事則其禮乃行也合天時即依於四時及豐儉隨時也財物也所設用物爲禮各是其土地之物也鬼神助天地爲化祀之必順不濫逆也雖合天㑹地順於鬼神又湏與人心符合其禮乃行若能事事如上則行葦得所豚魚戴賴是萬物各得其理也天之四時各有所生若春薦韭卵夏薦麥魚是也地之分理各有所冝若髙田冝黍稷下田宜稻麥是也人居其官各有所能若司徒奉牛司馬奉羊及庖人治庖祝治尊俎是也萬物委曲各有所利若麴糵利爲酒醴絲竹利爲琴笙是也天不生謂非時之物若寒𤓰夏橘及李梅冬實之屬地不養若山之魚鼈澤之鹿豕君子不以爲禮是不合人心鬼神弗饗是不順鬼神也嚴陵方氏曰以陽生於子故祀天於冬之日至以隂生於午故祭地於夏之日至以飲養陽氣故饗禘於春以食養隂氣故食嘗於秋此禮所以合於天時者也黍稷之馨足以爲簠簋之實水土之品足以爲籩豆之薦貨無常以示逺物之致幣無方以别土地之宜此禮所以設於地財者也以天之髙故燔柴於壇以地之深故瘞埋於坎以魂氣歸於天故焫蕭以求陽以形魄歸於地故祼鬯以求隂此則禮所以順於鬼神者也以人莫不有男女之别故制爲冠昬之禮以人莫不有君臣之分故制爲朝覲之禮莫不有追逺之心故制爲喪祭之禮莫不有合歡之情故制爲燕饗之禮此則禮所以合於人心者也火田必於昆蟲未蟄之時罻羅必在鳩化爲鷹之後獺祭魚然後虞人入澤梁豺祭獸然後田獵此則禮所以理萬物者也禮本乎天而還以事天出乎人而還以治人則是以天合天以人合人者也故於天人皆曰合地則效法焉故曰設鬼神不可遺也故曰順萬物有成理也故曰理然上言鬼神而下不言者以天地兼之也猶之禮運言山川而下不言者亦以社兼之爾若韭生於春黍生於秋稻生於冬所謂天時有生也山林則宜毛川澤則宜鱗丘陵則宜羽墳衍則宜筴所謂地理有冝也籧篨蒙璆戚施直鎛聾瞶司火瞽矇修聲所謂人官有能也水之潤下火之炎上木之曲直金之從革所謂物曲有利也以天所不生者爲禮則逆天之時矣以地所不養者爲禮則逆地之理矣天時地理之不可逆如此則人官物曲固可知言地所不養之物而不及天所不生者亦舉此以見彼也山隂陸氏曰天時有生也而有不生地理有冝也而有不冝人官有能也而有不能物曲有利也而有不利故下文云云延平周氏曰合於天時而天時有生也設於地財而地理有冝也合於人心而人官有能也理萬物而物曲有利也禮至於曲利萬物而不遺非禮之妙孰能與於此然言順於鬼神合於人之心而止曰人官有能則是特言人之爲成材而不及於鬼神者何也人者鬼神之所依言人則見鬼神矣君子之爲禮順於天地而已矣非天地之所冝而以爲禮者故君子謂之不知禮虙氏曰天時有生則隂陽寒煖之不齊地理有冝則髙下燥濕之不一人官有能則當因任其能而不廢物曲有利則當曲成其利而不遺茍非禮之㑹通孰能與於此哉長樂劉氏曰順四氣以致六饗故合於天時備百物以薦七廟故設於地財或燔或瘞各從其鄉故順於鬼神曲縁其情以致誠敬故合於人心然後天地位隂陽和萬物理故君子謂之不知禮者言禮以致其敬其敬爲本不求物之難得也故順天時之所生宜地理之所養從風土之所能隨物曲之所利汙尊匏爵凷桴土鼓茍竭其誠上帝可饗也俞氏曰夫禮者散於萬事而能制事列於萬物而能辨物故是禮悠然於事物之間雍容委蛇中情順節而天下事物莫或忤焉是無他故也禮也者義理之㑹而閒見雜出於事物之間者亦無非自然之禮也至於據其㑹以理紛錯之變則非禮之所能自爲矣昔者聖人未制禮之初是故未嘗一日亡也列而上者昭昭如也生於地者緫緫如也靈而人羣而物幽而鬼神亦固各有其職於兩間也而其時序之相傾情僞之相陵強弱之相并分聚隠伏之相形者逆見森列絲棼横潰莫能聨比收合還其秩序理固無恙也而天地民物之故常雜揉殽亂莫得其經是理又奚在也聖人者深明人情静見物則因其悠然在事物之理舉其端挈其緒而亂者以治亡者以存焉故作養斂藏不拂乎日月之行則天時固合矣飲食事爲各取乎山陵川澤之有則地財固設矣氣魄升降順乎上下理義悦懌安乎人心順致和平之理昭布融液是故萬物所由得其理也故天時有生而不害其生地理有冝而不悖其冝人官各效其能物曲各致其利是禮之際上蟠下窮髙測深洋洋乎其浩博者始堅凝聚見於天地民物間矣夫聖人因天地以爲禮不爲過禮以拂天地天生地養猶聚之有時用之有節蓋以天地之生有窮人情之流無藝裁制不嚴貽害必廣故牛羞鹿脯饌具有故法焉獸梅鶉蓼和味有冝用焉古聖人取物爲養而不過乎理故心志和平百體順正詩曰亦有和羮既戒既平蓋言禮也若天所不生地所不養求魚於山取鹿於澤豈所以爲禮哉後之人君矢魚徴牢胹熊解黿想其一時動作視流聽荒志氣夸詡豈復顧先王之禮而噬腊遇毒末流生禍瀕於敗亡而不悔悟然後知先王制禮誠不可過禮器之言亦深切著明矣故必舉其定國之數以爲禮之大經禮之大倫以地廣狹禮之薄厚與年之上下是故年雖大殺衆不匡懼則上之制禮也節矣鄭氏曰定國之數謂地物所出多少廣狹謂貢賦之常差上下用年之豐凶也殺謂榖不孰匡猶恐也節言用之有節也孔氏曰此論隨地之所有以制禮禮物必鄉之所有故有國者必書其國内所生物多寡定數以爲國之大法經法也倫猶例也制禮之大例也又冝隨地廣狹爲法即貢賦之常差也禮之薄厚與年之上下者多寡隨年豐荒也廣狹隨地而賦豐凶逐時而歛衆之不恐並由君上制禮有節故也山隂陸氏曰定國之數若州二百一十國是也長樂陳氏曰經言其常倫言其理舉其定國之數則有常故言大經以地廣狹則有理故言大倫夫舉其定國之數以為禮之大經則王制所謂必於嵗之杪五榖皆入然後制國用者是也禮之大倫以地廣狹則王制所謂用地小大是也禮之厚薄與年之上下則王制所謂視年之豐耗是也先王之爲禮節以制則有所裁節以度則有所限故能於財則不傷於民則不害此其所以年雖大殺而衆不匡懼也嚴陵方氏曰王制以三十年之通制國用量入以爲出雖有凶旱水溢民無菜色正謂是也延平周氏曰所謂舉其定國之數者言其爲天子者量入以爲禮也所謂以地廣狹者言其爲諸侯者量入以爲禮也禮之厚薄與年之上下者天子諸侯莫不然也龍泉葉氏曰禮與財非相惡也而相害者何也禮以縟爲隆財以嗇爲裕禮之文難極財之實有盡而制禮之節與用財之數常不能相知是禮之所由備者固財之所爲闕也今夫孝於死喪而棺槨丘壠之事崇矣敬於祭祀而玉帛犧牲之用嚴矣謹於朝聘而燕饗好貨之費繁矣峻於等威而宫室侍御之儀多矣夫儉則不及禮不及禮則朴固野陋而無所觀及禮則財不足以稱之此所以能爲財之害也故知禮之倫者不然曰禮無定經也以舉國之數爲經也無常倫也以地之廣狹爲倫也不自爲薄厚也以年之上下爲薄厚也制禮之節用財之數常相繼而不相離不獨於其隆也盛禮以自尊而又於其殺也貶禮以自卑蓋稱財以爲禮而不以空文言禮也如此夫計其有而不虞其無喜其備而不憂其闕昔聖人之於禮也必不然矣而求富以備禮其説常出於後之儒者至於滅棄先王經常之政而襲用小人一切之法規取民財封奪民利而其禍蔓延於天下起於財不足而禮有未至也金華應氏曰舉猶挈定國猶立國也緫千七百國之所出而受其九貢九賦之所入此其一定之數所以爲天下之大計禮之大計既定則天下之大經亦定矣天秩五禮其經三百其常而不變者皆經也至於因地利天時以爲别則有不定者焉其大倫有序則由乎地之廣狹大國貢重列國貢輕秩然有倫所謂任土以作貢也其厚薄有等則因乎年之上下損則用二簋萃則用大牲所謂因嵗以制用也蓋經者以定國之成規其廣狹隨地之所出厚薄隨天之所生者皆無一定之拘所謂倫也年有上有下此在天之天也年雖大殺而衆不匡懼此在我之天也上謹於制節而下不匡懼則所約者一己所裕者一國衆有所恃賴而不恐矣禮時爲大順次之體次之冝次之稱次之堯授舜舜授禹湯放桀武王伐紂時也詩云匪革其猶聿追來孝天地之祭宗廟之事父子之道君臣之義倫也社稷山川之事鬼神之祭體也喪祭之用賔客之交義也羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也鄭氏曰時爲大至稱次之言聖人制禮所先後也時言受命改制度也革急也猶道也聿述也言文王改作非欲急行己之道乃追述先祖之業來居此爲孝也倫之言順也體天地人之别體也義之言冝人道之冝也稱牲之大小而爲俎此指謂助祭者耳足猶得也云百官喻衆也孔氏曰此一節明因上制禮得節以下諸事皆由禮洽天時也揖讓干戈於禮中最大故云時爲大雖合天時又湏順序既時且順又湏各有體别雖有體别又湏各當其冝稱猶足也行禮湏各自稱足也堯舜授人湯武救民伐罪皆時使之然也詩大雅文王有聲之篇言文王改作豐邑非是急行己之道乃追述先祖之業來行孝道於豐邑亦時使之然也神是天之别體社禝山川是地之别體鬼是人之别體故鄭註云别體也喪祭應湏費用賔客有賻賵之交是人道之冝故後云喪禮忠之至賔客用幣義之至是也臣助祭則各有俎祭竟播及胞翟雖復羔豚之小而百官皆悉得之假令大牢亦不使有餘小而皆得大而不餘是各稱牲體也案儀禮士祭用特牲大夫祭用少牢皆以成牲不用羔豚此得有羔豚者王制云大夫士有田則祭無田則薦則無地大夫士薦羔豚也無地則無臣助祭故鄭云百官喻衆也江陵項氏曰時者天地之大運順者人道之大倫體者其支體冝者其義理稱者其度數五者自綦大至綦細也講義曰禮也者理也自時而至於稱五者雖不同終因乎理之所在而已長樂陳氏曰時在天順體冝稱在人在天者大在人者小故時爲大順次之體次之冝次之稱次之堯授舜舜授禹天與賢也湯放桀武王伐紂天吏也順天者存逆天者亡時之所以爲大也天地之祭則有所尊宗廟之事則有所親天地宗廟尊親之倫也父子君臣尊卑之倫也社禝山川地祗之祀人鬼天神之祭三者之體固異蓋天神則以陽為體地祗則以隂爲體人鬼則魂以陽為體魄以隂為體也喪之用則不儉其親祭之用則必盡其物賔之交則禮殺客之交則禮隆皆從其義而已矣羔豚而祭薄也冝若不足而百官皆足大牢而祭豐也冝若有餘而不必有餘者求其稱而已矣蓋順主仁體主禮冝與稱主義其所主雖殊而其爲禮一也又曰禮有全體有節目禮有經常有權變曰時曰冝曰稱皆指權變而言也曰倫曰體皆指節目而言也嚴陵方氏曰天之運之謂時人之倫之謂順形之辨之謂體事之義之謂冝物之平之謂稱堯舜以徳而授受湯武以兵而放伐非人力之能爲蓋天運然也故謂之時引詩者言武王聿追文王之道以趨時也天地宗廟父子君臣皆出乎自然之理而人則順而叙之故謂之倫社禝山川鬼神自有形以至於無形莫不各有所辨故謂之體王制大夫士無田則薦謂用羔豚言薦而已乃謂之祭者蓋别而言之則有薦祭之異以事神言之則薦亦可謂之祭也山隂陸氏曰放者使不得暴民而已若武王之事然後爲伐變冝言義義人而已變順言倫倫亦人也羔豚而祭謂小祭祀大牢而祭謂大祭祀先儒謂羔豚爲無地大夫之祭是猶讀雲漢而責周無遺民也虙氏曰天地之祭則郊丘是已宗廟之事則祖禰是己宗廟之事則有父子之道存焉天地之祭則有君臣之義存焉蓋内則父子外則君臣人之大倫也君臣主敬故於天地言之所謂天子祭天地諸侯祭社稷則倫見於天地之祭君臣之義也如此父子主恩故於宗廟言之所謂有事於大廟則昭與昭齒穆與穆齒則倫見於宗廟之事父子之道也如此廬陵胡氏曰冝合冝稱各當分羔豚大牢此緫指天子諸侯祭耳云羔豚者見雖小必足也龍泉葉氏曰凡此五者時措其冝以順天下事物之禮而治之也所順在先而以天下事物從禮則禮行焉所順在後而以禮從天下事物則禮廢焉雖聖人復生茍無其位未易救也何也昔者天下之未嘗有此禮也草略倨肆而已矣聖人於天下之所未嘗有者而獨以身先之或授受或誅伐而皆能措斯人於安治所謂時也天未明地未察宗廟未嚴父子未親君臣未從待禮而定所謂倫也其於社稷山川鬼神也有所則象而報事焉專爲門霤廣爲蜡臘無不在矣所謂體也喪祭用焉賔客交焉所謂義也寡不必不足多不必有餘諸侯大夫各守其分所謂稱也始天下之未嘗有此禮也豈非無時無義無倫無稱而莫之安也故禮舉而義始立禮行而物斯從廣大徧覆於天下而禮彌綸之蓋以天下從禮而非以禮從天下也不幸已行之禮失其次序事逺而莫追時異而難遵既間雜於人欲之流放矣雖不時不義不倫不稱而亦莫之䘏也自叔向子産晏子號爲知禮之大意曽不足以輔其君而反損益之以徇人欲孔子知之而不能救也逮於後世統緒不接又大異矣從其所謂便利者去其所謂迂闊者儒者方追述帝王時措之冝於時變世遷人欲放流之後思舉而措之以禮從天下而兾望古人萬一之功嗚呼禮之卒難行也諸侯以龜爲寳以圭爲瑞家不寳龜不藏圭不臺門言有稱也鄭氏曰古者貨貝寳龜大夫以下有貨耳易曰十朋之龜瑞信也諸侯執瑞孤卿以下執摯闍者謂之臺孔氏曰此一節還明上經稱次之事諸侯有保土之重冝湏占詳吉凶故得以龜爲寳圭兼五等玉也諸侯之於天子如天子之於天也天子得天之物謂之瑞故諸侯受封於天子天子與之玉亦謂爲瑞也書云輯五瑞又云班瑞于羣后是也此云圭不云璧從可知也家卿大夫也大夫卑輕不得寳龜故臧文仲居蔡爲僭也卿大夫不得執玉故不得藏圭兩邉築闍爲基基上起屋曰臺門諸侯有保捍之重故爲臺門而大夫輕故不得也言有稱者結上得與不得各有所稱也鄭注貨貝寳龜也古者以貝爲貨若今用錢爲貨貝有五種案食貨志王莽作金銀龜貝錢布之品名曰寳貨大貝壯貝幺貝小貝又不盈寸爲五品又以龜爲寶案損卦六五爻云十朋之龜鄭注引爾雅神龜以下十龜家語臧氏家有守龜名曰蔡此云家不寳龜者案白虎通天子之龜尺有二寸諸侯一尺大夫八寸謂卜龜也士亦有龜士喪禮卜宅是也闍者謂之臺爾雅釋宫文長樂陳氏曰以龜爲寳所以致謀於神以圭爲瑞所以合符於天子致謀於神所以考國疑合符於天子所以重國體非諸侯之所私有也家之寳龜藏圭則爲私有此臧文仲居蔡所以見譏於君子也嚴陵方氏曰龜所以決國疑圭所以申國信諸侯有國者也故以龜為寳以圭為瑞大夫有家而已故不寳龜不藏圭變瑞言藏則以藏猶不可而況於瑞乎門之有臺所以壯國體故家不臺門凡此則以國家之辨各有稱焉禮有以多爲貴者天子七廟諸侯五大夫三士一天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六諸侯七介七牢大夫五介五牢天子之席五重諸侯之席三重大夫再重天子崩七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多爲貴也鄭氏曰豆之數謂天子朔食諸侯相食及食大夫公食大夫禮曰宰夫自東房薦豆六設于醬東此食下大夫而豆六則其餘著矣聘禮致饔餼於上大夫堂上八豆設于戶西則凡致饔餼堂上之豆數亦如此周禮公之豆四十其東西夾各十有二侯伯之豆三十有二其東西夾各十子男之豆二十有四其東西夾各六諸侯七介七牢者周之侯伯也大夫五介五牢者侯伯之卿使聘者也周禮上公九介九牢侯伯七介七牢子男五介五牢聘義所云上公七介侯伯五介子男三介乃謂其使者也天子葬五重者謂抗木與茵也葬者抗木在上茵在下士喪禮下篇陳器曰抗木橫三縮二加抗席三加茵用䟽布緇翦有幅縮二橫三此士之禮一重者以此差之上公四重孔氏曰禮主威儀以尊卑大小多少質文各有所冝其稱非一故從此以下更廣明爲稱之事天子徳尊孝篤故立廟以多世爲稱諸侯大夫士徳轉薄故廟少爲稱士一廟據下士爲言若適士則二廟也天子豆二十有六者尊者冝備味也諸公上公也諸侯侯伯子男也十六十二謂更相朝時堂上之豆數上下大夫或八或六皆謂主國食使臣堂上之豆數鄭註謂天子朔食諸侯相食者以文連下大夫六豆上大夫八豆皆是食饗大禮明天子諸侯之豆數亦是大禮故云朔食及相食也案禮有正羞庻羞見公食大夫禮又掌客云公豆四十又云食四十則豆盛正羞食爲庻羞也故鄭註掌客云食者其庶羞美可食者是庶羞與正羞别此上大夫八豆下大夫六豆皆爲正羞而天子二十六豆亦爲正羞也鄭註食下大夫豆六則其餘著矣者言下大夫六豆設於堂上則天子公侯之豆亦設于堂上顯著可知也引聘禮致饔餼於上大夫證此八豆之義也案公食大夫禮亦有上大夫八豆之文必引聘禮者以公食大夫是食禮聘禮上大夫是致饔餼禮欲見食與饔餼堂上豆數同引周禮者皆掌客文其陳於堂上及東西夾此鄭以意量之也諸侯七介七牢者介副也牢大牢也諸侯朝天子天子以大牢禮賜之周禮公九介九牢侯伯七子男五今言七舉中言之也案大行人云凡卿大夫士之禮各下其君二等侯伯七介七牢其臣既降二等故卿大夫五介五牢亦舉中言之也其介數得各下其君二等若牢則以爵等五等之卿同牢今言五牢者唯據侯伯之卿降君二等其餘牢禮則否天子之席五重者尊者湏厚多重乃稱諸侯三重謂相朝時賔主皆然也三重則四席也凡儀禮之例一種席皆稱重故燕禮註云重席重蒲筵是也凡席有兩則稱二重有一則稱一重與棺重别也天子五重八翣者葬冝堅固故多重冝多鄣蔽故八翣諸侯卑於王故鄣蔽少三重六翣五等同也諸侯大夫又卑故從而少飾前介及牢不云天子者天子無介牢禮無等及爲賔客之事古者椁累木於其四邉上下不周致茵於椁下所以藉棺從上下棺之後又置抗木於椁之上所以抗載於土鄭引士喪禮下篇證此經葬五重三重之義也下棺之後先加折於壙上以承抗席折猶􅔑也方鑿連木爲之蓋如牀縮者三橫者五無簀於上加抗木抗木之上加抗席三此爲一重如是者五則爲五重茵者藉棺外下褥用淺色緇布爲之每將一幅輙合縫爲囊將茅秀及香草著其中如今有絮褥也亦縮二横三每爲一重也此以多為貴結上文長樂陳氏曰多少者禮之數大小髙下者禮之度文素者禮之容是雖所設之不同皆縁情以制冝隨冝以爲貴以求其稱而已其言以多爲貴則先之以廟而繼之豆介牢席者先神後人之序也由豆介牢席而繼之以葬者養生送死之序也至於多少大小髙下文素之間其先後之序蓋可以理考又禮書曰禮器之豆數用數也掌客之豆數陳數也嚴陵方氏曰豆以實地産爲主故每用隂數介謂介僎之介此引諸侯牢介謂朝天子之禮也卿大夫牢介謂諸侯使聘天子之禮也止言諸侯之席三重則通五等可知言大夫再重則兼卿可知凡此尊者多而卑者少故曰以多爲貴山隂陸氏曰天子朝踐八豆饋食八豆又加豆八羞豆二所謂二十有六者此與自公以下雖有加豆羞豆不數方隆天子以多爲貴故也亦其加豆羞豆有降殺春秋傳曰楚子入饗于鄭加籩豆六品是也又聘禮云凡致禮皆用其饗之加籩豆則籩豆非饗盖少諸公十六倍上大夫朝事八饋食八諸侯十二倍下大夫朝事六饋食六上大夫八朝事之豆也下大夫六去茆菹麋臡公食大夫宰夫自東房薦豆六韭菹醓醢昌本麋臡菁菹鹿臡是也以差次推之上士饋食之豆四既夕禮脾折蠯醢葵菹蠃醢是也下士饋食之豆二冠禮喪禮特牲饋食葵菹蠃醢士籩有栗脯而已天子之席五重書曰敷重篾席敷重筍席則凡王席重設行葦傳曰設席重席也周官司几筵設莞筵紛純加繅席畫純加次席黼純繅席次席皆重設是以謂之五重凡禮對文則别散文則通自其通者言之筵或謂之席席亦或謂之筵又天子五重諸侯三重筵皆單設席則重也大夫再重有筵則席亦單設無加席則筵蓋重爾公食大夫禮曰蒲筵常緇布純加萑席尋𤣥帛純萑席蓋亦單設大射儀曰司宫兼卷重席設於賔左此筵亦重設也是以謂之重席謂之重席則無異席可知鄭氏謂公食大夫孤爲賔則莞筵紛純加繅席為畫純是不知司几筵加繅席重設主諸侯三重席言之公食大夫加萑席主大夫再重言之萑席單設而已蓋如是而知諸侯之席三重大夫再重也凡翣天子戴璧諸侯戴圭蓋首戴五非大夫以下之事也五重三重再重蓋皆謂棺據喪大記君之棺八寸屬六寸椑四寸上大夫棺八寸屬六寸下大夫棺六寸屬四寸先儒謂席有兩則稱重與棺重别此讀天子之棺四重之誤也蓋天子之棺五其爲重實有四今曰五重侈言之雖曰五重可也東萊吕氏曰儒者之議禮每力爭於毫釐尺寸之間如天子之席五重諸侯之席三重所爭者纔再重耳天子之堂九尺諸侯之堂七尺所爭者纔二尺耳由庸人視之天子諸侯之分豈再重之席二尺之堂所能抑揚耶大堤雲横抗如山嶽其視尺寸之土若不能爲堤之損益也然水源暴至勢與堤平茍猶有尺寸之土未沒則瀕水之人可恃以無恐當是時百萬生靈之命繫於尺寸之土焉尺寸之土可以遏昬墊之害尺寸之禮可以遏僭亂之原然則儒者力爭於毫釐尺寸之間非迂也𫝑也講義曰禮莫大於分分莫大於名名分一定則禮有隆殺而不敢相踰越荀卿所謂禮以貴賤為文以多少爲異是也許氏曰裁羣物制庻事安上治民莫善於禮究其裒多益寡别嫌明微使禮之或多或寡或小或大或髙或下或文或質各當其位而不相亂各稱其情而不相悖循其名列其器而義以脩焉禮以藏焉則非聖人莫能爲矣方天下未有此禮也分夷級陵等威蓋未嚴也聖人取其多且文者致隆於君上由君而下極其降殺莫得以比隆焉天下之人亦見君上之禮其取數多矣用物宏矣往往不以爲過而以爲當然退顧其所當得者不自厭於寡約之中而退焉自適於分守之際彼其𥘉未始有此也禮一制焉而君勢益尊民志益定是則聖人之教也故廟祧之設天子則七諸侯則降而五焉大夫三焉士則一焉非特以誠深孝篤獨隆於天子也蓋以天下有王尊祖親禰之道當如是也堂上正羞天子則二十有六豆諸公則殺而十六焉諸侯則十二焉上大夫八而下大夫六焉非以備味多品獨冝於天子也不如是無以極九州之美備四時之和也牢介異數諸侯之七則多於大夫之五席重異冝諸侯之三則多於大夫之再事莫大於天子之喪故葬必七月抗木與茵之數至於五重而翣以八焉至諸侯則五月而葬三重六翣而已夫葬月之或七或五也抗茵柳翣之數五之與三八之與六天子諸侯之儀亦或幾於相亂矣夫其禮之相亂者其間不能以寸聖人乃惓惓致意焉蓋以爲毫釐之際所以明嫌表微者舎是無以自見也雖然七月而葬非特貴夫閲月之多也死生終始之際人道大變聖人嚴焉固不可不深長思而盡心於此也況至尊至貴之極莫與倫等而可忽於此乎七日而殯則附於身者必誠必信既殯而庸有悔焉君子以爲不仁於親也七月而葬凡附於棺者必誠必信既葬而庸有悔焉君子以爲不仁於親也質之周制含襚幣玉小宰受之鄉遂紼引司徒治之大喪之殯也葬也必以大臣蒞之者所以示天下之嚴且重者矧夫未殯之始復之用衣裳也薌尸之用鬯也寒尸之用槃冰也枕尸之用角枕楔尸之用角柶也斂尸之用圭璋琥璜璧琮也必七日而殯焉者盖欲誠信乎此也及其葬也水兕之周於杝梓也菆龍之加於椁幬也竁之用窆器也葬之用鸞車象路也七月而葬焉者盖欲其誠信乎此也春秋一書天子志崩不志葬獨於莊四年志葬桓焉或以爲不志葬者春秋之常也或以爲尸以求於諸侯也夫事莫大於葬天子聖人奚忍不志天子之葬同軌畢至尚何求者桓王崩於桓之十五年至是而葬蓋七年矣聖人之心盖謂以春秋臣子不能盡其道於送往謹終之際絶父子君臣之義春秋蓋隠焉而不書間有獲見於經者乃若是慢春秋書之而當時臣子之罪著矣禮記集說卷五十九
