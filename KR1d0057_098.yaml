body:
  text: 禮記集説卷九十八宋衛湜撰魏文侯問於子夏曰吾端冕而聼古樂則惟恐卧聼鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也鄭氏曰魏文侯晉大夫畢萬之後僣諸侯者也端玄衣也古樂先王之正樂也孔氏曰自此至合之也明魏文侯與子夏問答古樂今樂之異身著端冕明心恭敬也端冕玄冕也凡冕服其制皆正幅袂二尺二寸祛尺二寸故稱端也言古樂何以朴素如彼使人不貪至於卧新樂何以婉美使人嗜愛不知其倦也長樂陳氏曰樂之於天下中則和過則淫故黃帝之咸池堯之大章舜之韶禹之夏殷湯之濩周武之武其聲足樂而不流其文足論而不息此所謂中則和古樂之發也鄭之好濫宋之燕女衛之促數齊之敖辟慢易以犯莭流湎以忘本此所謂過則淫新樂之發也莊周曰大聲不入里耳折揚皇華則嗑然而笑豈謂是耶蓋文侯之於古樂則在所外而惟恐卧於新樂則在所內而不知倦此其問所以有彼此之辭也諸侯玄端以祭則端冕諸侯之祭服也文侯以祭服聼樂猶檜君以朝服逍遙其好鄭衛之音不已甚乎樂書延平周氏曰古樂和而雅感於人也深唯意誠者知其所以樂新樂淫而靡入於人也易故聼其音者不知倦慶源輔氏曰古樂古人之心聲也今樂今人之心聲也其心不古而使之聼古人之樂是猶以大羮玄酒而陳之於餮食者其不唾去也幸矣子夏對曰今夫古樂進旅退旅和正以廣弦匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也鄭氏曰旅猶俱也俱進俱退言其齊一也和正以廣無姦聲也會猶合也皆也言衆樂皆待擊鼓乃作周禮太師職曰大祭祀帥瞽登鼓令奏擊拊下管播樂器令奏鼓朄文謂鼓也武謂金也相即拊也亦以莭樂拊者以韋為表裝之以粳粳一名相因以名焉今齊人或謂粳為相雅亦樂器名也狀如漆筒中有椎孔氏曰此經明子夏對文侯古樂之體言古樂進退如一而不參差樂音和正寬廣而無姦聲弦飽笙簧其器雖多必會合保守待擊拊鼓拊即鼓之類擊鼓必擊拊鄭引周禮大師職謂大帥登歌令奏時先擊拊下管令奏時先擊朄證此經擊拊也始奏以文謂始奏樂時先擊鼓復亂以武謂舞畢反復亂理欲退之時則擊金鐃也金屬西方可為兵刃故為武鼓主發動衆音故為文治亂以相者相所以輔相於樂亂理也言治理奏樂之時先擊相也訊疾以雅者舞者訊疾奏此雅器以莭之君子於此時語説樂之義理道古言君子作樂之時亦謂説古樂之道理也君子既聞古樂近修其身次及其家然後平均天下長樂陳氏曰旅之為義生於師旅之旅其陳足以成列也所謂進旅退旅豈非行其綴兆要其莭奏而進退成列邪以廣而後和正雖廣而不容姦矣進旅退旅進退得齊焉和正以廣志意得廣焉抑又作之堂上弦之以琴瑟作之堂下匏之以笙簧堂上非特琴瑟也又會守拊焉堂下非特笙簧也又會守鼓焉維清奏象舞其文也武奏大武其武也文先之武次之有安不忘危之意而揖遜征誅之義盡矣干羽之舞雜然並奏容有失行列而不治甚疾速而不刺者矣是故治亂以相有文明以莭之使之和而不流也訊疾以雅有法度以正之使之奮而不拔也樂終於舞如此則樂終而德尊故明樂之君子於是語以告之道古以明之而君子小人未有不好善而聼過者矣樂書又禮書曰言會守拊鼓則衆樂待其動而後作也既曰會守拊鼓又曰治亂以相則相非拊也鄭氏以相為拊誤矣拊書謂之搏拊明堂位謂之拊搏蓋以其或搏或拊莫適先後也爾雅和樂謂之莭或説莭即相也周禮笙師掌教舂牘應雅以教祴樂蓋樂者正也賔出而舂雅欲其醉而不失正也工舞而奏雅欲其訊疾而不失正也賔出之奏雅有祴樂則工舞之奏雅各以其舞之曲歟延平周氏曰進退以旅者言其齊而有儀和正以廣者言其美弦匏笙簧會守拊鼓者言其序始奏以文者夲乎仁復亂以武者制以義相雅皆樂器名也以其莭樂而能治其亂則有相之道是以謂之相以其趨樂之莭奏而不失於雅是以謂之雅古樂之作也如此故君子樂終而語今則有倫道古則不悖修身及家平均天下此其所以為古樂也嚴陵方氏曰進旅退旅言進退之整如師旅之陳也樂所以交歡師所以禦難於交歡之際乃若禦難之整則君子之樂豈或至於淫荒而生患哉故進退必為之旅也和足以合生氣正足以感順氣凡以言其樂之聲也弦匏笙簧則舉八音之樂凡以言樂之器也始奏以文謂擊鼓而作鼓聲為陽故謂之文復亂以武謂擊鐃而退鐃聲為隂故謂之武復亂謂復有所治也治亂而使之理乃所以助樂之和故曰治亂以相訊疾而使之莭乃所以正樂之失故曰訊疾以雅訊亦治也語即大司樂所謂樂語也道古即語也以所作者古之樂故從而道古之事鄭氏釋樂語曰道者言古以制今蓋謂是矣修身及家平均天下言雅樂足以致此也古樂之發言樂之發見於事者如此平言無上下之偏均言無逺近之異慶源輔氏曰此進旅退旅四字形容古樂已盡和正以廣和而不流便有廣大之意始奏以文復亂以武此所謂一張一弛也馬氏曰始奏以文者所謂先鼓以警戒也復亂以武者所謂復亂以飭歸也語者所謂既歌而語以成之也古者於旅也語而語者語其父子君臣長幼之莭而合德音之致既語而又有以道古道古者道上古之治而以明其作樂之意也橫渠張氏曰治亂以五成而分之時也周召之事故以相言之相者器之名然因周召之事名之以記其莭訊疾以雅是發揚之事也雅亦器之名雅既為正必在中處當發揚蹈厲之時亦以此物記其莭雅者正也故以文王為大雅出車還率為小雅治亂以相為周召作訊疾以雅為太公作於旅也語謂唯是語樂言不及他飲射之際亦當如是藍田吕氏曰訊疾以雅擊雅以任舞者之進也治亂以相拊相以治舞者之亂也舞者之進以象發揚蹈厲不可得而緩也其舞既急行列不能無亂故武亂皆坐拊相以莭之使正其行列復不可得而急也故訊疾為太公之志志以伐商而不可失治亂為周召之事歸馬散牛不復用兵教之以禮樂者也濓溪周氏曰古聖王制禮法修教化三綱正九疇敘百姓大和萬物咸若作樂以宣八風之氣以平天下之情故樂聲淡而不傷和而不淫入其耳感其心莫不淡且和焉淡則欲心平和則躁心釋優柔平中德之盛也天下化中治之至也是謂道配天地古之極也後世禮法不修刑政苛紊縱欲敗度下民困苦謂古樂不足聼也代變新聲妖淫愁怨道欲增悲不能自止故有賊君棄父輕生敗倫不可禁者矣嗚呼樂者古以平心今以助欲古以宣化今以長怨不復古禮不變今樂而欲至治者逺矣今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也鄭氏曰俯猶曲也言不齊一也濫竊也溺而不止聲淫亂無以治之獶獼猴也言舞者如獼猴戲也亂男女之尊卑獶或為優孔氏曰此經明子夏對文侯新樂之體新樂謂今世淫樂也俯謂俯僂曲折行伍雜亂姦邪之聲濫竊不正人所貪溺不可禁止作樂之時及有俳優侏儒短小之人舞戲如獼猴間雜男女不復知有父子尊卑之禮既與古樂乖違樂雖終不可語道於古也延平周氏曰進退皆俯非有儀也姦聲以濫非和正也溺而不止非所以為廣也及優侏儒獶雜子女不知父子非有序也樂終而語今則無倫道古則有悖此其所以為新樂也嚴陵方氏曰夫屈伸俯仰樂之文也一屈一伸一俯一仰樂乃成文今則進退皆俯豈所以為樂之文乎姦聲所以感逆氣者濫若鄭音之好濫溺若文侯所問之音言流而不知反也倡優侏儒皆淫樂以之為戲也獶即猿也戲若猿獶之無辨故言獶雜子女獶雜故不知父子父子者人之大倫不知父子故樂終不可以語不可以道古馬氏曰聲既以濫而失莭又雜之以侏儒女子則樂之淫益甚也語者語君臣父子之莭而不知父子則樂終不可以語道古者道其治古之隆而淫聲起於亂世則於古無以道山隂陸氏曰惡不頓進濫而後溺溺而不止然後浸淫乎獶雜是之謂反慶源輔氏曰進俯退俯有慚忤之意其曰古樂之發如彼新樂之發如此而使文侯自得之此子夏所以善啓君也今君之所問者樂也所好者音也夫樂者與音相近而不同鄭氏曰言文侯好音而不知樂也鏗鏘之類皆為音應律乃為樂孔氏曰古樂有音聲律吕今樂亦有音聲律吕是樂與音相近也樂則德正聲和乃為樂音則心邪聲亂不得為樂是不同也長樂陳氏曰古以德音謂之樂今以溺音為之則非樂也淫濫之音而已是樂與音固相近而不同也文侯所問在樂所好在音是知音而不知樂直衆庶之見耳孔子惡鄭聲之亂雅及顔淵問為邦而告以韶舞子夏所學則孔子也故必叩其兩端以盡陳善閉邪之道孟子以齊王不能同樂於民故語之以今樂猶古所以引而進之也子夏以文侯好音而不知樂故對之以今樂異古所以抑而攻之也樂書嚴陵方氏曰有音而後有樂則樂與音相近而所以為樂者不止於音故曰近而不同馬氏曰情動於中故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂則樂與音蓋相近而不同矣至於子夏之意則異於此蓋文侯所問雖先王之雅樂而其意之所存者鄭衛之淫聲也此子夏所以言鄭衛之淫聲不足以為樂而可以謂之音而已孟子言今樂由古樂在於與民同樂而已究其實則古今之樂不同猶天地之異也慶源輔氏曰先言聲樂之異後又言君之所好者溺音正之以漸也不然文侯有不復問矣文侯曰敢問何如子夏對曰夫古者天地順而四時當民有德而五榖昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂詩云莫其德音其德克明克明克類克長克君王此大邦克順克俾俾于文王其德靡悔既受帝祉施于孫子此之謂也鄭氏曰敢問何如欲知音樂異意德音有德之音所謂樂也德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長慶賞刑威曰君慈和遍服曰順俾當為比聲之誤也擇善從之曰比施延也言文王之德皆能如此故受天福延於後世也孔氏曰此一經明子夏與文侯問答古樂之正大當當謂不失其所案禮緯含文嘉云君為臣綱父為子綱夫為妻綱是為三綱諸父有善諸舅有義族人有敘昆弟有親師長有尊朋友有舊是六紀也弦歌詩頌謂以琴瑟之弦歌此詩頌也經引詩云大雅皇矣之篇鄭注德正應和以下皆昭二十八年左傳文詩言王季之德既正天下應和故其音莫然而靖其明可以照臨四方施惠勤勞不私於己廣及等類教誨不倦能為人師長慶賞刑威能與人作君故能王此大邦慈和遍服又能擇善而從之王季之德如此可以比擬文王無可耻悔左傳引此詩皆以為文王謂比校文王之德事事皆美無可悔恨與詩文互意别也王季既受天福祉以遺子孫子孫有天下詩云德音此經之謂也長樂陳氏曰天地以順動則四時不忒是天地順理然後四時各當其分也民有德人之和也五榖昌天地之和應之也如此災害不生而無疾疢禍亂不作而無妖祥合是數者無適不當則三才之理得豈不謂之大當乎然後內外相維而紀綱正則天下之動貞夫一而大定矣在易既濟夲於剛柔正而位當家人家道正也而終於天下定然則天下大當而禮可行天下大定而樂可作固其時也夫然後正六律而使之和聲和五聲而使之協律弦之琴瑟歌之詩頌則中聲所止無非盛德之形容焉庸詎不為德音之樂邪周之世世修德莫若文王詩之形容文王之德莫若靈臺而靈臺所美又不過虡業維樅賁鼓維鏞矇瞍奏公而已然則文王之樂豈不原於德音邪樂書嚴陵方氏曰天氣下而地不應地氣上而天不應若是則逆矣非所謂天地之順也春或雪霜大摯夏或草木零落若是則忒矣非所謂四時之當也民之有德以其有恆産故有恆心也五榖昌以時和嵗豐也疢熱疾也妖則左氏所謂地反物為妖是也祥與亳有祥之祥同疾疢則災之加乎人者妖祥則災之加乎物者疾疢不作而無妖祥凡此之類則知天地之間至纎至悉無不當於理矣故曰此之謂大當夫頌者美盛德之形容以弦歌詩頌故曰此之謂德音樂者德之華故德音之謂樂馬氏曰天地順而四時當以至疾疢不作而無妖祥者言和之極也知和而和不以禮莭之則亦不足以為樂故作為父子君臣以為紀綱紀綱既正天下大定由父子而推之則盡其親踈之序由君臣而推之則盡其貴賤之等踈不得以間於親賤不得以覬覦於貴如此則上下之志定矣大曰綱小曰紀書曰若網在綱記曰紀散而衆亂則紀綱者衆目之總也紀綱正無所不正矣故言作為父子君臣而卒之於天下大定自天地順而五榖昌以至於天下大定則其和與莭無所不具矣然後寓其和莭之意於形名度數之間故正六律和五聲弦歌詩頌之謂德音德音之謂樂德音者言其有德之音也然作為君臣父子必在於天地順五榖昌之後者蓋天地四時失其當而五榖失其昌則彼惟救死而恐不贍奚暇治禮義哉詩之所謂莫其德音者非在於樂而記者以樂言之則蓋説詩者不以文害辭不以辭害義也記曰不明乎善不誠乎身克明言明於善也類亦善也書曰自底不類此言其止於善也克長者其德可以長於人克君者其德可以君於人可以長於人可以君於人然後能王此大邦而克順克比也克順者言民順之而不逆克比者言民輔之而不二此大王之道也而比於文王則其德又不止於此故其德靡悔靡悔者賢人之事也無悔則聖人矣其德至靡悔則仰有以受福於天而俯有以施澤於後世故曰既受帝祉施于孫子凡此者皆以其莫然清淨之德音至於如此廬陵胡氏曰父子紀綱閨門君臣紀綱朝廷禮緯引三綱不經之論今所不取慶源輔氏曰紀綱正而天下大定蓋天下以序而後定樂以定而後作正六律然後可以和五聲和五聲然後可以弦歌詩頌詩即今之風雅頌即今之三頌也此詩雖言德音而不言樂然既曰德音之謂樂故可引以為據耳要之樂之功亦可以致此此子夏可語詩之一端講義曰父子君臣是人倫所固有者而曰作為何也人固有父子未必有父子之恩人固有君臣未必有君臣之義必待聖人作為禮莭以明之如書所謂勑我五典五惇哉此紀綱正矣人倫既正天下復有何事故曰大定今君之所好者其溺音乎文侯曰敢問溺音何從出也子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音傲辟喬志此四者皆淫於色而害於德是以祭祀弗用也鄭氏曰君之所好其溺音乎言無文王之德則所好者非樂也文侯問溺音何從出玩習之久不知所由出也鄭宋齊衛四國皆出此溺音濫濫竊姦聲也燕安也春秋傳曰懷與安實敗名趨欺讀為促速聲之誤也煩勞也祭祀者不用淫樂孔氏曰此經子夏與文侯問答溺音所出也濫竊謂男女相偷竊鄭國樂音好濫相偷竊是淫邪之志也溺沒也宋音所安惟女子所以使人志沒溺即前所謂溺而不止也鄭音好濫宋音燕女其事是一而為别音者濫竊非已儔匹别相淫竊燕女謂己之妻妾燕安而已所以别於好濫也上云鄭衛之音則鄭衛亦淫聲也又此云四者皆淫於色是衛與齊皆淫聲也而經惟云衛音趨數煩志齊音敖辟喬志不云女色者案詩有桑中淇上是淫佚可知則淫佚之外更有促速煩志齊詩有哀公荒淫怠慢襄公淫於妹亦女色之外加以敖辟驕志故總謂之溺音也延平周氏曰德音則能善其志而溺音則能亂其志也長樂陳氏曰志淫則心蕩志煩則心亂志溺則心下志喬則心髙皆非中聲所止非所以為德音之樂也蓋樂所以放淫亦所以誨淫所以章德亦所以敗德故放淫章德古樂之發也樂書馬氏曰鄭音好濫而使人之志淫宋音燕女而使人之志溺衛音趨數而使人之志煩齊音敖辟而使人之志喬祭祀之所用在和與敬鄭淫宋溺則失於敬衛煩齊喬則失於和是以不可用之於祭祀也山隂陸氏曰前言所好者音也今乃言所好其溺音乎是引其君有漸也蓋詞不迫切而意已篤至古之人多如此四音淫志為甚溺志次之煩志喬志又次之慶源輔氏曰既云德音而不及溺音乃曰君之所好者其溺音乎乎疑辭也所以致文侯之問而後語之也不然則將勃然如宣王矣四國之音在當時如此宋音其紂之遺乎詩云肅雍和鳴先祖是聼夫肅肅敬也雍雍和也夫敬以和何事不行鄭氏曰言古樂敬且和故無事而不用溺音無所施孔氏曰此經子夏重為文侯明正樂此詩周頌有瞽之篇言樂音敬和而鳴先祖之神聼而從之若施於政教何事不行也長樂陳氏曰古樂之發肅肅乎其敬而制之以禮雍雍乎其和而制之以義如此則外不淫色內不害德舉而措之天下何事不行况用之祭祀而先祖不是聼耶書謂八音克諧無相奪倫神人以和者此也樂書嚴陵方氏曰肅隂事也而禮由隂作以敬為主雍陽道也而樂由陽來以和為主孔子曰知和而和不以禮莭之亦不可行也故曰夫敬以和何事不行樂中之禮於是見之矣文王雍雍在宫肅肅在廟以是而已為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也鄭氏曰誘進也孔甚也言民從君所好惡進之於善無難孔氏曰此經子夏勸文侯謹行古樂以此化民無不從也引詩厲王大雅板之篇嚴陵方氏曰言人君謹其所好惡則以戒文侯之好溺音故也君則指其人上則指其位馬氏曰夫鄭衛之音其效至於如彼而和與敬其效至於如此則為人君者其好惡不可不慎也君者臣之倡上者下之儀臣則聼君而和下則視儀而動廬陵胡氏曰好惡謂好古樂惡新樂也誘謂導之然後聖人作為鞉鼓椌楬塤箎此六者德音之音也然後鍾磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也鄭氏曰六者為本以其聲質也椌楬謂柷敔也塤箎或為簨虡官序貴賤謂尊卑樂器列數有差次孔氏曰此經論聖人作為道德之音以示後世也柷形如漆筒中有椎敔狀如伏虎背上有二十四齟齬箎七孔塤六孔塤燒土為之大如鴈卵鼗如鼓而小持其柄搖之旁耳自擊鼓革也椌楬木也其聲質素故周語單穆公云革木一聲注云一聲無宫商清濁是也既用質素為本然後用鍾磬竽瑟華美之音以贊和之使文質相雜干楯也戚斧也狄羽也聲既文質偹矣又用干戚旄羽以舞動之則可以用於宗廟之中若樂九變而鬼神格也又用於廟中以接納賔客賔入奏肆夏及卒爵而樂闋孔子屢嘆之是也又用樂體别尊卑於朝廷使各得其宜天子八佾諸侯六佾是也若聞樂知德施于子孫是示後世使聼之莫不和順莫不和親是有尊卑長幼之序也長樂陳氏曰聖人作樂以發諸聲音者寓之象以稽諸度數者寓之器是故作革以為鞉鼓而鞉所以兆奏鼓者也作木以為椌楬而楬所以止合樂者也作土為塤而始有所倡作竹為箎而終有所和則播鞉而鼓從之中聲以發焉擊椌而楬止之中聲以莭焉吹塤而箎應之中聲以和焉蓋弦歌詩頌中聲之所止也而謂之德音則鞉鼓椌楬塤箎中聲之所出也謂之德音之音不亦宜乎聖人既作為六者之器以寓德音之樂抑又越之金石以為鍾磬宣之匏絲以為竽瑟所以諧其聲舞武以干戚舞文以旄狄所以動其容則八音克諧無相奪倫而神人奚適不和哉此所以祭先王之廟而幽足以交於神獻酬酳酢而明足以交於人行之當時而官序貴賤莫不得其宜示之後世而尊卑長幼莫不得其序也夫樂之在器以鼓為君以相為相在聲以宫為君以商為臣歌在上而貴舞在下而賤凡理之形見於樂者未有不寓貴賤尊卑長幼之意是樂之所樂而禮未嘗不行於其間不言柷敔而言椌楬者柷以中虛為用而聲出焉故又謂之椌敔以伏虎為形而聲伏焉故又謂之楬蓋聲之出也樂由之合聲之伏也樂由之止亦隂陽之義書曰合止柷敔樂書嚴陵方氏曰鞉革音也椌楬木音也塤土音也箎竹音也至於鍾則金音也磬石音也竽匏音也瑟絲音也凡此八音略備矣而又干戚旄狄以舞之於是樂成焉故足以祭先王之廟如下所言諸事也獻酬酢見鄉飲酒解酳即後言執爵而酳是也則獻酬酢所兼用也尊卑以上下言長幼以先後言禮樂之際貴者在上賤者在下貴者常先賤者常後故官序貴賤各得其宜足以示後世尊卑長幼之序也官序即次序也以其所主治故曰官經有言干戚羽旄有言鍾鼓干戚有言羽籥干戚有言弦歌干揚有言干戚旄狄其言各不同何也蓋干戚干揚皆武舞也羽旄羽籥旄狄皆文舞也干則盾也戚則斧也揚則鉞也干以自蔽戚揚以勝人武之事如斯而已旄以示愛羽以示飾籥則六律之所生狄則五色之所備文之事如斯而已所舉雖各不同所以主文武之事言之則一也鍾聲鏗鏗以立號號以立橫橫以立武君子聼鍾聲則思武臣石聲磬磬以立辨辨以致死君子聼磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聼琴瑟之聲則思志義之臣竹聲濫濫以立會會以聚衆君子聼竽笙簫管之聲則思畜聚之臣鼓鼙之聲歡歡以立動動以進衆君子聼鼓鼙之聲則思將帥之臣君子之聼音非聼其鏗鏘而已也彼亦有所合之也鄭氏曰號號令所以警衆也橫充也謂氣作充滿也石聲磬磬當為罄字之誤也辨謂分明於莭義亷亷隅也濫之意猶攬聚也會猶聚也聚或為最歡以立動聞歡囂則人意動作歡或為歡動或為勳有所合謂以聲合成己之志孔氏曰此一莭論樂器之聲各别君子聼之思其所用之臣金鍾之聲鏗鏗然堅剛故可以興立號令號令威嚴則軍士壯氣充滿而武事可立也石聲輕清故罄罄然能分明辨别既能明别莭義則不愛死也哀謂哀怨絲聲婉妙故哀怨以哀故能立亷隅不越其分以自立其志也竹聲既攬聚故能立會以聚衆笙以匏為之而在竹聲之中者但笙以匏為體插竹於匏匏竹兼有故笙文在竹也鼓鼙之聲使人意動作故能進發其衆五者聲各不同立事有異事隨聲起是聲能立事也君子謂知禮樂之情者聞聲逹事非徒聼其音聲鏗鏘而已彼謂樂聲亦有合成己之志意橫渠張氏曰所謂至誠動金石只為人能感動譬之鼓鍾其武者叩之則怒其悲者叩之則悲如此可必謂擊鍾而求鼓音則却無是理長樂陳氏曰樂聲有隂陽之殊人事有隂陽之辨則樂之與人常相象而未常相異君子聼樂之聲而思人之才則有所合而無所戾矣蓋鍾聲為兊石聲為乾絲聲為離竹聲為震鼓鼙為坎鍾聲鼓鼙隂也隂以嚴厲堅徑為事故鍾聲所以象武臣石聲所以象死封疆之臣鼓鼙所以象將帥之臣絲竹陽也陽以純潔滋飬為事故絲聲所以象志義之臣竹聲所以象畜聚之臣蓋樂者樂也君子樂得其內小人樂得其外樂得其內故必思其所象樂得其外則務其鏗鏘而已魏文侯之不倦新樂蓋亦不過於五者而未及其所象此子夏所以致曲而深諭之也然君子必思畜聚之臣何也蓋君子聚人以財而理財以義則其思畜聚之臣欲其免於急與不足之患而有以偹凶旱水溢之災使民不至於菜色而已此所謂以義為利不以利為利其與夫冉求之聚斂有間矣又樂書曰鍾於五行為金於五事為言於五藏為氣於五性為義金則奏而為鏗鏘言則發而為號令直其氣所以立橫方其義所以立武此所以思武臣也磬於八音為石於八卦為乾石則其形曲折而有别乾則其行剛健而不陷有别所以立辨不陷所以致死此所以思死封疆之臣也琴瑟同出於絲絲聲則噍殺而哀潔靜而亷依義以立志而已此所以思志義之臣也竽笙簫管同出於竹竹聲則動濁而濫合比而會有聚衆之義焉此所以思畜聚之臣也鼓鼙則為革聲一也士譁而歡羣趨而動有進衆之義焉此所以思將帥之臣也蓋有死封疆之臣則外足以保疆場有志義之臣則內足以厲風俗有畜聚之臣其衆足以順治有將帥之臣其威足以無敵為國之道無競維人而已君子之於音聼之在心不在耳誠有所合之也言鍾聲鼓鼙之聲則知絲之為琴瑟竹之為竽笙簫管也言絲聲竹聲則知鍾之為金鼓鼙之為革也言石聲磬則金聲鍾之類見矣言竹聲濫則石聲清之類見矣匏竹異制言竹則匏在其中矣革木一聲言革則木在其中矣就八音單出言之故謂之聲由聼其雜比言之故謂之音聼音必言君子者惟君子為能知樂故也八音不言土者以七音待土贊之而後和故也鄭康成以石聲磬當為罄字之誤豈經旨哉嚴陵方氏曰其聲溫柔者足以恱人其聲堅強者足以警衆而號令所以警衆也故鏗以立號警衆則所及者廣故號以立橫橫者廣也從順為文橫逆為武故橫以立武磬聲作乎上衆聲依乎下上下有辨南交而物以之生北辨而物以之死故辨以致死聲之細莫如絲陽以大為樂隂以細為哀樂則舒而無疆界哀則戚而有分際亷者分際之謂有分際所以立己故亷以立志立志者立己之謂也竹聲濫濫者泛濫之謂淵而靜而與物分流而動乃與物合故濫以立會分之則散會之則聚故會以聚衆鼓以作為事默則靜歡則動靜則止動則進蓋樂之聲作乎彼君子之思感乎此則以彼之情有以合乎此之意故曰有所合之也莊子曰金石有聲不考不鳴而樂以聲為圭故此以鍾磬為首然金尤為善鳴故以金石為序琴瑟者堂上之樂竽笙簫管者堂下之樂故又以絲竹為之序凡作樂皆曰鼓樂由天作終則有始故以鼓鼙終焉竽笙為匏簫管為竹合言之者竹而已衆音皆言其聲之狀獨於石則直言磬者以石止可以為磬也蓋八音之中唯土與石止可以為塤磬畜若易所謂畜物之畜聚若易所謂聚人之聚畜聚之臣則異乎聚斂之臣矣將帥亦武臣或於聼鍾聲思之或於聼鼓鼙之聲思之何也謂之武則存乎所守之志而已謂之將帥則見乎所行之事焉鍾金音也鼓革音也軍旅之法以革而進以金而止故其别如此山隂陸氏曰武之事橫矣磬盡也詘而盡也若玉斷以復續其異於石終而後詘經曰叩之其聲清越以長其終詘然樂也凡盡則詘窮磬為折形以此竹聲濫所謂蕩是也毛詩傳曰磬聲之清者笙磬同音可謂同矣無所不入而後可以立會伯夷隘立志者好之栁下惠不恭立會者好之鏗金聲鏘玉聲其泛言之則通李氏曰有禦難之臣則姦宄不敢肆有藩捍之臣則外邦不敢犯有衣食之臣則國用足禦難之臣所謂忠義之臣也藩捍之臣所謂武臣也死封疆之臣也將帥之臣也衣食之臣所謂畜聚之臣也故詩曰山有苞櫟隰有六駁又曰山有苞棣隰有樹檖櫟為山之芘蔭藩捍之象也六駁在隰能禦難之象也棣與檖皆可飬人衣食之象夫有其臣而君忘之此不思之者也君子一聼音而有以思藩捍禦難衣食之臣則其好樂也國之良士將瞿瞿而來蹶蹶而進休休而樂矣君子之於樂也豈聼其鏗鏘而已邪廬陵胡氏曰號猶伯牙操鍾之號橫謂壯氣充盈祭義云橫乎四海鄭謂磬當為罄案古字通用耳磬樂器也或為殺云磬于甸人是也或為折磬折則佩垂是也或為絞訐掉磬是也或為盡磬無不宜室如懸磬聲磬然是也殺也絞訐也盡也皆有死義哀謂婉妙亷猶亷逺地則堂髙之亷立志志不可犯濫濫觴之濫有聚意君子以聲合成己之志如上五思也慶源輔氏曰此亦子夏對文侯辭又據下以教之前言君之所好者音也夫音與樂相近不同故此又為文侯言古人之聼音亦豈徒哉亦有合成己之志者也君子之志意在得賢而用之耳堅剛之聲號令似之故鏗以立號號令則所警者衆故號以立橫廣大則武之事也故橫以立武磬折也盡也折而盡所以立辨辨而後可以死故曰生亦我所欲也義亦我所欲也二者不可得兼舍生而取義也封疆尤辨之大者哀則自有亷隅而不流有志者似之志義謂志在於義也所志者義則不為容恱矣地上有水師君子以容民畜衆所謂畜聚之臣者如師之君子是也鏗鏘者聲也號與武者義也聲在彼義在我君子不徒聼其聲而已必有感發其在我之意而已猶言鏗鏘以例其餘也金華應氏曰文侯方以淡泊為可厭則使其聼鏗鏘之可喜者焉方以昏倦惟恐卧則欲其聼之而致思焉且使之思武臣將帥死莭志義與夫畜聚之臣則其志氣感發慷慨興起而視優侏子女之獶雜皆不足以進乎前此子夏之善告君也故嘗謂古今本無異樂而雅俗不容同音顔子問為邦孔子告以樂則韶舞欲其知所慕也繼以逺鄭聲者欲其知所戒也春秋去舜逾千載而鍾鼓管弦之音猶未衰則古今固不可謂有異樂也然鄭聲不可不逺者以其淫而易以溺人故曰惡鄭聲之亂雅樂也齊宣王自謂非好先王之樂直好世俗之樂視魏文侯之惕然自省則大不同矣宣王迷而未悟故孟子告以今樂由古樂者其辭寬文侯悟而求之故子夏告之以古樂新樂之發者其辭嚴異時文侯能知鍾聲之不比亦略有見乎樂矣然明於音而聾於官卒未免見笑於田子方蓋區區徒能辨其聲而未能得其官以典樂樂官猶然而况於將帥死封疆之大者乎石林葉氏曰君子聼磬聲則思死封疆之臣周衰天下未有能以身致死而援之者子擊磬於衛荷蕢聞之以為有心者以此延平周氏曰鍾磬絲竹鼓鼙之聲既不同而所立者亦不同故君人者聼之亦各沿其類而思其臣也且畜聚之臣又安足思也哉夫君子不畜聚非不畜聚蓋君子畜聚而能散則異乎人之為畜聚也禮記集説卷九十八
